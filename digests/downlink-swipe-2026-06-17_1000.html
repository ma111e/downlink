an restore access without a full VPN because it routes Telegram traffic through an intermediary and avoids direct connections to blocked Telegram IP ranges.","Using an MTProto proxy preserves Telegram message encryption, but the proxy operator can still log the user’s IP address and connection times, making proxy trustworthiness a practical security concern.","The editing-feature restriction was tied to the National Testing Agency’s claim that channel administrators abused Telegram’s edit function to backdate posts and falsely present altered timestamps as proof of prior leaks."],"referencedReports":[],"body":"\u003cp\u003eIndia’s Ministry of Electronics and Information Technology restricted access to Telegram nationwide until June 22 after the National Testing Agency said the platform was used to sell access to leaked exam materials. A separate order requires Telegram to disable its message-editing feature in India until June 30. Telegram challenged the ban in the Delhi High Court, which agreed to hear the matter urgently.\u003c/p\u003e\n\n\u003cp\u003eThe disruption extended beyond India, with Telegram CEO Pavel Durov alleging that Reliance was sabotaging Telegram access outside India through BGP hijacking. Network observers confirmed that AS18101 announced Telegram routes and that the leak affected users in places including the UAE, but several researchers said they saw no evidence that the incident was deliberate. Analysts described the incident as resembling a domestic block that leaked globally through misconfigured routing.\u003c/p\u003e\n\n\u003cp\u003eThe article says affected users can restore access using Telegram’s built-in MTProto proxy feature, which routes Telegram traffic through an intermediary node to avoid direct connections to blocked Telegram IP ranges. It notes that Telegram traffic remains end-to-end encrypted, but proxy operators can see connecting IP addresses and connection times. Digital rights group Internet Freedom Foundation criticized the ban as disproportionate and constitutionally incompatible.\u003c/p\u003e\n"},{"n":7,"title":"The Invoice Portal Link That Didn't Need a Password","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/jwt-token-invoice-portal-ecocert-mailgun-iban-payment","time":"11:00","priority":"MAY READ","score":73,"tldr":"A fully authenticated invoice email from a legitimate Ecocert accounting subdomain used a tokenized Upflow billing portal link that granted passwordless access via a long-lived JWT. The key risk is that valid authentication and clean URLs can still expose billing portals and enable invoice fraud when access tokens are embedded directly in emailed links.","briefOverview":"\u003cp\u003eA French-language invoice notification arrived from comptabilitegreenlife@accounting.ecocert.com, a subdomain of the legitimate Ecocert domain. The message was delivered through Mailgun infrastructure and passed SPF, DKIM, and DMARC authentication with compauth=100. The article describes the case as a high-severity invoice fraud and credential-harvesting pattern mapped to spearphishing link, valid accounts, and victim identity information gathering techniques.\u003c/p\u003e\n\n\u003cp\u003eThe email directed recipients to an Upflow customer billing portal through a redirect at upflow-email.accounting.ecocert.com. The destination URL contained a JWT with portal.view permissions, a customer identifier, and a 60-day expiration window, allowing anyone with the link to access the portal without entering credentials. The article emphasizes that URL scanners passed the link because it pointed to a real billing portal on a real platform.\u003c/p\u003e\n\n\u003cp\u003eThe attached PDF invoice requested a 380 euro payment and included French IBAN and BIC payment details. The email also contained a 1x1 tracking pixel from the same upflow-email subdomain, which confirmed mailbox activity when the message was rendered. Themis flagged the invoice phishing pattern at 71% confidence and quarantined four affected mailboxes automatically.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a French-language invoice notification sent from comptabilitegreenlife@accounting.ecocert.com to a global specialty ingredients manufacturer. Ecocert is described as a legitimate international organic certification body with a domain registered since 1998. The message was delivered through Mailgun infrastructure and passed SPF, DKIM, and DMARC authentication with compauth=100.\u003c/p\u003e\n\n\u003cp\u003eThe email contained a link to a customer billing portal hosted at app.upflow.io and routed through a redirect at upflow-email.accounting.ecocert.com. The destination URL included a JWT access token with portal.view permissions, a customer identifier, and a 60-day expiration window. Decoding the token showed that anyone who clicked or possessed the link received authenticated read access to the billing portal without entering credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights this as a legitimate transactional email design pattern with a security problem. Billing platforms may embed session tokens so customers can review invoices without logging in. In this case, the same token worked for anyone who had the URL, meaning that forwarding, interception, or delivery to a mailbox controlled by an attacker would grant the same billing portal view as the intended recipient.\u003c/p\u003e\n\n\u003cp\u003eThe attached PDF invoice was named Facture-FR03IN26001665.pdf, was 91KB, and was declared clean by scanners. It referenced invoice number FR03IN26001665 for 380 euros and included French IBAN and BIC payment details at a major European bank. The email body also offered credit card and SEPA direct debit as payment options through the portal.\u003c/p\u003e\n\n\u003cp\u003eThe message also included a 1x1 tracking pixel loaded from the upflow-email subdomain, which confirmed that the mailbox was active and that the message was rendered. A subtle mismatch existed between the From address, comptabilitegreenlife@accounting.ecocert.com, and the Reply-To address, comptabilitegreenlife@ecocert.com. The email security gateway saw clean links, valid authentication, and a known billing platform, while Themis identified the invoice phishing pattern and quarantined four affected mailboxes automatically.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a high-severity invoice fraud and credential-harvesting case involving a French-language invoice notification sent to a global specialty ingredients manufacturer. The email came from \u003ccode\u003ecomptabilitegreenlife@accounting.ecocert.com\u003c/code\u003e, using a subdomain of Ecocert, which the article identifies as a legitimate international organic certification body with a domain registered since 1998.\u003c/p\u003e\n\n\u003cp\u003eThe message was sent through Mailgun infrastructure and passed all major email authentication checks. SPF, DKIM, and DMARC all passed, and the message received a compauth score of 100. The article emphasizes that every technical authentication check confirmed that the sending domain authorized the email.\u003c/p\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore Significance\u003c/h2\u003e\n\n\u003cp\u003eThe central issue was not a visibly malicious URL or a failed authentication result. The email linked to a real billing portal on a real platform and passed every URL scanner. The article states that the link did not need a password to work.\u003c/p\u003e\n\n\u003cp\u003eThe destination was an Upflow customer billing portal at \u003ccode\u003eapp.upflow.io\u003c/code\u003e, reached through a redirect at \u003ccode\u003eupflow-email.accounting.ecocert.com\u003c/code\u003e. The portal URL contained a JWT access token with \u003ccode\u003eportal.view\u003c/code\u003e permissions, a customer identifier, and a 60-day expiration window.\u003c/p\u003e\n\n\u003ch2 id=\"passwordless-portal-access-via-jwt\"\u003ePasswordless Portal Access via JWT\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that decoding the JWT revealed the full permission structure. Anyone who clicked or possessed the link received authenticated read access to the billing portal without entering credentials. This made the tokenized URL function as access to the portal view.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a common pattern in legitimate transactional email. Billing platforms embed session tokens so customers can review invoices without logging in. The security problem identified in the article is that the same token works for anyone who possesses the URL.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically notes that if the email is forwarded, intercepted, or delivered to a mailbox controlled by an attacker, the token grants access to the same billing view as the intended recipient.\u003c/p\u003e\n\n\u003ch2 id=\"invoice-and-payment-details\"\u003eInvoice and Payment Details\u003c/h2\u003e\n\n\u003cp\u003eThe email included an attached PDF invoice named \u003ccode\u003eFacture-FR03IN26001665.pdf\u003c/code\u003e. The attachment was 91KB and was declared clean by scanners. The invoice referenced invoice number \u003ccode\u003eFR03IN26001665\u003c/code\u003e for a 380 euro payment.\u003c/p\u003e\n\n\u003cp\u003eThe PDF included French IBAN and BIC payment details at a major European bank. The body of the email also offered credit card and SEPA direct debit as payment options through the portal.\u003c/p\u003e\n\n\u003ch2 id=\"tracking-pixel-and-mailbox-activity\"\u003eTracking Pixel and Mailbox Activity\u003c/h2\u003e\n\n\u003cp\u003eThe email contained a 1x1 tracking pixel loaded from \u003ccode\u003eupflow-email.accounting.ecocert.com\u003c/code\u003e. According to the article, this confirmed that the mailbox was active and that the message was rendered.\u003c/p\u003e\n\n\u003cp\u003eThis tracking component appeared alongside the tokenized portal link and the invoice attachment. The article presents the tracking pixel as part of the observable pattern in the email.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-infrastructure-and-header-details\"\u003eAuthentication, Infrastructure, and Header Details\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several indicators tied to the message and infrastructure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSending domain: \u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending address: \u003ccode\u003ecomptabilitegreenlife@accounting.ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDisplay name: \u003ccode\u003eGREENLIFE\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReply-To address: \u003ccode\u003ecomptabilitegreenlife@ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending infrastructure: Mailgun host \u003ccode\u003ev5226.v57ae4e16.euw1.send.eu.mailgun.net\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending IP: \u003ccode\u003e161.38.204.226\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDKIM selector: \u003ccode\u003emguf\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDKIM signing domain: \u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAuthentication results: SPF pass, DKIM pass, DMARC pass, and compauth=100.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the Reply-To address differed from the From address, creating a subtle subdomain mismatch between \u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e and \u003ccode\u003eecocert.com\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the email security gateway saw clean links, valid authentication, and a known billing platform. Despite this, Themis identified the invoice phishing pattern and quarantined four affected mailboxes automatically.\u003c/p\u003e\n\n\u003cp\u003eThemis flagged the pattern at 71% confidence. The article does not identify a named threat actor or group behind the activity.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.002\u003c/code\u003e — Phishing: Spearphishing Link, because of the tokenized portal URL with an embedded JWT.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1078\u003c/code\u003e — Valid Accounts, because the JWT granted portal access without credentials.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1589.001\u003c/code\u003e — Gather Victim Identity Information: Credentials, because the tracking pixel confirmed an active mailbox.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and contexts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e: sending domain and subdomain of \u003ccode\u003eecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecomptabilitegreenlife@accounting.ecocert.com\u003c/code\u003e: sending address with display name \u003ccode\u003eGREENLIFE\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecomptabilitegreenlife@ecocert.com\u003c/code\u003e: Reply-To address, noted as a subdomain mismatch with the From address.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ev5226.v57ae4e16.euw1.send.eu.mailgun.net\u003c/code\u003e: Mailgun sending infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e161.38.204.226\u003c/code\u003e: sending IP address.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emguf\u003c/code\u003e: DKIM selector.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eapp.upflow.io/customers/[uuid]?token=[JWT]\u003c/code\u003e: portal URL pattern containing a JWT with \u003ccode\u003eportal.view\u003c/code\u003e scope and a 60-day TTL.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eupflow-email.accounting.ecocert.com/o/[encoded]\u003c/code\u003e: tracking pixel URL pattern.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eFacture-FR03IN26001665.pdf\u003c/code\u003e: PDF attachment containing IBAN and BIC payment details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that valid authentication, clean scanner results, and a legitimate billing platform did not prevent the email from creating risk. The passwordless JWT-based portal link allowed access to the billing portal by anyone who had the URL. The case demonstrates how a legitimate transactional email pattern can create exposure when long-lived bearer-style portal links are delivered through email.\u003c/p\u003e\n","keyPoints":["A French-language invoice notification was sent from comptabilitegreenlife@accounting.ecocert.com through Mailgun and passed SPF, DKIM, and DMARC authentication with compauth=100.","The email linked to an Upflow customer billing portal through a redirect on upflow-email.accounting.ecocert.com, and the destination URL contained a JWT with portal.view permissions, a customer identifier, and a 60-day expiration.","Anyone possessing the tokenized URL could access the billing portal without entering credentials.","The attached PDF invoice, Facture-FR03IN26001665.pdf, requested a 380 euro payment and included French IBAN and BIC payment details.","A 1x1 tracking pixel from the upflow-email subdomain confirmed mailbox activity, and Themis quarantined four affected mailboxes after flagging the invoice phishing pattern at 71% confidence."],"insights":["Email authentication controls were not useful for detecting this case because the message was sent from authorized Mailgun infrastructure for a legitimate Ecocert accounting subdomain and passed SPF, DKIM, and DMARC.","URL scanning was ineffective because the link resolved to a real Upflow billing portal rather than an obviously malicious site.","The portal’s passwordless access model made the emailed JWT equivalent to a bearer credential, so forwarding or exposure of the email would also expose billing portal access.","The subtle mismatch between the From address on accounting.ecocert.com and the Reply-To address on ecocert.com was one of the few observable anomalies despite otherwise legitimate infrastructure.","The combination of a tracking pixel and a tokenized billing link allowed mailbox activity confirmation and portal access without requiring malware or a credential-harvesting page."],"referencedReports":[],"body":"\u003cp\u003eA French-language invoice notification arrived from comptabilitegreenlife@accounting.ecocert.com, a subdomain of the legitimate Ecocert domain. The message was delivered through Mailgun infrastructure and passed SPF, DKIM, and DMARC authentication with compauth=100. The article describes the case as a high-severity invoice fraud and credential-harvesting pattern mapped to spearphishing link, valid accounts, and victim identity information gathering techniques.\u003c/p\u003e\n\n\u003cp\u003eThe email directed recipients to an Upflow customer billing portal through a redirect at upflow-email.accounting.ecocert.com. The destination URL contained a JWT with portal.view permissions, a customer identifier, and a 60-day expiration window, allowing anyone with the link to access the portal without entering credentials. The article emphasizes that URL scanners passed the link because it pointed to a real billing portal on a real platform.\u003c/p\u003e\n\n\u003cp\u003eThe attached PDF invoice requested a 380 euro payment and included French IBAN and BIC payment details. The email also contained a 1x1 tracking pixel from the same upflow-email subdomain, which confirmed mailbox activity when the message was rendered. Themis flagged the invoice phishing pattern at 71% confidence and quarantined four affected mailboxes automatically.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft confirms Office apps launch issues after June updates","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-office-apps-launch-issues-after-june-updates/","time":"11:54","priority":"MAY READ","score":70,"tldr":"Microsoft says Windows updates released on or after June 9, 2026 can prevent some third-party apps using OLE automation from launching Office apps or opening Office documents. There is no fix yet, but users can work around it by opening Office apps or documents directly while Microsoft prepares a future Windows update.","briefOverview":"\u003cp\u003eMicrosoft is investigating a newly confirmed issue that prevents some third-party applications from launching Microsoft Office applications or opening Office documents on fully updated Windows systems. The problem appears after installing Windows updates released on or after June 9, 2026. Affected Office applications include Word, Excel, PowerPoint, Access, and other Microsoft Office apps.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue affects certain third-party applications that use OLE automation to interact with Office. In some cases, the Office application or document may fail to open without displaying an error message. Reported affected applications include CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and similar software.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has not yet released a fix, but said a resolution is in progress and will be included in a future Windows update. The company advised affected users to open Office apps or documents directly instead of launching them through the affected third-party applications. Enterprise customers can contact Microsoft Support for Business for a separate workaround that can be applied across an organization.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed it is investigating an issue affecting up-to-date Windows systems after the Windows updates released on or after June 9, 2026. The issue can stop third-party applications from launching Microsoft Office applications or opening Office documents. Microsoft described the problem in updated advisories and said it has received reports from affected users.\u003c/p\u003e\n\n\u003cp\u003eThe known issue affects Microsoft Office applications including Word, Excel, PowerPoint, Access, and other Office apps. The failures occur when Office applications or documents are launched from within certain third-party applications. Microsoft said that in some cases the affected Office application or document may fail to open without showing an error message.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft identified the technical trigger as involving third-party applications that use OLE automation to interact with Microsoft Office applications. The article cites user reports naming CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and other similar applications as impacted. The issue is therefore tied to how some external applications automate or invoke Office rather than to users opening Office directly.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has not yet provided a fix for the problem. As a workaround, the company advised affected customers to open Office apps or documents directly instead of launching them from impacted third-party applications. Microsoft also said enterprise customers can contact Microsoft Support for Business for a separate workaround that can be applied across an entire organization.\u003c/p\u003e\n\n\u003cp\u003eThe company said a resolution is in progress and will be included in a future Windows update, with more information to be shared when available. The article also notes that Microsoft has recently addressed other Office and Windows-related issues, including Office for the web file access problems, Windows 365 Office installation issues, WUSA installation failures, and a Windows Server 2025 BitLocker recovery bug.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is investigating a known issue that can prevent certain third-party applications from launching Microsoft Office applications or opening Office documents on up-to-date Windows systems. The problem occurs after installing Windows updates released on or after June 9, 2026. Microsoft confirmed the issue in updated advisories after receiving reports from affected users.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects Office applications including Word, Excel, PowerPoint, Access, and other Microsoft Office applications. The failure occurs when those Office applications or documents are opened from within affected third-party applications. Microsoft said that in some cases the Office application or document may fail to open without displaying an error message.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the issue affects certain third-party applications that use OLE automation to interact with Microsoft Office applications. OLE automation is the mechanism specifically cited in the article as the common factor among the affected third-party applications. The article does not describe a specific vulnerability, exploit, or security compromise.\u003c/p\u003e\n\n\u003cp\u003eThe reported behavior is that a third-party application attempts to launch an Office application or open a document, but the Office application or document may not open. Microsoft noted that the failure may occur silently, without an error message. This can make the issue appear as a failed launch rather than an explicit Office or Windows error.\u003c/p\u003e\n\n\u003ch2 id=\"affected-applications-and-parties\"\u003eAffected Applications and Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected Microsoft applications include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWord\u003c/li\u003e\n\u003cli\u003eExcel\u003c/li\u003e\n\u003cli\u003ePowerPoint\u003c/li\u003e\n\u003cli\u003eAccess\u003c/li\u003e\n\u003cli\u003eOther Microsoft Office applications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites user reports identifying several impacted third-party applications, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCCH Engagement\u003c/li\u003e\n\u003cli\u003eZotero\u003c/li\u003e\n\u003cli\u003eWorkpaper Manager\u003c/li\u003e\n\u003cli\u003eDentrix\u003c/li\u003e\n\u003cli\u003eSoftdent\u003c/li\u003e\n\u003cli\u003eOther similar applications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected parties are users and organizations that rely on these third-party applications to open Office applications or documents. Enterprise customers are specifically mentioned because Microsoft says they can contact Microsoft Support for Business for a separate organization-wide workaround.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe impact is operational disruption rather than a described security breach. Users may be unable to launch Office applications or open Office documents through affected third-party software after installing the relevant Windows updates. In some cases, the failure may happen without an error message, according to Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe issue is tied to systems that have installed Windows updates released on or after June 9, 2026. The article does not state that directly opening Office applications or documents is broken. Instead, Microsoft recommends direct opening as the current workaround.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft’s Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it is still working to resolve the issue and does not yet have a fix. The company advised affected customers to open Office applications or documents directly rather than launching them through affected third-party applications. Enterprise customers can contact Microsoft Support for Business for a separate workaround that can be deployed across an organization.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said a resolution is in progress and will be included in a future Windows update. The company said more information will be shared when it becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"related-microsoft-issues-mentioned\"\u003eRelated Microsoft Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes several other recent Microsoft issues and fixes. Microsoft recently addressed an issue that prevented users of Office for the web from opening Excel and PowerPoint files. It also addressed another issue that blocked Windows 365 users from downloading and installing the Office suite.\u003c/p\u003e\n\n\u003cp\u003eMore recently, Microsoft fixed a known issue that caused Windows updates released since May 2025 to fail when installed using the Windows Update Standalone Installer, or WUSA. The article also mentions a bug that caused Windows Server 2025 devices to boot into BitLocker recovery after installing the April 2026 security update.\u003c/p\u003e\n","keyPoints":["Microsoft is investigating an issue where certain third-party applications cannot launch Microsoft Office applications or open documents after installing Windows updates released on or after June 9, 2026.","The issue affects Office applications including Word, Excel, PowerPoint, Access, and other Microsoft Office apps when launched from impacted third-party applications.","Microsoft said the problem affects certain third-party applications that use OLE automation to interact with Microsoft Office applications, and the Office app or document may fail to open without an error message.","User reports identify affected third-party applications including CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and similar applications.","Microsoft advised affected users to open Office applications or documents directly as a workaround while it works on a resolution for a future Windows update."],"insights":["Because failures may occur without any error message, affected organizations may need to correlate Office launch problems with the June 9, 2026 or later Windows updates rather than relying on visible application errors.","The impact is concentrated in third-party applications that automate Office through OLE automation, making specialized business tools such as CCH Engagement, Zotero, Workpaper Manager, Dentrix, and Softdent especially relevant for triage.","Enterprise customers have an additional remediation path beyond the user-level workaround, as Microsoft says they can contact Microsoft Support for Business for a separate organization-wide workaround.","The available user workaround avoids the affected third-party launch path by opening Office applications or documents directly until Microsoft ships a fix in a future Windows update."],"referencedReports":[{"title":"June 9, 2026—KB5095051 (OS Build 28000.2269)","url":"https://support.microsoft.com/en-us/topic/june-9-2026-kb5095051-os-build-28000-2269-08941082-395f-4fb3-963e-5ca0ef067856","publisher":"Microsoft","context":"The article cites Microsoft’s updated advisory as the source confirming that Windows updates released on or after June 9, 2026 can prevent some third-party applications from launching Office apps or opening documents.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft is investigating a newly confirmed issue that prevents some third-party applications from launching Microsoft Office applications or opening Office documents on fully updated Windows systems. The problem appears after installing Windows updates released on or after June 9, 2026. Affected Office applications include Word, Excel, PowerPoint, Access, and other Microsoft Office apps.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue affects certain third-party applications that use OLE automation to interact with Office. In some cases, the Office application or document may fail to open without displaying an error message. Reported affected applications include CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and similar software.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has not yet released a fix, but said a resolution is in progress and will be included in a future Windows update. The company advised affected users to open Office apps or documents directly instead of launching them through the affected third-party applications. Enterprise customers can contact Microsoft Support for Business for a separate workaround that can be applied across an organization.\u003c/p\u003e\n"},{"n":4,"title":"Warner warns of CISA cuts, staffing gaps in letter to acting chief","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/warner-warns-of-cisa-cuts-staffing-shortages","time":"10:30","priority":"MAY READ","score":66,"tldr":"Sen. Mark Warner warned CISA’s acting director that major staff cuts, leadership vacancies, regional staffing gaps and loss of MS-ISAC funding are undermining the agency’s ability to support state and local critical infrastructure cybersecurity. He is pressing DHS and CISA for staffing, service-delivery and hiring details while urging renewed funding for the MS-ISAC.","briefOverview":"\u003cp\u003eSen. Mark Warner sent CISA Acting Director Nick Andersen a letter expressing alarm over widespread cuts at the Cybersecurity and Infrastructure Security Agency. Warner cited short-staffed regional divisions, high turnover, leadership vacancies, and the disbanding of the MS-ISAC information sharing and analysis center that supports state and local critical infrastructure operators. The article says the administration has cut about one-third of CISA’s staff and proposed more than $700 million in fiscal year 2027 budget cuts.\u003c/p\u003e\n\n\u003cp\u003eWarner said governors, mayors, state chief information officers, school leaders, law enforcement, cybersecurity experts, and other stakeholders have raised concerns about CISA’s ability to function. Industry leaders and state and local officials told his office they have seen reduced responsiveness and support from CISA. Andersen recently said CISA is hiring more than 300 workers and emphasized the importance of maintaining a ready cyber defense agency for the nation.\u003c/p\u003e\n\n\u003cp\u003eWarner asked CISA for detailed organizational charts, vacancy explanations, regional service metrics, and information on how many new hires will go to regional roles. He also wrote to DHS Secretary Markwayne Mullin urging DHS to prioritize CISA and fund the MS-ISAC. In addition, he sent letters to all 50 governors warning of risks to critical infrastructure in their states from the agency’s restructuring.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSen. Mark Warner sent a letter to CISA Acting Director Nick Andersen warning that cuts, staffing gaps, and leadership vacancies are weakening the agency. The article says Warner expressed alarm over short-staffed regional divisions and the disbanding of the MS-ISAC, which supports state and local critical infrastructure operators. Warner also pointed to the loss of about one-third of CISA’s staff and more than $700 million in proposed fiscal year 2027 budget cuts.\u003c/p\u003e\n\n\u003cp\u003eWarner’s concerns extend beyond CISA headquarters to the agency’s regional structure. The article says five of CISA’s 10 regional directors are serving in an acting capacity, and a regional website includes the misspelled name of one acting director. Warner also cited high turnover and persistent vacancies in CISA’s headquarters leadership.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the MS-ISAC funding dispute as a central part of Warner’s response. Warner introduced the Guaranteeing Universal Access to Cybersecurity Act to fund the MS-ISAC after former DHS Secretary Kristi Noem stopped paying for the program and blocked federal grant funding from being used by state and local governments to participate. Warner also wrote to DHS Secretary Markwayne Mullin to say DHS must prioritize CISA and pay for the MS-ISAC.\u003c/p\u003e\n\n\u003cp\u003eWarner said governors, mayors, city and county executives, state chief information officers, school district leaders, education advocates, law enforcement, and cybersecurity experts have expressed grave concern about CISA’s ability to function. Industry leaders and state and local officials told his office they have experienced reduced responsiveness and support from CISA. Warner said staffing turbulence has disrupted CISA’s service delivery and operations.\u003c/p\u003e\n\n\u003cp\u003eCISA Acting Director Nick Andersen recently announced that the agency is hiring more than 300 additional workers, with some already having started. In a speech, Andersen said CISA would continue making significant investments and said a ready and available cyber defense agency is critical. A CISA spokesperson said the agency does not reply to congressional correspondence in the press and works directly with Congress to address questions.\u003c/p\u003e\n\n\u003cp\u003eWarner asked CISA to provide organizational charts for regional offices and headquarters as of January 20, 2025, October 1, 2025, and currently, including vacancies and explanations for why individuals left. He also requested regional data on CISA security services, including vulnerability scans, risk assessments, incident response, inbound service requests, completed requests, and average response time. Warner further asked how many of the soon-to-be-hired employees are earmarked for regional jobs and what experience they have.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSen. Mark Warner sent CISA Acting Director Nick Andersen a letter expressing alarm about widespread cuts at the Cybersecurity and Infrastructure Security Agency. The letter focused on short-staffed regional divisions, high turnover, persistent vacancies, and the disbanding of an information sharing and analysis center that supports state and local critical infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eThe article says the administration has cut about one-third of CISA’s staff, with many laid-off workers coming from the agency’s senior staff. Warner also pointed to a proposed cut of more than $700 million in CISA’s fiscal year 2027 budget, which his letter said demonstrates “a dangerous underestimation of the threats facing our nation.”\u003c/p\u003e\n\n\u003ch2 id=\"ms-isac-funding-dispute\"\u003eMS-ISAC funding dispute\u003c/h2\u003e\n\n\u003cp\u003eA major focus of Warner’s concern is the MS-ISAC, an information sharing and analysis center that supports state and local critical infrastructure operators. Last week, Warner introduced legislation called the Guaranteeing Universal Access to Cybersecurity Act, which would fund the MS-ISAC.\u003c/p\u003e\n\n\u003cp\u003eThe article says Warner introduced the legislation after former DHS Secretary Kristi Noem stopped paying for the program and blocked federal grant funding from being used by state and local governments to participate. Warner also wrote a letter to DHS Secretary Markwayne Mullin underscoring that DHS must prioritize CISA and pay for the MS-ISAC.\u003c/p\u003e\n\n\u003cp\u003eWarner additionally sent letters to all 50 governors outlining risks he believes critical infrastructure in their states face as a result of the carving up of the agency.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact-on-cisa-operations\"\u003eReported impact on CISA operations\u003c/h2\u003e\n\n\u003cp\u003eWarner told Andersen that a wide range of stakeholders have expressed grave concern about CISA and its ability to function. Those stakeholders include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernors\u003c/li\u003e\n\u003cli\u003eMayors\u003c/li\u003e\n\u003cli\u003eCity and county executives\u003c/li\u003e\n\u003cli\u003eState chief information officers\u003c/li\u003e\n\u003cli\u003eSchool district leaders and education advocates\u003c/li\u003e\n\u003cli\u003eLaw enforcement\u003c/li\u003e\n\u003cli\u003eCybersecurity experts\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to Warner, industry leaders and state and local officials have told his office that they have seen reduced responsiveness and support from CISA. They also said staffing turbulence at CISA has disrupted the agency’s service delivery and operations.\u003c/p\u003e\n\n\u003ch2 id=\"leadership-and-staffing-gaps\"\u003eLeadership and staffing gaps\u003c/h2\u003e\n\n\u003cp\u003eThe article says five of CISA’s 10 regional directors are serving in an acting capacity. It also notes that a regional website includes the misspelled name of one acting director.\u003c/p\u003e\n\n\u003cp\u003eWarner also raised concerns about high turnover and persistent vacancies in CISA’s headquarters leadership. CISA has been without a permanent director since January 2025. Nominee Sean Plankey withdrew from consideration after senior senators blocked the vote for months.\u003c/p\u003e\n\n\u003cp\u003eNick Andersen took over as acting director in February and then faced a record-setting shutdown during which a large percentage of employees were furloughed. Officials have not commented on when they will select a nominee.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-s-response-and-hiring-plans\"\u003eCISA’s response and hiring plans\u003c/h2\u003e\n\n\u003cp\u003eAndersen recently announced that CISA is hiring more than 300 additional workers, with some already having started. In a speech last week, Andersen said CISA will “continue to make these significant investments as the secretary indicated to Congress just in these last couple of weeks.”\u003c/p\u003e\n\n\u003cp\u003eAndersen also said, “Making sure that we have a ready and available cyber defense agency for the nation is critical.”\u003c/p\u003e\n\n\u003cp\u003eA CISA spokesperson said the agency does not “reply to congressional correspondence in the press and works directly with Congress to address their questions.”\u003c/p\u003e\n\n\u003ch2 id=\"information-warner-requested-from-cisa\"\u003eInformation Warner requested from CISA\u003c/h2\u003e\n\n\u003cp\u003eWarner’s letter asked CISA to produce organizational charts for both regional offices and headquarters as they existed on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJanuary 20, 2025\u003c/li\u003e\n\u003cli\u003eOctober 1, 2025\u003c/li\u003e\n\u003cli\u003eThe current date\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHe asked that the charts include enumerated vacancies and explanations for why individuals left.\u003c/p\u003e\n\n\u003cp\u003eWarner also requested a regional breakdown of the “security services” CISA provided to state and local officials. The requested report must list:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVulnerability scans\u003c/li\u003e\n\u003cli\u003eRisk assessments\u003c/li\u003e\n\u003cli\u003eIncident response\u003c/li\u003e\n\u003cli\u003eThe number of inbound service requests received\u003c/li\u003e\n\u003cli\u003eHow many service requests were completed\u003c/li\u003e\n\u003cli\u003eAverage response time\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe letter also asks how many of CISA’s soon-to-be-hired employees are earmarked for regional jobs and what kind of experience those new hires possess.\u003c/p\u003e\n\n\u003ch2 id=\"significance-described-in-the-article\"\u003eSignificance described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Warner’s letters and legislative push as a response to concerns that CISA’s staffing reductions, budget cuts, leadership vacancies, and MS-ISAC funding changes are affecting the agency’s ability to support state and local cybersecurity needs. Warner’s requests focus on whether CISA can demonstrate adequate staffing, regional capacity, and service delivery for state and local officials and critical infrastructure operators.\u003c/p\u003e\n","keyPoints":["Sen. Mark Warner sent CISA Acting Director Nick Andersen a letter expressing alarm over widespread agency cuts, short-staffed regional divisions, and the disbanding of the MS-ISAC program supporting state and local critical infrastructure operators.","The article says the administration has cut about one-third of CISA’s staff and proposed more than $700 million in cuts to CISA’s fiscal year 2027 budget.","Warner said state and local officials, industry leaders, law enforcement, education advocates, and cybersecurity experts have reported reduced responsiveness and support from CISA amid staffing turbulence.","CISA Acting Director Nick Andersen recently announced that CISA is hiring more than 300 additional workers, with some already having started.","Warner asked CISA to provide organizational charts, vacancy explanations, regional service metrics, and details on how many new hires will be assigned to regional jobs and what experience they have."],"insights":["Warner is seeking service-delivery metrics by region, including vulnerability scans, risk assessments, incident response, inbound requests, completed requests, and average response times, indicating that CISA’s regional performance may be evaluated through measurable operational data rather than staffing levels alone.","The MS-ISAC funding dispute is affecting state and local governments on two fronts because DHS stopped paying for the program and also blocked federal grant funding from being used for participation.","CISA’s regional leadership instability is visible in public-facing materials, as five of 10 regional directors are acting officials and one acting director’s name is misspelled on a regional website.","The announced hiring of more than 300 CISA workers may not directly address Warner’s regional concerns unless a meaningful share of those hires are assigned to regional jobs with relevant experience."],"referencedReports":[],"body":"\u003cp\u003eSen. Mark Warner sent CISA Acting Director Nick Andersen a letter expressing alarm over widespread cuts at the Cybersecurity and Infrastructure Security Agency. Warner cited short-staffed regional divisions, high turnover, leadership vacancies, and the disbanding of the MS-ISAC information sharing and analysis center that supports state and local critical infrastructure operators. The article says the administration has cut about one-third of CISA’s staff and proposed more than $700 million in fiscal year 2027 budget cuts.\u003c/p\u003e\n\n\u003cp\u003eWarner said governors, mayors, state chief information officers, school leaders, law enforcement, cybersecurity experts, and other stakeholders have raised concerns about CISA’s ability to function. Industry leaders and state and local officials told his office they have seen reduced responsiveness and support from CISA. Andersen recently said CISA is hiring more than 300 workers and emphasized the importance of maintaining a ready cyber defense agency for the nation.\u003c/p\u003e\n\n\u003cp\u003eWarner asked CISA for detailed organizational charts, vacancy explanations, regional service metrics, and information on how many new hires will go to regional roles. He also wrote to DHS Secretary Markwayne Mullin urging DHS to prioritize CISA and fund the MS-ISAC. In addition, he sent letters to all 50 governors warning of risks to critical infrastructure in their states from the agency’s restructuring.\u003c/p\u003e\n"},{"n":6,"title":"The Top 10 Attack Surface Exposures in 2026","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-top-10-attack-surface-exposures-in.html","time":"10:30","priority":"MAY READ","score":63,"tldr":"Intruder’s analysis of 3,000 attack surfaces found that many organizations are exposing unnecessary internet-facing assets, including databases, admin panels, API docs, and legacy services. The key takeaway is that reducing what is publicly reachable is as important as patching, especially as exploitation timelines shrink.","briefOverview":"\u003cp\u003eIntruder analyzed 3,000 attack surfaces and found widespread exposure of services and information that the article says often have no reason to be publicly reachable. The findings are grouped into HTTP panels, risky ports and services, databases, and publicly accessible files and information. The article frames the issue as especially significant because time-to-exploit is now down to a single day.\u003c/p\u003e\n\n\u003cp\u003eThe most common exposures were exposed MySQL databases at 26%, exposed Postgres databases at 16%, exposed API documentation at 15%, and exposed WordPress admin panels at 15%. Remote Desktop Service ranked fifth at 11%, followed by SNMP, phpMyAdmin, UPnP, NTP, and RPC Portmapper. The article argues that for databases, admin panels, and legacy services, organizations should ask why they are reachable at all rather than focusing only on patching.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that exposed databases have long attracted opportunistic attackers, citing the PLEASE_READ_ME ransomware campaign against MySQL databases and similar issues affecting MongoDB and Elasticsearch. It also notes that API documentation ranked higher than RDP, which the authors found surprising. Legacy services such as SNMP, UPnP, NTP, and RPC are described as designed for internal networks and never meant to be internet-facing.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents findings from Intruder’s analysis of 3,000 attack surfaces to measure how much of a typical organization’s external footprint consists of services that the authors say have no reason to be exposed. It emphasizes that breaches do not always begin with zero-days and can start from exposed admin panels or reused credentials. It also cites MongoBleed as an example of how an unauthenticated vulnerability can immediately put internet-facing services at risk.\u003c/p\u003e\n\n\u003cp\u003eIntruder grouped the exposures into four categories: HTTP panels, risky ports and services, databases, and publicly accessible files and information. The analysis found that 60% of organizations had at least one HTTP panel exposed, 49% had a risky port or service exposed, 42% had a database reachable from the internet, and 30% had files or information publicly accessible that should not have been. Examples included admin consoles, management UIs, internal-tool login pages, API documentation, configuration files, and unintended public data.\u003c/p\u003e\n\n\u003cp\u003eThe top ten exposures were led by databases, with MySQL exposed at 26% and Postgres exposed at 16%. API documentation ranked third at 15%, WordPress admin panels also appeared at 15%, and Remote Desktop Service ranked fifth at 11%. Other top exposures included SNMP at 9%, phpMyAdmin at 8%, UPnP at 8%, NTP at 7%, and RPC Portmapper at 7%.\u003c/p\u003e\n\n\u003cp\u003eThe article states that internet-facing databases have long been targeted by opportunistic attackers. It cites the PLEASE_READ_ME ransomware campaign in 2020, which compromised more than 250,000 MySQL databases by brute-forcing weak credentials. It also says MongoDB and Elasticsearch have faced similar targeting.\u003c/p\u003e\n\n\u003cp\u003eAPI documentation is highlighted as a notable exposure because it ranked ahead of RDP. The article says some API documentation is intentionally public, but organizations often overlook documentation tied to private or admin-side APIs that was never meant to be discoverable. It also says public API documentation can turn otherwise hard-to-find vulnerabilities into documented attack paths.\u003c/p\u003e\n\n\u003cp\u003eRDP remains a concern because of its history as an initial access vector in ransomware attacks, with the article citing BlueKeep in 2019 and credential guessing against exposed RDP. The remaining services on the list, including SNMP, UPnP, NTP, and RPC, are described as legacy services designed for internal networks. The article concludes that attack surface reduction should receive more attention alongside vulnerability management.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIntruder analyzed 3,000 attack surfaces to assess how much of a typical organization’s attack surface consists of services and information that the article says have no reason to be publicly reachable. The findings are presented as part of the company’s 2026 Attack Surface Management Index.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central point is that many security risks come not only from unpatched vulnerabilities but from unnecessary internet exposure. It notes that exposed admin panels can be brute-forced, credentials can be reused from previous attacks, and newly disclosed vulnerabilities can immediately affect anything internet-facing.\u003c/p\u003e\n\n\u003cp\u003eThe article uses MongoBleed as an example of this risk, describing it as a vulnerability that allowed attackers to pull credentials and session tokens from server memory without authentication. It states that with time-to-exploit now down to a single day, organizations should ask why exposed services are reachable in the first place, not only how quickly they can be patched.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-analysis\"\u003eScope of the Analysis\u003c/h2\u003e\n\n\u003cp\u003eIntruder’s analysis covered 3,000 attack surfaces. The exposures were grouped into four broad categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHTTP panels\u003c/li\u003e\n\u003cli\u003eRisky ports and services\u003c/li\u003e\n\u003cli\u003eDatabases\u003c/li\u003e\n\u003cli\u003ePublicly accessible files and information\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these categories capture services, interfaces, and data that often have no business being exposed to the public internet.\u003c/p\u003e\n\n\u003ch2 id=\"overall-exposure-rates\"\u003eOverall Exposure Rates\u003c/h2\u003e\n\n\u003cp\u003eThe analysis found substantial exposure across organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e60% of organizations had at least one HTTP panel exposed.\u003c/li\u003e\n\u003cli\u003e49% had a risky port or service exposed.\u003c/li\u003e\n\u003cli\u003e42% had a database reachable directly from the internet.\u003c/li\u003e\n\u003cli\u003e30% had files or information publicly accessible that should not have been.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article gives examples of exposed HTTP panels, including admin consoles, management UIs, and login pages for internal tools. It also gives examples of publicly accessible files and information, including API documentation, configuration files, and data that was never intended to be discoverable.\u003c/p\u003e\n\n\u003ch2 id=\"ten-most-common-exposures\"\u003eTen Most Common Exposures\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the ten most common attack surface exposures affecting organizations in the past 12 months:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eMySQL Database Exposed — 26%\u003c/li\u003e\n\u003cli\u003ePostgres Database Exposed — 16%\u003c/li\u003e\n\u003cli\u003eAPI Documentation Exposed — 15%\u003c/li\u003e\n\u003cli\u003eWordPress Admin Panel Exposed — 15%\u003c/li\u003e\n\u003cli\u003eRemote Desktop Service Exposed — 11%\u003c/li\u003e\n\u003cli\u003eSNMP Service Exposed — 9%\u003c/li\u003e\n\u003cli\u003ephpMyAdmin Admin Panel Exposed — 8%\u003c/li\u003e\n\u003cli\u003eUPnP Service Exposed — 8%\u003c/li\u003e\n\u003cli\u003eNTP Service Exposed — 7%\u003c/li\u003e\n\u003cli\u003eRPC Portmapper Service Exposed — 7%\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe list is dominated by databases, administrative interfaces, documentation, remote access, and internal-network services.\u003c/p\u003e\n\n\u003ch2 id=\"database-exposure\"\u003eDatabase Exposure\u003c/h2\u003e\n\n\u003cp\u003eDatabases occupy the top two positions in the ranking. MySQL was exposed in 26% of organizations, and Postgres was exposed in 16%.\u003c/p\u003e\n\n\u003cp\u003eThe article states that internet-facing databases have long been a target for opportunistic attackers. It cites the PLEASE_READ_ME ransomware campaign in 2020, which compromised more than 250,000 MySQL databases by brute-forcing weak credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that MongoDB and Elasticsearch have faced the same kind of targeting. Its broader point is that databases directly reachable from the internet create exposure that attackers can exploit through weak credentials or newly disclosed vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"api-documentation-exposure\"\u003eAPI Documentation Exposure\u003c/h2\u003e\n\n\u003cp\u003eAPI documentation ranked third at 15%, which the article says was surprising because it placed ahead of RDP. The article acknowledges that some API documentation is intentionally public.\u003c/p\u003e\n\n\u003cp\u003eHowever, it says organizations frequently overlook documentation tied to private or admin-side APIs that were never meant to be discoverable. It adds that public API documentation can turn otherwise hard-to-find vulnerabilities into documented attack paths.\u003c/p\u003e\n\n\u003cp\u003eThis makes exposed API documentation an important attack surface issue in the article’s analysis, not merely an information-management concern.\u003c/p\u003e\n\n\u003ch2 id=\"admin-panels-and-remote-access\"\u003eAdmin Panels and Remote Access\u003c/h2\u003e\n\n\u003cp\u003eWordPress admin panels ranked fourth at 15%, and phpMyAdmin admin panels ranked seventh at 8%. The article places these exposures within the broader category of HTTP panels, including admin consoles, management interfaces, and login pages for internal tools.\u003c/p\u003e\n\n\u003cp\u003eRemote Desktop Service ranked fifth at 11%. The article describes RDP exposure as concerning because of its history as an initial access vector in ransomware attacks.\u003c/p\u003e\n\n\u003cp\u003eIt cites BlueKeep in 2019, saying it left nearly a million systems immediately exploitable. It also states that credential guessing against exposed RDP remains one of the most reliable ways ransomware operators get in.\u003c/p\u003e\n\n\u003ch2 id=\"legacy-and-internal-network-services\"\u003eLegacy and Internal-Network Services\u003c/h2\u003e\n\n\u003cp\u003eThe remaining services in the top ten include SNMP, UPnP, NTP, and RPC Portmapper. The article says these are legacy services designed for internal networks and were never meant to be internet-facing.\u003c/p\u003e\n\n\u003cp\u003eTheir presence in the top ten shows that the analyzed attack surfaces include not only web applications and databases but also infrastructure services. The article presents this as another reason organizations should focus on reducing what is reachable from the internet.\u003c/p\u003e\n\n\u003ch2 id=\"main-security-message\"\u003eMain Security Message\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that many teams treat patching as the priority, but for many items on the list, the better question is why they are reachable at all. This applies particularly to databases, admin panels, and legacy services.\u003c/p\u003e\n\n\u003cp\u003eThe article frames attack surface reduction as a necessary complement to vulnerability management. It says that for most organizations, attack surface reduction is not receiving the same attention as vulnerability management.\u003c/p\u003e\n\n\u003cp\u003eThe overall takeaway is that unnecessary exposure is itself a major security problem. Reducing publicly reachable services and information can help limit risk before vulnerabilities, brute-force attempts, or credential reuse become entry points.\u003c/p\u003e\n","keyPoints":["Intruder analyzed 3,000 attack surfaces and found that 60% of organizations had at least one HTTP panel exposed.","Nearly half of organizations had a risky port or service exposed, 42% had a database reachable directly from the internet, and 30% had files or information publicly accessible that should not have been.","The most common exposure was MySQL databases at 26%, followed by Postgres databases at 16%, API documentation at 15%, and WordPress admin panels at 15%.","API documentation ranked third among exposures, ahead of Remote Desktop Service, which ranked fifth at 11%.","The article states that services such as SNMP, UPnP, NTP, and RPC were designed for internal networks and were never meant to be internet-facing."],"insights":["The article argues that for many common exposures, the more effective control is not faster patching but removing unnecessary internet reachability altogether.","API documentation appearing ahead of RDP suggests that overlooked documentation for private or admin-side APIs may be a more common exposure than a historically prominent ransomware entry point.","The top two exposures being MySQL and Postgres indicates that directly internet-facing databases remain a widespread issue despite the long history of opportunistic attacks against exposed database services.","Legacy internal-network services such as SNMP, UPnP, NTP, and RPC appearing in the top ten shows that attack surface problems are not limited to web apps and databases but also include infrastructure services that should generally not be public."],"referencedReports":[],"body":"\u003cp\u003eIntruder analyzed 3,000 attack surfaces and found widespread exposure of services and information that the article says often have no reason to be publicly reachable. The findings are grouped into HTTP panels, risky ports and services, databases, and publicly accessible files and information. The article frames the issue as especially significant because time-to-exploit is now down to a single day.\u003c/p\u003e\n\n\u003cp\u003eThe most common exposures were exposed MySQL databases at 26%, exposed Postgres databases at 16%, exposed API documentation at 15%, and exposed WordPress admin panels at 15%. Remote Desktop Service ranked fifth at 11%, followed by SNMP, phpMyAdmin, UPnP, NTP, and RPC Portmapper. The article argues that for databases, admin panels, and legacy services, organizations should ask why they are reachable at all rather than focusing only on patching.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that exposed databases have long attracted opportunistic attackers, citing the PLEASE_READ_ME ransomware campaign against MySQL databases and similar issues affecting MongoDB and Elasticsearch. It also notes that API documentation ranked higher than RDP, which the authors found surprising. Legacy services such as SNMP, UPnP, NTP, and RPC are described as designed for internal networks and never meant to be internet-facing.\u003c/p\u003e\n"},{"n":8,"title":"Built for MSP SASE Growth: Introducing Netskope Catalyst Program","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/built-for-msp-sase-growth-introducing-netskope-catalyst-program","time":"12:55","priority":"MAY READ","score":44,"tldr":"Netskope introduced its Catalyst MSP/SP Program to help managed service providers onboard SASE customers faster, manage multi-tenant environments, and improve margins. The program includes tiered benefits, self-service tenant provisioning, training, support, pricing incentives, and go-to-market resources.","briefOverview":"\u003cp\u003eNetskope introduced the Catalyst MSP/SP Program, a partner program built to help managed service providers and service providers grow managed SSE and SASE businesses. The article says the program is designed around multi-customer operations, faster onboarding, scalable service delivery, and margin protection. It includes three partner tiers: Foundation, Ascent, and Summit.\u003c/p\u003e\n\n\u003cp\u003eA central component is Netskope Partner Orchestrator, which allows partners to create new customer tenants in under 15 minutes through a self-service portal. The tool also supports license portability across customers and granular multi-tenant access controls. The platform supports the full Netskope One SASE suite, including SD-WAN, secure web gateway, ZTNA, and AI security capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe program also includes tiered pricing benefits, 24×7 MSP support, training and accreditations, Market Development Funds, co-branded demand generation programs, service creation workshops, a unified partner portal, and deal protection for registered opportunities. Netskope frames Catalyst as a way for partners to respond to growing enterprise demand for single-vendor SASE platforms while operating profitably at scale.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNetskope announced the Catalyst MSP/SP Program for managed service providers and service providers working with managed SSE and SASE offerings. The article describes the program as a response to the operational challenges that follow new enterprise customer acquisition, including provisioning environments, configuring services, and onboarding users. Netskope says these processes have historically taken weeks before services go live.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the MSP market as growing quickly while enterprises increase cybersecurity spending and shift toward single-vendor SASE platforms. It cites Gartner’s prediction that by 2028, 50% of new SASE deployments will be based on a single-vendor platform, up from 30% in 2025. Netskope presents this as an opportunity for partners that can move quickly, operate at scale, and maintain workable economics.\u003c/p\u003e\n\n\u003cp\u003eCatalyst is organized around three partner tiers: Foundation, Ascent, and Summit. These tiers provide progressively greater benefits across six pillars, including onboarding, pricing and packaging, deployment and support, training, sales and marketing, and operations. The program is described as being built around the way service providers manage multiple customers simultaneously.\u003c/p\u003e\n\n\u003cp\u003eThe main technical component highlighted is Netskope Partner Orchestrator. The article says it enables partners to create new customer tenants in under 15 minutes through a self-service portal, while providing license portability across customers and granular multi-tenant access controls. It supports the full Netskope One SASE suite, allowing customers to begin with services such as SD-WAN, secure web gateway, and ZTNA, then expand into advanced capabilities such as AI security.\u003c/p\u003e\n\n\u003cp\u003eNetskope also describes several commercial and operational benefits for partners. These include no upfront financial commitments for crafting managed offerings, tiered programmatic discounts, included 24×7 MSP support, tiered Partner Assist Benefits, health checks through partner delivery meetings, expanded training and accreditations, Market Development Funds, co-branded demand generation programs, service creation workshops, a unified partner portal, and deal protection for registered opportunities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNetskope introduced the Catalyst MSP/SP Program, a program aimed at managed service providers and service providers delivering managed SSE and SASE services. The article presents Catalyst as a response to the operational burden that follows new enterprise customer acquisition, including provisioning environments, configuring services, and onboarding users.\u003c/p\u003e\n\n\u003cp\u003eNetskope says this post-sale process has historically taken weeks before a single security or networking service goes live. The company positions Catalyst as a way to reduce those delays and help partners operate across multiple customers at scale.\u003c/p\u003e\n\n\u003ch2 id=\"market-context\"\u003eMarket Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the MSP market is growing quickly and that enterprises are accelerating cybersecurity spending. It also says buyer preferences are shifting toward single-vendor SASE platforms that reduce operational complexity for customers.\u003c/p\u003e\n\n\u003cp\u003eNetskope cites Gartner’s prediction that by 2028, 50% of new SASE deployments will be based on a single-vendor platform, up from 30% in 2025. The article frames this as a significant opportunity for partners that can move quickly, scale operations, and maintain workable economics.\u003c/p\u003e\n\n\u003ch2 id=\"program-structure\"\u003eProgram Structure\u003c/h2\u003e\n\n\u003cp\u003eCatalyst is organized into three partner tiers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFoundation\u003c/li\u003e\n\u003cli\u003eAscent\u003c/li\u003e\n\u003cli\u003eSummit\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these tiers unlock progressively greater benefits across six pillars. The program is described as being engineered around how service providers run their businesses across multiple customers simultaneously, with attention to speed, renewals, and margins.\u003c/p\u003e\n\n\u003ch2 id=\"faster-onboarding-with-netskope-partner-orchestrator\"\u003eFaster Onboarding with Netskope Partner Orchestrator\u003c/h2\u003e\n\n\u003cp\u003eA central feature of the program is Netskope Partner Orchestrator. The article says partners can use it to create new customer tenants in under 15 minutes through a self-service portal.\u003c/p\u003e\n\n\u003cp\u003eNetskope Partner Orchestrator also provides:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLicense portability across customers\u003c/li\u003e\n\u003cli\u003eGranular multi-tenant access controls\u003c/li\u003e\n\u003cli\u003eSupport for complex, multi-customer environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the platform supports the full Netskope One SASE suite. Customers can start with core SASE services such as SD-WAN, secure web gateway, and ZTNA, then expand into advanced capabilities including AI security as their needs evolve.\u003c/p\u003e\n\n\u003cp\u003eNetskope describes this expansion path as a way to increase services per customer, deepen customer stickiness, and grow revenue over time without requiring a new sales motion.\u003c/p\u003e\n\n\u003ch2 id=\"pricing-and-packaging\"\u003ePricing and Packaging\u003c/h2\u003e\n\n\u003cp\u003eCatalyst includes flexible and predictable pricing and packaging for MSPs. The article says partners can begin crafting managed offerings with no upfront financial commitments.\u003c/p\u003e\n\n\u003cp\u003eProgrammatic discounts are tiered across the Foundation, Ascent, and Summit levels. Netskope also states that 24×7 MSP support is included without requiring add-ons.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-support\"\u003eDeployment and Support\u003c/h2\u003e\n\n\u003cp\u003eThe article says MSPs often lose deals on execution rather than technology, and it presents Catalyst as a way to address that gap. Partners receive tiered Partner Assist Benefits based on their program level.\u003c/p\u003e\n\n\u003cp\u003eNetskope also describes regular health checks through partner delivery meetings. These meetings are intended to keep service quality high and resolve issues quickly.\u003c/p\u003e\n\n\u003ch2 id=\"training-and-accreditation\"\u003eTraining and Accreditation\u003c/h2\u003e\n\n\u003cp\u003eCatalyst includes expanded training and accreditation options for partner teams. The article lists the following offerings:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSales Core\u003c/li\u003e\n\u003cli\u003eNetskope SASE Associate\u003c/li\u003e\n\u003cli\u003eNetskope SASE Specialist\u003c/li\u003e\n\u003cli\u003eNetskope SSE Professional\u003c/li\u003e\n\u003cli\u003eNetskope SD-WAN Professional\u003c/li\u003e\n\u003cli\u003eNetskope AI Security Professional\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTraining pathways include e-learning, instructor-led sessions, and hands-on labs. Netskope says these options allow partner teams to build expertise at their own pace and bring credibility to customer conversations.\u003c/p\u003e\n\n\u003ch2 id=\"sales-and-marketing-support\"\u003eSales and Marketing Support\u003c/h2\u003e\n\n\u003cp\u003eThe program includes Market Development Funds and co-branded demand generation programs. Netskope describes these as resources that help partners generate pipeline, increase market presence, and close deals faster.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes these resources as active growth tools rather than only fulfillment support.\u003c/p\u003e\n\n\u003ch2 id=\"operations-and-margin-protection\"\u003eOperations and Margin Protection\u003c/h2\u003e\n\n\u003cp\u003eCatalyst includes service creation workshops intended to help MSPs accelerate go-to-market strategies and build repeatable delivery frameworks. The program also provides a unified partner portal for centralized visibility and control across the partner lifecycle.\u003c/p\u003e\n\n\u003cp\u003eThe article says deal protection is applied to all registered opportunities. Netskope frames this as a way to reward partners that invest in building pipeline.\u003c/p\u003e\n\n\u003ch2 id=\"intended-impact-for-partners\"\u003eIntended Impact for Partners\u003c/h2\u003e\n\n\u003cp\u003eNetskope positions Catalyst as a program built around the realities of running managed SSE and SASE businesses at scale. The article emphasizes speed, economics, support structure, and go-to-market resources as core parts of the program.\u003c/p\u003e\n\n\u003cp\u003eThe program is described as suitable for partners at different stages, from Foundation partners starting with Netskope SASE to Summit partners managing hundreds of customers across multiple geographies. Netskope says the program meets partners where they are and grows with them.\u003c/p\u003e\n\n\u003ch2 id=\"how-to-learn-more\"\u003eHow to Learn More\u003c/h2\u003e\n\n\u003cp\u003eThe article directs readers to the Netskope Partner Portal for more information about the Netskope Catalyst MSP/SP Program and Netskope Partner Orchestrator. It also provides a contact email for local Netskope channel teams: netskope-msp@netskope.com.\u003c/p\u003e\n","keyPoints":["Netskope introduced the Catalyst MSP/SP Program to help service providers run managed SSE and SASE businesses across multiple customers at scale.","The program has three partner tiers, Foundation, Ascent, and Summit, which unlock progressively greater benefits across six pillars.","Netskope Partner Orchestrator allows partners to create new customer tenants in under 15 minutes through a self-service portal and provides license portability and granular multi-tenant access controls.","Catalyst includes tiered programmatic discounts, no upfront financial commitments for managed offerings, and 24×7 MSP support without required add-ons.","The program offers expanded training and accreditations, Market Development Funds, co-branded demand generation programs, service creation workshops, a unified partner portal, and deal protection for registered opportunities."],"insights":["Netskope is positioning speed of tenant creation as a competitive differentiator for MSPs, emphasizing that new customer environments can be created in under 15 minutes rather than taking weeks before services go live.","The program is designed to support expansion within existing customers by letting MSPs start with services such as SD-WAN, secure web gateway, and ZTNA, then add advanced capabilities like AI security without requiring a new sales motion.","Catalyst directly targets MSP margin pressure by combining no upfront financial commitments, tiered discounts, included 24×7 support, and deal protection for registered opportunities.","The program reflects a market shift toward single-vendor SASE platforms, citing Gartner’s prediction that 50% of new SASE deployments will use a single-vendor platform by 2028."],"referencedReports":[{"title":"2025 Gartner Magic Quadrant for SASE Platforms","url":"https://www.netskope.com/lp-2025-gartner-magic-quadrant-for-sase-platforms?utm_source=google\u0026utm_medium=paidsearch\u0026utm_campaign=EMEA-UK\u0026utm_agn=\u0026utm_content=763256708382\u0026utm_term=sase%20gartner%20magic%20quadrant\u0026campaignid=21389081497\u0026agroupid=172504982864\u0026utm_audience=kwd-1435562687272\u0026matchtype=p\u0026network=g\u0026device=c\u0026utm_placement=\u0026gad_source=1\u0026gad_campaignid=21389081497\u0026gbraid=0AAAAADqg7hOqjC98u_8MUsSFVl0u17byE\u0026gclid=Cj0KCQjw54nRBhDCARIsAMcY_SA_hfh-OmNeV6q6STDIqF1rYZcRcnP55cSYciGzEVaA7Roou-jGTpMaAryEEALw_wcB","publisher":"Gartner","context":"The article cites Gartner’s prediction that by 2028, 50% of new SASE deployments will be based on a single-vendor platform, up from 30% in 2025.","category":"","primary":false}],"body":"\u003cp\u003eNetskope introduced the Catalyst MSP/SP Program, a partner program built to help managed service providers and service providers grow managed SSE and SASE businesses. The article says the program is designed around multi-customer operations, faster onboarding, scalable service delivery, and margin protection. It includes three partner tiers: Foundation, Ascent, and Summit.\u003c/p\u003e\n\n\u003cp\u003eA central component is Netskope Partner Orchestrator, which allows partners to create new customer tenants in under 15 minutes through a self-service portal. The tool also supports license portability across customers and granular multi-tenant access controls. The platform supports the full Netskope One SASE suite, including SD-WAN, secure web gateway, ZTNA, and AI security capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe program also includes tiered pricing benefits, 24×7 MSP support, training and accreditations, Market Development Funds, co-branded demand generation programs, service creation workshops, a unified partner portal, and deal protection for registered opportunities. Netskope frames Catalyst as a way for partners to respond to growing enterprise demand for single-vendor SASE platforms while operating profitably at scale.\u003c/p\u003e\n"},{"n":5,"title":"Adversarial Exposure Validation Turns Security Visibility into Confident Prioritization","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/adversarial-exposure-validation-turns.html","time":"11:58","priority":"MAY READ","score":21,"tldr":"Security teams already have ample visibility into vulnerabilities, but the real challenge is validating which exposures are actually exploitable and business-critical. BreachLock argues that Adversarial Exposure Validation helps turn overwhelming findings into confident remediation priorities by combining realistic attack validation with human expertise.","briefOverview":"\u003cp\u003eThe article argues that many security teams no longer primarily struggle with visibility, because vulnerability scanners, cloud security posture tools, endpoint detection, attack surface platforms, code analysis, and threat intelligence feeds have expanded what organizations can see. The harder problem is validation: deciding which findings deserve attention first when teams face constant pressure, incomplete information, and finite remediation capacity. It frames this as a shift from discovering potential risks to determining which risks represent meaningful, exploitable exposure.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Adversarial Exposure Validation (AEV) as a way to convert security context into confidence. As described, AEV is a component of Continuous Threat Exposure Management that uses adversary simulation to test security controls, attack paths, and response readiness, while selectively using adversary emulation when deeper validation is needed. Its stated goal is not to create more alerts, but to determine which exposures are reachable, exploitable, and consequential in the organization’s environment.\u003c/p\u003e\n\n\u003cp\u003eThe article also addresses the role of AI, saying automation can help with discovery, scale, signal processing, pattern identification, and accelerated analysis. However, it states that AI cannot independently solve prioritization decisions that require business context, risk tolerance, operational dependencies, adversary behavior, and human expertise. The article concludes that confidence in prioritization is an operational security capability that helps teams focus remediation, communicate risk, and reduce exposure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a perspective piece from BreachLock about the move from security visibility to exposure validation. It says security teams have more findings than ever from scanners, cloud posture tools, endpoint detection, attack surface platforms, code analysis, threat intelligence feeds, automated tools, attack surface monitoring, and penetration testing services. The central challenge described is not discovering potential risks, but deciding which findings warrant action first. The article argues that improved visibility has not automatically produced improved security outcomes.\u003c/p\u003e\n\n\u003cp\u003eThe piece cites the 2025 Verizon Data Breach Investigations Report as highlighting that exploitation of vulnerabilities remains a leading initial access vector and that remediation timelines can be measured in days, weeks, or years. It uses this point to support the argument that organizations are discovering more issues while also being asked to evaluate and prioritize more. According to the article, each new finding competes with existing findings for limited attention, resources, and remediation cap
