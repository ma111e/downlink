<script>
window.__DL_ARTICLES = [{"n":10,"title":"Mastra npm Scope Takeover: 140+ Packages Compromised via easy-day-js Dropper","source":"mend.io","sourceColorIdx":0,"link":"https://www.mend.io/blog/mastra-npm-scope-takeover-easy-day-js/","time":"10:32","priority":"MUST READ","score":95,"tldr":"An attacker compromised the @mastra npm scope by republishing 140+ packages with a malicious easy-day-js dependency that runs a postinstall dropper to steal secrets and crypto wallets. Any machine or CI system that installed affected packages should be treated as fully compromised, cleaned for persistence, and have credentials rotated.","briefOverview":"\u003cp\u003eAn attacker republished more than 140 packages in the \u003ccode\u003e@mastra\u003c/code\u003e npm scope, each with a malicious dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e. The compromised versions were observed on 2026-06-17. Installing any affected \u003ccode\u003e@mastra\u003c/code\u003e package caused npm to resolve \u003ccode\u003eeasy-day-js\u003c/code\u003e to version \u003ccode\u003e1.11.22\u003c/code\u003e, which contained an obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because Mastra is described as a widely adopted TypeScript framework for building AI agents and applications, and its users often hold cloud keys, LLM provider keys, database credentials, and source-control tokens. Mend records over 20 million downloads for \u003ccode\u003e@mastra/core\u003c/code\u003e and over 19 million for \u003ccode\u003e@mastra/schema-compat\u003c/code\u003e. The article states that any project auto-updating these packages is in scope.\u003c/p\u003e\n\n\u003cp\u003eThe malicious \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e package downloaded a second-stage Node.js payload from \u003ccode\u003e23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e and launched it as a detached, hidden process. The second stage communicated with \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e, harvested environment secrets and cryptocurrency wallet data, and installed persistence across macOS, Linux, and Windows. The article recommends treating any machine that installed an affected package as fully compromised.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAn attacker obtained publish access to the \u003ccode\u003e@mastra\u003c/code\u003e npm scope and republished more than 140 packages with one added dependency, \u003ccode\u003eeasy-day-js\u003c/code\u003e. The affected versions were observed on 2026-06-17. The carrier \u003ccode\u003e@mastra\u003c/code\u003e packages were not described as having modified application source; the functional change was the injected dependency and a version bump.\u003c/p\u003e\n\n\u003cp\u003eThe attack depended on the dependency declaration \u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e. Version \u003ccode\u003e1.11.21\u003c/code\u003e of \u003ccode\u003eeasy-day-js\u003c/code\u003e was described as a clean prior release with no install hook, while version \u003ccode\u003e1.11.22\u003c/code\u003e added an obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper. Because npm resolves caret ranges to the newest matching version at install time, fresh installs pulled the malicious \u003ccode\u003e1.11.22\u003c/code\u003e release.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003epostinstall\u003c/code\u003e hook executed \u003ccode\u003enode setup.cjs --no-warnings\u003c/code\u003e, causing the dropper to run automatically during installation. The dropper disabled TLS certificate verification by setting \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e, wrote marker files in the OS temp directory, fetched a second-stage payload from \u003ccode\u003ehxxps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e, and staged it as a randomly named 24-hex-character \u003ccode\u003e.js\u003c/code\u003e file. It then launched the payload with Node as a detached, hidden background process and passed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as the second-stage C2 address.\u003c/p\u003e\n\n\u003cp\u003eThe second stage is described as a remote-access tool that harvests sensitive credentials and cryptocurrency-wallet data from the host and exfiltrates them to its C2. Targeted data included environment secrets such as \u003ccode\u003eOPENAI_API_KEY\u003c/code\u003e, \u003ccode\u003eANTHROPIC_API_KEY\u003c/code\u003e, \u003ccode\u003eGOOGLE_API_KEY\u003c/code\u003e, AWS keys, Azure tenant information, GitHub and npm tokens, and database connection strings. It also scanned browser wallet extensions including MetaMask, Phantom, Solflare, Coinbase Wallet, OKX, and Keplr in Chrome, Brave, and Edge.\u003c/p\u003e\n\n\u003cp\u003eThe article lists persistence artifacts for macOS, Linux, and Windows, including \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e, \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e, and \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e. Remediation guidance includes removing persistence artifacts before rotating tokens, blocking \u003ccode\u003e23[.]254[.]164[.]92\u003c/code\u003e and \u003ccode\u003e23[.]254[.]164[.]123\u003c/code\u003e, auditing lockfiles and dependency trees, and searching for temp-directory artifacts. Mend.io issued advisories \u003ccode\u003eMSC-2026-6172\u003c/code\u003e and \u003ccode\u003eMSC-2026-6173\u003c/code\u003e covering the affected packages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAn attacker republished more than 140 packages in the \u003ccode\u003e@mastra\u003c/code\u003e npm scope, each carrying a single malicious dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e. The malicious versions were observed on 2026-06-17. The article describes this as a scope takeover in which publish access to the trusted \u003ccode\u003e@mastra\u003c/code\u003e scope allowed the attacker to fan out one malicious dependency across many packages.\u003c/p\u003e\n\n\u003cp\u003eMastra is described as a widely adopted TypeScript framework for building AI agents and applications. Its scope includes the \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e entry points, \u003ccode\u003e@mastra/core\u003c/code\u003e, database and vector connectors, auth integrations, deployers, and provider SDKs. The article emphasizes that developers using this framework often hold high-value secrets, including cloud keys, LLM provider keys, database credentials, and source-control tokens.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-incident-matters\"\u003eWhy the Incident Matters\u003c/h2\u003e\n\n\u003cp\u003eThe affected packages are described as heavily used. Mend records over 20 million downloads for \u003ccode\u003e@mastra/core\u003c/code\u003e and over 19 million downloads for \u003ccode\u003e@mastra/schema-compat\u003c/code\u003e. The article states that any project that auto-updates these packages is in scope.\u003c/p\u003e\n\n\u003cp\u003eThe attack did not require malicious application code to be inserted into each \u003ccode\u003e@mastra\u003c/code\u003e package. Instead, each compromised release differed from its clean predecessor by a single functional change: an added dependency on \u003ccode\u003eeasy-day-js\u003c/code\u003e. This design meant the malicious code lived in the dependency, while the carrier packages could appear clean to per-package scanning.\u003c/p\u003e\n\n\u003ch2 id=\"initial-attack-vector\"\u003eInitial Attack Vector\u003c/h2\u003e\n\n\u003cp\u003eThe payload reached victim machines through normal npm dependency resolution. The attacker added the following dependency pattern to compromised \u003ccode\u003e@mastra\u003c/code\u003e packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies \u003ccode\u003eeasy-day-js\u003c/code\u003e as a typosquat of the \u003ccode\u003edayjs\u003c/code\u003e date library. Version \u003ccode\u003e1.11.21\u003c/code\u003e of \u003ccode\u003eeasy-day-js\u003c/code\u003e was a clean prior release with no install hook. Version \u003ccode\u003e1.11.22\u003c/code\u003e added the malicious obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper.\u003c/p\u003e\n\n\u003cp\u003eThe caret range was central to the attack. Because npm resolves \u003ccode\u003e^1.11.21\u003c/code\u003e to the newest matching version at install time, a fresh install of any affected \u003ccode\u003e@mastra\u003c/code\u003e package pulled \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e even though the declared version range referenced the clean \u003ccode\u003e1.11.21\u003c/code\u003e line.\u003c/p\u003e\n\n\u003ch2 id=\"stage-1-postinstall-execution\"\u003eStage 1: Postinstall Execution\u003c/h2\u003e\n\n\u003cp\u003eThe malicious \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e package added a lifecycle script to its \u003ccode\u003epackage.json\u003c/code\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epostinstall\u003c/code\u003e: \u003ccode\u003enode setup.cjs --no-warnings\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis script ran automatically when the package was installed. The \u003ccode\u003e--no-warnings\u003c/code\u003e flag suppressed Node runtime warnings so that unusual behavior would not appear in install output. The executed file, \u003ccode\u003esetup.cjs\u003c/code\u003e, acted as the dropper.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-dropper-behavior\"\u003eStage 2: Dropper Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe \u003ccode\u003esetup.cjs\u003c/code\u003e dropper was obfuscated with \u003ccode\u003ejavascript-obfuscator\u003c/code\u003e. The article describes several obfuscation details, including a rotated 40-entry string array, a custom-alphabet base64 decoder, and an XOR-encoded byte array that reconstructed the marker string \u003ccode\u003eeasy-day-js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAfter deobfuscation, the dropper performed a short sequence of actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt disabled TLS certificate verification by setting \u003ccode\u003eprocess.env.NODE_TLS_REJECT_UNAUTHORIZED = '0'\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt wrote two marker files into the OS temp directory.\u003c/li\u003e\n\u003cli\u003eIt fetched a second-stage payload from \u003ccode\u003ehxxps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt wrote the downloaded payload to a randomly named 24-hex-character \u003ccode\u003e.js\u003c/code\u003e file in the OS temp directory.\u003c/li\u003e\n\u003cli\u003eIt launched the payload with the installer’s Node binary as a detached, hidden background process.\u003c/li\u003e\n\u003cli\u003eIt passed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as the second-stage C2 argument.\u003c/li\u003e\n\u003cli\u003eIt deleted \u003ccode\u003esetup.cjs\u003c/code\u003e from disk after spawning the second stage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe dropper also wrote \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e, containing the package install path, and \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e, containing \u003ccode\u003eeasy-day-js\u003c/code\u003e stored as an XOR-0x80 byte sequence.\u003c/p\u003e\n\n\u003ch2 id=\"stage-3-second-stage-payload\"\u003eStage 3: Second-Stage Payload\u003c/h2\u003e\n\n\u003cp\u003eThe dropper downloaded the second stage at install time rather than embedding it in the npm package. The article states that this allowed the operator to update or replace the second stage remotely. The second stage was a Node.js script staged in the OS temp directory and launched using the installer’s own Node binary.\u003c/p\u003e\n\n\u003cp\u003eThe second stage ran as a detached and hidden process, allowing the npm install process to finish while the malware continued running. It inherited the disabled TLS setting and communicated with \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e without certificate validation.\u003c/p\u003e\n\n\u003cp\u003eFunctionally, the article describes the second stage as a remote-access tool. It harvested sensitive credentials and cryptocurrency wallet data from the host, exfiltrated them to the C2, and could receive follow-up commands.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-data\"\u003eTargeted Data\u003c/h2\u003e\n\n\u003cp\u003eThe article lists targeted environment variables and credential types, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eOPENAI_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eANTHROPIC_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGOOGLE_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_ACCESS_KEY_ID\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_SECRET_ACCESS_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAZURE_TENANT_ID\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eNPM_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDatabase connection strings\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also lists targeted wallet extensions scanned in Chrome, Brave, and Edge:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMetaMask\u003c/li\u003e\n\u003cli\u003ePhantom\u003c/li\u003e\n\u003cli\u003eSolflare\u003c/li\u003e\n\u003cli\u003eCoinbase Wallet\u003c/li\u003e\n\u003cli\u003eOKX\u003c/li\u003e\n\u003cli\u003eKeplr\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"persistence-and-durability\"\u003ePersistence and Durability\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies two factors that made the compromise durable. First, the second stage was delivered at runtime from attacker-controlled infrastructure rather than embedded in the published npm package. Second, the detached, hidden launch behavior and the use of \u003ccode\u003ewindowsHide\u003c/code\u003e showed the payload was built to run unattended across platforms, including Windows.\u003c/p\u003e\n\n\u003cp\u003ePersistence artifacts listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003emacOS: \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003emacOS: \u003ccode\u003e~/Library/NodePackages/protocal.cjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLinux: \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLinux: \u003ccode\u003e~/.config/NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWindows: \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that any machine that installed an affected package should be treated as fully compromised.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003ch3 id=\"network-indicators\"\u003eNetwork Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eStage-one URL: \u003ccode\u003ehxxps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eStage-one C2: \u003ccode\u003e23[.]254[.]164[.]92\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eStage-two C2: \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCampaign ID: \u003ccode\u003e49890878\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"filesystem-indicators\"\u003eFilesystem Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/^[0-9a-f]{24}\\.js$\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eRuntime flag: \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003emacOS persistence: \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e, \u003ccode\u003e~/Library/NodePackages/protocal.cjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLinux persistence: \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e, \u003ccode\u003e~/.config/NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWindows persistence: \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"package-indicators\"\u003ePackage Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMalicious package: \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eClean bait package: \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eInjected dependency: \u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e1.11.22\u003c/code\u003e tarball SHA256: \u003ccode\u003e4a8860240e4231c3a74c81949be655a28e096a7d72f38fbe84e5b37636b98417\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e1.11.21\u003c/code\u003e tarball SHA256: \u003ccode\u003eae70dd4f6bc0d1c8c2848e4e6b51934626c4818dcb5af99d080ddbd7dc337185\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-remediation-guidance\"\u003eDetection and Remediation Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends removing persistence artifacts before rotating tokens. It specifically advises checking for and deleting the macOS LaunchAgent, Linux systemd user service, and Windows \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e payload listed in the filesystem indicators.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends blocking the C2 infrastructure at DNS and HTTPS proxy layers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]92\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]123\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor exposure identification, the article recommends auditing lockfiles, dependency trees, and install logs for any resolved \u003ccode\u003eeasy-day-js\u003c/code\u003e package and for \u003ccode\u003e@mastra/*\u003c/code\u003e versions carrying the injected dependency. It also recommends searching for \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e, \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e, and randomly named 24-hex \u003ccode\u003e.js\u003c/code\u003e files in the temp directory.\u003c/p\u003e\n\n\u003cp\u003eFor credential recovery, the article recommends rotating every credential reachable from any machine or CI runner that installed an affected package, including cloud keys, LLM provider keys, database credentials, npm tokens, and GitHub tokens. As durable defenses, it recommends pinning versions and installing with \u003ccode\u003e--ignore-scripts\u003c/code\u003e, because the campaign abused a caret range on a freshly published transitive dependency and depended on lifecycle script execution.\u003c/p\u003e\n\n\u003ch2 id=\"mend-io-coverage\"\u003eMend.io Coverage\u003c/h2\u003e\n\n\u003cp\u003eMend.io issued two MSC advisories covering all affected packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eMSC-2026-6172\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eMSC-2026-6173\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe campaign used publish access to a trusted npm scope to turn more than 140 packages into carriers for a single malicious dependency. The malicious execution path depended on npm dependency resolution, a typosquatted package, and an automatic \u003ccode\u003epostinstall\u003c/code\u003e lifecycle script. The article concludes that the separation of carrier packages and payload allowed the attacker to reach machines likely to contain high-value cloud, AI, and source-control secrets while the \u003ccode\u003e@mastra\u003c/code\u003e packages themselves appeared largely clean.\u003c/p\u003e\n","keyPoints":["An attacker republished more than 140 packages in the @mastra npm scope with a single added dependency, easy-day-js, and the malicious versions were observed on 2026-06-17.","The easy-day-js package version 1.11.22 added an obfuscated postinstall dropper, while version 1.11.21 was a clean prior release with no install hook.","Installing an affected @mastra package resolves easy-day-js ^1.11.21 to the malicious 1.11.22 version, causing the postinstall script to run automatically during installation.","The dropper downloads a second-stage Node.js payload from 23.254.164.92:8000/update/49890878 and launches it as a detached, hidden process that communicates with 23.254.164.123:443.","The second stage harvests environment secrets and cryptocurrency wallet data, and the article says any machine that installed an affected package should be treated as fully compromised."],"insights":["The compromised @mastra packages could appear clean to per-package source scanning because the attacker changed only package metadata by adding the easy-day-js dependency and did not modify the application source in the carrier packages.","The caret dependency range \"^1.11.21\" made the clean easy-day-js 1.11.21 release part of the trap because fresh installs resolved to the malicious 1.11.22 release at install time.","The dropper disabled TLS certificate verification with NODE_TLS_REJECT_UNAUTHORIZED=0 before spawning the second stage, allowing the attacker’s infrastructure to use an invalid certificate without interrupting execution.","The article recommends removing persistence artifacts before rotating tokens because a still-persistent second stage could otherwise capture newly rotated credentials.","Disabling npm lifecycle scripts with --ignore-scripts would block this campaign’s execution path because the malicious code depended on an automatic postinstall hook."],"referencedReports":[],"body":"\u003cp\u003eAn attacker republished more than 140 packages in the \u003ccode\u003e@mastra\u003c/code\u003e npm scope, each with a malicious dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e. The compromised versions were observed on 2026-06-17. Installing any affected \u003ccode\u003e@mastra\u003c/code\u003e package caused npm to resolve \u003ccode\u003eeasy-day-js\u003c/code\u003e to version \u003ccode\u003e1.11.22\u003c/code\u003e, which contained an obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because Mastra is described as a widely adopted TypeScript framework for building AI agents and applications, and its users often hold cloud keys, LLM provider keys, database credentials, and source-control tokens. Mend records over 20 million downloads for \u003ccode\u003e@mastra/core\u003c/code\u003e and over 19 million for \u003ccode\u003e@mastra/schema-compat\u003c/code\u003e. The article states that any project auto-updating these packages is in scope.\u003c/p\u003e\n\n\u003cp\u003eThe malicious \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e package downloaded a second-stage Node.js payload from \u003ccode\u003e23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e and launched it as a detached, hidden process. The second stage communicated with \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e, harvested environment secrets and cryptocurrency wallet data, and installed persistence across macOS, Linux, and Windows. The article recommends treating any machine that installed an affected package as fully compromised.\u003c/p\u003e\n"},{"n":1,"title":"CISA orders feds to patch max severity Joomla plugin flaw by Friday","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-orders-feds-to-patch-max-severity-joomla-plugin-flaw-by-friday/","time":"10:09","priority":"MUST READ","score":93,"tldr":"CISA has ordered U.S. federal agencies to patch an actively exploited maximum-severity Joomla Content Editor plugin flaw, CVE-2026-48907, by Friday. The bug allows unauthenticated attackers to upload and execute PHP code, and sites compromised before patching must be cleaned manually.","briefOverview":"\u003cp\u003eCISA has ordered U.S. federal agencies to patch CVE-2026-48907, a maximum-severity flaw in the Widget Factory Joomla Content Editor plugin that is being actively exploited in the wild. The order applies to Federal Civilian Executive Branch agencies and requires them to secure affected systems by Friday under Binding Operational Directive 26-04. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog on Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is an improper access control issue that can allow unauthenticated attackers to upload and execute PHP code. It affects Joomla deployments using the JCE WYSIWYG editor plugin, and CISA warned that this type of flaw is a frequent attack vector that poses significant risk to the federal enterprise. The JCE security team said exploit code is public and attacks are automated, meaning sites without public registration are still not safe.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team fixed the issue in JCE Pro 2.9.99.6 and urged users to update immediately. It also warned that patching only closes the entry point and does not clean sites that were already compromised. Administrators of affected sites are advised to preserve rogue profiles for investigation, update, delete attacker-created profiles, change passwords, and run a full server-side malware scan.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has ordered U.S. Federal Civilian Executive Branch agencies to patch CVE-2026-48907, a maximum-severity vulnerability in the Widget Factory Joomla Content Editor plugin. The agency added the flaw to its Known Exploited Vulnerabilities Catalog on Tuesday and set a Friday deadline for agencies to secure affected systems. The requirement is tied to Binding Operational Directive 26-04, which directs agencies to prioritize remediation based on exploitation risk.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects Joomla deployments using the JCE WYSIWYG editor plugin. CISA described it as an improper access control vulnerability that could allow unauthenticated users to create new editor profiles and upload and execute PHP code. The article states that attackers can exploit it without privileges through low-complexity attacks.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team addressed the vulnerability in early June with the release of JCE Pro 2.9.99.6. It warned users to patch immediately because the flaw is actively exploited, working exploit code is public, and attacks are automated. The team specifically said that a site with no public registration is not safe.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify any named threat actor behind the exploitation. It refers generally to threat actors and malicious cyber actors exploiting the issue in the wild. The disclosed impact is potential code execution on Joomla sites using the affected plugin.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team emphasized that updating only closes the entry point and does not remove attacker artifacts from already compromised sites. It advised administrators to back up rogue profiles for investigation, update to JCE 2.9.99.6 or later, delete the attacker’s profile, change all relevant passwords, and run a full server-side malware scan. CISA also instructed stakeholders to evaluate internet exposure, follow BOD 26-04 guidance for cloud services, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA has ordered U.S. federal agencies to patch CVE-2026-48907, a maximum-severity vulnerability in the Widget Factory Joomla Content Editor plugin. The vulnerability is being actively exploited in the wild and affects Joomla deployments that use the JCE WYSIWYG editor plugin.\u003c/p\u003e\n\n\u003cp\u003eCISA added the flaw to its Known Exploited Vulnerabilities Catalog on Tuesday. Under Binding Operational Directive 26-04, Federal Civilian Executive Branch agencies must secure affected systems by Friday.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-48907 is described by CISA as an improper access control vulnerability in the Widget Factory Joomla Content Editor. According to the article, the flaw can allow unauthenticated users to create new editor profiles and upload and execute PHP code.\u003c/p\u003e\n\n\u003cp\u003eThe article states that threat actors can exploit the vulnerability without privileges. It also describes the attacks as low-complexity and capable of achieving code execution against Joomla deployments using the vulnerable JCE plugin.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is actively exploited in the wild. The JCE security team warned that working exploit code is public and that the attacks are automated.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team also stated that sites with no public registration are not safe. This is because the vulnerability can allow unauthenticated users to create new editor profiles.\u003c/p\u003e\n\n\u003cp\u003eNo named threat actor or group is identified in the article. The activity is attributed generally to threat actors and malicious cyber actors.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-products\"\u003eAffected Parties and Products\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is the Widget Factory Joomla Content Editor, also referred to as the JCE WYSIWYG editor plugin for Joomla. The article specifically references JCE Pro and says the issue was addressed in JCE Pro 2.9.99.6.\u003c/p\u003e\n\n\u003cp\u003eAffected parties include Joomla site administrators using the vulnerable plugin and U.S. Federal Civilian Executive Branch agencies with impacted systems. CISA’s directive applies to federal agencies, but the JCE security team’s warning is directed broadly at users of the plugin.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response\"\u003eVendor Response\u003c/h2\u003e\n\n\u003cp\u003eThe JCE security team addressed the vulnerability in early June with the release of JCE Pro 2.9.99.6. It urged users who had not updated to do so immediately.\u003c/p\u003e\n\n\u003cp\u003eThe team also emphasized that updating does not clean a site that was already compromised. It said the update closes the entry point but does not remove anything an attacker may have left behind.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-remediation\"\u003eRecommended Remediation\u003c/h2\u003e\n\n\u003cp\u003eFor compromised sites, the JCE security team advised administrators to take several recovery steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBack up rogue profiles for further investigation.\u003c/li\u003e\n\u003cli\u003eUpdate to JCE 2.9.99.6 or later.\u003c/li\u003e\n\u003cli\u003eDelete the attacker’s profile.\u003c/li\u003e\n\u003cli\u003eChange all passwords, including the administrator account, the site database, and the hosting account.\u003c/li\u003e\n\u003cli\u003eRun a full server-side malware scan to confirm that no other malicious tools or implants were planted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese steps distinguish between patching the vulnerability and cleaning up an existing compromise. The article explicitly states that patching alone will not remove attacker artifacts left before the update.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-directive-and-federal-requirements\"\u003eCISA Directive and Federal Requirements\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered Federal Civilian Executive Branch agencies to secure affected systems by Friday. The order falls under Binding Operational Directive 26-04, which was issued the previous Wednesday.\u003c/p\u003e\n\n\u003cp\u003eThe directive requires U.S. government agencies to prioritize patching based on each vulnerability’s risk of exploitation. The article lists key risk factors including whether a vulnerability is in CISA’s Known Exploited Vulnerabilities Catalog, whether vulnerable assets are publicly exposed online, whether exploitation can be automated for large-scale attacks, and whether exploitation grants attackers partial or total control of the targeted system.\u003c/p\u003e\n\n\u003cp\u003eCISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. It also instructed stakeholders to follow applicable BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n","keyPoints":["CISA ordered U.S. Federal Civilian Executive Branch agencies to secure systems affected by CVE-2026-48907 by Friday under Binding Operational Directive 26-04.","CVE-2026-48907 is a maximum-severity improper access control vulnerability in the Widget Factory Joomla Content Editor plugin that can allow unauthenticated attackers to upload and execute PHP code.","The JCE security team fixed the vulnerability in JCE Pro 2.9.99.6 and warned that it is actively exploited, public exploit code is available, and attacks are automated.","The JCE security team said updating closes the entry point but does not clean sites that were compromised before patching.","Users of compromised sites are advised to back up rogue profiles, update to JCE 2.9.99.6 or later, delete the attacker’s profile, change all passwords, and run a full server-side malware scan."],"insights":["Sites with public registration disabled are still at risk because the exploit can create new editor profiles for unauthenticated users and attacks are automated.","Patching to JCE 2.9.99.6 or later only closes the entry point, so administrators must separately investigate and remove any attacker-created profiles or implants left before the update.","The recommended recovery steps extend beyond Joomla itself, requiring password changes for the administrator account, site database, and hosting account, plus a full server-side malware scan.","CISA’s deadline reflects BOD 26-04’s risk-based prioritization, where known exploitation, public exposure, automation potential, and attacker control influence how quickly agencies must remediate."],"referencedReports":[{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-48907","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-48907","publisher":"CISA","context":"The article cites CISA's KEV Catalog entry warning that the Joomla Content Editor flaw is actively exploited and requires remediation.","category":"","primary":false},{"title":"JCE Security Update and a Free Patch for Older Sites","url":"https://www.joomlacontenteditor.net/news/jce-security-update-and-a-free-patch-for-older-sites","publisher":"JCE Security Team","context":"The article references the JCE security team's warning that the vulnerability is actively exploited, public exploit code exists, and patching does not clean already compromised sites.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/16/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert announcing the addition of CVE-2026-48907 to its Known Exploited Vulnerabilities Catalog.","category":"","primary":false}],"body":"\u003cp\u003eCISA has ordered U.S. federal agencies to patch CVE-2026-48907, a maximum-severity flaw in the Widget Factory Joomla Content Editor plugin that is being actively exploited in the wild. The order applies to Federal Civilian Executive Branch agencies and requires them to secure affected systems by Friday under Binding Operational Directive 26-04. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog on Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is an improper access control issue that can allow unauthenticated attackers to upload and execute PHP code. It affects Joomla deployments using the JCE WYSIWYG editor plugin, and CISA warned that this type of flaw is a frequent attack vector that poses significant risk to the federal enterprise. The JCE security team said exploit code is public and attacks are automated, meaning sites without public registration are still not safe.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team fixed the issue in JCE Pro 2.9.99.6 and urged users to update immediately. It also warned that patching only closes the entry point and does not clean sites that were already compromised. Administrators of affected sites are advised to preserve rogue profiles for investigation, update, delete attacker-created profiles, change passwords, and run a full server-side malware scan.\u003c/p\u003e\n"},{"n":9,"title":"From Stars to Upvotes: Fake Reputation Fueling a Crypto Clipboard Hijacker","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/from-stars-to-upvotes-fake-reputation-fueling-a-crypto-clipboard-hijacker/","time":"13:38","priority":"MUST READ","score":90,"tldr":"Check Point researchers found a Rust-based crypto clipboard hijacker distributed through fake “trading” and gambling tools, with the operator using inflated GitHub/SourceForge engagement, AI YouTube videos, news-site posts, and VirusTotal upvotes to make the malware look legitimate. The campaign targets Windows and macOS users and replaces copied cryptocurrency wallet addresses with attacker-controlled ones to steal funds.","briefOverview":"\u003cp\u003eCheck Point Research analyzed a campaign distributing Rust-based cryptocurrency clipboard hijackers disguised as “solutions” and “tools” promising unfair advantages, including Solana and Pump.fun sniper bots, Aviator Predictor, and crash-game predictors. The operation targets crypto owners, gamblers, and traders attracted by promises of quick profits and predictable outcomes. A WordPress phishing site acts as the central hub and links victims to GitHub, SourceForge, and YouTube content controlled or promoted by the actor.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s significance lies in its use of fake reputation across multiple platforms to make the malware appear legitimate. The actor inflates engagement through GitHub stars and forks, SourceForge ratings and downloads, YouTube views and comments, VirusTotal benign votes and “safe” comments, and promotional posts on news sites and forums. The article links several parts of the ecosystem to the Telegram handle and WordPress author name \u003ccode\u003e@JoseCmanXD\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe payloads are Rust-based clipboard hijackers for Windows and macOS. They monitor copied cryptocurrency wallet addresses and replace them with attacker-controlled addresses embedded in the binaries. The Windows version installs persistence via \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e and a Startup shortcut, while the macOS version uses an “unlocker.command” script to remove quarantine attributes and a LaunchAgent plist to persist and relaunch.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research describes a campaign in which malicious “tools” are promoted as ways to gain an unfair advantage in cryptocurrency trading and online crash-style gambling games. The advertised tools include Solana and Pump.fun sniper bots, Aviator Predictor, and multiple crash-game predictors. The operation mainly targets users seeking shortcuts and quick profits, especially crypto owners, gamblers, and traders. The actual payloads delivered to victims are Rust-based cryptocurrency clipboard hijackers for Windows and macOS.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses a WordPress phishing website as its main landing page and extends across GitHub, SourceForge, YouTube, forums, and legitimate news websites. The WordPress author is \u003ccode\u003e@JoseCmanXD\u003c/code\u003e, and the same name appears as the Telegram contact on the site. The YouTube channel contact details also link back to the WordPress site and the Telegram account, tying the platforms together. The article says the actor appears to operate at least six GitHub accounts, including \u003ccode\u003eDecryptor-j\u003c/code\u003e, \u003ccode\u003ecrash-predictor1\u003c/code\u003e, \u003ccode\u003eroblox-script1\u003c/code\u003e, \u003ccode\u003ehack-scripts\u003c/code\u003e, and \u003ccode\u003estake-mines\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eA major part of the operation is the creation of false trust signals. GitHub repositories show inflated stars, forks, and downloads, while SourceForge projects show highly positive feedback and suspicious download statistics. YouTube videos use AI-generated narrators, suspicious view spikes, and highly positive comments, while some VirusTotal samples receive benign votes and comments claiming the binaries are safe. The article says these signals create a misleading impression of safety, especially when combined with low antivirus detection rates.\u003c/p\u003e\n\n\u003cp\u003eThe Windows version is delivered in ZIP archives containing a .NET loader that executes a Rust clipper stored in nested folders such as \u003ccode\u003esrc/config/silkebin.exe\u003c/code\u003e. The malware copies itself to \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e, creates a Startup folder shortcut, registers as a clipboard listener, and uses Windows APIs including \u003ccode\u003eAddClipboardFormatListener\u003c/code\u003e, \u003ccode\u003eOpenClipboard\u003c/code\u003e, \u003ccode\u003eGetClipboardData\u003c/code\u003e, \u003ccode\u003eEmptyClipboard\u003c/code\u003e, and \u003ccode\u003eSetClipboardData\u003c/code\u003e. When it detects wallet-like strings using regular expressions, it replaces them with attacker-controlled wallet addresses. The newer Windows variant contains more than 15,500 embedded wallet addresses, including about 15,000 Bitcoin-related addresses and roughly 500 Ethereum addresses.\u003c/p\u003e\n\n\u003cp\u003eThe macOS version is distributed through the same ecosystem and includes instructions telling users to run \u003ccode\u003eunlocker.command\u003c/code\u003e if the app is blocked. The script removes macOS quarantine attributes with \u003ccode\u003exattr -cr\u003c/code\u003e and launches the application, helping users bypass Gatekeeper-style warnings. The Rust payload monitors the macOS pasteboard for wallet-like strings and replaces them with hardcoded attacker-controlled addresses. For persistence, it writes \u003ccode\u003e~/launch.sh\u003c/code\u003e and installs a LaunchAgent plist at \u003ccode\u003e~/Library/LaunchAgents/com.example..plist\u003c/code\u003e with \u003ccode\u003eRunAtLoad\u003c/code\u003e and \u003ccode\u003eKeepAlive\u003c/code\u003e, while a watchdog loop rewrites the files and reclones the binary.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research analyzed a campaign that distributes cryptocurrency clipboard hijackers disguised as tools that promise users unfair advantages. The promoted “solutions” include Solana and Pump.fun sniper bots, Aviator Predictor, and multiple crash-game predictors. The article says the operation mainly targets crypto owners, online crash-game gamblers, and traders who are looking for shortcuts, automated gains, and supposedly predictable outcomes.\u003c/p\u003e\n\n\u003cp\u003eThe campaign combines malware delivery with an extensive fake-reputation ecosystem. A WordPress phishing site acts as the main landing page, while GitHub, SourceForge, YouTube, forums, legitimate news websites, and VirusTotal are used to reinforce the appearance of legitimacy. The article describes this as an updated “Ghost Networks” model that repeatedly exposes victims to positive trust signals before they run the malware.\u003c/p\u003e\n\n\u003ch2 id=\"promotion-and-distribution-ecosystem\"\u003ePromotion and Distribution Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe central phishing website promotes tools that claim to automate or predict profitable activity in cryptocurrency and gambling contexts. It advertises Solana, Pump.fun, and DEX sniper bots, along with Aviator Predictor and crash-game predictors. Victims are generally funneled to the site through links shared on social media, crypto forums, and Telegram channels.\u003c/p\u003e\n\n\u003cp\u003eThe WordPress author is identified as \u003ccode\u003e@JoseCmanXD\u003c/code\u003e, and the same name is used as the Telegram contact on the phishing page. The site links to GitHub, SourceForge, and YouTube, where related content shows signs of inflated engagement. Check Point Research says this activity appears to rely on Ghost Networks made up of fake or low-quality accounts and channels that promote the tools, boost views, and generate likes or comments.\u003c/p\u003e\n\n\u003ch2 id=\"github-and-sourceforge-activity\"\u003eGitHub and SourceForge Activity\u003c/h2\u003e\n\n\u003cp\u003eThe actor appears to operate at least six GitHub accounts to promote and distribute the malicious software. The main accounts attributed to the actor are \u003ccode\u003eDecryptor-j\u003c/code\u003e, \u003ccode\u003ecrash-predictor1\u003c/code\u003e, \u003ccode\u003eroblox-script1\u003c/code\u003e, \u003ccode\u003ehack-scripts\u003c/code\u003e, and \u003ccode\u003estake-mines\u003c/code\u003e. These accounts appear to collaborate with each other because they are sometimes listed as contributors to one another’s repositories.\u003c/p\u003e\n\n\u003cp\u003eMany repositories associated with these accounts received multiple stars and forks from various accounts. The article attributes this activity to GitHub Ghost Networks, where controlled or fake accounts repeatedly star and fork repositories to create the illusion of popularity and trustworthiness. Check Point Research observed just over 5,000 downloads and potential infections from the GitHub accounts, including more than 1,250 downloads associated with the macOS version of Aviator Predictor.\u003c/p\u003e\n\n\u003cp\u003eSourceForge is also used to promote the malicious tools. The article says SourceForge projects show fake or coordinated positive feedback similar to other platforms that support user engagement. SourceForge download statistics appear highly manipulated, with a total of 44,485 downloads, most reportedly originating from Pakistan and India.\u003c/p\u003e\n\n\u003cp\u003eA particularly suspicious SourceForge detail is that 37,460 downloads appear to come from Android devices, even though the developer offers only Windows and macOS versions. The article says a plausible explanation is the use of an Android farm to artificially inflate SourceForge download counts, while noting that this cannot be fully confirmed.\u003c/p\u003e\n\n\u003ch2 id=\"youtube-and-ai-generated-promotion\"\u003eYouTube and AI-Generated Promotion\u003c/h2\u003e\n\n\u003cp\u003eThe phishing site also promotes a YouTube channel that showcases the advertised software. The videos have relatively high view and like counts, which the article says likely helps attract victims and convinces them of the tools’ supposed effectiveness. Some older videos appear to target Russian-speaking audiences, while more recent videos use English and appear aimed at a broader global audience.\u003c/p\u003e\n\n\u003cp\u003eThe YouTube account includes contact details that link the channel back to the WordPress site and the Telegram account \u003ccode\u003e@JoseCmanXD\u003c/code\u003e. The article says the videos show suspicious spikes in views rather than organic growth, consistent with the use of YouTube Ghost Networks. The comment sections contain highly positive engagement that appears designed to build trust, alongside comments from potentially real users complaining about the tools’ effectiveness.\u003c/p\u003e\n\n\u003cp\u003eThe videos are styled as personal tutorials. They show desktop activity and mouse movements as if a real user is demonstrating the software in real time. At the same time, an AI-generated narrator appears in the bottom-right corner and provides instructions, which the article says is likely used to make the demonstration feel more authentic and convincing.\u003c/p\u003e\n\n\u003ch2 id=\"virustotal-reputation-manipulation\"\u003eVirusTotal Reputation Manipulation\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research observed VirusTotal accounts posting community comments and casting benign votes to portray malicious indicators as harmless. Some samples from this campaign had low detection rates and also showed positive engagement on VirusTotal, including upvotes and comments describing the binaries as safe. The article says this combination can create a misleading impression of safety for users and may influence reputation-based detection systems.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the low detection rate is not caused by the positive engagement. Instead, the risk comes from the combination of low detections and seemingly positive community feedback. This creates a false sense of trust around the malicious files.\u003c/p\u003e\n\n\u003ch2 id=\"promotion-through-news-sites-and-forums\"\u003ePromotion Through News Sites and Forums\u003c/h2\u003e\n\n\u003cp\u003eWhile searching for the Telegram handle \u003ccode\u003e@JoseCmanXD\u003c/code\u003e, Check Point Research found references on legitimate news websites. These posts appeared to be advertisements promoting the tool’s alleged capabilities and linking back to the phishing page. The article says this type of exposure can mislead users because the malicious tool appears alongside trusted news content.\u003c/p\u003e\n\n\u003cp\u003eAdditional related posts were found on other news-oriented sources, all apparently published on April 27, 2026. Most of these posts were later taken down and remain only as remnants in Google search results. The article says it is unclear whether they were paid advertisements later removed after notification, or whether a malicious service or compromised news outlets enabled the fraudulent promotion.\u003c/p\u003e\n\n\u003cp\u003eThe actor also promoted the malicious tool on forums used by the target audience, including cryptocurrency-focused communities. One example is BitcoinTalk.org, where the actor posted promotional content. The article also identifies earlier activity on a hacking forum, where the same user had been active since 2019 and in 2022 posted a thread titled \u003ccode\u003eBLACKHAT | Bitcoin Stealer | Advanced Builder | Tutorial | Clipper [Address Changer]+Re-Fud method\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"windows-malware-behavior\"\u003eWindows Malware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe Windows “solutions” are downloaded as ZIP archives containing multiple files, most of which are unused during execution. The victim runs a file such as \u003ccode\u003eSniperBot_Premium(Free).exe\u003c/code\u003e, depending on the promoted tool name. This file is described as a simple .NET loader that executes another file located at \u003ccode\u003esrc/config/silkebin.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe executed Windows binary is a Rust-built cryptocurrency clipboard hijacker. It installs persistence by copying itself to \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e and creating a shortcut in the Startup folder so it runs automatically at logon. It then creates a hidden window and registers as a clipboard listener.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses Windows APIs such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eAddClipboardFormatListener\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eOpenClipboard\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGetClipboardData\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eEmptyClipboard\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eSetClipboardData\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhenever the clipboard changes, the malware checks whether the new text matches cryptocurrency wallet address patterns using regular expressions. If a supported wallet format is detected, the malware replaces the copied text with an attacker-controlled address from an internal list.\u003c/p\u003e\n\n\u003ch2 id=\"windows-wallet-targeting\"\u003eWindows Wallet Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe latest Windows version contains more than 15,500 attacker-controlled wallet addresses. According to the article, about 15,000 are Bitcoin-related, including 5,000 Bitcoin bech32 addresses, 5,000 Bitcoin legacy addresses, and 5,000 Bitcoin P2SH addresses. Roughly 500 are Ethereum addresses, and the rest include Bitcoin Cash, Bitcoin Gold, Monero, Dogecoin, Cardano, Litecoin, Tron, XRP, Zcash, Stellar, and other formats.\u003c/p\u003e\n\n\u003cp\u003eThe article says the attacker’s wallets appear to be replaced frequently. In many cases, once a malicious transaction is completed, the attacker appears to swap the used wallet for a new, clean one. Older samples of this variant contained fewer attacker-controlled wallets, typically only one per targeted currency, and targeted fewer cryptocurrencies overall.\u003c/p\u003e\n\n\u003cp\u003eThe newer Windows variant expands targeting to additional cryptocurrencies such as Bitcoin Gold, Stellar, Cardano legacy/Byron, and Dogecoin. At the same time, it removed support for Binance Chain compared with earlier behavior described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"macos-malware-behavior\"\u003emacOS Malware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe campaign also targets macOS users through the same website, GitHub repositories, and SourceForge projects. The macOS packages are aimed at the same audience as the Windows versions and have the same goal of stealing cryptocurrency. Victims download a ZIP file that includes an instruction file named \u003ccode\u003e!!! READ THIS - RUN UNLOCKER IF APP IS BLOCKED.txt\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe instruction file tells users to run \u003ccode\u003eunlocker.command\u003c/code\u003e if the app is blocked. The script searches for \u003ccode\u003e.app\u003c/code\u003e bundles in the same folder or uses an app dragged onto it, removes the macOS quarantine attribute using \u003ccode\u003exattr -cr\u003c/code\u003e, and opens the selected application. The article says the dialogs and messages make it easier for non-technical users to bypass Gatekeeper warnings and run the malicious app.\u003c/p\u003e\n\n\u003cp\u003eLike the Windows version, the macOS main program is a loader that executes another file from nested folders. The executed file is a Rust-based macOS clipboard hijacker. It monitors the macOS pasteboard, detects wallet-like strings using embedded regular expressions, and replaces them with hardcoded attacker-controlled wallet addresses bundled inside the binary.\u003c/p\u003e\n\n\u003ch2 id=\"macos-persistence\"\u003emacOS Persistence\u003c/h2\u003e\n\n\u003cp\u003eThe macOS malware maintains persistence by writing a shell script wrapper to \u003ccode\u003e~/launch.sh\u003c/code\u003e. It also installs a LaunchAgent plist at \u003ccode\u003e~/Library/LaunchAgents/com.example..plist\u003c/code\u003e. The plist uses \u003ccode\u003eRunAtLoad\u003c/code\u003e and \u003ccode\u003eKeepAlive\u003c/code\u003e, causing \u003ccode\u003elaunchd\u003c/code\u003e to silently re-execute the binary on login and restart it if it dies.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a 30-second watchdog loop named \u003ccode\u003emw_watchdog_copy_and_relaunch\u003c/code\u003e. This loop continuously rewrites both persistence files and clones the binary using \u003ccode\u003efcopyfile\u003c/code\u003e. As a result, the persistence is self-healing against manual removal unless the running process is killed first.\u003c/p\u003e\n\n\u003cp\u003eThe macOS variant appears closer in design to the older Windows version. Each regular expression pattern is associated with only one attacker-controlled wallet address, rather than the newer Windows version’s large per-currency address lists.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-indicators\"\u003eImpact and Indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article says attacker-controlled cryptocurrency wallets appear to have received multiple transactions, providing the actor with notable illicit gains. GitHub alone accounted for just over 5,000 downloads and potential infections from the identified accounts, while SourceForge showed 44,485 downloads. The total number of downloads and potential infections is described as significantly higher when downloads from other platforms and the phishing site are included.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research provides indicators of compromise for several components, including Windows clipboard hijacking malware, .NET loaders, macOS clipboard hijacking malware, and macOS loaders. The listed hashes include multiple Windows malware samples, two .NET loader hashes, one macOS clipboard hijacking malware hash, and one macOS loader hash.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the operation combines relatively simple malware with aggressive social engineering and cross-platform reputation manipulation. The actor uses fake engagement on GitHub, SourceForge, YouTube, VirusTotal, news sites, and forums to make malicious tools appear popular, safe, and legitimate. Check Point Research frames the campaign as an example of how threat actors can manipulate crowd-sourced trust and reputation systems to lower suspicion and attract more victims.\u003c/p\u003e\n","keyPoints":["Check Point Research analyzed a campaign distributing Rust-based cryptocurrency clipboard hijackers disguised as tools such as Solana and Pump.fun sniper bots, Aviator Predictor, and crash-game predictors.","The threat actor used a WordPress phishing site as a central landing page and promoted the malicious tools through GitHub, SourceForge, YouTube, crypto forums, and posts on legitimate news websites.","The campaign inflated trust signals with fake or coordinated engagement, including GitHub stars and forks, SourceForge ratings and downloads, YouTube views and comments, and benign VirusTotal votes and comments.","The Windows payload persists by copying itself to %APPDATA%\\\\silke\\\\silke.exe and creating a Startup folder shortcut, then monitors the clipboard and replaces cryptocurrency wallet addresses with attacker-controlled addresses.","The macOS payload uses an “unlocker.command” script to remove quarantine attributes and installs a LaunchAgent plist with RunAtLoad and KeepAlive to maintain persistence while monitoring and replacing wallet addresses in the pasteboard."],"insights":["The campaign attempts to manipulate not only user-facing reputation signals such as GitHub stars and YouTube comments, but also VirusTotal community votes and “safe” comments, which the article notes may influence reputation-based detection decisions when antivirus detections are already low.","SourceForge download statistics showed 37,460 downloads from Android devices even though the actor only offered Windows and macOS versions, which the article describes as highly suspicious and potentially consistent with artificial download inflation.","The Windows variant expanded from older versions that used only a few attacker-controlled wallets to a newer version containing more than 15,500 embedded wallet addresses, including about 15,000 Bitcoin-related addresses and roughly 500 Ethereum addresses.","The macOS package includes user-facing instructions and an “unlocker.command” script that specifically guides victims through bypassing Gatekeeper-style blocking by removing the quarantine attribute before launching the malicious app.","The same Telegram handle, @JoseCmanXD, links the WordPress phishing site, YouTube channel, news-site promotions, and earlier hacking-forum activity involving a crypto clipper and interest in generating unlimited YouTube views."],"referencedReports":[],"body":"\u003cp\u003eCheck Point Research analyzed a campaign distributing Rust-based cryptocurrency clipboard hijackers disguised as “solutions” and “tools” promising unfair advantages, including Solana and Pump.fun sniper bots, Aviator Predictor, and crash-game predictors. The operation targets crypto owners, gamblers, and traders attracted by promises of quick profits and predictable outcomes. A WordPress phishing site acts as the central hub and links victims to GitHub, SourceForge, and YouTube content controlled or promoted by the actor.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s significance lies in its use of fake reputation across multiple platforms to make the malware appear legitimate. The actor inflates engagement through GitHub stars and forks, SourceForge ratings and downloads, YouTube views and comments, VirusTotal benign votes and “safe” comments, and promotional posts on news sites and forums. The article links several parts of the ecosystem to the Telegram handle and WordPress author name \u003ccode\u003e@JoseCmanXD\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe payloads are Rust-based clipboard hijackers for Windows and macOS. They monitor copied cryptocurrency wallet addresses and replace them with attacker-controlled addresses embedded in the binaries. The Windows version installs persistence via \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e and a Startup shortcut, while the macOS version uses an “unlocker.command” script to remove quarantine attributes and a LaunchAgent plist to persist and relaunch.\u003c/p\u003e\n"},{"n":3,"title":"India's Telegram ban hit the UAE too. Here's how to get around it","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/indias-telegram-ban-hit-the-uae-too-heres-how-to-get-around-it/","time":"13:12","priority":"SHOULD READ","score":85,"tldr":"India temporarily banned Telegram over alleged NEET exam-leak activity, and a misconfigured BGP route tied to Reliance Communications appears to have disrupted Telegram access beyond India, including in the UAE. Affected users can restore access with Telegram’s built-in MTProto proxy feature, though proxy operators may still see connection metadata.","briefOverview":"\u003cp\u003eIndia’s Ministry of Electronics and Information Technology restricted access to Telegram nationwide until June 22 after the National Testing Agency said the platform was used to sell access to leaked exam materials. A separate order requires Telegram to disable its message-editing feature in India until June 30. Telegram challenged the ban in the Delhi High Court, which agreed to hear the matter urgently.\u003c/p\u003e\n\n\u003cp\u003eThe disruption extended beyond India, with Telegram CEO Pavel Durov alleging that Reliance was sabotaging Telegram access outside India through BGP hijacking. Network observers confirmed that AS18101 announced Telegram routes and that the leak affected users in places including the UAE, but several researchers said they saw no evidence that the incident was deliberate. Analysts described the incident as resembling a domestic block that leaked globally through misconfigured routing.\u003c/p\u003e\n\n\u003cp\u003eThe article says affected users can restore access using Telegram’s built-in MTProto proxy feature, which routes Telegram traffic through an intermediary node to avoid direct connections to blocked Telegram IP ranges. It notes that Telegram traffic remains end-to-end encrypted, but proxy operators can see connecting IP addresses and connection times. Digital rights group Internet Freedom Foundation criticized the ban as disproportionate and constitutionally incompatible.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIndia temporarily blocked Telegram under Section 69A of the IT Act after the National Testing Agency recommended restrictions tied to alleged NEET exam fraud. The NTA said cheating networks used Telegram channels, groups, and bots to sell access to exam material and spread misinformation. It also said channel administrators abused Telegram’s edit feature to backdate posts and present altered timestamps as proof of a prior leak, leading to a separate editing-feature restriction through June 30.\u003c/p\u003e\n\n\u003cp\u003eTelegram CEO Pavel Durov alleged that Reliance was “sabotaging” Telegram access outside India, including in the UAE, through BGP hijacking. BGP is the routing system that tells networks how to reach each other across the internet, and a BGP hijack occurs when a network announces ownership of IP ranges it does not control. Public routing data cited in the article showed AS18101 announcing Telegram prefixes around the time the domestic block went live.\u003c/p\u003e\n\n\u003cp\u003eNetwork analysts confirmed the routing anomaly but disputed the claim that it was intentional sabotage. Doug Madory of Kentik confirmed AS18101 hijacked Telegram’s routes and said RPKI route-origin validation and filtering limited how far the bad route propagated. Anurag Bhatia independently verified the routing issue, while Pranesh Prakash traced the leak through FLAG Telecom and said he saw no evidence that the incident was deliberate.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights uncertainty around which Reliance entity was responsible for the route origin. AS18101 is registered to Reliance Communications, the insolvent Anil Ambani-era operator, not Reliance Jio, the Mukesh Ambani carrier in which Meta holds a roughly 10 percent stake. Prakash noted that Jio had absorbed some RCom spectrum and fibre assets but stopped short of identifying who triggered the hijack.\u003c/p\u003e\n\n\u003cp\u003eThe ban drew criticism from the Internet Freedom Foundation, which called it a disproportionate and constitutionally incompatible response to exam fraud. The article says students were among the hardest hit because many NEET aspirants relied on Telegram for study material, coaching groups, lecture videos, and notes. It also says affected users can use Telegram’s MTProto proxy feature to regain access, while warning that proxy operators can log IP addresses and connection times.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIndia temporarily restricted access to Telegram nationwide until June 22 after the platform was linked to the sale of leaked exam materials. The Ministry of Electronics and Information Technology invoked Section 69A of the IT Act following a recommendation from the National Testing Agency. A separate order requires Telegram to disable its message-editing feature in India until June 30.\u003c/p\u003e\n\n\u003cp\u003eTelegram challenged the ban in the Delhi High Court, which agreed to hear the matter urgently. Telegram CEO Pavel Durov argued that the ban punishes the wrong people, saying Telegram had removed hundreds of channels sharing leaked material and scams in India in recent weeks. The National Testing Agency described the ban as a “last resort” after channel-by-channel takedowns failed to stop the fraud.\u003c/p\u003e\n\n\u003ch2 id=\"exam-fraud-context\"\u003eExam-fraud context\u003c/h2\u003e\n\n\u003cp\u003eThe trigger was the National Eligibility-cum-Entrance Test, or NEET, India’s largest medical entrance exam, taken by millions of students. Question papers were allegedly leaked before the May 3 exam through a paid WhatsApp group and coaching-centre networks in Rajasthan. Reports described a pre-circulated guess paper that overlapped heavily with the real test.\u003c/p\u003e\n\n\u003cp\u003eThe exam was cancelled on May 12, and a re-test was scheduled for June 21. India’s Central Bureau of Investigation took over the probe and made multiple arrests, including NTA-appointed subject experts and coaching figures. The NTA said cheating networks used Telegram channels, groups, and bots to sell access to exam material and spread misinformation.\u003c/p\u003e\n\n\u003cp\u003eThe editing-feature restriction was tied to the NTA’s claim that channel administrators abused Telegram’s edit feature. According to the article, administrators allegedly backdated posts and used altered timestamps as proof of a prior leak. That stated rationale led to the order requiring Telegram to disable message editing in India until June 30.\u003c/p\u003e\n\n\u003ch2 id=\"bgp-routing-disruption\"\u003eBGP routing disruption\u003c/h2\u003e\n\n\u003cp\u003eThe Telegram disruption did not remain within India. Durov alleged in an X post that Indian telecom Reliance was “sabotaging” Telegram access for users outside India, including in the UAE, through BGP hijacking. He said the disruption looked deliberate because reports had been ignored, framed it as possible competitive interference because of Reliance’s ties to Meta, and advised network operators to reject unauthorized BGP announcements from AS18101.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Border Gateway Protocol is the routing system that tells networks how to reach each other across the internet. A BGP hijack happens when a network announces ownership of IP address ranges it does not control, which can redirect, drop, or disrupt traffic for the real owner. Public routing data cited by network observers showed AS18101 began announcing Telegram prefixes around the time the domestic block went live.\u003c/p\u003e\n\n\u003cp\u003eSeveral network researchers confirmed the routing issue. Doug Madory, Director of Internet Analysis at Kentik, confirmed AS18101 hijacked Telegram’s routes, while noting that RPKI route-origin validation and filtering limited how far the bad route propagated. Network researcher Anurag Bhatia independently verified the issue using public routing data.\u003c/p\u003e\n\n\u003cp\u003eTechnology policy researcher Pranesh Prakash traced the mechanics of the leak in a thread. He said the route leaked to the global internet via FLAG Telecom, AS15412, a former RCom-owned transit provider that failed to drop the RPKI-invalid announcement. The article says this explains why users in the UAE and elsewhere lost access.\u003c/p\u003e\n\n\u003ch2 id=\"disputed-intent-and-unresolved-attribution\"\u003eDisputed intent and unresolved attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes between the documented routing anomaly and claims about intent. It says the routing disruption itself is not in question, but analysts disputed Durov’s claim that the hijack was deliberate. Prakash said he disagreed with Durov, that intentional sabotage was highly unlikely, and that he had seen zero evidence for it.\u003c/p\u003e\n\n\u003cp\u003eMadory and Bhatia reached similar conclusions. The article says they compared the incident to Iraq’s 2023 Telegram block, where an attempt to cut Telegram domestically leaked routes outward. In this framing, the India incident looked like a domestic block misconfigured into a global route leak.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the corporate-rivalry angle remains unresolved. AS18101 is registered to Reliance Communications, described as the insolvent Anil Ambani-era operator, not Reliance Jio, the Mukesh Ambani carrier in which Meta holds a roughly 10 percent stake. Prakash noted that Jio had absorbed some RCom spectrum and fibre assets, but he stopped short of identifying who actually originated the hijack.\u003c/p\u003e\n\n\u003ch2 id=\"criticism-of-the-ban\"\u003eCriticism of the ban\u003c/h2\u003e\n\n\u003cp\u003eThe Internet Freedom Foundation objected to the ban on both procedural and practical grounds. It argued that the directions exceed what Section 69A and the blocking rules permit. It described the move as a band-aid and said it failed the proportionality test because it imposed a nationwide block on a service used by more than 150 million people to address fraud committed by a handful.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the broader issue of opacity around Section 69A blocking orders in India. It says such orders are routinely issued without public reasons, and the list of blocked sites is not disclosed. As an example, it states that the UK’s Daily Mail has been quietly inaccessible across Indian ISPs since 2022, returning DNS resolution errors, with no stated reason and no named ministry behind the decision.\u003c/p\u003e\n\n\u003cp\u003eTelegram’s scale made this case unusual. The article says Telegram is unusual only because of the size of its user base and because someone with 150 million users is publicly objecting. Political criticism also emerged, including a post from Congress MP Karti P. Chidambaram asking whether blocking Telegram was really the “master stroke” that would stop exam paper leaks.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-users\"\u003eImpact on users\u003c/h2\u003e\n\n\u003cp\u003eThe article says the people hit hardest are the students the ban was meant to protect. NEET aspirants had built preparation workflows around Telegram, including free study material, paid coaching groups, lecture videos, and notes. Some users reported that Telegram’s unavailability cut them off from material they had already paid for.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as an asymmetry emphasized by IFF. It says the leak source remains unresolved, the platform gets blocked, and students who paid for legitimate access are locked out. This user impact is presented as collateral damage from the nationwide platform-level restriction.\u003c/p\u003e\n\n\u003ch2 id=\"workaround-described-in-the-article\"\u003eWorkaround described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says Telegram includes built-in support for censorship-circumvention through MTProto, also called MTProxy. MTProto routes Telegram traffic through an intermediary node before it reaches Telegram’s servers. This means an ISP blocking known Telegram IP ranges no longer sees a direct connection to those Telegram IPs.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Telegram traffic remains end-to-end encrypted through the proxy. It also warns that a proxy operator can see the connecting IP address and connection times, even though the operator cannot read messages or identify the account. It advises users to use proxies only from trusted sources and says layering a trusted VPN on top can close that metadata gap.\u003c/p\u003e\n\n\u003cp\u003eThe article names two proxy sources: StormyCloud’s free MTProto proxy and the SoliSpirit project on GitHub, which publishes a list of verified proxies refreshed automatically every 12 hours. It provides setup steps for Telegram desktop and mobile, directing users to the proxy settings and instructing them to enter the MTProto server, port, and secret from a chosen proxy source.\u003c/p\u003e\n\n\u003ch2 id=\"current-status-described-in-the-article\"\u003eCurrent status described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe restriction is set to lift on June 22, the day after the re-examination. The message-editing restriction is scheduled to remain in effect until June 30. The article says Telegram’s court challenge could shorten the ban, and the routing spillover into the UAE may resolve on its own as the India-side block is unwound.\u003c/p\u003e\n","keyPoints":["India’s Ministry of Electronics and Information Technology restricted access to Telegram nationwide until June 22 under Section 69A of the IT Act after the National Testing Agency said Telegram was used to sell access to leaked exam materials.","Telegram CEO Pavel Durov alleged that Reliance was sabotaging Telegram access outside India through BGP hijacking, while network researchers confirmed AS18101 hijacked Telegram routes but said there was no evidence the disruption was deliberate.","The routing leak affected users outside India, including in the UAE, after AS18101 announced Telegram prefixes and the route leaked to the global internet via FLAG Telecom.","The Internet Freedom Foundation said the nationwide Telegram block was disproportionate and constitutionally incompatible because it affected more than 150 million users to address fraud committed by a smaller group.","The article says affected users can restore Telegram access by configuring the app’s built-in MTProto proxy feature with a trusted proxy server, port, and secret."],"insights":["RPKI route-origin validation and filtering limited the spread of the bad Telegram route, showing that proper routing hygiene can reduce the blast radius of BGP leaks.","The article distinguishes the documented routing anomaly from intent, noting that researchers confirmed the BGP hijack but disputed Pavel Durov’s claim that it was deliberate sabotage.","Telegram’s MTProto proxy c
