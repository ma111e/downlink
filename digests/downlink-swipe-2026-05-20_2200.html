window.__DL_ARTICLES = [{"n":4,"title":"7-Eleven confirms breach after ShinyHunters claims","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/7-eleven-reports-data-breach-shinyhunters","time":"16:05","priority":"MUST READ","score":95,"tldr":"7-Eleven confirmed a data breach where hackers accessed franchisee documents, stealing names, addresses, and Social Security numbers, following claims by the ShinyHunters cybercriminal group.","briefOverview":"\u003cp\u003e7-Eleven confirmed that hackers breached a system used to store franchisee documents, resulting in the theft of names, addresses, and Social Security numbers. The company discovered the breach on April 8 and reported it to state regulators in Maine, Vermont, and Massachusetts, but did not disclose the total number of impacted individuals.\u003c/p\u003e\n\n\u003cp\u003eThe breach notifications came after the cybercriminal group ShinyHunters claimed in late April that it had stolen troves of 7-Eleven data held on Salesforce. ShinyHunters has targeted other high-profile companies, including educational software giant Instructure, prompting the FBI to release guidance urging victims not to pay ransoms and to contact the FBI immediately.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003e7-Eleven, a convenience store giant owned by Japanese retail company Seven \u0026amp; I Holdings, confirmed a data breach involving a system used to store documents related to its franchises. The company reported the incident to state regulators in Maine, Vermont, and Massachusetts, but did not specify the total number of affected individuals. According to breach notification letters, 7-Eleven discovered the breach on April 8 and determined that cybercriminals had gained access to systems storing franchisee documents, stealing names, addresses, and Social Security numbers. The company did not respond to requests for comment about what other information may have been taken.\u003c/p\u003e\n\n\u003cp\u003eThe breach notifications followed public claims by the cybercriminal organization ShinyHunters in late April that it had stolen information from 7-Eleven held on Salesforce. 7-Eleven was listed among dozens of other companies attacked by ShinyHunters the previous month. This group has a history of targeting data storage tools to steal large amounts of data from high-profile companies.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters recently caused a nationwide scandal with an attack on educational software giant Instructure, which impacted thousands of universities and K-12 schools across the U.S. In response, the FBI released a guidance document last week urging victims of the group to not pay a ransom. The FBI described ShinyHunters as a cyber criminal group specializing in large-scale data breaches and extortion, targeting major companies across tech, finance, and retail, often stealing millions of customer records at once.\u003c/p\u003e\n\n\u003cp\u003eThe FBI warned that ShinyHunters actors\u0026rsquo; access to sensitive data could allow them to sell the stolen data to other cyber criminals or reuse it to impersonate school faculty, IT support, financial aid offices, or others in future attacks. They urged any organization impacted by a ShinyHunters attack to contact the FBI immediately.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003e7-Eleven confirmed a data breach in which hackers accessed a system used to store documents related to its franchises. The company reported the breach to state regulators in Maine, Vermont, and Massachusetts, but did not disclose the total number of individuals impacted. The breach notification letters stated that 7-Eleven discovered the breach on April 8 and, after an investigation, determined that cybercriminals gained access to “certain 7-Eleven systems used to store franchisee documents.”\u003c/p\u003e\n\n\u003ch2 id=\"stolen-information\"\u003eStolen Information\u003c/h2\u003e\n\n\u003cp\u003eThe information stolen includes names, addresses, and Social Security numbers. The company did not respond to requests for comment about what other information may have been taken.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected Parties\u003c/h2\u003e\n\n\u003cp\u003e7-Eleven is owned by Japanese retail company Seven \u0026amp; I Holdings and operates about 86,000 stores in 19 countries. Almost 10,000 of its U.S. stores are franchises. The breach specifically targeted franchisee documents, meaning franchise operators likely had their personal and business information exposed.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-context\"\u003eAttribution and Context\u003c/h2\u003e\n\n\u003cp\u003eThe breach notifications came after the ShinyHunters cybercriminal organization claimed in late April that it had stolen troves of information from 7-Eleven held on Salesforce. 7-Eleven was listed alongside dozens of other companies attacked by ShinyHunters the previous month. ShinyHunters has repeatedly targeted data storage tools to steal large amounts of data from high-profile companies.\u003c/p\u003e\n\n\u003ch2 id=\"shinyhunters-background\"\u003eShinyHunters Background\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eShinyHunters recently caused a nationwide scandal with an attack on educational software giant Instructure, which impacted thousands of universities and K-12 schools across the U.S.\u003c/li\u003e\n\u003cli\u003eThe FBI released a guidance document last week urging victims of the group to not pay a ransom.\u003c/li\u003e\n\u003cli\u003eThe FBI described ShinyHunters as a cyber criminal group specializing in large-scale data breaches and extortion, targeting major companies across tech, finance, and retail, often stealing millions of customer records at once.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe FBI warned that ShinyHunters actors\u0026rsquo; access to sensitive data could provide them an opportunity to sell the stolen data to other cyber criminals or reuse stolen data from education platforms to impersonate school faculty, IT support, financial aid offices, or others in future attacks.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommendations\"\u003eResponse and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe FBI urged any organization impacted by a ShinyHunters attack to contact the FBI immediately.\u003c/p\u003e\n","keyPoints":["7-Eleven confirmed that hackers breached a system used to store documents related to franchises.","The stolen information includes names, addresses, and Social Security numbers.","7-Eleven discovered the breach on April 8 and reported it to state regulators in Maine, Vermont, and Massachusetts.","The breach notifications follow claims by the ShinyHunters cybercriminal organization that it stole troves of information from 7-Eleven held on Salesforce.","The FBI described ShinyHunters as a cyber criminal group specializing in large-scale data breaches and extortion, and urged any organization impacted by a ShinyHunters attack to contact the FBI immediately."],"insights":["The public claim by ShinyHunters in late April preceded 7-Eleven's breach notifications to state regulators, suggesting that the group's disclosure may have prompted the company's official confirmation.","The FBI's explicit guidance urging victims of ShinyHunters not to pay ransom indicates that the group is known for not honoring ransom demands or that payment could encourage further extortion.","ShinyHunters' breach of 7-Eleven involved data stored on Salesforce, reinforcing the group's pattern of targeting cloud-based data storage tools rather than traditional network perimeters."],"referencedReports":[{"title":"FBI Guidance Document on ShinyHunters Ransom","url":"https://www.ic3.gov/PSA/2026/PSA260515","publisher":"Federal Bureau of Investigation (FBI)","context":"The FBI released this guidance document urging victims of ShinyHunters to not pay a ransom and to contact the FBI immediately.","category":"","primary":false}],"body":"\u003cp\u003e7-Eleven confirmed that hackers breached a system used to store franchisee documents, resulting in the theft of names, addresses, and Social Security numbers. The company discovered the breach on April 8 and reported it to state regulators in Maine, Vermont, and Massachusetts, but did not disclose the total number of impacted individuals.\u003c/p\u003e\n\n\u003cp\u003eThe breach notifications came after the cybercriminal group ShinyHunters claimed in late April that it had stolen troves of 7-Eleven data held on Salesforce. ShinyHunters has targeted other high-profile companies, including educational software giant Instructure, prompting the FBI to release guidance urging victims not to pay ransoms and to contact the FBI immediately.\u003c/p\u003e\n"},{"n":6,"title":"GitHub confirms being hacked by TeamPCP, says customer data unaffected","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/github-confirms-teampcp-hack-customers-unaffected","time":"12:21","priority":"MUST READ","score":95,"tldr":"GitHub confirmed its internal code repositories were breached by TeamPCP through a compromised employee device, but stated no customer data was affected.","briefOverview":"\u003cp\u003eGitHub confirmed that its internal code repositories were breached by the hacking group TeamPCP after an employee\u0026rsquo;s device was compromised through a malicious VS Code extension. The company stated that customer data was not affected and that the breach was limited to internal repositories. GitHub detected and contained the incident, rotating critical credentials on the same day. The attackers claimed to have stolen around 3,800 repositories, which GitHub said was directionally consistent with its own findings.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub, a Microsoft-owned platform hosting code for over 100 million developers, confirmed it was hacked by the prolific cybercriminal group TeamPCP. The breach occurred after an employee\u0026rsquo;s device was compromised via a poisoned software extension for VS Code. TeamPCP is known for a series of supply chain attacks since March, targeting developer tools such as TanStack, Trivy, and LiteLLM, with downstream victims including the European Commission. The hackers advertised the stolen source code on a cybercrime forum, offering to sell it for $50,000 and threatening to leak it for free if no buyer emerged. GitHub stated the breach was detected and contained, limited to internal repositories, and that no customer data was impacted. Critical credentials were rotated the same day the breach was identified, with the most sensitive secrets addressed first. The company noted that the attacker\u0026rsquo;s claim of approximately 3,800 repositories being stolen was directionally consistent with its own investigation. GitHub said it would publish a fuller report once the investigation is complete.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eGitHub confirmed unauthorized access to thousands of its internal code repositories after a hacking group, TeamPCP, compromised an employee\u0026rsquo;s device. The attack vector was a malicious VS Code extension, which allowed the attackers to infiltrate the platform\u0026rsquo;s internal systems. GitHub announced the breach on social media after TeamPCP advertised the stolen source code on a cybercrime forum, demanding $50,000 for the data and threatening to leak it for free if no buyer came forward.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAttack Vector:\u003c/strong\u003e A poisoned software extension for Microsoft\u0026rsquo;s VS Code editor was used to compromise an employee\u0026rsquo;s device.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScope of Compromise:\u003c/strong\u003e The breach was limited to internal repositories; GitHub explicitly stated that customer data was unaffected.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScale:\u003c/strong\u003e The attackers claimed to have stolen around 3,800 repositories. GitHub confirmed this was \u0026ldquo;directionally consistent\u0026rdquo; with its own findings.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResponse:\u003c/strong\u003e Critical credentials were rotated on the same day the breach was detected, with the most sensitive secrets prioritized.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"actor-background\"\u003eActor Background\u003c/h2\u003e\n\n\u003cp\u003eTeamPCP is described in the article as a prolific cybercriminal gang that has conducted a cascading series of supply chain attacks since March. Their previous targets include developer tools such as TanStack, Trivy, and LiteLLM, with downstream victims including the European Commission. This pattern highlights their focus on compromising widely used development tools to reach broader targets.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-disclosure\"\u003eImpact and Disclosure\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eImmediate Actions:\u003c/strong\u003e GitHub detected and contained the breach, rotated credentials, and launched an investigation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCustomer Data:\u003c/strong\u003e The company emphasized that no customer data was accessed or compromised.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePublic Communication:\u003c/strong\u003e GitHub confirmed the breach on social media after the hackers publicly advertised the stolen data. The company stated it would publish a fuller report once its investigation is complete.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExtortion Attempt:\u003c/strong\u003e The hackers offered to sell the stolen source code for $50,000 on a cybercrime forum, threatening to leak it for free if no buyer came forward.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe breach underscores the risk of supply chain attacks targeting developer tools, even for a major platform like GitHub.\u003c/li\u003e\n\u003cli\u003eTeamPCP\u0026rsquo;s method of compromising an employee via a malicious VS Code extension demonstrates a sophisticated, targeted approach.\u003c/li\u003e\n\u003cli\u003eGitHub\u0026rsquo;s rapid credential rotation and containment efforts limited the potential damage, but the fact that internal source code was stolen remains a significant security incident.\u003c/li\u003e\n\u003cli\u003eThe company\u0026rsquo;s response indicates that the full extent of the breach is still under investigation, with a detailed report forthcoming.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["GitHub confirmed it is investigating unauthorized access to thousands of its internal code repositories after a hacking group compromised an employee's device through a poisoned software extension.","The breach was carried out by TeamPCP, a prolific cybercriminal gang that has conducted a series of supply chain attacks since March.","GitHub stated the breach was detected and contained, limited to internal repositories, and that no customer data was affected.","Critical credentials were rotated the same day the breach was detected, with the most sensitive secrets addressed first.","GitHub said the attacker's claim of around 3,800 repositories being stolen was 'directionally consistent' with its own findings of the extent of the breach."],"insights":["The attack vector was a malicious VS Code extension, highlighting that even widely used developer tools can be weaponized for supply chain compromise.","TeamPCP's extortion method of publicly offering the stolen code for $50,000 on a forum, rather than directly demanding a ransom from GitHub, is an unusual tactic that bypasses typical negotiation.","GitHub's statement that the hacker's claim of 3,800 stolen repositories was 'directionally consistent' indicates the company independently verified the breach scale through its own forensic analysis."],"referencedReports":[],"body":"\u003cp\u003eGitHub confirmed that its internal code repositories were breached by the hacking group TeamPCP after an employee\u0026rsquo;s device was compromised through a malicious VS Code extension. The company stated that customer data was not affected and that the breach was limited to internal repositories. GitHub detected and contained the incident, rotating critical credentials on the same day. The attackers claimed to have stolen around 3,800 repositories, which GitHub said was directionally consistent with its own findings.\u003c/p\u003e\n"},{"n":10,"title":"Drupal critical update to fix bug with high exploitation risk","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/drupal-critical-update-to-fix-bug-with-high-exploitation-risk/","time":"12:52","priority":"MUST READ","score":95,"tldr":"Drupal released a critical security update for versions 8 and later due to a high-risk vulnerability that could be exploited quickly; administrators should apply patches immediately.","briefOverview":"\u003cp\u003eDrupal has announced a critical core security release scheduled for May 20, 2026, between 17:00 and 21:00 UTC, warning that threat actors may develop exploits within hours of the disclosure. The vulnerability affects Drupal core versions 8 and later, though not all configurations are impacted.\u003c/p\u003e\n\n\u003cp\u003eSecurity updates will be provided for versions 11.3.x, 11.2.x, 11.1.x, 10.6.x, 10.5.x, and 10.4.x, with fixes also issued for unsupported versions 11.1.x and 10.4.x due to severity. End-of-life versions 8 and 9 will not receive patches, but hotfix files will be published for versions 9.5.11 and 8.9.20.\u003c/p\u003e\n\n\u003cp\u003eNo technical details about the vulnerability have been disclosed, and Drupal warns that any online information appearing before the announcement may be fraudulent. Administrators are urged to reserve time for the update and to apply it as soon as it becomes available.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDrupal has announced a core security release scheduled for May 20, 2026, between 17:00 and 21:00 UTC, warning that threat actors might develop exploits within hours of the update disclosure. The vulnerability is described as having high exploitation risk, prompting the urgent advisory. Administrators running Drupal versions 8 or 9 are strongly recommended to upgrade to at least version 10.6.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Drupal core versions 8 and later, though the advisory clarifies that not all configurations are impacted. Security updates will be available for versions 11.3.x, 11.2.x, 11.1.x, 10.6.x, 10.5.x, and 10.4.x. Notably, Drupal is providing fixes for unsupported versions 11.1.x and 10.4.x due to the severity of the issue.\u003c/p\u003e\n\n\u003cp\u003eEnd-of-life versions 8 and 9 will receive no patches, but hotfix files will be published for versions 9.5.11 and 8.9.20 to allow remediation. Sites using Drupal Steward are already protected against known attack vectors, though an update is still recommended.\u003c/p\u003e\n\n\u003cp\u003eNo technical details about the vulnerability were disclosed, and any information that may appear online about it could be fraudulent, intended to trick administrators into taking risky actions. Drupal cautioned that neither the Security Team nor any other party can release more information until the announcement is made.\u003c/p\u003e\n\n\u003cp\u003eThe Drupal content management system is very popular among large organizations as well as in the government, education, and healthcare sectors, making the impact potentially widespread. Website administrators are urged to monitor Drupal\u0026rsquo;s official security portal throughout the day and prepare to apply the security update as soon as it is made available.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eDrupal has announced a critical core security release scheduled for May 20, 2026, between 17:00 and 21:00 UTC. The advisory warns that threat actors may develop exploits within hours of the update disclosure, indicating a high exploitation risk.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-scope\"\u003eAffected Versions and Scope\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability affects Drupal core versions 8 and later, though the advisory explicitly states that not all configurations are impacted. Security updates will be provided for the following versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDrupal 11.3.x\u003c/li\u003e\n\u003cli\u003eDrupal 11.2.x\u003c/li\u003e\n\u003cli\u003eDrupal 11.1.x\u003c/li\u003e\n\u003cli\u003eDrupal 10.6.x\u003c/li\u003e\n\u003cli\u003eDrupal 10.5.x\u003c/li\u003e\n\u003cli\u003eDrupal 10.4.x\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDrupal notes that versions 11.1.x and 10.4.x are no longer supported, but fixes will still be provided for them due to the severity of the security issue. Administrators should update to Drupal 11.1.9 and 10.4.9.\u003c/p\u003e\n\n\u003ch2 id=\"end-of-life-versions\"\u003eEnd-of-Life Versions\u003c/h2\u003e\n\n\u003cp\u003eDrupal 8 and 9, which have reached end-of-life, will receive no patches. However, hotfix files will be published for versions 9.5.11 and 8.9.20, allowing remediation for those running these specific minor versions. Administrators running versions 8 or 9 are strongly recommended to upgrade to at least version 10.6.\u003c/p\u003e\n\n\u003ch2 id=\"existing-protections\"\u003eExisting Protections\u003c/h2\u003e\n\n\u003cp\u003eSites using Drupal Steward are already protected against known attack vectors. Despite this protection, an update is still recommended.\u003c/p\u003e\n\n\u003ch2 id=\"lack-of-technical-details\"\u003eLack of Technical Details\u003c/h2\u003e\n\n\u003cp\u003eNo technical details about the vulnerability were disclosed. Drupal explicitly warned that any information that may appear online about it could be fraudulent, intended to trick administrators into taking risky actions. The security team stated that neither they nor any other party is able to release more information until the announcement is made.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-audience\"\u003eImpact and Audience\u003c/h2\u003e\n\n\u003cp\u003eThe Drupal content management system is very popular among large organizations as well as in the government, education, and healthcare sectors. This makes the potential impact of the vulnerability significant across critical infrastructure and sensitive data environments.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eAdministrators are urged to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReserve time for core updates on May 20 between 17:00 and 21:00 UTC.\u003c/li\u003e\n\u003cli\u003eMonitor Drupal’s official security portal throughout the day for more information.\u003c/li\u003e\n\u003cli\u003eApply the security update as soon as it is made available.\u003c/li\u003e\n\u003cli\u003eTreat any pre-disclosure online information about the vulnerability as potentially fraudulent.\u003c/li\u003e\n\u003cli\u003eConsider upgrading from versions 8 or 9 to at least version 10.6.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also includes a sponsored section promoting a guide titled \u0026ldquo;The Validation Gap: Automated Pentesting Answers One Question. You Need Six.\u0026rdquo; which discusses six surfaces to validate for security, but this is not part of the Drupal advisory itself.\u003c/p\u003e\n","keyPoints":["Drupal has announced a 'core security release' scheduled for May 20, warning that threat actors might develop exploits within hours of the update disclosure.","The vulnerability affects Drupal core versions 8 and later, though not all configurations are impacted.","Security updates will be provided for versions 11.3.x, 11.2.x, 11.1.x, 10.6.x, 10.5.x, and 10.4.x, with fixes for unsupported versions due to severity.","No technical details about the vulnerability were disclosed, and any information appearing online may be fraudulent."],"insights":["Drupal is providing security fixes for end-of-life versions 11.1.x and 10.4.x due to the vulnerability's severity, which is unusual for unsupported software.","Sites using Drupal Steward are already protected against known attack vectors, yet an update is still recommended, suggesting the protection may be incomplete against all exploitation methods.","The article warns that any online information about the vulnerability before the official disclosure could be fraudulent, advising administrators to treat such information as potentially malicious."],"referencedReports":[{"title":"PSA-2026-05-18","url":"https://www.drupal.org/psa-2026-05-18","publisher":"Drupal","context":"The article cites this advisory as the source of information about the vulnerability and the scheduled security release.","category":"","primary":false},{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Unspecified vendor (sponsored content)","context":"The article promotes this guide as a resource covering six surfaces to validate for security.","category":"","primary":false}],"body":"\u003cp\u003eDrupal has announced a critical core security release scheduled for May 20, 2026, between 17:00 and 21:00 UTC, warning that threat actors may develop exploits within hours of the disclosure. The vulnerability affects Drupal core versions 8 and later, though not all configurations are impacted.\u003c/p\u003e\n\n\u003cp\u003eSecurity updates will be provided for versions 11.3.x, 11.2.x, 11.1.x, 10.6.x, 10.5.x, and 10.4.x, with fixes also issued for unsupported versions 11.1.x and 10.4.x due to severity. End-of-life versions 8 and 9 will not receive patches, but hotfix files will be published for versions 9.5.11 and 8.9.20.\u003c/p\u003e\n\n\u003cp\u003eNo technical details about the vulnerability have been disclosed, and Drupal warns that any online information appearing before the announcement may be fraudulent. Administrators are urged to reserve time for the update and to apply it as soon as it becomes available.\u003c/p\u003e\n"},{"n":13,"title":"Max-severity flaw in ChromaDB for AI apps allows server hijacking","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/max-severity-flaw-in-chromadb-for-ai-apps-allows-server-hijacking/","time":"22:25","priority":"MUST READ","score":95,"tldr":"A critical unauthenticated remote code execution vulnerability (CVE-2026-45829) in ChromaDB's Python API allows attackers to hijack exposed servers by loading malicious models before authentication checks, affecting versions since 1.0.0 with no confirmed fix yet.","briefOverview":"\u003cp\u003eA max-severity vulnerability (CVE-2026-45829) in ChromaDB\u0026rsquo;s Python FastAPI server allows unauthenticated attackers to execute arbitrary code on exposed servers. The flaw was discovered by HiddenLayer and reported to ChromaDB on February 17, but the maintainer has not responded.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists because an API endpoint performs authentication checks after loading a model from Hugging Face. An attacker can send a crafted request to load a malicious model before the server verifies credentials, bypassing security entirely.\u003c/p\u003e\n\n\u003cp\u003eRoughly 73% of internet-exposed ChromaDB instances are running a vulnerable version (1.0.0 through 1.5.8). Users are advised to use the Rust frontend, restrict network access to the API port, or scan ML model artifacts before runtime.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eChromaDB is an open-source vector database and AI retrieval backend used in agentic AI applications. The vulnerability, tracked as CVE-2026-45829, affects the Python API server codebase and was given the maximum severity score by HiddenLayer.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was introduced in ChromaDB 1.0.0 and remained unpatched in version 1.5.8. HiddenLayer reported the issue on February 17, but the maintainer released version 1.5.9 two weeks ago without confirming whether the security issue was fixed.\u003c/p\u003e\n\n\u003cp\u003eAccording to HiddenLayer\u0026rsquo;s research, an attacker can send a crafted request to force ChromaDB to load a malicious model from Hugging Face and execute it locally. The authentication check occurs after the model is fetched and executed, meaning the server rejects the request but the payload has already run.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability only affects deployments that expose the Python API server over HTTP. Users running ChromaDB locally without exposing the API, or those using the Rust front-end, are not affected.\u003c/p\u003e\n\n\u003cp\u003eShodan queries revealed that approximately 73% of internet-exposed instances are running a vulnerable version. The researchers recommend using the Rust frontend or restricting network access to the ChromaDB API port as mitigations until a patch is confirmed.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the researchers advise scanning ML model artifacts before runtime because loading public models with \u0026lsquo;trust_remote_code\u0026rsquo; effectively executes untrusted code. BleepingComputer contacted the Chroma team but received no response by publication time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA max-severity vulnerability (CVE-2026-45829) in ChromaDB\u0026rsquo;s Python FastAPI server allows unauthenticated attackers to run arbitrary code on exposed servers. ChromaDB is an open-source vector database and AI retrieval backend used in agentic AI applications, enabling retrieval of semantically relevant documents during large-language model inference.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe flaw affects the Python API server codebase; the PyPI package (nearly 14 million monthly downloads) is at risk when servers are accessible over HTTP.\u003c/li\u003e\n\u003cli\u003eHiddenLayer discovered that a vulnerable API endpoint marked as authenticated allows attackers to embed model settings before authentication is checked.\u003c/li\u003e\n\u003cli\u003eAn attacker sends a crafted request to force ChromaDB to load a malicious model from the Hugging Face platform and execute it locally. The authentication check is only performed after model execution, bypassing security.\u003c/li\u003e\n\u003cli\u003eAs HiddenLayer explains: \u0026ldquo;The authentication is not missing, [it’s] just in the wrong place. By the time it fires, the model has already been fetched and executed. The server rejects the request, returns a 500, and the attacker\u0026rsquo;s payload has already run.\u0026rdquo;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-exposure\"\u003eAffected Parties and Exposure\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability was introduced in ChromaDB 1.0.0 and was unpatched in version 1.5.8.\u003c/li\u003e\n\u003cli\u003eUsers who deploy ChromaDB locally without exposing the API server online, along with those using the Rust front-end, are not affected.\u003c/li\u003e\n\u003cli\u003eAccording to queries on Shodan, roughly 73% of internet-exposed instances are running a vulnerable version.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response-and-mitigations\"\u003eResponse and Mitigations\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eHiddenLayer reported the flaw to ChromaDB on February 17 and attempted to contact the developer multiple times over email and social media, but received no reply.\u003c/li\u003e\n\u003cli\u003eTwo weeks ago, the maintainer released version 1.5.9, but it remains unclear if the security issue has been fixed.\u003c/li\u003e\n\u003cli\u003eBleepingComputer contacted the Chroma team about the status of CVE-2026-45829 but had not received a response by publication time.\u003c/li\u003e\n\u003cli\u003eUntil a patch is confirmed, impacted users should:\n\n\u003cul\u003e\n\u003cli\u003ePick the Rust frontend for their deployments\u003c/li\u003e\n\u003cli\u003eAvoid exposing the Python server publicly\u003c/li\u003e\n\u003cli\u003eRestrict network access to the ChromaDB API port\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eResearchers also recommend scanning ML model artifacts before runtime because loading public models with \u0026lsquo;trust_remote_code\u0026rsquo; effectively means executing untrusted code.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A max-severity vulnerability (CVE-2026-45829) in the Python FastAPI version of ChromaDB allows unauthenticated attackers to run arbitrary code on exposed servers.","The flaw lets attackers embed model settings before authentication checks, enabling them to send a crafted request to load and execute a malicious model from Hugging Face locally.","The vulnerability was introduced in ChromaDB 1.0.0 and remained unpatched in version 1.5.8; version 1.5.9 was released but it is unclear if the security issue has been fixed.","Roughly 73% of internet-exposed ChromaDB instances are running a vulnerable version, and mitigation options include using the Rust frontend or restricting network access to the API port."],"insights":["The authentication check is present but placed after the malicious model is fetched and executed, making it completely ineffective against this attack.","The project maintainer has not responded to multiple contact attempts via email and social media for weeks, leaving users uncertain whether version 1.5.9 actually fixes the vulnerability.","The flaw highlights that loading public models with 'trust_remote_code' is equivalent to executing untrusted code, a broader risk for any AI deployment using remote model artifacts."],"referencedReports":[{"title":"Chromatoast Served Pre-Auth","url":"https://www.hiddenlayer.com/research/chromatoast-served-pre-auth","publisher":"HiddenLayer","context":"The article references HiddenLayer's research to explain how the vulnerability works and that authentication is placed after model execution.","category":"","primary":false}],"body":"\u003cp\u003eA max-severity vulnerability (CVE-2026-45829) in ChromaDB\u0026rsquo;s Python FastAPI server allows unauthenticated attackers to execute arbitrary code on exposed servers. The flaw was discovered by HiddenLayer and reported to ChromaDB on February 17, but the maintainer has not responded.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists because an API endpoint performs authentication checks after loading a model from Hugging Face. An attacker can send a crafted request to load a malicious model before the server verifies credentials, bypassing security entirely.\u003c/p\u003e\n\n\u003cp\u003eRoughly 73% of internet-exposed ChromaDB instances are running a vulnerable version (1.0.0 through 1.5.8). Users are advised to use the Rust frontend, restrict network access to the API port, or scan ML model artifacts before runtime.\u003c/p\u003e\n"},{"n":14,"title":"GitHub investigates internal repositories breach claimed by TeamPCP","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/github-investigates-internal-repositories-breach-claimed-by-teampcp/","time":"05:08","priority":"MUST READ","score":95,"tldr":"GitHub is investigating a breach of its internal repositories claimed by the TeamPCP hacker group, who say they accessed around 4,000 private code repositories, though GitHub has not yet found evidence that customer data was affected.","briefOverview":"\u003cp\u003eGitHub is investigating unauthorized access to its internal repositories after the hacker group TeamPCP claimed to have stolen approximately 4,000 repositories of private code. The group posted the claim on the Breached hacking forum, demanding at least $50,000 for the data and stating they would leak it for free if no buyer is found.\u003c/p\u003e\n\n\u003cp\u003eGitHub told BleepingComputer that it has not found evidence that customer information stored outside its internal repositories was affected. The company is monitoring its infrastructure and will alert affected customers through established channels if any impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP has been linked to previous supply chain attacks targeting developer platforms including GitHub, PyPI, NPM, and Docker. The group also compromised Aqua Security\u0026rsquo;s Trivy vulnerability scanner, which led to cascading impacts on Docker images and the Checkmarx KICS project, as well as the LiteLLM Python library.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub confirmed it is investigating a breach of its internal repositories after the hacker group TeamPCP claimed to have accessed approximately 4,000 repositories containing private code. The group made the claim on the Breached hacking forum on Tuesday, demanding at least $50,000 and stating that if no buyer is found they will leak the data for free. GitHub responded by stating that it currently has no evidence that customer data stored outside its internal repositories has been affected, but it is closely monitoring its infrastructure for follow-on activity and will notify customers if any impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP is a known threat actor previously linked to multiple supply chain attacks targeting developer code platforms. The article notes that the group has targeted GitHub, PyPI, NPM, and Docker in past incidents. In March, TeamPCP compromised Aqua Security\u0026rsquo;s Trivy vulnerability scanner, which led to cascading compromises affecting Aqua Security Docker images and the Checkmarx KICS project. The Trivy breach also impacted the LiteLLM open-source Python library, infecting tens of thousands of devices with the group\u0026rsquo;s information-stealing malware.\u003c/p\u003e\n\n\u003cp\u003eMore recently, TeamPCP was linked to the \u0026lsquo;Mini Shai-Hulud\u0026rsquo; supply-chain campaign, which impacted the devices of two OpenAI employees. The group also threatened to leak Mistral AI source code that was stolen using compromised CI/CD credentials. These prior attacks demonstrate a pattern of targeting developer infrastructure and software supply chains.\u003c/p\u003e\n\n\u003cp\u003eGitHub\u0026rsquo;s cloud-based development platform serves over 4 million organizations, including 90% of the Fortune 100, and more than 180 million developers contributing to over 420 million code repositories. The company has not yet shared additional details about the investigation but has committed to alerting affected customers through established notification and incident response channels if evidence of impact emerges.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003eGitHub is investigating a breach of its internal repositories after the hacker group TeamPCP claimed to have accessed approximately 4,000 repositories containing private code. The claim was posted on the Breached hacking forum on Tuesday, with the group asking for at least $50,000 and stating that if no buyer is found the data will be leaked for free. GitHub\u0026rsquo;s cloud-based development platform is used by more than 4 million organizations (including 90% of the Fortune 100) and over 180 million developers contributing to more than 420 million code repositories.\u003c/p\u003e\n\n\u003ch2 id=\"github-s-response\"\u003eGitHub\u0026rsquo;s Response\u003c/h2\u003e\n\n\u003cp\u003eGitHub told BleepingComputer that it is investigating unauthorized access to its internal repositories. The company stated that it currently has no evidence of impact to customer information stored outside of GitHub\u0026rsquo;s internal repositories, such as customers\u0026rsquo; enterprises, organizations, and repositories. GitHub is closely monitoring its infrastructure for follow-on activity and will alert all affected customers through established notification and incident response channels if any evidence of impact is discovered.\u003c/p\u003e\n\n\u003ch2 id=\"teampcp-s-claims-and-demands\"\u003eTeamPCP\u0026rsquo;s Claims and Demands\u003c/h2\u003e\n\n\u003cp\u003eTeamPCP claimed access to \u0026ldquo;Github\u0026rsquo;s source code and internal orgs\u0026rdquo; on the Breached forum. Their post stated: \u0026ldquo;No low ball offers will be accepted, everything for the main platform is there and I very am happy to send samples to interested buyers to verify the absolute authenticity. There is a total of around ~4,000 repos of private code here.\u0026rdquo; The group explicitly stated this is not a ransom and that they do not care about extorting GitHub, adding that if no buyer is found they will leak the data for free.\u003c/p\u003e\n\n\u003ch2 id=\"previous-teampcp-attacks\"\u003ePrevious TeamPCP Attacks\u003c/h2\u003e\n\n\u003cp\u003eThe article documents several prior attacks attributed to TeamPCP:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSupply chain attacks on developer platforms:\u003c/strong\u003e GitHub, PyPI, NPM, and Docker.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAqua Security Trivy vulnerability scanner compromise (March):\u003c/strong\u003e Believed to have led to cascading compromises affecting Aqua Security Docker images and the Checkmarx KICS project.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLiteLLM open-source Python library compromise:\u003c/strong\u003e Infected tens of thousands of devices with \u0026ldquo;TeamPCP Cloud Stealer\u0026rdquo; information-stealing malware.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\u0026ldquo;Mini Shai-Hulud\u0026rdquo; supply-chain campaign:\u003c/strong\u003e Impacted the devices of two OpenAI employees.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMistral AI source code theft:\u003c/strong\u003e The group threatened to leak Mistral AI code stolen using compromised CI/CD credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cp\u003eThe article also includes links to related articles covering other data breaches (7-Eleven confirmed data breach by ShinyHunters, Grafana stolen GitHub token incident, home security giant ADT data breach affecting 5.5 million people). However, these are provided as related articles and not part of the main story.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe breach is limited to GitHub\u0026rsquo;s internal repositories; customer data outside those repositories appears unaffected so far.\u003c/li\u003e\n\u003cli\u003eTeamPCP is selling the data rather than demanding ransom, with a threat to leak publicly if no buyer is found.\u003c/li\u003e\n\u003cli\u003eThe group has a history of targeting developer infrastructure and supply chains, making this incident part of a broader pattern of attacks.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["GitHub is investigating unauthorized access to its internal repositories after the TeamPCP hacker group claimed to have accessed approximately 4,000 repositories containing private code.","GitHub stated that it currently has no evidence that customer data stored outside its internal repositories has been affected.","TeamPCP claimed access to GitHub's source code and internal orgs on the Breached hacking forum, asking for at least $50,000 for the data.","TeamPCP has previously been linked to supply chain attacks targeting multiple developer code platforms, including GitHub, PyPI, NPM, and Docker."],"insights":["TeamPCP explicitly stated they are not trying to extort GitHub but instead selling the stolen data, noting that if no buyer is found they will leak it for free, which is a different threat model than typical ransomware extortion.","The earlier Trivy vulnerability scanner breach by TeamPCP caused a cascade of downstream compromises affecting Aqua Security Docker images, the Checkmarx KICS project, and the LiteLLM Python library, illustrating how a single supply chain attack can amplify across multiple platforms.","TeamPCP's attack on the LiteLLM open-source library infected tens of thousands of devices with their 'TeamPCP Cloud Stealer' information-stealing malware, showing the group's capability to weaponize compromised packages at scale."],"referencedReports":[{"title":"TeamPCP Expands Supply Chain Compromise: Spreads from Trivy to Checkmarx GitHub Actions","url":"https://www.sysdig.com/blog/teampcp-expands-supply-chain-compromise-spreads-from-trivy-to-checkmarx-github-actions","publisher":"Sysdig","context":"The article references this technical analysis to show how the Trivy breach cascaded to affect the Checkmarx KICS project.","category":"","primary":false}],"body":"\u003cp\u003eGitHub is investigating unauthorized access to its internal repositories after the hacker group TeamPCP claimed to have stolen approximately 4,000 repositories of private code. The group posted the claim on the Breached hacking forum, demanding at least $50,000 for the data and stating they would leak it for free if no buyer is found.\u003c/p\u003e\n\n\u003cp\u003eGitHub told BleepingComputer that it has not found evidence that customer information stored outside its internal repositories was affected. The company is monitoring its infrastructure and will alert affected customers through established channels if any impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP has been linked to previous supply chain attacks targeting developer platforms including GitHub, PyPI, NPM, and Docker. The group also compromised Aqua Security\u0026rsquo;s Trivy vulnerability scanner, which led to cascading impacts on Docker images and the Checkmarx KICS project, as well as the LiteLLM Python library.\u003c/p\u003e\n"},{"n":19,"title":"Microsoft Takes Down Malware-Signing Service Behind Ransomware Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/microsoft-takes-down-malware-signing.html","time":"14:36","priority":"MUST READ","score":95,"tldr":"Microsoft disrupted a malware-signing service called Fox Tempest that fraudulently used its Artifact Signing system to sign malicious code, enabling ransomware and other attacks, and seized their infrastructure.","briefOverview":"\u003cp\u003eMicrosoft disrupted a malware-signing-as-a-service (MSaaS) operation called Fox Tempest, which abused the company\u0026rsquo;s Artifact Signing system to generate fraudulent code-signing certificates. The operation used stolen identities from the United States and Canada to pass identity validation and obtain certificates valid for 72 hours, allowing cybercriminals to sign malicious binaries. The service cost between \u003cspan class=\"math inline\"\u003e\\(5,000 and \\)\u003c/span\u003e9,000 and enabled the deployment of ransomware strains such as Rhysida, INC, Qilin, BlackByte, and Akira.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft seized Fox Tempest\u0026rsquo;s website signspace.cloud, took down hundreds of virtual machines, and blocked access to a hosting site. The threat actor initially provided an admin panel for file uploads but later shifted to offering pre-configured virtual machines on Cloudzy to reduce customer friction. The disruption was codenamed OpFauxSign, and Microsoft worked with a cooperative source to purchase and test the service in early 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft announced the disruption of a malware-signing-as-a-service operation attributed to a threat actor it calls Fox Tempest. The operation weaponized Microsoft\u0026rsquo;s Artifact Signing system (formerly Azure Trusted Signing) to generate short-lived, fraudulent code-signing certificates. Fox Tempest used stolen identities from the United States and Canada to pass the identity validation required by Artifact Signing, obtaining certificates that were valid for only 72 hours. The service allowed paying customers to upload malicious files for signing, with prices ranging from \u003cspan class=\"math inline\"\u003e\\(5,000 to \\)\u003c/span\u003e9,000.\u003c/p\u003e\n\n\u003cp\u003eThe signed malware was then used to deploy ransomware strains including Rhysida, INC, Qilin, BlackByte, and Akira, as well as other malware families like Oyster, Lumma Stealer, and Vidar. Vanilla Tempest, the threat actor behind Rhysida, distributed signed binaries through legitimately purchased advertisements that redirected users searching for Microsoft Teams to bogus download pages. The malware masqueraded as legitimate software such as AnyDesk, Microsoft Teams, PuTTY, and Cisco Webex.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft seized the Fox Tempest website signspace.cloud, took offline hundreds of virtual machines running the operation, and blocked access to a site hosting the underlying code. Initially, Fox Tempest used an admin panel and user page built on Artifact Signing. Starting February 2026, the threat actor shifted to providing pre-configured virtual machines hosted on Cloudzy, allowing customers to upload artifacts directly and receive signed binaries. This infrastructure evolution reduced friction for customers and improved operational security for Fox Tempest.\u003c/p\u003e\n\n\u003cp\u003eAttacks targeted healthcare, education, government, and financial services across the United States, France, India, and China. Microsoft noted that when attackers can make malicious software look legitimate, it undermines trust in software safety. The company\u0026rsquo;s Digital Crimes Unit led the disruption effort, with Steven Masada announcing the action. Court documents reveal that Microsoft worked with a cooperative source to purchase and test the service between February and March 2026.\u003c/p\u003e\n\n\u003cp\u003eAfter Microsoft enacted countermeasures such as disabling fraudulent accounts and revoking certificates, Fox Tempest attempted to shift to a different code-signing service. This demonstrated the threat actor\u0026rsquo;s adaptability despite the disruption. Microsoft emphasized that disrupting the ability to sign malicious code is key to raising the cost of cybercrime.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn May 19, 2026, Microsoft announced the disruption of a malware-signing-as-a-service (MSaaS) operation attributed to a threat actor it tracks as Fox Tempest. The operation abused Microsoft\u0026rsquo;s Artifact Signing system (formerly Azure Trusted Signing) to generate legitimate-looking code-signing certificates for malicious software. The disruption, codenamed OpFauxSign, involved seizing the actor\u0026rsquo;s website, taking down hundreds of virtual machines, and blocking access to a code-hosting site.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eFox Tempest leveraged Microsoft\u0026rsquo;s Artifact Signing, a fully managed signing solution designed to allow developers to build and distribute applications with verified legitimacy. To obtain signed certificates through Artifact Signing, requestors must pass detailed identity validation processes using industry-standard verifiable credentials. The article states that Fox Tempest very likely used stolen identities based in the United States and Canada to masquerade as legitimate entities and obtain the necessary digital credentials. The certificates were valid for only 72 hours, limiting their lifespan but enabling temporary trust.\u003c/p\u003e\n\n\u003cp\u003eThe service was offered via a website called SignSpace, built on Artifact Signing, which enabled secure file signing through an admin panel and user page. It leveraged Azure subscriptions, certificates, and a structured database for managing users and files. Cybercriminal customers could pay between \u003cspan class=\"math inline\"\u003e\\(5,000 and \\)\u003c/span\u003e9,000 to upload malicious files for code-signing using certificates fraudulently obtained by Fox Tempest. The malware was disguised as legitimate software including AnyDesk, Microsoft Teams, PuTTY, and Cisco Webex.\u003c/p\u003e\n\n\u003cp\u003eStarting in February 2026, Fox Tempest shifted its infrastructure to provide pre-configured virtual machines hosted on Cloudzy. This allowed customers to directly upload artifacts to attacker-controlled infrastructure and receive signed binaries in return, reducing friction for customers and improving operational security for Fox Tempest.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-malware\"\u003eAffected Parties and Malware\u003c/h2\u003e\n\n\u003cp\u003eThe signed malware enabled the deployment of Rhysida ransomware by the threat actor Vanilla Tempest. Additionally, connections were uncovered between Fox Tempest and affiliates associated with INC, Qilin, BlackByte, and Akira ransomware strains. Other malware families distributed through the service included Oyster (also known as Broomstick or CleanUpLoader), Lumma Stealer, and Vidar.\u003c/p\u003e\n\n\u003cp\u003eVanilla Tempest distributed signed binaries via legitimately purchased advertisements. Users searching for Microsoft Teams were redirected to bogus download pages, leading to the installation of the Oyster backdoor, which then delivered Rhysida ransomware.\u003c/p\u003e\n\n\u003cp\u003eTargeted sectors included healthcare, education, government, and financial services. Geographic targets included the United States, France, India, and China.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response-and-disruption\"\u003eMicrosoft\u0026rsquo;s Response and Disruption\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft\u0026rsquo;s Digital Crimes Unit conducted the disruption. Specific actions included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSeizing Fox Tempest\u0026rsquo;s website signspace.cloud\u003c/li\u003e\n\u003cli\u003eTaking offline hundreds of virtual machines running the operation\u003c/li\u003e\n\u003cli\u003eBlocking access to a site hosting the underlying code\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCourt documents reveal that Microsoft worked with a \u0026ldquo;cooperative source\u0026rdquo; to purchase and test the service between February and March 2026, indicating a proactive investigative approach.\u003c/p\u003e\n\n\u003cp\u003eAs Microsoft enacted countermeasures such as disabling fraudulent accounts and revoking the illicitly obtained certificates, Fox Tempest continually adapted its tradecraft. The threat actor even attempted to shift to a different code-signing service, demonstrating resilience despite the disruption.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft emphasized that when attackers can make malicious software look legitimate, it undermines how people and systems decide what\u0026rsquo;s safe. Disrupting that capability is key to raising the cost of cybercrime. The operation highlights the critical role of signing services in the cybercrime ecosystem and the importance of securing identity validation processes for certificate issuance.\u003c/p\u003e\n","keyPoints":["Microsoft disrupted a malware-signing-as-a-service (MSaaS) operation called Fox Tempest that weaponized the company's Artifact Signing system to deliver malicious code and conduct ransomware and other attacks.","Fox Tempest used stolen identities based in the United States and Canada to obtain legitimate code-signing certificates through Microsoft's Artifact Signing service, with certificates valid for only 72 hours.","The service allowed paying cybercriminal customers to upload malicious files for code-signing, costing between $5,000 and $9,000, and enabled malware to masquerade as legitimate software like AnyDesk, Microsoft Teams, PuTTY, and Cisco Webex.","Microsoft seized Fox Tempest's website signspace.cloud, took offline hundreds of the virtual machines running the operation, and blocked access to a site hosting the underlying code."],"insights":["The shift to providing pre-configured virtual machines hosted on Cloudzy allowed Fox Tempest to reduce friction for customers and improve its own operational security, indicating how infrastructure evolution can streamline criminal operations.","Microsoft worked with a 'cooperative source' to purchase and test the fraudulently signed malware service between February and March 2026, demonstrating a proactive investigative approach to understand and disrupt the operation.","After Microsoft enacted countermeasures, Fox Tempest attempted to shift to a different code-signing service, highlighting the resilience and adaptability of cybercrime services even when their primary infrastructure is disrupted."],"referencedReports":[{"title":"Disrupting Fox Tempest, a cybercrime service","url":"https://blogs.microsoft.com/on-the-issues/2026/05/19/disrupting-fox-tempest-a-cybercrime-service/","publisher":"Microsoft","context":"The article references this blog post for Microsoft's announcement of the disruption and attribution to Fox Tempest.","category":"","primary":false},{"title":"Exposing Fox Tempest, a malware-signing service operation","url":"https://www.microsoft.com/en-us/security/blog/2026/05/19/exposing-fox-tempest-a-malware-signing-service-operation/","publisher":"Microsoft","context":"The article references this security blog for the technical explanation of how Fox Tempest abused Azure Artifact Signing.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft disrupted a malware-signing-as-a-service (MSaaS) operation called Fox Tempest, which abused the company\u0026rsquo;s Artifact Signing system to generate fraudulent code-signing certificates. The operation used stolen identities from the United States and Canada to pass identity validation and obtain certificates valid for 72 hours, allowing cybercriminals to sign malicious binaries. The service cost between \u003cspan class=\"math inline\"\u003e\\(5,000 and \\)\u003c/span\u003e9,000 and enabled the deployment of ransomware strains such as Rhysida, INC, Qilin, BlackByte, and Akira.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft seized Fox Tempest\u0026rsquo;s website signspace.cloud, took down hundreds of virtual machines, and blocked access to a hosting site. The threat actor initially provided an admin panel for file uploads but later shifted to offering pre-configured virtual machines on Cloudzy to reduce customer friction. The disruption was codenamed OpFauxSign, and Microsoft worked with a cooperative source to purchase and test the service in early 2026.\u003c/p\u003e\n"},{"n":20,"title":"Grafana GitHub Breach Exposes Source Code via TanStack npm Attack","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/grafana-github-breach-exposes-source.html","time":"05:12","priority":"MUST READ","score":95,"tldr":"Grafana Labs confirmed its breach originated from the TanStack npm supply chain attack by TeamPCP, with attackers accessing GitHub repositories containing source code and internal business information but no customer production systems.","briefOverview":"\u003cp\u003eGrafana Labs announced on May 19, 2026, that its recent breach originated from the TanStack npm supply chain attack orchestrated by TeamPCP, which also hit OpenAI and Mistral AI. The incident was limited to the Grafana Labs GitHub environment, exposing public and private source code as well as internal repositories containing business contact names and email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe company detected the activity on May 11, 2026, and quickly rotated numerous GitHub workflow tokens, but a single missed token allowed attackers to gain access to their repositories. A subsequent review confirmed that a specific GitHub workflow originally deemed not impacted had actually been compromised.\u003c/p\u003e\n\n\u003cp\u003eGrafana received an extortion demand from an unnamed threat actor on May 16 but chose not to pay, citing no guarantee of data deletion and the risk of encouraging future campaigns. The company has since rotated automation tokens, enhanced monitoring, audited commits, and strengthened its GitHub security posture.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn May 19, 2026, Grafana Labs provided an update on its recent breach, stating that no customer production systems or operations were compromised. The scope was limited to the Grafana Labs GitHub environment, which included public and private source code along with internal GitHub repositories used for collaboration on operational information and business details.\u003c/p\u003e\n\n\u003cp\u003eThe breach originated from the TanStack npm supply chain attack orchestrated by TeamPCP, which also targeted OpenAI and Mistral AI. Grafana detected the activity on May 11, 2026, and performed an initial analysis, rotating a significant number of GitHub workflow tokens. However, a missed token led to the attackers gaining access to their GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eA subsequent review revealed that a specific GitHub workflow initially deemed not impacted had actually been compromised. On May 16, an unnamed threat actor issued an extortion demand to Grafana, which the company declined to pay, reasoning that payment would not guarantee data deletion and could act as a catalyst for future campaigns.\u003c/p\u003e\n\n\u003cp\u003eIn response, Grafana rotated automation tokens, implemented enhanced monitoring, audited all commits for malicious activity, and bolstered its overall GitHub security posture. Separately, a data extortion crew named CoinbaseCartel listed Grafana Labs on its dark web site on May 15, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that GitHub is investigating unauthorized access to its internal repositories after TeamPCP listed the platform\u0026rsquo;s source code and internal organizations for sale on a cybercrime forum.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs disclosed the findings of its investigation into a breach that was first detected on May 11, 2026. The company confirmed that the incident originated from the TanStack npm supply chain attack orchestrated by the threat actor known as TeamPCP, which also compromised OpenAI and Mistral AI. The breach was limited to the Grafana Labs GitHub environment and did not affect customer production systems or operations.\u003c/p\u003e\n\n\u003ch2 id=\"timeline\"\u003eTimeline\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMay 11, 2026\u003c/strong\u003e: Grafana detected the malicious activity and began analysis. They rotated a significant number of GitHub workflow tokens, but one token was missed.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMay 15, 2026\u003c/strong\u003e: A data extortion crew named CoinbaseCartel listed Grafana Labs on its dark web site.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMay 16, 2026\u003c/strong\u003e: An unnamed threat actor sent an extortion demand to Grafana.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMay 19, 2026\u003c/strong\u003e: Grafana published its security update detailing the breach and response.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe attackers gained access through a GitHub workflow token that was originally deemed not impacted. After the initial token rotation, a subsequent review confirmed that this specific workflow had actually been compromised. The compromised content included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePublic and private source code from Grafana\u0026rsquo;s GitHub repositories.\u003c/li\u003e\n\u003cli\u003eInternal GitHub repositories used by Grafana Labs teams for operational information and business details.\u003c/li\u003e\n\u003cli\u003eBusiness contact names and email addresses exchanged in professional relationships (not from production systems or the Grafana Cloud platform).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCustomer systems\u003c/strong\u003e: No evidence of compromise to customer production systems or operations.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData exposed\u003c/strong\u003e: Source code and internal business information, including professional contact details.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo indication\u003c/strong\u003e that the stolen data included information from Grafana Cloud platform or processed from production systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-and-extortion\"\u003eThreat Actor and Extortion\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe initial breach was executed by TeamPCP via the TanStack npm supply chain attack.\u003c/li\u003e\n\u003cli\u003eOn May 16, a separate unnamed threat actor made an extortion demand.\u003c/li\u003e\n\u003cli\u003eGrafana refused to pay, stating: \u0026ldquo;there is no guarantee that the stolen data would actually be deleted, and could act as a catalyst for future campaigns.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eCoinbaseCartel, a different extortion crew, listed Grafana on its dark web site on May 15.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response\"\u003eResponse\u003c/h2\u003e\n\n\u003cp\u003eGrafana took the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRotated all automation tokens.\u003c/li\u003e\n\u003cli\u003eImplemented enhanced monitoring.\u003c/li\u003e\n\u003cli\u003eAudited all commits for signs of malicious activity.\u003c/li\u003e\n\u003cli\u003eBolstered overall GitHub security posture.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-incidents\"\u003eRelated Incidents\u003c/h2\u003e\n\n\u003cp\u003eThe article also reports that GitHub is investigating unauthorized access to its internal repositories after TeamPCP listed the platform\u0026rsquo;s source code and internal organizations for sale on a cybercrime forum.\u003c/p\u003e\n","keyPoints":["Grafana Labs detected the breach on May 11, 2026, originating from the TanStack npm supply chain attack orchestrated by TeamPCP.","The incident was limited to the Grafana Labs GitHub environment, exposing public and private source code along with internal repositories containing business contact names and email addresses.","A missed GitHub workflow token that was originally deemed not impacted allowed attackers to gain access to Grafana's GitHub repositories.","Grafana received an extortion demand from an unnamed threat actor on May 16, 2026, but chose not to pay the ransom.","A data extortion crew named CoinbaseCartel listed Grafana Labs on its dark web site on May 15, 2026."],"insights":["The breach succeeded because a GitHub workflow token initially deemed not impacted was later confirmed compromised, highlighting how time-pressured token rotations can miss critical credentials.","Grafana refused the extortion demand explicitly because paying would not guarantee data deletion and could incentivize future attacks, an actionable stance for incident response planning.","The CoinbaseCartel data extortion crew listed Grafana on its dark web site on May 15, a day before the unnamed threat actor issued the extortion demand on May 16, suggesting possible separate or overlapping threat actors."],"referencedReports":[],"body":"\u003cp\u003eGrafana Labs announced on May 19, 2026, that its recent breach originated from the TanStack npm supply chain attack orchestrated by TeamPCP, which also hit OpenAI and Mistral AI. The incident was limited to the Grafana Labs GitHub environment, exposing public and private source code as well as internal repositories containing business contact names and email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe company detected the activity on May 11, 2026, and quickly rotated numerous GitHub workflow tokens, but a single missed token allowed attackers to gain access to their repositories. A subsequent review confirmed that a specific GitHub workflow originally deemed not impacted had actually been compromised.\u003c/p\u003e\n\n\u003cp\u003eGrafana received an extortion demand from an unnamed threat actor on May 16 but chose not to pay, citing no guarantee of data deletion and the risk of encouraging future campaigns. The company has since rotated automation tokens, enhanced monitoring, audited commits, and strengthened its GitHub security posture.\u003c/p\u003e\n"},{"n":23,"title":"GitHub Investigating TeamPCP Claimed Breach of ~4,000 Internal Repositories","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/github-investigating-teampcp-claimed.html","time":"04:01","priority":"MUST READ","score":95,"tldr":"Threat actor TeamPCP breached GitHub's internal repositories and compromised the durabletask PyPI package, deploying a self-replicating credential-stealing worm that propagates across cloud and Kubernetes environments.","briefOverview":"\u003cp\u003eGitHub is investigating unauthorized access to its internal repositories after threat actor TeamPCP listed the source code and internal organizations for sale on a cybercrime forum for at least $50,000. The company detected and contained a compromise of an employee device involving a poisoned Microsoft Visual Studio Code extension and has rotated critical secrets as a risk mitigation measure.\u003c/p\u003e\n\n\u003cp\u003eConcurrently, TeamPCP compromised the durabletask PyPI package, Microsoft\u0026rsquo;s Python client for Durable Task, by obtaining publishing tokens from a prior GitHub account breach. The malicious package versions (1.4.1, 1.4.2, 1.4.3) contain a dropper that fetches a second-stage infostealer designed to harvest credentials from cloud providers, password managers, and developer tools on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware propagates itself within AWS environments using SSM and within Kubernetes via kubectl exec, and uses a FIRESCALE mechanism to locate backup command-and-control servers from public GitHub commit messages. The package is downloaded roughly 417,000 times a month, and the malicious code runs automatically upon import with no visible signs of compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub on Tuesday announced it is investigating unauthorized access to its internal repositories after the threat actor TeamPCP listed the platform\u0026rsquo;s source code for sale on a cybercrime forum. The actor claims to have exfiltrated approximately 4,000 repositories and is asking for no less than $50,000. GitHub stated it has no evidence of impact to customer information stored outside of internal repositories, but is closely monitoring infrastructure and will notify customers if any impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eThe compromise was traced to an employee device that was infected via a poisoned Microsoft Visual Studio Code extension. GitHub contained the incident, rotated critical secrets, and prioritized highest-impact credentials. The attacker\u0026rsquo;s claim of roughly 3,800 repositories is directionally consistent with GitHub\u0026rsquo;s investigation. An X account linked to TeamPCP accused GitHub of delaying disclosure.\u003c/p\u003e\n\n\u003cp\u003eSeparately, TeamPCP compromised the durabletask PyPI package, an official Microsoft Python client for the Durable Task workflow execution framework. The attacker used a prior GitHub account compromise to extract secrets from a repository, which provided access to the PyPI token to publish three malicious versions: 1.4.1, 1.4.2, and 1.4.3. The payload is a dropper that downloads and runs a second-stage stealer from an external server.\u003c/p\u003e\n\n\u003cp\u003eThe stealer, assessed to be an evolution of a payload used in a previous guardrails-ai compromise, executes only on Linux systems. It harvests credentials from major cloud providers, password managers (1Password, Bitwarden), and developer tools, and exfiltrates data to attacker-controlled domains. It also attempts to read HashiCorp Vault KV secrets, access SSH keys, Docker credentials, VPN configurations, and shell history.\u003c/p\u003e\n\n\u003cp\u003eThe malware propagates itself using stolen tokens: if running in AWS, it uses SSM to spread to other EC2 instances; if in Kubernetes, it spreads via kubectl exec. A destructive trigger exists for Israeli or Iranian system settings, with a 1-in-6 chance of playing audio and executing \u0026lsquo;rm -rf /*\u0026rsquo;. The malware also uses a FIRESCALE mechanism that scans public GitHub commit messages for a pattern to extract backup command-and-control server addresses.\u003c/p\u003e\n\n\u003cp\u003eOrganizations that installed the affected durabletask versions should treat any machine or pipeline as fully compromised. The package is downloaded approximately 417,000 times a month, and the malicious code runs automatically on import with no error messages. Multiple security firms including Wiz, SafeDep, Aikido Security, StepSecurity, and Endor Labs have published technical analyses of the attack.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-incident-github-internal-repository-breach\"\u003eCore Incident: GitHub Internal Repository Breach\u003c/h2\u003e\n\n\u003cp\u003eGitHub confirmed on Tuesday that it is investigating unauthorized access to its internal repositories. The threat actor TeamPCP listed the source code and internal organizations for sale on a cybercrime forum with an asking price of no less than $50,000. The actor claimed to have exfiltrated approximately 4,000 repositories and stated that if no buyer is found, they will leak the data for free, noting that this is not a ransom and they do not care about extorting GitHub.\u003c/p\u003e\n\n\u003cp\u003eGitHub\u0026rsquo;s investigation revealed that the compromise originated from an employee device that was infected via a poisoned Microsoft Visual Studio Code extension. The company detected and contained the incident, rotated critical secrets, and prioritized highest-impact credentials. GitHub noted that the attacker\u0026rsquo;s claim of approximately 3,800 repositories is directionally consistent with their investigation so far.\u003c/p\u003e\n\n\u003cp\u003eGitHub stated that they currently have no evidence of impact to customer information stored outside of GitHub\u0026rsquo;s internal repositories, such as customers\u0026rsquo; enterprises, organizations, and repositories. The company will notify customers via established incident response channels if any impact is discovered. An X account linked to TeamPCP accused GitHub of knowing about the breach for hours before disclosure and stated they would not be honest in the future.\u003c/p\u003e\n\n\u003ch2 id=\"supply-chain-attack-durabletask-pypi-package\"\u003eSupply Chain Attack: Durabletask PyPI Package\u003c/h2\u003e\n\n\u003cp\u003eConcurrently with the GitHub breach, TeamPCP compromised the durabletask PyPI package, an official Microsoft Python client for the Durable Task workflow execution framework. Three malicious versions were identified: 1.4.1, 1.4.2, and 1.4.3. According to Wiz (Google-owned), the attacker compromised a GitHub account via a previous attack, dumped GitHub secrets from a repository to which the user had access, and from there obtained the PyPI token to publish malicious versions directly.\u003c/p\u003e\n\n\u003ch3 id=\"malware-payload-and-capabilities\"\u003eMalware Payload and Capabilities\u003c/h3\u003e\n\n\u003cp\u003eThe malicious package contains a dropper that fetches and runs a second-stage payload (rope.pyz) from an external server (check.git-service[.]com). The malware is assessed to be an evolution of the payload deployed in connection with the compromise of the guardrails-ai package last week. It is a full-featured infostealer that executes only on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eThe stealer harvests credentials associated with major cloud providers, password managers, and developer tools. According to SafeDep, the 28KB Python stealer attempts to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRead HashiCorp Vault KV secrets\u003c/li\u003e\n\u003cli\u003eUnlock and dump 1Password and Bitwarden password vaults\u003c/li\u003e\n\u003cli\u003eAccess SSH keys, Docker credentials, VPN configurations, and shell history\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eData is exfiltrated to attacker-controlled domains.\u003c/p\u003e\n\n\u003ch3 id=\"propagation-mechanisms\"\u003ePropagation Mechanisms\u003c/h3\u003e\n\n\u003cp\u003eThe malware propagates using tokens stolen from infected environments. Aikido Security reported that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIf the machine is running inside AWS, it propagates itself to other EC2 instances using SSM.\u003c/li\u003e\n\u003cli\u003eIf it\u0026rsquo;s inside Kubernetes, it propagates through kubectl exec.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eStepSecurity provided additional detail: after enumerating SSM-managed instances, the malware uses SendCommand with the AWS-RunShellScript document to execute the rope.pyz payload on up to 5 other EC2 instances per profile. The propagation script downloads the payload from the primary C2 server, falling back to a secondary domain (t.m-kosche[.]com).\u003c/p\u003e\n\n\u003ch3 id=\"destructive-trigger\"\u003eDestructive Trigger\u003c/h3\u003e\n\n\u003cp\u003eAikido Security noted that if the malware detects Israeli or Iranian system settings, there is a 1-in-6 chance it plays audio and then executes \u0026lsquo;rm -rf /*\u0026rsquo;, a destructive command that deletes all files on the system.\u003c/p\u003e\n\n\u003ch3 id=\"firescale-backup-c2-mechanism\"\u003eFIRESCALE Backup C2 Mechanism\u003c/h3\u003e\n\n\u003cp\u003eA notable technique used by the malware is the FIRESCALE mechanism to identify a backup command-and-control address if the primary domain is unreachable. It does this by searching GitHub\u0026rsquo;s public commit messages for the pattern \u0026ldquo;FIRESCALE \u003cbase64_url\u003e.\u003cbase64_signature\u003e\u0026rdquo; and extracting the C2 information from it. This technique was previously highlighted by Hunt.io in relation to the TanStack supply chain attack.\u003c/p\u003e\n\n\u003ch3 id=\"impact-and-response\"\u003eImpact and Response\u003c/h3\u003e\n\n\u003cp\u003eThe number of affected packages is expected to grow due to the worm-like propagation using stolen tokens. Endor Labs researcher Peyton Kennedy stated that the package is downloaded roughly 417,000 times a month, and the malicious code runs automatically the moment the package is imported, with no error messages and no visible signs of compromise. Any machine or pipeline that installed an affected version of the package should be treated as fully compromised.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-reports-referenced\"\u003eThird-Party Reports Referenced\u003c/h2\u003e\n\n\u003cp\u003eThe article links to and cites technical analyses from several security firms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWiz (Google-owned)\u003c/strong\u003e: Report on the durabletask supply chain attack, detailing the compromise chain (prev
