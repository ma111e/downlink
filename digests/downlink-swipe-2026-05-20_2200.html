e s1ngularity Nx compromise that weaponized AI CLI tools on developer machines to exfiltrate credentials; and the Mini Shai-Hulud wave hitting TanStack and other npm packages including OIDC token theft from GitHub Actions runners. In each incident, the hardest follow-up question was identifying which developer machines had the affected package, extension, or agent.\u003c/p\u003e\n\n\u003cp\u003eThe response encourages users to try the tool on Windows machines. For community users, the open-source binary is available on GitHub with all detection logic. For enterprise users, a free trial is offered. The article invites users to open issues on GitHub for any problems or detection suggestions, and closes with \u0026lsquo;Welcome to Windows.\u0026rsquo;\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eDev Machine Guard, previously limited to macOS, now runs natively on Windows. The same scanning engine, enterprise dashboard, and policies are extended to Windows developer machines. This release allows security teams to inventory and monitor both macOS and Windows developer machines from a single platform.\u003c/p\u003e\n\n\u003ch2 id=\"why-windows-coverage-matters\"\u003eWhy Windows Coverage Matters\u003c/h2\u003e\n\n\u003cp\u003eModern Windows developer machines face similar attack surfaces as macOS: AI coding agents like GitHub Copilot, Cursor, and Claude installed with elevated permissions; MCP servers connecting those agents to internal systems and credentials; IDE extensions auto-updating from VS Code Marketplace and OpenVSX registry; npm packages installed globally and across project directories; and local processes and shell tooling with access to credentials and source code. In many enterprises, Windows is the dominant platform. Before this release, security teams running mixed fleets had a real visibility gap: macOS machines were inventoried by Dev Machine Guard, while Windows machines were either covered by partial scripts shared over Slack or not covered at all. The article states that this gap is exactly what attackers target during a supply chain incident.\u003c/p\u003e\n\n\u003ch2 id=\"real-incidents-that-drove-this-work\"\u003eReal Incidents That Drove This Work\u003c/h2\u003e\n\n\u003cp\u003eThe article references three specific supply chain incidents:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eShai-Hulud npm worm campaign\u003c/strong\u003e: Compromised over 500 packages and earned a CISA advisory, propagating through CI/CD and developer environments.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003es1ngularity Nx compromise\u003c/strong\u003e: Weaponized AI CLI tools on developer machines to exfiltrate credentials.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMini Shai-Hulud wave\u003c/strong\u003e: Hit TanStack and other widely used npm packages, including OIDC token theft from GitHub Actions runners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn each incident, the hardest follow-up question was: \u0026ldquo;Which developer machines in our organization have the affected package, extension, or agent installed right now?\u0026rdquo; On macOS, Dev Machine Guard already answered that in one query. With Windows support, security teams can now answer it across their full Windows and macOS fleet from the same dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"what-is-included-in-this-release\"\u003eWhat Is Included in This Release\u003c/h2\u003e\n\n\u003ch3 id=\"platform\"\u003ePlatform\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 10 and Windows 11 developer machines\u003c/li\u003e\n\u003cli\u003eBoth AMD64 (x64) and ARM64 binaries, signed with Sigstore and published with build provenance\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"coverage\"\u003eCoverage\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI coding agents: Claude, Cursor, GitHub Copilot, Codex\u003c/li\u003e\n\u003cli\u003eAI CLI tools running on the machine\u003c/li\u003e\n\u003cli\u003eIDE extensions from both the VS Code Marketplace and the OpenVSX registry across VS Code, Cursor, Windsurf, Antigravity, and JetBrains products\u003c/li\u003e\n\u003cli\u003eInstalled IDEs and editor versions\u003c/li\u003e\n\u003cli\u003eMCP server configurations across supported agents\u003c/li\u003e\n\u003cli\u003enpm packages (both globally installed and per-project)\u003c/li\u003e\n\u003cli\u003eLocal frameworks, processes, and shell tooling\u003c/li\u003e\n\u003cli\u003eDevice inventory: hostname, OS version, serial number\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"how-windows-detections-work\"\u003eHow Windows Detections Work\u003c/h3\u003e\n\n\u003cp\u003eDev Machine Guard uses native Windows mechanisms instead of trying to fake a Unix environment:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplication discovery uses %LOCALAPPDATA%, %PROGRAMFILES%, and $PATH lookups\u003c/li\u003e\n\u003cli\u003eVersion information is read from the Windows Registry (HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Uninstall) rather than macOS Info.plist files\u003c/li\u003e\n\u003cli\u003eScheduled scanning uses Windows Task Scheduler via schtasks, in the same way macOS uses launchd\u003c/li\u003e\n\u003cli\u003eFile path handling uses filepath.Join throughout, so directory layouts work correctly under Windows drive letters and backslashes\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"modes\"\u003eModes\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCommunity mode\u003c/strong\u003e: runs fully locally, with nothing leaving the machine. Produces a JSON or HTML report.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnterprise mode\u003c/strong\u003e: reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, and historical reporting. The tier model is identical to macOS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"how-to-get-started\"\u003eHow To Get Started\u003c/h2\u003e\n\n\u003cp\u003eWindows uses the same binary and the same commands as macOS. For full rollout guidance, the article references the Installation Script documentation.\u003c/p\u003e\n\n\u003ch3 id=\"community-tier\"\u003eCommunity Tier\u003c/h3\u003e\n\n\u003cp\u003eFor individual developers and open-source maintainers, the open-source binary is free and runs entirely locally. The GitHub repository, including all detection logic, is available at github.com/step-security/dev-machine-guard.\u003c/p\u003e\n\n\u003ch3 id=\"enterprise-tier\"\u003eEnterprise Tier\u003c/h3\u003e\n\n\u003cp\u003eFor organizations rolling out across a Windows developer fleet, the Enterprise Tier adds:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCentralized dashboard with per-device drill-down\u003c/li\u003e\n\u003cli\u003ePolicy enforcement for IDE extensions, MCP servers, AI agents, and packages\u003c/li\u003e\n\u003cli\u003eCooldown periods on newly published npm and PyPI packages\u003c/li\u003e\n\u003cli\u003eAlerting on compromised dependencies, malicious extensions, and unapproved MCP servers\u003c/li\u003e\n\u003cli\u003eHistorical reporting and incident triage across the entire fleet\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eA free trial is offered.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eDev Machine Guard is built around a single open-source scanning engine that now runs on macOS and Windows. The same detections are added once and benefit both platforms. The same policies apply across the fleet from one dashboard. The article states that if you have been waiting for Windows coverage before rolling Dev Machine Guard out to your full developer organization, this is the release that closes the gap. It invites users to try it on Windows machines and open issues at the GitHub repository for any issues or detection suggestions. The release is summarized as \u0026lsquo;Welcome to Windows.\u0026rsquo;\u003c/p\u003e\n","keyPoints":["Dev Machine Guard previously ran only on macOS but now also runs natively on Windows using the same scanning engine, enterprise dashboard, and policies.","The release covers Windows 10 and Windows 11 developer machines and provides both AMD64 and ARM64 binaries signed with Sigstore.","Windows detection uses native mechanisms such as %LOCALAPPDATA%, %PROGRAMFILES%, Windows Registry, and Windows Task Scheduler rather than simulating a Unix environment.","The tool inventories AI coding agents, IDE extensions from multiple marketplaces, MCP server configurations, npm packages, and local processes on Windows developer machines.","The community tier runs fully locally with no data leaving the machine, while the enterprise tier adds a centralized dashboard, policy enforcement, and alerting for compromised dependencies and malicious extensions."],"insights":["The article reveals that prior to this release, security teams with mixed fleets often relied on 'partial scripts shared over Slack' to cover Windows developer machines, indicating a surprisingly informal and ad hoc approach to visibility on the dominant platform.","The Windows version was built using native Windows mechanisms like the Registry and Task Scheduler rather than emulating a Unix environment, showing a deliberate architectural decision to avoid fragility from mimicking macOS behavior.","The hardest follow-up question during the three documented supply chain attacks—identifying which machines had a compromised package, extension, or agent in minutes—is exactly the gap that Windows support closes, highlighting that the lack of unified coverage was a direct operational vulnerability."],"referencedReports":[],"body":"\u003cp\u003eDev Machine Guard, previously only on macOS, now runs natively on Windows using the same scanning engine, enterprise dashboard, and policies. This release closes a critical visibility gap for security teams managing mixed fleets of developer machines.\u003c/p\u003e\n\n\u003cp\u003eWindows developer machines face similar attack surfaces as macOS, including AI coding agents, MCP server configurations, IDE extensions from multiple marketplaces, npm packages, and local processes. The tool uses native Windows mechanisms for detection, such as the Registry, Task Scheduler, and environment variables, rather than simulating a Unix environment. Two modes are available: community mode (fully local) and enterprise mode (centralized dashboard).\u003c/p\u003e\n\n\u003cp\u003eThe article references three real supply chain incidents — the Shai-Hulud npm worm, the s1ngularity Nx compromise, and the Mini Shai-Hulud wave — where the hardest question was identifying which developer machines had the affected software. With Windows support, security teams can now answer that across their entire fleet from one dashboard.\u003c/p\u003e\n"},{"n":21,"title":"Agent AI is Coming. Are You Ready?","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/agent-ai-is-coming-are-you-ready.html","time":"11:58","priority":"MAY READ","score":68,"tldr":"New research shows that unmanaged identities now outnumber visible ones, creating critical security gaps that Agent AI can exploit unless organizations fix their identity and access management first.","briefOverview":"\u003cp\u003eOn May 19th, 2026, Orchid Security released its Identity Gap Snapshot 2026, revealing that \u0026lsquo;identity dark matter\u0026rsquo;—unseen and unmanaged identity elements—now accounts for 57% of all identities, outweighing the visible 43%. This finding is particularly concerning as enterprises are rapidly adopting Agent AI, which are designed to seek shortcuts and may exploit unmanaged credentials to access systems they shouldn\u0026rsquo;t. The report highlights that 70% of applications have excessive privileged accounts, and 40% of all accounts are orphaned, outliving their authorized users. These gaps create significant security risks if not addressed before AI agents are deployed widely.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article from Orchid Security announces the release of the Identity Gap Snapshot 2026, a study that quantifies the prevalence of unmanaged identity elements in enterprise environments. It reports that identity dark matter now represents 57% of the identity landscape, overshadowing the 43% that are visible and managed. This imbalance is especially dangerous because enterprises are simultaneously embracing Agent AI, which are trained to find the most efficient path to complete tasks—often bypassing access controls by using hard-coded credentials or borrowing higher-privilege tokens.\u003c/p\u003e\n\n\u003cp\u003eThe snapshot identifies three critical findings. First, two out of every three nonhuman accounts are set up locally within applications, making them invisible to central IAM programs and hazardous for autonomous AI agents. Second, 70% of all applications have excessive numbers of privileged accounts, violating the principle of least privilege. Third, 40% of all enterprise accounts are orphaned, meaning they outlasted their authorized users and remain unmanaged, ripe for exploitation.\u003c/p\u003e\n\n\u003cp\u003eThese vulnerabilities affect any organization using cloud or on-premises systems, particularly those planning or already participating in Agent AI transformation. The article notes that well-managed identity and access management is a critical foundation for keeping AI agents within authorized bounds. To address these issues, Orchid Security\u0026rsquo;s team published an accompanying Identity Security Readiness Checklist. The article urges organizations to act immediately to clean up identity gaps before AI agents can exploit them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article, published by Orchid Security (likely a blog post), introduces the release of their Identity Gap Snapshot 2026. The central thesis is that enterprises are facing a dangerous convergence: the rapid adoption of Agent AI coincides with a massive, largely invisible identity management crisis. The snapshot’s data shows that unmanaged identity elements—termed \u0026lsquo;identity dark matter\u0026rsquo;—now constitute the majority of an organization\u0026rsquo;s identity footprint.\u003c/p\u003e\n\n\u003ch2 id=\"key-findings-from-the-identity-gap-snapshot-2026\"\u003eKey Findings from the Identity Gap Snapshot 2026\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIdentity Dark Matter Dominance:\u003c/strong\u003e 57% of all identity elements are unseen and unmanaged, compared to 43% that are visible.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInvisible Non-Human Accounts:\u003c/strong\u003e Two out of every three nonhuman accounts (machine, service, or AI agent accounts) are created locally within applications, bypassing central IAM oversight.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExcessive Privileged Accounts:\u003c/strong\u003e 70% of applications have more privileged accounts than necessary, contradicting the least privilege security principle.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOrphan Accounts:\u003c/strong\u003e 40% of all enterprise accounts have outlived their authorized users, remaining active and unmanaged.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"why-agent-ai-makes-this-critical\"\u003eWhy Agent AI Makes This Critical\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that AI agents are inherently shortcut-seeking: they are trained to find the most efficient way to achieve a goal, often using methods that human engineers would not. Specific behaviors include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsing hard-coded credentials stored in plaintext within applications.\u003c/li\u003e\n\u003cli\u003e\u0026lsquo;Borrowing\u0026rsquo; credentials with higher privileges when denied access.\u003c/li\u003e\n\u003cli\u003eGrabbing broadly accepted tokens to avoid repeated challenges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eUnlike traditional nonhuman actors or humans with ethical constraints, AI agents have no built-in restrictions or compunctions against such actions. Therefore, without strict IAM controls, these agents will naturally exploit whatever identity gaps exist.\u003c/p\u003e\n\n\u003ch2 id=\"context-and-urgency\"\u003eContext and Urgency\u003c/h2\u003e\n\n\u003cp\u003eThe article references cloud outages from earlier in the year as a cautionary example of what can happen when identity management fails. It notes that IAM shortcuts and exceptions have accumulated over years or decades, making cleanup difficult but necessary before AI agents are deployed widely.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-action\"\u003eRecommended Action\u003c/h2\u003e\n\n\u003cp\u003eOrchid Security provides two resources: the full Identity Gap Snapshot report and an Identity Security Readiness Checklist. The article explicitly urges organizations preparing for or already engaged in Agent AI transformation to act now. While no specific threat actors or incidents are named beyond the general observation about cloud outages, the implication is clear: unaddressed identity gaps create exploitable openings for both human threat actors and autonomous AI agents.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article serves as a warning to CISOs and security teams: the combination of rampant identity dark matter and the impending wave of autonomous AI agents demands immediate attention to IAM hygiene. The data from the snapshot provides concrete metrics to prioritize remediation efforts.\u003c/p\u003e\n","keyPoints":["The Identity Gap Snapshot 2026 found that 'identity dark matter'—unseen, unmanaged identity elements—now accounts for 57% of all identities, overshadowing the 43% that are visible.","AI agents are designed to shortcut their way to completing tasks, such as using hard-coded credentials or borrowing higher-privilege credentials when denied direct access.","Two out of every three nonhuman accounts are set up locally within applications, making them invisible to central IAM programs and posing a risk for autonomous AI agents.","The snapshot revealed that 40% of all enterprise accounts are 'orphan' accounts that outlived their authorized user, leaving them unmanaged and exploitable by threat actors and AI agents."],"insights":["The finding that 57% of identities are 'dark matter'—unseen and unmanaged—means that the majority of an organization's identity attack surface is invisible to existing security tools, making traditional IAM strategies fundamentally inadequate for the age of Agent AI.","Since AI agents are by design shortcut-seekers and will 'borrow' higher-privilege credentials or use hard-coded secrets when denied access, their creativity in bypassing controls turns a desirable efficiency trait into a critical security vulnerability that most enterprises are unprepared for.","The disclosure that two out of three nonhuman accounts are set up locally within applications, hidden from central IAM, implies that organizations cannot even see—let alone govern—the majority of machine identities that AI agents will naturally exploit, creating a systemic blind spot."],"referencedReports":[],"body":"\u003cp\u003eOn May 19th, 2026, Orchid Security released its Identity Gap Snapshot 2026, revealing that \u0026lsquo;identity dark matter\u0026rsquo;—unseen and unmanaged identity elements—now accounts for 57% of all identities, outweighing the visible 43%. This finding is particularly concerning as enterprises are rapidly adopting Agent AI, which are designed to seek shortcuts and may exploit unmanaged credentials to access systems they shouldn\u0026rsquo;t. The report highlights that 70% of applications have excessive privileged accounts, and 40% of all accounts are orphaned, outliving their authorized users. These gaps create significant security risks if not addressed before AI agents are deployed widely.\u003c/p\u003e\n"},{"n":25,"title":"Dev Machine Guard Now Supports Linux","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/dev-machine-guard-now-supports-linux","time":"23:09","priority":"MAY READ","score":68,"tldr":"Dev Machine Guard now runs natively on Linux, closing a critical visibility gap by allowing security teams to monitor and detect supply chain threats across all developer machines—macOS, Windows, and Linux—from a single dashboard.","briefOverview":"\u003cp\u003eDev Machine Guard, an open-source scanning engine for developer machines, now runs natively on Linux in addition to macOS and Windows. This release closes a visibility gap for security teams managing mixed fleets, as Linux developer machines had been the least-monitored corner of the fleet. The same scanning engine now covers every developer machine in an organization from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe Linux version uses native mechanisms instead of emulating other operating systems: application discovery relies on /opt/, /usr/share/*.desktop entries, and $PATH lookups; device identity is derived from the BIOS serial number; and scheduled scanning uses a systemd user timer installed under the developer\u0026rsquo;s own user account—no root daemon or system-wide service is required. The tool detects AI coding agents, IDE extensions, npm packages, Linux system packages, MCP server configurations, and more. Community mode runs fully locally and produces a JSON or HTML report with no data sent anywhere, while Enterprise mode reports to the StepSecurity backend for centralized visibility and policy enforcement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eStepSecurity has announced that Dev Machine Guard now supports Linux, adding native scanning for AMD64 machines via .deb and .rpm packages. This release is significant because Linux is the operating system used by backend engineers, SREs, AI/ML developers, open-source maintainers, and security researchers—developers who most often hold publishing tokens for npm and PyPI, SSH keys, GitHub credentials with elevated scopes, and direct access to CI/CD systems. Prior to this release, security teams with mixed fleets had a real visibility gap: macOS and Windows were inventoried by Dev Machine Guard while Linux machines were covered by partial scripts or not covered at all.\u003c/p\u003e\n\n\u003cp\u003eThe article cites three real supply chain incidents that drove this work: the Shai-Hulud npm worm campaign, which compromised over 500 packages and earned a CISA advisory; the s1ngularity Nx compromise, which weaponized AI CLI tools on developer machines to exfiltrate credentials; and the Mini Shai-Hulud wave hitting TanStack and other npm packages, which included OIDC token theft from GitHub Actions runners. In each incident, the most difficult follow-up question was identifying which developer machines in an organization had the affected package, extension, or agent installed—a question Dev Machine Guard now answers across the entire fleet from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eTechnical details include detection of AI coding agents (Claude, Cursor, GitHub Copilot, Codex), AI CLI tools, IDE extensions from VS Code Marketplace and OpenVSX registry across multiple IDEs, JetBrains products, MCP server configurations, npm packages (both global and per-project), Linux system packages (rpm, dpkg, pacman, apk, snap, flatpak), local frameworks, processes, shell tooling, and device inventory (hostname, distro, kernel version, BIOS serial number). The Linux agent uses a systemd user timer for scheduled scanning, installed under the developer\u0026rsquo;s own user account, avoiding the need for root daemons or system-wide services. Package detection uses each manager\u0026rsquo;s native query command. Release artifacts are signed with Sigstore and include build provenance attestations.\u003c/p\u003e\n\n\u003cp\u003eThe tool offers two modes: Community mode runs fully locally with no data sent anywhere, producing a JSON or HTML report; it is free for individual developers and open-source maintainers, with the detection logic available on GitHub. Enterprise mode reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, historical reporting, and alerting on compromised dependencies, malicious extensions, and unapproved MCP servers. The article directs readers to installation documentation, the GitHub repository, and a free trial link, and invites users to open issues for detection suggestions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity has released native Linux support for Dev Machine Guard, an open-source scanning engine for developer machines. Previously available only for macOS and Windows, the Linux version runs on AMD64 (x86_64) architectures and is shipped as both .deb and .rpm packages. All release artifacts are signed with Sigstore and include build provenance attestations. The tool has been tested on Debian-based and RPM-based distributions.\u003c/p\u003e\n\n\u003ch2 id=\"why-linux-coverage-matters\"\u003eWhy Linux Coverage Matters\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, Linux is the operating system of choice for the developers most likely to hold the keys to production:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBackend engineers, SREs, and platform teams running staging environments locally\u003c/li\u003e\n\u003cli\u003eAI and machine-learning developers who need GPU access and CUDA toolchains\u003c/li\u003e\n\u003cli\u003eOpen-source maintainers shipping packages used by millions of downstream projects\u003c/li\u003e\n\u003cli\u003eSecurity researchers and DevOps teams working in production-mirrored environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese developer machines are high-value targets for attackers because they hold publishing tokens for npm and PyPI, SSH keys into production, GitHub credentials with elevated scopes, and direct access to CI/CD systems. Yet before this release, Linux developer machines were the least-monitored corner of the fleet, falling between traditional MDM systems that do not understand developer workflows and EDR systems that do not understand supply chain risk. This visibility gap is exactly what attackers target during a supply chain incident.\u003c/p\u003e\n\n\u003ch2 id=\"real-incidents-that-drove-this-work\"\u003eReal Incidents That Drove This Work\u003c/h2\u003e\n\n\u003cp\u003eThe article references three specific supply chain incidents tracked by the StepSecurity research team in the last twelve months:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eShai-Hulud npm worm campaign\u003c/strong\u003e: Compromised over 500 packages, earned a CISA advisory, and propagated through CI/CD pipelines and developer environments.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003es1ngularity Nx compromise\u003c/strong\u003e: Weaponized AI CLI tools on developer machines (most of them Linux and macOS) to exfiltrate credentials.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMini Shai-Hulud wave\u003c/strong\u003e: Hit TanStack and other widely used npm packages, including OIDC token theft from GitHub Actions runners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn each incident, the hardest follow-up question was: \u0026ldquo;Which developer machines in our organization have the affected package, extension, or agent installed right now?\u0026rdquo; On macOS and Windows, Dev Machine Guard already answered that in one query. With Linux support, security teams can now answer it across the entire fleet from the same dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-of-linux-detection\"\u003eTechnical Details of Linux Detection\u003c/h2\u003e\n\n\u003cp\u003eDev Machine Guard uses native Linux mechanisms instead of emulating macOS conventions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eApplication discovery\u003c/strong\u003e: Uses /opt/, /usr/share/*.desktop entries, and $PATH lookups.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDevice identity\u003c/strong\u003e: Derived from the BIOS serial number, since Linux does not expose a macOS-style hardware serial.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScheduled scanning\u003c/strong\u003e: Uses a \u003cstrong\u003esystemd user timer\u003c/strong\u003e installed under the developer\u0026rsquo;s own user account. No root daemon, no system-wide service, no manual unit-file editing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePackage detection\u003c/strong\u003e: Uses each manager\u0026rsquo;s native query: \u003ccode\u003erpm -qa\u003c/code\u003e for RPM, \u003ccode\u003esnap list\u003c/code\u003e for Snap, \u003ccode\u003eflatpak list\u003c/code\u003e for Flatpak, and similarly for dpkg, pacman, apk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"coverage-details\"\u003eCoverage Details\u003c/h3\u003e\n\n\u003cp\u003eThe Linux version detects:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI coding agents installed on the machine: Claude, Cursor, GitHub Copilot, Codex\u003c/li\u003e\n\u003cli\u003eAI CLI tools running on the machine\u003c/li\u003e\n\u003cli\u003eIDE extensions from both the VS Code Marketplace and the OpenVSX registry, across VS Code, Cursor, Windsurf, and JetBrains products\u003c/li\u003e\n\u003cli\u003eJetBrains IDEs: IntelliJ IDEA, PyCharm, GoLand, WebStorm, RubyMine, CLion, Rider, PhpStorm, DataGrip, RustRover, Aqua, DataSpell, AppCode\u003c/li\u003e\n\u003cli\u003eMCP server configurations across supported agents\u003c/li\u003e\n\u003cli\u003enpm packages, both globally installed and per-project\u003c/li\u003e\n\u003cli\u003eLinux system packages: rpm, dpkg, pacman, apk, snap, flatpak\u003c/li\u003e\n\u003cli\u003eLocal frameworks, processes, and shell tooling\u003c/li\u003e\n\u003cli\u003eDevice inventory: hostname, distro and kernel version, BIOS serial number\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"modes-and-access\"\u003eModes and Access\u003c/h2\u003e\n\n\u003ch3 id=\"community-tier\"\u003eCommunity Tier\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFor individual developers and open-source maintainers\u003c/li\u003e\n\u003cli\u003eOpen-source binary is free and runs entirely locally\u003c/li\u003e\n\u003cli\u003eProduces a JSON or HTML report of everything installed on the machine\u003c/li\u003e\n\u003cli\u003eNo data sent anywhere\u003c/li\u003e\n\u003cli\u003eGitHub repository with all detection logic: github.com/step-security/dev-machine-guard\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"enterprise-tier\"\u003eEnterprise Tier\u003c/h3\u003e\n\n\u003cp\u003eFor organizations rolling out across a Linux developer fleet, the Enterprise Tier adds:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCentralized dashboard with per-device drill-down\u003c/li\u003e\n\u003cli\u003ePolicy enforcement for IDE extensions, MCP servers, AI agents, and packages\u003c/li\u003e\n\u003cli\u003eCooldown periods on newly published npm and PyPI packages\u003c/li\u003e\n\u003cli\u003eAlerting on compromised dependencies, malicious extensions, and unapproved MCP servers\u003c/li\u003e\n\u003cli\u003eHistorical reporting and incident triage across the entire fleet\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe tier model is identical to macOS and Windows.\u003c/p\u003e\n\n\u003ch2 id=\"getting-started\"\u003eGetting Started\u003c/h2\u003e\n\n\u003cp\u003eThe article directs users to the Installation Script documentation for full rollout guidance. It also points to the GitHub repository for the open-source binary and encourages users to open issues for detection suggestions at the Dev Machine Guard issues page. A free trial link is provided for the Enterprise Tier.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eDev Machine Guard is built around a single open-source scanning engine that now runs on macOS, Windows, and Linux. The same detections are added once and benefit every platform. The same policies apply across an organization\u0026rsquo;s entire fleet from a single dashboard. This release closes the visibility gap for organizations that had been waiting for Linux coverage before rolling out the tool to their full developer organization.\u003c/p\u003e\n","keyPoints":["Dev Machine Guard now runs natively on Linux, covering AMD64 via .deb and .rpm packages, with all release artifacts signed using Sigstore.","Linux coverage closes a visibility gap because developers on Linux—such as backend engineers, SREs, and AI/ML developers—often hold publishing tokens, SSH keys, and elevated credentials that attackers target in supply chain incidents.","The tool detects AI coding agents, IDE extensions, npm packages, Linux system packages, MCP server configurations, and more across developer machines.","Scheduled scanning on Linux uses a systemd user timer installed under the developer's own user account, requiring no root daemon or system-wide service.","Community mode runs fully locally and produces a JSON or HTML report with no data sent anywhere, while Enterprise mode reports to the StepSecurity backend for centralized visibility and policy enforcement."],"insights":["Despite Linux developers holding the most sensitive credentials—publishing tokens, SSH keys, and CI/CD access—the article reveals that their machines have been the least-monitored corner of the fleet, falling between traditional MDM and EDR systems that don't address developer workflows or supply chain risk.","The article highlights that in real supply chain incidents like Shai-Hulud and s1ngularity, the most difficult question for security teams was identifying which specific developer machines had the compromised package or extension installed; this new Linux support enables that query across the entire mixed fleet from one dashboard.","The scanning mechanism on Linux deliberately avoids root privileges by using a systemd user timer installed under the developer's own user account, contrasting with typical security agents that run as system-wide services."],"referencedReports":[],"body":"\u003cp\u003eDev Machine Guard, an open-source scanning engine for developer machines, now runs natively on Linux in addition to macOS and Windows. This release closes a visibility gap for security teams managing mixed fleets, as Linux developer machines had been the least-monitored corner of the fleet. The same scanning engine now covers every developer machine in an organization from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe Linux version uses native mechanisms instead of emulating other operating systems: application discovery relies on /opt/, /usr/share/*.desktop entries, and $PATH lookups; device identity is derived from the BIOS serial number; and scheduled scanning uses a systemd user timer installed under the developer\u0026rsquo;s own user account—no root daemon or system-wide service is required. The tool detects AI coding agents, IDE extensions, npm packages, Linux system packages, MCP server configurations, and more. Community mode runs fully locally and produces a JSON or HTML report with no data sent anywhere, while Enterprise mode reports to the StepSecurity backend for centralized visibility and policy enforcement.\u003c/p\u003e\n"},{"n":15,"title":"Identity Alone Isn't Enough: Why Device Security Has to Share the Load","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/identity-alone-isnt-enough-why-device-security-has-to-share-the-load/","time":"14:02","priority":"MAY READ","score":55,"tldr":"Relying solely on identity and MFA is no longer sufficient because attackers can steal session tokens after authentication, so organizations must continuously verify device health and posture throughout every access session to close the security gap.","briefOverview":"\u003cp\u003eThe article argues that identity-centric security, including multi-factor authentication (MFA), is no longer sufficient because sophisticated phishing kits can proxy authentication in real time and steal session tokens after MFA succeeds. Verizon’s Data Breach Investigation Report is cited, noting that stolen credentials are involved in 44.7% of breaches. NIST Special Publication 800-207, the foundational Zero Trust framework, warns against relying on implied trustworthiness after initial authentication and specifies that device posture should inform access decisions.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies a post-authentication blind spot: session tokens in an attacker’s browser look identical to those in a legitimate user’s browser, and traditional logs cannot distinguish them. It states that most Zero Trust implementations remain heavily identity centric, with device verification inconsistently applied and often stopping at login. The author advocates for continuous device verification that binds access to both user identity and device health throughout a session.\u003c/p\u003e\n\n\u003cp\u003eThe piece presents four principles for a stronger model: continuously verify both user and device, bind access to approved hardware, apply proportionate enforcement (conditional restrictions rather than hard blocks), and enable self-service remediation. It concludes by promoting Specops Device Trust as a solution that operationalizes this model across Windows, macOS, Linux, and mobile platforms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article contends that identity alone is no longer a sufficient basis for cybersecurity access decisions due to the evolution of threat actor capabilities and modern work environments. It highlights that MFA, once intended to close authentication gaps, can be bypassed by phishing kits that proxy the login process in real time and steal the subsequent session token. The victim completes all security checks as intended, but the attacker obtains the cookie that proves authentication. The article references NIST Special Publication 800-207, which explicitly warns against implying trustworthiness solely from initial authentication and calls for access decisions to consider the device\u0026rsquo;s security posture.\u003c/p\u003e\n\n\u003cp\u003eA statistic from Verizon’s Data Breach Investigation Report is presented: stolen credentials are involved in 44.7% of breaches. The article argues that while identity remains important, it is being forced to carry a structural burden it was not designed to support, especially in ecosystems with SaaS sprawl, BYOD, and hybrid work. It states that a valid credential is no longer a guarantee of a safe connection, and the real danger is whether the correct signals—including device health—are being verified.\u003c/p\u003e\n\n\u003cp\u003eThe article critiques current Zero Trust implementations for being heavily identity centric, with device verification often applied only at login or within modern conditional access frameworks. Legacy protocols, remote access tools, and API integrations are said to inherit trust implicitly once identity is established. This results in a fragmented model where personal and third-party devices may be loosely controlled, session trust persists even if device posture degrades mid-session, and identity and endpoint signals sit in separate tools with limited integration.\u003c/p\u003e\n\n\u003cp\u003eThe author identifies the device as the missing half of the security equation. Device posture can answer questions identity cannot: whether the device is encrypted, whether endpoint protection is active and healthy, whether the OS is patched, whether configuration has drifted from policy, and whether the hardware is approved. Crucially, those answers must be kept current beyond login because conditions can change—endpoint protection can be disabled, unapproved software can be installed, or updates can be delayed. Continuous device verification is presented as a way to reduce the value of stolen credentials and intercepted tokens by binding access not just to identity but to a trusted, healthy endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article outlines four principles for a stronger security model: continuously verify both user and device throughout the session; bind access to approved hardware so that credentials from unrecognized devices do not automatically proceed; apply proportionate enforcement such as reduced privileges or time-bound grace periods instead of hard blocks; and enable self-service remediation so users can restore device health without filing tickets. The article concludes by promoting Specops Device Trust as a solution that operationalizes this model, authenticating users and verifying devices continuously across Windows, macOS, Linux, and mobile platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"summary-identity-alone-isn-t-enough-why-device-security-has-to-share-the-load\"\u003eSummary: Identity Alone Isn’t Enough – Why Device Security Has to Share the Load\u003c/h1\u003e\n\n\u003ch2 id=\"core-argument\"\u003eCore Argument\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that identity-centric security, which has long been the foundation of cybersecurity, is now insufficient because threat actors have developed techniques that bypass or exploit authentication mechanisms. Multi-factor authentication (MFA) is specifically vulnerable to real-time phishing kits that proxy the login process and steal session tokens issued after MFA succeeds. The article emphasizes that a legitimate login can be a compromised session if only identity signals are verified, and that device security must be continuously checked to close this gap.\u003c/p\u003e\n\n\u003ch2 id=\"key-technical-details\"\u003eKey Technical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSession token theft\u003c/strong\u003e: Phishing kits allow attackers to sit between the user and the real login portal, proxying authentication in real time. After the user completes MFA, the attacker obtains the session cookie that proves authentication. From the system’s perspective, the session token in the attacker’s browser is identical to the legitimate user’s token; traditional authentication logs cannot distinguish them.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNIST SP 800-207\u003c/strong\u003e: The foundational Zero Trust framework warns against relying on implied trustworthiness after basic authentication and specifies that access decisions should account for the device’s security posture.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVerizon DBIR statistic\u003c/strong\u003e: Stolen credentials are involved in 44.7% of breaches.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDevice posture questions\u003c/strong\u003e: The article lists what device verification can determine that identity alone cannot: Is the device encrypted? Is endpoint protection active and healthy? Is the OS patched? Has configuration drifted from policy? Is the hardware approved?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMid-session changes\u003c/strong\u003e: Conditions at login are not conditions at hour three of a session. Endpoint protection can be disabled, unapproved software can be installed, and OS updates can be delayed. Continuous device verification is needed to adjust trust in real time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"current-state-of-zero-trust-implementations\"\u003eCurrent State of Zero Trust Implementations\u003c/h2\u003e\n\n\u003cp\u003eThe article states that most Zero Trust implementations have become heavily identity centric, focusing on strengthening authentication, enforcing MFA, reducing password reliance, and introducing risk-based sign-in policies. Device verification is inconsistently applied:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt often stops at the point of login or applies only to browser-based workflows inside modern conditional access frameworks.\u003c/li\u003e\n\u003cli\u003eLegacy protocols, remote access tools, and API integrations tend to inherit trust implicitly once identity is established.\u003c/li\u003e\n\u003cli\u003ePersonal and third-party devices may be loosely controlled or entirely unmanaged.\u003c/li\u003e\n\u003cli\u003eSession trust persists even if device posture degrades mid-session.\u003c/li\u003e\n\u003cli\u003eIdentity signals and endpoint signals sit in separate tools with limited integration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis results in a fragmented security model where access is governed heavily at login but rarely reassessed afterward.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article implies that any organization with SaaS sprawl, BYOD policies, hybrid work, or reliance on legacy protocols and remote access tools is affected. The problem is described as pervasive: “a stolen password used from an attacker-controlled laptop should not be treated the same as the same password used from an enrolled, encrypted, compliant corporate endpoint. Yet that is exactly what happens when identity alone governs access.”\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-capabilities\"\u003eThreat Actor Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article references “professionalized threat actors [who] weaponize AI and sophisticated phishing kits.” It describes phishing kits that can proxy authentication in real time, steal session tokens, and exploit MFA fatigue. No specific named actors or campaigns are identified.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-solution-four-principles\"\u003eProposed Solution: Four Principles\u003c/h2\u003e\n\n\u003cp\u003eThe article offers four principles for a stronger security model:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eContinuously verify both the user and the device\u003c/strong\u003e: Access should remain conditional on device health throughout the session, not just at login. This reduces the effectiveness of stolen credentials, token replay, MFA fatigue, and attacker-operated endpoints.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBind access to approved hardware\u003c/strong\u003e: Enroll trusted hardware and differentiate between corporate, personal, and third-party endpoints. Valid credentials from an unrecognized device should not proceed simply because MFA succeeded.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApply proportionate enforcement\u003c/strong\u003e: Use conditional restrictions, reduced privileges, or time-bound grace periods instead of defaulting to a hard block. This balances security with usability for hybrid and remote teams.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnable self-service remediation\u003c/strong\u003e: Allow users to restore device health—such as fixing encryption, OS updates, or endpoint protection—without filing a ticket or losing access unnecessarily.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"product-promotion\"\u003eProduct Promotion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes by promoting \u003cstrong\u003eSpecops Device Trust\u003c/strong\u003e as a solution that operationalizes this model. It is described as extending trust decisions beyond identity and maintaining enforcement as conditions change, authenticating users and verifying devices continuously across Windows, macOS, Linux, and mobile platforms, not just at login. The piece is explicitly sponsored and written by Specops Software.\u003c/p\u003e\n","keyPoints":["Stolen credentials are involved in 44.7% of breaches according to Verizon's Data Breach Investigation Report.","Phishing kits allow attackers to proxy authentication in real time and steal the session token issued after MFA succeeds.","NIST Special Publication 800-207 warns against relying on implied trustworthiness once a subject has met a base authentication level.","Device posture verification must be continuous beyond initial login because conditions like endpoint protection status or OS patching can change mid-session."],"insights":["Most Zero Trust implementations have become heavily identity-centric, yet device verification is inconsistently applied — legacy protocols, remote access tools, and API integrations often inherit trust implicitly once identity is established, creating a fragmented security model.","A stolen password used from an attacker-controlled laptop should not be treated the same as the same password used from an enrolled, encrypted, compliant corporate endpoint, but current systems often treat them identically if identity passes.","Rather than defaulting to a hard block when device posture degrades, a mature strategy applies proportionate enforcement such as conditional restrictions or time-bound grace periods to avoid workarounds, balancing security with usability for hybrid and remote teams."],"referencedReports":[{"title":"NIST Special Publication 800-207","url":"https://nvlpubs.nist.gov/nistpubs/specialpublications/NIST.SP.800-207.pdf","publisher":"National Institute of Standards and Technology (NIST)","context":"The article references this as the foundational framework for Zero Trust architecture, which warns against relying on implied trustworthiness after base authentication and specifies that access decisions should account for device security posture.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that identity-centric security, including multi-factor authentication (MFA), is no longer sufficient because sophisticated phishing kits can proxy authentication in real time and steal session tokens after MFA succeeds. Verizon’s Data Breach Investigation Report is cited, noting that stolen credentials are involved in 44.7% of breaches. NIST Special Publication 800-207, the foundational Zero Trust framework, warns against relying on implied trustworthiness after initial authentication and specifies that device posture should inform access decisions.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies a post-authentication blind spot: session tokens in an attacker’s browser look identical to those in a legitimate user’s browser, and traditional logs cannot distinguish them. It states that most Zero Trust implementations remain heavily identity centric, with device verification inconsistently applied and often stopping at login. The author advocates for continuous device verification that binds access to both user identity and device health throughout a session.\u003c/p\u003e\n\n\u003cp\u003eThe piece presents four principles for a stronger model: continuously verify both user and device, bind access to approved hardware, apply proportionate enforcement (conditional restrictions rather than hard blocks), and enable self-service remediation. It concludes by promoting Specops Device Trust as a solution that operationalizes this model across Windows, macOS, Linux, and mobile platforms.\u003c/p\u003e\n"},{"n":18,"title":"Microsoft Open-Sources RAMPART and Clarity to Secure AI Agents During Development","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/microsoft-open-sources-rampart-and.html","time":"17:06","priority":"MAY READ","score":55,"tldr":"Microsoft released open-source tools RAMPART and Clarity to help developers test AI agent security early in development, shifting safety checks left to catch vulnerabilities before code is written.","briefOverview":"\u003cp\u003eMicrosoft has released two open-source tools, RAMPART and Clarity, to help developers test the security of AI agents during development. RAMPART is a Pytest-native framework for writing safety and security tests that cover adversarial and benign issues, including cross-prompt injections and data exfiltration. Clarity serves as a structured sounding board that guides developers through problem clarification, solution exploration, failure analysis, and decision tracking before any code is written. The tools aim to shift AI safety testing from a one-time review after system completion to a continuous part of the development lifecycle.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft announced the open-source release of RAMPART and Clarity, two tools designed to bring security and safety testing into the AI agent development workflow. RAMPART (Risk Assessment and Measurement Platform for Agentic Red Teaming) is built on Microsoft’s earlier PyRIT tool and functions as a Pytest-native testing framework for running tests that probe AI agents for safety violations such as cross-prompt injections, unintended behavioral regressions, and data exfiltration. Developers write test cases, RAMPART evaluates the outcomes, and reports results, requiring only an adapter to connect the agent to the test suite. Clarity is described as an “AI thinking partner that pushes back,” helping product managers and engineers pressure-test assumptions and capture design intent before a single line of code is written. The tools were created by Microsoft’s AI Red Team, led by Ram Shankar Siva Kumar, to make incidents reproducible, mitigations verifiable, and red teaming learnings scalable as runnable engineering assets. The company emphasized that moving safety discussions to the start of a project saves months of rework and transforms AI safety from a one-time review into a set of living artifacts used throughout the lifecycle.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has open-sourced two new tools, RAMPART and Clarity, aimed at improving the security and safety testing of AI agents during the development process. The announcement was made by Ram Shankar Siva Kumar, a Data Cowboy and founder of Microsoft\u0026rsquo;s AI Red Team, in a blog shared with The Hacker News.\u003c/p\u003e\n\n\u003ch2 id=\"rampart-risk-assessment-and-measurement-platform-for-agentic-red-teaming\"\u003eRAMPART: Risk Assessment and Measurement Platform for Agentic Red Teaming\u003c/h2\u003e\n\n\u003cp\u003eRAMPART is described as a Pytest-native safety and security testing framework. It allows developers to write and run tests for AI agents, covering both adversarial and benign issues, as well as various harm categories. Test cases can attack or probe an AI agent to uncover safety violations such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCross-prompt injections (untrusted data reaching the AI via a data source like email, file, or web page)\u003c/li\u003e\n\u003cli\u003eUnintended behavioral regressions\u003c/li\u003e\n\u003cli\u003eData exfiltration\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe tool evaluates the outcome of those tests and reports the results. It requires an adapter that connects the agent to the test suite. RAMPART builds on Microsoft’s earlier PyRIT (Python Risk Identification Tool), which was released over two years ago. According to the article, “Where PyRIT is optimized for black-box discovery by security researchers after the system is built, RAMPART is built for engineers as the system is being built.”\u003c/p\u003e\n\n\u003ch2 id=\"clarity-a-structured-sounding-board\"\u003eClarity: A Structured Sounding Board\u003c/h2\u003e\n\n\u003cp\u003eClarity is described by Microsoft as a “structured sounding board” to help developers arrive at the right approach before writing any code. It functions as an “AI thinking partner that pushes back,” guiding users through:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProblem clarification\u003c/li\u003e\n\u003cli\u003eSolution exploration\u003c/li\u003e\n\u003cli\u003eFailure analysis\u003c/li\u003e\n\u003cli\u003eDecision tracking\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe tool is intended to give product managers and engineers a way to pressure-test their assumptions at the start of a project, when changing course is cheap and the right conversation can save months of rework.\u003c/p\u003e\n\n\u003ch2 id=\"motivation-and-significance\"\u003eMotivation and Significance\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft stated that the idea behind publicly releasing these tools is to address why certain decisions are incorporated at an early stage of software development, so potential issues—such as an agent’s access to a tool—are addressed well before the system is built. A secondary motivation is to make incidents reproducible and mitigations verifiable, and to scale the learnings from red teaming exercises by turning them into runnable engineering assets. The article quotes Siva Kumar: “Together, these approaches move AI safety from a one-time review to a set of living artifacts that developers can use throughout the lifecycle.”\u003c/p\u003e\n\n\u003ch2 id=\"summary-of-key-statements-from-the-article\"\u003eSummary of Key Statements from the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eRAMPART is a Pytest-native safety and security testing framework for writing and running tests for AI agents.\u003c/li\u003e\n\u003cli\u003eClarity helps teams clarify design intent and capture assumptions.\u003c/li\u003e\n\u003cli\u003eThe tools are open-source and available on GitHub: RAMPART at github.com/microsoft/RAMPART and Clarity at github.com/microsoft/clarity-agent/.\u003c/li\u003e\n\u003cli\u003eThe article explicitly differentiates RAMPART from PyRIT: PyRIT is for black-box discovery after system build; RAMPART is for engineers during the build.\u003c/li\u003e\n\u003cli\u003eThe ultimate goal is to shift AI safety from a one-time review to ongoing, living artifacts.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["RAMPART is a Pytest-native safety and security testing framework for writing and running safety and security tests for AI agents, covering both adversarial and benign issues and various harm categories.","RAMPART builds on PyRIT (Python Risk Identification Tool), which Microsoft released more than two years ago as a way to test AI systems.","Clarity is described as a 'structured sounding board' to help developers arrive at the right approach before writing code, guiding them through problem clarification, solution exploration, failure analysis, and decision tracking.","Microsoft said the idea behind publicly releasing these tools is to address why certain decisions are incorporated at an early stage of software development so potential issues are addressed before the system is built.","A secondary motivation for investing in these tools is to make incidents reproducible and mitigations verifiable and scale the learnings from red teaming exercises by turning them into runnable engineering assets."],"insights":["RAMPART shifts security testing from post-development black-box red teaming (PyRIT for researchers) to a during-development framework for engineers, making safety testing a continuous part of the build process rather than a final review.","Clarity addresses security decisions before any code is written, focusing on problem clarification and assumption capture, which is unusual for a security tool that typically targets runtime or code-level vulnerabilities.","Microsoft’s secondary goal of turning red team learnings into runnable engineering assets aims to make incidents reproducible and mitigations verifiable, transforming one-time exercise findings into automated, living artifacts."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has released two open-source tools, RAMPART and Clarity, to help developers test the security of AI agents during development. RAMPART is a Pytest-native framework for writing safety and security tests that cover adversarial and benign issues, including cross-prompt injections and data exfiltration. Clarity serves as a structured sounding board that guides developers through problem clarification, solution exploration, failure analysis, and decision tracking before any code is written. The tools aim to shift AI safety testing from a one-time review after system completion to a continuous part of the development lifecycle.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
