window.__DL_ARTICLES = [{"n":2,"title":"Palo Alto GlobalProtect VPN auth bypass flaw now exploited in attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/palo-alto-globalprotect-vpn-auth-bypass-flaw-now-exploited-in-attacks/","time":"18:02","priority":"MUST READ","score":92,"tldr":"Palo Alto says attackers are actively exploiting CVE-2026-0257, a PAN-OS GlobalProtect authentication bypass bug that can let them forge auth cookies and gain unauthorized VPN access on unpatched devices. Organizations should patch immediately or disable authentication override/use a separate certificate for it, especially since CISA has added the flaw to its Known Exploited Vulnerabilities list.","briefOverview":"\u003cp\u003ePalo Alto Networks warned that attackers are now exploiting CVE-2026-0257, a PAN-OS GlobalProtect authentication bypass flaw that can let unauthorized users establish VPN connections. The company had fixed the flaw earlier in the month and initially rated it Medium because exploitation requires authentication override cookies to be enabled and a specific certificate configuration.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto later updated its advisory to say it had become aware of limited exploit attempts on unpatched devices without mitigations applied and raised the severity to High. Rapid7 said it observed exploitation across numerous customers beginning on May 17, 2026, and described attacks in which forged authentication override cookies targeted the local administrator account.\u003c/p\u003e\n\n\u003cp\u003eAccording to Rapid7, the flaw exists because PAN-OS decrypts authentication override cookies with a configured private key and trusts the decrypted contents without signature verification. If the same certificate is reused for HTTPS services and authentication override cookies, attackers can obtain the public key from the HTTPS session and forge cookies the device will accept. Palo Alto advised organizations to patch immediately or mitigate by disabling authentication override or using a different certificate for that feature.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePalo Alto Networks is warning that CVE-2026-0257, a PAN-OS GlobalProtect authentication bypass flaw, is being actively exploited in attacks against corporate networks. The company said the vulnerability affects the GlobalProtect portal and gateway and can allow an attacker to bypass security restrictions and establish an unauthorized VPN connection. Palo Alto had already released a fix earlier this month.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was initially rated Medium severity because exploitation depends on devices being configured with authentication override cookies enabled and a specific certificate setup. On Friday, Palo Alto updated its advisory to say it had become aware of limited exploit attempts against unpatched PAN-OS devices without mitigations applied. The company also raised the severity rating to High.\u003c/p\u003e\n\n\u003cp\u003eRapid7 reported that it had observed the vulnerability being exploited against numerous customers starting on May 17, 2026. It said successful exploitation was identified across multiple customers, although it did not observe signs of successful lateral movement from the affected devices. The earliest observed exploitation date was May 17, and the flaw was added to CISA\u0026rsquo;s Known Exploited Vulnerability catalog as of May 29, 2026.\u003c/p\u003e\n\n\u003cp\u003eAccording to Rapid7, the attacks began with hackers authenticating to GlobalProtect gateways using forged authentication override cookies that targeted the local administrator account. The company first observed exploitation on May 18 from infrastructure hosted by Vultr, followed by a second wave of attacks on May 21 originating from Dromatics Systems. In some incidents, attackers were able to connect to the device via VPN and gain access to internal networks, while in many others the forged cookie was accepted but a full VPN session could not be established.\u003c/p\u003e\n\n\u003cp\u003eRapid7 said affected devices had GlobalProtect authentication override cookies enabled and were configured in a way that let attackers forge valid cookies. The researchers explained that PAN-OS decrypts these cookies using a configured private key and then trusts the decrypted contents without any signature verification. If the same certificate is used for both HTTPS services and authentication override cookies, attackers can obtain the related public key through the HTTPS session and use it to create forged cookies for arbitrary users.\u003c/p\u003e\n\n\u003cp\u003eRapid7 developed a proof-of-concept exploit showing that an attacker can retrieve public certificates exposed by a GlobalProtect portal or gateway, generate a forged authentication override cookie, and authenticate without valid credentials. Palo Alto said organizations should immediately install the latest security updates. As mitigations, administrators can disable the authentication override feature or use a separate certificate for that feature rather than sharing it with other services on the device.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto Networks warned that attackers are now exploiting CVE-2026-0257, an authentication bypass vulnerability affecting PAN-OS GlobalProtect. The flaw can allow unauthorized VPN access by letting attackers bypass security restrictions and establish an unauthorized connection to the device. Palo Alto had already fixed the issue earlier in the month, but later updated its advisory after becoming aware of active exploitation against unpatched systems.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as an escalation in risk. Although Palo Alto originally rated the bug as Medium severity because exploitation requires a particular configuration, it raised the severity to High after confirming exploit activity. The article also notes that CISA has added the issue to its Known Exploited Vulnerability catalog.\u003c/p\u003e\n\n\u003ch1 id=\"what-the-vulnerability-does\"\u003eWhat the vulnerability does\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto\u0026rsquo;s advisory describes the issue as affecting the GlobalProtect portal and gateway in PAN-OS software. According to the company, the vulnerability allows an attacker to bypass security restrictions and establish an unauthorized VPN connection.\u003c/p\u003e\n\n\u003cp\u003eThe article says the original Medium severity rating was based on the fact that exploitation is not universally possible on all deployments. Devices must have authentication override cookies enabled and must also use a specific certificate configuration that makes forgery possible.\u003c/p\u003e\n\n\u003ch1 id=\"evidence-of-active-exploitation\"\u003eEvidence of active exploitation\u003c/h1\u003e\n\n\u003cp\u003eOn Friday, Palo Alto updated its advisory to state that it had become aware of limited exploit attempts on unpatched PAN-OS devices that did not have mitigations applied. This update is the basis for the company increasing the severity rating from Medium to High.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites Rapid7, which said it observed the flaw being exploited against numerous customers beginning on May 17, 2026. Rapid7 stated that it identified successful exploitation across numerous customers, although it did not observe indications of successful lateral movement from the devices.\u003c/p\u003e\n\n\u003cp\u003eCISA had added the flaw to the Known Exploited Vulnerability catalog by May 29, 2026. The article says federal agencies were ordered to mitigate the flaw by June 1, 2026.\u003c/p\u003e\n\n\u003ch1 id=\"reported-attack-activity\"\u003eReported attack activity\u003c/h1\u003e\n\n\u003cp\u003eRapid7 described the attacks as starting with forged authentication override cookies used to authenticate to GlobalProtect gateways. These forged cookies targeted the local administrator account.\u003c/p\u003e\n\n\u003cp\u003eThe article provides two infrastructure observations from Rapid7:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe first observed exploitation on May 18 came from infrastructure hosted by Vultr.\u003c/li\u003e\n\u003cli\u003eA second wave of attacks was detected on May 21 and originated from Dromatics Systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn some incidents, the attackers were able to use the forged cookies to connect to the device through VPN and gain access to internal networks. However, Rapid7 also said that in many cases the appliance accepted the forged cookie but a full VPN session was not successfully established.\u003c/p\u003e\n\n\u003ch1 id=\"technical-explanation-in-the-article\"\u003eTechnical explanation in the article\u003c/h1\u003e\n\n\u003cp\u003eRapid7\u0026rsquo;s investigation found that affected customers had GlobalProtect authentication override cookies enabled and had devices configured in a way that allowed valid cookie forgery.\u003c/p\u003e\n\n\u003cp\u003eThe article says the flaw stems from how PAN-OS validates authentication override cookies:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe device decrypts the cookies using a configured private key.\u003c/li\u003e\n\u003cli\u003eIt then trusts the decrypted contents.\u003c/li\u003e\n\u003cli\u003eIt does not perform signature verification on those contents.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis becomes exploitable when the same certificate is reused for both HTTPS services and authentication override cookies. In that case, attackers can obtain the corresponding public key through the HTTPS session and then use that key to create forged authentication override cookies that the device accepts as legitimate.\u003c/p\u003e\n\n\u003ch1 id=\"proof-of-concept-and-demonstrated-impact\"\u003eProof-of-concept and demonstrated impact\u003c/h1\u003e\n\n\u003cp\u003eRapid7 developed a proof-of-concept exploit to demonstrate the issue. According to the article, the PoC can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRetrieve public certificates exposed by a GlobalProtect portal or gateway.\u003c/li\u003e\n\u003cli\u003eGenerate a forged authentication override cookie for an arbitrary user.\u003c/li\u003e\n\u003cli\u003eAuthenticate without knowing valid credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researchers said they successfully authenticated to an unpatched GlobalProtect gateway using this PoC.\u003c/p\u003e\n\n\u003ch1 id=\"affected-parties-and-scope-described\"\u003eAffected parties and scope described\u003c/h1\u003e\n\n\u003cp\u003eThe article frames the issue as a threat to organizations using GlobalProtect VPN devices. It specifically discusses exploitation attempts against unpatched PAN-OS devices and references attacks attempting to breach corporate networks.\u003c/p\u003e\n\n\u003cp\u003eThe technical preconditions described in the article narrow the affected scope to devices where:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGlobalProtect authentication override cookies are enabled.\u003c/li\u003e\n\u003cli\u003eThe certificate configuration allows attackers to forge valid authentication cookies.\u003c/li\u003e\n\u003cli\u003eThe same certificate may be reused across HTTPS and authentication override functions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"mitigations-and-vendor-guidance\"\u003eMitigations and vendor guidance\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto advised organizations using GlobalProtect VPN devices to immediately install the latest security updates.\u003c/p\u003e\n\n\u003cp\u003eThe article also lists two mitigations administrators can apply:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTurn off the authentication override feature.\u003c/li\u003e\n\u003cli\u003eUse a different certificate for authentication override cookies and do not share that certificate with other services on the device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese mitigation steps are presented as alternatives or supplements to patching.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaways-from-the-article\"\u003eKey takeaways from the article\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-0257 is an authentication bypass flaw in PAN-OS GlobalProtect that can enable unauthorized VPN access.\u003c/li\u003e\n\u003cli\u003ePalo Alto confirmed limited exploit attempts against unpatched devices and raised the severity from Medium to High.\u003c/li\u003e\n\u003cli\u003eRapid7 observed exploitation across numerous customers starting on May 17, 2026.\u003c/li\u003e\n\u003cli\u003eThe attack relies on forged authentication override cookies, particularly where certificate reuse allows attackers to obtain a public key from HTTPS exposure.\u003c/li\u003e\n\u003cli\u003eSome attackers gained VPN access and access to internal networks, though Rapid7 said many attempts did not result in a full VPN session.\u003c/li\u003e\n\u003cli\u003ePalo Alto recommends immediate patching, while mitigation options include disabling authentication override or isolating it with a different certificate.\u003c/li\u003e\n\u003cli\u003eCISA has formally recognized the issue as exploited in the wild by adding it to the KEV catalog and setting a remediation deadline for federal agencies.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Palo Alto Networks warned that CVE-2026-0257, a PAN-OS GlobalProtect authentication bypass flaw, is now being actively exploited against unpatched devices without mitigations applied.","The vulnerability allows attackers to establish unauthorized VPN connections by forging authentication override cookies when GlobalProtect authentication override cookies are enabled and a specific certificate configuration is in place.","Rapid7 said it observed exploitation across numerous customers starting on May 17, 2026, and found that some attackers were able to connect to devices via VPN and gain access to internal networks.","Rapid7 explained that PAN-OS decrypts authentication override cookies using a configured private key and trusts the decrypted contents without performing any signature verification.","Palo Alto Networks advised organizations to install the latest security updates immediately or mitigate the issue by disabling authentication override or using a different certificate for that feature."],"insights":["Although Palo Alto originally rated CVE-2026-0257 as Medium severity because exploitation depends on specific settings, it raised the severity to High after confirming active attacks on unpatched devices.","Rapid7 reported that in many incidents the appliance accepted forged authentication cookies but the attackers still could not establish a full VPN session, showing that successful cookie forgery did not always lead to complete access.","The exploit path depends on certificate reuse: if the same certificate is used for both HTTPS services and authentication override cookies, attackers can obtain the public key from the HTTPS session and use it to forge cookies the device will accept.","The article highlights an immediate mitigation that does not require patching: administrators can reduce exposure by disabling authentication override cookies or assigning that feature a separate certificate not shared with other services on the device.","CISA added CVE-2026-0257 to the Known Exploited Vulnerability catalog and set a June 1, 2026 deadline for federal agencies to mitigate it, underscoring the urgency of remediation."],"referencedReports":[{"title":"CVE-2026-0257","url":"https://security.paloaltonetworks.com/CVE-2026-0257","publisher":"Palo Alto Networks","context":"The article cites Palo Alto Networks' advisory to describe the flaw and note that the company updated it to warn about active exploitation.","category":"advisory","primary":true},{"title":"ETR: Rapid7 observed exploitation of PAN-OS GlobalProtect authentication bypass vulnerability CVE-2026-0257","url":"https://www.rapid7.com/blog/post/etr-rapid7-observed-exploitation-of-pan-os-globalprotect-authentication-bypass-vulnerability-cve-2026-0257/","publisher":"Rapid7","context":"The article references Rapid7's technical write-up for observed exploitation dates, attack details, affected configurations, and proof-of-concept findings.","category":"research","primary":true}],"body":"\u003cp\u003ePalo Alto Networks warned that attackers are now exploiting CVE-2026-0257, a PAN-OS GlobalProtect authentication bypass flaw that can let unauthorized users establish VPN connections. The company had fixed the flaw earlier in the month and initially rated it Medium because exploitation requires authentication override cookies to be enabled and a specific certificate configuration.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto later updated its advisory to say it had become aware of limited exploit attempts on unpatched devices without mitigations applied and raised the severity to High. Rapid7 said it observed exploitation across numerous customers beginning on May 17, 2026, and described attacks in which forged authentication override cookies targeted the local administrator account.\u003c/p\u003e\n\n\u003cp\u003eAccording to Rapid7, the flaw exists because PAN-OS decrypts authentication override cookies with a configured private key and trusts the decrypted contents without signature verification. If the same certificate is reused for HTTPS services and authentication override cookies, attackers can obtain the public key from the HTTPS session and forge cookies the device will accept. Palo Alto advised organizations to patch immediately or mitigate by disabling authentication override or using a different certificate for that feature.\u003c/p\u003e\n"},{"n":3,"title":"PAN-OS GlobalProtect Authentication Bypass (CVE-2026-0257) Under Active Exploitation","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/pan-os-globalprotect-authentication.html","time":"06:41","priority":"MUST READ","score":92,"tldr":"Palo Alto Networks says attackers are actively exploiting CVE-2026-0257, an authentication bypass in PAN-OS GlobalProtect that can let unauthorized users establish VPN access on unpatched devices. Organizations using affected GlobalProtect portal or gateway setups should urgently apply patches or disable/replace the authentication override configuration.","briefOverview":"\u003cp\u003ePalo Alto Networks warned that CVE-2026-0257, a medium-severity authentication bypass flaw affecting PAN-OS and Prisma Access, is under active exploitation in the wild. The issue affects the GlobalProtect portal and gateway and can allow an attacker to bypass security restrictions and establish an unauthorized VPN connection. Palo Alto Networks said it became aware of limited exploit attempts on unpatched PAN-OS devices without mitigations applied.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability specifically affects firewalls with GlobalProtect portal or gateway configured when authentication override cookies are enabled and a specific certificate configuration exists. Rapid7 said it observed successful exploitation across numerous customers, with the earliest attempts dating to May 17, 2026, followed by a second wave on May 21, and assessed both waves to be the work of the same threat actor. In two cases during the second wave, the activity included VPN IP assignment after cookie authentication, which granted access to the internal network.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks recommended urgent action because an authentication bypass in an edge-facing enterprise VPN appliance can have significant impact. As temporary mitigations, the company advised disabling the authentication override feature or generating a new certificate for that feature exclusively. The article also noted a separate report from Arctic Wolf about exploitation of a critical FortiClient EMS flaw used to deliver EKZ Infostealer.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePalo Alto Networks disclosed that CVE-2026-0257, an authentication bypass vulnerability in PAN-OS and Prisma Access, is being actively exploited in the wild. The flaw has a CVSS score of 7.8 and affects the GlobalProtect portal and gateway. According to the company, successful exploitation allows attackers to bypass security restrictions and establish unauthorized VPN connections.\u003c/p\u003e\n\n\u003cp\u003eThe issue does not affect all deployments universally. Palo Alto Networks said the vulnerability impacts firewalls with GlobalProtect portal or gateway configured when authentication override cookies are enabled and a specific certificate configuration exists. This makes the affected configuration dependent on both feature use and certificate setup.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks first released an advisory on May 13, 2026, and later updated it on May 29, 2026. In that update, the company said it had become aware of limited exploit attempts targeting unpatched PAN-OS devices that did not have mitigations in place. This update shifted the issue from a disclosed vulnerability to one associated with real-world attack activity.\u003c/p\u003e\n\n\u003cp\u003eRapid7 provided additional visibility into the exploitation. The company said it identified successful exploitation across numerous customers, with the earliest observed efforts starting on May 17, 2026, and a second wave occurring on May 21. Rapid7 assessed both exploitation sets to be the work of the same threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe second wave demonstrated that the attacks could result in meaningful access. Rapid7 said that in two cases, VPN IP assignment followed cookie authentication, which granted the attacker access to the internal network. At the same time, the company said it did not observe follow-on activity in the customer environments where a VPN session was established.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks urged customers to apply vendor-supplied patches urgently. As temporary mitigations, it recommended disabling the authentication override feature or generating a new certificate to be used exclusively for that feature. The article also connected this activity to a broader environment of edge-device exploitation by noting an Arctic Wolf report on continued exploitation of FortiClient EMS vulnerability CVE-2026-35616 to deliver EKZ Infostealer.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto Networks warned that \u003cstrong\u003eCVE-2026-0257\u003c/strong\u003e, a recently disclosed authentication bypass vulnerability affecting \u003cstrong\u003ePAN-OS\u003c/strong\u003e and \u003cstrong\u003ePrisma Access\u003c/strong\u003e, is under \u003cstrong\u003eactive exploitation in the wild\u003c/strong\u003e. The flaw has a \u003cstrong\u003eCVSS score of 7.8\u003c/strong\u003e and impacts the \u003cstrong\u003eGlobalProtect portal and gateway\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eAccording to Palo Alto Networks, exploitation of the vulnerability can allow an attacker to \u003cstrong\u003ebypass security restrictions and establish an unauthorized VPN connection\u003c/strong\u003e. The company said it became aware of \u003cstrong\u003elimited exploit attempts\u003c/strong\u003e on \u003cstrong\u003eunpatched PAN-OS devices\u003c/strong\u003e that did not have mitigations applied.\u003c/p\u003e\n\n\u003ch1 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto Networks described the issue as an authentication bypass vulnerability in the GlobalProtect portal and gateway components of PAN-OS. The article says this can be exploited by bad actors to set up VPN connections.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects a specific deployment scenario rather than every PAN-OS installation. Palo Alto Networks said it specifically impacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFirewalls with \u003cstrong\u003eGlobalProtect portal or gateway configured\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eEnvironments where \u003cstrong\u003eauthentication override cookies are enabled\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eCases where \u003cstrong\u003ea specific certificate configuration exists\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis means the risk is tied to a particular feature combination and certificate setup.\u003c/p\u003e\n\n\u003ch1 id=\"vendor-timeline-and-advisory-update\"\u003eVendor Timeline and Advisory Update\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto Networks released its advisory on \u003cstrong\u003eMay 13, 2026\u003c/strong\u003e. In an update issued on \u003cstrong\u003eMay 29, 2026\u003c/strong\u003e, the company said it had \u0026ldquo;become aware of limited exploit attempts on unpatched PAN-OS devices without mitigations applied.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThat update is important because it confirms that the vulnerability moved from being a disclosed security issue to one that had begun to see real-world exploitation.\u003c/p\u003e\n\n\u003ch1 id=\"rapid7-observations\"\u003eRapid7 Observations\u003c/h1\u003e\n\n\u003cp\u003eThe article cites Rapid7 as having identified \u003cstrong\u003esuccessful exploitation across numerous customers\u003c/strong\u003e. Rapid7 said the \u003cstrong\u003eearliest observed efforts dated back to May 17, 2026\u003c/strong\u003e, and that a \u003cstrong\u003esecond wave\u003c/strong\u003e of activity took place on \u003cstrong\u003eMay 21\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eRapid7 assessed \u003cstrong\u003eboth exploitation sets to be the work of the same threat actor\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"observed-access-and-impact\"\u003eObserved Access and Impact\u003c/h2\u003e\n\n\u003cp\u003eRapid7 said that in the second wave, activity involved \u003cstrong\u003eVPN IP assignment following the cookie authentication in two cases\u003c/strong\u003e. According to the article, this \u003cstrong\u003egranted the attacker access to the internal network\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eHowever, Rapid7 also said it observed \u003cstrong\u003eno follow-on activity\u003c/strong\u003e in the affected customer environments where a VPN session had been established.\u003c/p\u003e\n\n\u003cp\u003eThis means the article reports confirmed unauthorized access in at least some cases, but no subsequent attacker actions were observed in those environments.\u003c/p\u003e\n\n\u003ch1 id=\"significance\"\u003eSignificance\u003c/h1\u003e\n\n\u003cp\u003eRapid7 emphasized the seriousness of the issue by noting that \u003cstrong\u003ean authentication bypass in an edge-facing enterprise VPN appliance can have significant impact to affected organizations\u003c/strong\u003e. Because GlobalProtect is used for VPN access, the flaw creates a path for unauthorized entry into enterprise environments when the vulnerable conditions are present.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the issue as urgent because:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExploitation is already occurring in the wild\u003c/li\u003e\n\u003cli\u003eSuccessful exploitation has been observed across numerous customers\u003c/li\u003e\n\u003cli\u003eIn some cases, attackers obtained \u003cstrong\u003einternal network access\u003c/strong\u003e via assigned VPN connectivity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"mitigations-and-response\"\u003eMitigations and Response\u003c/h1\u003e\n\n\u003cp\u003ePalo Alto Networks urged organizations to apply a \u003cstrong\u003evendor-supplied patch on an urgent basis\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eAs temporary mitigations, the company recommended either:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDisabling the authentication override feature\u003c/strong\u003e, or\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGenerating a new certificate\u003c/strong\u003e to use \u003cstrong\u003eexclusively\u003c/strong\u003e for the authentication override feature\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese steps are presented as interim protections for organizations that have not yet applied patches.\u003c/p\u003e\n\n\u003ch1 id=\"related-threat-activity-mentioned\"\u003eRelated Threat Activity Mentioned\u003c/h1\u003e\n\n\u003cp\u003eThe article closes by linking this exploitation to another case of active vulnerability weaponization. It references a report from \u003cstrong\u003eArctic Wolf\u003c/strong\u003e about the continued exploitation of \u003cstrong\u003eCVE-2026-35616\u003c/strong\u003e, a critical vulnerability affecting \u003cstrong\u003eFortiClient Endpoint Management Server (EMS)\u003c/strong\u003e deployments.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, that FortiClient EMS flaw is being used to deliver \u003cstrong\u003eEKZ Infostealer\u003c/strong\u003e, a credential-stealing malware.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-0257\u003c/strong\u003e is an actively exploited authentication bypass affecting \u003cstrong\u003ePAN-OS\u003c/strong\u003e and \u003cstrong\u003ePrisma Access\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe flaw impacts \u003cstrong\u003eGlobalProtect portal and gateway\u003c/strong\u003e under specific conditions involving \u003cstrong\u003eauthentication override cookies\u003c/strong\u003e and \u003cstrong\u003ecertificate configuration\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRapid7\u003c/strong\u003e observed successful exploitation across numerous customers and linked two waves of activity to the \u003cstrong\u003esame threat actor\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eIn at least \u003cstrong\u003etwo cases\u003c/strong\u003e, exploitation resulted in \u003cstrong\u003eVPN IP assignment and internal network access\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003ePalo Alto Networks recommended \u003cstrong\u003eurgent patching\u003c/strong\u003e and, as temporary mitigations, advised disabling authentication override or using a new certificate exclusively for that feature.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Palo Alto Networks warned that CVE-2026-0257, an authentication bypass flaw affecting PAN-OS and Prisma Access, is under active exploitation in the wild.","The vulnerability impacts firewalls with GlobalProtect portal or gateway configured when authentication override cookies are enabled and a specific certificate configuration exists.","Palo Alto Networks said it became aware of limited exploit attempts on unpatched PAN-OS devices without mitigations applied.","Rapid7 reported successful exploitation across numerous customers, with the earliest observed activity beginning on May 17, 2026, followed by a second wave on May 21.","Palo Alto Networks recommended either disabling the authentication override feature or generating a new certificate to use exclusively for the authentication override feature as temporary mitigations."],"insights":["The vulnerability only becomes exploitable under a narrow combination of conditions: GlobalProtect portal or gateway must be configured, authentication override cookies must be enabled, and a specific certificate configuration must exist.","Rapid7 observed two exploitation waves by what it assesses to be the same threat actor, with activity starting just days after Palo Alto Networks published its advisory on May 13, 2026.","In at least two cases from the second wave, exploitation progressed beyond cookie authentication to VPN IP assignment, which gave the attacker access to the internal network.","Palo Alto Networks provided two immediate mitigation paths short of full patching: disable authentication override or generate a new certificate dedicated exclusively to that feature.","Rapid7 reported no follow-on activity in customer environments where a VPN session was established, indicating that successful access did not necessarily lead to additional observed actions in those cases."],"referencedReports":[{"title":"CVE-2026-0257","url":"https://security.paloaltonetworks.com/CVE-2026-0257","publisher":"Palo Alto Networks","context":"The article cites Palo Alto Networks' advisory for CVE-2026-0257 and references its details and later update about limited exploit attempts.","category":"advisory","primary":true},{"title":"ETR: Rapid7 observed exploitation of PAN-OS GlobalProtect authentication bypass vulnerability CVE-2026-0257","url":"https://www.rapid7.com/blog/post/etr-rapid7-observed-exploitation-of-pan-os-globalprotect-authentication-bypass-vulnerability-cve-2026-0257/","publisher":"Rapid7","context":"The article references Rapid7's report as the source for observed exploitation across numerous customers and timeline details about the attack waves.","category":"research","primary":true}],"body":"\u003cp\u003ePalo Alto Networks warned that CVE-2026-0257, a medium-severity authentication bypass flaw affecting PAN-OS and Prisma Access, is under active exploitation in the wild. The issue affects the GlobalProtect portal and gateway and can allow an attacker to bypass security restrictions and establish an unauthorized VPN connection. Palo Alto Networks said it became aware of limited exploit attempts on unpatched PAN-OS devices without mitigations applied.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability specifically affects firewalls with GlobalProtect portal or gateway configured when authentication override cookies are enabled and a specific certificate configuration exists. Rapid7 said it observed successful exploitation across numerous customers, with the earliest attempts dating to May 17, 2026, followed by a second wave on May 21, and assessed both waves to be the work of the same threat actor. In two cases during the second wave, the activity included VPN IP assignment after cookie authentication, which granted access to the internal network.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks recommended urgent action because an authentication bypass in an edge-facing enterprise VPN appliance can have significant impact. As temporary mitigations, the company advised disabling the authentication override feature or generating a new certificate for that feature exclusively. The article also noted a separate report from Arctic Wolf about exploitation of a critical FortiClient EMS flaw used to deliver EKZ Infostealer.\u003c/p\u003e\n"},{"n":1,"title":"New CIFSwitch Linux flaw gives root on multiple distributions","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-cifswitch-linux-flaw-gives-root-on-multiple-distributions/","time":"14:16","priority":"SHOULD READ","score":75,"tldr":"A newly disclosed Linux local privilege escalation flaw called CIFSwitch can let unprivileged users gain root by abusing CIFS Kerberos key requests on multiple distributions with vulnerable kernel and cifs-utils combinations. Organizations should patch affected kernels, and if possible mitigate by disabling unused CIFS support, removing cifs-utils, or turning off unprivileged user namespaces.","briefOverview":"\u003cp\u003eA newly disclosed Linux local privilege escalation vulnerability named CIFSwitch could allow attackers to gain root privileges on multiple distributions. The issue affects systems with vulnerable combinations of the kernel CIFS subsystem and cifs-utils, generally version 6.14 and higher, though some older variants are also affected. The flaw was discovered by SpaceX security engineer Asim Viladi Oglu Manizada, who also published a technical report and a proof-of-concept exploit.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the Linux kernel’s CIFS subsystem does not verify that cifs.spnego key requests actually come from the kernel’s CIFS client. This allows an unprivileged user to forge a request that causes the root-privileged cifs.upcall helper to trust attacker-controlled fields. By forcing a namespace switch and triggering a Name Service Switch lookup before privileges are dropped, an attacker can load a malicious NSS module and achieve root code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article says exploitation is not universal and depends on factors such as kernel and cifs-utils versions, user namespace availability, and SELinux or AppArmor policy behavior. Some distributions are vulnerable by default, including Linux Mint 21.3 and 22.3, CentOS Stream 9, Rocky Linux 9, AlmaLinux 9, Kali Linux 2021.4–2026.1, and SLES 15 SP7. A kernel patch has been released upstream, and recommended mitigations include disabling or blacklisting CIFS if unused, removing cifs-utils if unnecessary, and disabling unprivileged user namespaces.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA newly discovered Linux local privilege escalation flaw called CIFSwitch could allow an attacker to gain root privileges by abusing the kernel’s handling of CIFS authentication key requests. The article states that the issue affects multiple Linux distributions that ship vulnerable combinations of the CIFS kernel component and cifs-utils. The vulnerability was discovered and named by Asim Viladi Oglu Manizada, a SpaceX security engineer, who also released a technical analysis and a proof-of-concept exploit.\u003c/p\u003e\n\n\u003cp\u003eCIFS is described in the article as a protocol used to access files, folders, and devices over a local network, and Linux uses it to mount, read, and write data from remote systems. When a CIFS network share uses Kerberos for authentication, the Linux kernel asks a user-space helper to perform the authentication, with cifs-utils serving as the intermediary. In this workflow, the kernel requests a cifs.spnego-type key and request-key runs cifs.upcall as root to obtain or build the Kerberos or SPNEGO authentication material.\u003c/p\u003e\n\n\u003cp\u003eThe core issue is that the Linux kernel’s CIFS subsystem does not verify that cifs.spnego key requests originate from the kernel’s own CIFS client. As a result, an unprivileged user can forge a cifs.spnego request and trigger the normal authentication path. The root-privileged cifs.upcall helper then trusts attacker-controlled fields that it assumes were generated by the kernel, enabling abuse of a namespace switch and a Name Service Switch lookup before privileges are dropped. The article says this can be used to load a malicious NSS module and achieve root code execution.\u003c/p\u003e\n\n\u003cp\u003eManizada says the flaw was introduced 19 years ago in 2007 and that exploitation is non-universal because it depends on several conditions. These include a vulnerable kernel version, a vulnerable cifs-utils version, the availability of user namespaces, and SELinux or AppArmor policies that do not prevent the attack. The article lists Linux Mint 21.3 and 22.3, CentOS Stream 9, Rocky Linux 9, AlmaLinux 9, Kali Linux 2021.4–2026.1, and SLES 15 SP7 as confirmed vulnerable in default configurations.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that various Ubuntu, Debian, Pop!_OS, openSUSE, Oracle Linux, and Amazon Linux versions may be vulnerable if cifs-utils is installed. At the same time, Ubuntu 26.04, Fedora 40-44, CentOS Stream 10, Rocky Linux 10, SLES 16, AlmaLinux 10, and openSUSE Leap 16 have default SELinux or AppArmor settings that prevent exploitation. Amazon Linux 2 and Kali Linux 2019.4 and 2020.4 are reported as not affected because their cifs-utils versions do not contain the namespace-switch functionality used in the attack.\u003c/p\u003e\n\n\u003cp\u003eA kernel fix has been released upstream in commit 3da1fdf, which adds validation of cifs.spnego request origins, though the exact patched kernel versions vary by distribution. The researcher recommends disabling or blacklisting the CIFS module if it is not used, removing cifs-utils if it is unnecessary, and disabling unprivileged user namespaces. The article places CIFSwitch alongside several other recently disclosed Linux privilege-elevation flaws, including Copy Fail, Dirty Frag, Fragnesia, DirtyDecrypt, and PinTheft.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eA newly disclosed Linux local privilege escalation vulnerability named \u003cstrong\u003eCIFSwitch\u003c/strong\u003e could allow an attacker to gain \u003cstrong\u003eroot privileges\u003c/strong\u003e on affected systems. According to the article, the flaw affects multiple Linux distributions that ship vulnerable combinations of the \u003cstrong\u003ekernel CIFS subsystem\u003c/strong\u003e and \u003cstrong\u003ecifs-utils\u003c/strong\u003e, with versions \u003cstrong\u003e6.14 and higher\u003c/strong\u003e affected, although \u003cstrong\u003esome older variants are also vulnerable\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe issue was discovered and named by \u003cstrong\u003eAsim Viladi Oglu Manizada\u003c/strong\u003e, identified in the article as a \u003cstrong\u003eSpaceX security engineer\u003c/strong\u003e. The article says Manizada published both an \u003cstrong\u003eextensive technical report\u003c/strong\u003e describing the flaw and \u003cstrong\u003ea proof-of-concept exploit\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"what-cifs-does-in-this-context\"\u003eWhat CIFS does in this context\u003c/h1\u003e\n\n\u003cp\u003eThe article explains that \u003cstrong\u003eCIFS (Common Internet File System)\u003c/strong\u003e is a networking protocol used to access \u003cstrong\u003efiles, folders, and devices across a local network\u003c/strong\u003e. Linux uses CIFS to \u003cstrong\u003emount, read, and write data from remote systems\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eWhen a CIFS network share uses \u003cstrong\u003eKerberos\u003c/strong\u003e for authentication, the article says the Linux kernel asks a \u003cstrong\u003ehelper program in user space\u003c/strong\u003e to perform the authentication step. In that workflow, \u003cstrong\u003ecifs-utils\u003c/strong\u003e acts as the intermediary.\u003c/p\u003e\n\n\u003cp\u003eSpecifically, the article states:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe kernel requests a \u003cstrong\u003ecifs.spnego-type key\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe normal \u003cstrong\u003ekeyutils/request-key\u003c/strong\u003e configuration runs \u003cstrong\u003ecifs.upcall as root\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThat helper fetches or builds the \u003cstrong\u003eKerberos/SPNEGO\u003c/strong\u003e authentication material.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"technical-cause-of-the-vulnerability\"\u003eTechnical cause of the vulnerability\u003c/h1\u003e\n\n\u003cp\u003eThe core problem described in the article is that the \u003cstrong\u003eLinux kernel’s CIFS subsystem fails to verify that cifs.spnego key requests originate from the kernel’s CIFS client\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eBecause of that missing validation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn \u003cstrong\u003eunprivileged user\u003c/strong\u003e can create a \u003cstrong\u003eforged cifs.spnego request\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThat forged request can trigger the \u003cstrong\u003enormal authentication workflow\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eroot-privileged cifs.upcall\u003c/strong\u003e helper then trusts fields \u003cstrong\u003econtrolled by the attacker\u003c/strong\u003e, assuming they were generated by the kernel.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article defines a \u003cstrong\u003ecifs.spnego key request\u003c/strong\u003e as a request used by the Linux keyring subsystem to obtain authentication data needed by the CIFS/SMB client when connecting to a network share using \u003cstrong\u003eKerberos/SPNEGO authentication\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"how-exploitation-works\"\u003eHow exploitation works\u003c/h1\u003e\n\n\u003cp\u003eThe exploitation path described in the article involves abuse of fields in the forged request. According to the article, an attacker can use those fields to:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eForce a namespace switch\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTrigger a Name Service Switch (NSS) lookup before privileges are dropped\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLoad a malicious NSS module\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eAchieve \u003cstrong\u003eroot code execution\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article frames this as a local privilege escalation path that begins with an \u003cstrong\u003eunprivileged user\u003c/strong\u003e and ends with \u003cstrong\u003eroot-level execution\u003c/strong\u003e under the right conditions.\u003c/p\u003e\n\n\u003ch1 id=\"history-and-exploitability\"\u003eHistory and exploitability\u003c/h1\u003e\n\n\u003cp\u003eManizada says, according to the article, that CIFSwitch was \u003cstrong\u003eintroduced 19 years ago\u003c/strong\u003e in \u003cstrong\u003e2007\u003c/strong\u003e. The article links this claim to a Linux source code blame reference.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article also emphasizes that exploitation is \u003cstrong\u003e“non-universal.”\u003c/strong\u003e It says successful exploitation depends on several factors, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA \u003cstrong\u003evulnerable kernel version\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eA \u003cstrong\u003evulnerable cifs-utils version\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eAvailability of \u003cstrong\u003euser namespaces\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSELinux/AppArmor\u003c/strong\u003e policies that do not block the attack\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis means the presence of the bug alone does not guarantee successful exploitation in every environment described.\u003c/p\u003e\n\n\u003ch1 id=\"affected-and-non-affected-distributions\"\u003eAffected and non-affected distributions\u003c/h1\u003e\n\n\u003cp\u003eThe article says Manizada confirmed the following distributions as \u003cstrong\u003evulnerable in their default configurations\u003c/strong\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLinux Mint 21.3 / 22.3\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCentOS Stream 9\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRocky Linux 9\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlmaLinux 9\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKali Linux 2021.4–2026.1\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSLES 15 SP7\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that \u003cstrong\u003evarious versions\u003c/strong\u003e of the following may be vulnerable \u003cstrong\u003eif cifs-utils is installed\u003c/strong\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUbuntu\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDebian\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePop!_OS\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eopenSUSE\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOracle Linux\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAmazon Linux\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt further distinguishes distributions where \u003cstrong\u003edefault security policy settings prevent exploitation\u003c/strong\u003e, listing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUbuntu 26.04\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFedora 40-44\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCentOS Stream 10\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRocky Linux 10\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSLES 16\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlmaLinux 10\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eopenSUSE Leap 16\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor those systems, the article says \u003cstrong\u003edefault SELinux/AppArmor settings\u003c/strong\u003e block exploitation of CIFSwitch.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that the following are \u003cstrong\u003enot affected at all\u003c/strong\u003e because their cifs-utils versions \u003cstrong\u003elack the namespace-switch functionality\u003c/strong\u003e used in the attack:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAmazon Linux 2\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKali Linux 2019.4 and 2020.4\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"fixes-and-mitigations\"\u003eFixes and mitigations\u003c/h1\u003e\n\n\u003cp\u003eThe article says CIFSwitch has been fixed by a \u003cstrong\u003ekernel patch\u003c/strong\u003e that adds validation of \u003cstrong\u003ecifs.spnego request origins\u003c/strong\u003e. It identifies the upstream change as \u003cstrong\u003ecommit 3da1fdf\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, the article notes that the \u003cstrong\u003eexact kernel versions carrying the fix vary by distribution\u003c/strong\u003e, so users and organizations need distribution-specific patch information.\u003c/p\u003e\n\n\u003cp\u003eThe researcher’s recommended mitigations in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDisable or blacklist the CIFS module if unused\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRemove the cifs-utils package if unnecessary\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDisable unprivileged user namespaces\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"public-exploit-availability\"\u003ePublic exploit availability\u003c/h1\u003e\n\n\u003cp\u003eThe article says Manizada published a \u003cstrong\u003eproof-of-concept exploit\u003c/strong\u003e for CIFSwitch. It notes that organizations can use the PoC to \u003cstrong\u003evalidate the effectiveness of their patches and mitigations\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThis means defenders have a direct way, according to the article, to test whether the environment remains exploitable after remediation steps are applied.\u003c/p\u003e\n\n\u003ch1 id=\"related-context-in-linux-privilege-escalation-disclosures\"\u003eRelated context in Linux privilege escalation disclosures\u003c/h1\u003e\n\n\u003cp\u003eThe article places CIFSwitch within a broader series of recently disclosed Linux privilege-elevation flaws. It specifically mentions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCopy Fail\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirty Frag\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFragnesia\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirtyDecrypt\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePinTheft\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis comparison is presented as contextual framing rather than evidence of a connection between the vulnerabilities.\u003c/p\u003e\n\n\u003ch1 id=\"known-actors-and-attribution\"\u003eKnown actors and attribution\u003c/h1\u003e\n\n\u003cp\u003eThe article identifies only one named person associated with the discovery and publication of the issue:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAsim Viladi Oglu Manizada\u003c/strong\u003e, described as a \u003cstrong\u003eSpaceX security engineer\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does \u003cstrong\u003enot\u003c/strong\u003e identify any threat actor, exploitation group, or malicious campaign using CIFSwitch in the wild.\u003c/p\u003e\n\n\u003ch1 id=\"impact-summary\"\u003eImpact summary\u003c/h1\u003e\n\n\u003cp\u003eBased strictly on the article, the disclosed impact is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLocal privilege escalation\u003c/strong\u003e on Linux systems\u003c/li\u003e\n\u003cli\u003eAbility for an \u003cstrong\u003eunprivileged user\u003c/strong\u003e to obtain \u003cstrong\u003eroot privileges\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003ePotential for \u003cstrong\u003eroot code execution\u003c/strong\u003e through a malicious NSS module\u003c/li\u003e\n\u003cli\u003eExposure across \u003cstrong\u003emultiple Linux distributions\u003c/strong\u003e, depending on software versions and policy configuration\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom line\u003c/h1\u003e\n\n\u003cp\u003eCIFSwitch is a newly disclosed Linux local privilege escalation flaw in the interaction between the kernel’s \u003cstrong\u003eCIFS subsystem\u003c/strong\u003e and \u003cstrong\u003ecifs-utils\u003c/strong\u003e. The issue stems from insufficient validation of \u003cstrong\u003ecifs.spnego key request origins\u003c/strong\u003e, allowing an unprivileged user to forge requests that can be leveraged into \u003cstrong\u003eroot code execution\u003c/strong\u003e through \u003cstrong\u003ecifs.upcall\u003c/strong\u003e, a \u003cstrong\u003enamespace switch\u003c/strong\u003e, and \u003cstrong\u003eNSS module loading\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eA patch is available upstream, exploit code has been released, and the article highlights practical mitigations such as disabling unused \u003cstrong\u003eCIFS\u003c/strong\u003e, removing unnecessary \u003cstrong\u003ecifs-utils\u003c/strong\u003e, and turning off \u003cstrong\u003eunprivileged user namespaces\u003c/strong\u003e where possible.\u003c/p\u003e\n","keyPoints":["A newly disclosed Linux local privilege escalation vulnerability named CIFSwitch can let attackers forge CIFS authentication key descriptions, abuse the kernel’s key request mechanism, and gain root privileges.","The flaw exists because the Linux kernel’s CIFS subsystem does not verify that cifs.spnego key requests originate from the kernel’s CIFS client, allowing an unprivileged user to create a forged request.","The root-privileged cifs.upcall helper can trust attacker-controlled fields in the forged request, which can be abused to force a namespace switch and load a malicious NSS module for root code execution.","The researcher confirmed default-configuration vulnerability on distributions including Linux Mint 21.3 and 22.3, CentOS Stream 9, Rocky Linux 9, AlmaLinux 9, Kali Linux 2021.4–2026.1, and SLES 15 SP7.","CIFSwitch was fixed by a kernel patch that validates cifs.spnego request origins, and the researcher recommends disabling or blacklisting the CIFS module if unused, removing cifs-utils if unnecessary, and disabling unprivileged user namespaces."],"insights":["The vulnerability was introduced 19 years ago in 2007, meaning a long-standing flaw in the Linux CIFS authentication path remained undiscovered until now.","Exploitation is not universal because it depends on a specific combination of factors, including a vulnerable kernel, a vulnerable cifs-utils version, enabled user namespaces, and SELinux or AppArmor policies that do not block the attack.","Some distributions are protected by default not because they lack the bug, but because their default SELinux or AppArmor settings prevent exploitation of CIFSwitch.","Amazon Linux 2 and Kali Linux 2019.4 and 2020.4 are not affected at all because their cifs-utils versions do not include the namespace-switch functionality used in the attack.","A public proof-of-concept exploit is already available, which makes it possible for organizations to directly test whether their patches and mitigations are effective."],"referencedReports":[{"title":"CIFSwitch","url":"https://heyitsas.im/posts/cifswitch/","publisher":"Asim Viladi Oglu Manizada","context":"The article says the researcher published an extensive technical report explaining the cause of the CIFSwitch issue and how it can be leveraged to achieve root privileges.","category":"research","primary":true}],"body":"\u003cp\u003eA newly disclosed Linux local privilege escalation vulnerability named CIFSwitch could allow attackers to gain root privileges on multiple distributions. The issue affects systems with vulnerable combinations of the kernel CIFS subsystem and cifs-utils, generally version 6.14 and higher, though some older variants are also affected. The flaw was discovered by SpaceX security engineer Asim Viladi Oglu Manizada, who also published a technical report and a proof-of-concept exploit.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the Linux kernel’s CIFS subsystem does not verify that cifs.spnego key requests actually come from the kernel’s CIFS client. This allows an unprivileged user to forge a request that causes the root-privileged cifs.upcall helper to trust attacker-controlled fields. By forcing a namespace switch and triggering a Name Service Switch lookup before privileges are dropped, an attacker can load a malicious NSS module and achieve root code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article says exploitation is not universal and depends on factors such as kernel and cifs-utils versions, user namespace availability, and SELinux or AppArmor policy behavior. Some distributions are vulnerable by default, including Linux Mint 21.3 and 22.3, CentOS Stream 9, Rocky Linux 9, AlmaLinux 9, Kali Linux 2021.4–2026.1, and SLES 15 SP7. A kernel patch has been released upstream, and recommended mitigations include disabling or blacklisting CIFS if unused, removing cifs-utils if unnecessary, and disabling unprivileged user namespaces.\u003c/p\u003e\n"}];
