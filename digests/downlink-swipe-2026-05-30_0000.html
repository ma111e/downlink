<script>
window.__DL_ARTICLES = [{"n":2,"title":"Palo Alto GlobalProtect VPN auth bypass flaw now exploited in attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/palo-alto-globalprotect-vpn-auth-bypass-flaw-now-exploited-in-attacks/","time":"18:02","priority":"MUST READ","score":95,"tldr":"A PAN-OS authentication bypass vulnerability (CVE-2026-0257) in GlobalProtect VPN is being actively exploited to gain unauthorized network access; admins must immediately apply patches or disable authentication override cookies to prevent intrusion.","briefOverview":"\u003cp\u003ePalo Alto Networks has warned that an authentication bypass flaw in PAN-OS GlobalProtect VPN, tracked as CVE-2026-0257, is now being actively exploited in attacks against unpatched devices. Originally rated medium severity, the vulnerability’s rating was raised to high after confirmation of in‑the‑wild exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe flaw arises because PAN-OS decrypts authentication override cookies using a configured private key and trusts the decrypted contents without signature verification. If the same certificate is used for both HTTPS and authentication override cookies, attackers can retrieve the public key over HTTPS and forge cookies to authenticate as any user, including the local administrator.\u003c/p\u003e\n\n\u003cp\u003eRapid7 detected exploitation beginning May 17, 2026, with attack waves originating from Vultr and Dromatics Systems infrastructure. While successful exploitation could grant full VPN access to internal networks, many incidents saw the device accept the forged cookie without establishing a complete VPN session. Organizations are urged to apply updates, disable authentication override, or use separate certificates, and CISA has mandated federal agencies to remediate by June 1, 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePalo Alto Networks disclosed that CVE-2026-0257, a vulnerability in PAN-OS GlobalProtect, is under active exploitation. The flaw allows attackers to bypass authentication and establish unauthorized VPN connections to corporate networks. Initially classified as medium severity because exploitation required authentication override cookies to be enabled and a specific certificate setup, the severity was elevated to high once exploitation was confirmed.\u003c/p\u003e\n\n\u003cp\u003eRapid7 provided technical details on the root cause: PAN-OS decrypts authentication override cookies with a private key and trusts the decrypted values without performing signature verification. When the same certificate is reused for both HTTPS services and authentication override cookies, an attacker can extract the corresponding public key from an HTTPS session, forge a valid authentication override cookie, and impersonate arbitrary users, including the local administrator account.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation timeline began on May 17, 2026, with Rapid7 observing successful attacks across multiple customers. The first wave was seen on May 18 from infrastructure hosted by Vultr, and a second wave appeared on May 21 from Dromatics Systems. In some cases, attackers connected via VPN and gained access to internal networks, although Rapid7 noted that they did not witness lateral movement from the compromised devices. In many other instances, the appliance accepted the forged cookie but did not allow the establishment of a full VPN session.\u003c/p\u003e\n\n\u003cp\u003eAffected parties include any organization running unpatched PAN-OS devices with GlobalProtect authentication override cookies enabled and a shared certificate configuration. The attackers\u0026rsquo; motivation appears to be initial network access, though the absence of observed lateral movement suggests varied outcomes. No specific threat actor group was attributed; only the hosting infrastructure providers were mentioned.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks updated its security advisory on Friday to reflect active exploitation, and CISA added CVE-2026-0257 to its Known Exploited Vulnerabilities catalog on May 29, 2026, mandating federal agencies to patch by June 1, 2026. Mitigations include applying the latest security updates, disabling the authentication override feature, or ensuring a unique certificate is used for authentication override cookies that is not shared with other services on the device.\u003c/p\u003e\n\n\u003cp\u003eThe article also references a Rapid7 technical analysis and a proof-of-concept exploit that demoed how an attacker retrieves the public certificate, forges an authentication override cookie, and authenticates without valid credentials. This practical demonstration underscores the ease of exploitation once the misconfiguration is present.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePalo Alto Networks issued a warning about active exploitation of CVE-2026-0257, an authentication bypass vulnerability in PAN-OS GlobalProtect VPN.\u003c/li\u003e\n\u003cli\u003eThe flaw was patched earlier in the month of the article\u0026rsquo;s publication and initially rated as Medium severity because it required specific configuration conditions: authentication override cookies enabled and a particular certificate setup.\u003c/li\u003e\n\u003cli\u003eAfter confirming in‑the‑wild attacks, Palo Alto Networks raised the severity to High on Friday (the update date).\u003c/li\u003e\n\u003cli\u003eRapid7 observed exploitation starting May 17, 2026, across numerous customers, and CISA added the flaw to its Known Exploited Vulnerabilities catalog on May 29, 2026.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"vulnerability-technical-details\"\u003eVulnerability Technical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe root cause lies in how PAN-OS handles authentication override cookies.\u003c/li\u003e\n\u003cli\u003eWhen a GlobalProtect portal or gateway receives an authentication override cookie, it decrypts it using a configured private key and then trusts the decrypted contents without performing any signature verification.\u003c/li\u003e\n\u003cli\u003eIf the same certificate is used for both HTTPS services (where the public key is exposed) and authentication override cookies, an attacker can retrieve the public key from the HTTPS session and create a forged authentication override cookie for any user.\u003c/li\u003e\n\u003cli\u003eThe attacker does not need valid credentials; they can forge a cookie for the local administrator account, gaining unauthorized VPN access.\u003c/li\u003e\n\u003cli\u003eRapid7 developed a proof-of-concept exploit that demonstrates retrieving the public certificate from the GlobalProtect portal/gateway, generating a forged authentication override cookie, and successfully authenticating to an unpatched device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-timeline-and-tactics\"\u003eExploitation Timeline and Tactics\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eEarliest observed exploitation: May 17, 2026.\u003c/li\u003e\n\u003cli\u003eFirst wave detected on May 18, 2026, from infrastructure hosted by Vultr.\u003c/li\u003e\n\u003cli\u003eSecond wave detected on May 21, 2026, from infrastructure hosted by Dromatics Systems.\u003c/li\u003e\n\u003cli\u003eAttackers authenticated to GlobalProtect gateways using forged authentication override cookies targeting the local administrator account.\u003c/li\u003e\n\u003cli\u003eIn some incidents, attackers successfully established a full VPN connection and gained access to internal networks.\u003c/li\u003e\n\u003cli\u003eIn many other cases, the device accepted the forged cookie but did not permit a complete VPN session, possibly due to additional access controls or configuration differences.\u003c/li\u003e\n\u003cli\u003eRapid7\u0026rsquo;s MDR (Managed Detection and Response) identified successful exploitation across numerous customers but observed no indication of lateral movement from the compromised devices.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthorized VPN connections allow attackers to bypass perimeter defenses and potentially access internal resources.\u003c/li\u003e\n\u003cli\u003eEven without observed lateral movement, the initial foothold represents a high-risk situation that could lead to further compromise.\u003c/li\u003e\n\u003cli\u003eAll organizations using PAN-OS GlobalProtect with the vulnerable configuration are affected unless patched or mitigated.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitigation-and-response\"\u003eMitigation and Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePalo Alto Networks urges immediate installation of security updates to patch the flaw.\u003c/li\u003e\n\u003cli\u003eOrganizations can also mitigate by:\n\n\u003cul\u003e\n\u003cli\u003eDisabling the authentication override feature entirely.\u003c/li\u003e\n\u003cli\u003eUsing a separate certificate for authentication override cookies that is not shared with any other service on the device.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eCISA added CVE-2026-0257 to the Known Exploited Vulnerabilities catalog and ordered federal agencies to remediate by June 1, 2026.\u003c/li\u003e\n\u003cli\u003eRapid7 published a blog post with detailed technical analysis and observations to aid defenders.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"references-in-the-article\"\u003eReferences in the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePalo Alto Networks Security Advisory: \u003ca href=\"https://security.paloaltonetworks.com/CVE-2026-0257\" target=\"_blank\"\u003ehttps://security.paloaltonetworks.com/CVE-2026-0257\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eRapid7 Blog: ETR – Rapid7 Observed Exploitation of PAN-OS GlobalProtect Authentication Bypass Vulnerability (CVE-2026-0257)\u003c/li\u003e\n\u003cli\u003eCISA Known Exploited Vulnerabilities Catalog entry for CVE-2026-0257\u003c/li\u003e\n\u003cli\u003eNVD entry for CVE-2026-0257\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Palo Alto Networks confirmed that CVE-2026-0257, an authentication bypass vulnerability in PAN-OS GlobalProtect, is being actively exploited to establish unauthorized VPN connections.","The vulnerability arises because PAN-OS decrypts authentication override cookies with a private key and trusts their contents without signature verification, allowing attackers to forge valid cookies if the same certificate is used for both HTTPS and authentication override.","Rapid7 detected exploitation starting on May 17, 2026, with attackers forging cookies for the local administrator account and launching waves of attacks from Vultr and Dromatics Systems infrastructure.","Successful exploitation can grant attackers VPN access to internal networks, though in some incidents the device accepted forged cookies but did not establish a full VPN session.","Organizations must immediately apply security updates or mitigate the flaw by disabling authentication override or using a separate certificate; CISA added the vulnerability to its Known Exploited Vulnerabilities catalog with a June 1, 2026 federal remediation deadline."],"insights":["The root cause is a design flaw: PAN-OS does not verify the signature on authentication override cookies and merely decrypts them with a private key, meaning any attacker who obtains the public key from the same certificate used for HTTPS can forge valid cookies.","Despite successful authentication bypass, Rapid7 observed no lateral movement from compromised devices, suggesting that gaining a VPN foothold did not immediately lead to deeper network compromise in these incidents—though the access is still highly dangerous.","The window from first observed exploitation (May 17) to the CISA remediation deadline (June 1) was only two weeks, reflecting an urgent race condition for defenders to patch or implement the certificate-separation mitigation."],"referencedReports":[{"title":"Palo Alto Networks Security Advisory for CVE-2026-0257","url":"https://security.paloaltonetworks.com/CVE-2026-0257","publisher":"Palo Alto Networks","context":"The article cites Palo Alto's advisory to explain the vulnerability and its original medium severity rating before active exploitation raised it to high.","category":"","primary":false},{"title":"ETR: Rapid7 Observed Exploitation of PAN-OS GlobalProtect Authentication Bypass Vulnerability (CVE-2026-0257)","url":"https://www.rapid7.com/blog/post/etr-rapid7-observed-exploitation-of-pan-os-globalprotect-authentication-bypass-vulnerability-cve-2026-0257/","publisher":"Rapid7","context":"The article references Rapid7's technical analysis and incident observations, including first exploitation on May 17, attack waves, and the root cause of the flaw.","category":"","primary":false},{"title":"CISA Known Exploited Vulnerabilities Catalog: CVE-2026-0257","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog#:~:text=NETWORKS%20%7C%20PAN%2DOS-,CVE%2D2026%2D0257,-Palo%20Alto%20Networks","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"The article notes that CISA added the flaw to its KEV catalog and set a June 1, 2026 remediation deadline for federal agencies.","category":"","primary":false}],"body":"\u003cp\u003ePalo Alto Networks has warned that an authentication bypass flaw in PAN-OS GlobalProtect VPN, tracked as CVE-2026-0257, is now being actively exploited in attacks against unpatched devices. Originally rated medium severity, the vulnerability’s rating was raised to high after confirmation of in‑the‑wild exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe flaw arises because PAN-OS decrypts authentication override cookies using a configured private key and trusts the decrypted contents without signature verification. If the same certificate is used for both HTTPS and authentication override cookies, attackers can retrieve the public key over HTTPS and forge cookies to authenticate as any user, including the local administrator.\u003c/p\u003e\n\n\u003cp\u003eRapid7 detected exploitation beginning May 17, 2026, with attack waves originating from Vultr and Dromatics Systems infrastructure. While successful exploitation could grant full VPN access to internal networks, many incidents saw the device accept the forged cookie without establishing a complete VPN session. Organizations are urged to apply updates, disable authentication override, or use separate certificates, and CISA has mandated federal agencies to remediate by June 1, 2026.\u003c/p\u003e\n"},{"n":3,"title":"PAN-OS GlobalProtect Authentication Bypass (CVE-2026-0257) Under Active Exploitation","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/pan-os-globalprotect-authentication.html","time":"06:41","priority":"MUST READ","score":95,"tldr":"A medium-severity authentication bypass in Palo Alto Networks PAN-OS GlobalProtect is being actively exploited to establish unauthorized VPN connections, requiring urgent patching or mitigation.","briefOverview":"\u003cp\u003ePalo Alto Networks warned on May 13, 2026 that a medium-severity authentication bypass vulnerability (CVE-2026-0257, CVSS 7.8) in PAN-OS GlobalProtect is under active exploitation. The flaw enables attackers to bypass security restrictions and establish unauthorized VPN connections on affected firewalls. Exploitation was confirmed by Rapid7, which observed successful attacks across multiple customers beginning May 17, 2026, with a second wave on May 21 carried out by the same threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability impacts devices where the GlobalProtect portal or gateway is configured, authentication override cookies are enabled, and a specific certificate configuration exists. In at least two cases during the second wave, attackers leveraged the bypass to obtain VPN IP assignment and gain internal network access, though no post-access activity was detected. Palo Alto Networks urges organizations to apply the available patch immediately or, as a temporary measure, to disable the authentication override feature or generate a new dedicated certificate for that feature.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePalo Alto Networks disclosed a medium-severity authentication bypass vulnerability, CVE-2026-0257 (CVSS 7.8), affecting PAN-OS software and Prisma Access in an advisory on May 13, 2026. The flaw resides in the GlobalProtect portal and gateway components and allows an attacker to circumvent security restrictions to set up an unauthorized VPN connection. An update to the advisory on May 29, 2026, confirmed that limited exploit attempts had been detected against unpatched devices without applied mitigations.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is exploitable only under a specific set of conditions: when the GlobalProtect portal or gateway is configured, authentication override cookies are enabled, and a particular certificate configuration is in place. Under these circumstances, an authentication bypass can be performed, effectively granting the attacker the same network access as an authenticated VPN user. The vulnerability was assigned a CVSS score of 7.8, categorized as medium severity, but its active exploitation underscores the danger of edge-facing VPN appliance flaws regardless of the severity rating.\u003c/p\u003e\n\n\u003cp\u003eRapid7 published its own findings after observing successful exploitation attempts across numerous customer environments. The first wave of activity began on May 17, 2026, followed by a second wave on May 21, 2026; both waves are assessed to be the work of the same threat actor. During the second wave, Rapid7 identified two cases where the attackers managed to obtain a VPN IP assignment after authenticating via the cookie bypass, thereby gaining access to the internal network. No subsequent malicious actions or follow-on activity were observed within those customer environments following the VPN session establishment.\u003c/p\u003e\n\n\u003cp\u003eThe impact of an authentication bypass on an edge-facing VPN appliance is potentially severe, as it can provide attackers with direct entry into an organization\u0026rsquo;s internal network. Rapid7 emphasized the urgent need for affected organizations to upgrade to a vendor-supplied patch, warning that the vulnerability can have significant consequences. The vendor\u0026rsquo;s temporary mitigations include disabling the authentication override feature entirely or generating a new certificate to be used exclusively for the authentication override functionality, which would neutralize the attack vector.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation of CVE-2026-0257 comes amid a broader wave of attacks targeting VPN infrastructure. The article references a prior report from Arctic Wolf about threat actors exploiting a critical FortiClient Endpoint Management Server vulnerability (CVE-2026-35616) to deliver the EKZ Infostealer credential-theft malware. This context highlights a sustained campaign against remote access solutions, making timely patching and defense-in-depth strategies critical for organizations that rely on these technologies.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePalo Alto Networks disclosed an authentication bypass vulnerability (CVE-2026-0257, CVSS 7.8, medium severity) in PAN-OS GlobalProtect and Prisma Access on May 13, 2026.\u003c/li\u003e\n\u003cli\u003eThe advisory was updated on May 29, 2026, to note that limited exploit attempts had been observed on unpatched devices without mitigations.\u003c/li\u003e\n\u003cli\u003eThe vulnerability allows an attacker to bypass security restrictions and establish an unauthorized VPN connection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe flaw exists in the GlobalProtect portal and gateway components of PAN-OS software.\u003c/li\u003e\n\u003cli\u003eSuccessful exploitation requires three conditions to be met simultaneously:\n\n\u003cul\u003e\n\u003cli\u003eGlobalProtect portal or gateway is configured.\u003c/li\u003e\n\u003cli\u003eAuthentication override cookies are enabled.\u003c/li\u003e\n\u003cli\u003eA specific certificate configuration exists.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eWhen these conditions are present, an attacker can use an authentication bypass to gain VPN access as if they were an authorized user.\u003c/li\u003e\n\u003cli\u003eThe CVSS base score of 7.8 reflects a medium-severity rating, yet the active exploitation demonstrates that such edge-facing authentication flaws can pose a critical risk in practice.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-activity\"\u003eExploitation Activity\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eRapid7 published a technical analysis revealing that they detected successful exploitation across multiple customer environments.\u003c/li\u003e\n\u003cli\u003eThe earliest exploitation attempts were observed on May 17, 2026, with a second wave occurring on May 21, 2026.\u003c/li\u003e\n\u003cli\u003eBoth waves are attributed to the same threat actor, indicating a targeted and persistent effort rather than broad opportunistic scanning.\u003c/li\u003e\n\u003cli\u003eDuring the second wave, Rapid7 noted that in two separate cases, the attacker successfully obtained a VPN IP assignment after authenticating via the cookie override mechanism.\u003c/li\u003e\n\u003cli\u003eThis IP assignment effectively gave the attacker access to the internal network of those organizations.\u003c/li\u003e\n\u003cli\u003eNo follow-on activity—such as lateral movement, data exfiltration, or command execution—was observed within the environments where a VPN session was established, leaving the attacker\u0026rsquo;s ultimate objectives unclear.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-environments-and-risk\"\u003eAffected Environments and Risk\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAny organization running a PAN-OS firewall with GlobalProtect portal or gateway enabled, authentication override cookies turned on, and the presence of a specific certificate configuration is potentially vulnerable.\u003c/li\u003e\n\u003cli\u003eBecause the vulnerability has a CVSS score of 7.8 (medium), some security teams may incorrectly deprioritize remediation, unaware that active exploitation has already occurred.\u003c/li\u003e\n\u003cli\u003eAn authentication bypass at the network edge can expose internal resources directly, bypassing perimeter defenses and potentially enabling further compromise.\u003c/li\u003e\n\u003cli\u003eRapid7 stressed that the impact to affected organizations can be significant, urging an urgent upgrade to the vendor-supplied patch.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitigations-and-recommended-actions\"\u003eMitigations and Recommended Actions\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePermanent fix\u003c/strong\u003e: Apply the patch released by Palo Alto Networks on an urgent basis.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTemporary mitigations\u003c/strong\u003e (for those unable to patch immediately):\n\n\u003cul\u003e\n\u003cli\u003eDisable the authentication override feature entirely.\u003c/li\u003e\n\u003cli\u003eGenerate a new certificate and configure it to be used exclusively for the authentication override feature.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eOrganizations should also review VPN logs for unauthorized sessions and anomalous cookie-based authentication attempts that correspond to the exploitation timeline (mid-May 2026 onwards).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article notes that the exploitation of CVE-2026-0257 follows a report from Arctic Wolf about the ongoing exploitation of a critical FortiClient Endpoint Management Server vulnerability (CVE-2026-35616, CVSS 9.1).\u003c/li\u003e\n\u003cli\u003eThat separate campaign was used to deliver the EKZ Infostealer, a credential-stealing malware.\u003c/li\u003e\n\u003cli\u003eThe parallel exploitation of VPN and remote management appliances underscores a heightened threat environment targeting enterprise remote access infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A medium-severity authentication bypass vulnerability (CVE-2026-0257, CVSS 7.8) in PAN-OS GlobalProtect allows attackers to bypass security restrictions and establish unauthorized VPN connections.","The vulnerability affects firewalls where the GlobalProtect portal or gateway is configured, authentication override cookies are enabled, and a specific certificate configuration exists.","Palo Alto Networks confirmed limited exploit attempts on unpatched devices, and Rapid7 observed successful exploitation across multiple customer environments starting May 17, 2026.","In two cases during the second exploitation wave, attackers gained VPN IP assignment after cookie authentication, granting access to the internal network.","Organizations are urged to apply the vendor patch urgently or, as a temporary mitigation, disable the authentication override feature or generate a new certificate for it."],"insights":["Despite its CVSS score of 7.8 (medium severity), CVE-2026-0257 has been actively exploited in the wild, demonstrating that severity ratings do not always reflect real-world exploitation risk.","The attack activity occurred in two distinct waves beginning May 17 and May 21, 2026, assessed by Rapid7 to be the work of the same threat actor, indicating a targeted intrusion effort rather than indiscriminate scanning.","In at least two cases where unauthorized VPN sessions were established after cookie authentication, no follow-on activity was observed, leaving the attacker's post-access objectives unclear.","Exploitation only succeeds when authentication override cookies are enabled and a specific certificate configuration exists, meaning many organizations with affected appliances may be unaware of their exposure if they assume the medium severity implies low risk."],"referencedReports":[{"title":"CVE-2026-0257 Advisory","url":"https://security.paloaltonetworks.com/CVE-2026-0257","publisher":"Palo Alto Networks","context":"Palo Alto Networks disclosed the authentication bypass vulnerability in PAN-OS GlobalProtect and provided mitigation guidance.","category":"","primary":false},{"title":"ETR: Rapid7 Observed Exploitation of PAN-OS GlobalProtect Authentication Bypass Vulnerability (CVE-2026-0257)","url":"https://www.rapid7.com/blog/post/etr-rapid7-observed-exploitation-of-pan-os-globalprotect-authentication-bypass-vulnerability-cve-2026-0257/","publisher":"Rapid7","context":"Rapid7 revealed successful exploitation across numerous customer environments, with activity observed in two waves starting May 17, 2026, and noted VPN IP assignment in two cases.","category":"","primary":false}],"body":"\u003cp\u003ePalo Alto Networks warned on May 13, 2026 that a medium-severity authentication bypass vulnerability (CVE-2026-0257, CVSS 7.8) in PAN-OS GlobalProtect is under active exploitation. The flaw enables attackers to bypass security restrictions and establish unauthorized VPN connections on affected firewalls. Exploitation was confirmed by Rapid7, which observed successful attacks across multiple customers beginning May 17, 2026, with a second wave on May 21 carried out by the same threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability impacts devices where the GlobalProtect portal or gateway is configured, authentication override cookies are enabled, and a specific certificate configuration exists. In at least two cases during the second wave, attackers leveraged the bypass to obtain VPN IP assignment and gain internal network access, though no post-access activity was detected. Palo Alto Networks urges organizations to apply the available patch immediately or, as a temporary measure, to disable the authentication override feature or generate a new dedicated certificate for that feature.\u003c/p\u003e\n"},{"n":1,"title":"New CIFSwitch Linux flaw gives root on multiple distributions","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-cifswitch-linux-flaw-gives-root-on-multiple-distributions/","time":"14:16","priority":"SHOULD READ","score":88,"tldr":"A new local privilege escalation vulnerability called CIFSwitch in the Linux kernel lets unprivileged users gain root by forging CIFS key requests; affected users should patch their systems or disable the CIFS module and cifs-utils.","briefOverview":"\u003cp\u003eA newly disclosed Linux kernel vulnerability called CIFSwitch allows unprivileged local attackers to escalate to root by forging CIFS authentication key descriptions. The flaw stems from the CIFS subsystem’s failure to verify that \u003ccode\u003ecifs.spnego\u003c/code\u003e key requests originate from the kernel’s own CIFS client, so an attacker can craft a fake request and trigger the root-privileged \u003ccode\u003ecifs.upcall\u003c/code\u003e helper.\u003c/p\u003e\n\n\u003cp\u003eBy abusing attacker-controlled fields to force a namespace switch and triggering a Name Service Switch (NSS) lookup before privileges are dropped, a local user can load a malicious NSS module and execute code as root. The vulnerability was introduced in 2007 and impacts multiple distributions with default configurations, including Linux Mint, CentOS Stream, Rocky Linux, AlmaLinux, Kali Linux, and SLES.\u003c/p\u003e\n\n\u003cp\u003eA kernel patch adding origin validation has been committed, and mitigations include disabling the CIFS module, removing \u003ccode\u003ecifs-utils\u003c/code\u003e, or disabling unprivileged user namespaces. A proof-of-concept exploit is available to help organizations verify their patch status.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity engineer Asim Viladi Oglu Manizada discovered a local privilege escalation vulnerability in the Linux kernel, dubbed CIFSwitch, that allows an unprivileged user to gain root by abusing CIFS authentication key management. The attack targets the kernel’s CIFS client, which uses the \u003ccode\u003ecifs.upcall\u003c/code\u003e helper (from \u003ccode\u003ecifs-utils\u003c/code\u003e) to fetch Kerberos credentials for network shares. The core problem is that the kernel does not validate that a \u003ccode\u003ecifs.spnego\u003c/code\u003e key request genuinely comes from its own CIFS client, enabling an attacker to forge such a request and launch the root‑privileged authentication workflow.\u003c/p\u003e\n\n\u003cp\u003eThe exploit chain forces the root-running \u003ccode\u003ecifs.upcall\u003c/code\u003e to trust attacker-controlled fields that it assumes were generated by the kernel. The attacker uses these fields to instigate a namespace switch and then triggers an NSS lookup before privileges are dropped, loading a malicious NSS module to achieve root code execution. The underlying code flaw has existed since 2007 but went unnoticed for nearly two decades.\u003c/p\u003e\n\n\u003cp\u003eBy default, several distributions are confirmed vulnerable: Linux Mint 21.\u003csup\u003e3\u003c/sup\u003e\u0026frasl;\u003csub\u003e22\u003c/sub\u003e.3, CentOS Stream 9, Rocky Linux 9, AlmaLinux 9, Kali Linux 2021.4–2026.1, and SLES 15 SP7. Other distributions such as Ubuntu, Debian, Pop!_OS, openSUSE, Oracle Linux, and Amazon Linux may be at risk if \u003ccode\u003ecifs-utils\u003c/code\u003e is installed. Conversely, systems with restrictive SELinux or AppArmor policies (e.g., Ubuntu 26.04, Fedora 40–44, CentOS Stream 10, Rocky Linux 10, SLES 16, AlmaLinux 10, openSUSE Leap 16) are protected by default, and Amazon Linux 2 and older Kali releases are immune because their \u003ccode\u003ecifs-utils\u003c/code\u003e lack the namespace-switch functionality.\u003c/p\u003e\n\n\u003cp\u003eExploitation requires a vulnerable kernel (6.14 and higher, plus some older versions), a vulnerable \u003ccode\u003ecifs-utils\u003c/code\u003e version, available user namespaces, and permissive security policies. The vulnerability is therefore not universal, but the conditions are met in many real-world default installations.\u003c/p\u003e\n\n\u003cp\u003eUpstream fix commit \u003ccode\u003e3da1fdf\u003c/code\u003e adds validation that \u003ccode\u003ecifs.spnego\u003c/code\u003e requests originate from the kernel CIFS client. Users should update to patched kernels, or apply mitigations such as disabling/blacklisting the CIFS module, removing \u003ccode\u003ecifs-utils\u003c/code\u003e, or disabling unprivileged user namespaces. A proof-of-concept exploit has been published by the researcher to enable testing.\u003c/p\u003e\n\n\u003cp\u003eCIFSwitch is the latest in a string of recently disclosed Linux privilege-escalation bugs, including Copy Fail, Dirty Frag, Fragnesia, DirtyDecrypt, and PinTheft, highlighting ongoing attention to kernel‑level security weaknesses.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eA local privilege escalation vulnerability named \u003cstrong\u003eCIFSwitch\u003c/strong\u003e was discovered in the Linux kernel by Asim Viladi Oglu Manizada, a SpaceX security engineer.\u003c/li\u003e\n\u003cli\u003eThe flaw allows an unprivileged local user to forge CIFS authentication key descriptions, abuse the kernel’s key request mechanism, and gain root privileges.\u003c/li\u003e\n\u003cli\u003eCIFS (Common Internet File System) is used to mount remote network shares; when Kerberos authentication is used, the kernel relies on the root‑privileged \u003ccode\u003ecifs.upcall\u003c/code\u003e helper from the \u003ccode\u003ecifs-utils\u003c/code\u003e suite to fetch the necessary credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"technical-details\"\u003eTechnical Details\u003c/h1\u003e\n\n\u003ch2 id=\"normal-authentication-flow\"\u003eNormal Authentication Flow\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhen a CIFS share requires Kerberos, the kernel requests a \u003ccode\u003ecifs.spnego\u003c/code\u003e key.\u003c/li\u003e\n\u003cli\u003eThe key request configuration runs \u003ccode\u003ecifs.upcall\u003c/code\u003e as root to build or retrieve Kerberos/SPNEGO material.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"root-cause\"\u003eRoot Cause\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe kernel’s CIFS subsystem does \u003cstrong\u003enot verify\u003c/strong\u003e that a \u003ccode\u003ecifs.spnego\u003c/code\u003e key request originates from the kernel’s own CIFS client.\u003c/li\u003e\n\u003cli\u003eAn unprivileged user can craft a forged \u003ccode\u003ecifs.spnego\u003c/code\u003e request and trigger the normal authentication workflow, causing \u003ccode\u003ecifs.upcall\u003c/code\u003e to trust attacker‑controlled fields that it assumes were generated by the kernel.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-steps\"\u003eExploitation Steps\u003c/h2\u003e\n\n\u003col\u003e\n\u003cli\u003eThe attacker creates a fake \u003ccode\u003ecifs.spnego\u003c/code\u003e key request.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecifs.upcall\u003c/code\u003e processes the request as root and trusts the attacker‑supplied parameters.\u003c/li\u003e\n\u003cli\u003eThe attacker abuses these fields to force a \u003cstrong\u003enamespace switch\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eBefore privileges are dropped, a \u003cstrong\u003eName Service Switch (NSS) lookup\u003c/strong\u003e is triggered.\u003c/li\u003e\n\u003cli\u003eThe attacker loads a malicious NSS module, achieving root code execution.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch1 id=\"affected-software-and-distributions\"\u003eAffected Software and Distributions\u003c/h1\u003e\n\n\u003ch2 id=\"vulnerable-by-default-configuration\"\u003eVulnerable by Default Configuration\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eLinux Mint 21.3\u003c/li\u003e\n\u003cli\u003eLinux Mint 22.3\u003c/li\u003e\n\u003cli\u003eCentOS Stream 9\u003c/li\u003e\n\u003cli\u003eRocky Linux 9\u003c/li\u003e\n\u003cli\u003eAlmaLinux 9\u003c/li\u003e\n\u003cli\u003eKali Linux 2021.4 through 2026.1\u003c/li\u003e\n\u003cli\u003eSLES 15 SP7\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"potentially-vulnerable-if-cifs-utils-is-installed\"\u003ePotentially Vulnerable (if \u003ccode\u003ecifs-utils\u003c/code\u003e is installed)\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eVarious Ubuntu, Debian, Pop!_OS, openSUSE, Oracle Linux, and Amazon Linux versions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"not-exploitable-due-to-default-security-policies\"\u003eNot Exploitable Due to Default Security Policies\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eUbuntu 26.04\u003c/li\u003e\n\u003cli\u003eFedora 40–44\u003c/li\u003e\n\u003cli\u003eCentOS Stream 10\u003c/li\u003e\n\u003cli\u003eRocky Linux 10\u003c/li\u003e\n\u003cli\u003eSLES 16\u003c/li\u003e\n\u003cli\u003eAlmaLinux 10\u003c/li\u003e\n\u003cli\u003eopenSUSE Leap 16\u003c/li\u003e\n\u003cli\u003eThese distributions have default SELinux/AppArmor configurations that block the attack.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"not-affected-immune\"\u003eNot Affected (Immune)\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAmazon Linux 2\u003c/li\u003e\n\u003cli\u003eKali Linux 2019.4\u003c/li\u003e\n\u003cli\u003eKali Linux 2020.4\u003c/li\u003e\n\u003cli\u003eTheir \u003ccode\u003ecifs-utils\u003c/code\u003e packages lack the namespace‑switch functionality needed for the exploit.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"exploitation-requirements\"\u003eExploitation Requirements\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eVulnerable kernel (versions 6.14 and higher, plus certain older variants).\u003c/li\u003e\n\u003cli\u003eVulnerable \u003ccode\u003ecifs-utils\u003c/code\u003e version.\u003c/li\u003e\n\u003cli\u003eUnprivileged user namespaces must be available.\u003c/li\u003e\n\u003cli\u003eSELinux or AppArmor policies must be permissive (i.e., not blocking the attack).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"discovery-and-history\"\u003eDiscovery and History\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerable code was introduced \u003cstrong\u003e19 years ago\u003c/strong\u003e (2007) in the kernel CIFS code.\u003c/li\u003e\n\u003cli\u003eManizada identified the flaw and named it CIFSwitch.\u003c/li\u003e\n\u003cli\u003eA detailed \u003ca href=\"https://heyitsas.im/posts/cifswitch/\" target=\"_blank\"\u003etechnical report\u003c/a\u003e and a proof‑of‑concept exploit (available at \u003ccode\u003ehttp://github.com/manizada/CIFSwitch\u003c/code\u003e) have been published.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"fix-and-mitigations\"\u003eFix and Mitigations\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUpstream kernel patch\u003c/strong\u003e: commit \u003ccode\u003e3da1fdf\u003c/code\u003e adds proper validation that \u003ccode\u003ecifs.spnego\u003c/code\u003e key requests come from the kernel CIFS client.\u003c/li\u003e\n\u003cli\u003eFixed kernel versions vary by distribution; users should follow vendor advisories.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecommended mitigations\u003c/strong\u003e for unpatched systems:\n\n\u003cul\u003e\n\u003cli\u003eDisable or blacklist the \u003ccode\u003ecifs\u003c/code\u003e kernel module if it is not needed.\u003c/li\u003e\n\u003cli\u003eRemove the \u003ccode\u003ecifs-utils\u003c/code\u003e package if it is not required.\u003c/li\u003e\n\u003cli\u003eDisable unprivileged user namespaces.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThe PoC exploit can be used to verify the effectiveness of patches and mitigations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"related-context\"\u003eRelated Context\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCIFSwitch is part of a recent series of Linux privilege‑escalation disclosures, including \u003cstrong\u003eCopy Fail\u003c/strong\u003e, \u003cstrong\u003eDirty Frag\u003c/strong\u003e, \u003cstrong\u003eFragnesia\u003c/strong\u003e, \u003cstrong\u003eDirtyDecrypt\u003c/strong\u003e, and \u003cstrong\u003ePinTheft\u003c/strong\u003e, drawing sustained attention to kernel‑level security issues.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A local privilege escalation vulnerability named CIFSwitch in the Linux kernel allows unprivileged attackers to forge CIFS key requests and gain root privileges.","The vulnerability exists because the kernel's CIFS subsystem does not verify that cifs.spnego key requests originate from the kernel's own CIFS client, allowing an unprivileged user to trigger the root-privileged authentication workflow.","By crafting a malicious cifs.spnego request, an attacker can force the cifs.upcall helper to switch namespaces and load a malicious NSS module, achieving root code execution.","Multiple Linux distributions are affected with default configurations, including Linux Mint 21.3/22.3, CentOS Stream 9, Rocky Linux 9, AlmaLinux 9, Kali Linux 2021.4–2026.1, and SLES 15 SP7.","The flaw has been fixed by a kernel patch that adds validation of request origins, and mitigations include disabling or blacklisting the CIFS module, removing cifs-utils, or disabling unprivileged user namespaces."],"insights":["Despite the vulnerable code being introduced in 2007, the missing validation of key request origins went unnoticed for 19 years, revealing a long-standing security gap in the kernel CIFS subsystem.","Exploitation requires not only vulnerable software but also the availability of unprivileged user namespaces and permissive SELinux/AppArmor policies, meaning some distributions with the same vulnerable packages are inadvertently protected by their default security configurations.","The attack succeeds because the root-privileged cifs.upcall helper implicitly trusts fields in key requests that an unprivileged user can forge, highlighting a dangerous assumption about input provenance in kernel–userspace interactions."],"referencedReports":[{"title":"CIFSwitch technical report","url":"https://heyitsas.im/posts/cifswitch/","publisher":"Asim Viladi Oglu Manizada","context":"The researcher who discovered the CIFSwitch vulnerability published a detailed technical report explaining the cause of the flaw and how it can be exploited to gain root privileges.","category":"","primary":false}],"body":"\u003cp\u003eA newly disclosed Linux kernel vulnerability called CIFSwitch allows unprivileged local attackers to escalate to root by forging CIFS authentication key descriptions. The flaw stems from the CIFS subsystem’s failure to verify that \u003ccode\u003ecifs.spnego\u003c/code\u003e key requests originate from the kernel’s own CIFS client, so an attacker can craft a fake request and trigger the root-privileged \u003ccode\u003ecifs.upcall\u003c/code\u003e helper.\u003c/p\u003e\n\n\u003cp\u003eBy abusing attacker-controlled fields to force a namespace switch and triggering a Name Service Switch (NSS) lookup before privileges are dropped, a local user can load a malicious NSS module and execute code as root. The vulnerability was introduced in 2007 and impacts multiple distributions with default configurations, including Linux Mint, CentOS Stream, Rocky Linux, AlmaLinux, Kali Linux, and SLES.\u003c/p\u003e\n\n\u003cp\u003eA kernel patch adding origin validation has been committed, and mitigations include disabling the CIFS module, removing \u003ccode\u003ecifs-utils\u003c/code\u003e, or disabling unprivileged user namespaces. A proof-of-concept exploit is available to help organizations verify their patch status.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }

          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{

      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",

}

function ScoreBar({ score }) {

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {

}

function ReportsPanel({ reports }) {

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

        }}>TRIAGE</span>

        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
