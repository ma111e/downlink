window.__DL_ARTICLES = [{"n":5,"title":"The Hades Campaign: Graph ML PyPI Packages Deploy Cross-Platform Memory Scrapers, AI Analyst Misdirection, and a Wiper Deterrent","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/the-hades-campaign-pypi-packages","time":"09:15","priority":"MUST READ","score":96,"tldr":"A sophisticated PyPI supply-chain campaign dubbed Hades compromised multiple scientific and graph ML packages, using a Bun-based payload to steal credentials, scrape GitHub Actions runner memory across Linux, macOS, and Windows, spread through CI/CD and developer environments, and maintain GitHub-based C2. The malware also includes AI-analysis prompt injection and a token-revocation wiper deterrent, making immediate detection and incident response more difficult.","briefOverview":"\u003cp\u003eOn June 8, 2026, version 0.8.101 of the graph machine learning package \u003ccode\u003eensmallen\u003c/code\u003e on PyPI was identified as containing a sophisticated supply chain compromise. Related packages in the computational biology, bioinformatics, and genotype-phenotype analysis ecosystem were also found to carry the same malicious payload. The operation is tracked in the article as the Hades Campaign and is described as the latest evolution of the Miasma threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages execute a malicious Python import hook that downloads a standalone Bun runtime and runs an obfuscated JavaScript payload from \u003ccode\u003e_index.js\u003c/code\u003e. The payload decrypts multiple functional modules and includes cross-platform memory scrapers for Linux, macOS, and Windows, targeting GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract plaintext secrets and tokens. The article also describes GitHub-based command-and-control channels, encrypted exfiltration repositories, worm propagation, IDE and AI assistant backdoors, and persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eA notable feature of the campaign is a plain-text prompt injection placed at the start of the JavaScript bundle to misdirect automated LLM-based security analysis. The malware also installs a \u003ccode\u003egh-token-monitor\u003c/code\u003e service that checks whether a stolen GitHub token has been revoked and triggers destructive file deletion if it receives a 4xx response. The article states that StepSecurity Harden-Runner detects attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory and enters lockdown mode to terminate the malicious process.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn June 8, 2026, the article says version 0.8.101 of the PyPI package \u003ccode\u003eensmallen\u003c/code\u003e was identified as compromised. Multiple related packages were also listed as affected, including \u003ccode\u003emflux-streamlit\u003c/code\u003e, \u003ccode\u003enhmpy\u003c/code\u003e, \u003ccode\u003eppkt2synergy\u003c/code\u003e, \u003ccode\u003eembiggen\u003c/code\u003e, \u003ccode\u003egpsea\u003c/code\u003e, and \u003ccode\u003epyphetools\u003c/code\u003e. The campaign is named Hades and is described as the latest evolution of the Miasma threat actor, with overlap in credential harvesting, self-replicating worm logic, and GitHub-based exfiltration from prior campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe infection path begins with an obfuscated import hook embedded in \u003ccode\u003e__init__.py\u003c/code\u003e. When imported, the code checks for \u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e, searches Python module paths for \u003ccode\u003e_index.js\u003c/code\u003e, downloads Bun v1.3.14 from GitHub if needed, and runs the JavaScript payload with \u003ccode\u003ebun run\u003c/code\u003e. The article says this allows complex JavaScript tasks to run even in environments without Node.js.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003e_index.js\u003c/code\u003e bundle begins with a plain-text prompt injection intended to manipulate automated LLM-based analysis systems into ignoring the obfuscated code and producing a safe report. The bundle then acts as a bootstrapper that decrypts sixteen gzip-compressed AES-256-GCM encrypted blobs. These modules include OS-specific memory readers, IDE and CI/CD backdoor setup logic, and command-and-control components.\u003c/p\u003e\n\n\u003cp\u003eA central capability of the Hades Campaign is cross-platform scraping of GitHub Actions runner memory. On Linux, the malware reads \u003ccode\u003e/proc/{pid}/maps\u003c/code\u003e and \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e; on macOS, it uses Mach VM APIs through Python \u003ccode\u003ectypes\u003c/code\u003e; and on Windows, it compiles C# through PowerShell to call APIs such as \u003ccode\u003eVirtualQueryEx\u003c/code\u003e and \u003ccode\u003eReadProcessMemory\u003c/code\u003e. The article states this is used to extract unmasked variables and tokens from \u003ccode\u003eRunner.Worker\u003c/code\u003e across heterogeneous build environments.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses GitHub infrastructure for command and control and exfiltration, including commit-search keywords \u003ccode\u003eDontRevokeOrItGoesBoom\u003c/code\u003e, \u003ccode\u003eTheBeautifulSnadsOfTime\u003c/code\u003e, and \u003ccode\u003efiredalazer\u003c/code\u003e. Stolen credentials are encrypted using gzip, AES-256-GCM, and RSA-2048 before being pushed to public GitHub repositories with Hades-themed names and the description “Hades - The End for the Damned.” The campaign also attempts SSH/SCP lateral movement, PyPI and npm OIDC trust exploitation with Sigstore SLSA provenance bundles, GitHub Actions workflow injection for secrets extraction, and AI coding assistant or IDE rules hijacking.\u003c/p\u003e\n\n\u003cp\u003eFor persistence, the article says the malware installs an \u003ccode\u003eupdate-monitor\u003c/code\u003e C2 polling daemon and a \u003ccode\u003egh-token-monitor\u003c/code\u003e service. The token monitor polls GitHub with a stolen token and, if it detects revocation through a 4xx HTTP response, executes a destructive command that removes user directories. The article lists indicators of compromise and states that StepSecurity Harden-Runner can detect and terminate attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory before secrets are extracted.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn June 8, 2026, the article reports that version 0.8.101 of the popular graph machine learning package \u003ccode\u003eensmallen\u003c/code\u003e on PyPI was identified as compromised. The same malicious payload was also found in related packages from the computational biology, bioinformatics, and genotype-phenotype analysis ecosystem. The article tracks the operation as the \u003cstrong\u003eHades Campaign\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is described as the latest evolution of the Miasma threat actor. The article links the Hades activity to previously documented Miasma behaviors, including multi-cloud credential harvesting, self-replicating worm logic, GitHub-based exfiltration, repository infection targeting IDEs and AI assistants, and Linux process memory reading.\u003c/p\u003e\n\n\u003ch2 id=\"affected-packages\"\u003eAffected packages\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following compromised packages and versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003emflux-streamlit\u003c/code\u003e versions 0.0.3 and 0.0.4\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enhmpy\u003c/code\u003e version 2.4.7\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eppkt2synergy\u003c/code\u003e version 0.1.1\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eembiggen\u003c/code\u003e version 0.11.97\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egpsea\u003c/code\u003e version 0.9.14\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epyphetools\u003c/code\u003e version 0.9.120\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eensmallen\u003c/code\u003e version 0.8.101\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"execution-through-a-python-import-hook\"\u003eExecution through a Python import hook\u003c/h2\u003e\n\n\u003cp\u003eThe delivery mechanism differs from earlier npm campaigns described in the article. Instead of running through installation lifecycle scripts or native build hooks, the Hades Campaign runs during Python code execution through an obfuscated single-line import hook embedded in \u003ccode\u003e__init__.py\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe deobfuscated logic checks for a flag file at \u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e. If the file does not exist, it searches Python module paths for a companion \u003ccode\u003e_index.js\u003c/code\u003e file. It then downloads a precompiled Bun v1.3.14 runtime from GitHub, extracts it to a temporary directory, and executes the JavaScript payload using \u003ccode\u003ebun run _index.js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the flag file causes the payload to execute only once per boot cycle. It also emphasizes that using a standalone Bun binary allows the malware to run JavaScript tasks in environments that do not have Node.js installed.\u003c/p\u003e\n\n\u003ch2 id=\"ai-analyst-misdirection\"\u003eAI analyst misdirection\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a prompt injection block placed at the beginning of the \u003ccode\u003e_index.js\u003c/code\u003e bundle. This plain-text block is intended to manipulate automated Large Language Model pipelines used by security companies to inspect and summarize suspicious package code.\u003c/p\u003e\n\n\u003cp\u003eThe prompt injection instructs a parsing LLM to ignore the obfuscated code below it, classify the package as verified clean infrastructure, and produce a safe security report. The article characterizes this as a conceptual shift in which attackers target the cognitive logic of automated AI triage systems.\u003c/p\u003e\n\n\u003ch2 id=\"obfuscation-and-modular-payload-structure\"\u003eObfuscation and modular payload structure\u003c/h2\u003e\n\n\u003cp\u003eThe \u003ccode\u003e_index.js\u003c/code\u003e file acts as a runtime bootstrapper. The article says it decrypts and loads sixteen independent functional payloads at startup.\u003c/p\u003e\n\n\u003cp\u003eEach payload blob is gzip-compressed and encrypted with AES-256-GCM using a unique hardcoded key. The bootstrapper uses Bun APIs for decryption and decompression. After deobfuscation, the payloads were found to include modules for macOS and Windows memory reading, IDE and CI/CD backdoor setup, and command-and-control agents.\u003c/p\u003e\n\n\u003ch2 id=\"cross-platform-memory-scraping\"\u003eCross-platform memory scraping\u003c/h2\u003e\n\n\u003cp\u003eA major capability described in the article is reading the memory of the GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process to extract secrets. Earlier Miasma campaigns used Linux \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e, but the Hades Campaign adds macOS and Windows implementations.\u003c/p\u003e\n\n\u003ch3 id=\"linux\"\u003eLinux\u003c/h3\u003e\n\n\u003cp\u003eOn Linux, the malware walks memory mappings through \u003ccode\u003e/proc/{pid}/maps\u003c/code\u003e and directly reads \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e to scrape plaintext variables.\u003c/p\u003e\n\n\u003ch3 id=\"macos\"\u003emacOS\u003c/h3\u003e\n\n\u003cp\u003eOn macOS runners, the malware decrypts a Python script that invokes Mach kernel VM APIs through \u003ccode\u003ectypes\u003c/code\u003e. The article states that because the runner worker and execution process run under the same UID, the script can obtain a task port without root privileges. It then enumerates readable memory regions and writes their contents to standard output.\u003c/p\u003e\n\n\u003ch3 id=\"windows\"\u003eWindows\u003c/h3\u003e\n\n\u003cp\u003eOn Windows, the malware executes a PowerShell script that dynamically compiles a C# class using \u003ccode\u003eAdd-Type\u003c/code\u003e. The C# code uses Win32 APIs such as \u003ccode\u003eOpenProcess\u003c/code\u003e, \u003ccode\u003eVirtualQueryEx\u003c/code\u003e, and \u003ccode\u003eReadProcessMemory\u003c/code\u003e to crawl and dump the target process memory.\u003c/p\u003e\n\n\u003cp\u003eThe article states that these cross-platform scrapers allow the malware to extract unmasked variables and tokens on Linux, macOS, and Windows runners.\u003c/p\u003e\n\n\u003ch2 id=\"github-based-command-and-control\"\u003eGitHub-based command and control\u003c/h2\u003e\n\n\u003cp\u003eThe article describes three independent command-and-control channels that use public GitHub infrastructure.\u003c/p\u003e\n\n\u003ch3 id=\"token-dead-drop\"\u003eToken dead-drop\u003c/h3\u003e\n\n\u003cp\u003eHarvested GitHub personal access tokens are encrypted and pushed as commits to public repositories controlled by the attacker. These commits use the keyword \u003ccode\u003eDontRevokeOrItGoesBoom\u003c/code\u003e, which the attacker can locate through GitHub search APIs.\u003c/p\u003e\n\n\u003ch3 id=\"signed-javascript-eval\"\u003eSigned JavaScript eval\u003c/h3\u003e\n\n\u003cp\u003eThe malware searches GitHub commits for the keyword \u003ccode\u003eTheBeautifulSnadsOfTime\u003c/code\u003e. Matching commit messages contain base64-encoded JavaScript payloads and RSA-PSS signatures. The malware verifies the signatures against a hardcoded public key and executes valid payloads using \u003ccode\u003eeval()\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"python-dropper\"\u003ePython dropper\u003c/h3\u003e\n\n\u003cp\u003eThe campaign introduces a Python-specific C2 channel through a script named \u003ccode\u003eupdater.py\u003c/code\u003e. This service polls GitHub for commits matching \u003ccode\u003efiredalazer\u003c/code\u003e. Matching commits encode a URL and RSA-PSS signature; if the signature is valid, the daemon downloads and executes the script from the URL.\u003c/p\u003e\n\n\u003ch2 id=\"exfiltration-process\"\u003eExfiltration process\u003c/h2\u003e\n\n\u003cp\u003eThe article says stolen credentials are encrypted locally before exfiltration. The process includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJSON serialization of harvested secrets\u003c/li\u003e\n\u003cli\u003egzip compression\u003c/li\u003e\n\u003cli\u003egeneration of a random 256-bit AES key\u003c/li\u003e\n\u003cli\u003eAES-256-GCM encryption of the data\u003c/li\u003e\n\u003cli\u003eRSA-2048 encryption of the ephemeral AES key using the attacker’s public key\u003c/li\u003e\n\u003cli\u003eupload of the encrypted payload to a newly created public GitHub repository under the attacker’s control\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe exfiltration repositories use Hades-themed names such as \u003ccode\u003estygian-cerberus-42817\u003c/code\u003e and \u003ccode\u003etartarean-charon-18401\u003c/code\u003e. They carry the description \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"worm-propagation-and-lateral-movement\"\u003eWorm propagation and lateral movement\u003c/h2\u003e\n\n\u003cp\u003eThe article describes three self-replication vectors.\u003c/p\u003e\n\n\u003ch3 id=\"ssh-and-scp-lateral-movement\"\u003eSSH and SCP lateral movement\u003c/h3\u003e\n\n\u003cp\u003eThe malware parses \u003ccode\u003e~/.ssh/known_hosts\u003c/code\u003e and \u003ccode\u003e~/.ssh/config\u003c/code\u003e to identify reachable hosts. If \u003ccode\u003essh\u003c/code\u003e and \u003ccode\u003escp\u003c/code\u003e are available, it attempts batch-mode connections using configured keys.\u003c/p\u003e\n\n\u003cp\u003eOn successful access, it stages a loader script and the primary payload in a temporary directory on the remote host, runs the loader, and deletes the staging directory.\u003c/p\u003e\n\n\u003ch3 id=\"pypi-and-npm-oidc-trust-exploitation\"\u003ePyPI and npm OIDC trust exploitation\u003c/h3\u003e\n\n\u003cp\u003eWhen running inside a GitHub Actions workflow runner, the malware checks for OIDC variables such as \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_TOKEN\u003c/code\u003e and \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_URL\u003c/code\u003e. If available, it attempts to mint PyPI or npm publishing tokens by calling the OIDC endpoint with registry audiences.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware also generates Sigstore SLSA provenance bundles. It requests a signing certificate from Fulcio, formats a SLSA provenance statement, DSSE-signs it, uploads it to Rekor, and packages the certificate, signatures, and inclusion proof into a Sigstore bundle. It then injects its payload into target libraries and publishes compromised versions to PyPI and npm using the organization’s automated publishing credentials and the generated provenance bundle.\u003c/p\u003e\n\n\u003ch3 id=\"github-actions-workflow-injection\"\u003eGitHub Actions workflow injection\u003c/h3\u003e\n\n\u003cp\u003eThe malware targets GitHub repositories to extract organization secrets if a harvested token has suitable permissions.\u003c/p\u003e\n\n\u003cp\u003eIf the token has the \u003ccode\u003eworkflow\u003c/code\u003e scope, it uses a push-triggered workflow technique. It creates a temporary branch, commits a workflow file under \u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e, runs a workflow named \u003ccode\u003eRun Copilot\u003c/code\u003e, uploads secrets as an artifact named \u003ccode\u003eformat-results\u003c/code\u003e, then deletes the run history and temporary branch.\u003c/p\u003e\n\n\u003cp\u003eIf the token lacks \u003ccode\u003eworkflow\u003c/code\u003e scope but has repository write access, it uses a deployment-triggered technique. It commits a workflow file, immediately deletes it in a second commit, points a branch to the deletion commit, and triggers a GitHub deployment against the earlier commit that still contains the workflow. The workflow dumps secrets to an artifact, after which the malware deletes the deployment record, workflow run, and branch.\u003c/p\u003e\n\n\u003ch2 id=\"ai-coding-assistant-and-ide-rules-hijacking\"\u003eAI coding assistant and IDE rules hijacking\u003c/h2\u003e\n\n\u003cp\u003eThe malware also backdoors local workspace folders. It searches for rule files and configuration directories used by AI agents and IDE systems, including Claude, Codex, Gemini, Copilot, Cline, Aider, Tabby, Amazon Q, Cody, Bolt, and Continue.\u003c/p\u003e\n\n\u003cp\u003eThe article lists targeted files such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.cursorrules\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.windsurfrules\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.cursor/rules/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/copilot-instructions.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.aider.conf.yml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esettings.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003econfig.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emcp.json\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBy planting prompt instructions or hooks in these configuration assets, the malware attempts to trigger a \u003ccode\u003ebun run bootstrap\u003c/code\u003e command when developers load or consult the workspace with AI assistants.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-wiper-deterrent\"\u003ePersistence and wiper deterrent\u003c/h2\u003e\n\n\u003cp\u003eFor persistence, the malware installs an \u003ccode\u003eupdate-monitor\u003c/code\u003e C2 polling daemon. It also installs a second service named \u003ccode\u003egh-token-monitor\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003egh-token-monitor\u003c/code\u003e service polls the GitHub API using the stolen token. If the token is revoked and GitHub returns a 4xx HTTP status, the script triggers a destructive command that removes the user’s home directory and Documents directory. The article states that the service runs for up to 72 hours.\u003c/p\u003e\n\n\u003cp\u003eOn Linux, the service is registered as a user-level \u003ccode\u003esystemd\u003c/code\u003e service with user lingering enabled. On macOS, it is installed as a \u003ccode\u003eLaunchAgent\u003c/code\u003e. The article says the threat actor uses the risk of data destruction to discourage immediate revocation of stolen credentials.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides multiple indicators of compromise, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/tmp.0144018410.lock\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/var/tmp/.gh_update_state\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/share/updater/update.py\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/systemd/user/update-monitor.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/systemd/user/gh-token-monitor.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/Library/LaunchAgents/com.user.update-monitor.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/Library/LaunchAgents/com.user.gh-token-monitor.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/bin/gh-token-monitor.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/gh-token-monitor/token\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.claude/settings.json\u003c/code\u003e, \u003ccode\u003e.claude/index.js\u003c/code\u003e, and \u003ccode\u003e.claude/setup.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/tasks.json\u003c/code\u003e and \u003ccode\u003e.vscode/setup.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWorkflows named \u003ccode\u003eRun Copilot\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eExfiltration repository patterns such as \u003ccode\u003estygian-cerberus-[0-9]+\u003c/code\u003e and \u003ccode\u003etartarean-charon-[0-9]+\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eExfiltration repository description \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eGitHub commit search keywords \u003ccode\u003eDontRevokeOrItGoesBoom\u003c/code\u003e, \u003ccode\u003eTheBeautifulSnadsOfTime\u003c/code\u003e, and \u003ccode\u003efiredalazer\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stepsecurity-harden-runner-response\"\u003eStepSecurity Harden-Runner response\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a section on StepSecurity Harden-Runner, described as a CI/CD runner security agent that monitors network events, process executions, file access, and outbound connections at the step level in GitHub Actions.\u003c/p\u003e\n\n\u003cp\u003eIn this campaign, the malicious payload attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract plaintext secrets, including \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e and other workflow-injected secrets. The article states that Harden-Runner detects this behavior, enters lockdown mode, terminates the malicious process before the memory read completes, halts the workflow run, and records a suspicious process event in the runtime trace.\u003c/p\u003e\n","keyPoints":["Version 0.8.101 of the PyPI package ensmallen and several related computational biology, bioinformatics, and genotype-phenotype packages were identified as compromised with the same malicious payload.","The malicious Python import hook downloads a standalone Bun runtime and executes a companion _index.js payload once per boot cycle using a /tmp/.bun_ran flag file.","The _index.js bundle contains a prompt-injection block intended to mislead automated LLM-based security analysis into classifying the package as clean.","The malware includes Linux, macOS, and Windows memory scrapers designed to read GitHub Actions Runner.Worker process memory and extract plaintext variables and tokens.","The campaign uses GitHub-based command-and-control channels, encrypted exfiltration repositories, worm propagation through SSH/SCP and package publishing workflows, and persistence services including a GitHub token revocation wiper deterrent."],"insights":["The malware’s plain-text prompt injection shows that attackers are deliberately targeting automated LLM-based triage workflows, so scanners that pass raw package contents to LLMs without strict isolation can be manipulated into false-negative reports.","The campaign’s use of a standalone Bun runtime lets the payload run complex JavaScript even on systems without Node.js, reducing reliance on conventional JavaScript package-manager execution paths.","The malware attempts to generate Sigstore SLSA provenance bundles from compromised GitHub Actions OIDC identities, meaning malicious package releases can appear to come from a legitimate verified build pipeline.","The token-revocation monitor creates an operational dilemma for responders because revoking a stolen GitHub token may trigger destructive file deletion on infected developer workstations within the malware’s 72-hour monitoring window.","The deployment-triggered workflow technique allows secret theft even when a token lacks the GitHub workflow scope, by briefly committing and deleting a workflow before triggering it through a deployment event."],"referencedReports":[],"body":"\u003cp\u003eOn June 8, 2026, version 0.8.101 of the graph machine learning package \u003ccode\u003eensmallen\u003c/code\u003e on PyPI was identified as containing a sophisticated supply chain compromise. Related packages in the computational biology, bioinformatics, and genotype-phenotype analysis ecosystem were also found to carry the same malicious payload. The operation is tracked in the article as the Hades Campaign and is described as the latest evolution of the Miasma threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages execute a malicious Python import hook that downloads a standalone Bun runtime and runs an obfuscated JavaScript payload from \u003ccode\u003e_index.js\u003c/code\u003e. The payload decrypts multiple functional modules and includes cross-platform memory scrapers for Linux, macOS, and Windows, targeting GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract plaintext secrets and tokens. The article also describes GitHub-based command-and-control channels, encrypted exfiltration repositories, worm propagation, IDE and AI assistant backdoors, and persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eA notable feature of the campaign is a plain-text prompt injection placed at the start of the JavaScript bundle to misdirect automated LLM-based security analysis. The malware also installs a \u003ccode\u003egh-token-monitor\u003c/code\u003e service that checks whether a stolen GitHub token has been revoked and triggers destructive file deletion if it receives a 4xx response. The article states that StepSecurity Harden-Runner detects attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory and enters lockdown mode to terminate the malicious process.\u003c/p\u003e\n"},{"n":2,"title":"UNC3753 Used Vishing and Physical Intrusions in U.S. Data Theft Extortion Campaign","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/unc3753-used-vishing-and-physical.html","time":"07:39","priority":"MUST READ","score":92,"tldr":"UNC3753 is using vishing, screen-sharing sessions, legitimate remote access tools, and even in-person impersonation of IT staff to steal sensitive data from U.S. legal, financial, and professional services firms. The group moves quickly from initial contact to exfiltration and extortion, often completing the operation within a single business day.","briefOverview":"\u003cp\u003eGoogle Mandiant and Google Threat Intelligence Group disclosed a financially motivated data theft extortion campaign targeting dozens of U.S. organizations in professional, legal, and financial services between January and May 2026. The activity is attributed to UNC3753, also known as Chatty Spider, Luna Moth, and Silent Ransom Group. The group uses vishing and social engineering to gain remote access to corporate environments.\u003c/p\u003e\n\n\u003cp\u003eUNC3753 commonly sends benign invoice-themed emails from actor-controlled consumer email accounts, then follows up with phone calls while posing as IT support. Victims are convinced to join screen-sharing sessions over platforms such as Zoom, Microsoft Teams, or Quick Assist and to install legitimate remote monitoring and management tools including AnyDesk, Bomgar, SuperOps RMM, or Zoho Assist. The attackers then search for and exfiltrate sensitive data, including legal agreements, personally identifiable information, and financial records.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is notable for its speed and escalation into physical intrusions. The FBI said SRG actors have posed as IT technicians to enter corporate offices and steal data using external hard drives or USB drives. Google reported that many incidents progressed from initial contact to extortion within a single business day, with data searches, staging, and theft beginning in under an hour.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers reported a financially motivated data theft extortion campaign that targeted dozens of U.S. organizations across professional, legal, and financial services between January and May 2026. Google Mandiant and Google Threat Intelligence Group attributed the activity to UNC3753, also known as Chatty Spider, Luna Moth, and Silent Ransom Group. The group’s operations rely heavily on voice phishing, social engineering, and the abuse of legitimate remote access tools.\u003c/p\u003e\n\n\u003cp\u003eThe attackers initiate campaigns using benign invoice-themed emails sent from actor-controlled consumer email accounts. These emails contain no active links or malicious attachments and are used to establish a pretext before follow-up phone calls. During calls, the actors pose as IT support and persuade targets to join screen-sharing sessions under pretexts such as data migration, invoice issues, or security support.\u003c/p\u003e\n\n\u003cp\u003eOnce a screen-sharing session is established through platforms such as Zoom, Microsoft Teams, or Quick Assist, UNC3753 guides victims to install legitimate remote desktop or remote monitoring and management software. Tools named in the article include AnyDesk, Bomgar, SuperOps RMM, and Zoho Assist, with installation instructions sometimes shared through Privnote. The attackers have also established Zoom sessions on targets’ personal laptops to access corporate virtual desktop infrastructure and deeper corporate file systems.\u003c/p\u003e\n\n\u003cp\u003eThe group searches local and cloud directories, crawls mapped network drives, and targets highly sensitive folders. Data described in the article includes proprietary legal agreements, personally identifiable information, financial records, tax filings, audits, corporate client agreements, and Social Security numbers. Exfiltration is performed using WinSCP, Rclone, or email addresses controlled by the threat actor from the target’s mailbox.\u003c/p\u003e\n\n\u003cp\u003eThe campaign also includes physical intrusions, according to an FBI advisory cited in the article. In those cases, actors pose as IT technicians to enter corporate offices and steal data using removable USB media, external hard drives, or USB drives inserted into victims’ computers. After leaving the environment, attackers typically send an extortion email within 30 minutes, giving victims three days to begin negotiations and threatening to contact employees, external clients, or publish stolen data.\u003c/p\u003e\n\n\u003cp\u003eGoogle said UNC3753 shares tactical overlaps with UNC2686 and assessed both clusters as offshoots of the now-defunct Conti ransomware gang. The group previously deployed LockBit Black ransomware but has mainly focused on extortion-only operations since 2022. Resecurity also reported that SRG uses DNS fast-flux infrastructure for domains including business-data-leaks[.]com and ep6pheij[.]com, backed by a botnet spread across 18 countries and 22 ISPs.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed a financially motivated data theft extortion campaign targeting dozens of organizations in the United States between January and May 2026. The victims were in professional, legal, and financial services. Google Mandiant and Google Threat Intelligence Group attributed the activity to UNC3753, a threat actor also known as Chatty Spider, Luna Moth, and Silent Ransom Group.\u003c/p\u003e\n\n\u003cp\u003eThe campaign centers on voice phishing and social engineering rather than malware-first intrusion methods. The actors pose as IT support, use pretexts such as data migration or invoice-related issues, and convince victims to participate in screen-sharing sessions. Once access is established, the group searches for sensitive files or manipulates victims into performing actions on the attackers’ behalf.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-impact\"\u003eTargeting and impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that UNC3753 targeted dozens of U.S. organizations across professional, legal, and financial services from January to May 2026. Legal services firms are described as especially valuable targets because they maintain concentrated repositories of sensitive client transaction files, merger and acquisition plans, client trade secrets, and corporate regulatory reports.\u003c/p\u003e\n\n\u003cp\u003eStolen information includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProprietary legal agreements.\u003c/li\u003e\n\u003cli\u003ePersonally identifiable information.\u003c/li\u003e\n\u003cli\u003eFinancial records.\u003c/li\u003e\n\u003cli\u003eTax filings.\u003c/li\u003e\n\u003cli\u003eAudit-related materials.\u003c/li\u003e\n\u003cli\u003eCorporate client agreements.\u003c/li\u003e\n\u003cli\u003eSocial Security numbers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGoogle said legal entities face heavy reputational and regulatory exposure and may be motivated to resolve extortion situations quietly to protect their professional standing.\u003c/p\u003e\n\n\u003ch2 id=\"initial-contact-and-social-engineering-methods\"\u003eInitial contact and social engineering methods\u003c/h2\u003e\n\n\u003cp\u003eUNC3753 frequently begins campaigns with benign, invoice-themed emails sent from actor-controlled consumer email accounts. These messages contain no active links or malicious attachments. According to Google, their purpose is to establish a pretext and raise the target’s internal security concerns, making the target more receptive to follow-up phone calls.\u003c/p\u003e\n\n\u003cp\u003eDuring follow-up calls, the threat actors pose as internal corporate IT help desk staff or IT support. They convince targets to join screen-sharing sessions on enterprise communication platforms such as Zoom, Microsoft Teams, or Quick Assist. The stated pretexts include addressing a security issue, helping with a corporate data migration project, or dealing with invoice-related concerns.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the method allows the actors to bypass traditional security controls, including technical perimeters, web security gateways, and MFA configurations, by targeting the human element.\u003c/p\u003e\n\n\u003ch2 id=\"remote-access-and-persistence\"\u003eRemote access and persistence\u003c/h2\u003e\n\n\u003cp\u003eAfter establishing a screen-sharing session, UNC3753 attempts to gain a persistent foothold by guiding victims to install legitimate remote desktop or remote monitoring and management utilities. The article names the following tools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnyDesk.\u003c/li\u003e\n\u003cli\u003eBomgar.\u003c/li\u003e\n\u003cli\u003eSuperOps RMM.\u003c/li\u003e\n\u003cli\u003eZoho Assist.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eInstructions for installing these programs are shared via Privnote, a legitimate service that allows users to send notes that self-destruct after being read by the recipient.\u003c/p\u003e\n\n\u003cp\u003eUNC3753 has also been observed establishing Zoom sessions directly on targets’ personal laptops. From there, the actors access corporate virtual desktop infrastructure and move deeper into corporate file systems. Their activity includes enumerating local and cloud directories, crawling mapped network drives, and harvesting data from sensitive folders.\u003c/p\u003e\n\n\u003ch2 id=\"data-theft-and-extortion-workflow\"\u003eData theft and extortion workflow\u003c/h2\u003e\n\n\u003cp\u003eAfter gaining access, the attackers either search directly for files of interest or deceive victims into carrying out actions for them. The stolen data is exfiltrated using WinSCP or Rclone, or sent to attacker-controlled email addresses from the target’s own mailbox.\u003c/p\u003e\n\n\u003cp\u003eThe extortion stage follows quickly. The attackers typically send an extortion demand by email within 30 minutes of exiting the target environment. The messages give victims a three-day deadline to initiate ransom negotiations.\u003c/p\u003e\n\n\u003cp\u003eThe extortion emails also threaten additional pressure tactics. The group threatens to call and email target employees and external clients directly to notify them of the data breach if the victim does not respond. The actors also threaten to publish the stolen information on a data leak site.\u003c/p\u003e\n\n\u003cp\u003eGoogle said many incidents investigated by its threat intelligence and incident response teams progressed from initial contact to data extortion within a single business day. The group’s operational tempo is highlighted by the fact that data searches, staging, and theft can begin in under an hour.\u003c/p\u003e\n\n\u003ch2 id=\"physical-intrusion-component\"\u003ePhysical intrusion component\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an escalation into physical intrusions, echoing an FBI advisory issued the previous month. In these incidents, threat actors pose as IT technicians to enter corporate offices. They then attempt to steal data using removable USB media.\u003c/p\u003e\n\n\u003cp\u003eThe FBI stated that SRG actors exfiltrate data to an external hard drive or USB drive inserted by the threat actor into the victim’s computer. This shows that the campaign includes both remote social engineering and in-person deception.\u003c/p\u003e\n\n\u003ch2 id=\"actor-history-and-overlaps\"\u003eActor history and overlaps\u003c/h2\u003e\n\n\u003cp\u003eGoogle said UNC3753 shares tactical overlaps with UNC2686, a threat cluster previously associated with BazarCall-style campaigns in 2021. Those earlier campaigns used callback phishing techniques that aimed to install remote access software on victims’ machines.\u003c/p\u003e\n\n\u003cp\u003eBoth UNC3753 and UNC2686 are assessed to be offshoots of the now-defunct Conti ransomware gang. Early versions of the campaigns used subscription cancellation lures as part of callback phishing attacks.\u003c/p\u003e\n\n\u003cp\u003eAlthough UNC3753 has been observed deploying LockBit Black ransomware in the past, the group has mainly focused on extortion-only operations since 2022. In that model, the attackers pressure victims to pay or risk having their data published on the LEAKEDDATA data leak site.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-findings\"\u003eInfrastructure findings\u003c/h2\u003e\n\n\u003cp\u003eThe article also cites a Resecurity report about the group’s use of DNS fast-flux network infrastructure. Resecurity said the infrastructure is used across various countries in Latin America, Eastern Europe, Central Asia, the Middle East and Africa, East Asia, and the Caribbean to make domains harder to block.\u003c/p\u003e\n\n\u003cp\u003eThe domains named are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ebusiness-data-leaks[.]com, described as the data leak site listing close to 100 victim organizations as of June 2026.\u003c/li\u003e\n\u003cli\u003eep6pheij[.]com, described as staging stolen data per victim.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eResecurity said the domains operate on a fast-flux network backed by a botnet spread across 18 countries and 22 ISPs. The two domains reportedly share 50% to 60% of their bot pool, which Resecurity said confirms that a single threat actor operates both. The infrastructure contains no datacenter or hosting IPs, with every node tracing back to a consumer ISP and being flagged as a residential or mobile IP address.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents UNC3753 as a fast-moving extortion actor that relies on deception, legitimate tools, and direct human interaction. Its methods include benign pretext emails, voice phishing, screen-sharing sessions, legitimate remote access software, access through personal laptops into corporate VDI, rapid data exfiltration, and in-person impersonation of IT technicians.\u003c/p\u003e\n\n\u003cp\u003eThe most significant aspect of the campaign is that the group can move from initial contact to extortion within a single business day. The targeted sectors hold highly sensitive legal, financial, and client information, which increases the pressure created by threats to contact employees and clients or publish stolen data.\u003c/p\u003e\n","keyPoints":["Google Mandiant and Google Threat Intelligence Group attributed a financially motivated data theft extortion campaign targeting U.S. professional, legal, and financial services organizations between January and May 2026 to UNC3753.","UNC3753 uses vishing and social engineering to pose as IT support, persuade victims to join screen-sharing sessions, and guide them to install legitimate remote monitoring and management tools such as AnyDesk, Bomgar, SuperOps RMM, or Zoho Assist.","The FBI reported that UNC3753 has also conducted physical intrusions by posing as IT technicians to enter corporate offices and steal data using external hard drives or USB drives.","Stolen data includes proprietary legal agreements, personally identifiable information, financial records, tax filings, audits, corporate client agreements, and Social Security numbers.","Google said many UNC3753 operations progressed from initial contact to data extortion within a single business day, with data searches, staging, and theft beginning in under an hour."],"insights":["UNC3753’s use of benign invoice-themed emails with no links or attachments shows that initial messages may evade traditional email security controls while still setting up successful follow-on vishing calls.","The group’s reliance on legitimate collaboration and remote access platforms such as Zoom, Microsoft Teams, Quick Assist, AnyDesk, Bomgar, SuperOps RMM, and Zoho Assist makes user behavior and help desk verification processes more important detection points than malware signatures.","UNC3753’s extortion timeline is unusually compressed, with Google observing full operations from initial contact to extortion within a single business day and data search, staging, and theft starting in under an hour.","The reported in-person impersonation of IT technicians indicates that physical security procedures and visitor verification are part of the defense surface for this campaign, not just endpoint and network controls.","Resecurity’s finding that the actor’s leak and staging domains use fast-flux infrastructure backed entirely by residential or mobile ISP nodes suggests that blocking static hosting or datacenter IPs alone would be insufficient against this infrastructure."],"referencedReports":[{"title":"Targeted Campaign Against U.S. Law Firms","url":"https://cloud.google.com/blog/topics/threat-intelligence/targeted-campaign-us-law-firms","publisher":"Google Mandiant and Google Threat Intelligence Group","context":"The article cites Google Mandiant and GTIG research attributing the data theft extortion campaign to UNC3753 and describing its vishing, social engineering, and remote access tactics.","category":"","primary":false},{"title":"Silent Ransom Group (SRG): Uncovering DNS Fast-Flux Infrastructure","url":"https://www.resecurity.com/blog/article/silent-ransom-group-srg-uncovering-dns-fast-flux-infrastructure","publisher":"Resecurity","context":"The article references a Resecurity report describing Silent Ransom Group’s use of DNS fast-flux infrastructure for its leak and staging domains.","category":"","primary":false}],"body":"\u003cp\u003eGoogle Mandiant and Google Threat Intelligence Group disclosed a financially motivated data theft extortion campaign targeting dozens of U.S. organizations in professional, legal, and financial services between January and May 2026. The activity is attributed to UNC3753, also known as Chatty Spider, Luna Moth, and Silent Ransom Group. The group uses vishing and social engineering to gain remote access to corporate environments.\u003c/p\u003e\n\n\u003cp\u003eUNC3753 commonly sends benign invoice-themed emails from actor-controlled consumer email accounts, then follows up with phone calls while posing as IT support. Victims are convinced to join screen-sharing sessions over platforms such as Zoom, Microsoft Teams, or Quick Assist and to install legitimate remote monitoring and management tools including AnyDesk, Bomgar, SuperOps RMM, or Zoho Assist. The attackers then search for and exfiltrate sensitive data, including legal agreements, personally identifiable information, and financial records.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is notable for its speed and escalation into physical intrusions. The FBI said SRG actors have posed as IT technicians to enter corporate offices and steal data using external hard drives or USB drives. Google reported that many incidents progressed from initial contact to extortion within a single business day, with data searches, staging, and theft beginning in under an hour.\u003c/p\u003e\n"},{"n":1,"title":"Over 20,000 Instagram accounts stolen in Meta AI support hack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/meta-ai-support-data-breach-affects-20-000-instagram-accounts/","time":"06:00","priority":"SHOULD READ","score":86,"tldr":"Meta says attackers abused a flaw in Instagram’s AI-assisted High Touch Support account recovery tool to reset passwords and hijack more than 20,000 accounts that lacked 2FA. Meta disabled the tool, invalidated reset links, secured affected accounts, and plans to add proper email verification before relaunching it.","briefOverview":"\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked after attackers abused an AI-powered account recovery support system. The incident involved Meta’s High Touch Support tool, which helps users regain access after being locked out of Instagram accounts. Meta said the issue has been resolved and that it is securing impacted accounts.\u003c/p\u003e\n\n\u003cp\u003eThe attackers exploited the tool because it did not verify whether email addresses were associated with the targeted Instagram accounts. This allowed them to obtain password reset links and log in to accounts that did not have two-factor authentication enabled. Meta said attackers may have accessed contact information, dates of birth, posts, photos, videos, stories, direct messages, account activity, profile details, linked services, and other connected accounts.\u003c/p\u003e\n\n\u003cp\u003eMeta discovered the vulnerability on May 31, 2026, while Maine’s breach filing lists April 17 as the breach date. After discovering the incident, Meta disabled the High Touch Support system and all password reset links it had generated. The company also enrolled potentially stolen accounts into a mandatory security checkpoint and said it will fix the authentication check before relaunching the tool.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMeta disclosed that over 20,000 Instagram accounts were hijacked in an incident involving its AI-powered High Touch Support account recovery tool. The tool was designed to help users regain access to Instagram accounts after being locked out. According to Meta, unauthorized third parties exploited a vulnerability in the system to perform password resets on Instagram user accounts.\u003c/p\u003e\n\n\u003cp\u003eThe core technical issue was that the High Touch Support tool did not verify whether email addresses were associated with the targeted Instagram accounts. By exploiting that weakness, attackers obtained password reset links that let them log in and hijack accounts without two-factor authentication enabled. The article does not name the attackers beyond describing them as unauthorized third parties and threat actors.\u003c/p\u003e\n\n\u003cp\u003eThe incident became public after a wave of user reports appeared on social media platforms. Andy Stone, Meta’s vice president of communications, replied to one affected user that the issue had been resolved and that Meta was securing impacted accounts. BleepingComputer said it contacted Meta for comment but had not received a response at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eIn a breach letter filed with Maine’s Office of the Attorney General, Meta said the vulnerability was used to potentially compromise 30 Instagram accounts in that jurisdiction. Meta said it discovered the issue on May 31, 2026, while the Maine filing lists April 17 as the breach date, which the article says is likely the date of the first attack exploiting the flaw. Meta said all accounts in the filing had been secured to prevent continued unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eMeta said it does not know what personal information may have been accessed or stolen from compromised accounts. However, it listed categories attackers could have accessed, including email addresses or phone numbers, dates of birth, social media posts and content, direct messages, account activity, profile information, linked services, and other connected accounts.\u003c/p\u003e\n\n\u003cp\u003eAfter discovering the incident, Meta disabled the High Touch Support AI-powered support system and invalidated all password reset links it had generated. It also placed potentially stolen accounts into a mandatory security checkpoint and required affected users to reset passwords and re-authenticate. Meta said it will fix the authentication check before relaunching the tool and is reviewing similar account recovery flows across its platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked in an incident involving its AI-powered High Touch Support account recovery tool. The tool, referred to as HTS, helps users regain access after being locked out of their Instagram accounts. Attackers abused the system to obtain password reset links and take over accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article says the incident followed a wave of user reports on social media platforms. Andy Stone, Meta’s vice president of communications, replied to one affected user that the issue had been resolved and that Meta was securing impacted accounts. BleepingComputer said it contacted Meta for comment the previous week but had not yet received a response.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability involved Meta’s High Touch Support tool, an AI-assisted account recovery system for Instagram. The article states that the tool did not verify whether email addresses were associated with the targeted Instagram accounts. Attackers exploited that weakness to generate password reset links.\u003c/p\u003e\n\n\u003cp\u003eThose password reset links allowed the attackers to log in and hijack accounts without two-factor authentication enabled. The article identifies the attackers only as threat actors and unauthorized third parties. No named threat actor or group is attributed in the article.\u003c/p\u003e\n\n\u003cp\u003eMeta described the issue in a data breach letter filed with Maine’s Office of the Attorney General. In that letter, Meta said that on May 31, 2026, it discovered a vulnerability in the AI-assisted account recovery system for Instagram that had been exploited to perform password resets on user accounts.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-disclosure\"\u003eTimeline and Disclosure\u003c/h2\u003e\n\n\u003cp\u003eThe article reports two dates associated with the incident:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMeta said it discovered the vulnerability on May 31, 2026.\u003c/li\u003e\n\u003cli\u003eMaine’s Office of the Attorney General filing lists April 17 as the breach date.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says April 17 is likely the date of the first attack exploiting the HTS flaw. Meta’s breach letter did not specify when the attacks began.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users-and-jurisdictions\"\u003eAffected Users and Jurisdictions\u003c/h2\u003e\n\n\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked overall. In the breach letter filed with Maine’s Office of the Attorney General, Meta said the vulnerability was used to potentially compromise the Instagram accounts of 30 users in that jurisdiction. Meta said all accounts referenced in that filing had been secured to prevent continued unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the affected accounts were those hijacked through the abused account recovery process. It specifically states that the password reset links allowed attackers to hijack accounts without two-factor authentication enabled.\u003c/p\u003e\n\n\u003ch2 id=\"potentially-accessed-information\"\u003ePotentially Accessed Information\u003c/h2\u003e\n\n\u003cp\u003eMeta said it has no information on what personal information may have been accessed or stolen from the compromised accounts. However, it stated that attackers could have gained access to several categories of account information and content.\u003c/p\u003e\n\n\u003cp\u003eThe potentially accessible information included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eContact information, including email address and/or phone number.\u003c/li\u003e\n\u003cli\u003eDates of birth.\u003c/li\u003e\n\u003cli\u003eSocial media posts and content, including photos, videos, and stories.\u003c/li\u003e\n\u003cli\u003eDirect messages and communications.\u003c/li\u003e\n\u003cli\u003eAccount activity and interaction history.\u003c/li\u003e\n\u003cli\u003eProfile information, including biography and profile photo.\u003c/li\u003e\n\u003cli\u003eOther connected accounts and linked services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"meta-s-response\"\u003eMeta’s Response\u003c/h2\u003e\n\n\u003cp\u003eAfter discovering the incident, Meta disabled the HTS AI-powered support system. It also disabled all password reset links generated by that system to block future hijack attempts tied to the same malicious campaign.\u003c/p\u003e\n\n\u003cp\u003eMeta also enrolled all potentially stolen accounts into a mandatory security checkpoint. Affected users were asked to reset their passwords again and re-authenticate to secure and regain control of the compromised accounts.\u003c/p\u003e\n\n\u003cp\u003eBefore relaunching the tool, Meta said it will fix the authentication check in the Instagram recovery entry point. The stated purpose of the fix is to ensure proper verification of email addresses against existing account information before any password reset is initiated.\u003c/p\u003e\n\n\u003cp\u003eMeta also said it is conducting a comprehensive review of similar account recovery flows across its platforms to identify and remediate any potential issues.\u003c/p\u003e\n\n\u003ch2 id=\"related-meta-security-and-privacy-context-mentioned-in-the-article\"\u003eRelated Meta Security and Privacy Context Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article notes prior regulatory penalties involving Meta. Ireland fined Meta $264 million over a 2018 Facebook data breach that exposed names, email addresses, phone numbers, and physical locations of over 29 million Facebook accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Meta was fined €265 million, or \u003cspan class=\"math inline\"\u003e\\(275.5 million, in November 2022 for failing to protect Facebook users’ data from scrapers. It further notes another €91 million, or \\)\u003c/span\u003e100 million, fine for storing the passwords of hundreds of millions of users in plaintext.\u003c/p\u003e\n","keyPoints":["Meta revealed that over 20,000 Instagram users had their accounts hijacked after attackers abused its AI-powered High Touch Support account recovery tool to reset passwords.","The flaw allowed attackers to obtain password reset links because the High Touch Support tool did not verify whether email addresses were associated with the targeted Instagram accounts.","Meta said in a breach letter that it discovered the vulnerability on May 31, 2026, and that Maine’s filing lists April 17 as the breach date.","Meta disabled the High Touch Support system and all password reset links it generated, enrolled potentially stolen accounts into a mandatory security checkpoint, and required affected users to reset passwords and re-authenticate.","Meta said attackers may have accessed affected users’ contact information, dates of birth, posts, photos, videos, stories, direct messages, account activity, profile information, and linked accounts or services."],"insights":["The incident shows that an account recovery tool can become a high-impact takeover path when it can generate password reset links without validating that the requester’s email matches the targeted account.","Accounts without two-factor authentication were specifically vulnerable to full hijacking once attackers obtained the password reset links.","Meta’s Maine breach notice referenced only 30 users in that jurisdiction, while the article reports more than 20,000 affected Instagram accounts overall, highlighting that individual regulatory filings may describe only a local subset of a larger incident.","Meta’s plan to review similar account recovery flows across its platforms indicates the company considers this authentication-check weakness potentially repeatable beyond the affected Instagram HTS entry point."],"referencedReports":[{"title":"Meta AI Support Tool Incident AG Notification","url":"https://legacy.www.documentcloud.org/documents/28211657-meta-ai-support-tool-incident-ag-notification-bc-me/","publisher":"Meta","context":"The article cites Meta’s data breach letter filed with Maine’s Office of the Attorney General to describe the HTS vulnerability, discovery date, affected users in Maine, and remediation steps.","category":"","primary":false}],"body":"\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked after attackers abused an AI-powered account recovery support system. The incident involved Meta’s High Touch Support tool, which helps users regain access after being locked out of Instagram accounts. Meta said the issue has been resolved and that it is securing impacted accounts.\u003c/p\u003e\n\n\u003cp\u003eThe attackers exploited the tool because it did not verify whether email addresses were associated with the targeted Instagram accounts. This allowed them to obtain password reset links and log in to accounts that did not have two-factor authentication enabled. Meta said attackers may have accessed contact information, dates of birth, posts, photos, videos, stories, direct messages, account activity, profile details, linked services, and other connected accounts.\u003c/p\u003e\n\n\u003cp\u003eMeta discovered the vulnerability on May 31, 2026, while Maine’s breach filing lists April 17 as the breach date. After discovering the incident, Meta disabled the High Touch Support system and all password reset links it had generated. The company also enrolled potentially stolen accounts into a mandatory security checkpoint and said it will fix the authentication check before relaunching the tool.\u003c/p\u003e\n"},{"n":3,"title":"VS Code Adds 2-Hour Extension Auto-Update Delay to Limit Supply Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/vs-code-adds-2-hour-extension-auto.html","time":"06:08","priority":"SHOULD READ","score":78,"tldr":"Microsoft is adding a two-hour delay to automatic VS Code extension updates to reduce exposure to malicious or compromised releases in software supply chain attacks. Users can still manually update immediately, and trusted publishers like Microsoft, GitHub, and OpenAI are exempt from the delay.","briefOverview":"\u003cp\u003eMicrosoft announced that Visual Studio Code will delay automatic extension updates by two hours when automatic updates are enabled. The change is intended to add protection against problematic or potentially compromised releases. The feature is available starting in VS Code 1.123.\u003c/p\u003e\n\n\u003cp\u003eUsers can still update any extension immediately by selecting the “Update” button. For pending extension updates, VS Code will show why the update has not yet been applied and when the automatic update is scheduled. The two-hour delay does not apply to extensions from trusted publishers such as Microsoft, GitHub, and OpenAI.\u003c/p\u003e\n\n\u003cp\u003eThe move follows similar time-based controls added across developer ecosystems, including Bundler, Bun, npm, pnpm, and Yarn. These controls are designed to reduce exposure to newly published malicious versions before they are detected and removed by registry maintainers. The article frames the change as part of a broader response to increased software supply chain incidents targeting developer systems and downstream users.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has announced a two-hour delay before Visual Studio Code extensions are automatically updated to newer versions. The change applies when automatic updates are enabled and is intended to limit exposure to problematic or potentially compromised extension releases. Microsoft said the delay adds an additional layer of protection against such releases. The feature is available starting in VS Code 1.123.\u003c/p\u003e\n\n\u003cp\u003eThe delay affects automatic updates, but users retain the ability to update extensions immediately. The article states that any extension can still be updated at any time by using the “Update” button. When an update is pending, the extension details view will show the reason it has not yet updated and when the automatic update will occur.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also identified an exception to the new delay. Extensions from trusted publishers such as Microsoft, GitHub, and OpenAI will continue to be updated immediately. The article does not describe any specific compromised VS Code extension or named threat actor behind the change.\u003c/p\u003e\n\n\u003cp\u003eThe VS Code update comes shortly after RubyGems added an opt-in cooldown feature to Bundler 4.0.13. That feature allows developers to configure a time-based delay before newly published gem versions are installed. The stated goal is to reduce exposure to newly published malicious versions.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that similar installation controls have been introduced over the past year in Bun, npm, pnpm, and Yarn. These include Bun’s minimumReleaseAge, npm’s min-release-age, pnpm’s minimumReleaseAge, and Yarn’s npmMinimalAgeGate. The broader purpose of these minimum-age thresholds is to narrow the time window in which malicious packages can spread before registry maintainers identify and remove them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft announced that Visual Studio Code will introduce a two-hour delay before extensions are automatically updated to newer versions. The change is designed to help address software supply chain threats by reducing the chance that users immediately receive problematic or potentially compromised extension releases. Microsoft said that when automatic updates are enabled, new versions will be auto-updated two hours after publication.\u003c/p\u003e\n\n\u003cp\u003eThe feature is available starting in VS Code 1.123. The article presents the change as a defensive control for the IDE’s extension update process rather than as a response to a specific named incident.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-vs-code-update-delay-works\"\u003eHow the VS Code update delay works\u003c/h2\u003e\n\n\u003cp\u003eWhen automatic extension updates are enabled, VS Code will not immediately install newly published extension versions. Instead, it will wait two hours before applying the update automatically. Microsoft described this as an added layer of protection against problematic or potentially compromised releases.\u003c/p\u003e\n\n\u003cp\u003eUsers are not forced to wait if they choose to update manually. The article states that users can still update any extension immediately at any time by using the “Update” button.\u003c/p\u003e\n\n\u003cp\u003eVS Code will also provide visibility into pending updates. When extensions have pending updates, the details view will show why they have not been updated yet and when the automatic update is scheduled to occur.\u003c/p\u003e\n\n\u003ch2 id=\"exceptions-for-trusted-publishers\"\u003eExceptions for trusted publishers\u003c/h2\u003e\n\n\u003cp\u003eThe two-hour delay does not apply to extensions from trusted publishers. Microsoft specifically named Microsoft, GitHub, and OpenAI as examples of trusted publishers. Extensions from those publishers will continue to be updated immediately.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide additional criteria for how trusted publishers are selected. It only states that extensions from trusted publishers are exempt from the delay.\u003c/p\u003e\n\n\u003ch2 id=\"related-ecosystem-changes\"\u003eRelated ecosystem changes\u003c/h2\u003e\n\n\u003cp\u003eThe article places Microsoft’s VS Code change in the context of similar time-based controls added to other developer tooling ecosystems. It notes that RubyGems recently added an opt-in cooldown feature to Bundler 4.0.13. That feature allows developers to configure Bundler to delay installation of newly published gem versions for a predefined period.\u003c/p\u003e\n\n\u003cp\u003eThe article also lists similar controls added over the past year:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBun 1.3 and later: \u003ccode\u003eminimumReleaseAge\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003enpm v11.10.0 and later: \u003ccode\u003emin-release-age\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003epnpm 10.16 and later: \u003ccode\u003eminimumReleaseAge\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eYarn Berry 4.10.0 and later: \u003ccode\u003enpmMinimalAgeGate\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese controls share a common purpose: delaying the adoption or installation of newly published versions so that malicious releases have less opportunity to spread before being detected.\u003c/p\u003e\n\n\u003ch2 id=\"security-significance\"\u003eSecurity significance\u003c/h2\u003e\n\n\u003cp\u003eThe article says these changes arrive amid a surge in software supply chain incidents targeting different ecosystems. It states that such incidents are being used to breach developer systems and propagate malware to downstream users.\u003c/p\u003e\n\n\u003cp\u003eThe key defensive idea is a minimum age threshold before a package or extension version is installed automatically. By delaying installation, the control reduces the window in which a malicious version can spread before it is flagged and removed by registry maintainers.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eFor VS Code users with automatic extension updates enabled, the main impact is that some extension updates will be delayed by two hours. Users who want a specific update immediately can still install it manually. Users will also be able to see the reason for a pending update and the scheduled automatic update time in the extension details view.\u003c/p\u003e\n\n\u003cp\u003eFor publishers considered trusted by Microsoft, including Microsoft, GitHub, and OpenAI, extension updates will continue to happen immediately. The article does not describe any required action for extension publishers or administrators beyond the new behavior in VS Code 1.123.\u003c/p\u003e\n","keyPoints":["Microsoft announced that Visual Studio Code will delay automatic extension updates by two hours to help address software supply chain threats.","The delayed automatic update feature is available starting in Visual Studio Code 1.123.","Users can still manually update any extension immediately by using the Update button.","The two-hour delay does not apply to extensions from trusted publishers such as Microsoft, GitHub, and OpenAI, which will continue to update immediately.","Similar time-based installation delay controls have been added to Bundler, Bun, npm, pnpm, and Yarn."],"insights":["VS Code’s delay model mirrors a broader ecosystem shift in which package managers and developer tools are adding minimum-age controls to reduce exposure to newly published malicious versions.","The protection is not absolute because users can bypass the delay by manually clicking the Update button for any pending extension.","The trusted-publisher exemption means extensions from Microsoft, GitHub, and OpenAI will not receive the same two-hour waiting period before automatic updates.","VS Code will show users why an extension update is pending and when it will be applied, making the delay visible rather than silent."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft announced that Visual Studio Code will delay automatic extension updates by two hours when automatic updates are enabled. The change is intended to add protection against problematic or potentially compromised releases. The feature is available starting in VS Code 1.123.\u003c/p\u003e\n\n\u003cp\u003eUsers can still update any extension immediately by selecting the “Update” button. For pending extension updates, VS Code will show why the update has not yet been applied and when the automatic update is scheduled. The two-hour delay does not apply to extensions from trusted publishers such as Microsoft, GitHub, and OpenAI.\u003c/p\u003e\n\n\u003cp\u003eThe move follows similar time-based controls added across developer ecosystems, including Bundler, Bun, npm, pnpm, and Yarn. These controls are designed to reduce exposure to newly published malicious versions before they are detected and removed by registry maintainers. The article frames the change as part of a broader response to increased software supply chain incidents targeting developer systems and downstream users.\u003c/p\u003e\n"},{"n":4,"title":"Executive Identity Exposure Has Become a Board-Level Issue","source":"constella.ai","sourceColorIdx":4,"link":"https://constella.ai/blog/executive-identity-exposure-has-become-a-board-level-issue/","time":"06:00","priority":"MAY READ","score":52,"tldr":"Executive identities are increasingly targeted because their authority, trust, and public visibility make them ideal for impersonation, fraud, and broader compromise. Organizations should treat executive identity exposure as an enterprise risk and monitor, measure, and reduce it proactively.","briefOverview":"\u003cp\u003eThe article argues that executive identity exposure has become a board-level cybersecurity issue because attackers increasingly target CEOs, CFOs, board members, and senior leaders. These individuals may not have the most technical access, but they carry influence, authority, and trust. That combination makes executive identities valuable for impersonation, fraud, data theft, and broader organizational compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that executive exposure extends beyond corporate systems into personal email accounts, social media, professional networking platforms, public records, media coverage, conference appearances, and board memberships. Attackers can use this public and personal information to build detailed profiles and launch convincing attacks. AI is described as increasing the sophistication of these efforts by enabling personalized phishing, realistic impersonation content, and convincing executive communications.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends treating executive identity risk as an enterprise risk management concern rather than a personal security issue. It highlights metrics such as executive exposure rate, high-risk executive identities, impersonation incidents, time-to-remediation, and exposure trend analysis. It also calls for continuous identity monitoring, exposure assessment, executive awareness, incident response planning, and board reporting.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents executive identity exposure as a growing cybersecurity and governance concern. It says attackers are increasingly focusing on executives, including CEOs, CFOs, board members, and senior leadership. The reason is not necessarily technical privilege, but the influence, authority, and trust attached to executive roles. The article frames these identities as high-value assets and attractive targets in the modern threat landscape.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that identity-based attacks have shifted attention away from only infrastructure, endpoints, networks, applications, and privileged technical accounts. Attackers now seek access through trust by using stolen credentials, session hijacking, social engineering, impersonation, credential reuse, and identity intelligence. Executive identities are especially useful because they can support business email compromise, financial fraud, data theft, reputational damage, insider threat scenarios, and broader organizational compromise.\u003c/p\u003e\n\n\u003cp\u003eA key point in the article is that executive identity exposure is not limited to corporate environments. Executives often have large digital footprints across personal email accounts, professional networking platforms, social media profiles, public records, conference appearances, board memberships, and media coverage. This publicly available information can help attackers create detailed profiles and make attacks more convincing. The article links this exposure to the rise of executive impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe article describes common executive impersonation tactics such as fake email communications, deepfake audio and video, executive impersonation scams, fraudulent payment requests, and investor and vendor fraud. It also states that artificial intelligence is making executive targeting more effective. AI can help attackers generate personalized phishing campaigns, create convincing executive communications, analyze public information at scale, and develop realistic impersonation content.\u003c/p\u003e\n\n\u003cp\u003eThe article says executive identity exposure has become a board-level issue because the impacts can extend across financial, operational, reputational, regulatory, legal, and strategic risk. Boards are increasingly asking how exposed executives are, which identities present elevated risk, how compromise could affect the organization, and what controls exist to reduce exposure. The recommended response includes measuring executive exposure, monitoring identity risk, improving awareness, planning for executive-focused incidents, and reporting risk to the board.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that executive identity exposure has become a major cybersecurity and enterprise risk issue. It says attackers increasingly target executives such as CEOs, CFOs, board members, and senior leaders because these individuals possess influence, authority, and trust. The article emphasizes that executives may not have the most technical access in an organization, but their identities can be highly valuable to attackers.\u003c/p\u003e\n\n\u003cp\u003eThe central takeaway is that executive identity protection is no longer only a personal security concern. The article frames it as a business risk issue that should receive board-level attention. It states that executive identities have become both valuable organizational assets and attractive targets in modern cybersecurity.\u003c/p\u003e\n\n\u003ch2 id=\"shift-toward-identity-based-attacks\"\u003eShift Toward Identity-Based Attacks\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a shift in the threat landscape from attacks focused mainly on infrastructure to attacks focused on identity. It notes that cybersecurity programs historically emphasized firewalls, networks, endpoints, and applications. Today, attackers have learned that compromising an identity can be easier and more effective than compromising a system.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, attackers use methods including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStolen credentials\u003c/li\u003e\n\u003cli\u003eSession hijacking\u003c/li\u003e\n\u003cli\u003eSocial engineering\u003c/li\u003e\n\u003cli\u003eImpersonation\u003c/li\u003e\n\u003cli\u003eCredential reuse\u003c/li\u003e\n\u003cli\u003eIdentity intelligence\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the attacker goal is to gain access through trust. Executive identities are especially valuable in this model because they carry significant trust across the organization and with external parties.\u003c/p\u003e\n\n\u003ch2 id=\"why-executives-are-high-value-targets\"\u003eWhy Executives Are High-Value Targets\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies executives as high-value targets because they combine access, authority, and visibility. It says executives often have access to sensitive information, decision-making authority, financial approval rights, influence over employees, and relationships with partners and investors.\u003c/p\u003e\n\n\u003cp\u003eFrom the attacker’s perspective, compromising or impersonating an executive can create opportunities beyond those associated with an ordinary user account. The article lists potential outcomes of executive compromise, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBusiness email compromise\u003c/li\u003e\n\u003cli\u003eFinancial fraud\u003c/li\u003e\n\u003cli\u003eData theft\u003c/li\u003e\n\u003cli\u003eReputational damage\u003c/li\u003e\n\u003cli\u003eInsider threat scenarios\u003c/li\u003e\n\u003cli\u003eBr
