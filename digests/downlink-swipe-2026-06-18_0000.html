<script>
window.__DL_ARTICLES = [{"n":13,"title":"Klue OAuth breach linked to 'Icarus' Salesforce data theft attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/klue-oauth-breach-linked-to-icarus-salesforce-data-theft-attacks/","time":"14:19","priority":"MUST READ","score":95,"tldr":"Klue’s OAuth breach let the Icarus extortion group steal Salesforce CRM data from multiple customers by abusing Klue Battlecards integration tokens. Salesforce disabled the Klue connection, and affected organizations are urged to revoke tokens, rotate credentials, and review SaaS logs for suspicious API activity.","briefOverview":"\u003cp\u003eKlue suffered an OAuth breach that enabled the Icarus threat actors to steal Salesforce CRM data from multiple organizations in an ongoing extortion campaign. Salesforce disabled the Klue Battlecards integration while the incident is investigated. Huntress said it was among the impacted organizations and received an extortion email linked to Icarus.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest reported that attackers accessed Klue Battlecards integration service accounts and used OAuth tokens tied to customer Salesforce instances to steal data. The activity included reconnaissance through Salesforce’s \u003ccode\u003e/services/data/v59.0/sobjects\u003c/code\u003e endpoint and data exfiltration through \u003ccode\u003e/services/data/v59.0/query\u003c/code\u003e. In one case, attackers sent almost 1,000 queries in a 15-minute window after a slower mapping phase.\u003c/p\u003e\n\n\u003cp\u003eHuntress said Klue told customers that attackers compromised Klue backend systems and pushed a malicious code update that stole OAuth tokens used for third-party integrations. Klue later disabled integrations with Salesforce, HubSpot, SharePoint, Zoom, Gong, Chorus, Clari, Google Drive, and Slack. Organizations using Klue integrations were advised to review SaaS logs, revoke and rotate OAuth tokens, terminate active sessions, and examine Salesforce API activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMarket intelligence platform Klue suffered an OAuth breach that allowed threat actors to steal Salesforce CRM data from multiple organizations. BleepingComputer reported that impacted organizations are being extorted by a relatively new extortion group known as Icarus. Salesforce disabled the Klue Battlecards app connection to Salesforce while the incident is investigated.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said attackers gained access to Klue Battlecards integration service accounts and used OAuth tokens associated with customer Salesforce instances. The attackers generated OAuth tokens and used automated Python scripts to query Salesforce’s REST API for nearly 24 hours. Their activity began with reconnaissance of Salesforce instances through the \u003ccode\u003e/services/data/v59.0/sobjects\u003c/code\u003e endpoint before exfiltrating data through \u003ccode\u003e/services/data/v59.0/query\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest observed that, for one organization, attackers slowly mapped Salesforce objects to identify valuable data and then rapidly stole data once they knew what they wanted. In at least one environment, the attackers sent almost 1,000 queries in a 15-minute window. In another case, exfiltration was observed over six hours.\u003c/p\u003e\n\n\u003cp\u003eThe activity resembled previous Salesforce third-party integration data theft attacks associated with ShinyHunters, but BleepingComputer reported that ShinyHunters was not behind this campaign. Instead, the article identified Icarus as the threat actor sending extortion demands to impacted Klue customers. Huntress said a Session Messenger ID in a later extortion email matched the ID listed on the Icarus data leak site.\u003c/p\u003e\n\n\u003cp\u003eHuntress disclosed that it was among the organizations affected by the Klue breach. According to Huntress, Klue told customers that attackers first compromised Klue backend systems and then pushed a malicious code update that stole OAuth tokens used to integrate Battlecards with third-party platforms. Huntress said the stolen data included CRM-related information such as business contacts, sales communications, price quotes, competitive intelligence reports, and account data, with no evidence of compromise of threat intelligence, customer telemetry, passwords, payment card information, or engineering systems.\u003c/p\u003e\n\n\u003cp\u003eKlue disabled integrations with Salesforce, HubSpot, SharePoint, Zoom, Gong, Chorus, Clari, Google Drive, and Slack during its response. ReliaQuest and Huntress shared four IP addresses linked to the attacks: \u003ccode\u003e138.226.246.94\u003c/code\u003e, \u003ccode\u003e212.86.125.24\u003c/code\u003e, \u003ccode\u003e213.111.148.90\u003c/code\u003e, and \u003ccode\u003e94.154.32.160\u003c/code\u003e. Organizations using Klue integrations were advised to review Salesforce and related SaaS logs for activity from those addresses, revoke and rotate OAuth tokens, terminate active sessions, and review Salesforce logs for unusual API activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eKlue suffered an OAuth breach that enabled the Icarus threat actors to steal Salesforce CRM data from multiple organizations. The incident is tied to an ongoing extortion campaign in which impacted organizations have received ransom demands. BleepingComputer reported that sources said numerous organizations had Salesforce data stolen and were being extorted by the relatively new group.\u003c/p\u003e\n\n\u003cp\u003eSalesforce disabled the connection between the Klue Battlecards app and Salesforce as part of its response. Salesforce said organizations would not be able to connect to Salesforce through the Klue Battlecards app until further notice while the incident is investigated.\u003c/p\u003e\n\n\u003ch2 id=\"reported-attack-path\"\u003eReported Attack Path\u003c/h2\u003e\n\n\u003cp\u003eReliaQuest said attackers gained access to Klue Battlecards integration service accounts. The attackers then used OAuth tokens associated with customer Salesforce instances to steal data.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest observed the threat actors generating OAuth tokens and using automated Python scripts to query Salesforce’s REST API for nearly 24 hours. The activity began with reconnaissance against Salesforce instances through the \u003ccode\u003e/services/data/v59.0/sobjects\u003c/code\u003e endpoint. Data was then exfiltrated using the \u003ccode\u003e/services/data/v59.0/query\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eIn one organization’s environment, ReliaQuest said the attackers slowly mapped Salesforce objects to identify valuable objects before stealing data rapidly. ReliaQuest reported that the attackers hit the same endpoint with almost 1,000 queries in a 15-minute window in at least one environment. In another case, exfiltration was observed over six hours.\u003c/p\u003e\n\n\u003ch2 id=\"klue-backend-compromise-and-token-theft\"\u003eKlue Backend Compromise and Token Theft\u003c/h2\u003e\n\n\u003cp\u003eHuntress said Klue told customers that attackers first compromised Klue backend systems. According to Huntress, the attackers then pushed a malicious code update that stole OAuth tokens customers used to integrate the Klue Battlecards product with third-party platforms.\u003c/p\u003e\n\n\u003cp\u003eThe attackers reportedly used a dormant but still active credential that Klue had created for a prototype integration. After gaining access to Klue’s environment, they stole customer OAuth tokens and used them to query connected Salesforce environments directly.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-attribution\"\u003eThreat Actor Attribution\u003c/h2\u003e\n\n\u003cp\u003eReliaQuest said the activity closely resembled previous Salesforce third-party integration data theft attacks by the ShinyHunters extortion group, but ReliaQuest could not attribute the attacks to ShinyHunters. BleepingComputer reported that ShinyHunters was not behind this attack.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer identified the threat actor as Icarus, a relatively new group that had already begun emailing extortion demands to Klue customers affected by the breach. A ransom note shared with BleepingComputer was sent under the alias “mr bean” and included a Session Messenger ID for contact.\u003c/p\u003e\n\n\u003cp\u003eThe Icarus data leak site also contained a post titled “Get Ready” stating that “big corps” were getting listed. BleepingComputer said Icarus is believed to have launched in April 2026 and initially listed two victims on its leak site, at least one of which was connected to the Klue campaign. That company was later removed from the leak site, which the article said may indicate that negotiations are underway.\u003c/p\u003e\n\n\u003cp\u003eHuntress reported receiving a similar extortion email. Huntress said a Session Messenger ID in a later email matched the ID listed on the Icarus data leak site, which the article described as additional evidence that Icarus was behind the attack.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organizations-and-data\"\u003eAffected Organizations and Data\u003c/h2\u003e\n\n\u003cp\u003eHuntress disclosed that it was among the organizations impacted by the Klue breach. Huntress confirmed receiving an extortion email like the one seen by BleepingComputer.\u003c/p\u003e\n\n\u003cp\u003eHuntress said the stolen data included CRM-related information, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBusiness contacts\u003c/li\u003e\n\u003cli\u003eSales communications\u003c/li\u003e\n\u003cli\u003ePrice quotes\u003c/li\u003e\n\u003cli\u003eCompetitive intelligence reports\u003c/li\u003e\n\u003cli\u003eAccount data\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHuntress said there was no evidence that the following were compromised:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThreat intelligence\u003c/li\u003e\n\u003cli\u003eCustomer telemetry\u003c/li\u003e\n\u003cli\u003ePasswords\u003c/li\u003e\n\u003cli\u003ePayment card information\u003c/li\u003e\n\u003cli\u003eEngineering systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"platform-and-integration-response\"\u003ePlatform and Integration Response\u003c/h2\u003e\n\n\u003cp\u003eSalesforce disabled the Klue Battlecards app connection to Salesforce as part of its response to the incident. Salesforce said this was done to protect customers and that organizations would not be able to connect to Salesforce through the app until further notice.\u003c/p\u003e\n\n\u003cp\u003eKlue later disabled integrations with multiple platforms while responding to the incident, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSalesforce\u003c/li\u003e\n\u003cli\u003eHubSpot\u003c/li\u003e\n\u003cli\u003eSharePoint\u003c/li\u003e\n\u003cli\u003eZoom\u003c/li\u003e\n\u003cli\u003eGong\u003c/li\u003e\n\u003cli\u003eChorus\u003c/li\u003e\n\u003cli\u003eClari\u003c/li\u003e\n\u003cli\u003eGoogle Drive\u003c/li\u003e\n\u003cli\u003eSlack\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-shared-in-the-article\"\u003eIndicators Shared in the Article\u003c/h2\u003e\n\n\u003cp\u003eReliaQuest and Huntress shared IP addresses linked to the attacks. The article listed the following IP addresses:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e138.226.246.94\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e212.86.125.24\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e213.111.148.90\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e94.154.32.160\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-actions-mentioned\"\u003eRecommended Actions Mentioned\u003c/h2\u003e\n\n\u003cp\u003eOrganizations using Klue integrations were advised to review Salesforce and related SaaS logs for activity originating from the listed IP addresses. They were also advised to revoke and rotate OAuth tokens, terminate active sessions, and review Salesforce logs for unusual API activity.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe incident centers on abuse of OAuth tokens connected to third-party SaaS integrations. The article describes how access to Klue integration service accounts and customer OAuth tokens enabled direct querying of connected Salesforce environments. The campaign also shows the operational impact of compromised SaaS integrations, with Salesforce disabling the Klue Battlecards connection and Klue disabling integrations across several major business platforms during its response.\u003c/p\u003e\n","keyPoints":["Klue suffered an OAuth breach that allowed the Icarus threat actors to steal Salesforce CRM data from multiple organizations in an ongoing extortion campaign.","Salesforce disabled the connection between the Klue Battlecards app and Salesforce while the security incident is investigated.","ReliaQuest said attackers used OAuth tokens associated with customer Salesforce instances and automated Python scripts to query Salesforce’s REST API for nearly 24 hours.","Huntress reported that Klue told customers attackers compromised Klue backend systems and pushed a malicious code update that stole OAuth tokens used for integrations.","Klue disabled integrations with Salesforce, HubSpot, SharePoint, Zoom, Gong, Chorus, Clari, Google Drive, and Slack while responding to the incident."],"insights":["The attackers reportedly used a dormant but still active credential created by Klue for a prototype integration, showing that unused integration credentials can remain a high-impact exposure if not revoked.","ReliaQuest observed a two-stage Salesforce data theft pattern in which the attackers first slowly mapped Salesforce objects and then issued nearly 1,000 queries in 15 minutes once valuable targets were identified.","The incident affected more than Salesforce because Klue disabled integrations with several other SaaS platforms, including HubSpot, SharePoint, Zoom, Gong, Chorus, Clari, Google Drive, and Slack.","Huntress said the stolen data included CRM-related business information such as contacts, sales communications, price quotes, competitive intelligence reports, and account data, but found no evidence that passwords, payment card information, customer telemetry, threat intelligence, or engineering systems were compromised."],"referencedReports":[{"title":"Threat Spotlight: Integration Abused in CRM Data Theft","url":"https://reliaquest.com/blog/threat-spotlight-integration-abused-in-crm-data-theft","publisher":"ReliaQuest","context":"The article cites ReliaQuest’s report for details on attackers using Klue Battlecards OAuth tokens and Salesforce REST API queries to steal CRM data.","category":"","primary":false},{"title":"Klue Breach Investigation","url":"https://www.huntress.com/blog/klue-breach-investigation","publisher":"Huntress","context":"The article cites Huntress’s report confirming Huntress was impacted and describing Klue’s account of the backend compromise and malicious code update.","category":"","primary":false},{"title":"Salesforce General Message 20000257","url":"https://status.salesforce.com/generalmessages/20000257","publisher":"Salesforce","context":"The article references Salesforce’s warning that it disabled the Klue Battlecards app connection to Salesforce in response to the incident.","category":"","primary":false}],"body":"\u003cp\u003eKlue suffered an OAuth breach that enabled the Icarus threat actors to steal Salesforce CRM data from multiple organizations in an ongoing extortion campaign. Salesforce disabled the Klue Battlecards integration while the incident is investigated. Huntress said it was among the impacted organizations and received an extortion email linked to Icarus.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest reported that attackers accessed Klue Battlecards integration service accounts and used OAuth tokens tied to customer Salesforce instances to steal data. The activity included reconnaissance through Salesforce’s \u003ccode\u003e/services/data/v59.0/sobjects\u003c/code\u003e endpoint and data exfiltration through \u003ccode\u003e/services/data/v59.0/query\u003c/code\u003e. In one case, attackers sent almost 1,000 queries in a 15-minute window after a slower mapping phase.\u003c/p\u003e\n\n\u003cp\u003eHuntress said Klue told customers that attackers compromised Klue backend systems and pushed a malicious code update that stole OAuth tokens used for third-party integrations. Klue later disabled integrations with Salesforce, HubSpot, SharePoint, Zoom, Gong, Chorus, Clari, Google Drive, and Slack. Organizations using Klue integrations were advised to review SaaS logs, revoke and rotate OAuth tokens, terminate active sessions, and examine Salesforce API activity.\u003c/p\u003e\n"},{"n":4,"title":"Hot Take: Operation Endgame VS SocGholish","source":"infoblox.com","sourceColorIdx":2,"link":"https://www.infoblox.com/blog/threat-intelligence/hot-take-operation-endgame-vs-socgholish/","time":"12:01","priority":"MUST READ","score":94,"tldr":"Operation Endgame disrupted SocGholish, a long-running fake browser update malware framework used by TA569 to sell initial access to groups including EvilCorp, by taking down infrastructure and remediating compromised WordPress sites. Infoblox telemetry showed SocGholish reached nearly 55% of its cloud customer networks in early 2026, though only a small fraction appeared to progress to later-stage infection.","briefOverview":"\u003cp\u003eA multinational law enforcement action under Operation Endgame disrupted SocGholish, a long-running malware framework known for fake browser updates. The operation took down 106 servers and domains and remediated 14,971 compromised WordPress websites. Infoblox Threat Intel participated as a private-industry partner and described the disruption as a major blow to TA569, the actor operating SocGholish.\u003c/p\u003e\n\n\u003cp\u003eSocGholish matters because it is used for initial access into enterprise environments and has been tied to multiple ransomware families and EvilCorp activity. Infoblox observed that nearly 55% of its cloud customer networks were exposed to SocGholish in 2026, although only a small number appeared to progress to the final stage of the attack. The article emphasizes that even one compromised device can enable a broader data breach.\u003c/p\u003e\n\n\u003cp\u003eTechnically, SocGholish uses compromised websites, traffic distribution systems, fingerprinting, fake browser update prompts, and a JScript stager to move victims through a multi-stage infection chain. It also uses domain shadowing for both tier one and tier two hostnames, allowing malicious subdomains to inherit the reputation of legitimate parent domains. Infoblox said defenders can disrupt the chain by blocking compromised websites, traffic-redirection domains, and SocGholish tier one and tier two infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOperation Endgame, a coordinated international law enforcement campaign, disrupted SocGholish infrastructure in an action involving law enforcement and private-industry partners. The operation took down 106 servers and domains and remediated 14,971 compromised WordPress websites. Infoblox Threat Intel said it was a partner in the operation and framed the disruption as an example of effective government-industry collaboration against cybercrime.\u003c/p\u003e\n\n\u003cp\u003eSocGholish is described as one of the longest-running web-inject frameworks, first observed in 2017 and publicly documented in 2018. It uses compromised websites to display fake browser update prompts and trick visitors into downloading a malicious JScript payload. The actor operating the framework is TA569, also tracked as Mustard Tempest, Gold Prelude, or UNC1543.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that SocGholish is primarily an initial-access ecosystem rather than a final-stage ransomware operation. TA569 seeks to compromise devices connected to company-managed networks and then sell or hand off that access to other actors. SocGholish-related access has been tied to ransomware families including DoppelPaymer, WastedLocker, Hades Ransomware, LockBit, and RansomHub, and a cited Mandiant report said EvilCorp almost exclusively obtained initial access from TA569’s SocGholish.\u003c/p\u003e\n\n\u003cp\u003eSocGholish operates through four stages: traffic acquisition, traffic filtering, payload lures, and on-device implant execution. In the first stage, compromised websites or affiliates send potential victims through tier one infrastructure, often using traffic distribution systems such as TA2726, ParrotTDS, JunkyTDS, Keitaro, or zTDS. The second stage fingerprints visitors to filter out bots, researchers, WordPress admins, repeat victims, automated browsers, and some small-screen environments before showing qualifying users a fake update prompt.\u003c/p\u003e\n\n\u003cp\u003eIf a victim clicks the fake update prompt, SocGholish delivers a JScript stager that contacts hardcoded tier two command-and-control hostnames. The article highlights domain shadowing as a key challenge, with attackers creating rogue subdomains under legitimate domains and rotating tier two hostnames frequently. Infoblox said blocking tier one domains can stop the fake update chain from developing, while blocking tier two infrastructure can prevent the stager from reaching its next-stage server.\u003c/p\u003e\n\n\u003cp\u003eInfoblox analyzed 86 tier one hostnames and found that more than 54% of its Threat Defense cloud customer networks attempted to resolve at least one SocGholish tier one domain between January 1 and May 30, 2026. Only 32 of those domains were observed during the analysis period, and many others were dormant but still embedded in compromised websites. For tier two infrastructure, Infoblox identified 97 hostnames but saw only a handful of customer networks querying them, including organizations in government, hospitality, and critical infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA multinational law enforcement action under Operation Endgame disrupted SocGholish, a long-running malware framework known for using fake browser updates to gain initial access to victim environments. The operation involved law enforcement and private-industry partners and resulted in the takedown of 106 servers and domains. It also remediated 14,971 compromised WordPress websites that helped feed victim traffic into the SocGholish ecosystem.\u003c/p\u003e\n\n\u003cp\u003eInfoblox Threat Intel said it participated as a partner in Operation Endgame. The article presents the action as a major disruption to TA569, the operator of SocGholish, and as an example of the value of public-private cooperation against cybercrime. Infoblox emphasized that SocGholish targets the types of networks its customers seek to protect and that many modern data breaches begin with initial access rather than ransomware deployment.\u003c/p\u003e\n\n\u003ch2 id=\"operation-endgame-context\"\u003eOperation Endgame Context\u003c/h2\u003e\n\n\u003cp\u003eOperation Endgame was first announced in 2024 as a coordinated international law-enforcement campaign focused on dismantling cybercrime infrastructure at scale. The article says its focus is especially relevant to defenders because it targets earlier stages of the intrusion chain rather than only the actors who deploy ransomware or extort victims at the end of an intrusion.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets services that facilitate broader cybercrime, including droppers, loaders, botnets, traffic distribution systems, and access-enabling malware. Earlier Operation Endgame actions focused on malware families including IcedID, Smokeloader, Pikabot, Bumblebee, QakBot, DanaBot, TrickBot, Rhadamanthys, VenomRAT, and the Elysium botnet.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Operation Endgame depends heavily on collaboration with private industry. It names Proofpoint, CrowdStrike, Microsoft, Bitdefender, ESET, Shadowserver, Spamhaus, Spycloud, Have I Been Pwned, and Infoblox as cybersecurity organizations that have contributed threat intelligence, infrastructure analysis, or victim remediation support.\u003c/p\u003e\n\n\u003ch2 id=\"socgholish-and-ta569\"\u003eSocGholish and TA569\u003c/h2\u003e\n\n\u003cp\u003eSocGholish is described as one of the longest-operating web-inject frameworks known. It was first observed in 2017 and publicly documented in 2018. Its core tactic is to use compromised websites to display fake browser update prompts that trick visitors into downloading a malicious JScript payload.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor operating SocGholish is TA569, also tracked as Mustard Tempest, Gold Prelude, or UNC1543. The article characterizes TA569 as an initial access broker whose objective is to compromise devices connected to company-managed network environments. That access can then be sold or handed over to other actors for follow-on malware deployment, extortion, data exfiltration, or ransomware.\u003c/p\u003e\n\n\u003cp\u003eSocGholish-related initial access has been tied to multiple ransomware families, including DoppelPaymer, WastedLocker, Hades Ransomware, LockBit, and RansomHub. The article also states that SocGholish has been used by EvilCorp since its earliest days. It cites a June 2022 Mandiant report stating that UNC2165, Mandiant’s name for EvilCorp, almost exclusively obtained initial access from TA569’s SocGholish.\u003c/p\u003e\n\n\u003ch2 id=\"attack-chain-and-technical-operation\"\u003eAttack Chain and Technical Operation\u003c/h2\u003e\n\n\u003cp\u003eThe article describes SocGholish as a multi-stage JavaScript framework that turns compromised websites into drive-by download malware distribution vectors. Many of the compromised sites are powered by WordPress, and Operation Endgame found 1.4 million leaked website credentials that could be used by SocGholish and other actors to infect systems.\u003c/p\u003e\n\n\u003cp\u003eSocGholish consists of four stages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTraffic acquisition.\u003c/li\u003e\n\u003cli\u003eTraffic filtering.\u003c/li\u003e\n\u003cli\u003ePayload lures.\u003c/li\u003e\n\u003cli\u003eOn-device implant execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"stage-1-traffic-acquisition\"\u003eStage 1: Traffic Acquisition\u003c/h3\u003e\n\n\u003cp\u003eSocGholish begins by acquiring website traffic through compromised websites and affiliate traffic sources. TA569 compromises large numbers of websites directly, and the article says the research community believes the actor could have controlled a million sites during its history. SocGholish also accepts traffic from affiliates that fingerprint users and pass potential victims through embedded links.\u003c/p\u003e\n\n\u003cp\u003eThe article describes these initial links as tier one infrastructure. Historically, SocGholish links included parameters such as \u003ccode\u003ecid\u003c/code\u003e, commonly used as a client ID or campaign ID in affiliate advertising. More recent links use long base64 strings that are believed to contain similar information, but with an added encryption layer that prevents direct reading of those parameters.\u003c/p\u003e\n\n\u003cp\u003eThe affiliate model makes tracking the ecosystem difficult because many actors and systems have fed traffic into SocGholish over time. The article names TA2726, ParrotTDS, and JunkyTDS as notable traffic providers or traffic distribution systems. It also says multiple actors have used Keitaro, zTDS, and similar TDS frameworks to filter traffic for redirection to SocGholish.\u003c/p\u003e\n\n\u003ch3 id=\"stage-2-traffic-filtering\"\u003eStage 2: Traffic Filtering\u003c/h3\u003e\n\n\u003cp\u003eAfter an infected website redirects a visitor to the SocGholish traffic distribution system, the attack typically uses a fingerprinting script. The goal is to deliver malicious payloads only to genuine victims while filtering out bots, security researchers, and devices outside SocGholish’s target profile.\u003c/p\u003e\n\n\u003cp\u003eThe fingerprinting stage excludes WordPress admins and anyone who has already executed the payload. Automated browsers are redirected to one type of payload, while visitors with unusually small screens, such as mobile phones or some sandbox environments, are redirected to another type of payload. The article says these two payloads are used only for logging endpoints.\u003c/p\u003e\n\n\u003cp\u003eOnly users who meet all filtering criteria are shown a fake update message.\u003c/p\u003e\n\n\u003ch3 id=\"stage-3-fake-update-prompts\"\u003eStage 3: Fake Update Prompts\u003c/h3\u003e\n\n\u003cp\u003eThe fake update template is served from the same tier one infrastructure as the fingerprinting script. The article emphasizes that the victim is not diverted away from the infected page they originally intended to visit. Instead, the fake update template loads within the same page, deletes the original content, and replaces it with a browser-themed update prompt.\u003c/p\u003e\n\n\u003cp\u003eSocGholish can present templates matching the style and layout of major browsers. When the victim clicks the “Download” button, the fake update template reaches back to the tier one server and downloads a premade payload through an iframe injection. This means the payload is downloaded from the compromised domain the user meant to visit, rather than from an external server.\u003c/p\u003e\n\n\u003ch3 id=\"stage-4-on-device-jscript-stager\"\u003eStage 4: On-Device JScript Stager\u003c/h3\u003e\n\n\u003cp\u003eIn recent years, SocGholish has used the fake update flow to trick victims into executing a custom JScript file on their endpoint. The article describes the stager as deceptively simple compared with other actors’ large and heavily obfuscated scripts. A reformatted SocGholish stager consists of about six lines of code.\u003c/p\u003e\n\n\u003cp\u003eThe stager creates an ActiveXObject, sends a base64 string to a hardcoded command-and-control server, and expects a response that is executed directly as a new function. The domains hardcoded into the stager are described as tier two hostnames. Unlike tier one hostnames, which may be operated for longer periods, tier two hostnames change several times per week.\u003c/p\u003e\n\n\u003cp\u003eAfter the stager executes, follow-on activity depends on the victim device and how valuable it appears to the operators. Domain-joined systems are considered especially valuable because they are tied to corporate identity and management environments. Lower-value systems, such as devices not joined to a corporate domain, are commonly monetized through off-the-shelf infostealer malware.\u003c/p\u003e\n\n\u003ch2 id=\"domain-shadowing\"\u003eDomain Shadowing\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies domain shadowing as a key SocGholish technique for both tier one and tier two hostnames. Domain shadowing occurs when threat actors gain access to the authoritative DNS provider or registrar account for a legitimate domain and create rogue subdomains beneath it.\u003c/p\u003e\n\n\u003cp\u003eThis gives attackers several advantages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMalicious hostnames inherit the age and reputation of the legitimate parent domain.\u003c/li\u003e\n\u003cli\u003eDefenders may initially assume a hostname under an established business domain is legitimate.\u003c/li\u003e\n\u003cli\u003eNew subdomains are often monitored less closely than newly registered domains.\u003c/li\u003e\n\u003cli\u003eRapid rotation reduces the usefulness of static blocklists.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocGholish rotates shadowed tier two domains at high frequency, from daily rotation to at least once per week. The article says this shortens the time defenders have to identify and investigate rogue subdomains and lets the actor refresh trusted-looking command-and-control infrastructure before many defenders can classify and respond to it.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-disruption-points\"\u003eDefensive Disruption Points\u003c/h2\u003e\n\n\u003cp\u003eInfoblox says SocGholish’s multi-stage architecture creates multiple points where defenders can disrupt the attack chain. Its threat intelligence attempts to track and detect compromised websites, domains associated with webinject and traffic-redirection actors, SocGholish tier one hostnames, and SocGholish tier two hostnames.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes the defensive value of blocking different stages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlocking tier one infrastructure interrupts the attack before the fake update chain can fully develop.\u003c/li\u003e\n\u003cli\u003eBlocking tier two infrastructure prevents the JScript stager from reaching its next-stage server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis distinction also affects telemetry interpretation. Traffic blocked at the compromised-domain or TDS stage will not generate later-stage DNS queries at Infoblox resolvers.\u003c/p\u003e\n\n\u003ch2 id=\"infoblox-customer-telemetry\"\u003eInfoblox Customer Telemetry\u003c/h2\u003e\n\n\u003cp\u003eInfoblox analyzed a list of 86 tier one hostnames related to the SocGholish framework. These hostnames were either directly injected into websites or were part of the multi-layer traffic provider infrastructure that used compromised sites. The article states that the resulting telemetry represents attacks against customers, but not necessarily successful endpoint compromise.\u003c/p\u003e\n\n\u003cp\u003eBetween January 1 and May 30, 2026, more than 54% of Infoblox Threat Defense cloud customer networks attempted to resolve at least one SocGholish tier one domain. Earlier in the article, Infoblox summarized this as nearly 55% of cloud customers being exposed to SocGholish in 2026.\u003c/p\u003e\n\n\u003cp\u003eThe most frequently observed tier one hostname was \u003ccode\u003epa-portal[.]benningtonspringsmhp[.]com\u003c/code\u003e, with 3,187 resolution attempts. It was also the hostname with the broadest customer impact, queried by 35% of customers. The article notes that this hostname was one of the newest in the dataset and was set up in February 2026, while the second-most seen domain, \u003ccode\u003ebilling[.]roofnrack[.]us\u003c/code\u003e, was first observed in July 2025.\u003c/p\u003e\n\n\u003cp\u003eInfoblox observed a clear workweek pattern in SocGholish tier one DNS activity. Queries increased at the start of the work week, remained elevated during business days, and dropped to nearly zero over the weekend. The article says this pattern is intuitive because employees returning to work and browsing from corporate environments are more likely to visit compromised websites.\u003c/p\u003e\n\n\u003ch2 id=\"industry-impact\"\u003eIndustry Impact\u003c/h2\u003e\n\n\u003cp\u003eInfoblox observed SocGholish queries across almost every industry sector in its customer base. The strongest concentration appeared in government, education, banking, healthcare, and non-IT services. The article concludes that SocGholish was not limited to one vertical but had broad reach into public-sector and commercially important environments.\u003c/p\u003e\n\n\u003cp\u003eThe article also adds caveats to the telemetry. Every observed DNS query means the threat was seen by Infoblox’s security stack and, depending on customer configuration, likely blocked before a connection to a SocGholish TDS server was established. Additionally, the analyzed webinject domains do not all indicate active operation throughout the full period.\u003c/p\u003e\n\n\u003cp\u003eOf the 86 tier one domains reviewed, only 32 were observed within the analysis timeframe. Many of the others had been dormant for months, but because they remained embedded in compromised websites, they still contributed to DNS request volume even after the actors had moved on from parts of the infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"tier-two-findings\"\u003eTier Two Findings\u003c/h2\u003e\n\n\u003cp\u003eInfoblox also analyzed SocGholish tier two infrastructure across the same January-to-May 2026 period. Tier two infrastructure refers to the hostnames contacted by the JScript stager after execution on a victim device. Infoblox identified 97 such hostnames.\u003c/p\u003e\n\n\u003cp\u003eThe tier two results differed sharply from tier one. More than 500 customer networks reached out to tier one infrastructure, but only a handful queried tier two hostnames. The article says this gap should be interpreted carefully because security controls may have blocked many attacks before they reached the next stage, and tier one activity represents broad exposure to compromised websites while tier two activity suggests execution of the JScript stager.\u003c/p\u003e\n\n\u003cp\u003eThe small number of tier two contacts still mattered because SocGholish only needs a single successful execution inside a corporate network to establish an initial foothold. Infoblox said the affected organizations included three in the government sector, two in hospitality, and one in critical infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-outlook\"\u003eResponse and Outlook\u003c/h2\u003e\n\n\u003cp\u003eThe article says Operation Endgame likely disrupted central parts of TA569’s operation and may have damaged its reputation as a reliable initial-access provider. Infoblox expects sightings of SocGholish activity to decline in the coming weeks. Even if some infrastructure persists, the operation likely introduced friction for TA569 and the traffic suppliers that supported it.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the key question as whether the actors can adapt and how quickly. Possible paths described in the article include rebuilding the existing ecosystem, shifting to alternative infrastructure, or moving to new delivery models. It also says the broader traffic supplier layer is important to watch because some actors, such as TA2726, have previously pivoted between monetization schemes, while others, including ParrotTDS operators, have not previously been observed delivering alternative attacks beyond SocGholish.\u003c/p\u003e\n\n\u003cp\u003eInfoblox Threat Intel said it will continue tracking how the ecosystem evolves, whether old partnerships re-emerge, and what new infrastructure or delivery chains appear in response.\u003c/p\u003e\n","keyPoints":["Operation Endgame disrupted SocGholish by taking down 106 servers and domains and remediating 14,971 compromised WordPress websites.","SocGholish is a fake browser update malware framework operated by TA569 that provides initial access to other cybercriminals, including EvilCorp.","Infoblox observed that nearly 55% of its cloud customer networks were exposed to SocGholish in 2026, but only a small number appeared to progress to the final stage of the attack.","SocGholish uses a multi-stage JavaScript framework involving traffic acquisition, traffic filtering, fake update prompts, and on-device JScript stager execution.","SocGholish uses domain shadowing for tier one and tier two hostnames, making its rapidly rotating infrastructure harder for defenders to identify and block."],"insights":["Infoblox’s telemetry showed a strong workweek pattern in SocGholish DNS queries, with activity rising on business days and dropping close to zero on weekends, indicating exposure was closely tied to employee browsing from corporate environments.","The gap between more than 500 customer networks contacting tier one infrastructure and only a handful contacting tier two infrastructure suggests layered defenses often stopped the attack before endpoint-stage execution.","The newly created tier one hostname pa-portal.benningtonspringsmhp[.]com had the broadest customer reach despite being set up only in February 2026, pointing to a large early-2026 infection campaign by TA569 or an affiliate.","Dormant SocGholish tier one hostnames continued to generate DNS requests because they remained embedded in compromised websites, showing that abandoned attacker infrastructure can still create persistent exposure signals.","The few observed tier two contacts involved high-value environments, including government, hospitality, and critical infrastructure organizations, underscoring that even rare later-stage SocGholish activity can affect sensitive sectors."],"referencedReports":[{"title":"UNC2165 Shifts to Evade Sanctions","url":"https://cloud.google.com/blog/topics/threat-intelligence/unc2165-shifts-to-evade-sanctions","publisher":"Mandiant","context":"The article cites a June 2022 Mandiant report stating that UNC2165, Mandiant’s name for EvilCorp, almost exclusively obtained initial access from TA569’s SocGholish.","category":"","primary":false}],"body":"\u003cp\u003eA multinational law enforcement action under Operation Endgame disrupted SocGholish, a long-running malware framework known for fake browser updates. The operation took down 106 servers and domains and remediated 14,971 compromised WordPress websites. Infoblox Threat Intel participated as a private-industry partner and described the disruption as a major blow to TA569, the actor operating SocGholish.\u003c/p\u003e\n\n\u003cp\u003eSocGholish matters because it is used for initial access into enterprise environments and has been tied to multiple ransomware families and EvilCorp activity. Infoblox observed that nearly 55% of its cloud customer networks were exposed to SocGholish in 2026, although only a small number appeared to progress to the final stage of the attack. The article emphasizes that even one compromised device can enable a broader data breach.\u003c/p\u003e\n\n\u003cp\u003eTechnically, SocGholish uses compromised websites, traffic distribution systems, fingerprinting, fake browser update prompts, and a JScript stager to move victims through a multi-stage infection chain. It also uses domain shadowing for both tier one and tier two hostnames, allowing malicious subdomains to inherit the reputation of legitimate parent domains. Infoblox said defenders can disrupt the chain by blocking compromised websites, traffic-redirection domains, and SocGholish tier one and tier two infrastructure.\u003c/p\u003e\n"},{"n":17,"title":"F5 issues out-of-band patches for critical NGINX vulnerabilities","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/f5-issues-out-of-band-patches-for-critical-nginx-vulnerabilities/","time":"11:33","priority":"MUST READ","score":94,"tldr":"F5 released emergency patches for critical NGINX flaws that can let unauthenticated remote attackers crash vulnerable servers or potentially execute code in certain non-default configurations. Administrators should update affected NGINX products immediately or apply F5’s mitigations if patching is not yet possible.","briefOverview":"\u003cp\u003eF5 released out-of-band security updates for multiple NGINX web server vulnerabilities. The updates include fixes for two critical-severity flaws that could allow unauthenticated remote attackers to trigger denial-of-service conditions or execute code on vulnerable systems. The affected deployments are NGINX systems using non-default configurations.\u003c/p\u003e\n\n\u003cp\u003eThe two critical flaws are CVE-2026-42530 in ngx_http_v3_module and CVE-2026-42055 in ngx_http_proxy_v2_module and ngx_http_grpc_module. Successful exploitation can cause a use-after-free or heap-based buffer overflow in the NGINX worker process, leading to a restart. F5 said code execution is possible on systems with ASLR disabled or when attackers can bypass ASLR.\u003c/p\u003e\n\n\u003cp\u003eF5 issued fixes for NGINX Plus, NGINX Open Source, NGINX Gateway Fabric, and NGINX Instance Manager. It also provided mitigation steps for administrators who cannot immediately install updates, including disabling HTTP/3 for CVE-2026-42530 and changing header-related configuration for CVE-2026-42055. F5 did not say these issues had been exploited in attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eF5 released out-of-band security updates to address multiple vulnerabilities in NGINX web server products. The most serious issues include two critical-severity vulnerabilities that could enable denial-of-service attacks or code execution on vulnerable systems. The flaws affect NGINX systems with non-default configurations and can be exploited by unauthenticated remote attackers.\u003c/p\u003e\n\n\u003cp\u003eThe first critical issue, CVE-2026-42530, affects ngx_http_v3_module. The second, CVE-2026-42055, affects ngx_http_proxy_v2_module and ngx_http_grpc_module. According to the article, successful exploitation causes either a use-after-free or heap-based buffer overflow in the NGINX worker process, leading to a restart.\u003c/p\u003e\n\n\u003cp\u003eF5 said the flaws can also allow code execution when Address Space Layout Randomization is disabled or when an attacker can bypass ASLR. The company released fixes for multiple affected products, including NGINX Plus and NGINX Open Source. NGINX Gateway Fabric and NGINX Instance Manager are also among the products covered by the security fixes.\u003c/p\u003e\n\n\u003cp\u003eFor administrators unable to immediately install the updates, F5 provided configuration mitigations. CVE-2026-42530 can be mitigated by disabling HTTP/3 by removing \u003ccode\u003equic\u003c/code\u003e from all \u003ccode\u003elisten\u003c/code\u003e directives. CVE-2026-42055 can be mitigated by removing the \u003ccode\u003eignore_invalid_headers off\u003c/code\u003e directive and reducing the \u003ccode\u003elarge_client_header_buffers\u003c/code\u003e directive size below 2 megabytes.\u003c/p\u003e\n\n\u003cp\u003eF5 also addressed two high-severity NGINX Gateway Fabric vulnerabilities, CVE-2026-11311 and CVE-2026-50107. These flaws can allow authenticated attackers to inject arbitrary NGINX configuration directives. F5 did not flag any of the newly disclosed issues as exploited in attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that F5 vulnerabilities have been repeatedly targeted in recent years by cybercrime and nation-state threat groups. It cites previous activity involving corporate network breaches, data-wiping malware, internal server mapping, device hijacking, and theft of sensitive documents. It also notes that CISA has flagged seven F5 vulnerabilities as actively exploited, including four targeted in ransomware attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eF5 released out-of-band security updates for multiple vulnerabilities affecting NGINX web server products. The update addresses two critical-severity flaws that could allow unauthenticated remote attackers to cause denial-of-service conditions or execute code on vulnerable systems. The article states that these critical vulnerabilities affect NGINX systems with non-default configurations.\u003c/p\u003e\n\n\u003cp\u003eThe two critical vulnerabilities are tracked as CVE-2026-42530 and CVE-2026-42055. F5 also addressed two high-severity NGINX Gateway Fabric vulnerabilities tracked as CVE-2026-11311 and CVE-2026-50107. F5 did not state that any of these issues are currently being exploited in attacks.\u003c/p\u003e\n\n\u003ch2 id=\"critical-nginx-vulnerabilities\"\u003eCritical NGINX vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe first critical flaw, CVE-2026-42530, was found in the \u003ccode\u003engx_http_v3_module\u003c/code\u003e. The second critical flaw, CVE-2026-42055, was found in the \u003ccode\u003engx_http_proxy_v2_module\u003c/code\u003e and \u003ccode\u003engx_http_grpc_module\u003c/code\u003e. Both can be exploited by unauthenticated remote attackers under the non-default configuration conditions described in the article.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation causes memory corruption in the NGINX worker process. The article describes the resulting conditions as a use-after-free or heap-based buffer overflow. In both cases, exploitation leads to a restart of the affected NGINX worker process.\u003c/p\u003e\n\n\u003cp\u003eF5 also said the flaws can allow code execution in specific circumstances. According to the article, code execution is possible on systems where Address Space Layout Randomization is disabled or where an attacker can bypass ASLR. The article does not state that F5 observed exploitation of these flaws in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-fixes\"\u003eAffected products and fixes\u003c/h2\u003e\n\n\u003cp\u003eF5 released security fixes for multiple NGINX software products affected by the vulnerabilities. The products named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX Plus\u003c/li\u003e\n\u003cli\u003eNGINX Open Source\u003c/li\u003e\n\u003cli\u003eNGINX Gateway Fabric\u003c/li\u003e\n\u003cli\u003eNGINX Instance Manager\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article frames the releases as out-of-band patches, meaning they were issued outside the normal update cadence. Administrators of affected products are directed to install the security updates or apply available mitigations if they cannot patch immediately.\u003c/p\u003e\n\n\u003ch2 id=\"mitigations-for-administrators\"\u003eMitigations for administrators\u003c/h2\u003e\n\n\u003cp\u003eF5 provided mitigation steps for administrators who cannot immediately install the security updates. For CVE-2026-42530, the mitigation is to disable HTTP/3 by removing \u003ccode\u003equic\u003c/code\u003e from all \u003ccode\u003elisten\u003c/code\u003e directives. This applies to the vulnerability in \u003ccode\u003engx_http_v3_module\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eFor CVE-2026-42055, F5 recommended removing the \u003ccode\u003eignore_invalid_headers off\u003c/code\u003e directive from the configuration. F5 also recommended reducing the \u003ccode\u003elarge_client_header_buffers\u003c/code\u003e directive size below 2 megabytes. These steps are intended as mitigations for the flaw affecting \u003ccode\u003engx_http_proxy_v2_module\u003c/code\u003e and \u003ccode\u003engx_http_grpc_module\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"additional-high-severity-nginx-gateway-fabric-flaws\"\u003eAdditional high-severity NGINX Gateway Fabric flaws\u003c/h2\u003e\n\n\u003cp\u003eIn addition to the two critical vulnerabilities, F5 addressed two high-severity NGINX Gateway Fabric flaws. These are tracked as CVE-2026-11311 and CVE-2026-50107. The article states that authenticated attackers can exploit these flaws to inject arbitrary NGINX configuration directives.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe these two high-severity flaws as unauthenticated. It also does not say that either has been exploited in attacks. They are included as part of the broader set of NGINX-related security fixes released by F5.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status-and-threat-context\"\u003eExploitation status and threat context\u003c/h2\u003e\n\n\u003cp\u003eF5 did not flag any of the newly disclosed security issues as exploited in attacks. However, the article emphasizes that F5 vulnerabilities have often been exploited by both cybercrime and nation-state threat groups in recent years. It cites prior targeting of F5 product flaws to breach corporate networks, deploy data-wiping malware, map internal servers, hijack devices, and steal sensitive documents.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that F5 disclosed in October that state-backed attackers breached its systems in August 2025. According to that disclosure, the attackers stole undisclosed BIG-IP security vulnerabilities and source code. This is presented as part of the broader context around F5-related security risk.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-and-prior-exploitation-history\"\u003eCISA and prior exploitation history\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the U.S. Cybersecurity and Infrastructure Security Agency has flagged seven F5 vulnerabilities as actively exploited over the past several years. It also notes that four of those vulnerabilities were targeted in ransomware attacks. This history is used to underscore the importance of F5 vulnerability remediation, even though the newly disclosed issues were not reported as exploited.\u003c/p\u003e\n\n\u003ch2 id=\"f5-organizational-context\"\u003eF5 organizational context\u003c/h2\u003e\n\n\u003cp\u003eF5 is described as a Fortune 500 technology company. The company provides cybersecurity, application delivery networking, and other services. The article states that F5 serves more than 23,000 customers worldwide, including 48 of the Fortune 50 companies and 80% of the Fortune Global 500.\u003c/p\u003e\n","keyPoints":["F5 released out-of-band security updates for multiple NGINX web server vulnerabilities, including two critical-severity flaws that could allow code execution on vulnerable systems.","The critical vulnerabilities are CVE-2026-42530 in ngx_http_v3_module and CVE-2026-42055 in ngx_http_proxy_v2_module and ngx_http_grpc_module, and they can be exploited by unauthenticated remote attackers on NGINX systems with non-default configurations.","Successful exploitation can cause a use-after-free or heap-based buffer overflow in the NGINX worker process, leading to a restart, and may allow code execution when ASLR is disabled or bypassed.","F5 issued fixes for affected NGINX products including NGINX Plus, NGINX Open Source, NGINX Gateway Fabric, and NGINX Instance Manager.","F5 also addressed two high-severity NGINX Gateway Fabric flaws, CVE-2026-11311 and CVE-2026-50107, that can let authenticated attackers inject arbitrary NGINX configuration directives."],"insights":["Organizations that cannot patch immediately have concrete configuration-based mitigations: disable HTTP/3 by removing quic from listen directives for CVE-2026-42530, and remove ignore_invalid_headers off while keeping large_client_header_buffers below 2 MB for CVE-2026-42055.","The critical flaws affect non-default NGINX configurations, so exposure depends on whether features such as HTTP/3 or specific header-handling settings are enabled rather than on every default deployment.","The reported code execution condition is constrained because F5 states it applies when ASLR is disabled or the attacker can bypass ASLR, while successful exploitation otherwise causes NGINX worker process crashes and restarts.","Although F5 did not report active exploitation of these NGINX issues, the article notes that CISA has previously flagged seven F5 vulnerabilities as actively exploited, including four used in ransomware attacks."],"referencedReports":[{"title":"F5 advisory for CVE-2026-42530","url":"https://my.f5.com/manage/s/article/K000161616","publisher":"F5","context":"The article links to F5's advisory for the critical ngx_http_v3_module vulnerability CVE-2026-42530.","category":"","primary":false},{"title":"F5 advisory for CVE-2026-42055","url":"https://my.f5.com/manage/s/article/K000161584","publisher":"F5","context":"The article links to F5's advisory for the critical ngx_http_proxy_v2_module and ngx_http_grpc_module vulnerability CVE-2026-42055.","category":"","primary":false},{"title":"F5 advisory for CVE-2026-11311","url":"https://my.f5.com/manage/s/article/K000161611","publisher":"F5","context":"The article links to F5's advisory for the high-severity NGINX Gateway Fabric flaw CVE-2026-11311.","category":"","primary":false},{"title":"F5 advisory for CVE-2026-50107","url":"https://my.f5.com/manage/s/article/K000161785","publisher":"F5","context":"The article links to F5's advisory for the high-severity NGINX Gateway Fabric flaw CVE-2026-50107.","category":"","primary":false},{"title":"CISA Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?f%5B0%5D=vendor_project%3A811","publisher":"CISA","context":"The article references CISA's catalog to note that seven F5 vulnerabilities have been flagged as actively exploited.","category":"","primary":false}],"body":"\u003cp\u003eF5 released out-of-band security updates for multiple NGINX web server vulnerabilities. The updates include fixes for two critical-severity flaws that could allow unauthenticated remote attackers to trigger denial-of-service conditions or execute code on vulnerable systems. The affected deployments are NGINX systems using non-default configurations.\u003c/p\u003e\n\n\u003cp\u003eThe two critical flaws are CVE-2026-42530 in ngx_http_v3_module and CVE-2026-42055 in ngx_http_proxy_v2_module and ngx_http_grpc_module. Successful exploitation can cause a use-after-free or heap-based buffer overflow in the NGINX worker process, leading to a restart. F5 said code execution is possible on systems with ASLR disabled or when attackers can bypass ASLR.\u003c/p\u003e\n\n\u003cp\u003eF5 issued fixes for NGINX Plus, NGINX Open Source, NGINX Gateway Fabric, and NGINX Instance Manager. It also provided mitigation steps for administrators who cannot immediately install updates, including disabling HTTP/3 for CVE-2026-42530 and changing header-related configuration for CVE-2026-42055. F5 did not say these issues had been exploited in attacks.\u003c/p\u003e\n"},{"n":27,"title":"DragonForce Hackers Abuse Microsoft Teams Relays to Hide Backdoor.Turn C2 Traffic","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/dragonforce-hackers-abuse-microsoft.html","time":"13:30","priority":"MUST READ","score":94,"tldr":"DragonForce ransomware actors used a custom Go-based RAT, Backdoor.Turn, to hide C2 traffic through legitimate Microsoft Teams TURN relay infrastructure during a months-long intrusion at a major U.S. services firm. The campaign combined stealthy relay abuse with BYOVD evasion and post-ransomware backdoor deployment to maintain covert access.","briefOverview":"\u003cp\u003eThreat actors associated with the DragonForce ransomware have been observed using a custom Go-based remote access trojan called Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. Symantec and Carbon Black said the backdoor was deployed against a major U.S. services firm, whose name was not disclosed. The attackers were present on the victim network for between one and two months.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn obtains an anonymous Microsoft Teams visitor token from Microsoft’s Skype-backed identity services, uses a legitimate Microsoft TURN relay to set up the connection, and then runs a QUIC session to the attacker’s real command-and-control server. The article describes this as the first publicly documented instance of DragonForce-linked actors abusing Microsoft’s TURN relay infrastructure. To defenders, the visible traffic appeared as outbound connections to legitimate Microsoft Teams servers.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion also involved a ZIP archive disguised as a tech support hotfix, DLL side-loading, persistence, reconnaissance, and use of a Huawei driver named HWAuidoOs2Ec.sys to silence security software through a BYOVD technique. Backdoor.Turn was injected into the legitimate DbgView64.exe process after DragonForce ransomware had been deployed. The backdoor supports command execution, process creation, network scanning, LDAP and Active Directory search, credential-based lateral movement, and browser credential theft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors associated with DragonForce ransomware used a custom Go-based RAT called Backdoor.Turn to conceal command-and-control traffic inside Microsoft Teams relay infrastructure. The activity was reported by Symantec and Carbon Black, which said the backdoor was deployed against a major U.S. services firm. The victim company was not named, and the attackers were on the network for between one and two months.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn obtains an anonymous Teams visitor token from Microsoft’s Skype-backed identity services and uses a legitimate Microsoft TURN relay during connection setup. After relay-assisted setup, the malware establishes a QUIC session to the attacker’s real command-and-control server. The article says defenders could only see outbound connections to legitimate Microsoft Teams servers.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as the first publicly documented instance of the threat actors abusing Microsoft’s Traversal Using Relays around NAT relay infrastructure. The backdoor’s TURN-based mechanism is tied to a stealthy command-and-control technique called Ghost Calls, which was documented by Praetorian in August 2024. Backdoor.Turn includes functions for command execution, process creation, network scanning, LDAP and Active Directory search, credential-based lateral movement, and browser credential theft.\u003c/p\u003e\n\n\u003cp\u003eInitial malicious activity on the victim network began in December 2025, when the attackers ran a PowerShell command to drop a ZIP archive disguised as a tech support hotfix. The ZIP file launched a DLL side-loading attack that ran a rogue DLL for reconnaissance, persistence, and disabling security software. The attackers used a Huawei driver named HWAuidoOs2Ec.sys as part of a bring your own vulnerable driver technique.\u003c/p\u003e\n\n\u003cp\u003eThe article says initial access may have come from exploitation of a vulnerability in either an SQL or MS-SQL server, although the exact flaw is unknown. It also says the access may have been acquired from an initial access broker. Backdoor.Turn was executed by injection into the legitimate DbgView64.exe process after DragonForce ransomware had already been deployed, suggesting an attempt to maintain access for later attacks or resale, as stated in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors associated with the DragonForce ransomware have been observed using a custom Go-based remote access trojan called Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. The findings came from Symantec and Carbon Black, which said the backdoor was deployed against a major U.S. services firm. The name of the affected company was not disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe attackers were present on the victim network for between one and two months. According to the article, the activity represents the first publicly documented instance of these threat actors abusing Microsoft’s Traversal Using Relays around NAT, or TURN, relay infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"core-technique\"\u003eCore Technique\u003c/h2\u003e\n\n\u003cp\u003eBackdoor.Turn obtains an anonymous Microsoft Teams visitor token from Microsoft’s Skype-backed identity services. It then uses a legitimate Microsoft TURN relay to set up the connection. After this relay-assisted setup, the malware establishes a QUIC session to the attacker’s real command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eSymantec and Carbon Black said that, from a defender’s perspective, the visible traffic consisted only of outbound connections to legitimate Microsoft Teams servers. The article states that the actual command-and-control server was malicious, but the setup relied on legitimate Microsoft-associated infrastructure during connection establishment.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-early-activity\"\u003eInitial Access and Early Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article says the threat actor is suspected of obtaining initial access by exploiting a vulnerability in either an SQL or MS-SQL server. The exact nature of the flaw is unknown. It also states that the access may have been acquired from an initial access broker.\u003c/p\u003e\n\n\u003cp\u003eInitial malicious activity on the victim network began in December 2025. The attackers ran a PowerShell command to drop a ZIP archive under the pretext of a tech support hotfix. That ZIP file launched a DLL side-loading attack.\u003c/p\u003e\n\n\u003ch2 id=\"evasion-and-persistence\"\u003eEvasion and Persistence\u003c/h2\u003e\n\n\u003cp\u003eThe DLL side-loading attack executed a rogue DLL used for reconnaissance, persistence, and silencing security software. The attackers used a Huawei driver named HWAuidoOs2Ec.sys for this purpose. The article describes this as a bring your own vulnerable driver, or BYOVD, technique.\u003c/p\u003e\n\n\u003cp\u003eThe same Huawei driver was later used in a large-scale malvertising campaign targeting U.S.-based individuals searching for tax-related documents, though the article says that occurred after the ransomware incident. Other drivers cited in relation to similar activity include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ewsftprm.sys, associated with CVE-2023-52271\u003c/li\u003e\n\u003cli\u003eGameDriverX64.sys, associated with CVE-2025-61155\u003c/li\u003e\n\u003cli\u003eK7RKScan.sys, associated with CVE-2025-1055\u003c/li\u003e\n\u003cli\u003eABYSSWORKER, a custom-built malicious driver previously observed in Medusa ransomware attacks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"backdoor-turn-deployment\"\u003eBackdoor.Turn Deployment\u003c/h2\u003e\n\n\u003cp\u003eA notable part of the attack was the execution of Backdoor.Turn by injecting it into the legitimate DbgView64.exe process. This occurred after DragonForce ransomware had already been deployed. The article says this suggests an attempt to maintain continued access to the compromised host for later attacks or for resale.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn’s TURN-based mechanism relies on a stealthy command-and-control communication technique called Ghost Calls. The article says Ghost Calls was documented by Praetorian in August 2024.\u003c/p\u003e\n\n\u003ch2 id=\"backdoor-capabilities\"\u003eBackdoor Capabilities\u003c/h2\u003e\n\n\u003cp\u003eBackdoor.Turn supports a wide range of capabilities described in the article, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommand execution\u003c/li\u003e\n\u003cli\u003eProcess creation\u003c/li\u003e\n\u003cli\u003eNetwork scanning\u003c/li\u003e\n\u003cli\u003eLDAP and Active Directory search\u003c/li\u003e\n\u003cli\u003eCredential-based lateral movement\u003c/li\u003e\n\u003cli\u003eBrowser credential theft\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese capabilities indicate that the backdoor was not limited to basic remote access, but included functions useful for reconnaissance, movement across a network, and credential collection, as described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-context\"\u003eThreat Actor Context\u003c/h2\u003e\n\n\u003cp\u003eThe article links the activity to threat actors associated with DragonForce ransomware. It also identifies Hackledorb as the threat actor behind DragonForce. According to the article, Hackledorb has shifted from a conventional ransomware-as-a-service model to a highly organized, formalized cartel structure.\u003c/p\u003e\n\n\u003cp\u003eSymantec and Carbon Black said the operational timeline shows continuous capability development. The article concludes that the use of Backdoor.Turn, combined with multi-vector BYOVD evasion, marks the group as one of the most capable and persistent ransomware groups operating today.\u003c/p\u003e\n","keyPoints":["Threat actors associated with DragonForce ransomware used a custom Go-based RAT called Backdoor.Turn to conceal command-and-control traffic inside Microsoft Teams relay infrastructure.","Symantec and Carbon Black said Backdoor.Turn was deployed against a major U.S. services firm, where attackers remained on the victim network for between one and two months.","Backdoor.Turn obtains an anonymous Microsoft Teams visitor token backed by Skype identity services, uses a legitimate Microsoft TURN relay during connection setup, and then establishes a QUIC session to the attacker’s command-and-control server.","The attackers used a BYOVD technique with a Huawei driver named HWAuidoOs2Ec.sys to silence security software after launching a DLL side-loading attack from a ZIP archive disguised as a tech support hotfix.","Backdoor.Turn supports capabilities including command execution, process creation, network scanning, LDAP and Active Directory search, credential-based lateral movement, and browser credential theft."],"insights":["Because defenders reportedly saw only outbound connections to legitimate Microsoft Teams servers, allowlisting or trusting Microsoft Teams traffic could obscure malicious command-and-control activity in this intrusion pattern.","The article says this is the first publicly documented case of DragonForce actors abusing Microsoft TURN relay infrastructure, making Microsoft Teams relay traffic a newly relevant detection surface for this threat group.","Backdoor.Turn was injected into DbgView64.exe after DragonForce ransomware was deployed, indicating the attackers used the backdoor for continued access even after the ransomware stage.","The attackers combined multiple evasion layers in one operation, including DLL side-loading, BYOVD with a Huawei driver, and Microsoft Teams TURN relay abuse, showing that detection based on any single technique would likely be insufficient."],"referencedReports":[{"title":"DragonForce MS Teams Backdoor","url":"https://www.security.com/threat-intelligence/dragonforce-msteams-backdoor","publisher":"Symantec and Carbon Black Threat Hunter Team","context":"The article cites Symantec and Carbon Black findings on DragonForce using Backdoor.Turn to conceal C2 traffic through Microsoft Teams relay infrastructure.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors associated with the DragonForce ransomware have been observed using a custom Go-based remote access trojan called Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. Symantec and Carbon Black said the backdoor was deployed against a major U.S. services firm, whose name was not disclosed. The attackers were present on the victim network for between one and two months.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn obtains an anonymous Microsoft Teams visitor token from Microsoft’s Skype-backed identity services, uses a legitimate Microsoft TURN relay to set up the connection, and then runs a QUIC session to the attacker’s real command-and-control server. The article describes this as the first publicly documented instance of DragonForce-linked actors abusing Microsoft’s TURN relay infrastructure. To defenders, the visible traffic appeared as outbound connections to legitimate Microsoft Teams servers.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion also involved a ZIP archive disguised as a tech support hotfix, DLL side-loading, persistence, reconnaissance, and use of a Huawei driver named HWAuidoOs2Ec.sys to silence security software through a BYOVD technique. Backdoor.Turn was injected into the legitimate DbgView64.exe process after DragonForce ransomware had been deployed. The backdoor supports command execution, process creation, network scanning, LDAP and Active Directory search, credential-based lateral movement, and browser credential theft.\u003c/p\u003e\n"},{"n":28,"title":"F5 Patches Two Critical NGINX Open Source Flaws Enabling Remote Code Execution","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/f5-patches-two-critical-nginx-open.html","time":"17:32","priority":"MUST READ","score":94,"tldr":"F5 patched two critical NGINX Open Source vulnerabilities that could allow unauthenticated remote code execution under specific HTTP/3 or HTTP/2 proxy configurations. Affected users should upgrade to fixed versions or apply F5’s mitigations, such as disabling HTTP/3 or adjusting vulnerable header settings.","briefOverview":"\u003cp\u003eF5 released security updates for two critical security flaws in NGINX Open Source that could be exploited to achieve code execution on affected systems. The vulnerabilities are CVE-2026-42530 and CVE-2026-42055, both carrying a CVSS v4 score of 9.2. The flaws affect specific NGINX modules and configurations involving HTTP/3 QUIC and HTTP/2 proxying.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-42530 is a use-after-free issue in ngx_http_v3_module that can be triggered by a remote unauthenticated attacker when NGINX Open Source uses the HTTP/3 QUIC module. CVE-2026-42055 is a heap-based buffer overflow in ngx_http_proxy_v2_module and ngx_http_grpc_module under specific HTTP/2 proxying and header configuration conditions. F5 said the flaws could lead to code execution on systems with ASLR disabled or where ASLR can be bypassed.\u003c/p\u003e\n\n\u003cp\u003eF5 listed fixed versions across NGINX Open Source, NGINX Plus, NGINX Gateway Fabric, and other NGINX-related products. As mitigations, F5 recommended disabling HTTP/3 for CVE-2026-42530 and changing configuration settings tied to CVE-2026-42055. The article says F5 did not mention exploitation of these vulnerabilities in the wild.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eF5 released security updates to address two critical vulnerabilities in NGINX Open Source that could allow code execution on affected systems. The flaws are tracked as CVE-2026-42530 and CVE-2026-42055, and both have a CVSS v4 score of 9.2. The article frames the issue as a patch release affecting NGINX Open Source and several related F5 NGINX products.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-42530 is a use-after-free vulnerability in ngx_http_v3_module. According to the article, a remote unauthenticated attacker could trigger it when NGINX Open Source is configured to use the HTTP/3 QUIC module by reopening a QPACK encoder stream through a specially crafted HTTP/3 session. The article states this could lead to code execution on systems with Address Space Layout Randomization disabled or where the attacker can bypass ASLR.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-42055 is a heap-based buffer overflow vulnerability in ngx_http_proxy_v2_module and ngx_http_grpc_module. It can be triggered by a remote unauthenticated attacker when the proxy_http_version is set to 2 or grpc_pass directives are used to proxy HTTP/2 traffic, ignore_invalid_headers is set to off, and large_client_header_buffers is larger than 2 MB. The article says code execution is possible on systems with ASLR disabled or where ASLR can be bypassed.\u003c/p\u003e\n\n\u003cp\u003eF5 identified multiple affected product lines and fixed versions. CVE-2026-42530 is fixed in NGINX Open Source 1.31.2 and NGINX Gateway Fabric 2.6.4 for the listed affected ranges, while CVE-2026-42055 is fixed in versions including NGINX Plus 37.0.2.1, NGINX Plus R36 P6, NGINX Open Source 1.31.2, NGINX Open Source 1.30.3, and NGINX Gateway Fabric 2.6.4. Other affected products listed include NGINX Instance Manager, F5 WAF for NGINX, NGINX App Protect WAF, F5 DoS for NGINX, NGINX App Protect DoS, and NGINX Ingress Controller.\u003c/p\u003e\n\n\u003cp\u003eF5 also provided mitigation guidance for systems that cannot immediately update. For CVE-2026-42530, F5 recommended disabling HTTP/3. For CVE-2026-42055, F5 recommended removing the ignore_invalid_headers off directive or reducing the large_client_header_buffers directive size below 2 MB.\u003c/p\u003e\n\n\u003cp\u003eThe article says F5 made no mention of these two vulnerabilities being exploited in the wild. It also notes that security flaws in F5 products have been repeatedly exploited by bad actors. As a recent example, it cites CVE-2026-42945, also called NGINX Rift, which reportedly came under active exploitation within days after public disclosure the previous month.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eF5 released security updates for two critical security flaws in NGINX Open Source that could be exploited to achieve code execution on affected systems. The vulnerabilities are tracked as CVE-2026-42530 and CVE-2026-42055. Both vulnerabilities have a CVSS v4 score of 9.2.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the issues as affecting NGINX Open Source and several related F5 NGINX product lines. It also provides affected version ranges, fixed versions where available, and configuration-based mitigations.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-42530\"\u003eCVE-2026-42530\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-42530 is described as a use-after-free vulnerability in the ngx_http_v3_module. The article says it can be triggered by a remote unauthenticated attacker when NGINX Open Source is configured to use the HTTP/3 QUIC module.\u003c/p\u003e\n\n\u003cp\u003eThe triggering condition involves reopening a QPACK encoder stream by means of a specially crafted HTTP/3 session. The article states that exploitation could allow code execution on systems with Address Space Layout Randomization disabled or when the attacker can bypass ASLR.\u003c/p\u003e\n\n\u003cp\u003eAffected products and versions listed for CVE-2026-42530 include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX Open Source 1.31.0 through 1.31.1, fixed in 1.31.2.\u003c/li\u003e\n\u003cli\u003eNGINX Gateway Fabric 2.0.0 through 2.6.3, fixed in 2.6.4.\u003c/li\u003e\n\u0
