rrect itself without carrying dozens of similar tool schemas in every request.","BloodHound Cypher support is more reliable when the model is directed to load domain-specific query references and known-good templates on demand, rather than relying on a long prompt or the model’s generic Cypher training.","The addition of controlled file upload support reflects a shift from read-only analysis toward agentic BloodHound workflows, where an assistant can help prepare, upload, and verify collection data while still requiring analyst approval for impactful actions."],"referencedReports":[],"body":"\u003cp\u003eThe article reflects on one year of development of BloodHound MCP, a Model Context Protocol server that lets an LLM interact with BloodHound data. The author says the first version proved that an LLM could converse with BloodHound, but it exposed too much of the BloodHound API directly. The main lesson from the rebuild is that MCP design is context design.\u003c/p\u003e\n\n\u003cp\u003eThe original design mapped many API operations to separate tools, which created a 100-tool catalog and consumed about 19,016 fixed tokens before user questions or graph results were considered. The newer versions replaced many endpoint-specific tools with composite tools, reducing fixed overhead to 5,721 tokens in the current version. The author argues this improves cost, context availability, and tool-selection quality.\u003c/p\u003e\n\n\u003cp\u003eThe current BloodHound MCP uses thirteen top-level tools, shared error handling, domain-specific MCP resources, and a prompt that guides the model toward loading references when needed. The article also describes new file upload support for controlled SharpHound, AzureHound, BloodHound, and OpenGraph workflows. The author frames the project’s direction as making the model a better attack-path navigator rather than simply a Cypher author or API caller.\u003c/p\u003e\n"},{"n":25,"title":"The Scripts on Your Checkout Page Are Now a PCI DSS Problem","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-scripts-on-your-checkout-page-are.html","time":"13:58","priority":"MAY READ","score":45,"tldr":"PCI DSS v4.0.1 now requires merchants to inventory, authorize, verify, and monitor all scripts on payment pages because third-party checkout scripts can be abused for Magecart-style skimming. The article promotes Reflectiz as an agentless tool that helps meet these requirements and produce QSA-ready compliance evidence.","briefOverview":"\u003cp\u003eThe article says modern checkout pages often run many third-party scripts, including analytics tags, tag managers, support widgets, and payment iframes. It argues that any of these scripts can become a skimmer if a trusted third-party vendor is compromised. It cites Magecart-style web skimming as the core risk and notes that Sansec has counted more than 100,000 affected sites.\u003c/p\u003e\n\n\u003cp\u003eThe article focuses on PCI DSS v4.0.1 requirements 6.4.3 and 11.6.1, which are now fully in force. Requirement 6.4.3 requires payment-page scripts to be inventoried, authorized, and proven to have integrity, while 11.6.1 requires detection of tampering with page content and HTTP headers as received by the browser. The article says these tasks do not scale manually because payment-page scripts change frequently.\u003c/p\u003e\n\n\u003cp\u003eIntegrity360 Europe, described as a PCI Qualified Security Assessor, reviewed the Reflectiz PCI DSS Platform against those requirements and found it can effectively support compliance. The article highlights Reflectiz’s behavior-based monitoring, agentless deployment, and one-click QSA-ready evidence. It also states that since January 2025, SAQ A merchants can omit these requirements only if they confirm their site is not susceptible to script attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article argues that scripts on checkout pages have become a PCI DSS concern because customers’ browsers run more than the merchant’s own code during payment. It lists analytics tags, tag managers, support widgets, and payment iframes as examples of code commonly present on modern checkout pages. The central concern is that any one of these third-party scripts can be turned into a card skimmer.\u003c/p\u003e\n\n\u003cp\u003eThe article connects this risk to Magecart and web skimming supply-chain attacks. It states that attackers often compromise a third-party vendor, allowing malicious payloads to arrive through scripts that the merchant has already approved and used for months. In that scenario, the article says nothing new necessarily appears on the page, because the meaningful change is the script’s behavior rather than its presence.\u003c/p\u003e\n\n\u003cp\u003ePCI DSS v4.0.1 is presented as closing this gap through requirements 6.4.3 and 11.6.1, which the article says are now fully in force. Requirement 6.4.3 requires an inventory of every payment-page script, authorization for those scripts, and proof of integrity. Requirement 11.6.1 requires detection of tampering with page content and HTTP headers as the browser receives them.\u003c/p\u003e\n\n\u003cp\u003eThe article says manual implementation is difficult across large and changing script environments. It cites Reflectiz data stating that roughly 30% of payment-page scripts change within any two-week window. It also says hash checking alone may miss a silent vendor-side script swap, while behavior monitoring can detect a script when it starts reaching for card data.\u003c/p\u003e\n\n\u003cp\u003eIntegrity360 Europe, identified as a PCI Qualified Security Assessor and member of the PCI SSC Global Executive Assessor Roundtable, reviewed the Reflectiz PCI DSS Platform. The article says the assessor found the platform can effectively support compliance with PCI DSS requirements 6.4.3 and 11.6.1. The highlighted capabilities are behavior monitoring, agentless deployment without code changes or snippets, and one-click QSA-ready evidence with a full audit trail per page.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses SAQ A changes effective since January 2025. It says merchants can drop requirements 6.4.3 and 11.6.1 from SAQ A only if they confirm their site is not susceptible to script attacks. It contrasts full redirect payment flows, which it says are likely fine, with embedded payment iframes, where a script on the parent page can still hijack checkout before data reaches the secure frame.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents payment-page scripts as a new and explicit PCI DSS problem for merchants. It says that when a customer enters a card number into a checkout page, the browser is typically running more than the merchant’s own code. Examples given include analytics tags, a tag manager, a support widget, and a payment iframe.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main argument is that these third-party scripts create a web-skimming risk because any one of them can be turned into a skimmer. It frames the issue around Magecart-style attacks, where malicious code can arrive through a script that was already approved and has been running for months.\u003c/p\u003e\n\n\u003ch2 id=\"threat-context\"\u003eThreat Context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Magecart as the relevant attack model. It cites Sansec as having counted more than 100,000 sites hit by web skimming and supply-chain attacks. It also cites the 2018 British Airways breach, saying it exposed 380,000 transactions and led to a fine that initially started at £183 million.\u003c/p\u003e\n\n\u003cp\u003eA key technical point in the article is that malicious code may not appear as a new script on the page. Instead, attackers may compromise a third-party vendor, causing the malicious payload to ride in through an existing and previously trusted script. The article says that in this situation, what changes is the script’s behavior, not its presence on the page.\u003c/p\u003e\n\n\u003ch2 id=\"pci-dss-v4-0-1-requirements\"\u003ePCI DSS v4.0.1 Requirements\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on two PCI DSS v4.0.1 requirements that it says are now fully in force:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRequirement 6.4.3:\u003c/strong\u003e Inventory every payment-page script, authorize it, and prove its integrity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRequirement 11.6.1:\u003c/strong\u003e Detect tampering with page content and HTTP headers as the browser receives them.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that handling these requirements manually does not scale across hundreds of scripts that change constantly. It cites Reflectiz data showing that roughly 30% of payment-page scripts change within any two-week window.\u003c/p\u003e\n\n\u003ch2 id=\"assessment-by-integrity360-europe\"\u003eAssessment by Integrity360 Europe\u003c/h2\u003e\n\n\u003cp\u003eThe article says Integrity360 Europe reviewed the Reflectiz PCI DSS Platform against PCI DSS requirements 6.4.3 and 11.6.1. Integrity360 Europe is described as a PCI Qualified Security Assessor and a member of the PCI SSC Global Executive Assessor Roundtable. According to the article, the assessor found that Reflectiz can effectively support compliance with both requirements.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights three findings from the review:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReflectiz watches behavior rather than only file hashes.\u003c/li\u003e\n\u003cli\u003eReflectiz deploys without agents, code changes, or snippets.\u003c/li\u003e\n\u003cli\u003eReflectiz produces QSA-ready evidence with a full audit trail per page.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-detail-behavior-monitoring-versus-hash-checks\"\u003eTechnical Detail: Behavior Monitoring Versus Hash Checks\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that hash checks alone may be insufficient. It says a hash check can miss a silent vendor-side swap. In contrast, it says Reflectiz catches a script when it starts reaching for card data.\u003c/p\u003e\n\n\u003cp\u003eThis point is tied to the article’s broader claim that the main risk may come from behavior changes in scripts that already exist on the checkout page. The article presents behavior monitoring as a way to detect malicious activity even when the script itself is not newly introduced.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-evidence-claims\"\u003eDeployment and Evidence Claims\u003c/h2\u003e\n\n\u003cp\u003eThe article says Reflectiz deploys agentlessly. It specifically says the platform requires no code changes and no snippets, can go live in days, and keeps working through refactors and CMS migrations.\u003c/p\u003e\n\n\u003cp\u003eIt also says Reflectiz produces QSA-ready evidence in one click. The article describes this evidence as a full audit trail per page that is ready for assessment.\u003c/p\u003e\n\n\u003ch2 id=\"saq-a-considerations\"\u003eSAQ A Considerations\u003c/h2\u003e\n\n\u003cp\u003eThe article states that since January 2025, merchants can drop requirements 6.4.3 and 11.6.1 from SAQ A only if they confirm that their site is not susceptible to script attacks. It says a merchant using a full redirect to a processor is likely fine.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article says merchants using an embedded payment iframe may still have exposure. It states that a script on the parent page can hijack checkout before card data reaches the secure frame. The article says those merchants have to prove that this cannot happen and notes that PCI SSC FAQ #1588 points back to the same controls.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-scope\"\u003eDisclosed Impact and Scope\u003c/h2\u003e\n\n\u003cp\u003eThe article does not report a new breach or newly disclosed vulnerability. Instead, it presents a compliance and payment-page security issue tied to third-party scripts, Magecart-style web skimming, and PCI DSS v4.0.1 enforcement.\u003c/p\u003e\n\n\u003cp\u003eThe affected parties discussed are merchants operating checkout pages, especially those using third-party scripts or embedded payment iframes. The article also references assessors and compliance stakeholders, including Integrity360 Europe, PCI DSS, PCI SSC, and QSA assessment processes.\u003c/p\u003e\n\n\u003ch2 id=\"response-promoted-in-the-article\"\u003eResponse Promoted in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article promotes downloading a full Integrity360 Europe white paper about Reflectiz. It says the white paper breaks down both PCI DSS requirements line by line, explains the monitoring workflow, and describes what SAQ A now demands of iframe merchants.\u003c/p\u003e\n\n\u003cp\u003eOverall, the article’s central takeaway is that payment-page script inventory, authorization, integrity verification, and tamper detection are now treated as active PCI DSS obligations, and that third-party checkout scripts must be monitored for behavior changes rather than merely tracked as known assets.\u003c/p\u003e\n","keyPoints":["Modern checkout pages often load many third-party scripts, including analytics tags, tag managers, support widgets, and payment iframes, and any of these scripts can be turned into a skimmer.","PCI DSS v4.0.1 requirements 6.4.3 and 11.6.1 require organizations to inventory and authorize every payment-page script, prove script integrity, and detect tampering with page content and HTTP headers as received by the browser.","Integrity360 Europe, a PCI Qualified Security Assessor, reviewed the Reflectiz PCI DSS Platform and found it can effectively support compliance with PCI DSS requirements 6.4.3 and 11.6.1.","The article says Reflectiz monitors script behavior rather than only file hashes, deploys without code changes or snippets, and produces QSA-ready evidence with a full audit trail per page.","Since January 2025, merchants can exclude PCI DSS requirements 6.4.3 and 11.6.1 from SAQ A only if they confirm their site is not susceptible to script attacks."],"insights":["A previously approved third-party script can become dangerous without appearing as a new asset on the checkout page, because the article says Magecart-style payloads may arrive through compromised vendors and the meaningful change is in script behavior rather than script presence.","Hash-based integrity checks may be insufficient for PCI DSS payment-page monitoring, because the article states that a silent vendor-side script swap can evade a hash check while behavior monitoring can catch attempts to access card data.","Iframe-based payment flows may still fall under SAQ A script-security obligations, because the article says scripts on the parent page can hijack checkout before data reaches the secure payment frame.","Manual compliance processes are likely to break down on dynamic checkout pages, because the article cites Reflectiz data showing that roughly 30% of payment-page scripts change within any two-week window."],"referencedReports":[{"title":"Reflectiz PCI DSS Solution Assessment by Integrity360","url":"https://www.reflectiz.com/learning-hub/pci-dss-solution-assessment-integrity360/","publisher":"Integrity360 Europe","context":"The article describes this as an independent QSA assessment and white paper reviewing the Reflectiz PCI DSS Platform against PCI DSS requirements 6.4.3 and 11.6.1.","category":"","primary":false}],"body":"\u003cp\u003eThe article says modern checkout pages often run many third-party scripts, including analytics tags, tag managers, support widgets, and payment iframes. It argues that any of these scripts can become a skimmer if a trusted third-party vendor is compromised. It cites Magecart-style web skimming as the core risk and notes that Sansec has counted more than 100,000 affected sites.\u003c/p\u003e\n\n\u003cp\u003eThe article focuses on PCI DSS v4.0.1 requirements 6.4.3 and 11.6.1, which are now fully in force. Requirement 6.4.3 requires payment-page scripts to be inventoried, authorized, and proven to have integrity, while 11.6.1 requires detection of tampering with page content and HTTP headers as received by the browser. The article says these tasks do not scale manually because payment-page scripts change frequently.\u003c/p\u003e\n\n\u003cp\u003eIntegrity360 Europe, described as a PCI Qualified Security Assessor, reviewed the Reflectiz PCI DSS Platform against those requirements and found it can effectively support compliance. The article highlights Reflectiz’s behavior-based monitoring, agentless deployment, and one-click QSA-ready evidence. It also states that since January 2025, SAQ A merchants can omit these requirements only if they confirm their site is not susceptible to script attacks.\u003c/p\u003e\n"},{"n":30,"title":"Censys Expands Into Security Operations with Internet Intelligence-Powered Workflows","source":"censys.com","sourceColorIdx":5,"link":"https://censys.com/blog/censys-expands-into-security-operations-with-internet-intelligence-powered-workflows/","time":"13:05","priority":"MAY READ","score":45,"tldr":"Censys announced an expansion into security operations with workflows and an Enrichment API that bring its real-time Internet intelligence directly into alert triage, investigations, and threat hunting. The goal is to help security teams enrich more alerts, prioritize risk faster, and automate decisions using external infrastructure context.","briefOverview":"\u003cp\u003eCensys announced its expansion into security operations, saying it will enable organizations to operationalize Censys Internet intelligence across security workflows. The announcement builds on recent Censys innovations including risk scoring, adversary intelligence, AI-powered workflows, integrations with SIEM, SOAR, and threat intelligence platforms, and the new Censys Enrichment API. Censys positions the move as a way to bring external Internet context into day-to-day security operations.\u003c/p\u003e\n\n\u003cp\u003eThe article says security teams already have internal visibility through tools such as SIEM, EDR, cloud security, identity, and threat intelligence solutions, but often lack accurate, current external intelligence about threat infrastructure. Censys says its Internet Map provides a continuously updated view of global Internet infrastructure and can supply evidence-based context about infrastructure behind threats. The company says the Censys Enrichment API can bring real-time Internet context into alert triage, investigations, and threat hunting.\u003c/p\u003e\n\n\u003cp\u003eCensys cites examples where its Internet intelligence has been used to identify emerging threats, including a previously undocumented Russian remote access framework, exposed AI infrastructure on the public Internet, and Internet-connected critical infrastructure during heightened geopolitical activity. The article frames Internet intelligence as important for prioritizing risk, validating alerts, and supporting AI-driven security decisions. Censys CEO Zakir Durumeric says future security operations will depend on automating security decisions using both internal infrastructure context and Internet infrastructure used by adversaries.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCensys announced an expansion into security operations focused on operationalizing its Internet intelligence across security workflows. The company says this move follows a year of product and capability additions, including risk scoring, adversary intelligence, AI-powered workflows, integrations with SIEM, SOAR, and threat intelligence platforms, and the new Censys Enrichment API. The announcement presents Censys Internet intelligence as a way to support alert triage, investigations, and threat hunting.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that organizations have invested heavily in tools that show what is happening inside their environments, including SIEM, EDR, cloud security, identity, and threat intelligence systems. It says these tools remain essential, but that security teams often rely on external intelligence that is incomplete, stale, or insufficiently accurate for confident risk assessment and response prioritization. Censys says organizations increasingly need real-time intelligence about the Internet infrastructure behind threats to make effective security decisions.\u003c/p\u003e\n\n\u003cp\u003eCensys says it addresses this gap through accurate, real-time, and comprehensive Internet intelligence built on the Censys Internet Map. The company describes the Internet Map as a comprehensive and continuously updated view of global Internet infrastructure. According to the article, this map provides actionable, evidence-based context about infrastructure behind threats.\u003c/p\u003e\n\n\u003cp\u003eThe new Censys Enrichment API is presented as the mechanism for operationalizing Internet intelligence at scale. The article says it can bring real-time Internet context directly into workflows so organizations can enrich every alert, rather than only the alerts analysts have time to investigate manually. Censys frames this as a way to support alert triage, investigations, and threat hunting across security operations.\u003c/p\u003e\n\n\u003cp\u003eThe article cites several examples of threats and exposures that Censys says security teams have used its Internet intelligence to identify. These include a previously undocumented Russian remote access framework combining credential phishing, keylogging, and RDP hijacking techniques, emerging AI infrastructure exposed on the public Internet, and Internet-connected critical infrastructure during periods of heightened geopolitical activity. The company says these insights have helped customers proactively defend against emerging threats through earlier visibility into the infrastructure behind them.\u003c/p\u003e\n\n\u003cp\u003eCensys includes comments from Chris Riordan, CTO of RavenTek, and Zakir Durumeric, founder and CEO of Censys. Riordan says real-time intelligence about threat infrastructure can help analysts decide whether activity represents meaningful risk or can be deprioritized. Durumeric says Internet intelligence is a critical component of modern security operations and AI-driven security decisions, and that defenders need to understand both internal infrastructure and the Internet infrastructure leveraged by adversaries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCensys announced its expansion into security operations, with the stated goal of enabling organizations to operationalize Censys Internet intelligence across security workflows. The company says the expansion is built on a series of innovations introduced over the past year, including risk scoring, adversary intelligence, AI-powered workflows, integrations across leading SIEM, SOAR, and threat intelligence platforms, and the new Censys Enrichment API.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the announcement as a shift toward embedding Censys Internet intelligence directly into operational security processes. The workflows specifically highlighted include alert triage, investigations, and threat hunting.\u003c/p\u003e\n\n\u003ch2 id=\"stated-security-operations-gap\"\u003eStated Security Operations Gap\u003c/h2\u003e\n\n\u003cp\u003eCensys says organizations have invested heavily in internal security visibility tools, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSIEM\u003c/li\u003e\n\u003cli\u003eEDR\u003c/li\u003e\n\u003cli\u003eCloud security solutions\u003c/li\u003e\n\u003cli\u003eIdentity systems\u003c/li\u003e\n\u003cli\u003eThreat intelligence solutions\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these tools remain essential for understanding what is happening inside an organization’s environment. However, it argues that security teams often rely on external intelligence that is incomplete, stale, or insufficiently accurate to confidently assess risk and prioritize response.\u003c/p\u003e\n\n\u003cp\u003eCensys frames the problem as a need for real-time intelligence about the Internet infrastructure behind threats. According to the article, this external context helps organizations validate risk, prioritize response, and make effective security decisions.\u003c/p\u003e\n\n\u003ch2 id=\"censys-internet-intelligence-and-the-internet-map\"\u003eCensys Internet Intelligence and the Internet Map\u003c/h2\u003e\n\n\u003cp\u003eCensys says it closes the external visibility gap with accurate, real-time, and comprehensive Internet intelligence. The article states that this intelligence is built on the Censys Internet Map, which Censys describes as the industry’s most comprehensive and continuously updated view of global Internet infrastructure.\u003c/p\u003e\n\n\u003cp\u003eAccording to the announcement, the Censys Internet Map provides actionable, evidence-based context about the infrastructure behind threats. This context is positioned as useful for helping analysts determine whether activity represents meaningful risk or can be deprioritized.\u003c/p\u003e\n\n\u003cp\u003eChris Riordan, CTO of RavenTek, is quoted saying that real-time intelligence about threat infrastructure helps analysts quickly assess whether activity represents meaningful risk. He also says that bringing that context directly into security workflows helps teams make faster decisions and respond more effectively to modern threats.\u003c/p\u003e\n\n\u003ch2 id=\"censys-enrichment-api\"\u003eCensys Enrichment API\u003c/h2\u003e\n\n\u003cp\u003eThe new Censys Enrichment API is presented as a central part of the expansion into security operations. Censys says the API allows organizations to operationalize Internet intelligence at scale across alert triage, investigations, and threat hunting.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the API can bring real-time Internet context directly into security workflows. Censys says this enables organizations to enrich every alert, rather than only the alerts analysts have time to investigate manually.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide API endpoint details, data schemas, authentication details, or implementation examples. Its technical emphasis is on the operational role of enrichment: adding current Internet infrastructure context to security alerts and investigations.\u003c/p\u003e\n\n\u003ch2 id=\"examples-of-threat-and-exposure-visibility\"\u003eExamples of Threat and Exposure Visibility\u003c/h2\u003e\n\n\u003cp\u003eCensys says security teams are already using its Internet intelligence to identify emerging threats. The article provides three examples:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA previously undocumented Russian remote access framework that combined credential phishing, keylogging, and RDP hijacking techniques into a novel attack chain.\u003c/li\u003e\n\u003cli\u003eEmerging AI infrastructure exposed on the public Internet.\u003c/li\u003e\n\u003cli\u003eInternet-connected critical infrastructure during periods of heightened geopolitical activity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCensys says these insights have helped its customers proactively defend against emerging threats through earlier visibility into the infrastructure behind them.\u003c/p\u003e\n\n\u003ch2 id=\"techniques-and-entities-mentioned\"\u003eTechniques and Entities Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article mentions several specific threat-related techniques and contexts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredential phishing\u003c/li\u003e\n\u003cli\u003eKeylogging\u003c/li\u003e\n\u003cli\u003eRDP hijacking\u003c/li\u003e\n\u003cli\u003eExposed AI infrastructure\u003c/li\u003e\n\u003cli\u003eInternet-connected critical infrastructure\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also references Russian and Iran-linked activity in the context of examples linked from Censys content. It does not provide technical indicators, infrastructure details, affected organizations, or timelines for those examples within the text of the announcement.\u003c/p\u003e\n\n\u003ch2 id=\"positioning-around-automation-and-ai-driven-decisions\"\u003ePositioning Around Automation and AI-Driven Decisions\u003c/h2\u003e\n\n\u003cp\u003eZakir Durumeric, founder and CEO of Censys, is quoted saying that Internet intelligence is a critical component of modern security operations and AI-driven security decisions. He says attacks are becoming faster, more automated, and more dynamic, and that security teams need real-time intelligence they can trust and act on.\u003c/p\u003e\n\n\u003cp\u003eDurumeric also says the next few years of security operations will be defined by how effectively defenders can automate security decisions. According to his quote, this requires understanding both internal infrastructure and the Internet infrastructure adversaries are leveraging.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-involved-parties\"\u003eAffected and Involved Parties\u003c/h2\u003e\n\n\u003cp\u003eThe primary organization in the article is Censys, which announced the expansion and the new security operations focus. RavenTek is also mentioned through a quote from its CTO, Chris Riordan.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Censys serves global governments, Fortune 500 companies, and security providers. It does not identify specific affected customers, victims, or organizations impacted by a particular incident.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a breach, vulnerability disclosure, patch, or specific incident response outcome. Instead, it states that Censys customers have used Internet intelligence to gain earlier visibility into infrastructure behind emerging threats.\u003c/p\u003e\n\n\u003cp\u003eThe claimed operational impact is that security teams can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnrich alerts with real-time Internet context.\u003c/li\u003e\n\u003cli\u003ePrioritize response more effectively.\u003c/li\u003e\n\u003cli\u003eInvestigate threats with evidence-based infrastructure context.\u003c/li\u003e\n\u003cli\u003eSupport threat hunting workflows.\u003c/li\u003e\n\u003cli\u003eAutomate security decisions using both internal and external infrastructure context.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"bottom-line\"\u003eBottom Line\u003c/h2\u003e\n\n\u003cp\u003eCensys is expanding beyond Internet intelligence into security operations by embedding its external infrastructure data into operational workflows. The announcement centers on the Censys Enrichment API, which is intended to enrich alerts, investigations, and hunts with real-time Internet context. The company frames this capability as important for risk validation, response prioritization, and AI-driven security decision-making.\u003c/p\u003e\n","keyPoints":["Censys announced its expansion into security operations to help organizations operationalize Censys Internet intelligence across security workflows.","The expansion builds on recent Censys innovations including risk scoring, adversary intelligence, AI-powered workflows, integrations with SIEM, SOAR, and threat intelligence platforms, and the new Censys Enrichment API.","Censys says its Internet intelligence is built on the Censys Internet Map, which it describes as a comprehensive and continuously updated view of global Internet infrastructure.","The new Censys Enrichment API is intended to bring real-time Internet context directly into alert triage, investigations, and threat hunting workflows.","Censys says security teams have used its Internet intelligence to identify emerging threats including a previously undocumented Russian remote access framework, exposed AI infrastructure, and Internet-connected critical infrastructure during heightened geopolitical activity."],"insights":["Censys is positioning external Internet infrastructure context as a missing layer in security operations, arguing that internal tools such as SIEM, EDR, cloud security, identity, and threat intelligence systems are insufficient when external intelligence is incomplete or stale.","The Censys Enrichment API is designed to scale enrichment beyond analyst-driven investigations by applying Internet context to every alert, which directly addresses the article’s stated problem of teams lacking time to manually investigate all alerts.","The article links Internet intelligence to AI-driven security decisions, emphasizing that automation in security operations depends on understanding both internal infrastructure and adversary-used Internet infrastructure.","Censys highlights examples spanning Russian remote access tooling, exposed AI infrastructure, and Internet-connected critical infrastructure, showing that its security operations push is intended to support both threat investigation and exposure monitoring use cases."],"referencedReports":[],"body":"\u003cp\u003eCensys announced its expansion into security operations, saying it will enable organizations to operationalize Censys Internet intelligence across security workflows. The announcement builds on recent Censys innovations including risk scoring, adversary intelligence, AI-powered workflows, integrations with SIEM, SOAR, and threat intelligence platforms, and the new Censys Enrichment API. Censys positions the move as a way to bring external Internet context into day-to-day security operations.\u003c/p\u003e\n\n\u003cp\u003eThe article says security teams already have internal visibility through tools such as SIEM, EDR, cloud security, identity, and threat intelligence solutions, but often lack accurate, current external intelligence about threat infrastructure. Censys says its Internet Map provides a continuously updated view of global Internet infrastructure and can supply evidence-based context about infrastructure behind threats. The company says the Censys Enrichment API can bring real-time Internet context into alert triage, investigations, and threat hunting.\u003c/p\u003e\n\n\u003cp\u003eCensys cites examples where its Internet intelligence has been used to identify emerging threats, including a previously undocumented Russian remote access framework, exposed AI infrastructure on the public Internet, and Internet-connected critical infrastructure during heightened geopolitical activity. The article frames Internet intelligence as important for prioritizing risk, validating alerts, and supporting AI-driven security decisions. Censys CEO Zakir Durumeric says future security operations will depend on automating security decisions using both internal infrastructure context and Internet infrastructure used by adversaries.\u003c/p\u003e\n"},{"n":11,"title":"Close Encounters of the Human Kind","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/close-encounters-of-the-human-kind/","time":"18:00","priority":"MAY READ","score":40,"tldr":"The article argues that cybersecurity progress is less about simply knowing the right controls and more about accounting for messy human priorities, limited resources, and inconsistent behavior. It also highlights Cisco Talos research showing how local AI agents can automate reverse engineering workflows without sending sensitive binaries off-machine.","briefOverview":"\u003cp\u003eThe article is a Threat Source newsletter that uses the film \u003cem\u003eDisclosure Day\u003c/em\u003e to discuss how people and organizations do not always respond rationally to important information. The author argues that knowing what to do in cybersecurity, such as patching, using MFA, or practicing incident response, is different from having the time, resources, urgency, and collective will to do it. The core message is that cybersecurity work must account for human context, competing priorities, and inconsistent reactions.\u003c/p\u003e\n\n\u003cp\u003eThe main technical highlight is Cisco Talos’ description of a reverse engineering approach that pairs local AI agents with traditional analysis tools such as the VB6 disassembler vbdec. In this model, vbdec exposes parsed data through a live Component Object Model interface, allowing analysts to use natural language prompts to automate tasks like decompiling functions and building call graphs. The article says this keeps sensitive binaries on the local workstation while enabling agentic automation.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also lists major security headlines, including ShinyHunters claiming a Council of Europe hack, a credential-harvesting operation affecting more than 30,000 Fortinet devices, and Fileless Phantom Stealer targeting browser credentials. It also references a FIFA internal system flaw that allegedly gave a researcher control over World Cup TV streams and an FBI cyber range designed as a replica small town. Additional sections point readers to Talos content, upcoming events, and prevalent malware files seen in Talos telemetry.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis Threat Source newsletter opens with commentary on Steven Spielberg’s fictional film \u003cem\u003eDisclosure Day\u003c/em\u003e and uses it to frame a broader cybersecurity point about human behavior. The author focuses on the idea that people do not always react predictably to world-changing information or risk. In the cybersecurity context, the article says organizations know they should patch, people know they should use MFA, and leaders know they should practice incidents before they happen, but those actions still often do not occur.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central argument is that information alone is not enough to drive secure behavior. The author says real decisions are shaped by limited budgets, workloads, competing business priorities, urgency, resources, and collective will. It specifically highlights familiar controls such as segmentation, backups, MFA everywhere, and verifying whether security controls are working as intended.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter’s “one big thing” is a Cisco Talos write-up about a reverse engineering method that connects local AI agents with tools such as the VB6 disassembler vbdec. Rather than bolting AI directly into the software, vbdec exposes parsed data through a live Component Object Model interface. This allows analysts to use natural language prompts to automate work such as decompiling functions and building call graphs, making the disassembler a queryable data server instead of only a static viewer.\u003c/p\u003e\n\n\u003cp\u003eThe article says the local-agent design helps analysts create custom workflows without waiting for vendors to add features. It also emphasizes a privacy benefit because the AI agent and disassembler operate on the same local machine, meaning sensitive binaries do not leave the workstation. The author encourages tool developers to expose application data through external scripting interfaces such as COM or other inter-process communication protocols.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also summarizes several security headlines from the week. These include ShinyHunters adding the Council of Europe to its Tor-based leak site and threatening to release more than 297GB of allegedly stolen data, a credential-harvesting operation compromising more than 30,000 Fortinet devices, and Fileless Phantom Stealer targeting browser credentials. Other headlines include a FIFA World Cup internal system flaw affecting TV stream control and the FBI’s Kinetic Cyber Range, a purpose-built replica town for simulating real-world cyber attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is a Cisco Talos Threat Source newsletter that combines cybersecurity commentary, a technical highlight, weekly security headlines, Talos content recommendations, event listings, and malware telemetry. The opening commentary uses the fictional Spielberg film \u003cem\u003eDisclosure Day\u003c/em\u003e to discuss a central cybersecurity theme: people do not always react to information in predictable or rational ways. The author argues that simply giving people the right information is not enough to guarantee the right security behavior.\u003c/p\u003e\n\n\u003ch2 id=\"core-argument-information-does-not-automatically-change-behavior\"\u003eCore Argument: Information Does Not Automatically Change Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe author challenges the assumption that information directly produces better decisions. The article notes that organizations know they should patch, people know they should use MFA, and leaders know they should practice incidents before they happen. Despite that knowledge, these actions are not always completed.\u003c/p\u003e\n\n\u003cp\u003eThe article grounds this in the practical complexity of organizational life. It says decisions are influenced by limited budgets, workloads, competing business priorities, time, resources, urgency, and collective will. The author’s point is that “knowing” what to do is easier than actually doing it.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter ties this human factor back to long-standing cybersecurity controls. It references segmentation, backups, MFA everywhere, and understanding whether controls are working as intended as protections that remain important. The author argues that defenders need to acknowledge human context and work with it rather than against it.\u003c/p\u003e\n\n\u003ch2 id=\"technical-highlight-ai-assisted-reverse-engineering-with-vbdec\"\u003eTechnical Highlight: AI-Assisted Reverse Engineering with vbdec\u003c/h2\u003e\n\n\u003cp\u003eThe “one big thing” section describes a Cisco Talos approach to reverse engineering that pairs local AI agents with traditional analysis tools. The example tool is the VB6 disassembler vbdec. Instead of integrating AI directly into the software, vbdec exposes parsed data through a live Component Object Model interface.\u003c/p\u003e\n\n\u003cp\u003eThis design allows analysts to use natural language prompts to automate complex reverse engineering tasks. The article specifically names decompiling functions and building call graphs as examples. It describes the result as transforming the disassembler from a static viewer into an interactive, queryable data server.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-local-agent-model\"\u003eSignificance of the Local Agent Model\u003c/h2\u003e\n\n\u003cp\u003eThe article says this method lets analysts generate custom workflows without waiting for vendors to add new features. It also highlights privacy as a major benefit. Because the AI agent and the disassembler run on the same local machine, sensitive binaries do not need to leave the analyst’s workstation.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter presents this as a broader architectural shift for analysis tools. It says any tool that holds structured data behind a GUI can become useful for agentic automation if that data is exposed through an external scripting interface. The article advises tool developers to expose application data through COM or other inter-process communication protocols.\u003c/p\u003e\n\n\u003cp\u003eFor analysts working with VB6 binaries, the article recommends enabling remote scripting in vbdec and pointing a preferred local AI agent at the provided operator briefing. It frames the goal as letting agents handle exhaustive and repeatable work while analysts focus on actual analysis.\u003c/p\u003e\n\n\u003ch2 id=\"weekly-security-headlines-mentioned\"\u003eWeekly Security Headlines Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several security headlines from the week:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eShinyHunters claimed a Council of Europe hack and added the organization to its Tor-based leak site.\u003c/li\u003e\n\u003cli\u003eShinyHunters threatened to release more than 297GB of data allegedly stolen from the Council of Europe’s network.\u003c/li\u003e\n\u003cli\u003eA credential-harvesting and cyber espionage operation was reported as targeting Fortinet firewalls and VPN gateways.\u003c/li\u003e\n\u003cli\u003eThat Fortinet-related operation was said to have compromised more than 30,000 internet-facing devices across nearly 200 countries.\u003c/li\u003e\n\u003cli\u003eFileless Phantom Stealer was described as targeting browser credentials and using in-memory execution along with anti-analysis techniques.\u003c/li\u003e\n\u003cli\u003eA researcher reportedly found a flaw in an internal FIFA system that gave access to several internal FIFA platforms and control over the TV stream of every World Cup game.\u003c/li\u003e\n\u003cli\u003eThe FBI built the Kinetic Cyber Range, a purpose-built replica small town for simulating real-world cyber attacks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-named-entities\"\u003eAffected Parties and Named Entities\u003c/h2\u003e\n\n\u003cp\u003eThe article names several affected or relevant organizations and entities. These include Cisco Talos, vbdec, ShinyHunters, the Council of Europe, Fortinet, FIFA, and the FBI. It also names the Kinetic Cyber Range as an FBI-built environment that includes houses, a hotel, a gas station and grocery mart, a courthouse, a hospital, roads, traffic lights, and a power company.\u003c/p\u003e\n\n\u003cp\u003eFor malware-related entities, the article mentions Fileless Phantom Stealer in the headlines section. In its telemetry section, the newsletter lists prevalent malware files observed by Talos over the past week, including detections labeled Win.Worm.Coinminer::1201, W32.C0AD494457-95.SBX.TG, Win.Tool.Procpatcher::1201, and W32.Variant:MalwareXgenMisc.29d4.1201.\u003c/p\u003e\n\n\u003ch2 id=\"talos-content-and-events\"\u003eTalos Content and Events\u003c/h2\u003e\n\n\u003cp\u003eThe article points readers to additional Cisco Talos content. These include a Talos Takes episode titled “Patching in the dark: Managing unknown threats in complex environments,” a blog titled “Hypotheses, telemetry, and human judgment: Inside Cisco Talos Threat Hunting,” and a blog titled “Winning the cyber marathon with Tony Giandomenico.”\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also lists upcoming events where Talos can be found. These are Black Hat USA from Aug. 1 to Aug. 6 in Las Vegas, Nevada, and DEF CON 34 from Aug. 6 to Aug. 9 in Las Vegas, Nevada.\u003c/p\u003e\n\n\u003ch2 id=\"talos-telemetry-prevalent-malware-files\"\u003eTalos Telemetry: Prevalent Malware Files\u003c/h2\u003e\n\n\u003cp\u003eThe article includes four prevalent malware files from Talos telemetry over the past week:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSHA256 \u003ccode\u003e9f1f11a708d393e0a4109ae189bc64f1f3e312653dcf317a2bd406f18ffcc507\u003c/code\u003e, example filename \u003ccode\u003eVID001.exe\u003c/code\u003e, detected as \u003ccode\u003eWin.Worm.Coinminer::1201\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 \u003ccode\u003ec0ad494457dcd9e964378760fb6aca86a23622045bca851d8f3ab49ec33978fe\u003c/code\u003e, example filename \u003ccode\u003ef_000cd7.html\u003c/code\u003e, detected as \u003ccode\u003eW32.C0AD494457-95.SBX.TG\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 \u003ccode\u003e9896a6fcb9bb5ac1ec5297b4a65be3f647589adf7c37b45f3f7466decd6a4a7f\u003c/code\u003e, example filename \u003ccode\u003eSECOH-QAD.exe\u003c/code\u003e, detected as \u003ccode\u003eWin.Tool.Procpatcher::1201\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 \u003ccode\u003ee60ab99da105ee27ee09ea64ed8eb46d8edc92ee37f039dbc3e2bb9f587a33ba\u003c/code\u003e, example filename \u003ccode\u003eu992574.dll\u003c/code\u003e, detected as \u003ccode\u003eW32.Variant:MalwareXgenMisc.29d4.1201\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that cybersecurity outcomes depend on more than awareness or access to correct information. Human priorities, organizational constraints, and practical execution barriers shape whether known best practices are actually implemented. In parallel, the technical highlight shows how local AI agents and scripting interfaces can make reverse engineering workflows more efficient while keeping sensitive binaries on the analyst’s workstation.\u003c/p\u003e\n","keyPoints":["The article argues that having the right cybersecurity information does not necessarily lead organizations or individuals to take actions such as patching, using MFA, or practicing incident response.","The author says organizational decisions are shaped by limited budgets, workloads, competing business priorities, time, resources, urgency, and collective will.","Cisco Talos described a reverse engineering approach that pairs local AI agents with traditional tools such as the VB6 disassembler vbdec through a live Component Object Model interface.","The article says this local AI-agent approach can automate tasks such as decompiling functions and building call graphs while keeping sensitive binaries on the analyst’s workstation.","The newsletter highlights security headlines including ShinyHunters claiming a Council of Europe hack and a credential-harvesting operation compromising more than 30,000 Fortinet devices."],"insights":["Security messaging that relies only on telling people the right control to implement is likely to fail unless it also addresses practical blockers such as budget, workload, urgency, and business priorities.","The article presents local AI agents as a way to gain automation benefits in reverse engineering while avoiding the privacy risk of sending sensitive binaries to external services.","The vbdec example suggests that adding an external scripting or IPC interface to existing GUI-based analysis tools can be more useful than waiting for vendors to build AI features directly into those tools.","The author frames long-standing controls such as segmentation, backups, MFA, and control validation as still central to defense even as the threat landscape changes."],"referencedReports":[],"body":"\u003cp\u003eThe article is a Threat Source newsletter that uses the film \u003cem\u003eDisclosure Day\u003c/em\u003e to discuss how people and organizations do not always respond rationally to important information. The author argues that knowing what to do in cybersecurity, such as patching, using MFA, or practicing incident response, is different from having the time, resources, urgency, and collective will to do it. The core message is that cybersecurity work must account for human context, competing priorities, and inconsistent reactions.\u003c/p\u003e\n\n\u003cp\u003eThe main technical highlight is Cisco Talos’ description of a reverse engineering approach that pairs local AI agents with traditional analysis tools such as the VB6 disassembler vbdec. In this model, vbdec exposes parsed data through a live Component Object Model interface, allowing analysts to use natural language prompts to automate tasks like decompiling functions and building call graphs. The article says this keeps sensitive binaries on the local workstation while enabling agentic automation.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also lists major security headlines, including ShinyHunters claiming a Council of Europe hack, a credential-harvesting operation affecting more than 30,000 Fortinet devices, and Fileless Phantom Stealer targeting browser credentials. It also references a FIFA internal system flaw that allegedly gave a researcher control over World Cup TV streams and an FBI cyber range designed as a replica small town. Additional sections point readers to Talos content, upcoming events, and prevalent malware files seen in Talos telemetry.\u003c/p\u003e\n"},{"n":22,"title":"ThreatsDay Bulletin: Claude Chat Abuse, NastyC2 npm Packages, Device-Code Phishing + 25 More Stories","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/threatsday-bulletin-claude-chat-abuse.html","time":"15:27","priority":"MAY READ","score":40,"tldr":"This week’s threats show attackers increasingly abusing trusted tools and platforms—AI chat links, browser extensions, OAuth device flows, coding agents, and npm packages—to deliver malware, steal credentials, and bypass defenses. The key takeaway is that “legitimate” infrastructure and workflows can no longer be treated as inherently safe.","briefOverview":"\u003cp\u003eThis ThreatsDay Bulletin rounds up a broad set of security stories centered on attackers abusing trusted tools, platforms, and workflows. The article highlights malicious Chrome extensions, Claude shared chat abuse, macOS ClickFix lures, device-code phishing, npm supply-chain malware, and exposed infrastructure used for phishing. Its central message is that legitimate-looking services and convenience features are increasingly being used as attack paths.\u003c/p\u003e\n\n\u003cp\u003eSeveral incidents involve fileless or in-memory execution, including a macOS ClickFix chain, Phantom Stealer, OnionDrop, AsyncRAT delivery, and malicious npm payloads. The article also covers critical exposure in edge and cloud environments, including Cisco Catalyst SD-WAN CVE-2026-20127, HTTP/2 Bomb reconnaissance, and Google Cloud serviceData logging inconsistencies. Defensive responses include Anthropic disabling malicious shared chats, Cisco updating its advisory, and CISA issuing Binding Operational Directive 26-04 for risk-based patching.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also describes fraud and phishing campaigns affecting travelers, banks, Gmail users, Microsoft 365 users, gamers, and senior citizens. Reported impacts include about 758,000 users affected by deceptive Chrome extensions, over 2,000 victims funneled through malicious AI-tool download pages, and $3.5 billion in reported U.S. imposter-scam losses in 2025. The article concludes that “legitimate” infrastructure should not be treated as inherently safe.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a weekly cybersecurity roundup covering 28 security and cybercrime stories, with a recurring theme that attackers are abusing trusted platforms and ordinary workflows. It opens by noting that search traffic, AI chat links, macOS systems, cloud agents, exposed edge gear, software packages, and phishing channels were all used in harmful ways. The main takeaway is that attackers are increasingly relying on convenience features and legitimate services rather than only overtly malicious infrastructure.\u003c/p\u003e\n\n\u003cp\u003eMultiple stories involve abuse of trusted user-facing platforms. A cluster of 23 deceptive Chrome extensions reportedly overrode users’ default search engines and routed searches through monetization brokers, affecting about 758,000 users. Trend Micro reported that threat actors abused Anthropic Claude’s shared chat feature and Google Ads searches for AI developer tools to deliver MacSync credential-stealing malware, with Asia-Pacific accounting for 67.2% of confirmed victims. Bitdefender also warned of WhatsApp hotel scams using real booking details, localized messages, and convincing branding to steal payment card information.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin highlights several technical malware and evasion chains. Netskope described a fileless macOS ClickFix campaign that socially engineers victims into running a curl command, pipes AppleScript into osascript memory, and deploys a second stage called “Meow (DEBUG)” to harvest credentials, browser data, session cookies, and keychain contents. Fortra reported a bank-targeting phishing campaign delivering Phantom Stealer entirely in memory, while Cyderes analyzed OnionDrop as a multi-stage loader using DLL side-loading, custom decoding, decompression, AES-256-CBC decryption, and Windows Thread Pool callback abuse. Fortinet described AI-themed phishing attachments that ultimately inject a .NET RAT and AsyncRAT into memory.\u003c/p\u003e\n\n\u003cp\u003eSupply-chain and developer-tool risks are prominent. Panther reported three npm packages acting as droppers for the Rust-based NastyC2 post-exploitation framework, which includes more than 80 commands for credential harvesting, Active Directory attacks, container escape, cloud metadata theft, and fileless execution. Panther also reported a malicious npm package, crypto-javascript@4.2.5, that installed a supply-chain worm, a Monero miner, and an exploit for the Dirty Frag Linux kernel local privilege escalation flaw. Manifold Security flagged two high-severity local code-execution paths in the Cline AI coding agent VS Code extension, where malicious repository content could trick the agent into executing attacker-supplied shell commands.\u003c/p\u003e\n\n\u003cp\u003eThe roundup also covers vulnerability, cloud, and policy developments. Cisco updated its advisory for CVE-2026-20127 to add Catalyst SD-WAN Validator to the affected products, noting exploitation as a zero-day since 2023 by UAT-8616. Imperva and CyCognito reported reconnaissance and exposure around HTTP/2 Bomb, tracked as CVE-2026-49975. Permiso Security described inconsistent Google Cloud serviceData behavior that can affect detection coverage, incident response, and compliance, while CISA issued Binding Operational Directive 26-04 requiring federal civilian agencies to remediate high-risk vulnerabilities within accelerated timelines based on risk factors.\u003c/p\u003e\n\n\u003cp\u003eThe article also includes law enforcement, government, and fraud items. The FTC said Americans reported losing $3.5 billion to imposter scams in 2025, while the FBI warned that crypto investment scammers are using in-person cash couriers to collect money from victims. CERT Polska reported Ghostwriter phishing campaigns targeting Polish Gmail users and stealing 2FA credentials. The U.S. Department of Justice announced that Oleksii Oleksiyovych Lytvynenko pleaded guilty to wire fraud conspiracy connected to Conti ransomware, and France’s ANSSI said it would stop certifying security products lacking quantum-resistant encryption starting in 2027.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThis ThreatsDay Bulletin is a broad weekly roundup of cybersecurity developments, with a central theme that attackers are increasingly abusing trusted tools, legitimate platforms, and ordinary workflows. The article frames the week’s activity as a problem of trust: browser extensions, AI chat links, OAuth device flows, coding agents, package installs, cloud telemetry, and exposed infrastructure can all become attack surfaces.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin covers malware delivery, phishing, fraud, vulnerability exploitation, cloud detection gaps, software supply-chain threats, policy updates, and law enforcement actions. It includes stories involving Chrome extensions, macOS ClickFix lures, Claude shared chats, WhatsApp booking scams, Cisco SD-WAN, HTTP/2 Bomb, npm packages, Steam Workshop, Microsoft 365 device-code phishing, Google Cloud logging, and CISA risk-based patching.\u003c/p\u003e\n\n\u003ch1 id=\"trusted-platforms-and-workflows-abused\"\u003eTrusted platforms and workflows abused\u003c/h1\u003e\n\n\u003cp\u003eSeveral stories describe attackers using legitimate or familiar platforms to increase credibility or bypass user suspicion.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA cluster of 23 deceptive Chrome browser extensions was found overriding default search engines and routing queries through monetization middleware.\u003c/li\u003e\n\u003cli\u003eTrend Micro reported that threat actors abused Anthropic Claude’s shared chat feature to help deliver MacSync credential-stealing malware.\u003c/li\u003e\n\u003cli\u003eReversingLabs described Microsoft 365 device-code phishing that uses Microsoft’s legitimate OAuth 2.0 Device Authorization Grant flow rather than a fake login page.\u003c/li\u003e\n\u003cli\u003eKaspersky reported that malicious wallpaper packages on Steam Workshop were used to target gamers, especially in China and Russia.\u003c/li\u003e\n\u003cli\u003eHuntress found an attacker using a victim’s internet-facing terminal server as a phishing stager.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article repeatedly emphasizes that a trusted domain, marketplace, protocol, or feature does not guarantee safety.\u003c/p\u003e\n\n\u003ch1 id=\"browser-and-search-abuse\"\u003eBrowser and search abuse\u003c/h1\u003e\n\n\u003cp\u003eThe article cites MalExt research on “SearchJack” extensions, a cluster of 23 deceptive Chrome extensions affecting about 758,000 users. These extensions advertised purposes such as satellite imagery, productivity tools, news readers, and maps, while their real function was to monetize search traffic.\u003c/p\u003e\n\n\u003cp\u003eAccording to the cited research, user searches were routed through anonymous third-party brokers before results were delivered. The article notes two risks: a privacy violation from sending all searches to unknown brokers, and the possibility that operators could later inject phishing links or malicious downloads without changing extension code.\u003c/p\u003e\n\n\u003ch1 id=\"macos-clickfix-and-claude-shared-chat-campaigns\"\u003emacOS ClickFix and Claude shared chat campaigns\u003c/h1\u003e\n\n\u003cp\u003eThe bulletin describes two ClickFix-related campaigns.\u003c/p\u003e\n\n\u003ch2 id=\"fileless-macos-clickfix-chain\"\u003eFileless macOS ClickFix chain\u003c/h2\u003e\n\n\u003cp\u003eNetskope Threat Labs reported a Russian-speaking attacker targeting victims mainly in Asia, North America, and Oceania across technology, media, and business services. The campaign used ClickFix pages masquerading as downloads for a malware scanning utility.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain was described as completely fileless until persistence was established. Victims were socially engineered into running a curl command that fetched a gzip-compressed stager and piped a second-stage AppleScript directly into osascript memory. The second stage, called “Meow (DEBUG),” used a fake system dialog to harvest credentials, browser data, session cookies, and keychain contents, and could trojanize legitimate desktop cryptocurrency wallet applications.\u003c/p\u003e\n\n\u003ch2 id=\"claude-shared-chat-abuse\"\u003eClaude shared chat abuse\u003c/h2\u003e\n\n\u003cp\u003eTrend Micro reported a separate ClickFix campaign where threat actors abused Anthropic Claude’s shared chat feature. The campaign used Google Ads searches for popular AI developer tools to funnel more than 2,000 victims to malicious download pages before moving the operation onto claude.ai.\u003c/p\u003e\n\n\u003cp\u003eThe payload was MacSync credential-stealing malware. Asia-Pacific accounted for 67.2% of confirmed victims, with Taiwan representing 30.5% of total traffic. The article states that Anthropic banned the responsible accounts, disabled the malicious shared conversations, and began implementing additional abuse mitigations for shared chats.\u003c/p\u003e\n\n\u003ch1 id=\"phishing-and-fraud-campaigns\"\u003ePhishing and fraud campaigns\u003c/h1\u003e\n\n\u003cp\u003eThe article includes several phishing and fraud operations with different lures and delivery channels.\u003c/p\u003e\n\n\u003ch2 id=\"whatsapp-hotel-scams\"\u003eWhatsApp hotel scams\u003c/h2\u003e\n\n\u003cp\u003eBitdefender warned of a phishing campaign impersonating hotels, resorts, and accommodation providers in more than 10 countries. The campaign used real booking information, localized messaging, and convincing hotel branding to trick travelers into giving up payment card details.\u003c/p\u003e\n\n\u003cp\u003eVictims received WhatsApp messages containing names, stay dates, reservation details, and cancellation warnings. Observed languages included English, German, French, Spanish, Romanian, and Polish.\u003c/p\u003e\n\n\u003ch2 id=\"bank-phishing-and-phantom-stealer\"\u003eBank phishing and Phantom Stealer\u003c/h2\u003e\n\n\u003cp\u003eFortra reported an active phishing campaign targeting banks with Phantom Stealer. The phishing emails contained malicious attachments disguised as business documents.\u003c/p\u003e\n\n\u003cp\u003eOnce executed, Phantom Stealer ran entirely in memory. It targeted major web browsers, Discord, Telegram, and Steam, and was used to steal financial information, cryptocurrency assets, keystrokes, screenshots, and clipboard data.\u003c/p\u003e\n\n\u003ch2 id=\"boots-themed-phishing-staging\"\u003eBoots-themed phishing staging\u003c/h2\u003e\n\n\u003cp\u003eHuntress discovered an attack where an unknown actor used a victim’s internet-facing terminal server as a phishing stager. The recovered staging directory included Gammadyne Mailer, a project file named dracii.mmp, and six target lists containing 8,894,920 email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe campaign impersonated the U.K. pharmacy chain Boots and used a “free gift” survey lure. The payload was hosted on a compromised Bolivian government website and asked users to submit personal and financial information.\u003c/p\u003e\n\n\u003ch2 id=\"ghostwriter-gmail-phishing\"\u003eGhostwriter Gmail phishing\u003c/h2\u003e\n\n\u003cp\u003eCERT Polska reported that the Belarus-aligned Ghostwriter group was running high-intensity phishing campaigns targeting Gmail users. The messages imitated official Gmail communications and led recipients to malicious URLs that harvested credentials.\u003c/p\u003e\n\n\u003cp\u003eThe campaign could steal two-factor authentication credentials. CERT Polska observed new phishing domains almost daily, and targets included researchers, journalists, public administration employees, law enforcement employees, and people connected to those groups.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-365-device-code-phishing\"\u003eMicrosoft 365 device-code phishing\u003c/h2\u003e\n\n\u003cp\u003eReversingLabs detailed a Microsoft 365 device-code phishing campaign abusing Microsoft’s legitimate OAuth 2.0 Device Authorization Grant flow. The lure appeared to be an approval for an estimate sent from a vendor to a customer.\u003c/p\u003e\n\n\u003cp\u003eInstead of collecting passwords through a fake login page, the phishing kit persuaded victims to complete a legitimate Microsoft authentication process that authorized an attacker-controlled device.\u003c/p\u003e\n\n\u003ch2 id=\"crypto-fraud-with-cash-couriers\"\u003eCrypto fraud with cash couriers\u003c/h2\u003e\n\n\u003cp\u003eThe FBI warned that scammers are using in-person cash couriers in cryptocurrency investment scams. The victims are usually senior citizens contacted by fraudsters posing as people seeking business or romantic relationships.\u003c/p\u003e\n\n\u003cp\u003eAfter establishing a relationship, scammers direct victims to download cryptocurrency trading apps and create investment accounts. When suspicious transfers are blocked or when victims try to withdraw supposed profits, scammers use couriers to collect cash for fake investments, fines, taxes, or penalties.\u003c/p\u003e\n\n\u003ch1 id=\"supply-chain-and-developer-ecosystem-threats\"\u003eSupply-chain and developer ecosystem threats\u003c/h1\u003e\n\n\u003cp\u003eThe article places strong emphasis on npm and developer-tool compromise.\u003c/p\u003e\n\n\u003ch2 id=\"nastyc2-via-npm-packages\"\u003eNastyC2 via npm packages\u003c/h2\u003e\n\n\u003cp\u003ePanther reported that three npm packages acted as droppers for NastyC2:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003enode-ci-utils@2.1.4\u003c/li\u003e\n\u003cli\u003ewin-env-setup@3.0.6\u003c/li\u003e\n\u003cli\u003emacos-ci-utils@1.0.0\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNastyC2 is described as a previously undocumented Rust-based post-exploitation framework. It implements more than 80 commands covering credential harvesting, Active Directory attacks, container escape, cloud metadata theft, and fileless execution. Panther compared its scope to Cobalt Strike or Sliver, citing overlap in BOF/COFF execution, reflective DLL loading, process injection, Kerberoasting, DCSync, AMSI/ETW patching, SOCKS5 pivoting, and encrypted sleep.\u003c/p\u003e\n\n\u003ch2 id=\"crypto-javascript-package-with-worm-miner-and-lpe\"\u003ecrypto-javascript package with worm, miner, and LPE\u003c/h2\u003e\n\n\u003cp\u003ePanther also reported a malicious npm package named crypto-javascript@4.2.5. It installed three payloads: a supply-chain worm spreading across Rust, Cargo, Python, CMake, and npm; a Monero cryptocurrency miner; and an exploit for Dirty Frag, a Linux kernel local privilege escalation flaw.\u003c/p\u003e\n\n\u003cp\u003eAll three payloads ran from memory and left no named file on disk. The embedded kernel exploit carried a GCC build timestamp of 2026-04-30, seven days before public disclosure of Dirty Frag, though the article notes that ELF timestamps can be forged.\u003c/p\u003e\n\n\u003ch2 id=\"cline-ai-coding-agent-code-execution-bypass\"\u003eCline AI coding agent code-execution bypass\u003c/h2\u003e\n\n\u003cp\u003eManifold Security flagged two high-severity local code-execution paths in Cline, an AI coding agent VS Code extension with more than 4.3 million installs. A malicious repository could trick the agent into executing attacker-supplied shell commands under the developer’s account.\u003c/p\u003e\n\n\u003cp\u003eThe article says Cline’s Approve/Deny dialog and “Safe Commands” auto-approve filter failed in the described cases. Clicking a URL preview tile could run an OS-level command without being gated by the approval dialog, and the “Safe Commands” filter asked the manipulated AI agent whether its own command was safe. Cline plans to release fixes in an upcoming release, although the findings were classified as out of scope.\u003c/p\u003e\n\n\u003ch1 id=\"malware-loaders-stealers-and-rats\"\u003eMalware loaders, stealers, and RATs\u003c/h1\u003e\n\n\u003cp\u003eThe bulletin describes multiple named malware families and delivery chains.\u003c/p\u003e\n\n\u003ch2 id=\"oniondrop\"\u003eOnionDrop\u003c/h2\u003e\n\n\u003cp\u003eCyderes analyzed OnionDrop, a multi-stage loader used to deliver malware families such as LegionLoader, CGrabber, and Vidar Stealer. The chain begins with a ZIP archive and a legitimate Adobe-signed executable used for DLL side-loading.\u003c/p\u003e\n\n\u003cp\u003eThe malicious DLL then performs custom byte-pair decoding, Xpress Huffman decompression through RtlDecompressBufferEx, AES-256-CBC decryption with rotating key material, and final shellcode execution through TpPostWork callback abuse inside the Windows Thread Pool. Cyderes described it as a professionally engineered evasion framework.\u003c/p\u003e\n\n\u003ch2 id=\"onyxc2\"\u003eOnyxC2\u003c/h2\u003e\n\n\u003cp\u003eBlackFog described OnyxC2 as a new information stealer marketed on underground forums. The service provides a web panel and payload builder, with refunds for paying users if a build gets caught.\u003c/p\u003e\n\n\u003cp\u003eFor \u003cspan class=\"math inline\"\u003e\\(250 per month, operators get a kit that harvests browser credentials, password managers, 2FA data, and crypto wallets across about 210 applications and extensions. A \\)\u003c/span\u003e500-per-month premium subscription is also available. OnyxC2 includes HVNC over a web browser, LSASS dumping, RunPE, a reverse SOCKS5 proxy, screenshot capture, keylogging, a file manager, a reverse shell over HTTP, and a built-in TOR tunnel.\u003c/p\u003e\n\n\u003ch2 id=\"asyncrat-campaign-using-ai-lures\"\u003eAsyncRAT campaign using AI lures\u003c/h2\u003e\n\n\u003cp\u003eFortinet FortiGuard Labs reported a phishing campaign using malicious files disguised as AI-related documents. The attachments arrived as ZIP archives containing Windows Shortcut files.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain used multiple staged scripts and AutoHotkey-based loaders. It reflectively injected a .NET remote access trojan named clay_Client and AsyncRAT into memory for command-and-control communication and follow-on execution.\u003c/p\u003e\n\n\u003ch1 id=\"vulnerabilities-edge-systems-and-exposure\"\u003eVulnerabilities, edge systems, and exposure\u003c/h1\u003e\n\n\u003ch2 id=\"cisco-catalyst-sd-wan-cve-2026-20127\"\u003eCisco Catalyst SD-WAN CVE-2026-20127\u003c/h2\u003e\n\n\u003cp\u003eCisco updated its February 2026 advisory for CVE-2026-20127. The critical privilege escalation flaw affects Catalyst SD-WAN Controller and Catalyst SD-WAN Manager, and Cisco added Catalyst SD-WAN Validator to the affected products.\u003c/p\u003e\n\n\u003cp\u003eThe flaw has reportedly been exploited as a zero-day since 2023 by UAT-8616. It allows an unauthenticated remote attacker to bypass authentication and gain administrative privileges on an affected system by sending a crafted request.\u003c/p\u003e\n\n\u003ch2 id=\"http-2-bomb-cve-2026-49975\"\u003eHTTP/2 Bomb CVE-2026-49975\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses HTTP/2 Bomb, formally tracked as CVE-2026-49975. Calif used OpenAI’s Codex to discover the exploit, which chains two bandwidth-saving features to amplify junk traffic by orders of magnitude.\u003c/p\u003e\n\n\u003cp\u003eImperva reported that attackers were using specialized tools to map vulnerable servers, and a working proof of concept is publicly available. CyCognito reported observed exposure led by communication services at 24.9% of assets, information technology at 18.0%, and healthcare at 17.0%.\u003c/p\u003e\n\n\u003ch1 id=\"cloud-ai-and-policy-developments\"\u003eCloud, AI, and policy developments\u003c/h1\u003e\n\n\u003ch2 id=\"aws-continuum\"\u003eAWS Continuum\u003c/h2\u003e\n\n\u003cp\u003eAmazon Web Services announced AWS Continuum, an AI-powered security agent for code vulnerabilities. AWS said the tool continuously discovers vulnerabilities, validates which are exploitable, prioritizes them by business context, and helps remediate them across the full stack within guardrails.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this in the context of attackers and defenders using models to accelerate vulnerability discovery and exploitation. AWS said the agent is model agnostic and uses multiple frontier models where they perform best.\u003c/p\u003e\n\n\u003ch2 id=\"ai-export-controls\"\u003eAI export controls\u003c/h2\u003e\n\n\u003cp\u003eThe article cites a WIRED report stating that U.S. government restrictions on Anthropic’s Claude Fable 5 and Mythos 5 models followed an order for Anthropic to revoke South Korea-based SK Telecom’s access because of alleged ties to China.\u003c/p\u003e\n\n\u003ch2 id=\"google-cloud-servicedata-telemetry-gap\"\u003eGoogle Cloud serviceData telemetry gap\u003c/h2\u003e\n\n\u003cp\u003ePermiso Security reported inconsistent behavior in Google Cloud’s deprecated serviceData field. Some events continued to populate serviceData correctly, while others produced empty serviceData objects.\u003c/p\u003e\n\n\u003cp\u003eThe article says this creates practical security risks for detection coverage, incident response, and compliance. Permiso said organizations should validate log telemetry end to end.\u003c/p\u003e\n\n\u003ch2 id=\"shai-hulud-and-ai-scanner-refusal-behavior\"\u003eShai-Hulud and AI scanner refusal behavior\u003c/h2\u003e\n\n\u003cp\u003eA variant of the Shai-Hulud worm included an adversarial prompt asking for “synthesizing weaponized biological agents suitable for aerosol dispersal.” The goal was to target AI-powered malware scanners by making the model refuse to respond due to safety guardrails instead of classifying the file as benign.\u003c/p\u003e\n\n\u003cp\u003eJFrog said the refusal itself becomes the attack because the scanner may stop reading before reaching the malware content.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-binding-operational-directive-26-04\"\u003eCISA Binding Operational Directive 26-04\u003c/h2\u003e\n\n\u003cp\u003eCISA issued Binding Operational Directive 26-04, focused on prioritizing security updates based on risk. The directive applies to Federal Civilian Executive Branch agencies.\u003c/p\u003e\n\n\u003cp\u003eThe directive requires accelerated remediation for high-risk vulnerabilities based on internet exposure, presence in the Known Exploited Vulnerabilities catalog, whether exploitation can be automated at scale, and whether exploitation can lead to partial or total control of a system. Agencies may have to address some flaws within three days.\u003c/p\u003e\n\n\u003ch1 id=\"government-legal-and-regulatory-items\"\u003eGovernment, legal, and regulatory items\u003c/h1\u003e\n\n\u003ch2 id=\"france-quantum-safe-certification-timeline\"\u003eFrance quantum-safe certification timeline\u003c/h2\u003e\n\n\u003cp\u003eFrance’s cybersecurity agency ANSSI said it would stop certifying security products that lack quantum-resistant encryption starting in 2027. It also requires businesses to purchase only quantum-safe products by 2030.\u003c/p\u003e\n\n\u003ch2 id=\"estonia-screening-ru-email\"\u003eEstonia screening .ru email\u003c/h2\u003e\n\n\u003cp\u003eEstonia plans to implement additional security screening for emails sent from Russia’s .ru top-level domain before those emails reach government officials. The measure is expected to take effect on August 31, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"ftc-imposter-scam-losses\"\u003eFTC imposter scam losses\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Federal Trade Commission reported that Americans lost \u003cspan class=\"math inline\"\u003e\\(3.5 billion to imposter scams in 2025. Reported losses nearly tripled since 2020, and total reported fraud losses across all types reached about \\)\u003c/span\u003e16 billion in 2025.\u003c/p\u003e\n\n\u003cp\u003eThe FTC said some of the costliest scams start with fake security alerts, often from a bank, and convince people to move money to “protect” it.\u003c/p\u003e\n\n\u003ch2 id=\"conti-guilty-plea\"\u003eConti guilty plea\u003c/h2\u003e\n\n\u003cp\u003eOleksii Oleksiyovych Lytvynenko, a Ukrainian national, pleaded guilty to wire fraud conspiracy connected to Conti ransomware. The U.S. Department of Justice said he conspired with others to deploy Conti ransomware, extort victims, and steal data.\u003c/p\u003e\n\n\u003cp\u003eLytvynenko admitted to joining the Conti conspiracy by about September 2021 and possessing data stolen from eight U.S. and four overseas victims. He also admitted to being directed to work on coding a loader. He was extradited to the United States in October 2025, is scheduled for sentencing on September 10, 2026, and faces a maximum penalty of 20 years in prison.\u003c/p\u003e\n\n\u003ch1 id=\"defensive-theme\"\u003eDefensive theme\u003c/h1\u003e\n\n\u003cp\u003eThe article’s concluding message is that “trust is the attack surface now.” It states that defenders should watch tools users trust, audit agents like accounts, treat packages like code execution, and treat links from trusted platforms as links rather than proof of safety.\u003c/p\u003e\n\n\u003cp\u003eAcross the roundup, the common pattern is not that attackers always break systems directly. Instead, the stories show attackers using browser extensions, AI chat sharing, OAuth flows, coding agents, package managers, cloud helpers, and legitimate infrastructure as paths into users and organizations.\u003c/p\u003e\n","keyPoints":["A cluster of 23 deceptive Chrome extensions was found overriding users’ default search engines
