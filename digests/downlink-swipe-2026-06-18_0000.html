03cli\u003eNGINX Gateway Fabric 1.3.0 through 1.6.2.\u003c/li\u003e\n\u003cli\u003eNGINX Instance Manager 2.17.0 through 2.22.0.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 5.0.0 through 5.5.0.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 4.0.0 through 4.0.1.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 3.5.0 through 3.7.2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eF5’s listed mitigation for CVE-2026-42530 is to disable HTTP/3.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-42055\"\u003eCVE-2026-42055\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-42055 is described as a heap-based buffer overflow vulnerability in the ngx_http_proxy_v2_module and ngx_http_grpc_module modules. The article says it can be triggered by a remote unauthenticated attacker under specific HTTP/2 proxying conditions.\u003c/p\u003e\n\n\u003cp\u003eThe required conditions listed in the article are that the proxy_http_version is set to 2 or grpc_pass directives are used to proxy HTTP/2 traffic, the ignore_invalid_headers directive is set to off, and the large_client_header_buffers directive size is larger than 2 MB. The article states that the flaw could allow code execution on systems with Address Space Layout Randomization disabled or when the attacker can bypass ASLR.\u003c/p\u003e\n\n\u003cp\u003eAffected products and versions listed for CVE-2026-42055 include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX Plus 37.0.0 through 37.0.1, fixed in 37.0.2.1.\u003c/li\u003e\n\u003cli\u003eNGINX Plus R33 through R36, fixed in R36 P6.\u003c/li\u003e\n\u003cli\u003eNGINX Open Source 1.31.1, fixed in 1.31.2.\u003c/li\u003e\n\u003cli\u003eNGINX Open Source 1.30.0 through 1.30.2, fixed in 1.30.3.\u003c/li\u003e\n\u003cli\u003eNGINX Instance Manager 2.17.0 through 2.22.0.\u003c/li\u003e\n\u003cli\u003eF5 WAF for NGINX 5.9.0 through 5.13.1.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect WAF 5.2.0 through 5.8.0.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect WAF 4.10.0 through 4.16.0.\u003c/li\u003e\n\u003cli\u003eF5 DoS for NGINX 4.9.0.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect DoS 4.3.0 through 4.7.0.\u003c/li\u003e\n\u003cli\u003eNGINX Gateway Fabric 2.0.0 through 2.6.3, fixed in 2.6.4.\u003c/li\u003e\n\u003cli\u003eNGINX Gateway Fabric 1.3.0 through 1.6.2.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 5.0.0 through 5.5.0.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 4.0.0 through 4.0.1.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 3.5.0 through 3.7.2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eF5’s listed mitigations for CVE-2026-42055 are to remove the ignore_invalid_headers off directive from the configuration or reduce the large_client_header_buffers directive size below 2 MB.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-exploitation-conditions\"\u003eImpact and Exploitation Conditions\u003c/h2\u003e\n\n\u003cp\u003eBoth vulnerabilities could allow code execution, but the article ties that outcome to systems where ASLR is disabled or where an attacker can bypass ASLR. Both flaws are also described as remotely triggerable by unauthenticated attackers, but only when specific NGINX modules and configurations are in use.\u003c/p\u003e\n\n\u003cp\u003eFor CVE-2026-42530, the relevant exposure is tied to the HTTP/3 QUIC module and a specially crafted HTTP/3 session. For CVE-2026-42055, the relevant exposure is tied to HTTP/2 proxying through proxy_http_version 2 or grpc_pass, along with particular header-processing configuration values.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eF5 released patched versions for affected NGINX Open Source versions and other affected product lines. The article specifically identifies fixes including NGINX Open Source 1.31.2, NGINX Open Source 1.30.3 for CVE-2026-42055, NGINX Plus 37.0.2.1, NGINX Plus R36 P6, and NGINX Gateway Fabric 2.6.4.\u003c/p\u003e\n\n\u003cp\u003eWhere patching is not immediately possible, F5 outlined configuration-based mitigations. Disabling HTTP/3 is the mitigation listed for CVE-2026-42530. For CVE-2026-42055, F5 recommended either removing the ignore_invalid_headers off directive or reducing large_client_header_buffers below 2 MB.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status-and-related-context\"\u003eExploitation Status and Related Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that F5 made no mention of CVE-2026-42530 or CVE-2026-42055 being exploited in the wild. It also notes that security flaws in F5 products have been repeatedly exploited by bad actors.\u003c/p\u003e\n\n\u003cp\u003eAs recent context, the article cites another critical security defect in NGINX Plus and NGINX Open Source, CVE-2026-42945, also called NGINX Rift. That vulnerability had a CVSS score of 9.2 and reportedly came under active exploitation within days after public disclosure the previous month.\u003c/p\u003e\n","keyPoints":["F5 released security updates for two critical NGINX Open Source flaws that could be exploited to achieve code execution on affected systems.","CVE-2026-42530 is a use-after-free flaw in ngx_http_v3_module that can be triggered by a remote unauthenticated attacker when NGINX Open Source is configured to use the HTTP/3 QUIC module.","CVE-2026-42055 is a heap-based buffer overflow in ngx_http_proxy_v2_module and ngx_http_grpc_module that can be triggered under specific HTTP/2 proxying configurations involving proxy_http_version 2 or grpc_pass, ignore_invalid_headers off, and large_client_header_buffers larger than 2 MB.","F5 fixed the flaws in versions including NGINX Open Source 1.31.2, NGINX Open Source 1.30.3 for CVE-2026-42055, NGINX Gateway Fabric 2.6.4, NGINX Plus 37.0.2.1, and NGINX Plus R36 P6.","F5 recommended disabling HTTP/3 for CVE-2026-42530 and removing the ignore_invalid_headers off directive or reducing large_client_header_buffers below 2 MB for CVE-2026-42055."],"insights":["Both flaws are rated critical but require specific deployment conditions for code execution, including ASLR being disabled or bypassed and particular HTTP/3 or HTTP/2 proxy configurations being enabled.","CVE-2026-42055 affects a broad set of F5 NGINX-related products beyond NGINX Open Source, including NGINX Plus, WAF, DoS, Gateway Fabric, Instance Manager, and Ingress Controller.","F5’s mitigations are configuration-based and immediately actionable: disabling HTTP/3 addresses CVE-2026-42530, while changing header-handling settings can mitigate CVE-2026-42055.","The article notes that F5 did not report active exploitation of these two flaws, but a separate critical NGINX flaw, CVE-2026-42945, was exploited within days of disclosure the previous month."],"referencedReports":[{"title":"CVE-2026-42530","url":"https://my.f5.com/manage/s/article/K000161616","publisher":"F5","context":"The article links to F5's advisory for affected versions and fixes for CVE-2026-42530.","category":"","primary":false},{"title":"CVE-2026-42055","url":"https://my.f5.com/manage/s/article/K000161584","publisher":"F5","context":"The article links to F5's advisory for affected versions and fixes for CVE-2026-42055.","category":"","primary":false}],"body":"\u003cp\u003eF5 released security updates for two critical security flaws in NGINX Open Source that could be exploited to achieve code execution on affected systems. The vulnerabilities are CVE-2026-42530 and CVE-2026-42055, both carrying a CVSS v4 score of 9.2. The flaws affect specific NGINX modules and configurations involving HTTP/3 QUIC and HTTP/2 proxying.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-42530 is a use-after-free issue in ngx_http_v3_module that can be triggered by a remote unauthenticated attacker when NGINX Open Source uses the HTTP/3 QUIC module. CVE-2026-42055 is a heap-based buffer overflow in ngx_http_proxy_v2_module and ngx_http_grpc_module under specific HTTP/2 proxying and header configuration conditions. F5 said the flaws could lead to code execution on systems with ASLR disabled or where ASLR can be bypassed.\u003c/p\u003e\n\n\u003cp\u003eF5 listed fixed versions across NGINX Open Source, NGINX Plus, NGINX Gateway Fabric, and other NGINX-related products. As mitigations, F5 recommended disabling HTTP/3 for CVE-2026-42530 and changing configuration settings tied to CVE-2026-42055. The article says F5 did not mention exploitation of these vulnerabilities in the wild.\u003c/p\u003e\n"},{"n":1,"title":"SmartApeSG Launches Okendo Reviews Supply Chain Attack","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/smartapesg-launches-okendo-reviews-supply-chain-attack","time":"14:04","priority":"MUST READ","score":92,"tldr":"Zscaler ThreatLabz found that the widely used Okendo Reviews widget had been compromised to inject SmartApeSG JavaScript across e-commerce sites, creating a supply-chain exposure for potentially high-traffic storefronts. The malicious script used filtering and obfuscation to load later-stage ClickFix lures that can lead to RATs or information stealers such as NetSupport, Remcos, and StealC.","briefOverview":"\u003cp\u003eZscaler ThreatLabz identified unusually high SmartApeSG activity on May 14, 2026, involving malicious JavaScript embedded in the legitimate Okendo Reviews widget. Okendo Reviews is described as a popular customer review platform used by more than 18,000 brands, which made the compromise a software supply-chain style exposure across websites using the widget. The widget is commonly deployed on high-visibility e-commerce pages such as storefront homepages, product information pages, and review submissions.\u003c/p\u003e\n\n\u003cp\u003eThe injected JavaScript acted as a staged loader rather than executing all activity immediately. It used localStorage to limit repeat execution, User-Agent checks to bias execution toward desktop environments, obfuscation to conceal next-stage infrastructure, and staged retrieval to load more content only after certain conditions were met. The article states that later stages used ClickFix-style social engineering lures and that SmartApeSG activity commonly leads to RATs such as NetSupport and Remcos, or information stealers such as StealC.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz observed the widget on mid-sized stores and large e-commerce sites, including affected sites with estimated monthly traffic ranging from about 150,000 to several million visits. One impacted popular U.S. retail brand website was estimated at approximately 7 million monthly visits, though the article notes traffic estimates do not equal confirmed exposure or infection. ThreatLabz reported the incident to Okendo, which confirmed awareness of the security incident and restored the widget script to a clean state.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn May 14, 2026, Zscaler ThreatLabz identified a supply chain attack involving the Okendo Reviews widget. The team found malicious JavaScript embedded in the legitimate reviews widget, which is used by more than 18,000 brands. Because the widget is widely deployed, the compromise created downstream exposure across websites that loaded it. The article frames this as a software supply-chain style incident affecting high-visibility e-commerce pages.\u003c/p\u003e\n\n\u003cp\u003eThe activity is attributed in the article to SmartApeSG, also tracked as ZPHP or HANEYMANEY. ThreatLabz states that SmartApeSG has been associated in prior campaigns with malware families including NetSupport RAT, Remcos RAT, StealC, and Sectop RAT. In this incident, the injected JavaScript behaved as a staged loader focused on control, reconstruction, and retrieval. The article says this approach reduced script visibility and gave the operator more flexibility.\u003c/p\u003e\n\n\u003cp\u003eThe loader used localStorage to track whether it had already run and suppress repeated execution. It also applied User-Agent filtering that, in the analyzed samples, biased execution toward desktop environments and excluded mobile devices. ThreatLabz connects this filtering to later-stage ClickFix workflows, which are described as being optimized for desktop interaction patterns and follow-on tooling. The script reconstructed next-stage delivery paths only after its environment checks completed.\u003c/p\u003e\n\n\u003cp\u003eThe next-stage infrastructure was hidden through encoded fragments rather than stored in cleartext. During execution, the script used an XOR-based decoding routine to rebuild the hidden path, generated a randomized 8-character token, and inserted a new script element into the page to retrieve follow-on content. The broader SmartApeSG infection chain described in the article typically displays fake CAPTCHA or verification prompts, instructs users to run copied commands via the Windows Run menu, retrieves PowerShell or HTA downloaders, and deploys remote access tools or information stealers.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz observed the Okendo Reviews widget embedded in both mid-sized stores and large e-commerce sites during the observation window. Based on estimated traffic, affected sites ranged from about 150,000 to several million monthly visits, and one popular U.S. retail brand website with about 7 million monthly visits was impacted. Zscaler Cloud telemetry showed a sharp spike on May 14, with nearly 15,000 blocks in a single day. ThreatLabz reported the incident to Okendo, and Okendo confirmed it was aware of the incident and restored the widget script to a clean state.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz reported that on May 14, 2026, it identified unusually high activity associated with the threat actor SmartApeSG to deploy malware. During its examination, ThreatLabz found malicious JavaScript code embedded in the legitimate Okendo Reviews widget. The article describes Okendo Reviews as a popular customer review platform used by more than 18,000 brands.\u003c/p\u003e\n\n\u003cp\u003eBecause the Okendo Reviews widget is widely deployed, the compromise created downstream exposure across websites that used the widget. The article notes that the widget is typically present on high-visibility e-commerce pages, including storefront homepages, product information pages, and review submissions. ThreatLabz characterizes the incident as a software supply-chain style attack enabled by the compromise of a single vendor component.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz reported the incident to Okendo. According to the article, Okendo confirmed that it was aware of the security incident and restored the widget script to a clean state.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-and-malware-context\"\u003eThreat Actor and Malware Context\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the injected JavaScript activity to SmartApeSG. It also notes that SmartApeSG is tracked as ZPHP or HANEYMANEY. ThreatLabz states that SmartApeSG has previously been associated with campaigns that led to deployment of malware families including NetSupport RAT, Remcos RAT, StealC, and Sectop RAT.\u003c/p\u003e\n\n\u003cp\u003eIn this specific incident, the injected JavaScript did not immediately attempt to execute every action. Instead, it behaved as a staged loader focused on control, reconstruction, and retrieval. The article states that this reduced the visibility of the script and gave the operator more flexibility.\u003c/p\u003e\n\n\u003ch2 id=\"loader-behavior\"\u003eLoader Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe malicious JavaScript used execution controls and filtering before attempting follow-on retrieval. ThreatLabz describes several notable behaviors:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe script used browser-side state tracking through localStorage.\u003c/li\u003e\n\u003cli\u003eOn first execution, it wrote a timestamp marker.\u003c/li\u003e\n\u003cli\u003eSubsequent visits could be short-circuited based on the stored value.\u003c/li\u003e\n\u003cli\u003eThe article says this reduced noisy repeat behavior and lowered the chance of casual observation during testing.\u003c/li\u003e\n\u003cli\u003eThe script also applied User-Agent filtering.\u003c/li\u003e\n\u003cli\u003eIn the samples analyzed, the checks biased execution toward desktop environments and excluded mobile devices.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThreatLabz states that the desktop bias is consistent with later-stage ClickFix workflows. The article describes those workflows as typically optimized for desktop interaction patterns and follow-on tooling.\u003c/p\u003e\n\n\u003ch2 id=\"obfuscation-and-next-stage-retrieval\"\u003eObfuscation and Next-Stage Retrieval\u003c/h2\u003e\n\n\u003cp\u003eAfter the environment checks completed, the loader reconstructed the next-stage delivery path. The infrastructure was not stored in cleartext. Instead, the destination was split into encoded fragments designed to complicate static inspection and evade basic signature approaches.\u003c/p\u003e\n\n\u003cp\u003eDuring execution, the script applied an XOR-based decoding routine to rebuild the hidden path. It also generated a randomized 8-character token. The loader then dynamically inserted a new script element into the page to retrieve follow-on content.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the observed structure and execution model aligned with previously documented SmartApeSG campaigns. It describes the typical follow-on SmartApeSG infection chain as including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisplaying a fake CAPTCHA or verification prompt.\u003c/li\u003e\n\u003cli\u003ePresenting instructions for the user to run copied commands via the Windows Run menu.\u003c/li\u003e\n\u003cli\u003eRetrieving PowerShell or HTML Application downloaders.\u003c/li\u003e\n\u003cli\u003eDeploying remote access tools or information stealers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"estimated-reach-and-observed-activity\"\u003eEstimated Reach and Observed Activity\u003c/h2\u003e\n\n\u003cp\u003eThreatLabz observed the Okendo Reviews widget embedded in both mid-sized stores and large e-commerce sites during the observation window. Based on estimated traffic, the affected sites ranged from about 150,000 monthly visits to several million monthly visits. The article states that one impacted popular U.S. retail brand website received approximately 7 million monthly visits.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that these traffic estimates do not equate to confirmed end-user exposure or infection. However, it notes that the widget runs in the browser and is loaded on high-traffic pages, suggesting the compromise may have reached a large number of visitors.\u003c/p\u003e\n\n\u003cp\u003eZscaler Cloud telemetry showed a sharp spike on May 14. The article states that Zscaler observed nearly 15,000 blocks in a single day.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-detection\"\u003eResponse and Detection\u003c/h2\u003e\n\n\u003cp\u003eThreatLabz reported the incident to Okendo, and Okendo restored the widget script to a clean state. The article lists Zscaler coverage for related indicators under the threat name JS.Injection.SmartApeSG.\u003c/p\u003e\n\n\u003cp\u003eThe article also provides indicators of compromise, including the Okendo Reviews widget script location and two SmartApeSG URLs. The included indicators are presented in defanged form.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central takeaway is that a compromise of the widely deployed Okendo Reviews widget enabled malicious SmartApeSG JavaScript to run through legitimate e-commerce sites. The injected loader used repeat-execution suppression, desktop-oriented filtering, obfuscation, and staged retrieval before enabling ClickFix-style social engineering that could lead to remote access tools or information stealers.\u003c/p\u003e\n","keyPoints":["On May 14, 2026, Zscaler ThreatLabz identified a supply chain attack involving malicious JavaScript embedded in the Okendo Reviews widget, a customer review platform used by more than 18,000 brands.","The injected SmartApeSG JavaScript used localStorage-based execution control, User-Agent filtering, obfuscation, and staged retrieval to load additional content only under specific conditions.","The loader reconstructed next-stage infrastructure from XOR-obfuscated fragments, generated a randomized 8-character token, and dynamically inserted a new script element into the page.","The SmartApeSG infection chain commonly displays fake CAPTCHA or verification prompts, instructs users to run copied commands via the Windows Run menu, and retrieves PowerShell or HTA downloaders.","ThreatLabz reported the incident to Okendo, and Okendo confirmed it was aware of the security incident and restored the widget script to a clean state."],"insights":["The loader’s use of localStorage to suppress repeat execution means a single test visit to an affected page may not reliably reproduce the malicious behavior on later visits from the same browser.","The User-Agent filtering toward desktop environments aligns the compromise with ClickFix workflows that rely on Windows Run menu interaction, making desktop visitors the more relevant population for exposure assessment.","Because the compromised widget was commonly embedded on storefront homepages, product pages, and review submission pages, defenders should prioritize reviewing high-traffic e-commerce pages that load third-party customer review scripts.","The article cautions that estimated site traffic does not equal confirmed infection, so incident scoping should distinguish between pages that loaded the widget and users who actually reached later SmartApeSG stages."],"referencedReports":[],"body":"\u003cp\u003eZscaler ThreatLabz identified unusually high SmartApeSG activity on May 14, 2026, involving malicious JavaScript embedded in the legitimate Okendo Reviews widget. Okendo Reviews is described as a popular customer review platform used by more than 18,000 brands, which made the compromise a software supply-chain style exposure across websites using the widget. The widget is commonly deployed on high-visibility e-commerce pages such as storefront homepages, product information pages, and review submissions.\u003c/p\u003e\n\n\u003cp\u003eThe injected JavaScript acted as a staged loader rather than executing all activity immediately. It used localStorage to limit repeat execution, User-Agent checks to bias execution toward desktop environments, obfuscation to conceal next-stage infrastructure, and staged retrieval to load more content only after certain conditions were met. The article states that later stages used ClickFix-style social engineering lures and that SmartApeSG activity commonly leads to RATs such as NetSupport and Remcos, or information stealers such as StealC.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz observed the widget on mid-sized stores and large e-commerce sites, including affected sites with estimated monthly traffic ranging from about 150,000 to several million visits. One impacted popular U.S. retail brand website was estimated at approximately 7 million monthly visits, though the article notes traffic estimates do not equal confirmed exposure or infection. ThreatLabz reported the incident to Okendo, which confirmed awareness of the security incident and restored the widget script to a clean state.\u003c/p\u003e\n"},{"n":15,"title":"Police cleans nearly 15,000 SocGholish-infected sites tied to Evil Corp","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/law-enforcement-nukes-socgholish-malware-from-nearly-15-000-sites/","time":"13:25","priority":"SHOULD READ","score":88,"tldr":"International law enforcement cleaned nearly 15,000 SocGholish-infected WordPress sites and took down 106 servers and domains linked to the Evil Corp cybercrime group. The action, part of Operation Endgame, disrupts a major malware delivery chain used to compromise visitors through fake browser updates.","briefOverview":"\u003cp\u003eInternational law enforcement agencies cleaned nearly 15,000 malware-infected WordPress websites and took down more than 100 servers linked to the SocGholish botnet and the Evil Corp Russian cybercrime group. The action was part of Operation Endgame, a broader law enforcement effort targeting cybercrime infrastructure. Authorities from the Netherlands, Canada, the United States, and Germany participated, with support from Europol and Eurojust.\u003c/p\u003e\n\n\u003cp\u003eThe Dutch police removed SocGholish malware and backdoors from 14,971 compromised WordPress sites, while 106 servers and domains were taken offline. Website owners were advised to change credentials, enable multi-factor authentication, remove unknown WordPress accounts, and keep their sites updated. Dutch police said the action deprives cybercriminals of access to infected systems and reduces the risk that those systems are used in attacks on critical infrastructure and essential societal processes.\u003c/p\u003e\n\n\u003cp\u003eSocGholish, also tracked as FakeUpdates and GhoLoader, is a JavaScript-based malware downloader used since at least 2017. It hijacks legitimate websites, especially WordPress sites, and tricks visitors into installing malicious payloads disguised as fake browser updates. The malware has been linked to Evil Corp and has been used to deploy malware families including Dridex, Doppelpaymer, Empire, Koadic, Chtonic, and Azorult.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eInternational law enforcement agencies cleaned nearly 15,000 SocGholish-infected WordPress websites and took down more than 100 servers and domains tied to the SocGholish botnet and the Evil Corp Russian cybercrime group. The action was part of Operation Endgame, a major law enforcement operation targeting cybercrime. The article says this phase was aimed at disrupting a key infection chain linked to Evil Corp.\u003c/p\u003e\n\n\u003cp\u003eAuthorities from the Netherlands, Canada, the United States, and Germany participated in the joint action, with support from Europol and Eurojust. The Netherlands\u0026rsquo; National High Tech Crime Unit, the Royal Canadian Mounted Police, the FBI, and Germany\u0026rsquo;s BKA were named as participating agencies. In total, 14,971 compromised WordPress websites were cleaned and 106 servers and domains were taken offline.\u003c/p\u003e\n\n\u003cp\u003eDutch police removed malware and backdoors from the infected websites and issued follow-up guidance to site owners. They advised owners to change credentials, enable multi-factor authentication, delete unknown WordPress accounts, and keep WordPress sites up to date. Maikel Rollman of the Netherlands\u0026rsquo; National High Tech Crime Unit said the actions deprive cybercriminals of access to infected systems and help prevent further damage worldwide.\u003c/p\u003e\n\n\u003cp\u003eSocGholish is a JavaScript-based malware downloader also tracked as FakeUpdates and GhoLoader. It has been used in attacks since at least 2017 by hijacking legitimate websites, primarily WordPress sites, and tricking visitors into downloading malicious payloads often disguised as fake browser updates. When a user installs the malicious update, the malware opens a connection to the attackers and gives them access to the infected system.\u003c/p\u003e\n\n\u003cp\u003eThe article says SocGholish has previously been linked to Evil Corp, a Russian cybercrime gang active since 2007. Evil Corp has been associated with the Zeus and Dridex malware families and with ransomware operations including WastedLocker, Hades, Macaw Locker, and Phoenix CryptoLocker. SocGholish has also been used to deploy other malware families including Dridex, Doppelpaymer, Empire, Koadic, Chtonic, and Azorult.\u003c/p\u003e\n\n\u003cp\u003eThe operation follows earlier Operation Endgame actions against other malware and cybercrime infrastructure. In November, law enforcement took down more than 1,000 servers used by Rhadamanthys, VenomRAT, and Elysium botnet malware operations. Previous Operation Endgame actions also targeted ransomware infrastructure, Smokeloader botnet customers and servers, the AVCheck site, and malware operations including DanaBot, IcedID, Pikabot, Trickbot, Smokeloader, Bumblebee, and SystemBC.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eInternational law enforcement agencies cleaned nearly 15,000 SocGholish-infected WordPress websites and took down more than 100 servers and domains linked to the SocGholish botnet and the Evil Corp Russian cybercrime group. The joint action was part of Operation Endgame, a major law enforcement operation targeting cybercrime. The article says this phase of Operation Endgame was aimed at disrupting a key infection chain linked to Evil Corp.\u003c/p\u003e\n\n\u003cp\u003eThe operation involved authorities from multiple countries and was supported by Europol and Eurojust. Participating agencies included the Netherlands\u0026rsquo; National High Tech Crime Unit, Canada\u0026rsquo;s Royal Canadian Mounted Police, the United States\u0026rsquo; FBI, and Germany\u0026rsquo;s BKA. The action resulted in 14,971 compromised WordPress websites being cleaned and 106 servers and domains being taken offline.\u003c/p\u003e\n\n\u003ch2 id=\"response-actions-and-guidance\"\u003eResponse actions and guidance\u003c/h2\u003e\n\n\u003cp\u003eDutch police removed SocGholish malware and backdoors from infected WordPress websites. In addition to cleaning the sites, they advised website owners to take several defensive steps after the operation.\u003c/p\u003e\n\n\u003cp\u003eThe recommended steps included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChanging credentials.\u003c/li\u003e\n\u003cli\u003eEnabling multi-factor authentication.\u003c/li\u003e\n\u003cli\u003eDeleting unknown WordPress accounts.\u003c/li\u003e\n\u003cli\u003eKeeping WordPress sites up to date.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMaikel Rollman of the Netherlands\u0026rsquo; National High Tech Crime Unit said the action deprives cybercriminals of access to infected computer systems. He said this prevents further damage to digital systems of citizens, businesses, and organizations worldwide and limits the spread of malware. He also said it reduces the risk that infected systems are used for cyber-attacks on critical infrastructure and other essential societal processes.\u003c/p\u003e\n\n\u003cp\u003eRollman also stated that the action marks the beginning of further action against SocGholish.\u003c/p\u003e\n\n\u003ch2 id=\"socgholish-technical-details\"\u003eSocGholish technical details\u003c/h2\u003e\n\n\u003cp\u003eSocGholish is described as a JavaScript-based malware downloader. It is also tracked as FakeUpdates and GhoLoader. The article says it has been used in attacks since at least 2017.\u003c/p\u003e\n\n\u003cp\u003eSocGholish works by hijacking legitimate websites, primarily WordPress sites. Visitors to those compromised sites are tricked into downloading malicious payloads commonly disguised as fake browser updates. When a user installs the malicious update, the malware opens a connection to the attackers and gives them access to the infected system.\u003c/p\u003e\n\n\u003cp\u003eThe article says SocGholish has been used to deploy several other malware families, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDridex.\u003c/li\u003e\n\u003cli\u003eDoppelpaymer.\u003c/li\u003e\n\u003cli\u003eEmpire.\u003c/li\u003e\n\u003cli\u003eKoadic.\u003c/li\u003e\n\u003cli\u003eChtonic.\u003c/li\u003e\n\u003cli\u003eAzorult.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"actor-links\"\u003eActor links\u003c/h2\u003e\n\n\u003cp\u003eThe article says SocGholish has previously been linked to Evil Corp. Evil Corp is described as a Russian cybercrime gang active since 2007. The group has been associated with the Zeus and Dridex malware families.\u003c/p\u003e\n\n\u003cp\u003eEvil Corp has also been linked in the article to multiple ransomware operations, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWastedLocker.\u003c/li\u003e\n\u003cli\u003eHades.\u003c/li\u003e\n\u003cli\u003eMacaw Locker.\u003c/li\u003e\n\u003cli\u003ePhoenix CryptoLocker.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe law enforcement action targeted infrastructure tied to SocGholish and Evil Corp\u0026rsquo;s infection chain. The article frames the disruption as part of broader efforts to limit cybercriminal access to compromised systems and reduce the spread of malware.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected parties and impact\u003c/h2\u003e\n\n\u003cp\u003eThe directly affected infrastructure included nearly 15,000 compromised WordPress websites and 106 servers and domains. The article says the infected sites were legitimate websites that had been hijacked to deliver SocGholish payloads. The broader set of potentially affected parties included citizens, businesses, and organizations worldwide whose systems could be exposed through these compromised sites.\u003c/p\u003e\n\n\u003cp\u003eDutch police said the action prevents further damage to digital systems and limits malware spread. They also said it reduces the risk that infected systems are used for cyber-attacks on critical infrastructure and other essential societal processes. No arrests were described in this article for this specific SocGholish action.\u003c/p\u003e\n\n\u003ch2 id=\"operation-endgame-context\"\u003eOperation Endgame context\u003c/h2\u003e\n\n\u003cp\u003eThis SocGholish disruption was one part of Operation Endgame, which the article describes as a major law enforcement operation targeting cybercrime. The article notes that Operation Endgame has previously targeted several other malware operations and related infrastructure.\u003c/p\u003e\n\n\u003cp\u003eIn November, as part of Operation Endgame, law enforcement agencies took down more than 1,000 servers used by Rhadamanthys, VenomRAT, and Elysium botnet malware operations. Other prior Operation Endgame actions targeted ransomware infrastructure, Smokeloader botnet customers and servers, the AVCheck site, and multiple major malware operations.\u003c/p\u003e\n\n\u003cp\u003eThe article lists additional malware operations previously targeted by Operation Endgame, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDanaBot.\u003c/li\u003e\n\u003cli\u003eIcedID.\u003c/li\u003e\n\u003cli\u003ePikabot.\u003c/li\u003e\n\u003cli\u003eTrickbot.\u003c/li\u003e\n\u003cli\u003eSmokeloader.\u003c/li\u003e\n\u003cli\u003eBumblebee.\u003c/li\u003e\n\u003cli\u003eSystemBC.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the operation as a disruption of a major SocGholish infection chain tied to Evil Corp. Rather than focusing only on individual infected user systems, the operation cleaned compromised WordPress websites used in the delivery chain and took servers and domains offline. Law enforcement emphasized that the action reduces cybercriminal access to infected systems, limits malware spread, and is the beginning of further action against SocGholish.\u003c/p\u003e\n","keyPoints":["International law enforcement agencies cleaned 14,971 SocGholish-infected WordPress websites and took 106 servers and domains offline.","The joint action was supported by Europol and Eurojust and involved authorities from the Netherlands, Canada, the United States, and Germany.","Dutch police removed malware and backdoors from infected sites and advised website owners to change credentials, enable multi-factor authentication, delete unknown WordPress accounts, and keep sites updated.","SocGholish, also tracked as FakeUpdates and GhoLoader, hijacks legitimate websites and tricks visitors into installing malicious payloads disguised as fake browser updates.","SocGholish has been linked to Evil Corp and has been used to deploy malware families including Dridex, Doppelpaymer, Empire, Koadic, Chtonic, and Azorult."],"insights":["WordPress site owners affected by SocGholish should not treat malware removal as sufficient; the Dutch police specifically advised changing credentials, enabling multi-factor authentication, removing unknown WordPress accounts, and updating sites to prevent renewed access.","The operation targeted the infection chain rather than only end-user infections, showing that compromised legitimate websites were a central part of SocGholish’s distribution model.","SocGholish’s fake browser update tactic can serve as an entry point for multiple follow-on malware families, including Dridex, Doppelpaymer, Empire, Koadic, Chtonic, and Azorult.","Law enforcement described this action as the beginning of further action against SocGholish, indicating the disruption is part of an ongoing campaign rather than a one-time takedown."],"referencedReports":[],"body":"\u003cp\u003eInternational law enforcement agencies cleaned nearly 15,000 malware-infected WordPress websites and took down more than 100 servers linked to the SocGholish botnet and the Evil Corp Russian cybercrime group. The action was part of Operation Endgame, a broader law enforcement effort targeting cybercrime infrastructure. Authorities from the Netherlands, Canada, the United States, and Germany participated, with support from Europol and Eurojust.\u003c/p\u003e\n\n\u003cp\u003eThe Dutch police removed SocGholish malware and backdoors from 14,971 compromised WordPress sites, while 106 servers and domains were taken offline. Website owners were advised to change credentials, enable multi-factor authentication, remove unknown WordPress accounts, and keep their sites updated. Dutch police said the action deprives cybercriminals of access to infected systems and reduces the risk that those systems are used in attacks on critical infrastructure and essential societal processes.\u003c/p\u003e\n\n\u003cp\u003eSocGholish, also tracked as FakeUpdates and GhoLoader, is a JavaScript-based malware downloader used since at least 2017. It hijacks legitimate websites, especially WordPress sites, and tricks visitors into installing malicious payloads disguised as fake browser updates. The malware has been linked to Evil Corp and has been used to deploy malware families including Dridex, Doppelpaymer, Empire, Koadic, Chtonic, and Azorult.\u003c/p\u003e\n"},{"n":19,"title":"ShapedPlugin update flow hacked to infect WordPress sites","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/shapedplugin-update-flow-hacked-to-infect-wordpress-sites/","time":"12:55","priority":"SHOULD READ","score":88,"tldr":"ShapedPlugin’s official update system was compromised to deliver backdoored versions of three paid WordPress plugins, installing hidden fake WooCommerce plugins that steal credentials and site data. Affected admins should update to the fixed versions and rotate passwords, 2FA secrets, and other exposed credentials.","briefOverview":"\u003cp\u003eMultiple paid WordPress plugins from ShapedPlugin were compromised in a supply chain attack that delivered infected releases through the vendor’s official update system. The affected products were Product Slider Pro before 3.5.4 for WooCommerce, Real Testimonials Pro 3.2.5, and Smart Post Show Pro before 4.0.2. ShapedPlugin’s free releases hosted on WordPress.org were confirmed to be clean.\u003c/p\u003e\n\n\u003cp\u003eWordfence found that the infected plugins included a malicious loader file named LicenseLoader.php that activated when a WordPress administrator accessed the admin panel. The loader contacted a command-and-control server, downloaded a second-stage backdoor, installed it as a hidden fake WooCommerce-related plugin, reported to the attacker, and then self-deleted. The fake plugin attempted to steal credentials, 2FA secrets, wp-config.php secrets, administrator details, SMTP credentials, and recent WooCommerce order data.\u003c/p\u003e\n\n\u003cp\u003eResearchers believe the incident was likely a build pipeline compromise based on file modifications, timestamp patterns, and Git build references in the packages. ShapedPlugin acknowledged the issue on June 16 and said it had taken mitigation steps and was preparing validated updates. Administrators who find the fake WooCommerce plugins are advised to reset passwords, regenerate 2FA secrets, and review user lists for rogue accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eShapedPlugin, a WordPress plugin vendor with more than 400,000 active installations across its free products, had multiple paid plugins compromised in a supply chain attack. The malicious releases were distributed to paying customers through the vendor’s official update system. The incident affected Product Slider Pro before 3.5.4 for WooCommerce, Real Testimonials Pro 3.2.5, and Smart Post Show Pro before 4.0.2.\u003c/p\u003e\n\n\u003cp\u003eAccording to Defiant data collected from the Wordfence firewall, the backdoor was injected into ShapedPlugin’s Pro builds on May 21. The first customer reports about potentially malicious updates emerged on June 10, and researchers confirmed the compromise after downloading infected plugins from the ShapedPlugin site on June 12. ShapedPlugin acknowledged the incident on June 16 and said it had begun an investigation and implemented mitigation measures.\u003c/p\u003e\n\n\u003cp\u003eWordfence’s analysis found that the infected plugins contained a malicious loader file called LicenseLoader.php. The file activated when a WordPress administrator accessed the site’s admin panel, contacted a command-and-control server, downloaded a second-stage backdoor, installed it as a fake plugin named woocommerce-subscription or woocommerce-notification, reported to the attacker, and self-deleted. The fake plugin was hidden from the WordPress plugin list.\u003c/p\u003e\n\n\u003cp\u003eThe hidden fake plugin attempted to steal WordPress login credentials, session cookies, user roles, IP addresses, browser details, and 2FA secrets from popular WordPress security plugins. It also targeted database credentials and WordPress authentication keys in wp-config.php, administrator account details, SMTP and email service credentials, and WooCommerce order data from the past three months, including payment method information. WordPress is tracking the incident as CVE-2026-10735, while CVE-2026-49777 was also submitted as a duplicate.\u003c/p\u003e\n\n\u003cp\u003eResearchers believe the compromise involved ShapedPlugin’s build pipeline based on file modifications, timestamp patterns suggesting automated injection, and Git build references in the packages. WordPress.org-hosted releases were confirmed to be clean, indicating the issue affected ShapedPlugin’s release infrastructure for the paid products rather than the free WordPress.org distribution channel. ShapedPlugin said an official statement would be published after Wordfence confirmed that patches addressed the issue.\u003c/p\u003e\n\n\u003cp\u003eWordfence said fixes were available in Product Slider Pro version 3.5.4 and Smart Post Show Pro version 4.0.2, while ShapedPlugin pointed to Real Testimonial Pro version 3.2.6. Administrators who discover the fake WooCommerce plugins are advised to reset all site passwords, regenerate 2FA secrets, and review user lists for rogue additions. The article notes that the ShapedPlugin incident followed a separate OptinMonster CDN supply chain attack, but says the ShapedPlugin case appears to involve the build pipeline.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMultiple paid WordPress plugins from ShapedPlugin were compromised in a supply chain attack that distributed infected releases through the vendor’s official update system. The malware installed a fake plugin impersonating WooCommerce components, stole credentials and other sensitive data, and gave operators remote file-writing capabilities.\u003c/p\u003e\n\n\u003cp\u003eShapedPlugin is described as a WordPress plugin vendor focused on front-end, UI, and content display plugins. Its free products have a total active installation base of more than 400,000, but the article states that only three paid plugins were affected in this incident.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cp\u003eThe security incident affected the following paid ShapedPlugin products:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProduct Slider Pro before 3.5.4 for WooCommerce.\u003c/li\u003e\n\u003cli\u003eReal Testimonials Pro 3.2.5.\u003c/li\u003e\n\u003cli\u003eSmart Post Show Pro before 4.0.2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that releases hosted on WordPress.org were confirmed to be clean. This indicated that the malicious activity affected ShapedPlugin’s paid plugin release infrastructure rather than the WordPress.org-hosted versions.\u003c/p\u003e\n\n\u003ch2 id=\"timeline\"\u003eTimeline\u003c/h2\u003e\n\n\u003cp\u003eAccording to data Defiant collected from its Wordfence firewall, the backdoor was injected into ShapedPlugin’s Pro builds on May 21. The first customer reports about potentially malicious updates appeared on June 10.\u003c/p\u003e\n\n\u003cp\u003eResearchers confirmed the compromise after downloading infected plugins from the ShapedPlugin site on June 12. ShapedPlugin acknowledged the incident on June 16 and told Wordfence that its team had initiated an investigation and implemented measures to mitigate the issue.\u003c/p\u003e\n\n\u003cp\u003eShapedPlugin also said it was preparing updated plugin releases and validating them before pushing them to update channels. The company told BleepingComputer that an official statement would be published after Wordfence confirmed that the patches addressed the issue.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eWordfence’s analysis found that the infected plugins contained a malicious loader file named LicenseLoader.php. The loader activated when a WordPress administrator accessed the website’s admin panel.\u003c/p\u003e\n\n\u003cp\u003eAfter activation, the loader performed several actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt contacted a command-and-control server.\u003c/li\u003e\n\u003cli\u003eIt downloaded a second-stage backdoor.\u003c/li\u003e\n\u003cli\u003eIt installed the backdoor as a fake plugin.\u003c/li\u003e\n\u003cli\u003eIt used plugin names impersonating WooCommerce components, specifically woocommerce-subscription or woocommerce-notification.\u003c/li\u003e\n\u003cli\u003eIt reported to the attacker.\u003c/li\u003e\n\u003cli\u003eIt self-deleted to erase evidence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe fake plugin was hidden from the WordPress plugin list. The article states that it attempted to steal sensitive information from infected sites and provided remote file-writing capabilities to the operators.\u003c/p\u003e\n\n\u003ch2 id=\"data-targeted-by-the-fake-plugin\"\u003eData Targeted by the Fake Plugin\u003c/h2\u003e\n\n\u003cp\u003eThe fake plugin attempted to steal multiple categories of information from infected WordPress sites, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWordPress login credentials, including usernames and passwords.\u003c/li\u003e\n\u003cli\u003eSession cookies.\u003c/li\u003e\n\u003cli\u003eUser roles.\u003c/li\u003e\n\u003cli\u003eIP addresses and browser details.\u003c/li\u003e\n\u003cli\u003eTwo-factor authentication secrets from popular WordPress security plugins.\u003c/li\u003e\n\u003cli\u003eDatabase credentials and WordPress authentication keys from wp-config.php.\u003c/li\u003e\n\u003cli\u003eAdministrator account details.\u003c/li\u003e\n\u003cli\u003eSMTP and email service credentials.\u003c/li\u003e\n\u003cli\u003eWooCommerce order data from the past three months, including payment method information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"suspected-point-of-compromise\"\u003eSuspected Point of Compromise\u003c/h2\u003e\n\n\u003cp\u003eResearchers believe the incident was a build pipeline compromise. The article says this assessment is based on file modifications, timestamp patterns that suggested automated injection, and Git build references found in the packages.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that WordPress.org releases were clean. This supported the view that attackers gained access to ShapedPlugin’s release infrastructure rather than compromising the WordPress.org-hosted releases.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-tracking\"\u003eVulnerability Tracking\u003c/h2\u003e\n\n\u003cp\u003eWordPress is tracking the incident as CVE-2026-10735. The article also states that CVE-2026-49777 was submitted as a duplicate.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-and-researcher-response\"\u003eVendor and Researcher Response\u003c/h2\u003e\n\n\u003cp\u003eShapedPlugin told Wordfence that its team started investigating after identifying the concern and had already implemented mitigation measures. The vendor said it was preparing and validating updated plugin releases before pushing them to update channels.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted ShapedPlugin for a statement, and the company pointed to the release of Real Testimonial Pro version 3.2.6. That release listed a single fix described as “Fix: Some WPCS-related warnings.”\u003c/p\u003e\n\n\u003cp\u003eAccording to Wordfence, fixes were available for Product Slider Pro in version 3.5.4 and Smart Post Show Pro in version 4.0.2. ShapedPlugin said it would publish an official statement after Wordfence confirmed that the patches addressed the issue.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-for-administrators\"\u003eRecommended Actions for Administrators\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that administrators take action if fake WooCommerce plugins are found. Recommended steps include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReset all passwords on affected sites.\u003c/li\u003e\n\u003cli\u003eRegenerate two-factor authentication secrets.\u003c/li\u003e\n\u003cli\u003eReview user lists for rogue additions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations follow from the fake plugin’s ability to steal credentials, session data, 2FA secrets, wp-config.php secrets, administrator details, and other sensitive information.\u003c/p\u003e\n\n\u003ch2 id=\"related-context\"\u003eRelated Context\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the ShapedPlugin compromise with a recent OptinMonster incident involving a CDN supply chain attack. In the OptinMonster case, the article says the breach was possible due to a flaw in a marketing server that allowed a hacker to steal credentials for a CDN account.\u003c/p\u003e\n\n\u003cp\u003eFor ShapedPlugin, the article says the apparent point of compromise was different. The evidence pointed to the build pipeline rather than a CDN account compromise.\u003c/p\u003e\n","keyPoints":["Multiple paid WordPress plugins from ShapedPlugin were compromised in a supply chain attack that distributed infected releases through the vendor's official update system.","The incident affected Product Slider Pro before 3.5.4 for WooCommerce, Real Testimonials Pro 3.2.5, and Smart Post Show Pro before 4.0.2.","Wordfence found that the infected plugins contained a malicious LicenseLoader.php file that downloaded a second-stage backdoor and installed it as a hidden fake plugin named woocommerce-subscription or woocommerce-notification.","The fake plugin attempted to steal WordPress login credentials, 2FA secrets, wp-config.php database credentials and authentication keys, administrator details, SMTP credentials, and WooCommerce order data from the past three months.","Researchers believe the compromise involved ShapedPlugin's build pipeline, while WordPress.org-hosted releases were confirmed to be clean."],"insights":["Administrators cannot rely solely on the WordPress plugin list to detect this compromise because the fake WooCommerce plugin installed by the backdoor is hidden from that list.","Sites that installed the compromised updates may need more than plugin cleanup because the backdoor attempted to collect wp-config.php secrets, SMTP credentials, 2FA secrets, session cookies, and recent WooCommerce order data.","The clean WordPress.org releases narrow the exposure to ShapedPlugin’s paid Pro update channel rather than the vendor’s free plugin distribution on WordPress.org.","The loader’s self-deletion means the absence of LicenseLoader.php is not enough to prove a site was never infected."],"referencedReports":[{"title":"PSA: Supply Chain Compromise Targets ShapedPlugin Backdoored Pro Plugins Distributed via Official Channels","url":"https://www.wordfence.com/blog/2026/06/psa-supply-chain-compromise-targets-shapedplugin-backdoored-pro-plugins-distributed-via-official-channels/","publisher":"Wordfence","context":"The article cites Wordfence's analysis as confirming the ShapedPlugin compromise and describing the malicious loader, backdoor behavior, and likely build pipeline compromise.","category":"","primary":false},{"title":"Product Slider Pro for WooCommerce","url":"https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/woo-product-slider-pro","publisher":"Wordfence","context":"The article links to Wordfence's vulnerability entry when stating that Product Slider Pro was fixed in version 3.5.4.","category":"","primary":false},{"title":"Smart Post Show Pro","url":"https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/smart-show-post-pro","publisher":"Wordfence","context":"The article links to Wordfence's vulnerability entry when stating that Smart Post Show Pro was fixed in version 4.0.2.","category":"","primary":false}],"body":"\u003cp\u003eMultiple paid WordPress plugins from ShapedPlugin were compromised in a supply chain attack that delivered infected releases through the vendor’s official update system. The affected products were Product Slider Pro before 3.5.4 for WooCommerce, Real Testimonials Pro 3.2.5, and Smart Post Show Pro before 4.0.2. ShapedPlugin’s free releases hosted on WordPress.org were confirmed to be clean.\u003c/p\u003e\n\n\u003cp\u003eWordfence found that the infected plugins included a malicious loader file named LicenseLoader.php that activated when a WordPress administrator accessed the admin panel. The loader contacted a command-and-control server, downloaded a second-stage backdoor, installed it as a hidden fake WooCommerce-related plugin, reported to the attacker, and then self-deleted. The fake plugin attempted to steal credentials, 2FA secrets, wp-config.php secrets, administrator details, SMTP credentials, and recent WooCommerce order data.\u003c/p\u003e\n\n\u003cp\u003eResearchers believe the incident was likely a build pipeline compromise based on file modifications, timestamp patterns, and Git build references in the packages. ShapedPlugin acknowledged the issue on June 16 and said it had taken mitigation steps and was preparing validated updates. Administrators who find the fake WooCommerce plugins are advised to reset passwords, regenerate 2FA secrets, and review user lists for rogue accounts.\u003c/p\u003e\n"},{"n":8,"title":"Advisory: Persistent MFA Circumvention in an Advanced BEC Campaign on Microsoft 365 Targets","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/persistent-mfa-circumvention-in-an-advanced-bec-campaign-on-microsoft-365-targets","time":"18:47","priority":"SHOULD READ","score":85,"tldr":"Mitiga found that attackers using AiTM phishing against Microsoft 365 can bypass MFA and maintain persistence by registering a second Microsoft Authenticator app without a fresh MFA challenge. Organizations should not rely on MFA alone and should enforce device-based Conditional Access and monitor authentication method changes.","briefOverview":"\u003cp\u003eMitiga investigated an attempted business email compromise campaign targeting Microsoft 365 organizations. The attack used an adversary-in-the-middle phishing technique to gain access to an executive’s Microsoft 365 account and mailbox. Although the fraud attempt was prevented by the alertness of the involved parties, the investigation showed that the attacker had accessed sensitive information available only through account compromise.\u003c/p\u003e\n\n\u003cp\u003eThe most significant finding was that the attacker registered a second Microsoft Authenticator app for the compromised user without the user’s knowledge. Mitiga said this created persistence and effectively nullified MFA because the attacker could reauthenticate after the original session expired or was revoked. The article argues that Microsoft 365 did not require a fresh MFA challenge before allowing changes to the user’s authentication methods.\u003c/p\u003e\n\n\u003cp\u003eMitiga attributes the issue to how Microsoft 365 treats sessions where MFA was previously satisfied by a token. In the observed case, the attacker accessed the My Access portal and completed security info registration within seconds without a new MFA prompt. Mitiga recommends adding a separate layer of defense through device-based Conditional Access, monitoring new authentication method registrations, and treating unexpected-location sign-ins as potential compromise indicators.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMitiga reported on an attempted business email compromise campaign against Microsoft 365 organizations. The campaign targeted an executive account and used adversary-in-the-middle phishing for initial access. The involved parties prevented the fraud, but the investigation showed the attacker had access to sensitive information that could only have come from compromising a user in the organization.\u003c/p\u003e\n\n\u003cp\u003eDuring the investigation, Mitiga identified unauthorized access to the executive’s Microsoft 365 account from multiple locations, including Singapore, Dubai, and San Jose, California. The attacker gained access to the account and mailbox through the AiTM technique. Mitiga did not name a specific threat actor behind the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe key persistence mechanism was the registration of a second Microsoft Authenticator app on the compromised user’s account. Mitiga said this allowed the attacker to keep access even after the original session expired or was revoked because the attacker could reauthenticate with MFA. The article states that this activity was possible because Microsoft did not require an MFA re-challenge for changing authentication methods in the Security Info section.\u003c/p\u003e\n\n\u003cp\u003eMitiga explains that Microsoft 365 may treat MFA as already satisfied when a session token contains a prior MFA claim. In sign-in logs, this appears as “Previously satisfied – MFA requirement satisfied by claim in the token.” According to the article, customers cannot configure Microsoft 365 to require an MFA re-challenge for specific high-risk actions such as adding an Authenticator app or activating roles through Privileged Identity Management.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Microsoft Identity Protection identified some of the sign-ins as risky. However, Mitiga states that the default response of requiring an MFA re-challenge is ineffective once the attacker has already set up their own Authenticator app. Mitiga recommends device-based Conditional Access requiring enrolled and compliant devices, monitoring for new authentication method registrations, and treating unexpected-location sign-ins as possible indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMitiga investigated an attempted business email compromise campaign targeting Microsoft 365 organizations. The attack focused on compromising an executive’s Microsoft 365 account and mailbox. The fraud attempt was prevented by the alertness of the involved parties, but the investigation showed the attacker had access to sensitive information that could only be obtained by compromising a user in the organization.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central finding is that the attacker used a compromised Microsoft 365 session to register a second Microsoft Authenticator app for the victim account. Mitiga states that this gave the attacker persistence and effectively nullified the value of MFA. Once the second Authenticator app was added, the attacker could reauthenticate with MFA after the original session expired or was revoked.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-observed-activity\"\u003eInitial Access and Observed Activity\u003c/h2\u003e\n\n\u003cp\u003eMitiga identified unauthorized access to the Microsoft 365 account of an executive in the organization. The access came from multiple locations, including Singapore, Dubai, and San Jose, California. The initial compromise used an adversary-in-the-middle phishing technique.\u003c/p\u003e\n\n\u003cp\u003eThrough the AiTM technique, the attacker gained access to the executive’s account and mailbox. The article describes AiTM phishing as a method that can give an attacker a valid MFA session token in real time. This allows access without triggering a new MFA prompt during the captured session.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-through-a-second-authenticator-app\"\u003ePersistence Through a Second Authenticator App\u003c/h2\u003e\n\n\u003cp\u003eFurther investigation found that a second Microsoft Authenticator app had been set up for the user without their knowledge. Mitiga describes this as the key persistence mechanism in the campaign. The attacker was able to add the new authentication method during the compromised session.\u003c/p\u003e\n\n\u003cp\u003eThe article states that adding the second Authenticator app allowed the attacker to reauthenticate with MFA after the initial session expired or was revoked. Mitiga emphasizes that this persistence technique remains possible even if an organization sets a strict MFA expiration time of one day. The reason given is that the attacker only needs a short window of access to add the new authentication method.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-365-mfa-behavior-described-by-mitiga\"\u003eMicrosoft 365 MFA Behavior Described by Mitiga\u003c/h2\u003e\n\n\u003cp\u003eMitiga explains that Microsoft 365 evaluates whether MFA is required by examining the existing token in an active session. If the session has already been properly authorized with MFA, Microsoft may not require a new MFA challenge. In sign-in logs, this appears as “Previously satisfied – MFA requirement satisfied by claim in the token.”\u003c/p\u003e\n\n\u003cp\u003eAccording to Mitiga, Microsoft does not give customers flexibility to require an MFA re-challenge for specific high-risk activities. The article says the customer’s control is limited, other than the duration of the MFA token. Mitiga argues that this design prevents organizations from configuring stronger controls for sensitive actions.\u003c/p\u003e\n\n\u003ch2 id=\"security-info-and-authentication-method-changes\"\u003eSecurity Info and Authentication Method Changes\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the Security Info section of the account profile as central to the attack. Mitiga states that Microsoft does not require an MFA re-challenge when a user accesses and changes authentication methods in this section. As a result, a user session with a previously satisfied MFA token can add a new Authenticator app without another MFA prompt.\u003c/p\u003e\n\n\u003cp\u003eMitiga provides timing from its investigation to illustrate this behavior. At 8:31:27, the attacker logged into the My Access portal, where authentication details can be edited. At 8:32:09, the attacker started a security info registration to create a new Authenticator app and completed it within five seconds.\u003c/p\u003e\n\n\u003cp\u003eThe article says the My Access application required MFA through Conditional Access. However, when the sign-in details were examined, no new MFA challenge had taken place because MFA was considered previously satisfied by the token. Mitiga states there is no current way to configure Microsoft 365 to require an MFA re-challenge for this type of activity.\u003c/p\u003e\n\n\u003ch2 id=\"privileged-identity-management-example\"\u003ePrivileged Identity Management Example\u003c/h2\u003e\n\n\u003cp\u003eMitiga also discusses Microsoft Privileged Identity Management as another example of the same issue. PIM is described as allowing administrative users to work with non-administrative rights and elevate to administrator through the portal. The article states that Microsoft does not allow customers to require an MFA re-challenge for this activity.\u003c/p\u003e\n\n\u003cp\u003eMitiga says this means that if an account is compromised, an attacker may be able to activate administrator privileges through the PIM portal. The article notes that, in this case, the legitimate user would at least receive a notification that the privilege had been activated. Mitiga presents this as a surprising example because PIM elevation is a high-risk activity.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-identity-protection-limitation-noted\"\u003eMicrosoft Identity Protection Limitation Noted\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Microsoft Identity Protection identified some of the relevant activity as risky sign-ins. However, Mitiga says the default behavior is to require an MFA re-challenge. The article argues that this can be ineffective once the attacker has already set up their own Authenticator app.\u003c/p\u003e\n\n\u003cp\u003eMitiga frames this as a limitation of relying on MFA challenges after the attacker has established an attacker-controlled authentication method. In that situation, the attacker can complete the MFA challenge using the newly registered app. The article therefore treats the persistence mechanism as a way to undermine normal MFA-based risk responses.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-products\"\u003eAffected Parties and Products\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on Microsoft 365 organizations and Microsoft 365 user accounts. The affected components and features discussed include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft 365\u003c/li\u003e\n\u003cli\u003eMicrosoft Authenticator\u003c/li\u003e\n\u003cli\u003eMicrosoft 365 Identity Protection\u003c/li\u003e\n\u003cli\u003eSecurity Info in the account profile\u003c/li\u003e\n\u003cli\u003eMy Access portal\u003c/li\u003e\n\u003cli\u003eConditional Access\u003c/li\u003e\n\u003cli\u003ePrivileged Identity Management\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe specific observed victim was an executive account in an organization investigated by Mitiga. The article does not name the organization or identify a specific threat actor responsible for the campaign.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eMitiga states that the campaign enabled full compromise even for accounts with MFA enabled. The attacker gained mailbox access and access to sensitive information. The registration of a second Authenticator app created persistence that could survive session expiration or revocation.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that MFA’s value was effectively nullified in this scenario. The attack undermined a common compensating control that organizations rely on for suspected risky sign-ins, access from new IP addresses, elevated permissions, or access to sensitive applications. Mitiga concludes that organizations can no longer rely on multi-factor authentication as the main line of defense against identity attacks.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations-from-mitiga\"\u003eRecommendations from Mitiga\u003c/h2\u003e\n\n\u003cp\u003eMitiga recommends adding another layer of defense tied to physical devices or the employee’s authorized laptop and phone. The article specifically points to Microsoft 365 Conditional Access policies requiring authentication from an enrolled and compliant device. Mitiga states that this device-based requirement would completely prevent AiTM attacks.\u003c/p\u003e\n\n\u003cp\u003eThe FAQ section also recommends that organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnable device-based Conditional Access policies.\u003c/li\u003e\n\u003cli\u003eMonitor for new authentication method registrations on accounts.\u003c/li\u003e\n\u003cli\u003eTreat sign-ins from unexpected locations as potential indicators of compromise.\u003c/li\u003e\n\u003cli\u003eAvoid treating unexpected-location sign-ins only as a reason to prompt MFA again.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"bottom-line\"\u003eBottom Line\u003c/h2\u003e\n\n\u003cp\u003eMitiga’s article describes a Microsoft 365 business email compromise campaign in which AiTM phishing provided initial access and a second Microsoft Authenticator app provided persistence. The critical issue described is that Microsoft 365 allowed authentication method changes without a fresh MFA challenge when the session token had already satisfied MFA. Mitiga’s main recommendation is to use device-based Conditional Access and monitoring because MFA alone may not contain this type of compromise.\u003c/p\u003e\n","keyPoints":["Mitiga investigated an attempted business email compromise campaign targeting Microsoft 365 organizations that used adversary-in-the-middle phishing for initial access.","The attacker gained access to an executive’s Microsoft 365 account and mailbox and then registered a second Microsoft Authenticator app without the user’s knowledge.","Microsoft 365 did not require a fresh MFA challenge when the attacker accessed the Security Info section and changed the user’s authentication methods because the session token had previously satisfied MFA.","Mitiga stated that registering the second Authenticator app gave the attacker persistence, allowing reauthentication with MFA after the original session expired or was revoked.","Mitiga recommended device-based Conditional Access, monitoring for new authentication method registrations, and treating unexpected-location sign-ins as potential indicators of compromise."],"insights":["Reducing MFA token lifetime to one day would not prevent this persistence technique because the attacker can add a new Authenticator app during the already authenticated session.","Microsoft Identity Protection may label these sign-ins as risky, but the default response of requiring MFA can be ineffective once the attacker has already registered their own Authenticator app.","Privileged Identity Management can still be abused from a compromised session because Microsoft does not allow customers to require an MFA re-challenge before privilege activation.","Mitiga identifies enrolled and compliant device requirements in Conditional Access as a practical control that would prevent AiTM attacks by tying access to authorized employee devices."],"referencedReports":[],"body":"\u003cp\u003eMitiga investigated an attempted business email compromise campaign targeting Microsoft 365 organizations. The attack used an adversary-in-the-middle phishing technique to gain access to an executive’s Microsoft 365 account and mailbox. Although the fraud attempt was prevented by the alertness of the involved parties, the investigation showed that the attacker had accessed sensitive information available only through account compromise.\u003c/p\u003e\n\n\u003cp\u003eThe most significant finding was that the attacker registered a second Microsoft Authenticator app for the compromised user without the user’s knowledge. Mitiga said this created persistence and effectively nullified MFA because the attacker could reauthenticate after the original session expired or was revoked. The article argues that Microsoft 365 did not require a fresh MFA challenge before allowing changes to the user’s authentication methods.\u003c/p\u003e\n\n\u003cp\u003eMitiga attributes the issue to how Microsoft 365 treats sessions where MFA was previously satisfied by a token. In the observed case, the attacker accessed the My Access portal and completed security info registration within seconds without a new MFA prompt. Mitiga recommends adding a separate layer of defense through device-based Conditional Access, monitoring new authentication method registrations, and treating unexpected-location sign-ins as potential compromise indicators.\u003c/p\u003e\n"},{"n":26,"title":"INC Ransomware Emerges as Major RaaS Threat in 2026 with 830+ Victims Since 2023","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/inc-ransomware-claims-830-victims-since.html","time":"14:12","priority":"SHOULD READ","score":85,"tldr":"INC has rapidly grown into a major ransomware-as-a-service operation, claiming 830+ victims since 2023 as affiliates shifted from disrupted groups like LockBit and BlackCat. The group relies on common but effective tactics including exploiting unpatched edge devices, stealing Veeam credentials, abusing remote management tools, exfiltrating data, and deploying Rust-based encryptors across Windows and Linux/ESXi systems.","briefOverview":"\u003cp\u003eCybersecurity researchers have described INC as a ransomware-as-a-service operation that has become one of the most prolific cybercrime groups in 2026. The group has claimed at least 830 victims since August 2023. Acronis said the disruption of LockBit and the shutdown of BlackCat helped create opportunities for INC as affiliates moved to alternative ransomware operations.\u003c/p\u003e\n\n\u003cp\u003eThe article says U.S. organizations account for more than 65% of listed INC victims. The most targeted sectors include legal services, manufacturing, construction, technology, and health care. ZeroFox data cited in the article showed INC was the fourth most prominent ransomware group in Q1 2026, with more than 120 incidents during that period.\u003c/p\u003e\n\n\u003cp\u003eINC’s Windows and Linux/ESXi encryptors have been rewritten in Rust to support cross-platform development and resist reverse engineering. Recent campaigns involve targeting unpatched edge devices, dumping credentials from Veeam backup servers, using LOLBins and commercial remote monitoring and management tools, exfiltrating data with Rclone, and deploying encryptors with multithreading and partial encryption.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have tracked the rise of INC from an emerging ransomware-as-a-service operation into one of the most active ransomware groups in 2026. The group has claimed no fewer than 830 victims since August 2023. Acronis researcher Darrel Virtusio said the disruption of LockBit and the shutdown of BlackCat created opportunities for INC as affiliates migrated to alternative ransomware operations.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations in the United States account for more than 65% of listed INC victims. The most targeted sectors include legal services, manufacturing, construction, technology, and health care. Acronis said the group focuses on industries where operational downtime can create strong financial pressure to pay.\u003c/p\u003e\n\n\u003cp\u003eINC’s Windows and Linux/ESXi encryptors have been rewritten in Rust. According to the article, this supports easier cross-platform development and improves resistance to reverse engineering. INC attacks also use an updated credential dumper capable of targeting newer Veeam backup deployments that use salted DPAPI credential encryption.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a broad attack chain used by the double extortion crew. Initial access methods include spear-phishing, credentials purchased from initial access brokers, and exploitation of public-facing applications such as Citrix NetScaler, Fortinet EMS, and SimpleHelp vulnerabilities. INC affiliates then extract credentials, move laterally with tools such as RDP and PsExec, impair defenses using BYOVD techniques, deploy command-and-control tools, exfiltrate data, and run the encryptor.\u003c/p\u003e\n\n\u003cp\u003eThe article says INC affiliates use Cobalt Strike, AnyDesk, ScreenConnect, and TeamViewer for command-and-control, and Rclone for exfiltration after staging data as password-protected archives. The encryptor uses multithreading and partial encryption to speed the process and includes a command-line interface that gives operators more control during hands-on deployments. When executed with the “\u0026ndash;esxi” argument, the payload attempts to shut down virtual machines.\u003c/p\u003e\n\n\u003cp\u003eThe sale of INC’s Windows and Linux variants on the cybercrime underground in May 2024 led to related ransomware families such as Lynx and Sinobi, which the article says have significant code overlap. ZeroFox data cited in the article showed INC was the fourth most prominent ransomware group in Q1 2026 after Qilin, Akira, and The Gentlemen. Acronis concluded that INC continues to strengthen its operation through Rust-based payload rewrites and continuous toolkit enhancement.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have charted the evolution of INC from a nascent ransomware-as-a-service operation into one of the most prolific cybercrime groups in 2026. The group has claimed no fewer than 830 victims since August 2023. The article attributes this analysis primarily to Acronis research.\u003c/p\u003e\n\n\u003cp\u003eAcronis researcher Darrel Virtusio said the disruption of LockBit and the shutdown of BlackCat created opportunities for INC to expand. According to Virtusio, affiliates migrated to alternative ransomware operations after those developments, helping INC grow.\u003c/p\u003e\n\n\u003ch2 id=\"victimology-and-scale\"\u003eVictimology and scale\u003c/h2\u003e\n\n\u003cp\u003eThe article says United States organizations account for more than 65% of INC’s listed victims. The sectors most targeted by INC include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLegal services\u003c/li\u003e\n\u003cli\u003eManufacturing\u003c/li\u003e\n\u003cli\u003eConstruction\u003c/li\u003e\n\u003cli\u003eTechnology\u003c/li\u003e\n\u003cli\u003eHealth care\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAcronis said INC carefully targets industries such as health care, legal services, professional services, manufacturing, and construction. The article states that these sectors face strong financial pressure to pay when operational downtime occurs.\u003c/p\u003e\n\n\u003cp\u003eZeroFox data cited in the article showed INC was the fourth most prominent ransomware group in Q1 2026. During that period, INC accounted for more than 120 incidents, behind Qilin with 338, Akira with 197, and The Gentlemen with 192.\u003c/p\u003e\n\n\u003ch2 id=\"technical-evolution\"\u003eTechnical evolution\u003c/h2\u003e\n\n\u003cp\u003eINC’s Windows and Linux/ESXi encryptors have been rewritten in Rust. The article says this rewrite facilitates easier cross-platform development and helps resist reverse enginee
