ring efforts.\u003c/p\u003e\n\n\u003cp\u003eThe ransomware payload includes a command-line interface that gives operators more control during hands-on deployments. The payload also uses techniques such as multithreading and partial encryption to speed up encryption.\u003c/p\u003e\n\n\u003cp\u003eWhen the payload is executed with the “\u0026ndash;esxi” argument, it attempts to shut down virtual machines. This detail is specifically tied to INC’s Linux/ESXi-related capability described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"credential-theft-and-veeam-targeting\"\u003eCredential theft and Veeam targeting\u003c/h2\u003e\n\n\u003cp\u003eThe article says attacks deploying INC ransomware are characterized by the use of an updated credential dumper. This credential dumper can target newer Veeam backup deployments that use salted DPAPI credential encryption.\u003c/p\u003e\n\n\u003cp\u003eAcronis also said recent INC campaigns continue to dump credentials from Veeam backup servers. The article presents Veeam credential theft as part of INC’s broader post-compromise activity.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-methods\"\u003eInitial access methods\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several initial access methods used by INC affiliates. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpear-phishing\u003c/li\u003e\n\u003cli\u003eAccount credentials purchased from initial access brokers\u003c/li\u003e\n\u003cli\u003eExploitation of vulnerabilities in public-facing applications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe public-facing products and vulnerabilities named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCitrix NetScaler, including CVE-2023-3519 and CVE-2025-5777\u003c/li\u003e\n\u003cli\u003eFortinet EMS, including CVE-2023-48788\u003c/li\u003e\n\u003cli\u003eSimpleHelp, including CVE-2024-57727\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAcronis said INC affiliates continue to target unpatched edge devices for initial access.\u003c/p\u003e\n\n\u003ch2 id=\"lateral-movement-defense-impairment-and-command-and-control\"\u003eLateral movement, defense impairment, and command-and-control\u003c/h2\u003e\n\n\u003cp\u003eAfter initial access, INC affiliates extract sensitive credentials from the compromised environment. They then use living-off-the-land binaries such as Remote Desktop Protocol and PsExec for lateral movement.\u003c/p\u003e\n\n\u003cp\u003eThe article says INC uses the bring your own vulnerable driver technique to impair system defenses. The drivers named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003efilwfp.sys\u003c/li\u003e\n\u003cli\u003efilnk.sys\u003c/li\u003e\n\u003cli\u003efildds.sys\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor command-and-control, the article lists several tools deployed by INC affiliates:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCobalt Strike\u003c/li\u003e\n\u003cli\u003eAnyDesk\u003c/li\u003e\n\u003cli\u003eScreenConnect\u003c/li\u003e\n\u003cli\u003eTeamViewer\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAcronis said INC affiliates use a mix of LOLBins and commercial remote monitoring and management tools to move through victim networks.\u003c/p\u003e\n\n\u003ch2 id=\"data-exfiltration-and-extortion-workflow\"\u003eData exfiltration and extortion workflow\u003c/h2\u003e\n\n\u003cp\u003eThe article describes INC as a double extortion crew. Before encryption, data of interest is staged as password-protected archives.\u003c/p\u003e\n\n\u003cp\u003eINC affiliates then exfiltrate the staged data using Rclone. After exfiltration, they run the encryptor, using multithreading and partial encryption to speed the process.\u003c/p\u003e\n\n\u003ch2 id=\"related-ransomware-families\"\u003eRelated ransomware families\u003c/h2\u003e\n\n\u003cp\u003eThe article says INC’s Windows and Linux variants were sold on the cybercrime underground in May 2024. This sale led to the emergence of related ransomware families such as Lynx and Sinobi.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Lynx and Sinobi show significant code overlap with INC. At the same time, the INC brand has continued to evolve.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article states that ransomware groups can find success and scale by following widely known techniques. It specifically notes that such groups do not need to rely on advanced tradecraft or bespoke tooling to produce a steady stream of victims.\u003c/p\u003e\n\n\u003cp\u003eAcronis said INC continues to strengthen its ransomware operation through Rust-based payload rewrites and continuous toolkit enhancement. The article also says the threat is amplified because targeted sectors depend heavily on uninterrupted operations and supply chains, increasing the risk of collateral exposure across vendor networks and downstream partners when breaches occur.\u003c/p\u003e\n","keyPoints":["INC has grown from a nascent ransomware-as-a-service operation into one of the most prolific cybercrime groups in 2026, claiming at least 830 victims since August 2023.","Acronis reported that the disruption of LockBit and the shutdown of BlackCat created opportunities for INC to expand as affiliates migrated to alternative ransomware operations.","INC’s Windows and Linux/ESXi encryptors have been rewritten in Rust to support cross-platform development and resist reverse engineering.","INC affiliates use methods including spear-phishing, credentials bought from initial access brokers, exploitation of public-facing applications, credential dumping from Veeam backup servers, LOLBins, commercial remote management tools, and Rclone-based data exfiltration.","ZeroFox data showed that INC was the fourth most prominent ransomware group in Q1 2026, with more than 120 incidents during that period."],"insights":["INC’s growth shows that ransomware groups can scale rapidly using widely known techniques and commercial tools rather than relying on advanced tradecraft or bespoke tooling.","Veeam backup servers are a specific high-value target in INC campaigns, including newer deployments that use salted DPAPI credential encryption.","The sale of INC’s Windows and Linux variants in May 2024 contributed to the emergence of related ransomware families such as Lynx and Sinobi with significant code overlap.","Organizations in operationally sensitive sectors such as health care, legal services, manufacturing, and construction face heightened pressure because INC targets environments where downtime can create strong financial incentives to pay.","INC’s encryptor includes operator-controlled deployment features, including an “--esxi” argument that attempts to shut down virtual machines before encryption."],"referencedReports":[{"title":"From Emerging Threat to Top-Tier Ransomware-as-a-Service: The Evolution of INC Ransomware","url":"https://www.acronis.com/en/tru/posts/from-emerging-threat-to-top-tier-ransomware-as-a-service-the-evolution-of-inc-ransomware/","publisher":"Acronis","context":"The article cites Acronis research as the basis for its analysis of INC ransomware’s evolution, tooling, targeting, and attack chain.","category":"","primary":false},{"title":"Q1 2026 Ransomware Wrap-Up","url":"https://www.zerofox.com/intelligence/q1-2026-ransomware-wrap-up/","publisher":"ZeroFox","context":"The article references ZeroFox data showing INC was the fourth most prominent ransomware group in Q1 2026.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have described INC as a ransomware-as-a-service operation that has become one of the most prolific cybercrime groups in 2026. The group has claimed at least 830 victims since August 2023. Acronis said the disruption of LockBit and the shutdown of BlackCat helped create opportunities for INC as affiliates moved to alternative ransomware operations.\u003c/p\u003e\n\n\u003cp\u003eThe article says U.S. organizations account for more than 65% of listed INC victims. The most targeted sectors include legal services, manufacturing, construction, technology, and health care. ZeroFox data cited in the article showed INC was the fourth most prominent ransomware group in Q1 2026, with more than 120 incidents during that period.\u003c/p\u003e\n\n\u003cp\u003eINC’s Windows and Linux/ESXi encryptors have been rewritten in Rust to support cross-platform development and resist reverse engineering. Recent campaigns involve targeting unpatched edge devices, dumping credentials from Veeam backup servers, using LOLBins and commercial remote monitoring and management tools, exfiltrating data with Rclone, and deploying encryptors with multithreading and partial encryption.\u003c/p\u003e\n"},{"n":5,"title":"Health-ISAC Hacking Healthcare 6-18-2026","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/health-isac-hacking-healthcare-6-18-2026/","time":"16:39","priority":"SHOULD READ","score":82,"tldr":"Health-ISAC highlights an FBI warning that Silent Ransom Group is escalating from phishing and remote access scams to physically impersonating IT staff to plug storage devices into victim computers, enabling privilege escalation and data theft. The key takeaway is that cybersecurity defenses must account for physical security and employee verification controls, not just remote threats.","briefOverview":"\u003cp\u003eHealth-ISAC’s Hacking Healthcare for June 18, 2026 examines the Silent Ransom Group and its reported evolution toward physically accessing victim systems. The article centers on an FBI FLASH report describing the group’s data exfiltration activities and emphasizes that cybersecurity is not limited to cyberspace. It notes that SRG attempts to escalate privileges and exfiltrate data after gaining access to victims’ systems.\u003c/p\u003e\n\n\u003cp\u003eThe FBI says SRG has been active as an independent entity since at least 2022, while threat intelligence reporting cited by the article suggests it may be a Russian-based outgrowth of Wizard Spider or Trickbot. The group is described as financially motivated and as conducting data theft and extortion without relying on traditional ransomware encryption. Instead, it seeks rapid system access, immediate data exfiltration, and extortion through threats to publicly disclose or sell stolen data.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a January through May 2026 campaign targeting dozens of organizations across professional, legal, and financial services in the United States. It says SRG used voice phishing and other social engineering techniques, and, when remote desktop access failed, sent a threat actor to a victim location posing as IT staff. According to the FBI, the actor attempted to insert a storage device into the victim’s computer under the pretext of imaging the device or creating a backup file.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHealth-ISAC’s June 18, 2026 Hacking Healthcare article discusses an FBI FLASH report on Silent Ransom Group data exfiltration activity. The article presents SRG’s willingness to physically access and compromise victims as a reminder that cybersecurity has a physical component. Health-ISAC says the public version of the article omits additional action and analysis available to members.\u003c/p\u003e\n\n\u003cp\u003eSilent Ransom Group is described by the FBI as active as an independent entity since at least 2022. The article notes that the group is also known as Luna Moth, Chatty Spider, and UNC3753. It also cites threat intelligence companies such as CrowdStrike as indicating SRG may be a Russian-based outgrowth of Wizard Spider or Trickbot.\u003c/p\u003e\n\n\u003cp\u003eThe article describes SRG as a financially motivated criminal group that conducts data theft and extortion without relying on traditional ransomware encryption. Rather than encrypting victim systems, the FBI reports that SRG seeks rapid access to systems, immediate data exfiltration, and extortion through threats of public disclosure or sale of stolen data. The article says the group has previously used phishing emails and phone calls to accomplish its goals.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC also cites Palo Alto Networks’ Unit 42 reporting from 2022, which said the group conducted highly organized campaigns. According to that cited reporting, the group had significantly invested in call centers and infrastructure unique to each victim. This prior activity provides context for SRG’s continued use of social engineering.\u003c/p\u003e\n\n\u003cp\u003eThe article says SRG returned to the attention of threat intelligence and law enforcement because of a campaign from January through May 2026. That campaign targeted dozens of organizations across professional, legal, and financial services in the United States. While voice phishing and other common social engineering techniques were noted, the article identifies SRG’s willingness to pose as a victim organization’s IT department employee as the more remarkable element.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FBI report, if SRG failed to obtain access through a remote desktop session, the group sent a threat actor to the victim’s location. The actor attempted to gain access by inserting a storage device into the victim’s computer, often claiming they needed to image the device or create a backup file because of possible impacts from a phishing email. The article says this could allow SRG to escalate privileges or physically exfiltrate data through an external hard drive or USB stick, and that law enforcement continues to seek information about the group and its activities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC’s Hacking Healthcare article for June 18, 2026 focuses on the Silent Ransom Group and its reported evolution toward physically accessing victim systems. The article is based largely on a late-May FBI FLASH report that detailed SRG data exfiltration activities. Health-ISAC frames the development as a reminder that cybersecurity is not limited to cyberspace.\u003c/p\u003e\n\n\u003cp\u003eThe article says SRG now attempts to gain physical access to victims’ systems in order to escalate privileges and exfiltrate data. It explains who the threat actor is, how the group has operated, and why the physical-security dimension is significant. The public version notes that additional action and analysis are included with Health-ISAC membership.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-background\"\u003eThreat Actor Background\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the group as Silent Ransom Group, or SRG. It notes that the group is also known as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLuna Moth\u003c/li\u003e\n\u003cli\u003eChatty Spider\u003c/li\u003e\n\u003cli\u003eUNC3753\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the FBI, SRG has been active as an independent entity since at least 2022. The article also says threat intelligence companies such as CrowdStrike indicate the group may be a Russian-based outgrowth of the Wizard Spider or Trickbot threat actor.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC describes SRG as a financially motivated criminal group. The article says the group is notable for conducting data theft and extortion operations without relying on traditional ransomware encryption.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-model\"\u003eExtortion Model\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that SRG’s operations differ from traditional ransomware activity because they do not depend on encrypting victim systems. Instead, the FBI reports that SRG typically seeks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRapid access to victim systems\u003c/li\u003e\n\u003cli\u003eImmediate data exfiltration\u003c/li\u003e\n\u003cli\u003eExtortion through threats of public disclosure or sale of stolen data\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis approach is presented as data theft and extortion rather than encryption-based ransomware. The article does not describe specific victims whose data was stolen or identify a disclosed amount of stolen data.\u003c/p\u003e\n\n\u003ch2 id=\"prior-social-engineering-activity\"\u003ePrior Social Engineering Activity\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC says SRG has used a variety of schemes in the past to accomplish its goals. These have included phishing emails and phone calls.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Palo Alto Networks’ Unit 42 reporting from 2022, which stated that the group conducted highly organized campaigns. According to the cited Unit 42 reporting, SRG had significantly invested in call centers and infrastructure unique to each victim.\u003c/p\u003e\n\n\u003cp\u003eThis prior reporting is used to show that SRG’s social engineering activity predates the current campaign discussed in the article. The article presents the latest activity as an evolution of those methods, rather than as an entirely separate pattern.\u003c/p\u003e\n\n\u003ch2 id=\"2026-campaign-activity\"\u003e2026 Campaign Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article says SRG appears to be back on the radar of threat intelligence and law enforcement groups because of a campaign that ran from January through May 2026. That campaign reportedly targeted dozens of organizations in the United States.\u003c/p\u003e\n\n\u003cp\u003eThe sectors identified in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProfessional services\u003c/li\u003e\n\u003cli\u003eLegal services\u003c/li\u003e\n\u003cli\u003eFinancial services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says voice phishing and other common social engineering techniques were part of the campaign. However, it identifies the more remarkable aspect as SRG’s willingness to pose as an employee of the victim’s IT department.\u003c/p\u003e\n\n\u003ch2 id=\"physical-access-technique\"\u003ePhysical Access Technique\u003c/h2\u003e\n\n\u003cp\u003eAccording to the FBI report summarized by Health-ISAC, SRG attempted to gain access through a remote desktop session. If that failed, the group sent a threat actor to the victim’s location.\u003c/p\u003e\n\n\u003cp\u003eThe onsite actor attempted to gain access by inserting a storage device into the victim’s computer. The article says this was often done while telling the victim that the actor needed to image the device or create a backup file to address potential impacts from a phishing email.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC says that, at this point, SRG could either escalate privileges or physically exfiltrate data. The article specifically mentions an external hard drive or USB stick as the physical media that could be used for data exfiltration.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe central significance of the article is the convergence of cyber intrusion methods with physical access attempts. Health-ISAC uses SRG’s activity to stress that cybersecurity includes a physical component.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main example is that a threat actor may impersonate IT personnel and use a plausible technical explanation to convince a victim to allow a storage device to be inserted into a computer. This is presented as a way to enable privilege escalation or data exfiltration when remote access does not succeed.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-status\"\u003eLaw Enforcement Status\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the FBI and other law enforcement entities continue to seek information about SRG and its activities. It does not describe arrests, sanctions, indictments, or disruption actions against the group.\u003c/p\u003e\n\n\u003ch2 id=\"sources-referenced-in-the-article\"\u003eSources Referenced in the Article\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC references several external sources, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn FBI FLASH report on SRG data exfiltration activities.\u003c/li\u003e\n\u003cli\u003eCrowdStrike information on Chatty Spider.\u003c/li\u003e\n\u003cli\u003ePalo Alto Networks Unit 42 reporting on Luna Moth callback phishing.\u003c/li\u003e\n\u003cli\u003eGoogle Cloud threat intelligence reporting on a targeted campaign against U.S. law firms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also includes links to additional references related to physical safeguards and healthcare cybersecurity resources, but the public action and analysis section itself is marked as included with Health-ISAC membership.\u003c/p\u003e\n","keyPoints":["Health-ISAC’s Hacking Healthcare examined the evolution of the Silent Ransom Group, which now attempts to gain physical access to victims’ systems to escalate privileges and exfiltrate data.","The FBI reported that Silent Ransom Group has been active as an independent entity since at least 2022 and is also known as Luna Moth, Chatty Spider, and UNC3753.","Silent Ransom Group conducts data theft and extortion operations without relying on traditional ransomware encryption, instead seeking rapid access, immediate data exfiltration, and extortion through threats of public disclosure or sale of stolen data.","In a campaign from January through May 2026, Silent Ransom Group targeted dozens of organizations across professional, legal, and financial services in the United States.","According to the FBI, when remote desktop access failed, Silent Ransom Group sent a threat actor to the victim’s location posing as IT staff to insert a storage device into the victim’s computer."],"insights":["Silent Ransom Group’s shift to sending someone onsite shows that failed remote access attempts may not end the intrusion attempt but can trigger a physical social-engineering follow-up.","The group’s extortion model is notable because it avoids traditional ransomware encryption and instead relies on rapid data theft followed by threats to disclose or sell stolen data.","The article highlights that impersonation of internal IT staff can be used to make suspicious physical actions, such as inserting a USB device or external hard drive, appear routine to victims.","Earlier reporting cited in the article indicates the group has invested in call centers and victim-specific infrastructure, suggesting its social-engineering operations are organized rather than opportunistic."],"referencedReports":[{"title":"FBI FLASH Report on Silent Ransom Group Data Exfiltration Activities","url":"https://www.ic3.gov/CSA/2026/260526.pdf","publisher":"Federal Bureau of Investigation","context":"The article says the FBI released a FLASH report detailing Silent Ransom Group data exfiltration activities and uses it as the main source for the group’s tactics.","category":"","primary":false},{"title":"Luna Moth Callback Phishing","url":"https://unit42.paloaltonetworks.com/luna-moth-callback-phishing/","publisher":"Palo Alto Networks Unit 42","context":"The article cites Unit 42’s prior analysis that the group conducted organized campaigns and invested in call centers and victim-specific infrastructure.","category":"","primary":false},{"title":"Targeted Campaign Against US Law Firms","url":"https://cloud.google.com/blog/topics/threat-intelligence/targeted-campaign-us-law-firms","publisher":"Google Cloud Threat Intelligence","context":"The article cites this analysis for the January through May campaign targeting dozens of U.S. organizations across professional, legal, and financial services.","category":"","primary":false}],"body":"\u003cp\u003eHealth-ISAC’s Hacking Healthcare for June 18, 2026 examines the Silent Ransom Group and its reported evolution toward physically accessing victim systems. The article centers on an FBI FLASH report describing the group’s data exfiltration activities and emphasizes that cybersecurity is not limited to cyberspace. It notes that SRG attempts to escalate privileges and exfiltrate data after gaining access to victims’ systems.\u003c/p\u003e\n\n\u003cp\u003eThe FBI says SRG has been active as an independent entity since at least 2022, while threat intelligence reporting cited by the article suggests it may be a Russian-based outgrowth of Wizard Spider or Trickbot. The group is described as financially motivated and as conducting data theft and extortion without relying on traditional ransomware encryption. Instead, it seeks rapid system access, immediate data exfiltration, and extortion through threats to publicly disclose or sell stolen data.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a January through May 2026 campaign targeting dozens of organizations across professional, legal, and financial services in the United States. It says SRG used voice phishing and other social engineering techniques, and, when remote desktop access failed, sent a threat actor to a victim location posing as IT staff. According to the FBI, the actor attempted to insert a storage device into the victim’s computer under the pretext of imaging the device or creating a backup file.\u003c/p\u003e\n"},{"n":7,"title":"Australian sugar producer works to restore operations as ransomware group claims attack","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/mackay-sugar-cyberattack-claimed-gentlemen","time":"14:20","priority":"SHOULD READ","score":82,"tldr":"Australia’s Mackay Sugar is restoring operations after a cyberattack shut two mills and disrupted harvesting, while investigating claims by the Gentlemen ransomware group that it stole data. The company has found evidence of external access but has not confirmed the group’s involvement.","briefOverview":"\u003cp\u003eMackay Sugar, Australia’s second-largest sugar producer, is working to restore operations after a cyberattack disrupted its systems and mill operations. The incident forced the company’s Racecourse and Farleigh mills to suspend operations shortly after the annual sugarcane crushing season began. Harvesting was brought to a halt across large parts of Queensland’s Mackay region.\u003c/p\u003e\n\n\u003cp\u003eThe ransomware group Gentlemen claimed responsibility for the attack and said it would publish allegedly stolen data if a ransom is not paid. Mackay Sugar has not attributed the incident to a specific threat actor or confirmed Gentlemen’s involvement, but said it found evidence that an external party accessed parts of its IT environment. The company said it is urgently verifying the nature and extent of any information that may have been accessed.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it continues to restore systems and expects some harvesting to resume this week. The company operates three mills, generates more than $420 million in annual revenue, and supplies raw sugar to domestic customers and export markets including South Korea, Indonesia, Japan and Malaysia. Australian law requires ransomware victims to report any extortion payments made to cybercriminals on their behalf.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMackay Sugar is continuing recovery work more than a week after a cyberattack disrupted operations at Australia’s second-largest sugar producer. The incident affected one of the country’s largest cane-growing regions and interrupted the start of the annual sugarcane crushing season. The company said it recognizes the impact on growers and is working to safely resume full operations as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe attack forced Mackay Sugar’s Racecourse and Farleigh mills to suspend operations from June 10. A third facility avoided disruption because it was not operating at the time of the attack. The shutdown of the two mills brought harvesting to a halt across large parts of Queensland’s Mackay region.\u003c/p\u003e\n\n\u003cp\u003eThe ransomware group Gentlemen claimed responsibility for the incident this week. The group said it would publish allegedly stolen data if a ransom is not paid, but did not disclose what information it claims to have obtained or specify its demands. Mackay Sugar has not said whether it has made contact with the group.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar has not attributed the incident to a specific threat actor or confirmed Gentlemen’s involvement. In a statement, the company said it was aware of the claim on the group’s dark web leak site and had found evidence that an external party accessed parts of its IT environment. The company said it is working urgently to verify the claims and determine the nature and extent of any information that may have been accessed.\u003c/p\u003e\n\n\u003cp\u003eThe company operates three mills, reports more than $420 million in annual revenue, and supplies raw sugar to domestic customers and export markets including South Korea, Indonesia, Japan and Malaysia. It said it continues to restore systems and expects some harvesting to resume this week. Australian law requires victims of ransomware attacks to report to the government any extortion payments made to cybercriminals on their behalf.\u003c/p\u003e\n\n\u003cp\u003eAccording to ESET, Gentlemen emerged in late 2025 and has rapidly become one of the most active ransomware operations this year. The group uses a ransomware-as-a-service model, offers affiliates up to 90% of ransom payments, and employs double-extortion tactics by stealing data in addition to encrypting systems. Researchers say its operators previously worked with groups including Qilin, Embargo, LockBit, Medusa and BlackLock, and evidence suggests its founder is a Russian speaker.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar, Australia’s second-largest sugar producer, is restoring operations after a cyberattack disrupted its systems and mill operations. The incident occurred shortly after the annual sugarcane crushing season began and affected operations across one of Australia’s largest cane-growing regions.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is investigating claims by the ransomware group Gentlemen, which asserted responsibility for the attack. Mackay Sugar has not attributed the incident to any specific threat actor and has not confirmed Gentlemen’s involvement.\u003c/p\u003e\n\n\u003ch2 id=\"operational-impact\"\u003eOperational impact\u003c/h2\u003e\n\n\u003cp\u003eThe cyberattack forced two Mackay Sugar mills to suspend operations from June 10:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRacecourse mill\u003c/li\u003e\n\u003cli\u003eFarleigh mill\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe shutdown brought harvesting to a halt across large parts of Queensland’s Mackay region. Mackay Sugar’s third facility avoided disruption because it was not operating at the time of the attack.\u003c/p\u003e\n\n\u003cp\u003eThe company said it continues to restore systems and expects some harvesting to resume this week. Mackay Sugar said it recognizes the impact on growers and is doing everything it can to support them and safely resume full operations as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"company-significance\"\u003eCompany significance\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar operates three mills and says it generates more than $420 million in annual revenue. The company supplies raw sugar to domestic customers and export markets including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSouth Korea\u003c/li\u003e\n\u003cli\u003eIndonesia\u003c/li\u003e\n\u003cli\u003eJapan\u003c/li\u003e\n\u003cli\u003eMalaysia\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause the attack affected mill operations shortly after the crushing season began, it disrupted harvesting activity across large parts of the Mackay region.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-claim-and-data-access\"\u003eRansomware claim and data access\u003c/h2\u003e\n\n\u003cp\u003eThe ransomware group Gentlemen claimed responsibility for the attack and said it would publish allegedly stolen data if a ransom is not paid. The group did not specify its ransom demands and did not disclose what information it claims to have obtained.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it is aware of the claim on Gentlemen’s dark web leak site. The company also said it found evidence that an external party accessed parts of its IT environment.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it is working urgently to verify the claims, including the nature and extent of any information that may have been accessed. The company has not revealed whether it has made contact with Gentlemen.\u003c/p\u003e\n\n\u003ch2 id=\"legal-and-reporting-context\"\u003eLegal and reporting context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Australian law requires victims of ransomware attacks to report to the government any extortion payments made to cybercriminals on their behalf. The article does not state that Mackay Sugar has paid a ransom or that any payment has been made.\u003c/p\u003e\n\n\u003ch2 id=\"information-about-gentlemen\"\u003eInformation about Gentlemen\u003c/h2\u003e\n\n\u003cp\u003eAccording to cybersecurity firm ESET, Gentlemen emerged in late 2025 and has rapidly become one of the most active ransomware operations this year. ESET says the group operates a ransomware-as-a-service model and offers affiliates up to 90% of ransom payments.\u003c/p\u003e\n\n\u003cp\u003eThe group uses double-extortion tactics by stealing data in addition to encrypting systems. Researchers say its operators previously worked with ransomware groups including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eQilin\u003c/li\u003e\n\u003cli\u003eEmbargo\u003c/li\u003e\n\u003cli\u003eLockBit\u003c/li\u003e\n\u003cli\u003eMedusa\u003c/li\u003e\n\u003cli\u003eBlackLock\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that the group’s origins remain unknown, while security researchers have found evidence suggesting its founder is a Russian speaker.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent status\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar is still restoring systems and has not confirmed the ransomware group’s role in the incident. The company is investigating the extent of external access to its IT environment and the nature of any information that may have been accessed.\u003c/p\u003e\n\n\u003cp\u003eOperations at the Racecourse and Farleigh mills remained shut as of the company’s Wednesday statement, while the company expected some harvesting to resume during the week.\u003c/p\u003e\n","keyPoints":["Mackay Sugar said it is investigating claims by the Gentlemen ransomware group after a cyberattack disrupted its operations more than a week earlier.","The company said it found evidence that an external party accessed parts of its IT environment but has not attributed the incident to a specific threat actor.","The cyberattack forced Mackay Sugar’s Racecourse and Farleigh mills to suspend operations from June 10, halting harvesting across large parts of Queensland’s Mackay region.","Mackay Sugar said it continues to restore systems and expects some harvesting to resume this week.","Gentlemen claimed it would publish allegedly stolen data if a ransom is not paid but did not disclose what information it claims to have obtained or specify its demands."],"insights":["The incident shows that ransomware can create immediate physical-world disruption in agricultural production, as the shutdown of two sugar mills halted harvesting across large parts of the Mackay region shortly after crushing season began.","Mackay Sugar’s third mill avoided disruption because it was not operating at the time of the attack, indicating that operational status at the moment of compromise affected the business impact.","The extortion claim creates a regulatory consideration for Mackay Sugar because Australian law requires ransomware victims to report any extortion payments made to cybercriminals on their behalf.","Gentlemen’s claimed involvement is notable because ESET described the group as a recently emerged ransomware-as-a-service operation that has rapidly become one of the most active groups this year."],"referencedReports":[{"title":"Killing me gently: Inside Gentlemen’s EDR killer framework","url":"https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/","publisher":"ESET","context":"The article cites ESET research describing Gentlemen as a recently emerged ransomware-as-a-service operation using double-extortion tactics.","category":"","primary":false},{"title":"Who Runs the Ransomware Group The Gentlemen?","url":"https://krebsonsecurity.com/2026/06/who-runs-the-ransomware-group-the-gentlemen/","publisher":"KrebsOnSecurity","context":"The article references security researchers’ evidence suggesting the founder of Gentlemen is a Russian speaker.","category":"","primary":false}],"body":"\u003cp\u003eMackay Sugar, Australia’s second-largest sugar producer, is working to restore operations after a cyberattack disrupted its systems and mill operations. The incident forced the company’s Racecourse and Farleigh mills to suspend operations shortly after the annual sugarcane crushing season began. Harvesting was brought to a halt across large parts of Queensland’s Mackay region.\u003c/p\u003e\n\n\u003cp\u003eThe ransomware group Gentlemen claimed responsibility for the attack and said it would publish allegedly stolen data if a ransom is not paid. Mackay Sugar has not attributed the incident to a specific threat actor or confirmed Gentlemen’s involvement, but said it found evidence that an external party accessed parts of its IT environment. The company said it is urgently verifying the nature and extent of any information that may have been accessed.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it continues to restore systems and expects some harvesting to resume this week. The company operates three mills, generates more than $420 million in annual revenue, and supplies raw sugar to domestic customers and export markets including South Korea, Indonesia, Japan and Malaysia. Australian law requires ransomware victims to report any extortion payments made to cybercriminals on their behalf.\u003c/p\u003e\n"},{"n":18,"title":"USB worm spreads crypto-stealing malware via Windows shortcut files","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/usb-worm-spreads-crypto-stealing-malware-via-windows-shortcut-files/","time":"16:20","priority":"SHOULD READ","score":82,"tldr":"A USB-spreading Windows worm is using malicious shortcut files to install crypto-stealing malware that swaps wallet addresses, steals seed phrases and private keys, and exfiltrates screenshots over Tor. Microsoft says defenders should watch for suspicious script execution, curl/PowerShell activity, and localhost Tor proxy connections.","briefOverview":"\u003cp\u003eThreat actors targeting cryptocurrency wallets have been distributing clipboard-stealing malware with self-spreading capabilities. The campaign has been active since at least February and uses LNK shortcut files on USB drives to start infections. The malware uses the Tor network to conceal communication and stages additional payloads from a .ONION address.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says the malware hides original document files and replaces them with malicious shortcuts bearing the same names. It also creates a scheduled task to monitor for newly connected USB storage devices, copy itself to them, and create more malicious shortcut files. The stealer checks clipboard contents for cryptocurrency wallet addresses, seed phrases, and private keys, and can capture screenshots for exfiltration over Tor.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets 12- and 24-word BIP39 seed phrases, Ethereum private keys, Bitcoin WIF keys, Bitcoin addresses, Tron addresses, and Monero addresses. It replaces detected wallet addresses with attacker-controlled ones that partially resemble the originals based on starting characters. Microsoft recommends looking for behavioral indicators such as suspicious wscript.exe and cscript.exe activity, unexpected curl, PowerShell, and cmd.exe launches, unusual child processes, localhost:9050 connections, and Tor proxy activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors targeting cryptocurrency wallets are distributing clipboard-stealing malware that can spread through USB drives. The campaign has been active since at least February and relies on Windows LNK shortcut files placed on USB drives. Microsoft says opening the shortcut triggers the malware, which then stages additional payloads from a .ONION address.\u003c/p\u003e\n\n\u003cp\u003eThe worm searches the local system for document files, hides the originals, and replaces them with malicious shortcuts using the same names. This causes the malware to execute when users try to open their documents. It also creates a scheduled task that watches for newly connected USB storage devices, copies itself to them, and creates additional malicious shortcut files.\u003c/p\u003e\n\n\u003cp\u003eThe stealer component runs after checking that Task Manager is inactive. It establishes command-and-control communications through Tor using a Tor executable named ugate.exe. The malware checks the clipboard every half second for cryptocurrency-related data, including BIP39 seed phrases, Ethereum private keys, Bitcoin WIF keys, Bitcoin wallet addresses, Tron wallet addresses, and Monero wallet addresses.\u003c/p\u003e\n\n\u003cp\u003eWhen the malware detects targeted wallet data, it can replace cryptocurrency addresses with attacker-controlled addresses. Microsoft says the replacement addresses are selected based on starting digits or characters so they partially resemble the attackers’ wallet addresses and are less likely to be noticed at a quick glance. The malware also captures five screenshots of the victim’s screen every ten seconds and sends them to the command-and-control server using curl.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says the malware also supports remote code execution through a C2 EVAL instruction. In that case, it downloads JavaScript content into a file named cfile and executes it on the infected machine. The researchers said the strongest infection indicators are behavioral, including process activity involving wscript.exe and cscript.exe, unexpected launches of curl, PowerShell, and cmd.exe, unusual child processes, connections to localhost:9050, and Tor proxy activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors targeting cryptocurrency wallets have been distributing clipboard-stealing malware with self-spreading capabilities. The campaign has been active since at least February and uses Windows LNK shortcut files on USB drives to deliver the malware. The malware uses the Tor network to conceal communications and can stage additional payloads from a .ONION address.\u003c/p\u003e\n\n\u003cp\u003eThe primary purpose of the malware is to monitor clipboard contents and replace cryptocurrency wallet addresses with ones controlled by the attacker. It also monitors for seed phrases and private keys. In addition, it can capture screenshots and exfiltrate them over Tor.\u003c/p\u003e\n\n\u003ch2 id=\"infection-chain-and-usb-propagation\"\u003eInfection Chain and USB Propagation\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft says the infection begins when a victim opens a malicious LNK file on a USB drive. This action triggers malware execution from the USB drive. Additional payloads are then staged from a .ONION address.\u003c/p\u003e\n\n\u003cp\u003eAfter infection, the malware performs a local scan for document files on the system. When it finds document files, it hides the originals and replaces them with malicious shortcuts that use the same names. This causes users to execute the malware when they attempt to open those documents.\u003c/p\u003e\n\n\u003cp\u003eThe worm also creates a scheduled task to monitor for newly connected USB storage devices. When a removable drive is connected, the malware copies itself to the device. It also creates additional malicious shortcut files on the removable drive, enabling further spread through USB media.\u003c/p\u003e\n\n\u003ch2 id=\"stealer-behavior\"\u003eStealer Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe stealer component executes after checking that Task Manager is inactive. It establishes communications with the command-and-control host using a Tor executable named ugate.exe. The malware monitors clipboard contents every half second.\u003c/p\u003e\n\n\u003cp\u003eThe article says the clipboard checks target the following data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e12-word BIP39 seed phrases.\u003c/li\u003e\n\u003cli\u003e24-word BIP39 seed phrases.\u003c/li\u003e\n\u003cli\u003eEthereum private keys.\u003c/li\u003e\n\u003cli\u003eBitcoin WIF keys.\u003c/li\u003e\n\u003cli\u003eBitcoin legacy, P2SH, Bech32, and Taproot wallet addresses.\u003c/li\u003e\n\u003cli\u003eTron wallet addresses.\u003c/li\u003e\n\u003cli\u003eMonero wallet addresses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhen the malware detects cryptocurrency wallet addresses, it replaces them with attacker-controlled addresses. Microsoft says the targeted replacement addresses are selected based on starting digits or characters so they partially resemble the attackers’ wallet addresses. The article says this is intended to reduce the chance that the user notices the fraud at a quick glance.\u003c/p\u003e\n\n\u003ch2 id=\"screenshots-and-command-execution\"\u003eScreenshots and Command Execution\u003c/h2\u003e\n\n\u003cp\u003eIn addition to clipboard monitoring, the malware captures five screenshots of the victim’s screen every ten seconds. These screenshots are sent to the command-and-control server using the curl tool. The article states that exfiltration occurs over Tor.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also reported support for remote code execution. This can be triggered by a C2 EVAL instruction. In that scenario, the malware downloads JavaScript content into a file named cfile and executes it on the infected machine.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance-mentioned-by-microsoft\"\u003eDetection Guidance Mentioned by Microsoft\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft researchers said the strongest indicators of infection are behavioral rather than signature-based. The article highlights monitoring for process activity involving wscript.exe and cscript.exe. It also recommends watching for unexpected launches of curl, PowerShell, and cmd.exe, along with unusual child processes.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies connections to localhost:9050 and Tor proxy activity as red flags associated with the campaign. These behaviors are tied to the malware’s use of Tor for command-and-control communications and data exfiltration.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe malware targets cryptocurrency users by attempting to steal or redirect sensitive wallet-related data. It can replace copied wallet addresses, monitor for seed phrases and private keys, and capture screenshots. Its USB-based self-spreading behavior and document-shortcut replacement technique create opportunities for repeated execution and propagation to additional removable drives.\u003c/p\u003e\n","keyPoints":["Threat actors have been distributing clipboard-stealing malware with self-spreading capabilities that targets cryptocurrency wallets and uses the Tor network to conceal communication.","The campaign has been active since at least February and uses LNK shortcut files on USB drives to trigger malware execution and stage additional payloads from a .ONION address.","The worm searches for document files, hides the originals, replaces them with malicious shortcuts using the same names, and creates a scheduled task to copy itself to newly connected USB storage devices.","The stealer checks the clipboard every half second for BIP39 seed phrases, Ethereum private keys, Bitcoin WIF keys, and Bitcoin, Tron, and Monero wallet addresses.","Microsoft says strong infection indicators include suspicious wscript.exe and cscript.exe activity, unexpected curl, PowerShell, and cmd.exe launches, unusual child processes, and connections to localhost:9050 or Tor proxy activity."],"insights":["The malware chooses replacement cryptocurrency addresses that partially resemble the victim’s copied address based on starting characters, making clipboard hijacking harder to notice during a quick visual check.","Microsoft emphasized that the strongest indicators of compromise are behavioral rather than signature-based, making process monitoring for script hosts, curl, PowerShell, cmd.exe, and Tor proxy activity especially important.","The worm increases its chance of repeated execution by hiding legitimate documents and replacing them with malicious shortcuts that use the same names, causing users to trigger the malware when trying to open their own files.","The stealer avoids running when Task Manager is active, indicating that user or analyst inspection may alter the malware’s execution behavior."],"referencedReports":[{"title":"Crypto clipper uses Tor, worm-like propagation for persistence, control","url":"https://www.microsoft.com/en-us/security/blog/2026/06/17/crypto-clipper-uses-tor-worm-like-propagation-for-persistence-control/","publisher":"Microsoft","context":"The article cites Microsoft researchers for technical details and detection guidance about the USB-spreading crypto clipper campaign.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors targeting cryptocurrency wallets have been distributing clipboard-stealing malware with self-spreading capabilities. The campaign has been active since at least February and uses LNK shortcut files on USB drives to start infections. The malware uses the Tor network to conceal communication and stages additional payloads from a .ONION address.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says the malware hides original document files and replaces them with malicious shortcuts bearing the same names. It also creates a scheduled task to monitor for newly connected USB storage devices, copy itself to them, and create more malicious shortcut files. The stealer checks clipboard contents for cryptocurrency wallet addresses, seed phrases, and private keys, and can capture screenshots for exfiltration over Tor.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets 12- and 24-word BIP39 seed phrases, Ethereum private keys, Bitcoin WIF keys, Bitcoin addresses, Tron addresses, and Monero addresses. It replaces detected wallet addresses with attacker-controlled ones that partially resemble the originals based on starting characters. Microsoft recommends looking for behavioral indicators such as suspicious wscript.exe and cscript.exe activity, unexpected curl, PowerShell, and cmd.exe launches, unusual child processes, localhost:9050 connections, and Tor proxy activity.\u003c/p\u003e\n"},{"n":24,"title":"Microsoft Details Windows Clipper Malware Campaign Using USB LNK Worm and Tor-Based C2","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-details-windows-clipper.html","time":"14:30","priority":"SHOULD READ","score":82,"tldr":"Microsoft detailed a Windows crypto-clipper campaign spreading through malicious USB LNK files that hides documents, persists with scheduled tasks, and uses Tor-based C2 to steal clipboard data, screenshots, seed phrases, and private keys. Defenders should focus on behavioral detections around script engines, removable-drive LNK execution, clipboard monitoring, and unusual Tor or PowerShell activity.","briefOverview":"\u003cp\u003eMicrosoft disclosed details of a Windows-based cryptocurrency clipper campaign that has targeted users since February 2026. The campaign uses malicious Windows Shortcut files distributed through USB storage devices to trigger a worm component and deploy a clipper. Microsoft said the malware performs high-frequency clipboard theft, screenshot exfiltration, and wallet-address substitution.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is notable because it does not rely on a traditional installer or exposed IP-based command-and-control infrastructure. Instead, it deploys a portable Tor client, routes traffic through a local SOCKS5 proxy, and polls a hidden-service C2 server. Microsoft said this combination turns a financially motivated stealer into a lightweight backdoor.\u003c/p\u003e\n\n\u003cp\u003eThe worm hides common document types on USB drives and creates matching LNK files that execute the malware when opened. The clipper uses Windows Script Host and ActiveXObject, creates scheduled tasks for persistence, and exits if Task Manager is running. Microsoft recommended behavioral detections and mitigations such as disabling AutoRun and AutoPlay, blocking LNK execution from removable drives, and restricting unnecessary use of wscript.exe and cscript.exe.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft detailed a Windows-based cryptocurrency clipper campaign that has targeted users since February 2026. The campaign is designed to steal cryptocurrency-related data by monitoring the clipboard and substituting wallet addresses with attacker-controlled alternatives. Microsoft Defender Security Research Team published the analysis and described the malware as combining data theft with remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe initial distribution method involves malicious Windows Shortcut files on USB storage devices. When a user opens the LNK file, a worm component checks whether the machine is already infected and fetches the payload from a remote server only if it is not present. The worm scans the USB device for common document types such as DOC, XLSX, and PDF, hides them, and creates new LNK files with the same filenames that point to the worm component.\u003c/p\u003e\n\n\u003cp\u003eThe clipper component uses Windows Script Host and ActiveX-driven logic to interact with the operating system. It deploys scheduled tasks for persistence and exits if Task Manager appears among actively running processes, which Microsoft described as an evasion behavior. The malware monitors the clipboard about every 500 milliseconds to extract seed phrases and private keys.\u003c/p\u003e\n\n\u003cp\u003eIn its final stage, the malware launches a renamed Tor binary in a hidden window and registers a unique victim identifier with an external server. It then polls a hidden-service command-and-control server through a local SOCKS5 proxy. Microsoft said the malware can upload screenshots through Tor and execute attacker-supplied code at runtime if the C2 returns an EVAL response.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft recommended defenders prioritize behavioral detections rather than static signatures. Specific behaviors to monitor include PowerShell-based screen capture and the use of WScript, CScript, or related script engines to launch curl, cmd.exe, PowerShell, or unexpected executables. Additional mitigations include disabling AutoRun and AutoPlay for removable media, blocking LNK execution from removable drives using Group Policy Objects, restricting unnecessary use of wscript.exe or cscript.exe, and reviewing clipboard and screen-capture behavior on systems handling sensitive financial workflows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft disclosed details of a Windows-based cryptocurrency clipper campaign that has targeted users since February 2026. The Microsoft Defender Security Research Team said the clipper relies on Windows Script Host and ActiveX-driven logic to launch a bundled Tor proxy and poll a hidden-service command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eThe malware performs high-frequency clipboard theft, screenshot exfiltration, and wallet-address substitution. Microsoft characterized the campaign as notable because it does not depend on a traditional installer or exposed IP-based C2 infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-campaign-is-notable\"\u003eWhy the Campaign Is Notable\u003c/h2\u003e\n\n\u003cp\u003eAccording to Microsoft, the malware deploys a portable Tor client and routes traffic through a local SOCKS5 proxy. This allows the campaign to communicate with a hidden-service C2 server rather than relying on exposed IP-based infrastructure.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also said the malware blends data theft with remote code execution. If the C2 returns an EVAL response, the malware executes attacker-supplied code at runtime, which Microsoft described as turning a financially motivated stealer into a lightweight backdoor.\u003c/p\u003e\n\n\u003ch2 id=\"malware-purpose-and-targeted-data\"\u003eMalware Purpose and Targeted Data\u003c/h2\u003e\n\n\u003cp\u003eThe malware is a cryptocurrency clipper, a type of malicious software that silently monitors a user\u0026rsquo;s clipboard. It targets cryptocurrency transactions by identifying wallet address strings that match known blockchain address patterns and replacing them with attacker-controlled wallet addresses.\u003c/p\u003e\n\n\u003cp\u003eIn this campaign, the clipper also monitors the clipboard about every 500 milliseconds. Microsoft said it extracts seed phrases and private keys, replaces copied wallet values with attacker-controlled alternatives, and uploads screenshots through Tor.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-through-usb-lnk-files\"\u003eDistribution Through USB LNK Files\u003c/h2\u003e\n\n\u003cp\u003eThe attacks distribute a malicious Windows Shortcut, or LNK, file through USB storage devices. Opening the shortcut triggers a worm component that checks whether the machine is already infected. If the malware is not present, the worm proceeds to fetch the payload from a remote server.\u003c/p\u003e\n\n\u003cp\u003eThe LNK payload scans the USB device for common document types, including DOC, XLSX, and PDF files. If such files are found, the malware hides them and creates new LNK files with the same filenames. These replacement shortcuts contain arguments that link to the worm component, so a user who thinks they are opening a document instead triggers malware execution.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-evasion\"\u003ePersistence and Evasion\u003c/h2\u003e\n\n\u003cp\u003eThe worm component propagates to other uncompromised USB drives. It also deploys scheduled tasks as a persistence mechanism for both the worm component and the stealer component.\u003c/p\u003e\n\n\u003cp\u003eThe clipper uses WScript and ActiveXObject to interact with the operating system. It exits if Task Manager is listed among actively running processes, which Microsoft identified as an attempt to evade detection.\u003c/p\u003e\n\n\u003ch2 id=\"tor-based-command-and-control\"\u003eTor-Based Command and Control\u003c/h2\u003e\n\n\u003cp\u003eIn the final stage of execution, the malware launches a renamed Tor binary in a hidden window. It generates a unique victim identifier and registers it with an external server.\u003c/p\u003e\n\n\u003cp\u003eAfter registration, the malware enters a continuous loop. It periodically polls the C2 server for instructions while simultaneously monitoring the clipboard for cryptocurrency-related secrets and wallet data.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several impacts from the campaign:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClipboard theft targeting cryptocurrency data.\u003c/li\u003e\n\u003cli\u003eWallet-address substitution that redirects transactions to attacker-controlled wallets.\u003c/li\u003e\n\u003cli\u003eSeed phrase and private key extraction.\u003c/li\u003e\n\u003cli\u003eScreenshot exfiltration through Tor.\u003c/li\u003e\n\u003cli\u003eRuntime execution of attacker-supplied code through C2-delivered EVAL responses.\u003c/li\u003e\n\u003cli\u003eUSB-based propagation through malicious LNK files.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response-and-mitigation-recommendations\"\u003eResponse and Mitigation Recommendations\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft recommended that defenders prioritize behavioral detections over static signatures. The company specifically advised looking for PowerShell-based screen capture and the use of WScript, CScript, or related script engines to launch curl, cmd.exe, PowerShell, or unexpected executables.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also recommended several mitigations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisable AutoRun and AutoPlay for all removable media.\u003c/li\u003e\n\u003cli\u003eBlock LNK execution from removable drives through Group Policy Objects.\u003c/li\u003e\n\u003cli\u003eRestrict unnecessary use of wscript.exe and cscript.exe.\u003c/li\u003e\n\u003cli\u003eReview clipboard-related and screen-capture behaviors on devices handling sensitive financial workflows.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"named-parties-and-actor-information\"\u003eNamed Parties and Actor Information\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft and the Microsoft Defender Security Research Team are the named entities associated with the analysis. The article does not name a specific threat actor or group behind the campaign. The affected population is described broadly as Windows users targeted since February 2026.\u003c/p\u003e\n","keyPoints":["Microsoft disclosed a Windows-based cryptocurrency clipper campaign that has targeted users since February 2026.","The campaign spreads through malicious Windows Shortcut files distributed via USB storage devices, with the worm hiding common document files and creating matching LNK files to trigger malware execution.","The clipper uses Windows Script Host and ActiveX-driven logic to launch a bundled Tor proxy, poll a hidden-service command-and-control server, and perform clipboard theft, screenshot exfiltration, and wallet-address substitution.","The malware creates scheduled tasks for persistence and exits if Task Manager is running to evade detection.","Microsoft recommended behavioral detections and mitigations such as disabling AutoRun and AutoPlay, blocking LNK execution from removable drives, restricting wscript.exe and cscript.exe, and reviewing clipboard-related and screen-capture behavior on sensitive devices."],"insights":["The campaign avoids reliance on exposed IP-based command-and-control infrastructure by deploying a portable Tor client and routing traffic through a local SOCKS5 proxy.","The malware combines cryptocurrency clipping with remote code execution through C2-delivered EVAL responses, making it function as a lightweight backdoor rather than only a financial stealer.","The USB worm increases user deception by hiding legitimate documents and replacing them with LNK files using the same filenames.","Microsoft emphasized behavioral detection because static signatures are less suitable for this campaign’s script-driven execution and Tor-based communications."],"referencedReports":[{"title":"Crypto clipper uses Tor, worm-like propagation for persistence, control","url":"https://www.microsoft.com/en-us/security/blog/2026/06/17/crypto-clipper-uses-tor-worm-like-propagation-for-persistence-control/","publisher":"Microsoft Defender Security Research Team","context":"The article cites Microsoft’s analysis as the source for details about the Windows cryptocurrency clipper campaign, including its Tor-based C2, USB LNK worm propagation, clipboard theft, screenshot exfiltration, and wallet-address substitution.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft disclosed details of a Windows-based cryptocurrency clipper campaign that has targeted users since February 2026. The campaign uses malicious Windows Shortcut files distributed through USB storage devices to trigger a worm component and deploy a clipper. Microsoft said the malware performs high-frequency clipboard theft, screenshot exfiltration, and wallet-address substitution.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is notable because it does not rely on a traditional installer or exposed IP-based command-and-control infrastructure. Instead, it deploys a portable Tor client, routes traffic through a local SOCKS5 proxy, and polls a hidden-service C2 server. Microsoft said this combination turns a financially motivated stealer into a lightweight backdoor.\u003c/p\u003e\n\n\u003cp\u003eThe worm hides common document types on USB drives and creates matching LNK files that execute the malware when opened. The clipper uses Windows Script Host and ActiveXObject, creates scheduled tasks for persistence, and exits if Task Manager is running. Microsoft recommended behavioral detections and mitigations such as disabling AutoRun and AutoPlay, blocking LNK execution from removable drives, and restricting unnecessary use of wscript.exe and cscript.exe.\u003c/p\u003e\n"},{"n":3,"title":"npm v12’s Biggest Security Change: From Implicit to Explicit Trust","source":"jfrog.com","sourceColorIdx":8,"link":"https://jfrog.com/blog/npm-v12-from-implicit-to-explicit-trust/","time":"13:29","priority":"SHOULD READ","score":78,"tldr":"npm v12 will shift package installs from implicit to explicit trust by blocking lifecycle scripts, Git dependencies, and remote URL dependencies by default unless approved. This should reduce common supply-chain attack paths, but developers still need strict version pinning and monitoring because attackers may target already-approved packages or move malicious code to runtime execution.","briefOverview":"\u003cp\u003enpm v12, estimated for release in July 2026, introduces a major security change by moving npm package installation from implicit trust to explicit trust. The article says npm has historically executed or retrieved code from lifecycle scripts, Git repositories, remote URLs, and transitive dependencies automatically during installation. npm v12 changes this by blocking several high-risk installation mechanisms by default unless users explicitly approve them.\u003c/p\u003e\n\n\u003cp\u003eThe new controls focus on \u003ccode\u003eallowScripts\u003c/code\u003e, \u003ccode\u003e--allow-git\u003c/code\u003e, and \u003ccode\u003e--allow-remote\u003c/code\u003e, which JFrog says were involved in about 53% of malicious npm attacks observed over the past year. \u003ccode\u003eallowScripts\u003c/code\u003e blocks third-party lifecycle scripts by default, while \u003ccode\u003e--allow-git\u003c/code\u003e and \u003ccode\u003e--allow-remote\u003c/code\u003e restrict dependencies installed from Git repositories and remote URLs. The article cites campaigns including Shai-Hulud variants, easy-day-js, CanisterWorm, and PhantomRaven as examples of abuse involving these mechanisms.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that npm v12 does not eliminate npm supply chain attacks. Attackers may target packages that organizations have already approved or shift malicious behavior to runtime execution through import-time execution or runtime invocation. The recommended response is to combine script approvals with strict version pinning, controlled upgrades, continued scanning, and repeated review of trusted packages.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes npm v12 as a major shift in npm’s security model, moving package installation from implicit trust to explicit trust. Historically, npm would automatically execute lifecycle scripts or retrieve code from sources such as Git repositories, remote URLs, and transitive dependencies during installation. The article says this model placed much of the responsibility for detecting malicious behavior on scanners, malware detection tools, and developers rather than on npm itself.\u003c/p\u003e\n\n\u003cp\u003enpm v12, estimated for release in July 2026, will block three high-risk installation vectors by default unless explicitly approved. These are \u003ccode\u003eallowScripts\u003c/code\u003e, which governs lifecycle script execution, \u003ccode\u003e--allow-git\u003c/code\u003e, which controls installation from Git repositories, and \u003ccode\u003e--allow-remote\u003c/code\u003e, which controls installation from remote URLs such as HTTPS tarballs. According to the article, JFrog found that these vectors were involved in approximately 53% of malicious npm attacks observed during the past year.\u003c/p\u003e\n\n\u003cp\u003eThe article gives several examples of lifecycle script abuse, including Shai-Hulud variants, easy-day-js, and CanisterWorm. In these cases, attackers used scripts such as \u003ccode\u003epreinstall\u003c/code\u003e and \u003ccode\u003epostinstall\u003c/code\u003e to execute malicious payloads during installation, steal credentials, compromise developer environments, or spread to additional packages. JFrog identified lifecycle scripts in 46% of malicious npm packages observed during the past year, excluding Bid Red.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights Git-based and remote URL dependencies as under-monitored attack surfaces. In Shai-Hulud activity, attackers used GitHub-hosted dependencies through \u003ccode\u003eoptionalDependencies\u003c/code\u003e to keep malicious logic outside the npm package tarball. In the PhantomRaven campaign, attackers used Remote Dynamic Dependencies by publishing npm packages that referenced attacker-controlled HTTPS-hosted tarballs during installation.\u003c/p\u003e\n\n\u003cp\u003eThe article says attackers are likely to adapt to npm v12’s controls by targeting packages that organizations have already approved or by moving execution away from installation time. Runtime execution techniques discussed include import-time execution, where code runs as soon as a module is imported, and runtime invocation, where code runs when a specific function or feature is called. The article recommends strict version pinning, temporary trust assumptions, controlled upgrades, and ongoing monitoring for approved packages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that npm v12, estimated to be released in July 2026, introduces a major security-focused change to npm package installation. It frames the change as a move from an implicit trust model to an explicit trust model. Under the previous model, npm typically executed installation scripts or retrieved code from sources such as the npm registry, Git repositories, remote URLs, and transitive dependencies without requiring explicit approval.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that this historic behavior created opportunities for attackers to abuse installation-time execution. Recent npm malware campaigns, including multiple Shai-Hulud variants, are cited as examples of attackers using installation-time behavior to steal credentials, exfiltrate secrets, compromise developer workstations, and gain access to CI/CD environments.\u003c/p\u003e\n\n\u003ch2 id=\"core-npm-v12-security-change\"\u003eCore npm v12 Security Change\u003c/h2\u003e\n\n\u003cp\u003enpm v12 will block three high-risk installation mechanisms by default unless they are explicitly approved:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eallowScripts\u003c/code\u003e, which controls lifecycle script execution during installation.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e--allow-git\u003c/code\u003e, which controls installation from Git repositories, including direct and indirect dependencies.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e--allow-remote\u003c/code\u003e, which controls installation from remote URLs, including direct and indirect dependencies.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these mechanisms were previously enabled by default. Beginning with npm v12, they will be disabled by default and must be explicitly approved before use. According to the article, JFrog Security Research found that these three vectors were involved in approximately 53% of malicious npm attacks observed throughout the past year.\u003c/p\u003e\n\n\u003ch2 id=\"allowscripts-and-lifecycle-script-abuse\"\u003e\u003ccode\u003eallowScripts\u003c/code\u003e and Lifecycle Script Abuse\u003c/h2\u003e\n\n\u003cp\u003e\u003ccode\u003eallowScripts\u003c/code\u003e is described as a security configuration field in npm’s \u003ccode\u003epackage.json\u003c/code\u003e introduced in npm v11.10.0 in February 2026. It controls which third-party packages are allowed to execute lifecycle scripts during \u003ccode\u003enpm install\u003c/code\u003e. Examples of lifecycle scripts listed in the article include \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, \u003ccode\u003epostinstall\u003c/code\u003e, \u003ccode\u003eprepare\u003c/code\u003e, and \u003ccode\u003ebinding.gyp\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eWith npm v12, \u003ccode\u003eallowScripts\u003c/code\u003e defaults to off. This means third-party packages cannot execute lifecycle scripts during installation unless explicitly approved. The article says this directly addresses one of the most common malware execution techniques in the npm ecosystem.\u003c/p\u003e\n\n\u003cp\u003eJFrog identified that 46% of malicious npm packages observed over the past year used lifecycle script execution, excluding Bid Red. The article says most of these cases abused \u003ccode\u003epreinstall\u003c/code\u003e and \u003ccode\u003epostinstall\u003c/code\u003e mechanisms.\u003c/p\u003e\n\n\u003ch3 id=\"campaigns-involving-lifecycle-scripts\"\u003eCampaigns Involving Lifecycle Scripts\u003c/h3\u003e\n\n\u003cp\u003eThe article cites several campaigns that abused npm lifecycle scripts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eShai-Hulud variants:\u003c/strong\u003e These campaigns used lifecycle scripts to execute malicious code during installation, enabling credential theft, repository compromise, and worm-like propagation across npm. One Shai-Hulud campaign used malicious \u003ccode\u003epreinstall\u003c/code\u003e scripts in compromised packages, including an example involving an \u003ccode\u003e@uipath\u003c/code\u003e package.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShai-Hulud: Miasma:\u003c/strong\u003e This campaign targeted the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e namespace and compromised 31 package versions. The payload executed through npm lifecycle scripts before legitimate application code was loaded.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eeasy-day-js:\u003c/strong\u003e The attacker first published a clean typosquatting copy of the legitimate \u003ccode\u003edayjs\u003c/code\u003e library as \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e. The attacker then published \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e with a \u003ccode\u003epostinstall\u003c/code\u003e script, and affected installations using a caret version range could automatically fetch the malicious version.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCanisterWorm:\u003c/strong\u003e This campaign compromised packages in the \u003ccode\u003e@emilgroup\u003c/code\u003e and \u003ccode\u003e@teale.io\u003c/code\u003e namespaces and used a malicious \u003ccode\u003epostinstall\u003c/code\u003e script to deploy a Python-based backdoor. The malware harvested npm authentication tokens and attempted to spread by compromising additional packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article concludes that these campaigns relied on the assumption that npm would automatically execute lifecycle scripts during installation. Requiring explicit approval in npm v12 increases the difficulty of abusing this execution path.\u003c/p\u003e\n\n\u003ch2 id=\"allow-git-and-git-dependency-controls\"\u003e\u003ccode\u003e--allow-git\u003c/code\u003e and Git Dependency Controls\u003c/h2\u003e\n\n\u003cp\u003e\u003ccode\u003e--allow-git\u003c/code\u003e is described as a security configuration flag introduced in npm v11.10.0 in February 2026. It controls whether third-party packages can be installed from Git repositories during \u003ccode\u003enpm install\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eBeginning with npm v12, Git-based dependencies are disabled by default unless explicitly approved. This applies to both direct Git dependencies and transitive dependencies introduced through the dependency graph. The article says this addresses a less visible attack surface because Git-based dependency resolution can bypass some of the controls and visibility associated with the npm registry.\u003c/p\u003e\n\n\u003cp\u003eJFrog identified Git-based dependency resolution in approximately 3.5% of malicious npm packages over the past year. The article’s strongest example is from the evolution of the Shai-Hulud: Here We Go Again campaign. In that campaign, attackers introduced a GitHub-hosted dependency through \u003ccode\u003eoptionalDependencies\u003c/code\u003e, causing npm to fetch and install code directly from a Git repository.\u003c/p\u003e\n\n\u003cp\u003eThe article says a similar Shai-Hulud technique used a GitHub-hosted dependency called \u003ccode\u003e@sap/setup\u003c/code\u003e that contained the malicious payload. This allowed attackers to keep malicious code outside the npm tarball, evade detection focused on registry content, and maintain the ability to modify payloads at the source repository level.\u003c/p\u003e\n\n\u003ch2 id=\"allow-remote-and-remote-url-dependency-controls\"\u003e\u003ccode\u003e--allow-remote\u003c/code\u003e and Remote URL Dependency Controls\u003c/h2\u003e\n\n\u003cp\u003e\u003ccode\u003e--allow-remote\u003c/code\u003e is described as a security configuration flag introduced in npm v11.15.0 in May 2026. It controls whether third-party packages, including direct and transitive dependencies, can be installed from remote URLs such as HTTPS tarballs during \u003ccode\u003enpm install\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eBeginning with npm v12, dependencies resolved from remote URLs are disabled by default unless explicitly approved. The article says this targets a historically under-monitored attack surface because remote URL dependencies originate outside the npm registry and operate outside npm’s governance and inspection boundaries.\u003c/p\u003e\n\n\u003cp\u003eJFrog identified remote dependency resolution in approximately 3.5% of malicious npm packages over the past year. The article cites PhantomRaven as a notable example of remote dependency abuse.\u003c/p\u003e\n\n\u003cp\u003eIn the PhantomRaven campaign, attackers published more than 200 npm packages that appeared largely benign in the registry. During installation, those packages referenced attacker-controlled HTTPS-hosted tarballs as dependencies. npm then automatically fetched the remote artifacts and added them to the dependency tree.\u003c/p\u003e\n\n\u003ch2 id=\"external-dependency-execution-risks\"\u003eExternal Dependency Execution Risks\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that both Git-based and remote URL dependency attacks provide several advantages to attackers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRegistry-hosted packages may appear harmless during insp
