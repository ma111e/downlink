ection.\u003c/li\u003e\n\u003cli\u003eSecurity tooling focused on npm metadata may fail to detect externally hosted payloads.\u003c/li\u003e\n\u003cli\u003eRemote artifacts can be modified without publishing new npm versions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these models decouple malicious execution from package publication. Instead of placing the payload entirely in a registry-hosted npm package, attackers can shift malicious code to external infrastructure that is not governed by npm policies or review mechanisms.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes a limitation of these approaches: execution is not guaranteed. Code retrieved from Git repositories or remote URLs does not automatically execute merely because it is downloaded or resolved. In most cases, it becomes active only after full installation and lifecycle script execution, or later when the package is imported and executed by the application.\u003c/p\u003e\n\n\u003ch2 id=\"expected-attacker-adaptation\"\u003eExpected Attacker Adaptation\u003c/h2\u003e\n\n\u003cp\u003eThe article says npm v12 significantly raises the bar for protection against software supply chain attacks, but it also says attackers will adapt. It identifies two broad areas of expected adaptation: compromising packages with already-trusted scripts and moving beyond installation-time execution.\u003c/p\u003e\n\n\u003ch3 id=\"targeting-already-trusted-scripts\"\u003eTargeting Already-Trusted Scripts\u003c/h3\u003e\n\n\u003cp\u003eThe article expects attackers to focus more on packages already approved through \u003ccode\u003eallowScripts\u003c/code\u003e or \u003ccode\u003eapprove-scripts\u003c/code\u003e configurations. Some widely used packages rely on installation scripts for legitimate reasons, including compiling native modules, downloading platform-specific binaries, or performing setup tasks.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples of legitimate script-using packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eesbuild\u003c/code\u003e, which used a \u003ccode\u003epostinstall\u003c/code\u003e script.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epuppeteer\u003c/code\u003e, which used a \u003ccode\u003epostinstall\u003c/code\u003e script.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enode-sass\u003c/code\u003e, which used \u003ccode\u003epostinstall\u003c/code\u003e and \u003ccode\u003ebinding.gyp\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article warns that once a package is approved, future versions may inherit that trust decision by default. If an attacker compromises a maintainer account, publishing pipeline, or transitive dependency, malicious installation logic could be introduced into a package that is already trusted in many environments.\u003c/p\u003e\n\n\u003ch3 id=\"runtime-execution-techniques\"\u003eRuntime Execution Techniques\u003c/h3\u003e\n\n\u003cp\u003eThe article says attackers may move execution further into application runtime as lifecycle scripts, Git dependencies, and remote URL dependencies become more restricted. JFrog identified techniques not directly mitigated by npm v12 in 47% of malicious npm campaigns observed over the past year.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two runtime malware categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eImport Time Execution:\u003c/strong\u003e Malicious code executes as soon as a package is imported into an application, even if the application does not call any package functions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRuntime Invocation:\u003c/strong\u003e Malicious code executes only when a specific function, method, or feature is invoked.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites Astral Injection from April 2026 as an example of a campaign that implemented both install-time execution through a \u003ccode\u003epreinstall\u003c/code\u003e hook and runtime execution triggered when the module was imported. It also cites a November 2025 Crypto Stealer campaign involving \u003ccode\u003e@validate-ethereum-address/core\u003c/code\u003e, which called a function in the \u003ccode\u003eaes-core-valid-ipherv\u003c/code\u003e dependency. JFrog researchers found that the function contained hidden logic that searched for secrets and exfiltrated them to an attacker-controlled endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the use of transitive dependencies to hide malicious functionality. Attackers can place malicious code in indirect dependencies rather than directly in the package that developers install, making it harder for developers and security tools to identify the source of the behavior during direct package inspection.\u003c/p\u003e\n\n\u003ch2 id=\"developer-adoption-guidance\"\u003eDeveloper Adoption Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that organizations adopting \u003ccode\u003eallowScripts\u003c/code\u003e or \u003ccode\u003eapprove-scripts\u003c/code\u003e avoid granting trust at the package level alone. It says approvals should be combined with strict version pinning whenever possible.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts approving a package through \u003ccode\u003eallowScripts\u003c/code\u003e with pinning a dependency to a specific version. Approving only the package name can implicitly trust the current version and future versions. Pinning a dependency to a reviewed version ensures that the approved package version cannot silently change during future installations.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends treating approval as temporary trust. Even if a package is approved, future versions may inherit that decision, and a compromised maintainer account, publishing pipeline, or dependency chain could make a previously trusted package risky. Approved packages should continue to be scanned and monitored over time.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents npm v12 as a significant security change because it changes npm’s default assumption from “execute unless blocked” to “deny unless trusted.” It does not claim npm v12 eliminates supply chain attacks. Instead, it argues that forcing explicit approval for commonly abused installation paths increases attacker cost and improves visibility into code entering development environments.\u003c/p\u003e\n\n\u003cp\u003eThe central takeaway is that npm v12 introduces default-deny controls for lifecycle scripts, Git dependencies, and remote URL dependencies. These controls directly address installation mechanisms used in many recent npm malware campaigns, while leaving runtime execution and already-approved packages as continuing areas of risk.\u003c/p\u003e\n","keyPoints":["npm v12 will move package installation from an implicit trust model to an explicit trust model by blocking certain high-risk installation mechanisms by default unless they are explicitly approved.","The npm v12 controls target three mechanisms: allowScripts for lifecycle script execution, --allow-git for Git repository dependencies, and --allow-remote for remote URL dependencies.","JFrog says these three installation vectors were involved in approximately 53% of malicious npm attacks observed over the past year.","The article cites Shai-Hulud variants, easy-day-js, CanisterWorm, and PhantomRaven as examples of campaigns that abused lifecycle scripts, Git dependencies, or remote URL dependencies.","The article recommends that organizations using allowScripts or approve-scripts combine approvals with strict version pinning and re-evaluate trust during upgrades."],"insights":["Lifecycle scripts are the highest-impact control area because JFrog found that 46% of malicious npm packages observed over the past year used them, with preinstall and postinstall being the most commonly abused mechanisms.","Git and remote URL dependencies are especially useful to attackers because they can keep malicious payloads outside the npm registry, where registry-focused inspection and metadata-based security tools may not see them.","Approval of install scripts can become a long-term risk if it is granted at the package level, because future versions of an already-approved package may inherit trust after a maintainer account, publishing pipeline, or dependency chain is compromised.","npm v12’s installation controls do not address runtime malware techniques, and JFrog found that techniques not directly mitigated by npm v12 appeared in 47% of malicious npm campaigns observed over the past year.","Some campaigns already combine install-time and runtime execution paths, as shown by Astral Injection, where the payload could execute through a preinstall hook or later when the package was imported."],"referencedReports":[],"body":"\u003cp\u003enpm v12, estimated for release in July 2026, introduces a major security change by moving npm package installation from implicit trust to explicit trust. The article says npm has historically executed or retrieved code from lifecycle scripts, Git repositories, remote URLs, and transitive dependencies automatically during installation. npm v12 changes this by blocking several high-risk installation mechanisms by default unless users explicitly approve them.\u003c/p\u003e\n\n\u003cp\u003eThe new controls focus on \u003ccode\u003eallowScripts\u003c/code\u003e, \u003ccode\u003e--allow-git\u003c/code\u003e, and \u003ccode\u003e--allow-remote\u003c/code\u003e, which JFrog says were involved in about 53% of malicious npm attacks observed over the past year. \u003ccode\u003eallowScripts\u003c/code\u003e blocks third-party lifecycle scripts by default, while \u003ccode\u003e--allow-git\u003c/code\u003e and \u003ccode\u003e--allow-remote\u003c/code\u003e restrict dependencies installed from Git repositories and remote URLs. The article cites campaigns including Shai-Hulud variants, easy-day-js, CanisterWorm, and PhantomRaven as examples of abuse involving these mechanisms.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that npm v12 does not eliminate npm supply chain attacks. Attackers may target packages that organizations have already approved or shift malicious behavior to runtime execution through import-time execution or runtime invocation. The recommended response is to combine script approvals with strict version pinning, controlled upgrades, continued scanning, and repeated review of trusted packages.\u003c/p\u003e\n"},{"n":6,"title":"Bulgaria allowed surveillance tech firm to sell products to repressive regimes, report says","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/bulgaria-allowed-surveillance-tech-firm-to-sell-to-repressive-regimes-report","time":"19:30","priority":"SHOULD READ","score":78,"tldr":"Human Rights Watch says Bulgaria approved exports of Circles surveillance tools from 2018 to 2023 to governments with records of repression, enabling phone interception, location tracking, and internet monitoring. The report argues the case shows serious failures in the EU’s export controls for spyware and surveillance technology.","briefOverview":"\u003cp\u003eHuman Rights Watch obtained export licensing records from 2018 through 2023 showing that Bulgaria allowed the surveillance firm Circles to sell technology to law enforcement and intelligence agencies in several countries. The reported destinations were El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco, and Panama. The article says many of these countries have records of repressing citizens, and some have previously used spyware against dissidents and journalists.\u003c/p\u003e\n\n\u003cp\u003eThe findings place the European Union’s export control regime under scrutiny because it is intended to stop the sale of sophisticated surveillance technology that can enable repression. Human Rights Watch said the European Commission has evidence that EU governments have issued licenses without serious human rights due diligence. The European Commission told the nonprofit that member states are solely responsible for licensing decisions on dual-use exports.\u003c/p\u003e\n\n\u003cp\u003eCircles reportedly sold tools including Pixcell, which can capture internet data, phone calls, and messages, and Landmark, which geolocates mobile phones in real time. Human Rights Watch also cited Circles documents describing “Voice Over Location Enabler” software that uses SS7 protocol to remotely intercept incoming and outgoing voice calls and collect location data. Human Rights Watch said it could not obtain records for 2025 or 2026, so it is unclear whether the sales are still happening.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new Human Rights Watch report says Bulgaria allowed a Bulgaria-based surveillance technology firm, Circles, to export products to countries known for repressing citizens. The nonprofit obtained export licensing records covering 2018 through 2023. Those records show the Bulgarian government allowed Circles to sell technology to law enforcement and intelligence agencies in El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco, and Panama.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the records as a serious challenge for the European Union’s export control regime. That regime is meant to stop the sale of sophisticated surveillance technology that can be used for repression. Human Rights Watch said EU governments should be clamping down on these exports rather than “rubber-stamping” them, and argued that the European Commission appears not to have acted despite having a legal framework to control such exports.\u003c/p\u003e\n\n\u003cp\u003eThe tools described in the report include several powerful surveillance systems. Circles sold Pixcell, which the Human Rights Watch press release said can capture internet data, phone calls, and messages. It also sold Landmark, which geolocates mobile phones in real time, and “Voice Over Location Enabler” software that uses SS7 protocol to remotely intercept incoming and outgoing voice calls and collect both parties’ locations.\u003c/p\u003e\n\n\u003cp\u003eCircles presents its technology as intended for use against terrorism and crime. The article says human rights and digital freedoms advocates have long complained that the company’s technology has been abused, and that this has previously been documented. Human Rights Watch said it contacted Circles four times for comment and did not receive a response.\u003c/p\u003e\n\n\u003cp\u003eThe Bulgarian government told Human Rights Watch that exports contradicting national, European, and international commitments, including human rights protections, are not allowed. It also said the Ministry maintains zero tolerance for abuses and strictly monitors compliance with established rules. The European Commission told the nonprofit that member states are solely responsible for dual-use export licensing decisions, while the Bulgarian government and the European Commission did not immediately respond to the article’s requests for comment.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Circles was co-founded by Tal Dilian, who is described as the executive behind the blacklisted spyware firm Intellexa. In February, a Greek court found Dilian guilty on charges related to how Intellexa was used to spy on civil society members, including journalists and politicians. Human Rights Watch could not obtain records for 2025 or 2026, so the article says it is unclear whether the sales are still happening.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHuman Rights Watch reported that Bulgaria allowed the Bulgaria-based surveillance technology firm Circles to export surveillance products to countries known for repressing citizens. The nonprofit obtained export licensing records covering the period from 2018 through 2023. According to the article, those records show that the Bulgarian government authorized Circles to sell technology to law enforcement and intelligence agencies in multiple countries.\u003c/p\u003e\n\n\u003cp\u003eThe countries named in the records are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEl Salvador\u003c/li\u003e\n\u003cli\u003eUnited Arab Emirates\u003c/li\u003e\n\u003cli\u003eSerbia\u003c/li\u003e\n\u003cli\u003eAzerbaijan\u003c/li\u003e\n\u003cli\u003eGuatemala\u003c/li\u003e\n\u003cli\u003eBahrain\u003c/li\u003e\n\u003cli\u003eJordan\u003c/li\u003e\n\u003cli\u003eMalaysia\u003c/li\u003e\n\u003cli\u003eMorocco\u003c/li\u003e\n\u003cli\u003ePanama\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says many of these countries have long records of crushing dissent, and some have previously used spyware to snoop on dissidents and journalists.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-eu-export-controls\"\u003eSignificance for EU export controls\u003c/h2\u003e\n\n\u003cp\u003eThe article says the documents put the European Union’s export control regime “in a harsh light.” That regime is intended to stop the sale of sophisticated surveillance technology. The article states that the EU has struggled to control the flow of spyware and other surveillance technology from being sold outside its borders, despite calls for stronger action.\u003c/p\u003e\n\n\u003cp\u003eZach Campbell, senior surveillance researcher at Human Rights Watch, said EU governments should be clamping down on exports of tools that can be used for repression rather than “rubber-stamping” them. He also said the European Commission has evidence that EU governments have been issuing licenses seemingly without serious human rights due diligence. According to Campbell, the Commission appears to have taken no action despite having a legal framework to control this issue.\u003c/p\u003e\n\n\u003cp\u003eThe European Commission told Human Rights Watch that member states are “solely responsible for licensing decisions on dual-use exports.” The article says the Bulgarian government and the European Commission did not immediately respond to requests for comment.\u003c/p\u003e\n\n\u003ch2 id=\"export-licensing-records\"\u003eExport licensing records\u003c/h2\u003e\n\n\u003cp\u003eThe licensing records cited by Human Rights Watch originated with the Bulgarian Ministry of Economy and Industry department responsible for supporting or blocking export license applications for Bulgarian companies. Human Rights Watch obtained records for 2018 through 2023. It could not get records for 2025 or 2026, so the article states that it is unclear whether the sales are still happening.\u003c/p\u003e\n\n\u003cp\u003eThe Bulgarian government told Human Rights Watch that exports contradicting Bulgaria’s national, European, and international commitments, including commitments concerning the protection of human rights, are not allowed. It also said the Ministry maintains a consistent policy of zero tolerance for abuses and strictly monitors compliance with established rules.\u003c/p\u003e\n\n\u003ch2 id=\"surveillance-tools-described\"\u003eSurveillance tools described\u003c/h2\u003e\n\n\u003cp\u003eThe article says Circles sold several tools to the governments named in the licensing records. These tools were described as powerful surveillance technologies capable of intercepting communications, collecting internet data, and tracking mobile phones.\u003c/p\u003e\n\n\u003cp\u003eThe named tools include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePixcell:\u003c/strong\u003e Human Rights Watch said this system is capable of capturing internet data, phone calls, and messages.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLandmark:\u003c/strong\u003e This system geolocates mobile phones in real time.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVoice Over Location Enabler:\u003c/strong\u003e Human Rights Watch cited Circles documents saying this software uses SS7 protocol to remotely intercept targets’ incoming and outgoing voice calls, as well as data including both parties’ locations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Circles, like many firms selling powerful surveillance technology, describes its tools as intended exclusively for combating terrorism and crime. It also states that human rights and digital freedoms advocates have long complained that the company’s technology has been abused, and that this has been documented in the past.\u003c/p\u003e\n\n\u003ch2 id=\"company-and-related-figures\"\u003eCompany and related figures\u003c/h2\u003e\n\n\u003cp\u003eCircles is identified as a Bulgaria-based surveillance technology firm. Human Rights Watch said it contacted Circles for comment four times and did not receive a response.\u003c/p\u003e\n\n\u003cp\u003eThe article says Circles was co-founded by Tal Dilian. Dilian is described as the executive behind the blacklisted spyware firm Intellexa. In February, a Greek court found Dilian guilty on charges related to how Intellexa was used to spy on civil society members, including journalists and politicians.\u003c/p\u003e\n\n\u003ch2 id=\"prior-human-rights-watch-findings\"\u003ePrior Human Rights Watch findings\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that in May, Human Rights Watch published a report saying European surveillance technology companies have sold spyware to repressive governments. The countries associated with those companies included Finland, Poland, Denmark, the Czech Republic, Estonia, and Bulgaria.\u003c/p\u003e\n\n\u003cp\u003eHuman Rights Watch also said in that prior report that France, Greece, Spain, Germany, and Italy, all described as known exporters of surveillance technology, would not provide trade records.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eThe reported impact is that governments with records of repression were allowed to acquire technology capable of monitoring conversations, tracking mobile phone locations, and observing web browsing and internet data. The article emphasizes that these capabilities can enable snooping on citizens, dissidents, journalists, and other targets.\u003c/p\u003e\n\n\u003cp\u003eThe responses described in the article were limited. Bulgaria told Human Rights Watch that it does not allow exports that contradict human rights-related commitments and that it strictly monitors compliance. The European Commission told the nonprofit that member states are responsible for dual-use export licensing decisions. Circles did not respond to four requests for comment from Human Rights Watch.\u003c/p\u003e\n","keyPoints":["Human Rights Watch obtained export licensing records showing that Bulgaria allowed the surveillance firm Circles to sell technology to law enforcement and intelligence agencies in El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco, and Panama from 2018 through 2023.","The report says Circles sold tools including Pixcell, which can capture internet data, phone calls, and messages, and Landmark, which geolocates mobile phones in real time.","Human Rights Watch said Circles also sold “Voice Over Location Enabler” software that uses SS7 protocol to remotely intercept targets’ incoming and outgoing voice calls and collect location data for both parties.","The article says the documents cast the European Union’s export control regime in a harsh light because the EU has struggled to control sales of spyware and surveillance technology beyond its borders.","Bulgaria told Human Rights Watch that exports contradicting national, European, and international commitments, including human rights protections, are not allowed, while the European Commission said member states are solely responsible for licensing decisions on dual-use exports."],"insights":["The licensing records cover 2018 through 2023, but Human Rights Watch could not obtain records for 2025 or 2026, leaving the current status of the reported exports unknown.","The European Commission told Human Rights Watch that member states are solely responsible for dual-use export licensing, highlighting a practical enforcement gap in the EU-wide export control regime described in the article.","Some of the exported Circles tools relied on SS7-based interception capabilities, showing that the reported surveillance sales involved telecom-network-level access rather than only device-level spyware.","Human Rights Watch said Circles did not respond after being contacted four times, while Bulgaria and the European Commission gave responses to the nonprofit, creating an accountability gap around the vendor’s role in the reported exports."],"referencedReports":[{"title":"Bulgaria: Licensed Surveillance Exports to Rights Violators","url":"https://www.hrw.org/news/2026/06/18/bulgaria-licensed-surveillance-exports-to-rights-violators","publisher":"Human Rights Watch","context":"The article relies on Human Rights Watch’s findings and export licensing records about Bulgaria allowing Circles surveillance exports to governments with human rights concerns.","category":"","primary":false}],"body":"\u003cp\u003eHuman Rights Watch obtained export licensing records from 2018 through 2023 showing that Bulgaria allowed the surveillance firm Circles to sell technology to law enforcement and intelligence agencies in several countries. The reported destinations were El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco, and Panama. The article says many of these countries have records of repressing citizens, and some have previously used spyware against dissidents and journalists.\u003c/p\u003e\n\n\u003cp\u003eThe findings place the European Union’s export control regime under scrutiny because it is intended to stop the sale of sophisticated surveillance technology that can enable repression. Human Rights Watch said the European Commission has evidence that EU governments have issued licenses without serious human rights due diligence. The European Commission told the nonprofit that member states are solely responsible for licensing decisions on dual-use exports.\u003c/p\u003e\n\n\u003cp\u003eCircles reportedly sold tools including Pixcell, which can capture internet data, phone calls, and messages, and Landmark, which geolocates mobile phones in real time. Human Rights Watch also cited Circles documents describing “Voice Over Location Enabler” software that uses SS7 protocol to remotely intercept incoming and outgoing voice calls and collect location data. Human Rights Watch said it could not obtain records for 2025 or 2026, so it is unclear whether the sales are still happening.\u003c/p\u003e\n"},{"n":10,"title":"Klue Third-Party Cybersecurity Incident","source":"jamf.com","sourceColorIdx":3,"link":"https://www.jamf.com/blog/klue-incident/","time":"18:06","priority":"SHOULD READ","score":78,"tldr":"Jamf disclosed that a cybersecurity incident at third-party vendor Klue allowed unauthorized access to Jamf Salesforce data via Klue’s integration, but Jamf says its products and customer service operations were not affected. Jamf disabled the integration, is investigating the exposed business data, and warned customers to watch for phishing attempts using Salesforce contact information.","briefOverview":"\u003cp\u003eJamf disclosed an ongoing cybersecurity incident involving Klue, a third-party vendor Jamf uses for competitive intelligence services. According to Jamf, the incident occurred within Klue’s environment, where an unauthorized party gained access to Jamf’s Salesforce instance data through Klue’s integration. Jamf said the incident did not affect Jamf’s products and did not impact its ability to serve customers.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving notice from Klue, Jamf immediately disabled Klue’s integration within Salesforce. Jamf said it has no evidence of lateral movement and has contained the incident on its end. The company also engaged cybersecurity experts, took defensive measures, and notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment and is reviewing what data was impacted. While the investigation remains ongoing, Jamf believes the impact was primarily limited to business data fields within Salesforce. Jamf warned that the unauthorized party may conduct phishing campaigns using contact information stored in Salesforce and may pose as Jamf employees or IT professionals.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eJamf published an update about an ongoing cybersecurity incident involving Klue, a third-party vendor used by Jamf for competitive intelligence services. The incident occurred within Klue’s environment, and Jamf said an unauthorized party accessed Jamf’s Salesforce instance data through Klue’s integration. Jamf framed the post as part of its effort to keep customers informed as new information becomes available.\u003c/p\u003e\n\n\u003cp\u003eJamf stated that the incident did not affect Jamf’s products and did not impact its ability to serve customers. The affected access was described as involving Jamf’s Salesforce environment, not Jamf’s product environment. Jamf said it is conducting its own review to determine what data was impacted.\u003c/p\u003e\n\n\u003cp\u003eAfter being notified by Klue, Jamf immediately disabled Klue’s integration within Salesforce. Jamf said it has no evidence of lateral movement and has contained the incident on its end. The company also engaged cybersecurity experts, took immediate defensive measures to protect its environment, and notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment. While its investigation is ongoing, Jamf currently believes the impact was primarily limited to business data fields within Salesforce. The article does not name the unauthorized party responsible for the incident.\u003c/p\u003e\n\n\u003cp\u003eJamf warned customers that the unauthorized party may conduct phishing campaigns using contact information stored within Salesforce. The company said the actor may pose as legitimate Jamf employees or IT professionals. Jamf encouraged customers to remain vigilant, use caution when sharing sensitive information or account credentials with unknown senders, and report suspicious email to their security teams.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eJamf disclosed an ongoing cybersecurity incident involving Klue, a third-party vendor that Jamf uses for competitive intelligence services. The article states that the incident occurred within Klue’s environment. Through Klue’s integration, an unauthorized party gained access to data in Jamf’s Salesforce instance.\u003c/p\u003e\n\n\u003cp\u003eJamf said it published the update to maintain transparency and keep customers informed. The article includes the communication Jamf shared with customers and says the company will continue updating the post as new information becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"affected-environment\"\u003eAffected Environment\u003c/h2\u003e\n\n\u003cp\u003eThe incident is described as affecting Jamf’s Salesforce instance data through Klue’s integration. Jamf stated that the unauthorized access was tied to Klue’s environment and Klue’s integration with Salesforce.\u003c/p\u003e\n\n\u003cp\u003eJamf specifically said the incident did not affect Jamf’s products. The company also said there was no impact on its ability to serve customers.\u003c/p\u003e\n\n\u003ch2 id=\"known-technical-and-data-details\"\u003eKnown Technical and Data Details\u003c/h2\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment. The company is conducting its own review to understand what data was impacted.\u003c/p\u003e\n\n\u003cp\u003eAt the time of the article, the investigation was ongoing. Jamf said it believes the impact was primarily limited to business data fields within the Salesforce environment.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide a list of specific data fields accessed. It also does not name the unauthorized party responsible for the Klue incident.\u003c/p\u003e\n\n\u003ch2 id=\"jamf-s-response\"\u003eJamf’s Response\u003c/h2\u003e\n\n\u003cp\u003eAfter receiving notice of the incident from Klue, Jamf said it immediately disabled Klue’s integration within Salesforce. Jamf also stated that it has no evidence of lateral movement and has contained the incident on its end.\u003c/p\u003e\n\n\u003cp\u003eJamf described several additional response actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt engaged cybersecurity experts to support its investigation.\u003c/li\u003e\n\u003cli\u003eIt took immediate defensive measures to protect its environment.\u003c/li\u003e\n\u003cli\u003eIt notified law enforcement.\u003c/li\u003e\n\u003cli\u003eIt remained in active communication with Klue.\u003c/li\u003e\n\u003cli\u003eIt directed customers to the Jamf blog post for future updates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"customer-risk-and-recommended-caution\"\u003eCustomer Risk and Recommended Caution\u003c/h2\u003e\n\n\u003cp\u003eJamf warned that the unauthorized party responsible for the Klue incident may conduct phishing campaigns using contact information stored within Salesforce. The company said these campaigns may involve impersonation of legitimate Jamf employees or IT professionals.\u003c/p\u003e\n\n\u003cp\u003eJamf encouraged customers to remain vigilant and exercise caution when sharing sensitive information or account credentials with unknown senders. It also advised customers to report suspicious email to their security team.\u003c/p\u003e\n\n\u003ch2 id=\"impact-statement\"\u003eImpact Statement\u003c/h2\u003e\n\n\u003cp\u003eJamf’s central impact statement is that the incident did not affect Jamf’s products and did not affect Jamf’s ability to serve customers. The known affected area is Jamf’s Salesforce environment, accessed through Klue’s integration.\u003c/p\u003e\n\n\u003cp\u003eJamf emphasized that its data-impact review is still underway. The company said it is treating the incident with seriousness and care and has dedicated expertise, time, and resources to the investigation.\u003c/p\u003e\n","keyPoints":["Jamf said a cybersecurity incident at third-party vendor Klue allowed an unauthorized party to access Jamf’s Salesforce instance data through Klue’s integration.","Jamf stated that the incident did not affect Jamf’s products and did not impact its ability to serve customers.","After receiving notice from Klue, Jamf immediately disabled Klue’s Salesforce integration and said it has no evidence of lateral movement.","Jamf engaged cybersecurity experts, notified law enforcement, and is reviewing what data was impacted.","Jamf warned customers that the unauthorized party may use contact information stored in Salesforce to conduct phishing campaigns while posing as Jamf employees or IT professionals."],"insights":["The access path was Klue’s integration with Jamf’s Salesforce instance, not Jamf’s own products, making the affected environment specifically Jamf’s CRM data rather than its device management or security platforms.","Jamf’s warning focuses on phishing risk because the exposed Salesforce data included contact information that could be used to make impersonation attempts appear legitimate.","Jamf has not yet completed its data-impact review, so customers are being directed to monitor the Jamf blog for updates as the investigation develops."],"referencedReports":[],"body":"\u003cp\u003eJamf disclosed an ongoing cybersecurity incident involving Klue, a third-party vendor Jamf uses for competitive intelligence services. According to Jamf, the incident occurred within Klue’s environment, where an unauthorized party gained access to Jamf’s Salesforce instance data through Klue’s integration. Jamf said the incident did not affect Jamf’s products and did not impact its ability to serve customers.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving notice from Klue, Jamf immediately disabled Klue’s integration within Salesforce. Jamf said it has no evidence of lateral movement and has contained the incident on its end. The company also engaged cybersecurity experts, took defensive measures, and notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment and is reviewing what data was impacted. While the investigation remains ongoing, Jamf believes the impact was primarily limited to business data fields within Salesforce. Jamf warned that the unauthorized party may conduct phishing campaigns using contact information stored in Salesforce and may pose as Jamf employees or IT professionals.\u003c/p\u003e\n"},{"n":14,"title":"Telegram admits it couldn't police exam-leak channels, India tells court","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/telegram-admits-it-couldnt-police-exam-leak-channels-india-tells-court/","time":"12:18","priority":"SHOULD READ","score":78,"tldr":"India told the Delhi High Court that Telegram was warned before a nationwide block over NEET-UG exam-leak channels and admitted it could not proactively detect them. Telegram argues it cooperated and says the ban is unlawful, while the block also disrupted access outside India due to a BGP route leak.","briefOverview":"\u003cp\u003eIndia\u0026rsquo;s government told the Delhi High Court that Telegram was warned about two weeks before it was blocked over channels allegedly selling leaked NEET-UG 2026 exam papers. The Centre said Telegram acknowledged limited ability to proactively detect such content and that its moderators were acting on reported channels. Telegram says it cooperated throughout and argues that the ban is unlawful.\u003c/p\u003e\n\n\u003cp\u003eThe block was imposed ahead of a national medical exam and disrupted Telegram access beyond India, including users as far away as the UAE. The article says the cross-border disruption occurred through a BGP route leak. The Delhi High Court has reserved its order on Telegram\u0026rsquo;s plea, and the block remains in force while the ruling is pending.\u003c/p\u003e\n\n\u003cp\u003eThe government affidavit says authorities first tried a less restrictive approach by raising concerns directly with Telegram and calling company representatives to a June 3, 2026 meeting. Telegram CEO Pavel Durov blamed Indian telecom Reliance and called the incident deliberate sabotage, but network researchers described it as a domestic block misconfigured into a global leak. Reliance Jio denied involvement and said the cited autonomous system was not its network.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIndia\u0026rsquo;s government has told the Delhi High Court that Telegram was warned about two weeks before a nationwide block was imposed ahead of the NEET-UG 2026 medical entrance exam. The Centre\u0026rsquo;s affidavit says the Ministry of Electronics and Information Technology received multiple complaints about Telegram being used for an alleged paper leak. The National Testing Agency identified channels, groups, and bots circulating leaked material and running fraud tied to the exam.\u003c/p\u003e\n\n\u003cp\u003eAccording to the affidavit, the government did not immediately block Telegram. It first raised concerns directly with the company and called Telegram representatives to a meeting on June 3, 2026. The affidavit says Telegram acknowledged it had limited ability to proactively detect the content and that its moderators were acting on reported channels.\u003c/p\u003e\n\n\u003cp\u003eTelegram challenged the block in court and says it cooperated throughout. The company argues that the ban is unlawful. ANI reported that the Delhi High Court reserved its order on Telegram\u0026rsquo;s plea, and the block remains in force while the ruling is pending.\u003c/p\u003e\n\n\u003cp\u003eThe nationwide block had effects beyond India, disrupting Telegram access as far away as the UAE. BleepingComputer previously reported that the disruption spread through a BGP route leak. The article describes the issue as a domestic block that was misconfigured into a global leak, based on network researchers\u0026rsquo; reading.\u003c/p\u003e\n\n\u003cp\u003eTelegram CEO Pavel Durov blamed Indian telecom Reliance, called the disruption deliberate sabotage, and linked it to competition with WhatsApp. Network researchers said the autonomous system cited by Durov belonged to insolvent Reliance Communications rather than Meta-backed Reliance Jio. Reliance Jio also denied involvement in a public statement on X.\u003c/p\u003e\n\n\u003cp\u003eThe NEET-UG re-exam is scheduled for June 21, and the block is set to lift June 22 unless the Delhi High Court\u0026rsquo;s reserved ruling changes that first. The article notes that users affected by the disruption can still reach Telegram through a built-in MTProto proxy. That workaround was detailed in a prior BleepingComputer report linked by the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIndia\u0026rsquo;s government told the Delhi High Court that Telegram was warned about two weeks before it was blocked in connection with alleged NEET-UG 2026 exam paper leaks. The Centre said Telegram conceded that it could not proactively detect channels selling leaked exam papers. Telegram says it cooperated throughout and argues that the ban is unlawful.\u003c/p\u003e\n\n\u003cp\u003eThe block was imposed ahead of a national medical exam and affected Telegram access beyond India. The article states that the disruption reached users as far away as the UAE. The cross-border impact was attributed to a BGP route leak.\u003c/p\u003e\n\n\u003ch2 id=\"government-affidavit-and-stated-rationale\"\u003eGovernment affidavit and stated rationale\u003c/h2\u003e\n\n\u003cp\u003eAccording to ANI as cited in the article, the Centre filed its affidavit on June 18. The affidavit says India\u0026rsquo;s Ministry of Electronics and Information Technology received multiple complaints about Telegram being used for the alleged paper leak of the NEET-UG 2026 exam. NEET-UG is described as India\u0026rsquo;s national medical entrance exam.\u003c/p\u003e\n\n\u003cp\u003eThe National Testing Agency identified channels, groups, and bots circulating leaked material and running fraud tied to the exam. The government said it did not block the app outright at first. Instead, it said it raised concerns directly with Telegram.\u003c/p\u003e\n\n\u003cp\u003eThe affidavit says Telegram acknowledged two points during the government\u0026rsquo;s engagement:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTelegram had limited ability to proactively detect the relevant content.\u003c/li\u003e\n\u003cli\u003eTelegram moderators were acting on reported channels.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says officials called Telegram representatives for a meeting on June 3, 2026. The government described this as an initially less restrictive measure before the block.\u003c/p\u003e\n\n\u003ch2 id=\"court-status\"\u003eCourt status\u003c/h2\u003e\n\n\u003cp\u003eTelegram challenged the block in court. The company says it cooperated throughout the process. Telegram argues that the ban is unlawful.\u003c/p\u003e\n\n\u003cp\u003eANI later reported that the Delhi High Court reserved its order on Telegram\u0026rsquo;s plea challenging the ban. The block remains in force while the ruling is pending. The article states that the NEET-UG re-exam is scheduled for June 21 and that the block is set to lift June 22 unless the court\u0026rsquo;s reserved ruling changes that first.\u003c/p\u003e\n\n\u003ch2 id=\"technical-impact-bgp-route-leak\"\u003eTechnical impact: BGP route leak\u003c/h2\u003e\n\n\u003cp\u003eThe article says India\u0026rsquo;s block spilled beyond its borders and disrupted Telegram access as far away as the UAE. BleepingComputer previously reported that the international disruption occurred through a BGP route leak. The article characterizes the issue, based on network researchers\u0026rsquo; reading, as a domestic block misconfigured into a global leak.\u003c/p\u003e\n\n\u003cp\u003eThis is the key technical detail in the article: a block intended for India affected Telegram users outside India because of routing behavior. The article does not provide packet-level details, but it explicitly identifies a BGP route leak as the mechanism by which the disruption extended beyond India.\u003c/p\u003e\n\n\u003ch2 id=\"disputed-attribution-involving-reliance\"\u003eDisputed attribution involving Reliance\u003c/h2\u003e\n\n\u003cp\u003eTelegram CEO Pavel Durov blamed Indian telecom Reliance. He called the incident deliberate sabotage and linked it to competition with WhatsApp. The article says network researchers instead read the event as a domestic block misconfigured into a global leak.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the autonomous system Durov cited belongs to insolvent Reliance Communications, not the Meta-backed Reliance Jio. Reliance Jio issued a statement on X rejecting Durov\u0026rsquo;s claim. The company said it was not involved in the incident and that it continues to operate its network in accordance with global Internet standards.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-named-entities\"\u003eAffected parties and named entities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several affected or involved parties:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTelegram, which was blocked and challenged the ban in court.\u003c/li\u003e\n\u003cli\u003eIndia\u0026rsquo;s Ministry of Electronics and Information Technology, which received complaints and engaged with Telegram.\u003c/li\u003e\n\u003cli\u003eThe National Testing Agency, which identified Telegram channels, groups, and bots tied to leaked material and fraud.\u003c/li\u003e\n\u003cli\u003eThe Delhi High Court, which reserved its order on Telegram\u0026rsquo;s plea.\u003c/li\u003e\n\u003cli\u003eNEET-UG 2026 candidates and exam stakeholders, since the alleged leaks concerned India\u0026rsquo;s national medical entrance exam.\u003c/li\u003e\n\u003cli\u003eTelegram users in India and users as far away as the UAE, who experienced disruption.\u003c/li\u003e\n\u003cli\u003eReliance Communications and Reliance Jio, which were discussed in relation to disputed claims about the routing incident.\u003c/li\u003e\n\u003cli\u003eWhatsApp, which Durov referenced in his claim about competition.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"user-workaround-mentioned-in-the-article\"\u003eUser workaround mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that users caught in the disruption can still reach Telegram through a built-in MTProto proxy. It says this workaround was detailed in the previous BleepingComputer report. The article does not expand on setup steps in the current piece.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe central issue is the collision between government enforcement over alleged exam-leak activity and Telegram\u0026rsquo;s ability to police content proactively. The government says Telegram admitted it had limited proactive detection capability and that authorities initially avoided an immediate block. Telegram says it cooperated and maintains that the ban is unlawful.\u003c/p\u003e\n\n\u003cp\u003eThe incident is also significant because a national platform block reportedly created unintended international connectivity problems. The article attributes that wider disruption to a BGP route leak, making the impact broader than the domestic enforcement action itself.\u003c/p\u003e\n","keyPoints":["India's government told the Delhi High Court that Telegram was warned about two weeks before it was blocked and conceded it could not proactively detect channels selling leaked exam papers.","The Ministry of Electronics and Information Technology received multiple complaints about Telegram being used for the alleged NEET-UG 2026 paper leak, and the National Testing Agency identified channels, groups, and bots circulating leaked material and exam-related fraud.","The government said it first raised concerns directly with Telegram and called Telegram representatives to a June 3, 2026 meeting instead of immediately blocking the app.","Telegram challenged the block in court, said it cooperated throughout, and argued that the ban is unlawful.","The Telegram block disrupted access beyond India, including in the UAE, through a BGP route leak, while the NEET-UG re-exam is scheduled for June 21 and the block is set to lift June 22 unless the court changes that first."],"insights":["A domestic platform block can have unintended cross-border impact when routing controls are misconfigured, as India’s Telegram block reportedly disrupted access as far away as the UAE through a BGP route leak.","The government’s affidavit frames the block as a last-step enforcement action by emphasizing that officials first used a less restrictive measure: direct engagement with Telegram and a June 3 meeting before the ban.","Attribution around network incidents can be misleading when similar corporate names are involved, as Durov blamed Reliance while researchers and Reliance Jio said the cited autonomous system belonged to insolvent Reliance Communications rather than Reliance Jio.","Telegram’s built-in MTProto proxy provided an immediate workaround for users affected by the disruption, showing that application-level circumvention features can remain relevant during network-level blocking events."],"referencedReports":[],"body":"\u003cp\u003eIndia\u0026rsquo;s government told the Delhi High Court that Telegram was warned about two weeks before it was blocked over channels allegedly selling leaked NEET-UG 2026 exam papers. The Centre said Telegram acknowledged limited ability to proactively detect such content and that its moderators were acting on reported channels. Telegram says it cooperated throughout and argues that the ban is unlawful.\u003c/p\u003e\n\n\u003cp\u003eThe block was imposed ahead of a national medical exam and disrupted Telegram access beyond India, including users as far away as the UAE. The article says the cross-border disruption occurred through a BGP route leak. The Delhi High Court has reserved its order on Telegram\u0026rsquo;s plea, and the block remains in force while the ruling is pending.\u003c/p\u003e\n\n\u003cp\u003eThe government affidavit says authorities first tried a less restrictive approach by raising concerns directly with Telegram and calling company representatives to a June 3, 2026 meeting. Telegram CEO Pavel Durov blamed Indian telecom Reliance and called the incident deliberate sabotage, but network researchers described it as a domestic block misconfigured into a global leak. Reliance Jio denied involvement and said the cited autonomous system was not its network.\u003c/p\u003e\n"},{"n":21,"title":"Nintendo confirms data stolen in WebMD subsidiary cyberattack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/nintendo-confirms-data-stolen-in-webmd-subsidiary-cyberattack/","time":"18:31","priority":"SHOULD READ","score":78,"tldr":"Nintendo of America confirmed that employee survey data was stolen through the third-party TinyPulse service, but said Nintendo’s own systems, customer data, and financial data were not compromised. The Shadowbyt3$ extortion group claims it stole about 1GB of data and demanded a $2 million ransom.","briefOverview":"\u003cp\u003eNintendo of America confirmed that threat actors stole survey data from TinyPulse, a third-party service used internally for employee surveys. The company said Nintendo’s own systems were not compromised and that no personal customer or financial data was accessed. Nintendo said the data involved was limited to internal survey content for a small subset of employees, with most information dating back several years.\u003c/p\u003e\n\n\u003cp\u003eThe confirmation followed claims by the Shadowbyt3\u003cspan class=\"math inline\"\u003e\\( “extortion-as-a-service” threat group that it exfiltrated sensitive data related to Nintendo of America employees. The group claimed it stole close to 1GB of data and demanded a \\)\u003c/span\u003e2 million ransom. BleepingComputer said it did not download the leaked data and could not confirm its authenticity.\u003c/p\u003e\n\n\u003cp\u003eTinyPulse is an employee engagement and feedback platform used for anonymous surveys, analytics, feedback collection, and workplace culture assessments. Nintendo said it is working with the service provider to address the issue. The article states that Nintendo customer information remained unaffected and account holders do not need to take any action.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNintendo of America told BleepingComputer that data was stolen through TinyPulse, a third-party service used for internal employee surveys. Nintendo said its own systems were not compromised and that no personal customer or financial data was accessed. The company described the affected data as internal survey content involving a small subset of employees, with most of it dating back several years.\u003c/p\u003e\n\n\u003cp\u003eTinyPulse is an employee engagement and feedback platform used for anonymous employee surveys, engagement analytics, feedback collection, and workplace culture assessments. Nintendo of America is a subsidiary of the Japanese gaming company and is responsible for operations in the United States, Canada, and parts of Latin America. Nintendo said it is working with the service provider to address the issue.\u003c/p\u003e\n\n\u003cp\u003eThe incident became public after the Shadowbyt3\u003cspan class=\"math inline\"\u003e\\( threat group claimed it had exfiltrated sensitive data related to Nintendo of America employees. The group initially claimed it stole close to 1GB of data and gave Nintendo 48 hours to begin negotiations before leaking the information. Shadowbyt3\\)\u003c/span\u003e demanded a $2 million ransom.\u003c/p\u003e\n\n\u003cp\u003eShadowbyt3$ claimed the stolen data included full names, email addresses, analytics and survey data, bank statements, W-9 forms with employee IDs, progress plans, and reports between 2016 and 2026. In a later message, the group said the breach did not affect Nintendo gaming but affected a small number of employees who had used TinyPulse. Another post warned of more victims and linked to allegedly leaked data including direct messages and conversations between employees.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said it contacted WebMD Health Services, the owner of TinyPulse, for more information but did not receive a response by publication time. The publication also said it did not download the leaked data and could not confirm its authenticity. The article states that even if the leaked information is valid, Nintendo customer information was not affected and account holders do not need to take any action.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNintendo of America confirmed to BleepingComputer that threat actors stole survey data from TinyPulse, a third-party service used internally for employee surveys. The company said Nintendo’s own systems were not compromised. It also said no personal customer data or financial data was accessed.\u003c/p\u003e\n\n\u003cp\u003eNintendo described the affected information as internal survey content involving a small subset of employees. The company said most of the information dates back several years. Nintendo said it is working with the service provider to address the issue.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-service-involved\"\u003eThird-Party Service Involved\u003c/h2\u003e\n\n\u003cp\u003eThe affected service is TinyPulse, an employee engagement and feedback platform. The article describes TinyPulse as being used for anonymous employee surveys, engagement analytics, feedback collection, and workplace culture assessments.\u003c/p\u003e\n\n\u003cp\u003eTinyPulse is owned by WebMD Health Services. BleepingComputer said it contacted WebMD Health Services for more information about the incident and its impact, but did not receive a response by publication time.\u003c/p\u003e\n\n\u003ch2 id=\"nintendo-s-position\"\u003eNintendo’s Position\u003c/h2\u003e\n\n\u003cp\u003eNintendo stated that the issue involved TinyPulse, not Nintendo’s own systems. The company said:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNintendo’s systems were not compromised.\u003c/li\u003e\n\u003cli\u003eNo personal customer data was accessed.\u003c/li\u003e\n\u003cli\u003eNo financial data was accessed.\u003c/li\u003e\n\u003cli\u003eThe affected information was limited to internal survey content.\u003c/li\u003e\n\u003cli\u003eThe affected content involved a small subset of employees.\u003c/li\u003e\n\u003cli\u003eMost of the affected information dated back several years.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Nintendo customer information remained unaffected by the breach. It also states that account holders do not need to take any action.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-claims\"\u003eThreat Actor Claims\u003c/h2\u003e\n\n\u003cp\u003eThe Shadowbyt3$ “extortion-as-a-service” threat group claimed that it exfiltrated sensitive data related to Nintendo of America employees. In an initial message, the group claimed it stole close to 1GB of data from Nintendo. It gave the company 48 hours to engage in negotiations before leaking the information.\u003c/p\u003e\n\n\u003cp\u003eShadowbyt3\u003cspan class=\"math inline\"\u003e\\( demanded a ransom payment of \\)\u003c/span\u003e2 million. The group claimed the stolen data included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFull names.\u003c/li\u003e\n\u003cli\u003eEmail addresses.\u003c/li\u003e\n\u003cli\u003eAnalytics and survey data.\u003c/li\u003e\n\u003cli\u003eBank statements.\u003c/li\u003e\n\u003cli\u003eW-9 forms with employee IDs.\u003c/li\u003e\n\u003cli\u003eProgress plans.\u003c/li\u003e\n\u003cli\u003eReports between 2016 and 2026.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn a second message, the threat actor said the breach did not affect Nintendo gaming. It said the incident affected a small number of employees who worked for Nintendo and had used TinyPulse.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-data-leak\"\u003eAlleged Data Leak\u003c/h2\u003e\n\n\u003cp\u003eThe article says another Shadowbyt3$ post warned that there would be more victims. The post also provided a link to leaked data that allegedly included direct messages and conversations between employees. The article says this suggested that Nintendo did not agree to pay a ransom.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer did not download the leaked data. The publication said it could not confirm the authenticity of the leaked material.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-scope\"\u003eAffected Parties and Scope\u003c/h2\u003e\n\n\u003cp\u003eThe directly named affected organization is Nintendo of America, a subsidiary of the Japanese game company Nintendo. The article says Nintendo of America is responsible for operations in the United States, Canada, and parts of Latin America.\u003c/p\u003e\n\n\u003cp\u003eThe third-party service provider involved is TinyPulse, which is owned by WebMD Health Services. Nintendo said it was working with the service provider to address the issue.\u003c/p\u003e\n\n\u003cp\u003eAccording to Nintendo, the affected data was limited to internal survey content for a small subset of employees. According to Shadowbyt3$, the stolen data included more sensitive employee-related records, but BleepingComputer said it could not verify the leaked data.\u003c/p\u003e\n\n\u003ch2 id=\"threat-group-background\"\u003eThreat Group Background\u003c/h2\u003e\n\n\u003cp\u003eShadowByt3$ is described in the article as a relatively new threat actor. The group describes itself as an “extortion as a service group” and has operated since October 2025, according to the article.\u003c/p\u003e\n\n\u003cp\u003eThe group leaks data stolen from victim companies that do not pay a ransom. It claims that if a settlement occurs, all data “will be Deleted Permanently and you will not hear from us again.”\u003c/p\u003e\n\n\u003cp\u003eThe article notes that law enforcement strongly discourages paying hackers because it incentivizes future attacks. It also states there is no guarantee that the threat actor will not privately sell the information.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eNintendo said its own systems were not compromised and customer information was not affected. The article says account holders do not need to take any action. Nintendo is working with the service provider to address the issue.\u003c/p\u003e\n\n\u003cp\u003eThe main confirmed impact is the theft of internal survey content from the TinyPulse service. The broader employee-data claims made by Shadowbyt3$ remain unverified in the article because BleepingComputer did not download the leaked data and could not confirm its authenticity.\u003c/p\u003e\n","keyPoints":["Nintendo of America confirmed that threat actors stole survey data from TinyPulse, a third-party service used internally for employee surveys.","Nintendo said its own systems were not compromised and that no personal customer or financial data was accessed.","Nintendo said the exposed data was limited to internal survey content involving a small subset of employees, with most information dating back several years.","The Shadowbyt3$ extortion group claimed it stole close to 1GB of Nintendo-related data and demanded a $2 million ransom.","Shadowbyt3$ claimed the stolen data included employee personal details, bank statements, W-9 forms, employee IDs, progress plans, and reports from 2016 to 2026."],"insights":["The incident shows that internal employee survey platforms can create data exposure risk even when a company’s own systems are not compromised.","Nintendo’s statement and Shadowbyt3$’s claims differ significantly on the sensitivity of the stolen data, and BleepingComputer said it could not verify the authenticity of the leaked data.","The article states that Nintendo customers do not need to take action because customer information was unaffected by the breach.","The ransom demand came from a relatively new group describing itself as an “extortion-as-a-service” operation, indicating the incident is part of a broader data-leak extortion model rather than a compromise of Nintendo gaming services."],"referencedReports":[],"body":"\u003cp\u003eNintendo of America confirmed that threat actors stole survey data from TinyPulse, a third-party service used internally for employee surveys. The company said Nintendo’s own systems were not compromised and that no personal customer or financial data was accessed. Nintendo said the data involved was limited to internal survey content for a small subset of employees, with most information dating back several years.\u003c/p\u003e\n\n\u003cp\u003eThe confirmation followed claims by the Shadowbyt3\u003cspan class=\"math inline\"\u003e\\( “extortion-as-a-service” threat group that it exfiltrated sensitive data related to Nintendo of America employees. The group claimed it stole close to 1GB of data and demanded a \\)\u003c/span\u003e2 million ransom. BleepingComputer said it did not download the leaked data and could not confirm its authenticity.\u003c/p\u003e\n\n\u003cp\u003eTinyPulse is an employee engagement and feedback platform used for anonymous surveys, analytics, feedback collection, and workplace culture assessments. Nintendo said it is working with the service provider to address the issue. The article states that Nintendo customer information remained unaffected and account holders do not need to take any action.\u003c/p\u003e\n"},{"n":9,"title":"FIFA World Cup: Hunting 227 Phishing Domains With the Silent Push MCP Server","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/blog/fifa-world-cup-hunting-phishing-domains/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=fifa-world-cup-hunting-phishing-domains","time":"16:02","priority":"MAY READ","score":72,"tldr":"Silent Push says it used its MCP server with Claude to expand seed indicators from an OCCIP alert into a cluster of 227 World Cup-themed phishing domains linked to Ghost Stadium. The key takeaway is that shared patterns like favicon reuse and domain naming conventions can be turned into automated queries for daily detection and blocking of new fraud infrastructure.","briefOverview":"\u003cp\u003eSilent Push described an investigation into fraudulent World Cup ticket and merchandise sites after an OCCIP flash alert linked the activity to Ghost Stadium, a Chinese-speaking cybercriminal group. The alert included seed domains, which Silent Push used as the starting point for a broader infrastructure hunt. The investigation focused on identifying a larger cluster and generating queries to track new infrastructure as it appeared.\u003c/p\u003e\n\n\u003cp\u003eUsing the Silent Push MCP server with Claude, the investigation found that the sites reused the same favicons and followed a consistent domain registration format. The domains used a two- or three-letter prefix followed by “26fifashop.site.top,” and 227 new domains matching that pattern had already been registered on the first day of the World Cup. Silent Push then used Context Graph to confirm the cluster and described moving the generated queries into XSOAR for daily automation.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the workflow as a way to turn seed indicators into recurring detection and response tasks. It says the resulting process can deduplicate results, query Splunk, and push findings to a watchlist or blocklist. It also explains that the Silent Push MCP server connects Silent Push datasets to AI and agentic platforms so pivoting, query generation, and reporting can happen in one flow.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSilent Push reported that it investigated fraudulent World Cup ticket and merchandise sites after an OCCIP flash alert was published. The alert tied the activity to Ghost Stadium, described as a Chinese-speaking cybercriminal operation, and included seed domains. Silent Push used those seed domains to begin hunting for a larger cluster of related infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe investigation was run through the Silent Push MCP server with Claude. The stated goal was to find the larger cluster and generate queries that could be used to track new infrastructure as it appeared. Silent Push says the MCP server connects its datasets directly to AI and agentic platforms and handles data retrieval and correlation across DNS data, web content fingerprints, and domain registration patterns.\u003c/p\u003e\n\n\u003cp\u003eThe article says the sites reused the same favicons and followed a consistent registration format. The domains used a two- or three-letter prefix followed by “26fifashop.site.top.” On the first day of the World Cup, 227 new domains matching that pattern had already been registered.\u003c/p\u003e\n\n\u003cp\u003eSilent Push then took the generated queries into its Context Graph, where it confirmed the cluster. The same queries were then placed into XSOAR to run daily, with results deduplicated, queried in Splunk, and pushed to a watchlist or blocklist. The article frames this as a way to keep tools current without requiring someone to manually hunt for new sites each morning.\u003c/p\u003e\n\n\u003cp\u003eThe article also defines Ghost Stadium as a Chinese-speaking cybercriminal operation that builds scalable fraud ecosystems around major events. It says the group creates large volumes of lookalike sites designed to sell fake tickets and merchandise, using shared infrastructure patterns such as favicons, domain naming conventions, and hosting clusters. Silent Push describes its Context Graph as an infrastructure correlation engine that aggregates DNS records, WHOIS data, host scans, SSL certificates, and web content fingerprints to map relationships between domains, IPs, and threat actor infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSilent Push described an investigation into fraudulent World Cup ticket and merchandise sites following an OCCIP flash alert. The alert tied the activity to Ghost Stadium, which the article describes as a Chinese-speaking cybercriminal group, and included seed domains. Silent Push used those seeds as the starting point for identifying a broader cluster of related infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe investigation was conducted using the Silent Push MCP server with Claude. The prompt was to find the larger cluster and generate queries that could be used to track new infrastructure as it appeared. The article presents the workflow as a way to move from seed indicators to repeatable detection logic.\u003c/p\u003e\n\n\u003ch2 id=\"core-findings\"\u003eCore findings\u003c/h2\u003e\n\n\u003cp\u003eSilent Push found that the fraudulent sites reused the same favicons and followed a consistent domain registration pattern. The described format was a two- or three-letter prefix followed by “26fifashop.site.top.” According to the article, 227 new domains matching that pattern had already been registered on the first day of the World Cup.\u003c/p\u003e\n\n\u003cp\u003eThe author then used the generated queries in Silent Push Context Graph to confirm the cluster. The same queries were placed into XSOAR to run daily. The described downstream workflow included deduplicating results, querying Splunk, and pushing findings to a watchlist or blocklist.\u003c/p\u003e\n\n\u003ch2 id=\"actor-and-activity-described\"\u003eActor and activity described\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the activity as being tied by the OCCIP alert to Ghost Stadium. It describes Ghost Stadium as a Chinese-speaking cybercriminal operation that builds scalable fraud ecosystems around major events.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Ghost Stadium spins up large volumes of lookalike sites designed to sell fake tickets and merchandise. The group uses shared infrastructure patterns that make the sites faster to deploy at scale and easier to detect with the right tooling. The shared patterns mentioned include favicons, domain naming conventions, and hosting clusters.\u003c/p\u003e\n\n\u003ch2 id=\"technical-workflow\"\u003eTechnical workflow\u003c/h2\u003e\n\n\u003cp\u003eThe investigation began with seed domains from the OCCIP flash alert. Silent Push then used the MCP server with Claude to retrieve and correlate data, identify infrastructure patterns, and generate queries for tracking related domains over time.\u003c/p\u003e\n\n\u003cp\u003eThe article says the Silent Push MCP server connects Silent Push datasets directly to AI and agentic platforms like Claude. Instead of manually pivoting across DNS data, web content fingerprints, and domain registration patterns, an analyst can describe the investigation and have the MCP server handle data retrieval and correlation.\u003c/p\u003e\n\n\u003cp\u003eThe workflow described in the article includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStarting with seed domains from the OCCIP flash alert.\u003c/li\u003e\n\u003cli\u003eUsing the Silent Push MCP server with Claude to identify a broader cluster.\u003c/li\u003e\n\u003cli\u003eFinding reused favicons and a consistent domain registration format.\u003c/li\u003e\n\u003cli\u003eGenerating queries to track new domains matching those patterns.\u003c/li\u003e\n\u003cli\u003eConfirming the cluster in Silent Push Context Graph.\u003c/li\u003e\n\u003cli\u003eRunning the same queries daily in XSOAR.\u003c/li\u003e\n\u003cli\u003eDeduplicating results, querying Splunk, and pushing results to a watchlist or blocklist.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"silent-push-context-graph\"\u003eSilent Push Context Graph\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the Silent Push Context Graph as an infrastructure correlation engine. It aggregates DNS records, WHOIS data, host scans, SSL certificates, and web content fingerprints. Its purpose is to map relationships between domains, IPs, and threat actor infrastructure.\u003c/p\u003e\n\n\u003cp\u003eAnalysts use the Context Graph to pivot from a single seed domain to a larger infrastructure cluster. The article says it can help identify reused assets such as favicons or ASN patterns. It can also generate detection queries that track new infrastructure matching the same behavioral fingerprints.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-response\"\u003eSignificance and response\u003c/h2\u003e\n\n\u003cp\u003eThe main significance of the investigation is that Silent Push turned a list of seed domains into a repeatable tracking process for newly registered lookalike domains. The article emphasizes that the generated queries can be run directly in Context Graph or fed into existing SOAR and SIEM workflows.\u003c/p\u003e\n\n\u003cp\u003eThe stated operational impact is reducing the need for manual daily hunting. By running the queries in XSOAR, deduplicating results, querying Splunk, and updating watchlists or blocklists, the workflow is intended to keep defenses current as new domains appear.\u003c/p\u003e\n\n\u003ch2 id=\"commercial-context-in-the-article\"\u003eCommercial context in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article also explains how the Silent Push MCP server works with threat investigations and says it is available with Silent Push Enterprise Edition. It states that organizations already using Claude or another agentic platform can connect it to Silent Push through the MCP server so pivot work, query generation, and reporting occur in one flow. The article closes by inviting readers to sign up for Community Edition to explore datasets or contact the Silent Push team to use the MCP server.\u003c/p\u003e\n","keyPoints":["An OCCIP flash alert about fraudulent World Cup ticket and merchandise sites tied the activity to Ghost Stadium, a Chinese-speaking cybercriminal group, and included seed domains for investigation.","Silent Push used its MCP server with Claude to investigate the seed domains, identify the larger cluster, and generate queries for tracking new infrastructure.","The phishing sites reused the same favicons and followed a consistent domain registration format using a two- or three-letter prefix followed by “26fifashop.site.top.”","On the first day of the World Cup, 227 new domains matching the identified pattern had already been registered.","Silent Push says the generated queries can be run in Context Graph or integrated into tools such as XSOAR and Splunk to deduplicate results, search logs, and update watchlists or blocklists."],"insights":["The domain pattern described in the article is precise enough to support proactive monitoring, because it combines a short alphabetic prefix with the fixed string “26fifashop.site.top.”","The article shows that favicon reuse can be operationalized as a clustering signal alongside domain naming patterns to confirm related fraud infrastructure.","The workflow turns a one-time threat intelligence alert into recurring detection by moving generated queries from Silent Push Context Graph into daily XSOAR automation.","The investigation emphasizes that deduplication, Splunk searches, and watchlist or blocklist updates can be chained after infrastructure discovery to reduce manual daily hunting."],"referencedReports":[{"title":"OCCIP flash alert on fraudulent World Cup ticket and merchandise sites","url":"https://www.ic3.gov/PSA/2026/PSA260527","publisher":"OCCIP / IC3","context":"The article says the investigation began after an OCCIP flash alert about fraudulent World Cup ticket and merchandise sites linked the activity to Ghost Stadium and provided seed domains.","category":"","primary":false}],"body":"\u003cp\u003eSilent Push described an investigation into fraudulent World Cup ticket and merchandise sites after an OCCIP flash alert linked the activity to Ghost Stadium, a Chinese-speaking cybercriminal group. The alert included seed domains, which Silent Push used as the starting point for a broader infrastructure hunt. The investigation focused on identifying a larger cluster and generating queries to track new infrastructure as it appeared.\u003c/p\u003e\n\n\u003cp\u003eUsing the Silent Push MCP server with Claude, the investigation found that the sites reused the same favicons and followed a consistent domain registration format. The domains used a two- or three-letter prefix followed by “26fifashop.site.top,” and 227 new domains matching that pattern had already been registered on the first day of the World Cup. Silent Push then used Context Graph to confirm the cluster and described moving the generated queries into XSOAR for daily automation.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the workflow as a way to turn seed indicators into recurring detection and response tasks. It says the resulting process can deduplicate results, query Splunk, and push findings to a watchlist or blocklist. It also explains that the Silent Push MCP server connects Silent Push datasets to AI and agentic platforms so pivoting, query generation, and reporting can happen in one flow.\u003c/p\u003e\n"},{"n":12,"title":"The Law Firm Document That Linked to a Cleaning Company","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/law-firm-cleaning-company-cta-brand-mismatch-coupa-impersonation","time":"11:00","priority":"MAY READ","score":72,"tldr":"A phishing email from a legitimate UAE law firm domain passed SPF, DKIM, and DMARC while using a legal document-sharing lure to send recipients to an unrelated cleaning company subdomain likely used for credential theft. The key warning sign was not authentication failure but behavioral mismatch: hidden BCC delivery, mismatched domains, and a CTA destination unrelated to the claimed sender or document workflow.","briefOverview":"\u003cp\u003eA phishing email from \u003ccode\u003et[.]manzoor@hhslawyer[.]ae\u003c/code\u003e targeted a global specialty ingredients manufacturer while posing as a legal document-sharing notification. The message used UAE law firm branding, referenced document #01179 for “Legal Consulting Services, Statement and Proposals,” and included a blue “Review Document” button. Themis flagged the message as credential theft targeting VIP recipients at 57% confidence.\u003c/p\u003e\n\n\u003cp\u003eThe message was notable because SPF, DKIM, and DMARC all passed with \u003ccode\u003ecompauth=100\u003c/code\u003e, and it was sent through Google mail infrastructure with a valid DKIM signature under the \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e domain. Despite
