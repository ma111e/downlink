 and routing queries through monetization brokers, affecting about 758,000 users.","Threat actors abused Anthropic Claude’s shared chat feature and Google Ads searches for AI developer tools to deliver the MacSync credential-stealing malware, with Asia-Pacific accounting for 67.2% of confirmed victims.","Three npm packages named node-ci-utils@2.1.4, win-env-setup@3.0.6, and macos-ci-utils@1.0.0 were found acting as droppers for the Rust-based NastyC2 post-exploitation framework.","Cisco updated its advisory for CVE-2026-20127 to state that the critical Catalyst SD-WAN flaw also affects Catalyst SD-WAN Validator and has been exploited as a zero-day since 2023 by UAT-8616.","CISA issued Binding Operational Directive 26-04 requiring federal civilian agencies to remediate high-risk vulnerabilities within accelerated timelines based on factors including internet exposure and inclusion in the Known Exploited Vulnerabilities catalog."],"insights":["Several campaigns relied on trusted infrastructure or workflows rather than obviously malicious sites, including Claude shared chats, Microsoft OAuth device authorization, Steam Workshop wallpapers, and compromised legitimate servers.","Fileless and in-memory execution appeared across multiple threats, including macOS ClickFix, Phantom Stealer, the crypto-javascript npm payloads, OnionDrop, and AsyncRAT delivery chains, reducing reliance on static files for detection.","Developer and build ecosystems were repeatedly targeted as execution paths, with malicious npm packages delivering NastyC2, a worm-miner-LPE payload combination, and an AI coding agent repository tricking Cline into running attacker-supplied commands.","Attackers are exploiting gaps in trust-based security controls, such as Cline asking a manipulated AI agent whether its own command is safe and the Shai-Hulud worm using an adversarial prompt to make AI-powered scanners refuse analysis.","Fraud operations described in the article increasingly blend digital lures with real-world logistics, as WhatsApp booking scams use real reservation details and crypto investment scams use in-person cash couriers."],"referencedReports":[{"title":"SearchJack Extensions Monetize Users' Searches","url":"https://malext.io/reports/SearchJack/","publisher":"MalExt","context":"The article cites this report for findings on 23 deceptive Chrome extensions that override users' default search engines and route queries through monetization brokers.","category":"","primary":false},{"title":"macOS ClickFix Lures Deliver AppleScript Stealer and RAT","url":"https://www.netskope.com/blog/macos-clickfix-lures-deploy-applescript-stealer-persistent-rat","publisher":"Netskope Threat Labs","context":"The article references this technical analysis for a fileless macOS ClickFix campaign delivering an AppleScript-based infostealer and RAT.","category":"","primary":false},{"title":"Claude Shared Chats Abused for ClickFix Malvertising Campaign","url":"https://www.trendmicro.com/en_us/research/26/f/claudeai-shared-chat-abused-in-malvertising.html","publisher":"Trend Micro","context":"The article cites this research on threat actors abusing Claude shared chats and Google Ads to deliver MacSync credential-stealing malware.","category":"","primary":false},{"title":"WhatsApp Hotel Scams Target Travelers","url":"https://www.bitdefender.com/en-us/blog/hotforsecurity/travelers-targeted-by-whatsapp-hotel-scams","publisher":"Bitdefender","context":"The article references Bitdefender's warning about a WhatsApp phishing campaign impersonating hotels and accommodation providers.","category":"","primary":false},{"title":"Cisco Updates CVE-2026-20127 Advisory","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-rpa-EHchtZk","publisher":"Cisco","context":"The article cites Cisco's updated advisory for CVE-2026-20127 affecting Catalyst SD-WAN products.","category":"","primary":false},{"title":"Code Execution Bypass in Cline","url":"https://www.manifold.security/blog/cline-code-execution-bypass","publisher":"Manifold Security","context":"The article references this analysis of two high-severity local code-execution paths in the Cline AI coding agent VS Code extension.","category":"","primary":false},{"title":"Reconnaissance and PoC Validation Target HTTP/2 Bomb","url":"https://github.com/califio/publications/tree/main/MADBugs/http2-bomb","publisher":"Calif","context":"The article links to technical research on the HTTP/2 Bomb vulnerability tracked as CVE-2026-49975.","category":"","primary":false},{"title":"Threat Actor Abuses Terminal Server as a Phishing Stager","url":"https://www.huntress.com/blog/terminal-server-phishing-stager-exposed","publisher":"Huntress","context":"The article cites Huntress research on an attacker using a victim's internet-facing terminal server as a phishing stager.","category":"","primary":false},{"title":"Phishing Campaign Targets Banks with Phantom Stealer","url":"https://www.fortra.com/blog/phishing-campaign-targets-banks-fileless-phantom-stealer-malware","publisher":"Fortra","context":"The article references Fortra's analysis of a phishing campaign targeting banks with fileless Phantom Stealer malware.","category":"","primary":false},{"title":"Malicious Wallpapers in Steam Workshop Spread Malware","url":"https://securelist.com/dozens-of-malicious-wallpapers-found-on-steam-workshop/120186/","publisher":"Kaspersky","context":"The article cites Kaspersky research on malware hidden in Steam Workshop wallpaper packages.","category":"","primary":false},{"title":"NastyC2 Framework Distributed via npm Packages","url":"https://panther.com/blog/crate-expectations-nastyc2-ships-rust-post-exploitation-framework-through-npm","publisher":"Panther","context":"The article references Panther's analysis of npm packages acting as droppers for the Rust-based NastyC2 post-exploitation framework.","category":"","primary":false},{"title":"Malicious npm Package Drops Malware Trifecta","url":"https://panther.com/blog/fragminer-a-triple-threat-hiding-in-npm-kernel-exploit-supply-chain-worm-and-cryptomining-from-a-single-package","publisher":"Panther","context":"The article cites Panther research on the crypto-javascript npm package delivering a worm, Monero miner, and Dirty Frag LPE exploit.","category":"","primary":false},{"title":"New OnionDrop Loader Analyzed","url":"https://www.cyderes.com/howler-cell/oniondrop-malware-analysis","publisher":"Cyderes","context":"The article references Cyderes' malware analysis of the OnionDrop multi-stage loader.","category":"","primary":false},{"title":"Scammers Use Couriers to Collect Cash in Crypto Investment Scams","url":"https://www.ic3.gov/PSA/2026/PSA260615","publisher":"FBI Internet Crime Complaint Center","context":"The article cites an FBI public service announcement warning that crypto investment scammers are using couriers to collect cash from victims.","category":"","primary":false},{"title":"Ghostwriter Targets Polish Gmail Accounts","url":"https://cert.pl/en/posts/2026/06/UNC1151-gmail-campaign/","publisher":"CERT Polska","context":"The article references CERT Polska's report on Ghostwriter phishing campaigns targeting Gmail users.","category":"","primary":false},{"title":"Device Code Phishing Targets Microsoft 365 Accounts","url":"https://www.reversinglabs.com/blog/device-code-phishing-campaign","publisher":"ReversingLabs","context":"The article cites ReversingLabs research on a Microsoft 365 device code phishing campaign abusing OAuth 2.0 Device Authorization Grant flow.","category":"","primary":false},{"title":"New OnyxC2 Stealer Emerges","url":"https://www.blackfog.com/inside-onyxc2-the-new-stealer-targeting-210-apps/","publisher":"BlackFog","context":"The article references BlackFog's analysis of the OnyxC2 information stealer being marketed on underground forums.","category":"","primary":false},{"title":"AI Hype Used as Lure to Deliver AsyncRAT","url":"https://www.fortinet.com/blog/threat-research/threat-actors-weaponize-ai-hype-to-deliver-asyncrat","publisher":"Fortinet FortiGuard Labs","context":"The article cites Fortinet research on phishing emails using AI-themed lures to deliver AsyncRAT.","category":"","primary":false},{"title":"Security Risks with Google Cloud serviceData","url":"https://permiso.io/blog/gcp-servicedata-officially-deprecated-actively-dangerous","publisher":"Permiso Security","context":"The article references Permiso Security's analysis of inconsistent Google Cloud serviceData telemetry and related detection risks.","category":"","primary":false},{"title":"Shai-Hulud Worm Attempts to Defeat AI Guardrails","url":"https://deepspecter.substack.com/p/the-worm-that-left-its-name-on-the","publisher":"DeepSpecter","context":"The article cites research on a Shai-Hulud worm variant using an adversarial prompt to affect AI-powered malware scanners.","category":"","primary":false},{"title":"CISA Asks Organizations to Patch Smarter","url":"https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk","publisher":"CISA","context":"The article references CISA's Binding Operational Directive 26-04 on prioritizing security updates based on risk.","category":"","primary":false}],"body":"\u003cp\u003eThis ThreatsDay Bulletin rounds up a broad set of security stories centered on attackers abusing trusted tools, platforms, and workflows. The article highlights malicious Chrome extensions, Claude shared chat abuse, macOS ClickFix lures, device-code phishing, npm supply-chain malware, and exposed infrastructure used for phishing. Its central message is that legitimate-looking services and convenience features are increasingly being used as attack paths.\u003c/p\u003e\n\n\u003cp\u003eSeveral incidents involve fileless or in-memory execution, including a macOS ClickFix chain, Phantom Stealer, OnionDrop, AsyncRAT delivery, and malicious npm payloads. The article also covers critical exposure in edge and cloud environments, including Cisco Catalyst SD-WAN CVE-2026-20127, HTTP/2 Bomb reconnaissance, and Google Cloud serviceData logging inconsistencies. Defensive responses include Anthropic disabling malicious shared chats, Cisco updating its advisory, and CISA issuing Binding Operational Directive 26-04 for risk-based patching.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also describes fraud and phishing campaigns affecting travelers, banks, Gmail users, Microsoft 365 users, gamers, and senior citizens. Reported impacts include about 758,000 users affected by deceptive Chrome extensions, over 2,000 victims funneled through malicious AI-tool download pages, and $3.5 billion in reported U.S. imposter-scam losses in 2025. The article concludes that “legitimate” infrastructure should not be treated as inherently safe.\u003c/p\u003e\n"},{"n":20,"title":"5 reasons Microsoft 365 backup isn’t enough for business data protection","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/5-reasons-microsoft-365-backup-isnt-enough-for-business-data-protection/","time":"13:48","priority":"MAY READ","score":35,"tldr":"Microsoft 365 does not provide complete data protection on its own, leaving organizations responsible for backups, recovery, ransomware resilience, and compliance retention. The article argues that businesses should use third-party backup and security tools such as Acronis to fill those gaps.","briefOverview":"\u003cp\u003eMicrosoft 365 is presented as a productivity platform that does not provide complete built-in protection for business data. The article says Microsoft operates under a shared responsibility model, where Microsoft handles service availability and infrastructure security, while customers remain responsible for backup, recovery, and broader data protection. It argues that this gap becomes important during ransomware, accidental deletion, insider threat, phishing, and compliance scenarios.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies five areas where native Microsoft 365 capabilities are described as insufficient: ransomware recovery, compliance retention, granular recovery, phishing and insider threat recovery, and cost-efficient scaling. It says versioning, recycle bins, and retention policies may help in limited cases but are not designed to ensure clean restoration, long-term compliance, or precise recovery of individual items. It promotes third-party backup and cybersecurity capabilities, specifically Acronis Cyber Platform, as a way to add immutable storage, AI-based ransomware detection, long-term retention, granular restore, and centralized management.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article argues that organizations should not assume Microsoft 365 automatically protects all business data. It states that Microsoft 365 follows a shared responsibility model in which Microsoft provides service availability and infrastructure security, while customers are responsible for backup, recovery, and data protection. The article frames third-party backup, security, and recovery tools as necessary for scenarios involving ransomware, accidental deletion, insider threats, and compliance failures.\u003c/p\u003e\n\n\u003cp\u003eA major concern raised is ransomware and malicious data loss in Microsoft 365 environments. The article says encrypted or deleted files in OneDrive or SharePoint can be synchronized across users and devices, while version history and recycle bins provide only limited recovery. It also says attackers may corrupt multiple versions or remain undetected long enough to make recovery points unusable, creating uncertainty about which file versions are safe.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Microsoft 365 retention policies are not sufficient for many compliance needs. It states that healthcare, finance, and legal organizations may require years or decades of retention and strict auditability, while Microsoft retention policies are described as governance tools rather than comprehensive backups. The article says limitations include rigid retention structures, lack of independent storage, and difficulty demonstrating compliance during audits.\u003c/p\u003e\n\n\u003cp\u003eGranular recovery is another limitation highlighted in the article. It says organizations often need to restore specific emails, folders, user accounts, Teams conversations, or SharePoint documents rather than entire environments. The article describes Microsoft’s native recovery workflows as complex, time-consuming, and sometimes imprecise, increasing downtime and IT workload.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that phishing and insider threats can cause data deletion, exfiltration, or manipulation through legitimate user sessions. It says Microsoft 365 provides some limited threat prevention, but recovery after incidents can be manual and fragmented. The article promotes Acronis Cyber Platform and Acronis Cyber Platform for MSPs as third-party options that combine backup, cybersecurity, clean recovery, long-term retention, scalable per-seat pricing, and centralized management across Microsoft 365, endpoints, workloads, and multiple tenants.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a sponsored piece written by Acronis that argues Microsoft 365 is not a complete business data protection solution. Its central message is that Microsoft 365 does not automatically provide full backup, recovery, ransomware protection, or compliance-ready retention for customer data.\u003c/p\u003e\n\n\u003cp\u003eThe article says Microsoft 365 operates under a shared responsibility model. In that model, Microsoft is responsible for service availability and infrastructure security, while the customer remains responsible for data protection, including backup and recovery.\u003c/p\u003e\n\n\u003cp\u003eThe article frames third-party backup and cybersecurity tools as essential for protecting Microsoft 365 data in real-world scenarios involving ransomware, accidental deletion, insider threats, phishing, and compliance failures.\u003c/p\u003e\n\n\u003ch2 id=\"shared-responsibility-and-customer-data-protection\"\u003eShared responsibility and customer data protection\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Microsoft does not claim to provide complete built-in protection for all Microsoft 365 business data. It states that organizations often assume this protection exists, but that backup and recovery remain the customer’s responsibility.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this responsibility gap becomes critical when organizations face incidents such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRansomware.\u003c/li\u003e\n\u003cli\u003eAccidental deletion.\u003c/li\u003e\n\u003cli\u003eInsider threats.\u003c/li\u003e\n\u003cli\u003ePhishing-related account compromise.\u003c/li\u003e\n\u003cli\u003eCompliance failures.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that dedicated third-party backup, security, and recovery capabilities are needed to safeguard Microsoft 365 data effectively.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-and-malicious-data-loss\"\u003eRansomware and malicious data loss\u003c/h2\u003e\n\n\u003cp\u003eThe first major limitation described is Microsoft 365’s handling of ransomware and malicious data loss. The article says Microsoft 365 does not fully protect against ransomware, particularly when encrypted or deleted files are synchronized across accounts.\u003c/p\u003e\n\n\u003cp\u003eIt notes that OneDrive and SharePoint files may be encrypted and then synchronized quickly across users and devices. Native version history and recycle bins may help in simple cases, but the article says they are not designed to guarantee clean and reliable restoration after sophisticated attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several specific ransomware recovery problems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttackers may corrupt multiple file versions.\u003c/li\u003e\n\u003cli\u003eAttacks may remain undetected long enough to make recovery points unusable.\u003c/li\u003e\n\u003cli\u003eMicrosoft’s native tools may not identify which file versions are safe and which are compromised.\u003c/li\u003e\n\u003cli\u003eUncertainty about clean recovery points can delay restoration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents third-party capabilities such as immutable storage, AI-based ransomware detection, and verified clean recovery points as ways to reduce this uncertainty. It specifically cites Acronis Cyber Platform as an example of a platform that combines backup with active protection.\u003c/p\u003e\n\n\u003ch2 id=\"compliance-and-retention-limitations\"\u003eCompliance and retention limitations\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft 365 retention policies are not sufficient for many compliance requirements. It focuses especially on organizations that need long-term and flexible retention.\u003c/p\u003e\n\n\u003cp\u003eIt states that compliance needs vary across industries, including healthcare, finance, and legal sectors. These organizations may require years or decades of retention, along with strict auditability.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Microsoft retention policies as primarily designed for basic governance rather than comprehensive backup. It identifies several limitations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRetention settings may lack sufficient granularity.\u003c/li\u003e\n\u003cli\u003eRetention structures may be rigid.\u003c/li\u003e\n\u003cli\u003eStorage may not be independent.\u003c/li\u003e\n\u003cli\u003eOrganizations may face challenges demonstrating compliance during audits.\u003c/li\u003e\n\u003cli\u003eRetention policies are not the same as backups because they are not designed for full data restoration scenarios.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that third-party backup can provide independent long-term storage and flexible retention policies tailored to regulatory requirements.\u003c/p\u003e\n\n\u003ch2 id=\"granular-recovery-challenges\"\u003eGranular recovery challenges\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft 365 is not designed to provide efficient native granular recovery. It argues that quickly restoring specific files, emails, folders, user data, Teams conversations, or SharePoint documents can be difficult.\u003c/p\u003e\n\n\u003cp\u003eIt notes that organizations often do not need to restore entire environments. Instead, they frequently need to recover individual items or user-specific data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Microsoft’s native tools can require complex workflows or broader restores to retrieve small pieces of data. This can increase recovery time, downtime, and IT workload, especially in large environments with many users and services.\u003c/p\u003e\n\n\u003cp\u003eThe article promotes centralized third-party recovery as a way to restore individual items across Exchange, SharePoint, Teams, and OneDrive without disrupting the broader environment.\u003c/p\u003e\n\n\u003ch2 id=\"phishing-and-insider-threats\"\u003ePhishing and insider threats\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses phishing and insider threats as causes of Microsoft 365 data loss. It says Microsoft does not intend or claim to fully protect against all data loss caused by these scenarios.\u003c/p\u003e\n\n\u003cp\u003eFor phishing, the article says compromised accounts can allow attackers to act through legitimate user sessions. Once inside an account, attackers may delete files, exfiltrate data, or manipulate content.\u003c/p\u003e\n\n\u003cp\u003eFor insider threats, the article says both malicious and accidental actions can cause significant data loss. It states that Microsoft 365 provides some limited threat prevention, but that recovery after an incident is often manual and fragmented.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that platforms combining backup and cybersecurity can make clean data restoration part of the incident response process.\u003c/p\u003e\n\n\u003ch2 id=\"cost-efficient-scaling-and-msp-use-cases\"\u003eCost-efficient scaling and MSP use cases\u003c/h2\u003e\n\n\u003cp\u003eThe fifth limitation described is cost-efficient scaling. The article says Microsoft 365 backup is not designed to be cost-efficient at scale, especially for growing organizations and managed service providers managing multiple tenants.\u003c/p\u003e\n\n\u003cp\u003eIt states that native options can become expensive and may lack the flexibility needed to manage storage and retention across environments. As organizations grow, their data footprint increases, making backup management more complex.\u003c/p\u003e\n\n\u003cp\u003eThe article says Microsoft’s pricing and storage structures are not optimized for large-scale backup strategies. It especially highlights the needs of managed service providers, which require multi-tenant visibility and control.\u003c/p\u003e\n\n\u003cp\u003eThe article promotes Acronis Cyber Platform for MSPs as offering scalable per-seat pricing, predictable costs, centralized administration, and multi-environment backup management.\u003c/p\u003e\n\n\u003ch2 id=\"acronis-positioning-in-the-article\"\u003eAcronis positioning in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article repeatedly presents Acronis Cyber Platform as a third-party option for addressing Microsoft 365 data protection gaps. It describes Acronis capabilities as including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecure backups.\u003c/li\u003e\n\u003cli\u003eImmutable storage.\u003c/li\u003e\n\u003cli\u003eAI-powered ransomware detection.\u003c/li\u003e\n\u003cli\u003eClean recovery points.\u003c/li\u003e\n\u003cli\u003eRapid recovery.\u003c/li\u003e\n\u003cli\u003eGranular restore across Microsoft 365 services.\u003c/li\u003e\n\u003cli\u003eLong-term data retention.\u003c/li\u003e\n\u003cli\u003eCentralized management.\u003c/li\u003e\n\u003cli\u003eScalable per-seat pricing for MSPs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Acronis combines backup, cybersecurity, and recovery into a single platform for Microsoft 365, endpoints, and workloads.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected parties and stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe primary affected parties discussed are organizations using Microsoft 365 for business data. The article also refers to managed service providers that support multiple Microsoft 365 tenants.\u003c/p\u003e\n\n\u003cp\u003eNamed products and services discussed include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft 365.\u003c/li\u003e\n\u003cli\u003eOneDrive.\u003c/li\u003e\n\u003cli\u003eSharePoint.\u003c/li\u003e\n\u003cli\u003eTeams.\u003c/li\u003e\n\u003cli\u003eExchange.\u003c/li\u003e\n\u003cli\u003eAcronis Cyber Platform.\u003c/li\u003e\n\u003cli\u003eAcronis Cyber Platform for MSPs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not identify a specific incident, victim organization, threat actor, malware family, or vulnerability as the focus. It instead presents a best-practice and product-oriented argument about Microsoft 365 data protection responsibilities and limitations.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main conclusion is that Microsoft 365 is powerful for productivity but is not intended to serve as a complete data protection solution. It says organizations remain responsible for protecting and recovering their Microsoft 365 data.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that native Microsoft 365 capabilities are limited in ransomware recovery, compliance retention, granular restore, phishing and insider threat response, and scaling. It promotes third-party backup and cybersecurity platforms, particularly Acronis Cyber Platform, as the missing protection layer for Microsoft 365 data.\u003c/p\u003e\n","keyPoints":["Microsoft 365 operates under a shared responsibility model in which Microsoft ensures service availability and infrastructure security, while customers remain responsible for data protection, including backup and recovery.","The article says Microsoft 365’s native versioning and recycle bins provide only limited recovery against ransomware or malicious data loss, especially when encrypted or deleted files are synchronized across OneDrive or SharePoint.","Microsoft 365 retention policies may not meet long-term, flexible compliance requirements for industries such as healthcare, finance, and legal, because they are designed for governance rather than comprehensive backup.","The article states that Microsoft 365’s native recovery tools can make restoring specific files, emails, folders, Teams conversations, or user data time-consuming and inefficient.","The article promotes third-party solutions such as Acronis Cyber Platform as a way to add immutable storage, AI-based ransomware detection, granular recovery, long-term retention, and scalable management for Microsoft 365 data."],"insights":["Organizations should not treat Microsoft 365 retention policies as equivalent to backups, because the article states they are designed for governance rather than full data restoration scenarios.","Ransomware recovery in Microsoft 365 can become uncertain if attackers corrupt multiple file versions or if the compromise remains undetected long enough to make available recovery points unusable.","For incident response, the article emphasizes that identifying a clean recovery point matters as much as having version history, because Microsoft’s native tools may not determine which file versions are safe versus compromised.","Managed service providers and growing organizations should evaluate Microsoft 365 backup costs by tenant and seat scalability, since the article says native options can become costly and lack multi-tenant visibility and control at scale."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft 365 is presented as a productivity platform that does not provide complete built-in protection for business data. The article says Microsoft operates under a shared responsibility model, where Microsoft handles service availability and infrastructure security, while customers remain responsible for backup, recovery, and broader data protection. It argues that this gap becomes important during ransomware, accidental deletion, insider threat, phishing, and compliance scenarios.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies five areas where native Microsoft 365 capabilities are described as insufficient: ransomware recovery, compliance retention, granular recovery, phishing and insider threat recovery, and cost-efficient scaling. It says versioning, recycle bins, and retention policies may help in limited cases but are not designed to ensure clean restoration, long-term compliance, or precise recovery of individual items. It promotes third-party backup and cybersecurity capabilities, specifically Acronis Cyber Platform, as a way to add immutable storage, AI-based ransomware detection, long-term retention, granular restore, and centralized management.\u003c/p\u003e\n"},{"n":23,"title":"Orphaned AI Agents: How to Find Hidden Access Risks Inside Your Network","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/orphaned-ai-agents-how-to-find-hidden.html","time":"15:33","priority":"MAY READ","score":35,"tldr":"The article promotes an upcoming Hacker News/SailPoint webinar on the security risks of orphaned internal AI agents and standing privileges, where AI tools may keep accessing sensitive systems after their human owners leave. The key takeaway is that enterprises need visibility and ownership mapping for AI identities to revoke unnecessary access before it is abused.","briefOverview":"\u003cp\u003eThe article promotes a live technical briefing from The Hacker News on hidden access risks created by internal AI tools. It focuses on “orphaned agents,” described as AI tools left running after their creator leaves the company, and “standing privileges,” described as permanent, unrestricted access that AI no longer needs. The article says these issues can leave AI tools with unmonitored access to sensitive databases and source code after a human employee’s credentials are revoked.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that traditional access tools often miss this risk because they treat AI like standard software. It says an AI tool may pull an entire repository and appear to be doing its job, while the system lacks context about whether the employee who created it has left the company. The webinar is presented as covering how to unify human, machine, and AI identities under one control plane.\u003c/p\u003e\n\n\u003cp\u003eThe session will cover the identity gap, techniques for finding undocumented AI tools active on a network, and ways to gain visibility into enterprise AI use without adding network infrastructure bottlenecks. The article frames the issue as one of accountability and access ownership. It says the goal is to help organizations revoke access before an attacker uses it.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article centers on the security risk posed by internal AI tools that continue operating after their human creators leave an organization. It describes these tools as “orphaned agents” and pairs that problem with “standing privileges,” where AI retains permanent, unrestricted access it no longer needs. The article says the rush to adopt internal AI tools has created administrative debt for enterprises.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the core issue is that automated tools can remain active even after the employee who built them has departed. These tools may keep access to sensitive databases and source code long after the human’s credentials are revoked. The article frames this as a gap in accountability because security teams may not be able to immediately identify who authorized an autonomous AI agent interacting with core intellectual property.\u003c/p\u003e\n\n\u003cp\u003eThe article says existing security tools can miss this signal because they treat AI like standard software. It gives the example of a standard security filter seeing an AI tool pull an entire repository and assuming the application is performing expected work. The article says the system may not know that the employee who created the tool left the company, or whose identity the agent is borrowing.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that securing an AI tool in isolation is insufficient. It says finding hidden scripts is only part of the problem, because organizations also need to map them back to a living owner. It presents a need to unify human, machine, and AI identities under one control plane.\u003c/p\u003e\n\n\u003cp\u003eThe Hacker News is hosting a technical briefing titled “Orphaned Agents \u0026amp; Standing Privileges: The Hidden Access Risks of Internal AI.” The session will cover the identity gap, a step-by-step walkthrough for finding undocumented AI tools on a network, and approaches for gaining visibility into enterprise AI use without adding network infrastructure bottlenecks. The article also names SailPoint in connection with the webinar.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses hidden access risks associated with internal AI tools in enterprise environments. Its central focus is on “orphaned agents,” defined in the article as AI tools left running after their creator leaves the company, and “standing privileges,” defined as AI retaining permanent, unrestricted access it no longer needs.\u003c/p\u003e\n\n\u003cp\u003eThe article frames these risks as administrative debt created by the rapid adoption of internal AI tools. It states that when employees move on, the automated tools they built may stay active and continue to hold unmonitored access to sensitive databases and source code after the human employee’s credentials have been revoked.\u003c/p\u003e\n\n\u003ch2 id=\"core-security-concern\"\u003eCore Security Concern\u003c/h2\u003e\n\n\u003cp\u003eThe article opens with the accountability question of whether a security team can instantly name the person who authorized an autonomous AI agent interacting with a company’s core intellectual property. It says that, for most enterprises, the answer is no.\u003c/p\u003e\n\n\u003cp\u003eThe key concern is that AI tools may continue accessing sensitive systems without a current, accountable human owner. The article presents this as a gap between human identity management and the ongoing operation of AI-driven automation.\u003c/p\u003e\n\n\u003ch2 id=\"why-existing-security-tools-may-miss-the-risk\"\u003eWhy Existing Security Tools May Miss the Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that traditional access tools treat AI like standard software, while AI tools continuously pull, shift, and interact with data on their own. This can make AI activity appear normal to a standard security filter even when the ownership context has changed.\u003c/p\u003e\n\n\u003cp\u003eOne example given is an AI tool pulling an entire repository. The article says a standard security filter may assume the application is simply doing its job and may not know that the employee who originally created the tool left the company the previous week. It also says the system cannot judge whether the action is malicious if it does not know whose identity the agent is borrowing.\u003c/p\u003e\n\n\u003ch2 id=\"identity-and-ownership-gap\"\u003eIdentity and Ownership Gap\u003c/h2\u003e\n\n\u003cp\u003eThe article says securing an AI tool by itself does not work. It states that finding hidden scripts is only half the problem because the organization must also map them back to a living owner.\u003c/p\u003e\n\n\u003cp\u003eThe article presents a need to unify human, machine, and AI identities under one control plane. It describes this as the kind of “plumbing” required to close the accountability gap around internal AI tools.\u003c/p\u003e\n\n\u003ch2 id=\"webinar-and-covered-topics\"\u003eWebinar and Covered Topics\u003c/h2\u003e\n\n\u003cp\u003eThe Hacker News is hosting a live technical briefing titled “Orphaned Agents \u0026amp; Standing Privileges: The Hidden Access Risks of Internal AI.” The article also names SailPoint in connection with the session.\u003c/p\u003e\n\n\u003cp\u003eThe article says the session will focus on practical architecture rather than AI marketing hype. It lists three major areas of coverage:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe identity gap, including why securing an AI tool in isolation fails if an organization does not know whose credentials it is running on.\u003c/li\u003e\n\u003cli\u003eFinding Shadow AI, including a step-by-step walkthrough to track down undocumented tools active on a network.\u003c/li\u003e\n\u003cli\u003eDeployment reality, including how to gain immediate visibility into enterprise AI use without adding network infrastructure bottlenecks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stated-impact-and-response\"\u003eStated Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article states that orphaned AI tools can keep unmonitored access to sensitive databases and source code after their creators leave. It also says an access token may remain active months after the developer who built the automation has left.\u003c/p\u003e\n\n\u003cp\u003eThe recommended response presented in the article is to identify undocumented AI tools, map them to current owners, understand the credentials or identities they use, and revoke access before an attacker uses it. The article positions the webinar as a resource for learning how to address those risks.\u003c/p\u003e\n","keyPoints":["The article says enterprises have accumulated administrative debt from orphaned AI agents and standing privileges as they rapidly adopt internal AI tools.","Orphaned AI agents are described as AI tools that remain active after their creator leaves the company, potentially retaining unmonitored access to sensitive databases and source code.","The article argues that traditional access tools can miss risks because they may not know whose identity an AI agent is using or whether its creator has left the company.","The webinar will cover the identity gap, methods for finding undocumented AI tools on a network, and ways to gain visibility into enterprise AI use without adding network infrastructure bottlenecks.","The Hacker News is hosting a technical briefing with SailPoint titled “Orphaned Agents \u0026 Standing Privileges: The Hidden Access Risks of Internal AI.”"],"insights":["Revoking a departed employee’s credentials may not remove risk if AI tools they created continue operating with separate access tokens.","The article emphasizes that discovering undocumented AI tools is insufficient unless each tool can also be mapped to a current human owner.","Security monitoring that treats large repository access as normal application behavior may miss risky AI activity when it lacks identity and ownership context.","The proposed control approach is to unify human, machine, and AI identities under one control plane rather than securing AI tools in isolation."],"referencedReports":[],"body":"\u003cp\u003eThe article promotes a live technical briefing from The Hacker News on hidden access risks created by internal AI tools. It focuses on “orphaned agents,” described as AI tools left running after their creator leaves the company, and “standing privileges,” described as permanent, unrestricted access that AI no longer needs. The article says these issues can leave AI tools with unmonitored access to sensitive databases and source code after a human employee’s credentials are revoked.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that traditional access tools often miss this risk because they treat AI like standard software. It says an AI tool may pull an entire repository and appear to be doing its job, while the system lacks context about whether the employee who created it has left the company. The webinar is presented as covering how to unify human, machine, and AI identities under one control plane.\u003c/p\u003e\n\n\u003cp\u003eThe session will cover the identity gap, techniques for finding undocumented AI tools active on a network, and ways to gain visibility into enterprise AI use without adding network infrastructure bottlenecks. The article frames the issue as one of accountability and access ownership. It says the goal is to help organizations revoke access before an attacker uses it.\u003c/p\u003e\n"}];

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }

    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>

    );

  }
}

function AnalysisTabs({ article }) {

  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });

  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });

  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {

    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
