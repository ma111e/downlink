 successful authentication, the email contained several mismatches, including a CTA that pointed to \u003ccode\u003eaccess[.]genesiscleaningusa[.]com/workspace/\u003c/code\u003e, a subdomain associated with a US commercial cleaning services company. The button’s HTML \u003ccode\u003etitle\u003c/code\u003e attribute displayed \u003ccode\u003esupplier[.]coupahost[.]com/invoices\u003c/code\u003e, which did not match the actual destination.\u003c/p\u003e\n\n\u003cp\u003eAdditional anomalies included a From domain of \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e, a visible To header addressed to \u003ccode\u003et[.]manzoor@hhslawyers[.]com\u003c/code\u003e, and delivery to the actual recipient via BCC. Microsoft scored the message at SCL=5 as PotentialSpam. Themis identified the credential theft pattern, VIP targeting, and first-time sender signal, then quarantined four affected mailboxes within seconds of delivery.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a phishing email that impersonated a legal document-sharing notification from a UAE-based law firm domain. The message came from \u003ccode\u003et[.]manzoor@hhslawyer[.]ae\u003c/code\u003e and targeted a global specialty ingredients manufacturer. It referenced document #01179 for “Legal Consulting Services, Statement and Proposals” and presented a blue “Review Document” button.\u003c/p\u003e\n\n\u003cp\u003eThe email passed SPF, DKIM, and DMARC with \u003ccode\u003ecompauth=100\u003c/code\u003e, and it was sent through Google mail infrastructure. The article states that the sender controlled the \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e domain and had configured it correctly with Google Workspace. A valid DKIM signature was present under the \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e domain.\u003c/p\u003e\n\n\u003cp\u003eThe most prominent technical mismatch was the CTA destination. The “Review Document” button linked to \u003ccode\u003eaccess[.]genesiscleaningusa[.]com/workspace/\u003c/code\u003e, a subdomain belonging to a US commercial cleaning services company. The HTML \u003ccode\u003etitle\u003c/code\u003e attribute on the button displayed \u003ccode\u003esupplier[.]coupahost[.]com/invoices\u003c/code\u003e, a Coupa procurement portal URL that did not match the actual link destination.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights an addressing mismatch. The From address used \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e, while the To header addressed \u003ccode\u003et[.]manzoor@hhslawyers[.]com\u003c/code\u003e, a similar but different domain. The actual target was not visible in the To field and received the message via BCC.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft scored the message at SCL=5, described in the article as a PotentialSpam flag. Themis flagged credential theft targeting VIP recipients at 57% confidence and identified a first-time sender signal. Four affected mailboxes were quarantined within seconds of delivery.\u003c/p\u003e\n\n\u003cp\u003eThe article maps the activity to MITRE ATT\u0026amp;CK techniques for Spearphishing Link, Masquerading: Match Legitimate Name or Location, and User Execution: Malicious Link. It emphasizes that authentication was not the problem, because all sender authentication checks passed while the behavioral and content mismatches indicated risk.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a phishing email that impersonated a shared legal document notification from a UAE-based law firm domain. The message was sent from \u003ccode\u003et[.]manzoor@hhslawyer[.]ae\u003c/code\u003e and arrived at a global specialty ingredients manufacturer. It referenced document #01179 for “Legal Consulting Services, Statement and Proposals” and included a blue “Review Document” call-to-action button.\u003c/p\u003e\n\n\u003cp\u003eThe email appeared credible at the authentication layer. SPF, DKIM, and DMARC all passed with \u003ccode\u003ecompauth=100\u003c/code\u003e, and the message was sent through Google mail infrastructure. The article states that the sender controlled the \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e domain and had configured it correctly with Google Workspace.\u003c/p\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore Significance\u003c/h2\u003e\n\n\u003cp\u003eThe central finding is that the phishing email passed standard email authentication checks while still showing multiple behavioral and content mismatches. The article emphasizes that authentication was not the problem in this case. Instead, the suspicious indicators came from mismatched domains, a misleading button tooltip, hidden recipient delivery, and content framing that did not align with the actual destination.\u003c/p\u003e\n\n\u003cp\u003eThemis flagged the message as credential theft targeting VIP recipients at 57% confidence. Microsoft scored the message at SCL=5, which the article describes as a PotentialSpam flag. Four affected mailboxes were quarantined within seconds of delivery.\u003c/p\u003e\n\n\u003ch2 id=\"sender-and-authentication-details\"\u003eSender and Authentication Details\u003c/h2\u003e\n\n\u003cp\u003eThe sending address was \u003ccode\u003et[.]manzoor@hhslawyer[.]ae\u003c/code\u003e, with the display name “Tawqeer \\ HHS.” The sending domain was \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e, described as a UAE law firm domain using Google Workspace. The message had a valid DKIM signature under the \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e domain.\u003c/p\u003e\n\n\u003cp\u003eAuthentication results reported in the article were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSPF: pass\u003c/li\u003e\n\u003cli\u003eDKIM: pass\u003c/li\u003e\n\u003cli\u003eDMARC: pass\u003c/li\u003e\n\u003cli\u003eComposite authentication: \u003ccode\u003ecompauth=100\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that every technical authentication check passed. It also notes that Microsoft still scored the message at SCL=5, identifying behavioral anomalies that authentication did not address.\u003c/p\u003e\n\n\u003ch2 id=\"cta-and-link-mismatches\"\u003eCTA and Link Mismatches\u003c/h2\u003e\n\n\u003cp\u003eThe first major mismatch involved the “Review Document” button. The actual CTA link pointed to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eaccess[.]genesiscleaningusa[.]com/workspace/\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes this as a subdomain belonging to a US commercial cleaning services company. This destination did not align with the claimed UAE law firm sender or with the legal document-sharing theme.\u003c/p\u003e\n\n\u003cp\u003eThe same button also had an HTML \u003ccode\u003etitle\u003c/code\u003e attribute displaying:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esupplier[.]coupahost[.]com/invoices\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies this as a Coupa procurement portal URL. The displayed tooltip URL did not match the actual destination, and neither domain had a relationship to a UAE law firm or to legal document signing, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"addressing-and-delivery-mismatches\"\u003eAddressing and Delivery Mismatches\u003c/h2\u003e\n\n\u003cp\u003eThe second major mismatch involved the From and To domains. The From address used:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe visible To header addressed:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003et[.]manzoor@hhslawyers[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights that these domains differ by one letter and by top-level domain: one is singular with the UAE country-code domain, and the other is plural with a generic \u003ccode\u003e.com\u003c/code\u003e domain. It states that the two domains are operated by different entities.\u003c/p\u003e\n\n\u003cp\u003eThe actual target was not listed in the To field. The recipient received the message through BCC, hiding them from the visible To and CC fields.\u003c/p\u003e\n\n\u003ch2 id=\"content-framing-mismatch\"\u003eContent Framing Mismatch\u003c/h2\u003e\n\n\u003cp\u003eThe subject line referenced legal consulting services and proposals. The email body used a document-sharing template and included a disclaimer block. However, the CTA pointed to a procurement workspace rather than a document management platform.\u003c/p\u003e\n\n\u003cp\u003eThis created a third mismatch between the content framing and the actual link behavior. The article presents this mismatch as part of the reason the message was suspicious despite passing authentication.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft scored the message at SCL=5, labeled in the article as PotentialSpam. Themis identified several risk signals, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredential theft pattern\u003c/li\u003e\n\u003cli\u003eVIP targeting\u003c/li\u003e\n\u003cli\u003eFirst-time sender signal\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Themis quarantined four affected mailboxes within seconds of delivery. Themis assessed the attack as credential theft targeting VIP recipients at 57% confidence.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators and context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSending domain: \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e, described as a UAE law firm domain using Google Workspace.\u003c/li\u003e\n\u003cli\u003eSending address: \u003ccode\u003et[.]manzoor@hhslawyer[.]ae\u003c/code\u003e, with display name “Tawqeer \\ HHS.”\u003c/li\u003e\n\u003cli\u003eTo header domain: \u003ccode\u003ehhslawyers[.]com\u003c/code\u003e, a different domain from the From domain.\u003c/li\u003e\n\u003cli\u003eCTA URL: \u003ccode\u003eaccess[.]genesiscleaningusa[.]com/workspace/\u003c/code\u003e, described as a US cleaning company subdomain.\u003c/li\u003e\n\u003cli\u003eTooltip URL: \u003ccode\u003esupplier[.]coupahost[.]com/invoices\u003c/code\u003e, described as a Coupa procurement portal URL.\u003c/li\u003e\n\u003cli\u003eAuthentication results: SPF pass, DKIM pass, DMARC pass, \u003ccode\u003ecompauth=100\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSCL: 5, with PotentialSpam flag set.\u003c/li\u003e\n\u003cli\u003eDelivery method: BCC, with the recipient hidden from To and CC fields.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eT1566.002 — Phishing: Spearphishing Link:\u003c/strong\u003e The CTA button led to a credential harvesting page, according to the article’s mapping.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eT1036.005 — Masquerading: Match Legitimate Name or Location:\u003c/strong\u003e The law firm brand was used as a trust anchor.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eT1204.001 — User Execution: Malicious Link:\u003c/strong\u003e The “Review Document” button was designed to trigger a click.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-named-entities\"\u003eAffected Parties and Named Entities\u003c/h2\u003e\n\n\u003cp\u003eThe targeted organization is described as a global specialty ingredients manufacturer. The sending domain was associated in the article with a UAE law firm domain, \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e. The CTA destination used a subdomain of Genesis Cleaning USA, described as a US commercial cleaning services company.\u003c/p\u003e\n\n\u003cp\u003eOther named entities in the article include Google Workspace, Microsoft, Themis, IRONSCALES, Coupa, and MITRE ATT\u0026amp;CK. The article does not name a threat actor or group behind the phishing email.\u003c/p\u003e\n","keyPoints":["A phishing email from t[.]manzoor@hhslawyer[.]ae impersonated a legal document-sharing notification and included a “Review Document” button for document #01179 related to legal consulting services, statements, and proposals.","The email passed SPF, DKIM, and DMARC with compauth=100 and was sent through Google mail infrastructure with a valid DKIM signature under the hhslawyer[.]ae domain.","The “Review Document” button linked to access[.]genesiscleaningusa[.]com/workspace/, while the button’s HTML title attribute displayed supplier[.]coupahost[.]com/invoices.","The From address used hhslawyer[.]ae, the visible To header addressed t[.]manzoor@hhslawyers[.]com, and the actual recipient received the message via BCC.","Microsoft scored the message at SCL=5, and Themis flagged credential theft targeting VIP recipients at 57% confidence before quarantining four affected mailboxes."],"insights":["Passing SPF, DKIM, and DMARC with compauth=100 did not prevent the message from being classified as suspicious, showing that authentication success alone was insufficient to judge this email as safe.","The mismatch between the visible button tooltip and the actual CTA destination was a concrete HTML-level indicator of deception in an otherwise credible-looking legal document notification.","The use of BCC meant the actual recipient was hidden from the visible To and CC fields, making visible addressing mismatches an important clue in this campaign.","Microsoft’s SCL=5 rating and Themis’s quarantine action were driven by behavioral anomalies such as first-time sender, VIP targeting, and credential theft patterns rather than failed sender authentication."],"referencedReports":[],"body":"\u003cp\u003eA phishing email from \u003ccode\u003et[.]manzoor@hhslawyer[.]ae\u003c/code\u003e targeted a global specialty ingredients manufacturer while posing as a legal document-sharing notification. The message used UAE law firm branding, referenced document #01179 for “Legal Consulting Services, Statement and Proposals,” and included a blue “Review Document” button. Themis flagged the message as credential theft targeting VIP recipients at 57% confidence.\u003c/p\u003e\n\n\u003cp\u003eThe message was notable because SPF, DKIM, and DMARC all passed with \u003ccode\u003ecompauth=100\u003c/code\u003e, and it was sent through Google mail infrastructure with a valid DKIM signature under the \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e domain. Despite successful authentication, the email contained several mismatches, including a CTA that pointed to \u003ccode\u003eaccess[.]genesiscleaningusa[.]com/workspace/\u003c/code\u003e, a subdomain associated with a US commercial cleaning services company. The button’s HTML \u003ccode\u003etitle\u003c/code\u003e attribute displayed \u003ccode\u003esupplier[.]coupahost[.]com/invoices\u003c/code\u003e, which did not match the actual destination.\u003c/p\u003e\n\n\u003cp\u003eAdditional anomalies included a From domain of \u003ccode\u003ehhslawyer[.]ae\u003c/code\u003e, a visible To header addressed to \u003ccode\u003et[.]manzoor@hhslawyers[.]com\u003c/code\u003e, and delivery to the actual recipient via BCC. Microsoft scored the message at SCL=5 as PotentialSpam. Themis identified the credential theft pattern, VIP targeting, and first-time sender signal, then quarantined four affected mailboxes within seconds of delivery.\u003c/p\u003e\n"},{"n":16,"title":"Apple fixes Beats Studio Buds flaw that let hackers spy on conversations","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/apple-fixes-beats-studio-buds-flaw-that-let-hackers-spy-on-conversations/","time":"12:23","priority":"MAY READ","score":70,"tldr":"Apple patched a high-severity Bluetooth flaw in Beats Studio Buds that could let nearby attackers listen through the earbuds’ microphone before pairing. Users should ensure their earbuds receive Beats Firmware Update 1B211 via a paired iPhone, iPad, or Mac.","briefOverview":"\u003cp\u003eApple released security updates for Beats Studio Buds to fix a high-severity flaw that could let attackers within Bluetooth range spy on users’ conversations. Apple said an attacker may be able to listen through the microphone of a device that is not yet paired and is actively seeking pair requests. The fix is included in Beats Firmware Update 1B211.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is tracked as CVE-2025-20701 and was found by Dennis Heinze and Frieder Steinmetz of ERNW GmbH in Airoha system-on-a-chip components. The researchers previously disclosed the issue at the TROOPERS security conference in Germany and said it stems from missing authentication in Bluetooth BR/EDR radio. They also created a proof-of-concept exploit that could initiate a call and eavesdrop on conversations within earshot of the targeted phone.\u003c/p\u003e\n\n\u003cp\u003eApple said the firmware update will be automatically delivered to vulnerable headphones when they are paired and within Bluetooth range of the user’s iPhone, iPad, or Mac. Users can check whether the firmware has been applied from the Bluetooth settings by tapping the info button next to the headphones. The researchers said real attacks are complex to perform and likely to target only high-value targets because they require technical sophistication and physical proximity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eApple has patched a high-severity vulnerability affecting Beats Studio Buds wireless earbuds. The flaw could allow an attacker within Bluetooth range to listen through the microphone of a device that has not yet paired and is actively seeking pair requests. Apple described the issue in a Tuesday advisory and said it affects open source code, with Apple Software among the affected projects.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is tracked as CVE-2025-20701 and was discovered by Dennis Heinze and Frieder Steinmetz of ERNW GmbH. The issue was found in Airoha system-on-a-chip components. Apple addressed it in Beats Firmware Update 1B211.\u003c/p\u003e\n\n\u003cp\u003eThe ERNW researchers disclosed the vulnerability one year ago at the TROOPERS security conference in Germany. They said it stems from missing authentication in the Bluetooth BR/EDR radio. They also created a proof-of-concept exploit that allows attackers to initiate a call and eavesdrop on conversations within earshot of the targeted phone.\u003c/p\u003e\n\n\u003cp\u003eThe article states that CVE-2025-20701 can be chained with CVE-2025-20700 and CVE-2025-20702, which affect the same vulnerable component. In that scenario, attackers can use the Bluetooth Hands-Free Profile to issue commands to the phone after hijacking the connection between the phone and a paired Bluetooth audio device. The researchers said that in most cases these vulnerabilities allow attackers to fully take over the headphones via Bluetooth without authentication or pairing.\u003c/p\u003e\n\n\u003cp\u003eAccording to the researchers, the vulnerabilities can be triggered via Bluetooth BR/EDR or Bluetooth Low Energy, and being in Bluetooth range is the only precondition. They were able to read and write the device’s RAM and flash, retrieve call history and contacts, and call an arbitrary number after extracting Bluetooth link keys from a vulnerable device’s memory. However, they also said real attacks are complex to perform and are likely to target only high-value targets because they require technical sophistication and physical proximity.\u003c/p\u003e\n\n\u003cp\u003eApple’s fix is delivered automatically to vulnerable headphones when they are paired and within Bluetooth range of an iPhone, iPad, or Mac. Users can verify whether the firmware has been applied by opening Bluetooth settings and tapping the info button next to the headphones. The article does not name any known threat actor exploiting the flaw.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eApple released security updates to address a high-severity flaw affecting Beats Studio Buds wireless earbuds. The vulnerability could allow attackers within Bluetooth range to spy on users’ conversations by listening through the microphone of a vulnerable device. Apple said the issue applies to a device that is not yet paired and is actively seeking pair requests.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is tracked as CVE-2025-20701. Apple patched it in Beats Firmware Update 1B211. The update is automatically delivered to vulnerable headphones when they are paired and within Bluetooth range of a user’s iPhone, iPad, or Mac.\u003c/p\u003e\n\n\u003ch2 id=\"apple-s-advisory-and-update-path\"\u003eApple’s advisory and update path\u003c/h2\u003e\n\n\u003cp\u003eApple’s advisory states that an attacker within Bluetooth range may be able to listen through the microphone of a device that is not yet paired and is actively seeking pair requests. Apple also said the vulnerability is in open source code and that Apple Software is among the affected projects. The CVE identifier was assigned by a third party.\u003c/p\u003e\n\n\u003cp\u003eUsers can check whether Beats Firmware Update 1B211 has been applied from Bluetooth settings on their device. The article says users should tap the info button next to the headphones to view the firmware status.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-disclosure\"\u003eDiscovery and disclosure\u003c/h2\u003e\n\n\u003cp\u003eCVE-2025-20701 was discovered by Dennis Heinze and Frieder Steinmetz of ERNW GmbH. The issue was found in Airoha system-on-a-chip components. The researchers disclosed the vulnerability one year ago at the TROOPERS security conference in Germany.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the ERNW researchers said the flaw stems from a missing authentication weakness in the Bluetooth BR/EDR radio. They also created a proof-of-concept exploit. That exploit allows attackers to initiate a call and eavesdrop on conversations within earshot of the targeted phone.\u003c/p\u003e\n\n\u003ch2 id=\"technical-impact-described-by-the-researchers\"\u003eTechnical impact described by the researchers\u003c/h2\u003e\n\n\u003cp\u003eThe article says CVE-2025-20701 can be chained with two other vulnerabilities, CVE-2025-20700 and CVE-2025-20702. These vulnerabilities affect the same vulnerable component. When chained, attackers can use the Bluetooth Hands-Free Profile to issue commands to the phone after hijacking the connection between the phone and a paired Bluetooth audio device.\u003c/p\u003e\n\n\u003cp\u003eThe researchers warned that, in most cases, the vulnerabilities allow attackers to fully take over the headphones via Bluetooth. They said no authentication or pairing is required. They also said the vulnerabilities can be triggered through Bluetooth BR/EDR or Bluetooth Low Energy, with Bluetooth range being the only precondition.\u003c/p\u003e\n\n\u003cp\u003eThe researchers reported that it is possible to read and write the device’s RAM and flash. They were also able to retrieve call history and contacts. In addition, they could call an arbitrary number after extracting Bluetooth link keys from a vulnerable device’s memory.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-possible-commands\"\u003eScope of possible commands\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the range of available commands depends on the mobile operating system. However, the researchers said all major platforms support at least initiating and receiving calls. This means the demonstrated impact includes phone call control in addition to microphone eavesdropping under the described conditions.\u003c/p\u003e\n\n\u003ch2 id=\"practical-attack-considerations\"\u003ePractical attack considerations\u003c/h2\u003e\n\n\u003cp\u003eAlthough the article describes severe potential impact, the researchers said real attacks are complex to perform. They said such attacks should likely target only high-value targets. The reason given is that attacks require both technical sophistication and physical proximity.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected parties and response\u003c/h2\u003e\n\n\u003cp\u003eThe affected product named in the article is Beats Studio Buds. Apple is the vendor that released the firmware update, and Airoha system-on-a-chip components are identified as the location of the flaw. ERNW GmbH researchers are credited with discovering and disclosing the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eApple’s response was to release Beats Firmware Update 1B211. The article does not state that any specific threat actor has exploited the flaw. It also does not report any confirmed real-world compromise tied to the vulnerability.\u003c/p\u003e\n","keyPoints":["Apple released Beats Firmware Update 1B211 to patch a high-severity flaw affecting Beats Studio Buds wireless earbuds.","The vulnerability could allow an attacker within Bluetooth range to listen through the microphone of a device that is not yet paired and is actively seeking pairing requests.","Apple said the issue is in open source code and that Apple Software is among the affected projects.","The flaw, tracked as CVE-2025-20701, was discovered by Dennis Heinze and Frieder Steinmetz of ERNW GmbH in Airoha system-on-a-chip components.","ERNW researchers said chaining CVE-2025-20701 with CVE-2025-20700 and CVE-2025-20702 could let attackers hijack Bluetooth audio connections and issue commands to a phone using the Bluetooth Hands-Free Profile."],"insights":["The vulnerable earbuds receive the fix automatically only when they are paired and within Bluetooth range of an iPhone, iPad, or Mac, so users can verify the update status manually in Bluetooth settings.","The attack does not require prior pairing or authentication in the scenarios described by the researchers, with Bluetooth range being the only precondition.","The researchers showed that chaining related flaws could expand impact beyond eavesdropping to retrieving call history and contacts or placing arbitrary calls after extracting Bluetooth link keys from device memory.","Although the impact is severe, the researchers said real attacks are complex to perform and are more likely to be aimed at high-value targets because they require technical sophistication and physical proximity."],"referencedReports":[{"title":"About the security content of Beats Firmware Update 1B211","url":"https://support.apple.com/en-us/127557","publisher":"Apple","context":"The article cites Apple’s advisory explaining the Beats Studio Buds vulnerability and the firmware update that patches it.","category":"","primary":false}],"body":"\u003cp\u003eApple released security updates for Beats Studio Buds to fix a high-severity flaw that could let attackers within Bluetooth range spy on users’ conversations. Apple said an attacker may be able to listen through the microphone of a device that is not yet paired and is actively seeking pair requests. The fix is included in Beats Firmware Update 1B211.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is tracked as CVE-2025-20701 and was found by Dennis Heinze and Frieder Steinmetz of ERNW GmbH in Airoha system-on-a-chip components. The researchers previously disclosed the issue at the TROOPERS security conference in Germany and said it stems from missing authentication in Bluetooth BR/EDR radio. They also created a proof-of-concept exploit that could initiate a call and eavesdrop on conversations within earshot of the targeted phone.\u003c/p\u003e\n\n\u003cp\u003eApple said the firmware update will be automatically delivered to vulnerable headphones when they are paired and within Bluetooth range of the user’s iPhone, iPad, or Mac. Users can check whether the firmware has been applied from the Bluetooth settings by tapping the info button next to the headphones. The researchers said real attacks are complex to perform and likely to target only high-value targets because they require technical sophistication and physical proximity.\u003c/p\u003e\n"},{"n":2,"title":"Build your own vulnerability harness","source":"blog.cloudflare.com","sourceColorIdx":2,"link":"https://blog.cloudflare.com/build-your-own-vulnerability-harness/","time":"17:59","priority":"MAY READ","score":58,"tldr":"Cloudflare argues that effective AI-driven vulnerability discovery requires a model-agnostic orchestration harness, not standalone agents, with persistent state, cross-repo tracing, deduplication, adversarial validation, and human-reviewed fixes. The key takeaway is that the durable value is in the pipeline that filters noisy model output into verified, actionable security patches.","briefOverview":"\u003cp\u003eCloudflare describes how it evolved an initial \u003ccode\u003esecurity-audit\u003c/code\u003e skill into a model-agnostic vulnerability research harness for scanning enterprise codebases. The central message is that standalone models, prompts, or single-agent sessions are not enough for fleet-wide security analysis. Cloudflare argues that the durable value is in orchestration, persistence, validation, and triage rather than in any one frontier model.\u003c/p\u003e\n\n\u003cp\u003eThe system is split into a Vulnerability Discovery Harness and a Vulnerability Validation System. The discovery side uses staged agents for recon, hunting, validation, gap filling, deduplication, dependency tracing, feedback, and reporting, while the validation side uses a different model to deduplicate, judge production reachability, and assist with fixes. Cloudflare says this architecture helps control context windows, survive crashes, trace cross-repo dependencies, and filter noisy findings into actionable bugs.\u003c/p\u003e\n\n\u003cp\u003eCloudflare reports that its discovery harness generated 20,799 raw candidates, of which about 12,057 survived validation. After ingest into the shared validation system, deduplication and judgment reduced the pool to 7,245 actionable findings for engineering teams. The article emphasizes that every confirmed finding requires a threat model, a working proof-of-concept test against the original codebase, and a proposed patch, with humans required to review fixes before merging.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCloudflare presents a practical account of building a vulnerability harness for AI-assisted security research across enterprise codebases. The article builds on its earlier Project Glasswing work and argues that agentic security workflows should not depend on a single model, prompt, or coding agent session. Instead, Cloudflare says security analysis needs persistent orchestration, resumability, deduplication, cross-run state, and eventually cross-repository dependency tracing.\u003c/p\u003e\n\n\u003cp\u003eThe initial system began as a roughly 450-line \u003ccode\u003esecurity-audit\u003c/code\u003e skill that ran a seven-phase audit in one session. That skill used recon agents to write an \u003ccode\u003earchitecture.md\u003c/code\u003e, Hunter agents to pursue attack classes, validators to disprove findings, and final reporting stages to emit and re-verify structured results. Cloudflare says the skill worked, but single runs missed many bugs, exhausted context windows, lacked persistence, and could not reason across repository boundaries.\u003c/p\u003e\n\n\u003cp\u003eCloudflare codified the skill into a Vulnerability Discovery Harness with staged agents for Recon, Hunt, Validate, Gapfill, Dedup, Trace, Feedback, and Report. The system stores stage output in SQLite keyed by run, repository, and stage, allowing failed or interrupted work to resume without discarding entire runs. It keeps each agent narrowly scoped, aims to keep context use below 25% of the total window, and treats LLMs as stateless compute components.\u003c/p\u003e\n\n\u003cp\u003eThe harness uses dynamic threat modeling, where Recon writes a repo-specific taxonomy in addition to built-in attack classes. Hunter agents can compile fragments, build small versions, crash binaries in a sandbox, fork sibling agents for adjacent lines of inquiry, and write requests to a central wishlist when they need external resources. Cloudflare also describes cross-repo tracing through a unified symbol index and dependency graph so potential attacker-controlled input paths can be followed into consumer repositories.\u003c/p\u003e\n\n\u003cp\u003eFindings are passed into a separate Vulnerability Validation System that runs on a different model from discovery. This system performs deduplication, contextual judgment, and automated fixing, while keeping humans in the loop for branch review and merge decisions. Cloudflare says this independent triage layer helps separate exploitable production issues from latent or misattributed findings and prevents a Hunter from grading its own work.\u003c/p\u003e\n\n\u003cp\u003eCloudflare reports that 20,799 raw candidates from the discovery harness were reduced to about 12,057 validated findings, then combined with findings from another harness into a central pool of 13,841. The VVS deduplicated 5,442 findings, routed 1,154 to a wrong-repo or low-risk queue, and left 7,245 actionable findings for engineering teams. The article states that these findings came from an isolated, ring-fenced research experiment and do not represent active, unpatched vulnerabilities in Cloudflare’s live production environment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCloudflare describes how it built a model-agnostic vulnerability research harness for scanning enterprise codebases. The article’s central argument is that the future of agentic security workflows is not in standalone frontier models, prompts, or single-agent sessions, but in durable orchestration layers that can use different models as interchangeable components.\u003c/p\u003e\n\n\u003cp\u003eThe work is presented as a continuation of Cloudflare’s earlier Project Glasswing research, which examined what happens when frontier security models are pointed at enterprise code. Cloudflare says that market shifts in model availability and capability reinforce the need to decouple the security workflow from any single model provider.\u003c/p\u003e\n\n\u003ch2 id=\"why-cloudflare-says-a-harness-is-needed\"\u003eWhy Cloudflare says a harness is needed\u003c/h2\u003e\n\n\u003cp\u003eCloudflare identifies several limitations of generic coding agents and single-session workflows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAgents hold only one hypothesis at a time.\u003c/li\u003e\n\u003cli\u003eThey fill their context window after covering only part of a real repository.\u003c/li\u003e\n\u003cli\u003eThey lose information during context compaction.\u003c/li\u003e\n\u003cli\u003eThey cannot preserve hundreds of separate investigations across runs without external orchestration.\u003c/li\u003e\n\u003cli\u003eThey lack persistence, deduplication, resumability, and fleet-wide dependency tracing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that subagents are useful but insufficient on their own. Cloudflare frames the problem as an orchestration challenge rather than a prompting challenge.\u003c/p\u003e\n\n\u003ch2 id=\"from-a-skill-to-a-pipeline\"\u003eFrom a skill to a pipeline\u003c/h2\u003e\n\n\u003cp\u003eCloudflare began with a roughly 450-line \u003ccode\u003esecurity-audit\u003c/code\u003e skill that ran against a single repository. The skill performed a seven-phase audit:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThree parallel recon agents wrote an \u003ccode\u003earchitecture.md\u003c/code\u003e file.\u003c/li\u003e\n\u003cli\u003eA Hunter agent ran per attack class.\u003c/li\u003e\n\u003cli\u003eAdversarial validators attempted to disprove each finding.\u003c/li\u003e\n\u003cli\u003eSurviving findings were written into a human-readable vulnerability report.\u003c/li\u003e\n\u003cli\u003eFindings were also emitted as \u003ccode\u003efindings.json\u003c/code\u003e against a schema.\u003c/li\u003e\n\u003cli\u003eA fresh agent independently re-verified every finding.\u003c/li\u003e\n\u003cli\u003eSurviving findings were submitted to an ingest API.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCloudflare says this skill mapped almost directly onto the later harness. Recon became Recon, Hunters became Hunt, validators became Validate, reports became Report, schema checking became mechanical validation, and fresh verification became independent validation.\u003c/p\u003e\n\n\u003cp\u003eThe skill exposed three major limitations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eContext exhaustion:\u003c/strong\u003e Long sessions filled the context window and caused the model to lose track of work.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence:\u003c/strong\u003e A crash, rate-limit error, or flaky connection could force work to restart.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-repo reasoning:\u003c/strong\u003e Single-repository sessions could not see relationships between applications and their dependencies.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCloudflare’s advice is to begin with a skill in the development environment, get prompts working well, and only add architectural stages when their absence becomes the specific bottleneck.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-discovery-harness\"\u003eVulnerability Discovery Harness\u003c/h2\u003e\n\n\u003cp\u003eCloudflare’s Vulnerability Discovery Harness, or VDH, is the discovery engine that scans codebases and surfaces potential security issues. It is designed to be model-agnostic and to run across a fleet of repositories without per-language tuning.\u003c/p\u003e\n\n\u003cp\u003eThe VDH includes the following stages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRecon:\u003c/strong\u003e Maps target architecture and threat vectors, using three parallel recon sub-agents to write \u003ccode\u003earchitecture.md\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHunt:\u003c/strong\u003e Runs per-class attacks, compiles fragments, probes binaries, spawns sibling agents, and writes to the wishlist tool.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eValidate:\u003c/strong\u003e Performs mechanical checks and then uses an isolated agent to disprove the finding before filing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGapfill:\u003c/strong\u003e Generates new hunt tasks for under-tested area-by-attack-class coverage cells.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDedup:\u003c/strong\u003e Uses deterministic code and agents to cluster overlapping findings by root cause.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTrace:\u003c/strong\u003e Walks the dependency graph and spawns consumer-repository tasks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFeedback:\u003c/strong\u003e Uses validation failures, shallow runs, and repeated misses to rewrite queued prompts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReport:\u003c/strong\u003e Renders human-readable reports without requiring a model.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eStages four through eight run as a continuous producer-consumer loop. This allows late-discovered vulnerabilities to be validated, reported, deduplicated, and checked against other code within the same run.\u003c/p\u003e\n\n\u003ch2 id=\"state-persistence-and-context-control\"\u003eState, persistence, and context control\u003c/h2\u003e\n\n\u003cp\u003eCloudflare emphasizes that the pipeline is split into narrow stages to enforce context controls. The article states that if the model fills the context window, it starts hallucinating, so Cloudflare keeps each agent’s job focused and context usage below 25% of the total window.\u003c/p\u003e\n\n\u003cp\u003ePersistence is implemented before parallelism. Every stage writes to one SQLite database keyed by \u003ccode\u003erun_id\u003c/code\u003e, \u003ccode\u003erepo\u003c/code\u003e, and \u003ccode\u003estage\u003c/code\u003e. Stages can resume, retry, or be pulled into later runs without redoing all work, and findings are streamed and saved as they occur.\u003c/p\u003e\n\n\u003cp\u003eCloudflare also notes a specific operational issue: transient API errors may appear as text in a \u003ccode\u003e200 OK\u003c/code\u003e response stream rather than throwing an exception. The orchestrator therefore needs to classify response text instead of relying only on exception types.\u003c/p\u003e\n\n\u003ch2 id=\"dynamic-threat-modeling-and-active-testing\"\u003eDynamic threat modeling and active testing\u003c/h2\u003e\n\n\u003cp\u003eDuring Recon, the agent writes the threat model instead of receiving a fixed one. In addition to about ten built-in attack classes, such as injection, memory corruption, protocol parsing, and timing side channels, Recon can invent repository-specific attack classes with their own methodology.\u003c/p\u003e\n\n\u003cp\u003eHunter agents do more than read source code. They can compile fragments, build small versions, and attack them. Cloudflare says a major quality improvement came from giving Hunters a sandbox built on \u003ccode\u003eunshare\u003c/code\u003e so they could crash binaries.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes a nested containerization detail: if the harness runs inside Docker, the sandbox needs \u003ccode\u003eseccomp=unconfined\u003c/code\u003e and \u003ccode\u003eapparmor=unconfined\u003c/code\u003e, or it may silently fail to start.\u003c/p\u003e\n\n\u003ch2 id=\"micro-forks-and-the-wishlist\"\u003eMicro-forks and the wishlist\u003c/h2\u003e\n\n\u003cp\u003eCloudflare added two mechanisms to give Hunter agents more autonomy while keeping analysis scoped:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSibling Forking:\u003c/strong\u003e If a Hunter finds an interesting code path outside its current scope, it can fork a sibling agent with a precise structural seed instead of wandering off task. Cloudflare says this accounts for roughly 9% of fleet-wide tasks, but varies by model from near-zero to about one-fifth.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Wishlist:\u003c/strong\u003e Agents write to a central wishlist when they need resources they do not have, such as a build environment, VM, production config files, or resources to confirm a proof of concept.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCloudflare says the wishlist had been written to 25,472 times across 128 repositories since it was added. The article describes it as the main way agents communicate resource needs back to the team.\u003c/p\u003e\n\n\u003ch2 id=\"fleet-wide-cross-repo-tracing\"\u003eFleet-wide cross-repo tracing\u003c/h2\u003e\n\n\u003cp\u003eThe Trace stage checks how software components are connected. It asks whether attacker-controlled input can travel from the outside to a vulnerable part of the system. If so, the Tracer spawns new hunt tasks inside consumer repositories.\u003c/p\u003e\n\n\u003cp\u003eCloudflare says this requires:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA unified cross-repo symbol index.\u003c/li\u003e\n\u003cli\u003eAn accurate dependency graph.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that cross-repo tracing can uncover systemic flaws that a single-repository scan would miss.\u003c/p\u003e\n\n\u003cp\u003eCloudflare also reports two lessons from fleet-wide scanning:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeduplication becomes its own problem at scale and requires dedicated agents and heuristics.\u003c/li\u003e\n\u003cli\u003eStatic analysis should not be wired in too early, because Cloudflare integrated Semgrep but Hunters invoked it zero times in a month of runs, while the wishlist was the most-used tool.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"making-findings-trustworthy\"\u003eMaking findings trustworthy\u003c/h2\u003e\n\n\u003cp\u003eCloudflare highlights several failure modes that the harness must defend against. The article says an agent may edit the source code so its exploit works, write a tautological test, or build an exploit that proves nothing because the threat model is invalid.\u003c/p\u003e\n\n\u003cp\u003eTo reduce these problems, Cloudflare requires a Hunter to state the threat model before filing a finding. The Hunter must define the attacker and the boundary or assumption being violated.\u003c/p\u003e\n\n\u003cp\u003eEvery confirmed finding must include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA proof-of-concept test that runs against the original, untouched codebase.\u003c/li\u003e\n\u003cli\u003eA proposed patch.\u003c/li\u003e\n\u003cli\u003eEvidence that the test and patch parse correctly.\u003c/li\u003e\n\u003cli\u003eFile and path references that deterministic code can mechanically verify.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Validator cannot file its own findings. Its only role is to aggressively disprove the Hunter’s theory. Cloudflare states that if a Hunter is allowed to grade its own work, it will confidently validate everything it outputs.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-validation-system\"\u003eVulnerability Validation System\u003c/h2\u003e\n\n\u003cp\u003eFindings that leave the harness enter Cloudflare’s Vulnerability Validation System, or VVS. This shared system receives findings from multiple harnesses and currently holds 13,841 findings across 145 repositories, according to the article.\u003c/p\u003e\n\n\u003cp\u003eThe VVS runs on a different model from the VDH. Cloudflare says this provides an independent check because the validation model evaluates the discovery model’s output with different logical weights and training data.\u003c/p\u003e\n\n\u003cp\u003eThe VVS has three main jobs:\u003c/p\u003e\n\n\u003ch3 id=\"deduplication\"\u003eDeduplication\u003c/h3\u003e\n\n\u003cp\u003eThe deduplication stage determines whether a finding is already in the system or already tracked in an internal Jira ticket. Cloudflare avoids using an LLM to compare every finding with every other finding because that would scale at O(N²).\u003c/p\u003e\n\n\u003cp\u003eInstead, deterministic code builds inverted indexes over files, functions, trust boundaries, and rare tokens. The model then reasons over a short candidate list. Stable cross-run keys reopen existing records when bugs are rediscovered.\u003c/p\u003e\n\n\u003ch3 id=\"contextual-judgment\"\u003eContextual judgment\u003c/h3\u003e\n\n\u003cp\u003eThe Judgment agent rechecks the latest information and pulls from available deployment, environment, configuration, wiki, Jira, git, and other context. It evaluates whether the code path is reachable in production and identifies the repository owner.\u003c/p\u003e\n\n\u003cp\u003eCloudflare says this separates findings that are exploitable now from real but latent issues or issues filed against the wrong component.\u003c/p\u003e\n\n\u003ch3 id=\"automated-fixing\"\u003eAutomated fixing\u003c/h3\u003e\n\n\u003cp\u003eThe Fixer takes the proposed patch and unit tests, rewrites them to match repository style, applies the diff, and runs targeted tests. A clean fail-to-pass flip is required for the ideal automated cleanup case.\u003c/p\u003e\n\n\u003cp\u003eIf the post-patch test fails or a broader run detects downstream regressions, the commit is blocked and flagged for human intervention. The Fixer never merges code on its own; a human must review the branch.\u003c/p\u003e\n\n\u003ch2 id=\"cost-and-operating-model\"\u003eCost and operating model\u003c/h2\u003e\n\n\u003cp\u003eCloudflare says running hundreds of agents over many repositories is not cheap, but the cost shape is predictable. Most compute budget goes into the Hunt stage, and Gapfill becomes the lever for trading cost against coverage.\u003c/p\u003e\n\n\u003cp\u003eCloudflare budgets per repository rather than per run because costs vary widely by repository. It enforces a strict task cap per repository and uses worker pools ranging from 50 to 200 workers.\u003c/p\u003e\n\n\u003cp\u003eThe article says large scans are periodic backlog sweeps rather than per-pull-request checks. A full scan of a complex repository can take hours, and Cloudflare’s worst run took just over 14 hours.\u003c/p\u003e\n\n\u003ch2 id=\"measurement-and-results\"\u003eMeasurement and results\u003c/h2\u003e\n\n\u003cp\u003eCloudflare says it does not claim a false-negative rate because there is no labeled set of all real bugs in a codebase. Instead, it tracks whether reruns keep finding bugs and whether coverage grows across runs.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the system as a filtering funnel. Cloudflare reports the following lifetime numbers at the time of writing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e20,799 raw candidates were generated by the VDH.\u003c/li\u003e\n\u003cli\u003eAbout 12,057 survived validation.\u003c/li\u003e\n\u003cli\u003eThese joined findings from another harness in the VVS, bringing the central pool to 13,841.\u003c/li\u003e\n\u003cli\u003eThe Dedup agent folded away 5,442 findings as duplicates.\u003c/li\u003e\n\u003cli\u003e1,154 findings were routed as wrong-repo or low-risk and recycled where appropriate.\u003c/li\u003e\n\u003cli\u003e7,245 actionable findings remained for engineering teams.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCloudflare says better context injection from Recon reduced the initial validation rejection rate from 40% to 11%. It also says the share of high-integrity findings climbed from 35% to 58%.\u003c/p\u003e\n\n\u003ch2 id=\"operational-health-signals\"\u003eOperational health signals\u003c/h2\u003e\n\n\u003cp\u003eCloudflare added automated health signals to detect failures early. If a hunt finishes suspiciously fast and fails to spawn sub-hunts or gap tasks, that may indicate a crashed dependency rather than a clean codebase.\u003c/p\u003e\n\n\u003cp\u003eThe system flags any Hunter agent that finishes with zero findings as “shallow” and immediately requeues it for a new run.\u003c/p\u003e\n\n\u003ch2 id=\"north-star-metrics-and-remediation-workflow\"\u003eNorth Star metrics and remediation workflow\u003c/h2\u003e\n\n\u003cp\u003eCloudflare presents a realistic benchmark for a standard repository of about 30,000 lines of code. In that example:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA full run takes 3 to 4 hours.\u003c/li\u003e\n\u003cli\u003eThe system yields about 100 initial findings.\u003c/li\u003e\n\u003cli\u003eDeduplication and contextual judgment compress the batch to about 80 distinct, high-fidelity bugs within 3 hours.\u003c/li\u003e\n\u003cli\u003eThe automated Fixer processes those bugs at an average rate of 5 minutes per bug.\u003c/li\u003e\n\u003cli\u003eThe system can discover, validate, deduplicate, and open functional pull requests in about 14 hours.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor remediation, Cloudflare describes a tiered rollout:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCritical, high, and exploitable bugs, averaging 10 out of 80 in the example, are fast-tracked for human review and production patching within 5 days.\u003c/li\u003e\n\u003cli\u003eRemaining latent risks, minor configuration anomalies, and lower-urgency bugs are rolled into production over a 15-to-20-day window.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cloudflare-s-statement-on-patching-and-exposure\"\u003eCloudflare’s statement on patching and exposure\u003c/h2\u003e\n\n\u003cp\u003eCloudflare states that the findings discussed are from an isolated, ring-fenced research experiment designed to stress-test its code. The article says they do not represent active, unpatched vulnerabilities in Cloudflare’s live production environment.\u003c/p\u003e\n\n\u003cp\u003eCloudflare also says every bug surfaced by the pipeline came with a working test case and a draft patch. Its security teams are systematically processing the reports and applying fixes.\u003c/p\u003e\n\n\u003ch2 id=\"released-material\"\u003eReleased material\u003c/h2\u003e\n\n\u003cp\u003eCloudflare says it is releasing the initial skill used to develop the harness, slightly cleaned up for easier understanding and integration. The article links to \u003ccode\u003egithub.com/cloudflare/security-audit-skill\u003c/code\u003e and says the harness itself may follow later.\u003c/p\u003e\n\n\u003ch2 id=\"core-takeaway\"\u003eCore takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that AI-driven vulnerability discovery requires an orchestration layer that is independent of any single model. Cloudflare’s approach uses staged agents, persistent state, cross-repo tracing, independent validation, deterministic checks, deduplication, contextual judgment, automated patch preparation, and human review to turn large volumes of model-generated candidates into verified, actionable security fixes.\u003c/p\u003e\n","keyPoints":["Cloudflare built a model-agnostic vulnerability research pipeline that treats LLMs as interchangeable components rather than relying on a single model or prompt.","The Vulnerability Discovery Harness separates work into stages such as Recon, Hunt, Validate, Gapfill, Dedup, Trace, Feedback, and Report, with persistent state stored in SQLite so runs can resume after failures.","Cloudflare uses a separate Vulnerability Validation System with a different model to deduplicate findings, judge production reachability, and generate fixes that require human review before merging.","The harness requires hunters to state a threat model and provide a working proof-of-concept test against the original codebase, while independent validators attempt to disprove each finding.","Cloudflare reported that 20,799 raw candidates from the discovery harness were reduced through validation and triage into 7,245 actionable findings for engineering teams."],"insights":["Cloudflare found that persistence should be designed before parallelism, because a single API error or connection failure can otherwise waste hours of multi-agent analysis.","The article warns that some transient AI API failures may appear as text inside a 200 OK response stream, so the orchestrator must classify response content rather than relying only on exceptions.","Cloudflare reported that Hunters invoked the fully integrated Semgrep static-analysis tooling zero times in a month, while the agent wishlist became the most-used tool in the system.","The harness treats any Hunter that finishes suspiciously fast with zero findings as “shallow” and automatically requeues it, because this often indicates a crashed dependency rather than a clean codebase.","Cloudflare found that requiring a working proof-of-concept test against the original untouched codebase helps prevent agents from editing source code to create the bug they then report."],"referencedReports":[],"body":"\u003cp\u003eCloudflare describes how it evolved an initial \u003ccode\u003esecurity-audit\u003c/code\u003e skill into a model-agnostic vulnerability research harness for scanning enterprise codebases. The central message is that standalone models, prompts, or single-agent sessions are not enough for fleet-wide security analysis. Cloudflare argues that the durable value is in orchestration, persistence, validation, and triage rather than in any one frontier model.\u003c/p\u003e\n\n\u003cp\u003eThe system is split into a Vulnerability Discovery Harness and a Vulnerability Validation System. The discovery side uses staged agents for recon, hunting, validation, gap filling, deduplication, dependency tracing, feedback, and reporting, while the validation side uses a different model to deduplicate, judge production reachability, and assist with fixes. Cloudflare says this architecture helps control context windows, survive crashes, trace cross-repo dependencies, and filter noisy findings into actionable bugs.\u003c/p\u003e\n\n\u003cp\u003eCloudflare reports that its discovery harness generated 20,799 raw candidates, of which about 12,057 survived validation. After ingest into the shared validation system, deduplication and judgment reduced the pool to 7,245 actionable findings for engineering teams. The article emphasizes that every confirmed finding requires a threat model, a working proof-of-concept test against the original codebase, and a proposed patch, with humans required to review fixes before merging.\u003c/p\u003e\n"},{"n":29,"title":"BloodHound MCP, One Year Later: What I Learned About MCPs, Models, and Context","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/18/bloodhound-mcp-one-year-later-what-i-learned-about-mcps-models-and-context/","time":"16:30","priority":"MAY READ","score":55,"tldr":"The author’s main lesson from rebuilding BloodHound MCP is that MCP design is really context design: smaller composite tools, recoverable errors, and on-demand domain resources make LLMs more effective than exposing every API endpoint as a separate tool. The new approach cuts token overhead dramatically and helps models reason about BloodHound data instead of getting bogged down in tool selection.","briefOverview":"\u003cp\u003eThe article reflects on one year of development of BloodHound MCP, a Model Context Protocol server that lets an LLM interact with BloodHound data. The author says the first version proved that an LLM could converse with BloodHound, but it exposed too much of the BloodHound API directly. The main lesson from the rebuild is that MCP design is context design.\u003c/p\u003e\n\n\u003cp\u003eThe original design mapped many API operations to separate tools, which created a 100-tool catalog and consumed about 19,016 fixed tokens before user questions or graph results were considered. The newer versions replaced many endpoint-specific tools with composite tools, reducing fixed overhead to 5,721 tokens in the current version. The author argues this improves cost, context availability, and tool-selection quality.\u003c/p\u003e\n\n\u003cp\u003eThe current BloodHound MCP uses thirteen top-level tools, shared error handling, domain-specific MCP resources, and a prompt that guides the model toward loading references when needed. The article also describes new file upload support for controlled SharpHound, AzureHound, BloodHound, and OpenGraph workflows. The author frames the project’s direction as making the model a better attack-path navigator rather than simply a Cypher author or API caller.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a retrospective on rebuilding BloodHound MCP after its first year of use. The author says the first version worked by proving that users could ask natural-language questions against BloodHound data, but it inherited the shape of the BloodHound API too directly. Feedback, bug reports, pull requests, feature requests, privacy questions, and outside use helped reveal that the design needed improvement.\u003c/p\u003e\n\n\u003cp\u003eA central problem was that MCP tools are not free because every tool definition includes a name, description, and parameter schema that the model sees before deciding what to call. The earlier BloodHound MCP exposed exactly 100 tools, one prompt, and four on-demand resources, with about 19,016 fixed MCP tokens from the tool schema list and prompt. The author says this reduced the space available for graph context, object names, path explanations, analyst questions, and model reasoning.\u003c/p\u003e\n\n\u003cp\u003eThe main architectural change was replacing many endpoint-specific tools with composite tools. Instead of separate user tools for sessions, memberships, admin rights, RDP rights, DCOM rights, PSRemote rights, constrained delegation, controllables, and controllers, the MCP now uses tools such as \u003ccode\u003euser_info\u003c/code\u003e with an \u003ccode\u003einfo_type\u003c/code\u003e parameter. The current version exposes thirteen top-level tools across domains, users, groups, computers, OUs, GPOs, graph analysis, ADCS, Cypher, data quality, custom nodes, asset groups, and file upload.\u003c/p\u003e\n\n\u003cp\u003eThe refactor reduced fixed overhead from 19,016 tokens to 4,810 tokens in the first composite-tool version and to 5,721 tokens in the current version. The author says the current version still saves 13,295 tokens per turn compared with the old design, despite adding a larger behavioral prompt and file upload support. This is presented as especially important for local models, where context windows are constrained by hardware and BloodHound data may need to remain inside the environment.\u003c/p\u003e\n\n\u003cp\u003eThe article also explains that Cypher support required reference material rather than a larger prompt. BloodHound Cypher has specific requirements around labels, relationship names, property names, casing, directionality, and path semantics, so the MCP now uses resources such as \u003ccode\u003ebloodhound://cypher/reference\u003c/code\u003e, \u003ccode\u003ebloodhound://cypher/offensive-queries\u003c/code\u003e, and guides for AD, Azure, ADCS, and OpenGraph. The prompt acts as a map that tells the model when to load these resources.\u003c/p\u003e\n\n\u003cp\u003eThe final major addition is file upload support for BloodHound and OpenGraph collection uploads through the file upload API. The author says the first version was intentionally mostly read-only, but agent workflows made that boundary feel artificial after a lab scenario where Codex could run a BloodHound collection but could not upload the data for analysis. The intended workflow is controlled assistance, where the model prepares the upload, explains the action, uploads after approval, and verifies success.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a one-year retrospective on BloodHound MCP, a Model Context Protocol server designed to let an LLM interact with BloodHound. The author explains that the first version succeeded at proving that an LLM could converse with BloodHound and answer natural-language questions against BloodHound data. However, the first design exposed too much of the BloodHound API directly and carried the shape of the API into the model-facing interface.\u003c/p\u003e\n\n\u003cp\u003eThe main conclusion is that MCP design is context design. The author argues that an MCP tool is not simply a function call; it is a chunk of context passed to the model with every query in a conversation. Because of that, the structure, number, and descriptions of tools directly affect cost, context availability, and model behavior.\u003c/p\u003e\n\n\u003ch2 id=\"initial-design-problem\"\u003eInitial Design Problem\u003c/h2\u003e\n\n\u003cp\u003eThe original BloodHound MCP was built by mapping API operations to individual tools. For users alone, the tool catalog included separate tools such as \u003ccode\u003eget_user_info\u003c/code\u003e, \u003ccode\u003eget_user_admin_rights\u003c/code\u003e, \u003ccode\u003eget_user_group_memberships\u003c/code\u003e, \u003ccode\u003eget_user_sessions\u003c/code\u003e, \u003ccode\u003eget_user_rdp_rights\u003c/code\u003e, \u003ccode\u003eget_user_dcom_rights\u003c/code\u003e, \u003ccode\u003eget_user_ps_remote_rights\u003c/code\u003e, \u003ccode\u003eget_user_constrained_delegation\u003c/code\u003e, \u003ccode\u003eget_user_controllables\u003c/code\u003e, and \u003ccode\u003eget_user_controllers\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe same pattern was repeated across computers, groups, domains, OUs, GPOs, graph operations, ADCS, and Cypher. The author says this was straightforward to implement and easy to reason about as a developer, but expensive for the model’s context. The tool list became a small API reference manual that sat beside the analyst conversation.\u003c/p\u003e\n\n\u003ch2 id=\"tool-definitions-as-context-overhead\"\u003eTool Definitions as Context Overhead\u003c/h2\u003e\n\n\u003cp\u003eThe author emphasizes that tool definitions are loaded into context whether the tool is used or not. Each tool definition includes a name, description, and parameter schema, and the model sees those details before deciding what to call. This creates two kinds of cost: raw context overhead and reduced tool-selection quality.\u003c/p\u003e\n\n\u003cp\u003eThe raw overhead means tokens spent describing the interface cannot be used for graph results, object names, path explanations, edge explanations, and analyst reasoning. The tool-selection problem arises because a long list of similar tools forces the model to choose between adjacent operations. The author says this can lead to over-calling, hedging, or choosing a nearby but incorrect tool.\u003c/p\u003e\n\n\u003ch2 id=\"token-measurements\"\u003eToken Measurements\u003c/h2\u003e\n\n\u003cp\u003eThe author measured the fixed MCP overhead in the last pre-optimization version. That version exposed exactly 100 tools, one MCP prompt, and four resources, with the resources excluded from the fixed per-turn number because they were loaded on demand. The fixed cost came from the tool schema list plus the \u003ccode\u003ebloodhound_assistant\u003c/code\u003e prompt.\u003c/p\u003e\n\n\u003cp\u003eUsing FastMCP-generated tool metadata serialized as minified JSON and counted with the \u003ccode\u003ecl100k_base\u003c/code\u003e tokenizer, the pre-optimization version used 19,016 total MCP tokens. This included 2,055 prompt text tokens and 16,684 tool schema tokens. The first composite-tool version reduced the total to 4,810 tokens, and the current version uses 5,721 tokens.\u003c/p\u003e\n\n\u003cp\u003eThe author states that the first composite-tool pass saved 14,206 tokens per turn, about a 75% reduction. Over a ten-turn analysis session, that would be roughly 142,060 fewer input tokens spent describing the MCP to the model. The current version still saves 13,295 tokens per turn compared with the old design, about a 70% reduction, even with an added tool and a larger behavioral prompt.\u003c/p\u003e\n\n\u003ch2 id=\"importance-for-bloodhound-workflows\"\u003eImportance for BloodHound Workflows\u003c/h2\u003e\n\n\u003cp\u003eThe author says cost is not the most important part of the token reduction. The bigger issue is what the fixed MCP overhead displaces. In a BloodHound workflow, the model needs room for graph context, query results, object names, path explanations, and analyst follow-up questions.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights local models as an important consideration. The author says BloodHound data should not always leave the environment just so an assistant can help reason about it. Local models can make that more practical, but local context windows are constrained by hardware, making a reduction from 19,000 tokens to about 5,000 or 6,000 tokens potentially significant.\u003c/p\u003e\n\n\u003ch2 id=\"composite-tool-architecture\"\u003eComposite Tool Architecture\u003c/h2\u003e\n\n\u003cp\u003eThe main architectural change was moving from one tool per endpoint to composite tools. Instead of ten separate user tools, the MCP now exposes one \u003ccode\u003euser_info\u003c/code\u003e tool with an \u003ccode\u003einfo_type\u003c/code\u003e parameter. The model still has access to the underlying capabilities, but the top-level tool catalog is much smaller.\u003c/p\u003e\n\n\u003cp\u003eThe author explains that this changes the model’s decision from “Which of these ten user tools should I call?” to “What kind of user information do I need?” This is presented as a better fit for the analysis task. Valid \u003ccode\u003einfo_type\u003c/code\u003e options are listed directly in tool docstrings so the model can see them when deciding what to call.\u003c/p\u003e\n\n\u003cp\u003eThe current version exposes thirteen top-level tools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edomain_info\u003c/code\u003e for domain-level enumeration, trusts, DCSyncers, foreign principals, and search.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003euser_info\u003c/code\u003e for user properties, memberships, sessions, rights, controllers, and controllables.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egroup_info\u003c/code\u003e for group members, memberships, admin rights, controllers, and controllables.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecomputer_info\u003c/code\u003e for computer properties, sessions, local admins, remote access rights, and delegation.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eou_info\u003c/code\u003e for OU properties and contained users, groups, computers, and GPOs.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egpo_info\u003c/code\u003e for GPO properties and controllers.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egraph_analysis\u003c/code\u003e for shortest paths, edge composition, and graph search.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eadcs_info\u003c/code\u003e for ADCS templates and ESC path information.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecypher_query\u003c/code\u003e for custom Cypher execution and saved-query access.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edata_quality\u003c/code\u003e for data statistics and platform coverage checks.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecustom_nodes\u003c/code\u003e for OpenGraph custom node type configuration.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003easset_groups\u003c/code\u003e for asset group and selector information.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003efile_upload\u003c/code\u003e for controlled SharpHound and AzureHound collection upload support.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recoverable-errors\"\u003eRecoverable Errors\u003c/h2\u003e\n\n\u003cp\u003eThe composite-tool design introduces a tradeoff because individual operations are no longer all discoverable by name. For example, \u003ccode\u003eget_user_rdp_rights\u003c/code\u003e is obvious as a tool name, while a composite tool requires the model to know that \u003ccode\u003euser_info\u003c/code\u003e accepts \u003ccode\u003erdp_rights\u003c/code\u003e as an \u003ccode\u003einfo_type\u003c/code\u003e. The author mitigated this with better tool descriptions and shared error handling.\u003c/p\u003e\n\n\u003cp\u003eEvery composite tool dispatches through a shared helper. If the model provides an unknown \u003ccode\u003einfo_type\u003c/code\u003e, the MCP returns an error that lists the valid options. The author prefers a small recoverable error over a large tool catalog designed to avoid the error entirely.\u003c/p\u003e\n\n\u003cp\u003eThe dispatcher also centralizes connection errors, API errors, generic exception handling, pagination forwarding, and result formatting. Adding a capability becomes a matter of adding a handler entry, while error formatting remains consistent. This also reduces repeated error-handling logic across many functions.\u003c/p\u003e\n\n\u003ch2 id=\"cypher-and-domain-specific-references\"\u003eCypher and Domain-Specific References\u003c/h2\u003e\n\n\u003cp\u003eThe article says Cypher has been the most frustrating part of the project, not because BloodHound’s API makes Cypher hard to execute, but because LLMs can write technically correct Cypher that BloodHound does not support or interpret as expected. BloodHound Cypher has requirements beyond generic graph querying. The model needs to know labels, relationship names, property names, casing, directionality, and BloodHound-specific path semantics.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several BloodHound-specific Cypher considerations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProperty names are lowercase, such as \u003ccode\u003ehasspn\u003c/code\u003e, \u003ccode\u003eenabled\u003c/code\u003e, and \u003ccode\u003eadmincount\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eMany object names are stored uppercase with the domain suffix.\u003c/li\u003e\n\u003cli\u003eDCSync rights target Domain nodes, not Group nodes.\u003c/li\u003e\n\u003cli\u003eGPO abuse paths require the full chain through the GPO, GPLink, OU or container, and affected targets.\u003c/li\u003e\n\u003cli\u003eList properties need \u003ccode\u003eCOALESCE\u003c/code\u003e patterns to avoid null errors.\u003c/li\u003e\n\u003cli\u003eAggregation can work through the API while still being a poor fit for queries meant to render in the BloodHound GUI.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author says a model can get these details partially correct, but that can be misleading because the query may look correct while failing or returning wrong results. The solution was not to create a larger prompt, but to use MCP resources for detailed reference material. The prompt now tells the model when to load those resources.\u003c/p\u003e\n\n\u003ch2 id=\"mcp-resources\"\u003eMCP Resources\u003c/h2\u003e\n\n\u003cp\u003eThe new prompt architecture uses the prompt as a map and the resources as detailed directions. The resources include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://cypher/reference\u003c/code\u003e for Cypher syntax, BloodHound schema, properties, name formats, and query patterns.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://cypher/offensive-queries\u003c/code\u003e for known-good templates for attack scenarios such as DCSync, Kerberoasting, GPO abuse, delegation, and ADCS.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://guides/ad\u003c/code\u003e for an Active Directory node and relationship quick reference.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://guides/ad-methodology\u003c/code\u003e for deeper AD attack-path workflow guidance.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://guides/azure\u003c/code\u003e for an Azure and Entra ID quick reference.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://guides/azure-methodology\u003c/code\u003e for Azure attack-chain methodology.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://guides/adcs\u003c/code\u003e for an ADCS ESC quick reference.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://guides/adcs-methodology\u003c/code\u003e for deeper ADCS analysis guidance.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://opengraph/guide\u003c/code\u003e for OpenGraph schema design and best practices.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebloodhound://opengraph/examples\u003c/code\u003e for example OpenGraph patterns.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe intended result is for the LLM to act as an attack-path navigator rather than a Cypher author. For example, the prompt can tell the model to load the offensive query library before writing a custom Cypher query for an attack path scenario. This avoids trying to place every caveat and schema detail into the prompt itself.\u003c/p\u003e\n\n\u003ch2 id=\"file-upload-and-agentic-workflows\"\u003eFile Upload and Agentic Workflows\u003c/h2\u003e\n\n\u003cp\u003eThe article describes file upload support as the last major addition. The first version of BloodHound MCP was intentionally mostly read-only: it could query BloodHound, inspect objects, run Cypher, and explain paths, but it assumed the data was already present. The author originally did not feel comfortable giving a model the ability to push data into BloodHound.\u003c/p\u003e\n\n\u003cp\u003eThat view changed as agent harnesses and coding agents improved. In a lab, the author had Codex successfully run a BloodHound collection, but the agent could not continue toward its goal because it could not upload the collection data into BloodHound for analysis. This made the old read-only boundary feel artificial.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003efile_upload\u003c/code\u003e tool supports BloodHound or OpenGraph collection uploads through the file upload API. The author describes the right use case as controlled assistance: the model prepares the upload, explains what it is about to do, uploads the data after approval, and verifies that the upload succeeded. The MCP should make the analyst faster, not remove the analyst from important decisions.\u003c/p\u003e\n\n\u003ch2 id=\"opengraph-and-future-direction\"\u003eOpenGraph and Future Direction\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes by saying the rearchitecture taught a practical lesson: the MCP should spend less context explaining itself and more context helping the model reason through a BloodHound graph. After making the MCP more efficient, the author began thinking about how models should adapt when the graph itself changes. This led to using the MCP with OpenGraph data.\u003c/p\u003e\n\n\u003cp\u003eOpenGraph lets BloodHound model technologies outside of AD and Azure, including GitHub, SaaS platforms, device management systems, and custom internal systems. The author says this makes the MCP more useful, but also makes the model’s job harder. The model must understand schemas it may not already know, write queries against unfamiliar relationships, and explain risk without hallucinating over gaps.\u003c/p\u003e\n\n\u003cp\u003eThe article says the next post will cover using BloodHound MCP with OpenGraph data and what happened when the author tested it with GitHound.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe first BloodHound MCP answered whether an LLM could talk to BloodHound. The newer version asks what the model needs in order to use BloodHound well. The author’s answer is a smaller tool catalog, composite tools aligned to analyst intent, recoverable errors, domain-specific resources, and a prompt that guides the model through the workflow.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as a pattern that applies beyond BloodHound. Exposing everything may feel helpful, but it can degrade model performance by consuming context and forcing the model to choose between too many similar tools. The author summarizes the design lesson as giving models better handles rather than more hands.\u003c/p\u003e\n","keyPoints":["The first version of BloodHound MCP exposed much of the BloodHound API directly, but this created a large tool catalog that consumed model context and made tool selection harder.","The refactored BloodHound MCP reduced fixed MCP overhead from about 19,016 tokens to 5,721 tokens by replacing many endpoint-specific tools with a smaller set of composite tools.","Composite tools such as user_info use parameters like info_type to access multiple underlying BloodHound capabilities while keeping the top-level tool catalog smaller.","The updated MCP uses shared error handling so invalid composite-tool calls return valid options and allow the model to recover and retry.","The project moved detailed BloodHound Cypher guidance into MCP resources so the prompt can guide the model on when to load references instead of trying to teach all domain knowledge up front."],"insights":["Tool definitions function as a recurring per-turn context tax in MCP workflows, so reducing unused or redundant tools can improve not only cost but also the model’s ability to retain graph results, object names, path explanations, and analyst follow-up context.","A smaller composite-tool design can be preferable to a fully explicit tool catalog when errors are recoverable, because returning valid parameter options lets the model co
