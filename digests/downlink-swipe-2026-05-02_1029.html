onfigure automated workflows that continuously evaluate incoming indicators against Criminal IP’s threat database.\u003c/p\u003e\n\n\u003cp\u003eThe enrichment process captures multiple data points for each IP address. Key data fields include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMaliciousness scoring\u003c/li\u003e\n\u003cli\u003eVPN and proxy detection\u003c/li\u003e\n\u003cli\u003eRemote access exposure\u003c/li\u003e\n\u003cli\u003eOpen ports\u003c/li\u003e\n\u003cli\u003eKnown vulnerabilities\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis automation ensures threat context remains current while eliminating the need for manual analyst effort during triage. Security teams can rely on consistent prioritization and faster analysis cycles.\u003c/p\u003e\n\n\u003ch2 id=\"unified-investigation-workspace\"\u003eUnified Investigation Workspace\u003c/h2\u003e\n\n\u003cp\u003eSecurity analysts can access Criminal IP intelligence directly within the ThreatQ interface, enabling real-time validation of suspicious IP activity. On-demand lookups are available directly from indicator detail views or investigation boards, providing immediate context during active investigations.\u003c/p\u003e\n\n\u003cp\u003eThe integration also expands ThreatQ’s investigation graph by mapping relationships between IP addresses, associated infrastructure, and attack activity. This unified visibility helps analysts identify patterns and connections across threats without switching between multiple tools.\u003c/p\u003e\n\n\u003cp\u003eTeams can assess risk more effectively within their existing workflows. Real-time validation eliminates the friction of manual cross-platform checks.\u003c/p\u003e\n\n\u003ch2 id=\"intelligence-driven-prioritization\"\u003eIntelligence-Driven Prioritization\u003c/h2\u003e\n\n\u003cp\u003eBy integrating Criminal IP’s data into ThreatQ’s scoring framework, organizations can align risk evaluation with their specific operational environments. Enriched data is visualized through dashboards that track maliciousness trends, VPN usage, and risk distribution across indicators.\u003c/p\u003e\n\n\u003cp\u003eThis precise prioritization supports more effective decision-making and accelerates response workflows. The platform’s orchestration capabilities filter and ingest exposure-based intelligence directly into analysis pipelines.\u003c/p\u003e\n\n\u003cp\u003eOrganizations can visualize risk distribution to identify emerging threats. Automated filtering reduces the burden on security analysts.\u003c/p\u003e\n\n\u003ch2 id=\"strategic-value-and-industry-context\"\u003eStrategic Value and Industry Context\u003c/h2\u003e\n\n\u003cp\u003eThe collaboration underscores a broader shift toward exposure-based intelligence, which continuously monitors internet-facing assets beyond traditional indicator feeds. Criminal IP CEO Byungtak Kang emphasized that the integration supports faster analysis and more effective response throughout the investigation lifecycle.\u003c/p\u003e\n\n\u003cp\u003eSecuronix Chief Revenue Officer Scott Sampson noted that combining orchestration capabilities with real-time threat data reduces manual workloads and focuses attention on relevant threats. The partnership ultimately enables security teams to operationalize threat intelligence through automated enrichment, workflow orchestration, and precise prioritization.\u003c/p\u003e\n\n\u003cp\u003eSecurity operations become more streamlined and data-driven. Analysts can focus on high-value threats rather than manual triage.\u003c/p\u003e\n\n\u003ch2 id=\"company-backgrounds\"\u003eCompany Backgrounds\u003c/h2\u003e\n\n\u003cp\u003eCriminal IP is operated by AI SPERA and provides decision-ready IP address and domain reputation data. The solution continuously scans the global internet to aggregate threat signals across IPs, domains, URLs, and attack infrastructure.\u003c/p\u003e\n\n\u003cp\u003eSecuronix operates a cloud-native Unified Defense SIEM with Agentic AI, unifying detection, investigation, and response. The platform features Sam, an AI SOC Analyst, and helps enterprises achieve breach-ready and board-ready security operations.\u003c/p\u003e\n\n\u003cp\u003eThis content is sponsored and written by Criminal IP. The collaboration represents a targeted enhancement to existing threat intelligence workflows.\u003c/p\u003e\n","keyPoints":["Criminal IP partners with Securonix to integrate exposure-based threat intelligence directly into the ThreatQ platform for automated IP indicator enrichment.","ThreatQ’s data-driven orchestration engine automatically evaluates incoming indicators against Criminal IP’s database to maintain current threat context without manual analyst effort.","Analysts can perform real-time lookups and access enriched infrastructure insights directly within the ThreatQ interface to streamline investigation workflows.","The integration enables organizations to align risk evaluation with their operational environment, improving threat prioritization and reducing manual investigation workloads."],"insights":["The integration automates the enrichment of IP indicators with granular exposure data, including VPN/proxy detection, open ports, and known vulnerabilities, through ThreatQ’s data-driven orchestration engine.","This partnership shifts focus from traditional indicator-based feeds to 'exposure-based' intelligence, revealing how infrastructure is actually exposed across the internet to improve risk assessment accuracy.","Analysts can perform on-demand Criminal IP lookups directly within ThreatQ investigation boards, enabling immediate validation of suspicious activity without switching tools or disrupting existing workflows."],"referencedReports":[],"body":"\u003cp\u003eCriminal IP and Securonix ThreatQ have established a strategic collaboration to integrate exposure-based threat intelligence directly into the ThreatQ platform. This partnership allows organizations to incorporate external IP intelligence into their existing security operations without disrupting established processes.\u003c/p\u003e\n\n\u003cp\u003eTraditional intelligence feeds often lack real-world context, but this integration bridges that gap by embedding continuously updated exposure data. Analysts can access enriched infrastructure insights and perform on-demand lookups directly within the ThreatQ interface.\u003c/p\u003e\n\n\u003cp\u003eThe integration aligns risk evaluation with organizational environments to improve threat prioritization and reduce manual workloads. This unified approach accelerates investigation cycles while keeping security operations streamlined.\u003c/p\u003e\n"},{"n":13,"title":"Microsoft fixes Remote Desktop warnings displaying incorrectly","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-remote-desktop-warnings-displaying-incorrectly/","time":"12:46","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Microsoft has patched a bug introduced in the April 2026 security updates that caused Remote Desktop security warnings to render incorrectly on multi-monitor setups, restoring proper functionality for the new phishing protections.","briefOverview":"\u003cp\u003eMicrosoft has released a preview cumulative update to resolve a display bug affecting Remote Desktop security warnings on Windows systems. The issue caused security dialogs to render incorrectly on multi-monitor setups with varying scaling settings, making buttons misaligned and text unreadable. This bug was introduced by the April 2026 security updates, which added new protections against phishing attacks that abuse Remote Desktop files. The new warnings alert users to potential risks and display connection details, though they disable local resource redirection by default. In addition to the display bug, the same April update caused third-party backup software failures due to a Volume Shadow Copy Service timeout. Microsoft also previously issued out-of-band updates to address Windows Server restart loops and installation failures triggered by those same patches.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has addressed a known issue that caused newly introduced Windows security warnings to display incorrectly when opening Remote Desktop files. This bug affects all supported Windows versions, including Windows 11, Windows 10, and Windows Server, specifically on devices configured with multiple monitors and different display scaling settings. The problem was resolved in the optional KB5083631 preview cumulative update for Windows 11, which was released on Thursday alongside thirty-four other changes. Microsoft stated that the dialog could render incorrectly after installing the April 2026 security update, causing buttons to become misaligned or partially hidden. The text within these alert windows also became difficult to read, making it challenging or impossible for users to interact with the security dialog. These warnings were originally implemented in the April 2026 cumulative updates to defend against phishing campaigns that abuse Remote Desktop connection files. Following the update, Windows displays a one-time educational prompt when opening a Remote Desktop file for the first time. Subsequent connections trigger a security dialog that indicates whether the file is digitally signed, shows the remote system address, and lists local resource redirection options. All redirection options, including drives, clipboard, and devices, are disabled by default within this dialog. If a file lacks a digital signature, Windows displays a caution warning labeling the publisher as unknown, while signed files prompt users to verify legitimacy before connecting. Beyond the display issue, the April security update also caused third-party backup applications to fail on Windows 11 systems due to a Volume Shadow Copy Service timeout. Microsoft also previously released emergency out-of-band updates to fix Windows Server restart loops and update installation failures that were also triggered by the April patches.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"remote-desktop-security-warning-display-bug\"\u003eRemote Desktop Security Warning Display Bug\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft has patched a rendering issue that caused Windows security warnings to display incorrectly when opening Remote Desktop (.rdp) files. The bug impacts all supported Windows versions, including Windows 11, Windows 10, and Windows Server, particularly on systems utilizing multiple monitors with distinct display scaling configurations. Microsoft resolved the issue in the optional KB5083631 preview cumulative update for Windows 11, released on Thursday with thirty-four additional changes. The company confirmed that the dialog renders incorrectly following the installation of the April 2026 security update, resulting in misaligned or hidden buttons and unreadable text that hinders user interaction.\u003c/p\u003e\n\n\u003ch2 id=\"background-on-the-april-2026-security-updates\"\u003eBackground on the April 2026 Security Updates\u003c/h2\u003e\n\n\u003cp\u003eThe problematic warnings were introduced in the April 2026 cumulative updates as a defensive measure against phishing attacks that exploit Remote Desktop files. Threat actors, including the Russian APT29 cyber-espionage group, have increasingly used these files to steal documents and credentials by leveraging preconfigured local resource redirection. To mitigate this risk, Microsoft implemented new security dialogs that appear when opening RDP files.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe first opening triggers a one-time educational prompt warning about associated risks.\u003c/li\u003e\n\u003cli\u003eSubsequent connections display a security dialog that reveals whether the file is signed by a verified publisher, shows the remote system address, and lists all local resource redirection options.\u003c/li\u003e\n\u003cli\u003eBy default, every redirection option, including drives, clipboard, and devices, is disabled.\u003c/li\u003e\n\u003cli\u003eUnsigned files trigger a \u0026ldquo;Caution: Unknown remote connection\u0026rdquo; warning, while signed files require users to verify legitimacy before proceeding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"associated-system-issues-and-patches\"\u003eAssociated System Issues and Patches\u003c/h2\u003e\n\n\u003cp\u003eThe April 2026 security updates introduced additional operational disruptions beyond the display bug. User reports indicate that the KB5083769 update breaks third-party backup applications from multiple vendors on Windows 11 24H2 and 25H2 systems due to a Volume Shadow Copy Service timeout. Microsoft also previously issued out-of-band updates to address separate Windows Server problems triggered by the April patches, including restart loops affecting domain controllers and general update installation failures. These cumulative issues highlight the cascading impact of the April security releases across both client and server environments.\u003c/p\u003e\n","keyPoints":["Microsoft released a preview cumulative update to fix a bug that caused Remote Desktop security warnings to render incorrectly on multi-monitor setups with different scaling settings.","The incorrectly displayed warnings were introduced in the April 2026 security updates to protect users from phishing attacks that abuse Remote Desktop files.","The same April security update also caused third-party backup applications to fail due to a Volume Shadow Copy Service timeout.","Microsoft previously released out-of-band updates to address separate Windows Server issues, including restart loops and update installation failures, triggered by the April security patches."],"insights":["The April 2026 security updates introduced unintended operational risks, including third-party backup software failures caused by Volume Shadow Copy Service timeouts and Windows Server restart loops.","The new Remote Desktop security dialog disables local resource redirection options, such as drives and clipboard access, by default, requiring users to manually enable them for functionality.","The new protections address specific adversary tactics, as the Russian APT29 group has previously abused RDP files to steal documents and credentials remotely."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has released a preview cumulative update to resolve a display bug affecting Remote Desktop security warnings on Windows systems. The issue caused security dialogs to render incorrectly on multi-monitor setups with varying scaling settings, making buttons misaligned and text unreadable. This bug was introduced by the April 2026 security updates, which added new protections against phishing attacks that abuse Remote Desktop files. The new warnings alert users to potential risks and display connection details, though they disable local resource redirection by default. In addition to the display bug, the same April update caused third-party backup software failures due to a Volume Shadow Copy Service timeout. Microsoft also previously issued out-of-band updates to address Windows Server restart loops and installation failures triggered by those same patches.\u003c/p\u003e\n"},{"n":18,"title":"Trellix Confirms Source Code Breach With Unauthorized Repository Access","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/trellix-confirms-source-code-breach.html","time":"06:41","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Trellix confirmed a security breach that allowed unauthorized access to a portion of its source code repository, though the company reports no evidence of exploitation or compromise to its distribution processes.","briefOverview":"\u003cp\u003eTrellix has confirmed that it suffered a security breach allowing unauthorized access to a portion of its source code repository. The company recently identified the compromise and immediately began working with leading forensic experts to address the incident. Trellix has also notified law enforcement about the breach. While the exact nature of the accessed data remains undisclosed, the company stated there are no indications that its source code has been affected or exploited. Furthermore, Trellix emphasized that its source code release and distribution processes were not impacted. The organization has not yet disclosed the identity of the attackers or the duration of the unauthorized access. Additional details will be shared once the investigation concludes. Trellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye. The company is currently owned by Symphony Technology Group.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTrellix has publicly announced that it experienced a cybersecurity breach resulting in unauthorized access to a portion of its source code repository. The organization recently identified the compromise and immediately engaged leading forensic experts to investigate the matter. Law enforcement has also been notified regarding the incident. Although Trellix has not disclosed the exact nature of the data potentially accessed by the attackers, it emphasized that there are no indications the source code has been exploited. The company further clarified that its source code release and distribution processes remain unaffected. Details regarding the identity of the attackers or the duration of the unauthorized access have not been shared. Trellix noted that additional information will be provided as appropriate once the investigation is complete. The cybersecurity firm was founded in January 2022 following the merger of McAfee Enterprise and FireEye. Around the same period, Mandiant, which was owned by FireEye, was acquired by Google in a $5.4 billion deal. Trellix itself is owned by Symphony Technology Group. The Hacker News has reached out to the company for comment and will update the story if a response is received. This remains a developing story as more details emerge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nTrellix has confirmed a security breach that enabled unauthorized access to a portion of its source code repository. The company recently identified the compromise and immediately began working with leading forensic experts to resolve the matter. Law enforcement has been notified of the incident.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImpact and Investigation Status\u003c/strong\u003e\nWhile the exact nature of the accessed data has not been disclosed, Trellix stated there are no indications that its source code has been affected or exploited. The company further clarified that its source code release and distribution processes were not impacted. Key investigation details include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNo evidence of exploitation or distribution process compromise.\u003c/li\u003e\n\u003cli\u003eAttacker identity and access duration remain undisclosed.\u003c/li\u003e\n\u003cli\u003eAdditional information will be shared once the investigation concludes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCorporate Background\u003c/strong\u003e\nTrellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye. The company is currently owned by Symphony Technology Group. Around the same timeframe, Mandiant, which was owned by FireEye, was acquired by Google in a deal valued at $5.4 billion.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMedia Coverage\u003c/strong\u003e\nThe Hacker News has reached out to Trellix for comment and will update the story if a response is received. The publication noted that this is a developing story and advised readers to check back for more details.\u003c/p\u003e\n","keyPoints":["Trellix announced a security breach that enabled unauthorized access to a portion of its source code repository.","The company is working with forensic experts and law enforcement to investigate and resolve the incident.","Trellix stated there is no evidence that its source code has been exploited or that its distribution process was affected.","The company has not disclosed the identity of the attackers or the duration of the unauthorized access.","Trellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye."],"insights":["Trellix, a cybersecurity vendor, suffered a breach targeting its source code repository, highlighting potential risks to the development infrastructure of security tooling providers.","The company explicitly stated there is no evidence that its source code release or distribution process was affected, indicating the breach likely did not compromise the integrity of its shipped products.","Trellix has not disclosed the identity of the attackers or the duration of the unauthorized access, leaving the scope of the compromise and potential persistence mechanisms unknown."],"referencedReports":[],"body":"\u003cp\u003eTrellix has confirmed that it suffered a security breach allowing unauthorized access to a portion of its source code repository. The company recently identified the compromise and immediately began working with leading forensic experts to address the incident. Trellix has also notified law enforcement about the breach. While the exact nature of the accessed data remains undisclosed, the company stated there are no indications that its source code has been affected or exploited. Furthermore, Trellix emphasized that its source code release and distribution processes were not impacted. The organization has not yet disclosed the identity of the attackers or the duration of the unauthorized access. Additional details will be shared once the investigation concludes. Trellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye. The company is currently owned by Symphony Technology Group.\u003c/p\u003e\n"},{"n":19,"title":"Top Five Sales Challenges Costing MSPs Cybersecurity Revenue","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/top-five-sales-challenges-costing-msps.html","time":"10:30","priority":"MAY READ","score":65,"group":null,"groupColor":null,"tldr":"MSPs must shift from technical security pitches to business-outcome-driven messaging and structured sales processes to overcome common objections, expand existing accounts, and unlock significant cybersecurity revenue growth.","briefOverview":"\u003cp\u003eThe managed security services market is rapidly expanding, yet many MSPs struggle to convert rising demand into profitable revenue due to a disconnect between technical expertise and business outcomes. Sales messaging often stalls when providers focus on technical frameworks rather than translating security value into operational continuity, compliance readiness, and risk reduction. Overcoming this execution gap requires MSPs to align their go-to-market strategies with the specific priorities of expanded buying committees, which now average over eight stakeholders. Addressing cost objections through clear ROI quantification and leveraging compliance deadlines as entry points can significantly accelerate deal velocity. Ultimately, MSPs must adopt structured sales processes and continuous education to transform reactive selling into predictable, scalable growth.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe managed security services market is projected to grow from \u003cspan class=\"math inline\"\u003e\\(38.31 billion in 2025 to \\)\u003c/span\u003e69.16 billion by 2030. Cybersecurity has emerged as the fastest-growing sector within this landscape. Despite this favorable trajectory, many MSPs fail to capitalize on the opportunity due to a fundamental disconnect between technical expertise and client business priorities. Sales messaging frequently stalls when providers emphasize technical frameworks and vulnerability scans rather than translating security investments into measurable business outcomes. Prospects typically evaluate cybersecurity based on risk reduction, successful compliance audits, and business continuity. When sellers cannot bridge this divide, clients view security as a deferrable cost center instead of a strategic investment.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies five primary obstacles that prevent MSPs from converting rising demand into profitable revenue. First, 77% of MSPs cite a lack of client urgency as a major sales challenge. Technical teams recognize security weaknesses but struggle to translate them into business terms that drive immediate investment. Second, buying committees have expanded to an average of over eight stakeholders, necessitating tailored discovery frameworks for executives, finance, and IT leaders. Third, 66% of SMBs cite cost as their top obstacle, demanding objective scoring frameworks and clear objection handling that addresses underlying beliefs. Fourth, over 56% of new agreements are initiated to meet compliance requirements, positioning regulatory deadlines as a strategic entry point for broader security programs. Fifth, established MSPs leave substantial revenue untapped by focusing only on new acquisition, when existing accounts offer the fastest path to growth.\u003c/p\u003e\n\n\u003cp\u003eTo overcome these barriers, MSPs should align sales and technical messaging, map stakeholder landscapes early, and quantify outcomes using measurable impact data. Automating outreach with sales kits and CRM technology ensures consistency, while tracking conversion rates and deal cycle lengths allows for continuous optimization. The GTM Academy provides practical enablement resources developed by active practitioners, including video training, positioning scripts, discovery frameworks, and upsell playbooks. By embedding continuous learning and connecting sales metrics to business goals, MSPs can reduce friction, accelerate revenue, and maximize client value year over year.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"market-context-and-the-execution-gap\"\u003eMarket Context and the Execution Gap\u003c/h3\u003e\n\n\u003cp\u003eThe managed security services market is experiencing rapid expansion, projected to grow from \u003cspan class=\"math inline\"\u003e\\(38.31 billion in 2025 to \\)\u003c/span\u003e69.16 billion by 2030. Cybersecurity has emerged as the fastest-growing sector within this landscape. Despite this favorable trajectory, many MSPs fail to capitalize on the opportunity due to a fundamental disconnect between technical expertise and client business priorities. Sales messaging frequently stalls when providers emphasize technical frameworks and vulnerability scans rather than translating security investments into measurable business outcomes. Prospects typically evaluate cybersecurity based on risk reduction, successful compliance audits, and business continuity. When sellers cannot bridge this divide, clients view security as a deferrable cost center instead of a strategic investment.\u003c/p\u003e\n\n\u003ch3 id=\"five-core-go-to-market-challenges\"\u003eFive Core Go-to-Market Challenges\u003c/h3\u003e\n\n\u003cp\u003eThe article identifies five primary obstacles that prevent MSPs from converting rising demand into profitable revenue.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLack of Client Urgency:\u003c/strong\u003e 77% of MSPs cite this as a major sales challenge. Technical teams recognize security weaknesses but struggle to translate them into business terms that drive immediate investment. Sellers must reframe security program management around operational continuity, regulatory consequences, and reputational liability to create urgency.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExpanded Buying Committees:\u003c/strong\u003e Cybersecurity purchasing decisions now involve an average of over eight stakeholders, with projections exceeding nine by 2026. These committees include executives, finance leaders, IT personnel, and operations managers who each hold distinct motivations. MSPs must develop tailored discovery frameworks to address the specific concerns of each stakeholder group.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCost Objections:\u003c/strong\u003e 66% of SMBs identify cost as their primary barrier to adopting stronger security measures. Prospects frequently treat security as a sunk cost rather than a business enabler. Overcoming this requires an objective scoring framework and objection handling that targets the underlying beliefs driving hesitation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCompliance as a Catalyst:\u003c/strong\u003e Over 56% of new managed security agreements are initiated to satisfy compliance requirements. Deadlines tied to cyber insurance renewals, industry mandates, and state privacy laws create hard timelines that organic sales rarely generate. Providers should position compliance readiness as an entry point while positioning a broader security program as the ultimate goal.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUntapped Existing Accounts:\u003c/strong\u003e Established MSPs often leave substantial revenue on the table by focusing exclusively on new client acquisition. Expanding accounts requires a deliberate, data-driven strategy that treats account management as an ongoing advisory relationship.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-frameworks-for-overcoming-barriers\"\u003eStrategic Frameworks for Overcoming Barriers\u003c/h3\u003e\n\n\u003cp\u003eAddressing these challenges requires a disciplined, systematic approach anchored in actionable processes. MSPs must collaborate with technical experts to translate security findings into client-friendly language that emphasizes risk, operational impact, and business value. Identifying all decision-makers and influencers early allows teams to build consensus through targeted messaging and transparent communication. Presenting security investments in terms of measurable impact, such as reduced incident response times or improved operational uptime, supports faster purchasing decisions. Leveraging sales kits, playbooks, and CRM technology standardizes outreach and ensures smooth handoffs across complex deals. Tracking leading indicators like conversion rates and upsell frequency enables teams to identify pipeline bottlenecks and refine their strategy continuously.\u003c/p\u003e\n\n\u003ch3 id=\"practical-resources-and-continuous-growth\"\u003ePractical Resources and Continuous Growth\u003c/h3\u003e\n\n\u003cp\u003eTo support service providers in achieving predictable growth, Cynomi established the GTM Academy as a practical enablement program. The program features resources developed by practitioners actively running and scaling security practices. The Complete Sales Kit includes dozens of actionable tools covering every stage of the sales lifecycle. These resources encompass ideal client profile frameworks, positioning scripts, discovery templates, scoring worksheets, and upsell playbooks. By unifying security program management with sales enablement, Cynomi emphasizes that service delivery and sales motions must reinforce each other. MSPs can build a sustainable advantage by hosting internal workshops, reviewing wins and losses, and connecting sales metrics to margin improvement and client retention goals. Embedding these best practices transforms reactive selling into predictable success while positioning MSPs as trusted security advisors.\u003c/p\u003e\n","keyPoints":["MSPs frequently lose cybersecurity sales because they focus on technical frameworks rather than translating security value into business outcomes like risk reduction and compliance.","Cybersecurity buying committees have expanded to an average of over eight stakeholders, requiring tailored discovery frameworks to address the distinct priorities of executives, finance, and IT leaders.","Cost remains a primary obstacle for 66% of SMBs, necessitating clear ROI quantification and objective scoring frameworks to overcome budget hesitations.","More than 56% of new managed security agreements are initiated to meet compliance deadlines, making regulatory readiness a strong entry point for broader security programs.","Existing clients represent the fastest path to revenue growth, but MSPs must use data-driven security posture reviews and industry benchmarking to drive targeted upsell campaigns."],"insights":["Over 56% of new managed security agreements are triggered by compliance deadlines, positioning regulatory readiness as a strategic entry point for broader security programs rather than a standalone requirement.","MSPs can drive recurring revenue from existing accounts by using visual CISO Intelligence dashboards to benchmark clients against industry peers and justify new investments during strategic business reviews.","Standardizing a central repository for discovery answers across sales kits and CRM tools ensures smooth stakeholder handoffs and consistent messaging for complex buying committees averaging over eight participants."],"referencedReports":[],"body":"\u003cp\u003eThe managed security services market is rapidly expanding, yet many MSPs struggle to convert rising demand into profitable revenue due to a disconnect between technical expertise and business outcomes. Sales messaging often stalls when providers focus on technical frameworks rather than translating security value into operational continuity, compliance readiness, and risk reduction. Overcoming this execution gap requires MSPs to align their go-to-market strategies with the specific priorities of expanded buying committees, which now average over eight stakeholders. Addressing cost objections through clear ROI quantification and leveraging compliance deadlines as entry points can significantly accelerate deal velocity. Ultimately, MSPs must adopt structured sales processes and continuous education to transform reactive selling into predictable, scalable growth.\u003c/p\u003e\n"},{"n":14,"title":"Microsoft tests modern Windows Run, says it's faster than legacy dialog","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-tests-modern-windows-run-says-its-faster-than-legacy-dialog/","time":"00:18","priority":"MAY READ","score":45,"group":null,"groupColor":null,"tldr":"Microsoft is rolling out a faster, modernized Windows Run dialog with dark mode support in Windows 11, which is currently optional and available in a preview build.","briefOverview":"\u003cp\u003eMicrosoft is testing a modernized Windows Run dialog in Windows 11 preview build 26300.8346 that features dark mode support and aligns with Fluent Design.\u003c/p\u003e\n\n\u003cp\u003eThe updated interface is engineered to launch faster than the legacy version, achieving a median time-to-show of 94 milliseconds compared to the original 103 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eThis performance improvement specifically supports workflows where users paste clipboard text to strip formatting.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft permanently removed the \u0026ldquo;Browse\u0026rdquo; button because telemetry showed it was used by less than 0.0038% of 35 million users.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog also supports the tilde-backslash command for quick home directory access and displays icons for easier identification.\u003c/p\u003e\n\n\u003cp\u003eCurrently, the feature is entirely optional and must be manually enabled in Windows Advanced Settings.\u003c/p\u003e\n\n\u003cp\u003eIt is currently available only in the Experimental Channel and will roll out broadly in the coming months.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has confirmed that Windows 11 preview build 26300.8346 introduces a modernized Run dialog designed to update the legacy interface without sacrificing its core utility.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog matches Fluent Design standards and includes native dark mode support.\u003c/p\u003e\n\n\u003cp\u003ePerformance was a primary design constraint, with Microsoft aiming to maintain the speed that power users rely on daily.\u003c/p\u003e\n\n\u003cp\u003eThe legacy dialog historically took approximately 103 milliseconds to appear after pressing Win + R, while the modern version achieves a median time-to-show of just 94 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eThis speed is critical for users who paste clipboard text into the dialog to remove unwanted formatting.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft measured time-to-show and usage patterns across 35 million users to establish a baseline for the redesign.\u003c/p\u003e\n\n\u003cp\u003eBased on this data, the company removed the \u0026ldquo;Browse\u0026rdquo; button, which accounted for less than 0.0038% of all Run interactions.\u003c/p\u003e\n\n\u003cp\u003eThe updated interface also introduces the tilde-backslash command for rapid home directory navigation and adds icons to the suggestion list for better visual identification.\u003c/p\u003e\n\n\u003cp\u003eBeyond the Run dialog, the preview update improves the Windows Share UI for AAD users by allowing direct app installation from the share menu.\u003c/p\u003e\n\n\u003cp\u003eThe Magnifier tool now provides additional zoom control with preset levels ranging from 5% to 400%.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft states that the modern Run dialog will not activate automatically.\u003c/p\u003e\n\n\u003cp\u003eUsers must manually enable it through the Advanced Settings menu in Windows.\u003c/p\u003e\n\n\u003cp\u003eThese changes are currently distributed through the Experimental Channel and are expected to reach the broader user base in the coming months.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview of the Modern Run Dialog Update\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is testing a modernized Windows Run dialog in Windows 11 preview build 26300.8346.\u003c/p\u003e\n\n\u003cp\u003eThe update aims to refresh the legacy interface, which has existed since the Windows 95 era, while preserving the functionality that power users depend on daily.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog aligns with Fluent Design principles and includes native dark mode support out of the box.\u003c/p\u003e\n\n\u003cp\u003ePerformance optimization was a central goal during development, as Microsoft sought to match or exceed the speed of the original implementation.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePerformance Metrics and Design Rationale\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe legacy Run dialog historically required approximately 103 milliseconds to appear after the Win + R shortcut was pressed.\u003c/p\u003e\n\n\u003cp\u003eThe modern counterpart achieves a median time-to-show of just 94 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft prioritized this speed improvement because many users rely on the dialog\u0026rsquo;s rapid response to paste clipboard text and immediately copy it back to strip formatting.\u003c/p\u003e\n\n\u003cp\u003eTelemetry data on time-to-show and usage patterns helped establish a baseline for the redesign.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft collaborated with platform partners to ensure the UI surfaces load quickly, noting that these optimizations contribute to broader OS efficiency.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInterface Changes and Feature Removals\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft conducted extensive research on user behavior before finalizing the new interface.\u003c/p\u003e\n\n\u003cp\u003eThis analysis led to the permanent removal of the \u0026ldquo;Browse\u0026rdquo; button, which allowed users to navigate directories to open programs.\u003c/p\u003e\n\n\u003cp\u003eTelemetry from a sample of 35 million users showed that the Browse feature was utilized less than 0.0038% of the time.\u003c/p\u003e\n\n\u003cp\u003eThe updated dialog now supports the \u003ccode\u003e~\\\u003c/code\u003e command for direct access to the home directory.\u003c/p\u003e\n\n\u003cp\u003eIt also displays icons in the suggestion list to improve entry identification without adding visual clutter.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDeployment and Optional Activation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe modern Run dialog is not enabled by default.\u003c/p\u003e\n\n\u003cp\u003eUsers must manually activate it by navigating to Advanced Settings in Windows.\u003c/p\u003e\n\n\u003cp\u003eThis opt-in approach allows administrators and users to retain the legacy interface if preferred.\u003c/p\u003e\n\n\u003cp\u003eThe feature is currently distributed exclusively through the Experimental Channel.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft plans to collect additional feedback before rolling out the dialog to a wider audience.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAdditional Preview Build Enhancements\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe preview update introduces several other system improvements alongside the Run dialog.\u003c/p\u003e\n\n\u003cp\u003eKey additions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect application installation from the Windows Share UI for AAD users\u003c/li\u003e\n\u003cli\u003eGranular zoom control for the Magnifier accessibility tool\u003c/li\u003e\n\u003cli\u003ePreset zoom levels ranging from 5% to 400%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese updates are slated for broader distribution in the coming months.\u003c/p\u003e\n","keyPoints":["Microsoft is testing a modernized Windows Run dialog in preview build 26300.8346 that supports dark mode and aligns with Fluent Design.","The updated dialog operates faster than the legacy version, with a median time-to-show of 94 milliseconds compared to 103 milliseconds.","Microsoft removed the \"Browse\" button from the new interface because usage data showed it was utilized by less than 0.0038% of users.","The modern Run feature is optional and requires manual activation in Windows Advanced Settings rather than enabling automatically."],"insights":["The modern Run dialog is currently restricted to the Experimental Channel and requires manual activation via Advanced Settings, meaning deployment will depend on deliberate opt-in rather than automatic updates.","Microsoft permanently removed the \"Browse\" button based on telemetry showing it was used by less than 0.0038% of 35 million users, indicating a decisive shift toward keyboard-centric workflows.","The 94ms median load time was specifically engineered to support clipboard-pasting workflows, where rapid dialog appearance prevents unwanted text formatting from being pasted."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft is testing a modernized Windows Run dialog in Windows 11 preview build 26300.8346 that features dark mode support and aligns with Fluent Design.\u003c/p\u003e\n\n\u003cp\u003eThe updated interface is engineered to launch faster than the legacy version, achieving a median time-to-show of 94 milliseconds compared to the original 103 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eThis performance improvement specifically supports workflows where users paste clipboard text to strip formatting.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft permanently removed the \u0026ldquo;Browse\u0026rdquo; button because telemetry showed it was used by less than 0.0038% of 35 million users.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog also supports the tilde-backslash command for quick home directory access and displays icons for easier identification.\u003c/p\u003e\n\n\u003cp\u003eCurrently, the feature is entirely optional and must be manually enabled in Windows Advanced Settings.\u003c/p\u003e\n\n\u003cp\u003eIt is currently available only in the Experimental Channel and will roll out broadly in the coming months.\u003c/p\u003e\n"},{"n":12,"title":"Story retracted","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/story-retracted/","time":"16:26","priority":"MAY READ","score":25,"group":"J","groupColor":"#f472b6","tldr":"BleepingComputer has retracted its report on an Instructure data breach after determining the information was incorrect and based on outdated details from a previous incident.","briefOverview":"\u003cp\u003eBleepingComputer initially published an article regarding a new data breach at Instructure. Shortly after the publication, the organization determined that the information was incorrect. The details were primarily based on outdated information from a prior incident.\u003c/p\u003e\n\n\u003cp\u003eConsequently, the article has been officially retracted. The publication has expressed regret for the error.\u003c/p\u003e\n\n\u003cp\u003eThe retraction notice also includes promotional content for an upcoming event. This event focuses on autonomous validation techniques. The promotion highlights how AI can chain multiple zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis exploit reportedly bypasses both renderer and operating system sandboxes. The article concludes with links to related security breach reports.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBleepingComputer published a story claiming a new data breach had occurred at Instructure. The publication quickly recognized that the reported information was inaccurate. The content relied heavily on outdated details from a previous security incident.\u003c/p\u003e\n\n\u003cp\u003eDue to these inaccuracies, the article was formally retracted. The editorial team issued a public apology for the mistake.\u003c/p\u003e\n\n\u003cp\u003eThe retraction page features an advertisement for the Autonomous Validation Summit scheduled for May 12 and 14. The advertisement describes a research finding that 99 percent of identified vulnerabilities remain unpatched. It explains that artificial intelligence successfully chained four zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis combined exploit effectively bypassed both renderer and operating system sandboxes. The promotion warns that a wave of similar exploits is expected to emerge.\u003c/p\u003e\n\n\u003cp\u003eIt also outlines how autonomous, context-rich validation can identify exploitable weaknesses. This validation process is presented as a way to prove security controls remain effective. The approach is claimed to close the remediation loop efficiently.\u003c/p\u003e\n\n\u003cp\u003eThe page also lists several related articles about other data breaches. These links cover incidents involving McGraw Hill, Infinite Campus, ADT, and Vercel. Each linked article addresses different organizations and varying numbers of affected accounts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eRetraction Notice\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer initially released a report detailing a new data breach at Instructure. Shortly after publication, the editorial team determined that the information was incorrect. The report primarily relied on outdated details from a prior security incident.\u003c/p\u003e\n\n\u003cp\u003eConsequently, the article has been officially retracted. The publication has issued a formal apology for the error.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eEvent Promotion and Technical Claims\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe retraction page includes promotional material for the Autonomous Validation Summit taking place on May 12 and 14. The advertisement highlights a finding that 99 percent of discovered vulnerabilities remain unpatched. Artificial intelligence was used to chain four zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis combined exploit successfully bypassed both renderer and operating system sandboxes. The promotion warns that a wave of new exploits is expected to follow.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eValidation Methodology\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe event focuses on autonomous, context-rich validation techniques. This methodology aims to identify what is actually exploitable within systems. It also seeks to prove that security controls remain effective under pressure.\u003c/p\u003e\n\n\u003cp\u003eThe approach is designed to close the remediation loop efficiently. Readers are encouraged to claim a spot for the event.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRelated Security Incidents\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article concludes with a list of related breach reports. These links cover several other major security incidents. The following organizations are referenced in the related articles:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMcGraw Hill experienced a breach affecting 13.5 million accounts.\u003c/li\u003e\n\u003cli\u003eMcGraw Hill confirmed the breach following an extortion threat.\u003c/li\u003e\n\u003cli\u003eInfinite Campus warned of a breach after ShinyHunters claimed data theft.\u003c/li\u003e\n\u003cli\u003eADT suffered a breach affecting 5.5 million people.\u003c/li\u003e\n\u003cli\u003eVercel confirmed a breach as hackers claim to be selling stolen data.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["BleepingComputer initially published a story about a new data breach at Instructure.","The publication determined that the information was incorrect and primarily based on outdated details from a prior incident.","The article has been retracted, and the publication regrets the error."],"insights":["AI was used to chain four zero-days into a single exploit capable of bypassing both renderer and OS sandboxes.","Autonomous, context-rich validation is highlighted as a method to identify exploitable vulnerabilities, verify control effectiveness, and close the remediation loop.","The retraction underscores that breach reporting accuracy depends on verifying data freshness, as outdated details from prior incidents can lead to incorrect publications."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer initially published an article regarding a new data breach at Instructure. Shortly after the publication, the organization determined that the information was incorrect. The details were primarily based on outdated information from a prior incident.\u003c/p\u003e\n\n\u003cp\u003eConsequently, the article has been officially retracted. The publication has expressed regret for the error.\u003c/p\u003e\n\n\u003cp\u003eThe retraction notice also includes promotional content for an upcoming event. This event focuses on autonomous validation techniques. The promotion highlights how AI can chain multiple zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis exploit reportedly bypasses both renderer and operating system sandboxes. The article concludes with links to related security breach reports.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
