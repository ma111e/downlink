<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

window.__DL_ARTICLES = [{"n":1,"title":"The npm Threat Landscape: Attack Surface and Mitigations (Updated May 1)","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/monitoring-npm-supply-chain-attacks/","time":"00:10","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"The npm ecosystem has shifted to a new baseline of sophisticated, self-replicating supply chain attacks that automatically compromise and redistribute malicious packages to harvest credentials and propagate across developer environments. Organizations must immediately disable lifecycle scripts, rotate exposed credentials, and enforce strict registry controls to mitigate these worm-like threats.","briefOverview":"\u003cp\u003eThe npm ecosystem has transitioned from isolated typosquatting to a high-consequence threat landscape characterized by systematic, self-replicating supply chain attacks. The September 2025 Shai-Hulud worm marked this inflection point by proving that npm could be weaponized as a force multiplier for malware distribution. Since then, threat actors have accelerated the frequency and technical depth of these compromises. Unit 42 has documented three core shifts in adversary tactics, including wormable propagation, infrastructure-level persistence in CI/CD pipelines, and multi-stage sleeper payloads. Two major campaigns were tracked in April 2026, with the first compromising @bitwarden/cli and the second targeting the SAP ecosystem through four high-download packages. Both attacks rely on modified package.json files that inject a preinstall lifecycle hook to execute malicious code automatically during installation. The payloads download a custom Bun runtime to harvest sensitive credentials, including GitHub tokens, npm tokens, and cloud secrets from developer workstations and CI/CD environments. Once credentials are stolen, the malware exfiltrates the data through encrypted HTTPS connections or public GitHub repositories. It then propagates exponentially by backdooring every npm package the victim can publish, using GitHub\u0026rsquo;s public commit search API as a covert command and control channel. Organizations are advised to disable lifecycle scripts, pin dependencies, and route package downloads through private registries to mitigate these threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe security of the npm ecosystem reached a critical inflection point with the September 2025 Shai-Hulud worm, which transformed npm into a force multiplier for malware distribution. In April 2026, Unit 42 tracked two aggressive campaigns that escalated this threat baseline. The first campaign compromised the @bitwarden/cli package at version 2026.4.0, while the second, dubbed Mini Shai-Hulud, targeted the SAP developer ecosystem through four high-download packages. Both attacks rely on modified package.json files that inject a preinstall lifecycle hook to execute malicious code automatically during the npm installation process. The bootstrap scripts download the Bun JavaScript runtime and run an obfuscated payload designed to harvest credentials. This payload scans developer workstations and CI/CD environments to extract GitHub tokens, npm tokens, SSH keys, and cloud provider secrets. Exfiltration occurs via two channels: a primary HTTPS connection to an attacker-controlled C2 domain and a secondary method that commits encrypted data to newly created public GitHub repositories. The malware also implements a self-replication mechanism that backdoors every npm package a victim can publish, creating an exponential propagation vector. To maintain command and control resilience, the attackers use GitHub\u0026rsquo;s public commit search API as a covert channel to embed stolen tokens or new infrastructure directives. Attribution points to TeamPCP, which has also compromised Checkmarx distribution channels, Docker Hub images, and VS Code extensions. Mitigation strategies emphasize disabling lifecycle scripts with ignore-scripts=true, pinning dependencies using lockfiles, and routing all traffic through private registry proxies. Security teams are also urged to rotate exposed credentials, audit npm packages for unauthorized hooks, and enforce egress filtering on CI runners.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"executive-summary-threat-evolution\"\u003eExecutive Summary \u0026amp; Threat Evolution\u003c/h2\u003e\n\n\u003cp\u003eThe npm ecosystem has transitioned from a nuisance era of isolated typosquatting to a high-consequence threat landscape characterized by systematic, self-replicating supply chain attacks. The September 2025 Shai-Hulud worm marked this inflection point by proving that npm could be weaponized as a force multiplier for malware distribution. Since then, threat actors have accelerated the frequency and technical depth of these compromises. Unit 42 has documented three core shifts in adversary tactics, including wormable propagation, infrastructure-level persistence in CI/CD pipelines, and multi-stage sleeper payloads.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-details\"\u003eCampaign Details\u003c/h2\u003e\n\n\u003cp\u003eTwo major campaigns were tracked in April 2026. The first, identified as Shai-Hulud: The Third Coming, compromised the @bitwarden/cli package at version 2026.4.0. The second wave, dubbed Mini Shai-Hulud, targeted the SAP developer ecosystem through four compromised packages: @cap-js/sqlite@2.2.2, @cap-js/postgres@2.2.2, @cap-js/db-service@2.10.1, and mbt@1.2.48. These SAP packages account for approximately 570,000 weekly downloads and target enterprise developers with access to cloud credentials and deployment secrets. Both campaigns share identical toolchains, obfuscation methods, and propagation logic, indicating direct authorship reuse.\u003c/p\u003e\n\n\u003ch2 id=\"attack-mechanism-payload-capabilities\"\u003eAttack Mechanism \u0026amp; Payload Capabilities\u003c/h2\u003e\n\n\u003cp\u003eCompromised packages introduce two new files, setup.mjs and execution.js, alongside a modified package.json that adds a preinstall lifecycle hook. This hook triggers automatically during npm install, bootstrapping the attack before installation completes. The setup.mjs script detects the host operating system and architecture, then downloads the Bun JavaScript runtime (v1.3.13) from GitHub. It immediately executes the main payload using this runtime. The obfuscated payload, weighing approximately 11.7 MB, employs a custom string scrambling layer labeled ctf-scramble-v2 to evade static analysis. It also includes a Russian locale killswitch that exits silently if the system locale is set to Russian. On non-CI machines, the malware daemonizes itself to run persistently in the background.\u003c/p\u003e\n\n\u003ch2 id=\"credential-harvesting-exfiltration\"\u003eCredential Harvesting \u0026amp; Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe payload deploys multiple provider classes to scan and extract sensitive data from developer environments. It targets file systems for SSH keys, Git configurations, and .npmrc files. It runs shell commands to capture active GitHub CLI tokens and harvests full environment variable blocks. The malware also integrates cloud SDKs to enumerate and read secrets from AWS Systems Manager, Azure Key Vault, and Google Cloud Secret Manager. In CI/CD environments, it parses GitHub Actions runner contexts to extract masked secrets. All harvested data is compressed, encrypted with AES-256-GCM, and exfiltrated through a dual-channel system. The primary channel sends encrypted JSON payloads via HTTPS to an attacker-controlled C2 domain. The secondary channel creates public GitHub repositories with randomized Dune-themed names to commit the encrypted results.\u003c/p\u003e\n\n\u003ch2 id=\"propagation-c2-resilience\"\u003ePropagation \u0026amp; C2 Resilience\u003c/h2\u003e\n\n\u003cp\u003eThe malware implements an aggressive self-replication mechanism that backdoors every npm package the victim can publish. It validates npm tokens for write permissions, enumerates writable packages, downloads their tarballs, and injects the malicious setup.mjs script. It then bumps the patch version and republishes the package to the registry. This creates an exponential propagation vector that infects downstream developers. Command and control resilience is maintained through a GitHub dead-drop mechanism. If the primary C2 server is unreachable, the malware searches public GitHub commits for specific keywords. It decodes embedded Base64 strings to recover new C2 domains or previously stolen tokens, ensuring continuous operation without relying on traditional attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"mitigations-recommendations\"\u003eMitigations \u0026amp; Recommendations\u003c/h2\u003e\n\n\u003cp\u003eSecurity teams should immediately disable lifecycle scripts by adding ignore-scripts=true to .npmrc files. Organizations must enforce cooldown periods of 24 to 72 hours for newly published packages to catch malicious releases before widespread adoption. Dependency pinning should be enforced using package-lock.json and npm ci commands to prevent hidden updates during builds. All package downloads must be routed through private registry proxies rather than direct connections to the public registry. Namespace shadowing should be prevented by using scoped packages and configuring private registries to resolve internal scopes exclusively. Provenance verification should be implemented using tools like slsa-verifier to validate OpenID Connect attestations. Finally, strict egress network policies must be applied to CI runners to block unauthorized outbound connections to C2 infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eNetwork indicators include the C2 domain audit.checkmarx.cx, the IP address 94.154.172.43, and the attacker-controlled domain checkmarx.cx. GitHub indicators feature the dead-drop repository helloworm00/hello-world, commit SHA1 hash bc544f455d7c06c8a1f3446160a6d9a4a8236b11, and public repositories named with Dune-themed words. File indicators include SHA256 hashes for the bootstrap script bw_setup.js, the obfuscated payload bw1.js, and the malicious package.json. Process indicators highlight unexpected Bun runtime execution and the injection of .github/workflows/format-check.yml on transient branches.\u003c/p\u003e\n","keyPoints":["The npm threat landscape has shifted from isolated typosquatting incidents to systematic, self-replicating supply chain attacks that automatically compromise and redistribute malicious packages.","Compromised packages execute malicious code during installation through preinstall lifecycle hooks, harvesting GitHub tokens, npm tokens, and cloud credentials from developer environments.","The malware propagates by backdooring every npm package a victim can publish and uses GitHub's public commit search API as a covert command and control channel.","Effective mitigations include disabling lifecycle scripts with ignore-scripts=true, pinning dependencies using lockfiles, and routing all package downloads through private registries."],"insights":["The malware leverages GitHub's public commit search API as a covert command-and-control channel, embedding stolen tokens or new C2 domains directly into commit messages to maintain infrastructure resilience without relying on traditional attacker-controlled servers.","Compromised packages automatically modify package.json to inject a preinstall hook and increment the patch version, creating an exponential self-replication vector that infects every package a victim can publish.","The payload downloads and executes the Bun JavaScript runtime (v1.3.13) during installation rather than using Node.js, as it requires Bun-specific APIs for shell execution and file I/O.","Implementing ignore-scripts=true in .npmrc effectively disables the preinstall lifecycle hooks that serve as the primary execution trigger for these supply chain compromises."],"referencedReports":[{"title":"Checkmarx Security Update: April 22, 2026","url":"https://checkmarx.com/blog/checkmarx-security-update-april-22/","publisher":"Checkmarx","context":"Cited as the official security update detailing the broader supply-chain campaign that compromised multiple Checkmarx distribution channels."},{"title":"Malicious Checkmarx Artifacts Found in Official KICS Docker Repository and Code Extensions","url":"https://socket.dev/blog/checkmarx-supply-chain-compromise","publisher":"Socket","context":"Referenced as an analysis detailing the threat actor's prior targeting of security tooling vendors like Checkmarx, Trivy, and LiteLLM."}],"body":"\u003cp\u003eThe npm ecosystem has transitioned from isolated typosquatting to a high-consequence threat landscape characterized by systematic, self-replicating supply chain attacks. The September 2025 Shai-Hulud worm marked this inflection point by proving that npm could be weaponized as a force multiplier for malware distribution. Since then, threat actors have accelerated the frequency and technical depth of these compromises. Unit 42 has documented three core shifts in adversary tactics, including wormable propagation, infrastructure-level persistence in CI/CD pipelines, and multi-stage sleeper payloads. Two major campaigns were tracked in April 2026, with the first compromising @bitwarden/cli and the second targeting the SAP ecosystem through four high-download packages. Both attacks rely on modified package.json files that inject a preinstall lifecycle hook to execute malicious code automatically during installation. The payloads download a custom Bun runtime to harvest sensitive credentials, including GitHub tokens, npm tokens, and cloud secrets from developer workstations and CI/CD environments. Once credentials are stolen, the malware exfiltrates the data through encrypted HTTPS connections or public GitHub repositories. It then propagates exponentially by backdooring every npm package the victim can publish, using GitHub\u0026rsquo;s public commit search API as a covert command and control channel. Organizations are advised to disable lifecycle scripts, pin dependencies, and route package downloads through private registries to mitigate these threats.\u003c/p\u003e\n"},{"n":7,"title":"Federal agencies must patch cPanel bug by Sunday, CISA says","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/cisa-orders-federal-agencies-to-patch-cpanel-bug","time":"16:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Federal agencies must urgently patch the critical, actively exploited cPanel vulnerability CVE-2026-41940 by May 3, as major hosting providers have already deployed emergency mitigations to prevent widespread server compromises.","briefOverview":"\u003cp\u003eFederal agencies have been ordered by CISA to patch a critical security vulnerability in cPanel \u0026amp; WHM by May 3. The vulnerability, identified as CVE-2026-41940, carries a CVSS score of 9.8 and allows attackers to completely control host systems, configurations, and managed websites. CISA confirmed on Thursday that the flaw is actively being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThousands of internet-exposed cPanel instances remain vulnerable, prompting immediate emergency responses from major hosting providers. Within hours of the initial advisory, companies like Namecheap and KnownHost firewalled their customers to prevent real-time compromises. The vulnerability was first identified by watchTowr earlier this week, though evidence suggests exploitation began as early as February. Both cPanel and independent researchers have released detection tools to help organizations verify system integrity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Cybersecurity and Infrastructure Security Agency has mandated that all federal agencies patch CVE-2026-41940 by May 3. This high-severity flaw impacts the widely used cPanel \u0026amp; WHM web hosting control panel suite. The vulnerability carries a CVSS score of 9.8 out of 10 and grants successful attackers full control over host systems, configurations, databases, and managed websites.\u003c/p\u003e\n\n\u003cp\u003eSecurity experts warn that exploitation could lead to complete server compromise, data theft, data manipulation, or widespread service disruptions. Multiple cybersecurity firms have identified thousands of internet-exposed cPanel instances that may be vulnerable. CISA officially confirmed on Thursday that the vulnerability is actively being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eIn response, cPanel released both a security update and a separate tool to help organizations detect potential compromises. The flaw was first spotlighted earlier this week by researchers at watchTowr, who also published a detection tool for defenders. Additional evidence indicates that threat actors have been exploiting the bug since February.\u003c/p\u003e\n\n\u003cp\u003eU.S. domain registrar Namecheap issued an advisory warning that mitigation actions might temporarily restrict customer access to their interfaces. Benjamin Harris, CEO of watchTowr, noted that nearly every major hosting provider immediately firewalled their customers off within hours of the advisory. Providers such as Hosting.com, KnownHost, HostPapa, and InMotion took these emergency measures to prevent real-time compromises.\u003c/p\u003e\n\n\u003cp\u003eHarris described this rapid response as part of a new normal driven by increased AI usage in vulnerability research. The collective industry action underscores the critical nature of the vulnerability and the urgency of federal compliance.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview and Impact\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe Cybersecurity and Infrastructure Security Agency (CISA) has issued a directive requiring all federal agencies to patch CVE-2026-41940 by May 3. This vulnerability affects cPanel \u0026amp; WHM, a Linux-based web hosting control panel suite used to manage millions of domains. The flaw carries a CVSS score of 9.8 out of 10, indicating a critical severity level.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation grants an attacker complete control over the host system, its configurations, databases, and all managed websites. Experts warn that malicious actors could use this access to compromise servers entirely, steal sensitive data, manipulate hosted content, or trigger large-scale service disruptions. The widespread deployment of these tools means the attack surface is exceptionally large.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovery and Active Exploitation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was first identified and publicly spotlighted earlier this week by cybersecurity researchers at watchTowr. Independent evidence suggests that threat actors have been actively exploiting the flaw since February. CISA officially confirmed on Thursday that the vulnerability is currently being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eMultiple cybersecurity firms have reported that thousands of cPanel instances are exposed to the internet and remain vulnerable. To assist defenders, the following detection resources have been released:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA security update and compromise detection tool from cPanel.\u003c/li\u003e\n\u003cli\u003eA host identification tool published by watchTowr.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eIndustry Response and Mitigation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMajor hosting providers reacted swiftly to the disclosure by implementing emergency mitigations. Within hours of the initial advisory, companies including Hosting.com, Namecheap, KnownHost, HostPapa, and InMotion firewalled their customers off their own products. Namecheap released a formal advisory warning that these protective actions might temporarily restrict user access to their cPanel and WHM interfaces.\u003c/p\u003e\n\n\u003cp\u003eBenjamin Harris, CEO of watchTowr, characterized this rapid industry response as a necessary measure to prevent real-time customer compromises. He noted that increased AI usage in vulnerability research is making such rapid discovery and response cycles increasingly common.\u003c/p\u003e\n","keyPoints":["Federal agencies have until May 3 to patch CVE-2026-41940, a high-severity vulnerability affecting cPanel \u0026 WHM that carries a CVSS score of 9.8.","Successful exploitation of this vulnerability grants attackers complete control over cPanel host systems, configurations, databases, and the websites they manage.","CISA confirmed the vulnerability is actively being exploited, prompting major hosting providers to immediately firewall their customers and deploy emergency mitigations.","The vulnerability was first identified by watchTowr earlier this week, with evidence indicating that exploitation began as early as February.","cPanel has released both a security update and a separate tool to help organizations determine if their systems have already been compromised."],"insights":["Evidence shows the vulnerability has been actively exploited since February, indicating a significant window of undetected exposure prior to public disclosure.","Nearly every major hosting provider firewalled their customers off their own products within hours of the advisory to prevent real-time compromise.","The watchTowr CEO attributes the rapid discovery and disclosure to increased AI usage in vulnerability research, highlighting a shift toward faster automated threat detection.","Both cPanel and independent researchers released separate detection tools, emphasizing that organizations must actively verify system integrity rather than relying solely on vendor patches."],"referencedReports":[{"title":"cPanel/WHM Authentication Bypass CVE-2026-41940 Technical Analysis","url":"https://labs.watchtowr.com/the-internet-is-falling-down-falling-down-falling-down-cpanel-whm-authentication-bypass-cve-2026-41940","publisher":"watchTowr","context":"The article states that cybersecurity experts at watchTowr first identified the vulnerability and published this technical analysis."},{"title":"Ongoing Critical Security Vulnerability in cPanel Advisory","url":"https://www.namecheap.com/status-updates/ongoing-critical-security-vulnerability-in-cpanel-april-28-2026/","publisher":"Namecheap","context":"The article notes that Namecheap released an advisory warning customers that mitigation efforts may temporarily restrict access to their cPanel and WHM interfaces."}],"body":"\u003cp\u003eFederal agencies have been ordered by CISA to patch a critical security vulnerability in cPanel \u0026amp; WHM by May 3. The vulnerability, identified as CVE-2026-41940, carries a CVSS score of 9.8 and allows attackers to completely control host systems, configurations, and managed websites. CISA confirmed on Thursday that the flaw is actively being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThousands of internet-exposed cPanel instances remain vulnerable, prompting immediate emergency responses from major hosting providers. Within hours of the initial advisory, companies like Namecheap and KnownHost firewalled their customers to prevent real-time compromises. The vulnerability was first identified by watchTowr earlier this week, though evidence suggests exploitation began as early as February. Both cPanel and independent researchers have released detection tools to help organizations verify system integrity.\u003c/p\u003e\n"},{"n":8,"title":"Nearly every Linux system built since 2017 vulnerable to ‘Copy Fail’ flaw","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/linux-vulnerability-copy-fail-patch","time":"12:15","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical Linux kernel vulnerability dubbed Copy Fail affects nearly all distributions released since 2017, enabling privilege escalation and container escapes. Administrators must urgently apply kernel patches to mitigate the risk, as widespread updates remain unrolled.","briefOverview":"\u003cp\u003eSecurity researchers have identified a critical vulnerability dubbed \u0026ldquo;Copy Fail\u0026rdquo; that impacts nearly every major Linux distribution released since 2017. The flaw, tracked as CVE-2026-31431 with a CVSS score of 7.8, allows users with basic accounts to escalate privileges and seize full administrative control. It also enables attackers to escape isolated cloud containers, posing a significant threat to cloud infrastructure. The vulnerability stems from a dangerous combination of three separate kernel changes made between 2011 and 2017. Attackers exploit this by tampering with temporary in-memory file copies, effectively bypassing standard disk-based security monitoring. Theori researchers discovered the issue using an AI-powered scanning tool called Xint Code. Although a kernel fix was committed in early April, major distributions had not yet delivered the patch to end users at the time of the EU cybersecurity advisory. CERT-EU has issued a formal warning urging administrators to apply updates immediately. Meanwhile, the U.S. Cybersecurity and Infrastructure Security Agency has not yet cataloged the flaw as actively exploited.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA newly disclosed security flaw named \u0026ldquo;Copy Fail\u0026rdquo; poses a severe risk to the Linux ecosystem, affecting virtually all major distributions launched since 2017. The vulnerability is officially tracked as CVE-2026-31431 and carries a CVSS base score of 7.8. It grants attackers with a basic user account the ability to take complete administrative control of an affected system. Furthermore, the flaw functions as a container escape mechanism, allowing compromised applications to break out of isolated environments and hijack the host server. Theori researchers uncovered the bug using an AI-powered scanning tool known as Xint Code. They determined that the vulnerability resulted from the cumulative effect of three distinct kernel modifications introduced in 2011, 2015, and 2017. The attack operates by silently modifying temporary file copies held in memory during active use. Because standard security monitoring tools primarily check files on disk rather than in memory, they fail to detect these in-memory alterations. This allows attackers to rewrite the execution rules of trusted system programs, facilitating privilege escalation. The underlying Linux codebase received a fix on April 1, following an initial report on March 23. Despite this, major distributions had not yet pushed the update to end users when CERT-EU issued its formal advisory on Thursday. The advisory strongly recommends applying kernel updates as soon as they become available. An interim workaround currently circulating online fails to function correctly across all Linux distributions. The U.S. Cybersecurity and Infrastructure Security Agency has not yet listed the flaw in its known exploited vulnerabilities catalog, indicating that active exploitation has not been observed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eThe article details the discovery and impact of a critical Linux kernel vulnerability dubbed \u0026ldquo;Copy Fail.\u0026rdquo; This flaw has been present in the operating system for nearly a decade and impacts nearly every major Linux distribution released since 2017. The vulnerability is formally tracked as CVE-2026-31431 and has been assigned a CVSS base score of 7.8.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism-and-discovery\"\u003eTechnical Mechanism and Discovery\u003c/h3\u003e\n\n\u003cp\u003eThe flaw was publicly disclosed by researchers at the cybersecurity firm Theori. The team utilized an AI-powered scanning tool called Xint Code to identify the issue. The vulnerability stems from a dangerous combination of three separate kernel changes made in 2011, 2015, and 2017. Individually, these changes were unremarkable, but their cumulative effect created a significant security gap. The attack exploits the system\u0026rsquo;s handling of temporary file copies held in memory while a file is in use. Attackers can silently tamper with these in-memory copies without ever modifying the original file on disk. Because standard security monitoring tools primarily check files on disk rather than in memory, they remain blind to the manipulation. This gap allows attackers to rewrite the execution rules of trusted system programs, facilitating privilege escalation.\u003c/p\u003e\n\n\u003ch3 id=\"impact-and-scope\"\u003eImpact and Scope\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability poses a severe risk across multiple deployment environments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePrivilege Escalation:\u003c/strong\u003e Any user with a basic account on an affected system can seize full administrative control.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContainer Escape:\u003c/strong\u003e The flaw enables attackers to break out of supposedly isolated cloud containers, taking control of the entire host server.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWidespread Exposure:\u003c/strong\u003e It affects Ubuntu, Red Hat Enterprise Linux, Amazon Linux, and SUSE, which collectively run the majority of global servers and cloud infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mitigation-and-advisory-status\"\u003eMitigation and Advisory Status\u003c/h3\u003e\n\n\u003cp\u003eSecurity officials and researchers have issued multiple warnings regarding the flaw:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePatch Status:\u003c/strong\u003e The underlying Linux codebase received a fix on April 1, following an initial report on March 23. Patches began reaching users on Thursday, though some systems remain unprotected.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorkaround Limitations:\u003c/strong\u003e An interim workaround circulating online does not function correctly on all distributions, making official kernel updates the only reliable mitigation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdvisories:\u003c/strong\u003e CERT-EU issued a formal advisory on Thursday, urging administrators to apply kernel updates immediately.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExploitation Status:\u003c/strong\u003e The U.S. Cybersecurity and Infrastructure Security Agency has not yet added the flaw to its known exploited vulnerabilities catalog, indicating that active attacks have not been observed.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The \"Copy Fail\" vulnerability affects nearly every major Linux distribution released since 2017 and allows users with basic accounts to seize full administrative control.","The flaw enables attackers to escape isolated cloud containers by tampering with temporary in-memory file copies, bypassing standard disk-based security checks.","Researchers at Theori discovered the bug using an AI-powered scanning tool, identifying it as a dangerous combination of three separate kernel changes made between 2011 and 2017.","Although a kernel fix was committed in April, major distributions had not yet delivered the patch to end users at the time of the EU cybersecurity advisory."],"insights":["Standard disk-based security monitoring will completely miss this attack because the vulnerability exploits temporary in-memory file copies rather than modifying files on disk.","The interim workaround circulating online does not function correctly across all distributions, making immediate kernel patching the only reliable mitigation until official updates roll out.","The flaw was discovered by combining three individually benign kernel changes made between 2011 and 2017, demonstrating how long-term kernel evolution can silently accumulate critical attack surfaces.","CISA has not yet added the vulnerability to its known exploited vulnerabilities catalog, indicating it remains in a pre-exploitation phase despite its high CVSS score and widespread impact."],"referencedReports":[{"title":"Copy Fail Linux Distributions Disclosure","url":"https://xint.io/blog/copy-fail-linux-distributions","publisher":"Theori","context":"The article references this as the public disclosure where Theori researchers detailed how they discovered the flaw using an AI-powered scanning tool."},{"title":"CERT-EU Security Advisory 2026-005","url":"https://cert.europa.eu/publications/security-advisories/2026-005/","publisher":"CERT-EU","context":"The article cites this formal advisory as the official warning issued by the EU's cybersecurity body urging administrators to apply kernel patches."}],"body":"\u003cp\u003eSecurity researchers have identified a critical vulnerability dubbed \u0026ldquo;Copy Fail\u0026rdquo; that impacts nearly every major Linux distribution released since 2017. The flaw, tracked as CVE-2026-31431 with a CVSS score of 7.8, allows users with basic accounts to escalate privileges and seize full administrative control. It also enables attackers to escape isolated cloud containers, posing a significant threat to cloud infrastructure. The vulnerability stems from a dangerous combination of three separate kernel changes made between 2011 and 2017. Attackers exploit this by tampering with temporary in-memory file copies, effectively bypassing standard disk-based security monitoring. Theori researchers discovered the issue using an AI-powered scanning tool called Xint Code. Although a kernel fix was committed in early April, major distributions had not yet delivered the patch to end users at the time of the EU cybersecurity advisory. CERT-EU has issued a formal warning urging administrators to apply updates immediately. Meanwhile, the U.S. Cybersecurity and Infrastructure Security Agency has not yet cataloged the flaw as actively exploited.\u003c/p\u003e\n"},{"n":17,"title":"Cybercrime Groups Using Vishing and SSO Abuse in Rapid SaaS Extortion Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cybercrime-groups-using-vishing-and-sso.html","time":"14:26","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Cybercrime groups are executing rapid SaaS extortion attacks by using voice phishing to steal SSO credentials and pivot directly into cloud environments, minimizing detection by operating within trusted applications and suppressing alert notifications while quickly exfiltrating high-value data.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified two active threat clusters, Cordial Spider and Snarky Spider, conducting rapid SaaS extortion campaigns. These groups primarily use voice phishing to deceive targeted users into entering credentials on malicious SSO-themed pages. Once authentication data is captured, the attackers pivot directly into trusted SaaS environments. By operating exclusively within these cloud platforms, they minimize their operational footprint and accelerate their time to impact. The attackers also bypass multi-factor authentication by registering new devices and immediately removing old ones. To avoid detection, they configure inbox rules that automatically delete notifications about unauthorized device registrations. This approach creates significant visibility challenges for security defenders. The campaigns share operational similarities with known ShinyHunters extortion tactics and have recently targeted the retail and hospitality sectors.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers are warning about two cybercrime clusters, Cordial Spider and Snarky Spider, that are executing rapid, high-impact extortion attacks within SaaS environments. Both groups have been active since at least October 2025, with Snarky Spider showing ties to the e-crime ecosystem known as The Com. Their primary attack vector involves voice phishing, where impersonators direct targeted users to malicious adversary-in-the-middle pages designed to capture SSO authentication data. After stealing credentials, the adversaries pivot directly into SSO-integrated cloud applications. This strategy allows them to operate almost exclusively within trusted SaaS ecosystems, which minimizes their digital footprint and accelerates their time to impact. The combination of speed, precision, and cloud-only activity creates substantial detection and visibility challenges for defenders. These campaigns exhibit tactics consistent with ShinyHunters extortion operations, including impersonating IT help desk staff to obtain credentials and multi-factor authentication codes. Threat intelligence assessments indicate that CL-CRI-1116 has specifically targeted the retail and hospitality space since February 2026. The attackers utilize living-off-the-land techniques and residential proxies to conceal their geographic origins and bypass basic IP reputation filters. Once inside, they bypass MFA by registering a new device and immediately deleting existing ones. They then suppress automated security alerts by configuring inbox rules that automatically delete messages regarding unauthorized device registrations. The groups escalate their access by scraping internal employee directories and targeting high-privileged accounts through further social engineering. With elevated privileges, they search for high-value files and business-critical reports across platforms like Google Workspace, HubSpot, Microsoft SharePoint, and Salesforce. Finally, the adversaries exfiltrate the stolen data to infrastructure under their control. By abusing the trust relationship between identity providers and connected services, they bypass the need to compromise individual applications. Instead, they leverage a single authenticated session to move laterally across the victim\u0026rsquo;s entire SaaS ecosystem.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-actor-overview\"\u003eThreat Actor Overview\u003c/h3\u003e\n\n\u003cp\u003eCybersecurity researchers have identified two distinct but operationally similar cybercrime clusters, Cordial Spider and Snarky Spider, conducting rapid SaaS extortion campaigns.\nCordial Spider operates under multiple aliases, including BlackFile, CL-CRI-1116, O-UNC-045, and UNC6671.\nSnarky Spider is known as O-UNC-025 and UNC6661, and intelligence assessments link it to the e-crime ecosystem known as The Com.\nBoth groups have been active since at least October 2025.\u003c/p\u003e\n\n\u003ch3 id=\"initial-access-and-authentication-abuse\"\u003eInitial Access and Authentication Abuse\u003c/h3\u003e\n\n\u003cp\u003eThe primary entry vector for these campaigns is voice phishing, or vishing.\nAdversaries impersonate IT help desk personnel to deceive targeted users into visiting malicious, SSO-themed adversary-in-the-middle pages.\nThese pages capture authentication data and allow the attackers to pivot directly into SSO-integrated SaaS applications.\nBy leveraging the trust relationship between identity providers and connected services, the groups bypass the need to compromise individual applications.\nA single authenticated session grants them lateral movement across the victim\u0026rsquo;s entire SaaS ecosystem.\u003c/p\u003e\n\n\u003ch3 id=\"evasion-and-persistence-techniques\"\u003eEvasion and Persistence Techniques\u003c/h3\u003e\n\n\u003cp\u003eThe attackers minimize their detection footprint by operating almost exclusively within trusted cloud environments.\nThey accelerate their time to impact while creating significant visibility challenges for defenders.\nTo maintain access and bypass multi-factor authentication, the groups register a new device and immediately remove existing devices from the account.\nThey actively suppress automated security alerts by configuring inbox rules that automatically delete notifications related to unauthorized device registrations.\nAdditional evasion methods include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUtilizing living-off-the-land techniques to operate within trusted environments\u003c/li\u003e\n\u003cli\u003eRouting traffic through residential proxies to conceal geographic locations\u003c/li\u003e\n\u003cli\u003eBypassing basic IP-based reputation filters\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"escalation-and-data-exfiltration\"\u003eEscalation and Data Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eAfter establishing initial access, the adversaries escalate privileges by scraping internal employee directories and conducting further social engineering against high-privileged accounts.\nOnce elevated access is achieved, they systematically search target SaaS environments for high-value files and business-critical reports.\nThe specific platforms targeted for data harvesting include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoogle Workspace\u003c/li\u003e\n\u003cli\u003eHubSpot\u003c/li\u003e\n\u003cli\u003eMicrosoft SharePoint\u003c/li\u003e\n\u003cli\u003eSalesforce\nThe stolen data is then exfiltrated to infrastructure controlled by the threat actors.\nThese campaigns share operational similarities with known ShinyHunters extortion tactics and have recently focused on targeting the retail and hospitality sectors since February 2026.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cybercrime groups Cordial Spider and Snarky Spider execute rapid extortion campaigns by using voice phishing to capture SSO credentials and pivot directly into SaaS applications.","The attackers minimize detection by operating exclusively within trusted cloud environments and automatically deleting unauthorized device registration alerts via inbox rules.","After compromising initial accounts, the groups bypass MFA by registering new devices, scrape internal directories to escalate privileges, and exfiltrate high-value files from platforms like Google Workspace and Salesforce.","By abusing the trust relationship between identity providers and connected services, adversaries can move laterally across an organization's entire SaaS ecosystem using a single authenticated session."],"insights":["The attackers bypass MFA and hide their presence by automatically deleting unauthorized device registration alerts through configured inbox rules, turning standard security notifications into a cover for their activity.","Compromising a single identity provider credential grants lateral access to the entire SaaS ecosystem, making IdP security the critical choke point rather than individual application defenses.","The use of residential proxies and living-off-the-land techniques allows the groups to operate undetected within trusted cloud environments, rendering traditional IP-based reputation filters and network monitoring ineffective."],"referencedReports":[{"title":"Defending Against Cordial Spider and Snarky Spider with Falcon Shield","url":"https://www.crowdstrike.com/en-us/blog/defending-against-cordial-spider-and-snarky-spider-with-falcon-shield/","publisher":"CrowdStrike","context":"The article cites this report from CrowdStrike's Counter Adversary Operations to explain how adversaries use vishing to capture authentication data and pivot directly into SSO-integrated SaaS applications."},{"title":"Mandiant Finds ShinyHunters Using...","url":"https://thehackernews.com/2026/01/mandiant-finds-shinyhunters-using.html","publisher":"Mandiant","context":"The article references this January 2026 report to reveal that the groups employ extortion tactics consistent with ShinyHunters, including impersonating IT staff to obtain credentials and MFA codes."},{"title":"Extortion in the Enterprise: Defending Against BlackFile Attacks","url":"https://rhisac.org/threat-intelligence/extortion-in-the-enterprise-defending-against-blackfile-attacks/","publisher":"RH-ISAC / Palo Alto Networks Unit 42","context":"The article cites this threat intelligence assessment to note the attackers' use of living-off-the-land techniques and residential proxies to conceal their geographic location and bypass IP reputation filters."}],"body":"\u003cp\u003eCybersecurity researchers have identified two active threat clusters, Cordial Spider and Snarky Spider, conducting rapid SaaS extortion campaigns. These groups primarily use voice phishing to deceive targeted users into entering credentials on malicious SSO-themed pages. Once authentication data is captured, the attackers pivot directly into trusted SaaS environments. By operating exclusively within these cloud platforms, they minimize their operational footprint and accelerate their time to impact. The attackers also bypass multi-factor authentication by registering new devices and immediately removing old ones. To avoid detection, they configure inbox rules that automatically delete notifications about unauthorized device registrations. This approach creates significant visibility challenges for security defenders. The campaigns share operational similarities with known ShinyHunters extortion tactics and have recently targeted the retail and hospitality sectors.\u003c/p\u003e\n"},{"n":20,"title":"30,000 Facebook Accounts Hacked via Google AppSheet Phishing Campaign","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/30000-facebook-accounts-hacked-via.html","time":"18:09","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Vietnamese threat actors are running a large-scale phishing campaign that abuses Google AppSheet to compromise and resell approximately 30,000 Facebook accounts. This operation highlights how attackers are repurposing trusted platforms to bypass security controls and monetize stolen credentials.","briefOverview":"\u003cp\u003eA Vietnamese-linked cyber operation codenamed AccountDumpling has compromised approximately 30,000 Facebook accounts by abusing Google AppSheet as a phishing relay. Attackers send spoofed Meta Support emails from noreply@appsheet.com to bypass spam filters and create a false sense of urgency. These messages target Facebook Business owners with threats of permanent account deletion unless they submit an appeal.\u003c/p\u003e\n\n\u003cp\u003eVictims are directed to fake landing pages hosted on legitimate platforms like Netlify, Vercel, and Google Drive. The schemes harvest login credentials, two-factor authentication codes, government IDs, and browser screenshots. All stolen data is exfiltrated to attacker-controlled Telegram channels. The compromised accounts are subsequently sold back through an illicit underground storefront. This operation demonstrates how threat actors continuously repurpose trusted cloud services to facilitate delivery, hosting, and monetization.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGuardio security researcher Shaked Chen has documented a large-scale phishing campaign dubbed AccountDumpling that targets Facebook Business account owners. The operation relies on Google AppSheet to distribute emails from noreply@appsheet.com, effectively masking the malicious traffic behind a trusted Google service. These messages falsely claim to be from Meta Support and warn recipients that their accounts will be permanently deleted without immediate action.\u003c/p\u003e\n\n\u003cp\u003eThe campaign employs four primary lure clusters designed to induce panic and drive users to credential-harvesting pages. The first cluster uses Netlify-hosted pages to collect dates of birth, phone numbers, and government-issued ID photos. The second cluster features blue badge evaluation lures on Vercel that require a bogus CAPTCHA before redirecting users to a phishing page. This second method also forces a retry to capture credentials and two-factor authentication codes.\u003c/p\u003e\n\n\u003cp\u003eThe third cluster distributes Google Drive-hosted PDFs generated through a free Canva account, which use html2canvas to screenshot browser activity and steal passwords. The fourth cluster impersonates major companies like WhatsApp and Adobe to build rapport and redirect victims to attacker-controlled sites. All harvested data from the first three clusters is forwarded to Telegram channels holding roughly 30,000 victim records. Most victims are located in the United States, Italy, Canada, the Philippines, India, Spain, Australia, the United Kingdom, Brazil, and Mexico.\u003c/p\u003e\n\n\u003cp\u003eAttribution evidence points to a Vietnamese individual named PHẠM TÀI TÂN, whose name appears in the PDF metadata. Open-source intelligence links this individual to a digital marketing website based in Vietnam. The operation functions as a continuous criminal-commercial loop where stolen accounts are sold back through an illicit storefront. This campaign highlights how trusted platforms are systematically repurposed to handle delivery, hosting, and monetization layers for cybercriminals.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eCampaign Overview and Infrastructure\u003c/strong\u003e\nGuardio security researcher Shaked Chen has identified a Vietnamese-linked cyber operation codenamed AccountDumpling. The campaign compromises approximately 30,000 Facebook accounts by abusing Google AppSheet as a phishing relay. Attackers send spoofed emails from noreply@appsheet.com to bypass spam filters and leverage a trusted Google service. These messages target Facebook Business account owners with fake Meta Support notifications. The emails warn recipients that their accounts face permanent deletion unless they submit an appeal.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eLure Clusters and Data Harvesting\u003c/strong\u003e\nThe operation utilizes four distinct lure clusters designed to trigger Meta-related panic and direct victims to malicious landing pages.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetlify-hosted Facebook help center pages facilitate account takeover attacks while collecting dates of birth, phone numbers, and government-issued ID photos.\u003c/li\u003e\n\u003cli\u003eVercel-hosted pages mimic a Blue badge evaluation or Meta Privacy Center. These pages gate access behind a bogus CAPTCHA and force a credential retry to harvest passwords and two-factor authentication codes.\u003c/li\u003e\n\u003cli\u003eGoogle Drive-hosted PDFs masquerade as account verification instructions. Generated via a free Canva account, these documents use html2canvas to capture browser screenshots and steal passwords alongside two-factor codes.\u003c/li\u003e\n\u003cli\u003eFake job offers impersonate companies such as WhatsApp, Meta, Adobe, Pinterest, Apple, and Coca-Cola. These lures build rapport with recipients and redirect them to attacker-controlled sites or call sessions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eExfiltration and Victim Demographics\u003c/strong\u003e\nAll stolen data from the first three clusters is forwarded to attacker-controlled Telegram channels. These channels collectively store approximately 30,000 victim records. The majority of compromised accounts belong to users in the United States, Italy, Canada, the Philippines, India, Spain, Australia, the United Kingdom, Brazil, and Mexico. Most victims have been locked out of their own accounts due to the credential theft.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAttribution and Criminal Economics\u003c/strong\u003e\nThe operation\u0026rsquo;s attribution is strongly linked to a Vietnamese individual named PHẠM TÀI TÂN. This identification stems from metadata embedded in the Canva-generated PDFs used in the third lure cluster. Open-source intelligence further connects this name to a Vietnamese website offering digital marketing services. The campaign operates as a self-sustaining criminal-commercial loop. Stolen Facebook assets, including business identities and ad reputations, are sold back through an illicit underground storefront. This structure demonstrates how threat actors repurpose trusted platforms to handle delivery, hosting, and monetization layers simultaneously.\u003c/p\u003e\n","keyPoints":["Vietnamese threat actors are using Google AppSheet to distribute phishing emails that compromise approximately 30,000 Facebook accounts.","The campaign targets Facebook Business account owners with fake Meta Support messages warning of permanent account deletion to harvest credentials and two-factor authentication codes.","Stolen victim data is exfiltrated to attacker-controlled Telegram channels and subsequently sold back through an illicit underground storefront.","Document metadata and open-source intelligence link the operation to a Vietnamese individual named \"PHẠM TÀI TÂN\" who runs a digital marketing website."],"insights":["Attackers abuse Google AppSheet to send phishing emails from noreply@appsheet.com, leveraging a trusted Google service to bypass spam filters and increase deliverability.","The operation functions as a self-sustaining criminal-commercial loop where stolen Facebook accounts are actively sold back through an illicit storefront, monetizing compromised business identities and ad reputations.","Phishing infrastructure relies on legitimate hosting platforms like Netlify, Vercel, and Google Drive to distribute fake documents and landing pages, complicating detection through infrastructure fragmentation.","The campaign targets Facebook Business owners specifically, harvesting not just login credentials but also government-issued ID photos and browser screenshots to facilitate full account takeover and recovery."],"referencedReports":[{"title":"AccountDumpling: Hunting Down the Google-Sent Phishing Wave Compromising 30,000 Facebook Accounts","url":"https://guard.io/labs/accountdumpling---hunting-down-the-google-sent-phishing-wave-compromising-30-000-facebook-accounts","publisher":"Guardio","context":"The article cites this as a report written by security researcher Shaked Chen detailing the phishing relay operation."}],"body":"\u003cp\u003eA Vietnamese-linked cyber operation codenamed AccountDumpling has compromised approximately 30,000 Facebook accounts by abusing Google AppSheet as a phishing relay. Attackers send spoofed Meta Support emails from noreply@appsheet.com to bypass spam filters and create a false sense of urgency. These messages target Facebook Business owners with threats of permanent account deletion unless they submit an appeal.\u003c/p\u003e\n\n\u003cp\u003eVictims are directed to fake landing pages hosted on legitimate platforms like Netlify, Vercel, and Google Drive. The schemes harvest login credentials, two-factor authentication codes, government IDs, and browser screenshots. All stolen data is exfiltrated to attacker-controlled Telegram channels. The compromised accounts are subsequently sold back through an illicit underground storefront. This operation demonstrates how threat actors continuously repurpose trusted cloud services to facilitate delivery, hosting, and monetization.\u003c/p\u003e\n"},{"n":5,"title":"Cyber incident responders who carried out ransomware attacks given 4-year sentences","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/ransomware-cyber-incident-responders","time":"14:15","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Two cybersecurity incident responders were sentenced to four years in prison for abusing their professional positions to launch covert ransomware attacks and extort victims.","briefOverview":"\u003cp\u003eTwo cybersecurity incident responders, Ryan Goldberg and Kevin Martin, were sentenced to four years in prison for conducting covert ransomware attacks. Both men pleaded guilty to conspiracy to obstruct commerce by extortion and abused their professional positions to extort victims. They collaborated with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks between April and December 2023. While the group attempted multiple intrusions, they successfully extorted a single company for $1.2 million. DigitalMint, the company that employed Martino and Martin, has since implemented strict oversight controls for all ransom negotiations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRyan Goldberg and Kevin Martin, former cybersecurity incident responders, were sentenced to four years in prison for orchestrating covert ransomware attacks. Goldberg, who worked for Sygnia, and Martin, a ransomware negotiator for DigitalMint, pleaded guilty in December to conspiracy to obstruct commerce by extortion. Prosecutors revealed that the two men collaborated with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks between April and December 2023. They abused their trusted incident response roles to gain access to victim networks and demand ransoms. Although the group attempted several intrusions, they only successfully extorted one company, securing \u003cspan class=\"math inline\"\u003e\\(1.2 million. Assistant Attorney General Andrew Tysen Duva emphasized that the attackers targeted critical service providers and even leaked patient data from a doctor’s office. FBI Assistant Director Brett Leatherman noted that the investigation required tracking Goldberg across ten countries after he fled the United States. Martino pleaded guilty to the same charges one week earlier and faces a separate sentencing date on July 9. Unlike the other two, Martino actively coordinated with external ransomware gangs while pretending to negotiate on behalf of five victims. He received fees from criminal groups for confidential victim information and used insurance policy limits to drive ransoms as high as \\)\u003c/span\u003e26 million. Law enforcement successfully seized approximately $10 million worth of assets from Martino. In response to the insider threat, DigitalMint has mandated that all ransom negotiations must now occur on auditable cloud platforms. The company’s founder will personally oversee all future negotiations, and negotiator data will be shared with the Department of Homeland Security for continuous oversight.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview-and-sentencing\"\u003eIncident Overview and Sentencing\u003c/h3\u003e\n\n\u003cp\u003eTwo cybersecurity incident responders, Ryan Goldberg and Kevin Martin, have been sentenced to four years in prison for conducting covert ransomware attacks against corporate victims. Both individuals pleaded guilty in December to a single count of conspiracy to obstruct commerce by extortion. Goldberg was employed by the incident response firm Sygnia, while Martin served as a ransomware negotiator for DigitalMint.\u003c/p\u003e\n\n\u003ch3 id=\"attack-methodology-and-financial-impact\"\u003eAttack Methodology and Financial Impact\u003c/h3\u003e\n\n\u003cp\u003eThe defendants collaborated with a third co-conspirator, identified as Angelo Martino, to execute ALPHV/BlackCat ransomware campaigns between April and December 2023. By abusing their trusted positions within incident response firms, the group gained unauthorized access to victim networks and orchestrated extortion attempts. While the trio launched multiple attacks across different organizations, they only successfully extorted a single company, netting $1.2 million.\u003c/p\u003e\n\n\u003ch3 id=\"investigation-and-law-enforcement-response\"\u003eInvestigation and Law Enforcement Response\u003c/h3\u003e\n\n\u003cp\u003eAssistant Attorney General Andrew Tysen Duva highlighted the severity of the breaches, noting that the attackers targeted critical service providers and compromised sensitive data, including patient records from a medical practice. The FBI conducted an extensive international manhunt to apprehend Goldberg, who fled abroad and required tracking across ten countries before his arrest. FBI Assistant Director Brett Leatherman emphasized the operational challenges posed by the suspect\u0026rsquo;s evasion tactics.\u003c/p\u003e\n\n\u003ch3 id=\"ransomware-gang-coordination-and-asset-seizure\"\u003eRansomware Gang Coordination and Asset Seizure\u003c/h3\u003e\n\n\u003cp\u003eAngelo Martino pleaded guilty to the same charges one week prior to Goldberg and Martin and is scheduled for sentencing on July 9. Martino faces up to 20 years in prison and stands out for his direct coordination with external ransomware gangs. He purportedly negotiated ransoms on behalf of five victims while simultaneously profiting from criminal syndicates.\u003c/p\u003e\n\n\u003cp\u003eMartino\u0026rsquo;s role involved a dual exploitation strategy where he sold confidential victim intelligence to ransomware operators for a fee. He actively assisted criminal groups in maximizing payouts by disclosing victims\u0026rsquo; insurance policy limits to them. This coordination led to several massive ransom demands, with some individual ransoms reaching as high as $26 million.\u003c/p\u003e\n\n\u003cp\u003eLaw enforcement successfully seized approximately $10 million worth of assets from Martino as part of the financial recovery efforts. In direct response to the insider threats exposed by this case, DigitalMint has instituted stringent new operational controls.\u003c/p\u003e\n\n\u003cp\u003eAll ransom negotiations are now mandated to occur exclusively over cloud-based platforms that provide full auditability and logging capabilities. One of the company\u0026rsquo;s founders will personally oversee every negotiation to ensure strict compliance and transparency. Additionally, DigitalMint will share ransom negotiator information with the Department of Homeland Security to enable continuous external oversight and mitigate future insider risks.\u003c/p\u003e\n","keyPoints":["Ryan Goldberg and Kevin Martin, cybersecurity incident responders, were sentenced to four years in prison for abusing their positions to conduct covert ransomware attacks.","The men conspired with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks and successfully extorted $1.2 million from one victim.","Angelo Martino, a ransomware negotiator for DigitalMint, pleaded guilty to the same charges and coordinated with ransomware gangs to maximize ransoms.","DigitalMint implemented new security controls mandating that all ransom negotiations be conducted over auditable cloud-based platforms with Department of Homeland Security oversight."],"insights":["DigitalMint now mandates that all ransom negotiations occur exclusively on auditable cloud platforms with DHS oversight, directly mitigating the insider threat exploited by the defendants.","The attackers leveraged their legitimate incident response positions to launch ALPHV/BlackCat attacks, demonstrating how trusted security vendors can be compromised to gain unauthorized access and extort victims.","Martino actively used victim insurance policy limits to negotiate higher ransoms with criminal gangs, revealing a specific financial exploitation tactic that can drive payouts up to $26 million."],"referencedReports":[],"body":"\u003cp\u003eTwo cybersecurity incident responders, Ryan Goldberg and Kevin Martin, were sentenced to four years in prison for conducting covert ransomware attacks. Both men pleaded guilty to conspiracy to obstruct commerce by extortion and abused their professional positions to extort victims. They collaborated with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks between April and December 2023. While the group attempted multiple intrusions, they successfully extorted a single company for $1.2 million. DigitalMint, the company that employed Martino and Martin, has since implemented strict oversight controls for all ransom negotiations.\u003c/p\u003e\n"},{"n":16,"title":"China-Linked Hackers Target Asian Governments, NATO State, Journalists, and Activists","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/china-linked-hackers-target-asian.html","time":"14:02","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"China-aligned threat actors are running coordinated espionage campaigns targeting government and defense sectors across Asia and Europe, while parallel groups conduct phishing attacks against journalists and activists to support state-sponsored digital repression.","briefOverview":"\u003cp\u003eChina-aligned threat actors are conducting coordinated cyber operations targeting government, defense, and journalistic sectors across Asia and Europe. Trend Micro attributes the SHADOW-EARTH-053 espionage campaign to a group active since December 2024 that exploits vulnerabilities in Microsoft Exchange and IIS servers. The attackers deploy Godzilla web shells and ShadowPad implants to maintain persistent access across targets in Pakistan, Thailand, Malaysia, India, Myanmar, Sri Lanka, Taiwan, and Poland. Security researchers recommend immediate patching of internet-facing Microsoft services or deploying virtual patching via IPS and WAF solutions.\u003c/p\u003e\n\n\u003cp\u003eIn a separate disclosure, the Citizen Lab identified two phishing clusters, GLITTER CARP and SEQUIN CARP, that impersonate known individuals and tech security alerts to compromise journalists and diaspora activists. These campaigns rely on credential harvesting, OAuth token theft, and tracking pixels to gain initial email access. The research indicates that these operations share infrastructure and tactics, suggesting a centralized model behind distributed digital transnational repression.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have disclosed details of a China-aligned espionage campaign dubbed SHADOW-EARTH-053 that targets government and defense sectors across South, East, and Southeast Asia, as well as Poland. The adversarial collective has been active since at least December 2024 and shares partial network overlap with other tracked intrusion sets. The group primarily exploits N-day vulnerabilities in internet-facing Microsoft Exchange and IIS servers, such as the ProxyLogon chain, to breach unpatched systems.\u003c/p\u003e\n\n\u003cp\u003eOnce inside, attackers deploy Godzilla web shells to establish persistent remote access and facilitate command execution. These web shells serve as delivery vehicles for ShadowPad backdoors, which are staged via DLL sideloading of legitimately signed executables. In at least one instance, the React2Shell vulnerability facilitated the distribution of a Linux variant of Noodle RAT.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor utilizes open-source tunneling tools like IOX, GOST, and Wstunnel, alongside RingQ for binary packing and detection evasion. Privilege escalation relies on Mimikatz, while lateral movement is executed through a custom RDP launcher and a C# implementation of SMBExec known as Sharp-SMBExec. Trend Micro advises organizations to prioritize applying security updates to Microsoft Exchange and IIS applications.\u003c/p\u003e\n\n\u003cp\u003eWhen immediate remediation is not possible, researchers strongly recommend deploying Intrusion Prevention Systems or Web Application Firewalls with rulesets tuned to block known CVE exploit attempts. Separately, the Citizen Lab flagged two China-affiliated phishing campaigns codenamed GLITTER CARP and SEQUIN CARP that target journalists, civil society members, and diaspora activists.\u003c/p\u003e\n\n\u003cp\u003eGLITTER CARP, detected in April 2025, conducts broad-scale phishing attacks and has targeted the International Consortium of Investigative Journalists alongside the Taiwanese semiconductor industry. SEQUIN CARP, identified in June 2025, focuses on ICIJ journalist Scilla Alecci and other reporters covering topics of interest to the Chinese government. Both clusters employ sophisticated digital impersonation schemes, including fake tech company security alerts and stolen narratives.\u003c/p\u003e\n\n\u003cp\u003eTheir primary objective is to obtain initial access to email accounts through credential harvesting, phishing portals, or social engineering attacks that extract OAuth tokens. GLITTER CARP also utilizes 1x1 tracking pixels to harvest device information and confirm email opens. The research notes infrastructure and tactical overlaps with groups tracked as UNK_SparkyCarp, UTA0388, TAOTH, and UNK_DropPitch. Analysts conclude that these campaigns operate through a distributed network of actors, likely leveraging commercial entities hired by the Chinese state to execute digital transnational repression.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"shadow-earth-053-espionage-campaign\"\u003eSHADOW-EARTH-053 Espionage Campaign\u003c/h3\u003e\n\n\u003cp\u003eTrend Micro has attributed a China-aligned espionage campaign to the threat cluster SHADOW-EARTH-053, which has been active since at least December 2024. The group targets government and defense sectors across Pakistan, Thailand, Malaysia, India, Myanmar, Sri Lanka, Taiwan, and Poland. The campaign shares partial network overlap with other tracked intrusion sets, including CL-STA-0049, Earth Alux, and REF7707.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInitial Access and Exploitation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe primary entry vector involves exploiting N-day vulnerabilities in internet-facing Microsoft Exchange and IIS servers, such as the ProxyLogon chain. In specific instances, the React2Shell vulnerability (CVE-2025-55182) was weaponized to distribute a Linux version of the Noodle RAT.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMalware Deployment and Persistence\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eOnce systems are breached, attackers deploy Godzilla web shells to establish persistent remote access and facilitate command execution. These web shells act as delivery mechanisms for ShadowPad implants, which are staged through DLL sideloading of legitimate signed executables. In at least one case, ShadowPad was launched via AnyDesk.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eOperational Tooling and Movement\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe threat actor employs open-source tunneling tools including IOX, GO Simple Tunnel (GOST), and Wstunnel for network communication. Malicious binaries are packed using RingQ to evade detection. Privilege escalation is achieved through Mimikatz, while lateral movement relies on a custom remote desktop protocol launcher and a C# implementation of SMBExec known as Sharp-SMBExec.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation Guidance\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eResearchers emphasize that organizations must prioritize applying the latest security updates and cumulative patches to Microsoft Exchange and IIS-hosted web applications. When immediate patching is not feasible, deploying Intrusion Prevention Systems or Web Application Firewalls with rulesets tuned to block known CVE exploit attempts is strongly recommended.\u003c/p\u003e\n\n\u003ch3 id=\"glitter-carp-and-sequin-carp-phishing-campaigns\"\u003eGLITTER CARP and SEQUIN CARP Phishing Campaigns\u003c/h3\u003e\n\n\u003cp\u003eThe Citizen Lab has documented two distinct China-affiliated threat actors conducting phishing campaigns against journalists, civil society organizations, and diaspora activists, including Uyghur, Tibetan, Taiwanese, and Hong Kong communities. GLITTER CARP was first detected in April 2025, while SEQUIN CARP emerged in June 2025.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTargeting and Impersonation Tactics\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eGLITTER CARP conducts broad-scale phishing attacks and has specifically targeted the International Consortium of Investigative Journalists alongside the Taiwanese semiconductor industry. SEQUIN CARP focuses on ICIJ journalist Scilla Alecci and other international reporters covering subjects of critical interest to the Chinese government. Both clusters employ well-structured digital impersonation schemes, including fake tech company security alerts and the reuse of known individuals across multiple targets.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Execution and Infrastructure\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe end goal of these campaigns is to secure initial access to email accounts through credential harvesting, phishing portals, or social engineering attacks that extract third-party OAuth tokens. GLITTER CARP incorporates 1x1 tracking pixels pointing to attacker-controlled domains to harvest device information and verify email opens. The research notes that both clusters reuse identical domains and infrastructure across multiple operations.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eGroup Overlaps and Attribution\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eGLITTER CARP shares operational similarities with UNK_SparkyCarp, while SEQUIN CARP aligns with groups tracked as UTA0388 and TAOTH. The Citizen Lab also observed concurrent targeting using the AiTM phishing kit and HealthKick delivery by separate groups, indicating potential operational overlap. Analysts conclude with medium confidence that commercial entities hired by the Chinese state likely orchestrated these distributed campaigns to execute digital transnational repression aligned with government intelligence priorities.\u003c/p\u003e\n","keyPoints":["Trend Micro attributed a China-aligned espionage campaign to SHADOW-EARTH-053, which targets government and defense sectors across multiple Asian nations and Poland.","The threat ac
