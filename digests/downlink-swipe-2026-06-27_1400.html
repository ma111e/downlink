connections, enabling two-factor authentication, avoiding QR codes from unknown users, and not sharing confirmation codes, PINs, passwords, or recovery keys.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Security Service of Ukraine said it and the FBI uncovered a long-running Russian intelligence campaign targeting messaging accounts of government officials, military personnel, politicians, activists, and other users in Ukraine, Europe, and the United States.","The attackers sent SMS messages pretending to be from a messaging platform support bot to persuade users to disclose their account credentials.","The SSU said the campaign sought access to sensitive military, political, and economic information, as well as victims’ personal data.","The SSU did not attribute the campaign to a specific hacking group, but the article notes that similar attacks against Signal and WhatsApp users have been linked to Star Blizzard, UNC5792, and UNC4221.","Recommended precautions include reviewing active messaging app sessions, logging out of unknown connections, enabling two-factor authentication, avoiding unknown QR codes, and not sharing confirmation codes, PINs, passwords, or recovery keys."],"insights":["The campaign did not only target high-profile people or organizations; the SSU said personal accounts belonging to Ukrainian nationals were also included.","The phishing approach relied on impersonating a messaging platform’s support bot, showing that ordinary support-style messages can be used to pressure users into giving away account access.","The article links this activity to a broader pattern of attacks against commercial messaging apps, including prior waves aimed at Signal and WhatsApp users.","The FBI’s related warning highlights backup recovery keys as a specific target, meaning account recovery information can be as sensitive as passwords or confirmation codes."],"referencedReports":[{"title":"CERT-UA article on UNC1151 spear-phishing campaign delivering OYSTERBLUES","url":"https://cert.gov.ua/article/6315762","publisher":"CERT-UA","context":"The article references CERT-UA as attributing a spear-phishing campaign against government organizations to UNC1151, involving delivery of the OYSTERBLUES information stealer.","category":"","primary":false}],"body":"\u003cp\u003eThe Security Service of Ukraine said it worked with the U.S. Federal Bureau of Investigation to uncover a long-running campaign by Russian intelligence services targeting messaging accounts. The campaign aimed at government officials, military personnel, politicians, activists, and other users in Ukraine, Europe, and the United States. The SSU said the purpose was to gain access to sensitive military, political, and economic information, as well as victims’ personal data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the SSU, the attackers sent SMS messages that pretended to come from a messaging platform’s support bot. These messages urged users to disclose their account credentials, allowing the attackers to break into messaging accounts. The SSU said the targeting included not only organizations, officials, and public figures, but also personal accounts belonging to Ukrainian nationals.\u003c/p\u003e\n\n\u003cp\u003eThe SSU did not name a specific hacking group behind the campaign. The article notes that similar attacks against Signal and WhatsApp users have been attributed to Star Blizzard, UNC5792, and UNC4221. Recommended defenses include reviewing active messaging app sessions, logging out of unknown connections, enabling two-factor authentication, avoiding QR codes from unknown users, and not sharing confirmation codes, PINs, passwords, or recovery keys.\u003c/p\u003e\n"},{"n":1,"title":"Clean GitHub repo tricks AI coding agents into running malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/clean-github-repo-tricks-ai-coding-agents-into-running-malware/","time":"14:22","priority":"SHOULD READ","score":82,"tldr":"Mozilla 0DIN researchers showed that an apparently clean GitHub repository can trick an AI coding agent like Claude Code into running setup commands that fetch and execute an attacker-controlled payload from a DNS TXT record. The key risk is that agents may automatically “fix” normal-looking setup errors and execute hidden command chains that give attackers a shell with the developer’s privileges.","briefOverview":"\u003cp\u003eMozilla\u0026rsquo;s Zero Day Investigative Network (0DIN) researchers demonstrated how an agentic coding tool could be tricked into running malware from a seemingly benign GitHub repository. The example used Claude Code to clone and set up a project that contained no malicious code in the repository itself. 0DIN said the compromise can happen with no exploit code, no warning, and no suspicious command that anyone had to approve.\u003c/p\u003e\n\n\u003cp\u003eThe method relies on a clean-looking repository, a Python package that refuses to run until initialized, and an initialization command that calls a shell script. That script retrieves a configuration value from an attacker-controlled DNS TXT record and executes it as a command. Claude Code treats the package error as a normal setup issue and automatically runs the suggested command while trying to recover.\u003c/p\u003e\n\n\u003cp\u003eIf successful, the attacker would obtain an interactive shell running with the developer\u0026rsquo;s privileges. The article says this could expose environment variables, API keys, local configuration files, and allow the attacker to establish persistence. 0DIN warned that threat actors could distribute such repositories through fake job postings, tutorials, blog posts, or direct messages, and suggested that AI agents should disclose the full execution chain of setup commands, including dynamically fetched scripts and code.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mozilla's 0DIN researchers demonstrated an attack concept in which Claude Code could be tricked into running a malicious payload from a GitHub repository that contains no malicious code.","The method uses a clean-looking repository, a Python package that asks to be initialized after failing to run, and an initialization command that executes a shell script retrieving a command from an attacker-controlled DNS TXT record.","0DIN said Claude Code treats the package error as a normal setup issue and automatically runs the suggested initialization command while attempting to recover.","If successful, the attacker would obtain an interactive shell running with the developer’s privileges, potentially exposing environment variables, API keys, local configuration files, and enabling persistence.","0DIN warned that threat actors could distribute such repositories through fake job postings, tutorials, blog posts, or direct messages."],"insights":["The repository itself can remain clean because the malicious command is stored outside the codebase in an attacker-controlled DNS TXT record, making it harder for scanners, AI agents, and human reviewers to detect before execution.","The attack abuses an AI agent’s routine error-recovery behavior rather than requiring the agent to approve an obviously suspicious command.","The malicious outcome is separated from the agent’s visible decision by multiple steps: a trusted error message, a setup script, and a dynamically fetched DNS value.","0DIN’s recommended mitigation is for AI agents to disclose the full execution chain of setup commands, including scripts and code fetched dynamically at runtime."],"referencedReports":[{"title":"Clone this repo and I own your machine","url":"https://0din.ai/blog/clone-this-repo-and-i-own-your-machine","publisher":"Mozilla 0DIN","context":"The article cites 0DIN researchers' technical analysis explaining how a clean-looking GitHub repository can lead Claude Code to execute an attacker-controlled payload through setup command indirection.","category":"","primary":false}],"body":"\u003cp\u003eMozilla\u0026rsquo;s Zero Day Investigative Network (0DIN) researchers demonstrated how an agentic coding tool could be tricked into running malware from a seemingly benign GitHub repository. The example used Claude Code to clone and set up a project that contained no malicious code in the repository itself. 0DIN said the compromise can happen with no exploit code, no warning, and no suspicious command that anyone had to approve.\u003c/p\u003e\n\n\u003cp\u003eThe method relies on a clean-looking repository, a Python package that refuses to run until initialized, and an initialization command that calls a shell script. That script retrieves a configuration value from an attacker-controlled DNS TXT record and executes it as a command. Claude Code treats the package error as a normal setup issue and automatically runs the suggested command while trying to recover.\u003c/p\u003e\n\n\u003cp\u003eIf successful, the attacker would obtain an interactive shell running with the developer\u0026rsquo;s privileges. The article says this could expose environment variables, API keys, local configuration files, and allow the attacker to establish persistence. 0DIN warned that threat actors could distribute such repositories through fake job postings, tutorials, blog posts, or direct messages, and suggested that AI agents should disclose the full execution chain of setup commands, including dynamically fetched scripts and code.\u003c/p\u003e\n"}]</script>
