on Australia’s social media restrictions but is described as going further. It will apply to user-to-user platforms whose purpose is social interaction and that use algorithmic feeds, with the government naming Instagram, YouTube, TikTok, Snapchat, Facebook, and X. Messaging services such as WhatsApp and Signal are excluded, along with YouTube Kids, while a narrow exemption list is planned for educational services, e-commerce, and music streaming.\u003c/p\u003e\n\n\u003cp\u003eThe article says the practical enforcement mechanism is age verification for new accounts, likely through either a facial age scan or an ID upload. Although the government says most adults will not need to complete new checks, that is because long-standing accounts may qualify as low risk if they are old enough, have a credit card attached, or are linked to an email already age-verified elsewhere. According to the article, that grandfathering does not help adults who want to open new or pseudonymous accounts, meaning new account creation would effectively require proof of age.\u003c/p\u003e\n\n\u003cp\u003eThe UK also plans wider restrictions beyond outright bans. High-risk features such as livestreaming and stranger contact will be restricted across more services, including gaming platforms like Roblox, and those restrictions will remain on by default for 16- and 17-year-olds. Separately, AI romantic companion chatbots that simulate sexual or roleplay relationships will be required to enforce an 18+ minimum, and intimate functions on AI chatbots more broadly will be restricted for under-18s. The government is also consulting on overnight curfews and breaks in infinite scrolling for under-18s.\u003c/p\u003e\n\n\u003cp\u003eA major weakness highlighted in the article is that VPN use can bypass the checks because the Online Safety Act targets sites rather than users. The article cites spikes in VPN signups after adult-site enforcement and points to Australian research showing that more than 60% of children were still using social media despite that country’s ban. It also describes political debate in the UK over whether children’s VPN use should be restricted and notes that one proposed measure would in practice have required VPN providers to age-check all users in order to distinguish children from adults.\u003c/p\u003e\n\n\u003cp\u003eResearchers, academics, and rights groups cited in the article argue that the controls are both weak and risky. Research referenced through the Science Media Centre found low-to-medium robustness for nearly every age-verification method except credit-card checks, leading one quoted assessment to call the regime compliance theatre. The article also cites warnings from University of Southampton lecturer Richard Gomer and the Open Rights Group that requiring users to submit IDs or biometric data creates identity theft, blackmail, and data-leak risks, while Meta and YouTube argue that bans may simply push teenagers toward less-regulated spaces. Finally, the article situates the proposal alongside the UK’s GOV.UK Wallet and digital driving licence efforts, suggesting a broader direction in which proving age is becoming a routine precondition for online access.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article reports on a UK government plan to ban under-16s from social media, with regulations due before Christmas and implementation expected in spring 2027. The policy is presented as a child-safety measure, but the article emphasizes that its enforcement mechanism would likely require anyone creating a new social media account in the UK to prove they are over 16 by uploading identity documents or passing a facial age scan.\u003c/p\u003e\n\n\u003cp\u003eAlthough the government says most adults will not face a fresh check, the article argues that this reassurance depends on grandfathering older accounts rather than avoiding age verification altogether. In practice, the article says new adult users and anyone seeking a fresh pseudonymous account would still face age-gating.\u003c/p\u003e\n\n\u003ch1 id=\"government-announcement-and-rationale\"\u003eGovernment announcement and rationale\u003c/h1\u003e\n\n\u003cp\u003ePrime Minister Keir Starmer announced the plan on June 15 after a national consultation that the government says received more than 116,000 responses from parents, children, and experts. The government states that nine in ten parents backed an under-16 ban and that two-thirds of young people agreed that under-16s should be kept off at least some platforms.\u003c/p\u003e\n\n\u003cp\u003eStarmer framed the move as stronger action than any other country has taken, saying the government was banning social media for under-16s and adding wider protections. Technology Secretary Liz Kendall similarly cast the decision as taking power away from large technology companies and giving it back to parents.\u003c/p\u003e\n\n\u003ch1 id=\"scope-of-the-restrictions\"\u003eScope of the restrictions\u003c/h1\u003e\n\n\u003cp\u003eThe article says the UK model is based on Australia’s social media age restrictions, which took effect in December 2025, but that the UK intends to go further.\u003c/p\u003e\n\n\u003ch2 id=\"platforms-covered\"\u003ePlatforms covered\u003c/h2\u003e\n\n\u003cp\u003eThe restrictions will apply to user-to-user platforms that exist to enable social interaction and that operate algorithmic feeds. The government specifically names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInstagram\u003c/li\u003e\n\u003cli\u003eYouTube\u003c/li\u003e\n\u003cli\u003eTikTok\u003c/li\u003e\n\u003cli\u003eSnapchat\u003c/li\u003e\n\u003cli\u003eFacebook\u003c/li\u003e\n\u003cli\u003eX\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"platforms-excluded\"\u003ePlatforms excluded\u003c/h2\u003e\n\n\u003cp\u003eThe article says messaging services are explicitly excluded, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhatsApp\u003c/li\u003e\n\u003cli\u003eSignal\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also says YouTube Kids is excluded. In addition, there will be a narrowly defined exemption list for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEducational services\u003c/li\u003e\n\u003cli\u003eE-commerce\u003c/li\u003e\n\u003cli\u003eMusic streaming\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"wider-controls-beyond-the-under-16-ban\"\u003eWider controls beyond the under-16 ban\u003c/h1\u003e\n\n\u003cp\u003eThe article notes that the policy is not limited to account bans.\u003c/p\u003e\n\n\u003ch2 id=\"feature-restrictions\"\u003eFeature restrictions\u003c/h2\u003e\n\n\u003cp\u003eHigh-risk features such as livestreaming and allowing strangers to contact children will be restricted across a wider range of services, including gaming platforms such as Roblox. The article says Roblox itself would remain available, but features such as chat would be locked down.\u003c/p\u003e\n\n\u003cp\u003eTo avoid what the government describes as a cliff-edge at age 16, livestreaming and stranger-contact restrictions will also be enabled by default for 16- and 17-year-olds.\u003c/p\u003e\n\n\u003ch2 id=\"ai-chatbot-restrictions\"\u003eAI chatbot restrictions\u003c/h2\u003e\n\n\u003cp\u003eThe article also says AI romantic companion chatbots that simulate sexual or roleplay relationships will have to enforce an 18+ minimum age. More broadly, intimate functions on AI chatbots will be restricted for under-18s.\u003c/p\u003e\n\n\u003ch2 id=\"additional-measures-under-consultation\"\u003eAdditional measures under consultation\u003c/h2\u003e\n\n\u003cp\u003eThe government is consulting on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOvernight curfews for under-18s\u003c/li\u003e\n\u003cli\u003eBreaks in infinite scrolling for under-18s\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says more detail is promised in July.\u003c/p\u003e\n\n\u003ch1 id=\"how-age-verification-would-work\"\u003eHow age verification would work\u003c/h1\u003e\n\n\u003cp\u003eA central point in the article is that the practical impact falls heavily on account creation.\u003c/p\u003e\n\n\u003ch2 id=\"grandfathering-for-many-adults\"\u003eGrandfathering for many adults\u003c/h2\u003e\n\n\u003cp\u003eAccording to the fact sheet cited in the article, an account may be treated as low risk if:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt has been open for more than 16 years\u003c/li\u003e\n\u003cli\u003eIt has a credit card attached\u003c/li\u003e\n\u003cli\u003eIt is linked to an email already age-verified elsewhere\u003c/li\u003e\n\u003cli\u003eThe user has already completed verification under the existing Online Safety Act\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis means many long-standing adult accounts may avoid a new verification step.\u003c/p\u003e\n\n\u003ch2 id=\"new-accounts-face-stronger-checks\"\u003eNew accounts face stronger checks\u003c/h2\u003e\n\n\u003cp\u003eThe article says that this carve-out does not help users creating accounts from scratch. If someone wants a fresh account, including a pseudonymous one, the fallback methods described are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFacial recognition age checks\u003c/li\u003e\n\u003cli\u003eID uploads\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article characterizes this as a quiet but significant shift: a policy marketed as child protection would, in practice, require adults to prove their age before opening new social media accounts.\u003c/p\u003e\n\n\u003ch1 id=\"relationship-to-existing-uk-online-safety-enforcement\"\u003eRelationship to existing UK online safety enforcement\u003c/h1\u003e\n\n\u003cp\u003eThe article places the proposal in the context of the Online Safety Act.\u003c/p\u003e\n\n\u003cp\u003eIt says that since July 25, 2025, the Act has required adult and other sensitive sites to run highly effective age checks for every user, typically using:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eID upload\u003c/li\u003e\n\u003cli\u003eFacial-age selfie\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eUnlike the proposed social media regime, those checks are described as having no grandfathering. The article also says enforcement has been aggressive. By February 2026, Ofcom had opened investigations into more than 90 platforms and issued six fines, and its remit had expanded to services including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReddit\u003c/li\u003e\n\u003cli\u003eX\u003c/li\u003e\n\u003cli\u003eDiscord\u003c/li\u003e\n\u003cli\u003eBluesky\u003c/li\u003e\n\u003cli\u003eAI services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that the new social media restrictions do not yet go as far as the adult-content rules, but that they normalize the same underlying verification infrastructure. It also notes that Ofcom has been asked to carry out a rapid study into how to verify whether someone is over 16.\u003c/p\u003e\n\n\u003ch1 id=\"the-vpn-loophole\"\u003eThe VPN loophole\u003c/h1\u003e\n\n\u003cp\u003eOne of the article’s main technical objections is that the age-gating regime is easy to bypass with a VPN.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the Online Safety Act targets sites rather than users, so connecting through a server outside the UK can sidestep the check. It cites reports that some VPN providers saw signup spikes of up to 1,800% when adult-site enforcement began.\u003c/p\u003e\n\n\u003cp\u003eThe article then argues that any social media age-gate would inherit the same weakness.\u003c/p\u003e\n\n\u003ch2 id=\"australia-as-an-example\"\u003eAustralia as an example\u003c/h2\u003e\n\n\u003cp\u003eThe article points to Australia’s experience as evidence of this problem, citing research that found more than 60% of children were still using social media months after that country’s ban took effect.\u003c/p\u003e\n\n\u003ch2 id=\"uk-political-debate-over-vpn-restrictions\"\u003eUK political debate over VPN restrictions\u003c/h2\u003e\n\n\u003cp\u003eThe article says the UK government has limited room to close the loophole because a blanket VPN ban has been ruled out. It cites statements from Baroness Lloyd in October 2025 saying there were no current plans to ban VPNs because of their legitimate uses.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, the article says children-specific VPN restrictions remain under discussion:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn February 2026, the government said its wellbeing consultation would examine options to age restrict or limit children’s VPN use.\u003c/li\u003e\n\u003cli\u003eIn January 2026, the House of Lords passed an amendment that would have required ministers to prohibit VPN providers from serving UK children.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that such a requirement would, in practice, force providers to age-check everyone in order to distinguish children from adults. It also notes that this amendment drew public petitions against it and was later rejected by the Commons during parliamentary ping-pong.\u003c/p\u003e\n\n\u003cp\u003eThe resulting law, after Royal Assent in April, instead gave ministers broad power to restrict children’s online access by regulation.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that, for now, nothing stops a determined adult or a determined 15-year-old from circumventing the system.\u003c/p\u003e\n\n\u003ch1 id=\"security-and-privacy-concerns\"\u003eSecurity and privacy concerns\u003c/h1\u003e\n\n\u003cp\u003eThe article says the core cybersecurity criticism is not opposition to protecting children, but rather that the chosen enforcement method introduces new risks while failing to provide robust controls.\u003c/p\u003e\n\n\u003ch2 id=\"research-on-age-verification-robustness\"\u003eResearch on age-verification robustness\u003c/h2\u003e\n\n\u003cp\u003eDr. Siamak Shahandashti, a senior lecturer in cyber security and privacy at the University of York, is cited as pointing to empirical work from Politecnico di Milano that tested age-verification methods used on adult sites.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the researchers found:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLow-to-medium robustness for nearly every method\u003c/li\u003e\n\u003cli\u003eCredit-card checks as the main exception\u003c/li\u003e\n\u003cli\u003eMost methods could be bypassed by motivated minors with accessible tools and know-how\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article quotes the study’s conclusion, via Shahandashti, that mandated age verification currently functions as “compliance theatre.” It adds that Shahandashti said checks tied to real physical ID could be made robust enough if clear standards were defined.\u003c/p\u003e\n\n\u003ch2 id=\"data-exposure-and-identity-risks\"\u003eData exposure and identity risks\u003c/h2\u003e\n\n\u003cp\u003eDr. Richard Gomer of the University of Southampton is cited as focusing on the second-order risks of age verification. The article says he warned that requiring users to submit passports or driving licences to platforms exposes them to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIdentity theft\u003c/li\u003e\n\u003cli\u003eBlackmail\u003c/li\u003e\n\u003cli\u003eBreach-related harms\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHe also warned that the regulation pushes the web further away from anonymous and open communication.\u003c/p\u003e\n\n\u003ch2 id=\"open-rights-group-concerns\"\u003eOpen Rights Group concerns\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Open Rights Group warned that over-16s would have to hand over identity documents or biometric data to unregulated age-verification companies. It points to Discord as a platform that had already suffered a major data leak after introducing age checks.\u003c/p\u003e\n\n\u003cp\u003eJames Baker of the Open Rights Group is cited as arguing that the measures address symptoms rather than causes, specifically the engagement-driven business models that reward harmful content. The article also says Baker had previously warned that the underlying legal powers were rushed through without enough political scrutiny.\u003c/p\u003e\n\n\u003ch1 id=\"platform-responses\"\u003ePlatform responses\u003c/h1\u003e\n\n\u003cp\u003eThe article notes that platforms themselves are not aligned with the policy.\u003c/p\u003e\n\n\u003cp\u003eMeta and YouTube are described as arguing that bans may push teenagers toward less-regulated spaces rather than making them safer. Meta is also said to have argued that age checks should happen on the device, so users are not required to hand ID to each service separately.\u003c/p\u003e\n\n\u003ch1 id=\"broader-policy-direction\"\u003eBroader policy direction\u003c/h1\u003e\n\n\u003cp\u003eThe article closes by placing the proposal within a wider UK trend toward age verification as a routine condition for online access.\u003c/p\u003e\n\n\u003cp\u003eIt notes that since January 2025 the government has been building:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA GOV.UK Wallet\u003c/li\u003e\n\u003cli\u003eA digital driving licence\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese are described as being pitched partly as tools to prove age online and in person using the facial-recognition features built into modern phones. The article stresses that this initiative predates the current announcement and is formally separate from it, but says that together they suggest a future in which proving age increasingly becomes a prerequisite for being online in the UK.\u003c/p\u003e\n\n\u003ch1 id=\"main-takeaways-from-the-article\"\u003eMain takeaways from the article\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe UK plans to ban under-16s from social media starting in spring 2027.\u003c/li\u003e\n\u003cli\u003eEnforcement for new users will likely rely on ID uploads or facial age scans.\u003c/li\u003e\n\u003cli\u003eMany older adult accounts may be exempt through grandfathering, but new adult accounts would still face age checks.\u003c/li\u003e\n\u003cli\u003eThe article says the controls are easily bypassed with VPNs, as seen in earlier UK enforcement and in Australia’s experience.\u003c/li\u003e\n\u003cli\u003eResearchers and rights groups cited in the article warn that the system creates substantial privacy, identity, and breach risks while offering limited robustness against determined minors.\u003c/li\u003e\n\u003cli\u003eThe proposal is presented as part of a broader movement toward normalized digital age verification in the UK.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The UK government plans to ban under-16s from social media, with regulations due before Christmas and the rules set to take effect in spring 2027.","To enforce the ban, new account creation will likely require users to prove they are over 16 through an ID upload or a facial age scan.","The rules are modeled on Australia’s social media age restrictions, but the UK says it will go further by also restricting features such as livestreaming and stranger contact across additional services including gaming platforms like Roblox.","The article states that the system can be bypassed with a VPN, and cites research showing that more than 60% of Australian children were still using social media months after Australia’s ban took effect.","Security and privacy experts quoted in the article warn that age-verification systems are weak against motivated minors and create risks of identity theft, blackmail, and data leaks when users must submit IDs or biometric data."],"insights":["Although the policy is framed as protecting children, the article says its practical effect is that adults creating new social media accounts in the UK will also have to prove their age, making fresh pseudonymous account creation much harder.","The article highlights a grandfathering effect: many long-standing adult accounts may avoid new checks through signals like account age, attached credit cards, or prior age verification, while new users face the strictest burden.","According to the article, the same VPN loophole that undermined UK adult-site age checks would also undermine social media age-gating, limiting enforcement against determined adults and minors.","The article notes that efforts to stop children from bypassing the rules with VPNs could effectively require VPN providers to age-check all UK users in order to distinguish children from adults.","The article frames the social media proposal as part of a broader UK shift toward age verification as a routine condition of online access, alongside the government’s GOV.UK Wallet and digital driving licence initiative."],"referencedReports":[{"title":"Age checks for online safety: what you need to know as a user","url":"https://www.ofcom.org.uk/online-safety/protecting-children/age-checks-for-online-safety--what-you-need-to-know-as-a-user","publisher":"ofcom","context":"The article cites this Ofcom guidance to explain that the Online Safety Act has required adult and other sensitive sites to use highly effective age checks since July 25, 2025.","category":"guide","primary":false},{"title":"Expert reaction to UK government announcing a ban on social media for under 16s","url":"https://www.sciencemediacentre.org/expert-reaction-to-uk-government-announcing-a-ban-on-social-media-for-under-16s-2/","publisher":"science-media-centre","context":"The article uses this Science Media Centre roundup to reference researchers' findings and expert commentary on the robustness of age-verification methods.","category":"research","primary":false}],"body":"\u003cp\u003eThe UK government plans to ban under-16s from social media, with regulations due before Christmas and enforcement beginning in spring 2027. To enforce the rule, platforms will likely require new users to prove they are over 16 through an ID upload or a facial age scan. The article says this effectively ends anonymous creation of new social media accounts in the UK, even though most long-standing adult accounts may be exempt.\u003c/p\u003e\n\n\u003cp\u003eThe proposal covers major social platforms including Instagram, YouTube, TikTok, Snapchat, Facebook, and X, while excluding messaging services such as WhatsApp and Signal and also excluding YouTube Kids. The UK says it will go further than Australia’s model by also restricting high-risk features like livestreaming and stranger contact on a wider set of services, including gaming platforms such as Roblox. The article also notes separate planned restrictions for AI romantic companion chatbots and ongoing consultation on overnight curfews and breaks in infinite scrolling for under-18s.\u003c/p\u003e\n\n\u003cp\u003eSecurity and privacy experts cited in the article warn that the age-checking systems are easy to bypass with VPNs and can expose users’ identity documents and biometric data to breaches. The article points to research that found low-to-medium robustness for most age-verification methods and notes that more than 60% of Australian children were still using social media months after that country’s ban took effect. It also highlights concern from academics, rights groups, and platforms that the measures may push users toward less-regulated spaces while normalizing routine online age verification.\u003c/p\u003e\n"}];

  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
