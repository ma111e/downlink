<script>
window.__DL_ARTICLES = [{"n":2,"title":"Google patches new Chrome zero-day flaw exploited in the wild","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/google-patches-fifth-chrome-zero-day-bug-exploited-in-attacks-this-year/","time":"06:56","priority":"MUST READ","score":96,"tldr":"Google released emergency Chrome updates for Windows, macOS, and Linux to fix CVE-2026-11645, a high-severity V8 zero-day already exploited in the wild. Users should update Chrome immediately to the patched 149.0.7827.102/103 versions.","briefOverview":"\u003cp\u003eGoogle released emergency Chrome updates to patch CVE-2026-11645, a zero-day vulnerability that has been exploited in the wild. The fix was issued for the Stable Desktop channel on Windows, Mac, and Linux. The patched versions are 149.0.7827.102 for Windows and Linux and 149.0.7827.103 for Mac.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-11645 is described as a high-severity out-of-bounds read and write weakness in Chrome’s V8 JavaScript engine. Remote attackers can exploit it through crafted HTML pages to execute arbitrary code inside the browser’s sandbox. Successful exploitation can also cause heap corruption, expose sensitive information, trigger crashes, or help bypass protections such as ASLR.\u003c/p\u003e\n\n\u003cp\u003eGoogle said access to bug details and links may remain restricted until most users are updated. The company has not shared additional details about the exploitation incidents. This is the fifth Chrome zero-day patched by Google since the start of the year, following four other exploited Chrome flaws fixed earlier in 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle released emergency updates for Chrome after confirming that CVE-2026-11645 has been exploited in the wild. The vulnerability was patched in the Stable Desktop channel for Windows, Mac, and Linux. The updated versions are 149.0.7827.102 for Windows and Linux and 149.0.7827.103 for Mac.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the flaw was reported to Google by an anonymous security researcher two weeks before the patch release. Google warned that the update may take days or weeks to reach all users, although BleepingComputer found it available immediately when checking for updates. Users who do not update manually can rely on Chrome to automatically check for and install updates during the next browser launch.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-11645 is a high-severity out-of-bounds read and write vulnerability in the Chrome V8 JavaScript engine. The article says remote attackers can exploit the issue through crafted HTML pages to execute arbitrary code inside Chrome’s sandbox. Successful exploitation can allow access to data beyond the memory buffer through heap corruption, expose sensitive information, or trigger a crash.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the flaw could be used to bypass protection mechanisms such as ASLR. This could make it easier to achieve code execution through another weakness. Google has not provided further details about the observed exploitation activity.\u003c/p\u003e\n\n\u003cp\u003eGoogle said bug details and links may remain restricted until a majority of users have received the fix. The company also said restrictions may remain in place if the bug exists in a third-party library that other projects depend on but have not yet fixed. Since the start of the year, Google has patched four other Chrome zero-days exploited in attacks, making CVE-2026-11645 the fifth such flaw addressed in 2026.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle released emergency updates for Chrome to patch CVE-2026-11645, a zero-day vulnerability that the company says has been exploited in the wild. The issue was fixed for users in the Stable Desktop channel across Windows, Mac, and Linux systems. The patched versions are Chrome 149.0.7827.102 for Windows and Linux and Chrome 149.0.7827.103 for Mac.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was reported to Google by an anonymous security researcher two weeks before the update was released. Google said in its security advisory that it is aware an exploit for CVE-2026-11645 exists in the wild. The company has not shared further details about the exploitation incidents.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-update-availability\"\u003eAffected products and update availability\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the affected product as Google Chrome in the Stable Desktop channel. The fixed versions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows: 149.0.7827.102\u003c/li\u003e\n\u003cli\u003eMac: 149.0.7827.103\u003c/li\u003e\n\u003cli\u003eLinux: 149.0.7827.102\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGoogle said the security update could take days or weeks to reach all Chrome users. However, BleepingComputer reported that the update was available immediately when it checked for updates. The article also states that users who prefer not to update manually can rely on Chrome to automatically check for updates and install them during the next launch.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-11645 is described as a high-severity out-of-bounds read and write weakness in the Chrome V8 JavaScript engine. According to the article, remote attackers can exploit the flaw using crafted HTML pages. Exploitation can allow arbitrary code execution inside the web browser’s sandbox.\u003c/p\u003e\n\n\u003cp\u003eThe article says successful exploitation enables attackers to access data beyond the memory buffer through heap corruption. This could expose sensitive information or trigger a crash. It also notes that the vulnerability could be used to bypass protection mechanisms such as ASLR, making it easier to achieve code execution through another weakness.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-disclosure-status\"\u003eExploitation and disclosure status\u003c/h2\u003e\n\n\u003cp\u003eGoogle confirmed that an exploit for CVE-2026-11645 exists in the wild. The article does not identify any threat actor, target, campaign, or geography connected to the exploitation. It also does not provide details about how the vulnerability has been used in attacks beyond Google’s acknowledgement that exploitation is occurring.\u003c/p\u003e\n\n\u003cp\u003eGoogle said access to bug details and links may remain restricted until a majority of users are updated with a fix. The company also said it may retain restrictions if the bug exists in a third-party library that other projects depend on but have not yet fixed. This means detailed technical information about the flaw may remain limited while the patch continues to roll out.\u003c/p\u003e\n\n\u003ch2 id=\"significance-in-the-2026-chrome-zero-day-pattern\"\u003eSignificance in the 2026 Chrome zero-day pattern\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-11645 is the fifth Chrome zero-day patched by Google since the start of the year. The earlier exploited Chrome zero-days listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-2441, an iterator invalidation bug in CSSFontFeatureValuesMap, which Google addressed in mid-February.\u003c/li\u003e\n\u003cli\u003eCVE-2026-3909, an out-of-bounds write weakness in the Skia 2D graphics library, patched in March.\u003c/li\u003e\n\u003cli\u003eCVE-2026-3910, an inappropriate implementation vulnerability in the V8 JavaScript and WebAssembly engine, patched in March.\u003c/li\u003e\n\u003cli\u003eCVE-2026-5281, a use-after-free weakness in Dawn, the cross-platform implementation of the WebGPU standard used by the Chromium project, patched in April.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that Google fixed eight zero-days exploited in the wild last year. Many of those were reported by Google’s Threat Analysis Group, which the article describes as known for identifying and tracking zero-day exploits used in spyware attacks.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-user-action-described-in-the-article\"\u003eResponse and user action described in the article\u003c/h2\u003e\n\n\u003cp\u003eGoogle’s response was to release emergency updates for Chrome across supported desktop platforms in the Stable Desktop channel. The article indicates that users can update manually and that Chrome will also automatically check for updates and install them during the next launch. No separate workaround is described in the article.\u003c/p\u003e\n\n\u003cp\u003eThe most immediate action described is applying the patched Chrome version. The article emphasizes that although Google said update distribution may take days or weeks, the update was available immediately during BleepingComputer’s check. Users on Windows, Mac, and Linux are the affected parties referenced in the update rollout.\u003c/p\u003e\n","keyPoints":["Google released emergency Chrome updates to patch CVE-2026-11645, a zero-day vulnerability that the company says has been exploited in the wild.","The patched Chrome versions are 149.0.7827.102 for Windows and Linux and 149.0.7827.103 for Mac in the Stable Desktop channel.","CVE-2026-11645 is a high-severity out-of-bounds read and write weakness in the Chrome V8 JavaScript engine that can be exploited through crafted HTML pages.","Successful exploitation can allow remote attackers to execute arbitrary code inside Chrome's sandbox, access data beyond the memory buffer through heap corruption, expose sensitive information, or trigger a crash.","Google said access to bug details and links may remain restricted until a majority of users have received the fix."],"insights":["This is the fifth Chrome zero-day patched by Google since the start of the year, indicating a sustained pattern of in-the-wild exploitation against Chrome in 2026.","Although Google said the update may take days or weeks to reach all users, BleepingComputer found it was available immediately through a manual update check, making manual updating a faster mitigation path.","The vulnerability can help bypass protections such as ASLR, meaning it may be useful as part of a broader exploit chain rather than only as a standalone browser crash or memory disclosure issue.","Google is withholding technical details until most users are updated, so defenders have limited public information about the exploitation activity while patch deployment is still underway."],"referencedReports":[{"title":"Stable Channel Update for Desktop","url":"https://chromereleases.googleblog.com/2026/06/stable-channel-update-for-desktop_0153744567.html","publisher":"Google","context":"The article cites Google's Monday security advisory announcing that an exploit for CVE-2026-11645 exists in the wild and that patched Chrome versions were released.","category":"","primary":false}],"body":"\u003cp\u003eGoogle released emergency Chrome updates to patch CVE-2026-11645, a zero-day vulnerability that has been exploited in the wild. The fix was issued for the Stable Desktop channel on Windows, Mac, and Linux. The patched versions are 149.0.7827.102 for Windows and Linux and 149.0.7827.103 for Mac.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-11645 is described as a high-severity out-of-bounds read and write weakness in Chrome’s V8 JavaScript engine. Remote attackers can exploit it through crafted HTML pages to execute arbitrary code inside the browser’s sandbox. Successful exploitation can also cause heap corruption, expose sensitive information, trigger crashes, or help bypass protections such as ASLR.\u003c/p\u003e\n\n\u003cp\u003eGoogle said access to bug details and links may remain restricted until most users are updated. The company has not shared additional details about the exploitation incidents. This is the fifth Chrome zero-day patched by Google since the start of the year, following four other exploited Chrome flaws fixed earlier in 2026.\u003c/p\u003e\n"},{"n":1,"title":"CISA gives feds 3 days to patch Check Point VPN bug exploited as zero-day","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-orders-feds-to-patch-check-point-flaw-exploited-by-ransomware-gangs/","time":"08:18","priority":"MUST READ","score":95,"tldr":"CISA ordered U.S. federal agencies to patch or mitigate a critical Check Point VPN flaw by June 11 after it was exploited as a zero-day in attacks linked to Qilin ransomware affiliates. The bug allows unauthenticated attackers to bypass authentication on certain legacy IKEv1 Remote Access VPN, Mobile Access, and Spark firewall configurations.","briefOverview":"\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to secure affected Check Point Remote Access VPN and Mobile Access deployments against CVE-2026-50751 by June 11. The vulnerability has been exploited as a zero-day in attacks that Check Point says began on May 7 and surged over the weekend. Check Point linked at least one incident involving post-compromise activity to a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50751 allows unauthenticated remote attackers to bypass authentication and establish a remote access VPN connection on targeted Check Point Mobile Access/SSL VPNs, Remote Access VPNs, or Spark firewalls. The issue affects only deployments using the deprecated IKEv1 key exchange protocol, gateways that do not require machine certificates, and environments accepting legacy Remote Access clients. Check Point released security updates and recommended mitigations for organizations that cannot immediately patch.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-50751 to its Known Exploited Vulnerabilities Catalog and said this type of vulnerability is a frequent attack vector for malicious cyber actors. Although the binding directive applies only to federal agencies, CISA urged all organizations to patch and secure their networks as soon as possible. The article also notes that CISA previously flagged another Check Point Quantum Security Gateways vulnerability as actively exploited by ransomware gangs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has ordered U.S. government agencies to secure Check Point Remote Access VPN and Mobile Access deployments against CVE-2026-50751. The flaw is described as a critical vulnerability exploited in zero-day attacks by Qilin ransomware affiliates. Federal Civilian Executive Branch agencies must apply mitigations, follow applicable guidance, or discontinue use if mitigations are unavailable by June 11.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50751 allows unauthenticated remote attackers to bypass authentication and establish a remote access VPN connection. The affected targets include Check Point Mobile Access/SSL VPNs, Remote Access VPNs, and Spark firewalls. The vulnerability applies only to instances configured with the deprecated IKEv1 key exchange protocol, security gateways that do not require a machine certificate, and deployments accepting legacy Remote Access clients.\u003c/p\u003e\n\n\u003cp\u003eCheck Point released security updates for CVE-2026-50751 on Monday and said exploitation began on May 7 before surging over the weekend. The company reported that observed exploitation has been limited to a few dozen targeted organizations globally. It also said one confirmed case involved post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eFor organizations that cannot patch immediately, Check Point recommended several mitigation measures. These include removing support for the legacy remote access client, configuring Remote Access VPN Authentication global properties to IKEv2 only, enabling IPS and downloading signatures, and making Machine Certificate Authentication mandatory. Check Point strongly encouraged customers using IKEv1 to apply the available security updates immediately.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-50751 to its Known Exploited Vulnerabilities Catalog under Binding Operational Directive 22-01. While the directive applies only to U.S. federal agencies, CISA urged all security teams, including those in the private sector, to deploy patches and secure their networks as soon as possible. The article also notes that CISA previously tagged CVE-2024-24919 in Check Point Quantum Security Gateways as actively exploited by ransomware gangs, with an Orange Cyberdefense CERT report linking it to NailaoLocker ransomware attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered U.S. government agencies to secure their Check Point Remote Access VPN and Mobile Access deployments against CVE-2026-50751. The vulnerability is described as critical and has been exploited in zero-day attacks by Qilin ransomware affiliates. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and set a June 11 deadline for Federal Civilian Executive Branch agencies to remediate it.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Check Point released security updates for CVE-2026-50751 on Monday. Check Point said attacks exploiting the flaw began on May 7 and surged over the weekend. The company reported that exploitation has so far been limited to a few dozen targeted organizations globally.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-50751 can be exploited by unauthenticated remote attackers to bypass authentication. Successful exploitation allows an attacker to establish a remote access VPN connection on targeted Check Point systems.\u003c/p\u003e\n\n\u003cp\u003eThe affected products and deployments named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck Point Mobile Access/SSL VPNs\u003c/li\u003e\n\u003cli\u003eCheck Point Remote Access VPNs\u003c/li\u003e\n\u003cli\u003eCheck Point Spark firewalls\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe vulnerability affects only specific configurations. According to the article, affected instances are those using the deprecated IKEv1 key exchange protocol, with security gateways that do not require a machine certificate for connections, and that accept legacy Remote Access clients.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-threat-actor-link\"\u003eExploitation and Threat Actor Link\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said observed exploitation began on May 7 and increased over the weekend before the article’s publication. The company stated that the attacks have led to breaches at “a few dozen” organizations worldwide. At least one case included confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Qilin as a Ransomware-as-a-Service operation. It also states that Qilin has claimed over 400 victims on its dark web leak site since surfacing in August 2022.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-response\"\u003eCISA Response\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2026-50751 to its Known Exploited Vulnerabilities Catalog. Under Binding Operational Directive 22-01, Federal Civilian Executive Branch agencies were ordered to secure affected devices by June 11.\u003c/p\u003e\n\n\u003cp\u003eCISA stated that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency instructed agencies to apply mitigations per vendor instructions, follow applicable BOD 22-01 guidance for cloud services, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003cp\u003eAlthough the directive applies only to U.S. federal agencies, CISA urged all security teams to act. The article says this recommendation includes organizations in the private sector, which were urged to deploy patches for CVE-2026-50751 and secure their networks as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-and-mitigations\"\u003eVendor Response and Mitigations\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released security updates to address CVE-2026-50751. The company strongly encouraged customers using the IKEv1 key exchange protocol to apply the available security updates immediately.\u003c/p\u003e\n\n\u003cp\u003eFor organizations that cannot patch immediately, Check Point shared mitigation measures. These measures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemoving support for the legacy remote access client.\u003c/li\u003e\n\u003cli\u003eConfiguring global properties for Remote Access VPN Authentication to IKEv2 only.\u003c/li\u003e\n\u003cli\u003eEnabling IPS and downloading the signatures.\u003c/li\u003e\n\u003cli\u003eConfiguring Machine Certificate Authentication as mandatory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese mitigations are aimed at reducing exposure in the specific legacy configuration conditions described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"related-check-point-exploitation-history\"\u003eRelated Check Point Exploitation History\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes a prior Check Point-related vulnerability added to CISA’s exploited vulnerability tracking. Two years earlier, CISA tagged CVE-2024-24919 in Check Point Quantum Security Gateways as actively exploited by ransomware gangs.\u003c/p\u003e\n\n\u003cp\u003eThat earlier activity was tied to an Orange Cyberdefense CERT report linking the vulnerability to NailaoLocker ransomware attacks. The article cites this as a separate prior case involving exploitation of Check Point gateway technology by ransomware-related actors.\u003c/p\u003e\n","keyPoints":["CISA ordered U.S. Federal Civilian Executive Branch agencies to secure affected Check Point devices against CVE-2026-50751 by June 11.","CVE-2026-50751 allows unauthenticated remote attackers to bypass authentication and establish a remote access VPN connection on targeted Check Point Mobile Access/SSL VPNs, Remote Access VPNs, or Spark firewalls.","The vulnerability affects only deployments using the deprecated IKEv1 key exchange protocol, security gateways that do not require a machine certificate, and legacy Remote Access clients.","Check Point said exploitation began on May 7, surged over the weekend, and has been observed against a few dozen targeted organizations globally.","Check Point linked at least one post-compromise incident involving CVE-2026-50751 to a Qilin ransomware affiliate."],"insights":["The exposure is configuration-dependent, so organizations can reduce risk by disabling legacy Remote Access client support, enforcing IKEv2 only, and requiring Machine Certificate Authentication if they cannot immediately patch.","CISA gave federal agencies only three days to remediate, indicating the agency considers the actively exploited Check Point flaw an urgent risk despite Check Point reporting only a few dozen observed victims globally.","The article highlights legacy VPN configurations as a recurring ransomware entry point by noting that CISA previously flagged another Check Point gateway vulnerability exploited by ransomware gangs.","Check Point’s mitigations include enabling IPS and downloading signatures, showing that detection and prevention controls are part of the recommended response alongside patching and configuration changes."],"referencedReports":[{"title":"CVE-2026-50751","url":"https://support.checkpoint.com/results/sk/sk185033","publisher":"Check Point","context":"The article links to Check Point’s advisory page for CVE-2026-50751 when describing the authentication-bypass flaw affecting certain Remote Access VPN, Mobile Access, and Spark firewall deployments.","category":"","primary":false},{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/08/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites CISA’s alert announcing that CVE-2026-50751 was added to the Known Exploited Vulnerabilities Catalog.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-50751","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-50751","publisher":"CISA","context":"The article links to CISA’s KEV Catalog entry for CVE-2026-50751 as the basis for the federal remediation deadline.","category":"","primary":false},{"title":"Binding Operational Directive 22-01","url":"https://www.cisa.gov/binding-operational-directive-22-01","publisher":"CISA","context":"The article references BOD 22-01 as the authority requiring Federal Civilian Executive Branch agencies to remediate known exploited vulnerabilities.","category":"","primary":false},{"title":"Meet NailaoLocker, a ransomware distributed in Europe by ShadowPad and PlugX backdoors","url":"https://www.orangecyberdefense.com/global/blog/cert-news/meet-nailaolocker-a-ransomware-distributed-in-europe-by-shadowpad-and-plugx-backdoors","publisher":"Orange Cyberdefense CERT","context":"The article cites this Orange Cyberdefense CERT report for its prior linkage of a Check Point Quantum Security Gateways flaw to NailaoLocker ransomware attacks.","category":"","primary":false}],"body":"\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to secure affected Check Point Remote Access VPN and Mobile Access deployments against CVE-2026-50751 by June 11. The vulnerability has been exploited as a zero-day in attacks that Check Point says began on May 7 and surged over the weekend. Check Point linked at least one incident involving post-compromise activity to a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50751 allows unauthenticated remote attackers to bypass authentication and establish a remote access VPN connection on targeted Check Point Mobile Access/SSL VPNs, Remote Access VPNs, or Spark firewalls. The issue affects only deployments using the deprecated IKEv1 key exchange protocol, gateways that do not require machine certificates, and environments accepting legacy Remote Access clients. Check Point released security updates and recommended mitigations for organizations that cannot immediately patch.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-50751 to its Known Exploited Vulnerabilities Catalog and said this type of vulnerability is a frequent attack vector for malicious cyber actors. Although the binding directive applies only to federal agencies, CISA urged all organizations to patch and secure their networks as soon as possible. The article also notes that CISA previously flagged another Check Point Quantum Security Gateways vulnerability as actively exploited by ransomware gangs.\u003c/p\u003e\n"},{"n":3,"title":"LiteLLM Flaw CVE-2026-42271 Exploited in the Wild, Chains to Unauthenticated RCE","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/litellm-flaw-cve-2026-42271-exploited.html","time":"06:26","priority":"MUST READ","score":94,"tldr":"CISA says a LiteLLM command injection flaw, CVE-2026-42271, is being actively exploited and can let authenticated users run commands on vulnerable hosts. When chained with a Starlette host-header bypass, it can become unauthenticated remote code execution, so users should update LiteLLM and Starlette immediately.","briefOverview":"\u003cp\u003eCISA added CVE-2026-42271, a high-severity BerriAI LiteLLM command injection flaw, to its Known Exploited Vulnerabilities catalog after evidence of active exploitation. The vulnerability has a CVSS score of 8.7 and can allow any authenticated user to run arbitrary commands on the host. It affects LiteLLM Python package versions 1.74.2 through versions earlier than 1.83.7.\u003c/p\u003e\n\n\u003cp\u003eThe flaw involves two MCP server preview endpoints, POST /mcp-rest/test/connection and POST /mcp-rest/test/tools/list, which accepted full server configuration data including command, args, and env fields. When called with a stdio configuration, the endpoints attempted to connect and spawned the supplied command as a subprocess on the proxy host. BerriAI fixed the issue in version 1.83.7 by requiring the PROXY_ADMIN role for both test endpoints.\u003c/p\u003e\n\n\u003cp\u003eHorizon3.ai said CVE-2026-42271 can be chained with CVE-2026-48710, a Starlette host header validation bypass, to achieve unauthenticated remote code execution against vulnerable LiteLLM deployments. The article says there is no information about the threat actors, targets, scale, successful compromises, or whether the observed exploitation uses the chain. Users are advised to update LiteLLM and Starlette or apply mitigations such as blocking the affected endpoints, restricting network access, rotating credentials, and reviewing logs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added CVE-2026-42271 to its Known Exploited Vulnerabilities catalog, citing evidence of active exploitation. The flaw affects BerriAI LiteLLM and is described as a high-severity command injection vulnerability with a CVSS score of 8.7. It can allow any authenticated user to execute arbitrary commands on a vulnerable host.\u003c/p\u003e\n\n\u003cp\u003eThe affected LiteLLM Python package versions are 1.74.2 through versions earlier than 1.83.7. According to BerriAI, two endpoints used to preview an MCP server before saving it accepted a full server configuration in the request body. Those endpoints are POST /mcp-rest/test/connection and POST /mcp-rest/test/tools/list.\u003c/p\u003e\n\n\u003cp\u003eThe dangerous fields accepted by the endpoints included command, args, and env fields used by the stdio transport. When the endpoints were called with a stdio configuration, they attempted to connect and spawned the supplied command as a subprocess on the proxy host. The subprocess ran with the privileges of the proxy process.\u003c/p\u003e\n\n\u003cp\u003eBerriAI said the endpoints were protected only by a valid proxy API key. As a result, any authenticated user, including privileged internal-user keys, could execute arbitrary commands on a susceptible system. In LiteLLM version 1.83.7, the two test endpoints were changed to require the PROXY_ADMIN role, aligning them with the save endpoint.\u003c/p\u003e\n\n\u003cp\u003eHorizon3.ai said it chained CVE-2026-42271 with CVE-2026-48710, a Starlette “BadHost” host header validation bypass, to bypass authentication and achieve remote code execution against vulnerable LiteLLM deployments. Horizon3.ai said this applies to LiteLLM deployments whose dependency tree includes Starlette versions 1.0.0 or earlier. It assessed the chained vulnerability as having a combined CVSS score of 10.0.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there is currently no information about how CVE-2026-42271 is being exploited, who is behind the activity, who is being targeted, how widespread the attacks are, or whether any instances have been compromised. It is also unclear whether observed exploitation is using the Starlette chain. Users are advised to update LiteLLM to version 1.83.7 or later and Starlette to version 1.0.1 or later, or use mitigations including endpoint blocking, network restriction, credential rotation, and log review.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2026-42271, a high-severity vulnerability affecting BerriAI LiteLLM, to its Known Exploited Vulnerabilities catalog after evidence of active exploitation. The flaw is a command injection issue with a CVSS score of 8.7. According to the article, it can allow any authenticated user to run arbitrary commands on the host.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects the LiteLLM Python package in versions greater than or equal to 1.74.2 and less than 1.83.7. BerriAI addressed the issue in version 1.83.7. Users are advised to update LiteLLM to version 1.83.7 or later.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-of-cve-2026-42271\"\u003eTechnical Details of CVE-2026-42271\u003c/h2\u003e\n\n\u003cp\u003eThe flaw is tied to two LiteLLM endpoints used to preview an MCP server before saving it:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePOST /mcp-rest/test/connection\u003c/li\u003e\n\u003cli\u003ePOST /mcp-rest/test/tools/list\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBerriAI said these endpoints accepted a full server configuration in the request body. That configuration included the command, args, and env fields used by the stdio transport.\u003c/p\u003e\n\n\u003cp\u003eWhen called with a stdio configuration, the endpoints attempted to connect and spawned the supplied command as a subprocess on the proxy host. The command ran with the privileges of the proxy process. The article says the endpoints were secured only by requiring a valid proxy API key.\u003c/p\u003e\n\n\u003cp\u003eBecause of that authorization model, any authenticated user could execute arbitrary commands on a susceptible system. The article specifically notes that this included privileged internal-user keys.\u003c/p\u003e\n\n\u003ch2 id=\"patch-and-authorization-change\"\u003ePatch and Authorization Change\u003c/h2\u003e\n\n\u003cp\u003eBerriAI released patches in LiteLLM version 1.83.7. As part of the fix, both MCP test endpoints now require the PROXY_ADMIN role. The article says this makes the test endpoints consistent with the save endpoint.\u003c/p\u003e\n\n\u003cp\u003eThis change narrows access to the affected functionality. The article does not state that the endpoints were removed; it states that their required role was changed.\u003c/p\u003e\n\n\u003ch2 id=\"chained-unauthenticated-remote-code-execution\"\u003eChained Unauthenticated Remote Code Execution\u003c/h2\u003e\n\n\u003cp\u003eHorizon3.ai said it chained CVE-2026-42271 with CVE-2026-48710 to achieve unauthenticated remote code execution against vulnerable LiteLLM deployments. CVE-2026-48710 is described as a “BadHost” host header validation bypass vulnerability affecting Starlette, a lightweight ASGI framework.\u003c/p\u003e\n\n\u003cp\u003eAccording to Horizon3.ai, CVE-2026-48710 can be used to bypass the authentication mechanism entirely in LiteLLM deployments whose dependency tree includes Starlette versions 1.0.0 or earlier. Horizon3.ai said this transforms the LiteLLM vulnerability into unauthenticated remote code execution with no credentials required.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Horizon3.ai assigned the chained vulnerability a combined CVSS score of 10.0, making it critical in nature.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impact\"\u003ePotential Impact\u003c/h2\u003e\n\n\u003cp\u003eSuccessful exploitation of the chained vulnerabilities could allow attackers to run arbitrary commands on the LiteLLM host. The article also says attackers could access model provider credentials, siphon API keys and secrets stored by the proxy, move laterally into connected AI infrastructure, and compromise downstream systems integrated with the gateway.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide details on confirmed compromises. It also does not state whether the observed in-the-wild exploitation is using the Starlette chain.\u003c/p\u003e\n\n\u003ch2 id=\"known-unknowns\"\u003eKnown Unknowns\u003c/h2\u003e\n\n\u003cp\u003eThe article explicitly says there is currently no information on several aspects of the active exploitation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow CVE-2026-42271 is being exploited.\u003c/li\u003e\n\u003cli\u003eThe identity of the threat actor or actors behind the activity.\u003c/li\u003e\n\u003cli\u003eWho is being targeted.\u003c/li\u003e\n\u003cli\u003eHow widespread the attacks are.\u003c/li\u003e\n\u003cli\u003eWhether the activity has successfully compromised any instances.\u003c/li\u003e\n\u003cli\u003eWhether observed attacks are leveraging the CVE-2026-42271 and CVE-2026-48710 exploit chain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article advises users to update LiteLLM to version 1.83.7 or later. It also advises updating Starlette to version 1.0.1 or later.\u003c/p\u003e\n\n\u003cp\u003eIf immediate patching is not possible, the article recommends the following mitigations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlock POST /mcp-rest/test/connection and POST /mcp-rest/test/tools/list at the reverse proxy or API gateway.\u003c/li\u003e\n\u003cli\u003eRestrict network access to trusted segments.\u003c/li\u003e\n\u003cli\u003eRotate credentials stored by the proxy.\u003c/li\u003e\n\u003cli\u003eReview logs for unusual Host header activity and subprocess execution events.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-litellm-exploitation-context\"\u003eRelated LiteLLM Exploitation Context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that this development comes a little over a month after another LiteLLM vulnerability came under active exploitation. That earlier issue was CVE-2026-42208, a critical SQL injection flaw with a CVSS score of 9.3. According to the article, CVE-2026-42208 was exploited within 36 hours of becoming public knowledge.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2026-42271, a high-severity command injection flaw in BerriAI LiteLLM, to its Known Exploited Vulnerabilities catalog due to evidence of active exploitation.","CVE-2026-42271 affects LiteLLM Python package versions 1.74.2 through versions earlier than 1.83.7 and could allow any authenticated user to execute arbitrary commands on the host.","BerriAI fixed the issue in LiteLLM version 1.83.7 by requiring the PROXY_ADMIN role for the two MCP server preview test endpoints.","Horizon3.ai said CVE-2026-42271 can be chained with CVE-2026-48710, a Starlette host header validation bypass, to achieve unauthenticated remote code execution against vulnerable LiteLLM deployments.","Users are advised to update LiteLLM to version 1.83.7 or later and Starlette to version 1.0.1 or later, or apply mitigations such as blocking the affected endpoints and rotating proxy-stored credentials."],"insights":["The affected LiteLLM endpoints spawned user-supplied stdio transport commands during MCP server preview testing, meaning a feature intended for pre-save validation became a direct path to host-level command execution.","The LiteLLM patch did not remove the MCP test functionality but tightened authorization by requiring the PROXY_ADMIN role, indicating that environments with broadly distributed proxy API keys were especially exposed before version 1.83.7.","The Starlette host header bypass materially changes the risk profile of CVE-2026-42271 because it can turn an authenticated command injection issue into unauthenticated remote code execution in affected LiteLLM deployments.","The article notes that defenders should rotate credentials stored by the proxy, highlighting that successful exploitation could expose model provider credentials, API keys, and secrets beyond the LiteLLM host itself.","The public reporting does not confirm whether observed in-the-wild exploitation uses the Starlette chain, so defenders need to treat both direct authenticated abuse and unauthenticated chained exploitation as relevant investigation paths."],"referencedReports":[{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/08/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites CISA's alert adding the LiteLLM flaw to the Known Exploited Vulnerabilities catalog due to active exploitation.","category":"","primary":false},{"title":"BerriAI LiteLLM Security Advisory GHSA-v4p8-mg3p-g94g","url":"https://github.com/BerriAI/litellm/security/advisories/GHSA-v4p8-mg3p-g94g","publisher":"BerriAI","context":"The article quotes BerriAI's advisory describing how two LiteLLM MCP preview endpoints accepted command, args, and env fields that could spawn subprocesses.","category":"","primary":false},{"title":"CVE-2026-42271 Chained with CVE-2026-48710","url":"https://horizon3.ai/attack-research/vulnerabilities/cve-2026-42271-chained-with-cve-2026-48710/","publisher":"Horizon3.ai","context":"The article references Horizon3.ai's technical analysis explaining how CVE-2026-42271 can be chained with CVE-2026-48710 to achieve unauthenticated remote code execution.","category":"","primary":false},{"title":"Starlette Security Advisory GHSA-86qp-5c8j-p5mr","url":"https://github.com/Kludex/starlette/security/advisories/GHSA-86qp-5c8j-p5mr","publisher":"Starlette","context":"The article links to the Starlette security advisory for the host header validation bypass vulnerability tracked as CVE-2026-48710.","category":"","primary":false},{"title":"Disclosing the BadHost Vulnerability in Starlette","url":"https://ostif.org/disclosing-the-badhost-vulnerability-in-starlette/","publisher":"OSTIF","context":"The article references OSTIF's BadHost disclosure while describing the Starlette host header validation bypass vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eCISA added CVE-2026-42271, a high-severity BerriAI LiteLLM command injection flaw, to its Known Exploited Vulnerabilities catalog after evidence of active exploitation. The vulnerability has a CVSS score of 8.7 and can allow any authenticated user to run arbitrary commands on the host. It affects LiteLLM Python package versions 1.74.2 through versions earlier than 1.83.7.\u003c/p\u003e\n\n\u003cp\u003eThe flaw involves two MCP server preview endpoints, POST /mcp-rest/test/connection and POST /mcp-rest/test/tools/list, which accepted full server configuration data including command, args, and env fields. When called with a stdio configuration, the endpoints attempted to connect and spawned the supplied command as a subprocess on the proxy host. BerriAI fixed the issue in version 1.83.7 by requiring the PROXY_ADMIN role for both test endpoints.\u003c/p\u003e\n\n\u003cp\u003eHorizon3.ai said CVE-2026-42271 can be chained with CVE-2026-48710, a Starlette host header validation bypass, to achieve unauthenticated remote code execution against vulnerable LiteLLM deployments. The article says there is no information about the threat actors, targets, scale, successful compromises, or whether the observed exploitation uses the chain. Users are advised to update LiteLLM and Starlette or apply mitigations such as blocking the affected endpoints, restricting network access, rotating credentials, and reviewing logs.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

    <nav className="swipe-nav" style={{

    }}>

        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>

        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
