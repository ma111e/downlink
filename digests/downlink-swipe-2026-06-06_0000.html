<script>
window.__DL_ARTICLES = [{"n":4,"title":"Cisco Catalyst SD-WAN Manager CVE-2026-20245 Flaw Actively Exploited – No Patch Available","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-catalyst-sd-wan-manager-cve-2026.html","time":"04:19","priority":"MUST READ","score":96,"tldr":"Cisco says CVE-2026-20245 in Catalyst SD-WAN Manager is being actively exploited to let authenticated netadmin users execute commands as root, and no patch or mitigation is currently available. Customers should ensure fixes for related auth-bypass flaws are applied and check logs for indicators of compromise, especially on internet-exposed systems.","briefOverview":"\u003cp\u003eCisco warned that a high-severity flaw in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, is being actively exploited. The vulnerability has a CVSS score of 7.8 and affects on-premises, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government deployments. Cisco said there are currently no patches or mitigations available for the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in the CLI of Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage, and stems from insufficient validation of user-supplied input. An authenticated local attacker with netadmin privileges could upload a crafted file to execute arbitrary commands as root. Cisco said exploitation requires valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eCisco reported limited cases where exploitation of CVE-2026-20245 resulted in configuration changes being pushed to edge devices. The company warned that internet-exposed systems are at heightened risk of compromise and advised customers to check /var/log/scripts.log for indicators of compromise. Customers are also advised to upgrade SD-WAN software to ensure fixes for CVE-2026-20182 released on May 14, 2026, have been applied.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco disclosed that CVE-2026-20245, a high-severity vulnerability in Cisco Catalyst SD-WAN Manager, is being actively exploited. The flaw carries a CVSS score of 7.8 and affects multiple deployment types, including on-premises deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco said no patches or mitigations are currently available for CVE-2026-20245.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects the CLI of Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage. Cisco said the issue could allow an authenticated local attacker to execute arbitrary commands as root by supplying a crafted file to an affected system. The company attributed the flaw to insufficient validation of user-supplied input, enabling command injection and privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eCisco stated that exploitation requires the attacker to have netadmin privileges on the affected system. According to Cisco, this would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco said it is not aware of successful exploitation by other methods.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-20182 was disclosed by Rapid7 and described as an authentication bypass that could allow unauthenticated remote attackers to obtain administrative privileges on vulnerable systems. The article also says it is similar to CVE-2026-20127, another authentication bypass affecting the same component. Both vulnerabilities have been exploited in the wild as zero-days, and a threat activity cluster called UAT-8616 has been linked to abuse of CVE-2026-20127 as far back as 2023.\u003c/p\u003e\n\n\u003cp\u003eCisco said it observed limited cases where exploitation of CVE-2026-20245 led to a configuration change pushed to edge devices. The company credited Google Mandiant researchers Chester Sng, Pete Boonyakarn, and Logeswaran Nadarajan with discovering and reporting the vulnerability. Cisco said it is unknown who is behind the latest exploitation activity.\u003c/p\u003e\n\n\u003cp\u003eCisco advised customers to upgrade SD-WAN software to ensure they have applied fixes released for CVE-2026-20182 on May 14, 2026. It also warned that internet-exposed systems are at heightened risk of compromise and recommended checking /var/log/scripts.log for specific script upload entries as possible indicators of compromise. The article notes that CVE-2026-20245 is the seventh Cisco SD-WAN flaw flagged as actively exploited this year.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco warned that a high-severity security flaw affecting Cisco Catalyst SD-WAN Manager is being actively exploited. The vulnerability is tracked as CVE-2026-20245 and has a CVSS score of 7.8. Cisco Catalyst SD-WAN Manager was formerly known as SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eCisco said there are currently no patches or mitigations available for CVE-2026-20245. The company recommended that customers upgrade their SD-WAN software to ensure they have applied fixes released for CVE-2026-20182 on May 14, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"affected-deployment-types\"\u003eAffected deployment types\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-20245 affects the following Cisco Catalyst SD-WAN Manager deployment types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-Prem Deployment\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud (Cisco Managed)\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government (FedRAMP)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eCisco described CVE-2026-20245 as a vulnerability in the CLI of Cisco Catalyst SD-WAN Manager. The flaw could allow an authenticated local attacker to execute arbitrary commands as root by supplying a crafted file to an affected system.\u003c/p\u003e\n\n\u003cp\u003eCisco said the vulnerability is caused by insufficient validation of user-supplied input. An attacker could exploit it by uploading a crafted file to the affected system. Successful exploitation could allow command injection and privilege escalation to the root user.\u003c/p\u003e\n\n\u003ch2 id=\"exploit-requirements\"\u003eExploit requirements\u003c/h2\u003e\n\n\u003cp\u003eCisco said an attacker must have netadmin privileges on the affected system to exploit CVE-2026-20245. The company stated that this would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eCisco also said it is not aware of successful exploitation by other methods. This makes CVE-2026-20245 notable in the article because it can follow authentication-related compromises described elsewhere in the Cisco SD-WAN ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"related-vulnerabilities\"\u003eRelated vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article links CVE-2026-20245 to two related Cisco SD-WAN vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-20182, with a CVSS score of 10.0, was disclosed by Rapid7 and described as an authentication bypass that could allow unauthenticated remote attackers to obtain administrative privileges on susceptible systems.\u003c/li\u003e\n\u003cli\u003eCVE-2026-20127 is described as another authentication bypass affecting the same component and as similar to CVE-2026-20182.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth CVE-2026-20182 and CVE-2026-20127 have been exploited in the wild as zero-days. The article says a threat activity cluster named UAT-8616 has been linked to abuse of CVE-2026-20127 as far back as 2023.\u003c/p\u003e\n\n\u003ch2 id=\"observed-impact\"\u003eObserved impact\u003c/h2\u003e\n\n\u003cp\u003eCisco said it observed limited cases in which exploitation of CVE-2026-20245 resulted in a configuration change being pushed to edge devices. The article does not identify who is behind the latest exploitation efforts.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by Google Mandiant researchers Chester Sng, Pete Boonyakarn, and Logeswaran Nadarajan, according to Cisco.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance-and-risk-warning\"\u003eDetection guidance and risk warning\u003c/h2\u003e\n\n\u003cp\u003eCisco warned that internet-exposed systems are at heightened risk of compromise. To look for indicators of compromise, Cisco advised users to check the \u003ccode\u003e/var/log/scripts.log\u003c/code\u003e file.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples of log entries involving script uploads, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTenant list upload per vSmart serial number using \u003ccode\u003e/usr/bin/vconfd_script_upload_tenant_list.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003evSmart upload serial numbers using \u003ccode\u003e/usr/bin/vconfd_script_upload_vsmart_serial_numbers.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eZTP upload chassis numbers using \u003ccode\u003e/usr/bin/vconfd_script_upload_chassis_number_file.sh\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-cisco-sd-wan-exploitation-context\"\u003eBroader Cisco SD-WAN exploitation context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-20245 is the seventh Cisco SD-WAN flaw to be flagged as actively exploited this year. The other cited flaws are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-20182\u003c/li\u003e\n\u003cli\u003eCVE-2026-20127\u003c/li\u003e\n\u003cli\u003eCVE-2026-20122\u003c/li\u003e\n\u003cli\u003eCVE-2026-20128\u003c/li\u003e\n\u003cli\u003eCVE-2026-20133\u003c/li\u003e\n\u003cli\u003eCVE-2022-20775\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe disclosure also follows Cisco addressing another high-severity flaw in Unified Communications Manager, CVE-2026-20230, which has a CVSS score of 8.6. Cisco said proof-of-concept exploit code is public for CVE-2026-20230, but there is no evidence that it has been actively exploited.\u003c/p\u003e\n","keyPoints":["Cisco warned that CVE-2026-20245, a high-severity flaw in Cisco Catalyst SD-WAN Manager, is being actively exploited.","CVE-2026-20245 allows an authenticated local attacker with netadmin privileges to execute arbitrary commands as root by uploading a crafted file to an affected system.","Cisco said exploitation of CVE-2026-20245 requires valid credentials or prior exploitation of CVE-2026-20182 or CVE-2026-20127.","Cisco observed limited cases where exploitation of CVE-2026-20245 resulted in a configuration change pushed to edge devices.","Cisco said there are currently no patches or mitigations available for CVE-2026-20245 and advised customers to upgrade SD-WAN software to apply fixes for CVE-2026-20182."],"insights":["CVE-2026-20245 is especially concerning because Cisco says it can be chained after CVE-2026-20182 or CVE-2026-20127, turning prior authentication-bypass exposure into root-level command execution on affected systems.","The most actionable detection step Cisco provides is to inspect /var/log/scripts.log for suspicious script upload entries involving tenant lists, vSmart serial numbers, or chassis number files.","Internet-exposed Cisco Catalyst SD-WAN Manager systems face heightened risk, even though the flaw itself requires netadmin privileges, because related authentication-bypass vulnerabilities have already been exploited in the wild.","Cisco observed exploitation leading to configuration changes pushed to edge devices, indicating that compromise of SD-WAN Manager can affect downstream network infrastructure rather than remaining limited to the manager system."],"referencedReports":[{"title":"Cisco Catalyst SD-WAN Manager Software Command Injection Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-privesc-4uxFrdzx","publisher":"Cisco","context":"The article cites Cisco's advisory as the source for details on CVE-2026-20245, including affected deployments, exploit requirements, impact, and lack of patches or mitigations.","category":"","primary":false}],"body":"\u003cp\u003eCisco warned that a high-severity flaw in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, is being actively exploited. The vulnerability has a CVSS score of 7.8 and affects on-premises, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government deployments. Cisco said there are currently no patches or mitigations available for the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in the CLI of Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage, and stems from insufficient validation of user-supplied input. An authenticated local attacker with netadmin privileges could upload a crafted file to execute arbitrary commands as root. Cisco said exploitation requires valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eCisco reported limited cases where exploitation of CVE-2026-20245 resulted in configuration changes being pushed to edge devices. The company warned that internet-exposed systems are at heightened risk of compromise and advised customers to check /var/log/scripts.log for indicators of compromise. Customers are also advised to upgrade SD-WAN software to ensure fixes for CVE-2026-20182 released on May 14, 2026, have been applied.\u003c/p\u003e\n"},{"n":9,"title":"Miasma Worm Hits Microsoft Again: Azure Functions Action and 72 Other Repositories Disabled After Supply Chain Attack Targeting AI Coding Agents","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/miasma-worm-hits-microsoft-again-azure-functions-action-and-72-other-repositories-disabled-after-supply-chain-attack-targeting-ai-coding-agents","time":"11:10","priority":"MUST READ","score":96,"tldr":"The Miasma worm campaign hit Microsoft’s Azure GitHub repositories by planting malicious editor and AI-coding-agent configuration files that executed a credential-stealing payload when developers opened affected repos. GitHub disabled 73 Microsoft-related repositories, including Azure/functions-action, disrupting CI/CD pipelines and highlighting a shift from package-install attacks to “folder-open” supply chain compromise.","briefOverview":"\u003cp\u003eOn June 5, 2026, the Miasma worm campaign reached Microsoft’s Azure GitHub organizations when a malicious commit was pushed to Azure/durabletask using a previously compromised contributor account. The commit planted configuration files that executed or prompted execution of a credential-harvesting payload when developers opened the repository in Claude Code, Gemini CLI, Cursor, or VS Code. GitHub later disabled 73 repositories across four Microsoft GitHub organizations in a 105-second automated sweep.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because it shifted the attack surface from package installation to repository opening in developer tools and AI coding agents. The article contrasts this with the May 19 compromise of Microsoft’s durabletask PyPI package, where malicious versions were uploaded directly to PyPI using a compromised publishing token. The June 5 attack added five files, including a 4.6 MB obfuscated JavaScript payload at .github/setup.js and tool-specific configuration files that pointed to it.\u003c/p\u003e\n\n\u003cp\u003eOne major impact was the disabling of Azure/functions-action, the official GitHub Action used to deploy Azure Functions. Workflows referencing Azure/functions-action@v1 stopped resolving, causing CI/CD failures reported by developers in a Microsoft Learn Q\u0026amp;A thread. The article recommends treating systems as compromised if affected repositories were opened in the targeted tools, rotating credentials, auditing repositories and package releases, and pinning GitHub Actions to commit SHAs instead of mutable tags.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that on June 5, 2026, the Miasma worm campaign hit Microsoft’s Azure GitHub organizations through a malicious commit to Azure/durabletask. The commit was pushed using a previously compromised contributor account that was also tied to the May 19 durabletask PyPI compromise. Instead of poisoning a package registry, the June 5 attack planted configuration files that triggered execution when a developer opened the repository in supported tools.\u003c/p\u003e\n\n\u003cp\u003eThe malicious commit, identified as 5f456b8, carried several red flags described in the article. Its message claimed “Switched DataConverter to OrchestrationContext [skip ci],” but it modified no source code and added only tool configuration files and the payload. The timestamp was backdated to 2020-03-09T15:59:47Z, and the “[skip ci]” flag suppressed CI pipeline execution.\u003c/p\u003e\n\n\u003cp\u003eThe commit added five files that targeted Claude Code, Gemini CLI, Cursor, and VS Code. The .claude/settings.json and .gemini/settings.json files used SessionStart hooks to run node .github/setup.js, while .cursor/rules/setup.mdc instructed the Cursor AI agent to run the same file as a project setup requirement. A .vscode/tasks.json file defined a task with runOn set to folderOpen, and .github/setup.js was a single-line, 4,643,745-byte obfuscated JavaScript credential harvester.\u003c/p\u003e\n\n\u003cp\u003eGitHub disabled 73 repositories across Azure, microsoft, Azure-Samples, and MicrosoftDocs in a 105-second automated enforcement window. The article says all disabled repositories returned HTTP 403 with a Terms of Service reason when checked through the GitHub API, and that the list was first reported by OpenSource Malware before being independently verified by the authors. The disabled set included Azure Functions runtime, language workers, SDKs, Durable Task repositories, AI-related samples, connector projects, and MicrosoftDocs/windows-driver-docs.\u003c/p\u003e\n\n\u003cp\u003eThe disabling of Azure/functions-action caused immediate CI/CD breakage because workflows referencing Azure/functions-action@v1 could no longer resolve the action. A Microsoft Learn Q\u0026amp;A thread gathered reports from developers, and Microsoft described the repository’s disabled state first as a GitHub policy violation and later as an “internal management issue” under investigation. The article uses this impact to highlight the risk of mutable tags and recommends pinning actions to commit SHAs.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the June 5 repository injection to the May 19 PyPI attack through the same compromised contributor account and to the broader Miasma worm campaign, which it says has infected 113 or more GitHub repositories. It also states that the May 19 payload connected to TeamPCP infrastructure through t.m-kosche[.]com. Recommended actions include rotating credentials, auditing repositories for suspicious tool configuration files, checking package registries for unauthorized publishes, monitoring for specified domains, requiring pull request reviews, using PyPI Trusted Publishing, and restricting outbound network access from CI/CD runners.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Miasma worm campaign reached Microsoft’s Azure GitHub organizations on June 5, 2026. A malicious commit was pushed to the Azure/durabletask repository using a previously compromised contributor account. GitHub later disabled 73 repositories across four Microsoft GitHub organizations in a 105-second automated sweep.\u003c/p\u003e\n\n\u003cp\u003eThe core significance of the incident is the attack’s move from package registry poisoning to developer-tool and AI-coding-agent hijacking. The article describes this as a shift from “execute on package install” to “execute on folder open.” In this case, cloning the repository was described as safe, while opening it in targeted tools was not.\u003c/p\u003e\n\n\u003ch2 id=\"background-may-19-durabletask-pypi-compromise\"\u003eBackground: May 19 durabletask PyPI compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article links the June 5 incident to an earlier compromise on May 19, 2026. In that earlier incident, three malicious versions of Microsoft’s durabletask PyPI package were uploaded during a 35-minute window. Those packages planted a credential-harvesting payload that stole secrets from AWS, Azure, GCP, Kubernetes, and more than 90 developer tool configurations.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the attacker bypassed the repository’s CI/CD pipeline and uploaded directly to PyPI using a compromised publishing token. The June 5 incident reused the same compromised contributor account, but used GitHub source repository injection rather than package registry poisoning.\u003c/p\u003e\n\n\u003ch2 id=\"the-malicious-azure-durabletask-commit\"\u003eThe malicious Azure/durabletask commit\u003c/h2\u003e\n\n\u003cp\u003eThe malicious commit was identified as 5f456b8 and was pushed to Azure/durabletask. The article highlights several suspicious properties in the commit metadata:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe commit message was “Switched DataConverter to OrchestrationContext [skip ci].”\u003c/li\u003e\n\u003cli\u003eThe commit added five files and modified no source code files.\u003c/li\u003e\n\u003cli\u003eThe commit timestamp was backdated to 2020-03-09T15:59:47Z.\u003c/li\u003e\n\u003cli\u003eThe “[skip ci]” flag suppressed CI pipeline execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the commit message claimed a code change, but no source code was modified. All added files were either tool configuration files or the malicious payload itself.\u003c/p\u003e\n\n\u003ch2 id=\"planted-files-and-targeted-tools\"\u003ePlanted files and targeted tools\u003c/h2\u003e\n\n\u003cp\u003eThe commit added five files intended to trigger execution across four developer tools or AI coding environments.\u003c/p\u003e\n\n\u003ch3 id=\"claude-code\"\u003eClaude Code\u003c/h3\u003e\n\n\u003cp\u003eThe .claude/settings.json file defined a SessionStart hook. That hook matched all sessions and executed the command:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003enode .github/setup.js\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article states that this caused the payload to execute automatically whenever a Claude Code session started in the repository.\u003c/p\u003e\n\n\u003ch3 id=\"gemini-cli\"\u003eGemini CLI\u003c/h3\u003e\n\n\u003cp\u003eThe .gemini/settings.json file used the same structure as the Claude Code hook. It also triggered on Gemini CLI session start and ran the same payload.\u003c/p\u003e\n\n\u003ch3 id=\"cursor\"\u003eCursor\u003c/h3\u003e\n\n\u003cp\u003eThe .cursor/rules/setup.mdc file was described as a prompt injection. It contained an alwaysApply rule instructing the Cursor AI agent to run:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003enode .github/setup.js\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article says the instruction framed execution as required for project setup and IDE integration. The alwaysApply flag made the rule active regardless of which file the developer was working on.\u003c/p\u003e\n\n\u003ch3 id=\"vs-code\"\u003eVS Code\u003c/h3\u003e\n\n\u003cp\u003eThe .vscode/tasks.json file defined a shell task named “Setup.” Its command was:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003enode .github/setup.js\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe task used runOptions with runOn set to folderOpen, which the article says caused it to run automatically when a developer opened the folder in VS Code.\u003c/p\u003e\n\n\u003ch3 id=\"payload-file\"\u003ePayload file\u003c/h3\u003e\n\n\u003cp\u003eThe shared payload was stored at .github/setup.js. The article describes it as a single-line, 4,643,745-byte obfuscated JavaScript file containing the credential harvester. All four configuration paths pointed to this file.\u003c/p\u003e\n\n\u003ch2 id=\"disabled-repositories\"\u003eDisabled repositories\u003c/h2\u003e\n\n\u003cp\u003eAfter the malicious commit, GitHub disabled 73 repositories across four Microsoft GitHub organizations. The article says the disabled repositories returned HTTP 403 with a Terms of Service reason when checked through the GitHub API. It also says the list was first reported by OpenSource Malware and independently verified by the article’s authors.\u003c/p\u003e\n\n\u003cp\u003eThe block timestamps ranged from 16:00:50 to 16:02:35 UTC on June 5. The article describes two waves separated by a 56-second gap, concluding that the enforcement was automated rather than manual.\u003c/p\u003e\n\n\u003ch3 id=\"wave-1\"\u003eWave 1\u003c/h3\u003e\n\n\u003cp\u003eThe first wave occurred from 16:00:50 to 16:01:28 UTC and disabled 39 repositories in 38 seconds. Repositories in this wave included Azure Functions tooling, WebJobs components, Durable Task projects, Azure-Samples projects, and MicrosoftDocs/windows-driver-docs.\u003c/p\u003e\n\n\u003ch3 id=\"wave-2\"\u003eWave 2\u003c/h3\u003e\n\n\u003cp\u003eThe second wave occurred from 16:02:24 to 16:02:35 UTC and disabled 34 repositories in 11 seconds. Repositories in this wave included Azure/azure-functions-host, Azure/durabletask, Azure/azure-functions-durable-extension, language workers, extension projects, connector SDKs, and several Azure-Samples repositories.\u003c/p\u003e\n\n\u003ch3 id=\"organizations-affected\"\u003eOrganizations affected\u003c/h3\u003e\n\n\u003cp\u003eThe article groups the 73 disabled repositories across four organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAzure: 49 repositories.\u003c/li\u003e\n\u003cli\u003emicrosoft: 10 repositories.\u003c/li\u003e\n\u003cli\u003eAzure-Samples: 13 repositories.\u003c/li\u003e\n\u003cli\u003eMicrosoftDocs: 1 repository.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected Azure repositories included Azure Functions runtime, worker, SDK, extension, deployment action, connector, Durable Task, and AI-related repositories. The affected microsoft repositories included Durable Task SDKs and backends, DurableFunctionsMonitor, Microsoft-Performance-Tools-Apple, and secure-azureai-agent. The affected Azure-Samples repositories included AI, OpenAI, connector, container apps, and Azure Functions samples. The affected MicrosoftDocs repository was windows-driver-docs.\u003c/p\u003e\n\n\u003ch2 id=\"ci-cd-impact-from-azure-functions-action\"\u003eCI/CD impact from Azure/functions-action\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies Azure/functions-action as the most immediately damaging repository to be disabled. Azure/functions-action is described as the official GitHub Action used to deploy Azure Functions. When the repository was disabled, workflows referencing Azure/functions-action@v1 stopped resolving.\u003c/p\u003e\n\n\u003cp\u003eThe article says a Microsoft Learn Q\u0026amp;A thread opened within hours, with more than 20 developers reporting broken CI/CD pipelines. Microsoft initially described the issue as a GitHub policy violation. Twelve minutes later, a revised response characterized it as an “internal management issue” under investigation and recommended alternative deployment methods such as Azure CLI, Azure DevOps Pipelines, VS Code deployment, Zip Deploy, or Azure Pipelines.\u003c/p\u003e\n\n\u003cp\u003eThe article uses this incident to discuss the mutable-tag problem. It states that workflows referencing @v1 depend on whatever GitHub serves for that tag, and when the repository disappears, the tag evaporates and dependent pipelines fail. It recommends pinning to a specific commit SHA when the action is restored.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-the-broader-campaign\"\u003eRelationship to the broader campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article links the June 5 repository injection to the May 19 PyPI attack through the same compromised contributor account. It says the contributor’s personal fork of Azure/azure-functions-durable-extension was also blocked during the same sweep, which the authors say confirmed the account’s involvement.\u003c/p\u003e\n\n\u003cp\u003eThe article lays out three possibilities for how the account was used again:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe account’s credentials may not have been fully rotated after May 19, leaving the attacker with a working GitHub token.\u003c/li\u003e\n\u003cli\u003eThe contributor may have been re-compromised through the worm’s propagation loop after opening an infected repository in an AI coding tool.\u003c/li\u003e\n\u003cli\u003eA different contributor’s token may have been used with commit author metadata spoofed through the Git Data API.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article connects the incident to the broader Miasma worm campaign, which it says has infected more than 113 GitHub repositories across dozens of accounts. It also states that the May 19 payload connected to the TeamPCP threat group through the secondary C2 domain t.m-kosche[.]com, described as known TeamPCP infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that TeamPCP has previously targeted TanStack, Mistral AI, the @antv ecosystem, the @redhat-cloud-services npm scope, LiteLLM, Telnyx, and Checkmarx.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-described-in-the-article\"\u003eTimeline described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides a timeline covering both the May 19 and June 5 activity. Key entries include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMay 16, 2026: rope.pyz core modules were authored, and git-service[.]com infrastructure was registered and certified.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026: malicious durabletask PyPI versions 1.4.1, 1.4.2, and 1.4.3 were uploaded.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026: GitHub Issue #137 reported the PyPI compromise, and Microsoft confirmed the packages were yanked.\u003c/li\u003e\n\u003cli\u003eJune 3, 2026: a second wave of dead-drop repositories began with Miasma-themed naming.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026: malicious commit 5f456b8 was pushed to Azure/durabletask.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026 16:00:50 to 16:02:35 UTC: GitHub disabled 73 Microsoft-related repositories.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026 around 19:00 UTC: a Microsoft Learn Q\u0026amp;A thread opened about broken CI/CD.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026 around 19:57 UTC: Microsoft characterized the incident as an “internal management issue.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-actions-in-the-article\"\u003eRecommended actions in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that anyone who cloned affected repositories after June 2 and opened them in VS Code, Claude Code, Cursor, or Gemini CLI treat the system as compromised. It advises rotating all credentials accessible from the system, including GitHub tokens, npm tokens, AWS keys, Azure service principals, GCP service accounts, SSH keys, Kubernetes secrets, Docker configs, environment variables, and shell history contents.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends auditing repositories for unexpected commits containing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e.claude/\u003c/li\u003e\n\u003cli\u003e.gemini/\u003c/li\u003e\n\u003cli\u003e.cursor/\u003c/li\u003e\n\u003cli\u003e.vscode/tasks.json\u003c/li\u003e\n\u003cli\u003e.github/setup.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article further recommends auditing npm and PyPI packages for unauthorized version publishes and checking network logs for connections to check.git-service[.]com and t.m-kosche[.]com.\u003c/p\u003e\n\n\u003cp\u003eFor CI/CD users referencing Azure/functions-action@v1, the article recommends switching to alternative deployment methods while the repository remains disabled. It also recommends pinning to a specific commit SHA instead of a mutable tag after the action is restored.\u003c/p\u003e\n\n\u003cp\u003eFor prevention, the article recommends inspecting cloned repositories for suspicious AI tool and editor configuration files before opening them, enabling branch protection rules requiring pull request reviews, using PyPI Trusted Publishing instead of long-lived API tokens, pinning GitHub Actions to commit SHAs, restricting outbound network access from CI/CD runners, and monitoring for PyPI or npm releases without matching GitHub tags or CI runs.\u003c/p\u003e\n","keyPoints":["On June 5, 2026, a malicious commit was pushed to the Azure/durabletask repository using a previously compromised contributor account.","The commit added configuration files for Claude Code, Gemini CLI, Cursor, and VS Code that executed or instructed execution of a credential-harvesting payload when the repository was opened.","GitHub disabled 73 repositories across the Azure, microsoft, Azure-Samples, and MicrosoftDocs GitHub organizations in a 105-second automated enforcement window.","The disabling of Azure/functions-action caused GitHub workflows referencing Azure/functions-action@v1 to stop resolving, breaking CI/CD pipelines for developers.","The article links the June 5 repository injection to the May 19 durabletask PyPI compromise through the same compromised contributor account."],"insights":["The attack bypassed traditional package-install defenses by using editor and AI-agent startup mechanisms, making simply opening an infected repository in a supported tool sufficient to trigger the payload.","The malicious commit used multiple evasion signals at once, including a misleading code-change message, a backdated timestamp, no source-code modifications, and a “[skip ci]” flag to suppress automated checks.","The incident shows that repository-local AI tool configuration files such as .claude/settings.json, .gemini/settings.json, and .cursor/rules/setup.mdc should be treated as supply-chain risk indicators rather than harmless editor metadata.","The outage of Azure/functions-action demonstrates that GitHub Actions workflows pinned to mutable tags like @v1 can fail globally when an upstream repository is disabled, even without any change in the dependent project.","The reuse of the same compromised contributor account across the PyPI compromise and the GitHub repository injection indicates that credential rotation or account remediation after the earlier incident was not sufficient to prevent a second delivery channel from being abused."],"referencedReports":[{"title":"Miasma Reaches Azure","url":"https://opensourcemalware.org/blog/miasma-reaches-azure","publisher":"OpenSource Malware","context":"The article says OpenSource Malware first reported the list of 73 Microsoft repositories disabled by GitHub during the Miasma incident.","category":"","primary":false}],"body":"\u003cp\u003eOn June 5, 2026, the Miasma worm campaign reached Microsoft’s Azure GitHub organizations when a malicious commit was pushed to Azure/durabletask using a previously compromised contributor account. The commit planted configuration files that executed or prompted execution of a credential-harvesting payload when developers opened the repository in Claude Code, Gemini CLI, Cursor, or VS Code. GitHub later disabled 73 repositories across four Microsoft GitHub organizations in a 105-second automated sweep.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because it shifted the attack surface from package installation to repository opening in developer tools and AI coding agents. The article contrasts this with the May 19 compromise of Microsoft’s durabletask PyPI package, where malicious versions were uploaded directly to PyPI using a compromised publishing token. The June 5 attack added five files, including a 4.6 MB obfuscated JavaScript payload at .github/setup.js and tool-specific configuration files that pointed to it.\u003c/p\u003e\n\n\u003cp\u003eOne major impact was the disabling of Azure/functions-action, the official GitHub Action used to deploy Azure Functions. Workflows referencing Azure/functions-action@v1 stopped resolving, causing CI/CD failures reported by developers in a Microsoft Learn Q\u0026amp;A thread. The article recommends treating systems as compromised if affected repositories were opened in the targeted tools, rotating credentials, auditing repositories and package releases, and pinning GitHub Actions to commit SHAs instead of mutable tags.\u003c/p\u003e\n"},{"n":1,"title":"Critical Everest Forms Pro flaw exploited to take over WordPress sites","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/critical-everest-forms-pro-flaw-exploited-to-take-over-wordpress-sites/","time":"14:09","priority":"MUST READ","score":94,"tldr":"Hackers are actively exploiting a critical unauthenticated code execution flaw in Everest Forms Pro versions 1.9.12 and earlier to create rogue WordPress administrator accounts. Site owners should update immediately, check for suspicious admin users such as “diksimarina,” and review logs for compromise.","briefOverview":"\u003cp\u003eHackers are actively exploiting a critical vulnerability, CVE-2026-3300, in the Everest Forms Pro plugin for WordPress. The flaw affects versions 1.9.12 and earlier and can be exploited without authentication to execute arbitrary code on the server. The article says successful exploitation can let attackers take complete control of a WordPress website.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is in the plugin’s Complex Calculation feature, which inserts submitted form field values into a PHP code string and executes it with PHP’s \u003ccode\u003eeval()\u003c/code\u003e function. Although input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, the article says this does not escape single quotes or other characters that can affect PHP syntax. Attackers can use this to inject PHP code that creates rogue administrator accounts.\u003c/p\u003e\n\n\u003cp\u003eWordfence telemetry shows the flaw is being exploited in the wild, including attempts to create an administrator account named “diksimarina.” The Everest Forms developer released a patch on March 18 after researcher h0xilo submitted the issue through Wordfence in February. Wordfence says active exploitation began on April 13 and that its firewall has blocked more than 29,300 attempts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHackers are actively exploiting CVE-2026-3300, a critical flaw in the Everest Forms Pro WordPress plugin. The issue affects versions 1.9.12 and earlier and can be leveraged without authentication to execute arbitrary code on the server. Everest Forms Pro is a commercial add-on for the Everest Forms form builder plugin, which is used to create contact, registration, payment, and other custom application forms.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is located in the plugin’s Complex Calculation feature. According to the article, that feature accepts values submitted through form fields, inserts them into a PHP code string, and executes the resulting code using PHP’s \u003ccode\u003eeval()\u003c/code\u003e function. The article says submitted input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, but that function does not escape single quotes or other characters that influence PHP syntax.\u003c/p\u003e\n\n\u003cp\u003eThis behavior allows an attacker to close the intended string, inject arbitrary PHP code, and comment out the rest of the generated code to avoid a syntax error. Wordfence reported that attackers submit a field value beginning with a single quote, followed by a PHP statement that calls \u003ccode\u003ewp_insert_user()\u003c/code\u003e to create a new administrator account. The reported malicious username is “diksimarina,” and the trailing \u003ccode\u003e//\u003c/code\u003e comment marker causes the remaining generated PHP code to be treated as a comment.\u003c/p\u003e\n\n\u003cp\u003eAdministrator-level access gives attackers broad control over a breached WordPress site. The article says attackers with that access can modify content, install plugins and themes, plant backdoors and webshells, and access private databases. Wordfence telemetry indicates the flaw is being exploited in the wild to create rogue administrator accounts.\u003c/p\u003e\n\n\u003cp\u003eResearcher h0xilo submitted CVE-2026-3300 through Wordfence in February, and the Everest Forms developer released a patch on March 18. Wordfence says active exploitation started on April 13 and that its firewall has blocked more than 29,300 attempts. Wordfence also says attempts primarily originate from 202.56.2[.]126 and 209.146.60.26, and it recommends defenders block them.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends that website administrators review log files and administrator accounts for suspicious activity. It specifically highlights activity containing the string “diksimarina.” Wordfence’s report also provides several offending IP addresses as indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHackers are actively exploiting a critical vulnerability tracked as CVE-2026-3300 in the Everest Forms Pro plugin for WordPress. The flaw affects Everest Forms Pro versions 1.9.12 and earlier. According to the article, the vulnerability can be exploited without authentication to execute arbitrary code on the server.\u003c/p\u003e\n\n\u003cp\u003eEverest Forms Pro is described as a commercial add-on for the WordPress form builder plugin Everest Forms. The plugin is used to create contact, registration, payment, and other custom application forms. The article says exploitation of the flaw can allow attackers to take complete control of a WordPress website.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is in the plugin’s Complex Calculation feature. The article explains that this feature accepts values submitted through form fields and inserts them into a PHP code string. The resulting code is then executed using PHP’s \u003ccode\u003eeval()\u003c/code\u003e function.\u003c/p\u003e\n\n\u003cp\u003eAlthough submitted input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, the article says this function does not escape single quotes or other characters that influence PHP syntax. As a result, an attacker can close the intended string, inject arbitrary PHP code, and comment out the remaining generated code. This lets the attacker achieve code execution on the server.\u003c/p\u003e\n\n\u003cp\u003eWordfence describes an observed exploitation method in which the attacker submits a value for a text field that begins with a single quote. That quote closes the wrapping string literal. The attacker then includes a PHP statement that calls \u003ccode\u003ewp_insert_user()\u003c/code\u003e to create a new administrator account.\u003c/p\u003e\n\n\u003cp\u003eThe article says the observed malicious administrator username is “diksimarina.” Wordfence explains that a trailing \u003ccode\u003e//\u003c/code\u003e comment marker ensures the rest of the generated PHP code, including the closing quote, is treated as a comment and does not cause a syntax error. When the form is processed and the calculation is evaluated, the injected PHP code is executed and the malicious administrator account is created.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article says administrator-level access gives attackers full power to perform high-risk actions on a breached website. These actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eModifying website content.\u003c/li\u003e\n\u003cli\u003eInstalling plugins and themes.\u003c/li\u003e\n\u003cli\u003ePlanting backdoors and webshells.\u003c/li\u003e\n\u003cli\u003eAccessing private databases.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWordfence telemetry shows the vulnerability is being exploited in the wild to create rogue administrator accounts. The article frames this as a path to complete takeover of affected WordPress websites.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-patch-and-exploitation-timeline\"\u003eDiscovery, Patch, and Exploitation Timeline\u003c/h2\u003e\n\n\u003cp\u003eResearcher h0xilo submitted CVE-2026-3300 through Wordfence in February. The Everest Forms developer released a patch addressing the issue on March 18.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wordfence data cited in the article, active exploitation started on April 13. Wordfence says its firewall has blocked more than 29,300 exploitation attempts.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-defensive-recommendations\"\u003eIndicators and Defensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eWordfence says exploitation attempts originate primarily from two IP addresses:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e202.56.2[.]126\u003c/li\u003e\n\u003cli\u003e209.146.60.26\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Wordfence recommends that defenders block those IP addresses. It also notes that Wordfence’s report provides several offending IP addresses as indicators of compromise.\u003c/p\u003e\n\n\u003cp\u003eWebsite administrators are recommended to review log files and administrator accounts for suspicious activity. The article specifically calls out the string “diksimarina” as something administrators should look for during review.\u003c/p\u003e\n\n\u003ch2 id=\"parties-mentioned\"\u003eParties Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Everest Forms Pro, a commercial add-on for Everest Forms on WordPress. The vulnerability was submitted by researcher h0xilo through Wordfence. Wordfence provided telemetry showing active exploitation, details about the observed exploit behavior, exploitation volume, and indicators of compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor group. It describes the exploitation as being carried out by hackers and attackers.\u003c/p\u003e\n","keyPoints":["Hackers are actively exploiting CVE-2026-3300, a critical vulnerability in Everest Forms Pro versions 1.9.12 and earlier, to take complete control of WordPress websites.","The vulnerability exists in the plugin’s Complex Calculation feature, where submitted form values are inserted into a PHP code string and executed with PHP’s eval() function.","Wordfence telemetry shows attackers are exploiting the flaw to create rogue administrator accounts, including one with the username “diksimarina.”","The Everest Forms developer released a patch for CVE-2026-3300 on March 18 after researcher h0xilo submitted the vulnerability through Wordfence in February.","Wordfence reported that active exploitation began on April 13 and that its firewall has blocked more than 29,300 exploitation attempts."],"insights":["The attempted payloads leave a concrete investigation clue because Wordfence observed attackers creating an administrator account with the username “diksimarina,” which site owners can search for in admin accounts and logs.","Although the plugin applied sanitize_text_field(), the article notes this did not escape single quotes or other PHP syntax-affecting characters, showing that the existing sanitization was insufficient for code evaluated with eval().","Wordfence identified two primary source IP addresses, 202.56.2[.]126 and 209.146.60.26, giving defenders specific addresses to block in addition to applying the patch.","There was a gap between the March 18 patch release and the April 13 start of observed exploitation, making unpatched sites especially important to review even if no compromise is immediately visible."],"referencedReports":[{"title":"Attackers Actively Exploiting Critical Vulnerability in Everest Forms Pro Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-critical-vulnerability-in-everest-forms-pro-plugin/","publisher":"Wordfence","context":"The article cites a Wordfence report explaining how attackers exploit CVE-2026-3300 to create a malicious WordPress administrator account and providing exploitation telemetry and IOCs.","category":"","primary":false}],"body":"\u003cp\u003eHackers are actively exploiting a critical vulnerability, CVE-2026-3300, in the Everest Forms Pro plugin for WordPress. The flaw affects versions 1.9.12 and earlier and can be exploited without authentication to execute arbitrary code on the server. The article says successful exploitation can let attackers take complete control of a WordPress website.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is in the plugin’s Complex Calculation feature, which inserts submitted form field values into a PHP code string and executes it with PHP’s \u003ccode\u003eeval()\u003c/code\u003e function. Although input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, the article says this does not escape single quotes or other characters that can affect PHP syntax. Attackers can use this to inject PHP code that creates rogue administrator accounts.\u003c/p\u003e\n\n\u003cp\u003eWordfence telemetry shows the flaw is being exploited in the wild, including attempts to create an administrator account named “diksimarina.” The Everest Forms developer released a patch on March 18 after researcher h0xilo submitted the issue through Wordfence in February. Wordfence says active exploitation began on April 13 and that its firewall has blocked more than 29,300 attempts.\u003c/p\u003e\n"},{"n":7,"title":"Miasma Worm Hits 73 Microsoft GitHub Repositories in Major Supply Chain Attack","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/miasma-worm-hits-73-microsoft-github.html","time":"06:58","priority":"MUST READ","score":94,"tldr":"The Miasma self-replicating supply chain worm has compromised 73 Microsoft GitHub repositories, including Azure and Durable Task projects, prompting GitHub to disable access. The campaign is spreading through trusted developer channels like npm, PyPI, GitHub commits, and AI coding tool configurations, exposing how compromised maintainer credentials can turn legitimate publishing workflows into propagation paths.","briefOverview":"\u003cp\u003eMicrosoft’s GitHub repositories were hit by the ongoing Miasma self-replicating supply chain campaign. OpenSourceMalware reported that 73 repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations were impacted. GitHub disabled access to affected repositories, with a notice citing a violation of GitHub’s terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the re-compromise of the durabletask PyPI package, which had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems. Security researcher Paul McCarty said the takedown of the Durable Task ecosystem suggested the same “wound” had reopened. Miasma is assessed to be a variant of the Mini Shai-Hulud worm publicly released by TeamPCP in mid-May 2026.\u003c/p\u003e\n\n\u003cp\u003eMiasma has continued to mutate, infect more packages, and create public repositories containing stolen secrets under names such as “Miasma: The Spreading Blight” and “Hades - The End for the Damned.” The campaign has also skipped the npm registry in some cases by pushing malicious code directly to GitHub repositories. SafeDep said one commit planted a 4.3 MB payload runner and wired execution through Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s GitHub repositories became the latest victims of the ongoing Miasma self-replicating supply chain attack campaign. According to OpenSourceMalware, the incident affected 73 Microsoft repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations. GitHub disabled access to impacted repositories, including Azure/azure-functions-host, with a message saying access was disabled due to a violation of GitHub’s terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several affected repositories, including azure-search-openai-demo-purviewdatasecurity, Connectors-NET-LSP, Connectors-NET-SDK, durabletask, durabletask-dotnet, durabletask-go, durabletask-js, durabletask-mssql, functions-container-action, homebrew-functions, llm-fine-tuning, and windows-driver-docs. A notable element of the campaign is the re-compromise of the durabletask PyPI package. That package had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Paul McCarty, also known as 6mile, said the latest takedown included not only Azure/durabletask but sibling repositories across the Durable Task ecosystem. He described the recurrence as “the same wound reopening” and said whoever held the credentials in May plausibly never fully lost them. The article does not state that this has been confirmed, but presents it as McCarty’s assessment.\u003c/p\u003e\n\n\u003cp\u003eMiasma is assessed to be a variant of the Mini Shai-Hulud worm that TeamPCP publicly released in mid-May 2026. The campaign has continued to mutate and refine its tactics while infecting more packages. The article says newly created public repositories containing stolen secrets used descriptions including “Miasma: The Spreading Blight,” “Miasma : The Spreading Blight,” “Miasma - The Spreading Blight,” and “Hades - The End for the Damned.”\u003c/p\u003e\n\n\u003cp\u003eMiasma has also been observed skipping the npm registry entirely by pushing malicious code directly to icflorescu/mantine-datatable and related repositories. SafeDep said the commit added no dependencies but planted a 4.3 MB payload runner and wired it to execute automatically through Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script. FalconFeeds.io said the worm operates within legitimate channels by exploiting the trust model behind platforms such as npm and GitHub rather than exploiting a vulnerability in them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s GitHub repositories were affected by the ongoing Miasma self-replicating supply chain attack campaign. OpenSourceMalware reported that the incident impacted 73 Microsoft repositories across four GitHub organizations: Azure, Azure-Samples, Microsoft, and MicrosoftDocs. GitHub disabled access to the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eWhen attempting to access the Azure/azure-functions-host repository, GitHub displayed a notice stating that access had been disabled by GitHub Staff due to a violation of GitHub’s terms of service. The notice also said repository owners could contact GitHub Support for more information.\u003c/p\u003e\n\n\u003ch2 id=\"affected-microsoft-repositories\"\u003eAffected Microsoft repositories\u003c/h2\u003e\n\n\u003cp\u003eThe article says some of the repositories impacted by the incident include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eazure-search-openai-demo-purviewdatasecurity\u003c/li\u003e\n\u003cli\u003eConnectors-NET-LSP\u003c/li\u003e\n\u003cli\u003eConnectors-NET-SDK\u003c/li\u003e\n\u003cli\u003edurabletask\u003c/li\u003e\n\u003cli\u003edurabletask-dotnet\u003c/li\u003e\n\u003cli\u003edurabletask-go\u003c/li\u003e\n\u003cli\u003edurabletask-js\u003c/li\u003e\n\u003cli\u003edurabletask-mssql\u003c/li\u003e\n\u003cli\u003efunctions-container-action\u003c/li\u003e\n\u003cli\u003ehomebrew-functions\u003c/li\u003e\n\u003cli\u003ellm-fine-tuning\u003c/li\u003e\n\u003cli\u003ewindows-driver-docs\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected repositories span Microsoft’s Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations.\u003c/p\u003e\n\n\u003ch2 id=\"durable-task-re-compromise\"\u003eDurable Task re-compromise\u003c/h2\u003e\n\n\u003cp\u003eA notable aspect of the latest campaign is the re-compromise of the durabletask PyPI package. The article states that durabletask had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Paul McCarty, also known as 6mile, said that a month after the earlier compromise, Azure/durabletask was gone along with sibling repositories in the Durable Task ecosystem. He identified affected ecosystem components including .NET, Go, Java, JS, MSSQL, Netherite, protobuf implementations, and the Durable Functions monitor.\u003c/p\u003e\n\n\u003cp\u003eMcCarty said the recurrence was “not a coincidence” and described it as “the same wound reopening.” He also said whoever held the credentials in May plausibly never fully lost them.\u003c/p\u003e\n\n\u003ch2 id=\"miasma-and-mini-shai-hulud\"\u003eMiasma and Mini Shai-Hulud\u003c/h2\u003e\n\n\u003cp\u003eThe article says Miasma is assessed to be a variant of the Mini Shai-Hulud worm that TeamPCP publicly released in mid-May 2026. Since then, Miasma has continued to mutate and refine its tactics. The article says it has infected more packages over the past couple of days.\u003c/p\u003e\n\n\u003cp\u003eThe campaign has used several descriptions for newly created public repositories containing stolen secrets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“Miasma: The Spreading Blight”\u003c/li\u003e\n\u003cli\u003e“Miasma : The Spreading Blight”\u003c/li\u003e\n\u003cli\u003e“Miasma - The Spreading Blight”\u003c/li\u003e\n\u003cli\u003e“Hades - The End for the Damned”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the time of writing, the article says there were 13 repositories with the description “Hades - The End for the Damned” and 82 repositories using the remaining three Miasma-related naming patterns.\u003c/p\u003e\n\n\u003ch2 id=\"direct-github-repository-compromise-and-developer-tool-execution\"\u003eDirect GitHub repository compromise and developer tool execution\u003c/h2\u003e\n\n\u003cp\u003eMiasma has also been observed skipping the npm registry entirely. In those cases, the threat actors pushed malicious code directly to icflorescu/mantine-datatable and four related repositories: mantine-contextmenu, next-server-actions-parallel, mantine-datatable-v6, and mantine-contextmenu-v6.\u003c/p\u003e\n\n\u003cp\u003eSafeDep said the malicious commit added no dependencies. Instead, it planted a 4.3 MB payload runner and wired it to execute automatically through five developer tools or workflows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClaude Code\u003c/li\u003e\n\u003cli\u003eGemini CLI\u003c/li\u003e\n\u003cli\u003eCursor\u003c/li\u003e\n\u003cli\u003eVS Code\u003c/li\u003e\n\u003cli\u003enpm test script\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSafeDep said the attack detonates when a developer clones one of the affected repositories and opens it in an AI coding agent. It described the dropper as the same staged Bun loader, repurposed for GitHub source-repository persistence rather than registry poisoning.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-campaign\"\u003eSignificance of the campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the campaign as one of the most significant and sustained software supply chain campaigns observed to date. It says these attacks expose weaknesses in the trust model that underpins software delivery in open-source ecosystems.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the activity differs from other incidents because it can propagate across the ecosystem by compromising downstream users and repeating the same cycle. FalconFeeds.io said the worm operates entirely within legitimate channels and does not exploit a vulnerability in npm or GitHub.\u003c/p\u003e\n\n\u003cp\u003eAccording to FalconFeeds.io, the worm exploits the trust model those platforms are built on: the assumption that a package signed with a valid key and published by an authenticated maintainer is safe. FalconFeeds.io said Shai-Hulud compromises the key and the maintainer, then acts as a legitimate publisher would, making malicious publish events indistinguishable from routine updates from the registry’s perspective.\u003c/p\u003e\n","keyPoints":["The Miasma self-replicating supply chain campaign impacted 73 Microsoft GitHub repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs organizations.","GitHub disabled access to affected repositories, including Azure/azure-functions-host, citing a violation of GitHub's terms of service.","The campaign included a re-compromise of the durabletask PyPI package, which had been infected by TeamPCP the previous month to deliver an information stealer on Linux systems.","Miasma is assessed to be a variant of the Mini Shai-Hulud worm that TeamPCP publicly released in mid-May 2026.","Miasma has also been observed pushing malicious code directly to GitHub repositories and wiring execution through developer tools including Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script."],"insights":["The re-compromise of the durabletask ecosystem suggests that remediation after the prior TeamPCP incident may not have fully removed the attacker’s access to relevant credentials or publishing paths.","Miasma’s use of legitimate GitHub, npm, and PyPI workflows makes malicious activity difficult to distinguish from normal maintainer actions when credentials are compromised.","The campaign’s shift to direct GitHub source-repository persistence shows that package registry monitoring alone is insufficient to detect this worm’s propagation methods.","The malicious commit targeting AI coding agents demonstrates that opening a cloned repository in tools such as Claude Code, Gemini CLI, Cursor, or VS Code can become an execution trigger in this campaign."],"referencedReports":[{"title":"Miasma Reaches Azure","url":"https://opensourcemalware.com/blog/miasma-reaches-azure","publisher":"OpenSourceMalware","context":"The article cites OpenSourceMalware for the finding that 73 Microsoft repositories across four GitHub organizations were impacted.","category":"","primary":false},{"title":"Mini Shai-Hulud Worm Returns, Goes Public","url":"https://www.akamai.com/blog/security-research/mini-shai-hulud-worm-returns-goes-public","publisher":"Akamai","context":"The article references Akamai's security research when describing Miasma as a variant of the Mini Shai-Hulud worm publicly released in mid-May 2026.","category":"","primary":false},{"title":"600,000 Monthly Downloads Affected: Miasma Supply Chain Attack Is Back on NPM","url":"https://www.ox.security/blog/600000-monthly-downloads-affected-miasma-supply-chain-attack-is-back-on-npm/","publisher":"OX Security","context":"The article cites OX Security's research for Miasma infecting more packages over the past couple of days.","category":"","primary":false},{"title":"Miasma Worm: AI Coding Agent Config Injection","url":"https://safedep.io/miasma-worm-ai-coding-agent-config-injection/","publisher":"SafeDep","context":"The article quotes SafeDep's analysis of malicious code being pushed directly to GitHub repositories and wired to execute through AI coding agents and developer tools.","category":"","primary":false},{"title":"Threat Advisory: TanStack Supply Chain Attack","url":"https://www.uvcyber.com/resources/reports/threat-advisory-tanstack-supply-chain-attack","publisher":"UVCyber","context":"The article links to UVCyber's threat advisory while discussing how recent software supply chain attacks exposed weaknesses in open-source trust models.","category":"","primary":false},{"title":"Shai-Hulud NPM/PyPI Supply Chain Worm Analysis","url":"https://falconfeeds.io/blogs/shai-hulud-npm-pypi-supply-chain-worm-analysis/","publisher":"FalconFeeds.io","context":"The article quotes FalconFeeds.io's analysis explaining that the worm abuses trusted maintainer and registry workflows rather than exploiting npm or GitHub vulnerabilities.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft’s GitHub repositories were hit by the ongoing Miasma self-replicating supply chain campaign. OpenSourceMalware reported that 73 repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations were impacted. GitHub disabled access to affected repositories, with a notice citing a violation of GitHub’s terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the re-compromise of the durabletask PyPI package, which had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems. Security researcher Paul McCarty said the takedown of the Durable Task ecosystem suggested the same “wound” had reopened. Miasma is assessed to be a variant of the Mini Shai-Hulud worm publicly released by TeamPCP in mid-May 2026.\u003c/p\u003e\n\n\u003cp\u003eMiasma has continued to mutate, infect more packages, and create public repositories containing stolen secrets under names such as “Miasma: The Spreading Blight” and “Hades - The End for the Damned.” The campaign has also skipped the npm registry in some cases by pushing malicious code directly to GitHub repositories. SafeDep said one commit planted a 4.3 MB payload runner and wired execution through Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script.\u003c/p\u003e\n"},{"n":2,"title":"AI Agent Uncovers 21 Zero-Days in FFmpeg; Chrome Patches Record 429 Bugs","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ai-agent-uncovers-21-zero-days-in.html","time":"07:28","priority":"MUST READ","score":92,"tldr":"AI-driven vulnerability discovery is accelerating sharply, with an autonomous agent finding 21 zero-days in FFmpeg while Chrome patched a record 429 bugs amid rising AI-generated report volume. The key challenge is no longer just finding flaws, but triaging, fixing, and deploying patches fast enough across widely embedded software.","briefOverview":"\u003cp\u003eSecurity startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg, all found by an autonomous AI agent scanning about 1.5 million lines of C. The run reportedly cost around $1,000 and produced confirmed zero-days with reproducible proof-of-concept inputs. Several bugs had been present for 15 to 20 years, including a stack overflow in service-description-table code dating to 2003.\u003c/p\u003e\n\n\u003cp\u003eIn the same week, Google released Chrome 149 with patches for 429 security bugs, the most ever in a single release. More than 100 of the Chrome issues were critical or high severity, including CVE-2026-10881, an ANGLE graphics engine flaw that can allow sandbox escape and code execution on the host. The article says the broader significance is that AI is increasing vulnerability volume and pressure on triage, patching, and deployment workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends pulling fixed upstream FFmpeg builds or distribution security updates, including for embedded copies in media pipelines, Python wheels, container images, and appliances. It also advises updating Chrome to 149.0.7827.53 on Linux or 149.0.7827.\u003csup\u003e53\u003c/sup\u003e\u0026frasl;\u003csub\u003e54\u003c/sub\u003e on Windows and macOS. The article emphasizes shorter patch cycles, auto-update where available, and treating dependency bumps with CVE fixes as security work.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTwo major vulnerability developments landed in the same week: depthfirst reported 21 FFmpeg zero-days found by an autonomous AI agent, and Google shipped Chrome 149 with fixes for 429 security bugs. Only the FFmpeg bugs were found by AI, while Chrome’s record patch volume followed Google’s overhaul of its bounty program to handle a flood of AI-generated submissions. The article frames both events as evidence that AI is putting more vulnerabilities in front of maintainers and triagers faster than before.\u003c/p\u003e\n\n\u003cp\u003eThe FFmpeg findings came from depthfirst, whose autonomous security agent scanned roughly 1.5 million lines of C and produced 21 confirmed zero-days. Each vulnerability had a reproducible proof-of-concept input, and the run reportedly cost about $1,000. Several of the issues had been latent for 15 to 20 years, with one stack overflow in service-description-table code dating to 2003.\u003c/p\u003e\n\n\u003cp\u003eMost of the FFmpeg issues are heap or stack overflows in parsers and demuxers, including areas such as the TS demuxer and VP9 decoder. depthfirst said some already have CVE identifiers, listing CVE-2026-39210 through CVE-2026-39218, while the remaining fixed issues had not yet been numbered. The company also published a proof of concept for one of the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eChrome 149 fixed 429 vulnerabilities, with more than 100 rated critical or high severity. The most severe issue, CVE-2026-10881, is an out-of-bounds read and write in the ANGLE graphics engine that can let a crafted page escape the sandbox and run code on the host. Google paid $97,000 for that bug, and the article notes that most of the highest-severity Chrome bugs were found internally.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites earlier AI-assisted vulnerability work, including Google’s Big Sleep bugs in FFmpeg, Anthropic’s Mythos model finding old FFmpeg flaws, an autonomous tool finding an authenticated RCE in Redis, and a February study on Linux kernel N-day bugs. For response, it urges organizations to update FFmpeg through upstream or distribution fixes, patch embedded FFmpeg copies, and update Chrome to the listed 149 builds. The article concludes that finding bugs is becoming cheaper, but triage, fixes, shipping, and installation remain the bottleneck.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two vulnerability developments that occurred within days of each other. Security startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg, all found by an autonomous AI agent. In the same week, Google released Chrome 149 with fixes for 429 security bugs, which the article says is the most ever in a single Chrome release.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes the two events: only the FFmpeg vulnerabilities were found by AI. Chrome’s record patch volume is connected to AI through Google’s earlier bounty-program overhaul, which was prompted by a flood of AI-generated submissions. The shared theme is that AI is increasing the volume and speed of vulnerability discovery and reporting.\u003c/p\u003e\n\n\u003ch2 id=\"ffmpeg-zero-days-found-by-depthfirst\"\u003eFFmpeg zero-days found by depthfirst\u003c/h2\u003e\n\n\u003cp\u003eThe FFmpeg findings came from depthfirst, whose autonomous security agent scanned the project’s roughly 1.5 million lines of C. The agent produced 21 confirmed zero-days, each with a reproducible proof-of-concept input. depthfirst put the cost of the run at around $1,000.\u003c/p\u003e\n\n\u003cp\u003eSeveral of the FFmpeg bugs had reportedly existed for 15 to 20 years. One stack overflow in service-description-table code dates to 2003 and had remained untouched for 23 years. The article emphasizes that these were previously unknown vulnerabilities in a media library widely used in software that handles video.\u003c/p\u003e\n\n\u003cp\u003eMost of the FFmpeg issues are described as heap or stack overflows in parsers and demuxers. Affected areas include components from the TS demuxer to the VP9 decoder. depthfirst said some of the bugs already had CVE identifiers and listed CVE-2026-39210 through CVE-2026-39218, while the rest were fixed but not yet numbered.\u003c/p\u003e\n\n\u003cp\u003eThe article also says depthfirst published a proof of concept. FFmpeg users are advised to pull the fixed upstream build or distribution security update as soon as it lands.\u003c/p\u003e\n\n\u003ch2 id=\"chrome-149-patch-release\"\u003eChrome 149 patch release\u003c/h2\u003e\n\n\u003cp\u003eGoogle shipped Chrome 149 with patches for 429 vulnerabilities. The article identifies this as a record for a single Chrome release. More than 100 of the fixed issues are described as critical or high severity, mostly use-after-free and insufficient input validation bugs.\u003c/p\u003e\n\n\u003cp\u003eThe most severe Chrome issue is CVE-2026-10881, with a CVSS score of 9.6. It is an out-of-bounds read and write in the ANGLE graphics engine. The article says the flaw allows a crafted page to escape the sandbox and run code on the host, and that Google paid $97,000 for it.\u003c/p\u003e\n\n\u003cp\u003eThe highest-severity Chrome bugs were mostly found internally. Of roughly 90 high-severity bugs, only 10 came from outside researchers. Of 22 critical bugs, 19 were Google’s own findings.\u003c/p\u003e\n\n\u003cp\u003eGoogle has not tied the 429 Chrome vulnerabilities directly to AI. The article says the on-record AI-related signal is Google’s April bounty overhaul, which was prompted by a flood of AI-generated submissions. That overhaul asks for concise reproducers instead of long writeups generated by AI.\u003c/p\u003e\n\n\u003ch2 id=\"other-ai-assisted-vulnerability-examples-cited\"\u003eOther AI-assisted vulnerability examples cited\u003c/h2\u003e\n\n\u003cp\u003eThe article places the depthfirst and Chrome developments in a broader pattern of AI-assisted vulnerability discovery and reporting. It cites Google’s Big Sleep agent, which reported several FFmpeg bugs last year that are now visible on FFmpeg’s security page with the BIGSLEEP tag.\u003c/p\u003e\n\n\u003cp\u003eThe article also references Anthropic’s Mythos model, which found a 16-year-old H.264 flaw and other FFmpeg bugs for about $10,000. According to the article, three of those issues shipped in FFmpeg 8.1.\u003c/p\u003e\n\n\u003cp\u003eAnother autonomous tool reportedly found an authenticated remote code execution issue in Redis that had been present since version 7.2.0 and unnoticed for more than two years. The article also cites a February study in which an agent reproduced working proofs of concept for more than half of 100 real Linux kernel N-day bugs, beating fuzzing.\u003c/p\u003e\n\n\u003ch2 id=\"affected-software-and-stakeholders\"\u003eAffected software and stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe directly discussed affected software includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFFmpeg, including components such as parsers, demuxers, the TS demuxer, the VP9 decoder, service-description-table code, and AV1-over-RTP ingestion paths.\u003c/li\u003e\n\u003cli\u003eGoogle Chrome 149.\u003c/li\u003e\n\u003cli\u003eThe ANGLE graphics engine in Chrome.\u003c/li\u003e\n\u003cli\u003eRedis, in a separate cited example involving an authenticated RCE.\u003c/li\u003e\n\u003cli\u003eLinux kernel N-day bugs, in a cited February study.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe named organizations and entities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edepthfirst, which reported the 21 FFmpeg zero-days.\u003c/li\u003e\n\u003cli\u003eGoogle, which released Chrome 149 and previously overhauled its bounty program.\u003c/li\u003e\n\u003cli\u003eFFmpeg, whose project code and security page are referenced.\u003c/li\u003e\n\u003cli\u003eAnthropic, whose Mythos model is cited for earlier FFmpeg findings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not identify malicious threat actors behind these events. The actors discussed are security researchers, vendors, autonomous tools, and AI agents involved in vulnerability discovery, reporting, and patching.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended response\u003c/h2\u003e\n\n\u003cp\u003eFor FFmpeg, the article recommends pulling the fixed upstream build or applying distribution security updates as soon as they become available. It specifically says to prioritize environments that ingest untrusted RTSP or AV1-over-RTP. It also warns that FFmpeg is widely bundled in media pipelines, Python wheels, container images, and appliances, so updating only system packages is not enough.\u003c/p\u003e\n\n\u003cp\u003eFor Chrome, the article recommends updating to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e149.0.7827.53 on Linux.\u003c/li\u003e\n\u003cli\u003e149.0.7827.53 or 149.0.7827.54 on Windows and macOS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also recommends confirming that Chrome auto-update has run. More broadly, it calls for shorter patch cycles, auto-update wherever available, and treating dependency bumps that carry CVE fixes as security work rather than routine maintenance.\u003c/p\u003e\n\n\u003ch2 id=\"main-significance\"\u003eMain significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main conclusion is that AI has made vulnerability discovery cheaper and faster, but remediation has not accelerated in the same way. It says the hard work is shifting toward triaging reports, shipping fixes, and getting patches installed. Much of that work still falls to volunteers and a thin layer of human triagers who are now expected to keep pace with machines.\u003c/p\u003e\n","keyPoints":["Security startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg that were found by an autonomous AI agent, with the run costing about $1,000.","Several of the FFmpeg bugs had existed for 15 to 20 years, including a stack overflow in service-description-table code dating to 2003.","G
