<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--accept); border-color: var(--accept); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--cyan);   border-color: var(--cyan); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

window.__DL_ARTICLES = [{"n":3,"title":"Drupal Core SQL Injection Bug Actively Exploited, Added to CISA KEV","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/drupal-core-sql-injection-bug-actively.html","time":"07:23","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical Drupal Core SQL injection flaw (CVE-2026-9082) is under active exploitation, and organizations should urgently apply the available patches to prevent privilege escalation and remote code execution.","briefOverview":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has added CVE-2026-9082, a critical SQL injection vulnerability in Drupal Core, to its Known Exploited Vulnerabilities catalog after confirming active exploitation. The flaw, rated CVSS 6.5, could allow privilege escalation and remote code execution through specially crafted requests abusing the database abstraction API. Exploitation was detected less than two days after Drupal released patches.\u003c/p\u003e\n\n\u003cp\u003ePatches are available for Drupal 11.x, 10.x series (down to 10.4.10), while Drupal 9.5 and 8.9 require manual patching. Drupal updated its advisory on May 22, 2026, acknowledging exploit attempts in the wild. Imperva reported over 15,000 attack attempts against nearly 6,000 sites across 65 countries, with activity currently dominated by reconnaissance.\u003c/p\u003e\n\n\u003cp\u003eThe observed probing focuses on identifying Drupal sites with PostgreSQL backends, particularly targeting gaming and financial services sites (nearly 50% of attacks). Although immediate goals appear to be validation, the nature of the vulnerability means attackers could quickly pivot to data extraction or privilege escalation. Federal Civilian Executive Branch agencies are urged to apply fixes by May 27, 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has added CVE-2026-9082, a SQL injection vulnerability in Drupal Core, to its Known Exploited Vulnerabilities catalog based on evidence of active exploitation. The flaw, which carries a CVSS score of 6.5, affects all supported Drupal Core versions and could enable privilege escalation and remote code execution via specially crafted requests sent with the database abstraction API.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability\u0026rsquo;s discovery and exploitation timeline is extremely compressed: exploit activity was identified less than two days after Drupal released patches. Drupal\u0026rsquo;s own advisory update on May 22, 2026, confirmed that \u0026ldquo;exploit attempts are now being detected in the wild.\u0026rdquo; The speed of weaponization underscores the critical nature of this SQL injection issue.\u003c/p\u003e\n\n\u003cp\u003eThales-owned Imperva provided concrete attack telemetry, reporting over 15,000 attack attempts targeting almost 6,000 individual sites across 65 countries. Notably, the attacks are heavily concentrated on gaming and financial services websites, which together account for almost 50% of all observed attempts. Current activity primarily consists of probing and reconnaissance, aiming to identify exposed Drupal instances running vulnerable PostgreSQL-backed configurations.\u003c/p\u003e\n\n\u003cp\u003eWhile the observed activity is currently limited to validation and scanning, Imperva warns that the vulnerability\u0026rsquo;s severity means successful exploitation could rapidly transition from reconnaissance to data extraction or privilege escalation. No specific threat actors or end goals have been identified yet.\u003c/p\u003e\n\n\u003cp\u003ePatches are available for Drupal 11.3.10, 11.2.12, 11.1.10, 10.6.9, 10.5.10, and 10.4.10. Drupal 9.5 and 8.9 users must apply manual patches, potentially leaving a larger attack surface. Federal Civilian Executive Branch agencies have been advised to apply the updates by May 27, 2026, for optimal protection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"summary\"\u003eSummary\u003c/h2\u003e\n\n\u003cp\u003eOn May 22, 2026, CISA added CVE-2026-9082, a critical SQL injection vulnerability in Drupal Core, to its Known Exploited Vulnerabilities (KEV) catalog following confirmation of active exploitation. The flaw, rated CVSS 6.5, allows privilege escalation and remote code execution via the database abstraction API. Drupal released patches only days earlier, and Imperva observed over 15,000 attack attempts across 65 countries. Federal agencies are urged to patch by May 27, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE\u003c/strong\u003e: CVE-2026-9082\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVSS Score\u003c/strong\u003e: 6.5\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eType\u003c/strong\u003e: SQL injection\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAffected Software\u003c/strong\u003e: All supported versions of Drupal Core\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttack Vector\u003c/strong\u003e: Specially crafted requests sent with the database abstraction API\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImpact\u003c/strong\u003e: Privilege escalation and remote code execution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-activity\"\u003eExploitation Activity\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eExploitation detected less than two days after Drupal released fixes.\u003c/li\u003e\n\u003cli\u003eDrupal advisory updated on May 22, 2026: \u0026ldquo;exploit attempts are now being detected in the wild.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eImperva observed:\n\n\u003cul\u003e\n\u003cli\u003eOver 15,000 attack attempts\u003c/li\u003e\n\u003cli\u003eTargeting almost 6,000 individual sites\u003c/li\u003e\n\u003cli\u003eAcross 65 countries\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eIndustry focus:\n\n\u003cul\u003e\n\u003cli\u003eGaming and financial services sites collectively account for almost 50% of attacks.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eNature of activity:\n\n\u003cul\u003e\n\u003cli\u003e\u0026ldquo;Most of the observed activity so far appears to be probing.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eAttackers and scanners are attempting to identify exposed Drupal sites with vulnerable PostgreSQL-backed configurations.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003ePotential evolution: \u0026ldquo;the nature of the vulnerability means successful exploitation could quickly move from probing to data extraction or privilege escalation.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eEnd goals and specific exploitation methods are currently unknown.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"patches-and-mitigation\"\u003ePatches and Mitigation\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAvailable patches\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eDrupal 11.3.10\u003c/li\u003e\n\u003cli\u003eDrupal 11.2.12\u003c/li\u003e\n\u003cli\u003eDrupal 11.1.10\u003c/li\u003e\n\u003cli\u003eDrupal 10.6.9\u003c/li\u003e\n\u003cli\u003eDrupal 10.5.10\u003c/li\u003e\n\u003cli\u003eDrupal 10.4.10\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eManual patching required\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eDrupal 9.5\u003c/li\u003e\n\u003cli\u003eDrupal 8.9\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cisa-kev-addition-and-federal-directive\"\u003eCISA KEV Addition and Federal Directive\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCISA added the flaw to the Known Exploited Vulnerabilities catalog.\u003c/li\u003e\n\u003cli\u003eFederal Civilian Executive Branch (FCEB) agencies recommended to apply fixes by May 27, 2026.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CISA added the Drupal Core SQL injection vulnerability CVE-2026-9082 to its Known Exploited Vulnerabilities catalog because of active exploitation.","The flaw allows privilege escalation and remote code execution via specially crafted requests sent with the database abstraction API.","Drupal released patches for multiple supported versions, while Drupal 9.5 and 8.9 require manual patching.","Imperva observed over 15,000 attack attempts targeting nearly 6,000 sites across 65 countries, primarily focused on reconnaissance and validation.","Federal Civilian Executive Branch agencies have been recommended to apply the fixes by May 27, 2026."],"insights":["The vulnerability transitioned from patch release to active exploitation in under two days, highlighting the speed at which attackers can weaponize disclosed flaws.","Attackers are disproportionately focusing on gaming and financial services websites, which together account for nearly half of all observed attack attempts.","Current exploit activity is dominated by reconnaissance aimed at identifying Drupal sites with PostgreSQL backends, indicating the SQL injection may depend on the database configuration and that more destructive attacks could be imminent.","Organizations still running Drupal 9.5 or 8.9 must apply manual patches, creating a potential security gap for those unable to quickly perform custom updates."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/22/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article states that CISA added CVE-2026-9082 to its Known Exploited Vulnerabilities catalog based on evidence of active exploitation."},{"title":"Drupal core - Highly critical - SQL injection - SA-CORE-2026-004","url":"https://www.drupal.org/sa-core-2026-004","publisher":"Drupal","context":"The article notes that Drupal updated its advisory on May 22, 2026, acknowledging exploit attempts in the wild."},{"title":"Imperva Customers Protected Against CVE-2026-9082 in Drupal Core","url":"https://www.imperva.com/blog/imperva-customers-protected-against-cve-2026-9082-in-drupal-core/","publisher":"Imperva (Thales)","context":"The article quotes Imperva reporting over 15,000 attack attempts targeting almost 6,000 sites across 65 countries, with activity mainly probing."}],"body":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has added CVE-2026-9082, a critical SQL injection vulnerability in Drupal Core, to its Known Exploited Vulnerabilities catalog after confirming active exploitation. The flaw, rated CVSS 6.5, could allow privilege escalation and remote code execution through specially crafted requests abusing the database abstraction API. Exploitation was detected less than two days after Drupal released patches.\u003c/p\u003e\n\n\u003cp\u003ePatches are available for Drupal 11.x, 10.x series (down to 10.4.10), while Drupal 9.5 and 8.9 require manual patching. Drupal updated its advisory on May 22, 2026, acknowledging exploit attempts in the wild. Imperva reported over 15,000 attack attempts against nearly 6,000 sites across 65 countries, with activity currently dominated by reconnaissance.\u003c/p\u003e\n\n\u003cp\u003eThe observed probing focuses on identifying Drupal sites with PostgreSQL backends, particularly targeting gaming and financial services sites (nearly 50% of attacks). Although immediate goals appear to be validation, the nature of the vulnerability means attackers could quickly pivot to data extraction or privilege escalation. Federal Civilian Executive Branch agencies are urged to apply fixes by May 27, 2026.\u003c/p\u003e\n"},{"n":6,"title":"LiteSpeed cPanel Plugin CVE-2026-48172 Exploited to Run Scripts as Root","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/litespeed-cpanel-plugin-cve-2026-48172.html","time":"07:35","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical vulnerability (CVE-2026-48172) in the LiteSpeed cPanel plugin is being actively exploited to run arbitrary scripts as root, demanding immediate patching or uninstallation of the user-end plugin.","briefOverview":"\u003cp\u003eThe LiteSpeed User-End cPanel Plugin contains a maximum-severity vulnerability (CVE-2026-48172, CVSS 10.0) that allows any cPanel user to execute arbitrary scripts with root privileges via the \u003ccode\u003elsws.redisAble\u003c/code\u003e function. This incorrect privilege assignment flaw affects plugin versions 2.3 through 2.4.4 and is actively being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe issue has been patched in cPanel plugin version 2.4.5, and a subsequent security review uncovered additional attack vectors in both cPanel and WHM plugins. As a result, LiteSpeed released cPanel plugin version 2.4.7 bundled with WHM plugin version 5.3.1.0. Administrators are urged to upgrade immediately or, if patching is not possible, uninstall the user-end plugin entirely using the provided command. The vendor also supplied a grep-based indicator of compromise to detect potential exploitation attempts from logs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical security vulnerability, assigned CVE-2026-48172 with the maximum CVSS score of 10.0, affects the LiteSpeed User-End cPanel Plugin. The flaw stems from incorrect privilege assignment, enabling any cPanel user—including an attacker with a compromised account—to exploit the \u003ccode\u003elsws.redisAble\u003c/code\u003e function and run arbitrary scripts as the root user. This vulnerability is present in all plugin versions from 2.3 up to and including 2.4.4.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed Technologies confirmed that the vulnerability is under active exploitation, though no additional details on threat actors or attack patterns were disclosed. The vendor provided an indicator of compromise in the form of a grep command that searches cPanel logs for the specific API function call \u003ccode\u003ecpanel_jsonapi_func=redisAble\u003c/code\u003e. If the command returns no output, the server is considered unaffected; otherwise, administrators must review the associated IP addresses and block any that are not legitimate.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered by researcher David Strydom and fixed in cPanel plugin version 2.4.5. A follow-up security review of both cPanel and WHM plugins uncovered additional potential attack vectors, prompting the release of cPanel plugin version 2.4.7 bundled with WHM plugin version 5.3.1.0. While the initial advisory noted that the WHM plugin was not impacted, the broader review underscores a wider exposure.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed strongly recommends upgrading to WHM plugin version 5.3.1.0 or higher. As an immediate alternative for those unable to patch promptly, the user-end cPanel plugin can be removed using a single uninstall command. The urgency of this mitigation is heightened by the active exploitation and the ease with which any cPanel user can pivot to root access.\u003c/p\u003e\n\n\u003cp\u003eThis disclosure comes shortly after another critical cPanel vulnerability (CVE-2026-41940, CVSS 9.8) was found to be actively exploited by unknown threat actors to distribute Mirai botnet variants and a ransomware strain called Sorry. The recurrence of severe cPanel-related vulnerabilities within weeks highlights a concentrated period of risk for systems running these plugins.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports on the active exploitation of a maximum-severity vulnerability in the LiteSpeed User-End cPanel Plugin. Tracked as CVE-2026-48172 with a CVSS score of 10.0, the flaw allows any cPanel user to execute arbitrary scripts as root, representing a complete privilege escalation.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability is an incorrect privilege assignment that exposes the \u003ccode\u003elsws.redisAble\u003c/code\u003e function.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eBy exploiting this function, any cPanel user—including an attacker or a compromised account—can run arbitrary scripts with elevated (root) permissions.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eThe flaw affects all versions of the LiteSpeed cPanel plugin between 2.3 and 2.4.4.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eThe WHM plugin was initially stated as not impacted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-versions-and-patch\"\u003eAffected Versions and Patch\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eVulnerable versions: cPanel plugin 2.3 to 2.4.4.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eThe issue was addressed in cPanel plugin version 2.4.5.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eSecurity researcher David Strydom is credited with discovery and reporting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"active-exploitation-and-indicators-of-compromise\"\u003eActive Exploitation and Indicators of Compromise\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eLiteSpeed confirmed the vulnerability is being actively exploited in the wild.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eNo additional details on attackers or campaigns were provided.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eThe vendor supplied a specific indicator of compromise: a grep command that searches cPanel logs for the string \u003ccode\u003ecpanel_jsonapi_func=redisAble\u003c/code\u003e.\u003cbr\u003e\n\n\n\u003cul\u003e\n\u003cli\u003eCommand: \u003ccode\u003egrep -rE \u0026quot;cpanel_jsonapi_func=redisAble\u0026quot; /var/cpanel/logs /usr/local/cpanel/logs/ 2\u0026gt;/dev/null\u003c/code\u003e\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eNo output means the server is not affected.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eIf output is present, administrators should verify the listed IP addresses and block any that are not legitimate.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-security-patches-and-mitigation\"\u003eAdditional Security Patches and Mitigation\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eFollowing a security review of both the cPanel and WHM plugins in the wake of the vulnerability, additional potential attack vectors were discovered and patched.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eThis resulted in the release of cPanel plugin version 2.4.7, which is bundled with WHM plugin version 5.3.1.0.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eRecommended action: upgrade to LiteSpeed WHM Plugin version 5.3.1.0 or higher, which includes cPanel plugin v2.4.7.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eIf immediate patching is not feasible, the user-end plugin can be uninstalled entirely using the command:\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/usr/local/lsws/admin/misc/lscmctl cpanelplugin --uninstall\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThis disclosure comes weeks after a critical cPanel vulnerability, CVE-2026-41940 (CVSS 9.8), was identified as actively exploited by unknown threat actors to deploy Mirai botnet variants and a ransomware strain called Sorry.\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003eThe close succession of severe cPanel-plugin vulnerabilities underscores a period of heightened risk for servers using these components and the potential for rapid weaponization.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A maximum-severity vulnerability (CVE-2026-48172) in the LiteSpeed User-End cPanel Plugin allows any cPanel user to execute arbitrary scripts with root privileges.","The flaw impacts plugin versions 2.3 through 2.4.4 and has been patched in version 2.4.5.","The vulnerability is being actively exploited in the wild.","LiteSpeed provided a specific grep command as an indicator of compromise to help identify potential exploitation.","Additional attack vectors were patched in cPanel plugin version 2.4.7, bundled with WHM plugin version 5.3.1.0."],"insights":["The indicator of compromise is a simple grep command that searches for a specific API function call in cPanel logs, enabling rapid self-assessment for exploitation.","Although the initial advisory stated the WHM plugin was unaffected, a post-incident security review uncovered additional attack vectors in both the cPanel and WHM plugins, revealing a wider exposure.","LiteSpeed’s recommendation to uninstall the user-end plugin entirely as an alternative to immediate patching underscores the severity of the active exploitation and the risk of delay."],"referencedReports":[{"title":"Security Update for LiteSpeed cPanel Plugin","url":"https://blog.litespeedtech.com/2026/05/21/security-update-for-litespeed-cpanel-plugin/","publisher":"LiteSpeed Technologies","context":"The article cites this vendor advisory as the source for vulnerability details, affected versions, and recommended mitigation steps."}],"body":"\u003cp\u003eThe LiteSpeed User-End cPanel Plugin contains a maximum-severity vulnerability (CVE-2026-48172, CVSS 10.0) that allows any cPanel user to execute arbitrary scripts with root privileges via the \u003ccode\u003elsws.redisAble\u003c/code\u003e function. This incorrect privilege assignment flaw affects plugin versions 2.3 through 2.4.4 and is actively being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe issue has been patched in cPanel plugin version 2.4.5, and a subsequent security review uncovered additional attack vectors in both cPanel and WHM plugins. As a result, LiteSpeed released cPanel plugin version 2.4.7 bundled with WHM plugin version 5.3.1.0. Administrators are urged to upgrade immediately or, if patching is not possible, uninstall the user-end plugin entirely using the provided command. The vendor also supplied a grep-based indicator of compromise to detect potential exploitation attempts from logs.\u003c/p\u003e\n"},{"n":8,"title":"Laravel-Lang Supply Chain Attack: Every Tag Across Multiple Composer Packages Rewritten to Steal CI Secrets","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/laravel-lang-supply-chain-attack","time":"01:35","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"An attacker rewrote every git tag across four Laravel-Lang Composer packages to inject a malicious autoloaded payload that silently steals CI secrets and environment variables, making all version tags unsafe regardless of pinning unless a pre-attack commit hash is used.","briefOverview":"\u003cp\u003eOn May 22, 2026, a threat actor compromised four Composer packages maintained by the Laravel-Lang organization by rewriting every existing git tag to point at malicious commits. Each commit added \u003ccode\u003esrc/helpers.php\u003c/code\u003e to the Composer \u003ccode\u003eautoload.files\u003c/code\u003e map, causing the payload to execute immediately whenever any dependent application booted, without requiring any class instantiation or function call. The payload contacted \u003ccode\u003eflipboxstudio.info\u003c/code\u003e, dropped hidden PHP and ELF artifacts in \u003ccode\u003e/tmp\u003c/code\u003e, exfiltrated CI runner environment data, and then deleted its own files to hinder forensic analysis.\u003c/p\u003e\n\n\u003cp\u003eThe attack made every tag across \u003ccode\u003elaravel-lang/lang\u003c/code\u003e, \u003ccode\u003elaravel-lang/http-statuses\u003c/code\u003e, \u003ccode\u003elaravel-lang/actions\u003c/code\u003e, and \u003ccode\u003elaravel-lang/attributes\u003c/code\u003e unsafe, regardless of version pinning, because the tags themselves were moved. Only pre-attack commit hashes verified against a trusted source remain safe, and any project that ran a Composer install or update after the attack window must rotate all secrets that were accessible to the affected environment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA single threat actor executed a broad supply chain attack against the Laravel-Lang package ecosystem on May 22, 2026, rewriting every git tag in four repositories to point at malicious commits. The attacker did not publish a new version; instead, they force-pushed new commits under the tags, so any project using version constraints (e.g., \u003ccode\u003e^3.4\u003c/code\u003e, \u003ccode\u003e~2.0\u003c/code\u003e) and running \u003ccode\u003ecomposer update\u003c/code\u003e would resolve to a poisoned release. The malicious commits all used the fake author identity \u0026ldquo;Your Name\u0026rdquo; with email \u003ccode\u003eyou@example.com\u003c/code\u003e and modified only \u003ccode\u003ecomposer.json\u003c/code\u003e and \u003ccode\u003esrc/helpers.php\u003c/code\u003e, adding the latter to Composer\u0026rsquo;s eager \u003ccode\u003eautoload.files\u003c/code\u003e map.\u003c/p\u003e\n\n\u003cp\u003eThe payload in \u003ccode\u003esrc/helpers.php\u003c/code\u003e fetched a second stage from the typosquat domain \u003ccode\u003eflipboxstudio.info\u003c/code\u003e, saved it under a hidden filename in the system cache directory, and executed it in a backgrounded process. The stage then dropped a hidden PHP loader and an ELF binary into \u003ccode\u003e/tmp\u003c/code\u003e, exfiltrated sensitive environment data (likely including \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e and other secrets), and removed the dropped artifacts within seconds to avoid detection. The orphaned processes, now reparented to init, continued running, making the network calls to the C2 the most reliable detection indicator.\u003c/p\u003e\n\n\u003cp\u003eAnalysis using Harden-Runner in audit mode confirmed end-to-end exploitation: an autoload step triggered a GET request to download the payload, followed by a POST to exfiltrate data, all while the implant processes survived beyond the workflow step. The four affected packages — \u003ccode\u003elaravel-lang/lang\u003c/code\u003e (the core translations package with 502 tags), \u003ccode\u003elaravel-lang/http-statuses\u003c/code\u003e, \u003ccode\u003elaravel-lang/actions\u003c/code\u003e, and \u003ccode\u003elaravel-lang/attributes\u003c/code\u003e — share the same malicious commit structure and timeline, indicating a single compromised credential with organization-wide push access.\u003c/p\u003e\n\n\u003cp\u003eThe impact is severe because no tagged version can be trusted; every tag from the earliest to the latest was moved. Recovery requires inspecting \u003ccode\u003ecomposer.lock\u003c/code\u003e for the listed imposter commit SHAs, rotating all secrets exposed to any runner or developer machine where the package was installed after the attack window, and auditing for orphaned processes or network calls to \u003ccode\u003eflipboxstudio.info\u003c/code\u003e. The author reported the compromise to Laravel-Lang maintainers and recommended revoking all credentials, notifying Packagist, and restoring tags from reputable clones or the dist mirror.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn May 22, 2026, a single threat actor compromised four popular Composer packages maintained by the Laravel-Lang organization. Rather than introducing a new malicious version, the attacker rewrote every existing git tag in each repository to point at a new malicious commit. The affected packages are \u003ccode\u003elaravel-lang/lang\u003c/code\u003e (the flagship Laravel translations package with 502 tags), \u003ccode\u003elaravel-lang/http-statuses\u003c/code\u003e, \u003ccode\u003elaravel-lang/actions\u003c/code\u003e, and \u003ccode\u003elaravel-lang/attributes\u003c/code\u003e. All tag rewrites occurred between 22:32 UTC on May 22 and 00:00 UTC on May 23, and each malicious commit is signed with the fake author name \u0026ldquo;Your Name\u0026rdquo; and email \u003ccode\u003eyou@example.com\u003c/code\u003e, strongly indicating a single compromised credential with organization-wide push access.\u003c/p\u003e\n\n\u003ch2 id=\"attack-mechanism\"\u003eAttack Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe attacker manipulated Composer\u0026rsquo;s autoloading behavior. Each malicious commit added \u003ccode\u003esrc/helpers.php\u003c/code\u003e to the \u003ccode\u003eautoload.files\u003c/code\u003e map in \u003ccode\u003ecomposer.json\u003c/code\u003e, a mode that eagerly requires the listed file the moment \u003ccode\u003evendor/autoload.php\u003c/code\u003e is loaded. Since every Laravel and Symfony application (and most PHP frameworks) include this autoloader at startup, the payload executes immediately without any explicit invocation.\u003c/p\u003e\n\n\u003cp\u003eThe contents of \u003ccode\u003esrc/helpers.php\u003c/code\u003e act as a dropper: they construct a URL (\u003ccode\u003ehttps://flipboxstudio.info/payload\u003c/code\u003e), fetch a second stage, write it to a hidden temporary file with a random hex name, and execute it in a backgrounded PHP process using \u003ccode\u003e@exec(\u0026quot;php \\\u0026quot;$f\\\u0026quot; \u0026gt; /dev/null 2\u0026gt;\u0026amp;1 \u0026amp;\u0026quot;)\u003c/code\u003e. The second stage then drops a hidden PHP loader and an ELF binary into \u003ccode\u003e/tmp\u003c/code\u003e, both under random hexadecimal names, and causes them to exfiltrate environment data via a POST to \u003ccode\u003ehttps://flipboxstudio.info/exfil\u003c/code\u003e before deleting the dropper files from disk. The entire compromise, from initial autoload to self-deletion, completes in roughly 3 seconds.\u003c/p\u003e\n\n\u003ch2 id=\"technical-evidence-and-detection\"\u003eTechnical Evidence and Detection\u003c/h2\u003e\n\n\u003cp\u003eThe article details a live detonation of \u003ccode\u003elaravel-lang/http-statuses\u003c/code\u003e v3.4.5 inside an isolated GitHub Actions runner monitored by Harden-Runner. Key observations from that run include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA PHP process (the autoload step) spawning a background \u003ccode\u003esh\u003c/code\u003e wrapper that launched the PHP loader and then exited, causing the loader and the subsequent ELF binary to be reparented to init (PID 1).\u003c/li\u003e\n\u003cli\u003eTwo network calls: a GET to \u003ccode\u003e/payload\u003c/code\u003e (fetching the second stage) and a POST to \u003ccode\u003e/exfil\u003c/code\u003e (exfiltrating data).\u003c/li\u003e\n\u003cli\u003eThe dropper files (\u003ccode\u003e/tmp/.laravel_locale/\u0026lt;random\u0026gt;.php\u003c/code\u003e and \u003ccode\u003e/tmp/.\u0026lt;random\u0026gt;\u003c/code\u003e ELF) were deleted within 2 seconds of creation, leaving the orphaned processes as the only runtime evidence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIndicators of compromise identified in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetwork: DNS and HTTPS traffic to \u003ccode\u003eflipboxstudio.info\u003c/code\u003e (a typosquat of \u003ccode\u003eflipboxstudio.com\u003c/code\u003e).\u003c/li\u003e\n\u003cli\u003eFilesystem: \u003ccode\u003e/tmp/.laravel_locale/\u0026lt;12 hex chars\u0026gt;.php\u003c/code\u003e and \u003ccode\u003e/tmp/.\u0026lt;8 hex chars\u0026gt;\u003c/code\u003e (ELF binary), though these self-delete quickly.\u003c/li\u003e\n\u003cli\u003eProcess: Orphaned \u003ccode\u003ephp\u003c/code\u003e and unnamed ELF processes with parent PID 1.\u003c/li\u003e\n\u003cli\u003eGit: Commits with author \u0026ldquo;Your Name\u0026rdquo; / \u003ccode\u003eyou@example.com\u003c/code\u003e, timestamps within the attack window, and diffs touching only \u003ccode\u003ecomposer.json\u003c/code\u003e and \u003ccode\u003esrc/helpers.php\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause the tags themselves were moved, every version — including historical releases — is poisoned. Only projects whose \u003ccode\u003ecomposer.lock\u003c/code\u003e pins a pre-attack commit SHA (and that SHA is not one of the listed imposter commits) are safe as long as they only run \u003ccode\u003ecomposer install\u003c/code\u003e with that lockfile.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-affected-versions\"\u003eImpact and Affected Versions\u003c/h2\u003e\n\n\u003cp\u003eAll tags across the four repositories were rewritten. The article lists specific compromised commit SHAs for example versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003elaravel-lang/lang\u003c/code\u003e: 15.29.5, 15.29.1, 2.0.4, 1.0.2, and every other of its 502 tags.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elaravel-lang/http-statuses\u003c/code\u003e: v3.4.5, v3.4.0, v3.0.0, v2.0.0, v1.0.0, and all intermediate tags.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elaravel-lang/actions\u003c/code\u003e: 1.12.2, 1.10.0, 1.0.0, and all 46 tags.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elaravel-lang/attributes\u003c/code\u003e: v2.4.1, 2.6.0, 2.5.0, and all 86 tags.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAny project that ran \u003ccode\u003ecomposer update\u003c/code\u003e or \u003ccode\u003ecomposer install\u003c/code\u003e with these packages on or after 2026-05-22 22:32 UTC may be compromised. The payload exfiltrates environment variables, meaning CI tokens (\u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, cloud credentials, deploy keys, database credentials) must be rotated immediately.\u003c/p\u003e\n\n\u003ch2 id=\"recovery-and-remediation\"\u003eRecovery and Remediation\u003c/h2\u003e\n\n\u003cp\u003eThe article prescribes the following recovery steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHalt all \u003ccode\u003ecomposer update\u003c/code\u003e and \u003ccode\u003ecomposer install\u003c/code\u003e operations for affected packages.\u003c/li\u003e\n\u003cli\u003eInspect \u003ccode\u003ecomposer.lock\u003c/code\u003e files; if any locked commit matches an imposter SHA, treat the project as compromised.\u003c/li\u003e\n\u003cli\u003eRotate all secrets accessible to any environment that installed the package after the attack window.\u003c/li\u003e\n\u003cli\u003eCheck for orphaned \u003ccode\u003ephp\u003c/code\u003e and unnamed ELF processes with \u003ccode\u003eppid=1\u003c/code\u003e, and look for lingering artifacts in \u003ccode\u003e/tmp\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIf using Harden-Runner, search for detections of \u003ccode\u003eflipboxstudio.info\u003c/code\u003e across the tenant to identify compromised runs.\u003c/li\u003e\n\u003cli\u003eBlock \u003ccode\u003eflipboxstudio.info\u003c/code\u003e at the egress, DNS, or firewall level.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor maintainers, the recommendations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eForce-update all tags to their original commits using the Packagist dist mirror or pre-attack clones.\u003c/li\u003e\n\u003cli\u003eAudit and rotate every credential with push access to the Laravel-Lang organization; re-enforce 2FA.\u003c/li\u003e\n\u003cli\u003eNotify Packagist and audit the rest of the organization for similar rewrites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusions\"\u003eConclusions\u003c/h2\u003e\n\n\u003cp\u003eThis incident demonstrates how tag rewriting can bypass version-pinning defenses and how a small change to Composer\u0026rsquo;s autoload configuration can achieve immediate and stealthy code execution. The self-deleting, reparented payload leaves minimal forensic evidence, making network egress monitoring the most reliable detection method. The uniform attack pattern across four repositories underscores the danger of broad-scope credentials in open-source organizations.\u003c/p\u003e\n","keyPoints":["A threat actor rewrote every existing git tag across four Laravel-Lang Composer packages to point at new malicious commits instead of publishing a new version.","Each malicious commit added src/helpers.php to the Composer autoload.files map, causing the payload to run automatically as soon as any dependent application loads its autoloader.","The payload fetches a second stage from flipboxstudio.info, drops hidden PHP and ELF artifacts in /tmp, exfiltrates CI runner environment data, and then deletes its own files from disk.","Projects that ran composer update or composer install after 2026-05-22 22:32 UTC may be compromised, and all secrets accessible to those environments should be rotated immediately.","The attacker used the fake author identity \"Your Name\" \u003cyou@example.com\u003e on every malicious commit, and the same attack pattern appeared across all four repositories."],"insights":["The attacker rewrote every git tag, not just the latest, meaning even projects pinning to specific versions like `v3.4.5` were compromised; only commit hash pinning from before the attack is safe.","The payload, its second stage, and the dropped ELF binary all self-delete within 3 seconds and then reparent to init, leaving almost no forensic trace on disk aside from network traffic to the typosquat C2 domain.","By adding a single file to Composer's `autoload.files` array, the attacker ensured the payload runs immediately on every application boot that loads the autoloader, without any function call or class instantiation required.","The attack was carried out across four major packages within 88 minutes, suggesting the actor used a single compromised credential with org-wide push access and demonstrated how rapidly a whole package ecosystem can be poisoned."],"referencedReports":[],"body":"\u003cp\u003eOn May 22, 2026, a threat actor compromised four Composer packages maintained by the Laravel-Lang organization by rewriting every existing git tag to point at malicious commits. Each commit added \u003ccode\u003esrc/helpers.php\u003c/code\u003e to the Composer \u003ccode\u003eautoload.files\u003c/code\u003e map, causing the payload to execute immediately whenever any dependent application booted, without requiring any class instantiation or function call. The payload contacted \u003ccode\u003eflipboxstudio.info\u003c/code\u003e, dropped hidden PHP and ELF artifacts in \u003ccode\u003e/tmp\u003c/code\u003e, exfiltrated CI runner environment data, and then deleted its own files to hinder forensic analysis.\u003c/p\u003e\n\n\u003cp\u003eThe attack made every tag across \u003ccode\u003elaravel-lang/lang\u003c/code\u003e, \u003ccode\u003elaravel-lang/http-statuses\u003c/code\u003e, \u003ccode\u003elaravel-lang/actions\u003c/code\u003e, and \u003ccode\u003elaravel-lang/attributes\u003c/code\u003e unsafe, regardless of version pinning, because the tags themselves were moved. Only pre-attack commit hashes verified against a trusted source remain safe, and any project that ran a Composer install or update after the attack window must rotate all secrets that were accessible to the affected environment.\u003c/p\u003e\n"},{"n":7,"title":"Claude Mythos AI Finds 10,000 High-Severity Flaws in Widely Used Software","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/claude-mythos-ai-finds-10000-high.html","time":"11:55","priority":"MUST READ","score":93,"group":null,"groupColor":null,"tldr":"Anthropic's Project Glasswing found over 10,000 high-severity vulnerabilities in widely used software using their Claude Mythos AI, highlighting that AI-driven flaw discovery is rapidly outpacing defenders' ability to patch and forcing an urgent acceleration of security update cycles.","briefOverview":"\u003cp\u003eAnthropic recently disclosed that its Project Glasswing initiative, using the Claude Mythos Preview AI model, has discovered over 10,000 high- or critical-severity vulnerabilities across systemically important software in its first month of operation. The effort, which granted about 50 partners early access to the model, surfaced 6,202 high- or critical-severity flaws in more than 1,000 open-source projects, of which 1,726 were confirmed as true positives and 1,094 assessed as high or critical severity.\u003c/p\u003e\n\n\u003cp\u003eThe findings underscore a profound shift in cybersecurity: AI models can now find vulnerabilities at unprecedented speed and scale, far outpacing the ability of defenders to patch them. One critical example is CVE-2026-5194 in WolfSSL, rated CVSS 9.1, which could allow an attacker to forge certificates and impersonate legitimate services. So far, 97 findings have been patched upstream and 88 advisories have been published.\u003c/p\u003e\n\n\u003cp\u003eBeyond code analysis, the model demonstrated defensive value by helping a partner bank detect and block a fraudulent $1.5 million wire transfer in real time. In response, Anthropic urges organizations to shorten patch testing cycles, harden default configurations, enforce multi-factor authentication, and maintain comprehensive logs, while also launching a Cyber Verification Program to safely provide its unguardrailed models to security professionals for legitimate research.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic’s Project Glasswing, now active for one month, leverages the Claude Mythos Preview frontier model to automatically uncover security vulnerabilities in widely used software. The project includes approximately 50 partner organizations with early access. The scale of discovery is massive: over 10,000 high- or critical-severity vulnerabilities were identified overall, with 6,202 of these affecting more than 1,000 open-source projects. Subsequent validation narrowed this to 1,726 confirmed true positives, among which 1,094 were rated high or critical severity.\u003c/p\u003e\n\n\u003cp\u003eOne noteworthy discovery is a critical flaw in WolfSSL, tracked as CVE-2026-5194 with a CVSS score of 9.1. It could enable an attacker to forge certificates and masquerade as a legitimate service, posing severe risk to trust on the internet. To date, the project has resulted in 97 upstream patches and 88 official security advisories.\u003c/p\u003e\n\n\u003cp\u003eThe surge in AI-assisted vulnerability discovery is already reshaping the software industry’s patching cadence. Microsoft has indicated that its monthly patch releases will continue trending larger for some time, and Oracle has shifted to a monthly patch cycle specifically to address critical security issues more quickly. Security firms and researchers, including XBOW, have evaluated Mythos Preview as a major advance that is substantially better than prior models at finding vulnerability candidates and adept at analyzing source code with a security mindset. Further evaluations by Cloudflare and Anthropic’s own red team show the model can chain vulnerabilities into full end-to-end attack chains.\u003c/p\u003e\n\n\u003cp\u003eAnthropic highlighted a critical asymmetry: finding vulnerabilities is far easier than fixing them, creating a major challenge for cybersecurity. To illustrate the model’s dual-use potential, a Glasswing partner bank used Mythos Preview not just for vulnerability research but to detect and block a fraudulent $1.5 million wire transfer after a threat actor compromised a customer’s email and made spoofed phone calls.\u003c/p\u003e\n\n\u003cp\u003eIn response to the accelerating threat landscape, Anthropic is calling for network defenders to radically shorten patch testing and deployment timelines, harden default configurations, enforce multi-factor authentication, and keep comprehensive logs. The company also announced a Cyber Verification Program that allows legitimate security professionals to use its models without guardrails for penetration testing, vulnerability research, and red teaming—similar to OpenAI’s Daybreak initiative. Public release of models like Mythos Preview and GPT-5.5-Cyber is currently withheld due to concerns about large-scale misuse.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eAnthropic has publicly disclosed the initial results of Project Glasswing, a cybersecurity initiative that uses its Claude Mythos Preview AI model to find vulnerabilities in systemically important software. In its first month, the project uncovered more than 10,000 high- or critical-severity vulnerabilities, marking a significant moment in the intersection of AI and cybersecurity.\u003c/p\u003e\n\n\u003ch2 id=\"the-discovery-project-glasswing-and-mythos-preview\"\u003eThe Discovery: Project Glasswing and Mythos Preview\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eProject Glasswing provided approximately 50 partners with access to Claude Mythos Preview, a frontier model specifically designed to find vulnerabilities in widely-used software.\u003c/li\u003e\n\u003cli\u003eThe effort surfaced 6,202 high- or critical-severity flaws affecting more than 1,000 open-source projects.\u003c/li\u003e\n\u003cli\u003eAfter validation, 1,726 of those vulnerability candidates were confirmed as true positives, with 1,094 assessed as high or critical severity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"specific-example-wolfssl-cve-2026-5194\"\u003eSpecific Example: WolfSSL CVE-2026-5194\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eOne critical finding is a flaw in WolfSSL, designated CVE-2026-5194 with a CVSS score of 9.1.\u003c/li\u003e\n\u003cli\u003eThe vulnerability could allow an attacker to forge certificates and masquerade as a legitimate service, posing a severe trust and integrity risk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-on-software-patching-and-industry-response\"\u003eImpact on Software Patching and Industry Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe project has already led to 97 findings being patched upstream and 88 advisories being issued.\u003c/li\u003e\n\u003cli\u003eThe broader trend of AI-assisted vulnerability discovery is driving larger patch volumes. Microsoft expects its monthly patch releases to “continue trending larger for some time,” and Oracle has shifted to a monthly patch cycle to address critical security issues faster.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evaluations-of-the-ai-model-s-capabilities\"\u003eEvaluations of the AI Model’s Capabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutonomous offensive security platform XBOW described Mythos Preview as “a major advance” that is “substantially better than prior models at finding vulnerability candidates” and “adept at analyzing source code with a security mindset.”\u003c/li\u003e\n\u003cli\u003eFurther analyses (by Cloudflare and Anthropic’s red team) found the model excels at turning individual vulnerabilities into end-to-end attack chains, significantly amplifying potential attacker impact.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"real-world-defensive-use-case\"\u003eReal-World Defensive Use Case\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eBeyond vulnerability discovery, a Glasswing partner bank used the model to detect and prevent a fraudulent $1.5 million wire transfer. The fraud originated from a breached customer email account and spoofed phone calls, and the AI helped block it in real time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"anthropic-s-recommendations-and-new-programs\"\u003eAnthropic’s Recommendations and New Programs\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic acknowledged a fundamental challenge: the relative ease of finding vulnerabilities compared with the difficulty of fixing them creates a major cybersecurity crisis. To confront this, the company urges organizations to:\n\n\u003cul\u003e\n\u003cli\u003eShorten patch testing and deployment timelines.\u003c/li\u003e\n\u003cli\u003eHarden default network configurations.\u003c/li\u003e\n\u003cli\u003eEnforce multi-factor authentication.\u003c/li\u003e\n\u003cli\u003eMaintain comprehensive logs for detection and response.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eAdditionally, Anthropic launched a Cyber Verification Program, enabling security professionals to use its models without guardrails for legitimate purposes such as vulnerability research, penetration testing, and red teaming. This mirrors OpenAI’s Daybreak initiative, which gives similar access to its GPT-5.5-Cyber model.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"responsible-release-concerns\"\u003eResponsible Release Concerns\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eModels like Mythos Preview and GPT-5.5-Cyber have not been released to the public because adequate safeguards to prevent large-scale misuse do not yet exist. The article notes a recent case of hackers using AI to develop a first-known something (the full detail is cut off but it implies misuse). Anthropic frames Glasswing as a way to give the most systemically important defenders an asymmetric advantage, while stressing the urgent need for all organizations to shore up defenses using generally available models and new tools.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Anthropic's Project Glasswing used the Claude Mythos Preview model to uncover more than 10,000 high- or critical-severity vulnerabilities across systemically important software.","Out of 6,202 high- or critical-severity flaws impacting over 1,000 open-source projects, 1,726 were validated as true positives and 1,094 were assessed as either high- or critical-severity.","One critical finding was a flaw in WolfSSL (CVE-2026-5194, CVSS score 9.1) that could allow an attacker to forge certificates and impersonate a legitimate service.","The vulnerability discovery efforts have resulted in 97 findings being patched upstream and 88 security advisories being issued.","Anthropic is urging software developers to shorten their patch testing and deployment cycles in response to the accelerating pace of AI-assisted vulnerability discovery."],"insights":["Project Glasswing uncovered over 10,000 high- or critical-severity vulnerabilities in its first month, revealing an immense hidden backlog of flaws in systemically important software.","A partner bank used Claude Mythos Preview not just for vulnerability discovery but to detect and block a fraudulent $1.5 million wire transfer in real time, demonstrating AI's immediate defensive utility beyond code analysis.","Anthropic warned that the ease of finding vulnerabilities with AI is far outpacing the difficulty of fixing them, creating a fundamental asymmetry that could overwhelm defenders.","Recent evaluations found the model can turn individual vulnerabilities into end-to-end attack chains, significantly escalating the potential impact of discovered flaws.","Oracle's shift to a monthly patch cycle and Microsoft's expectation of larger patch volumes are early signs of a permanent change in software maintenance driven by AI-assisted discovery."],"referencedReports":[{"title":"Glasswing Initial Update","url":"https://www.anthropic.com/research/glasswing-initial-update","publisher":"Anthropic","context":"Anthropic's official disclosure detailing how Project Glasswing and Claude Mythos Preview uncovered over 10,000 high- or critical-severity vulnerabilities in widely used software."},{"title":"CVE-2026-5194","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-5194","publisher":"NIST","context":"The National Vulnerability Database advisory for the critical WolfSSL certificate forgery flaw found by Project Glasswing."},{"title":"XBOW Evaluation of Mythos Preview","url":"https://xbow.com/blog/mythos-offensive-security-xbow-evaluation","publisher":"XBOW","context":"XBOW's technical evaluation describing Mythos Preview as 'substantially better than prior models at finding vulnerability candidates' and adept at security-minded source code analysis."},{"title":"Exploit Evals","url":"https://red.anthropic.com/2026/exploit-evals/","publisher":"Anthropic Red Team","context":"Recent analyses demonstrating that Mythos Preview excels at turning individual vulnerabilities into end-to-end attack chains."}],"body":"\u003cp\u003eAnthropic recently disclosed that its Project Glasswing initiative, using the Claude Mythos Preview AI model, has discovered over 10,000 high- or critical-severity vulnerabilities across systemically important software in its first month of operation. The effort, which granted about 50 partners early access to the model, surfaced 6,202 high- or critical-severity flaws in more than 1,000 open-source projects, of which 1,726 were confirmed as true positives and 1,094 assessed as high or critical severity.\u003c/p\u003e\n\n\u003cp\u003eThe findings underscore a profound shift in cybersecurity: AI models can now find vulnerabilities at unprecedented speed and scale, far outpacing the ability of defenders to patch them. One critical example is CVE-2026-5194 in WolfSSL, rated CVSS 9.1, which could allow an attacker to forge certificates and impersonate legitimate services. So far, 97 findings have been patched upstream and 88 advisories have been published.\u003c/p\u003e\n\n\u003cp\u003eBeyond code analysis, the model demonstrated defensive value by helping a partner bank detect and block a fraudulent $1.5 million wire transfer in real time. In response, Anthropic urges organizations to shorten patch testing cycles, harden default configurations, enforce multi-factor authentication, and maintain comprehensive logs, while also launching a Cyber Verification Program to safely provide its unguardrailed models to security professionals for legitimate research.\u003c/p\u003e\n"},{"n":2,"title":"Italy disrupts CINEMAGOAL piracy app that stole streaming auth codes","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/legal/italy-disrupts-cinemagoal-piracy-app-that-stole-streaming-auth-codes/","time":"14:23","priority":"SHOULD READ","score":84,"group":null,"groupColor":null,"tldr":"Italian authorities took down the CINEMAGOAL piracy app, which used stolen decryption keys from fake subscriptions to stream Netflix, Disney+, and Spotify directly to users, evading detection and causing an estimated €300 million in losses.","briefOverview":"\u003cp\u003eItalian authorities dismantled the CINEMAGOAL piracy ecosystem in an operation dubbed \u0026ldquo;Tutto Chiaro,\u0026rdquo; conducting 100 searches across Italy and seizing servers in France and Germany. The app provided users with direct access to Netflix, Disney+, Spotify, and other platforms by harvesting valid decryption keys from fake subscriptions every three minutes.\u003c/p\u003e\n\n\u003cp\u003eThe stealthy system bypassed platform security blocks, masked users\u0026rsquo; IP addresses, and delivered superior streaming quality, causing an estimated €300 million in losses. Over 70 resellers sold annual subscriptions for €40–€130, and authorities have already issued fines to the first 1,000 identified end users.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Guardia di Finanza, Italy\u0026rsquo;s financial law enforcement agency, led a large-scale anti-piracy operation called \u0026ldquo;Tutto Chiaro\u0026rdquo; that dismantled the CINEMAGOAL app ecosystem. The operation involved 200 financial police officers, 100 searches nationwide, and the seizure of servers in France and Germany that contained the app\u0026rsquo;s source code and decoding functions. A separate IPTV service known as \u0026ldquo;pezzotto\u0026rdquo; was also identified and taken down during the same action.\u003c/p\u003e\n\n\u003cp\u003eCINEMAGOAL\u0026rsquo;s technical approach was notably advanced: the app connected directly to legitimate streaming platforms and authenticated using valid decryption codes retrieved from foreign servers. These codes were captured every three minutes via virtual machines in Italy that used subscriptions opened with false identification data on Sky, DAZN, Netflix, Disney+, and Spotify. This method not only evaded standard security blocks but also provided end users with direct, high-quality streams while concealing their real IP addresses.\u003c/p\u003e\n\n\u003cp\u003eThe illegal business operated through more than 70 resellers, who sold annual subscriptions priced between €40 and €130. Payments were processed via cryptocurrency, foreign bank accounts, or accounts registered under fake names. Authorities believe the operators earned millions of euros through audiovisual piracy, unauthorized computer access, and computer fraud.\u003c/p\u003e\n\n\u003cp\u003eThe financial impact was severe: estimated damages reached approximately €300 million in unpaid subscription revenues. In response, law enforcement is not only targeting operators but also end users. The first 1,000 identified subscribers have received administrative penalties ranging from €154 to €5,000, and further identification efforts are underway as the investigation remains in a preliminary phase.\u003c/p\u003e\n\n\u003cp\u003eThe CINEMAGOAL case highlights a shift in piracy tactics—moving away from openly marketed IPTV services toward stealthy, app-based distribution that masks user identity and exploits real-time credential harvesting. This model presents new challenges for streaming platforms and law enforcement, as it combines high-quality service with difficult-to-trace infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"operation-overview\"\u003eOperation Overview\u003c/h2\u003e\n\n\u003cp\u003eItalian authorities, led by the Guardia di Finanza under the Ministry of Economy and Finance, executed a major anti-piracy operation codenamed “Tutto Chiaro” (All Clear). The operation dismantled the CINEMAGOAL piracy ecosystem, conducting 100 searches across Italy and deploying 200 financial police officers. Eurojust coordinated the international seizure of CINEMAGOAL servers located in France and Germany, which contained the app’s source code and the functions responsible for decoding protected streams. During the same action, an IPTV service referred to as “pezzotto” was also identified and dismantled.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eApp-based delivery\u003c/strong\u003e: Unlike typical IPTV services that market themselves openly, CINEMAGOAL relied on a stealthy app that customers installed on their devices.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential harvesting\u003c/strong\u003e: The app connected directly to legitimate streaming platforms (Netflix, Disney+, Spotify, Sky, DAZN) and authenticated using valid decryption keys fetched from foreign servers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReal-time key refresh\u003c/strong\u003e: Virtual machines hosted in Italy captured valid authentication and decryption codes from legitimate subscriptions every three minutes and redistributed them to customers. These subscriptions were opened using false identification data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnhanced privacy and quality\u003c/strong\u003e: Because the app streamed content directly from the service instead of relaying a pirate stream, users experienced superior video quality. The system also masked customers’ real IP addresses, shielding them from platform control systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"business-and-financial-aspects\"\u003eBusiness and Financial Aspects\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eReseller network\u003c/strong\u003e: Over 70 resellers distributed annual subscriptions, with prices ranging from €40 to €130 (\u003cspan class=\"math inline\"\u003e\\(46–\\)\u003c/span\u003e150).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePayment methods\u003c/strong\u003e: Transactions were made using cryptocurrency or sent to foreign bank accounts and accounts under fake names, making tracing difficult.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOperator profits\u003c/strong\u003e: The Guardia di Finanza estimates the operators earned millions of euros through audiovisual piracy, unauthorized computer access, and computer fraud.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-damages\"\u003eImpact and Damages\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFinancial loss\u003c/strong\u003e: The operation caused an estimated €300 million ($347 million) in unpaid subscription revenues over its operational lifetime.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnd-user penalties\u003c/strong\u003e: Authorities are actively identifying subscribers. The first 1,000 identified individuals received administrative fines ranging from €154 to €5,000 (\u003cspan class=\"math inline\"\u003e\\(179–\\)\u003c/span\u003e5,800).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInvestigation status\u003c/strong\u003e: The case remains preliminary as investigators analyze seized materials to identify all involved parties, including remaining end users, and to calculate total illegal profits.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"context-and-significance\"\u003eContext and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe CINEMAGOAL case represents a notable evolution in piracy techniques. The app-based model combined with real-time harvesting of legitimate authentication codes allowed it to bypass platform blocks, provide higher quality than conventional restreaming, and obscure user identities. This poses a new challenge for streaming platforms that rely on IP-based tracking and account-level controls. The direct fining of end users also signals a law enforcement shift toward pursuing consumers of pirate services, not just operators and resellers.\u003c/p\u003e\n","keyPoints":["Italian authorities dismantled the CINEMAGOAL piracy app, which gave users unauthorized access to streaming platforms including Netflix, Disney+, and Spotify.","The app used virtual machines in Italy to harvest valid decryption keys from subscriptions opened with false identities every three minutes, enabling direct high-quality streams that masked customers' IP addresses.","The illegal operation involved more than 70 resellers who sold annual subscriptions for €40–€130, causing an estimated €300 million in damages.","Law enforcement conducted 100 searches across Italy, seized servers in France and Germany containing the app's source code and decoding functions, and sent fines to identified end users."],"insights":["The CINEMAGOAL app uniquely masked its end users' real IP addresses, shielding them from identification — an uncommon privacy feature in a piracy service that raises the bar for user anonymity.","Italian authorities are sending fines of €154 to €5,000 directly to identified subscribers, signaling a concrete shift toward penalizing end users in addition to operators.","By harvesting fresh decryption keys every 3 minutes through virtual machines in Italy, the operation demonstrated that streaming platforms remain vulnerable to automated token refresh attacks when fake accounts can be provisioned at scale.","The service's stealthy app-based distribution model, rather than public marketing, helped it evade detection for longer, illustrating a move toward more covert and harder-to-find pirate services."],"referencedReports":[],"body":"\u003cp\u003eItalian authorities dismantled the CINEMAGOAL piracy ecosystem in an operation dubbed \u0026ldquo;Tutto Chiaro,\u0026rdquo; conducting 100 searches across Italy and seizing servers in France and Germany. The app provided users with direct access to Netflix, Disney+, Spotify, and other platforms by harvesting valid decryption keys from fake subscriptions every three minutes.\u003c/p\u003e\n\n\u003cp\u003eThe stealthy system bypassed platform security blocks, masked users\u0026rsquo; IP addresses, and delivered superior streaming quality, causing an estimated €300 million in losses. Over 70 resellers sold annual subscriptions for €40–€130, and authorities have already issued fines to the first 1,000 identified end users.\u003c/p\u003e\n"},{"n":4,"title":"Packagist Supply Chain Attack Infects 8 Packages Using GitHub-Hosted Linux Malware","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/packagist-supply-chain-attack-infects-8.html","time":"16:07","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"A supply chain attack planted malicious postinstall scripts in eight Packagist packages to download and run a Linux binary from GitHub, exploiting cross-ecosystem oversight (package.json hooks in PHP packages) to evade detection.","briefOverview":"\u003cp\u003eA coordinated supply chain attack against the PHP package repository Packagist compromised eight packages by inserting a malicious \u003ccode\u003epostinstall\u003c/code\u003e script into their \u003ccode\u003epackage.json\u003c/code\u003e files, not the expected \u003ccode\u003ecomposer.json\u003c/code\u003e. This cross-ecosystem placement allowed the attacker to target projects that bundle JavaScript tooling with PHP code and exploit the fact that many developers and security scanners overlook lifecycle hooks in bundled \u003ccode\u003epackage.json\u003c/code\u003e when auditing PHP dependencies.\u003c/p\u003e\n\n\u003cp\u003eThe malicious script silently downloads a Linux binary from a GitHub Releases URL (\u003ccode\u003egithub.com/parikhpreyash4/systemd-network-helper-aa5c751f\u003c/code\u003e), saves it to \u003ccode\u003e/tmp/.sshd\u003c/code\u003e, modifies its permissions with \u003ccode\u003echmod\u003c/code\u003e to make it executable by all users, and runs it in the background. To avoid detection, the installer disables TLS certificate verification, suppresses error messages, and executes the payload as a background process.\u003c/p\u003e\n\n\u003cp\u003eThe infected packages have since been removed from Packagist, but investigation by Socket uncovered references to the same payload across 777 files on GitHub, including at least two GitHub Actions workflow files, indicating a broader campaign targeting both developer environments and CI/CD pipelines. The GitHub account hosting the second-stage binary is no longer available, and the binary\u0026rsquo;s filename, \u003ccode\u003egvfsd-network\u003c/code\u003e, was deliberately chosen to mimic a legitimate GNOME Virtual File System daemon.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA sophisticated supply chain attack compromised eight PHP packages available on Packagist, the primary package repository for Composer. Unusually, the malicious code was not placed in \u003ccode\u003ecomposer.json\u003c/code\u003e but instead injected into \u003ccode\u003epackage.json\u003c/code\u003e \u003ccode\u003epostinstall\u003c/code\u003e lifecycle hooks. This cross-ecosystem tactic is significant because many developers and security tools that audit PHP dependencies focus solely on Composer metadata and may skip JavaScript-related build files that are bundled alongside the PHP code.\u003c/p\u003e\n\n\u003cp\u003eWhen a victim installs one of the affected packages (for example, \u003ccode\u003emoritz-sauer-13/silverstripe-cms-theme\u003c/code\u003e, \u003ccode\u003edevdojo/wave\u003c/code\u003e, \u003ccode\u003ekatanaui/katana\u003c/code\u003e, or \u003ccode\u003eelitedevsquad/sidecar-laravel\u003c/code\u003e), the \u003ccode\u003epostinstall\u003c/code\u003e script uses a command that disables TLS verification, fetches a Linux ELF binary from \u003ccode\u003egithub.com/parikhpreyash4/systemd-network-helper-aa5c751f/releases\u003c/code\u003e, writes it to the path \u003ccode\u003e/tmp/.sshd\u003c/code\u003e, changes its permissions with \u003ccode\u003echmod\u003c/code\u003e to grant execute rights to all users, and then launches the binary in the background. The script actively hides its activity by suppressing errors and working silently.\u003c/p\u003e\n\n\u003cp\u003eThe second-stage binary\u0026rsquo;s filename, \u003ccode\u003egvfsd-network\u003c/code\u003e, is a direct impersonation of the genuine GNOME Virtual File System (GVfs) daemon, a technique meant to blend into normal system processes and reduce the chance of detection. The GitHub account that hosted the repository for this binary has since been taken down, so the exact nature of the final payload remains unknown. However, Socket notes that even without the downloaded binary, the installer itself provides full remote code execution on the victim\u0026rsquo;s machine during package installation or build workflows.\u003c/p\u003e\n\n\u003cp\u003eSocket\u0026rsquo;s investigation revealed that the same malicious payload URL and script pattern appear in 777 files on GitHub, strongly suggesting a far-reaching campaign. In at least two confirmed cases, the code was inserted directly into GitHub Actions CI/CD workflow files (\u003ccode\u003eci.yml\u003c/code\u003e and \u003ccode\u003edeploy_coding.yml\u003c/code\u003e), showing the attacker was not relying on a single execution vector and was actively attempting to compromise automated build pipelines in addition to developer workstations.\u003c/p\u003e\n\n\u003cp\u003eThe affected package versions have been removed from Packagist, and the temporary nature of the GitHub-hosted payload infrastructure highlights the attacker\u0026rsquo;s operational security. Nonetheless, the incident underscores the danger of cross-ecosystem blind spots: a malicious script hidden in JavaScript tooling metadata can fully compromise a PHP project\u0026rsquo;s development environment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA coordinated supply chain attack compromised eight packages on Packagist, the main Composer repository for PHP. The attacker inserted malicious instructions into the \u003ccode\u003epackage.json\u003c/code\u003e lifecycle scripts (specifically a \u003ccode\u003epostinstall\u003c/code\u003e hook) rather than the expected \u003ccode\u003ecomposer.json\u003c/code\u003e file. This cross-ecosystem placement targeted projects that ship JavaScript build tooling alongside PHP code, exploiting the fact that many developers and security tools focus on Composer metadata and overlook \u003ccode\u003epackage.json\u003c/code\u003e when scanning PHP dependencies. The infected versions were subsequently removed from Packagist.\u003c/p\u003e\n\n\u003ch2 id=\"attack-mechanism\"\u003eAttack Mechanism\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe malicious \u003ccode\u003epostinstall\u003c/code\u003e script included in each compromised package performs the following actions at installation time:\n\n\u003col\u003e\n\u003cli\u003eConnects to \u003ccode\u003egithub.com/parikhpreyash4/systemd-network-helper-aa5c751f/releases\u003c/code\u003e to download a Linux binary.\u003c/li\u003e\n\u003cli\u003eSaves the downloaded file to the \u003ccode\u003e/tmp/.sshd\u003c/code\u003e directory.\u003c/li\u003e\n\u003cli\u003eUses \u003ccode\u003echmod\u003c/code\u003e to modify the file\u0026rsquo;s permissions, granting execute rights to all users.\u003c/li\u003e\n\u003cli\u003eRuns the binary in the background.\u003c/li\u003e\n\u003c/ol\u003e\u003c/li\u003e\n\u003cli\u003eThe script actively attempts to hide its activity by:\n\n\u003cul\u003e\n\u003cli\u003eDisabling TLS certificate verification during the download.\u003c/li\u003e\n\u003cli\u003eSuppressing standard error output.\u003c/li\u003e\n\u003cli\u003eExecuting the binary as a background process.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eEven if the second-stage payload is unavailable, the installer itself constitutes remote code execution (RCE) because it uses the victim\u0026rsquo;s network and permissions to fetch and execute arbitrary content.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-packages\"\u003eAffected Packages\u003c/h2\u003e\n\n\u003cp\u003eThe following packages and their affected versions were identified. All listed versions have since been removed from Packagist:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003emoritz-sauer-13/silverstripe-cms-theme\u003c/code\u003e (dev-master)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecrosiersource/crosierlib-base\u003c/code\u003e (dev-master)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edevdojo/wave\u003c/code\u003e (dev-main)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edevdojo/genesis\u003c/code\u003e (dev-main)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ekatanaui/katana\u003c/code\u003e (dev-main)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eelitedevsquad/sidecar-laravel\u003c/code\u003e (3.x-dev)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003er2luna/brain\u003c/code\u003e (dev-main)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebaskarcm/tzi-chat-ui\u003c/code\u003e (dev-main)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-campaign-indicators\"\u003eBroader Campaign Indicators\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eSocket\u0026rsquo;s investigation found the same payload referenced across 777 files on GitHub, implying a large-scale operation. These references may include compromised repositories, forks, package artifacts, or cached copies, but the exact breakdown is unknown.\u003c/li\u003e\n\u003cli\u003eAt least two instances were added directly to GitHub Actions workflow files:\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ehttps://github.com/448776129/UA2F/blob/master/.github/workflows/ci.yml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehttps://github.com/448776129/blog-1/blob/9ebac2e4118396b84e508585f356bf06971c4fb5/.github/workflows/deploy_coding.yml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThis demonstrates that the attacker was not relying solely on the \u003ccode\u003epostinstall\u003c/code\u003e hook; CI/CD pipeline workflow files were als
