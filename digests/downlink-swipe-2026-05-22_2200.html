o weaponized, broadening the attack surface to automated build and deployment environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"payload-details-and-obfuscation\"\u003ePayload Details and Obfuscation\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe GitHub account \u003ccode\u003eparikhpreyash4\u003c/code\u003e that hosted the second-stage payload repository is no longer accessible, so the exact nature of the \u003ccode\u003egvfsd-network\u003c/code\u003e binary could not be determined.\u003c/li\u003e\n\u003cli\u003eThe binary filename \u003ccode\u003egvfsd-network\u003c/code\u003e is a deliberate choice: it mimics the name of the legitimate GNOME Virtual File System (GVfs) daemon that handles network share browsing (\u003ccode\u003egvfsd-network\u003c/code\u003e). This masquerade technique aims to make the malicious process appear benign to system administrators and endpoint detection tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-key-takeaways\"\u003eImpact and Key Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attack provides RCE during \u003ccode\u003enpm install\u003c/code\u003e-like lifecycles when Composer packages are incorporated, thanks to the \u003ccode\u003epostinstall\u003c/code\u003e script. Even development environments that do not deploy to production are at risk.\u003c/li\u003e\n\u003cli\u003eThe cross-ecosystem hiding technique is particularly noteworthy: a malicious \u003ccode\u003epackage.json\u003c/code\u003e bundled with a PHP package can pass unnoticed by tooling that only inspects \u003ccode\u003ecomposer.json\u003c/code\u003e and \u003ccode\u003ecomposer.lock\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe attacker\u0026rsquo;s infrastructure was partially ephemeral: the GitHub account hosting the payload was disabled or removed after the campaign was discovered, but the installer alone still presents a threat.\u003c/li\u003e\n\u003cli\u003eThe removal of the infected packages from Packagist mitigates the immediate risk, but the 777 GitHub file references indicate a long tail of potentially affected repositories and forks that may still contain the malicious code in their history or as cached artifacts.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The supply chain attack impacted eight Packagist packages and inserted malicious code into package.json lifecycle hooks rather than composer.json, targeting projects that ship JavaScript build tooling alongside PHP code.","The injected postinstall script downloads a Linux binary from the GitHub Releases URL 'github.com/parikhpreyash4/systemd-network-helper-aa5c751f', saves it as '/tmp/.sshd', uses chmod to make it executable, and runs it in the background.","Socket found references to the same payload across 777 files on GitHub, including at least two instances where it was added to GitHub Actions workflow files.","The GitHub account hosting the second-stage binary is no longer available, and the malware's filename 'gvfsd-network' is chosen to mimic the legitimate GNOME Virtual File System daemon.","Even without the second-stage binary, the installer provides remote code execution and attempts to hide activity by disabling TLS verification, suppressing errors, and running the downloaded binary in the background."],"insights":["Attackers exploited a blind spot in PHP supply chain security by placing malicious code in package.json lifecycle hooks rather than composer.json, anticipating that developers and security tools would overlook JavaScript build metadata bundled with PHP packages.","The malware's filename 'gvfsd-network' was chosen to masquerade as the legitimate GNOME Virtual File System daemon, a stealth technique that reduces the likelihood of anomalous process detection.","Even after the GitHub account hosting the second-stage payload was disabled, the installer script itself provides full remote code execution, underscoring the need to detect and block the installer pattern rather than rely on infrastructure takedowns.","The same malicious payload appeared in GitHub Actions workflow files, revealing a deliberate attempt to compromise CI/CD pipelines and not just developer workstations, which increases the attack's potential scale and persistence."],"referencedReports":[{"title":"Malicious Postinstall Hook Found Across 700 GitHub Repos","url":"https://socket.dev/blog/malicious-postinstall-hook-found-across-700-github-repos","publisher":"Socket","context":"Socket's technical analysis revealing how the malicious code was inserted into package.json rather than composer.json, and that references to the same payload were found across 777 files on GitHub."}],"body":"\u003cp\u003eA coordinated supply chain attack against the PHP package repository Packagist compromised eight packages by inserting a malicious \u003ccode\u003epostinstall\u003c/code\u003e script into their \u003ccode\u003epackage.json\u003c/code\u003e files, not the expected \u003ccode\u003ecomposer.json\u003c/code\u003e. This cross-ecosystem placement allowed the attacker to target projects that bundle JavaScript tooling with PHP code and exploit the fact that many developers and security scanners overlook lifecycle hooks in bundled \u003ccode\u003epackage.json\u003c/code\u003e when auditing PHP dependencies.\u003c/p\u003e\n\n\u003cp\u003eThe malicious script silently downloads a Linux binary from a GitHub Releases URL (\u003ccode\u003egithub.com/parikhpreyash4/systemd-network-helper-aa5c751f\u003c/code\u003e), saves it to \u003ccode\u003e/tmp/.sshd\u003c/code\u003e, modifies its permissions with \u003ccode\u003echmod\u003c/code\u003e to make it executable by all users, and runs it in the background. To avoid detection, the installer disables TLS certificate verification, suppresses error messages, and executes the payload as a background process.\u003c/p\u003e\n\n\u003cp\u003eThe infected packages have since been removed from Packagist, but investigation by Socket uncovered references to the same payload across 777 files on GitHub, including at least two GitHub Actions workflow files, indicating a broader campaign targeting both developer environments and CI/CD pipelines. The GitHub account hosting the second-stage binary is no longer available, and the binary\u0026rsquo;s filename, \u003ccode\u003egvfsd-network\u003c/code\u003e, was deliberately chosen to mimic a legitimate GNOME Virtual File System daemon.\u003c/p\u003e\n"},{"n":1,"title":"CISA to allow researchers to report vulnerabilities to exploited bugs catalog","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/cisa-to-allow-researchers-to-report-vulnerabilities-kev","time":"01:11","priority":"SHOULD READ","score":80,"group":null,"groupColor":null,"tldr":"CISA is launching a new form for outside security researchers and vendors to directly nominate actively exploited vulnerabilities to its Known Exploited Vulnerabilities catalog, aiming to speed up threat detection and defensive patching.","briefOverview":"\u003cp\u003eThe Cybersecurity and Infrastructure Security Agency (CISA) launched a new nomination form and email pathway that enables external researchers, vendors, and industry partners to directly submit actively exploited vulnerabilities to its Known Exploited Vulnerabilities (KEV) catalog. The KEV catalog is an authoritative list used to mandate federal patching timelines, and it has become a key resource for defenders both inside and outside government. The new submission process aims to speed up the identification, validation, and sharing of critical threat information by crowdsourcing exploitation intelligence.\u003c/p\u003e\n\n\u003cp\u003eOrganizations remediate KEV-listed vulnerabilities 3.5 times faster than non-KEV bugs, and the additional submissions are expected to accelerate KEV additions and subsequent defensive actions. However, the growing volume of AI-discovered vulnerabilities, and the speed at which AI can weaponize flaws, is putting pressure on the timeline. CISA is now considering shortening the standard three-week remediation deadline to just three days, and the new structured form, which requires evidence of exploitation, is intended to help defenders prioritize real-world risk over theoretical severity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA\u0026rsquo;s Known Exploited Vulnerabilities catalog has served since 2021 as an internal mandate for federal agencies: vulnerabilities added to the KEV must be patched within a specific timeframe, typically three weeks. Over time the list has become an industry-wide reference, and research shows that organizations fix KEV bugs 3.5 times faster than non-KEV ones. Its influence stems from its focus on flaws that are being actively exploited, rather than on those that merely carry high severity scores.\u003c/p\u003e\n\n\u003cp\u003eOn Thursday, CISA announced a new nomination form—and a continued email option—that allows researchers, vendors, and industry partners outside the U.S. government to report vulnerabilities they believe should be added to the KEV. Chris Butera, CISA\u0026rsquo;s Acting Executive Assistant Director for Cybersecurity, said this reporting capability enhances the agency\u0026rsquo;s ability to identify, validate, and quickly share threat information. Former CIO Robert Costello described the form as a practical way to operationalize the partnership with the security community, telling the publication that crowdsourced exploitation intelligence through a standardized process would lead to faster KEV additions and faster defensive action across the ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe submission process is more structured than the previous email-only approach. Mayuresh Dani of Qualys noted that the old inbox had no transparency around how many submissions were accepted; the new form demands detailed information and evidence of exploitation. Dani emphasized that visibility into the post-submission verification process, along with guardrails against false or incorrect reporting, will determine the initiative\u0026rsquo;s real effectiveness. He also pointed out that commercial alternatives to the KEV already exist, and some now view the official catalog as a trailing indicator of exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that AI is compressing the window between vulnerability disclosure and exploitation, prompting CISA leadership to consider a dramatic policy change. While most initial KEV entries carried a three-week fix deadline, recent months have seen the agency assign three-day and even 24-hour deadlines to particularly dangerous bugs. According to a Reuters report cited in the article, CISA Acting Director Nick Anderson and U.S. National Cyber Director Sean Cairncross have floated the possibility of cutting the KEV deadline for all new vulnerabilities to just three days, directly citing concerns over AI-enabled exploit development.\u003c/p\u003e\n\n\u003cp\u003eChris Doyle of JupiterOne said improvements like the new nomination form strengthen the signal quality and timeliness of the KEV, which helps defenders prioritize real-world risk. The overall aim is to accelerate defense efforts, vulnerability disclosure, and exploitation tracking. By making the intake process more rigorous and open, CISA hopes to keep the KEV catalog current with the fast-evolving threat landscape.\u003c/p\u003e\n\n\u003cp\u003eIn sum, the new reporting pathway represents a convergence of several pressures: a widely adopted yet potentially lagging KEV list, a flood of AI-discovered vulnerabilities that may or may not be weaponized, and the accelerating speed of exploitation. The move is broadly welcomed as a necessary step to surface actionable intelligence faster and keep patching cadences ahead of attackers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"cisa-opens-kev-nomination-to-external-researchers-a-comprehensive-analysis\"\u003eCISA Opens KEV Nomination to External Researchers: A Comprehensive Analysis\u003c/h1\u003e\n\n\u003ch2 id=\"background-the-known-exploited-vulnerabilities-catalog\"\u003eBackground: The Known Exploited Vulnerabilities Catalog\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe KEV catalog is an authoritative, mandatory list maintained by CISA that tells federal agencies which software and hardware vulnerabilities must be patched.\u003c/li\u003e\n\u003cli\u003eSince its debut in 2021, the catalog has grown substantially and is now used by private-sector organizations as a de facto prioritization reference.\u003c/li\u003e\n\u003cli\u003eResearch cited in the article indicates that organizations remediate KEV-listed vulnerabilities 3.5 times faster than non-KEV bugs, demonstrating its practical impact.\u003c/li\u003e\n\u003cli\u003eThe catalog\u0026rsquo;s core value proposition is its focus on vulnerabilities that are being actively exploited by hackers and nation-state actors, rather than on those with high theoretical severity scores.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-new-nomination-mechanism\"\u003eThe New Nomination Mechanism\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCISA announced a new nomination form (hosted on a Qualtrics survey) alongside an existing email channel to allow “researchers, vendors, and industry partners” to report bugs for KEV inclusion.\u003c/li\u003e\n\u003cli\u003eActing Executive Assistant Director for Cybersecurity Chris Butera said the capability enhances CISA’s ability to “identify, validate, and quickly share critical threat information.”\u003c/li\u003e\n\u003cli\u003eSubmitters must provide detailed information about the vulnerability and, critically, evidence of its active exploitation. This is a departure from the previous informal email intake, which lacked standardization.\u003c/li\u003e\n\u003cli\u003eFormer CISA CIO Robert Costello framed the move as operationalizing the agency’s partnership with the security research community. In his view, crowdsourcing exploitation intelligence through a standardized process will lead to faster KEV additions and, ultimately, faster defensive action across the federal, private, and critical infrastructure networks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"why-this-move-is-happening-now-the-ai-acceleration-factor\"\u003eWhy This Move Is Happening Now: The AI Acceleration Factor\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article repeatedly underscores the role of AI in both discovering and exploiting vulnerabilities at an unprecedented pace.\u003c/li\u003e\n\u003cli\u003eCostello explicitly stated that AI is accelerating discovery and exploitation, making “early, coordinated disclosure more critical than ever.”\u003c/li\u003e\n\u003cli\u003eThere is a growing deluge of AI-discovered vulnerabilities, many of which are insignificant and unlikely to be exploited, amplifying the need for a signal that separates real-world risk from noise.\u003c/li\u003e\n\u003cli\u003eThe pressure from AI is also forcing a re-examination of remediation timelines, which is discussed below.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"verification-challenges-and-the-trailing-indicator-concern\"\u003eVerification Challenges and the “Trailing Indicator” Concern\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMayuresh Dani of Qualys noted that while CISA previously accepted KEV submissions via email, there were no external reports on how many vulnerabilities were added as a result—the process was a black box.\u003c/li\u003e\n\u003cli\u003eThe new form mandates critical details and evidence, creating an opportunity for transparency into what happens after submission. Dani said, “Hopefully, this functionality will now provide visibility into what exactly happens post submission.”\u003c/li\u003e\n\u003cli\u003eHe stressed that CISA must establish robust verification procedures and guardrails against incorrect or false reporting so that only validated exploitation observations make it onto the KEV list.\u003c/li\u003e\n\u003cli\u003eDani also highlighted that commercial alternatives to the KEV exist, and some now consider the official catalog a trailing indicator of vulnerability exploitation. This implies that CISA’s initiative may be, in part, an effort to catch up with commercial threat intelligence offerings and restore the KEV’s leading role.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evolution-of-remediation-deadlines\"\u003eEvolution of Remediation Deadlines\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhen the KEV launched, nearly all entries were assigned a three-week remediation deadline for federal agencies.\u003c/li\u003e\n\u003cli\u003eThe article reports that in the past year, a growing number of vulnerabilities have been given three-day or even 24-hour patch deadlines, signaling the shrinking window between disclosure and active exploitation.\u003c/li\u003e\n\u003cli\u003eA Reuters report (cited in the article) revealed that CISA Acting Director Nick Anderson and U.S. National Cyber Director Sean Cairncross are considering cutting the KEV deadline for all new bugs to just three days. Their concern is that hackers are using powerful, emerging AI systems to develop exploits much faster than before.\u003c/li\u003e\n\u003cli\u003eThis consideration directly links the new nomination effort to a broader policy shift: if the official KEV is to reflect near-real-time threats, it must be populated more rapidly, which is exactly what external nominations aim to facilitate.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"expert-reactions-and-expected-benefits\"\u003eExpert Reactions and Expected Benefits\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eJupiterOne’s Chris Doyle said improvements like the new nomination form “can help strengthen the signal quality and timeliness of KEV, which ultimately benefits defenders trying to prioritize real-world risk over theoretical severity.”\u003c/li\u003e\n\u003cli\u003eThe overarching expectation is that the initiative will speed up defense efforts, vulnerability disclosure processes, and exploitation tracking across the entire cybersecurity ecosystem.\u003c/li\u003e\n\u003cli\u003eBy combining internal validation with external intelligence, CISA hopes to make the KEV a more dynamic and current resource that keeps pace with attacker innovation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eCISA’s creation of a formal nomination pathway for the KEV catalog is a direct response to the dual pressures of AI-accelerated exploitation and the growing availability of commercial alternatives that threaten to make the official list less relevant. The new form demands evidence of exploitation, promises better transparency into the inclusion process, and is designed to shorten the time between vulnerability discovery, KEV listing, and mandated patching. If successful, it will close the feedback loop between the global research community and federal defense mandates, reinforcing the KEV’s role as the authoritative source for prioritization at a moment when every hour counts.\u003c/p\u003e\n","keyPoints":["CISA launched a new nomination form for outside researchers, vendors, and industry partners to report actively exploited vulnerabilities to the Known Exploited Vulnerabilities catalog.","The KEV catalog lists vulnerabilities that must be patched within a specific timeframe, typically three weeks, and it has become a critical resource for defenders inside and outside the federal government.","Organizations remediate KEV-listed vulnerabilities 3.5 times faster than non-KEV bugs, and the new form aims to speed up the addition of new entries.","CISA officials are considering shortening the remediation deadline for all new KEV bugs to just three days, driven by concerns over AI-powered exploit development.","The new submission process requires detailed information and evidence of exploitation, but experts note that verification and guardrails against false reporting will be crucial."],"insights":["The new nomination form may be a reactive move, as commercial alternatives already offer exploitation intelligence and some view the KEV as a trailing indicator, suggesting CISA is trying to catch up.","The consideration of cutting the KEV remediation deadline from three weeks to just three days reveals that AI-powered exploit development is compressing the window between vulnerability disclosure and exploitation to a point where near-immediate patching is becoming necessary.","The structured form replaces an opaque email submission process, introducing mandatory detailed evidence and the potential for much greater transparency into CISA’s validation workflow, which was previously a black box for outside researchers."],"referencedReports":[],"body":"\u003cp\u003eThe Cybersecurity and Infrastructure Security Agency (CISA) launched a new nomination form and email pathway that enables external researchers, vendors, and industry partners to directly submit actively exploited vulnerabilities to its Known Exploited Vulnerabilities (KEV) catalog. The KEV catalog is an authoritative list used to mandate federal patching timelines, and it has become a key resource for defenders both inside and outside government. The new submission process aims to speed up the identification, validation, and sharing of critical threat information by crowdsourcing exploitation intelligence.\u003c/p\u003e\n\n\u003cp\u003eOrganizations remediate KEV-listed vulnerabilities 3.5 times faster than non-KEV bugs, and the additional submissions are expected to accelerate KEV additions and subsequent defensive actions. However, the growing volume of AI-discovered vulnerabilities, and the speed at which AI can weaponize flaws, is putting pressure on the timeline. CISA is now considering shortening the standard three-week remediation deadline to just three days, and the new structured form, which requires evidence of exploitation, is intended to help defenders prioritize real-world risk over theoretical severity.\u003c/p\u003e\n"},{"n":5,"title":"npm Adds 2FA-Gated Publishing and Package Install Controls Against Supply Chain Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/npm-adds-2fa-gated-publishing-and.html","time":"16:35","priority":"MAY READ","score":55,"group":null,"groupColor":null,"tldr":"npm now requires a human maintainer to approve every package release via a two-factor authentication challenge before it becomes publicly installable, ensuring proof of presence even for automated CI/CD publishes.","briefOverview":"\u003cp\u003eGitHub has introduced staged publishing for npm, which now mandates that a human maintainer explicitly approve each new package version with a two-factor authentication challenge before it becomes publicly installable. This ensures proof of presence for every release, even those coming from automated CI/CD pipelines and OpenID Connect trusted publishing setups. Previously, a direct publish would immediately make a package available, but now the prebuilt tarball is first uploaded to a stage queue awaiting a maintainer\u0026rsquo;s approval.\u003c/p\u003e\n\n\u003cp\u003eAlongside this change, npm added three new install source flags (—allow-file, —allow-remote, and —allow-directory) that let developers apply an explicit allowlist to installations from non-registry sources like local file paths, remote URLs, and local directories. The rollout comes during a massive surge in software supply chain attacks, with the cybercriminal group TeamPCP actively poisoning popular packages at unprecedented scale.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe npm ecosystem is facing a severe wave of software supply chain attacks, with the TeamPCP group systematically poisoning popular packages in a self-perpetuating cycle. Against this backdrop, GitHub has delivered two significant security enhancements aimed at cutting off common attack paths that rely on automated or covert package distribution and installation.\u003c/p\u003e\n\n\u003cp\u003eThe centerpiece is staged publishing, now generally available on npm. Instead of an immediate publish that exposes a new package version to consumers, the process uploads a prebuilt tarball to a staging queue where a human maintainer must complete a two-factor authentication challenge to approve the release. This introduces a mandatory proof of presence for every publish, including those originating from non-interactive CI/CD workflows and OpenID Connect trusted publishing, effectively breaking the automated token abuse observed in recent compromises.\u003c/p\u003e\n\n\u003cp\u003eTo combat installation from untrusted sources, npm also introduced three explicit-allowlist flags alongside the existing —allow-git flag. The —allow-file flag controls installs from local file paths and local tarballs, —allow-remote governs installs from remote URLs including HTTPS tarballs, and —allow-directory controls installs from local directories. Together, they allow developers to shut down non-registry installation vectors that have been used to smuggle malicious code.\u003c/p\u003e\n\n\u003cp\u003eUsage of staged publishing requires maintainers to have publish access, the target package must already exist on the npm registry (meaning brand new packages cannot be staged), and two-factor authentication must be enabled on the account. Developers need npm CLI version 11.15.0 or newer and invoke the command ‘npm stage publish’ from the root directory of the package. GitHub recommends pairing staged publishing with trusted publishing via OIDC for optimal protection.\u003c/p\u003e\n\n\u003cp\u003eThe twin measures represent a direct response to a threat landscape where massive-scale package poisoning attacks have surged. By gating the final publish step behind a human-verified authentication step and restricting install sources to an explicit allowlist, npm aims to raise the bar for attackers and restore trust in the software supply chain.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"background\"\u003eBackground\u003c/h2\u003e\n\n\u003cp\u003eGitHub has announced two major security upgrades for npm, driven by a massive surge in software supply chain attacks across open-source ecosystems. The article highlights the activities of the cybercriminal group TeamPCP, which has been poisoning popular packages at an unprecedented scale through a self-perpetuating cycle of compromises. These attacks often exploit automated publishing pipelines and unfettered installation from diverse source types, making it critical to introduce stricter controls on both ends of the package lifecycle.\u003c/p\u003e\n\n\u003ch2 id=\"staged-publishing-feature\"\u003eStaged Publishing Feature\u003c/h2\u003e\n\n\u003ch3 id=\"how-it-works\"\u003eHow It Works\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eInstead of a direct publish that immediately makes a new package version available, the maintainer now uploads a prebuilt tarball to a staging queue.\u003c/li\u003e\n\u003cli\u003eA human maintainer must explicitly approve the release by passing a two-factor authentication (2FA) challenge before the package becomes installable from the npm registry.\u003c/li\u003e\n\u003cli\u003eThis creates a mandatory “proof of presence” for every publish, ensuring that even automated builds from non-interactive CI/CD workflows or those using trusted publishing with OpenID Connect (OIDC) cannot bypass final human verification.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"requirements-for-maintainers\"\u003eRequirements for Maintainers\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe maintainer must have publish access to the package.\u003c/li\u003e\n\u003cli\u003eThe package must already exist on the npm registry; brand new packages cannot use staged publishing at this time.\u003c/li\u003e\n\u003cli\u003eTwo-factor authentication must be enabled on the maintainer’s account.\u003c/li\u003e\n\u003cli\u003eThe maintainer must use npm CLI version 11.15.0 or newer and run ‘npm stage publish’ from the package’s root directory to submit a release to the staging area.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"best-practice-recommendation\"\u003eBest Practice Recommendation\u003c/h3\u003e\n\n\u003cp\u003eGitHub advises pairing staged publishing with trusted publishing via OIDC for optimal security, combining automated integrity of the build pipeline with the human approval gate.\u003c/p\u003e\n\n\u003ch2 id=\"install-source-controls\"\u003eInstall Source Controls\u003c/h2\u003e\n\n\u003ch3 id=\"new-explicit-allowlist-flags\"\u003eNew Explicit-Allowlist Flags\u003c/h3\u003e\n\n\u003cp\u003eAlongside the existing —allow-git flag, npm has introduced three new install source flags that let developers apply a white-list approach to all non-registry install sources:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e\u0026ndash;allow-file\u003c/strong\u003e: Controls installations from local file paths and local tarballs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\u0026ndash;allow-remote\u003c/strong\u003e: Controls installations from remote URLs, including HTTPS tarballs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\u0026ndash;allow-directory\u003c/strong\u003e: Controls installations from local directories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese flags shift the default behavior to a deny-by-default posture for any installation source other than the main registry, closing off covert vectors often abused by attackers to inject malicious code during package installs.\u003c/p\u003e\n\n\u003ch2 id=\"context-of-supply-chain-attacks\"\u003eContext of Supply Chain Attacks\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article cites a massive surge in software supply chain attacks targeting open-source ecosystems over the past few months.\u003c/li\u003e\n\u003cli\u003eOne prominent threat actor, TeamPCP, has been engaging in widespread poisoning of popular packages, creating a self-sustaining cycle where compromised packages are used to propagate further attacks.\u003c/li\u003e\n\u003cli\u003eThe Megalodon GitHub attack and internal repository breaches are referenced as part of this broader attack landscape, though the primary focus is on the new npm controls addressing the root causes: lack of publish-time verification and uncontrolled installation sources.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe staged publishing feature ensures that even if attackers compromise an automated CI/CD pipeline or abuse OIDC-based trusted publishing tokens, they still cannot push a tarball to public consumption without a maintainer’s explicit 2FA-approved step. This breaks a key link in recent supply chain attack chains. The install source controls add a parallel layer of defense by limiting what can be installed outside the vetted registry, reducing the attack surface for sideloading malware. Together, these changes represent a hardening strategy against the type of large-scale package poisoning campaigns currently targeting the npm ecosystem.\u003c/p\u003e\n","keyPoints":["GitHub introduced staged publishing for npm, which requires a maintainer to pass a two-factor authentication challenge to approve a package release before it becomes publicly installable.","Staged publishing ensures proof of presence for every publish, including those originating from non-interactive CI/CD workflows and trusted publishing via OpenID Connect.","New install source flags --allow-file, --allow-remote, and --allow-directory allow developers to explicitly control non-registry install sources such as local file paths, remote URLs, and local directories.","The updates were announced amid a massive surge in software supply chain attacks, with the TeamPCP group engaging in widespread poisoning of popular packages."],"insights":["Staged publishing breaks fully automated release pipelines even for OIDC-trusted publishing, mandating human approval that disrupts the automated token abuse cycle exploited in recent supply chain attacks.","npm's new install flags shift to a deny-by-default model for non-registry sources, requiring developers to explicitly allow file, remote, or directory installs and potentially blocking covert installation vectors.","Staged publishing only protects packages already existing on the registry, leaving brand new packages without the same approval gate and creating a potential blind spot for newly created malicious packages."],"referencedReports":[],"body":"\u003cp\u003eGitHub has introduced staged publishing for npm, which now mandates that a human maintainer explicitly approve each new package version with a two-factor authentication challenge before it becomes publicly installable. This ensures proof of presence for every release, even those coming from automated CI/CD pipelines and OpenID Connect trusted publishing setups. Previously, a direct publish would immediately make a package available, but now the prebuilt tarball is first uploaded to a stage queue awaiting a maintainer\u0026rsquo;s approval.\u003c/p\u003e\n\n\u003cp\u003eAlongside this change, npm added three new install source flags (—allow-file, —allow-remote, and —allow-directory) that let developers apply an explicit allowlist to installations from non-registry sources like local file paths, remote URLs, and local directories. The rollout comes during a massive surge in software supply chain attacks, with the cybercriminal group TeamPCP actively poisoning popular packages at unprecedented scale.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
