<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":2,"title":"Canvas login portals hacked in mass ShinyHunters extortion campaign","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/canvas-login-portals-hacked-in-mass-shinyhunters-extortion-campaign/","time":"22:36","priority":"MUST READ","score":93,"group":null,"groupColor":null,"tldr":"The ShinyHunters extortion gang breached Instructure's Canvas platform, defacing login portals for hundreds of educational institutions and threatening to leak stolen student and staff data unless a ransom is paid by May 12, 2026.","briefOverview":"\u003cp\u003eThe ShinyHunters extortion gang recently breached Instructure\u0026rsquo;s Canvas platform, defacing login portals for approximately 330 educational institutions. The attackers replaced standard login pages with an extortion message warning that student and staff data will be leaked unless a ransom is paid by May 12, 2026.\u003c/p\u003e\n\n\u003cp\u003eThis incident follows a prior breach claim in which the group stated they exfiltrated 280 million records from nearly 8,800 schools and universities. Instructure has confirmed that data was stolen during the attack and has taken the Canvas platform offline to respond to the threat.\u003c/p\u003e\n\n\u003cp\u003eDespite media inquiries, the company has not yet notified students and staff about the breach or issued public statements regarding the incident. The ShinyHunters group is known for targeting cloud SaaS environments and frequently uses voice phishing and device code attacks to steal authentication tokens.\u003c/p\u003e\n\n\u003cp\u003eThey operate as an extortion-as-a-service group and have been linked to numerous high-profile breaches worldwide. Law enforcement has arrested several suspects associated with the group, yet the campaign of data theft and extortion continues unabated.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe ShinyHunters extortion gang has breached Instructure\u0026rsquo;s Canvas learning management system, defacing login portals for roughly 330 colleges and universities. The defacement, which lasted approximately 30 minutes before being taken offline, displayed a message claiming responsibility for the attack and threatening to leak stolen data. The attackers warned that Instructure and affected schools have until May 12, 2026, to contact them privately to negotiate a ransom settlement.\u003c/p\u003e\n\n\u003cp\u003eThis latest incident follows a disclosure from last week in which Instructure investigated a cyberattack after ShinyHunters claimed to have stolen 280 million student and staff records tied to 8,809 educational institutions. The group stated that the exfiltrated data includes user records, private messages, enrollment data, and information gathered through Canvas data export features and APIs. Instructure confirmed that data was indeed stolen during the attack but has taken the Canvas platform offline while they investigate the incident.\u003c/p\u003e\n\n\u003cp\u003eDespite repeated media inquiries, Instructure has not responded to questions about the attack or plans to notify affected students and staff. Canvas is a widely used learning management system that helps schools manage coursework, assignments, grading, and faculty communication. The ShinyHunters name has been associated with threat actors conducting data breaches since 2018.\u003c/p\u003e\n\n\u003cp\u003eThis year, the group has become one of the most prolific actors targeting companies worldwide, primarily focusing on Salesforce and other cloud SaaS environments. They are linked to breaches at major organizations including Google, Cisco, PornHub, and Match Group. The gang commonly breaches third-party integration companies and uses stolen authentication tokens to access connected SaaS environments.\u003c/p\u003e\n\n\u003cp\u003eThey are also known for conducting voice phishing and device code vishing attacks to hijack single sign-on accounts across enterprise services like Microsoft 365, Google Workspace, and Slack. Additionally, the group operates as an extortion-as-a-service provider, conducting attacks on behalf of other threat actors for a share of ransom payments. Multiple arrests have been linked to the group, including suspects connected to Snowflake and PowerSchool breaches, yet companies continue to receive extortion emails signed with the ShinyHunters name.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eThe ShinyHunters extortion gang recently breached Instructure\u0026rsquo;s Canvas platform, successfully defacing login portals for approximately 330 educational institutions. The defacement was visible for roughly 30 minutes before being taken offline and also appeared within the Canvas mobile application. This event follows a prior disclosure last week in which Instructure investigated a cyberattack after ShinyHunters claimed to have exfiltrated 280 million student and staff records tied to 8,809 schools and universities.\u003c/p\u003e\n\n\u003ch3 id=\"attack-details-threat-actor-demands\"\u003eAttack Details \u0026amp; Threat Actor Demands\u003c/h3\u003e\n\n\u003cp\u003eThe defacement pages displayed a message claiming responsibility for the breach and outlining specific extortion demands. The attackers warned that Instructure and affected schools have until May 12, 2026, to contact them privately at TOX to negotiate a ransom settlement. The group threatened to leak all stolen data if payment is not secured by the deadline. The defacement message also criticized Instructure\u0026rsquo;s response, stating that the company ignored their previous communications and merely applied security patches. According to the group, the stolen data encompasses user records, private messages, enrollment data, and other information allegedly harvested through Canvas data export features and APIs.\u003c/p\u003e\n\n\u003ch3 id=\"instructure-response-impact\"\u003eInstructure Response \u0026amp; Impact\u003c/h3\u003e\n\n\u003cp\u003eInstructure has confirmed that data was stolen during the attack and is actively investigating the incident. To mitigate the threat, the company has taken the Canvas platform offline. Despite repeated media inquiries regarding the attack and plans to notify affected students and staff, Instructure has not responded to emails or issued public statements. Canvas remains one of the most widely used learning management systems in higher education and K-12 environments, serving as a central hub for managing coursework, assignments, grading, and faculty communication.\u003c/p\u003e\n\n\u003ch3 id=\"shinyhunters-group-profile-tactics\"\u003eShinyHunters Group Profile \u0026amp; Tactics\u003c/h3\u003e\n\n\u003cp\u003eThe ShinyHunters name has been associated with threat actors conducting data breaches since 2018. In 2026, the group has emerged as one of the most prolific actors targeting companies globally, with a primary focus on Salesforce and other cloud SaaS environments. Their known victims include Google, Cisco, PornHub, and Match Group. The gang typically breaches third-party integration companies to steal authentication tokens, which they then use to access connected SaaS environments and exfiltrate customer data. They are also known for conducting voice phishing and device code vishing attacks to hijack single sign-on accounts across enterprise services. Their operational methods include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBreaching third-party integration companies to harvest authentication tokens\u003c/li\u003e\n\u003cli\u003eHijacking single sign-on accounts to access services like Microsoft 365, Google Workspace, SAP, Slack, and Adobe\u003c/li\u003e\n\u003cli\u003eConducting voice phishing and device code vishing attacks targeting Okta, Microsoft, and Google SSO accounts\u003c/li\u003e\n\u003cli\u003eImpersonating IT support staff to trick employees into entering credentials and multi-factor authentication codes on phishing sites\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"law-enforcement-ongoing-threat-landscape\"\u003eLaw Enforcement \u0026amp; Ongoing Threat Landscape\u003c/h3\u003e\n\n\u003cp\u003eThe ShinyHunters group operates as an extortion-as-a-service provider, conducting cyberattacks on behalf of other threat actors in exchange for a share of ransom payments. Multiple arrests have been linked to the group, including suspects connected to the Snowflake data-theft attacks, the PowerSchool student data extortion scheme, and the operation of the Breached v2 hacking forum. Despite these law enforcement actions, companies continue to receive extortion emails signed with the ShinyHunters name, indicating that the group\u0026rsquo;s operations remain active and resilient.\u003c/p\u003e\n","keyPoints":["The ShinyHunters extortion gang breached Instructure's Canvas platform and defaced login portals for approximately 330 educational institutions.","The attackers issued a ransom ultimatum threatening to leak stolen student and staff data unless payment is negotiated by May 12, 2026.","This incident follows a prior breach claim in which the group stated they exfiltrated 280 million records from nearly 8,800 schools and universities.","Instructure confirmed that data was stolen during the attack but has not yet communicated with affected students and staff about the breach."],"insights":["Data was allegedly harvested through Canvas data export features and APIs, indicating that built-in export mechanisms and third-party integrations serve as a primary data exfiltration vector.","ShinyHunters primarily relies on voice phishing and device code vishing to steal authentication tokens, allowing threat actors to hijack SSO accounts across connected enterprise services rather than exploiting technical vulnerabilities.","Instructure has not issued notifications to students and staff despite confirming the breach and data theft, indicating a lack of public incident communication regarding the incident.","The group operates as an extortion-as-a-service model, conducting attacks on behalf of other threat actors for a share of ransom payments, which explains the continued volume of breaches despite multiple law enforcement arrests."],"referencedReports":[],"body":"\u003cp\u003eThe ShinyHunters extortion gang recently breached Instructure\u0026rsquo;s Canvas platform, defacing login portals for approximately 330 educational institutions. The attackers replaced standard login pages with an extortion message warning that student and staff data will be leaked unless a ransom is paid by May 12, 2026.\u003c/p\u003e\n\n\u003cp\u003eThis incident follows a prior breach claim in which the group stated they exfiltrated 280 million records from nearly 8,800 schools and universities. Instructure has confirmed that data was stolen during the attack and has taken the Canvas platform offline to respond to the threat.\u003c/p\u003e\n\n\u003cp\u003eDespite media inquiries, the company has not yet notified students and staff about the breach or issued public statements regarding the incident. The ShinyHunters group is known for targeting cloud SaaS environments and frequently uses voice phishing and device code attacks to steal authentication tokens.\u003c/p\u003e\n\n\u003cp\u003eThey operate as an extortion-as-a-service group and have been linked to numerous high-profile breaches worldwide. Law enforcement has arrested several suspects associated with the group, yet the campaign of data theft and extortion continues unabated.\u003c/p\u003e\n"},{"n":1,"title":"New TCLBanker malware self-spreads over WhatsApp and Outlook","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-tclbanker-malware-self-spreads-over-whatsapp-and-outlook/","time":"22:06","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The new TCLBanker banking trojan autonomously spreads through WhatsApp and Outlook worm modules to infect new victims while using advanced evasion techniques to steal credentials from targeted financial platforms.","briefOverview":"\u003cp\u003eA new banking trojan named TCLBanker has been discovered by Elastic Security Labs, targeting 59 financial and cryptocurrency platforms. The malware initially infects systems through a trojanized MSI installer for the Logitech AI Prompt Builder application.\u003c/p\u003e\n\n\u003cp\u003eOnce active, it employs advanced evasion techniques, including DLL side-loading and a watchdog thread that actively hunts for debugging tools. During operation, the trojan monitors browser activity to establish WebSocket connections with command-and-control servers.\u003c/p\u003e\n\n\u003cp\u003eIt then enables operators to perform remote actions such as screen streaming, keylogging, and injecting fake credential overlays. The malware also features autonomous worm modules that spread through WhatsApp and Outlook by hijacking authenticated accounts and sending spam to contacts. While currently focused on Brazil, researchers warn that the threat could broaden its targeting scope in the future.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eElastic Security Labs has identified a new banking trojan called TCLBanker that targets 59 specific banking, fintech, and cryptocurrency platforms. The infection chain begins with a trojanized MSI installer for the Logitech AI Prompt Builder, which loads the malicious payload via DLL side-loading to bypass security alarms.\u003c/p\u003e\n\n\u003cp\u003eThe malware is heavily protected against analysis, utilizing environment-dependent decryption routines that fail in sandboxed environments. It also runs a persistent watchdog thread that continuously searches for popular debugging and reverse engineering tools.\u003c/p\u003e\n\n\u003cp\u003eCode artifacts within the loader suggest that artificial intelligence may have assisted in its development. The banking module actively monitors the browser address bar every second using Windows UI Automation APIs to detect visits to targeted financial sites.\u003c/p\u003e\n\n\u003cp\u003eWhen a match occurs, it establishes a WebSocket session with its command-and-control server to transmit system information and initiate remote control. Operators are granted extensive capabilities, including live screen streaming, keylogging, clipboard hijacking, shell execution, and remote mouse control.\u003c/p\u003e\n\n\u003cp\u003eTo hide malicious activity, the trojan terminates the Task Manager process during active sessions. Data theft is facilitated through a WPF-based overlay system that pushes fake credential prompts, PIN keypads, and fake Windows Update screens.\u003c/p\u003e\n\n\u003cp\u003eIt also utilizes cutout overlays that only display selected portions of legitimate applications while masking the rest. Beyond its banking capabilities, TCLBanker includes self-spreading worm modules for WhatsApp and Outlook.\u003c/p\u003e\n\n\u003cp\u003eThe WhatsApp module hijacks authenticated web sessions by harvesting Chromium IndexedDB data and filters contacts for Brazilian numbers before sending spam. The Outlook module abuses COM automation to harvest email contacts and distribute phishing messages through the victim\u0026rsquo;s account.\u003c/p\u003e\n\n\u003cp\u003eResearchers note that this malware represents a significant evolution in LATAM threat actor tooling, democratizing advanced features for lower-tier cybercriminals.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview and Infection Vector\u003c/strong\u003e\nElastic Security Labs has discovered a new banking trojan named TCLBanker that specifically targets 59 banking, fintech, and cryptocurrency platforms. The initial infection relies on a trojanized MSI installer for the Logitech AI Prompt Builder application.\u003c/p\u003e\n\n\u003cp\u003eThe malware leverages DLL side-loading within the legitimate Logitech process to execute, ensuring it avoids triggering alarms from host security products.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eEvasion and Anti-Analysis Techniques\u003c/strong\u003e\nThe trojan is heavily fortified against reverse engineering and sandbox analysis. It features environment-dependent payload decryption routines that intentionally fail when executed in analyst environments.\u003c/p\u003e\n\n\u003cp\u003eA persistent watchdog thread continuously hunts for the presence of debugging and analysis tools, specifically targeting applications like x64dbg, IDA, dnSpy, Frida, ProcessHacker, Ghidra, and de4dot.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, code artifacts within the loader indicate that artificial intelligence may have been utilized during its development phase.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eBanking Module and Remote Control Capabilities\u003c/strong\u003e\nOnce operational, the banking module monitors the browser address bar every second through Windows UI Automation APIs. It triggers when the victim navigates to one of the 59 targeted financial platforms.\u003c/p\u003e\n\n\u003cp\u003eAt that moment, the malware establishes a WebSocket session with its command-and-control server, transmitting victim and system data before initiating remote operations. Authorized operators can perform the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLive screen streaming and screenshot capturing\u003c/li\u003e\n\u003cli\u003eKeylogging and clipboard hijacking\u003c/li\u003e\n\u003cli\u003eShell command execution and window management\u003c/li\u003e\n\u003cli\u003eFile system access and process enumeration\u003c/li\u003e\n\u003cli\u003eRemote mouse and keyboard control\nTo maintain stealth, the trojan actively kills the Task Manager process during active sessions to prevent victims from monitoring malicious activity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eData Theft and Overlay System\u003c/strong\u003e\nTCLBanker employs a WPF-based overlay system designed to deceive victims and harvest sensitive information. It can push fake credential prompts, PIN keypads, phone-number collection forms, and fake bank support waiting screens.\u003c/p\u003e\n\n\u003cp\u003eThe malware also generates fake Windows Update screens and various progress indicators. A specialized cutout overlay feature keeps selected portions of real applications visible while masking other parts of the interface.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAutonomous Worm Propagation\u003c/strong\u003e\nThe malware includes self-spreading worm modules that automatically infect new victims through social engineering. For WhatsApp, the module searches Chromium browser profiles for authenticated WhatsApp Web IndexedDB data.\u003c/p\u003e\n\n\u003cp\u003eIt launches a hidden Chromium instance to hijack the victim\u0026rsquo;s account, harvests contacts, filters for Brazilian numbers, and sends spam messages directing them to distribution platforms. The Outlook worm module abuses Microsoft COM automation to launch the application, harvest contacts and sender addresses, and distribute phishing emails through the compromised account.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eGeographic Focus and Threat Evolution\u003c/strong\u003e\nWhile TCLBanker currently enforces geographic restrictions by checking timezone, keyboard layout, and locale, researchers emphasize that LATAM malware families frequently update their targeting scope. Past iterations have successfully expanded beyond their original regions, making the risk of broadening real.\u003c/p\u003e\n\n\u003cp\u003eElastic Security Labs concludes that TCLBanker exemplifies the evolution of LATAM cybercrime by providing lower-tier threat actors with previously advanced, highly sophisticated capabilities.\u003c/p\u003e\n","keyPoints":["The TCLBanker trojan targets 59 financial platforms and delivers infection through a trojanized MSI installer for the Logitech AI Prompt Builder application.","The malware includes autonomous worm modules that propagate via WhatsApp by hijacking authenticated web sessions and through Outlook by using COM automation to send phishing emails.","TCLBanker employs robust evasion techniques, including DLL side-loading, environment-dependent decryption, and a watchdog thread that hunts for debugging tools like x64dbg and Ghidra.","The banking module monitors browser activity to establish WebSocket connections with command-and-control servers, enabling operators to perform remote actions such as screen streaming and fake overlay injection."],"insights":["The malware leverages DLL side-loading within a legitimate Logitech application to bypass security product alarms, making detection significantly harder.","During active sessions, TCLBanker actively terminates the Task Manager process to prevent victims from discovering malicious activity or monitoring tools.","The propagation module specifically filters harvested WhatsApp contacts for Brazilian phone numbers before sending spam, demonstrating precise geo-targeting at the worm stage.","Code artifacts suggest AI was used in the malware's development, highlighting a growing trend of automated code generation in banking trojans.","The overlay system uses \"cutout\" techniques that render only selected portions of legitimate applications visible to the victim, masking malicious UI elements underneath."],"referencedReports":[{"title":"TCLBanker Brazilian Banking Trojan","url":"https://www.elastic.co/security-labs/tclbanker-brazilian-banking-trojan","publisher":"Elastic Security Labs","context":"The article cites this research as the source that discovered the trojan and provided the technical analysis of its capabilities and evolution."}],"body":"\u003cp\u003eA new banking trojan named TCLBanker has been discovered by Elastic Security Labs, targeting 59 financial and cryptocurrency platforms. The malware initially infects systems through a trojanized MSI installer for the Logitech AI Prompt Builder application.\u003c/p\u003e\n\n\u003cp\u003eOnce active, it employs advanced evasion techniques, including DLL side-loading and a watchdog thread that actively hunts for debugging tools. During operation, the trojan monitors browser activity to establish WebSocket connections with command-and-control servers.\u003c/p\u003e\n\n\u003cp\u003eIt then enables operators to perform remote actions such as screen streaming, keylogging, and injecting fake credential overlays. The malware also features autonomous worm modules that spread through WhatsApp and Outlook by hijacking authenticated accounts and sending spam to contacts. While currently focused on Brazil, researchers warn that the threat could broaden its targeting scope in the future.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}

}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,

}

function ScoreBar({ score }) {

}

function htmlPanel(value) {

}

function pointList(items) {

function ReportsPanel({ reports }) {

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}

  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>

}

        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",

        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",

function CardFront({ article }) {

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
