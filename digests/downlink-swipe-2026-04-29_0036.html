bonuses to harvest login credentials.","Stolen accounts were sorted by resale value, with profiles containing rare inventory, collectible items, or large virtual currency balances deemed the most profitable.","Authorities conducted ten searches in western Ukraine, seizing electronic devices, cash, and handwritten notes linked to an operation that generated roughly 10 million hryvnias.","The suspects, organized by a 19-year-old who recruited accomplices on gaming forums, face up to 15 years in prison if convicted."],"insights":["The hackers specifically targeted accounts with remaining balances of Roblox's virtual currency, highlighting how in-game economic assets directly translate to real-world criminal profit.","The operation relied on a Russian-registered domain and closed online communities for distribution, illustrating the cross-border nature of gaming account theft and the challenges in tracking digital asset resale.","Malware distribution was highly targeted toward gamers by masquerading as legitimate gameplay enhancers, demonstrating a persistent social engineering vector that exploits user desire for competitive advantages.","The group systematically sorted stolen profiles by potential resale value before selling them, indicating a sophisticated, business-like approach to monetizing compromised gaming credentials."],"referencedReports":[],"body":"\u003cp\u003eUkrainian police have detained a hacking group suspected of stealing over 610,000 Roblox accounts to resell for cryptocurrency on Russian websites. The operation was allegedly orchestrated by a 19-year-old who recruited accomplices through gaming forums and developed a system to compromise player profiles. The group distributed information-stealing malware disguised as software offering gameplay advantages or free in-game bonuses. Once installed, the malware harvested login credentials and sensitive data from victims\u0026rsquo; devices. Authorities sorted the stolen accounts by resale value, prioritizing those with rare inventory, collectibles, or substantial virtual currency balances. During ten searches in western Ukraine, investigators seized computers, phones, bank cards, handwritten notes, and significant amounts of cash. Preliminary estimates indicate the scheme generated approximately 10 million hryvnias, or about $227,000. The suspects are currently in pretrial detention and face up to 15 years in prison if convicted.\u003c/p\u003e\n"},{"n":20,"title":"Why Secure Data Movement Is the Zero Trust Bottleneck Nobody Talks About","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/why-secure-data-movement-is-zero-trust.html","time":"11:58","priority":"MAY READ","score":74,"group":null,"groupColor":null,"tldr":"Secure data movement across network boundaries is the critical, overlooked bottleneck in Zero Trust programs, where outdated manual processes create a major vulnerability that attackers actively exploit. Closing this gap requires integrated cross-domain and data-centric security to enable fast, trusted data sharing without sacrificing safety.","briefOverview":"\u003cp\u003eSecure data movement across network boundaries has emerged as the critical, overlooked bottleneck in modern Zero Trust programs.\u003c/p\u003e\n\n\u003cp\u003eRecent research indicates that 84% of government IT security leaders recognize that sharing sensitive data across networks significantly increases cyber risk, yet 53% still depend on manual transfer processes. As threat volumes rise and third-party involvement in breaches doubles, the traditional assumption that connectivity equals security is failing. When data crosses trust boundaries, it requires rigorous validation and policy enforcement, which outdated infrastructure and manual workflows cannot provide at the speed modern operations demand.\u003c/p\u003e\n\n\u003cp\u003eThe perceived trade-off between speed and security is a myth; relying on slow, manual processes forces AI-driven detection systems to operate on stale or incomplete data. Addressing this gap requires a layered architectural approach that integrates Zero Trust, data-centric security, and cross-domain solutions. This combined framework enforces trust at the boundary, enabling near-real-time data sharing without compromising integrity or control. Ultimately, the movement of data itself, rather than identity or endpoints, represents the most exploitable vulnerability in current security postures.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eEvery security program currently operates under the flawed assumption that establishing connectivity automatically solves data security challenges. New research from the Cyber360 report reveals that 84% of government IT security leaders agree cross-network data sharing heightens cyber risk, while 53% still rely on manual processes to move that data. This reliance on analog workflows creates a critical gap in Zero Trust implementations, shifting the primary attack surface from identity and endpoints to the data movement itself.\u003c/p\u003e\n\n\u003cp\u003eThreat volumes are accelerating, with national security organizations facing an average of 137 cyberattacks per week in 2025, and enterprise data shows third-party breach involvement has doubled to 30%. Multi-environment data breaches now cost an average of $5.05 million, highlighting the financial impact of unsecured data transit. The moment data crosses a boundary between IT, OT, cloud, or classified environments, it transitions from a routing problem to a trust problem requiring immediate validation and policy control.\u003c/p\u003e\n\n\u003cp\u003eSurvey data shows that 78% of security leaders cite outdated infrastructure and manual processes as primary vulnerabilities, while 49% struggle with ensuring data integrity in transit. The traditional IT/OT air gap is effectively gone, as 75% of OT attacks now originate from IT breaches and most OT systems are expected to connect to IT networks soon. High-profile managed file transfer compromises further demonstrate that adversaries consistently target the pipelines moving data between trust boundaries.\u003c/p\u003e\n\n\u003cp\u003eMany organizations falsely believe they must choose between moving data quickly or moving it securely, but this trade-off is a myth. When AI-driven detection and response pipelines are forced to wait for manual gateways, they operate on delayed or partial context, severely degrading their effectiveness. Secure data movement requires a layered architectural model that combines Zero Trust for access governance, data-centric security for content protection, and cross-domain solutions for boundary enforcement.\u003c/p\u003e\n\n\u003cp\u003eThis integrated approach eliminates the forced choice between speed and security by enforcing trust at the boundary rather than after it. By treating data movement as a coordinated, policy-controlled process, organizations can share sensitive information across complex environments at near-real-time speeds. The boundary itself is the attack surface, and closing the gap between mission speed and control speed is essential to preventing policy collapse during data transit.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"core-thesis-the-overlooked-zero-trust-bottleneck\"\u003eCore Thesis: The Overlooked Zero Trust Bottleneck\u003c/h1\u003e\n\n\u003cp\u003eModern security programs are fundamentally misaligned because they assume that establishing network connectivity automatically resolves data security challenges. The article identifies secure data movement across trust boundaries as the critical, unaddressed bottleneck in Zero Trust architectures. Rather than focusing solely on identity or endpoint security, organizations must recognize that the movement of data itself is where policy enforcement collapses and adversaries exploit vulnerabilities.\u003c/p\u003e\n\n\u003ch1 id=\"threat-landscape-and-empirical-data\"\u003eThreat Landscape and Empirical Data\u003c/h1\u003e\n\n\u003cp\u003eRecent research quantifies the scale of this vulnerability across government, defense, and critical infrastructure sectors. The Cyber360 report, surveying 500 security leaders, found that 84% agree cross-network data sharing heightens cyber risk, yet 53% still depend on manual transfer processes. Threat velocity is outpacing control capabilities, with national security organizations averaging 137 attempted or successful attacks per week in 2025. Enterprise data mirrors this trend, showing that third-party involvement in breaches has doubled to 30% and multi-environment breaches now average $5.05 million in costs.\u003c/p\u003e\n\n\u003ch1 id=\"connectivity-versus-secure-data-movement\"\u003eConnectivity Versus Secure Data Movement\u003c/h1\u003e\n\n\u003cp\u003eEstablishing a network link does not equate to securing the data that traverses it. When information crosses boundaries between IT, OT, cloud, or classified environments, it shifts from a simple routing problem to a complex trust problem. The data must be validated, filtered, and governed by policy before downstream systems can safely process it. Survey respondents highlight critical pain points:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e78% view outdated infrastructure and manual workflows as primary vulnerability sources.\u003c/li\u003e\n\u003cli\u003e49% cite data integrity and tamper prevention in transit as their top challenge.\u003c/li\u003e\n\u003cli\u003e45% flag managing identity and authentication across multiple domains as their biggest access hurdle.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe traditional IT/OT air gap has effectively disappeared, with 75% of OT attacks originating from IT breaches and 70% of OT systems expected to connect to IT networks within a year. High-profile managed file transfer compromises further demonstrate that adversaries consistently target the pipelines moving data between trust boundaries.\u003c/p\u003e\n\n\u003ch1 id=\"the-speed-versus-security-trade-off\"\u003eThe Speed Versus Security Trade-off\u003c/h1\u003e\n\n\u003cp\u003eOrganizations frequently operate under the false premise that data must be moved either quickly or securely, but never both. In reality, teams typically prioritize security and accept operational delays, which becomes unsustainable as decision cycles shrink from minutes to milliseconds. AI-driven detection and response pipelines are moving toward autonomous action and cannot wait for manual gateways to complete file inspections. When 53% of national security organizations rely on manual data movement, AI models are forced to operate on stale or partial context, degrading their analytical accuracy. The bottleneck is not the intelligence layer itself, but the underlying plumbing that fails to deliver trusted data at mission speed.\u003c/p\u003e\n\n\u003ch1 id=\"architectural-resolution-and-implementation\"\u003eArchitectural Resolution and Implementation\u003c/h1\u003e\n\n\u003cp\u003eClosing this gap requires a deliberate, layered architectural approach that integrates three distinct security frameworks. Each layer addresses a specific control domain:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eZero Trust\u003c/strong\u003e governs identity and access control, answering who and what can interact with the system.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData-Centric Security\u003c/strong\u003e governs the information itself, ensuring protection regardless of its location or state.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-Domain Solutions\u003c/strong\u003e govern the actual movement between isolated environments, enforcing trust at the boundary rather than after it.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTogether, these layers enable secure, near-real-time data sharing across classified, coalition, and operational boundaries without forcing a compromise between speed and safety. This model applies broadly to enterprise SOC-to-OT data flows, critical infrastructure operations, and multi-party investigations requiring bidirectional partner data exchange.\u003c/p\u003e\n\n\u003ch1 id=\"strategic-conclusion\"\u003eStrategic Conclusion\u003c/h1\u003e\n\n\u003cp\u003eThe assumption that data arrives trusted the moment it crosses a network boundary is the most reliably exploited vulnerability in modern cyber defense. Boundaries represent the primary attack surface, and data movement is the precise point where security policies fail. When manual processes dictate the pace of sensitive data transfer, the resulting gap between mission speed and control speed becomes a critical vulnerability. Addressing this requires treating secure data movement as a foundational architectural priority rather than an afterthought, ensuring that policy enforcement keeps pace with operational demands.\u003c/p\u003e\n","keyPoints":["Eighty-four percent of government IT security leaders agree that sharing sensitive data across networks heightens their cyber risk.","Fifty-three percent of surveyed security leaders in government, defense, and critical services still rely on manual processes to move sensitive data between systems.","Major managed file transfer breaches demonstrate that attackers consistently target the pipelines that move data between trust boundaries.","Secure data movement across boundaries requires a layered architectural model that combines Zero Trust, data-centric security, and cross-domain solutions."],"insights":["The traditional IT/OT air gap is effectively obsolete, as 75% of operational technology attacks now originate from IT breaches, forcing organizations to treat internal network boundaries as active attack surfaces rather than isolated perimeters.","AI-driven security pipelines will bypass manual data transfer bottlenecks, forcing autonomous systems to operate on stale or incomplete intelligence when human-dependent processes cannot keep pace with millisecond decision cycles.","Treating cross-boundary data transfer as a simple routing problem instead of a trust problem creates a critical architectural blind spot where policy enforcement collapses exactly when data crosses into new environments."],"referencedReports":[],"body":"\u003cp\u003eSecure data movement across network boundaries has emerged as the critical, overlooked bottleneck in modern Zero Trust programs.\u003c/p\u003e\n\n\u003cp\u003eRecent research indicates that 84% of government IT security leaders recognize that sharing sensitive data across networks significantly increases cyber risk, yet 53% still depend on manual transfer processes. As threat volumes rise and third-party involvement in breaches doubles, the traditional assumption that connectivity equals security is failing. When data crosses trust boundaries, it requires rigorous validation and policy enforcement, which outdated infrastructure and manual workflows cannot provide at the speed modern operations demand.\u003c/p\u003e\n\n\u003cp\u003eThe perceived trade-off between speed and security is a myth; relying on slow, manual processes forces AI-driven detection systems to operate on stale or incomplete data. Addressing this gap requires a layered architectural approach that integrates Zero Trust, data-centric security, and cross-domain solutions. This combined framework enforces trust at the boundary, enabling near-real-time data sharing without compromising integrity or control. Ultimately, the movement of data itself, rather than identity or endpoints, represents the most exploitable vulnerability in current security postures.\u003c/p\u003e\n"},{"n":9,"title":"Microsoft asks iPhone users to reauthenticate after Outlook outage","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-asks-iphone-users-to-re-enter-credentials-after-outlook-outage/","time":"08:37","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Following a widespread Outlook.com outage, Microsoft restored service but now requires iPhone users to manually re-enter their credentials in the iOS Mail app to regain account access.","briefOverview":"\u003cp\u003eMicrosoft recently resolved a widespread outage that disrupted Outlook.com access for users globally. The incident caused intermittent sign-in failures and forced some accounts to log out unexpectedly. Microsoft attributed the disruption to a recently introduced change but provided no further technical details.\u003c/p\u003e\n\n\u003cp\u003eWhile core service health was restored by Monday evening, the company now requires iPhone users to manually re-enter their credentials in the iOS Mail app. This workaround involves navigating through the device settings to update account passwords and verify synchronization. The outage was officially classified as a service degradation event rather than a complete shutdown. Microsoft has not disclosed the exact root cause, geographic impact, or total number of affected users. This incident follows a series of other recent Microsoft 365 and Outlook service disruptions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft addressed a widespread outage on Monday that prevented Outlook.com users worldwide from accessing their mailboxes. Customers reported intermittent sign-in issues and some were unexpectedly signed out of their accounts. Affected users also encountered \u0026ldquo;too many requests\u0026rdquo; errors during the disruption.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft initially blamed the sign-in failures on a recently introduced change without sharing additional specifics. The company confirmed that service health returned to normal around 7 PM UTC on Monday. However, iOS users must now manually re-enter their credentials to regain access via the default Mail app. Microsoft provided an eight-step procedure guiding users to update their passwords through the iPhone Settings menu.\u003c/p\u003e\n\n\u003cp\u003eThe company has not released information regarding the outage\u0026rsquo;s root cause, affected regions, or the total number of impacted users. The incident was labeled as causing service degradation, a classification typically reserved for noticeable user impact that does not completely take the service offline. This event occurs amid a pattern of recent Microsoft service disruptions.\u003c/p\u003e\n\n\u003cp\u003eIn March, Microsoft resolved an Exchange Online outage that blocked mailbox and calendar access across multiple platforms. That same month, a separate issue disrupted sign-ins for Microsoft 365 Copilot and Office.com. More recently, an early April bug prevented some Classic Outlook users from sending or replying to emails, resulting in specific non-delivery report errors. Microsoft is also currently investigating a bug that causes the mouse pointer to disappear in Classic Outlook and OneNote. Additionally, the company is addressing an error that triggers server connection failures when users attempt to create groups in Classic Outlook.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nMicrosoft recently mitigated a widespread outage that disrupted Outlook.com access for users globally. The disruption began on Monday and lasted approximately ten hours before the first user reports were addressed. During this window, customers experienced intermittent sign-in failures that blocked access to their mailboxes via the Outlook.com web interface. Some affected users were also forcibly signed out of their accounts and encountered recurring \u0026ldquo;too many requests\u0026rdquo; error messages. Microsoft attributed the initial sign-in issues to a \u0026ldquo;recently introduced change\u0026rdquo; but declined to provide further technical specifics at the time.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Impact \u0026amp; Required Workarounds\u003c/strong\u003e\nWhile Microsoft confirmed that core service health returned to normal around 7 PM UTC on Monday, the resolution introduced a platform-specific requirement for iOS users. iPhone users must now manually re-enter their credentials to regain access to their Outlook and Hotmail accounts through the default Mail app. The company published a mandatory eight-step procedure to guide this process:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOpen the Settings app on the iPhone.\u003c/li\u003e\n\u003cli\u003eNavigate to Mail and select Accounts.\u003c/li\u003e\n\u003cli\u003eTap the affected email account.\u003c/li\u003e\n\u003cli\u003eAccess Account Settings or the Password field directly.\u003c/li\u003e\n\u003cli\u003eEnter the correct or updated password.\u003c/li\u003e\n\u003cli\u003eSave the changes by tapping Done.\u003c/li\u003e\n\u003cli\u003eOpen the Mail app to verify proper synchronization and email flow.\nThis manual re-authentication step highlights a decoupling of credential tokens between Microsoft\u0026rsquo;s backend services and Apple\u0026rsquo;s native iOS mail client following the outage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eClassification \u0026amp; Transparency\u003c/strong\u003e\nMicrosoft has not disclosed the root cause of the outage, the specific geographic regions impacted, or the total number of affected users. The incident was officially flagged as causing \u0026ldquo;service degradation.\u0026rdquo; This classification is typically applied to events that produce noticeable user impact without completely taking the service offline for the entire user base. The lack of detailed post-incident reporting leaves the exact nature of the \u0026ldquo;recently introduced change\u0026rdquo; and its interaction with iOS authentication protocols unexplained.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eBroader Context \u0026amp; Recent Service Disruptions\u003c/strong\u003e\nThis Outlook.com incident is part of a broader pattern of recent Microsoft 365 and Outlook service instability:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMarch Exchange Online Outage:\u003c/strong\u003e Blocked customer access to mailboxes and calendars across Outlook on the web, Outlook desktop, Exchange ActiveSync, and other connection protocols.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMarch Copilot/Office.com Issue:\u003c/strong\u003e Caused sign-in problems impacting the Microsoft Copilot desktop app, Copilot in Teams, and Copilot within Office apps.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEarly April Classic Outlook Bug:\u003c/strong\u003e Prevented users from sending or replying to emails, generating non-delivery reports with specific error codes (0x80070005-0x0004dc-0x000524).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOngoing Pointer Disappearance Bug:\u003c/strong\u003e Currently under investigation, affecting Classic Outlook, OneNote, and other Microsoft 365 apps.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGroup Creation Server Error:\u003c/strong\u003e Triggers \u0026ldquo;Can\u0026rsquo;t connect to the server\u0026rdquo; messages when users attempt to create groups in Classic Outlook.\nThese recurring issues suggest ongoing challenges in maintaining service stability across Microsoft\u0026rsquo;s interconnected cloud and desktop ecosystems.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft addressed a widespread outage affecting Outlook.com users worldwide on Monday that caused intermittent sign-in issues and account sign-outs.","Microsoft requires iPhone users to manually re-enter their credentials in the iOS Settings app to regain access to their Outlook and Hotmail accounts via the default Mail app.","Microsoft blamed the sign-in issues on a recently introduced change but has not disclosed the root cause, affected regions, or the number of users impacted.","The incident was flagged as causing service degradation, a label typically used for incidents with noticeable user impact that do not take the service offline for everyone."],"insights":["The attribution of the outage to a \"recently introduced change\" highlights how routine platform updates can trigger cascading authentication failures across global services.","The specific instruction for iOS users to re-enter credentials in the native Mail app, rather than the Outlook app, indicates a platform-specific failure in how Apple's iOS handles Microsoft account token synchronization.","Microsoft's use of the \"service degradation\" label for an incident causing widespread sign-in failures and forced logouts demonstrates a potential misalignment between internal severity classifications and actual user disruption.","The rapid succession of multiple distinct Microsoft 365 and Outlook issues within a short timeframe points to a broader pattern of platform instability that may require stricter change control or rollback protocols."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft recently resolved a widespread outage that disrupted Outlook.com access for users globally. The incident caused intermittent sign-in failures and forced some accounts to log out unexpectedly. Microsoft attributed the disruption to a recently introduced change but provided no further technical details.\u003c/p\u003e\n\n\u003cp\u003eWhile core service health was restored by Monday evening, the company now requires iPhone users to manually re-enter their credentials in the iOS Mail app. This workaround involves navigating through the device settings to update account passwords and verify synchronization. The outage was officially classified as a service degradation event rather than a complete shutdown. Microsoft has not disclosed the exact root cause, geographic impact, or total number of affected users. This incident follows a series of other recent Microsoft 365 and Outlook service disruptions.\u003c/p\u003e\n"},{"n":1,"title":"China-linked hackers led phishing campaigns targeting journalists and activists, researchers say","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/china-linked-hackers-led-phishing-campaigns-journalists","time":"04:00","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"

        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
