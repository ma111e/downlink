<script>
window.__DL_ARTICLES = [{"n":1,"title":"Oracle PeopleSoft servers hacked in ShinyHunters data theft attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/oracle-peoplesoft-servers-hacked-in-shinyhunters-data-theft-attacks/","time":"18:31","priority":"MUST READ","score":94,"tldr":"ShinyHunters claims it is stealing data from Oracle PeopleSoft cloud and on-premises servers using a mix of old and possible zero-day flaws, with more than 100 organizations allegedly affected. PeopleSoft operators should check logs for the reported IP indicators and begin incident response if they see related activity.","briefOverview":"\u003cp\u003eOracle PeopleSoft servers are being targeted in ongoing data theft attacks attributed by the threat actor to the ShinyHunters extortion gang. ShinyHunters told BleepingComputer it stole data from 300 instances across more than 100 organizations. The attacks affect both cloud and on-premises Oracle PeopleSoft customer instances.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is used by large organizations for functions including human resources, payroll, finance, supply chain management, procurement, and student administration. ShinyHunters said most affected organizations are in the education sector, and it identified Nottingham University as one victim whose data had already been published on its leak site. Nottingham University also released a statement acknowledging a cybersecurity incident.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor claimed it is using a “gadget chain” of old and zero-day vulnerabilities, but said the attack does not work on all systems and may depend on instance configuration. Researcher Michael R found exposed directories containing tooling related to the activity, including MeshCentral agents, a defacement and credential spray script, and staging materials. The article advises PeopleSoft operators to review logs for connections from the listed IP addresses and begin incident response if indicators are found.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOracle PeopleSoft customer servers are being targeted in ongoing data theft attacks tied to the ShinyHunters extortion gang. BleepingComputer reported that customers running both cloud and on-premises PeopleSoft instances were receiving extortion demands signed by ShinyHunters. The threat actor later confirmed to BleepingComputer that it was behind the attacks.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed it stole data from 300 instances across more than 100 organizations. According to the actor, most affected organizations are in the education sector, including many that had previously been extorted by the group. The actor also said its initial goal was to breach an FBI portal running PeopleSoft, but that attempt was unsuccessful.\u003c/p\u003e\n\n\u003cp\u003eThe group said it is using a “gadget chain” of old and zero-day vulnerabilities to conduct the attacks. It also said exploitation is not working on all systems and may depend on how each PeopleSoft instance is configured. BleepingComputer contacted Oracle to ask whether it was aware of a PeopleSoft zero-day being exploited in data theft attacks, but had not received a reply at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity researcher Michael R found exposed online directories containing tooling connected to the attacks. The visible materials included MeshCentral agents, staging materials, and a defacement and credential spray script. Some infrastructure used TLS certificates with the common name “azurenetfiles[.]net,” a domain previously linked to ShinyHunters.\u003c/p\u003e\n\n\u003cp\u003eFive exposed servers contained a .bash_history file that gave insight into the activity. One shell script was designed to create a ransom note named “README-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT” on internal PeopleSoft servers after compromise. The script parsed /etc/hosts for PeopleSoft-related systems, attempted SSH access using accounts such as “psoft,” “oracle,” and “linuxadm,” and then tried to place the ransom note in PeopleSoft web and application server directories.\u003c/p\u003e\n\n\u003cp\u003eThe article advises organizations running Oracle PeopleSoft to analyze logs for connections from the published IP addresses. If those indicators are found, organizations are advised to begin incident response, investigate whether their PeopleSoft instance was compromised, and consider temporarily removing affected servers from internet access until the environment can be secured and reviewed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOracle PeopleSoft servers are being targeted in ongoing data theft attacks by the ShinyHunters extortion gang, according to the article. The attacks are affecting both cloud and on-premises Oracle PeopleSoft customer instances. BleepingComputer reported that customers were receiving extortion demands signed by ShinyHunters, and the threat actor later confirmed to BleepingComputer that it was behind the activity.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is described as an enterprise business software suite used by large organizations to manage operations such as human resources, payroll, finance, supply chain management, procurement, and student administration. Because of its role in large organizations, compromise of PeopleSoft environments may involve sensitive organizational data, although the article does not enumerate the exact data types stolen.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-scale-and-victims\"\u003eClaimed Scale and Victims\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters claimed it stole data from 300 PeopleSoft instances across more than 100 organizations. The threat actor said most impacted organizations are in the education sector. It also said many of those organizations had previously been extorted by the group.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor identified Nottingham University as a victim of these attacks. It claimed the university’s data had already been published on the ShinyHunters data leak site. The article also states that the university released a statement acknowledging that it had suffered a cybersecurity incident.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters also claimed its initial goal was to breach an FBI portal running PeopleSoft. The group said it wanted to “publish a statement and set the record straight on some misinsformation that has been spreading.” However, it said the attempt was not successful and that it did not gain access to the FBI instance.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-exploitation-method\"\u003eClaimed Exploitation Method\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters told BleepingComputer it is using a “gadget chain” of old and zero-day vulnerabilities to conduct the attacks. The group said the attack does not work on all systems. It also said exploitation success may depend on how a PeopleSoft instance is configured.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted Oracle to ask whether it was aware of an Oracle PeopleSoft zero-day being exploited in data theft attacks. The article states that Oracle had not replied at the time of publication. Oracle had also not publicly disclosed information about the attacks, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-findings-and-exposed-tooling\"\u003eResearcher Findings and Exposed Tooling\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher “Michael R” found several exposed online directories containing tooling related to the activity. The researcher said the exposed directories revealed ongoing targeting of PeopleSoft environments. The visible materials included staging materials, MeshCentral agents, and a defacement and credential spray script.\u003c/p\u003e\n\n\u003cp\u003eThe researcher shared multiple IP addresses as indicators of compromise related to the attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e142.11.200[.]186\u003c/li\u003e\n\u003cli\u003e142.11.200[.]187\u003c/li\u003e\n\u003cli\u003e142.11.200[.]188\u003c/li\u003e\n\u003cli\u003e142.11.200[.]189\u003c/li\u003e\n\u003cli\u003e142.11.200[.]190\u003c/li\u003e\n\u003cli\u003e108.174.202[.]99\u003c/li\u003e\n\u003cli\u003e176.120.22[.]24\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSome of these IP addresses used a TLS certificate with the common name “azurenetfiles[.]net.” The article states that this domain was previously linked to the ShinyHunters extortion gang.\u003c/p\u003e\n\n\u003ch2 id=\"script-behavior-described-in-the-article\"\u003eScript Behavior Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eFive of the exposed servers had a .bash_history file that gave insight into the attacks. One shell script was designed to create a ransom note named “README-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT” on an internal PeopleSoft server after it was breached.\u003c/p\u003e\n\n\u003cp\u003eThe script parsed \u003ccode\u003e/etc/hosts\u003c/code\u003e to identify PeopleSoft-related systems. It attempted to connect to those systems over SSH using common PeopleSoft and Oracle administrative accounts, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epsoft\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eoracle\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elinuxadm\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIf password authentication failed, the script attempted SSH key-based authentication as a fallback. Once connected, it dropped the ransom note into directories associated with PeopleSoft web and application servers.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-in-the-article\"\u003eRecommended Actions in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article strongly advises organizations running Oracle PeopleSoft to analyze logs for connections from the listed IP addresses. It says that if the indicators are found, organizations should immediately begin incident response. It also advises organizations to investigate whether their PeopleSoft instance was compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article further says organizations should consider temporarily removing affected servers from internet access until the environment can be secured and reviewed.\u003c/p\u003e\n","keyPoints":["The ShinyHunters extortion gang told BleepingComputer it is behind ongoing data theft attacks targeting Oracle PeopleSoft cloud and on-premises customer instances.","ShinyHunters claimed it stole data from 300 PeopleSoft instances across more than 100 organizations, with most impacted organizations in the education sector.","The threat actor said it is using a \"gadget chain\" of old and zero-day vulnerabilities, and that exploitation may depend on how a PeopleSoft instance is configured.","Cybersecurity researcher Michael R found exposed online directories containing attack-related tooling, including MeshCentral agents, a defacement and credential spray script, and staging materials.","Organizations running Oracle PeopleSoft are advised to analyze logs for connections from the listed IP addresses and begin incident response if the indicators are found."],"insights":["The attacks may not succeed uniformly across PeopleSoft environments, because ShinyHunters said exploitation success may depend on how each instance is configured.","The exposed tooling suggests attackers may pivot from a compromised PeopleSoft system by parsing /etc/hosts for related internal servers and trying SSH access with common PeopleSoft and Oracle administrative accounts such as psoft, oracle, and linuxadm.","Some infrastructure used in the activity had TLS certificates with the common name azurenetfiles.net, a domain previously linked to ShinyHunters, making certificate metadata a useful hunting clue in addition to IP indicators.","The threat actor claimed Nottingham University data had already been published on its leak site, while the university separately acknowledged a cybersecurity incident the same day."],"referencedReports":[],"body":"\u003cp\u003eOracle PeopleSoft servers are being targeted in ongoing data theft attacks attributed by the threat actor to the ShinyHunters extortion gang. ShinyHunters told BleepingComputer it stole data from 300 instances across more than 100 organizations. The attacks affect both cloud and on-premises Oracle PeopleSoft customer instances.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is used by large organizations for functions including human resources, payroll, finance, supply chain management, procurement, and student administration. ShinyHunters said most affected organizations are in the education sector, and it identified Nottingham University as one victim whose data had already been published on its leak site. Nottingham University also released a statement acknowledging a cybersecurity incident.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor claimed it is using a “gadget chain” of old and zero-day vulnerabilities, but said the attack does not work on all systems and may depend on instance configuration. Researcher Michael R found exposed directories containing tooling related to the activity, including MeshCentral agents, a defacement and credential spray script, and staging materials. The article advises PeopleSoft operators to review logs for connections from the listed IP addresses and begin incident response if indicators are found.\u003c/p\u003e\n"},{"n":2,"title":"Path traversal flaw in AI dev platform Langflow exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/path-traversal-flaw-in-ai-dev-platform-langflow-exploited-in-attacks/","time":"21:23","priority":"MUST READ","score":94,"tldr":"Attackers are actively exploiting CVE-2026-5027, a Langflow path traversal flaw that can let unauthenticated attackers write arbitrary files on exposed servers. Langflow users should upgrade to the latest release immediately.","briefOverview":"\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in the AI development platform Langflow. The flaw allows arbitrary files to be written on exposed servers through Langflow’s file upload functionality. Langflow is an open-source visual platform used for building AI applications, AI agents, RAG systems, and MCP-based workflows.\u003c/p\u003e\n\n\u003cp\u003eTenable said the vulnerable \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data, allowing path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e. VulnCheck researcher Caitlin Condon said honeypots have detected attackers exploiting the issue to drop test files on vulnerable instances. Langflow users are recommended to upgrade to the latest release, version 1.10.0.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal flaw in Langflow, to write arbitrary files on exposed servers. Langflow is an open-source visual platform for building AI applications, AI agents, Retrieval-Augmented Generation systems, and MCP-based workflows using a drag-and-drop interface. The project is widely used by AI development teams and has more than 149,000 stars and 9,200 forks on GitHub.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is in Langflow’s file upload functionality. Tenable said the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data. This allows an attacker to use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files to arbitrary locations on the filesystem.\u003c/p\u003e\n\n\u003cp\u003eTenable discovered the flaw at the start of the year and publicly disclosed it on March 27, 2026. The disclosure came more than two months after Tenable initially reported the issue to the Langflow team without receiving a response. Although Tenable did not mention a fix in its advisory, Snyk Security reported on March 30, 2026, that the issue was fixed in the langflow-base package version 0.8.3 and in the Langflow application version 1.9.0.\u003c/p\u003e\n\n\u003cp\u003eVulnCheck researcher Caitlin Condon said the company’s honeypots detected attackers exploiting the vulnerability to drop test files on vulnerable instances. Condon also said Langflow enables unauthenticated auto-login by default, meaning no credentials are required to reach the vulnerable endpoint and a single unauthenticated request can obtain a valid session token before exploitation. Censys scans identified roughly 7,000 publicly exposed Langflow instances, although the article notes that this data includes historical scan results from the previous 12 months and may not reflect the current number of exposed systems.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation follows earlier activity targeting other Langflow vulnerabilities in 2026, including CVE-2026-0770, CVE-2026-21445, and CVE-2026-33017. The article also notes that CISA warned last year about active exploitation of CVE-2025-3248, and that VulnCheck continues to observe activity against it, including activity linked to the Iranian threat group MuddyWater. Langflow users are recommended to upgrade to version 1.10.0, which was published earlier today.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in Langflow. The exploitation is being used to write arbitrary files on exposed servers. Langflow is an open-source visual platform for building AI applications, AI agents, Retrieval-Augmented Generation systems, and MCP-based workflows through a drag-and-drop interface rather than traditional coding.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes Langflow’s broad use in AI development. It states that AI development teams widely use the project and that it has accumulated more than 149,000 stars and 9,200 forks on GitHub.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-5027 affects Langflow’s file upload functionality. According to Tenable, the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data.\u003c/p\u003e\n\n\u003cp\u003eBecause the filename is not properly sanitized, an attacker can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e. Tenable explained that this allows files to be written to arbitrary locations on the filesystem.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the result as arbitrary file writes on exposed servers. It does not describe any confirmed remote code execution, data theft, or operational disruption from this specific exploitation activity.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-fix-information\"\u003eDisclosure and Fix Information\u003c/h2\u003e\n\n\u003cp\u003eTenable discovered the flaw at the start of the year. It publicly disclosed the issue on March 27, 2026, after initially reporting it to the Langflow team more than two months earlier without receiving a response.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Tenable did not mention a fix in its advisory. However, Snyk Security reported on March 30, 2026, that the issue was fixed in the \u003ccode\u003elangflow-base\u003c/code\u003e package version 0.8.3.\u003c/p\u003e\n\n\u003cp\u003eSnyk Security also reported that the Langflow application itself received a patch in version 1.9.0. The article recommends that Langflow users upgrade to the latest release, version 1.10.0, which was published earlier today.\u003c/p\u003e\n\n\u003ch2 id=\"observed-exploitation\"\u003eObserved Exploitation\u003c/h2\u003e\n\n\u003cp\u003eVulnCheck security researcher Caitlin Condon said the company’s honeypots have detected attackers exploiting CVE-2026-5027. The observed activity involved dropping test files on vulnerable instances.\u003c/p\u003e\n\n\u003cp\u003eCondon said Langflow enables unauthenticated auto-login by default. As a result, no credentials are required to reach the vulnerable endpoint, and a single unauthenticated request is sufficient to obtain a valid session token before proceeding with exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"exposure\"\u003eExposure\u003c/h2\u003e\n\n\u003cp\u003eCondon added that Censys scans identified roughly 7,000 publicly exposed Langflow instances. The article cautions that Censys data includes historical scan results from the previous 12 months.\u003c/p\u003e\n\n\u003cp\u003eBecause of that limitation, the number may not accurately reflect how many Langflow systems are currently exposed.\u003c/p\u003e\n\n\u003ch2 id=\"related-langflow-vulnerability-activity\"\u003eRelated Langflow Vulnerability Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-5027 exploitation in the context of earlier activity targeting Langflow vulnerabilities. It says exploitation of this flaw follows similar activity earlier in the year targeting CVE-2026-0770, CVE-2026-21445, and CVE-2026-33017.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that the U.S. Cybersecurity \u0026amp; Infrastructure Security Agency warned last year about active exploitation of CVE-2025-3248. According to Caitlin Condon, VulnCheck continues to observe activity against CVE-2025-3248, including activity linked to the Iranian threat group MuddyWater.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that Langflow users upgrade to the latest release. The latest release cited is Langflow version 1.10.0, published earlier today.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies previously reported fixed versions: \u003ccode\u003elangflow-base\u003c/code\u003e version 0.8.3 and Langflow application version 1.9.0, as reported by Snyk Security.\u003c/p\u003e\n","keyPoints":["Attackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in Langflow, to write arbitrary files on exposed servers.","The flaw affects Langflow's file upload functionality because the POST /api/v2/files endpoint does not properly sanitize the filename parameter in multipart form data.","Tenable publicly disclosed CVE-2026-5027 on March 27, 2026, after reporting it to the Langflow team more than two months earlier without receiving a response.","Snyk Security reported that the issue was fixed in langflow-base version 0.8.3 and in the Langflow application version 1.9.0.","Langflow users are recommended to upgrade to the latest release, version 1.10.0."],"insights":["Because Langflow enables unauthenticated auto-login by default, attackers may not need credentials to reach the vulnerable endpoint and can obtain a valid session token with a single unauthenticated request.","VulnCheck observed exploitation that drops test files, indicating attackers may currently be probing vulnerable Langflow instances before more damaging follow-on activity.","Censys identified roughly 7,000 publicly exposed Langflow instances, but the article notes this figure may be inflated because it includes historical scan results from the prior 12 months.","Langflow has faced repeated exploitation of separate vulnerabilities across 2025 and 2026, including continued activity against CVE-2025-3248 linked by VulnCheck to MuddyWater."],"referencedReports":[{"title":"TRA-2026-26","url":"https://www.tenable.com/security/research/tra-2026-26","publisher":"Tenable","context":"The article cites Tenable's advisory explaining CVE-2026-5027 and noting that Tenable discovered and publicly disclosed the flaw.","category":"","primary":false},{"title":"SNYK-PYTHON-LANGFLOWBASE-15842030","url":"https://security.snyk.io/vuln/SNYK-PYTHON-LANGFLOWBASE-15842030","publisher":"Snyk Security","context":"The article cites Snyk Security's vulnerability entry reporting that the issue was fixed in langflow-base version 0.8.3 and Langflow version 1.9.0.","category":"","primary":false}],"body":"\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in the AI development platform Langflow. The flaw allows arbitrary files to be written on exposed servers through Langflow’s file upload functionality. Langflow is an open-source visual platform used for building AI applications, AI agents, RAG systems, and MCP-based workflows.\u003c/p\u003e\n\n\u003cp\u003eTenable said the vulnerable \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data, allowing path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e. VulnCheck researcher Caitlin Condon said honeypots have detected attackers exploiting the issue to drop test files on vulnerable instances. Langflow users are recommended to upgrade to the latest release, version 1.10.0.\u003c/p\u003e\n"},{"n":3,"title":"The ‘Miasma’ worm source code briefly leaked on GitHub","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-miasma-worm-source-code-briefly-leaked-on-github/","time":"20:27","priority":"SHOULD READ","score":88,"tldr":"The Miasma credential-stealing worm framework briefly leaked on GitHub, exposing code that can steal developer/cloud credentials, hijack repositories and packages, and self-propagate through open-source supply chains. The leak may fuel more advanced copycat attacks against npm, PyPI, RubyGems, GitHub, and CI/CD environments.","briefOverview":"\u003cp\u003eThe Miasma credential-stealing attack framework was briefly open-sourced on GitHub. SafeDep reported that the source code appeared in repositories named \u0026ldquo;Miasma-Open-Source-Release\u0026rdquo; across numerous compromised developer accounts, indicating a deliberate release rather than an accidental leak. Miasma appears to be an evolution of the earlier Shai-Hulud worm and shares many of its features, techniques, and code.\u003c/p\u003e\n\n\u003cp\u003eMiasma is designed to infect developer machines, steal build environment and cloud credentials, and use them to compromise legitimate repositories and packages. It can publish trojanized package versions to infect downstream developers and continue the cycle, creating an autonomous worm-like supply-chain threat. The article links Miasma to previous attacks against Red Hat npm packages and 73 Microsoft repositories on GitHub.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s analysis found that Miasma requires no traditional command-and-control infrastructure because it uses GitHub for that purpose. The leaked code also revealed a dead-man switch that can delete files from a user’s home and Documents folders if a stolen GitHub token used for exfiltration is revoked. The article says the leak may lead to more advanced variants and increased attack rates, as happened after the Shai-Hulud leak.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Miasma credential-stealing attack framework was briefly leaked on GitHub after being published through numerous compromised developer accounts. The repositories used the name \u0026ldquo;Miasma-Open-Source-Release,\u0026rdquo; which SafeDep said suggested a deliberate release rather than an accidental leak. The article describes Miasma as an evolution of the earlier Shai-Hulud worm, sharing much of the same functionality, techniques, and code.\u003c/p\u003e\n\n\u003cp\u003eMiasma targets open-source ecosystems through supply-chain attacks. It infects developer machines, steals build environment and cloud credentials, and uses those credentials to compromise legitimate repositories and packages. It can then publish trojanized package versions that infect downstream developers and repeat the process through a worm-like self-propagation mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe malware has been linked in the article to high-profile attacks involving Red Hat npm packages and 73 Microsoft repositories on GitHub. SafeDep’s analysis found that the toolkit does not need separate command-and-control infrastructure because it uses GitHub for that role. The framework can harvest credentials from cloud providers, CI/CD systems, password managers, Kubernetes, and secret stores.\u003c/p\u003e\n\n\u003cp\u003eThe leaked code showed that Miasma can compromise npm, PyPI, and RubyGems packages, as well as GitHub repositories, Actions workflows, and JFrog Artifactory instances. It can also move laterally through SSH and AWS Systems Manager, and poison configurations for AI coding tools including Claude, Gemini, Cursor, Copilot, Kiro, and Cline. These capabilities broaden its impact across developer environments, cloud systems, package ecosystems, and coding-assistant configurations.\u003c/p\u003e\n\n\u003cp\u003eA notable feature in the leaked code is a dead-man switch tied to stolen GitHub tokens used as an exfiltration channel. The component checks token validity every minute and, if the token is revoked, executes a destructive command that deletes files and directories in the user’s home and Documents folders. The monitor runs as a systemd user service on Linux or a LaunchAgent on macOS and can remain active for up to 72 hours.\u003c/p\u003e\n\n\u003cp\u003eThe leaked code also revealed a five-stage build pipeline that generates unique payloads for each build. SafeDep reported that it uses AES-256-GCM encryption, randomized string obfuscation, source transformations, JavaScript obfuscation, and a self-extracting loader wrapped in three encryption layers. The article warns that, as with the Shai-Hulud leak, the Miasma source-code release could lead to more advanced variants and increased attacks, and advises developers to pin dependencies, delay adoption of newly released package updates, and validate builds in isolated test environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Miasma credential-stealing attack framework was briefly open-sourced on GitHub. SafeDep said the source code was published through numerous compromised developer accounts, each using a repository named \u0026ldquo;Miasma-Open-Source-Release.\u0026rdquo; The article states that this pattern indicates the threat actors deliberately released the source code, rather than the leak being accidental.\u003c/p\u003e\n\n\u003cp\u003eMiasma is described as an evolution of the earlier Shai-Hulud worm. According to the article, Miasma shares many of Shai-Hulud’s features, techniques, and even code. The earlier Shai-Hulud code had also previously been leaked on GitHub.\u003c/p\u003e\n\n\u003ch2 id=\"supply-chain-role-and-propagation\"\u003eSupply-chain role and propagation\u003c/h2\u003e\n\n\u003cp\u003eMiasma targets open-source ecosystems through supply-chain attacks. The malware infects a developer machine, steals the build environment and cloud credentials, and then uses those credentials to compromise legitimate repositories and packages. It publishes trojanized versions of packages to infect downstream developers and repeat the cycle.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes the autonomous, worm-like nature of this propagation mechanism. A single breach can potentially expand into a widespread supply-chain attack because the malware can use stolen credentials to compromise additional packages and repositories. This self-propagation is central to the risk described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"previously-linked-incidents\"\u003ePreviously linked incidents\u003c/h2\u003e\n\n\u003cp\u003eThe article says Miasma has previously been linked to high-profile attacks against Red Hat npm packages. It also says Miasma was more recently linked to an incident involving 73 Microsoft repositories on GitHub. These references are presented as examples of the malware’s prior activity against widely used developer and open-source infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"safedep-s-findings\"\u003eSafeDep’s findings\u003c/h2\u003e\n\n\u003cp\u003eSafeDep reported that the Miasma source code was leaked on GitHub through numerous compromised developer accounts. The article relies on SafeDep’s analysis to describe the leaked files, the toolkit’s architecture, and several technical capabilities. SafeDep’s reporting is the primary source cited for details about the code leak and the malware’s internal design.\u003c/p\u003e\n\n\u003cp\u003eOne major finding from the analysis is that Miasma requires no traditional command-and-control infrastructure. Instead, the toolkit uses GitHub for that purpose. This design allows GitHub itself to serve as part of the malware’s operational mechanism.\u003c/p\u003e\n\n\u003ch2 id=\"credential-theft-and-target-scope\"\u003eCredential theft and target scope\u003c/h2\u003e\n\n\u003cp\u003eThe framework is designed to harvest credentials from multiple developer and infrastructure environments. The article specifically lists:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloud providers\u003c/li\u003e\n\u003cli\u003eCI/CD systems\u003c/li\u003e\n\u003cli\u003ePassword managers\u003c/li\u003e\n\u003cli\u003eKubernetes\u003c/li\u003e\n\u003cli\u003eSecret stores\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMiasma can abuse those credentials to compromise multiple package and repository ecosystems. The article names npm, PyPI, and RubyGems packages as targets, along with GitHub repositories, GitHub Actions workflows, and JFrog Artifactory instances.\u003c/p\u003e\n\n\u003ch2 id=\"lateral-movement-and-developer-tool-poisoning\"\u003eLateral movement and developer-tool poisoning\u003c/h2\u003e\n\n\u003cp\u003eThe leaked source code also showed that Miasma can move laterally through SSH and AWS Systems Manager. These capabilities allow it to expand within environments where stolen credentials provide access.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Miasma can poison configurations of AI coding tools. The tools named are Claude, Gemini, Cursor, Copilot, Kiro, and Cline. This places developer assistant configurations among the environments affected by the framework.\u003c/p\u003e\n\n\u003ch2 id=\"dead-man-switch-behavior\"\u003eDead-man switch behavior\u003c/h2\u003e\n\n\u003cp\u003eOne notable feature revealed in the leaked Miasma source code is a dead-man switch. The article says this component is installed when the malware uses a victim’s stolen GitHub token as an exfiltration channel.\u003c/p\u003e\n\n\u003cp\u003eThe dead-man switch monitors the token’s validity every minute. If the token is revoked, it executes a destructive command that recursively deletes files and directories in the user’s home and Documents folders. The command shown in the article is \u003ccode\u003erm -rf ~/; rm -rf ~/Documents\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe monitor runs as a systemd user service on Linux or a LaunchAgent on macOS. It remains active for up to 72 hours.\u003c/p\u003e\n\n\u003ch2 id=\"build-pipeline-and-obfuscation\"\u003eBuild pipeline and obfuscation\u003c/h2\u003e\n\n\u003cp\u003eThe leaked code also revealed a five-stage build pipeline that generates unique payloads for each build. SafeDep reported that the process combines several layers of protection and obfuscation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePer-file AES-256-GCM encryption of embedded assets\u003c/li\u003e\n\u003cli\u003eRandomized string obfuscation\u003c/li\u003e\n\u003cli\u003eSource transformations\u003c/li\u003e\n\u003cli\u003eJavaScript obfuscation\u003c/li\u003e\n\u003cli\u003eA self-extracting loader that wraps the final payload in three layers of encryption\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says random keys and a randomized outer encoding layer ensure that each generated sample differs from previous builds. This makes signature-based detection and static analysis harder.\u003c/p\u003e\n\n\u003ch2 id=\"expected-consequence-of-the-leak\"\u003eExpected consequence of the leak\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the Miasma leak to the earlier Shai-Hulud leak. It states that the leak of Shai-Hulud led to more advanced variants, including Miasma, and to increased attack rates. The article says the Miasma source-code leak is expected to have a similar effect as threat actors adopt and further modify the code.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as a significant concern for the open-source ecosystem. Supply-chain attacks continue to target the ecosystem at an unprecedented pace, and the availability of Miasma’s source code could increase the risk of further campaigns.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-developer-precautions\"\u003eRecommended developer precautions\u003c/h2\u003e\n\n\u003cp\u003eThe article advises software developers to take several precautions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePin project dependencies.\u003c/li\u003e\n\u003cli\u003eIntroduce multi-day delays before adopting newly released package updates.\u003c/li\u003e\n\u003cli\u003eValidate new builds in isolated test environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations are presented as measures to reduce exposure to trojanized package updates and fast-moving supply-chain attacks.\u003c/p\u003e\n","keyPoints":["The Miasma credential-stealing attack framework was briefly open-sourced on GitHub through repositories named \"Miasma-Open-Source-Release\" on numerous compromised developer accounts.","Miasma appears to be an evolution of the earlier Shai-Hulud worm and shares many of the same features, techniques, and code.","The malware steals build environment and cloud credentials, compromises legitimate repositories and packages, and publishes trojanized versions to infect downstream developers.","SafeDep found that Miasma requires no command-and-control infrastructure because it uses GitHub for that purpose.","The leaked source code revealed a dead-man switch that can delete files in a user's home and Documents folders if a stolen GitHub token used for exfiltration is revoked."],"insights":["Miasma’s use of GitHub as its command-and-control mechanism means defenders should treat suspicious repository activity, token use, and workflow changes as potential malware coordination signals, not just code-hosting events.","Revoking a stolen GitHub token may trigger Miasma’s dead-man switch, so incident responders should consider isolating and preserving affected developer systems before or while invalidating exposed tokens.","Miasma’s build pipeline produces unique, heavily encrypted payloads for each build, making reliance on static signatures less effective against generated samples.","The article recommends delaying adoption of newly released package updates by multiple days, which is an actionable mitigation against fast-moving trojanized dependency campaigns.","Miasma’s ability to poison configurations for AI coding tools such as Claude, Gemini, Cursor, Copilot, Kiro, and Cline expands supply-chain risk beyond package managers and CI/CD systems into developer assistant environments."],"referencedReports":[{"title":"Inside the Miasma Supply Chain Attack Toolkit","url":"https://safedep.io/inside-the-miasma-supply-chain-attack-toolkit/","publisher":"SafeDep","context":"The article cites SafeDep researchers as reporting that the Miasma source code was leaked on GitHub and uses their analysis to describe the toolkit’s capabilities and architecture.","category":"","primary":false}],"body":"\u003cp\u003eThe Miasma credential-stealing attack framework was briefly open-sourced on GitHub. SafeDep reported that the source code appeared in repositories named \u0026ldquo;Miasma-Open-Source-Release\u0026rdquo; across numerous compromised developer accounts, indicating a deliberate release rather than an accidental leak. Miasma appears to be an evolution of the earlier Shai-Hulud worm and shares many of its features, techniques, and code.\u003c/p\u003e\n\n\u003cp\u003eMiasma is designed to infect developer machines, steal build environment and cloud credentials, and use them to compromise legitimate repositories and packages. It can publish trojanized package versions to infect downstream developers and continue the cycle, creating an autonomous worm-like supply-chain threat. The article links Miasma to previous attacks against Red Hat npm packages and 73 Microsoft repositories on GitHub.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s analysis found that Miasma requires no traditional command-and-control infrastructure because it uses GitHub for that purpose. The leaked code also revealed a dead-man switch that can delete files from a user’s home and Documents folders if a stolen GitHub token used for exfiltration is revoked. The article says the leak may lead to more advanced variants and increased attack rates, as happened after the Shai-Hulud leak.\u003c/p\u003e\n"},{"n":4,"title":"GitHub announces npm security changes to tackle supply-chain attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/github-announces-npm-security-changes-to-tackle-supply-chain-attacks/","time":"19:41","priority":"SHOULD READ","score":84,"tldr":"GitHub’s upcoming npm v12 will block dependency install scripts, Git-based dependencies, and remote URL dependencies from running or resolving automatically unless explicitly approved. The change is meant to reduce npm supply-chain attacks that abuse npm install for automatic code execution.","briefOverview":"\u003cp\u003eGitHub announced that npm v12, expected next month, will introduce security-focused changes to reduce supply-chain attacks that abuse behaviors triggered by the \u003ccode\u003enpm install\u003c/code\u003e command. The command is widely used to download dependencies and run install-related package scripts after cloning projects, pulling updates, or during CI/CD builds. GitHub’s main change is to stop trusting automatic code execution and non-registry dependency sources by default.\u003c/p\u003e\n\n\u003cp\u003eStarting in npm v12, \u003ccode\u003enpm install\u003c/code\u003e will not run dependency \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts unless they are explicitly approved. The same approval requirement applies to native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies. GitHub will also require explicit permission before fetching dependencies from Git repositories or resolving remote URL dependencies such as HTTPS tarballs.\u003c/p\u003e\n\n\u003cp\u003eThe article says these defaults could have disrupted techniques used in recent npm supply-chain attacks, including malicious install-script campaigns, data-stealing packages, and Git dependency abuse documented in Shai-Hulud attacks. Projects that rely on these behaviors for legitimate workflows will need to explicitly opt in before upgrading to npm v12. GitHub recommends upgrading to npm 11.16.0 or newer first, because it displays warnings for actions that will break under version 12.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub announced upcoming breaking security changes for npm v12, expected next month, aimed at blocking supply-chain attacks that abuse \u003ccode\u003enpm install\u003c/code\u003e. The article explains that \u003ccode\u003enpm install\u003c/code\u003e downloads and installs project dependencies and runs install-related scripts defined by packages. Developers commonly run it after cloning a project, pulling updates, or in CI/CD builds, making it a target for attackers seeking automated code execution during package installation.\u003c/p\u003e\n\n\u003cp\u003eThe main shift in npm v12 is that automatic code execution and non-registry dependency sources will require explicit approval instead of being trusted by default. Starting in version 12, \u003ccode\u003enpm install\u003c/code\u003e will not run \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts from dependencies unless those scripts have been explicitly approved. This also covers native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies.\u003c/p\u003e\n\n\u003cp\u003eGitHub also said npm v12 will no longer fetch dependencies from Git repositories unless they are explicitly permitted, whether those dependencies are direct or transitive. The article states this removes a code execution path in which a Git dependency’s \u003ccode\u003e.npmrc\u003c/code\u003e file could alter which Git executable is used, even when install scripts are disabled. Dependencies installed from remote URLs, including HTTPS tarballs, will also no longer be resolved unless explicitly permitted.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the new defaults to several recent supply-chain attack techniques. It says the changes could have disrupted malicious \u003ccode\u003epreinstall\u003c/code\u003e and \u003ccode\u003epostinstall\u003c/code\u003e script campaigns targeting \u003ccode\u003eeslint-config-prettier\u003c/code\u003e, Toptal’s Picasso packages, and dozens of data-stealing npm packages. It also mentions Git dependency abuse documented in Shai-Hulud attacks.\u003c/p\u003e\n\n\u003cp\u003eProjects that legitimately depend on automatic install scripts, Git dependencies, or remote URL dependencies will need to opt in explicitly before moving to npm v12. GitHub recommends developers prepare by upgrading to npm 11.16.0 or newer, which displays warnings for actions that will break under version 12. A community discussion has also been opened for developers to share suggestions on the upcoming changes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGitHub announced that npm v12, expected next month, will introduce several security-focused changes intended to block supply-chain attacks that abuse behaviors triggered by the \u003ccode\u003enpm install\u003c/code\u003e command. The article describes \u003ccode\u003enpm install\u003c/code\u003e as the command used to download and install a project’s dependencies and run install-related scripts defined by packages.\u003c/p\u003e\n\n\u003cp\u003eBecause developers use \u003ccode\u003enpm install\u003c/code\u003e after cloning projects, pulling updates, or during CI/CD builds, the article says attackers target it for its potential to trigger automated code execution during package installation. GitHub’s main theme is to change default trust behavior so that automatic code execution and non-registry dependency sources require explicit approval.\u003c/p\u003e\n\n\u003ch2 id=\"core-security-changes-in-npm-v12\"\u003eCore Security Changes in npm v12\u003c/h2\u003e\n\n\u003cp\u003eGitHub announced three main changes for npm v12.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003enpm install\u003c/code\u003e will not run \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts from dependencies unless they have been explicitly approved.\u003c/li\u003e\n\u003cli\u003eThe approval requirement also applies to native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enpm install\u003c/code\u003e will no longer fetch dependencies from Git repositories unless those dependencies are explicitly permitted.\u003c/li\u003e\n\u003cli\u003eDependencies installed from remote URLs, such as HTTPS tarballs, will no longer be resolved unless explicitly permitted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese changes apply to both direct and transitive Git dependencies and remote URL dependencies, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"technical-significance\"\u003eTechnical Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the changes remove automatic behaviors that have created opportunities for supply-chain abuse. By blocking unapproved install scripts, npm v12 reduces automatic execution of dependency-provided code during installation.\u003c/p\u003e\n\n\u003cp\u003eGitHub also highlighted a specific Git dependency risk: a Git dependency’s \u003ccode\u003e.npmrc\u003c/code\u003e file could alter which Git executable is used, even when install scripts are disabled. The new rule requiring explicit permission for Git dependencies is intended to remove that code execution path.\u003c/p\u003e\n\n\u003cp\u003eRemote URL dependencies, including HTTPS tarballs, will also require explicit approval. This means npm v12 will no longer automatically resolve these dependencies unless a project has permitted them.\u003c/p\u003e\n\n\u003ch2 id=\"attack-techniques-the-changes-address\"\u003eAttack Techniques the Changes Address\u003c/h2\u003e\n\n\u003cp\u003eThe article says the new defaults could have disrupted several techniques used in recent supply-chain attacks. These include malicious \u003ccode\u003epreinstall\u003c/code\u003e and \u003ccode\u003epostinstall\u003c/code\u003e script campaigns, Git dependency abuse, and attacks involving data-stealing npm packages.\u003c/p\u003e\n\n\u003cp\u003eExamples named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCampaigns targeting \u003ccode\u003eeslint-config-prettier\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eToptal’s Picasso packages.\u003c/li\u003e\n\u003cli\u003eDozens of data-stealing npm packages.\u003c/li\u003e\n\u003cli\u003eGit dependency abuse documented in Shai-Hulud attacks.\u003c/li\u003e\n\u003cli\u003eShai-Hulud attacks involving signed malicious TanStack and Mistral npm packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not describe a new active compromise tied to npm v12; it focuses on GitHub’s announced changes and the attack techniques those changes are meant to reduce.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-developers-and-projects\"\u003eImpact on Developers and Projects\u003c/h2\u003e\n\n\u003cp\u003eProjects that rely on currently automatic behaviors for legitimate workflows will need to explicitly opt in before upgrading to npm v12. This includes workflows depending on dependency install scripts, native module builds through \u003ccode\u003enode-gyp\u003c/code\u003e, Git dependencies, local file dependencies, linked dependencies, or remote URL dependencies.\u003c/p\u003e\n\n\u003cp\u003eAfter upgrading to version 12, only explicitly approved scripts and dependency sources will continue functioning automatically. As a result, projects that do not prepare may encounter broken install workflows once npm v12 is adopted.\u003c/p\u003e\n\n\u003ch2 id=\"github-s-recommended-preparation\"\u003eGitHub’s Recommended Preparation\u003c/h2\u003e\n\n\u003cp\u003eGitHub recommends that developers upgrade to npm 11.16.0 or newer before moving to npm v12. According to the article, npm 11.16.0 and later display warnings for actions that will break under version 12.\u003c/p\u003e\n\n\u003cp\u003eDevelopers can run their normal install routines on npm 11.16.0 or newer to review these warnings. This allows them to identify dependencies or workflows that will require explicit approval before upgrading to npm v12.\u003c/p\u003e\n\n\u003ch2 id=\"community-response-channel\"\u003eCommunity Response Channel\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that GitHub opened a community discussion for developers to share suggestions about the upcoming npm v12 changes. This provides a channel for feedback before the changes arrive in the next major version.\u003c/p\u003e\n","keyPoints":["GitHub announced that npm v12, expected next month, will introduce security-focused changes aimed at blocking supply-chain attacks that abuse behaviors triggered by the npm install command.","Starting in npm v12, npm install will not run preinstall, install, or postinstall scripts from dependencies unless they have been explicitly approved, including native module builds through node-gyp and prepare scripts from Git, local file, and linked dependencies.","npm install will no longer fetch dependencies from Git repositories or resolve dependencies installed from remote URLs, including HTTPS tarballs, unless they are explicitly permitted.","GitHub says the new defaults could have disrupted recent supply-chain attack techniques involving malicious install scripts, data-stealing npm packages, and Git dependency abuse documented in Shai-Hulud attacks.","GitHub recommends developers upgrade to npm 11.16.0 or newer to see warnings about actions that will break under npm v12 and identify workflows that will require explicit approval."],"insights":["Developers can identify likely npm v12 breakages before upgrading by running their normal install routines on npm 11.16.0 or newer, which surfaces warnings for behaviors that will require approval.","The changes address a code execution path that can exist even when install scripts are disabled, because a Git dependency’s .npmrc file could alter which Git executable is used.","Legitimate workflows that depend on Git, local file, linked, or remote URL dependencies will need explicit opt-in rather than relying on npm’s previous default trust model.","The new defaults would have affected multiple recent npm attack patterns, including malicious install scripts in hijacked packages and Git dependency abuse documented in Shai-Hulud attacks."],"referencedReports":[],"body":"\u003cp\u003eGitHub announced that npm v12, expected next month, will introduce security-focused changes to reduce supply-chain attacks that abuse behaviors triggered by the \u003ccode\u003enpm install\u003c/code\u003e command. The command is widely used to download dependencies and run install-related package scripts after cloning projects, pulling updates, or during CI/CD builds. GitHub’s main change is to stop trusting automatic code execution and non-registry dependency sources by default.\u003c/p\u003e\n\n\u003cp\u003eStarting in npm v12, \u003ccode\u003enpm install\u003c/code\u003e will not run dependency \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts unless they are explicitly approved. The same approval requirement applies to native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies. GitHub will also require explicit permission before fetching dependencies from Git repositories or resolving remote URL dependencies such as HTTPS tarballs.\u003c/p\u003e\n\n\u003cp\u003eThe article says these defaults could have disrupted techniques used in recent npm supply-chain attacks, including malicious install-script campaigns, data-stealing packages, and Git dependency abuse documented in Shai-Hulud attacks. Projects that rely on these behaviors for legitimate workflows will need to explicitly opt in before upgrading to npm v12. GitHub recommends upgrading to npm 11.16.0 or newer first, because it displays warnings for actions that will break under version 12.\u003c/p\u003e\n"},{"n":5,"title":"CISA to require federal agencies to patch some cyber vulnerabilities within 3 days","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cisa-to-require-federal-agencies-to-patch-3-days","time":"19:53","priority":"SHOULD READ","score":82,"tldr":"CISA will require federal civilian agencies to patch the highest-risk, internet-facing and actively exploited vulnerabilities within 72 hours, with agencies given 180 days to implement the new process. The directive is meant to prioritize fixes for vulnerabilities that can be automated and rapidly exploited, especially as AI increases attacker capabilities.","briefOverview":"\u003cp\u003eCISA released a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours. The directive is part of a prioritization system intended to address the heightened threat environment associated with the rise of artificial intelligence. Agencies have 180 days to adopt the new patching time frame.\u003c/p\u003e\n\n\u003cp\u003eThe directive uses four criteria to assess vulnerability seriousness: public internet exposure, inclusion in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated, and the level of control an adversary could gain over a vulnerable system. The three-day deadline applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over internet-facing systems. Agencies must also examine systems for compromise when a vulnerability could allow complete system control.\u003c/p\u003e\n\n\u003cp\u003eCISA said patching alone generally does not evict a threat actor, so the directive requires agencies to check when and how a vulnerable system was compromised before patching. CISA is also urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management regimes. CISA officials said the approach is meant to focus limited resources on the most at-risk assets while allowing lower-priority vulnerabilities to be deferred.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA issued a new binding operational directive that requires federal civilian agencies to patch certain cyber vulnerabilities within three days. The directive establishes a risk-based prioritization system for security updates and gives agencies 180 days to adopt the new patching timeline. CISA framed the directive as especially important because advances in artificial intelligence allow threat actors to find and exploit vulnerable assets.\u003c/p\u003e\n\n\u003cp\u003eThe directive assesses vulnerabilities using four criteria: whether the vulnerability is exposed to the public internet, whether it appears in the Known Exploited Vulnerabilities catalog, whether the exploit can be automated, and what level of control an adversary could gain over the vulnerable system. Vulnerabilities meeting three of the four criteria must be patched within 72 hours. The article specifies that this applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over internet-facing systems.\u003c/p\u003e\n\n\u003cp\u003eFor vulnerabilities that could let hackers take complete control of a system, agencies must examine systems to determine whether they have been compromised and patch within three days. Agencies will have up to two weeks to patch vulnerabilities that meet the same criteria but are not automatable, as long as a threat actor has not taken full control of a system. The directive also requires agencies to check when and how a vulnerable system was compromised before patching.\u003c/p\u003e\n\n\u003cp\u003eCISA emphasized that applying a patch generally does not remove a threat actor from a compromised environment. Acting Executive Assistant Director for Cybersecurity Chris Butera said some agencies may be newer to forensic triage and that CISA can assist with triage analysis. He also said agencies have been given a “good runway” to implement the new vulnerability management processes.\u003c/p\u003e\n\n\u003cp\u003eCISA analyzed how often federal agencies face vulnerabilities that would trigger the 72-hour requirement. At one federal agency studied by CISA, only 1% of vulnerabilities required patching within three days, while more than 60% were less serious and could be patched during the next system update. Acting CISA Director Nick Andersen said the directive is intended to help agencies focus on the highest-risk areas and improve transparency, predictability, and resource planning.\u003c/p\u003e\n\n\u003cp\u003eCISA is strongly urging state, tribal, and local governments, along with critical infrastructure owners and operators, to adopt similar vulnerability management approaches. The article also notes that Sen. Mark Warner introduced legislation directing CISA to collaborate with industry and regulators to modernize cybersecurity defense. Warner said cybersecurity defenses must keep up as artificial intelligence continues to evolve.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA released a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours. The directive creates a risk-based prioritization system for security updates and is intended to focus federal IT and security teams on the most at-risk assets.\u003c/p\u003e\n\n\u003cp\u003eCISA is giving federal agencies 180 days to adopt the new patching time frame. The agency is also strongly urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management regimes.\u003c/p\u003e\n\n\u003ch2 id=\"why-cisa-issued-the-directive\"\u003eWhy CISA Issued the Directive\u003c/h2\u003e\n\n\u003cp\u003eCISA officials tied the directive to a heightened threat environment associated with advances in artificial intelligence. Acting Executive Assistant Director for Cybersecurity Chris Butera said AI advancements allow threat actors to find and exploit vulnerabilities in at-risk assets.\u003c/p\u003e\n\n\u003cp\u003eButera said defenders cannot afford to take weeks to patch systems that can be autonomously exploited at scale. CISA described the directive as a way to expedite and prioritize cyber defense of civilian federal government information systems.\u003c/p\u003e\n\n\u003ch2 id=\"risk-criteria-used-in-the-directive\"\u003eRisk Criteria Used in the Directive\u003c/h2\u003e\n\n\u003cp\u003eThe directive includes four criteria for assessing the seriousness of a vulnerability:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the vulnerability is exposed to the public internet.\u003c/li\u003e\n\u003cli\u003eWhether the vulnerability is listed in CISA’s Known Exploited Vulnerabilities catalog.\u003c/li\u003e\n\u003cli\u003eWhether the exploit can be automated.\u003c/li\u003e\n\u003cli\u003eWhat level of control an adversary would have over a vulnerable system because of malicious activity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFederal agencies must patch vulnerabilities that meet three of those four criteria within 72 hours.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-subject-to-the-72-hour-deadline\"\u003eVulnerabilities Subject to the 72-Hour Deadline\u003c/h2\u003e\n\n\u003cp\u003eThe article specifies that the three-day timeline applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over systems facing the internet.\u003c/p\u003e\n\n\u003cp\u003eWhen agencies determine that hackers can use a vulnerability to take complete control of a system, they must examine systems to assess whether they have been compromised and patch within three days.\u003c/p\u003e\n\n\u003ch2 id=\"two-week-patching-timeline\"\u003eTwo-Week Patching Timeline\u003c/h2\u003e\n\n\u003cp\u003eAgencies will have up to two weeks to patch vulnerabilities that meet the described criteria but are not automatable, provided a threat actor has not taken full control of a system.\u003c/p\u003e\n\n\u003cp\u003eThis creates a distinction between vulnerabilities that can be automated and those that cannot, with automatable exploitation receiving the more urgent 72-hour deadline.\u003c/p\u003e\n\n\u003ch2 id=\"compromise-assessment-before-patching\"\u003eCompromise Assessment Before Patching\u003c/h2\u003e\n\n\u003cp\u003eThe directive requires agencies to check when and how a vulnerable system was compromised before patching. CISA emphasized that applying a patch generally does not evict a threat actor.\u003c/p\u003e\n\n\u003cp\u003eThis means agencies are expected to include forensic triage as part of the remediation process for certain vulnerabilities. Butera acknowledged that this may be a newer step for some federal agencies.\u003c/p\u003e\n\n\u003ch2 id=\"support-for-federal-agencies\"\u003eSupport for Federal Agencies\u003c/h2\u003e\n\n\u003cp\u003eThe article notes uncertainty about how easy it will be for resource-constrained federal agencies, many of which do not have advanced in-house cyber expertise, to triage threats against the four criteria. It is also unclear how feasible the three-day patching window will be for all agencies.\u003c/p\u003e\n\n\u003cp\u003eCISA said it believes agencies should be able to perform the necessary work within three days. Butera said CISA can assist with triage analysis and that agencies have been given a “good runway” to implement the new processes.\u003c/p\u003e\n\n\u003ch2 id=\"expected-impact-on-patching-workloads\"\u003eExpected Impact on Patching Workloads\u003c/h2\u003e\n\n\u003cp\u003eCISA analyzed how often federal agencies encounter vulnerabilities that meet the criteria requiring a 72-hour patch. At one federal agency studied by CISA, only 1% of vulnerabilities required patching within three days.\u003c/p\u003e\n\n\u003cp\u003eIn that same analysis, more than 60% of vulnerabilities were less serious and required patching only at the next system update. Acting CISA Director Nick Andersen said the directive will help agencies focus on the highest-risk areas and defer patching lower-priority vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"statements-from-cisa-officials\"\u003eStatements From CISA Officials\u003c/h2\u003e\n\n\u003cp\u003eButera said the directive prioritizes IT and security operations’ attention on the most at-risk assets. He said this is particularly important because of AI-driven advances that help threat actors find and exploit vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eNick Andersen said the directive provides clear definitions, timelines, and criteria. He said this improves transparency, predictability, and agency resource planning for more effective vulnerability remediation.\u003c/p\u003e\n\n\u003ch2 id=\"broader-government-and-critical-infrastructure-relevance\"\u003eBroader Government and Critical Infrastructure Relevance\u003c/h2\u003e\n\n\u003cp\u003eAlthough the directive applies to federal civilian agencies, CISA is urging state, tribal, and local governments and critical infrastructure owners and operators to adopt similar vulnerability management practices.\u003c/p\u003e\n\n\u003cp\u003eThe article also reports that Sen. Mark Warner introduced legislation directing CISA to collaborate with industry and regulators to modernize cybersecurity defense. Warner said cybersecurity defenses must keep up with evolving threats as AI continues to rapidly evolve.\u003c/p\u003e\n","keyPoints":["CISA issued a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours.","The 72-hour deadline applies to vulnerabilities that meet three of four criteria: public internet exposure, inclusion in the Known Exploited Vulnerabilities catalog, automated exploitability, and the level of adversary control over the vulnerable system.","Federal agencies have 180 days to adopt the new patching time frame under the directive.","The directive also requires agencies to check when and how a vulnerable system was compromised before applying a patch, because applying a patch generally does not evict a threat actor.","CISA is strongly urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management practices."],"insights":["CISA’s risk model may reduce overall patching burden for agencies because one agency study found only 1% of vulnerabilities would require 72-hour remediation, while more than 60% could wait until the next system update.","The directive treats forensic triage as part of vulnerability management by requiring agencies to assess compromise before patching, reflecting CISA’s warning that patching alone generally does not remove an intruder.","CISA expects some agencies to lack maturity in forensic triage and said it can assist with triage analysis during the 180-day implementation period.","The urgency of the new timelines is explicitly tied to artificial intelligence, which CISA said can help threat actors find and exploit vulnerable internet-facing assets at scale."],"referencedReports":[{"title":"BOD 26-04: Prioritizing Security Updates Based on Risk","url":"https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk","publisher":"CISA","context":"The article says CISA released this new binding operational directive requiring federal civilian agencies to prioritize and patch certain vulnerabilities within specified timelines.","category":"","primary":false}],"body":"\u003cp\u003eCISA released a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours. The directive is part of a prioritization system intended to address the heightened threat environment associated with the rise of artificial intelligence. Agencies have 180 days to adopt the new patching time frame.\u003c/p\u003e\n\n\u003cp\u003eThe directive uses four criteria to assess vulnerability seriousness: public internet exposure, inclusion in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated, and the level of control an adversary could gain over a vulnerable system. The three-day deadline applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over internet-facing systems. Agencies must also examine systems for compromise when a vulnerability could allow complete system control.\u003c/p\u003e\n\n\u003cp\u003eCISA said patching alone generally does not evict a threat actor, so the directive requires agencies to check when and how a vulnerable system was compromised before patching. CISA is also urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management regimes. CISA officials said the approach is meant to focus limited resources on the most at-risk assets while allowing lower-priority vulnerabilities to be deferred.\u003c/p\u003e\n"},{"n":6,"title":"Code is being written everywhere, and the device is the only constant","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/code-is-written-everywhere","time":"19:01","priority":"MAY READ","score":55,"tldr":"As developers increasingly write and approve code through Slack, AI agents, MCP servers, and other non-IDE interfaces, the developer device remains the critical attack surface where credentials and supply-chain risks converge. The article argues security controls must monitor installs and activity at the device level because traditional MDM and EDR often miss malicious packages, extensions, and agent-driven workflows until after compromise.","briefOverview":"\u003cp\u003ePostHog co-founder and co-CEO James Hawkins says the company is merging roughly as many pull requests through Slack as through its code editor. The article frames this as evidence that coding interfaces are fragmenting across Slack, AI agents, chat interfaces, MCP servers, and potentially voice-driven workflows. Hawkins argues that desktop code editors reflect an older era when writing code itself was the bottleneck.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central security concern is that developer devices remain the constant across all of these changing interfaces. It says those devices hold cloud credentials, SSH keys, npm publish tokens, Kubernetes configs, source code access, and production access. Past incidents cited in the article include TeamPCP activity, the Axios maintainer account hijacking, and the Glassworm attack, all used to argue that attackers can compromise the software supply chain through developer environments without exploiting application code.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that MDM and EDR are not sufficient for this shift because they may not see installs from package registries, IDE marketplaces, browser extensions, or AI-driven workflows before malicious code executes. It gives a scenario where a Slack approval lets an agent merge a PR, install a new dependency, run a postinstall hook, and access production credentials. The final section promotes Aikido Device Protection as a device-level control that checks installs against Aikido Intel’s threat feed and blocks malicious installs before they touch developer machines.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is based on a podcast conversation with PostHog co-founder and co-CEO James Hawkins about how developers are increasingly writing and approving code outside traditional desktop editors. Hawkins says PostHog is merging roughly as many pull requests through Slack as through its code editor. He describes desktop IDEs as a relic of a time when writing code was the main bottleneck and suggests that coding may increasingly happen through Slack, WhatsApp, or voice.\u003c/p\u003e\n\n\u003cp\u003eThe article presents interface fragmentation as a security problem for engineering teams. Developers are described as using AI agents, chat interfaces, and MCP servers in combinations that security teams may not have seen or approved. The article says existing endpoint visibility can miss work that has moved to a Slack bot, an MCP server, or an agent running in the background.\u003c/p\u003e\n\n\u003cp\u003eSeveral supply-chain incidents are cited to show why developer devices are attractive targets. The article says TeamPCP chained stolen credentials across four major open source projects in under ten days, the Axios maintainer account was hijacked and used to distribute a RAT through an unreviewed package, and the Glassworm attack compromised VS Code extensions and browser plugins to backdoor developer machines. It states that Glassworm exposed 3,800 of GitHub’s internal repositories in under 18 minutes and emphasizes that these incidents did not require finding vulnerabilities in application code.\u003c/p\u003e\n\n\u003cp\u003eThe article says the attack surface is expanding as AI coding agents handle less creative engineering work such as fixing UX annoyances or failing tests. It also says MCP servers carry supply-chain risks like other dependencies, citing a malicious MCP server on npm that silently blind-copied outgoing email to an attacker-controlled address after fifteen clean versions. Hawkins is quoted as saying GitHub could become more like a back end for storing code as the interface shifts elsewhere.\u003c/p\u003e\n\n\u003cp\u003eThe main affected asset in the article is the developer device, which is described as holding cloud credentials, SSH keys, npm publish tokens, Kubernetes configs, source code, and production access. The article gives an example where a developer approves an AI-generated Slack fix from a phone, after which an agent merges a PR, pulls a new dependency, executes a postinstall hook, and touches production credentials. It argues that MDM and EDR may not see or stop this chain before credentials are stolen.\u003c/p\u003e\n\n\u003cp\u003eThe response presented by the article is Aikido Device Protection, which is described as sitting on developer machines and giving security teams visibility and control over installed npm packages, IDE extensions, browser plugins, and AI tools. The article says it checks installs against Aikido Intel’s threat feed, which analyzes more than 100,000 suspicious projects per day and identifies malware within minutes of publication. It says malicious installs are blocked before they touch the machine, while safe installs continue without interruption.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that software development is moving away from a single, traditional desktop code editor and into a fragmented set of interfaces. It is based on a conversation with PostHog co-founder and co-CEO James Hawkins on The Secure Disclosure podcast. Hawkins says PostHog is already merging roughly as many pull requests through Slack as through its code editor.\u003c/p\u003e\n\n\u003cp\u003eHawkins describes desktop code editors as a legacy pattern from a time when writing code was the bottleneck and developers needed large screens with many files open. The article says that AI coding tools are changing this workflow because certain coding tasks can now be handled through Slack, chat interfaces, AI agents, MCP servers, and potentially voice. Hawkins suggests that developers may eventually code through Slack, WhatsApp, or by literally calling an AI system.\u003c/p\u003e\n\n\u003ch2 id=\"central-security-argument\"\u003eCentral security argument
