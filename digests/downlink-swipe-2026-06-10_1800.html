\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main security argument is that the developer device remains the constant even as coding interfaces change. It says developer devices are already under-protected and are attractive to supply-chain attackers because they hold high-value access. The article lists cloud credentials, SSH keys, npm publish tokens, Kubernetes configs, source code, and production access as examples of what can reside on developer machines.\u003c/p\u003e\n\n\u003cp\u003eThe article frames interface fragmentation as dangerous because security tooling was not built for these workflows. It says EDR may not see work that has moved into a Slack bot, an MCP server, or an agent running in the background. It also says MDM does not see what gets pulled from a package registry or installed through a VS Code marketplace.\u003c/p\u003e\n\n\u003ch2 id=\"examples-of-supply-chain-incidents-cited\"\u003eExamples of supply-chain incidents cited\u003c/h2\u003e\n\n\u003cp\u003eThe article cites several incidents to support its claim that developer devices are a major supply-chain attack surface:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTeamPCP allegedly chained stolen credentials across four major open source projects in under ten days.\u003c/li\u003e\n\u003cli\u003eThe Axios maintainer account was hijacked and used to distribute a RAT through a package that nobody had explicitly installed or reviewed.\u003c/li\u003e\n\u003cli\u003eThe Glassworm attack compromised VS Code extensions and browser plugins to silently backdoor developer machines.\u003c/li\u003e\n\u003cli\u003eThe article says Glassworm exposed 3,800 of GitHub’s internal repositories in under 18 minutes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that these examples did not require attackers to find a vulnerability in application code. Instead, it states that the developer device itself was the vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"ai-coding-and-expanding-attack-surface\"\u003eAI coding and expanding attack surface\u003c/h2\u003e\n\n\u003cp\u003eHawkins says PostHog is spending more on security because of the explosion of AI. He says AI can write code hundreds of times faster than before, which saves money, but also creates a need for more security spending. The article presents this as part of a broader tradeoff: AI accelerates engineering work while increasing the scale and complexity of what security teams must monitor.\u003c/p\u003e\n\n\u003cp\u003eThe article says PostHog’s Slack integration for coding work became popular internally because less creative engineering tasks are well suited to AI coding agents. Examples given include fixing a UX annoyance and patching a failing test. Hawkins says stronger models make it possible to see people coding through Slack.\u003c/p\u003e\n\n\u003ch2 id=\"mcp-server-risk\"\u003eMCP server risk\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses MCP servers as part of the expanding coding interface. It says MCP servers extend the attack surface and carry the same supply-chain risks as other dependencies. The article cites the first confirmed malicious MCP server on npm, which it says appeared in September 2025.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, that malicious MCP server silently blind-copied every outgoing email to an attacker-controlled address. It also says the package appeared clean across fifteen versions before the backdoor appeared in the sixteenth version. This example is used to show how tools integrated into AI-assisted workflows can introduce dependency-style supply-chain risk.\u003c/p\u003e\n\n\u003ch2 id=\"possible-future-of-coding-interfaces\"\u003ePossible future of coding interfaces\u003c/h2\u003e\n\n\u003cp\u003eHawkins suggests that the desktop coding app may start to feel more like Slack. He also says GitHub could become more like a back end, comparing it to S3 as a system that is “just supposed to store code.” The article uses this to reinforce the idea that the visible developer interface may continue to move away from traditional IDEs.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights voice as a possible next interface. Hawkins asks whether developers even need a screen today, suggesting coding could happen in Slack, WhatsApp, or through voice interaction. This is presented as part of a broader shift where the interface changes but the developer device remains the central point of risk.\u003c/p\u003e\n\n\u003ch2 id=\"example-attack-chain-described-in-the-article\"\u003eExample attack chain described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article gives a hypothetical scenario involving a developer, a Slack-based AI coding bot, and a malicious dependency. In the scenario, the developer receives a Slack message from the team’s AI coding bot about a failing test and a drafted fix. The developer approves the change from a phone during a commute.\u003c/p\u003e\n\n\u003cp\u003eAfter that approval, the article says the agent merges the pull request, pulls a new dependency, executes the dependency’s postinstall hook, and touches production credentials. The package was published two hours earlier and had not been reviewed. The article says MDM sees nothing, while EDR sees a process that appears to be normal development activity.\u003c/p\u003e\n\n\u003cp\u003eThe article’s conclusion from this scenario is that one approved Slack message can provide full device access. It says that by the time anomalous behavior appears in a log, credentials may already be gone.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-mdm-and-edr-according-to-the-article\"\u003eLimits of MDM and EDR according to the article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that MDM does not see what gets pulled from package registries or installed through VS Code marketplaces. It also says EDR does not catch a malicious postinstall hook until after it has already run. The article argues that this timing matters because credentials can be stolen before traditional controls detect the problem.\u003c/p\u003e\n\n\u003cp\u003eThis limitation is central to the article’s argument for device-level security focused on developer workflows. The article does not present MDM or EDR as irrelevant, but it says they do not address the specific visibility gap created by package installs, extensions, plugins, and agent-driven coding processes.\u003c/p\u003e\n\n\u003ch2 id=\"aikido-device-protection\"\u003eAikido Device Protection\u003c/h2\u003e\n\n\u003cp\u003eThe final section promotes Aikido Device Protection as a response to these risks. It says the product sits on the developer device and gives security teams centralized visibility and control over what is installed across developer machines. The article says this includes npm packages, IDE extensions, browser plugins, and AI tools.\u003c/p\u003e\n\n\u003cp\u003eAikido Device Protection is described as checking every install against Aikido Intel’s threat feed. The article says Aikido Intel analyzes more than 100,000 suspicious projects per day and identifies malware within minutes of publication. It says malicious installs are blocked before they touch the machine, while safe installs proceed without interrupting developers.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that as coding moves into Slack, AI agents, MCP servers, chat tools, and possibly voice interfaces, the developer device remains the central security boundary. It argues that attackers can exploit this shift through dependencies, extensions, plugins, and agent-driven workflows that traditional controls may not observe in time. The article presents device-level monitoring and install blocking as the necessary control point for this changing development model.\u003c/p\u003e\n","keyPoints":["PostHog co-founder James Hawkins said the company is merging roughly as many pull requests through Slack as through its code editor, reflecting a shift toward dispersed coding interfaces.","The article says developers are increasingly writing code through AI agents, chat interfaces, and MCP servers that many security teams have not seen or approved.","The article cites TeamPCP activity, the Axios maintainer account hijacking, and the Glassworm attack as examples of supply-chain incidents that targeted developer devices rather than vulnerabilities in application code.","Developer devices are described as holding cloud credentials, SSH keys, npm publish tokens, Kubernetes configs, source code access, and production access, making their compromise high-impact.","The article argues that MDM and EDR may not see or block malicious packages, IDE extensions, browser plugins, or postinstall hooks before credentials are stolen."],"insights":["PostHog’s internal workflow suggests that low-creativity engineering tasks such as fixing UX annoyances or failing tests are the first areas where AI coding agents can move code changes outside traditional editors.","A single approval action in a chat interface can trigger a full development chain, including dependency installation, postinstall execution, merge activity, and access to production credentials.","The article frames GitHub as potentially becoming more like a storage back end for code while the primary developer interface shifts to Slack-like, chat-based, or voice-driven tools.","The first confirmed malicious MCP server cited in the article used a delayed-backdoor pattern, appearing clean across fifteen versions before adding malicious behavior in the sixteenth version."],"referencedReports":[],"body":"\u003cp\u003ePostHog co-founder and co-CEO James Hawkins says the company is merging roughly as many pull requests through Slack as through its code editor. The article frames this as evidence that coding interfaces are fragmenting across Slack, AI agents, chat interfaces, MCP servers, and potentially voice-driven workflows. Hawkins argues that desktop code editors reflect an older era when writing code itself was the bottleneck.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central security concern is that developer devices remain the constant across all of these changing interfaces. It says those devices hold cloud credentials, SSH keys, npm publish tokens, Kubernetes configs, source code access, and production access. Past incidents cited in the article include TeamPCP activity, the Axios maintainer account hijacking, and the Glassworm attack, all used to argue that attackers can compromise the software supply chain through developer environments without exploiting application code.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that MDM and EDR are not sufficient for this shift because they may not see installs from package registries, IDE marketplaces, browser extensions, or AI-driven workflows before malicious code executes. It gives a scenario where a Slack approval lets an agent merge a PR, install a new dependency, run a postinstall hook, and access production credentials. The final section promotes Aikido Device Protection as a device-level control that checks installs against Aikido Intel’s threat feed and blocks malicious installs before they touch developer machines.\u003c/p\u003e\n"},{"n":7,"title":"The Governance Gap: What IDC’s 2026 Data Reveals About AI and the Software Supply Chain","source":"jfrog.com","sourceColorIdx":8,"link":"https://jfrog.com/blog/idcs-2026-data/","time":"19:35","priority":"MAY READ","score":52,"tldr":"IDC’s 2026 data suggests enterprise AI adoption is moving faster than governance, leaving software supply chains exposed to unmanaged “Shadow AI” and risky AI-generated code. The key takeaway is that organizations need platform-level guardrails in delivery pipelines rather than relying on developers or AI agents to self-police compliance.","briefOverview":"\u003cp\u003eJFrog hosted a virtual panel discussion titled “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The session featured IDC’s George Mironescu and JFrog’s Yuval Fernbach and Asaf Barkan discussing enterprise AI adoption, pipeline governance, and software delivery. The article centers on the gap between executive pressure to adopt AI and the governance needed to manage AI safely in software supply chains.\u003c/p\u003e\n\n\u003cp\u003eThe article cites the IDC 2026 Software Engineering Challenges Report, which surveyed 1,000 enterprise and mid-sized organizations across the United States, Europe, Asia, and the Middle East. It states that AI is the top strategic mandate for organizations heading into 2026, but governance readiness is lagging behind corporate ambition. This gap is described as a defining operational challenge for software delivery teams.\u003c/p\u003e\n\n\u003cp\u003eA key concern is “Shadow AI,” which the article says has replaced Shadow IT as the primary unmanaged enterprise threat. Developers are described as using personal accounts, unvetted third-party plugins, and AI-generated code blocks in production environments. The article argues that organizations need platform-level guardrails at the software supply chain layer rather than relying on AI agents to self-police compliance.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eJFrog’s article recaps a virtual panel discussion on “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The panel included George Mironescu of IDC, Yuval Fernbach of JFrog ML, and Asaf Barkan of JFrog. The discussion focused on how organizations can accelerate delivery pipelines while avoiding serious security risks. The article frames this issue around enterprise AI adoption, pipeline governance, and software delivery.\u003c/p\u003e\n\n\u003cp\u003eThe article relies on the IDC 2026 Software Engineering Challenges Report, which surveyed 1,000 enterprise and mid-sized organizations globally. The surveyed regions included the United States, Europe, Asia, and the Middle East. According to the article, AI is the top strategic mandate for organizations heading into 2026. At the same time, governance readiness has not kept pace with the pressure on software delivery teams to implement AI quickly.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies Shadow AI as a major unmanaged enterprise threat. It says developers are already using AI in the software supply chain through personal accounts, unvetted third-party plugins, and AI-generated code blocks placed directly into production environments. It argues that delaying governance allows this footprint to grow. It also says that simply blocking or blacklisting AI tools can push developer usage underground.\u003c/p\u003e\n\n\u003cp\u003eA technical concern raised in the article is the misconception that AI agents can self-police compliance and validation. The article states that AI agents operate non-deterministically and do not understand informal policies, unwritten development practices, or shared wiki content. If compliance boundaries exist only in documentation or verbal agreements, the article says automated agents may bypass them. It also notes that a coding agent may hallucinate package names or pull vulnerable open-source dependencies from repositories such as npm or PyPI.\u003c/p\u003e\n\n\u003cp\u003eThe article’s recommended response is to apply governance at the software supply chain layer. It says this does not require slowing AI adoption or restricting what agents can do. Instead, it advocates platform-level guardrails that manage AI adoption within corporate security and governance practices. The article concludes by directing readers to the webinar recording and the full IDC report for additional details.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eJFrog published a recap of a virtual panel discussion titled “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The panel brought together George Mironescu, Associate Research Director at IDC, and JFrog representatives Yuval Fernbach, VP and CTO of JFrog ML, and Asaf Barkan, Senior Director of Product. The discussion focused on enterprise AI adoption, pipeline governance, and software delivery.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the central challenge as a mismatch between executive demand for rapid AI integration and the governance capabilities needed to manage AI safely in delivery pipelines. It describes engineering and security leaders as being under operational pressure to accelerate software delivery while avoiding serious security risks. The article uses findings from IDC’s 2026 Software Engineering Challenges Report to support this framing.\u003c/p\u003e\n\n\u003ch2 id=\"idc-report-and-governance-gap\"\u003eIDC Report and Governance Gap\u003c/h2\u003e\n\n\u003cp\u003eThe article cites the IDC 2026 Software Engineering Challenges Report as the main data source. The report surveyed 1,000 enterprise and mid-sized organizations globally, including organizations in the United States, Europe, Asia, and the Middle East. According to the article, AI has become the top strategic mandate for organizations heading into 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this top-down AI mandate creates significant operational pressure on software delivery teams. Those teams are expected to execute quickly on corporate AI ambitions. However, the article says governance frameworks are not keeping pace with the rate of AI adoption.\u003c/p\u003e\n\n\u003cp\u003eThe result is described as a widening gap between corporate ambition and governance readiness. The article frames this governance gap as the defining operational challenge of the year.\u003c/p\u003e\n\n\u003ch2 id=\"shadow-ai-in-the-software-supply-chain\"\u003eShadow AI in the Software Supply Chain\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Shadow AI as the new Shadow IT. It says AI is already inside the software supply chain and did not wait for formal organizational approval. Developers are described as adopting AI tools to improve productivity, even when those tools are not officially governed.\u003c/p\u003e\n\n\u003cp\u003eExamples given in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevelopers pulling code suggestions through personal accounts.\u003c/li\u003e\n\u003cli\u003eDevelopers using unvetted third-party plugins.\u003c/li\u003e\n\u003cli\u003eDevelopers embedding AI-generated code blocks directly into production environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that each day organizations delay governance, the unmanaged AI footprint grows. It also says that simply blocking or blacklisting AI tools does not solve the problem. Instead, blocking tools may push developer usage underground.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-ai-agent-self-governance\"\u003eLimits of AI Agent Self-Governance\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies a major misconception: the idea that AI agents can be trusted to self-police compliance and validation. It states that AI agents cannot be relied on for this role. The reason given is that AI agents operate non-deterministically.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents do not understand:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWord-of-mouth policies.\u003c/li\u003e\n\u003cli\u003eUnwritten developer best practices.\u003c/li\u003e\n\u003cli\u003eThe contents of a shared wiki.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIf compliance boundaries exist only in documentation or verbal agreements, the article says automated agents will bypass them entirely. This is presented as a pipeline governance risk, especially as automated coding tools become more common.\u003c/p\u003e\n\n\u003ch2 id=\"dependency-and-package-risks\"\u003eDependency and Package Risks\u003c/h2\u003e\n\n\u003cp\u003eThe article gives examples of how AI coding agents can introduce supply chain problems. When trying to resolve a bug, an AI agent may hallucinate package names. It may also silently pull vulnerable open-source dependencies from public repositories.\u003c/p\u003e\n\n\u003cp\u003eThe public repositories named in the article are npm and PyPI. The article states that flawed or malicious components may not be discovered until after they have already blocked builds. In that scenario, any velocity gain provided by the agent may be wiped out.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the solution is not to slow AI adoption or restrict what agents can do. Instead, it calls for a shift in how governance is applied. The recommended approach is to build smarter guardrails at the software supply chain layer.\u003c/p\u003e\n\n\u003cp\u003eThe article describes platform-level governance as the viable path for managing AI adoption safely within corporate security and governance practices. It says organizations that are succeeding are not necessarily working harder, but are applying smarter guardrails. The article also notes that most organizations are still in early stages.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-affected-parties\"\u003eDisclosed Impact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific breach, vulnerability disclosure, or incident. The affected parties discussed are enterprise and mid-sized organizations adopting AI in software delivery. The article also focuses on engineering teams, security leaders, software delivery teams, and developers using AI tools.\u003c/p\u003e\n\n\u003cp\u003eThe risks described include unmanaged AI usage, use of unvetted plugins, AI-generated code entering production, hallucinated package names, vulnerable open-source dependencies, and blocked builds. The article presents these as software supply chain and pipeline governance risks.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-further-resources\"\u003eResponse and Further Resources\u003c/h2\u003e\n\n\u003cp\u003eJFrog directs readers to watch the full webinar recording to learn what platform-level governance looks like in practice, which failure patterns to watch for before they block builds, and what organizations scaling autonomous pipelines have in common. The article also links to the full IDC report titled “Key Software Delivery Challenges and Pain Points in 2026.”\u003c/p\u003e\n\n\u003cp\u003eOverall, the article’s main message is that enterprise AI adoption is outpacing governance, and that organizations need platform-level guardrails in the software supply chain to manage AI use safely.\u003c/p\u003e\n","keyPoints":["JFrog hosted a virtual panel discussion with IDC’s George Mironescu and JFrog executives Yuval Fernbach and Asaf Barkan about enterprise AI adoption, pipeline governance, and software delivery.","The IDC 2026 Software Engineering Challenges Report surveyed 1,000 enterprise and mid-sized organizations globally and identifies a widening gap between corporate AI ambition and governance readiness.","The article states that Shadow AI has replaced Shadow IT as the primary unmanaged threat inside enterprises, with developers using personal accounts, unvetted third-party plugins, and AI-generated code in production environments.","The article argues that AI agents cannot be trusted to self-police compliance because they operate non-deterministically and may bypass policies that exist only in documentation or verbal agreements.","The recommended path forward is to build platform-level guardrails at the software supply chain layer to manage AI adoption within corporate security and governance practices."],"insights":["Blacklisting AI tools is presented as counterproductive because it can push developer use of AI underground rather than reducing the risk.","Compliance rules that exist only in wikis, verbal guidance, or informal best practices are ineffective for AI agents because the agents will not reliably recognize or follow them.","AI-generated dependency choices can erase productivity gains when hallucinated package names or vulnerable open-source components later block builds.","The article frames governance at the software supply chain layer as a way to enable AI adoption without slowing delivery, rather than as a restriction on AI use."],"referencedReports":[{"title":"IDC 2026 Software Engineering Challenges Report","url":"https://jfrog.com/whitepaper/idc-report-ai-boom/","publisher":"IDC","context":"The article cites the newly released IDC report, based on a survey of 1,000 enterprise and mid-sized organizations, as evidence that AI adoption is outpacing governance readiness.","category":"","primary":false}],"body":"\u003cp\u003eJFrog hosted a virtual panel discussion titled “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The session featured IDC’s George Mironescu and JFrog’s Yuval Fernbach and Asaf Barkan discussing enterprise AI adoption, pipeline governance, and software delivery. The article centers on the gap between executive pressure to adopt AI and the governance needed to manage AI safely in software supply chains.\u003c/p\u003e\n\n\u003cp\u003eThe article cites the IDC 2026 Software Engineering Challenges Report, which surveyed 1,000 enterprise and mid-sized organizations across the United States, Europe, Asia, and the Middle East. It states that AI is the top strategic mandate for organizations heading into 2026, but governance readiness is lagging behind corporate ambition. This gap is described as a defining operational challenge for software delivery teams.\u003c/p\u003e\n\n\u003cp\u003eA key concern is “Shadow AI,” which the article says has replaced Shadow IT as the primary unmanaged enterprise threat. Developers are described as using personal accounts, unvetted third-party plugins, and AI-generated code blocks in production environments. The article argues that organizations need platform-level guardrails at the software supply chain layer rather than relying on AI agents to self-police compliance.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
