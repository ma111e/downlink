tivity associated with IRGC-affiliated ransomware actors. Sanctions also applied to Nobitex chairman, co-founder, and former CEO Amir Hossein Rad, other Nobitex leaders and officials, and three other exchanges: Wallex, Bitpin, and Ramzinex.\u003c/p\u003e\n\n\u003cp\u003eChainalysis also reported that Nobitex processed over 50 percent of Iranian digital asset inflows last year. TRM Labs said the four exchanges accounted for about \u003cspan class=\"math inline\"\u003e\\(7.7 billion, or 78 percent, of Iran’s \\)\u003c/span\u003e9.9 billion in attributed 2025 crypto volume.\u003c/p\u003e\n\n\u003ch2 id=\"data-extortion-trends\"\u003eData Extortion Trends\u003c/h2\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 reported that pure data-exfiltration campaigns without ransomware deployment are increasing. In 2025, these campaigns primarily targeted professional services, healthcare, and consumer services firms.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 noted that while manufacturing remained the single most disrupted sector overall, construction saw a 44 percent year-over-year increase as a data-only extortion hotspot. The article says construction firms are attractive because of financial blueprints, bidding data, and data egress controls.\u003c/p\u003e\n\n\u003ch2 id=\"ai-as-offensive-aid-and-enterprise-risk\"\u003eAI as Offensive Aid and Enterprise Risk\u003c/h2\u003e\n\n\u003ch3 id=\"ai-assisted-edr-evasion-testing\"\u003eAI-Assisted EDR Evasion Testing\u003c/h3\u003e\n\n\u003cp\u003eSophos observed an unknown threat actor using AI technologies to automate Active Directory discovery and refine endpoint detection and response evasion tactics. The activity occurred in a red team post-exploitation framework.\u003c/p\u003e\n\n\u003cp\u003eSophos said AI use for malware development was more limited and mainly supported workflow coordination and experimentation. The actual EDR-bypass path involved a structured engineering test cycle with human review and iteration.\u003c/p\u003e\n\n\u003cp\u003eThe attacker used Cursor and Anthropic Claude Opus. The framework centered on a Python tool that generated Go and Rust payloads for testing against sandboxing, antivirus, and EDR detection. The approach produced nearly 80 modules covering more than 70 techniques.\u003c/p\u003e\n\n\u003cp\u003eSophos also attributed to the threat actor Python-based malware development scripts for injecting shellcode into legitimate Windows executables and a Telegram bot API-based external command-and-control mechanism. Sophos said AI agents lower the barrier to entry for sophisticated red team-style attacks but do not change how defenders should protect themselves.\u003c/p\u003e\n\n\u003ch3 id=\"anthropic-project-glasswing-and-ai-found-vulnerabilities\"\u003eAnthropic Project Glasswing and AI-Found Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eAnthropic expanded access to Project Glasswing by adding about 150 organizations in 15 countries for access to Claude Mythos Preview. Anthropic said the cybersecurity bottleneck is now verifying, disclosing, and patching the large number of vulnerabilities that Mythos-class models can surface.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites a report from the Cloud Security Alliance, SANS Institute, and OWASP. That report concluded that organizations are likely to be overwhelmed in the near term by threat actors using AI to find and exploit vulnerabilities faster than defenders can patch them.\u003c/p\u003e\n\n\u003cp\u003eThe report said the cost and capability floor for exploit discovery is dropping, the time between disclosure and weaponization is compressing toward zero, and capabilities that once required nation-state resources are becoming broadly accessible.\u003c/p\u003e\n\n\u003ch3 id=\"enterprise-ai-agent-failures\"\u003eEnterprise AI Agent Failures\u003c/h3\u003e\n\n\u003cp\u003eCyera analyzed 7,200 publicly reported AI-security and operational incidents. It identified 344 verified enterprise-relevant agent-inflicted damage cases between September 2023 and May 2026.\u003c/p\u003e\n\n\u003cp\u003eOf those, 188 incidents involved autonomous AI systems causing direct organizational harm without any external attacker involvement. The majority of confirmed incidents involved real production impact rather than theoretical AI risk scenarios.\u003c/p\u003e\n\n\u003cp\u003eObserved outcomes included deleted databases, destructive cloud actions, unauthorized financial operations, runaway API spending, service outages, exposed secrets, and silent integrity corruption inside enterprise environments. Cyera said that as agents gain broader permissions and deeper integrations into SaaS, cloud, development, and business environments, the AI interaction layer becomes part of the enterprise attack surface and critical data perimeter.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-product-and-ecosystem-responses\"\u003eDefensive Product and Ecosystem Responses\u003c/h2\u003e\n\n\u003ch3 id=\"google-device-bound-session-credentials\"\u003eGoogle Device Bound Session Credentials\u003c/h3\u003e\n\n\u003cp\u003eGoogle announced that Device Bound Session Credentials in Chrome are generally available and enabled by default for Google Workspace users. DBSC binds session cookies to the device a user authenticated from.\u003c/p\u003e\n\n\u003cp\u003eGoogle said DBSC reduces the risk of session theft even if malware is present on the user’s device. The feature makes it more difficult for malicious actors to exploit stolen session cookies.\u003c/p\u003e\n\n\u003ch3 id=\"google-android-fake-call-detection\"\u003eGoogle Android Fake Call Detection\u003c/h3\u003e\n\n\u003cp\u003eGoogle announced a fake call detection feature for Android devices running Android 12 and later. The feature is built on Rich Communication Services and verifies whether a call is coming from the caller’s actual Android smartphone.\u003c/p\u003e\n\n\u003cp\u003eThe feature is enabled by default and is designed to help prevent deepfake impersonation and call spoofing in real time. When both parties use Phone by Google, the caller’s device sends a silent confirmation signal to verify the call.\u003c/p\u003e\n\n\u003cp\u003eIf a scammer tries to impersonate a contact and the confirmation signal is missing, the recipient’s device checks with the contact’s real device. If the real device says it is not making a call, the recipient receives a warning advising them to hang up immediately. The feature requires Phone by Google, Contacts, and Google Messages, and is rolling out globally starting with Pixel devices.\u003c/p\u003e\n\n\u003ch3 id=\"rubygems-cooldown-filter\"\u003eRubyGems Cooldown Filter\u003c/h3\u003e\n\n\u003cp\u003eRubyGems added a cooldown time-based filter to Bundler version 4.0.13. The filter refuses to resolve to a gem version until it has been public for at least a configured number of days.\u003c/p\u003e\n\n\u003cp\u003eThe purpose is to skip releases that are too new to have been scrutinized in favor of versions that have aged past the cooldown window. The feature is opt-in and complements existing defenses such as mandatory two-factor authentication and trusted publishing.\u003c/p\u003e\n\n\u003cp\u003eRubyGems users can declare a small cooldown on the source in the Gemfile. The article also notes related efforts such as AI-assisted vulnerability scanning against critical gems in the registry.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe bulletin’s main lesson is that many effective attacks still rely on familiar weaknesses: unpatched systems, exposed admin interfaces, trusted tools used in unexpected ways, compromised legitimate websites, social engineering, and insufficient monitoring. It emphasizes that defenders should patch faster, reduce exposed management interfaces, avoid trusting tools solely by name, and watch for abnormal behavior at the edges where attackers hide.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by stating that security is not magic. It describes effective defense as inventory, logs, least privilege, backups, tested restores, and people who notice when something normal begins acting wrong.\u003c/p\u003e\n","keyPoints":["Cisco released fixes for CVE-2026-20230, a high-severity SSRF flaw in Unified Communications Manager that has public proof-of-concept exploit code but no known active exploitation.","DriveSurge has been running large-scale malware distribution campaigns since September 2025 using ClickFix and FakeUpdates lures on compromised websites through the zTDS traffic distribution system.","Nation-state groups including APT29, APT33, and UTA0355 have used the open-source ROADtools framework in cloud intrusions for discovery, persistence, and defense evasion through legitimate Microsoft APIs.","An unknown threat actor used AI tools including Cursor and Anthropic Claude Opus to automate Active Directory discovery and refine EDR evasion tactics in a post-exploitation framework.","Cyera analyzed 7,200 publicly reported AI-security and operational incidents and identified 344 verified enterprise-relevant agent-inflicted damage cases between September 2023 and May 2026."],"insights":["The July 2025 takedown of the XSS cybercrime forum did not eliminate the ecosystem; it fragmented activity into multiple newer forums, making the underground harder to track.","Attackers are increasingly hiding malicious activity behind legitimate or trusted platforms and tools, including Steam Community profiles, Adobe infrastructure, commercial RMM products, and Microsoft APIs used by ROADtools.","Some malware delivery chains now combine multiple resilience layers, such as DriveSurge using compromised reputable websites, zTDS profiling, and either ClickFix or FakeUpdates lures to select payload delivery paths.","AI-assisted offensive activity in the article was not primarily autonomous malware creation; it was used to speed workflow coordination, Active Directory discovery, and iterative EDR evasion testing with human review.","Enterprise AI agents are already causing production harm without external attackers, including deleted databases, destructive cloud actions, unauthorized financial operations, runaway API spending, and exposed secrets."],"referencedReports":[{"title":"Cisco Unified Communications Manager Server-Side Request Forgery Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"The article cites Cisco's security advisory for fixes addressing CVE-2026-20230 in Unified Communications Manager.","category":"","primary":false},{"title":"Behind the Code: Layered Defense Evasion in VIP Keylogger","url":"https://www.splunk.com/en_us/blog/security/behind-the-code-layered-defense-evasion-vip-keylogger.html","publisher":"Splunk","context":"The article references Splunk's analysis of VIP Keylogger campaigns using JavaScript, batch, and VBS loaders.","category":"","primary":false},{"title":"Understanding Illicit Ecosystems: XSS and the Russian-Speaking Underground","url":"https://flashpoint.io/blog/understanding-illicit-ecosystems-xss-russian-speaking-underground/","publisher":"Flashpoint","context":"The article cites Flashpoint's research on how the XSS forum takedown fractured the cybercrime underground.","category":"","primary":false},{"title":"Malicious Use of Tiflux in Attacks Surges","url":"https://www.huntress.com/blog/tiflux-rmm-install","publisher":"Huntress","context":"The article references Huntress research on attackers abusing the Tiflux remote desktop tool and other RMM software.","category":"","primary":false},{"title":"DriveSurge Linked to ClickFix and FakeUpdates Campaigns","url":"https://www.silentpush.com/blog/drivesurge/","publisher":"Silent Push","context":"The article cites Silent Push analysis of DriveSurge malware distribution campaigns using ClickFix, FakeUpdates, and zTDS.","category":"","primary":false},{"title":"Pivoting on a Malspam Infrastructure Delivering JS Malware Backed by Bulletproof Networks","url":"https://www.intrinsec.com/pivoting-on-a-malspam-infrastructure-delivering-js-malware-backed-by-bulletproof-networks/","publisher":"Intrinsec","context":"The article references Intrinsec's disclosure of malspam campaigns distributing a JavaScript-coded backdoor.","category":"","primary":false},{"title":"Smart Contracts for Command and Control","url":"https://www.trendmicro.com/en_us/research/26/e/smart-contracts-for-command-and-control.html","publisher":"Trend Micro","context":"The article cites Trend Micro research on ClearFake payload delivery using EtherHiding and BNB Smart Chain smart contracts.","category":"","primary":false},{"title":"Exploitation of ROADtools by Nation-State Groups","url":"https://unit42.paloaltonetworks.com/roadtools-cloud-attacks/","publisher":"Palo Alto Networks Unit 42","context":"The article references Unit 42 analysis of nation-state groups using ROADtools in cloud intrusions.","category":"","primary":false},{"title":"Pure Data Exfiltration Campaigns on the Rise","url":"https://unit42.paloaltonetworks.com/cyber-extortion-economy/","publisher":"Palo Alto Networks Unit 42","context":"The article cites Unit 42 research on the growth of pure data-exfiltration extortion campaigns.","category":"","primary":false},{"title":"Pointing a Cursor at Evading Detection","url":"https://www.sophos.com/en-us/blog/pointing-a-cursor-at-evading-detection","publisher":"Sophos","context":"The article references Sophos analysis of a threat actor using AI tools to support EDR evasion and post-exploitation framework development.","category":"","primary":false},{"title":"Malware Targeting WordPress Abuses Steam Community Profiles","url":"https://www.godaddy.com/resources/news/malware-targeting-wordpress-abuses-steam-community-profiles","publisher":"GoDaddy","context":"The article cites GoDaddy research on WordPress malware using Steam Community profile comments as dead drop resolvers.","category":"","primary":false},{"title":"Three Enforcement Layers in Five Months: OFAC Designates Iran's Domestic Crypto Exchanges","url":"https://www.trmlabs.com/resources/blog/three-enforcement-layers-in-five-months-ofac-designates-irans-domestic-crypto-exchanges","publisher":"TRM Labs","context":"The article uses TRM Labs figures on Iranian cryptocurrency exchange transaction volume in its discussion of OFAC sanctions.","category":"","primary":false},{"title":"OFAC Sanctions Iranian Crypto Exchanges","url":"https://www.chainalysis.com/blog/ofac-sanctions-iranian-crypto-exchanges-june-2026/","publisher":"Chainalysis","context":"The article cites Chainalysis data on Nobitex processing more than half of Iranian digital asset inflows.","category":"","primary":false},{"title":"Mythos CISO Report","url":"https://labs.cloudsecurityalliance.org/mythos-ciso/","publisher":"Cloud Security Alliance, SANS Institute, and OWASP","context":"The article cites a report concluding that organizations are likely to be overwhelmed by AI-enabled vulnerability discovery and exploitation.","category":"","primary":false},{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/02/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article references CISA's advisory adding CVE-2022-0492 to the Known Exploited Vulnerabilities catalog.","category":"","primary":false},{"title":"Container Attack Vectors","url":"https://securelist.com/container-attack-vectors/120010/","publisher":"Kaspersky","context":"The article cites Kaspersky research that observed CVE-2022-0492 and other flaws being exploited against container environments.","category":"","primary":false},{"title":"ClickFix Becomes BackgroundFix","url":"https://www.huntress.com/blog/clickfix-castleloader-backgroundfix","publisher":"Huntress","context":"The article references Huntress analysis of fake image-editing lures delivering CastleLoader, NetSupport RAT, and CastleStealer.","category":"","primary":false},{"title":"Fake LinkedIn Emails Abuse Adobe to Track Victims","url":"https://www.malwarebytes.com/blog/threat-intel/2026/05/fake-linkedin-emails-abuse-adobe-to-track-victims","publisher":"Malwarebytes","context":"The article cites Malwarebytes threat intelligence on a LinkedIn phishing campaign abusing Adobe infrastructure.","category":"","primary":false},{"title":"ESET APT Activity Report Q4 2025–Q1 2026","url":"https://www.welivesecurity.com/en/eset-research/eset-apt-activity-report-q4-2025-q1-2026/","publisher":"ESET","context":"The article references ESET's APT activity report describing Iran-aligned clusters targeting Israeli entities.","category":"","primary":false},{"title":"CISA Warns of Attacks Targeting Automatic Tank Gauge Systems","url":"https://www.ic3.gov/CSA/2026/260602.pdf","publisher":"U.S. government agencies","context":"The article cites a government advisory urging organizations to secure internet-exposed automatic tank gauge systems.","category":"","primary":false},{"title":"Agent-Inflicted Damage: Inside the Real-World Failures of Enterprise AI Systems","url":"https://www.cyera.com/research/agent-inflicted-damage-inside-the-real-world-failures-of-enterprise-ai-systems","publisher":"Cyera","context":"The article cites Cyera research analyzing publicly reported AI-security and operational incidents involving enterprise agent-inflicted damage.","category":"","primary":false}],"body":"\u003cp\u003eThis ThreatsDay Bulletin is a roundup of more than 20 cybersecurity developments involving patched flaws, malware campaigns, abused trusted tools, cybercrime infrastructure, AI-enabled offensive work, and real-world AI agent failures. The article’s central theme is that attackers continue to rely on compromised websites, exposed systems, social engineering, legitimate platforms, and remote access tools to gain access and evade detection. It also highlights defensive responses from Cisco, CISA, Google, RubyGems, and other organizations.\u003c/p\u003e\n\n\u003cp\u003eSeveral stories focus on active or emerging attack tradecraft, including DriveSurge using ClickFix and FakeUpdates lures, Steam-hosted dead drop payloads for WordPress malware, ROADtools abuse by nation-state groups, and malicious use of Tiflux and other RMM tools. The article also notes public proof-of-concept code for Cisco Unified Communications Manager CVE-2026-20230, CISA’s KEV listing for Linux Kernel CVE-2022-0492, and exploitation of automatic tank gauge systems exposed to the internet. AI is presented as both an attacker aid and an enterprise risk, with one threat actor using AI tools for EDR evasion testing and Cyera identifying hundreds of verified enterprise-relevant AI agent damage cases.\u003c/p\u003e\n"},{"n":27,"title":"Reporting from Vegas: Networking, AI, and good boys","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/reporting-from-vegas-networking-ai-and-good-boys/","time":"18:00","priority":"MAY READ","score":40,"tldr":"Cisco Talos is expanding its Threat Hunting program to find advanced threats that evade traditional alerts by combining AI-driven telemetry analysis with human expert validation. The newsletter also highlights current security headlines and emphasizes preparing for increased patching and advisories as the summer conference season ramps up.","briefOverview":"\u003cp\u003eThe article is a Threat Source newsletter written from Cisco Live U.S. in Las Vegas, where the author describes the scale, noise, and intensity of the conference. It highlights therapy dogs, quiet spaces, and personal strategies such as using noise cancellation to manage the conference environment. The dominant conference theme described in the article is AI, especially from infrastructure and security perspectives.\u003c/p\u003e\n\n\u003cp\u003eThe main cybersecurity takeaway is that Cisco Talos is expanding its Threat Hunting program to proactively identify advanced adversaries that evade traditional detection thresholds. The program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data. Talos says this hypothesis-driven approach helped identify a KongTuke command-and-control discovery before a formal detection signature existed.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also summarizes several security headlines, including a monthslong email campaign against a global stock exchange, a GitHub.dev OAuth token theft issue, the Kali365 phishing kit, compromised Red Hat NPM packages, and an HTTP/2 Bomb exploit. It closes by noting that summer is bringing rapid patches and CVE advisories, with Black Hat and DEF CON approaching.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis Threat Source newsletter is written from Cisco Live U.S. in Las Vegas and combines conference observations with cybersecurity updates. The author describes Cisco Live as a large, demanding event with many people, partners, workshops, CTFs, and symposiums. The piece also notes that therapy dogs from Healing Hounds were present at the event through a Splunk sponsorship.\u003c/p\u003e\n\n\u003cp\u003eA major theme at Cisco Live U.S. is AI, especially from an infrastructure and security perspective rather than only as a product topic. The article says discussions focused on how organizations plan to move, manage, process, and defend large volumes of data in an agentic world. It describes the scale as involving many hundreds of zettabytes of daily data and frames the challenge as difficult to fully comprehend.\u003c/p\u003e\n\n\u003cp\u003eThe central security item is Cisco Talos expanding its Threat Hunting program. The program is described as proactively tracking advanced adversaries who deliberately slip past traditional detection thresholds. It uses AI-driven telemetry analysis combined with human expert validation across endpoint, network, and identity data.\u003c/p\u003e\n\n\u003cp\u003eTalos presents the program as a response to limits in traditional detection models that alert when known-bad patterns appear. The article states that adversaries increasingly use AI to move faster and stay under the radar, leaving blind spots if defenders rely only on automated alerts. Talos says hypothesis-driven hunting can correlate weak signals across an environment to uncover complex intrusions, including a recent KongTuke command-and-control discovery before a formal detection signature existed.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also lists current security headlines from other publications. These include a global stock exchange email campaign using legitimate Windows tools, a GitHub.dev attack involving malicious VS Code extensions and OAuth tokens, Kali365 phishing-as-a-service expansion, compromised Red Hat NPM packages, and an HTTP/2 Bomb exploit affecting web server configurations. The article additionally points readers to Talos content on threat hunting and synthetic logs, and lists upcoming events including Cisco Live U.S. and Black Hat USA.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is a Threat Source newsletter written from Cisco Live U.S. in Las Vegas. It blends personal conference observations, discussion of AI and security infrastructure, a primary update on Cisco Talos Threat Hunting, and a roundup of current cybersecurity headlines. The author describes Cisco Live as a large, high-energy three-day event involving people, partners, workshops, CTFs, and symposiums.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central cybersecurity focus is Cisco Talos expanding its Threat Hunting program. Talos describes the program as a proactive effort to find advanced adversaries that intentionally evade traditional detection thresholds. The program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data.\u003c/p\u003e\n\n\u003ch2 id=\"cisco-live-u-s-context\"\u003eCisco Live U.S. context\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter opens with the author reporting from Cisco Live U.S. in Las Vegas. The author emphasizes the physical and sensory demands of attending a large technology conference, including long days, high noise levels, bright lights, and limited rest. The article recommends using Apple AirPods in noise-cancelling mode or earplugs to make the conference environment more manageable.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the presence of therapy dogs at Cisco Live. Healing Hounds, a local Las Vegas therapy dog volunteer group, participated at the event, and Splunk sponsored them for the year. The author presents the therapy dogs and quiet spaces as helpful ways for attendees to recover during an intense technology convention.\u003c/p\u003e\n\n\u003ch2 id=\"ai-as-the-dominant-conference-theme\"\u003eAI as the dominant conference theme\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the “vibe” at Cisco Live U.S. is AI. It clarifies that the discussions are not described primarily from a product perspective, but from infrastructure and security perspectives. The author says participants are debating how organizations can move and manage large amounts of data, particularly in an agentic world.\u003c/p\u003e\n\n\u003cp\u003eThe article describes organizations as struggling with these issues in different ways. It frames Cisco Live U.S. as an opportunity for companies to discuss how to process and defend data in an AI world. The author describes the scale involved as many hundreds of zettabytes of data daily and characterizes that challenge as wild and almost incomprehensible.\u003c/p\u003e\n\n\u003ch2 id=\"main-security-focus-cisco-talos-threat-hunting-expansion\"\u003eMain security focus: Cisco Talos Threat Hunting expansion\u003c/h2\u003e\n\n\u003cp\u003eThe article’s “one big thing” is Cisco Talos expanding its Threat Hunting program. Talos says the program is designed to proactively track advanced adversaries who deliberately slip past traditional detection thresholds. The article positions this as a way to identify hidden threats before conventional signatures exist.\u003c/p\u003e\n\n\u003cp\u003eKey elements of the program include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI-driven telemetry analysis.\u003c/li\u003e\n\u003cli\u003eHuman expert validation.\u003c/li\u003e\n\u003cli\u003eContinuous hunting across endpoint, network, and identity data.\u003c/li\u003e\n\u003cli\u003eA hypothesis-driven approach to threat discovery.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this method helped identify a recent KongTuke command-and-control discovery before a formal detection signature existed. KongTuke is the only named intrusion-related entity described in the main Talos Threat Hunting section.\u003c/p\u003e\n\n\u003ch2 id=\"why-talos-says-this-matters\"\u003eWhy Talos says this matters\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts hypothesis-driven hunting with traditional alert-based security tooling. It says many security tools operate on the principle that if a known-bad pattern appears, an alert is generated. Talos argues that this model leaves blind spots when threat actors move faster, use AI, and intentionally remain under the radar.\u003c/p\u003e\n\n\u003cp\u003eThe article says hypothesis-driven hunting addresses this gap by correlating weak signals across an environment. The goal is to help defenders piece together ambiguous anomalies and uncover sophisticated intrusions that automated alerts might miss. The article specifically frames this as important for complex intrusions that may not yet have formal detection signatures.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response-from-the-article\"\u003eRecommended response from the article\u003c/h2\u003e\n\n\u003cp\u003eThe article advises organizations that lack dedicated headcount for continuous threat hunting to consider Cisco Talos Threat Hunting. It suggests reaching out to a Cisco account team, exploring the dedicated portal in Cisco Security Cloud Control, and reading the full Talos blog about the KongTuke command-and-control investigation. These are the article’s stated next steps for readers interested in the program.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also warns that summer is bringing what it calls the “great patchening,” with vendors beginning to issue rapid patches and CVE advisories. The author describes the current period as the quiet before the storm and notes that Black Hat and DEF CON are approaching. The article pairs this operational warning with a reminder to take care of oneself during security fire drills.\u003c/p\u003e\n\n\u003ch2 id=\"security-headlines-summarized-in-the-article\"\u003eSecurity headlines summarized in the article\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter includes a section titled “Top security headlines of the week.” These are presented as brief summaries with links to external publications, not as the article’s primary reporting. The listed items are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA global stock exchange was affected by a monthslong email campaign in which a threat actor gained a near-continuous view into an influential finance executive’s inbox using legitimate native Windows tools.\u003c/li\u003e\n\u003cli\u003eA one-click GitHub.dev issue allowed attackers to install malicious VS Code extensions that could steal full GitHub OAuth tokens through a message-passing mechanism between the main VS Code window and webviews.\u003c/li\u003e\n\u003cli\u003eThe FBI-flagged Kali365 phishing-as-a-service kit expanded from Microsoft 365 targeting to include AWS, Okta, and Russian platforms while relying on device code phishing.\u003c/li\u003e\n\u003cli\u003eOfficial Red Hat NPM accounts were compromised and used to push a malicious worm that spread from machine to machine and attempted to steal sensitive credentials.\u003c/li\u003e\n\u003cli\u003eAn “HTTP/2 Bomb” exploit could knock web servers offline in seconds and potentially affected over 880,000 websites supporting HTTP/2 with default NGINX, Apache HTTPD, Microsoft IIS, Envoy, or Cloudflare Pingora configurations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-talos-content-and-events\"\u003eAdditional Talos content and events\u003c/h2\u003e\n\n\u003cp\u003eThe article promotes additional Talos content. One item is “Winning the cyber marathon with Tony Giandomenico,” which discusses Talos Threat Hunting, product launch challenges, and Ironman triathlons. Another item is a Talos Takes episode titled “When synthetic logs don’t lie,” where Amy speaks with David Bianco about synthetic data and his open-source project EvidenceForge.\u003c/p\u003e\n\n\u003cp\u003eThe article lists upcoming events where Talos can be found. These include Cisco Live U.S. from May 31 to June 4 in Las Vegas, Nevada, and Black Hat USA from August 1 to August 6 in Las Vegas, Nevada.\u003c/p\u003e\n\n\u003ch2 id=\"malware-telemetry-shared-by-talos\"\u003eMalware telemetry shared by Talos\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter includes a list of prevalent malware files from Talos telemetry over the past week. Each entry includes SHA256, MD5, Talos reputation URL, example filename, and detection name.\u003c/p\u003e\n\n\u003cp\u003eThe listed detections include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eWin.Worm.Coinminer::1201\u003c/code\u003e associated with example filename \u003ccode\u003eVID001.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eWin.Tool.Procpatcher::1201\u003c/code\u003e associated with example filename \u003ccode\u003esample.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eW32.C0AD494457-95.SBX.TG\u003c/code\u003e associated with example filename \u003ccode\u003ef_000b97.html\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePUA.Win.Tool.Kmsactivator::\u003c/code\u003e associated with example filename \u003ccode\u003eAutoPico.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eWin.Dropper.Miner::95.sbx.tg\u003c/code\u003e associated with an executable filename beginning \u003ccode\u003ed4aa3e7010220ad1b458fac17039c274_62_Exe.exe\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s most important security message is that Cisco Talos is expanding proactive, hypothesis-driven threat hunting to address adversaries that evade traditional alerting. It emphasizes that AI is affecting both attacker behavior and defender requirements, particularly through scale, telemetry, and the need to correlate weak signals across multiple data domains. The broader newsletter context places this update alongside a busy security news cycle, upcoming conference activity, and expected increases in patches and CVE advisories.\u003c/p\u003e\n","keyPoints":["Cisco Talos is expanding its Threat Hunting program to proactively track down advanced adversaries that deliberately slip past traditional detection thresholds.","The Talos Threat Hunting program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data.","Cisco Talos says its hypothesis-driven hunting approach helped identify a KongTuke command-and-control discovery before a formal detection signature existed.","The newsletter reports that AI was a major theme at Cisco Live U.S., especially around infrastructure, security, data movement, and data management in an agentic world.","The article lists major security headlines involving a global stock exchange email campaign, a GitHub.dev OAuth token theft issue, the Kali365 phishing kit, compromised Red Hat NPM packages, and the HTTP/2 Bomb exploit."],"insights":["The article emphasizes that relying only on known-bad detection patterns creates blind spots because advanced actors can intentionally remain below traditional alert thresholds.","Cisco Talos highlights weak-signal correlation across endpoint, network, and identity data as a practical way to uncover intrusions before formal signatures exist.","The Cisco Live discussions framed AI less as a product feature and more as an infrastructure and security scaling problem involving massive data movement and defense.","The newsletter points to the start of a “great patchening,” warning defenders to expect rapid vendor patches and CVE advisories as summer security events approach.","Several highlighted headlines involve abuse of trusted platforms or native tools, including Windows tools, GitHub.dev, official Red Hat NPM accounts, and device code phishing."],"referencedReports":[],"body":"\u003cp\u003eThe article is a Threat Source newsletter written from Cisco Live U.S. in Las Vegas, where the author describes the scale, noise, and intensity of the conference. It highlights therapy dogs, quiet spaces, and personal strategies such as using noise cancellation to manage the conference environment. The dominant conference theme described in the article is AI, especially from infrastructure and security perspectives.\u003c/p\u003e\n\n\u003cp\u003eThe main cybersecurity takeaway is that Cisco Talos is expanding its Threat Hunting program to proactively identify advanced adversaries that evade traditional detection thresholds. The program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data. Talos says this hypothesis-driven approach helped identify a KongTuke command-and-control discovery before a formal detection signature existed.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also summarizes several security headlines, including a monthslong email campaign against a global stock exchange, a GitHub.dev OAuth token theft issue, the Kali365 phishing ki <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>

}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}

          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>

      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>

function ReportsPanel({ reports }) {

    <ul className="report-list">

}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
