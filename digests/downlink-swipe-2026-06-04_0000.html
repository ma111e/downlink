ficial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe 2022 order stemmed from FTC allegations that Twitter asked users for phone numbers and email addresses for account security but also used that data to target ads to specific consumers. The FTC said the practice affected more than 140 million users and boosted Twitter’s primary source of revenue. The agency also alleged that the conduct violated a 2011 order barring Twitter from deceiving the public about its privacy and security practices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Federal Trade Commission is considering whether to modify or set aside a 2022 settlement order with Twitter, which was renamed X in 2023. The order concerned the company’s use of account security data to support targeted advertising. The settlement included a $150 million fine and barred the company from continuing to profit from data the FTC described as deceptively collected.\u003c/p\u003e\n\n\u003cp\u003eX filed a petition asking the FTC to change or set aside the order. According to the FTC’s call for public comment, X argued that the order is unfair because it was issued against a company that “no longer exists.” X also said the workers responsible for the scheme no longer work for the company and that it has since established a “world class” privacy and data protection program.\u003c/p\u003e\n\n\u003cp\u003eThe company also argued that the order no longer serves a valid regulatory purpose. X said it imposes millions of dollars in needless costs tied to obligations and protections already required by domestic and international privacy regimes and industry-recognized frameworks that X Corp. follows. The company further argued that setting aside the order is consistent with First Amendment principles and is critical to advancing American leadership in artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe FTC has invited public comment on whether it should modify or set aside the order. The public comment period ends July 2. After that period, the agency will decide whether to move forward with changes.\u003c/p\u003e\n\n\u003cp\u003eThe original May 2022 settlement order alleged that Twitter encouraged users to provide phone numbers and email addresses to safeguard their accounts. The FTC alleged that Twitter then used that data to help advertisers target ads to specific consumers, generating large profits. The FTC also alleged that the conduct violated a 2011 order that barred Twitter from deceiving the public about its privacy and security practices.\u003c/p\u003e\n\n\u003cp\u003eAt the time of the 2022 action, FTC Chair Lina Khan said Twitter obtained data from users under the pretext of using it for security purposes but also used it to target ads. She said the practice affected more than 140 million Twitter users and boosted Twitter’s primary source of revenue. Twitter came under new ownership in October 2022 when Elon Musk bought the company.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe Federal Trade Commission said it is considering whether to modify or set aside a 2022 settlement order with Twitter, now known as X. The order concerned Twitter’s alleged use of account security data to support targeted advertising. The settlement included a $150 million fine and prohibited the company from continuing to profit from what the FTC described at the time as deceptively collected data.\u003c/p\u003e\n\n\u003cp\u003eThe FTC has opened a public comment process on X’s petition. The public comment period ends July 2, after which the agency will decide whether to move forward with changes to the order.\u003c/p\u003e\n\n\u003ch2 id=\"x-s-petition\"\u003eX’s Petition\u003c/h2\u003e\n\n\u003cp\u003eX petitioned the FTC to change or set aside the settlement order. According to the FTC’s call for public comment, X argued that the settlement terms are unfair because the order was issued against a company that “no longer exists.” Twitter was renamed X in 2023.\u003c/p\u003e\n\n\u003cp\u003eX also argued that the workers responsible for the scheme no longer work for the company. The company said it has since established a “world class” privacy and data protection program.\u003c/p\u003e\n\n\u003cp\u003eX further argued that the order no longer serves any valid regulatory purpose. It said the order imposes millions of dollars in needless costs to address obligations and protections already required by domestic and international privacy regimes and industry-recognized frameworks that X Corp. follows.\u003c/p\u003e\n\n\u003ch2 id=\"additional-arguments-cited-by-x\"\u003eAdditional Arguments Cited by X\u003c/h2\u003e\n\n\u003cp\u003eThe article states that X also framed its request around broader legal and policy claims. The company argued that setting aside the order is in keeping with First Amendment principles. It also said changing or setting aside the order is “critical to advancing American leadership in artificial intelligence,” according to the FTC press release.\u003c/p\u003e\n\n\u003ch2 id=\"background-of-the-2022-settlement\"\u003eBackground of the 2022 Settlement\u003c/h2\u003e\n\n\u003cp\u003eThe May 2022 settlement order alleged that Twitter suggested users provide phone numbers and email addresses to safeguard their accounts. The FTC alleged that Twitter subsequently used that data to help advertisers target ads to specific consumers. The agency said the practice generated large profits.\u003c/p\u003e\n\n\u003cp\u003eThe FTC also alleged that Twitter’s actions violated a 2011 order. That earlier order barred the company from deceiving the public about its privacy and security practices.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eAt the time of the 2022 action, FTC Chair Lina Khan said Twitter obtained data from users under the pretext of using it for security purposes but also used the data to target users with ads. Khan said the practice affected more than 140 million Twitter users. She also said it boosted Twitter’s primary source of revenue.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe central parties in the article are the FTC and X Corp., formerly Twitter. Twitter was renamed X in 2023, and the article notes that the company came under new ownership in October 2022 when Elon Musk bought it. The affected users were Twitter users whose phone numbers and email addresses were allegedly collected for account security and then also used for advertising targeting.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent Status\u003c/h2\u003e\n\n\u003cp\u003eThe FTC has not yet decided whether to modify or set aside the 2022 order. It is seeking public comment on the issue, with comments due by July 2. After the public comment period closes, the agency will decide whether to move forward with changes.\u003c/p\u003e\n","keyPoints":["The Federal Trade Commission is considering modifying or setting aside a 2022 settlement order with Twitter, now X, over the use of account security data for targeted advertising.","Twitter was fined $150 million in 2022 and prohibited from continuing to profit from data that the FTC said had been deceptively collected.","X petitioned the FTC, arguing that the order is unfair because it was issued against a company that no longer exists, the workers responsible no longer work for X, and the company has established a privacy and data protection program.","The FTC has invited public comment on whether it should change or set aside the order, with the comment period ending July 2.","The FTC alleged in 2022 that Twitter encouraged users to provide phone numbers and email addresses for account security but also used that data to target ads to specific consumers."],"insights":["X is framing relief from a privacy settlement not only as a compliance-cost issue but also as tied to First Amendment principles and American leadership in artificial intelligence.","The FTC’s public comment process creates a defined opportunity for outside stakeholders to influence whether the 2022 order remains in force, is modified, or is set aside before the agency decides after July 2.","The 2022 penalty was based in part on the FTC’s allegation that Twitter had violated a prior 2011 order, making the case about repeat compliance obligations rather than a standalone privacy lapse.","X’s petition emphasizes organizational and ownership changes, including that the company formerly known as Twitter no longer exists and responsible workers have left, as reasons the existing order should no longer apply as written."],"referencedReports":[],"body":"\u003cp\u003eThe Federal Trade Commission said it is considering modifying or setting aside a 2022 settlement order with Twitter, now X, over the use of account security data for targeted advertising. The settlement included a $150 million fine and prohibited the company from continuing to profit from what the FTC described at the time as deceptively collected data. The FTC has opened a public comment period that ends July 2 before deciding whether to proceed with changes.\u003c/p\u003e\n\n\u003cp\u003eX filed a petition arguing that the settlement terms are unfair because the order was issued against a company that it says no longer exists, the workers responsible no longer work for X, and the company has since created a “world class” privacy and data protection program. X also argued that the order no longer serves a valid regulatory purpose and imposes needless costs for obligations already covered by privacy regimes and industry-recognized frameworks. The company also said setting aside or changing the order aligns with First Amendment principles and is critical to advancing American leadership in artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe 2022 order stemmed from FTC allegations that Twitter asked users for phone numbers and email addresses for account security but also used that data to target ads to specific consumers. The FTC said the practice affected more than 140 million users and boosted Twitter’s primary source of revenue. The agency also alleged that the conduct violated a 2011 order barring Twitter from deceiving the public about its privacy and security practices.\u003c/p\u003e\n"},{"n":25,"title":"Ghostwriter v7: Safer Tokens, Scoped Access, and Better Automation","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/04/ghostwriter-v7-safer-tokens-scoped-access-and-better-automation/","time":"16:00","priority":"MAY READ","score":64,"tldr":"Ghostwriter v7 replaces user-managed JWT API tokens with safer opaque tokens and adds scoped service tokens for non-human automation. The key takeaway is that integrations, oplog utilities, and LLM-driven workflows can now run with narrower, auditable permissions instead of broad user-like access.","briefOverview":"\u003cp\u003eGhostwriter v7.0.0 is a release focused on improving authentication and automation. It replaces user-managed JWT API tokens with opaque credentials and introduces scoped service tokens for non-human integrations. The article says this creates a simpler and safer model for automation while making token management easier to understand.\u003c/p\u003e\n\n\u003cp\u003eUser-managed API tokens are now Ghostwriter Access Tokens with a \u003ccode\u003egwat_\u003c/code\u003e prefix, hashed secrets, and validation that rejects revoked, expired, or inactive-user tokens. Editing a token’s expiry now rotates the token prefix, secret hash, and UUID identifier, which immediately invalidates the previous credential. Ghostwriter also separates user-bound automation from service-bound automation more clearly.\u003c/p\u003e\n\n\u003cp\u003eThe release adds service principals and Ghostwriter Service Tokens with a \u003ccode\u003egwst_\u003c/code\u003e prefix for non-human workflows. These tokens can be scoped for uses such as operation log read and write access, project read-only access, and selected read-oriented GraphQL Actions when grants allow it. SpecterOps says users upgrading from earlier versions must rotate existing tokens to receive new opaque credentials and should review whether any existing tokens should become service tokens.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSpecterOps announced Ghostwriter v7.0.0 as a release centered on safer authentication and more controlled automation. The article says the release replaces user-managed JWT API tokens with opaque credentials and introduces service principals with scoped service tokens. It frames the change as a way to support scripts, integrations, custom tooling, operation log utilities, and LLM-assisted workflows without granting unnecessarily broad access.\u003c/p\u003e\n\n\u003cp\u003eThe main token change is that user-managed API tokens are no longer user-managed JWTs. They are now opaque Ghostwriter Access Tokens identified by the \u003ccode\u003egwat_\u003c/code\u003e prefix and backed by hashed secrets. Token validation checks the secret against stored hashes and rejects tokens that are revoked, expired, or tied to inactive users.\u003c/p\u003e\n\n\u003cp\u003eGhostwriter v7 also changes token lifecycle behavior. Editing an API token’s expiry now rotates the token prefix, secret hash, and UUID identifier, immediately invalidating the previous credential. The release also reorganizes API tokens and service tokens into clearer cards and supports editing expiry dates from the profile page.\u003c/p\u003e\n\n\u003cp\u003eFor non-human automation, Ghostwriter v7 introduces service principals and scoped Ghostwriter Service Tokens identified by the \u003ccode\u003egwst_\u003c/code\u003e prefix. These service tokens have hashed secrets, expiration, revocation support, and last-used tracking. Their permissions are assigned directly to the token rather than inherited from the creating user.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights operation log utilities and LLM-assisted workflows as important use cases enabled by scoped access. Ghostwriter v7 adds operation log read and write tokens scoped to a single operation log and its entries, along with project read-only tokens scoped to selected projects or to all projects the creator can access. The article does not describe a security incident, victim organization, or threat actor; it presents the release as a product update and recommends that users rotate existing tokens and review whether some workflows should switch to service tokens.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps announced Ghostwriter v7.0.0 as a release focused on authentication, scoped access, and safer automation. The article’s central change is the replacement of user-managed JWT API tokens with opaque credentials and the introduction of scoped service tokens for non-human integrations.\u003c/p\u003e\n\n\u003cp\u003eThe release is positioned as a foundational update for teams using Ghostwriter’s API tokens in scripts, integrations, custom tooling, operation log utilities, and emerging LLM-assisted workflows. SpecterOps says the result is a simpler and safer automation model that makes day-to-day token management easier to understand.\u003c/p\u003e\n\n\u003ch2 id=\"shift-from-jwt-api-tokens-to-opaque-access-tokens\"\u003eShift from JWT API Tokens to Opaque Access Tokens\u003c/h2\u003e\n\n\u003cp\u003eGhostwriter v7 changes user-managed API tokens from user-managed JWTs to opaque credentials. These new credentials are called Ghostwriter Access Tokens and are identified by the \u003ccode\u003egwat_\u003c/code\u003e prefix.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the opaque tokens are backed by hashed secrets. Token validation checks the provided secret against stored hashes and rejects tokens that are revoked, expired, or associated with inactive users.\u003c/p\u003e\n\n\u003cp\u003eThe article says this improves the token model in several ways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers no longer need to think about JWT internals or handle lengthy Base64 strings.\u003c/li\u003e\n\u003cli\u003eOpaque tokens behave more like access tokens used by modern platforms.\u003c/li\u003e\n\u003cli\u003eUsers can create, store, use, and rotate credentials in a more familiar way.\u003c/li\u003e\n\u003cli\u003eToken prefixes such as \u003ccode\u003egwat_\u003c/code\u003e and \u003ccode\u003egwst_\u003c/code\u003e make Ghostwriter tokens easier to identify at a glance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"token-lifecycle-and-management-changes\"\u003eToken Lifecycle and Management Changes\u003c/h2\u003e\n\n\u003cp\u003eGhostwriter v7 strengthens token lifecycle behavior. Editing an API token’s expiry now rotates the token prefix, secret hash, and UUID identifier.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this immediately invalidates the previous credential. As a result, expiry changes are no longer only metadata updates; they actively replace the credential.\u003c/p\u003e\n\n\u003cp\u003eThe release also updates the user experience around token management. Ghostwriter now organizes API tokens and service tokens into clearer cards and supports editing expiry dates from the profile page.\u003c/p\u003e\n\n\u003ch2 id=\"service-principals-and-scoped-service-tokens\"\u003eService Principals and Scoped Service Tokens\u003c/h2\u003e\n\n\u003cp\u003eA major new capability in Ghostwriter v7 is the introduction of service principals and scoped service tokens. These are intended for non-human automation and are identified as Ghostwriter Service Tokens with the \u003ccode\u003egwst_\u003c/code\u003e prefix.\u003c/p\u003e\n\n\u003cp\u003eThe article states that service tokens include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOpaque credentials.\u003c/li\u003e\n\u003cli\u003eHashed secrets.\u003c/li\u003e\n\u003cli\u003eExpiration support.\u003c/li\u003e\n\u003cli\u003eRevocation support.\u003c/li\u003e\n\u003cli\u003eLast-used tracking.\u003c/li\u003e\n\u003cli\u003ePermissions assigned directly to the token.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis is a key distinction from user-bound API tokens. User-bound tokens remain appropriate when automation should act as a specific person, while service tokens are designed for durable integrations or background processes with intentionally limited permissions.\u003c/p\u003e\n\n\u003ch2 id=\"scoped-access-model\"\u003eScoped Access Model\u003c/h2\u003e\n\n\u003cp\u003eGhostwriter v7 separates user-bound automation from service-bound automation more clearly. Instead of inheriting broad permissions from the user who created them, service tokens operate through scoped grants.\u003c/p\u003e\n\n\u003cp\u003eThe article says these grants determine which information and actions the service token can access. Project read access is validated through database-backed checks tied to the service token, service principal, creator status, and current project access.\u003c/p\u003e\n\n\u003cp\u003eThe practical result described in the article is that integrations can be more narrowly scoped, easier to understand, and safer to run where broad user impersonation is not appropriate.\u003c/p\u003e\n\n\u003ch2 id=\"operation-log-utility-support\"\u003eOperation Log Utility Support\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights operation log utilities as a major use case for scoped service tokens. Ghostwriter v7 adds operation log read and write tokens scoped to a single operation log and its entries.\u003c/p\u003e\n\n\u003cp\u003eThis allows a tool to be given credentials limited to exactly what it needs for reading and writing to one log. The article contrasts this with handing a tool a user-like credential with broad access.\u003c/p\u003e\n\n\u003cp\u003eFor teams building logging tools or analysis pipelines, SpecterOps presents this as a better security model.\u003c/p\u003e\n\n\u003ch2 id=\"project-read-only-and-related-data-access\"\u003eProject Read-Only and Related Data Access\u003c/h2\u003e\n\n\u003cp\u003eGhostwriter v7 also adds project read-only tokens. These can be scoped to selected projects or to all projects the creator can access.\u003c/p\u003e\n\n\u003cp\u003eThe article states that service tokens can read project-related data, linked operation logs, evidence, reports, findings, observations, and public libraries when their grants allow it. They can also call selected read-oriented GraphQL Actions when permitted by their grants.\u003c/p\u003e\n\n\u003ch2 id=\"llm-assisted-workflow-implications\"\u003eLLM-Assisted Workflow Implications\u003c/h2\u003e\n\n\u003cp\u003eThe article says scoped service tokens create a safer foundation for LLM-assisted workflows. It specifically mentions AI-assisted summarization, triage, enrichment, and drafting as areas where teams are experimenting.\u003c/p\u003e\n\n\u003cp\u003eThe concern described in the article is how to allow an LLM to safely interact with the platform. Scoped service tokens provide a path for narrow permissions and auditable automation, allowing access to the right project data or operation log boundaries without requiring full user-equivalent access.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps states that this does not solve every workflow question on its own. However, it gives builders a stronger foundation for responsible integration work and reduces concern about an LLM doing anything destructive in the Ghostwriter database.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users-and-upgrade-guidance\"\u003eAffected Users and Upgrade Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article is relevant to Ghostwriter users who rely on API tokens for scripts, integrations, custom tooling, or automation. It is also relevant to teams building non-human workflows, operation log utilities, analysis pipelines, and LLM-assisted integrations.\u003c/p\u003e\n\n\u003cp\u003eGhostwriter v7.0.0 is available as of June 3, 2026. Users upgrading from earlier versions are told to review the changelog.\u003c/p\u003e\n\n\u003cp\u003eThe article states that existing tokens must be rotated to receive a new opaque credential. It also recommends reviewing how existing tokens are used to determine whether any should be switched to service tokens.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actors-incidents-and-disclosed-impact\"\u003eThreat Actors, Incidents, and Disclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a security incident, compromise, victim organization, or named threat actor. It is a product release announcement focused on authentication and automation improvements in Ghostwriter v7.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact is primarily operational and security-related: token management becomes clearer, user-managed tokens are no longer JWTs, service-based automation can use scoped credentials, and integrations can be granted narrower access.\u003c/p\u003e\n","keyPoints":["Ghostwriter v7.0.0 replaces user-managed JWT API tokens with opaque Ghostwriter Access Tokens identified by the gwat_ prefix and backed by hashed secrets.","Ghostwriter v7 introduces service principals and scoped Ghostwriter Service Tokens identified by the gwst_ prefix for non-human automation.","Service tokens have permissions assigned directly to the token rather than inherited from the creating user, enabling narrower access for integrations.","Ghostwriter v7 adds operation log read and write tokens scoped to a single operation log and project read-only tokens scoped to selected projects or all projects the creator can access.","Users upgrading from earlier versions must rotate existing tokens to receive new opaque credentials and are advised to review whether some token use cases should switch to service tokens."],"insights":["Changing an API token’s expiry in Ghostwriter v7 now immediately invalidates the old credential by rotating the token prefix, secret hash, and UUID identifier.","Teams should reassess existing automation during upgrade because user-bound tokens are still appropriate for actions that should act as a specific person, while service tokens are intended for durable integrations with limited permissions.","Operation log tools can now be deployed with credentials limited to reading and writing a single log, reducing the need to expose broad user-like access to logging utilities.","Scoped service tokens provide a safer foundation for LLM-assisted workflows by allowing access to specific project data or operation log boundaries without granting destructive database capabilities."],"referencedReports":[],"body":"\u003cp\u003eGhostwriter v7.0.0 is a release focused on improving authentication and automation. It replaces user-managed JWT API tokens with opaque credentials and introduces scoped service tokens for non-human integrations. The article says this creates a simpler and safer model for automation while making token management easier to understand.\u003c/p\u003e\n\n\u003cp\u003eUser-managed API tokens are now Ghostwriter Access Tokens with a \u003ccode\u003egwat_\u003c/code\u003e prefix, hashed secrets, and validation that rejects revoked, expired, or inactive-user tokens. Editing a token’s expiry now rotates the token prefix, secret hash, and UUID identifier, which immediately invalidates the previous credential. Ghostwriter also separates user-bound automation from service-bound automation more clearly.\u003c/p\u003e\n\n\u003cp\u003eThe release adds service principals and Ghostwriter Service Tokens with a \u003ccode\u003egwst_\u003c/code\u003e prefix for non-human workflows. These tokens can be scoped for uses such as operation log read and write access, project read-only access, and selected read-oriented GraphQL Actions when grants allow it. SpecterOps says users upgrading from earlier versions must rotate existing tokens to receive new opaque credentials and should review whether any existing tokens should become service tokens.\u003c/p\u003e\n"},{"n":3,"title":"Brave Software releases Origin for a paid, bloat-free browsing experience","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/software/brave-software-releases-origin-for-a-paid-bloat-free-browsing-experience/","time":"21:37","priority":"MAY READ","score":62,"tldr":"Brave Software launched Brave Origin, a paid $59.99 version of its browser that removes crypto, AI, rewards, promotions, and other monetization features while keeping Brave’s privacy protections. The release has drawn criticism from users who say Brave is charging for a cleaner experience that many believe should already be the default.","briefOverview":"\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid minimalist version of its browser. The company describes it as a bloat-free option for users who want Brave’s privacy protections without cryptocurrency, AI, rewards, and other monetization-focused features. Brave says the browser is intended for users who do not need all of Brave’s out-of-the-box features but still want its privacy capabilities.\u003c/p\u003e\n\n\u003cp\u003eBrave Origin turns off components including Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization features. The browser continues to include Brave Shields, Brave’s built-in privacy and ad-blocking protections. It is available both as a standalone download and as an upgrade option for existing Brave installations.\u003c/p\u003e\n\n\u003cp\u003eThe license is a one-time $59.99 purchase that can activate the software on up to 10 devices, while the Linux version is free. The launch has drawn criticism from users who argue that Brave is charging to remove features they already considered unnecessary or unwanted. Others noted that many of the same features can already be disabled in the free Brave browser using enterprise group policies.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid version of its browser aimed at users who want a more streamlined browsing experience. The company says Brave Origin removes cryptocurrency, AI, rewards, and other monetization-focused features from the standard browser. Brave describes the product as an option for users who still want the privacy offered by Brave but do not need all of its out-of-the-box features.\u003c/p\u003e\n\n\u003cp\u003eAccording to Brave, Brave Origin disables Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization components. The browser retains Brave Shields, which the article identifies as Brave’s built-in privacy and ad-blocking protections. This makes the product a reduced-feature version rather than a removal of Brave’s core privacy controls.\u003c/p\u003e\n\n\u003cp\u003eBrave Origin is available as both a standalone browser download and an upgrade option for existing Brave installations. The company says the license is a one-time $59.99 purchase and can be used on up to 10 devices. Users installing the Linux version can get Brave Origin for free.\u003c/p\u003e\n\n\u003cp\u003eThe launch prompted criticism from some users who said Brave is charging people to remove features they viewed as unnecessary or unwanted. One Reddit user argued that Brave began by protecting users from the web’s monetization layers but that the browser itself became another monetization layer over time. That user said Brave Origin confirms the issue by making the clean, stripped-down, privacy-focused version a paid product.\u003c/p\u003e\n\n\u003cp\u003eOther users pointed out that many features removed by Brave Origin can already be disabled in the free Brave version using enterprise group policies. Because of that, some questioned whether Brave Origin adds meaningful differences beyond packaging those configuration settings into an easier-to-use interface. Defenders argued that most users are unlikely to manually configure enterprise policies and that Brave Origin offers a more accessible way to get a cleaner privacy-oriented browser while supporting the privacy project.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid minimalist version of its browser. The company describes Brave Origin as a bloat-free browser for users who want Brave’s privacy features without cryptocurrency, AI, rewards, and other monetization-focused components.\u003c/p\u003e\n\n\u003cp\u003eBrave says the product is intended for users who do not need all of Brave’s out-of-the-box features but still want the privacy that the company says only Brave offers. The release positions Brave Origin as a cleaner, more streamlined alternative to the standard Brave browser.\u003c/p\u003e\n\n\u003ch2 id=\"features-removed\"\u003eFeatures Removed\u003c/h2\u003e\n\n\u003cp\u003eAccording to Brave, Brave Origin turns off a range of optional and promotional features included in the standard browser. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrave Rewards\u003c/li\u003e\n\u003cli\u003eBrave Wallet\u003c/li\u003e\n\u003cli\u003eBrave VPN promotions\u003c/li\u003e\n\u003cli\u003eBrave Leo AI\u003c/li\u003e\n\u003cli\u003eBrave News\u003c/li\u003e\n\u003cli\u003eBrave Talk\u003c/li\u003e\n\u003cli\u003eSponsored images\u003c/li\u003e\n\u003cli\u003eOther promotional or monetization components\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Brave Origin removes or disables these features to provide a minimalist, bloat-free browsing experience.\u003c/p\u003e\n\n\u003ch2 id=\"privacy-features-retained\"\u003ePrivacy Features Retained\u003c/h2\u003e\n\n\u003cp\u003eBrave Origin continues to include Brave Shields. The article describes Brave Shields as the browser’s built-in privacy and ad-blocking protections.\u003c/p\u003e\n\n\u003cp\u003eThis means the paid Origin version removes monetization and promotional features while retaining the privacy and ad-blocking protections that Brave highlights as core to its browser.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-pricing\"\u003eAvailability and Pricing\u003c/h2\u003e\n\n\u003cp\u003eBrave Origin is available in two forms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAs a standalone browser download\u003c/li\u003e\n\u003cli\u003eAs an upgrade option for existing Brave installations\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company says the license is a one-time purchase of $59.99 in the United States. That license can be used to activate the software on up to 10 devices. The article also states that users installing the Linux version can get Brave Origin for free.\u003c/p\u003e\n\n\u003ch2 id=\"user-criticism\"\u003eUser Criticism\u003c/h2\u003e\n\n\u003cp\u003eThe launch has raised criticism from users who argue that Brave is charging users to remove features many already viewed as unnecessary and unwanted. One Reddit user said Brave originally sold users on a browser that protected them from the web’s monetization layers, but that over time the browser itself became another monetization layer.\u003c/p\u003e\n\n\u003cp\u003eThat user argued that Brave Origin confirms the problem because the clean, stripped-down, privacy-focused version is now a paid product. The criticism focuses on the idea that a less promotional browser experience is being packaged as a premium offering.\u003c/p\u003e\n\n\u003ch2 id=\"questions-about-practical-differences\"\u003eQuestions About Practical Differences\u003c/h2\u003e\n\n\u003cp\u003eSome users also pointed out that many of the features removed in Brave Origin can already be disabled in the free Brave browser through enterprise group policies. The article says this led some users to question whether Brave Origin provides meaningful differences beyond packaging those configuration settings into an easier-to-use interface.\u003c/p\u003e\n\n\u003cp\u003eThis suggests that part of the debate is not only about pricing but also about whether Brave Origin is technically distinct from a manually configured free Brave installation.\u003c/p\u003e\n\n\u003ch2 id=\"defense-of-the-project\"\u003eDefense of the Project\u003c/h2\u003e\n\n\u003cp\u003eDefenders of Brave Origin argue that most users are unlikely to manually configure enterprise policies. From that perspective, Brave Origin offers a more accessible way to obtain a cleaner, privacy-oriented browser.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that supporters see the paid version as a way to support the privacy project. This defense frames Brave Origin as a convenience and support mechanism rather than simply a paid removal of unwanted features.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe most significant point in the article is that Brave has introduced a paid version of its browser that removes several monetization and promotional features while keeping its core privacy protections. The release has created debate among users over whether Brave is improving accessibility to a cleaner browser or charging for an experience that some believe should already be standard.\u003c/p\u003e\n","keyPoints":["Brave Software announced the public release of Brave Origin, a paid minimalist version of its browser that removes cryptocurrency, AI, rewards, and other monetization-focused features.","Brave Origin disables features including Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization components.","Brave Origin still includes Brave Shields, the browser's built-in privacy and ad-blocking protections.","Brave Origin is available as a standalone browser download and as an upgrade option for existing Brave installations, with a one-time $59.99 license for up to 10 devices and a free Linux version.","Some users criticized Brave Origin as charging users to remove unwanted features, while others noted that many of those features can already be disabled in the free Brave version using enterprise group policies."],"insights":["Brave Origin’s main practical value may be convenience rather than new functionality, since users noted that many removed features can already be disabled in the free Brave browser through enterprise group policies.","The pricing model creates an unusual split in which Linux users can get Brave Origin for free, while other users are charged a one-time $59.99 license for up to 10 devices.","The launch highlights a tension in Brave’s privacy-focused positioning, as critics argue the standard browser has accumulated monetization features to the point that a stripped-down version is now being sold as a separate product."],"referencedReports":[],"body":"\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid minimalist version of its browser. The company describes it as a bloat-free option for users who want Brave’s privacy protections without cryptocurrency, AI, rewards, and other monetization-focused features. Brave says the browser is intended for users who do not need all of Brave’s out-of-the-box features but still want its privacy capabilities.\u003c/p\u003e\n\n\u003cp\u003eBrave Origin turns off components including Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization features. The browser continues to include Brave Shields, Brave’s built-in privacy and ad-blocking protections. It is available both as a standalone download and as an upgrade option for existing Brave installations.\u003c/p\u003e\n\n\u003cp\u003eThe license is a one-time $59.99 purchase that can activate the software on up to 10 devices, while the Linux version is free. The launch has drawn criticism from users who argue that Brave is charging to remove features they already considered unnecessary or unwanted. Others noted that many of the same features can already be disabled in the free Brave browser using enterprise group policies.\u003c/p\u003e\n"},{"n":24,"title":"OMB Resets Federal Logging. Now What?","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/omb-resets-federal-logging-now-what","time":"13:00","priority":"MAY READ","score":58,"tldr":"OMB’s new federal logging guidance shifts agencies from collecting as much telemetry as possible to prioritizing actionable, risk-based visibility that supports real-time detection, investigation, and response. The key takeaway is that effective security now depends on useful, contextual data—not log volume.","briefOverview":"\u003cp\u003eOMB M-26-14 signals a shift in federal logging guidance from collecting more data to collecting more useful data. The article says federal cybersecurity strategy had long assumed that more logging meant better security, but that approach created more data than teams could realistically operationalize. The updated guidance emphasizes risk-based, prioritized logging that supports continuous event monitoring and threat hunting, investigation, response, and forensics.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the old model improved baseline visibility but did not scale operationally. Log volumes outpaced analytical capacity, SIEM storage and ingestion costs rose, analysts spent more time filtering noise, and critical signals became harder to isolate. OMB’s updated direction is presented as a push toward logging programs designed around mission risk, usability, and operational outcomes.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that logging alone is insufficient and must be part of broader network and system visibility across cloud, SaaS, OT, IoT, and hybrid environments. It highlights the need for searchable, retrievable, structured telemetry enriched with context across users, devices, and data. Netskope positions its platform as supporting the guidance through real-time visibility, contextual telemetry, analytics, threat intelligence, and adaptive controls across cloud, SaaS, web, AI, and private applications.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article discusses OMB M-26-14, updated federal guidance on logging and network visibility. It says the federal approach has moved away from the assumption that more logging automatically means better security. Instead, OMB is signaling that value, usability, and operational relevance are now more important than volume. The article frames this as a shift from data collection to an operational capability measured by usefulness.\u003c/p\u003e\n\n\u003cp\u003eUnder the updated direction, agencies are expected to take a risk-based and prioritized approach to logging. Logging programs should directly support continuous event monitoring and threat hunting, investigation, response, and forensics. The article says agencies are focusing on whether telemetry can answer real-time questions about users, accessed data, anomalous behavior, and mission risk. This makes logging decisions more tied to mission needs and security operations.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the previous model reached limits because it produced too much data for teams to use effectively. Log volumes outpaced analytical capacity, SIEM storage and ingestion costs increased, and analysts spent more time filtering noise than identifying risk. It describes the result as visibility without operational clarity. OMB’s updated guidance is presented as a response to that operational reality.\u003c/p\u003e\n\n\u003cp\u003eA major point in the article is that logging must be paired with broader network and system visibility. Agencies are expected to maintain visibility across cloud, SaaS, OT, IoT, and hybrid environments. The article says this visibility should support real-time detection of anomalous behavior, correlation across systems and environments, and faster investigation and response workflows. It also emphasizes that telemetry must be searchable, retrievable, structured for investigation, enriched with context, and integrated into SOC and incident response workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article says this shift is especially important as agencies expand into cloud, SaaS, remote and hybrid work, and AI-enabled environments. These environments generate high-volume ephemeral telemetry, API-driven activity, encrypted traffic, and distributed behavior across users, applications, and services. Netskope says it supports the guidance by providing real-time visibility across cloud, SaaS, web, AI, and private apps, with telemetry enriched by identity, device posture, location, and behavior. It also describes analytics, threat intelligence, automated insights, asset visibility, and real-time controls as capabilities that help agencies turn telemetry into actionable intelligence.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes OMB M-26-14, updated guidance on federal logging and network visibility. It says the Office of Management and Budget is moving federal agencies away from a long-standing assumption that more logging equals better security. According to the article, that earlier approach made sense because agencies needed visibility and logs were the most direct way to obtain it, but it also caused agencies to generate more data than teams could realistically operationalize.\u003c/p\u003e\n\n\u003cp\u003eThe central message is that logging volume is no longer the goal; logging value is. The article presents OMB’s update as a shift from broad data collection toward risk-based, prioritized telemetry that supports operational cybersecurity outcomes.\u003c/p\u003e\n\n\u003ch2 id=\"shift-from-log-volume-to-operational-value\"\u003eShift from log volume to operational value\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the previous approach often led agencies to collect data that was not operationally useful or cost effective to manage. OMB’s updated direction calls for logging programs that directly support core cybersecurity operations, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eContinuous event monitoring, referred to as CEM.\u003c/li\u003e\n\u003cli\u003eThreat hunting, investigation, response, and forensics, referred to as THIRF.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these outcomes are now the primary lens for determining which data should be collected, retained, and analyzed. Logging is therefore described not as a data collection exercise, but as an operational capability measured by usefulness.\u003c/p\u003e\n\n\u003cp\u003eIn practice, the article says agencies are prioritizing whether telemetry can answer real-time questions such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWho is the user?\u003c/li\u003e\n\u003cli\u003eWhat data is being accessed?\u003c/li\u003e\n\u003cli\u003eIs the behavior normal or anomalous?\u003c/li\u003e\n\u003cli\u003eWhat is the risk to the mission?\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"why-the-older-logging-model-reached-its-limits\"\u003eWhy the older logging model reached its limits\u003c/h2\u003e\n\n\u003cp\u003eThe article says the older model improved baseline visibility but did not scale operationally. Several specific problems are identified:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLog volumes outpaced analytical capacity.\u003c/li\u003e\n\u003cli\u003eSIEM storage and ingestion costs continued to rise.\u003c/li\u003e\n\u003cli\u003eAnalysts spent more time filtering noise than identifying risk.\u003c/li\u003e\n\u003cli\u003eCritical signals became harder to isolate.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article summarizes this challenge as “visibility without operational clarity.” It says OMB’s updated guidance reflects that reality and pushes agencies toward more intentional logging program design.\u003c/p\u003e\n\n\u003ch2 id=\"logging-as-part-of-broader-visibility\"\u003eLogging as part of broader visibility\u003c/h2\u003e\n\n\u003cp\u003eA key clarification in the article is that logging is only part of the equation. Agencies are also expected to maintain effective network and system visibility across multiple environments, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloud.\u003c/li\u003e\n\u003cli\u003eSaaS.\u003c/li\u003e\n\u003cli\u003eOT.\u003c/li\u003e\n\u003cli\u003eIoT.\u003c/li\u003e\n\u003cli\u003eHybrid environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says logging should be viewed as part of a broader visibility strategy. That strategy should support real-time detection of anomalous behavior, correlation of activity across systems and environments, and faster investigation and response workflows.\u003c/p\u003e\n\n\u003ch2 id=\"designing-logging-around-mission-and-risk\"\u003eDesigning logging around mission and risk\u003c/h2\u003e\n\n\u003cp\u003eThe article says OMB reinforces a deliberate approach to logging decisions. Agencies are expected to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrioritize security-relevant events that support operational use cases.\u003c/li\u003e\n\u003cli\u003eAlign logging strategies to mission needs and risk.\u003c/li\u003e\n\u003cli\u003eReduce collection of telemetry that does not provide actionable value.\u003c/li\u003e\n\u003cli\u003eContinuously evaluate whether logs support detection and response needs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis is presented as a way to ensure logging decisions are intentional, risk informed, and operationally defensible.\u003c/p\u003e\n\n\u003ch2 id=\"usability-requirements-for-telemetry\"\u003eUsability requirements for telemetry\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes usability as a consistent theme in the guidance. It says telemetry must be:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSearchable.\u003c/li\u003e\n\u003cli\u003eRetrievable.\u003c/li\u003e\n\u003cli\u003eStructured for investigation.\u003c/li\u003e\n\u003cli\u003eEnriched with context across users, devices, and data.\u003c/li\u003e\n\u003cli\u003eIntegrated into SOC and incident response workflows.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents these qualities as necessary for making telemetry operational rather than merely collected.\u003c/p\u003e\n\n\u003ch2 id=\"efficiency-as-a-security-requirement\"\u003eEfficiency as a security requirement\u003c/h2\u003e\n\n\u003cp\u003eThe article states that inefficiencies in logging become harder to ignore as environments scale. It identifies excessive ingestion of low-value telemetry as causing several issues:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRedundancy in logging across systems.\u003c/li\u003e\n\u003cli\u003eHigh storage and processing costs.\u003c/li\u003e\n\u003cli\u003eLimited return on analytical effort.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says OMB makes clear that logging architectures must be purpose built, minimally redundant, and optimized for operational value. It frames efficiency not just as a cost concern, but as part of effective security operations.\u003c/p\u003e\n\n\u003ch2 id=\"importance-in-cloud-saas-hybrid-work-and-ai-enabled-environments\"\u003eImportance in cloud, SaaS, hybrid work, and AI-enabled environments\u003c/h2\u003e\n\n\u003cp\u003eThe article says the shift in guidance is more important as agencies expand into cloud, SaaS, remote and hybrid work, and AI-enabled environments. These environments are described as producing telemetry and activity patterns that challenge traditional approaches, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHigh-volume ephemeral telemetry.\u003c/li\u003e\n\u003cli\u003eAPI-driven activity that does not map cleanly to traditional logs.\u003c/li\u003e\n\u003cli\u003eEncrypted traffic that reduces inspectability.\u003c/li\u003e\n\u003cli\u003eDistributed behavior across users, applications, and services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article uses these conditions to support its argument that agencies need broader visibility and context-rich telemetry, not only more logs.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-next-steps-for-federal-agencies\"\u003eRecommended next steps for federal agencies\u003c/h2\u003e\n\n\u003cp\u003eThe article describes OMB’s update as a forcing function and says agencies should take several actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlign logging to CEM and THIRF operational outcomes.\u003c/li\u003e\n\u003cli\u003ePrioritize context-rich telemetry over raw event volume.\u003c/li\u003e\n\u003cli\u003eImprove visibility across cloud, SaaS, OT, web, and AI activity.\u003c/li\u003e\n\u003cli\u003eShift from downstream analysis to real-time operational detection.\u003c/li\u003e\n\u003cli\u003eDesign for efficiency, usability, and analyst action instead of only data collection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the goal is not to eliminate logs. Rather, agencies should ensure that what is captured is searchable, retrievable, actionable, and tied to mission risk.\u003c/p\u003e\n\n\u003ch2 id=\"netskope-s-stated-role\"\u003eNetskope’s stated role\u003c/h2\u003e\n\n\u003cp\u003eThe article says M-26-14 requires agencies to make telemetry operational, enabling real-time monitoring, faster detection, and quicker response aligned to CEM and THIRF. Netskope states that it supports this through real-time visibility across:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloud.\u003c/li\u003e\n\u003cli\u003eSaaS.\u003c/li\u003e\n\u003cli\u003eWeb.\u003c/li\u003e\n\u003cli\u003eAI.\u003c/li\u003e\n\u003cli\u003ePrivate applications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Netskope enables continuous monitoring of user activity, data movement, and application behavior. It also says telemetry is enhanced with context including identity, device posture, location, and behavior, which helps federal teams prioritize high-risk activity.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that Netskope enhances detection and response through analytics and threat intelligence. It says automated insights can speed incident handling and accelerate remediation, while comprehensive asset visibility, including unmanaged devices and third-party services, improves risk management. Netskope is also described as providing real-time controls to contain threats and enforce adaptive policies.\u003c/p\u003e\n\n\u003ch2 id=\"bottom-line\"\u003eBottom line\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that more data does not create better security by itself. Its main message is that better insight, delivered in real time and grounded in context, is what improves security operations. It summarizes the shift as: log less, understand more, and act faster.\u003c/p\u003e\n","keyPoints":["OMB M-26-14 shifts federal logging guidance away from maximizing log volume and toward collecting telemetry that provides operational value.","The guidance directs agencies to use a risk-based, prioritized approach to logging that supports continuous event monitoring and threat hunting, investigation, response, and forensics.","The article says prior logging models created excessive data volumes, rising SIEM storage and ingestion costs, analyst noise, and reduced operational clarity.","Agencies are expected to maintain effective visibility across cloud, SaaS, OT, IoT, and hybrid environments, not rely on logging alone.","Netskope says its platform supports the guidance by providing real-time visibility across cloud, SaaS, web, AI, and private applications with context such as identity, device posture, location, and behavior."],"insights":["Agencies should evaluate logs by whether they can answer operational questions in real time, such as who the user is, what data is being accessed, whether behavior is anomalous, and how the activity affects mission risk.","The article frames logging efficiency as a security requirement, meaning redundant or low-value telemetry is not just a cost issue but a barrier to effective detection and response.","The guidance implies that telemetry usability matters as much as collection, requiring logs to be searchable, retrievable, structured for investigation, enriched with context, and integrated into SOC and incident response workflows.","Cloud, SaaS, remote work, hybrid, and AI-enabled environments make traditional logging less sufficient because they generate ephemeral telemetry, API-driven activity, encrypted traffic, and distributed behavior across users, applications, and services."],"referencedReports":[{"title":"M-26-14: Ensuring Effective and Efficient Agency Logging and Network Visibility to Defend Against Evolving Cyber Threats","url":"https://www.whitehouse.gov/wp-content/uploads/2026/05/M-26-14-Ensuring-Effective-and-Efficient-Agency-Logging-and-Network-Visibility-to-Defend-Against-Evolving-Cyber-Threats.pdf","publisher":"United States Office of Management and Budget","context":"The article discusses OMB’s updated federal logging and network visibility guidance and uses it as the basis for its analysis of how agencies should change logging practices.","category":"","primary":false}],"body":"\u003cp\u003eOMB M-26-14 signals a shift in federal logging guidance from collecting more data to collecting more useful data. The article says federal cybersecurity strategy had long assumed that more logging meant better security, but that approach created more data than teams could realistically operationalize. The updated guidance emphasizes risk-based, prioritized logging that supports continuous event monitoring and threat hunting, investigation, response, and forensics.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the old model improved baseline visibility but did not scale operationally. Log volumes outpaced analytical capacity, SIEM storage and ingestion costs rose, analysts spent more time filtering noise, and critical signals became harder to isolate. OMB’s updated direction is presented as a push toward logging programs designed around mission risk, usability, and operational outcomes.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that logging alone is insufficient and must be part of broader network and system visibility across cloud, SaaS, OT, IoT, and hybrid environments. It highlights the need for searchable, retrievable, structured telemetry enriched with context across users, devices, and data. Netskope positions its platform as supporting the guidance through real-time visibility, contextual telemetry, analytics, threat intelligence, and adaptive controls across cloud, SaaS, web, AI, and private applications.\u003c/p\u003e\n"},{"n":1,"title":"Hackers Are After the Gaps in Your Vulnerability Program: Here's Their Playbook","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-are-after-the-gaps-in-your-vulnerability-program-heres-their-playbook/","time":"14:01","priority":"MAY READ","score":55,"tldr":"Underground forums are teaching novice hackers a simple workflow to find, validate, and monetize exposed vulnerabilities using public tools, lowering the barrier to real-world exploitation. Defenders should prioritize reachable critical flaws, neglected legacy systems, and effective vulnerability disclosure programs before attackers act.","briefOverview":"\u003cp\u003eFlare researchers analyzed an underground forum thread titled “Hacking for Profit. Working method,” written by an actor using the name “Hercules.” The post explains a simplified workflow for scanning, detecting, assessing, exploiting, and monetizing vulnerabilities in the wild. Its significance is that it turns vulnerability exploitation into a clear, action-oriented process aimed at beginners.\u003c/p\u003e\n\n\u003cp\u003eThe tutorial focuses on newly disclosed high-impact vulnerabilities such as remote code execution, authentication bypass, account takeover, IDOR, and data exposure. It also highlights use of the Nuclei framework by ProjectDiscovery and separates the process into “legal” and “illegal” paths. The article says this lets readers decide whether to pursue vulnerability disclosure or hacking.\u003c/p\u003e\n\n\u003cp\u003eThe forum response showed demand for practical mentorship, with users thanking Hercules, asking for private contact, and describing themselves as beginners who wanted help applying theory. The same method was reposted and discussed across four additional forums. For defenders, the article stresses critical reachable vulnerabilities, older unpatched systems, and paid vulnerability disclosure programs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFlare researchers examined a forum thread titled “Hacking for Profit. Working method,” authored by a threat actor using the name “Hercules.” The post is described as not especially long or technical, but valuable because it breaks a complex exploitation process into clear, actionable steps. It covers how to scan, detect, assess, exploit, and monetize vulnerabilities in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe tutorial begins with advice on finding newly disclosed vulnerabilities, particularly high-impact classes such as remote code execution, authentication bypass, account takeover, IDOR, and data exposure. It then moves into identifying exposed systems, validating whether they may be vulnerable, and deciding whether the result should be reported, sold, or exploited. The article highlights the use of the Nuclei framework by ProjectDiscovery as one of the notable technical elements.\u003c/p\u003e\n\n\u003cp\u003eThe article says the tutorial is effective because of its accessibility rather than a novel technical trick. Hercules writes in plain language and argues that many tutorials focus too much on computer science, operating systems, programming, or scanner parameters, while beginners want to take practical action. Public tools, community templates, automation, and AI assistance are presented as ways to reduce the barrier for novice actors.\u003c/p\u003e\n\n\u003cp\u003eFlare observed that the thread generated sustained engagement over several months. Multiple users thanked Hercules, asked to connect privately, described themselves as beginners, or requested guidance on moving from theoretical learning to practical hacking. The same method was reposted and discussed across four additional forums, suggesting that its influence extended beyond the original post.\u003c/p\u003e\n\n\u003cp\u003eThe monetization section describes several outcomes after discovering a vulnerability: asking the affected owner or hosting provider for payment in exchange for disclosure, selling the finding on underground markets, or exploiting the vulnerability and inspecting the server. Hercules also suggests that an actor could approach the victim and sell the information elsewhere at the same time. The article notes that remote code execution, account takeover, IDOR, and data leak vulnerabilities are framed as assets that can be sold quickly.\u003c/p\u003e\n\n\u003cp\u003eFor defenders, the article says the thread reinforces the importance of prioritizing critical and reachable vulnerabilities, including those targeted by automated botnets soon after disclosures and proof-of-concept releases. It also emphasizes the long tail of old vulnerabilities on legacy servers and outdated Drupal or WordPress sites. The article argues that paid vulnerability disclosure programs matter because payment may give actors more motivation to disclose findings, which can help organizations mitigate risk.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eFlare researchers analyzed an underground forum thread titled “Hacking for Profit. Working method,” written by a threat actor using the name “Hercules.” The article describes the post as relatively short and not especially technical, but important because it breaks vulnerability exploitation into a practical, step-by-step workflow.\u003c/p\u003e\n\n\u003cp\u003eThe thread covers how to scan, detect, assess, exploit, and monetize vulnerabilities in the wild. According to the article, its value lies in making a complex process accessible to novice threat actors and showing how vulnerability discovery can be turned into a repeatable money-making process.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-forum-tutorial-describes\"\u003eWhat the Forum Tutorial Describes\u003c/h2\u003e\n\n\u003cp\u003eHercules explains how to monetize vulnerability discovery in real-world exposed systems. The process begins with searching for newly disclosed vulnerabilities, especially high-impact categories such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemote code execution\u003c/li\u003e\n\u003cli\u003eAuthentication bypass\u003c/li\u003e\n\u003cli\u003eAccount takeover\u003c/li\u003e\n\u003cli\u003eIDOR\u003c/li\u003e\n\u003cli\u003eData exposure\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe tutorial then moves through identifying exposed systems, validating whether those systems may be vulnerable, and deciding what to do with the results. The possible paths include reporting the issue, selling it, or exploiting it.\u003c/p\u003e\n\n\u003ch2 id=\"notable-technical-and-operational-elements\"\u003eNotable Technical and Operational Elements\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights three aspects of the tutorial as especially notable.\u003c/p\u003e\n\n\u003cp\u003eFirst, the tutorial uses the Nuclei framework by ProjectDiscovery, which the article describes as highly popular among offensive security practitioners. Second, the post reflects an understanding of the difficulty defenders face when patching newly disclosed vulnerabilities. The article references an educational Aqua Security blog titled “50 shades of vulnerabilities: Uncovering Flaws in Open-Source Vulnerability Disclosure” as further discussion of those patching challenges.\u003c/p\u003e\n\n\u003cp\u003eThird, the tutorial is split into “legal” and “illegal” parts. The article explains that this structure allows readers to stop at different stages and choose whether to move from vulnerability disclosure into hacking.\u003c/p\u003e\n\n\u003ch2 id=\"accessibility-as-the-core-appeal\"\u003eAccessibility as the Core Appeal\u003c/h2\u003e\n\n\u003cp\u003eThe article says the most effective part of the tutorial is not a technical trick, but its tone. Hercules writes in plain language and frames the process as something that can be learned through action.\u003c/p\u003e\n\n\u003cp\u003eHercules argues that many tutorials focus too heavily on computer science, operating systems, programming, or scanner parameters. By contrast, the audience he addresses wants to “hack,” “break in,” and “gain access.”\u003c/p\u003e\n\n\u003cp\u003eThe post also suggests that users do not need to be advanced software engineers to begin. Public tools, community templates, automation, and AI assistance are presented as ways to lower the barrier, while programming skills are described as useful but not mandatory.\u003c/p\u003e\n\n\u003ch2 id=\"forum-reaction-and-spread\"\u003eForum Reaction and Spread\u003c/h2\u003e\n\n\u003cp\u003eFlare researchers reviewed the original post and responses over several months. The article says the activity around the thread shows its influence was not limited to the original post.\u003c/p\u003e\n\n\u003cp\u003eMultiple users thanked Hercules, asked to connect privately, described themselves as beginners, or said they wanted guidance on moving from theory to practical hacking. Some users said they had completed hacking courses but still could not apply the material in the real world, while another said they did not know how to program and asked whether that would be a problem.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the method was reposted and discussed across four additional forums. This broader spread indicates that the tutorial resonated beyond its original thread.\u003c/p\u003e\n\n\u003ch2 id=\"monetization-paths-described\"\u003eMonetization Paths Described\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the monetization section as one of the most intriguing parts of the method. Hercules describes several actions students can take after discovering a vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThose options include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproaching the owner of the server or website, or the hosting company, and asking for payment in exchange for vulnerability information.\u003c/li\u003e\n\u003cli\u003eOffering the finding on underground markets.\u003c/li\u003e\n\u003cli\u003eExploiting the vulnerability and detecting what is on the server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Hercules even suggests that an actor could approach the victim and sell the information elsewhere at the same time. It also notes that Hercules describes himself as a hacker rather than a fraudster and says he prefers to sell quickly instead of conducting downstream fraud.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-classes-as-assets\"\u003eVulnerability Classes as Assets\u003c/h2\u003e\n\n\u003cp\u003eThe tutorial frames certain vulnerability types as assets that can be monetized. Remote code execution is described as something that can become access sold to botnet operators, used for illicit resource abuse, or leveraged for data theft.\u003c/p\u003e\n\n\u003cp\u003eAccount takeover, IDOR, and data leak vulnerabilities are also framed as findings that can be sold quickly. The article presents this monetization logic as part of the reason the tutorial is appealing to beginner actors.\u003c/p\u003e\n\n\u003ch2 id=\"soft-recruitment-and-mentorship-dynamic\"\u003eSoft Recruitment and Mentorship Dynamic\u003c/h2\u003e\n\n\u003cp\u003eThe forum replies showed demand for practical mentorship. Users asked for private contact, guidance, and additional material. Some said they were blocked by forum limitations and could not yet send private messages.\u003c/p\u003e\n\n\u003cp\u003eThe article says the post functioned as a soft recruitment channel because Hercules repeatedly invited users to contact him privately. It also notes that the long tail of engagement matters because a simple, motivational workflow can remain relevant for months without depending on a single vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-thread-matters-for-threat-intelligence\"\u003eWhy the Thread Matters for Threat Intelligence\u003c/h2\u003e\n\n\u003cp\u003eThe article says the thread is valuable from a threat intelligence perspective even without unique indicators. It shows how newer actors are taught to think, what vulnerability classes they are encouraged to prioritize, and how experienced forum members convert curiosity into participation.\u003c/p\u003e\n\n\u003cp\u003eThe post teaches a reusable mindset: monitor new flaws, find exposed systems, validate, monetize, and repeat. The article emphasizes that this kind of simplified workflow can attract a broader audience than a highly technical exploit write-up.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-implications\"\u003eDefensive Implications\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three main lessons for vulnerability management programs.\u003c/p\u003e\n\n\u003cp\u003eFirst, critical and reachable vulnerabilities are highly targeted. The article notes that automated botnets are updated minutes after new vulnerabilities are disclosed and proof-of-concept code is released, and that novice hackers are also being trained to treat these as high-value targets.\u003c/p\u003e\n\n\u003cp\u003eSecond, old vulnerabilities remain important. Legacy servers and old Drupal or WordPress sites with vulnerabilities from 2019 are described as targets that novice hackers may exploit.\u003c/p\u003e\n\n\u003cp\u003eThird, paid vulnerability disclosure programs matter. The article argues that if actors are paid, they may have more motivation to disclose vulnerabilities. It also says that even if they sell the information on the dark web, once the vulnerability is disclosed, the organization can probably mitigate the risk.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance\"\u003eBroader Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the thread is not important because it introduces a new hacking technique. Instead, it matters because it shows how cybercrime scales through simplification.\u003c/p\u003e\n\n\u003cp\u003eHercules turns a complex topic into a practical business workflow that beginners can understand. The replies show that users who were unsure, inexperienced, or frustrated by theory responded with interest.\u003c/p\u003e\n\n\u003cp\u003eThe article states that cybercriminal capability grows not only through elite malware development or zero-day exploitation, but also through accessible tutorials, mentorship, public tooling, and communities that make illegal activity feel achievable.\u003c/p\u003e\n","keyPoints":["A forum post by a threat actor using the name \"Hercules\" explains how to search for newly disclosed vulnerabilities, identify exposed systems, validate whether they may be vulnerable, and decide whether to report, sell, or exploit the findings.","Flare researchers found that the thread drew sustained engagement from users who thanked Hercules, requested private contact or mentorship, described themselves as beginners, and sought guidance on applying hacking knowledge in practice.","The tutorial highlights the Nuclei framework, discusses defender challenges in patching newly disclosed vulnerabilities, and separates its workflow into legal and illegal paths.","Hercules describes monetization options including asking affected owners or hosting companies for payment, selling findings on underground markets, or exploiting vulnerabilities to inspect what is on a server.","The article says defenders should focus on critical reachable vulnerabilities, the long tail of old vulnerabilities on legacy systems, and paid vulnerability disclosure programs."],"insights":["The article emphasizes that the tutorial’s influence came less from technical novelty and more from making vulnerability exploitation feel accessible to beginners through plain language, motivation, and a reusable workflow.","The thread functioned as a soft recruitment or mentorship channel because Hercules repeatedly invited private contact and multiple users asked for direct guidance after reading the post.","The same workflow was reposted and discussed across four additional forums, showing that simple operational playbooks can spread beyond their original community even without containing unique indicators or new techniques.","The article highlights paid vulnerability disclosure programs as a practical defensive lever because attackers may be more motivated to disclose findings if they expect compensation, reducing risk even if they also consider selling the information elsewhere."],"referencedReports":[{"title":"50 shades of vulnerabilities: Uncovering Flaws in Open-Source Vulnerability Disclosure","url":"https://www.aquasec.com/blog/50-shades-of-vulnerabilities-uncovering-flaws-in-open-source-vulnerability-disclosures/","publisher":"Aqua Security","context":"The article cites this educational blog as further discussion of the challenges defenders face when patching newly discovered vulnerabilities.","category":"","primary":false}],"body":"\u003cp\u003eFlare researchers analyzed an underground forum thread titled “Hacking for Profit. Working method,” written by an actor using the name “Hercules.” The post explains a simplified workflow for scanning, detecting, assessing, exploiting, and monetizing vulnerabilities in the wild. Its significance is that it turns vulnerability exploitation into a clear, action-oriented process aimed at beginners.\u003c/p\u003e\n\n\u003cp\u003eThe tutorial focuses on newly disclosed high-impact vulnerabilities such as remote code execution, authentication bypass, account takeover, IDOR, and data exposure. It also highlights use of the Nuclei framework by ProjectDiscovery and separates the process into “legal” and “illegal” paths. The article says this lets readers decide whether to pursue vulnerability disclosure or hacking.\u003c/p\u003e\n\n\u003cp\u003eThe forum response showed demand for practical mentorship, with users thanking Hercules, asking for private contact, and describing themselves as beginners who wanted help applying theory. The same method was reposted and discussed across four additional forums. For defenders, the article stresses critical reachable vulnerabilities, older unpatched systems, and paid vulnerability disclosure programs.\u003c/p\u003e\n"},{"n":23,"title":"Tenable joins Anthropic’s Project Glasswing to advance AI-era cyber defense","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/anthropic-claude-mythos-tenable-joins-project-glasswing","time":"20:30","priority":"MAY READ","score":52,"tldr":"Tenable is joining Anthropic’s Project Glasswing to test how Claude Mythos Preview can improve exposure management tasks like attack path analysis, risk prioritization, and remediation. The partnership is also aimed at helping Tenable and its customers better understand and secure the growing AI attack surface.","briefOverview":"\u003cp\u003eTenable announced that it is joining Anthropic’s Project Glasswing and working with Claude Mythos Preview. The company says it will evaluate and benchmark how the frontier AI model’s advanced reasoning capabilities can improve exposure management programs. Areas of focus include attack path analysis, exposure prioritization, and remediation.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the move as part of Tenable’s broader effort to prepare for how AI will reshape cybersecurity. Tenable says vulnerability discovery is accelerating, attack surfaces are expanding, and security teams are overwhelmed by the volume of findings. It argues that defenders will need to understand what matters most and reduce exposure before attackers strike.\u003c/p\u003e\n\n\u003cp\u003eTenable also says it wants to understand emerging frontier AI model behaviors, their risks and benefits, and the controls organizations will need as AI adoption accelerates. The company links this work to its existing partnership with Anthropic, including a prior integration of Tenable One with the Claude Compliance API and Claude-powered workflows in Tenable Hexa AI.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTenable is participating in Anthropic’s Project Glasswing and working with Claude Mythos Preview to study how frontier AI can support cyber defense. The company says the work will focus on evaluating and benchmarking advanced reasoning capabilities in exposure management. Specific areas include attack path analysis, exposure prioritization, and remediation decision-making.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as a response to a changing cybersecurity environment shaped by AI. Tenable says the pace of vulnerability discovery is accelerating, attack surfaces are expanding, and security teams are struggling to determine which findings actually matter. It also says frontier AI models could accelerate cyber offense and challenge cyber defense over the next few years.\u003c/p\u003e\n\n\u003cp\u003eTenable emphasizes that defender advantage will not come from access to any single AI model. Instead, it says advantage will come from understanding the most important exposures, reducing risk before attackers act, and coordinating remediation at modern threat speed. The article positions exposure management as the core discipline for answering which exposures are dangerous, which combinations create attack paths, and what should be fixed first.\u003c/p\u003e\n\n\u003cp\u003eAs part of Project Glasswing, Tenable plans to use Claude Mythos Preview for new research, to reinforce existing security analysis, and to strengthen Tenable’s own defenses. The company also says it plans to use Mythos alongside other models to challenge assumptions and identify relationships and risk patterns faster than traditional approaches alone. Tenable expects frontier models to become another source of security insight and telemetry for exposure management platforms.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the growing AI attack surface created as organizations become responsible for AI systems they did not build. Tenable says participation in Project Glasswing will help it understand model behaviors, evolving risks, and the controls organizations need as AI adoption accelerates. It connects this work to previous Anthropic-related efforts, including the integration of Tenable One with the Claude Compliance API and Claude-powered workflows in Tenable Hexa AI.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTenable announced that it is joining Anthropic’s Project Glasswing and working with Claude Mythos Preview. The company describes this as a strategic step for defenders and an extension of its existing partnership with Anthropic.\u003c/p\u003e\n\n\u003cp\u003eThe stated goal is to evaluate and benchmark how a frontier AI model’s advanced reasoning capabilities can improve exposure management. Tenable
