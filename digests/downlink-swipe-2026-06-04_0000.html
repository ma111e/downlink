<script>
window.__DL_ARTICLES = [{"n":19,"title":"Cisco Patches CVE-2026-20230 in Unified CM as Exploit Code Goes Public","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-patches-cve-2026-20230-in-unified.html","time":"16:55","priority":"MUST READ","score":92,"tldr":"Cisco patched a critical Unified Communications Manager flaw, CVE-2026-20230, that lets unauthenticated network attackers write files and potentially escalate to root when WebDialer is enabled. Proof-of-concept code is already public, so affected deployments should patch or disable WebDialer immediately.","briefOverview":"\u003cp\u003eCisco has patched CVE-2026-20230, a flaw in Unified Communications Manager and its Session Management Edition. The issue allows an unauthenticated attacker on the network to write files to the system and potentially escalate to root. Proof-of-concept exploit code is already public, although Cisco’s PSIRT says it has not seen attacks using the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is a server-side request forgery caused by improper validation of certain HTTP requests. Cisco gave the issue a CVSS base score of 8.6, but rated the advisory Critical because the file-write foothold can lead to full root privileges. The flaw only works when the WebDialer service is running, and WebDialer is disabled by default.\u003c/p\u003e\n\n\u003cp\u003eCisco says patching is the only real fix. Version 14 users should move to 14SU6, while version 15 users must use an interim COP patch or disable WebDialer until 15SU5 is released in September 2026. Administrators can check exposure by reviewing the Cisco WebDialer Web Service status in Cisco Unified Serviceability.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco has patched CVE-2026-20230 in Unified Communications Manager and Unified CM Session Management Edition. The flaw allows an unauthenticated attacker on the network to write files to the underlying operating system. Cisco’s PSIRT says it has not observed exploitation, but proof-of-concept exploit code is already public.\u003c/p\u003e\n\n\u003cp\u003eThe issue is described as a server-side request forgery. Unified CM and its Session Management Edition fail to properly validate certain HTTP requests, allowing a crafted request to cause arbitrary file writes. Cisco says those files can later be used to escalate privileges to root.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the CVSS base score is 8.6 because it scores the file write as an integrity-only impact, without confidentiality or availability impact. Cisco nevertheless rated the advisory Critical because the end state can be full root access. This creates a gap between the numeric score and the vendor severity rating.\u003c/p\u003e\n\n\u003cp\u003eThere is a mitigating condition: the vulnerability only works when the WebDialer service is running. WebDialer is disabled by default, but deployments that enabled it are exposed. Administrators can check the Cisco WebDialer Web Service status under Cisco Unified Serviceability in the CTI Services section.\u003c/p\u003e\n\n\u003cp\u003eCisco’s remediation path depends on the product train. For version 14, the fix is 14SU6. For version 15, the full 15SU5 Service Update is not expected until September 2026, so customers must use the interim COP patch or disable WebDialer by turning it off under Service Activation.\u003c/p\u003e\n\n\u003cp\u003eThe article also places this flaw in the context of recent Unified CM security issues. It cites a hard-coded root SSH account in CVE-2025-20309 and an unauthenticated RCE in several voice products tracked as CVE-2026-20045. The latter was reportedly exploited in the wild and added by CISA to its known-exploited list.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco has patched CVE-2026-20230, a vulnerability affecting Unified Communications Manager and Unified CM Session Management Edition. The flaw allows an unauthenticated attacker on the network to write files to the underlying operating system. Cisco’s PSIRT says it has not seen the flaw used in attacks, but proof-of-concept exploit code is already public.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the public PoC reduces the available remediation window for defenders. It says the vulnerability provides a file-write foothold that can later be used to escalate privileges to root. Cisco rated the advisory Critical despite the CVSS base score being 8.6.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is described as a server-side request forgery. Unified CM and its Session Management Edition fail to properly validate certain HTTP requests. A crafted request can cause the server to write arbitrary files to the underlying operating system.\u003c/p\u003e\n\n\u003cp\u003eThe arbitrary file write is the first step in the attack path. Cisco says the written files can later be used to escalate privileges to root. Root is described in the article as the top privilege on the system.\u003c/p\u003e\n\n\u003ch2 id=\"severity-and-scoring\"\u003eSeverity and Scoring\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights a difference between the CVSS score and Cisco’s severity rating. CVE-2026-20230 has a CVSS base score of 8.6. That score reflects the file-write condition as an integrity-only impact, without confidentiality or availability loss.\u003c/p\u003e\n\n\u003cp\u003eCisco rated the advisory Critical anyway. The article explains that this is because the end state can be full root access. In other words, the CVSS score covers the file-write impact but not the later root escalation described by Cisco.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-conditions\"\u003eExposure Conditions\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability only works when the WebDialer service is running. WebDialer is disabled by default. The article notes that this default setting does not help deployments that have turned the service on.\u003c/p\u003e\n\n\u003cp\u003eAdministrators can check exposure in Cisco Unified CM Administration by switching to Cisco Unified Serviceability. Under Tools \u0026gt; Control Center - Feature Services, they should review the Cisco WebDialer Web Service status in the CTI Services section. If the status is Started, the deployment is exposed according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"remediation\"\u003eRemediation\u003c/h2\u003e\n\n\u003cp\u003eThe article states that patching is the only real fix. For the 14 train, the fixed release is 14SU6. For the 15 train, the full Service Update, 15SU5, is not due until September 2026.\u003c/p\u003e\n\n\u003cp\u003eUntil the 15SU5 release is available, version 15 users must use the interim COP patch or disable WebDialer. The article says WebDialer can be turned off by unchecking it under Tools \u0026gt; Service Activation and saving the change.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-known-exploitation\"\u003eDisclosure and Known Exploitation\u003c/h2\u003e\n\n\u003cp\u003eAn independent researcher working with SSD Secure Disclosure reported the bug. Cisco’s PSIRT says it has not observed exploitation in attacks. However, the article states that proof-of-concept exploit code is already public.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the public PoC as increasing urgency. It says the PoC shortens the runway before attackers may be able to operationalize the issue. It concludes that with a public PoC and a months-out 15-train fix, defenders should assume someone turns the file-write into a working attack before patches are deployed everywhere.\u003c/p\u003e\n\n\u003ch2 id=\"broader-unified-cm-context\"\u003eBroader Unified CM Context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Unified CM as a steady source of unauthenticated, root-level trouble. It cites a July issue in which Cisco removed a hard-coded root SSH account left in from development. That flaw was tracked as CVE-2025-20309 and had a CVSS score of 10.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites a January patch for an unauthenticated remote code execution flaw across several Cisco voice products. That issue was tracked as CVE-2026-20045. The article says it was already being exploited in the wild and was added by CISA to its known-exploited list.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-20230 affects Cisco Unified Communications Manager and Unified CM Session Management Edition.\u003c/li\u003e\n\u003cli\u003eThe vulnerability is a server-side request forgery that can lead to arbitrary file writes.\u003c/li\u003e\n\u003cli\u003eCisco says the written files can later be used to escalate to root.\u003c/li\u003e\n\u003cli\u003ePublic proof-of-concept exploit code is available, but Cisco PSIRT has not seen exploitation.\u003c/li\u003e\n\u003cli\u003eWebDialer must be running for the flaw to be exploitable, and it is disabled by default.\u003c/li\u003e\n\u003cli\u003eCisco recommends patching, with 14SU6 available for the 14 train and an interim COP patch or WebDialer shutdown required for the 15 train until 15SU5.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cisco patched CVE-2026-20230 in Unified Communications Manager and Unified CM Session Management Edition, and public proof-of-concept exploit code is already available.","The flaw is a server-side request forgery that can allow an unauthenticated network attacker to write arbitrary files to the underlying operating system and later escalate to root.","Cisco rated the advisory Critical even though the CVSS base score is 8.6 because the score covers the file-write impact but not the follow-on root escalation.","The vulnerability is exploitable only when the Cisco WebDialer service is running, and WebDialer is disabled by default.","Cisco says the fix is 14SU6 for the 14 train, while 15-train users must use an interim COP patch or disable WebDialer until 15SU5 is released."],"insights":["Administrators can quickly determine exposure by checking whether the Cisco WebDialer Web Service is marked Started under Cisco Unified Serviceability, because the flaw only works when that service is running.","The advisory’s Critical rating is more severe than the 8.6 CVSS score suggests because Cisco says the score does not account for the later root escalation enabled by the file write.","Organizations on the 15 train face a longer remediation gap because the full 15SU5 Service Update is not due until September 2026, leaving the interim COP patch or disabling WebDialer as the available options.","The article frames CVE-2026-20230 as part of a recurring pattern in Unified CM, citing a prior hard-coded root SSH account and an unauthenticated RCE in related Cisco voice products."],"referencedReports":[{"title":"Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition Server-Side Request Forgery Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"The article links Cisco's security advisory for CVE-2026-20230 as the source for the patched Unified CM server-side request forgery flaw.","category":"","primary":false}],"body":"\u003cp\u003eCisco has patched CVE-2026-20230, a flaw in Unified Communications Manager and its Session Management Edition. The issue allows an unauthenticated attacker on the network to write files to the system and potentially escalate to root. Proof-of-concept exploit code is already public, although Cisco’s PSIRT says it has not seen attacks using the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is a server-side request forgery caused by improper validation of certain HTTP requests. Cisco gave the issue a CVSS base score of 8.6, but rated the advisory Critical because the file-write foothold can lead to full root privileges. The flaw only works when the WebDialer service is running, and WebDialer is disabled by default.\u003c/p\u003e\n\n\u003cp\u003eCisco says patching is the only real fix. Version 14 users should move to 14SU6, while version 15 users must use an interim COP patch or disable WebDialer until 15SU5 is released in September 2026. Administrators can check exposure by reviewing the Cisco WebDialer Web Service status in Cisco Unified Serviceability.\u003c/p\u003e\n"},{"n":9,"title":"New IronWorm malware hits 36 packages in npm supply-chain attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-ironworm-malware-hits-36-packages-in-npm-supply-chain-attack/","time":"15:25","priority":"SHOULD READ","score":88,"tldr":"A new npm supply-chain attack infected 36 packages with IronWorm, a Rust-based infostealer that targets developer and CI secrets and can self-propagate by using stolen npm publishing credentials. Researchers say it was caught early before spreading to more popular packages, but affected developers should update packages, rotate credentials, and enable 2FA.","briefOverview":"\u003cp\u003eA new npm supply-chain attack infected 36 packages with an infostealer called IronWorm. The malware targets 86 environment variables and 20 credential files that may contain OpenAI, AWS, Anthropic, npm, vault, SSH, and Exodus cryptocurrency wallet credentials. Ox Security said the attack was detected very early and stopped before it spread to more popular npm packages.\u003c/p\u003e\n\n\u003cp\u003eJFrog researchers said IronWorm is written in Rust, hides behind an eBPF kernel rootkit, and communicates with its operator over the Tor network. The malware can self-propagate by using stolen npm publishing credentials, including secrets associated with npm Trusted Publishing. Once a developer or CI environment is compromised, it can publish trojanized versions of packages owned by the victim and infect additional developers and CI systems.\u003c/p\u003e\n\n\u003cp\u003eThe attack reportedly began with a compromised npm account named “asteroiddao,” which published package versions containing a Rust ELF binary executed via “preinstall.” JFrog found similarities to Shai Hulud in commit names but did not identify a clear connection between the campaigns. Developers were advised to upgrade to fixed releases, rotate keys, and enable two-factor authentication for all accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new npm supply-chain attack infected 36 packages with IronWorm, an infostealer targeting developer and CI secrets. The malware looks for 86 environment variables and 20 credential files that may contain OpenAI, AWS, Anthropic, npm, vault, SSH, and Exodus cryptocurrency wallet data. The article describes the incident as an npm ecosystem compromise that can spread through package publishing workflows. Ox Security said the attack was detected early and stopped before reaching more popular npm packages.\u003c/p\u003e\n\n\u003cp\u003eAccording to JFrog, IronWorm is written in Rust, hides behind an eBPF kernel rootkit, and communicates with the operator over the Tor network. Its self-propagation depends on stolen credentials used to publish packages on npm, including secrets tied to npm’s Trusted Publishing workflow. After compromising a developer or CI environment, the malware can publish trojanized versions of packages owned by the victim. Those packages can then infect additional developers and CI systems.\u003c/p\u003e\n\n\u003cp\u003eJFrog said the latest attack started from a compromised account named “asteroiddao.” That account published package versions containing a Rust ELF binary executed through a “preinstall” script and pushed malicious commits into repositories. The commit author appeared as “claude,” and the timestamps were backdated by several years, up to 13 years in some cases, despite being pushed in recent days. The article says this backdating was likely intended to evade investigation.\u003c/p\u003e\n\n\u003cp\u003eThe article compares IronWorm conceptually to Shai Hulud, another npm supply-chain malware campaign whose code was recently published on GitHub. JFrog did not find a clear connection between IronWorm and Shai Hulud, but researchers observed the same commit names in both attacks. The article says this leaves open the possibility that IronWorm is an evolution of TeamPCP’s payload. JFrog characterized IronWorm as a custom, carefully built implant with its own infrastructure.\u003c/p\u003e\n\n\u003cp\u003eJFrog also identified a GitHub Actions-based mechanism that could deliver stolen secrets by serializing them into a single value, writing them to a harmless-looking file, and uploading that file as a build artifact. This would allow the actor to avoid an external command-and-control channel, but JFrog said the mechanism was not used in the analyzed IronWorm attack. Researchers also found that the operator hardcoded the recovery phrase of their own cryptocurrency wallet, which they said was only explainable as a way to prevent the malware from stealing it during testing. Endor Labs and StepSecurity separately observed a similar but distinct JavaScript-based malware named binding.gyp during the same timeframe.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA new npm supply-chain attack infected 36 packages with an infostealer called IronWorm. The malware targets developer and CI environments by looking for 86 environment variables and 20 credential files. The article says those targets may contain OpenAI, AWS, Anthropic, npm, vault configuration, SSH, and Exodus cryptocurrency wallet credentials.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because IronWorm can self-propagate through npm publishing workflows. According to JFrog, once it compromises a developer or CI environment, it can use stolen credentials to publish trojanized versions of packages owned by the victim. Those malicious package versions can then infect more developers and CI systems.\u003c/p\u003e\n\n\u003cp\u003eOx Security said the IronWorm attack was detected very early and stopped before it spread to more popular npm packages. The company provided a list of impacted package names and versions in its report and recommended upgrading to fixed releases, rotating keys, and enabling two-factor authentication for all accounts.\u003c/p\u003e\n\n\u003ch2 id=\"technical-characteristics\"\u003eTechnical Characteristics\u003c/h2\u003e\n\n\u003cp\u003eJFrog researchers said IronWorm is written in Rust. They also said it hides behind an eBPF kernel rootkit and communicates with the operator over the Tor network. The malware is delivered through npm packages and executed via a package installation mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the latest attack began from a compromised npm account named “asteroiddao.” That account published package versions containing a Rust ELF binary. The binary was executed through a “preinstall” script.\u003c/p\u003e\n\n\u003cp\u003eJFrog also observed malicious commits being pushed into repositories. The commit author appeared as “claude,” and the commit timestamps pointed to several years earlier, up to 13 years in some cases. The article says those commits were pushed in the past few days and that the timestamp manipulation was likely meant to evade investigation.\u003c/p\u003e\n\n\u003ch2 id=\"credential-theft-and-propagation\"\u003eCredential Theft and Propagation\u003c/h2\u003e\n\n\u003cp\u003eIronWorm targets secrets across environment variables and credential files. The targeted data may include credentials for OpenAI, AWS, Anthropic, npm, vault configuration files, SSH keys, and Exodus cryptocurrency wallet files. The article emphasizes that the malware’s targets are especially relevant to developer and CI environments.\u003c/p\u003e\n\n\u003cp\u003eThe malware self-propagates by using stolen credentials for publishing on npm. This includes secrets associated with npm’s Trusted Publishing workflow. After obtaining those credentials, IronWorm can publish trojanized versions of packages controlled by the compromised victim.\u003c/p\u003e\n\n\u003cp\u003eThis propagation pattern means a compromised developer or CI environment can become a source of further compromise. The article describes this as conceptually similar to Shai Hulud, another npm supply-chain malware campaign. However, JFrog did not find a clear connection between IronWorm and Shai Hulud.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-shai-hulud-and-teampcp\"\u003eRelationship to Shai Hulud and TeamPCP\u003c/h2\u003e\n\n\u003cp\u003eThe article compares IronWorm with Shai Hulud because both involve npm supply-chain compromise and self-propagating behavior. Shai Hulud had recently had its code published on GitHub. JFrog researchers observed the same commit names in both supply-chain attacks.\u003c/p\u003e\n\n\u003cp\u003eDespite those similarities, JFrog did not identify a clear connection between IronWorm and Shai Hulud. The article says the shared commit names leave open the possibility that IronWorm is an evolution of TeamPCP’s payload. At the same time, JFrog described IronWorm as “a custom, carefully built implant from an operation with its own infrastructure.”\u003c/p\u003e\n\n\u003ch2 id=\"github-actions-exfiltration-mechanism\"\u003eGitHub Actions Exfiltration Mechanism\u003c/h2\u003e\n\n\u003cp\u003eOne notable element in JFrog’s findings was a mechanism that relies on GitHub Actions to deliver stolen secrets. The malware can serialize secrets into a single value and write them to a file with a harmless-looking name, as if the file were lint or formatting output. The final step is uploading the file as a build artifact.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that anyone with access to the build artifact could download it. This mechanism would allow the threat actor to avoid using an external command-and-control server for that part of the operation. However, JFrog said this delivery mechanism was not used in the analyzed IronWorm supply-chain attack.\u003c/p\u003e\n\n\u003ch2 id=\"operator-testing-artifact\"\u003eOperator Testing Artifact\u003c/h2\u003e\n\n\u003cp\u003eJFrog found that the operator hardcoded the recovery phrase of their own cryptocurrency wallet. The researchers said the only reason for doing this was to prevent the malware from stealing that wallet during testing. The article presents this as a peculiarity discovered during the analysis.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommendations\"\u003eResponse and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eOx Security said the attack was caught very early. According to the article, the campaign was stopped before it spread to more popular npm packages. Ox Security provided impacted package names and versions in its report.\u003c/p\u003e\n\n\u003cp\u003eThe recommended actions were to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpgrade to fixed releases.\u003c/li\u003e\n\u003cli\u003eRotate keys.\u003c/li\u003e\n\u003cli\u003eEnable two-factor authentication for all accounts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-concurrent-activity\"\u003eRelated Concurrent Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article also mentions a similar but distinct attack observed by Endor Labs and StepSecurity. That activity involved JavaScript-based malware named binding.gyp. It performed registry poisoning and GitHub Actions infection during the same timeframe.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes this binding.gyp activity from IronWorm while noting the similarity in timing and behavior. It identifies Endor Labs and StepSecurity as the entities that spotted the related campaign.\u003c/p\u003e\n","keyPoints":["A new npm supply-chain attack infected 36 packages with IronWorm, an infostealer targeting 86 environment variables and 20 credential files that may contain OpenAI, AWS, Anthropic, npm, vault, SSH, and Exodus wallet credentials.","JFrog researchers said IronWorm is written in Rust, hides behind an eBPF kernel rootkit, communicates over the Tor network, and self-propagates by using stolen npm publishing credentials, including secrets tied to npm Trusted Publishing.","According to JFrog, the attack began from a compromised npm account named “asteroiddao,” which published package versions containing a Rust ELF binary executed via “preinstall” and pushed malicious commits into repositories.","JFrog found a GitHub Actions-based mechanism for exfiltrating serialized secrets as build artifacts, but said this delivery mechanism was not used in the analyzed IronWorm supply-chain attack.","Ox Security said the IronWorm attack was detected very early and stopped before it spread to more popular npm packages, and recommended developers upgrade to fixed releases, rotate keys, and enable two-factor authentication."],"insights":["IronWorm’s ability to steal secrets associated with npm Trusted Publishing shows that passwordless publishing workflows can still become propagation channels when developer or CI environments are compromised.","The malware’s optional GitHub Actions artifact-based exfiltration mechanism could let stolen secrets be retrieved without using an external command-and-control server, making artifact access controls and build output review especially important.","The malicious commits used the author name “claude” and backdated timestamps by several years, indicating that repository history anomalies may be part of the attacker’s evasion pattern.","The operator hardcoded their own cryptocurrency wallet recovery phrase to prevent the malware from stealing it during testing, suggesting the researchers found evidence of attacker-side operational testing artifacts.","IronWorm shared commit names with Shai Hulud but had no confirmed connection, highlighting that similar npm worm behaviors and indicators may appear across distinct campaigns."],"referencedReports":[{"title":"IronWorm: Shai-Hulud’s Rustier Cousin","url":"https://research.jfrog.com/post/iron-worm-shai-hulud-rustier-cousin/","publisher":"JFrog","context":"The article cites JFrog’s findings as the main technical source for IronWorm’s behavior, propagation, and GitHub Actions-related mechanisms.","category":"","primary":false},{"title":"IronWorm Supply Chain Malware Hits npm","url":"http://www.ox.security/blog/ironworm-supply-chain-malware-hits-npm/","publisher":"Ox Security","context":"The article says Ox Security reported that the IronWorm attack was detected early and provides impacted package names and recommended mitigations.","category":"","primary":false},{"title":"Malicious Payload in ai-sdk-ollama npm Package","url":"https://www.endorlabs.com/learn/malicious-payload-in-ai-sdk-ollama-npm-package","publisher":"Endor Labs","context":"The article references Endor Labs as identifying a similar but distinct JavaScript-based npm supply-chain attack during the same timeframe.","category":"","primary":false},{"title":"binding.gyp npm Supply Chain Attack Spreads Like Worm","url":"https://www.stepsecurity.io/blog/binding-gyp-npm-supply-chain-attack-spreads-like-worm","publisher":"StepSecurity","context":"The article references StepSecurity as identifying a similar but distinct binding.gyp npm supply-chain attack involving registry poisoning and GitHub Actions infection.","category":"","primary":false}],"body":"\u003cp\u003eA new npm supply-chain attack infected 36 packages with an infostealer called IronWorm. The malware targets 86 environment variables and 20 credential files that may contain OpenAI, AWS, Anthropic, npm, vault, SSH, and Exodus cryptocurrency wallet credentials. Ox Security said the attack was detected very early and stopped before it spread to more popular npm packages.\u003c/p\u003e\n\n\u003cp\u003eJFrog researchers said IronWorm is written in Rust, hides behind an eBPF kernel rootkit, and communicates with its operator over the Tor network. The malware can self-propagate by using stolen npm publishing credentials, including secrets associated with npm Trusted Publishing. Once a developer or CI environment is compromised, it can publish trojanized versions of packages owned by the victim and infect additional developers and CI systems.\u003c/p\u003e\n\n\u003cp\u003eThe attack reportedly began with a compromised npm account named “asteroiddao,” which published package versions containing a Rust ELF binary executed via “preinstall.” JFrog found similarities to Shai Hulud in commit names but did not identify a clear connection between the campaigns. Developers were advised to upgrade to fixed releases, rotate keys, and enable two-factor authentication for all accounts.\u003c/p\u003e\n"},{"n":18,"title":"Claude Code GitHub Action Flaw Let One Malicious Issue Hijack Repositories","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/claude-code-github-action-flaw-let-one.html","time":"15:15","priority":"SHOULD READ","score":88,"tldr":"A flaw in Anthropic’s Claude Code GitHub Action let a malicious GitHub issue from an attacker-controlled bot trigger Claude, exfiltrate workflow credentials via prompt injection, and potentially gain write access to vulnerable repositories. Anthropic patched the issue in v1.0.94, and users should update and restrict untrusted workflow triggers and permissions.","briefOverview":"\u003cp\u003eA security researcher found a flaw in Anthropic’s Claude Code GitHub Action that could let an attacker take over vulnerable public repositories running the action by opening a single GitHub issue. Because Anthropic’s own action repository used the same workflow, a working attack could have pushed malicious code into the action itself and affected downstream projects that pulled it. Anthropic fixed the core bypass within four days of the January report and later included the fixes in claude-code-action v1.0.94.\u003c/p\u003e\n\n\u003cp\u003eThe issue centered on a trigger check that trusted any actor whose name ended in “[bot],” assuming GitHub Apps were trusted. The article explains that anyone can register a GitHub App, install it on a repository they own, and use its token to open an issue or pull request on any public repository. In agent mode, this allowed attacker-controlled content to reach Claude, where indirect prompt injection could be used to make Claude run commands and expose sensitive environment variables.\u003c/p\u003e\n\n\u003cp\u003eThe most important exposed values were credentials GitHub Actions uses to request an OIDC token, which could then be exchanged through Anthropic’s backend for a Claude GitHub App installation token with write access. The article also notes related risks from permissive example workflows, public workflow summaries, and issue edits after a trusted user has triggered the workflow. It recommends updating to claude-code-action v1.0.94 or later and auditing workflows that allow non-write users or bots to trigger Claude.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRyotaK of GMO Flatt Security reported a flaw in Anthropic’s Claude Code GitHub Action that could let an attacker compromise vulnerable public repositories with a single opened GitHub issue. Anthropic fixed the core bypass within four days after the January report and continued hardening the action through the spring. The fixes are included in claude-code-action v1.0.94, and Anthropic rated the issues 7.8 under CVSS v4.0 and paid a bug bounty.\u003c/p\u003e\n\n\u003cp\u003eClaude Code GitHub Actions integrates Claude into CI/CD pipelines for tasks such as triaging issues, adding labels, reviewing pull requests, and running slash commands. By default, the workflow receives read and write access to code, issues, pull requests, discussions, and workflow files. Because those permissions are broad, the action is intended to allow only users with write access to trigger it.\u003c/p\u003e\n\n\u003cp\u003eThe flawed trigger check allowed any actor whose name ended in “[bot],” based on the assumption that GitHub Apps are trusted. The article explains that anyone can register a GitHub App, install it on a repository they own, and use its token to open an issue or pull request on any public repository. Tag mode had an additional check to confirm the actor was a real human, but agent mode did not, leaving that mode open.\u003c/p\u003e\n\n\u003cp\u003eAfter reaching Claude, the attacker could use indirect prompt injection by placing instructions in issue content that Claude would read. RyotaK created an issue body that resembled an error message and refined the prompt until Claude would run commands embedded in it. The target was /proc/self/environ, which contains process environment variables, and the article says RyotaK bypassed Claude Code’s guard and got Claude to write the values back into the issue.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the most valuable exposed data as the credential pair GitHub Actions uses to request an OIDC token. Claude Code exchanges that token with Anthropic’s backend for a Claude GitHub App installation token with write access. If stolen and replayed, the token exchange could give an attacker write access to the target’s code, issues, and workflows, and targeting Anthropic’s own action repository could have poisoned downstream users of the action.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes other risky paths, including an example issue-triage workflow using allowed_non_write_users: “*”, public workflow run summaries that could leak data, and editing a trusted user’s issue after a workflow starts but before Claude reads it. It notes that a related AI issue-triager pattern had already caused a real supply-chain incident involving Cline’s claude-code-action triage workflow and an unauthorized cline@2.3.0 package. The recommended response is to update to claude-code-action v1.0.94 or later and audit workflows that allow non-write users or bots to trigger Claude.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA security researcher found a flaw in Anthropic’s Claude Code GitHub Action that allowed an attacker to target vulnerable public repositories running the action with only a single opened GitHub issue. The article says the risk was especially significant because Anthropic’s own action repository used the same workflow. A successful attack against that repository could have pushed malicious code into the action itself and affected downstream projects that pulled it.\u003c/p\u003e\n\n\u003cp\u003eRyotaK of GMO Flatt Security reported the core bypass to Anthropic in January. Anthropic fixed it within four days and continued hardening the action through the spring. The fixes are included in claude-code-action v1.0.94, and Anthropic rated the issues 7.8 under CVSS v4.0 and paid a bug bounty.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product-and-workflow-context\"\u003eAffected Product and Workflow Context\u003c/h2\u003e\n\n\u003cp\u003eClaude Code GitHub Actions places Claude inside CI/CD pipelines. The article describes its uses as triaging issues, applying labels, reviewing pull requests, and running slash commands. By default, the workflow receives read and write access to a repository’s code, issues, pull requests, discussions, and workflow files.\u003c/p\u003e\n\n\u003cp\u003eBecause those permissions are broad, the action is supposed to restrict who can trigger it. The intended rule is that only users with write access should be able to trigger the action. The flaw was in how that trigger decision was made.\u003c/p\u003e\n\n\u003ch2 id=\"trigger-check-weakness\"\u003eTrigger Check Weakness\u003c/h2\u003e\n\n\u003cp\u003eThe trigger check allowed any actor whose name ended in “[bot].” This was based on the assumption that GitHub Apps are trusted because administrators install them. The article points out the problem with that assumption: anyone can register a GitHub App, install it on a repository they own, and use its token to open an issue or pull request on any public repository.\u003c/p\u003e\n\n\u003cp\u003eAs a result, the action saw activity from “a bot” and allowed attacker-controlled content through. The article notes that tag mode had an extra check to confirm the actor was a real human. Agent mode did not have that extra check, which left it exposed.\u003c/p\u003e\n\n\u003ch2 id=\"prompt-injection-path\"\u003ePrompt Injection Path\u003c/h2\u003e\n\n\u003cp\u003eOnce the attacker’s content reached Claude, the attack relied on indirect prompt injection. The article describes this as planting instructions inside content an AI reads so that the model follows those instructions instead of its actual task. RyotaK wrote an issue whose body looked like an error message and refined the prompt until Claude would “recover” by running commands embedded in it.\u003c/p\u003e\n\n\u003cp\u003eThe target was \u003ccode\u003e/proc/self/environ\u003c/code\u003e, the Linux file that contains a process’s environment variables. The article says those variables can include secrets. Claude Code blocks naive reads of that file, but RyotaK bypassed the guard and got Claude to write the values back into the issue, where the attacker could collect them.\u003c/p\u003e\n\n\u003ch2 id=\"credential-impact\"\u003eCredential Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the most valuable exposed data as the credential pair GitHub Actions uses to request an OIDC token. That token proves that a specific workflow is running in a specific repository. Claude Code exchanges that token with Anthropic’s backend for a Claude GitHub App installation token with write access.\u003c/p\u003e\n\n\u003cp\u003eIf an attacker stole those credentials and replayed the exchange, the attacker could obtain write access to the target’s code, issues, and workflows. The article states that if the same path were aimed at the claude-code-action repository itself, it could poison the action that downstream projects use.\u003c/p\u003e\n\n\u003ch2 id=\"additional-risky-paths\"\u003eAdditional Risky Paths\u003c/h2\u003e\n\n\u003cp\u003eRyotaK also reported a less direct route that did not rely on the bot bypass. Anthropic’s own example issue-triage workflow included \u003ccode\u003eallowed_non_write_users: \u0026quot;*\u0026quot;\u003c/code\u003e, which allows anyone to trigger it. The article notes that Anthropic’s documentation already flagged that setting as risky.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Claude posted task summaries to the workflow run’s publicly visible summary panel. That created a way to leak data out. Repositories that copied the example workflow could inherit the same risk.\u003c/p\u003e\n\n\u003cp\u003eAnother path involved an attacker who could edit issues but could not trigger Claude directly. In that case, the attacker could edit a trusted user’s issue after it had fired the workflow but before Claude read it. The payload would then enter the workflow as “trusted” input.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommended-actions\"\u003eResponse and Recommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends updating to claude-code-action v1.0.94 or later. It also recommends auditing any workflow that allows users without write access, or bots, to trigger Claude. If a workflow takes untrusted input, the article says not to feed it any secret beyond the Anthropic API key and \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends removing tools and permissions that can be used for exfiltration. This recommendation is tied to the broader issue that an agent with real tools and real tokens can be pushed as far as its permissions allow.\u003c/p\u003e\n\n\u003ch2 id=\"related-incidents-and-activity-mentioned\"\u003eRelated Incidents and Activity Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article states that a similar pattern has already caused a real supply-chain incident. In February, a prompt-injected issue title against Cline’s claude-code-action triage workflow let attackers steal an npm publish token and push an unauthorized \u003ccode\u003ecline@2.3.0\u003c/code\u003e. The rogue version force-installed a separate, non-malicious AI agent and was pulled about eight hours later, but the article says the same chain could have shipped real malware to users who updated.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes activity by an autonomous bot called “HackerBot-Claw.” In late February, it probed GitHub Actions misconfigurations at Microsoft, Datadog, CNCF projects, and others. When it tried to prompt-inject a Claude-based reviewer through a poisoned config file, Claude caught it and refused.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eThe article says there is no public sign that the exact path involving poisoning Anthropic’s own action was used against a live target. RyotaK proved that path only in his own test repositories. The article distinguishes that proof from the related variants that were exploited.\u003c/p\u003e\n\n\u003ch2 id=\"broader-takeaway-in-the-article\"\u003eBroader Takeaway in the Article\u003c/h2\u003e\n\n\u003cp\u003eRyotaK says he has reported around 50 separate ways to bypass Claude Code’s permission system and run commands. The article frames this as part of a steady run of prompt-injection flaws in AI coding agents. It concludes that prompt injection is still not solved, and that an agent with real tools and real tokens can be pushed as far as its permissions permit.\u003c/p\u003e\n","keyPoints":["A flaw in Anthropic's Claude Code GitHub Action allowed an attacker to take over vulnerable public repositories running it by opening a single GitHub issue.","The trigger check trusted any actor whose name ended in “[bot],” even though anyone can create a GitHub App and use it to open issues or pull requests on public repositories.","RyotaK used indirect prompt injection to get Claude to expose environment variables, including credentials used by GitHub Actions to request an OIDC token.","Anthropic fixed the core issue within four days of the January report, continued hardening the action through the spring, and included the fixes in claude-code-action v1.0.94.","The article recommends updating to claude-code-action v1.0.94 or later and auditing workflows that allow users without write access or bots to trigger Claude."],"insights":["The supply-chain risk extended beyond individual repositories because Anthropic’s own claude-code-action repository used the vulnerable workflow, meaning a successful compromise there could have poisoned the action consumed by downstream projects.","The flawed trust model treated GitHub App activity as inherently safe, but the article notes that anyone can register a GitHub App and use it to interact with public repositories.","Public workflow run summaries created an additional exfiltration path because Claude was posting task summaries there, allowing copied example workflows with permissive settings to leak data.","Even users who cannot directly trigger Claude may still inject payloads by editing a trusted user’s issue after the workflow starts but before Claude reads it.","The article highlights that restricting who can trigger an AI workflow is insufficient if the workflow still gives the agent broad tools, repository permissions, and access to secrets that can be exposed through prompt injection."],"referencedReports":[{"title":"Poisoning Claude Code: One GitHub Issue to Break the Supply Chain","url":"https://flatt.tech/research/posts/poisoning-claude-code-one-github-issue-to-break-the-supply-chain/","publisher":"GMO Flatt Security","context":"The article cites RyotaK of GMO Flatt Security as reporting the core bypass to Anthropic and links to the technical write-up describing the issue.","category":"","primary":false}],"body":"\u003cp\u003eA security researcher found a flaw in Anthropic’s Claude Code GitHub Action that could let an attacker take over vulnerable public repositories running the action by opening a single GitHub issue. Because Anthropic’s own action repository used the same workflow, a working attack could have pushed malicious code into the action itself and affected downstream projects that pulled it. Anthropic fixed the core bypass within four days of the January report and later included the fixes in claude-code-action v1.0.94.\u003c/p\u003e\n\n\u003cp\u003eThe issue centered on a trigger check that trusted any actor whose name ended in “[bot],” assuming GitHub Apps were trusted. The article explains that anyone can register a GitHub App, install it on a repository they own, and use its token to open an issue or pull request on any public repository. In agent mode, this allowed attacker-controlled content to reach Claude, where indirect prompt injection could be used to make Claude run commands and expose sensitive environment variables.\u003c/p\u003e\n\n\u003cp\u003eThe most important exposed values were credentials GitHub Actions uses to request an OIDC token, which could then be exchanged through Anthropic’s backend for a Claude GitHub App installation token with write access. The article also notes related risks from permissive example workflows, public workflow summaries, and issue edits after a trusted user has triggered the workflow. It recommends updating to claude-code-action v1.0.94 or later and auditing workflows that allow non-write users or bots to trigger Claude.\u003c/p\u003e\n"},{"n":6,"title":"DentaQuest data breach  exposed info of 2.6 million accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/dentaquest-data-breach-exposed-info-of-26-million-accounts/","time":"18:36","priority":"SHOULD READ","score":86,"tldr":"DentaQuest confirmed unauthorized access to part of its network after ShinyHunters leaked stolen data, with Have I Been Pwned finding records for 2.6 million accounts exposed. The leaked information includes names, emails, phone numbers, government IDs, health insurance details, genders, and dates of birth, raising phishing and identity theft risks.","briefOverview":"\u003cp\u003eDentaQuest, a dental benefits administrator that is part of Sun Life, confirmed unauthorized access to a limited portion of its network. The incident was publicly associated with ShinyHunters, which listed the company on its data leak site and claimed to have stolen more than 234 GB of data.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked information and found records for 2.6 million accounts. The exposed data included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest said the incident caused limited disruption in customer service and that its systems remained fully operational. The company also said it engaged external experts to help investigate the incident and determine what data was compromised.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDentaQuest, one of the largest dental benefits administrators in the United States and part of Sun Life, reported a cybersecurity incident involving unauthorized access to a limited portion of its network. The company serves 35 million customers, operates programs in 50 states, and has a network of 140,000 dentists and dental specialists. It manages dental insurance plans and provider networks for Medicaid programs, Medicare Advantage plans, employers, health plans, and individual customers.\u003c/p\u003e\n\n\u003cp\u003eThe incident came to light after the extortion group ShinyHunters listed DentaQuest on its data leak site. The group claimed to have stolen more than 234 GB of data and later publicly leaked the data after what it described as a failure to reach an agreement with the company.\u003c/p\u003e\n\n\u003cp\u003eOn June 2, DentaQuest confirmed on its website that its networks had been breached. The company said it took immediate action after discovering the incident to secure its environment, contain the attack, and mitigate the threat. It also said its systems remained fully operational and that it continued to serve clients with limited disruption.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked dataset and found that it contained records for 2.6 million accounts. The exposed information included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth. Have I Been Pwned also stated that roughly 66% of the exposed records were already present in its database from past incidents affecting other organizations and services.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest’s statement did not confirm that the breach affected its clients, but the article notes that Have I Been Pwned is known to validate leaked datasets using multiple verification methods. People whose information may have been exposed were advised to be cautious about incoming communications because the leaked data increases the risk of social engineering and phishing attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDentaQuest, a dental benefits administrator that is part of Sun Life, confirmed a cybersecurity incident involving unauthorized access to a limited portion of its network. The incident reportedly exposed sensitive data associated with 2.6 million accounts, according to an analysis by Have I Been Pwned.\u003c/p\u003e\n\n\u003cp\u003eThe breach was linked in the article to ShinyHunters, an extortion group that listed DentaQuest on its data leak site. The group claimed to have stolen more than 234 GB of data and later publicly leaked the information after what it described as a failure to reach an agreement with the company.\u003c/p\u003e\n\n\u003ch2 id=\"dentaquest-context\"\u003eDentaQuest context\u003c/h2\u003e\n\n\u003cp\u003eDentaQuest is described as one of the largest dental benefits administrators in the United States. It manages dental insurance plans and provider networks for Medicaid programs, Medicare Advantage plans, employers, health plans, and individual customers.\u003c/p\u003e\n\n\u003cp\u003eThe company says it serves 35 million customers, operates programs in 50 states, and has a network of 140,000 dentists and dental specialists.\u003c/p\u003e\n\n\u003ch2 id=\"incident-disclosure-and-company-response\"\u003eIncident disclosure and company response\u003c/h2\u003e\n\n\u003cp\u003eOn June 2, DentaQuest confirmed on its website that its networks had been breached. The company described the incident as unauthorized access to a limited portion of its network and said the event caused limited disruption in customer service.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest said that upon discovering the initial incident, it took immediate action to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecure its environment.\u003c/li\u003e\n\u003cli\u003eContain the attack.\u003c/li\u003e\n\u003cli\u003eMitigate the threat.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company also stated that its systems remained fully operational and that it continued serving clients with limited disruption. DentaQuest said it engaged external experts to assist with the investigation and determine what data was compromised.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-claim-and-data-leak\"\u003eThreat actor claim and data leak\u003c/h2\u003e\n\n\u003cp\u003eThe article says the incident came to light after ShinyHunters listed DentaQuest on its data leak site. ShinyHunters claimed to have stolen more than 234 GB of data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the data was publicly leaked after what the threat actor described as a failure to reach an agreement with the company.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-data-identified-by-have-i-been-pwned\"\u003eExposed data identified by Have I Been Pwned\u003c/h2\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked information and found records for 2.6 million accounts. The dataset reportedly included the following types of exposed information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmail addresses.\u003c/li\u003e\n\u003cli\u003eFull names.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eGovernment-issued IDs.\u003c/li\u003e\n\u003cli\u003eHealth insurance information.\u003c/li\u003e\n\u003cli\u003eGenders.\u003c/li\u003e\n\u003cli\u003eDates of birth.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that DentaQuest’s public statement did not confirm that the breach affected its clients. However, it also notes that Have I Been Pwned is known to validate leaked datasets using multiple verification methods.\u003c/p\u003e\n\n\u003ch2 id=\"additional-exposure-context\"\u003eAdditional exposure context\u003c/h2\u003e\n\n\u003cp\u003eHave I Been Pwned also stated that roughly 66% of the exposed records were already present in its database from past incidents affecting other organizations and services. This indicates that many of the records in the DentaQuest dataset overlapped with information previously seen by Have I Been Pwned in other breaches.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-risk-to-individuals\"\u003eDisclosed impact and risk to individuals\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the main risk to potentially affected people as increased exposure to social engineering and phishing attacks. It advises people who may have had their information exposed to be cautious about all incoming communications.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed data types include both contact information and sensitive personal or health-related details, including government-issued IDs and health insurance information. The article does not state that DentaQuest confirmed client data exposure, but it reports that Have I Been Pwned found 2.6 million account records in the leaked dataset.\u003c/p\u003e\n","keyPoints":["DentaQuest confirmed that its networks were breached through unauthorized access to a limited portion of its network.","The ShinyHunters extortion group claimed to have stolen more than 234 GB of DentaQuest data and later publicly leaked it after failing to reach an agreement with the company.","Have I Been Pwned analyzed the leaked dataset and found that it contained records for 2.6 million accounts.","The exposed data included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth.","DentaQuest said its systems remain fully operational and that it engaged external experts to investigate the incident and determine what data was compromised."],"insights":["The exposed dataset is especially useful for targeted social engineering because it combines contact details with government-issued IDs, health insurance information, genders, and dates of birth.","Roughly 66% of the exposed records were already present in Have I Been Pwned from previous incidents, indicating many affected people may face compounded exposure across multiple breaches.","Although DentaQuest described the intrusion as involving a limited portion of its network, Have I Been Pwned found records for 2.6 million accounts in the leaked data.","DentaQuest had not confirmed client data exposure in its statement, but Have I Been Pwned independently analyzed and listed the leaked dataset after validation."],"referencedReports":[{"title":"DentaQuest","url":"https://haveibeenpwned.com/Breach/DentaQuest","publisher":"Have I Been Pwned","context":"The article cites Have I Been Pwned's analysis of the leaked DentaQuest dataset, which found records for 2.6 million accounts and identified the exposed data types.","category":"","primary":false}],"body":"\u003cp\u003eDentaQuest, a dental benefits administrator that is part of Sun Life, confirmed unauthorized access to a limited portion of its network. The incident was publicly associated with ShinyHunters, which listed the company on its data leak site and claimed to have stolen more than 234 GB of data.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked information and found records for 2.6 million accounts. The exposed data included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest said the incident caused limited disruption in customer service and that its systems remained fully operational. The company also said it engaged external experts to help investigate the incident and determine what data was compromised.\u003c/p\u003e\n"},{"n":7,"title":"Credit card theft campaign abuses Stripe to host stolen payment info","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/credit-card-theft-campaign-abuses-stripe-to-host-stolen-payment-info/","time":"20:47","priority":"SHOULD READ","score":86,"tldr":"A new Magecart credit card skimming campaign is abusing trusted Google Tag Manager and Stripe API infrastructure to load malicious code on checkout pages and store stolen payment data as fake Stripe customer records. Because the traffic goes through commonly allowed domains, the skimmer can bypass many content security and network filtering controls.","briefOverview":"\u003cp\u003eA new Magecart campaign is abusing Stripe’s API infrastructure to host both a credit card-stealing payload and stolen checkout data. Sansec discovered the malware family and reported that it is loaded through legitimate-looking Google Tag Manager containers. The activity relies on trusted domains, including googletagmanager.com and api.stripe.com, that online stores commonly allow.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer targets Magento and Adobe Commerce checkout pages and attempts to capture credit card numbers, expiration dates, CVV codes, customer names, billing and email addresses, and phone numbers. The malicious code reads JavaScript from metadata fields in a Stripe customer record, reassembles it, and executes it using new Function(). Stolen data is obfuscated with XOR, stored locally, and later uploaded into fake Stripe customer records.\u003c/p\u003e\n\n\u003cp\u003eSansec also found a variant that uses Google Firestore instead of Stripe to retrieve the payload. In that version, the payload comes from a Firestore document named tracking/captcha in a project called braintree-payment-app, with stolen data stored under a different localStorage key. The article says the Stripe customer record containing the skimmer was created on December 24, 2025, suggesting the operation may have been active since at least then.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new Magecart campaign is using trusted web infrastructure to steal credit card data from ecommerce checkout pages. According to Sansec, the campaign abuses Google Tag Manager to load malicious code and Stripe’s API infrastructure to host both the skimmer payload and the exfiltrated payment data. The article says the activity relies on googletagmanager.com and api.stripe.com, domains that online stores commonly trust and allow.\u003c/p\u003e\n\n\u003cp\u003eSansec found that the malicious code is embedded in legitimate-looking Google Tag Manager containers and executes on every page that loads them. When a shopper reaches a checkout page, the code queries Stripe’s API for a specific customer record, identified in the article as cus_TfFjAAZQNOYENR. It reads JavaScript code from the record’s metadata fields, reassembles it, and executes it using new Function().\u003c/p\u003e\n\n\u003cp\u003eThe skimmer targets Magento and Adobe Commerce checkout pages. It attempts to collect credit card numbers, expiration dates, CVV codes, customer names, billing and email addresses, and phone numbers. The stolen data is concatenated into a single string, obfuscated using XOR, and stored locally rather than being immediately sent out.\u003c/p\u003e\n\n\u003cp\u003eA separate routine retrieves the locally stored data after page load and then every minute. It splits the data blob in half, creates a new Stripe customer object, and stores the stolen data in metadata fields. The article says every stolen payment card becomes a fake customer record in the attacker’s Stripe account, turning Stripe into a storage backend for stolen data.\u003c/p\u003e\n\n\u003cp\u003eSansec also discovered a related variant that uses Google Firestore instead of Stripe. That version retrieves the payload from a Firestore document named tracking/captcha in a project called braintree-payment-app and stores stolen data in a localStorage key named _d_data\u003cem\u003ecustomer\u003c/em\u003e. The article notes that these names help the malware blend in with legitimate payment and bot-protection traffic.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor beyond describing the activity as a Magecart campaign. It says the Stripe customer record containing the skimmer was created on December 24, 2025, suggesting the operation may have been active since at least that date. It also states that customers can reduce risk by using one-time virtual cards with set limits.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA new Magecart campaign is abusing trusted third-party services to steal payment card data from ecommerce checkout pages. The article reports that the campaign uses Google Tag Manager to load malicious code and Stripe’s API infrastructure to host both the credit card-stealing payload and the stolen data. Sansec, an ecommerce security company, discovered the malware family.\u003c/p\u003e\n\n\u003cp\u003eThe campaign relies on two domains that are commonly trusted by online stores: googletagmanager.com and api.stripe.com. Sansec says this trust allows the skimmer to slip past Content Security Policy rules and network filters that would otherwise flag traffic to an unknown skimmer domain.\u003c/p\u003e\n\n\u003ch2 id=\"core-technique\"\u003eCore Technique\u003c/h2\u003e\n\n\u003cp\u003eThe malicious code is embedded in legitimate-looking Google Tag Manager containers. Google Tag Manager is described in the article as a management system that allows website owners to add and manage scripts for analytics, ads, and tracking without modifying a site’s source code.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, the code executes on every page that loads the compromised or malicious GTM container. When a shopper reaches a checkout page, the code queries Stripe’s API for a specific customer record, identified in the article as \u003ccode\u003ecus_TfFjAAZQNOYENR\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer then reads JavaScript code from metadata fields in that Stripe customer record. It reassembles the code and executes it using \u003ccode\u003enew Function()\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-platforms-and-stolen-data\"\u003eTargeted Platforms and Stolen Data\u003c/h2\u003e\n\n\u003cp\u003eThe card skimmer targets Magento and Adobe Commerce checkout pages. It attempts to capture payment and customer information entered during checkout.\u003c/p\u003e\n\n\u003cp\u003eThe article lists the targeted data as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredit card number\u003c/li\u003e\n\u003cli\u003eExpiration date\u003c/li\u003e\n\u003cli\u003eCVV code\u003c/li\u003e\n\u003cli\u003eCustomer name\u003c/li\u003e\n\u003cli\u003eBilling address\u003c/li\u003e\n\u003cli\u003eEmail address\u003c/li\u003e\n\u003cli\u003ePhone number\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"data-handling-and-exfiltration\"\u003eData Handling and Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe stolen data is not immediately exfiltrated. Instead, it is concatenated into a single string, obfuscated using the XOR operation, and stored locally.\u003c/p\u003e\n\n\u003cp\u003eA separate routine retrieves the data after page load and then every minute after that. This routine splits the data blob in half, creates a new Stripe customer object, and stores the stolen information in metadata fields.\u003c/p\u003e\n\n\u003cp\u003eThe article says every stolen payment card becomes a fake customer record in the attacker’s Stripe account. In this way, Stripe is used as a storage backend for stolen data.\u003c/p\u003e\n\n\u003cp\u003eAfter the data is copied, the local file is wiped. The article says this is done to eliminate traces of the attack and prevent duplicate uploads.\u003c/p\u003e\n\n\u003ch2 id=\"firestore-variant\"\u003eFirestore Variant\u003c/h2\u003e\n\n\u003cp\u003eSansec also found a variant of the campaign that uses Google Firestore instead of Stripe. Google Firestore is described as a cloud database service for data storage and real-time retrieval.\u003c/p\u003e\n\n\u003cp\u003eIn the Firestore version, the payload is retrieved from a document named \u003ccode\u003etracking/captcha\u003c/code\u003e in a project called \u003ccode\u003ebraintree-payment-app\u003c/code\u003e. The stolen data is stored in a different localStorage key, \u003ccode\u003e_d_data_customer_\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the names of the document and project help the malware blend in with legitimate payment and bot-protection traffic.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-attribution\"\u003eTimeline and Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the activity as a Magecart campaign but does not identify a specific named threat actor or group. It says the Stripe customer record containing the skimmer was reportedly created on December 24, 2025.\u003c/p\u003e\n\n\u003cp\u003eThat creation date suggests the operation may have been active since at least December 24, 2025.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe notable aspect of the campaign is its use of trusted service domains for both payload delivery and stolen data storage. The article emphasizes that online stores commonly allow Stripe and Google Tag Manager domains by default.\u003c/p\u003e\n\n\u003cp\u003eBy using \u003ccode\u003eapi.stripe.com\u003c/code\u003e and \u003ccode\u003egoogletagmanager.com\u003c/code\u003e, the campaign can avoid controls that focus on detecting traffic to unknown skimmer infrastructure. Sansec specifically notes that this can help the skimmer bypass Content Security Policy rules and network filters.\u003c/p\u003e\n\n\u003ch2 id=\"customer-protection-mentioned\"\u003eCustomer Protection Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article states that customers can protect themselves from such risks by using one-time virtual cards with set limits.\u003c/p\u003e\n","keyPoints":["Sansec discovered a new Magecart campaign that uses Google Tag Manager to load malicious code and Stripe's API infrastructure to host both the credit card-stealing payload and exfiltrated data.","The skimmer targets Magento and Adobe Commerce checkout pages to capture payment card details, customer names, billing and email addresses, and phone numbers.","The malicious code retrieves JavaScript from metadata fields in a Stripe customer record, reassembles it, and executes it using new Function().","Stolen payment data is obfuscated with XOR, stored locally, and later uploaded by creating fake Stripe customer records with the data placed in metadata fields.","Sansec also found a variant that retrieves its payload from a Google Firestore document named tracking/captcha in a project called braintree-payment-app."],"insights":["The campaign is designed to exploit implicit trust in googletagmanager.com and api.stripe.com, allowing skimming traffic to evade Content Security Policy rules and network filters that would flag unknown domains.","Stripe is abused not only to deliver the skimmer but also as a storage backend, with each stolen payment card represented as a fake customer record in the attacker’s Stripe account.","The skimmer delays exfiltration by storing stolen data locally and uploading it through a separate routine after page load and every minute thereafter, then wiping the local file to reduce traces and avoid duplicate uploads.","A Firestore variant uses names such as tracking/captcha and braintree-payment-app to blend the malicious activity with legitimate payment and bot-protection traffic."],"referencedReports":[],"body":"\u003cp\u003eA new Magecart campaign is abusing Stripe’s API infrastructure to host both a credit card-stealing payload and stolen checkout data. Sansec discovered the malware family and reported that it is loaded through legitimate-looking Google Tag Manager containers. The activity relies on trusted domains, including googletagmanager.com and api.stripe.com, that online stores commonly allow.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer targets Magento and Adobe Commerce checkout pages and attempts to capture credit card numbers, expiration dates, CVV codes, customer names, billing and email addresses, and phone numbers. The malicious code reads JavaScript from metadata fields in a Stripe customer record, reassembles it, and executes it using new Function(). Stolen data is obfuscated with XOR, stored locally, and later uploaded into fake Stripe customer records.\u003c/p\u003e\n\n\u003cp\u003eSansec also found a variant that uses Google Firestore instead of Stripe to retrieve the payload. In that version, the payload comes from a Firestore document named tracking/captcha in a project called braintree-payment-app, with stolen data stored under a different localStorage key. The article says the Stripe customer record containing the skimmer was created on December 24, 2025, suggesting the operation may have been active since at least then.\u003c/p\u003e\n"},{"n":8,"title":"UN food agency discloses breach affecting 600,000 Gaza households","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/un-world-food-programme-breach-affects-600-000-gaza-households/","time":"16:38","priority":"SHOULD READ","score":85,"tldr":"The UN World Food Programme says its Gaza self-registration platform was breached, exposing names, ID numbers, phone numbers, and location details for people in about 600,000 Palestinian households. WFP has temporarily suspended the platform, says aid will continue, and warned beneficiaries to watch for scams.","briefOverview":"\u003cp\u003eThe United Nations World Food Programme disclosed that its self-registration application for Palestine was breached. The application was used for assistance registration in Gaza. According to the WFP, attackers accessed personal data belonging to beneficiaries across the Gaza Strip.\u003c/p\u003e\n\n\u003cp\u003eThe exposed information included names, ID numbers, phone numbers, and location information such as neighborhood data recorded during registration. The WFP told The New Humanitarian that attackers breached its systems on May 14 and stole information related to roughly 600,000 Palestinian households in Gaza. The organization temporarily suspended the registration platform to implement urgent security and system protection improvements.\u003c/p\u003e\n\n\u003cp\u003eWFP said beneficiaries do not need to update, delete, or re-register their information, and that food, cash, and other assistance will continue as normal. It also warned Palestinian beneficiaries to be wary of anyone claiming to represent the WFP and requesting information or money. The article notes that this incident follows several other recent cybersecurity incidents involving United Nations entities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe United Nations World Food Programme revealed that its self-registration application for Palestine was breached. The application was used for assistance registration in Gaza. WFP disclosed the incident in a Sunday Telegram message and said the platform had been temporarily suspended.\u003c/p\u003e\n\n\u003cp\u003eDuring the breach, attackers gained access to personal data belonging to beneficiaries across the Gaza Strip. The exposed information included names, ID numbers, phone numbers, and location information, including neighborhood data recorded during registration. The article does not identify the attackers.\u003c/p\u003e\n\n\u003cp\u003eWFP has not publicly disclosed the total number of affected individuals. However, it told The New Humanitarian that attackers breached its systems on May 14 and stole information of people in roughly 600,000 Palestinian households in Gaza. The registration platform remained temporarily down as of a Tuesday update while WFP continued strengthening security measures.\u003c/p\u003e\n\n\u003cp\u003eThe organization told already registered beneficiaries that they do not need to update, delete, or re-register their information. WFP said registered people will remain part of its assistance programs and that food, cash, and other assistance will continue as normal. It said it is investigating the incident and continuously monitoring the situation.\u003c/p\u003e\n\n\u003cp\u003eWFP also warned Palestinian beneficiaries to be wary of anyone claiming to represent the organization and asking for information or money. It advised people not to click or open suspicious links or messages. BleepingComputer said a WFP spokesperson was not available for comment when contacted for more details.\u003c/p\u003e\n\n\u003cp\u003eThe article places the incident in the broader context of prior cybersecurity incidents affecting United Nations entities. It cites the United Nations’ Geneva offices, UNEP, UNDP, and ICAO as examples of UN-related organizations affected by breaches or ransomware incidents in recent years. WFP is described as the world’s largest humanitarian organization, with operations in more than 120 countries and territories.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eThe United Nations World Food Programme disclosed that its self-registration application for Palestine was breached. The application was used for assistance registration in Gaza. WFP announced the incident in a Sunday Telegram message, stating that the registration application had been compromised.\u003c/p\u003e\n\n\u003cp\u003eThe WFP said the affected registration platform, referred to as the SRA, was temporarily suspended. The organization said the suspension was intended to allow urgent security and system protection improvements. In a Tuesday update, WFP said the registration platform was still temporarily down while it continued strengthening security measures.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-data\"\u003eExposed data\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, attackers gained access to personal data belonging to beneficiaries across the Gaza Strip. The data included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames.\u003c/li\u003e\n\u003cli\u003eID numbers.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eLocation information, including neighborhood data recorded during registration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWFP has not publicly disclosed the number of affected individuals. However, the organization told The New Humanitarian that attackers breached its systems on May 14 and stole the information of people in roughly 600,000 Palestinian households in Gaza.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected people are beneficiaries across the Gaza Strip who used or were registered through WFP’s self-registration application for Palestine. The article specifically says the exposed data relates to people in roughly 600,000 Palestinian households in Gaza.\u003c/p\u003e\n\n\u003cp\u003eThe victim organization is the United Nations World Food Programme. WFP is described as the world’s largest humanitarian organization and a UN agency headquartered in Rome, Italy. It is funded by donations from governments, corporations, and private donors and works to combat global hunger and provide emergency food relief during humanitarian crises.\u003c/p\u003e\n\n\u003ch2 id=\"known-response-from-wfp\"\u003eKnown response from WFP\u003c/h2\u003e\n\n\u003cp\u003eWFP told beneficiaries that they do not need to update, delete, or re-register their information. It said that people who are already registered will remain part of WFP assistance programs. The organization also said that food, cash, and other assistance will continue as normal.\u003c/p\u003e\n\n\u003cp\u003eWFP said it is investigating the incident and continuously monitoring the situation. It also said the registration platform was temporarily suspended to implement urgent security and system protection improvements. A WFP spokesperson was not available for comment when contacted by BleepingComputer for more details.\u003c/p\u003e\n\n\u003ch2 id=\"beneficiary-warning\"\u003eBeneficiary warning\u003c/h2\u003e\n\n\u003cp\u003eWFP warned Palestinian beneficiaries to be cautious of anyone claiming to represent the World Food Programme and requesting information or money. It also told beneficiaries not to click or open suspicious links or messages.\u003c/p\u003e\n\n\u003cp\u003eThis warning is presented in the context of the breach and the exposure of beneficiary contact and identity information. The article does not say that any specifi
