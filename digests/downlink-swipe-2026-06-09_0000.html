js (the Miasma credential-stealer/worm payload), discarded all output with \u003ccode\u003e\u0026gt; /dev/null 2\u0026gt;\u0026amp;1\u003c/code\u003e to keep logs clean, and \u003ccode\u003e\u0026amp;\u0026amp; echo stub.c\u003c/code\u003e printed a harmless filename so the build continued normally. No preinstall hook was necessary.\u003c/p\u003e\n\n\u003ch2 id=\"expansion-syntax\"\u003eExpansion Syntax\u003c/h2\u003e\n\n\u003cp\u003eGYP offers several command-expansion flavors, all executing at parse time before compilation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;!(command)\u003c/code\u003e / \u003ccode\u003e\u0026gt;!(command)\u003c/code\u003e / \u003ccode\u003e^!(command)\u003c/code\u003e — run the command and substitute raw output as a single string.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;!@(command)\u003c/code\u003e / \u003ccode\u003e\u0026gt;!@(command)\u003c/code\u003e / \u003ccode\u003e^!@(command)\u003c/code\u003e — run the command and split output into a list.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;!pymod_do_main(module args)\u003c/code\u003e — import a Python module and call its DoMain() function.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;|(name item1 item2 ...)\u003c/code\u003e — create a file named \u003ccode\u003ename\u003c/code\u003e at parse time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGYP does not scope expansion to documented fields. It recursively walks the entire parsed structure and expands tokens inside any string value under any key at any depth, even an invented key like some_random_key. This makes review painful because payloads can hide anywhere.\u003c/p\u003e\n\n\u003ch2 id=\"the-sandbox-escape\"\u003eThe Sandbox Escape\u003c/h2\u003e\n\n\u003cp\u003ebinding.gyp is a Python dictionary handed to Python\u0026rsquo;s eval. GYP strips builtins by calling \u003ccode\u003eeval(file_contents, {\u0026quot;__builtins__\u0026quot;: {}}, None)\u003c/code\u003e, intending to deny access to dangerous functions like \u003cstrong\u003eimport\u003c/strong\u003e and open. However, the sandbox can be escaped. A single Python expression beginning from an empty tuple \u003ccode\u003e()\u003c/code\u003e traverses object relationships to catch_warnings, recovers \u003cstrong\u003ebuiltins\u003c/strong\u003e and \u003cstrong\u003eimport\u003c/strong\u003e, loads os, and runs a shell command (e.g., node evil.js). The article shows the entire malicious binding.gyp can be just this one expression, with no JSON or targets/sources fields.\u003c/p\u003e\n\n\u003cp\u003eThe expression can also be tucked into a normal-looking build file, for example hidden in an openssl_fips variable, requiring no \u003ccode\u003e\u0026lt;!(...)\u003c/code\u003e expansion. Conditions are treated the same way: GYP compiles and evaluates condition strings like \u003ccode\u003e\u0026quot;OS=='win'\u0026quot;\u003c/code\u003e via eval with the same stripped builtins, so a condition can hold the same sandbox-escape expression. The author stresses this is more dangerous than documented features because nothing about binding.gyp was ever intended to host pure Python code.\u003c/p\u003e\n\n\u003ch2 id=\"hiding-code-in-included-and-auto-included-files\"\u003eHiding Code in Included and Auto-Included Files\u003c/h2\u003e\n\n\u003cp\u003ebinding.gyp supports an includes key to factor out shared settings. Included files are processed exactly like the main file, so all expansion and sandbox tricks apply. The included file can be named anything (no .gyp/.gypi extension required, e.g. config or LICENSE) as long as it holds valid JSON-formatted data, and includes are transitive, so a payload can be several files away.\u003c/p\u003e\n\n\u003cp\u003eBeyond explicit includes, node-gyp auto-includes config.gypi and common.gypi from the package root if present, processing them like any gyp file even when binding.gyp is just \u003ccode\u003e{ }\u003c/code\u003e. Worse, node-gyp also auto-includes \u003ccode\u003e~/.gyp/include.gypi\u003c/code\u003e from the user\u0026rsquo;s home directory into every gyp build that user runs. A payload dropped there once persists across every future native npm install with a binding.gyp.\u003c/p\u003e\n\n\u003ch2 id=\"dependencies\"\u003eDependencies\u003c/h2\u003e\n\n\u003cp\u003eSeparate from includes, GYP targets can declare dependencies on targets in other .gyp files (e.g. \u003ccode\u003e\u0026quot;dependencies\u0026quot;: [\u0026quot;dep.gyp:dep_target\u0026quot;]\u003c/code\u003e). The referenced file is parsed and expanded like any other, giving a second independent way to reach code in another file. Referenced file names are irrelevant as long as they hold valid JSON, and dependencies can also be transitive.\u003c/p\u003e\n\n\u003ch2 id=\"compiler-hijacking\"\u003eCompiler Hijacking\u003c/h2\u003e\n\n\u003cp\u003ebinding.gyp controls how native code is built. GYP exposes compiler settings via per-target keys (cflags, defines, include_dirs) and make_global_settings (CC, CXX, LINK, AR, CFLAGS, LDFLAGS). Because compilation happens at install time, an attacker can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReplace the compiler, e.g. setting CC to \u003ccode\u003e\u0026lt;(module_root_dir)/cc-evil.sh\u003c/code\u003e, which runs evil.js and then execs the real compiler so the build succeeds.\u003c/li\u003e\n\u003cli\u003eUse the documented \u003ccode\u003e*_wrapper\u003c/code\u003e convention (meant for launchers like ccache), e.g. CC_wrapper pointing at cc-evil-wrapper.sh, which receives the real compiler as an argument.\u003c/li\u003e\n\u003cli\u003eInject malicious flags. On make-based builds, flag values become make variables, and make evaluates \u003ccode\u003e$(shell ...)\u003c/code\u003e inside them, so flags like \u003ccode\u003ecflags\u003c/code\u003e or global CFLAGS can carry \u003ccode\u003e$(shell node \u0026lt;(module_root_dir)/evil.js)\u003c/code\u003e. The command\u0026rsquo;s output is passed to the compiler as a harmless flag.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe exact mechanism varies by build tool and OS, but compiler and linker settings should be treated as code.\u003c/p\u003e\n\n\u003ch2 id=\"executing-code-through-actions-rules-and-postbuilds\"\u003eExecuting Code Through Actions, Rules, and Postbuilds\u003c/h2\u003e\n\n\u003cp\u003eGYP has documented features that run commands by design:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eactions\u003c/strong\u003e — a build step in a target\u0026rsquo;s actions array that runs an arbitrary command (e.g. \u003ccode\u003e\u0026quot;action\u0026quot;: [\u0026quot;node\u0026quot;, \u0026quot;evil.js\u0026quot;]\u003c/code\u003e), needing no expansion syntax.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003erules\u003c/strong\u003e — like actions but fire once per input file matching a given extension; an attacker ships a throwaway file (e.g. trigger.poc) so the rule\u0026rsquo;s command runs against it.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003epostbuilds\u003c/strong\u003e — a command that runs after a target is built, carrying the same action array.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaway-and-detection\"\u003eKey Takeaway and Detection\u003c/h2\u003e\n\n\u003cp\u003eThe central message is that a binding.gyp file runs code at install time exactly like a preinstall or postinstall hook in package.json and deserves the same suspicion. A clean package.json is no longer evidence that nothing runs. Supply-chain attackers like those behind Miasma are seeking new install-time execution methods, and binding.gyp is easy to miss, especially undocumented behavior like the sandbox escapes.\u003c/p\u003e\n\n\u003cp\u003eThe article notes Aikido detects the Miasma campaign (now using install-time binding.gyp execution) as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical malware issue, rescans nightly, and recommends a manual rescan if affected. It also mentions Aikido Device Protection for visibility over installed packages and the open-source Aikido Safe Chain tool, which intercepts npm, npx, yarn, pnpm, and pnpx commands and checks packages against Aikido Intel before install.\u003c/p\u003e\n","keyPoints":["The latest variant of the Miasma worm moved its install-time trigger out of package.json hooks and into binding.gyp, which npm automatically executes via node-gyp rebuild whenever the file is present in a package's root, even with a completely clean package.json.","GYP supports command expansion syntax such as \u003c!(command) that runs shell commands at parse time, and because GYP walks the entire parsed structure recursively, these commands execute under any key name at any depth, not just documented fields like sources or include_dirs.","Because binding.gyp is parsed with Python's eval using stripped builtins, attackers can use a sandbox escape (starting from an empty tuple and traversing object subclasses to catch_warnings) to import the os module and run arbitrary shell commands, hiding pure Python payloads in normal-looking build files or condition strings.","Payloads can be hidden in files pulled in through the includes key, through transitively auto-included files like config.gypi, common.gypi, and the persistent ~/.gyp/include.gypi in the user's home directory, or through target dependencies pointing at other gyp files.","Attackers can hijack the build by replacing the compiler through make_global_settings (CC, CXX, *_wrapper keys) or injecting malicious $(shell ...) commands into compiler flags, and can also execute code directly through GYP's documented actions, rules, and postbuilds features without needing any command expansion syntax."],"insights":["The standard manual review practice of checking package.json for preinstall/postinstall hooks is now insufficient as a safety signal, because a binding.gyp file alone causes code execution at install time regardless of what package.json declares.","The sandbox escape is qualitatively more dangerous than documented command expansions or postinstall hooks because nothing about binding.gyp was ever intended to host pure Python code, so existing reviewer intuitions and scanner rules built around expected dangerous fields fail to anticipate it.","Included files can be named anything (such as config or even LICENSE) and need no .gyp/.gypi extension as long as they hold valid JSON, and includes/dependencies can be transitive, so the actual payload may sit several files away from the binding.gyp under review.","A single payload dropped into ~/.gyp/include.gypi in a user's home directory persists across every future native npm install with a binding.gyp that user runs, turning a one-time compromise into ongoing per-build execution beyond the original project."],"referencedReports":[{"title":"Miasma attack hit 32 official Red Hat packages","url":"https://www.aikido.dev/blog/red-hat-npm-packages-compromised-credential-stealing-worm","publisher":"Aikido","context":"The article references this earlier Aikido analysis of the Miasma worm compromising 32 official Red Hat npm packages as the foundation and prior wave of the campaign discussed here.","category":"","primary":false}],"body":"\u003cp\u003eJust days after the Miasma worm compromised 32 official Red Hat npm packages by adding malicious preinstall scripts, a new wave of the attack spread to packages including @vapi-ai/server-sdk (71k weekly downloads) and ai-sdk-ollama (31k weekly downloads). The new variant moved its install-time trigger out of package.json entirely and into binding.gyp, a build file that npm automatically executes via node-gyp when present in a package root, meaning a package with a completely clean package.json can still run malicious code at install time.\u003c/p\u003e\n\n\u003cp\u003eThe article is a technical deep dive into how binding.gyp can be abused. node-gyp reads binding.gyp to compile native C/C++ add-ons, and the mere presence of the file triggers node-gyp rebuild during installation. Miasma exploited GYP\u0026rsquo;s command expansion syntax (\u0026lt;!(\u0026hellip;)) inside a sources field to run node index.js silently while echoing a harmless stub filename so the build appeared normal.\u003c/p\u003e\n\n\u003cp\u003eBeyond command expansion, the article details that binding.gyp is parsed with Python\u0026rsquo;s eval (with stripped builtins), which can be escaped to run arbitrary Python and shell commands. It further covers payloads hidden in included files, auto-included files, persistent home-directory includes, dependency references, compiler hijacking, and documented features like actions, rules, and postbuilds. The key takeaway is that the presence of binding.gyp should be treated with the same suspicion as preinstall/postinstall hooks.\u003c/p\u003e\n"},{"n":18,"title":"New Veeam vulnerability exposes backup servers to RCE attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-veeam-vulnerability-exposes-backup-servers-to-rce-attacks/","time":"14:27","priority":"MUST READ","score":94,"tldr":"Veeam has patched a critical vulnerability (CVE-2026-44963) in Backup \u0026 Replication that lets any low-privileged domain user achieve remote code execution on domain-joined backup servers. The flaw affects VBR 12.3.2.4465 and earlier version 12 builds (fixed in 12.3.2.4854), only impacts domain-joined installations, and users should patch promptly as Veeam backup servers are frequently targeted by ransomware gangs.","briefOverview":"\u003cp\u003eVeeam has released security updates to patch a critical vulnerability in Backup \u0026amp; Replication (VBR), tracked as CVE-2026-44963, that can be exploited to gain remote code execution on domain-joined backup servers. The flaw was reported by WatchTowr security researcher Sina Kheirkhah and affects VBR 12.3.2.4465 and all earlier version 12 builds. It was fixed in version 12.3.2.4854 and does not affect any version 13.x build due to architectural changes introduced in version 13.\u003c/p\u003e\n\n\u003cp\u003eWhile any low-privileged domain user can exploit the vulnerability, it only impacts Veeam installations that are joined to a domain — a configuration that contradicts Veeam\u0026rsquo;s long-standing hardening best practices, which many companies have ignored. There are no reports of active exploitation, but Veeam warned that attackers will likely attempt to reverse-engineer the patch to target unpatched deployments, underscoring the importance of patching without delay.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVeeam has issued security updates to fix a critical Backup \u0026amp; Replication (VBR) vulnerability that enables remote code execution on domain-joined backup servers. The flaw, tracked as CVE-2026-44963, was reported by WatchTowr security researcher Sina Kheirkhah and affects VBR 12.3.2.4465 and all earlier version 12 builds.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was fixed in version 12.3.2.4854. According to Veeam\u0026rsquo;s advisory, the flaw allows an authenticated domain user to achieve RCE on the Backup Server, but it does not affect any version 13.x build due to architectural changes that began in version 13.\u003c/p\u003e\n\n\u003cp\u003eAlthough any domain user with low privileges can exploit the flaw, it only impacts Veeam installations joined to a domain. Veeam noted that many companies have joined their backup servers to a Windows domain despite the company\u0026rsquo;s long-standing best practices advising against this configuration.\u003c/p\u003e\n\n\u003cp\u003eVeeam reported no active exploitation but warned that once a vulnerability and its patch are disclosed, attackers will likely reverse-engineer the patch to exploit unpatched deployments. The company stressed the importance of ensuring all customers use the latest software versions and install updates and patches without delay.\u003c/p\u003e\n\n\u003cp\u003eVeeam backup servers are a recurring target in ransomware attacks. Ransomware gangs have told BleepingComputer they target Veeam servers to steal sensitive data, move within breached networks, and block restoration efforts by deleting victims\u0026rsquo; backups. CISA has flagged four Veeam Backup \u0026amp; Replication flaws as actively exploited, all abused by ransomware gangs.\u003c/p\u003e\n\n\u003cp\u003ePrevious examples include a November 2024 Sophos X-Ops report that the Akira, Fog, and Frag ransomware operations weaponized another critical VBR RCE flaw (CVE-2024-40711). The FIN7 threat group and the Cuba ransomware gang have also been linked to attacks targeting VBR flaws. Veeam\u0026rsquo;s products are used by over 550,000 customers worldwide, including 82% of Fortune 500 companies and 74% of Global 2,000 firms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVeeam has released security updates to patch a critical Backup \u0026amp; Replication (VBR) security flaw that can be exploited to gain remote code execution (RCE) on domain-joined backup servers. The vulnerability is tracked as CVE-2026-44963 and was reported by WatchTowr security researcher Sina Kheirkhah.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-fix\"\u003eAffected Versions and Fix\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability affects Veeam Backup \u0026amp; Replication (VBR) 12.3.2.4465 and all earlier version 12 builds.\u003c/li\u003e\n\u003cli\u003eIt was fixed in version 12.3.2.4854.\u003c/li\u003e\n\u003cli\u003eAccording to Veeam\u0026rsquo;s advisory, the vulnerability does not affect any version 13.x build of Veeam Backup \u0026amp; Replication due to architectural changes starting in version 13.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-conditions\"\u003eExploitation Conditions\u003c/h2\u003e\n\n\u003cp\u003eVeeam described the flaw as \u0026ldquo;a vulnerability allowing remote code execution (RCE) on the Backup Server by an authenticated domain user.\u0026rdquo; Key conditions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAny domain user with low privileges can exploit the vulnerability.\u003c/li\u003e\n\u003cli\u003eThe flaw only impacts Veeam Backup \u0026amp; Replication installations that are joined to a domain.\u003c/li\u003e\n\u003cli\u003eDespite this, many companies have joined their Veeam servers to a Windows domain, ignoring Veeam\u0026rsquo;s long-standing best practices that advise against this configuration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-status-and-vendor-warning\"\u003eExploitation Status and Vendor Warning\u003c/h2\u003e\n\n\u003cp\u003eThere are no reports of active exploitation. However, Veeam warned that attackers will often begin developing exploits as soon as patches are released. The company stated that once a vulnerability and its associated patch are disclosed, attackers will likely attempt to reverse-engineer the patch to exploit unpatched deployments, underscoring the critical importance of using the latest software versions and installing all updates and patches without delay.\u003c/p\u003e\n\n\u003ch2 id=\"history-of-veeam-targeting-in-ransomware-attacks\"\u003eHistory of Veeam Targeting in Ransomware Attacks\u003c/h2\u003e\n\n\u003cp\u003eVeeam backup servers are frequently targeted in ransomware attacks. Ransomware gangs have told BleepingComputer in the past that they always target Veeam backup servers because doing so allows them to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSteal sensitive data\u003c/li\u003e\n\u003cli\u003eMove within breached networks\u003c/li\u003e\n\u003cli\u003eBlock restoration efforts by deleting victims\u0026rsquo; backups\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn recent years, CISA has flagged four Veeam Backup \u0026amp; Replication flaws as actively exploited in attacks, all of which have been abused by ransomware gangs.\u003c/p\u003e\n\n\u003ch3 id=\"notable-prior-incidents\"\u003eNotable Prior Incidents\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn November 2024, Sophos X-Ops reported that several ransomware operations — including the Akira, Fog, and Frag gangs — had weaponized another critical VBR RCE flaw (CVE-2024-40711).\u003c/li\u003e\n\u003cli\u003eThe financially motivated FIN7 threat group, which often collaborated with the Maze, Egregor, Conti, REvil, and BlackBasta ransomware groups, has been linked to attacks on VBR flaws.\u003c/li\u003e\n\u003cli\u003eThe Cuba ransomware gang has also been linked to attacks targeting VBR security flaws.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"scale-of-impact\"\u003eScale of Impact\u003c/h2\u003e\n\n\u003cp\u003eVeeam\u0026rsquo;s products are used by over 550,000 customers worldwide, including 82% of Fortune 500 companies and 74% of Global 2,000 firms, indicating a broad potential exposure footprint for unpatched, domain-joined deployments.\u003c/p\u003e\n","keyPoints":["Veeam released security updates to patch a critical vulnerability (CVE-2026-44963) in Backup \u0026 Replication that allows an authenticated domain user to achieve remote code execution on domain-joined backup servers.","The flaw affects Veeam Backup \u0026 Replication 12.3.2.4465 and all earlier version 12 builds, was fixed in version 12.3.2.4854, and does not affect any version 13.x build due to architectural changes.","The vulnerability only impacts Veeam installations joined to a domain, a configuration that contradicts Veeam's long-standing hardening best practices, yet many companies have joined their servers to a Windows domain.","There are no reports of active exploitation, but Veeam warned that attackers will likely attempt to reverse-engineer the patch to exploit unpatched deployments, and the vulnerability was reported by WatchTowr researcher Sina Kheirkhah.","Veeam backup servers are frequently targeted by ransomware gangs such as Akira, Fog, Frag, and Cuba, as well as the FIN7 group, and CISA has flagged four previously exploited Veeam Backup \u0026 Replication flaws."],"insights":["The vulnerability's exploitability is entirely conditional on a misconfiguration: organizations that follow Veeam's documented best practice of keeping backup servers in a workgroup rather than joining them to a domain are not affected at all.","Veeam's complete re-architecture in version 13.x eliminated this class of vulnerability entirely, suggesting that upgrading major versions—not just patching—may offer structural security benefits beyond the immediate fix.","Veeam explicitly acknowledged that disclosing the patch effectively starts a race, since attackers reverse-engineer patches to weaponize unpatched deployments, making rapid patching especially urgent despite no current active exploitation.","The article highlights a structural reason backups are high-value targets: ransomware operators deliberately compromise Veeam servers to delete backups and prevent victims from restoring, turning a recovery tool into a leverage point for extortion."],"referencedReports":[{"title":"Veeam KB4869 Security Advisory (CVE-2026-44963)","url":"https://www.veeam.com/kb4869","publisher":"Veeam","context":"The article cites Veeam's Tuesday advisory describing the RCE vulnerability and warning that attackers may reverse-engineer the patch.","category":"","primary":false},{"title":"Veeam KB4696 Patch Release (version 12.3.2.4854)","url":"https://www.veeam.com/kb4696","publisher":"Veeam","context":"Referenced as the version in which the vulnerability was fixed.","category":"","primary":false},{"title":"Veeam Hardening Best Practices: Workgroup or Domain","url":"https://bp.veeam.com/security/Design-and-implementation/Hardening/Workgroup_or_Domain.html#best-practice","publisher":"Veeam","context":"Cited as Veeam's long-standing best practice advising against joining backup servers to a domain.","category":"","primary":false},{"title":"CISA Known Exploited Vulnerabilities Catalog (Veeam entries)","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?f%5B0%5D=vendor_project%3A931","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"Referenced to note that CISA has flagged four Veeam Backup \u0026 Replication flaws as actively exploited.","category":"","primary":false}],"body":"\u003cp\u003eVeeam has released security updates to patch a critical vulnerability in Backup \u0026amp; Replication (VBR), tracked as CVE-2026-44963, that can be exploited to gain remote code execution on domain-joined backup servers. The flaw was reported by WatchTowr security researcher Sina Kheirkhah and affects VBR 12.3.2.4465 and all earlier version 12 builds. It was fixed in version 12.3.2.4854 and does not affect any version 13.x build due to architectural changes introduced in version 13.\u003c/p\u003e\n\n\u003cp\u003eWhile any low-privileged domain user can exploit the vulnerability, it only impacts Veeam installations that are joined to a domain — a configuration that contradicts Veeam\u0026rsquo;s long-standing hardening best practices, which many companies have ignored. There are no reports of active exploitation, but Veeam warned that attackers will likely attempt to reverse-engineer the patch to target unpatched deployments, underscoring the importance of patching without delay.\u003c/p\u003e\n"},{"n":23,"title":"Veeam Backup \u0026 Replication RCE Flaw Lets Domain Users Run Remote Code","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/veeam-backup-replication-rce-flaw-lets.html","time":"16:39","priority":"MUST READ","score":93,"tldr":"Veeam has patched a critical RCE vulnerability (CVE-2026-44963, CVSS 9.4) in Backup \u0026 Replication that allows authenticated domain users to execute remote code on the Backup Server, affecting version 12.3.2.4465 and earlier 12.x builds but not 13.x. Users should update to version 12.3.2.4854, especially since prior Veeam flaws have been exploited by ransomware groups.","briefOverview":"\u003cp\u003eVeeam has released security patches to address a critical vulnerability in its Backup \u0026amp; Replication software that could allow remote code execution. Tracked as CVE-2026-44963, the flaw carries a CVSS score of 9.4 out of 10.0 and enables an authenticated domain user to execute code remotely on the Backup Server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Veeam Backup \u0026amp; Replication version 12.3.2.4465 and all earlier 12.x builds, and has been fixed in version 12.3.2.4854. Version 13.x builds are not affected due to architectural changes introduced in version 13.\u003c/p\u003e\n\n\u003cp\u003eGiven that prior vulnerabilities in Veeam\u0026rsquo;s software have been exploited by bad actors, including ransomware groups, users are urged to update to the latest version promptly.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVeeam has issued security patches to remediate a critical flaw in its Backup \u0026amp; Replication software that could lead to remote code execution. The vulnerability is tracked as CVE-2026-44963 and carries a high CVSS score of 9.4 out of a maximum of 10.0.\u003c/p\u003e\n\n\u003cp\u003eAccording to Veeam\u0026rsquo;s Tuesday advisory, the vulnerability allows remote code execution on the Backup Server by an authenticated domain user. The company credited watchTowr researcher Sina Kheirkhah for responsibly discovering and reporting the issue.\u003c/p\u003e\n\n\u003cp\u003eThe flaw impacts Veeam Backup \u0026amp; Replication version 12.3.2.4465 and all earlier 12.x builds. Veeam noted that the vulnerability does not affect any 13.x build because of architectural changes introduced in version 13. The issue has been addressed in version 12.3.2.4854.\u003c/p\u003e\n\n\u003cp\u003eThis disclosure follows a pattern of critical issues in the product. In March 2026, Veeam resolved multiple critical vulnerabilities in Backup \u0026amp; Replication that, if successfully exploited, could also result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eVeeam emphasized that it is essential for users to update to the latest version, particularly given that prior vulnerabilities in the program have been exploited by bad actors, including ransomware groups.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVeeam has released security patches to address a critical vulnerability in its Backup \u0026amp; Replication software that could result in remote code execution (RCE). The flaw is tracked as \u003cstrong\u003eCVE-2026-44963\u003c/strong\u003e and carries a CVSS score of \u003cstrong\u003e9.4 out of a maximum of 10.0\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability allows remote code execution on the Backup Server.\u003c/li\u003e\n\u003cli\u003eExploitation requires an \u003cstrong\u003eauthenticated domain user\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe flaw impacts \u003cstrong\u003eVeeam Backup \u0026amp; Replication version 12.3.2.4465 and all earlier 12.x builds\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eIt does \u003cstrong\u003enot\u003c/strong\u003e affect any \u003cstrong\u003e13.x build\u003c/strong\u003e of the software, owing to architectural changes introduced in version 13.\u003c/li\u003e\n\u003cli\u003eThe issue has been addressed in \u003cstrong\u003eversion 12.3.2.4854\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"discovery-and-disclosure\"\u003eDiscovery and Disclosure\u003c/h2\u003e\n\n\u003cp\u003eVeeam credited \u003cstrong\u003ewatchTowr researcher Sina Kheirkhah\u003c/strong\u003e for responsibly discovering and reporting the vulnerability. Veeam disclosed the issue in a Tuesday advisory.\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cp\u003eThis disclosure is part of a recurring pattern of critical security issues in Veeam\u0026rsquo;s Backup \u0026amp; Replication software:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn \u003cstrong\u003eMarch 2026\u003c/strong\u003e, Veeam resolved multiple critical vulnerabilities in Backup \u0026amp; Replication that, if successfully exploited, could also result in remote code execution.\u003c/li\u003e\n\u003cli\u003ePrior vulnerabilities in the program have been exploited by bad actors, \u003cstrong\u003eincluding ransomware groups\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendation\"\u003eRecommendation\u003c/h2\u003e\n\n\u003cp\u003eVeeam stressed that it is essential for users to update to the latest version. The urgency is heightened by the history of exploitation of earlier vulnerabilities in the software by threat actors and ransomware operators.\u003c/p\u003e\n","keyPoints":["Veeam has released security patches for a critical vulnerability tracked as CVE-2026-44963, which carries a CVSS score of 9.4 and allows remote code execution on the Backup Server by an authenticated domain user.","The flaw impacts Veeam Backup \u0026 Replication version 12.3.2.4465 and all earlier 12.x builds, but does not affect any 13.x build due to architectural changes introduced in version 13.","The vulnerability has been addressed in Veeam Backup \u0026 Replication version 12.3.2.4854.","watchTowr researcher Sina Kheirkhah was credited for responsibly discovering and reporting the issue.","In March 2026, Veeam resolved multiple critical vulnerabilities in Backup \u0026 Replication, and prior vulnerabilities in the software have been exploited by bad actors, including ransomware groups."],"insights":["The vulnerability requires only an authenticated domain user to achieve remote code execution, meaning any compromised low-privilege domain account could be leveraged to take over the Backup Server, making it a high-value target in Active Directory environments.","Organizations already running version 13.x are inherently protected from this flaw because of architectural changes, signaling that upgrading to the newer major version offers structural security benefits beyond a single patch.","The article highlights a recurring pattern of critical RCE flaws in Veeam Backup \u0026 Replication, with March 2026 patches addressing multiple similar issues, suggesting the product remains a persistently targeted attack surface.","Because backup servers are a known target for ransomware groups seeking to disable recovery capabilities, this RCE flaw poses an elevated operational risk where an attacker could both compromise backups and impede incident recovery."],"referencedReports":[{"title":"KB4869: Vulnerability in Veeam Backup \u0026 Replication","url":"https://www.veeam.com/kb4869","publisher":"Veeam","context":"The article cites Veeam's official advisory describing CVE-2026-44963, the affected versions, and the fix.","category":"","primary":false}],"body":"\u003cp\u003eVeeam has released security patches to address a critical vulnerability in its Backup \u0026amp; Replication software that could allow remote code execution. Tracked as CVE-2026-44963, the flaw carries a CVSS score of 9.4 out of 10.0 and enables an authenticated domain user to execute code remotely on the Backup Server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Veeam Backup \u0026amp; Replication version 12.3.2.4465 and all earlier 12.x builds, and has been fixed in version 12.3.2.4854. Version 13.x builds are not affected due to architectural changes introduced in version 13.\u003c/p\u003e\n\n\u003cp\u003eGiven that prior vulnerabilities in Veeam\u0026rsquo;s software have been exploited by bad actors, including ransomware groups, users are urged to update to the latest version promptly.\u003c/p\u003e\n"},{"n":15,"title":"Windows 11 KB5094126 \u0026 KB5093998 cumulative updates released","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/windows-11-kb5094126-and-kb5093998-cumulative-updates-released/","time":"17:32","priority":"MUST READ","score":91,"tldr":"Microsoft released mandatory Windows 11 cumulative updates KB5094126 (for 25H2/24H2) and KB5093998 (for 23H2) delivering the June 2026 Patch Tuesday security fixes along with new features like Shared Audio, Xbox mode, and Task Manager NPU monitoring. Microsoft reports no known issues with this relatively small release.","briefOverview":"\u003cp\u003eMicrosoft has released the Windows 11 KB5094126 and KB5093998 cumulative updates for versions 25H2/24H2 and 23H2, respectively. These mandatory updates contain the June 2026 Patch Tuesday security patches for several vulnerabilities discovered in previous months, and they can be installed through Windows Update or downloaded from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eThis is the sixth Patch Tuesday release in 2026. Because the update is based on 24H2, both 25H2 and 24H2 receive identical fixes, with build numbers changing to 26200.8457 (25H2), 26100.8457 (24H2), and 22631.7079 (23H2). Beyond security fixes, the update adds new features and performance improvements, including Shared Audio, expanded Xbox mode, taskbar fixes, and improved Windows Hello reliability.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says it is not aware of any new issues with this month\u0026rsquo;s release, attributing this to the smaller size of the update and the company\u0026rsquo;s commitment to a stable and reliable Windows experience.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has released the Windows 11 KB5094126 cumulative update for versions 25H2 and 24H2, and the KB5093998 cumulative update for version 23H2, to fix security vulnerabilities, bugs, and add new features. The updates are mandatory because they contain the June 2026 Patch Tuesday security patches addressing vulnerabilities discovered in previous months.\u003c/p\u003e\n\n\u003cp\u003eUsers can install the updates by navigating to Start \u0026gt; Settings \u0026gt; Windows Update and clicking Check for Updates, or by manually downloading them from the Microsoft Update Catalog. This is the sixth Patch Tuesday release of 2026 and is based on 24H2, meaning 25H2 receives the same update with no exclusive or special changes. After installation, build numbers change to 26200.8457 (25H2), 26100.8457 (24H2), and 22631.7079 (23H2).\u003c/p\u003e\n\n\u003cp\u003eThe update introduces several new features. Shared Audio enables two people to listen to the same audio from a single Windows 11 PC using Bluetooth LE Audio broadcast technology. Xbox mode becomes available on more PCs, offering a console-like experience. Other new capabilities include improved Magnifier announcements for screen readers, expanded Task Manager NPU monitoring with new optional columns, Multi-App Camera and Basic Camera mode controls via Group Policy, and the ability to choose a custom user folder name during Windows Setup.\u003c/p\u003e\n\n\u003cp\u003eThe update also delivers numerous reliability and performance improvements. These include faster app launches and core shell experiences such as Start menu, Search, and Action Center; improved Windows Hello reliability through optimization of the Windows Biometric service and reduced authentication blocks in Enhanced Sign-in Security; better USB4 dock display reliability; improved USB3 stack resiliency; and improved battery life related to sensors and HID devices. A notable change makes Windows Hello face or fingerprint the default sign-in method each time, though entering a PIN three times in a row keeps PIN as the method until the user switches again.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft states it is not aware of any new issues with this month\u0026rsquo;s Patch Tuesday, attributing this partly to the relatively small release size and partly to its committed effort toward a stable and reliable Windows experience.\u003c/p\u003e\n\n\u003cp\u003eLooking ahead, Microsoft has confirmed it is working on a larger Windows 11 2026 quality update that restores the movable taskbar and significantly improves the performance of modern interfaces, including the right-click menu. The company also has plans to limit Copilot integration, reduce ads, and make the out-of-the-box experience faster with skippable Windows Updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has released two Windows 11 cumulative updates: KB5094126 for versions 25H2 and 24H2, and KB5093998 for version 23H2. These updates address security vulnerabilities, fix bugs, and add new features. They are mandatory because they contain the June 2026 Patch Tuesday security patches for several vulnerabilities discovered in previous months.\u003c/p\u003e\n\n\u003ch2 id=\"installation\"\u003eInstallation\u003c/h2\u003e\n\n\u003cp\u003eUsers can install the updates by going to Start \u0026gt; Settings \u0026gt; Windows Update and clicking Check for Updates. Alternatively, the updates can be manually downloaded and installed from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003ch2 id=\"release-context\"\u003eRelease Context\u003c/h2\u003e\n\n\u003cp\u003eThis is the sixth Patch Tuesday release in 2026. The update is based on 24H2, which means 25H2 receives the same update with no exclusive or special changes—the same fixes apply across both versions of Windows 11. After installation, the build numbers change as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 25H2 (KB5094126): 26200.8457\u003c/li\u003e\n\u003cli\u003eWindows 11 24H2 (KB5094126): 26100.8457\u003c/li\u003e\n\u003cli\u003eWindows 11 23H2 (KB5093998): 22631.7079\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"new-features\"\u003eNew Features\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eShared Audio:\u003c/strong\u003e Enables two people to listen to the same audio from a single Windows 11 PC simultaneously, using Bluetooth LE Audio broadcast technology. Accessible via Quick settings \u0026gt; Shared Audio.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMagnifier:\u003c/strong\u003e Provides clearer and more consistent announcements when working with a screen reader, supports magnification of permitted protected content, and offers improved smoothness in lens mode.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTask Manager:\u003c/strong\u003e Offers improved NPU usage visibility with new optional NPU and NPU Engine columns on the Processes, Users, and Details pages, plus NPU Dedicated Memory and NPU Shared Memory columns on the Details page. Neural engines part of a GPU now appear on the Performance page. A new optional Isolation column shows which apps run in an AppContainer.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCamera:\u003c/strong\u003e Multi-App Camera and Basic Camera modes can now be set by enterprise admins through Group Policy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Setup:\u003c/strong\u003e Users can choose a custom name for their user folder on the Device Name page during setup.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eXbox Mode:\u003c/strong\u003e Now available on more PCs, providing a console-like experience.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"performance-and-reliability-improvements\"\u003ePerformance and Reliability Improvements\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGeneral Performance:\u003c/strong\u003e Accelerates app launch and core shell experiences such as Start menu, Search, and Action Center.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersonalization:\u003c/strong\u003e Improves accent color selection accuracy and wallpaper persistence reliability across restarts and upgrades.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Hello:\u003c/strong\u003e Optimizes the Windows Biometric service (WinBio) for performance when resuming from Modern Standby, reduces unexpected authentication blocks in Enhanced Sign-in Security, and changes sign-in behavior so face or fingerprint becomes the default each time. Using a PIN three times in a row keeps PIN until the user switches methods.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Search Box:\u003c/strong\u003e Now finds and prioritizes files with as few as two characters.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStorage:\u003c/strong\u003e Dev Drive creation now supports specifying size in gigabytes; UAC prompt now appears only when viewing temporary files.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUSB:\u003c/strong\u003e Improves reliability for displays attached to USB4 docks and hubs, and adds resiliency to the USB3 stack against hardware faults.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSensors:\u003c/strong\u003e Improves resiliency against apps that keep the sensor hub powered on and drain battery.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHID:\u003c/strong\u003e Improves battery life related to the HID and Input stack for failed HID devices.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInput:\u003c/strong\u003e Improves touch keyboard reliability on the sign-in screen, explorer.exe reliability when closing the input switcher, and clipboard history performance.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFonts:\u003c/strong\u003e Updates the Times New Roman font family to improve rendering of combining diacritical marks across Greek and Cyrillic scripts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTask Scheduler:\u003c/strong\u003e Saves column width adjustments in task list view across sessions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDesktop Icons:\u003c/strong\u003e Improves reliability of loading desktop app shortcuts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Store:\u003c/strong\u003e Improves download performance, bandwidth usage, and error reporting when downloads fail due to Windows Update group policy settings.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReliability:\u003c/strong\u003e Improves Windows reliability on sign-in and lock screens, in File Explorer, with touch gestures, and when changing themes in Settings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"known-issues\"\u003eKnown Issues\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is not aware of any new issues with this month\u0026rsquo;s Patch Tuesday, attributing this partly to the release being smaller compared to previous patch releases and partly to its commitment to a stable and reliable Windows experience.\u003c/p\u003e\n\n\u003ch2 id=\"future-plans\"\u003eFuture Plans\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has confirmed it is working on a larger Windows 11 2026 quality update that restores the movable taskbar and significantly improves the performance of modern interfaces, including the right-click menu. The company also plans to limit Copilot integration in Windows 11, reduce ads, and make the out-of-the-box experience faster with skippable Windows Updates.\u003c/p\u003e\n","keyPoints":["Microsoft released the mandatory Windows 11 KB5094126 (for versions 25H2/24H2) and KB5093998 (for 23H2) cumulative updates containing the June 2026 Patch Tuesday security patches, with build numbers changing to 26200.8457 (25H2), 26100.8457 (24H2), and 22631.7079 (23H2).","The updates introduce new features including Shared Audio, which lets two people listen to the same audio from one PC via Bluetooth LE Audio broadcast, and expanded Xbox mode availability on more PCs.","Task Manager now offers improved NPU usage visibility through new optional NPU columns and an Isolation column showing which apps run in an AppContainer.","The updates improve Windows Hello reliability, including optimizing the Windows Biometric service performance and reducing unexpected authentication blocks in Enhanced Sign-in Security.","Microsoft is not aware of any new issues with this month's Patch Tuesday, attributing this to it being a smaller release and its commitment to a stable and reliable Windows experience."],"insights":["The update changes Windows Hello sign-in behavior so that face or fingerprint becomes the default method every sign-in, but if a user enters their PIN three times in a row, Windows will keep PIN as the method until they manually switch back—a behavior change that could surprise users.","Because this release is based on 24H2, the 25H2 version receives the identical update with no exclusive or special changes, meaning both versions get the same fixes despite the different version numbers.","Magnifier now supports magnification of permitted protected content, a capability that has accessibility implications for content previously restricted from magnification.","Microsoft has publicly committed to a larger Windows 11 2026 quality update that will restore the movable taskbar, improve right-click menu performance, limit Copilot integration, and reduce ads—signaling a response to longstanding user complaints."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has released the Windows 11 KB5094126 and KB5093998 cumulative updates for versions 25H2/24H2 and 23H2, respectively. These mandatory updates contain the June 2026 Patch Tuesday security patches for several vulnerabilities discovered in previous months, and they can be installed through Windows Update or downloaded from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eThis is the sixth Patch Tuesday release in 2026. Because the update is based on 24H2, both 25H2 and 24H2 receive identical fixes, with build numbers changing to 26200.8457 (25H2), 26100.8457 (24H2), and 22631.7079 (23H2). Beyond security fixes, the update adds new features and performance improvements, including Shared Audio, expanded Xbox mode, taskbar fixes, and improved Windows Hello reliability.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says it is not aware of any new issues with this month\u0026rsquo;s release, attributing this to the smaller size of the update and the company\u0026rsquo;s commitment to a stable and reliable Windows experience.\u003c/p\u003e\n"},{"n":17,"title":"GitHub disables Microsoft repos pushing password-stealing malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/github-disables-microsoft-repos-pushing-password-stealing-malware/","time":"15:42","priority":"MUST READ","score":90,"tldr":"Microsoft temporarily removed 73 GitHub repositories across its Azure, Microsoft, Azure-Samples, and MicrosoftDocs organizations on June 5 after they were compromised in the Miasma/Shai-Hulud supply-chain campaign, briefly disrupting CI pipelines and the widely-used Azure/functions-action. All repositories have been restored and deemed clean, but Microsoft notified a small number of customers who may have pulled affected content.","briefOverview":"\u003cp\u003eOn June 5, Microsoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs organizations on GitHub after concerns they distributed potentially malicious content. The action was contained within 105 seconds, and GitHub displayed a message attributing the removal to a violation of its terms of service, while a Microsoft representative initially described it as an \u0026ldquo;internal management issue.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eResearchers later confirmed the repositories were pulled following a compromise during the Miasma/Shai-Hulud supply-chain campaign. The most significant immediate effect was disabling access to \u0026lsquo;Azure/functions-action,\u0026rsquo; a widely used GitHub Action for deploying Azure Functions, which caused outages and confusion as workflows could no longer resolve the action.\u003c/p\u003e\n\n\u003cp\u003eAll affected repositories have since been restored and are considered clean and safe to use. Microsoft notified a small number of customers who may have pulled down content from the affected repositories and said it would continue investigating.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft removed 73 repositories spanning its Azure, microsoft, Azure-Samples, and MicrosoftDocs GitHub organizations on June 5, disrupting continuous integration pipelines for developers relying on them. The incident was contained within just 105 seconds, and the company told BleepingComputer that the repositories were removed due to concerns that they distributed \u0026ldquo;potential malicious content.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eImmediately after the removal, GitHub displayed a message stating the action was taken by GitHub Staff due to a violation of the terms of service. Separately, a Microsoft representative responding to user concerns in a community discussion described the disablement as stemming from \u0026ldquo;an internal management issue\u0026rdquo; with an investigation underway.\u003c/p\u003e\n\n\u003cp\u003eThe most consequential immediate impact was the loss of access to \u0026lsquo;Azure/functions-action,\u0026rsquo; a GitHub Action used by many developers to deploy Azure Functions. Workflows referencing it stopped working because there was nothing in the specified repository to resolve the action, producing an outage and widespread confusion.\u003c/p\u003e\n\n\u003cp\u003eMultiple researchers confirmed the repositories were pulled after a compromise during the Miasma/Shai-Hulud supply-chain campaign. The OpenSourceMalware platform noted that the \u0026lsquo;durabletask\u0026rsquo; package on PyPI had been compromised in May, when the threat actor pushed three malicious versions (1.4.1, 1.4.2, 1.4.3), suggesting an incomplete cleanup may have let the actor return. Security engineer Adnan Khan said the June 5 incident appeared part of the Miasma campaign that infected 32 of Red Hat\u0026rsquo;s npm packages, and Cloudsmith concluded the attacker pivoted from Red Hat\u0026rsquo;s npm packages to Microsoft\u0026rsquo;s GitHub resources by compromising a Red Hat employee\u0026rsquo;s GitHub account and injecting a workflow that requested GitHub\u0026rsquo;s OIDC tokens.\u003c/p\u003e\n\n\u003cp\u003eAll repositories have since been restored and are deemed clean, and Microsoft notified a small number of customers who may have pulled affected content, promising to reach out directly through support channels if further customer action is required. The broader campaign targeted AI coding tools such as Claude Code, Gemini CLI, VS Code, and Cursor.\u003c/p\u003e\n\n\u003cp\u003eThe incident is part of a continuing wave of supply-chain attacks against open-source ecosystems. Socket reported a new Shai-Hulud attack over the weekend using a new delivery mechanism, and StepSecurity reported a Shai-Hulud attack impacting Pythagora-io/gpt-pilot, a popular open-source AI developer tool. Developers are advised to lock project dependencies, add multi-day time delays before fetching new package updates, and test new builds in isolated environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn June 5, Microsoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs organizations on GitHub, disrupting continuous integration pipelines for affected developers. The company told BleepingComputer the repositories were removed due to concerns they distributed \u0026ldquo;potential malicious content,\u0026rdquo; and the incident was contained within just 105 seconds.\u003c/p\u003e\n\n\u003ch2 id=\"what-happened\"\u003eWhat Happened\u003c/h2\u003e\n\n\u003cp\u003eImmediately after the repositories were removed, a message was displayed explaining the action was taken by GitHub Staff \u0026ldquo;due to a violation of GitHub\u0026rsquo;s terms of service.\u0026rdquo; In parallel, a Microsoft representative responding to user concerns in a community discussion characterized the disablement as stemming from \u0026ldquo;an internal management issue,\u0026rdquo; stating that an investigation was underway.\u003c/p\u003e\n\n\u003cp\u003eMultiple researchers confirmed the repositories were pulled following a compromise during the Miasma/Shai-Hulud supply-chain campaign.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe most significant immediate effect was disabling access to \u0026lsquo;Azure/functions-action,\u0026rsquo; a GitHub Action used by many developers to deploy Azure Functions.\u003c/li\u003e\n\u003cli\u003eWorkflows referencing the action stopped working because there was nothing in the specified repository to resolve it, causing an outage and confusion.\u003c/li\u003e\n\u003cli\u003eAt the time of writing, all repositories have been restored and are considered clean and safe to use.\u003c/li\u003e\n\u003cli\u003eMicrosoft notified a small number of customers who may have pulled down content from the affected repositories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details-and-attribution\"\u003eTechnical Details and Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe OpenSourceMalware platform noted that the \u0026lsquo;durabletask\u0026rsquo; package on the Python Package Index (PyPI) had been compromised in May, when the threat actor pushed three malicious versions (1.4.1, 1.4.2, 1.4.3). This indicates an incomplete cleanup may have allowed the threat actor to return with a new compromise, though this has not been confirmed.\u003c/p\u003e\n\n\u003cp\u003eSecurity engineer Adnan Khan said the June 5 incident affecting Microsoft repositories appeared to be part of the Miasma malware campaign that infected 32 of Red Hat\u0026rsquo;s npm packages.\u003c/p\u003e\n\n\u003cp\u003eSoftware supply chain management company Cloudsmith concluded that Microsoft\u0026rsquo;s Azure environment on GitHub and the \u0026lsquo;durabletask\u0026rsquo; repository were compromised via Miasma, which targeted AI coding tools (e.g., Claude Code, Gemini CLI, VS Code, Cursor). According to the researchers, the worm initially struck the @redhat-cloud-services npm namespace by compromising a Red Hat employee\u0026rsquo;s GitHub account; by pushing unreviewed orphan commits to internal repos, the threat actors injected a minimal workflow that requested GitHub\u0026rsquo;s OIDC tokens. The hacker then pivoted from Red Hat\u0026rsquo;s npm packages to Microsoft\u0026rsquo;s resources on GitHub.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft\u0026rsquo;s Response\u003c/h2\u003e\n\n\u003cp\u003eIn a statement to BleepingComputer, a Microsoft spokesperson said the company \u0026ldquo;temporarily removed some repositories as we investigated potential malicious content.\u0026rdquo; While all repositories have been restored, Microsoft notified a small number of customers who may have pulled down content from the affected repositories, adding: \u0026ldquo;We will continue to investigate, and if anything further is identified that requires customer action, we will reach out directly through our established support channels.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cp\u003eSupply-chain attacks continue to target open-source ecosystems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSocket reported spotting a new Shai-Hulud attack over the weekend that relied on a new delivery mechanism.\u003c/li\u003e\n\u003cli\u003eStepSecurity published a separate report focusing on a Shai-Hulud attack impacting Pythagora-io/gpt-pilot, a popular open-source AI developer tool with more than 33,700 GitHub stars and over 3,500 forks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eSoftware developers should consider:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLocking their project dependencies.\u003c/li\u003e\n\u003cli\u003eAdding multi-day time delays before fetching new package updates.\u003c/li\u003e\n\u003cli\u003eTesting new builds in isolated environments.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["On June 5, Microsoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs GitHub organizations after concerns they distributed potentially malicious content, with the action contained within 105 seconds.","Researchers confirmed the repositories were pulled following a compromise during the Miasma/Shai-Hulud supply-chain campaign, which targeted AI coding tools like Claude Code, Gemini CLI, VS Code, and Cursor.","The most significant immediate effect was disabling access to the 'Azure/functions-action' GitHub Action used by many developers to deploy Azure Functions, causing an outage and confusion for workflows referencing it.","According to Cloudsmith, the attacker pivoted from Red Hat's npm packages to Microsoft's GitHub resources by compromising a Red Hat employee's GitHub account and injecting a workflow that requested GitHub's OIDC tokens.","All affected repositories have been restored and are considered clean and safe, and Microsoft notified a small number of customers who may have pulled down content from the compromised repositories."],"insights":["The 'durabletask' package was reportedly compromised on PyPI back in May with three malicious versions (1.4.1, 1.4.2, 1.4.3), suggesting an incomplete cleanup allowed the threat actor to return for a new compromise in June.","The attack demonstrates a worm-like lateral movement pattern, pivoting from Red Hat's npm namespace to Microsoft's Azure GitHub resources by abusing a compromised employee account to push unreviewed orphan commits that harvested GitHub OIDC tokens.","The campaign specifically targets the AI-assisted development ecosystem, abusing tools like Claude Code, Gemini CLI, VS Code, and Cursor, signaling that AI coding assistants are becoming a vector in supply-chain attacks.","Recommended defenses are practical and developer-focused: locking project dependencies, adding multi-day time delays before fetching new package updates, and testing builds in isolated environments to blunt fast-moving supply-chain worms."],"referencedReports":[{"title":"Miasma Reaches Azure","url":"https://opensourcemalware.com/blog/miasma-reaches-azure","publisher":"OpenSourceMalware","context":"The article cites the OpenSourceMalware platform's analysis noting that the 'durabletask' package on PyPI was compromised in May with three malicious versions, indicating an incomplete cleanup.","category":"","primary":false},{"title":"Miasma Worm's Path of Destruction","url":"https://cloudsmith.com/blog/miasma-worms-path-of-destruction","publisher":"Cloudsmith","context":"The article references Cloudsmith's report concluding that Microsoft's Azure GitHub environment and the durabletask repository were compromised via Miasma, detailing how the worm pivoted from Red Hat's npm namespace using OIDC tokens.","category":"","primary":false},{"title":"Mini Shai-Hulud, Miasma, and Hades Worms Target Bioinformatics and MCP Developers via Malicious Packages","url":"https://socket.dev/blog/mini-shai-hulud-miasma-and-hades-worms-target-bioinformatics-and-mcp-developers-via-malicious","publisher":"Socket","context":"The article cites Socket's report on a new Shai-Hulud attack spotted over the weekend that relied on a new delivery mechanism.","category":"","primary":false},{"title":"Pythagora-io/gpt-pilot Compromised on GitHub: Shai-Hulud Credential Stealer Blocked by Python Linter","url":"https://www.stepsecurity.io/blog/pythagora-io-gpt-pilot-compromised-on-github-shai-hulud-credential-stealer-blocked-by-python-linter","publisher":"StepSecurity","context":"The article references StepSecurity's separate report focusing on a Shai-Hulud attack impacting Pythagora-io/gpt-pilot, a popular open-source AI developer tool.","category":"","primary":false}],"body":"\u003cp\u003eOn June 5, Microsoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs organizations on GitHub after concerns they distributed potentially malicious content. The action was contained within 105 seconds, and GitHub displayed a message attributing the removal to a violation of its terms of service, while a Microsoft representative initially described it as an \u0026ldquo;internal management issue.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eResearchers later confirmed the repositories were pulled following a compromise during the Miasma/Shai-Hulud supply-chain campaign. The most significant immediate effect was disabling access to \u0026lsquo;Azure/functions-action,\u0026rsquo; a widely used GitHub Action for deploying Azure Functions, which caused outages and confusion as workflows could no longer resolve the action.\u003c/p\u003e\n\n\u003cp\u003eAll affected repositories have since been restored and are considered clean and safe to use. Microsoft notified a small number of customers who may have pulled down content from the affected repositories and said it would continue investigating.\u003c/p\u003e\n"},{"n":25,"title":"WinRAR Flaw Exploited by Russia-Aligned Groups to Deploy Stealers in Ukraine","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/winrar-flaw-exploited-by-russia-aligned.html","time":"12:26","priority":"SHOULD READ","score":89,"tldr":"Two Russia-aligned groups, Gamaredon (Earth Dahu) and UAC-0226 (SHADOW-EARTH-066), are still exploiting the patched WinRAR flaw CVE-2025-8088 to deploy information stealers like GIFTEDCROOK and GammaSteel against Ukrainian organizations nearly a year after a fix was released. The campaigns abuse NTFS Alternate Data Streams to plant hidden payloads, highlighting how unpatched software keeps an exploited entry point open long after the patch ships.","briefOverview":"\u003cp\u003eTwo Russia-aligned cyber attack campaigns continue to exploit CVE-2025-8088, a path traversal flaw in WinRAR, to target Ukrainian organizations nearly a year after the vulnerability was patched in July 2025. Trend Micro attributed the activity to Earth Dahu (Gamaredon) and SHADOW-EARTH-066 (UAC-0226). The flaw allows attackers to write files outside the extraction directory via NTFS Alternate Data Streams (ADS).\u003c/p\u003e\n\n\u003cp\u003eThe campaigns deliver information stealers to victims. SHADOW-EARTH-066 uses crafted RAR archives with a decoy PDF and hidden ADS payloads to ultimately launch an updated version of GIFTEDCROOK, while Earth Dahu uses an HTA-to-VBScript infection chain delivering GammaSteel. According to Trend Micro, the activity illustrates how unmanaged software keeps an exploited entry point open long after a fix ships.\u003c/p\u003e\n\n\u003cp\u003eWinRAR is deeply embedded in daily operations across Ukrainian organizations, making it an attractive target. The convergence of both established state-backed groups and independently tracked clusters on a single vulnerability reflects the scale of cyber threats that Ukraine faces.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTwo Russia-aligned cyber attack campaigns have continued to exploit a security flaw in WinRAR to target Ukrainian organizations, almost a year after patches were released. Trend Micro researchers Hiroyuki Kakara and Feike Hacquebord attributed the activity to Earth Dahu (aka Gamaredon) and SHADOW-EARTH-066 (aka UAC-0226). The exploited vulnerability, CVE-2025-8088, is a path traversal flaw that allows an attacker to write files outside the extraction directory via NTFS Alternate Data Streams (ADS); it was patched by WinRAR in July 2025.\u003c/p\u003e\n\n\u003cp\u003eThe WinRAR exploit chain used by SHADOW-EARTH-066 represents a departure from the Excel macro droppers the threat actor previously employed to deliver the GIFTEDCROOK information stealer. The latest iteration uses crafted RAR archives featuring a decoy PDF document and three hidden ADS payloads placed outside the extraction directory to initiate infection. This includes a Windows Shortcut (LNK) file placed in the Startup folder so it runs automatically each time a user logs in, which spawns a PowerShell loader via cmd.exe that uses in-memory DLL loading to launch an updated version of GIFTEDCROOK (\u0026ldquo;result.dll\u0026rdquo;).\u003c/p\u003e\n\n\u003cp\u003eGIFTEDCROOK targets passwords and cookies from Chromium-based browsers (Google Chrome, Microsoft Edge, and Opera) and Mozilla Firefox, and harvests documents matching certain extensions from the victim\u0026rsquo;s machine. Once data is exfiltrated to an external server, all malicious artifacts are deleted to cover the forensic trail. A notable change is the shift from Telegram as an exfiltration channel to dedicated command-and-control (C2) servers, a modification that likely aligns with Russia\u0026rsquo;s blocking of the messaging platform within the country earlier in February.\u003c/p\u003e\n\n\u003cp\u003eThe second group, Earth Dahu, has incorporated CVE-2025-8088 into its arsenal since at least September 2025 and is known for an \u0026ldquo;industrial-scale effort\u0026rdquo; to maintain long-term access to compromised organizations. Trend Micro noted that Earth Dahu used the vulnerability with an HTA-to-VBScript infection chain that delivered espionage modules, and based on RAR internal file timestamps and naming conventions, the chain remained active through at least April 10, 2026.\u003c/p\u003e\n\n\u003cp\u003eAs also documented by Sekoia, these attacks lead to the deployment of GammaPhish, an HTML Application (HTA) used to retrieve a VBScript downloader named GammaLoad. GammaLoad is described as a collection of VBScripts designed to ensure continuous access and deploy payloads over time by leveraging Dead Drop Resolvers (DDR), and is used to deploy a dropper that launches a VBScript loader responsible for executing GammaSteel, a comprehensive information stealer that can monitor changes to files in real-time.\u003c/p\u003e\n\n\u003cp\u003eTrend Micro emphasized that WinRAR is deeply embedded in daily operations across Ukrainian organizations, making it an attractive target. The convergence of both established state-backed groups and independently tracked clusters on a single vulnerability reflects the scale of the cyber threats that Ukraine faces.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTwo Russia-aligned cyber attack campaigns have continued to exploit a security flaw in WinRAR to target Ukrainian organizations, almost a year after patches for the vulnerability were released. The activity was attributed by Trend Micro researchers Hiroyuki Kakara and Feike Hacquebord, in an analysis published Monday, to Earth Dahu (aka Gamaredon) and SHADOW-EARTH-066 (aka UAC-0226). The researchers framed the findings as showing \u0026ldquo;how unmanaged software keeps an exploited entry point open long after the fix ships.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"the-vulnerability\"\u003eThe Vulnerability\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2025-8088\u003c/strong\u003e is a path traversal flaw in WinRAR.\u003c/li\u003e\n\u003cli\u003eIt allows an attacker to write files outside the extraction directory via \u003cstrong\u003eNTFS Alternate Data Streams (ADS)\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eIt was patched by WinRAR in \u003cstrong\u003eJuly 2025\u003c/strong\u003e, yet exploitation has continued nearly a year later.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"shadow-earth-066-uac-0226-campaign\"\u003eSHADOW-EARTH-066 (UAC-0226) Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe WinRAR exploit chain used by SHADOW-EARTH-066 marks a departure from the Excel macro droppers the threat actor previously used to deliver the GIFTEDCROOK information stealer.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe latest iteration uses crafted RAR archives featuring a \u003cstrong\u003edecoy PDF document\u003c/strong\u003e and \u003cstrong\u003ethree hidden ADS payloads\u003c/strong\u003e placed outside the extraction directory to initiate infection.\u003c/li\u003e\n\u003cli\u003eA \u003cstrong\u003eWindows Shortcut (LNK) file\u003c/strong\u003e is placed in the Startup folder so that it runs automatically every time a user logs in.\u003c/li\u003e\n\u003cli\u003eThe LNK spawns a \u003cstrong\u003ePowerShell loader\u003c/strong\u003e via cmd.exe, which uses \u003cstrong\u003ein-memory DLL loading\u003c/strong\u003e to launch an updated version of \u003cstrong\u003eGIFTEDCROOK\u003c/strong\u003e (\u0026ldquo;result.dll\u0026rdquo;).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"giftedcrook-capabilities\"\u003eGIFTEDCROOK Capabilities\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eTargets passwords and cookies from Chromium-based browsers (Google Chrome, Microsoft Edge, and Opera) and Mozilla Firefox.\u003c/li\u003e\n\u003cli\u003eHarvests documents matching certain extensions from the victim\u0026rsquo;s machine.\u003c/li\u003e\n\u003cli\u003eDeletes all malicious artifacts after exfiltration to cover the forensic trail.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"infrastructure-change\"\u003eInfrastructure Change\u003c/h3\u003e\n\n\u003cp\u003eA notable change is the shift from \u003cstrong\u003eTelegram\u003c/strong\u003e as an exfiltration channel to dedicated \u003cstrong\u003ecommand-and-control (C2) servers\u003c/strong\u003e. This modification likely aligns with \u003cstrong\u003eRussia\u0026rsquo;s blocking of the messaging platform\u003c/strong\u003e in the country earlier in February.\u003c/p\u003e\n\n\u003ch2 id=\"earth-dahu-gamaredon-campaign\"\u003eEarth Dahu (Gamaredon) Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe second Russia-affiliated group to weaponize CVE-2025-8088 is Earth Dahu, which has incorporated the flaw into its arsenal since at least \u003cstrong\u003eSeptember 2025\u003c/strong\u003e. The adversary is known for its \u0026ldquo;industrial-scale effort\u0026rdquo; to maintain long-term access to compromised organizations.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEarth Dahu used the vulnerability with an \u003cstrong\u003eHTA-to-VBScript infection chain\u003c/strong\u003e that delivered espionage modules.\u003c/li\u003e\n\u003cli\u003eBased on RAR internal file timestamps and file naming conventions, the chain remained active through at least \u003cstrong\u003eApril 10, 2026\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"sekoia-s-findings\"\u003eSekoia\u0026rsquo;s Findings\u003c/h3\u003e\n\n\u003cp\u003eAs also documented by Sekoia, these attacks lead to the deployment of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGammaPhish\u003c/strong\u003e — an HTML Application (HTA) used to retrieve a VBScript downloader named GammaLoad.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGammaLoad\u003c/strong\u003e — described as a collection of VBScripts designed to ensure continuous access and deploy payloads over time by leveraging \u003cstrong\u003eDead Drop Resolvers (DDR)\u003c/strong\u003e. It is used to deploy a dropper that launches a VBScript loader.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGammaSteel\u003c/strong\u003e — a comprehensive information stealer that can monitor changes to files in real-time, executed by the VBScript loader.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance-and-impact\"\u003eSignificance and Impact\u003c/h2\u003e\n\n\u003cp\u003eTrend Micro emphasized that \u0026ldquo;WinRAR is deeply embedded in daily operations across Ukrainian organizations, making it an attractive target for exploitation.\u0026rdquo; The company noted that \u0026ldquo;the convergence of both established state-backed groups and independently tracked clusters on a single vulnerability reflects the scale of the cyber threats that Ukraine faces.\u0026rdquo; The continued exploitation nearly a year after patching underscores how unmanaged software leaves an exploited entry point open long after a fix is shipped.\u003c/p\u003e\n","keyPoints":["Two Russia-aligned groups, Earth Dahu (Gamaredon) and SHADOW-EARTH-066 (UAC-0226), continue to exploit CVE-2025-8088, a WinRAR path traversal flaw using NTFS Alternate Data Streams, nearly a year after it was patched in July 2025.","SHADOW-EARTH-066 uses crafted RAR archives with a decoy PDF and three hidden ADS payloads, including an LNK file placed in the Startup folder that spawns a PowerShell loader to ultimately launch an updated version of the GIFTEDCROOK information stealer.","GIFTEDCROOK targets passwords and cookies from Chromium-based browsers and Firefox, harvests documents matching certain extensions, and deletes all malicious artifacts after exfiltration; it has shifted from Telegram to dedicated C2 servers following Russia's blocking of Telegram in February.","Earth Dahu has used the vulnerability since at least September 2025 via an HTA-to-VBScript infection chain that delivers GammaPhish, GammaLoad, and the GammaSteel information stealer, with activity remaining active through at least April 10, 2026.","Trend Micro notes that WinRAR is deeply embedded in Ukrainian organizations' daily operations, making it an attractive target, and the convergence of multiple state-backed and independent groups on a single vulnerability reflects the scale of cyber threats facing Ukraine."],"insights":["The persistence of CVE-2025-8088 attacks nearly a year after a patch demonstrates that unmanaged or unpatched software keeps an exploited entry point open long after a fix ships, making patch availability insufficient without enforced patch adoption.","SHADOW-EARTH-066's migration from Telegram to dedicated C2 servers shows how geopolitical actions like Russia's February blocking of Telegram can directly reshape attacker infrastructure and exfiltration methods.","The convergence of both established state-backed groups and independently tracked clusters onto a single vulnerability signals coordinated or opportunistic concentration of threat activity that defenders can use to prioritize WinRAR exploitation as a high-value indicator.","The threat actors deliberately delete all malicious artifacts after exfiltration to cover their forensic trail, indicating defenders should rely on real-time monitoring and memory analysis rather than post-incident disk forensics for detection."],"referencedReports":[{"title":"Old WinRAR Flaw Fuels Attacks on Ukraine","url":"https://www.trendmicro.com/en_us/research/26/f/old-winrar-flaw-fuels-attacks-on-ukraine.html","publisher":"Trend Micro","context":"The article is primarily based on Trend Micro's analysis attributing the WinRAR exploitation campaigns to Earth Dahu and SHADOW-EARTH-066.","category":"","primary":false},{"title":"FSB's Matryoshka 2/3 - Gamaredon's Gifts That Keep Unpacking: GammaLoad","url":"https://blog.sekoia.io/fsbs-matryoshka-2-3-gamaredons-gifts-that-keeps-unpacking-gammaload/","publisher":"Sekoia","context":"The article cites Sekoia's analysis describing GammaLoad as a collection of VBScripts leveraging Dead Drop Resolvers to deploy payloads.","category":"","primary":false},{"title":"FSB's Matryoshka 3/3 - Gamaredon's Gifts That Keep Unpacking: GammaSteel","url":"https://blog.sekoia.io/fsbs-matryoshka-3-3-gamaredons-gifts-that-keeps-unpacking-gammasteel/","publisher":"Sekoia","context":"The article references Sekoia's analysis of GammaSteel, described as a comprehensive information stealer that monitors file changes in real-time.","category":"","primary":false}],"body":"\u003cp\u003eTwo Russia-aligned cyber attack campaigns continue to exploit CVE-2025-8088, a path traversal flaw in WinRAR, to target Ukrainian organizations nearly a year after the vulnerability was patched in July 2025. Trend Micro attributed the activity to Earth Dahu (Gamaredon) and SHADOW-EARTH-066 (UAC-0226). The flaw allows attackers to write files outside the extraction directory via NTFS Alternate Data Streams (ADS).\u003c/p\u003e\n\n\u003cp\u003eThe campaigns deliver information stealers to victims. SHADOW-EARTH-066 uses crafted RAR archives with a decoy PDF and hidden ADS payloads to ultimately launch an updated version of GIFTEDCROOK, while Earth Dahu uses an HTA-to-VBScript infection chain delivering GammaSteel. According to Trend Micro, the activity illustrates how unmanaged software keeps an exploited entry point open long after a fix ships.\u003c/p\u003e\n\n\u003cp\u003eWinRAR is deeply embedded in daily operations across Ukrainian organizations, making it an attractive target. The convergence of both established state-backed groups and independently tracked clusters on a single vulnerability reflects the scale of cyber threats that Ukraine faces.\u003c/p\u003e\n"},{"n":26,"title":"Microsoft Restores Some GitHub Repos, Keeps Others Offline as Miasma Probe Continues","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-restores-some-github-repos.html","time":"16:34","priority":"SHOULD READ","score":88,"tldr":"Microsoft temporarily removed some of its GitHub repositories after 73 of its open-source projects were compromised in the ongoing Miasma software supply chain campaign to inject information stealers, restoring some repos after review while others remain offline. The broader campaign, linked to the Shai-Hulud and Hades waves, continues to evolve with new payload delivery methods targeting PyPI bioinformatics and MCP/AI-themed packages, including malware capable of triggering automatic code execution in AI-powered IDEs and bypassing AI scanners via prompt injection.","briefOverview":"\u003cp\u003eMicrosoft on Monday confirmed it temporarily removed some of its GitHub repositories following a security incident in which 73 of its open-source proj
