<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>
window.__DL_ARTICLES = [{"n":4,"title":"Microsoft’s June 2026 Patch Tuesday Addresses 198 CVEs ( CVE-2026-49160, CVE-2026-50507)","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/microsofts-june-2026-patch-tuesday-addresses-198-cves-cve-2026-49160-cve-2026-50507","time":"18:19","priority":"MUST READ","score":98,"tldr":"Microsoft's June 2026 Patch Tuesday is its largest ever, fixing 198 CVEs (32 critical) including three publicly disclosed zero-days: a BitLocker bypass (CVE-2026-50507 'Bitskrieg'), an HTTP.sys DoS (CVE-2026-49160 'HTTP/2 Bomb'), and a CTFMON privilege escalation (CVE-2026-45586). It also references out-of-band fixes, notably the actively exploited, CISA KEV-listed Defender EoP flaw CVE-2026-41091 ('RedSun').","briefOverview":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday addressed 198 CVEs, with 32 rated critical and 166 rated important, making it the largest Patch Tuesday release since the program began and surpassing the prior record of 167 CVEs from October 2025. Tenable\u0026rsquo;s count excluded 6 CVEs already resolved via servicing and 2 CVEs disclosed by other CNAs (CVE-2025-10263 and CVE-2026-8863).\u003c/p\u003e\n\n\u003cp\u003eThe release included three zero-day vulnerabilities that were publicly disclosed before patches were available: CVE-2026-50507 (a BitLocker security feature bypass known as Bitskrieg), CVE-2026-49160 (an HTTP.sys denial of service dubbed HTTP/2 Bomb), and CVE-2026-45586 (a Windows Collaborative Translation Framework elevation of privilege granting SYSTEM privileges). All three were assessed by Microsoft as Exploitation More Likely.\u003c/p\u003e\n\n\u003cp\u003eElevation of Privilege vulnerabilities accounted for 31.8% of the patched flaws and remote code execution accounted for 27.3%. The article also noted out-of-band updates, including CVE-2026-41091 (RedSun), an actively exploited Microsoft Defender elevation of privilege flaw that was added to CISA\u0026rsquo;s Known Exploited Vulnerabilities catalog on May 20.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday release was the largest in the program\u0026rsquo;s history, addressing 198 CVEs of which 32 were rated critical and 166 important, with no moderate or low severity entries. This total exceeded the previous record of 167 CVEs set in October 2025. Tenable\u0026rsquo;s counts omitted 6 CVEs already addressed via servicing and 2 CVEs disclosed by other CNAs (CVE-2025-10263 and CVE-2026-8863).\u003c/p\u003e\n\n\u003cp\u003eThree zero-day vulnerabilities were publicly disclosed prior to patches being available. CVE-2026-50507 is a BitLocker security feature bypass with a CVSSv3 score of 6.8 that requires physical access and allows an attacker to access encrypted data; it is identified as the Bitskrieg flaw, a collaboration between Chaotic Eclipse (Nightmare Eclipse) and Jonas L. CVE-2026-49160 is an HTTP.sys denial of service (CVSSv3 7.5) affecting HTTP/2, dubbed HTTP/2 Bomb by researchers at Calif, whose blog provided technical details and a proof-of-concept; the fix adds a MaxHeadersCount registry setting to limit headers in HTTP/2 and HTTP/3 requests. CVE-2026-45586 is a CTFMON elevation of privilege flaw (CVSSv3 7.8) that grants SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eThe update also addressed eleven Remote Desktop Client remote code execution vulnerabilities with CVSSv3 scores ranging from 8.8 to 7.5. Exploitation would require a victim to connect to an attacker-controlled server using an affected Remote Desktop Client, potentially triggering a heap-based buffer overflow. Microsoft assessed CVE-2026-42985 as Exploitation More Likely while the rest were classified as Exploitation Unlikely or Less Likely, and no public details had been released as of June 9.\u003c/p\u003e\n\n\u003cp\u003eThe article highlighted two out-of-band updates released before Patch Tuesday but outside the May window. CVE-2026-41091 is a Microsoft Defender elevation of privilege flaw (CVSSv3 7.8) known as RedSun, disclosed by Chaotic Eclipse on April 15, 2026; an unprivileged attacker could write a specially crafted file to a privileged location, causing Defender to write it back and gain SYSTEM privileges. It was exploited in the wild and added to CISA\u0026rsquo;s Known Exploited Vulnerabilities catalog on May 20.\u003c/p\u003e\n\n\u003cp\u003eThe second out-of-band update, CVE-2026-45585, is a BitLocker security feature bypass (CVSSv3 6.8) known as YellowKey, also named by Chaotic Eclipse. A proof-of-concept was made public on May 13, prompting Microsoft to publish the advisory and CVE on May 19 with mitigation guidance. Exploitation requires physical access, yet Microsoft assessed it as Exploitation More Likely. The researcher Chaotic Eclipse was also credited with several other recent zero-days including BlueHammer (CVE-2026-33825), GreenPlasma, and MiniPlasma.\u003c/p\u003e\n\n\u003cp\u003eTenable recommended patching systems as soon as possible and regularly scanning environments to identify unpatched systems, and provided links to its plugins covering the June 2026 release.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday addressed 198 CVEs, making it the largest Patch Tuesday release since the program began and surpassing the previous record of 167 CVEs from the October 2025 release. Of these, 32 were rated critical and 166 important, with none rated moderate or low. Tenable\u0026rsquo;s counts omitted 6 CVEs that were already addressed by Microsoft via servicing and 2 CVEs that were disclosed by other CNAs (CVE-2025-10263 and CVE-2026-8863).\u003c/p\u003e\n\n\u003cp\u003eElevation of Privilege (EoP) vulnerabilities accounted for 31.8% of the vulnerabilities patched this month, followed by remote code execution (RCE) vulnerabilities at 27.3%.\u003c/p\u003e\n\n\u003ch2 id=\"zero-day-vulnerabilities\"\u003eZero-Day Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThree zero-days were publicly disclosed prior to patches being made available.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-50507-windows-bitlocker-security-feature-bypass\"\u003eCVE-2026-50507 — Windows BitLocker Security Feature Bypass\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVSSv3 score of 6.8, rated important, assessed as Exploitation More Likely.\u003c/li\u003e\n\u003cli\u003eAn attacker with physical access to the system could bypass the BitLocker Device Encryption feature to access the device\u0026rsquo;s encrypted data.\u003c/li\u003e\n\u003cli\u003eIdentified as the flaw known as Bitskrieg, a collaboration between Chaotic Eclipse (Nightmare Eclipse) and Jonas L.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"cve-2026-49160-http-sys-denial-of-service\"\u003eCVE-2026-49160 — HTTP.sys Denial of Service\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVSSv3 score of 7.5, rated important, assessed as Exploitation More Likely.\u003c/li\u003e\n\u003cli\u003eThe DoS affects HTTP/2. The fix adds a MaxHeadersCount registry setting which can limit the number of headers included in HTTP/2 and HTTP/3 requests.\u003c/li\u003e\n\u003cli\u003eDubbed HTTP/2 Bomb by researchers at Calif, who were credited by Microsoft for reporting the DoS. Their blog describes the technical details and provides a proof-of-concept to test web servers; at the time the blog was released, Microsoft had not yet released patches.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"cve-2026-45586-windows-collaborative-translation-framework-ctfmon-elevation-of-privilege\"\u003eCVE-2026-45586 — Windows Collaborative Translation Framework (CTFMON) Elevation of Privilege\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVSSv3 score of 7.8, rated important, assessed as Exploitation More Likely.\u003c/li\u003e\n\u003cli\u003eAffects CTFMON, a process that supports voice and handwriting recognition. Successful exploitation grants an attacker SYSTEM privileges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"critical-remote-desktop-client-vulnerabilities\"\u003eCritical Remote Desktop Client Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eEleven RCE vulnerabilities affected the Remote Desktop Client: CVE-2026-42909, CVE-2026-42913, CVE-2026-42985, CVE-2026-42992, CVE-2026-42993, CVE-2026-44799, CVE-2026-44801, CVE-2026-47289, CVE-2026-47653, CVE-2026-47654, and CVE-2026-48563.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVSSv3 scores ranged from 8.8 (CVE-2026-42985, CVE-2026-47289, and CVE-2026-47653) down to 7.5.\u003c/li\u003e\n\u003cli\u003eSeven were rated critical, while CVE-2026-42993, CVE-2026-42909, CVE-2026-47653, and CVE-2026-42913 were rated important.\u003c/li\u003e\n\u003cli\u003eExploitation would require a victim to connect to an attacker-controlled server using an affected version of the Remote Desktop Client, which could trigger a heap-based buffer overflow resulting in remote code execution.\u003c/li\u003e\n\u003cli\u003eAs of June 9, no public details had been released. Microsoft assessed CVE-2026-42985 as Exploitation More Likely; the others were classified as Exploitation Unlikely or Exploitation Less Likely. Patches are available for supported versions of Windows and Windows Server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"out-of-band-updates\"\u003eOut-of-Band Updates\u003c/h2\u003e\n\n\u003cp\u003eThese updates were released prior to the June 9 Patch Tuesday but fell outside the May release window and were noted for their significance.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-41091-microsoft-defender-elevation-of-privilege\"\u003eCVE-2026-41091 — Microsoft Defender Elevation of Privilege\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVSSv3 score of 7.8, rated important.\u003c/li\u003e\n\u003cli\u003eAn unprivileged attacker could exploit it by writing a specially crafted file to a privileged location; Microsoft Defender would write the file back to the privileged location, granting SYSTEM privileges.\u003c/li\u003e\n\u003cli\u003eIdentified as RedSun, a zero-day disclosed by a researcher named Chaotic Eclipse (Nightmare Eclipse) on April 15, 2026.\u003c/li\u003e\n\u003cli\u003eIt has been exploited in the wild and was added to CISA\u0026rsquo;s Known Exploited Vulnerabilities (KEV) catalog on May 20.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"cve-2026-45585-windows-bitlocker-security-feature-bypass\"\u003eCVE-2026-45585 — Windows BitLocker Security Feature Bypass\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVSSv3 score of 6.8, rated important, assessed as Exploitation More Likely.\u003c/li\u003e\n\u003cli\u003eKnown as YellowKey, named by the researcher Chaotic Eclipse (Nightmare Eclipse).\u003c/li\u003e\n\u003cli\u003eA proof-of-concept was made public on May 13, prompting Microsoft to publish the original advisory and CVE identifier on May 19 with mitigation guidance. Exploitation requires physical access to the device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-activity\"\u003eThreat Actor Activity\u003c/h2\u003e\n\n\u003cp\u003eThe researcher known as Chaotic Eclipse (Nightmare Eclipse) was credited with multiple recent zero-days, including RedSun (CVE-2026-41091), BlueHammer (CVE-2026-33825), GreenPlasma, MiniPlasma, and YellowKey (CVE-2026-45585), and collaborated on Bitskrieg (CVE-2026-50507).\u003c/p\u003e\n\n\u003ch2 id=\"affected-product-areas\"\u003eAffected Product Areas\u003c/h2\u003e\n\n\u003cp\u003eThe release included patches across a wide range of products and components, including .NET, ASP.NET Core, Active Directory Domain Services, Azure HorizonDB, Azure Stack Edge, Microsoft Office and its components (Excel, Word, Project, SharePoint), Microsoft Exchange Server and Exchange Online, Microsoft Defender for Endpoint, various Windows kernel and driver components, Windows BitLocker, HTTP.sys, Remote Desktop Client, Windows Hyper-V, and many others.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eTenable recommended patching systems as soon as possible and regularly scanning environments to identify systems yet to be patched. A list of Tenable plugins for the June 2026 Patch Tuesday was made available, along with links to Microsoft\u0026rsquo;s June 2026 Security Updates and guidance on performing efficient vulnerability assessments.\u003c/p\u003e\n","keyPoints":["Microsoft's June 2026 Patch Tuesday addressed 198 CVEs, with 32 rated critical and 166 rated important, making it the largest Patch Tuesday release ever and surpassing the previous record of 167 CVEs from October 2025.","Three zero-day vulnerabilities were publicly disclosed prior to patches being available: CVE-2026-50507 (a BitLocker security feature bypass requiring physical access, known as Bitskrieg), CVE-2026-49160 (an HTTP.sys denial of service affecting HTTP/2 dubbed HTTP/2 Bomb), and CVE-2026-45586 (a Windows Collaborative Translation Framework elevation of privilege granting SYSTEM privileges).","Eleven Remote Desktop Client RCE vulnerabilities were patched that could be triggered by a victim connecting to an attacker-controlled server, causing a heap-based buffer overflow, with CVE-2026-42985 assessed as Exploitation More Likely.","An out-of-band Microsoft Defender elevation of privilege vulnerability (CVE-2026-41091, known as RedSun) was disclosed by a researcher called Chaotic Eclipse, has been exploited in the wild, and was added to CISA's Known Exploited Vulnerabilities catalog on May 20, 2026.","Elevation of Privilege vulnerabilities accounted for 31.8% of the patched flaws while remote code execution vulnerabilities accounted for 27.3%."],"insights":["A single researcher or group operating under the name Chaotic Eclipse (Nightmare Eclipse) is responsible for an unusually large cluster of recent zero-days, including RedSun (CVE-2026-41091), BlueHammer (CVE-2026-33825), GreenPlasma, MiniPlasma, YellowKey (CVE-2026-45585), and a collaboration on Bitskrieg (CVE-2026-50507), indicating a concentrated and prolific source of Windows vulnerabilities.","The HTTP.sys DoS fix (CVE-2026-49160) does not silently remediate the flaw but instead introduces a new MaxHeadersCount registry setting that administrators may need to configure to limit headers in HTTP/2 and HTTP/3 requests, meaning patching alone may not be sufficient hardening.","The HTTP/2 Bomb vulnerability was discovered with the assistance of an AI coding tool (Codex per the Calif blog reference), and a working proof-of-concept was publicly released before Microsoft had patches available, exposing web servers during the disclosure gap.","Two BitLocker bypass zero-days (CVE-2026-50507 and CVE-2026-45585) were rated only important with a CVSS of 6.8 yet both were assessed as Exploitation More Likely, showing that the requirement for physical access lowers the score but does not reduce the practical likelihood of exploitation.","Tenable's CVE count deliberately excludes 6 CVEs already resolved via servicing and 2 CVEs disclosed by other CNAs (CVE-2025-10263 and CVE-2026-8863), illustrating that headline Patch Tuesday totals can vary depending on counting methodology."],"referencedReports":[{"title":"Codex Discovered a Hidden HTTP/2 Bomb","url":"https://blog.calif.io/p/codex-discovered-a-hidden-http2-bomb","publisher":"Calif","context":"The article cites Calif's blog as describing the technical details of the HTTP/2 Bomb (CVE-2026-49160) and providing a proof-of-concept to test web servers against the vulnerability, with Calif credited by Microsoft for reporting the DoS.","category":"","primary":false},{"title":"Announcing Bitskrieg","url":"https://deadeclipse666.blogspot.com/2026/05/announcing-bitskrieg.html","publisher":"Chaotic Eclipse (Nightmare Eclipse)","context":"The article references this disclosure as the source describing the Bitskrieg BitLocker bypass flaw (CVE-2026-50507), a collaboration involving Chaotic Eclipse.","category":"","primary":false},{"title":"CISA Adds Seven Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/20/cisa-adds-seven-known-exploited-vulnerabilities-catalog","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"The article notes that CVE-2026-41091 (RedSun) was exploited in the wild and added to CISA's Known Exploited Vulnerabilities catalog on May 20.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday addressed 198 CVEs, with 32 rated critical and 166 rated important, making it the largest Patch Tuesday release since the program began and surpassing the prior record of 167 CVEs from October 2025. Tenable\u0026rsquo;s count excluded 6 CVEs already resolved via servicing and 2 CVEs disclosed by other CNAs (CVE-2025-10263 and CVE-2026-8863).\u003c/p\u003e\n\n\u003cp\u003eThe release included three zero-day vulnerabilities that were publicly disclosed before patches were available: CVE-2026-50507 (a BitLocker security feature bypass known as Bitskrieg), CVE-2026-49160 (an HTTP.sys denial of service dubbed HTTP/2 Bomb), and CVE-2026-45586 (a Windows Collaborative Translation Framework elevation of privilege granting SYSTEM privileges). All three were assessed by Microsoft as Exploitation More Likely.\u003c/p\u003e\n\n\u003cp\u003eElevation of Privilege vulnerabilities accounted for 31.8% of the patched flaws and remote code execution accounted for 27.3%. The article also noted out-of-band updates, including CVE-2026-41091 (RedSun), an actively exploited Microsoft Defender elevation of privilege flaw that was added to CISA\u0026rsquo;s Known Exploited Vulnerabilities catalog on May 20.\u003c/p\u003e\n"},{"n":11,"title":"Microsoft Patch Tuesday for June 2026 — Snort rules and prominent vulnerabilities","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/microsoft-patch-tuesday-for-june-2026-snort-rules-and-prominent-vulnerabilities/","time":"21:21","priority":"MUST READ","score":98,"tldr":"Microsoft's June 2026 Patch Tuesday addresses 206 vulnerabilities, including 32 rated critical, with notable flaws in Remote Desktop Client, Windows HTTP Protocol Stack (http.sys), and the Windows Graphics component flagged by Microsoft as more likely to be exploited. Cisco Talos has released Snort 2 and Snort 3 rulesets to detect attempts to exploit several of these vulnerabilities.","briefOverview":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday addresses 206 vulnerabilities across a range of products, 32 of which are rated critical. Of those critical entries, 28 are remote code execution vulnerabilities affecting Windows components and services including Active Directory, Kerberos KDC, the Graphics component, Remote Desktop Client, Windows Deployment Services, the DHCP Client service, Hyper-V, the Windows Kernel, Azure Kubernetes Service, Microsoft Office, Outlook, Word, SQL Server, and the Windows HTTP Protocol Stack.\u003c/p\u003e\n\n\u003cp\u003eTalos highlighted four critical vulnerabilities Microsoft assessed as \u0026lsquo;more likely\u0026rsquo; to be exploited: CVE-2026-42985 in the Remote Desktop Client, CVE-2026-47291 in the Windows HTTP Protocol Stack (http.sys), and CVE-2026-44803 and CVE-2026-44812 in the Windows Graphics component. The remaining critical issues were rated \u0026lsquo;less likely,\u0026rsquo; \u0026lsquo;unlikely,\u0026rsquo; or had unknown exploitation status.\u003c/p\u003e\n\n\u003cp\u003eIn response, Talos released new Snort rules to detect exploitation attempts, including Snort 2 rules 66572-66577, 66581, 66589, 66590, 66594, 66595, 66601-66604 and Snort 3 rules 301523-301525, 301527-301529, 301531, and 301532. Talos noted that additional rules may be released and current rules are subject to change.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft released its monthly security update for June 2026, addressing 206 vulnerabilities across a broad set of products, with 32 marked as critical. Of these critical entries, 28 are remote code execution (RCE) vulnerabilities affecting Windows services and applications such as Active Directory, Kerberos Key Distribution Centre (KDC), the Graphics component, Remote Desktop Client, Windows Deployment Services (WDS), the DHCP Client service, Hyper-V, the Windows Kernel and Media, Azure Kubernetes Service (AKS), Microsoft Office, Outlook, Word, SQL Server, and the Windows HTTP Protocol Stack.\u003c/p\u003e\n\n\u003cp\u003eTalos flagged four critical vulnerabilities that Microsoft deemed \u0026lsquo;more likely\u0026rsquo; to be exploited. CVE-2026-42985 is a heap-based buffer overflow RCE in the Remote Desktop Client, exploitable over a network. CVE-2026-47291 is an integer overflow RCE in the Windows HTTP Protocol Stack (http.sys) that an unauthenticated attacker could exploit by sending a specially crafted packet to a targeted server. CVE-2026-44803 and CVE-2026-44812 are integer overflow RCE vulnerabilities in the Windows Win32K GRFX subsystem of the Graphics component, exploitable locally.\u003c/p\u003e\n\n\u003cp\u003eAmong the 23 critical vulnerabilities rated \u0026lsquo;less likely,\u0026rsquo; several affect the Remote Desktop Client, where an attacker controlling a malicious Remote Desktop Server could trigger RCE on a victim\u0026rsquo;s machine upon connection. Other notable issues include out-of-bounds read flaws in Hyper-V (CVE-2026-45607, CVE-2026-45641, CVE-2026-47652) that allow a guest VM attacker to achieve RCE on the host, a use-after-free in the Windows Kernel (CVE-2026-45657) exploitable via crafted TCP/IP network traffic to gain system-level privileges, and type confusion flaws in Office (CVE-2026-45456, CVE-2026-45458, CVE-2026-47635) exploitable through the Outlook classic preview pane during email rendering.\u003c/p\u003e\n\n\u003cp\u003eThe update also covers AI and cloud-related products, including command injection in Microsoft M365 Copilot (CVE-2026-45497, CVE-2026-42824), injection in Copilot Chat for Microsoft Edge (CVE-2026-47644), an authentication bypass through spoofing in Azure HorizonDB (CVE-2026-48567), an information disclosure flaw in Microsoft Exchange Online (CVE-2026-48579), and an information disclosure issue in Microsoft Graph (CVE-2026-47655). A path traversal RCE in Azure Kubernetes Service (CVE-2026-32193) could allow an attacker to break out of an untrusted container and gain control of the AKS worker node.\u003c/p\u003e\n\n\u003cp\u003eTalos also highlighted several \u0026lsquo;important\u0026rsquo; vulnerabilities Microsoft assessed as \u0026lsquo;more likely\u0026rsquo; to be exploited, including elevation of privilege flaws in the Windows DWM Core Library (CVE-2026-42905), NT OS Kernel (CVE-2026-42980), Microsoft Graphics Component (CVE-2026-42986), and Winlogon (CVE-2026-42989), SharePoint Server spoofing vulnerabilities (CVE-2026-45481, CVE-2026-47634), BitLocker security feature bypasses (CVE-2026-45658, CVE-2026-50507), and a Windows HTTP Protocol Stack denial of service vulnerability (CVE-2026-49160).\u003c/p\u003e\n\n\u003cp\u003eIn response, Talos released new Snort rulesets to detect exploitation attempts. The release includes Snort 2 rules 66572-66577, 66581, 66589, 66590, 66594, 66595, 66601-66604 and Snort 3 rules 301523-301525, 301527-301529, 301531, and 301532. Talos advised Cisco Security Firewall customers to update their SRU and open-source Snort Subscriber Ruleset users to download the latest rule pack from Snort.org, noting that additional rules may follow and current rules are subject to change.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft released its monthly security update for June 2026, addressing a total of 206 vulnerabilities across a wide range of products. Of these, 32 were marked as \u0026lsquo;critical\u0026rsquo; by Microsoft. Among the critical entries, 28 are remote code execution (RCE) vulnerabilities affecting Microsoft Windows services and applications including Windows Active Directory, Windows Kerberos Key Distribution Centre (KDC), the Windows Graphics component, Windows Remote Desktop Client, Windows Deployment Services (WDS), the DHCP Client service, Windows Hyper-V, the Windows Kernel and Media, Azure Kubernetes Service (AKS), Microsoft Office, Microsoft Outlook, Microsoft Word, Microsoft SQL Server, and the Windows HTTP Protocol Stack.\u003c/p\u003e\n\n\u003ch2 id=\"critical-vulnerabilities-rated-more-likely-to-be-exploited\"\u003eCritical Vulnerabilities Rated \u0026lsquo;More Likely\u0026rsquo; to Be Exploited\u003c/h2\u003e\n\n\u003cp\u003eTalos highlighted four critical vulnerabilities that Microsoft determined are \u0026lsquo;more likely\u0026rsquo; to be exploited:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-42985\u003c/strong\u003e: A critical RCE due to a heap-based buffer overflow in the Remote Desktop Client, allowing an unauthorized attacker to execute code over a network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-47291\u003c/strong\u003e: A critical RCE due to an integer overflow or wraparound in the Windows HTTP Protocol Stack (http.sys). An unauthenticated attacker could exploit it by sending a specially crafted packet to a targeted server using http.sys to process packets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44803\u003c/strong\u003e and \u003cstrong\u003eCVE-2026-44812\u003c/strong\u003e: Critical RCE vulnerabilities in the Windows Graphics component due to integer overflow or wraparound in the Windows Win32K GRFX subsystem, allowing an unauthorized attacker to execute malicious code locally.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"critical-vulnerabilities-rated-less-likely-to-be-exploited\"\u003eCritical Vulnerabilities Rated \u0026lsquo;Less Likely\u0026rsquo; to Be Exploited\u003c/h2\u003e\n\n\u003cp\u003eTalos highlighted 23 critical vulnerabilities Microsoft assessed as \u0026lsquo;less likely\u0026rsquo; to be exploited:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRemote Desktop Client\u003c/strong\u003e (CVE-2026-42992, CVE-2026-44799, CVE-2026-44801, CVE-2026-47289, CVE-2026-48563): Heap-based buffer overflow RCE flaws. Successful exploitation requires additional preparation of the target environment; an attacker controlling a malicious Remote Desktop Server could initiate RCE on a victim\u0026rsquo;s machine when they connect using the vulnerable client.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Hyper-V\u003c/strong\u003e (CVE-2026-45607, CVE-2026-45641, CVE-2026-47652): Out-of-bounds read RCE flaws requiring an authenticated attacker on a guest VM to send crafted file operation requests to hardware resources, potentially resulting in RCE on the host server.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Kernel\u003c/strong\u003e (CVE-2026-45657): A use-after-free vulnerability exploitable by sending crafted network traffic; the malicious packets could trigger a flaw in how the kernel processes TCP/IP data, allowing code execution with system-level privileges without sign-in or user interaction.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Media\u003c/strong\u003e (CVE-2026-48574): A heap-based buffer overflow RCE exploitable locally.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Deployment Services\u003c/strong\u003e (CVE-2026-42987): A use-after-free RCE exploitable over a network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows DHCP Client\u003c/strong\u003e (CVE-2026-44815): A stack-based buffer overflow RCE; an authenticated user could exploit it by sending crafted network traffic to a server configured as a DHCP Server.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Outlook and Word\u003c/strong\u003e (CVE-2026-45456, CVE-2026-45458, CVE-2026-47635): Type confusion RCE flaws in Microsoft Office. The attack vector is the preview pane of Outlook (classic), exploitable when rendering emails because Outlook classic uses Microsoft Word rendering functionality.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Office use-after-free\u003c/strong\u003e (CVE-2026-45461, CVE-2026-45463, CVE-2026-45472, CVE-2026-45474): Use-after-free flaws allowing local RCE.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Azure Network Adapter\u003c/strong\u003e (CVE-2026-45476): An elevation of privilege flaw due to a use-after-free in the Linux MANA Driver; an attacker controlling the host could trigger the flaw in the guest driver to read sensitive information and potentially escalate privileges within the guest.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Cryptographic Services\u003c/strong\u003e (CVE-2026-44810): An improper authentication flaw allowing local privilege elevation; an attacker would need to log on or convince a user to open a malicious file, and successful exploitation could grant SYSTEM privileges.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCopilot Chat (Microsoft Edge)\u003c/strong\u003e (CVE-2026-47644): An information disclosure vulnerability due to injection, allowing information disclosure over a network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNuance Powerscribe\u003c/strong\u003e (CVE-2026-26142): An RCE due to deserialization of untrusted data, allowing code execution over a network.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"critical-vulnerabilities-rated-unlikely-to-be-exploited\"\u003eCritical Vulnerabilities Rated \u0026lsquo;Unlikely\u0026rsquo; to Be Exploited\u003c/h2\u003e\n\n\u003cp\u003eTalos highlighted six critical vulnerabilities Microsoft deemed unlikely to be exploited:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-32193\u003c/strong\u003e: An RCE in Azure Kubernetes Service (AKS) due to path traversal. An attacker running an untrusted container configured with host Network could send crafted requests to a host-level service, breaking out of the container and gaining control of the AKS worker node.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-45648\u003c/strong\u003e: A stack-based buffer overflow RCE in Active Directory Domain Services, exploitable over a network by an authorized attacker.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-47288\u003c/strong\u003e: An integer overflow RCE in the Windows Kerberos KDC, exploitable over an adjacent network by an authorized attacker.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-47654\u003c/strong\u003e: A heap-based buffer overflow RCE in the Remote Desktop Client, exploitable over a network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-33828\u003c/strong\u003e: An elevation of privilege vulnerability in Windows Device Health Attestation (DHA) due to a trust boundary violation, allowing local privilege elevation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-45460\u003c/strong\u003e: An information disclosure vulnerability in Microsoft Office due to a buffer over-read, allowing local information disclosure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"critical-vulnerabilities-with-unknown-or-not-applicable-exploitation-status\"\u003eCritical Vulnerabilities with Unknown or Not Applicable Exploitation Status\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-48567\u003c/strong\u003e: An elevation of privilege vulnerability in Azure HorizonDB arising from an authentication bypass through spoofing, allowing network-based privilege escalation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-48579\u003c/strong\u003e: An information disclosure vulnerability in Microsoft Exchange Online caused by improper authorization, allowing network-based information disclosure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-45497\u003c/strong\u003e and \u003cstrong\u003eCVE-2026-42824\u003c/strong\u003e: RCE vulnerabilities in Microsoft M365 Copilot due to command injection, allowing code execution over a network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-47655\u003c/strong\u003e: An information disclosure vulnerability in Microsoft Graph allowing an authorized attacker to expose sensitive information over a network.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"notable-important-vulnerabilities-rated-more-likely-to-be-exploited\"\u003eNotable \u0026lsquo;Important\u0026rsquo; Vulnerabilities Rated \u0026lsquo;More Likely\u0026rsquo; to Be Exploited\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-42905: Windows DWM Core Library Elevation of Privilege\u003c/li\u003e\n\u003cli\u003eCVE-2026-42980: NT OS Kernel Elevation of Privilege\u003c/li\u003e\n\u003cli\u003eCVE-2026-42986: Microsoft Graphics Component Elevation of Privilege\u003c/li\u003e\n\u003cli\u003eCVE-2026-42989: Winlogon Elevation of Privilege\u003c/li\u003e\n\u003cli\u003eCVE-2026-45481: Microsoft SharePoint Server Spoofing\u003c/li\u003e\n\u003cli\u003eCVE-2026-45586: Windows Collaborative Translation Framework (CTFMON) Elevation of Privilege\u003c/li\u003e\n\u003cli\u003eCVE-2026-45658 and CVE-2026-50507: Windows BitLocker Security Feature Bypass\u003c/li\u003e\n\u003cli\u003eCVE-2026-47634: Microsoft SharePoint Server Spoofing\u003c/li\u003e\n\u003cli\u003eCVE-2026-49160: Windows HTTP Protocol Stack (http.sys) Denial of Service\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eIn response to these disclosures, Talos released a new Snort ruleset to detect exploitation attempts. Talos noted that additional rules may be released later and current rules are subject to change pending further information. Cisco Security Firewall customers should update their SRU to the latest ruleset, and open-source Snort Subscriber Ruleset customers can stay current by downloading the latest rule pack from Snort.org.\u003c/p\u003e\n\n\u003cp\u003eThe Snort 2 rules included in this release are 66572-66577, 66581, 66589, 66590, 66594, 66595, and 66601-66604. The Snort 3 rules available are 301523-301525, 301527-301529, 301531, and 301532. A complete list of all vulnerabilities disclosed this month is available on Microsoft\u0026rsquo;s update page.\u003c/p\u003e\n","keyPoints":["Microsoft's June 2026 security update addresses 206 vulnerabilities, 32 of which are rated critical, including 28 critical remote code execution vulnerabilities across Windows services and applications.","Talos highlighted four critical vulnerabilities Microsoft deemed 'more likely' to be exploited: CVE-2026-42985 (Remote Desktop Client heap-based buffer overflow), CVE-2026-47291 (Windows HTTP Protocol Stack integer overflow), and CVE-2026-44803 and CVE-2026-44812 (Windows Graphics component integer overflow).","Several critical Outlook and Word vulnerabilities (CVE-2026-45456, CVE-2026-45458, and CVE-2026-47635) can be exploited via the preview pane of Outlook (classic), which renders emails using Microsoft Word functionality where a type confusion flaw exists.","Microsoft also flagged 'important' vulnerabilities considered 'more likely' to be exploited, including elevation of privilege flaws in the Windows DWM Core Library, NT OS Kernel, Winlogon, and SharePoint Server spoofing vulnerabilities.","Talos released new Snort rulesets to detect exploitation attempts, including Snort 2 rules 66572-66577, 66581, 66589, 66590, 66594, 66595, 66601-66604 and Snort 3 rules 301523-301525, 301527-301529, 301531, and 301532."],"insights":["Multiple critical Remote Desktop Client vulnerabilities flip the usual attack model: an attacker controlling a malicious Remote Desktop Server can achieve RCE on the client machine when a victim connects to it, meaning the server side is the threat rather than the target.","The Outlook preview pane attack vector means certain critical RCE flaws (CVE-2026-45456, CVE-2026-45458, CVE-2026-47635) can be triggered simply by rendering an email without the user opening an attachment, because Outlook classic uses vulnerable Microsoft Word rendering functionality.","This update notably includes vulnerabilities in AI and cloud products — such as command injection in Microsoft M365 Copilot (CVE-2026-45497, CVE-2026-42824), injection in Copilot Chat for Microsoft Edge (CVE-2026-47644), and an authentication bypass in Azure HorizonDB (CVE-2026-48567) — indicating these emerging services are now part of the patch surface.","Several critical Hyper-V flaws (CVE-2026-45607, CVE-2026-45641, CVE-2026-47652) allow an authenticated attacker inside a guest VM to send crafted file operation requests that result in code execution on the host, representing a guest-to-host escape risk for virtualized environments."],"referencedReports":[{"title":"June 2026 Security Updates Release Notes","url":"https://msrc.microsoft.com/update-guide/releaseNote/2026-june","publisher":"Microsoft","context":"The article references Microsoft's update page as the complete list of all vulnerabilities disclosed this month.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday addresses 206 vulnerabilities across a range of products, 32 of which are rated critical. Of those critical entries, 28 are remote code execution vulnerabilities affecting Windows components and services including Active Directory, Kerberos KDC, the Graphics component, Remote Desktop Client, Windows Deployment Services, the DHCP Client service, Hyper-V, the Windows Kernel, Azure Kubernetes Service, Microsoft Office, Outlook, Word, SQL Server, and the Windows HTTP Protocol Stack.\u003c/p\u003e\n\n\u003cp\u003eTalos highlighted four critical vulnerabilities Microsoft assessed as \u0026lsquo;more likely\u0026rsquo; to be exploited: CVE-2026-42985 in the Remote Desktop Client, CVE-2026-47291 in the Windows HTTP Protocol Stack (http.sys), and CVE-2026-44803 and CVE-2026-44812 in the Windows Graphics component. The remaining critical issues were rated \u0026lsquo;less likely,\u0026rsquo; \u0026lsquo;unlikely,\u0026rsquo; or had unknown exploitation status.\u003c/p\u003e\n\n\u003cp\u003eIn response, Talos released new Snort rules to detect exploitation attempts, including Snort 2 rules 66572-66577, 66581, 66589, 66590, 66594, 66595, 66601-66604 and Snort 3 rules 301523-301525, 301527-301529, 301531, and 301532. Talos noted that additional rules may be released and current rules are subject to change.\u003c/p\u003e\n"},{"n":13,"title":"SAP fixes critical flaws in NetWeaver and Commerce Cloud","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/sap-fixes-critical-flaws-in-netweaver-and-commerce-cloud/","time":"19:36","priority":"MUST READ","score":98,"tldr":"SAP released its June 2026 Security Patch package fixing 15 vulnerabilities, including four critical flaws in SAP NetWeaver and Commerce Cloud. The most severe are an XML Signature Wrapping authentication bypass (CVE-2026-44748, CVSS 9.9) and an unauthenticated memory corruption flaw (CVE-2026-27671, CVSS 9.8), which organizations should prioritize patching.","briefOverview":"\u003cp\u003eSAP released its June 2026 Security Patch package, addressing 15 vulnerabilities, including four critical-severity flaws affecting SAP NetWeaver and SAP Commerce Cloud. The most serious are an XML Signature Wrapping authentication bypass flaw (CVE-2026-44748, CVSS 9.9) and an unauthenticated memory corruption flaw (CVE-2026-27671, CVSS 9.8).\u003c/p\u003e\n\n\u003cp\u003eNetWeaver is SAP\u0026rsquo;s core application platform and middleware stack that underpins many SAP business applications, while Commerce Cloud is an enterprise e-commerce platform formerly known as Hybris. Flaws in these widely used products could have a serious impact on enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eSAP urged organizations to prioritize patching, particularly the SAML authentication flaw and the memory corruption issue, both rated very high in severity. Detailed mitigation advice and workarounds are available only to SAP customers with a security portal account.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSAP has released fixes for 15 vulnerabilities as part of its June 2026 Security Patch package, including four critical-severity flaws affecting SAP NetWeaver and SAP Commerce Cloud. The patches were detailed in the company\u0026rsquo;s monthly security bulletin.\u003c/p\u003e\n\n\u003cp\u003eNetWeaver is SAP\u0026rsquo;s core application platform and middleware stack that provides the foundation for many SAP business applications, including ERP systems, and handles functions such as application serving, integration, authentication, user management, and data processing. Commerce Cloud, formerly Hybris, is an enterprise e-commerce platform that enables organizations to build and manage online stores, digital sales channels, product catalogs, customer accounts, and order management systems for B2B and B2C commerce.\u003c/p\u003e\n\n\u003cp\u003eThe four critical vulnerabilities are CVE-2026-44748 (CVSS 9.9), an XML Signature Wrapping flaw in SAP NetWeaver AS ABAP and ABAP Platform that may allow authentication bypass in SAML-based environments; CVE-2026-27671 (CVSS 9.8), a memory corruption flaw in SAP NetWeaver/ABAP Platform Application Server ABAP; CVE-2026-22732 (CVSS 9.1), a Spring Security-related vulnerability affecting SAP Commerce Cloud and SAP Data Hub; and CVE-2026-40128 (CVSS 9.0), a directory traversal vulnerability in SAP NetWeaver Application Server Java\u0026rsquo;s Web Container.\u003c/p\u003e\n\n\u003cp\u003eAccording to the CVE description, CVE-2026-44748 allows an authenticated attacker with normal privileges to obtain a valid signed message and send modified signed XML documents to the verifier, potentially resulting in acceptance of tampered identity information, unauthorized access to sensitive user data, and disruption of normal system usage. CVE-2026-27671 can be exploited without authentication by sending crafted RFC requests to vulnerable endpoints, leveraging improper kernel validation to cause memory corruption.\u003c/p\u003e\n\n\u003cp\u003eBeyond the critical issues, SAP addressed two high-severity vulnerabilities: CVE-2026-29145, comprising multiple Apache Tomcat flaws impacting Commerce Cloud, and CVE-2026-44751, a missing authorization check issue in NetWeaver AS ABAP. The German enterprise software company also fixed various SQL injection, path traversal, cross-site scripting, email spoofing, and authorization bypass issues across multiple SAP products.\u003c/p\u003e\n\n\u003cp\u003eDetails about the flaws and mitigation advice or workarounds are available only to SAP customers with a security portal account. Organizations using the impacted products are advised to prioritize patching, particularly the SAML authentication flaw (CVE-2026-44748) and the memory corruption issue (CVE-2026-27671), which were rated very high in severity and could seriously impact enterprise environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSAP has released fixes for 15 vulnerabilities as part of its June 2026 Security Patch package. The release includes four critical-severity flaws affecting SAP NetWeaver and SAP Commerce Cloud, and is detailed in the company\u0026rsquo;s monthly security bulletin.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSAP NetWeaver\u003c/strong\u003e: SAP\u0026rsquo;s core application platform and middleware stack that provides the foundation for many SAP business applications, including ERP systems. It handles functions such as application serving, integration, authentication, user management, and data processing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSAP Commerce Cloud\u003c/strong\u003e: An enterprise e-commerce platform formerly known as Hybris. It enables organizations to build and manage online stores, digital sales channels, product catalogs, customer accounts, and order management systems for B2B and B2C commerce.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSAP Data Hub\u003c/strong\u003e: Affected alongside Commerce Cloud by the Spring Security-related vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"critical-vulnerabilities\"\u003eCritical Vulnerabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44748 (CVSS 9.9)\u003c/strong\u003e – XML Signature Wrapping in SAP NetWeaver AS ABAP and ABAP Platform, potentially allowing authentication bypass in SAML-based environments. According to the CVE description, an authenticated attacker with normal privileges can obtain a valid signed message and send modified signed XML documents to the verifier. This may result in acceptance of tampered identity information, leading to unauthorized access to sensitive user data and potential disruption of normal system usage.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-27671 (CVSS 9.8)\u003c/strong\u003e – Memory corruption flaw in SAP NetWeaver/ABAP Platform Application Server ABAP. It can be exploited without authentication by sending crafted RFC requests to vulnerable endpoints, leveraging improper kernel validation to cause memory corruption.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-22732 (CVSS 9.1)\u003c/strong\u003e – Spring Security-related vulnerability affecting SAP Commerce Cloud and SAP Data Hub.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-40128 (CVSS 9.0)\u003c/strong\u003e – Directory traversal vulnerability in SAP NetWeaver Application Server Java\u0026rsquo;s Web Container.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"high-severity-vulnerabilities\"\u003eHigh-Severity Vulnerabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-29145\u003c/strong\u003e – Comprises multiple Apache Tomcat flaws impacting Commerce Cloud.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44751\u003c/strong\u003e – A missing authorization check issue in NetWeaver AS ABAP.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-fixes\"\u003eAdditional Fixes\u003c/h2\u003e\n\n\u003cp\u003eThe German enterprise software company also addressed various SQL injection, path traversal, cross-site scripting (XSS), email spoofing, and authorization bypass issues across multiple SAP products.\u003c/p\u003e\n\n\u003ch2 id=\"access-to-mitigation-details\"\u003eAccess to Mitigation Details\u003c/h2\u003e\n\n\u003cp\u003eDetails about the flaws and mitigation advice or workarounds are available only to SAP customers with a security portal account.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eOrganizations using the impacted products should prioritize patching, particularly the SAML authentication flaw (CVE-2026-44748) and the memory corruption issue (CVE-2026-27671), which were rated very high in severity and could have a serious impact on enterprise environments.\u003c/p\u003e\n","keyPoints":["SAP released fixes for 15 vulnerabilities as part of its June 2026 Security Patch package, including four critical-severity flaws affecting SAP NetWeaver and SAP Commerce Cloud.","CVE-2026-44748 (CVSS 9.9) is an XML Signature Wrapping flaw in SAP NetWeaver AS ABAP and ABAP Platform that could allow authentication bypass in SAML-based environments by enabling an authenticated attacker to send modified signed XML documents.","CVE-2026-27671 (CVSS 9.8) is a memory corruption flaw in SAP NetWeaver/ABAP Platform Application Server ABAP that can be exploited without authentication via crafted RFC requests leveraging improper kernel validation.","Additional critical flaws include CVE-2026-22732 (CVSS 9.1), a Spring Security-related vulnerability in SAP Commerce Cloud and SAP Data Hub, and CVE-2026-40128 (CVSS 9.0), a directory traversal vulnerability in SAP NetWeaver Application Server Java's Web Container.","SAP also addressed two high-severity vulnerabilities and various SQL injection, path traversal, cross-site scripting, email spoofing, and authorization bypass issues, with full details available only to SAP customers with a security portal account."],"insights":["The most severe flaw (CVE-2026-27671, CVSS 9.8) requires no authentication and exploits improper kernel validation via crafted RFC requests, making it especially dangerous for internet-exposed or improperly segmented SAP environments.","The XML Signature Wrapping flaw (CVE-2026-44748) lets even an authenticated low-privilege user forge identity information in SAML-based environments, meaning that existing trusted access can be escalated to unauthorized access of sensitive user data.","Several critical vulnerabilities stem from bundled third-party components such as Spring Security and Apache Tomcat, highlighting that supply-chain dependencies within SAP products extend the patching burden beyond SAP's own code.","Detailed mitigation guidance and workarounds are gated behind an SAP security portal account, meaning organizations without active support access may struggle to remediate these critical issues promptly."],"referencedReports":[{"title":"SAP Security Notes \u0026 News - June 2026","url":"http://support.sap.com/en/my-support/knowledge-base/security-notes-news/june-2026.html","publisher":"SAP","context":"The article references SAP's monthly security bulletin listing the critical vulnerabilities addressed in the June 2026 patch package.","category":"","primary":false}],"body":"\u003cp\u003eSAP released its June 2026 Security Patch package, addressing 15 vulnerabilities, including four critical-severity flaws affecting SAP NetWeaver and SAP Commerce Cloud. The most serious are an XML Signature Wrapping authentication bypass flaw (CVE-2026-44748, CVSS 9.9) and an unauthenticated memory corruption flaw (CVE-2026-27671, CVSS 9.8).\u003c/p\u003e\n\n\u003cp\u003eNetWeaver is SAP\u0026rsquo;s core application platform and middleware stack that underpins many SAP business applications, while Commerce Cloud is an enterprise e-commerce platform formerly known as Hybris. Flaws in these widely used products could have a serious impact on enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eSAP urged organizations to prioritize patching, particularly the SAML authentication flaw and the memory corruption issue, both rated very high in severity. Detailed mitigation advice and workarounds are available only to SAP customers with a security portal account.\u003c/p\u003e\n"},{"n":20,"title":"Microsoft June 2026 Patch Tuesday fixes 3 zero-day, 200 flaws","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-june-2026-patch-tuesday-fixes-3-zero-day-200-flaws/","time":"17:57","priority":"MUST READ","score":98,"tldr":"Microsoft's June 2026 Patch Tuesday fixes 200 vulnerabilities including 33 critical flaws and three publicly disclosed zero-days: a Windows CTFMON privilege escalation bug, the HTTP/2 Bomb denial-of-service flaw (CVE-2026-49160), and the YellowKey BitLocker bypass (CVE-2026-50507). None of the zero-days are known to have been exploited in attacks.","briefOverview":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday delivers security updates for 200 flaws, including 33 vulnerabilities rated \u0026ldquo;Critical\u0026rdquo; and three publicly disclosed zero-day vulnerabilities. None of the three zero-days are known to have been exploited in attacks. The critical bugs break down into 28 remote code execution, 4 elevation of privilege, and 1 information disclosure flaw.\u003c/p\u003e\n\n\u003cp\u003eThe three publicly disclosed zero-days are CVE-2026-45586, a Windows CTFMON elevation of privilege flaw granting SYSTEM privileges; CVE-2026-49160, the HTTP/2 Bomb denial-of-service flaw in HTTP.sys; and CVE-2026-50507, a Windows BitLocker security feature bypass that BleepingComputer linked to the previously disclosed YellowKey vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe count excludes flaws fixed earlier in the month for products such as Mariner, Azure HorizonDB, and Microsoft Copilot, as well as 360 Microsoft Edge/Chromium flaws fixed by Google. To mitigate the HTTP/2 Bomb attack, Microsoft introduced a new \u0026ldquo;MaxHeadersCount\u0026rdquo; registry setting to limit the number of headers in HTTP/2 and HTTP/3 requests.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft released its June 2026 Patch Tuesday security updates, addressing 200 flaws across its product line, including 33 vulnerabilities rated \u0026ldquo;Critical.\u0026rdquo; Of the critical flaws, 28 are remote code execution, 4 are elevation of privilege, and 1 is an information disclosure issue. Across all categories, the update fixes 65 elevation of privilege, 55 remote code execution, 30 information disclosure, 27 spoofing, 19 security feature bypass, and 7 denial of service vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThree of the patched vulnerabilities are publicly disclosed zero-days, none of which are known to have been exploited in attacks. CVE-2026-45586 is a Windows Collaborative Translation Framework (CTFMON) elevation of privilege flaw that grants SYSTEM privileges through improper link resolution before file access; Microsoft credited it to an anonymous researcher without sharing disclosure details.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-49160, the HTTP.sys denial-of-service flaw known as the \u0026ldquo;HTTP/2 Bomb,\u0026rdquo; was disclosed this month by researchers at the offensive security firm Calif and attributed to Quang Luong and Codex of Calif.io. The attack abuses how HTTP/2 compresses and manages header traffic, allowing attackers to send small amounts of data that force servers to allocate disproportionately large memory, and to keep memory tied up by manipulating flow-control settings. Microsoft introduced a new \u0026ldquo;MaxHeadersCount\u0026rdquo; registry setting (documented in KB5102602) to limit the number of headers in HTTP/2 and HTTP/3 requests as a mitigation.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50507 is a Windows BitLocker security feature bypass allowing local attackers physical access to encrypted drives. Although Microsoft attributed it to an anonymous researcher, BleepingComputer identified it as the YellowKey vulnerability publicly disclosed last month by a researcher named Nightmare Eclipse. The flaw can be exploited by placing specially crafted files on a USB drive or EFI partition and booting into the Windows Recovery Environment, where holding the CTRL key triggers a command shell with unrestricted access to BitLocker-protected drives, primarily affecting TPM-only configurations on Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse has released a wave of Windows zero-days—including BlueHammer, MiniPlasma, RedSun, and UnDefend—in protest of Microsoft\u0026rsquo;s handling of its bug bounty and vulnerability disclosure programs. Microsoft previously shared temporary mitigations for the BitLocker issue, including enabling TPM+PIN authentication instead of relying solely on TPM protection.\u003c/p\u003e\n\n\u003cp\u003eThe Patch Tuesday count excludes flaws fixed earlier in the month for Mariner, Azure HorizonDB, Microsoft Copilot, Copilot Chat, M365 Copilot, Microsoft Exchange Online, and Microsoft Graph, as well as 360 Microsoft Edge/Chromium flaws fixed by Google. The article also notes recent updates from other vendors including Acer, Check Point, Cisco, Fortinet, Google, Ivanti, Ubiquiti, SAP, and Veeam.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday delivered security updates for 200 flaws, including 33 vulnerabilities rated \u0026ldquo;Critical\u0026rdquo; and three publicly disclosed zero-day vulnerabilities. None of the three zero-days are known to have been exploited in attacks. Microsoft classifies a zero-day flaw as one that is publicly disclosed or actively exploited while no official fix is available.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-breakdown\"\u003eVulnerability Breakdown\u003c/h2\u003e\n\n\u003cp\u003eOf the 33 critical vulnerabilities, 28 are remote code execution, 4 are elevation of privilege, and 1 is an information disclosure flaw. The full set of fixes by category is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e65 Elevation of Privilege Vulnerabilities\u003c/li\u003e\n\u003cli\u003e55 Remote Code Execution Vulnerabilities\u003c/li\u003e\n\u003cli\u003e30 Information Disclosure Vulnerabilities\u003c/li\u003e\n\u003cli\u003e27 Spoofing Vulnerabilities\u003c/li\u003e\n\u003cli\u003e19 Security Feature Bypass Vulnerabilities\u003c/li\u003e\n\u003cli\u003e7 Denial of Service Vulnerabilities\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe count reflects only flaws released by Microsoft on Patch Tuesday. It excludes flaws fixed earlier in the month in Mariner, Azure HorizonDB, Microsoft Copilot, Copilot Chat, M365 Copilot, Microsoft Exchange Online, and Microsoft Graph, as well as 360 Microsoft Edge/Chromium flaws fixed by Google this month.\u003c/p\u003e\n\n\u003ch2 id=\"the-three-publicly-disclosed-zero-days\"\u003eThe Three Publicly Disclosed Zero-Days\u003c/h2\u003e\n\n\u003ch3 id=\"cve-2026-45586-windows-ctfmon-elevation-of-privilege\"\u003eCVE-2026-45586 — Windows CTFMON Elevation of Privilege\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft patched a publicly disclosed Windows Collaborative Translation Framework (CTFMON) vulnerability that grants SYSTEM privileges. According to Microsoft, \u0026ldquo;Improper link resolution before file access (\u0026lsquo;link following\u0026rsquo;) in Windows Collaborative Translation Framework allows an authorized attacker to elevate privileges locally.\u0026rdquo; The flaw was credited to an anonymous researcher, but Microsoft did not share details on how it was disclosed.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-49160-http-sys-denial-of-service-http-2-bomb\"\u003eCVE-2026-49160 — HTTP.sys Denial of Service (\u0026ldquo;HTTP/2 Bomb\u0026rdquo;)\u003c/h3\u003e\n\n\u003cp\u003eThis publicly disclosed HTTP/2 denial-of-service flaw, dubbed the \u0026ldquo;HTTP/2 Bomb,\u0026rdquo; was disclosed this month by researchers at the offensive security firm Calif, specifically Quang Luong and Codex of Calif.io. Microsoft states, \u0026ldquo;Uncontrolled resource consumption in HTTP/2 allows an unauthorized attacker to deny service over a network.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe attack abuses how the HTTP/2 protocol compresses and manages web traffic headers, allowing attackers to send very small amounts of data that force servers to allocate disproportionately large amounts of memory. Attackers can keep memory tied up by manipulating flow-control settings, preventing the server from freeing resources and potentially causing performance issues or outages.\u003c/p\u003e\n\n\u003cp\u003eTo mitigate the attack, Microsoft introduced a new \u0026ldquo;MaxHeadersCount\u0026rdquo; registry setting that limits the number of headers included in HTTP/2 and HTTP/3 requests accepted by the HTTP server, documented in KB5102602 and an accompanying support bulletin.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-50507-windows-bitlocker-security-feature-bypass-yellowkey\"\u003eCVE-2026-50507 — Windows BitLocker Security Feature Bypass (\u0026ldquo;YellowKey\u0026rdquo;)\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft patched a publicly disclosed BitLocker bypass flaw allowing local attackers to gain access to an encrypted drive. Microsoft describes it as a \u0026ldquo;Protection mechanism failure in Windows BitLocker [that] allows an unauthorized attacker to bypass a security feature with a physical attack.\u0026rdquo; While attributed to an anonymous researcher, BleepingComputer learned this is a fix for the YellowKey vulnerability publicly disclosed last month by a researcher named Nightmare Eclipse.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability can be exploited by placing specially crafted files on a USB drive or EFI partition and booting into the Windows Recovery Environment (WinRE), where holding down the CTRL key triggers a command shell with unrestricted access to encrypted BitLocker-protected drives. It primarily affects systems using TPM-only BitLocker protection on Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e devices. Microsoft previously shared temporary mitigations, including enabling TPM+PIN authentication instead of relying solely on TPM protection.\u003c/p\u003e\n\n\u003ch2 id=\"the-nightmare-eclipse-campaign\"\u003eThe Nightmare Eclipse Campaign\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse has released a wave of Windows zero-day vulnerabilities, including BlueHammer, MiniPlasma, RedSun, and UnDefend, in protest of Microsoft\u0026rsquo;s handling of its bug bounty and vulnerability disclosure programs.\u003c/p\u003e\n\n\u003ch2 id=\"updates-from-other-vendors\"\u003eUpdates From Other Vendors\u003c/h2\u003e\n\n\u003cp\u003eThe article notes recent updates and advisories from other companies:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAcer\u003c/strong\u003e warned about two maximum-severity unpatched flaws in Acer Wave 7 Routers that could be used to hijack routers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCheck Point\u003c/strong\u003e released updates for a Remote Access VPN and Mobile Access flaw exploited in Qilin ransomware attacks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCisco\u003c/strong\u003e released updates for numerous products, including a Unified CM flaw with a PoC exploit and an SD-WAN zero-day exploited in attacks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFortinet\u003c/strong\u003e released updates for flaws in FortiOS, FortiSandbox, and FortiProxy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoogle\u003c/strong\u003e released Android\u0026rsquo;s June security bulletin fixing 124 flaws and one actively exploited vulnerability, and fixed a new Chrome zero-day exploited in attacks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIvanti\u003c/strong\u003e released updates for Ivanti Endpoint Manager Mobile (EPMM) and Ivanti Sentry, with none exploited in the wild.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUbiquiti\u003c/strong\u003e released updates for three maximum-severity vulnerabilities that could lead to remote code execution.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSAP\u003c/strong\u003e released June updates including fixes for four critical flaws.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVeeam\u003c/strong\u003e released updates for a critical Backup \u0026amp; Replication flaw enabling RCE on domain-joined backup servers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThis Patch Tuesday is notable for the volume of fixes (200 flaws, 33 critical) and the presence of three publicly disclosed zero-days. Two of these zero-days—the HTTP/2 Bomb and the YellowKey BitLocker bypass—stem from external research disclosure, with the BitLocker issue tied to an ongoing protest campaign by researcher Nightmare Eclipse against Microsoft\u0026rsquo;s disclosure practices. Administrators should note that the HTTP/2 Bomb mitigation requires manual configuration of the new MaxHeadersCount registry setting.\u003c/p\u003e\n","keyPoints":["Microsoft's June 2026 Patch Tuesday addresses 200 flaws, including 33 critical vulnerabilities (28 remote code execution, 4 elevation of privilege, and 1 information disclosure) and three publicly disclosed zero-day vulnerabilities, none of which are known to have been exploited in attacks.","CVE-2026-45586 is a publicly disclosed Windows Collaborative Translation Framework (CTFMON) elevation of privilege flaw that grants SYSTEM privileges through improper link resolution, credited to an anonymous researcher.","CVE-2026-49160, called the 'HTTP/2 Bomb,' is a denial-of-service flaw disclosed by researchers at offensive security firm Calif that abuses HTTP/2 header compression to force servers to allocate disproportionately large amounts of memory, prompting Microsoft to introduce a new 'MaxHeadersCount' registry setting as mitigation.","CVE-2026-50507 is a Windows BitLocker security feature bypass that BleepingComputer identified as the 'YellowKey' vulnerability disclosed by researcher Nightmare Eclipse, exploitable via crafted files on a USB drive or EFI partition and primarily affecting TPM-only BitLocker systems on Windows 11 and Windows Server 2022/2025.","The roundup excludes flaws fixed earlier in the month for products like Mariner, Azure HorizonDB, and Microsoft Copilot, as well as 360 Microsoft Edge/Chromium flaws fixed by Google, and notes that other vendors including Acer, Check Point, Cisco, Fortinet, Google, Ivanti, Ubiquiti, SAP, and Veeam also released security updates."],"insights":["The researcher 'Nightmare Eclipse' is conducting a coordinated campaign of releasing Windows zero-day exploits (including BlueHammer, MiniPlasma, RedSun, UnDefend, and the YellowKey BitLocker bypass) specifically in protest of Microsoft's handling of its bug bounty and vulnerability disclosure programs, signaling an ongoing adversarial relationship between Microsoft and an independent researcher.","Microsoft attributed the BitLocker bypass (CVE-2026-50507) to an anonymous researcher, but BleepingComputer independently linked it to the previously disclosed YellowKey vulnerability, suggesting Microsoft's public crediting may obscure the actual source and history of disclosed flaws.","The HTTP/2 Bomb fix required Microsoft to introduce a new opt-in 'MaxHeadersCount' registry setting rather than a default patch, meaning administrators must take manual configuration action (per KB5102602) to fully protect their HTTP/2 and HTTP/3 servers from the denial-of-service attack.","All three zero-days this month were publicly disclosed but not exploited in attacks, and the YellowKey BitLocker flaw can be triggered via physical access by booting into Windows Recovery Environment and holding the CTRL key, highlighting that physical-access attacks against TPM-only BitLocker configurations remain a viable threat that TPM+PIN authentication can mitigate.","The reported figure of 200 flaws notably excludes a massive 360 Microsoft Edge/Chromium vulnerabilities patched by Google in the same month, indicating the true scope of browser-related fixes dwarfs the headline Patch Tuesday count."],"referencedReports":[{"title":"Control the maximum number of HTTP/2 and HTTP/3 request headers in Windows clients and servers","url":"https://support.microsoft.com/en-us/topic/control-the-maximum-number-of-http-2-and-http-3-request-headers-in-windows-clients-and-servers-084da156-7a99-4abf-b759-f973c35eded3","publisher":"Microsoft","context":"Referenced as Microsoft's support bulletin explaining how to use the new MaxHeadersCount registry setting to mitigate the HTTP/2 Bomb denial-of-service attack.","category":"","primary":false},{"title":"CVE-2026-45586 - Windows Collaborative Translation Framework (CTFMON) Elevation of Privilege Vulnerability","url":"https://msrc.microsoft.com/update-guide/en-US/advisory/CVE-2026-45586","publisher":"Microsoft Security Response Center","context":"Microsoft advisory for the publicly disclosed CTFMON elevation of privilege zero-day patched this month.","category":"","primary":false},{"title":"CVE-2026-49160 - HTTP.sys Denial of Service Vulnerability","url":"https://msrc.microsoft.com/update-guide/en-US/advisory/CVE-2026-49160","publisher":"Microsoft Security Response Center","context":"Microsoft advisory for the publicly disclosed HTTP/2 Bomb denial-of-service zero-day.","category":"","primary":false},{"title":"CVE-2026-50507 - Windows BitLocker Security Feature Bypass Vulnerability","url":"http://msrc.microsoft.com/update-guide/en-US/advisory/CVE-2026-50507","publisher":"Microsoft Security Response Center","context":"Microsoft advisory for the publicly disclosed BitLocker bypass zero-day, identified by BleepingComputer as the YellowKey vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft\u0026rsquo;s June 2026 Patch Tuesday delivers security updates for 200 flaws, including 33 vulnerabilities rated \u0026ldquo;Critical\u0026rdquo; and three publicly disclosed zero-day vulnerabilities. None of the three zero-days are known to have been exploited in attacks. The critical bugs break down into 28 remote code execution, 4 elevation of privilege, and 1 information disclosure flaw.\u003c/p\u003e\n\n\u003cp\u003eThe three publicly disclosed zero-days are CVE-2026-45586, a Windows CTFMON elevation of privilege flaw granting SYSTEM privileges; CVE-2026-49160, the HTTP/2 Bomb denial-of-service flaw in HTTP.sys; and CVE-2026-50507, a Windows BitLocker security feature bypass that BleepingComputer linked to the previously disclosed YellowKey vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe count excludes flaws fixed earlier in the month for products such as Mariner, Azure HorizonDB, and Microsoft Copilot, as well as 360 Microsoft Edge/Chromium flaws fixed by Google. To mitigate the HTTP/2 Bomb attack, Microsoft introduced a new \u0026ldquo;MaxHeadersCount\u0026rdquo; registry setting to limit the number of headers in HTTP/2 and HTTP/3 requests.\u003c/p\u003e\n"},{"n":21,"title":"Wait, binding.gyp Can Do What? Exploring npm's Weirdest Build System","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/exploring-binding-gyp-npm-build-system","time":"13:25","priority":"MUST READ","score":96,"tldr":"The Miasma npm worm has evolved to hide its install-time code execution inside binding.gyp files rather than package.json hooks, exploiting node-gyp's command expansions, Python eval sandbox escapes, auto-included files, compiler hijacking, and build actions. This means a package with a completely clean package.json can still run malicious code during npm install, making such files require the same scrutiny as preinstall/postinstall hooks.","briefOverview":"\u003cp\u003eJust days after the Miasma worm compromised 32 official Red Hat npm packages by adding malicious preinstall scripts, a new wave of the attack spread to packages including @vapi-ai/server-sdk (71k weekly downloads) and ai-sdk-ollama (31k weekly downloads). The new variant moved its install-time trigger out of package.json entirely and into binding.gyp, a build file that npm automatically executes via node-gyp when present in a package root, meaning a package with a completely clean package.json can still run malicious code at install time.\u003c/p\u003e\n\n\u003cp\u003eThe article is a technical deep dive into how binding.gyp can be abused. node-gyp reads binding.gyp to compile native C/C++ add-ons, and the mere presence of the file triggers node-gyp rebuild during installation. Miasma exploited GYP\u0026rsquo;s command expansion syntax (\u0026lt;!(\u0026hellip;)) inside a sources field to run node index.js silently while echoing a harmless stub filename so the build appeared normal.\u003c/p\u003e\n\n\u003cp\u003eBeyond command expansion, the article details that binding.gyp is parsed with Python\u0026rsquo;s eval (with stripped builtins), which can be escaped to run arbitrary Python and shell commands. It further covers payloads hidden in included files, auto-included files, persistent home-directory includes, dependency references, compiler hijacking, and documented features like actions, rules, and postbuilds. The key takeaway is that the presence of binding.gyp should be treated with the same suspicion as preinstall/postinstall hooks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOnly days after the Miasma attack compromised 32 official Red Hat packages on npm, where a worm added a malicious preinstall script so that node index.js ran automatically on install to harvest cloud credentials, CI tokens, and SSH keys, the campaign spread further across npm, PyPI, and GitHub. Affected packages in the new wave include @vapi-ai/server-sdk (71k weekly downloads) and ai-sdk-ollama (31k weekly downloads).\u003c/p\u003e\n\n\u003cp\u003eThe new variant\u0026rsquo;s central trick is that it no longer relies on package.json lifecycle hooks. It moved its trigger into binding.gyp, a JSON-like file (technically a Python literal) read by node-gyp to compile native add-ons. When npm installs a package and finds a binding.gyp in its root, it automatically runs node-gyp rebuild, so a clean package.json with zero install scripts is no longer evidence that nothing runs. The Miasma payload used GYP\u0026rsquo;s command expansion syntax, embedding \u0026lt;!(node index.js \u0026gt; /dev/null 2\u0026gt;\u0026amp;1 \u0026amp;\u0026amp; echo stub.c) in a sources array so the malicious payload ran silently while echoing a harmless filename to keep the build looking normal.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that GYP offers several expansion flavors (\u0026lt;!(command), \u0026lt;!@(command), pymod_do_main, and file-creating \u0026lt;|(\u0026hellip;)), all of which execute at parse time before compilation. Critically, GYP does not scope expansion to documented fields; it recursively walks the entire parsed structure and expands tokens under any key at any depth, including invented keys like some_random_key, making review difficult.\u003c/p\u003e\n\n\u003cp\u003eWorse, because binding.gyp is handed to Python\u0026rsquo;s eval (called as eval(file_contents, {\u0026rdquo;\u003cstrong\u003ebuiltins\u003c/strong\u003e\u0026rdquo;: {}}, None) to strip builtins), the sandbox can be escaped. A single Python expression starting from an empty tuple traverses object subclasses to catch_warnings and recovers \u003cstrong\u003eimport\u003c/strong\u003e to load os and run shell commands. This can be hidden in normal-looking variables like openssl_fips or inside condition strings, which GYP also evaluates via eval.\u003c/p\u003e\n\n\u003cp\u003eThe article catalogs additional vectors: payloads in files pulled via the includes key (which can be named anything and are transitive), auto-included files config.gypi and common.gypi, and the persistent ~/.gyp/include.gypi in the user\u0026rsquo;s home directory that affects every future native install; target dependencies pointing at other gyp files; compiler hijacking through make_global_settings (CC, CXX, *_wrapper) or malicious $(shell \u0026hellip;) flags in cflags/CFLAGS; and documented command-running features actions, rules, and postbuilds.\u003c/p\u003e\n\n\u003cp\u003eThe overarching conclusion is that binding.gyp runs code at install time exactly like a preinstall or postinstall hook and deserves the same suspicion. The article notes Aikido detects the Miasma campaign as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical malware issue, rescans nightly, and offers Device Protection and the open-source Safe Chain tool that intercepts npm, npx, yarn, pnpm, and pnpx commands to check packages against Aikido Intel before install.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"background-and-event\"\u003eBackground and Event\u003c/h2\u003e\n\n\u003cp\u003eThe article opens with the Miasma worm, which had recently compromised 32 official Red Hat packages on npm. The worm added a malicious preinstall script to each compromised package so that node index.js ran automatically the moment the dependency was installed, harvesting cloud credentials, CI tokens, SSH keys, and more before any of the victim\u0026rsquo;s own code ran. In the days that followed, Miasma spread beyond its initial targets across npm, PyPI, and GitHub, hitting packages including @vapi-ai/server-sdk (71k weekly downloads) and ai-sdk-ollama (31k weekly downloads).\u003c/p\u003e\n\n\u003cp\u003eThe new wave introduces a new trick: instead of using a preinstall or postinstall hook in package.json, it moved the trigger into binding.gyp, a file npm will execute at install time. As a result, auditing package.json and seeing no lifecycle hooks no longer proves a package is safe.\u003c/p\u003e\n\n\u003ch2 id=\"what-node-gyp-and-binding-gyp-are\"\u003eWhat node-gyp and binding.gyp Are\u003c/h2\u003e\n\n\u003cp\u003eMany npm packages ship native C/C++ add-ons that must be compiled before Node can load them. node-gyp is the cross-platform build tool npm bundles and invokes for this. It wraps GYP (Generate Your Projects), a build system Google created for Chromium and later abandoned; node-gyp now uses a Node.js-maintained fork. node-gyp reads binding.gyp from the package root to know what to build. The file is JSON-like but technically a Python literal. Crucially, when npm installs a package and notices a binding.gyp in its root, it automatically runs node-gyp rebuild without any script registered in package.json. The mere presence of the file is enough for code to run during installation.\u003c/p\u003e\n\n\u003ch2 id=\"how-miasma-exploited-it\"\u003eHow Miasma Exploited It\u003c/h2\u003e\n\n\u003cp\u003eThe worm dropped a binding.gyp with a target named Setup whose sources array contained the string \u003ccode\u003e\u0026lt;!(node index.js \u0026gt; /dev/null 2\u0026gt;\u0026amp;1 \u0026amp;\u0026amp; echo stub.c)\u003c/code\u003e. The \u003ccode\u003e\u0026lt;!(...)\u003c/code\u003e syntax is a GYP command expansion: GYP runs the enclosed shell command and substitutes its output. So node-gyp executed node index.
