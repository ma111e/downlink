ects were compromised to inject an information stealer into the code. A Microsoft spokesperson said some repositories have been restored after review while others may remain offline as the investigation continues, and that the company notified a small number of customers who may have pulled down content from the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eThe incident is part of an ongoing software supply chain campaign codenamed Miasma. Among the infected projects was \u0026lsquo;durabletask,\u0026rsquo; a Python package first compromised by a cybercrime group known as TeamPCP to deliver an information stealer targeting Linux systems.\u003c/p\u003e\n\n\u003cp\u003eFurther analysis revealed that the Miasma payload can trigger automatic code execution when a developer opens the repository in an AI-powered coding tool or IDE. The malware harvests high-value secrets from developer workstations and CI/CD environments and exfiltrates them to a public GitHub repository.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed on Monday that it temporarily removed some GitHub repositories in response to a recent security incident that resulted in 73 of its open-source projects being compromised to inject an information stealer into the code. A Microsoft spokesperson stated that protecting customers and the broader ecosystem is the priority, that some repositories were restored after review, and that others may remain offline while work continues.\u003c/p\u003e\n\n\u003cp\u003eThe company also said it notified a small number of customers who may have pulled down content from the affected repositories, and that it would reach out directly through established support channels if anything further requiring customer action is identified. The disclosure came days after Microsoft cut off access to dozens of its open-source GitHub projects following reports they were compromised as part of an ongoing software supply chain campaign codenamed Miasma.\u003c/p\u003e\n\n\u003cp\u003eAmong the infected projects was \u0026lsquo;durabletask,\u0026rsquo; a Python package first compromised by a cybercrime group known as TeamPCP to deliver an information stealer designed for Linux systems. Analysis of the Miasma payload uncovered the ability to trigger automatic code execution when an unsuspecting developer opens the repository in an AI-powered coding tool or IDE.\u003c/p\u003e\n\n\u003cp\u003eThe campaign extends to a newer PyPI wave tied to the broader Mini Shai-Hulud, Miasma, and Hades waves, infecting an additional 23 packages. These included bioinformatics-related libraries used in graph learning, patient phenotyping, phenopacket tooling, and scientific workflows, as well as AI and Model Context Protocol (MCP)-themed packages and typosquat-style packages such as rsquests, tlask, and rlask that impersonate requests and flask, along with langchain-core-mcp.\u003c/p\u003e\n\n\u003cp\u003eAccording to Socket, the new cluster employs a new payload delivery mechanism, indicating the threat actors are adapting and experimenting with different methods. While earlier packages used executable .pth startup hooks to bootstrap Bun and run an obfuscated JavaScript stealer, the latest set uses trojanized native .abi3.so extensions that execute the stealer when the package is imported, and a .pth startup hook loader variant that searches sys.path for an \u0026lsquo;_index.js\u0026rsquo; payload rather than bundling it in the same wheel.\u003c/p\u003e\n\n\u003cp\u003eRegardless of method, the malware targets developer workstations and CI/CD environments, harvesting high-value secrets and exfiltrating them to a public GitHub repository. A key capability of the bioinformatics package is its ability to derail and bypass AI-powered scanners and analyst copilots via an adversarial prompt injection embedded within a JavaScript block comment, a feature previously detailed by StepSecurity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft on Monday confirmed that it temporarily removed some of its GitHub repositories in response to a recent security incident that led to 73 of its open-source projects being compromised to inject an information stealer into the code. The action is part of Microsoft\u0026rsquo;s response to an ongoing software supply chain campaign codenamed Miasma.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft\u0026rsquo;s Response\u003c/h2\u003e\n\n\u003cp\u003eA Microsoft spokesperson told The Hacker News:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u0026ldquo;Our priority is to protect customers and the broader ecosystem.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eSome repositories were temporarily removed while potential malicious content was investigated.\u003c/li\u003e\n\u003cli\u003eSome repositories have been restored after review, while others may remain offline while work continues.\u003c/li\u003e\n\u003cli\u003eMicrosoft notified a small number of customers who may have pulled down content from the affected repositories.\u003c/li\u003e\n\u003cli\u003eThe company will continue to investigate and reach out directly through established support channels if further customer action is required.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis disclosure came days after Microsoft cut off access to dozens of its open-source GitHub projects following reports they were compromised.\u003c/p\u003e\n\n\u003ch2 id=\"infected-microsoft-project\"\u003eInfected Microsoft Project\u003c/h2\u003e\n\n\u003cp\u003eAmong the projects that were infected was \u0026lsquo;durabletask,\u0026rsquo; a Python package first compromised last month by a cybercrime group known as TeamPCP to deliver an information stealer designed for Linux systems.\u003c/p\u003e\n\n\u003ch2 id=\"technical-capabilities-of-the-miasma-payload\"\u003eTechnical Capabilities of the Miasma Payload\u003c/h2\u003e\n\n\u003cp\u003eFurther analysis uncovered that the Miasma payload embedded into the projects can trigger automatic code execution when an unsuspecting developer opens the repository in an AI-powered coding tool or integrated development environment (IDE).\u003c/p\u003e\n\n\u003ch2 id=\"broader-campaign-and-pypi-wave\"\u003eBroader Campaign and PyPI Wave\u003c/h2\u003e\n\n\u003cp\u003eThe incident is part of a sustained software supply chain campaign that has breached widely used open-source packages to plant malware capable of propagating to downstream users. A newer PyPI wave tied to the broader Mini Shai-Hulud, Miasma, and Hades waves infected an additional 23 packages, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBioinformatics-related libraries used in graph learning, patient phenotyping, phenopacket tooling, and scientific workflows\u003c/li\u003e\n\u003cli\u003eAI and Model Context Protocol (MCP)-themed packages\u003c/li\u003e\n\u003cli\u003eTyposquat-style packages such as rsquests, tlask, and rlask that impersonate requests and flask, plus langchain-core-mcp\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe complete list of legitimate and bait packages includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edreamgen 1.8.1\u003c/li\u003e\n\u003cli\u003eembiggen 0.11.97\u003c/li\u003e\n\u003cli\u003eensmallen 0.8.101\u003c/li\u003e\n\u003cli\u003egpsea 0.9.14\u003c/li\u003e\n\u003cli\u003einstructor-mcp 1.15.2, 1.15.3\u003c/li\u003e\n\u003cli\u003elangchain-core-mcp 1.4.2, 1.4.3\u003c/li\u003e\n\u003cli\u003emem8 6.0.1\u003c/li\u003e\n\u003cli\u003emflux-streamlit 0.0.3, 0.0.4\u003c/li\u003e\n\u003cli\u003eopenai-mcp 2.41.1, 2.41.2\u003c/li\u003e\n\u003cli\u003eorchestr8-platform 3.3.2\u003c/li\u003e\n\u003cli\u003ephenopacket-store-toolkit 0.1.7\u003c/li\u003e\n\u003cli\u003eppkt2synergy 0.1.1\u003c/li\u003e\n\u003cli\u003epyphetools 0.9.120\u003c/li\u003e\n\u003cli\u003eray-mcp-server 0.2.1\u003c/li\u003e\n\u003cli\u003erlask 3.1.7\u003c/li\u003e\n\u003cli\u003ersquests 2.34.3\u003c/li\u003e\n\u003cli\u003etiktoken-mcp 0.13.1, 0.13.2\u003c/li\u003e\n\u003cli\u003etlask 3.1.4\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evolving-delivery-mechanisms\"\u003eEvolving Delivery Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eAccording to Socket, the new cluster employs a new payload delivery mechanism, indicating the threat actors are adapting and actively experimenting with different methods as part of a \u0026ldquo;fast-moving supply chain campaign.\u0026rdquo; While earlier packages used executable .pth startup hooks to bootstrap Bun and run an obfuscated JavaScript stealer, the latest set incorporates:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTrojanized native .abi3.so extensions that execute the stealer when the package is imported\u003c/li\u003e\n\u003cli\u003eA .pth startup hook loader variant that searches sys.path for the \u0026lsquo;_index.js\u0026rsquo; payload instead of bundling the payload in the same wheel\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket noted that this last variant \u0026ldquo;separates the loader from the JavaScript payload, which could make the package look less obviously malicious during static analysis.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eRegardless of the method used, the end result is the same: once executed, the malware targets developer workstations and CI/CD environments, harvesting high-value secrets and exfiltrating them to a public GitHub repository.\u003c/p\u003e\n\n\u003ch2 id=\"ai-evasion\"\u003eAI Evasion\u003c/h2\u003e\n\n\u003cp\u003eA key capability of the bioinformatics package is its ability to derail and bypass AI-powered scanners and analyst copilots through an adversarial prompt injection embedded within a JavaScript block comment, a feature previously detailed by StepSecurity.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-commentary\"\u003eResearcher Commentary\u003c/h2\u003e\n\n\u003cp\u003eSocket researcher Kirill Boychenko said: \u0026ldquo;The Hades branch of the Shai-Hulud and Miasma activity is best understood as a fast-moving supply chain campaign, not a single package incident. The langchain-core-mcp variant goes further by installing a .pth loader that searches sys.path for _index.js, meaning the loader and payload do not need to live in the same wheel.\u0026rdquo;\u003c/p\u003e\n","keyPoints":["Microsoft confirmed it temporarily removed some GitHub repositories in response to a security incident that led to 73 of its open-source projects being compromised to inject an information stealer, restoring some repos after review while others remain offline.","Microsoft notified a small number of customers who may have pulled down content from the affected repositories and said it will reach out directly if further customer action is required.","Among the infected projects was 'durabletask,' a Python package first compromised by the cybercrime group TeamPCP to deliver an information stealer targeting Linux systems.","The Miasma payload can trigger automatic code execution when a developer opens the repository in an AI-powered coding tool or IDE, and a newer PyPI wave tied to Mini Shai-Hulud, Miasma, and Hades infected 23 additional packages, including bioinformatics and MCP/AI-themed and typosquatted packages.","The new package cluster uses evolving payload delivery mechanisms such as trojanized native .abi3.so extensions and a .pth loader that searches sys.path for a separate _index.js payload, while the malware harvests secrets from developer workstations and CI/CD environments and exfiltrates them to a public GitHub repository."],"insights":["The attackers weaponize the rise of AI-assisted development by designing payloads that auto-execute the moment a repository is opened in an AI-powered coding tool or IDE, turning the act of inspecting suspicious code into the trigger for compromise.","The malware embeds adversarial prompt injection inside JavaScript block comments specifically to derail and bypass AI-powered scanners and analyst copilots, meaning defenders relying on AI-based review tools may be deliberately blinded to the threat.","The Hades variant decouples the .pth loader from the JavaScript payload by having the loader search sys.path for a separate _index.js file rather than bundling both in the same wheel, a design choice intended to evade static analysis by making the package appear less obviously malicious.","The campaign exfiltrates stolen secrets to public GitHub repositories, abusing trusted infrastructure as the exfiltration channel rather than attacker-controlled servers, which can complicate detection and takedown.","The rapid evolution across Mini Shai-Hulud, Miasma, and Hades waves—shifting from .pth/Bun JavaScript stealers to trojanized native .abi3.so extensions—shows the actors are actively experimenting with multiple delivery techniques rather than running a single static operation."],"referencedReports":[{"title":"Mini Shai-Hulud, Miasma, and Hades Worms Target Bioinformatics and MCP Developers via Malicious Packages","url":"https://socket.dev/blog/mini-shai-hulud-miasma-and-hades-worms-target-bioinformatics-and-mcp-developers-via-malicious","publisher":"Socket","context":"The article cites Socket's analysis describing the new payload delivery mechanism and the broader fast-moving supply chain campaign, including quotes from Socket researcher Kirill Boychenko.","category":"","primary":false},{"title":"Hades PyPI Attack: 19 Packages Poisoned","url":"https://thehackernews.com/2026/06/hades-pypi-attack-19-packages-poisoned.html","publisher":"The Hacker News","context":"Referenced for details on the bioinformatics-related libraries affected and the adversarial prompt injection technique previously detailed by StepSecurity.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft on Monday confirmed it temporarily removed some of its GitHub repositories following a security incident in which 73 of its open-source projects were compromised to inject an information stealer into the code. A Microsoft spokesperson said some repositories have been restored after review while others may remain offline as the investigation continues, and that the company notified a small number of customers who may have pulled down content from the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eThe incident is part of an ongoing software supply chain campaign codenamed Miasma. Among the infected projects was \u0026lsquo;durabletask,\u0026rsquo; a Python package first compromised by a cybercrime group known as TeamPCP to deliver an information stealer targeting Linux systems.\u003c/p\u003e\n\n\u003cp\u003eFurther analysis revealed that the Miasma payload can trigger automatic code execution when a developer opens the repository in an AI-powered coding tool or IDE. The malware harvests high-value secrets from developer workstations and CI/CD environments and exfiltrates them to a public GitHub repository.\u003c/p\u003e\n"},{"n":3,"title":"Technical Analysis of MLTBackdoor","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/technical-analysis-mltbackdoor","time":"16:26","priority":"SHOULD READ","score":86,"tldr":"Zscaler ThreatLabz analyzed MLTBackdoor, a newly identified and heavily obfuscated backdoor likely tied to ransomware activity that is delivered through a ClickFix infection chain. Its key risk is that it maintains resilient C2 access via DGA and encrypted communications while using a BOF loader to dynamically expand post-exploitation capabilities.","briefOverview":"\u003cp\u003eZscaler ThreatLabz identified a new malware family in May 2026 that it tracks as MLTBackdoor. The malware is likely leveraged by a ransomware-related threat actor and was observed being delivered through a multi-stage ClickFix infection chain. ThreatLabz describes it as a post-exploitation backdoor that can establish a foothold for lateral movement.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor includes built-in filesystem commands such as downloading, uploading, listing, deleting, renaming, and creating files or folders. Its most significant extensibility feature is a Beacon Object File loader, which allows the malware to dynamically add new capabilities. The loader is compatible with a subset of Cobalt Strike-style Beacon imports and also routes additional Beacon-prefixed imports to MLTBackdoor’s own indirect system call wrappers.\u003c/p\u003e\n\n\u003cp\u003eThe malware is heavily obfuscated using Mixed Boolean-Arithmetic and Control Flow Flattening, and it uses stack-built strings, API hashing, and indirect system calls to complicate analysis and evade user-mode hooks. It also performs multiple anti-analysis checks and sends the results as a bitmask during its initial communication. Its command-and-control traffic uses a custom encrypted binary protocol over TLS on port 443, with ECDH key exchange, AES-256-GCM encryption, hardcoded domains, and in some samples a date-based DGA for resilience.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz reported that it identified MLTBackdoor in May 2026 as a new malware family likely used by a ransomware-related threat actor. The malware was observed in a multi-stage ClickFix infection chain that began on an automotive-related web page. If the victim copied, pasted, and executed the lure content, commands downloaded an archive containing endpointdlp.dll and an encrypted data.bin payload.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage endpointdlp.dll decrypts the RC4-encrypted data.bin file, whose header contains the payload size, a 32-byte RC4 key, and the encrypted payload. The decrypted payload is MLTBackdoor itself. The malware first performs a self-update, then reuses the endpointdlp.dll filename and sideloads it through the legitimate signed Microsoft Defender executable mpextms.exe.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor is designed to make static and dynamic analysis difficult. It uses an LLVM-based obfuscator with extensive Mixed Boolean-Arithmetic and Control Flow Flattening, and the article states that around 95% of its code consists of extra unnecessary calculations. It also constructs strings byte-by-byte on the stack, resolves APIs at runtime using DJB2 hashing, and uses a Hell’s Gate-style indirect system call technique.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes several anti-analysis checks, including hypervisor detection, timing checks, debugger detection, process and window-title checks, sandbox driver checks, RAM and CPU-count checks, and uptime checks. Detection does not stop execution; instead, MLTBackdoor aggregates the results of 10 checks into a bitmask and sends it as part of its initial request. ThreatLabz also provided cracked SHA256 hashes for process names used in these checks.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor supports a small set of built-in commands for filesystem operations, including download, upload, ls, delete, rename, and mkdir. Its BOF loader expands those capabilities by mapping and executing Microsoft COFF Beacon Object Files inside its own process. The loader handles sections, symbols, relocations, memory permissions, crashes, entry-point location, and cleanup.\u003c/p\u003e\n\n\u003cp\u003eFor command-and-control, MLTBackdoor uses a custom encrypted binary protocol over TLS on port 443 with the path /api/v1/telemetry and the User-Agent Microsoft-Delivery-Optimization/10.1. It performs an ECDH key exchange using NIST P-256 and derives an AES-256-GCM session key for subsequent encrypted messages. Some samples use hardcoded C2 domains, some use a date-based DGA, and others use both; ThreatLabz listed several indicators including file hashes and domains such as hrs2y15sungu[.]com, carrolc[.]com, cwrtwright[.]com, thomphon[.]com, and powwowski[.]com/payloads/update.zip.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz identified a new malware family in May 2026 that it tracks as MLTBackdoor. The article describes MLTBackdoor as likely leveraged by a ransomware-related threat actor. ThreatLabz observed the malware being delivered through a multi-stage ClickFix infection chain.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor provides built-in filesystem-related capabilities and can expand its functionality by loading Beacon Object Files. The article characterizes this BOF loader as one of the malware’s most powerful features. ThreatLabz also emphasizes the malware’s heavy obfuscation, anti-analysis features, encrypted network protocol, and use of a domain generation algorithm.\u003c/p\u003e\n\n\u003ch2 id=\"initial-infection-chain\"\u003eInitial infection chain\u003c/h2\u003e\n\n\u003cp\u003eThe observed infection chain begins with a ClickFix lure on an automotive-related web page. If a victim copies, pastes, and executes the ClickFix content, commands are run through conhost.exe and cmd to create a temporary directory, download a file with curl, extract it with tar, delete the archive, and execute endpointdlp.dll with rundll32.\u003c/p\u003e\n\n\u003cp\u003eThe downloaded archive contains two files:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edata.bin\u003c/li\u003e\n\u003cli\u003eendpointdlp.dll\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe endpointdlp.dll file decrypts the RC4-encrypted data.bin file. The article states that the decryption key is stored in the payload header, which contains a payload size, a 32-byte RC4 key, and the encrypted payload. The decrypted payload is MLTBackdoor itself.\u003c/p\u003e\n\n\u003cp\u003eAfter decryption, MLTBackdoor performs a self-update. It then reuses the endpointdlp.dll filename and sideloads it through a legitimate signed Microsoft Defender executable named mpextms.exe.\u003c/p\u003e\n\n\u003ch2 id=\"obfuscation-and-analysis-resistance\"\u003eObfuscation and analysis resistance\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor uses several methods to hinder analysis. The article says it uses indirect system calls, API hashing, and obfuscation methods applied at compilation time with an LLVM-based obfuscator.\u003c/p\u003e\n\n\u003ch3 id=\"mixed-boolean-arithmetic\"\u003eMixed Boolean-Arithmetic\u003c/h3\u003e\n\n\u003cp\u003eMLTBackdoor uses Mixed Boolean-Arithmetic obfuscation to rewrite simple arithmetic expressions into mathematically equivalent but much more complex expressions. ThreatLabz provides examples showing that noisy multi-line expressions collapse into simple operations after replacing bitwise-not expressions such as \u003ccode\u003e~x\u003c/code\u003e with \u003ccode\u003e-x - 1\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that MLTBackdoor uses MBA so extensively that around 95% of its code consists of extra, unnecessary calculations. This makes the malware’s logic harder to follow during reverse engineering.\u003c/p\u003e\n\n\u003ch3 id=\"control-flow-flattening\"\u003eControl Flow Flattening\u003c/h3\u003e\n\n\u003cp\u003eMLTBackdoor also uses Control Flow Flattening. This technique replaces normal conditional logic with a large loop and switch-based state machine, which obscures the real execution order of code blocks.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz notes two additional complications in MLTBackdoor’s CFF implementation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe state value is stored at a stack offset and XORed before each comparison.\u003c/li\u003e\n\u003cli\u003eThe calculation of the next state is wrapped in MBA.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"stack-built-strings\"\u003eStack-built strings\u003c/h3\u003e\n\n\u003cp\u003eThe malware does not generally encrypt or encode strings. Instead, it constructs strings at runtime byte-by-byte on the stack.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that this becomes more difficult to analyze when combined with MBA and CFF. For example, a C2 domain such as cwrtwright[.]com may be constructed through multiple functions and stitched together, while the flattened state machine fragments the string-building logic. ThreatLabz states that this defeats tools such as FLOSS that look for consecutive characters in memory.\u003c/p\u003e\n\n\u003ch2 id=\"api-resolution-and-indirect-system-calls\"\u003eAPI resolution and indirect system calls\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor resolves Win32 APIs, system calls, and Beacon Object File symbols at runtime using DJB2 hashing. ThreatLabz observed three hashing patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNormal WinAPI lookups, such as \u003ccode\u003edjb2(\u0026quot;WinHttpConnect\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eLowercase API name lookups, such as \u003ccode\u003edjb2(\u0026quot;enumwindows\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eBeacon-prefixed lookups, such as \u003ccode\u003edjb2(\u0026quot;BeaconNtCreateFile\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware also uses a Hell’s Gate-style indirect system call technique. At startup, it walks ntdll exports, matches them against a list of 31 Nt-function hashes, and builds a runtime table containing hashes, system service numbers, and syscall gadget addresses. When it needs to call a Windows API function, it calls its own wrapper, looks up the hash, retrieves the system service number and gadget address, and jumps to the corresponding ntdll system call address.\u003c/p\u003e\n\n\u003cp\u003eThe article lists the Nt APIs covered by the malware’s resolved hashes, including NtAllocateVirtualMemory, NtProtectVirtualMemory, NtFreeVirtualMemory, NtWriteVirtualMemory, NtCreateThreadEx, NtQueryInformationProcess, NtQuerySystemInformation, NtOpenProcess, NtClose, NtOpenFile, NtCreateFile, NtReadFile, NtWriteFile, and several registry-related calls.\u003c/p\u003e\n\n\u003ch2 id=\"anti-analysis-behavior\"\u003eAnti-analysis behavior\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor includes multiple anti-analysis techniques for detecting debuggers and sandboxed environments. The article explicitly notes that detection does not halt execution. Instead, the malware aggregates the results of 10 checks into a bitmask and sends that bitmask as part of its initial request.\u003c/p\u003e\n\n\u003cp\u003eThe documented checks include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHypervisor checks that look for known virtualization vendor IDs such as VMwareVMware, VBoxVBoxVBox, XenVMMXenVMM, and KVMKVMKVM.\u003c/li\u003e\n\u003cli\u003eAn additional hypervisor-related check that treats some other hypervisor vendor IDs differently and accounts for Windows \u003csup\u003e10\u003c/sup\u003e\u0026frasl;\u003csub\u003e11\u003c/sub\u003e hosts with Virtualization-Based Security enabled.\u003c/li\u003e\n\u003cli\u003eA timing check using repeated RDTSC, CPUID, and RDTSC loops.\u003c/li\u003e\n\u003cli\u003eA debugger check using NtQueryInformationProcess with the ProcessDebugPort information class.\u003c/li\u003e\n\u003cli\u003eA process-name check that hashes running process names with SHA256 and compares them to a hardcoded list.\u003c/li\u003e\n\u003cli\u003eA window-title check using strings such as x64dbg, x32dbg, ollydbg, windbg, idapro, process monitor, process explorer, wireshark, fiddler, dnspy, and cff explorer.\u003c/li\u003e\n\u003cli\u003eA sandbox driver check for names such as vbox, vmci, vmhgfs, virtio, vioscsi, and xenbus.\u003c/li\u003e\n\u003cli\u003eA RAM check for systems below 2 GB.\u003c/li\u003e\n\u003cli\u003eA CPU-count check for systems with one processor.\u003c/li\u003e\n\u003cli\u003eAn uptime check for systems running less than five minutes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThreatLabz also includes an appendix of cracked SHA256 hashes corresponding to process names such as x64dbg.exe, x32dbg.exe, ollydbg.exe, windbg.exe, ida.exe, ida64.exe, procmon.exe, procmon64.exe, procexp.exe, procexp64.exe, wireshark.exe, fiddler.exe, pestudio.exe, dnspy.exe, vmtoolsd.exe, vboxservice.exe, df5serv.exe, cffexplorer.exe, autoruns.exe, and tcpview.exe.\u003c/p\u003e\n\n\u003ch2 id=\"built-in-capabilities\"\u003eBuilt-in capabilities\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor includes a small set of built-in commands focused on filesystem operations. The commands described in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edownload\u003c/code\u003e, which retrieves a file from the victim’s machine.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eupload\u003c/code\u003e, which drops a file on the victim’s machine.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003els\u003c/code\u003e, which lists files in a directory.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edelete\u003c/code\u003e, which deletes a file or folder.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003erename\u003c/code\u003e, which renames or moves a file or folder.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emkdir\u003c/code\u003e, which creates a new folder.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the BOF loader is what significantly increases MLTBackdoor’s capabilities beyond this built-in command set.\u003c/p\u003e\n\n\u003ch2 id=\"beacon-object-file-loader\"\u003eBeacon Object File loader\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor can load Beacon Object Files, which the article describes as Microsoft Common Object File Format compiled files containing sections, a symbol table, and relocations. The malware can map and execute BOFs inside its own process and then free them.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz describes the BOF dispatcher as performing the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreating one memory block per section.\u003c/li\u003e\n\u003cli\u003eWalking the COFF symbol table.\u003c/li\u003e\n\u003cli\u003eApplying relocations per section.\u003c/li\u003e\n\u003cli\u003eChanging section permissions to read and execute only.\u003c/li\u003e\n\u003cli\u003eHandling crashes and returning them as results.\u003c/li\u003e\n\u003cli\u003eLocating the entry point in the symbol table.\u003c/li\u003e\n\u003cli\u003eRemoving and freeing allocated memory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe BOF loader is compatible with Cobalt Strike beacons that rely on a small subset of DJB2-hashed imports. The article lists supported imports such as BeaconDataParse, BeaconDataInt, BeaconDataShort, BeaconDataLength, BeaconDataExtract, BeaconPrintf, and BeaconOutput.\u003c/p\u003e\n\n\u003cp\u003eA notable difference described by ThreatLabz is that the loader also includes 19 additional Beacon-prefixed cases that route calls to MLTBackdoor’s own indirect system call wrappers. These include wrappers for calls such as BeaconNtAllocateVirtualMemory, BeaconNtProtectVirtualMemory, BeaconNtFreeVirtualMemory, BeaconNtClose, BeaconNtCreateFile, BeaconNtOpenFile, BeaconNtReadFile, BeaconNtWriteFile, BeaconNtQueryInformationFile, BeaconNtSetInformationFile, BeaconNtQueryDirectoryFile, BeaconNtQuerySystemInformation, BeaconNtOpenProcessToken, BeaconNtQueryInformationToken, BeaconNtCreateKey, BeaconNtOpenKey, BeaconNtSetValueKey, BeaconNtDeleteValueKey, and BeaconNtDeleteKey.\u003c/p\u003e\n\n\u003ch2 id=\"network-communication\"\u003eNetwork communication\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor uses a custom encrypted binary protocol over TLS on port 443. The fixed HTTP path is \u003ccode\u003e/api/v1/telemetry\u003c/code\u003e, and the User-Agent is \u003ccode\u003eMicrosoft-Delivery-Optimization/10.1\u003c/code\u003e, which the article says is used to masquerade as legitimate traffic.\u003c/p\u003e\n\n\u003cp\u003eThe malware performs an Elliptic-Curve Diffie-Hellman key exchange using NIST curve P-256. It generates a new key pair per session and performs ECDH with a P-256 public key shared by the C2 server. The resulting shared secret is concatenated with both the session public key and the C2 server public key, then hashed with SHA256 to derive a shared secret used as an AES-256-GCM session key.\u003c/p\u003e\n\n\u003cp\u003eAfter the key exchange, subsequent messages are encrypted with the AES session key and a random 12-byte nonce. The article describes the packet structure as containing a header, encrypted payload, and a 16-byte AES-GCM tag.\u003c/p\u003e\n\n\u003ch2 id=\"dga-and-command-and-control-resilience\"\u003eDGA and command-and-control resilience\u003c/h2\u003e\n\n\u003cp\u003eSome MLTBackdoor samples use hardcoded stack-built C2 domains together with a DGA. Other samples rely only on hardcoded domains or only on the DGA.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the DGA as a deterministic date-based algorithm that generates a new domain per day. ThreatLabz states that the DGA is designed to maintain control of infected systems if hardcoded C2 domains are unreachable.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz notes that the domain generated for April 29, 2026, hrs2y15sungu[.]com, was used not only for C2 communication but also for the distribution campaign described in the infection-chain section.\u003c/p\u003e\n\n\u003ch2 id=\"protocol-naming-and-message-types\"\u003eProtocol naming and message types\u003c/h2\u003e\n\n\u003cp\u003eThreatLabz named the malware MLTBackdoor based on the first four magic bytes of the network communication protocol’s header. The magic value is \u003ccode\u003e0x014D4C54\u003c/code\u003e, represented as \u003ccode\u003e\\x01MLT\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe packet header includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA 32-bit magic value.\u003c/li\u003e\n\u003cli\u003eA 32-bit session ID.\u003c/li\u003e\n\u003cli\u003eA 32-bit message type.\u003c/li\u003e\n\u003cli\u003eA 32-bit payload length.\u003c/li\u003e\n\u003cli\u003eA 12-byte nonce.\u003c/li\u003e\n\u003cli\u003eA 4-byte unknown field.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe session ID consists of four random bytes generated through BCryptGenRandom and is regenerated on each handshake.\u003c/p\u003e\n\n\u003cp\u003eThe article lists supported message types for C2 communication, including check-in messages, BOF tasks, sleep commands, process exit, command execution results, ECDH key exchange, file download and upload operations, directory listing, delete, rename, mkdir, and BOF stdout.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-detections\"\u003eIndicators and detections\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Zscaler’s multilayered cloud security platform detects indicators related to MLTBackdoor. The listed threat name is Win64.Backdoor.MLTBackdoor.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz provides SHA256 indicators for several files, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA stage one loader.\u003c/li\u003e\n\u003cli\u003eAn archive containing the stage one loader and encrypted MLTBackdoor.\u003c/li\u003e\n\u003cli\u003eMLTBackdoor samples with domains and DGA.\u003c/li\u003e\n\u003cli\u003eMLTBackdoor samples using DGA only.\u003c/li\u003e\n\u003cli\u003eAn MLTBackdoor sample using domains only.\u003c/li\u003e\n\u003cli\u003eAn MLTBackdoor update sideload archive.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists domains associated with the campaign and C2 infrastructure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ehrs2y15sungu[.]com, described as a DGA domain also used in the distribution campaign.\u003c/li\u003e\n\u003cli\u003ecarrolc[.]com, described as an MLTBackdoor C2.\u003c/li\u003e\n\u003cli\u003ecwrtwright[.]com, described as an MLTBackdoor C2.\u003c/li\u003e\n\u003cli\u003ethomphon[.]com, described as an MLTBackdoor C2.\u003c/li\u003e\n\u003cli\u003epowwowski[.]com/payloads/update.zip, described as an MLTBackdoor update URL.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion-from-the-article\"\u003eConclusion from the article\u003c/h2\u003e\n\n\u003cp\u003eThreatLabz concludes that MLTBackdoor is a relatively new but formidable post-exploitation malware framework. The article emphasizes its filesystem access capabilities, BOF loader extensibility, CFF and MBA obfuscation, anti-analysis behavior, custom encrypted binary network protocol, and DGA-based backup communications. It also states that these features complicate reverse engineering, evade sandbox and analysis environments, and hinder takedown attempts by researchers and law enforcement.\u003c/p\u003e\n","keyPoints":["Zscaler ThreatLabz identified a new malware family called MLTBackdoor in May 2026 that is likely leveraged by a ransomware-related threat actor.","MLTBackdoor was observed being delivered through a multi-stage ClickFix infection chain that downloads an archive containing endpointdlp.dll and an RC4-encrypted data.bin payload.","MLTBackdoor is heavily obfuscated with Mixed Boolean-Arithmetic and Control Flow Flattening techniques and also uses stack-built strings, API hashing, indirect system calls, and multiple anti-analysis checks.","MLTBackdoor supports filesystem commands such as download, upload, ls, delete, rename, and mkdir, and includes a Beacon Object File loader to dynamically add capabilities.","MLTBackdoor uses a custom encrypted binary protocol over TLS on port 443 and can rely on hardcoded C2 domains, a domain generation algorithm, or both for command-and-control communication."],"insights":["MLTBackdoor does not stop running when it detects analysis environments; instead, it aggregates 10 anti-analysis results into a bitmask and sends them during the initial C2 key exchange.","The DGA domain hrs2y15sungu[.]com was used both for C2 communication and for malware distribution on April 29, 2026, showing that the backup domain mechanism can also support the infection chain itself.","MLTBackdoor’s BOF loader extends beyond standard Cobalt Strike-style imports by exposing 19 Beacon-prefixed indirect system call wrappers, allowing loaded BOFs to use the malware’s own syscall evasion layer.","The malware’s network protocol can be identified by the magic value 0x014D4C54, or \\x01MLT, which appears in every client-side and server-side packet header.","MLTBackdoor’s stack-built strings are fragmented across flattened state-machine logic, making automated string recovery tools such as FLOSS unreliable according to the article."],"referencedReports":[],"body":"\u003cp\u003eZscaler ThreatLabz identified a new malware family in May 2026 that it tracks as MLTBackdoor. The malware is likely leveraged by a ransomware-related threat actor and was observed being delivered through a multi-stage ClickFix infection chain. ThreatLabz describes it as a post-exploitation backdoor that can establish a foothold for lateral movement.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor includes built-in filesystem commands such as downloading, uploading, listing, deleting, renaming, and creating files or folders. Its most significant extensibility feature is a Beacon Object File loader, which allows the malware to dynamically add new capabilities. The loader is compatible with a subset of Cobalt Strike-style Beacon imports and also routes additional Beacon-prefixed imports to MLTBackdoor’s own indirect system call wrappers.\u003c/p\u003e\n\n\u003cp\u003eThe malware is heavily obfuscated using Mixed Boolean-Arithmetic and Control Flow Flattening, and it uses stack-built strings, API hashing, and indirect system calls to complicate analysis and evade user-mode hooks. It also performs multiple anti-analysis checks and sends the results as a bitmask during its initial communication. Its command-and-control traffic uses a custom encrypted binary protocol over TLS on port 443, with ECDH key exchange, AES-256-GCM encryption, hardcoded domains, and in some samples a date-based DGA for resilience.\u003c/p\u003e\n"},{"n":14,"title":"ServiceNow discloses security incident exposing customer data","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/servicenow-discloses-security-incident-exposing-customer-data/","time":"21:34","priority":"SHOULD READ","score":86,"tldr":"ServiceNow disclosed a security incident in which attackers exploited an unauthenticated API endpoint (reportedly /api/now/related_list_edit/create) to query data from customer instances, prompting a June 5, 2026 security update that restricted the endpoint to authenticated users. The flaw mainly affected customers on the Australia platform release or those with certain configuration changes on older releases, and ServiceNow has notified impacted customers directly.","briefOverview":"\u003cp\u003eServiceNow has disclosed a security incident in which attackers exploited an unauthenticated access flaw through a vulnerable API endpoint, allowing them to query data from customer instances. The company quietly notified affected customers through a support bulletin hidden behind its customer support login portal and through direct support cases after detecting anomalous activity. On June 5, 2026, ServiceNow applied a security update to hosted customer instances that changed the API endpoint configuration to limit access to authenticated users only.\u003c/p\u003e\n\n\u003cp\u003eServiceNow confirmed that attackers exploited the flaw to successfully query customer instance tables, though it did not disclose which specific data was accessed. ServiceNow instances commonly store sensitive enterprise information such as IT support tickets, employee records, internal documentation, asset inventories, and configuration details. The bulletin states the issue primarily impacts customers on the Australia platform release or those on older releases who made certain configuration changes.\u003c/p\u003e\n\n\u003cp\u003eServiceNow has opened support cases with affected customers, and those who have not received one are not believed to be affected. The company says it is still evaluating whether to publish a CVE for the issue. Administrators are advised to review logs for requests to the vulnerable endpoint, particularly from the IP address 51.159.98.241.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eServiceNow is warning customers about a security incident after attackers exploited an unauthenticated access flaw through a vulnerable API endpoint, enabling them to query data from customer instances. The company communicated the issue quietly, posting a support bulletin behind its customer support login portal and opening direct support cases after detecting anomalous activity related to the issue.\u003c/p\u003e\n\n\u003cp\u003eAccording to the bulletin, ServiceNow applied a security update to hosted customer instances on June 5, 2026. The update addressed a security issue that could allow an unauthenticated user, in certain circumstances, to gain greater access to ServiceNow instances than intended. The company said the update changes the API endpoint configuration to limit access to authenticated users only, and confirmed that attackers exploited the flaw to successfully query customer instance tables.\u003c/p\u003e\n\n\u003cp\u003eWhile ServiceNow did not disclose which data was accessed, instances commonly hold sensitive enterprise information, including IT support tickets, employee records, internal documentation, asset inventories, security incident reports, workflow data, and configuration details. Support case information has become an increasingly popular target for threat actors, as tickets can contain credentials, API tokens, internal documentation, and authentication secrets shared during troubleshooting.\u003c/p\u003e\n\n\u003cp\u003eAlthough ServiceNow has not publicly disclosed technical details, administrators discussing the incident on Reddit say the issue appears tied to a REST endpoint at /api/now/related_list_edit/create. One commenter claimed the endpoint was configured with requires_authentication=false, potentially allowing unauthenticated requests to access instance data, and that the security update set requires_authentication to true. Admins also shared indicators of compromise, including API requests from the IP address 51.159.98.241.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin states the issue primarily impacts customers running the Australia platform release or customers on older releases who made certain configuration changes. ServiceNow has opened support cases with affected customers, and those who have not received one are not believed to be affected. The company is still evaluating whether it will publish a CVE for the issue, and BleepingComputer did not receive a response to its inquiries before publication.\u003c/p\u003e\n\n\u003cp\u003eAdministrators are advised to review ServiceNow logs for requests to /api/now/related_list_edit, particularly from the IP address 51.159.98.241. Impacted organizations should review exposed tickets and records for sensitive information, rotate credentials or tokens shared through support workflows, and ensure API logging is enabled.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eServiceNow has disclosed a security incident in which attackers exploited an unauthenticated access flaw through a vulnerable API endpoint, allowing them to query data from customer instances. The company communicated the issue quietly, posting a support bulletin behind its customer support login portal and reaching out to impacted customers through direct support cases after detecting \u0026ldquo;anomalous activity\u0026rdquo; related to the issue.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-disclosure\"\u003eTimeline and Disclosure\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn June 5, 2026, ServiceNow applied a security update to hosted customer instances.\u003c/li\u003e\n\u003cli\u003eThe bulletin describing the incident is hidden behind ServiceNow\u0026rsquo;s customer support login portal.\u003c/li\u003e\n\u003cli\u003eServiceNow has opened support cases with affected customers; customers who have not received one are not believed to be affected.\u003c/li\u003e\n\u003cli\u003eBleepingComputer contacted ServiceNow after a reader alert, asking how long the activity had been ongoing, what caused the issue, and whether customer data had been stolen, but did not receive a response before publication.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-vulnerability\"\u003eThe Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eAccording to ServiceNow\u0026rsquo;s bulletin, the update \u0026ldquo;concerned a security issue that could allow an unauthenticated user, in certain circumstances, to gain greater access to ServiceNow instances than intended.\u0026rdquo; The fix changes the API endpoint configuration to limit access to authenticated users only.\u003c/p\u003e\n\n\u003cp\u003eWhile ServiceNow has not publicly disclosed technical details:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdministrators discussing the incident on Reddit say the issue appears tied to a REST endpoint at \u003ccode\u003e/api/now/related_list_edit/create\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eOne commenter claimed the endpoint was configured with \u003ccode\u003erequires_authentication=false\u003c/code\u003e, potentially allowing unauthenticated requests to access instance data.\u003c/li\u003e\n\u003cli\u003eThe security update released on Friday was allegedly used to set \u003ccode\u003erequires_authentication\u003c/code\u003e to \u003ccode\u003etrue\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"confirmed-impact\"\u003eConfirmed Impact\u003c/h2\u003e\n\n\u003cp\u003eServiceNow confirmed that attackers exploited this flaw to successfully query the customer instance tables. The company did not disclose which specific data was accessed. ServiceNow instances commonly store sensitive enterprise information, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIT support tickets\u003c/li\u003e\n\u003cli\u003eEmployee records\u003c/li\u003e\n\u003cli\u003eInternal documentation\u003c/li\u003e\n\u003cli\u003eAsset inventories\u003c/li\u003e\n\u003cli\u003eSecurity incident reports\u003c/li\u003e\n\u003cli\u003eWorkflow data\u003c/li\u003e\n\u003cli\u003eConfiguration details for corporate systems and services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that support case information has become an increasingly popular target for threat actors, as tickets can contain credentials, API tokens, internal documentation, and authentication secrets shared during troubleshooting.\u003c/p\u003e\n\n\u003ch2 id=\"affected-customers\"\u003eAffected Customers\u003c/h2\u003e\n\n\u003cp\u003eThe bulletin states the issue primarily impacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCustomers running the Australia platform release, or\u003c/li\u003e\n\u003cli\u003eCustomers on older releases who made certain configuration changes to their instances.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAs ServiceNow stated: \u0026ldquo;The security issue pertains to customers who are on the Australia platform release or made certain configuration changes to instances on releases prior to Australia.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAPI requests from the IP address \u003ccode\u003e51.159.98.241\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRequests to the vulnerable endpoint \u003ccode\u003e/api/now/related_list_edit\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eAdministrators and impacted organizations are advised to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReview ServiceNow logs for requests to \u003ccode\u003e/api/now/related_list_edit\u003c/code\u003e, particularly from the IP address \u003ccode\u003e51.159.98.241\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReview exposed tickets and records for sensitive information.\u003c/li\u003e\n\u003cli\u003eRotate credentials or tokens shared through support workflows.\u003c/li\u003e\n\u003cli\u003eEnsure API logging is enabled.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"outstanding-questions\"\u003eOutstanding Questions\u003c/h2\u003e\n\n\u003cp\u003eServiceNow says it is still evaluating whether it will publish a CVE for the issue. The duration of the malicious activity, the underlying cause, and whether customer data was stolen remained unanswered at the time of publication, as ServiceNow did not respond to BleepingComputer\u0026rsquo;s inquiries.\u003c/p\u003e\n","keyPoints":["ServiceNow disclosed a security incident in which attackers exploited an unauthenticated access flaw through a vulnerable API endpoint to query data from customer instances, and the company applied a security update to hosted customer instances on June 5, 2026.","The security update changed the API endpoint configuration to limit access to authenticated users only, and ServiceNow confirmed that attackers successfully queried customer instance tables.","Administrators discussing the incident on Reddit indicated the issue appears tied to a REST endpoint at /api/now/related_list_edit/create that was reportedly configured with requires_authentication=false, with the update setting it to true, and shared indicators of compromise including the IP address 51.159.98.241.","The bulletin states the issue primarily impacts customers running the Australia platform release or those on older releases who made certain configuration changes, and ServiceNow has opened support cases with affected customers while those not contacted are believed to be unaffected.","ServiceNow has not disclosed which data was accessed and is still evaluating whether to publish a CVE, and impacted organizations are advised to review exposed records, rotate credentials shared through support workflows, and ensure API logging is enabled."],"insights":["ServiceNow handled this incident quietly by hiding the bulletin behind its customer support login portal and notifying only affected customers via direct support cases rather than issuing a public disclosure, meaning organizations that received no support case are presumed unaffected and may not learn of the issue independently.","The root cause appears to be a misconfiguration rather than a code flaw, as the REST endpoint was reportedly set with requires_authentication=false, which explains why the issue mainly affects customers on the Australia release or those who made specific configuration changes on older releases.","ServiceNow's uncertainty over whether to even publish a CVE highlights how vendor-hosted SaaS configuration flaws can fall into a disclosure gray area where customers receive less formal vulnerability tracking than they would for on-premises software.","Support ticket data is a high-value target because tickets routinely contain credentials, API tokens, and authentication secrets shared during troubleshooting, which is why ServiceNow advises rotating any credentials exchanged through support workflows even without confirmation of what was stolen."],"referencedReports":[],"body":"\u003cp\u003eServiceNow has disclosed a security incident in which attackers exploited an unauthenticated access flaw through a vulnerable API endpoint, allowing them to query data from customer instances. The company quietly notified affected customers through a support bulletin hidden behind its customer support login portal and through direct support cases after detecting anomalous activity. On June 5, 2026, ServiceNow applied a security update to hosted customer instances that changed the API endpoint configuration to limit access to authenticated users only.\u003c/p\u003e\n\n\u003cp\u003eServiceNow confirmed that attackers exploited the flaw to successfully query customer instance tables, though it did not disclose which specific data was accessed. ServiceNow instances commonly store sensitive enterprise information such as IT support tickets, employee records, internal documentation, asset inventories, and configuration details. The bulletin states the issue primarily impacts customers on the Australia platform release or those on older releases who made certain configuration changes.\u003c/p\u003e\n\n\u003cp\u003eServiceNow has opened support cases with affected customers, and those who have not received one are not believed to be affected. The company says it is still evaluating whether to publish a CVE for the issue. Administrators are advised to review logs for requests to the vulnerable endpoint, particularly from the IP address 51.159.98.241.\u003c/p\u003e\n"},{"n":16,"title":"Microsoft releases Windows 10 KB5094127 extended security update","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-releases-windows-10-kb5094127-extended-security-update/","time":"18:35","priority":"SHOULD READ","score":86,"tldr":"Microsoft released the Windows 10 KB5094127 extended security update, which patches the June 2026 Patch Tuesday vulnerabilities (200 flaws including three zero-days) and adds Secure Boot certificate rollout monitoring, bringing systems to build 19045.7417. Microsoft also warns of a known issue where recent updates can trigger BitLocker recovery prompts on devices using a PCR7 TPM validation Group Policy, with a temporary workaround available while a permanent fix is developed.","briefOverview":"\u003cp\u003eMicrosoft has released the Windows 10 KB5094127 extended security update, which addresses the June 2026 Patch Tuesday vulnerabilities and introduces functionality to monitor the rollout of updated Secure Boot certificates that replace those expiring this month. The update is available to users running Windows 10 Enterprise LTSC or those enrolled in the ESU program, and can be installed via Windows Update.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, Windows 10 is updated to build 19045.7417, while Windows 10 Enterprise LTSC 2021 moves to build 19044.7417. Since Microsoft is no longer releasing new features for Windows 10, the update primarily contains security fixes and bug fixes, including remedies for 200 vulnerabilities (three of them publicly disclosed zero-days) addressed in the June 2026 Patch Tuesday.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also warns of a known issue that can trigger BitLocker recovery prompts on some systems after installing recent updates, primarily affecting devices configured with a specific BitLocker Group Policy involving PCR7 TPM validation. A temporary workaround is available while the company develops a permanent fix.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has released the Windows 10 KB5094127 extended security update, which fixes the June 2026 Patch Tuesday vulnerabilities and adds new functionality to monitor the rollout of updated Secure Boot certificates replacing those expiring this month. The update can be installed by users running Windows 10 Enterprise LTSC or those enrolled in the Extended Security Updates (ESU) program through Settings, Windows Update, and a manual \u0026lsquo;Check for Updates.\u0026rsquo;\u003c/p\u003e\n\n\u003cp\u003eAfter installing the update, Windows 10 is updated to build 19045.7417, and Windows 10 Enterprise LTSC 2021 is updated to build 19044.7417. As Microsoft is no longer releasing new features for Windows 10, the KB5094127 update primarily contains security updates and bug fixes, including those released as part of the June 2026 Patch Tuesday, which addressed 200 vulnerabilities including three publicly disclosed zero-day flaws.\u003c/p\u003e\n\n\u003cp\u003eThe update introduces several specific fixes. For File Explorer, it improves search, including support for Chinese text and UTF-8–encoded files without a byte order mark (BOM), with text displaying more clearly across search results, Content view, and tooltips. For Secure Boot, it enables dynamic status reporting in the Windows Security App and adds a new policy setting, LimitSecureBootRequiredServiceData, which, when enabled, limits the Secure Boot service data Windows sends by suppressing the event normally sent to Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe update also includes additional high confidence device targeting data, increasing coverage of devices eligible to automatically receive new Secure Boot certificates. Devices receive the new certificates only after demonstrating sufficient successful update signals, maintaining a controlled and phased rollout.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is also warning of a known issue that can trigger BitLocker recovery prompts on some Windows systems after installing recent updates. The issue primarily affects devices configured with a specific BitLocker Group Policy that explicitly includes PCR7 in the TPM validation profile, and certain Secure Boot and Windows Boot Manager configurations related to the newer Windows UEFI CA 2023 certificate.\u003c/p\u003e\n\n\u003cp\u003eAs a temporary workaround, Microsoft advises removing the Group Policy setting and then suspending and resuming BitLocker to regenerate the default PCR bindings while it works on a permanent fix.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has released the Windows 10 KB5094127 extended security update, which fixes the June 2026 Patch Tuesday vulnerabilities and adds new functionality to monitor the rollout of updated Secure Boot certificates that replace those expiring this month.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-installation\"\u003eAvailability and Installation\u003c/h2\u003e\n\n\u003cp\u003eThe update is targeted at users running Windows 10 Enterprise LTSC or those enrolled in the Extended Security Updates (ESU) program. Eligible users can install the update normally by going into Settings, clicking on Windows Update, and manually performing a \u0026lsquo;Check for Updates.\u0026rsquo;\u003c/p\u003e\n\n\u003cp\u003eAfter installation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 10 is updated to build 19045.7417.\u003c/li\u003e\n\u003cli\u003eWindows 10 Enterprise LTSC 2021 is updated to build 19044.7417.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"what-s-new-in-kb5094127\"\u003eWhat\u0026rsquo;s New in KB5094127\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is no longer releasing new features for Windows 10, so the KB5094127 update primarily contains security updates and bug fixes. It also includes fixes released as part of the June 2026 Patch Tuesday, which addressed 200 vulnerabilities, including three publicly disclosed zero-day flaws.\u003c/p\u003e\n\n\u003cp\u003eThe key fixes in the update include:\u003c/p\u003e\n\n\u003ch3 id=\"file-explorer\"\u003eFile Explorer\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eImproves File Explorer search, including support for Chinese text and UTF-8–encoded files without a byte order mark (BOM).\u003c/li\u003e\n\u003cli\u003eText now displays more clearly and consistently across search results, Content view, and tooltips.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"secure-boot\"\u003eSecure Boot\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnables dynamic status reporting for Secure Boot states in the Windows Security App.\u003c/li\u003e\n\u003cli\u003eAdds a new policy setting, \u003cstrong\u003eLimitSecureBootRequiredServiceData\u003c/strong\u003e, under Computer Configuration \u0026gt; Administrative Templates \u0026gt; Windows Components \u0026gt; Secure Boot. When enabled, Windows limits the Secure Boot service data it sends by suppressing the event normally sent to Microsoft. This policy is also included in the Windows Restricted Traffic Limited Functionality Baseline package.\u003c/li\u003e\n\u003cli\u003eIncludes additional high confidence device targeting data, increasing coverage of devices eligible to automatically receive new Secure Boot certificates. Devices receive the new certificates only after demonstrating sufficient successful update signals, maintaining a controlled and phased rollout.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"known-issue-bitlocker-recovery-prompts\"\u003eKnown Issue: BitLocker Recovery Prompts\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is warning of a known issue that can trigger BitLocker recovery prompts on some Windows systems after installing recent updates.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAffected devices:\u003c/strong\u003e Those configured with a specific BitLocker Group Policy that explicitly includes PCR7 in the TPM validation profile, and certain Secure Boot and Windows Boot Manager configurations related to the newer Windows UEFI CA 2023 certificate.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTemporary workaround:\u003c/strong\u003e Microsoft advises removing the Group Policy setting and then suspending and resuming BitLocker to regenerate the default PCR bindings.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStatus:\u003c/strong\u003e The company is working on a permanent fix.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThis update reflects the ongoing maintenance model for Windows 10 after the end of standard support, delivering security patches and select functional improvements to ESU and Enterprise LTSC customers. It also ties into the broader Secure Boot certificate transition, as expiring certificates are replaced with newer ones, a process that introduces both new monitoring functionality and a known BitLocker-related disruption that administrators must be prepared to mitigate.\u003c/p\u003e\n","keyPoints":["Microsoft released the Windows 10 KB5094127 extended security update, which is available to users running Windows 10 Enterprise LTSC or those enrolled in the ESU program, and updates systems to build 19045.7417 (or 19044.7417 for Enterprise LTSC 2021).","The update includes fixes from the June 2026 Patch Tuesday, which addressed 200 vulnerabilities including three publicly disclosed zero-day flaws.","KB5094127 improves File Explorer search and adds Secure Boot enhancements, including dynamic status reporting, a new LimitSecureBootRequiredServiceData policy setting, and additional device targeting data for the phased rollout of new Secure Boot certificates.","Microsoft warns of a known issue that can trigger BitLocker recovery prompts on devices configured with a BitLocker Group Policy that explicitly includes PCR7 in the TPM validation profile along with certain Secure Boot and Windows Boot Manager configurations tied to the Windows UEFI CA 2023 certificate.","As a temporary workaround for the BitLocker issue, Microsoft advises removing the Group Policy setting and then suspending and resuming BitLocker to regenerate the default PCR bindings while it works on a permanent fix."],"insights":["Despite Windows 10 having reached end of standard support, Microsoft continues delivering meaningful functional changes beyond pure security fixes—such as File Explorer search improvements and new Secure Boot policy controls—to ESU and Enterprise LTSC customers.","The new LimitSecureBootRequiredServiceData policy lets administrators suppress the telemetry event Windows normally sends to Microsoft during Secure Boot operations, indicating privacy-conscious organizations can now reduce data sent to Microsoft as part of the certificate rollout.","The Secure Boot certificate replacement uses a controlled, phased rollout that only delivers new certificates to devices after they demonstrate sufficient successful update signals, meaning eligible devices may not receive the new certificates immediately.","The BitLocker recovery prompt issue is specifically tied to the transition to the newer Windows UEFI CA 2023 certificate, showing that the Secure Boot certificate migration itself can cause boot disruptions on systems with PCR7-based TPM validation."],"referencedReports":[{"title":"June 9, 2026—KB5094127 (OS Builds 19045.7417 and 19044.7417)","url":"https://support.microsoft.com/en-us/topic/june-9-2026-kb5094127-os-builds-19045-7417-and-19044-7417-bf1073f3-e317-40ac-94c7-4c23c080c7cf","publisher":"Microsoft","context":"The article links to Microsoft's official support advisory documenting the KB5094127 update and its contents.","category":"","primary":false},{"title":"Manage connections from Windows 10 and Windows 11 operating system components to Microsoft services","url":"https://learn.microsoft.com/windows/privacy/manage-connections-from-windows-operating-system-components-to-microsoft-services","publisher":"Microsoft","context":"The article references this Microsoft documentation for details on the new LimitSecureBootRequiredServiceData policy setting.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has released the Windows 10 KB5094127 extended security update, which addresses the June 2026 Patch Tuesday vulnerabilities and introduces functionality to monitor the rollout of updated Secure Boot certificates that replace those expiring this month. The update is available to users running Windows 10 Enterprise LTSC or those enrolled in the ESU program, and can be installed via Windows Update.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, Windows 10 is updated to build 19045.7417, while Windows 10 Enterprise LTSC 2021 moves to build 19044.7417. Since Microsoft is no longer releasing new features for Windows 10, the update primarily contains security fixes and bug fixes, including remedies for 200 vulnerabilities (three of them publicly disclosed zero-days) addressed in the June 2026 Patch Tuesday.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also warns of a known issue that can trigger BitLocker recovery prompts on some systems after installing recent updates, primarily affecting devices configured with a specific BitLocker Group Policy involving PCR7 TPM validation. A temporary workaround is available while the company develops a permanent fix.\u003c/p\u003e\n"},{"n":24,"title":"Researchers Build Self-Replicating AI Worm That Operates Entirely on Local, Open-Weight Models","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/researchers-build-self-replicating-ai.html","time":"11:59","priority":"SHOULD READ","score":86,"tldr":"University of Toronto researchers demonstrated a self-replicating AI worm that uses local open-weight LLMs to autonomously find, exploit, and spread across vulnerable hosts without relying on commercial AI APIs. The key warning is that adaptive malware can turn new public advisories into attack paths during the patching window, making segmentation, rapid patching, and host-level containment critical.","briefOverview":"\u003cp\u003eUniversity of Toronto researchers built and tested a proof-of-concept AI-driven computer worm that uses a locally hosted open-weight large language model to reason through a network, generate tailored attack strategies, and replicate without human intervention. The preprint was posted to arXiv on June 2 and is under peer review. The article says the work shows why single-CVE patching breaks down when malware can inspect exposed services, read fresh advisories, and generate new attack paths at runtime.\u003c/p\u003e\n\n\u003cp\u003eIn 15 isolated runs on a deliberately vulnerable 33-host network called FakeCorp, the worm identified an average of 31.3 vulnerabilities and gained elevated access on 23.1 hosts. It replicated autonomously to 20.4 hosts, or 62% of the full network, over seven days, with no prior knowledge of the network topology. The worm used open-weight models locally and did not depend on OpenAI, Anthropic, or any other commercial AI API.\u003c/p\u003e\n\n\u003cp\u003eThe researchers observed the worm exploit a mix of Linux, Windows, web application, and IoT weaknesses, including post-training-cutoff vulnerabilities after ingesting public advisory text at runtime. The prototype was deliberately built without stealth, encryption, persistence, polymorphism, or log cleanup, but the team still observed it rewrite its own code on several occasions to bypass local security controls. The article recommends segmenting GPU-capable machines, prioritizing internet-facing CVEs, rotating exposed credentials, and monitoring for agent-specific behaviors such as unexpected LLM inference and automated SSH key injection.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUniversity of Toronto researchers, led by associate professor Nicolas Papernot and the CleverHans Lab team, built and tested a proof-of-concept AI-driven computer worm that operates entirely on locally hosted open-weight large language models. The work was posted as an arXiv preprint on June 2 and is under peer review. The article frames the research as evidence that adaptive malware can move beyond fixed exploit payloads by inspecting services, reading public advisories, and generating attack paths at runtime.\u003c/p\u003e\n\n\u003cp\u003eThe experiments used an isolated 33-host network called FakeCorp, spanning Ubuntu, Debian, Rocky Linux, Alpine, Windows Server 2008 R2, Windows Server 2019, Windows Server 2022, and IoT devices. Each host had at least one real-world vulnerability, and five hosts had GPUs. In the main propagation experiments, the worm used a shared GPU inference pool to simulate compute acquired from victim machines, while separate GPU-tier replication tests succeeded in 68.8% of attempts.\u003c/p\u003e\n\n\u003cp\u003eAcross 15 independent runs, the worm identified an average of 31.3 vulnerabilities, gained elevated access on 23.1 hosts, and replicated to 20.4 hosts over seven days. It successfully launched a replica on 88% of hosts where it gained elevated access and reached up to seven generations of self-replication, with a mean of 5.1. Individual exploit attempts succeeded about 44% of the time, and most failures came from malformed payload syntax rather than flawed logic.\u003c/p\u003e\n\n\u003cp\u003eThe worm generated exploit logic at runtime rather than shipping with a fixed exploit chain. In one run, exploit paths included SambaCry with writable root cron privilege escalation, Dirty Pipe, PrintNightmare, Drupalgeddon 2, Exim RCE, blind SQL injection, JWT bypass, and Redis escape. The paper also reports that the worm ingested public advisory text and exploited post-training-cutoff vulnerabilities including CVE-2026-39987, CVE-2026-31431, and DirtyFrag-related Linux kernel issues, reaching root in 41 of 67 attempts against those three hosts.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights two containment challenges: the worm can shift costs from rented API access to captured compute, and open-weight local models remove the possibility of provider-side controls such as service refusals, rate limits, or account suspension. The prototype did not include stealth features, persistence, encrypted payloads, process masquerading, or log cleanup, but researchers observed it rewrite its own code to bypass local security controls in the test environment. Recommended defensive steps include segmenting GPU-capable machines, treating public advisories as near-term weaponization targets, rotating credentials exposed on compromised hosts, and monitoring for agent-specific signals such as non-standard port activity and unexpected LLM inference clusters.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUniversity of Toronto researchers built and tested a proof-of-concept AI-driven computer worm that uses a locally hosted open-weight large language model to reason through a network, generate tailored attack strategies for each target, and replicate itself. The work was posted to arXiv on June 2 as a preprint and is currently under peer review. The article states that the implementation has not been publicly released and that the University of Toronto is establishing a vetting process for qualified defensive researchers to request access.\u003c/p\u003e\n\n\u003cp\u003eThe research was led by associate professor Nicolas Papernot and the CleverHans Lab team, with participation from the University of Toronto, Vector Institute, University of Cambridge, and ServiceNow. The article presents the work as a shift from traditional worms that rely on fixed exploit payloads chosen at build time. In this design, the worm uses an open-weight LLM running on local compute to generate attack logic at runtime based on what it discovers.\u003c/p\u003e\n\n\u003ch2 id=\"test-environment-and-experimental-setup\"\u003eTest Environment and Experimental Setup\u003c/h2\u003e\n\n\u003cp\u003eThe researchers ran 15 independent experiments on an isolated 33-host network called FakeCorp. The environment included Ubuntu, Debian, Rocky Linux, Alpine, Windows Server 2008 R2, Windows Server 2019, Windows Server 2022, and IoT devices. Each host had at least one real-world vulnerability.\u003c/p\u003e\n\n\u003cp\u003eFive of the 33 machines had GPUs. In the main propagation experiments, the worm used a shared GPU inference pool to simulate compute acquired from victim machines. The team also separately tested full GPU-tier replication, where the worm stages a local LLM instance on a compromised GPU host, and that succeeded in 68.8% of attempts.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the setup was intentionally vulnerable. The paper says the test measures autonomous reasoning across realistic individual flaws, not spread through a mostly hardened production network under active endpoint defense.\u003c/p\u003e\n\n\u003ch2 id=\"measured-results\"\u003eMeasured Results\u003c/h2\u003e\n\n\u003cp\u003eAcross the 15 isolated runs, the worm identified an average of 31.3 vulnerabilities. It gained elevated access on an average of 23.1 hosts, which the article describes as roughly three-quarters of the hosts it actively targeted. It then replicated autonomously to 20.4 hosts, or 62% of the full network, over seven days.\u003c/p\u003e\n\n\u003cp\u003eThe worm had no prior knowledge of the network topology and operated with no human input. Across the runs, it successfully launched a replica on 88% of hosts where it gained elevated access. It reached up to seven generations of self-replication, with a mean of 5.1 generations.\u003c/p\u003e\n\n\u003cp\u003eIndividual exploit attempts succeeded about 44% of the time. The article says most failures came from malformed payload syntax, not flawed logic. Web application exploits and Windows privilege escalation were harder than Linux local escalation and service exploits, which the paper treats as a current model limitation rather than a structural defense.\u003c/p\u003e\n\n\u003ch2 id=\"technical-behavior\"\u003eTechnical Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe worm differs from traditional worms because it does not rely on a pre-encoded exploit chain. Instead, it uses an open-weight LLM running on a single GPU to generate attack logic at runtime. This allowed it to tailor actions to whatever it found on the next target.\u003c/p\u003e\n\n\u003cp\u003eThe article says the worm did not depend on OpenAI, Anthropic, or any other commercial AI API. Because it runs on open-weight models, there is no API key to revoke, no vendor rate limit to apply, and no commercial service dependency that could be cut off.\u003c/p\u003e\n\n\u003cp\u003eIn the tiered design described by the researchers, infected GPU-capable hosts serve as distributed reasoning nodes. These nodes provide inference for lower-compute devices on the network that cannot run the model themselves.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-examples\"\u003eExploitation Examples\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several exploit paths seen across a single run. These included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChained SambaCry and writable root cron privilege escalation.\u003c/li\u003e\n\u003cli\u003eDirty Pipe.\u003c/li\u003e\n\u003cli\u003ePrintNightmare.\u003c/li\u003e\n\u003cli\u003eDrupalgeddon 2.\u003c/li\u003e\n\u003cli\u003eExim RCE.\u003c/li\u003e\n\u003cli\u003eBlind SQL injection.\u003c/li\u003e\n\u003cli\u003eJWT bypass.\u003c/li\u003e\n\u003cli\u003eRedis escape.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that these were not pre-programmed exploit chains. It says the agent reasoned its way to them from what it found on each host.\u003c/p\u003e\n\n\u003ch2 id=\"runtime-use-of-public-advisories\"\u003eRuntime Use of Public Advisories\u003c/h2\u003e\n\n\u003cp\u003eThe worm bypassed its own training cutoff by ingesting public advisory text at runtime. The article says it successfully exploited test hosts configured with three vulnerabilities disclosed after the model was trained:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-39987, a pre-authentication RCE in the Marimo Python notebook with CVSS 9.3.\u003c/li\u003e\n\u003cli\u003eCVE-2026-31431, also called CopyFail, a Linux kernel privilege-escalation flaw in the algif_aead module that CISA added to its Known Exploited Vulnerabilities catalog in May.\u003c/li\u003e\n\u003cli\u003eCVE-2026-43284 and CVE-2026-43500, also called DirtyFrag, related Linux kernel local privilege-escalation issues.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAgainst those three hosts, the worm reached root in 41 of 67 attempts. The article connects this result to the patching-window problem, where defenders may still be validating fixes while an adaptive worm can continue testing newly described paths.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites CVE-2026-39987 as an example of a fast exploitation window. It says the vulnerability was disclosed on April 8, 2026, and that Sysdig observed exploitation in honeypots 9 ho
