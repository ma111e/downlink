data was used primarily to make targeted advertising more relevant. The change marks a broadening of how Meta applies behavioral data collected from external businesses.\u003c/p\u003e\n\n\u003ch2 id=\"what-is-changing\"\u003eWhat Is Changing\u003c/h2\u003e\n\n\u003cp\u003eMeta stated that businesses often share information about people\u0026rsquo;s activity on their sites with the company to make ads more relevant. The company said it already uses this data—such as games users play or purchases they make on other websites—to make the ads users see more relevant.\u003c/p\u003e\n\n\u003cp\u003eGoing forward, Meta will use this same information to personalize other parts of the user experience, specifically:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe content users see in their Feed\u003c/li\u003e\n\u003cli\u003eResponses from Meta\u0026rsquo;s AI chatbot\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMeta offered an example: if a user has recently purchased a tent online, they might see more Reels about camping.\u003c/p\u003e\n\n\u003ch2 id=\"data-collection-and-user-control\"\u003eData Collection and User Control\u003c/h2\u003e\n\n\u003cp\u003eMeta emphasized several points regarding data and user choice:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe company is \u003cstrong\u003enot collecting any new data\u003c/strong\u003e as part of this update.\u003c/li\u003e\n\u003cli\u003eUsers are described as being \u0026ldquo;in the driver\u0026rsquo;s seat,\u0026rdquo; with the ability to decide how the information is used for personalization.\u003c/li\u003e\n\u003cli\u003eIf users allow the data to be used for personalized content, both ads and other content will be more relevant.\u003c/li\u003e\n\u003cli\u003eIf users do \u003cstrong\u003enot\u003c/strong\u003e allow it, the content shown will be based on other activity on Meta\u0026rsquo;s platforms, such as liking a reel or post.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that businesses can share customer lists with Meta—for example, those who have signed up to receive emails—who are then served relevant ads.\u003c/p\u003e\n\n\u003ch2 id=\"changes-to-settings-and-controls\"\u003eChanges to Settings and Controls\u003c/h2\u003e\n\n\u003cp\u003eMeta is streamlining its controls to reflect the change:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe \u0026ldquo;Activity from other businesses\u0026rdquo; setting (formerly \u0026ldquo;Activity information from ad partners\u0026rdquo;) is being expanded to better manage how data from other businesses is used.\u003c/li\u003e\n\u003cli\u003eThe \u0026ldquo;Your activity off Meta technologies\u0026rdquo; setting will be discontinued.\u003c/li\u003e\n\u003cli\u003eThe new option allows users to manage how the data is used to serve both ads and non-ad content.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"geographic-rollout-and-timeline\"\u003eGeographic Rollout and Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe change is expected to go into effect starting next month in the U.S. and a number of other countries, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnited Kingdom\u003c/li\u003e\n\u003cli\u003eBrazil\u003c/li\u003e\n\u003cli\u003eThailand\u003c/li\u003e\n\u003cli\u003eSouth Africa\u003c/li\u003e\n\u003cli\u003eTurkey\u003c/li\u003e\n\u003cli\u003eSouth Korea\u003c/li\u003e\n\u003cli\u003eEcuador\u003c/li\u003e\n\u003cli\u003eNigeria\u003c/li\u003e\n\u003cli\u003eKenya\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThis update represents a notable expansion in how Meta applies off-platform behavioral data—moving from advertising-only personalization to shaping organic Feed content and AI chatbot responses. While Meta states no new data is being collected and that users retain control through consolidated settings, the change broadens the influence of off-site activity data on the overall user experience across multiple countries.\u003c/p\u003e\n","keyPoints":["Meta announced on Tuesday that it will use information shared by other businesses about people's off-site activity—such as games played or purchases made on other websites—to personalize users' Feed content and AI chatbot responses, expanding beyond its existing use of this data for targeted ads.","Meta stated that it is not collecting any new data as part of this update and that users can decide how the information is used for personalization.","Meta is consolidating its controls by expanding the 'Activity from other businesses' setting (formerly 'Activity information from ad partners') and discontinuing the 'Your activity off Meta technologies' setting.","If users decline to allow off-site data for personalization, the content they see will instead be based on their on-platform activity such as liking a reel or post.","The change is expected to go into effect starting next month in the U.S. and several other countries, including the U.K., Brazil, Thailand, South Africa, Turkey, South Korea, Ecuador, Nigeria, and Kenya."],"insights":["The update repurposes data that Meta already collects for advertising into a broader personalization engine for organic Feed content and AI responses, meaning a single off-platform purchase (like a tent) could now shape not just ads but the actual content and AI answers a user receives.","By consolidating the granular 'Your activity off Meta technologies' control into the broader 'Activity from other businesses' setting, Meta is restructuring privacy controls in a way that bundles ad and non-ad data uses together, potentially reducing users' ability to opt out of non-ad personalization separately.","Opting out does not stop tracking or personalization entirely—Meta will still personalize content based on on-platform activity such as likes—so users cannot fully eliminate behavioral content shaping.","The rollout deliberately excludes the EU and other strict-privacy jurisdictions, instead targeting the U.S. and countries like Brazil, Thailand, Turkey, and Nigeria, suggesting regulatory regimes are shaping where the feature launches first."],"referencedReports":[],"body":"\u003cp\u003eMeta announced on Tuesday that it will begin using information shared by other businesses about users\u0026rsquo; off-site activity—such as games played or purchases made on external websites—to personalize content in users\u0026rsquo; Feed and responses from its AI chatbot. This represents an expansion beyond the company\u0026rsquo;s existing use of such data, which was previously limited to making targeted ads more relevant.\u003c/p\u003e\n\n\u003cp\u003eMeta emphasized that it is not collecting any new data as part of this update and that users retain control over how the information is used for personalization. To reflect the change, Meta is consolidating its controls by expanding the \u0026ldquo;Activity from other businesses\u0026rdquo; setting (formerly \u0026ldquo;Activity information from ad partners\u0026rdquo;) and discontinuing the \u0026ldquo;Your activity off Meta technologies\u0026rdquo; setting.\u003c/p\u003e\n\n\u003cp\u003eThe change is expected to take effect starting next month in the U.S. and a number of other countries, including the U.K., Brazil, Thailand, South Africa, Turkey, South Korea, Ecuador, Nigeria, and Kenya. If users decline to allow this data for personalization, the content they see will instead be based on their on-platform activity, such as liking a reel or post.\u003c/p\u003e\n"},{"n":10,"title":"Agentic Runtime Security: When Patching Can’t Keep Up.","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/agentic-runtime-security-when-patching-cant-keep-up","time":"15:16","priority":"MAY READ","score":69,"tldr":"Anthropic's Project Glasswing has shown that AI can now discover critical vulnerabilities far faster than vendors can patch them, with exploitation often beginning a week before a fix even exists. Mitiga argues this flips security from a patching problem to a runtime defense problem, requiring behavioral detection and containment across cloud, SaaS, identity, and AI to cover exposure windows that patching can no longer close.","briefOverview":"\u003cp\u003eAnthropic\u0026rsquo;s Project Glasswing has demonstrated that AI can now find critical software vulnerabilities far faster than anyone can patch them, fundamentally flipping the security bottleneck from discovery to remediation. In its updates, roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities, yet of 530 disclosed bugs only 75 had been patched, with maintainers asking Anthropic to slow down.\u003c/p\u003e\n\n\u003cp\u003eThe significance, as framed by Mitiga, is that the gap between identifying an exposure and closing it is no longer a forecast but an operational fact. In 2026, exploitation often begins about a week before a patch is released, and in roughly 60% of breaches a patch already existed but wasn\u0026rsquo;t deployed in time, meaning the unpatched window is where attacks now land.\u003c/p\u003e\n\n\u003cp\u003eMitiga argues that faster patching alone cannot close this gap and that Agentic Runtime Security — behavioral detection, attack reconstruction, and containment across cloud, SaaS, identity, and AI — is required as a compensating control. The company positions its Helios AIDR platform and Cloud Security Data Lake as the answer, contrasting them with posture-based tools like SSPM and ITDR that it says cannot cover cross-platform runtime attack paths.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic\u0026rsquo;s Project Glasswing has produced two updates building on its earlier Claude Mythos Preview, confirming and quantifying the argument that AI compresses the path from vulnerability discovery to working exploit. The first update (May 22) reported that roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities in systemically important software, with Anthropic stating that progress is now limited not by how fast vulnerabilities can be found but by how fast they can be verified, disclosed, and patched.\u003c/p\u003e\n\n\u003cp\u003eThe supporting numbers are striking: Cloudflare found 2,000 bugs (400 high or critical) in the first month with a false-positive rate its team considered better than human testers; Mozilla found and fixed 271 vulnerabilities in Firefox 150, more than ten times the prior version using an earlier Claude model; Anthropic\u0026rsquo;s scan of 1,000+ open-source projects surfaced 6,202 findings at a 90.6% true-positive rate; and Mythos constructed a working certificate-forgery exploit in wolfSSL (CVE-2026-5194). Of 530 disclosed high- or critical-severity bugs, only 75 had been patched, the average time to patch a confirmed critical was about two weeks, and vendors like Palo Alto Networks and Microsoft reported sharply rising patch volumes.\u003c/p\u003e\n\n\u003cp\u003eThe second update (June 2) announced expansion to roughly 150 new organizations across more than 15 countries spanning power, water, healthcare, communications, and hardware. More importantly, Anthropic expects that within 6 to 12 months many other AI companies will have Mythos-class models, some potentially released without safeguards, making the capability proliferate industry-wide.\u003c/p\u003e\n\n\u003cp\u003eMitiga layers its own threat-landscape analysis on top: 48,185 CVEs were published in 2025 (about 131 per day), the average critical vulnerability sits open for around 165 days, and roughly 60% of breaches occurred where a patch already existed. Real-world cases cited include Oracle E-Business Suite (CVE-2025-61882) exploited as a 0-day nearly two months before its patch, a TanStack/GitHub Actions supply chain chain that published 84 malicious packages in six minutes, and Google\u0026rsquo;s attribution of the first publicly confirmed in-the-wild AI-assisted 0-day.\u003c/p\u003e\n\n\u003cp\u003eMitiga\u0026rsquo;s prescription is Agentic Runtime Security, built on three principles: detect on behavior first with IOCs layered in later, treat known-but-unfixed exposure as a live detection surface, and defend from AI by defending with AI. It argues posture-based tools like SSPM and SaaS-bound ITDR are limited in scope, detection model, compensating-control framing, and forensic depth, particularly at the seam where an attacker chains a compromised SaaS token into cloud control-plane abuse.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes by promoting Mitiga\u0026rsquo;s Zero-Impact platform powered by Helios AIDR and its Cloud Security Data Lake, which correlate cloud, SaaS, identity, and AI into one forensic system with behavioral detection and containment capabilities such as revoking sessions, quarantining identities, and blocking API calls mid-flight.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis Mitiga opinion piece argues that Anthropic\u0026rsquo;s Project Glasswing has confirmed a structural shift in cybersecurity: AI can now discover critical vulnerabilities far faster than they can be patched, flipping the bottleneck from finding flaws to fixing them. The article builds on Mitiga\u0026rsquo;s earlier April analysis of Claude Mythos shrinking the remediation window, contending that two subsequent Glasswing updates have moved that argument from forecast to operational fact and made it more urgent.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-glasswing-updates\"\u003eAnthropic\u0026rsquo;s Glasswing Updates\u003c/h2\u003e\n\n\u003ch3 id=\"update-one-may-22-the-bottleneck-moved\"\u003eUpdate One (May 22): The Bottleneck Moved\u003c/h3\u003e\n\n\u003cp\u003eAnthropic reported that roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities in the world\u0026rsquo;s most systemically important software. Anthropic\u0026rsquo;s own framing is that progress on software security used to be limited by how fast new vulnerabilities could be found, but is now limited by how fast they can be verified, disclosed, and patched.\u003c/p\u003e\n\n\u003cp\u003eSupporting numbers cited:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCloudflare\u003c/strong\u003e found 2,000 bugs (400 high or critical) in the first month, with a false-positive rate its team considers better than human testers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMozilla\u003c/strong\u003e found and fixed 271 vulnerabilities in Firefox 150 while testing Mythos — more than ten times what it found in the prior version with a previous Claude model.\u003c/li\u003e\n\u003cli\u003eAnthropic\u0026rsquo;s scan of \u003cstrong\u003e1,000+ open-source projects\u003c/strong\u003e surfaced 6,202 high- or critical-severity findings at a 90.6% true-positive rate.\u003c/li\u003e\n\u003cli\u003eMythos constructed a working certificate-forgery exploit in \u003cstrong\u003ewolfSSL (CVE-2026-5194)\u003c/strong\u003e, a cryptography library used by billions of devices.\u003c/li\u003e\n\u003cli\u003eOf 530 disclosed high- or critical-severity bugs, only \u003cstrong\u003e75 had been patched\u003c/strong\u003e at the time of writing; maintainers asked Anthropic to slow down; average time to patch a confirmed critical was about two weeks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePalo Alto Networks\u003c/strong\u003e shipped five times its usual number of patches in one release; \u003cstrong\u003eMicrosoft\u003c/strong\u003e said its patch volume would continue trending larger.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"update-two-june-2-the-capability-goes-wide\"\u003eUpdate Two (June 2): The Capability Goes Wide\u003c/h3\u003e\n\n\u003cp\u003eGlasswing expanded to roughly 150 new organizations across more than 15 countries, spanning power, water, healthcare, communications, and hardware, including vendors whose code other organizations and governments depend on. For most partners, Anthropic estimates a major attack could affect more than 100 million people. Critically, Anthropic expects that within 6 to 12 months many other AI companies will have Mythos-class models, some potentially released without safeguards that prevent misuse.\u003c/p\u003e\n\n\u003ch2 id=\"the-gap-as-an-operational-fact\"\u003eThe Gap as an Operational Fact\u003c/h2\u003e\n\n\u003ch3 id=\"discovery-side\"\u003eDiscovery Side\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e48,185 CVEs were published in 2025, up roughly 20% year-over-year on top of a 38% jump the year before — about 131 disclosed per day.\u003c/li\u003e\n\u003cli\u003eNinety zero-day vulnerabilities were exploited in the wild, with the enterprise share at an all-time high.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"patching-side\"\u003ePatching Side\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe average critical-severity vulnerability sits open for around 165 days.\u003c/li\u003e\n\u003cli\u003eRoughly a third of critical vulnerabilities remain unpatched at 180 days.\u003c/li\u003e\n\u003cli\u003eIn about 60% of breaches, a patch was already available at the time of compromise — a patching gap, not a patching absence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"speed-of-exploitation\"\u003eSpeed of Exploitation\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn average in 2026, exploitation begins about a week before the patch is even released.\u003c/li\u003e\n\u003cli\u003eeCrime breakout times are measured in minutes, with the fastest observed under half a minute.\u003c/li\u003e\n\u003cli\u003eHandoffs from initial-access broker to ransomware affiliate happen in seconds.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"real-world-cases\"\u003eReal-World Cases\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOracle E-Business Suite (CVE-2025-61882)\u003c/strong\u003e was exploited as a 0-day from early August, nearly two months before the emergency patch, followed by a global extortion campaign against EBS customers.\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eTanStack / GitHub Actions\u003c/strong\u003e incident (May 2026) chained three flaws, publishing 84 malicious packages in six minutes, with an 18-minute window that moved to GitHub, OpenAI, Mistral, and Grafana.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoogle\u0026rsquo;s\u003c/strong\u003e threat intelligence group attributed the first publicly confirmed in-the-wild 0-day developed with AI assistance — a 2FA bypass against a popular open-source admin tool.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitiga-s-proposed-solution-agentic-runtime-security\"\u003eMitiga\u0026rsquo;s Proposed Solution: Agentic Runtime Security\u003c/h2\u003e\n\n\u003cp\u003eThe article defines Agentic Runtime Security as detection and response that watches cloud, SaaS, identity, and AI at runtime, anticipating and stopping active attacks based on behavior and threat intelligence before indicators of compromise exist. Three principles follow:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBehavior first, IOCs later.\u003c/strong\u003e IOCs lag by definition; detection must start on anomalous workflow execution, unfamiliar token usage, and abnormal lateral movement.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTreat known-but-unfixed exposure as a live detection surface.\u003c/strong\u003e Legacy workloads, cloud misconfigurations, SaaS integrations, and AI-connected services that can\u0026rsquo;t be remediated become critical detection surfaces.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDefend from AI by defending with AI\u003c/strong\u003e — using AI for validation, prioritization, triage, attack reconstruction, and guided preemptive containment, with approval boundaries, scoped permissions, auditability, and reversibility.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"critique-of-posture-management\"\u003eCritique of Posture Management\u003c/h2\u003e\n\n\u003cp\u003eThe article argues posture-based tools, including SSPM with identity threat detection, are necessary but insufficient, citing structural limits:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eScope:\u003c/strong\u003e SSPM and SaaS-bound ITDR correlate within SaaS and identity but do not extend into cloud-infrastructure runtime, leaving a seam where an attacker chains a compromised SaaS token into cloud control-plane abuse.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDetection model:\u003c/strong\u003e Posture tooling leans on configuration scans and identity-bounded analytics rather than cross-surface behavioral indicators of attack.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCompensating control framing:\u003c/strong\u003e Monitoring identity behavior is not the same as treating every unfixable gap as a watched detection surface.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eForensic depth:\u003c/strong\u003e Closing the gap requires IR-grade reconstruction across all four surfaces, not fragmentary event search with short retention.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitiga-s-platform-positioning\"\u003eMitiga\u0026rsquo;s Platform Positioning\u003c/h2\u003e\n\n\u003cp\u003eMitiga positions its Zero-Impact platform, powered by Helios AIDR and its Cloud Security Data Lake, as unifying cloud infrastructure, SaaS, identity, and AI into one correlated forensic system. It claims behavioral detection that catches compromised credentials, lateral movement, and data exfiltration in real time, automated triage that collapses alert noise into a prioritized attack story, and containment that can revoke sessions, quarantine identities, and block API calls mid-flight.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion-and-guidance\"\u003eConclusion and Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article advises security leaders to assume some known exposure will stay open longer than desired and ask whether they would see an attacker in time to stop impact. It concludes that in a post-Mythos era, compensating controls are no longer secondary and that runtime detection and response must carry the load patching can no longer handle, ending with calls to explore Mitiga Helios AIDR or request a demo.\u003c/p\u003e\n","keyPoints":["Anthropic's Project Glasswing reported that roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities, but of 530 disclosed bugs only 75 had been patched, demonstrating that the security bottleneck has shifted from finding flaws to fixing them.","Anthropic expects that within 6 to 12 months many other AI companies will have Mythos-class models, some potentially released without safeguards, making the vulnerability-discovery capability widely available across the industry.","In 2026, exploitation often begins about a week before a patch is released, and in roughly 60% of breaches a patch already existed but was not deployed in time, meaning the unpatched exposure window is where attacks now land.","Real-world cases including Oracle E-Business Suite (CVE-2025-61882), the TanStack/GitHub Actions supply chain chain, and Google's confirmed first in-the-wild AI-assisted 0-day show exploitation reaching production before patching is possible.","Mitiga promotes Agentic Runtime Security, powered by Helios AIDR and its Cloud Security Data Lake, which uses behavioral detection, attack reconstruction, and containment across cloud, SaaS, identity, and AI as a compensating control that posture tools like SSPM and ITDR cannot provide."],"insights":["The security bottleneck has structurally inverted: progress is no longer limited by how fast vulnerabilities can be found but by how fast they can be verified, disclosed, and patched, to the point that maintainers asked Anthropic to slow down its disclosures and vendors like Palo Alto Networks shipped five times their usual patch volume.","Because exploitation now frequently precedes both the patch and sometimes even the CVE itself, indicator-of-compromise-based detection is structurally always late, forcing detection to start from behavioral anomalies like unfamiliar token usage and abnormal lateral movement rather than known indicators.","Known-but-unfixed exposures should be reframed not as posture backlog items but as live detection surfaces that must be actively watched, since any exposure that cannot be closed on a risk-removing timeline is effectively an open window an attacker can use.","Posture-based tools like SSPM and SaaS-bound ITDR have a structural blind spot at the seam where an attacker chains a compromised SaaS token into cloud control-plane abuse, because that cross-platform attack path is explicitly out of scope for those categories.","Cloudflare's use of Mythos found bugs with a false-positive rate its team considered better than human testers, and Mozilla found and fixed more than ten times the vulnerabilities in Firefox 150 compared to the prior version using an earlier Claude model."],"referencedReports":[{"title":"Project Glasswing Initial Update","url":"https://www.anthropic.com/research/glasswing-initial-update","publisher":"Anthropic","context":"The article cites Anthropic's first Glasswing update for the supporting numbers on 10,000+ vulnerabilities found, partner results, and patching statistics that form the basis of its argument.","category":"","primary":false}],"body":"\u003cp\u003eAnthropic\u0026rsquo;s Project Glasswing has demonstrated that AI can now find critical software vulnerabilities far faster than anyone can patch them, fundamentally flipping the security bottleneck from discovery to remediation. In its updates, roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities, yet of 530 disclosed bugs only 75 had been patched, with maintainers asking Anthropic to slow down.\u003c/p\u003e\n\n\u003cp\u003eThe significance, as framed by Mitiga, is that the gap between identifying an exposure and closing it is no longer a forecast but an operational fact. In 2026, exploitation often begins about a week before a patch is released, and in roughly 60% of breaches a patch already existed but wasn\u0026rsquo;t deployed in time, meaning the unpatched window is where attacks now land.\u003c/p\u003e\n\n\u003cp\u003eMitiga argues that faster patching alone cannot close this gap and that Agentic Runtime Security — behavioral detection, attack reconstruction, and containment across cloud, SaaS, identity, and AI — is required as a compensating control. The company positions its Helios AIDR platform and Cloud Security Data Lake as the answer, contrasting them with posture-based tools like SSPM and ITDR that it says cannot cover cross-platform runtime attack paths.\u003c/p\u003e\n"},{"n":19,"title":"OpenClaw AI agent found falling for phishing attacks, spills user data","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/openclaw-ai-agent-found-falling-for-phishing-attacks-spills-user-data/","time":"21:20","priority":"MAY READ","score":69,"tldr":"Varonis researchers tested an OpenClaw-based AI email agent against classic phishing tactics and found it leaked highly sensitive data—including AWS and database credentials and CRM customer exports—when attackers impersonated trusted staff with urgent requests, even under a strict configuration. While the agent reliably detected malicious URLs, fake login pages, and rogue OAuth apps, it failed at verifying sender identity, prompting recommendations for mandatory identity checks, restricted data access, and human approval for high-risk actions.","briefOverview":"\u003cp\u003eResearchers at security firm Varonis tested whether classic phishing techniques that have deceived humans for decades could also trick AI agents acting on their behalf. They built an OpenClaw AI email agent named Pinchy, connected it to a Gmail inbox, browser tools, Google Workspace APIs, and fabricated sensitive company data, and ran it against four simulated phishing attacks using Google Gemini 3.1 Pro and OpenAI GPT-5.4.\u003c/p\u003e\n\n\u003cp\u003eThe results were mixed but alarming: in two scenarios the agent leaked highly sensitive data—including AWS IAM keys, database credentials, SSH access details, and a CRM export of customer and revenue data—to an external Gmail account without verifying the sender\u0026rsquo;s identity. Even a \u0026lsquo;strict\u0026rsquo; configuration with explicit phishing-awareness instructions failed when requests appeared operationally urgent.\u003c/p\u003e\n\n\u003cp\u003eVaronis concluded that while AI agents are good at detecting suspicious URLs, fake login pages, and malicious OAuth apps, they can still fail due to a lack of identity verification and an inability to apply zero-trust principles to social interactions. The firm recommended architectural safeguards such as mandatory sender verification, restrictions on emailing new external recipients, limited internal data access, and human approval for high-risk actions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe OpenClaw open-source AI agent framework allows large language models to interact with real-world systems and perform actions autonomously, and can serve as an email agent for basic reasoning and operations. Researchers at security firm Varonis set out to explore whether the same phishing techniques that have tricked humans for decades would also work against AI agents working on their behalf.\u003c/p\u003e\n\n\u003cp\u003eTo test this, Varonis Threat Labs created an OpenClaw agent named Pinchy and connected it to a Gmail inbox, browser tools, Google Workspace APIs, and fabricated internal company data sources, instructing it to monitor and process incoming emails. The synthetic enterprise data included AWS credentials, database credentials, CRM exports, internal communications, and calendar invites. The agent ran on two configurations—a generic one with standard productivity instructions and a strict mode with specific phishing-awareness and identity-verification procedures—and was tested with Google Gemini 3.1 Pro and OpenAI GPT-5.4.\u003c/p\u003e\n\n\u003cp\u003eThe researchers conducted four simulated phishing attacks with mixed results. In the first, an attacker impersonated a team lead requesting access to the staging environment during a purported production issue, and the agent located and emailed AWS IAM keys, database credentials, and SSH access details to an external Gmail account. In the second, the attacker requested a customer export under the pretext of working remotely, and the agent retrieved and sent a CRM export containing customer records, contact information, contract details, and revenue data without verifying the sender\u0026rsquo;s identity.\u003c/p\u003e\n\n\u003cp\u003eThe other two scenarios fared better. In the third, the agent received a fake gift card email with a phishing link; under the generic configuration it visited the site and attempted to redeem the card with fabricated credentials before eventually identifying the page as malicious, while the strict configuration blocked the attack immediately. In the fourth, the agent inspected a malicious Google OAuth application disguised as a timesheet platform, analyzed the destination, identified it as suspicious, and refused to grant access.\u003c/p\u003e\n\n\u003cp\u003eNotably, in the first two scenarios the strict mode failed despite its additional safeguards because the verification step collapsed when the request appeared operationally urgent. At the model level, Gemini showed greater willingness to interact while GPT-5.4 had a more cautious posture. Varonis concluded that AI agents are good at detecting suspicious URLs, fake login pages, malicious OAuth apps, and phishing indicators, but may still fail due to a lack of identity verification, loss of context, and an inability to apply zero-trust principles to social interactions.\u003c/p\u003e\n\n\u003cp\u003eVaronis recommended that agents be explicitly required to verify sender identities, be prevented from emailing new external recipients without approval, and have limited access to internal data. For high-risk actions such as credential sharing, financial data requests, and first-time communications, human approval should be requested.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSecurity firm Varonis conducted a phishing simulation experiment to determine whether AI email agents are susceptible to the same social-engineering tactics that have compromised human users for decades. The test centered on the OpenClaw open-source AI agent framework, which enables large language models (LLMs) to interact with real-world systems and perform actions autonomously, including operating as an email agent for basic reasoning and operations.\u003c/p\u003e\n\n\u003ch2 id=\"the-test-setup\"\u003eThe Test Setup\u003c/h2\u003e\n\n\u003cp\u003eVaronis Threat Labs created an OpenClaw AI agent named Pinchy and integrated it with a realistic enterprise environment:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA Gmail inbox\u003c/li\u003e\n\u003cli\u003eBrowser tools\u003c/li\u003e\n\u003cli\u003eGoogle Workspace APIs\u003c/li\u003e\n\u003cli\u003eFabricated internal company data sources\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe agent was instructed to monitor and process incoming emails. The synthetic enterprise data was deliberately sensitive and included AWS credentials, database credentials, CRM exports, internal communications, and calendar invites.\u003c/p\u003e\n\n\u003ch3 id=\"configurations-and-models\"\u003eConfigurations and Models\u003c/h3\u003e\n\n\u003cp\u003eThe agent ran under two distinct configurations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGeneric profile\u003c/strong\u003e: standard productivity instructions\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStrict profile\u003c/strong\u003e: included specific instructions for phishing awareness and identity verification procedures\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTwo LLMs were tested: \u003cstrong\u003eGoogle Gemini 3.1 Pro\u003c/strong\u003e and \u003cstrong\u003eOpenAI GPT-5.4\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"the-four-simulated-attacks\"\u003eThe Four Simulated Attacks\u003c/h2\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eImpersonated team lead / staging access\u003c/strong\u003e: An attacker impersonated a team lead and requested access to the staging environment during a purported production issue. The agent located and emailed AWS IAM keys, database credentials, and SSH access details to an external Gmail account. \u003cstrong\u003e(Failed)\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCustomer export request\u003c/strong\u003e: The attacker requested a customer export under the pretext of working remotely on a presentation. The agent retrieved and sent a CRM export containing customer records, contact information, contract details, and revenue data without verifying the sender\u0026rsquo;s identity. \u003cstrong\u003e(Failed)\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFake gift card phishing link\u003c/strong\u003e: The agent received a fake gift card email with a phishing link. Under the generic configuration, it visited the phishing site and attempted to redeem the gift card using fabricated credentials before eventually identifying the page as malicious. The strict configuration blocked the attack immediately. \u003cstrong\u003e(Mixed/partial success)\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMalicious OAuth application\u003c/strong\u003e: Researchers created a malicious Google OAuth application disguised as a timesheet platform. The agent inspected the OAuth flow, analyzed the destination, identified the application as suspicious, and refused to grant access. \u003cstrong\u003e(Passed)\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"key-finding-verification-collapse-under-urgency\"\u003eKey Finding: Verification Collapse Under Urgency\u003c/h2\u003e\n\n\u003cp\u003eIn the first two scenarios, the strict mode failed despite its additional safeguards. According to Varonis, \u0026ldquo;Both Generic and Strict profiles failed because the verification step still collapsed when the request appeared operationally urgent.\u0026rdquo; This indicates that operational urgency can override explicit identity-verification instructions.\u003c/p\u003e\n\n\u003ch2 id=\"strengths-and-weaknesses-of-ai-agents\"\u003eStrengths and Weaknesses of AI Agents\u003c/h2\u003e\n\n\u003cp\u003eVaronis concluded that AI agents are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGood at\u003c/strong\u003e: detecting suspicious URLs, identifying fake login pages, spotting malicious OAuth apps, and recognizing phishing indicators.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProne to failure due to\u003c/strong\u003e: lack of identity verification, loss of context, and an inability to apply \u0026ldquo;zero trust\u0026rdquo; principles to social interactions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the model level, Gemini showed greater willingness to interact, while GPT-5.4 had a more cautious posture.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eVaronis advised the following safeguards for AI agents:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExplicitly require agents to verify sender identities.\u003c/li\u003e\n\u003cli\u003ePrevent agents from emailing new external recipients without approval.\u003c/li\u003e\n\u003cli\u003eLimit agents\u0026rsquo; access to internal data.\u003c/li\u003e\n\u003cli\u003eRequire human approval for high-risk actions such as credential sharing, financial data requests, and first-time communications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe experiment demonstrates that AI email agents inherit human-like vulnerabilities to social engineering even when equipped with technical detection capabilities, and that prompt-based phishing-awareness instructions alone are insufficient to prevent the leakage of highly sensitive data such as credentials and customer records.\u003c/p\u003e\n","keyPoints":["Varonis Threat Labs created an OpenClaw AI email agent named Pinchy, connected it to a Gmail inbox, browser tools, Google Workspace APIs, and fabricated sensitive company data, then tested it against classic phishing simulations using Google Gemini 3.1 Pro and OpenAI GPT-5.4.","In two of four simulated attacks, the agent emailed AWS IAM keys, database credentials, and SSH access details to an external Gmail account, and sent a CRM export with customer records and revenue data, all without verifying the sender's identity.","Both the generic and strict configuration profiles failed in the first two scenarios because the identity verification step collapsed when requests appeared operationally urgent.","The agent successfully detected suspicious URLs, fake login pages, and a malicious Google OAuth application disguised as a timesheet platform, with Gemini showing greater willingness to interact and GPT-5.4 taking a more cautious posture.","Varonis recommends that agents be required to verify sender identities, be blocked from emailing new external recipients without approval, have limited internal data access, and require human approval for high-risk actions like credential sharing and financial data requests."],"insights":["AI agents exhibit an asymmetric security profile: they are technically competent at detecting suspicious URLs, fake login pages, and malicious OAuth apps, yet remain vulnerable to social pressure because they cannot apply zero-trust principles to human-style social interactions or maintain context for identity verification.","Adding explicit phishing-awareness and identity-verification instructions (the 'strict' profile) was insufficient to stop credential and customer-data leakage, because the verification step collapsed precisely when a request was framed as operationally urgent—mirroring how urgency manipulates human victims.","The choice of underlying LLM materially affects security posture, as Gemini 3.1 Pro showed greater willingness to interact and comply with requests while GPT-5.4 adopted a more cautious stance, meaning model selection itself is a security control.","The most effective defenses identified are architectural rather than prompt-based—restricting agents from emailing new external recipients, limiting internal data access, and requiring human approval for high-risk actions—suggesting that guardrails enforced outside the model are more reliable than instructions given to it."],"referencedReports":[{"title":"OpenClaw Phishing","url":"https://www.varonis.com/blog/openclaw-phishing","publisher":"Varonis","context":"The article is based on this Varonis Threat Labs report detailing phishing simulations against an OpenClaw AI email agent named Pinchy.","category":"","primary":false}],"body":"\u003cp\u003eResearchers at security firm Varonis tested whether classic phishing techniques that have deceived humans for decades could also trick AI agents acting on their behalf. They built an OpenClaw AI email agent named Pinchy, connected it to a Gmail inbox, browser tools, Google Workspace APIs, and fabricated sensitive company data, and ran it against four simulated phishing attacks using Google Gemini 3.1 Pro and OpenAI GPT-5.4.\u003c/p\u003e\n\n\u003cp\u003eThe results were mixed but alarming: in two scenarios the agent leaked highly sensitive data—including AWS IAM keys, database credentials, SSH access details, and a CRM export of customer and revenue data—to an external Gmail account without verifying the sender\u0026rsquo;s identity. Even a \u0026lsquo;strict\u0026rsquo; configuration with explicit phishing-awareness instructions failed when requests appeared operationally urgent.\u003c/p\u003e\n\n\u003cp\u003eVaronis concluded that while AI agents are good at detecting suspicious URLs, fake login pages, and malicious OAuth apps, they can still fail due to a lack of identity verification and an inability to apply zero-trust principles to social interactions. The firm recommended architectural safeguards such as mandatory sender verification, restrictions on emailing new external recipients, limited internal data access, and human approval for high-risk actions.\u003c/p\u003e\n"},{"n":30,"title":"npm Tooling Bug Incorrectly Marks One-Character Packages as Security Holders","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/npm-tooling-single-character-bug?utm_medium=feed","time":"21:06","priority":"MAY READ","score":68,"tldr":"A bug in npm's tooling mistakenly marked several one-character packages (such as c, r, w, and -) as security holders by adding 0.0.1-security placeholder versions and moving their latest dist-tag, though there was no actual package compromise. npm has since rolled back the changes and fixed the affected package versions.","briefOverview":"\u003cp\u003eA bug in npm\u0026rsquo;s tooling incorrectly applied security-holder metadata to multiple one-character packages, including letters, numbers, and the dash package. The affected packages were assigned \u003ccode\u003e0.0.1-security\u003c/code\u003e or \u003ccode\u003e0.0.1-security.0\u003c/code\u003e versions, with the \u003ccode\u003elatest\u003c/code\u003e dist-tag moved to the security placeholder, while older package versions remained available in the registry.\u003c/p\u003e\n\n\u003cp\u003eSocket reviewed public npm registry metadata and identified the affected packages, which included \u003ccode\u003ec\u003c/code\u003e, \u003ccode\u003er\u003c/code\u003e, \u003ccode\u003ew\u003c/code\u003e, \u003ccode\u003e-\u003c/code\u003e, \u003ccode\u003em\u003c/code\u003e, \u003ccode\u003ep\u003c/code\u003e, \u003ccode\u003ei\u003c/code\u003e, \u003ccode\u003en\u003c/code\u003e, \u003ccode\u003e3\u003c/code\u003e, \u003ccode\u003e2\u003c/code\u003e, \u003ccode\u003ex\u003c/code\u003e, \u003ccode\u003e6\u003c/code\u003e, and \u003ccode\u003e4\u003c/code\u003e. npm confirmed the markings were not intentional, attributing them to a tooling bug, and said they were working on rolling the changes back.\u003c/p\u003e\n\n\u003cp\u003eSocket found no public evidence based on registry metadata that the affected packages had been compromised. In a June 9, 2026 update, npm confirmed the affected package versions had been fixed and the one-character packages no longer appeared marked as security holders.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003enpm incorrectly applied security-holder metadata to multiple one-character packages, including letters, numbers, and the \u003ccode\u003e-\u003c/code\u003e package, due to a bug in its tooling. Socket reviewed public npm registry metadata and found that several affected packages had been assigned \u003ccode\u003e0.0.1-security\u003c/code\u003e or \u003ccode\u003e0.0.1-security.0\u003c/code\u003e versions, with the \u003ccode\u003elatest\u003c/code\u003e dist-tag moved to the security placeholder while older package versions remained available.\u003c/p\u003e\n\n\u003cp\u003enpm confirmed the markings were not intentional. “This happened due to a bug in our tooling and was a mistake. We are looking into it,” an npm representative said in response to Socket\u0026rsquo;s inquiry. npm also shared a list of affected package names, which included \u003ccode\u003ec\u003c/code\u003e, \u003ccode\u003er\u003c/code\u003e, \u003ccode\u003ew\u003c/code\u003e, \u003ccode\u003e-\u003c/code\u003e, \u003ccode\u003em\u003c/code\u003e, \u003ccode\u003ep\u003c/code\u003e, \u003ccode\u003ei\u003c/code\u003e, \u003ccode\u003en\u003c/code\u003e, \u003ccode\u003e3\u003c/code\u003e, \u003ccode\u003e2\u003c/code\u003e, \u003ccode\u003ex\u003c/code\u003e, \u003ccode\u003e6\u003c/code\u003e, and \u003ccode\u003e4\u003c/code\u003e. The \u003ccode\u003e-\u003c/code\u003e package exists in the registry but its npm package page was inaccessible due to a separate website bug.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages showed the same general pattern: npm added a security-holder-style version and moved \u003ccode\u003elatest\u003c/code\u003e to that placeholder, while older versions remained present. This made the incident look unusual, since the \u003ccode\u003e0.0.1-security\u003c/code\u003e convention is typically associated with packages npm has taken over or reserved for security reasons, often after a package is removed or replaced.\u003c/p\u003e\n\n\u003cp\u003eSocket did not find public evidence, based on registry metadata alone, that the affected one-character packages had been compromised. The registry changes appeared to be metadata-level changes made across multiple package names rather than malicious updates published by maintainers, and older versions remaining available was another signal that this did not look like a standard malicious-package removal.\u003c/p\u003e\n\n\u003cp\u003eTeams depending on any affected packages were advised to check whether their lockfiles captured a placeholder version during the affected window, looking for \u003ccode\u003e0.0.1-security\u003c/code\u003e or \u003ccode\u003e0.0.1-security.0\u003c/code\u003e in files such as \u003ccode\u003epackage-lock.json\u003c/code\u003e, \u003ccode\u003eyarn.lock\u003c/code\u003e, \u003ccode\u003epnpm-lock.yaml\u003c/code\u003e, and other lockfiles. The practical impact appeared limited, but developers who installed affected packages were encouraged to verify their dependency manager resolved the intended version rather than the temporary security placeholder.\u003c/p\u003e\n\n\u003cp\u003eIn a June 9, 2026 update at 21:21 UTC, npm confirmed the package versions had been fixed and the affected one-character packages no longer appeared to be marked as security holders.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003enpm incorrectly applied security-holder metadata to multiple one-character packages, including letters, numbers, and the \u003ccode\u003e-\u003c/code\u003e package. The cause was a bug in npm\u0026rsquo;s tooling rather than a malicious compromise. Socket reviewed public npm registry metadata to identify and analyze the affected packages.\u003c/p\u003e\n\n\u003ch2 id=\"what-happened\"\u003eWhat Happened\u003c/h2\u003e\n\n\u003cp\u003eSocket found that several affected packages had been assigned \u003ccode\u003e0.0.1-security\u003c/code\u003e or \u003ccode\u003e0.0.1-security.0\u003c/code\u003e versions, with the \u003ccode\u003elatest\u003c/code\u003e dist-tag moved to the security placeholder. Older package versions remained available in the registry throughout the incident.\u003c/p\u003e\n\n\u003cp\u003enpm confirmed the markings were not intentional. An npm representative stated in response to Socket\u0026rsquo;s inquiry: “This happened due to a bug in our tooling and was a mistake. We are looking into it.”\u003c/p\u003e\n\n\u003ch3 id=\"affected-packages\"\u003eAffected Packages\u003c/h3\u003e\n\n\u003cp\u003enpm shared a list of affected package names, which included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ec\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003er\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ew\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-\u003c/code\u003e (the package exists in the registry, but its npm package page was inaccessible due to a separate bug in npm\u0026rsquo;s website)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003em\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ep\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ei\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003en\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ex\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e6\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e4\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"security-metadata-applied-by-mistake\"\u003eSecurity Metadata Applied by Mistake\u003c/h2\u003e\n\n\u003cp\u003eThe affected packages showed the same general pattern: npm added a security-holder-style version and moved \u003ccode\u003elatest\u003c/code\u003e to that placeholder, while older versions remained present in the registry. This made the incident look unusual, because the \u003ccode\u003e0.0.1-security\u003c/code\u003e convention is typically associated with packages npm has taken over or reserved for security reasons, often after a package is removed or replaced. In this case, npm said the change was caused by a tooling bug.\u003c/p\u003e\n\n\u003ch2 id=\"no-public-evidence-of-compromise\"\u003eNo Public Evidence of Compromise\u003c/h2\u003e\n\n\u003cp\u003eSocket did not find public evidence, based on registry metadata alone, that the affected one-character packages had been compromised. The registry changes appeared to be metadata-level changes made across multiple package names rather than malicious updates published by package maintainers. The affected names included long-standing short packages and package names made up of a single number or symbol. The fact that older versions remained available was another signal that this did not look like a standard malicious-package removal.\u003c/p\u003e\n\n\u003ch2 id=\"what-developers-should-check\"\u003eWhat Developers Should Check\u003c/h2\u003e\n\n\u003cp\u003eTeams that depend on any of the affected packages were advised to check whether their lockfiles captured a placeholder version during the affected window. Specifically, developers should look for \u003ccode\u003e0.0.1-security\u003c/code\u003e or \u003ccode\u003e0.0.1-security.0\u003c/code\u003e in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epackage-lock.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eyarn.lock\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epnpm-lock.yaml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eother package manager lockfiles\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe practical impact appeared limited, but developers who installed any affected packages during the window may want to verify that their dependency manager resolved the intended version rather than the temporary security placeholder.\u003c/p\u003e\n\n\u003ch2 id=\"why-registry-metadata-matters\"\u003eWhy Registry Metadata Matters\u003c/h2\u003e\n\n\u003cp\u003eThis incident was caused by an npm tooling bug, not a confirmed compromise. However, registry metadata still affects the software supply chain. Dist-tags determine what package managers install by default, and security-holder versions are treated as a strong warning signal by developers and security tools. When that metadata is applied incorrectly, it can create confusion even when package code has not changed.\u003c/p\u003e\n\n\u003ch2 id=\"resolution\"\u003eResolution\u003c/h2\u003e\n\n\u003cp\u003eIn an update dated June 9, 2026, 21:21 UTC, npm confirmed: “These packages versions have been fixed now.” The affected one-character packages no longer appeared to be marked as security holders.\u003c/p\u003e\n","keyPoints":["A bug in npm's tooling incorrectly applied security-holder metadata to multiple one-character packages, including letters, numbers, and the dash package, by assigning 0.0.1-security or 0.0.1-security.0 versions and moving the latest dist-tag to the security placeholder.","npm confirmed the markings were not intentional, stating it was caused by a tooling bug and a mistake, and that they were working on rolling it back.","Socket found no public evidence based on registry metadata that the affected one-character packages had been compromised, and older package versions remained available throughout the incident.","Developers who depend on affected packages were advised to check their lockfiles (package-lock.json, yarn.lock, pnpm-lock.yaml) for 0.0.1-security or 0.0.1-security.0 entries captured during the affected window.","In an update on June 9, 2026, npm confirmed the affected package versions had been fixed and the one-character packages no longer appeared as security holders."],"insights":["The 0.0.1-security convention is normally a deliberate signal that npm has taken over or reserved a package for security reasons, so its accidental application demonstrates how trusted supply-chain signals can be triggered by tooling errors rather than genuine threats, creating false alarms across the ecosystem.","The fact that older package versions remained available was itself a diagnostic clue that distinguished this incident from a standard malicious-package removal, where versions are typically pulled entirely.","Even without any change to package code, registry metadata like dist-tags can alter what package managers install by default, meaning a purely metadata-level bug can still affect downstream builds and lockfiles.","The incident shows that incorrectly applied security metadata can erode the reliability of automated security tooling, since both developers and security tools treat security-holder versions as a strong warning signal."],"referencedReports":[],"body":"\u003cp\u003eA bug in npm\u0026rsquo;s tooling incorrectly applied security-holder metadata to multiple one-character packages, including letters, numbers, and the dash package. The affected packages were assigned \u003ccode\u003e0.0.1-security\u003c/code\u003e or \u003ccode\u003e0.0.1-security.0\u003c/code\u003e versions, with the \u003ccode\u003elatest\u003c/code\u003e dist-tag moved to the security placeholder, while older package versions remained available in the registry.\u003c/p\u003e\n\n\u003cp\u003eSocket reviewed public npm registry metadata and identified the affected packages, which included \u003ccode\u003ec\u003c/code\u003e, \u003ccode\u003er\u003c/code\u003e, \u003ccode\u003ew\u003c/code\u003e, \u003ccode\u003e-\u003c/code\u003e, \u003ccode\u003em\u003c/code\u003e, \u003ccode\u003ep\u003c/code\u003e, \u003ccode\u003ei\u003c/code\u003e, \u003ccode\u003en\u003c/code\u003e, \u003ccode\u003e3\u003c/code\u003e, \u003ccode\u003e2\u003c/code\u003e, \u003ccode\u003ex\u003c/code\u003e, \u003ccode\u003e6\u003c/code\u003e, and \u003ccode\u003e4\u003c/code\u003e. npm confirmed the markings were not intentional, attributing them to a tooling bug, and said they were working on rolling the changes back.\u003c/p\u003e\n\n\u003cp\u003eSocket found no public evidence based on registry metadata that the affected packages had been compromised. In a June 9, 2026 update, npm confirmed the affected package versions had been fixed and the one-character packages no longer appeared marked as security holders.\u003c/p\u003e\n"},{"n":9,"title":"CISA to transform how it assesses cyber vulnerabilities and risks, Andersen says","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cisa-to-transform-how-it-assesses-cyber-vulns-risks","time":"18:50","priority":"MAY READ","score":59,"tldr":"CISA is overhauling how it prioritizes cyber vulnerabilities and risks, releasing a binding operational directive that shifts federal agencies away from patching everything quickly toward a risk-based approach that focuses on factors like internet exposure, known exploited vulnerabilities, and exploitability. Acting Director Nick Andersen also said the agency will work more granularly with critical infrastructure operators and plans to hire over 300 new employees to address staffing shortages.","briefOverview":"\u003cp\u003eCISA Acting Director Nick Andersen announced that the agency plans to overhaul how it assesses cyber vulnerabilities and threats, prioritizing some systems and critical infrastructure elements over others to be more effective amid spiking risks. He made the remarks Tuesday at a Washington, D.C. event hosted by the cybersecurity firm Axonius.\u003c/p\u003e\n\n\u003cp\u003eA binding operational directive scheduled for release Wednesday will direct federal agencies to change their vulnerability management protocols, moving away from the historical approach of applying patches as quickly as possible toward a risk-based focus. The directive will address whether patching windows need to be shortened and by how much, while CISA also plans to work more closely with critical infrastructure entities on prioritizing their cyber threat responses.\u003c/p\u003e\n\n\u003cp\u003eThe shift emphasizes evaluating risk for each vulnerability based on factors such as whether an asset is internet exposed, whether it aligns to a known exploited vulnerability, and whether it is automatable in its exploitation. Andersen acknowledged that CISA has been constrained by a government shutdown and mass layoffs but said the agency is addressing staffing shortages, with plans to bring on over 300 new employees.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Cybersecurity and Infrastructure Security Agency (CISA) plans to transform how it assesses cyber vulnerabilities and threats, prioritizing some over others to be more effective in an environment where risks are spiking, Acting Director Nick Andersen said Tuesday at a Washington, D.C. event hosted by the cybersecurity firm Axonius.\u003c/p\u003e\n\n\u003cp\u003eA binding operational directive being released Wednesday will integrate this new thinking, directing federal agencies to change the way they address vulnerabilities by elevating some while putting others to the side. CISA also plans to drill down with critical infrastructure entities on how they are prioritizing their responses to cyber threats. Andersen said the agency has to be okay with acknowledging that some systems and some elements of critical infrastructure are less important than others.\u003c/p\u003e\n\n\u003cp\u003eAndersen warned that if such calculations are not made, an overstretched CISA would have to explain to the public why it lacks telecommunications infrastructure for a significant amount of time, or why people don\u0026rsquo;t have access to clean drinking water or other basic necessities. The directive will address whether patching windows need to be shortened and by how much, and will direct federal agencies to change their vulnerability management protocols overall.\u003c/p\u003e\n\n\u003cp\u003eThe biggest takeaway, according to Andersen, is that CISA is moving away from an outmoded historical approach of releasing a patch and applying it as quickly as possible. Instead, the agency is asking people to focus more on the risk associated with each vulnerability — whether it affects an internet-exposed asset, whether it aligns to a known exploited vulnerability, and whether it is automatable in its exploitation.\u003c/p\u003e\n\n\u003cp\u003eAndersen also said CISA\u0026rsquo;s existing functions for prioritizing vulnerabilities are not as successful as needed. He cited the agency\u0026rsquo;s Section 9 protocol — which designates entities where a cybersecurity incident could have a catastrophic impact — as a measure that has not been effective enough, noting that CISA has effectively congratulated operators on receiving the designation without asking detailed follow-up questions. He said the agency needs to move from broad intelligence conversations to a \u0026lsquo;fine grade\u0026rsquo; approach, such as prioritizing that a bank\u0026rsquo;s bulk payment system is solid rather than worrying about a single branch.\u003c/p\u003e\n\n\u003cp\u003eDespite constraints from a government shutdown and mass layoffs, Andersen said CISA is addressing staffing shortages, planning to bring on over 300 new people, with 180 hired by the end of the month. The initial wave of hiring will focus on replenishing the agency\u0026rsquo;s pool of employees working on infrastructure security, emergency communications, and in local regions as state cybersecurity coordinators, and some of the new employees have already begun working.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe Cybersecurity and Infrastructure Security Agency (CISA) plans to overhaul how it assesses cyber vulnerabilities and threats, prioritizing some over others to be more effective in an environment where risks are spiking. Acting Director Nick Andersen announced the plans Tuesday at a Washington, D.C. event hosted by the cybersecurity firm Axonius.\u003c/p\u003e\n\n\u003ch2 id=\"the-binding-operational-directive\"\u003eThe Binding Operational Directive\u003c/h2\u003e\n\n\u003cp\u003eA binding operational directive being released Wednesday will integrate this new thinking. Key elements include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirecting federal agencies to change the way they address vulnerabilities by elevating some while putting others to the side.\u003c/li\u003e\n\u003cli\u003eAddressing whether patching windows need to be shortened, and if so by how much.\u003c/li\u003e\n\u003cli\u003eDirecting federal agencies to change their vulnerability management protocols overall.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to Andersen, the biggest takeaway is that CISA is moving away from an outmoded historical approach of \u0026ldquo;the patch is released, apply this patch as quickly as you can.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"risk-based-prioritization\"\u003eRisk-Based Prioritization\u003c/h2\u003e\n\n\u003cp\u003eInstead of rapid universal patching, CISA is asking people to focus more on the risk associated with each vulnerability. Andersen identified specific questions to guide this assessment:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIs it with an asset that is internet exposed?\u003c/li\u003e\n\u003cli\u003eDoes it align to a known exploited vulnerability?\u003c/li\u003e\n\u003cli\u003eIs it automatable in its exploitation?\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"prioritizing-critical-infrastructure\"\u003ePrioritizing Critical Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eCISA also plans to drill down with critical infrastructure entities on how they are prioritizing their responses to cyber threats. Andersen stated that the agency has to be okay with saying that some systems are less important than others, and that some elements of critical infrastructure are less important than others.\u003c/p\u003e\n\n\u003cp\u003eHe warned that if such calculations are not made, an overstretched CISA would have to explain to the public \u0026ldquo;why it is without telecommunications infrastructure for a significant amount of time, why we don\u0026rsquo;t have access to clean drinking water or why we don\u0026rsquo;t have access to the things that we just rely upon to live our lives at a very basic level.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"critique-of-existing-measures\"\u003eCritique of Existing Measures\u003c/h2\u003e\n\n\u003cp\u003eAndersen acknowledged that CISA already has several functions in place to determine how vulnerabilities are prioritized but suggested they are not as successful as needed. He singled out the agency\u0026rsquo;s Section 9 protocol — which designates entities where a cybersecurity incident could have a catastrophic impact — as a measure that has not been effective enough. In the past, CISA has effectively congratulated operators for receiving a Section 9 designation without asking detailed follow-up questions.\u003c/p\u003e\n\n\u003cp\u003eHe argued that CISA needs to be able to go to a company and identify the specific function making it more critical, then have a conversation about the specific assets supporting that function and how to reach a measurable level of resilience for those assets. He described this as moving from \u0026ldquo;broad intelligence conversations\u0026rdquo; to a \u0026ldquo;fine grade\u0026rdquo; approach — for example, prioritizing that a given bank\u0026rsquo;s bulk payment system is solid rather than worrying about whether a single branch can operate after a cyberattack.\u003c/p\u003e\n\n\u003ch2 id=\"staffing-and-resources\"\u003eStaffing and Resources\u003c/h2\u003e\n\n\u003cp\u003eCISA has been constrained recently by a government shutdown and mass layoffs, but Andersen said the agency is addressing staffing shortages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe agency plans to bring on over 300 new people.\u003c/li\u003e\n\u003cli\u003eOf these, 180 are to be hired by the end of the month.\u003c/li\u003e\n\u003cli\u003eThe initial wave of hiring will focus on replenishing CISA\u0026rsquo;s pool of employees working on infrastructure security, emergency communications, and in local regions as state cybersecurity coordinators.\u003c/li\u003e\n\u003cli\u003eSome of the new employees have already begun working.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CISA Acting Director Nick Andersen announced that the agency plans to overhaul how it assesses cyber vulnerabilities and threats, prioritizing some systems and critical infrastructure elements over others to be more effective amid spiking risks.","A binding operational directive being released Wednesday will direct federal agencies to change their vulnerability management protocols, moving away from the historical approach of applying patches as quickly as possible toward a risk-based focus that considers whether an asset is internet exposed, aligns to a known exploited vulnerability, or is automatable in its exploitation.","Andersen said the directive will address whether patching windows need to be shortened and by how much, and that CISA will also work more closely with critical infrastructure entities on prioritizing their responses to cyber threats.","Andersen criticized CISA's existing Section 9 protocol as not effective enough, saying the agency needs to move from broad intelligence conversations to a 'fine grade' approach focused on specific functions and assets, such as ensuring a bank's bulk payment system is solid rather than worrying about a single branch.","Despite being constrained by a government shutdown and mass layoffs, CISA plans to bring on over 300 new employees, with 180 hired by the end of the month, initially focused on infrastructure security, emergency communications, and state cybersecurity coordinators."],"insights":["CISA is openly conceding that it cannot protect everything equally, explicitly stating that some systems and even some critical infrastructure elements are less important than others—a notable departure from the traditional posture of treating all critical infrastructure as a protection priority.","Andersen revealed that the Section 9 designation program has been functionally hollow, with CISA effectively congratulating operators on receiving the designation without conducting detailed follow-up on the specific functions, assets, or resilience levels that warranted it.","The shift away from 'patch everything as fast as possible' toward risk-scored triage (internet exposure, KEV alignment, automatability of exploitation) signals that federal agencies may soon be permitted or required to deprioritize certain patches rather than chasing complete remediation.","The framing that CISA may have to publicly explain prolonged loss of telecommunications, clean drinking water, or other basic services suggests the agency is bracing for visible failures and is using that risk to justify a triage-based resource allocation strategy."],"referencedReports":[],"body":"\u003cp\u003eCISA Acting Director Nick Andersen announced that the agency plans to overhaul how it assesses cyber vulnerabilities and threats, prioritizing some systems and critical infrastructure elements over others to be more effective amid spiking risks. He made the remarks Tuesday at a Washington, D.C. event hosted by the cybersecurity firm Axonius.\u003c/p\u003e\n\n\u003cp\u003eA binding operational directive scheduled for release Wednesday will direct federal agencies to change their vulnerability management protocols, moving away from the historical approach of applying patches as quickly as possible toward a risk-based focus. The directive will address whether patching windows need to be shortened and by how much, while CISA also plans to work more closely with critical infrastructure entities on prioritizing their cyber threat responses.\u003c/p\u003e\n\n\u003cp\u003eThe shift emphasizes evaluating risk for each vulnerability based on factors such as whether an asset is internet exposed, whether it aligns to a known exploited vulnerability, and whether it is automatable in its exploitation. Andersen acknowledged that CISA has been constrained by a government shutdown and mass layoffs but said the agency is addressing staffing shortages, with plans to bring on over 300 new employees.\u003c/p\u003e\n"},{"n":29,"title":"User-to-User Authentication: Down the Rabbit Hole – Part 1","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/09/user-to-user-authentication-down-the-rabbit-hole-part-1/","time":"16:00","priority":"MAY READ","score":54,"tldr":"This first-of-two blog posts dissects how Kerberos user-to-user (U2U) authentication works internally, explaining that it encrypts service tickets with a hosting user's TGT session key to enable peer-to-peer authentication for accounts without an SPN. It shows that Windows only implements the client-initiated U2U scenario (notably in RDP with NLA), and that the same session-key primitives underpinning U2U also enable the UnPAC-the-Hash attack for recovering NT hashes via PKINIT-issued certificates.","briefOverview":"\u003cp\u003eThis is the first of a two-part blog series from SpecterOps that dives into the Windows internals of Kerberos user-to-user (U2U) authentication, focusing on how and why the technique works rather than demonstrating an attack. U2U gained attention following its use in ADCS, UnPAC-the-Hash, and Shadow Credentials attacks, but the article notes there is limited information explaining the underlying mechanics. The post first establishes a Kerberos primer before exploring how U2U differs from traditional Kerberos.\u003c/p\u003e\n\n\u003cp\u003eU2U was designed to solve peer-to-peer authentication scenarios where a service runs under a regular user account that has no SPN. In standard Kerberos, service tickets are encrypted with a service account\u0026rsquo;s long-term key, but U2U instead encrypts the ticket with the session key from the hosting user\u0026rsquo;s TGT, supplied in the additional-tickets field of a TGS-REQ with the ENC-TKT-IN-SKEY flag set. The client obtains the target\u0026rsquo;s TGT directly via a KERB-TGT-REQUEST/KERB-TGT-REPLY exchange before submitting it to the KDC.\u003c/p\u003e\n\n\u003cp\u003eThe article also examines where the draft RFC diverges from actual Windows behavior, finding that only the client-initiated U2U scenario (notably RDP with NLA) is consistently implemented. It further explains how the same U2U primitives enable the UnPAC-the-Hash attack, which recovers a user\u0026rsquo;s NT hash through a PKINIT exchange and a self-targeted U2U service ticket.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSpecterOps published the first of a two-part deep-dive blog series exploring the internals of Kerberos user-to-user (U2U) authentication. The authors note that while U2U is popular among red teamers due to its role in ADCS, UnPAC-the-Hash, and Shadow Credentials attacks, there is limited material distilling how and why the technique actually works. The post emphasizes Windows internals over executing an attack.\u003c/p\u003e\n\n\u003cp\u003eThe article begins with a Kerberos primer covering the AS-REQ/AS-REP, TGS-REQ/TGS-REP, and AP-REQ/AP-REP exchanges, explaining the roles of the TGT, session keys, the KRBTGT key, the PAC, and authenticators. It then frames the problem U2U solves: services sometimes run under regular user accounts that have no SPN, so the KDC cannot locate a long-term key and returns KDC_ERR_S_PRINCIPAL_UNKNOWN. U2U addresses this by encrypting the service ticket with the hosting user\u0026rsquo;s TGT session key, signaled by the ENC-TKT-IN-SKEY flag and the target\u0026rsquo;s TGT placed in the additional-tickets field of a modified TGS-REQ. The client retrieves that TGT through a KERB-TGT-REQUEST sent directly to the service, which replies with a KERB-TGT-REPLY.\u003c/p\u003e\n\n\u003cp\u003eThe authors address the apparent danger of handing out TGTs, explaining it is safe because the TGT is encrypted with the randomly-generated KRBTGT long-term key and is unusable without its associated session key. This is why Rubeus exports tickets as KRB-CRED structures that bundle the ticket with the session key and metadata. They also highlight that session keys are randomly generated, KDC-issued, tied to the TGT lifetime (default 10 hours), and not derived from passwords, leaving no realistic brute-force surface against captured U2U tickets.\u003c/p\u003e\n\n\u003cp\u003eA significant portion of the article compares the draft-swift-win2k-krb-user2user specification against real Windows behavior. The draft defines three U2U-initiation scenarios, but the authors found only the first (client deliberately initiates U2U) is consistently implemented. They determined that KDC_ERR_MUST_USE_USER2USER does not exist in kerberos.dll, that there is no per-account policy or userAccountControl flag forcing U2U, and that the server-side KRB_AP_ERR_USER_TO_USER_REQUIRED path only applies when a service is hardcoded to require U2U.\u003c/p\u003e\n\n\u003cp\u003eThe authors detail RDP with Network Level Authentication (NLA) as the most common legitimate U2U use case. Through Wireshark analysis in a lab, they observed the client request a standard TERMSRV service ticket that is never used or cached, then initiate U2U because CredSSP calls InitializeSecurityContext with the ISC_REQ_USE_SESSION_KEY flag. The TGT exchange is wrapped in SPNEGO tokens inside CredSSP over TLS, and they note the KDC ignores the sname once ENC-TKT-IN-SKEY is set, reflecting back whatever target value was supplied. The motivation for U2U here is to obtain a fresh, non-cacheable session key that protects plaintext credential delivery from interception, and NLA additionally prevents pre-auth RDP vulnerabilities like BlueKeep.\u003c/p\u003e\n\n\u003cp\u003eFinally, the article connects U2U primitives to the UnPAC-the-Hash attack. In PKINIT, a user\u0026rsquo;s NT hash is embedded in the PAC\u0026rsquo;s PAC_CREDENTIAL_INFO structure, encrypted with the AS reply key derived from the Diffie-Hellman shared secret and two nonces. An attacker who obtains a target\u0026rsquo;s certificate (via ADCS ESC or Shadow Credentials attacks) can perform a PKINIT exchange, derive the AS reply key, request a self-targeted U2U service ticket, decrypt it with the held session key, and recover the NT hash for Pass-the-Hash or further Kerberos requests. The authors credit Duane Michael and Elad Shamir and promise a part 2.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is the first of a two-part blog series from SpecterOps titled \u0026ldquo;User-to-User Authentication: Down the Rabbit Hole – Part 1.\u0026rdquo; Its explicit goal, stated in the TL;DR, is to cover Windows internals and explain how Kerberos user-to-user (U2U) authentication works under the hood rather than to demonstrate how to execute an attack. The authors observe that although U2U is popular and common among red teamers — following its prominence in Active Directory Certificate Services (ADCS), UnPAC-the-Hash, and Shadow Credentials attacks — there is limited information distilling how and why the technique works.\u003c/p\u003e\n\n\u003ch2 id=\"kerberos-primer\"\u003eKerberos Primer\u003c/h2\u003e\n\n\u003cp\u003eThe article establishes the foundational Kerberos exchange:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe client sends an AS-REQ to the KDC containing a timestamp encrypted with a key derived from the client\u0026rsquo;s password; the username is sent in plaintext so the KDC can look up the matching key in AD.\u003c/li\u003e\n\u003cli\u003eOn success, the KDC builds a TGT with the user\u0026rsquo;s metadata in the PAC, encrypts it with the KRBTGT key, generates a session key (placed inside the TGT and in the EncASRepPart of the AS-REP), and the client caches the TGT and session key in LSASS.\u003c/li\u003e\n\u003cli\u003eTo access a service, the client sends a TGS-REQ with the TGT, target SPN, and an authenticator encrypted with the session key. The authenticator proves possession of the session key. The KDC issues a service ticket (ST) encrypted with the service\u0026rsquo;s long-term key, containing a fresh session key and the copied PAC.\u003c/li\u003e\n\u003cli\u003eThe client presents the ST to the service in an AP-REQ with a new authenticator; the service decrypts the ticket with its long-term key, recovers the session key, validates the authenticator, uses the PAC for authorization, and replies with an AP-REP.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-problem-u2u-solves\"\u003eThe Problem U2U Solves\u003c/h2\u003e\n\n\u003cp\u003eWindows services typically run as built-in accounts (e.g., NT AUTHORITY\\SYSTEM) or dedicated service accounts that h
