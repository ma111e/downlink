ave an SPN. Regular AD user accounts do not have an SPN. In peer-to-peer (P2P) scenarios where a user authenticates to a service hosted by another user, the KDC cannot locate a long-term key and returns KDC_ERR_S_PRINCIPAL_UNKNOWN. U2U solves this by encrypting the service ticket with the hosting user\u0026rsquo;s TGT session key instead of a service account\u0026rsquo;s long-term key.\u003c/p\u003e\n\n\u003ch2 id=\"how-u2u-works-mechanically\"\u003eHow U2U Works Mechanically\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe client sends a KERB-TGT-REQUEST directly to the target service.\u003c/li\u003e\n\u003cli\u003eThe service responds with a KERB-TGT-REPLY containing its own TGT.\u003c/li\u003e\n\u003cli\u003eThe client submits this TGT in the additional-tickets field of a modified TGS-REQ with the ENC-TKT-IN-SKEY flag set.\u003c/li\u003e\n\u003cli\u003eThe KDC decrypts the additional TGT with the KRBTGT key, extracts the session key, and uses it to encrypt the new U2U service ticket.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"why-handing-out-tgts-is-safe\"\u003eWhy Handing Out TGTs Is Safe\u003c/h2\u003e\n\n\u003cp\u003eThe TGT is encrypted with the KRBTGT account\u0026rsquo;s long-term key, so the session key inside is inaccessible without that key. AD randomly generates the KRBTGT password, making it computationally infeasible to crack (cracking it would enable the Golden Ticket attack, a threat independent of U2U). A TGT alone is unusable without its associated session key, which is why Rubeus output is a KRB-CRED structure bundling the ticket with the session key, flags, expiration, and metadata.\u003c/p\u003e\n\n\u003ch2 id=\"why-session-keys-beat-long-term-keys\"\u003eWhy Session Keys Beat Long-Term Keys\u003c/h2\u003e\n\n\u003cp\u003eThe KDC randomly generates session keys, delivers them in the AS-REP\u0026rsquo;s EncASRepPart, and does not store them. Their validity is tied to the TGT lifetime (default 10 hours). Because they are not password-derived, there is no dictionary or brute-force path, so a captured U2U ticket would offer at most a ten-hour window against a random key — not a realistic attack surface.\u003c/p\u003e\n\n\u003ch2 id=\"where-the-draft-falls-short-of-reality\"\u003eWhere the Draft Falls Short of Reality\u003c/h2\u003e\n\n\u003cp\u003eThe draft-swift-win2k-krb-user2user specification defines three U2U-initiation scenarios:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eClient knows U2U upfront\u003c/strong\u003e — goes directly to the service with KERB-TGT-REQUEST, then performs U2U. Implemented in Windows (RDP with NLA).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKDC enforces U2U via account policy\u003c/strong\u003e — draft says implementations \u0026ldquo;MAY\u0026rdquo; apply a per-account policy, with the KDC returning KDC_ERR_MUST_USE_USER2USER (0x1B).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eServer enforces U2U after the TGS exchange\u003c/strong\u003e — server returns KRB_AP_ERR_USER_TO_USER_REQUIRED (0x45) to an AP-REQ.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe authors found significant divergence from reality:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThere is no per-account policy, userAccountControl flag, or Group Policy setting in Windows to force U2U.\u003c/li\u003e\n\u003cli\u003eKDC_ERR_MUST_USE_USER2USER does not exist in kerberos.dll; attempts to trigger it (via UPN in the SPN field or an empty SPN) only returned KDC_ERR_S_PRINCIPAL_UNKNOWN.\u003c/li\u003e\n\u003cli\u003eEven if it existed, the error provides no path to the needed TGT, since the KDC does not track TGTs after issuance.\u003c/li\u003e\n\u003cli\u003eThe third scenario is not entirely fictional but only applies when a service is hardcoded to require U2U and explicitly returns the error — application-level logic, not a missing SPN or KDC policy.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft chose to enforce U2U earlier in the flow rather than at the AP layer, so only the first scenario is consistently observed in Windows.\u003c/p\u003e\n\n\u003ch2 id=\"the-curious-case-of-rdp-with-nla\"\u003eThe Curious Case of RDP With NLA\u003c/h2\u003e\n\n\u003cp\u003eThe most common legitimate U2U observation is RDP when the target server has NLA enabled. NLA requires authentication before the server renders a login screen and relies on CredSSP to forward credentials in encrypted form. Through lab traffic captured in Wireshark, the authors traced the exchange:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe RDP client makes a standard TGS-REQ for TERMSRV/hostname.domain.local and receives a valid service ticket that is then never used or cached.\u003c/li\u003e\n\u003cli\u003eThe client immediately contacts the RDP server to request its TGT, starting the U2U exchange — with no error from the server or KDC. U2U is initiated because CredSSP calls InitializeSecurityContext with the ISC_REQ_USE_SESSION_KEY flag.\u003c/li\u003e\n\u003cli\u003eThe RDP server responds with a KERB-TGT-REPLY containing the computer account\u0026rsquo;s TGT. The KERB-TGT-REQUEST/REPLY are wrapped in SPNEGO tokens inside CredSSP TSRequest structures over TLS, so they are not visible as raw Kerberos traffic on 88/TCP.\u003c/li\u003e\n\u003cli\u003eThe client sends a TGS-REQ with the server\u0026rsquo;s TGT in additional-tickets and ENC-TKT-IN-SKEY set. The sname still references TERMSRV/castelblack, but the KDC ignores it once the flag is set; the ticket is issued for the castelblack$ computer account and encrypted with its TGT session key.\u003c/li\u003e\n\u003cli\u003eThe TGS-REP reflects the same sname back. Rubeus testing confirmed whatever target value is supplied is reflected in the issued ticket\u0026rsquo;s sname, contradicting the draft\u0026rsquo;s specification that sname should reflect the target\u0026rsquo;s UPN.\u003c/li\u003e\n\u003cli\u003eThe client sends the AP-REQ wrapped in CredSSP, with AP-OPTIONS USE-SESSION-KEY set to true so the server knows to use the session key from LSASS to decrypt.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe authors argue the need for U2U in RDP/NLA is debatable since a standard service ticket could already be requested. They conclude the legitimate reason is the non-cacheable, short-lived session keys: a fresh session key is generated to deliver the client\u0026rsquo;s plaintext credentials, avoiding the risk of an attacker extracting a reused cached key and decrypting the CredSSP exchange. NLA also prevents pre-auth RDP vulnerabilities like BlueKeep.\u003c/p\u003e\n\n\u003ch2 id=\"unpac-the-hash\"\u003eUnPAC-the-Hash\u003c/h2\u003e\n\n\u003cp\u003eThe article connects U2U primitives to the UnPAC-the-Hash attack:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn PKINIT authentication, the user authenticates with a certificate rather than a password, so the client has no NT hash to cache for the msv1_0 package. Microsoft therefore includes the user\u0026rsquo;s NT hash in the PAC\u0026rsquo;s PAC_CREDENTIAL_INFO structure when the TGT is obtained via certificate, to support legacy NTLM services.\u003c/li\u003e\n\u003cli\u003ePAC_CREDENTIAL_INFO is encrypted with the AS reply key, derived from the Diffie-Hellman shared secret and two nonces (server and client). This key encrypts the EncASRepPart in PKINIT and is only temporarily stored in LSASS.\u003c/li\u003e\n\u003cli\u003eNatively, the LSA decrypts EncASRepPart to get the TGT session key, then requests a service ticket for itself (HOST/FQDN) to obtain a decryptable copy of the PAC, decrypts PAC_CREDENTIAL_INFO with the AS reply key, and caches the NT hash for NTLM.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attack reuses these primitives:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker first obtains a target\u0026rsquo;s certificate and private key (via ADCS ESC or Shadow Credentials attacks, or by dumping a PKINIT-obtained TGT).\u003c/li\u003e\n\u003cli\u003eThey initiate their own PKINIT exchange with an attacker-controlled ephemeral DH key pair, receive an AS-REP, and derive the AS reply key, yielding a valid TGT and session key.\u003c/li\u003e\n\u003cli\u003eThey request a self-targeted U2U service ticket, which the KDC encrypts with the held TGT session key, allowing the attacker to decrypt it entirely on their own.\u003c/li\u003e\n\u003cli\u003eThey access the embedded PAC and decrypt PAC_CREDENTIAL_INFO with the derived AS reply key to retrieve the user\u0026rsquo;s NT hash.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe recovered NT hash can be used for Pass-the-Hash or to request Kerberos tickets directly if RC4 is enabled, and many ADCS ESC attacks chain naturally into UnPAC-the-Hash.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe authors close by teasing additional U2U content in part 2 and thank Duane Michael and Elad Shamir.\u003c/p\u003e\n","keyPoints":["Kerberos user-to-user (U2U) authentication solves peer-to-peer scenarios where a service runs under an account that has no SPN, by encrypting the service ticket with the hosting user's TGT session key rather than a service account's long-term key, using the ENC-TKT-IN-SKEY flag in a modified TGS-REQ that includes the target's TGT in the additional-tickets field.","Handing out TGTs is safe because they are encrypted with the randomly-generated KRBTGT long-term key, and a TGT is unusable without its associated session key, which is why Rubeus exports tickets as KRB-CRED structures containing both the ticket and the session key.","Although the draft RFC defines three U2U scenarios, the authors found that Windows only consistently implements the first (client-initiated) scenario, as the KDC_ERR_MUST_USE_USER2USER error does not exist in kerberos.dll and there is no per-account policy attribute to force U2U.","RDP with Network Level Authentication (NLA) is the most common legitimate use of U2U, where CredSSP calls InitializeSecurityContext with the ISC_REQ_USE_SESSION_KEY flag to obtain a fresh, non-cacheable session key used to securely deliver the client's plaintext credentials.","The UnPAC-the-Hash attack reuses U2U primitives: after obtaining a user's certificate, an attacker performs a PKINIT exchange to derive the AS reply key and TGT session key, requests a U2U service ticket for themselves, and decrypts the PAC's PAC_CREDENTIAL_INFO structure to recover the user's NT hash for Pass-the-Hash."],"insights":["The U2U specification draft diverges significantly from Windows reality: the authors manually attempted to trigger KDC_ERR_MUST_USE_USER2USER and confirmed it does not exist in kerberos.dll, and even an error like this would be of limited use since the KDC does not track TGTs after issuance and cannot direct the client to the material it needs.","In RDP with NLA, the client first obtains a perfectly valid standard service ticket for TERMSRV/hostname but then never uses or caches it, instead deliberately switching to U2U solely to obtain a fresh, non-cacheable, short-lived session key that protects the plaintext credential delivery in CredSSP from interception and key extraction.","The KDC ignores the sname/SPN field entirely once ENC-TKT-IN-SKEY is set and simply reflects whatever target value was supplied back into the issued ticket's sname, contradicting the draft's specification that sname should reflect the target service's UPN.","Microsoft's inclusion of the NT hash in the PAC during PKINIT authentication, intended only to support legacy NTLM services when no password is available, is precisely the design decision that makes UnPAC-the-Hash possible by allowing an attacker who controls the DH key pair to derive the AS reply key and decrypt PAC_CREDENTIAL_INFO."],"referencedReports":[{"title":"draft-swift-win2k-krb-user2user-01","url":"https://datatracker.ietf.org/doc/html/draft-swift-win2k-krb-user2user-01","publisher":"IETF","context":"The article references this Kerberos U2U draft specification as describing three scenarios in which U2U authentication is initiated, and contrasts the draft's specifications against actual Windows implementation behavior.","category":"","primary":false}],"body":"\u003cp\u003eThis is the first of a two-part blog series from SpecterOps that dives into the Windows internals of Kerberos user-to-user (U2U) authentication, focusing on how and why the technique works rather than demonstrating an attack. U2U gained attention following its use in ADCS, UnPAC-the-Hash, and Shadow Credentials attacks, but the article notes there is limited information explaining the underlying mechanics. The post first establishes a Kerberos primer before exploring how U2U differs from traditional Kerberos.\u003c/p\u003e\n\n\u003cp\u003eU2U was designed to solve peer-to-peer authentication scenarios where a service runs under a regular user account that has no SPN. In standard Kerberos, service tickets are encrypted with a service account\u0026rsquo;s long-term key, but U2U instead encrypts the ticket with the session key from the hosting user\u0026rsquo;s TGT, supplied in the additional-tickets field of a TGS-REQ with the ENC-TKT-IN-SKEY flag set. The client obtains the target\u0026rsquo;s TGT directly via a KERB-TGT-REQUEST/KERB-TGT-REPLY exchange before submitting it to the KDC.\u003c/p\u003e\n\n\u003cp\u003eThe article also examines where the draft RFC diverges from actual Windows behavior, finding that only the client-initiated U2U scenario (notably RDP with NLA) is consistently implemented. It further explains how the same U2U primitives enable the UnPAC-the-Hash attack, which recovers a user\u0026rsquo;s NT hash through a PKINIT exchange and a self-targeted U2U service ticket.\u003c/p\u003e\n"},{"n":12,"title":"XBOW tests Anthropic's Mythos Preview for offensive security","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/xbow-tests-anthropics-mythos-preview-for-offensive-security/","time":"16:16","priority":"MAY READ","score":50,"tldr":"XBOW evaluated Anthropic's unreleased Mythos Preview model and found it to be a major leap in offensive security capabilities, especially at source-code auditing, native-code analysis, and reverse engineering, while it remains weaker at live-site exploit validation and judgment tasks. Despite its power, the model is expensive (reportedly 5x an Opus model) and not always cost-effective, so XBOW recommends pairing it with live-site validation tooling and other models rather than relying on it alone.","briefOverview":"\u003cp\u003eXBOW, a company that performs automated penetration testing, received early access to Anthropic\u0026rsquo;s unreleased Mythos Preview model roughly three months ago to assess its offensive security capabilities. The company assembled a team of 10 experts and tested the model both inside Claude Code and as a raw API engine for XBOW\u0026rsquo;s agents, using its internal benchmarking system alongside interactive use and workflow integration.\u003c/p\u003e\n\n\u003cp\u003eXBOW concluded that Mythos Preview represents a major advance in vulnerability discovery, particularly when source code is available, cutting false negatives by 42% versus Opus 4.6 (55% when given source code) on its web exploit benchmark. The model showed exceptional strength in reading source code, native-code vulnerability discovery, and reverse engineering, while its judgment on safety-related tasks was more mixed and overly literal.\u003c/p\u003e\n\n\u003cp\u003eDespite its power, Mythos Preview is reportedly 5x as expensive as an Opus model and is not best-in-class on cost efficiency, leading XBOW to frame it as one tool among many. The article emphasizes that the model is a \u0026lsquo;brain without a body\u0026rsquo; and needs live-site validation infrastructure—such as XBOW\u0026rsquo;s—to prove which findings are actually exploitable.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eXBOW, a company specializing in live-site penetration testing, was invited by Anthropic about three months before publication to evaluate a new model the vendor believed represented a significant shift in capability. XBOW put the model, called Mythos Preview, through its security gauntlet: benchmarks, workflows, interactive use, and integrations. A diverse team of 10 experts assessed the model from multiple angles, including threat modeling, vulnerability validation, source-code versus live-system analysis, and native app vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe testing used XBOW\u0026rsquo;s internal benchmarking system, which freezes open-source applications at known-vulnerable versions and runs agents against them. XBOW evaluated Mythos Preview both inside Claude Code and as a raw model accessed via API as an engine for XBOW\u0026rsquo;s agents, separating the cases because orchestration, tools, prompting, and live-site access materially affect outcomes. In interactive use, testers found weaknesses in XBOW\u0026rsquo;s own source code and disclosed several new vulnerabilities in open-source software within the first week.\u003c/p\u003e\n\n\u003cp\u003eOn benchmarks, Mythos Preview presented a significant step up over all existing models on XBOW\u0026rsquo;s web exploit benchmark, which counts a pass only when a validated, actionable exploit is found within 80 actions. Compared to Opus 4.6, false negatives were cut by 42%, or 55% when both models were given source code. Token-for-token, XBOW reported the model homed in on vulnerabilities with unprecedented precision, though the difference to GPT-5.5 was less pronounced than to Opus 4.6.\u003c/p\u003e\n\n\u003cp\u003eA recurring theme was that Mythos Preview is even more impressive at reading code than writing it. However, XBOW stressed that many exploitable issues arise from configuration, dependencies, deployment choices, or unsafe combinations of safe components—issues not visible by staring at code alone. Notably, even on benchmarks where vulnerabilities are discoverable in code, removing live-site access hurt performance more than removing source-code access, reinforcing XBOW\u0026rsquo;s value proposition of safe, structured live-site interaction.\u003c/p\u003e\n\n\u003cp\u003eThe model\u0026rsquo;s judgment results were mixed: it rejected false positives well but was literal and conservative, sometimes losing true positives. On XBOW\u0026rsquo;s command safety benchmark it scored only 77.8%, below Opus 4.6\u0026rsquo;s 81.2% and Haiku 4.5\u0026rsquo;s 90.1%, often prioritizing the letter of the rules over their spirit. Conversely, the model showed substantial strength in native code and reverse engineering, finding more real Chromium bugs with fewer false positives, identifying true positives in V8 sandbox work, and reasoning through unusual firmware and embedded systems contexts.\u003c/p\u003e\n\n\u003cp\u003eMythos Preview is reportedly 5x as expensive as an Opus model and not yet available over public APIs at the time of writing. XBOW found it is not terribly inefficient at high accuracy but not best-in-class on cost, echoing Point Estimate\u0026rsquo;s analysis of the AI Security Institute\u0026rsquo;s benchmarking that compared Mythos Preview to GPT-5.5. The takeaway is that Mythos Preview should be one arrow in the quiver, and depending on the task it may be more sensible to let a cheaper model try several times than to use Mythos Preview once.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eXBOW, a company that performs automated live-site penetration testing, published a sponsored article detailing its early-access evaluation of Anthropic\u0026rsquo;s unreleased model, Mythos Preview. Anthropic invited XBOW roughly three months prior to assess a model it believed represented a significant shift in capability. XBOW characterizes Mythos Preview as a major advance, substantially better than prior models at finding vulnerability candidates—especially when source code is available—while emphasizing that a model is \u0026lsquo;a brain without a body\u0026rsquo; that needs the right harness and tooling to reach its full potential.\u003c/p\u003e\n\n\u003ch2 id=\"testing-methodology\"\u003eTesting Methodology\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eXBOW assembled a team of 10 experts from different parts of the company to assess the model from multiple directions.\u003c/li\u003e\n\u003cli\u003eIt used the same internal benchmarking system previously applied to Opus 4.7 and GPT-5.5, which takes open-source applications with previously discovered vulnerabilities, freezes them at the vulnerable version, and runs agents against them.\u003c/li\u003e\n\u003cli\u003eTesting was expanded to evaluate the model\u0026rsquo;s judgment (threat modeling, vulnerability validation, safety), its ability to read source code versus interact with live systems, and its ability to find exploits outside standard assessments such as native app vulnerabilities.\u003c/li\u003e\n\u003cli\u003eMythos Preview was explored both inside Claude Code and as a raw model via its API as an engine for XBOW\u0026rsquo;s agents, with the cases separated because orchestration, tools, prompting, and live-site access materially affect outcomes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-findings\"\u003eKey Findings\u003c/h2\u003e\n\n\u003cp\u003eXBOW\u0026rsquo;s key takeaways were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExtremely powerful for source code audits.\u003c/li\u003e\n\u003cli\u003eGood, but less powerful, at validating exploits.\u003c/li\u003e\n\u003cli\u003eMixed judgment—it can be too literal and conservative, and tends to overstate the practical relevance of its findings.\u003c/li\u003e\n\u003cli\u003eStrong in native-code vulnerability discovery and reverse engineering.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn interactive use, testers found weaknesses in XBOW\u0026rsquo;s own source code (nothing truly terrible, but several items to repair) and, after week one of testing on open-source software, had several new vulnerabilities to disclose.\u003c/p\u003e\n\n\u003ch2 id=\"benchmark-performance\"\u003eBenchmark Performance\u003c/h2\u003e\n\n\u003cp\u003eMythos Preview presented a significant step up over all existing models on XBOW\u0026rsquo;s web exploit benchmark, which tests whether a model can help find validated, actionable vulnerabilities in live website environments. A case passes only when a validated way to act on the vulnerability (PoC||GTFO) is found after up to 80 \u0026lsquo;actions,\u0026rsquo; where an action might be a shell or Python script using standard commands or XBOW\u0026rsquo;s attack tools.\u003c/p\u003e\n\n\u003cp\u003eCompared to Opus 4.6:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFalse negatives were cut by 42%.\u003c/li\u003e\n\u003cli\u003eWhen both models were given the site\u0026rsquo;s source code, false negatives were cut by 55%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMythos Preview found vulnerabilities in significantly fewer iterations than Opus 4.6, though the difference to GPT-5.5 was less pronounced. When normalized by output tokens and analyzed by odds of discovery (hit rate divided by miss rate), XBOW concluded that token-for-token, Mythos Preview hones in on the vulnerability with unprecedented precision. Opus 4.7 was excluded from one chart because it interacts with XBOW\u0026rsquo;s system in a unique way.\u003c/p\u003e\n\n\u003ch2 id=\"live-site-validation\"\u003eLive-Site Validation\u003c/h2\u003e\n\n\u003cp\u003eXBOW emphasizes that many exploitable issues do not appear as obvious defects in source code—they emerge from configuration, dependencies, deployment choices, or unsafe combinations of otherwise safe components. The article cites Gary McGraw\u0026rsquo;s declaration that most defects won\u0026rsquo;t be found by \u0026lsquo;staring at code\u0026rsquo; alone. XBOW performs pentests against a live site (the attacker\u0026rsquo;s view), whereas Mythos Preview, as used by Project Glasswing, excels at auditing source code (the developer\u0026rsquo;s view).\u003c/p\u003e\n\n\u003cp\u003eNotably, even on XBOW\u0026rsquo;s benchmarks where the vulnerability is purely in code, removing access to the live site hurt performance more than removing access to source code. While Mythos Preview suffers from being denied live-site access, other models suffer even more, confirming that its greatest strength is reading source code. The best results come from combining live-site and source-code access, enabling the ideal pattern: analyze source code to find a lead, probe the live site to understand deployment, then craft an exploit.\u003c/p\u003e\n\n\u003ch2 id=\"judgment-results\"\u003eJudgment Results\u003c/h2\u003e\n\n\u003cp\u003eMythos Preview\u0026rsquo;s judgment was more mixed than its discovery results. Across command safety, threat modeling, and trace triage, it was often careful and precise but also literal and conservative. It rejected false positives better than many predecessors but sometimes lost true positives when evidence did not formally satisfy its criteria.\u003c/p\u003e\n\n\u003cp\u003eOn XBOW\u0026rsquo;s command safety benchmark—which asks whether a script is safe to execute without impacting the target site—results were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHaiku 4.5: 90.1% accuracy\u003c/li\u003e\n\u003cli\u003eOpus 4.6: 81.2% accuracy\u003c/li\u003e\n\u003cli\u003eMythos Preview: 77.8% accuracy\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eXBOW found Mythos Preview often had a point in its reasoning, but it prioritized the letter of the rules while Opus 4.6 prioritized the spirit. This makes the model valuable but not self-sufficient, requiring precise prompts, explicit threat models, and validation infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"native-code-and-reverse-engineering\"\u003eNative Code and Reverse Engineering\u003c/h2\u003e\n\n\u003cp\u003eThe model showed substantial strength beyond web applications:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn Chromium-related testing, it found more real bugs with fewer false positives than prior baselines.\u003c/li\u003e\n\u003cli\u003eIn V8 sandbox work, it identified true positives in a subtle threat model where previous approaches produced findings but no successful true positives.\u003c/li\u003e\n\u003cli\u003eIt triaged both its own results and competitor-model findings.\u003c/li\u003e\n\u003cli\u003eIts reverse-engineering results were among the most striking, reasoning through unusual firmware and embedded systems contexts, including architectures and OS combinations requiring more than rote pattern matching.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"browser-interaction-and-visual-acuity\"\u003eBrowser Interaction and Visual Acuity\u003c/h2\u003e\n\n\u003cp\u003eXBOW\u0026rsquo;s workflows often require models to interact with live websites through a browser, where visual acuity matters for identifying and clicking the right UI element. Mythos Preview performed extremely well on XBOW\u0026rsquo;s visual-acuity QA, roughly matching Sonnet 4.6 and dramatically outperforming Opus 4.6. It was not perfectly pixel-accurate for exact coordinates but was practically effective at selecting the right browser actions. XBOW suggests the real story is that recent Anthropic models had begun to deteriorate in this area, and Anthropic has now caught and reversed that deterioration, with Opus 4.7 also performing well.\u003c/p\u003e\n\n\u003ch2 id=\"cost-considerations\"\u003eCost Considerations\u003c/h2\u003e\n\n\u003cp\u003eMythos Preview was not yet available over public APIs at the time of writing. Anthropic indicated it would be 5x as expensive as an Opus model, already one of the more expensive options token-for-token. XBOW found that normalizing by estimated running cost, Mythos Preview is not terribly inefficient at high accuracy but is not best-in-class on its benchmarks. This aligns with Point Estimate\u0026rsquo;s analysis of the AI Security Institute\u0026rsquo;s benchmarking of Mythos Preview vs GPT-5.5: the real choice is to pay for an agent to use Mythos Preview briefly, or to use GPT-5.5 for as long as needed, with the better option depending on the use case.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eXBOW\u0026rsquo;s evaluation suggests frontier models have taken a major step forward in vulnerability discovery. Mythos Preview is strong at finding candidate vulnerabilities, especially from source code, with impressive ability across web, native-code, and reverse-engineering tasks. However, it needs to be mounted in the right harness with the right tools, and should be just one arrow in the quiver—depending on the task, it may be more sensible to let another model try several times than to let Mythos Preview try once. This is why XBOW maintains a cadre of models rather than restricting itself to a single one.\u003c/p\u003e\n","keyPoints":["XBOW received early access to Anthropic's Mythos Preview model roughly three months before publication and tested it both inside Claude Code and as a raw API engine for XBOW's agents using benchmarks, workflows, and interactive use.","Mythos Preview demonstrated a major advance in vulnerability discovery, cutting false negatives by 42% compared to Opus 4.6 on XBOW's web exploit benchmark (and 55% when given the site's source code), and showed unprecedented token-for-token precision at homing in on vulnerabilities.","The model is especially strong at reading source code and excels in native-code vulnerability discovery and reverse engineering, including finding more real Chromium bugs with fewer false positives and identifying true positives in V8 sandbox work.","Its judgment was mixed and overly literal, scoring only 77.8% on XBOW's command safety benchmark versus 81.2% for Opus 4.6 and 90.1% for Haiku 4.5, indicating it needs precise prompts, explicit threat models, and validation infrastructure to be reliable.","Mythos Preview is reportedly 5x as expensive as an Opus model and is not best-in-class on cost efficiency, leading XBOW to conclude that depending on the task it may be more sensible to let a cheaper model like GPT-5.5 run longer than to use Mythos Preview once."],"insights":["Counterintuitively, even on benchmarks where the vulnerability is fully discoverable in code, removing live-site access hurt Mythos Preview's performance more than removing source-code access, suggesting that interacting with real deployed behavior matters more than reading code for proving exploitability.","Mythos Preview's tendency to prioritize the letter of the rules over their spirit caused it to underperform on command safety judgment, meaning a more powerful model can actually be worse at safety classification than smaller models like Opus 4.6 and Haiku 4.5.","The article reframes Mythos Preview's strong visual-acuity result as evidence that recent Anthropic models had been deteriorating in browser-interaction ability, and that this regression has now been caught and reversed across multiple models including Opus 4.7.","Because of cost asymmetry, the optimal security strategy may be probabilistic rather than capability-driven: running a cheaper model multiple times can yield better accuracy per dollar than a single run of the far more expensive Mythos Preview."],"referencedReports":[{"title":"How Good Is Mythos","url":"https://pointestimate.substack.com/p/how-good-is-mythos","publisher":"Point Estimate","context":"The article cites Point Estimate's analysis to support its finding that Mythos Preview is powerful but not always cost-effective compared to GPT-5.5.","category":"","primary":false},{"title":"Our Evaluation of OpenAI's GPT-5.5 Cyber Capabilities","url":"https://www.aisi.gov.uk/blog/our-evaluation-of-openais-gpt-5-5-cyber-capabilities","publisher":"AI Security Institute","context":"Referenced as the AI Security Institute's benchmarking of Mythos Preview vs GPT-5.5 that Point Estimate's analysis examined.","category":"","primary":false}],"body":"\u003cp\u003eXBOW, a company that performs automated penetration testing, received early access to Anthropic\u0026rsquo;s unreleased Mythos Preview model roughly three months ago to assess its offensive security capabilities. The company assembled a team of 10 experts and tested the model both inside Claude Code and as a raw API engine for XBOW\u0026rsquo;s agents, using its internal benchmarking system alongside interactive use and workflow integration.\u003c/p\u003e\n\n\u003cp\u003eXBOW concluded that Mythos Preview represents a major advance in vulnerability discovery, particularly when source code is available, cutting false negatives by 42% versus Opus 4.6 (55% when given source code) on its web exploit benchmark. The model showed exceptional strength in reading source code, native-code vulnerability discovery, and reverse engineering, while its judgment on safety-related tasks was more mixed and overly literal.\u003c/p\u003e\n\n\u003cp\u003eDespite its power, Mythos Preview is reportedly 5x as expensive as an Opus model and is not best-in-class on cost efficiency, leading XBOW to frame it as one tool among many. The article emphasizes that the model is a \u0026lsquo;brain without a body\u0026rsquo; and needs live-site validation infrastructure—such as XBOW\u0026rsquo;s—to prove which findings are actually exploitable.\u003c/p\u003e\n"},{"n":7,"title":"What Trump’s AI Executive Order Means for Healthcare Sector","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/what-trumps-ai-executive-order-means-for-healthcare-sector/","time":"17:11","priority":"MAY READ","score":48,"tldr":"President Trump's new AI executive order barely mentions healthcare, but experts like Health-ISAC's Errol Weiss say it could benefit the sector by improving speed and coordination against AI-empowered attackers—provided its outputs translate into timely, actionable information sharing through established ISAC channels.","briefOverview":"\u003cp\u003ePresident Donald Trump issued an executive order on artificial intelligence that, while barely mentioning healthcare, could have a positive impact on the critical infrastructure sector if implemented effectively. Experts cited in the article see potential benefits for health organizations through improved speed and coordination in cybersecurity efforts.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at Health-ISAC, emphasized that critical infrastructure operators need to stay ahead of attackers who are professionalizing and leveraging AI to compress the time between vulnerability discovery and exploitation. He noted that the executive order\u0026rsquo;s biggest opportunity for healthcare lies in speed and coordination.\u003c/p\u003e\n\n\u003cp\u003eWeiss stressed that execution of the order matters, stating that the sector will benefit most if review/benchmarking outputs, vulnerability clearinghouse activity, and tool access translate into timely, actionable information sharing through established ISAC channels. The ultimate goal is measurable resilience improvements so that cyber incidents do not become prolonged critical infrastructure outages that impact national security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePresident Donald Trump signed an executive order on artificial intelligence that barely mentions healthcare, yet some experts believe the directive could have a positive impact on the critical infrastructure sector if it is implemented effectively. The article focuses on how this AI-focused policy might indirectly benefit health organizations.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at the Health Information Sharing and Analysis Center (Health-ISAC), provided commentary on the order\u0026rsquo;s potential. He identified speed and coordination as the executive order\u0026rsquo;s biggest opportunity for healthcare.\u003c/p\u003e\n\n\u003cp\u003eWeiss framed the cybersecurity challenge in terms of an evolving threat landscape, noting that critical infrastructure operators need to stay ahead of attackers who are professionalizing and leveraging AI to compress the time between vulnerability discovery and exploitation. This dynamic underscores why defensive capabilities matter in keeping pace with attacker tempo.\u003c/p\u003e\n\n\u003cp\u003eHowever, Weiss cautioned that execution of the order is critical. He stated the sector will benefit most if review/benchmarking outputs, vulnerability clearinghouse activity, and tool access translate into timely, actionable information sharing through established ISAC channels.\u003c/p\u003e\n\n\u003cp\u003eThe desired outcome, according to Weiss, is measurable resilience improvements so that cyber incidents do not become prolonged critical infrastructure outages that impact national security. The article was originally published in Healthcare Info Security and shared by Health-ISAC.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article examines the potential implications of President Donald Trump\u0026rsquo;s executive order on artificial intelligence for the healthcare sector. Although the directive barely mentions healthcare, experts cited in the article suggest it could have a positive impact on the critical infrastructure sector if implemented effectively. The piece was originally published in Healthcare Info Security and features commentary from Health-ISAC.\u003c/p\u003e\n\n\u003ch2 id=\"the-executive-order-and-healthcare\"\u003eThe Executive Order and Healthcare\u003c/h2\u003e\n\n\u003cp\u003eThe executive order is primarily focused on artificial intelligence and does not center on healthcare specifically. Despite this limited direct reference, the article frames the order as having indirect relevance for healthcare as part of the broader critical infrastructure landscape. The key conditional throughout the article is that benefits depend on effective implementation.\u003c/p\u003e\n\n\u003ch2 id=\"expert-commentary-from-health-isac\"\u003eExpert Commentary from Health-ISAC\u003c/h2\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at the Health Information Sharing and Analysis Center (Health-ISAC), provided the primary expert perspective in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOpportunity:\u003c/strong\u003e Weiss stated that \u0026ldquo;The EO\u0026rsquo;s biggest opportunity for healthcare is speed and coordination.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThreat context:\u003c/strong\u003e He noted that \u0026ldquo;Critical infrastructure operators need to stay ahead of attackers who are professionalizing and leveraging AI to compress the time between vulnerability discovery and exploitation.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecution caveat:\u003c/strong\u003e Weiss emphasized that execution of the order matters, saying the sector will benefit most if review/benchmarking outputs, vulnerability clearinghouse activity, and tool access translate into timely, actionable information sharing through established ISAC channels.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDesired outcome:\u003c/strong\u003e He highlighted the goal of \u0026ldquo;measurable resilience improvements – so cyber incidents don\u0026rsquo;t become prolonged critical infrastructure outages that impact national security.\u0026rdquo;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-themes\"\u003eKey Themes\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAI as a double-edged factor:\u003c/strong\u003e The article highlights that attackers are professionalizing and using AI to shorten the window between vulnerability discovery and exploitation, making defensive speed essential.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInformation sharing infrastructure:\u003c/strong\u003e The value of the executive order is tied to whether its outputs flow into established ISAC channels rather than remaining siloed.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNational security stakes:\u003c/strong\u003e The article connects healthcare cyber resilience to broader national security concerns, framing prolonged critical infrastructure outages as a national security risk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents an opinion-oriented analysis of how an AI-focused executive order, despite not being aimed at healthcare, could shape the sector\u0026rsquo;s cybersecurity posture. The central message is that policy outcomes hinge on effective implementation and integration into existing information-sharing mechanisms to produce measurable resilience improvements.\u003c/p\u003e\n","keyPoints":["President Donald Trump issued an executive order on artificial intelligence that barely mentions healthcare, but experts believe it could positively impact the critical infrastructure sector if implemented effectively.","Errol Weiss, chief security officer at Health-ISAC, said the executive order's biggest opportunity for healthcare is speed and coordination in staying ahead of attackers who are leveraging AI to compress the time between vulnerability discovery and exploitation.","Weiss emphasized that execution of the order matters, and the sector will benefit most if review/benchmarking outputs, vulnerability clearinghouse activity, and tool access translate into timely, actionable information sharing through established ISAC channels.","The desired outcome is measurable resilience improvements so that cyber incidents do not become prolonged critical infrastructure outages that impact national security."],"insights":["Despite being an AI-focused executive order that barely references healthcare, the directive may still meaningfully benefit the healthcare sector indirectly through its critical infrastructure provisions, illustrating how policy not explicitly aimed at a sector can still shape its security posture.","The article frames AI as a double-edged dynamic in which attackers are professionalizing and using AI to compress the window between vulnerability discovery and exploitation, meaning defensive AI gains are valuable largely because they help defenders keep pace with this accelerating attacker tempo.","Weiss highlights that the executive order's value depends entirely on execution—specifically whether its review/benchmarking outputs, vulnerability clearinghouse activity, and tool access actually flow into existing ISAC information-sharing channels rather than remaining siloed."],"referencedReports":[],"body":"\u003cp\u003ePresident Donald Trump issued an executive order on artificial intelligence that, while barely mentioning healthcare, could have a positive impact on the critical infrastructure sector if implemented effectively. Experts cited in the article see potential benefits for health organizations through improved speed and coordination in cybersecurity efforts.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at Health-ISAC, emphasized that critical infrastructure operators need to stay ahead of attackers who are professionalizing and leveraging AI to compress the time between vulnerability discovery and exploitation. He noted that the executive order\u0026rsquo;s biggest opportunity for healthcare lies in speed and coordination.\u003c/p\u003e\n\n\u003cp\u003eWeiss stressed that execution of the order matters, stating that the sector will benefit most if review/benchmarking outputs, vulnerability clearinghouse activity, and tool access translate into timely, actionable information sharing through established ISAC channels. The ultimate goal is measurable resilience improvements so that cyber incidents do not become prolonged critical infrastructure outages that impact national security.\u003c/p\u003e\n"},{"n":28,"title":"New in the Threat Center: Compromised Components, Now Available via API","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/new-in-the-threat-center-compromised-components-now-available-via-api","time":"17:18","priority":"MAY READ","score":46,"tldr":"StepSecurity has launched a new API endpoint that lets Enterprise customers programmatically retrieve the compromised OSS components for a specific supply chain threat incident, returning structured data like package name, version, severity, and verification status. This enables teams to automate incident response, enrich SIEM workflows, and cross-reference incidents against their own dependency inventories without manual dashboard checks.","briefOverview":"\u003cp\u003eStepSecurity has announced a new API endpoint that makes its supply chain threat incident data available programmatically. The endpoint, GET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components, returns every compromised open source software (OSS) component tied to a specific incident, including package ecosystem, affected version, severity, verification status, and a threat description.\u003c/p\u003e\n\n\u003cp\u003eThis addition extends StepSecurity\u0026rsquo;s existing Threat Intelligence offering, which detects active supply chain compromises within minutes using the same systems that previously uncovered the tj-actions and nx incidents. Where detection events previously told teams that an incident existed, the new endpoint lets their systems query exactly which packages and versions an incident involves and act on that data programmatically.\u003c/p\u003e\n\n\u003cp\u003eThe feature is positioned as the fourth path in a larger response loop alongside real-time detection events streamed to SIEM platforms, the Threat Center dashboard, Pull Request checks, and the Secure Registry. The Threat Center and the new endpoint are available to StepSecurity Enterprise customers, who can generate an API token from their dashboard to query real incidents.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eStepSecurity has introduced a new API endpoint that makes its supply chain threat incident data accessible programmatically, building on its existing Threat Intelligence and Threat Center capabilities. The company frames this against the backdrop of fast-moving supply chain attacks, where the window between a package being compromised and that compromise being exploited continues to shrink.\u003c/p\u003e\n\n\u003cp\u003eThe Threat Center serves as a centralized, real-time view of active incidents, historical records, affected packages, and recommended remediation. StepSecurity\u0026rsquo;s Threat Intelligence detects active supply chain compromises within minutes using the same systems that uncovered the tj-actions and nx incidents, and pushes detections into existing team channels.\u003c/p\u003e\n\n\u003cp\u003eThe new endpoint, GET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components, returns every compromised OSS component tied to a specific incident. Each component includes fields such as type (ecosystem), component_name, version, incident_group_id, description, severity, verified status, added_at timestamp, and threat_intel_id. Users provide their GitHub organization and the unique incident identifier (the same one delivered in detection events and shown in the Threat Center) along with a valid StepSecurity API token.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity describes the endpoint as the fourth path in a connected response loop. The other three are: real-time detection events that stream into SIEM platforms through AWS S3 and webhook integrations alongside Slack and email notifications; the Threat Center dashboard for human-driven investigation and remediation; Pull Request checks such as the NPM Package Compromised Updates Check that block compromised versions at the pull request; and the Secure Registry, which enforces controls at install time between developers, CI runners, and public registries.\u003c/p\u003e\n\n\u003cp\u003eThe article outlines three use cases: automating incident response by pulling the full component list from an incident identifier and routing it into paging, ticketing, or response channels; integrating into SIEM and SOC workflows by enriching detection signals with typed component data and prioritizing verified, critical compromises; and correlating against a team\u0026rsquo;s own dependency inventory, using component_name and version to cross-reference incidents against an SBOM or lockfiles to determine exposure in seconds.\u003c/p\u003e\n\n\u003cp\u003eThe Threat Center and the compromised components endpoint are available to StepSecurity Enterprise customers. To get started, customers generate an API token from their StepSecurity dashboard and point it at a real incident from their Threat Center. The article links to the Threat Center documentation and the introductory Threat Intelligence blog post for further detail.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity has announced that its supply chain threat incident data is now available programmatically through a new API endpoint. This complements the existing Threat Center and Threat Intelligence offerings, which detect active supply chain compromises within minutes. The announcement is framed around the increasingly narrow window between a package being compromised and that compromise being exploited.\u003c/p\u003e\n\n\u003ch2 id=\"the-threat-center\"\u003eThe Threat Center\u003c/h2\u003e\n\n\u003cp\u003eThe Threat Center is presented as the unified view where StepSecurity\u0026rsquo;s intelligence comes together, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA real-time feed of active incidents\u003c/li\u003e\n\u003cli\u003eHistorical records\u003c/li\u003e\n\u003cli\u003eAffected packages\u003c/li\u003e\n\u003cli\u003eRecommended remediation\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eStepSecurity Threat Intelligence powers this center and reportedly uses the same systems that uncovered the tj-actions and nx incidents.\u003c/p\u003e\n\n\u003ch2 id=\"the-new-api-endpoint\"\u003eThe New API Endpoint\u003c/h2\u003e\n\n\u003cp\u003eThe new endpoint is:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eGET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eA single request returns every compromised OSS component tied to a specific incident. To use it, a customer provides:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTheir GitHub organization (owner)\u003c/li\u003e\n\u003cli\u003eThe unique incident identifier (incidentId), the same one delivered in detection events and shown in the Threat Center\u003c/li\u003e\n\u003cli\u003eA valid StepSecurity API token\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"response-structure\"\u003eResponse Structure\u003c/h3\u003e\n\n\u003cp\u003eThe JSON response contains a \u003ccode\u003ecompromised_components\u003c/code\u003e array, where each component includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003etype\u003c/code\u003e (e.g., npm) — the package ecosystem\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecomponent_name\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eversion\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eincident_group_id\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edescription\u003c/code\u003e of the threat\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eseverity\u003c/code\u003e (e.g., critical)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003everified\u003c/code\u003e (boolean)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eadded_at\u003c/code\u003e timestamp\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ethreat_intel_id\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"where-the-endpoint-fits\"\u003eWhere the Endpoint Fits\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity positions the endpoint as the fourth path in a larger response loop, alongside three existing capabilities:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eReal-time detection events\u003c/strong\u003e — Stream into SIEM platforms through existing AWS S3 and webhook integrations, alongside Slack and email notifications. A Threat-Intelligence detection event fires the moment an incident is raised.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Threat Center dashboard\u003c/strong\u003e — A human-friendly command center to investigate incidents, view affected packages or Actions, and apply remediation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePull Request checks\u003c/strong\u003e — Such as the NPM Package Compromised Updates Check, which block developers from pulling in known-compromised package versions at the pull request.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Secure Registry\u003c/strong\u003e — Enforces controls at install time, sitting between developers, CI runners, and public registries, evaluating every install request whether in CI or on a developer\u0026rsquo;s laptop.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe endpoint adds on-demand, structured access to compromised components for a specific incident. Where the detection event signals that an incident exists, the endpoint lets systems ask which exact packages and versions are involved.\u003c/p\u003e\n\n\u003ch2 id=\"three-use-cases\"\u003eThree Use Cases\u003c/h2\u003e\n\n\u003ch3 id=\"automating-incident-response\"\u003eAutomating Incident Response\u003c/h3\u003e\n\n\u003cp\u003eA detection event already lands in webhook, S3, Slack, and email with the incident identifier and a Threat Center link. The endpoint lets teams use that identifier to pull the full list of compromised components and route them into on-call paging, ticketing, or response channels — removing the manual step of opening the dashboard to read off affected packages.\u003c/p\u003e\n\n\u003ch3 id=\"integrating-into-siem-and-tooling\"\u003eIntegrating into SIEM and Tooling\u003c/h3\u003e\n\n\u003cp\u003eThreat Intelligence was designed for SIEM and SOC workflows using existing StepSecurity integrations. The detection event provides the signal; the endpoint enriches it with clean, typed component data. The \u003ccode\u003eseverity\u003c/code\u003e and \u003ccode\u003everified\u003c/code\u003e fields are highlighted as useful pivots, allowing automatic prioritization of verified, critical compromises.\u003c/p\u003e\n\n\u003ch3 id=\"correlating-against-dependency-inventory\"\u003eCorrelating Against Dependency Inventory\u003c/h3\u003e\n\n\u003cp\u003eUsing the returned \u003ccode\u003ecomponent_name\u003c/code\u003e and \u003ccode\u003eversion\u003c/code\u003e, teams can cross-reference an incident against their own SBOM or lockfiles to determine exposure in seconds. This complements the Package Compromised Updates check (blocking at the pull request) and the Secure Registry (enforcing at install time across CI and developer machines).\u003c/p\u003e\n\n\u003ch2 id=\"the-bigger-picture\"\u003eThe Bigger Picture\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity describes these capabilities as forming a single loop that no longer depends on someone watching a dashboard: detection within minutes, the detection event reaching the SIEM and team, the Package Compromised Updates check and Secure Registry keeping compromised versions out, and the API enabling systems to pull exact compromised components on demand to drive response and confirm exposure.\u003c/p\u003e\n\n\u003ch2 id=\"availability\"\u003eAvailability\u003c/h2\u003e\n\n\u003cp\u003eThe Threat Center and the compromised components endpoint are available to StepSecurity Enterprise customers. To begin, customers generate an API token from their StepSecurity dashboard and point it at a real incident from their Threat Center. The article references the Threat Center documentation and the introductory Threat Intelligence blog post for additional information.\u003c/p\u003e\n","keyPoints":["StepSecurity introduced a new API endpoint, GET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components, that returns every compromised OSS component tied to a specific threat incident, including ecosystem type, affected version, severity, verification status, and a threat description.","The endpoint complements StepSecurity's existing supply chain defenses, which include real-time detection events streamed to SIEM platforms via S3 and webhooks, the Threat Center dashboard, Pull Request checks like the NPM Package Compromised Updates Check, and the Secure Registry that enforces controls at install time.","Teams can use the endpoint to automate incident response by pulling the full list of compromised components from an incident identifier, enrich SIEM workflows with typed component data, and cross-reference incidents against their own SBOM or lockfiles to quickly determine exposure.","The same StepSecurity Threat Intelligence systems behind this feature previously uncovered the tj-actions and nx supply chain incidents and detect active compromises within minutes.","The Threat Center and the compromised components endpoint are available to StepSecurity Enterprise customers, who can generate an API token from their dashboard to query real incidents."],"insights":["The article frames detection as the already-solved hard problem and positions this endpoint as closing the response gap—specifically the manual step where a human must open the dashboard to read off affected packages before action can begin.","The 'severity' and 'verified' fields are highlighted as particularly valuable SIEM pivots, enabling teams to automatically prioritize only verified, critical compromises and avoid alert fatigue from unconfirmed signals.","StepSecurity's layered approach distinguishes between blocking new threats at the perimeter (PR checks and Secure Registry guard the 'front door' at pull request and install time) versus retroactively sweeping for already-ingested compromised dependencies (the API cross-referenced against SBOMs and lockfiles).","The incidentId is intentionally consistent across the detection event, the Threat Center dashboard, and the API, allowing automation to chain directly from an inbound alert to a full component query without any manual identifier lookup or correlation."],"referencedReports":[],"body":"\u003cp\u003eStepSecurity has announced a new API endpoint that makes its supply chain threat incident data available programmatically. The endpoint, GET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components, returns every compromised open source software (OSS) component tied to a specific incident, including package ecosystem, affected version, severity, verification status, and a threat description.\u003c/p\u003e\n\n\u003cp\u003eThis addition extends StepSecurity\u0026rsquo;s existing Threat Intelligence offering, which detects active supply chain compromises within minutes using the same systems that previously uncovered the tj-actions and nx incidents. Where detection events previously told teams that an incident existed, the new endpoint lets their systems query exactly which packages and versions an incident involves and act on that data programmatically.\u003c/p\u003e\n\n\u003cp\u003eThe feature is positioned as the fourth path in a larger response loop alongside real-time detection events streamed to SIEM platforms, the Threat Center dashboard, Pull Request checks, and the Secure Registry. The Threat Center and the new endpoint are available to StepSecurity Enterprise customers, who can generate an API token from their dashboard to query real incidents.\u003c/p\u003e\n"},{"n":6,"title":"What Healthcare Leaders Need to Know About Cybersecurity in 2026-2027","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/what-healthcare-leaders-need-to-know-about-cybersecurity-in-2026-2027/","time":"20:09","priority":"MAY READ","score":40,"tldr":"Health-ISAC's Errol Weiss warns that healthcare organizations remain prime cyberattack targets due to life-critical systems, sensitive patient data, and fragile, under-resourced networks, with ransomware posing growing risks in 2026-2027. He urges healthcare leaders to prioritize information sharing, incident preparedness, and treating cybersecurity as a patient safety issue.","briefOverview":"\u003cp\u003eThis article from Health-ISAC highlights an MHA Online piece featuring Errol Weiss, Chief Security Officer at the Health Information Sharing \u0026amp; Analysis Center, on what healthcare leaders need to know about cybersecurity in 2026-2027. Weiss frames healthcare as a perfect target for cyberattacks due to its combination of life-critical systems, highly sensitive patient data, and valuable clinical research running on complex, fragile, and under-resourced networks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes evolving healthcare cybersecurity risks for the 2026-2027 period, with particular focus on the ramifications of ransomware. It stresses the importance of information sharing, incident preparedness, and treating cybersecurity as a patient safety issue.\u003c/p\u003e\n\n\u003cp\u003eThe piece is intended to help healthcare leaders understand the impacts of cyber threats on care delivery, operations, and organizational resilience. It positions hospitals and healthcare organizations on the front line of borderless cyberwarfare.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHealth-ISAC published this piece on June 9, 2026, highlighting an MHA Online article that features commentary from Errol Weiss, Chief Security Officer at the Health Information Sharing \u0026amp; Analysis Center (Health-ISAC). The focus is on cybersecurity guidance for healthcare leaders during the 2026-2027 period.\u003c/p\u003e\n\n\u003cp\u003eWeiss argues that healthcare is a perfect target for cyberattacks, citing the combination of life-critical systems, highly sensitive patient data, and potentially valuable clinical research. He notes that these assets run on incredibly complex and fragile networks operating in under-resourced environments, making the sector especially vulnerable.\u003c/p\u003e\n\n\u003cp\u003eThe article reframes the issue as one of borderless cyberwarfare, placing hospitals and other healthcare organizations on the front line. A core theme is the ramifications of ransomware within the healthcare sector.\u003c/p\u003e\n\n\u003cp\u003eKey points covered include the evolving healthcare cybersecurity risks for 2026-2027, the importance of information sharing, and the need for incident preparedness. The article advocates for treating cybersecurity as a patient safety issue rather than purely a technical concern.\u003c/p\u003e\n\n\u003cp\u003eThe content is intended to help healthcare leaders understand the impacts of cyber threats on care delivery, operations, and organizational resilience. The full article is available on MHA Online, with related Health-ISAC resources also referenced.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis Health-ISAC post, dated June 9, 2026, highlights a featured article in MHA Online titled \u0026ldquo;What Healthcare Leaders Need to Know About Cybersecurity in 2026-2027.\u0026rdquo; The piece centers on commentary from Errol Weiss, Chief Security Officer at the Health Information Sharing \u0026amp; Analysis Center (Health-ISAC).\u003c/p\u003e\n\n\u003ch2 id=\"central-thesis\"\u003eCentral Thesis\u003c/h2\u003e\n\n\u003cp\u003eThe article frames cyberwarfare as borderless, positioning hospitals and other healthcare organizations on the front line. Weiss provides a pointed assessment of why healthcare is uniquely vulnerable:\u003c/p\u003e\n\n\u003cblockquote\u003e\n\u003cp\u003e\u0026ldquo;Healthcare is a perfect target for cyberattacks. They\u0026rsquo;ve got life-critical systems, highly-sensitive patient data, and possibly valuable clinical research. And they\u0026rsquo;re all running on incredibly complex, fragile networks, operating in under-resourced environments.\u0026rdquo;\u003c/p\u003e\n\u003c/blockquote\u003e\n\n\u003cp\u003eThis statement identifies several converging risk factors:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLife-critical systems\u003c/strong\u003e whose disruption can directly affect patient outcomes\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHighly sensitive patient data\u003c/strong\u003e that holds value to attackers\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eValuable clinical research\u003c/strong\u003e as an additional target\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eComplex, fragile networks\u003c/strong\u003e that are difficult to defend\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnder-resourced environments\u003c/strong\u003e that limit defensive capacity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-points-addressed\"\u003eKey Points Addressed\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, the coverage includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA focus on evolving healthcare cybersecurity risks for the 2026-2027 period\u003c/li\u003e\n\u003cli\u003eAn emphasis on the ramifications of ransomware in healthcare\u003c/li\u003e\n\u003cli\u003eThe importance of information sharing, incident preparedness, and treating cybersecurity as a patient safety issue\u003c/li\u003e\n\u003cli\u003eGuidance intended to help leaders understand impacts to care delivery, operations, and organizational resilience\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eA notable reframing in the article is the treatment of cybersecurity as a patient safety issue rather than purely an IT matter, linking cyber risk directly to care delivery and operations. The emphasis on information sharing aligns with the role of Health-ISAC as a sharing and analysis organization.\u003c/p\u003e\n\n\u003ch2 id=\"related-resources\"\u003eRelated Resources\u003c/h2\u003e\n\n\u003cp\u003eThe post references several related Health-ISAC resources, including a Health Care and Social Assistance Threat Landscape Report, a piece on the Verizon DBIR and social engineering attacks against healthcare, and articles addressing AI-related risks and new HIPAA requirements.\u003c/p\u003e\n\n\u003ch2 id=\"access\"\u003eAccess\u003c/h2\u003e\n\n\u003cp\u003eThe full article is available on MHA Online via the provided link.\u003c/p\u003e\n","keyPoints":["Errol Weiss, Chief Security Officer at Health-ISAC, argues that healthcare is a perfect target for cyberattacks because it combines life-critical systems, highly sensitive patient data, and valuable clinical research running on complex, fragile networks in under-resourced environments.","The article focuses on evolving healthcare cybersecurity risks for the 2026-2027 period.","It places particular emphasis on the ramifications of ransomware in the healthcare sector.","The piece highlights the importance of information sharing, incident preparedness, and treating cybersecurity as a patient safety issue.","It is intended to help healthcare leaders understand the impacts of cyber threats on care delivery, operations, and organizational resilience."],"insights":["The article reframes cybersecurity as a patient safety issue rather than purely an IT concern, suggesting that breaches in healthcare can directly affect care delivery and human lives.","Weiss identifies the combination of life-critical systems with under-resourced and fragile networks as the specific factor that makes healthcare uniquely attractive to attackers, implying that resource constraints—not just data value—are a core vulnerability.","The framing of cyberwarfare as borderless and placing hospitals on the front line implies that healthcare organizations may face nation-state-level threats they are not resourced to defend against."],"referencedReports":[{"title":"Health Care and Social Assistance Threat Landscape Report","url":"https://health-isac.org/health-care-and-social-assistance-threat-landscape-report/","publisher":"Health-ISAC","context":"Listed in the article's related resources as a threat landscape report covering the healthcare and social assistance sector.","category":"","primary":false},{"title":"Verizon DBIR: Healthcare Fends Off Increased Social Engineering Attacks","url":"https://health-isac.org/verizon-dbir-healthcare-fends-off-increased-social-engineering-attacks/","publisher":"Verizon / Health-ISAC","context":"Listed in the related resources, referencing the Verizon Data Breach Investigations Report findings on social engineering attacks against healthcare.","category":"","primary":false}],"body":"\u003cp\u003eThis article from Health-ISAC highlights an MHA Online piece featuring Errol Weiss, Chief Security Officer at the Health Information Sharing \u0026amp; Analysis Center, on what healthcare leaders need to know about cybersecurity in 2026-2027. Weiss frames healthcare as a perfect target for cyberattacks due to its combination of life-critical systems, highly sensitive patient data, and valuable clinical research running on complex, fragile, and under-resourced networks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes evolving healthcare cybersecurity risks for the 2026-2027 period, with particular focus on the ramifications of ransomware. It stresses the importance of information sharing, incident preparedness, and treating cybersecurity as a patient safety issue.\u003c/p\u003e\n\n\u003cp\u003eThe piece is intended to help healthcare leaders understand the impacts of cyber threats on care delivery, operations, and organizational resilience. It positions hospitals and healthcare organizations on the front line of borderless cyberwarfare.\u003c/p\u003e\n"},{"n":1,"title":"Permiso Recognized as a Challenger and Outperformer in the 2026 GigaOm Identity Threat Detection \u0026 Response (ITDR) Radar","source":"permiso.io","sourceColorIdx":8,"link":"https://permiso.io/blog/permiso-gigaom-itdr-radar-2026","time":"18:23","priority":"MAY READ","score":25,"tldr":"Permiso announced it was recognized as both a Challenger and an Outperformer in the 2026 GigaOm Radar for Identity Threat Detection and Response (ITDR), marking its second consecutive year in the report.","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Permiso was recognized in the 2026 GigaOm Radar for Identity Threat Detection and Response (ITDR) as both a Challenger and an Outperformer.","This marks Permiso's second consecutive year being included in the GigaOm ITDR report.","The article notes that ITDR has become a central category for how enterprises defend themselves, because the identities that run modern environments have also become the easiest way into them."],"insights":["The article frames identity as a double-edged element of modern enterprises: the same identities that operate modern environments have become the easiest entry point for attackers, which is why ITDR has emerged as a critical defensive category.","Permiso's repeat recognition (second consecutive year) suggests sustained rather than one-off performance in the ITDR market, signaling consistency relevant to enterprises evaluating vendors."],"referencedReports":[{"title":"GigaOm Radar for Identity Threat Detection and Response (ITDR) v3","url":"https://portal.gigaom.com/report/gigaom-radar-for-identity-threat-detection-and-response-itdr-v3","publisher":"GigaOm","context":"The article references this GigaOm Radar report as the basis for Permiso's recognition as a Challenger and Outperformer in ITDR.","category":"","primary":false}],"body":""}];

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
