window.__DL_ARTICLES = [{"n":1,"title":"NFCShare Android malware spreads via fake banking app updates on GitHub","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/nfcshare-android-malware-spreads-via-fake-banking-app-updates-on-github/","time":"22:11","priority":"SHOULD READ","score":82,"tldr":"New NFCShare Android malware variants are being spread through fake banking app updates hosted on GitHub, targeting European bank customers to steal payment card data via NFC scans and phishing. Users should install banking apps only from trusted app stores and avoid any “verification” prompt asking them to tap a card to their phone.","briefOverview":"\u003cp\u003eNew variants of the NFCShare Android malware are being distributed as fake updates for legitimate banking apps hosted on GitHub. The campaign targets customers of multiple banks and financial institutions across Europe and aims to steal payment card data. D3Lab has been tracking NFCShare since January 2026, when it documented activity targeting Deutsche Bank in Germany.\u003c/p\u003e\n\n\u003cp\u003eThe attacks observed starting May 14 begin with victims visiting phishing sites that impersonate real banks and ask for banking credentials. Victims are then urged to update their banking app and redirected to a GitHub repository hosting a malicious APK file. The repository, created on April 10, has hosted 56 unique APKs impersonating banking apps primarily from Italy and Spain.\u003c/p\u003e\n\n\u003cp\u003eNFCShare uses fake verification screens to convince victims to place payment cards near the phone’s NFC chip. It reads card data using Android’s IsoDep interface and EMV commands, collects a 4-digit PIN entered by the victim, and sends the data to an attacker-controlled command-and-control host over WebSocket. Newer samples also use malformed APK packaging to disrupt some automated static analysis tools.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNew NFCShare Android malware variants are being distributed as fake updates for legitimate banking apps hosted on GitHub. The malware is being used in a phishing campaign targeting customers of multiple banks and financial institutions across Europe. The campaign is focused on stealing payment card data that can be used in NFC payment relay schemes.\u003c/p\u003e\n\n\u003cp\u003eD3Lab first documented NFCShare in January 2026 and has continued tracking its activity and evolution. D3Lab researcher Andrea Draghetti told BleepingComputer that NFCShare has similarities to other Android malware abusing NFC chips, but uses distinct code, libraries, architecture, and implementation details. Draghetti also noted that it could still be part of the same ecosystem driven by the same threat actors.\u003c/p\u003e\n\n\u003cp\u003eRecent attacks observed from May 14 begin when victims visit phishing sites impersonating real banks and enter banking credentials. Victims are then prompted to update their banking app and redirected to a GitHub repository hosting a malicious APK file. The article notes that SMS messages or calls from fake bank representatives may also be used in similar social-engineering processes, although D3Lab did not directly observe those methods in this campaign.\u003c/p\u003e\n\n\u003cp\u003eThe malware displays fake verification screens that instruct victims to place payment cards near the mobile device’s NFC chip. NFCShare reads card information through Android’s IsoDep interface and EMV commands, then steals the card number, card type, expiry date, and a 4-digit PIN entered by the victim. The collected information is exfiltrated to the attacker’s command-and-control host over a WebSocket channel.\u003c/p\u003e\n\n\u003cp\u003eThe GitHub repository used to distribute NFCShare was created on April 10 and has hosted 56 unique APKs. These APKs impersonated mobile apps for banks primarily from Italy and Spain, including Intesa, Sella, Banca Sella, Nexi, Fideuram, Mooney, and CaixaBank-related apps. D3Lab previously reported that the malware targeted only Deutsche Bank in Germany in January, which the article says may suggest an expanded targeting scope.\u003c/p\u003e\n\n\u003cp\u003eA newer NFCShare version introduces malformed APK packaging intended to hinder automated analysis and potentially security tools. The APK remains a ZIP archive, but includes poisoned or malformed paths that can cause some extraction tools to misinterpret internal relative paths as filesystem paths and produce errors. D3Lab says this does not prevent manual analysis or code recovery, but can disrupt static analysis in certain tools.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNew variants of the NFCShare Android malware are being distributed as fake updates for legitimate banking apps hosted on GitHub. The campaign targets customers of multiple banks and financial institutions across Europe and is designed to steal payment card data.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses social engineering to convince victims to scan payment cards with their phone’s NFC chip. It then reads card data and exfiltrates the stolen information to an attacker-controlled command-and-control host.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-flow\"\u003eCampaign Flow\u003c/h2\u003e\n\n\u003cp\u003eRecent NFCShare attacks observed starting May 14 begin with victims visiting phishing sites that impersonate real banks. These sites ask victims for banking credentials.\u003c/p\u003e\n\n\u003cp\u003eAfter that, victims are urged to update their banking app. They are redirected to a GitHub repository that hosts a malicious APK file presented as a banking app update.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that SMS messages or phone calls from fake bank representatives may be used as part of similar social-engineering processes. However, D3Lab researchers did not observe those methods directly in the NFCShare activity described.\u003c/p\u003e\n\n\u003ch2 id=\"malware-behavior\"\u003eMalware Behavior\u003c/h2\u003e\n\n\u003cp\u003eNFCShare displays fake verification screens that prompt victims to place payment cards near the mobile device’s NFC chip. The malware then reads card data using Android’s IsoDep interface and EMV commands.\u003c/p\u003e\n\n\u003cp\u003eThe data stolen includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCard number\u003c/li\u003e\n\u003cli\u003eCard type\u003c/li\u003e\n\u003cli\u003eExpiry date\u003c/li\u003e\n\u003cli\u003eA 4-digit PIN entered by the victim under the pretense of a security step\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware exfiltrates the collected information to the attacker’s command-and-control host over a WebSocket channel.\u003c/p\u003e\n\n\u003ch2 id=\"relevance-to-nfc-relay-schemes\"\u003eRelevance to NFC Relay Schemes\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the information collected by NFCShare can be used in NFC payment relay schemes. It references similar activity documented in NGate, SuperCard X, and RelayNFC malware attacks.\u003c/p\u003e\n\n\u003cp\u003eNFCShare is described as similar to other Android malware that exploit NFC chips for data theft, but D3Lab researcher Andrea Draghetti said it uses distinct code, libraries, architecture, and implementation details. Draghetti also noted that NFCShare could still be an evolution of the same ecosystem, driven by the same threat actors.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-through-github\"\u003eDistribution Through GitHub\u003c/h2\u003e\n\n\u003cp\u003eThe malicious GitHub repository used for NFCShare distribution was created on April 10. Since then, it has hosted 56 unique APKs impersonating mobile apps for banks primarily from Italy and Spain.\u003c/p\u003e\n\n\u003cp\u003eThe listed APK names include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIntesa Carte.apk\u003c/li\u003e\n\u003cli\u003eSella Carte.apk\u003c/li\u003e\n\u003cli\u003eBanca Sella Carte.apk\u003c/li\u003e\n\u003cli\u003eNexi Carte.apk\u003c/li\u003e\n\u003cli\u003eFideuram Carte.apk\u003c/li\u003e\n\u003cli\u003eMooney Carte.apk\u003c/li\u003e\n\u003cli\u003eCaixaBank.apk\u003c/li\u003e\n\u003cli\u003eCaixaBankNfc.apk\u003c/li\u003e\n\u003cli\u003eCaixaReactivaTarjeta.apk\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says D3Lab reported in January that NFCShare targeted only Deutsche Bank in Germany. The newer activity involving Italian and Spanish banking apps may suggest an expanded targeting scope.\u003c/p\u003e\n\n\u003ch2 id=\"technical-evasion-detail\"\u003eTechnical Evasion Detail\u003c/h2\u003e\n\n\u003cp\u003eA notable change in the newer NFCShare version is malformed APK packaging intended to hinder automated analysis and potentially security tools. The APK remains a ZIP archive, but newer samples include poisoned or malformed file paths inside the ZIP.\u003c/p\u003e\n\n\u003cp\u003eThese malformed paths can cause some extraction tools to incorrectly interpret internal relative paths as filesystem paths and trigger errors. D3Lab notes that this technique does not prevent manual analysis or code recovery, but can disrupt static analysis in some tools.\u003c/p\u003e\n\n\u003ch2 id=\"tracking-and-research-context\"\u003eTracking and Research Context\u003c/h2\u003e\n\n\u003cp\u003eD3Lab researchers first documented NFCShare in January 2026 and have continued tracking its activity and evolution. The article includes comments from D3Lab researcher Andrea Draghetti and references D3Lab’s prior reporting on NFCShare’s earlier targeting.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the current campaign as an evolution from earlier NFCShare activity, with broader geographic and institutional targeting across Europe.\u003c/p\u003e\n\n\u003ch2 id=\"user-guidance-included-in-the-article\"\u003eUser Guidance Included in the Article\u003c/h2\u003e\n\n\u003cp\u003eAndroid users are advised to install banking apps only from Google Play. They are also advised to enable Play Protect and be cautious of verification requests that prompt NFC card scans.\u003c/p\u003e\n","keyPoints":["New variants of the NFCShare Android malware are being distributed as fake updates for legitimate banking apps hosted on GitHub.","NFCShare targets customers of multiple banks and financial institutions across Europe in a phishing campaign aimed at stealing payment card data.","The malware tricks victims into placing payment cards near the phone’s NFC chip, reads card data using Android’s IsoDep interface and EMV commands, and exfiltrates the information to a command-and-control host over WebSocket.","Since April 10, the GitHub repository used to distribute NFCShare has hosted 56 unique APKs impersonating banking apps primarily from Italy and Spain.","Newer NFCShare samples use malformed APK packaging with poisoned file paths to disrupt automated static analysis tools."],"insights":["The campaign abuses GitHub as the delivery point for malicious APKs, which can make the fake banking updates appear more legitimate to victims than an arbitrary file download site.","NFCShare’s targeting appears to have expanded from Deutsche Bank customers in Germany in January to multiple banks and financial institutions primarily in Italy and Spain by May.","The malware’s collection of both NFC-read card data and a victim-entered 4-digit PIN makes the stolen information useful for NFC payment relay schemes described in related malware campaigns.","The malformed APK packaging is designed to disrupt some automated extraction and static analysis workflows, but D3Lab notes that it does not prevent manual analysis or code recovery."],"referencedReports":[{"title":"NFCShare Android Trojan: NFC Card Data Theft via Malicious APK","url":"https://www.d3lab.net/nfcshare-android-trojan-nfc-card-data-theft-via-malicious-apk/","publisher":"D3Lab","context":"The article cites D3Lab’s January report as the first documentation of NFCShare and notes that it originally targeted only Deutsche Bank in Germany.","category":"","primary":false}],"body":"\u003cp\u003eNew variants of the NFCShare Android malware are being distributed as fake updates for legitimate banking apps hosted on GitHub. The campaign targets customers of multiple banks and financial institutions across Europe and aims to steal payment card data. D3Lab has been tracking NFCShare since January 2026, when it documented activity targeting Deutsche Bank in Germany.\u003c/p\u003e\n\n\u003cp\u003eThe attacks observed starting May 14 begin with victims visiting phishing sites that impersonate real banks and ask for banking credentials. Victims are then urged to update their banking app and redirected to a GitHub repository hosting a malicious APK file. The repository, created on April 10, has hosted 56 unique APKs impersonating banking apps primarily from Italy and Spain.\u003c/p\u003e\n\n\u003cp\u003eNFCShare uses fake verification screens to convince victims to place payment cards near the phone’s NFC chip. It reads card data using Android’s IsoDep interface and EMV commands, collects a 4-digit PIN entered by the victim, and sends the data to an attacker-controlled command-and-control host over WebSocket. Newer samples also use malformed APK packaging to disrupt some automated static analysis tools.\u003c/p\u003e\n"},{"n":2,"title":"Zero Trust for OT: Breaking Down CISA’s Recent Guidance","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/zero-trust-for-ot-breaking-down-cisas-recent-guidance","time":"01:12","priority":"MAY READ","score":55,"tldr":"CISA says federal operational technology environments should adapt zero trust principles to OT realities like legacy systems, segmentation needs, and mission continuity rather than copying IT models. The key focus is improving visibility, segmentation, least privilege, controlled remote access, and resilience across hybrid IT/OT environments.","briefOverview":"\u003cp\u003eFederal operational technology environments that support critical infrastructure are increasingly converging with enterprise IT, cloud systems, and emerging AI agents. The article says remote access and third-party support are now standard, which is weakening traditional security models. It frames the challenge as balancing security, availability, and mission continuity.\u003c/p\u003e\n\n\u003cp\u003eCISA’s recent guidance says zero trust must be adapted for OT environments rather than directly copied from IT. The article highlights visibility, segmentation, least privilege, secure remote access, and resilience as five core principles for federal agencies. It also says these principles must account for legacy systems, segmented networks, and OT-specific operational risk tolerances.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Netskope as a way to extend zero trust principles across hybrid IT/OT environments while maintaining safety and continuity requirements. It says Netskope can enforce least privilege at the application level and provide visibility and inline threat protection. The article closes by directing readers to download an eBook for a fuller breakdown of CISA’s recommendations and implementation strategies.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on CISA guidance for applying zero trust principles to federal operational technology environments. It states that OT systems underpin critical infrastructure and are increasingly connected with enterprise IT, cloud systems, and emerging AI agents. Because remote access and third-party support are now common, the article says traditional security models are breaking down.\u003c/p\u003e\n\n\u003cp\u003eCISA’s guidance is presented as reinforcing that zero trust must be adapted for OT rather than copied from IT environments. The article says this adaptation must account for legacy systems, segmented networks, and specific operational risk tolerances. It emphasizes the need to preserve availability and mission continuity while improving security.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies five core zero trust principles that CISA highlights for federal agencies. Visibility requires a complete and continuously updated OT asset inventory and communication-flow mapping. Segmentation calls for aggressive separation of OT from IT, isolation of critical assets, and microsegmentation to reduce the blast radius of a compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights least privilege, secure remote access, and resilience as major focus areas. Least privilege means enforcing access based on identity and job function while moving away from shared credentials and static permissions. Secure remote access means minimizing always-on access, eliminating implicit trust in VPNs, and using tightly controlled, just-in-time access for vendors and third parties.\u003c/p\u003e\n\n\u003cp\u003eFor resilience, the article says agencies should operate with an “assume breach” mindset and design systems to limit impact while ensuring redundancy for critical OT operations. It presents Netskope as a modern security architecture that can extend zero trust principles across hybrid IT/OT environments. The article says Netskope can grant application-level access, provide consistent visibility, and deliver inline threat protection to reduce dwell time and limit impact.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses CISA guidance on adapting zero trust principles for federal operational technology environments. It states that these OT environments underpin critical infrastructure and are increasingly converging with enterprise IT, cloud systems, and emerging AI agents.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this convergence as a challenge for traditional security models. It says remote access and third-party support are now standard, creating a need to balance security, availability, and mission continuity.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-s-main-message\"\u003eCISA’s Main Message\u003c/h2\u003e\n\n\u003cp\u003eThe article says CISA has reinforced that zero trust must be adapted for OT rather than simply copied from IT environments. This adaptation must account for OT-specific constraints and requirements, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLegacy systems.\u003c/li\u003e\n\u003cli\u003eSegmented networks.\u003c/li\u003e\n\u003cli\u003eSpecific operational risk tolerances.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe significance of the guidance, as presented in the article, is that OT environments have different operational realities from enterprise IT environments. The article emphasizes that applying zero trust in OT must preserve safety and continuity requirements for critical infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"five-zero-trust-principles-highlighted\"\u003eFive Zero Trust Principles Highlighted\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies five core zero trust principles from CISA’s guidance that are crucial for federal agencies.\u003c/p\u003e\n\n\u003ch3 id=\"visibility\"\u003eVisibility\u003c/h3\u003e\n\n\u003cp\u003eThe article says agencies cannot protect what they cannot see. It recommends beginning with a complete and continuously updated OT asset inventory and mapping communication flows.\u003c/p\u003e\n\n\u003ch3 id=\"segmentation\"\u003eSegmentation\u003c/h3\u003e\n\n\u003cp\u003eThe article calls for aggressive segmentation of OT networks from IT networks. It also says agencies should isolate critical assets and implement microsegmentation to reduce the blast radius of a potential compromise.\u003c/p\u003e\n\n\u003ch3 id=\"least-privilege\"\u003eLeast Privilege\u003c/h3\u003e\n\n\u003cp\u003eThe article says access should be enforced based on identity and job function. It specifically highlights a move away from shared credentials and static permissions.\u003c/p\u003e\n\n\u003ch3 id=\"secure-remote-access\"\u003eSecure Remote Access\u003c/h3\u003e\n\n\u003cp\u003eThe article says agencies should minimize always-on remote access and eliminate implicit trust in VPNs. It recommends tightly controlled, just-in-time access for vendors and third parties.\u003c/p\u003e\n\n\u003ch3 id=\"resilience\"\u003eResilience\u003c/h3\u003e\n\n\u003cp\u003eThe article says agencies should operate with an “assume breach” mindset. It also says systems should be designed to limit impact and maintain redundancy for critical OT operations.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-environment\"\u003eAffected Parties and Environment\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on federal agencies and federal OT environments. It also refers to critical infrastructure, enterprise IT systems, cloud systems, emerging AI agents, vendors, and third parties as part of the broader environment in which OT security must operate.\u003c/p\u003e\n\n\u003cp\u003eNo specific threat actor, incident, breach, malware family, or vulnerability is identified in the article. The focus is on guidance, architecture, and best-practice implementation for OT zero trust.\u003c/p\u003e\n\n\u003ch2 id=\"netskope-s-role-as-presented\"\u003eNetskope’s Role as Presented\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Netskope as a modern security architecture that can help agencies extend zero trust principles across hybrid IT/OT environments. It says this can be done while maintaining the safety and continuity requirements of critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Netskope can enforce least privilege by granting access at the application level. It also says Netskope can provide consistent visibility and inline threat protection to help reduce dwell time and limit impact.\u003c/p\u003e\n\n\u003ch2 id=\"call-to-action\"\u003eCall to Action\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes by inviting readers to download a full eBook. It says the eBook provides a complete breakdown of CISA’s guidance and practical implementation strategies for zero trust in OT environments.\u003c/p\u003e\n","keyPoints":["CISA’s guidance states that zero trust must be adapted for operational technology environments rather than copied directly from IT environments.","The guidance says OT zero trust adaptations must account for legacy systems, segmented networks, and specific operational risk tolerances.","CISA highlights visibility, segmentation, least privilege, secure remote access, and resilience as five core zero trust principles for federal agencies.","The article says federal OT environments are increasingly converging with enterprise IT, cloud systems, and emerging AI agents while remote access and third-party support are now standard.","The article presents Netskope as a security architecture that can extend zero trust principles across hybrid IT/OT environments while supporting critical infrastructure safety and continuity requirements."],"insights":["Agencies should begin OT zero trust efforts with a continuously updated asset inventory and communication-flow mapping because the article frames visibility as the prerequisite for protection.","Remote access controls should move away from always-on VPN-based trust toward tightly controlled, just-in-time access for vendors and third parties.","OT segmentation should not stop at separating IT from OT; the article also calls for isolating critical assets and using microsegmentation to limit compromise impact.","Least-privilege access in OT should be tied to identity and job function, which directly challenges shared credentials and static permissions common in legacy operational environments."],"referencedReports":[{"title":"Joint Guide: Adapting Zero Trust Principles to Operational Technology","url":"https://www.cisa.gov/sites/default/files/2026-04/joint-guide-adapting-zero-trust-principles-to-operational-technology_508c.pdf","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article cites CISA’s guidance as the basis for its discussion of adapting zero trust principles to federal OT environments.","category":"","primary":false}],"body":"\u003cp\u003eFederal operational technology environments that support critical infrastructure are increasingly converging with enterprise IT, cloud systems, and emerging AI agents. The article says remote access and third-party support are now standard, which is weakening traditional security models. It frames the challenge as balancing security, availability, and mission continuity.\u003c/p\u003e\n\n\u003cp\u003eCISA’s recent guidance says zero trust must be adapted for OT environments rather than directly copied from IT. The article highlights visibility, segmentation, least privilege, secure remote access, and resilience as five core principles for federal agencies. It also says these principles must account for legacy systems, segmented networks, and OT-specific operational risk tolerances.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Netskope as a way to extend zero trust principles across hybrid IT/OT environments while maintaining safety and continuity requirements. It says Netskope can enforce least privilege at the application level and provide visibility and inline threat protection. The article closes by directing readers to download an eBook for a fuller breakdown of CISA’s recommendations and implementation strategies.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>

    </div>

}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {

function numberedList(items, accent) {

function KeyPointsSection({ keyPoints, accent }) {

function AnalysisTabs({ article }) {

  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (

  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
