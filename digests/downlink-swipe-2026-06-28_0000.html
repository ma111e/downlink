<script type="application/json" id="dl-articles">[{"n":1,"title":"Data breach exposes up to 14.2 million email logins at six ISPs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/data-breach-exposes-up-to-142-million-email-logins-at-six-isps/","time":"14:13","priority":"MUST READ","score":96,"tldr":"Japanese telecom giant KDDI disclosed a breach exposing up to 14.2 million email logins across six ISPs after attackers exploited a vulnerability in third-party software to access account credentials, some of which were stored in plaintext.","briefOverview":"\u003cp\u003eJapanese telecommunications giant KDDI Corporation revealed a security breach that allowed attackers to infiltrate one of its email systems, which is also used by five other internet service providers in the country. The company discovered the unauthorized access on June 17 and immediately blocked the intruder while deploying defensive measures. The breach was traced to an exploited vulnerability in an unnamed piece of third-party software used on the affected system.\u003c/p\u003e\n\n\u003cp\u003eThe incident potentially exposed the email addresses and passwords of up to 14.22 million customers, counting current, former, and inactive accounts across KDDI and the five partner ISPs: STNet, JCOM, Chubu Telecommunications, NIFTY Corporation, and BIGLOBE. While KDDI noted that some passwords were stored in hashed or encrypted form, it did not state what proportion may have been stored in plaintext, leaving a significant portion of accounts at immediate risk. The company has notified regulators, is working with the affected ISPs on additional safeguards, and is advising all potentially exposed users to reset passwords and enable two-factor authentication.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["KDDI Corporation discovered a breach of its email system on June 17 that also impacted five other Japanese internet service providers.","The attackers exploited a vulnerability in an unnamed third-party software used by KDDI.","Up to 14.22 million email addresses and passwords, including those of current and former customers and inactive accounts, may have been exposed.","Some passwords were stored in hashed or encrypted form, but KDDI did not specify what percentage of accounts had passwords stored in plaintext.","KDDI has been contacting affected ISPs, notified Japan's Personal Information Protection Commission and Ministry of Internal Affairs and Communications, and is implementing additional security measures with the ISPs."],"insights":["The breach includes inactive accounts of former customers, which could be used in credential stuffing attacks against other services long after those individuals have left the ISP.","KDDI's statement that only 'some' passwords were hashed or encrypted strongly implies that a portion were stored in plaintext, a severe security failing that escalates the risk of account takeovers if the data is exfiltrated.","By not naming the vulnerable third-party software, KDDI prevents other organizations from assessing their own exposure, potentially leaving a broader attack surface unpatched.","The incident illustrates how a single email system shared across multiple ISPs concentrates risk—a breach at KDDI directly compromises customers of five other providers, revealing hidden dependencies in everyday internet services."],"referencedReports":[],"body":"\u003cp\u003eJapanese telecommunications giant KDDI Corporation revealed a security breach that allowed attackers to infiltrate one of its email systems, which is also used by five other internet service providers in the country. The company discovered the unauthorized access on June 17 and immediately blocked the intruder while deploying defensive measures. The breach was traced to an exploited vulnerability in an unnamed piece of third-party software used on the affected system.\u003c/p\u003e\n\n\u003cp\u003eThe incident potentially exposed the email addresses and passwords of up to 14.22 million customers, counting current, former, and inactive accounts across KDDI and the five partner ISPs: STNet, JCOM, Chubu Telecommunications, NIFTY Corporation, and BIGLOBE. While KDDI noted that some passwords were stored in hashed or encrypted form, it did not state what proportion may have been stored in plaintext, leaving a significant portion of accounts at immediate risk. The company has notified regulators, is working with the affected ISPs on additional safeguards, and is advising all potentially exposed users to reset passwords and enable two-factor authentication.\u003c/p\u003e\n"},{"n":2,"title":"Legal Threat in Your Inbox: How a Gmail Shortlink Hides a Credential-Harvest Destination","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/legal-threat-gmail-shortlink-attacker-domain-credential-harvest","time":"11:00","priority":"SHOULD READ","score":80,"tldr":"A phishing campaign used a personal Gmail account and a short.gy URL shortener to hide a credential-harvesting domain, evading authentication and URL reputation checks. Defenders must follow redirect chains fully and analyze behavioral anomalies to detect such social engineering lures.","briefOverview":"\u003cp\u003eAn adversary used a personal Gmail account to send a mass-BCC email framed as a bilingual legal notice, complete with a fabricated professional title to create urgency. The body contained a single outbound link through the short.gy URL shortener, which hid the final destination—a privacy-protected domain (chongdaotang.net) registered in November 2023. IRONSCALES link analysis rated that resolved domain as Malicious, and the path structure suggested per-victim tracking tokens typical of credential-harvesting platforms.\u003c/p\u003e\n\n\u003cp\u003eBecause the message originated from Google\u0026rsquo;s infrastructure, all authentication checks (SPF, DKIM, DMARC) passed, giving security gateways no obvious signal to block it. The use of a legitimate shortener also meant that any scanner stopping at the shortener\u0026rsquo;s hostname would miss the threat entirely. IRONSCALES Adaptive AI detected the attack at 90% confidence by combining behavioral signals: first-contact sender, high-pressure legal threat framing, URL shortener wrapping, and the suspicious registration profile of the final domain. The incident underscores that defenders must follow shortened URLs through to their final destination during analysis, rather than delegating reputation to the shortener provider.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The phishing email used a personal Gmail account and a bilingual legal-threat subject line to create urgency and hide the mass-BCC delivery pattern.","The message contained a short.gy shortened URL that resolved to a privacy-protected attacker domain (chongdaotang.net) registered in November 2023 and rated malicious.","All email authentication checks (SPF, DKIM, DMARC) passed because the attacker sent the message through Google’s own infrastructure, borrowing its clean reputation.","IRONSCALES Adaptive AI flagged the message at 90% confidence by analyzing the combination of a first-contact sender, URL shortener use, and high-pressure threat framing instead of relying on blacklists or authentication failures.","Security teams must follow shortened URLs through to their final destination during analysis, because stopping at the legitimate shortener service makes the threat invisible."],"insights":["Passing SPF, DKIM, and DMARC authentication does not guarantee an email's safety, as attackers can send malicious mail through reputable platforms like Gmail to inherit their clean reputation.","Legitimate URL shorteners like short.gy can blind security scanners because reputation checks only evaluate the shortener's domain, not the hidden malicious destination.","The use of BCC delivery in what appeared as a personal legal notice is a structural red flag, since legitimate legal communications would directly address the specific recipient.","The path structure in the final URL indicated per-victim tracking tokens, suggesting the credential-harvesting platform was customized to associate stolen data with individual targets.","Combining behavioral signals like first-contact sender, high-pressure language, and URL shortener use allowed adaptive AI to detect the threat, proving multi-signal analysis is more effective than single-vector checks."],"referencedReports":[{"title":"2026 Data Breach Investigations Report (DBIR)","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the DBIR to support the statement that phishing remains the dominant initial access vector in social engineering breaches.","category":"research","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article references CISA's guidance advising recipients to verify unexpected legal contacts through official channels before following links.","category":"advisory","primary":false}],"body":"\u003cp\u003eAn adversary used a personal Gmail account to send a mass-BCC email framed as a bilingual legal notice, complete with a fabricated professional title to create urgency. The body contained a single outbound link through the short.gy URL shortener, which hid the final destination—a privacy-protected domain (chongdaotang.net) registered in November 2023. IRONSCALES link analysis rated that resolved domain as Malicious, and the path structure suggested per-victim tracking tokens typical of credential-harvesting platforms.\u003c/p\u003e\n\n\u003cp\u003eBecause the message originated from Google\u0026rsquo;s infrastructure, all authentication checks (SPF, DKIM, DMARC) passed, giving security gateways no obvious signal to block it. The use of a legitimate shortener also meant that any scanner stopping at the shortener\u0026rsquo;s hostname would miss the threat entirely. IRONSCALES Adaptive AI detected the attack at 90% confidence by combining behavioral signals: first-contact sender, high-pressure legal threat framing, URL shortener wrapping, and the suspicious registration profile of the final domain. The incident underscores that defenders must follow shortened URLs through to their final destination during analysis, rather than delegating reputation to the shortener provider.\u003c/p\u003e\n"}]</script>
