capacity of its own incident response teams. In such cases, specialized experts from across the EU could provide support in several areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDigital forensics.\u003c/li\u003e\n\u003cli\u003eIncident response.\u003c/li\u003e\n\u003cli\u003eSystem recovery.\u003c/li\u003e\n\u003cli\u003ePost-incident recovery.\u003c/li\u003e\n\u003cli\u003eModernizing systems to strengthen defenses.\u003c/li\u003e\n\u003cli\u003eSharing cyberthreat intelligence.\u003c/li\u003e\n\u003cli\u003eImproving national cyber incident response capabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe reserve is intended for major incidents that surpass a country\u0026rsquo;s own ability to respond. Its support can therefore apply not only during an active cyberattack but also after an incident, when recovery and defensive improvements are needed.\u003c/p\u003e\n\n\u003ch2 id=\"reciprocal-role-for-ukraine\"\u003eReciprocal Role for Ukraine\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Ukraine is not expected to be only a recipient of cybersecurity assistance. Tkachuk said Ukraine already shares intelligence on Russian hacking techniques with European partners. Ukrainian agencies also participate in joint cybercrime investigations and attribution efforts alongside Europol and other European authorities.\u003c/p\u003e\n\n\u003cp\u003eYears of responding to Russian cyberattacks have strengthened Ukraine\u0026rsquo;s cyber capabilities. The article says this has given Ukraine\u0026rsquo;s government and private sector extensive experience in detecting, mitigating, and recovering from large-scale cyber incidents. Ukraine also hopes that its own cybersecurity companies will eventually be able to join the Cyber Reserve as trusted service providers under the EU\u0026rsquo;s Cyber Solidarity Act.\u003c/p\u003e\n\n\u003ch2 id=\"broader-eu-cybersecurity-context\"\u003eBroader EU Cybersecurity Context\u003c/h2\u003e\n\n\u003cp\u003eMoldova became the first non-EU country granted access to the Cybersecurity Reserve last year. The article says that decision was due to the increasing number of Moscow-linked cyberthreats and influence operations. Ukraine\u0026rsquo;s inclusion extends the reserve\u0026rsquo;s role in supporting non-EU countries facing significant cyber pressure.\u003c/p\u003e\n\n\u003cp\u003eEuropean Commission Executive Vice President Henna Virkkunen said that welcoming Ukraine into the EU Cybersecurity Reserve strengthens collective defenses and reaffirms the principle of solidarity at the heart of Europe\u0026rsquo;s digital future. The article also notes that the EU has become one of Ukraine\u0026rsquo;s closest cybersecurity partners since Russia\u0026rsquo;s invasion in 2022.\u003c/p\u003e\n\n\u003ch2 id=\"related-cooperation-mechanisms\"\u003eRelated Cooperation Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eThe article places the reserve access within a broader pattern of EU-Ukraine cybersecurity cooperation. It mentions bilateral security agreements and international initiatives such as the Tallinn Mechanism. These efforts are presented as part of the EU\u0026rsquo;s growing role as a cybersecurity partner for Ukraine during the war with Russia.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eUkraine\u0026rsquo;s access to the EU Cybersecurity Reserve gives it a formal channel to request emergency cyber support from EU-approved experts during major cyberattacks. At the same time, the article presents the move as a step toward deeper integration with Europe\u0026rsquo;s collective cyber defense structures, with Ukraine also contributing experience and intelligence gained from years of responding to Russian cyber activity.\u003c/p\u003e\n","keyPoints":["Ukraine has been granted access to the European Union's Cybersecurity Reserve, allowing Kyiv to call on EU-approved experts during major cyberattacks.","The EU Cybersecurity Reserve is managed by ENISA and provides incident response, technical expertise, and recovery support to participating countries facing cyber incidents beyond their own capabilities.","Ukraine will be able to request European assistance for digital forensics, incident response, and system recovery if a cyberattack exceeds the capacity of its own teams.","Natalia Tkachuk said Ukraine already shares intelligence on Russian hacking techniques with European partners and participates in joint cybercrime investigations and attribution efforts.","Ukraine hopes its cybersecurity companies will eventually be able to join the Cyber Reserve as trusted service providers under the EU's Cyber Solidarity Act."],"insights":["Ukraine’s access to the EU Cybersecurity Reserve gives it a role in an EU collective defense mechanism before formal EU membership, making the move politically significant as well as operationally useful.","The reserve arrangement is expected to be reciprocal, with Ukraine contributing intelligence on Russian hacking techniques and experience from years of responding to large-scale cyber incidents.","Ukraine’s participation could eventually create a path for Ukrainian cybersecurity companies to become trusted service providers in the EU Cybersecurity Reserve under the Cyber Solidarity Act.","The EU’s earlier inclusion of Moldova shows the reserve is being extended beyond EU members to countries facing Moscow-linked cyberthreats and influence operations."],"referencedReports":[],"body":"\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, allowing Kyiv to call on EU-approved experts during major cyberattacks. The European Commission said EU member states approved Ukraine\u0026rsquo;s participation in the reserve, which is a pool of private cybersecurity companies that can be rapidly deployed to help governments and critical infrastructure operators. The reserve is managed by ENISA and is intended for cyber incidents that exceed a participating country\u0026rsquo;s own capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe decision has both practical and political significance for Ukraine as it continues to face cyberattacks during the war with Russia. Natalia Tkachuk of Ukraine\u0026rsquo;s National Security and Defense Council said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism before obtaining formal EU membership. The move comes as EU member states agreed to launch formal accession negotiations with Kyiv.\u003c/p\u003e\n\n\u003cp\u003eUkraine will be able to request emergency European assistance for digital forensics, incident response, and system recovery if its own teams are overwhelmed. The Cyber Reserve can also support post-incident recovery, system modernization, threat intelligence sharing, and improvements to national cyber incident response capabilities. Ukraine also expects the relationship to be reciprocal, with Ukrainian agencies sharing intelligence on Russian hacking techniques and participating in joint investigations with European partners.\u003c/p\u003e\n"},{"n":1,"title":"Why Account Takeovers Are Rising and How to Stop Them","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/why-account-takeovers-are-rising-and-how-to-stop-them/","time":"14:00","priority":"MAY READ","score":48,"tldr":"Account takeover attacks are rising because attackers increasingly steal credentials, hijack sessions, bypass MFA, and exploit unmanaged or compromised devices. The article argues organizations need continuous identity and device trust checks throughout sessions, not just authentication at login.","briefOverview":"\u003cp\u003eOrganizations are facing rising account takeover risk as they manage large numbers of human and non-human identities across cloud services, SaaS applications, endpoints, and remote environments. The article says hybrid work, BYOD, and third-party access have reduced visibility into who has access to what and whether that access can be trusted. It argues that compromising accounts is often faster and quieter for attackers than directly exploiting infrastructure vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several techniques used in account takeover activity, including credential theft, MFA fatigue, adversary-in-the-middle frameworks, and session hijacking. It says attackers obtain usernames and passwords through infostealer malware, phishing campaigns, and credential dumps, while newer attacks target authenticated sessions and session tokens. It also describes phishing campaigns that use legitimate hosting services, trusted domains, reverse proxies, and AI-generated content to mimic real login portals.\u003c/p\u003e\n\n\u003cp\u003eThe central recommendation is that organizations should not treat successful authentication as the only proof of trust. The article argues for continuous verification of device posture, session risk, and behavioral signals throughout the access lifecycle. It promotes Specops Device Trust as a way to add device authentication, continuous device verification, flexible device coverage, and on-access remediation to identity security decisions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes account takeover attacks as a growing problem for organizations that manage many identities across cloud, SaaS, endpoint, and remote environments. It says hybrid work, BYOD, and third-party access have increased complexity and reduced security teams’ visibility into access and trust. Attackers exploit this complexity because using a legitimate identity can be faster and quieter than attacking infrastructure directly.\u003c/p\u003e\n\n\u003cp\u003eCredential abuse remains a major driver of account takeover, and the article cites Verizon’s Data Breach Investigation Report as saying credential abuse accounted for 22% of breaches in 2025. Attackers obtain credentials through infostealer malware, phishing campaigns, and credential dumps from earlier breaches. The article also says stolen credentials are involved in 44.7% of breaches, citing the same Verizon report.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that attackers have adapted to multi-factor authentication by targeting the authentication process rather than only the password. It describes MFA fatigue, or prompt bombing, where attackers repeatedly trigger MFA approval requests until a user accepts one. It cites the 2022 Uber incident as an example in which repeated MFA prompts led to approved access, privilege escalation, and compromise of large parts of Uber’s cloud infrastructure, with employee data exposed.\u003c/p\u003e\n\n\u003cp\u003eCredential phishing is also described as increasingly sophisticated. The article says attackers use legitimate hosting services, trusted domains, reverse proxies, and AI-generated content to create pages that closely resemble genuine login portals. It references Outpost24 research into a phishing campaign that used a legitimate Cisco domain through a multi-chain redirect attack to evade detection and increase credibility.\u003c/p\u003e\n\n\u003cp\u003eDevice risk is presented as another major contributor to account takeover. Employees access corporate applications from personal laptops, unmanaged mobile devices, and systems outside traditional security controls, while compromised endpoints can expose credentials, browser-stored passwords, and authenticated session cookies. The article promotes Specops Device Trust as a tool that checks device posture during sessions and integrates with existing identity providers, VPNs, and SSO tools.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that identity alone is no longer a sufficient indicator of trust. It says traditional identity and access management systems often verify credentials and authentication flows without proving that the user or device should still be trusted. Its proposed response is continuous verification across device posture, session risk, and behavioral signals, including device authentication, ongoing device checks, flexible policies for corporate and personal devices, and on-access remediation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that account takeover attacks are rising because modern organizations manage thousands of human and non-human identities across cloud services, SaaS applications, endpoints, and remote environments. It says hybrid work, BYOD, and third-party access have expanded access paths while reducing security teams’ visibility into who has access to what and whether that access can be trusted.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central theme is that attackers increasingly prefer compromising legitimate accounts because this can be faster and quieter than exploiting infrastructure vulnerabilities directly. For defenders, the article says malicious activity tied to a legitimate identity remains one of the most difficult security challenges.\u003c/p\u003e\n\n\u003ch2 id=\"credential-abuse-and-mfa-bypass\"\u003eCredential Abuse and MFA Bypass\u003c/h2\u003e\n\n\u003cp\u003eCredential abuse is described as one of the most reliable ways for attackers to gain access to an organization. The article cites Verizon’s Data Breach Investigation Report as saying credential abuse accounted for 22% of breaches in 2025. It also states that attackers obtain usernames and passwords through infostealer malware, phishing campaigns, and credential dumps from previous breaches.\u003c/p\u003e\n\n\u003cp\u003eThe article says multi-factor authentication remains one of the most important defenses against account compromise, but attackers have adapted by targeting the authentication process itself. One highlighted method is MFA fatigue, also called prompt bombing, where attackers repeatedly trigger MFA approval requests until a user approves one out of frustration.\u003c/p\u003e\n\n\u003cp\u003eThe article cites the 2022 Uber incident as an example of this technique. In that case, attackers repeatedly sent MFA prompts to an Uber employee until one was approved. According to the article, that access allowed the attackers to escalate privileges, move deeper into Uber’s environment, compromise large parts of its cloud infrastructure, and expose employee data.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes adversary-in-the-middle frameworks and session hijacking tools as methods attackers use to bypass MFA entirely. These tools can steal authenticated session tokens after login, allowing attackers to target the session rather than only the password.\u003c/p\u003e\n\n\u003ch2 id=\"phishing-sophistication\"\u003ePhishing Sophistication\u003c/h2\u003e\n\n\u003cp\u003eThe article says credential phishing remains popular and has become more sophisticated. It describes attackers using legitimate hosting services, trusted domains, reverse proxies, and AI-generated content to create phishing pages that closely mimic genuine login portals.\u003c/p\u003e\n\n\u003cp\u003eIt references threat researchers at Outpost24, Specops’ parent company, who uncovered a phishing campaign involving a legitimate Cisco domain. The campaign used a multi-chain redirect attack intended to evade detection and increase credibility. The article says campaigns like this show how difficult phishing attacks can be to identify, even for security-aware users.\u003c/p\u003e\n\n\u003ch2 id=\"device-risk-and-endpoint-exposure\"\u003eDevice Risk and Endpoint Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies devices as a growing part of the account takeover attack surface. Employees now regularly access corporate applications from personal laptops, unmanaged mobile devices, and systems outside traditional security controls.\u003c/p\u003e\n\n\u003cp\u003eBecause of this, IT departments may have limited visibility into whether employees are connecting from devices with missing security updates or malware infections. The article says compromised endpoints provide a valuable route into trusted environments.\u003c/p\u003e\n\n\u003cp\u003eInfostealer malware is specifically highlighted as a contributor to account takeover activity. According to the article, infostealers can harvest credentials, browser-stored passwords, and authenticated session cookies directly from user devices.\u003c/p\u003e\n\n\u003ch2 id=\"why-identity-based-attacks-are-difficult-to-stop\"\u003eWhy Identity-Based Attacks Are Difficult to Stop\u003c/h2\u003e\n\n\u003cp\u003eThe article says many security controls still treat successful authentication as the main proof of trust. Traditional identity and access management tools are described as verifying credentials and authentication flows, but not necessarily whether the person or device behind them can actually be trusted.\u003c/p\u003e\n\n\u003cp\u003eThis problem is presented as more difficult in hybrid work, cloud-first infrastructure, and BYOD environments. Security teams must balance strong access controls with usability and productivity. The article describes a common compromise: organizations may either block access from devices that do not meet security standards and disrupt users, or allow access and accept that some devices may already be compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article references high-profile incidents at Clorox and Marks \u0026amp; Spencer as reinforcing the lesson that identity alone is no longer a sufficient indicator of trust. It says stopping modern account takeover requires more than validating usernames and passwords.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-security-approach\"\u003eRecommended Security Approach\u003c/h2\u003e\n\n\u003cp\u003eThe article argues for visibility into device posture, session risk, and behavioral signals throughout the entire access lifecycle. It says this reflects a shift toward continuous verification models, where trust is assessed not only at login but throughout the session.\u003c/p\u003e\n\n\u003cp\u003eThe article promotes Specops Device Trust as a way to bring device trust into identity security. It says the product can continuously scan throughout sessions and check for risks such as disabled security controls and outdated software. It also says the tool integrates with existing identity providers, VPNs, and SSO tools so organizations can extend current setups rather than replace them.\u003c/p\u003e\n\n\u003cp\u003eThe capabilities listed for Specops Device Trust include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevice authentication, intended to ensure only approved devices can access sensitive resources by binding users to trusted devices.\u003c/li\u003e\n\u003cli\u003eContinuous device verification, including posture checks at login and throughout a session across factors such as OS updates, browser versions, and security tooling.\u003c/li\u003e\n\u003cli\u003eFlexible device coverage, allowing policies across both corporate and personal devices with access tailored by risk and context.\u003c/li\u003e\n\u003cli\u003eOn-access remediation, intended to address issues as they arise without unnecessarily interrupting users.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that account takeover defense must move beyond validating credentials and MFA at login. It argues that attackers can compromise accounts through stolen credentials, MFA fatigue, phishing, session token theft, and compromised devices.\u003c/p\u003e\n\n\u003cp\u003eTo reduce account takeover risk, the article recommends combining strong authentication with continuous verification of device trust and session context. It frames this as a way to improve identity security while avoiding unnecessary disruption for users.\u003c/p\u003e\n","keyPoints":["Account takeover attacks are increasing because organizations manage many human and non-human identities across cloud services, SaaS applications, endpoints, and remote environments while losing visibility into access and trust.","Attackers are adapting to multi-factor authentication by using MFA fatigue, adversary-in-the-middle frameworks, and session hijacking tools to steal authenticated session tokens or gain approval.","Credential phishing remains common and has become more sophisticated through legitimate hosting services, trusted domains, reverse proxies, and AI-generated content that mimic real login portals.","Personal laptops, unmanaged mobile devices, and compromised endpoints expand the attack surface by giving attackers opportunities to harvest credentials, browser-stored passwords, and authenticated session cookies.","The article says organizations need continuous verification of device posture, session risk, and behavioral signals throughout the access lifecycle rather than relying only on successful authentication."],"insights":["Attackers are increasingly targeting authenticated sessions rather than only passwords, making session token theft and adversary-in-the-middle techniques a direct way to bypass MFA after a legitimate login.","A successful MFA approval can become a major intrusion path, as illustrated by the Uber example where repeated MFA prompts led to deeper privilege escalation and cloud infrastructure compromise.","Phishing detection is harder when attackers abuse legitimate infrastructure, such as trusted domains and multi-chain redirects, because the apparent credibility of the page can mislead even security-aware users.","Device posture is presented as an access-control signal that should be evaluated continuously during a session, not only at the initial login decision.","The article frames blocking noncompliant devices and allowing risky access as a usability-versus-security tradeoff, recommending on-access remediation as a way to resolve device issues without immediately forcing password resets or outright access denial."],"referencedReports":[{"title":"2025 Data Breach Investigations Report","url":"https://www.verizon.com/business/en-gb/resources/reports/dbir/","publisher":"Verizon","context":"The article cites Verizon’s Data Breach Investigations Report for statistics on credential abuse and stolen credentials in breaches.","category":"","primary":false}],"body":"\u003cp\u003eOrganizations are facing rising account takeover risk as they manage large numbers of human and non-human identities across cloud services, SaaS applications, endpoints, and remote environments. The article says hybrid work, BYOD, and third-party access have reduced visibility into who has access to what and whether that access can be trusted. It argues that compromising accounts is often faster and quieter for attackers than directly exploiting infrastructure vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several techniques used in account takeover activity, including credential theft, MFA fatigue, adversary-in-the-middle frameworks, and session hijacking. It says attackers obtain usernames and passwords through infostealer malware, phishing campaigns, and credential dumps, while newer attacks target authenticated sessions and session tokens. It also describes phishing campaigns that use legitimate hosting services, trusted domains, reverse proxies, and AI-generated content to mimic real login portals.\u003c/p\u003e\n\n\u003cp\u003eThe central recommendation is that organizations should not treat successful authentication as the only proof of trust. The article argues for continuous verification of device posture, session risk, and behavioral signals throughout the access lifecycle. It promotes Specops Device Trust as a way to add device authentication, continuous device verification, flexible device coverage, and on-access remediation to identity security decisions.\u003c/p\u003e\n"},{"n":7,"title":"What Is the Preparation Phase? The Part of the Attack Timeline Most Tools Miss","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/blog/preparation-phase/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=preparation-phase","time":"14:05","priority":"MAY READ","score":34,"tldr":"The article argues that most security tools detect threats too late because attackers spend weeks or months preparing domains, servers, DNS, and certificates before any malicious activity appears. Silent Push promotes its preemptive approach for identifying this staged infrastructure before campaigns launch.","briefOverview":"\u003cp\u003eThe article describes the preparation phase as the period when threat actors build and stage infrastructure before an attack campaign goes live. This includes domain registration, server provisioning, DNS configuration, certificate issuance, and pre-deployment testing. The article argues that this phase often occurs weeks or months before a traditional security alert fires.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that conventional tools such as SIEMs, EDR platforms, blocklists, and standard threat intelligence feeds typically rely on events that have already happened. Because preparation-phase infrastructure has not yet been used maliciously, it can appear indistinguishable from legitimate activity. The article states that traditional threat data captures roughly the final 5% of the offensive lifecycle.\u003c/p\u003e\n\n\u003cp\u003eSilent Push presents its Preemptive Cyber Defense platform as a way to detect adversary staging environments before weaponization. The platform maps internet infrastructure across DNS, WHOIS, certificate data, and host configurations, and generates Indicators of Future Attack when staging patterns match adversarial operational signatures. The article claims this process provides an average early-detection lead time of 104 days ahead of a traditional SIEM alert, with some APT campaigns exceeding 300 days.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on the preparation phase of attack campaigns, which it defines as the period when threat actors build and stage infrastructure before a campaign becomes active. Activities in this phase include registering domains, provisioning servers, configuring DNS records, issuing certificates, and testing infrastructure. The article says this phase may begin weeks or months before any alert appears in a defender’s environment.\u003c/p\u003e\n\n\u003cp\u003eA central point is that preparation-phase infrastructure generally has not yet generated malicious activity. As a result, there may be no endpoint behavior, known-bad indicator, or log event for conventional detection tools to act on. The article argues that tools built around SIEMs, EDR, blocklists, and traditional threat intelligence operate downstream of this phase.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that domains may be registered and left dormant to avoid scrutiny related to new registrations, while servers may be configured and tested before a campaign launches. It also distinguishes between generic infrastructure built before a target is selected and highly tailored staging involving domains that spoof a specific organization or certificates that mimic services. Silent Push says its Context Graph identifies behavioral patterns that remain consistent across campaigns even as specific assets rotate.\u003c/p\u003e\n\n\u003cp\u003eSilent Push positions Indicators of Future Attack as verified signals of staging environments that exist before they have been used against anyone. The company says its platform analyzes DNS, WHOIS, certificate data, and host configurations, comparing known-bad assets and behavioral patterns associated with adversarial tactics, techniques, and procedures. It claims an average early-detection lead time of 104 days ahead of a traditional SIEM alert, and more than 300 days for some Advanced Persistent Threat campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe article describes different operational uses for SOC managers, incident response leads, and cyber threat intelligence analysts. SOC managers can use IOFA in blocklists and SIEMs before alert volume rises, incident response teams can expand a single indicator into a broader cluster of related infrastructure, and CTI analysts can brief on infrastructure being staged before it becomes an IOC. The article ends by encouraging readers to request a Silent Push demo.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that many attack campaigns begin long before defenders see an alert. It identifies this early period as the \u003cstrong\u003epreparation phase\u003c/strong\u003e, when a threat actor builds and stages the infrastructure intended for later use in an attack. According to the article, this work can occur weeks or months before the campaign goes live.\u003c/p\u003e\n\n\u003cp\u003eThe preparation phase includes activities such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDomain registration.\u003c/li\u003e\n\u003cli\u003eServer provisioning.\u003c/li\u003e\n\u003cli\u003eDNS configuration.\u003c/li\u003e\n\u003cli\u003eCertificate issuance.\u003c/li\u003e\n\u003cli\u003ePre-deployment testing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article’s main claim is that this phase sits largely outside the visibility of conventional threat intelligence and detection tooling.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-preparation-phase-means\"\u003eWhat the Preparation Phase Means\u003c/h2\u003e\n\n\u003cp\u003eThe article defines the preparation phase as the period during which a threat actor assembles the infrastructure they intend to use in an attack. It ends when the campaign goes live. During this stage, no malicious events have necessarily occurred, which makes the infrastructure difficult to distinguish from legitimate activity.\u003c/p\u003e\n\n\u003cp\u003eBecause there may be no endpoint behavior, known-bad indicator, or correlatable log entry, conventional detection tools have little or no signal to act on. The article states that traditional threat data therefore captures roughly the final 5% of the offensive lifecycle, when infrastructure is already operational and a malicious campaign is already running.\u003c/p\u003e\n\n\u003ch2 id=\"where-conventional-ioc-based-detection-starts\"\u003eWhere Conventional IOC-Based Detection Starts\u003c/h2\u003e\n\n\u003cp\u003eThe article says that when an Indicator of Compromise appears in a security stack, the threat actor behind it may already have been working for weeks or months. By then, domains may already have been registered, servers may have been provisioned, and infrastructure may have been configured and tested.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that some domains are deliberately left dormant to avoid scrutiny associated with newly registered domains. This makes IOC-based visibility late in the attack timeline, because the observable indicator appears only after infrastructure has been used or associated with malicious activity.\u003c/p\u003e\n\n\u003ch2 id=\"why-standard-tools-arrive-late\"\u003eWhy Standard Tools Arrive Late\u003c/h2\u003e\n\n\u003cp\u003eThe article groups SIEMs, EDR platforms, blocklists, and standard threat intelligence feeds together as tools that depend on prior observable activity. A SIEM rule needs log data, an EDR alert needs endpoint behavior, and a blocklist needs an indicator that has already been identified as malicious.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the traditional data cycle as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn incident occurs.\u003c/li\u003e\n\u003cli\u003eThe incident generates data.\u003c/li\u003e\n\u003cli\u003eThe data is processed into indicators.\u003c/li\u003e\n\u003cli\u003eThe indicators eventually reach the defender’s stack.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBy the time that cycle completes, the article says the preparation phase for a follow-on campaign may already be complete.\u003c/p\u003e\n\n\u003ch2 id=\"activities-during-the-preparation-phase\"\u003eActivities During the Preparation Phase\u003c/h2\u003e\n\n\u003cp\u003eThe article describes preparation-phase activity as following recognizable operational patterns across campaigns, even when individual assets rotate. Some preparation activity is generic, with infrastructure built before a target is selected. Other preparation activity is tailored to a specific target.\u003c/p\u003e\n\n\u003cp\u003eExamples of tailored staging in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDomains that spoof a specific organization.\u003c/li\u003e\n\u003cli\u003eCertificates that mimic a target’s services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSilent Push says that the behavioral patterns identified by its Context Graph remain consistent in either case.\u003c/p\u003e\n\n\u003ch2 id=\"silent-push-s-claimed-approach\"\u003eSilent Push’s Claimed Approach\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Silent Push Preemptive Cyber Defense as a platform built to operate during the preparation phase. It says the platform continuously maps internet infrastructure across several data sources, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDNS.\u003c/li\u003e\n\u003cli\u003eWHOIS.\u003c/li\u003e\n\u003cli\u003eCertificate data.\u003c/li\u003e\n\u003cli\u003eHost configurations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSilent Push says it analyzes both known-bad assets and behavioral patterns that appear when infrastructure is built and managed in ways consistent with adversarial tactics, techniques, and procedures. When those patterns match operational signatures of staged campaigns, the platform generates \u003cstrong\u003eIndicators of Future Attack\u003c/strong\u003e, or IOFA.\u003c/p\u003e\n\n\u003cp\u003eThe article defines IOFA as verified signals of staging environments that exist before they have been used against anyone.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-detection-lead-time\"\u003eClaimed Detection Lead Time\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Silent Push’s average early-detection lead time is \u003cstrong\u003e104 days\u003c/strong\u003e ahead of a traditional SIEM alert. It also claims that for Advanced Persistent Threat campaigns, the lead time has exceeded \u003cstrong\u003e300 days\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThese figures are presented as evidence that preparation-phase visibility can give defenders time to act before a campaign becomes operational.\u003c/p\u003e\n\n\u003ch2 id=\"operational-relevance-for-security-teams\"\u003eOperational Relevance for Security Teams\u003c/h2\u003e\n\n\u003ch3 id=\"soc-managers\"\u003eSOC Managers\u003c/h3\u003e\n\n\u003cp\u003eThe article says SOC managers who rely on IOC-based feeds are often responding to activity that is already running. It describes the infrastructure as already live and the campaign as already operational by the time alert volume rises.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says integrating IOFA from the Context Graph into an existing stack allows SOC teams to push verified indicators into blocklists and validate staging infrastructure before alert volume spikes.\u003c/p\u003e\n\n\u003ch3 id=\"incident-response-leads\"\u003eIncident Response Leads\u003c/h3\u003e\n\n\u003cp\u003eFor incident response teams, the article says an active breach often begins with a single known indicator. However, that single indicator may not reveal the full set of infrastructure an attacker has staged.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that adversaries build redundant infrastructure. If remediation only covers assets identified during the active investigation, the attacker may retain a route back in. Silent Push says it tracks infrastructure relationships, DNS history, and WHOIS lineage to expand one starting indicator into a broader cluster of adversary-controlled assets, including fallback infrastructure.\u003c/p\u003e\n\n\u003ch3 id=\"cyber-threat-intelligence-analysts\"\u003eCyber Threat Intelligence Analysts\u003c/h3\u003e\n\n\u003cp\u003eThe article says CTI analysts often deliver post-breach briefs that document activity that has already happened. It argues that delivering IOFA for infrastructure currently being staged changes the operational value of those briefs.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says its Context Graph pre-correlates across more than 200 behavioral parameters, so that SPQL queries begin from already clustered infrastructure rather than requiring analysts to perform that pivoting from scratch.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-value-claimed-by-the-article\"\u003eDefensive Value Claimed by the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the preparation phase as the point where defenders have the most leverage. It says staged infrastructure can still be blocked before a breach occurs, and campaigns can be disrupted before they launch.\u003c/p\u003e\n\n\u003cp\u003eOnce a campaign is operational, the article says defensive options narrow because the attacker is already inside the attack timeline.\u003c/p\u003e\n\n\u003ch2 id=\"product-positioning-and-call-to-action\"\u003eProduct Positioning and Call to Action\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes by presenting Silent Push IOFA as being built on pre-breach infrastructure data. It says the platform gives security teams visibility into adversary staging environments before weaponization and before alerts begin.\u003c/p\u003e\n\n\u003cp\u003eThe stated use cases include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlocking staging grounds before campaigns deploy.\u003c/li\u003e\n\u003cli\u003eIngesting earlier indicators through automated feed exports.\u003c/li\u003e\n\u003cli\u003eTracking Advanced Persistent Threat campaigns from infrastructure patterns.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article ends by asking readers to request a demo to see how Silent Push surfaces the preparation phase in their environment.\u003c/p\u003e\n","keyPoints":["The preparation phase is the period when a threat actor builds and stages attack infrastructure such as domains, servers, DNS records, certificates, and testing environments before a campaign goes live.","Conventional tools such as SIEMs, EDR platforms, blocklists, and standard threat intelligence feeds depend on observed malicious events or known-bad indicators, so they usually do not detect preparation-phase activity.","The article states that traditional threat data captures roughly the final 5% of the offensive lifecycle, when infrastructure is already operational and a malicious campaign is already running.","Silent Push says its platform maps internet infrastructure across DNS, WHOIS, certificate data, and host configurations to generate Indicators of Future Attack for staging environments before they are used.","The article claims Silent Push provides an average early-detection lead time of 104 days ahead of a traditional SIEM alert, with some APT campaigns exceeding 300 days."],"insights":["Dormant domains are highlighted as a deliberate evasion tactic because attackers may register them weeks or months ahead of use to avoid scrutiny tied to newly registered domains.","The article frames the preparation phase as the point of greatest defensive leverage because staged infrastructure can still be blocked before any breach occurs or campaign becomes operational.","A single IOC from an active breach may be insufficient for remediation because adversaries often maintain redundant fallback infrastructure that can provide a route back in.","The article claims that pre-correlating infrastructure across more than 200 behavioral parameters can reduce analyst pivot work by clustering related adversary-controlled assets before an investigation begins."],"referencedReports":[],"body":"\u003cp\u003eThe article describes the preparation phase as the period when threat actors build and stage infrastructure before an attack campaign goes live. This includes domain registration, server provisioning, DNS configuration, certificate issuance, and pre-deployment testing. The article argues that this phase often occurs weeks or months before a traditional security alert fires.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that conventional tools such as SIEMs, EDR platforms, blocklists, and standard threat intelligence feeds typically rely on events that have already happened. Because preparation-phase infrastructure has not yet been used maliciously, it can appear indistinguishable from legitimate activity. The article states that traditional threat data captures roughly the final 5% of the offensive lifecycle.\u003c/p\u003e\n\n\u003cp\u003eSilent Push presents its Preemptive Cyber Defense platform as a way to detect adversary staging environments before weaponization. The platform maps internet infrastructure across DNS, WHOIS, certificate data, and host configurations, and generates Indicators of Future Attack when staging patterns match adversarial operational signatures. The article claims this process provides an average early-detection lead time of 104 days ahead of a traditional SIEM alert, with some APT campaigns exceeding 300 days.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
