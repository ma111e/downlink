<script>
window.__DL_ARTICLES = [{"n":2,"title":"FortiBleed leak exposes Fortinet VPN credentials for 73,000 devices.","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fortibleed-leak-exposes-fortinet-vpn-credentials-for-73-000-devices/","time":"15:12","priority":"MUST READ","score":100,"tldr":"A leaked dataset dubbed FortiBleed appears to expose valid Fortinet/FortiGate VPN and admin credentials for about 74,000 firewall URLs worldwide, including major enterprises and government-linked organizations. Affected organizations should immediately rotate Fortinet passwords, enable MFA, and review logs for compromise.","briefOverview":"\u003cp\u003eA newly discovered leak dubbed “FortiBleed” exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide. Security researcher Bob Diachenko said he found a server containing usernames, email addresses, and plaintext passwords. The exposed entries reportedly included major organizations such as Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, and State Grid.\u003c/p\u003e\n\n\u003cp\u003eDiachenko later said the operation appeared to involve a Russian-speaking multi-operator threat group harvesting credentials for FortiGate SSL VPN devices. He claimed the attackers conducted about 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems. He also said additional exposed files included artifacts, connection strings, tooling, scripts, analytics, bash histories, and logs.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock and cybersecurity researcher Kevin Beaumont reviewed the dataset and said it appears to contain real compromised Fortinet-related credentials. Beaumont said the data likely came from exported Fortinet configurations and that many affected devices remain online. Organizations listed in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, inspect gateway logs, and monitor for exposed employee credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA data leak called “FortiBleed” exposed what appears to be a collection of Fortinet and FortiGate VPN credentials for 73,932 firewall URLs across organizations worldwide. Security researcher Bob Diachenko discovered the exposed server and said it contained usernames, email addresses, and plaintext passwords. Screenshots and information he shared showed entries for organizations including Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, State Grid, and others.\u003c/p\u003e\n\n\u003cp\u003eDiachenko described the exposure as part of a massive Fortinet and FortiGate bruteforce and active exploitation campaign. He later said the operation was conducted by a Russian-speaking multi-operator threat group that harvested credentials for FortiGate SSL VPN devices. According to his investigation, the attackers made roughly 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems.\u003c/p\u003e\n\n\u003cp\u003eDiachenko said the attackers intercepted SSL VPN authentication hashes, cracked them using a 45-GPU cluster managed through Hashtopolis, and used recovered credentials to move laterally into internal Active Directory environments. He told BleepingComputer that these details came from files accidentally left exposed on the same server, including artifacts, connection strings, tooling, scripts, cron job analytics, bash histories, and logs. He also said several organizations in Japan, Taiwan, Vietnam, Iraq, and Turkey were fully compromised, including a Turkish NATO defense contractor from which classified documents were allegedly stolen.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock published its own analysis after receiving the dataset from Diachenko and described it as one of the largest known troves of compromised Fortinet-related credentials. The company said the dataset contains 73,932 unique firewall URLs across 194 countries and affects 21,632 unique domains. It reported that listed organizations span nearly every major industry sector, including telecommunications, IT services, financial services, government, healthcare, education, and manufacturing.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity researcher Kevin Beaumont independently reviewed portions of the exposed data and said he confirmed the authenticity of some admin logins and passwords. Beaumont later said the dataset contains credentials for roughly 75,000 Fortinet devices, most of which remain online, and that the data appears to have originated from exported Fortinet configurations. The source of the configuration data remains unknown, and organizations in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, examine gateway logs, and monitor for exposed employee credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA newly discovered data leak dubbed “FortiBleed” exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide. The data was first discovered by security researcher Bob Diachenko, who said he found a server containing apparently valid Fortinet VPN credentials. The exposed data included usernames, email addresses, and plaintext passwords.\u003c/p\u003e\n\n\u003cp\u003eAccording to screenshots and information shared by Diachenko, the dataset included entries for major organizations such as Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, State Grid, and others. The exposed data also contained comments listing each organization’s industry, revenue, and number of employees, which the article says was likely for planning attacks.\u003c/p\u003e\n\n\u003ch2 id=\"reported-campaign-details\"\u003eReported Campaign Details\u003c/h2\u003e\n\n\u003cp\u003eDiachenko described the incident as a “Massive Fortinet/FortiGate bruteforce/active exploitation campaign” in a LinkedIn post. He said thousands of top vendor instances were listed in the files and noted that one file alone contained 21,634 domain names. He also said the data included potentially working passwords to FortiGate appliances obtained through various means.\u003c/p\u003e\n\n\u003cp\u003eDiachenko later shared additional information claiming that the operation was conducted by a Russian-speaking multi-operator threat group. He said the group harvested credentials for FortiGate SSL VPN devices.\u003c/p\u003e\n\n\u003cp\u003eAccording to Diachenko’s investigation, the attackers allegedly conducted:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately 1.16 billion credential attempts against 320,777 FortiGate targets.\u003c/li\u003e\n\u003cli\u003eAn additional 2.1 billion attempts against 163,650 Microsoft SQL Server systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDiachenko further claimed that the threat actors intercepted SSL VPN authentication hashes, cracked them with a 45-GPU cluster managed through Hashtopolis, and used recovered credentials to move laterally into internal Active Directory environments.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-attacker-infrastructure-and-files\"\u003eExposed Attacker Infrastructure and Files\u003c/h2\u003e\n\n\u003cp\u003eDiachenko told BleepingComputer that he obtained additional details by analyzing files inadvertently exposed on the same server. He said the operators accidentally left an open directory containing artifacts, connection strings, tooling, scripts, and data. He also said analytics from cron jobs, bash histories, and logs were exposed.\u003c/p\u003e\n\n\u003cp\u003eThe researcher stated that multiple organizations in Japan, Taiwan, Vietnam, Iraq, and Turkey were fully compromised. He also said a Turkish NATO defense contractor was among the affected organizations and that classified documents were allegedly stolen from it.\u003c/p\u003e\n\n\u003ch2 id=\"hudson-rock-analysis\"\u003eHudson Rock Analysis\u003c/h2\u003e\n\n\u003cp\u003eThreat intelligence company Hudson Rock later published its own analysis after receiving the dataset from Diachenko. Hudson Rock described the collection as one of the largest known troves of compromised Fortinet-related credentials.\u003c/p\u003e\n\n\u003cp\u003eAccording to Hudson Rock, the dataset contains:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e73,932 unique firewall URLs.\u003c/li\u003e\n\u003cli\u003eAffected systems across 194 countries.\u003c/li\u003e\n\u003cli\u003e21,632 unique impacted domains.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHudson Rock said the attackers maintained detailed logs of successful compromises and assembled a database of verified credentials for organizations across nearly every major industry sector. The company said organizations appearing in the dataset include Foxconn, Samsung, Comcast, Siemens, Lenovo, PwC, Accenture, Oracle, government agencies, and critical infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock also released statistics showing that the highest number of affected devices was in India, the United States, Taiwan, Mexico, Turkey, Thailand, Colombia, Malaysia, Chile, and the United Arab Emirates. It said the most common sectors among listed companies were telecommunications, IT services, financial services, government organizations, healthcare providers, educational institutions, and manufacturing.\u003c/p\u003e\n\n\u003ch2 id=\"unusual-password-findings\"\u003eUnusual Password Findings\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that one unusual aspect of the leak is that many exposed credentials were long, complex passwords. These would ordinarily be considered difficult to crack. The article does not identify a confirmed method by which those credentials were originally obtained.\u003c/p\u003e\n\n\u003ch2 id=\"beaumont-review-and-configuration-data-findings\"\u003eBeaumont Review and Configuration Data Findings\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher Kevin Beaumont independently reviewed portions of the exposed data and told BleepingComputer that some of the credentials are authentic. He said he was able to confirm the authenticity of some admin logins and passwords and described the material as a real dump.\u003c/p\u003e\n\n\u003cp\u003eAfter reviewing data shared by Hudson Rock, Beaumont published additional findings indicating that the dataset contains credentials for roughly 75,000 Fortinet devices. He said most of those devices remain online.\u003c/p\u003e\n\n\u003cp\u003eBeaumont said the data appears to have originated from exported Fortinet configurations. He based this on the presence of information, including email addresses, that is typically accessible only through configurations.\u003c/p\u003e\n\n\u003cp\u003eHe also said the affected IP addresses differ from those in the 2025 Belsen Group Fortinet leak. According to the article, this further indicates that FortiBleed is a more recent and larger collection of compromised devices.\u003c/p\u003e\n\n\u003cp\u003eBeaumont said multiple organizations listed in the dataset were using valid credentials. He also observed that many affected devices were running relatively recent FortiOS versions.\u003c/p\u003e\n\n\u003ch2 id=\"internet-exposure-and-scope\"\u003eInternet Exposure and Scope\u003c/h2\u003e\n\n\u003cp\u003eBased on Shodan network data, Beaumont said the leak contains approximately half of all internet-accessible Fortinet firewalls. He also said that a majority of the affected devices expose their FortiGate management interfaces directly to the internet.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the source of the configuration data remains unknown. It is unclear whether the data was stolen through previously disclosed Fortinet vulnerabilities, a newly discovered flaw, or another method. Diachenko, Hudson Rock, and Beaumont have not identified how the configuration data was originally obtained.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article says Hudson Rock created a free FortiBleed lookup tool for organizations to check whether they are impacted. It also says organizations in the dataset should immediately take response steps.\u003c/p\u003e\n\n\u003cp\u003eRecommended actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRotating passwords associated with Fortinet VPN and administrative interfaces.\u003c/li\u003e\n\u003cli\u003eEnforcing MFA.\u003c/li\u003e\n\u003cli\u003eExamining gateway logs for suspicious activity.\u003c/li\u003e\n\u003cli\u003eMonitoring for exposed employee credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"fortinet-response-status\"\u003eFortinet Response Status\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Fortinet regarding the exposed dataset. The article states that it will be updated if a response is received.\u003c/p\u003e\n","keyPoints":["A newly discovered data leak dubbed FortiBleed exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide.","Security researcher Bob Diachenko said he found a server containing usernames, email addresses, and plaintext passwords, with entries referencing companies such as Chevron, Samsung, Foxconn, Comcast, AT\u0026T, Mercedes-Benz, Toyota, Sinopec, and State Grid.","Diachenko claimed the operation was conducted by a Russian-speaking multi-operator threat group that made about 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems.","Cybersecurity researcher Kevin Beaumont said he confirmed the authenticity of some admin logins and passwords and found the dataset appears to have originated from exported Fortinet configurations.","Organizations in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, examine gateway logs for suspicious activity, and monitor for exposed employee credentials."],"insights":["The presence of long, complex passwords in the leaked dataset suggests that password strength alone may not have protected affected Fortinet devices from compromise.","Kevin Beaumont said the data appears to come from exported Fortinet configurations because it includes information such as email addresses that is typically only accessible through configs.","Beaumont estimated from Shodan data that the leak contains approximately half of all internet-accessible Fortinet firewalls, and that most affected devices expose FortiGate management interfaces directly to the internet.","The exposed files allegedly included comments about each organization’s industry, revenue, and employee count, indicating the data may have been organized to help prioritize follow-on attacks.","The affected IP addresses reportedly differ from those in the 2025 Belsen Group Fortinet leak, indicating this is a separate and larger collection rather than a duplicate of the earlier leak."],"referencedReports":[{"title":"FortiBleed: 75,000 Fortinet Firewalls Compromised, Global Enterprises Exposed","url":"http://www.infostealers.com/article/fortibleed-75000-fortinet-firewalls-compromised-global-enterprises-exposed-claim-your-ethical-disclosure/","publisher":"Hudson Rock","context":"The article says Hudson Rock published its own analysis of the exposed Fortinet credential dataset after receiving it from Bob Diachenko.","category":"","primary":false},{"title":"FortiBleed: 75k Fortinet firewalls have admin passwords cracked","url":"https://doublepulsar.com/fortibleed-75k-fortinet-firewalls-have-admin-passwords-cracked-60299faa65f8?postPublishedType=initial","publisher":"Kevin Beaumont / DoublePulsar","context":"The article says Kevin Beaumont published additional findings after reviewing the data shared by Hudson Rock, including observations about the dataset’s apparent origin and affected devices.","category":"","primary":false}],"body":"\u003cp\u003eA newly discovered leak dubbed “FortiBleed” exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide. Security researcher Bob Diachenko said he found a server containing usernames, email addresses, and plaintext passwords. The exposed entries reportedly included major organizations such as Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, and State Grid.\u003c/p\u003e\n\n\u003cp\u003eDiachenko later said the operation appeared to involve a Russian-speaking multi-operator threat group harvesting credentials for FortiGate SSL VPN devices. He claimed the attackers conducted about 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems. He also said additional exposed files included artifacts, connection strings, tooling, scripts, analytics, bash histories, and logs.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock and cybersecurity researcher Kevin Beaumont reviewed the dataset and said it appears to contain real compromised Fortinet-related credentials. Beaumont said the data likely came from exported Fortinet configurations and that many affected devices remain online. Organizations listed in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, inspect gateway logs, and monitor for exposed employee credentials.\u003c/p\u003e\n"},{"n":6,"title":"macOS ClickFix Lures Deploy AppleScript Stealer \u0026 Persistent RAT","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/macos-clickfix-lures-deploy-applescript-stealer-persistent-rat","time":"15:23","priority":"MUST READ","score":95,"tldr":"Netskope found a new macOS ClickFix campaign that tricks users into running a fileless command, then deploys the “Meow” AppleScript stealer plus a persistent RAT. The malware steals credentials, browser and wallet data, modifies desktop crypto wallet apps, and installs a fake Apple accounts service for ongoing remote command execution.","briefOverview":"\u003cp\u003eNetskope Threat Labs reported a new macOS ClickFix campaign observed on May 31, 2026, following earlier April 2026 ClickFix activity that delivered an AppleScript-based infostealer. The newer campaign is attributed in the article to a Russian-speaking attacker and upgrades the payload from a simple stealer to a full-featured remote access trojan. Netskope telemetry showed activity across short-lived lure domains, with victims mainly in Asia, North America, and Oceania.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses social engineering to make users copy and run a Terminal command from fake macOS utility, fake GitHub, or localized IT support pages. The infection chain remains fileless until persistence is installed, using a gzip-compressed stager and piping the second-stage AppleScript directly into osascript memory. The stage 1 loader checks for Russian keyboard input and exits if detected, while still reporting telemetry to the command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eThe AppleScript payload, internally labeled “Meow (DEBUG),” steals credentials, browser data, cookies, keychain contents, cryptocurrency wallet data, messaging sessions, gaming account data, files, and Apple Notes. After exfiltration, it can replace app.asar files in selected desktop cryptocurrency wallets and re-sign modified app bundles. It also installs persistence under the deceptive label com.apple.accountsd, beaconing every 60 seconds for command execution.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNetskope Threat Labs described an upgraded macOS ClickFix campaign intercepted on May 31, 2026, after prior April 2026 activity involving an AppleScript-based infostealer. The newer campaign delivers a payload self-labeled “Meow (DEBUG)” and adds persistent remote access trojan functionality. Netskope telemetry showed the active variant across 25 short-lived lure domains, with victims mainly in Asia, North America, and Oceania, especially in technology, media, and business services sectors.\u003c/p\u003e\n\n\u003cp\u003eThe delivery relies on ClickFix-style social engineering in which victims are shown fake pages and instructed to copy and run a Terminal command. Observed lures included a fake macOS utility page, a fake GitHub repository page, and a localized macOS support and IT services page based in Berlin. Active variants used the same /links/page-loader.js path to fetch a payload command from links/data.txt and place it into the victim’s clipboard when they clicked a copy button.\u003c/p\u003e\n\n\u003cp\u003eThe stage 1 loader is delivered as a gzip-compressed, base64-encoded heredoc and runs in memory. It checks the macOS keyboard input source list in ~/Library/Preferences/com.apple.HIToolbox.plist for Russian input and exits if found, after posting a cis_blocked event to the C2. It also sends telemetry including external IP, locale details, hostname, OS version, CIS status, and a campaign build hash before fetching the AppleScript payload and piping it directly into osascript.\u003c/p\u003e\n\n\u003cp\u003eThe stage 2 AppleScript payload uses a fake System Preferences dialog to obtain the user’s login password, validating it with dscl. It collects browser credentials and cookies from many Chromium-based browsers, Firefox, and Safari, and uses the harvested password to unlock the login keychain for Safe Storage key extraction on macOS Tahoe. It also targets over 100 cryptocurrency wallet browser extension IDs, 25 desktop wallet directories, Telegram Desktop sessions, Discord token storage, Steam session files, selected files from Desktop and Documents, and Apple Notes data.\u003c/p\u003e\n\n\u003cp\u003eAfter exfiltrating collected data to the C2 gate endpoint, the malware attempts to modify selected desktop cryptocurrency wallet applications. It downloads replacement app.asar archives for Exodus, Atomic Wallet, Ledger Wallet, Ledger Live, and Trezor Suite, kills running processes, overwrites application bundle files, and performs ad-hoc re-signing with codesign. For persistence, it installs either a root LaunchDaemon or user LaunchAgent labeled com.apple.accountsd, which polls the C2 every 60 seconds and executes base64-decoded commands through a temporary /tmp/.c.sh file.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNetskope Threat Labs reported an upgraded macOS ClickFix campaign intercepted on May 31, 2026. The campaign follows earlier April 2026 ClickFix activity that delivered an AppleScript-based infostealer to macOS users through a persistent fake system dialog. In the newer campaign, the payload expands beyond a stealer and includes a persistent remote access trojan.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the campaign came from a Russian-speaking attacker. Netskope telemetry showed the active variant across 25 short-lived lure domains, with victims mainly in Asia, North America, and Oceania. The sectors most represented in the telemetry were technology, media, and business services.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-and-lure-infrastructure\"\u003eDelivery and lure infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe campaign uses ClickFix-style social engineering. Victims are directed to compromised or attacker-controlled websites and instructed to copy and execute a Terminal command manually. Netskope observed three landing page variations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA fake macOS utility page branded as “StellarScan Solutions.”\u003c/li\u003e\n\u003cli\u003eA fake GitHub repository page that mimics a trusted code repository layout.\u003c/li\u003e\n\u003cli\u003eA localized IT support page masquerading as a macOS support and IT services provider based in Berlin.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAll active variants served the same JavaScript file, /links/page-loader.js, across active lure domains. The script fetched the payload command from links/data.txt and populated it into a #cmd DOM element. When the victim clicked #copyBtn, the page used the Web Clipboard API to write the execution string to the user’s clipboard.\u003c/p\u003e\n\n\u003cp\u003eThe JavaScript contained Russian inline comments. The article connects this with the loader’s CIS geofencing behavior and revisits it in relation to attribution.\u003c/p\u003e\n\n\u003ch2 id=\"fileless-execution-chain\"\u003eFileless execution chain\u003c/h2\u003e\n\n\u003cp\u003eThe infection chain is designed to remain fileless until persistence is installed. The clipboard command fetches a zsh script embedded as a gzip-compressed, base64-encoded heredoc and immediately evaluates the content. This keeps the decoded stage 1 loader in memory and avoids writing it to disk.\u003c/p\u003e\n\n\u003cp\u003eThe stage 1 loader performs several steps before destructive behavior:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt checks the macOS keyboard input source list from ~/Library/Preferences/com.apple.HIToolbox.plist.\u003c/li\u003e\n\u003cli\u003eIt searches for a Russian keyboard layout.\u003c/li\u003e\n\u003cli\u003eIf Russian input is enabled, it sends a cis_blocked event to the C2 and exits silently.\u003c/li\u003e\n\u003cli\u003eIt sends a telemetry beacon before fetching the next payload.\u003c/li\u003e\n\u003cli\u003eIt fetches the AppleScript stage with a spoofed Chrome user-agent and pipes it directly into osascript.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe telemetry beacon is sent to hxxps://qwqerrqwr2145qw[.]com/api/debug/event. It includes the victim’s external IP address, locale details, hostname, OS version, CIS status, and the build hash 3447ad192726ee391881be6e86c7eeab.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-payload-meow-debug\"\u003eStage 2 payload: “Meow (DEBUG)”\u003c/h2\u003e\n\n\u003cp\u003eThe second-stage AppleScript payload is internally labeled “Meow (DEBUG).” The article states that it was not seen on VirusTotal at the time of discovery. It executes through osascript entirely in memory.\u003c/p\u003e\n\n\u003cp\u003eThe payload first attempts to obtain the user’s login password through a spoofed macOS system dialog. The dialog impersonates System Preferences, uses the legitimate LockedIcon.icns system icon, and asks the user to enter a password to “update settings.” The password is validated using dscl . authonly with the username and entered password, and the payload retries up to 10 times before giving up.\u003c/p\u003e\n\n\u003cp\u003eIf a valid password is obtained, it is written to the staging directory and used to unlock the login keychain. The payload then extracts Safe Storage keys for Chrome, Brave, and Microsoft Edge, including behavior described as relevant beginning with macOS Tahoe 26.\u003c/p\u003e\n\n\u003ch2 id=\"data-theft-capabilities\"\u003eData theft capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe payload targets a wide range of browsers and data stores. The article lists Chrome, Brave, Edge, Opera, OperaGX, Vivaldi, Orion, Sidekick, Chrome Canary, Chromium, Chrome Dev, Arc, Coccoc, Chrome Beta, Firefox, and Safari.\u003c/p\u003e\n\n\u003cp\u003eFor Chromium profiles, it copies items including Login Data, Cookies, Network/Cookies, Web Data, Local Extension Settings, and IndexedDB. For Firefox, it copies cookies.sqlite, logins.json, key4.db, cert9.db, places.sqlite, and formhistory.sqlite. For Safari, it copies Cookies.binarycookies, Form Values, and History.db.\u003c/p\u003e\n\n\u003cp\u003eThe payload also targets cryptocurrency-related data. It collects data associated with more than 100 Chromium cryptocurrency wallet extension IDs, including MetaMask. It also expands the standalone desktop wallet collection to 25 wallets and copies wallet directories that can contain active wallet files, transaction histories, seed phrases, or private keys left in configuration files.\u003c/p\u003e\n\n\u003cp\u003eAdditional targeted data includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTelegram Desktop tdata directories, including 16-character hexadecimal subdirectories and key_datas.\u003c/li\u003e\n\u003cli\u003eDiscord Local Storage/leveldb directories across discord, discordcanary, discordptb, and discorddevelopment.\u003c/li\u003e\n\u003cli\u003eSteam loginusers.vdf, config.vdf, and ssfn files.\u003c/li\u003e\n\u003cli\u003eFiles from ~/Desktop and ~/Documents to a depth of three directories, including document, credential, key, JSON, RDP, and PNG file types.\u003c/li\u003e\n\u003cli\u003eApple Notes data from NoteStore.sqlite and associated media attachments up to 30MB total.\u003c/li\u003e\n\u003cli\u003eThe full ~/Library/Keychains/ directory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCollected data is staged under /tmp/shub_\u003c7-digit-random\u003e/ and compressed to /tmp/shub_log.zip using ditto. The archive is posted to \u003ca href=\"https://qwqerrqwr2145qw[.]com/gate\" target=\"_blank\"\u003ehttps://qwqerrqwr2145qw[.]com/gate\u003c/a\u003e with an API key and build ID listed in the article.\u003c/p\u003e\n\n\u003ch2 id=\"wallet-application-injection\"\u003eWallet application injection\u003c/h2\u003e\n\n\u003cp\u003eAfter exfiltration, the malware attempts to modify desktop cryptocurrency wallet applications. It targets Exodus, Atomic Wallet, Ledger Wallet, Ledger Live, and Trezor Suite.\u003c/p\u003e\n\n\u003cp\u003eFor each targeted wallet, the injection sequence checks whether the application is installed, downloads a zip archive from the C2 gate, extracts a replacement app.asar file, kills the running application with pkill -9, overwrites the application bundle’s app.asar, and performs ad-hoc re-signing. The endpoints named in the article include /exodus-asar, /atomic-asar, /ledger-asar, /ledgerlive-asar, and /trezor-asar.\u003c/p\u003e\n\n\u003cp\u003eThe re-signing uses codesign -f -d -s to force an ad-hoc signature. The article states that this restores a structurally valid signature so the modified bundle can launch cleanly without triggering native Gatekeeper warnings. Netskope states that it did not have the contents of the injected app.asar files and makes no claims about their specific behavior beyond what the injection code shows.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-remote-access\"\u003ePersistence and remote access\u003c/h2\u003e\n\n\u003cp\u003eThe malware installs persistence after exfiltration. The persistence method depends on whether a valid password was obtained.\u003c/p\u003e\n\n\u003cp\u003eIf a valid password is obtained, the malware writes a LaunchDaemon to /Library/LaunchDaemons/com.apple.accountsd.plist and places a service binary at /Library/Application Support/.com.apple.accountsd/.service. If no valid password is obtained, it falls back to a user-level LaunchAgent at ~/Library/LaunchAgents/com.apple.accountsd.plist.\u003c/p\u003e\n\n\u003cp\u003eIn both cases, the plist label is com.apple.accountsd, matching Apple’s legitimate account synchronization daemon name. The StartInterval is set to 60 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe persistence script posts heartbeats to the C2 endpoint /api/bot/heartbeat. Each beacon includes the host’s IOPlatformUUID as the bot identifier, along with build ID, hostname, IP, and OS version. If the C2 response contains a code field, the payload base64-decodes it, writes it to /tmp/.c.sh, executes it, and deletes it, giving the operator arbitrary command execution on the host.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-and-indicators\"\u003eInfrastructure and indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article lists 24 confirmed lure domains, while also stating that the active variant expanded across 25 short-lived lure domains. All listed domains proxy through Cloudflare. The article states that the lure domains share the same registrar admin contact email, which also ties the two C2 domains qwqerrqwr2145qw[.]com and scope-quest[.]com to the same operator.\u003c/p\u003e\n\n\u003cp\u003eThe domain naming clusters include file* domains and cyberdrift, stellar, and tensorforge naming patterns. The article also identifies meadowfileengine[.]com and pa2373[.]com as outliers, and crystalfilehaven[.]com as a fake-GitHub variant.\u003c/p\u003e\n\n\u003cp\u003eNotable forensic indicators identified in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ecom.apple.accountsd LaunchDaemon or LaunchAgent entries.\u003c/li\u003e\n\u003cli\u003e/Library/Application Support/.com.apple.accountsd/.\u003c/li\u003e\n\u003cli\u003e/tmp/shub_ staging directory patterns.\u003c/li\u003e\n\u003cli\u003e/tmp/.c.sh temporary command execution pattern.\u003c/li\u003e\n\u003cli\u003eLure delivery through /links/page-loader.js and links/data.txt.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"defensive-emphasis-and-response-guidance-in-the-article\"\u003eDefensive emphasis and response guidance in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that detecting the campaign at the delivery layer is the most effective intervention point. It specifically highlights intercepting lure domains and page-loader.js before a user copies the clipboard command.\u003c/p\u003e\n\n\u003cp\u003eFor hosts that may already be compromised, the article identifies the com.apple.accountsd LaunchDaemon or LaunchAgent as a reliable forensic indicator. It also recommends treating any desktop wallet installation on a potentially affected Mac as untrusted and reinstalling it from a verified source.\u003c/p\u003e\n","keyPoints":["Netskope Threat Labs observed a new macOS ClickFix campaign on May 31, 2026 that delivers an upgraded AppleScript-based payload self-labeled “Meow (DEBUG)” with remote access trojan capabilities.","The infection chain is fileless until persistence is established, with victims socially engineered into running a curl command that fetches a gzip-compressed stager and pipes a second-stage AppleScript directly into osascript memory.","The stage 1 loader checks the macOS keyboard layout for Russian input in com.apple.HIToolbox.plist, reports a cis_blocked event to the C2 if Russian input is found, and exits silently.","The payload steals the user’s login password through a fake System Preferences dialog and collects browser credentials, cookies, keychain contents, crypto wallet data, messaging sessions, gaming account data, files, and Apple Notes.","After exfiltration, the malware can overwrite app.asar files in selected desktop cryptocurrency wallets and installs a LaunchDaemon or LaunchAgent labeled com.apple.accountsd that beacons to the C2 every 60 seconds for arbitrary command execution."],"insights":["The campaign’s Russian-language JavaScript comments and its explicit Russian keyboard-layout exclusion make the CIS geofencing especially actionable for attribution and detection triage, since skipped hosts still generate C2 telemetry through a cis_blocked event.","The malware’s wallet-app tampering extends compromise beyond one-time data theft because it replaces Electron app.asar files and ad-hoc re-signs the bundles, so affected wallet applications should be treated as untrusted even after credentials are rotated.","The fake Apple persistence label com.apple.accountsd is a high-value forensic indicator because it impersonates a legitimate Apple account synchronization daemon while using LaunchDaemon or LaunchAgent persistence with a 60-second heartbeat.","The article identifies the delivery layer as the best intervention point because all active lure variants shared the same /links/page-loader.js path and populated clipboard commands from links/data.txt across rotating domains."],"referencedReports":[],"body":"\u003cp\u003eNetskope Threat Labs reported a new macOS ClickFix campaign observed on May 31, 2026, following earlier April 2026 ClickFix activity that delivered an AppleScript-based infostealer. The newer campaign is attributed in the article to a Russian-speaking attacker and upgrades the payload from a simple stealer to a full-featured remote access trojan. Netskope telemetry showed activity across short-lived lure domains, with victims mainly in Asia, North America, and Oceania.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses social engineering to make users copy and run a Terminal command from fake macOS utility, fake GitHub, or localized IT support pages. The infection chain remains fileless until persistence is installed, using a gzip-compressed stager and piping the second-stage AppleScript directly into osascript memory. The stage 1 loader checks for Russian keyboard input and exits if detected, while still reporting telemetry to the command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eThe AppleScript payload, internally labeled “Meow (DEBUG),” steals credentials, browser data, cookies, keychain contents, cryptocurrency wallet data, messaging sessions, gaming account data, files, and Apple Notes. After exfiltration, it can replace app.asar files in selected desktop cryptocurrency wallets and re-sign modified app bundles. It also installs persistence under the deceptive label com.apple.accountsd, beaconing every 60 seconds for command execution.\u003c/p\u003e\n"},{"n":9,"title":"ClickFix Campaign Generated Via AI Delivers SmartRAT","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/clickfix-campaign-generated-ai-delivers-smartrat","time":"17:58","priority":"MUST READ","score":90,"tldr":"Zscaler ThreatLabz found an AI-generated ClickFix phishing site impersonating a Brazilian bank that tricks users into running PowerShell and installs SmartRAT, a banking RAT with remote control, keylogging, fake bank overlays, QR-code interception, and persistence. The campaign shows how AI-built lures can rapidly enable convincing malware delivery at scale.","briefOverview":"\u003cp\u003eZscaler ThreatLabz observed a March 2026 ClickFix campaign using a likely AI-generated website to impersonate a Brazilian bank. The typosquatting domain cartaobb[.]com mimicked the bank’s official domain and advertised a credit card application. The page used a fake Cloudflare CAPTCHA followed by a fullscreen fake BSOD recovery screen to pressure victims into executing a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThe command downloaded a staged PowerShell payload from 64[.]95[.]13[.]238 and ultimately executed a PowerShell-based RAT that ThreatLabz named SmartRAT. SmartRAT is focused on banking fraud and remote access, with capabilities including encrypted C2 communications, screen and input control, keylogging, fake bank-branded overlays, QR code interception, and persistence through scheduled tasks and a Windows service. Trend Micro had previously written about the same malware family under the name Banana RAT, but with a different attack path.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT monitors banking, payment, and cryptocurrency-related activity by checking foreground window titles for targeted keywords. It can alert operators when victims interact with financial services and then display bank-branded forms or overlays to capture data. ThreatLabz also found that the SmartRAT web-based C2 panel had a client-side authentication weakness that allowed the login screen to be bypassed by setting localStorage values.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz reported multiple instances of typosquatting domains hosting malicious content generated with AI-powered website creation tools in March 2026. One investigated campaign impersonated a Brazilian bank using the domain cartaobb[.]com, which resembled the bank’s official domain cartaobrb[.]com[.]br. The fraudulent page promoted a credit card application and used a fake Cloudflare CAPTCHA as part of a ClickFix infection chain.\u003c/p\u003e\n\n\u003cp\u003eAfter a victim clicked the fake CAPTCHA, the page copied a PowerShell command to the clipboard, forced the browser into fullscreen mode, and displayed a fake Blue Screen of Death system recovery screen. The page also included anti-inspection and lockdown measures, such as blocking DevTools shortcuts, clearing the console, restricting keyboard input, refocusing the window, and repeatedly enforcing fullscreen mode. The copied PowerShell command downloaded st.txt from 64[.]95[.]13[.]238, which then retrieved payload.php and executed an encrypted PowerShell RAT payload.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz named the malware SmartRAT, while noting that Trend Micro had previously written about the same malware family as Banana RAT using a different attack path. SmartRAT is implemented entirely in PowerShell and contains the embedded string SMART_V25. Its capabilities include encrypted command-and-control communication, remote screen and input control, arbitrary PowerShell execution, keylogging, fake bank-branded overlays, QR code interception, file browsing and exfiltration, process and service listing, and persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT decrypts two C2 configurations: c[.]windowsupdate-cdn[.]com and the fallback IP address 162[.]141[.]111[.]227, communicating over TCP port 51888. It creates identity and install tokens, uses a hardcoded master key for HMAC and AES key derivation, and encrypts C2 command traffic using AES-CBC. For persistence, it copies itself to a Microsoft Diagnosis ETW path, creates a scheduled task named MicrosoftEdgeUpdateCore, falls back to an HKCU Run key if needed, and attempts to install a Windows service with the same name if UAC elevation is approved.\u003c/p\u003e\n\n\u003cp\u003eThe malware tracks financial activity by monitoring foreground window titles for keywords tied to Brazilian banks, payment platforms, credit unions, cryptocurrency exchanges, and generic banking terms. When a match occurs, SmartRAT sends a BrowserAlert to the C2 so an operator can issue commands such as displaying a bank-branded data entry form or overlay. ThreatLabz also found that the web-based C2 panel’s login relied only on client-side localStorage values, allowing the login screen to be bypassed by setting arbitrary authToken and currentUser entries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz analyzed a March 2026 ClickFix campaign that used a likely AI-generated typosquatting website to impersonate a Brazilian bank and deliver a PowerShell-based RAT named SmartRAT. The fraudulent site used the domain cartaobb[.]com, which impersonated the bank’s official domain cartaobrb[.]com[.]br. The page advertised a credit card application and presented a fake Cloudflare CAPTCHA, mimicking a legitimate security check.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz stated that it observed multiple instances of typosquatting domains hosting malicious content generated with AI-powered website creation tools. The article emphasizes that threat actors are using website builders to create convincing lures quickly and at scale. In this campaign, the lure progressed from a fake CAPTCHA to a fullscreen fake BSOD and system recovery prompt designed to pressure victims into running a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz noted that Trend Micro had previously written about the same malware family under the name Banana RAT, but with a different attack path.\u003c/p\u003e\n\n\u003ch2 id=\"ai-generated-lure-and-anti-inspection-behavior\"\u003eAI-generated lure and anti-inspection behavior\u003c/h2\u003e\n\n\u003cp\u003eThe fraudulent bank page contained source-code comments that ThreatLabz assessed as likely generated by an AI tool. The comments included generic section headers with a templated structure that is commonly seen in AI-generated webpages where sections are labeled for later developer integration.\u003c/p\u003e\n\n\u003cp\u003eThe page also contained anti-inspection measures. Its script intercepted keyboard shortcuts for DevTools, Console, Inspector, and page source viewing by using capture-phase keydown handlers and calling preventDefault() and stopPropagation(). Every three seconds, the script logged a crafted Image object whose getter triggered console.clear(), repeatedly wiping the console while DevTools was open.\u003c/p\u003e\n\n\u003ch2 id=\"clickfix-infection-flow\"\u003eClickFix infection flow\u003c/h2\u003e\n\n\u003cp\u003eAfter the victim clicked the fake CAPTCHA, the page copied a malicious PowerShell command to the clipboard, placed the browser into fullscreen mode, and displayed a fake BSOD system recovery page. A lockdown routine attempted to keep the victim trapped in the tab or window, restrict keyboard input, and enforce fullscreen mode.\u003c/p\u003e\n\n\u003cp\u003eThe lockdown routine first attempted to use navigator.keyboard.lock(). It then registered a capture-phase keydown handler that blocked most keystrokes while temporarily allowing the keystrokes needed for the ClickFix flow, including Win+R, Ctrl+V, and Enter. It also listened for window.blur and repeatedly called window.focus() to regain focus if the victim switched away.\u003c/p\u003e\n\n\u003cp\u003eTo enforce fullscreen, the script checked fullscreen state every 50 milliseconds and called requestFullscreen, with fallbacks to webkitRequestFullscreen and mozRequestFullScreen. The PowerShell command copied to the clipboard included a random number of trailing spaces, which ThreatLabz noted was likely intended to bloat the payload and/or evade detection because a single added space changes the hash value.\u003c/p\u003e\n\n\u003ch2 id=\"payload-delivery-chain\"\u003ePayload delivery chain\u003c/h2\u003e\n\n\u003cp\u003eThe copied PowerShell command downloaded and executed the next stage from 64[.]95[.]13[.]238:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt retrieved st.txt from the hardcoded IP address.\u003c/li\u003e\n\u003cli\u003est.txt functioned as a stealth PowerShell dropper.\u003c/li\u003e\n\u003cli\u003eThe dropper used Windows API calls to hide its console window.\u003c/li\u003e\n\u003cli\u003eIt downloaded payload.php from the same IP address.\u003c/li\u003e\n\u003cli\u003eIt saved the downloaded content as C:\\Users\\Public\\Documents\\msedge.txt.\u003c/li\u003e\n\u003cli\u003eIt immediately executed the saved script as a script block.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe payload.php file contained another PowerShell script. This script suppressed errors, decoded hardcoded Base64 strings to obtain an AES key and IV, decrypted an AES-CBC encrypted blob, and executed it with ScriptBlock::Create(). The decrypted blob was the PowerShell RAT that ThreatLabz named SmartRAT.\u003c/p\u003e\n\n\u003ch2 id=\"smartrat-purpose-and-configuration\"\u003eSmartRAT purpose and configuration\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT is a Brazil-focused banking RAT implemented entirely in PowerShell and identified by the embedded string SMART_V25. Its stated objective is remote access and financial data theft using features such as fake bank-branded password forms, keylogging, and QR code interception.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT decrypts two C2 configurations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe primary C2 domain is c[.]windowsupdate-cdn[.]com, decrypted using XOR with the key 2.\u003c/li\u003e\n\u003cli\u003eThe fallback C2 is 162[.]141[.]111[.]227, decrypted using XOR with the key 233.\u003c/li\u003e\n\u003cli\u003eThe malware communicates on port 51888.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT hides its PowerShell window using user32.dll’s ShowWindow function. It writes debug logs to C:\\ProgramData or %APPDATA%\\Microsoft\\Diagnosis\\ETW\\client_debug.log, with a fallback to %TEMP%\\client\u003cem\u003edebug.log. It also creates a per-process log at C:\\ProgramData\\Microsoft\\Diagnosis\\ETW\\process\u003c/em\u003e\u003cPID\u003e.log to record RAT activity.\u003c/p\u003e\n\n\u003ch2 id=\"identity-encryption-and-c2-security-model\"\u003eIdentity, encryption, and C2 security model\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT generates a unique identity token by hashing the machine GUID, MAC address, UTC ticks, a newly generated GUID, and the computer name with SHA-256. It stores the token in etw.dat and install.token.\u003c/p\u003e\n\n\u003cp\u003eIt then computes an HMAC-SHA256 of the token using the hardcoded master key iuhbdaubdvauygd5562\u003cspan class=\"math inline\"\u003e\\(3@##\\)\u003c/span\u003er. The same hardcoded master key is used in two ways: the raw UTF-8 bytes of the plaintext key are used as the HMAC secret, while the SHA-256 hash of the string is used to derive the 32-byte AES encryption key.\u003c/p\u003e\n\n\u003cp\u003eC2 command traffic is encrypted and decrypted with AES-CBC. The encryption function generates a fresh IV for each message using GenerateIV(), hex-encodes the IV and ciphertext separately, and returns them as a colon-delimited string. The decryption function splits the colon-delimited value, hex-decodes the IV and ciphertext, and decrypts the command with the same AES key.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-privilege-strategy\"\u003ePersistence and privilege strategy\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT checks whether it is running as LocalSystem by comparing the current Windows identity SID to S-1-5-18, or whether it was launched with the -ServiceMode flag. If either condition is true, it connects to the C2 immediately. Otherwise, it performs persistence and elevation steps.\u003c/p\u003e\n\n\u003cp\u003eThe malware copies itself to %APPDATA%\\Microsoft\\Diagnosis\\ETW\\msedgeupdate.txt. It attempts to create a logon-triggered scheduled task named MicrosoftEdgeUpdateCore. If scheduled task creation fails, it writes a MicrosoftEdgeUpdateCore value under HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run to re-execute the malware at user logon.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT then prompts for UAC elevation. If elevation is approved, it compiles inline C# service code using csc.exe and installs a Windows service named MicrosoftEdgeUpdateCore under %ProgramData%\\Microsoft\\Diagnosis\\ETW\\. The service is configured to run with System privileges, and a watchdog checks every five seconds to ensure the SmartRAT PowerShell process continues running.\u003c/p\u003e\n\n\u003cp\u003eIf UAC elevation is denied, SmartRAT does not create the Windows service. Instead, it launches a hidden PowerShell process that bypasses the UAC logic and beacons to the C2, while the scheduled task can prompt for UAC elevation again at the next logon.\u003c/p\u003e\n\n\u003cp\u003eThe malware also compiles a C# component that uses DuplicateTokenEx and CreateProcessAsUser to spawn a new PowerShell process in the current user’s session, even when the RAT is running as SYSTEM.\u003c/p\u003e\n\n\u003ch2 id=\"supported-command-line-parameters\"\u003eSupported command-line parameters\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT supports command-line parameters for installation, service control, cleanup, and execution mode. The article lists the following parameters:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e-InstallService installs and starts the MicrosoftEdgeUpdateCore Windows service.\u003c/li\u003e\n\u003cli\u003e-UninstallService stops and deletes the Windows service and its executable.\u003c/li\u003e\n\u003cli\u003e-Uninstall removes persistence, including scheduled tasks, registry keys, and files.\u003c/li\u003e\n\u003cli\u003e-Reinstall uninstalls and then reinstalls SmartRAT.\u003c/li\u003e\n\u003cli\u003e-ServiceMode runs SmartRAT as a service and verifies internet connectivity by resolving google.com before execution.\u003c/li\u003e\n\u003cli\u003e-ServiceStatus displays the current status of the service and scheduled tasks.\u003c/li\u003e\n\u003cli\u003e-ScriptPath \u003cpath\u003e defines the source file location for installation.\u003c/li\u003e\n\u003cli\u003e-Force kills other PowerShell instances except itself and deletes lock PID files.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT outputs the string SMART_V25 with the current timestamp as confirmation that it executed successfully.\u003c/p\u003e\n\n\u003ch2 id=\"embedded-c-components-and-victim-interaction\"\u003eEmbedded C# components and victim interaction\u003c/h2\u003e\n\n\u003cp\u003eBefore connecting to the C2, SmartRAT compiles and loads several embedded C# classes into memory:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNativeInput handles mouse and keyboard input, including freezing victim input.\u003c/li\u003e\n\u003cli\u003eWinEUpjgHelper captures the screen using BitBlt, although the article states this class is compiled but not invoked at runtime.\u003c/li\u003e\n\u003cli\u003eWindowMonitor retrieves the foreground window title and process name.\u003c/li\u003e\n\u003cli\u003eInputTracker acts as a high-priority keylogger.\u003c/li\u003e\n\u003cli\u003eIdleDetector tracks user inactivity with GetLastInputInfo.\u003c/li\u003e\n\u003cli\u003eQRDetector detects QR codes using pixel pattern analysis.\u003c/li\u003e\n\u003cli\u003eDisplayOverlay renders fullscreen fake overlays such as Windows Update, BSOD, and bank-branded security screens.\u003c/li\u003e\n\u003cli\u003eQROverlay displays fake overlays with bank branding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT enumerates connected monitors to map screen coordinates and resolutions. It calls SetProcessDpiAwareness from shcore.dll to bypass DPI scaling and obtain true physical pixel values. The malware stores monitor results in a global array so the operator can select a monitor index and align overlays and screen captures accurately.\u003c/p\u003e\n\n\u003ch2 id=\"financial-activity-monitoring\"\u003eFinancial activity monitoring\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT monitors window titles for keywords associated with banks, payment platforms, credit unions, cryptocurrency exchanges, and generic banking terms. The monitored terms include Santander, Bradesco, Itau, Caixa, bb.com.br, bancodobrasil, Nubank, Inter, C6 Bank, Safra, BTG, Sicoob, Sicredi, Mercado Pago, PicPay, PagSeguro, PayPal, Binance, Mercado Bitcoin, bank, and banco.\u003c/p\u003e\n\n\u003cp\u003eWhen a foreground window title matches the watchlist, SmartRAT logs the title, keyword, process name, and timestamp. It sends the information to the C2 as a BrowserAlert message with type 0x80. The article states that this alerts the operator that the victim is interacting with a financial application.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving this alert, the operator can issue a dataEntry command containing bank-specific branding parameters, including name, color palette, prompt text, and input length. SmartRAT can then launch a fullscreen overlay such as a bank verification prompt, and the captured information is exfiltrated to the C2.\u003c/p\u003e\n\n\u003ch2 id=\"c2-communication-and-message-handling\"\u003eC2 communication and message handling\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT attempts to connect to its C2 server indefinitely. If domain resolution fails, it falls back to the hardcoded IP address. Once connected, it communicates over a raw TCP socket on port 51888 using a binary-framed message format.\u003c/p\u003e\n\n\u003cp\u003eDuring connection and setup, SmartRAT sends or handles these message types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClientHello, type 0x01, sends version string 7.3 to the server.\u003c/li\u003e\n\u003cli\u003eGuestInfo, type 0xE6, sends victim profile JSON including OS, username, host, privilege, session ID, install token, and HMAC.\u003c/li\u003e\n\u003cli\u003eSession negotiation uses message types 0x06, 0xE0, and 0xE1.\u003c/li\u003e\n\u003cli\u003eMonitor List, type 0x14, sends monitor layout information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter connecting, SmartRAT enters a continuous loop. It pauses screen capture after more than 20 minutes of inactivity and resumes when activity returns. It also processes up to 20 C2 packets per main loop iteration.\u003c/p\u003e\n\n\u003ch2 id=\"smartrat-c2-commands-and-capabilities\"\u003eSmartRAT C2 commands and capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article lists a wide range of commands supported by SmartRAT, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePing and pong handling.\u003c/li\u003e\n\u003cli\u003eMouse movement, mouse button actions, mouse wheel scrolling, and keyboard injection.\u003c/li\u003e\n\u003cli\u003eArbitrary PowerShell execution through Invoke-Expression.\u003c/li\u003e\n\u003cli\u003eBuilt-in system commands for overlays, input blocking, crop areas, data entry, lock-screen interaction, logoff, restart, shutdown, client restart, and uninstall.\u003c/li\u003e\n\u003cli\u003eClipboard writing.\u003c/li\u003e\n\u003cli\u003eFile browsing and file exfiltration up to 50 MB.\u003c/li\u003e\n\u003cli\u003eImmediate screenshots and screen-stream quality changes.\u003c/li\u003e\n\u003cli\u003eMonitor switching.\u003c/li\u003e\n\u003cli\u003eFake Windows Security chat popups.\u003c/li\u003e\n\u003cli\u003eQR auto-detection toggling and QR overlay display or hiding.\u003c/li\u003e\n\u003cli\u003eKeylogger start and stop.\u003c/li\u003e\n\u003cli\u003eProcess list and service list retrieval.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT also supports automatic screen streaming, with the default interval set to 12 milliseconds. It can continuously upload victim keystrokes to the C2.\u003c/p\u003e\n\n\u003ch2 id=\"qr-code-interception-workflow\"\u003eQR code interception workflow\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT includes QR auto-detection functionality. When enabled by the C2 with the AutoQRToggle command, the client scans all connected monitors every three seconds using a heuristic pixel-contrast and clustering algorithm to locate QR-code-shaped regions.\u003c/p\u003e\n\n\u003cp\u003eWhen it detects a QR region, it captures the full monitor as a JPEG, computes the QR bounding box, and sends the screenshot, region coordinates, monitor offset, and a deduplication hash to the C2 using the QRCodeDetected packet. The article states that in QR-swap workflows, the C2 performs the QR decoding server-side.\u003c/p\u003e\n\n\u003cp\u003eThe C2 can then respond with a ShowQROverlay command containing an attacker-supplied QR image. The client renders the QR image as a borderless TopMost window at the exact pixel coordinates of the original QR, effectively replacing the legitimate banking QR with the threat actor’s QR. The overlay remains until removed by the HideQROverlay command, and failed-decode regions are blacklisted for 30 to 60 seconds to avoid repeated transmissions.\u003c/p\u003e\n\n\u003ch2 id=\"c2-panel-weakness\"\u003eC2 panel weakness\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT is managed from a web-based C2 panel. ThreatLabz observed verbose explanatory comments and frequent emoticons in the panel’s page source, which the article says suggests the use of AI tools during development.\u003c/p\u003e\n\n\u003cp\u003eThe panel had a critical authentication weakness. Its authentication logic relied only on the presence of two browser localStorage values, authToken and currentUser, to hide the login overlay. The article states that there was no server-side validation of these values before access to the panel UI was granted.\u003c/p\u003e\n\n\u003cp\u003eBecause this check was entirely client-side, a user could bypass the login screen by setting arbitrary values for authToken and currentUser in the browser’s localStorage. ThreatLabz showed the panel administration page with the sidebar populated with threat actor-controlled values.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-detection-coverage\"\u003eIndicators and detection coverage\u003c/h2\u003e\n\n\u003cp\u003eZscaler stated that its Cloud Sandbox detected SmartRAT and that its multilayered cloud security platform identifies indicators related to the campaign under these threat names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePS.RAT.SmartRAT\u003c/li\u003e\n\u003cli\u003eHTML.Phish.Typosquat.RC.M.TS\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article listed the following indicators of compromise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ecrefisa[.]online, fraudulent domain.\u003c/li\u003e\n\u003cli\u003evfsgloball[.]net, fraudulent domain.\u003c/li\u003e\n\u003cli\u003ecartaobb.com, fraudulent domain.\u003c/li\u003e\n\u003cli\u003ewindowsupdate-cdn[.]com, C2 domain.\u003c/li\u003e\n\u003cli\u003e297eb45f028d44d750297d2f932b9c91, st.txt.\u003c/li\u003e\n\u003cli\u003e6bf4d4c62b5138ace281ce3d08297787, payload.php.\u003c/li\u003e\n\u003cli\u003e3c72e1f37f115b00c3ad6ed31bacfe8a, PowerShell RAT.\u003c/li\u003e\n\u003cli\u003eb17ccdb5531555e43f082d6e77c07227, PowerShell RAT.\u003c/li\u003e\n\u003cli\u003e64[.]95[.]13[.]238, C2 IP.\u003c/li\u003e\n\u003cli\u003e162[.]141[.]111[.]227, C2 IP.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article mapped the campaign to several MITRE ATT\u0026amp;CK tactics and techniques, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInitial Access: T1566 Phishing.\u003c/li\u003e\n\u003cli\u003eExecution: T1059 Command and Scripting Interpreter, T1059.001 PowerShell, and T1569.002 Service Execution.\u003c/li\u003e\n\u003cli\u003ePersistence: T1543.003 Create or Modify System Process: Windows Service.\u003c/li\u003e\n\u003cli\u003ePrivilege Escalation: T1543.003 Create or Modify System Process: Windows Service.\u003c/li\u003e\n\u003cli\u003eDefense Evasion: T1036 Masquerading and T1070.004 Indicator Removal: File Deletion.\u003c/li\u003e\n\u003cli\u003eDiscovery: T1082 System Information Discovery.\u003c/li\u003e\n\u003cli\u003eCommand and Control: T1071 Application Layer Protocol.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that AI-powered website builders are enabling cybercriminals to generate fraudulent pages quickly, with high-fidelity visuals and at scale. In this case, threat actors used a website builder to create a fake page impersonating a Brazilian bank and used the ClickFix technique to deploy SmartRAT. Once installed, SmartRAT enabled remote access and data theft through capabilities tailored to banking activity, including overlays, keylogging, QR interception, and encrypted C2 communication.\u003c/p\u003e\n","keyPoints":["Zscaler ThreatLabz observed a March 2026 ClickFix campaign using an AI-generated typosquatting website impersonating a Brazilian bank to deliver the PowerShell-based SmartRAT malware.","The fake website displayed a fraudulent Cloudflare CAPTCHA and then a fullscreen fake BSOD recovery prompt to pressure victims into running a PowerShell command that downloaded and executed the malware.","SmartRAT supports encrypted command-and-control communications, remote screen and input control, credential theft through keylogging and fake bank-branded overlays, QR code interception, and persistence through scheduled tasks and a Windows service.","SmartRAT monitors window titles for Brazilian banking, payment, and cryptocurrency-related activity and can alert the operator when a victim interacts with targeted financial services.","ThreatLabz found that the SmartRAT web-based C2 panel had a client-side authentication weakness that allowed the login screen to be bypassed by setting arbitrary localStorage values."],"insights":["The lure’s JavaScript deliberately allows only the keystrokes needed for the ClickFix flow, such as Win+R, Ctrl+V, and Enter, while blocking most other input and repeatedly forcing fullscreen mode.","SmartRAT uses random trailing spaces in the copied PowerShell command, so even minor whitespace changes can alter hashes and potentially complicate hash-based detection.","SmartRAT’s C2 panel authentication depended only on browser localStorage values, meaning the administrative interface could be exposed by setting arbitrary authToken and currentUser values client-side.","SmartRAT can detect QR-code-shaped regions on banking pages and replace them with attacker-supplied QR overlays at the same screen coordinates, enabling QR-swap fraud workflows.","If UAC elevation is denied, SmartRAT still launches a hidden PowerShell process to beacon to the C2 and relies on the scheduled task to prompt for elevation again at the next logon."],"referencedReports":[],"body":"\u003cp\u003eZscaler ThreatLabz observed a March 2026 ClickFix campaign using a likely AI-generated website to impersonate a Brazilian bank. The typosquatting domain cartaobb[.]com mimicked the bank’s official domain and advertised a credit card application. The page used a fake Cloudflare CAPTCHA followed by a fullscreen fake BSOD recovery screen to pressure victims into executing a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThe command downloaded a staged PowerShell payload from 64[.]95[.]13[.]238 and ultimately executed a PowerShell-based RAT that ThreatLabz named SmartRAT. SmartRAT is focused on banking fraud and remote access, with capabilities including encrypted C2 communications, screen and input control, keylogging, fake bank-branded overlays, QR code interception, and persistence through scheduled tasks and a Windows service. Trend Micro had previously written about the same malware family under the name Banana RAT, but with a different attack path.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT monitors banking, payment, and cryptocurrency-related activity by checking foreground window titles for targeted keywords. It can alert operators when victims interact with financial services and then display bank-branded forms or overlays to capture data. ThreatLabz also found that the SmartRAT web-based C2 panel had a client-side authentication weakness that allowed the login screen to be bypassed by setting localStorage values.\u003c/p\u003e\n"},{"n":4,"title":"Hostile states behind three-quarters of attacks on Britain's critical infrastructure, cyber chief warns","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/britain-nation-state-cyberattacks-richard-horne-rusi","time":"17:55","priority":"SHOULD READ","score":85,"tldr":"The UK’s cyber chief warned that hostile states are behind about three-quarters of cyber incidents affecting Britain’s critical infrastructure, with adversaries already prepositioning for potential future conflict. He urged organizations to treat cybersecurity as an ongoing contest against capable opponents, not just a risk-management exercise.","briefOverview":"\u003cp\u003eRichard Horne, chief executive of the UK’s National Cyber Security Centre, warned that hostile states are responsible for about three-quarters of attacks affecting Britain’s critical national infrastructure. He said the NCSC handled more than 200 incidents affecting critical infrastructure and its supporting ecosystem in the year to May. The warning builds on his earlier disclosure that the agency was handling four nationally significant cyber incidents a week.\u003c/p\u003e\n\n\u003cp\u003eHorne said adversaries are establishing footholds in technology underpinning critical infrastructure so they can enable rapid exploitation and cause mass disruption during a conflict. He cited Volt Typhoon, a Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of this tactic. He also warned that intelligence gathered today could shape kinetic targeting in future conflicts.\u003c/p\u003e\n\n\u003cp\u003eThe speech marked a shift in tone from treating cybersecurity as a manageable risk to describing it as a continuous contest. Horne said organizations should compare their defenses against adversaries rather than industry peers and that cybersecurity investment will never be finished. The remarks came as the UK advances the Cyber Security and Resilience Bill and prepares a new National Cyber Action Plan expected in early July.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe UK’s cyber chief, Richard Horne, warned that Britain is already experiencing the opening exchanges of future conflicts in cyberspace. Speaking at the Royal United Services Institute, he said the National Cyber Security Centre handled more than 200 incidents affecting critical national infrastructure and its supporting ecosystem in the year to May. About 75% of those incidents were believed to be the work of state actors.\u003c/p\u003e\n\n\u003cp\u003eHorne said the NCSC is regularly finding and stopping breaches before their intent becomes clear. He warned that adversaries are prepositioning throughout British critical infrastructure by establishing footholds in the technology that underpins it. According to Horne, such footholds could enable rapid exploitation and mass disruption in a time of conflict.\u003c/p\u003e\n\n\u003cp\u003eThe speech referred to Volt Typhoon, the Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of this prepositioning tactic. The article notes that this reference is significant because British intelligence has generally been more guarded than Washington about publicly naming such intrusions. Horne also said kinetic targeting in any future conflict would be based on intelligence gathered today.\u003c/p\u003e\n\n\u003cp\u003eHorne’s remarks shifted away from the NCSC’s long-standing vocabulary of cybersecurity as risk management. He argued that cybersecurity should instead be understood as a contest, saying that the only meaningful benchmark is how an organization’s capability and performance compare with its opponent. He also said executives asking when cybersecurity investment will be complete should understand that the answer is never.\u003c/p\u003e\n\n\u003cp\u003eThe speech aligns with broader Western government language describing cyberspace as a permanently contested environment, including NATO’s 2022 strategic concept and statements from U.S. Cyber Command officials. Horne repeated his call for a “full court press” across near, mid and far spaces of cyberspace. He also said artificial intelligence would sharpen the threat, citing a new NCSC assessment that it is highly likely AI tools will be used by 2028 to exploit known weaknesses in ageing technology across critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe warning comes as the UK government moves to complete passage of the Cyber Security and Resilience Bill, which would use regulation to compel improvements at operators of essential services. The government is also planning a new National Cyber Action Plan, which Recorded Future News understands is currently set to be published in early July. Horne concluded that there are no spectators in the contest and that all parties must embrace the urgency of the challenge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRichard Horne, chief executive of the UK’s National Cyber Security Centre, warned that hostile states are behind about three-quarters of cyber incidents affecting Britain’s critical national infrastructure. He said the NCSC handled more than 200 incidents affecting critical infrastructure and its supporting ecosystem in the year to May, and that approximately 75% were believed to be the work of state actors.\u003c/p\u003e\n\n\u003cp\u003eHorne delivered the remarks during the annual security lecture at the Royal United Services Institute. The article says the disclosure builds on his earlier statement that the NCSC was handling four nationally significant cyber incidents per week, with the majority traced to what are believed to be hostile governments rather than criminal hackers.\u003c/p\u003e\n\n\u003ch2 id=\"core-warning\"\u003eCore warning\u003c/h2\u003e\n\n\u003cp\u003eHorne said the UK is not merely preparing for future conflict in cyberspace, but is already fighting some of its opening exchanges. He stated that the NCSC is “regularly finding and stopping breaches, before their intent becomes clear.”\u003c/p\u003e\n\n\u003cp\u003eHe warned that adversaries are prepositioning throughout British critical infrastructure. He described this as establishing footholds within technology that underpins critical national infrastructure, which could allow rapid exploitation and mass disruption during a conflict.\u003c/p\u003e\n\n\u003cp\u003eHorne also said that “kinetic targeting in any conflict tomorrow will be based on intelligence gathered today.” This framed current intrusions not only as immediate cybersecurity incidents, but as activity that may support future physical or military targeting.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actors-and-referenced-campaigns\"\u003eThreat actors and referenced campaigns\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies hostile states as responsible for the majority of the incidents Horne discussed, but it does not provide detailed attribution for the UK incidents. Horne cited Volt Typhoon, a Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of the prepositioning tactic he described.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the reference to Volt Typhoon is significant because British intelligence has generally been more guarded than Washington about naming such intrusions. It says one reason for this caution is that public acknowledgment could inadvertently assist the perpetrators.\u003c/p\u003e\n\n\u003ch2 id=\"critical-infrastructure-impact\"\u003eCritical infrastructure impact\u003c/h2\u003e\n\n\u003cp\u003eThe incidents described affected Britain’s critical national infrastructure and its supporting ecosystem. The article does not detail the specific breaches, affected sectors, or operational consequences. It emphasizes the strategic concern that access to infrastructure technology could be used to cause mass disruption during a conflict.\u003c/p\u003e\n\n\u003cp\u003eThe NCSC’s role, as described in the article, included finding and stopping breaches before their intent became clear. Horne’s comments suggest concern over intrusions whose objectives may not be immediately visible at the time they are detected.\u003c/p\u003e\n\n\u003ch2 id=\"shift-in-cybersecurity-framing\"\u003eShift in cybersecurity framing\u003c/h2\u003e\n\n\u003cp\u003eA major theme of the speech was a change in how cybersecurity should be discussed and managed. Horne argued that it should no longer be treated as a “risk” to be managed and tolerated, but as a “contest” to be fought.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts this with the NCSC’s previous language, noting that risk management has long been central to British cyber advice. It points to the NCSC’s Cyber Assessment Framework, which opens with an objective titled “managing security risk,” and to existing NCSC guidance on risk assessment, risk quantification and risk appetite.\u003c/p\u003e\n\n\u003cp\u003eHorne said that when executives ask when they will be done investing in cybersecurity, the answer is “never.” He also said that benchmarking defenses against industry rivals is inadequate, arguing that the only benchmark that matters is how an organization’s capability and performance compare to that of its opponent.\u003c/p\u003e\n\n\u003ch2 id=\"alignment-with-allied-cyber-doctrine\"\u003eAlignment with allied cyber doctrine\u003c/h2\u003e\n\n\u003cp\u003eThe article says Horne’s shift in tone places the NCSC’s vocabulary in line with broader Western government descriptions of cyberspace. NATO’s 2022 strategic concept declared that cyberspace is “contested at all times,” and allied officials have since echoed the view that cyberspace is a permanently contested environment.\u003c/p\u003e\n\n\u003cp\u003eSenior figures at U.S. Cyber Command have made similar arguments, warning that a steady pattern of attacks below the threshold of war is still producing “strategically consequential effects” on Western states. Horne’s speech is presented as part of this broader shift in how cyber threats are framed by Western governments.\u003c/p\u003e\n\n\u003ch2 id=\"artificial-intelligence-and-future-risk\"\u003eArtificial intelligence and future risk\u003c/h2\u003e\n\n\u003cp\u003eHorne said artificial intelligence would sharpen the cyber threat. According to the article, a new NCSC assessment judged it “highly likely” that by 2028 AI tools would be used to exploit known weaknesses in ageing technology across critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article says this concern is one the NCSC has stressed in recent months. It frames AI-enabled exploitation of known weaknesses in legacy technology as a particular issue for critical infrastructure operators.\u003c/p\u003e\n\n\u003ch2 id=\"government-response-and-policy-context\"\u003eGovernment response and policy context\u003c/h2\u003e\n\n\u003cp\u003eThe speech came as the UK government is moving to complete passage of the Cyber Security and Resilience Bill through Parliament. The bill would use regulation to compel improvements at operators of essential services.\u003c/p\u003e\n\n\u003cp\u003eThe government also plans to introduce a new National Cyber Action Plan. Recorded Future News understands the plan is currently set to be published in early July.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe NCSC handled more than 200 incidents affecting UK critical infrastructure and its supporting ecosystem in the year to May.\u003c/li\u003e\n\u003cli\u003eAround three-quarters of
