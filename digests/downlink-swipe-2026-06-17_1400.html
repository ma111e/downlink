those incidents were believed to involve state actors.\u003c/li\u003e\n\u003cli\u003eHorne warned that adversaries are prepositioning within technology underpinning critical national infrastructure.\u003c/li\u003e\n\u003cli\u003eVolt Typhoon was cited as the clearest example of this tactic.\u003c/li\u003e\n\u003cli\u003eHorne urged organizations to treat cybersecurity as an ongoing contest against opponents, not simply as a risk management problem.\u003c/li\u003e\n\u003cli\u003eThe NCSC assessed it as highly likely that AI tools will be used by 2028 to exploit known weaknesses in ageing critical infrastructure technology.\u003c/li\u003e\n\u003cli\u003eThe UK is pursuing the Cyber Security and Resilience Bill and preparing a new National Cyber Action Plan.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Richard Horne, chief executive of the National Cyber Security Centre, said the agency handled more than 200 incidents affecting UK critical infrastructure and its supporting ecosystem in the year to May, with about 75% believed to be caused by state actors.","Horne warned that adversaries are prepositioning within technology underpinning British critical national infrastructure to enable rapid exploitation and mass disruption during a conflict.","Horne cited Volt Typhoon, a Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of this prepositioning tactic.","Horne argued that cybersecurity should be treated as a contest to be fought rather than a risk to be managed, saying the relevant benchmark is capability against an opponent rather than industry peers.","The speech came as the UK government moves to pass the Cyber Security and Resilience Bill and plans to introduce a new National Cyber Action Plan expected in early July."],"insights":["The NCSC’s public framing is shifting from corporate risk-management language toward a military-style model of continuous contest, aligning UK cyber messaging with NATO and U.S. Cyber Command language about cyberspace being permanently contested.","Horne’s reference to Volt Typhoon is significant because the article notes British intelligence has traditionally been more guarded than Washington about publicly naming infrastructure intrusions.","The warning implies that some current intrusions may be intelligence-gathering or prepositioning operations whose disruptive purpose may only become clear during a future conflict.","Horne explicitly challenged common corporate benchmarking practices, saying organizations should measure their defenses against adversary capability rather than against industry peers.","The NCSC expects AI to make exploitation of known weaknesses in ageing critical-infrastructure technology highly likely by 2028, making legacy-system remediation an increasingly urgent priority."],"referencedReports":[],"body":"\u003cp\u003eRichard Horne, chief executive of the UK’s National Cyber Security Centre, warned that hostile states are responsible for about three-quarters of attacks affecting Britain’s critical national infrastructure. He said the NCSC handled more than 200 incidents affecting critical infrastructure and its supporting ecosystem in the year to May. The warning builds on his earlier disclosure that the agency was handling four nationally significant cyber incidents a week.\u003c/p\u003e\n\n\u003cp\u003eHorne said adversaries are establishing footholds in technology underpinning critical infrastructure so they can enable rapid exploitation and cause mass disruption during a conflict. He cited Volt Typhoon, a Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of this tactic. He also warned that intelligence gathered today could shape kinetic targeting in future conflicts.\u003c/p\u003e\n\n\u003cp\u003eThe speech marked a shift in tone from treating cybersecurity as a manageable risk to describing it as a continuous contest. Horne said organizations should compare their defenses against adversaries rather than industry peers and that cybersecurity investment will never be finished. The remarks came as the UK advances the Cyber Security and Resilience Bill and prepares a new National Cyber Action Plan expected in early July.\u003c/p\u003e\n"},{"n":8,"title":"AdaptixC2: Fingerprinting an Open-Source C2 Framework at Scale","source":"censys.com","sourceColorIdx":5,"link":"https://censys.com/blog/adaptixc2-open-source-c2-framework/","time":"16:31","priority":"SHOULD READ","score":79,"tldr":"AdaptixC2’s default HTTP headers and 404 page make many deployed teamservers and beacon listeners easy to fingerprint at internet scale, with Censys tracking 412 web properties across 236 hosts. Defenders can detect both default and lightly modified deployments using the provided header, body, DNS, and Censys threat-label queries.","briefOverview":"\u003cp\u003eCensys analyzed AdaptixC2, an open-source post-exploitation C2 framework whose default configuration makes deployed servers easy to identify through passive scanning. The framework’s default error responses include branded HTTP headers, including \u003ccode\u003eServer: AdaptixC2\u003c/code\u003e and \u003ccode\u003eAdaptix-Version: v1.2\u003c/code\u003e, on unauthenticated requests. As of 16 June 2026, Censys tracked 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings.\u003c/p\u003e\n\n\u003cp\u003eThe research found both teamserver and beacon listener infrastructure, including three notable listener clusters hosted by Hivelocity, M247, and PSB Hosting. These clusters used multiple IPs across adjacent subnets and identical default TLS certificates, suggesting coordinated, redundant callback infrastructure. The article also describes one active deployment at \u003ccode\u003e2.26.229[.]254\u003c/code\u003e that publicly served AdaptixC2 payloads, including a Linux installer with 12 persistence mechanisms and Russian-language comments.\u003c/p\u003e\n\n\u003cp\u003eThe article’s most actionable detection point is that operators who modify the \u003ccode\u003eServer\u003c/code\u003e header may still leave the default 404 page body intact. Censys recommends using both header-based and body-based queries, along with a DNS listener signal where applicable. All detections are available in Censys under the \u003ccode\u003eAdaptix C2\u003c/code\u003e threat label, THREAT-0210.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCensys published a technical analysis of AdaptixC2, a public post-exploitation framework written with a Go teamserver and C++/Qt GUI client. The framework is designed for red team operations but, like other offensive frameworks, can also appear in unauthorized activity. The article focuses on how AdaptixC2’s default configuration exposes reliable passive fingerprints for internet-scale discovery.\u003c/p\u003e\n\n\u003cp\u003eThe main fingerprint comes from the default \u003ccode\u003eprofile.yaml\u003c/code\u003e and \u003ccode\u003e404page.html\u003c/code\u003e configuration. Unmatched routes return a 404 page with the headers \u003ccode\u003eServer: AdaptixC2\u003c/code\u003e and \u003ccode\u003eAdaptix-Version: v1.2\u003c/code\u003e, and the body text \u003ccode\u003eYou need to enter the correct connection details.\u003c/code\u003e These responses are visible without authentication and appear on arbitrary requests such as \u003ccode\u003e/\u003c/code\u003e, \u003ccode\u003e/robots.txt\u003c/code\u003e, or \u003ccode\u003e/favicon.ico\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eCensys reported 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings as of 16 June 2026. The observed infrastructure included default teamserver ports such as \u003ccode\u003e4321\u003c/code\u003e, beacon listener ports such as \u003ccode\u003e43211\u003c/code\u003e, and many non-standard ports. The article emphasizes that passive scanning cannot determine whether a deployment is part of authorized red team activity or unauthorized operations.\u003c/p\u003e\n\n\u003cp\u003eThe research identified three beacon listener clusters associated with Hivelocity, M247, and PSB Hosting. Each cluster spanned multiple IPs across adjacent or related subnets and used identical default OpenSSL self-signed certificates, including \u003ccode\u003eC=AU, ST=Some-State, O=Internet Widgits Pty Ltd\u003c/code\u003e. Censys interpreted these shared certificate and provisioning patterns as indicators of individual operators running coordinated, redundant callback infrastructure.\u003c/p\u003e\n\n\u003cp\u003eOne host, \u003ccode\u003e2.26.229[.]254\u003c/code\u003e, stood out because it ran AdaptixC2 listeners and also served payloads from an open HTTP directory. The files included Windows Beacon implants, a Linux Gopher agent, and an \u003ccode\u003einstall.sh\u003c/code\u003e Linux persistence installer. The installer deployed \u003ccode\u003etimesync.bin\u003c/code\u003e, created a hidden user, modified systemd, cron, initramfs, GRUB, \u003ccode\u003eLD_PRELOAD\u003c/code\u003e, DNS settings, shell profiles, and other mechanisms before shredding itself.\u003c/p\u003e\n\n\u003cp\u003eCensys provided several detection approaches, including header searches, body searches, DNS listener queries, and the \u003ccode\u003eAdaptix C2\u003c/code\u003e threat label THREAT-0210. The article notes that at least one operator changed the \u003ccode\u003eServer\u003c/code\u003e header to an evasion variant while leaving the default 404 body unchanged. This makes combined header and body detection the recommended approach described in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCensys analyzed AdaptixC2, an open-source post-exploitation command-and-control framework, and found that its default configuration makes deployed infrastructure straightforward to identify through passive internet scanning. The framework’s default HTTP error responses include branded headers and a distinctive 404 page body, both visible without authentication.\u003c/p\u003e\n\n\u003cp\u003eAs of 16 June 2026, Censys tracked 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings. The article stresses that these hosts do not all necessarily represent malicious activity, because some may be authorized red team infrastructure. The central finding is that the infrastructure exists, is detectable, and can be monitored or blocked by defenders using the described fingerprints.\u003c/p\u003e\n\n\u003ch2 id=\"adaptixc2-context\"\u003eAdaptixC2 Context\u003c/h2\u003e\n\n\u003cp\u003eAdaptixC2 is a public post-exploitation framework with a Go-based teamserver and a C++/Qt GUI client. It supports two agent families:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBeacon\u003c/strong\u003e, a C++ implant supporting BOF execution across Windows, Linux, and macOS.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGopher\u003c/strong\u003e, a Go implant supporting async BOF execution across the same platforms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe framework implements listeners as loadable plugins, or “extenders,” covering HTTP/S, DNS/DoH, SMB named pipes, and raw TCP transports. Its teamserver exposes REST and WebSocket APIs for operator control, including credential management, agent tasking, screenshots, tunnel management, and multi-operator collaboration.\u003c/p\u003e\n\n\u003ch2 id=\"core-fingerprint\"\u003eCore Fingerprint\u003c/h2\u003e\n\n\u003cp\u003eThe main detection signal comes from AdaptixC2’s default \u003ccode\u003eprofile.yaml\u003c/code\u003e. Its error handler sets branded headers on unmatched routes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eServer: AdaptixC2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAdaptix-Version: v1.2\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause these headers are configured in the error handler rather than a specific route, they appear on arbitrary unauthenticated requests that do not match the configured endpoint. Requests to paths such as \u003ccode\u003e/\u003c/code\u003e, \u003ccode\u003e/robots.txt\u003c/code\u003e, \u003ccode\u003e/favicon.ico\u003c/code\u003e, or other arbitrary paths can return the branded 404 response.\u003c/p\u003e\n\n\u003cp\u003eThe default 404 body provides a second independent signal. The article identifies the default body string:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eYou need to enter the correct connection details.\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThis body string remains useful when operators modify headers, and Censys notes that a “TestCoonection” header-modified variant was still detectable through the unchanged 404 body.\u003c/p\u003e\n\n\u003ch2 id=\"teamserver-and-listener-architecture\"\u003eTeamserver and Listener Architecture\u003c/h2\u003e\n\n\u003cp\u003eAdaptixC2’s teamserver uses a configured endpoint path, defaulting to \u003ccode\u003e/endpoint\u003c/code\u003e, and exposes multiple route groups beneath that path. The article explains that routes outside the endpoint prefix, or invalid paths inside it, hit the \u003ccode\u003eNoRoute\u003c/code\u003e handler and return the default branded 404 response.\u003c/p\u003e\n\n\u003cp\u003eThe HTTP beacon listener behaves differently from the teamserver API. The BeaconHTTP extender starts its own separate HTTP server on the operator-configured callback port rather than using the teamserver’s public endpoint group. This distinction explains why Censys observed two populations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTeamservers\u003c/strong\u003e, often on port \u003ccode\u003e4321\u003c/code\u003e, used for operator API access.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBeacon listeners\u003c/strong\u003e, often on high ports such as \u003ccode\u003e43211\u003c/code\u003e, used for agent callbacks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth surfaces can return the default 404 page, but they serve different operational purposes.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-and-exposed-surface\"\u003eAuthentication and Exposed Surface\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the teamserver management API is reasonably secured when the password is set correctly. Operator authentication begins with \u003ccode\u003ePOST /endpoint/login\u003c/code\u003e, which returns a 12-hour JWT access token and a 168-hour refresh token if the credential is correct. Authenticated operators can generate one-time OTP tokens for WebSocket upgrades and file transfers.\u003c/p\u003e\n\n\u003cp\u003eThe unauthenticated surface is limited to branded error responses and login or refresh attempts. Failed authentication attempts return the same branded 404 response as invalid routes. This prevents clients from distinguishing invalid credentials from nonexistent paths, but it also exposes the framework identity on the first unauthenticated probe.\u003c/p\u003e\n\n\u003ch2 id=\"censys-findings\"\u003eCensys Findings\u003c/h2\u003e\n\n\u003cp\u003eCensys reported 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings as of 16 June 2026. Earlier in the article, it also describes a scan as of 11 June 2026 that tracked 390 web properties across 217 hosts.\u003c/p\u003e\n\n\u003cp\u003eObserved port distribution included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePort \u003ccode\u003e4321\u003c/code\u003e, the default teamserver port, with 46 hits.\u003c/li\u003e\n\u003cli\u003ePort \u003ccode\u003e43211\u003c/code\u003e, a common beacon listener port, with 15 hits.\u003c/li\u003e\n\u003cli\u003eNon-default ports such as \u003ccode\u003e8080\u003c/code\u003e, \u003ccode\u003e8443\u003c/code\u003e, \u003ccode\u003e8989\u003c/code\u003e, \u003ccode\u003e1337\u003c/code\u003e, \u003ccode\u003e9999\u003c/code\u003e, and \u003ccode\u003e8562\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe top ASNs included Hivelocity, M247, Tencent, PSB Hosting, and Vultr. The country distribution included the United States, Hong Kong, China, the Netherlands, Singapore, Germany, France, and Russia.\u003c/p\u003e\n\n\u003ch2 id=\"beacon-listener-clusters\"\u003eBeacon Listener Clusters\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights three beacon listener clusters as especially informative. These are described as beacon listeners rather than teamservers, meaning they are callback infrastructure for agents rather than operator API endpoints.\u003c/p\u003e\n\n\u003ch3 id=\"hivelocity-cluster\"\u003eHivelocity Cluster\u003c/h3\u003e\n\n\u003cp\u003eThe Hivelocity cluster included eight or more IPs across \u003ccode\u003e23.227.203.0/24\u003c/code\u003e and \u003ccode\u003e46.21.153.0/24\u003c/code\u003e. These hosts served the AdaptixC2 404 page on randomized high ports such as \u003ccode\u003e42215\u003c/code\u003e, \u003ccode\u003e42235\u003c/code\u003e, \u003ccode\u003e43211\u003c/code\u003e, \u003ccode\u003e43435\u003c/code\u003e, and \u003ccode\u003e43655\u003c/code\u003e. Every host in the cluster used the default OpenSSL self-signed certificate value \u003ccode\u003eC=AU, ST=Some-State, O=Internet Widgits Pty Ltd\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"m247-cluster\"\u003eM247 Cluster\u003c/h3\u003e\n\n\u003cp\u003eThe M247 cluster included eight IPs across \u003ccode\u003e38.132.122.x\u003c/code\u003e and \u003ccode\u003e146.70.87.x\u003c/code\u003e. Most were on port \u003ccode\u003e43211\u003c/code\u003e, and the cluster shared the same default OpenSSL certificate pattern. The article states that the shared port and shared certificate pattern point to the same operator or the same deployment tooling.\u003c/p\u003e\n\n\u003ch3 id=\"psb-hosting-cluster\"\u003ePSB Hosting Cluster\u003c/h3\u003e\n\n\u003cp\u003eThe PSB Hosting cluster included six IPs across \u003ccode\u003e45.155.69.x\u003c/code\u003e and \u003ccode\u003e185.242.245.x\u003c/code\u003e. These hosts used randomized ports in the \u003ccode\u003e42xxx\u003c/code\u003e to \u003ccode\u003e44xxx\u003c/code\u003e range and showed the same pattern of adjacent IPs, randomized high ports, and default certificates.\u003c/p\u003e\n\n\u003ch2 id=\"active-deployment-at-2-26-229-254\"\u003eActive Deployment at 2.26.229[.]254\u003c/h2\u003e\n\n\u003cp\u003eThe clearest evidence of active operation in the dataset was \u003ccode\u003e2.26.229[.]254\u003c/code\u003e. It ran AdaptixC2 listeners on ports \u003ccode\u003e4433\u003c/code\u003e and \u003ccode\u003e4455\u003c/code\u003e, and it also served payloads from an open HTTP directory on port \u003ccode\u003e7000\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe publicly accessible files included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003einstall.sh\u003c/code\u003e, a Linux persistence installer.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etimesync.bin\u003c/code\u003e, a Gopher agent for Linux.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esvhost.exe\u003c/code\u003e, a Windows x64 Beacon implant.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esvc_timesync.x64.exe\u003c/code\u003e, a Windows x64 Beacon implant.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eagent.x86.exe\u003c/code\u003e, a Windows x86 Beacon implant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe \u003ccode\u003einstall.sh\u003c/code\u003e script presented itself as a routine package update while installing the agent in the background. The article states that it contained Russian-language comments, deployed \u003ccode\u003etimesync.bin\u003c/code\u003e to \u003ccode\u003e/usr/local/lib/systemd/timesync\u003c/code\u003e, and established 12 independent persistence mechanisms.\u003c/p\u003e\n\n\u003ch2 id=\"linux-persistence-mechanisms\"\u003eLinux Persistence Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eThe installer used multiple persistence techniques, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreating a hidden \u003ccode\u003esystemd-timesync\u003c/code\u003e user with UID 9999.\u003c/li\u003e\n\u003cli\u003eInstalling a hardcoded operator SSH key in \u003ccode\u003eauthorized_keys\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eOverwriting \u003ccode\u003esystemd-timesyncd.service\u003c/code\u003e to execute the beacon.\u003c/li\u003e\n\u003cli\u003eCreating cron jobs across multiple crontab locations.\u003c/li\u003e\n\u003cli\u003eAdding an initramfs hook and rebuilding the initrd.\u003c/li\u003e\n\u003cli\u003eModifying GRUB to use an attacker-controlled init script.\u003c/li\u003e\n\u003cli\u003eRegistering an \u003ccode\u003eLD_PRELOAD\u003c/code\u003e library in \u003ccode\u003e/etc/ld.so.preload\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eLaunching processes with names such as \u003ccode\u003e[kworker/0:0]\u003c/code\u003e and \u003ccode\u003e[kthreadd]\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRunning an integrity monitor that re-downloaded the agent from \u003ccode\u003ehxxp://2.26.229[.]254:7000/timesync.bin\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInjecting launch commands into shell profiles.\u003c/li\u003e\n\u003cli\u003eSetting \u003ccode\u003e2.26.229[.]254\u003c/code\u003e as the primary \u003ccode\u003esystemd-resolved\u003c/code\u003e DNS server.\u003c/li\u003e\n\u003cli\u003eLoading an eBPF kprobe on \u003ccode\u003esys_getdents64\u003c/code\u003e when \u003ccode\u003ebpftool\u003c/code\u003e was present.\u003c/li\u003e\n\u003cli\u003eInstalling a systemd timer.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe script also zeroed files under \u003ccode\u003e/var/log\u003c/code\u003e, cleared bash history, and shredded itself.\u003c/p\u003e\n\n\u003ch2 id=\"agent-configuration-extraction\"\u003eAgent Configuration Extraction\u003c/h2\u003e\n\n\u003cp\u003eThe article describes static extraction of Beacon configuration from Windows samples. Beacon implants embed an RC4-encrypted configuration blob in the \u003ccode\u003e.rdata\u003c/code\u003e section of the compiled PE. The blob includes a ciphertext size, the ciphertext, and a 16-byte RC4 key stored in the binary itself.\u003c/p\u003e\n\n\u003cp\u003eCensys states that configuration extraction can reveal C2 servers, callback URIs, and listener RC4 keys without executing the binary. For the Windows samples from \u003ccode\u003e2.26.229[.]254\u003c/code\u003e, the extracted configuration included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eC2: \u003ccode\u003ehxxp://2.26.229[.]254:4433\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCallback URIs: \u003ccode\u003e/api/v1/status\u003c/code\u003e, \u003ccode\u003e/updates/check.php\u003c/code\u003e, \u003ccode\u003e/content.html\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCustom header: \u003ccode\u003eX-ISS\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eUser-Agent: \u003ccode\u003eMozilla/5.0 (Windows NT 6.2; rv:20.0) Gecko/20121202 Firefox/20.0\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eRC4 key: \u003ccode\u003e1baccab4cbd2b84f6bc54bf8e6551f93\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSleep: 10 seconds\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"dns-listener-signal\"\u003eDNS Listener Signal\u003c/h2\u003e\n\n\u003cp\u003eThe BeaconDNS extender provides a tertiary detection signal. It sets the authoritative-answer bit on every response and returns \u003ccode\u003eTXT \u0026quot;OK\u0026quot;\u003c/code\u003e for any query that does not match its beacon protocol format, specifically queries with fewer than five labels. Censys captures this as a DNS service with \u003ccode\u003eversion: \u0026quot;OK\u0026quot;\u003c/code\u003e on UDP/53.\u003c/p\u003e\n\n\u003cp\u003eThe article warns that this signal requires cross-referencing because many legitimate DNS servers use custom version strings. On genuine listeners, a short random hostname returns \u003ccode\u003eTXT \u0026quot;OK\u0026quot;\u003c/code\u003e, while a beacon-check-in-style query with five or more labels returns \u003ccode\u003eA 127.0.0.1\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-extension-kharonhttp\"\u003eThird-Party Extension: KharonHTTP\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses KharonHTTP, a third-party AdaptixC2 listener extension found on two hosts in the dataset. KharonHTTP implements a malleable C2 profile system with configurable URI paths, headers, User-Agent patterns, request body wrappers, and cookie or parameter encoding.\u003c/p\u003e\n\n\u003cp\u003eCensys found KharonHTTP on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e1.14.172[.]47\u003c/code\u003e, with listeners on ports \u003ccode\u003e56743\u003c/code\u003e and \u003ccode\u003e56744\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e104.236.230[.]184\u003c/code\u003e, with a listener on port \u003ccode\u003e443\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe callback domain \u003ccode\u003ellmscience.top\u003c/code\u003e was extracted from the listener config on \u003ccode\u003e1.14.172[.]47\u003c/code\u003e. The article also notes that KharonHTTP returns the literal string \u003ccode\u003eBad Request\u003c/code\u003e when the \u003ccode\u003eHost\u003c/code\u003e header does not match any configured callback.\u003c/p\u003e\n\n\u003ch2 id=\"operator-observations\"\u003eOperator Observations\u003c/h2\u003e\n\n\u003cp\u003eThe article does not attribute the observed infrastructure to a single threat actor. Instead, it describes a mixed population with varying levels of operational discipline.\u003c/p\u003e\n\n\u003cp\u003eSome deployments used default ports, default headers, and default TLS certificate details. Others modified selected indicators, such as changing the \u003ccode\u003eServer\u003c/code\u003e header, while leaving other defaults intact. Censys highlights the “TestCoonection” variant as an example where a deliberate header change did not remove the detectable default 404 body.\u003c/p\u003e\n\n\u003cp\u003eSpecific observations included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e89.125.255[.]29\u003c/code\u003e used a certificate with \u003ccode\u003eC=RU, ST=as, O=as\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e185.190.142[.]66\u003c/code\u003e had AdaptixC2 on port \u003ccode\u003e4321\u003c/code\u003e, RDP open on \u003ccode\u003e3389\u003c/code\u003e, and a certificate with \u003ccode\u003eO=OpenClaw\u003c/code\u003e on port \u003ccode\u003e443\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e38.147.173[.]24\u003c/code\u003e had AdaptixC2 on port \u003ccode\u003e8562\u003c/code\u003e and port \u003ccode\u003e50050\u003c/code\u003e open, which the article notes is the default Cobalt Strike teamserver port, while also cautioning that passive scanning cannot confirm Cobalt Strike was present.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e202.95.8[.]92\u003c/code\u003e, \u003ccode\u003e.97\u003c/code\u003e, and \u003ccode\u003e.98\u003c/code\u003e were sequential CTG Server Hong Kong IPs that appeared on port \u003ccode\u003e4321\u003c/code\u003e within a four-day window.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-iocs\"\u003eDetection and IOCs\u003c/h2\u003e\n\n\u003cp\u003eCensys provides several detection methods. The simplest is the Censys threat label:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ehost.services.threats.name: \u0026quot;Adaptix C2\u0026quot; or web.threats.name: \u0026quot;Adaptix C2\u0026quot;\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eHeader-based detections include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eServer: AdaptixC2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAdaptix-Version: v1.2\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBody-based detection uses the default 404 body string:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eYou need to enter the correct connection details.\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe DNS listener signal is:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ehost.services.dns.version: \u0026quot;OK\u0026quot; and host.services.protocol = \u0026quot;DNS\u0026quot;\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article states that Censys threat detection THREAT-0210 covers the default headers, body hash, and the “TestCoonection” evasion variant.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cp\u003eThe most important conclusion is that AdaptixC2’s default branding makes passive detection trivial. Because the identifying headers are applied by the error handler, no valid credentials or endpoint knowledge are needed to fingerprint many deployments.\u003c/p\u003e\n\n\u003cp\u003eThe second major takeaway is that single-signal detection is incomplete. Operators who changed headers may still leave the default 404 body intact, so the article recommends using both header-based and body-based detection.\u003c/p\u003e\n\n\u003cp\u003eThe third important point is that clustered listener infrastructure can be identified through shared operational artifacts. Adjacent IP allocations, high callback ports, and reused default OpenSSL certificates helped Censys identify three beacon listener clusters likely representing coordinated, redundant callback infrastructure.\u003c/p\u003e\n\n\u003cp\u003eFinally, the article notes that external visibility depends on transport choice. BeaconHTTP, BeaconDNS, and BeaconTCP expose internet-reachable sockets, while BeaconSMB does not create an externally visible teamserver socket because the named pipe lives on a compromised victim host.\u003c/p\u003e\n","keyPoints":["AdaptixC2’s default configuration sets the HTTP headers `Server: AdaptixC2` and `Adaptix-Version: v1.2` on unauthenticated error responses, making default deployments identifiable through passive scanning.","As of 16 June 2026, Censys tracked 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings.","Censys identified three beacon listener clusters hosted by Hivelocity, M247, and PSB Hosting that used adjacent IP ranges, randomized or shared high ports, and identical default TLS certificates.","One host, 2.26.229[.]254, served AdaptixC2 payloads from an open HTTP directory, including a Linux installer that deployed `timesync.bin` and established 12 persistence mechanisms.","The article states that operators who changed the `Server` header could still be detected because they left the default 404 body string, `You need to enter the correct connection details.`, intact."],"insights":["Layered detection is necessary because at least one operator deliberately changed the `Server` header to `TestCoonection` while leaving the default 404 page body intact, so body-based matching catches evasion that header-only scans miss.","Beacon listener clusters can be separated from teamservers by their high callback ports and shared TLS certificate patterns, which helps analysts distinguish operator API infrastructure from agent callback infrastructure in passive scan data.","The default OpenSSL certificate value `C=AU, ST=Some-State, O=Internet Widgits Pty Ltd` appeared across multiple AdaptixC2 listener clusters, making TLS certificate reuse an actionable clustering signal for identifying related callback servers.","BeaconDNS deployments may be visible even when BeaconHTTP is absent because the DNS extender returns `TXT \"OK\"` for short or unrecognized queries and sets the authoritative-answer bit on every response.","Recovered AdaptixC2 Beacon binaries can reveal C2 servers, callback URIs, and listener RC4 keys through static extraction because the encrypted configuration blob stores the RC4 key inside the binary itself."],"referencedReports":[],"body":"\u003cp\u003eCensys analyzed AdaptixC2, an open-source post-exploitation C2 framework whose default configuration makes deployed servers easy to identify through passive scanning. The framework’s default error responses include branded HTTP headers, including \u003ccode\u003eServer: AdaptixC2\u003c/code\u003e and \u003ccode\u003eAdaptix-Version: v1.2\u003c/code\u003e, on unauthenticated requests. As of 16 June 2026, Censys tracked 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings.\u003c/p\u003e\n\n\u003cp\u003eThe research found both teamserver and beacon listener infrastructure, including three notable listener clusters hosted by Hivelocity, M247, and PSB Hosting. These clusters used multiple IPs across adjacent subnets and identical default TLS certificates, suggesting coordinated, redundant callback infrastructure. The article also describes one active deployment at \u003ccode\u003e2.26.229[.]254\u003c/code\u003e that publicly served AdaptixC2 payloads, including a Linux installer with 12 persistence mechanisms and Russian-language comments.\u003c/p\u003e\n\n\u003cp\u003eThe article’s most actionable detection point is that operators who modify the \u003ccode\u003eServer\u003c/code\u003e header may still leave the default 404 page body intact. Censys recommends using both header-based and body-based queries, along with a DNS listener signal where applicable. All detections are available in Censys under the \u003ccode\u003eAdaptix C2\u003c/code\u003e threat label, THREAT-0210.\u003c/p\u003e\n"},{"n":10,"title":"What the ThreatLabz 2026 Phishing and Initial Access Report Means for the Public Sector","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/what-threatlabz-2026-phishing-and-initial-access-report-means-public-sector","time":"14:28","priority":"SHOULD READ","score":78,"tldr":"ThreatLabz says phishing targeting the public sector is becoming more AI-generated, targeted, and capable of bypassing legacy defenses, even as overall volume declines. Government, healthcare, and education should prioritize encrypted traffic inspection, phishing-resistant authentication, reduced exposed attack surface, and broader visibility beyond email.","briefOverview":"\u003cp\u003eThe article summarizes public sector implications from the ThreatLabz 2026 Phishing and Initial Access Report. It says overall phishing volume in the Zscaler cloud fell 20% year over year, but remaining campaigns are more targeted, more AI-powered, and harder to distinguish from legitimate activity. ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious.\u003c/p\u003e\n\n\u003cp\u003eGovernment, healthcare, and education each faced different phishing trends, but the article says all three are affected by a broader shift toward targeted, high-conversion initial access. Government phishing attempts rose 50% year over year to 138.5 million hits in 2025, while healthcare saw lower phishing volume but high consequences from credential and session theft. Education phishing attempts dropped 65.6%, but the sector still experienced roughly 1.6 billion encrypted attack hits.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that public sector defenders need visibility beyond the inbox because phishing and initial access activity occurs through encrypted traffic, browsers, SaaS sessions, authentication flows, and public-facing portals. It recommends consistent SSL/TLS inspection, phishing-resistant authentication, reduced application exposure, monitoring for AI-generated phishing infrastructure, and broader visibility across the path from lure to compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reviews findings from the ThreatLabz 2026 Phishing and Initial Access Report and focuses on what they mean for government, healthcare, and education organizations. It states that phishing remains a major initial access risk even though overall phishing volume in the Zscaler cloud fell 20% year over year. The remaining campaigns are described as more targeted, more AI-powered, and harder to distinguish from legitimate activity.\u003c/p\u003e\n\n\u003cp\u003eA key technical theme is the rapid creation of phishing infrastructure using AI-powered site builders. ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious. The article names Manus AI, BlackBox AI, Anything AI, and DeepSite AI as platforms used to create convincing phishing infrastructure or replicas of official portals.\u003c/p\u003e\n\n\u003cp\u003eGovernment was one of the most affected sectors in the article, with phishing attempts increasing 50% year over year to 138.5 million phishing hits in 2025. The article describes a campaign impersonating Brazilian government services that used AI-powered site builders, SEO poisoning, and a process that mirrored a legitimate public service interaction before requesting payment through a trusted instant payment system. It also notes that the IRS has warned about impersonation scams using email, SMS, and QR codes to mimic official communications and direct users to fraudulent portals.\u003c/p\u003e\n\n\u003cp\u003eHealthcare saw comparatively lower phishing hit counts in the Zscaler cloud, but the article says the consequences remain high because credential theft and session compromise can affect patient data and clinical operations. It notes that healthcare recorded 1.58 million encrypted attack hits and that 95.2% of all phishing activity is now delivered over encrypted channels. The article also highlights adversary-in-the-middle and browser-in-the-middle phishing kits that can capture credentials and MFA tokens during active login flows.\u003c/p\u003e\n\n\u003cp\u003eEducation organizations experienced a 65.6% year-over-year drop in phishing attempts, but the article warns that this does not eliminate initial access risk. Education still saw roughly 1.6 billion encrypted attack hits, representing 6% of encrypted attack activity in the Zscaler cloud. The article also cites 89.9 million hostile interactions with external decoys in six months as evidence of reconnaissance against internet-facing assets.\u003c/p\u003e\n\n\u003cp\u003eThe article’s recommended response is a Zero Trust architecture that verifies every connection, inspects encrypted traffic inline, minimizes exposed attack surface, and enforces least-privilege access. It specifically calls for consistent encrypted traffic inspection, phishing-resistant authentication such as FIDO2-based credentials, reduced application exposure, monitoring for AI-generated phishing infrastructure, and visibility beyond email into browsers, authentication flows, SaaS usage, and encrypted channels.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes the public sector implications of the ThreatLabz 2026 Phishing and Initial Access Report. Its central message is that phishing remains a critical initial access risk even as overall phishing volume in the Zscaler cloud declined 20% year over year. The article says the campaigns that remain are more targeted, more AI-powered, and harder to distinguish from legitimate activity.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious. The article says platforms including Manus AI, BlackBox AI, Anything AI, and DeepSite AI can allow attackers to create high-fidelity phishing infrastructure in minutes rather than days.\u003c/p\u003e\n\n\u003ch2 id=\"public-sector-significance\"\u003ePublic sector significance\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on three public sector environments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernment services\u003c/li\u003e\n\u003cli\u003eHealthcare operations\u003c/li\u003e\n\u003cli\u003eEducation environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt says these sectors depend on digital trust and that attackers are exploiting that trust through AI-generated content, brand impersonation, credential theft, encrypted delivery channels, and real-time session hijacking that can defeat traditional MFA. The article states that one successful lure can lead to account takeover, data exposure, service disruption, and loss of public trust.\u003c/p\u003e\n\n\u003cp\u003eAlthough the article presents different data for government, healthcare, and education, it says the underlying shift is consistent across all three: attackers are moving toward targeted, high-conversion initial access.\u003c/p\u003e\n\n\u003ch2 id=\"government-findings\"\u003eGovernment findings\u003c/h2\u003e\n\n\u003cp\u003eGovernment phishing attempts increased 50% year over year, which the article describes as one of the largest sector increases reported. Government recorded 138.5 million phishing hits in 2025 and ranked as the third-most targeted industry overall in the Zscaler cloud.\u003c/p\u003e\n\n\u003cp\u003eThe article says attackers are turning public trust into an initial access opportunity. Citizens expect to use online government services for activities such as paying taxes, accessing benefits, renewing licenses, or resolving administrative issues. Attackers exploit that expectation by impersonating official services and creating workflows that appear legitimate.\u003c/p\u003e\n\n\u003ch3 id=\"brazilian-government-impersonation-campaign\"\u003eBrazilian government impersonation campaign\u003c/h3\u003e\n\n\u003cp\u003eThe article describes a campaign impersonating Brazilian government services. In that campaign, attackers used AI-powered site builders, including DeepSite AI and BlackBox AI, to create convincing replicas of official portals. They also used SEO poisoning and guided users through a process that resembled a legitimate public service interaction before requesting payment through a trusted instant payment system.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as an example of a new template for government-targeted phishing: AI-generated, workflow-aware, and designed to pass human trust checks.\u003c/p\u003e\n\n\u003ch3 id=\"irs-impersonation-warning\"\u003eIRS impersonation warning\u003c/h3\u003e\n\n\u003cp\u003eThe article also says the IRS has warned about impersonation scams that use email, SMS, and QR codes. These scams mimic official communications and direct users to fraudulent portals designed to steal credentials and financial data.\u003c/p\u003e\n\n\u003ch3 id=\"government-security-implications\"\u003eGovernment security implications\u003c/h3\u003e\n\n\u003cp\u003eFor government agencies, the article says protection must cover the full citizen-facing experience, not only the inbox. It calls for detecting lookalike domains and fake portals, inspecting web and encrypted traffic, reducing exposure across public-facing services and applications, and applying identity controls that prevent credential theft from becoming account takeover.\u003c/p\u003e\n\n\u003ch2 id=\"healthcare-findings\"\u003eHealthcare findings\u003c/h2\u003e\n\n\u003cp\u003eThe article says healthcare had comparatively lower phishing hit counts in the Zscaler cloud in 2025, along with 1.58 million encrypted attack hits. It cautions that lower volume does not mean lower consequence.\u003c/p\u003e\n\n\u003cp\u003eFor healthcare security teams, a convincing login page or trusted brand impersonation can provide a path to credentials, sessions, and application access. The article says this can put patient care at risk.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that 95.2% of all phishing activity is now delivered over encrypted channels. It says campaigns that reach healthcare users are already bypassing legacy defenses that do not inspect TLS traffic.\u003c/p\u003e\n\n\u003ch3 id=\"brand-impersonation-and-mfa-token-theft\"\u003eBrand impersonation and MFA token theft\u003c/h3\u003e\n\n\u003cp\u003eThe article identifies Microsoft and Google as the top two most-imitated brands in the report. It notes that both brands are common entry points into cloud productivity and collaboration environments used by healthcare users.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights adversary-in-the-middle and browser-in-the-middle phishing kits. These kits are described as being able to capture credentials and MFA tokens during the active login flow, turning a single click into session-level compromise even when MFA is enabled.\u003c/p\u003e\n\n\u003ch3 id=\"healthcare-security-implications\"\u003eHealthcare security implications\u003c/h3\u003e\n\n\u003cp\u003eThe article says lower phishing volume changes the scale of the problem, not the stakes. For healthcare organizations, the priority is to stop credential capture, session theft, and malicious redirects before a successful lure becomes access to patient data and clinical operations.\u003c/p\u003e\n\n\u003ch2 id=\"education-findings\"\u003eEducation findings\u003c/h2\u003e\n\n\u003cp\u003eThe article says phishing attempts against education organizations dropped 65.6% year over year. It describes education as losing more absolute phishing volume than any other tracked industry in the Zscaler cloud.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article says the risk has not disappeared. Education experienced roughly 1.6 billion encrypted attack hits in the past year, representing 6% of encrypted attack activity in the Zscaler cloud.\u003c/p\u003e\n\n\u003cp\u003eThe article says this contrast matters because lower phishing volume in the inbox can coexist with significant malicious activity moving through TLS sessions, web traffic, cloud applications, and authentication flows. These are channels where traditional email security has no visibility.\u003c/p\u003e\n\n\u003ch3 id=\"reconnaissance-against-public-facing-assets\"\u003eReconnaissance against public-facing assets\u003c/h3\u003e\n\n\u003cp\u003eThe article also discusses attackers probing exposed entry points outside the inbox. ThreatLabz recorded 89.9 million hostile interactions with external decoys in six months, which the article uses to show the scale of reconnaissance against internet-facing assets.\u003c/p\u003e\n\n\u003cp\u003eEducation environments are described as having broad public-facing infrastructure, including portals, LMS platforms, and federated authentication systems. The article says these assets create a large reconnaissance target.\u003c/p\u003e\n\n\u003ch3 id=\"education-security-implications\"\u003eEducation security implications\u003c/h3\u003e\n\n\u003cp\u003eThe article says a drop in phishing volume should be treated as a positive signal, not proof that initial access risk is declining. Education teams need visibility into activity that follows or bypasses the phish, including encrypted traffic, authentication flows, SaaS usage, browser behavior, and compromised credential use.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-for-public-sector-security-teams\"\u003eRecommended actions for public sector security teams\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several priorities for reducing initial access risk across government, healthcare, and education.\u003c/p\u003e\n\n\u003ch3 id=\"inspect-encrypted-traffic-consistently\"\u003eInspect encrypted traffic consistently\u003c/h3\u003e\n\n\u003cp\u003eThe article states that 95.2% of phishing is delivered over TLS. It says any gap in SSL/TLS inspection is a blind spot attackers will exploit. It recommends inline inspection across web, SaaS, and cloud application traffic, not only email.\u003c/p\u003e\n\n\u003ch3 id=\"deploy-phishing-resistant-authentication\"\u003eDeploy phishing-resistant authentication\u003c/h3\u003e\n\n\u003cp\u003eThe article says adversary-in-the-middle and browser-in-the-middle kits can defeat legacy MFA in real time. It recommends transitioning to FIDO2-based, phishing-resistant credentials to remove the path from a click to session compromise.\u003c/p\u003e\n\n\u003ch3 id=\"reduce-application-exposure\"\u003eReduce application exposure\u003c/h3\u003e\n\n\u003cp\u003eThe article says attackers map environments before the first lure is sent. It recommends minimizing discoverable attack surface by making applications invisible to the internet and enforcing identity-based access only after verification.\u003c/p\u003e\n\n\u003ch3 id=\"monitor-for-ai-generated-phishing-infrastructure\"\u003eMonitor for AI-generated phishing infrastructure\u003c/h3\u003e\n\n\u003cp\u003eThe article says AI site builders are compressing the time from campaign idea to live phishing page to minutes. It recommends detection that accounts for rapidly rotating, high-fidelity lookalike domains and portals, rather than relying only on known-bad indicators.\u003c/p\u003e\n\n\u003ch3 id=\"extend-visibility-beyond-the-inbox\"\u003eExtend visibility beyond the inbox\u003c/h3\u003e\n\n\u003cp\u003eThe article says phishing is the entry point, but initial access is won in browsers, authentication flows, SaaS sessions, and encrypted channels. It recommends visibility and control across the full path from lure to compromise.\u003c/p\u003e\n\n\u003ch2 id=\"zero-trust-framing\"\u003eZero Trust framing\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that a Zero Trust architecture provides the most effective foundation for disrupting attackers at multiple stages. It describes this architecture as verifying every connection, inspecting encrypted traffic inline, minimizing exposed attack surface, and enforcing least-privilege access.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, these controls can disrupt the attacker’s path from reconnaissance through credential theft to lateral movement.\u003c/p\u003e\n","keyPoints":["The ThreatLabz 2026 Phishing and Initial Access Report found that overall phishing volume in the Zscaler cloud fell 20% year over year, while remaining campaigns became more targeted, AI-powered, and harder to distinguish from legitimate activity.","ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% of them as malicious, with platforms such as Manus AI, BlackBox AI, and Anything AI used to create phishing infrastructure quickly.","Phishing attempts against the government sector increased 50% year over year, reaching 138.5 million phishing hits in 2025 and making government the third-most targeted industry overall in the Zscaler cloud.","Healthcare had comparatively lower phishing hit counts in 2025, but the article states that 95.2% of all phishing activity was delivered over encrypted channels and that adversary-in-the-middle and browser-in-the-middle phishing kits can capture credentials and MFA tokens during active login flows.","Phishing attempts against education organizations dropped 65.6% year over year, but education still experienced roughly 1.6 billion encrypted attack hits, representing 6% of encrypted attack activity in the Zscaler cloud."],"insights":["A decline in overall phishing volume should not be treated as reduced risk, because the article emphasizes that remaining campaigns are more targeted, AI-generated, and designed for higher-conversion initial access.","Public sector defenses need to extend beyond email security, since the article describes phishing risk moving through encrypted web traffic, SaaS sessions, browser activity, authentication flows, and fake citizen-facing portals.","Legacy MFA is not sufficient against the phishing kits described in the article, because adversary-in-the-middle and browser-in-the-middle techniques can capture credentials and MFA tokens during active login sessions.","Government agencies must secure the full online service workflow, not just agency-branded domains, because attackers are replicating realistic public service interactions and pairing fake portals with SEO poisoning and trusted payment mechanisms.","Education organizations should interpret falling phishing volumes cautiously, because the article shows that large-scale encrypted attack activity and reconnaissance against public-facing assets can persist even when inbox phishing drops sharply."],"referencedReports":[],"body":"\u003cp\u003eThe article summarizes public sector implications from the ThreatLabz 2026 Phishing and Initial Access Report. It says overall phishing volume in the Zscaler cloud fell 20% year over year, but remaining campaigns are more targeted, more AI-powered, and harder to distinguish from legitimate activity. ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious.\u003c/p\u003e\n\n\u003cp\u003eGovernment, healthcare, and education each faced different phishing trends, but the article says all three are affected by a broader shift toward targeted, high-conversion initial access. Government phishing attempts rose 50% year over year to 138.5 million hits in 2025, while healthcare saw lower phishing volume but high consequences from credential and session theft. Education phishing attempts dropped 65.6%, but the sector still experienced roughly 1.6 billion encrypted attack hits.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that public sector defenders need visibility beyond the inbox because phishing and initial access activity occurs through encrypted traffic, browsers, SaaS sessions, authentication flows, and public-facing portals. It recommends consistent SSL/TLS inspection, phishing-resistant authentication, reduced application exposure, monitoring for AI-generated phishing infrastructure, and broader visibility across the path from lure to compromise.\u003c/p\u003e\n"},{"n":5,"title":"Junior Hacker Used Tailscale and OpenSSH to Keep Access After His C2 Went Offline","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/junior-hacker-used-tailscale-and.html","time":"16:00","priority":"MAY READ","score":71,"tldr":"A low-skill attacker maintained access to a French small business even after his Havoc C2 went offline by installing OpenSSH and Tailscale as a separate backdoor. The key lesson is that taking down C2 infrastructure is not enough remediation unless defenders also hunt for alternate persistence paths like legitimate remote-access tools, scheduled tasks, and keyloggers.","briefOverview":"\u003cp\u003eA French-speaking attacker using the handle “Poisson” compromised a small French automotive business, planted a keylogger, and stole banking and email credentials. Cato Networks captured the operation command by command, totaling 339 commands over 33 days, after the operator left SSH keys and a step-by-step playbook in an open storage bucket. The article emphasizes that the attacker was not described as an APT and appeared to be a junior operator using free-tier and low-cost infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe most important move came near the end of the intrusion, when Poisson installed OpenSSH Server and Tailscale on a victim machine before his Havoc command-and-control server went offline. This gave him an access path that did not depend on the C2 server, and when the Havoc infrastructure went down the next day, his access remained. When the C2 returned 18 days later, the agents reconnected automatically and he continued operating.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion chain included a VBScript stager, a PowerShell loader, a .NET loader, Havoc’s Demon agent, scheduled-task persistence, Explorer.exe injection, RustDesk, and a simple Python keylogger. Cato’s hunting recommendations included watching for OpenSSH Server on Windows workstations, unexpected tailscale.exe use, ssh -R reverse tunnels, suspicious wscript.exe execution, high-privilege scheduled tasks launching script interpreters, powercfg changes that prevent sleep, and DuckDNS usage.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA French-speaking attacker known as “Poisson” broke into a small French automotive business, installed a keylogger, and stole banking and email credentials. Cato Networks documented the operation from the attacker’s command activity, capturing 339 commands over 33 days. The visibility came after the operator left SSH keys and a step-by-step playbook in an open storage bucket.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Poisson as a junior operator rather than an APT actor. Researchers noted that he appeared to work on a school-like schedule, was active after 3 p.m. CET with a long midday gap, and relied on free-tier or inexpensive infrastructure including DuckDNS, Backblaze B2, and an IONOS VPS in Berlin. His tradecraft was described as thin, including leaked home directories, storage buckets named after his handle, and a test file containing his own repeated keystrokes inside the keylogger package.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the malware ran mostly in memory. A VBScript stager with a sandbox-evasion delay decrypted a PowerShell loader, which downloaded a .NET loader that ran Havoc’s Demon agent without dropping the implant to disk. For elevation, Poisson used Start-Process -Verb RunAs, which triggered a Windows consent prompt rather than silently bypassing UAC, and on one victim required a dozen attempts across two days.\u003c/p\u003e\n\n\u003cp\u003eAfter initial access and elevation, the attacker established persistence and collection mechanisms. He created a scheduled task that ran at every logon with highest privileges, injected shellcode into Explorer.exe, and deployed a custom-built RustDesk as a backup channel. His credential grabber was a roughly 70-line Python keylogger that wrote keystrokes to a local file, which he manually collected after logging in, and he used powercfg to keep machines from sleeping.\u003c/p\u003e\n\n\u003cp\u003eThe major significance of the case was the attacker’s use of OpenSSH Server and Tailscale as an access path independent of Havoc. On April 7, he installed both tools, joined the victim’s machine to his private Tailscale network, configured key-based SSH, and set up a reverse tunnel. When the Havoc C2 went offline the next day, that separate path remained available, and when the C2 returned on April 26 the agents reconnected automatically.\u003c/p\u003e\n\n\u003cp\u003eCato’s response guidance focused on finding this kind of quiet persistence rather than treating C2 takedown as remediation. The article lists alerts for OpenSSH Server installations on Windows workstations, tailscale.exe on machines without a VPN need, ssh -R reverse tunnels, wscript.exe running VBS files from user staging folders, high-privilege scheduled tasks launching script interpreters, powercfg standby-timeout changes, and DuckDNS blocking. The article concludes that defenders should assume a discovered C2 may be only one access route and should hunt for additional persistence layers behind it.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA French-speaking attacker using the handle “Poisson” compromised a small French automotive business, installed a keylogger, and stole banking and email credentials. The operation was documented by Cato Networks, which captured 339 attacker commands over 33 days. The article says Cato gained this visibility after the operator left SSH keys and a step-by-step playbook in an open storage bucket.\u003c/p\u003e\n\n\u003cp\u003eThe central lesson of the case is that taking a command-and-control server offline is not sufficient remediation if the attacker has established another access path. Before his Havoc C2 went dark, Poisson installed OpenSSH Server and Tailscale on a victim machine. That gave him a way back in that did not rely on the C2 infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"actor-profile\"\u003eActor Profile\u003c/h2\u003e\n\n\u003cp\u003eThe attacker is identified by the handle “Poisson.” Researchers described him as a junior operator rather than an APT actor. The article says he appeared to operate on what looked like a school schedule, with activity after 3 p.m. CET and a long midday gap.\u003c/p\u003e\n\n\u003cp\u003ePoisson used free-tier and low-cost infrastructure, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDuckDNS\u003c/li\u003e\n\u003cli\u003eBackblaze B2\u003c/li\u003e\n\u003cli\u003eA cheap IONOS VPS in Berlin\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also describes several signs of weak tradecraft. Poisson leaked his home directory five times, named storage buckets after his own handle, and left a test file of his own repeated keystrokes inside the keylogger package. The article says he failed at roughly half of what he tried but still compromised four machines.\u003c/p\u003e\n\n\u003ch2 id=\"victim-and-impact\"\u003eVictim and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe victim described in the article was a small French automotive business. Poisson installed a keylogger and stole banking and email credentials. The article says there was no sign of ransomware, lateral movement, Mimikatz use, or theft of the documents he browsed, which included tax records and insurance materials.\u003c/p\u003e\n\n\u003cp\u003eThe attacker’s apparent objective was narrow: capturing what users typed. The article specifically mentions banking logins, email passwords, and government portals. For a small business owner, the article characterizes this as direct financial exposure.\u003c/p\u003e\n\n\u003ch2 id=\"intrusion-chain\"\u003eIntrusion Chain\u003c/h2\u003e\n\n\u003cp\u003eThe malware chain ran largely in memory. A VBScript stager with a sandbox-evasion delay decrypted a PowerShell loader. That PowerShell loader then retrieved a .NET loader, which ran Havoc’s Demon agent without dropping the implant to disk.\u003c/p\u003e\n\n\u003cp\u003eFor elevation, Poisson used \u003ccode\u003eStart-Process -Verb RunAs\u003c/code\u003e. The article notes that this is not a silent UAC bypass because it causes the Windows consent prompt to appear and waits for the user to click Yes. On one victim, this reportedly took a dozen attempts over two days.\u003c/p\u003e\n\n\u003cp\u003eAfter elevation, Poisson established persistence and backup access. The article lists several mechanisms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA scheduled task running at every logon with highest privileges.\u003c/li\u003e\n\u003cli\u003eShellcode injected into \u003ccode\u003eExplorer.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA custom-built RustDesk instance as a backup channel.\u003c/li\u003e\n\u003cli\u003eA simple Python keylogger for credential capture.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"keylogger-and-manual-collection\"\u003eKeylogger and Manual Collection\u003c/h2\u003e\n\n\u003cp\u003eThe credential grabber was described as a 70-line Python keylogger. It wrote keystrokes to a local file and did not include a beacon or exfiltration server. Instead, Poisson logged in manually, collected the file himself, and used \u003ccode\u003epowercfg\u003c/code\u003e to prevent machines from sleeping so that harvesting would not pause.\u003c/p\u003e\n\n\u003cp\u003eThis manual approach is one reason the article presents the operation as relatively low-sophistication. However, the same operation still produced real credential theft and persistent access.\u003c/p\u003e\n\n\u003ch2 id=\"the-openssh-and-tailscale-persistence-layer\"\u003eThe OpenSSH and Tailscale Persistence Layer\u003c/h2\u003e\n\n\u003cp\u003eThe most notable action occurred on April 7 during a five-hour overnight session. Poisson installed OpenSSH Server and Tailscale, joined the victim’s machine to his private Tailscale network, configured key-based SSH, and set up a reverse tunnel. This created an encrypted mesh access path with no exposed ports and no dependence on Havoc.\u003c/p\u003e\n\n\u003cp\u003eThe next day, the Havoc infrastructure went offline. Cato did not state why it went offline, and the article says the reason barely mattered because the Tailscale path existed on a separate network. As a result, Poisson’s access survived the C2 outage.\u003c/p\u003e\n\n\u003cp\u003eWhen the C2 returned on April 26, the agents reconnected automatically. The attacker did not need to re-compromise the environment. Over the final five days, he executed 145 more commands.\u003c/p\u003e\n\n\u003ch2 id=\"later-activity\"\u003eLater Activity\u003c/h2\u003e\n\n\u003cp\u003eAfter the C2 returned, Poisson continued operating. The article says he probed smart-card and certificate stores, which Cato interpreted as a sign that he was eyeing certificate-based logins. He also ran two unexplained executables from a file named \u003ccode\u003eThales.zip\u003c/code\u003e for about 32 minutes total.\u003c/p\u003e\n\n\u003cp\u003eBefore going quiet on May 1, he deleted 17 files. The article states that what was inside \u003ccode\u003eThales.zip\u003c/code\u003e and what those programs did during their 32 minutes on the machine remained an open question from Cato’s write-up.\u003c/p\u003e\n\n\u003ch2 id=\"tools-and-infrastructure-mentioned\"\u003eTools and Infrastructure Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article names several tools, services, and techniques used in the operation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHavoc Demon agent\u003c/li\u003e\n\u003cli\u003eOpenSSH Server\u003c/li\u003e\n\u003cli\u003eTailscale\u003c/li\u003e\n\u003cli\u003eRustDesk\u003c/li\u003e\n\u003cli\u003eDuckDNS\u003c/li\u003e\n\u003cli\u003eBackblaze B2\u003c/li\u003e\n\u003cli\u003eIONOS VPS in Berlin\u003c/li\u003e\n\u003cli\u003eVBScript stager\u003c/li\u003e\n\u003cli\u003ePowerShell loader\u003c/li\u003e\n\u003cli\u003e.NET loader\u003c/li\u003e\n\u003cli\u003ePython keylogger\u003c/li\u003e\n\u003cli\u003eScheduled-task persistence\u003c/li\u003e\n\u003cli\u003eExplorer.exe shellcode injection\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eStart-Process -Verb RunAs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003essh -R\u003c/code\u003e reverse tunnel\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epowercfg\u003c/code\u003e standby-timeout changes\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that legitimate remote-access tools are used by other actors. It says China’s APT31 used Tailscale through 2024 and 2025 to tunnel out of Russian IT firms, Scattered Spider has used legitimate remote-access tools such as Ngrok and Fleetdeck, and RustDesk has appeared in recent Akira ransomware intrusions.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-hunting-guidance\"\u003eDetection and Hunting Guidance\u003c/h2\u003e\n\n\u003cp\u003eCato’s hunting guidance focuses on the behaviors and access paths that allowed the attacker to persist beyond the C2 outage. The article lists the following concrete items to watch:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlert when OpenSSH Server is installed on a Windows workstation.\u003c/li\u003e\n\u003cli\u003eWatch for \u003ccode\u003etailscale.exe\u003c/code\u003e on machines that have no reason to run a VPN.\u003c/li\u003e\n\u003cli\u003eLook for \u003ccode\u003essh -R\u003c/code\u003e reverse tunnels to outside hosts.\u003c/li\u003e\n\u003cli\u003eCheck for \u003ccode\u003ewscript.exe\u003c/code\u003e running \u003ccode\u003e.vbs\u003c/code\u003e files from user staging folders.\u003c/li\u003e\n\u003cli\u003eFlag scheduled tasks set to highest privileges that launch script interpreters.\u003c/li\u003e\n\u003cli\u003eWatch for \u003ccode\u003epowercfg\u003c/code\u003e standby-timeout changes that keep machines awake.\u003c/li\u003e\n\u003cli\u003eBlock DuckDNS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe broader guidance is to assume that a discovered C2 server may not be the attacker’s only way into the environment. The article stresses that defenders should hunt for quiet persistence layers such as OpenSSH, Tailscale, scheduled tasks, and keyloggers rather than stopping at C2 disruption.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main significance is not that Poisson used novel malware or highly advanced techniques. It emphasizes that familiar, legitimate tools can preserve attacker access even when obvious C2 infrastructure disappears. Because tools like OpenSSH, Tailscale, and RustDesk are legitimate and signed, detection focused only on malicious files may miss the behavior.\u003c/p\u003e\n\n\u003cp\u003eThe case provides command-level evidence that this approach can outlive a C2 takedown. The article concludes that the C2 was only one way into the intrusion, not the intrusion itself. If defenders remove the C2 but leave OpenSSH, Tailscale, the scheduled task, and the keylogger in place, the attacker still has a path back in.\u003c/p\u003e\n","keyPoints":["A French-speaking attacker known as \"Poisson\" compromised a small French automotive business, installed a keylogger, and stole banking and email credentials.","Before his Havoc command-and-control server went offline, Poisson installed OpenSSH Server and Tailscale on a victim machine to maintain access outside the C2 channel.","Cato Networks captured 339 commands over 33 days after the operator left SSH keys and a step-by-step playbook in an open storage bucket.","The intrusion used a VBScript stager, PowerShell loader, .NET loader, Havoc Demon agent, scheduled-task persistence, Explorer.exe injection, RustDesk, and a Python keylogger.","Cato Networks recommended hunting for OpenSSH Server on Windows workstations, tailscale.exe on unexpected machines, ssh -R reverse tunnels, suspicious wscript.exe activity, high-privilege scheduled tasks launching script interpreters, powercfg standby-timeout changes, and DuckDNS usage."],"insights":["C2 takedown alone is ineffective if an attacker has already deployed legitimate remote-access tools such as OpenSSH and Tailscale as an independent persistence layer.","Even a junior operator with poor tradecraft and frequent operational mistakes can maintain meaningful access by combining free-tier infrastructure, signed legitimate tools, and simple manual credential theft.","Behavioral detections are more important than file reputation in this case because the attacker relied on legitimate binaries such as Tailscale, OpenSSH, and RustDesk rather than only obviously malicious files.","Windows workstation installation of OpenSSH Server, unexpected tailscale.exe execution, and ssh -R reverse tunnels are high-value signals because they can reveal attacker-controlled access paths that do not depend on the primary C2 infrastructure."],"referencedReports":[{"title":"Operation Poisson: Analyzing a Cybercriminal’s Entire Operation","url":"https://www.catonetworks.com/blog/cato-ctrl-operation-poisson-analyzing-a-cybercriminals-entire-operation/","publisher":"Cato Networks / Cato CTRL","context":"The article says Cato CTRL researcher Vitaly Simonovich published a write-up capturing the attacker’s operation command by command over 33 days.","category":"","primary":false}],"body":"\u003cp\u003eA French-speaking attacker using the handle “Poisson” compromised a small French automotive business, planted a keylogger, and stole banking and email credentials. Cato Networks captured the operation command by command, totaling 339 commands over 33 days, after the operator left SSH keys and a step-by-step playbook in an open storage bucket. The article emphasizes that the attacker was not described as an APT and appeared to be a junior operator using free-tier and low-cost infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe most important move came near the end of the intrusion, when Poisson installed OpenSSH Server and Tailscale on a victim machine before his Havoc command-and-control server went offline. This gave him an access path that did not depend on the C2 server, and when the Havoc infrastructure went down the next day, his access remained. When the C2 returned 18 days later, the agents reconnected automatically and he continued operating.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion chain included a VBScript stager, a PowerShell loader, a .NET loader, Havoc’s Demon agent, scheduled-task persistence, Explorer.exe injection, RustDesk, and a simple Python keylogger. Cato’s hunting recommendations included watching for OpenSSH Server on Windows workstations, unexpected tailscale.exe use, ssh -R reverse tunnels, suspicious wscript.exe execution, high-privilege scheduled tasks launching script interpreters, powercfg changes that prevent sleep, and DuckDNS usage.\u003c/p\u003e\n"},{"n":3,"title":"EU grants Ukraine access to cybersecurity reserve for major attacks","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/ukraine-access-eu-cybersecurity-reserve","time":"16:33","priority":"MAY READ","score":69,"tldr":"Ukraine has been granted access to the EU Cybersecurity Reserve, allowing it to request EU-approved experts for major cyberattacks that exceed its own response capacity. The move deepens EU-Ukraine security cooperation and integrates Kyiv further into Europe’s collective cyber defense framework.","briefOverview":"\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, allowing Kyiv to call on EU-approved experts during major cyberattacks. The European Commission said EU member states approved Ukraine\u0026rsquo;s participation in the reserve, which is a pool of private cybersecurity companies that can be rapidly deployed to help governments and critical infrastructure operators. The reserve is managed by ENISA and is intended for cyber incidents that exceed a participating country\u0026rsquo;s own capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe decision has both practical and political significance for Ukraine as it continues to face cyberattacks during the war with Russia. Natalia Tkachuk of Ukraine\u0026rsquo;s National Security and Defense Council said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism before obtaining formal EU membership. The move comes as EU member states agreed to launch formal accession negotiations with Kyiv.\u003c/p\u003e\n\n\u003cp\u003eUkraine will be able to request emergency European assistance for digital forensics, incident response, and system recovery if its own teams are overwhelmed. The Cyber Reserve can also support post-incident recovery, system modernization, threat intelligence sharing, and improvements to national cyber incident response capabilities. Ukraine also expects the relationship to be reciprocal, with Ukrainian agencies sharing intelligence on Russian hacking techniques and participating in joint investigations with European partners.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, giving Kyiv the ability to request EU-approved experts during major cyberattacks. The European Commission announced that EU member states had approved Ukraine\u0026rsquo;s participation in the reserve. The reserve is a pool of private cybersecurity companies that can be rapidly deployed to help governments and critical infrastructure operators respond to large-scale cyber incidents.\u003c/p\u003e\n\n\u003cp\u003eThe EU Cybersecurity Reserve is managed by the European Union Agency for Cybersecurity, known as ENISA. It was established to provide incident response, technical expertise, and recovery support to participating countries facing cyberattacks that exceed their own capabilities. Moldova became the first non-EU country to gain access to the reserve last year because of increasing Moscow-linked cyberthreats and influence operations.\u003c/p\u003e\n\n\u003cp\u003eFor Ukraine, the article says the decision has political significance as well as practical benefits because the country continues to face relentless cyberattacks during the war with Russia. Natalia Tkachuk, head of cyber and information security at Ukraine\u0026rsquo;s National Security and Defense Council, said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism even before formal EU membership. The move also follows an agreement by EU member states to launch formal accession negotiations with Kyiv.\u003c/p\u003e\n\n\u003cp\u003eAccording to Tkachuk, Ukraine will be able to request emergency European assistance if a cyberattack exceeds the capacity of its own incident response teams. Specialized experts from across the EU could provide digital forensics, incident response, and system recovery support. The Cyber Reserve can also help with post-incident recovery, system modernization, cyberthreat intelligence sharing, and strengthening national cyber incident response capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe relationship is expected to be reciprocal rather than one-way assistance. Tkachuk said Ukrainian agencies already share intelligence on Russian hacking techniques with European partners and participate in joint cybercrime investigations and attribution efforts with Europol and other European authorities. The article also says years of responding to Russian cyberattacks have strengthened Ukraine\u0026rsquo;s government and private-sector cyber capabilities.\u003c/p\u003e\n\n\u003cp\u003eUkraine hopes its own cybersecurity companies will eventually be able to join the Cyber Reserve as trusted service providers under the EU\u0026rsquo;s Cyber Solidarity Act. European Commission Executive Vice President Henna Virkkunen said welcoming Ukraine into the reserve strengthens collective defenses and reaffirms European digital solidarity. The article notes that the EU has become one of Ukraine\u0026rsquo;s closest cybersecurity partners since Russia\u0026rsquo;s 2022 invasion, including through bilateral security agreements and the Tallinn Mechanism.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, enabling Kyiv to call on EU-approved experts during major cyberattacks. The European Commission announced that EU member states approved Ukraine\u0026rsquo;s participation in the reserve. The decision gives Ukraine access to a mechanism designed to support governments and critical infrastructure operators during large-scale cyber incidents.\u003c/p\u003e\n\n\u003cp\u003eThe reserve is managed by the European Union Agency for Cybersecurity, or ENISA. It consists of private cybersecurity companies that can be rapidly deployed when participating countries face cyber incidents that exceed their own response capabilities. The reserve provides incident response, technical expertise, and recovery support.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-ukraine\"\u003eSignificance for Ukraine\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the decision as both politically significant and practically beneficial for Ukraine. Ukraine continues to face relentless cyberattacks during the ongoing war with Russia. Natalia Tkachuk, head of cyber and information security at Ukraine\u0026rsquo;s National Security and Defense Council, said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism even before formal EU membership.\u003c/p\u003e\n\n\u003cp\u003eThe move comes shortly after EU member states agreed to launch formal accession negotiations with Kyiv. The article presents Ukraine\u0026rsquo;s access to the reserve as another sign of deepening security cooperation between Brussels and Kyiv as Ukraine moves closer to eventual EU membership.\u003c/p\u003e\n\n\u003ch2 id=\"what-ukraine-can-request\"\u003eWhat Ukraine Can Request\u003c/h2\u003e\n\n\u003cp\u003eAccording to Tkachuk, Ukraine will be able to officially request emergency European assistance if a cyberattack exceeds the
