<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Inside AD CS Escalation: Unpacking Advanced Misuse Techniques and Tools","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/active-directory-certificate-services-exploitation/","time":"22:00","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Attackers heavily exploit misconfigured Active Directory Certificate Services and shadow credential abuse to achieve stealthy privilege escalation and persistence, making strict configuration hygiene and behavioral monitoring essential for detection.","briefOverview":"\u003cp\u003eActive Directory Certificate Services (AD CS) serves as a foundational component of enterprise infrastructure but frequently suffers from insecure default configurations that adversaries actively exploit. Attackers leverage misconfigured certificate templates and shadow credential abuse to escalate privileges and establish long-term persistence without relying on traditional malware or zero-day vulnerabilities. The exploitation lifecycle typically progresses from initial low-privileged access through template enumeration and certificate requests to sustained access via cryptographic key manipulation. Common misconfigurations include overly permissive enrollment rights and disabled manager approvals that allow attackers to impersonate privileged accounts. Effective defense requires strict configuration hygiene combined with behavioral detection strategies that correlate certificate issuance events, directory modifications, and unusual LDAP reconnaissance activity. Organizations must monitor specific Windows Event IDs and track anomalous authentication patterns to uncover these stealthy abuse techniques before they result in full domain compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eActive Directory Certificate Services (AD CS) is a critical public key infrastructure component responsible for issuing digital certificates that enable user authentication and secure communications across enterprise networks. Despite its importance, AD CS remains a high-impact attack surface due to widespread misconfigurations, complex permission structures, and limited native monitoring capabilities. Adversaries consistently exploit these weaknesses to escalate privileges and maintain persistence by misusing native certificate issuance workflows rather than deploying traditional malware. The attack lifecycle generally begins with initial access through compromised low-privileged accounts, followed by discovery of certificate authorities and template permissions. Exploitation occurs when attackers request certificates from misconfigured templates that allow subject impersonation or lack manager approval requirements. Once obtained, these certificates facilitate privilege escalation through Kerberos authentication and enable lateral movement across the network. Attackers frequently combine certificate template abuse with shadow credential techniques, which involve registering cryptographic keys in the msDS-KeyCredentialLink attribute to achieve passwordless, persistent access. This persistence mechanism remains effective even after standard password resets or certificate revocations. A growing ecosystem of open-source tools, including Certify, Certipy, Whisker, and pyWhisker, has significantly lowered the technical barrier for executing these attacks. Both financially motivated ransomware groups and state-sponsored actors actively utilize these techniques in the wild. Detection requires moving beyond signature-based approaches to implement behavioral analytics that correlate multiple data sources. Security teams must monitor specific Windows Event IDs for certificate requests, template modifications, and directory attribute changes. Additionally, tracking anomalous LDAP queries targeting certificate templates and key attributes provides early warning signals of adversarial reconnaissance. By maintaining secure template configurations and correlating authentication telemetry, defenders can effectively identify and respond to stealthy AD CS exploitation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary-and-threat-landscape\"\u003eExecutive Summary and Threat Landscape\u003c/h3\u003e\n\n\u003cp\u003eActive Directory Certificate Services (AD CS) functions as the backbone of enterprise public key infrastructure, managing digital certificates that authenticate users, devices, and services across corporate networks. Despite its critical role, AD CS is frequently undermined by insecure default configurations, overly permissive enrollment rights, and complex template management that security teams hesitate to modify. These structural weaknesses have established AD CS as a primary vector for privilege escalation and unauthorized identity impersonation in modern environments. Unlike traditional vulnerability exploitation, AD CS attacks rarely depend on zero-day exploits or malware execution. Instead, adversaries systematically misuse native certificate issuance mechanisms to impersonate privileged accounts and establish long-term persistence.\u003c/p\u003e\n\n\u003ch3 id=\"attack-lifecycle-and-operational-phases\"\u003eAttack Lifecycle and Operational Phases\u003c/h3\u003e\n\n\u003cp\u003eThe exploitation of AD CS follows a structured five-phase lifecycle that transforms a single compromised account into enterprise-wide dominance. The process begins with initial access through phishing or credential theft, followed by comprehensive discovery of certificate authorities, template permissions, and account keys. During the exploitation phase, attackers submit certificate requests against misconfigured templates to impersonate high-privileged accounts. These certificates are then utilized for Kerberos authentication, enabling privilege escalation and lateral movement across the network. The final phase focuses on persistence, where attackers leverage shadow credentials and key trust mechanisms to maintain access that survives password resets and certificate revocations.\u003c/p\u003e\n\n\u003ch3 id=\"core-exploitation-techniques\"\u003eCore Exploitation Techniques\u003c/h3\u003e\n\n\u003cp\u003eCertificate template misuse represents the most consistently observed escalation method, particularly through the ESC1 technique. ESC1 exploits templates configured with low-privileged enrollment rights, disabled manager approval, and the ENROLLEE_SUPPLIES_SUBJECT flag that allows requesters to define certificate subjects. This configuration enables attackers to mint authentication certificates for privileged accounts they should not control. Shadow credential abuse operates through the msDS-KeyCredentialLink attribute, which stores cryptographic keys for Windows Hello for Business and smartcard authentication. Attackers manipulate this attribute to register their own public keys against target accounts, creating passwordless authentication paths that bypass traditional credential rotation defenses. Key techniques include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eESC1 template exploitation for privilege escalation\u003c/li\u003e\n\u003cli\u003eShadow credential registration for persistent access\u003c/li\u003e\n\u003cli\u003ePKINIT authentication for Kerberos ticket requests\u003c/li\u003e\n\u003cli\u003eLDAP enumeration for template and attribute discovery\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"adversarial-tooling-and-ecosystem\"\u003eAdversarial Tooling and Ecosystem\u003c/h3\u003e\n\n\u003cp\u003eA rapidly expanding toolkit of open-source utilities has democratized AD CS exploitation across the threat landscape. Certify and Certipy serve as primary enumeration and exploitation frameworks for identifying vulnerable templates and executing ESC-style attacks. PKINITtools extends this capability into Kerberos authentication by leveraging certificates to request Ticket Granting Tickets. Whisker and pyWhisker specialize in shadow credential manipulation, directly modifying the msDS-KeyCredentialLink attribute to establish persistent access. The widespread availability of these tools has significantly lowered the technical expertise required to execute sophisticated AD CS attacks.\u003c/p\u003e\n\n\u003ch3 id=\"detection-strategies-and-telemetry-correlation\"\u003eDetection Strategies and Telemetry Correlation\u003c/h3\u003e\n\n\u003cp\u003eEffective defense against AD CS abuse requires behavioral analytics that correlate multiple event types across authentication and directory services. Security teams must monitor specific Windows Event IDs, including 4886 and 4887 for certificate requests and issuance, 4898 for template loading, and 5136 for directory object modifications. Correlating these events with Kerberos authentication requests (\u003csup\u003e4768\u003c/sup\u003e\u0026frasl;\u003csub\u003e4769\u003c/sub\u003e) reveals attempts to leverage stolen or shadow credentials for lateral movement. LDAP reconnaissance activity serves as a critical early warning indicator, with attackers executing high-volume queries targeting pKICertificateTemplate, PKI-Enrollment-Service, and msDS-KeyCredentialLink attributes. Monitoring for these specific LDAP queries, combined with tracking unusual enrollment patterns and SAN usage, enables defenders to identify adversarial activity before privilege escalation occurs.\u003c/p\u003e\n","keyPoints":["Active Directory Certificate Services is frequently exploited by adversaries through misconfigured certificate templates and shadow credential abuse to achieve privilege escalation and maintain persistent access.","Attackers utilize open-source tools such as Certify, Certipy, Whisker, and pyWhisker to enumerate vulnerable templates and register cryptographic keys against the msDS-KeyCredentialLink attribute.","Effective detection requires correlating specific Windows Event IDs, including certificate issuance events, directory modifications, and Kerberos authentication requests, with unusual LDAP reconnaissance activity.","The exploitation lifecycle typically progresses from initial low-privileged access through template enumeration and certificate request to long-term persistence via shadow credentials and key trust misuse."],"insights":["Shadow credentials stored in the msDS-KeyCredentialLink attribute enable persistent authentication that survives password resets and certificate revocations, bypassing standard credential rotation defenses.","Adversaries conduct early reconnaissance by executing high-volume LDAP queries specifically targeting pKICertificateTemplate, PKI-Enrollment-Service, and msDS-KeyCredentialLink objects, making anomalous LDAP traffic a strong initial detection signal.","The ESC1 technique is the most consistently exploited escalation path, relying on templates configured with disabled manager approval and authorized signatures while enabling the ENROLLEE_SUPPLIES_SUBJECT flag for subject impersonation.","Open-source AD CS exploitation tools like Certipy and pyWhisker are actively deployed by both ransomware groups (e.g., Fog) and state-sponsored actors (e.g., Fighting Ursa), significantly lowering the technical barrier for privilege escalation attacks."],"referencedReports":[{"title":"Navigating Through The Fog","url":"https://thedfirreport.com/2025/04/28/navigating-through-the-fog/","publisher":"The DFIR Report","context":"The article cites this report for identifying an exposed toolkit associated with the Fog ransomware group that leverages AD CS abuse."},{"title":"Cybersecurity Advisory AA25-141A","url":"https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-141a","publisher":"U.S. Cybersecurity and Infrastructure Security Agency (CISA)","context":"Referenced as a 2025 advisory detailing a cyberespionage campaign attributed to Fighting Ursa that utilized AD CS enumeration and exploitation techniques."},{"title":"Certifried: Active Directory Domain Privilege Escalation (CVE-2022–26923)","url":"https://research.ifcr.dk/certifried-active-directory-domain-privilege-escalation-cve-2022-26923-9e098fe298f4","publisher":"Oliver Lyak, Institut For Cyber Risk","context":"Listed in the additional resources as a technical analysis of the CVE-2022-26923 certificate-based privilege escalation vulnerability."},{"title":"Certified Pre-Owned: Abusing Active Directory Certificate Services","url":"https://specterops.io/wp-content/uploads/sites/3/2022/06/Certified_Pre-Owned.pdf","publisher":"SpecterOps","context":"Referenced as the foundational research that originally identified and categorized the ESC1 through ESC8 AD CS escalation techniques."}],"body":"\u003cp\u003eActive Directory Certificate Services (AD CS) serves as a foundational component of enterprise infrastructure but frequently suffers from insecure default configurations that adversaries actively exploit. Attackers leverage misconfigured certificate templates and shadow credential abuse to escalate privileges and establish long-term persistence without relying on traditional malware or zero-day vulnerabilities. The exploitation lifecycle typically progresses from initial low-privileged access through template enumeration and certificate requests to sustained access via cryptographic key manipulation. Common misconfigurations include overly permissive enrollment rights and disabled manager approvals that allow attackers to impersonate privileged accounts. Effective defense requires strict configuration hygiene combined with behavioral detection strategies that correlate certificate issuance events, directory modifications, and unusual LDAP reconnaissance activity. Organizations must monitor specific Windows Event IDs and track anomalous authentication patterns to uncover these stealthy abuse techniques before they result in full domain compromise.\u003c/p\u003e\n"},{"n":3,"title":"Official CheckMarx Jenkins package compromised with infostealer","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/official-checkmarx-jenkins-package-compromised-with-infostealer/","time":"22:03","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"The TeamPCP hacker group compromised the official CheckMarx Jenkins AST plugin using credentials stolen from a prior supply-chain breach, distributing a malicious version that steals user credentials. CheckMarx has directed users to immediately revert to a verified safe version and rotate all secrets to contain the threat.","briefOverview":"\u003cp\u003eThe TeamPCP hacker group compromised the official CheckMarx Jenkins AST plugin by using credentials stolen from a prior supply-chain breach. A malicious version of the plugin was uploaded to the Jenkins Marketplace on May 9, containing code designed to steal user credentials. CheckMarx confirmed this is the third supply-chain incident the company has faced since late March. The company advises users to immediately revert to version 2.0.13-829.vc72453fa_1c16 or an older release. Users who downloaded the rogue version should rotate all secrets and investigate their systems for lateral movement. CheckMarx emphasized that its GitHub repositories are isolated from customer production environments and do not store customer data. The threat actor left a message criticizing the company for failing to rotate secrets. CheckMarx has published indicators of compromise to help defenders identify the malicious artifacts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheckMarx warned that a rogue version of its Jenkins Application Security Testing plugin was published on the Jenkins Marketplace. The compromise was claimed by the TeamPCP hacker group, which has conducted a series of supply-chain attacks targeting developer tools. TeamPCP gained access to CheckMarx\u0026rsquo;s GitHub repositories by using credentials obtained during a March supply-chain attack that affected the Trivy vulnerability scanner. The malicious plugin, identified as version 2026.5.09, was uploaded on May 9 outside of the official release pipeline. This unauthorized upload lacked standard git tags and GitHub releases, and it contained credential-stealing malware. CheckMarx acknowledged the breach and is currently publishing a new secure version of the plugin. The company noted this incident follows previous supply-chain attacks and a data leak by the LAPSUS$ threat group in April. Security guidance recommends that users revert to version 2.0.13-829.vc72453fa_1c16, which was published on December 17, 2025, or use an older release. Anyone who installed the malicious plugin should assume their credentials are compromised and immediately rotate all secrets. Organizations should also investigate their environments for signs of lateral movement or persistent access. CheckMarx clarified that its GitHub repositories are completely isolated from customer production environments. The company stated that no customer data is stored within those repositories.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eCheckMarx issued a security alert regarding a compromised version of its Jenkins Application Security Testing (AST) plugin. The malicious artifact was distributed through the Jenkins Marketplace and is attributed to the TeamPCP hacker group. This incident represents the third supply-chain attack targeting CheckMarx since late March. The threat actor previously breached the company\u0026rsquo;s infrastructure by leveraging credentials stolen from the Trivy vulnerability scanner supply-chain attack.\u003c/p\u003e\n\n\u003ch3 id=\"attack-methodology-and-timeline\"\u003eAttack Methodology and Timeline\u003c/h3\u003e\n\n\u003cp\u003eTeamPCP utilized the stolen credentials to interact directly with CheckMarx\u0026rsquo;s GitHub environment. The group backdoored the Jenkins AST plugin to deliver credential-stealing malware. A rogue version, labeled 2026.5.09, was uploaded to repo.jenkins-ci.org on May 9. This upload bypassed the official release pipeline and omitted standard git tags and GitHub releases. The threat actor maintained unauthorized access for at least a month before deploying the malicious code. TeamPCP also left a message in the plugin\u0026rsquo;s about section criticizing the company for failing to rotate secrets.\u003c/p\u003e\n\n\u003ch3 id=\"impact-and-affected-systems\"\u003eImpact and Affected Systems\u003c/h3\u003e\n\n\u003cp\u003eThe compromised plugin integrates security scanning into automated software development pipelines. It was distributed alongside other developer tools on platforms including GitHub, Docker, Open VSX, and VSCode. The malicious code is designed to harvest data and steal credentials from developer environments. CheckMarx confirmed that previous attacks also resulted in the publication of backdoored artifacts across multiple distribution channels. The LAPSUS$ threat group previously leaked data from CheckMarx\u0026rsquo;s private GitHub repository in April.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-security-guidance\"\u003eMitigation and Security Guidance\u003c/h3\u003e\n\n\u003cp\u003eCheckMarx advises all users to immediately revert to version 2.0.13-829.vc72453fa_1c16, which was published on December 17, 2025, or to use an older release. Users who downloaded the malicious version should assume their credentials are compromised and rotate all secrets immediately. Organizations are urged to investigate their environments for signs of lateral movement or persistent access. CheckMarx has published a set of indicators of compromise to help defenders identify malicious artifacts. The company has communicated directly with customers and provided additional recommendations through its Security Updates section and Support Portal.\u003c/p\u003e\n\n\u003ch3 id=\"data-isolation-and-customer-impact\"\u003eData Isolation and Customer Impact\u003c/h3\u003e\n\n\u003cp\u003eCheckMarx explicitly stated that its GitHub repositories are isolated from its customer production environments. The company confirmed that no customer data is stored within the compromised GitHub repositories. While the threat actor successfully backdoored internal development tools and plugins, customer data remains unaffected. CheckMarx continues to provide ongoing security updates and will share further information as it becomes available.\u003c/p\u003e\n","keyPoints":["The TeamPCP hacker group compromised CheckMarx's Jenkins AST plugin by using credentials stolen from a prior supply-chain attack to access the company's GitHub repositories.","A rogue version of the plugin was uploaded to the Jenkins Marketplace on May 9, containing malicious code designed to steal credentials.","CheckMarx advised users to revert to version 2.0.13-829.vc72453fa_1c16 or an older release and rotate all secrets.","CheckMarx confirmed that its GitHub repositories are isolated from customer production environments and do not store customer data."],"insights":["The malicious plugin was uploaded outside the official release pipeline and lacked standard git tags or GitHub releases, indicating direct unauthorized repository commits rather than automated build system exploitation.","Security guidance explicitly advises users to revert to or remain on the December 2025 build instead of updating to newer versions, prioritizing known-safe artifacts over automatic updates.","The threat actor leveraged credentials from a prior supply-chain breach to maintain persistent access for over a month and successfully pivot across multiple distribution channels, including GitHub, Docker, Open VSX, and Jenkins."],"referencedReports":[],"body":"\u003cp\u003eThe TeamPCP hacker group compromised the official CheckMarx Jenkins AST plugin by using credentials stolen from a prior supply-chain breach. A malicious version of the plugin was uploaded to the Jenkins Marketplace on May 9, containing code designed to steal user credentials. CheckMarx confirmed this is the third supply-chain incident the company has faced since late March. The company advises users to immediately revert to version 2.0.13-829.vc72453fa_1c16 or an older release. Users who downloaded the rogue version should rotate all secrets and investigate their systems for lateral movement. CheckMarx emphasized that its GitHub repositories are isolated from customer production environments and do not store customer data. The threat actor left a message criticizing the company for failing to rotate secrets. CheckMarx has published indicators of compromise to help defenders identify the malicious artifacts.\u003c/p\u003e\n"},{"n":2,"title":"New GhostLock tool abuses Windows API to block file access","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-ghostlock-tool-abuses-windows-api-to-block-file-access/","time":"22:02","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"GhostLock abuses the Windows CreateFileW API to lock files and block access without elevated privileges, creating a disruption attack that evades standard detection by generating legitimate file open requests.","briefOverview":"\u003cp\u003eA security researcher has released GhostLock, a proof-of-concept tool that abuses the Windows CreateFileW API to block file access. By setting the dwShareMode parameter to zero, the technique grants exclusive access to files and prevents other processes from opening them. This method works on both local files and SMB network shares without requiring elevated privileges. The attack primarily causes operational disruption rather than data destruction, similar to a denial-of-service event. Attackers could use these file locks as a decoy to overwhelm IT staff while conducting other malicious activities. Traditional detection methods often miss this technique because it relies on legitimate file open requests instead of encryption or mass writes. Reliable identification requires monitoring open-file counts with zero share access at the file server layer. The researcher has published detection templates and mitigation guidance in an accompanying whitepaper.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGhostLock is a proof-of-concept tool developed by Kim Dvash of Israel Aerospace Industries that demonstrates how to abuse the Windows CreateFileW API. The technique leverages the dwShareMode parameter by setting it to zero, which grants a process exclusive access to a file. When this setting is active, Windows blocks all other users and applications from opening the targeted file. The researcher has published an automated tool on GitHub that recursively opens numerous files across SMB shares to maximize the disruption. Standard domain users can execute this attack without needing any elevated privileges. The impact is strictly disruption-based, causing operational downtime rather than data loss like ransomware. Attackers can deploy this technique across multiple compromised devices simultaneously to create widespread access blocks. The tool is designed to continuously reacquire file handles even when terminated processes are replaced, sustaining the lock. However, the disruption ends automatically once the SMB session terminates, the processes are killed, or the system reboots. This method is particularly effective as a decoy during intrusions, as the file-access disruptions can overwhelm IT staff. Traditional security products focus on detecting mass file writes or encryption operations, making GhostLock difficult to spot. The only reliable detection metric is the per-session open-file count with ShareAccess equal to zero at the file server layer. This metric exists within storage platform management interfaces rather than Windows event logs or EDR telemetry. The researcher has shared SIEM queries and network detection rules in a whitepaper to help defenders identify the activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview\"\u003eOverview\u003c/h3\u003e\n\n\u003cp\u003eGhostLock is a proof-of-concept security tool created by Kim Dvash of Israel Aerospace Industries. It demonstrates how attackers can abuse the Windows CreateFileW API to block file access on local systems and SMB network shares. The technique relies on manipulating the dwShareMode parameter to enforce exclusive file locks.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h3\u003e\n\n\u003cp\u003eThe attack operates by calling the CreateFileW function with the dwShareMode parameter set to zero. This configuration grants the initiating process exclusive access to the file. Windows subsequently returns a STATUS_SHARING_VIOLATION error to any other process attempting to open the locked file. The researcher provided a code example showing how to open a finance.xlsx file in exclusive mode using this method.\u003c/p\u003e\n\n\u003ch3 id=\"execution-and-impact\"\u003eExecution and Impact\u003c/h3\u003e\n\n\u003cp\u003eThe GhostLock tool automates this process by recursively opening a large number of files across SMB shares. It requires only standard domain user privileges to function, eliminating the need for elevated access. Attackers can scale the disruption by launching the tool from multiple compromised devices simultaneously. The tool is designed to continuously reacquire file handles as terminated processes are replaced, maintaining the lock. Once the SMB session ends, the processes are killed, or the system reboots, Windows automatically closes the handles and restores normal access. The researcher classifies the impact as disruption-based rather than destructive, drawing a parallel to operational downtime windows rather than ransomware data loss.\u003c/p\u003e\n\n\u003ch3 id=\"detection-challenges\"\u003eDetection Challenges\u003c/h3\u003e\n\n\u003cp\u003eTraditional security products and behavioral detection systems typically focus on mass file writes or encryption operations. GhostLock evades these controls by generating large volumes of legitimate file open requests. The attack lacks the typical telemetry signatures found in Windows event logs, EDR data, or network flow records. The only reliable observable for detection is the per-session open-file count with ShareAccess equal to zero at the file server layer. This metric resides within storage platform management interfaces rather than standard endpoint or network monitoring tools.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-resources\"\u003eMitigation and Resources\u003c/h3\u003e\n\n\u003cp\u003eDefenders can use the researcher\u0026rsquo;s whitepaper to implement detection templates. The document includes SIEM queries and NDR detection rules designed to identify the abnormal file locking patterns. The tool and technical documentation are publicly available on GitHub and Zenodo. Security teams should monitor file server layer metrics to identify unauthorized exclusive file locks.\u003c/p\u003e\n","keyPoints":["GhostLock abuses the Windows CreateFileW API with a zero share mode to lock files and block access without requiring elevated privileges.","The technique operates as a disruption attack that causes operational downtime rather than destroying data like ransomware.","Traditional security tools often fail to detect the attack because it relies on legitimate file open requests instead of mass file writes or encryption.","Effective detection requires monitoring the per-session open-file count with ShareAccess equal to zero at the file server layer."],"insights":["Detection relies on storage platform management interfaces rather than traditional Windows event logs or EDR telemetry, as the attack generates legitimate file open requests that bypass standard behavioral detection.","The technique's disruption nature allows attackers to use widespread file locks as a tactical decoy to overwhelm IT staff while conducting lateral movement or data exfiltration.","Standard domain users can execute the attack without elevated privileges, and coordinating it across multiple compromised devices creates a scalable disruption that only resolves upon session termination or system reboot."],"referencedReports":[{"title":"GhostLock whitepaper","url":"https://zenodo.org/records/20070064","publisher":"Kim Dvash","context":"The article references this document as containing SIEM queries and NDR detection rules that defenders can use as templates for identifying the attack."}],"body":"\u003cp\u003eA security researcher has released GhostLock, a proof-of-concept tool that abuses the Windows CreateFileW API to block file access. By setting the dwShareMode parameter to zero, the technique grants exclusive access to files and prevents other processes from opening them. This method works on both local files and SMB network shares without requiring elevated privileges. The attack primarily causes operational disruption rather than data destruction, similar to a denial-of-service event. Attackers could use these file locks as a decoy to overwhelm IT staff while conducting other malicious activities. Traditional detection methods often miss this technique because it relies on legitimate file open requests instead of encryption or mass writes. Reliable identification requires monitoring open-file counts with zero share access at the file server layer. The researcher has published detection templates and mitigation guidance in an accompanying whitepaper.\u003c/p\u003e\n"},{"n":4,"title":"GM agrees to $12.75M California settlement over sale of drivers’ data","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/legal/gm-agrees-to-1275m-california-settlement-over-sale-of-drivers-data/","time":"22:40","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"General Motors agreed to pay a record $12.75 million settlement to California for illegally collecting and selling drivers' location and driving data to third-party brokers, and must delete retained data and halt sales for five years.","briefOverview":"\u003cp\u003eCalifornia Attorney General Rob Bonta announced a $12.75 million settlement with General Motors for violating the California Consumer Privacy Act. The investigation found that GM illegally collected and sold drivers\u0026rsquo; location and driving data to brokers Verisk Analytics and LexisNexis Risk Solutions between 2020 and 2024. This data was gathered through GM\u0026rsquo;s OnStar subsidiary and Smart Driver system for insurance scoring purposes.\u003c/p\u003e\n\n\u003cp\u003eThe company previously faced a five-year sales ban from the FTC for similar unlawful data collection practices. Under the new agreement, GM must stop selling driving data for five years and delete retained information within 180 days unless consumers explicitly consent. The settlement also requires GM to order the data brokers to delete previously sold information and establish a stronger privacy compliance program.\u003c/p\u003e\n\n\u003cp\u003eThis $12.75 million penalty represents a record amount in California and marks the state\u0026rsquo;s first enforcement action focused on data minimization rules. Officials noted that California drivers are unlikely to face higher insurance premiums due to existing state laws prohibiting insurers from using driving data for rate setting. GM has not yet responded to requests for comment regarding the settlement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCalifornia Attorney General Rob Bonta announced a $12.75 million settlement with General Motors over allegations that the automaker violated the California Consumer Privacy Act. The violations stem from claims that GM illegally collected and sold Californians\u0026rsquo; driving and location data to third-party brokers Verisk Analytics and LexisNexis Risk Solutions. This unauthorized data sharing occurred between 2020 and 2024 through GM\u0026rsquo;s OnStar subsidiary and its Smart Driver system.\u003c/p\u003e\n\n\u003cp\u003eThe information was reportedly intended for driver-scoring products used by insurance companies. The investigation into these practices began in 2024 after media reports highlighted automakers sharing driver behavior with insurers. State authorities determined that GM failed to properly notify consumers or obtain consent for this data collection.\u003c/p\u003e\n\n\u003cp\u003eThe company also retained the data longer than necessary and re-purposed it for sale, generating approximately $20 million nationwide. Attorney General Bonta stated that GM sold California drivers\u0026rsquo; data without knowledge or consent despite previous assurances against doing so. The collected information included precise location data capable of identifying the daily habits and movements of individuals.\u003c/p\u003e\n\n\u003cp\u003eThe $12.75 million civil penalty sets a new record for California and represents the state\u0026rsquo;s first enforcement action centered on data minimization rules. In addition to the financial penalty, GM must cease selling driving data to consumer reporting agencies and brokers for five years. The automaker is required to delete retained driving data within 180 days unless consumers provide explicit consent for retention.\u003c/p\u003e\n\n\u003cp\u003eGM must also instruct Verisk and LexisNexis to delete the data they previously received. Furthermore, the company must implement a stronger privacy compliance program and submit regular assessments to regulators. Officials indicated that California drivers are unlikely to experience higher insurance premiums because state law already prohibits insurers from using driving data to set rates. BleepingComputer contacted GM for a comment on the announcement but has not received a response by publication time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eCalifornia Attorney General Rob Bonta has announced a record-breaking $12.75 million settlement with General Motors for violations of the California Consumer Privacy Act. The settlement addresses the illegal collection and sale of driver location and behavior data to third-party data brokers. This enforcement action marks a significant regulatory milestone for data minimization compliance.\u003c/p\u003e\n\n\u003ch3 id=\"background-and-investigation\"\u003eBackground and Investigation\u003c/h3\u003e\n\n\u003cp\u003eThe investigation into GM\u0026rsquo;s data practices began in 2024 following media reports about automakers sharing driver behavior information with insurance entities. State authorities found that GM illegally collected and sold Californians\u0026rsquo; driving and location data to Verisk Analytics and LexisNexis Risk Solutions between 2020 and 2024. This data was gathered through GM\u0026rsquo;s OnStar subsidiary and its Smart Driver system.\u003c/p\u003e\n\n\u003cp\u003eThe collected information was reportedly intended for driver-scoring products related to insurance underwriting. California officials determined that GM failed to properly notify consumers or obtain consent for the data collection. The automaker retained the data longer than necessary and re-purposed it for commercial sale.\u003c/p\u003e\n\n\u003cp\u003eAttorney General Bonta emphasized that GM sold the data without knowledge or consent despite previous public statements guaranteeing it would not do so. The trove of information included precise location data capable of identifying the everyday habits and movements of California residents. This case follows previous scrutiny from the U.S. Federal Trade Commission, which previously banned GM from selling drivers\u0026rsquo; location data for five years.\u003c/p\u003e\n\n\u003ch3 id=\"settlement-requirements-and-compliance-mandates\"\u003eSettlement Requirements and Compliance Mandates\u003c/h3\u003e\n\n\u003cp\u003eThe $12.75 million civil penalty represents a record amount in California\u0026rsquo;s history. It also stands as the state\u0026rsquo;s first enforcement action specifically focused on data minimization rules. The agreement imposes several strict operational requirements on General Motors. The automaker must immediately stop selling driving data to consumer reporting agencies and brokers for a period of five years.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGM is required to delete all retained driving data within 180 days unless consumers explicitly consent to its retention.\u003c/li\u003e\n\u003cli\u003eThe company must also formally request that Verisk Analytics and LexisNexis Risk Solutions delete the previously sold data.\u003c/li\u003e\n\u003cli\u003eAdditionally, GM must implement a stronger privacy compliance program and submit regular assessments to state regulators.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"impact-on-consumers-and-market\"\u003eImpact on Consumers and Market\u003c/h3\u003e\n\n\u003cp\u003eState officials noted that California drivers are unlikely to face higher insurance premiums as a direct result of GM\u0026rsquo;s data sales. This is due to existing state laws that prohibit insurers from using driving data to set insurance rates. BleepingComputer contacted GM for a comment regarding the California announcement but has not received a response by the time of publication. The settlement concludes a major privacy enforcement action while establishing new precedents for data lifecycle management.\u003c/p\u003e\n","keyPoints":["General Motors agreed to pay a record $12.75 million settlement to California for violating the California Consumer Privacy Act by illegally collecting and selling drivers' location and driving data.","The company collected this data between 2020 and 2024 through its OnStar subsidiary and Smart Driver system without proper consumer notification or consent.","As part of the settlement, GM must stop selling driving data to brokers for five years and delete retained data within 180 days unless consumers explicitly consent to retention.","The settlement also requires GM to instruct data brokers Verisk Analytics and LexisNexis Risk Solutions to delete the previously sold information and implement a stronger privacy compliance program."],"insights":["The settlement marks California's first enforcement action specifically targeting data minimization violations, signaling a regulatory shift from basic consent compliance to proactive data lifecycle management.","GM must mandate third-party brokers like Verisk and LexisNexis to delete previously sold data, establishing that data minimization obligations now extend downstream to all data recipients.","The 180-day deadline to purge retained data unless explicit consent is obtained creates a strict, time-bound compliance window that organizations must architect directly into their data retention policies."],"referencedReports":[],"body":"\u003cp\u003eCalifornia Attorney General Rob Bonta announced a $12.75 million settlement with General Motors for violating the California Consumer Privacy Act. The investigation found that GM illegally collected and sold drivers\u0026rsquo; location and driving data to brokers Verisk Analytics and LexisNexis Risk Solutions between 2020 and 2024. This data was gathered through GM\u0026rsquo;s OnStar subsidiary and Smart Driver system for insurance scoring purposes.\u003c/p\u003e\n\n\u003cp\u003eThe company previously faced a five-year sales ban from the FTC for similar unlawful data collection practices. Under the new agreement, GM must stop selling driving data for five years and delete retained information within 180 days unless consumers explicitly consent. The settlement also requires GM to order the data brokers to delete previously sold information and establish a stronger privacy compliance program.\u003c/p\u003e\n\n\u003cp\u003eThis $12.75 million penalty represents a record amount in California and marks the state\u0026rsquo;s first enforcement action focused on data minimization rules. Officials noted that California drivers are unlikely to face higher insurance premiums due to existing state laws prohibiting insurers from using driving data for rate setting. GM has not yet responded to requests for comment regarding the settlement.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);

  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>

  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
