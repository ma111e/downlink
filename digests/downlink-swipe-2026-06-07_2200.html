<script type="application/json" id="dl-articles">[{"n":1,"title":"Hands on with Intelligent Terminal, an AI-powered Windows Terminal","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/hands-on-with-intelligent-terminal-an-ai-powered-windows-terminal/","time":"23:20","priority":"MAY READ","score":45,"tldr":"Microsoft has released Intelligent Terminal, an open-source Windows Terminal fork that embeds AI agents like Claude, Copilot, Codex, and Gemini directly into terminal sessions to explain errors, suggest fixes, and draft commands. Its standout feature is session management, which lets users resume previous AI-assisted terminal work.","briefOverview":"\u003cp\u003eMicrosoft has created an open-source fork of Windows Terminal called Intelligent Terminal. The app allows users to use AI directly inside Terminal without interfering with the regular terminal session. Microsoft describes it as a built-in assistant that can explain errors, draft commands, and help fix problems without leaving the terminal.\u003c/p\u003e\n\n\u003cp\u003eOn first run, Intelligent Terminal lets users choose an AI agent for the Terminal pane, with options shown in the article including GitHub Copilot, Claude, Codex, and Gemini. It also includes toggles for Automatic error detection, Automatic error suggestion, and Session management. The author highlights the ability to resume agent sessions as one of the app’s best features.\u003c/p\u003e\n\n\u003cp\u003eIntelligent Terminal opens with an AI pane below the shell and includes controls to show or hide the agent panel, toggle error detection, and manage agent sessions. The article notes that Terminal AI is not meant for everyone, and Microsoft has made Intelligent Terminal a separate app rather than including it with Windows installations. Users can download it from the Microsoft Store or GitHub.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has created Intelligent Terminal, an open-source fork of Windows Terminal that adds AI capabilities directly inside the terminal environment. The article describes the app as allowing AI use inside Terminal without disrupting the regular shell session. Microsoft positions the feature as a built-in assistant for explaining errors, drafting commands, and helping fix problems without leaving the terminal.\u003c/p\u003e\n\n\u003cp\u003eThe app can remain aware of what is happening in a terminal session and assist when a command fails. It can also remember active and past agent sessions, allowing users to return to earlier work without losing their place. The article emphasizes this session-management capability as a major difference from standard Windows Terminal behavior.\u003c/p\u003e\n\n\u003cp\u003eDuring first-run configuration, Intelligent Terminal lets users choose the AI agent for the Terminal pane. The article’s screenshot lists GitHub Copilot, Claude, Codex, and Gemini, with GitHub Copilot shown as “will be installed” and the others shown as already installed. Users can also configure Automatic error detection, Automatic error suggestion, and Session management.\u003c/p\u003e\n\n\u003cp\u003eAutomatic error detection allows Terminal to notice failed commands, while Automatic error suggestion sends the error to the selected AI agent for a possible fix. Session management allows Intelligent Terminal to track active and past agent sessions so earlier agent work can be reopened. These features are presented as configurable options rather than always-on behavior.\u003c/p\u003e\n\n\u003cp\u003eIn the author’s hands-on use, Terminal opened with an AI pane below the shell and displayed “Welcome to Intelligent Terminal.” The author selected Claude as the Terminal AI model, causing Claude Code to run inside the pane. The pane could plan a coding task and ask whether the user wanted to auto-accept edits, manually approve edits, or keep planning.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Terminal AI is a useful idea but is not meant for everyone. Microsoft has therefore kept Intelligent Terminal as a separate app and has not included it with Windows installations yet. The app is available for download from the Microsoft Store and GitHub.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has created an open-source fork of Windows Terminal called \u003cstrong\u003eIntelligent Terminal\u003c/strong\u003e. The article describes it as a version of Terminal that lets users use AI directly inside the terminal without interfering with the regular session.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft describes Intelligent Terminal as a built-in assistant that can help users explain errors, draft commands, and fix problems without leaving the terminal. The app is presented as a separate application rather than a feature currently included with Windows installations.\u003c/p\u003e\n\n\u003ch2 id=\"core-functionality\"\u003eCore Functionality\u003c/h2\u003e\n\n\u003cp\u003eIntelligent Terminal is designed to integrate an AI assistant into the terminal workflow. According to the article, the agent can stay aware of what is happening in the terminal and help when a command fails.\u003c/p\u003e\n\n\u003cp\u003eThe app can also remember active and past agent sessions. This allows users to return to earlier agent work without losing their place.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Intelligent Terminal can help with several terminal-related tasks, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExplaining errors.\u003c/li\u003e\n\u003cli\u003eDrafting commands.\u003c/li\u003e\n\u003cli\u003eHelping fix problems.\u003c/li\u003e\n\u003cli\u003eAssisting when a command fails.\u003c/li\u003e\n\u003cli\u003eReopening previous agent work through session management.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"first-run-configuration\"\u003eFirst-Run Configuration\u003c/h2\u003e\n\n\u003cp\u003eWhen Intelligent Terminal is opened for the first time, it lets the user choose the AI agent for the Terminal pane. In the article’s example screenshot, the listed options are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub Copilot.\u003c/li\u003e\n\u003cli\u003eClaude.\u003c/li\u003e\n\u003cli\u003eCodex.\u003c/li\u003e\n\u003cli\u003eGemini.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that GitHub Copilot is shown as “will be installed,” while Claude, Codex, and Gemini are shown as already installed.\u003c/p\u003e\n\n\u003ch2 id=\"error-detection-and-error-suggestions\"\u003eError Detection and Error Suggestions\u003c/h2\u003e\n\n\u003cp\u003eIntelligent Terminal includes separate toggles for \u003cstrong\u003eAutomatic error detection\u003c/strong\u003e and \u003cstrong\u003eAutomatic error suggestion\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Automatic error detection allows Terminal to notice failed commands. Automatic error suggestion goes further by sending the error to the selected AI agent for a possible fix.\u003c/p\u003e\n\n\u003cp\u003eThis distinction is important in the article’s description because detection identifies failed commands, while suggestion involves asking the selected AI agent to provide a possible remediation.\u003c/p\u003e\n\n\u003ch2 id=\"session-management\"\u003eSession Management\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies \u003cstrong\u003eSession management\u003c/strong\u003e as one of Intelligent Terminal’s most notable features. This option lets the app track active and past agent sessions.\u003c/p\u003e\n\n\u003cp\u003eThe author specifically highlights the ability to resume sessions as one of Intelligent Terminal’s best features. The article contrasts this with the current Windows Terminal option that can reopen previously closed tabs but does not restore previous sessions.\u003c/p\u003e\n\n\u003cp\u003eThe author also notes that while Claude Code has a built-in resume skill, they believe it often makes the model perform worse. Intelligent Terminal is presented as addressing this issue by allowing users to move back and forth between earlier agent work.\u003c/p\u003e\n\n\u003ch2 id=\"user-interface-and-hands-on-experience\"\u003eUser Interface and Hands-On Experience\u003c/h2\u003e\n\n\u003cp\u003eAfter configuration, Intelligent Terminal opens with an AI pane below the shell. The pane displays the message “Welcome to Intelligent Terminal.”\u003c/p\u003e\n\n\u003cp\u003eIn the author’s hands-on example, Claude was selected as the Terminal AI model. As a result, Claude Code ran inside the AI pane.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Claude Code as being able to plan a coding task and then ask the user whether they wanted to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAuto-accept edits.\u003c/li\u003e\n\u003cli\u003eManually approve edits.\u003c/li\u003e\n\u003cli\u003eKeep planning.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe interface also includes controls on both sides of the terminal. On the left side, users can show or hide the agent panel and toggle error detection through an icon. On the right side, an agent management icon opens the session management panel and agent status bar.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-deployment-approach\"\u003eAvailability and Deployment Approach\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Terminal AI is a strong idea but is not intended for everyone. Microsoft has therefore made Intelligent Terminal a separate app.\u003c/p\u003e\n\n\u003cp\u003eThe article explicitly notes that Intelligent Terminal is not included with Windows installations yet. Users who are interested can download it from the Microsoft Store or GitHub.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-named-products\"\u003eAffected Parties and Named Products\u003c/h2\u003e\n\n\u003cp\u003eThe article centers on Microsoft and its Intelligent Terminal project. It also discusses Windows Terminal as the base product from which Intelligent Terminal was forked.\u003c/p\u003e\n\n\u003cp\u003eNamed AI agent options or related tools mentioned in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub Copilot.\u003c/li\u003e\n\u003cli\u003eClaude.\u003c/li\u003e\n\u003cli\u003eClaude Code.\u003c/li\u003e\n\u003cli\u003eCodex.\u003c/li\u003e\n\u003cli\u003eGemini.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not describe any threat actor, security incident, vulnerability, or exploit. Its focus is the release and hands-on functionality of an AI-powered terminal application.\u003c/p\u003e\n","keyPoints":["Microsoft has created an open-source fork of Windows Terminal called Intelligent Terminal that lets users access AI directly inside Terminal without interfering with the regular session.","Intelligent Terminal includes a built-in assistant that can explain errors, draft commands, and help fix problems without leaving the terminal.","On first run, Intelligent Terminal lets users choose an AI agent for the Terminal pane, including GitHub Copilot, Claude, Codex, and Gemini.","The app includes toggles for Automatic error detection, Automatic error suggestion, and Session management to track active and past agent sessions.","Intelligent Terminal can be downloaded from the Microsoft Store or GitHub."],"insights":["Microsoft is keeping Intelligent Terminal separate from standard Windows installations because Terminal AI is described as useful but not intended for everyone.","The article highlights session resume as a differentiator from the existing Windows Terminal option to reopen closed tabs, because reopening tabs does not restore previous AI agent sessions.","Automatic error suggestion is more privacy- and workflow-relevant than error detection alone because it sends detected errors to the selected AI agent for a possible fix.","The AI pane can run different agent tools inside the terminal, and the author's example shows Claude Code asking whether to auto-accept edits, manually approve edits, or continue planning."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has created an open-source fork of Windows Terminal called Intelligent Terminal. The app allows users to use AI directly inside Terminal without interfering with the regular terminal session. Microsoft describes it as a built-in assistant that can explain errors, draft commands, and help fix problems without leaving the terminal.\u003c/p\u003e\n\n\u003cp\u003eOn first run, Intelligent Terminal lets users choose an AI agent for the Terminal pane, with options shown in the article including GitHub Copilot, Claude, Codex, and Gemini. It also includes toggles for Automatic error detection, Automatic error suggestion, and Session management. The author highlights the ability to resume agent sessions as one of the app’s best features.\u003c/p\u003e\n\n\u003cp\u003eIntelligent Terminal opens with an AI pane below the shell and includes controls to show or hide the agent panel, toggle error detection, and manage agent sessions. The article notes that Terminal AI is not meant for everyone, and Microsoft has made Intelligent Terminal a separate app rather than including it with Windows installations. Users can download it from the Microsoft Store or GitHub.\u003c/p\u003e\n"}]</script>
