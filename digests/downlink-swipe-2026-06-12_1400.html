, source-code repositories, package registries, CI/CD pipelines, update mechanisms, plugins, or SaaS integrations. The danger is that attackers may use trusted access, updates, code, or integrations to reach downstream customers, users, or internal systems.\u003c/p\u003e\n\n\u003cp\u003eFlare researchers observed a post advertising GitHub-related access, including developer accounts, private repositories, access material, and source-code exposure. The article says such access may expose secrets, deployment scripts, package publishing logic, cloud credentials, internal documentation, and CI/CD workflows. It also references the April 2026 Vercel incident as an example of how trusted third-party AI tools and OAuth-connected SaaS access can create broader security concerns.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses alleged vendor data and source-code exposure involving Sportradar AG, which it says was later echoed in public reporting on the broader TeamPCP supply-chain campaign. It says the Sportradar case was linked to a compromised Trivy scanner and included database passwords, API key and secret pairs, Kafka credentials, and monitoring tokens. It also references public reporting around TeamPCP and Mistral AI, noting that repositories may contain credentials, build logic, deployment workflows, internal service names, API documentation, or references to customers and integrations.\u003c/p\u003e\n\n\u003cp\u003ePackage ecosystem incidents are presented as another area where access can scale. The article cites Shai-Hulud as a self-spreading npm supply-chain attack that stole developer secrets and infected trusted packages, and it references the LiteLLM incident involving unauthorized PyPI package publishes connected to developer and CI/CD environments. The article concludes that defenders should monitor exposed developer credentials, GitHub and GitLab access, package registry tokens, leaked repositories, CI/CD secrets, cloud keys, OAuth grants, and claims involving important vendors or software providers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that early warning signs of software supply-chain attacks often appear in underground forums and marketplaces before they are visible as public incidents. According to Flare researchers, these signals are difficult to recognize because they may not be labeled as supply-chain activity. Instead, they may appear as posts advertising GitHub access, private repositories, source code, API keys, OAuth tokens, cloud credentials, CI/CD data, or vendor-related leaks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the supply-chain relevance of such posts depends on where the access sits and what trust relationships it touches. A post that looks like a standard access sale can become supply-chain relevant if it provides visibility into software build processes, secrets, package publishing workflows, cloud access, or trusted vendor integrations.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-article-defines-as-a-software-supply-chain-attack\"\u003eWhat the Article Defines as a Software Supply-Chain Attack\u003c/h2\u003e\n\n\u003cp\u003eThe article defines a software supply-chain attack as an attack that targets trusted tools, vendors, software components, services, or processes an organization relies on, rather than attacking the organization directly. In software environments, this can include compromise of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThird-party providers\u003c/li\u003e\n\u003cli\u003eDeveloper accounts\u003c/li\u003e\n\u003cli\u003eSource-code repositories\u003c/li\u003e\n\u003cli\u003ePackage registries\u003c/li\u003e\n\u003cli\u003eCI/CD pipelines\u003c/li\u003e\n\u003cli\u003eUpdate mechanisms\u003c/li\u003e\n\u003cli\u003ePlugins\u003c/li\u003e\n\u003cli\u003eSaaS integrations\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe core risk is that once attackers compromise something trusted inside the delivery chain, they may reach downstream customers, users, or internal systems through legitimate-looking access, code, updates, or integrations.\u003c/p\u003e\n\n\u003ch2 id=\"underground-access-sales-can-become-supply-chain-relevant\"\u003eUnderground Access Sales Can Become Supply-Chain Relevant\u003c/h2\u003e\n\n\u003cp\u003eFlare researchers observed a post advertising GitHub-related access, including references to developer accounts, private repositories, access material, and source-code exposure. The article says this may initially look like a normal access sale, but GitHub access can expose more than code.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, GitHub or repository access may reveal:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecrets\u003c/li\u003e\n\u003cli\u003eDeployment scripts\u003c/li\u003e\n\u003cli\u003ePackage publishing logic\u003c/li\u003e\n\u003cli\u003eCloud credentials\u003c/li\u003e\n\u003cli\u003eInternal documentation\u003c/li\u003e\n\u003cli\u003eCI/CD workflows\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that if attackers gain access to a developer identity or private repository, they may understand how software is built, which dependencies are used, where secrets are stored, and how updates are published. In some cases, that access can enable attacks against customers, downstream users, or other connected systems.\u003c/p\u003e\n\n\u003ch2 id=\"oauth-saas-and-trusted-integrations\"\u003eOAuth, SaaS, and Trusted Integrations\u003c/h2\u003e\n\n\u003cp\u003eThe article cites the April 2026 Vercel incident as an example of how trusted third-party AI tools and OAuth-connected SaaS access can create broader security concerns. It notes that Vercel said sensitive customer data and source code were not accessed.\u003c/p\u003e\n\n\u003cp\u003eThe article uses the incident to highlight the type of exposure analysts should watch for: trusted integrations, SaaS accounts, internal tools, environment variables, and developer platforms connected through permissions that can be abused if one link in the chain is compromised. It says underground posts mentioning OAuth access, SaaS tools, environment variables, or developer platforms deserve attention even when the initial claim is limited or unverified.\u003c/p\u003e\n\n\u003ch2 id=\"source-code-is-more-than-intellectual-property\"\u003eSource Code Is More Than Intellectual Property\u003c/h2\u003e\n\n\u003cp\u003eFlare researchers also reviewed posts involving alleged vendor data and source-code exposure, including claims around Sportradar AG. The article says those claims were later echoed in public reporting on the broader TeamPCP supply-chain campaign.\u003c/p\u003e\n\n\u003cp\u003eThe Sportradar case is described as linked to a compromised Trivy scanner and included exposure of sensitive operational material such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDatabase passwords\u003c/li\u003e\n\u003cli\u003eAPI key and secret pairs\u003c/li\u003e\n\u003cli\u003eKafka credentials\u003c/li\u003e\n\u003cli\u003eMonitoring tokens\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this kind of data can show how a vendor’s systems are connected, which services and integrations are trusted, and which credentials may create risk for partners or customers. It states that in supply-chain investigations, the most dangerous part of a leak is not always the stolen database itself, but the access paths and trusted relationships it exposes.\u003c/p\u003e\n\n\u003ch2 id=\"teampcp-and-mistral-ai-claims\"\u003eTeamPCP and Mistral AI Claims\u003c/h2\u003e\n\n\u003cp\u003eThe article also references public reporting around TeamPCP and Mistral AI. It says that in May 2026, reports claimed TeamPCP was selling hundreds of alleged Mistral AI repositories, while Mistral disputed parts of the claim.\u003c/p\u003e\n\n\u003cp\u003eThe article uses this case to illustrate why source-code theft should not be treated only as an intellectual-property issue. It says repositories may include credentials, building logic, internal service names, deployment workflows, API documentation, or references to customers and integrations. Even when leaked source code does not provide immediate production access, the article says it can help attackers map an environment and identify future attack paths.\u003c/p\u003e\n\n\u003ch2 id=\"package-ecosystem-incidents-show-how-access-can-scale\"\u003ePackage Ecosystem Incidents Show How Access Can Scale\u003c/h2\u003e\n\n\u003cp\u003eThe article applies the same analysis to package ecosystem incidents. It cites public reporting on Shai-Hulud, described as a self-spreading npm supply-chain attack that stole developer secrets and infected trusted packages.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Shai-Hulud showed how compromised npm maintainer accounts and malicious package updates could be used to steal credentials, harvest CI/CD secrets, and propagate across repositories. The significance was not only the malicious code, but the abuse of trusted package publishing mechanisms.\u003c/p\u003e\n\n\u003cp\u003eThe article also says discussions around Shai-Hulud-style activity and supply-chain attack competition were observed. These posts were less concrete as victim leads, but the article says they are useful as threat context because they show actors watching public package compromise techniques and discussing how they may be reused, modified, or extended.\u003c/p\u003e\n\n\u003ch2 id=\"litellm-ai-infrastructure-and-developer-tooling\"\u003eLiteLLM, AI Infrastructure, and Developer Tooling\u003c/h2\u003e\n\n\u003cp\u003eThe article cites the LiteLLM supply-chain incident as another recent example. It says public reporting described unauthorized PyPI package publishes connected to a broader compromise path involving developer and CI/CD environments.\u003c/p\u003e\n\n\u003cp\u003eBecause LiteLLM is used as an AI gateway, the article says the incident shows that supply-chain risk is expanding into AI infrastructure and developer tooling. The article also notes that developer environments themselves are becoming attractive targets.\u003c/p\u003e\n\n\u003cp\u003eRecent reporting around malicious VS Code extensions is cited as an example of how trusted development tools can become a route into repositories and credentials. The article says extensions, plugins, and AI coding tools often sit close to source code, terminals, tokens, and internal workflows, making them valuable even when they are not part of production infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"guidance-for-defenders\"\u003eGuidance for Defenders\u003c/h2\u003e\n\n\u003cp\u003eThe article says the reviewed underground posts do not prove that every access sale is a supply-chain threat. However, it says security teams should ask better questions when posts involve source code, developer accounts, SaaS access, API keys, OAuth tokens, package ecosystems, or CI/CD material.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the key question as not only whether data was leaked, but whether the access could affect how trusted software is built, deployed, updated, or integrated.\u003c/p\u003e\n\n\u003cp\u003eIt recommends that supply-chain monitoring include more than vulnerability disclosures and package alerts. Organizations should watch for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExposed developer credentials\u003c/li\u003e\n\u003cli\u003eGitHub and GitLab access\u003c/li\u003e\n\u003cli\u003ePackage registry tokens\u003c/li\u003e\n\u003cli\u003eLeaked repositories\u003c/li\u003e\n\u003cli\u003eCI/CD secrets\u003c/li\u003e\n\u003cli\u003eCloud keys\u003c/li\u003e\n\u003cli\u003eOAuth grants\u003c/li\u003e\n\u003cli\u003eClaims involving important vendors or software providers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article concludes that the value of underground monitoring is recognizing these early signals before they are framed as full supply-chain incidents.\u003c/p\u003e\n","keyPoints":["Flare researchers found that underground forums and marketplaces can contain early warning signs of software supply-chain attacks before they are publicly reported as incidents.","Posts advertising GitHub access, private repositories, source code, API keys, OAuth tokens, cloud credentials, or CI/CD data may be supply-chain relevant depending on the trust relationships that access touches.","The article says source-code exposure can reveal credentials, build logic, deployment workflows, internal service names, API documentation, and integrations, making it more than an intellectual-property issue.","Publicly reported incidents involving Vercel, Sportradar, Mistral AI, Shai-Hulud, LiteLLM, and malicious VS Code extensions illustrate how trusted tools, vendor systems, package publishing, and developer environments can create supply-chain risk.","The article recommends that defenders monitor exposed developer credentials, GitHub and GitLab access, package registry tokens, leaked repositories, CI/CD secrets, cloud keys, OAuth grants, and claims involving important vendors or software providers."],"insights":["Underground posts do not need to mention “supply-chain attack” to be relevant; analysts should assess whether the advertised access touches software build, deployment, update, or integration trust paths.","GitHub or private repository access can become high-impact because it may expose not only code but also secrets, deployment scripts, package publishing logic, cloud credentials, internal documentation, and CI/CD workflows.","Source-code leaks should be triaged for operational relationships and access paths, because the article emphasizes that the most dangerous part may be exposed credentials, integrations, and trusted connections rather than the stolen code itself.","Developer tools such as VS Code extensions, plugins, and AI coding tools deserve monitoring because they often sit close to source code, terminals, tokens, and internal workflows even when they are not production infrastructure."],"referencedReports":[{"title":"Vercel April 2026 Security Incident","url":"https://vercel.com/kb/bulletin/vercel-april-2026-security-incident","publisher":"Vercel","context":"The article cites Vercel's April 2026 security incident bulletin as an example of risk from trusted third-party AI tools and OAuth-connected SaaS access.","category":"advisory","primary":false},{"title":"OECD.AI incident report on alleged Mistral AI repositories sold by TeamPCP","url":"https://oecd.ai/en/incidents/2026-05-12-3594","publisher":"OECD.AI","context":"The article references this incident report when discussing public reporting that TeamPCP allegedly sold hundreds of Mistral AI repositories.","category":"news","primary":false},{"title":"Inside LiteLLM Supply-Chain Compromise","url":"https://www.trendmicro.com/en/research/26/c/inside-litellm-supply-chain-compromise.html","publisher":"Trend Micro","context":"The article cites Trend Micro's analysis of the LiteLLM supply-chain incident involving unauthorized PyPI package publishes and developer or CI/CD environment compromise paths.","category":"research","primary":false}],"body":"\u003cp\u003eFlare researchers reviewed underground forum and marketplace posts and found that early warning signs of software supply-chain attacks may appear before incidents become public. These signals often do not use the phrase “supply-chain attack” and may instead appear as offers involving GitHub access, private repositories, source code, API keys, OAuth tokens, cloud credentials, CI/CD data, or vendor-related leaks. The article argues that the risk depends on where the access sits and which trust relationships it touches.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that developer identities, repositories, SaaS integrations, package publishing systems, and CI/CD environments can expose paths into trusted software build and deployment processes. It cites examples involving Vercel, Sportradar, Mistral AI, Shai-Hulud, LiteLLM, and malicious VS Code extensions to show how trusted tools and software ecosystems can create downstream risk. The main takeaway for defenders is to monitor underground signals around developer access and operational secrets, not only public vulnerability disclosures or package alerts.\u003c/p\u003e\n"},{"n":4,"title":"The JNUC 2026 session catalog is live — and the clock is ticking","source":"jamf.com","sourceColorIdx":3,"link":"https://www.jamf.com/blog/jnuc-2026-session-catalog/","time":"15:02","priority":"MAY READ","score":25,"tldr":"Jamf has published the JNUC 2026 session catalog, highlighting sessions around Apple platform management and enterprise AI. Attendees are urged to browse sessions and register before Just in Time pricing ends on July 1 for the September 23–25 event in Kansas City.","briefOverview":"\u003cp\u003eJamf announced that the JNUC 2026 session catalog is live and available for prospective attendees to browse. The article encourages readers to review the full session lineup, identify relevant sessions and start building an agenda. It also urges registration before Just in Time pricing ends on July 1.\u003c/p\u003e\n\n\u003cp\u003eJNUC 2026 is framed around the theme of the Apple platform for enterprise AI. The programming includes topics such as Mac workflows, mobility workflows, Mac and mobile compliance, reporting and risk reduction, integrations and APIs, end-user experience, and community, career and culture. The event is scheduled for September 23–25, 2026, in Kansas City.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eJamf published an announcement that the JNUC 2026 session catalog is officially live. The article presents the catalog as a reason for prospective attendees to commit to the event, browse the session lineup and begin planning their agenda. It emphasizes that attendees can use the catalog to find content most relevant to them. y relevance and limitations\u003c/h2\u003e\n\n\u003cp\u003eThe article includes security-adjacent topics such as Mac and mobile compliance, reporting and risk reduction, integrations and APIs, and end-user experience. However, it does not report on a cybersecurity incident, vulnerability, advisory, malware campaign, threat actor or technical analysis. Its main purpose is to announce the availability of the JNUC 2026 session catalog and encourage registration before a pricing deadline.\u003c/p\u003e\n","keyPoints":["The JNUC 2026 session catalog is officially live, allowing attendees to browse the full lineup and start building an agenda.","The theme of JNUC 2026 is the Apple platform for enterprise AI.","The 2026 programming covers areas including Mac workflows, mobility workflows, compliance, reporting and risk reduction, integrations and APIs, end-user experience, and community, career and culture.","Just in Time pricing for JNUC 2026 is available only through July 1 before standard rates begin.","JNUC 2026 will take place in Kansas City from September 23 to 25, 2026."],"insights":["Prospective attendees can use the newly released session catalog to decide whether the event content matches their needs before committing to registration.","Registering before July 1 is the actionable deadline for attendees who want to avoid paying standard rates.","The agenda appears designed for Apple administrators with both management and security responsibilities, since it combines workflows, compliance, risk reduction, integrations, APIs and end-user experience topics.","The article positions enterprise AI as the central lens for this year’s Apple platform discussions, indicating that AI-related enterprise use cases will shape the conference programming."],"referencedReports":[],"body":"\u003cp\u003eJamf announced that the JNUC 2026 session catalog is live and available for prospective attendees to browse. The article encourages readers to review the full session lineup, identif <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />

          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>

          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>

        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>

          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>

        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>

  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
