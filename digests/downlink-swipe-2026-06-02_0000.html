id had included some of the same ideas. In his statement, Warner said he saluted the proposal for pre-deployment testing on a collaborative basis, just as he did when the idea was first advanced in the last administration’s order, which was rescinded on Trump’s first day.\u003c/p\u003e\n\n\u003ch2 id=\"key-cybersecurity-significance\"\u003eKey cybersecurity significance\u003c/h2\u003e\n\n\u003cp\u003eThe order’s cybersecurity provisions focus on applying advanced AI models to vulnerability discovery, patch prioritization, critical infrastructure defense, and cyber threat tracking. The creation of a Treasury-led clearinghouse is intended to coordinate work across government, industry, and critical infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the tension between limiting regulation and addressing emerging AI-enabled cybersecurity risks. The order avoids mandatory model licensing or preclearance while still creating a government-industry mechanism for model testing, trusted access, vulnerability scanning, and patch prioritization.\u003c/p\u003e\n","keyPoints":["The White House released a pared-back artificial intelligence executive order after an earlier version was scrapped amid internal dissent.","The new order changes the voluntary government review period for AI models to within 30 days of public release, instead of the previously mandated 90 days.","The order says the voluntary framework does not authorize mandatory government licensing, preclearance, or permitting requirements for developing, publishing, releasing, or distributing new AI models.","The executive order directs the Treasury Department to lead creation of an AI cybersecurity clearinghouse for collaboration among government, industry, and critical infrastructure operators.","The order calls for industry and government to select trusted partners to access designated covered frontier models for improving critical infrastructure cybersecurity and tracking cyber threats in a classified setting."],"insights":["The shift from a 90-day model review period to review within 30 days of public release shows the final order moved closer to industry preferences, though it did not adopt the 14-day period industry leaders reportedly sought.","The order tries to balance federal access to frontier AI models with industry concerns by explicitly requiring confidentiality, cybersecurity, insider-risk, intellectual-property, use, and nondisclosure protections.","The White House avoided creating a mandatory approval regime for frontier AI models, even while acknowledging concerns that models such as Anthropic’s Mythos may autonomously discover and target zero-day vulnerabilities.","Senator Mark Warner’s response highlights that some measures in the new order resemble provisions from the rescinded Biden AI executive order, despite the administration’s stated deregulatory posture."],"referencedReports":[],"body":"\u003cp\u003eThe White House released a pared-back artificial intelligence executive order after an earlier version was scrapped amid internal dissent. The new order changes the voluntary review period for government testing of AI models to within 30 days of public release, rather than the previously mandated 90 days. AI industry leaders had reportedly pressed for a 14-day review period.\u003c/p\u003e\n\n\u003cp\u003eThe order directs industry and government to collaborate on selecting trusted partners who can access designated “covered frontier” models in a classified setting. The stated purpose is to strengthen critical infrastructure cybersecurity and track cyber threats. The order also says the voluntary framework should not be interpreted as creating mandatory government licensing, preclearance, or permitting requirements for AI models.\u003c/p\u003e\n\n\u003cp\u003eThe executive order mandates creation of an AI cybersecurity clearinghouse led by the Treasury Department to support collaboration among government, industry, and critical infrastructure operators. It also directs executive branch officials to scan for vulnerabilities identified by AI models and prioritize patching. Senate Intelligence Committee Chairman Mark Warner endorsed the order’s provisions while criticizing the administration for rescinding a Biden AI executive order that he said included similar ideas.\u003c/p\u003e\n"},{"n":18,"title":"Wardriving assessment across Mexico: Preparing for the 2026 World Cup","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/wardriving-assessment-in-mexico-fifa-world-cup-2026/119996/","time":"12:00","priority":"SHOULD READ","score":78,"tldr":"Kaspersky’s wardriving study of Mexico City, Guadalajara, and Monterrey ahead of the 2026 World Cup found that while most Wi-Fi networks use WPA2/WPA3, many still expose users through open networks, enabled WPS, default or revealing SSIDs, and predictable ISP/router configurations. Travelers and operators should avoid unsafe public Wi-Fi practices and reduce exposure by disabling WPS, changing default SSIDs, and using stronger modern wireless configurations.","briefOverview":"\u003cp\u003eKaspersky GReAT conducted a passive wardriving assessment in Mexico City, Guadalajara, and Monterrey, the Mexican host cities for the 2026 FIFA World Cup. The study focused on areas around stadiums, airports, tourist zones, and places where fan concentrations are expected to be high. Its purpose was to evaluate the security status, deployment characteristics, and operational exposure of public wireless environments visitors may encounter.\u003c/p\u003e\n\n\u003cp\u003eThe assessment recorded 84,588 wireless signals and 69,473 unique SSIDs across the three cities. Mexico City accounted for 61.4% of the signals, Guadalajara for 23.6%, and Monterrey for 14.8%. The researchers found broad use of WPA2 and WPA3, but also persistent exposure from open networks, WPS-enabled access points, default SSID naming, sequential SSID structures, and BSSID-derived SSIDs.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that encryption strength alone is not enough to assess wireless security posture. Around 45% of detected access points advertised WPS capabilities, and around half of secure WPA2/WPA3 deployments still exposed WPS. Kaspersky recommends disabling WPS, avoiding default or identifying SSIDs, removing legacy protocols where feasible, and improving channel allocation and use of newer wireless bands.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky GReAT performed a wardriving assessment across Mexico City, Guadalajara, and Monterrey ahead of the 2026 FIFA World Cup. The research covered high-density areas including stadium surroundings, airports, tourist zones, downtown areas, and other locations where large fan concentrations are likely. The article states that the data collection was passive and did not involve authentication attempts, interception, exploitation, or interaction with detected networks beyond publicly broadcast management information.\u003c/p\u003e\n\n\u003cp\u003eThe researchers recorded 84,588 wireless signals with 69,473 unique SSIDs. Mexico City represented 61.4% of the signals, Guadalajara 23.6%, and Monterrey 14.8%. Approximately 82% of signals had a single SSID, and all detected networks operated under the IEEE 802.11 standard protocol.\u003c/p\u003e\n\n\u003cp\u003eSSID analysis showed that about 34% of detected networks retained default manufacturer or ISP naming conventions, while 66% used customized identifiers. Frequently observed patterns included ISP-associated names such as “Club_Totalplay_WiFi,” “izzi WiFi,” “Megacable WiFi,” “Infinitum,” “Totalplay,” and “Izzi,” along with local names such as “XXXX-Internet para Todos-CDMX” and “RED JALISCO.” The article also notes sequential SSID structures and customized SSIDs containing personal, organizational, address, or department references.\u003c/p\u003e\n\n\u003cp\u003eThe assessment found that more than 30% of networks in all three cities reused the access point MAC address as the visible SSID. The article explains that this exposes hardware-level information through the BSSID and may allow equipment manufacturer identification through the organizationally unique identifier. Manufacturer analysis showed a concentration of wireless infrastructure among vendors including Huawei Technologies and MediaTek-based devices, with ISP deployments often associated with consumer equipment such as Huawei and ZTE.\u003c/p\u003e\n\n\u003cp\u003eWireless security analysis found that WPA2 was the dominant authentication mechanism, with adoption rates of 81.19% in Mexico City, 79.19% in Monterrey, and 77.59% in Guadalajara. Secure networks, defined as WPA2/WPA3, made up about 82% of detected deployments, but insecure open networks still accounted for between 10% and 12% of detected infrastructure. The article also found that 45% of all detected access points advertised WPS capabilities, and around half of WPA2/WPA3-secured deployments still had WPS enabled.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies additional exposure from rogue access points, including “evil twins,” which can imitate legitimate public wireless networks in places such as airports, hotels, cafés, and tourist areas. Its recommendations include disabling WPS, avoiding SSIDs that reveal ISPs, manufacturers, personal details, organizations, or locations, avoiding MAC-derived SSIDs, migrating toward WPA3-capable infrastructure, reducing dependence on 2.4 GHz, and improving channel allocation. The conclusion emphasizes combining strong encryption, secure deployment practices, exposure minimization, and user awareness.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eKaspersky GReAT conducted a passive wardriving assessment in Mexico City, Guadalajara, and Monterrey, the three Mexican host cities for the 2026 FIFA World Cup. The study was designed to analyze wireless environments that international visitors may encounter during the tournament. The researchers focused on public Wi-Fi infrastructure in dense urban areas, stadium surroundings, tourist zones, airports, and other likely fan concentration points.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the collected information was used only for passive observation and infrastructure analysis. Kaspersky says it did not attempt to authenticate to networks, intercept communications, exploit systems, or interact with detected wireless networks beyond publicly broadcast management information. During processing, networks belonging to cars or cell phones categorized as mobile hotspots were filtered out because they did not represent networks considered part of the assessment.\u003c/p\u003e\n\n\u003ch2 id=\"research-scope-and-collection-areas\"\u003eResearch scope and collection areas\u003c/h2\u003e\n\n\u003cp\u003eThe assessment covered areas with prominent wireless network activity and concentrated public access points in the three cities.\u003c/p\u003e\n\n\u003cp\u003eIn Mexico City, the analysis included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMéxico City Stadium\u003c/li\u003e\n\u003cli\u003eMexico City International Airport\u003c/li\u003e\n\u003cli\u003eZócalo\u003c/li\u003e\n\u003cli\u003ePaseo de la Reforma\u003c/li\u003e\n\u003cli\u003eColonia Roma\u003c/li\u003e\n\u003cli\u003eLa Condesa\u003c/li\u003e\n\u003cli\u003ePolanco\u003c/li\u003e\n\u003cli\u003eCoyoacán\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn Guadalajara, the analysis included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGuadalajara Stadium\u003c/li\u003e\n\u003cli\u003eGuadalajara International Airport\u003c/li\u003e\n\u003cli\u003eThe city center\u003c/li\u003e\n\u003cli\u003eZapopan\u003c/li\u003e\n\u003cli\u003eProvidencia\u003c/li\u003e\n\u003cli\u003eAvenida Chapultepec\u003c/li\u003e\n\u003cli\u003eColonia Americana\u003c/li\u003e\n\u003cli\u003eTlaquepaque\u003c/li\u003e\n\u003cli\u003eThe area around Andares\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn Monterrey, the analysis included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonterrey Stadium\u003c/li\u003e\n\u003cli\u003eMonterrey International Airport\u003c/li\u003e\n\u003cli\u003eFundidora Park\u003c/li\u003e\n\u003cli\u003eCintermex Monterrey\u003c/li\u003e\n\u003cli\u003eThe downtown area\u003c/li\u003e\n\u003cli\u003eBarrio Antiguo\u003c/li\u003e\n\u003cli\u003eMacroPlaza\u003c/li\u003e\n\u003cli\u003eThe San Pedro financial district\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"dataset-and-overall-findings\"\u003eDataset and overall findings\u003c/h2\u003e\n\n\u003cp\u003eKaspersky recorded 84,588 wireless signals and 69,473 unique Service Set Identifiers across the three cities. Mexico City accounted for 61.4% of the recorded signals, Guadalajara for 23.6%, and Monterrey for 14.8%. Approximately 82% of the signals had a single SSID, with city-level figures of 81.9%, 81.34%, and 84% respectively.\u003c/p\u003e\n\n\u003cp\u003eThe article states that all detected networks operated under the IEEE 802.11 standard protocol. The analysis emphasized standard deployment patterns, legacy configurations, default vendor settings, and information disclosure through publicly broadcast wireless identifiers.\u003c/p\u003e\n\n\u003ch2 id=\"ssid-exposure-and-naming-patterns\"\u003eSSID exposure and naming patterns\u003c/h2\u003e\n\n\u003cp\u003eKaspersky found that only 0.0047% of detected networks had an invisible SSID, meaning nearly all detected networks actively broadcast their names. The article explains that SSID structures may unintentionally disclose details about internet service providers, device manufacturers, deployment practices, organizational ownership, or user identity.\u003c/p\u003e\n\n\u003cp\u003eApproximately 34% of detected networks retained default manufacturer or ISP SSID naming conventions, while 66% used customized identifiers. The researchers observed recurring ISP-associated SSID patterns in all three cities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“Club_Totalplay_WiFi”\u003c/li\u003e\n\u003cli\u003e“izzi WiFi”\u003c/li\u003e\n\u003cli\u003e“Megacable WiFi”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes location-specific SSIDs such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“XXXX-Internet para Todos-CDMX”\u003c/li\u003e\n\u003cli\u003e“RED JALISCO”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSequential SSID structures were also detected, including patterns such as “INFINITUMXX” and “IZZI-XX.” Kaspersky identified 33 unique sequential naming structures among 137 sequential SSIDs, representing approximately 0.16% of detected wireless networks.\u003c/p\u003e\n\n\u003cp\u003eSeveral customized SSIDs contained personal or organizational identifiers, including family names, professions, addresses, or internal department references. The article states that these names may simplify local identification for users but may also expose sensitive information useful for social engineering, physical targeting, or organizational profiling.\u003c/p\u003e\n\n\u003ch2 id=\"bssid-derived-ssids\"\u003eBSSID-derived SSIDs\u003c/h2\u003e\n\n\u003cp\u003eThe assessment identified multiple networks that used the physical MAC address of a Wi-Fi access point, known as the BSSID, as the visible SSID. Kaspersky states that this practice exposes hardware-level information that could support vendor fingerprinting and targeted reconnaissance.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the organizationally unique identifier in the first bytes of a BSSID identifies the equipment manufacturer. Threat actors can correlate exposed manufacturers with device-specific vulnerabilities. Kaspersky found that more than 30% of networks in all three cities reused the MAC address as the SSID.\u003c/p\u003e\n\n\u003ch2 id=\"default-router-configurations-and-isp-deployments\"\u003eDefault router configurations and ISP deployments\u003c/h2\u003e\n\n\u003cp\u003eKaspersky profiled wireless infrastructure to identify common wireless equipment manufacturers and ISP deployments. The article states that large-scale ISP deployments often use standardized wireless configurations and vendor-specific hardware platforms. It says identifying dominant manufacturers and ISP naming conventions can provide insight into infrastructure and deployment practices and facilitate mapping of standardized attack surfaces.\u003c/p\u003e\n\n\u003cp\u003eThe manufacturer analysis found a strong concentration of wireless infrastructure among a limited number of vendors. Across the three locations, Huawei Technologies, MediaTek-based devices, and other equipment distributed through ISP channels represented a significant portion of detected deployments. Mexico City had the most diverse infrastructure, while Monterrey and Guadalajara had greater concentration of SOHO or residential-grade hardware.\u003c/p\u003e\n\n\u003cp\u003eThe ISP deployment analysis found a high concentration of access points associated with major residential internet providers. Deployments associated with Infinitum, Totalplay, and Izzi represented a substantial portion of the detected wireless infrastructure. The article says this was supported by repeated ISP-associated SSIDs and manufacturer identifiers frequently associated with consumer equipment, including Huawei, ZTE, and other residential wireless equipment vendors.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that ISPs were primarily inferred from SSID naming conventions and manufacturer fingerprint data. A significant portion of detected networks fell into an “UNKNOWN/CUSTOM” category, which included custom hotspots and networks whose names did not expose identifiable ISP-associated patterns. Kaspersky links this to the finding that approximately 66% of networks used custom network names.\u003c/p\u003e\n\n\u003ch2 id=\"signal-characteristics-and-frequency-usage\"\u003eSignal characteristics and frequency usage\u003c/h2\u003e\n\n\u003cp\u003eKaspersky analyzed signal quality, signal stability, and frequency band utilization. The article says signal quality analysis showed that a substantial portion of detected access points operated under weak or very weak signal conditions. Monterrey had the highest percentage of very weak signals, with approximately 50% of detected deployments.\u003c/p\u003e\n\n\u003cp\u003eSimilar weak-signal patterns were observed in Guadalajara and Mexico City, suggesting dense wireless environments with overlapping coverage areas. Only a limited percentage of networks were classified as very good or excellent signal quality across the three locations.\u003c/p\u003e\n\n\u003cp\u003eSignal stability analysis found that most detected deployments had stable beacon transmission behavior. More than 96% of access points across all locations were classified as stable, while only a small percentage exhibited unstable or indeterminate behavior. The article says this implies most observed infrastructure corresponded to permanently deployed access points rather than transient or intermittent wireless devices.\u003c/p\u003e\n\n\u003cp\u003eFrequency band analysis showed that more than 95% of detected wireless networks operated in the 2.4 GHz spectrum. Only a small percentage were classified under unknown or non-standard frequency categories. Kaspersky states that this reflects the continued prevalence of legacy-compatible wireless infrastructure and SOHO deployments.\u003c/p\u003e\n\n\u003ch2 id=\"channel-congestion-and-spectrum-usage\"\u003eChannel congestion and spectrum usage\u003c/h2\u003e\n\n\u003cp\u003eThe channel analysis focused on the 2.4 GHz spectrum, where channel overlap and high access point density can produce interference and degraded wireless performance. The article states that excessive concentration of access points on a limited number of channels can cause co-channel interference, packet collisions, reduced throughput, and degraded network stability.\u003c/p\u003e\n\n\u003cp\u003eKaspersky found that the 2.4 GHz band experienced elevated congestion across the three cities. Access point deployments were strongly concentrated on channels 11, 6, and 1, which are traditionally recommended as non-overlapping channels. Channel 11 was the most used, accounting for 25.2% of detected access points, followed by channel 6 at 22.5% and channel 1 at 19.5%.\u003c/p\u003e\n\n\u003cp\u003eThe article says this distribution indicates that most wireless deployments follow standard channel allocation practices for 2.4 GHz Wi-Fi environments. However, high density on the same channels can still cause co-channel contention and poor wireless performance.\u003c/p\u003e\n\n\u003cp\u003eKaspersky grouped detected access points by channel congestion level. Mexico City had the highest proportion of heavily congested wireless channels, with approximately 7% of detected access points operating under HIGH congestion. Guadalajara followed with nearly 5%, and Monterrey had the lowest percentage at approximately 3.29%.\u003c/p\u003e\n\n\u003cp\u003eThe article states that most access points were categorized as LOW or MEDIUM congestion, meaning severe saturation was localized rather than uniformly distributed. A more detailed channel analysis showed that channels 11, 6, and 1 consistently experienced the highest congestion levels across the three cities. In Mexico City, channel 11 alone accounted for more than 25% of detected deployments and consistently exhibited VERY_HIGH congestion levels.\u003c/p\u003e\n\n\u003ch2 id=\"wireless-security-configurations\"\u003eWireless security configurations\u003c/h2\u003e\n\n\u003cp\u003eKaspersky analyzed advertised wireless security configurations for detected access points. WPA2 was the dominant wireless authentication mechanism in all three cities. Mexico City had a WPA2 adoption rate of 81.19%, Monterrey had 79.19%, and Guadalajara had 77.59%.\u003c/p\u003e\n\n\u003cp\u003eThe article states that every sixth open access point, or 17%, was unsafe. The city-level figures were 16.5% in Mexico City, 18.5% in Guadalajara, and 17.2% in Monterrey. Open wireless deployments were present across all locations and ranged between 10% and 12% of detected access points.\u003c/p\u003e\n\n\u003cp\u003eKaspersky grouped detected networks into four security posture categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecure: WPA2/WPA3\u003c/li\u003e\n\u003cli\u003eInsecure: Open/WEP\u003c/li\u003e\n\u003cli\u003eWeak: WPA\u003c/li\u003e\n\u003cli\u003eUnknown\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAcross the three locations, secure networks represented approximately 82% of detected deployments. Mexico City had the highest percentage of secure deployments at 83.54%, while Guadalajara had the highest percentage of insecure open networks at 12.46%. Monterrey had the lowest percentage of insecure networks, but open deployments still accounted for more than 10% of detected access points.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that networks in the unknown category are not considered secure. It also states that open and legacy WPA deployments may expose users to passive traffic interception, unauthorized monitoring, rogue access point attacks, and credential harvesting techniques.\u003c/p\u003e\n\n\u003ch2 id=\"wps-exposure\"\u003eWPS exposure\u003c/h2\u003e\n\n\u003cp\u003eKaspersky analyzed Wi-Fi Protected Setup across the locations as an additional attack surface. The article describes WPS as a router feature that allows devices to connect to a secure Wi-Fi network without manually entering a long password, typically through a PIN-based enrollment mechanism. It states that although WPA2 and WPA3 provide strong encryption, WPS can introduce security weaknesses due to vulnerable PIN-based enrollment methods.\u003c/p\u003e\n\n\u003cp\u003eAcross the three cities, 55% of detected access points did not advertise WPS capabilities, leaving 45% that did. Mexico City had the highest proportion of WPS-enabled networks at 46.61%. Guadalajara had 43.45%, and Monterrey had 40.93%.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that almost half of detected wireless networks in each city continued to advertise WPS. Kaspersky also performed a secondary analysis of secure WPA2/WPA3 networks and found that around half still exposed WPS:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMexico City: 53.7%\u003c/li\u003e\n\u003cli\u003eGuadalajara: 50.9%\u003c/li\u003e\n\u003cli\u003eMonterrey: 47.5%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article concludes from this that encryption strength alone is not enough to evaluate wireless security posture because additional protocol features such as WPS may expose exploitable attack vectors.\u003c/p\u003e\n\n\u003ch2 id=\"additional-security-considerations\"\u003eAdditional security considerations\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses risks beyond the measured Wi-Fi configurations. It says travelers in dense public environments may also face risks from public USB charging systems, phishing QR codes, proximity-based protocols, and shared public devices such as interactive totems or kiosks.\u003c/p\u003e\n\n\u003cp\u003eA specific additional concern raised in the article is rogue wireless deployment. Kaspersky notes that rogue access points are not necessarily malicious and may be caused by accidental misconfiguration. It also states that attackers may deploy unauthorized hotspots with malicious intent.\u003c/p\u003e\n\n\u003cp\u003eThe article describes “evil twins” as rogue access points that pose as legitimate public wireless networks in airports, hotels, cafés, and tourist areas. These can trick users into connecting to attacker-controlled infrastructure capable of intercepting traffic, harvesting credentials, or performing man-in-the-middle attacks. The article also says further risk lies in potential compromise of local network devices or malware distribution.\u003c/p\u003e\n\n\u003ch2 id=\"conclusions\"\u003eConclusions\u003c/h2\u003e\n\n\u003cp\u003eKaspersky concludes that modern wireless infrastructure in Mexico City, Guadalajara, and Monterrey still presents multiple forms of operational exposure despite widespread WPA2 and WPA3 adoption. The article highlights recurring ISP deployments, default SSID naming conventions, homogeneous manufacturer distribution, and predictable channel allocation practices across the three cities.\u003c/p\u003e\n\n\u003cp\u003eAlthough most detected networks were classified as secure under WPA2/WPA3, many still exposed additional attack surfaces through WPS, default configurations, sequential SSID structures, and infrastructure metadata disclosure. The article states that encryption strength alone is insufficient for evaluating overall wireless security posture.\u003c/p\u003e\n\n\u003cp\u003eThe assessment also found that wireless infrastructure is heavily concentrated in the 2.4 GHz spectrum, especially channels 11, 6, and 1. Kaspersky says this leads to elevated congestion and increased co-channel interference in dense urban environments.\u003c/p\u003e\n\n\u003cp\u003eSSID analysis showed that broadcast identifiers frequently exposed operational information about ISPs, equipment manufacturers, deployment templates, organizational ownership, and user-defined naming practices. The article states that standard deployments, predictable SSID naming, and exposed infrastructure identifiers can facilitate passive reconnaissance, infrastructure fingerprinting, and opportunistic targeting.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations-in-the-article\"\u003eRecommendations in the article\u003c/h2\u003e\n\n\u003cp\u003eKaspersky recommends the following measures to reduce wireless-based exposure and hotspot infrastructure attack surface:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisable WPS functionality on wireless routers whenever possible, especially in WPA2/WPA3 deployments.\u003c/li\u003e\n\u003cli\u003eAvoid default SSID naming conventions that disclose ISP providers, router manufacturers, or deployment templates.\u003c/li\u003e\n\u003cli\u003eAvoid personal, organizational, or location-based identifiers in wireless network names.\u003c/li\u003e\n\u003cli\u003eAvoid configuring SSIDs using BSSID or MAC address-derived naming conventions.\u003c/li\u003e\n\u003cli\u003ePromote migration toward WPA3-capable infrastructure while removing legacy wireless protocols when feasible.\u003c/li\u003e\n\u003cli\u003eReduce wireless congestion by optimizing channel allocation and minimizing excessive dependence on the 2.4 GHz spectrum.\u003c/li\u003e\n\u003cli\u003eEncourage adoption of 5 GHz and newer wireless technologies to reduce interference and improve spectrum efficiency.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article ends by emphasizing the importance of combining strong wireless encryption standards, secure deployment practices, exposure minimization, and user awareness to improve wireless security posture.\u003c/p\u003e\n","keyPoints":["Kaspersky GReAT conducted a passive wardriving assessment in Mexico City, Guadalajara, and Monterrey to analyze wireless environments around 2026 FIFA World Cup host areas, tourist zones, airports, and stadiums.","The study recorded 84,588 wireless signals with 69,473 unique SSIDs, with Mexico City accounting for 61.4% of signals, Guadalajara for 23.6%, and Monterrey for 14.8%.","Approximately 34% of detected networks retained default manufacturer or ISP SSID naming conventions, and more than 30% of networks in all three cities reused the access point MAC address as the visible SSID.","WPA2 was the dominant authentication mechanism, but insecure open networks still accounted for between 10% and 12% of detected wireless infrastructure across the three cities.","WPS remained widely exposed, with 45% of all detected access points advertising WPS capabilities and around half of WPA2/WPA3-secured deployments still having WPS enabled."],"insights":["Encryption status alone is a misleading measure of Wi-Fi safety because around half of WPA2/WPA3-secured networks in the study still exposed WPS, which the article identifies as an additional attack surface.","SSID naming practices created passive reconnaissance value even without network interaction, as default ISP names, sequential SSID structures, customized identifiers, and BSSID-derived SSIDs could reveal providers, manufacturers, deployment templates, ownership, or user information.","The concentration of networks on 2.4 GHz channels 11, 6, and 1 shows that standard non-overlapping channel practices can still create co-channel contention when access point density is high.","More than 96% of detected access points showed stable beacon behavior, indicating that most observed networks were permanent infrastructure rather than transient devices.","The article’s most actionable operator-side mitigations are exposure-reduction measures rather than only encryption upgrades, including disabling WPS, avoiding default or identifying SSIDs, and not deriving SSIDs from MAC addresses."],"referencedReports":[],"body":"\u003cp\u003eKaspersky GReAT conducted a passive wardriving assessment in Mexico City, Guadalajara, and Monterrey, the Mexican host cities for the 2026 FIFA World Cup. The study focused on areas around stadiums, airports, tourist zones, and places where fan concentrations are expected to be high. Its purpose was to evaluate the security status, deployment characteristics, and operational exposure of public wireless environments visitors may encounter.\u003c/p\u003e\n\n\u003cp\u003eThe assessment recorded 84,588 wireless signals and 69,473 unique SSIDs across the three cities. Mexico City accounted for 61.4% of the signals, Guadalajara for 23.6%, and Monterrey for 14.8%. The researchers found broad use of WPA2 and WPA3, but also persistent exposure from open networks, WPS-enabled access points, default SSID naming, sequential SSID structures, and BSSID-derived SSIDs.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that encryption strength alone is not enough to assess wireless security posture. Around 45% of detected access points advertised WPS capabilities, and around half of secure WPA2/WPA3 deployments still exposed WPS. Kaspersky recommends disabling WPS, avoiding default or identifying SSIDs, removing legacy protocols where feasible, and improving channel allocation and use of newer wireless bands.\u003c/p\u003e\n"},{"n":4,"title":"Microsoft Exchange Online outage causes email delays, failures","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-exchange-online-outage-causes-email-delays-failures/","time":"17:02","priority":"MAY READ","score":71,"tldr":"Microsoft is investigating a widespread Exchange Online outage causing significant email delays and delivery failures for customers in North America and Germany. The incident affects mail flow and access, with some messages remaining undelivered for over an hour.","briefOverview":"\u003cp\u003eMicrosoft is working to resolve a widespread Exchange Online service issue affecting the mail flow pipeline for customers in North America and Germany. The company first acknowledged the incident, tracked as EX1331830, at 10:33 EDT after investigating user reports on social media. Microsoft classified the outage as an incident, indicating a critical service issue with noticeable user impact.\u003c/p\u003e\n\n\u003cp\u003eAffected users are experiencing significant email delays and delivery failures, with some messages remaining undelivered for over an hour. Some users are seeing temporary SMTP deferral errors, including messages about exceeded concurrent connection limits per resource forest and abrupt connection closures. Microsoft said engineers are reviewing additional customer reports to understand the impact, isolate error messages, and determine next troubleshooting steps.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft is addressing a widespread Exchange Online outage affecting customers across North America and Germany. The issue is impacting the Exchange Online mail flow pipeline and is causing delays or failures when users try to send or access email. Microsoft first acknowledged the incident, tracked as EX1331830, at 10:33 EDT.\u003c/p\u003e\n\n\u003cp\u003eThe article says Microsoft began investigating after a stream of reports from users on social media. Some affected users reported temporary SMTP deferral errors stating that the maximum number of concurrent connections per resource forest had exceeded a limit. Others saw messages saying the connection was closed abruptly with a SuspiciousRemoteServerError.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said users are experiencing significant delays in sending and receiving email messages. According to the admin center service alert quoted in the article, some email messages have remained undelivered for over an hour. The company said it is reviewing reports from customers in North America and Germany to better understand the current impact scenario.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft classified the issue as an incident, which the article says is typically used for critical service issues with noticeable user impact. The company said engineers are working to isolate the error messages affected users are receiving and determine next troubleshooting steps. The article does not identify any threat actor or malicious activity connected to the outage.\u003c/p\u003e\n\n\u003cp\u003eThe article also places the incident alongside several recent Microsoft service disruptions. In April, Microsoft resolved Exchange Online mailbox access issues affecting Outlook mobile and macOS users, as well as another Exchange Online outage that blocked mailbox and calendar access through multiple clients and protocols. More recently, Microsoft addressed separate outages affecting Teams and Office for the web file access, MFA setup, and the My Sign-Ins platform.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is working to address a widespread Exchange Online service issue affecting the mail flow pipeline for customers across North America and Germany. The incident is causing email delays and delivery failures for Exchange Online users. Microsoft first acknowledged the issue at 10:33 EDT and is tracking it under incident EX1331830.\u003c/p\u003e\n\n\u003cp\u003eThe company classified the service outage as an incident. The article notes that this classification is typically used for critical service issues with noticeable user impact. Microsoft said its engineers are reviewing customer reports to determine the root cause and next troubleshooting steps.\u003c/p\u003e\n\n\u003ch2 id=\"affected-service-and-regions\"\u003eAffected Service and Regions\u003c/h2\u003e\n\n\u003cp\u003eThe affected service is Exchange Online, specifically the mail flow pipeline. Microsoft said the issue affects users trying to send or access their emails. The regions explicitly mentioned in the article are North America and Germany.\u003c/p\u003e\n\n\u003cp\u003eAffected parties include Exchange Online customers in those regions. The article does not identify any threat actor or malicious campaign associated with the issue.\u003c/p\u003e\n\n\u003ch2 id=\"reported-user-impact\"\u003eReported User Impact\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said users are experiencing significant delays in sending and receiving email messages. Some email messages have remained undelivered for more than an hour. The article also states that some affected users are experiencing failures when trying to send or access email.\u003c/p\u003e\n\n\u003cp\u003eThe outage has generated reports from users on social media, which Microsoft began investigating before acknowledging the incident. Microsoft is also reviewing additional reports from customers in the affected regions to better understand the impact.\u003c/p\u003e\n\n\u003ch2 id=\"technical-symptoms\"\u003eTechnical Symptoms\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several specific error messages seen by affected users:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTemporary SMTP deferral errors.\u003c/li\u003e\n\u003cli\u003e\u0026ldquo;The maximum number of concurrent connections per resource forest has exceeded a limit, closing transmission channel.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003e\u0026ldquo;Connection was closed abruptly (SuspiciousRemoteServerError)}.\u0026rdquo;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said it is working to isolate the error messages that affected users are receiving. The company is also reviewing customer reports to determine the next troubleshooting steps.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response\"\u003eMicrosoft Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said its engineers are reviewing reports to discover the root cause of the issue. The company is examining additional reports from customers in North America and Germany to further understand the current impact scenario. Microsoft has not yet provided a root cause in the article.\u003c/p\u003e\n\n\u003cp\u003eThe article quotes Microsoft as saying that users are experiencing significant delays in sending and receiving email messages. Microsoft also said that some messages remain undelivered for over an hour.\u003c/p\u003e\n\n\u003ch2 id=\"related-recent-microsoft-service-issues\"\u003eRelated Recent Microsoft Service Issues\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that this Exchange Online issue follows several recent Microsoft service disruptions. In April, Microsoft resolved Exchange Online mailbox access issues that intermittently affected Outlook mobile and macOS users for weeks. Microsoft also resolved an Exchange Online outage that prevented users from accessing mailboxes and calendars through Outlook on the web, Outlook desktop, Exchange ActiveSync, and other Exchange Online connection protocols.\u003c/p\u003e\n\n\u003cp\u003eMore recently, Microsoft addressed an outage that prevented Teams and Office for the web users from opening files. It also fixed another incident that prevented customers from setting up multi-factor authentication or accessing the My Sign-Ins platform.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent Status\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the situation as a developing story. Microsoft is still investigating the Exchange Online incident and has not disclosed a final root cause or resolution in the article. The company is continuing to review customer reports and determine its next troubleshooting steps.\u003c/p\u003e\n","keyPoints":["Microsoft is working to address a widespread service issue affecting the Exchange Online mail flow pipeline for customers across North America and Germany.","Microsoft first acknowledged the incident, tracked as EX1331830, at 10:33 EDT after investigating reports from users on social media.","Affected users are experiencing significant delays in sending and receiving email messages, with some messages remaining undelivered for over an hour.","Some users are seeing temporary SMTP deferral errors, including messages about exceeded concurrent connection limits and abrupt connection closures.","Microsoft classified the service outage as an incident and said engineers are reviewing customer reports to determine the root cause and next troubleshooting steps."],"insights":["Administrators can correlate mail flow problems with Microsoft incident EX1331830 and the cited SMTP deferral errors before focusing on local infrastructure troubleshooting.","The reported error about exceeding concurrent connections per resource forest points to a service-side capacity or throttling symptom that can explain delayed or failed outbound mail delivery.","The impact is not limited to one client or access method, because Microsoft described problems with both sending and accessing email in Exchange Online.","This incident follows multiple recent Microsoft 365 service disruptions mentioned in the article, including Exchange Online mailbox access issues, Teams and Office file access problems, and MFA/My Sign-Ins access issues."],"referencedReports":[{"title":"EX1331830","url":"https://admin.cloud.microsoft/#/servicehealth/:/alerts/EX1331830","publisher":"Microsoft","context":"The article cites Microsoft's admin center service alert for incident EX1331830 as the source for details on the Exchange Online outage and user impact.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft is working to resolve a widespread Exchange Online service issue affecting the mail flow pipeline for customers in North America and Germany. The company first acknowledged the incident, tracked as EX1331830, at 10:33 EDT after investigating user reports on social media. Microsoft classified the outage as an incident, indicating a critical service issue with noticeable user impact.\u003c/p\u003e\n\n\u003cp\u003eAffected users are experiencing significant email delays and delivery failures, with some messages remaining undelivered for over an hour. Some users are seeing temporary SMTP deferral errors, including messages about exceeded concurrent connection limits per resource forest and abrupt connection closures. Microsoft said engineers are reviewing additional customer reports to understand the impact, isolate error messages, and determine next troubleshooting steps.\u003c/p\u003e\n"},{"n":2,"title":"Instagram users locked out after Meta AI abused to steal accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/instagram-users-locked-out-after-meta-ai-abused-to-steal-accounts/","time":"15:47","priority":"MAY READ","score":70,"tldr":"Attackers hijacked high-value Instagram accounts by tricking Meta’s AI-powered recovery system with AI-generated selfie videos, allowing them to change account emails and bypass protections like 2FA. Affected users reported being unable to recover accounts because Meta’s support process kept them stuck in automated chatbot loops without human escalation.","briefOverview":"\u003cp\u003eMultiple Instagram users reported losing access to their accounts after attackers allegedly abused Meta’s AI-powered support tools to convince the system they were the legitimate owners. The impacted accounts included rare and high-value handles, such as one previously used by the Obama White House team, Jane Manchun Wong’s account, @hey, and @korn. Some affected users said they had already enabled safeguards such as facial scans and two-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eThe reported takeover process started through Instagram’s hacked-account or password recovery flow. According to the article, attackers used a photo from the target’s account, converted it into an AI-generated video, and uploaded it for selfie verification. After changing the email address on the account, the attacker could initiate a password reset and receive the security code needed to gain access.\u003c/p\u003e\n\n\u003cp\u003eAffected users described Meta’s recovery process as an automated loop with no effective human escalation. The owner of @korn said they spent six hours trying to reach human support and received broken links from Meta’s support AI. Meta communications vice president Andy Stone later said on social media that the issue had been resolved and that Meta was securing impacted accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMultiple Instagram users reported that their accounts were hijacked after attackers convinced Meta’s AI-powered support tools that they were the legitimate owners. The incident affected rare and high-value accounts, including one previously used by the Obama White House team, Jane Manchun Wong’s account, @hey, and @korn. Some victims said their identities had been verified through facial scans and that they had enabled safeguards such as two-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the account takeover method as beginning with the “forgot password” or hacked-account recovery process. When Instagram’s AI-powered assistance asked for selfie verification, attackers allegedly used a photo from the target’s account and passed it through an AI video generator to create an animation. The generated video was then uploaded to Meta for verification.\u003c/p\u003e\n\n\u003cp\u003eAfter passing verification, attackers could change the email address associated with the account. Once the email was changed, they could initiate a password reset and receive the required security code to access the account. User André said Meta’s AI accepted the AI-generated video because it could not distinguish it from a real selfie, and added that the method bypassed 2FA protections.\u003c/p\u003e\n\n\u003cp\u003eSome online reports said attackers used VPN services to appear as if they were connecting from the target’s usual region. The article says this was done to pass geolocation checks that might otherwise trigger a more complex login flow for added security. BleepingComputer also noted that claims about the @e and @f accounts being obtained through an active exploit were disputed by others who argued the usernames were secured by someone with internal privileges.\u003c/p\u003e\n\n\u003cp\u003eSeveral affected users reported difficulty recovering their accounts because Meta’s support process relied on automated assistance and chatbot loops rather than human support agents. The owner of @korn said they spent six hours trying to obtain human support and that Meta’s support AI provided four broken links in a row. Meta vice president of communications Andy Stone replied to an affected user on social media that the issue had been resolved and that Meta was securing impacted accounts, while BleepingComputer said it had contacted Meta for comment but had not heard back by publication.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMultiple Instagram users reported being locked out of their accounts after attackers allegedly abused Meta’s AI-powered support tools to take them over. The article says attackers convinced Meta’s automated account recovery systems that they were the legitimate owners, allowing them to change account email addresses and gain access through password reset flows.\u003c/p\u003e\n\n\u003cp\u003eThe incident was notable because it affected rare and high-value Instagram accounts. Impacted accounts named in the article included one previously used by the Obama White House team, Jane Manchun Wong’s account, @hey, and @korn.\u003c/p\u003e\n\n\u003ch2 id=\"reported-account-takeover-method\"\u003eReported Account Takeover Method\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the takeover process as beginning with the account recovery flow, specifically the “forgot password” protocol tied to an account being reported as hacked. Instagram’s AI-powered assistance then asked the user to verify identity with a selfie.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, attackers used a photo from the target’s Instagram account and passed it through an AI video generator to turn it into an animation. That AI-generated video was then uploaded to Meta for verification.\u003c/p\u003e\n\n\u003cp\u003eUser André said Meta’s AI accepted the generated video because it could not tell the difference between a real selfie and an AI-generated video of someone’s face. André also said the takeover method bypassed 2FA protections.\u003c/p\u003e\n\n\u003ch2 id=\"account-access-path\"\u003eAccount Access Path\u003c/h2\u003e\n\n\u003cp\u003eAfter passing the AI-powered verification process, attackers could change the email address associated with the Instagram account. Once the email was changed, the attacker could initiate a password reset process.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the attacker would then receive the required security code at the newly associated email address. This gave the attacker a path to gain access to the target account.\u003c/p\u003e\n\n\u003cp\u003eSome reports also claimed attackers used VPN services to appear as though they were connecting from the target’s usual region. The article says this was intended to pass geolocation checks that would otherwise trigger a more complex login flow for added security.\u003c/p\u003e\n\n\u003ch2 id=\"impacted-users-and-accounts\"\u003eImpacted Users and Accounts\u003c/h2\u003e\n\n\u003cp\u003eThe affected accounts included rare and high-value usernames. The article specifically names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn account previously used by the Obama White House team.\u003c/li\u003e\n\u003cli\u003eApp researcher Jane Manchun Wong’s account.\u003c/li\u003e\n\u003cli\u003e@hey.\u003c/li\u003e\n\u003cli\u003e@korn.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe owner of @korn, who said the band never officially claimed that account and is using another one, criticized Meta’s recovery mechanism. They said they spent six hours trying to get human support and that Meta’s support AI gave them four broken links in a row.\u003c/p\u003e\n\n\u003cp\u003eThe @korn account owner described the situation by saying, “one AI stole it, and another can’t fix it,” and said there were “zero humans in the loop anywhere.”\u003c/p\u003e\n\n\u003ch2 id=\"recovery-problems\"\u003eRecovery Problems\u003c/h2\u003e\n\n\u003cp\u003eThe article says many impacted users were unable to recover access because Meta’s support process relied on automated assistance. Affected users described being stuck in AI or chatbot loops without access to human support agents.\u003c/p\u003e\n\n\u003cp\u003eAndré said that after losing an account, users trying to recover it were left talking to a chatbot with no ability to help. They added that users could not escalate to a human and were left with no one to call.\u003c/p\u003e\n\n\u003ch2 id=\"disputed-claims-about-other-accounts\"\u003eDisputed Claims About Other Accounts\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that some online reports claimed the @e and @f one-letter Instagram accounts were obtained through an active exploit. However, other people disputed that claim and argued that the usernames were secured by an individual with internal privileges.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said it could not independently verify either claim. The article also notes that single-letter social media accounts are rare and can be worth tens of thousands of U.S. dollars on the black market.\u003c/p\u003e\n\n\u003ch2 id=\"meta-s-response\"\u003eMeta’s Response\u003c/h2\u003e\n\n\u003cp\u003eMeta had not published a press release with an official response at the time of publication. However, Meta vice president of communications Andy Stone replied on social media to an affected user and said the “issue has been resolved” and that Meta was securing impacted accounts.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Meta with a request for comment. The article states that Meta had not responded by the time of publication.\u003c/p\u003e\n","keyPoints":["Multiple Instagram users reported that their accounts were hijacked after attackers convinced Meta’s AI-powered support tools that they were the legitimate owners.","The reported takeover method involved starting Instagram’s hacked-account recovery flow, using an AI-generated video based on a target’s account photo to pass selfie verification, and then changing the account’s associated email address.","Some affected users said the method bypassed protections such as two-factor authentication and left them unable to recover access through Meta’s automated chatbot support process.","Impacted accounts included rare or high-value accounts such as one previously used by the Obama White House team, Jane Manchun Wong’s account, @hey, and @korn.","Meta vice president of communications Andy Stone said on social media that the issue had been resolved and that Meta was securing impacted accounts."],"insights":["Meta’s recovery workflow reportedly allowed a public photo from the target’s own Instagram account to be transformed into an AI-generated selfie video that passed identity verification.","The hijacking path was especially damaging because changing the account email enabled attackers to receive password reset codes, effectively turning the recovery process into the takeover mechanism.","Users reported that safeguards such as facial scans and two-factor authentication did not prevent account loss when the recovery system accepted the attacker as the legitimate owner.","Attackers reportedly used VPN services to match the target’s usual region, indicating that geolocation checks alone were not sufficient to trigger stronger recovery protections.","The lack of human escalation in Meta’s support process left some affected users unable to challenge or reverse automated account recovery decisions."],"referencedReports":[],"body":"\u003cp\u003eMultiple Instagram users reported losing access to their accounts after attackers allegedly abused Meta’s AI-powered support tools to convince the system they were the legitimate owners. The impacted accounts included rare and high-value handles, such as one previously used by the Obama White House team, Jane Manchun Wong’s account, @hey, and @korn. Some affected users said they had already enabled safeguards such as facial scans and two-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eThe reported takeover process started through Instagram’s hacked-account or password recovery flow. According to the article, attackers used a photo from the target’s account, converted it into an AI-generated video, and uploaded it for selfie verification. After changing the email address on the account, the attacker could initiate a password reset and receive the security code needed to gain access.\u003c/p\u003e\n\n\u003cp\u003eAffected users described Meta’s recovery process as an automated loop with no effective human escalation. The owner of @korn said they spent six hours trying to reach human support and received broken links from Meta’s support AI. Meta communications vice president Andy Stone later said on social media that the issue had been resolved and that Meta was securing impacted accounts.\u003c/p\u003e\n"},{"n":8,"title":"Russia claims foreign spy agencies hacked officials' phones","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-claims-foreign-spy-agencies-hacked-gov-officials","time":"16:10","priority":"MAY READ","score":68,"tldr":"Russia’s FSB claims foreign intelligence agencies hacked senior officials’ phones to steal communications, location data and audio/video, allegedly using infrastructure tied to major tech companies. The agency provided no technical evidence or named spyware, and companies such as Cloudflare and Fastly were not accused of direct involvement.","briefOverview":"\u003cp\u003eRussia’s Federal Security Service accused foreign intelligence services of carrying out a large-scale espionage operation against senior Russian officials’ mobile devices. The FSB said malicious software was installed on officials’ phones to collect sensitive government information. Russian authorities have opened a criminal investigation to identify the perpetrators, map the infrastructure used, and assess the scope of compromised information.\u003c/p\u003e\n\n\u003cp\u003eThe FSB alleged the operation used the technical capabilities of major international IT corporations and mobile communication technologies. It claimed the malware enabled access to correspondence, phone calls, geolocation information, contact lists, and audio and video data from devices and their surroundings. The agency did not name the spyware, explain how devices were infected, or provide technical evidence supporting its claims.\u003c/p\u003e\n\n\u003cp\u003eTASS reported that an FSB official described the campaign as one of the largest foreign intelligence operations ever uncovered by the agency. The FSB also distributed a video to Russian media that reportedly showed offices linked to Cloudflare and Fastly, though neither company was directly accused of participating. The allegations echo a 2023 FSB claim that U.S. intelligence services used spyware to compromise thousands of Apple iPhones belonging to Russian officials and diplomats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRussia’s domestic security agency, the Federal Security Service, said it uncovered what it described as a large-scale espionage operation targeting senior Russian officials. The agency accused foreign intelligence services of installing malicious software on mobile devices to collect sensitive government information. The FSB said Russian authorities have opened a criminal investigation into the alleged operation.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FSB, the alleged spyware was used to extract data, intercept communications, and conduct covert audio and video surveillance. The agency claimed the operation allowed access to correspondence, phone calls, geolocation information, contact lists, and audio and video data collected from devices and their surroundings. It also alleged the operation used the technical capabilities of major international IT corporations and mobile communication technologies.\u003c/p\u003e\n\n\u003cp\u003eThe FSB did not disclose the name of the spyware, explain how the malware infected devices, or provide technical evidence supporting its claims. It said investigators are working to identify the perpetrators, map the infrastructure used in the operation, and determine the scope of compromised information. TASS reported that an FSB official described the campaign as one of the largest foreign intelligence operations ever uncovered by the agency.\u003c/p\u003e\n\n\u003cp\u003eThe FSB alleged that the purpose of the operation was to collect information on officials’ contacts, plans, and assessments directly rather than through intermediaries. It also claimed that some officials allegedly targeted in the campaign later appeared on U.S. and European Union sanctions lists. The agency suggested that intelligence collected through the operation may have been used to support pressure campaigns against them.\u003c/p\u003e\n\n\u003cp\u003eIn addition to its statement, the FSB distributed a video to Russian media outlets. TASS said the footage included offices linked to international technology companies whose infrastructure was allegedly used in the operation, including Cloudflare and Fastly. Neither company was directly accused of participating in the alleged espionage operation, and neither had provided public comments to Recorded Future News by the time of publication.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the allegations echo a 2023 FSB claim accusing U.S. intelligence services of using spyware to compromise thousands of Apple iPhones belonging to Russian officials and diplomats. That earlier campaign was dubbed Operation Triangulation by Kaspersky and targeted victims through malicious iMessages. The FSB did not link the new allegations to Operation Triangulation, and Kaspersky did not respond to a request for comment on the newly alleged campaign.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRussia’s Federal Security Service accused foreign intelligence services of conducting a large-scale espionage operation against senior Russian officials. The agency said malicious software was installed on the mobile devices of senior officials to secretly collect sensitive government information. The FSB characterized the alleged activity as an operation that used the infrastructure and capabilities of major international technology companies.\u003c/p\u003e\n\n\u003cp\u003eRussian authorities have opened a criminal investigation into the alleged campaign. According to the FSB, investigative work is underway to identify the perpetrators, map the infrastructure used in the operation, and determine the scope of information that may have been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-capabilities-and-collected-data\"\u003eAlleged capabilities and collected data\u003c/h2\u003e\n\n\u003cp\u003eThe FSB alleged that the malware installed on officials’ mobile devices could extract data, intercept communications, and conduct covert audio and video surveillance. The agency said the alleged operation enabled access to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCorrespondence.\u003c/li\u003e\n\u003cli\u003ePhone calls.\u003c/li\u003e\n\u003cli\u003eGeolocation information.\u003c/li\u003e\n\u003cli\u003eContact lists.\u003c/li\u003e\n\u003cli\u003eAudio and video data collected from devices and their surroundings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe agency said the operation was carried out “using the technical capabilities of major international IT corporations and mobile communication technologies.” It did not identify the spyware allegedly used, explain the infection method, or provide technical evidence supporting its claims.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-objective-and-significance\"\u003eClaimed objective and significance\u003c/h2\u003e\n\n\u003cp\u003eAccording to Russia’s state-owned news agency TASS, an FSB official described the campaign as one of the largest foreign intelligence operations ever uncovered by the agency. The official said the objective was to collect information directly on officials’ contacts, plans, and assessments rather than through intermediaries.\u003c/p\u003e\n\n\u003cp\u003eThe FSB also claimed that some officials allegedly targeted in the campaign later appeared on U.S. and European Union sanctions lists. The agency suggested that the intelligence may have been used to support pressure campaigns against those officials.\u003c/p\u003e\n\n\u003ch2 id=\"named-companies-and-infrastructure-claims\"\u003eNamed companies and infrastructure claims\u003c/h2\u003e\n\n\u003cp\u003eThe FSB distributed a video to Russian media outlets in addition to publishing its statement. TASS reported that the footage included offices linked to international technology companies whose infrastructure was allegedly used in the operation. The companies named in that context included Cloudflare and Fastly.\u003c/p\u003e\n\n\u003cp\u003eThe article states that neither Cloudflare nor Fastly was directly accused of participating in the alleged espionage operation. Both companies operate content delivery networks that help websites distribute content globally and provide cybersecurity services. Cloudflare and Fastly had not offered public comments to Recorded Future News by the time of publication.\u003c/p\u003e\n\n\u003ch2 id=\"prior-related-fsb-allegation\"\u003ePrior related FSB allegation\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the FSB’s latest allegations echo a previous claim from 2023. In that earlier case, the agency accused U.S. intelligence services of using spyware to compromise thousands of Apple iPhones belonging to Russian officials and diplomats.\u003c/p\u003e\n\n\u003cp\u003eThat earlier campaign was dubbed Operation Triangulation by Russian cybersecurity company Kaspersky. It targeted victims through malicious iMessages and is believed to have operated for several years. At the time, the FSB accused Apple of facilitating the operation, which Apple rejected.\u003c/p\u003e\n\n\u003cp\u003eApple told Recorded Future News in 2023 that it had never worked with any government to insert a backdoor into any Apple product and never would. The FSB did not link Tuesday’s allegations to Operation Triangulation. Kaspersky did not respond to a request for comment on the newly alleged espionage campaign.\u003c/p\u003e\n\n\u003ch2 id=\"current-evidentiary-status-in-the-article\"\u003eCurrent evidentiary status in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article reports the FSB’s allegations but notes several gaps in what the agency disclosed. The FSB did not name the spyware, describe how the malware infected devices, or publish technical evidence. The article also states that companies whose infrastructure was referenced, including Cloudflare and Fastly, were not directly accused of involvement and had not provided public comments by publication time.\u003c/p\u003e\n","keyPoints":["Russia's Federal Security Service accused foreign intelligence services of conducting a large-scale espionage operation against senior Russian officials' mobile devices.","The FSB alleged the malware could extract data, intercept communications, access geolocation and contact lists, and conduct covert audio and video surveillance.","Russian authorities opened a criminal investigation to identify the perpetrators, map the infrastructure used, and determine the scope of compromised information.","The FSB did not name the spyware, explain how devices were infected, or provide technical evidence supporting its claims.","TASS reported that FSB-distributed footage included offices linked to Cloudflare and Fastly, but neither company was directly accused of participating in the alleged operation."],"insights":["The FSB’s claims are difficult to independently assess because the agency did not name the spyware, describe the infection method, or publish technical evidence.","The article highlights that infrastructure associated with companies such as Cloudflare and Fastly can appear in alleged espionage activity without those companies being directly accused of participation.","The FSB connected some alleged targets’ later inclusion on U.S. and EU sanctions lists to the claimed intelligence collection, framing the alleged operation as tied to broader pressure campaigns.","The new allegation resembles the FSB’s 2023 claims about compromised Apple devices, but the agency did not link the latest case to Operation Triangulation."],"referencedReports":[],"body":"\u003cp\u003eRussia’s Federal Security Service accused foreign intelligence services of carrying out a large-scale espionage operation against senior Russian officials’ mobile devices. The FSB said malicious software was installed on officials’ phones to collect sensitive government information. Russian authorities have opened a criminal investigation to identify the perpetrators, map the infrastructure used, and assess the scope of compromised information.\u003c/p\u003e\n\n\u003cp\u003eThe FSB alleged the operation used the technical capabilities of major international IT corporations and mobile communication technologies. It claimed the malware enabled access to correspondence, phone calls, geolocation information, contact lists, and audio and video data from devices and their surroundings. The agency did not name the spyware, explain how devices were infected, or provide technical evidence supporting its claims.\u003c/p\u003e\n\n\u003cp\u003eTASS reported that an FSB official described the campaign as one of the largest foreign intelligence operations ever uncovered by the agency. The FSB also distributed a video to Russian media that reportedly showed offices linked to Cloudflare and Fastly, though neither company was directly accused of participating. The allegations echo a 2023 FSB claim that U.S. intelligence services used spyware to compromise thousands of Apple iPhones belonging to Russian officials and diplomats.\u003c/p\u003e\n"},{"n":14,"title":"Dashlane Discloses Brute-Force Attack, Encrypted Vaults of Fewer Than 20 Users Downloaded","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/dashlane-discloses-brute-force-attack.html","time":"03:55","priority":"MAY READ","score":68,"tldr":"Dashlane says an external brute-force campaign against some user accounts succeeded in fewer than 20 cases, allowing attackers to download encrypted password vaults. The company says the vaults remain protected by users’ Master Passwords and has notified affected users directly.","briefOverview":"\u003cp\u003eDashlane disclosed that fewer than 20 users on its personal subscription plan had their encrypted vaults downloaded after a brute-force attack by an unknown external threat actor. The attack was launched on May 31, 2026, against certain Dashlane user accounts. Dashlane said the campaign aimed to break two-factor authentication protections and allow new devices to be registered on existing accounts.\u003c/p\u003e\n\n\u003cp\u003eThe company said a high volume of attempts triggered temporary account suspensions and authentication issues because of its built-in security controls. Dashlane later said attackers succeeded in a small number of cases and downloaded copies of encrypted vaults for less than 20 personal plan users. Dashlane stated that users who did not receive a specific vault-risk message from the company were not impacted.\u003c/p\u003e\n\n\u003cp\u003eDashlane said the downloaded vault data cannot be accessed without the user’s Master Password. The company added that attempts to crack a vault are unlikely to succeed unless the Master Password is trivial and highly predictable. As a precaution, Dashlane advised users to review registered devices, remove any they do not recognize, enable 2FA, and use a strong Master Password.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDashlane disclosed a brute-force attack affecting certain user accounts on its service. The company said fewer than 20 users on the personal subscription plan had their encrypted vaults downloaded. The attack was carried out by an unknown external threat actor. Dashlane said its own internal systems were not impacted by the incident.\u003c/p\u003e\n\n\u003cp\u003eAccording to Dashlane, the activity began on May 31, 2026. The attacker launched a brute-force campaign against certain Dashlane user accounts. The stated objective was to break two-factor authentication protections and register new devices on existing user accounts. The exact number of targeted users remains unknown.\u003c/p\u003e\n\n\u003cp\u003eDashlane said the high volume of attempts on targeted accounts triggered temporary account suspensions and authentication issues. The company attributed those disruptions to its built-in security controls. Access to accounts has since been restored. Dashlane later confirmed that the attackers succeeded in a handful of cases.\u003c/p\u003e\n\n\u003cp\u003eThe impact disclosed by Dashlane was limited to fewer than 20 personal plan users whose encrypted vaults were downloaded. Dashlane said it directly notified each affected user. It also stated that if a Dashlane user did not receive a message specifically about vault risk, there was no impact to that user’s account.\u003c/p\u003e\n\n\u003cp\u003eDashlane emphasized that vault data cannot be accessed without the Master Password. The company said that unless a Master Password is trivial and highly predictable, attempts to crack open the vault are unlikely to succeed. As a precaution, Dashlane advised users to review devices registered to their accounts, remove unrecognized devices, enable 2FA, and use a long, unique, difficult-to-guess Master Password.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDashlane disclosed that an unknown external threat actor launched a brute-force attack against certain Dashlane user accounts. The incident affected users on the personal subscription plan, with the company stating that fewer than 20 users had their encrypted vaults downloaded. Dashlane said its internal systems were not impacted.\u003c/p\u003e\n\n\u003cp\u003eThe attack was reported by the company as having occurred on May 31, 2026. Dashlane said the activity was aimed at breaking two-factor authentication protections and allowing the attacker to register new devices on existing user accounts.\u003c/p\u003e\n\n\u003ch2 id=\"attack-details\"\u003eAttack Details\u003c/h2\u003e\n\n\u003cp\u003eDashlane described the incident as a brute-force attack against certain user accounts. The article states that the attacker’s goal was to defeat 2FA protections and register new devices on existing accounts.\u003c/p\u003e\n\n\u003cp\u003eThe exact number of users targeted is not known. Dashlane said the high volume of attempts against some accounts triggered temporary account suspensions and authentication issues. The company attributed those effects to its built-in security controls.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eDashlane said attackers succeeded in a handful of cases. In those cases, copies of encrypted vaults belonging to fewer than 20 personal plan users were downloaded.\u003c/p\u003e\n\n\u003cp\u003eDashlane said it directly notified each affected user. The company also stated that users who did not receive a Dashlane message specifically about vault risk were not impacted.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that access to the affected accounts has since been restored. Dashlane also said its own internal systems were not affected by the incident.\u003c/p\u003e\n\n\u003ch2 id=\"vault-protection-and-master-passwords\"\u003eVault Protection and Master Passwords\u003c/h2\u003e\n\n\u003cp\u003eDashlane emphasized that the downloaded vault data cannot be accessed without the user’s Master Password. The article states that attempts to crack open a vault are unlikely to succeed unless the Master Password is trivial and highly predictable.\u003c/p\u003e\n\n\u003cp\u003eThis means the encrypted vault downloads do not automatically provide readable access to stored data. The article frames the Master Password as the key protection controlling whether downloaded vault data can be accessed.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-user-guidance\"\u003eResponse and User Guidance\u003c/h2\u003e\n\n\u003cp\u003eDashlane advised users to take several precautionary steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReview the devices registered to their accounts.\u003c/li\u003e\n\u003cli\u003eRemove any registered devices they do not recognize.\u003c/li\u003e\n\u003cli\u003eEnable two-factor authentication.\u003c/li\u003e\n\u003cli\u003eUse a strong Master Password that is long, unique, and difficult to guess.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company also indicated that direct notification was used for users whose vaults were at risk. According to Dashlane, users who did not receive a specific vault-risk message from Dashlane have no impact to their accounts.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe incident involved a brute-force campaign against certain Dashlane accounts that succeeded in fewer than 20 cases, resulting in encrypted vault downloads. Dashlane said the vaults remain protected by Master Passwords, and the company advised users to check registered devices, enable 2FA, and maintain a strong Master Password.\u003c/p\u003e\n","keyPoints":["Dashlane disclosed that fewer than 20 users on its personal subscription plan had their encrypted vaults downloaded after a brute-force attack by an unknown external threat actor.","The May 31, 2026 attack targeted certain Dashlane user accounts with the aim of breaking two-factor authentication protections and registering new devices on existing accounts.","Dashlane said the high volume of attempts triggered temporary account suspensions and authentication issues due to its built-in security controls.","Dashlane directly notified each user whose vault was at risk and said users who did not receive a specific vault-risk message were not impacted.","Dashlane advised users to review registered devices, remove unrecognized devices, enable two-factor authentication, and use a strong Master Password."],"insights":["Dashlane’s built-in security controls detected the high-volume brute-force activity and caused account suspensions, but the attackers still succeeded in a small number of cases.","Because the downloaded vaults remain inaccessible without the Master Password, the practical risk to affected users depends heavily on whether their Master Password is long, unique, and difficult to guess.","Users can use Dashlane’s direct notification approach to assess exposure: Dashlane said accounts without a specific vault-risk message were not impacted.","Reviewing registered devices is especially relevant because the attack’s stated goal was to bypass two-factor authentication protections and register new devices on existing accounts."],"referencedReports":[{"title":"Dashlane status incident update on brute-force attack","url":"https://status.dashlane.com/pages/incident/5aabcb89fccc4b04d3774443/6a1c519ceac9dc05ffa1f526","publisher":"Dashlane","context":"The article cites Dashlane’s May 31, 2026 status incident update describing an external brute-force attack against certain user accounts.","category":"","primary":false},{"title":"Security advisory: Brute force attack on Dashlane user accounts","url":"https://support.dashlane.com/hc/en-us/articles/36038764990866-Security-advisory-Brute-force-attack-on-Dashlane-user-accounts","publisher":"Dashlane","context":"The article cites Dashlane’s security advisory stating that fewer than 20 affected users were directly notified about vault risk.","category":"","primary":false}],"body":"\u003cp\u003eDashlane disclosed that fewer than 20 users on its personal subscription plan had their encrypted vaults downloaded after a brute-force attack by an unknown external threat actor. The attack was launched on May 31, 2026, agains
