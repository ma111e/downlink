<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Colorblind theme: light base, colorblind-safe Okabe-Ito accents. Crucially

<script>
window.__DL_ARTICLES = [{"n":7,"title":"CISA flags two-year-old Oracle flaw as actively exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-orders-feds-to-patch-actively-exploited-oracle-weblogic-flaw/","time":"12:40","priority":"MUST READ","score":95,"tldr":"CISA says a high-severity Oracle WebLogic Server flaw, CVE-2024-21182, is now being actively exploited and has ordered U.S. federal agencies to patch by June 4. All organizations running affected WebLogic versions should apply Oracle’s July 2024 fixes or otherwise mitigate immediately.","briefOverview":"\u003cp\u003eCISA has ordered U.S. federal agencies to secure systems against CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability that is now being actively exploited in attacks. Oracle patched the flaw in July 2024, and CISA added it to its Known Exploited Vulnerabilities catalog. Federal agencies were ordered to patch affected WebLogic servers by midnight on Thursday, June 4, under Binding Operational Directive 22-01.\u003c/p\u003e\n\n\u003cp\u003eCVE-2024-21182 affects Oracle WebLogic Server versions 12.2.1.4.0 and 14.1.1.0.0. Oracle said the flaw is easily exploitable by an unauthenticated attacker with network access via T3 or IIOP and can compromise Oracle WebLogic Server. Successful attacks can result in unauthorized access to critical data or complete access to all accessible Oracle WebLogic Server data.\u003c/p\u003e\n\n\u003cp\u003eThe article says Shodan tracks more than 1,592 internet-exposed Oracle WebLogic servers vulnerable to CVE-2024-21182 exploits, including 961 running version 12.2.1.4.0 and 631 running version 14.1.1.0.0. Although CISA’s directive applies only to federal agencies, the agency urged all network defenders to apply vendor mitigations, follow applicable cloud-service guidance, or discontinue use if mitigations are unavailable.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has flagged CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability, as actively exploited in attacks. The agency added the flaw to its catalog of security flaws exploited in attacks and ordered U.S. federal agencies to patch their WebLogic servers by midnight on Thursday, June 4. The order was issued under Binding Operational Directive 22-01, which applies to federal agencies.\u003c/p\u003e\n\n\u003cp\u003eOracle WebLogic Server is described as an enterprise-grade Java application server used as middleware for large, multi-tier distributed applications. The affected versions named in the article are Oracle WebLogic Server 12.2.1.4.0 and 14.1.1.0.0. Oracle released security patches for CVE-2024-21182 in July 2024.\u003c/p\u003e\n\n\u003cp\u003eOracle described the vulnerability as easily exploitable by an unauthenticated attacker with network access via T3 or IIOP. According to Oracle’s quoted advisory language, successful exploitation can compromise Oracle WebLogic Server. The article says attacks can result in unauthorized access to critical data or complete access to all Oracle WebLogic Server accessible data.\u003c/p\u003e\n\n\u003cp\u003eThe exposed attack surface remains measurable, according to Shodan data cited in the article. Shodan tracks more than 1,592 Oracle WebLogic servers exposed online and vulnerable to CVE-2024-21182 exploits. The article breaks this down as 961 servers running version 12.2.1.4.0 and 631 running version 14.1.1.0.0.\u003c/p\u003e\n\n\u003cp\u003eCISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency urged all network defenders, including private-sector organizations, to patch systems against ongoing CVE-2024-21182 attacks as soon as possible. It advised applying vendor mitigations, following applicable BOD 22-01 guidance for cloud services, or discontinuing use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003cp\u003eThe article also places CVE-2024-21182 within a broader pattern of Oracle-related vulnerabilities flagged by CISA. It notes that CISA previously ordered agencies to patch an actively exploited Oracle E-Business Suite SSRF vulnerability, CVE-2025-61884, and that Oracle later released an emergency fix for CVE-2026-21992 in Identity Manager and Web Services Manager. Over the last several years, CISA has flagged 43 vulnerabilities across Oracle products as exploited in the wild, including 12 abused in ransomware attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA has ordered U.S. federal agencies to secure systems against CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability that is now actively exploited in attacks. Oracle WebLogic Server is described in the article as an enterprise-grade Java application server used as middleware for large, multi-tier distributed applications.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2024-21182 to its catalog of security flaws exploited in attacks and directed federal agencies to patch affected WebLogic servers by midnight on Thursday, June 4. The requirement is mandated by Binding Operational Directive 22-01.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is tracked as CVE-2024-21182 and affects Oracle WebLogic Server versions 12.2.1.4.0 and 14.1.1.0.0. Oracle released patches for the flaw in July 2024.\u003c/p\u003e\n\n\u003cp\u003eOracle described the issue as an easily exploitable vulnerability that allows an unauthenticated attacker with network access via T3 or IIOP to compromise Oracle WebLogic Server. The article states that the flaw can be exploited remotely by threat actors with no privileges in low-complexity attacks.\u003c/p\u003e\n\n\u003cp\u003eAccording to Oracle’s quoted description, successful attacks can result in unauthorized access to critical data or complete access to all Oracle WebLogic Server accessible data.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-noted-in-the-article\"\u003eExposure noted in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article cites Shodan data showing more than 1,592 Oracle WebLogic servers exposed online and vulnerable to CVE-2024-21182 exploits.\u003c/p\u003e\n\n\u003cp\u003eThe exposed instances are broken down as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e961 servers running Oracle WebLogic Server version 12.2.1.4.0.\u003c/li\u003e\n\u003cli\u003e631 servers running Oracle WebLogic Server version 14.1.1.0.0.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cisa-response-and-guidance\"\u003eCISA response and guidance\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2024-21182 to its Known Exploited Vulnerabilities catalog after identifying it as exploited in attacks. Under BOD 22-01, federal agencies were ordered to patch their WebLogic servers by the June 4 deadline.\u003c/p\u003e\n\n\u003cp\u003eAlthough BOD 22-01 applies only to federal agencies, CISA urged all network defenders, including private-sector organizations, to patch systems against ongoing CVE-2024-21182 attacks as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eCISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency advised organizations to apply mitigations according to vendor instructions, follow applicable BOD 22-01 guidance for cloud services, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected parties and stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe directly affected technology is Oracle WebLogic Server, specifically versions 12.2.1.4.0 and 14.1.1.0.0. U.S. federal agencies are subject to CISA’s binding patching order, while all network defenders are urged to apply mitigations.\u003c/p\u003e\n\n\u003cp\u003eThe article names Oracle as the vendor that released patches for CVE-2024-21182 in July 2024. It also cites Shodan as the internet intelligence platform tracking exposed Oracle WebLogic Server instances.\u003c/p\u003e\n\n\u003cp\u003eNo specific threat actor, group, or campaign is named in the article as responsible for the active exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"related-oracle-vulnerability-context\"\u003eRelated Oracle vulnerability context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA has flagged other Oracle product vulnerabilities as actively exploited. In October, CISA ordered government agencies to patch CVE-2025-61884, an unauthenticated server-side request forgery vulnerability in Oracle E-Business Suite, after flagging it as actively exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Oracle released an out-of-band security update in March for CVE-2026-21992, a critical unauthenticated remote code execution vulnerability in Identity Manager and Web Services Manager. Oracle declined to comment when BleepingComputer asked about that vulnerability’s exploitation status.\u003c/p\u003e\n\n\u003cp\u003eOver the last several years, CISA has flagged 43 vulnerabilities across various Oracle products as exploited in the wild. The article states that 12 of those Oracle product vulnerabilities have been abused in ransomware attacks.\u003c/p\u003e\n\n\u003ch2 id=\"key-significance\"\u003eKey significance\u003c/h2\u003e\n\n\u003cp\u003eThe most significant point is that CVE-2024-21182 is no longer only a patched Oracle WebLogic Server vulnerability; it is now listed by CISA as actively exploited in attacks. The article emphasizes that vulnerable WebLogic servers remain exposed online and that CISA has imposed a short patching deadline for federal agencies while urging broader remediation across all sectors.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability, to its Known Exploited Vulnerabilities catalog after it was reported as actively exploited in attacks.","Oracle patched CVE-2024-21182 in July 2024 and said it can allow an unauthenticated attacker with network access via T3 or IIOP to compromise Oracle WebLogic Server.","The vulnerability affects Oracle WebLogic Server versions 12.2.1.4.0 and 14.1.1.0.0 and can lead to unauthorized access to critical data or complete access to accessible WebLogic Server data.","Shodan tracks more than 1,592 internet-exposed Oracle WebLogic servers running versions identified in the article as vulnerable to CVE-2024-21182 exploits.","CISA ordered U.S. federal agencies to patch affected WebLogic servers by midnight on Thursday, June 4, and urged all network defenders to apply vendor mitigations or discontinue use if mitigations are unavailable."],"insights":["CISA’s short remediation deadline for federal agencies indicates it considers the active exploitation of CVE-2024-21182 urgent despite Oracle having released patches in July 2024.","The attack surface is specifically tied to WebLogic network exposure via T3 and IIOP, making restriction of those protocols an important mitigation consideration alongside patching.","The article identifies a measurable exposed population, with Shodan tracking 1,592 internet-facing Oracle WebLogic servers on the affected versions.","Oracle products have a recurring presence in CISA’s exploited-vulnerability catalog, with 43 Oracle product flaws flagged as exploited in the wild and 12 linked to ransomware attacks."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert announcing that CVE-2024-21182 was added to its catalog of vulnerabilities exploited in attacks.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=CVE-2024-21182\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=20\u0026url=","publisher":"CISA","context":"The article references CISA's catalog entry for CVE-2024-21182 as the basis for the federal patching requirement.","category":"","primary":false},{"title":"Oracle Critical Patch Update Advisory - July 2024","url":"http://www.oracle.com/security-alerts/cpujul2024.html#:~:text=CVE%2D2024%2D21182,-Oracle","publisher":"Oracle","context":"The article quotes Oracle's July 2024 security advisory describing CVE-2024-21182 and its potential impact on Oracle WebLogic Server.","category":"","primary":false}],"body":"\u003cp\u003eCISA has ordered U.S. federal agencies to secure systems against CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability that is now being actively exploited in attacks. Oracle patched the flaw in July 2024, and CISA added it to its Known Exploited Vulnerabilities catalog. Federal agencies were ordered to patch affected WebLogic servers by midnight on Thursday, June 4, under Binding Operational Directive 22-01.\u003c/p\u003e\n\n\u003cp\u003eCVE-2024-21182 affects Oracle WebLogic Server versions 12.2.1.4.0 and 14.1.1.0.0. Oracle said the flaw is easily exploitable by an unauthenticated attacker with network access via T3 or IIOP and can compromise Oracle WebLogic Server. Successful attacks can result in unauthorized access to critical data or complete access to all accessible Oracle WebLogic Server data.\u003c/p\u003e\n\n\u003cp\u003eThe article says Shodan tracks more than 1,592 internet-exposed Oracle WebLogic servers vulnerable to CVE-2024-21182 exploits, including 961 running version 12.2.1.4.0 and 631 running version 14.1.1.0.0. Although CISA’s directive applies only to federal agencies, the agency urged all network defenders to apply vendor mitigations, follow applicable cloud-service guidance, or discontinue use if mitigations are unavailable.\u003c/p\u003e\n"},{"n":12,"title":"Google June 2026 Android Update Patches 124 Flaws, One Actively Exploited","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-june-2026-android-update-patches.html","time":"18:46","priority":"MUST READ","score":95,"tldr":"Google’s June 2026 Android security update fixes 124 vulnerabilities, including CVE-2025-48595, a high-severity Framework privilege-escalation flaw that is being actively exploited in limited, targeted attacks. Users should apply the latest 2026-06-05 patch level to receive all Android, kernel, and chipset fixes.","briefOverview":"\u003cp\u003eGoogle released its June 2026 Android security update, patching 124 vulnerabilities across the operating system. The update includes a high-severity flaw in the Android Framework component that has come under active exploitation. Google said there are indications the flaw may be under limited, targeted exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe actively exploited vulnerability is CVE-2025-48595, which has a CVSS score of 8.4. It is described as a privilege escalation issue involving possible code execution due to an integer overflow. The flaw affects devices running Android 14, Android 15, Android 16, and Android 16 QPR2.\u003c/p\u003e\n\n\u003cp\u003eGoogle released two patch levels for the month: 2026-06-01 and 2026-06-05. The 2026-06-05 patch level includes all fixes from the first set, plus patches for kernel and third-party chipset components. Those third-party components include fixes from Imagination Technologies, MediaTek, Qualcomm, and Unisoc.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle released patches for 124 security vulnerabilities affecting Android as part of its June 2026 security update. The most notable issue is a high-severity flaw in the Framework component that has been actively exploited. Google said CVE-2025-48595 may be under “limited, targeted exploitation.”\u003c/p\u003e\n\n\u003cp\u003eCVE-2025-48595 has a CVSS score of 8.4 and is described as a privilege escalation vulnerability. According to the CVE description cited in the article, the flaw involves possible code execution due to an integer overflow in multiple locations. Exploitation does not require user interaction or additional execution privileges.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects devices running Android 14, Android 15, Android 16, and Android 16 QPR2. Google did not disclose who may be behind the exploitation, which targets were affected, or the scale of the activity. The article notes that similar flaws have been weaponized by commercial spyware vendors in extremely targeted attacks against high-profile individuals.\u003c/p\u003e\n\n\u003cp\u003eIn addition to the Framework issue, Google patched multiple vulnerabilities in the System component. The most severe System component vulnerabilities could allow local escalation of privilege without requiring additional execution privileges. The article does not identify these System vulnerabilities by CVE.\u003c/p\u003e\n\n\u003cp\u003eGoogle issued two security patch levels for June 2026: 2026-06-01 and 2026-06-05. The 2026-06-05 level contains all fixes from 2026-06-01 and adds patches for kernel and third-party chipset components. The third-party component fixes include items from Imagination Technologies, MediaTek, Qualcomm, and Unisoc.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle released the June 2026 Android security update, addressing 124 vulnerabilities in the Android operating system. The update includes one high-severity flaw in the Framework component that has come under active exploitation. Google identified the flaw as CVE-2025-48595 and said there are indications it may be under “limited, targeted exploitation.”\u003c/p\u003e\n\n\u003ch2 id=\"actively-exploited-vulnerability\"\u003eActively Exploited Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eThe actively exploited vulnerability is tracked as CVE-2025-48595. It has a CVSS score of 8.4 and is described as a privilege escalation flaw. The issue affects devices running Android 14, Android 15, Android 16, and Android 16 QPR2.\u003c/p\u003e\n\n\u003cp\u003eAccording to the CVE description quoted in the article, the vulnerability exists “in multiple locations” and may allow code execution due to an integer overflow. The flaw could lead to local escalation of privilege. Exploitation does not require user interaction or additional execution privileges.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eGoogle acknowledged indications that CVE-2025-48595 may be under limited, targeted exploitation. The company did not provide details about who may be behind the activity. It also did not disclose the targets affected or the scale of exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article states that similar flaws have been weaponized by commercial spyware vendors. It says those flaws have been used to target high-profile individuals in extremely targeted attacks.\u003c/p\u003e\n\n\u003ch2 id=\"other-patched-vulnerabilities\"\u003eOther Patched Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eBeyond CVE-2025-48595, Google patched a number of vulnerabilities in the System component. The article says the most severe of these System component flaws could lead to local escalation of privilege. These vulnerabilities also require no additional execution privileges.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide individual identifiers or technical descriptions for the System component vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"patch-levels-and-components\"\u003ePatch Levels and Components\u003c/h2\u003e\n\n\u003cp\u003eGoogle released two sets of Android patches for June 2026:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2026-06-01 security patch level\u003c/li\u003e\n\u003cli\u003e2026-06-05 security patch level\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe 2026-06-05 patch level includes all fixes from the 2026-06-01 level. It also includes patches for kernel and third-party chipset components.\u003c/p\u003e\n\n\u003cp\u003eThe third-party component fixes include patches from:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImagination Technologies\u003c/li\u003e\n\u003cli\u003eMediaTek\u003c/li\u003e\n\u003cli\u003eQualcomm\u003c/li\u003e\n\u003cli\u003eUnisoc\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected Parties and Response\u003c/h2\u003e\n\n\u003cp\u003eThe affected ecosystem is Android, including devices running Android 14, Android 15, Android 16, and Android 16 QPR2. Google’s response was to release the June 2026 Android security patches across two patch levels. The article does not provide information about specific affected device models, victims, attackers, or exploitation scale.\u003c/p\u003e\n","keyPoints":["Google released June 2026 Android patches addressing 124 security vulnerabilities, including one high-severity flaw in the Framework component that is under active exploitation.","The actively exploited flaw is CVE-2025-48595, a privilege escalation vulnerability with a CVSS score of 8.4 affecting Android 14, 15, 16, and 16 QPR2 devices.","CVE-2025-48595 can allow code execution due to an integer overflow and may lead to local escalation of privilege without user interaction or additional execution privileges.","Google said CVE-2025-48595 may be under limited, targeted exploitation but did not disclose details about the attackers, targets, or scale.","Google released 2026-06-01 and 2026-06-05 patch levels, with the latter including fixes for kernel and third-party chipset components from Imagination Technologies, MediaTek, Qualcomm, and Unisoc."],"insights":["The 2026-06-05 patch level is the more complete update because it includes all 2026-06-01 fixes plus kernel and third-party chipset component patches.","CVE-2025-48595 is especially actionable for prioritization because exploitation requires no user interaction and no additional execution privileges.","Google’s reference to “limited, targeted exploitation” indicates the flaw is not merely theoretical, even though the company withheld details about attackers, targets, and scale.","The affected versions include Android 16 and Android 16 QPR2, so newer Android releases are not exempt from the actively exploited Framework flaw."],"referencedReports":[{"title":"Android Security Bulletin—June 2026","url":"https://source.android.com/docs/security/bulletin/2026/2026-06-01","publisher":"Google","context":"The article cites Google’s June 2026 Android security bulletin as the source for the 124 patched vulnerabilities and patch levels.","category":"","primary":false},{"title":"CVE-2025-48595","url":"https://www.cve.org/CVERecord?id=CVE-2025-48595","publisher":"CVE.org","context":"The article references the CVE.org record for the technical description of CVE-2025-48595 as an integer overflow leading to local privilege escalation.","category":"","primary":false}],"body":"\u003cp\u003eGoogle released its June 2026 Android security update, patching 124 vulnerabilities across the operating system. The update includes a high-severity flaw in the Android Framework component that has come under active exploitation. Google said there are indications the flaw may be under limited, targeted exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe actively exploited vulnerability is CVE-2025-48595, which has a CVSS score of 8.4. It is described as a privilege escalation issue involving possible code execution due to an integer overflow. The flaw affects devices running Android 14, Android 15, Android 16, and Android 16 QPR2.\u003c/p\u003e\n\n\u003cp\u003eGoogle released two patch levels for the month: 2026-06-01 and 2026-06-05. The 2026-06-05 patch level includes all fixes from the first set, plus patches for kernel and third-party chipset components. Those third-party components include fixes from Imagination Technologies, MediaTek, Qualcomm, and Unisoc.\u003c/p\u003e\n"},{"n":1,"title":"Google fixes one actively exploited Android zero-day, 124 flaws","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/google-fixes-one-actively-exploited-android-zero-day-124-flaws/","time":"11:10","priority":"MUST READ","score":94,"tldr":"Google’s June 2026 Android security update fixes 124 flaws, including CVE-2025-48595, a high-severity Android Framework zero-day already being used in limited targeted attacks to gain code execution and elevate privileges. Users should install the latest Android patches as soon as they are available for their devices.","briefOverview":"\u003cp\u003eGoogle released the June 2026 Android security patches to address 124 vulnerabilities, including one zero-day flaw exploited in targeted attacks. The actively abused issue is a high-severity Android Framework vulnerability tracked as CVE-2025-48595. Google said there are indications the flaw may be under limited, targeted exploitation.\u003c/p\u003e\n\n\u003cp\u003eCVE-2025-48595 can be exploited by local attackers to gain code execution and escalate privileges on devices running Android 14 or later. Google has not shared technical details about the flaw or additional information about the attacks targeting it. The article notes that similar flaws have previously been exploited by commercial spyware and nation-state operations targeting high-profile or high-interest individuals.\u003c/p\u003e\n\n\u003cp\u003eThe June updates also fix 18 critical vulnerabilities across System, Framework, and Qualcomm closed-source components. Google issued two patch levels, 2026-06-01 and 2026-06-05, with the latter including all fixes from the first batch plus additional third-party and kernel subcomponent fixes. Pixel devices will receive the updates immediately, while other Android vendors may take longer to test and adapt them.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle released the June 2026 Android security patches to fix 124 vulnerabilities, including one actively exploited zero-day. The zero-day is CVE-2025-48595, a high-severity vulnerability in the Android Framework. Google said there are indications that the flaw may be under limited, targeted exploitation.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, local attackers can exploit CVE-2025-48595 to gain code execution and escalate privileges. The flaw affects devices running Android 14 or later. Google has not provided technical details about the vulnerability or further information about the ongoing attacks and their targets.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that similar Android flaws have previously been exploited by commercial spyware and nation-state operations targeting high-profile or high-interest individuals. However, it does not identify any actor, spyware vendor, country, or specific victim connected to CVE-2025-48595. A Google spokesperson was not immediately available for comment when BleepingComputer requested more details.\u003c/p\u003e\n\n\u003cp\u003eThe June Android update also addresses 18 critical vulnerabilities across System, Framework, and Qualcomm closed-source components. These flaws could allow attackers to trigger denial-of-service conditions or elevate privileges on unpatched Android devices. Google said the most severe issue is a critical Framework vulnerability that could lead to remote escalation of privilege without additional execution privileges or user interaction.\u003c/p\u003e\n\n\u003cp\u003eGoogle issued two patch levels for the month: 2026-06-01 and 2026-06-05. The 2026-06-05 patch level includes all fixes from 2026-06-01 plus fixes for closed-source third-party and kernel subcomponents that may not apply to all Android devices. Pixel devices will receive the updates immediately, while other vendors may take longer to test and customize them for specific hardware configurations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle released the June 2026 Android security patches to address 124 vulnerabilities. The fixes include one zero-day flaw that the article says has been exploited in targeted attacks. The actively abused vulnerability is tracked as CVE-2025-48595 and affects the Android Framework.\u003c/p\u003e\n\n\u003cp\u003eGoogle stated that there are indications CVE-2025-48595 may be under limited, targeted exploitation. The company also said that exploitation of many Android issues is made more difficult by security enhancements in newer Android versions. Google encouraged all users to update to the latest version of Android where possible.\u003c/p\u003e\n\n\u003ch2 id=\"actively-exploited-zero-day\"\u003eActively Exploited Zero-Day\u003c/h2\u003e\n\n\u003cp\u003eCVE-2025-48595 is described as a high-severity Android Framework vulnerability. The article says local attackers can exploit it to gain code execution and escalate privileges. Devices running Android 14 or later are affected.\u003c/p\u003e\n\n\u003cp\u003eGoogle has not shared technical details about CVE-2025-48595. The company has also not provided more information about the ongoing attacks targeting the flaw. BleepingComputer said a Google spokesperson was not immediately available for comment when contacted for more details about the attacks and their targets.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-context\"\u003eExploitation Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that similar flaws have previously been exploited by commercial spyware and nation-state operations. Those prior operations targeted high-profile or high-interest individuals. The article does not attribute CVE-2025-48595 exploitation to any named threat actor, country, spyware vendor, or malware family.\u003c/p\u003e\n\n\u003ch2 id=\"other-vulnerabilities-fixed\"\u003eOther Vulnerabilities Fixed\u003c/h2\u003e\n\n\u003cp\u003eIn addition to the zero-day, Google fixed 18 critical vulnerabilities across System, Framework, and Qualcomm closed-source components. The article says attackers could abuse these flaws to trigger denial-of-service conditions and elevate privileges on unpatched Android devices.\u003c/p\u003e\n\n\u003cp\u003eGoogle described the most severe issue as a critical Framework vulnerability that could lead to remote escalation of privilege. Google said no additional execution privileges are needed for exploitation. Google also said user interaction is not needed for exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"patch-levels-and-availability\"\u003ePatch Levels and Availability\u003c/h2\u003e\n\n\u003cp\u003eGoogle issued two sets of Android patches on Monday:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2026-06-01 security patch level\u003c/li\u003e\n\u003cli\u003e2026-06-05 security patch level\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe 2026-06-05 patch level includes all fixes from the 2026-06-01 batch. It also includes patches for closed-source third-party and kernel subcomponents. The article notes that those additional fixes may not apply to all Android devices.\u003c/p\u003e\n\n\u003cp\u003eGoogle Pixel devices will receive the security updates immediately. Other Android vendors often take longer to test and modify the updates for specific hardware configurations.\u003c/p\u003e\n\n\u003ch2 id=\"related-recent-android-zero-days\"\u003eRelated Recent Android Zero-Days\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2025-48595 in the context of other recent Android zero-days. Google previously released patches for two high-severity zero-days, CVE-2025-48633 and CVE-2025-48572, in December. Google also patched another zero-day in a Qualcomm display component, CVE-2026-21385, in March.\u003c/p\u003e\n\n\u003cp\u003eAll of those prior flaws were described as being under limited, targeted exploitation. The article does not provide additional technical details about those earlier vulnerabilities beyond their identifiers, timing, and exploitation status.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-rewards-program-note\"\u003eVulnerability Rewards Program Note\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that Google recently overhauled its Android and Chrome vulnerability rewards programs. Google is now offering bounties of up to $1.5 million for some Android exploits. The article says Google also scaled back payouts for flaws that are easier to find using artificial intelligence.\u003c/p\u003e\n","keyPoints":["Google released the June 2026 Android security patches to address 124 vulnerabilities, including one zero-day flaw exploited in targeted attacks.","The actively exploited high-severity Android Framework vulnerability, tracked as CVE-2025-48595, can let local attackers gain code execution and escalate privileges on devices running Android 14 or later.","Google said there are indications that CVE-2025-48595 may be under limited, targeted exploitation, but it has not shared technical details or information about the attacks.","The update fixes 18 critical vulnerabilities across System, Framework, and Qualcomm closed-source components that could enable denial-of-service conditions and privilege escalation on unpatched Android devices.","Google issued the 2026-06-01 and 2026-06-05 security patch levels, with Pixel devices receiving updates immediately while other vendors may take longer."],"insights":["Organizations should prioritize the 2026-06-05 Android patch level where applicable because it includes all 2026-06-01 fixes plus patches for closed-source third-party and kernel subcomponents.","Non-Pixel Android users may face delayed protection because vendors often need additional time to test and adapt Google’s patches for specific hardware configurations.","Google’s lack of technical details about CVE-2025-48595 and the ongoing attacks limits defenders’ ability to assess exposure beyond applying the available patches.","The article notes a pattern of recent Android zero-days tagged as under limited, targeted exploitation, including CVE-2025-48633, CVE-2025-48572, and CVE-2026-21385."],"referencedReports":[{"title":"March 2025 Android Security Bulletin","url":"https://source.android.com/docs/security/bulletin/2026/2026-03-01","publisher":"Google","context":"The article cites Google’s Android Security Bulletin for the statement that CVE-2025-48595 may be under limited, targeted exploitation.","category":"","primary":false},{"title":"June 2026 Android Security Bulletin","url":"https://source.android.com/docs/security/bulletin/2026/2026-06-01","publisher":"Google","context":"The article links to Google’s 2026-06-01 and 2026-06-05 Android security patch level details describing the vulnerabilities fixed in the update.","category":"","primary":false}],"body":"\u003cp\u003eGoogle released the June 2026 Android security patches to address 124 vulnerabilities, including one zero-day flaw exploited in targeted attacks. The actively abused issue is a high-severity Android Framework vulnerability tracked as CVE-2025-48595. Google said there are indications the flaw may be under limited, targeted exploitation.\u003c/p\u003e\n\n\u003cp\u003eCVE-2025-48595 can be exploited by local attackers to gain code execution and escalate privileges on devices running Android 14 or later. Google has not shared technical details about the flaw or additional information about the attacks targeting it. The article notes that similar flaws have previously been exploited by commercial spyware and nation-state operations targeting high-profile or high-interest individuals.\u003c/p\u003e\n\n\u003cp\u003eThe June updates also fix 18 critical vulnerabilities across System, Framework, and Qualcomm closed-source components. Google issued two patch levels, 2026-06-01 and 2026-06-05, with the latter including all fixes from the first batch plus additional third-party and kernel subcomponent fixes. Pixel devices will receive the updates immediately, while other Android vendors may take longer to test and adapt them.\u003c/p\u003e\n"},{"n":16,"title":"Gamaredon Exploits WinRAR to Deliver GammaWorm and GammaSteel Against Ukraine","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/gamaredon-exploits-winrar-to-deliver.html","time":"18:21","priority":"MUST READ","score":94,"tldr":"Russian state-linked Gamaredon is exploiting a WinRAR path traversal flaw to target Ukraine with a modular infection chain that delivers GammaWorm and GammaSteel for propagation, persistence, and data theft. The campaign uses obfuscated scripts, Telegram-based C2 resolution, and cloud exfiltration, suggesting a resilient architecture likely to be reused.","briefOverview":"\u003cp\u003eThe Russian hacking group Gamaredon has been attributed to continued exploitation of CVE-2025-8088, a path traversal flaw in WinRAR, to deliver multiple malware families aimed at data theft and propagation. Sekoia observed the infection chain in January 2026 and said it begins with a weaponized WinRAR archive launching an HTML Application payload called GammaPhish. GammaPhish is designed to retrieve GammaLoad, an intermediate VBScript downloader.\u003c/p\u003e\n\n\u003cp\u003eGammaLoad is used to fingerprint the host, update network configuration in the registry using dead drop resolvers, and fetch and execute arbitrary VBScript payloads from command-and-control servers. One payload is GammaWorm, a VBScript worm that establishes persistence through scheduled tasks and replaces legitimate directories on network shares and USB drives with malicious LNK files. Another is GammaSteel, a modular information stealer that captures files matching certain extensions and exfiltrates them to an AWS S3 bucket or fallback attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eThe article says Gamaredon is a Russian state-sponsored intrusion set officially linked to the Federal Security Service and has a history of targeting Ukraine, including government, military, and critical infrastructure entities. Sekoia described the infection chain as resilient, massive, highly obfuscated, and modular, and said it is highly likely the architecture will be reused in the future. The article also notes separate Ukraine-focused activity involving UAC-0184, UAC-0247, and APT28-linked PixyNetLoader.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGamaredon, a Russian hacking group, has been attributed to the continued exploitation of a WinRAR vulnerability to deliver malware families focused on data theft and propagation. The activity involves CVE-2025-8088, a path traversal flaw in WinRAR, and was observed by Sekoia in January 2026. The infection chain uses a weaponized archive to launch GammaPhish, an HTML Application payload. GammaPhish is then used to retrieve GammaLoad, an intermediate VBScript downloader.\u003c/p\u003e\n\n\u003cp\u003eSekoia said GammaLoad’s primary objectives include fingerprinting the host system, updating the network configuration in the registry using dead drop resolvers, and fetching and executing arbitrary VBScript payloads from command-and-control servers. The article says Sekoia assessed with high confidence that GammaPhish is designed to deploy GammaLoad first. Sekoia also noted that the exact deployment vector for GammaWorm remains ambiguous. It could be dropped concurrently by GammaLoad or introduced independently through a user executing a weaponized USB drive.\u003c/p\u003e\n\n\u003cp\u003eGammaWorm is described as a VBScript worm that establishes persistence using scheduled tasks. It hides legitimate directories in network shares and USB drives and replaces them with malicious Windows Shortcut files, causing execution of arbitrary code retrieved from a command-and-control server. To resolve its command-and-control infrastructure, GammaWorm sends a GET request through curl to a hard-coded public Telegram channel. It also uses NTFS Alternate Data Streams to conceal its core modules.\u003c/p\u003e\n\n\u003cp\u003eGammaSteel is another malware family delivered through GammaLoad. It is a modular information stealer that captures files matching certain extensions and exfiltrates them to an AWS S3 bucket or an attacker-controlled server used as a fallback mechanism. Sekoia said the same infection sequences could also be used to distribute other malware families, including GammaWipe, depending on Gamaredon’s objectives. The article emphasizes the modular and adaptable nature of the chain.\u003c/p\u003e\n\n\u003cp\u003eThe affected geography is Ukraine, where Gamaredon has a history of targeting government, military, and critical infrastructure entities with spear-phishing emails containing malicious attachments, including booby-trapped RAR archives. Gamaredon is described as a Russian state-sponsored intrusion set officially linked to the Federal Security Service. The article also says this development coincides with UAC-0184 targeting Ukrainian military-related targets and UAC-0247 targeting drone operators. It further mentions research tracking the evolution of APT28-linked PixyNetLoader in campaigns exploiting CVE-2026-21509.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Russian hacking group Gamaredon has been attributed to continued exploitation of CVE-2025-8088, a path traversal flaw in WinRAR. The exploitation is used to deliver multiple malware families aimed at data theft and propagation. Sekoia observed the infection chain in January 2026.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain begins with a weaponized WinRAR archive that launches an HTML Application payload called GammaPhish. GammaPhish is used to retrieve GammaLoad, an intermediate VBScript downloader. Sekoia assessed with high confidence that GammaPhish is designed to deploy GammaLoad first.\u003c/p\u003e\n\n\u003ch2 id=\"actor-and-targeting-context\"\u003eActor and Targeting Context\u003c/h2\u003e\n\n\u003cp\u003eGamaredon is described as a Russian state-sponsored intrusion set officially linked to the Federal Security Service. The group has a history of targeting Ukraine, particularly government, military, and critical infrastructure entities. The article says Gamaredon has used spear-phishing emails containing malicious attachments, including booby-trapped RAR archives.\u003c/p\u003e\n\n\u003cp\u003eThe activity described in the article is aimed at Ukraine and involves malware families designed for propagation and data theft. The article frames the campaign as part of Gamaredon’s continued targeting of Ukrainian entities.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-loader-chain\"\u003eInitial Access and Loader Chain\u003c/h2\u003e\n\n\u003cp\u003eThe activity involves weaponization of CVE-2025-8088, a WinRAR path traversal flaw. The exploitation launches GammaPhish, an HTML Application payload. GammaPhish retrieves GammaLoad, a VBScript downloader.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sekoia, GammaLoad’s primary objectives are to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFingerprint the host system.\u003c/li\u003e\n\u003cli\u003eUpdate the network configuration in the registry using dead drop resolvers.\u003c/li\u003e\n\u003cli\u003eFetch and execute arbitrary VBScript payloads from command-and-control servers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSekoia noted that the exact deployment vector for GammaWorm remains ambiguous. GammaWorm could be dropped concurrently by GammaLoad or introduced independently by a user executing a weaponized USB drive.\u003c/p\u003e\n\n\u003ch2 id=\"gammaworm-behavior\"\u003eGammaWorm Behavior\u003c/h2\u003e\n\n\u003cp\u003eGammaWorm is described as a VBScript worm. It establishes persistence through scheduled tasks. It is designed to hide legitimate directories in network shares and USB drives and replace them with malicious Windows Shortcut files.\u003c/p\u003e\n\n\u003cp\u003eThose malicious LNK files result in the execution of arbitrary code retrieved from a command-and-control server. This behavior supports propagation through network shares and USB drives.\u003c/p\u003e\n\n\u003cp\u003eGammaWorm resolves its command-and-control infrastructure by initiating a GET request through curl to a hard-coded public Telegram channel. The article says using legitimate platforms like Telegram helps the activity blend in with regular traffic, avoid detection, and sustain long-term espionage operations. GammaWorm also uses NTFS Alternate Data Streams to conceal its core modules.\u003c/p\u003e\n\n\u003ch2 id=\"gammasteel-and-other-potential-payloads\"\u003eGammaSteel and Other Potential Payloads\u003c/h2\u003e\n\n\u003cp\u003eGammaSteel is another malware family delivered via GammaLoad. It is described as a modular information stealer. GammaSteel captures files matching certain extensions and exfiltrates them to an Amazon Web Services S3 bucket.\u003c/p\u003e\n\n\u003cp\u003eIf the AWS S3 bucket is not used, GammaSteel can exfiltrate data to an attacker-controlled server as a fallback mechanism. Sekoia said the same infection sequences could be used to distribute other malware families, including GammaWipe, also known as GamaWiper, depending on the threat actor’s objectives.\u003c/p\u003e\n\n\u003ch2 id=\"assessment-of-the-infection-chain\"\u003eAssessment of the Infection Chain\u003c/h2\u003e\n\n\u003cp\u003eSekoia described the infection chain as resilient, massive, highly obfuscated, and modular. The company said the architecture’s adaptability and the operator’s ability to update configurations on the fly make it highly likely that it will be reused in the future.\u003c/p\u003e\n\n\u003cp\u003eThe chain includes several notable components and techniques named in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2025-8088 exploitation in WinRAR.\u003c/li\u003e\n\u003cli\u003eGammaPhish as an HTML Application payload.\u003c/li\u003e\n\u003cli\u003eGammaLoad as an intermediate VBScript downloader.\u003c/li\u003e\n\u003cli\u003eGammaWorm as a VBScript worm using scheduled tasks, LNK files, Telegram-based command-and-control resolution, and NTFS Alternate Data Streams.\u003c/li\u003e\n\u003cli\u003eGammaSteel as a modular information stealer using AWS S3 or a fallback attacker-controlled server for exfiltration.\u003c/li\u003e\n\u003cli\u003ePossible distribution of GammaWipe depending on operational objectives.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-ukraine-focused-activity-mentioned\"\u003eRelated Ukraine-Focused Activity Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article says the development coincides with UAC-0184 targeting Ukrainian military-related targets. UAC-0184 delivered an executable associated with a legitimate program called PassMark BurnInTest through LNK lures.\u003c/p\u003e\n\n\u003cp\u003eA second threat activity cluster, UAC-0247, previously tracked as UAC-0244, has targeted Ukraine as well. The article says UAC-0247 singled out drone operators to deploy HTML Application droppers through ZIP archives and a backdoor capable of establishing a reverse shell to attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that threat hunters have charted the evolution of PixyNetLoader, a malware loader attributed to APT28. This was described in connection with campaigns exploiting a Microsoft Office vulnerability, CVE-2026-21509, to extract a COVENANT Grunt implant. According to ExaTrack, PixyNetLoader has been detected in the wild since December 2024, with recent iterations discovered as recently as April 15, 2026.\u003c/p\u003e\n","keyPoints":["Sekoia attributed Gamaredon activity observed in January 2026 to the exploitation of CVE-2025-8088, a WinRAR path traversal flaw, to launch the GammaPhish HTML Application payload.","GammaPhish retrieves GammaLoad, an intermediate VBScript downloader used to fingerprint host systems, update registry network configurations through dead drop resolvers, and fetch and execute VBScript payloads from C2 servers.","One payload delivered in the infection chain is GammaWorm, a VBScript worm that establishes persistence with scheduled tasks and replaces legitimate directories on network shares and USB drives with malicious LNK files.","GammaWorm resolves its command-and-control infrastructure by sending a GET request through curl to a hard-coded public Telegram channel and uses NTFS Alternate Data Streams to conceal core modules.","GammaLoad also delivers GammaSteel, a modular information stealer that captures files matching specific extensions and exfiltrates them to an AWS S3 bucket or an attacker-controlled fallback server."],"insights":["GammaWorm’s use of a hard-coded public Telegram channel for C2 resolution makes monitoring outbound curl requests to Telegram a potentially useful detection opportunity in affected environments.","The campaign combines multiple legitimate services and features, including Telegram, AWS S3, scheduled tasks, LNK files, and NTFS Alternate Data Streams, which can help it blend into normal activity while maintaining persistence and hiding components.","Sekoia assessed with high confidence that GammaPhish is designed to deploy GammaLoad first, making GammaPhish and GammaLoad artifacts especially important early indicators for detecting the broader infection chain.","The same modular infection architecture may be used to deliver different payloads, including GammaWipe, so defenders should treat detection of the loader chain as a possible precursor to either espionage or destructive activity."],"referencedReports":[{"title":"FSB's Matryoshka 1/3: Gamaredon's gifts that keeps unpacking GammaPhish and GammaWorm","url":"https://blog.sekoia.io/fsbs-matryoshka-1-3-gamaredons-gifts-that-keeps-unpacking-gammaphish-and-gammaworm/","publisher":"Sekoia","context":"The article relies on Sekoia's analysis attributing Gamaredon's WinRAR exploitation chain and describing GammaPhish, GammaLoad, GammaWorm, and GammaSteel behavior.","category":"","primary":false},{"title":"UAC-0184: From HTA to a signed network stack","url":"https://blog.synapticsystems.de/uac-0184-from-hta-to-a-signed-network-stack/","publisher":"Synaptic Systems","context":"The article cites Synaptic Systems' analysis of UAC-0184 targeting Ukrainian military-related targets with LNK lures delivering an executable associated with PassMark BurnInTest.","category":"","primary":false},{"title":"UAC-0247: Malware targeting FPV operators","url":"https://blog.synapticsystems.de/uac-0247-malware-targeting-fpv-operators/","publisher":"Synaptic Systems","context":"The article cites Synaptic Systems' analysis of UAC-0247 targeting Ukrainian drone operators with HTA droppers and a reverse-shell backdoor.","category":"","primary":false},{"title":"Tracking APT28 PixyNetLoader","url":"https://blog.exatrack.com/Tracking_APT28_PixyNetLoader/","publisher":"ExaTrack","context":"The article references ExaTrack's research charting the evolution of PixyNetLoader attributed to APT28 and its use in campaigns involving CVE-2026-21509.","category":"","primary":false}],"body":"\u003cp\u003eThe Russian hacking group Gamaredon has been attributed to continued exploitation of CVE-2025-8088, a path traversal flaw in WinRAR, to deliver multiple malware families aimed at data theft and propagation. Sekoia observed the infection chain in January 2026 and said it begins with a weaponized WinRAR archive launching an HTML Application payload called GammaPhish. GammaPhish is designed to retrieve GammaLoad, an intermediate VBScript downloader.\u003c/p\u003e\n\n\u003cp\u003eGammaLoad is used to fingerprint the host, update network configuration in the registry using dead drop resolvers, and fetch and execute arbitrary VBScript payloads from command-and-control servers. One payload is GammaWorm, a VBScript worm that establishes persistence through scheduled tasks and replaces legitimate directories on network shares and USB drives with malicious LNK files. Another is GammaSteel, a modular information stealer that captures files matching certain extensions and exfiltrates them to an AWS S3 bucket or fallback attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eThe article says Gamaredon is a Russian state-sponsored intrusion set officially linked to the Federal Security Service and has a history of targeting Ukraine, including government, military, and critical infrastructure entities. Sekoia described the infection chain as resilient, massive, highly obfuscated, and modular, and said it is highly likely the architecture will be reused in the future. The article also notes separate Ukraine-focused activity involving UAC-0184, UAC-0247, and APT28-linked PixyNetLoader.\u003c/p\u003e\n"},{"n":11,"title":"Oracle WebLogic CVE-2024-21182 Added to KEV Catalog After Active Exploitation","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/oracle-weblogic-cve-2024-21182-added-to.html","time":"18:14","priority":"MUST READ","score":92,"tldr":"CISA added Oracle WebLogic Server flaw CVE-2024-21182 to its Known Exploited Vulnerabilities catalog after evidence of active exploitation. Federal agencies must apply Oracle’s July 2024 patch by June 4, 2026, to prevent unauthenticated attackers from compromising vulnerable servers.","briefOverview":"\u003cp\u003eCISA added CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability, to its Known Exploited Vulnerabilities Catalog on Monday. The addition was based on evidence of active exploitation. Oracle patched the flaw in July 2024.\u003c/p\u003e\n\n\u003cp\u003eCVE-2024-21182 has a CVSS score of 7.5 and can allow an unauthenticated attacker with network access to take control of susceptible Oracle WebLogic Server instances. CISA said the vulnerability can be exploited via T3 and IIOP. Successful exploitation can result in unauthorized access to critical data or complete access to all Oracle WebLogic Server accessible data.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there are currently no public reports explaining how CVE-2024-21182 is being exploited in the wild. It notes that past Oracle WebLogic flaws have been used for botnets, cryptocurrency mining, and ransomware deployment. Federal Civilian Executive Branch agencies are recommended to apply the necessary fixes by June 4, 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA added Oracle WebLogic Server vulnerability CVE-2024-21182 to its Known Exploited Vulnerabilities Catalog after evidence of active exploitation. The flaw is described as high severity and has a CVSS score of 7.5. Oracle patched the issue in July 2024.\u003c/p\u003e\n\n\u003cp\u003eAccording to CISA, Oracle WebLogic contains an unspecified vulnerability that could allow an unauthenticated attacker with network access via T3 or IIOP to compromise Oracle WebLogic Server. The article says successful attacks can result in unauthorized access to critical data. It also states that attackers could gain complete access to all Oracle WebLogic Server accessible data.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a specific threat actor exploiting CVE-2024-21182. It also says there are currently no public reports detailing how the vulnerability is being exploited in the wild. The known information presented centers on CISA’s KEV listing, the affected product, and the potential impact of successful exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article places the issue in the context of repeated exploitation of prior Oracle WebLogic flaws. It says previous flaws in the software have been weaponized by various threat actors to enlist servers into botnets, mine cryptocurrency, and deploy ransomware. It also notes that CloudSEK disclosed in March that another WebLogic flaw, CVE-2026-21962, saw automated exploitation attempts shortly after exploit code became publicly available.\u003c/p\u003e\n\n\u003cp\u003eIn response to the active exploitation of CVE-2024-21182, Federal Civilian Executive Branch agencies are recommended to apply the necessary fixes by June 4, 2026. The article identifies this deadline as the remediation timeline for securing their networks. No additional technical details about the exploitation method are provided.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2024-21182, a high-severity vulnerability affecting Oracle WebLogic Server, to its Known Exploited Vulnerabilities Catalog. The addition was made based on evidence of active exploitation. The article reports that Oracle patched the vulnerability in July 2024.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2024-21182 has a CVSS score of 7.5. The article says the vulnerability allows an unauthenticated attacker with network access to take control of susceptible servers.\u003c/p\u003e\n\n\u003cp\u003eCISA described the issue as an unspecified vulnerability in Oracle WebLogic Server. According to CISA, an unauthenticated attacker with network access via T3 or IIOP could compromise Oracle WebLogic Server.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impact\"\u003ePotential impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that successful attacks can result in unauthorized access to critical data. It also says exploitation can lead to complete access to all Oracle WebLogic Server accessible data.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation status\u003c/h2\u003e\n\n\u003cp\u003eCISA added the flaw to the KEV Catalog because of evidence of active exploitation. However, the article says there are currently no public reports about how CVE-2024-21182 is being exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eNo specific threat actor is identified as exploiting CVE-2024-21182 in the article.\u003c/p\u003e\n\n\u003ch2 id=\"broader-oracle-weblogic-context\"\u003eBroader Oracle WebLogic context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that previous Oracle WebLogic flaws have been repeatedly weaponized by various threat actors. Prior uses cited in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnlisting vulnerable systems into botnets.\u003c/li\u003e\n\u003cli\u003eMining cryptocurrency.\u003c/li\u003e\n\u003cli\u003eDeploying ransomware.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also references CloudSEK’s March disclosure about another WebLogic vulnerability, CVE-2026-21962. That flaw had a CVSS score of 10.0 and reportedly saw automated exploitation attempts shortly after exploit code became publicly available.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected parties and response\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Oracle WebLogic Server. CISA’s KEV listing creates a remediation expectation for Federal Civilian Executive Branch agencies.\u003c/p\u003e\n\n\u003cp\u003eIn light of active exploitation, Federal Civilian Executive Branch agencies are recommended to apply the necessary fixes by June 4, 2026. The article frames this action as necessary to secure their networks.\u003c/p\u003e\n","keyPoints":["CISA added Oracle WebLogic Server vulnerability CVE-2024-21182 to its Known Exploited Vulnerabilities Catalog based on evidence of active exploitation.","CVE-2024-21182 is a high-severity flaw with a CVSS score of 7.5 that can allow an unauthenticated attacker with network access to take control of susceptible servers.","Oracle patched CVE-2024-21182 in July 2024.","CISA said the flaw can be exploited via T3 and IIOP and successful attacks can result in unauthorized access to critical data or complete access to all Oracle WebLogic Server accessible data.","Federal Civilian Executive Branch agencies are recommended to apply the necessary fixes by June 4, 2026."],"insights":["CISA’s June 4, 2026 remediation deadline gives Federal Civilian Executive Branch agencies only a few days after the June 1, 2026 alert to apply fixes.","The flaw had already been patched by Oracle in July 2024, so the KEV listing concerns active exploitation of a vulnerability for which fixes have been available for nearly two years.","The article states there are no public reports describing how CVE-2024-21182 is being exploited in the wild, limiting defenders to the available advisory details such as the affected T3 and IIOP access paths.","The article links the risk to a broader WebLogic pattern, noting that prior WebLogic flaws have been used for botnets, cryptocurrency mining, and ransomware deployment."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA’s alert as the basis for reporting that CVE-2024-21182 was added to the Known Exploited Vulnerabilities Catalog after active exploitation.","category":"","primary":false},{"title":"Oracle Critical Patch Update Advisory - July 2024","url":"https://www.oracle.com/security-alerts/cpujul2024.html","publisher":"Oracle","context":"The article references Oracle’s July 2024 security advisory as the patch source for CVE-2024-21182.","category":"","primary":false}],"body":"\u003cp\u003eCISA added CVE-2024-21182, a high-severity Oracle WebLogic Server vulnerability, to its Known Exploited Vulnerabilities Catalog on Monday. The addition was based on evidence of active exploitation. Oracle patched the flaw in July 2024.\u003c/p\u003e\n\n\u003cp\u003eCVE-2024-21182 has a CVSS score of 7.5 and can allow an unauthenticated attacker with network access to take control of susceptible Oracle WebLogic Server instances. CISA said the vulnerability can be exploited via T3 and IIOP. Successful exploitation can result in unauthorized access to critical data or complete access to all Oracle WebLogic Server accessible data.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there are currently no public reports explaining how CVE-2024-21182 is being exploited in the wild. It notes that past Oracle WebLogic flaws have been used for botnets, cryptocurrency mining, and ransomware deployment. Federal Civilian Executive Branch agencies are recommended to apply the necessary fixes by June 4, 2026.\u003c/p\u003e\n"},{"n":19,"title":"Operation FlutterBridge: macOS Malvertising Campaign Spreads New FlutterShell Backdoor","source":"unit42.paloaltonetworks.com","sourceColorIdx":0,"link":"https://unit42.paloaltonetworks.com/flutterbridge-new-fluttershell-backdoor/","time":"10:00","priority":"MUST READ","score":92,"tldr":"Unit 42 reports that the CL-CRI-1089 cybercrime cluster is using Google malvertising and verified shell companies to distribute FlutterShell, a notarized macOS backdoor disguised as legitimate podcast and PDF apps. Although mainly observed hijacking Chrome for ad fraud, FlutterShell’s WebView-based JavaScript bridge enables dynamic command execution, file access, environment-variable theft, and potential document exfiltration.","briefOverview":"\u003cp\u003eUnit 42 reports an increasingly widespread macOS malvertising campaign called Operation FlutterBridge, which it tracks under the CL-CRI-1089 activity cluster. The campaign distributes FlutterShell, a new Flutter-based macOS backdoor that masquerades as legitimate desktop applications including a podcast player and PDF viewers. The attackers used extensive Google Ads activity and Google-verified shell companies to reach a global audience, with emphasis on Anglophone and Western European markets.\u003c/p\u003e\n\n\u003cp\u003eFlutterShell uses a WebView-based architecture with a JavaScript-to-native bridge, allowing malicious logic to be hosted on attacker-controlled websites rather than hardcoded in the application binary. Its built-in capabilities include arbitrary shell command execution, file system interaction, and environment variable exfiltration. In observed activity, the malware primarily hijacked Google Chrome settings to route searches and new tabs through an attacker-controlled adware domain.\u003c/p\u003e\n\n\u003cp\u003eThe article describes FlutterShell as an evolution from the earlier JSCoreRunner macOS campaign and links the same activity cluster to Windows campaigns involving RecipeLister and Calendaromatic. Unit 42 observed multiple FlutterShell variants, increasing obfuscation, and signs that the malware remains under active development. Google told Unit 42 that it suspended the advertiser accounts reported for violating its policies.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUnit 42 is tracking Operation FlutterBridge, a macOS malvertising campaign that delivers a new backdoor called FlutterShell. The campaign is attributed to the CL-CRI-1089 cybercrime cluster, which Unit 42 says has operated since at least 2023 and has distributed malicious payloads through malvertising. The attackers target both Windows and macOS users through separate operations, using ads that masquerade malware as legitimate desktop applications.\u003c/p\u003e\n\n\u003cp\u003eFlutterShell is built with the Flutter framework and was observed posing as a podcast player called PodcastsLounge and PDF viewer applications called PDF-Brain and PDF-Ninja. These applications were functional, helping conceal malicious activity running in the background. Unit 42 states that observed samples were signed with valid Apple Developer IDs, passed Apple notarization, and had zero VirusTotal detections at the time of analysis.\u003c/p\u003e\n\n\u003cp\u003eTechnically, FlutterShell separates malicious logic from the binary by using a WebView-based architecture and JavaScript-to-native bridge. The remote webpage sends JSON-formatted commands through a message channel named flutterInvoke into the native Dart environment. This design allows the attackers to change FlutterShell’s behavior through attacker-controlled endpoints such as getConfig and getUpdateThanksConfig without recompiling or redistributing the application.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes backdoor capabilities such as arbitrary command execution, file reads and writes, directory enumeration, home directory retrieval, environment variable extraction, and UI manipulation. Unit 42’s telemetry showed the primary observed goal was browser hijacking: FlutterShell collected the macOS hardware UUID, modified Google Chrome’s Secure Preferences file, terminated and relaunched Chrome, and redirected search and new-tab traffic through sinterfumesco[.]com. Some PDF-Brain and PDF-Ninja variants also included an AI summarization feature that routed document content through an attacker-controlled server before forwarding it to an AI agent.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 says the attackers distributed FlutterShell through hundreds of Google and YouTube advertisements controlled by Google Ads, using verified shell entities including AdsParkPro LTD and Advantage Web Marketing LLC. The report also identifies SOFT WE ART LIMITED as a shell entity used in past Windows campaigns connected to the same cluster. Google told Unit 42 that malware has no place on its platforms and that it suspended the advertiser accounts reported for policy violations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 reports Operation FlutterBridge, an increasingly widespread macOS malvertising campaign that delivers a new Flutter-based backdoor called FlutterShell. The campaign is tracked under CL-CRI-1089, a financially motivated cybercrime cluster that Unit 42 says has been operational since at least 2023. The attackers behind the cluster distribute malicious advertisements that trick users into installing malware disguised as legitimate desktop applications.\u003c/p\u003e\n\n\u003cp\u003eThe campaign appears to be the next stage of the earlier JSCoreRunner macOS campaign first identified in August 2025. Unit 42 says the attackers transitioned from delivering standard adware to delivering adware with full backdoor capabilities. FlutterShell has mainly been observed performing adware behavior, but the article emphasizes that its built-in capabilities make it a backdoor.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-context\"\u003eCampaign Context\u003c/h2\u003e\n\n\u003cp\u003eCL-CRI-1089 has been associated with macOS and Windows malvertising operations. The article links this cluster to Windows campaigns involving RecipeLister and Calendaromatic, and to the previous macOS JSCoreRunner campaign. Unit 42 states that these operations share a consistent method: malicious advertisements are distributed through a network of Google-verified shell companies and lead users to malware posing as legitimate applications.\u003c/p\u003e\n\n\u003cp\u003eOperation FlutterBridge targets a global audience through Google Ads, with particular emphasis on Anglophone and Western European markets. The article mentions geographic targeting or affected regions including France, Germany, the U.S., Canada, and Australia. Unit 42 also states that it identified infected hosts in correlated regions.\u003c/p\u003e\n\n\u003ch2 id=\"fluttershell-masquerading-and-deployment\"\u003eFlutterShell Masquerading and Deployment\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 observed three main FlutterShell variants through February 2026:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePodcastsLounge, presented as a podcast player.\u003c/li\u003e\n\u003cli\u003ePDF-Brain, presented as a PDF viewer.\u003c/li\u003e\n\u003cli\u003ePDF-Ninja, also presented as a PDF viewer.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe applications were fully functional, which helped conceal the malicious logic running in the background. Unit 42 says all observed samples were signed with valid Apple Developer IDs and passed Apple notarization. At the time of analysis, the three applications had zero detections on VirusTotal.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that some macOS and Windows versions associated with these applications did not contain malicious code. Unit 42 says this may suggest a phased deployment strategy intended to bypass automated detection.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-architecture\"\u003eCore Technical Architecture\u003c/h2\u003e\n\n\u003cp\u003eFlutterShell is built using the Flutter framework and relies on a WebView-based architecture. Instead of hardcoding malicious logic into the application binary, the malware loads attacker-controlled web content and uses a JavaScript-to-native bridge to invoke native functionality. The bridge uses a message channel named flutterInvoke to pass JSON-formatted commands from the WebView context into the native Dart environment.\u003c/p\u003e\n\n\u003cp\u003eThis design allows the attackers to change the malware’s behavior by modifying web-hosted logic rather than updating the application binary. The article identifies the main webpage and the /update-thanks.html subdirectory as locations involved in retrieving malicious logic. It also identifies /getConfig and /getUpdateThanksConfig as endpoints used to retrieve JavaScript that defines commands and supported functionality.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 states that some functions were unfinished or disabled, and that some endpoints were commented out or unreachable during investigation. Combined with the appearance of new variants, these findings led Unit 42 to conclude that FlutterShell was likely under active development.\u003c/p\u003e\n\n\u003ch2 id=\"backdoor-capabilities\"\u003eBackdoor Capabilities\u003c/h2\u003e\n\n\u003cp\u003eFlutterShell includes commands that provide broad access to infected systems under the current user context. Across the observed variants, Unit 42 identified capabilities including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eArbitrary shell command execution.\u003c/li\u003e\n\u003cli\u003eFile reading and writing.\u003c/li\u003e\n\u003cli\u003eDirectory enumeration.\u003c/li\u003e\n\u003cli\u003eFile or directory existence checks.\u003c/li\u003e\n\u003cli\u003eHome directory retrieval.\u003c/li\u003e\n\u003cli\u003eEnvironment variable extraction.\u003c/li\u003e\n\u003cli\u003eWebView closing and window resizing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights environment variable extraction as potentially valuable because environment variables can contain assets such as plaintext API keys. Some variants also had the com.apple.security.files.downloads.read-write macOS entitlement, giving the malware read and write access to files in the user’s Downloads directory.\u003c/p\u003e\n\n\u003ch2 id=\"adware-and-browser-hijacking-behavior\"\u003eAdware and Browser Hijacking Behavior\u003c/h2\u003e\n\n\u003cp\u003eUnit 42’s telemetry indicated that the attackers’ primary observed goal was browser hijacking. FlutterShell first fingerprints the machine by collecting the IOPlatformUUID value with an ioreg command. It then targets Google Chrome’s Secure Preferences file, which stores a validated copy of user settings.\u003c/p\u003e\n\n\u003cp\u003eThe malware modifies the default_search_provider_data block in Chrome’s Secure Preferences file. Specifically, it changes the url and new_tab_url values to the attacker-controlled domain sinterfumesco[.]com. This causes user searches and new tabs to be routed through the attacker-controlled site.\u003c/p\u003e\n\n\u003cp\u003eTo apply the changes, FlutterShell terminates Google Chrome using killall \u0026ldquo;Google Chrome\u0026rdquo; and relaunches it with arguments that connect to sinterfumesco[.]com while suppressing crash and restore warnings. Unit 42 says this enables the attackers to generate revenue by funneling users through an ad-filled intermediary site or showing ads in the background before redirecting users to a legitimate search engine.\u003c/p\u003e\n\n\u003ch2 id=\"ai-summarization-as-an-exfiltration-vector\"\u003eAI Summarization as an Exfiltration Vector\u003c/h2\u003e\n\n\u003cp\u003ePDF-Brain and PDF-Ninja variants included an AI summarization feature that Unit 42 describes as also functioning as a data exfiltration vector. Instead of sending document content directly to an AI agent, FlutterShell sends the content to an attacker-controlled C2 server at the /summarize-text endpoint. The server then functions as an intermediary that forwards the request to the AI agent.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this means the user receives an AI summary while the attackers can simultaneously harvest and exfiltrate the full content of every processed document. This behavior was specifically described for the PDF-Brain and PDF-Ninja variants.\u003c/p\u003e\n\n\u003ch2 id=\"variant-evolution-and-obfuscation\"\u003eVariant Evolution and Obfuscation\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 observed differences across the three main FlutterShell variants. PodcastsLounge used descriptive command names such as read_file and write_file and stored strings such as /bin/sh in plaintext. PDF-Brain used similar descriptive command naming but base64-encoded some strings. PDF-Ninja used Flutter’s native \u0026ndash;obfuscate flag, which strips debug information and randomizes symbol names.\u003c/p\u003e\n\n\u003cp\u003ePDF-Ninja also renamed malicious commands to mimic legitimate PDF library operations. For example, command names shifted toward deceptive labels such as read_pdf, write_pdf, and renderPDF. Unit 42 states this was likely an attempt to bypass static analysis and Apple’s notarization process.\u003c/p\u003e\n\n\u003ch2 id=\"delay-and-update-mechanisms\"\u003eDelay and Update Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eFlutterShell includes a delayed execution routine for loading attacker-controlled WebView content. On initial execution, it sends an HTTP GET request to an attacker domain’s /api/update-delay endpoint to fetch a delay duration in seconds. If the endpoint is unreachable, the malware defaults to a 600-second delay; if the response contains a null delay field, it defaults to 1,200 seconds.\u003c/p\u003e\n\n\u003cp\u003eAfter the timer expires, FlutterShell brings the application to the foreground and loads the attacker-controlled /update-thanks.html page. Unit 42 says this delay suggests an attempt to evade automated sandbox environments that typically time out after a few minutes, while also building user trust by showing normal behavior first.\u003c/p\u003e\n\n\u003cp\u003eFlutterShell also uses the Sparkle update framework for macOS applications but deviates from the normal user-approved update flow. The malware listens for an update completion signal, checks for the Sparkle installation directory, manually opens the staged app bundle in the cache, and immediately exits the old process. Unit 42 states this allows the malware version to be swapped in real time without showing a dialog box.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-infrastructure-and-shell-companies\"\u003eDistribution Infrastructure and Shell Companies\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 tracked the campaign through Google and YouTube advertisements controlled by Google Ads. The report says FlutterShell was distributed via hundreds of active advertisements, with new instances observed through February 2026. The advertisements used verified Google Ads accounts tied to shell companies including AdsParkPro LTD and Advantage Web Marketing LLC.\u003c/p\u003e\n\n\u003cp\u003eThe article also names SOFT WE ART LIMITED as a shell entity used in past Windows campaigns. Unit 42 says these ent
