r all four flaws.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA warned that hackers are actively exploiting flaws in Ubiquiti UniFi OS and Lantronix serial-to-ethernet servers.","Under BOD 26-04, federal agencies have three days to apply available security updates or vendor-recommended mitigations for the listed vulnerabilities.","The Ubiquiti vulnerabilities CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910 can allow unauthorized system changes, sensitive file access, and arbitrary operating system command execution.","Bishop Fox demonstrated that the three Ubiquiti flaws could be chained to achieve full remote code execution with elevated privileges on vulnerable UniFi OS devices.","Lantronix fixed CVE-2025-67038 in EDS5000 firmware by recommending users upgrade to version 2.2.0.0R1."],"insights":["Organizations using UniFi OS should not treat the three Ubiquiti flaws as separate low-level issues, because Bishop Fox showed they can be chained into full remote code execution with elevated privileges.","The Ubiquiti fixes have been available since May, so current exposure may indicate devices that were not updated despite vendor patches already being released.","Defenders have a practical way to check for vulnerable UniFi OS instances because Bishop Fox released a free detection script on GitHub.","Lantronix EDS5000 users can narrow their immediate firmware check to systems running version 2.1.0.0R3 and should upgrade to 2.2.0.0R1 as recommended by the vendor.","CISA confirmed active exploitation but did not provide details about how the flaws are being used, and the ransomware-use status is listed as unknown for all four vulnerabilities."],"referencedReports":[{"title":"Latest Firmware for the EDS5000 series EDS5008 EDS5016 EDS5032","url":"https://ltrxdev.atlassian.net/wiki/spaces/LTRXTS/pages/2538438657/Latest+Firmware+for+the+EDS5000+series+EDS5008+EDS5016+EDS5032","publisher":"Lantronix","context":"The article says Lantronix released a patch for CVE-2025-67038 and recommends upgrading EDS5000 devices to version 2.2.0.0R1.","category":"advisory","primary":false}],"body":"\u003cp\u003eCISA is warning that hackers are actively exploiting flaws in Ubiquiti UniFi OS and Lantronix serial-to-ethernet servers. Under BOD 26-04, federal agencies have three days to apply available security updates or vendor-recommended mitigations. CISA added three Ubiquiti vulnerabilities and one Lantronix vulnerability to its Known Exploited Vulnerabilities catalog.\u003c/p\u003e\n\n\u003cp\u003eThe Ubiquiti flaws are CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910. They involve an access control bypass, directory/path traversal, and improper input validation that can allow unauthorized system changes, access to sensitive files, and arbitrary operating system command execution. Ubiquiti released security updates in May and warned that the flaws could be exploited remotely without privileges.\u003c/p\u003e\n\n\u003cp\u003eResearchers at Bishop Fox demonstrated that the three Ubiquiti flaws could be chained to achieve full remote code execution with elevated privileges on vulnerable UniFi OS devices. The Lantronix issue, CVE-2025-67038, is a critical root-level command injection flaw affecting EDS5000 firmware 2.1.0.0R3, and Lantronix recommends upgrading to version 2.2.0.0R1. CISA has not shared details about the observed exploitation, and the ransomware-use flag is listed as unknown for all four flaws.\u003c/p\u003e\n"},{"n":23,"title":"codfish/semantic-release-action GitHub Action has been compromised","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/supply-chain-compromise-codfish-semantic-release-action","time":"17:55","priority":"MUST READ","score":96,"tldr":"The GitHub Action codfish/semantic-release-action was compromised via force-moved version tags, causing workflows using those tags to execute an obfuscated Bun-based payload that steals tokens, abuses GitHub APIs for C2/exfiltration, and attempts to spread through repositories, developer machines, SSH hosts, and package ecosystems. Users should assume any workflow run using affected tags after June 24, 2026 15:39 UTC may be compromised and rotate credentials/investigate immediately.","briefOverview":"\u003cp\u003eOn June 24, 2026 at 15:39:06 UTC, an attacker force-pushed a malicious commit to \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e and redirected several version tags to point at it. Any GitHub Actions workflow that ran against the affected tags after that time executed the attacker’s payload inside the runner. The action is used to wrap \u003ccode\u003esemantic-release\u003c/code\u003e, which automates software versioning, changelogs, tagging, and publishing.\u003c/p\u003e\n\n\u003cp\u003eThe attacker changed the action from a Docker-based action into a composite action that installed Bun using \u003ccode\u003eoven-sh/setup-bun\u003c/code\u003e and ran an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload. Both injected steps used \u003ccode\u003eif: always()\u003c/code\u003e, so the payload ran even if earlier workflow steps failed or were skipped. The payload is described as stealing GitHub OIDC tokens, harvesting Personal Access Tokens that match known GitHub token patterns, encrypting collected data with AES-128-GCM, and attempting to spread a backdoor into other repositories accessible with stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article says the payload used public GitHub commit messages as a dead-drop command-and-control channel, including mechanisms named \u003ccode\u003eRevokeAndItGoesKaboom\u003c/code\u003e and \u003ccode\u003eTheBeautifulSandsOfTime\u003c/code\u003e. It also targeted AI coding assistant configurations, attempted SSH-based lateral movement, and carried secondary-stage builders for npm, Python, and Ruby package ecosystems. StepSecurity reported that Harden-Runner observed outbound traffic only to GitHub API infrastructure and said its Compromised Actions Policy blocks workflows that reference the compromised action.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 24, 2026 at 15:39:06 UTC, an attacker force-pushed a malicious commit to codfish/semantic-release-action and redirected several version tags to point at that commit.","Workflows that ran codfish/semantic-release-action using affected tags after the tag changes executed a Bun-based, heavily obfuscated JavaScript payload inside the GitHub Actions runner.","The payload steals GitHub OIDC tokens, searches for Personal Access Tokens matching known GitHub token patterns, encrypts collected material with AES-128-GCM, and attempts to propagate a backdoor into other repositories accessible with stolen credentials.","The attacker changed the action from a Docker-based runner to a composite action that installs Bun with oven-sh/setup-bun and runs index.js, with both injected steps guarded by if: always().","The article states that StepSecurity added codfish/semantic-release-action to its Compromised Actions Policy and that Harden-Runner observed the malware using GitHub API traffic for command-and-control and exfiltration."],"insights":["The attacker used Bun instead of Node.js because the article says Bun lacks the --require hook interception used by most Node.js security tooling.","The payload used public GitHub commit messages as a command channel, making its control traffic look like normal GitHub API activity rather than communication with a separate suspicious server.","The malware attempted to hijack AI coding assistant configurations, including Claude, Codex, Gemini, Copilot, and others, so poisoned repositories could trigger execution later on developer machines.","The payload included a Russian locale killswitch that halted execution when the system locale or locale environment variables started with ru.","The campaign reused fingerprints from previously documented compromises of @antv/graphlib, echarts-for-react, and tanstack-react-router, including the RevokeAndItGoesKaboom and TheBeautifulSandsOfTime dead-drop identifiers."],"referencedReports":[],"body":"\u003cp\u003eOn June 24, 2026 at 15:39:06 UTC, an attacker force-pushed a malicious commit to \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e and redirected several version tags to point at it. Any GitHub Actions workflow that ran against the affected tags after that time executed the attacker’s payload inside the runner. The action is used to wrap \u003ccode\u003esemantic-release\u003c/code\u003e, which automates software versioning, changelogs, tagging, and publishing.\u003c/p\u003e\n\n\u003cp\u003eThe attacker changed the action from a Docker-based action into a composite action that installed Bun using \u003ccode\u003eoven-sh/setup-bun\u003c/code\u003e and ran an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload. Both injected steps used \u003ccode\u003eif: always()\u003c/code\u003e, so the payload ran even if earlier workflow steps failed or were skipped. The payload is described as stealing GitHub OIDC tokens, harvesting Personal Access Tokens that match known GitHub token patterns, encrypting collected data with AES-128-GCM, and attempting to spread a backdoor into other repositories accessible with stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article says the payload used public GitHub commit messages as a dead-drop command-and-control channel, including mechanisms named \u003ccode\u003eRevokeAndItGoesKaboom\u003c/code\u003e and \u003ccode\u003eTheBeautifulSandsOfTime\u003c/code\u003e. It also targeted AI coding assistant configurations, attempted SSH-based lateral movement, and carried secondary-stage builders for npm, Python, and Ruby package ecosystems. StepSecurity reported that Harden-Runner observed outbound traffic only to GitHub API infrastructure and said its Compromised Actions Policy blocks workflows that reference the compromised action.\u003c/p\u003e\n"},{"n":6,"title":"Mandiant reveals how Cisco SD-WAN zero-day attacks gained root access","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/mandiant-reveals-how-cisco-sd-wan-zero-day-attacks-gained-root-access/","time":"21:29","priority":"MUST READ","score":94,"tldr":"Mandiant revealed that attackers exploited Cisco Catalyst SD-WAN zero-day CVE-2026-20245 after gaining device access, using a crafted CSV upload to create rogue root accounts and then erase traces. Cisco has issued fixes, and organizations should upgrade and check for unauthorized peering or other compromise indicators.","briefOverview":"\u003cp\u003eMandiant revealed new details on how hackers exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 in zero-day attacks to create rogue root accounts on targeted devices. The flaw is a high-severity command injection issue in Cisco Catalyst SD-WAN Manager, Controller, and Validator that allows authenticated attackers with local access to execute arbitrary commands as root by uploading a crafted file. Cisco previously said the vulnerability had been exploited in a limited number of attacks, released security updates, and stated that no workarounds were available.\u003c/p\u003e\n\n\u003cp\u003eAccording to Mandiant, the intrusion began with unauthorized SD-WAN peering connections on a service provider\u0026rsquo;s infrastructure. Starting in March 2026, the threat actor established rogue peer connections and authenticated to affected SD-WAN Manager devices using the vmanage-admin account. The attackers changed the default admin account password, logged in to the SD-WAN Manager web interface, extracted configuration information, and later restored the admin account to its original password.\u003c/p\u003e\n\n\u003cp\u003eMandiant said the attackers exploited CVE-2026-20245 through a tenant-upload feature in the SD-WAN command-line interface by uploading a malicious CSV file named evil_tenant.csv. The payload backed up system configuration files such as /etc/passwd and /etc/shadow before creating a root-level account named troot, which the attackers used to gain full control of the device. The attackers also used anti-forensic tactics, including restoring modified files, deleting payloads and temporary files, erasing evidence of the rogue root account, and running a validation script to confirm traces had been removed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mandiant revealed that hackers exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 in zero-day attacks to create rogue root accounts on targeted devices.","CVE-2026-20245 is a high-severity command injection flaw in Cisco Catalyst SD-WAN Manager, Controller, and Validator that allows authenticated attackers with local access to execute arbitrary commands as root by uploading a crafted file.","Mandiant said the intrusion began with unauthorized SD-WAN peering connections on a service provider's infrastructure, followed by authentication to affected SD-WAN Manager devices using the vmanage-admin account.","The attackers exploited CVE-2026-20245 through a tenant-upload feature in the SD-WAN command-line interface by uploading a malicious CSV file named evil_tenant.csv.","Mandiant reported that the attackers used anti-forensic tactics, including restoring modified configuration files, deleting the malicious payload and temporary files, and erasing evidence of the rogue root account."],"insights":["The attackers restored the default admin account to its original password after using it, indicating that unchanged credentials do not rule out compromise.","Some rogue peering activity occurred on systems not vulnerable to the previously disclosed authentication-bypass flaws, so organizations should investigate unauthorized peering even if they were not exposed to those specific CVEs.","Cisco told Mandiant the breach did not involve CVE-2026-20182 and that stolen certificates from a previous compromise may have been used to regain access to devices.","Mandiant observed a validation script used to confirm that traces of compromise had been removed, making diagnostic data collection and checks for unauthorized peering especially important."],"referencedReports":[{"title":"Zero-Day Exploitation of Cisco Catalyst SD-WAN Manager","url":"https://cloud.google.com/blog/topics/threat-intelligence/zero-day-exploitation-cisco-catalyst-sd-wan-manager","publisher":"Mandiant","context":"The article says Mandiant published a report revealing how CVE-2026-20245 was exploited as a privilege-escalation vulnerability after attackers had already gained access to targeted SD-WAN devices.","category":"research","primary":true},{"title":"Cisco Catalyst SD-WAN Privilege Escalation Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-privesc-4uxFrdzx","publisher":"Cisco","context":"The article links to Cisco's security advisory for CVE-2026-20245 and summarizes Cisco's description of the flaw, affected products, exploitation conditions, and available fixes.","category":"advisory","primary":false}],"body":"\u003cp\u003eMandiant revealed new details on how hackers exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 in zero-day attacks to create rogue root accounts on targeted devices. The flaw is a high-severity command injection issue in Cisco Catalyst SD-WAN Manager, Controller, and Validator that allows authenticated attackers with local access to execute arbitrary commands as root by uploading a crafted file. Cisco previously said the vulnerability had been exploited in a limited number of attacks, released security updates, and stated that no workarounds were available.\u003c/p\u003e\n\n\u003cp\u003eAccording to Mandiant, the intrusion began with unauthorized SD-WAN peering connections on a service provider\u0026rsquo;s infrastructure. Starting in March 2026, the threat actor established rogue peer connections and authenticated to affected SD-WAN Manager devices using the vmanage-admin account. The attackers changed the default admin account password, logged in to the SD-WAN Manager web interface, extracted configuration information, and later restored the admin account to its original password.\u003c/p\u003e\n\n\u003cp\u003eMandiant said the attackers exploited CVE-2026-20245 through a tenant-upload feature in the SD-WAN command-line interface by uploading a malicious CSV file named evil_tenant.csv. The payload backed up system configuration files such as /etc/passwd and /etc/shadow before creating a root-level account named troot, which the attackers used to gain full control of the device. The attackers also used anti-forensic tactics, including restoring modified files, deleting payloads and temporary files, erasing evidence of the rogue root account, and running a validation script to confirm traces had been removed.\u003c/p\u003e\n"},{"n":11,"title":"CISA Warns Critical Lantronix EDS5000 Flaw Is Being Actively Exploited","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-warns-critical-lantronix-eds5000.html","time":"17:19","priority":"MUST READ","score":94,"tldr":"CISA says a critical Lantronix EDS5000 command-injection flaw is being actively exploited and ordered U.S. federal agencies to patch by June 26, 2026. The agency also confirmed active exploitation of three critical Ubiquiti UniFi OS flaws that can be chained for root-level remote code execution.","briefOverview":"\u003cp\u003eCISA warned that a critical security flaw affecting Lantronix EDS5000 Series devices is being actively exploited. The flaw, tracked as CVE-2025-67038, has a CVSS score of 9.8 and is described as a code injection issue. CISA urged Federal Civilian Executive Branch agencies to apply fixes by June 26, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in the HTTP RPC module, which executes a shell command to write logs when user authentication fails. The username is directly added to the command without sanitization, allowing attackers to inject arbitrary operating system commands through the username parameter. The injected commands are executed with root privileges.\u003c/p\u003e\n\n\u003cp\u003eCISA also confirmed active exploitation of three maximum-severity flaws in Ubiquiti UniFi OS: CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910. The article says these flaws can be chained to obtain a reverse shell with full root privileges in a single request, according to Bishop Fox. Belgium\u0026rsquo;s Centre for Cybersecurity warned that compromise of UniFi OS devices could allow unauthorized changes, access to sensitive files, information disclosure, arbitrary command execution, lateral movement, and broader network compromise.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA warned that CVE-2025-67038, a critical Lantronix EDS5000 Series code injection flaw with a CVSS score of 9.8, is being actively exploited.","CVE-2025-67038 allows attackers to inject arbitrary operating system commands into the username parameter, and the injected commands are executed with root privileges.","CISA urged Federal Civilian Executive Branch agencies to apply fixes for the Lantronix EDS5000 flaw by June 26, 2026.","CISA also confirmed active exploitation of three maximum-severity Ubiquiti UniFi OS flaws tracked as CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910.","Bishop Fox detailed a proof-of-concept that chains the three UniFi OS flaws to obtain a reverse shell with full root privileges in a single request, and Ubiquiti released patches late last month."],"insights":["The Lantronix flaw is especially actionable because exploitation occurs through the username parameter during failed authentication, meaning fixes should be prioritized even if attackers do not have valid credentials.","CISA gave Federal Civilian Executive Branch agencies only until June 26, 2026, to remediate the Lantronix flaw, signaling high urgency after adding it to the Known Exploited Vulnerabilities catalog.","The article notes there are no public details on how CVE-2025-67038 is being exploited or who is behind the activity, so defenders cannot rely on attacker-specific indicators alone.","The UniFi OS vulnerabilities have already been chained in a public proof-of-concept to obtain root privileges in a single request, increasing the practical risk for unpatched systems.","Because UniFi OS devices are often centrally integrated into networks, the article highlights that compromise could support lateral movement and broader network compromise beyond the affected device itself."],"referencedReports":[{"title":"CISA Adds Four Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/23/cisa-adds-four-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites this CISA alert as the source for the warning that the Lantronix EDS5000 flaw is being actively exploited.","category":"advisory","primary":true},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article references CISA's catalog for the remediation deadline requiring Federal Civilian Executive Branch agencies to apply fixes.","category":"advisory","primary":true},{"title":"Latest Firmware for the EDS5000 series EDS5008 EDS5016 EDS5032","url":"https://ltrxdev.atlassian.net/wiki/spaces/LTRXTS/pages/2538438657/Latest+Firmware+for+the+EDS5000+series+EDS5008+EDS5016+EDS5032","publisher":"Lantronix","context":"The article links to Lantronix firmware information while describing the CVE-2025-67038 code injection flaw and available fixes.","category":"advisory","primary":false},{"title":"Popping Root on UniFi OS Server: Unauthenticated RCE Chain Detection \u0026 Analysis","url":"https://bishopfox.com/blog/popping-root-on-unifi-os-server-unauthenticated-rce-chain-detection-analysis","publisher":"Bishop Fox","context":"The article references Bishop Fox's analysis of a proof-of-concept chain that obtains a root reverse shell on UniFi OS in a single request.","category":"research","primary":false},{"title":"Security Advisory Bulletin 064-064","url":"https://community.ui.com/releases/Security-Advisory-Bulletin-064-064/84811c09-4cf4-42ab-bd61-cc994445963b","publisher":"Ubiquiti","context":"The article cites Ubiquiti's advisory as the source for patches released for the three UniFi OS flaws.","category":"advisory","primary":false},{"title":"Warning: Ubiquiti has addressed multiple critical vulnerabilities in UniFi OS - patch now","url":"https://ccb.belgium.be/advisories/warning-ubiquiti-has-addressed-multiple-critical-vulnerabilities-unifi-os-patch","publisher":"Belgium Centre for Cybersecurity","context":"The article quotes this advisory to explain the potential impact of the UniFi OS vulnerabilities on affected devices and networks.","category":"advisory","primary":false}],"body":"\u003cp\u003eCISA warned that a critical security flaw affecting Lantronix EDS5000 Series devices is being actively exploited. The flaw, tracked as CVE-2025-67038, has a CVSS score of 9.8 and is described as a code injection issue. CISA urged Federal Civilian Executive Branch agencies to apply fixes by June 26, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in the HTTP RPC module, which executes a shell command to write logs when user authentication fails. The username is directly added to the command without sanitization, allowing attackers to inject arbitrary operating system commands through the username parameter. The injected commands are executed with root privileges.\u003c/p\u003e\n\n\u003cp\u003eCISA also confirmed active exploitation of three maximum-severity flaws in Ubiquiti UniFi OS: CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910. The article says these flaws can be chained to obtain a reverse shell with full root privileges in a single request, according to Bishop Fox. Belgium\u0026rsquo;s Centre for Cybersecurity warned that compromise of UniFi OS devices could allow unauthorized changes, access to sensitive files, information disclosure, arbitrary command execution, lateral movement, and broader network compromise.\u003c/p\u003e\n"},{"n":13,"title":"Cisco Unified CM Flaw Exploited After PoC Reveals File-Write Path to Root","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-unified-cm-flaw-exploited-after.html","time":"06:50","priority":"MUST READ","score":94,"tldr":"Attackers are actively exploiting CVE-2026-20230, a critical Cisco Unified CM flaw that can let unauthenticated attackers write files and potentially escalate to root when WebDialer is enabled. Cisco has patched the issue in Unified CM/SME 14SU6 and 15SU5, and organizations should patch or disable WebDialer immediately.","briefOverview":"\u003cp\u003eThreat actors have begun exploiting CVE-2026-20230, a critical security flaw affecting Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition. Cisco described the issue as improper input validation for specific HTTP requests that could allow an unauthenticated remote attacker to conduct server-side request forgery attacks through an affected device. A successful exploit could allow the attacker to write files to the underlying operating system that could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said it observed active exploitation of the vulnerability, with file-write payloads landing on its decoys from a single source using an unvetted proof of concept. Successful exploitation requires the WebDialer service to be enabled, although the article notes that WebDialer is disabled by default. Cisco provides steps to check whether the Cisco WebDialer Web Service is started in the Unified CM Administration interface.\u003c/p\u003e\n\n\u003cp\u003eCisco patched the vulnerability in Unified CM and Unified CM SME versions 14SU6 and 15SU5. If immediate patching is not possible, the article says users are advised to disable the WebDialer service until a fix can be applied. SSD Secure Disclosure also published technical specifics describing the issue as a path to arbitrary file writing and code execution through the WebDialer component.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors have begun exploiting CVE-2026-20230, a critical flaw affecting Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition.","Cisco said the flaw is caused by improper input validation for specific HTTP requests and could allow an unauthenticated remote attacker to conduct server-side request forgery attacks through an affected device.","A successful exploit could allow an attacker to write files to the underlying operating system that could later be used to elevate to root.","Successful exploitation requires the Cisco WebDialer Web Service to be enabled, and Cisco said the service is disabled by default.","Cisco patched the vulnerability in Unified CM and Unified CM SME versions 14SU6 and 15SU5, and advised disabling WebDialer if immediate patching is not possible."],"insights":["Exposure appears to depend on a non-default configuration, because the WebDialer service must be enabled even though it is disabled by default.","Defused Cyber reported exploitation from a single source using an unvetted proof of concept, suggesting observed activity may be tied to recently published technical details rather than a mature campaign described in the article.","Cisco had not yet updated its advisory to reflect active exploitation, so defenders relying only on the vendor advisory could miss the article’s reported exploitation status.","SSD Secure Disclosure’s write-up connects the WebDialer component to a path from unauthenticated file writing to code execution, making WebDialer status a high-priority check for affected deployments."],"referencedReports":[{"title":"Cisco Security Advisory for CVE-2026-20230","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"The article cites Cisco's advisory for details on the flaw, affected WebDialer configuration, checking whether the service is enabled, and patched versions.","category":"advisory","primary":true},{"title":"Cisco Unified Communications Manager Arbitrary File Write to RCE","url":"https://ssd-disclosure.com/cisco-unified-communications-manager-arbitrary-file-write-to-rce/","publisher":"SSD Secure Disclosure","context":"The article says SSD Secure Disclosure published additional technical specifics describing how the WebDialer component can be leveraged for arbitrary file writing and code execution.","category":"research","primary":false}],"body":"\u003cp\u003eThreat actors have begun exploiting CVE-2026-20230, a critical security flaw affecting Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition. Cisco described the issue as improper input validation for specific HTTP requests that could allow an unauthenticated remote attacker to conduct server-side request forgery attacks through an affected device. A successful exploit could allow the attacker to write files to the underlying operating system that could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said it observed active exploitation of the vulnerability, with file-write payloads landing on its decoys from a single source using an unvetted proof of concept. Successful exploitation requires the WebDialer service to be enabled, although the article notes that WebDialer is disabled by default. Cisco provides steps to check whether the Cisco WebDialer Web Service is started in the Unified CM Administration interface.\u003c/p\u003e\n\n\u003cp\u003eCisco patched the vulnerability in Unified CM and Unified CM SME versions 14SU6 and 15SU5. If immediate patching is not possible, the article says users are advised to disable the WebDialer service until a fix can be applied. SSD Secure Disclosure also published technical specifics describing the issue as a path to arbitrary file writing and code execution through the WebDialer component.\u003c/p\u003e\n"},{"n":18,"title":"Compromised GitHub action codfish/semantic-release-action steals CI/CD secrets","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/compromised-github-action-codfish-steals-secrets","time":"21:06","priority":"MUST READ","score":94,"tldr":"The codfish/semantic-release-action GitHub Action was compromised after attackers force-pushed malicious commits and repointed major version tags, causing workflows using those tags to run credential-stealing code. Projects using affected tags should treat CI/CD secrets such as GITHUB_TOKEN and NPM_TOKEN as potentially exposed and rotate them immediately.","briefOverview":"\u003cp\u003eOn Jun 24, 2026, the codfish/semantic-release-action GitHub Action was compromised through an imposter commit attack. An attacker force-pushed two malicious commits into the repository and repointed sixteen tags to them, including the floating major version tags v2, v3, v4, and v5. Any workflow referencing the action by one of those tags will pull and run the attacker’s code on its next CI run.\u003c/p\u003e\n\n\u003cp\u003eThe action has been a standard way to wire semantic-release into GitHub Actions since 2019 and has over 100 GitHub stars. Workflows using it for automated releases almost always hold a GITHUB_TOKEN and frequently an NPM_TOKEN with publish access. The article says this is exactly the kind of access an attacker wants to land inside.\u003c/p\u003e\n\n\u003cp\u003eThe malicious commits changed action.yml from a Docker-based action into a composite action that first called a clean pinned version of codfish/semantic-release-action, then installed Bun through oven-sh/setup-bun and executed an obfuscated index.js payload. The payload was 781,580 bytes, had the SHA-256 hash 9f93d77d32833a515bc406c46da477142bb1ac2babeecb6aa42f98669a6db015, and contained the marker string thebeautifulsnadsoftime. The article links that marker to the Miasma credential stealing toolkit and lists affected tags, malicious commits, and confirmed clean versions.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On Jun 24, 2026, the codfish/semantic-release-action GitHub Action was compromised when an attacker force-pushed two malicious commits into the repository and repointed sixteen tags to them, including v2, v3, v4, and v5.","Any workflow referencing the compromised action by one of the affected tags will pull and run the attacker’s code on its next CI run.","The malicious commits changed action.yml from a Docker-based action into a composite action that still ran the legitimate codfish/semantic-release-action at a clean pinned commit, then installed Bun and executed an obfuscated index.js payload.","The injected index.js payload was 781,580 bytes of obfuscated JavaScript and contained the dead drop marker string thebeautifulsnadsoftime, which the article links to the Miasma credential stealing toolkit.","The article lists affected tags, malicious commit hashes, the SHA-256 hash of the malicious index.js file, and notes that codfish/semantic-release-action versions v1.0.0 through v1.10.0 and v2.0.0 are confirmed clean."],"insights":["Because GitHub Actions resolves tag references when a workflow runs, moving a tag can silently change the code executed by future CI runs without changing the workflow file itself.","The malicious action preserved normal release behavior by calling the clean action first, making successful workflow runs an unreliable indicator that the action was safe.","Leaving the original Dockerfile, entrypoint.js, and test file in the repository helped hide the compromise because the action had been changed to a composite action that no longer used those files.","The payload used GitHub public commit search as a dead drop channel, which the article notes avoids the need for traditional attacker infrastructure and may not trigger typical outbound network monitoring.","Pinning GitHub Actions to immutable commits rather than movable tags is strongly implied as a practical defense, since the attacker’s control came from repointing version tags."],"referencedReports":[],"body":"\u003cp\u003eOn Jun 24, 2026, the codfish/semantic-release-action GitHub Action was compromised through an imposter commit attack. An attacker force-pushed two malicious commits into the repository and repointed sixteen tags to them, including the floating major version tags v2, v3, v4, and v5. Any workflow referencing the action by one of those tags will pull and run the attacker’s code on its next CI run.\u003c/p\u003e\n\n\u003cp\u003eThe action has been a standard way to wire semantic-release into GitHub Actions since 2019 and has over 100 GitHub stars. Workflows using it for automated releases almost always hold a GITHUB_TOKEN and frequently an NPM_TOKEN with publish access. The article says this is exactly the kind of access an attacker wants to land inside.\u003c/p\u003e\n\n\u003cp\u003eThe malicious commits changed action.yml from a Docker-based action into a composite action that first called a clean pinned version of codfish/semantic-release-action, then installed Bun through oven-sh/setup-bun and executed an obfuscated index.js payload. The payload was 781,580 bytes, had the SHA-256 hash 9f93d77d32833a515bc406c46da477142bb1ac2babeecb6aa42f98669a6db015, and contained the marker string thebeautifulsnadsoftime. The article links that marker to the Miasma credential stealing toolkit and lists affected tags, malicious commits, and confirmed clean versions.\u003c/p\u003e\n"},{"n":2,"title":"Malicious Edge extension abuses Native Messaging as bridge to malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/malicious-edge-extension-abuses-native-messaging-as-bridge-to-malware/","time":"20:58","priority":"MUST READ","score":92,"tldr":"A malicious Microsoft Edge extension called Edgecution is being used in ransomware-linked attacks to abuse Chrome Native Messaging, escape the browser sandbox, and launch a Python backdoor on infected Windows systems. The campaign starts with fake IT support messages on Microsoft Teams directing victims to a fraudulent Microsoft update page.","briefOverview":"\u003cp\u003eA malicious Microsoft Edge extension dubbed Edgecution has been used in a ransomware attack to escape the browser sandbox and deploy a Python-based backdoor. Zscaler researchers believe Edgecution is deployed by an initial access broker connected to the Payouts Kings ransomware operation. The compromise begins with an attacker posing as IT support on Microsoft Teams and directing employees to a fraudulent page under the pretense of installing a spam filter update.\u003c/p\u003e\n\n\u003cp\u003eThe fake Microsoft update site presented download buttons for update packs or software verification, but those buttons downloaded malicious components, copied scripts to the clipboard, or launched forms requesting Microsoft 365 and Outlook passwords. The site offered multiple deployment options through an AutoHotKey script, a Windows batch script, and a PowerShell script. The malware components were delivered in a ZIP archive with malformed headers, which the scripts later fixed before extracting files and creating a scheduled task to run Microsoft Edge.\u003c/p\u003e\n\n\u003cp\u003eEdgecution runs in a headless Edge browser and uses Chrome Native Messaging to communicate with a local application outside the browser. The attack includes a malicious Edge extension disguised as an Edge Monitoring Agent and a Python-based backdoor that can execute shell commands, run PowerShell, run arbitrary Python code, write files, enumerate running processes, and gather system information. Zscaler said the technique shows evolving sophistication among ransomware-linked threat actors and recommended stronger monitoring of browser extensions and strict controls over native messaging host configurations.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A malicious Microsoft Edge extension dubbed Edgecution has been used in a ransomware attack to escape the browser sandbox and deploy a Python-based backdoor.","The compromise begins with an attacker posing as IT support on Microsoft Teams and directing employees to a fraudulent page presented as a spam filter or Microsoft Outlook update site.","Zscaler researchers believe Edgecution is deployed by an initial access broker connected to the Payouts Kings ransomware operation.","Edgecution abuses Chrome Native Messaging to let the malicious Edge extension communicate with a local Python-based backdoor that can execute shell commands, run PowerShell, run arbitrary Python code, write files, enumerate processes, and gather system information.","Zscaler recommends that organizations strengthen monitoring of browser extensions and enforce strict controls over native messaging host configurations."],"insights":["The attack chain used malformed ZIP headers so security products would not recognize the downloaded file as a valid archive, while later scripts repaired the headers before extraction.","The fake Microsoft update page gave the attacker multiple deployment paths, including an AutoHotKey script, a Windows batch script, and a PowerShell script.","The malware ran Microsoft Edge in headless mode, making the malicious browser activity invisible to the user.","The ZIP archive included both an embedded Python 3.13.3 runtime and separate extension and native directories, showing that the attackers packaged the browser component and host-level executor together.","Zscaler found unused commands in both malware components, indicating that the analyzed version contains functionality that could be enabled in future versions."],"referencedReports":[{"title":"Payouts King Ransomware Initial Access Broker Deploys New Edgecution","url":"https://www.zscaler.com/blogs/security-research/payouts-king-ransomware-initial-access-broker-deploys-new-edgecution","publisher":"Zscaler","context":"The article relies on Zscaler's security research and technical analysis describing the Edgecution malware, its deployment methods, native messaging abuse, and indicators of compromise.","category":"research","primary":true}],"body":"\u003cp\u003eA malicious Microsoft Edge extension dubbed Edgecution has been used in a ransomware attack to escape the browser sandbox and deploy a Python-based backdoor. Zscaler researchers believe Edgecution is deployed by an initial access broker connected to the Payouts Kings ransomware operation. The compromise begins with an attacker posing as IT support on Microsoft Teams and directing employees to a fraudulent page under the pretense of installing a spam filter update.\u003c/p\u003e\n\n\u003cp\u003eThe fake Microsoft update site presented download buttons for update packs or software verification, but those buttons downloaded malicious components, copied scripts to the clipboard, or launched forms requesting Microsoft 365 and Outlook passwords. The site offered multiple deployment options through an AutoHotKey script, a Windows batch script, and a PowerShell script. The malware components were delivered in a ZIP archive with malformed headers, which the scripts later fixed before extracting files and creating a scheduled task to run Microsoft Edge.\u003c/p\u003e\n\n\u003cp\u003eEdgecution runs in a headless Edge browser and uses Chrome Native Messaging to communicate with a local application outside the browser. The attack includes a malicious Edge extension disguised as an Edge Monitoring Agent and a Python-based backdoor that can execute shell commands, run PowerShell, run arbitrary Python code, write files, enumerate running processes, and gather system information. Zscaler said the technique shows evolving sophistication among ransomware-linked threat actors and recommended stronger monitoring of browser extensions and strict controls over native messaging host configurations.\u003c/p\u003e\n"},{"n":3,"title":"Stealthy Mistic backdoor linked to ransomware access broker KongTuke","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/stealthy-mistic-backdoor-linked-to-ransomware-access-broker-kongtuke/","time":"10:41","priority":"MUST READ","score":92,"tldr":"A new stealthy backdoor called Mistic has been linked to KongTuke/Woodgnat, an initial access broker that sells corporate network access to ransomware groups. The malware is built for long-term persistence, in-memory execution, credential theft, and expanding attacker capabilities while minimizing detection.","briefOverview":"\u003cp\u003eA new backdoor called Mistic has been observed in financially motivated attacks against organizations in the insurance, education, IT, and professional services sectors. Symantec says the malware has been used in intrusions since April and believes it is linked to KongTuke/Woodgnat, an initial access broker active since at least 2024. KongTuke specializes in compromising corporate networks and selling access to ransomware groups including Qilin, Interlock, Rhysida, Akira, 8Base, and Black Basta.\u003c/p\u003e\n\n\u003cp\u003eIn attacks investigated by Symantec, the infection began with the legitimate MpExtMs.exe executable side-loading a malicious DLL named version.dll, which loaded Mistic as EndpointDlp.dll. The filename resembles Microsoft endpoint security tooling, which researchers say may help the malware blend in with trusted software on the host. A separate .NET DLL also displayed a fake login screen to steal the victim’s account credentials.\u003c/p\u003e\n\n\u003cp\u003eMistic can upload, download, move, rename, and delete files, create folders, change how often it checks in with its command-and-control server, execute code in memory, and delete itself from the host. Symantec says these features are consistent with long-term, low-visibility access, while Zscaler tracks the malware as MTLBackdoor and reported it as a payload in a multi-stage ClickFix infection chain in May. Zscaler also noted that Mistic can load Beacon Object Files, allowing it to expand its capabilities while leaving no footprint on disk.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A new backdoor called Mistic has been observed in financially motivated attacks targeting organizations in the insurance, education, IT, and professional services sectors.","Symantec believes Mistic is linked to KongTuke/Woodgnat, an initial access broker that sells compromised corporate network access to ransomware groups including Qilin, Interlock, Rhysida, Akira, 8Base, and Black Basta.","In attacks investigated by Symantec, the infection chain used the legitimate MpExtMs.exe executable to side-load a malicious version.dll loader for Mistic, also named EndpointDlp.dll.","Mistic can upload, download, move, rename, and delete files, create folders, change its command-checking frequency, execute code in memory, and terminate itself while deleting files from the host.","Zscaler tracks Mistic as MTLBackdoor and reported that it was delivered as a payload in a multi-stage ClickFix infection chain in May."],"insights":["Mistic’s filename, EndpointDlp.dll, appears chosen to resemble Microsoft endpoint security tooling, which may help it blend in with trusted software on compromised hosts.","The attack chain abuses the legitimate MpExtMs.exe executable to load a malicious version.dll, making monitoring for suspicious DLL side-loading around trusted executables especially relevant.","Mistic’s ability to run payloads only in memory and delete itself gives operators a way to reduce evidence left on disk during long-term access operations.","Zscaler’s finding that Mistic can load Beacon Object Files shows the backdoor can be extended with additional post-compromise capabilities without relying on separate files written to disk.","The appearance of Mistic shortly after ModeloRAT in at least one incident suggests KongTuke may use multiple custom backdoors in the same intrusion workflow."],"referencedReports":[{"title":"New Mistic Backdoor / ModeloRAT research","url":"https://www.security.com/threat-intelligence/new-mistic-backdoor-modeloRAT","publisher":"Symantec","context":"The article cites Symantec researchers’ analysis of Mistic’s stealth features, capabilities, attack chain, and suspected link to KongTuke/Woodgnat.","category":"research","primary":true},{"title":"Technical Analysis of MTLBackdoor","url":"http://www.zscaler.com/blogs/security-research/technical-analysis-mltbackdoor","publisher":"Zscaler","context":"The article describes this as a Zscaler technical report that tracks Mistic as MTLBackdoor and says it was delivered in a multi-stage ClickFix infection chain.","category":"research","primary":true}],"body":"\u003cp\u003eA new backdoor called Mistic has been observed in financially motivated attacks against organizations in the insurance, education, IT, and professional services sectors. Symantec says the malware has been used in intrusions since April and believes it is linked to KongTuke/Woodgnat, an initial access broker active since at least 2024. KongTuke specializes in compromising corporate networks and selling access to ransomware groups including Qilin, Interlock, Rhysida, Akira, 8Base, and Black Basta.\u003c/p\u003e\n\n\u003cp\u003eIn attacks investigated by Symantec, the infection began with the legitimate MpExtMs.exe executable side-loading a malicious DLL named version.dll, which loaded Mistic as EndpointDlp.dll. The filename resembles Microsoft endpoint security tooling, which researchers say may help the malware blend in with trusted software on the host. A separate .NET DLL also displayed a fake login screen to steal the victim’s account credentials.\u003c/p\u003e\n\n\u003cp\u003eMistic can upload, download, move, rename, and delete files, create folders, change how often it checks in with its command-and-control server, execute code in memory, and delete itself from the host. Symantec says these features are consistent with long-term, low-visibility access, while Zscaler tracks the malware as MTLBackdoor and reported it as a payload in a multi-stage ClickFix infection chain in May. Zscaler also noted that Mistic can load Beacon Object Files, allowing it to expand its capabilities while leaving no footprint on disk.\u003c/p\u003e\n"},{"n":12,"title":"Amadey and StealC Malware Network Disrupted, 27M Stolen Credentials Recovered","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/amadey-and-stealc-malware-network.html","time":"15:59","priority":"MUST READ","score":90,"tldr":"International law enforcement and private-sector partners disrupted the Amadey and StealC malware-as-a-service networks, taking down hundreds of servers and domains while recovering 27 million stolen credentials. The operation targeted key infrastructure used to deliver infostealers, enable fraud, and support broader cybercrime operations.","briefOverview":"\u003cp\u003eA coordinated law enforcement operation with private sector partners including Bitdefender, Bitsight, ESET, and Microsoft disrupted criminal infrastructure powering Amadey and StealC. Europol said the goal was to disrupt the cybercriminal “assembly lines” used to launch ransomware, financial fraud, and attacks on critical infrastructure. The action recovered 27 million stolen login credentials and identified, flagged, and restricted more than $47 million in cryptocurrency assets of criminal origin.\u003c/p\u003e\n\n\u003cp\u003eThe operation dismantled 326 servers and 142 domains, and Microsoft said it flagged 200 malicious Amadey and StealC command-and-control domains and IP addresses that have since been shut down. Microsoft also said Amadey and StealC used some of the same infrastructure and were linked to more than 140,000 infected computers globally in the first two weeks of May 2026. The company identified more than 18,000 victim computers and severed criminal control of those devices.\u003c/p\u003e\n\n\u003cp\u003eAmadey and StealC are advertised under a malware-as-a-service model, with Amadey acting as a loader and StealC stealing data such as credentials, session cookies, credit card data, browsing history, and extension data. Amadey has been active since October 2018, while StealC first surfaced in January 2023 and is sold by a threat actor using the moniker “plymouth.” The latest effort took place between June 15 and 19, 2026, as part of Operation Endgame and involved authorities from Belgium, Canada, Denmark, France, Germany, the Netherlands, the U.K., and the U.S.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A coordinated law enforcement operation with private sector partners including Bitdefender, Bitsight, ESET, and Microsoft disrupted criminal infrastructure powering Amadey and StealC.","The two-week action recovered 27 million stolen login credentials, dismantled 326 servers and 142 domains, and identified, flagged, and restricted more than $47 million in cryptocurrency assets of criminal origin.","Amadey and StealC are advertised under a malware-as-a-service model, with Amadey functioning as a loader and StealC stealing sensitive data such as credentials, session cookies, credit card data, browsing history, and extension data.","Microsoft said Amadey and StealC were linked to more than 140,000 infected computers globally in the first two weeks of May 2026 and that it identified over 18,000 victim computers and severed criminal control of those devices.","The operation took place between June 15 and 19, 2026, as part of Operation Endgame and involved judicial authorities and law enforcement from Belgium, Canada, Denmark, France, Germany, the Netherlands, the U.K., and the U.S."],"insights":["Microsoft reported that Amadey and StealC used some of the same infrastructure, showing that separate malware services can be operationally connected within the same criminal ecosystem.","StealC’s subscription model allowed unlimited build generation, which ESET said made it cheaper and easier for affiliates to rotate command-and-control infrastructure and generate new samples compared with Amadey’s pay-per-rebuild model.","Security flaws in StealC’s own control panel exposed details about its malware-as-a-service operation, and IBM X-Force and Proofpoint said one flaw was likely exploited by an affiliate to steal data from other affiliates.","Both Amadey and StealC include locale-based behavior tied to countries such as Russia, Ukraine, and Belarus, with StealC terminating itself for some locales and Amadey skipping some stealing functions on certain hosts.","Amadey’s payload distribution grew from 66 samples in 2019 to a peak of 11,635 in 2025, indicating that the loader became far more widely used before the 2026 disruption."],"referencedReports":[{"title":"Amadey C2 Analysis","url":"https://www.mbsd.jp/research/20260624/amadey-c2-en/","publisher":"Mitsui Bussan Secure Directions","context":"The article cites Mitsui Bussan Secure Directions for data on the daily number of active Amadey command-and-control servers and Amadey payload distribution trends.","category":"research","primary":false},{"title":"ESET takes part in Operation Endgame to disrupt Amadey, StealC","url":"https://www.welivesecurity.com/en/eset-research/eset-takes-part-operation-endgame-disrupt-amadey-stealc/","publisher":"ESET","context":"The article quotes ESET researchers on the Amadey and StealC affiliate models and administration panels.","category":"research","primary":true},{"title":"StealC you later: Proofpoint and X-Force support Operation Endgame disruptions","url":"https://www.ibm.com/think/x-force/stealc-you-later-proofpoint-x-force-support-operation-endgame-disruptions","publisher":"IBM X-Force","context":"The article references IBM X-Force for findings about security flaws in the StealC command-and-control panel, including a directory traversal issue.","category":"research","primary":false},{"title":"StealC You Later: Proofpoint and IBM X-Force Support Operation Endgame","url":"https://www.proofpoint.com/us/blog/threat-insight/stealc-you-later-proofpoint-and-ibm-x-force-support-operation-endgame","publisher":"Proofpoint","context":"The article references Proofpoint for findings about security flaws in the StealC command-and-control panel and their possible exploitation by an affiliate.","category":"research","primary":false},{"title":"StealC and Amadey: Breaking down infostealers and the cybercrime services that deliver them","url":"https://www.microsoft.com/en-us/security/blog/2026/06/24/stealc-and-amadey-breaking-down-infostealers-and-the-cybercrime-services-that-deliver-them/","publisher":"Microsoft","context":"The article cites Microsoft’s analysis of Amadey and StealC infrastructure, infections, victim computers, and disrupted command-and-control domains and IP addresses.","category":"research","primary":true}],"body":"\u003cp\u003eA coordinated law enforcement operation with private sector partners including Bitdefender, Bitsight, ESET, and Microsoft disrupted criminal infrastructure powering Amadey and StealC. Europol said the goal was to disrupt the cybercriminal “assembly lines” used to launch ransomware, financial fraud, and attacks on critical infrastructure. The action recovered 27 million stolen login credentials and identified, flagged, and restricted more than $47 million in cryptocurrency assets of criminal origin.\u003c/p\u003e\n\n\u003cp\u003eThe operation dismantled 326 servers and 142 domains, and Microsoft said it flagged 200 malicious Amadey and StealC command-and-control domains and IP addresses that have since been shut down. Microsoft also said Amadey and StealC used some of the same infrastructure and were linked to more than 140,000 infected computers globally in the first two weeks of May 2026. The company identified more than 18,000 victim computers and severed criminal control of those devices.\u003c/p\u003e\n\n\u003cp\u003eAmadey and StealC are advertised under a malware-as-a-service model, with Amadey acting as a loader and StealC stealing data such as credentials, session cookies, credit card data, browsing history, and extension data. Amadey has been active since October 2018, while StealC first surfaced in January 2023 and is sold by a threat actor using the moniker “plymouth.” The latest effort took place between June 15 and 19, 2026, as part of Operation Endgame and involved authorities from Belgium, Canada, Denmark, France, Germany, the Netherlands, the U.K., and the U.S.\u003c/p\u003e\n"},{"n":10,"title":"Three ‘cybercrime as a service’ operations undercut by Microsoft, law enforcement","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/stealc-amadey-socgholish-malware-takedown-europol-microsoft","time":"20:00","priority":"SHOULD READ","score":88,"tldr":"Microsoft and international law enforcement disrupted major cybercrime-as-a-service infrastructure used to spread SocGholish, Amadey and StealC, seizing hundreds of servers and domains and recovering millions of stolen credentials. The operation targeted the malware supply chain that enables ransomware, fraud and broader intrusions.","briefOverview":"\u003cp\u003eMicrosoft and international law enforcement announced a two-week operation to disrupt cybercrime-as-a-service infrastructure used to deploy ransomware, commit financial fraud and attack critical infrastructure. Europol said 326 servers and 142 domains were dismantled, 27 million stolen login credentials were reclaimed, and crypto assets of criminal origin worth €41 million were found. The operation targeted infrastructure tied to the distribution of SocGholish, Amadey and StealC malware.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the case reflects an approach focused on the cyberattack supply chain rather than only individual services. Its researchers used artificial intelligence to find that Amadey and StealC depend on the same infrastructure, and Microsoft said taking both down at once would have an exponential effect. Amadey is primarily used to break in, while StealC steals passwords and other sensitive data.\u003c/p\u003e\n\n\u003cp\u003eSocGholish was described as a tool that compromises systems by sending fake browser updates through compromised websites. Europol said it found 14,971 infected websites belonging to everyday retailers that were infected by the variant. Europol also said SocGholish is tied to Evil Corp, a Russian cybercrime gang linked to large-scale money laundering and ransomware activities.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An international operation announced by Europol and Microsoft dismantled 326 servers and 142 domains used by cybercrime-as-a-service operations.","Investigators recovered about 27 million stolen login credentials and identified crypto assets of criminal origin valued at €41 million, or $47 million.","The operation targeted infrastructure used to distribute SocGholish, Amadey and StealC malware, which other criminals paid to use for further crimes.","Microsoft said the action focused on the cybercrime supply chain, disrupting coordinated tools used for ransomware, financial fraud and attacks on public services.","Europol said it found 14,971 everyday retail websites infected with a SocGholish variant, and it linked SocGholish to the Russian cybercrime gang Evil Corp."],"insights":["Microsoft said its researchers used artificial intelligence to find that Amadey and StealC depended on the same infrastructure, enabling the two malware operations to be disrupted together.","The article highlights that disrupting multiple linked tools at once can have an exponential effect because Amadey is used to break in while StealC is used to steal passwords and other sensitive data after access is gained.","The operation reflects a shift from targeting individual criminal services to targeting the broader cybercrime supply chain that supports ransomware, fraud and public-service disruption.","SocGholish’s use of compromised retail websites to deliver fake browser updates shows that ordinary shopping sites can become part of the infrastructure used to compromise victims."],"referencedReports":[{"title":"StealC and Amadey: Breaking down infostealers and the cybercrime services that deliver them","url":"https://www.microsoft.com/en-us/security/blog/2026/06/24/stealc-and-amadey-breaking-down-infostealers-and-the-cybercrime-services-that-deliver-them/","publisher":"Microsoft","context":"The article says Microsoft posted new research on Amadey and StealC alongside the disruption announcement.","category":"research","primary":false}],"body":"\u003cp\u003eMicrosoft and international law enforcement announced a two-week operation to disrupt cybercrime-as-a-service infrastructure used to deploy ransomware, commit financial fraud and attack critical infrastructure. Europol said 326 servers and 142 domains were dismantled, 27 million stolen login credentials were reclaimed, and crypto assets of criminal origin worth €41 million were found. The operation targeted infrastructure tied to the distribution of SocGholish, Amadey and StealC malware.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the case reflects an approach focused on the cyberattack supply chain rather than only individual services. Its researchers used artificial intelligence to find that Amadey and StealC depend on the same infrastructure, and Microsoft said taking both down at once would have an exponential effect. Amadey is primarily used to break in, while StealC steals passwords and other sensitive data.\u003c/p\u003e\n\n\u003cp\u003eSocGholish was described as a tool that compromises systems by sending fake browser updates through compromised websites. Europol said it found 14,971 infected websites belonging to everyday retailers that were infected by the variant. Europol also said SocGholish is tied to Evil Corp, a Russian cybercrime gang linked to large-scale money laundering and ransomware activities.\u003c/p\u003e\n"},{"n":15,"title":"Cordyceps CI/CD Flaws Expose 300+ GitHub Repositories to Supply-Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cordyceps-cicd-flaws-expose-300-github.html","time":"12:48","priority":"SHOULD READ","score":88,"tldr":"Researchers found a CI/CD workflow weakness dubbed Cordyceps that could let unauthenticated attackers hijack GitHub Actions workflows, steal credentials, and compromise more than 300 major open-source repositories. Affected projects included repositories tied to Microsoft, Google, Apache, Cloudflare, and the Python Software Foundation, with several vendors confirming or patching issues after disclosure.","briefOverview":"\u003cp\u003eCybersecurity researchers at Novee Security flagged a CI/CD workflow weakness called Cordyceps that can allow attackers to hijack workflows and compromise open-source supply chains. The company said the flaw is exploitable by any unauthenticated user, with no organization membership or special privileges required. Its scan of about 30,000 high-impact repositories found more than 300 to be fully exploitable.\u003c/p\u003e\n\n\u003cp\u003eThe issue stems from weak CI/CD configurations that give pull requests more permissions than they should have. Because untrusted pull requests can trigger privileged workflows, attackers may be able to run code, steal credentials, escalate privileges, or compromise the software supply chain. Novee said the vulnerability can hide from scanners because the individual workflow components may be working as designed, while the risk emerges from how untrusted data crosses a trust boundary.\u003c/p\u003e\n\n\u003cp\u003eNovee reported examples involving repositories associated with Microsoft, Google, Apache, Cloudflare, and the Python Software Foundation. The findings included cases where pull request comments, forked pull requests, or crafted branch names could run attacker-controlled code on CI systems or expose credentials and tokens. Following responsible disclosure, Microsoft and Google confirmed impact, while Cloudflare, Python, and Apache applied hardening or patches.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Novee Security identified a CI/CD workflow weakness called Cordyceps that can allow unauthenticated attackers to hijack workflows and compromise open-source supply chains.","A scan of about 30,000 high-impact repositories found more than 300 to be fully exploitable, enabling attacker-controlled code execution, credential theft, and supply chain compromise.","The issue stems from weak CI/CD configurations that grant pull requests more permissions than they should have, allowing untrusted pull requests to trigger privileged workflows.","Novee reported examples affecting repositories associated with Microsoft, Google, Apache, Cloudflare, and the Python Software Foundation.","After responsible disclosure, Microsoft and Google confirmed impact, while Cloudflare, Python, and Apache applied hardening or patches."],"insights":["The weakness can be exploited by any unauthenticated user with a free GitHub account, meaning the barrier to abusing affected workflows is extremely low.","Novee said the issue can hide from scanners because each workflow component may function as designed, while the danger emerges from how untrusted pull request data crosses a trust boundary.","Some reported cases required only low-effort triggers, such as a single pull request comment or a crafted branch name, to run attacker-controlled code in major organizations’ CI environments.","The article highlights non-expiring or high-privilege automation credentials as a key risk, because stolen CI tokens or GitHub App keys could allow attackers to approve pull requests or gain repository control."],"referencedReports":[{"title":"Cordyceps","url":"https://novee.security/blog/cordyceps/","publisher":"Novee Security","context":"The article is based on Novee Security's research describing the Cordyceps CI/CD workflow weakness and its impact on major GitHub repositories.","category":"research","primary":true}],"body":"\u003cp\u003eCybersecurity researchers at Novee Security flagged a CI/CD workflow weakness called Cordyceps that can allow attackers to hijack workflows and compromise open-source supply chains. The company said the flaw is exploitable by any unauthenticated user, with no organization membership or special privileges required. Its scan of about 30,000 high-impact repositories found more than 300 to be fully exploitable.\u003c/p\u003e\n\n\u003cp\u003eThe issue stems from weak CI/CD configurations that give pull requests more permissions than they should have. Because untrusted pull requests can trigger privileged workflows, attackers may be able to run code, steal credentials, escalate privileges, or compromise the software supply chain. Novee said the vulnerability can hide from scanners because the individual workflow components may be working as designed, while the risk emerges from how untrusted data crosses a trust boundary.\u003c/p\u003e\n\n\u003cp\u003eNovee reported examples involving repositories associated with Microsoft, Google, Apache, Cloudflare, and the Python Software Foundation. The findings included cases where pull request comments, forked pull requests, or crafted branch names could run attacker-controlled code on CI systems or expose credentials and tokens. Following responsible disclosure, Microsoft and Google confirmed impact, while Cloudflare, Python, and Apache applied hardening or patches.\u003c/p\u003e\n"},{"n":21,"title":"StrikeShark: investigating a new campaign delivering Cobalt Strike through SharkLoader","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/strikeshark-campaign/120326/","time":"10:00","priority":"SHOULD READ","score":88,"tldr":"Kaspersky uncovered StrikeShark, a previously undocumented campaign using the new SharkLoader malware to deploy Cobalt Strike against government, diplomatic, software development, and other organizations across multiple countries. The attackers gain access through vulnerable internet-facing applications and malicious droppers, then use sophisticated in-memory loading, API hooking, and persistence techniques to evade detection.","briefOverview":"\u003cp\u003eKaspersky uncovered a previously undocumented malware family named SharkLoader while investigating activity affecting a diplomatic organization in Indonesia. The malware is used in a broader campaign tracked as StrikeShark to deploy Cobalt Strike Beacon on compromised systems. Related activity affected government organizations in Taiwan, software development companies across multiple countries, and entities in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, Serbia, and other locations.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor used multiple initial access methods, including exploitation of internet-facing applications such as Microsoft Exchange, Microsoft SharePoint, Openfire Server, and GeoServer, as well as custom droppers disguised as legitimate software. Observed vulnerabilities included ProxyLogon, CVE-2023-32315, CVE-2024-36401, and other publicly exploitable flaws in enterprise applications and network appliances. The researchers assessed with medium confidence that the actor primarily relies on publicly available proof-of-concept exploits, and they described the activity as largely opportunistic across industries, regions, and technology environments.\u003c/p\u003e\n\n\u003cp\u003eSharkLoader uses DLL sideloading, encrypted components, reflective in-memory loading, API hooks, and memory protection changes to support Cobalt Strike execution and evasion. The campaign also involved persistence through scheduled tasks or registry Run keys, reconnaissance commands, Active Directory enumeration, and credential dumping attempts targeting LSASS and NTDS. Kaspersky found no code or infrastructure overlap tying the activity to a known group, but assessed StrikeShark as a Chinese-speaking threat actor with low confidence based on limited indicators including the use of open-source tools developed by Chinese-speaking developers.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Kaspersky uncovered a previously undocumented malware family named SharkLoader while investigating activity affecting a diplomatic organization in Indonesia.","SharkLoader is used to deploy Cobalt Strike Beacon and has been delivered through exploited internet-facing applications including Microsoft Exchange, Microsoft SharePoint, Openfire Server, and GeoServer, as well as through custom droppers disguised as legitimate software.","The StrikeShark campaign affected government-related entities, software development companies, and other organizations in countries including Indonesia, Taiwan, Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.","SharkLoader uses DLL sideloading, encrypted in-memory components, API hooks, and memory protection changes around Cobalt Strike Beacon sleep periods to support execution and evasion.","The researchers found no code or infrastructure overlap linking SharkLoader to a known threat actor, but assessed the campaign as likely Chinese-speaking with low confidence based on the open-source tools used after compromise."],"insights":["The actor appears to rely on publicly available proof-of-concept exploits rather than custom exploit development, because every observed vulnerability had public exploit code available and the victim set was broad and opportunistic.","SharkLoader’s persistence differed by intrusion path: dropper-based infections created scheduled tasks automatically, while some server-compromise cases showed the attacker manually creating scheduled tasks or registry Run keys.","The malware uses multiple legitimate Windows or application components for DLL sideloading, including SystemSettings.exe with SystemSettings.dll and variants using msedge.dll, PrintDialog.dll, or miracastview.dll, making detection based on a single filename insufficient.","The Cobalt Strike payload is protected during sleep periods by changing tracked memory regions from executable permissions to read-write permissions and restoring them afterward, a behavior intended to reduce exposure to memory scanning.","Post-compromise activity combined Cobalt Strike and webshell access, showing that responders should not assume removing only the beacon or only the webshell would eliminate the attacker’s access."],"referencedReports":[{"title":"Perfect DLL Hijacking","url":"https://elliotonsecurity.com/perfect-dll-hijacking/","publisher":"Elliot Killick","context":"The article says SharkLoader implements a technique commonly referred to as “Perfect DLL Hijacking,” originally described by security researcher Elliot Killick on his blog.","category":"research","primary":false},{"title":"Dynamic-Link Library Best Practices","url":"https://learn.microsoft.com/en-us/windows/win32/dlls/dynamic-link-library-best-practices","publisher":"Microsoft","context":"The article cites Microsoft’s Dynamic-Link Library Best Practices to explain the Windows loader lock behavior during DllMain execution.","category":"guide","primary":false}],"body":"\u003cp\u003eKaspersky uncovered a previously undocumented malware family named SharkLoader while investigating activity affecting a diplomatic organization in Indonesia. The malware is used in a broader campaign tracked as StrikeShark to deploy Cobalt Strike Beacon on compromised systems. Related activity affected government organizations in Taiwan, software development companies across multiple countries, and entities in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, Serbia, and other locations.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor used multiple initial access methods, including exploitation of internet-facing applications such as Microsoft Exchange, Microsoft SharePoint, Openfire Server, and GeoServer, as well as custom droppers disguised as legitimate software. Observed vulnerabilities included ProxyLogon, CVE-2023-32315, CVE-2024-36401, and other publicly exploitable flaws in enterprise applications and network appliances. The researchers assessed with medium confidence that the actor primarily relies on publicly available proof-of-concept exploits, and they described the activity as largely opportunistic across industries, regions, and technology environments.\u003c/p\u003e\n\n\u003cp\u003eSharkLoader uses DLL sideloading, encrypted components, reflective in-memory loading, API hooks, and memory protection changes to support Cobalt Strike execution and evasion. The campaign also involved persistence through scheduled tasks or registry Run keys, reconnaissance commands, Active Directory enumeration, and credential dumping attempts targeting LSASS and NTDS. Kaspersky found no code or infrastructure overlap tying the activity to a known group, but assessed StrikeShark as a Chinese-speaking threat actor with low confidence based on limited indicators including the use of open-source tools developed by Chinese-speaking developers.\u003c/p\u003e\n"},{"n":5,"title":"Amadey, StealC malware operations disrupted in Operation Endgame action","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/amadey-stealc-malware-operations-disrupted-in-operation-endgame-action/","time":"14:35","priority":"SHOULD READ","score":87,"tldr":"Microsoft, Europol, and international partners disrupted Amadey and StealC malware infrastructure as part of Operation Endgame, taking down hundreds of servers/domains and recovering millions of stolen credentials. The action raises costs for cybercriminals using these malware-as-a-service tools for credential theft, initial access, and ransomware enablement.","briefOverview":"\u003cp\u003eMicrosoft, Europol, and international partners disrupted infrastructure used by the Amadey and StealC malware operations as part of Operation Endgame. The action involved authorities and private partners from multiple countries taking down, seizing, blocking, or sinkholing infrastructure tied to the malware families. Europol said the operation disrupted 326 servers and 142 domains, identified more than €41 million in cryptocurrency linked to criminal activity, and recovered about 27 million stolen credentials from over 385,000 compromised systems.\u003c/p\u003e\n\n\u003cp\u003eThe operation targeted cybercrime infrastructure used to gain initial access to systems, steal credentials, and ultimately deploy ransomware or conduct financial fraud. Amadey and StealC are sold through malware-as-a-service operations, where affiliates pay for access to malware builders, management panels, support, and infrastructure. Amadey is used to gain an initial foothold on victim devices and deploy additional malware, while StealC is used to steal credentials, cryptocurrency wallets, and other sensitive information.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it identified more than 200 malicious command-and-control domains and IP addresses associated with Amadey and StealC and worked with partners to shut down the infrastructure through court orders, domain seizures, registrations, and provider notifications. The company said the two malware families were linked to more than 140,000 infected devices during the first two weeks of May 2026 alone. Other private partners, including ESET, Proofpoint, IBM X-Force, and Bitsight, contributed by identifying infrastructure, providing intelligence, and supporting malware analysis.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft, Europol, and international partners disrupted infrastructure used by the Amadey and StealC malware operations as part of Operation Endgame.","Europol said the operation disrupted 326 servers and 142 domains, identified more than €41 million in cryptocurrency linked to criminal activity, and recovered about 27 million credentials stolen from over 385,000 compromised systems.","The coordinated action also targeted SocGholish, a malware loader that infects visitors through compromised websites serving fake browser update prompts.","Amadey is used to gain an initial foothold on victim devices and deploy additional malware, while StealC is used to steal credentials, cryptocurrency wallets, and other sensitive information.","Microsoft said Amadey and StealC were linked to more than 140,000 infected devices during the first two weeks of May 2026 alone."],"insights":["The operation targeted multiple parts of the cybercrime supply chain at once, including tools used for initial access, credential theft, ransomware enablement, and financial fraud.","Stolen credentials from StealC are not only used by the original operators but are also sold through underground marketplaces and initial-access brokers, allowing other threat actors to reuse them for later intrusions.","The article notes that infrastructure takedowns can be temporary when arrests are not made, because threat actors commonly rebuild and resume attacks after disruptions.","The scale of infections in a short period was significant, with Microsoft linking Amadey and StealC to more than 140,000 infected devices
