<style>

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Shai-Hulud Campaign Evolution: Miasma, Hades, and AI Scanner Evasion","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/shai-hulud-campaign-evolution-miasma-hades-and-ai-scanner-evasion","time":"21:14","priority":"MUST READ","score":94,"tldr":"Shai-Hulud has evolved from npm maintainer compromise into a broader software supply chain threat spanning PyPI, CI/CD abuse, valid SLSA/OIDC-backed malicious publishing, IDE configuration execution, and prompt injection to fool AI security scanners. The key takeaway is that provenance and automated scanning cannot be treated as proof of safety when the trusted build environment or scanner context itself can be compromised.","briefOverview":"\u003cp\u003eSince Zscaler ThreatLabz published its analysis of Shai-Hulud V2 in November 2025, the campaign has continued to evolve across multiple parts of the software supply chain. The activity expanded from npm into PyPI, moved from maintainer-focused compromise to CI/CD abuse, extended execution into IDE configuration files, and introduced prompt injection intended to evade AI-based security scanners. ThreatLabz assesses with high confidence that earlier waves are linked to TeamPCP, tracked by Mandiant as UNC6780, but attribution after May 12, 2026 is less certain because the worm source code was publicly released under an MIT license.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several major waves, including Miasma in March 2026, Hades in May 2026, Red Hat-related activity on June 1–2, an IDE-focused wave on June 5, and Hades PyPI activity on June 8. Miasma abused a compromised Trivy vulnerability scanner and introduced Python .pth-based persistence, while Hades abused a GitHub Actions pull_request_target misconfiguration to scrape OIDC tokens and publish malicious packages with valid SLSA provenance. Later activity used OIDC trusted publishing after a Red Hat engineer account compromise, targeted IDE and AI-agent configuration files, and embedded prompt injection in PyPI package content to mislead LLM-based scanners.\u003c/p\u003e\n\n\u003cp\u003eThe core significance is that the campaign undermined trust mechanisms without necessarily breaking their cryptographic guarantees. Valid SLSA/Sigstore provenance could accompany malicious packages when the trusted CI environment or publishing identity was abused. The article recommends strict lockfile use, private registry proxies, least-privilege short-lived credentials, phishing-resistant MFA, CI/CD hardening, monitoring for unexpected .pth and workflow files, treating IDE configuration as executable code, and isolating LLM scanner system prompts from untrusted package content.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz describes the continued evolution of the Shai-Hulud campaign after its November 2025 analysis of Shai-Hulud V2. The campaign expanded beyond npm into PyPI, shifted from direct maintainer compromise to abuse of CI/CD systems, and began targeting IDE configuration files and AI-based security scanners. ThreatLabz links earlier waves with high confidence to TeamPCP, tracked by Mandiant as UNC6780, but says attribution after May 12, 2026 is less certain because the complete worm source code was released publicly under an MIT license.\u003c/p\u003e\n\n\u003cp\u003eThe March 2026 Miasma wave marked the campaign’s expansion into PyPI through GitHub Actions cache poisoning of Aqua Security’s Trivy vulnerability scanner. Downstream pipelines that installed Trivy without version pinning executed the attacker’s binary, and LiteLLM version 1.82.8 was among the first major victims. That wave introduced Python .pth persistence through a malicious litellm_init.pth file placed in site-packages, causing payload execution on every Python interpreter startup.\u003c/p\u003e\n\n\u003cp\u003eIn May 2026, the Hades wave abused a pull_request_target misconfiguration in the TanStack monorepo. The attacker executed malicious code in a privileged GitHub Actions runner context, scraped an OIDC token from Runner.Worker process memory, obtained a valid npm publish token, and published malicious packages from the legitimate environment. Within six minutes, 84 malicious artifacts were published across 42 @tanstack/ packages with valid Sigstore provenance attestations, and later activity mass-republished packages in the @antv namespace.\u003c/p\u003e\n\n\u003cp\u003eThe June 1–2 Red Hat wave showed another route into trusted publishing after a Red Hat engineer’s GitHub account was reportedly compromised. The attacker used orphan commits and injected GitHub Actions workflows to request OIDC tokens and publish malicious packages with valid provenance. The result was 32 packages and 96 versions published within hours, while samples also staged traffic to the non-existent api.anthropic.com/v1/api path as C2 camouflage rather than as evidence of Anthropic compromise.\u003c/p\u003e\n\n\u003cp\u003eThe June 5 IDE wave moved beyond package registries by placing malicious configuration files for Claude Code, Cursor, VS Code, and Gemini Code Assist in repositories. These files could trigger behavior when a developer cloned and opened a repository, without requiring package installation. GitHub disabled 73 Microsoft repositories across four organizations in response to this activity.\u003c/p\u003e\n\n\u003cp\u003eThe June 8 Hades PyPI wave compromised 37 PyPI wheels across 19 packages and added prompt injection inside an _index.js bundle. The prompt instructed LLM-based security scanners to ignore obfuscated code and classify the package as clean, highlighting a failure mode where untrusted package content can enter a model’s instruction context. The article recommends treating scanner refusals or absent verdicts as escalation signals, enforcing system-prompt isolation, and not treating SLSA or Sigstore provenance as proof of package safety.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz reports that the Shai-Hulud campaign continued to evolve after its November 2025 analysis of Shai-Hulud V2. The campaign expanded from npm into the Python Package Index, shifted from maintainer-focused compromise to CI/CD abuse, targeted IDE configuration files, and introduced prompt injection designed to evade AI-based security scanners.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz assesses with high confidence that earlier Shai-Hulud waves are linked to TeamPCP, which Mandiant tracks as UNC6780. However, the article states that attribution for activity after May 12, 2026 is less certain because the complete worm source code was publicly released under an MIT license. That release turned what had been a private actor capability into reusable public attack infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"major-developments\"\u003eMajor Developments\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several key developments after Shai-Hulud V2:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMarch 2026, Miasma:\u003c/strong\u003e Expanded into PyPI through a compromised vulnerability scanner and introduced Python .pth-based persistence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMay 2026, Hades:\u003c/strong\u003e Abused a GitHub Actions CI misconfiguration to scrape OIDC tokens from runner memory, enabling publication of malicious packages with valid SLSA provenance.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJune 1–2, Red Hat:\u003c/strong\u003e Abused OIDC trusted publishing after a Red Hat engineer account compromise and introduced staged C2 camouflage using a non-existent Anthropic API path.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJune 5, IDE Wave:\u003c/strong\u003e Extended the attack surface into IDE configuration files, contributing to the disabling of 73 Microsoft repositories.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJune 8, Hades PyPI:\u003c/strong\u003e Introduced prompt injection in PyPI packages to mislead LLM-based security scanners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"campaign-evolution-across-the-trust-stack\"\u003eCampaign Evolution Across the Trust Stack\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Shai-Hulud is notable for moving systematically through multiple layers of the software supply chain trust stack. Earlier waves focused on maintainer authentication and package install-time execution. Later waves moved into security tooling, provenance systems, OIDC-based publishing, developer tooling, and AI-assisted analysis.\u003c/p\u003e\n\n\u003cp\u003eThe campaign evolved from npm postinstall and preinstall hooks into Python .pth files, which execute whenever the Python interpreter starts. It also evolved from GitHub dead drops to more takedown-resistant command-and-control approaches, including Internet Computer Protocol canisters and Session Protocol.\u003c/p\u003e\n\n\u003ch2 id=\"march-2026-miasma-and-pypi-expansion\"\u003eMarch 2026: Miasma and PyPI Expansion\u003c/h2\u003e\n\n\u003cp\u003eThe Miasma wave marked the campaign’s first major expansion beyond npm into PyPI. Instead of directly targeting package maintainers, TeamPCP compromised Aqua Security’s Trivy vulnerability scanner through GitHub Actions cache poisoning.\u003c/p\u003e\n\n\u003cp\u003eTrivy is widely used in build pipelines for container and dependency scanning. The attackers exploited the absence of version pinning in downstream consumers, meaning that pipelines installing Trivy without a pinned version downloaded and executed the attacker’s binary.\u003c/p\u003e\n\n\u003cp\u003eLiteLLM, a Python library for calling LLM providers, was among the first major victims. LiteLLM version 1.82.8 was published with a 34KB malicious file named \u003ccode\u003elitellm_init.pth\u003c/code\u003e placed in Python’s \u003ccode\u003esite-packages\u003c/code\u003e directory.\u003c/p\u003e\n\n\u003ch2 id=\"pth-file-persistence\"\u003e.pth File Persistence\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights Python \u003ccode\u003e.pth\u003c/code\u003e files as a significant persistence advancement over npm install-time hooks. Python processes \u003ccode\u003e.pth\u003c/code\u003e files in \u003ccode\u003esite-packages\u003c/code\u003e during interpreter startup, so any process invoking Python can trigger the payload.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples such as web server startup, test suite execution, Jupyter notebook sessions, and scheduled cron jobs. Unlike npm \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e hooks, \u003ccode\u003e.pth\u003c/code\u003e persistence can survive package reinstallation and may persist across virtual environment recreation if the base \u003ccode\u003esite-packages\u003c/code\u003e directory is affected.\u003c/p\u003e\n\n\u003ch2 id=\"may-2026-hades-and-slsa-build-level-3-bypass\"\u003eMay 2026: Hades and SLSA Build Level 3 Bypass\u003c/h2\u003e\n\n\u003cp\u003eIn May 2026, TeamPCP exploited a \u003ccode\u003epull_request_target\u003c/code\u003e misconfiguration in the TanStack open-source monorepo. The article explains that \u003ccode\u003epull_request_target\u003c/code\u003e executes in the context of the base repository rather than a contributor’s fork, which can grant access to repository secrets.\u003c/p\u003e\n\n\u003cp\u003eThe reported attack chain involved a malicious contribution that triggered the privileged workflow. Malicious code executed inside the runner context and scraped an OIDC token from the \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory. That token was then presented to GitHub’s OIDC federation endpoint to generate a valid npm publish token.\u003c/p\u003e\n\n\u003cp\u003eThe attacker used the token to publish malicious packages from TanStack’s legitimate environment. The article stresses that no maintainer credentials needed to be stolen because the trusted environment itself became the access path.\u003c/p\u003e\n\n\u003ch2 id=\"valid-provenance-malicious-output\"\u003eValid Provenance, Malicious Output\u003c/h2\u003e\n\n\u003cp\u003eA key finding is that malicious artifacts can carry valid provenance when the trusted build process is abused. Within a six-minute window, 84 malicious artifacts were published across 42 \u003ccode\u003e@tanstack/\u003c/code\u003e packages.\u003c/p\u003e\n\n\u003cp\u003eThose artifacts carried valid Sigstore provenance attestations through \u003ccode\u003efulcio.sigstore.dev\u003c/code\u003e and were recorded in the Rekor transparency log. The attestations were cryptographically valid because the malicious build ran from inside the trusted system.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that days later, on May 19, the campaign mass-republished the \u003ccode\u003e@antv\u003c/code\u003e data visualization namespace. Snyk reported roughly 314 versions published within a single six-second window. Public reporting also linked the broader wave to compromises affecting AI-related infrastructure packages associated with Mistral AI, Guardrails AI, UiPath, and OpenSearch.\u003c/p\u003e\n\n\u003ch2 id=\"open-sourcing-of-the-toolkit\"\u003eOpen-Sourcing of the Toolkit\u003c/h2\u003e\n\n\u003cp\u003eOn May 12, 2026, TeamPCP published the complete worm source code to GitHub under an MIT license with the commit message, “Open Sourcing The Carnage.” The release reportedly included full propagation code, an OIDC token scraping module, operational documentation for customizing encryption keys and C2 infrastructure, and a $1,000 Monero prize announcement on BreachForums for the largest supply chain attack built from the codebase.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this changed the threat landscape and made attribution harder. Before publication, multiple waves could be linked more straightforwardly to the same operator. After publication, copycat actors could reuse the same code and tradecraft, making malware overlap or similar operations insufficient for confident attribution.\u003c/p\u003e\n\n\u003ch2 id=\"june-1-2-2026-red-hat-oidc-trusted-publishing-abuse\"\u003eJune 1–2, 2026: Red Hat OIDC Trusted Publishing Abuse\u003c/h2\u003e\n\n\u003cp\u003eThe June Red Hat wave showed a different path into trusted publishing. Public reporting cited in the article indicates that a Red Hat engineer’s GitHub account was compromised, though the initial takeover method has not been publicly disclosed.\u003c/p\u003e\n\n\u003cp\u003eWith access to the account, the attacker reportedly pushed orphan commits to internal Red Hat repositories, injected GitHub Actions workflows through those orphan commits, allowed the workflows to request OIDC tokens through normal trusted publishing flows, and published malicious packages with valid provenance generated by authorized infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe result was 32 packages and 96 versions published within hours. As with the TanStack wave, the trust chain remained cryptographically valid while the identity and execution context at its root had been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"c2-camouflage-in-the-red-hat-wave\"\u003eC2 Camouflage in the Red Hat Wave\u003c/h2\u003e\n\n\u003cp\u003eSamples from the June Red Hat wave introduced a network-layer evasion technique. They staged a C2 channel to route traffic to \u003ccode\u003eapi.anthropic.com/v1/api\u003c/code\u003e, a non-existent endpoint at Anthropic’s domain.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this was camouflage rather than the primary exfiltration channel. The campaign family has repeatedly used GitHub-based dead drops, including repositories and commit-based signaling. The staged Anthropic path appeared intended to blend suspicious outbound requests into legitimate-looking AI API traffic, and Anthropic’s infrastructure was not compromised.\u003c/p\u003e\n\n\u003ch2 id=\"june-5-2026-ide-configuration-file-targeting\"\u003eJune 5, 2026: IDE Configuration File Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe June 5 IDE wave moved beyond package registries. In the \u003ccode\u003eAzure/durabletask\u003c/code\u003e wave, the attacker used developer tooling configuration files that could trigger code or instructions when a repository was opened in a supported editor or assistant environment.\u003c/p\u003e\n\n\u003cp\u003eA compromised contributor account pushed files targeting four major AI-assisted development environments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.claude/settings.json\u003c/code\u003e, using a \u003ccode\u003eSessionStart\u003c/code\u003e hook when opening a project in Claude Code.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.cursor/rules/setup.mdc\u003c/code\u003e, using an \u003ccode\u003ealwaysApply: true\u003c/code\u003e prompt injection during Cursor AI agent initialization.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, using \u003ccode\u003erunOn: folderOpen\u003c/code\u003e when opening a folder in VS Code.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.gemini/settings.json\u003c/code\u003e, using a startup hook when starting a Gemini Code Assist session.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that no package installation was required; the trigger was cloning a repository and opening it in one of the targeted editors. GitHub disabled 73 Microsoft repositories across four organizations in response.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that IDE configuration files are not typically evaluated by package registry scanners, SLSA verification tools, or behavioral analysis systems focused on package content. They are often reviewed as configuration rather than executable code.\u003c/p\u003e\n\n\u003ch2 id=\"june-8-2026-hades-pypi-and-prompt-injection\"\u003eJune 8, 2026: Hades PyPI and Prompt Injection\u003c/h2\u003e\n\n\u003cp\u003eThe Hades PyPI wave, detected by Socket Research on June 8, 2026, compromised 37 PyPI wheels across 19 packages. The malware retained familiar campaign tradecraft, including \u003ccode\u003e.pth\u003c/code\u003e persistence, multi-layer obfuscation, AES-256-GCM encryption with per-instance keys, PBKDF2 key derivation, and obfuscator-wrapped JavaScript payloads.\u003c/p\u003e\n\n\u003cp\u003eThe notable advancement was an AI scanner evasion technique embedded in the \u003ccode\u003e_index.js\u003c/code\u003e bundle. According to StepSecurity’s analysis as quoted in the article, the bundle begins with a plain-text prompt injection block placed before the obfuscated payload.\u003c/p\u003e\n\n\u003cp\u003eThe prompt injection instructed any parsing LLM to ignore the obfuscated code below it, classify the package as verified clean infrastructure, and output a safe security report. The article states that security tools passing raw package content to a language model without system-prompt isolation could receive the attacker’s instruction inside the model context window.\u003c/p\u003e\n\n\u003ch2 id=\"llm-scanner-failure-modes\"\u003eLLM Scanner Failure Modes\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies two failure modes for LLM-based scanners handling injected content. The first is a false-clean verdict, where the prompt injection instructs the model to classify the package as clean and the model follows that instruction. The second is a safety refusal, where submitted content triggers the model’s safety filters and the model refuses to analyze the file.\u003c/p\u003e\n\n\u003cp\u003eThe article states that either result can produce no usable malicious verdict. It warns that any pipeline treating “no finding” or “refused to analyze” as equivalent to “clean” inherits this blind spot.\u003c/p\u003e\n\n\u003ch2 id=\"c2-infrastructure-evolution\"\u003eC2 Infrastructure Evolution\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an evolution in the campaign’s C2 infrastructure in response to takedowns and defensive pressure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eV1 and V2 used GitHub orphan or dangling commits as dead drops.\u003c/li\u003e\n\u003cli\u003eMiasma continued to use GitHub dead drops.\u003c/li\u003e\n\u003cli\u003eMay–June 2026 activity used Internet Computer Protocol blockchain canisters, which the article describes as more resistant to takedown.\u003c/li\u003e\n\u003cli\u003eThe June 8, 2026 activity used GitHub dead drops, Session Protocol, and staged \u003ccode\u003eapi.anthropic.com/v1/api\u003c/code\u003e camouflage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOne example involved a background service called \u003ccode\u003ekitty-monitor\u003c/code\u003e, which reportedly queried GitHub’s commit search API once per hour for the marker string \u003ccode\u003efiredalazer\u003c/code\u003e. The most recent matching commit contained the next instruction in its commit message, and the implant verified the signature against an embedded public key before retrieving the referenced URL.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this design allowed tasking to live inside ordinary public GitHub activity and prevented defenders from trivially spoofing commands unless they could forge the embedded signature.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-indicators-of-compromise\"\u003eDisclosed Indicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several file and directory indicators, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esetup_bun.js\u003c/code\u003e, described as a malicious dropper script from V2.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebun_environment.js\u003c/code\u003e, described as an obfuscated payload from V2.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/workflows/discussion.yaml\u003c/code\u003e, described as a backdoor workflow from V2.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elitellm_init.pth\u003c/code\u003e, described as a 34KB \u003ccode\u003e.pth\u003c/code\u003e persistence file from the Miasma wave.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-setup.pth\u003c/code\u003e, described as a \u003ccode\u003e.pth\u003c/code\u003e persistence file with leading-hyphen naming from the Hades PyPI wave.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_index.js\u003c/code\u003e, described as an obfuscated payload bundle with a prompt injection header from Hades PyPI.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eupdater.py\u003c/code\u003e, described as a GitHub dead-drop C2 polling loop.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.claude/settings.json\u003c/code\u003e, \u003ccode\u003e.cursor/rules/setup.mdc\u003c/code\u003e, \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, and \u003ccode\u003e.gemini/settings.json\u003c/code\u003e, described as IDE wave configuration files.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists SHA256 hashes for \u003ccode\u003e_index.js\u003c/code\u003e variants and \u003ccode\u003e-setup.pth\u003c/code\u003e, and network indicators including \u003ccode\u003emodels.litellm.cloud\u003c/code\u003e, \u003ccode\u003ehxxps://api.anthropic.com/v1/api\u003c/code\u003e, and the string \u003ccode\u003eoven-sh/bun/releases/download\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends several defensive actions, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApply lockfiles strictly and use \u003ccode\u003enpm ci\u003c/code\u003e instead of \u003ccode\u003enpm install\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUse private registry proxies and Software Composition Analysis tools to filter and monitor third-party packages.\u003c/li\u003e\n\u003cli\u003eRestrict open-source package consumption on corporate devices and CI systems to enterprise-controlled package managers.\u003c/li\u003e\n\u003cli\u003eAudit and remove unused packages to reduce dependency surface.\u003c/li\u003e\n\u003cli\u003eApply least privilege with scoped, short-lived keys and tokens.\u003c/li\u003e\n\u003cli\u003eEnable phishing-resistant MFA such as FIDO2 and WebAuthn on npm, PyPI, GitHub, and cloud platforms.\u003c/li\u003e\n\u003cli\u003eRevoke and rotate npm tokens, GitHub PATs, cloud keys, and CI/CD secrets on suspected exposure.\u003c/li\u003e\n\u003cli\u003eRestrict build environments to internal mirrors and limit outbound network access.\u003c/li\u003e\n\u003cli\u003ePin CI/CD tool versions, including scanners, formatters, and runtimes.\u003c/li\u003e\n\u003cli\u003eAudit \u003ccode\u003epull_request_target\u003c/code\u003e usage in GitHub Actions workflows.\u003c/li\u003e\n\u003cli\u003eMonitor repositories with publish permissions for orphan commits and unexpected workflow files.\u003c/li\u003e\n\u003cli\u003eMonitor Python \u003ccode\u003esite-packages\u003c/code\u003e for unexpected \u003ccode\u003e.pth\u003c/code\u003e files, especially unusual names such as leading-hyphen or non-package names.\u003c/li\u003e\n\u003cli\u003eTreat IDE and AI-agent configuration files as executable code.\u003c/li\u003e\n\u003cli\u003eDo not treat SLSA or Sigstore provenance as proof of safety.\u003c/li\u003e\n\u003cli\u003eEnforce system-prompt isolation in LLM-based scanning pipelines.\u003c/li\u003e\n\u003cli\u003eTreat absence of a scanner verdict, including a safety refusal, as an escalation signal rather than a pass.\u003c/li\u003e\n\u003cli\u003eEnforce a release cooldown period to prevent users from immediately checking out newly released packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central conclusion is that Shai-Hulud is significant not only because it repeatedly compromised software packages, but because it moved through the software supply chain trust model itself. The campaign abused maintainer authentication, package installation mechanisms, security tooling, provenance, OIDC trusted publishing, IDE behavior, and AI-assisted security analysis.\u003c/p\u003e\n\n\u003cp\u003eThe May 12 public release of the worm source code made these techniques more broadly reusable. The article concludes that organizations should assume the techniques are already circulating beyond the original campaign and harden defenses accordingly.\u003c/p\u003e\n","keyPoints":["Since November 2025, the Shai-Hulud campaign expanded beyond npm into PyPI, shifted from maintainer-focused compromise to CI/CD abuse, extended execution into IDE configuration files, and introduced prompt injection to evade AI-based security scanners.","ThreatLabz assesses with high confidence that earlier Shai-Hulud waves are linked to TeamPCP, tracked by Mandiant as UNC6780, but attribution after the May 12, 2026 public release of the worm source code is less certain.","The March 2026 Miasma wave compromised Aqua Security's Trivy vulnerability scanner through GitHub Actions cache poisoning and used Python .pth files for persistence that executes at interpreter startup.","The May 2026 Hades wave exploited a pull_request_target misconfiguration in the TanStack monorepo to scrape OIDC tokens from GitHub Actions runner memory and publish malicious npm packages with valid SLSA provenance attestations.","The June 8, 2026 Hades PyPI wave embedded prompt injection in an _index.js bundle to instruct LLM-based security scanners to classify the package as clean or otherwise avoid producing a usable malicious verdict."],"insights":["Valid SLSA/Sigstore provenance did not indicate package safety in the Hades and Red Hat waves because malicious artifacts were produced from compromised or abused trusted publishing environments.","Python .pth files are especially dangerous persistence points because they execute on every interpreter startup and can survive package reinstallation, making them more durable than npm install-time hooks.","IDE and AI-agent configuration files such as .claude/settings.json, .cursor/rules/setup.mdc, .vscode/tasks.json, and .gemini/settings.json should be reviewed like executable code because opening a cloned repository can trigger malicious behavior without package installation.","LLM-based scanners can fail silently if package content is allowed to enter the model’s instruction context, so refusals or absent verdicts should be escalated rather than treated as clean results.","The May 12, 2026 MIT-licensed release of the worm source code made malware overlap less reliable for attribution because copycat actors can reuse the same Shai-Hulud techniques and tooling."],"referencedReports":[],"body":"\u003cp\u003eSince Zscaler ThreatLabz published its analysis of Shai-Hulud V2 in November 2025, the campaign has continued to evolve across multiple parts of the software supply chain. The activity expanded from npm into PyPI, moved from maintainer-focused compromise to CI/CD abuse, extended execution into IDE configuration files, and introduced prompt injection intended to evade AI-based security scanners. ThreatLabz assesses with high confidence that earlier waves are linked to TeamPCP, tracked by Mandiant as UNC6780, but attribution after May 12, 2026 is less certain because the worm source code was publicly released under an MIT license.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several major waves, including Miasma in March 2026, Hades in May 2026, Red Hat-related activity on June 1–2, an IDE-focused wave on June 5, and Hades PyPI activity on June 8. Miasma abused a compromised Trivy vulnerability scanner and introduced Python .pth-based persistence, while Hades abused a GitHub Actions pull_request_target misconfiguration to scrape OIDC tokens and publish malicious packages with valid SLSA provenance. Later activity used OIDC trusted publishing after a Red Hat engineer account compromise, targeted IDE and AI-agent configuration files, and embedded prompt injection in PyPI package content to mislead LLM-based scanners.\u003c/p\u003e\n\n\u003cp\u003eThe core significance is that the campaign undermined trust mechanisms without necessarily breaking their cryptographic guarantees. Valid SLSA/Sigstore provenance could accompany malicious packages when the trusted CI environment or publishing identity was abused. The article recommends strict lockfile use, private registry proxies, least-privilege short-lived credentials, phishing-resistant MFA, CI/CD hardening, monitoring for unexpected .pth and workflow files, treating IDE configuration as executable code, and isolating LLM scanner system prompts from untrusted package content.\u003c/p\u003e\n"},{"n":2,"title":"Why Use App-Level Auth When Every Database Has Auth? (Splunk Enterprise CVE-2026-20253 Pre-Auth RCE)","source":"labs.watchtowr.com","sourceColorIdx":8,"link":"https://labs.watchtowr.com/why-use-app-level-auth-when-every-database-has-auth-splunk-enterprise-cve-2026-20253-pre-auth-rce/","time":"20:35","priority":"MUST READ","score":94,"tldr":"Splunk Enterprise’s PostgreSQL Sidecar Service flaw CVE-2026-20253 can be reached pre-auth through Splunk’s web proxy and abused from arbitrary file creation into full remote code execution, especially on AWS deployments where the service is enabled by default. Organizations should patch affected Splunk 10+ instances and restrict or disable the vulnerable sidecar endpoints immediately.","briefOverview":"\u003cp\u003eSplunk published an advisory for CVE-2026-20253 on June 10, describing a vulnerability in the PostgreSQL Sidecar Service Endpoint affecting Splunk Enterprise versions 10 and above. The article analyzes the issue and concludes that Splunk Enterprise on AWS is vulnerable out of the box because the PostgreSQL Sidecar Service is installed and enabled by default. The vulnerability requires no authentication and carries a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eThe researchers found that the PostgreSQL Sidecar Service listened locally, but Splunk’s main web application could proxy requests to it through the \u003ccode\u003e/en-US/splunkd/__raw/\u003c/code\u003e path. The backup endpoint accepted arbitrary credentials and allowed file creation or truncation through the \u003ccode\u003ebackupFile\u003c/code\u003e parameter. By chaining PostgreSQL connection-string behavior, the backup and restore endpoints, and Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file, the researchers escalated the primitive into controlled arbitrary file write and then remote code execution as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a technical analysis of Splunk Enterprise CVE-2026-20253, which Splunk disclosed in an advisory on June 10. The advisory describes a vulnerability in the PostgreSQL Sidecar Service Endpoint, affecting Splunk Enterprise versions 10 and above. The researchers note that the issue has no authentication requirement and a CVSS score of 9.8, prompting them to investigate whether it could lead to remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe researchers found that deployment behavior varies by Splunk environment. They state that Splunk Enterprise on AWS has the PostgreSQL Sidecar Service installed and enabled by default, making it vulnerable out of the box. They also state that on-premise Windows installations differ, with the sidecar service either not installed by default or installed but not enabled by default.\u003c/p\u003e\n\n\u003cp\u003eThe affected service was identified as \u003ccode\u003esplunk-postgres\u003c/code\u003e, located under Splunk’s sidecar service directory and listening on localhost ports including 5435. Although the service was bound to 127.0.0.1, the researchers found that Splunk’s main web application could proxy requests to the local PostgreSQL API through \u003ccode\u003e/en-US/splunkd/__raw/v1/postgres/recovery/backup\u003c/code\u003e. They demonstrated that the endpoint accepted an empty Basic Authentication credential value and returned a successful response.\u003c/p\u003e\n\n\u003cp\u003eThe initial impact was arbitrary file creation and truncation through the \u003ccode\u003ebackupFile\u003c/code\u003e parameter. The researchers showed that a file could be created in the service directory and then used path traversal to create a file under \u003ccode\u003e/tmp\u003c/code\u003e. They then analyzed the backup behavior and found that Splunk passed user-controlled values into \u003ccode\u003epg_dump\u003c/code\u003e, including the Basic Authentication username and the database parameter.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation chain relied on PostgreSQL behavior where the database name can be interpreted as a connection string that overrides conflicting command-line options. This allowed the researchers to force Splunk to connect to an attacker-controlled PostgreSQL server, dump attacker-controlled database content to the Splunk filesystem, and then use the restore endpoint with Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file to authenticate to the local PostgreSQL instance. They ultimately used a malicious database restore to execute a function that wrote attacker-controlled file contents, then overwrote a Splunk Python script to achieve code execution as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a technical analysis of Splunk Enterprise CVE-2026-20253, which Splunk published in an advisory on June 10. The vulnerability is described as affecting the PostgreSQL Sidecar Service Endpoint in Splunk Enterprise versions 10 and above. The article emphasizes that the issue has no authentication requirement and a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eThe researchers set out to determine whether the vulnerability was exploitable by default and whether it could lead to remote code execution. They concluded that Splunk Enterprise on AWS is vulnerable out of the box because the PostgreSQL Sidecar Service is installed and enabled by default. They also note that the sidecar service behavior differs for manually installed on-premise Windows deployments.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product-and-deployment-context\"\u003eAffected Product and Deployment Context\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Splunk Enterprise, specifically versions 10 and above according to the article’s reading of the advisory. The vulnerable component is the PostgreSQL Sidecar Service Endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the following deployment differences:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk Enterprise on AWS has the PostgreSQL Sidecar Service installed and enabled by default.\u003c/li\u003e\n\u003cli\u003eOne on-premise Windows installation scenario does not install the PostgreSQL Sidecar Service by default.\u003c/li\u003e\n\u003cli\u003eAnother on-premise Windows installation scenario installs the PostgreSQL Sidecar Service but does not enable it by default.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researchers state that the concept of a sidecar appears to have been introduced in Splunk version 10, which aligns with the affected version range from the advisory.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-of-the-vulnerable-service\"\u003eDiscovery of the Vulnerable Service\u003c/h2\u003e\n\n\u003cp\u003eThe researchers located sidecar services under \u003ccode\u003e/opt/splunk/var/run/supervisor/pkg-run/\u003c/code\u003e and focused on the service with \u003ccode\u003epostgres\u003c/code\u003e in its name. They confirmed that a \u003ccode\u003esplunk-postgres\u003c/code\u003e binary was listening locally on ports including \u003ccode\u003e127.0.0.1:5435\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAlthough the service was only bound to the loopback interface, the researchers suspected that it might still be reachable through another Splunk component. They searched the binary and documentation for PostgreSQL sidecar API routes and identified endpoints under \u003ccode\u003e/v1/postgres/\u003c/code\u003e, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/telemetry\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/health\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/recovery/status/{id}\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/status\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"web-proxy-access-to-the-local-service\"\u003eWeb Proxy Access to the Local Service\u003c/h2\u003e\n\n\u003cp\u003eThe researchers found that Splunk’s main web application could proxy requests to the local PostgreSQL Sidecar Service API. They used a request to \u003ccode\u003e/en-US/splunkd/__raw/v1/postgres/recovery/backup\u003c/code\u003e through the main Splunk web interface.\u003c/p\u003e\n\n\u003cp\u003eThe request included a Basic Authentication header with empty credentials and a JSON body specifying a database and backup file. The endpoint returned a successful response indicating that a backup job had entered a \u003ccode\u003eBackupPending\u003c/code\u003e state.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the vulnerability exists because the PostgreSQL sidecar service endpoint lacks authentication controls, allowing a network-reachable user to invoke file operations without valid credentials.\u003c/p\u003e\n\n\u003ch2 id=\"initial-file-creation-and-truncation-primitive\"\u003eInitial File Creation and Truncation Primitive\u003c/h2\u003e\n\n\u003cp\u003eThe advisory described arbitrary file creation and truncation, and the researchers reproduced that behavior. By submitting a \u003ccode\u003ebackupFile\u003c/code\u003e value, they caused Splunk to create a file in the PostgreSQL sidecar service directory.\u003c/p\u003e\n\n\u003cp\u003eThey then used path traversal in the \u003ccode\u003ebackupFile\u003c/code\u003e value to create a file outside the service directory, including under \u003ccode\u003e/tmp\u003c/code\u003e. At this stage, the researchers summarized their capability as being able to create an empty file at any location and clear the contents of existing files through overwrite or truncation.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that this primitive alone did not appear to fully explain the 9.8 CVSS score, leading the researchers to investigate further.\u003c/p\u003e\n\n\u003ch2 id=\"use-of-pg-dump-and-user-controlled-arguments\"\u003eUse of \u003ccode\u003epg_dump\u003c/code\u003e and User-Controlled Arguments\u003c/h2\u003e\n\n\u003cp\u003eThe researchers analyzed the sidecar service’s backup behavior and identified that the backup endpoint ultimately invoked \u003ccode\u003epg_dump\u003c/code\u003e. The command construction included several important arguments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e-h localhost\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-p\u003c/code\u003e with the local PostgreSQL port\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-w\u003c/code\u003e to prevent password prompts\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-U\u003c/code\u003e using the username supplied through Basic Authentication\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-f\u003c/code\u003e using the attacker-controlled \u003ccode\u003ebackupFile\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003ethe database name using the attacker-controlled \u003ccode\u003edatabase\u003c/code\u003e parameter\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis explained why arbitrary Basic Authentication usernames were accepted by the Splunk-side endpoint: Splunk forwarded the supplied username to PostgreSQL and relied on PostgreSQL to decide whether authentication should succeed.\u003c/p\u003e\n\n\u003cp\u003eBecause the researchers could not initially authenticate to the local database, \u003ccode\u003epg_dump\u003c/code\u003e did not produce useful dump content and the files remained empty.\u003c/p\u003e\n\n\u003ch2 id=\"postgresql-connection-string-behavior\"\u003ePostgreSQL Connection String Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe researchers then relied on documented PostgreSQL behavior where the \u003ccode\u003edbname\u003c/code\u003e value can be a connection string. The article quotes PostgreSQL documentation stating that connection string parameters can override conflicting command-line options.\u003c/p\u003e\n\n\u003cp\u003eBecause the sidecar service passed the user-controlled \u003ccode\u003edatabase\u003c/code\u003e value to \u003ccode\u003epg_dump\u003c/code\u003e, the researchers supplied connection-string parameters such as \u003ccode\u003ehostaddr\u003c/code\u003e. This overrode the hardcoded localhost connection and caused Splunk to connect to an attacker-controlled PostgreSQL server.\u003c/p\u003e\n\n\u003cp\u003eThey then configured an attacker-controlled PostgreSQL database and used the backup endpoint to make Splunk dump that external database to a file on the Splunk filesystem. This gave them the ability to write database dump content, rather than only empty files, to the target system.\u003c/p\u003e\n\n\u003ch2 id=\"restore-endpoint-and-local-database-access\"\u003eRestore Endpoint and Local Database Access\u003c/h2\u003e\n\n\u003cp\u003eThe article then turns to the \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e endpoint, which follows a similar structure to the backup endpoint but invokes \u003ccode\u003epg_restore\u003c/code\u003e. The restore command also included user-controlled values, including the Basic Authentication username, the database argument, and the backup file path.\u003c/p\u003e\n\n\u003cp\u003eThe researchers’ plan was to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eForce Splunk to dump an attacker-controlled database into an arbitrary file.\u003c/li\u003e\n\u003cli\u003eForce Splunk to restore that dump through \u003ccode\u003epg_restore\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eCause SQL contained in the attacker-controlled dump to execute in Splunk’s local PostgreSQL instance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eA key obstacle was authentication to the local PostgreSQL instance. The researchers found that Splunk had a \u003ccode\u003e.pgpass\u003c/code\u003e file at \u003ccode\u003e/opt/splunk/var/packages/data/postgres/.pgpass\u003c/code\u003e, which contained credentials for the \u003ccode\u003epostgres_admin\u003c/code\u003e user. They then used the PostgreSQL \u003ccode\u003epassfile\u003c/code\u003e connection-string parameter to point \u003ccode\u003epg_restore\u003c/code\u003e at that file and authenticate successfully.\u003c/p\u003e\n\n\u003ch2 id=\"controlled-arbitrary-file-write\"\u003eControlled Arbitrary File Write\u003c/h2\u003e\n\n\u003cp\u003eAfter gaining the ability to restore attacker-controlled SQL into the local PostgreSQL instance, the researchers created a database dump that would produce a controlled file write. The article shows a template using a PostgreSQL function that calls \u003ccode\u003elo_from_bytea\u003c/code\u003e and \u003ccode\u003elo_export\u003c/code\u003e to write attacker-controlled content to an attacker-chosen file path.\u003c/p\u003e\n\n\u003cp\u003eThe function was designed to execute during the restore process by being referenced in a table check constraint and triggered during data insertion. This allowed the researchers to write controlled content to the filesystem as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n\n\u003cp\u003eThey demonstrated the result by writing the string \u003ccode\u003epwned\u003c/code\u003e to \u003ccode\u003e/tmp/pwn\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"remote-code-execution\"\u003eRemote Code Execution\u003c/h2\u003e\n\n\u003cp\u003eWith controlled arbitrary file write achieved, the researchers moved to remote code execution. They observed that Splunk frequently executed the Python script \u003ccode\u003e/opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThey overwrote that script with a Python payload that executed an operating system command to write the output of \u003ccode\u003eid\u003c/code\u003e into Splunk’s web-accessible directory. After the script was executed, the output file appeared in the Splunk webroot.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as achieving remote code execution as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n\n\u003ch2 id=\"detection-artifact\"\u003eDetection Artifact\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by sharing a Detection Artefact Generator hosted in a GitHub repository. The authors state that the tool is neutered and only determines whether access to \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e is blocked.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the detector reports vulnerability when the endpoint does not block access while any credentials are provided in the Authorization header, and reports non-vulnerability when the endpoint returns a 401 status code.\u003c/p\u003e\n","keyPoints":["Splunk disclosed CVE-2026-20253 on June 10 as a vulnerability in the PostgreSQL Sidecar Service Endpoint affecting Splunk Enterprise versions 10 and above.","The article states that Splunk Enterprise on AWS has the PostgreSQL Sidecar Service installed and enabled by default, making it vulnerable out of the box.","The researchers found that Splunk’s main web application could proxy unauthenticated requests to the localhost PostgreSQL Sidecar Service API via paths such as /en-US/splunkd/__raw/v1/postgres/recovery/backup.","The backup endpoint allowed creation or truncation of files through the backupFile parameter, including paths outside the service directory using path traversal.","The researchers chained the backup and restore endpoints with PostgreSQL connection-string behavior and Splunk’s .pgpass file to achieve controlled arbitrary file write and then remote code execution as the splunk user."],"insights":["The PostgreSQL Sidecar Service listened only on 127.0.0.1, but Splunk’s externally reachable web application exposed it through the /splunkd/__raw/ proxy path, making the localhost-only binding ineffective.","The sidecar API accepted arbitrary Basic Authentication usernames because Splunk passed the supplied username directly to pg_dump or pg_restore and relied on PostgreSQL to enforce authentication.","PostgreSQL’s documented behavior allowing a dbname value to be a connection string let the researchers override Splunk’s hardcoded localhost database target and force Splunk to connect to an attacker-controlled PostgreSQL server.","Splunk’s local .pgpass file contained usable PostgreSQL credentials and could be referenced through the passfile connection-string parameter, enabling authenticated restore operations against the local PostgreSQL instance.","The researchers converted an initial empty-file creation and truncation primitive into controlled arbitrary file write by restoring a malicious PostgreSQL dump that executed lo_export during the restore process."],"referencedReports":[{"title":"CVE-2026-20253 advisory","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article cites Splunk's June 10 advisory as the source identifying CVE-2026-20253 in the PostgreSQL Sidecar Service Endpoint and uses it as the basis for the vulnerability analysis.","category":"","primary":false}],"body":"\u003cp\u003eSplunk published an advisory for CVE-2026-20253 on June 10, describing a vulnerability in the PostgreSQL Sidecar Service Endpoint affecting Splunk Enterprise versions 10 and above. The article analyzes the issue and concludes that Splunk Enterprise on AWS is vulnerable out of the box because the PostgreSQL Sidecar Service is installed and enabled by default. The vulnerability requires no authentication and carries a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eThe researchers found that the PostgreSQL Sidecar Service listened locally, but Splunk’s main web application could proxy requests to it through the \u003ccode\u003e/en-US/splunkd/__raw/\u003c/code\u003e path. The backup endpoint accepted arbitrary credentials and allowed file creation or truncation through the \u003ccode\u003ebackupFile\u003c/code\u003e parameter. By chaining PostgreSQL connection-string behavior, the backup and restore endpoints, and Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file, the researchers escalated the primitive into controlled arbitrary file write and then remote code execution as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n"},{"n":7,"title":"Over 400 Arch Linux AUR Packages Hijacked to Deploy Infostealer and eBPF Rootkit","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/over-400-arch-linux-aur-packages.html","time":"19:33","priority":"MUST READ","score":94,"tldr":"More than 400 Arch Linux AUR packages were hijacked via malicious build scripts that installed a Rust credential stealer, with optional eBPF rootkit capabilities when run as root. Anyone who installed or updated affected AUR packages since June 11 should treat the host and developer credentials as compromised, rotate secrets, and reinstall if the payload ran with root privileges.","briefOverview":"\u003cp\u003eAttackers took over more than 400 packages in the Arch User Repository and rewrote their build scripts to install a credential stealer on systems that built them. The official Arch repositories were not affected, and the article says there is no sign that Arch’s own systems were breached. The campaign targeted the AUR trust model by adopting abandoned packages and changing build instructions while preserving package names and histories.\u003c/p\u003e\n\n\u003cp\u003eThe first wave used \u003ccode\u003enpm install atomic-lockfile\u003c/code\u003e, where \u003ccode\u003eatomic-lockfile@1.4.2\u003c/code\u003e ran a bundled Linux ELF named \u003ccode\u003edeps\u003c/code\u003e through a preinstall hook. A second wave used \u003ccode\u003ebun install js-digest\u003c/code\u003e and delivered a different malicious ELF payload. The malware is described as a Rust credential stealer that can collect browser data, developer tokens, SSH keys, shell histories, Docker and Podman credentials, VPN profiles, and Electron app session data.\u003c/p\u003e\n\n\u003cp\u003eWhen run with root privileges and the required capability, the payload can load an optional eBPF rootkit that hides its processes, process names, and socket inodes from standard tools. The article advises users who installed or updated AUR packages on or after June 11 to check affected lists and local build artifacts, rotate exposed credentials if a flagged package ran, hunt for persistence, and reinstall from trusted media if the payload ran as root.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAttackers hijacked more than 400 Arch User Repository packages and modified their build recipes to execute malicious code during package builds. The article emphasizes that this was not a software exploit or zero-day, but an abuse of the AUR trust model. The compromised packages retained their names, histories, and apparent trust, while their PKGBUILD or \u003ccode\u003e.install\u003c/code\u003e scripts were changed.\u003c/p\u003e\n\n\u003cp\u003eSonatype, which named the campaign Atomic Arch, found that attackers targeted orphaned packages whose maintainers had abandoned them. The attackers adopted those packages and also spoofed git commit metadata so changes appeared to come from a long-standing maintainer. An Arch Linux Trusted User later confirmed that the spoofed maintainer account was not compromised.\u003c/p\u003e\n\n\u003cp\u003eIn the first wave, adopted packages were edited to run \u003ccode\u003enpm install atomic-lockfile\u003c/code\u003e during the build. The malicious npm package \u003ccode\u003eatomic-lockfile@1.4.2\u003c/code\u003e contained a preinstall hook that executed a bundled Linux ELF named \u003ccode\u003edeps\u003c/code\u003e. Confirmed examples reported to the Arch mailing list included the \u003ccode\u003ealvr\u003c/code\u003e and \u003ccode\u003epremake-git\u003c/code\u003e packages.\u003c/p\u003e\n\n\u003cp\u003eIndependent researcher Whanos reverse-engineered the \u003ccode\u003edeps\u003c/code\u003e payload and described it as a Rust credential stealer aimed at developer workstations and build systems. It collects data from Chromium-based browsers, Electron apps such as Slack, Discord, and Microsoft Teams, GitHub, npm, HashiCorp Vault, OpenAI/ChatGPT bearer material, SSH files, shell histories, Docker and Podman credentials, and VPN profiles. Stolen files are sent over HTTP to \u003ccode\u003etemp.sh\u003c/code\u003e, and command and control runs through a Tor onion service via a local loopback proxy.\u003c/p\u003e\n\n\u003cp\u003eThe payload installs persistence using systemd, either as a system service under \u003ccode\u003e/etc/systemd/system/\u003c/code\u003e after copying itself under \u003ccode\u003e/var/lib/\u003c/code\u003e, or as a per-user unit under \u003ccode\u003e~/.config/systemd/user/\u003c/code\u003e. If run as root with the right capability, it can load an optional eBPF rootkit that hides its processes, process names, and socket inodes, and kills attempts to attach a debugger. The article says this rootkit does not provide privilege escalation and only runs when the binary already has root.\u003c/p\u003e\n\n\u003cp\u003eArch maintainers are resetting malicious commits, banning accounts, and asking users to report suspect packages in the mailing-list thread. The article advises users who installed or updated AUR packages on or after June 11 to check known-bad lists and local build history for \u003ccode\u003eatomic-lockfile\u003c/code\u003e, \u003ccode\u003ejs-digest\u003c/code\u003e, and \u003ccode\u003esrc/hooks/deps\u003c/code\u003e. If a flagged package ran, users are told to treat the host as credential-compromised, rotate affected secrets, check for persistence and BPF maps, and reinstall from trusted media if the payload ran as root.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers took over more than 400 packages in the Arch User Repository (AUR) and rewrote their build scripts to install a credential stealer on machines that built them. The article states that the official Arch repositories were not affected and that there is no sign Arch’s own systems were breached.\u003c/p\u003e\n\n\u003cp\u003eThe attack focused on the AUR trust model rather than a software vulnerability. The compromised packages kept their familiar names and histories, but the build instructions changed to run malicious dependency installation commands.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-compromise-worked\"\u003eHow the Compromise Worked\u003c/h2\u003e\n\n\u003cp\u003eThe attackers adopted abandoned AUR packages whose maintainers had walked away. After adoption, they edited the packages’ \u003ccode\u003ePKGBUILD\u003c/code\u003e or \u003ccode\u003e.install\u003c/code\u003e scripts to pull malicious packages during the build process.\u003c/p\u003e\n\n\u003cp\u003eIn the first wave, the altered build scripts ran:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003enpm install atomic-lockfile\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe npm package \u003ccode\u003eatomic-lockfile@1.4.2\u003c/code\u003e contained a preinstall hook that executed a bundled Linux ELF named \u003ccode\u003edeps\u003c/code\u003e. The article says the malicious package was pulled alongside legitimate packages for cover.\u003c/p\u003e\n\n\u003cp\u003eThe attackers also spoofed git commit metadata so that malicious changes appeared to come from a long-standing maintainer. An Arch Linux Trusted User later confirmed that the referenced maintainer account was not compromised.\u003c/p\u003e\n\n\u003cp\u003eConfirmed examples reported to the Arch mailing list included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ealvr\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epremake-git\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"second-wave\"\u003eSecond Wave\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes a second wave that used:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ebun install js-digest\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis wave was pushed from a separate set of accounts that community trackers linked to the same npm publisher as \u003ccode\u003eatomic-lockfile\u003c/code\u003e. Its payload was a different ELF binary by hash, and the community also flagged it as malicious.\u003c/p\u003e\n\n\u003cp\u003eThe full scope of the second wave was still being counted at the time of the article. Early breakdowns listed a few dozen packages, while later grep-based searches of the AUR mirror returned much higher numbers that may include churn as commits were removed.\u003c/p\u003e\n\n\u003ch2 id=\"malware-capabilities\"\u003eMalware Capabilities\u003c/h2\u003e\n\n\u003cp\u003eIndependent researcher Whanos reverse-engineered the \u003ccode\u003edeps\u003c/code\u003e payload and described it as a Rust credential stealer aimed at developer workstations and build systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware collects:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCookies, tokens, and local storage from Chromium-based browsers such as Chrome, Edge, and Brave.\u003c/li\u003e\n\u003cli\u003eSession data from Electron apps including Slack, Discord, and Microsoft Teams.\u003c/li\u003e\n\u003cli\u003eGitHub, npm, HashiCorp Vault, and OpenAI/ChatGPT bearer material and account metadata.\u003c/li\u003e\n\u003cli\u003eSSH keys, \u003ccode\u003eknown_hosts\u003c/code\u003e, and shell histories.\u003c/li\u003e\n\u003cli\u003eDocker and Podman credentials.\u003c/li\u003e\n\u003cli\u003eVPN profiles.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says stolen files are sent over HTTP to \u003ccode\u003etemp.sh\u003c/code\u003e. Command and control runs through a Tor onion service via a local loopback proxy.\u003c/p\u003e\n\n\u003ch2 id=\"persistence\"\u003ePersistence\u003c/h2\u003e\n\n\u003cp\u003eThe malware installs persistence using systemd with \u003ccode\u003eRestart=always\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eWhen it runs with root privileges, it:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCopies itself under \u003ccode\u003e/var/lib/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eWrites a unit under \u003ccode\u003e/etc/systemd/system/\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhen it runs as a normal user, it:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUses the home directory.\u003c/li\u003e\n\u003cli\u003eCreates a per-user unit under \u003ccode\u003e~/.config/systemd/user/\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that removing the AUR package is not enough once the payload has executed, because the package manager can only remove files it knows about.\u003c/p\u003e\n\n\u003ch2 id=\"ebpf-rootkit-behavior\"\u003eeBPF Rootkit Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article says early write-ups overstated the eBPF rootkit. The eBPF component is optional and only loads when the binary already has root and the required capability.\u003c/p\u003e\n\n\u003cp\u003eIt is not used to gain privileges. When it activates, it hides the malware’s own:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProcesses.\u003c/li\u003e\n\u003cli\u003eProcess names.\u003c/li\u003e\n\u003cli\u003eSocket inodes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt uses pinned BPF maps named:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ehidden_pids\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehidden_names\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehidden_inodes\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware also kills attempts to attach a debugger. Because the eBPF rootkit can hide evidence after root execution, the article advises reinstalling from trusted media if the payload ran as root.\u003c/p\u003e\n\n\u003ch2 id=\"scope-and-tracking\"\u003eScope and Tracking\u003c/h2\u003e\n\n\u003cp\u003eSonatype’s first write-up counted more than 20 hijacked packages. Within a day, community trackers and the Arch \u003ccode\u003eaur-general\u003c/code\u003e thread had cataloged over 400 packages.\u003c/p\u003e\n\n\u003cp\u003eOne master list compiled by grepping the AUR git mirror put the number at around 408, while consolidated lists were climbing higher. The article says the affected package list is large, still growing, and not complete.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003eatomic-lockfile\u003c/code\u003e npm package itself showed only 134 weekly downloads on Socket before it was removed from the registry. The article therefore frames the main exposure as the AUR build path rather than direct npm installs.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommendations-in-the-article\"\u003eResponse and Recommendations in the Article\u003c/h2\u003e\n\n\u003cp\u003eArch maintainers are resetting malicious commits, banning accounts, and asking users to keep reporting suspect packages in the mailing-list thread.\u003c/p\u003e\n\n\u003cp\u003eThe article advises users who installed or updated AUR packages on or after June 11 to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck installed or updated AUR packages against community affected-package lists and detection scripts.\u003c/li\u003e\n\u003cli\u003eGrep recent build history and caches for \u003ccode\u003enpm install atomic-lockfile\u003c/code\u003e, \u003ccode\u003ebun install js-digest\u003c/code\u003e, and \u003ccode\u003esrc/hooks/deps\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eTreat the host as credential-compromised if a flagged package ran.\u003c/li\u003e\n\u003cli\u003eRotate browser sessions, SSH keys, GitHub and npm tokens, Slack, Teams and Discord sessions, Vault tokens, Docker and Podman credentials, and cloud keys.\u003c/li\u003e\n\u003cli\u003eCheck for unknown systemd services in both system and user unit locations.\u003c/li\u003e\n\u003cli\u003eLook for unexpected files under \u003ccode\u003e/var/lib/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInspect \u003ccode\u003e/sys/fs/bpf/\u003c/code\u003e for \u003ccode\u003ehidden_pids\u003c/code\u003e, \u003ccode\u003ehidden_names\u003c/code\u003e, and \u003ccode\u003ehidden_inodes\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReview outbound connections to Tor and upload services.\u003c/li\u003e\n\u003cli\u003eReinstall from trusted media if the package ran as root.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-and-tracking-names\"\u003eIndicators and Tracking Names\u003c/h2\u003e\n\n\u003cp\u003eThe main payload SHA-256 given in the article is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e6144d433f8a0316869877b5f834c801251bbb936e5f1577c5680878c7443c98b\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the full indicator set, including the onion C2 host, is in the ioctl.fail analysis.\u003c/p\u003e\n\n\u003cp\u003eSonatype tracks the campaign as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eSonatype-2026-003775\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that no CVE has been assigned.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article characterizes the incident as a scaled-up version of an adoption tactic previously used against an abandoned PDF-viewer package in 2018. It says the 2026 version is part of a broader run of supply-chain attacks that hijack orphaned projects to inherit trust rather than relying on typosquatting.\u003c/p\u003e\n\n\u003cp\u003eThe main lesson presented is that AUR users should treat recently adopted packages, or packages that suddenly add new install hooks after long dormancy, with the same suspicion as software from an unknown source. The article specifically recommends reading \u003ccode\u003ePKGBUILD\u003c/code\u003e files and \u003ccode\u003e.install\u003c/code\u003e hooks before building AUR packages.\u003c/p\u003e\n","keyPoints":["Attackers took over more than 400 Arch User Repository packages and modified their PKGBUILD or .install scripts to run malicious npm or bun install commands during builds.","The first wave used the npm package atomic-lockfile@1.4.2, whose preinstall hook executed a bundled Linux ELF named deps, while a second wave used bun install js-digest with a different malicious ELF payload.","The deps payload is a Rust credential stealer that collects browser data, developer tokens, SSH keys, shell histories, Docker and Podman credentials, VPN profiles, and session data from apps such as Slack, Discord, and Microsoft Teams.","When run with root privileges and the required capability, the malware can load an optional eBPF rootkit that hides its processes, process names, and socket inodes from standard tools.","The article advises users who installed or updated AUR packages on or after June 11 to check affected-package lists, rotate exposed credentials if a flagged package ran, hunt for persistence, and reinstall from trusted media if the payload ran as root."],"insights":["The compromise abused AUR’s maintainer adoption and build-script trust model rather than exploiting a software vulnerability, so packages could retain their familiar names and histories while silently changing only the build instructions.","The affected package lists are explicitly incomplete and still changing, making local checks for build artifacts such as “npm install atomic-lockfile,” “bun install js-digest,” and “src/hooks/deps” more actionable than relying only on published package names.","Removing a malicious AUR package is insufficient after execution because the payload installs persistence outside the package manager’s normal ownership scope and may have loaded an eBPF rootkit if run as root.","The eBPF component does not provide privilege escalation; it only activates when the malware already has root and the required capability, which changes the response priority from patching to credential rotation, persistence hunting, and reinstalling root-exposed hosts.","The malicious npm package had low direct npm download numbers, indicating the main exposure came from AUR build workflows that pulled the dependency during package installation rather than from ordinary npm users installing it directly."],"referencedReports":[{"title":"Atomic Arch npm Campaign Adds Malicious Dependency","url":"https://www.sonatype.com/blog/atomic-arch-npm-campaign-adds-malicious-dependency","publisher":"Sonatype","context":"The article cites Sonatype’s write-up as the source that named the campaign Atomic Arch and identified the abuse of orphaned AUR packages.","category":"","primary":false},{"title":"Preliminary Analysis of AUR Malware","url":"https://ioctl.fail/preliminary-analysis-of-aur-malware/","publisher":"Whanos / ioctl.fail","context":"The article cites Whanos’s reverse-engineering analysis for details on the Rust credential stealer, persistence behavior, eBPF rootkit behavior, and indicators.","category":"","primary":false}],"body":"\u003cp\u003eAttackers took over more than 400 packages in the Arch User Repository and rewrote their build scripts to install a credential stealer on systems that built them. The official Arch repositories were not affected, and the article says there is no sign that Arch’s own systems were breached. The campaign targeted the AUR trust model by adopting abandoned packages and changing build instructions while preserving package names and histories.\u003c/p\u003e\n\n\u003cp\u003eThe first wave used \u003ccode\u003enpm install atomic-lockfile\u003c/code\u003e, where \u003ccode\u003eatomic-lockfile@1.4.2\u003c/code\u003e ran a bundled Linux ELF named \u003ccode\u003edeps\u003c/code\u003e through a preinstall hook. A second wave used \u003ccode\u003ebun install js-digest\u003c/code\u003e and delivered a different malicious ELF payload. The malware is described as a Rust credential stealer that can collect browser data, developer tokens, SSH keys, shell histories, Docker and Podman credentials, VPN profiles, and Electron app session data.\u003c/p\u003e\n\n\u003cp\u003eWhen run with root privileges and the required capability, the payload can load an optional eBPF rootkit that hides its processes, process names, and socket inodes from standard tools. The article advises users who installed or updated AUR packages on or after June 11 to check affected lists and local build artifacts, rotate exposed credentials if a flagged package ran, hunt for persistence, and reinstall from trusted media if the payload ran as root.\u003c/p\u003e\n"},{"n":6,"title":"China-Linked Hackers Backdoored Linux Login Software to Hide for Nearly a Decade","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/china-linked-hackers-backdoored-linux.html","time":"18:17","priority":"MUST READ","score":92,"tldr":"China-linked Velvet Ant hid for nearly a decade by backdooring Linux PAM and OpenSSH login components, letting it steal credentials and maintain access even after normal cleanup steps. The key lesson is that defenders must verify the integrity of trusted infrastructure like login software, not just reset passwords or patch known CVEs.","briefOverview":"\u003cp\u003eSygnia says a China-nexus group it tracks as Velvet Ant hid inside Linux login infrastructure for nearly a decade. The group allegedly backdoored PAM and OpenSSH components that decide who can sign in, with the earliest traces dating back to 2016. The targeted network had no direct internet access, so the attackers staged through internet-facing systems to reach it.\u003c/p\u003e\n\n\u003cp\u003eThe activity was significant because the attackers modified trusted login programs rather than dropping obvious new malware. Backdoored PAM modules allowed secret-password access or credential capture, while altered OpenSSH programs logged credentials and commands. Because the login layer itself was compromised, password resets and killed sessions did little until the backdoors were removed.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Operation Highland as a verification problem rather than a one-CVE patching issue. It recommends monitoring PAM and OpenSSH files for changes, comparing them with known-good copies, and removing backdoors before resetting passwords. It also links the case to earlier Velvet Ant activity involving F5 BIG-IP appliances and Cisco NX-OS devices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSygnia reports that Velvet Ant, a China-nexus threat group, backdoored Linux login software to maintain access inside a targeted environment for nearly a decade. The earliest traces go back to 2016, and the group hid inside PAM and OpenSSH components rather than relying on obvious malware. The targeted network had no direct internet access, so the attackers first used internet-facing systems to reach it.\u003c/p\u003e\n\n\u003cp\u003eThe attackers replaced main PAM login modules on many machines with backdoored copies. Some versions allowed login with a secret password, while others recorded real usernames and passwords as users authenticated. Researchers found nine separate versions of the backdoored PAM components.\u003c/p\u003e\n\n\u003cp\u003eOpenSSH programs were also altered to log credentials and every command typed. The modified OpenSSH components included a hidden switch to disable logging when needed. The article says this made the activity look like normal administration because the trusted login programs themselves had been changed.\u003c/p\u003e\n\n\u003cp\u003eTo reach the isolated network, the attackers used other disguised tools and an internet-facing web server as a bridge. Commands were passed through the web server to open remote sessions inside the segment that had no direct internet access. This helped the attackers operate in a network defenders would normally consider less exposed.\u003c/p\u003e\n\n\u003cp\u003eThe article says normal containment was ineffective because the login system itself was compromised. Password resets and terminated sessions did not help while the components checking credentials were working for the attacker. Cleanup required verifying and replacing trusted login files, but the article warns that careless replacement could lock administrators out of live systems.\u003c/p\u003e\n\n\u003cp\u003eThe case is presented as part of a broader Velvet Ant pattern of hiding in infrastructure defenders monitor less. Sygnia previously reported Velvet Ant using internet-exposed F5 BIG-IP appliances as internal command servers and later exploiting Cisco NX-OS flaw CVE-2024-20399 to plant a backdoor on switches. The article recommends integrity monitoring for PAM and OpenSSH, comparison against known-good copies, patching CVE-2024-20399 on Cisco Nexus gear, and watching F5 systems for unexpected outbound connections.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSygnia says a China-nexus group it tracks as Velvet Ant backdoored Linux login software and remained hidden for close to a decade. The group targeted the PAM and OpenSSH components responsible for deciding who is allowed to sign in. The earliest traces of the activity go back to 2016.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the operation as notable because the attackers did not primarily hide on laptops and servers in the usual way. Instead, they modified trusted login programs themselves. This meant the activity did not require an obvious exploit at the point of login and could resemble normal administration.\u003c/p\u003e\n\n\u003ch2 id=\"target-environment\"\u003eTarget Environment\u003c/h2\u003e\n\n\u003cp\u003eThe targeted network had no direct internet access. To reach it, the attackers first staged through internet-facing systems. The article says they used other disguised tools and an internet-facing web server as a bridge into the isolated segment.\u003c/p\u003e\n\n\u003cp\u003eCommands were passed through the web server to open remote sessions deeper inside the network. This allowed the group to operate inside an environment that was not directly exposed to the internet.\u003c/p\u003e\n\n\u003ch2 id=\"backdoored-linux-login-components\"\u003eBackdoored Linux Login Components\u003c/h2\u003e\n\n\u003cp\u003eThe attackers modified both PAM and OpenSSH, which are core parts of Linux authentication and remote access.\u003c/p\u003e\n\n\u003cp\u003eFor PAM, the article says the attackers replaced the main login module on many machines with backdoored copies. Researchers found nine separate versions. Some of those versions let the attackers authenticate with a secret password, while others quietly recorded legitimate usernames and passwords as users logged in.\u003c/p\u003e\n\n\u003cp\u003eFor OpenSSH, the attackers altered programs in a similar way. The modified OpenSSH programs logged credentials and every command typed. They also included a hidden switch that could
