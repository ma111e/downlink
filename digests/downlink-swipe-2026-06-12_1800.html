turn logging off when needed.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-containment-and-cleanup\"\u003eImpact on Containment and Cleanup\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that normal containment steps were not enough. Password resets and killed sessions did not help while the software responsible for checking credentials remained compromised. New credentials could be captured again if the backdoored components stayed in place.\u003c/p\u003e\n\n\u003cp\u003eCleanup is described as delicate. The article warns that replacing the compromised login software incorrectly could lock administrators out of a live system. It recommends testing any replacement in a lab before applying it to production systems.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-earlier-velvet-ant-activity\"\u003eRelationship to Earlier Velvet Ant Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places Operation Highland in a broader pattern of Velvet Ant activity. It says the group repeatedly moves to infrastructure defenders watch less closely after one foothold is discovered.\u003c/p\u003e\n\n\u003cp\u003eIn a 2024 case, Sygnia found the same actor turning internet-exposed F5 BIG-IP appliances into internal command servers. Later that year, Sygnia reported the group exploiting Cisco NX-OS flaw CVE-2024-20399 to plant a backdoor on switches. The article notes that CVE-2024-20399 requires admin access first, making it a persistence tool rather than a remote break-in method.\u003c/p\u003e\n\n\u003cp\u003eCisco patched CVE-2024-20399 in July 2024. CISA flagged the flaw as exploited the next day. The article also recommends patching CVE-2024-20399 on Cisco Nexus gear and watching F5 systems for unexpected outbound connections.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-takeaways-cited-in-the-article\"\u003eDefensive Takeaways Cited in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article frames Operation Highland as a verification problem rather than a one-CVE issue. Since the attackers changed trusted programs after getting in, simply applying patches is not sufficient for the described case.\u003c/p\u003e\n\n\u003cp\u003eThe recommended defensive actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitoring PAM and OpenSSH programs and key files for any changes.\u003c/li\u003e\n\u003cli\u003eAlerting when those files change.\u003c/li\u003e\n\u003cli\u003eHunting by comparing login components against known-good copies.\u003c/li\u003e\n\u003cli\u003eRemoving backdoors before resetting passwords.\u003c/li\u003e\n\u003cli\u003eTesting replacement components in a lab before deployment.\u003c/li\u003e\n\u003cli\u003ePatching CVE-2024-20399 on Cisco Nexus gear.\u003c/li\u003e\n\u003cli\u003eWatching F5 appliances for unexpected outbound connections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-significance\"\u003eMain Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central lesson is that trusted infrastructure outside normal monitoring still needs integrity checks. In this case, that includes the Linux login layer itself. Load balancers, switches, and authentication software are described as trusted by default and rarely checked, making them attractive places for a patient attacker to hide.\u003c/p\u003e\n","keyPoints":["Sygnia says the China-nexus group Velvet Ant backdoored PAM and OpenSSH components that control Linux logins, with the earliest traces going back to 2016.","The backdoored PAM and OpenSSH programs allowed the attackers to log in with secret passwords, record real usernames and passwords, and capture commands typed by users.","The targeted network had no direct internet access, so the attackers used internet-facing systems, including a web server, as a bridge into the isolated segment.","Normal containment steps such as password resets and killing sessions were ineffective because the compromised login software itself continued to work for the attacker.","The article says defenders should monitor PAM and OpenSSH files for changes, compare them against known-good copies, and remove backdoors before resetting passwords."],"insights":["Password resets should happen only after the backdoored login components are removed, because otherwise the replacement credentials can be stolen through the same compromised PAM or OpenSSH software.","Operation Highland is described as a verification problem rather than a patching problem, because the attackers modified trusted programs after gaining access instead of relying on a single CVE.","The article warns that replacing compromised login components is delicate because an incorrect replacement can lock administrators out of a live system.","Velvet Ant repeatedly moved persistence into infrastructure that defenders monitor less, including F5 BIG-IP appliances, Cisco Nexus switches, and Linux login software."],"referencedReports":[{"title":"Operation Highland","url":"https://www.sygnia.co/blog/operation-highland-velvet-ant/","publisher":"Sygnia","context":"The article identifies Operation Highland as Sygnia's analysis of Velvet Ant backdooring Linux login components in an isolated network.","category":"","primary":false},{"title":"China-Nexus Threat Group Velvet Ant","url":"https://www.sygnia.co/blog/china-nexus-threat-group-velvet-ant/","publisher":"Sygnia","context":"The article references Sygnia's 2024 case in which Velvet Ant allegedly used internet-exposed F5 BIG-IP appliances as internal command servers.","category":"","primary":false}],"body":"\u003cp\u003eSygnia says a China-nexus group it tracks as Velvet Ant hid inside Linux login infrastructure for nearly a decade. The group allegedly backdoored PAM and OpenSSH components that decide who can sign in, with the earliest traces dating back to 2016. The targeted network had no direct internet access, so the attackers staged through internet-facing systems to reach it.\u003c/p\u003e\n\n\u003cp\u003eThe activity was significant because the attackers modified trusted login programs rather than dropping obvious new malware. Backdoored PAM modules allowed secret-password access or credential capture, while altered OpenSSH programs logged credentials and commands. Because the login layer itself was compromised, password resets and killed sessions did little until the backdoors were removed.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Operation Highland as a verification problem rather than a one-CVE patching issue. It recommends monitoring PAM and OpenSSH files for changes, comparing them with known-good copies, and removing backdoors before resetting passwords. It also links the case to earlier Velvet Ant activity involving F5 BIG-IP appliances and Cisco NX-OS devices.\u003c/p\u003e\n"},{"n":3,"title":"phpBB forum fixes auth bypass bug lurking for a decade","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/phpbb-forum-fixes-auth-bypass-bug-lurking-for-a-decade/","time":"18:19","priority":"SHOULD READ","score":88,"tldr":"phpBB fixed a decade-old authentication bypass flaw in version 3.3.17 that could let attackers log in as any user, including administrators, with a single HTTP request. Forum operators on phpBB 3.3.16 or older should upgrade immediately, while no safe 4.x release is available yet.","briefOverview":"\u003cp\u003eA 10-year-old authentication bypass vulnerability in phpBB allows an attacker to log in as any user, including administrators. The flaw has no identifier, is described as trivial to exploit with a single HTTP request, and affects phpBB 3.3.16 and below as well as 4.0.0-a2. Aikido discovered the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program.\u003c/p\u003e\n\n\u003cp\u003ephpBB responded immediately and fixed the issue on June 6 in version 3.3.17. Aikido said the vulnerability is exploitable in the default configuration and requires no special knowledge. For the 4.x release branch, the article says there is no safe release available yet.\u003c/p\u003e\n\n\u003cp\u003eAdministrator access could let attackers view private messages, create, modify, or delete content and user accounts, impersonate staff, or deface sites. Aikido said remote code execution is not possible because a separate password check protects the Admin Control Panel. The researchers withheld technical details for now to give administrators time to update and directly alerted administrators of large phpBB-based forums.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA decade-old authentication bypass vulnerability has been disclosed in phpBB, a PHP-based free and open-source web forum platform. The bug allows an attacker to log in as any user, including administrators. The flaw does not have an identifier and is described as trivial to exploit with a single HTTP request.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects phpBB versions 3.3.16 and below and phpBB 4.0.0-a2. According to Aikido, the flaw was introduced into the phpBB codebase 10 years ago and affects all versions of the 3.x and 4.x release branches up to those versions. Aikido also said the issue is exploitable in the default configuration and requires no special knowledge.\u003c/p\u003e\n\n\u003cp\u003eResearchers at application security company Aikido found the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program. phpBB responded immediately and addressed the issue on June 6 in phpBB 3.3.17. For phpBB 4.x, the article says there is no safe release available yet and Aikido recommends upgrading to master.\u003c/p\u003e\n\n\u003cp\u003eThe potential impact is significant because administrator access could allow attackers to view private messages stored on the forum, create, modify, or delete content and user accounts, impersonate staff, or deface sites. Picking targets is also straightforward because the member list on phpBB forums is public by default. Aikido said remote code execution is not possible due to a separate password check protecting the Admin Control Panel.\u003c/p\u003e\n\n\u003cp\u003eAikido withheld technical details to give forum administrators time to apply security updates. The researchers also contacted administrators of large phpBB-based forums directly to alert them. The article notes that the update may break forums using OAuth authentication because the OAuth redirect handler has moved to a new location, but says this should be a simple fix in most cases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA 10-year-old authentication bypass vulnerability has been found in phpBB, a PHP-based free and open-source web forum platform. The flaw allows an attacker to log in as any user, including administrators. The article says the bug has no identifier and is trivial to exploit with a single HTTP request.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects phpBB 3.3.16 and below and phpBB 4.0.0-a2. According to Aikido, the flaw was introduced into phpBB’s codebase 10 years ago and affects all versions of the 3.x and 4.x release branches up to 3.3.16 and 4.0.0-a2.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-disclosure\"\u003eDiscovery and disclosure\u003c/h2\u003e\n\n\u003cp\u003eResearchers at application security company Aikido discovered the bug on June 2. They reported it through phpBB’s HackerOne Vulnerability Disclosure Program.\u003c/p\u003e\n\n\u003cp\u003ephpBB responded to the report immediately. The issue was addressed on June 6 in phpBB version 3.3.17.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-fixes\"\u003eAffected versions and fixes\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the affected versions as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ephpBB 3.3.16 and below.\u003c/li\u003e\n\u003cli\u003ephpBB 4.0.0-a2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor the 3.x branch, the fix is phpBB 3.3.17. For the 4.x branch, the article says there is no safe 4.x release available yet, and Aikido recommends upgrading to master.\u003c/p\u003e\n\n\u003ch2 id=\"exploitability\"\u003eExploitability\u003c/h2\u003e\n\n\u003cp\u003eAikido said the vulnerability is exploitable in the default configuration. The researchers also said it requires no special knowledge.\u003c/p\u003e\n\n\u003cp\u003eThe article states that exploitation is trivial and can be done with a single HTTP request. Technical details have been withheld for now to give forum administrators enough time to apply the security updates.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impact\"\u003ePotential impact\u003c/h2\u003e\n\n\u003cp\u003eBecause the flaw can allow login as any user, the article highlights administrator account access as the most serious scenario. Administrator access could allow attackers to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eView all private messages stored on the forum.\u003c/li\u003e\n\u003cli\u003eCreate, modify, or delete content.\u003c/li\u003e\n\u003cli\u003eCreate, modify, or delete user accounts.\u003c/li\u003e\n\u003cli\u003eImpersonate staff.\u003c/li\u003e\n\u003cli\u003eDeface sites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that picking targets is straightforward because phpBB member lists are public by default.\u003c/p\u003e\n\n\u003ch2 id=\"limits-on-impact\"\u003eLimits on impact\u003c/h2\u003e\n\n\u003cp\u003eAikido said remote code execution is not possible. The reason given is that a separate password check protects the Admin Control Panel.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-administrator-guidance\"\u003eResponse and administrator guidance\u003c/h2\u003e\n\n\u003cp\u003eAikido withheld full technical details to allow administrators time to update. The researchers also directly contacted administrators of large phpBB-based forums to alert them.\u003c/p\u003e\n\n\u003cp\u003eAikido advised users on phpBB 3.3.16 and below to upgrade immediately to 3.3.17. For users on phpBB 4.0.0-a2, Aikido said to upgrade to master because there is no safe 4.x release yet.\u003c/p\u003e\n\n\u003ch2 id=\"oauth-update-note\"\u003eOAuth update note\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the update may cause forums using OAuth authentication to break. This is because the OAuth redirect handler has moved to a new location.\u003c/p\u003e\n\n\u003cp\u003eThe article says this should be a simple fix in most cases.\u003c/p\u003e\n\n\u003ch2 id=\"future-disclosure\"\u003eFuture disclosure\u003c/h2\u003e\n\n\u003cp\u003eAikido promised to publish the full details of the flaw in a future report. The article says Aikido did not provide a specific timeline for that publication.\u003c/p\u003e\n","keyPoints":["A 10-year-old authentication bypass vulnerability in phpBB allows an attacker to log in as any user, including administrators, using a single HTTP request.","The flaw affects phpBB versions 3.3.16 and below and 4.0.0-a2, and Aikido says it is exploitable in the default configuration without special knowledge.","Aikido discovered the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program.","phpBB addressed the issue on June 6 in version 3.3.17, while no safe 4.x release is available yet.","Aikido said administrator access could allow attackers to view private messages, create, modify, or delete content and user accounts, impersonate staff, or deface sites."],"insights":["Forum administrators should prioritize phpBB 3.3.17 even if their forums use default settings, because Aikido says the flaw requires no special configuration to exploit.","Attackers would have an easy way to identify potential impersonation targets because phpBB member lists are public by default.","The update may disrupt forums using OAuth authentication because the OAuth redirect handler moved to a new location.","The risk is partially limited because Aikido says remote code execution is blocked by a separate password check protecting the Admin Control Panel."],"referencedReports":[{"title":"phpBB Authentication Bypass RCE","url":"https://www.aikido.dev/blog/phpbb-authentication-bypass-rce","publisher":"Aikido","context":"The article cites Aikido's report for details that the phpBB flaw is exploitable in the default configuration and requires no special knowledge.","category":"","primary":false}],"body":"\u003cp\u003eA 10-year-old authentication bypass vulnerability in phpBB allows an attacker to log in as any user, including administrators. The flaw has no identifier, is described as trivial to exploit with a single HTTP request, and affects phpBB 3.3.16 and below as well as 4.0.0-a2. Aikido discovered the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program.\u003c/p\u003e\n\n\u003cp\u003ephpBB responded immediately and fixed the issue on June 6 in version 3.3.17. Aikido said the vulnerability is exploitable in the default configuration and requires no special knowledge. For the 4.x release branch, the article says there is no safe release available yet.\u003c/p\u003e\n\n\u003cp\u003eAdministrator access could let attackers view private messages, create, modify, or delete content and user accounts, impersonate staff, or deface sites. Aikido said remote code execution is not possible because a separate password check protects the Admin Control Panel. The researchers withheld technical details for now to give administrators time to update and directly alerted administrators of large phpBB-based forums.\u003c/p\u003e\n"},{"n":8,"title":"The Package That Never Shipped: Following a USPS Smishing Kit Through Censys DNS Data","source":"censys.com","sourceColorIdx":5,"link":"https://censys.com/blog/following-a-usps-smishing-kit-through-censys-dns-data/","time":"19:35","priority":"SHOULD READ","score":88,"tldr":"Censys researchers traced a USPS smishing link to a larger Tencent-hosted phishing operation with hundreds of rotating lookalike domains, real-time card skimming over WebSockets, and a related UPS campaign built from the same kit family. The most durable detection signals are structural artifacts like asset paths, cookie names, token formats, banner hashes, and DNS history rather than disposable hostnames or IPs.","briefOverview":"\u003cp\u003eA USPS-themed smishing campaign delivered by SMS used the lure \u003ccode\u003ehttps://usps.xupqnqz[.]one/uqjmw\u003c/code\u003e and led victims through a fake Cloudflare-style security check. The phishing kit then rendered a USPS package-delivery lure using USPS production HTML, CSS, fonts, images, and live analytics tags served from the phishing host. The article’s central finding is that one disposable hostname exposed a much larger operation when investigated through Censys DNS data.\u003c/p\u003e\n\n\u003cp\u003eCensys passive DNS turned the initial lure host into a cluster of seven confirmed IPs and 682 unique lookalike hostnames as of the 2026-05-20 snapshot. The kit captured victim payment data in real time by opening a WebSocket to its origin and streaming card data keystroke by keystroke, while also performing server-side BIN lookup and pushing operator-controlled routing decisions back to the browser. A banner-hash pivot also uncovered a related UPS-themed campaign on Tencent infrastructure using a Spring Boot backend, while the USPS variant used GoFrame.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that hostnames and IPs in this campaign are disposable, but structural indicators are more durable. Notable detection seams include the \u003ccode\u003e/us_post_usps/\u003c/code\u003e asset path, \u003ccode\u003etheme_*_verify_us_post_ups\u003c/code\u003e cookies, the \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e token format, HTTP banner hashes, and Censys DNS history. The author says the artifacts are consistent with the Chinese-language smishing-as-a-service ecosystem often labeled “Smishing Triad,” while explicitly avoiding firm attribution to a named operator.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article analyzes a live USPS-themed smishing campaign that arrived by SMS with a link to \u003ccode\u003ehttps://usps.xupqnqz[.]one/uqjmw\u003c/code\u003e. The hostname used the trusted-looking \u003ccode\u003eusps.\u003c/code\u003e subdomain on a random \u003ccode\u003e.one\u003c/code\u003e domain, and the landing page first displayed a fake Cloudflare “Verify you are human” interstitial. After that gate, the victim reached a USPS-branded package lure that appeared convincing because the kit served USPS’s genuine production HTML, CSS, fonts, images, and analytics code from the phishing host.\u003c/p\u003e\n\n\u003cp\u003eCensys data was used to expand the investigation from one hostname into a broader infrastructure cluster. The lure hostname resolved to \u003ccode\u003e43.157.174.200\u003c/code\u003e, a Tencent Cloud machine in ASN 132203, and Censys passive DNS showed roughly a hundred related names on that one IP. Across seven confirmed cluster IPs, Censys recorded 682 unique lookalike hostnames as of the 2026-05-20 snapshot, including \u003ccode\u003eusps.xupq*.one\u003c/code\u003e, \u003ccode\u003einformed.deliwek*.shop\u003c/code\u003e, random \u003ccode\u003e*.life\u003c/code\u003e domains, and related bare domains.\u003c/p\u003e\n\n\u003cp\u003eThe USPS phishing kit used a fake JSONP-based gate at \u003ccode\u003e/eat?callback=...\u003c/code\u003e that returned a token shaped like \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e and set a \u003ccode\u003egfsessionid\u003c/code\u003e cookie associated with the GoFrame framework. The post-gate application was a Vue 3 single-page app titled \u003ccode\u003eWelcome | USPS\u003c/code\u003e, and its assets were served under \u003ccode\u003e/us_post_usps/\u003c/code\u003e. Because the kit served USPS’s real \u003ccode\u003ehead.html\u003c/code\u003e, victim browsers also loaded USPS’s GA4 property \u003ccode\u003eG-CSLL4ZEK4L\u003c/code\u003e and a Google AdServices conversion beacon pointed at \u003ccode\u003ehttps://www.usps.com/\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe kit’s data theft was captured live rather than inferred from source. As victims typed, the page opened a WebSocket to \u003ccode\u003ewss://\u0026lt;host\u0026gt;/ws?token=\u0026lt;UUIDv4\u0026gt;\u003c/code\u003e and streamed cardholder name, card number, expiry, and CVV values keystroke by keystroke. The backend also performed server-side BIN lookup, tracked card history in the session, and returned operator-controlled decisions such as retry behavior, PIN prompts, OTP prompts, and a kill-switch that could redirect the victim to the real USPS site.\u003c/p\u003e\n\n\u003cp\u003eA pivot on the HTTP banner hash uncovered a related UPS-themed campaign running on five Tencent-hosted IPs across two Tencent \u003ccode\u003e/18\u003c/code\u003e prefixes. This second variant used a Spring Boot backend rather than GoFrame, redirected through \u003ccode\u003e/__theme/runtime/entry/verify\u003c/code\u003e and \u003ccode\u003e/__theme/runtime/site/pass\u003c/code\u003e, and set cookies named \u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e and \u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e. The article argues that the USPS and UPS campaigns share kit lineage and operator infrastructure, while noting that the evidence supports consistency with the “Smishing Triad” ecosystem but not definitive attribution to a named cluster.\u003c/p\u003e\n\n\u003cp\u003eThe article’s defensive guidance focuses on indicators that survive domain and IP rotation. It recommends watching for structural artifacts such as \u003ccode\u003e/us_post_usps/\u003c/code\u003e, \u003ccode\u003e/__theme/runtime/site/pass\u003c/code\u003e, \u003ccode\u003e/__theme/runtime/entry/verify\u003c/code\u003e, \u003ccode\u003egfsessionid\u003c/code\u003e on delivery-themed sites, \u003ccode\u003etheme_*_verify_us_post_ups\u003c/code\u003e cookies, the JSONP token shape, specific Censys banner hashes, and ASN-scoped JA4T fingerprints. It also notes that the Tencent prefixes \u003ccode\u003e43.157.128.0/18\u003c/code\u003e and \u003ccode\u003e43.173.64.0/18\u003c/code\u003e may be reasonable block-list candidates for many enterprises.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a technical investigation of a live USPS-themed smishing campaign that began with a single SMS lure pointing to \u003ccode\u003ehttps://usps.xupqnqz[.]one/uqjmw\u003c/code\u003e. The domain was not associated with USPS; it used a random \u003ccode\u003e.one\u003c/code\u003e domain with a \u003ccode\u003eusps.\u003c/code\u003e subdomain to make the URL appear trustworthy on a mobile device. The landing flow first showed a fake Cloudflare-style “Security Check” page, including a human-verification checkbox and multilingual support in the USPS variant.\u003c/p\u003e\n\n\u003cp\u003eThe author used Censys DNS and host data to expand the investigation from one hostname into a broader phishing operation. The initial lure resolved to \u003ccode\u003e43.157.174.200\u003c/code\u003e, a Tencent Cloud host in ASN 132203. Censys passive DNS revealed that this one host had been associated with many related lookalike domains, and the broader confirmed cluster included seven IPs and 682 unique lookalike hostnames as of the 2026-05-20 snapshot.\u003c/p\u003e\n\n\u003ch2 id=\"initial-lure-and-victim-flow\"\u003eInitial Lure and Victim Flow\u003c/h2\u003e\n\n\u003cp\u003eThe SMS lure used the hostname \u003ccode\u003eusps.xupqnqz[.]one\u003c/code\u003e, which combined a trusted-looking \u003ccode\u003eusps\u003c/code\u003e label with a random-looking \u003ccode\u003e.one\u003c/code\u003e domain. The article emphasizes that this is effective on phones because narrow address bars often make the leftmost part of the hostname most visible to victims.\u003c/p\u003e\n\n\u003cp\u003eWhen the victim opened the link, the site displayed a fake Cloudflare verification page. In the USPS variant, the fake gate included a twelve-language translation table and selected the language based on \u003ccode\u003enavigator.language\u003c/code\u003e. The page imitated a routine web-security interstitial to encourage users to click through without suspicion.\u003c/p\u003e\n\n\u003cp\u003eAfter the fake verification, the site made a JSONP request to \u003ccode\u003e/eat?callback=jsonpCallback_\u0026lt;timestamp\u0026gt;\u003c/code\u003e. The server returned a token shaped like \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e and set a \u003ccode\u003egfsessionid\u003c/code\u003e cookie, which the article identifies as the default cookie name of the GoFrame web framework. The author notes that the callback parameter was not validated and that the gate mainly prevented casual visitors and crawlers from deep-linking directly to the payload.\u003c/p\u003e\n\n\u003ch2 id=\"usps-kit-behavior\"\u003eUSPS Kit Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe USPS phishing page was implemented as a Vue 3 single-page application titled \u003ccode\u003eWelcome | USPS\u003c/code\u003e. Instead of recreating USPS branding from scratch, the kit served USPS production assets directly from the phishing host under the path prefix \u003ccode\u003e/us_post_usps/\u003c/code\u003e. A single victim session pulled 66 distinct USPS-owned files, including USPS templates, Bootstrap CSS, navigation icons, hero images, and Monotype web fonts.\u003c/p\u003e\n\n\u003cp\u003eA key artifact was the kit’s use of USPS’s real \u003ccode\u003ehead.html\u003c/code\u003e. Because that file was served verbatim, the phishing page also loaded USPS’s legitimate Google Analytics 4 property \u003ccode\u003eG-CSLL4ZEK4L\u003c/code\u003e and a Google AdServices conversion beacon pointed at \u003ccode\u003ehttps://www.usps.com/\u003c/code\u003e. The article notes that this creates a visibility point for USPS’s marketing team, because campaign traffic from domains USPS does not own could appear in USPS’s own analytics infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003e/us_post_usps/\u003c/code\u003e prefix is presented as one of the strongest detection seams. The article states that this path does not exist on real \u003ccode\u003eusps.com\u003c/code\u003e, so any browser fetching \u003ccode\u003e/us_post_usps/pages/head.html\u003c/code\u003e is on the kit rather than the legitimate USPS site.\u003c/p\u003e\n\n\u003ch2 id=\"real-time-data-capture\"\u003eReal-Time Data Capture\u003c/h2\u003e\n\n\u003cp\u003eThe phishing kit captured payment data in real time. As victims typed into the card form, the page opened a WebSocket to \u003ccode\u003ewss://\u0026lt;host\u0026gt;/ws?token=\u0026lt;UUIDv4\u0026gt;\u003c/code\u003e and streamed data back to the origin keystroke by keystroke. The author captured 279 WebSocket frames across seven sessions and stresses that this behavior was observed live, not inferred from static source review.\u003c/p\u003e\n\n\u003cp\u003eThe captured WebSocket messages included cardholder name, card number, expiry, and CVV values, including intermediate typos and corrections. The article also states that a parallel HTTP POST to \u003ccode\u003e/\u0026lt;random\u0026gt;/api/input\u003c/code\u003e sent the same values, allowing partially entered or abandoned card data to be harvested.\u003c/p\u003e\n\n\u003cp\u003eWhen the form was submitted, the backend performed a server-side BIN lookup against the card number. It returned enriched card information to the victim’s browser over the same socket, including bank, country, card scheme, type, and level. The kit also maintained a \u003ccode\u003ecardHistory\u003c/code\u003e array, which the article describes as the data structure needed to trap a victim in a “card declined, try another” loop.\u003c/p\u003e\n\n\u003cp\u003eThe backend could push routing decisions back into the browser, including retry flows, PIN prompts, OTP prompts, and a kill-switch. The periodic configuration included internal labels in Chinese, such as \u003ccode\u003ePIN验证\u003c/code\u003e and \u003ccode\u003e邮箱验证\u003c/code\u003e, while victim-facing text remained in English. The article treats this dual-language artifact as an in-artifact signal relevant to attribution, while later stating that it does not prove a named operator.\u003c/p\u003e\n\n\u003ch2 id=\"censys-dns-findings\"\u003eCensys DNS Findings\u003c/h2\u003e\n\n\u003cp\u003eThe investigation relied heavily on Censys passive DNS. The original lure host resolved to \u003ccode\u003e43.157.174.200\u003c/code\u003e, and the Censys DNS view for that IP showed many related hostnames, including \u003ccode\u003eusps.xupq*.one\u003c/code\u003e and \u003ccode\u003einformed.deliwek*.shop\u003c/code\u003e. This turned a single reported SMS link into an infrastructure hunt.\u003c/p\u003e\n\n\u003cp\u003eAcross the seven confirmed IPs in the cluster, Censys recorded 682 unique lookalike hostnames as of the 2026-05-20 snapshot. The article gives the following distribution:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e*.life\u003c/code\u003e random apex domains: 334 observed.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003einformed.deliwek*.shop\u003c/code\u003e: 250 observed.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eusps.xupq*.one\u003c/code\u003e: 78 observed.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edeliwek*.shop\u003c/code\u003e bare domains: 17 observed.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003exupq*.one\u003c/code\u003e bare apex domains: 3 observed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMost of these names no longer resolved in live DNS when checked later, but Censys retained historical \u003ccode\u003efirst_seen\u003c/code\u003e and \u003ccode\u003elast_seen\u003c/code\u003e data. The article’s central DNS lesson is that live DNS may show a disposable domain as gone, while historical DNS can still reveal rotation patterns and infrastructure relationships.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-of-the-ups-variant\"\u003eDiscovery of the UPS Variant\u003c/h2\u003e\n\n\u003cp\u003eThe author pivoted from the USPS host using the kit’s HTTP banner hash. One banner-hash query, \u003ccode\u003ehost.services.banner_hash_sha256=\u0026quot;4fe8bec780537aa223406965415c1f85e83eec1f4e2181cf82e2a7b7516026e6\u0026quot; and host.services.protocol=\u0026quot;HTTP\u0026quot;\u003c/code\u003e, returned exactly five hosts globally. These hosts were spread across two Tencent \u003ccode\u003e/18\u003c/code\u003e prefixes: \u003ccode\u003e43.157.128.0/18\u003c/code\u003e and \u003ccode\u003e43.173.64.0/18\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eVisiting those five hosts revealed a UPS-themed campaign rather than a USPS-themed one. The article calls this a V2 variant and contrasts it with the V1 USPS variant. The UPS variant still used a fake Cloudflare-style gate, but the gate was English-only and hard-coded \u003ccode\u003e\u0026lt;html lang=\u0026quot;zh-CN\u0026quot;\u0026gt;\u003c/code\u003e on an English page.\u003c/p\u003e\n\n\u003cp\u003eThe UPS flow used a different handoff mechanism from the USPS kit. Instead of the JSONP \u003ccode\u003e/eat\u003c/code\u003e token flow, it redirected through \u003ccode\u003e/__theme/runtime/entry/verify\u003c/code\u003e, set a cookie, redirected off-domain to \u003ccode\u003exupqrnn[.]one/us?__theme_site_ticket=\u0026lt;32hex\u0026gt;\u003c/code\u003e, then chained through \u003ccode\u003e/__theme/runtime/site/pass\u003c/code\u003e before landing on the UPS single-page app.\u003c/p\u003e\n\n\u003cp\u003eThe UPS variant set cookies named \u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e and \u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e. The article highlights these cookie names because they expose the operator’s internal theme name, \u003ccode\u003eus_post_ups\u003c/code\u003e, in two independent endpoints. The UPS page also retained a USPS-pathed favicon at \u003ccode\u003e/usps/images/logo_mobile.svg\u003c/code\u003e, which the article describes as a fork artifact from a USPS kit re-themed for UPS.\u003c/p\u003e\n\n\u003ch2 id=\"backend-and-infrastructure-differences\"\u003eBackend and Infrastructure Differences\u003c/h2\u003e\n\n\u003cp\u003eThe USPS variant used GoFrame, indicated by the \u003ccode\u003egfsessionid\u003c/code\u003e cookie and GoFrame server behavior. The UPS variant used Java Spring Boot, shown by stock Spring Boot JSON 404 responses with timestamps and paths. Both variants were fronted by Caddy, with \u003ccode\u003eVia: 1.1 Caddy\u003c/code\u003e appearing in the infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the two variants as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cp\u003eV1 USPS:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBackend: GoFrame.\u003c/li\u003e\n\u003cli\u003eGate: twelve-language fake Cloudflare page.\u003c/li\u003e\n\u003cli\u003eToken flow: \u003ccode\u003e/eat\u003c/code\u003e JSONP returning \u003ccode\u003evalid_\u0026lt;14 digits\u0026gt;_\u0026lt;32 hex\u0026gt;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eCookie: \u003ccode\u003egfsessionid\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAsset prefix: \u003ccode\u003e/us_post_usps/*\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003ePort-80 banner hash: \u003ccode\u003e8e5546c83d764e1287b55cbe868a45344a6f0afa9782d798d03b2b7cfc53ec38\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003eV2 UPS:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBackend: Spring Boot.\u003c/li\u003e\n\u003cli\u003eGate: English fake Cloudflare page with \u003ccode\u003elang=\u0026quot;zh-CN\u0026quot;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eHandoff: \u003ccode\u003e/__theme/runtime/*\u003c/code\u003e redirect chain.\u003c/li\u003e\n\u003cli\u003eCookies: \u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e and \u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAsset prefix: \u003ccode\u003e/usps/*\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003ePort-80 banner hash: \u003ccode\u003e4fe8bec780537aa223406965415c1f85e83eec1f4e2181cf82e2a7b7516026e6\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author concludes that the two variants show shared kit lineage and operator infrastructure, even though their backend implementations differ.\u003c/p\u003e\n\n\u003ch2 id=\"confirmed-cluster-hosts\"\u003eConfirmed Cluster Hosts\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies seven confirmed Tencent-hosted cluster IPs in ASN 132203:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e43.157.174.200\u003c/code\u003e: V1 USPS, GoFrame, in \u003ccode\u003e43.157.128.0/18\u003c/code\u003e, with 306 Censys DNS names in the snapshot.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.157.158.108\u003c/code\u003e: V1 USPS, GoFrame, in \u003ccode\u003e43.157.128.0/18\u003c/code\u003e, with zero names in the snapshot but confirmed by a live probe against a related hostname.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.157.151.131\u003c/code\u003e: V2 UPS, Spring Boot, in \u003ccode\u003e43.157.128.0/18\u003c/code\u003e, with 197 names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.157.148.168\u003c/code\u003e: V2 UPS, Spring Boot, in \u003ccode\u003e43.157.128.0/18\u003c/code\u003e, with 202 names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.173.100.171\u003c/code\u003e: V2 UPS, Spring Boot, in \u003ccode\u003e43.173.64.0/18\u003c/code\u003e, with 64 names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.173.104.156\u003c/code\u003e: V2 UPS, Spring Boot, in \u003ccode\u003e43.173.64.0/18\u003c/code\u003e, with 12 names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.173.105.83\u003c/code\u003e: V2 UPS, Spring Boot, in \u003ccode\u003e43.173.64.0/18\u003c/code\u003e, with 32 names.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that all six HTTP-serving hosts shared one port-443 TLS banner hash and used Caddy, but that the TLS hash was too common globally to be useful without additional scoping. Six of the seven hosts ran the same OpenSSH 8.9p1 build, but each host had a distinct SSH host key, making SSH host-key pivoting unhelpful. The hosts also carried stale SSH CVEs, including CVE-2024-6387, which the article says is consistent with a spin-up, run-until-burned, abandon model.\u003c/p\u003e\n\n\u003ch2 id=\"geography-and-hosting-signals\"\u003eGeography and Hosting Signals\u003c/h2\u003e\n\n\u003cp\u003eThe article cautions against over-interpreting geolocation. The infrastructure produced multiple geographic signals:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eASN owner: Tencent, with country code CN.\u003c/li\u003e\n\u003cli\u003eWhois network name for \u003ccode\u003e43.157.128.0/18\u003c/code\u003e: \u003ccode\u003e6 COLLYER QUAY\u003c/code\u003e, a Singapore CBD address.\u003c/li\u003e\n\u003cli\u003eWhois network name for \u003ccode\u003e43.173.64.0/18\u003c/code\u003e: \u003ccode\u003eACEVILLE PTE.LTD.\u003c/code\u003e, described as Tencent’s Singapore entity.\u003c/li\u003e\n\u003cli\u003eCensys geolocation for \u003ccode\u003e43.157.x\u003c/code\u003e: São Paulo, Brazil.\u003c/li\u003e\n\u003cli\u003eCensys geolocation for \u003ccode\u003e43.173.x\u003c/code\u003e: Santa Clara, California.\u003c/li\u003e\n\u003cli\u003eServer-side clock: \u003ccode\u003e+08:00\u003c/code\u003e on both kit families.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author states that none of São Paulo, Santa Clara, Singapore, or Beijing should be treated as a reliable physical-server location. The consistent \u003ccode\u003e+08:00\u003c/code\u003e server clock is described as a deployment property, not a GPS location for the operator.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-discussion\"\u003eAttribution Discussion\u003c/h2\u003e\n\n\u003cp\u003eThe article says the kit is consistent with the loosely tracked Chinese-language smishing-as-a-service ecosystem often labeled “Smishing Triad.” The reasons given include USPS and delivery-brand themes, multilingual fake Cloudflare gates, Tencent hosting with Singapore whois signals, Chinese internal labels alongside English victim-facing copy, and real-time card skimming with server-side BIN enrichment.\u003c/p\u003e\n\n\u003cp\u003eHowever, the author explicitly avoids firm attribution to that cluster or to any named operator. The article states that it does not have a shared TLS certificate, shared backend IP, or shared body hash tying this specific infrastructure to a previously published IOC list. The conclusion is limited to “consistent with a known ecosystem.”\u003c/p\u003e\n\n\u003ch2 id=\"defensive-takeaways\"\u003eDefensive Takeaways\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that domains and IPs in this operation are intentionally disposable and that detections based only on them will go stale quickly. Instead, it recommends focusing on structural indicators that are harder for the operator to change across rotations and re-skins.\u003c/p\u003e\n\n\u003cp\u003eActionable indicators highlighted in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cp\u003eURL and SMS inspection substrings:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003exupq\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edeliwek\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003exupqrnn\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egwrpfjx\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003eProxy and EDR path indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/us_post_usps/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/__theme/runtime/site/pass\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/__theme/runtime/entry/verify\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/\u0026lt;random\u0026gt;/api/input\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003eCookie indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egfsessionid\u003c/code\u003e on a USPS- or UPS-themed host\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003eBody and token indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJSONP matching \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSpring Boot JSON 404 responses with \u003ccode\u003e+08:00\u003c/code\u003e on a delivery-brand host\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003eCensys monitoring pivots:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eV2 UPS banner hash \u003ccode\u003e4fe8bec780537aa223406965415c1f85e83eec1f4e2181cf82e2a7b7516026e6\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eV1 USPS banner hash \u003ccode\u003e8e5546c83d764e1287b55cbe868a45344a6f0afa9782d798d03b2b7cfc53ec38\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eASN-scoped JA4T fingerprints listed in the article\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that the Tencent prefixes \u003ccode\u003e43.157.128.0/18\u003c/code\u003e and \u003ccode\u003e43.173.64.0/18\u003c/code\u003e are reasonable block-list candidates for most enterprises, because legitimate destinations on these operator-occupied overseas cloud prefixes are described as rare.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe investigation shows how one SMS lure can expose a broader phishing operation when combined with historical DNS and service fingerprinting. The key technical significance is that the kit is not merely a static phishing page; it performs live WebSocket-based data capture, server-side BIN enrichment, session tracking, and operator-controlled victim routing. The operational significance is that Censys passive DNS preserved relationships among hundreds of short-lived domains that would not be visible through live DNS alone.\u003c/p\u003e\n\n\u003cp\u003eThe article’s strongest conclusion is that the campaign’s durable identity is not in its rotating hostnames or IP addresses. It is in the structure of the kit: asset paths, cookie names, token formats, banner hashes, WebSocket behavior, and DNS history.\u003c/p\u003e\n","keyPoints":["A live USPS-themed smishing campaign used a fake Cloudflare security check and then served USPS production HTML, CSS, fonts, images, and Google Analytics tags from the phishing host.","The phishing kit opened a WebSocket to its origin and streamed victim card data keystroke by keystroke while also performing server-side BIN lookup and sending routing decisions back to the browser.","Censys passive DNS expanded one lure hostname into a cluster that included 682 unique lookalike hostnames across seven confirmed IPs as of the 2026-05-20 snapshot.","Pivoting on the kit’s HTTP banner hash identified a related UPS-themed campaign hosted on Tencent infrastructure and using a Java/Spring Boot backend instead of the USPS kit’s GoFrame backend.","The article identifies durable detection signals including the /us_post_usps/ asset path, theme_*_verify_us_post_ups cookies, valid_\u003c14digits\u003e_\u003c32hex\u003e token format, and specific Censys banner hashes."],"insights":["The USPS lure reused USPS’s real production head.html, causing victim browsers to fire Google Analytics hits into USPS’s own GA4 property, which means USPS’s marketing telemetry could reveal phishing traffic from domains it does not own.","Censys historical DNS was critical because many lure domains no longer resolved in live DNS, but their past resolutions still exposed the operator’s domain rotation patterns and infrastructure relationships.","The UPS variant leaked the operator’s internal theme name, us_post_ups, in two cookie names, making those cookies stronger indicators than the campaign’s disposable domains or changing visual branding.","The shared port-443 TLS banner hash was too common globally to be useful by itself, but became more useful when scoped to Tencent ASN 132203, showing that broad fingerprints can require infrastructure context to become actionable.","SSH host-key pivoting was not useful for this cluster because each host had a distinct SSH host key despite similar OpenSSH builds, indicating defenders should prioritize DNS history, banner hashes, paths, and cookies instead."],"referencedReports":[{"title":"‘Smishing Triad’ Targeted USPS and US Citizens for Data Theft","url":"https://www.resecurity.com/blog/article/smishing-triad-targeted-usps-and-us-citizens-for-data-theft","publisher":"Resecurity","context":"The article cites this as the original naming of the Smishing Triad cluster related to USPS-themed smishing.","category":"","primary":false},{"title":"Smishing Triad: Chinese eCrime Group Targets 121+ Countries, Intros New Banking Phishing Kit","url":"https://www.silentpush.com/blog/smishing-triad/","publisher":"Silent Push","context":"The article cites this as documentation of the Lighthouse kit and its real-time front-end-to-backend victim synchronization.","category":"","primary":false},{"title":"The Smishing Deluge: China-Based Campaign Flooding Global Text Messages","url":"https://unit42.paloaltonetworks.com/global-smishing-campaign/","publisher":"Palo Alto Networks Unit 42","context":"The article lists this as further reading on China-based smishing campaigns.","category":"","primary":false}],"body":"\u003cp\u003eA USPS-themed smishing campaign delivered by SMS used the lure \u003ccode\u003ehttps://usps.xupqnqz[.]one/uqjmw\u003c/code\u003e and led victims through a fake Cloudflare-style security check. The phishing kit then rendered a USPS package-delivery lure using USPS production HTML, CSS, fonts, images, and live analytics tags served from the phishing host. The article’s central finding is that one disposable hostname exposed a much larger operation when investigated through Censys DNS data.\u003c/p\u003e\n\n\u003cp\u003eCensys passive DNS turned the initial lure host into a cluster of seven confirmed IPs and 682 unique lookalike hostnames as of the 2026-05-20 snapshot. The kit captured victim payment data in real time by opening a WebSocket to its origin and streaming card data keystroke by keystroke, while also performing server-side BIN lookup and pushing operator-controlled routing decisions back to the browser. A banner-hash pivot also uncovered a related UPS-themed campaign on Tencent infrastructure using a Spring Boot backend, while the USPS variant used GoFrame.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that hostnames and IPs in this campaign are disposable, but structural indicators are more durable. Notable detection seams include the \u003ccode\u003e/us_post_usps/\u003c/code\u003e asset path, \u003ccode\u003etheme_*_verify_us_post_ups\u003c/code\u003e cookies, the \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e token format, HTTP banner hashes, and Censys DNS history. The author says the artifacts are consistent with the Chinese-language smishing-as-a-service ecosystem often labeled “Smishing Triad,” while explicitly avoiding firm attribution to a named operator.\u003c/p\u003e\n"},{"n":5,"title":"Google Sues Chinese Smishing Network Accused of Using Gemini AI in Phishing","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-sues-chinese-smishing-network.html","time":"18:59","priority":"SHOULD READ","score":82,"tldr":"Google is suing a China-based phishing-as-a-service network accused of using Gemini to generate fake websites for large-scale SMS phishing campaigns targeting Americans. The Outsider kit allegedly enabled criminals to impersonate trusted brands, steal financial data, and victimize over 100,000 people.","briefOverview":"\u003cp\u003eGoogle said it is pursuing legal action against a Chinese cybercrime network accused of using its Gemini AI agent to support phishing text-message campaigns targeting Americans. The network allegedly developed and managed a phishing-as-a-service kit called Outsider. Google said the operation used Gemini to help generate fraudulent phishing pages and deploy large-scale SMS phishing attacks impersonating legitimate brands.\u003c/p\u003e\n\n\u003cp\u003eAccording to Google, Outsider’s schemes have victimized more than 100,000 people and caused millions of dollars in losses. The company said it identified 9,000 fake websites and more than 1.59 million fraudulent URLs tied to the service between November 14, 2025, and April 14, 2026. Google also said it is working with AT\u0026amp;T, T-Mobile, and Verizon to block such messages from reaching customers.\u003c/p\u003e\n\n\u003cp\u003eThe Outsider kit can be purchased for as little as $88 per week through a self-service ordering bot on Telegram. It offers more than 290 templates impersonating trusted institutions, real-time keystroke logging, and a dashboard to track campaign effectiveness. Google’s complaint says members can use AI-generated code to create shell websites and transform them into fraudulent sites designed to steal personal and financial information.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle said it is suing a Chinese cybercrime network accused of using Gemini to assist phishing campaigns aimed at Americans. The network is alleged to be behind Outsider, a phishing-as-a-service software kit used to create fraudulent websites and send SMS phishing messages. Google said the messages impersonated legitimate brands and referenced issues such as brokerage accounts or mobile carrier rewards to lure recipients into clicking links.\u003c/p\u003e\n\n\u003cp\u003eThe phishing links led to fake websites that mimicked trusted institutions and were designed to steal personal and financial information. Google said it filed the lawsuit to dismantle the network’s infrastructure. The company also said it is partnering with AT\u0026amp;T, T-Mobile, and Verizon to block related messages from reaching customers.\u003c/p\u003e\n\n\u003cp\u003eGoogle said Outsider operations are coordinated through Telegram, where the network distributes phishing kits that enable threat actors to push fake text messages claiming to be from trusted brands. The schemes are estimated to have victimized more than 100,000 people and caused millions of dollars in losses. Between November 14, 2025, and April 14, 2026, Google identified 9,000 fake websites and more than 1.59 million fraudulent URLs tied to the phishing service.\u003c/p\u003e\n\n\u003cp\u003eThe article says that from May 18 to June 1, 2026, Outsider was responsible for 55,000 spam texts flagged by Android users. During the same period, the network sent 2.5 million messages to Android users containing links to Outsider-generated websites. The kit costs as little as $88 per week and allows criminals to create fraudulent websites, launch phishing campaigns, and steal credit card numbers, bank account credentials, and personal data.\u003c/p\u003e\n\n\u003cp\u003eOutsider includes more than 290 pre-built templates impersonating legitimate websites of trusted institutions, along with real-time keystroke logging and a performance dashboard. Google said the group’s instructions explain how members can use AI tools to generate programming code for shell websites and then copy that code into Outsider. The complaint says the Outsider Enterprise includes developer, data broker, spammer, theft, and Telegram groups that collaborate to conduct phishing attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle said it is pursuing legal action against a Chinese cybercrime network accused of using its Gemini artificial intelligence agent to support phishing text-message campaigns targeting Americans. The network is alleged to have developed and managed a phishing-as-a-service software kit called Outsider.\u003c/p\u003e\n\n\u003cp\u003eAccording to Google, the operation “weaponized Gemini” to help generate fraudulent phishing pages and deploy large-scale SMS phishing, or smishing, attacks. The messages often impersonated legitimate brands and claimed recipients had brokerage account issues or were eligible for rewards through a mobile phone carrier.\u003c/p\u003e\n\n\u003cp\u003eThe messages prompted users to click links leading to fraudulent websites that mimicked trusted institutions. Google said those sites were designed to steal personal and financial information.\u003c/p\u003e\n\n\u003ch2 id=\"legal-and-operational-response\"\u003eLegal and operational response\u003c/h2\u003e\n\n\u003cp\u003eGoogle said it is filing the lawsuit to dismantle the network’s infrastructure. The company also said it is partnering with AT\u0026amp;T, T-Mobile, and Verizon to block such messages from reaching customers.\u003c/p\u003e\n\n\u003cp\u003eThe complaint was filed in Manhattan federal court. The article also notes that this development came seven months after Google filed another U.S. lawsuit against China-based hackers behind a phishing-as-a-service platform called Lighthouse.\u003c/p\u003e\n\n\u003ch2 id=\"outsider-phishing-as-a-service-kit\"\u003eOutsider phishing-as-a-service kit\u003c/h2\u003e\n\n\u003cp\u003eGoogle described Outsider as a phishing-as-a-service kit that allows criminals to create fraudulent websites, launch phishing campaigns, and steal sensitive data. The article says the kit can be purchased for as little as $88 a week through a self-service ordering bot on Telegram.\u003c/p\u003e\n\n\u003cp\u003eThe service offers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 290 pre-built templates that impersonate legitimate websites of trusted institutions.\u003c/li\u003e\n\u003cli\u003eReal-time keystroke logging.\u003c/li\u003e\n\u003cli\u003eA performance dashboard for tracking campaign effectiveness.\u003c/li\u003e\n\u003cli\u003eTools that support the theft of credit card numbers, bank account credentials, and personal data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGoogle said Outsider’s operations are coordinated through Telegram, where phishing kits are distributed and members collaborate. The kit enables threat actors to send fake text messages that claim to come from trusted brands.\u003c/p\u003e\n\n\u003ch2 id=\"scale-and-disclosed-impact\"\u003eScale and disclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe article says Outsider-related schemes are estimated to have victimized more than 100,000 people and caused millions of dollars in losses. Google identified 9,000 fake websites and more than 1.59 million fraudulent URLs tied to the service between November 14, 2025, and April 14, 2026.\u003c/p\u003e\n\n\u003cp\u003eIn a two-week period from May 18 to June 1, 2026, Outsider was responsible for 55,000 spam texts flagged by Android users. During the same period, the network sent 2.5 million messages to Android users containing links to Outsider-generated websites.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-use-of-ai\"\u003eAlleged use of AI\u003c/h2\u003e\n\n\u003cp\u003eGoogle said the Outsider Enterprise provided step-by-step instructions on how Outsider can use AI-generated code. According to Google’s complaint, members can use AI tools to generate programming code for a shell website, then copy and paste the code into Outsider to turn the shell into a fraudulent site used to steal personal or financial information.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the prompts used for Gemini and other AI platforms are framed as harmless programming requests. The prompts ask the model to generate HTML code for a “gift redemption page” with desired functionality and features, while instructing it to avoid JavaScript and use inline CSS.\u003c/p\u003e\n\n\u003cp\u003eAfter the counterfeit website is online, its URL is sent to potential victims through text messages.\u003c/p\u003e\n\n\u003ch2 id=\"structure-of-the-outsider-enterprise\"\u003eStructure of the Outsider Enterprise\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Outsider Enterprise consists of interconnected groups that play different roles while collaborating to conduct phishing attacks using the kit. These groups include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe Developer Group\u003c/strong\u003e, which supplies phishing software and templates.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Data Broker Group\u003c/strong\u003e, which provides curated lists of people to target.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Spammer Group\u003c/strong\u003e, which provides tools to send fraudulent text messages in bulk.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Theft Group\u003c/strong\u003e, which helps monetize stolen information and launder funds from stolen credit cards.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Telegram Group\u003c/strong\u003e, which facilitates collaboration among members and recruits new members.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance-described-in-the-article\"\u003eSignificance described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the advantage of services like Outsider to the recently disrupted Sniper Dz, stating that such platforms lower the barrier to entry for novice fraudsters without programming knowledge. By providing ready-made templates, automation, and supporting infrastructure, these services allow users to mount convincing phishing attacks with minimal effort and at scale.\u003c/p\u003e\n\n\u003cp\u003eBrett Leatherman, assistant director of the FBI’s Cyber Division, said the criminals behind the Outsider Enterprise built a business out of impersonating trusted brands to defraud hundreds of thousands of victims. He also said criminals increasingly use AI to make fraud more convincing and harder to detect.\u003c/p\u003e\n","keyPoints":["Google said it is pursuing legal action against a Chinese cybercrime network accused of using its Gemini AI agent to generate fraudulent phishing pages and support SMS phishing attacks targeting Americans.","The network allegedly developed and managed a phishing-as-a-service kit called Outsider, which enables criminals to create fake websites, launch phishing campaigns, and steal credit card numbers, bank credentials, and personal data.","Google said it is filing the lawsuit to dismantle the network’s infrastructure and is partnering with AT\u0026T, T-Mobile, and Verizon to block related messages from reaching customers.","Google identified 9,000 fake websites and more than 1.59 million fraudulent URLs tied to Outsider between November 14, 2025, and April 14, 2026.","The Outsider service offers more than 290 pre-built templates impersonating trusted institutions, real-time keystroke logging, and a dashboard to track campaign performance."],"insights":["Outsider’s use of a self-service Telegram ordering bot and $88 weekly pricing shows the operation is packaged for low-friction access by criminals rather than limited to technically skilled operators.","The phishing workflow described by Google uses prompts framed as harmless web-development requests, indicating that abuse can occur through seemingly benign AI interactions rather than overtly malicious prompt language.","Google’s collaboration with AT\u0026T, T-Mobile, and Verizon suggests that disrupting smishing campaigns requires carrier-level blocking in addition to takedowns of phishing infrastructure.","The operation is organized into specialized groups for development, target data, bulk texting, theft monetization, laundering, and recruitment, making it resemble a service-based criminal enterprise rather than a single phishing crew."],"referencedReports":[],"body":"\u003cp\u003eGoogle said it is pursuing legal action against a Chinese cybercrime network accused of using its Gemini AI agent to support phishing text-message campaigns targeting Americans. The network allegedly developed and managed a phishing-as-a-service kit called Outsider. Google said the operation used Gemini to help generate fraudulent phishing pages and deploy large-scale SMS phishing attacks impersonating legitimate brands.\u003c/p\u003e\n\n\u003cp\u003eAccording to Google, Outsider’s schemes have victimized more than 100,000 people and caused millions of dollars in losses. The company said it identified 9,000 fake websites and more than 1.59 million fraudulent URLs tied to the service between November 14, 2025, and April 14, 2026. Google also said it is working with AT\u0026amp;T, T-Mobile, and Verizon to block such messages from reaching customers.\u003c/p\u003e\n\n\u003cp\u003eThe Outsider kit can be purchased for as little as $88 per week through a self-service ordering bot on Telegram. It offers more than 290 templates impersonating trusted institutions, real-time keystroke logging, and a dashboard to track campaign effectiveness. Google’s complaint says members can use AI-generated code to create shell websites and transform them into fraudulent sites designed to steal personal and financial information.\u003c/p\u003e\n"},{"n":4,"title":"Maine disables data breach notification portal after fake disclosures","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/maine-disables-data-breach-notification-portal-after-fake-disclosures/","time":"19:33","priority":"MAY READ","score":68,"tldr":"Maine took its public data breach notification portal offline after fake disclosures impersonating VRChat and Discord were automatically published. The state is reviewing its reporting procedures to prevent future abuse while companies can still submit notices privately.","briefOverview":"\u003cp\u003eMaine has taken its public data breach reporting portal offline after fraudulent breach disclosures were published on the state’s website. The false notices impersonated Discord and VRChat, and VRChat told BleepingComputer that the filing was fraudulent and used the name of a fictitious employee. The Maine Attorney General’s Office said the reported breaches were hoaxes submitted by an unknown entity unrelated to either company.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because submitted breach notices were automatically published to Maine’s public database before the shutdown. The Attorney General’s Office said it has no independent knowledge of the breaches and that the submitting entity fills out the information, which then goes directly onto the site. The office removed the false reports and temporarily disabled public access while it reviews procedures to reduce similar abuse.\u003c/p\u003e\n\n\u003cp\u003eCompanies can still submit breach notifications through the reporting service, but members of the public must now contact the Attorney General’s Office directly for copies of disclosures. Maine’s portal is used by journalists, researchers, and threat intelligence firms to monitor newly disclosed incidents. The fraudulent VRChat filing claimed a breach affecting more than 2.4 million people, but VRChat confirmed it had not submitted the notice.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMaine disabled public access to its data breach notification database after fraudulent breach disclosures were submitted and published through the state’s reporting portal. The fake notices impersonated Discord and VRChat, the multiplayer social virtual reality platform. The Maine Attorney General’s Office acknowledged that data breach “hoaxes” had been submitted through the reporting system.\u003c/p\u003e\n\n\u003cp\u003eThe Attorney General’s Office said that after conversations with VRChat, it became clear that the reported breaches were hoaxes submitted by an unknown entity unrelated to either company. The office said the false reports were removed from the database. It also stated that it had no knowledge of any recent legitimate data breach reports from either VRChat or Discord.\u003c/p\u003e\n\n\u003cp\u003eBefore the shutdown, submitted breach notices were automatically published to Maine’s public database. The Attorney General’s Office told BleepingComputer that it did not have independent knowledge of the breaches and that the submitting entity filled out the information, which went directly onto the site. The office said it would review the flagged notice.\u003c/p\u003e\n\n\u003cp\u003eThe fraudulent VRChat filing claimed the company suffered a data breach affecting more than 2.4 million people. It also included a fabricated employee contact name in the disclosure. VRChat confirmed to BleepingComputer that the disclosure was fake and said it had not submitted the notice to Maine authorities.\u003c/p\u003e\n\n\u003cp\u003eThe Maine Attorney General’s Office has temporarily disabled public access while it reviews reporting procedures to reduce similar abuse in the future. Companies can still submit breach notifications through the reporting service. Members of the public seeking copies of disclosures must now contact the Attorney General’s Office directly.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Maine’s breach portal is commonly used by journalists, researchers, and threat intelligence firms to monitor newly disclosed security incidents and determine whether organizations are reporting cyberattacks or data breaches affecting consumers. It also states that the incident demonstrates how automatically published breach disclosures can be abused to spread misinformation and damage a company’s reputation. BleepingComputer contacted Discord about the fraudulent notice but did not receive a response.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMaine has taken its public data breach reporting portal offline after fraudulent breach disclosures were submitted and published on the state’s website. The fake disclosures impersonated Discord and VRChat. The Maine Attorney General’s Office described the submissions as apparent abuse of the state’s data breach reporting system.\u003c/p\u003e\n\n\u003cp\u003eThe office said that after conversations with VRChat, one of the two affected companies, it became clear that the reported data breaches were hoaxes. According to the statement, the hoaxes were submitted by an unknown entity unrelated to either company. The false reports were removed from the database.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected parties\u003c/h2\u003e\n\n\u003cp\u003eThe fraudulent disclosures named two companies:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVRChat, described in the article as a multiplayer social virtual reality platform.\u003c/li\u003e\n\u003cli\u003eDiscord.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVRChat told BleepingComputer that the filing was fraudulent and had been submitted using the name of a fictitious employee. After BleepingComputer contacted VRChat about the filing, the company confirmed the disclosure was fake and said it had not submitted the notice to Maine authorities.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer also contacted Discord about the fraudulent notice submitted to the site, but the article says Discord did not respond.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-fake-filing-claimed\"\u003eWhat the fake filing claimed\u003c/h2\u003e\n\n\u003cp\u003eThe fraudulent VRChat filing claimed that the company had suffered a data breach affecting more than 2.4 million people. The disclosure also included a fabricated employee contact name. VRChat disputed the filing and confirmed it was not submitted by the company.\u003c/p\u003e\n\n\u003cp\u003eThe Maine Attorney General’s Office said it had no knowledge of any recent legitimate data breach reports from either VRChat or Discord.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-portal-was-abused\"\u003eHow the portal was abused\u003c/h2\u003e\n\n\u003cp\u003eBefore the shutdown, submitted breach notices were automatically published to Maine’s public database. The Attorney General’s Office told BleepingComputer that it did not have independent knowledge of the breaches submitted through the system. It said the submitting entity filled out the information, and the information went directly onto the site.\u003c/p\u003e\n\n\u003cp\u003eThis process allowed the fraudulent disclosures to appear in an official public database. The article states that the incident demonstrates how automatically published breach disclosures can be abused to spread misinformation and damage a company’s reputation.\u003c/p\u003e\n\n\u003ch2 id=\"maine-s-response\"\u003eMaine’s response\u003c/h2\u003e\n\n\u003cp\u003eThe Maine Attorney General’s Office temporarily disabled public access to the breach notification database. The office said it is reviewing reporting procedures to reduce similar abuse in the future. It also removed the false reports from the database.\u003c/p\u003e\n\n\u003cp\u003eCompanies can continue to submit breach notifications through the reporting service. However, members of the public seeking copies of disclosures must now contact the Attorney General’s Office directly.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-portal\"\u003eSignificance of the portal\u003c/h2\u003e\n\n\u003cp\u003eThe article says Maine’s data breach portal is commonly used by journalists, researchers, and threat intelligence firms. These groups use the portal to monitor newly disclosed security incidents. They also use it to determine whether organizations are reporting cyberattacks or data breaches affecting consumers.\u003c/p\u003e\n\n\u003cp\u003eBecause the portal was public and notices were automatically published, fraudulent submissions could be seen by people who rely on the database for breach monitoring. The article says it is unclear how many additional fraudulent breach notices may have been submitted through the portal before public access was suspended.\u003c/p\u003e\n\n\u003ch2 id=\"known-actor-information\"\u003eKnown actor information\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify the entity that submitted the fake notices. The Maine Attorney General’s Office described the submitter as an unknown entity unrelated to VRChat or Discord. No named threat actor or group is attributed in the article.\u003c/p\u003e\n","keyPoints":["Maine temporarily disabled public access to its data breach notification database after fraudulent breach disclosures were submitted and published on the state website.","The fake disclosures impersonated Discord and VRChat, and VRChat told BleepingComputer the filing was fraudulent and used the name of a fictitious employee.","The Maine Attorney General's Office said the false reports were removed and that it had no knowledge of any recent legitimate breach reports from VRChat or Discord.","Before the shutdown, submitted breach notices were automatically published to the public database without independent verification by the Attorney General's Office.","Companies can still submit breach notifications through the reporting service, but the public must contact the Attorney General's Office directly to obtain copies of disclosures."],"insights":["Automatically publishing breach notices without verification created a mechanism for third parties to spread false security claims through an official government source.","Organizations named in public breach portals may need to monitor those databases and rapidly validate questionable filings to prevent reputational damage from fraudulent disclosures.","Maine’s portal was influential beyond regulatory compliance because journalists, researchers, and threat intelligence firms used it to track newly disclosed incidents.","Requiring the public to request disclosures directly from the Attorney General’s Office reduces immediate misinformation risk but also limits real-time visibility into legitimate breach reports."],"referencedReports":[],"body":"\u003cp\u003eMaine has taken its public data breach reporting portal offline after fraudulent breach disclosures were published on the state’s website. The false notices impersonated Discord and VRChat, and VRChat told BleepingComputer that the filing was fraudulent and used the name of a fictitious employee. The Maine Attorney General’s Office said the reported breaches were hoaxes submitted by an unknown entity unrelated to either company.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because submitted breach notices were automatically published to Maine’s public database before the shutdown. The Attorney General’s Office said it has no independent knowledge of the breaches and that the submitting entity fills out the information, which then goes directly onto the site. The office removed the false reports and temporarily disabled public access while it reviews procedures to reduce similar abuse.\u003c/p\u003e\n\n\u003cp\u003eCompanies can still submit breach notifications through the reporting service, but members of the public must now contact the Attorney General’s Office directly for copies of disclosures. Maine’s portal is used by journalists, researchers, and threat intelligence firms to monitor newly disclosed incidents. The fraudulent VRChat filing claimed a breach affecting more than 2.4 million people, but VRChat confirmed it had not submitted the notice.\u003c/p\u003e\n"}];
