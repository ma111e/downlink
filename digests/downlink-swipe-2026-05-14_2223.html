window.__DL_ARTICLES = [{"n":13,"title":"18-Year-Old NGINX Rewrite Module Flaw Enables Unauthenticated RCE","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/18-year-old-nginx-rewrite-module-flaw.html","time":"06:00","priority":"MUST READ","score":98,"tldr":"F5 and researchers have patched a critical unauthenticated remote code execution flaw in NGINX's rewrite module, urging immediate updates or configuration changes to use named regex captures instead of unnamed ones.","briefOverview":"\u003cp\u003eCybersecurity researchers have disclosed a critical heap buffer overflow in NGINX\u0026rsquo;s rewrite module that remained undetected for 18 years. The flaw, identified as CVE-2026-42945 and codenamed NGINX Rift, carries a CVSS v4 score of 9.2 and allows unauthenticated attackers to trigger remote code execution or cause a denial of service. Exploitation occurs when a rewrite directive uses an unnamed PCRE capture followed by a replacement string containing a question mark. F5 released an advisory confirming the vulnerability and detailing the specific conditions required for exploitation. Patches are now available for NGINX Plus and Open Source versions, with temporary workarounds recommending the use of named regex captures instead of unnamed ones. Additionally, three other vulnerabilities were patched, including an excessive memory allocation issue, a use-after-free flaw, and an out-of-bounds read vulnerability. Users are strongly advised to apply the latest updates or adjust their rewrite configurations immediately to mitigate these risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have disclosed multiple security vulnerabilities impacting NGINX Plus and NGINX Open Source, including a critical flaw that persisted for 18 years. The primary issue, discovered by depthfirst and tracked as CVE-2026-42945, is a heap buffer overflow within the ngx_http_rewrite_module. This vulnerability carries a CVSS v4 score of 9.2 and is codenamed NGINX Rift. It can be exploited by an unauthenticated attacker sending crafted HTTP requests that trigger a heap buffer overflow in the NGINX worker process. The overflow leads to a process restart or, on systems with Address Space Layout Randomization disabled, remote code execution. Exploitation specifically requires a rewrite directive followed by a rewrite, if, or set directive that utilizes an unnamed PCRE capture alongside a replacement string containing a question mark. F5 issued an advisory on Wednesday detailing these conditions and confirming the responsible disclosure made on April 21, 2026. Patches have been deployed across multiple product lines, including specific updates for NGINX Plus R32 through R36 and NGINX Open Source versions 1.0.0 through 1.30.0. Older open source versions from 0.6.27 to 0.9.7 will not receive fixes. F5 also recommends a configuration workaround for unpatched systems by replacing unnamed regex captures with named captures in all affected rewrite directives. Beyond the critical rewrite flaw, three additional vulnerabilities were addressed in the same release cycle. CVE-2026-42946, scoring 8.3, involves excessive memory allocation in the SCGI and uWSGI modules that could allow memory reading or process restarts. CVE-2026-40701, scoring 6.3, is a use-after-free issue in the SSL module triggered when specific client verification and OCSP directives are enabled. Finally, CVE-2026-42934, also scoring 6.3, is an out-of-bounds read in the charset module that occurs when proxy pass is configured with disabled buffering. All affected users are advised to apply the latest available versions to ensure optimal protection against these threats.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eCybersecurity researchers have disclosed a series of security flaws affecting NGINX Plus and NGINX Open Source, most notably a critical heap buffer overflow that went undetected for 18 years. The primary vulnerability, identified as CVE-2026-42945 and codenamed NGINX Rift, resides within the ngx_http_rewrite_module. It carries a CVSS v4 score of 9.2 and poses a severe risk to unauthenticated remote attackers.\u003c/p\u003e\n\n\u003ch3 id=\"exploitation-mechanics-and-impact\"\u003eExploitation Mechanics and Impact\u003c/h3\u003e\n\n\u003cp\u003eThe flaw triggers when a rewrite directive is followed by a rewrite, if, or set directive that employs an unnamed PCRE capture, such as \u003cspan class=\"math inline\"\u003e\\(1 or \\)\u003c/span\u003e2. If the replacement string for this capture includes a question mark, sending a crafted HTTP request causes a heap buffer overflow in the NGINX worker process. This overflow can reliably crash the worker, resulting in a denial of service. On systems where Address Space Layout Randomization is disabled, the attacker can achieve remote code execution. The corruption bytes are directly derived from the attacker\u0026rsquo;s URI, allowing precise control over the heap corruption.\u003c/p\u003e\n\n\u003ch3 id=\"disclosure-and-patching-status\"\u003eDisclosure and Patching Status\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability was responsibly disclosed to F5 on April 21, 2026, and addressed in the following product versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX Plus R32 through R36, with fixes introduced in R32 P6 and R36 P4.\u003c/li\u003e\n\u003cli\u003eNGINX Open Source 1.0.0 through 1.30.0, patched in versions 1.30.1 and 1.31.0.\u003c/li\u003e\n\u003cli\u003eNGINX Open Source 0.6.27 through 0.9.7, which will not receive updates.\u003c/li\u003e\n\u003cli\u003eNGINX Instance Manager 2.16.0 through 2.21.1.\u003c/li\u003e\n\u003cli\u003eF5 WAF for NGINX 5.9.0 through 5.12.1.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect WAF 4.9.0 through 4.16.0 and 5.1.0 through 5.8.0.\u003c/li\u003e\n\u003cli\u003eF5 DoS for NGINX 4.8.0.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect DoS 4.3.0 through 4.7.0.\u003c/li\u003e\n\u003cli\u003eNGINX Gateway Fabric 1.3.0 through 1.6.2 and 2.0.0 through 2.5.1.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 3.5.0 through 3.7.2, 4.0.0 through 4.0.1, and 5.0.0 through 5.4.1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mitigation-recommendations\"\u003eMitigation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eF5 advises applying the latest patches for optimal security. If immediate patching is not feasible for CVE-2026-42945, administrators should modify their rewrite configurations. The recommended workaround involves replacing all unnamed regex captures with named captures in every affected rewrite directive to prevent the heap overflow condition.\u003c/p\u003e\n\n\u003ch3 id=\"additional-patched-vulnerabilities\"\u003eAdditional Patched Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eThe same release cycle addressed three other distinct flaws within NGINX modules:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-42946 (CVSS v4: 8.3): An excessive memory allocation vulnerability in the ngx_http_scgi_module and ngx_http_uwsgi_module. This flaw allows an adversary-in-the-middle to control upstream responses, potentially reading worker memory or restarting the process when scgi_pass or uwsgi_pass is configured.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40701 (CVSS v4: 6.3): A use-after-free vulnerability in the ngx_http_ssl_module. It can be exploited when ssl_verify_client is set to on or optional, and ssl_ocsp is enabled, allowing limited data modification or process restarts.\u003c/li\u003e\n\u003cli\u003eCVE-2026-42934 (CVSS v4: 6.3): An out-of-bounds read vulnerability in the ngx_http_charset_module. This issue occurs when charset, source_charset, and charset_map directives are active alongside proxy_pass with disabled buffering, enabling memory disclosure or worker restarts.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A critical heap buffer overflow in NGINX's rewrite module, identified as CVE-2026-42945, enables unauthenticated remote code execution or denial of service.","The vulnerability is triggered when a rewrite directive uses an unnamed PCRE capture followed by a replacement string that includes a question mark.","Patches have been released for multiple NGINX Plus and Open Source versions, with F5 recommending a configuration change to replace unnamed captures with named captures as a temporary workaround.","Three additional flaws were also addressed, including an excessive memory allocation issue in the SCGI and uWSGI modules, a use-after-free vulnerability in the SSL module, and an out-of-bounds read in the charset module."],"insights":["The vulnerability triggers specifically when a rewrite directive uses an unnamed PCRE capture followed by a replacement string that includes a question mark.","Remote code execution is only possible on systems where Address Space Layout Randomization (ASLR) is disabled, whereas the vulnerability can cause a denial of service regardless of ASLR status.","F5 recommends a configuration workaround for unpatched systems that involves replacing unnamed regex captures with named captures in every affected rewrite directive.","The critical flaw remained undetected for 18 years before being disclosed by the security researcher depthfirst."],"referencedReports":[{"title":"NGINX Rift Vulnerability Research","url":"https://depthfirst.com/nginx-rift","publisher":"depthfirst","context":"The article cites this as the source where the researcher discovered and disclosed the critical heap buffer overflow flaw.","category":"","primary":false},{"title":"F5 Advisory on NGINX Rewrite Module Vulnerability","url":"https://my.f5.com/manage/s/article/K000161019","publisher":"F5","context":"The article references this advisory where F5 details the vulnerability's existence in the rewrite directive and affected versions.","category":"","primary":false},{"title":"F5 Advisory for CVE-2026-42946","url":"https://my.f5.com/manage/s/article/K000161027","publisher":"F5","context":"The article links to this advisory for details on the excessive memory allocation vulnerability in the SCGI and uWSGI modules.","category":"","primary":false},{"title":"F5 Advisory for CVE-2026-40701","url":"https://my.f5.com/manage/s/article/K000161021","publisher":"F5","context":"The article links to this advisory for details on the use-after-free vulnerability in the SSL module.","category":"","primary":false},{"title":"F5 Advisory for CVE-2026-42934","url":"https://my.f5.com/manage/s/article/K000161028","publisher":"F5","context":"The article links to this advisory for details on the out-of-bounds read vulnerability in the charset module.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have disclosed a critical heap buffer overflow in NGINX\u0026rsquo;s rewrite module that remained undetected for 18 years. The flaw, identified as CVE-2026-42945 and codenamed NGINX Rift, carries a CVSS v4 score of 9.2 and allows unauthenticated attackers to trigger remote code execution or cause a denial of service. Exploitation occurs when a rewrite directive uses an unnamed PCRE capture followed by a replacement string containing a question mark. F5 released an advisory confirming the vulnerability and detailing the specific conditions required for exploitation. Patches are now available for NGINX Plus and Open Source versions, with temporary workarounds recommending the use of named regex captures instead of unnamed ones. Additionally, three other vulnerabilities were patched, including an excessive memory allocation issue, a use-after-free flaw, and an out-of-bounds read vulnerability. Users are strongly advised to apply the latest updates or adjust their rewrite configurations immediately to mitigate these risks.\u003c/p\u003e\n"},{"n":16,"title":"Active Supply Chain Attack: Malicious node-ipc Versions Published to npm","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/node-ipc-npm-supply-chain-attack","time":"17:38","priority":"MUST READ","score":98,"tldr":"A compromised maintainer account published three malicious versions of the popular node-ipc npm package containing an obfuscated payload that silently harvests and exfiltrates sensitive credentials. If you installed versions 9.1.6, 9.2.3, or 12.0.1, assume all secrets on that system are compromised and rotate them immediately.","briefOverview":"\u003cp\u003eOn May 14, 2026, a rogue maintainer account published three malicious versions of the widely used node-ipc npm package: 9.1.6, 9.2.3, and 12.0.1. These releases contain an 80 KB obfuscated payload injected directly into the CommonJS bundle that executes immediately upon module import. The malware silently harvests over 90 categories of sensitive credentials, including cloud provider keys, SSH certificates, Kubernetes tokens, and database passwords. It compresses the stolen data and exfiltrates it through either HTTPS connections or direct DNS queries to an attacker-controlled server. Version 12.0.1 includes a precise targeting gate that restricts execution to specific systems, while the 9.x versions run unconditionally on any machine that loads the package. The attack bypasses standard lifecycle hook scanners by appending the malicious code to the end of the compiled bundle. Organizations that installed these versions must assume all accessible secrets are compromised and rotate them immediately. Developers should update their dependencies to clean releases like 9.2.1 or 12.0.0 and audit their environments for residual daemon processes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn May 14, 2026, three malicious versions of the foundational node-ipc npm package were simultaneously published to the registry. Versions 9.1.6, 9.2.3, and 12.0.1 were uploaded by the account \u003ccode\u003eatiertant\u003c/code\u003e, which is listed as a maintainer but has no prior history with the project. Each release contains an identical 80 KB obfuscated credential-stealing payload appended to the CommonJS bundle. The malicious code executes unconditionally whenever an application loads the package via \u003ccode\u003erequire('node-ipc')\u003c/code\u003e. It avoids detection by skipping preinstall and postinstall scripts, relying instead on an Immediately Invoked Function Expression at the end of the compiled file. Execution is scheduled via setImmediate to avoid blocking the event loop and raising immediate red flags.\u003c/p\u003e\n\n\u003cp\u003eThe payload decodes its configuration and checks for a targeting gate in version 12.0.1. This gate computes a SHA-256 hash of the module\u0026rsquo;s file path and only proceeds if it matches a hardcoded value. If the system matches the target or if the attacker is using a 9.x version, the malware spawns a detached daemon process. The daemon enumerates the environment and scans for over 90 categories of sensitive files. The target list includes AWS and Azure credentials, SSH keys, Kubernetes configs, AI tool settings, Terraform states, and shell histories. All collected data is packaged into a gzip-compressed archive and exfiltrated through two independent channels.\u003c/p\u003e\n\n\u003cp\u003eThe first channel sends the data via chunked HTTPS requests to a domain mimicking Azure infrastructure. The second channel overrides the system DNS resolver to send hex-encoded data chunks directly to the attacker\u0026rsquo;s IP over UDP port 53. The payload uses advanced obfuscation techniques, including string array shuffling, control flow flattening, and a custom base-16 cipher with reversed nibble order. Security researchers identified the attack as financially motivated and distinct from the package\u0026rsquo;s previous 2022 compromise. Organizations that installed any of the compromised versions must assume all environment secrets are breached. Immediate remediation requires pinning dependencies to clean releases like 9.2.1 or 12.0.0 and rotating all associated credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eOn May 14, 2026, a supply chain attack targeted the widely downloaded node-ipc npm package. Three malicious versions, 9.1.6, 9.2.3, and 12.0.1, were published simultaneously by the maintainer account \u003ccode\u003eatiertant\u003c/code\u003e. This account appears in the project\u0026rsquo;s official maintainer list but has no prior publishing history on the repository. The attack deliberately targeted multiple semver ranges to maximize the blast radius across different project configurations. The compromised versions contain an identical 80 KB obfuscated payload injected into the CommonJS bundle file.\u003c/p\u003e\n\n\u003ch3 id=\"payload-execution-and-evasion\"\u003ePayload Execution and Evasion\u003c/h3\u003e\n\n\u003cp\u003eThe malicious code is structured as an Immediately Invoked Function Expression appended to the end of the compiled module. It executes unconditionally the moment Node.js evaluates the CommonJS file upon import. The attacker deliberately omitted lifecycle hooks from package.json to evade security tools that only scan install scripts. Execution is scheduled via setImmediate to avoid blocking the event loop and raising immediate red flags. The ESM entry point and individual source files remain untouched, meaning only projects using the CommonJS bundle are affected.\u003c/p\u003e\n\n\u003ch3 id=\"targeting-and-daemonization\"\u003eTargeting and Daemonization\u003c/h3\u003e\n\n\u003cp\u003eVersion 12.0.1 includes a precise targeting gate that computes a SHA-256 hash of the module\u0026rsquo;s normalized file path. The payload only proceeds if the computed hash matches a hardcoded value assembled from obfuscated fragments. This ensures the malware executes only on the attacker\u0026rsquo;s intended target systems. Versions 9.1.6 and 9.2.3 lack this gate and run unconditionally on any system that loads the package. Upon execution, the payload checks for the \u003ccode\u003e__ntw\u003c/code\u003e environment variable. If absent, it spawns a detached clone of the current process with the variable set to one, allowing the parent application to continue normally.\u003c/p\u003e\n\n\u003ch3 id=\"credential-harvesting-and-exfiltration\"\u003eCredential Harvesting and Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eThe daemon enumerates the system and scans for over 90 categories of sensitive files using a custom-encoded path list. The target list spans cloud provider credentials, SSH keys, Kubernetes tokens, AI tool configurations, Terraform states, database passwords, and shell histories. All matched files are assembled into a ustar-format archive alongside system metadata and environment variables. The archive is compressed using zlib and exfiltrated through two simultaneous channels. The first channel sends the data via chunked HTTPS requests to a domain crafted to mimic Azure infrastructure. The second channel overrides the system DNS resolver to send hex-encoded data chunks directly to the attacker\u0026rsquo;s IP over UDP port 53. This direct DNS approach bypasses corporate resolver logs and prevents standard DNS monitoring from detecting the exfiltration.\u003c/p\u003e\n\n\u003ch3 id=\"obfuscation-techniques\"\u003eObfuscation Techniques\u003c/h3\u003e\n\n\u003cp\u003eThe payload utilizes a multi-layered obfuscation strategy to resist static analysis. It employs a 443-entry string array that is rotated at load time and guarded by a checksum. Control flow is flattened using pipe-delimited strings consumed by switch dispatch loops. Dummy comparison functions and opaque predicates are injected to mislead automated analysis tools. The most sophisticated layer is a custom base-16 cipher that replaces standard hex letters with visually distinct uppercase characters. Bytes are assembled in a reversed nibble order, rendering standard hex decoders ineffective without reversing the byte pairs.\u003c/p\u003e\n\n\u003ch3 id=\"remediation-and-detection\"\u003eRemediation and Detection\u003c/h3\u003e\n\n\u003cp\u003eOrganizations that installed any of the compromised versions must assume all accessible secrets are breached. Immediate steps include pinning dependencies to clean releases like 9.2.1 or 12.0.0 and regenerating lockfiles. Developers should check for residual staging directories and daemon processes marked with the \u003ccode\u003e__ntw\u003c/code\u003e environment variable. All credentials, tokens, and environment secrets must be rotated immediately. Detection signals include the presence of the compromised versions in lockfiles, anomalous file sizes in the CommonJS bundle, and outbound network traffic to the attacker\u0026rsquo;s C2 infrastructure. Security teams should also audit CI/CD environments and review egress logs for connections to the identified C2 domains and IP addresses.\u003c/p\u003e\n","keyPoints":["Three malicious versions of the node-ipc npm package (9.1.6, 9.2.3, and 12.0.1) were published on May 14, 2026, by a rogue maintainer account containing an obfuscated credential-harvesting payload.","The malicious code executes unconditionally upon loading the CommonJS bundle and exfiltrates over 90 categories of credentials, including cloud keys, SSH certificates, and database passwords, via HTTPS or DNS.","Version 12.0.1 features a SHA-256 targeting gate that limits execution to specific systems, whereas the 9.x versions run on any system that imports the package.","Developers must immediately update their dependencies to clean versions such as 9.2.1 or 12.0.0 and rotate all credentials accessible on the affected environments.","The attack bypasses lifecycle hook scanners by injecting the payload directly into the end of the CommonJS bundle, ensuring it triggers only when the module is required by an application."],"insights":["The payload employs a custom base-16 cipher with reversed nibble order and a non-standard alphabet to obfuscate C2 addresses and authentication keys, rendering standard hex decoders ineffective.","Version 12.0.1 includes a SHA-256 targeting gate that hashes the module's file path against a hardcoded value, ensuring the malicious code executes only on systems matching the attacker's pre-computed signature.","The malware bypasses corporate DNS security controls by overriding the system resolver to directly query the C2 IP on UDP port 53, preventing exfiltration traffic from appearing in standard DNS logs.","The attacker fabricated entirely synthetic 9.x tarballs that never contained a CommonJS bundle in the legitimate repository, exploiting semver ranges to maximize the installation blast radius across unrelated project configurations."],"referencedReports":[],"body":"\u003cp\u003eOn May 14, 2026, a rogue maintainer account published three malicious versions of the widely used node-ipc npm package: 9.1.6, 9.2.3, and 12.0.1. These releases contain an 80 KB obfuscated payload injected directly into the CommonJS bundle that executes immediately upon module import. The malware silently harvests over 90 categories of sensitive credentials, including cloud provider keys, SSH certificates, Kubernetes tokens, and database passwords. It compresses the stolen data and exfiltrates it through either HTTPS connections or direct DNS queries to an attacker-controlled server. Version 12.0.1 includes a precise targeting gate that restricts execution to specific systems, while the 9.x versions run unconditionally on any machine that loads the package. The attack bypasses standard lifecycle hook scanners by appending the malicious code to the end of the compiled bundle. Organizations that installed these versions must assume all accessible secrets are compromised and rotate them immediately. Developers should update their dependencies to clean releases like 9.2.1 or 12.0.0 and audit their environments for residual daemon processes.\u003c/p\u003e\n"},{"n":2,"title":"Ongoing exploitation of Cisco Catalyst SD-WAN vulnerabilities","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/sd-wan-ongoing-exploitation/","time":"16:02","priority":"MUST READ","score":95,"tldr":"Cisco Catalyst SD-WAN systems are actively being exploited by multiple threat actors using recently disclosed vulnerabilities to deploy webshells and command-and-control implants, making immediate patching and security monitoring critical.","briefOverview":"\u003cp\u003eCisco Talos is actively tracking the exploitation of multiple vulnerabilities in Cisco Catalyst SD-WAN Controller and Manager. The threat actor UAT-8616 is exploiting CVE-2026-20182 to bypass authentication and escalate privileges. Meanwhile, separate threat clusters have been chaining CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122 since March 2026. These actors leverage publicly available proof-of-concept code to deploy JSP-based webshells and command-and-control implants. Post-compromise activities include deploying cryptocurrency miners, credential stealers, network scanning tools, and customized backdoors. Cisco strongly recommends applying the February and May 2026 security updates to mitigate these threats. Organizations should also monitor for the provided Snort and ClamAV signatures to detect ongoing malicious activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos is documenting the active exploitation of several critical vulnerabilities affecting Cisco Catalyst SD-WAN infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe sophisticated threat actor UAT-8616 is actively exploiting CVE-2026-20182, an authentication bypass flaw, to gain administrative access.\u003c/p\u003e\n\n\u003cp\u003eFollowing unauthorized access, UAT-8616 attempts to add SSH keys, modify NETCONF configurations, and escalate to root privileges using infrastructure linked to Operational Relay Box networks.\u003c/p\u003e\n\n\u003cp\u003eIn addition to UAT-8616, multiple distinct threat clusters have been exploiting a chain of three vulnerabilities: CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122.\u003c/p\u003e\n\n\u003cp\u003eExploitation of these chained flaws began in March 2026 shortly after ZeroZenX Labs published proof-of-concept code.\u003c/p\u003e\n\n\u003cp\u003eAttackers primarily utilize this public exploit to deploy JavaServer Pages webshells, with the most common variant tracked as \u0026ldquo;XenShell\u0026rdquo;.\u003c/p\u003e\n\n\u003cp\u003ePost-compromise activities across ten identified clusters reveal diverse malicious tooling.\u003c/p\u003e\n\n\u003cp\u003eCluster 1 and Cluster 4 deployed modified variants of the Godzilla webshell, specifically \u0026ldquo;20251117022131.jsp\u0026rdquo; and \u0026ldquo;vmurnp_ikp.jsp,\u0026rdquo; respectively.\u003c/p\u003e\n\n\u003cp\u003eCluster 2 and Cluster 3 utilized customized Behinder webshells, including \u0026ldquo;conf.jsp\u0026rdquo; and \u0026ldquo;sysinit.jsp,\u0026rdquo; with Cluster 3 also utilizing XenShell.\u003c/p\u003e\n\n\u003cp\u003eOther clusters have introduced advanced command-and-control frameworks, including AdaptixC2 and Sliver.\u003c/p\u003e\n\n\u003cp\u003eCryptocurrency mining operations using XMRig and MoneroOcean have been observed alongside peer-to-peer tunneling tools like gsocket.\u003c/p\u003e\n\n\u003cp\u003eNetwork reconnaissance is conducted using a renamed version of KScan, and a customized Nim-based backdoor was downloaded via Replit.\u003c/p\u003e\n\n\u003cp\u003eCredential harvesting scripts target JWT keys, AWS credentials, and root escalation passwords.\u003c/p\u003e\n\n\u003cp\u003eCisco strongly advises immediate patching and recommends utilizing the published Snort and ClamAV signatures for detection.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams should also review the detailed indicators of compromise provided for each threat cluster.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eCisco Talos has published a detailed threat advisory outlining the active exploitation of multiple vulnerabilities within Cisco Catalyst SD-WAN Controller and Manager.\u003c/p\u003e\n\n\u003cp\u003eThe advisory highlights two distinct exploitation campaigns targeting unpatched SD-WAN infrastructure.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eUAT-8616 Exploitation of CVE-2026-20182\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe highly sophisticated threat actor UAT-8616 is actively exploiting CVE-2026-20182, an authentication bypass vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThis flaw allows unauthenticated remote attackers to log in as an internal, high-privileged, non-root user.\u003c/p\u003e\n\n\u003cp\u003eFollowing successful exploitation, UAT-8616 performs post-compromise actions that mirror previous campaigns, including adding SSH keys, modifying NETCONF configurations, and attempting root privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe actor\u0026rsquo;s infrastructure overlaps with Operational Relay Box networks, indicating a persistent and advanced threat presence.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWidespread Exploitation of CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA separate wave of exploitation targets three distinct vulnerabilities that can be chained together to achieve unauthenticated remote access.\u003c/p\u003e\n\n\u003cp\u003eCisco released security updates for these flaws in February 2026, but widespread exploitation began in March 2026 following the public release of proof-of-concept code by ZeroZenX Labs.\u003c/p\u003e\n\n\u003cp\u003eThe vast majority of these attacks utilize the ZeroZenX Labs exploit to deploy JSP-based webshells, most notably a variant tracked as \u0026ldquo;XenShell\u0026rdquo;.\u003c/p\u003e\n\n\u003cp\u003eTalos has identified ten distinct clusters of post-compromise activity, each deploying unique malicious tooling.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetailed Cluster Analysis\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 1 \u0026amp; Cluster 4:\u003c/strong\u003e These clusters deployed modified variants of the Godzilla webshell, specifically \u0026ldquo;20251117022131.jsp\u0026rdquo; and \u0026ldquo;vmurnp_ikp.jsp,\u0026rdquo; respectively.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 2 \u0026amp; Cluster 3:\u003c/strong\u003e Attackers in these clusters deployed customized Behinder webshells, including \u0026ldquo;conf.jsp\u0026rdquo; and \u0026ldquo;sysinit.jsp,\u0026rdquo; with Cluster 3 also utilizing XenShell.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 5:\u003c/strong\u003e This cluster deployed a malware agent compiled from the AdaptixC2 red team framework, featuring a modified TCP banner reading \u0026ldquo;shadowcore\u0026rdquo;.\u003c/li\u003e\n\u003cli\u003eThe associated command-and-control server also hosted a Mythic C2 server and an open SSH service.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 6:\u003c/strong\u003e Threat actors deployed the open-source Sliver adversarial emulation framework, communicating over mutual TLS to the C2 endpoint.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 7:\u003c/strong\u003e This cluster focused on cryptocurrency mining, downloading XMRig and its configuration files via a remote script.\u003c/li\u003e\n\u003cli\u003eThe hosting IP is also associated with Cobalt Strike command-and-control activity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 8:\u003c/strong\u003e Attackers utilized a renamed asset mapping tool called QScan and deployed a customized Nim-based backdoor.\u003c/li\u003e\n\u003cli\u003eThe backdoor was downloaded via a Replit subdomain and likely generated using AI assistance, featuring additional capabilities and a custom RSA key for communication.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 9:\u003c/strong\u003e This cluster deployed XMRig alongside gsocket, a peer-to-peer tunneling tool.\u003c/li\u003e\n\u003cli\u003eThe miner and tunnel were activated through malicious commands injected into the user profile file.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCluster 10:\u003c/strong\u003e Credential stealer scripts were deployed to extract JWT key chunks, AWS credentials, and admin hashdumps.\u003c/li\u003e\n\u003cli\u003eHelper scripts attempted root escalation using hardcoded passwords.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRecommendations and Detection Guidance\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eCisco strongly advises all customers to apply the security updates addressing CVE-2026-20182 and the chained vulnerabilities immediately.\u003c/p\u003e\n\n\u003cp\u003eDetection guidance includes specific Snort SIDs for each CVE and ClamAV signatures for the identified malicious tooling.\u003c/p\u003e\n\n\u003cp\u003eTalos has also published a comprehensive list of indicators of compromise for all ten clusters in their public GitHub repository.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams are encouraged to consult the official Cisco security advisories and Rapid7\u0026rsquo;s technical disclosure for additional mitigation details.\u003c/p\u003e\n","keyPoints":["Cisco Talos is tracking active exploitation of CVE-2026-20182, an authentication bypass vulnerability in Cisco Catalyst SD-WAN Controller and Manager, by the sophisticated threat actor UAT-8616.","Multiple distinct threat clusters have been exploiting CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122 since March 2026 to deploy various webshells and malicious tooling on unpatched systems.","Post-compromise activities across these clusters include deploying command-and-control frameworks like Sliver and AdaptixC2, cryptocurrency miners such as XMRig, credential stealers, and network scanning tools.","Cisco strongly recommends that customers immediately apply the security updates and follow the guidance in their official security advisories to mitigate these active threats."],"insights":["Attackers are actively modifying open-source command-and-control frameworks to evade detection, such as changing the AdaptixC2 default TCP banner to 'shadowcore' and leveraging Replit.dev's AI platform to generate a customized Nimplant variant.","Post-compromise infrastructure relies heavily on encrypted and peer-to-peer communication channels to bypass perimeter defenses, specifically utilizing mutual TLS (mTLS) for Sliver implants and the Global Socket Relay Network (GSRN) via gsocket for decentralized command and control.","Credential harvesting efforts are precisely targeted at SD-WAN authentication mechanisms, with malicious scripts designed to extract JWT key chunks for REST API access and AWS credentials directly from the vManage component.","Exploitation of the unpatched CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122 began almost immediately after ZeroZenX Labs publicly released proof-of-concept code in March 2026, demonstrating a rapid weaponization cycle for publicly available exploits."],"referencedReports":[{"title":"Cisco Security Advisory on CVE-2026-20182","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-rpa2-v69WY2SW","publisher":"Cisco","context":"The article strongly advises customers to follow the guidance and recommendations published in this advisory to protect their environments.","category":"","primary":false},{"title":"Cisco Security Advisory on CVE-2026-20133, CVE-2026-20122, and CVE-202128","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-authbp-qwCX8D4v","publisher":"Cisco","context":"The article references this advisory for the latest information regarding affected products, IOCs, and mitigation steps for the three chained vulnerabilities.","category":"","primary":false},{"title":"CVE-2026-20182 Critical Authentication Bypass Cisco Catalyst SD-WAN Controller Fixed","url":"http://www.rapid7.com/blog/post/ve-cve-2026-20182-critical-authentication-bypass-cisco-catalyst-sd-wan-controller-fixed","publisher":"Rapid7","context":"The article recommends referring to this third-party disclosure for additional technical details on the authentication bypass vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eCisco Talos is actively tracking the exploitation of multiple vulnerabilities in Cisco Catalyst SD-WAN Controller and Manager. The threat actor UAT-8616 is exploiting CVE-2026-20182 to bypass authentication and escalate privileges. Meanwhile, separate threat clusters have been chaining CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122 since March 2026. These actors leverage publicly available proof-of-concept code to deploy JSP-based webshells and command-and-control implants. Post-compromise activities include deploying cryptocurrency miners, credential stealers, network scanning tools, and customized backdoors. Cisco strongly recommends applying the February and May 2026 security updates to mitigate these threats. Organizations should also monitor for the provided Snort and ClamAV signatures to detect ongoing malicious activity.\u003c/p\u003e\n"},{"n":4,"title":"New Fragnesia Linux flaw lets attackers gain root privileges","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-fragnesia-linux-flaw-lets-attackers-gain-root-privileges/","time":"07:34","priority":"MUST READ","score":95,"tldr":"A new high-severity Linux kernel vulnerability called Fragnasia allows unprivileged users to escalate to root privileges, prompting urgent kernel updates and mitigations across major distributions.","briefOverview":"\u003cp\u003eA new high-severity Linux kernel vulnerability named Fragnasia (CVE-2026-46300) allows unprivileged local attackers to escalate to root privileges. Discovered by Zellic\u0026rsquo;s William Bowling, the flaw stems from a logic bug in the XFRM ESP-in-TCP subsystem. It enables arbitrary byte writes to the kernel page cache of read-only files without requiring a race condition. The vulnerability affects all Linux kernels released before May 13, 2026, and belongs to the Dirty Frag vulnerability class. Linux distributions are currently rolling out patches to address the issue across major distributions. Organizations unable to patch immediately can disable the esp4, esp6, and rxrpc kernel modules, though this will disrupt AFS file systems and IPsec VPNs. This disclosure follows closely behind other active Linux privilege escalation flaws like Copy Fail and Pack2TheRoot. Federal agencies have been ordered by CISA to patch related vulnerabilities within two weeks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFragnasia, tracked as CVE-2026-46300, is a high-severity Linux kernel privilege escalation vulnerability that enables unprivileged local attackers to execute malicious code as root. The flaw originates from a logic bug within the Linux XFRM ESP-in-TCP subsystem, allowing attackers to write arbitrary bytes to the kernel page cache of read-only files. Zellic\u0026rsquo;s head of assurance, William Bowling, discovered the vulnerability and published a proof-of-concept exploit that corrupts the page cache memory of the /usr/bin/su binary to gain a root shell. This vulnerability is classified under the Dirty Frag vulnerability class, which impacts all Linux kernels released prior to May 13, 2026. Unlike Dirty Frag, which chains two separate kernel flaws, Fragnasia exploits a single logic bug without relying on race conditions. Both vulnerabilities share the same attack surface and mitigation strategies. Linux distributions are actively rolling out kernel patches to remediate the flaw. Administrators who cannot immediately patch their systems should execute commands to remove the esp4, esp6, and rxrpc kernel modules. However, this mitigation will break AFS distributed network file systems and IPsec VPNs. The Fragnasia disclosure arrives while distros are still patching the Copy Fail vulnerability, which CISA added to its known exploited vulnerabilities catalog on May 1. CISA has mandated that federal agencies secure their Linux systems against Copy Fail within two weeks. Additionally, Linux distros recently patched Pack2TheRoot, another root-privilege escalation flaw in the PackageKit daemon that remained undetected for a decade. Security researchers warn that these rapid successive disclosures highlight the ongoing risks of local privilege escalation in Linux environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eFragnasia, formally tracked as CVE-2026-46300, represents a high-severity Linux kernel privilege escalation flaw. The vulnerability enables unprivileged local attackers to execute arbitrary code with root privileges. It is classified as a member of the Dirty Frag vulnerability class, which impacts all Linux kernels released before May 13, 2026. Linux distributions are currently rolling out emergency patches to address the issue across major distributions.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism-discovery\"\u003eTechnical Mechanism \u0026amp; Discovery\u003c/h3\u003e\n\n\u003cp\u003eZellic\u0026rsquo;s head of assurance, William Bowling, identified the flaw and shared a public proof-of-concept exploit. The vulnerability stems from a logic bug in the Linux XFRM ESP-in-TCP subsystem. This defect allows attackers to write arbitrary bytes directly into the kernel page cache of read-only files. The exploit corrupts the page cache memory of the /usr/bin/su binary to obtain a root shell. Unlike the Dirty Frag vulnerability class, which chains two separate kernel flaws, Fragnasia achieves its memory-write primitive without requiring any race condition. Both flaws operate on the same attack surface and share identical mitigation approaches.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-strategies-operational-impact\"\u003eMitigation Strategies \u0026amp; Operational Impact\u003c/h3\u003e\n\n\u003cp\u003eSystem administrators are strongly advised to apply kernel updates immediately to secure their environments. Organizations unable to patch their systems should disable the vulnerable kernel modules using the provided commands. The mitigation requires the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExecute \u003ccode\u003ermmod esp4 esp6 rxrpc\u003c/code\u003e to unload the modules.\u003c/li\u003e\n\u003cli\u003eCreate \u003ccode\u003e/etc/modprobe.d/dirtyfrag.conf\u003c/code\u003e with install rules pointing to \u003ccode\u003e/bin/false\u003c/code\u003e.\nHowever, this mitigation carries significant operational trade-offs. Disabling these modules will break AFS distributed network file systems and IPsec VPNs. Administrators must weigh immediate security against critical network functionality.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"related-vulnerabilities-regulatory-response\"\u003eRelated Vulnerabilities \u0026amp; Regulatory Response\u003c/h3\u003e\n\n\u003cp\u003eThe Fragnasia disclosure follows closely behind the Copy Fail privilege escalation vulnerability, which is now actively exploited in the wild. CISA added Copy Fail to its catalog of known exploited vulnerabilities on May 1 and ordered federal agencies to patch their Linux systems within two weeks. The agency warned that this vulnerability type poses significant risks to the federal enterprise. Additionally, Linux distributions recently patched Pack2TheRoot, a root-privilege escalation flaw in the PackageKit daemon that went unnoticed for a decade. Security advisories emphasize that rapid patching is essential to counter these escalating local privilege escalation threats.\u003c/p\u003e\n","keyPoints":["Fragnasia (CVE-2026-46300) is a high-severity Linux kernel vulnerability caused by a logic bug in the XFRM ESP-in-TCP subsystem that enables unprivileged local attackers to escalate to root privileges.","The flaw affects all Linux kernels released before May 13, 2026, and belongs to the Dirty Frag vulnerability class.","Linux users are advised to apply immediate kernel updates or disable the vulnerable esp4, esp6, and rxrpc kernel modules using provided mitigation commands.","This vulnerability emerges alongside other recent Linux privilege escalation flaws like Copy Fail and Pack2TheRoot that require urgent patching."],"insights":["Mitigating Fragnasia by disabling esp4, esp6, and rxrpc kernel modules will break AFS distributed network file systems and IPsec VPNs, forcing operators to weigh security against critical network functionality.","Unlike the Dirty Frag vulnerability class which chains two separate flaws, Fragnasia exploits a single logic bug that achieves arbitrary kernel page cache writes without requiring any race condition, simplifying exploitation.","CISA has already mandated federal agencies patch the related Copy Fail vulnerability within two weeks, signaling that Fragnasia faces immediate active exploitation and urgent regulatory remediation timelines."],"referencedReports":[{"title":"CISA adds one known exploited vulnerability to catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references this CISA advisory to confirm that the related Copy Fail vulnerability was added to the known exploited vulnerabilities catalog on May 1, triggering a mandatory two-week remediation window for federal agencies.","category":"","primary":false}],"body":"\u003cp\u003eA new high-severity Linux kernel vulnerability named Fragnasia (CVE-2026-46300) allows unprivileged local attackers to escalate to root privileges. Discovered by Zellic\u0026rsquo;s William Bowling, the flaw stems from a logic bug in the XFRM ESP-in-TCP subsystem. It enables arbitrary byte writes to the kernel page cache of read-only files without requiring a race condition. The vulnerability affects all Linux kernels released before May 13, 2026, and belongs to the Dirty Frag vulnerability class. Linux distributions are currently rolling out patches to address the issue across major distributions. Organizations unable to patch immediately can disable the esp4, esp6, and rxrpc kernel modules, though this will disrupt AFS file systems and IPsec VPNs. This disclosure follows closely behind other active Linux privilege escalation flaws like Copy Fail and Pack2TheRoot. Federal agencies have been ordered by CISA to patch related vulnerabilities within two weeks.\u003c/p\u003e\n"},{"n":11,"title":"PraisonAI CVE-2026-44338 Auth Bypass Targeted Within Hours of Disclosure","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/praisonai-cve-2026-44338-auth-bypass.html","time":"11:40","priority":"MUST READ","score":95,"tldr":"Threat actors began exploiting a critical authentication bypass vulnerability in the PraisonAI framework within hours of its disclosure, making immediate patching to version 4.6.34 essential to prevent unauthorized access and workflow execution.","briefOverview":"\u003cp\u003eA critical authentication bypass vulnerability, identified as CVE-2026-44338, has been discovered in the PraisonAI open-source framework. The flaw stems from a legacy Flask API server that ships with authentication disabled by default, allowing any network-accessible user to bypass security controls. Successful exploitation enables unauthenticated enumeration of agent configurations and triggers configured workflows without requiring a valid token. The vulnerability impacts all PraisonAI versions from 2.5.6 through 4.6.33 and has been patched in version 4.6.34. Threat actors began actively probing the vulnerable endpoints within just three hours and forty-four minutes of the public advisory release. Automated scanners from a single IP address successfully confirmed the bypass by retrieving agent data through a direct GET request. Security researchers recommend immediate patching, deployment audits, and credential rotation to mitigate the risk. Organizations must recognize that the exploitation window for newly disclosed AI vulnerabilities is now measured in single-digit hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePraisonAI, an open-source multi-agent orchestration framework, is affected by CVE-2026-44338, a critical authentication bypass vulnerability rated at a CVSS score of 7.3. The issue originates from a legacy Flask-based API server that hardcodes authentication as disabled and leaves the authentication token unset. This configuration exposes sensitive endpoints to unauthenticated callers, allowing them to access the \u003ccode\u003e/agents\u003c/code\u003e endpoint and trigger workflows through the \u003ccode\u003e/chat\u003c/code\u003e endpoint without a valid token. The potential impacts include unauthenticated enumeration of agent files, unauthorized execution of configured workflows, repeated consumption of model API quotas, and exposure of execution results. The actual severity depends on the permissions defined in the operator\u0026rsquo;s \u003ccode\u003eagents.yaml\u003c/code\u003e file, though the bypass itself is unconditional in the default configuration. All PraisonAI versions ranging from 2.5.6 to 4.6.33 are vulnerable, with the flaw patched in version 4.6.34. Security researcher Shmulik Cohen was credited with discovering and reporting the vulnerability. Cloud security firm Sysdig published a report detailing how threat actors began exploiting the flaw almost immediately after disclosure. An automated scanner using the User-Agent string \u003ccode\u003eCVE-Detector/1.0\u003c/code\u003e initiated its first probe at 17:40 UTC on May 11, 2026, just three hours and forty-four minutes after the advisory was published at 13:56 UTC. The scanning activity originated from IP address 146.190.133.49 and executed two passes spaced eight minutes apart. Each pass generated approximately seventy requests over fifty seconds, first probing generic disclosure paths and subsequently targeting AI-agent surfaces. A direct GET request to \u003ccode\u003e/agents\u003c/code\u003e without an authorization header returned a successful response containing the agent file configuration. No POST requests to the \u003ccode\u003e/chat\u003c/code\u003e endpoint were observed, indicating the activity was focused on initial reconnaissance and exploit confirmation. PraisonAI maintainers advise users to apply the latest patch immediately, audit their existing deployments, review model provider billing for anomalies, and rotate any credentials stored in the \u003ccode\u003eagents.yaml\u003c/code\u003e file. The rapid exploitation timeline underscores a broader trend where adversary tooling has scaled across the entire AI ecosystem, compressing the window between vulnerability disclosure and active exploitation into single-digit hours.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-44338 represents a critical authentication bypass flaw within the PraisonAI open-source multi-agent orchestration framework. The vulnerability carries a CVSS score of 7.3 and fundamentally stems from a legacy Flask API server that ships with security controls disabled by default. Specifically, the \u003ccode\u003esrc/praisonai/api_server.py\u003c/code\u003e file hardcodes \u003ccode\u003eAUTH_ENABLED = False\u003c/code\u003e and \u003ccode\u003eAUTH_TOKEN = None\u003c/code\u003e. This configuration effectively removes authentication requirements for the legacy server, exposing protected functionality to any network-accessible caller.\u003c/p\u003e\n\n\u003ch3 id=\"technical-impact-and-exploitation\"\u003eTechnical Impact and Exploitation\u003c/h3\u003e\n\n\u003cp\u003eThe unconditional authentication bypass allows unauthenticated actors to interact with critical API endpoints. Attackers can enumerate configured agent files through the \u003ccode\u003e/agents\u003c/code\u003e endpoint and trigger locally configured workflows via the \u003ccode\u003e/chat\u003c/code\u003e endpoint. Successful exploitation leads to several adverse outcomes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthenticated enumeration of agent configurations\u003c/li\u003e\n\u003cli\u003eUnauthorized workflow execution\u003c/li\u003e\n\u003cli\u003eRepeated consumption of model API quotas\u003c/li\u003e\n\u003cli\u003eExposure of execution results to external parties\nThe ultimate impact severity is contingent upon the permissions granted within the operator\u0026rsquo;s \u003ccode\u003eagents.yaml\u003c/code\u003e configuration file.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"affected-versions-and-remediation\"\u003eAffected Versions and Remediation\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability impacts all PraisonAI Python package versions from 2.5.6 through 4.6.33. The maintainers have released patch version 4.6.34 to resolve the issue. Security researcher Shmulik Cohen is credited with identifying and reporting the flaw. PraisonAI recommends that users immediately apply the patch, conduct thorough audits of existing deployments, review model provider billing statements for suspicious activity, and rotate any credentials referenced in the \u003ccode\u003eagents.yaml\u003c/code\u003e file.\u003c/p\u003e\n\n\u003ch3 id=\"exploitation-timeline-and-threat-actor-activity\"\u003eExploitation Timeline and Threat Actor Activity\u003c/h3\u003e\n\n\u003cp\u003eCloud security firm Sysdig documented a rapid exploitation campaign that began shortly after the vulnerability advisory was made public. The advisory was published on May 11, 2026, at 13:56 UTC. Automated scanning activity targeting the exact vulnerable endpoint commenced at 17:40 UTC, merely three hours and forty-four minutes later. The scanning traffic originated from IP address 146.190.133.49 and utilized the \u003ccode\u003eCVE-Detector/1.0\u003c/code\u003e User-Agent string. The scanner executed two distinct passes separated by an eight-minute interval, generating approximately seventy requests per pass over fifty-second windows. The initial pass scanned generic disclosure paths such as \u003ccode\u003e/.env\u003c/code\u003e, \u003ccode\u003e/admin\u003c/code\u003e, and \u003ccode\u003e/Gemfile.lock\u003c/code\u003e. The subsequent pass specifically targeted AI-agent surfaces, including the PraisonAI framework. A direct GET request to \u003ccode\u003e/agents\u003c/code\u003e without an authorization header returned a 200 OK status with JSON payload confirming the successful bypass. No POST requests to the \u003ccode\u003e/chat\u003c/code\u003e endpoint were observed, indicating the activity was strictly reconnaissance aimed at confirming exploitability.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-and-strategic-implications\"\u003eIndustry Context and Strategic Implications\u003c/h3\u003e\n\n\u003cp\u003eThis rapid exploitation cycle exemplifies a broader trend where threat actors integrate newly disclosed vulnerabilities into their automated tooling before patches can be deployed. Adversary infrastructure has scaled across the entire AI and agent ecosystem, affecting projects of all sizes beyond just major commercial vendors. Security teams must operate under the assumption that the window between public disclosure and active exploitation for unauthenticated defaults is now measured in single-digit hours. Proactive monitoring, immediate patching, and strict configuration reviews are essential to mitigate these accelerated threat vectors.\u003c/p\u003e\n","keyPoints":["CVE-2026-44338 is a CVSS score of 7.3 authentication bypass vulnerability in PraisonAI caused by a legacy Flask API server that ships with authentication disabled by default.","The flaw affects PraisonAI versions 2.5.6 through 4.6.33 and allows unauthenticated users to enumerate agent configurations and trigger workflows without a valid token.","Security researchers observed automated scanners probing the vulnerable endpoints within three hours and forty-four minutes of the public advisory release.","The vulnerability has been patched in PraisonAI version 4.6.34, prompting recommendations for immediate updates and credential rotation."],"insights":["The impact of the authentication bypass is entirely contingent on the operator's agents.yaml permissions, meaning the actual risk varies based on configuration rather than the vulnerability itself.","Automated scanners are employing a two-pass reconnaissance methodology that first probes generic disclosure paths before specifically targeting AI-agent surfaces, revealing a standardized exploitation pattern for AI ecosystems.","The legacy Flask server ships with AUTH_ENABLED = False hardcoded, indicating that the vulnerability is an unconditional default configuration flaw requiring organizations to audit deployments rather than relying solely on vendor patches."],"referencedReports":[{"title":"CVE-2026-44338 PraisonAI Authentication Bypass in Under 4 Hours and the Growing Trend of Rapid Exploitation","url":"https://www.sysdig.com/blog/cve-2026-44338-praisonai-authentication-bypass-in-under-4-hours-and-the-growing-trend-of-rapid-exploitation","publisher":"Sysdig","context":"The article cites this report to detail how threat actors and automated scanners began probing vulnerable instances within hours of the vulnerability's public disclosure.","category":"","primary":false},{"title":"GHSA-6rmh-7xcm-cpxj","url":"https://github.com/advisories/GHSA-6rmh-7xcm-cpxj","publisher":"PraisonAI Maintainers","context":"The article references this advisory to explain that the framework's legacy Flask API server ships with authentication disabled by default, allowing unauthenticated access to sensitive endpoints.","category":"","primary":false}],"body":"\u003cp\u003eA critical authentication bypass vulnerability, identified as CVE-2026-44338, has been discovered in the PraisonAI open-source framework. The flaw stems from a legacy Flask API server that ships with authentication disabled by default, allowing any network-accessible user to bypass security controls. Successful exploitation enables unauthenticated enumeration of agent configurations and triggers configured workflows without requiring a valid token. The vulnerability impacts all PraisonAI versions from 2.5.6 through 4.6.33 and has been patched in version 4.6.34. Threat actors began actively probing the vulnerable endpoints within just three hours and forty-four minutes of the public advisory release. Automated scanners from a single IP address successfully confirmed the bypass by retrieving agent data through a direct GET request. Security researchers recommend immediate patching, deployment audits, and credential rotation to mitigate the risk. Organizations must recognize that the exploitation window for newly disclosed AI vulnerabilities is now measured in single-digit hours.\u003c/p\u003e\n"},{"n":12,"title":"New Fragnesia Linux Kernel LPE Grants Root Access via Page Cache Corruption","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/new-fragnesia-linux-kernel-lpe-grants.html","time":"07:06","priority":"MUST READ","score":95,"tldr":"The Linux kernel vulnerability Fragnesia (CVE-2026-46300) enables unprivileged users to escalate privileges to root through page cache corruption, requiring immediate patching or mitigation via disabling XFRM ESP-in-TCP functionality.","briefOverview":"\u003cp\u003eA new Linux kernel vulnerability codenamed Fragnesia (CVE-2026-46300) allows unprivileged local attackers to escalate privileges to root access. Discovered by researcher William Bowling of the V12 security team, the bug exploits a logic flaw in the XFRM ESP-in-TCP subsystem. It enables deterministic page-cache corruption of read-only files without requiring any race condition. This marks the third local privilege escalation vulnerability identified in the kernel within just two weeks. Multiple Linux distributions, including Ubuntu, Red Hat, and Debian, have already released security advisories. Vendors recommend applying patches or mitigating the issue by disabling esp4, esp6, and related XFRM functionality. While no in-the-wild exploitation has been observed yet, researchers urge immediate patching. Additionally, threat actors are reportedly advertising a separate zero-day Linux exploit for $170,000 on cybercrime forums.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDetails have emerged about Fragnesia, a new variant of the recent Dirty Frag Linux local privilege escalation vulnerability.\nThe security flaw is tracked as CVE-2026-46300 and carries a CVSS score of 7.8.\nIt was discovered by researcher William Bowling of the V12 security team.\nThe vulnerability abuses a logic bug in the Linux XFRM ESP-in-TCP subsystem to achieve arbitrary byte writes into the kernel page cache.\nAttackers can modify read-only file contents to achieve root privileges through a deterministic page-cache corruption primitive.\nNotably, this exploitation does not require any race condition to succeed.\nThis bug follows closely behind two other recent kernel flaws, Copy Fail and Dirty Frag, making it the third such vulnerability identified in a two-week span.\nLike its predecessors, Fragnesia immediately yields root access on all major distributions by corrupting the page cache memory of the /usr/bin/su binary.\nA proof-of-concept exploit has been publicly released by the V12 security team.\nMultiple Linux distributions, including AlmaLinux, Amazon Linux, CloudLinux, Debian, Gentoo, Red Hat, SUSE, and Ubuntu, have published official advisories.\nVendors recommend applying available patches as soon as possible.\nOrganizations unable to patch immediately should disable esp4, esp6, and related xfrm/IPsec functionality.\nAdditional mitigation steps include restricting unnecessary local shell access, hardening containerized workloads, and increasing monitoring for abnormal privilege escalation activity.\nCloudLinux maintainers noted that existing Dirty Frag mitigations remain effective, requiring no further action until patched kernels are released.\nRed Hat is currently assessing whether those same mitigations extend to this new CVE.\nWiz researchers observed that AppArmor restrictions on unprivileged user namespaces may serve as a partial mitigation, though successful exploitation might still require additional bypasses.\nUnlike Dirty Frag, this vulnerability does not require host-level privileges to execute.\nMicrosoft security intelligence urged users to run update tools immediately, noting that no in-the-wild exploitation has been observed at this time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h2\u003e\n\n\u003cp\u003eFragnesia (CVE-2026-46300) is a newly identified Linux kernel local privilege escalation (LPE) vulnerability.\nThe flaw carries a CVSS score of 7.8 and was discovered by researcher William Bowling of the V12 security team.\nIt is codenamed Fragnesia and represents a distinct bug within the XFRM ESP-in-TCP subsystem.\nThis marks the third kernel LPE vulnerability identified within a two-week period, following closely behind the Copy Fail and Dirty Frag bugs.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability exploits a logic bug in the Linux XFRM ESP-in-TCP subsystem.\nUnprivileged local attackers can leverage this flaw to achieve arbitrary byte writes into the kernel page cache.\nSpecifically, the bug allows attackers to modify read-only file contents without requiring any race condition.\nThis deterministic page-cache corruption primitive enables immediate root privilege escalation on all major Linux distributions.\nThe exploitation corrupts the page cache memory of the /usr/bin/su binary to gain elevated access.\nA proof-of-concept (PoC) exploit has been released by the V12 security team.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-and-mitigation\"\u003eVendor Response and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eMultiple Linux distributions have already released security advisories to address the flaw.\nOfficial notices have been published by AlmaLinux, Amazon Linux, CloudLinux, Debian, Gentoo, Red Hat Enterprise Linux, SUSE, and Ubuntu.\nVendors strongly recommend applying available patches immediately.\nMicrosoft security intelligence emphasized that while no in-the-wild exploitation has been observed, organizations should run update tools as soon as possible.\nFor environments where patching is not immediately feasible, the following mitigations are advised:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisable esp4, esp6, and related xfrm/IPsec functionality\u003c/li\u003e\n\u003cli\u003eRestrict unnecessary local shell access\u003c/li\u003e\n\u003cli\u003eHarden containerized workloads\u003c/li\u003e\n\u003cli\u003eIncrease monitoring for abnormal privilege escalation activity\nCloudLinux maintainers confirmed that existing Dirty Frag mitigations remain effective, meaning no additional action is required until patched kernels are released.\nRed Hat is currently conducting an assessment to verify whether those same mitigations extend to CVE-2026-46300.\nAdditionally, Wiz researchers noted that AppArmor restrictions on unprivileged user namespaces may provide partial mitigation, though attackers might still bypass these controls.\nUnlike Dirty Frag, this vulnerability does not require host-level privileges to execute successfully.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-landscape-context\"\u003eThreat Landscape Context\u003c/h2\u003e\n\n\u003cp\u003eThe emergence of Fragnesia coincides with broader exploitation activity in the Linux ecosystem.\nA threat actor known as \u0026ldquo;berz0k\u0026rdquo; has been observed advertising a separate zero-day Linux LPE exploit on cybercrime forums.\nThe seller is asking $170,000 for the vulnerability and claims it works across multiple major Linux distributions.\nAccording to ThreatMon, the advertised exploit is reportedly TOCTOU-based and enables stable local privilege escalation without causing system crashes.\nThe threat actor also claims the exploit leverages a shared object (.so) payload that is dropped into the /tmp directory.\u003c/p\u003e\n","keyPoints":["Fragnesia (CVE-2026-46300) is a Linux kernel vulnerability with a CVSS score of 7.8 that enables unprivileged local attackers to gain root access through deterministic page-cache corruption.","The vulnerability exploits a logic bug in the XFRM ESP-in-TCP subsystem to achieve arbitrary byte writes into the kernel page cache of read-only files without requiring a race condition.","Linux distributions including Red Hat, Ubuntu, and Debian have released advisories, and vendors recommend applying patches or mitigating the issue by disabling esp4, esp6, and related xfrm/IPsec functionality.","A proof-of-concept exploit was released by researcher William Bowling of the V12 security team, and the vulnerability is identified as the third local privilege escalation bug in the kernel within two weeks."],"insights":["Fragnesia enables arbitrary byte writes into the kernel page cache of read-only files without requiring a race condition, allowing for deterministic root privilege escalation.","Threat actor \"berz0k\" is advertising a zero-day Linux LPE exploit for $170,000 that claims to be TOCTOU-based and drops a .so payload into the /tmp directory.","AppArmor restrictions on unprivileged user namespaces serve as a partial mitigation, though exploitation may still succeed if attackers bypass these restrictions.","CloudLinux indicates that existing Dirty Frag mitigations are sufficient for Fragnesia, meaning no immediate action is required beyond the previous patch."],"referencedReports":[{"title":"Fragnesia Linux Kernel Local Privilege Escalation via ESP-in-TCP","url":"https://www.wiz.io/blog/fragnesia-linux-kernel-local-privilege-escalation-via-esp-in-tcp","publisher":"Wiz","context":"Cited as the technical analysis explaining how the vulnerability enables unprivileged attackers to corrupt the kernel page cache and achieve root privileges.","category":"","primary":false},{"title":"CVE-2026-31431: Copy Fail","url":"https://unit42.paloaltonetworks.com/cve-2026-31431-copy-fail-copy-fail/","publisher":"Palo Alto Networks Unit 42","context":"Referenced as a prior similar vulnerability report that also yields root access through kernel memory write primitives.","category":"","primary":false},{"title":"Fragnesia (CVE-2026-46300)","url":"https://almalinux.org/blog/2026-05-13-fragnesia-cve-2026-46300/","publisher":"AlmaLinux","context":"Listed among multiple Linux distributions that have released official security advisories regarding the vulnerability.","category":"","primary":false},{"title":"AWS-2026-029","url":"https://aws.amazon.com/security/security-bulletins/rss/2026-029-aws/","publisher":"Amazon Linux","context":"Included in the list of distributions issuing official security bulletins to address the kernel bug.","category":"","primary":false},{"title":"CVE-2026-46300","url":"https://www.suse.com/security/cve/CVE-2026-46300.html","publisher":"SUSE","context":"Referenced as one of the major Linux distributions publishing an official security advisory for the vulnerability.","category":"","primary":false},{"title":"CVE-2026-46300","url":"https://ubuntu.com/security/CVE-2026-46300","publisher":"Ubuntu","context":"Listed alongside other vendors as having released an official security notice addressing the kernel privilege escalation bug.","category":"","primary":false},{"title":"CVE-2026-46300","url":"https://access.redhat.com/security/cve/cve-2026-46300","publisher":"Red Hat","context":"Cited as the vendor performing an assessment to confirm if existing mitigations extend to this new CVE.","category":"","primary":false},{"title":"Fragnesia Mitigation and Kernel Update","url":"https://blog.cloudlinux.com/fragnesia-mitigation-and-kernel-update","publisher":"CloudLinux","context":"Referenced for stating that customers who applied Dirty Frag mitigations need no further action until patched kernels are released.","category":"","primary":false}],"body":"\u003cp\u003eA new Linux kernel vulnerability codenamed Fragnesia (CVE-2026-46300) allows unprivileged local attackers to escalate privileges to root access. Discovered by researcher William Bowling of the V12 security team, the bug exploits a logic flaw in the XFRM ESP-in-TCP subsystem. It enables deterministic page-cache corruption of read-only files without requiring any race condition. This marks the third local privilege escalation vulnerability identified in the kernel within just two weeks. Multiple Linux distributions, including Ubuntu, Red Hat, and Debian, have already released security advisories. Vendors recommend applying patches or mitigating the issue by disabling esp4, esp6, and related XFRM functionality. While no in-the-wild exploitation has been observed yet, researchers urge immediate patching. Additionally, threat actors are reportedly advertising a separate zero-day Linux exploit for $170,000 on cybercrime forums.\u003c/p\u003e\n"},{"n":7,"title":"18-year-old NGINX vulnerability allows DoS, potential RCE","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/18-year-old-nginx-vulnerability-allows-dos-potential-rce/","time":"15:43","priority":"MUST READ","score":93,"tldr":"Operators should immediately patch NGINX to address CVE-2026-42945, an 18-year-old critical flaw that reliably enables denial-of-service attacks and carries a theoretical remote code execution risk, though real-world exploitation remains hindered by ASLR and specific configuration requirements.","briefOverview":"\u003cp\u003eAn 18-year-old heap buffer overflow in NGINX, tracked as CVE-2026-42945, has been assigned a critical CVSS score of 9.2 and can trigger reliable denial-of-service attacks. The flaw resides in the ngx_http_rewrite_module and is triggered when configurations use both the rewrite and set directives. Researchers at DepthFirst AI discovered the issue through autonomous scanning and demonstrated that it can lead to remote code execution if ASLR is disabled. NGINX’s multi-process architecture inadvertently aids attackers by spawning new worker processes with identical memory layouts upon crashes. F5 has released patches for affected versions and recommends replacing unnamed PCRE capture groups in rewrite rules as an immediate workaround. Independent analysts note that while denial-of-service attacks are highly realistic, reliable remote code execution on hardened systems with ASLR enabled remains difficult to achieve. Despite these challenges, the vulnerability\u0026rsquo;s critical severity and widespread impact across enterprise NGINX deployments warrant immediate remediation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researchers at DepthFirst AI have identified CVE-2026-42945, an 18-year-old heap buffer overflow in NGINX that carries a critical CVSS 9.2 rating. The vulnerability affects NGINX versions 0.6.27 through 1.30.0 and is triggered by configurations that utilize both the rewrite and set directives, a common pattern in API gateways and reverse proxies. The root cause stems from inconsistent state handling within NGINX’s internal script engine, which processes rewrites in two passes to calculate memory allocation and copy data. An is_args flag incorrectly remains set after a rewrite containing a question mark, causing the engine to calculate buffer sizes using unescaped URI lengths while later writing larger escaped characters like plus signs and ampersands. This mismatch results in a heap buffer overflow that can corrupt adjacent memory pool structures and overwrite cleanup handler pointers. Researchers demonstrated unauthenticated code execution by spraying fake structures via POST request bodies and forcing NGINX to execute system commands during pool cleanup. However, this proof-of-concept required Address Space Layout Randomization to be disabled, as ASLR is active by default in most environments. The multi-process architecture of NGINX actually facilitates exploitation because crashed worker processes spawn new instances with identical memory layouts, allowing attackers to repeatedly attempt heap manipulation. Alongside the critical flaw, three additional medium-severity issues were uncovered, including an excessive memory allocation bug in SCGI/UWSGI modules, a use-after-free in asynchronous OCSP DNS resolution, and an off-by-one UTF-8 parsing error. F5 released a security advisory detailing the affected products, which span NGINX Open Source, Plus, Instance Manager, and various WAF and DoS modules. Patches are now available in NGINX Open Source 1.31.0 and 1.30.1, as well as NGINX Plus R36 P4 and R32 P6. For organizations unable to upgrade immediately, F5 recommends replacing unnamed PCRE capture groups in vulnerable rewrite rules with named captures to eliminate the primary exploitation prerequisite. Independent analysts from AlmaLinux and security researcher Kevin Beaumont have tempered expectations regarding real-world remote code execution, noting that reliable exploitation on ASLR-enabled systems is not trivial. Nevertheless, they confirm that triggering denial-of-service attacks via crafted requests is straightforward and highly realistic. Given the critical severity and widespread deployment of NGINX across cloud providers, financial institutions, and Kubernetes clusters, operators are urged to apply patches or implement the recommended configuration workarounds without delay.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview and Discovery\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAn 18-year-old security flaw in the NGINX open-source web server has been identified as CVE-2026-42945. The vulnerability received a critical severity rating of 9.2 based on the latest Common Vulnerability Scoring System metrics. Researchers at the AI-native security firm DepthFirst AI discovered the issue using an autonomous scanning system. The flaw resides in the ngx_http_rewrite_module and impacts NGINX versions ranging from 0.6.27 through 1.30.0.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Mechanism and Exploitation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is triggered when NGINX configurations employ both the rewrite and set directives. This configuration pattern is frequently utilized in API gateways and reverse proxy setups. The root cause involves inconsistent state handling within NGINX’s internal script engine, which processes rewrites across two distinct passes. The first pass calculates the required memory allocation, while the second pass copies the actual data. An is_args flag incorrectly remains set after a rewrite containing a question mark. This causes the engine to calculate buffer sizes using unescaped URI lengths while subsequently writing larger escaped data containing characters like plus signs and ampersands. The resulting heap buffer overflow can corrupt adjacent NGINX memory pool structures and overwrite cleanup handler pointers.\u003c/p\u003e\n\n\u003cp\u003eResearchers demonstrated unauthenticated code execution by crafting HTTP requests that spray fake structures into memory via POST bodies. This technique forces NGINX to execute system commands during the memory pool cleanup phase. However, the published proof-of-concept required Address Space Layout Randomization to be disabled. ASLR is enabled by default but can be turned off to improve performance in embedded systems or virtual machines. NGINX’s multi-process architecture inadvertently aids attackers because crashed worker processes spawn new instances with identical memory layouts. This design allows for reliable heap manipulation and repeated exploitation attempts without memory layout shifts.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAdditional Vulnerabilities and Impact Scope\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eDuring the same six-hour scanning session, researchers uncovered three additional memory corruption issues. The secondary flaws include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-42946: Excessive memory allocation in SCGI/UWSGI modules that can crash workers through allocations approaching one terabyte.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40701: A use-after-free flaw in asynchronous OCSP DNS resolution handling.\u003c/li\u003e\n\u003cli\u003eCVE-2026-42934: An off-by-one UTF-8 parsing bug that causes out-of-bounds reads.\nAll three secondary flaws received a medium severity rating. NGINX powers approximately one-third of the top-ranked websites globally and is widely deployed by cloud providers, financial institutions, and Kubernetes clusters. F5, which owns and maintains the platform, issued a security advisory detailing the affected builds. The impact spans NGINX Open Source versions 0.6.27 through 1.30.0, NGINX Plus R32 through R36, Instance Manager 2.16.0 through 2.21.1, and various WAF and DoS modules. The vulnerabilities were discovered on April 18, 2026, and reported to the vendor four days later.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Real-World Exploitability\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003ePatches have been released in NGINX Open Source 1.31.0 and 1.30.1, alongside NGINX Plus R36 P4 and R32 P6. Organizations unable to upgrade immediately should replace unnamed PCRE capture groups in vulnerable r
