al objectives. These activities reflect a highly active and multifaceted cyber environment driven by state-aligned espionage groups, hacktivists, and financially motivated criminals.\u003c/p\u003e\n\n\u003ch3 id=\"ghostwriter-and-frostyneighbor\"\u003eGhostwriter and FrostyNeighbor\u003c/h3\u003e\n\n\u003cp\u003eThe Belarus-aligned threat group known as Ghostwriter, also tracked under the moniker FrostyNeighbor, is actively targeting Ukrainian government, military, and defense organizations. Active since at least 2016, the group continuously updates its toolset and compromise chains to evade detection. Recent activities observed since March 2026 involve spear-phishing campaigns using malicious PDF attachments that impersonate the Ukrainian telecommunications company Ukrtelecom. The infection chain incorporates several advanced evasion and validation techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGeofencing Validation:\u003c/strong\u003e The PDF links serve benign files to victims whose IP addresses do not correspond to Ukraine, ensuring only regional targets receive malicious payloads.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnti-Analysis Measures:\u003c/strong\u003e The group has integrated dynamic CAPTCHA checks into lure documents to trigger the attack chain and bypass automated sandboxes.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePayload Delivery:\u003c/strong\u003e Compromised hosts receive a RAR archive containing a JavaScript payload that displays a decoy document while silently launching PicassoLoader in the background.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHost Profiling:\u003c/strong\u003e The downloader fingerprints the system and transmits the profile to attacker-controlled infrastructure every ten minutes. Operators use this data to manually decide whether to deploy a third-stage JavaScript dropper for Cobalt Strike Beacon.\nHistorically, Ghostwriter has also targeted Polish entities by exploiting CVE-2024-42009 in Roundcube to capture email credentials and propagate further phishing messages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"gamaredon-campaign\"\u003eGamaredon Campaign\u003c/h3\u003e\n\n\u003cp\u003eIn a separate operation, the Russia-affiliated Gamaredon group has been spear-phishing Ukrainian state institutions since September 2025. This campaign focuses on delivering persistent, multi-stage VBScript downloaders through RAR archives. The group exploits CVE-2025-8088 in WinRAR to deploy the GammaDrop and GammaLoad malware families. According to HarfangLab, these downloaders profile the infected system upon execution. The group\u0026rsquo;s operational strategy relies heavily on relentless tempo and scale rather than technical novelty, with emails either spoofed or sent from compromised government accounts.\u003c/p\u003e\n\n\u003ch3 id=\"bo-team-and-head-mare-operations\"\u003eBO Team and Head Mare Operations\u003c/h3\u003e\n\n\u003cp\u003ePro-Ukraine hacktivists from the BO Team and Head Mare groups are conducting coordinated attacks against Russian organizations. Kaspersky research indicates overlapping infrastructure and tool usage between the two groups, suggesting potential operational coordination. The BO Team\u0026rsquo;s 2026 spear-phishing campaigns target approximately 20 organizations and deploy BrockenDoor and ZeronetKit. Notably, ZeronetKit is capable of compromising both Windows and Linux systems. Researchers also identified a previously undocumented Go-based backdoor named ZeroSSH, which executes arbitrary commands using cmd.exe and establishes reverse SSH channels.\u003c/p\u003e\n\n\u003ch3 id=\"hive0117-financial-campaign\"\u003eHive0117 Financial Campaign\u003c/h3\u003e\n\n\u003cp\u003eThe financially motivated Hive0117 group is conducting large-scale phishing campaigns targeting accountants across Russia, Lithuania, Estonia, Belarus, and Kazakhstan. Between February and March 2026, the group sent invoice-themed phishing emails to more than 3,000 organizations to distribute the DarkWatchman remote access trojan via RAR archives. Once accountants\u0026rsquo; computers are compromised, attackers use remote access to online banking systems to initiate fraudulent transfers. The group disguises these transactions as salary payments routed to bank accounts listed in a registry of mule accounts. By bypassing anti-fraud systems, Hive0117 has successfully stolen over 14 million rubles from targeted companies.\u003c/p\u003e\n\n\u003ch3 id=\"operational-summary\"\u003eOperational Summary\u003c/h3\u003e\n\n\u003cp\u003eThese campaigns demonstrate a clear divergence in threat actor objectives, ranging from cyber espionage and influence operations to financial theft and hacktivism. The use of geofencing, dynamic CAPTCHA, cross-platform malware, and server-side victim validation highlights the operational maturity of these groups. Each campaign leverages specific vulnerability exploits and social engineering tactics to achieve its distinct goals within the ongoing regional cyber conflict.\u003c/p\u003e\n","keyPoints":["The Belarus-aligned Ghostwriter group is targeting Ukrainian government entities with geofenced PDF phishing campaigns that deploy PicassoLoader and Cobalt Strike.","The Russia-affiliated Gamaredon group is attacking Ukrainian state institutions via spear-phishing emails that deliver GammaDrop and GammaLoad malware through RAR archives exploiting CVE-2025-8088.","The pro-Ukraine hacktivist group BO Team is collaborating with Head Mare to target Russian organizations using spear-phishing to distribute ZeronetKit and the ZeroSSH backdoor.","The financially motivated Hive0117 group is stealing funds from accountants in Russian and other Eastern European organizations by using phishing campaigns to deploy the DarkWatchman remote access trojan."],"insights":["Ghostwriter employs server-side geofencing and dynamic CAPTCHA anti-analysis techniques to filter out non-targets and evade automated sandboxes before delivering payloads.","The BO Team's ZeronetKit explicitly compromises Linux systems alongside Windows, indicating a deliberate expansion of cross-platform targeting capabilities.","Hive0117 bypasses financial anti-fraud systems by disguising stolen transfers as salary payments routed to mule accounts, providing a specific behavioral indicator for financial fraud detection."],"referencedReports":[{"title":"FrostyNeighbor: Fresh Mischief and Digital Shenanigans","url":"https://www.welivesecurity.com/en/eset-research/frostyneighbor-fresh-mischief-digital-shenanigans/","publisher":"ESET","context":"Explicitly cited as a report detailing FrostyNeighbor's continual cyber operations, toolset updates, and evasion techniques targeting Eastern Europe.","category":"","primary":false},{"title":"UNC1151 Campaign Roundcube","url":"https://cert.pl/en/posts/2025/06/unc1151-campaign-roundcube/","publisher":"CERT Polska","context":"Referenced as a June 2025 report explaining how Ghostwriter harvested credentials to analyze mailboxes and propagate phishing messages.","category":"","primary":false},{"title":"Inside the Lab: Gamaredon GammaDrop \u0026 GammaLoad","url":"https://harfanglab.io/insidethelab/gamaredon-gammadrop-gammaload/","publisher":"HarfangLab","context":"Cited for its technical analysis of Gamaredon's spear-phishing campaign delivering multi-stage VBScript downloaders that profile infected systems.","category":"","primary":false},{"title":"BO Team Campaign ZeronetKit \u0026 Headmare","url":"https://securelist.ru/tr/boteam-campaign-zeronetkit-headmare/115429/","publisher":"Kaspersky (SecureList)","context":"Referenced as a research report detailing the overlapping infrastructure and potential coordination between BO Team and Head Mare targeting Russian organizations.","category":"","primary":false},{"title":"Hive0117 Attacks Accountants","url":"https://www.f6.ru/media-center/press-releases/hive0117-attacks-accountants/","publisher":"F6","context":"Cited for its technical breakdown of how Hive0117 compromises accountants' computers to initiate fraudulent bank transfers disguised as salary payments.","category":"","primary":false}],"body":"\u003cp\u003eMultiple threat groups are actively conducting cyber operations against Ukrainian and Russian organizations using distinct tactics and objectives. The Belarus-aligned Ghostwriter group targets Ukrainian government and military entities through geofenced PDF phishing campaigns that deploy PicassoLoader and Cobalt Strike. This group employs server-side IP filtering and dynamic CAPTCHA checks to evade detection before profiling compromised hosts. Meanwhile, the Russia-affiliated Gamaredon group is spear-phishing Ukrainian state institutions with RAR archives that exploit a WinRAR vulnerability to deliver GammaDrop and GammaLoad malware. On the opposing side, the pro-Ukraine BO Team and Head Mare groups are targeting Russian organizations with cross-platform malware like ZeronetKit and the ZeroSSH backdoor. Additionally, the financially motivated Hive0117 group is stealing millions of rubles from accountants across several Eastern European countries by using invoice phishing to deploy the DarkWatchman remote access trojan. These campaigns highlight a highly active and multifaceted cyber environment in the region.\u003c/p\u003e\n"},{"n":9,"title":"West Pharmaceutical says hackers stole data, encrypted systems","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/west-pharmaceutical-says-hackers-stole-data-encrypted-systems/","time":"22:23","priority":"SHOULD READ","score":82,"tldr":"West Pharmaceutical Services suffered a cyberattack resulting in data exfiltration and system encryption, forcing a global shutdown of affected systems and disrupting manufacturing operations. The company has engaged external incident response teams and partially restored core systems while an investigation continues.","briefOverview":"\u003cp\u003eWest Pharmaceutical Services disclosed a cyberattack that resulted in unauthorized data exfiltration and system encryption. The company detected the initial intrusion on May 4, 2026, and formally reported the incident to the SEC on May 7.\u003c/p\u003e\n\n\u003cp\u003eUpon detection, West immediately activated incident response protocols and proactively shut down affected systems globally to contain the threat. Law enforcement was notified, and external forensic experts were engaged to assist with the investigation.\u003c/p\u003e\n\n\u003cp\u003eWhile core systems supporting manufacturing and shipping have been partially restored, complete recovery remains ongoing with no definitive timeline provided. The company has not yet estimated the financial impact of the breach or disclosed the specific nature of the stolen data.\u003c/p\u003e\n\n\u003cp\u003eNo ransomware group has claimed responsibility for the attack at this time. West has taken unspecified steps to mitigate the risk of the exfiltrated data being disseminated.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWest Pharmaceutical Services, an S\u0026amp;P 500 pharmaceutical manufacturing company with over $3 billion in annual revenue and more than 10,800 employees globally, has confirmed it was the target of a significant cyberattack. The intrusion was initially detected on May 4, 2026, prompting the company to launch an immediate investigation. On May 7, West filed a formal disclosure with the U.S. Securities and Exchange Commission, confirming that an unauthorized party successfully exfiltrated certain data and encrypted portions of the network.\u003c/p\u003e\n\n\u003cp\u003eIn response to the compromise, the company activated its incident response protocols and proactively took systems offline across its global operations to contain the breach. West also notified law enforcement and engaged external cyber-forensic experts to assist with the ongoing investigation. The firm specifically partnered with Palo Alto Networks’ Unit 42 to lead incident response, containment, and recovery efforts alongside other external advisors and legal counsel.\u003c/p\u003e\n\n\u003cp\u003eThe cyberattack inevitably disrupted global business operations, though West has partially restarted manufacturing and restored core enterprise systems that support shipping and manufacturing functions. Complete restoration of all affected systems has not yet been achieved, and the company provided no timeline for finalizing the recovery process. Similarly, West has not issued any estimates regarding the material impact of the incident on its financial performance.\u003c/p\u003e\n\n\u003cp\u003eAn investigation remains underway to determine the precise nature, scope, and type of data stolen by the attackers. West stated that it has taken steps to mitigate the risk of the exfiltrated data being disseminated, though it did not specify the exact measures implemented. No ransomware groups have claimed responsibility for the attack as of the article\u0026rsquo;s publication.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted the firm for additional comments, and a spokesperson reiterated that technical and organizational measures were promptly implemented following the initial detection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eWest Pharmaceutical Services, a publicly traded S\u0026amp;P 500 pharmaceutical manufacturing company, has disclosed a material cybersecurity attack that compromised its network infrastructure. The company specializes in injectable drug packaging, syringe and vial components, containment systems, and drug delivery devices. With annual revenues exceeding $3 billion and a global workforce of more than 10,800 employees, the breach carries significant operational implications.\u003c/p\u003e\n\n\u003ch3 id=\"timeline-and-detection\"\u003eTimeline and Detection\u003c/h3\u003e\n\n\u003cp\u003eThe company detected the initial compromise on May 4, 2026. Following an internal investigation, West formally notified the U.S. Securities and Exchange Commission on May 7, 2026. The SEC filing confirmed that an unauthorized party successfully exfiltrated certain data and encrypted portions of the network. The incident was classified as a material cybersecurity attack requiring immediate executive and regulatory attention.\u003c/p\u003e\n\n\u003ch3 id=\"response-and-containment-measures\"\u003eResponse and Containment Measures\u003c/h3\u003e\n\n\u003cp\u003eUpon detecting the intrusion, West immediately activated its incident response and crisis management protocols. The company proactively shut down and isolated affected on-premise infrastructure globally to contain the threat. Enterprise system access was restricted, and law enforcement was notified without delay. West engaged external cyber-forensic experts to assist with the investigation and forensic analysis. The firm specifically partnered with Palo Alto Networks’ Unit 42 to lead incident response, containment, and recovery efforts alongside other external advisors and legal counsel. Key response actions included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProactive global shutdown of affected on-premise infrastructure\u003c/li\u003e\n\u003cli\u003eRestriction of access to enterprise systems\u003c/li\u003e\n\u003cli\u003eNotification of law enforcement agencies\u003c/li\u003e\n\u003cli\u003eEngagement of Palo Alto Networks’ Unit 42 and other external experts\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"operational-impact-and-recovery-status\"\u003eOperational Impact and Recovery Status\u003c/h3\u003e\n\n\u003cp\u003eThe cyberattack inevitably disrupted the company’s global business operations. West has partially restarted manufacturing and restored core enterprise systems that support shipping and manufacturing functions. Complete restoration of all affected systems has not yet been achieved. The company provided no timeline for finalizing the complete recovery process. Similarly, West has not issued any estimates regarding the material impact of the incident on its financial performance.\u003c/p\u003e\n\n\u003ch3 id=\"data-exfiltration-and-mitigation\"\u003eData Exfiltration and Mitigation\u003c/h3\u003e\n\n\u003cp\u003eAn investigation remains underway to determine the precise nature, scope, and type of data stolen by the attackers. West stated that it has taken steps to mitigate the risk of the exfiltrated data being disseminated. The company did not specify the exact technical or organizational measures implemented to prevent further data leakage. No ransomware groups have claimed responsibility for the attack as of the article\u0026rsquo;s publication. BleepingComputer contacted the firm for additional comments, and a spokesperson reiterated that technical and organizational measures were promptly implemented following the initial detection.\u003c/p\u003e\n\n\u003ch3 id=\"additional-context\"\u003eAdditional Context\u003c/h3\u003e\n\n\u003cp\u003eThe article also references broader industry trends and related security incidents. It includes promotional content for an upcoming Autonomous Validation Summit focusing on AI-driven exploit validation. Several related articles are listed, covering breaches at Trellix, cPanel, Die Linke, and Marquis ransomware incidents. These references provide context but do not alter the primary facts of the West Pharmaceutical Services incident.\u003c/p\u003e\n","keyPoints":["West Pharmaceutical Services detected a cyberattack on May 4, 2026, which resulted in unauthorized data exfiltration and system encryption.","The company immediately activated incident response protocols, globally taking affected systems offline and engaging Palo Alto Networks’ Unit 42 for containment and recovery.","While core enterprise systems supporting shipping and manufacturing have been partially restored, complete system restoration remains ongoing with no provided timeline.","No ransomware group has claimed responsibility for the attack, and the company has not yet estimated the incident's financial impact or specified its data mitigation measures."],"insights":["The proactive global isolation of on-premise infrastructure upon initial detection directly triggered operational disruptions, illustrating the immediate business continuity trade-off required for rapid threat containment.","West Pharmaceutical’s specialization in injectable drug packaging and medical containment systems means the breach carries direct supply chain implications for its manufacturing and shipping operations.","The SEC filing explicitly documents the engagement of Palo Alto Networks’ Unit 42, indicating a response strategy that leverages specialized threat intelligence and forensic capabilities typically deployed for high-severity enterprise compromises."],"referencedReports":[],"body":"\u003cp\u003eWest Pharmaceutical Services disclosed a cyberattack that resulted in unauthorized data exfiltration and system encryption. The company detected the initial intrusion on May 4, 2026, and formally reported the incident to the SEC on May 7.\u003c/p\u003e\n\n\u003cp\u003eUpon detection, West immediately activated incident response protocols and proactively shut down affected systems globally to contain the threat. Law enforcement was notified, and external forensic experts were engaged to assist with the investigation.\u003c/p\u003e\n\n\u003cp\u003eWhile core systems supporting manufacturing and shipping have been partially restored, complete recovery remains ongoing with no definitive timeline provided. The company has not yet estimated the financial impact of the breach or disclosed the specific nature of the stolen data.\u003c/p\u003e\n\n\u003cp\u003eNo ransomware group has claimed responsibility for the attack at this time. West has taken unspecified steps to mitigate the risk of the exfiltrated data being disseminated.\u003c/p\u003e\n"},{"n":5,"title":"Dell confirms its SupportAssist software causes Windows BSOD crashes","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/software/dell-confirms-its-supportassist-software-causes-windows-bsod-crashes/","time":"10:03","priority":"MAY READ","score":68,"tldr":"Dell confirmed that version 5.5.16.0 of its SupportAssist Remediation service is causing Windows blue-screen crashes, and users should immediately uninstall or disable the software to restore system stability.","briefOverview":"\u003cp\u003eDell has officially confirmed that its pre-installed SupportAssist software suite is triggering blue-screen crashes on Windows 10 and Windows 11 systems.\u003c/p\u003e\n\n\u003cp\u003eThe issue first emerged on Friday, generating a significant wave of user reports regarding random reboots across various Dell devices.\u003c/p\u003e\n\n\u003cp\u003eSupportAssist is a standard software suite that ships pre-installed on most new Dell computers running Windows.\u003c/p\u003e\n\n\u003cp\u003eDell Engineering is actively investigating the problem and is working toward a permanent resolution.\u003c/p\u003e\n\n\u003cp\u003eA Dell representative clarified that the latest SupportAssist Remediation service update is the specific component causing the instability.\u003c/p\u003e\n\n\u003cp\u003eThe update triggers 0xEF_DellSupportAss_CRITICAL_PROCESS errors, which manifest as critical process crashes and system reboots.\u003c/p\u003e\n\n\u003cp\u003eVersion 5.5.16.0 of either the Dell SupportAssist Remediation service or the Alienware SupportAssist Remediation service has been identified as the faulty release.\u003c/p\u003e\n\n\u003cp\u003eTo resolve the crashes, Dell advises users to disable the Remediation service or completely uninstall the SupportAssist application.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDell has confirmed that its SupportAssist software suite is causing blue-screen crashes on Windows 10 and Windows 11 systems.\u003c/p\u003e\n\n\u003cp\u003eThe problem started on Friday, prompting a wave of user reports about random reboots affecting Dell computers.\u003c/p\u003e\n\n\u003cp\u003eDell representatives stated that the latest SupportAssist Remediation service update triggers the 0xEF_DellSupportAss_CRITICAL_PROCESS error.\u003c/p\u003e\n\n\u003cp\u003eSpecifically, version 5.5.16.0 of the Dell SupportAssist Remediation service or the Alienware SupportAssist Remediation service is responsible for the instability.\u003c/p\u003e\n\n\u003cp\u003eDell recommends that users disable the service or fully uninstall the SupportAssist application to stop the crashes.\u003c/p\u003e\n\n\u003cp\u003eUsers can remove the buggy version by navigating to Windows Settings, selecting Installed apps, and uninstalling the Alienware SupportAssist Remediation entry.\u003c/p\u003e\n\n\u003cp\u003eIT administrators should note that uninstalling the faulty service will likely remove any system repair points previously created by Dell OS SupportAssist Recovery.\u003c/p\u003e\n\n\u003cp\u003eDell has advised affected customers to contact technical support if blue-screen errors continue after the service is removed.\u003c/p\u003e\n\n\u003cp\u003eThis event mirrors past incidents where Dell updates caused major disruptions, including April 2025 reports of blue screens after upgrading SupportAssist for Home PCs.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, December 2021 BIOS updates prevented multiple laptop and desktop models from booting properly.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers have also discovered major vulnerabilities in the SupportAssist BIOSConnect feature that could enable remote attackers to execute code within the device BIOS.\u003c/p\u003e\n\n\u003cp\u003eDell Engineering remains aware of the current issue and is actively working toward a permanent resolution.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview-and-scope\"\u003eIncident Overview and Scope\u003c/h3\u003e\n\n\u003cp\u003eDell has officially confirmed that its pre-installed SupportAssist software suite is triggering blue-screen crashes on Windows 10 and Windows 11 systems.\u003c/p\u003e\n\n\u003cp\u003eThe issue first emerged on Friday, generating a significant wave of user reports regarding random reboots across various Dell devices.\u003c/p\u003e\n\n\u003cp\u003eSupportAssist is a standard software suite that ships pre-installed on most new Dell computers running Windows.\u003c/p\u003e\n\n\u003cp\u003eDell Engineering is actively investigating the problem and is working toward a permanent resolution.\u003c/p\u003e\n\n\u003ch3 id=\"technical-details-and-recommended-workaround\"\u003eTechnical Details and Recommended Workaround\u003c/h3\u003e\n\n\u003cp\u003eA Dell representative clarified that the latest SupportAssist Remediation service update is the specific component causing the instability.\u003c/p\u003e\n\n\u003cp\u003eThe update triggers 0xEF_DellSupportAss_CRITICAL_PROCESS errors, which manifest as critical process crashes and system reboots.\u003c/p\u003e\n\n\u003cp\u003eVersion 5.5.16.0 of either the Dell SupportAssist Remediation service or the Alienware SupportAssist Remediation service has been identified as the faulty release.\u003c/p\u003e\n\n\u003cp\u003eTo resolve the crashes, Dell advises users to disable the Remediation service or completely uninstall the SupportAssist application.\u003c/p\u003e\n\n\u003cp\u003eUsers can perform the uninstallation by opening Windows Settings, navigating to Installed apps, and selecting the Alienware SupportAssist Remediation entry.\u003c/p\u003e\n\n\u003cp\u003eAdministrators must be aware that removing the buggy service will also erase any system repair points previously generated by Dell OS SupportAssist Recovery.\u003c/p\u003e\n\n\u003cp\u003eDell has instructed users to contact technical support if blue-screen crashes persist after the service has been uninstalled.\u003c/p\u003e\n\n\u003ch3 id=\"historical-context-and-recurring-software-issues\"\u003eHistorical Context and Recurring Software Issues\u003c/h3\u003e\n\n\u003cp\u003eThis incident is not an isolated event, as Dell has experienced similar software and firmware failures in recent years.\u003c/p\u003e\n\n\u003cp\u003eThe company has documented multiple past incidents involving problematic updates:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApril 2025: Upgrading to SupportAssist for Home PCs versions 4.6.2 and 4.6.3 caused blue screens on Latitude and Vostro laptops.\u003c/li\u003e\n\u003cli\u003eDecember 2021: BIOS updates prevented multiple laptop and desktop models from booting, causing immediate blue screens upon power-on.\u003c/li\u003e\n\u003cli\u003eMitigation procedures: Users previously resolved the December 2021 boot loops by downgrading BIOS versions using the SupportAssist OS Recovery software.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"security-implications-and-industry-context\"\u003eSecurity Implications and Industry Context\u003c/h3\u003e\n\n\u003cp\u003eBeyond stability issues, the SupportAssist ecosystem has been linked to significant security concerns.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers have identified major vulnerabilities within the SupportAssist BIOSConnect feature.\u003c/p\u003e\n\n\u003cp\u003eThese flaws could potentially allow remote attackers to execute arbitrary code directly within the BIOS of impacted devices.\u003c/p\u003e\n\n\u003cp\u003eThe article also references related industry updates, including Microsoft patches that caused reboot loops on Windows servers and separate BitLocker vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eDell continues to monitor the situation and provides community forum threads where users can share detailed procedures for mitigating the current crashes.\u003c/p\u003e\n","keyPoints":["Dell confirmed that version 5.5.16.0 of the SupportAssist Remediation service triggers Windows blue-screen crashes.","Users can resolve the crashes by disabling or fully uninstalling the Dell SupportAssist Remediation service via Windows Settings.","Uninstalling the faulty service may permanently remove system repair points created by Dell OS SupportAssist Recovery.","Dell has experienced similar software and BIOS update failures causing boot loops and blue screens in previous years."],"insights":["Uninstalling the buggy SupportAssist Remediation service may permanently remove system repair points created by Dell OS SupportAssist Recovery, complicating future system recovery efforts.","Security researchers have identified critical vulnerabilities in the SupportAssist BIOSConnect feature that allow remote attackers to execute code within the device BIOS.","Dell has a recurring pattern of problematic updates, with previous SupportAssist versions and BIOS updates causing boot loops and blue screens across multiple product lines."],"referencedReports":[],"body":"\u003cp\u003eDell has officially confirmed that its pre-installed SupportAssist software suite is triggering blue-screen crashes on Windows 10 and Windows 11 systems.\u003c/p\u003e\n\n\u003cp\u003eThe issue first emerged on Friday, generating a significant wave of user reports regarding random reboots across various Dell devices.\u003c/p\u003e\n\n\u003cp\u003eSupportAssist is a standard software suite that ships pre-installed on most new Dell computers running Windows.\u003c/p\u003e\n\n\u003cp\u003eDell Engineering is actively investigating the problem and is working toward a permanent resolution.\u003c/p\u003e\n\n\u003cp\u003eA Dell representative clarified that the latest SupportAssist Remediation service update is the specific component causing the instability.\u003c/p\u003e\n\n\u003cp\u003eThe update triggers 0xEF_DellSupportAss_CRITICAL_PROCESS errors, which manifest as critical process crashes and system reboots.\u003c/p\u003e\n\n\u003cp\u003eVersion 5.5.16.0 of either the Dell SupportAssist Remediation service or the Alienware SupportAssist Remediation service has been identified as the faulty release.\u003c/p\u003e\n\n\u003cp\u003eTo resolve the crashes, Dell advises users to disable the Remediation service or completely uninstall the SupportAssist application.\u003c/p\u003e\n"},{"n":6,"title":"US charges suspected Dream Market admin arrested in Germany","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/us-charges-suspected-dream-market-admin-arrested-in-germany/","time":"08:55","priority":"MAY READ","score":0,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme === 'light' ? 'light' : 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const toggleTheme = () => {
    const next = theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('downlink.theme', next); } catch(e){}
    setTheme(next);
  };
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <button type="button" onClick={toggleTheme} title="Toggle light/dark theme" aria-label="Toggle light/dark theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, lineHeight: 1, color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 8px", borderRadius: 2,
          cursor: "pointer", appearance: "none", WebkitAppearance: "none"
        }}>
          {theme === 'light' ? '☾' : '☀'}
        </button>
      </div>
    </nav>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
