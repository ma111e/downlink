<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":2,"title":"Funnel Builder WordPress plugin bug exploited to steal credit cards","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/funnel-builder-wordpress-plugin-bug-exploited-to-steal-credit-cards/","time":"19:30","priority":"MUST READ","score":94,"group":null,"groupColor":null,"tldr":"A critical unauthenticated flaw in the Funnel Builder WordPress plugin is being actively exploited to inject card-skimming JavaScript into WooCommerce checkout pages. Site owners should update to version 3.15.0.3 or later and check the plugin’s External Scripts settings for malicious code.","briefOverview":"\u003cp\u003eA critical vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages. The flaw has not received an official identifier and can be exploited without authentication. It affects all versions of the plugin before 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eFunnel Builder, developed by FunnelKit, is used to customize WooCommerce checkout pages and is active on more than 40,000 websites, according to WordPress.org statistics cited in the article. Sansec detected the malicious activity and reported that the payload is disguised as a fake Google Tag Manager or Google Analytics script. The injected code opens a WebSocket connection to an external location and can deliver a customized payment card skimmer.\u003c/p\u003e\n\n\u003cp\u003eAttackers can exploit the issue through an unprotected, publicly exposed checkout endpoint to modify the plugin’s global settings. This lets them inject arbitrary JavaScript into the plugin’s “External Scripts” setting, causing malicious code to run on every checkout page. FunnelKit fixed the issue in version 3.15.0.3 and recommends updating and reviewing Settings \u0026gt; Checkout \u0026gt; External Scripts for rogue scripts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages. The flaw has not received an official identifier and can be leveraged without authentication. It affects all versions of Funnel Builder before version 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eFunnel Builder is a WooCommerce checkout plugin developed by FunnelKit. It is primarily used to customize checkout pages, add one-click upsells, create landing pages, and optimize conversion rates. The article cites WordPress.org statistics showing that the plugin is active on more than 40,000 websites.\u003c/p\u003e\n\n\u003cp\u003eSansec detected the malicious activity and reported that the payload, analytics-reports[.]com/wss/jquery-lib.js, is disguised as a fake Google Tag Manager or Google Analytics script. The script opens a WebSocket connection to wss://protect-wss[.]com/ws. According to the article, the attacker-controlled server delivers a customized payment card skimmer.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability allows an attacker to modify the plugin’s global settings through an unprotected, publicly exposed checkout endpoint. By abusing this access, attackers can inject arbitrary JavaScript into the plugin’s “External Scripts” setting. The result is that malicious code executes on every checkout page.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, the skimmer steals credit card numbers, CVVs, billing addresses, and other customer information. The article notes that payment card skimmers enable fraudulent online purchases and that stolen records are often sold on carding markets. The attackers are described only as attackers or bad actors, with no specific group identified.\u003c/p\u003e\n\n\u003cp\u003eFunnelKit addressed the vulnerability in Funnel Builder version 3.15.0.3, released the day before the article. A vendor advisory seen by Sansec confirmed that the issue allowed bad actors to inject scripts. FunnelKit recommends that site owners and administrators update from the WordPress dashboard and review Settings \u0026gt; Checkout \u0026gt; External Scripts for rogue scripts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA critical vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages. The flaw has not received an official identifier and can be leveraged without authentication. It affects all versions of the plugin before 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eFunnelKit addressed the vulnerability in Funnel Builder version 3.15.0.3, which the article says was released yesterday. The vendor recommends that website owners and administrators prioritize updating to the latest version from the WordPress dashboard. FunnelKit also recommends reviewing Settings \u0026gt; Checkout \u0026gt; External Scripts for possible rogue scripts added by an attacker.\u003c/p\u003e\n\n\u003ch2 id=\"affected-plugin-and-usage\"\u003eAffected plugin and usage\u003c/h2\u003e\n\n\u003cp\u003eFunnel Builder is a WordPress plugin for WooCommerce Checkout developed by FunnelKit. The plugin is primarily used to customize checkout pages and includes features such as one-click upsells, landing pages, and conversion rate optimization.\u003c/p\u003e\n\n\u003cp\u003eThe article cites statistics from WordPress.org showing that Funnel Builder is active on more than 40,000 websites. Because the exploit targets WooCommerce checkout pages, the affected environment described in the article is e-commerce sites using the plugin.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability details\u003c/h2\u003e\n\n\u003cp\u003eThe flaw is unauthenticated and affects all versions before 3.15.0.3. An attacker can exploit it to modify the plugin’s global settings through an unprotected, publicly exposed checkout endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article says this access allows the attacker to inject arbitrary JavaScript into the plugin’s “External Scripts” setting. Once added there, the malicious code executes on every checkout page.\u003c/p\u003e\n\n\u003cp\u003eKey technical details described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerable component is the Funnel Builder plugin for WordPress.\u003c/li\u003e\n\u003cli\u003eThe attack targets WooCommerce checkout pages.\u003c/li\u003e\n\u003cli\u003eThe flaw can be exploited without authentication.\u003c/li\u003e\n\u003cli\u003eThe attacker abuses a publicly exposed checkout endpoint.\u003c/li\u003e\n\u003cli\u003eThe attacker modifies global plugin settings.\u003c/li\u003e\n\u003cli\u003eThe injected code is placed in the “External Scripts” setting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malicious-payload-and-behavior\"\u003eMalicious payload and behavior\u003c/h2\u003e\n\n\u003cp\u003eSansec detected the malicious activity and reported that the payload is disguised as a fake Google Tag Manager or Google Analytics script. The article identifies the payload as analytics-reports[.]com/wss/jquery-lib.js.\u003c/p\u003e\n\n\u003cp\u003eThe script opens a WebSocket connection to an external location, identified in the article as wss://protect-wss[.]com/ws. According to Sansec, the attacker-controlled server delivers a customized payment card skimmer.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer is described as stealing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredit card numbers\u003c/li\u003e\n\u003cli\u003eCVVs\u003c/li\u003e\n\u003cli\u003eBilling addresses\u003c/li\u003e\n\u003cli\u003eOther customer information\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe direct impact is malicious JavaScript execution on WooCommerce checkout pages. The injected skimmer can collect payment card and customer information entered during checkout.\u003c/p\u003e\n\n\u003cp\u003eThe article states that payment card skimmers enable threat actors to make fraudulent online purchases. It also says stolen records often end up being sold individually or in bulk on dark web portals known as carding markets.\u003c/p\u003e\n\n\u003ch2 id=\"actors\"\u003eActors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor or group. It refers to the parties exploiting the flaw as attackers, threat actors, or bad actors.\u003c/p\u003e\n\n\u003cp\u003eA vendor security advisory seen by Sansec confirms the malicious activity and states that FunnelKit “identified an issue that allowed bad actors to inject scripts.” No additional attribution is provided in the article.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-remediation\"\u003eResponse and remediation\u003c/h2\u003e\n\n\u003cp\u003eFunnelKit fixed the vulnerability in Funnel Builder version 3.15.0.3. The article says this version was released yesterday.\u003c/p\u003e\n\n\u003cp\u003eThe vendor recommends two main actions for website owners and administrators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpdate to the latest version from the WordPress dashboard.\u003c/li\u003e\n\u003cli\u003eReview Settings \u0026gt; Checkout \u0026gt; External Scripts for potential rogue scripts added by an attacker.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe recommendation to inspect the External Scripts setting is significant because the article states that attackers use that setting to inject arbitrary JavaScript into checkout pages.\u003c/p\u003e\n","keyPoints":["A critical unauthenticated vulnerability in the Funnel Builder WordPress plugin is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages.","The vulnerability affects all versions of the Funnel Builder plugin before 3.15.0.3 and has not received an official identifier.","Sansec detected a malicious payload disguised as a fake Google Tag Manager or Google Analytics script that opens a WebSocket connection to an external location.","Attackers can exploit the flaw to modify the plugin’s global settings through an unprotected publicly exposed checkout endpoint and add arbitrary JavaScript to the “External Scripts” setting.","FunnelKit fixed the issue in Funnel Builder version 3.15.0.3 and recommends updating and reviewing Settings \u003e Checkout \u003e External Scripts for rogue scripts."],"insights":["The skimmer is disguised as a fake Google Tag Manager or Google Analytics script, so administrators should not assume analytics-looking scripts in checkout settings are legitimate.","Updating the plugin alone may not remove attacker-added code, because FunnelKit specifically recommends reviewing the External Scripts setting for rogue scripts after upgrading.","The attacker-controlled payload is customized to steal not only credit card numbers and CVVs but also billing addresses and other customer information from checkout pages.","The exploit abuses a publicly exposed checkout endpoint to change global plugin settings, making the checkout configuration itself a persistence point for malicious JavaScript."],"referencedReports":[{"title":"FunnelKit WooCommerce vulnerability exploited","url":"https://sansec.io/research/funnelkit-woocommerce-vulnerability-exploited","publisher":"Sansec","context":"The article cites Sansec's research as the source that detected the malicious activity and analyzed the injected payload disguised as a fake Google Tag Manager or Google Analytics script."}],"body":"\u003cp\u003eA critical vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages. The flaw has not received an official identifier and can be exploited without authentication. It affects all versions of the plugin before 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eFunnel Builder, developed by FunnelKit, is used to customize WooCommerce checkout pages and is active on more than 40,000 websites, according to WordPress.org statistics cited in the article. Sansec detected the malicious activity and reported that the payload is disguised as a fake Google Tag Manager or Google Analytics script. The injected code opens a WebSocket connection to an external location and can deliver a customized payment card skimmer.\u003c/p\u003e\n\n\u003cp\u003eAttackers can exploit the issue through an unprotected, publicly exposed checkout endpoint to modify the plugin’s global settings. This lets them inject arbitrary JavaScript into the plugin’s “External Scripts” setting, causing malicious code to run on every checkout page. FunnelKit fixed the issue in version 3.15.0.3 and recommends updating and reviewing Settings \u0026gt; Checkout \u0026gt; External Scripts for rogue scripts.\u003c/p\u003e\n"},{"n":1,"title":"More than $10 million stolen from crypto platform THORChain","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/more-than-10-million-stolen-crypto-platform-thorchain","time":"19:31","priority":"MAY READ","score":74,"group":null,"groupColor":null,"tldr":"THORChain halted trading after one of its vaults was compromised, resulting in about $10.7 million in stolen protocol-owned crypto funds. The platform says user funds appear to be safe and the network’s automated controls helped stop further outbound transactions.","briefOverview":"\u003cp\u003eTHORChain said more than \u003cspan class=\"math inline\"\u003e\\(10 million was stolen during a security incident on Friday morning. The attack was first identified by blockchain security firm Peckshield and cryptocurrency investigator Zachary Wolk, known online as ZachXBT. They reported that more than 36 Bitcoin, worth about \\)\u003c/span\u003e3 million, and another $7 million in other coins was siphoned from THORChain.\u003c/p\u003e\n\n\u003cp\u003eTHORChain later confirmed the incident and said trading on the platform was halted after a vault was compromised. The company said initial indications show user funds are safe and that only protocol-owned funds were affected. Officials said one of THORChain’s six vaults was compromised, leading to a loss of about $10.7 million.\u003c/p\u003e\n\n\u003cp\u003eThe company said its network automatically detected abnormal behavior and halted signing activity. THORChain said this alerted the broader community and prevented further outbound transactions. The incident comes amid a year of major cryptocurrency platform thefts, including several losses exceeding $200 million.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTHORChain said more than \u003cspan class=\"math inline\"\u003e\\(10 million was stolen during a security incident on Friday morning. The cyberattack was first identified by blockchain security firm Peckshield and cryptocurrency investigator Zachary Wolk, who uses the online alias ZachXBT. Around 6 a.m. EST, both reported that more than 36 Bitcoin, worth about \\)\u003c/span\u003e3 million, and another $7 million in other coins had been siphoned from THORChain.\u003c/p\u003e\n\n\u003cp\u003eTHORChain published its own statement shortly afterward confirming the incident. The company said trading on THORChain was halted after a vault was compromised. It said initial indications show user funds are safe and that only protocol-owned funds were affected.\u003c/p\u003e\n\n\u003cp\u003eTHORChain officials said their investigation is ongoing. They said one of the platform’s six vaults was compromised, leading to a loss of about $10.7 million. The company, founded in 2018 and based in Switzerland, said it is taking a range of other actions to protect users from further compromise.\u003c/p\u003e\n\n\u003cp\u003eA key technical detail disclosed by THORChain was that the network automatically detected abnormal behavior and halted signing activity. The company said this alerted the broader community and prevented further outbound transactions. The article does not identify an actor responsible for this incident.\u003c/p\u003e\n\n\u003cp\u003eThe article places the THORChain theft in the context of repeated cryptocurrency platform compromises in 2026. It says multiple thefts this year have surpassed \u003cspan class=\"math inline\"\u003e\\(200 million in losses, with other incidents involving \\)\u003c/span\u003e26 million and \u003cspan class=\"math inline\"\u003e\\(40 million. It also notes that the Treasury Department announced last month that it will share cyber threat intelligence with the cryptocurrency industry after a \\)\u003c/span\u003e280 million theft from the Drift platform.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes past and recent cryptocurrency thefts linked in various ways to North Korea. Last year, one THORChain founder lost \u003cspan class=\"math inline\"\u003e\\(1.2 million in cryptocurrency after an alleged North Korean hacker broke into their account. Just days after the Treasury Department announcement, alleged North Korean hackers stole \\)\u003c/span\u003e290 million from another crypto platform, and last year more than $2 billion was stolen collectively from dozens of cryptocurrency platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTHORChain said more than \u003cspan class=\"math inline\"\u003e\\(10 million was stolen during a security incident on Friday morning. The cyberattack was first identified by blockchain security firm Peckshield and cryptocurrency investigator Zachary Wolk, who is known online as ZachXBT. Around 6 a.m. EST, both reported that more than 36 Bitcoin, worth about \\)\u003c/span\u003e3 million, and another $7 million in other coins had been siphoned from THORChain.\u003c/p\u003e\n\n\u003cp\u003eTHORChain later published its own statement confirming the incident. The company said trading on THORChain was halted after a vault was compromised. It said initial indications are that user funds are safe and only protocol-owned funds were affected.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed impact\u003c/h2\u003e\n\n\u003cp\u003eTHORChain officials said one of the platform’s six vaults was compromised. The company said the compromise led to a loss of about $10.7 million. The investigation into the incident is ongoing, according to the article.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is taking a range of other actions to protect its users from further compromise. THORChain is described in the article as a cryptocurrency platform founded in 2018 and based in Switzerland.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-response\"\u003eTechnical and operational response\u003c/h2\u003e\n\n\u003cp\u003eTHORChain said the network automatically detected abnormal behavior. According to the company, the network then halted signing activity. THORChain said this alerted the broader community and prevented further outbound transactions.\u003c/p\u003e\n\n\u003cp\u003eThe platform also halted trading after the vault compromise. Based on THORChain’s statement in the article, the immediate containment actions centered on stopping signing activity and halting trading while the incident was investigated.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-funds\"\u003eAffected parties and funds\u003c/h2\u003e\n\n\u003cp\u003eThe article says THORChain reported that initial indications show user funds are safe. The company said only protocol-owned funds were affected. The loss was described as approximately $10.7 million after one of six vaults was compromised.\u003c/p\u003e\n\n\u003cp\u003eThe assets initially reported as stolen included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 36 Bitcoin, worth about $3 million.\u003c/li\u003e\n\u003cli\u003eAnother $7 million in other coins.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attribution-and-actors\"\u003eAttribution and actors\u0 function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {

    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();

    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
