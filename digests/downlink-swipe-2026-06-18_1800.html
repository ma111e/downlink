<script>
window.__DL_ARTICLES = [{"n":3,"title":"Advisory: Persistent MFA Circumvention in an Advanced BEC Campaign on Microsoft 365 Targets","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/persistent-mfa-circumvention-in-an-advanced-bec-campaign-on-microsoft-365-targets","time":"18:47","priority":"SHOULD READ","score":84,"tldr":"Mitiga found that attackers using AiTM phishing can compromise Microsoft 365 accounts protected by MFA and then add their own Microsoft Authenticator app without a fresh MFA challenge, giving them persistent access. The key takeaway is that organizations should not rely on MFA alone and should enforce device-based Conditional Access while monitoring for new authentication method registrations.","briefOverview":"\u003cp\u003eMitiga investigated an attempted business email compromise campaign targeting a Microsoft 365 organization and found unauthorized access to an executive’s Microsoft 365 account and mailbox. The access came from multiple locations, including Singapore, Dubai, and San Jose, California. The initial compromise used an adversary-in-the-middle phishing technique.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main significance is that the attackers were able to create persistence despite MFA being enabled. Mitiga found that a second Microsoft Authenticator app had been registered for the compromised user without the user’s knowledge. The article states that Microsoft 365 allowed this because a previously satisfied MFA token could be used to access and change authentication methods without a fresh MFA challenge.\u003c/p\u003e\n\n\u003cp\u003eMitiga argues that this behavior effectively nullifies the added protection normally expected from MFA in this scenario. The article says Microsoft does not provide a way to require an MFA re-challenge for changing authentication methods or other high-risk activities such as Privileged Identity Management activation. Mitiga recommends using another layer of defense, such as Conditional Access requiring an enrolled and compliant device, and monitoring for new authentication method registrations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMitiga investigated an attempted business email compromise attack against a Microsoft 365 organization after involved parties prevented the fraud. The investigation indicated that the attacker had access to sensitive information that could only have been obtained by compromising a user in the organization. Mitiga identified unauthorized access to the Microsoft 365 account of an executive from multiple locations, including Singapore, Dubai, and San Jose, California.\u003c/p\u003e\n\n\u003cp\u003eThe initial access used an adversary-in-the-middle phishing technique that gave the attacker access to the executive’s account and mailbox. During the investigation, Mitiga found that a second Microsoft Authenticator app had been set up for the user without their knowledge. The article says this gave the attackers persistence on the account and undermined the value of MFA.\u003c/p\u003e\n\n\u003cp\u003eMitiga’s technical analysis focuses on how Microsoft 365 handles MFA claims in active sessions. By default, Microsoft examines the existing token and decides whether a new authentication challenge is required. If MFA was already satisfied in the session, sign-in logs can show the justification “Previously satisfied – MFA requirement satisfied by claim in the token,” and Microsoft may not require a new MFA challenge.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the Security Info section of the account profile as central to the attack. It states that Microsoft does not require an MFA re-challenge when a user accesses and changes authentication methods if the token was previously satisfied. As a result, an attacker with temporary account access can add a new Authenticator app and later reauthenticate with MFA even after the original session expires or is revoked.\u003c/p\u003e\n\n\u003cp\u003eMitiga also points to Privileged Identity Management as another surprising example, stating that Microsoft does not allow customers to require an MFA re-challenge for that activity even though it is high risk. The article notes that Microsoft Identity Protection identified some sign-ins as risky, but says the default response of requiring MFA is not effective after the attacker has already registered an Authenticator app. Mitiga recommends another defense layer tied to a physical device or an employee’s authorized laptop and phone, implemented in Microsoft 365 through Conditional Access requiring an enrolled and compliant device.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMitiga reported on an advanced business email compromise campaign targeting Microsoft 365 organizations. The company investigated an attempted BEC attack in which the fraud was prevented by the alertness of the involved parties. Despite the failed fraud attempt, the investigation indicated that the attacker had accessed sensitive information that could only have been obtained by compromising a user in the organization.\u003c/p\u003e\n\n\u003cp\u003eMitiga identified unauthorized access to a Microsoft 365 executive account from multiple locations, including Singapore, Dubai, and San Jose, California. The initial compromise used an adversary-in-the-middle phishing technique. This gave the attacker access to the executive’s account and mailbox.\u003c/p\u003e\n\n\u003ch2 id=\"core-finding\"\u003eCore Finding\u003c/h2\u003e\n\n\u003cp\u003eThe most important finding was that a second Microsoft Authenticator app had been set up for the compromised user without the user’s knowledge. According to Mitiga, this gave the attackers persistent access to the breached account. The article says this effectively nullified the value of MFA because the attacker could reauthenticate with MFA after the original session expired or was revoked.\u003c/p\u003e\n\n\u003cp\u003eMitiga argues that the attack exposed weaknesses in Microsoft 365 MFA, Microsoft Authenticator, and Microsoft 365 Identity Protection. The article states that these weaknesses can allow full compromise of accounts even when MFA is enabled.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-mfa-weakness-worked\"\u003eHow the MFA Weakness Worked\u003c/h2\u003e\n\n\u003cp\u003eMitiga explains that Microsoft 365 checks the existing token in an active session to decide whether authentication is required. If the session was already properly authorized with MFA, Microsoft does not necessarily require a fresh MFA challenge. In sign-in logs, this can appear as: “Previously satisfied – MFA requirement satisfied by claim in the token.”\u003c/p\u003e\n\n\u003cp\u003eThe article states that customers do not have flexibility to force MFA re-challenges for specific high-risk actions, other than controlling the duration of the MFA token. Mitiga says the Microsoft authentication engine decides when MFA is needed, which prevents customers from configuring stronger controls for these cases.\u003c/p\u003e\n\n\u003ch2 id=\"security-info-registration-as-the-persistence-mechanism\"\u003eSecurity Info Registration as the Persistence Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe attack relied on access to the Security Info section of the account profile, where users can manage authentication methods. Mitiga states that Microsoft does not require an MFA re-challenge for accessing and changing user authentication methods in this section when the existing token is considered previously satisfied. This allowed the attacker to add a new Authenticator app without a new MFA challenge.\u003c/p\u003e\n\n\u003cp\u003eIn the case Mitiga investigated, the attacker started a security info registration at 8:32:09 and completed it within five seconds. About half a minute earlier, at 8:31:27, the attacker had logged in to the “My Access” portal, where authentication details were edited. The article says the portal required MFA through Conditional Access, but the details showed that no new MFA prompt occurred because the requirement had already been satisfied by the token.\u003c/p\u003e\n\n\u003cp\u003eMitiga emphasizes that even a strict MFA expiration time of one day would not prevent this technique. Once the attacker registers their own Authenticator app during the compromised session, they can later use it to authenticate again.\u003c/p\u003e\n\n\u003ch2 id=\"privileged-identity-management-example\"\u003ePrivileged Identity Management Example\u003c/h2\u003e\n\n\u003cp\u003eThe article also highlights Microsoft Privileged Identity Management as a surprising example of the same broader issue. PIM is intended to let administrative users work with non-administrative rights and elevate only when needed. Mitiga states that Microsoft does not allow customers to require an MFA re-challenge for this activity, despite the risk of privilege elevation.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, if an account is compromised, the attacker can go to the PIM portal and activate administrator privileges themselves. Mitiga notes that the user will at least receive a notification that someone activated the privilege.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-identity-protection-limitations\"\u003eMicrosoft Identity Protection Limitations\u003c/h2\u003e\n\n\u003cp\u003eMitiga notes that Microsoft Identity Protection identified some of the sign-ins as risky. However, the article says the default behavior is to require an MFA re-challenge. Mitiga argues that this is ineffective once the attacker has already set up their own Authenticator app.\u003c/p\u003e\n\n\u003cp\u003eThis means a risk-based MFA prompt may no longer distinguish between the legitimate user and the attacker after the attacker has successfully registered an authentication method on the account.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the impact as persistent compromise of a Microsoft 365 account protected by MFA. The attacker gained access to an executive’s account and mailbox and registered a second Authenticator app. The BEC fraud attempt was prevented, but the access demonstrated that the attacker had obtained sensitive information from the compromised account.\u003c/p\u003e\n\n\u003cp\u003eMitiga characterizes the broader impact as a weakening of MFA as a primary defense against identity attacks. The article says attackers have developed ways to overcome MFA through techniques such as adversary-in-the-middle phishing.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eMitiga recommends adding another layer of defense beyond MFA. Specifically, the article recommends a third factor tied to a physical device or to the employee’s authorized laptop and phone. It says Microsoft 365 can provide this through Conditional Access by requiring authentication from an enrolled and compliant device.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends that organizations monitor for new authentication method registrations on accounts. It advises treating sign-ins from unexpected locations as potential indicators of compromise, rather than only responding with another MFA prompt. Mitiga states that requiring access through an enrolled and compliant device would completely prevent AiTM attacks in this context.\u003c/p\u003e\n","keyPoints":["Mitiga investigated an attempted business email compromise attack against a Microsoft 365 organization in which an executive’s account was accessed from locations including Singapore, Dubai, and San Jose, California.","The initial compromise used an adversary-in-the-middle phishing technique that gave the attacker access to the executive’s account and mailbox.","Mitiga found that the attacker set up a second Microsoft Authenticator app for the compromised user, creating persistence and weakening the protection provided by MFA.","The article states that Microsoft 365 does not require an MFA re-challenge when a user changes authentication methods in the Security Info section if the session token was previously satisfied.","Mitiga recommends adding another layer of defense through device-based Conditional Access and monitoring for new authentication method registrations."],"insights":["Short MFA token lifetimes do not prevent this persistence technique because an attacker can register a new Authenticator app during the initially compromised session and later reauthenticate after the session expires or is revoked.","Microsoft 365 sign-in logs may show MFA as successful even when no new MFA prompt occurred, because the requirement can be marked as “Previously satisfied” by an existing token claim.","The article highlights that even Privileged Identity Management activation can rely on a previously satisfied MFA token rather than forcing a fresh MFA challenge, despite the high-risk nature of privilege elevation.","Microsoft Identity Protection may identify some related sign-ins as risky, but the article states that its default MFA re-challenge response is ineffective once the attacker has already added their own Authenticator app.","Device-based Conditional Access is presented as a practical compensating control because requiring access from an enrolled and compliant device would prevent the described AiTM-based access path."],"referencedReports":[{"title":"From cookie theft to BEC: Attackers use AiTM phishing sites as entry point to further financial fraud","url":"https://www.microsoft.com/security/blog/2022/07/12/from-cookie-theft-to-bec-attackers-use-aitm-phishing-sites-as-entry-point-to-further-financial-fraud/","publisher":"Microsoft","context":"The article links to Microsoft’s analysis when describing the adversary-in-the-middle phishing technique used for the initial compromise.","category":"","primary":false}],"body":"\u003cp\u003eMitiga investigated an attempted business email compromise campaign targeting a Microsoft 365 organization and found unauthorized access to an executive’s Microsoft 365 account and mailbox. The access came from multiple locations, including Singapore, Dubai, and San Jose, California. The initial compromise used an adversary-in-the-middle phishing technique.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main significance is that the attackers were able to create persistence despite MFA being enabled. Mitiga found that a second Microsoft Authenticator app had been registered for the compromised user without the user’s knowledge. The article states that Microsoft 365 allowed this because a previously satisfied MFA token could be used to access and change authentication methods without a fresh MFA challenge.\u003c/p\u003e\n\n\u003cp\u003eMitiga argues that this behavior effectively nullifies the added protection normally expected from MFA in this scenario. The article says Microsoft does not provide a way to require an MFA re-challenge for changing authentication methods or other high-risk activities such as Privileged Identity Management activation. Mitiga recommends using another layer of defense, such as Conditional Access requiring an enrolled and compliant device, and monitoring for new authentication method registrations.\u003c/p\u003e\n"},{"n":1,"title":"Bulgaria allowed surveillance tech firm to sell products to repressive regimes, report says","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/bulgaria-allowed-surveillance-tech-firm-to-sell-to-repressive-regimes-report","time":"19:30","priority":"SHOULD READ","score":78,"tldr":"Human Rights Watch says Bulgaria approved exports by surveillance firm Circles to multiple governments with records of repression, enabling tools that can intercept communications and track phones. The report raises fresh concerns that EU export controls are failing to stop surveillance technology from reaching abusive regimes.","briefOverview":"\u003cp\u003eHuman Rights Watch reported that Bulgaria allowed the Bulgaria-based surveillance technology firm Circles to export products to governments known for repressing citizens. Export licensing records covering 2018 through 2023 showed approved sales to law enforcement and intelligence agencies in El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco and Panama. The report says many of those countries have long records of crushing dissent, and some have previously used spyware against dissidents and journalists.\u003c/p\u003e\n\n\u003cp\u003eThe findings put the European Union’s export control regime under scrutiny because it is intended to stop the sale of sophisticated surveillance technology to abusive governments. Human Rights Watch said the European Commission has evidence that EU governments have issued licenses without serious human rights due diligence, while the Commission told the nonprofit that member states are solely responsible for dual-use export licensing decisions. Bulgaria told Human Rights Watch that exports contradicting national, European and international commitments, including human rights protections, are not allowed.\u003c/p\u003e\n\n\u003cp\u003eCircles’ exported systems included Pixcell, which can capture internet data, phone calls and messages, and Landmark, which geolocates mobile phones in real time. Another system, Voice Over Location Enabler software, uses SS7 protocol to remotely intercept incoming and outgoing voice calls and collect location data for both parties, according to Circles documents quoted by Human Rights Watch. Human Rights Watch could not obtain records for 2025 or 2026, so it is unclear whether the sales are still happening.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHuman Rights Watch obtained Bulgarian export licensing records showing that the government allowed surveillance firm Circles to sell technology to law enforcement and intelligence agencies in multiple countries from 2018 through 2023. The destinations listed were El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco and Panama. The article says many of those countries have long records of repressing citizens, and some have used spyware against dissidents and journalists in the past.\u003c/p\u003e\n\n\u003cp\u003eThe report frames the licenses as a challenge to the European Union’s export control regime, which is meant to restrict the sale of sophisticated surveillance technology. Human Rights Watch researcher Zach Campbell said EU governments should be clamping down on tools that can be used for repression rather than approving them. Campbell also said the European Commission has evidence that EU governments issued licenses seemingly without serious human rights due diligence.\u003c/p\u003e\n\n\u003cp\u003eCircles markets its technology as intended for combating terrorism and crime, according to the article. Human rights and digital freedoms advocates have long complained that its technology has been abused, and the article says that abuse has been documented in the past. Human Rights Watch said it contacted Circles four times for comment but did not receive a response.\u003c/p\u003e\n\n\u003cp\u003eThe tools described in the report include Pixcell, Landmark, and Voice Over Location Enabler software. Pixcell is described as capable of capturing internet data, phone calls and messages, while Landmark can geolocate mobile phones in real time. Voice Over Location Enabler software uses SS7 protocol to remotely intercept targets’ incoming and outgoing voice calls and collect data including both parties’ locations, according to Human Rights Watch quoting Circles’ documents.\u003c/p\u003e\n\n\u003cp\u003eThe Bulgarian government did not immediately respond to the article’s request for comment, but it told Human Rights Watch that exports contradicting national, European and international commitments, including human rights protections, are not allowed. It also said the Ministry maintains a zero-tolerance policy for abuses and strictly monitors compliance with established rules. The European Commission did not immediately respond to a request for comment, but it told Human Rights Watch that member states are solely responsible for dual-use export licensing decisions.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Circles was co-founded by Tal Dilian, the executive behind the blacklisted spyware firm Intellexa. In February, a Greek court found Dilian guilty on charges relating to how Intellexa was used to spy on civil society members, including journalists and politicians. Human Rights Watch previously published a report saying European surveillance technology companies from several countries have sold spyware to repressive governments, while France, Greece, Spain, Germany and Italy would not provide trade records for that report.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHuman Rights Watch reported that Bulgaria allowed the Bulgaria-based surveillance technology firm Circles to export surveillance products to governments with records of repression. The nonprofit obtained export licensing records covering 2018 through 2023 from the Bulgarian Ministry of Economy and Industry’s department involved in supporting or blocking export license applications for Bulgarian companies.\u003c/p\u003e\n\n\u003cp\u003eAccording to the records, Bulgaria approved sales of Circles technology to law enforcement and intelligence agencies in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEl Salvador\u003c/li\u003e\n\u003cli\u003eThe United Arab Emirates\u003c/li\u003e\n\u003cli\u003eSerbia\u003c/li\u003e\n\u003cli\u003eAzerbaijan\u003c/li\u003e\n\u003cli\u003eGuatemala\u003c/li\u003e\n\u003cli\u003eBahrain\u003c/li\u003e\n\u003cli\u003eJordan\u003c/li\u003e\n\u003cli\u003eMalaysia\u003c/li\u003e\n\u003cli\u003eMorocco\u003c/li\u003e\n\u003cli\u003ePanama\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that many of these countries have long records of crushing dissent and that some have previously used spyware to monitor dissidents and journalists.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-eu-export-controls\"\u003eSignificance for EU export controls\u003c/h2\u003e\n\n\u003cp\u003eThe article says the documents put the European Union’s export control regime in a harsh light. That regime is meant to stop the sale of sophisticated surveillance technology, but the article says the EU has struggled to control exports of spyware and other surveillance tools beyond its borders.\u003c/p\u003e\n\n\u003cp\u003eHuman Rights Watch senior surveillance researcher Zach Campbell said that all EU governments should be clamping down on exports of tools that can be used for repression rather than “rubber-stamping” them. He also said the European Commission has evidence that EU governments have issued licenses seemingly without serious human rights due diligence, while appearing not to act despite having a legal framework to control the issue.\u003c/p\u003e\n\n\u003cp\u003eThe European Commission told Human Rights Watch that member states are “solely responsible for licensing decisions on dual-use exports.” The Bulgarian government told Human Rights Watch that exports contradicting Bulgaria’s national, European and international commitments, including human rights protections, are not allowed.\u003c/p\u003e\n\n\u003ch2 id=\"products-and-technical-capabilities-described\"\u003eProducts and technical capabilities described\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several Circles systems included in the exports.\u003c/p\u003e\n\n\u003ch3 id=\"pixcell\"\u003ePixcell\u003c/h3\u003e\n\n\u003cp\u003ePixcell is described as a system capable of capturing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInternet data\u003c/li\u003e\n\u003cli\u003ePhone calls\u003c/li\u003e\n\u003cli\u003eMessages\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"landmark\"\u003eLandmark\u003c/h3\u003e\n\n\u003cp\u003eLandmark is described as a system that can geolocate mobile phones in real time.\u003c/p\u003e\n\n\u003ch3 id=\"voice-over-location-enabler\"\u003eVoice Over Location Enabler\u003c/h3\u003e\n\n\u003cp\u003eThe “Voice Over Location Enabler” software is described as using SS7 protocol to remotely intercept targets’ incoming and outgoing voice calls. Human Rights Watch, quoting from Circles documents, said the tool can also collect data including both parties’ locations.\u003c/p\u003e\n\n\u003cp\u003eTogether, the products described in the article cover communications interception, message and internet data capture, and real-time phone location tracking.\u003c/p\u003e\n\n\u003ch2 id=\"circles-and-related-entities\"\u003eCircles and related entities\u003c/h2\u003e\n\n\u003cp\u003eCircles is described as a Bulgaria-based surveillance technology firm. Like many companies selling powerful surveillance technology, Circles bills its tools as intended exclusively for combating terrorism and crime.\u003c/p\u003e\n\n\u003cp\u003eThe article says human rights and digital freedoms advocates have long complained that Circles’ technology has been abused, and that this has been documented in the past. Human Rights Watch said it contacted Circles four times for comment but did not receive a response.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Circles was co-founded by Tal Dilian. Dilian is described as the executive behind the blacklisted spyware firm Intellexa. In February, a Greek court found Dilian guilty on charges related to how Intellexa was used to spy on civil society members, including journalists and politicians.\u003c/p\u003e\n\n\u003ch2 id=\"government-and-institutional-responses\"\u003eGovernment and institutional responses\u003c/h2\u003e\n\n\u003cp\u003eThe Bulgarian government and the European Commission did not immediately respond to the article’s requests for comment.\u003c/p\u003e\n\n\u003cp\u003eHowever, Bulgaria told Human Rights Watch that exports contradicting the country’s national, European and international commitments, including with regard to the protection of human rights, are not allowed. Bulgaria also told the nonprofit that the Ministry maintains a consistent policy of zero tolerance for abuses and strictly monitors compliance with established rules.\u003c/p\u003e\n\n\u003cp\u003eThe European Commission told Human Rights Watch that member states are solely responsible for licensing decisions involving dual-use exports.\u003c/p\u003e\n\n\u003ch2 id=\"visibility-gaps\"\u003eVisibility gaps\u003c/h2\u003e\n\n\u003cp\u003eHuman Rights Watch obtained records covering 2018 through 2023, but it could not obtain records for 2025 or 2026. Because of that, the article says it is unclear whether the sales are still happening.\u003c/p\u003e\n\n\u003cp\u003eThis gap limits what the article can establish about the current status of Circles’ exports from Bulgaria.\u003c/p\u003e\n\n\u003ch2 id=\"broader-european-context-in-the-article\"\u003eBroader European context in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article references a May Human Rights Watch report saying that European surveillance technology companies have sold spyware to repressive governments. The countries named in connection with those companies include Finland, Poland, Denmark, the Czech Republic, Estonia and Bulgaria.\u003c/p\u003e\n\n\u003cp\u003eThe article also says France, Greece, Spain, Germany and Italy are known exporters of surveillance technology but would not provide Human Rights Watch with trade records for that report.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe reported impact is that governments with records of repression were allowed to obtain Circles surveillance tools capable of intercepting communications, capturing internet and message data, and tracking phone locations. The article does not provide specific examples of these exported Circles tools being used against named individuals in the listed destination countries during the 2018 to 2023 licensing period.\u003c/p\u003e\n\n\u003cp\u003eThe central issue presented is that Bulgaria approved exports of powerful surveillance technology to governments with human rights concerns, raising questions about the effectiveness of EU export controls and human rights due diligence.\u003c/p\u003e\n","keyPoints":["Human Rights Watch obtained export licensing records from 2018 through 2023 showing that Bulgaria allowed the surveillance firm Circles to sell technology to law enforcement and intelligence agencies in several countries known for repressing citizens.","The approved destinations included El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco and Panama.","Circles sold tools including Pixcell, which can capture internet data, phone calls and messages, Landmark, which geolocates mobile phones in real time, and Voice Over Location Enabler software, which can remotely intercept incoming and outgoing voice calls using SS7 protocol.","Human Rights Watch said the records cast the European Union’s export control regime in a harsh light because it is meant to stop the sale of sophisticated surveillance technology to abusive governments.","The Bulgarian government told Human Rights Watch that exports contradicting national, European and international commitments, including human rights protections, are not allowed, while the European Commission said member states are solely responsible for dual-use export licensing decisions."],"insights":["The licensing records indicate the EU’s dual-use export controls may be ineffective in practice because the European Commission says member states are solely responsible for licensing decisions, even when exports involve surveillance tools with human rights risks.","Human Rights Watch could not obtain records for 2025 or 2026, leaving a current visibility gap on whether Circles’ surveillance exports from Bulgaria are still occurring.","Circles’ products include multiple surveillance capabilities across communications interception, internet data capture, and real-time phone geolocation, showing that the approved exports were not limited to a single monitoring function.","The report highlights a transparency disparity within Europe because Human Rights Watch obtained Bulgarian records but said France, Greece, Spain, Germany and Italy would not provide comparable trade records despite being known exporters of surveillance technology."],"referencedReports":[{"title":"Bulgaria: Licensed Surveillance Exports to Rights Violators","url":"https://www.hrw.org/news/2026/06/18/bulgaria-licensed-surveillance-exports-to-rights-violators","publisher":"Human Rights Watch","context":"The article is based on Human Rights Watch’s report and press release about Bulgarian export licenses allowing Circles to sell surveillance technology to governments with human rights concerns.","category":"","primary":false}],"body":"\u003cp\u003eHuman Rights Watch reported that Bulgaria allowed the Bulgaria-based surveillance technology firm Circles to export products to governments known for repressing citizens. Export licensing records covering 2018 through 2023 showed approved sales to law enforcement and intelligence agencies in El Salvador, the United Arab Emirates, Serbia, Azerbaijan, Guatemala, Bahrain, Jordan, Malaysia, Morocco and Panama. The report says many of those countries have long records of crushing dissent, and some have previously used spyware against dissidents and journalists.\u003c/p\u003e\n\n\u003cp\u003eThe findings put the European Union’s export control regime under scrutiny because it is intended to stop the sale of sophisticated surveillance technology to abusive governments. Human Rights Watch said the European Commission has evidence that EU governments have issued licenses without serious human rights due diligence, while the Commission told the nonprofit that member states are solely responsible for dual-use export licensing decisions. Bulgaria told Human Rights Watch that exports contradicting national, European and international commitments, including human rights protections, are not allowed.\u003c/p\u003e\n\n\u003cp\u003eCircles’ exported systems included Pixcell, which can capture internet data, phone calls and messages, and Landmark, which geolocates mobile phones in real time. Another system, Voice Over Location Enabler software, uses SS7 protocol to remotely intercept incoming and outgoing voice calls and collect location data for both parties, according to Circles documents quoted by Human Rights Watch. Human Rights Watch could not obtain records for 2025 or 2026, so it is unclear whether the sales are still happening.\u003c/p\u003e\n"},{"n":4,"title":"Klue Third-Party Cybersecurity Incident","source":"jamf.com","sourceColorIdx":3,"link":"https://www.jamf.com/blog/klue-incident/","time":"18:06","priority":"SHOULD READ","score":78,"tldr":"Jamf disclosed that a cybersecurity incident at third-party vendor Klue allowed unauthorized access to Jamf Salesforce data via Klue’s integration, but Jamf says its products and customer service operations were not affected. Jamf disabled the integration, is investigating the exposed business data, and warned customers to watch for phishing attempts using Salesforce contact information.","briefOverview":"\u003cp\u003eJamf disclosed an ongoing cybersecurity incident involving Klue, a third-party vendor Jamf uses for competitive intelligence services. According to Jamf, the incident occurred within Klue’s environment, where an unauthorized party gained access to Jamf’s Salesforce instance data through Klue’s integration. Jamf said the incident did not affect Jamf’s products and did not impact its ability to serve customers.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving notice from Klue, Jamf immediately disabled Klue’s integration within Salesforce. Jamf said it has no evidence of lateral movement and has contained the incident on its end. The company also engaged cybersecurity experts, took defensive measures, and notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment and is reviewing what data was impacted. While the investigation remains ongoing, Jamf believes the impact was primarily limited to business data fields within Salesforce. Jamf warned that the unauthorized party may conduct phishing campaigns using contact information stored in Salesforce and may pose as Jamf employees or IT professionals.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eJamf published an update about an ongoing cybersecurity incident involving Klue, a third-party vendor used by Jamf for competitive intelligence services. The incident occurred within Klue’s environment, and Jamf said an unauthorized party accessed Jamf’s Salesforce instance data through Klue’s integration. Jamf framed the post as part of its effort to keep customers informed as new information becomes available.\u003c/p\u003e\n\n\u003cp\u003eJamf stated that the incident did not affect Jamf’s products and did not impact its ability to serve customers. The affected access was described as involving Jamf’s Salesforce environment, not Jamf’s product environment. Jamf said it is conducting its own review to determine what data was impacted.\u003c/p\u003e\n\n\u003cp\u003eAfter being notified by Klue, Jamf immediately disabled Klue’s integration within Salesforce. Jamf said it has no evidence of lateral movement and has contained the incident on its end. The company also engaged cybersecurity experts, took immediate defensive measures to protect its environment, and notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment. While its investigation is ongoing, Jamf currently believes the impact was primarily limited to business data fields within Salesforce. The article does not name the unauthorized party responsible for the incident.\u003c/p\u003e\n\n\u003cp\u003eJamf warned customers that the unauthorized party may conduct phishing campaigns using contact information stored within Salesforce. The company said the actor may pose as legitimate Jamf employees or IT professionals. Jamf encouraged customers to remain vigilant, use caution when sharing sensitive information or account credentials with unknown senders, and report suspicious email to their security teams.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eJamf disclosed an ongoing cybersecurity incident involving Klue, a third-party vendor that Jamf uses for competitive intelligence services. The article states that the incident occurred within Klue’s environment. Through Klue’s integration, an unauthorized party gained access to data in Jamf’s Salesforce instance.\u003c/p\u003e\n\n\u003cp\u003eJamf said it published the update to maintain transparency and keep customers informed. The article includes the communication Jamf shared with customers and says the company will continue updating the post as new information becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"affected-environment\"\u003eAffected Environment\u003c/h2\u003e\n\n\u003cp\u003eThe incident is described as affecting Jamf’s Salesforce instance data through Klue’s integration. Jamf stated that the unauthorized access was tied to Klue’s environment and Klue’s integration with Salesforce.\u003c/p\u003e\n\n\u003cp\u003eJamf specifically said the incident did not affect Jamf’s products. The company also said there was no impact on its ability to serve customers.\u003c/p\u003e\n\n\u003ch2 id=\"known-technical-and-data-details\"\u003eKnown Technical and Data Details\u003c/h2\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment. The company is conducting its own review to understand what data was impacted.\u003c/p\u003e\n\n\u003cp\u003eAt the time of the article, the investigation was ongoing. Jamf said it believes the impact was primarily limited to business data fields within the Salesforce environment.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide a list of specific data fields accessed. It also does not name the unauthorized party responsible for the Klue incident.\u003c/p\u003e\n\n\u003ch2 id=\"jamf-s-response\"\u003eJamf’s Response\u003c/h2\u003e\n\n\u003cp\u003eAfter receiving notice of the incident from Klue, Jamf said it immediately disabled Klue’s integration within Salesforce. Jamf also stated that it has no evidence of lateral movement and has contained the incident on its end.\u003c/p\u003e\n\n\u003cp\u003eJamf described several additional response actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt engaged cybersecurity experts to support its investigation.\u003c/li\u003e\n\u003cli\u003eIt took immediate defensive measures to protect its environment.\u003c/li\u003e\n\u003cli\u003eIt notified law enforcement.\u003c/li\u003e\n\u003cli\u003eIt remained in active communication with Klue.\u003c/li\u003e\n\u003cli\u003eIt directed customers to the Jamf blog post for future updates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"customer-risk-and-recommended-caution\"\u003eCustomer Risk and Recommended Caution\u003c/h2\u003e\n\n\u003cp\u003eJamf warned that the unauthorized party responsible for the Klue incident may conduct phishing campaigns using contact information stored within Salesforce. The company said these campaigns may involve impersonation of legitimate Jamf employees or IT professionals.\u003c/p\u003e\n\n\u003cp\u003eJamf encouraged customers to remain vigilant and exercise caution when sharing sensitive information or account credentials with unknown senders. It also advised customers to report suspicious email to their security team.\u003c/p\u003e\n\n\u003ch2 id=\"impact-statement\"\u003eImpact Statement\u003c/h2\u003e\n\n\u003cp\u003eJamf’s central impact statement is that the incident did not affect Jamf’s products and did not affect Jamf’s ability to serve customers. The known affected area is Jamf’s Salesforce environment, accessed through Klue’s integration.\u003c/p\u003e\n\n\u003cp\u003eJamf emphasized that its data-impact review is still underway. The company said it is treating the incident with seriousness and care and has dedicated expertise, time, and resources to the investigation.\u003c/p\u003e\n","keyPoints":["Jamf said a cybersecurity incident at third-party vendor Klue allowed an unauthorized party to access Jamf’s Salesforce instance data through Klue’s integration.","Jamf stated that the incident did not affect Jamf’s products and did not impact its ability to serve customers.","After receiving notice from Klue, Jamf immediately disabled Klue’s Salesforce integration and said it has no evidence of lateral movement.","Jamf engaged cybersecurity experts, notified law enforcement, and is reviewing what data was impacted.","Jamf warned customers that the unauthorized party may use contact information stored in Salesforce to conduct phishing campaigns while posing as Jamf employees or IT professionals."],"insights":["The access path was Klue’s integration with Jamf’s Salesforce instance, not Jamf’s own products, making the affected environment specifically Jamf’s CRM data rather than its device management or security platforms.","Jamf’s warning focuses on phishing risk because the exposed Salesforce data included contact information that could be used to make impersonation attempts appear legitimate.","Jamf has not yet completed its data-impact review, so customers are being directed to monitor the Jamf blog for updates as the investigation develops."],"referencedReports":[],"body":"\u003cp\u003eJamf disclosed an ongoing cybersecurity incident involving Klue, a third-party vendor Jamf uses for competitive intelligence services. According to Jamf, the incident occurred within Klue’s environment, where an unauthorized party gained access to Jamf’s Salesforce instance data through Klue’s integration. Jamf said the incident did not affect Jamf’s products and did not impact its ability to serve customers.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving notice from Klue, Jamf immediately disabled Klue’s integration within Salesforce. Jamf said it has no evidence of lateral movement and has contained the incident on its end. The company also engaged cybersecurity experts, took defensive measures, and notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eJamf said it has identified the timeline of unauthorized access to its Salesforce environment and is reviewing what data was impacted. While the investigation remains ongoing, Jamf believes the impact was primarily limited to business data fields within Salesforce. Jamf warned that the unauthorized party may conduct phishing campaigns using contact information stored in Salesforce and may pose as Jamf employees or IT professionals.\u003c/p\u003e\n"},{"n":2,"title":"Close Encounters of the Human Kind","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/close-encounters-of-the-human-kind/","time":"18:00","priority":"MAY READ","score":40,"tldr":"Cisco Talos argues that cybersecurity improvement depends less on simply giving people the right information and more on accounting for real-world constraints, behavior, and priorities. The practical takeaway is to focus on proven basics like MFA, patching, segmentation, backups, and validating controls rather than assuming awareness alone will drive action.","briefOverview":"\u003cp\u003eThe article is a Cisco Talos Threat Source newsletter that uses the film \u003cem\u003eDisclosure Day\u003c/em\u003e to discuss how people and organizations do not always respond rationally to important information. The author argues that knowing the right cybersecurity action is easier than finding the budget, time, urgency, and collective will to do it. The piece emphasizes familiar controls such as segmentation, backups, MFA, and verifying whether controls are working as intended.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter’s main technical item highlights a Cisco Talos approach to reverse engineering that pairs local AI agents with traditional analysis tools such as the VB6 disassembler vbdec. In this approach, vbdec exposes parsed data through a live Component Object Model interface so analysts can use natural language prompts to automate tasks such as decompiling functions or building call graphs. Talos says this keeps sensitive binaries on the analyst’s workstation while allowing agents to handle repeatable reverse engineering work.\u003c/p\u003e\n\n\u003cp\u003eThe article also summarizes several security headlines, including ShinyHunters claiming a Council of Europe hack, a credential-harvesting campaign affecting more than 30,000 Fortinet devices, and Phantom Stealer targeting browser credentials. It notes a FIFA World Cup internal system flaw that allowed a researcher to access platforms and control TV streams, and it describes the FBI’s Kinetic Cyber Range as a purpose-built town for simulating real-world cyberattacks. The newsletter closes with Talos content, upcoming Black Hat USA and DEF CON 34 events, and prevalent malware files from Talos telemetry.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis Cisco Talos Threat Source newsletter opens with commentary on human decision-making in cybersecurity, framed through the author’s reaction to Steven Spielberg’s fictional film \u003cem\u003eDisclosure Day\u003c/em\u003e. The author focuses on the idea that people may not react to world-changing information in predictable ways, even when historical data suggests they might. The same theme is applied to cybersecurity, where organizations know they should patch, people know they should use MFA, and leaders know they should practice incidents before they happen.\u003c/p\u003e\n\n\u003cp\u003eThe author argues that information alone is only one part of the puzzle because real-world decisions are shaped by limited budgets, workloads, competing business priorities, and many other pressures. The piece says many of the controls most likely to protect organizations remain the same ones defenders have discussed for years. These include segmentation, backups, MFA everywhere, and understanding whether controls are performing as expected.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter’s “one big thing” covers a Cisco Talos technical approach to reverse engineering that pairs local AI agents with traditional tools such as the VB6 disassembler vbdec. Instead of bolting AI directly onto software, vbdec exposes its parsed data through a live Component Object Model interface. Analysts can then use natural language prompts to automate complex tasks including decompiling functions and building call graphs, turning the disassembler into a queryable data server.\u003c/p\u003e\n\n\u003cp\u003eTalos presents the approach as useful because it lets analysts generate custom workflows without waiting for new vendor features. The article also says it addresses a privacy issue because the AI agent and disassembler operate on the same local machine, so sensitive binaries never leave the workstation. Tool developers are encouraged to expose application data through external scripting interfaces such as COM or other inter-process communication protocols.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also lists top security headlines from the week. ShinyHunters claimed a Council of Europe hack and threatened to release more than 297GB of allegedly stolen data, while a large credential-harvesting operation reportedly compromised more than 30,000 internet-facing Fortinet firewalls and VPN gateways across nearly 200 countries. Other headlines mention Fileless Phantom Stealer targeting browser credentials, a FIFA World Cup internal system flaw that allowed a researcher to control TV streams, and the FBI’s Kinetic Cyber Range.\u003c/p\u003e\n\n\u003cp\u003eAdditional Talos content includes a Talos Takes episode on patching in complex environments, a post about Cisco Talos Threat Hunting, and an interview with Tony Giandomenico. The newsletter lists upcoming appearances at Black Hat USA and DEF CON 34 in Las Vegas. It also provides Talos telemetry entries for prevalent malware files, including SHA256 hashes, MD5 hashes, example filenames, reputation links, and detection names.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is a Cisco Talos Threat Source newsletter titled “Close Encounters of the Human Kind.” It combines cybersecurity commentary, a highlighted Talos technical item, weekly security headlines, links to additional Talos content, upcoming event listings, and recent malware telemetry.\u003c/p\u003e\n\n\u003cp\u003eThe central commentary uses the film \u003cem\u003eDisclosure Day\u003c/em\u003e as a framing device for discussing how people respond to important information. The author says the film includes a theme in which a group of people, described as “the government,” believes it can predict humanity’s reaction to world-changing information based on historical data patterns.\u003c/p\u003e\n\n\u003cp\u003eThe author applies that theme to cybersecurity by arguing that information does not automatically produce rational action. Organizations know they should patch, people know they should use MFA, and leaders know they should practice incident response before a real incident occurs, but the article says real-world constraints often prevent action.\u003c/p\u003e\n\n\u003ch2 id=\"main-argument-information-alone-does-not-drive-security-behavior\"\u003eMain Argument: Information Alone Does Not Drive Security Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter argues that people and organizations do not make decisions in a vacuum. According to the article, decisions are shaped by limited budgets, workloads, competing business priorities, time constraints, resources, urgency, and collective will.\u003c/p\u003e\n\n\u003cp\u003eThe author writes that “knowing” what should be done is the easy part, while actually doing it is harder. This is presented as an important lesson for cybersecurity because defenders often rely on awareness and information as if those alone will change behavior.\u003c/p\u003e\n\n\u003cp\u003eThe article connects this point to long-standing security controls. It says that, even in a post-Mythos world, many of the controls most likely to protect organizations are the same ones discussed for years:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSegmentation.\u003c/li\u003e\n\u003cli\u003eBackups.\u003c/li\u003e\n\u003cli\u003eMFA everywhere.\u003c/li\u003e\n\u003cli\u003eUnderstanding whether controls are doing what they are supposed to do.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author concludes that human reactions vary based on experience, priorities, personality, context, and many other factors. The article ends the commentary by telling the small percentage of readers who may act on the message to go ahead and complete the MFA installation they have been putting off.\u003c/p\u003e\n\n\u003ch2 id=\"the-one-big-thing-local-ai-agents-for-reverse-engineering\"\u003eThe One Big Thing: Local AI Agents for Reverse Engineering\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter’s main technical item describes a Cisco Talos approach to reverse engineering that pairs local AI agents with traditional analysis tools. The example tool discussed is the VB6 disassembler vbdec.\u003c/p\u003e\n\n\u003cp\u003eThe article says the approach avoids awkwardly bolting AI onto the software. Instead, vbdec exposes its parsed data through a live Component Object Model interface.\u003c/p\u003e\n\n\u003cp\u003eThis allows analysts to use natural language prompts to automate complex reverse engineering tasks. The examples given in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDecompiling functions.\u003c/li\u003e\n\u003cli\u003eBuilding call graphs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe newsletter describes this as transforming the disassembler from a static viewer into an interactive, queryable data server.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-vbdec-approach\"\u003eSignificance of the vbdec Approach\u003c/h2\u003e\n\n\u003cp\u003eThe article says the methodology lets analysts generate custom workflows on the fly. It also says analysts can bypass waiting for vendors to add new features.\u003c/p\u003e\n\n\u003cp\u003eA key benefit described in the newsletter is privacy. Because the AI agent and disassembler share a local machine, the article says sensitive binaries never leave the analyst’s workstation.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as an architectural shift. It says any analysis tool that holds structured data behind a graphical user interface can become a powerful system for agentic automation if its data is exposed through an appropriate interface.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-from-the-technical-section\"\u003eRecommended Actions from the Technical Section\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter gives specific recommendations related to the reverse engineering approach:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTool developers should expose application data through external scripting interfaces.\u003c/li\u003e\n\u003cli\u003eSuggested mechanisms include COM or other inter-process communication protocols.\u003c/li\u003e\n\u003cli\u003eAnalysts working with VB6 binaries should enable remote scripting in vbdec.\u003c/li\u003e\n\u003cli\u003eAnalysts should point a preferred local AI agent at the provided operator briefing.\u003c/li\u003e\n\u003cli\u003eSecurity teams should let agents handle exhaustive, repeatable grunt work while analysts focus on analysis.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"weekly-security-headlines-mentioned\"\u003eWeekly Security Headlines Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes several security headlines from other publications.\u003c/p\u003e\n\n\u003ch3 id=\"shinyhunters-and-the-council-of-europe\"\u003eShinyHunters and the Council of Europe\u003c/h3\u003e\n\n\u003cp\u003eThe newsletter says ShinyHunters added the Council of Europe to its Tor-based leak site. According to the article, the group threatened to release more than 297GB of data allegedly stolen from the organization’s network.\u003c/p\u003e\n\n\u003ch3 id=\"fortinet-credential-harvesting-operation\"\u003eFortinet Credential-Harvesting Operation\u003c/h3\u003e\n\n\u003cp\u003eThe article says a large-scale cyber espionage and credential-harvesting operation is actively targeting Fortinet firewalls and VPN gateways. It states that the operation has already compromised more than 30,000 internet-facing devices across nearly 200 countries.\u003c/p\u003e\n\n\u003ch3 id=\"fileless-phantom-stealer\"\u003eFileless Phantom Stealer\u003c/h3\u003e\n\n\u003cp\u003eThe newsletter says Fileless Phantom Stealer targets browser credentials. It also states that the malware executes entirely in memory and uses anti-analysis techniques designed to evade detection.\u003c/p\u003e\n\n\u003ch3 id=\"fifa-world-cup-internal-system-flaw\"\u003eFIFA World Cup Internal System Flaw\u003c/h3\u003e\n\n\u003cp\u003eThe article says a security researcher reported access to several internal FIFA platforms because of a simple security flaw. According to the newsletter, the flaw allowed the researcher to watch and have full control of the TV stream of every World Cup game.\u003c/p\u003e\n\n\u003ch3 id=\"fbi-kinetic-cyber-range\"\u003eFBI Kinetic Cyber Range\u003c/h3\u003e\n\n\u003cp\u003eThe newsletter says the FBI built a replica small town called the Kinetic Cyber Range to simulate real-world cyberattacks. It states that the range opened in February 2025 and includes furnished houses, a hotel, a gas station and grocery mart, a courthouse, a hospital, roads, traffic lights, and a power company designed to mimic a real U.S. community.\u003c/p\u003e\n\n\u003ch2 id=\"additional-talos-content-highlighted\"\u003eAdditional Talos Content Highlighted\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter promotes several additional Talos items.\u003c/p\u003e\n\n\u003ch3 id=\"patching-in-the-dark\"\u003ePatching in the Dark\u003c/h3\u003e\n\n\u003cp\u003eThe article links to a Talos Takes episode titled “Patching in the dark: Managing unknown threats in complex environments.” It says the episode explores the logistical, technical, and business realities that make patching more complex than a simple button click.\u003c/p\u003e\n\n\u003ch3 id=\"cisco-talos-threat-hunting\"\u003eCisco Talos Threat Hunting\u003c/h3\u003e\n\n\u003cp\u003eThe newsletter links to “Hypotheses, telemetry, and human judgment: Inside Cisco Talos Threat Hunting.” It describes the piece as explaining how Cisco Talos Threat Hunting uses hypothesis-driven methods and multi-domain telemetry correlation to find stealthy threats operating below automated detection thresholds.\u003c/p\u003e\n\n\u003ch3 id=\"winning-the-cyber-marathon\"\u003eWinning the Cyber Marathon\u003c/h3\u003e\n\n\u003cp\u003eThe newsletter links to “Winning the cyber marathon with Tony Giandomenico.” It says Tony Giandomenico, Senior Director of Product Management with Cisco Talos, discusses Talos Threat Hunting, the challenges of leading major product launches, and Ironman triathlons.\u003c/p\u003e\n\n\u003ch2 id=\"upcoming-events\"\u003eUpcoming Events\u003c/h2\u003e\n\n\u003cp\u003eThe article lists two upcoming events where readers can find Talos:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlack Hat USA, Aug. 1–6, in Las Vegas, Nevada.\u003c/li\u003e\n\u003cli\u003eDEF CON 34, Aug. 6–9, in Las Vegas, Nevada.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-telemetry-listed-by-talos\"\u003eMalware Telemetry Listed by Talos\u003c/h2\u003e\n\n\u003cp\u003eThe article ends with prevalent malware files from Talos telemetry over the past week. Each entry includes a SHA256 hash, MD5 hash, Talos reputation link, example filename, and detection name.\u003c/p\u003e\n\n\u003cp\u003eThe listed entries include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSHA256 \u003ccode\u003e9f1f11a708d393e0a4109ae189bc64f1f3e312653dcf317a2bd406f18ffcc507\u003c/code\u003e, example filename \u003ccode\u003eVID001.exe\u003c/code\u003e, detection name \u003ccode\u003eWin.Worm.Coinminer::1201\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 \u003ccode\u003ec0ad494457dcd9e964378760fb6aca86a23622045bca851d8f3ab49ec33978fe\u003c/code\u003e, example filename \u003ccode\u003ef_000cd7.html\u003c/code\u003e, detection name \u003ccode\u003eW32.C0AD494457-95.SBX.TG\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 \u003ccode\u003e9896a6fcb9bb5ac1ec5297b4a65be3f647589adf7c37b45f3f7466decd6a4a7f\u003c/code\u003e, example filename \u003ccode\u003eSECOH-QAD.exe\u003c/code\u003e, detection name \u003ccode\u003eWin.Tool.Procpatcher::1201\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 \u003ccode\u003ee60ab99da105ee27ee09ea64ed8eb46d8edc92ee37f039dbc3e2bb9f587a33ba\u003c/code\u003e, example filename \u003ccode\u003eu992574.dll\u003c/code\u003e, detection name \u003ccode\u003eW32.Variant:MalwareXgenMisc.29d4.1201\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that cybersecurity outcomes depend not only on giving people accurate information but also on understanding how people and organizations actually make decisions. It pairs that behavioral message with a technical example of using local AI agents and exposed tool data to automate reverse engineering while keeping sensitive binaries on the workstation.\u003c/p\u003e\n","keyPoints":["The article argues that having the right security information does not necessarily cause people or organizations to take the right actions because decisions are shaped by budgets, workloads, priorities, and other constraints.","The author highlights longstanding security controls such as segmentation, backups, MFA, and validation that controls are working as important protections for organizations.","Cisco Talos described a reverse engineering approach that pairs local AI agents with tools such as the VB6 disassembler vbdec through a live COM interface.","The vbdec approach allows analysts to use natural language prompts to automate tasks such as decompiling functions and building call graphs while keeping sensitive binaries on the local workstation.","The newsletter summarizes security headlines including ShinyHunters claiming a Council of Europe hack, a credential-harvesting operation affecting more than 30,000 Fortinet devices, and Phantom Stealer targeting browser credentials."],"insights":["Security teams should account for organizational friction such as limited budgets, workloads, and competing priorities when trying to drive adoption of controls like MFA, patching, backups, and segmentation.","The article frames local AI-assisted reverse engineering as a privacy-preserving model because the AI agent and disassembler operate on the same machine and sensitive binaries do not leave the analyst’s workstation.","Tool developers can make existing GUI-based analysis tools more useful for agentic automation by exposing structured application data through external scripting interfaces such as COM or other IPC protocols.","Analysts using vbdec can bypass waiting for vendor-built features by using natural language prompts to create custom reverse engineering workflows on demand."],"referencedReports":[],"body":"\u003cp\u003eThe article is a Cisco Talos Threat Source newsletter that uses the film \u003cem\u003eDisclosure Day\u003c/em\u003e to discuss how people and organizations do not always respond rationally to important information. The author argues that knowing the right cybersecurity action is easier than finding the budget, time, urgency, and collective will to do it. The piece emphasizes familiar controls such as segmentation, backups, MFA, and verifying whether controls are working as intended.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter’s main technical item highlights a Cisco Talos approach to reverse engineering that pairs local AI agents with traditional analysis tools such as the VB6 disassembler vbdec. In this approach, vbdec exposes parsed data through a live Component Object Model interface so analysts can use natural language prompts to automate tasks such as decompiling functions or building call graphs. Talos says this keeps sensitive binaries on the analyst’s workstation while allowing agents to handle repeatable reverse engineering work.\u003c/p\u003e\n\n\u003cp\u003eThe article also summarizes several security headlines, including ShinyHunters claiming a Council of Europe hack, a credential-harvesting campaign affecting more than 30,000 Fortinet devices, and Phantom Stealer targeting browser credentials. It notes a FIFA World Cup internal system flaw that allowed a researcher to access platforms and control TV streams, and it describes the FBI’s Kinetic Cyber Range as a purpose-built town for simulating real-world cyberattacks. The newsletter closes with Talos content, upcoming Black Hat USA and DEF CON 34 events, and prevalent malware files from Talos telemetry.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
