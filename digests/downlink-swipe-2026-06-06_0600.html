Code, Gemini CLI, Cursor, VS Code, and the npm test script.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s GitHub repositories became the latest victims of the ongoing Miasma self-replicating supply chain attack campaign. According to OpenSourceMalware, the incident affected 73 Microsoft repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations. GitHub disabled access to impacted repositories, including Azure/azure-functions-host, with a message saying access was disabled due to a violation of GitHub’s terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several affected repositories, including azure-search-openai-demo-purviewdatasecurity, Connectors-NET-LSP, Connectors-NET-SDK, durabletask, durabletask-dotnet, durabletask-go, durabletask-js, durabletask-mssql, functions-container-action, homebrew-functions, llm-fine-tuning, and windows-driver-docs. A notable element of the campaign is the re-compromise of the durabletask PyPI package. That package had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Paul McCarty, also known as 6mile, said the latest takedown included not only Azure/durabletask but sibling repositories across the Durable Task ecosystem. He described the recurrence as “the same wound reopening” and said whoever held the credentials in May plausibly never fully lost them. The article does not state that this has been confirmed, but presents it as McCarty’s assessment.\u003c/p\u003e\n\n\u003cp\u003eMiasma is assessed to be a variant of the Mini Shai-Hulud worm that TeamPCP publicly released in mid-May 2026. The campaign has continued to mutate and refine its tactics while infecting more packages. The article says newly created public repositories containing stolen secrets used descriptions including “Miasma: The Spreading Blight,” “Miasma : The Spreading Blight,” “Miasma - The Spreading Blight,” and “Hades - The End for the Damned.”\u003c/p\u003e\n\n\u003cp\u003eMiasma has also been observed skipping the npm registry entirely by pushing malicious code directly to icflorescu/mantine-datatable and related repositories. SafeDep said the commit added no dependencies but planted a 4.3 MB payload runner and wired it to execute automatically through Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script. FalconFeeds.io said the worm operates within legitimate channels by exploiting the trust model behind platforms such as npm and GitHub rather than exploiting a vulnerability in them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s GitHub repositories were affected by the ongoing Miasma self-replicating supply chain attack campaign. OpenSourceMalware reported that the incident impacted 73 Microsoft repositories across four GitHub organizations: Azure, Azure-Samples, Microsoft, and MicrosoftDocs. GitHub disabled access to the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eWhen attempting to access the Azure/azure-functions-host repository, GitHub displayed a notice stating that access had been disabled by GitHub Staff due to a violation of GitHub’s terms of service. The notice also said repository owners could contact GitHub Support for more information.\u003c/p\u003e\n\n\u003ch2 id=\"affected-microsoft-repositories\"\u003eAffected Microsoft repositories\u003c/h2\u003e\n\n\u003cp\u003eThe article says some of the repositories impacted by the incident include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eazure-search-openai-demo-purviewdatasecurity\u003c/li\u003e\n\u003cli\u003eConnectors-NET-LSP\u003c/li\u003e\n\u003cli\u003eConnectors-NET-SDK\u003c/li\u003e\n\u003cli\u003edurabletask\u003c/li\u003e\n\u003cli\u003edurabletask-dotnet\u003c/li\u003e\n\u003cli\u003edurabletask-go\u003c/li\u003e\n\u003cli\u003edurabletask-js\u003c/li\u003e\n\u003cli\u003edurabletask-mssql\u003c/li\u003e\n\u003cli\u003efunctions-container-action\u003c/li\u003e\n\u003cli\u003ehomebrew-functions\u003c/li\u003e\n\u003cli\u003ellm-fine-tuning\u003c/li\u003e\n\u003cli\u003ewindows-driver-docs\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected repositories span Microsoft’s Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations.\u003c/p\u003e\n\n\u003ch2 id=\"durable-task-re-compromise\"\u003eDurable Task re-compromise\u003c/h2\u003e\n\n\u003cp\u003eA notable aspect of the latest campaign is the re-compromise of the durabletask PyPI package. The article states that durabletask had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Paul McCarty, also known as 6mile, said that a month after the earlier compromise, Azure/durabletask was gone along with sibling repositories in the Durable Task ecosystem. He identified affected ecosystem components including .NET, Go, Java, JS, MSSQL, Netherite, protobuf implementations, and the Durable Functions monitor.\u003c/p\u003e\n\n\u003cp\u003eMcCarty said the recurrence was “not a coincidence” and described it as “the same wound reopening.” He also said whoever held the credentials in May plausibly never fully lost them.\u003c/p\u003e\n\n\u003ch2 id=\"miasma-and-mini-shai-hulud\"\u003eMiasma and Mini Shai-Hulud\u003c/h2\u003e\n\n\u003cp\u003eThe article says Miasma is assessed to be a variant of the Mini Shai-Hulud worm that TeamPCP publicly released in mid-May 2026. Since then, Miasma has continued to mutate and refine its tactics. The article says it has infected more packages over the past couple of days.\u003c/p\u003e\n\n\u003cp\u003eThe campaign has used several descriptions for newly created public repositories containing stolen secrets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“Miasma: The Spreading Blight”\u003c/li\u003e\n\u003cli\u003e“Miasma : The Spreading Blight”\u003c/li\u003e\n\u003cli\u003e“Miasma - The Spreading Blight”\u003c/li\u003e\n\u003cli\u003e“Hades - The End for the Damned”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the time of writing, the article says there were 13 repositories with the description “Hades - The End for the Damned” and 82 repositories using the remaining three Miasma-related naming patterns.\u003c/p\u003e\n\n\u003ch2 id=\"direct-github-repository-compromise-and-developer-tool-execution\"\u003eDirect GitHub repository compromise and developer tool execution\u003c/h2\u003e\n\n\u003cp\u003eMiasma has also been observed skipping the npm registry entirely. In those cases, the threat actors pushed malicious code directly to icflorescu/mantine-datatable and four related repositories: mantine-contextmenu, next-server-actions-parallel, mantine-datatable-v6, and mantine-contextmenu-v6.\u003c/p\u003e\n\n\u003cp\u003eSafeDep said the malicious commit added no dependencies. Instead, it planted a 4.3 MB payload runner and wired it to execute automatically through five developer tools or workflows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClaude Code\u003c/li\u003e\n\u003cli\u003eGemini CLI\u003c/li\u003e\n\u003cli\u003eCursor\u003c/li\u003e\n\u003cli\u003eVS Code\u003c/li\u003e\n\u003cli\u003enpm test script\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSafeDep said the attack detonates when a developer clones one of the affected repositories and opens it in an AI coding agent. It described the dropper as the same staged Bun loader, repurposed for GitHub source-repository persistence rather than registry poisoning.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-campaign\"\u003eSignificance of the campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the campaign as one of the most significant and sustained software supply chain campaigns observed to date. It says these attacks expose weaknesses in the trust model that underpins software delivery in open-source ecosystems.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the activity differs from other incidents because it can propagate across the ecosystem by compromising downstream users and repeating the same cycle. FalconFeeds.io said the worm operates entirely within legitimate channels and does not exploit a vulnerability in npm or GitHub.\u003c/p\u003e\n\n\u003cp\u003eAccording to FalconFeeds.io, the worm exploits the trust model those platforms are built on: the assumption that a package signed with a valid key and published by an authenticated maintainer is safe. FalconFeeds.io said Shai-Hulud compromises the key and the maintainer, then acts as a legitimate publisher would, making malicious publish events indistinguishable from routine updates from the registry’s perspective.\u003c/p\u003e\n","keyPoints":["The Miasma self-replicating supply chain campaign impacted 73 Microsoft GitHub repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs organizations.","GitHub disabled access to affected repositories, including Azure/azure-functions-host, citing a violation of GitHub's terms of service.","The campaign included a re-compromise of the durabletask PyPI package, which had been infected by TeamPCP the previous month to deliver an information stealer on Linux systems.","Miasma is assessed to be a variant of the Mini Shai-Hulud worm that TeamPCP publicly released in mid-May 2026.","Miasma has also been observed pushing malicious code directly to GitHub repositories and wiring execution through developer tools including Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script."],"insights":["The re-compromise of the durabletask ecosystem suggests that remediation after the prior TeamPCP incident may not have fully removed the attacker’s access to relevant credentials or publishing paths.","Miasma’s use of legitimate GitHub, npm, and PyPI workflows makes malicious activity difficult to distinguish from normal maintainer actions when credentials are compromised.","The campaign’s shift to direct GitHub source-repository persistence shows that package registry monitoring alone is insufficient to detect this worm’s propagation methods.","The malicious commit targeting AI coding agents demonstrates that opening a cloned repository in tools such as Claude Code, Gemini CLI, Cursor, or VS Code can become an execution trigger in this campaign."],"referencedReports":[{"title":"Miasma Reaches Azure","url":"https://opensourcemalware.com/blog/miasma-reaches-azure","publisher":"OpenSourceMalware","context":"The article cites OpenSourceMalware for the finding that 73 Microsoft repositories across four GitHub organizations were impacted.","category":"","primary":false},{"title":"Mini Shai-Hulud Worm Returns, Goes Public","url":"https://www.akamai.com/blog/security-research/mini-shai-hulud-worm-returns-goes-public","publisher":"Akamai","context":"The article references Akamai's security research when describing Miasma as a variant of the Mini Shai-Hulud worm publicly released in mid-May 2026.","category":"","primary":false},{"title":"600,000 Monthly Downloads Affected: Miasma Supply Chain Attack Is Back on NPM","url":"https://www.ox.security/blog/600000-monthly-downloads-affected-miasma-supply-chain-attack-is-back-on-npm/","publisher":"OX Security","context":"The article cites OX Security's research for Miasma infecting more packages over the past couple of days.","category":"","primary":false},{"title":"Miasma Worm: AI Coding Agent Config Injection","url":"https://safedep.io/miasma-worm-ai-coding-agent-config-injection/","publisher":"SafeDep","context":"The article quotes SafeDep's analysis of malicious code being pushed directly to GitHub repositories and wired to execute through AI coding agents and developer tools.","category":"","primary":false},{"title":"Threat Advisory: TanStack Supply Chain Attack","url":"https://www.uvcyber.com/resources/reports/threat-advisory-tanstack-supply-chain-attack","publisher":"UVCyber","context":"The article links to UVCyber's threat advisory while discussing how recent software supply chain attacks exposed weaknesses in open-source trust models.","category":"","primary":false},{"title":"Shai-Hulud NPM/PyPI Supply Chain Worm Analysis","url":"https://falconfeeds.io/blogs/shai-hulud-npm-pypi-supply-chain-worm-analysis/","publisher":"FalconFeeds.io","context":"The article quotes FalconFeeds.io's analysis explaining that the worm abuses trusted maintainer and registry workflows rather than exploiting npm or GitHub vulnerabilities.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft’s GitHub repositories were hit by the ongoing Miasma self-replicating supply chain campaign. OpenSourceMalware reported that 73 repositories across the Azure, Azure-Samples, Microsoft, and MicrosoftDocs GitHub organizations were impacted. GitHub disabled access to affected repositories, with a notice citing a violation of GitHub’s terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the re-compromise of the durabletask PyPI package, which had been infected the previous month by TeamPCP to deliver an information stealer on Linux systems. Security researcher Paul McCarty said the takedown of the Durable Task ecosystem suggested the same “wound” had reopened. Miasma is assessed to be a variant of the Mini Shai-Hulud worm publicly released by TeamPCP in mid-May 2026.\u003c/p\u003e\n\n\u003cp\u003eMiasma has continued to mutate, infect more packages, and create public repositories containing stolen secrets under names such as “Miasma: The Spreading Blight” and “Hades - The End for the Damned.” The campaign has also skipped the npm registry in some cases by pushing malicious code directly to GitHub repositories. SafeDep said one commit planted a 4.3 MB payload runner and wired execution through Claude Code, Gemini CLI, Cursor, VS Code, and the npm test script.\u003c/p\u003e\n"},{"n":1,"title":"AI Agent Uncovers 21 Zero-Days in FFmpeg; Chrome Patches Record 429 Bugs","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ai-agent-uncovers-21-zero-days-in.html","time":"07:28","priority":"MUST READ","score":92,"tldr":"AI-driven vulnerability discovery is accelerating sharply, with an autonomous agent finding 21 zero-days in FFmpeg while Chrome patched a record 429 bugs amid rising AI-generated report volume. The key challenge is no longer just finding flaws, but triaging, fixing, and deploying patches fast enough across widely embedded software.","briefOverview":"\u003cp\u003eSecurity startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg, all found by an autonomous AI agent scanning about 1.5 million lines of C. The run reportedly cost around $1,000 and produced confirmed zero-days with reproducible proof-of-concept inputs. Several bugs had been present for 15 to 20 years, including a stack overflow in service-description-table code dating to 2003.\u003c/p\u003e\n\n\u003cp\u003eIn the same week, Google released Chrome 149 with patches for 429 security bugs, the most ever in a single release. More than 100 of the Chrome issues were critical or high severity, including CVE-2026-10881, an ANGLE graphics engine flaw that can allow sandbox escape and code execution on the host. The article says the broader significance is that AI is increasing vulnerability volume and pressure on triage, patching, and deployment workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends pulling fixed upstream FFmpeg builds or distribution security updates, including for embedded copies in media pipelines, Python wheels, container images, and appliances. It also advises updating Chrome to 149.0.7827.53 on Linux or 149.0.7827.\u003csup\u003e53\u003c/sup\u003e\u0026frasl;\u003csub\u003e54\u003c/sub\u003e on Windows and macOS. The article emphasizes shorter patch cycles, auto-update where available, and treating dependency bumps with CVE fixes as security work.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTwo major vulnerability developments landed in the same week: depthfirst reported 21 FFmpeg zero-days found by an autonomous AI agent, and Google shipped Chrome 149 with fixes for 429 security bugs. Only the FFmpeg bugs were found by AI, while Chrome’s record patch volume followed Google’s overhaul of its bounty program to handle a flood of AI-generated submissions. The article frames both events as evidence that AI is putting more vulnerabilities in front of maintainers and triagers faster than before.\u003c/p\u003e\n\n\u003cp\u003eThe FFmpeg findings came from depthfirst, whose autonomous security agent scanned roughly 1.5 million lines of C and produced 21 confirmed zero-days. Each vulnerability had a reproducible proof-of-concept input, and the run reportedly cost about $1,000. Several of the issues had been latent for 15 to 20 years, with one stack overflow in service-description-table code dating to 2003.\u003c/p\u003e\n\n\u003cp\u003eMost of the FFmpeg issues are heap or stack overflows in parsers and demuxers, including areas such as the TS demuxer and VP9 decoder. depthfirst said some already have CVE identifiers, listing CVE-2026-39210 through CVE-2026-39218, while the remaining fixed issues had not yet been numbered. The company also published a proof of concept for one of the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eChrome 149 fixed 429 vulnerabilities, with more than 100 rated critical or high severity. The most severe issue, CVE-2026-10881, is an out-of-bounds read and write in the ANGLE graphics engine that can let a crafted page escape the sandbox and run code on the host. Google paid $97,000 for that bug, and the article notes that most of the highest-severity Chrome bugs were found internally.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites earlier AI-assisted vulnerability work, including Google’s Big Sleep bugs in FFmpeg, Anthropic’s Mythos model finding old FFmpeg flaws, an autonomous tool finding an authenticated RCE in Redis, and a February study on Linux kernel N-day bugs. For response, it urges organizations to update FFmpeg through upstream or distribution fixes, patch embedded FFmpeg copies, and update Chrome to the listed 149 builds. The article concludes that finding bugs is becoming cheaper, but triage, fixes, shipping, and installation remain the bottleneck.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two vulnerability developments that occurred within days of each other. Security startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg, all found by an autonomous AI agent. In the same week, Google released Chrome 149 with fixes for 429 security bugs, which the article says is the most ever in a single Chrome release.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes the two events: only the FFmpeg vulnerabilities were found by AI. Chrome’s record patch volume is connected to AI through Google’s earlier bounty-program overhaul, which was prompted by a flood of AI-generated submissions. The shared theme is that AI is increasing the volume and speed of vulnerability discovery and reporting.\u003c/p\u003e\n\n\u003ch2 id=\"ffmpeg-zero-days-found-by-depthfirst\"\u003eFFmpeg zero-days found by depthfirst\u003c/h2\u003e\n\n\u003cp\u003eThe FFmpeg findings came from depthfirst, whose autonomous security agent scanned the project’s roughly 1.5 million lines of C. The agent produced 21 confirmed zero-days, each with a reproducible proof-of-concept input. depthfirst put the cost of the run at around $1,000.\u003c/p\u003e\n\n\u003cp\u003eSeveral of the FFmpeg bugs had reportedly existed for 15 to 20 years. One stack overflow in service-description-table code dates to 2003 and had remained untouched for 23 years. The article emphasizes that these were previously unknown vulnerabilities in a media library widely used in software that handles video.\u003c/p\u003e\n\n\u003cp\u003eMost of the FFmpeg issues are described as heap or stack overflows in parsers and demuxers. Affected areas include components from the TS demuxer to the VP9 decoder. depthfirst said some of the bugs already had CVE identifiers and listed CVE-2026-39210 through CVE-2026-39218, while the rest were fixed but not yet numbered.\u003c/p\u003e\n\n\u003cp\u003eThe article also says depthfirst published a proof of concept. FFmpeg users are advised to pull the fixed upstream build or distribution security update as soon as it lands.\u003c/p\u003e\n\n\u003ch2 id=\"chrome-149-patch-release\"\u003eChrome 149 patch release\u003c/h2\u003e\n\n\u003cp\u003eGoogle shipped Chrome 149 with patches for 429 vulnerabilities. The article identifies this as a record for a single Chrome release. More than 100 of the fixed issues are described as critical or high severity, mostly use-after-free and insufficient input validation bugs.\u003c/p\u003e\n\n\u003cp\u003eThe most severe Chrome issue is CVE-2026-10881, with a CVSS score of 9.6. It is an out-of-bounds read and write in the ANGLE graphics engine. The article says the flaw allows a crafted page to escape the sandbox and run code on the host, and that Google paid $97,000 for it.\u003c/p\u003e\n\n\u003cp\u003eThe highest-severity Chrome bugs were mostly found internally. Of roughly 90 high-severity bugs, only 10 came from outside researchers. Of 22 critical bugs, 19 were Google’s own findings.\u003c/p\u003e\n\n\u003cp\u003eGoogle has not tied the 429 Chrome vulnerabilities directly to AI. The article says the on-record AI-related signal is Google’s April bounty overhaul, which was prompted by a flood of AI-generated submissions. That overhaul asks for concise reproducers instead of long writeups generated by AI.\u003c/p\u003e\n\n\u003ch2 id=\"other-ai-assisted-vulnerability-examples-cited\"\u003eOther AI-assisted vulnerability examples cited\u003c/h2\u003e\n\n\u003cp\u003eThe article places the depthfirst and Chrome developments in a broader pattern of AI-assisted vulnerability discovery and reporting. It cites Google’s Big Sleep agent, which reported several FFmpeg bugs last year that are now visible on FFmpeg’s security page with the BIGSLEEP tag.\u003c/p\u003e\n\n\u003cp\u003eThe article also references Anthropic’s Mythos model, which found a 16-year-old H.264 flaw and other FFmpeg bugs for about $10,000. According to the article, three of those issues shipped in FFmpeg 8.1.\u003c/p\u003e\n\n\u003cp\u003eAnother autonomous tool reportedly found an authenticated remote code execution issue in Redis that had been present since version 7.2.0 and unnoticed for more than two years. The article also cites a February study in which an agent reproduced working proofs of concept for more than half of 100 real Linux kernel N-day bugs, beating fuzzing.\u003c/p\u003e\n\n\u003ch2 id=\"affected-software-and-stakeholders\"\u003eAffected software and stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe directly discussed affected software includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFFmpeg, including components such as parsers, demuxers, the TS demuxer, the VP9 decoder, service-description-table code, and AV1-over-RTP ingestion paths.\u003c/li\u003e\n\u003cli\u003eGoogle Chrome 149.\u003c/li\u003e\n\u003cli\u003eThe ANGLE graphics engine in Chrome.\u003c/li\u003e\n\u003cli\u003eRedis, in a separate cited example involving an authenticated RCE.\u003c/li\u003e\n\u003cli\u003eLinux kernel N-day bugs, in a cited February study.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe named organizations and entities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edepthfirst, which reported the 21 FFmpeg zero-days.\u003c/li\u003e\n\u003cli\u003eGoogle, which released Chrome 149 and previously overhauled its bounty program.\u003c/li\u003e\n\u003cli\u003eFFmpeg, whose project code and security page are referenced.\u003c/li\u003e\n\u003cli\u003eAnthropic, whose Mythos model is cited for earlier FFmpeg findings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not identify malicious threat actors behind these events. The actors discussed are security researchers, vendors, autonomous tools, and AI agents involved in vulnerability discovery, reporting, and patching.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended response\u003c/h2\u003e\n\n\u003cp\u003eFor FFmpeg, the article recommends pulling the fixed upstream build or applying distribution security updates as soon as they become available. It specifically says to prioritize environments that ingest untrusted RTSP or AV1-over-RTP. It also warns that FFmpeg is widely bundled in media pipelines, Python wheels, container images, and appliances, so updating only system packages is not enough.\u003c/p\u003e\n\n\u003cp\u003eFor Chrome, the article recommends updating to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e149.0.7827.53 on Linux.\u003c/li\u003e\n\u003cli\u003e149.0.7827.53 or 149.0.7827.54 on Windows and macOS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also recommends confirming that Chrome auto-update has run. More broadly, it calls for shorter patch cycles, auto-update wherever available, and treating dependency bumps that carry CVE fixes as security work rather than routine maintenance.\u003c/p\u003e\n\n\u003ch2 id=\"main-significance\"\u003eMain significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main conclusion is that AI has made vulnerability discovery cheaper and faster, but remediation has not accelerated in the same way. It says the hard work is shifting toward triaging reports, shipping fixes, and getting patches installed. Much of that work still falls to volunteers and a thin layer of human triagers who are now expected to keep pace with machines.\u003c/p\u003e\n","keyPoints":["Security startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg that were found by an autonomous AI agent, with the run costing about $1,000.","Several of the FFmpeg bugs had existed for 15 to 20 years, including a stack overflow in service-description-table code dating to 2003.","Google released Chrome 149 with fixes for 429 security vulnerabilities, including more than 100 critical or high-severity issues.","The most severe Chrome flaw, CVE-2026-10881, is an out-of-bounds read and write in the ANGLE graphics engine that can let a crafted page escape the sandbox and run code on the host.","The article says organizations should update FFmpeg from upstream or distribution security releases, patch embedded FFmpeg copies, and update Chrome to version 149.0.7827.53 on Linux or 149.0.7827.53/54 on Windows and macOS."],"insights":["The economics of vulnerability discovery are shifting because depthfirst’s autonomous agent reportedly found 21 confirmed FFmpeg zero-days for about $1,000, while Anthropic’s Mythos found older FFmpeg flaws for about $10,000.","AI is increasing pressure on vulnerability handling even when it is not directly responsible for the bugs found, as shown by Chrome’s record patch volume following Google’s bounty-program changes for AI-generated submissions.","Embedded FFmpeg copies in media pipelines, Python wheels, container images, and appliances are a significant patching risk because updating only system packages may leave vulnerable code in place.","The article highlights triage and remediation as the bottleneck, noting that finding bugs has become cheaper while fixing, shipping, and installing patches still depends heavily on human triagers and volunteers."],"referencedReports":[{"title":"21 Zero-Days in FFmpeg","url":"https://depthfirst.com/research/21-zero-days-in-ffmpeg","publisher":"depthfirst","context":"The article cites depthfirst’s research as the source for the 21 confirmed FFmpeg zero-days found by an autonomous security agent.","category":"","primary":false},{"title":"Stable Channel Update for Desktop","url":"https://chromereleases.googleblog.com/2026/06/stable-channel-update-for-desktop.html","publisher":"Google Chrome Releases","context":"The article cites Google’s Chrome release post as the source for Chrome 149 and its security fixes.","category":"","primary":false},{"title":"Evolving the Android \u0026 Chrome VRPs for the AI Era","url":"https://bughunters.google.com/blog/evolving-the-android-chrome-vrps-for-the-ai-era","publisher":"Google Bug Hunters","context":"The article references Google’s bounty-program overhaul as an on-record signal that AI-generated vulnerability submissions are affecting triage workflows.","category":"","primary":false},{"title":"FFmpeg Security","url":"https://ffmpeg.org/security.html","publisher":"FFmpeg","context":"The article references FFmpeg’s security page for previously reported BIGSLEEP-tagged FFmpeg bugs.","category":"","primary":false},{"title":"Mythos Preview","url":"https://red.anthropic.com/2026/mythos-preview/","publisher":"Anthropic","context":"The article cites Anthropic’s own writeup about its Mythos model finding older FFmpeg flaws.","category":"","primary":false},{"title":"100 Real Linux Kernel N-Day Bugs","url":"https://arxiv.org/abs/2602.07287","publisher":"arXiv","context":"The article cites a February study in which an agent reproduced working proofs of concept for more than half of 100 real Linux kernel N-day bugs.","category":"","primary":false}],"body":"\u003cp\u003eSecurity startup depthfirst reported 21 previously unknown vulnerabilities in FFmpeg, all found by an autonomous AI agent scanning about 1.5 million lines of C. The run reportedly cost around $1,000 and produced confirmed zero-days with reproducible proof-of-concept inputs. Several bugs had been present for 15 to 20 years, including a stack overflow in service-description-table code dating to 2003.\u003c/p\u003e\n\n\u003cp\u003eIn the same week, Google released Chrome 149 with patches for 429 security bugs, the most ever in a single release. More than 100 of the Chrome issues were critical or high severity, including CVE-2026-10881, an ANGLE graphics engine flaw that can allow sandbox escape and code execution on the host. The article says the broader significance is that AI is increasing vulnerability volume and pressure on triage, patching, and deployment workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends pulling fixed upstream FFmpeg builds or distribution security updates, including for embedded copies in media pipelines, Python wheels, container images, and appliances. It also advises updating Chrome to 149.0.7827.53 on Linux or 149.0.7827.\u003csup\u003e53\u003c/sup\u003e\u0026frasl;\u003csub\u003e54\u003c/sub\u003e on Windows and macOS. The article emphasizes shorter patch cycles, auto-update where available, and treating dependency bumps with CVE fixes as security work.\u003c/p\u003e\n"},{"n":2,"title":"CISA Adds Actively Exploited SolarWinds Serv-U DoS Flaw to KEV Catalog","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-adds-actively-exploited-solarwinds.html","time":"08:14","priority":"MUST READ","score":92,"tldr":"CISA added CVE-2026-28318, an actively exploited SolarWinds Serv-U denial-of-service flaw, to its KEV catalog and ordered federal agencies to remediate it by June 19, 2026. SolarWinds has patched the issue in Serv-U 15.5.4 HF1 and recommends limiting access or blocking requests with Content-Encoding.","briefOverview":"\u003cp\u003eCISA has added CVE-2026-28318, a high-severity flaw affecting SolarWinds Serv-U multi-protocol file server software, to its Known Exploited Vulnerabilities catalog. The agency cited evidence of active exploitation. The vulnerability has a CVSS score of 7.5 and can cause the Serv-U service to crash.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds described the issue as involving specially crafted unauthenticated POST requests using Content-Encoding: deflate. CISA characterized it as an uncontrolled resource consumption vulnerability that results in a denial-of-service condition. SolarWinds addressed the flaw in Serv-U version 15.5.4 HF1 and advised limiting access to known addresses and blocking requests containing \u0026ldquo;content-encoding.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe article says there are no details on how the vulnerability is being exploited in real-world attacks or who is behind the activity. It is also unclear how many internet-exposed Serv-U instances, if any, are compromised. CISA ordered Federal Civilian Executive Branch agencies to address the flaw by June 19, 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added a SolarWinds Serv-U vulnerability to its Known Exploited Vulnerabilities catalog. The flaw is tracked as CVE-2026-28318 and is described as a high-severity denial-of-service issue. CISA added it because of evidence of active exploitation.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-28318 has a CVSS score of 7.5 and affects SolarWinds Serv-U multi-protocol file server software. CISA described the bug as an uncontrolled resource consumption vulnerability that results in a denial-of-service condition. The article states that the flaw causes the service to crash under certain conditions.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds said Serv-U is susceptible to specially crafted POST requests that crash the Serv-U service without authentication. The requests use Content-Encoding: deflate. The company released an advisory earlier in the week with this description.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds fixed the vulnerability in Serv-U version 15.5.4 HF1. As mitigations, the article says organizations are advised to limit access to known addresses and block any request containing \u0026ldquo;content-encoding.\u0026rdquo; SolarWinds said the vulnerable service does not require this functionality.\u003c/p\u003e\n\n\u003cp\u003eThe article states that no details are currently available on how the flaw is being exploited in real-world attacks or who is behind them. It is also unclear how many internet-exposed Serv-U instances are compromised, if any. CISA ordered Federal Civilian Executive Branch agencies to address the flaw by June 19, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that multiple Serv-U flaws have previously been exploited by bad actors. It specifically mentions actors associated with the Cl0p ransomware gang in connection with prior Serv-U exploitation. No actor is identified for exploitation of CVE-2026-28318.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA has added CVE-2026-28318 to its Known Exploited Vulnerabilities catalog after citing evidence of active exploitation. The vulnerability affects SolarWinds Serv-U, a multi-protocol file server software product. The article describes the flaw as high severity and says it can cause the Serv-U service to crash.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-28318 has a CVSS score of 7.5. CISA described it as an uncontrolled resource consumption vulnerability that results in a denial-of-service condition. The issue is significant because it has been added to CISA’s KEV catalog, which is used for vulnerabilities known to be exploited in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eSolarWinds said the vulnerability can be triggered by specially crafted POST requests. The requests can crash the Serv-U service without authentication when they use Content-Encoding: deflate. The article states that the vulnerable condition causes the service to crash under certain conditions.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide additional technical details about the exploitation process. It says there are currently no details on how the vulnerability is being exploited in real-world attacks. It also says there are no details on who is behind the exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product\"\u003eAffected Product\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is SolarWinds Serv-U multi-protocol file server software. The vulnerable service is described as not requiring the Content-Encoding functionality referenced in the exploit condition. The article does not specify affected versions beyond stating that the issue has been addressed in SolarWinds Serv-U version 15.5.4 HF1.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eSolarWinds addressed the vulnerability in Serv-U version 15.5.4 HF1. The article identifies this version as the fixed release. Organizations using Serv-U are therefore directed to that update as the vendor-provided remediation.\u003c/p\u003e\n\n\u003cp\u003eThe article also lists mitigations. It advises limiting access to known addresses. It also advises blocking any request containing \u0026ldquo;content-encoding\u0026rdquo; because the vulnerable service does not require this functionality.\u003c/p\u003e\n\n\u003ch2 id=\"government-action\"\u003eGovernment Action\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered Federal Civilian Executive Branch agencies to address CVE-2026-28318 by June 19, 2026. This requirement follows the vulnerability’s addition to the Known Exploited Vulnerabilities catalog. The article frames the CISA action as based on evidence of active exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"known-impact-and-unknowns\"\u003eKnown Impact and Unknowns\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact is denial of service through crashing the Serv-U service. The article does not report confirmed compromise counts. It states that it is unclear how many internet-exposed Serv-U instances are compromised, if any.\u003c/p\u003e\n\n\u003cp\u003eThe article also does not identify the attackers exploiting CVE-2026-28318. It says there are no current details on the real-world exploitation activity or the party behind it.\u003c/p\u003e\n\n\u003ch2 id=\"historical-context-mentioned-in-the-article\"\u003eHistorical Context Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that multiple Serv-U flaws have been exploited by bad actors in the past. It specifically mentions actors associated with the Cl0p ransomware gang in relation to previous Serv-U exploitation. However, the article does not connect Cl0p or any other actor to current exploitation of CVE-2026-28318.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2026-28318, a high-severity flaw affecting SolarWinds Serv-U, to its Known Exploited Vulnerabilities catalog due to evidence of active exploitation.","CVE-2026-28318 has a CVSS score of 7.5 and is an uncontrolled resource consumption vulnerability that can cause a denial-of-service condition.","SolarWinds said Serv-U can be crashed without authentication by specially crafted POST requests using Content-Encoding: deflate.","SolarWinds fixed the issue in Serv-U version 15.5.4 HF1 and advised limiting access to known addresses and blocking requests containing \"content-encoding\" as mitigations.","CISA ordered Federal Civilian Executive Branch agencies to address the flaw by June 19, 2026."],"insights":["A practical mitigation is available because SolarWinds says the vulnerable service does not require the Content-Encoding functionality, so organizations can block requests containing \"content-encoding\" while applying the patch.","The flaw is exploitable without authentication, which makes access restrictions to known addresses especially important for internet-exposed Serv-U deployments.","Although CISA cites active exploitation, the article states there are no public details on exploitation methods, responsible actors, or the number of compromised internet-exposed Serv-U instances.","Serv-U has a history of exploitation by bad actors, including those associated with the Cl0p ransomware gang, making rapid remediation particularly important for organizations running the product."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/05/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references CISA's alert as the source for adding the SolarWinds Serv-U flaw to the Known Exploited Vulnerabilities catalog.","category":"","primary":false},{"title":"CVE-2026-28318","url":"https://www.solarwinds.com/trust-center/security-advisories/cve-2026-28318","publisher":"SolarWinds","context":"The article cites SolarWinds' advisory for details on the unauthenticated specially crafted POST requests that can crash Serv-U and for patch and mitigation information.","category":"","primary":false}],"body":"\u003cp\u003eCISA has added CVE-2026-28318, a high-severity flaw affecting SolarWinds Serv-U multi-protocol file server software, to its Known Exploited Vulnerabilities catalog. The agency cited evidence of active exploitation. The vulnerability has a CVSS score of 7.5 and can cause the Serv-U service to crash.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds described the issue as involving specially crafted unauthenticated POST requests using Content-Encoding: deflate. CISA characterized it as an uncontrolled resource consumption vulnerability that results in a denial-of-service condition. SolarWinds addressed the flaw in Serv-U version 15.5.4 HF1 and advised limiting access to known addresses and blocking requests containing \u0026ldquo;content-encoding.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe article says there are no details on how the vulnerability is being exploited in real-world attacks or who is behind the activity. It is also unclear how many internet-exposed Serv-U instances, if any, are compromised. CISA ordered Federal Civilian Executive Branch agencies to address the flaw by June 19, 2026.\u003c/p\u003e\n"},{"n":3,"title":"Free Apps Are Quietly Turning Smart TVs Into Web-Scraping Proxies for AI","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/free-apps-are-quietly-turning-smart-tvs.html","time":"08:29","priority":"SHOULD READ","score":82,"tldr":"Bright Data’s SDK, embedded in some free apps including smart TV apps, can turn consumer devices into residential proxy exit nodes for web scraping traffic used by AI data businesses. The key risk is that users’ home IP addresses and bandwidth may be used for third-party scraping under consent screens that researchers say do not clearly reflect the scale or behavior of the traffic.","briefOverview":"\u003cp\u003eInclude Security and independent researcher Buchodi published findings on Bright Data’s SDK, which is embedded in some consumer apps and can turn devices into exit nodes for web-scraping traffic. The article says this includes the potential use of always-on smart TVs as residential proxies for a data business Bright Data markets to the AI industry. The main risk described is not stolen data or a hacked account, but the use of a user’s home IP address and bandwidth as someone else’s scraping infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe deepest technical evidence comes from reverse-engineering Bright Data’s iOS SDK, while the smart-TV reach is based on Bright Data’s platform support, public partner list, and earlier reporting. The research found that the peer channel carrying scraping jobs has no real authentication, and that on iOS the traffic bypasses a configured VPN. The article also says the SDK’s loaded settings can allow far more traffic than some opt-in wording suggests, including up to 200 GB per month in one cited case.\u003c/p\u003e\n\n\u003cp\u003eBright Data says its residential proxy network includes consent-sourced IPs through an SDK placed behind an opt-in screen, and the article frames the meaningfulness of that consent as the central issue. Google, Amazon, and Roku have restricted background proxy SDKs, and Bright Data has dropped those platforms, though Samsung’s Tizen and LG’s webOS are still listed. The article recommends blocking specific Bright Data SDK domains with router-level tools such as Pi-hole or NextDNS to stop affected devices from acting as relays.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA researcher reverse-engineered Bright Data’s iOS SDK and documented how it can turn consumer devices into exit nodes that relay web-scraping traffic. The findings were published on June 5 by Include Security and independent researcher Buchodi. The article says Bright Data, the successor to Luminati, operates what it calls the largest residential proxy network in the world and markets data services heavily to the AI industry.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that scraping traffic comes from the user’s home IP address rather than from the customer’s infrastructure. The article says the immediate risk is not a hacked account or stolen data, but that a home connection and bandwidth are used as someone else’s scraping infrastructure. Smart TVs are described as particularly suitable because they are usually plugged in, on fast connections, effectively unmetered, and unwatched.\u003c/p\u003e\n\n\u003cp\u003eThe strongest technical evidence discussed in the article concerns the iOS SDK. The research found that the peer channel carrying scraping jobs has no real authentication, and the article says the controls were described as weaker than those in most malware. On iOS, the researcher found that SDK traffic bypasses a configured VPN and that much of the app activity does not appear in tools security teams normally use to monitor apps.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights a gap between opt-in consent language and SDK behavior. In one Roku app, Petflix, the opt-in screen said the device and connection would be used “occasionally,” while SDK settings allowed up to 200 GB of traffic per month. In some countries, including Uzbekistan and Oman, limits were set far higher, and the SDK could also link a person’s phone and computers running the same company’s apps as one user.\u003c/p\u003e\n\n\u003cp\u003eBright Data publishes a public list of app partners that includes makers of smart-TV apps such as PlayWorks Digital, CloudTV, and Longvision, though the researcher notes that being listed only shows a company worked with Bright Data at some point. Lowpass, syndicated by The Verge, first surfaced the smart-TV angle in February, and the article presents the Include Security work as the technical teardown. Google, Amazon, and Roku have since restricted background proxy SDKs, and Bright Data dropped those platforms, though it still lists Samsung’s Tizen and LG’s webOS.\u003c/p\u003e\n\n\u003cp\u003eFor mitigation, the article says the SDK traffic is easy to spot and block on a home network. It recommends blocking domains such as proxyjs.brdtnet.com, proxyjs.luminatinet.com, proxyjs.bright-sdk.com, clientsdk.bright-sdk.com, and clientsdk.brdtnet.com using router-level tools like Pi-hole or NextDNS. The article notes that companies managing staff phones can scan for apps carrying the SDK, but network blocking may not catch mobile traffic and Bright Data could change how the SDK connects in the future.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eInclude Security and independent researcher Buchodi published findings on June 5 about Bright Data’s SDK and how it can turn consumer devices into residential proxy exit nodes. The article says the SDK is embedded in free apps behind an opt-in screen and can relay web-scraping traffic for Bright Data’s data business, which is marketed heavily to the AI industry.\u003c/p\u003e\n\n\u003cp\u003eBright Data is described as the successor to Luminati and as operating what it calls the largest residential proxy network in the world, advertised at more than 400 million residential IPs. The article says part of that supply comes from the SDK and is described by Bright Data as a consent-sourced pool of more than 150 million IPs.\u003c/p\u003e\n\n\u003cp\u003eThe central issue is that scraping traffic originates from the user’s home IP address rather than from the customer using the proxy service. The article says the immediate risk is not stolen data or a hacked account, but the use of a home internet connection and bandwidth as someone else’s scraping infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"why-smart-tvs-matter\"\u003eWhy smart TVs matter\u003c/h2\u003e\n\n\u003cp\u003eThe article says connected TVs are close to ideal for this type of proxy use because they are usually plugged in, connected to fast networks, effectively unmetered, and unwatched. The smart-TV reach described in the article rests on Bright Data’s platform support, public partner list, and earlier reporting, while the deepest technical evidence comes from the iOS SDK analysis.\u003c/p\u003e\n\n\u003cp\u003eBright Data’s public app partner list is said to include makers of smart-TV apps such as PlayWorks Digital, CloudTV, and Longvision. The researcher is careful to note that being listed only shows that a company worked with Bright Data at some point, not that its app currently contains the SDK. Each app would need to be checked individually.\u003c/p\u003e\n\n\u003ch2 id=\"technical-findings\"\u003eTechnical findings\u003c/h2\u003e\n\n\u003cp\u003eThe research found that when an app opens, the SDK contacts one of Bright Data’s servers and receives instructions without meaningful verification of who is asking. After that, the server can instruct the device to fetch pages from other websites using the user’s home internet connection.\u003c/p\u003e\n\n\u003cp\u003eThe article says the peer channel carrying scraping jobs has no real authentication. The researcher described that channel as weaker than controls built into most malware.\u003c/p\u003e\n\n\u003cp\u003eOn iOS, the researcher found that the SDK’s traffic bypasses a configured VPN. The article also says much of what the app does does not show up in the tools security teams normally use to monitor apps. The device can also keep relaying in the background while a user is watching the screen or on a call, provided the battery is not low.\u003c/p\u003e\n\n\u003ch2 id=\"consent-and-usage-limits\"\u003eConsent and usage limits\u003c/h2\u003e\n\n\u003cp\u003eThe article says the opt-in screen does not match what the SDK actually allows. In one Roku app, Petflix, the screen said it would use the device and connection “occasionally.” However, the SDK settings allowed up to 200 GB of traffic per month.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that in a few countries, including Uzbekistan and Oman, traffic limits are set far higher. In those cases, the device is cleared to keep working almost until the battery runs flat.\u003c/p\u003e\n\n\u003cp\u003eThe SDK can also tie together a person’s phone and computers that run the same company’s apps, treating them as one user. The article frames the meaningfulness of user consent as the key question separating Bright Data’s model from criminal proxy networks that hijack consumer devices.\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader context\u003c/h2\u003e\n\n\u003cp\u003eThe article says the model is not new in shape, only in scale. Bright Data is the successor to Luminati, the paid proxy service that grew out of Hola VPN. In 2015, Hola was reported to have sold free users’ bandwidth as exit nodes through Luminati at $20 per gigabyte.\u003c/p\u003e\n\n\u003cp\u003eThe article says the buyer has changed because AI scrapers need residential connections to get around anti-bot defenses from companies such as Cloudflare and DataDome. It cites reporting from Krebs in October 2025 that proxies from botnets such as Aisuru were fueling large-scale AI data harvesting. It also notes that Google dismantled the criminal IPIDEA proxy network in January.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes those criminal operations from Bright Data’s stated model by noting that botnets hijack consumer devices, while Bright Data says its exit nodes opt in through a consent screen. The article says whether that consent is meaningful remains the open question.\u003c/p\u003e\n\n\u003ch2 id=\"platform-response\"\u003ePlatform response\u003c/h2\u003e\n\n\u003cp\u003eLowpass, syndicated by The Verge, first surfaced the smart-TV angle in February, according to the article. The Include Security work is described as the technical teardown.\u003c/p\u003e\n\n\u003cp\u003eThe article says Google, Amazon, and Roku have since restricted background proxy SDKs. Bright Data has dropped those platforms, though the article says it still lists Samsung’s Tizen and LG’s webOS.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-guidance-in-the-article\"\u003eMitigation guidance in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says the traffic is easy to spot and block. For home networks, it recommends blocking the SDK’s connection domains using router-level tools such as Pi-hole or NextDNS.\u003c/p\u003e\n\n\u003cp\u003eThe listed domains are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eproxyjs.brdtnet.com\u003c/li\u003e\n\u003cli\u003eproxyjs.luminatinet.com\u003c/li\u003e\n\u003cli\u003eproxyjs.bright-sdk.com\u003c/li\u003e\n\u003cli\u003eclientsdk.bright-sdk.com\u003c/li\u003e\n\u003cli\u003eclientsdk.brdtnet.com\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the research cited in the article, blocking these domains stops the device from acting as a relay without affecting Bright Data’s paid service, which uses separate addresses.\u003c/p\u003e\n\n\u003cp\u003eFor companies managing staff phones, the article says they can scan for apps that carry the SDK. It also notes a limitation: on mobile connections, traffic sidesteps office Wi-Fi, so network blocking alone will not always catch it. The article adds that Bright Data could change how the SDK connects in the future, meaning blocklists may need updates.\u003c/p\u003e\n","keyPoints":["Include Security and independent researcher Buchodi reverse-engineered Bright Data’s iOS SDK and found it can turn consumer devices into exit nodes that relay web-scraping traffic through users’ home internet connections.","The research found that the peer channel carrying scraping jobs has no real authentication, and on iOS the SDK’s traffic can bypass a configured VPN.","Bright Data says its residential proxy supply includes consent-sourced IPs from an SDK embedded in free apps behind an opt-in screen, but the article says the screen may not match what the SDK actually allows.","In one Roku app called Petflix, the opt-in screen said the device and connection would be used “occasionally,” while SDK settings allowed up to 200 GB of traffic per month.","The article says users can block several Bright Data SDK domains, including proxyjs.brdtnet.com and clientsdk.bright-sdk.com, with router-level tools such as Pi-hole or NextDNS to stop devices from acting as relays."],"insights":["Smart TVs are especially attractive proxy nodes because they are usually plugged in, connected to fast home networks, effectively unmetered, and often not actively monitored by users.","The practical harm is reputational and operational rather than direct data theft: scraping activity appears to originate from the user’s residential IP address instead of Bright Data’s customer.","Blocking the Bright Data SDK domains at the router level can stop affected devices from acting as relays without disrupting Bright Data’s separate paid proxy service infrastructure.","Enterprise network blocking may miss affected mobile devices because the SDK traffic can use cellular connections and, on iOS, can bypass a configured VPN.","The article highlights that “opt-in” consent is the central distinction Bright Data draws from criminal botnet proxy networks, but the reported mismatch between consent text and SDK traffic limits makes that consent question operationally important."],"referencedReports":[{"title":"The Smart TV in Your Livingroom Is a Node in the AI/Scraping Economy","url":"https://blog.includesecurity.com/2026/06/the-smart-tv-in-your-livingroom-is-a-node-in-the-aiscraping-economy/","publisher":"Include Security","context":"The article says Include Security and independent researcher Buchodi published the technical findings from reverse-engineering Bright Data’s iOS SDK.","category":"","primary":false}],"body":"\u003cp\u003eInclude Security and independent researcher Buchodi published findings on Bright Data’s SDK, which is embedded in some consumer apps and can turn devices into exit nodes for web-scraping traffic. The article says this includes the potential use of always-on smart TVs as residential proxies for a data business Bright Data markets to the AI industry. The main risk described is not stolen data or a hacked account, but the use of a user’s home IP address and bandwidth as someone else’s scraping infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe deepest technical evidence comes from reverse-engineering Bright Data’s iOS SDK, while the smart-TV reach is based on Bright Data’s platform support, public partner list, and earlier reporting. The research found that the peer channel carrying scraping jobs has no real authentication, and that on iOS the traffic bypasses a configured VPN. The article also says the SDK’s loaded settings can allow far more traffic than some opt-in wording suggests, including up to 200 GB per month in one cited case.\u003c/p\u003e\n\n\u003cp\u003eBright Data says its residential proxy network includes consent-sourced IPs through an SDK placed behind an opt-in screen, and the article frames the meaningfulness of that consent as the central issue. Google, Amazon, and Roku have restricted background proxy SDKs, and Bright Data has dropped those platforms, though Samsung’s Tizen and LG’s webOS are still listed. The article recommends blocking specific Bright Data SDK domains with router-level tools such as Pi-hole or NextDNS to stop affected devices from acting as relays.\u003c/p\u003e\n"}];

function ScoreBar({ score }) {

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
