ramed around helping employees work more safely also yields candid responses, catching tools automated discovery might miss. The goal is an accurate inventory of every AI tool, who uses it, and what data it can access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"step-2-write-a-policy-that-works-with-employees\"\u003eStep 2: Write a Policy That Works With Employees\u003c/h2\u003e\n\n\u003cp\u003eMost AI acceptable use policies fail because they list prohibited tools without showing the approved path. An effective policy is a practical guide covering five elements:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eA current list of approved tools and where to find them.\u003c/li\u003e\n\u003cli\u003eClear data classification rules specifying what data (customer records, source code, financial information) should never enter any AI tool.\u003c/li\u003e\n\u003cli\u003eVerified data training opt‑out status for each approved tool—many tools use company inputs to improve models by default unless enterprise settings are explicitly configured otherwise.\u003c/li\u003e\n\u003cli\u003eA defined process for requesting new tools, with a target turnaround time.\u003c/li\u003e\n\u003cli\u003eA plain‑language explanation of why the guidelines exist, so employees apply the reasoning to every tool decision.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"step-3-create-a-fast-lane-for-new-tool-requests\"\u003eStep 3: Create a Fast Lane for New Tool Requests\u003c/h2\u003e\n\n\u003cp\u003eShadow AI grows when the official approval process cannot keep pace with AI product releases. A six‑week security review for a tool needed today pushes employees to workarounds. Most AI tool requests do not warrant a full procurement review. A structured intake form with defined evaluation criteria—covering data access scope, vendor security practices, training opt‑out status, compliance certifications, and whether an equivalent tool already exists—enables faster decisions. Publishing the approved tool list openly and keeping it current significantly reduces shadow AI usage because employees know where to find the right tools.\u003c/p\u003e\n\n\u003ch2 id=\"step-4-use-monitoring-as-a-shared-safety-layer\"\u003eStep 4: Use Monitoring as a Shared Safety Layer\u003c/h2\u003e\n\n\u003cp\u003eContinuous visibility via browser‑native monitoring provides two benefits:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecurity teams gain a real‑time picture to identify and address exposure before it becomes an incident, without rerouting employee web traffic or adding friction.\u003c/li\u003e\n\u003cli\u003eEmployees receive a signal when a tool may be putting credentials or company data at risk—a protection they often lack on their own.\nThe captured signals feed into an employee’s broader risk profile, alongside phishing simulation results and training completion data. This combined view matters because risky behaviors compound: an employee who clicks phishing links, skips training, and runs unapproved AI tools with sensitive data access presents a far higher risk than any single behavior would indicate. Seeing the full picture helps security teams focus on those who need attention most.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"step-5-make-good-security-behavior-easy\"\u003eStep 5: Make Good Security Behavior Easy\u003c/h2\u003e\n\n\u003cp\u003eSecurity programs that make the secure choice the easiest choice get followed. Two drivers are critical:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJust‑in‑time coaching\u003c/strong\u003e: A brief, contextual prompt at the moment an employee tries to use an unsanctioned tool—explaining the concern, directing to an approved alternative, and taking less than thirty seconds to read—is more effective than quarterly training because it intervenes at the decision point.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTraining that explains the reasoning\u003c/strong\u003e: Employees who understand that OAuth connections to corporate Google Workspace can expose a shared drive to a third‑party vendor apply that knowledge to tools that didn’t exist six months ago. The AI landscape changes too fast for training to predict every specific case, but principles‑based understanding builds enduring judgment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eAI adoption signals productive teams finding faster ways to work. Companies that channel that momentum with clear paths to approved tools and real‑time visibility for security teams tend to handle it best. Browser‑native visibility, a transparent approval process, and just‑in‑time coaching cause shadow AI usage to decline organically. When employees have access to effective, approved tools and a fast, transparent path to get new ones reviewed, the incentive to work around the system largely disappears.\u003c/p\u003e\n","keyPoints":["Employees today run three to five AI tools on any given day, most unreviewed by IT and many connecting to corporate data via OAuth tokens or browser sessions, which bypass traditional network-based security controls.","A quarterly audit of OAuth-connected apps, browser extension scanning, and employee surveys are essential for discovering shadow AI usage that automated tools might miss.","An AI governance policy should provide a list of approved tools, specify data types that must not be entered, confirm that data training opt-outs are enabled, and include a fast request process and a plain-language explanation of the reasons behind the rules.","A fast-track approval process with a structured intake form and clear evaluation criteria removes the friction that drives employees to use unapproved tools.","Continuous browser-native monitoring and just-in-time coaching at the moment of risk help security teams detect exposure and nudge employees toward approved alternatives, making secure behavior the easiest choice."],"insights":["Browser-based AI tools evade traditional network security monitoring because they do not pass through the corporate network, creating a blind spot for security teams.","Many AI tools default to using company inputs for model training unless enterprise settings are explicitly changed, meaning approval without verifying opt-out status creates a hidden data exposure risk.","Employees are often candid about shadow tool usage when surveys are framed as a safety initiative rather than an audit, providing a discovery channel that catches tools automated scans miss.","An employee's risk profile is not just the sum of individual behaviors; the combination of phishing clicks, skipped training, and unauthorized AI tool use cumulatively signals a much higher security risk.","Just-in-time coaching at the moment an employee attempts to use an unsanctioned tool is more effective than quarterly training modules because it intervenes at the exact decision point."],"referencedReports":[],"body":"\u003cp\u003eEmployees across organizations are using three to five AI tools daily, most without IT review, creating a shadow AI gap that bypasses traditional network-based security controls. These tools often connect to corporate data through OAuth or browser sessions that never touch the corporate network, leaving security teams with no visibility.\u003c/p\u003e\n\n\u003cp\u003eA five-step program can close this gap without slowing down employees: discover all AI tools in use, craft a clear policy that guides rather than prohibits, create a fast approval lane for new tools, add continuous browser-based monitoring, and deliver just-in-time coaching at the point of risk. The goal is to channel natural AI adoption into safe, visible paths so employees can work efficiently while security teams maintain control.\u003c/p\u003e\n"},{"n":2,"title":"Can you enforce strong Active Directory password rules without frustrating users?","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/can-you-enforce-strong-active-directory-password-rules-without-frustrating-users/","time":"14:00","priority":"MAY READ","score":40,"tldr":"Balance security and usability in Active Directory by enforcing long passphrases, blocking known breached passwords, and offering self-service resets with clear feedback to avoid user frustration.","briefOverview":"\u003cp\u003eThe article addresses the challenge of enforcing strong Active Directory password policies without driving users to risky workarounds like writing passwords down or reusing weak credentials. It argues that traditional complexity rules are frustrating and ineffective, and instead advocates for passphrase-based policies that emphasize length over special-character complexity.\u003c/p\u003e\n\n\u003cp\u003eTo strengthen security, the article recommends blocking known breached passwords by continuously checking against a database of over 5.4 billion compromised credentials, moving away from forced periodic expiration unless a compromise is detected, and implementing length-based aging that rewards longer passphrases with extended or removed expiry. These measures are designed to reduce helpdesk tickets and improve user cooperation.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights practical supporting measures such as enterprise password managers, self-service password resets with multi-factor authentication, clear notifications, and dynamic real-time feedback during password creation. It positions Specops Password Policy and the free Specops Password Auditor as tools that help organizations audit their Active Directory environment, block breached passwords, and enforce compliant policies without sacrificing usability.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article, a sponsored piece from Specops Software, examines the perennial tension between security and usability in Active Directory (AD) password management. It opens by noting that overly weak rules expose organizations to attack, while overly strict rules provoke user workarounds such as reusing passwords, appending predictable characters, or writing credentials down, all of which undermine security. The central premise is that a modern approach can simultaneously strengthen defences and reduce user friction.\u003c/p\u003e\n\n\u003cp\u003eContextually, the article cites Verizon’s Data Breach Investigation Report, which found stolen credentials in 44.7% of breaches, underscoring the urgency of robust password governance. It argues that traditional complexity requirements (minimum symbol, digit, and case mix demands) have backfired, pushing users toward guessable patterns like “Password!2026.” Instead, it recommends prioritizing password length, with NIST guidance allowing up to 64 characters and a practical minimum of 15 characters, making passphrases both memorable and resistant to cracking.\u003c/p\u003e\n\n\u003cp\u003eThe technical core of the recommended strategy is eliminating weak and breached passwords at creation. This involves custom banned-word lists tailored to the organization’s environment and continuous checks against a database of over 5.4 billion known compromised credentials, features offered by Specops Password Policy. By preventing the use of passwords that appear in real-world breach corpuses, organizations can thwart password spraying attacks before they begin. Additionally, the article advises rethinking mandatory expiration schedules, which often cause users to make only trivial incremental changes. Length-based aging is proposed, where longer passphrases earn extended or even removed expiration unless a compromise is detected.\u003c/p\u003e\n\n\u003cp\u003eBeyond the core AD policies, the article outlines complementary measures to reduce user burden. An enterprise password manager removes the need to remember dozens of unique passwords, directly addressing the reuse problem. Secure self-service password resets via multi-factor authentication offload helpdesk queues and, equally importantly, remove the incentive to choose weak passwords to avoid lockout downtime. Customizable notifications and real-time dynamic feedback at password creation—such as strength meters and clear requirement prompts—help users understand and meet policy expectations the first time, cutting support calls.\u003c/p\u003e\n\n\u003cp\u003eThe affected parties are primarily IT administrators responsible for Active Directory security and the end users whose workflow and frustration levels are directly impacted by password policy. The article positions Specops Password Auditor (a free, read-only scanning tool) as a starting point for identifying password-related vulnerabilities, followed by Specops Password Policy for ongoing enforcement and breach scanning. The overall message is that by combining length-based passphrase policies, breached-password blocking, modern expiry logic, and user-friendly support tools, organizations can achieve a stronger security posture without generating the backlash and workarounds that classic high-complexity policies provoke.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eThe article explores how organizations can enforce strong Active Directory (AD) password rules without alienating users and pushing them toward counterproductive workarounds. It argues that the traditional trade-off—sacrificing usability for security or vice versa—can be overcome by adopting modern, user-centered policies supported by purpose-built tools.\u003c/p\u003e\n\n\u003ch2 id=\"the-password-dilemma\"\u003eThe Password Dilemma\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWeak policies increase the attack surface, while overly strict complexity rules lead to behaviors such as writing passwords down, reusing them across systems, or appending a predictable \u0026ldquo;!\u0026rdquo; to the last version.\u003c/li\u003e\n\u003cli\u003eTraditional complexity requirements (symbols, digits, mixed case) often result in memorable but guessable passwords like “Password!2026.”\u003c/li\u003e\n\u003cli\u003eVerizon’s Data Breach Investigation Report is cited, noting that stolen credentials are involved in 44.7% of breaches, emphasizing the importance of effective credential management.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-practices\"\u003eRecommended Practices\u003c/h2\u003e\n\n\u003ch3 id=\"adopt-passphrases-over-complex-passwords\"\u003eAdopt Passphrases Over Complex Passwords\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrioritize length over complexity; multiple-word passphrases are easier to remember and much harder to crack.\u003c/li\u003e\n\u003cli\u003eNIST recommends allowing passwords up to 64 characters; raising the minimum length (e.g., ≥15 characters) strengthens security and reduces user error.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"block-weak-and-compromised-passwords\"\u003eBlock Weak and Compromised Passwords\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eEven with longer passwords, users still choose weak or common options, making them vulnerable to password spraying attacks.\u003c/li\u003e\n\u003cli\u003eOrganizations should actively block weak password creation using custom banned-word lists (tailored dictionaries that reflect the environment) and by checking passwords against a database of over 5.4 billion known breached credentials.\u003c/li\u003e\n\u003cli\u003eSpecops Password Policy enables these capabilities, stopping compromised passwords from being used in AD and allowing issues to be addressed proactively.\u003c/li\u003e\n\u003cli\u003ePreventing weak passwords at creation is more effective than remediation after compromise.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"rethink-password-expirations\"\u003eRethink Password Expirations\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFrequent mandatory expiration causes users to make minimal, predictable changes.\u003c/li\u003e\n\u003cli\u003eMove away from forced expiry unless there is evidence of compromise. When users create long, robust passwords and breached-credential detection is in place, expiration can be safely extended or eliminated.\u003c/li\u003e\n\u003cli\u003eLength-based aging ties expiration to password length, incentivizing stronger credentials with the reward of longer validity periods and reducing user churn.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"use-a-password-manager\"\u003eUse a Password Manager\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eReuse is a major day-to-day problem; even employees with good AD passwords repeat them across other systems.\u003c/li\u003e\n\u003cli\u003eEnterprise-approved password managers generate and store unique, long passwords for every account, removing the memory burden.\u003c/li\u003e\n\u003cli\u003eThey also support better control over shared and privileged credentials, complementing passphrase-friendly AD policies.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"implement-self-service-password-resets\"\u003eImplement Self-Service Password Resets\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ePassword resets are a top cause of helpdesk tickets. Strict policies increase the frequency of lockouts, filling support queues.\u003c/li\u003e\n\u003cli\u003eSecure self-service reset, verified through MFA or other methods, allows users to regain access quickly without raising tickets.\u003c/li\u003e\n\u003cli\u003eFaster recovery reduces downtime, limits risky workarounds, and improves user experience, making strict policies feel less disruptive.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"customizable-notifications\"\u003eCustomizable Notifications\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers should not be surprised by sudden lockouts or last-minute expiry warnings; unanticipated disruption drives support calls.\u003c/li\u003e\n\u003cli\u003eClear, timely, and informative notifications help users stay compliant and reduce friction.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"provide-dynamic-feedback-at-password-creation\"\u003eProvide Dynamic Feedback at Password Creation\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eVague error messages like “password does not meet requirements” are unhelpful.\u003c/li\u003e\n\u003cli\u003eReal-time, specific feedback—strength meters, banned-password checks, clear requirement prompts—makes it easy for users to understand and meet policies immediately, improving password quality.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"supporting-tools-from-specops\"\u003eSupporting Tools from Specops\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSpecops Password Auditor:\u003c/strong\u003e A free, read-only tool that scans AD for password-related vulnerabilities and presents findings in an easy-to-understand report. It serves as a diagnostic starting point.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSpecops Password Policy:\u003c/strong\u003e Helps remediate issues and enforce policies continuously. Features include continuous scanning for breached passwords, custom banned-word dictionaries, and support for passphrase implementation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article advocates a strategy that combines passphrase-focused length policies, breached-password blocking, incentive-based expiration (length-based aging), password managers, self-service resets with MFA, and clear user communication. Together, these elements strengthen AD security while reducing the friction that drives user workarounds, ultimately lowering helpdesk burden and improving the overall security posture.\u003c/p\u003e\n","keyPoints":["Passphrases that prioritize length over complexity are easier to remember and significantly harder to crack than complex passwords.","Actively blocking weak passwords and continuously checking against a database of over 5.4 billion known breached credentials helps prevent password spraying attacks.","Mandatory password expiration should be replaced with length-based aging, where longer passphrases earn extended or removed expiration unless a compromise is detected.","An approved password manager eliminates the burden of remembering multiple credentials and reduces the risk of password reuse across systems.","Secure self-service password resets that verify identity through multi-factor authentication reduce helpdesk tickets and discourage risky user workarounds."],"insights":["Frequent mandatory password expiration backfires by conditioning users to make minimal, predictable tweaks that are easily guessed, making it safer to extend expiration for strong passphrases.","Length-based aging positively reinforces security by granting longer or even eliminated expiration periods to users who create longer passphrases, turning password strength into a direct benefit.","Self-service password resets with MFA not only cut helpdesk tickets but also remove the incentive for users to choose weaker, more memorable passwords to avoid disruptive lockouts."],"referencedReports":[],"body":"\u003cp\u003eThe article addresses the challenge of enforcing strong Active Directory password policies without driving users to risky workarounds like writing passwords down or reusing weak credentials. It argues that traditional complexity rules are frustrating and ineffective, and instead advocates for passphrase-based policies that emphasize length over special-character complexity.\u003c/p\u003e\n\n\u003cp\u003eTo strengthen security, the article recommends blocking known breached passwords by continuously checking against a database of over 5.4 billion compromised credentials, moving away from forced periodic expiration unless a compromise is detected, and implementing length-based aging that rewards longer passphrases with extended or removed expiry. These measures are designed to reduce helpdesk tickets and improve user cooperation.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights practical supporting measures such as enterprise password managers, self-service password resets with multi-factor authentication, clear notifications, and dynamic real-time feedback during password creation. It positions Specops Password Policy and the free Specops Password Auditor as tools that help organizations audit their Active Directory environment, block breached passwords, and enforce compliant policies without sacrificing usability.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
