<script>
window.__DL_ARTICLES = [{"n":4,"title":"FBI warns of in-person data theft attacks from extortion gang","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fbi-warns-of-silent-ransom-group-in-person-data-theft-attacks/","time":"11:51","priority":"MUST READ","score":96,"tldr":"The FBI warns that the Silent Ransom Group extortion gang is now resorting to in-person physical data theft by sending individuals to victims' locations to connect USB drives when remote social engineering attempts fail.","briefOverview":"\u003cp\u003eThe FBI issued a flash alert warning that the Silent Ransom Group (SRG) extortion gang is now conducting in-person data theft attacks against U.S. law firms. The attackers first attempt to trick employees over the phone or through phishing emails into granting remote desktop access by impersonating IT support. If remote access fails, they dispatch a threat actor physically to the victim’s location to connect a USB drive or external hard drive and steal data directly.\u003c/p\u003e\n\n\u003cp\u003eThis escalation combines traditional cyber social engineering with on-site physical intrusion, significantly raising the risk for targets. SRG, also tracked as Luna Moth and active since 2022, has persistently focused on legal and financial organizations, using the stolen data for extortion by threatening to leak it and by placing pressure calls to employees or clients to force ransom negotiations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn Tuesday, the FBI warned that the Silent Ransom Group (SRG) extortion gang has adopted in-person physical access tactics to steal data from U.S.-based law firms. The alert describes a two-stage social engineering scheme that begins with attackers posing as IT department employees, either by calling directly or sending phishing emails that urge recipients to call a phone number controlled by the threat actors. During the call, the attacker attempts to persuade the employee to grant a remote desktop session. If that approach is blocked or unsuccessful, the operation escalates to a rarely seen physical intrusion: an SRG actor travels to the victim’s location with a storage device such as a USB drive or external hard drive and connects it directly to a computer to exfiltrate data.\u003c/p\u003e\n\n\u003cp\u003eThe FBI highlighted specific indicators of compromise that organizations should look for, including unauthorized external storage devices plugged into company computers and the presence of unidentified or unauthorized individuals posing as IT support and attempting to access systems. Once data is stolen, SRG leverages it for extortion by sending a ransom email that threatens to sell or publish the information on its leak site. The gang additionally pressures victims by calling employees or clients to push them into starting ransom negotiations.\u003c/p\u003e\n\n\u003cp\u003eSRG is also known under the aliases Luna Moth, Chatty Spider, and UNC3753, and has been active since at least 2022. It has specifically targeted legal and financial organizations in the United States since early 2023. The group was previously linked to BazarCall campaigns that provided initial access for Conti and Ryuk ransomware operations. After the Conti ransomware shutdown in March 2022, the actors separated from the larger cybercrime syndicate and formed the Silent Ransom Group, shifting their focus to data theft and extortion through callback phishing and social engineering attacks.\u003c/p\u003e\n\n\u003cp\u003eThis latest flash alert follows a May 2025 FBI private industry notification that warned the same extortion gang had been targeting U.S. law firms with callback phishing and social engineering for more than two years. A May 2025 EclecticIQ report, cited in the article, further detailed the group\u0026rsquo;s campaigns against legal and financial institutions and revealed that the attackers register typosquatted domains designed to impersonate IT helpdesk or support portals for major U.S. law firms and financial services firms, demonstrating tailored reconnaissance and sustained operational focus.\u003c/p\u003e\n\n\u003cp\u003eThe evolution of SRG from a ransomware affiliate to an independent extortion group employing physical intrusion tactics underscores how cybercriminal gangs adapt when traditional remote attacks are thwarted. The blending of in-person access with digital extortion introduces a dangerous dynamic that challenges the typical security training focused only on remote threats, requiring organizations to reassess both physical and cybersecurity controls.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"fbi-warns-of-in-person-data-theft-attacks-by-silent-ransom-group\"\u003eFBI Warns of In-Person Data Theft Attacks by Silent Ransom Group\u003c/h1\u003e\n\n\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn Tuesday, the FBI released a flash alert warning that the Silent Ransom Group (SRG) — a cyber extortion gang also tracked as Luna Moth, Chatty Spider, and UNC3753 — is now targeting U.S. law firms with in-person data theft attacks. The gang, known for callback phishing and social engineering, has escalated its operations to include physically dispatching threat actors to victim locations when remote access attempts fail.\u003c/p\u003e\n\n\u003ch2 id=\"attack-methodology\"\u003eAttack Methodology\u003c/h2\u003e\n\n\u003ch3 id=\"remote-social-engineering-stage\"\u003eRemote Social Engineering Stage\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSRG actors impersonate employees from the victim’s IT department by directly calling targets or sending phishing emails.\u003c/li\u003e\n\u003cli\u003eThe communication is designed to trick employees into calling a number controlled by the attackers, who then pose as IT support.\u003c/li\u003e\n\u003cli\u003eDuring the phone call, the attacker instructs the employee to grant access to a remote desktop session, aiming to gain initial access to the corporate network.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"physical-intrusion-stage\"\u003ePhysical Intrusion Stage\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eIf the remote desktop attempt fails, SRG does not abandon the operation; instead, it sends a threat actor in person to the victim’s location.\u003c/li\u003e\n\u003cli\u003eThe on-site actor connects a storage device (USB drive or external hard drive) directly to the victim’s computer to steal data.\u003c/li\u003e\n\u003cli\u003eThe FBI references the MITRE ATT\u0026amp;CK technique “Exfiltration Over Physical Medium” (T1052.001) to describe this method.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"extortion-tactics\"\u003eExtortion Tactics\u003c/h2\u003e\n\n\u003cp\u003eAfter exfiltrating data, SRG uses the stolen information to extort the victim organization:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA ransom email is sent threatening to sell or publish the data on the gang’s leak site.\u003c/li\u003e\n\u003cli\u003eThe group intensifies pressure by calling the victim’s employees or clients, urging them to initiate ransom negotiations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eBased on the FBI alert, organizations should monitor for the following signs of an SRG attack:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthorized installation or presence of external hard drives or USB drives on company computers.\u003c/li\u003e\n\u003cli\u003eUnidentified or unauthorized individuals on-site claiming to be IT support and attempting to access computers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-profile\"\u003eThreat Actor Profile\u003c/h2\u003e\n\n\u003ch3 id=\"aliases-and-history\"\u003eAliases and History\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Silent Ransom Group is known under multiple names: Luna Moth, Chatty Spider, and UNC3753.\u003c/li\u003e\n\u003cli\u003eIt has been active since at least 2022 and has specifically targeted legal and financial organizations in the United States since early 2023.\u003c/li\u003e\n\u003cli\u003eThe group was previously linked to BazarCall campaigns that provided initial access to corporate networks for Conti and Ryuk ransomware attacks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"shift-from-ransomware-to-extortion\"\u003eShift from Ransomware to Extortion\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFollowing the Conti ransomware operation’s shutdown in March 2022, these actors separated from the cybercrime syndicate.\u003c/li\u003e\n\u003cli\u003eThey reformed as the Silent Ransom Group, concentrating on data theft and extortion rather than traditional ransomware deployment.\u003c/li\u003e\n\u003cli\u003eTheir attack model relies on callback phishing and social engineering to gain a foothold in targeted environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"campaign-timeline-and-targeting\"\u003eCampaign Timeline and Targeting\u003c/h2\u003e\n\n\u003ch3 id=\"fbi-notifications\"\u003eFBI Notifications\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe latest flash alert follows a May 2025 FBI private industry notification that warned U.S. law firms about Luna Moth’s sustained campaign of callback phishing and social engineering attacks, which had been ongoing for more than two years.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"third-party-research\"\u003eThird-Party Research\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA May 2025 EclecticIQ report detailed the group’s attacks on legal and financial institutions in the United States.\u003c/li\u003e\n\u003cli\u003eThe report revealed that SRG registers typosquatted domains to impersonate IT helpdesk or support portals for major U.S. law firms and financial services firms, indicating careful reconnaissance and targeting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance-and-impact\"\u003eSignificance and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe introduction of in-person physical access represents a major escalation in the gang’s tactics. Organizations that train employees exclusively on remote phishing and social engineering may be unprepared for an adversary willing to appear on-site as fake IT personnel. This tactic bypasses many network-based defenses and blurs the line between physical and cyber intrusions, requiring a coordinated response from both security and facilities teams. The sustained focus on U.S. law firms, underscored by two consecutive FBI alerts, suggests the group views legal organizations as high-value targets for data extortion.\u003c/p\u003e\n","keyPoints":["The FBI warns that the Silent Ransom Group is targeting U.S. law firms with in-person data theft attacks.","Attackers first attempt remote access by posing as IT support through calls or phishing emails, and if that fails, they physically visit the target's location to connect USB drives or external hard drives to computers.","Indicators of an attack include the presence of unauthorized external storage devices on company computers and unidentified individuals claiming to be IT support attempting to access computers.","After stealing data, the gang extorts victims by threatening to sell or post the stolen information and calls employees or clients to pressure ransom negotiations."],"insights":["The gang evolved from a Conti ransomware affiliate into a standalone extortion-only operation after Conti's 2022 shutdown, illustrating how ransomware ecosystem disruptions can shift criminal tactics rather than eliminate the threat.","The tactic of dispatching a person physically to a target's location when remote social engineering fails represents a rare and dangerous escalation that blends traditional physical intrusion with cyber extortion, posing a challenge for organizations that train employees only on remote attack vectors.","The group has sustained a targeted campaign against U.S. law firms for over two years by registering typosquatted domains that impersonate specific firms' IT helpdesk portals, demonstrating highly tailored reconnaissance rather than generic phishing."],"referencedReports":[{"title":"FBI Flash Alert: Silent Ransom Group In-Person Data Theft Attacks","url":"https://www.ic3.gov/CSA/2026/260526.pdf","publisher":"FBI","context":"The FBI warned on Tuesday that the Silent Ransom Group (SRG) is targeting U.S. law firms with in-person data theft attacks, detailed in this flash alert.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI issued a flash alert warning that the Silent Ransom Group (SRG) extortion gang is now conducting in-person data theft attacks against U.S. law firms. The attackers first attempt to trick employees over the phone or through phishing emails into granting remote desktop access by impersonating IT support. If remote access fails, they dispatch a threat actor physically to the victim’s location to connect a USB drive or external hard drive and steal data directly.\u003c/p\u003e\n\n\u003cp\u003eThis escalation combines traditional cyber social engineering with on-site physical intrusion, significantly raising the risk for targets. SRG, also tracked as Luna Moth and active since 2022, has persistently focused on legal and financial organizations, using the stolen data for extortion by threatening to leak it and by placing pressure calls to employees or clients to force ransom negotiations.\u003c/p\u003e\n"},{"n":3,"title":"CISA gives feds 4 days to patch actively exploited cPanel plugin flaw","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-gives-feds-4-days-to-patch-actively-exploited-cpanel-plugin-flaw/","time":"10:06","priority":"MUST READ","score":95,"tldr":"CISA ordered federal agencies to patch within four days a critical LiteSpeed cPanel plugin flaw (CVE-2026-48172) that allows unauthenticated attackers to gain root privileges and is actively exploited.","briefOverview":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has ordered federal agencies to patch a critical privilege escalation flaw in the LiteSpeed cPanel user-end plugin within four days, by midnight on Friday, May 29. The vulnerability, tracked as CVE-2026-48172, allows remote, unauthenticated attackers to execute arbitrary scripts with root privileges and is being actively exploited in the wild. The flaw stems from incorrect privilege assignment in the lsws.redisAble function, affecting plugin versions 2.3 through 2.4.4.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed released urgent security updates on May 21 and provided a command to check server logs for signs of past exploitation. CISA added the vulnerability to its Known Exploited Vulnerabilities catalog under Binding Operational Directive 22-01, and while the mandate applies only to U.S. federal agencies, the agency strongly urged all organizations to prioritize immediate patching or mitigation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has imposed an unusually short four-day remediation deadline for a critical security flaw in the LiteSpeed cPanel user-end plugin, underscoring the extreme risk of unauthenticated root-level code execution. The flaw, CVE-2026-48172, resides in the lsws.redisAble function and results from incorrect privilege assignment that allows attackers with no privileges to run arbitrary scripts with root privileges. LiteSpeed categorized the vulnerability as actively exploited and affecting all user-end plugin versions from 2.3 to 2.4.4, and released an emergency update along with a grep command to help administrators identify signs of compromise in their logs.\u003c/p\u003e\n\n\u003cp\u003eThe directive was issued under Binding Operational Directive 22-01, which legally compels U.S. federal agencies to remediate known exploited vulnerabilities within strict timelines. In this case, the patch must be applied by midnight Friday, May 29, giving agencies just a few days to respond. CISA’s alert explicitly mentions that cloud services are also in scope, extending the directive’s reach beyond traditional on-premises servers.\u003c/p\u003e\n\n\u003cp\u003eBeyond federal systems, CISA urged all defenders, including those in the private sector, to treat this vulnerability as a top priority. The guidance included instructions to apply vendor mitigations, follow BOD 22-01 cloud guidance, or discontinue use of the product if updates cannot be applied. The vendor’s advisory also emphasized the need to examine log output for unauthorized IPs and review system activity to assess potential damage from any prior exploitation.\u003c/p\u003e\n\n\u003cp\u003eNo specific threat actor was named in the article, but the active exploitation and the nature of the vulnerability — unauthenticated root escalation — indicate a high-value target for ransomware operators and other cybercriminals seeking rapid access to web hosting infrastructure. The tight deadline signals that CISA assesses the risk to the federal enterprise as immediate and severe, making this a critical call to action for all organizations using the affected plugin.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has issued an emergency directive requiring federal agencies to patch a critical vulnerability in the LiteSpeed cPanel user-end plugin within four days. The flaw, CVE-2026-48172, allows remote attackers with no privileges to execute arbitrary scripts with root privileges and is actively being exploited. This summary covers the technical details, regulatory action, mitigation steps, and detection guidance provided in the original article.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE ID:\u003c/strong\u003e CVE-2026-48172\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProduct:\u003c/strong\u003e LiteSpeed cPanel user-end plugin (bundled with WHM plugin)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAffected Versions:\u003c/strong\u003e v2.3 through v2.4.4\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRoot Cause:\u003c/strong\u003e Incorrect privilege assignment weakness in the \u003ccode\u003elsws.redisAble\u003c/code\u003e function, related to mishandling of Redis enable/disable features.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImpact:\u003c/strong\u003e Unauthenticated remote attackers can escalate privileges and execute arbitrary scripts as root.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability is confirmed as actively exploited in the wild by the LiteSpeed team and CISA.\u003c/li\u003e\n\u003cli\u003eNo specific threat actor, campaign, or intrusion set is mentioned in the article.\u003c/li\u003e\n\u003cli\u003eThe vendor provided a log-check command to help organizations retrospectively identify signs of attack:\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cpre\u003e\u003ccode\u003e  grep -rE \u0026quot;cpanel_jsonapi_func=redisAble\u0026quot; /var/cpanel/logs /usr/local/cpanel/logs/ 2\u0026gt;/dev/null\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eIf the command returns output, administrators are advised to investigate the associated IPs, determine their legitimacy, block unauthorized IPs, and examine system logs for any actions taken by those IPs.\u003c/p\u003e\n\n\u003ch2 id=\"regulatory-action\"\u003eRegulatory Action\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAuthority:\u003c/strong\u003e CISA added CVE-2026-48172 to the Known Exploited Vulnerabilities (KEV) catalog.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLegal Basis:\u003c/strong\u003e Binding Operational Directive (BOD) 22-01, which mandates federal agencies to remediate cataloged vulnerabilities within a specified timeline.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeadline:\u003c/strong\u003e Midnight Friday, May 29 (four days from CISA\u0026rsquo;s Tuesday notice).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScope:\u003c/strong\u003e All U.S. federal agencies; the directive explicitly references cloud services, making it applicable to cloud-hosted deployments as well.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBeyond Federal Agencies:\u003c/strong\u003e CISA urged all defenders, including the private sector, to prioritize patching this vulnerability and to apply mitigations per vendor instructions or discontinue use if fixes are unavailable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"vendor-response\"\u003eVendor Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eLiteSpeed Technologies released urgent security updates on Thursday, May 21, before CISA’s KEV addition.\u003c/li\u003e\n\u003cli\u003eThe company alerted users to update the cPanel user-end plugin (bundled with the WHM plugin) to the latest version immediately.\u003c/li\u003e\n\u003cli\u003eNo other workarounds or temporary mitigations were detailed beyond upgrading to the patched version.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-incident-response\"\u003eDetection and Incident Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vendor-supplied grep command checks access logs for exploitation attempts, enabling rapid triage.\u003c/li\u003e\n\u003cli\u003ePost-exploitation investigation focuses on reviewing system logs for actions taken by detected IPs.\u003c/li\u003e\n\u003cli\u003eCISA’s recommendation allows for discontinuing use of the product if patching is not immediately possible, reflecting the severity of the risk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe four-day remediation window is one of the shortest mandated by CISA, emphasizing the extreme danger of unauthenticated root RCE that is actively exploited.\u003c/li\u003e\n\u003cli\u003eThe guidance combines technical detection, regulatory mandates, and broad public-private sector appeal, making the response a blueprint for handling similarly critical vulnerabilities.\u003c/li\u003e\n\u003cli\u003eOrganizations using cPanel hosting environments with LiteSpeed should immediately apply the update and perform the log check to uncover any prior compromise.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The LiteSpeed cPanel user-end plugin contains a critical privilege escalation vulnerability (CVE-2026-48172) that allows unauthenticated remote attackers to execute arbitrary scripts with root privileges.","The vulnerability is actively exploited and affects plugin versions between 2.3 and 2.4.4.","CISA added the flaw to its Known Exploited Vulnerabilities catalog and mandated that U.S. federal agencies apply the vendor's security update by midnight Friday, May 29, under BOD 22-01.","CISA also urged private sector organizations and all defenders to prioritize patching this vulnerability immediately."],"insights":["The vendor provided a forensic grep command to retrospectively identify potential exploitation attempts in server logs, indicating that patching alone is insufficient and incident response steps may be required.","CISA's directive explicitly references BOD 22-01 guidance for cloud services, signaling that the vulnerability applies to cloud-hosted environments and not just on-premises servers.","The extremely short four-day remediation deadline reflects the exceptional urgency CISA assigns to unauthenticated root-level Remote Code Execution vulnerabilities under active attack."],"referencedReports":[{"title":"Security Update for LiteSpeed cPanel Plugin","url":"https://blog.litespeedtech.com/2026/05/21/security-update-for-litespeed-cpanel-plugin/","publisher":"LiteSpeed Technologies","context":"LiteSpeed released urgent security updates to address CVE-2026-48172 and warned users to update the plugin.","category":"","primary":false},{"title":"CISA Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=CVE-2026-48172\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=20\u0026url=","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"CISA added the CVE-2026-48172 vulnerability to its catalog of exploited vulnerabilities and ordered agencies to patch.","category":"","primary":false},{"title":"Binding Operational Directive (BOD) 22-01","url":"https://www.cisa.gov/binding-operational-directive-22-01","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"The patch deadline for federal agencies is mandated by this directive.","category":"","primary":false},{"title":"CVE-2026-48172","url":"https://www.cve.org/CVERecord?id=CVE-2026-48172","publisher":"CVE Program / MITRE","context":"Technical vulnerability description for the LiteSpeed cPanel plugin privilege escalation flaw exploited in attacks.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has ordered federal agencies to patch a critical privilege escalation flaw in the LiteSpeed cPanel user-end plugin within four days, by midnight on Friday, May 29. The vulnerability, tracked as CVE-2026-48172, allows remote, unauthenticated attackers to execute arbitrary scripts with root privileges and is being actively exploited in the wild. The flaw stems from incorrect privilege assignment in the lsws.redisAble function, affecting plugin versions 2.3 through 2.4.4.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed released urgent security updates on May 21 and provided a command to check server logs for signs of past exploitation. CISA added the vulnerability to its Known Exploited Vulnerabilities catalog under Binding Operational Directive 22-01, and while the mandate applies only to U.S. federal agencies, the agency strongly urged all organizations to prioritize immediate patching or mitigation.\u003c/p\u003e\n"},{"n":5,"title":"Glassworm botnet disrupted after resilient C2 infrastructure takedown","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/glassworm-botnet-disrupted-after-resilient-c2-infrastructure-takedown/","time":"13:28","priority":"MUST READ","score":95,"tldr":"The Glassworm botnet, which targeted developers with supply-chain attacks, was disrupted after researchers simultaneously took down its four resilient C2 channels—including blockchain, BitTorrent DHT, and Google Calendar—leaving infected machines unable to receive new commands.","briefOverview":"\u003cp\u003eA coordinated operation by CrowdStrike, Google, and The Shadowserver Foundation simultaneously disrupted four distinct command-and-control channels used by the Glassworm botnet, which had built a resilient infrastructure leveraging Solana blockchain transactions, BitTorrent’s DHT, Google Calendar event titles, and direct VPS connections. Because the botnet was designed to survive the loss of any single channel, all four had to be taken down at once to cut off operator access.\u003c/p\u003e\n\n\u003cp\u003eFollowing the takedown, all infected machines now beacon exclusively to a CrowdStrike-controlled IP address (164.92.88[.]210), giving defenders a single high-confidence indicator of compromise. Organizations are urged to look for this network activity and use published YARA rules to identify and remediate compromised hosts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Glassworm botnet, active since October 2025, specifically targeted developers through supply-chain attacks involving malicious OpenVSX and Microsoft VS Code extensions, later expanding to GitHub repositories and npm packages. One March campaign compromised over 400 software artifacts, and a recent wave planted 73 dormant extensions on OpenVSX that would activate only after an update, showing a long-term, stealthy approach. The threat actors built a command-and-control infrastructure designed to resist conventional takedown efforts, which is why the botnet persisted for so long.\u003c/p\u003e\n\n\u003cp\u003eGlassworm’s C2 relied on four layered channels. First, Solana blockchain transactions were used as immutable dead drops, with server addresses encoded in memo fields that cannot be removed. Second, the malware queried the BitTorrent Distributed Hash Table for configuration data stored under hardcoded public keys, exploiting a global peer-to-peer network without a single point of failure. Third, Google Calendar event titles served as delivery points for Base64-encoded C2 paths, turning a trusted collaboration service into a stealthy communication layer. Finally, direct connections to VPS-hosted servers delivered the actual payloads.\u003c/p\u003e\n\n\u003cp\u003eBecause disrupting only one channel would have allowed the operation to shift to another seamlessly, a simultaneous, coordinated action was necessary. CrowdStrike, Google, and The Shadowserver Foundation executed exactly that, cutting off all four C2 channels at once. This rendered the botnet unable to push new instructions or malware to infected machines.\u003c/p\u003e\n\n\u003cp\u003eIn the aftermath of the takedown, every compromised host that attempts to reach Glassworm C2 now beacons to IP address 164.92.88[.]210, which is operated by CrowdStrike. This single network indicator gives organizations a simple way to detect infections on their networks.\u003c/p\u003e\n\n\u003cp\u003eDefenders are advised to search for traffic to that IP and to apply YARA rules published by the researchers to confirm the presence of Glassworm-related malware. The disruption effectively neutralizes the botnet’s active control, though previously installed implants may still persist until remediated.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"background\"\u003eBackground\u003c/h2\u003e\n\n\u003cp\u003eGlassworm is a botnet that has been active since at least October 2025, targeting developers with software supply-chain attacks. Initial campaigns delivered malicious OpenVSX and Microsoft VS Code extensions that stole cryptocurrency wallets and developer credentials. The operation later expanded to GitHub repositories and npm packages; one wave in March impacted more than 400 software artifacts. In a more recent tactic, Glassworm operators uploaded 73 dormant extensions to OpenVSX that remained benign until a subsequent update would activate the malicious component, a sleeper technique that evaded initial review.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-architecture\"\u003eCommand-and-Control Architecture\u003c/h2\u003e\n\n\u003cp\u003eThe botnet’s resilience stemmed from a multi-layered C2 infrastructure that combined traditional hosting with decentralized and legitimate services, making it difficult to take down. The four channels were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSolana blockchain:\u003c/strong\u003e C2 server addresses were embedded in the memo fields of blockchain transactions. Because the blockchain is immutable, these dead drops could not be removed, and the public nature of Solana provided a reliable, always-available resolution layer.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBitTorrent Distributed Hash Table (DHT):\u003c/strong\u003e GlasswormRAT used hardcoded public keys to query the BitTorrent peer-to-peer network for configuration data. This global, decentralized network has no single point of failure and cannot be easily blocked or sinkholed.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePublic calendar service (Google Calendar):\u003c/strong\u003e Event titles were repurposed as dead-drop locations carrying Base64-encoded C2 paths. Using a legitimate, widely trusted service allowed the traffic to blend in and made disruption difficult without cooperation from the service provider.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirect server connections:\u003c/strong\u003e Traditional C2 infrastructure hosted on commercial VPS providers served as the final stage, delivering actual payloads to compromised machines.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCrowdStrike noted that the operators “built their infrastructure for resilience,” creating a dynamic front that protected the true C2 servers behind multiple layers of indirection. As a result, taking down any single channel would have had minimal impact because the botnet could simply fall back to another channel.\u003c/p\u003e\n\n\u003ch2 id=\"takedown-operation\"\u003eTakedown Operation\u003c/h2\u003e\n\n\u003cp\u003eA coordinated disruption operation was carried out yesterday by CrowdStrike, Google, and The Shadowserver Foundation. The researchers emphasized that all four C2 channels had to be disrupted simultaneously; otherwise, the threat actor would have maintained control through the remaining channels. The article states that this simultaneous action successfully cut off the operators’ access, meaning infected machines can no longer receive new instructions or payloads.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-indicators\"\u003eImpact and Indicators\u003c/h2\u003e\n\n\u003cp\u003ePost-disruption, all Glassworm-infected machines that attempt to reach C2 are now beaconing to the IP address \u003ccode\u003e164.92.88[.]210\u003c/code\u003e, which is operated by CrowdStrike. This creates a single, high-fidelity network indicator that organizations can use to quickly identify compromised hosts.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-guidance\"\u003eDefensive Guidance\u003c/h2\u003e\n\n\u003cp\u003eOrganizations are advised to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitor for traffic to the IP address \u003ccode\u003e164.92.88[.]210\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eTake immediate remediation action on any detected host contacting that IP.\u003c/li\u003e\n\u003cli\u003eUse YARA rules published by the researchers to confirm Glassworm infections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe disruption effectively breaks the botnet’s ability to command infected machines, but previously deployed implants may still be present on systems until remediated.\u003c/p\u003e\n","keyPoints":["The Glassworm botnet was disrupted in a coordinated takedown by CrowdStrike, Google, and The Shadowserver Foundation.","The botnet's resilient command-and-control infrastructure relied on four channels—Solana blockchain transactions, BitTorrent DHT, Google Calendar event titles, and direct server connections—which had to be disrupted simultaneously.","Glassworm campaigns began in October 2025 and targeted developers via malicious OpenVSX and VS Code extensions, later expanding to GitHub and npm, with one wave impacting over 400 software artifacts.","A recent attack wave planted 73 dormant extensions on OpenVSX that would activate malicious behavior after an update.","After disruption, all infected machines now beacon to a CrowdStrike-controlled IP address, and organizations are advised to check for this indicator and use published YARA rules."],"insights":["Glassworm used Google Calendar event titles as a dead-drop for Base64-encoded C2 paths, turning a trusted collaboration service into an attack channel that is difficult to block or take down.","The botnet planted dormant malicious extensions on OpenVSX that remained benign until receiving a later update, evading initial static review and achieving long-term stealth.","The need to simultaneously disrupt all four C2 channels—including blockchain and BitTorrent DHT—demonstrates that modern malware operators design their infrastructure with defense-in-depth, forcing defenders into complex, coordinated actions.","Following the takedown, all infected machines began beaconing to a CrowdStrike-controlled IP, creating a single, high-fidelity indicator for organizations to quickly identify and remediate compromised hosts."],"referencedReports":[{"title":"Inside CrowdStrike Takedown of a Developer-Targeting Botnet","url":"https://www.crowdstrike.com/en-us/blog/inside-crowdstrike-takedown-of-a-developer-targeting-botnet/","publisher":"CrowdStrike","context":"The article references CrowdStrike's technical analysis detailing the Glassworm C2 infrastructure and the coordinated disruption of its four resilient channels.","category":"","primary":false}],"body":"\u003cp\u003eA coordinated operation by CrowdStrike, Google, and The Shadowserver Foundation simultaneously disrupted four distinct command-and-control channels used by the Glassworm botnet, which had built a resilient infrastructure leveraging Solana blockchain transactions, BitTorrent’s DHT, Google Calendar event titles, and direct VPS connections. Because the botnet was designed to survive the loss of any single channel, all four had to be taken down at once to cut off operator access.\u003c/p\u003e\n\n\u003cp\u003eFollowing the takedown, all infected machines now beacon exclusively to a CrowdStrike-controlled IP address (164.92.88[.]210), giving defenders a single high-confidence indicator of compromise. Organizations are urged to look for this network activity and use published YARA rules to identify and remediate compromised hosts.\u003c/p\u003e\n"},{"n":8,"title":"Iranian intelligence service behind hack of LA transit system, researchers say","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/iranian-intelligence-behind-hack-of-la-transit-system","time":"13:20","priority":"MUST READ","score":95,"tldr":"Iran's Ministry of Intelligence (MOIS) carried out the destructive cyberattack on the Los Angeles transit system using a fake hacktivist group, highlighting how state-backed actors disguise attacks as independent activism to destroy critical infrastructure.","briefOverview":"\u003cp\u003eResearchers at Gambit Security have linked the March breach of the Los Angeles County Metropolitan Transportation Authority (LACMTA) to a hacking group operating on behalf of Iran\u0026rsquo;s Ministry of Intelligence (MOIS). The attackers presented themselves as the hacktivist crew \u0026lsquo;Ababil of Minab\u0026rsquo; but forensic evidence ties them to prior Iran-backed operations, including activity attributed to MOIS by Israel\u0026rsquo;s National Cyber Directorate.\u003c/p\u003e\n\n\u003cp\u003eThe operation involved data exfiltration followed by the deliberate destruction of infrastructure, with adversaries wiping databases, virtual machines, and storage volumes both through automated scripts and hands-on-keyboard activity. The campaign\u0026rsquo;s speed — moving directly into backup and recovery infrastructure — reflects a modern intrusion trend that the report warns will become more accessible as AI capabilities spread.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn late May 2026, an Israeli security firm, Gambit Security, published research linking a destructive cyberattack against the Los Angeles County Metropolitan Transportation Authority (LACMTA) to Iran\u0026rsquo;s intelligence apparatus. The report concludes that the group calling itself \u0026lsquo;Ababil of Minab\u0026rsquo; — a name referencing a fatal Iranian school incident — is not an independent hacktivist collective but a front for operatives of the Ministry of Intelligence of the Islamic Republic of Iran (MOIS). The attribution relies on forensic artifacts that connect the group to previous campaigns already attributed to MOIS by Israel\u0026rsquo;s National Cyber Directorate.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the attack followed a pattern of exfiltration before destruction. Adversaries deployed custom exfiltration tooling to steal LACMTA data, then pivoted to wiping critical assets. The destruction playbook targeted virtualization, storage, and backup infrastructure directly, erasing databases, virtual machines, and storage volumes through both automated scripts and direct human-led activity. This approach was designed to deny recovery and maximize operational impact.\u003c/p\u003e\n\n\u003cp\u003eThe attackers did not limit their campaign to the Los Angeles transit system. The Gambit report identifies several additional victims whose data was exfiltrated — but not destroyed — including an Israeli media organization, an Israeli university, a Turkish insurance brokerage, and multiple websites in the restaurant, culture, digital services, and news sectors. Organizations in Saudi Arabia were also compromised by the same group, indicating a broad intelligence-gathering or influence operation aligned with Iranian geopolitical interests.\u003c/p\u003e\n\n\u003cp\u003eThe MOIS connection is reinforced by the recent use of similar false-flag hacktivist personas. A separate MOIS-linked group named Handala claimed responsibility for a devastating March attack on medical device maker Stryker, which involved wiping employee devices and core systems. Both Handala and Ababil of Minab present themselves as independent, cause-driven actors, but the U.S. Department of Justice and cybersecurity experts have identified Handala as an MOIS-backed entity, illustrating a consistent tradecraft of state-run destruction concealed behind activist branding.\u003c/p\u003e\n\n\u003cp\u003eBeyond attribution, the Gambit report highlights a broader threat trend: the velocity with which modern intrusion operators move from initial access straight into recovery-layer destruction. The researchers note that the required skill to conduct such large-scale, recovery-denying attacks is shrinking. They explicitly warn that as AI capabilities become widely available, even low-skilled actors will be able to execute this type of campaign, dramatically expanding the potential threat landscape.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"executive-summary\"\u003eExecutive Summary\u003c/h2\u003e\n\n\u003cp\u003eNew research from Israeli cybersecurity firm Gambit Security, published on May 26, 2026, reveals that an Iranian state-backed group operating under the hacktivist persona \u0026ldquo;Ababil of Minab\u0026rdquo; was responsible for the March breach of the Los Angeles County Metropolitan Transportation Authority (LACMTA). The group is directly tied to Iran\u0026rsquo;s Ministry of Intelligence (MOIS). The attack combined data exfiltration with a rapid, recovery-focused destruction campaign, and it was part of a wider operation that also targeted organizations in Israel, Turkey, Saudi Arabia, and other sectors. The incident underscores a rising trend in which state actors adopt false flags and target backup infrastructure to maximize damage, a capability researchers warn will be democratized by AI.\u003c/p\u003e\n\n\u003chr\u003e\n\n\u003ch2 id=\"attack-overview\"\u003eAttack Overview\u003c/h2\u003e\n\n\u003cp\u003eIn March 2026, the LACMTA experienced a cyber breach in which the attackers claimed to have exfiltrated data and destroyed infrastructure. The group calling itself \u0026ldquo;Ababil of Minab\u0026rdquo; — a reference to a city where over 175 teachers and children died in an Iranian school — publicly took credit early on.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attackers followed a two-phase approach: \u003cstrong\u003eexfiltration of sensitive data\u003c/strong\u003e, then \u003cstrong\u003edestruction of systems\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eSystems targeted for destruction included \u003cstrong\u003edatabases, virtual machines, and storage volumes\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe destruction was executed through a combination of \u003cstrong\u003eautomated scripts\u003c/strong\u003e and \u003cstrong\u003ehands-on-keyboard activity\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003chr\u003e\n\n\u003ch2 id=\"attribution-to-iran-s-intelligence-service-mois\"\u003eAttribution to Iran\u0026rsquo;s Intelligence Service (MOIS)\u003c/h2\u003e\n\n\u003cp\u003eGambit Security\u0026rsquo;s investigation uncovered forensic evidence that directly links the Ababil of Minab group to MOIS, contradicting the hackers\u0026rsquo; self-portrayal as an independent hacktivist crew.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eForensic linkage\u003c/strong\u003e: Researchers connected the tools and infrastructure used in this campaign to prior hacking activity that Israel\u0026rsquo;s National Cyber Directorate had already attributed to Iran\u0026rsquo;s intelligence service.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCustom tooling\u003c/strong\u003e: The group deployed custom exfiltration tools, a hallmark of a well-resourced, persistent threat actor.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMasquerading tactic\u003c/strong\u003e: Using a domestically resonant Iranian tragedy as a group name served as a psychological false flag, obscuring state involvement and potentially shaping perceptions that the actions were grassroots activism.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Ababil of Minab case is not isolated. The article notes that another MOIS-linked group, \u003cstrong\u003eHandala\u003c/strong\u003e, has used similar hacktivist cover. Handala claimed the March 2026 attack on medical device maker Stryker, which involved wiping employee devices and core systems. The U.S. Department of Justice and cyber experts have confirmed Handala is a front for MOIS.\u003c/p\u003e\n\n\u003chr\u003e\n\n\u003ch2 id=\"technical-details-of-the-lacmta-attack\"\u003eTechnical Details of the LACMTA Attack\u003c/h2\u003e\n\n\u003cp\u003eThe Gambit report describes a highly destructive playbook focused on eliminating recovery options.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDestruction scope\u003c/strong\u003e: Hackers erased databases, virtual machines, and storage volumes.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecution methods\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAutomated scripts\u003c/strong\u003e for scaling the wipe across infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHands-on-keyboard activity\u003c/strong\u003e indicating human operators directly interacted with systems to ensure thorough destruction.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTargeting recovery layers\u003c/strong\u003e: The attackers moved from initial access straight into the virtualization, storage, and backup infrastructure to deny any restoration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDwell time / velocity\u003c/strong\u003e: The campaign was notable for its speed, skipping the prolonged reconnaissance often seen in cyber-espionage, in favor of immediate destruction.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese techniques align with an emerging \u0026ldquo;destructive-first\u0026rdquo; model, where intrusion operators prioritize crippling recovery capability over lingering silently.\u003c/p\u003e\n\n\u003chr\u003e\n\n\u003ch2 id=\"additional-victims-and-geopolitical-scope\"\u003eAdditional Victims and Geopolitical Scope\u003c/h2\u003e\n\n\u003cp\u003eThe operation extended well beyond the LACMTA. According to Gambit, the same actors targeted multiple entities across multiple countries.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eExfiltrated but not destroyed\u003c/strong\u003e (data theft without wiping):\n\n\u003cul\u003e\n\u003cli\u003eAn Israeli media sector organization\u003c/li\u003e\n\u003cli\u003eAn Israeli university\u003c/li\u003e\n\u003cli\u003eA Turkish insurance brokerage\u003c/li\u003e\n\u003cli\u003eSeveral websites spanning the restaurant, culture, digital services, and news sectors\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlso hacked\u003c/strong\u003e: Organizations in \u003cstrong\u003eSaudi Arabia\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis victimology — Israeli, Turkish, Saudi, and U.S. targets — suggests an intelligence collection effort aligned with Iran\u0026rsquo;s regional priorities, combined with a willingness to inflict reputational or operational damage on critical infrastructure outside immediate conflict zones.\u003c/p\u003e\n\n\u003chr\u003e\n\n\u003ch2 id=\"broader-campaign-implications-and-trends\"\u003eBroader Campaign Implications and Trends\u003c/h2\u003e\n\n\u003cp\u003eThe report highlights a dangerous evolution in destructive cyber operations, pointing to two major takeaways.\u003c/p\u003e\n\n\u003ch3 id=\"1-speed-toward-recovery-layer-destruction\"\u003e1. Speed Toward Recovery-Layer Destruction\u003c/h3\u003e\n\n\u003cp\u003eModern threat actors increasingly skip typical lateral movement and directly assault the systems that make recovery possible. The report notes:\u003c/p\u003e\n\n\u003cblockquote\u003e\n\u003cp\u003e\u0026ldquo;Modern intrusion operators are moving from initial access straight into the recovery layer, virtualization, backups, storage volumes, to maximize destruction and deny remediation.\u0026rdquo;\u003c/p\u003e\n\u003c/blockquote\u003e\n\n\u003cp\u003eThis approach dramatically cuts the defender\u0026rsquo;s response window and amplifies impact even when attacks are detected quickly.\u003c/p\u003e\n\n\u003ch3 id=\"2-democratization-of-advanced-destruction-via-ai\"\u003e2. Democratization of Advanced Destruction via AI\u003c/h3\u003e\n\n\u003cp\u003eGambit\u0026rsquo;s researchers explicitly link this trend to the commoditization of offensive capabilities:\u003c/p\u003e\n\n\u003cblockquote\u003e\n\u003cp\u003e\u0026ldquo;As AI capabilities become widely available, any actor, skilled or not, will be able to execute this kind of campaign.\u0026rdquo;\u003c/p\u003e\n\u003c/blockquote\u003e\n\n\u003cp\u003eThis warning indicates that the barrier to executing large-scale, recovery-denying wipes is collapsing, posing a threat that will no longer be confined to well-funded state actors.\u003c/p\u003e\n\n\u003chr\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe LACMTA hack was a state-directed, MOIS-orchestrated operation hidden behind a fabricated hacktivist identity that intentionally adopted a name tied to a domestic Iranian tragedy. The attack successfully exfiltrated data and destroyed critical infrastructure, with a speed and focus on recovery systems that marks a dangerous shift in intrusion playbooks. With victims spanning the United States, Israel, Turkey, and Saudi Arabia, the campaign reveals a broad intelligence and disruption effort. The Gambit Security report serves as both an attribution notice and a warning: the combination of false-flag personas and AI-driven attack acceleration will likely make such high-velocity destruction campaigns increasingly common.\u003c/p\u003e\n","keyPoints":["Iranian hackers working for the Ministry of Intelligence (MOIS) were behind the March cyberattack on the Los Angeles County Metropolitan Transportation Authority (LACMTA), according to researchers at Gambit Security.","The attackers used the persona of a hacktivist group called Ababil of Minab, but forensic evidence linked them to prior Iran-backed operations, including those attributed to MOIS by Israel's National Cyber Directorate.","The breach involved exfiltration of data and the destruction of infrastructure, with hackers erasing databases, virtual machines, and storage volumes through automated scripts and hands-on-keyboard activity.","Additional victims of the same group were identified, including an Israeli media organization, an Israeli university, a Turkish insurance brokerage, and organizations in Saudi Arabia.","The campaign was notable for its velocity, with attackers rapidly targeting backup and recovery systems to maximize damage, a trend researchers say will accelerate as AI capabilities become widely available."],"insights":["The attackers focused on destroying backup and recovery infrastructure, including virtual machines and storage volumes, indicating a deliberate strategy of pure destruction rather than financial extortion, which is an escalation beyond typical ransomware operations.","The hackers' false flag as a hacktivist group named after a domestic Iranian tragedy served as psychological camouflage to obscure state involvement, a tactic that complicates public attribution and could be intended to shape political narratives.","The campaign's velocity, moving from initial access straight to wiping recovery layers with minimal dwell time, signals a shift toward rapid destruction that researchers warn will become more common as AI capabilities lower the skill barrier.","The victim list spanning US transit, Israeli media and academia, a Turkish insurance brokerage, and Saudi organizations points to a broader intelligence-gathering or influence effort aligned with Iran's geopolitical interests, not just a one-off hack.","The use of custom exfiltration tooling confirms the attack was a well-resourced, persistent threat actor operation, blurring the line between espionage and destruction and enabling data exfiltration before infrastructure was wiped."],"referencedReports":[{"title":"Babil of Minab: Iran MOIS Destruction Campaign","url":"https://gambit.security/blog-posts/babil-of-minab-iran-mois-destruction-campaign","publisher":"Gambit Security","context":"This report by Gambit Security provides forensic evidence linking the Ababil of Minab hacking group to Iran's Ministry of Intelligence (MOIS) and details the tactics used in the LACMTA breach and other attacks.","category":"","primary":false}],"body":"\u003cp\u003eResearchers at Gambit Security have linked the March breach of the Los Angeles County Metropolitan Transportation Authority (LACMTA) to a hacking group operating on behalf of Iran\u0026rsquo;s Ministry of Intelligence (MOIS). The attackers presented themselves as the hacktivist crew \u0026lsquo;Ababil of Minab\u0026rsquo; but forensic evidence ties them to prior Iran-backed operations, including activity attributed to MOIS by Israel\u0026rsquo;s National Cyber Directorate.\u003c/p\u003e\n\n\u003cp\u003eThe operation involved data exfiltration followed by the deliberate destruction of infrastructure, with adversaries wiping databases, virtual machines, and storage volumes both through automated scripts and hands-on-keyboard activity. The campaign\u0026rsquo;s speed — moving directly into backup and recovery infrastructure — reflects a modern intrusion trend that the report warns will become more accessible as AI capabilities spread.\u003c/p\u003e\n"},{"n":13,"title":"AI Chatbot Recommendations Redirect Users to Cryptojacking Malware Sites","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/ai-chatbot-recommendations-redirect.html","time":"07:45","priority":"MUST READ","score":95,"tldr":"Attackers are manipulating AI chatbot recommendations to redirect users searching for popular system tools to cryptojacking malware sites, combining GPU mining with persistent remote access for potential data theft or ransomware.","briefOverview":"\u003cp\u003eMicrosoft has reported an active cryptojacking campaign that abuses AI chatbot interactions to redirect users to malicious download sites. Instead of relying solely on traditional search engine poisoning, the attackers manipulate large language model (LLM) recommendations to surface links for fake versions of trusted system utilities like CrystalDiskInfo, HWMonitor, and FurMark. The campaign selectively targets machines with high‑performance GPUs, aiming to maximize mining yield while also establishing persistent remote access via ScreenConnect for potential follow‑on activity such as data theft or ransomware.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain begins when a user downloads a ZIP archive from a campaign‑controlled domain. Inside the archive, a legitimate executable sideloads a malicious DLL that silently installs ScreenConnect, after which a process‑hollowing binary injects mining code into a Microsoft‑signed process. To evade detection, the malware immediately kills the miner if it finds running forensic tools like Task Manager, Process Hacker, or System Informer, and it recreates persistence and Defender exclusions if removed.\u003c/p\u003e\n\n\u003cp\u003eIn the same disclosure window, Microsoft detailed two other unrelated intrusions: an attacker who compromised an internet‑facing F5 BIG‑IP appliance, pivoted to a Confluence server, and executed Kerberos relay attacks against Active Directory; and a stealthy campaign that abused a compromised third‑party IT provider and legitimate management tools for credential theft and long‑term access. These incidents underscore how adversaries are exploiting trusted relationships and over‑privileged accounts across on‑premises and cloud environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft warns of an active cryptojacking campaign that leverages AI chatbot interactions as a delivery mechanism. Attackers poison the recommendations generated by large language models so that users searching for well‑known system utilities are pointed to malicious download sites impersonating CrystalDiskInfo, HWMonitor, Display Driver Uninstaller, FurMark, K‑Lite Codec Pack, and PDFgear. The campaign is designed to compromise endpoints with powerful GPUs, prioritizing mining profitability over mass infection volume. In addition to cryptocurrency mining, the attackers establish persistent remote access through the legitimate ScreenConnect remote management tool, opening the door to data theft, lateral movement, or ransomware deployment.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain starts when a victim downloads a ZIP archive from a campaign‑specific subdomain of gleeze[.]com. The archive contains a legitimate executable along with a rogue DLL (autorun.dll) that is sideloaded at launch. This DLL installs a second malicious DLL, vcredist_x64.dll, via msiexec.exe, which is actually a packaged ScreenConnect installer. Once ScreenConnect is running, it contacts an attacker‑controlled server at 193.42.11[.]108 and receives a payload called SimpleRunPE.exe. This executable creates Registry Run keys and scheduled tasks, sets Microsoft Defender exclusions, performs anti‑analysis checks, and uses process hollowing to launch the mining code under a trusted Microsoft‑signed binary. In some cases, a PowerShell script is used instead to fetch the miner directly, saving it as \u0026lsquo;vlc.exe\u0026rsquo; and setting up a scheduled task. The hollowed process communicates with the attacker’s server, downloads one of three supported miners (gminer, lolMiner, SRBMiner‑MULTI), and executes it. It also continuously recreates persistence and Defender exclusions, while monitoring for the presence of forensic tools such as taskmgr.exe, processhacker.exe, procexp.exe, and systeminformer.exe—if any are detected, the miner is immediately terminated to avoid scrutiny.\u003c/p\u003e\n\n\u003cp\u003eBeyond the cryptojacking campaign, Microsoft recently published two other intrusion analyses. The first involved an unknown attacker compromising an internet‑facing F5 BIG‑IP firewall and using it to pivot to an internal Linux host, which then enabled lateral movement to a vulnerable Atlassian Confluence server. Although remote code execution attempts against unpatched Confluence flaws failed, the attacker set up an FTP server on the initial Linux host using Python’s ftplib module to transfer a custom scanning tool, and thereafter obtained credentials to authenticate against Windows infrastructure. This led to Kerberos relay attacks and exploitation of CVE‑2025‑33073, ultimately allowing the attacker to compromise a vulnerable SaaS application and conduct relay‑style authentication attacks against Active Directory. Notably, the threat actor maintained privileged SSH access throughout the intrusion without establishing explicit persistence, highlighting the risk of over‑privileged identities with sudo rights.\u003c/p\u003e\n\n\u003cp\u003eThe second additional investigation uncovered a stealthy intrusion where adversaries abused a trusted third‑party IT services provider and legitimate IT management tools to gain durable access. They leveraged compromised trust relationships and integrated tools to anchor themselves inside environments that appeared compliant on the surface, focusing on long‑term access and credential theft. Microsoft emphasized that defenders must adopt a posture of deliberate verification—trusting vendors and tooling but validating their behavior within the environment—and that highly targeted threat actors will continue refining techniques that abuse third‑party trust, credential interception, and stealthy persistence to maintain strategic access.\u003c/p\u003e\n\n\u003cp\u003eTogether, these disclosures illustrate a widening threat landscape where attackers exploit not only novel AI‑assisted social engineering but also longstanding gaps in edge device security, third‑party trust, and identity privilege management. The shift from purely financial cryptomining to blended campaigns that incorporate persistent remote access for secondary objectives signals more ambitious attacker goals, while defenders are urged to treat over‑privileged accounts, trusted external relationships, and AI‑generated content as potential vectors for initial compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"ai-chatbot-assisted-cryptojacking-campaign\"\u003eAI Chatbot‑Assisted Cryptojacking Campaign\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has uncovered an active cryptojacking campaign that marks an evolution in social engineering by incorporating AI chatbot interactions. Instead of relying exclusively on search engine poisoning, the attackers manipulate large language model (LLM) tools so that users asking for software download recommendations receive links to attacker‑controlled domains. The campaign impersonates well‑known system utilities—CrystalDiskInfo, HWMonitor, Display Driver Uninstaller, FurMark, K‑Lite Codec Pack, and PDFgear—likely to attract owners of high‑performance GPUs. The approach aims to maximise mining yield per device rather than infecting indiscriminately, while also establishing a persistent remote access backdoor through ScreenConnect that could be repurposed for data theft, lateral movement, or ransomware.\u003c/p\u003e\n\n\u003ch3 id=\"delivery-and-infection-chain\"\u003eDelivery and Infection Chain\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers are directed to malicious sites either via traditional SEO poisoning or, since April 2026, through responses from AI chatbots queried for software recommendations.\u003c/li\u003e\n\u003cli\u003eEach site displays a prominent download button that fetches a ZIP archive from a campaign‑specific subdomain of \u003ccode\u003egleeze[.]com\u003c/code\u003e. Microsoft identified more than 150 such domains.\u003c/li\u003e\n\u003cli\u003eThe ZIP contains a legitimate executable and a malicious DLL (\u003ccode\u003eautorun.dll\u003c/code\u003e). When the legitimate file is launched, it sideloads the rogue DLL.\u003c/li\u003e\n\u003cli\u003eThe DLL installs a second malicious payload, \u003ccode\u003evcredist_x64.dll\u003c/code\u003e, via \u003ccode\u003emsiexec.exe\u003c/code\u003e. This file is actually a packaged installer for the ScreenConnect remote management software.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"screenconnect-as-a-pivot\"\u003eScreenConnect as a Pivot\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eOnce installed, the ScreenConnect client repeatedly attempts to contact an attacker‑controlled server at \u003ccode\u003e193.42.11[.]108\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe ScreenConnect session is used to deliver \u003ccode\u003eSimpleRunPE.exe\u003c/code\u003e, a binary that takes over the host’s execution environment.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eSimpleRunPE.exe\u003c/code\u003e establishes persistence using Registry Run keys and scheduled tasks, configures Microsoft Defender exclusions, runs anti‑analysis checks, and performs process hollowing to launch mining code under a trusted Microsoft‑signed binary.\u003c/li\u003e\n\u003cli\u003eIn some compromises, a PowerShell script retrieves the same payload from a remote drive, saves it locally as \u003ccode\u003evlc.exe\u003c/code\u003e (to blend in), creates a scheduled task to execute it, and then deletes itself.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mining-operation-and-evasion\"\u003eMining Operation and Evasion\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe hollowed process communicates with the attacker’s infrastructure, sends extensive host information, and downloads the appropriate miner archive at runtime.\u003c/li\u003e\n\u003cli\u003eThree miner programs are supported: gminer, lolMiner, and SRBMiner‑MULTI.\u003c/li\u003e\n\u003cli\u003eThe malware recreates all persistence artifacts and re‑applies Defender exclusions if they are removed.\u003c/li\u003e\n\u003cli\u003eTo avoid detection, it continuously monitors for running processes associated with forensic tools. If any of the following are detected, the miner is immediately terminated:\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003etaskmgr.exe\u003c/code\u003e (Windows Task Manager)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eprocesshacker.exe\u003c/code\u003e, \u003ccode\u003eprocesshacker2.exe\u003c/code\u003e (Process Hacker)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eprocexp.exe\u003c/code\u003e, \u003ccode\u003eprocexp64.exe\u003c/code\u003e (Process Explorer)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esysteminformer.exe\u003c/code\u003e (System Informer)\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft notes that this combination of AI‑assisted delivery, software impersonation, and persistent access reflects how threat actors are adapting social engineering and monetisation strategies to modern user behaviour.\u003c/p\u003e\n\n\u003ch2 id=\"other-intrusion-disclosures-by-microsoft\"\u003eOther Intrusion Disclosures by Microsoft\u003c/h2\u003e\n\n\u003ch3 id=\"f5-big-ip-to-confluence-intrusion\"\u003eF5 BIG‑IP to Confluence Intrusion\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn unknown threat actor compromised an internet‑facing F5 BIG‑IP firewall appliance and used it to pivot to an internal Linux host.\u003c/li\u003e\n\u003cli\u003eFrom the Linux host, the attacker performed comprehensive reconnaissance and laterally moved to a vulnerable Atlassian Confluence server.\u003c/li\u003e\n\u003cli\u003eAttempts to exploit unpatched Confluence flaws for remote code execution were unsuccessful.\u003c/li\u003e\n\u003cli\u003eTo bypass restrictions, the threat actor set up an FTP server on the initial Linux host using Python’s \u003ccode\u003eftplib\u003c/code\u003e module and transferred a custom scanning tool to the Confluence server.\u003c/li\u003e\n\u003cli\u003eThis tool helped obtain credentials for authentication against Windows infrastructure, followed by Kerberos relay attacks and exploitation of CVE‑2025‑33073.\u003c/li\u003e\n\u003cli\u003eThe attacker then compromised a vulnerable SaaS application and used its credentials to conduct relay‑style authentication attacks against Active Directory.\u003c/li\u003e\n\u003cli\u003eNotably, the threat actor maintained privileged SSH access throughout the observed activity without deploying explicit persistence mechanisms, highlighting the danger of over‑privileged accounts with sudo rights.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"third-party-trust-abuse-campaign\"\u003eThird‑Party Trust Abuse Campaign\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn a separate investigation earlier that month, Microsoft detailed an intrusion where attackers abused trusted operational relationships and authentication processes.\u003c/li\u003e\n\u003cli\u003eThe threat actor compromised a third‑party IT services provider and leveraged legitimate IT management tools to orchestrate a covert, long‑term campaign focused on access and credential theft.\u003c/li\u003e\n\u003cli\u003eBy hiding within trusted update paths and approved integrations, the adversaries anchored themselves in environments that appeared compliant on the surface.\u003c/li\u003e\n\u003cli\u003eMicrosoft recommended that defenders adopt deliberate verification: trust vendors and tooling, but continuously validate their behaviour within the environment, especially in sensitive sectors.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cross-cutting-themes\"\u003eCross‑Cutting Themes\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAbuse of trust\u003c/strong\u003e: Whether by poisoning AI chatbot recommendations, embedding malware behind familiar utility names, hijacking ScreenConnect as a legitimate remote tool, or leveraging a trusted third‑party provider, all the campaigns exploit assumptions of legitimacy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEvolving social engineering\u003c/strong\u003e: The move from SEO poisoning to AI‑generated responses represents a measurable adaptation to how users now obtain software.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBlended objectives\u003c/strong\u003e: The cryptojacking threat is not purely financial; the ScreenConnect backdoor enables lateral movement and ransomware, aligning with broader enterprise intrusion goals.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIdentity and privilege\u003c/strong\u003e: The F5/Confluence incident underlines the risk of over‑privileged accounts that allow attackers to sustain access without traditional persistence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDefender recommendations\u003c/strong\u003e: Microsoft advises monitoring AI‑generated recommendations as a potential attack vector, applying least‑privilege principles to administrative accounts, verifying third‑party tool behaviour, and assuming that sophisticated actors will continue refining methods to abuse trusted relationships and built‑in tooling.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft warned of an active cryptojacking campaign that uses AI chatbot interactions to surface malicious download sites.","The campaign impersonates legitimate system utilities such as CrystalDiskInfo, HWMonitor, and FurMark to target users with high-performance GPUs.","Threat actors establish persistent remote access on compromised hosts via ScreenConnect deployments, which could be used for data theft, lateral movement, or ransomware.","Starting in April 2026, users querying AI chatbots for software download recommendations were directed to attacker-controlled domains within the generated responses.","The installed malware monitors for processes like Task Manager and Process Explorer and immediately terminates the miner if any are detected."],"insights":["Attackers have extended SEO poisoning to AI chatbot interactions, using malicious recommendations in generated responses to deliver malware.","The campaign selectively targets systems with high-performance GPUs to maximize cryptomining yield per device, rather than conducting broad, indiscriminate infections.","The malware not only mines cryptocurrency but also installs ScreenConnect for persistent remote access, creating a backdoor for data theft, lateral movement, or ransomware.","The mining payload monitors for security tools like Task Manager, Process Hacker, and Process Explorer, and immediately terminates itself to evade detection by forensic analysts."],"referencedReports":[{"title":"Poisoned search results: GPU mining cryptojacking campaign abusing ScreenConnect, Microsoft .NET utilities","url":"https://www.microsoft.com/en-us/security/blog/2026/05/26/poisoned-search-results-gpu-mining-cryptojacking-campaign-abusing-screenconnect-microsoft-net-utilities/","publisher":"Microsoft","context":"The article cites this Microsoft report published Tuesday as the source of the warning about an active cryptojacking campaign that uses AI chatbot interactions to deliver malicious downloads.","category":"","primary":false},{"title":"From edge appliance to enterprise compromise: Multi-stage Linux intrusion via F5 and Confluence","url":"https://www.microsoft.com/en-us/security/blog/2026/05/22/from-edge-appliance-to-enterprise-compromise-multi-stage-linux-intrusion-via-f5-and-confluence/","publisher":"Microsoft","context":"Days before the main alert, Microsoft detailed this intrusion involving compromise of an internet-facing F5 BIG-IP appliance and lateral movement to an internal Linux host, as referenced in the article.","category":"","primary":false},{"title":"Undermining the trust boundary: Investigating a stealthy intrusion through third-party compromise","url":"https://www.microsoft.com/en-us/security/blog/2026/05/12/undermining-the-trust-boundary-investigating-a-stealthy-intrusion-through-third-party-compromise/","publisher":"Microsoft","context":"Earlier in the same month, Microsoft published this analysis of an attack that abused trusted third-party IT service provider relationships and legitimate management tools for covert long-term access and credential theft.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has reported an active cryptojacking campaign that abuses AI chatbot interactions to redirect users to malicious download sites. Instead of relying solely on traditional search engine poisoning, the attackers manipulate large language model (LLM) recommendations to surface links for fake versions of trusted system utilities like CrystalDiskInfo, HWMonitor, and FurMark. The campaign selectively targets machines with high‑performance GPUs, aiming to maximize mining yield while also establishing persistent remote access via ScreenConnect for potential follow‑on activity such as data theft or ransomware.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain begins when a user downloads a ZIP archive from a campaign‑controlled domain. Inside the archive, a legitimate executable sideloads a malicious DLL that silently installs ScreenConnect, after which a process‑hollowing binary injects mining code into a Microsoft‑signed process. To evade detection, the malware immediately kills the miner if it finds running forensic tools like Task Manager, Process Hacker, or System Informer, and it recreates persistence and Defender exclusions if removed.\u003c/p\u003e\n\n\u003cp\u003eIn the same disclosure window, Microsoft detailed two other unrelated intrusions: an attacker who compromised an internet‑facing F5 BIG‑IP appliance, pivoted to a Confluence server, and executed Kerberos relay attacks against Active Directory; and a stealthy campaign that abused a compromised third‑party IT provider and legitimate management tools for credential theft and long‑term access. These incidents underscore how adversaries are exploiting trusted relationships and over‑privileged accounts across on‑premises and cloud environments.\u003c/p\u003e\n"},{"n":14,"title":"Grandoreiro Malware and BTMOB RAT Campaigns Target Windows and Android Users","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/grandoreiro-malware-and-btmob-rat.html","time":"16:10","priority":"MUST READ","score":95,"tldr":"Active banking trojan campaigns are using advanced techniques like DLL side-loading and WebRTC-based communications to target financial users across Europe and Latin America, while the BTMOB Android RAT is now sold as malware-as-a-service, lowering the barrier for widespread device compromise.","briefOverview":"\u003cp\u003eWatchGuard has identified a Grandoreiro banking trojan campaign that targets Windows users in Portugal, Spain, and Mexico by employing DLL side-loading to inject malicious libraries that abuse STUN and ICE protocols over WebRTC for stealthy command-and-control communication. By hiding inside noisy web conferencing traffic, the malware evades traditional network monitoring while stealing credentials from multiple Portuguese banks and fintech platforms like Revolut and Wise. The campaign also uses phishing emails with fake Adobe Reader update prompts and CAPTCHA checks to hinder analysis, demonstrating the group\u0026rsquo;s resilience after earlier law enforcement actions.\u003c/p\u003e\n\n\u003cp\u003eConcurrently, ESET details the BTMOB Android remote access trojan, which is offered as malware-as-a-service with a no-code APK builder that lets even unskilled criminals generate custom payloads. Distributed through social engineering lures to fake streaming and mining sites and fake Google Play Store listings, the RAT gains full device control by abusing accessibility services, enabling keylogging, screen capture, and HTML injection attacks. Leaked versions of the complete development toolkit have surfaced on underground forums, further lowering the barrier to entry for compromise of Android devices targeting banking credentials and personal data.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researchers from WatchGuard and ESET have exposed two ongoing banking trojan campaigns aimed at users in Latin America and Europe. The Grandoreiro malware continues to threaten Windows-based financial systems primarily in Portugal, Spain, and Mexico, while the BTMOB Android RAT has emerged as a malware-as-a-service offering targeting mobile banking users in Brazil and beyond. Both threats rely on social engineering to deliver payloads, and each leverages sophisticated techniques to evade detection and maintain persistent access to victim devices.\u003c/p\u003e\n\n\u003cp\u003eThe Grandoreiro campaign flagged
