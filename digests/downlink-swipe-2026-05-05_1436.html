cation stops without a ransom payment. He actively coerced victims by researching their companies and leveraging stolen personal and health data to increase psychological pressure.\u003c/p\u003e\n\n\u003cp\u003eZolotarjovs also facilitated attacks by other ransomware groups, including Conti, Royal, TommyLeaks, SchoolBoys, and Akira. The Department of Justice stated that over 54 companies were attacked, with 13 of them suffering more than \u003cspan class=\"math inline\"\u003e\\(56 million in losses. Approximately \\)\u003c/span\u003e2.8 million in ransom payments were recorded from those known victims alone.\u003c/p\u003e\n\n\u003cp\u003eThe government estimates that total losses likely reached hundreds of millions of dollars due to widespread underreporting. Zolotarjovs stands as the first Karakurt member to be charged and sentenced in the United States. This landmark case may pave the way for additional prosecutions of other group members.\u003c/p\u003e\n\n\u003cp\u003eIn a separate but related enforcement action, two former employees of Sygnia and DigitalMint were sentenced to four years in prison each for their roles in targeting U.S. companies with BlackCat ransomware.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"article-summary-and-analysis\"\u003eArticle Summary and Analysis\u003c/h3\u003e\n\n\u003cp\u003e\u003cstrong\u003eBackground and Legal Proceedings\u003c/strong\u003e\nDeniss Zolotarjovs, a 35-year-old Latvian national residing in Moscow, was extradited from Georgia to the United States following his arrest in December 2023. He pleaded guilty in July 2025 to conspiracy to commit wire fraud and money laundering, charges originally filed in August 2024. Zolotarjovs was sentenced to 8.5 years in prison, marking him as the first member of the Karakurt extortion group to face charges and receive a sentence in the U.S.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eOperational Role and Tactics\u003c/strong\u003e\nZolotarjovs operated under the online alias \u0026ldquo;Sforza_cesarini\u0026rdquo; as a negotiator for the Karakurt ransomware group, which is led by former Conti ransomware gang leaders. His primary function involved managing cold case extortion campaigns, where he re-engaged victims after initial communication had ceased without a ransom payment. He employed psychological coercion tactics by conducting thorough research on targeted organizations and leveraging stolen personal and children\u0026rsquo;s health information to heighten pressure. Additionally, he was associated with attacks carried out by multiple other ransomware groups, including Conti, Royal, TommyLeaks, SchoolBoys Ransomware, and Akira.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eFinancial Impact and Victim Scope\u003c/strong\u003e\nThe Department of Justice documented that Zolotarjovs was linked to at least six extortion cases against American organizations between August 2021 and November 2023. The total scope of attacks involved more than 54 companies. Financial losses were severe, with just 13 of the targeted companies incurring over $56 million in damages. The breakdown of known financial impacts includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately $2.8 million paid in ransom from the 13 identified companies.\u003c/li\u003e\n\u003cli\u003eAn additional $13 million in ransom payments made by 41 other victim companies lacking detailed loss statements.\u003c/li\u003e\n\u003cli\u003eTotal estimated losses projected in the hundreds of millions due to widespread underreporting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eBroader Implications and Related Developments\u003c/strong\u003e\nThis prosecution establishes a significant legal precedent for holding ransomware support personnel accountable in the United States, potentially enabling future charges against other Karakurt affiliates. In a separate enforcement action, two former employees of Sygnia and DigitalMint were sentenced to four years in prison each for their roles in targeting U.S. companies with BlackCat (ALPHV) ransomware.\u003c/p\u003e\n","keyPoints":["Deniss Zolotarjovs was sentenced to 8.5 years in prison after pleading guilty to conspiracy to commit wire fraud and money laundering for his role as a negotiator in the Karakurt ransomware group.","Zolotarjovs handled cold case extortion negotiations by researching targeted companies and leveraging stolen health and personal information to coerce victims into paying ransoms.","The Department of Justice estimates that Zolotarjovs' involvement in attacks on over 54 companies resulted in hundreds of millions of dollars in total losses.","Zolotarjovs is the first member of the Karakurt extortion group to face charges and receive a prison sentence in the United States.","Two former employees of Sygnia and DigitalMint were also sentenced to four years in prison each for their roles in BlackCat ransomware attacks against U.S. companies."],"insights":["The group used stolen children's health data to psychologically pressure victims, revealing a specific information vector that threat intelligence teams should monitor for in extortion campaigns.","Zolotarjovs facilitated attacks across multiple distinct ransomware brands (Conti, Royal, Akira, etc.), indicating shared infrastructure or operator overlap across different ransomware-as-a-service ecosystems.","The cold case negotiation model reactivates dormant victim communications to demand payment, representing a distinct operational phase that incident responders must anticipate during breach investigations.","The U.S. sentencing of a ransomware negotiator rather than just the initial hackers establishes a legal precedent that expands enforcement liability to include support roles within the ransomware ecosystem."],"referencedReports":[],"body":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian national, was sentenced to 8.5 years in prison after being extradited from Georgia to the United States. He pleaded guilty to conspiracy to commit wire fraud and money laundering for his role as a negotiator within the Russian Karakurt ransomware group. The FBI linked Zolotarjovs to at least six extortion cases targeting American organizations between August 2021 and November 2023.\u003c/p\u003e\n\n\u003cp\u003eHis primary responsibility involved reviving dormant extortion attempts, known as cold case negotiations, to pressure victims into paying ransoms. Zolotarjovs utilized stolen children\u0026rsquo;s health information and conducted extensive research on targeted companies to heighten psychological pressure. The Department of Justice reported that attacks on just 13 of the more than 54 companies he targeted resulted in over $56 million in losses.\u003c/p\u003e\n\n\u003cp\u003eWhile the government estimates total losses to be in the hundreds of millions due to widespread underreporting, exact figures remain uncertain. Zolotarjovs is the first Karakurt member to face charges and receive a sentence in the U.S., establishing a precedent for future prosecutions of cyber extortion operators.\u003c/p\u003e\n"},{"n":10,"title":"The Back Door Attackers Know About — and Most Security Teams Still Haven’t Closed","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/the-back-door-attackers-know-about-and.html","time":"11:58","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Unmonitored OAuth grants from third-party and AI tools create a critical security backdoor that traditional controls cannot stop, requiring continuous behavioral monitoring and automated remediation. Organizations must replace static permission reviews with ongoing visibility and rapid response to prevent token-based breaches.","briefOverview":"\u003cp\u003eEvery AI tool and productivity app employees connect to Google or Microsoft leaves behind a persistent OAuth token that lacks expiration dates and centralized visibility.\u003c/p\u003e\n\n\u003cp\u003eTraditional perimeter controls and multi-factor authentication cannot stop these tokens, as attackers bypass them entirely by presenting valid credentials rather than logging in.\u003c/p\u003e\n\n\u003cp\u003eResearch from Material Security reveals that while 80% of security leaders recognize unmanaged OAuth grants as a critical risk, nearly half take no action and many rely on manual spreadsheets.\u003c/p\u003e\n\n\u003cp\u003eThe Drift security breach exemplifies this vulnerability, as threat actor UNC6395 weaponized stolen refresh tokens from a trusted sales platform to access over 700 organizations and exfiltrate sensitive credentials.\u003c/p\u003e\n\n\u003cp\u003eCurrent security tools only evaluate permissions at the moment of installation, leaving organizations blind to compromised legitimate applications.\u003c/p\u003e\n\n\u003cp\u003eEffective defense requires continuous behavioral monitoring of API calls, blast radius assessment based on user access levels, and graduated automated responses.\u003c/p\u003e\n\n\u003cp\u003eOrganizations must shift from passive acceptance to active, ongoing visibility and rapid remediation to secure their expanding OAuth environment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eEmployees are independently connecting AI tools, workflow automations, and productivity apps to Google and Microsoft environments, creating persistent OAuth tokens with no expiration or automatic cleanup.\u003c/p\u003e\n\n\u003cp\u003eThis design worked when only a few IT-approved applications required calendar access, but it now leaves organizations with unmonitored grants that bypass perimeter controls and MFA.\u003c/p\u003e\n\n\u003cp\u003eNew research from Material Security quantifies this gap, showing that 80% of security leaders view unmanaged OAuth grants as a critical risk, yet 45% do nothing and 33% rely on manual tracking methods like spreadsheets.\u003c/p\u003e\n\n\u003cp\u003eThe Drift incident demonstrates the real-world danger of this exposure.\u003c/p\u003e\n\n\u003cp\u003eA threat actor known as UNC6395 obtained valid OAuth refresh tokens from the Drift sales engagement platform and used them to access Salesforce instances across more than 700 customer organizations.\u003c/p\u003e\n\n\u003cp\u003eBecause the tokens were legitimate and the integration was trusted, MFA was completely bypassed and perimeter controls saw no anomalies.\u003c/p\u003e\n\n\u003cp\u003eOnce inside, the attacker exported data and systematically searched for AWS access keys, Snowflake tokens, and passwords, affecting major companies like Cloudflare and PagerDuty.\u003c/p\u003e\n\n\u003cp\u003eThe attack highlights that trusting an application at installation does not guarantee its ongoing security.\u003c/p\u003e\n\n\u003cp\u003eMost current OAuth monitoring tools only evaluate permission scopes and vendor reputation at the point of grant, which fails to catch compromised legitimate apps.\u003c/p\u003e\n\n\u003cp\u003eTo address this gap, security programs must implement continuous behavioral monitoring that tracks actual API calls and flags anomalies like sudden data spikes or off-hours access.\u003c/p\u003e\n\n\u003cp\u003eRisk scoring must also incorporate blast radius assessment, recognizing that a grant tied to a VIP account carries far more impact than one on a standard user profile.\u003c/p\u003e\n\n\u003cp\u003eResponse strategies should be graduated, automatically revoking obviously malicious connections while routing critical business integrations to human review.\u003c/p\u003e\n\n\u003cp\u003eMaterial Security\u0026rsquo;s OAuth Threat Remediation Agent operationalizes this approach by continuously evaluating vendor trust, behavioral anomalies, and account exposure across Google Workspace environments.\u003c/p\u003e\n\n\u003cp\u003eThe agent combines these inputs into a unified risk signal and allows organizations to configure thresholds for automated remediation versus manual oversight.\u003c/p\u003e\n\n\u003cp\u003eUltimately, security teams cannot restrict employee adoption of AI and automation tools, making continuous visibility and intelligent response the only viable path forward.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"the-expanding-oauth-attack-surface\"\u003eThe Expanding OAuth Attack Surface\u003c/h3\u003e\n\n\u003cp\u003eEvery AI tool, workflow automation, and productivity application that employees connect to Google or Microsoft environments leaves behind a persistent OAuth token. These tokens lack expiration dates, automatic cleanup mechanisms, and centralized visibility across most organizations. The original design model assumed only a handful of IT-approved applications would require calendar access, but the landscape has shifted dramatically. Today, independent employee connections create a sprawling network of persistent, scoped tokens that traditional security programs were never built to monitor at scale.\u003c/p\u003e\n\n\u003ch3 id=\"the-awareness-and-capability-gap\"\u003eThe Awareness and Capability Gap\u003c/h3\u003e\n\n\u003cp\u003eResearch from Material Security highlights a significant disconnect between threat awareness and organizational readiness. Eighty percent of security leaders classify unmanaged OAuth grants as a critical or significant risk. Despite this consensus, forty-five percent of organizations take no action to monitor OAuth grants at scale. An additional thirty-three percent rely on manual processes, such as tracking grants in spreadsheets or reviewing permissions on an ad hoc basis. These reactive measures fail to provide the continuous oversight required to detect modern threats.\u003c/p\u003e\n\n\u003ch3 id=\"real-world-impact-the-drift-incident\"\u003eReal-World Impact: The Drift Incident\u003c/h3\u003e\n\n\u003cp\u003eThe Drift security breach provides a concrete example of how OAuth grants function as an active attack vector. Drift, a sales engagement platform acquired by Salesloft, maintained OAuth integrations across hundreds of customer Salesforce instances. A threat actor tracked by Palo Alto Unit 42 as UNC6395 obtained valid OAuth refresh tokens, likely through prior phishing campaigns. The actor used these tokens to access Salesforce environments belonging to more than 700 organizations. Because the tokens and integrations were legitimate, MFA was entirely bypassed and perimeter controls registered no anomalies. Once inside, UNC6395 exported data and systematically searched for credentials, including AWS access keys, Snowflake tokens, and passwords. The breach impacted major entities like Cloudflare and PagerDuty, demonstrating that attacks can flow through trusted applications rather than suspicious ones.\u003c/p\u003e\n\n\u003ch3 id=\"limitations-of-current-monitoring-tools\"\u003eLimitations of Current Monitoring Tools\u003c/h3\u003e\n\n\u003cp\u003eMost existing OAuth security solutions only evaluate risk at the point of installation. They check whether requested permission scopes are excessive and may flag applications from vendors with poor reputations. While useful, this approach is insufficient for detecting compromised legitimate applications. A tool that only reviews static permissions at creation cannot identify when credentials are later stolen and weaponized by a different actor. Effective defense requires moving beyond point-in-time reviews to continuous behavioral analysis.\u003c/p\u003e\n\n\u003ch3 id=\"required-security-capabilities\"\u003eRequired Security Capabilities\u003c/h3\u003e\n\n\u003cp\u003eTo properly secure OAuth environments, organizations must implement three core capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eContinuous behavioral monitoring:\u003c/strong\u003e Security teams must track the actual API calls and actions performed by connected applications over time. This reveals anomalies such as sudden spikes in data access, queries for unusual data types, and access occurring at unexpected hours.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBlast radius assessment:\u003c/strong\u003e Risk scoring must account for the specific access levels and data exposure of the user accounts linked to the grant. A risky application connected to an intern’s account presents a different threat profile than the same application used by a VIP with access to sensitive emails, files, and systems.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGraduated response strategies:\u003c/strong\u003e Automated remediation should immediately revoke obviously malicious applications characterized by unknown vendors, broad permissions, and anomalous behavior. Conversely, mission-critical integrations from major vendors showing mild anomalies should trigger human review before any action is taken.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"operationalizing-continuous-defense\"\u003eOperationalizing Continuous Defense\u003c/h3\u003e\n\n\u003cp\u003eMaterial Security’s OAuth Threat Remediation Agent is designed to operationalize this comprehensive model. The agent runs continuously across Google Workspace environments, monitoring every OAuth-connected application rather than just evaluating new grants. For each connection, it evaluates vendor trust and scope analysis alongside behavioral monitoring of actual API calls. It also conducts blast radius assessments based on the access levels and data exposure of the linked accounts. These inputs combine into a unified risk signal that reflects both the probability of compromise and the potential impact. When high-risk grants are identified, the agent can automatically revoke tokens to prevent harm. For lower-certainty situations involving critical applications, it surfaces findings to security teams with full context. Organizations can configure custom thresholds to determine when automated remediation triggers versus when human sign-off is required.\u003c/p\u003e\n\n\u003ch3 id=\"conclusion\"\u003eConclusion\u003c/h3\u003e\n\n\u003cp\u003eOAuth grants will remain the default method for third-party and AI tool integration as adoption accelerates. Restricting employee access to these tools is not a viable security posture for most organizations. The threat landscape demands better visibility into existing connections, continuous behavioral monitoring, and the operational capability to respond rapidly. Security teams must shift from passive acceptance to active, intelligent oversight to protect their environments without disrupting business-critical integrations.\u003c/p\u003e\n","keyPoints":["OAuth grants for third-party and AI tools persist indefinitely without expiration or centralized visibility, rendering traditional perimeter controls and MFA ineffective.","The Drift security incident demonstrates how attackers weaponize stolen OAuth refresh tokens from trusted applications to bypass authentication and exfiltrate sensitive organizational data.","Effective OAuth defense requires continuous behavioral monitoring of API calls, blast radius assessment based on user account access levels, and graduated automated responses to detected anomalies.","Most security teams currently rely on manual tracking methods like spreadsheets rather than scalable monitoring, leaving organizations unaware of their actual OAuth exposure."],"insights":["MFA is completely bypassed in OAuth attacks because attackers present valid tokens rather than authenticating with credentials, rendering traditional identity controls ineffective.","Legitimate applications pose a greater threat than suspicious ones because their stolen credentials are accepted by perimeter controls without triggering alerts.","Effective risk assessment requires evaluating the blast radius of the specific user account connected to the app, as an app tied to a VIP account poses significantly higher risk than one tied to a standard user.","Static permission reviews at installation cannot detect compromised tokens; continuous monitoring of actual API call behavior is required to identify anomalies after a grant is established."],"referencedReports":[{"title":"Automating OAuth Grant Management: Materials Research Shows the Growing Gap Between Awareness and Action","url":"https://material.security/resources/automating-oauth-grant-management-materials-research-shows-the-growing-gap-between-awareness-and-action?utm_source=third-party\u0026utm_medium=blog\u0026utm_campaign=20260505-the-hacker-news","publisher":"Material Security","context":"The article cites this research to quantify the gap between security leaders' awareness of unmanaged OAuth grants as a critical risk and their actual organizational actions to address it."},{"title":"The Supply Chain Is the New Watering Hole","url":"https://material.security/resources/the-supply-chain-is-the-new-watering-hole?utm_source=third-party\u0026utm_medium=blog\u0026utm_campaign=20260505-the-hacker-news","publisher":"Material Security","context":"The article references this technical analysis of the Drift security breach to demonstrate how stolen OAuth refresh tokens from trusted applications are weaponized to bypass authentication and exfiltrate sensitive data."}],"body":"\u003cp\u003eEvery AI tool and productivity app employees connect to Google or Microsoft leaves behind a persistent OAuth token that lacks expiration dates and centralized visibility.\u003c/p\u003e\n\n\u003cp\u003eTraditional perimeter controls and multi-factor authentication cannot stop these tokens, as attackers bypass them entirely by presenting valid credentials rather than logging in.\u003c/p\u003e\n\n\u003cp\u003eResearch from Material Security reveals that while 80% of security leaders recognize unmanaged OAuth grants as a critical risk, nearly half take no action and many rely on manual spreadsheets.\u003c/p\u003e\n\n\u003cp\u003eThe Drift security breach exemplifies this vulnerability, as threat actor UNC6395 weaponized stolen refresh tokens from a trusted sales platform to access over 700 organizations and exfiltrate sensitive credentials.\u003c/p\u003e\n\n\u003cp\u003eCurrent security tools only evaluate permissions at the moment of installation, leaving organizations blind to compromised legitimate applications.\u003c/p\u003e\n\n\u003cp\u003eEffective defense requires continuous behavioral monitoring of API calls, blast radius assessment based on user access levels, and graduated automated responses.\u003c/p\u003e\n\n\u003cp\u003eOrganizations must shift from passive acceptance to active, ongoing visibility and rapid remediation to secure their expanding OAuth environment.\u003c/p\u003e\n"},{"n":1,"title":"Australia launches cyber review board modeled on version disbanded in US","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/australia-launches-cyber-review-board","time":"12:45","priority":"MAY READ","score":72,"group":null,"groupColor":null,"tldr":"Australia has established a Cyber Incident Review Board to conduct no-fault post-attack analyses and improve systemic defenses, featuring mandatory information-gathering powers that distinguish it from the voluntary US model. This initiative aims to learn from major breaches and strengthen national cyber resilience.","briefOverview":"\u003cp\u003eAustralia has announced the creation of a Cyber Incident Review Board to conduct independent, no-fault analyses following major cyberattacks on government and industry. The board will prioritize identifying systemic lessons to strengthen national resilience rather than assigning individual or corporate blame. Minister Tony Burke appointed seven members to the board, which is majority female and chaired by Telstra’s global CISO, Narelle Devine. The initiative follows significant breaches at Medibank and Optus that pressured Canberra to harden its cyber defenses. Unlike the voluntary US Cyber Safety Review Board, Australia’s new board can legally compel information from uncooperative entities. The US board, which was disbanded by the Trump administration after producing reports on Microsoft and the Log4j vulnerability, faced criticism for its voluntary cooperation model. Meanwhile, the European Union has established a similar review mechanism under the Cyber Solidarity Act, though it has yet to exercise this function.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAustralia announced the establishment of a Cyber Incident Review Board to conduct independent, no-fault post-incident reviews of significant cyberattacks targeting government and industry.\u003c/p\u003e\n\n\u003cp\u003eThe board will focus on extracting systemic lessons to improve national resilience instead of determining individual or corporate culpability.\u003c/p\u003e\n\n\u003cp\u003eHome Affairs and Cybersecurity Minister Tony Burke announced seven appointments to the board, noting that the constant nature of cyber attacks guarantees continuous learning.\u003c/p\u003e\n\n\u003cp\u003eThe board is majority female and chaired by Narelle Devine, Telstra’s global chief information security officer.\u003c/p\u003e\n\n\u003cp\u003eOther members represent Boeing Australia, NBN Co, the University of New South Wales, law firm Allens, Toll Group, and SA Power Networks.\u003c/p\u003e\n\n\u003cp\u003eThis initiative responds to recent high-profile breaches at health insurer Medibank and telecommunications company Optus.\u003c/p\u003e\n\n\u003cp\u003eThe Australian model is based on the US Cyber Safety Review Board established by the Biden administration in 2022, but features a narrower membership drawn primarily from critical infrastructure sectors.\u003c/p\u003e\n\n\u003cp\u003eThe US board released three reports before the Trump administration disbanded it while it investigated the Salt Typhoon Chinese intelligence operation.\u003c/p\u003e\n\n\u003cp\u003eSeveral Democratic senators criticized the US board\u0026rsquo;s removal and called for its reinstatement.\u003c/p\u003e\n\n\u003cp\u003eThe US board’s most impactful report accused Microsoft of avoidable security failures that allowed Chinese hackers to access senior government emails, prompting CEO Satya Nadella to issue a company-wide directive prioritizing security.\u003c/p\u003e\n\n\u003cp\u003eEarlier US reviews into the Log4j vulnerability and the Lapsus$ hacker group had less influence.\u003c/p\u003e\n\n\u003cp\u003eFormer Biden cyber official Jeff Greene wrote in Lawfare that initial US reviews fell short by not focusing on specific company failures to drive accountability.\u003c/p\u003e\n\n\u003cp\u003eUnlike the US voluntary model, Australia’s board can compel information from entities that refuse to participate, adopting a recommendation from Greene.\u003c/p\u003e\n\n\u003cp\u003eHowever, the Australian government did not adopt Greene’s other suggestion to dynamically expand board composition for reviews requiring specialized knowledge.\u003c/p\u003e\n\n\u003cp\u003eThe European Union has also created a similar review function under the Cyber Solidarity Act, assigning it to ENISA, though this mechanism remains unexercised.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"article-summary-australia-launches-cyber-incident-review-board\"\u003eArticle Summary: Australia Launches Cyber Incident Review Board\u003c/h2\u003e\n\n\u003cp\u003eAustralia has formally established a Cyber Incident Review Board designed to conduct independent, no-fault analyses following major cyberattacks on government and industry. The board’s mandate centers on identifying systemic vulnerabilities and improving national resilience rather than assigning blame to specific individuals or corporations.\u003c/p\u003e\n\n\u003ch3 id=\"board-composition-and-leadership\"\u003eBoard Composition and Leadership\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eChair:\u003c/strong\u003e Narelle Devine, global chief information security officer at Telstra.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMembership:\u003c/strong\u003e Seven appointed members, forming a majority female leadership team, which is uncommon in senior cybersecurity roles.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRepresentations:\u003c/strong\u003e Members hail from Boeing Australia, NBN Co, the University of New South Wales, law firm Allens, Toll Group, and SA Power Networks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnnouncement:\u003c/strong\u003e Home Affairs and Cybersecurity Minister Tony Burke unveiled the appointments, emphasizing that the board ensures continuous learning from every attack to bolster defenses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"operational-mandate-and-powers\"\u003eOperational Mandate and Powers\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eScope:\u003c/strong\u003e Conducts post-incident reviews of significant cyberattacks targeting Australian government and critical infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApproach:\u003c/strong\u003e Focuses exclusively on systemic lessons and structural improvements, deliberately avoiding determinations of individual or corporate culpability.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuthority:\u003c/strong\u003e Unlike the voluntary cooperation model used by its US counterpart, Australia’s board possesses the legal power to compel information from entities that decline to participate.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLimitations:\u003c/strong\u003e The Australian framework does not adopt the recommendation to dynamically expand board composition for reviews requiring specialized technical knowledge.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"context-and-catalysts\"\u003eContext and Catalysts\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe board’s creation follows intense pressure on Canberra to strengthen cyber defenses after major breaches at health insurer Medibank and telecommunications provider Optus.\u003c/li\u003e\n\u003cli\u003eMinister Burke highlighted the constant nature of cyber threats, framing the board as a mechanism to guarantee ongoing resilience improvements.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"international-comparisons\"\u003eInternational Comparisons\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUnited States:\u003c/strong\u003e Modeled on the Biden administration’s 2022 Cyber Safety Review Board, though Australia’s membership is narrower and heavily drawn from critical infrastructure industries. The US board produced three reports before being disbanded by the Trump administration during an investigation into the Salt Typhoon Chinese intelligence operation. Democratic senators criticized the dissolution and advocated for reinstatement.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEuropean Union:\u003c/strong\u003e Established a similar review function under the Cyber Solidarity Act, tasking ENISA with conducting post-incident reviews of cross-border attacks. This mechanism remains unexercised to date.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"historical-precedent-and-impact\"\u003eHistorical Precedent and Impact\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe US board’s most consequential report accused Microsoft of a cascade of avoidable security errors that enabled Chinese state-linked hackers to compromise senior government email accounts. This finding prompted CEO Satya Nadella to issue a company-wide directive prioritizing security above all else.\u003c/li\u003e\n\u003cli\u003eEarlier US reviews into the Log4j vulnerability and the Lapsus$ hacker group had less measurable impact.\u003c/li\u003e\n\u003cli\u003eFormer Biden administration cyber official Jeff Greene wrote in Lawfare that the initial US reviews fell short by failing to attribute specific failures to single companies, which limited their ability to drive accountability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-divergences\"\u003eStrategic Divergences\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAustralia adopted Greene’s recommendation for mandatory information compulsion but rejected his suggestion for flexible, specialist-driven board expansion.\u003c/li\u003e\n\u003cli\u003eThe Australian model explicitly separates incident review from culpability assessment, whereas the US board’s approach directly tied security failures to corporate accountability and leadership changes.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Australia has established a Cyber Incident Review Board to conduct no-fault, post-incident reviews of major cyberattacks on government and industry.","The board will focus on identifying systemic lessons to improve national resilience rather than assigning individual or corporate culpability.","Unlike the voluntary US Cyber Safety Review Board, Australia's board has the authority to compel information from entities that decline to participate.","The initiative follows significant breaches at Medibank and Optus, prompting the government to strengthen the country's cyber defenses."],"insights":["Australia’s board can legally compel information from uncooperative entities, directly addressing the voluntary participation model that previously limited the US board’s accountability impact.","The US CSRB’s Microsoft report directly triggered a C-suite mandate to prioritize security above all else, showing that independent reviews can force executive-level cultural shifts.","Australia adopted the mandatory information-gathering recommendation from former US cyber official Jeff Greene but intentionally omitted his suggestion to dynamically expand board composition for specialist reviews.","The EU’s similar post-incident review mechanism under the Cyber Solidarity Act remains unexercised, highlighting Australia’s proactive leap in institutionalizing mandatory cyber incident accountability."],"referencedReports":[{"title":"DHS Cascade of Security Failures Microsoft China Hack Report","url":"https://therecord.media/dhs-cascade-of-security-failures-microsoft-china-hack","publisher":"U.S. Cyber Safety Review Board (DHS)","context":"Referenced as the board's most consequential report, which accused Microsoft of avoidable security errors that enabled Chinese state-linked hackers to access senior government email accounts."},{"title":"First Cyber Safety Review Board Report on Log4j Vulnerability","url":"https://therecord.media/first-cyber-safety-review-board-report-finds-log4j-has-become-an-endemic-vulnerability","publisher":"U.S. Cyber Safety Review Board","context":"Referenced as an early board review that identified the Log4j vulnerability as endemic within the industry."},{"title":"Lapsus$ Cyber Safety Review Board Report","url":"https://therecord.media/sim-swapping-lapsus-cyber-safety-review-board-report","publisher":"U.S. Cyber Safety Review Board","context":"Referenced as another early board review examining the activities and impact of the Lapsus$ hacker group."}],"body":"\u003cp\u003eAustralia has announced the creation of a Cyber Incident Review Board to conduct independent, no-fault analyses following major cyberattacks on government and industry. The board will prioritize identifying systemic lessons to strengthen national resilience rather than assigning individual or corporate blame. Minister Tony Burke appointed seven members to the board, which is majority female and chaired by Telstra’s global CISO, Narelle Devine. The initiative follows significant breaches at Medibank and Optus that pressured Canberra to harden its cyber defenses. Unlike the voluntary US Cyber Safety Review Board, Australia’s new board can legally compel information from uncooperative entities. The US board, which was disbanded by the Trump administration after producing reports on Microsoft and the Log4j vulnerability, faced criticism for its voluntary cooperation model. Meanwhile, the European Union has established a similar review mechanism under the Cyber Solidarity Act, though it has yet to exercise this function.\u003c/p\u003e\n"},{"n":5,"title":"Vimeo data breach exposes personal information of 119,000 people","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/vimeo-data-breach-exposes-personal-information-of-119-000-people/","time":"13:03","priority":"MAY READ","score":72,"group":null,"groupColor":null,"tldr":"The ShinyHunters extortion gang stole and leaked the personal data of approximately 119,200 Vimeo users after compromising the platform through a third-party vendor breach, though financial and login credentials remained secure.","briefOverview":"\u003cp\u003eThe ShinyHunters extortion gang compromised Vimeo\u0026rsquo;s systems in April by exploiting a breach at third-party vendor Anodot. According to Have I Been Pwned, the attack exposed the email addresses and names of 119,200 individuals. Vimeo disclosed the incident on April 27, noting that the accessed databases primarily contained technical data, video titles, metadata, and some customer emails.\u003c/p\u003e\n\n\u003cp\u003eThe company emphasized that user credentials, financial information, and actual video content remained secure. After failing to reach an extortion agreement, the group leaked a 106GB archive of the stolen documents on their dark web leak site. Vimeo promptly disabled the compromised Anodot credentials, severed the integration, and engaged security experts to assist with the investigation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe ShinyHunters cybercrime group successfully accessed Vimeo\u0026rsquo;s databases in April through a supply chain compromise involving the data anomaly detection company Anodot. Have I Been Pwned analyzed the stolen data and determined that the breach exposed the email addresses and, in some cases, the names of 119,200 people. Vimeo publicly disclosed the unauthorized access on April 27, clarifying that the compromised databases contained technical data, video titles, metadata, and limited customer email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe company explicitly stated that the attack did not disrupt its services, nor did it compromise valid user login credentials or payment card information. Upon detecting the intrusion, Vimeo immediately disabled all Anodot credentials, removed the vendor integration from its systems, and notified law enforcement. The extortion gang subsequently leaked a 106GB archive of the stolen documents on their dark web leak site after failing to secure a ransom agreement.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed the compromise was facilitated by stolen Anodot authentication tokens that granted access to Vimeo\u0026rsquo;s Snowflake and BigQuery instances. The group previously reported stealing data from dozens of other companies using similar Anodot tokens and noted that attempts to breach Salesforce instances were blocked by AI-based detection mechanisms. ShinyHunters is also known for conducting widespread vishing campaigns against employees and business process outsourcing agents to steal Microsoft Entra, Okta, and Google single sign-on accounts.\u003c/p\u003e\n\n\u003cp\u003eOnce corporate SSO accounts are compromised, the gang exfiltrates data from connected SaaS applications such as Salesforce, SAP, Slack, Adobe, Atlassian, Zendesk, Dropbox, Microsoft 365, and Google Workspace. In recent weeks, the group has claimed responsibility for data breaches at numerous major organizations, including the European Commission, Rockstar Games, McGraw Hill, Medtronic, Carnival, Zara, 7-Eleven, and Udemy.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview and Vendor Compromise\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters extortion gang executed a supply chain attack against Vimeo in April by leveraging compromised credentials from the data anomaly detection firm Anodot. Have I Been Pwned evaluated the exfiltrated data and confirmed that the breach compromised the email addresses and, in some instances, the names of 119,200 individuals.\u003c/p\u003e\n\n\u003cp\u003eVimeo officially disclosed the unauthorized access on April 27, specifying that the targeted databases held technical data, video titles, metadata, and a subset of customer email addresses. The company stressed that the incident caused no operational disruptions and did not expose valid user credentials or financial information.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Data Exfiltration\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eVimeo\u0026rsquo;s response included the immediate revocation of all Anodot credentials and the complete removal of the vendor integration from its infrastructure. The organization also retained third-party security experts to support the investigation and formally notified law enforcement agencies.\u003c/p\u003e\n\n\u003cp\u003eFollowing the disclosure, ShinyHunters published a 106GB archive of the stolen documents on their dark web leak site after extortion negotiations failed. The gang explicitly stated that the compromise was achieved through stolen Anodot authentication tokens that provided access to Vimeo\u0026rsquo;s Snowflake and BigQuery instances.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTactical Methodology and Broader Campaign\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eShinyHunters has a documented history of exploiting Anodot authentication tokens to access data across dozens of corporate environments. The group previously attempted to breach Salesforce instances but reported being blocked by AI-based detection mechanisms.\u003c/p\u003e\n\n\u003cp\u003eBeyond supply chain attacks, ShinyHunters conducts extensive vishing campaigns targeting employees and business process outsourcing agents. These campaigns aim to steal single sign-on credentials from Microsoft Entra, Okta, and Google platforms.\u003c/p\u003e\n\n\u003cp\u003eOnce SSO accounts are compromised, the threat actors systematically exfiltrate data from connected SaaS ecosystems, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSalesforce\u003c/li\u003e\n\u003cli\u003eSAP\u003c/li\u003e\n\u003cli\u003eSlack\u003c/li\u003e\n\u003cli\u003eAdobe\u003c/li\u003e\n\u003cli\u003eAtlassian\u003c/li\u003e\n\u003cli\u003eZendesk\u003c/li\u003e\n\u003cli\u003eDropbox\u003c/li\u003e\n\u003cli\u003eMicrosoft 365\u003c/li\u003e\n\u003cli\u003eGoogle Workspace\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRelated Breaches and Industry Impact\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe group has recently claimed responsibility for a wide array of high-profile data breaches across multiple sectors. Recent claims include unauthorized access to systems at the European Commission, Rockstar Games, and edtech giant McGraw Hill.\u003c/p\u003e\n\n\u003cp\u003eAdditional targeted organizations include medical device manufacturer Medtronic, cruise operator Carnival, fashion retailer Zara, convenience chain 7-Eleven, and online training platform Udemy. This pattern demonstrates ShinyHunters\u0026rsquo; reliance on credential theft and SaaS integration vulnerabilities to maximize data exfiltration at scale.\u003c/p\u003e\n","keyPoints":["The ShinyHunters extortion gang accessed Vimeo's databases through a compromise at third-party vendor Anodot, exposing the email addresses and names of 119,200 individuals.","Vimeo confirmed that the breach only exposed technical data, video metadata, and some customer emails, while user credentials and financial information remained secure.","After failing to reach an extortion agreement, the group leaked a 106GB archive of the stolen documents on their dark web leak site.","ShinyHunters routinely targets corporate SSO accounts to steal data from connected SaaS applications and has recently claimed responsibility for breaches at companies such as Rockstar Games and Medtronic."],"insights":["ShinyHunters accessed Vimeo's Snowflake and BigQuery instances via compromised Anodot authentication tokens.","ShinyHunters leverages compromised SSO credentials obtained through vishing campaigns to access a broad ecosystem of connected SaaS applications, including Salesforce, SAP, and Microsoft 365.","The data exposure was restricted to technical metadata and email addresses, confirming that valid user credentials and financial data remained secure and were not part of the exfiltrated archive."],"referencedReports":[],"body":"\u003cp\u003eThe ShinyHunters extortion gang compromised Vimeo\u0026rsquo;s systems in April by exploiting a breach at third-party vendor Anodot. According to Have I Been Pwned, the attack exposed the email addresses and names of 119,200 individuals. Vimeo disclosed the incident on April 27, noting that the accessed databases primarily contained technical data, video titles, metadata, and some customer emails.\u003c/p\u003e\n\n\u003cp\u003eThe company emphasized that user credentials, financial information, and actual video content remained secure. After failing to reach an extortion agreement, the group leaked a 106GB archive of the stolen documents on their dark web leak site. Vimeo promptly disabled the compromised Anodot credentials, severed the integration, and engaged security experts to assist with the investigation.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
