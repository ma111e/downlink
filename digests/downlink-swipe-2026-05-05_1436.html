<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":9,"title":"MetInfo CMS CVE-2026-29014 Exploited for Remote Code Execution Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/metinfo-cms-cve-2026-29014-exploited.html","time":"11:56","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Threat actors are actively exploiting a critical unauthenticated remote code execution vulnerability in MetInfo CMS to execute arbitrary PHP code, making immediate patching mandatory for all affected installations.","briefOverview":"\u003cp\u003eThreat actors are actively exploiting a critical security flaw in the open-source MetInfo CMS, identified as CVE-2026-29014. This unauthenticated vulnerability carries a CVSS score of 9.8 and allows remote attackers to execute arbitrary PHP code. The flaw stems from insufficient input sanitization in the WeChat API request handling process.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Egidio Romano originally discovered the issue and documented it in a technical advisory. Patches were released by the vendor on April 7, 2026, but exploitation began shortly after on April 25. Activity surged on May 1, 2026, with attackers primarily targeting IP addresses in China and Hong Kong.\u003c/p\u003e\n\n\u003cp\u003eApproximately 2,000 instances of the vulnerable CMS are currently accessible online, with the majority located in China. Immediate patching is required to prevent arbitrary code execution and full server compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAccording to new findings from VulnCheck, threat actors are actively exploiting a critical vulnerability in the open-source MetInfo CMS. The flaw, designated CVE-2026-29014, holds a CVSS score of 9.8 and represents an unauthenticated PHP code injection vulnerability. The NIST National Vulnerability Database states that versions 7.9, 8.0, and 8.1 of the CMS allow remote attackers to execute arbitrary code through crafted requests.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Egidio Romano identified the root cause within the /app/system/weixin/include/class/weixinreply.class.php script. The vulnerability arises from inadequate sanitization of user-supplied input during WeChat API requests. Successful exploitation on non-Windows servers requires the prior existence of the /cache/weixin/ directory, which is typically created when installing the official WeChat plugin.\u003c/p\u003e\n\n\u003cp\u003eMetInfo released patches for this flaw on April 7, 2026. Exploitation activity commenced on April 25, 2026, with a small number of automated probes targeting honeypots in the United States and Singapore. The campaign intensified significantly on May 1, 2026, shifting its focus toward China and Hong Kong IP addresses.\u003c/p\u003e\n\n\u003cp\u003eCaitlin Condon, vice president of security research at VulnCheck, confirmed the geographic and temporal patterns of the attacks. Current assessments indicate that approximately 2,000 instances of the vulnerable CMS are accessible online. The vast majority of these exposed instances are hosted in China. Attackers can leverage insufficient input neutralization to achieve remote code execution and gain complete control over affected servers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eThreat actors are actively exploiting a critical security flaw impacting the open-source MetInfo CMS. The vulnerability is officially designated as CVE-2026-29014 and carries a CVSS score of 9.8. It is classified as an unauthenticated PHP code injection flaw that enables arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eThe NIST National Vulnerability Database describes the issue as allowing remote attackers to execute arbitrary code by sending crafted requests containing malicious PHP payloads. The NVD further notes that attackers can exploit insufficient input neutralization in the execution path to achieve full server control.\u003c/p\u003e\n\n\u003ch3 id=\"root-cause-and-technical-details\"\u003eRoot Cause and Technical Details\u003c/h3\u003e\n\n\u003cp\u003eSecurity researcher Egidio Romano discovered the vulnerability and documented it in a technical advisory. The flaw originates in the \u003ccode\u003e/app/system/weixin/include/class/weixinreply.class.php\u003c/code\u003e script. The root cause is a lack of adequate sanitization when processing user-supplied input for WeChat API requests.\u003c/p\u003e\n\n\u003cp\u003eExploitation conditions vary by operating system. On non-Windows servers, successful exploitation requires the \u003ccode\u003e/cache/weixin/\u003c/code\u003e directory to exist beforehand. This directory is automatically created during the installation and configuration of the official WeChat plugin.\u003c/p\u003e\n\n\u003ch3 id=\"patching-and-exploitation-timeline\"\u003ePatching and Exploitation Timeline\u003c/h3\u003e\n\n\u003cp\u003eMetInfo released official patches for CVE-2026-29014 on April 7, 2026. Despite the early patch release, exploitation activity began on April 25, 2026. Initial campaigns involved a small number of automated exploits deployed against honeypots located in the United States and Singapore.\u003c/p\u003e\n\n\u003cp\u003eActivity experienced a significant surge on May 1, 2026. According to Caitlin Condon, vice president of security research at VulnCheck, the intensified campaign focused heavily on China and Hong Kong IP addresses. The shift indicates a targeted escalation against specific geographic regions.\u003c/p\u003e\n\n\u003ch3 id=\"affected-scope-and-recommendations\"\u003eAffected Scope and Recommendations\u003c/h3\u003e\n\n\u003cp\u003eCurrent intelligence indicates that approximately 2,000 instances of the vulnerable MetInfo CMS are accessible online. The vast majority of these exposed instances are hosted within China. Organizations running versions 7.9, 8.0, or 8.1 must apply the vendor patches immediately.\u003c/p\u003e\n\n\u003cp\u003eKey technical prerequisites for exploitation include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe \u003ccode\u003e/cache/weixin/\u003c/code\u003e directory must pre-exist on non-Windows servers.\u003c/li\u003e\n\u003cli\u003eThe official WeChat plugin must be installed and configured to generate the required directory.\u003c/li\u003e\n\u003cli\u003eAttackers must send crafted requests with malicious PHP code to bypass input neutralization.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CVE-2026-29014 is a critical unauthenticated PHP code injection vulnerability in MetInfo CMS versions 7.9 through 8.1 that enables arbitrary code execution.","The flaw originates from inadequate sanitization of user-supplied input in the WeChat API request handling script.","Exploitation on non-Windows servers requires the pre-existing /cache/weixin/ directory, which is generated during the official WeChat plugin installation.","Threat actors began exploiting the vulnerability on April 25, 2026, with activity surging on May 1 to target servers primarily in China and Hong Kong.","Approximately 2,000 instances of the vulnerable CMS are accessible online, with most located in China."],"insights":["Exploitation on non-Windows servers is contingent upon the existence of the /cache/weixin/ directory, indicating the vulnerability is restricted to installations that have configured the official WeChat plugin.","Threat actors shifted their operational focus on May 1, 2026, targeting China and Hong Kong IP addresses after initial sparse probing in the U.S. and Singapore.","Approximately 2,000 instances of the vulnerable CMS are accessible online, with the majority located in China, defining the primary scope of exposure."],"referencedReports":[{"title":"KIS-2026-06","url":"https://karmainsecurity.com/KIS-2026-06","publisher":"Karma Intelligence Security","context":"The article cites this advisory as the source where security researcher Egidio Romano discovered and documented the CVE-2026-29014 vulnerability."}],"body":"\u003cp\u003eThreat actors are actively exploiting a critical security flaw in the open-source MetInfo CMS, identified as CVE-2026-29014. This unauthenticated vulnerability carries a CVSS score of 9.8 and allows remote attackers to execute arbitrary PHP code. The flaw stems from insufficient input sanitization in the WeChat API request handling process.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Egidio Romano originally discovered the issue and documented it in a technical advisory. Patches were released by the vendor on April 7, 2026, but exploitation began shortly after on April 25. Activity surged on May 1, 2026, with attackers primarily targeting IP addresses in China and Hong Kong.\u003c/p\u003e\n\n\u003cp\u003eApproximately 2,000 instances of the vulnerable CMS are currently accessible online, with the majority located in China. Immediate patching is required to prevent arbitrary code execution and full server compromise.\u003c/p\u003e\n"},{"n":3,"title":"CloudZ RAT potentially steals OTP messages using Pheno plugin","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/cloudz-pheno-infostealer/","time":"10:00","priority":"SHOULD READ","score":88,"group":"H","groupColor":"#60a5fa","tldr":"Cisco Talos discovered that the CloudZ RAT uses a custom Pheno plugin to abuse the Windows Phone Link application, allowing attackers to intercept and steal sensitive mobile data like SMS and one-time passwords without deploying malware on the victim's phone.","briefOverview":"\u003cp\u003eCisco Talos discovered an intrusion active since at least January 2026 involving the CloudZ remote access tool and a custom plugin called Pheno. The attacker used these tools to steal credentials and intercept one-time passwords by abusing the Windows Phone Link application. Instead of deploying malware directly on the victim\u0026rsquo;s phone, the malware hijacks the PC-to-phone bridge to access synchronized SMS and notification data stored in a local SQLite database.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain begins with a Rust-compiled dropper disguised as a system update, which drops a .NET loader. This loader executes the modular CloudZ RAT while employing multiple evasion techniques, including timing checks, debugger detection, and virtual machine identification. Persistence is maintained through a scheduled task that leverages the legitimate regasm.exe utility to run the payload at startup.\u003c/p\u003e\n\n\u003cp\u003eThe Pheno plugin continuously monitors for active Phone Link processes and logs reconnaissance data to staging folders for exfiltration. CloudZ communicates with its command-and-control server using encrypted TCP sockets and rotates user-agent strings to blend in with legitimate traffic. The malware dynamically generates functions in memory and avoids sandbox analysis to ensure successful operation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos identified a sustained intrusion dating back to January 2026 that utilizes the CloudZ remote access tool alongside a previously undocumented plugin named Pheno. The primary objective of this campaign is to harvest victim credentials and capture one-time passwords through the abuse of the Windows Phone Link synchronization application. By exploiting the secure Wi-Fi and Bluetooth bridge between a PC and a mobile device, the malware intercepts sensitive data like SMS messages and authenticator notifications without requiring direct phone compromise.\u003c/p\u003e\n\n\u003cp\u003eThe initial access vector involved a fake ScreenConnect update executable that dropped a Rust-compiled loader disguised as systemupdates.exe. This loader decrypted and deployed an intermediate .NET binary, which subsequently executed the modular CloudZ RAT payload. The .NET loader incorporates robust evasion mechanisms, including sleep timing analysis, process enumeration against security tools like Wireshark and Procmon, and hardware checks for virtual machine indicators.\u003c/p\u003e\n\n\u003cp\u003eOnce executed, CloudZ decrypts its configuration data in memory and establishes an encrypted TCP connection to a command-and-control server. The RAT rotates between three hardcoded user-agent strings and sends anti-caching headers to prevent proxy interception. Command execution relies on Base64-encoded identifiers that trigger functions such as browser data exfiltration, shell execution, and plugin management.\u003c/p\u003e\n\n\u003cp\u003eThe attacker deployed the Pheno plugin to scan for active Phone Link processes, logging process IDs and file paths to staging directories. A secondary check scans these logs for the keyword proxy to confirm an active relay channel between the computer and paired device. The malware establishes persistence by creating a scheduled task named SystemWindowsApis that triggers at startup and executes the .NET loader using the legitimate regasm.exe utility.\u003c/p\u003e\n\n\u003cp\u003eCloudZ also supports a three-method fallback for downloading plugins, cycling through curl, PowerShell Invoke-WebRequest, and the bitsadmin LOLBin. All reconnaissance data and intercepted mobile notifications are staged locally before being transmitted to the attacker-controlled infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eInfection Chain and Initial Access\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos discovered an intrusion active since at least January 2026 initiated by an unknown initial access vector.\u003c/li\u003e\n\u003cli\u003eThe attack began with a fake ScreenConnect application update executable that dropped a Rust-compiled 64-bit loader.\u003c/li\u003e\n\u003cli\u003eThis dropper was disguised with filenames such as systemupdates.exe or Windows-interactive-update.exe and compiled on January 1, 2026.\u003c/li\u003e\n\u003cli\u003eUpon execution, the Rust loader decrypted and dropped an embedded .NET loader binary disguised as a text file named update.txt or msupdate.txt.\u003c/li\u003e\n\u003cli\u003eThe .NET loader was also observed being downloaded from an attacker-controlled staging server using a curl command targeting a Cloudflare Workers domain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eEvasion and Persistence Mechanisms\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe .NET loader executes multiple detection evasion checks before running the main payload.\u003c/li\u003e\n\u003cli\u003eIt performs timing-based evasion by calculating the actual elapsed time of a sleep command to detect analysis environments.\u003c/li\u003e\n\u003cli\u003eThe loader enumerates running processes against a list of security tools, including Wireshark, Fiddler, Procmon, and Sysmon, and exits if any are detected.\u003c/li\u003e\n\u003cli\u003eHardware and environment checks verify for virtual machine indicators by looking for at least two processor cores and searching for strings like VIRTUAL or SANDBOX in system paths and usernames.\u003c/li\u003e\n\u003cli\u003ePersistence is established through a PowerShell script that creates a scheduled task named SystemWindowsApis in the Microsoft Windows folder.\u003c/li\u003e\n\u003cli\u003eThe task is configured to trigger at system startup under the SYSTEM account with the highest privilege level.\u003c/li\u003e\n\u003cli\u003eIt utilizes the living-off-the-land binary regasm.exe to execute the dropped .NET loader and immediately triggers the task using schtasks /run.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCloudZ RAT Capabilities and Command Structure\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloudZ is a modular .NET executable compiled on January 13, 2026 and obfuscated with ConfuserEx.\u003c/li\u003e\n\u003cli\u003eThe RAT dynamically generates executable functions during execution using the System.Reflection.Emit.DynamicMethod and ILGenerator methods.\u003c/li\u003e\n\u003cli\u003eIt queries the _ENABLE_PROFILING environment variable to detect attached .NET profilers or debuggers.\u003c/li\u003e\n\u003cli\u003eConfiguration data is decrypted in memory and includes C2 commands, PowerShell scripts, staging folder paths, HTTP headers, and staging server URLs.\u003c/li\u003e\n\u003cli\u003eThe RAT decodes Base64 strings to retrieve secondary configuration data from staging servers or Pastebin URLs.\u003c/li\u003e\n\u003cli\u003eCommand identifiers are Base64-encoded and match against received C2 commands to execute specific functions.\u003c/li\u003e\n\u003cli\u003eKey commands include heartbeat checks, OS information collection, shell execution, browser data exfiltration, screen recording, and plugin management.\u003c/li\u003e\n\u003cli\u003eThe RAT rotates between three hardcoded user-agent strings and sends anti-caching HTTP headers to avoid proxy caching.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003ePheno Plugin and Phone Link Abuse\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker downloads and implants the Pheno plugin using a three-method fallback approach involving curl, PowerShell Invoke-WebRequest, and the bitsadmin LOLBin.\u003c/li\u003e\n\u003cli\u003ePheno is designed to monitor active PC-to-phone bridges established by the Microsoft Phone Link application.\u003c/li\u003e\n\u003cli\u003eThe plugin scans running processes for keywords such as YourPhone, PhoneExperienceHost, or Link to Windows.\u003c/li\u003e\n\u003cli\u003eMatched process IDs and file paths are logged to output files named phonelink-\u003cCOMPUTERNAME\u003e.txt in staging folders like C:\\programdata\\Microsoft\\feedback\\cm.\u003c/li\u003e\n\u003cli\u003eA secondary check reads these files for the keyword proxy to confirm an active relay channel between the PC and mobile device.\u003c/li\u003e\n\u003cli\u003eWhen an active session is confirmed, the plugin writes Maybe connected to the output file.\u003c/li\u003e\n\u003cli\u003eThis allows the CloudZ RAT to intercept the Phone Link application\u0026rsquo;s SQLite database file, potentially compromising SMS-based OTP messages and authenticator notifications.\u003c/li\u003e\n\u003cli\u003eReconnaissance data is read from the staging folder and exfiltrated to the command-and-control server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Indicators and Detection\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe malware avoids deploying code directly on the mobile device and instead relies on local PC data synchronization.\u003c/li\u003e\n\u003cli\u003eCisco Talos provided ClamAV signatures and Snort rules to detect and block this threat.\u003c/li\u003e\n\u003cli\u003eAdditional indicators of compromise are available in a public GitHub repository containing detailed telemetry data.\u003c/li\u003e\n\u003cli\u003eThe attacker utilized specific Pastebin handler names like HELLOHIALL to host secondary configuration data across multiple URLs.\u003c/li\u003e\n\u003cli\u003eCommand-and-control communications are established via encrypted TCP sockets to an IP address and port 8089.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cisco Talos discovered that the CloudZ RAT uses a custom Pheno plugin to hijack the Windows Phone Link application and intercept sensitive mobile data such as SMS and one-time passwords.","The infection chain begins with a Rust-compiled dropper that drops a .NET loader, which subsequently executes the modular CloudZ RAT payload.","The malware evades analysis by executing critical functions dynamically in memory, performing timing-based checks, and scanning for security tools or virtual machine indicators.","Persistence is established through a scheduled task named SystemWindowsApis that utilizes the legitimate regasm.exe utility to run the dropped .NET loader at startup.","The Pheno plugin continuously scans for active Phone Link processes, logs reconnaissance data to staging folders, and enables the attacker to exfiltrate synchronized mobile notifications to the command-and-control server."],"insights":["CloudZ dynamically generates executable functions at runtime using System.Reflection.Emit.DynamicMethod and ILGenerator, while simultaneously checking the _ENABLE_PROFILING environment variable to evade debugger attachment.","The attacker distributes secondary configuration data through a Pastebin account using the specific handler name HELLOHIALL, providing a distinct infrastructure tracking pattern.","The Pheno plugin determines active Phone Link sessions by scanning its own previously written output files for the keyword proxy, creating a self-referential behavioral trigger for session detection.","The malware implements a three-tier fallback download mechanism for plugins, sequentially attempting curl, PowerShell Invoke-WebRequest, and the LOLBin bitsadmin to ensure payload delivery across diverse environments."],"referencedReports":[],"body":"\u003cp\u003eCisco Talos discovered an intrusion active since at least January 2026 involving the CloudZ remote access tool and a custom plugin called Pheno. The attacker used these tools to steal credentials and intercept one-time passwords by abusing the Windows Phone Link application. Instead of deploying malware directly on the victim\u0026rsquo;s phone, the malware hijacks the PC-to-phone bridge to access synchronized SMS and notification data stored in a local SQLite database.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain begins with a Rust-compiled dropper disguised as a system update, which drops a .NET loader. This loader executes the modular CloudZ RAT while employing multiple evasion techniques, including timing checks, debugger detection, and virtual machine identification. Persistence is maintained through a scheduled task that leverages the legitimate regasm.exe utility to run the payload at startup.\u003c/p\u003e\n\n\u003cp\u003eThe Pheno plugin continuously monitors for active Phone Link processes and logs reconnaissance data to staging folders for exfiltration. CloudZ communicates with its command-and-control server using encrypted TCP sockets and rotates user-agent strings to blend in with legitimate traffic. The malware dynamically generates functions in memory and avoids sandbox analysis to ensure successful operation.\u003c/p\u003e\n"},{"n":7,"title":"CloudZ malware abuses Microsoft Phone Link to steal SMS and OTPs","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/cloudz-malware-abuses-microsoft-phone-link-to-steal-sms-and-otps/","time":"10:03","priority":"SHOULD READ","score":88,"group":"H","groupColor":"#60a5fa","tldr":"The CloudZ malware's new Pheno plugin hijacks Microsoft Phone Link to steal SMS messages and one-time passwords directly from Windows machines without compromising the victim's mobile device. Security researchers recommend avoiding SMS-based OTPs and switching to phishing-resistant authentication methods to mitigate this threat.","briefOverview":"\u003cp\u003eA new version of the CloudZ remote access tool is deploying a previously unseen malicious plugin called Pheno. This component hijacks the Microsoft Phone Link application installed on Windows 10 and 11. By monitoring active Phone Link sessions, Pheno accesses the local SQLite database to steal SMS messages and one-time passwords.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos researchers identified the campaign, noting that the threat actor has been active since at least January. The infection begins when a user runs a fake ScreenConnect update that drops a Rust-based loader. This loader deploys a .NET loader that installs the CloudZ RAT and establishes persistence through a scheduled task.\u003c/p\u003e\n\n\u003cp\u003eThe .NET loader includes anti-analysis checks to evade sandboxes and security tools. To defend against this threat, researchers recommend avoiding SMS-based OTPs and switching to phishing-resistant hardware keys. Cisco Talos has published indicators of compromise to help defenders protect their environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new variant of the CloudZ remote access tool is deploying an unseen malicious plugin named Pheno. This plugin hijacks the Microsoft Phone Link application installed on Windows 10 and 11 to intercept sensitive data. By monitoring active Phone Link sessions, Pheno accesses the local SQLite database to steal SMS messages and one-time passwords.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos researchers identified this campaign, noting that the threat actor has been active since at least January. The primary objective appears to be credential theft and the capture of temporary passcodes. The infection begins when a victim executes a fake ScreenConnect update. This action drops a Rust-based loader that subsequently deploys a .NET loader.\u003c/p\u003e\n\n\u003cp\u003eThe .NET loader installs the CloudZ RAT and establishes persistence via a scheduled task. The loader also implements anti-analysis techniques, including time-based sandbox evasion. It actively checks for analysis tools like Wireshark, Fiddler, Procmon, and Sysmon. Additionally, it scans for virtual machine and sandbox-related strings.\u003c/p\u003e\n\n\u003cp\u003eOnce active, CloudZ can perform file management operations, execute shell commands, and start screen recordings. The malware rotates between three hardcoded user-agent strings to mimic legitimate browser traffic. Each HTTP request includes anti-caching headers to prevent proxies and CDNs from caching command-and-control details.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos has released indicators of compromise to assist defenders. Security researchers advise against using SMS-based OTP services. Instead, they recommend authenticator apps that avoid push notifications or upgrading to phishing-resistant hardware keys.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"threat-overview\"\u003eThreat Overview\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eA new version of the CloudZ remote access tool is deploying a previously unseen malicious plugin called Pheno. This component hijacks the Microsoft Phone Link application, which comes preinstalled on Windows 10 and 11. The plugin monitors for active Phone Link sessions and directly accesses the application\u0026rsquo;s local SQLite database.\u003c/li\u003e\n\u003cli\u003eThis architecture allows the threat actor to steal SMS messages and one-time passwords without ever compromising the victim\u0026rsquo;s mobile device. Cisco Talos researchers discovered the campaign, which has been active since at least January. The threat actor\u0026rsquo;s primary objective appears to be credential theft and the capture of temporary passcodes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"infection-chain-persistence\"\u003eInfection Chain \u0026amp; Persistence\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe initial access vector remains unidentified, but the infection starts when a victim executes a fake ScreenConnect update. This malicious file drops a Rust-based loader that subsequently deploys a .NET loader. The .NET loader installs the CloudZ RAT and establishes persistence by creating a scheduled task.\u003c/li\u003e\n\u003cli\u003eThe loader also implements anti-analysis checks to evade detection environments. These checks include time-based sandbox evasion steps and explicit scans for analysis tools like Wireshark, Fiddler, Procmon, and Sysmon. The loader also searches for virtual machine and sandbox-related strings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"malware-capabilities-network-evasion\"\u003eMalware Capabilities \u0026amp; Network Evasion\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eBeyond the Pheno plugin, CloudZ can target data stored in web browsers and profile host systems. The RAT supports file management operations, including deleting, downloading, and writing files. It can also execute shell commands, start screen recordings, and manage its own plugins by loading, removing, or saving them to disk.\u003c/li\u003e\n\u003cli\u003eThe malware includes a command to terminate its own process. To mask its network activity, CloudZ rotates between three hardcoded user-agent strings to make HTTP traffic appear as legitimate browser requests. Each HTTP request includes anti-caching headers to prevent proxies and content delivery networks from caching command-and-control or staging server details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"defensive-recommendations-indicators\"\u003eDefensive Recommendations \u0026amp; Indicators\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos has published a set of indicators of compromise to help defenders protect their environments. These indicators include URLs, hashes for malicious components, domains, and IP addresses. Security researchers strongly advise against using SMS-based OTP services.\u003c/li\u003e\n\u003cli\u003eInstead, they recommend switching to authenticator apps that do not require push notifications, which could be intercepted by this method. For highly sensitive information, organizations should adopt phishing-resistant solutions such as hardware keys.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The CloudZ remote access tool now includes a new plugin called Pheno that hijacks Microsoft Phone Link to steal SMS messages and one-time passwords from Windows machines.","Pheno intercepts sensitive data by monitoring active Phone Link sessions and accessing the application's local SQLite database without requiring compromise of the victim's mobile device.","The infection chain begins with a fake ScreenConnect update that drops a Rust-based loader, which subsequently deploys a .NET loader to install the CloudZ RAT and establish persistence through a scheduled task.","The .NET loader employs anti-analysis techniques to evade detection, including time-based sandbox evasion and checks for virtual machines and security analysis tools.","Researchers recommend avoiding SMS-based OTP services and instead using authenticator apps or phishing-resistant hardware keys to protect against this type of credential theft."],"insights":["Pheno steals OTPs by directly accessing the Phone Link SQLite database on Windows, allowing credential theft without ever compromising the victim's mobile device.","CloudZ attaches anti-caching headers to every HTTP request to prevent proxies and CDNs from caching C2 or staging server details, complicating network-level blocking.","The .NET loader implements granular anti-analysis checks, including time-based sandbox evasion and explicit detection of monitoring tools like Wireshark, Fiddler, Procmon, and Sysmon.","Defense guidance explicitly recommends abandoning SMS-based OTPs in favor of authenticator apps that avoid push notifications or upgrading to phishing-resistant hardware keys to directly counter this interception method."],"referencedReports":[{"title":"CloudZ Pheno Infostealer Report","url":"https://blog.talosintelligence.com/cloudz-pheno-infostealer/","publisher":"Cisco Talos","context":"The article cites this Cisco Talos report to explain how the Pheno plugin monitors active Phone Link sessions and accesses the local SQLite database to intercept SMS and OTP messages."}],"body":"\u003cp\u003eA new version of the CloudZ remote access tool is deploying a previously unseen malicious plugin called Pheno. This component hijacks the Microsoft Phone Link application installed on Windows 10 and 11. By monitoring active Phone Link sessions, Pheno accesses the local SQLite database to steal SMS messages and one-time passwords.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos researchers identified the campaign, noting that the threat actor has been active since at least January. The infection begins when a user runs a fake ScreenConnect update that drops a Rust-based loader. This loader deploys a .NET loader that installs the CloudZ RAT and establishes persistence through a scheduled task.\u003c/p\u003e\n\n\u003cp\u003eThe .NET loader includes anti-analysis checks to evade sandboxes and security tools. To defend against this threat, researchers recommend avoiding SMS-based OTPs and switching to phishing-resistant hardware keys. Cisco Talos has published indicators of compromise to help defenders protect their environments.\u003c/p\u003e\n"},{"n":8,"title":"We Scanned 1 Million Exposed AI Services. Here's How Bad the Security Actually Is","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/we-scanned-1-million-exposed-ai.html","time":"10:30","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Rushed AI adoption has left millions of services exposed, unauthenticated, and configured with insecure defaults, creating a massive attack surface that organizations must immediately audit and harden.","briefOverview":"\u003cp\u003eThe Intruder team scanned over one million exposed AI services and found that rapid adoption has severely compromised security across the sector. Many deployments ship with authentication disabled by default, leaving user conversations, API keys, and system controls openly accessible to anyone on the internet. Exposed chatbots frequently reveal sensitive enterprise data and allow malicious actors to bypass safety guardrails without fear of repercussions. Agent management platforms like Flowise and n8n were discovered with their business logic, credential lists, and dangerous local functions fully exposed.\u003c/p\u003e\n\n\u003cp\u003eOver ninety instances across government, marketing, and finance sectors were found to be completely open to unauthorized modification and data exfiltration. Testing of more than five thousand Ollama APIs revealed that thirty-one percent responded to prompts without authentication, often providing access to wrapped paid frontier models. Lab analysis confirmed that these systems suffer from insecure defaults, hardcoded credentials, applications running as root, and weak sandboxing. Ultimately, the pressure to ship AI features quickly has caused vendors to abandon decades of security best practices, leaving organizations vulnerable to immediate compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe software industry has made significant strides in secure development, but the rapid pace of AI adoption is actively undermining that progress. Driven by the promise of AI as a force multiplier and intense market pressure, businesses are hastily deploying self-hosted LLM infrastructure without adequate security measures. To investigate the resulting attack surface, the Intruder team utilized certificate transparency logs to identify and scan over one million exposed services. The findings revealed that AI infrastructure is significantly more vulnerable, exposed, and misconfigured than any other software category previously investigated.\u003c/p\u003e\n\n\u003cp\u003eA primary concern was the widespread lack of default authentication, which left real user data and company tooling completely open to unauthorized access. Many chatbot instances exposed full conversation histories, while others allowed unrestricted access to multimodal models that could be jailbroken for malicious purposes. Some deployments even disclosed plaintext API keys and sensitive personal conversations. Beyond chatbots, agent management platforms such as n8n and Flowise were found exposed without authentication.\u003c/p\u003e\n\n\u003cp\u003eOne Flowise instance revealed an entire business logic structure, credential lists, and dangerous local functions capable of server-side code execution. Researchers identified over ninety exposed instances across government, marketing, and finance, all of which allowed attackers to modify workflows, redirect traffic, or poison responses. Testing of more than five thousand Ollama APIs showed that thirty-one percent responded to prompts without authentication, often providing access to wrapped paid frontier models. While Ollama does not store conversation data, the exposed compute resources and model access present significant abuse risks.\u003c/p\u003e\n\n\u003cp\u003eLab analysis confirmed that these applications consistently exhibit insecure design patterns, including misconfigured Docker setups, hardcoded credentials, and applications running as root. Fresh installs frequently drop users into high-privilege accounts with full management access, and new technical vulnerabilities like arbitrary code execution were discovered within days of testing. Weak sandboxing and the absence of network segmentation further amplify the potential blast radius of these misconfigurations. The article concludes that vendors have largely abandoned established security best practices in favor of rapid deployment, urging organizations to proactively scan for external misconfigurations before attackers exploit them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"introduction-and-research-methodology\"\u003eIntroduction and Research Methodology\u003c/h3\u003e\n\n\u003cp\u003eThe article highlights how the rapid adoption of AI infrastructure is outpacing established security practices, creating a massive and vulnerable attack surface. To quantify this risk, the Intruder team leveraged certificate transparency logs to identify approximately two million hosts, ultimately scanning over one million exposed AI services. The investigation concluded that AI infrastructure is significantly more vulnerable, exposed, and misconfigured than any other software category previously analyzed by the team.\u003c/p\u003e\n\n\u003ch3 id=\"lack-of-default-authentication-and-exposed-chatbots\"\u003eLack of Default Authentication and Exposed Chatbots\u003c/h3\u003e\n\n\u003cp\u003eA pervasive finding across the scan was the absence of authentication on fresh deployments. Many projects ship with security disabled by default, leaving enterprise data and system controls openly accessible to anyone on the internet. The research identified several critical exposure scenarios:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eConversation History Leakage:\u003c/strong\u003e Instances based on OpenUI exposed complete LLM conversation histories, which can reveal sensitive enterprise information.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnrestricted Model Access:\u003c/strong\u003e Generic chatbots hosted multimodal LLMs freely, allowing malicious actors to jailbreak safety guardrails for illegal or harmful content generation without detection.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePlaintext Credential Disclosure:\u003c/strong\u003e Some deployments exposed large volumes of personal conversations alongside plaintext API keys embedded in the software.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThird-Party Abuse Vectors:\u003c/strong\u003e The article references real-world cases where users abuse exposed company chatbots to access premium models without payment or account logging.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"agent-management-platform-vulnerabilities\"\u003eAgent Management Platform Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eThe scan also uncovered exposed agent management platforms, specifically n8n and Flowise, which were deployed internally but accessible from the public internet without authentication. These platforms present unique risks due to their integration capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBusiness Logic and Credential Exposure:\u003c/strong\u003e One Flowise instance fully exposed its chatbot business logic and stored credential lists, enabling attackers to leverage connected tools for data exfiltration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDangerous Function Execution:\u003c/strong\u003e Configurations revealed internet parsing tools and local functions capable of file writes and code interpretation, making server-side code execution highly probable.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-Sector Impact:\u003c/strong\u003e Researchers identified over ninety exposed instances across government, marketing, and finance sectors. Attackers could easily modify workflows, redirect traffic, expose user data, or poison AI responses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ollama-api-exposure-and-model-wrapping\"\u003eOllama API Exposure and Model Wrapping\u003c/h3\u003e\n\n\u003cp\u003eTesting focused heavily on Ollama APIs, querying more than five thousand servers that listed connected models. Thirty-one percent of these servers responded to a simple prompt without requiring authentication. While Ollama does not store conversation messages directly, the responses revealed diverse use cases ranging from health assistance to cloud infrastructure management. Critically, many instances were wrapping paid frontier models from providers like Anthropic, Deepseek, Moonshot, Google, and OpenAI. In total, 518 wrapped frontier models were identified across the scanned servers, creating significant opportunities for compute abuse and unauthorized model access.\u003c/p\u003e\n\n\u003ch3 id=\"insecure-design-patterns-and-lab-analysis\"\u003eInsecure Design Patterns and Lab Analysis\u003c/h3\u003e\n\n\u003cp\u003eLab-based analysis of a subset of applications confirmed that insecure defaults are systemic rather than isolated incidents. The research documented several recurring misconfiguration patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePoor Deployment Practices:\u003c/strong\u003e Applications frequently run as root, utilize misconfigured Docker setups, and expose insecure defaults.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStatic and Hardcoded Credentials:\u003c/strong\u003e Setup examples and docker-compose files contain embedded credentials rather than dynamically generated tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHigh-Privilege Fresh Installs:\u003c/strong\u003e New installations often bypass authentication entirely, dropping users into accounts with full management access.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRapid Vulnerability Emergence:\u003c/strong\u003e Technical flaws, including arbitrary code execution, were discovered within days of initial lab testing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExpanded Attack Surface:\u003c/strong\u003e Weak sandboxing and the lack of DMZ placement significantly increase the blast radius when agents are granted access to code interpretation tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"root-causes-and-mitigation-recommendations\"\u003eRoot Causes and Mitigation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eThe article attributes these widespread vulnerabilities to a fundamental shift in development priorities, where vendors have abandoned decades of security best practices to accelerate AI feature delivery. Market pressure and the demand for rapid time-to-market are driving organizations to prioritize speed over security. To combat this, the article emphasizes that organizations should not wait for adversaries to discover exposed infrastructure. Instead, companies are advised to proactively use security scanning tools to identify external misconfigurations and harden their AI deployments before exploitation occurs.\u003c/p\u003e\n","keyPoints":["A scan of over one million exposed AI services revealed that many are deployed with no authentication enabled by default, leaving user data and system controls openly accessible.","Exposed chatbots and agent management platforms frequently disclose sensitive information, including API keys, conversation histories, and business logic, while allowing unauthorized users to execute code or bypass safety guardrails.","Testing of more than 5,200 exposed Ollama APIs showed that 31% responded to prompts without requiring authentication, often providing access to wrapped paid frontier models.","The underlying AI infrastructure consistently exhibits insecure design patterns, including hardcoded credentials, applications running as root, and weak sandboxing that increases the blast radius of potential attacks."],"insights":["The absence of access management controls in AI tooling means that compromising a single bot often grants access to all connected third-party systems and tools.","Exposed Ollama instances often wrap paid frontier models, allowing attackers to abuse expensive compute resources without the risk of conversation data exposure.","Arbitrary code execution vulnerabilities were discovered in popular AI projects within days of lab analysis, highlighting the rapid emergence of technical flaws in new AI infrastructure."],"referencedReports":[{"title":"Jailbreaking Every LLM with One Simple Click","url":"https://www.cyberark.com/resources/threat-research-blog/jailbreaking-every-llm-with-one-simple-click","publisher":"CyberArk","context":"Referenced to illustrate how attackers can bypass LLM safety guardrails to perform nefarious tasks."},{"title":"Amazon Chatbot Gone Wrong","url":"https://www.lasso.security/blog/amazon-chatbot-gone-wrong","publisher":"Lasso Security","context":"Cited to demonstrate real-world examples of users abusing exposed company chatbots to access premium models without payment or account logging."}],"body":"\u003cp\u003eThe Intruder team scanned over one million exposed AI services and found that rapid adoption has severely compromised security across the sector. Many deployments ship with authentication disabled by default, leaving user conversations, API keys, and system controls openly accessible to anyone on the internet. Exposed chatbots frequently reveal sensitive enterprise data and allow malicious actors to bypass safety guardrails without fear of repercussions. Agent management platforms like Flowise and n8n were discovered with their business logic, credential lists, and dangerous local functions fully exposed.\u003c/p\u003e\n\n\u003cp\u003eOver ninety instances across government, marketing, and finance sectors were found to be completely open to unauthorized modification and data exfiltration. Testing of more than five thousand Ollama APIs revealed that thirty-one percent responded to prompts without authentication, often providing access to wrapped paid frontier models. Lab analysis confirmed that these systems suffer from insecure defaults, hardcoded credentials, applications running as root, and weak sandboxing. Ultimately, the pressure to ship AI features quickly has caused vendors to abandon decades of security best practices, leaving organizations vulnerable to immediate compromise.\u003c/p\u003e\n"},{"n":2,"title":"UAT-8302 and its box full of malware","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/uat-8302/","time":"10:00","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"UAT-8302 is a China-nexus APT group targeting government entities in South America and southeastern Europe since late 2024, leveraging a diverse arsenal of custom and known malware families alongside open-source reconnaissance tools to establish persistent network access.","briefOverview":"\u003cp\u003eCisco Talos disclosed UAT-8302, a China-nexus APT group actively targeting government entities in South America and southeastern Europe since late 2024. Following initial compromise, the group conducts extensive network reconnaissance and credential extraction using open-source utilities and custom PowerShell scripts. They proliferate across compromised networks by leveraging Impacket, WMI, and credential dumping from tools like MobaXterm. The threat actor deploys a diverse arsenal of malware families, including the .NET-based NetDraft backdoor, CloudSorcerer version 3, and the VSHELL implant. UAT-8302 also establishes persistent access through proxy servers and VPN clients while utilizing tooling that closely mirrors other known China-nexus threat clusters.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos has disclosed UAT-8302, a China-nexus advanced persistent threat group that has targeted government entities in South America and southeastern Europe since at least late 2024.\u003c/p\u003e\n\n\u003cp\u003eUpon gaining initial access, the group executes comprehensive reconnaissance using red-teaming utilities like Impacket and custom PowerShell scripts to map network topology and system configurations. They actively scan for live endpoints and open SMB shares before downloading open-source network scanning engines such as gogo, QScan, and naabu.\u003c/p\u003e\n\n\u003cp\u003eThe operator extracts sensitive data by querying Active Directory objects, collecting event logs, and capturing Azure AD Connect credentials. Lateral movement is achieved through WMI and scheduled task execution, alongside credential extraction from the MobaXterm SSH client.\u003c/p\u003e\n\n\u003cp\u003eUAT-8302 deploys multiple custom and publicly disclosed malware families to maintain persistence and control. The group utilizes NetDraft, a .NET variant of the FinalDraft backdoor that relies on the Microsoft Graph API and OneDrive for command-and-control communications. They also deploy CloudSorcerer version 3, which dynamically retrieves its C2 infrastructure by parsing data blobs from GitHub repositories or GameSpot profiles.\u003c/p\u003e\n\n\u003cp\u003eAdditional implants include the VSHELL backdoor delivered via SNOWLIGHT and a new Rust-based stager tracked as SNOWRUST. In some campaigns, the group pairs SNAPPYBEE/DeedRAT with the ZingDoor DLL implant, a tactic previously observed with the Earth Estries cluster. The operator further hardens its presence by deploying a native kernel driver from the open-source Hades HIDS/HIPS framework to monitor and hide system events.\u003c/p\u003e\n\n\u003cp\u003eTo facilitate external communication, UAT-8302 configures proxy servers using Stowaway and anyproxy, alongside SoftEther VPN clients. Cisco Talos has published ClamAV signatures and Snort rules to detect these malicious artifacts, alongside a comprehensive list of file hashes and network indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"uat-8302-threat-actor-overview\"\u003eUAT-8302 Threat Actor Overview\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos identifies UAT-8302 as a China-nexus APT group tasked with obtaining and maintaining long-term access to government and related entities globally.\u003c/li\u003e\n\u003cli\u003eThe group has been active since at least late 2024, primarily targeting government entities in South America and government agencies in southeastern Europe in 2025.\u003c/li\u003e\n\u003cli\u003ePost-compromise activities focus on information collection, credential extraction, and network proliferation using open-source tooling and custom-built malware.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"malware-arsenal\"\u003eMalware Arsenal\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNetDraft (NosyDoor):\u003c/strong\u003e A .NET-based C# variant of the FinalDraft/SquidDoor family. It uses a benign executable to side-load a malicious DLL loader, which decrypts the implant from a data file. NetDraft leverages the Microsoft Graph API and OneDrive for command-and-control communications. It includes an embedded helper library named FringePorch that handles file management, command execution, and plugin loading.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloudSorcerer Version 3:\u003c/strong\u003e A backdoor utilizing a side-loading triad of a benign executable, a malicious DLL loader, and an encrypted shellcode INI file. Depending on the host process (e.g., dpapimig.exe, spoolsv.exe, mspaint.exe), it performs system enumeration, file operations, and process injection. It retrieves C2 information by reading data blobs from GitHub repositories or GameSpot user profiles.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVSHELL \u0026amp; Stagers:\u003c/strong\u003e Delivered via a side-loading DLL that injects position-independent shellcode into explorer.exe. The payload uses a single-byte XOR key (0x99) to decode the VSHELL implant. UAT-8302 utilizes SNOWLIGHT, a lightweight downloader, alongside a new Rust-based variant tracked as SNOWRUST that uses the LexiCrypt obfuscator.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSNAPPYBEE/DeedRAT \u0026amp; ZingDoor:\u003c/strong\u003e The group deploys SNAPPYBEE/DeedRAT before rapidly switching to the ZingDoor DLL implant. Both families are attributed to the Earth Estries cluster.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHades HIDS/HIPS Driver:\u003c/strong\u003e UAT-8302 deploys a native kernel driver from the open-source Hades framework to register callbacks for process, thread, registry, and file events, allowing the operator to monitor, block, or hide system artifacts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"tactics-techniques-and-procedures-ttps\"\u003eTactics, Techniques, and Procedures (TTPs)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eReconnaissance \u0026amp; Scanning:\u003c/strong\u003e Operators run PowerShell scripts like \u003ccode\u003ewhatpc.ps1\u003c/code\u003e to collect system information and persist via scheduled tasks. They execute ping sweeps, NBT scans, and port scans to discover live endpoints and open SMB shares. Open-source scanning tools including gogo, QScan, naabu, dddd, PortQry, and httpx are downloaded and executed to map network services.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential Access \u0026amp; Information Collection:\u003c/strong\u003e The group queries Active Directory objects, collects security and system event logs, and captures audit policies. They extract Azure AD Connect credentials using adconnectdump.py and capture domain login IPs using a custom tool named SharpGetUserLoginIPRP. Credentials are also dumped from the MobaXterm SSH client to pivot across the network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLateral Movement \u0026amp; Proliferation:\u003c/strong\u003e Movement is achieved through Impacket and WMI-based remote process creation. Executables are pushed to target systems via scheduled tasks or direct command execution to run accompanying malware scripts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence \u0026amp; Defense:\u003c/strong\u003e Backdoor access is maintained through proxy servers configured with Stowaway and anyproxy. The group also deploys SoftEther VPN clients to establish tunneling capabilities. NetDraft persists by creating malicious scheduled tasks that run hourly under the SYSTEM account.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"threat-actor-overlaps-tooling-connections\"\u003eThreat Actor Overlaps \u0026amp; Tooling Connections\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eUAT-8302 shares significant tooling overlap with multiple China-nexus clusters, indicating close operational relationships.\u003c/li\u003e\n\u003cli\u003eNetDraft connects to the Jewelbug/REF7707/CL-STA-0049 cluster and the LongNosedGoblin group.\u003c/li\u003e\n\u003cli\u003eCloudSorcerer v3 links to the EastWind APT campaign documented by Kaspersky.\u003c/li\u003e\n\u003cli\u003eSNOWLIGHT and Draculoader are shared with UAT-6382, UNC5174, UNC6586, Earth Estries, and Earth Naga.\u003c/li\u003e\n\u003cli\u003eSNAPPYBEE/DeedRAT and ZingDoor are attributed to Earth Estries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"detection-coverage-indicators-of-compromise\"\u003eDetection Coverage \u0026amp; Indicators of Compromise\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos has released ClamAV signatures and Snort rules to detect and block UAT-8302 artifacts.\u003c/li\u003e\n\u003cli\u003eFile hashes are provided for NetDraft, FringePorch, VSHELL, ZingDoor, gogo, Stowaway, anyproxy, QScan, Draculoader, dddd, httpx, SoftEther VPN, SharpGetUserLoginIPRP, Naabu, PortQry, and MobaXtermDecryptor.\u003c/li\u003e\n\u003cli\u003eNetwork indicators include domains like drivelivelime.com, msiidentity.com, trafficmanagerupdate.com, and update-kaspersky.workers.dev, alongside IP addresses such as 85.209.156.3, 185.238.189.41, and 103.27.108.55.\u003c/li\u003e\n\u003cli\u003eFull IOCs are available on the Cisco Talos GitHub repository.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["UAT-8302 is a China-nexus APT group that has targeted government entities in South America and southeastern Europe since at least late 2024.","The group deploys multiple malware families including NetDraft, CloudSorcerer version 3, VSHELL, SNAPPYBEE, and ZingDoor to establish persistent access.","Post-compromise operations involve extensive network reconnaissance, credential extraction from Active Directory and Azure AD, and lateral movement using Impacket and WMI.","UAT-8302 leverages open-source tools like gogo, QScan, Stowaway, and SoftEther VPN for network scanning, proxying, and establishing backdoor access.","The group's tooling overlaps with other China-nexus threat clusters such as Jewelbug, LongNosedGoblin, and Earth Estries, indicating close operational relationships."],"insights":["UAT-8302 abuses the Microsoft Graph API and OneDrive infrastructure as command-and-control channels for its NetDraft backdoor to blend malicious traffic with legitimate enterprise services.","The group deploys a native kernel driver from the open-source Hades HIDS/HIPS framework to monitor and potentially hide process, thread, registry, and file events from endpoint security solutions.","UAT-8302 extracts plaintext credentials directly from the MobaXterm SSH client to facilitate lateral movement across compromised networks without requiring password cracking.","CloudSorcerer version 3 dynamically retrieves its command-and-control addresses by parsing data blobs from GitHub repositories or GameSpot user profiles instead of relying on hardcoded domains.","The threat actor utilizes a Rust-based stager (SNOWRUST) built on the LexiCrypt obfuscator to deploy VSHELL, indicating a shift toward compiled, heavily obfuscated delivery mechanisms."],"referencedReports":[{"title":"LongNosedGoblin tries to sniff out governmental affairs in Southeast Asia and Japan","url":"https://www.welivesecurity.com/en/eset-research/longnosedgoblin-tries-sniff-out-governmental-affairs-southeast-asia-japan/","publisher":"ESET","context":"The article cites this research to attribute the NosyDoor/NetDraft malware to the LongNosedGoblin cluster targeting government organizations."},{"title":"EastWind APT Campaign","url":"https://securelist.com/eastwind-apt-campaign/113345/","publisher":"Kaspersky","context":"This report discloses the CloudSorcerer backdoor family and documents its use in attacks against Russian government entities in 2024."},{"title":"Breaking Down Earth Estries' Persistent TTPs in Prolonged Cyber Operations","url":"https://www.trendmicro.com/en_us/research/24/k/breaking-down-earth-estries-persistent-ttps-in-prolonged-cyber-o.html","publisher":"Trend Micro","context":"The article references this analysis to highlight the SNAPPYBEE/DeedRAT and ZingDoor malware combination attributed to the Earth Estries threat actor."},{"title":"Advanced Backdoor: SquidDoor","url":"https://unit42.paloaltonetworks.com/advanced-backdoor-squidoor/","publisher":"Palo Alto Networks Unit 42","context":"Cited as a reference for the CL-STA-0049 cluster that exclusively operates the FinalDraft/SquidDoor malware family."},{"title":"Initial Access Brokers Exploit F5 ScreenConnect","url":"https://cloud.google.com/blog/topics/threat-intelligence/initial-access-brokers-exploit-f5-screenconnect","publisher":"Google Cloud Threat Intelligence","context":"The article uses this report to document UNC5174 exploiting a zero-day vulnerability to target critical infrastructure organizations in the Americas."}],"body":"\u003cp\u003eCisco Talos disclosed UAT-8302, a China-nexus APT group actively targeting government entities in South America and southeastern Europe since late 2024. Following initial compromise, the group conducts extensive network reconnaissance and credential extraction using open-source utilities and custom PowerShell scripts. They proliferate across compromised networks by leveraging Impacket, WMI, and credential dumping from tools like MobaXterm. The threat actor deploys a diverse arsenal of malware families, including the .NET-based NetDraft backdoor, CloudSorcerer version 3, and the VSHELL implant. UAT-8302 also establishes persistent access through proxy servers and VPN clients while utilizing tooling that closely mirrors other known China-nexus threat clusters.\u003c/p\u003e\n"},{"n":4,"title":"Google now offers up to $1.5 million for some Android exploits","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/google-now-offers-up-to-15-million-for-some-android-exploits/","time":"11:24","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Google is overhauling its Android and Chrome bug bounty programs by increasing maximum payouts to $1.5 million for complex zero-click exploits while scaling back rewards for flaws easily found by AI and streamlining report requirements.","briefOverview":"\u003cp\u003eGoogle is restructuring its Android and Chrome vulnerability rewards programs to prioritize highly complex exploits while reducing payouts for flaws that artificial intelligence can easily identify. The maximum bounty for zero-click Pixel Titan M2 security chip exploits with persistence has been raised to \u003cspan class=\"math inline\"\u003e\\(1.5 million, with a \\)\u003c/span\u003e750,000 reward for the same exploits lacking persistence. Chrome researchers can now earn up to \u003cspan class=\"math inline\"\u003e\\(250,000 for full-chain browser process exploits, plus an additional \\)\u003c/span\u003e250,128 bonus for successfully targeting MiraclePtr-protected memory allocations. The company is shifting its submission expectations away from lengthy written analyses toward concise reports containing only bug proofs and essential artifacts. This change reflects Google\u0026rsquo;s internal tooling evolution, which now automatically explains bugs and suggests fixes. The Android program will strictly focus on Linux kernel vulnerabilities within Google-maintained components unless researchers demonstrate concrete exploitability on Android devices. Despite scaling back certain individual payouts, Google expects total aggregate rewards in 2026 to increase. This restructuring follows a record-breaking 2025 where Google paid $17.1 million to 747 researchers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle has announced a major overhaul of its Android and Chrome vulnerability rewards programs, significantly adjusting bounty tiers to reflect the evolving threat landscape and technological capabilities. The top reward tier now offers up to \u003cspan class=\"math inline\"\u003e\\(1.5 million for zero-click Pixel Titan M2 security chip full-chain exploits that include persistence, while the same attack scenario without persistence qualifies for up to \\)\u003c/span\u003e750,000. On the Chrome side, full-chain browser process exploits targeting up-to-date operating systems and hardware will receive rewards of up to \u003cspan class=\"math inline\"\u003e\\(250,000. Researchers who successfully exploit MiraclePtr-protected memory allocations will receive an additional \\)\u003c/span\u003e250,128 bonus. Google is simultaneously changing its documentation requirements by requesting concise reports that focus strictly on bug proofs and essential artifacts. This shift away from lengthy written analyses acknowledges that artificial intelligence can now automatically generate detailed write-ups. The company\u0026rsquo;s internal tooling has similarly evolved to automatically explain vulnerabilities and suggest remediation steps. Under the new Android guidelines, the program will narrow its focus to Linux kernel vulnerabilities found in Google-maintained components. Researchers must demonstrate concrete exploitability on actual Android devices to qualify for other kernel vulnerabilities. The restructuring comes after a record-breaking year for Google\u0026rsquo;s bug bounty initiative, which paid \u003cspan class=\"math inline\"\u003e\\(17.1 million to 747 researchers in 2025. This represents a more than 40 percent increase from the previous year and brings total payouts since the program's 2010 launch to over \\)\u003c/span\u003e81.6 million. Google projects that aggregate rewards will continue to grow in 2026, even as some individual payout amounts are reduced.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"program-restructuring-overview\"\u003eProgram Restructuring Overview\u003c/h3\u003e\n\n\u003cp\u003eGoogle is implementing a comprehensive overhaul of its Android and Chrome vulnerability rewards programs. This restructuring aims to emphasize the highest tiers of rewards while adapting to advancements in artificial intelligence. The company explicitly states that it wants to build on its partnership with the researcher community by focusing on the most technically demanding attack scenarios.\u003c/p\u003e\n\n\u003ch3 id=\"revised-reward-tiers\"\u003eRevised Reward Tiers\u003c/h3\u003e\n\n\u003cp\u003eThe Android program introduces a top-tier bounty of up to \u003cspan class=\"math inline\"\u003e\\(1.5 million for zero-click Pixel Titan M2 security chip full-chain exploits that include persistence. The exact same exploit scenario, but without persistence, is eligible for a maximum payout of \\)\u003c/span\u003e750,000. On the Chrome side, full-chain browser process exploits on up-to-date operating systems and hardware now carry rewards of up to \u003cspan class=\"math inline\"\u003e\\(250,000. Researchers who successfully exploit MiraclePtr-protected memory allocations will receive an additional \\)\u003c/span\u003e250,128 bonus.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe $1.5 million tier is reserved for the most technically demanding attack scenarios.\u003c/li\u003e\n\u003cli\u003eThe Chrome bonus specifically targets MiraclePtr-protected memory allocations.\u003c/li\u003e\n\u003cli\u003ePayouts are scaled back for flaws that artificial intelligence can easily identify.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"submission-guidelines-and-internal-tooling\"\u003eSubmission Guidelines and Internal Tooling\u003c/h3\u003e\n\n\u003cp\u003eGoogle is shifting its documentation expectations away from lengthy written analyses toward concise reports. Submissions must now contain only bug proofs and essential artifacts. This change acknowledges that artificial intelligence has made it effortless to produce detailed write-ups automatically. The company notes that its internal tooling has similarly evolved to automatically explain discovered bugs and suggest fixes. Consequently, the Android program will narrow its focus to Linux kernel vulnerabilities within Google-maintained components. Researchers must demonstrate concrete exploitability on Android devices to qualify for other kernel vulnerabilities.\u003c/p\u003e\n\n\u003ch3 id=\"financial-performance-and-future-projections\"\u003eFinancial Performance and Future Projections\u003c/h3\u003e\n\n\u003cp\u003eThis vulnerability rewards program restructuring follows a record-breaking year for Google\u0026rsquo;s bug bounty initiative. The company paid \u003cspan class=\"math inline\"\u003e\\(17.1 million to 747 researchers in 2025. This payout represents a more than 40 percent increase from 2024 and marks an all-time high for annual spending. Total payouts since the program launched in 2010 now exceed \\)\u003c/span\u003e81.6 million. Google estimates that aggregate rewards paid in 2026 will increase despite the reduction of some individual reward amounts.\u003c/p\u003e\n","keyPoints":["Google is increasing maximum bug bounty payouts to $1.5 million for highly complex zero-click exploits targeting the Pixel Titan M2 security chip.","The company is scaling back rewards for vulnerabilities that artificial intelligence can easily identify and shifting report requirements to concise proofs of exploitability.","Google paid $17.1 million to 747 researchers in 2025, marking a record year that represents a 40 percent increase from the previous year.","The Android vulnerability program will now prioritize Linux kernel flaws in Google-maintained components unless researchers prove concrete exploitability on Android devices.","Google estimates that total aggregate rewards paid in 2026 will continue to grow despite reductions in certain individual payout tiers."],"insights":["Researchers should pivot to submitting concise proofs of exploitability and essential artifacts, as Google's internal tooling now automates the detailed analysis and fix suggestions that AI previously made easy to generate.","The Chrome bounty introduces a highly specific $250,128 bonus exclusively for bypassing MiraclePtr-protected memory allocations, highlighting a targeted incentive for defeating advanced memory safety mitigations.","The Android program restricts automatic eligibility to Linux kernel vulnerabilities in Google-maintained components, requiring researchers to independently prove concrete exploitability on Android devices for other kernel flaws.","Google anticipates a net increase in total bounty spending for 2026 despite cutting payouts for certain flaw types, indicating a deliberate strategic shift toward funding fewer, high-impact discoveries rather than volume-based submissions."],"referencedReports":[],"body":"\u003cp\u003eGoogle is restructuring its Android and Chrome vulnerability rewards programs to prioritize highly complex exploits while reducing payouts for flaws that artificial intelligence can easily identify. The maximum bounty for zero-click Pixel Titan M2 security chip exploits with persistence has been raised to \u003cspan class=\"math inline\"\u003e\\(1.5 million, with a \\)\u003c/span\u003e750,000 reward for the same exploits lacking persistence. Chrome researchers can now earn up to \u003cspan class=\"math inline\"\u003e\\(250,000 for full-chain browser process exploits, plus an additional \\)\u003c/span\u003e250,128 bonus for successfully targeting MiraclePtr-protected memory allocations. The company is shifting its submission expectations away from lengthy written analyses toward concise reports containing only bug proofs and essential artifacts. This change reflects Google\u0026rsquo;s internal tooling evolution, which now automatically explains bugs and suggests fixes. The Android program will strictly focus on Linux kernel vulnerabilities within Google-maintained components unless researchers demonstrate concrete exploitability on Android devices. Despite scaling back certain individual payouts, Google expects total aggregate rewards in 2026 to increase. This restructuring follows a record-breaking 2025 where Google paid $17.1 million to 747 researchers.\u003c/p\u003e\n"},{"n":6,"title":"Karakurt extortion gang ‘cold case’ negotiator gets 8.5 years in prison","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/karakurt-extortion-gang-negotiator-sentenced-to-85-years-in-prison/","time":"10:13","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Deniss Zolotarjovs was sentenced to 8.5 years in prison as the first Karakurt ransomware group member to face charges in the US, setting a critical precedent for prosecuting cyber extortion operators.","briefOverview":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian national, was sentenced to 8.5 years in prison after being extradited from Georgia to the United States. He pleaded guilty to conspiracy to commit wire fraud and money laundering for his role as a negotiator within the Russian Karakurt ransomware group. The FBI linked Zolotarjovs to at least six extortion cases targeting American organizations between August 2021 and November 2023.\u003c/p\u003e\n\n\u003cp\u003eHis primary responsibility involved reviving dormant extortion attempts, known as cold case negotiations, to pressure victims into paying ransoms. Zolotarjovs utilized stolen children\u0026rsquo;s health information and conducted extensive research on targeted companies to heighten psychological pressure. The Department of Justice reported that attacks on just 13 of the more than 54 companies he targeted resulted in over $56 million in losses.\u003c/p\u003e\n\n\u003cp\u003eWhile the government estimates total losses to be in the hundreds of millions due to widespread underreporting, exact figures remain uncertain. Zolotarjovs is the first Karakurt member to face charges and receive a sentence in the U.S., establishing a precedent for future prosecutions of cyber extortion operators.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian national originally from Moscow, was sentenced to 8.5 years in prison after his extradition from Georgia. He pleaded guilty in July 2025 to conspiracy to commit wire fraud and money laundering charges that were filed in August 2024. Zolotarjovs served as a negotiator for the Karakurt extortion operation, a group led by former Conti ransomware gang leaders.\u003c/p\u003e\n\n\u003cp\u003eThe FBI connected him to at least six separate extortion cases against American organizations spanning from August 2021 to November 2023. His specific function was to manage cold case extortions, which occur when initial victim communi
