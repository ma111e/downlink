window.__DL_ARTICLES = [{"n":1,"title":"Mastra npm Supply Chain Attack: 140+ Packages Backdoored via easy-day-js Typosquat","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/mastra-npm-packages-compromised-using-easy-day-js","time":"05:55","priority":"MUST READ","score":95,"tldr":"The @mastra npm organization was compromised and 140+ packages were republished with a typosquatted dependency, easy-day-js, whose malicious postinstall script downloaded and ran a second-stage payload. Anyone who installed affected @mastra packages on June 17, 2026 should treat their environment and exposed secrets as compromised.","briefOverview":"\u003cp\u003eOn June 17, 2026, an attacker compromised the \u003ccode\u003e@mastra\u003c/code\u003e npm organization and added \u003ccode\u003eeasy-day-js\u003c/code\u003e as a dependency across more than 140 packages in the Mastra AI framework ecosystem. The affected packages had combined weekly downloads exceeding 1.1 million, and the article states that anyone who installed an \u003ccode\u003e@mastra\u003c/code\u003e package that day should treat the environment as compromised. The campaign was described as ongoing at publication time, with additional \u003ccode\u003e@mastra\u003c/code\u003e packages continuing to be compromised.\u003c/p\u003e\n\n\u003cp\u003eThe malicious dependency, \u003ccode\u003eeasy-day-js\u003c/code\u003e, was a typosquat of the popular \u003ccode\u003edayjs\u003c/code\u003e date library. A clean bait version, \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e, was first published on June 16, and the compromised Mastra packages referenced it with the caret range \u003ccode\u003e^1.11.21\u003c/code\u003e, allowing npm installs to resolve later to the malicious \u003ccode\u003e1.11.22\u003c/code\u003e version. That malicious version added a \u003ccode\u003esetup.cjs\u003c/code\u003e file and a \u003ccode\u003epostinstall\u003c/code\u003e hook that executed an obfuscated dropper.\u003c/p\u003e\n\n\u003cp\u003eWhen installed, the dropper disabled TLS certificate verification, wrote beacon files into the temporary directory, downloaded a second-stage payload from \u003ccode\u003ehttps://23.254.164.92:8000/update/49890878\u003c/code\u003e, spawned it as a detached Node.js process with \u003ccode\u003e23.254.164.123:443\u003c/code\u003e as an argument, and deleted itself. StepSecurity reported that Harden Runner in block mode intercepted and blocked the outbound call to \u003ccode\u003e23.254.164.92:8000\u003c/code\u003e during a controlled GitHub Actions test, preventing the stage-two payload from downloading and stopping the rest of the chain.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn June 17, 2026, an attacker compromised the \u003ccode\u003e@mastra\u003c/code\u003e npm organization and republished more than 140 Mastra ecosystem packages with a new production dependency on \u003ccode\u003eeasy-day-js\u003c/code\u003e. Mastra is described in the article as a TypeScript framework for AI agents, workflows, RAG pipelines, LLM integrations, memory, MCP servers, vector databases, and cloud deployment targets. Because Mastra packages are often installed in environments containing LLM API keys, cloud credentials, database tokens, CI/CD secrets, VCS tokens, and npm tokens, the article identifies the ecosystem as a high-value target.\u003c/p\u003e\n\n\u003cp\u003eThe attack began with pre-positioning on June 16, 2026, when npm user \u003ccode\u003esergey2016\u003c/code\u003e published \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e as a clean copy of the legitimate \u003ccode\u003edayjs\u003c/code\u003e library. The package mirrored \u003ccode\u003edayjs\u003c/code\u003e versioning, metadata, homepage, repository URL, license, and keywords to appear credible. The compromised Mastra packages added \u003ccode\u003eeasy-day-js\u003c/code\u003e as \u003ccode\u003e^1.11.21\u003c/code\u003e, which meant npm would resolve fresh installs to the latest matching version once a newer release appeared.\u003c/p\u003e\n\n\u003cp\u003eAt 01:01 UTC on June 17, \u003ccode\u003esergey2016\u003c/code\u003e published \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e, which added \u003ccode\u003esetup.cjs\u003c/code\u003e and a \u003ccode\u003epostinstall\u003c/code\u003e script of \u003ccode\u003enode setup.cjs --no-warnings\u003c/code\u003e. Eleven minutes later, the attacker began publishing compromised \u003ccode\u003e@mastra\u003c/code\u003e packages, starting with \u003ccode\u003e@mastra/schema-compat@1.2.12\u003c/code\u003e, followed by core packages such as \u003ccode\u003e@mastra/core@1.42.1\u003c/code\u003e, \u003ccode\u003e@mastra/memory@1.20.4\u003c/code\u003e, \u003ccode\u003e@mastra/server@2.1.1\u003c/code\u003e, and the top-level \u003ccode\u003emastra@1.13.1\u003c/code\u003e. The article states that the publishing cadence was consistent with an automated script enumerating and processing packages in batches.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003esetup.cjs\u003c/code\u003e dropper was obfuscated with a custom-alphabet Base64 scheme, an array rotation and integrity check, and an XOR-encoded package marker. At install time, it set \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e, wrote \u003ccode\u003e.pkg_history\u003c/code\u003e and \u003ccode\u003e.pkg_logs\u003c/code\u003e into the temp directory, fetched a second-stage payload from \u003ccode\u003ehttps://23.254.164.92:8000/update/49890878\u003c/code\u003e, wrote it to a random 24-hex-character JavaScript filename, and spawned it detached with \u003ccode\u003e23.254.164.123:443\u003c/code\u003e as the command-and-control argument. The script then deleted itself with \u003ccode\u003efs.rmSync(__filename, { force: true })\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity tested the behavior in a controlled GitHub Actions workflow using Harden Runner in block mode. Harden Runner blocked the outbound connection to \u003ccode\u003e23.254.164.92:8000\u003c/code\u003e, so the stage-two payload was not downloaded, no detached child process was spawned, and the stage-two command-and-control address was not contacted. The article also lists indicators of compromise, including \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e, \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e, npm maintainer \u003ccode\u003esergey2016\u003c/code\u003e, \u003ccode\u003esetup.cjs\u003c/code\u003e, the two IP addresses, the stage-two URL, temporary files, and the postinstall script.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn June 17, 2026, an attacker compromised the \u003ccode\u003e@mastra\u003c/code\u003e npm organization and added the dependency \u003ccode\u003eeasy-day-js\u003c/code\u003e across more than 140 packages in the Mastra AI framework ecosystem. The article describes \u003ccode\u003eeasy-day-js\u003c/code\u003e as a typosquat of the popular \u003ccode\u003edayjs\u003c/code\u003e date library. Packages with combined weekly downloads exceeding 1.1 million were exposed, and the article states that anyone who installed an \u003ccode\u003e@mastra\u003c/code\u003e package that day should treat the environment as compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article says the incident was ongoing at the time of publication. It also says additional \u003ccode\u003e@mastra\u003c/code\u003e packages were continuing to be compromised and that the issue was responsibly disclosed in the Mastra GitHub repository at \u003ccode\u003ehttps://github.com/mastra-ai/mastra/issues/18045\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"mastra-context-and-significance\"\u003eMastra Context and Significance\u003c/h2\u003e\n\n\u003cp\u003eMastra is described as a rapidly growing open-source TypeScript framework for building AI agents, multi-step workflows, and retrieval-augmented generation pipelines. It includes integrations for major LLM providers such as OpenAI, Anthropic, and Google, as well as persistent agent memory, Model Context Protocol servers, vector databases, and cloud deployment targets.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Mastra packages are commonly installed in sensitive development and infrastructure environments. Examples of credentials that may exist in those environments include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eOPENAI_API_KEY\u003c/code\u003e, \u003ccode\u003eANTHROPIC_API_KEY\u003c/code\u003e, and \u003ccode\u003eGOOGLE_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_ACCESS_KEY_ID\u003c/code\u003e, \u003ccode\u003eAWS_SECRET_ACCESS_KEY\u003c/code\u003e, and \u003ccode\u003eAZURE_TENANT_ID\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDatabase connection strings and tokens\u003c/li\u003e\n\u003cli\u003eCI/CD secrets and VCS tokens such as \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e and \u003ccode\u003eNPM_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause of this, the article characterizes the Mastra ecosystem as a high-value target for supply-chain attackers.\u003c/p\u003e\n\n\u003ch2 id=\"pre-positioning-with-a-clean-typosquat\"\u003ePre-positioning With a Clean Typosquat\u003c/h2\u003e\n\n\u003cp\u003eThe attack began on June 16, 2026 at 07:05 UTC, when npm user \u003ccode\u003esergey2016\u003c/code\u003e published \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e. The article states that this version was clean and functioned as a copy of the legitimate \u003ccode\u003edayjs\u003c/code\u003e library, with no malicious code. Its purpose was to look credible.\u003c/p\u003e\n\n\u003cp\u003eThe package mirrored several attributes of \u003ccode\u003edayjs\u003c/code\u003e, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e1.11.x\u003c/code\u003e version numbering\u003c/li\u003e\n\u003cli\u003eAuthor metadata associated with \u003ccode\u003eiamkun\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eHomepage URL\u003c/li\u003e\n\u003cli\u003eRepository URL\u003c/li\u003e\n\u003cli\u003eMIT license\u003c/li\u003e\n\u003cli\u003eKeywords such as \u003ccode\u003edayjs\u003c/code\u003e, \u003ccode\u003edate\u003c/code\u003e, \u003ccode\u003etime\u003c/code\u003e, and \u003ccode\u003emoment\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis clean version was the dependency inserted into the \u003ccode\u003e@mastra\u003c/code\u003e packages. The dependency was specified as \u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e, which allowed npm to resolve the dependency to the latest matching version at install time.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-version-publication\"\u003eMalicious Version Publication\u003c/h2\u003e\n\n\u003cp\u003eAt 01:01 UTC on June 17, 2026, \u003ccode\u003esergey2016\u003c/code\u003e published \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e. The article says this version was identical to \u003ccode\u003e1.11.21\u003c/code\u003e except for the addition of a file named \u003ccode\u003esetup.cjs\u003c/code\u003e and a \u003ccode\u003epostinstall\u003c/code\u003e hook.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003epostinstall\u003c/code\u003e hook was:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-javascript\"\u003e\u0026quot;postinstall\u0026quot;: \u0026quot;node setup.cjs --no-warnings\u0026quot;\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThe article notes that \u003ccode\u003e--no-warnings\u003c/code\u003e suppresses Node.js runtime warnings that could alert the user. The added \u003ccode\u003esetup.cjs\u003c/code\u003e file was 4,572 bytes and contained an obfuscated dropper.\u003c/p\u003e\n\n\u003ch2 id=\"mastra-organization-compromise-and-mass-publishing\"\u003e@mastra Organization Compromise and Mass Publishing\u003c/h2\u003e\n\n\u003cp\u003eEleven minutes after the malicious \u003ccode\u003eeasy-day-js\u003c/code\u003e version was published, the attacker used compromised \u003ccode\u003e@mastra\u003c/code\u003e organization credentials to begin a mass publishing campaign. The campaign ran from 01:12 UTC to 02:39 UTC, during which more than 140 packages were republished with \u003ccode\u003eeasy-day-js\u003c/code\u003e added as a production dependency.\u003c/p\u003e\n\n\u003cp\u003eThe article lists this sequence of observed activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e01:01 UTC: \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e was published by \u003ccode\u003esergey2016\u003c/code\u003e with the malicious \u003ccode\u003esetup.cjs\u003c/code\u003e dropper.\u003c/li\u003e\n\u003cli\u003e01:12 UTC: The first \u003ccode\u003e@mastra\u003c/code\u003e package was hit, \u003ccode\u003e@mastra/schema-compat@1.2.12\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e01:15–01:20 UTC: Core packages such as \u003ccode\u003e@mastra/core@1.42.1\u003c/code\u003e, \u003ccode\u003e@mastra/memory@1.20.4\u003c/code\u003e, \u003ccode\u003e@mastra/server@2.1.1\u003c/code\u003e, \u003ccode\u003e@mastra/loggers@1.1.3\u003c/code\u003e, \u003ccode\u003e@mastra/observability@1.14.2\u003c/code\u003e, and \u003ccode\u003e@mastra/deployer@1.42.1\u003c/code\u003e were published.\u003c/li\u003e\n\u003cli\u003e01:24 UTC: The top-level framework package \u003ccode\u003emastra@1.13.1\u003c/code\u003e was published.\u003c/li\u003e\n\u003cli\u003e01:25–01:30 UTC: Infrastructure packages such as \u003ccode\u003e@mastra/pg@1.13.1\u003c/code\u003e, \u003ccode\u003e@mastra/mcp@1.10.1\u003c/code\u003e, \u003ccode\u003e@mastra/libsql@1.13.1\u003c/code\u003e, \u003ccode\u003e@mastra/evals@1.3.1\u003c/code\u003e, \u003ccode\u003e@mastra/rag@2.2.2\u003c/code\u003e, and \u003ccode\u003e@mastra/datadog@1.2.5\u003c/code\u003e were published.\u003c/li\u003e\n\u003cli\u003e01:34–02:09 UTC: Database adapters, observability integrations, voice providers, auth plugins, and deployer targets were published.\u003c/li\u003e\n\u003cli\u003e02:19–02:39 UTC: More packages continued to be compromised, with \u003ccode\u003e@mastra/dane\u003c/code\u003e last observed at 02:39 UTC.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the publishing cadence was clearly not manual and was consistent with a script that enumerated the \u003ccode\u003e@mastra\u003c/code\u003e organization and processed packages in batches.\u003c/p\u003e\n\n\u003ch2 id=\"install-time-execution-chain\"\u003eInstall-Time Execution Chain\u003c/h2\u003e\n\n\u003cp\u003eWhen a developer installed an affected package, npm resolved \u003ccode\u003eeasy-day-js\u003c/code\u003e to version \u003ccode\u003e1.11.22\u003c/code\u003e, because it was the latest patch version matching \u003ccode\u003e^1.11.21\u003c/code\u003e. npm then automatically ran the malicious \u003ccode\u003epostinstall\u003c/code\u003e hook.\u003c/p\u003e\n\n\u003cp\u003eThe article deobfuscates the dropper logic as performing the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLoading Node.js modules including \u003ccode\u003echild_process\u003c/code\u003e, \u003ccode\u003ecrypto\u003c/code\u003e, \u003ccode\u003efs\u003c/code\u003e, \u003ccode\u003eos\u003c/code\u003e, and \u003ccode\u003epath\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSetting \u003ccode\u003eprocess.env.NODE_TLS_REJECT_UNAUTHORIZED = '0'\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDefining the stage-two download URL as \u003ccode\u003ehttps://23.254.164.92:8000/update/49890878\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDefining the stage-two C2 argument as \u003ccode\u003e23.254.164.123:443\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWriting the installation path to \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWriting a package marker to \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDownloading the second-stage payload\u003c/li\u003e\n\u003cli\u003eWriting the payload to a randomly named JavaScript file in the temp directory\u003c/li\u003e\n\u003cli\u003eSpawning the payload as a detached Node.js process with ignored standard I/O and \u003ccode\u003ewindowsHide: true\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCalling \u003ccode\u003e.unref()\u003c/code\u003e so the process could continue after npm exited\u003c/li\u003e\n\u003cli\u003eDeleting \u003ccode\u003esetup.cjs\u003c/code\u003e with \u003ccode\u003efs.rmSync(__filename, { force: true })\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evasion-and-forensic-relevant-behavior\"\u003eEvasion and Forensic-Relevant Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights several behaviors that made the dropper effective at avoiding detection or complicating investigation.\u003c/p\u003e\n\n\u003cp\u003eFirst, the dropper disabled TLS certificate verification by setting \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e. The article says this allowed the dropper to reach the C2 server even if it used a self-signed certificate.\u003c/p\u003e\n\n\u003cp\u003eSecond, the dropper wrote beacon information before fetching the payload. It wrote the package installation path to \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e, which the article says gave the attacker a map of affected machines.\u003c/p\u003e\n\n\u003cp\u003eThird, the second-stage payload was spawned as a detached background process using \u003ccode\u003edetached: true\u003c/code\u003e, \u003ccode\u003estdio: 'ignore'\u003c/code\u003e, and \u003ccode\u003e.unref()\u003c/code\u003e. The article says this allowed it to keep running after npm exited, without visible output.\u003c/p\u003e\n\n\u003cp\u003eFourth, the dropper deleted itself after running. The article identifies this as destruction of the main forensic artifact.\u003c/p\u003e\n\n\u003ch2 id=\"stage-two-payload\"\u003eStage-Two Payload\u003c/h2\u003e\n\n\u003cp\u003eThe stage-two payload was fetched at runtime from \u003ccode\u003ehttps://23.254.164.92:8000/update/49890878\u003c/code\u003e. The article says it was not embedded in any tarball, so static analysis of package contents could not reach it.\u003c/p\u003e\n\n\u003cp\u003eThe stage-two process was executed with \u003ccode\u003e23.254.164.123:443\u003c/code\u003e passed as its first argument. The article describes this as almost certainly the command-and-control address. It also states that, given the kinds of credentials commonly present in Mastra environments, the most likely outcome of stage-two execution was environment variable harvesting and exfiltration to that C2.\u003c/p\u003e\n\n\u003ch2 id=\"runtime-analysis-with-harden-runner\"\u003eRuntime Analysis With Harden Runner\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity tested the malware in a controlled GitHub Actions workflow by installing \u003ccode\u003e@mastra/core@1.42.1\u003c/code\u003e with StepSecurity Harden Runner enabled in block mode. Harden Runner was configured to enforce an allowlist of permitted outbound endpoints at the step level.\u003c/p\u003e\n\n\u003cp\u003eWhen the \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e postinstall hook executed, Harden Runner intercepted and blocked the outbound call to \u003ccode\u003e23.254.164.92:8000\u003c/code\u003e. The article states that because the stage-two payload could not be downloaded, the rest of the attack chain did not execute.\u003c/p\u003e\n\n\u003cp\u003eThe article lists these results from the controlled run:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe stage-two payload download was blocked.\u003c/li\u003e\n\u003cli\u003eNo payload file was written to the temp directory.\u003c/li\u003e\n\u003cli\u003eThe detached child process was never spawned.\u003c/li\u003e\n\u003cli\u003eThe stage-two C2 at \u003ccode\u003e23.254.164.123:443\u003c/code\u003e was never contacted.\u003c/li\u003e\n\u003cli\u003eCredential exfiltration was prevented because the chain stopped at the first network call.\u003c/li\u003e\n\u003cli\u003eThe block was logged in Harden Runner network events.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says \u003ccode\u003e23.254.164.92\u003c/code\u003e was added to the StepSecurity Harden Runner Global Block List.\u003c/p\u003e\n\n\u003ch2 id=\"typosquat-characteristics\"\u003eTyposquat Characteristics\u003c/h2\u003e\n\n\u003cp\u003eThe article describes \u003ccode\u003eeasy-day-js\u003c/code\u003e as deliberately chosen to impersonate \u003ccode\u003edayjs\u003c/code\u003e. It copied metadata from the legitimate library closely enough that the article says routine review of \u003ccode\u003epackage.json\u003c/code\u003e or \u003ccode\u003enpm audit\u003c/code\u003e would have no obvious signal that something was wrong.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the reliable distinguishing features as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe npm maintainer \u003ccode\u003esergey2016\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eThe email \u003ccode\u003esergey2016@tutamail.com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eThe presence of \u003ccode\u003esetup.cjs\u003c/code\u003e in the tarball\u003c/li\u003e\n\u003cli\u003eThe \u003ccode\u003epostinstall\u003c/code\u003e hook in \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe legitimate \u003ccode\u003edayjs\u003c/code\u003e package had no malicious \u003ccode\u003esetup.cjs\u003c/code\u003e file and no postinstall hook according to the comparison in the article.\u003c/p\u003e\n\n\u003ch2 id=\"obfuscation-layers\"\u003eObfuscation Layers\u003c/h2\u003e\n\n\u003cp\u003eThe article says the \u003ccode\u003esetup.cjs\u003c/code\u003e dropper used three obfuscation layers.\u003c/p\u003e\n\n\u003cp\u003eFirst, string literals were stored using a custom-alphabet Base64 encoding scheme. The alphabet used lowercase letters first, then uppercase letters, then digits, so standard Base64 decoders would not produce meaningful output without reversing the alphabet mapping.\u003c/p\u003e\n\n\u003cp\u003eSecond, the decoded 40-element string array had to be rotated 34 positions before an arithmetic checksum equaled \u003ccode\u003e0x4c11d\u003c/code\u003e, or 311,581. The article says this design was intended to disrupt static analysis tools that evaluated the array before the rotation ran.\u003c/p\u003e\n\n\u003cp\u003eThird, the package name \u003ccode\u003eeasy-day-js\u003c/code\u003e was stored as the byte sequence \u003ccode\u003e[0xe5, 0xe1, 0xf3, 0xf9, 0xad, 0xe4, 0xe1, 0xf9, 0xad, 0xea, 0xf3]\u003c/code\u003e and written to \u003ccode\u003e.pkg_logs\u003c/code\u003e as raw binary. The article says this prevented the plaintext string from appearing in files written to disk.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the C2 URL appeared in plaintext within the obfuscated source, which it describes as unusual and possibly indicating that the dropper was prepared under time pressure.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators of compromise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e, described as the primary malicious package\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e, described as the clean bait version injected as a dependency\u003c/li\u003e\n\u003cli\u003enpm maintainer \u003ccode\u003esergey2016\u003c/code\u003e and \u003ccode\u003esergey2016@tutamail.com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esetup.cjs\u003c/code\u003e, a 4,572-byte obfuscated stage-one dropper\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23.254.164.92\u003c/code\u003e, described as the stage-one C2 serving the stage-two payload on port 8000\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23.254.164.123\u003c/code\u003e, described as the stage-two C2 on port 443\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehttps://23.254.164.92:8000/update/49890878\u003c/code\u003e, the stage-two payload download endpoint\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026quot;postinstall\u0026quot;: \u0026quot;node setup.cjs --no-warnings\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e, containing the absolute path of the installed package\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e, containing the XOR package marker as a binary file\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/\u0026lt;24-hex-chars\u0026gt;.js\u003c/code\u003e, the temporary stage-two payload file\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e, set at runtime to disable TLS certificate validation\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-packages\"\u003eAffected Packages\u003c/h2\u003e\n\n\u003cp\u003eThe article states that more than 140 packages across the Mastra organization were compromised, and that any listed version published on June 17, 2026 should be considered malicious. Examples shown in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/acp@0.2.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/agent-builder@1.0.42\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/ai-sdk@1.4.6\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/auth@1.0.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/client-js@1.24.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/core@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/datadog@1.2.5\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer-cloud@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer-cloudflare@1.1.44\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer-netlify@1.1.20\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer-vercel@1.1.38\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/e2b@0.3.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/pg@1.13.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/mcp@1.10.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/rag@2.2.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emastra@1.13.1\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also references a downloadable CSV and notes that StepSecurity Enterprise customers can query compromised packages through the Threat Center API.\u003c/p\u003e\n\n\u003ch2 id=\"stepsecurity-customer-focused-response-sections\"\u003eStepSecurity Customer-Focused Response Sections\u003c/h2\u003e\n\n\u003cp\u003eThe article includes sections describing StepSecurity offerings in relation to the incident.\u003c/p\u003e\n\n\u003cp\u003eIt says StepSecurity published a Threat Center alert containing relevant links, an attack summary, technical analysis, IOCs, affected packages, malicious versions, and remediation steps. It also says Threat Center alerts are delivered into SIEM workflows.\u003c/p\u003e\n\n\u003cp\u003eIt describes Harden Runner as monitoring network events, process executions, file access, and outbound network connections at the step level in GitHub Actions. In this incident, Harden Runner detected and blocked the outbound call to the C2 IP address in the controlled test.\u003c/p\u003e\n\n\u003cp\u003eIt describes Secure Registry as a dedicated, policy-enforced npm registry that applies security policies before serving packages. The article says the primary defense in this case was a cooldown period for newly published package versions and that Secure Registry customers were not exposed when the compromised packages were published to npm.\u003c/p\u003e\n\n\u003cp\u003eIt also describes Dev Machine Guard as providing visibility into npm packages installed across enrolled developer devices. The article says security teams can search by package name and version to identify affected machines.\u003c/p\u003e\n\n\u003cp\u003eFinally, the article discusses npm Package Cooldown Check, npm Package Compromised Updates Check, and npm Package Search as mechanisms to block newly published packages during a cooldown window, block known compromised packages, and search across pull requests, default branches, and developer machines for affected packages.\u003c/p\u003e\n","keyPoints":["On June 17, 2026, an attacker compromised the @mastra npm organization and added easy-day-js as a dependency across more than 140 Mastra AI framework packages.","The easy-day-js package was a typosquat of dayjs, with version 1.11.21 published as a clean bait package and version 1.11.22 containing an obfuscated postinstall dropper.","The malicious postinstall script downloaded a second-stage payload from https://23.254.164.92:8000/update/49890878, spawned it as a detached Node.js process, and deleted setup.cjs after execution.","The article says affected Mastra packages had combined weekly downloads exceeding 1.1 million and that anyone who installed an @mastra package that day should treat their environment as compromised.","StepSecurity reported that Harden Runner in block mode intercepted and blocked the outbound connection to 23.254.164.92:8000 during a controlled GitHub Actions test, preventing the stage-two payload from downloading."],"insights":["The attacker used a clean bait version of easy-day-js with a caret dependency range, so the compromised @mastra packages could initially reference version 1.11.21 while fresh installs later resolved automatically to the malicious 1.11.22 release.","The malicious setup.cjs file deleted itself after execution, so investigators should not rely only on the installed package tree and should also check temporary files such as .pkg_history, .pkg_logs, and randomly named 24-hex-character JavaScript files.","The typosquat copied dayjs metadata closely enough that routine package.json review or npm audit would provide little obvious warning; the maintainer identity sergey2016 and the setup.cjs postinstall hook were the reliable distinguishing indicators cited in the article.","Network egress controls during npm install were shown to stop the attack chain before the second-stage payload executed, because blocking the first connection to 23.254.164.92:8000 prevented the payload download and detached child process."],"referencedReports":[],"body":"\u003cp\u003eOn June 17, 2026, an attacker compromised the \u003ccode\u003e@mastra\u003c/code\u003e npm organization and added \u003ccode\u003eeasy-day-js\u003c/code\u003e as a dependency across more than 140 packages in the Mastra AI framework ecosystem. The affected packages had combined weekly downloads exceeding 1.1 million, and the article states that anyone who installed an \u003ccode\u003e@mastra\u003c/code\u003e package that day should treat the environment as compromised. The campaign was described as ongoing at publication time, with additional \u003ccode\u003e@mastra\u003c/code\u003e packages continuing to be compromised.\u003c/p\u003e\n\n\u003cp\u003eThe malicious dependency, \u003ccode\u003eeasy-day-js\u003c/code\u003e, was a typosquat of the popular \u003ccode\u003edayjs\u003c/code\u003e date library. A clean bait version, \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e, was first published on June 16, and the compromised Mastra packages referenced it with the caret range \u003ccode\u003e^1.11.21\u003c/code\u003e, allowing npm installs to resolve later to the malicious \u003ccode\u003e1.11.22\u003c/code\u003e version. That malicious version added a \u003ccode\u003esetup.cjs\u003c/code\u003e file and a \u003ccode\u003epostinstall\u003c/code\u003e hook that executed an obfuscated dropper.\u003c/p\u003e\n\n\u003cp\u003eWhen installed, the dropper disabled TLS certificate verification, wrote beacon files into the temporary directory, downloaded a second-stage payload from \u003ccode\u003ehttps://23.254.164.92:8000/update/49890878\u003c/code\u003e, spawned it as a detached Node.js process with \u003ccode\u003e23.254.164.123:443\u003c/code\u003e as an argument, and deleted itself. StepSecurity reported that Harden Runner in block mode intercepted and blocked the outbound call to \u003ccode\u003e23.254.164.92:8000\u003c/code\u003e during a controlled GitHub Actions test, preventing the stage-two payload from downloading and stopping the rest of the chain.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
