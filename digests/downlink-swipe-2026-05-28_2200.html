<style>

<script>
window.__DL_ARTICLES = [{"n":2,"title":"GreyVibe hackers use ChatGPT, Gemini to power cyberattacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/greyvibe-hackers-use-chatgpt-gemini-to-power-cyberattacks/","time":"22:24","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"A likely Russian cyberespionage group, GreyVibe, is using AI tools like ChatGPT and Gemini to craft highly convincing phishing lures and develop custom malware, primarily targeting Ukrainian organizations since August 2025.","briefOverview":"\u003cp\u003eA threat actor tracked as GreyVibe has been leveraging generative AI tools like ChatGPT and Google Gemini to create highly realistic phishing lures and develop custom malware. Active since at least August 2025, the group focuses almost exclusively on Ukrainian military, government, civilian, and business organizations. Researchers assess the actor likely aligns with Russian state interests but lacks the discipline of a mature nation-state operation, partly due to ties with cybercriminal elements.\u003c/p\u003e\n\n\u003cp\u003eThe campaign employs multiple attack chains—spear-phishing with decoy PDFs, fake CAPTCHA pages mimicking Zoom, fake dating and charity websites, and bogus Russian military login portals. Custom PowerShell remote access trojans (LegionRelay, PhantomRelay) and the Android spyware FallSpy are used to steal files, credentials, location data, and establish remote desktop access. The use of AI-generated imagery and LLM-assisted obfuscators marks a notable shift in how threat actors lower the cost of content creation and tool development.\u003c/p\u003e\n\n\u003cp\u003eWithSecure published indicators of compromise and noted that the group uploaded test samples to public scanning platforms and even dropped a cryptocurrency miner on some victims, blurring the line between state-directed espionage and cybercrime. Defenders should review the IOCs and watch for the described lure patterns to detect potential GreyVibe intrusions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers at WithSecure have exposed a persistent cyberespionage campaign by a threat group named GreyVibe. The campaign has been active since at least August 2025 and appears to serve Russian state interests, though the operators exhibit behaviors atypical of a mature nation-state actor. Their primary targets are Ukrainian or Ukraine-related organizations spanning military, government, civilian, and business sectors. The group’s use of large language models (LLMs) for lure generation and malware development sets it apart from many traditional espionage actors.\u003c/p\u003e\n\n\u003cp\u003eGreyVibe employs five documented attack chains. PhantomMail uses spear-phishing emails with links to ZIP/RAR archives on Google Drive and 4sync, delivering decoy PDFs that impersonate Ukrainian government, emergency, telecom, or energy entities. PhantomClick relies on fake CAPTCHA or Cloudflare verification pages designed to trick victims into executing self-infecting commands, while PrincessClub and DroneLink use fraudulent adult/dating and military charity websites respectively to spread malware. A fifth chain, Nebo, presents a fake Russian military communications login page, likely attempting to fool Ukrainian personnel into believing they are accessing a Russian terminal.\u003c/p\u003e\n\n\u003cp\u003eThe malware arsenal includes two PowerShell-based remote access trojans: LegionRelay, which steals files, screenshots, browser credentials, Telegram and WhatsApp data, and sets up RDP access; and PhantomRelay, which performs fingerprinting and executes arbitrary commands. On mobile, the FallSpy Android spyware harvests contacts, call logs, device information, location, media, and SIM data. Four custom obfuscators (LOOKVALPS, LOOKVALJS, DAYLIGHT, TEASOUP) were likely developed with LLM assistance, and AI tools like ChatGPT, Ideogram AI, and Google Gemini were used to create convincing images and content for lure pages.\u003c/p\u003e\n\n\u003cp\u003eDespite the focus on Ukrainian targets and the use of Russian-language malware panels and code comments, WithSecure hesitates to label GreyVibe a definitive nation-state group. The actor’s lack of operational discipline is evident: development and test samples were uploaded to a public scanning platform, and on some victim machines a cryptocurrency miner was deployed—an activity more common among cybercriminals. Moreover, early PhantomRelay samples shared a unique ISO builder linked to former TrickBot members (UAC-0098) who previously targeted Ukraine, suggesting a connection or overlap with criminal circles.\u003c/p\u003e\n\n\u003cp\u003eThe researchers speculate that GreyVibe could be a hybrid entity—either former cybercriminals absorbed into state-backed operations, independent criminals receiving state-directed tasking, or a mixed team of both. This blurry attribution reinforces the need for defenders to focus on the provided indicators of compromise and behavior patterns rather than solely on threat actor labels. WithSecure has published a full report and IOCs, enabling organizations to strengthen detection against these multifaceted intrusions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"greyvibe-campaign-overview\"\u003eGreyVibe Campaign Overview\u003c/h1\u003e\n\n\u003cp\u003eA likely Russian-aligned threat group, designated GreyVibe by WithSecure, has been executing a cyberespionage campaign against Ukrainian targets since at least August 2025. The operation leverages artificial intelligence tools to craft convincing lures and develop custom malware, and it demonstrates a blend of state-interest targeting with criminal tradecraft. Researchers identified multiple attack vectors, a diverse malware toolkit, and behaviors that challenge easy classification into purely nation-state or cybercriminal categories.\u003c/p\u003e\n\n\u003ch2 id=\"targets-and-objectives\"\u003eTargets and Objectives\u003c/h2\u003e\n\n\u003cp\u003eThe campaign concentrates exclusively on Ukrainian or Ukraine-related entities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMilitary organizations\u003c/li\u003e\n\u003cli\u003eGovernment bodies\u003c/li\u003e\n\u003cli\u003eCivilian infrastructure\u003c/li\u003e\n\u003cli\u003eBusiness sector entities\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis target profile aligns with Russian state interests as of the article’s timeline (published mid-2026, covering events from 2025 onward). The activity suggests intelligence collection and possibly financial gain, as evidenced by a cryptocurrency miner found on some compromised machines.\u003c/p\u003e\n\n\u003ch2 id=\"attack-chains\"\u003eAttack Chains\u003c/h2\u003e\n\n\u003cp\u003eGreyVibe utilizes five distinct lures, each designed to deliver malware or trick victims into self-infection:\u003c/p\u003e\n\n\u003ch3 id=\"phantommail\"\u003ePhantomMail\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpear-phishing emails with links to Google Drive or 4sync hosting ZIP/RAR archives.\u003c/li\u003e\n\u003cli\u003eDecoy PDFs or fake error messages impersonate Ukrainian government, emergency services, telecom providers, and energy companies.\u003c/li\u003e\n\u003cli\u003eTriggers malware installation upon archive extraction or interaction.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"phantomclick\"\u003ePhantomClick\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFake CAPTCHA / “ClickFix” pages disguised as Zoom or LAPAS (a Ukrainian software) sites.\u003c/li\u003e\n\u003cli\u003eBogus Cloudflare verification prompts instruct victims to run a command (self-infecting).\u003c/li\u003e\n\u003cli\u003eAbuses user trust in common verification mechanisms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"princessclub\"\u003ePrincessClub\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFake Ukrainian adult/dating websites distributing the FallSpy Android spyware and the PhantomRelay/LegionRelay Windows malware.\u003c/li\u003e\n\u003cli\u003eOperators employed fake female Telegram personas and later integrated WebRTC-based live calls to capture victim audio/video.\u003c/li\u003e\n\u003cli\u003eHighly invasive social engineering blending romance scams with espionage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"dronelink\"\u003eDroneLink\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFake Ukrainian military charity websites themed around FPV drones and UAVs.\u003c/li\u003e\n\u003cli\u003eShared infrastructure and tooling with PrincessClub campaigns, indicating operational overlap.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"nebo\"\u003eNebo\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFake “СПО НЕБО” Russian military communications login pages.\u003c/li\u003e\n\u003cli\u003eLikely designed to deceive Ukrainian military personnel into thinking they were accessing a legitimate Russian terminal, thereby capturing credentials or delivering malware.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-arsenal\"\u003eMalware Arsenal\u003c/h2\u003e\n\n\u003ch3 id=\"legionrelay-powershell-rat\"\u003eLegionRelay (PowerShell RAT)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCapabilities: file theft, screenshot capture, browser credential harvesting, Telegram and WhatsApp data exfiltration, and setting up Remote Desktop Protocol (RDP) access.\u003c/li\u003e\n\u003cli\u003eSuspected to have been developed with AI assistance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"phantomrelay-powershell-rat\"\u003ePhantomRelay (PowerShell RAT)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCapabilities: system fingerprinting, dynamic script loading, execution of PowerShell and Windows commands.\u003c/li\u003e\n\u003cli\u003eAlso associated with cybercrime activity, though researchers distinguish its state-aligned usage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"fallspy-android-spyware\"\u003eFallSpy (Android Spyware)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ePure intelligence collection: contact lists, call logs, device/network info, location data, media files, SIM information.\u003c/li\u003e\n\u003cli\u003eDeployed via PrincessClub and Nebo campaigns.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"custom-obfuscators\"\u003eCustom Obfuscators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eLOOKVALPS, LOOKVALJS, DAYLIGHT, TEASOUP – likely developed with LLM assistance to obfuscate malicious code.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ai-utilization\"\u003eAI Utilization\u003c/h2\u003e\n\n\u003cp\u003eA defining characteristic of GreyVibe is the systematic use of generative AI:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLure content\u003c/strong\u003e: ChatGPT, Ideogram AI, and Google Gemini produced detailed text and images. Researchers noted LLM markers (artifacts) in some images, indicating these were AI-generated and not retouched.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTool development\u003c/strong\u003e: The obfuscators mentioned above and LegionRelay itself likely benefited from LLM-assisted coding.\u003c/li\u003e\n\u003cli\u003eThis reduces the cost and effort of creating convincing phishing materials, enabling rapid iteration of campaigns.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attribution-and-actor-profile\"\u003eAttribution and Actor Profile\u003c/h2\u003e\n\n\u003cp\u003eEvidence pointing to Russian origins:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMalware panel language is Russian.\u003c/li\u003e\n\u003cli\u003eComments in code artifacts are in Russian.\u003c/li\u003e\n\u003cli\u003eCommand-and-control (C2) server time zone is set to UTC+3 (Moscow time).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDespite alignment with Russian state interests, WithSecure refrains from definitively calling it a nation-state actor due to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLack of operational discipline typical of mature intelligence agencies.\u003c/li\u003e\n\u003cli\u003eUploading development/test samples to a public scanning platform.\u003c/li\u003e\n\u003cli\u003eDropping a cryptocurrency miner on victim machines—more typical of financially motivated crime.\u003c/li\u003e\n\u003cli\u003ePhantomRelay’s appearance in non-state cybercrime contexts, though separable from the GreyVibe operation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eParticularly revealing is a link to a group of former TrickBot members (UAC-0098): early and test samples used a unique ISO builder associated with that group, which targeted Ukraine at the start of the Russian invasion. This suggests possible absorption of criminal talent into state-aligned activity, independent contractors receiving state tasking, or a hybrid team.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-defenses\"\u003eImpact and Defenses\u003c/h2\u003e\n\n\u003cp\u003eThe article does not detail specific data losses or breaches resulting from these campaigns, but the intelligence-collection capabilities of the malware and the breadth of targeting indicate a significant threat to Ukrainian entities. WithSecure published a set of indicators of compromise (IOCs) on GitHub to help organizations detect and block GreyVibe activity.\u003c/p\u003e\n\n\u003cp\u003eDefensive recommendations, while not exhaustively listed in the article, would logically include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitoring for the IOCs.\u003c/li\u003e\n\u003cli\u003eBlocking known malicious domains and IP addresses.\u003c/li\u003e\n\u003cli\u003eTraining users to recognize fake CAPTCHA and verification prompts.\u003c/li\u003e\n\u003cli\u003eImplementing application control to prevent execution of untrusted PowerShell scripts.\u003c/li\u003e\n\u003cli\u003eScrutinizing downloads from Google Drive and file-sharing services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eGreyVibe illustrates the evolving landscape of cyberespionage where AI lowers the barrier for creating sophisticated lures, and the line between state-directed operations and cybercrime continues to blur. Defenders must prepare for threat actors that combine espionage motives with criminal techniques, and that leverage commercial AI platforms to enhance their operational efficiency.\u003c/p\u003e\n","keyPoints":["A likely Russian threat group named GreyVibe has been using AI tools like ChatGPT and Google Gemini to create convincing phishing lures and develop custom malware since at least August 2025.","The group primarily targets Ukrainian or Ukraine-related military, government, civilian, and business organizations through multiple attack chains including spear-phishing, fake CAPTCHA pages, and malicious websites.","GreyVibe deploys custom malware such as the PowerShell remote access trojans LegionRelay and PhantomRelay, and the Android spyware FallSpy, to steal data and establish remote access.","Researchers with WithSecure note that GreyVibe lacks the sophistication expected from mature nation-state actors and exhibits ties to cybercriminal activity, including a connection to former TrickBot members."],"insights":["The group's AI-generated images contained visible LLM markers, indicating they neglected to remove artifacts, which is atypical for a disciplined nation-state operator.","A cryptocurrency miner was found on some victim machines, suggesting concurrent financial criminal activity alongside espionage goals.","Test samples were uploaded to a public scanning platform, a practice rarely seen with nation-state actors and indicative of lower operational security.","The PrincessClub campaign's use of WebRTC-based live calls on fake dating sites to capture victim audio/video is a highly invasive and creative social engineering technique."],"referencedReports":[{"title":"GreyVibe","url":"https://labs.withsecure.com/publications/greyvibe","publisher":"WithSecure","context":"The article cites this WithSecure Labs publication as the primary research detailing the GreyVibe threat actor's activities, tools, and potential ties to cybercriminal groups."}],"body":"\u003cp\u003eA threat actor tracked as GreyVibe has been leveraging generative AI tools like ChatGPT and Google Gemini to create highly realistic phishing lures and develop custom malware. Active since at least August 2025, the group focuses almost exclusively on Ukrainian military, government, civilian, and business organizations. Researchers assess the actor likely aligns with Russian state interests but lacks the discipline of a mature nation-state operation, partly due to ties with cybercriminal elements.\u003c/p\u003e\n\n\u003cp\u003eThe campaign employs multiple attack chains—spear-phishing with decoy PDFs, fake CAPTCHA pages mimicking Zoom, fake dating and charity websites, and bogus Russian military login portals. Custom PowerShell remote access trojans (LegionRelay, PhantomRelay) and the Android spyware FallSpy are used to steal files, credentials, location data, and establish remote desktop access. The use of AI-generated imagery and LLM-assisted obfuscators marks a notable shift in how threat actors lower the cost of content creation and tool development.\u003c/p\u003e\n\n\u003cp\u003eWithSecure published indicators of compromise and noted that the group uploaded test samples to public scanning platforms and even dropped a cryptocurrency miner on some victims, blurring the line between state-directed espionage and cybercrime. Defenders should review the IOCs and watch for the described lure patterns to detect potential GreyVibe intrusions.\u003c/p\u003e\n"},{"n":1,"title":"Anthropic confirms Claude Mythos-class models will roll out to the public","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/artificial-intelligence/anthropic-confirms-claude-mythos-class-models-will-roll-out-to-the-public/","time":"00:21","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Anthropic plans to make its powerful Mythos-class AI models publicly available in the coming weeks after implementing stronger safeguards to mitigate the significant security risks that previously restricted them.","briefOverview":"\u003cp\u003eAnthropic has confirmed it will release its restricted Mythos-class AI models to the general public in the coming weeks after delaying the rollout earlier this year over major security risks. Originally announced in April and limited to select companies and security researchers, the model was kept private because Anthropic warned that attackers could gain a short-term advantage from its advanced capabilities if released without strong safeguards.\u003c/p\u003e\n\n\u003cp\u003eAnthropic now states it is making swift progress on developing guardrails and is already allowing a small number of organizations to use the Claude Mythos preview for cybersecurity work. The model shows significant improvements in code reasoning and autonomy—far surpassing the current Opus 4.8 flagship—though the company has not set a firm public release date. A brief, unintended appearance of the Mythos-preview model on the Claude Code platform before being taken offline suggests the model is already moving toward deployment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic is preparing to make its most powerful AI system to date available to the general public, reversing a cautious posture adopted earlier this year. In April, the company announced the Mythos model as a restricted release only for select companies and security researchers, explicitly citing major security risks. At that time, Anthropic publicly warned that the party best able to leverage these tools could hold the advantage, noting that in the short term this could be attackers if frontier labs were not careful about how they release such capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe security concern centered on the model’s advanced code reasoning and autonomous behavior. Typical industry practice for AI developers is to hold back highly capable models until robust guardrails are in place to prevent misuse. Anthropic now indicates that those safeguards have advanced enough to consider a full public rollout. In a blog post, the company said it expects to bring Mythos-class models to all customers in the coming weeks, though no precise timeline was offered.\u003c/p\u003e\n\n\u003cp\u003eAs a preliminary step, Anthropic is already providing a small set of organizations access to the Claude Mythos preview specifically for cybersecurity work. It remains unclear whether the exact same model currently used in that program will be the one released to the wider public. The company has emphasized swift progress on developing safeguards, suggesting that real-world adversarial testing by these early partners is part of the validation process.\u003c/p\u003e\n\n\u003cp\u003eThe technical leap is significant: the Mythos model reportedly exhibits major improvements in code reasoning and autonomy, far exceeding the capabilities of Anthropic’s latest flagship, Opus 4.8. This performance delta underscores why the company’s original risk assessment treated the model as too dangerous for unrestricted availability.\u003c/p\u003e\n\n\u003cp\u003eAdding a sense of immediacy, the Mythos-preview model briefly appeared for some users on the Claude Code platform before being taken offline. The incident indicates that the model is already integrated into production pipelines, raising both anticipation and the need to ensure that no wider exposure happens before the official, safeguarded release.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAnthropic has confirmed it will bring its Mythos-class AI models to the general public in the coming weeks, ending a months-long restriction that limited access to a select group of companies and security researchers. The move follows what Anthropic describes as swift progress on security guardrails, enabling a rollout of models that previously posed major risks to public and private software.\u003c/p\u003e\n\n\u003ch2 id=\"background-and-original-restriction\"\u003eBackground and Original Restriction\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Mythos model was first announced in April as a restricted system, available only to specific partners, including security researchers.\u003c/li\u003e\n\u003cli\u003eAt launch, Anthropic explicitly cited major security risks as the reason for withholding the model from general availability.\u003c/li\u003e\n\u003cli\u003eThe company warned that \u0026ldquo;the advantage will belong to the side that can get the most out of these tools,\u0026rdquo; stating that in the short term attackers could benefit if frontier labs release such models carelessly, while in the long term defenders should gain the upper hand by fixing bugs before new code ships.\u003c/li\u003e\n\u003cli\u003eThis language reflects a calculated acknowledgment that the immediate defensive value of the model is not guaranteed, and that a known window of attacker advantage exists if safeguards are insufficient.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"security-concerns-and-guardrails\"\u003eSecurity Concerns and Guardrails\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI companies typically avoid deploying highly capable models until misuse-prevention guardrails are robust. Anthropic’s April decision aligned with that principle.\u003c/li\u003e\n\u003cli\u003eThe company now says it has made significant progress on those safeguards, enabling a move toward public release.\u003c/li\u003e\n\u003cli\u003eIn its announcement, Anthropic stated: \u0026ldquo;We’re making swift progress on developing these safeguards and expect to be able to bring Mythos-class models to all our customers in the coming weeks.\u0026rdquo; No specific date was given.\u003c/li\u003e\n\u003cli\u003eThe article does not detail the nature of the guardrails, but the mention of swift progress suggests that the safety engineering challenges are actively being resolved.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"rollout-plans-and-early-access\"\u003eRollout Plans and Early Access\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhile a full public launch is imminent, Anthropic is already allowing a small number of organizations to use the Claude Mythos preview expressly for cybersecurity work.\u003c/li\u003e\n\u003cli\u003eIt is unclear whether the identical model will be released to the general public or if a modified version with different capabilities or constraints will be distributed.\u003c/li\u003e\n\u003cli\u003eThe early access program appears to serve as a final round of real-world security testing before wider release, a common practice for high-risk AI systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-capabilities\"\u003eTechnical Capabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Mythos model demonstrates major improvements in code reasoning and autonomy compared to Anthropic’s current flagship, Opus 4.8.\u003c/li\u003e\n\u003cli\u003eSuch leaps in autonomous code understanding and generation are precisely what earlier risk assessments flagged as dangerous if left unguarded, because they could accelerate exploitation of vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"accidental-exposure-on-claude-code\"\u003eAccidental Exposure on Claude Code\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article notes that the Mythos-preview model briefly appeared on the Claude Code platform for some users before being taken offline.\u003c/li\u003e\n\u003cli\u003eThis incident suggests that the model is already integrated into live deployment infrastructure, raising the stakes for ensuring that access controls and safeguards are fully hardened before the intended public release.\u003c/li\u003e\n\u003cli\u003eThe brief leak also illustrates the operational challenge of managing such powerful models within existing development environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"implications\"\u003eImplications\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic’s decision marks a significant shift from caution to a controlled confidence in its safety mechanisms, potentially setting a precedent for how other frontier labs handle ultra-capable models that were previously considered too risky for broad distribution.\u003c/li\u003e\n\u003cli\u003eThe acknowledgment of an attacker advantage window—even as defenses improve—remains a stark warning that the security landscape will be shaped by how quickly organizations can operationalize these tools for defense.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Anthropic confirmed it plans to bring Mythos-class models to the general public in the coming weeks after previously restricting access due to security risks.","The Mythos model was announced in April as a restricted model available only to select companies and security researchers.","Anthropic originally cited major security risks with the Mythos model and warned that attackers could have a short-term advantage if frontier labs release these models carelessly.","Anthropic states it is making swift progress on developing safeguards and is already allowing a small number of organizations to use Claude Mythos preview for cybersecurity work.","The Mythos model shows major improvements in code reasoning and autonomy far above Claude's current flagship model, Opus 4.8."],"insights":["The brief accidental appearance and removal of the Mythos-preview model on Claude Code suggests that the model is already integrated into production pipelines, increasing the risk of an unintentional wider exposure before formal release.","Anthropic's strategy of allowing a select group of cybersecurity organizations early access to the Mythos model specifically for cybersecurity work indicates they are using real-world adversarial testing to validate safeguards before public release.","Anthropic's warning that the short-term advantage from these tools could go to attackers highlights a calculated public acknowledgment that the defensive benefits of their most powerful models are not immediate, creating a known exploitable window."],"referencedReports":[],"body":"\u003cp\u003eAnthropic has confirmed it will release its restricted Mythos-class AI models to the general public in the coming weeks after delaying the rollout earlier this year over major security risks. Originally announced in April and limited to select companies and security researchers, the model was kept private because Anthropic warned that attackers could gain a short-term advantage from its advanced capabilities if released without strong safeguards.\u003c/p\u003e\n\n\u003cp\u003eAnthropic now states it is making swift progress on developing guardrails and is already allowing a small number of organizations to use the Claude Mythos preview for cybersecurity work. The model shows significant improvements in code reasoning and autonomy—far surpassing the current Opus 4.8 flagship—though the company has not set a firm public release date. A brief, unintended appearance of the Mythos-preview model on the Claude Code platform before being taken offline suggests the model is already moving toward deployment.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

    return () => clearInterval(iv);

  return (

    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
