<script type="application/json" id="dl-articles">[{"n":1,"title":"Cisco warns of unpatched SD-WAN zero-day exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-cisco-sd-wan-flaw-exploited-in-zero-day-attacks-to-gain-root/","time":"06:24","priority":"MUST READ","score":94,"tldr":"Cisco warned that an unpatched Catalyst SD-WAN Manager zero-day, CVE-2026-20245, is being exploited to let low-privileged local attackers with netadmin access escalate to root via crafted file uploads. No patch is available yet, so customers should upgrade for related fixed flaws and check logs for indicators of compromise.","briefOverview":"\u003cp\u003eCisco warned of a high-severity, unpatched zero-day vulnerability in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, that is being actively exploited in attacks. The flaw enables local attackers with low privileges to execute arbitrary commands as root. Cisco said the vulnerability affects all deployment types, including on-premises, cloud, Cisco-managed cloud, and government FedRAMP deployments.\u003c/p\u003e\n\n\u003cp\u003eCisco said the issue is caused by insufficient validation of user-supplied input and can be exploited by uploading a crafted file to an affected system. To exploit the flaw, an attacker must have netadmin privileges, which Cisco said would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco has observed limited cases where exploitation resulted in configuration changes being pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco has not yet released patches for CVE-2026-20245, but advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14. The company shared indicators of compromise and told administrators to check the SD-WAN /var/log/scripts.log file for attempts to upload tenant configuration data to vSmart controllers. Cisco also said customers can open a case with Cisco TAC and should generate an admin-tech file first to support review.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco warned that CVE-2026-20245, a high-severity zero-day in Cisco Catalyst SD-WAN Manager, is unpatched and being actively exploited in attacks. The vulnerability can enable root privilege escalation on affected systems. Cisco Catalyst SD-WAN Manager, formerly known as SD-WAN vManage, is used by administrators to monitor and manage up to 6,000 Catalyst SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects all deployment types listed by Cisco, including On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP). Cisco said the vulnerability stems from insufficient validation of user-supplied input. A local attacker with low privileges can exploit it to execute arbitrary commands as root.\u003c/p\u003e\n\n\u003cp\u003eCisco explained that exploitation involves uploading a crafted file to the affected system, enabling command injection and privilege escalation to the root user. The company said attackers must have netadmin privileges on the affected system to exploit CVE-2026-20245. Cisco stated that such access would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127, and that it is not aware of successful exploitation by other methods.\u003c/p\u003e\n\n\u003cp\u003eCisco’s Product Security Incident Response Team became aware of exploitation in June after Mandiant, a Google Cloud cybersecurity subsidiary, reported the flaw. The article says Mandiant did not share any details. Cisco said it observed limited cases where exploitation of the bug resulted in a configuration change pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco has not yet released patches for CVE-2026-20245. It advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14 and shared indicators of compromise. Administrators were advised to check the SD-WAN /var/log/scripts.log file for attempts to upload tenant configuration data to vSmart controllers, and Cisco said customers can open a case with Cisco TAC after generating an admin-tech file.\u003c/p\u003e\n\n\u003cp\u003eThe article places CVE-2026-20245 alongside several other recently exploited Cisco Catalyst SD-WAN vulnerabilities. These include CVE-2026-20182, CVE-2026-20133, CVE-2026-20128, CVE-2026-20122, and CVE-2026-20127. It also states that CISA has tagged 90 Cisco vulnerabilities as abused in the wild over the last several years, including four in Cisco Catalyst SD-WAN Manager and six exploited by ransomware operations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco warned of a high-severity, unpatched zero-day vulnerability in Cisco Catalyst SD-WAN Manager that is being actively exploited in attacks. The vulnerability is tracked as CVE-2026-20245 and can enable root privilege escalation on affected systems.\u003c/p\u003e\n\n\u003cp\u003eCisco Catalyst SD-WAN Manager, formerly known as SD-WAN vManage, is network management software used by administrators to monitor and manage up to 6,000 Catalyst SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"affected-deployments\"\u003eAffected deployments\u003c/h2\u003e\n\n\u003cp\u003eCisco said CVE-2026-20245 affects all deployment types of Cisco Catalyst SD-WAN Manager, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-Prem Deployment\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud (Cisco Managed)\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government (FedRAMP)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eCisco said the vulnerability stems from insufficient validation of user-supplied input. The company said the flaw can allow local attackers with low privileges to execute arbitrary commands as root.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, an attacker can exploit the vulnerability by uploading a crafted file to an affected system. A successful exploit can allow command injection attacks and privilege escalation to the root user.\u003c/p\u003e\n\n\u003cp\u003eCisco also stated that exploitation requires netadmin privileges on the affected system. The company said this would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco said it is not aware of successful exploitation by other methods.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-observed-impact\"\u003eExploitation and observed impact\u003c/h2\u003e\n\n\u003cp\u003eCisco said CVE-2026-20245 is being actively exploited in attacks. Cisco’s Product Security Incident Response Team became aware of exploitation in June after Mandiant, a Google Cloud cybersecurity subsidiary, reported the flaw. The article says Mandiant did not share any details.\u003c/p\u003e\n\n\u003cp\u003eCisco said it has observed limited cases where exploitation of the bug resulted in a configuration change being pushed to edge devices.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of compromise\u003c/h2\u003e\n\n\u003cp\u003eCisco shared indicators of compromise and warned administrators to review the SD-WAN \u003ccode\u003e/var/log/scripts.log\u003c/code\u003e file. The article says administrators should look for attempts to upload tenant configuration data to vSmart controllers in order to escalate privileges through legitimate commands.\u003c/p\u003e\n\n\u003cp\u003eThe article provides the following example log entry:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eApr 15 09:44:57 vmanage vScript: Tenant list upload per vsmart serial number: /usr/bin/vconfd_script_upload_tenant_list.sh -cli path /home/admin/malicious.csv vpn 0\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eCisco said customers who need help determining whether a Cisco Catalyst SD-WAN Manager has been compromised may open a case with Cisco TAC. The company advised administrators to generate an admin-tech file first to assist with the review.\u003c/p\u003e\n\n\u003ch2 id=\"patch-status-and-response-guidance\"\u003ePatch status and response guidance\u003c/h2\u003e\n\n\u003cp\u003eCisco has not yet released patches for CVE-2026-20245. While patches for this vulnerability are not available, Cisco advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that CVE-2026-20182 is a maximum-severity Catalyst SD-WAN Controller authentication bypass flaw that Cisco previously tagged as actively exploited as a zero-day to gain administrative privileges on unpatched devices.\u003c/p\u003e\n\n\u003ch2 id=\"related-cisco-sd-wan-exploitation-activity\"\u003eRelated Cisco SD-WAN exploitation activity\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several other Cisco Catalyst SD-WAN vulnerabilities that have recently been flagged as exploited:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn February, Cisco patched CVE-2026-20133, a Catalyst SD-WAN Manager information disclosure flaw that CISA later flagged as actively exploited in late April.\u003c/li\u003e\n\u003cli\u003eTwo weeks after that CISA warning, Cisco warned that CVE-2026-20128 and CVE-2026-20122 were being abused in the wild.\u003c/li\u003e\n\u003cli\u003eIn March, Cisco addressed and flagged CVE-2026-20127, a critical authentication-bypass vulnerability that had been exploited in zero-day attacks since at least 2023.\u003c/li\u003e\n\u003cli\u003eLast month, Cisco tagged CVE-2026-20182 as an actively exploited zero-day affecting Catalyst SD-WAN Controller.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-cisco-vulnerability-context\"\u003eBroader Cisco vulnerability context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that, over the last several years, CISA has tagged 90 Cisco vulnerabilities as abused in the wild. Four of those were in Cisco Catalyst SD-WAN Manager, and six others were exploited by ransomware operations.\u003c/p\u003e\n","keyPoints":["Cisco warned that CVE-2026-20245 is a high-severity, unpatched zero-day in Cisco Catalyst SD-WAN Manager that is being actively exploited to enable root privilege escalation.","The vulnerability affects all deployment types, including On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP).","Cisco said the flaw stems from insufficient validation of user-supplied input and can allow local attackers with netadmin privileges to upload a crafted file and execute arbitrary commands as root.","Cisco has not yet released patches for CVE-2026-20245, but advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14.","Cisco shared indicators of compromise and advised administrators to check the SD-WAN /var/log/scripts.log file for attempts to upload tenant configuration data to vSmart controllers."],"insights":["Exploitation of CVE-2026-20245 requires netadmin privileges, and Cisco said attackers may obtain those privileges through valid credentials or by exploiting CVE-2026-20182 or CVE-2026-20127.","Cisco observed limited cases where exploitation resulted in configuration changes being pushed to edge devices, making downstream device configuration review relevant after suspected compromise.","Administrators can look for a specific compromise pattern in /var/log/scripts.log involving tenant configuration data uploads to vSmart controllers, such as use of vconfd_script_upload_tenant_list.sh with a suspicious CSV path.","Cisco recommended generating an admin-tech file before opening a Cisco TAC case to help determine whether a Catalyst SD-WAN Manager has been compromised.","The new unpatched zero-day appears in a broader pattern of recent Catalyst SD-WAN Manager exploitation, with Cisco and CISA previously flagging multiple related SD-WAN flaws as exploited in the wild."],"referencedReports":[{"title":"Cisco Catalyst SD-WAN Manager Privilege Escalation Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-privesc-4uxFrdzx","publisher":"Cisco","context":"The article cites Cisco's security advisory as the source explaining how CVE-2026-20245 can be exploited and what privileges are required.","category":"","primary":false}],"body":"\u003cp\u003eCisco warned of a high-severity, unpatched zero-day vulnerability in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, that is being actively exploited in attacks. The flaw enables local attackers with low privileges to execute arbitrary commands as root. Cisco said the vulnerability affects all deployment types, including on-premises, cloud, Cisco-managed cloud, and government FedRAMP deployments.\u003c/p\u003e\n\n\u003cp\u003eCisco said the issue is caused by insufficient validation of user-supplied input and can be exploited by uploading a crafted file to an affected system. To exploit the flaw, an attacker must have netadmin privileges, which Cisco said would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco has observed limited cases where exploitation resulted in configuration changes being pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco has not yet released patches for CVE-2026-20245, but advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14. The company shared indicators of compromise and told administrators to check the SD-WAN /var/log/scripts.log file for attempts to upload tenant configuration data to vSmart controllers. Cisco also said customers can open a case with Cisco TAC and should generate an admin-tech file first to support review.\u003c/p\u003e\n"},{"n":2,"title":"Hackers Exploit Critical Everest Forms Pro WordPress Plugin Flaw to Take Over Sites","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/hackers-exploit-critical-everest-forms.html","time":"08:38","priority":"MUST READ","score":92,"tldr":"Attackers are actively exploiting CVE-2026-3300, a critical unauthenticated RCE flaw in Everest Forms Pro for WordPress, to take over vulnerable sites by creating rogue admin accounts and deploying persistence. Site owners should update to version 1.9.13 or later immediately and check for signs of compromise.","briefOverview":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-3300, a critical remote code execution vulnerability in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The flaw affects all versions up to and including 1.9.12, and a patch was released on March 18, 2026, in version 1.9.13. Wordfence said exploitation has been observed since April 13, 2026, with more than 29,300 exploit attempts blocked to date.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability stems from the Calculation Addon\u0026rsquo;s process_filter() function concatenating user-submitted form field values into a PHP code string without proper escaping before passing it to eval(). Wordfence said unauthenticated attackers can inject and execute arbitrary PHP code when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature and accepts crafted values in string-type fields. Successful exploitation can enable rogue administrator account creation, web shell deployment, and persistence on compromised servers.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Sansec research on skimmer campaigns abusing trusted services such as Stripe, Google Tag Manager, and Google Firestore for command-and-control and data exfiltration. One campaign uses Stripe customer metadata to host skimmer code and stores stolen payment data as Stripe customer records. Sansec also reported the GorgonAgora operation, involving 5,714 fake .shop storefronts impersonating major brands and exfiltrating card data to a single skimmer server in Moldova.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors are actively exploiting a critical vulnerability in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The flaw is tracked as CVE-2026-3300 and has a CVSS score of 9.8. It affects all plugin versions up to and including 1.9.12, while version 1.9.13, released on March 18, 2026, contains the patch.\u003c/p\u003e\n\n\u003cp\u003eWordfence attributed the bug to the Calculation Addon\u0026rsquo;s process_filter() function, which concatenates user-submitted form field values into a PHP code string without proper escaping before passing it to eval(). The article states that sanitize_text_field() does not escape single quotes or other PHP code context characters. As a result, unauthenticated attackers can inject and execute arbitrary PHP code by submitting crafted values in string-type form fields when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation can lead to complete site compromise. The article says attackers could create rogue administrator accounts, deploy web shells, and open other ways to burrow deeper into the server and establish persistent footholds. Wordfence reported that attackers have been observed exploiting the flaw since April 13, 2026.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wordfence, more than 29,300 exploit attempts targeting the vulnerability have been blocked to date, including 16 attempts in the most recent 24-hour period cited by the article. The most common payload attempts to create an administrator account named \u0026ldquo;diksimarina\u0026rdquo; with the email address \u0026ldquo;diksimarina@gmail.com.\u0026rdquo; The article lists several source IP addresses associated with attack attempts, including 202.56.2.126, 209.146.60.26, 15.235.166.18, 2402:1f00:8000:800::40db, and 185.78.165.153.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure is paired with Sansec findings on multiple web skimmer campaigns that abuse trusted services for command-and-control and exfiltration. One campaign uses Google Tag Manager and Stripe domains, specifically googletagmanager.com and api.stripe.com, which the article says are often trusted by online stores. On Magento and Adobe Commerce checkout pages, the malicious code extracts an obfuscated skimmer from a Stripe customer account metadata field and exfiltrates captured payment and billing data back to the attacker\u0026rsquo;s Stripe account.\u003c/p\u003e\n\n\u003cp\u003eSansec also identified a second loader variant that uses Google Firestore instead of Stripe, with the same broader goal of abusing trusted services as covert channels. The article additionally describes GorgonAgora, a campaign involving 5,714 fake .shop storefronts impersonating brands including Starbucks, Ford, Sony, Mattel, Hasbro, Lego, Disney, and Toyota. Those stores use the same Medusa.js commerce stack and a custom checkout SDK that renders a fake Stripe iframe and sends stolen card data over an encrypted WebSocket to a single server in Moldova.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors are actively exploiting a critical security flaw in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The vulnerability is tracked as CVE-2026-3300 and carries a CVSS score of 9.8. It is a remote code execution bug affecting all versions of the plugin up to and including 1.9.12.\u003c/p\u003e\n\n\u003cp\u003eA patch for the flaw was released on March 18, 2026, in Everest Forms Pro version 1.9.13. Wordfence said attackers have been observed exploiting the vulnerability starting April 13, 2026. The article states that exploitation can lead to complete site compromise.\u003c/p\u003e\n\n\u003ch2 id=\"technical-cause-of-cve-2026-3300\"\u003eTechnical Cause of CVE-2026-3300\u003c/h2\u003e\n\n\u003cp\u003eWordfence said the vulnerability is caused by the Calculation Addon\u0026rsquo;s process_filter() function. According to the article, the function concatenates user-submitted form field values into a PHP code string without proper escaping before passing the string to eval().\u003c/p\u003e\n\n\u003cp\u003eThe article states that the sanitize_text_field() function applied to input does not escape single quotes or other PHP code context characters. This makes it possible for unauthenticated attackers to inject and execute arbitrary PHP code on the server. The attack path involves submitting a crafted value in a string-type form field when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature.\u003c/p\u003e\n\n\u003cp\u003eThe affected field types named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003etext\u003c/li\u003e\n\u003cli\u003eemail\u003c/li\u003e\n\u003cli\u003eURL\u003c/li\u003e\n\u003cli\u003eselect\u003c/li\u003e\n\u003cli\u003eradio\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-of-successful-exploitation\"\u003eImpact of Successful Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe article says successful exploitation could allow unauthenticated attackers to execute arbitrary PHP code on the server. This can permit attackers to take actions that lead to full compromise of the WordPress site.\u003c/p\u003e\n\n\u003cp\u003eSpecific post-exploitation outcomes described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ecreating rogue administrator accounts\u003c/li\u003e\n\u003cli\u003edeploying web shells\u003c/li\u003e\n\u003cli\u003eopening other ways to burrow deeper into the server\u003c/li\u003e\n\u003cli\u003eestablishing persistent footholds\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-activity-reported-by-wordfence\"\u003eExploitation Activity Reported by Wordfence\u003c/h2\u003e\n\n\u003cp\u003eWordfence reported that attackers have been exploiting the flaw since April 13, 2026. More than 29,300 exploit attempts targeting the defect have been blocked to date. Of those, 16 attack attempts occurred in the last 24 hours referenced by the article.\u003c/p\u003e\n\n\u003cp\u003eThe article says the most common payload involves attempts to create an administrator account with the following details:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsername: diksimarina\u003c/li\u003e\n\u003cli\u003eEmail address: diksimarina@gmail.com\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attack attempts have originated from the following IP addresses listed in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e202.56.2.126\u003c/li\u003e\n\u003cli\u003e209.146.60.26\u003c/li\u003e\n\u003cli\u003e15.235.166.18\u003c/li\u003e\n\u003cli\u003e2402:1f00:8000:800::40db\u003c/li\u003e\n\u003cli\u003e185.78.165.153\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-product-and-response\"\u003eAffected Product and Response\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Everest Forms Pro for WordPress. The vulnerability impacts all versions up to and including 1.9.12. Version 1.9.13, released on March 18, 2026, patches the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor or group behind the Everest Forms Pro exploitation. It describes the activity broadly as being carried out by threat actors and unauthenticated attackers.\u003c/p\u003e\n\n\u003ch2 id=\"sansec-findings-on-skimmer-campaigns\"\u003eSansec Findings on Skimmer Campaigns\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses Sansec research on multiple skimmer campaigns. One campaign uses Stripe as both a command-and-control server and a data exfiltration sink. Sansec said the attacker treats Stripe as free infrastructure rather than as a way to launder charges.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, Stripe provides the attackers with a writable database for stolen cards and a code-hosting endpoint for the skimmer. The article says both are behind a domain that Content Security Policy rules and network filters often trust by default.\u003c/p\u003e\n\n\u003ch2 id=\"stripe-and-google-tag-manager-abuse\"\u003eStripe and Google Tag Manager Abuse\u003c/h2\u003e\n\n\u003cp\u003eThe skimmer campaign relies on Google Tag Manager and Stripe domains. The specific domains named are googletagmanager.com and api.stripe.com. The article says these domains are both trusted implicitly by online stores.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code is loaded from a Google Tag Manager container and executed on every page that loads it. On Magento and Adobe Commerce checkout pages, the code extracts an obfuscated skimmer from a Stripe customer account metadata field. The Stripe customer account identifier cited in the article is \u0026ldquo;cus_TfFjAAZQNOYENR.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe campaign captures information entered by users, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003efinancial information\u003c/li\u003e\n\u003cli\u003ebilling addresses\u003c/li\u003e\n\u003cli\u003eemail addresses\u003c/li\u003e\n\u003cli\u003ephone numbers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this data is saved to localStorage and then exfiltrated back to the attacker\u0026rsquo;s Stripe account. Sansec said every stolen card becomes a \u0026ldquo;customer\u0026rdquo; in the attacker\u0026rsquo;s account. On successful exfiltration, the loader deletes the localStorage entry so the same record is not sent twice.\u003c/p\u003e\n\n\u003cp\u003eSansec said the attacker can later list stolen cards by calling the same API with the same key. The article states that the Stripe customer database becomes a free, durable exfiltration sink.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-variant-using-google-firestore\"\u003eTimeline and Variant Using Google Firestore\u003c/h2\u003e\n\n\u003cp\u003eThe Stripe customer record containing the skimmer was created on December 24, 2025. The article says this indicates the operation may have been active since then.\u003c/p\u003e\n\n\u003cp\u003eSansec also identified a second variant of the loader that uses Google Firestore instead of Stripe. The article says the end goal is the same: abusing a trusted service as a covert channel that is unlikely to be blocked by e-commerce stores.\u003c/p\u003e\n\n\u003ch2 id=\"gorgonagora-fake-storefront-operation\"\u003eGorgonAgora Fake Storefront Operation\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes a large-scale operation dubbed GorgonAgora. Sansec said the operation used a cluster of 5,714 fake .shop storefronts impersonating major brands. The brands named include Starbucks, Ford, Sony, Mattel, Hasbro, Lego, Disney, and Toyota.\u003c/p\u003e\n\n\u003cp\u003eThe checkout pages on these fake storefronts funnel stolen card data to a single skimmer server in Moldova. The campaign has been ongoing since August 2025, according to the article.\u003c/p\u003e\n\n\u003cp\u003eSansec said every store in the operation runs the same Medusa.js commerce stack and loads the same custom checkout SDK. The SDK renders a fake Stripe iframe and exfiltrates card data over an encrypted WebSocket to a single server in Moldova.\u003c/p\u003e\n\n\u003ch2 id=\"3d-secure-relay-technique-in-gorgonagora\"\u003e3D Secure Relay Technique in GorgonAgora\u003c/h2\u003e\n\n\u003cp\u003eThe article says GorgonAgora uses WebSocket exfiltration with an AES-256-GCM payload. It also states that the command-and-control system maintains a live 3D Secure relay.\u003c/p\u003e\n\n\u003cp\u003eWhen a victim bank returns a 3D Secure challenge, the operator proxies it back to the shopper through the fake iframe. Sansec said this allows the transaction to complete and keeps the theft invisible.\u003c/p\u003e\n","keyPoints":["Threat actors are actively exploiting CVE-2026-3300, a critical remote code execution flaw in the Everest Forms Pro WordPress plugin, which affects versions up to and including 1.9.12.","Everest Forms Pro version 1.9.13, released on March 18, 2026, patches the vulnerability.","Wordfence said exploitation is possible because the Calculation Addon's process_filter() function concatenates user-submitted form field values into a PHP code string without proper escaping before passing it to eval().","Successful exploitation can allow unauthenticated attackers to execute arbitrary PHP code, create rogue administrator accounts, deploy web shells, and establish persistence on compromised servers.","Sansec reported separate skimmer campaigns that abuse trusted services such as Stripe, Google Tag Manager, and Google Firestore for command-and-control and data exfiltration."],"insights":["Only Everest Forms Pro forms using the \"Complex Calculation\" feature are described as enabling exploitation, making that feature a specific configuration to review in addition to updating the plugin.","Defenders can look for the rogue administrator account name \"diksimarina\" and email address \"diksimarina@gmail.com\" as concrete indicators of compromise tied to observed exploitation.","The Stripe skimmer campaign abuses api.stripe.com and Google Tag Manager because online stores often implicitly trust those domains in Content Security Policy rules and network filters.","Sansec reported that the Stripe skimmer stores stolen card records as Stripe \"customers\" and deletes the localStorage entry after successful exfiltration to avoid sending the same record twice.","The GorgonAgora fake storefront campaign includes a live 3D Secure relay that proxies bank challenges back to victims through a fake Stripe iframe so transactions can complete while card theft remains hidden."],"referencedReports":[{"title":"Attackers Actively Exploiting Critical Vulnerability in Everest Forms Pro Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-critical-vulnerability-in-everest-forms-pro-plugin/","publisher":"Wordfence","context":"The article cites Wordfence for the technical cause of CVE-2026-3300 and details of active exploitation against Everest Forms Pro.","category":"","primary":false},{"title":"Everest Forms Pro \u003c= 1.9.12 - Unauthenticated Remote Code Execution via Calculation Field","url":"https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/everest-forms-pro/everest-forms-pro-1912-unauthenticated-remote-code-execution-via-calculation-field","publisher":"Wordfence","context":"The article links to Wordfence's vulnerability entry when discussing recent attack attempts targeting the Everest Forms Pro flaw.","category":"","primary":false},{"title":"Stripe API Skimmer Infrastructure","url":"https://sansec.io/research/stripe-api-skimmer-infrastructure","publisher":"Sansec","context":"The article cites Sansec's research on skimmer campaigns abusing Stripe as command-and-control infrastructure and a data exfiltration sink.","category":"","primary":false},{"title":"GorgonAgora Fake Storefront Skimming Network","url":"https://sansec.io/research/gorgonagora-fake-storefront-skimming-network","publisher":"Sansec","context":"The article references Sansec's research on the GorgonAgora operation involving thousands of fake .shop storefronts used for payment-card skimming.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-3300, a critical remote code execution vulnerability in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The flaw affects all versions up to and including 1.9.12, and a patch was released on March 18, 2026, in version 1.9.13. Wordfence said exploitation has been observed since April 13, 2026, with more than 29,300 exploit attempts blocked to date.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability stems from the Calculation Addon\u0026rsquo;s process_filter() function concatenating user-submitted form field values into a PHP code string without proper escaping before passing it to eval(). Wordfence said unauthenticated attackers can inject and execute arbitrary PHP code when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature and accepts crafted values in string-type fields. Successful exploitation can enable rogue administrator account creation, web shell deployment, and persistence on compromised servers.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Sansec research on skimmer campaigns abusing trusted services such as Stripe, Google Tag Manager, and Google Firestore for command-and-control and data exfiltration. One campaign uses Stripe customer metadata to host skimmer code and stores stolen payment data as Stripe customer records. Sansec also reported the GorgonAgora operation, involving 5,714 fake .shop storefronts impersonating major brands and exfiltrating card data to a single skimmer server in Moldova.\u003c/p\u003e\n"},{"n":3,"title":"FIFA World Cup 2026 Scams Are Already Live: Fake Sites, Banking Malware, and Stolen Logins","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fifa-world-cup-2026-scams-are-already.html","time":"07:01","priority":"SHOULD READ","score":82,"tldr":"Scammers are already exploiting FIFA World Cup 2026 demand with fake ticket sites, cloned FIFA logins, counterfeit merch, phishing ads, and Android streaming apps carrying banking malware. Fans should use only official FIFA channels, avoid crypto or unofficial sellers, and never install sideloaded streaming apps that request accessibility access.","briefOverview":"\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 fans are already being targeted by a broad fraud wave ahead of the June 11 kickoff. The activity includes thousands of lookalike FIFA domains, cloned login pages, fake ticket offers, counterfeit merchandise, bogus streaming sites, fake betting sites, and lottery emails. The tournament is an attractive target because tickets are scarce, more than six million fans are expected across 16 cities in the United States, Canada, and Mexico, and FIFA received more than 150 million ticket requests in the first 15 days.\u003c/p\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025 and linked more than 300 cloned sites to a Chinese-speaking operation it calls GHOST STADIUM. Those phishing pages closely copy FIFA’s real login experience, mimic its PingIdentity single sign-on flow, and ask victims to reset passwords, which can allow attackers to lock users out and resell tickets tied to their accounts. The operation also uses Facebook ads, Telegram, WhatsApp, search results, and several payment methods, including crypto, which the article identifies as a scam indicator because FIFA’s official ticketing never accepts it.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights mobile banking risk from malicious unofficial streaming apps. ThreatFabric and Kaspersky tied fake streaming apps, including apps pretending to be RojaDirecta, to Android banking trojans such as Massiv and Perseus, which can abuse Android accessibility features to overlay fake login screens, record input, intercept codes, and remotely control the screen. The article advises fans to use only fifa.com, avoid crypto payments and unofficial sellers, be wary of sideloaded streaming apps requesting accessibility access, and avoid sensitive logins on open Wi-Fi in host cities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 fraud is already active days before the June 11 kickoff. The article describes fake FIFA domains, cloned login pages, counterfeit merchandise stores, bogus streaming sites, fake betting sites, lottery emails, and social media scams. The risk is amplified by high demand, with more than six million fans expected across 16 cities in the United States, Canada, and Mexico, and more than 150 million ticket requests submitted to FIFA in the first 15 days.\u003c/p\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025. It identified a Chinese-speaking, financially motivated operation called GHOST STADIUM that runs one phishing kit across more than 300 cloned FIFA sites. The cloned pages are described as near-perfect copies of fifa.com and mimic FIFA’s PingIdentity single sign-on login, including a genuine client ID copied from the live site and images loaded from FIFA’s own servers.\u003c/p\u003e\n\n\u003cp\u003eThe GHOST STADIUM login pages ask victims to reset their passwords after entering credentials. According to the article, that can let attackers lock victims out of their FIFA accounts and resell tickets tied to them. Group-IB said most traffic comes from Facebook ads, with additional links on Telegram, WhatsApp, and search results, and the sites support payment through card entry, outside gateways, money-transfer apps, Mexico-only processors, and a crypto option.\u003c/p\u003e\n\n\u003cp\u003eOther researchers described additional infrastructure and scam types. FortiGuard Labs counted more than 13,000 World Cup-themed domains registered between January and May, with about 8.8% labeled malicious or suspicious, while the FBI advisory listed fake FIFA domains and warned more were coming. Bitdefender found FIFA lottery emails and social media ad campaigns for counterfeit goods and phishing pages, and Fortinet found more than 1,700 spoofed FIFA accounts plus stolen FIFA-related logins in data collected by Vidar, LummaC2, and RedLine.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights malware distributed through unofficial streaming apps. ThreatFabric observed malicious apps pretending to be RojaDirecta, and Kaspersky tied similar fake IPTV apps to Android banking trojans named Massiv and Perseus. These apps can abuse Android accessibility tools to overlay fake bank logins, record typed information, intercept one-time codes from texts and login apps, and control the screen remotely.\u003c/p\u003e\n\n\u003cp\u003eThe recommended user precautions are to buy only through fifa.com, type the address manually, enable multi-factor login, treat crypto payment requests as scams, avoid sideloaded streaming apps that request accessibility access, and avoid logging into bank or email accounts on open Wi-Fi. For security teams, the article recommends monitoring new FIFA-themed domains and lookalike login pages, checking staff and customer logins against Vidar, LummaC2, and RedLine stealer logs, and preparing fraud teams for ticket and chargeback spikes through mid-July. Meta said it is showing warning pop-ups for FIFA ticket searches on Facebook and worked with Visa to take down a Facebook network linked to fake World Cup sites pushing bogus gambling, while the FBI is asking victims to report scams to IC3.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 scams are already active ahead of the June 11 kickoff. The article describes a broad fraud ecosystem targeting fans through fake FIFA sites, stolen logins, fraudulent ticket offers, counterfeit merchandise shops, bogus streaming apps, fake betting sites, lottery emails, spoofed social accounts, and risky public Wi-Fi.\u003c/p\u003e\n\n\u003cp\u003eThe tournament is described as a high-value target because demand is extremely high. More than six million fans are expected across 16 cities in the United States, Canada, and Mexico, and FIFA said it received more than 150 million ticket requests in the first 15 days. The article says scarce tickets, anxious fans, and fast-moving money create conditions that favor fraud.\u003c/p\u003e\n\n\u003ch2 id=\"ghost-stadium-and-cloned-fifa-login-sites\"\u003eGHOST STADIUM and Cloned FIFA Login Sites\u003c/h2\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025. At the center of its findings is a Chinese-speaking, financially motivated group it calls GHOST STADIUM, which runs one phishing kit across more than 300 cloned FIFA sites.\u003c/p\u003e\n\n\u003cp\u003eThe fake pages are described as near-perfect copies of fifa.com. They mimic FIFA’s real single sign-on login, operated by PingIdentity, and copy the genuine client ID from the live site. The pages also load images directly from FIFA’s servers, which makes them look authentic and helps them avoid tools that flag copied images.\u003c/p\u003e\n\n\u003cp\u003eThe key account takeover mechanism described in the article is password reset phishing. The fake login page asks victims to reset their passwords after they enter their details. Once victims do that, attackers can lock them out of their FIFA accounts and resell any tickets tied to those accounts.\u003c/p\u003e\n\n\u003ch2 id=\"traffic-sources-and-payment-methods\"\u003eTraffic Sources and Payment Methods\u003c/h2\u003e\n\n\u003cp\u003eGroup-IB said most traffic to the GHOST STADIUM cluster comes from Facebook ads. The same tracking codes were reused across the cluster, and additional links appeared on Telegram, WhatsApp, and in search results.\u003c/p\u003e\n\n\u003cp\u003eThe fake sites take payment in several ways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect card entry.\u003c/li\u003e\n\u003cli\u003eOutside payment gateways.\u003c/li\u003e\n\u003cli\u003eMoney-transfer apps such as Chime and Nequi.\u003c/li\u003e\n\u003cli\u003eMexico-only payment processors.\u003c/li\u003e\n\u003cli\u003eA crypto option that converts a card payment into cryptocurrency.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies cryptocurrency payment as a strong warning sign because FIFA’s official ticketing never accepts crypto. Group-IB estimated that losses from premium and hospitality ticket fraud alone could range from \u003cspan class=\"math inline\"\u003e\\(71 million to \\)\u003c/span\u003e474 million, while noting those figures are estimates based on visible infrastructure rather than confirmed losses.\u003c/p\u003e\n\n\u003ch2 id=\"wider-fifa-themed-domain-and-social-media-fraud\"\u003eWider FIFA-Themed Domain and Social Media Fraud\u003c/h2\u003e\n\n\u003cp\u003eThe activity is not limited to GHOST STADIUM. FortiGuard Labs counted more than 13,000 World Cup-themed domains registered between January and May, about 8.8% of which were malicious or suspicious. The FBI advisory listed dozens of fake FIFA domains, including misspelled lookalikes and phony FIFA jobs pages, and warned that more were expected.\u003c/p\u003e\n\n\u003cp\u003eOther researchers mapped thousands of additional lookalike sites and more than a thousand fake social accounts. Group-IB also found counterfeit merchandise shops, bogus streaming sites, and fake betting sites that collect passport scans and selfies for identity theft.\u003c/p\u003e\n\n\u003cp\u003eBitdefender separately tracked FIFA lottery emails promising payouts of up to $2 million. The article also notes that a phishing-as-a-service market is selling ready-made scam kits and ticket-buying bots, making takedowns of individual operators less effective.\u003c/p\u003e\n\n\u003ch2 id=\"streaming-apps-and-android-banking-trojans\"\u003eStreaming Apps and Android Banking Trojans\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights malicious unofficial streaming apps as a major risk for fans searching for free match streams. ThreatFabric observed a spike in malicious unofficial streaming apps around the recent Champions League final, many pretending to be the popular RojaDirecta, and expects similar activity at the World Cup on a larger scale.\u003c/p\u003e\n\n\u003cp\u003eKaspersky tied those same apps to Android banking trojans built to steal from banking and crypto apps. The named malware families are Massiv and Perseus. These apps are not on Google Play, so installing them requires users to click past warnings that would normally block them.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, the malware can abuse Android accessibility tools. The article says it can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePlace fake bank login screens over real apps.\u003c/li\u003e\n\u003cli\u003eRecord what the user types.\u003c/li\u003e\n\u003cli\u003eIntercept one-time codes from text messages and login apps.\u003c/li\u003e\n\u003cli\u003eRemotely control the screen.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ePerseus is described as being built on leaked code from an older Trojan called Cerberus. It can also read note-taking apps for saved passwords and crypto recovery phrases. ThreatFabric’s simplest red flag is a streaming app asking for accessibility access, because such an app has no honest reason to need it.\u003c/p\u003e\n\n\u003ch2 id=\"social-scams-and-stolen-credentials\"\u003eSocial Scams and Stolen Credentials\u003c/h2\u003e\n\n\u003cp\u003eBitdefender found more than 55 football-themed ad campaigns on Facebook and Instagram. These campaigns promoted counterfeit kits, fake Panini stickers, and phishing pages. Two merchandise operations were traced back to Chinese operators through ad-tracking tags.\u003c/p\u003e\n\n\u003cp\u003eFortinet counted more than 1,700 spoofed FIFA accounts, nearly 90% of them on Facebook and Instagram. It also found a scheme using fake FIFA job ads and calendar invites to send applicants to a lookalike Google login page.\u003c/p\u003e\n\n\u003cp\u003eThe article says stolen FIFA logins are already circulating. Fortinet found hundreds of thousands of user logins and more than 4,600 FIFA web addresses in data collected by credential-stealing malware including Vidar, LummaC2, and RedLine.\u003c/p\u003e\n\n\u003ch2 id=\"host-city-wi-fi-risks\"\u003eHost-City Wi-Fi Risks\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses public Wi-Fi exposure in host cities. A Kaspersky survey drove around Mexico City, Monterrey, and Guadalajara and found that 10% to 12% of networks were open and password-free. It also found WPS pairing still enabled across nearly half of networks.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, both open networks and WPS exposure create opportunities for rogue “evil twin” hotspots. These hotspots can copy a real network and quietly read its traffic.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-precautions-for-fans\"\u003eRecommended Precautions for Fans\u003c/h2\u003e\n\n\u003cp\u003eThe article gives several direct recommendations for fans:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBuy tickets only through fifa.com.\u003c/li\u003e\n\u003cli\u003eType the address manually instead of trusting an ad or search result.\u003c/li\u003e\n\u003cli\u003eEnable multi-factor login.\u003c/li\u003e\n\u003cli\u003eTreat any seller requesting cryptocurrency as a scam, because FIFA’s ticketing does not accept crypto.\u003c/li\u003e\n\u003cli\u003eAvoid sideloaded streaming apps, especially those requesting Android accessibility access.\u003c/li\u003e\n\u003cli\u003eUse mobile data where possible on open Wi-Fi in host cities.\u003c/li\u003e\n\u003cli\u003eAvoid logging into bank or email accounts on open Wi-Fi.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendations-for-security-teams\"\u003eRecommendations for Security Teams\u003c/h2\u003e\n\n\u003cp\u003eFor security teams, the article describes a straightforward monitoring and fraud-preparation task. Teams should watch for new FIFA-themed domains and lookalike login pages. They should also flag staff or customer logins that appear in Vidar, LummaC2, or RedLine stealer logs.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends preparing fraud teams for ticket and chargeback spikes through mid-July. This aligns with the tournament window described in the article, from June 11 to July 19, when searches for tickets, streams, and travel are expected to peak.\u003c/p\u003e\n\n\u003ch2 id=\"responses-and-remaining-risk\"\u003eResponses and Remaining Risk\u003c/h2\u003e\n\n\u003cp\u003eMeta said it is responding by showing warning pop-ups when people search Facebook for FIFA tickets. It also said it worked with Visa to take down a Facebook network linked to fake World Cup sites pushing bogus gambling. The FBI is asking scam victims to report incidents through IC3.\u003c/p\u003e\n\n\u003cp\u003eThe article ends by emphasizing that the fraud wave may not have fully activated yet. Group-IB counted roughly 3,800 fraudulent FIFA domains that were parked and unused, ready to be switched on. With ready-made scam kits and bots already for sale, the article identifies June 11 to July 19 as the likely peak period for ticket, streaming, and travel-related scams.\u003c/p\u003e\n","keyPoints":["Researchers and the FBI warn that FIFA World Cup 2026 fans are already being targeted by fake FIFA domains, phishing pages, fraudulent ticket offers, counterfeit merchandise shops, bogus streaming sites, and fake betting sites.","Group-IB tracked more than 4,300 fraudulent FIFA domains registered since August 2025 and linked more than 300 cloned FIFA sites to a Chinese-speaking operation it calls GHOST STADIUM.","The GHOST STADIUM phishing pages closely copy FIFA’s real login flow and ask victims to reset their passwords, allowing attackers to lock users out of FIFA accounts and potentially resell tickets tied to them.","ThreatFabric and Kaspersky reported malicious unofficial Android streaming apps impersonating services such as RojaDirecta and delivering banking trojans including Massiv and Perseus, which can abuse Android accessibility features to steal credentials and intercept codes.","Fortinet found hundreds of thousands of user logins and more than 4,600 FIFA web addresses in data collected by credential-stealing malware such as Vidar, LummaC2, and RedLine."],"insights":["FIFA-themed phishing pages can look unusually convincing because some cloned sites load images directly from FIFA’s own servers and copy details from FIFA’s real PingIdentity single sign-on flow.","A request for cryptocurrency payment is a strong fraud indicator because the article states that FIFA’s official ticketing never accepts crypto.","For Android users seeking match streams, a streaming app requesting accessibility access is a clear red flag because the article says such apps have no legitimate reason to need it.","The scam wave may expand quickly during the tournament because Group-IB found roughly 3,800 fraudulent FIFA domains parked and unused, ready to be activated.","Security teams can act before account abuse occurs by checking whether staff or customer logins appear in Vidar, LummaC2, or RedLine stealer logs, as the article says FIFA-related credentials are already circulating there."],"referencedReports":[{"title":"Ghost Stadium: Football Fraud","url":"https://www.group-ib.com/blog/ghost-stadium-football-fraud/","publisher":"Group-IB","context":"The article cites Group-IB as providing the most detailed findings on fraudulent FIFA domains and the GHOST STADIUM phishing operation.","category":"","primary":false},{"title":"Cybercriminals Are Targeting the FIFA World Cup 2026","url":"https://www.fortinet.com/blog/threat-research/cybercriminals-are-targeting-the-fifa-world-cup-2026","publisher":"FortiGuard Labs","context":"The article cites FortiGuard Labs for counts of World Cup-themed domains, spoofed FIFA accounts, fake job ads, and stolen FIFA-related logins.","category":"","primary":false},{"title":"FBI IC3 Public Service Announcement on FIFA World Cup 2026 Scams","url":"https://www.ic3.gov/PSA/2026/PSA260527","publisher":"FBI Internet Crime Complaint Center","context":"The article references an FBI advisory warning about fake FIFA domains and asking victims to report scams to IC3.","category":"","primary":false},{"title":"Before the Whistle: CTM360 Reveals How Cybercriminals Are Targeting the FIFA World Cup 2026","url":"https://thehackernews.com/expert-insights/2026/05/before-whistle-ctm360-reveals-how.html","publisher":"CTM360","context":"The article refers to other researchers mapping thousands of lookalike FIFA sites and more than a thousand fake social accounts.","category":"","primary":false},{"title":"Football Fever Fuels Scam Campaigns Across Email and Social Media","url":"https://www.bitdefender.com/en-us/blog/labs/football-fever-fuels-scam-campaigns-across-email-and-social-media","publisher":"Bitdefender","context":"The article cites Bitdefender research on FIFA lottery emails and football-themed Facebook and Instagram scam campaigns.","category":"","primary":false},{"title":"Own Goal: Piracy as an Attack Vector to Target Football Fans","url":"https://www.threatfabric.com/blogs/own-goal-piracy-as-an-attack-vector-to-target-football-fans","publisher":"ThreatFabric","context":"The article cites ThreatFabric research on malicious unofficial streaming apps tied to football events and expected World Cup targeting.","category":"","primary":false},{"title":"Fake IPTV Apps Spread Android Malware","url":"https://www.kaspersky.com/blog/fake-iptv-apps-spread-android-malware/55872/","publisher":"Kaspersky","context":"The article cites Kaspersky analysis linking fake streaming apps to Android banking trojans including Massiv and Perseus.","category":"","primary":false},{"title":"Wardriving Assessment in Mexico: FIFA World Cup 2026","url":"https://securelist.com/wardriving-assessment-in-mexico-fifa-world-cup-2026/119996/","publisher":"Kaspersky","context":"The article references a Kaspersky survey of Wi-Fi networks in Mexican host cities that found open networks and widespread WPS exposure.","category":"","primary":false}],"body":"\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 fans are already being targeted by a broad fraud wave ahead of the June 11 kickoff. The activity includes thousands of lookalike FIFA domains, cloned login pages, fake ticket offers, counterfeit merchandise, bogus streaming sites, fake betting sites, and lottery emails. The tournament is an attractive target because tickets are scarce, more than six million fans are expected across 16 cities in the United States, Canada, and Mexico, and FIFA received more than 150 million ticket requests in the first 15 days.\u003c/p\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025 and linked more than 300 cloned sites to a Chinese-speaking operation it calls GHOST STADIUM. Those phishing pages closely copy FIFA’s real login experience, mimic its PingIdentity single sign-on flow, and ask victims to reset passwords, which can allow attackers to lock users out and resell tickets tied to their accounts. The operation also uses Facebook ads, Telegram, WhatsApp, search results, and several payment methods, including crypto, which the article identifies as a scam indicator because FIFA’s official ticketing never accepts it.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights mobile banking risk from malicious unofficial streaming apps. ThreatFabric and Kaspersky tied fake streaming apps, including apps pretending to be RojaDirecta, to Android banking trojans such as Massiv and Perseus, which can abuse Android accessibility features to overlay fake login screens, record input, intercept codes, and remotely control the screen. The article advises fans to use only fifa.com, avoid crypto payments and unofficial sellers, be wary of sideloaded streaming apps requesting accessibility access, and avoid sensitive logins on open Wi-Fi in host cities.\u003c/p\u003e\n"}]</script>
