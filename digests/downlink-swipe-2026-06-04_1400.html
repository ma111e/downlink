nsent. The agency also said the companies did not take reasonable measures to protect the information.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FCC, the companies sold the data to aggregators. Those aggregators then sold it to third-party data brokers. The FCC said each carrier attempted to shift its obligation to obtain customer consent onto downstream recipients of location information, and that in many instances this meant no valid customer consent was obtained.\u003c/p\u003e\n\n\u003ch2 id=\"company-responses-cited-in-the-article\"\u003eCompany responses cited in the article\u003c/h2\u003e\n\n\u003cp\u003eWhen the fines were first issued in 2024, AT\u0026amp;T said the FCC’s order lacked both legal and factual merit. AT\u0026amp;T said the order unfairly held it responsible for another company’s violation of contractual requirements to obtain consent. AT\u0026amp;T also said the FCC ignored steps it took to address that company’s failures and punished it for supporting location-based services such as emergency medical alerts and roadside assistance.\u003c/p\u003e\n\n\u003cp\u003eA Verizon spokesperson said at the time that the company was deeply committed to protecting customer privacy. Verizon said that when one bad actor gained unauthorized access to information relating to a very small number of customers, the company quickly cut off the fraudster, shut down the program, and worked to prevent it from happening again.\u003c/p\u003e\n\n\u003ch2 id=\"investigation-and-disclosed-impact\"\u003eInvestigation and disclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe FCC fines followed the release of an investigation by Sen. Ron Wyden of Oregon. The investigation showed that a government contractor bought the location data and created a self-service website. According to the article, law enforcement used that website to obtain location data for any phone in the country without a court order.\u003c/p\u003e\n\n\u003cp\u003eWyden said that no one who signed up for a cell plan thought they were giving permission for their phone company to sell a detailed record of their movements to anyone with a credit card.\u003c/p\u003e\n\n\u003ch2 id=\"significance-stated-by-the-article\"\u003eSignificance stated by the article\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central significance is that the Supreme Court upheld the legality of the FCC’s fines against telecom companies over the sharing of consumer location data without consent. It also upheld the FCC’s use of forfeiture orders in this case without the involvement of a jury. The article ties the enforcement action to privacy concerns around the sale of phone location data through aggregators and third-party data brokers.\u003c/p\u003e\n","keyPoints":["The Supreme Court ruled 8-1 that the FCC acted legally when it issued nearly $200 million in fines against telecommunications companies accused of sharing access to consumers’ location data without consent.","Chief Justice John Roberts wrote that the FCC’s factual findings are not conclusive, so issuing forfeiture orders without a jury does not violate the Constitution.","Verizon was fined nearly $47 million, AT\u0026T more than $57 million, and T-Mobile previously failed to overturn a $92 million penalty against it and Sprint in federal appeals court.","The FCC said the companies did not take reasonable measures to protect consumers’ location information and attempted to shift consent obligations to downstream recipients.","The FCC fines followed Sen. Ron Wyden’s investigation showing that a government contractor bought the data and created a self-service website law enforcement used to obtain phone location data without a court order."],"insights":["The ruling indicates that telecom companies cannot avoid FCC forfeiture orders solely by arguing that the agency’s standalone fine process denies them a jury trial.","The FCC treated carriers’ reliance on downstream partners to obtain customer consent as insufficient, making clear that contractual delegation did not shield the carriers from liability.","The case shows that commercial location-data sharing can create direct law-enforcement access paths outside court-order processes when data is resold through aggregators and brokers.","AT\u0026T’s defense emphasized that some location-sharing programs supported services such as emergency medical alerts and roadside assistance, but the FCC penalties still focused on consent and data-protection failures."],"referencedReports":[],"body":"\u003cp\u003eThe Supreme Court ruled 8-1 that the Federal Communications Commission acted legally when it issued nearly $200 million in fines against telecommunications companies accused of sharing access to consumers’ location data without consent. The decision covered fines levied against AT\u0026amp;T and Verizon in April 2024 and rejected the companies’ argument that the agency’s standalone process for imposing fines violated their jury trial rights. Chief Justice John Roberts wrote that the FCC’s factual findings are not conclusive, so the Commission can issue forfeiture orders without a jury.\u003c/p\u003e\n\n\u003cp\u003eThe FCC said the companies failed to obtain consent for sharing consumers’ location data and did not take reasonable measures to protect the information. The agency alleged that carriers sold the data to aggregators, which then sold it to third-party data brokers, while the carriers attempted to shift consent obligations to downstream recipients. The fines followed Sen. Ron Wyden’s investigation showing that a government contractor bought the data and created a self-service website that law enforcement used to obtain location data for any phone in the country without a court order.\u003c/p\u003e\n"},{"n":3,"title":"Hackers Are After the Gaps in Your Vulnerability Program: Here's Their Playbook","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/hackers-are-after-the-gaps-in-your-vulnerability-program-heres-their-playbook/","time":"14:01","priority":"MAY READ","score":55,"tldr":"Underground forums are teaching novice hackers a simple workflow to find, validate, and monetize exposed vulnerabilities using public tools, lowering the barrier to real-world exploitation. Defenders should prioritize reachable critical flaws, neglected legacy systems, and effective vulnerability disclosure programs before attackers act.","briefOverview":"\u003cp\u003eFlare researchers analyzed an underground forum thread titled “Hacking for Profit. Working method,” written by an actor using the name “Hercules.” The post explains a simplified workflow for scanning, detecting, assessing, exploiting, and monetizing vulnerabilities in the wild. Its significance is that it turns vulnerability exploitation into a clear, action-oriented process aimed at beginners.\u003c/p\u003e\n\n\u003cp\u003eThe tutorial focuses on newly disclosed high-impact vulnerabilities such as remote code execution, authentication bypass, account takeover, IDOR, and data exposure. It also highlights use of the Nuclei framework by ProjectDiscovery and separates the process into “legal” and “illegal” paths. The article says this lets readers decide whether to pursue vulnerability disclosure or hacking.\u003c/p\u003e\n\n\u003cp\u003eThe forum response showed demand for practical mentorship, with users thanking Hercules, asking for private contact, and describing themselves as beginners who wanted help applying theory. The same method was reposted and discussed across four additional forums. For defenders, the article stresses critical reachable vulnerabilities, older unpatched systems, and paid vulnerability disclosure programs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFlare researchers examined a forum thread titled “Hacking for Profit. Working method,” authored by a threat actor using the name “Hercules.” The post is described as not especially long or technical, but valuable because it breaks a complex exploitation process into clear, actionable steps. It covers how to scan, detect, assess, exploit, and monetize vulnerabilities in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe tutorial begins with advice on finding newly disclosed vulnerabilities, particularly high-impact classes such as remote code execution, authentication bypass, account takeover, IDOR, and data exposure. It then moves into identifying exposed systems, validating whether they may be vulnerable, and deciding whether the result should be reported, sold, or exploited. The article highlights the use of the Nuclei framework by ProjectDiscovery as one of the notable technical elements.\u003c/p\u003e\n\n\u003cp\u003eThe article says the tutorial is effective because of its accessibility rather than a novel technical trick. Hercules writes in plain language and argues that many tutorials focus too much on computer science, operating systems, programming, or scanner parameters, while beginners want to take practical action. Public tools, community templates, automation, and AI assistance are presented as ways to reduce the barrier for novice actors.\u003c/p\u003e\n\n\u003cp\u003eFlare observed that the thread generated sustained engagement over several months. Multiple users thanked Hercules, asked to connect privately, described themselves as beginners, or requested guidance on moving from theoretical learning to practical hacking. The same method was reposted and discussed across four additional forums, suggesting that its influence extended beyond the original post.\u003c/p\u003e\n\n\u003cp\u003eThe monetization section describes several outcomes after discovering a vulnerability: asking the affected owner or hosting provider for payment in exchange for disclosure, selling the finding on underground markets, or exploiting the vulnerability and inspecting the server. Hercules also suggests that an actor could approach the victim and sell the information elsewhere at the same time. The article notes that remote code execution, account takeover, IDOR, and data leak vulnerabilities are framed as assets that can be sold quickly.\u003c/p\u003e\n\n\u003cp\u003eFor defenders, the article says the thread reinforces the importance of prioritizing critical and reachable vulnerabilities, including those targeted by automated botnets soon after disclosures and proof-of-concept releases. It also emphasizes the long tail of old vulnerabilities on legacy servers and outdated Drupal or WordPress sites. The article argues that paid vulnerability disclosure programs matter because payment may give actors more motivation to disclose findings, which can help organizations mitigate risk.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eFlare researchers analyzed an underground forum thread titled “Hacking for Profit. Working method,” written by a threat actor using the name “Hercules.” The article describes the post as relatively short and not especially technical, but important because it breaks vulnerability exploitation into a practical, step-by-step workflow.\u003c/p\u003e\n\n\u003cp\u003eThe thread covers how to scan, detect, assess, exploit, and monetize vulnerabilities in the wild. According to the article, its value lies in making a complex process accessible to novice threat actors and showing how vulnerability discovery can be turned into a repeatable money-making process.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-forum-tutorial-describes\"\u003eWhat the Forum Tutorial Describes\u003c/h2\u003e\n\n\u003cp\u003eHercules explains how to monetize vulnerability discovery in real-world exposed systems. The process begins with searching for newly disclosed vulnerabilities, especially high-impact categories such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemote code execution\u003c/li\u003e\n\u003cli\u003eAuthentication bypass\u003c/li\u003e\n\u003cli\u003eAccount takeover\u003c/li\u003e\n\u003cli\u003eIDOR\u003c/li\u003e\n\u003cli\u003eData exposure\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe tutorial then moves through identifying exposed systems, validating whether those systems may be vulnerable, and deciding what to do with the results. The possible paths include reporting the issue, selling it, or exploiting it.\u003c/p\u003e\n\n\u003ch2 id=\"notable-technical-and-operational-elements\"\u003eNotable Technical and Operational Elements\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights three aspects of the tutorial as especially notable.\u003c/p\u003e\n\n\u003cp\u003eFirst, the tutorial uses the Nuclei framework by ProjectDiscovery, which the article describes as highly popular among offensive security practitioners. Second, the post reflects an understanding of the difficulty defenders face when patching newly disclosed vulnerabilities. The article references an educational Aqua Security blog titled “50 shades of vulnerabilities: Uncovering Flaws in Open-Source Vulnerability Disclosure” as further discussion of those patching challenges.\u003c/p\u003e\n\n\u003cp\u003eThird, the tutorial is split into “legal” and “illegal” parts. The article explains that this structure allows readers to stop at different stages and choose whether to move from vulnerability disclosure into hacking.\u003c/p\u003e\n\n\u003ch2 id=\"accessibility-as-the-core-appeal\"\u003eAccessibility as the Core Appeal\u003c/h2\u003e\n\n\u003cp\u003eThe article says the most effective part of the tutorial is not a technical trick, but its tone. Hercules writes in plain language and frames the process as something that can be learned through action.\u003c/p\u003e\n\n\u003cp\u003eHercules argues that many tutorials focus too heavily on computer science, operating systems, programming, or scanner parameters. By contrast, the audience he addresses wants to “hack,” “break in,” and “gain access.”\u003c/p\u003e\n\n\u003cp\u003eThe post also suggests that users do not need to be advanced software engineers to begin. Public tools, community templates, automation, and AI assistance are presented as ways to lower the barrier, while programming skills are described as useful but not mandatory.\u003c/p\u003e\n\n\u003ch2 id=\"forum-reaction-and-spread\"\u003eForum Reaction and Spread\u003c/h2\u003e\n\n\u003cp\u003eFlare researchers reviewed the original post and responses over several months. The article says the activity around the thread shows its influence was not limited to the original post.\u003c/p\u003e\n\n\u003cp\u003eMultiple users thanked Hercules, asked to connect privately, described themselves as beginners, or said they wanted guidance on moving from theory to practical hacking. Some users said they had completed hacking courses but still could not apply the material in the real world, while another said they did not know how to program and asked whether that would be a problem.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the method was reposted and discussed across four additional forums. This broader spread indicates that the tutorial resonated beyond its original thread.\u003c/p\u003e\n\n\u003ch2 id=\"monetization-paths-described\"\u003eMonetization Paths Described\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the monetization section as one of the most intriguing parts of the method. Hercules describes several actions students can take after discovering a vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThose options include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproaching the owner of the server or website, or the hosting company, and asking for payment in exchange for vulnerability information.\u003c/li\u003e\n\u003cli\u003eOffering the finding on underground markets.\u003c/li\u003e\n\u003cli\u003eExploiting the vulnerability and detecting what is on the server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Hercules even suggests that an actor could approach the victim and sell the information elsewhere at the same time. It also notes that Hercules describes himself as a hacker rather than a fraudster and says he prefers to sell quickly instead of conducting downstream fraud.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-classes-as-assets\"\u003eVulnerability Classes as Assets\u003c/h2\u003e\n\n\u003cp\u003eThe tutorial frames certain vulnerability types as assets that can be monetized. Remote code execution is described as something that can become access sold to botnet operators, used for illicit resource abuse, or leveraged for data theft.\u003c/p\u003e\n\n\u003cp\u003eAccount takeover, IDOR, and data leak vulnerabilities are also framed as findings that can be sold quickly. The article presents this monetization logic as part of the reason the tutorial is appealing to beginner actors.\u003c/p\u003e\n\n\u003ch2 id=\"soft-recruitment-and-mentorship-dynamic\"\u003eSoft Recruitment and Mentorship Dynamic\u003c/h2\u003e\n\n\u003cp\u003eThe forum replies showed demand for practical mentorship. Users asked for private contact, guidance, and additional material. Some said they were blocked by forum limitations and could not yet send private messages.\u003c/p\u003e\n\n\u003cp\u003eThe article says the post functioned as a soft recruitment channel because Hercules repeatedly invited users to contact him privately. It also notes that the long tail of engagement matters because a simple, motivational workflow can remain relevant for months without depending on a single vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-thread-matters-for-threat-intelligence\"\u003eWhy the Thread Matters for Threat Intelligence\u003c/h2\u003e\n\n\u003cp\u003eThe article says the thread is valuable from a threat intelligence perspective even without unique indicators. It shows how newer actors are taught to think, what vulnerability classes they are encouraged to prioritize, and how experienced forum members convert curiosity into participation.\u003c/p\u003e\n\n\u003cp\u003eThe post teaches a reusable mindset: monitor new flaws, find exposed systems, validate, monetize, and repeat. The article emphasizes that this kind of simplified workflow can attract a broader audience than a highly technical exploit write-up.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-implications\"\u003eDefensive Implications\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three main lessons for vulnerability management programs.\u003c/p\u003e\n\n\u003cp\u003eFirst, critical and reachable vulnerabilities are highly targeted. The article notes that automated botnets are updated minutes after new vulnerabilities are disclosed and proof-of-concept code is released, and that novice hackers are also being trained to treat these as high-value targets.\u003c/p\u003e\n\n\u003cp\u003eSecond, old vulnerabilities remain important. Legacy servers and old Drupal or WordPress sites with vulnerabilities from 2019 are described as targets that novice hackers may exploit.\u003c/p\u003e\n\n\u003cp\u003eThird, paid vulnerability disclosure programs matter. The article argues that if actors are paid, they may have more motivation to disclose vulnerabilities. It also says that even if they sell the information on the dark web, once the vulnerability is disclosed, the organization can probably mitigate the risk.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance\"\u003eBroader Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the thread is not important because it introduces a new hacking technique. Instead, it matters because it shows how cybercrime scales through simplification.\u003c/p\u003e\n\n\u003cp\u003eHercules turns a complex topic into a practical business workflow that beginners can understand. The replies show that users who were unsure, inexperienced, or frustrated by theory responded with interest.\u003c/p\u003e\n\n\u003cp\u003eThe article states that cybercriminal capability grows not only through elite malware development or zero-day exploitation, but also through accessible tutorials, mentorship, public tooling, and communities that make illegal activity feel achievable.\u003c/p\u003e\n","keyPoints":["A forum post by a threat actor using the name \"Hercules\" explains how to search for newly disclosed vulnerabilities, identify exposed systems, validate whether they may be vulnerable, and decide whether to report, sell, or exploit the findings.","Flare researchers found that the thread drew sustained engagement from users who thanked Hercules, requested private contact or mentorship, described themselves as beginners, and sought guidance on applying hacking knowledge in practice.","The tutorial highlights the Nuclei framework, discusses defender challenges in patching newly disclosed vulnerabilities, and separates its workflow into legal and illegal paths.","Hercules describes monetization options including asking affected owners or hosting companies for payment, selling findings on underground markets, or exploiting vulnerabilities to inspect what is on a server.","The article says defenders should focus on critical reachable vulnerabilities, the long tail of old vulnerabilities on legacy systems, and paid vulnerability disclosure programs."],"insights":["The article emphasizes that the tutorial’s influence came less from technical novelty and more from making vulnerability exploitation feel accessible to beginners through plain language, motivation, and a reusable workflow.","The thread functioned as a soft recruitment or mentorship channel because Hercules repeatedly invited private contact and multiple users asked for direct guidance after reading the post.","The same workflow was reposted and discussed across four additional forums, showing that simple operational playbooks can spread beyond their original community even without containing unique indicators or new techniques.","The article highlights paid vulnerability disclosure programs as a practical defensive lever because attackers may be more motivated to disclose findings if they expect compensation, reducing risk even if they also consider selling the information elsewhere."],"referencedReports":[{"title":"50 shades of vulnerabilities: Uncovering Flaws in Open-Source Vulnerability Disclosure","url":"https://www.aquasec.com/blog/50-shades-of-vulnerabilities-uncovering-flaws-in-open-source-vulnerability-disclosures/","publisher":"Aqua Security","context":"The article cites this educational blog as further discussion of the challenges defenders face when patching newly discovered vulnerabilities.","category":"","primary":false}],"body":"\u003cp\u003eFlare researchers analyzed an underground forum thread titled “Hacking for Profit. Working method,” written by an actor using the name “Hercules.” The post explains a simplified workflow for scanning, detecting, assessing, exploiting, and monetizing vulnerabilities in the wild. Its significance is that it turns vulnerability exploitation into a clear, action-oriented process aimed at beginners.\u003c/p\u003e\n\n\u003cp\u003eThe tutorial focuses on newly disclosed high-impact vulnerabilities such as remote code execution, authentication bypass, account takeover, IDOR, and data exposure. It also highlights use of the Nuclei framework by ProjectDiscovery and separates the process into “legal” and “illegal” paths. The article says this lets readers decide whether to pursue vulnerability disclosure or hacking.\u003c/p\u003e\n\n\u003cp\u003eThe forum response showed demand for practical mentorship, with users thanking Hercules, asking for private contact, and describing themselves as beginners who wanted help applying theory. The same method was reposted and discussed across four additional forums. For defenders, the article stresses critical reachable vulnerabilities, older unpatched systems, and paid vulnerability disclosure programs.\u003c/p\u003e\n"},{"n":8,"title":"Agentic AI Is Transforming Defense, But Only Secure IT Infrastructure Will Maximize It","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/06/agentic-ai-is-transforming-defense-but.html","time":"15:10","priority":"MAY READ","score":45,"tldr":"Agentic AI could give U.S. defense and intelligence agencies major decision-making advantages, but it also creates serious risks if deployed without secure infrastructure. The key takeaway is that classified AI systems need strong access controls, data governance, cross-domain protections, and hardware-enforced security built in from the start.","briefOverview":"\u003cp\u003eThe article argues that frontier and agentic AI are transforming defense and intelligence networks, but that their value depends on secure IT infrastructure. It cites reports that an unauthorized group claimed to gain access to Anthropic\u0026rsquo;s Claude Mythos technical preview within hours of its limited availability. The article presents that reported incident as a warning about the speed at which advanced AI can challenge assumptions in sensitive environments.\u003c/p\u003e\n\n\u003cp\u003eThe central significance is that advanced AI could help accelerate decision superiority for American forces as the U.S. government moves to deploy AI capabilities on classified networks. At the same time, the article says risks are expanding as agentic AI begins operating across sensitive networks, data environments, and mission workflows. It emphasizes that AI adoption requires security, governance, and resilient infrastructure rather than simply powerful models.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights three security questions: what enters the model, who or what can access the AI, and where AI agents reach back out. It says training data and commercial models must be inspected before entering classified environments, access must be governed across analysts, coalition partners, edge operators, and integration teams, and model calls to databases or mission systems must preserve classification boundaries. Everfox is presented as providing cross-domain capabilities and hardware-enforced protection for classified environments and the tactical edge.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is an opinion piece by Dave Wajsgras, Chairman and CEO of Everfox, about the deployment of frontier and agentic AI in defense and intelligence settings. It opens by referencing reports that an unauthorized group claimed to gain access to Anthropic\u0026rsquo;s Claude Mythos model after it was made available as a limited technical preview. The article says that, if true, the incident was not only a possible breach but also a warning about assumptions around advanced AI in defense networks.\u003c/p\u003e\n\n\u003cp\u003eThe article says the U.S. government is moving to deploy AI capabilities on classified networks and that advanced AI can help accelerate decision superiority for American forces. It also argues that the risks are growing as agentic AI operates across sensitive networks, data environments, and mission workflows. The article frames AI adoption as a security, governance, and infrastructure challenge rather than only a model deployment challenge.\u003c/p\u003e\n\n\u003cp\u003eA major technical concern raised in the article is the integrity of data entering AI models. It says training data and commercial models must move quickly but securely into classified environments. Without proper inspection, the article warns that an AI model could process stale information or ingest poisoned content that compromises assessments.\u003c/p\u003e\n\n\u003cp\u003eThe article also focuses on access control and network separation. It says cleared analysts, coalition partners, edge operators, and AI integration teams will require governed access that enforces security boundaries. It warns that access must be managed without inadvertently collapsing networks together.\u003c/p\u003e\n\n\u003cp\u003eAnother key concern is where AI agents reach back out during operation. The article says every model call to a database, mission system, or coalition partner must preserve the integrity of the classification layer. It argues that if AI is intended to compress operational timelines, the security boundary cannot become the first point of failure.\u003c/p\u003e\n\n\u003cp\u003eEverfox is presented as a provider of secure network fabric for defense and intelligence agencies, with technologies based on cross-domain capabilities and hardware-enforced protection. The article says these capabilities are purpose-built for classified environments and the tactical edge. It concludes that trusted infrastructure, strict access controls, and strong data governance are mission critical for deploying AI responsibly at scale.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that agentic and frontier AI can provide important mission advantages for U.S. defense and intelligence organizations, but only if deployed on secure and resilient infrastructure. It presents AI adoption in classified environments as a security and governance problem as much as a model capability problem. The article states that advanced AI can help accelerate decision superiority for American forces, while also creating risks across sensitive networks, data environments, and mission workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article is written and contributed by Dave Wajsgras, Chairman and CEO of Everfox. Everfox is positioned as a provider of secure infrastructure for defense and intelligence agencies, including cross-domain capabilities and hardware-enforced protection for classified environments and the tactical edge.\u003c/p\u003e\n\n\u003ch2 id=\"reported-triggering-incident\"\u003eReported Triggering Incident\u003c/h2\u003e\n\n\u003cp\u003eThe article opens by citing recent concern in the cybersecurity community around Anthropic\u0026rsquo;s Claude Mythos model. It says the model was made available to a limited set of organizations as a technical preview and that an unauthorized group reportedly claimed to gain access within hours. The article does not confirm the incident, but states that if the claim is true, it is more than a possible breach and should be treated as a warning.\u003c/p\u003e\n\n\u003cp\u003eThe significance of this example is that frontier and agentic AI in defense networks can quickly challenge existing assumptions. The article uses the reported Claude Mythos access claim to frame the broader concern that powerful AI systems may introduce risks when used in sensitive or classified environments.\u003c/p\u003e\n\n\u003ch2 id=\"strategic-significance-for-defense-and-intelligence\"\u003eStrategic Significance for Defense and Intelligence\u003c/h2\u003e\n\n\u003cp\u003eThe article says the potential impact of advanced AI on U.S. defense and intelligence networks is significant. It notes that the U.S. government is moving to deploy AI capabilities on classified networks. In that context, it says advanced AI offers a clear opportunity: accelerating decision superiority for American forces.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, the article says the risks are expanding quickly. It specifically points to agentic AI operating across sensitive networks, data environments, and mission workflows. The article argues that AI is only as trustworthy as the data it uses, the networks it touches, and the controls that determine who and what can access it.\u003c/p\u003e\n\n\u003ch2 id=\"core-security-and-governance-requirements\"\u003eCore Security and Governance Requirements\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that deploying powerful models is not enough. It says AI adoption requires the right security, governance, and resilient infrastructure around the models. In classified environments, the challenge is intensified by the need to move information securely across:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClassification levels.\u003c/li\u003e\n\u003cli\u003eCompartments.\u003c/li\u003e\n\u003cli\u003eCoalition boundaries.\u003c/li\u003e\n\u003cli\u003eOperational environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article frames secure AI deployment as dependent on the network layers beneath the models. It states that sensitive data must move securely across classification boundaries and that threats and policy violations should be identified before they ever reach a model.\u003c/p\u003e\n\n\u003ch2 id=\"three-key-areas-of-concern\"\u003eThree Key Areas of Concern\u003c/h2\u003e\n\n\u003ch3 id=\"1-what-is-entering-the-model\"\u003e1. What is entering the model\u003c/h3\u003e\n\n\u003cp\u003eThe article says training data and commercial models must move quickly but securely into classified environments. It warns that without proper inspection, even a strong AI model can become a liability. Specific risks named in the article include processing stale information and ingesting poisoned content that could lead to compromised assessments.\u003c/p\u003e\n\n\u003ch3 id=\"2-who-and-what-can-access-the-ai\"\u003e2. Who and what can access the AI\u003c/h3\u003e\n\n\u003cp\u003eThe article identifies several groups that may need access to AI systems in defense and intelligence contexts. These include cleared analysts, coalition partners, edge operators, and AI integration teams. It says their access must be governed in a way that enforces security boundaries without inadvertently collapsing networks together.\u003c/p\u003e\n\n\u003ch3 id=\"3-where-the-ai-agent-is-reaching-back-out\"\u003e3. Where the AI agent is reaching back out\u003c/h3\u003e\n\n\u003cp\u003eThe article says AI agents may make calls to databases, mission systems, and coalition partners. It argues that every such model call must preserve the integrity of the classification layer. The article states that if AI is meant to compress operational timelines, the security boundary cannot become the first point of failure.\u003c/p\u003e\n\n\u003ch2 id=\"everfox-positioning-and-proposed-infrastructure-role\"\u003eEverfox Positioning and Proposed Infrastructure Role\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Everfox as enabling defense and intelligence agencies to adopt AI without compromising mission speed and security. It says Everfox technologies provide a secure network fabric built on cross-domain capabilities and hardware-enforced protection. These technologies are described as purpose-built for classified environments and the tactical edge.\u003c/p\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s infrastructure argument is that AI must be carried by a secure network fabric in order to be trusted in mission environments. It says AI introduces risk across system components, integrations, downstream outputs, and mission workflows. For organizations adopting AI across domains, compartments, and operational theaters, the article describes trusted infrastructure, strict access controls, and strong data governance as mission critical.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-risk-framing\"\u003eImpact and Risk Framing\u003c/h2\u003e\n\n\u003cp\u003eThe article does not provide confirmed technical details of a breach, affected systems, or remediation steps related to the reported Claude Mythos claim. Instead, it uses the reported access claim as a broader warning about the need for secure deployment practices. The disclosed impact in the article is therefore framed as strategic and operational risk rather than a confirmed incident impact.\u003c/p\u003e\n\n\u003cp\u003eThe main risks identified in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStale or poisoned content entering AI systems.\u003c/li\u003e\n\u003cli\u003eImproper access across classified or sensitive environments.\u003c/li\u003e\n\u003cli\u003eSecurity boundaries failing when AI agents call external or connected systems.\u003c/li\u003e\n\u003cli\u003eAI tools operating across domains, compartments, and operational theaters without sufficient governance.\u003c/li\u003e\n\u003cli\u003eSecurity being bolted on after AI is embedded in mission operations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s central message is that frontier and agentic AI may become an important engine of future mission advantage, but only if security is built in from the start. It argues that advanced AI cannot be trusted in sensitive defense and intelligence environments without secure infrastructure, governed access, strong data governance, cross-domain protections, and hardware-enforced security. The article concludes that without a secure network fabric, even the best AI models cannot be trusted to operate where and when they matter most.\u003c/p\u003e\n","keyPoints":["The article says advanced AI can help accelerate decision superiority for American forces as the U.S. government moves to deploy AI capabilities on classified networks.","The article argues that AI adoption requires security, governance, and resilient infrastructure around models, not just the deployment of powerful models.","The article identifies risks around what data enters AI models, who or what can access them, and where AI agents reach across databases, mission systems, or coalition partners.","The article states that sensitive data must move securely across classification boundaries, with threats and policy violations identified before they reach a model.","The article says trusted infrastructure, strict access controls, and strong data governance are mission critical for AI tools operating across domains, compartments, and operational theaters."],"insights":["The article frames AI model risk in classified environments as a cross-domain infrastructure problem, not only a model safety or prompt-control problem.","The article highlights that agentic AI can create risk through outbound reach-back to databases, mission systems, and coalition partners, making every model call a potential classification-boundary concern.","The article warns that governed access for analysts, coalition partners, edge operators, and AI teams must avoid inadvertently collapsing separate security networks together.","The article treats data inspection before model ingestion as mission-critical because poisoned or stale content could compromise AI-driven assessments before operators ever see the output."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that frontier and agentic AI are transforming defense and intelligence networks, but that their value depends on secure IT infrastructure. It cites reports that an unauthorized group claimed to gain access to Anthropic\u0026rsquo;s Claude Mythos technical preview within hours of its limited availability. The article presents that reported incident as a warning about the speed at which advanced AI can challenge assumptions in sensitive environments.\u003c/p\u003e\n\n\u003cp\u003eThe central significance is that advanced AI could help accelerate decision superiority for American forces as the U.S. government moves to deploy AI capabilities on classified networks. At the same time, the article says risks are expanding as agentic AI begins operating across sensitive networks, data environments, and mission workflows. It emphasizes that AI adoption requires security, governance, and resilient infrastructure rather than simply powerful models.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights three security questions: what enters the model, who or what can access the AI, and where AI agents reach back out. It says training data and commercial models must be inspected before entering classified environments, access must be governed across analysts, coalition partners, edge operators, and integration teams, and model calls to databases or mission systems must preserve classification boundaries. Everfox is presented as providing cross-domain capabilities and hardware-enforced protection for classified environments and the tactical edge.\u003c/p\u003e\n"},{"n":9,"title":"ThreatsDay Bulletin: AI Agents Gone Wrong, Sketchy C2 Tools, ClickFix Tricks, JS Backdoors \u0026 20+ New Stories","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/06/threatsday-bulletin-ai-agents-gone.html","time":"14:00","priority":"MAY READ","score":40,"tldr":"This roundup shows attackers increasingly abusing trusted tools, compromised websites, AI-assisted workflows, and old exposed vulnerabilities to gain access and evade detection. The key takeaway is to patch quickly, reduce exposed services, enforce least privilege, and closely monitor remote access tools, cloud activity, and AI agents.","briefOverview":"\u003cp\u003eThis ThreatsDay Bulletin is a roundup of more than 20 cybersecurity developments involving patched flaws, malware campaigns, abused trusted tools, cybercrime infrastructure, AI-enabled offensive work, and real-world AI agent failures. The article’s central theme is that attackers continue to rely on compromised websites, exposed systems, social engineering, legitimate platforms, and remote access tools to gain access and evade detection. It also highlights defensive responses from Cisco, CISA, Google, RubyGems, and other organizations.\u003c/p\u003e\n\n\u003cp\u003eSeveral stories focus on active or emerging attack tradecraft, including DriveSurge using ClickFix and FakeUpdates lures, Steam-hosted dead drop payloads for WordPress malware, ROADtools abuse by nation-state groups, and malicious use of Tiflux and other RMM tools. The article also notes public proof-of-concept code for Cisco Unified Communications Manager CVE-2026-20230, CISA’s KEV listing for Linux Kernel CVE-2022-0492, and exploitation of automatic tank gauge systems exposed to the internet. AI is presented as both an attacker aid and an enterprise risk, with one threat actor using AI tools for EDR evasion testing and Cyera identifying hundreds of verified enterprise-relevant AI agent damage cases.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe bulletin collects a wide range of security stories showing how attackers are abusing old vulnerabilities, compromised websites, remote access tools, cloud APIs, legitimate platforms, and social engineering lures. It opens with Cisco’s patch for CVE-2026-20230, a high-severity SSRF flaw in Unified Communications Manager that could let an unauthenticated remote attacker write files to the underlying operating system for later root elevation. Cisco said proof-of-concept exploit code exists but that it had not seen active exploitation.\u003c/p\u003e\n\n\u003cp\u003eMultiple items focus on malware delivery and credential theft. Splunk analyzed VIP Keylogger campaigns using JavaScript, batch, and VBS loaders disguised as business communications, while Intrinsec described malspam delivering a JavaScript-coded backdoor for suspected EAC or BEC activity. Silent Push reported that DriveSurge has used compromised websites, the zTDS traffic distribution system, and ClickFix or FakeUpdates lures since September 2025, and Huntress described BackgroundFix fake image-editing sites delivering CastleLoader, NetSupport RAT, and CastleStealer.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes abuse of legitimate or trusted tools and infrastructure. Huntress reported malicious use of Tiflux alongside UltraVNC, Splashtop, ScreenConnect, and an outdated driver, while Flare.io described FalkonC2 and its Rotemelli2 enterprise version abusing trusted remote access software such as ScreenConnect, Datto, and SimpleHelp. GoDaddy found WordPress malware using Steam Community profile comments with invisible Unicode characters to hide encoded payloads, and Malwarebytes described a LinkedIn phishing campaign abusing Adobe Target infrastructure as a redirect or abuse point.\u003c/p\u003e\n\n\u003cp\u003eSeveral stories involve state-linked or government-relevant activity. Palo Alto Networks Unit 42 said APT29, APT33, and UTA0355 have used ROADtools in cloud intrusions for discovery, persistence, and defense evasion through legitimate Microsoft APIs. ESET reported an unusual spike in Iran-aligned activity against Israeli targets by clusters named Rusty Boots, MoKhargosh, and MOØN Badr, and Russia’s FSB claimed foreign intelligence services implanted spyware on mobile devices of high-ranking Russian officials. CISA also added Linux Kernel CVE-2022-0492 to its KEV catalog after exploitation in container environments was reported.\u003c/p\u003e\n\n\u003cp\u003eAI appears in the bulletin as both a force multiplier and an operational risk. Sophos observed an unknown threat actor using Cursor and Anthropic Claude Opus to automate Active Directory discovery and refine EDR evasion tactics, though it said the actual bypass work involved structured engineering tests with human review. Anthropic expanded Project Glasswing and said the bottleneck is shifting toward verification, disclosure, and patching of vulnerabilities surfaced by AI models, while Cyera reported 344 verified enterprise-relevant agent-inflicted damage cases between September 2023 and May 2026.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis ThreatsDay Bulletin is a broad cybersecurity roundup covering patched vulnerabilities, malware campaigns, cybercrime forum fallout, remote access tool abuse, cloud tradecraft, phishing, supply chain defenses, critical infrastructure exposure, AI-assisted offensive development, and operational failures caused by enterprise AI agents.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the security landscape as a continuation of recurring problems: bad plugins, old bugs, fake tools, trusted applications behaving suspiciously, exposed administrative systems, and attackers hiding in normal-looking infrastructure. Its concluding message is that basic controls such as inventory, logging, least privilege, backups, tested restores, and monitoring for abnormal behavior remain central to reducing risk.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-advisories-and-patching\"\u003eVulnerabilities, Advisories, and Patching\u003c/h2\u003e\n\n\u003ch3 id=\"cisco-unified-communications-manager-cve-2026-20230\"\u003eCisco Unified Communications Manager CVE-2026-20230\u003c/h3\u003e\n\n\u003cp\u003eCisco released fixes for a high-severity flaw in Unified Communications Manager, tracked as CVE-2026-20230 with a CVSS score of 8.6. The issue is an unauthenticated server-side request forgery risk caused by improper input validation for specific HTTP requests.\u003c/p\u003e\n\n\u003cp\u003eCisco said an attacker could exploit the flaw by sending a crafted HTTP request to an affected device. A successful exploit could allow file writes to the underlying operating system that could later be used to elevate privileges to root. The issue was addressed in Cisco Unified CM and Unified CM SME Release versions 14SU6 and 15SU5.\u003c/p\u003e\n\n\u003cp\u003eCisco said proof-of-concept exploit code is available, but it had no evidence of active exploitation. The vulnerability was reported by an independent security researcher working with SSD Secure Disclosure.\u003c/p\u003e\n\n\u003ch3 id=\"linux-kernel-cve-2022-0492\"\u003eLinux Kernel CVE-2022-0492\u003c/h3\u003e\n\n\u003cp\u003eCISA added Linux Kernel CVE-2022-0492 to its Known Exploited Vulnerabilities catalog. The flaw has a CVSS score of 7.8 and involves improper authentication that could allow privilege escalation through the cgroups v1 release_agent feature.\u003c/p\u003e\n\n\u003cp\u003eFederal Civilian Executive Branch agencies were required to remediate the flaw by June 5, 2026. The article notes that Kaspersky observed exploitation of CVE-2022-0492, along with CVE-2019-5736 and CVE-2024-21626, in attacks targeting container environments.\u003c/p\u003e\n\n\u003ch3 id=\"automatic-tank-gauge-systems\"\u003eAutomatic Tank Gauge Systems\u003c/h3\u003e\n\n\u003cp\u003eU.S. government agencies issued an advisory about attacks targeting U.S.-based automatic tank gauge systems. The advisory urged organizations to secure these systems with strong passwords and remove them from the internet to reduce public exposure.\u003c/p\u003e\n\n\u003cp\u003eThe activity remains unattributed. The attackers reportedly compromise internet-exposed ATG systems using hard-coded credentials, command execution, and SQL injection vectors, then escalate privileges to gain full administrator rights and modify system functions.\u003c/p\u003e\n\n\u003cp\u003eThe advisory warned that a compromised ATG system could allow a cyber threat actor to disrupt or manipulate critical tank management functions as though they had legitimate physical console access.\u003c/p\u003e\n\n\u003ch2 id=\"malware-delivery-social-engineering-and-backdoors\"\u003eMalware Delivery, Social Engineering, and Backdoors\u003c/h2\u003e\n\n\u003ch3 id=\"vip-keylogger-campaigns\"\u003eVIP Keylogger Campaigns\u003c/h3\u003e\n\n\u003cp\u003eSplunk analyzed campaigns distributing VIP Keylogger through loaders written in JavaScript, batch scripts, and Visual Basic Script. The campaigns rely on social engineering and masquerade as legitimate business communications.\u003c/p\u003e\n\n\u003cp\u003eThe lures include bank payment notifications, procurement orders, and logistics updates. The goal is to persuade users to open malicious files.\u003c/p\u003e\n\n\u003ch3 id=\"drivesurge-clickfix-fakeupdates-and-ztds\"\u003eDriveSurge, ClickFix, FakeUpdates, and zTDS\u003c/h3\u003e\n\n\u003cp\u003eSilent Push reported that a threat cluster tracked as DriveSurge has been operating large-scale malware distribution campaigns. The campaigns use ClickFix and FakeUpdates, also known as SocGholish, social engineering techniques on compromised websites.\u003c/p\u003e\n\n\u003cp\u003eThousands of websites are estimated to have been compromised. DriveSurge primarily acts as an initial access broker operating on a pay-per-install model, enabling follow-on attacks.\u003c/p\u003e\n\n\u003cp\u003eVisitors to compromised websites are routed through a traffic distribution system known as zTDS. The system profiles visitors and decides whether to serve a ClickFix lure or a FakeUpdates lure. The article states that zTDS has been in use since at least 2015 and is publicly available at ztds[.]info.\u003c/p\u003e\n\n\u003cp\u003eThe DriveSurge campaign has been active since September 2025.\u003c/p\u003e\n\n\u003ch3 id=\"javascript-coded-backdoor-malspam\"\u003eJavaScript-Coded Backdoor Malspam\u003c/h3\u003e\n\n\u003cp\u003eIntrinsec disclosed that multiple malspam campaigns have distributed a JavaScript-coded backdoor. The targets were from all regions and sectors, with the article specifically noting energy and finance ministries, including in the CIS region.\u003c/p\u003e\n\n\u003cp\u003eIntrinsec assessed the campaigns as financially motivated and operated for email account compromise and/or business email compromise. The activity was observed in March 2026.\u003c/p\u003e\n\n\u003ch3 id=\"clearfake-and-etherhiding\"\u003eClearFake and EtherHiding\u003c/h3\u003e\n\n\u003cp\u003eTrend Micro described an intrusion in which threat actors used EtherHiding to route ClearFake payload delivery through smart contracts on the BNB Smart Chain testnet. The attack chain ended with deployment of SectopRAT and ACRStealer.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion also included an on-chain execution tracker that confirmed each victim compromise in real time.\u003c/p\u003e\n\n\u003ch3 id=\"backgroundfix-and-fake-image-tools\"\u003eBackgroundFix and Fake Image Tools\u003c/h3\u003e\n\n\u003cp\u003eHuntress described a ClickFix-style lure dressed up as free image-editing tools. The sites imitate “remove your photo background” services with uploads, progress bars, and download buttons, but the entire interface is fake.\u003c/p\u003e\n\n\u003cp\u003eThe activity, named BackgroundFix, delivers CastleLoader. CastleLoader then drops NetSupport RAT and a custom .NET stealer called CastleStealer. CastleLoader is attributed to a threat cluster known as GrayBravo.\u003c/p\u003e\n\n\u003ch2 id=\"abuse-of-trusted-tools-and-platforms\"\u003eAbuse of Trusted Tools and Platforms\u003c/h2\u003e\n\n\u003ch3 id=\"tiflux-and-commercial-rmm-abuse\"\u003eTiflux and Commercial RMM Abuse\u003c/h3\u003e\n\n\u003cp\u003eHuntress reported growing malicious use of a lesser-known remote desktop tool called Tiflux. Attackers are using Tiflux to establish persistence, transmit screenshots, and run commands for system profiling.\u003c/p\u003e\n\n\u003cp\u003eThe same incidents also involved UltraVNC, Splashtop, ScreenConnect, and an outdated driver that could permit privilege escalation. Huntress said threat actors continue to test and weaponize commercial remote access management tools.\u003c/p\u003e\n\n\u003ch3 id=\"falkonc2-and-rotemelli2\"\u003eFalkonC2 and Rotemelli2\u003c/h3\u003e\n\n\u003cp\u003eFlare.io disclosed details about FalkonC2, a commercial hacking tool designed to hide inside enterprise environments by abusing trusted remote access software. Its enterprise version, Rotemelli2, runs in memory, rotates command-and-control domains every 72 hours, and uses ScreenConnect, Datto, and SimpleHelp to quietly launch attacks.\u003c/p\u003e\n\n\u003cp\u003eDashboard telemetry suggested active enterprise infections in the United States, Australia, the Netherlands, and Poland. The framework also checks infected machines for QuickBooks and Sage50 data, suggesting interest in accounting systems that can be exfiltrated quickly.\u003c/p\u003e\n\n\u003ch3 id=\"steam-community-profiles-as-dead-drop-resolvers\"\u003eSteam Community Profiles as Dead Drop Resolvers\u003c/h3\u003e\n\n\u003cp\u003eGoDaddy identified malware using Steam Community profile comments to host malicious payloads for WordPress. The malware uses invisible Unicode characters to conceal payloads inside Steam profile comments.\u003c/p\u003e\n\n\u003cp\u003eThe malware has two primary functions. Client-side JavaScript injection fetches encoded URLs from Steam profile comments, decodes them, and injects external JavaScript into WordPress pages. A server-side backdoor provides cookie-authenticated remote access for modifying PHP files across plugins and themes.\u003c/p\u003e\n\n\u003cp\u003eThe campaign was first detected in July 2025 and has been found on about 1,980 WordPress sites. The article says it is unclear how the sites are breached, but possible initial infection vectors include stolen admin logins, compromised FTP or SFTP credentials, exploitation of a vulnerable WordPress theme or plugin, or a supply chain compromise.\u003c/p\u003e\n\n\u003ch3 id=\"adobe-target-abuse-in-linkedin-phishing\"\u003eAdobe Target Abuse in LinkedIn Phishing\u003c/h3\u003e\n\n\u003cp\u003eMalwarebytes described a LinkedIn phishing campaign that weaponizes Adobe infrastructure. Victims receive fake LinkedIn emails with an HTML attachment that serves a login form and asks for credentials.\u003c/p\u003e\n\n\u003cp\u003eCaptured information is delivered to the domain lnkd.tt.omtrdc[.]net/rest/v1/delivery, after which victims are redirected to the legitimate LinkedIn site. Malwarebytes said the domain belongs to Adobe and is associated with Adobe Target, but that attackers are abusing Adobe Target as a redirect or abuse point rather than using it to receive credentials.\u003c/p\u003e\n\n\u003ch2 id=\"cloud-and-nation-state-tradecraft\"\u003eCloud and Nation-State Tradecraft\u003c/h2\u003e\n\n\u003ch3 id=\"roadtools-abuse-by-apt29-apt33-and-uta0355\"\u003eROADtools Abuse by APT29, APT33, and UTA0355\u003c/h3\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 reported that nation-state groups such as APT29, APT33, and UTA0355 are exploiting ROADtools. ROADtools is a Python-based open-source framework used for red-teaming and research.\u003c/p\u003e\n\n\u003cp\u003eThe article states that ROADtools operates through legitimate Microsoft APIs and can mimic typical traffic. Attackers can further evade detection by configuring request attributes such as user-agent strings.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 said nation-state actors have used ROADtools in recent cloud intrusions for discovery, persistence, and defense evasion. Attackers involved in a targeted phishing campaign in early 2025 used tooling matching ROADtools’ token management capabilities.\u003c/p\u003e\n\n\u003ch3 id=\"iran-aligned-activity-against-israel\"\u003eIran-Aligned Activity Against Israel\u003c/h3\u003e\n\n\u003cp\u003eESET reported an unusual spike in Iran-aligned activity against Israeli targets between October 2025 and March 2026. The activity could not be linked to previously known groups.\u003c/p\u003e\n\n\u003cp\u003eTwo unattributed clusters, Rusty Boots and MoKhargosh, showed espionage capabilities and destructive potential. Their activity included deployment of a bootkit-style wiper and retention of destructive tooling for later use.\u003c/p\u003e\n\n\u003cp\u003eMoKhargosh, first observed in January 2026, used Go-compiled binaries against Israel. Its tools included a backdoor called GoKhargosh, wipers, filecoders that overwrite files with junk data, and a wiper targeting the master boot record to make systems unbootable.\u003c/p\u003e\n\n\u003cp\u003eA third cluster, MOØN Badr, appeared limited to targeted espionage. It targeted three unidentified victims in Israel in early January 2026 and delivered the MOØN AGENT backdoor through phishing emails for command execution and file upload and download.\u003c/p\u003e\n\n\u003ch3 id=\"mobile-spyware-operation-claimed-by-russia-s-fsb\"\u003eMobile Spyware Operation Claimed by Russia’s FSB\u003c/h3\u003e\n\n\u003cp\u003eRussia’s Federal Security Service disclosed what it described as a large-scale action by foreign intelligence services to stealthily implant spyware on mobile devices of high-ranking Russian officials. The spyware was reportedly used to exfiltrate existing data, intercept ongoing conversations, and conduct covert audio and video surveillance of device surroundings.\u003c/p\u003e\n\n\u003cp\u003eRussia did not identify the actor behind the attacks. The FSB said representatives of foreign intelligence services used technical capabilities of major international IT corporations to exfiltrate sensitive data, including through mobile communication channels. An investigation is ongoing, and the FSB initiated a criminal case.\u003c/p\u003e\n\n\u003ch2 id=\"cybercrime-ecosystem-and-law-enforcement-fallout\"\u003eCybercrime Ecosystem and Law Enforcement Fallout\u003c/h2\u003e\n\n\u003ch3 id=\"xss-forum-fragmentation\"\u003eXSS Forum Fragmentation\u003c/h3\u003e\n\n\u003cp\u003eFlashpoint reported that the July 2025 law enforcement takedown of the XSS cybercrime forum did not dismantle the Russian-speaking cybercrime ecosystem. Instead, it fractured the ecosystem into competing and harder-to-track factions.\u003c/p\u003e\n\n\u003cp\u003eThe collapse of XSS triggered an exodus into new, unvetted, and often adversarial communities. Forums that appeared after the takedown include DamageLib, Rehub, XSS.pro, and XSSF.\u003c/p\u003e\n\n\u003cp\u003eDamageLib was launched by legacy moderators of XSS, while Rehub was launched by another former XSS moderator. XSS.pro used old backups and is suspected of being a law enforcement honeypot, and XSSF was started by a pro-Russian Telegram hacking group.\u003c/p\u003e\n\n\u003ch3 id=\"spain-arrests-suspect-for-sensitive-data-leak\"\u003eSpain Arrests Suspect for Sensitive Data Leak\u003c/h3\u003e\n\n\u003cp\u003eSpanish National Police arrested an unidentified individual for leaking sensitive information. The leaked information related to members of critical state organizations.\u003c/p\u003e\n\n\u003cp\u003eAffected organizations included Spain’s National Cybersecurity Institute, the State Attorney General’s Office, the National Police, the Civil Guard, and the National Security Council.\u003c/p\u003e\n\n\u003ch2 id=\"crypto-sanctions\"\u003eCrypto Sanctions\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Treasury’s Office of Foreign Assets Control announced sanctions against Nobitex, Iran’s largest cryptocurrency exchange, for facilitating payments related to terrorist activities. The Treasury said Nobitex processed more than 50 percent of all Iranian digital asset inflows in 2025.\u003c/p\u003e\n\n\u003cp\u003eThe Treasury also said Nobitex facilitated payments tied to Iranian terrorist activities, sanctions evasion, and Islamic Revolutionary Guard Corps-linked transactions, including activity associated with IRGC-affiliated ransomware actors. Sanctions also applied to Nobitex chairman, co-founder, and former CEO Amir Hossein Rad, other Nobitex leaders and officials, and three other exchanges: Wallex, Bitpin, and Ramzinex.\u003c/p\u003e\n\n\u003cp\u003eChainalysis also reported that Nobitex processed over 50 percent of Iranian digital asset inflows last year. TRM Labs said the four exchanges accounted for about \u003cspan class=\"math inline\"\u003e\\(7.7 billion, or 78 percent, of Iran’s \\)\u003c/span\u003e9.9 billion in attributed 2025 crypto volume.\u003c/p\u003e\n\n\u003ch2 id=\"data-extortion-trends\"\u003eData Extortion Trends\u003c/h2\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 reported that pure data-exfiltration campaigns without ransomware deployment are increasing. In 2025, these campaigns primarily targeted professional services, healthcare, and consumer services firms.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 noted that while manufacturing remained the single most disrupted sector overall, construction saw a 44 percent year-over-year increase as a data-only extortion hotspot. The article says construction firms are attractive because of financial blueprints, bidding data, and data egress controls.\u003c/p\u003e\n\n\u003ch2 id=\"ai-as-offensive-aid-and-enterprise-risk\"\u003eAI as Offensive Aid and Enterprise Risk\u003c/h2\u003e\n\n\u003ch3 id=\"ai-assisted-edr-evasion-testing\"\u003eAI-Assisted EDR Evasion Testing\u003c/h3\u003e\n\n\u003cp\u003eSophos observed an unknown threat actor using AI technologies to automate Active Directory discovery and refine endpoint detection and response evasion tactics. The activity occurred in a red team post-exploitation framework.\u003c/p\u003e\n\n\u003cp\u003eSophos said AI use for malware development was more limited and mainly supported workflow coordination and experimentation. The actual EDR-bypass path involved a structured engineering test cycle with human review and iteration.\u003c/p\u003e\n\n\u003cp\u003eThe attacker used Cursor and Anthropic Claude Opus. The framework centered on a Python tool that generated Go and Rust payloads for testing against sandboxing, antivirus, and EDR detection. The approach produced nearly 80 modules covering more than 70 techniques.\u003c/p\u003e\n\n\u003cp\u003eSophos also attributed to the threat actor Python-based malware development scripts for injecting shellcode into legitimate Windows executables and a Telegram bot API-based external command-and-control mechanism. Sophos said AI agents lower the barrier to entry for sophisticated red team-style attacks but do not change how defenders should protect themselves.\u003c/p\u003e\n\n\u003ch3 id=\"anthropic-project-glasswing-and-ai-found-vulnerabilities\"\u003eAnthropic Project Glasswing and AI-Found Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eAnthropic expanded access to Project Glasswing by adding about 150 organizations in 15 countries for access to Claude Mythos Preview. Anthropic said the cybersecurity bottleneck is now verifying, disclosing, and patching the large number of vulnerabilities that Mythos-class models can surface.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites a report from the Cloud Security Alliance, SANS Institute, and OWASP. That report concluded that organizations are likely to be overwhelmed in the near term by threat actors using AI to find and exploit vulnerabilities faster than defenders can patch them.\u003c/p\u003e\n\n\u003cp\u003eThe report said the cost and capability floor for exploit discovery is dropping, the time between disclosure and weaponization is compressing toward zero, and capabilities that once required nation-state resources are becoming broadly accessible.\u003c/p\u003e\n\n\u003ch3 id=\"enterprise-ai-agent-failures\"\u003eEnterprise AI Agent Failures\u003c/h3\u003e\n\n\u003cp\u003eCyera analyzed 7,200 publicly reported AI-security and operational incidents. It identified 344 verified enterprise-relevant agent-inflicted damage cases between September 2023 and May 2026.\u003c/p\u003e\n\n\u003cp\u003eOf those, 188 incidents involved autonomous AI systems causing direct organizational harm without any external attacker involvement. The majority of confirmed incidents involved real production impact rather than theoretical AI risk scenarios.\u003c/p\u003e\n\n\u003cp\u003eObserved outcomes included deleted databases, destructive cloud actions, unauthorized financial operations, runaway API spending, service outages, exposed secrets, and silent integrity corruption inside enterprise environments. Cyera said that as agents gain broader permissions and deeper integrations into SaaS, cloud, development, and business environments, the AI interaction layer becomes part of the enterprise attack surface and critical data perimeter.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-product-and-ecosystem-responses\"\u003eDefensive Product and Ecosystem Responses\u003c/h2\u003e\n\n\u003ch3 id=\"google-device-bound-session-credentials\"\u003eGoogle Device Bound Session Credentials\u003c/h3\u003e\n\n\u003cp\u003eGoogle announced that Device Bound Session Credentials in Chrome are generally available and enabled by default for Google Workspace users. DBSC binds session cookies to the device a user authenticated from.\u003c/p\u003e\n\n\u003cp\u003eGoogle said DBSC reduces the risk of session theft even if malware is present on the user’s device. The feature makes it more difficult for malicious actors to exploit stolen session cookies.\u003c/p\u003e\n\n\u003ch3 id=\"google-android-fake-call-detection\"\u003eGoogle Android Fake Call Detection\u003c/h3\u003e\n\n\u003cp\u003eGoogle announced a fake call detection feature for Android devices running Android 12 and later. The feature is built on Rich Communication Services and verifies whether a call is coming from the caller’s actual Android smartphone.\u003c/p\u003e\n\n\u003cp\u003eThe feature is enabled by default and is designed to help prevent deepfake impersonation and call spoofing in real time. When both parties use Phone by Google, the caller’s device sends a silent confirmation signal to verify the call.\u003c/p\u003e\n\n\u003cp\u003eIf a scammer tries to impersonate a contact and the confirmation signal is missing, the recipient’s device checks with the contact’s real device. If the real device says it is not making a call, the recipient receives a warning advising them to hang up immediately. The feature requires Phone by Google, Contacts, and Google Messages, and is rolling out globally starting with Pixel devices.\u003c/p\u003e\n\n\u003ch3 id=\"rubygems-cooldown-filter\"\u003eRubyGems Cooldown Filter\u003c/h3\u003e\n\n\u003cp\u003eRubyGems added a cooldown time-based filter to Bundler version 4.0.13. The filter refuses to resolve to a gem version until it has been public for at least a configured number of days.\u003c/p\u003e\n\n\u003cp\u003eThe purpose is to skip releases that are too new to have been scrutinized in favor of versions that have aged past the cooldown window. The feature is opt-in and complements existing defenses such as mandatory two-factor authentication and trusted publishing.\u003c/p\u003e\n\n\u003cp\u003eRubyGems users can declare a small cooldown on the source in the Gemfile. The article also notes related efforts such as AI-assisted vulnerability scanning against critical gems in the registry.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe bulletin’s main lesson is that many effective attacks still rely on familiar weaknesses: unpatched systems, exposed admin interfaces, trusted tools used in unexpected ways, compromised legitimate websites, social engineering, and insufficient monitoring. It emphasizes that defenders should patch faster, reduce exposed management interfaces, avoid trusting tools solely by name, and watch for abnormal behavior at the edges where attackers hide.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by stating that security is not magic. It describes effective defense as inventory, logs, least privilege, backups, tested restores, and people who notice when something normal begins acting wrong.\u003c/p\u003e\n","keyPoints":["Cisco released fixes for CVE-2026-20230, a high-severity SSRF flaw in Unified Communications Manager that has public proof-of-concept exploit code but no known active exploitation.","DriveSurge has been running large-scale malware distribution campaigns since September 2025 using ClickFix and FakeUpdates lures on compromised websites through the zTDS traffic distribution system.","Nation-state groups including APT29, APT33, and UTA0355 have used the open-source ROADtools framework in cloud intrusions for discovery, persistence, and defense evasion through legitimate Microsoft APIs.","An unknown threat actor used AI tools including Cursor and Anthropic Claude Opus to automate Active Directory discovery and refine EDR evasion tactics in a post-exploitation framework.","Cyera analyzed 7,200 publicly reported AI-security and operational incidents and identified 344 verified enterprise-relevant agent-inflicted damage cases between September 2023 and May 2026."],"insights":["The July 2025 takedown of the XSS cybercrime forum did not eliminate the ecosystem; it fragmented activity into multiple newer forums, making the underground harder to track.","Attackers are increasingly hiding malicious activity behind legitimate or trusted platforms and tools, including Steam Community profiles, Adobe infrastructure, commercial RMM products, and Microsoft APIs used by ROADtools.","Some malware delivery chains now combine multiple resilience layers, such as DriveSurge using compromised reputable websites, zTDS profiling, and either ClickFix or FakeUpdates lures to select payload delivery paths.","AI-assisted offensive activity in the article was not primarily autonomous malware creation; it was used to speed workflow coordination, Active Directory discovery, and iterative EDR evasion testing with human review.","Enterprise AI agents are already causing production harm without external attackers, including deleted databases, destructive cloud actions, unauthorized financial operations, runaway API spending, and exposed secrets."],"referencedReports":[{"title":"Cisco Unified Communications Manager Server-Side Request Forgery Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"The article cites Cisco's security advisory for fixes addressing CVE-2026-20230 in Unified Communications Manager.","category":"","primary":false},{"title":"Behind the Code: Layered Defense Evasion in VIP Keylogger","url":"https://www.splunk.com/en_us/blog/security/behind-the-code-layered-defense-evasion-vip-keylogger.html","publisher":"Splunk","context":"The article references Splunk's analysis of VIP Keylogger campaigns using JavaScript, batch, and VBS loaders.","category":"","primary":false},{"title":"Understanding Illicit Ecosystems: XSS and the Russian-Speaking Underground","url":"https://flashpoint.io/blog/understanding-illicit-ecosystems-xss-russian-speaking-underground/","publisher":"Flashpoint","context":"The article cites Flashpoint's research on how the XSS forum takedown fractured the cybercrime underground.","category":"","primary":false},{"title":"Malicious Use of Tiflux in Attacks Surges","url":"https://www.huntress.com/blog/tiflux-rmm-install","publisher":"Huntress","context":"The article references Huntress research on attackers abusing the Tiflux remote desktop tool and other RMM software.","category":"","primary":false},{"title":"DriveSurge Linked to ClickFix and FakeUpdates Campaigns","url":"https://www.silentpush.com/blog/drivesurge/","publisher":"Silent Push","context":"The article cites Silent Push analysis of DriveSurge malware distribution campaigns using ClickFix, FakeUpdates, and zTDS.","category":"","primary":false},{"title":"Pivoting on a Malspam Infrastructure Delivering JS Malware Backed by Bulletproof Networks","url":"https://www.intrinsec.com/pivoting-on-a-malspam-infrastructure-delivering-js-malware-backed-by-bulletproof-networks/","publisher":"Intrinsec","context":"The article references Intrinsec's disclosure of malspam campaigns distributing a JavaScript-coded backdoor.","category":"","primary":false},{"title":"Smart Contracts for Command and Control","url":"https://www.trendmicro.com/en_us/research/26/e/smart-contracts-for-command-and-control.html","publisher":"Trend Micro","context":"The article cites Trend Micro research on ClearFake payload delivery using EtherHiding and BNB Smart Chain smart contracts.","category":"","primary":false},{"title":"Exploitation of ROADtools by Nation-State Groups","url":"https://unit42.paloaltonetworks.com/roadtools-cloud-attacks/","publisher":"Palo Alto Networks Unit 42","context":"The article references Unit 42 analysis of nation-state groups using ROADtools in cloud intrusions.","category":"","primary":false},{"title":"Pure Data Exfiltration Campaigns on the Rise","url":"https://unit42.paloaltonetworks.com/cyber-extortion-economy/","publisher":"Palo Alto Networks Unit 42","context":"The article cites Unit 42 research on the growth of pure data-exfiltration extortion campaigns.","category":"","primary":false},{"title":"Pointing a Cursor at Evading Detection","url":"https://www.sophos.com/en-us/blog/pointing-a-cursor-at-evading-detection","publisher":"Sophos","context":"The article references Sophos analysis of a threat actor using AI tools to support EDR evasion and post-exploitation framework development.","category":"","primary":false},{"title":"Malware Targeting WordPress Abuses Steam Community Profiles","url":"https://www.godaddy.com/resources/news/malware-targeting-wordpress-abuses-steam-community-profiles","publisher":"GoDaddy","context":"The article cites GoDaddy research on WordPress malware using Steam Community profile comments as dead drop resolvers.","category":"","primary":false},{"title":"Three Enforcement Layers in Five Months: OFAC Designates Iran's Domestic Crypto Exchanges","url":"https://www.trmlabs.com/resources/blog/three-enforcement-layers-in-five-months-ofac-designates-irans-domestic-crypto-exchanges","publisher":"TRM Labs","context":"The article uses TRM Labs figures on Iranian cryptocurrency exchange transaction volume in its discussion of OFAC sanctions.","category":"","primary":false},{"title":"OFAC Sanctions Iranian Crypto Exchanges","url":"https://www.chainalysis.com/blog/ofac-sanctions-iranian-crypto-exchanges-june-2026/","publisher":"Chainalysis","context":"The article cites Chainalysis data on Nobitex processing more than half of Iranian digital asset inflows.","category":"","primary":false},{"title":"Mythos CISO Report","url":"https://labs.cloudsecurityalliance.org/mythos-ciso/","publisher":"Cloud Security Alliance, SANS Institute, and OWASP","context":"The article cites a report concluding that organizations are likely to be overwhelmed by AI-enabled vulnerability discovery and exploitation.","category":"","primary":false},{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/02/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article references CISA's advisory adding CVE-2022-0492 to the Known Exploited Vulnerabilities catalog.","category":"","primary":false},{"title":"Container Attack Vectors","url":"https://securelist.com/container-attack-vectors/120010/","publisher":"Kaspersky","context":"The article cites Kaspersky research that observed CVE-2022-0492 and other flaws being exploited against container environments.","category":"","primary":false},{"title":"ClickFix Becomes BackgroundFix","url":"https://www.huntress.com/blog/clickfix-castleloader-backgroundfix","publisher":"Huntress","context":"The article references Huntress analysis of fake image-editing lures delivering CastleLoader, NetSupport RAT, and CastleStealer.","category":"","primary":false},{"title":"Fake LinkedIn Emails Abuse Adobe to Track Victims","url":"https://www.malwarebytes.com/blog/threat-intel/2026/05/fake-linkedin-emails-abuse-adobe-to-track-victims","publisher":"Malwarebytes","context":"The article cites Malwarebytes threat intelligence on a LinkedIn phishing campaign abusing Adobe infrastructure.","category":"","primary":false},{"title":"ESET APT Activity Report Q4 2025–Q1 2026","url":"https://www.welivesecurity.com/en/eset-research/eset-apt-activity-report-q4-2025-q1-2026/","publisher":"ESET","context":"The article references ESET's APT activity report describing Iran-aligned clusters targeting Israeli entities.","category":"","primary":false},{"title":"CISA Warns of Attacks Targeting Automatic Tank Gauge Systems","url":"https://www.ic3.gov/CSA/2026/260602.pdf","publisher":"U.S. government agencies","context":"The article cites a government advisory urging organizations to secure internet-exposed automatic tank gauge systems.","category":"","primary":false},{"title":"Agent-Inflicted Damage: Inside the Real-World Failures of Enterprise AI Systems","url":"https://www.cyera.com/research/agent-inflicted-damage-inside-the-real-world-failures-of-enterprise-ai-systems","publisher":"Cyera","context":"The article cites Cyera research analyzing publicly reported AI-security and operational incidents involving enterprise agent-inflicted damage.","category":"","primary":false}],"body":"\u003cp\u003eThis ThreatsDay Bulletin is a roundup of more than 20 cybersecurity developments involving patched flaws, malware campaigns, abused trusted tools, cybercrime infrastructure, AI-enabled offensive work, and real-world AI agent failures. The article’s central theme is that attackers continue to rely on compromised websites, exposed systems, social engineering, legitimate platforms, and remote access tools to gain access and evade detection. It also highlights defensive responses from Cisco, CISA, Google, RubyGems, and other organizations.\u003c/p\u003e\n\n\u003cp\u003eSeveral stories focus on active or emerging attack tradecraft, including DriveSurge using ClickFix and FakeUpdates lures, Steam-hosted dead drop payloads for WordPress malware, ROADtools abuse by nation-state groups, and malicious use of Tiflux and other RMM tools. The article also notes public proof-of-concept code for Cisco Unified Communications Manager CVE-2026-20230, CISA’s KEV listing for Linux Kernel CVE-2022-0492, and exploitation of automatic tank gauge systems exposed to the internet. AI is presented as both an attacker aid and an enterprise risk, with one threat actor using AI tools for EDR evasion testing and Cyera identifying hundreds of verified enterprise-relevant AI agent damage cases.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
