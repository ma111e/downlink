<script type="application/json" id="dl-articles">[{"n":7,"title":"StrikeShark: investigating a new campaign delivering Cobalt Strike through SharkLoader","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/strikeshark-campaign/120326/","time":"10:00","priority":"MUST READ","score":94,"tldr":"Kaspersky uncovered StrikeShark, a previously undocumented campaign using the new SharkLoader malware to deploy Cobalt Strike against government, diplomatic, software development, and other organizations across multiple countries. The actor appears to gain access opportunistically through public-facing application exploits and malicious droppers, then uses persistence, API-hooking evasion, reconnaissance, and credential theft techniques.","briefOverview":"\u003cp\u003eKaspersky uncovered a previously undocumented malware family named \u003cstrong\u003eSharkLoader\u003c/strong\u003e while investigating activity affecting a diplomatic organization in Indonesia. The broader campaign, tracked as \u003cstrong\u003eStrikeShark\u003c/strong\u003e, uses SharkLoader to deploy \u003cstrong\u003eCobalt Strike Beacon\u003c/strong\u003e on compromised systems. Additional infections were identified across multiple countries and sectors, including government-related entities, software development companies, and organizations in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor gained initial access through exploitation of internet-facing applications, including Microsoft Exchange, Microsoft SharePoint, Openfire Server, and GeoServer, as well as through custom droppers disguised as legitimate software such as Google Update and Cisco AnyConnect. Kaspersky assesses with medium confidence that the actor primarily relies on publicly available proof-of-concept exploits, because all vulnerabilities observed during the investigation had public exploit code available. The campaign shows both strategic and opportunistic characteristics, with victims including government and software development organizations as well as a broader set of affected entities.\u003c/p\u003e\n\n\u003cp\u003eSharkLoader uses DLL side-loading, encrypted modules, reflective loading, API hooks, and memory protection changes to execute Cobalt Strike Beacon and hinder detection. The infection chain includes a legitimate \u003cstrong\u003eSystemSettings.exe\u003c/strong\u003e abused to load a malicious \u003cstrong\u003eSystemSettings.dll\u003c/strong\u003e, followed by encrypted components such as \u003cstrong\u003eDscCoreR.mui\u003c/strong\u003e and \u003cstrong\u003eSyncRes.dat\u003c/strong\u003e. Post-compromise activity included reconnaissance, Active Directory enumeration, use of tools such as FScan, Searchall, Pillager, and SharpGPOAbuse, and attempts to dump credentials from LSASS and the NTDS database.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Kaspersky uncovered a previously undocumented malware family named SharkLoader during research into activity affecting a diplomatic organization in Indonesia.","SharkLoader is used to deploy Cobalt Strike Beacon and was delivered through exploitation of internet-facing applications as well as through custom droppers disguised as legitimate software.","Observed exploitation involved products including Microsoft Exchange, Microsoft SharePoint, Openfire Server, GeoServer, Apache Shiro, Hikvision products, Zimbra Collaboration Suite, F5 BIG-IP, Fortinet FortiOS, Cisco IOS XE, and React Server Components.","SharkLoader uses DLL side-loading, encrypted components, reflective loading, API hooks, and memory protection changes around Cobalt Strike Beacon execution.","Victims identified in the campaign include government-related entities, software development companies, and other organizations in Indonesia, Taiwan, Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia."],"insights":["The actor appears to rely primarily on publicly available proof-of-concept exploits rather than custom exploit development, because all vulnerabilities observed in the campaign had public exploit code available.","SharkLoader’s dropper-based infections create two scheduled tasks: one that runs every second for immediate execution and is quickly removed, and another that runs every five minutes for longer-term persistence.","SharkLoader changes Cobalt Strike-related memory regions from executable permissions to read-write during Sleep calls and restores executable permissions afterward, indicating an explicit attempt to evade memory scanning for executable code regions.","The campaign combines opportunistic exploitation of many public-facing applications with victims that include government and software development organizations, creating a mixed pattern that Kaspersky says suggests both strategic and opportunistic characteristics.","Although several post-exploitation tools used in the campaign were developed by Chinese-speaking developers, Kaspersky found no code reuse, infrastructure overlap, or operational similarity sufficient to attribute the activity to a known threat actor."],"referencedReports":[{"title":"Perfect DLL Hijacking","url":"https://elliotonsecurity.com/perfect-dll-hijacking/","publisher":"Elliot Killick","context":"The article says SharkLoader implements a technique commonly referred to as “Perfect DLL Hijacking,” originally described by security researcher Elliot Killick on his blog.","category":"","primary":false},{"title":"Dynamic-Link Library Best Practices","url":"https://learn.microsoft.com/en-us/windows/win32/dlls/dynamic-link-library-best-practices","publisher":"Microsoft","context":"The article cites Microsoft’s DLL best practices to explain the Windows loader lock behavior that SharkLoader attempts to bypass.","category":"","primary":false}],"body":"\u003cp\u003eKaspersky uncovered a previously undocumented malware family named \u003cstrong\u003eSharkLoader\u003c/strong\u003e while investigating activity affecting a diplomatic organization in Indonesia. The broader campaign, tracked as \u003cstrong\u003eStrikeShark\u003c/strong\u003e, uses SharkLoader to deploy \u003cstrong\u003eCobalt Strike Beacon\u003c/strong\u003e on compromised systems. Additional infections were identified across multiple countries and sectors, including government-related entities, software development companies, and organizations in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor gained initial access through exploitation of internet-facing applications, including Microsoft Exchange, Microsoft SharePoint, Openfire Server, and GeoServer, as well as through custom droppers disguised as legitimate software such as Google Update and Cisco AnyConnect. Kaspersky assesses with medium confidence that the actor primarily relies on publicly available proof-of-concept exploits, because all vulnerabilities observed during the investigation had public exploit code available. The campaign shows both strategic and opportunistic characteristics, with victims including government and software development organizations as well as a broader set of affected entities.\u003c/p\u003e\n\n\u003cp\u003eSharkLoader uses DLL side-loading, encrypted modules, reflective loading, API hooks, and memory protection changes to execute Cobalt Strike Beacon and hinder detection. The infection chain includes a legitimate \u003cstrong\u003eSystemSettings.exe\u003c/strong\u003e abused to load a malicious \u003cstrong\u003eSystemSettings.dll\u003c/strong\u003e, followed by encrypted components such as \u003cstrong\u003eDscCoreR.mui\u003c/strong\u003e and \u003cstrong\u003eSyncRes.dat\u003c/strong\u003e. Post-compromise activity included reconnaissance, Active Directory enumeration, use of tools such as FScan, Searchall, Pillager, and SharpGPOAbuse, and attempts to dump credentials from LSASS and the NTDS database.\u003c/p\u003e\n"},{"n":3,"title":"Cordyceps CI/CD Flaws Expose 300+ GitHub Repositories to Supply-Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cordyceps-cicd-flaws-expose-300-github.html","time":"12:48","priority":"SHOULD READ","score":88,"tldr":"Researchers identified a CI/CD workflow weakness dubbed Cordyceps that lets unauthenticated GitHub users abuse pull request workflows to run code, steal credentials, and potentially take over repositories. Scans found more than 300 high-impact repositories exposed, including projects tied to Microsoft, Google, Apache, Cloudflare, and the Python Software Foundation.","briefOverview":"\u003cp\u003eCybersecurity researchers at Novee Security have identified a CI/CD workflow weakness named \u003cstrong\u003eCordyceps\u003c/strong\u003e that can allow attackers to hijack workflows and compromise open-source supply chains. Novee described it as a critical exploitable pattern affecting repositories at major organizations including Microsoft, Google, Apache, and Cloudflare. The company said the flaw can be exploited by any unauthenticated user with only a free account, without organization membership or special privileges.\u003c/p\u003e\n\n\u003cp\u003eNovee’s scan of about 30,000 high-impact repositories found more than 300 to be fully exploitable. The reported impact includes attacker-controlled code execution, credential theft, and supply chain compromise with severe downstream consequences. The core issue is weak CI/CD configurations that give pull requests more permissions than they should, allowing untrusted pull requests to trigger privileged workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article cites examples involving Microsoft Azure Sentinel, Google’s AI Agent Development Kit samples, Apache Doris, Cloudflare Workers SDK, and the Python Software Foundation’s Black project. Reported abuse paths included stealing a non-expiring GitHub App key, gaining authority over a Google Cloud repository, exfiltrating hard-coded CI credentials, and using crafted branch names to execute commands. Following responsible disclosure, Microsoft and Google confirmed impact, while Cloudflare, Python, and Apache applied hardening and patches.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Novee Security identified a CI/CD workflow weakness named Cordyceps that can allow attackers to hijack workflows and compromise open-source supply chains.","Novee Security said the flaw is exploitable by any unauthenticated user with only a free account, without organization membership or special privileges.","A scan of about 30,000 high-impact repositories found more than 300 to be fully exploitable, enabling attacker-controlled code execution, credential theft, and supply chain compromise.","Novee Security reported examples affecting Microsoft Azure Sentinel, Google adk-samples, Apache Doris, Cloudflare Workers SDK, and Python Software Foundation’s Black project.","Following responsible disclosure, Microsoft and Google confirmed impact, while Cloudflare, Python, and Apache applied hardening and patches."],"insights":["The issue can evade ordinary scanning because the individual workflow components may be functioning as designed, while the dangerous behavior appears only when untrusted pull request data crosses a trust boundary.","Some reported cases required very little attacker interaction, including Apache Doris scenarios where a single comment on any pull request or a forked pull request could run attacker code.","The affected workflows could expose especially powerful credentials, including a non-expiring GitHub App key in Microsoft Azure Sentinel and a token with full write permissions in Apache Doris.","Novee Security linked the spread of these weaknesses to agentic coding, saying such CI/CD flaws can be reproduced persistently and at scale across repositories."],"referencedReports":[{"title":"Cordyceps","url":"https://novee.security/blog/cordyceps/","publisher":"Novee Security","context":"The article is based on Novee Security’s research describing the Cordyceps CI/CD workflow weakness and quotes the company’s findings about exploitability and affected repositories.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers at Novee Security have identified a CI/CD workflow weakness named \u003cstrong\u003eCordyceps\u003c/strong\u003e that can allow attackers to hijack workflows and compromise open-source supply chains. Novee described it as a critical exploitable pattern affecting repositories at major organizations including Microsoft, Google, Apache, and Cloudflare. The company said the flaw can be exploited by any unauthenticated user with only a free account, without organization membership or special privileges.\u003c/p\u003e\n\n\u003cp\u003eNovee’s scan of about 30,000 high-impact repositories found more than 300 to be fully exploitable. The reported impact includes attacker-controlled code execution, credential theft, and supply chain compromise with severe downstream consequences. The core issue is weak CI/CD configurations that give pull requests more permissions than they should, allowing untrusted pull requests to trigger privileged workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article cites examples involving Microsoft Azure Sentinel, Google’s AI Agent Development Kit samples, Apache Doris, Cloudflare Workers SDK, and the Python Software Foundation’s Black project. Reported abuse paths included stealing a non-expiring GitHub App key, gaining authority over a Google Cloud repository, exfiltrating hard-coded CI credentials, and using crafted branch names to execute commands. Following responsible disclosure, Microsoft and Google confirmed impact, while Cloudflare, Python, and Apache applied hardening and patches.\u003c/p\u003e\n"},{"n":1,"title":"Stealthy Mistic backdoor linked to ransomware access broker KongTuke","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/stealthy-mistic-backdoor-linked-to-ransomware-access-broker-kongtuke/","time":"10:41","priority":"SHOULD READ","score":86,"tldr":"A new stealthy backdoor called Mistic has been linked to KongTuke, an initial access broker that sells compromised network access to ransomware groups. The malware is designed for long-term persistence, in-memory execution, and low-visibility control of infected systems.","briefOverview":"\u003cp\u003eA new backdoor called Mistic has been observed in financially motivated attacks against organizations in the insurance, education, IT, and professional services sectors. Symantec says the malware has been used in intrusions since April and believes it is linked to KongTuke, also known as Woodgnat. KongTuke is described as an initial access broker that compromises corporate networks and sells access to ransomware groups including Qilin, Interlock, Rhysida, Akira, 8Base, and Black Basta.\u003c/p\u003e\n\n\u003cp\u003eSymantec believes Mistic is a newly developed, stealthy backdoor designed for long-term persistence in compromised networks. In at least one incident, Mistic was deployed shortly after ModeloRAT, another backdoor attributed to KongTuke and delivered through Microsoft Teams social engineering attacks. The article says Mistic reflects a trend of custom tools being used in ransomware attacks, with the tool apparently developed by an initial access broker closely connected to the ransomware scene.\u003c/p\u003e\n\n\u003cp\u003eIn attacks investigated by Symantec, the infection involved launching the legitimate MpExtMs.exe executable to side-load a malicious version.dll file that loads Mistic, named EndpointDlp.dll. A separate .NET DLL displayed a fake login screen to steal victim credentials, while Mistic could communicate with its command-and-control infrastructure, manage files, adjust check-in frequency, run code in memory, and delete itself. Zscaler, which tracks the malware as MTLBackdoor, reported that it was delivered through a multi-stage ClickFix infection chain and can load Beacon Object Files to expand its capabilities.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Symantec researchers observed a new backdoor called Mistic in financially motivated attacks targeting organizations in the insurance, education, IT, and professional services sectors.","Mistic is believed to be linked to KongTuke, also known as Woodgnat, an initial access broker that sells compromised corporate network access to ransomware groups including Qilin, Interlock, Rhysida, Akira, 8Base, and Black Basta.","In attacks investigated by Symantec, a legitimate executable named MpExtMs.exe was used to side-load a malicious version.dll that loads Mistic, while a separate .NET DLL displays a fake login screen to steal credentials.","Mistic can upload, download, move, rename, and delete files; create folders; change how often it checks in with its command-and-control server; execute code in memory; and delete itself from a host.","Zscaler tracks Mistic as MTLBackdoor and reported that it was delivered through a multi-stage ClickFix infection chain in May, with the ability to load Beacon Object Files to expand its capabilities."],"insights":["Mistic’s use of a filename resembling Microsoft endpoint security tooling suggests the operators are deliberately trying to blend malicious activity into trusted-looking system activity.","The backdoor’s combination of in-memory payload execution and a self-delete capability makes disk-based evidence less reliable for detecting or investigating these intrusions.","The reported sequence of ModeloRAT followed shortly by Mistic in at least one incident indicates KongTuke-linked activity may involve multiple backdoors during the same intrusion.","Zscaler’s finding that Mistic can load Beacon Object Files shows the tool can expand its functions after deployment rather than being limited to its built-in commands.","The article connects Mistic to a broader KongTuke toolset that includes legitimate runtimes, fake browser extensions, and multiple loaders, highlighting that the same access broker uses varied delivery and execution methods."],"referencedReports":[{"title":"New Mistic Backdoor Linked to ModeloRAT","url":"https://www.security.com/threat-intelligence/new-mistic-backdoor-modeloRAT","publisher":"Symantec","context":"The article cites Symantec’s analysis of Mistic and quotes its researchers on the backdoor’s stealth and persistence features.","category":"","primary":false},{"title":"Technical Analysis: MLTBackdoor","url":"http://www.zscaler.com/blogs/security-research/technical-analysis-mltbackdoor","publisher":"Zscaler","context":"The article references Zscaler’s technical report identifying Mistic as MTLBackdoor and describing its delivery through a multi-stage ClickFix infection chain.","category":"","primary":false}],"body":"\u003cp\u003eA new backdoor called Mistic has been observed in financially motivated attacks against organizations in the insurance, education, IT, and professional services sectors. Symantec says the malware has been used in intrusions since April and believes it is linked to KongTuke, also known as Woodgnat. KongTuke is described as an initial access broker that compromises corporate networks and sells access to ransomware groups including Qilin, Interlock, Rhysida, Akira, 8Base, and Black Basta.\u003c/p\u003e\n\n\u003cp\u003eSymantec believes Mistic is a newly developed, stealthy backdoor designed for long-term persistence in compromised networks. In at least one incident, Mistic was deployed shortly after ModeloRAT, another backdoor attributed to KongTuke and delivered through Microsoft Teams social engineering attacks. The article says Mistic reflects a trend of custom tools being used in ransomware attacks, with the tool apparently developed by an initial access broker closely connected to the ransomware scene.\u003c/p\u003e\n\n\u003cp\u003eIn attacks investigated by Symantec, the infection involved launching the legitimate MpExtMs.exe executable to side-load a malicious version.dll file that loads Mistic, named EndpointDlp.dll. A separate .NET DLL displayed a fake login screen to steal victim credentials, while Mistic could communicate with its command-and-control infrastructure, manage files, adjust check-in frequency, run code in memory, and delete itself. Zscaler, which tracks the malware as MTLBackdoor, reported that it was delivered through a multi-stage ClickFix infection chain and can load Beacon Object Files to expand its capabilities.\u003c/p\u003e\n"},{"n":2,"title":"Indian auto giant Bajaj Auto hit by ransomware incident","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/indian-auto-giant-bajaj-auto-hit-by-ransomware","time":"13:23","priority":"SHOULD READ","score":82,"tldr":"Bajaj Auto disclosed a ransomware incident affecting its operations and its technology subsidiary, saying containment and mitigation efforts have so far been successful. The company has not identified the attacker or said whether data was stolen or a ransom was demanded.","briefOverview":"\u003cp\u003eBajaj Auto disclosed on Tuesday that it had been hit by a ransomware attack affecting its operations and Bajaj Auto Technology Limited. The company said in a regulatory filing that it became aware of the incident on Tuesday morning and took precautionary measures to contain its impact. It said its technical team and cybersecurity experts responded immediately, and that mitigation efforts had so far been successful.\u003c/p\u003e\n\n\u003cp\u003eBajaj Auto did not identify the threat actor behind the attack, say whether any data was stolen, or disclose whether a ransom demand had been made. The affected subsidiary, Bajaj Auto Technology Limited, focuses on technology development, engineering, and research. Bajaj Auto is one of India’s largest vehicle manufacturers and produces motorcycles, scooters, and commercial vehicles, while also being described as the world’s largest manufacturer of three-wheelers.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure comes amid a series of cyber incidents involving major Indian manufacturers. Earlier in the week, Tata Electronics confirmed a cybersecurity incident after the World Leaks extortion group published what it claimed were confidential documents stolen from the company, though the authenticity of those files has not been independently verified. The article states that there is no indication so far that the Bajaj Auto ransomware attack is connected to the Tata Electronics incident.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Bajaj Auto disclosed in a regulatory filing that it was hit by a ransomware attack affecting its operations and Bajaj Auto Technology Limited.","The company said it became aware of the incident on Tuesday morning and took precautionary measures to contain its impact.","Bajaj Auto said its technical team and cybersecurity experts responded immediately and that mitigation efforts had so far been successful.","Bajaj Auto did not disclose the threat actor, whether any data was stolen, or whether the attackers made a ransom demand.","The disclosure comes amid other cyber incidents involving major Indian manufacturers, including a recent Tata Electronics incident linked to claims by the World Leaks extortion group."],"insights":["The incident affected not only Bajaj Auto’s main operations but also Bajaj Auto Technology Limited, showing that the impact reached a subsidiary focused on technology development, engineering, and research.","Bajaj Auto’s disclosure left several material details unresolved, including attribution, data theft, and ransom demand, which limits outside assessment of the incident’s severity.","The article explicitly separates the Bajaj Auto ransomware incident from the Tata Electronics incident, stating there is no indication so far that the two are connected despite occurring amid cyber incidents involving major Indian manufacturers."],"referencedReports":[],"body":"\u003cp\u003eBajaj Auto disclosed on Tuesday that it had been hit by a ransomware attack affecting its operations and Bajaj Auto Technology Limited. The company said in a regulatory filing that it became aware of the incident on Tuesday morning and took precautionary measures to contain its impact. It said its technical team and cybersecurity experts responded immediately, and that mitigation efforts had so far been successful.\u003c/p\u003e\n\n\u003cp\u003eBajaj Auto did not identify the threat actor behind the attack, say whether any data was stolen, or disclose whether a ransom demand had been made. The affected subsidiary, Bajaj Auto Technology Limited, focuses on technology development, engineering, and research. Bajaj Auto is one of India’s largest vehicle manufacturers and produces motorcycles, scooters, and commercial vehicles, while also being described as the world’s largest manufacturer of three-wheelers.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure comes amid a series of cyber incidents involving major Indian manufacturers. Earlier in the week, Tata Electronics confirmed a cybersecurity incident after the World Leaks extortion group published what it claimed were confidential documents stolen from the company, though the authenticity of those files has not been independently verified. The article states that there is no indication so far that the Bajaj Auto ransomware attack is connected to the Tata Electronics incident.\u003c/p\u003e\n"},{"n":5,"title":"A Free Gmail Account Impersonating an Internal Employee Asked Payroll to Change a Bank Account","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/bec-payroll-redirect-gmail-display-name-impersonation-financial-institution","time":"11:00","priority":"MAY READ","score":72,"tldr":"A payroll redirect BEC used only display-name impersonation from a free Gmail account to pose as an internal employee and request a direct-deposit change, passing SPF, DKIM, and DMARC because there was no malicious payload. The key defense is mandatory out-of-band verification for any banking-change request, regardless of the apparent sender.","briefOverview":"\u003cp\u003eAn attacker used a free Gmail account to impersonate a named internal employee at a financial institution and contacted the payroll recipient by first name. The email politely requested an update to the employee’s direct-deposit banking information. It contained no links, no attachments, and no malicious code, making the request itself the entire attack.\u003c/p\u003e\n\n\u003cp\u003eThe display name matched a real employee, but the actual sender address was \u003ccode\u003echurchoffice11011[at]gmail[.]com\u003c/code\u003e, an unrelated consumer Gmail account. SPF, DKIM, and DMARC all passed because the message was legitimately sent through Gmail infrastructure, and those checks do not verify whether a display name matches the authenticated domain. IRONSCALES Adaptive AI flagged the message at 75% confidence as business email compromise and vendor email compromise based on the mismatch between the claimed identity and the sender address.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this type of payroll redirect attempt can cause financial loss if payroll staff process the banking change before inspecting the real sender or verifying the request. It recommends requiring out-of-band verification for all direct-deposit, ACH, or wire changes by calling the employee at a known, pre-existing number. It also recommends training payroll and finance teams to inspect free consumer email domains and treating first-contact addresses as high risk for sensitive requests.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An attacker used a free Gmail account, churchoffice11011[at]gmail[.]com, with a display name matching a real internal employee at a financial institution to contact a payroll recipient by first name.","The email requested an update to the employee’s direct-deposit banking information and contained no links, attachments, or malicious code.","SPF, DKIM, and DMARC all passed because the message was legitimately sent through Gmail infrastructure, while the deception was limited to the display name.","IRONSCALES Adaptive AI flagged the message at 75% confidence as business email compromise and vendor email compromise based on the mismatch between the claimed identity and the unrelated consumer Gmail address.","The article recommends out-of-band verification for all direct-deposit, ACH, or wire changes, such as calling the employee at a known pre-existing number before processing the request."],"insights":["Email authentication can fully pass while still leaving display-name impersonation unchecked, because DMARC evaluates domain alignment rather than whether the visible sender name matches a real person.","A calm, routine banking-change request may be effective precisely because it avoids obvious pressure tactics such as urgency, threats, links, or attachments that often trigger suspicion.","A first-contact consumer email address becomes a high-risk signal when it is paired with a sensitive HR or finance request, even if the message has no known bad indicators.","Requiring payroll staff to verify banking changes through a known, pre-existing phone number can neutralize this type of attack without relying on detecting malicious content in the email."],"referencedReports":[{"title":"Verizon DBIR 2026","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the Verizon DBIR 2026 as identifying BEC as the highest-cost category of social engineering fraud.","category":"","primary":false},{"title":"MITRE ATT\u0026CK T1534","url":"https://attack.mitre.org/techniques/T1534/","publisher":"MITRE","context":"The article references MITRE ATT\u0026CK T1534 as covering internal spearphishing, where impersonation of an insider bypasses trust assumptions.","category":"","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article cites CISA guidance on BEC as emphasizing out-of-band verification as the primary control.","category":"","primary":false},{"title":"Microsoft Digital Defense Report 2024","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2024","publisher":"Microsoft","context":"The article cites the Microsoft Digital Defense Report 2024 as reporting that BEC attacks increasingly bypass email authentication by operating at the display-name and social-engineering layer.","category":"","primary":false}],"body":"\u003cp\u003eAn attacker used a free Gmail account to impersonate a named internal employee at a financial institution and contacted the payroll recipient by first name. The email politely requested an update to the employee’s direct-deposit banking information. It contained no links, no attachments, and no malicious code, making the request itself the entire attack.\u003c/p\u003e\n\n\u003cp\u003eThe display name matched a real employee, but the actual sender address was \u003ccode\u003echurchoffice11011[at]gmail[.]com\u003c/code\u003e, an unrelated consumer Gmail account. SPF, DKIM, and DMARC all passed because the message was legitimately sent through Gmail infrastructure, and those checks do not verify whether a display name matches the authenticated domain. IRONSCALES Adaptive AI flagged the message at 75% confidence as business email compromise and vendor email compromise based on the mismatch between the claimed identity and the sender address.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this type of payroll redirect attempt can cause financial loss if payroll staff process the banking change before inspecting the real sender or verifying the request. It recommends requiring out-of-band verification for all direct-deposit, ACH, or wire changes by calling the employee at a known, pre-existing number. It also recommends training payroll and finance teams to inspect free consumer email domains and treating first-contact addresses as high risk for sensitive requests.\u003c/p\u003e\n"},{"n":6,"title":"How much cyber risk does AI create for organizations? 457 million security issues. Here’s what you can do about it.","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/how-much-cyber-risk-does-ai-create-for-organizations-457-million-security-issues-heres-what","time":"13:00","priority":"MAY READ","score":58,"tldr":"Tenable says AI tools, especially unapproved “shadow AI,” are creating massive security exposure through misconfigurations, unmanaged dependencies, exposed credentials, and attack paths that traditional CVE-focused vulnerability programs miss. Organizations should move toward continuous, AI-driven exposure management to map risk across assets and remediate the most critical paths faster.","briefOverview":"\u003cp\u003eTenable says its Tenable One Exposure Management Platform detected 457 million AI-related security issues across more than 7,000 organizations during a 30-day period. The article says this averaged 62,000 AI-related exposures per organization and was detected using 274 AI-specific plugins. It argues that approved and unapproved AI tools are creating risks tied largely to misconfigurations, unmanaged model dependencies, exposed credentials within AI workloads, and other issues outside standard CVEs.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts this with the poor state of traditional vulnerability remediation, citing the 2026 Verizon DBIR that 31% of breaches start with an unpatched CVE and that median time-to-patch has risen to 43 days. Tenable telemetry cited in the article found organizations still exposed to CVE-2024-21762 in Fortinet FortiOS, CVE-2021-44228 Log4Shell, and CVE-2017-0144 WannaCry. The article also says non-CVE findings make up about 37% of findings but account for 63% of breach entry points.\u003c/p\u003e\n\n\u003cp\u003eA shadow AI example describes a customer finding 12 unapproved OpenClaw instances installed on cloud workloads by a contractor who had API keys and access to source code. The instances were configured for remote management through Telegram, another unapproved tool, and were downloading software from the internet. The article recommends AI-driven exposure management to continuously discover assets, map attack paths across environments, prioritize the paths leading to critical assets, and automate remediation with guardrails and human oversight.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Tenable detected 457 million AI-related security issues across more than 7,000 organizations during a 30-day period, averaging 62,000 exposures per organization.","The article says AI-related risks are often tied to misconfigurations, unmanaged model dependencies, exposed credentials within AI workloads, and other non-CVE issues rather than standard CVEs.","Tenable telemetry cited in the article showed organizations still exposed to older vulnerabilities including CVE-2024-21762 in Fortinet FortiOS, CVE-2021-44228 Log4Shell, and CVE-2017-0144 WannaCry.","The article cites the 2026 Verizon DBIR as saying vulnerability exploitation is the most common initial access vector, while most breaches begin with non-CVE issues such as misconfigurations, stolen credentials, or exposed secrets.","The article argues that security teams should move beyond legacy vulnerability scanning to AI-driven exposure management that continuously maps attack paths and prioritizes fixes for paths leading to critical assets."],"insights":["A green vulnerability-remediation SLA dashboard can give a false sense of safety because the article says many serious risks come from non-CVE issues that traditional patch tracking does not cover.","The OpenClaw example shows that shadow AI risk can involve multiple layers at once: an unapproved AI tool, contractor access, API keys, source code access, remote Telegram control, and software downloads from the internet.","The article highlights a prioritization problem: Tenable says each security finding creates an average of three attack paths, so a large list of findings can translate into a much larger set of possible routes to critical assets.","The article argues that organizations should prioritize breaking the specific attack paths that lead to their most critical systems, rather than treating all findings or patch deadlines as equally important."],"referencedReports":[{"title":"2026 Verizon Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"The article cites the 2026 Verizon DBIR for breach causes, remediation rates for CISA KEV vulnerabilities, and median time-to-patch data.","category":"","primary":false},{"title":"CISA Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article references CISA’s KEV catalog as the list of CVEs being actively exploited in the wild when discussing remediation rates reported by the Verizon DBIR.","category":"","primary":false}],"body":"\u003cp\u003eTenable says its Tenable One Exposure Management Platform detected 457 million AI-related security issues across more than 7,000 organizations during a 30-day period. The article says this averaged 62,000 AI-related exposures per organization and was detected using 274 AI-specific plugins. It argues that approved and unapproved AI tools are creating risks tied largely to misconfigurations, unmanaged model dependencies, exposed credentials within AI workloads, and other issues outside standard CVEs.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts this with the poor state of traditional vulnerability remediation, citing the 2026 Verizon DBIR that 31% of breaches start with an unpatched CVE and that median time-to-patch has risen to 43 days. Tenable telemetry cited in the article found organizations still exposed to CVE-2024-21762 in Fortinet FortiOS, CVE-2021-44228 Log4Shell, and CVE-2017-0144 WannaCry. The article also says non-CVE findings make up about 37% of findings but account for 63% of breach entry points.\u003c/p\u003e\n\n\u003cp\u003eA shadow AI example describes a customer finding 12 unapproved OpenClaw instances installed on cloud workloads by a contractor who had API keys and access to source code. The instances were configured for remote management through Telegram, another unapproved tool, and were downloading software from the internet. The article recommends AI-driven exposure management to continuously discover assets, map attack paths across environments, prioritize the paths leading to critical assets, and automate remediation with guardrails and human oversight.\u003c/p\u003e\n"},{"n":4,"title":"Dawn of the Apex Agentic Adversary","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/dawn-of-apex-agentic-adversary.html","time":"11:30","priority":"MAY READ","score":45,"tldr":"The article argues that agentic AI will make attacks faster, more targeted, and harder to catalog, especially across converged IT/OT environments. Its main takeaway is that organizations need accurate asset discovery and attack-path visibility to close blind spots before automated adversaries exploit them.","briefOverview":"\u003cp\u003eThe article argues that cybersecurity is nearing the end of the era of “human-speed threats” because frontier agentic models emerging in early 2026 can actively test code rather than merely suggest it. It says these models compress the time between discovery and weaponization, allowing an exposure to be found, weaponized, and used before defenders can respond. The article frames this as a major shift from older timelines where bugs were cataloged, patched, and deployed over weeks or months.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations have increased their exposure by giving AI agents write access to repositories and allowing third-party AI wrappers to connect to internal APIs. It warns that AI-driven breaches may become fast, targeted, and mutated enough that sources such as CISA’s KEV Catalog and EPSS may not capture them in time. It also argues that converged IT and OT environments raise the stakes because an IT-originated breach could move into industrial systems and cause factory floor shutdowns or safety valve changes.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that attackers benefit from the gap between what organizations think is on their networks and what is actually there. It highlights hidden industrial devices behind protocol gateways, rogue access points, forgotten IoT devices, shadow IT, multi-homed devices, and technician laptops as important blind spots or paths for movement. The article promotes runZero’s capabilities for discovering IT, IoT, and OT assets, validating segmentation assumptions, mapping attack paths, and prioritizing choke points where vulnerabilities intersect with routes to critical assets.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article says frontier agentic models emerging in early 2026 can actively test code and sharply compress the time between vulnerability discovery and weaponization.","The article argues that organizations have increased risk by giving AI agents write access to repositories and allowing third-party AI wrappers to connect to internal APIs.","The article says AI-driven breaches may become fast, targeted, and mutated enough that traditional public tracking sources such as CISA's KEV Catalog and EPSS may not capture them in time.","The article warns that converged IT and OT environments can let automated attackers move from corporate systems into industrial networks through paths such as technician laptops, gateways, and insecure industrial protocols like Modbus, BACnet, and S7comm.","The article promotes runZero capabilities for discovering hidden IT, IoT, and OT assets, validating network segmentation assumptions, mapping attack paths, and prioritizing choke points where vulnerabilities intersect with viable paths to critical assets."],"insights":["The article frames asset inventory as a defensive control rather than a compliance task, because hidden devices and unknown network paths are described as the information gap that agentic attackers exploit.","The article highlights protocol gateways as a specific blind spot, noting that traditional tools may see only one gateway IP while many PLCs and field-level devices remain hidden behind it.","The article identifies multi-homed devices and technician laptops as especially important choke points because they can bridge corporate networks and factory networks despite assumed separation.","The article argues that prioritization should focus on exposures that intersect with viable cross-protocol paths to critical assets, rather than trying to fix every weakness equally."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that cybersecurity is nearing the end of the era of “human-speed threats” because frontier agentic models emerging in early 2026 can actively test code rather than merely suggest it. It says these models compress the time between discovery and weaponization, allowing an exposure to be found, weaponized, and used before defenders can respond. The article frames this as a major shift from older timelines where bugs were cataloged, patched, and deployed over weeks or months.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations have increased their exposure by giving AI agents write access to repositories and allowing third-party AI wrappers to connect to internal APIs. It warns that AI-driven breaches may become fast, targeted, and mutated enough that sources such as CISA’s KEV Catalog and EPSS may not capture them in time. It also argues that converged IT and OT environments raise the stakes because an IT-originated breach could move into industrial systems and cause factory floor shutdowns or safety valve changes.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that attackers benefit from the gap between what organizations think is on their networks and what is actually there. It highlights hidden industrial devices behind protocol gateways, rogue access points, forgotten IoT devices, shadow IT, multi-homed devices, and technician laptops as important blind spots or paths for movement. The article promotes runZero’s capabilities for discovering IT, IoT, and OT assets, validating segmentation assumptions, mapping attack paths, and prioritizing choke points where vulnerabilities intersect with routes to critical assets.\u003c/p\u003e\n"}]</script>
