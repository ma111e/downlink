<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

window.__DL_ARTICLES = [{"n":2,"title":"New Linux 'Dirty Frag' zero-day gives root on all major distros","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-linux-dirty-frag-zero-day-with-poc-exploit-gives-root-privileges/","time":"07:45","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"The newly disclosed Dirty Frag Linux zero-day allows local attackers to reliably escalate to root privileges across major distributions by chaining two kernel flaws, with no official patch available and only a temporary mitigation that breaks IPsec VPNs.","briefOverview":"\u003cp\u003eA new Linux zero-day vulnerability named Dirty Frag enables local attackers to gain root privileges on major distributions with a single command. Security researcher Hyunwoo Kim disclosed the flaw and released a proof-of-concept exploit on May 7, 2026. The vulnerability stems from a cryptographic interface introduced nearly nine years ago and chains two separate kernel flaws to modify protected files in memory. Unlike similar bugs, Dirty Frag relies on a deterministic logic bug that requires no race condition and maintains a very high success rate. Currently, there is no official CVE or patch available for Ubuntu, Red Hat Enterprise Linux, CentOS Stream, AlmaLinux, openSUSE Tumbleweed, and Fedora. Administrators can apply a temporary mitigation by disabling the esp4, esp6, and rxrpc kernel modules, though this action will break IPsec VPNs and AFS file systems. The disclosure arrives alongside ongoing patching efforts for the actively exploited Copy Fail vulnerability.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Dirty Frag vulnerability represents a critical privilege escalation flaw affecting most major Linux distributions. Security researcher Hyunwoo Kim publicly disclosed the issue and published a proof-of-concept exploit after an embargo was broken by an unrelated third party on May 7, 2026. The flaw was introduced approximately nine years ago within the Linux kernel\u0026rsquo;s algif_aead cryptographic algorithm interface. It operates by chaining the xfrm-ESP Page-Cache Write vulnerability and the RxRPC Page-Cache Write vulnerability together. This combination allows attackers to modify protected system files in memory without authorization. Although Dirty Frag belongs to the same vulnerability class as Dirty Pipe and Copy Fail, it exploits the fragment field of a different kernel data structure. Kim noted that the bug is a deterministic logic flaw that does not depend on timing windows or race conditions. Because the kernel does not panic when the exploit fails, the attack maintains a very high success rate. No CVE identifier has been assigned, and patches remain unavailable for Ubuntu, Red Hat Enterprise Linux, CentOS Stream, AlmaLinux, openSUSE Tumbleweed, and Fedora. To mitigate the risk, users are advised to remove the esp4, esp6, and rxrpc kernel modules through a modprobe configuration file. This workaround effectively neutralizes the exploit but simultaneously disables IPsec VPNs and AFS distributed network file systems on affected hosts. The disclosure coincides with ongoing efforts to patch the Copy Fail vulnerability, which CISA recently added to its Known Exploited Vulnerabilities Catalog. Federal agencies were ordered to secure their Linux systems within two weeks of that alert. Additionally, the article notes that distributions recently patched another privilege escalation flaw known as Pack2TheRoot in April.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview-and-impact\"\u003eVulnerability Overview and Impact\u003c/h3\u003e\n\n\u003cp\u003eThe Dirty Frag zero-day vulnerability enables local attackers to achieve immediate root privilege escalation across most major Linux distributions. The flaw requires only a single command to execute successfully. Security researcher Hyunwoo Kim disclosed the issue and released a proof-of-concept exploit on May 7, 2026. This public release occurred after an unrelated third party independently published the exploit, breaking a coordinated embargo.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism-and-classification\"\u003eTechnical Mechanism and Classification\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability originates from the Linux kernel\u0026rsquo;s algif_aead cryptographic algorithm interface, which was introduced roughly nine years ago. Dirty Frag functions by chaining two distinct kernel flaws: the xfrm-ESP Page-Cache Write vulnerability and the RxRPC Page-Cache Write vulnerability. This combination allows attackers to modify protected system files in memory without authorization. While Dirty Frag shares a classification with the Dirty Pipe and Copy Fail vulnerabilities, it specifically exploits the fragment field of a different kernel data structure. Kim emphasized that the flaw operates as a deterministic logic bug rather than a race condition. Consequently, the exploit does not require precise timing windows and avoids kernel panics upon failure. This design results in a consistently high success rate for privilege escalation attempts.\u003c/p\u003e\n\n\u003ch3 id=\"disclosure-status-and-affected-systems\"\u003eDisclosure Status and Affected Systems\u003c/h3\u003e\n\n\u003cp\u003eAs of the article\u0026rsquo;s publication, Dirty Frag has not been assigned a CVE identifier. Official patches remain unavailable for several major distributions, including Ubuntu, Red Hat Enterprise Linux, CentOS Stream, AlmaLinux, openSUSE Tumbleweed, and Fedora. Kim published the complete documentation and exploit after consulting with distribution maintainers on the linux-distros@vs.openwall.org mailing list. The decision to release the details publicly was driven by the broken embargo and the immediate security risks posed by unpatched systems.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-strategies-and-operational-trade-offs\"\u003eMitigation Strategies and Operational Trade-offs\u003c/h3\u003e\n\n\u003cp\u003eAdministrators can apply a temporary mitigation by disabling three specific kernel modules: esp4, esp6, and rxrpc. This is achieved by writing a configuration file to /etc/modprobe.d/dirtyfrag.conf and unloading the modules via the rmmod command. However, this mitigation carries significant operational consequences. Disabling these modules will break IPsec VPN connectivity and disrupt AFS distributed network file systems on affected hosts. Until official patches are released, organizations must weigh the security benefits against the loss of critical network and file system functionality.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-and-related-vulnerabilities\"\u003eIndustry Context and Related Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eThe Dirty Frag disclosure arrives during an active patching cycle for the Copy Fail vulnerability, another critical Linux privilege escalation flaw. Copy Fail is currently being actively exploited in the wild and was recently added to CISA\u0026rsquo;s Known Exploited Vulnerabilities Catalog. The agency mandated that federal agencies apply mitigations or discontinue affected products within two weeks. This rapid response timeline highlights the severe risk posed by unpatched kernel flaws in enterprise environments. Additionally, the article references the April patching of the Pack2TheRoot vulnerability, which stemmed from a decade-old flaw in the PackageKit daemon. These recurring kernel vulnerabilities underscore the persistent challenges of securing long-standing Linux codebases against modern attack techniques.\u003c/p\u003e\n","keyPoints":["The Dirty Frag Linux zero-day allows local attackers to gain root privileges on major distributions by chaining the xfrm-ESP and RxRPC Page-Cache Write kernel flaws.","This deterministic logic bug exploits a different kernel data structure than Dirty Pipe or Copy Fail and does not require a race condition to achieve high success rates.","No official patch or CVE-ID exists yet, leaving Ubuntu, Red Hat Enterprise Linux, CentOS Stream, AlmaLinux, openSUSE Tumbleweed, and Fedora currently unpatched.","A temporary mitigation involves removing the esp4, esp6, and rxrpc kernel modules, though this workaround will break IPsec VPNs and AFS distributed network file systems."],"insights":["The exploit relies on a deterministic logic bug rather than a race condition, making it highly reliable and immune to timing-based mitigations that typically protect against similar flaws like Dirty Pipe.","Applying the only available mitigation requires disabling the esp4, esp6, and rxrpc kernel modules, which immediately breaks IPsec VPN connectivity and AFS distributed network file systems on affected hosts.","The underlying flaw originates from the algif_aead cryptographic interface introduced nine years ago, illustrating how legacy kernel code paths continue to serve as viable attack surfaces for modern privilege escalation."],"referencedReports":[{"title":"CISA Alert: Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/01/cisa-adds-one-known-exploited-vulnerability-catalog/","publisher":"CISA","context":"The article references this advisory to note that CISA added the Copy Fail vulnerability to its KEV Catalog and ordered federal agencies to patch their Linux systems within two weeks."},{"title":"oss-security Mailing List Disclosure","url":"https://www.openwall.com/lists/oss-security/2026/05/07/8","publisher":"Openwall","context":"The article cites this security advisory as the official channel where researcher Hyunwoo Kim disclosed the Dirty Frag flaw and published the proof-of-concept exploit."}],"body":"\u003cp\u003eA new Linux zero-day vulnerability named Dirty Frag enables local attackers to gain root privileges on major distributions with a single command. Security researcher Hyunwoo Kim disclosed the flaw and released a proof-of-concept exploit on May 7, 2026. The vulnerability stems from a cryptographic interface introduced nearly nine years ago and chains two separate kernel flaws to modify protected files in memory. Unlike similar bugs, Dirty Frag relies on a deterministic logic bug that requires no race condition and maintains a very high success rate. Currently, there is no official CVE or patch available for Ubuntu, Red Hat Enterprise Linux, CentOS Stream, AlmaLinux, openSUSE Tumbleweed, and Fedora. Administrators can apply a temporary mitigation by disabling the esp4, esp6, and rxrpc kernel modules, though this action will break IPsec VPNs and AFS file systems. The disclosure arrives alongside ongoing patching efforts for the actively exploited Copy Fail vulnerability.\u003c/p\u003e\n"},{"n":1,"title":"CVE-2025-68670: discovering an RCE vulnerability in xrdp","source":"securelist.com","sourceColor":"#2dd4bf","link":"https://securelist.com/cve-2025-68670/119742/","time":"08:00","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Kaspersky researchers discovered a pre-authentication remote code execution vulnerability in the xrdp server caused by a stack buffer overflow in domain name processing, which was promptly patched by project maintainers following responsible disclosure.","briefOverview":"\u003cp\u003eKaspersky researchers uncovered a pre-authentication remote code execution vulnerability in the xrdp server during a security audit of the Kaspersky USB Redirector module. The flaw, tracked as CVE-2025-68670, resides in the \u003ccode\u003exrdp_wm_parse_domain_information\u003c/code\u003e function and triggers before client authentication occurs.\u003c/p\u003e\n\n\u003cp\u003eWhen processing a client domain name, the function copies data into a 256-byte stack buffer without proper bounds checking. Attackers can exploit UTF-16 to UTF-8 character expansion to craft a malicious domain name that overflows the buffer and overwrites the return address.\u003c/p\u003e\n\n\u003cp\u003eThis allows arbitrary code execution within the xrdp server process without requiring valid credentials. The xrdp maintainers quickly patched the issue in version 0.10.5 and backported the fix to earlier releases.\u003c/p\u003e\n\n\u003cp\u003eWhile compiler stack canaries can prevent trivial exploitation, the maintainers warn that they are not a complete defense. Kaspersky emphasizes that responsible disclosure and rapid patching significantly reduce the risk of exploitation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky researchers identified a critical remote code execution vulnerability in the xrdp server while conducting a security assessment of the Kaspersky USB Redirector module. The vulnerability, officially designated as CVE-2025-68670, exists within the \u003ccode\u003exrdp_wm_parse_domain_information\u003c/code\u003e function.\u003c/p\u003e\n\n\u003cp\u003eThis function processes the domain name sent by the client during the RDP Secure Settings Exchange phase, which occurs prior to authentication. The client transmits the domain name as a UTF-16 string with a maximum length of 512 bytes.\u003c/p\u003e\n\n\u003cp\u003eThe xrdp server converts this data to UTF-8 before passing it to the vulnerable function. The function checks if the domain string begins with an underscore and then searches for a double underscore character to isolate a substring.\u003c/p\u003e\n\n\u003cp\u003eThis substring is copied into a local \u003ccode\u003eresultIP\u003c/code\u003e buffer allocated on the stack with a fixed size of 256 bytes. The code uses \u003ccode\u003eg_strncpy\u003c/code\u003e without verifying the actual byte length of the converted UTF-8 string.\u003c/p\u003e\n\n\u003cp\u003eAttackers can exploit the character expansion inherent in UTF-16 to UTF-8 conversion to craft a domain name that exceeds the 256-byte limit. When the overflow occurs, the excess data overwrites the thread stack return address.\u003c/p\u003e\n\n\u003cp\u003eThis allows the attacker to redirect execution flow and achieve arbitrary code execution within the xrdp server process. The xrdp project maintainers responded rapidly to the disclosure and released a patch in version 0.10.5.\u003c/p\u003e\n\n\u003cp\u003eThey also backported the fix to versions 0.9.27 and 0.10.4.1. Although compiler stack canaries can block simple return address overwrites, the maintainers explicitly warn that relying on them alone is insufficient.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes by highlighting the importance of responsible disclosure and proactive security audits in strengthening open-source infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Discovery and Scope\u003c/strong\u003e\nKaspersky researchers uncovered a pre-authentication remote code execution vulnerability in the xrdp server during a routine security audit of the Kaspersky USB Redirector module. The issue was formally assigned CVE-2025-68670 and reported to the xrdp project maintainers through GitHub Security Advisories.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability resides in the \u003ccode\u003exrdp_wm_parse_domain_information\u003c/code\u003e function, which processes client domain information immediately before the authentication handshake. Because the flaw triggers prior to credential validation, an attacker can exploit it without possessing valid user credentials.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Mechanics of the Exploit\u003c/strong\u003e\nDuring the RDP Secure Settings Exchange, the client transmits protected credentials and configuration data within a Client Info PDU. The domain name field is encoded as a UTF-16 string with a maximum length of 512 bytes.\u003c/p\u003e\n\n\u003cp\u003eThe xrdp server converts this data to UTF-8 before passing it to the vulnerable function. The function checks if the domain string begins with an underscore and then searches for a double underscore character to isolate a substring.\u003c/p\u003e\n\n\u003cp\u003eThis substring is copied into a local \u003ccode\u003eresultIP\u003c/code\u003e buffer allocated on the stack with a fixed size of 256 bytes. The code uses \u003ccode\u003eg_strncpy\u003c/code\u003e without verifying the actual byte length of the converted UTF-8 string.\u003c/p\u003e\n\n\u003cp\u003eAttackers can exploit the character expansion inherent in UTF-16 to UTF-8 conversion to craft a domain name that exceeds the 256-byte limit. When the overflow occurs, the excess data overwrites the thread stack return address.\u003c/p\u003e\n\n\u003cp\u003eThis allows the attacker to redirect execution flow and achieve arbitrary code execution within the xrdp server process.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eProof of Concept and Exploitation Details\u003c/strong\u003e\nKaspersky developed a proof of concept using a custom RDP file containing a malicious domain name. The payload utilized Russian Cyrillic capital K characters to leverage UTF-16 to UTF-8 length expansion.\u003c/p\u003e\n\n\u003cp\u003eThe crafted string was designed to overwrite the return address with the hexadecimal sequence \u003ccode\u003e0x4141414141414141\u003c/code\u003e. When processed by the vulnerable server, the stack canary detected the corruption and triggered an abort, confirming the successful buffer overflow.\u003c/p\u003e\n\n\u003cp\u003eWhile stack canaries can prevent trivial exploitation by blocking direct return address overwrites, they do not eliminate the underlying vulnerability. Attackers could potentially leak or guess the canary value to preserve it while still overwriting the return address.\u003c/p\u003e\n\n\u003cp\u003eThe xrdp maintainers explicitly advise against relying solely on stack canaries for mitigation.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Response Timeline\u003c/strong\u003e\nThe disclosure timeline demonstrates a rapid response from the xrdp project maintainers. Kaspersky submitted the report on May 12, 2025, and the maintainers confirmed receipt the same day.\u003c/p\u003e\n\n\u003cp\u003eAfter investigation and prioritization, the vulnerability was assigned CVE-2025-68670 on December 24, 2025. A patch was merged into the main branch on January 27, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe maintainers released the fix in version 0.10.5 and backported the patch to versions 0.9.27 and 0.10.4.1. They also published a security bulletin detailing the issue and outlining risk mitigation strategies.\u003c/p\u003e\n\n\u003cp\u003eKaspersky emphasizes that responsible disclosure and proactive security assessments significantly enhance the resilience of open-source projects and enterprise security tools.\u003c/p\u003e\n","keyPoints":["Kaspersky researchers discovered a pre-authentication remote code execution vulnerability in the xrdp server during a security audit of the Kaspersky USB Redirector module.","The flaw exists in the xrdp_wm_parse_domain_information function, where a crafted domain name exceeding 256 bytes causes a stack buffer overflow that overwrites the return address.","Exploitation allows attackers to execute arbitrary code within the xrdp server process without requiring valid client credentials.","The xrdp maintainers promptly patched the vulnerability in version 0.10.5 and backported the fix to versions 0.9.27 and 0.10.4.1.","Although stack canaries mitigate trivial exploitation, the maintainers warn that they are not a complete defense against this vulnerability."],"insights":["Attackers can trigger pre-authentication RCE by exploiting UTF-16 to UTF-8 conversion length expansion to overflow a 256-byte stack buffer with a crafted domain name.","Compiler stack canaries are insufficient for mitigation, as attackers can leak or guess the canary value to preserve it while still overwriting the return address.","The xrdp maintainers explicitly warn against relying solely on stack canaries, recommending architectural fixes or strict input validation instead.","Exploitation requires a domain name starting with an underscore, containing a double underscore delimiter, and exceeding 256 bytes of UTF-8 data between them to overwrite the stack return address."],"referencedReports":[{"title":"Security Advisory GHSA-rwvg-gp87-gh6f","url":"https://github.com/neutrinolabs/xrdp/security/advisories/GHSA-rwvg-gp87-gh6f","publisher":"xrdp project maintainers","context":"The article references this as the official security bulletin issued by the xrdp maintainers that details the vulnerability and provides risk mitigation options."}],"body":"\u003cp\u003eKaspersky researchers uncovered a pre-authentication remote code execution vulnerability in the xrdp server during a security audit of the Kaspersky USB Redirector module. The flaw, tracked as CVE-2025-68670, resides in the \u003ccode\u003exrdp_wm_parse_domain_information\u003c/code\u003e function and triggers before client authentication occurs.\u003c/p\u003e\n\n\u003cp\u003eWhen processing a client domain name, the function copies data into a 256-byte stack buffer without proper bounds checking. Attackers can exploit UTF-16 to UTF-8 character expansion to craft a malicious domain name that overflows the buffer and overwrites the return address.\u003c/p\u003e\n\n\u003cp\u003eThis allows arbitrary code execution within the xrdp server process without requiring valid credentials. The xrdp maintainers quickly patched the issue in version 0.10.5 and backported the fix to earlier releases.\u003c/p\u003e\n\n\u003cp\u003eWhile compiler stack canaries can prevent trivial exploitation, the maintainers warn that they are not a complete defense. Kaspersky emphasizes that responsible disclosure and rapid patching significantly reduce the risk of exploitation.\u003c/p\u003e\n"},{"n":3,"title":"Former govt contractor convicted for wiping dozens of federal databases","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/former-govt-contractor-convicted-for-wiping-dozens-of-federal-databases/","time":"08:45","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Former federal contractor twin brothers were convicted for retaliating after termination by wiping nearly 100 government databases and attempting to cover their tracks, facing up to 45 years in prison for destroying sensitive federal records.","briefOverview":"\u003cp\u003eA federal jury convicted Sohaib Akhter of conspiring to destroy dozens of government databases after he and his twin brother were terminated as federal contractors. The brothers had previously served prison time in 2016 for wire fraud and unauthorized access to State Department systems. Following their termination in February 2025, they immediately accessed computer systems without authorization and deleted approximately 96 government databases. The wiped data included sensitive investigative documents and Freedom of Information Act records from multiple federal agencies. After deleting a Department of Homeland Security database, the brothers allegedly used an AI assistant to learn how to clear system logs. They also ran commands to prevent database modifications, destroyed evidence, and wiped company laptops before returning them. Sohaib Akhter will be sentenced on September 9, 2026, and faces a maximum penalty of 21 years in prison. FDIC Inspector General Jennifer L. Fain condemned the brothers\u0026rsquo; actions as a blatant disregard for federal information security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA 34-year-old Virginia man named Sohaib Akhter was found guilty of conspiring to destroy dozens of government databases. He and his twin brother, Muneeb Akhter, were previously sentenced to prison in 2016 for wire fraud and unauthorized access to U.S. State Department systems. After serving their sentences, the brothers were rehired as government contractors by a company hosting data for over 45 federal agencies. The company terminated both brothers during a remote meeting on February 18, 2025, after discovering Sohaib\u0026rsquo;s felony conviction. Immediately following their termination, the brothers accessed computers without authorization to harm their employer and government clients. They write-protected databases, deleted roughly 96 government databases, and destroyed evidence of their unlawful activities within several hours. The deleted data contained sensitive investigative documents and Freedom of Information Act records from multiple federal agencies. Following the deletion of a Department of Homeland Security database, the brothers allegedly asked an AI assistant how to clear system logs. Prosecutors noted that the men ran commands to prevent others from modifying the targeted databases before deletion. They also discussed cleaning out their house to avoid law enforcement searches and wiped company laptops before returning them. In November 2025, both brothers were charged with destruction of records, aggravated identity theft, computer fraud, and theft of government information. FDIC Inspector General Jennifer L. Fain stated that the unauthorized access and deliberate deletion of data demonstrated a severe disregard for federal system integrity. Sohaib Akhter is scheduled for sentencing on September 9, 2026, and faces a maximum penalty of 21 years in prison. Muneeb Akhter faces a maximum of 45 years for multiple counts of computer fraud, identity theft, and theft of U.S. government records.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"incident-overview\"\u003eIncident Overview\u003c/h1\u003e\n\n\u003cp\u003eA federal jury convicted Sohaib Akhter of conspiring to destroy dozens of government databases. The 34-year-old Virginia resident and his twin brother, Muneeb Akhter, were terminated as federal contractors on February 18, 2025. The brothers had previously served prison sentences starting in 2016 for wire fraud and unauthorized access to U.S. State Department systems. Following their prior convictions, they were rehired as contractors by a firm serving over 45 federal agencies.\u003c/p\u003e\n\n\u003ch1 id=\"retaliatory-actions-and-data-destruction\"\u003eRetaliatory Actions and Data Destruction\u003c/h1\u003e\n\n\u003cp\u003eThe company terminated both brothers during an online remote meeting after discovering Sohaib\u0026rsquo;s felony conviction. Immediately following their termination, the brothers accessed computers without authorization to harm their employer and government clients. They write-protected databases, deleted approximately 96 government databases, and destroyed evidence within several hours. The wiped data included sensitive investigative documents and Freedom of Information Act records from multiple federal agencies.\u003c/p\u003e\n\n\u003ch1 id=\"anti-forensics-and-evidence-tampering\"\u003eAnti-Forensics and Evidence Tampering\u003c/h1\u003e\n\n\u003cp\u003eAfter deleting a Department of Homeland Security database, the brothers allegedly used an AI assistant to query methods for clearing system logs. Prosecutors confirmed that the men ran commands to prevent others from modifying the targeted databases before deletion. They also discussed cleaning out their house in anticipation of a potential law enforcement search. Furthermore, the brothers wiped company laptops before returning them to their employer.\u003c/p\u003e\n\n\u003ch1 id=\"legal-charges-and-sentencing\"\u003eLegal Charges and Sentencing\u003c/h1\u003e\n\n\u003cp\u003eIn November 2025, both brothers faced multiple charges including destruction of records, aggravated identity theft, computer fraud, and theft of government information. FDIC Inspector General Jennifer L. Fain condemned the actions as a blatant disregard for federal information security. The brothers\u0026rsquo; specific charges and maximum penalties include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSohaib Akhter faces a maximum of 21 years in prison.\u003c/li\u003e\n\u003cli\u003eMuneeb Akhter faces a maximum of 45 years for two counts of computer fraud, conspiring to commit computer fraud and destroy records, two counts of aggravated identity theft, and theft of U.S. government records.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSohaib Akhter will be sentenced on September 9, 2026.\u003c/p\u003e\n","keyPoints":["Twin brothers Sohaib and Muneeb Akhter were convicted for conspiring to destroy dozens of federal government databases after being terminated as government contractors.","The brothers wiped approximately 96 government databases within hours in February 2025, including sensitive investigative documents and Freedom of Information Act records.","Following the database deletions, the brothers allegedly used an AI assistant to learn how to clear system logs and destroyed evidence by wiping their home and company laptops.","Both men face significant prison sentences, with Sohaib Akhter facing a maximum of 21 years and Muneeb Akhter facing a maximum of 45 years for computer fraud and record destruction charges.","Federal officials highlighted the brothers' deliberate destruction of sensitive government data and their attempts to conceal the criminal activity as a severe breach of federal system security."],"insights":["The attackers used an AI assistant to query methods for clearing system logs post-deletion, highlighting a novel anti-forensics technique where threat actors leverage generative AI for operational security.","Execution of write-protect commands prior to database deletion demonstrates a deliberate technique to bypass standard recovery mechanisms, underscoring the need for immutable database controls and strict write-authorization policies.","The immediate retaliatory action triggered by termination exposes critical gaps in automated offboarding protocols, indicating that privileged contractor access must be cryptographically revoked and monitored in real-time.","The brothers were rehired as federal contractors despite prior felony convictions, revealing potential vulnerabilities in continuous background vetting and access governance for third-party vendors managing sensitive government infrastructure."],"referencedReports":[],"body":"\u003cp\u003eA federal jury convicted Sohaib Akhter of conspiring to destroy dozens of government databases after he and his twin brother were terminated as federal contractors. The brothers had previously served prison time in 2016 for wire fraud and unauthorized access to State Department systems. Following their termination in February 2025, they immediately accessed computer systems without authorization and deleted approximately 96 government databases. The wiped data included sensitive investigative documents and Freedom of Information Act records from multiple federal agencies. After deleting a Department of Homeland Security database, the brothers allegedly used an AI assistant to learn how to clear system logs. They also ran commands to prevent database modifications, destroyed evidence, and wiped company laptops before returning them. Sohaib Akhter will be sentenced on September 9, 2026, and faces a maximum penalty of 21 years in prison. FDIC Inspector General Jennifer L. Fain condemned the brothers\u0026rsquo; actions as a blatant disregard for federal information security.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
