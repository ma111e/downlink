municated through Telegram and a shared online collaboration platform during the intrusion. Authorities also linked Flowers to intrusions at SSM Health Care Corporation and Sutter Health in the United States. Sentencing, originally tied to a June 22 trial schedule, was moved to July 16 after the guilty pleas.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Two members of the Scattered Spider cybercrime group, Thalha Jubair and Owen Flowers, pleaded guilty to hacking Transport for London systems in 2024 after previously denying involvement.","The intrusion took place between August 31 and September 3, 2024, and disrupted TfL services, including delaying customer refunds after attackers accessed data from the Oyster refunds system.","Transport for London said customer data was stolen in the attack, and the National Crime Agency said the incident caused £29 million in financial damage.","According to the NCA, the attack forced all 28,000 TfL employees to visit their local offices to reset their passwords.","Investigators said they found evidence on devices seized from Flowers’ home, including a screenshot showing connectivity to TfL infrastructure and videos showing Jubair breaching TfL systems."],"insights":["The National Crime Agency explicitly credited TfL’s early engagement with law enforcement as important to securing today’s convictions, making early reporting a concrete factor in the case outcome.","A breach of the Oyster refunds system had effects beyond data theft, directly interrupting customer refund operations and delaying payments to users.","The response burden was large enough that all 28,000 TfL employees had to reset their passwords in person at local offices, showing how a single intrusion can create major organization-wide disruption.","Investigators tied the suspects to the intrusion using operational artifacts found on seized devices, including a screenshot of connectivity to TfL infrastructure, marketplace access for stolen credentials, and videos of the breach.","Authorities said Flowers was also linked to intrusions at two U.S. healthcare organizations, indicating the investigation uncovered activity extending beyond the TfL incident."],"referencedReports":[],"body":"\u003cp\u003eTwo members of the Scattered Spider cybercrime group, Thalha Jubair and Owen Flowers, pleaded guilty to hacking Transport for London systems in 2024. The two had previously denied involvement but changed their pleas on the first day of proceedings at Woolwich Crown Court. The intrusion took place between August 31 and September 3, 2024. TfL is the public body responsible for most of London’s transportation networks and serves a metropolitan area of millions.\u003c/p\u003e\n\n\u003cp\u003eThe cyberattack disrupted TfL operations for days after the incident was disclosed on September 2, 2024. Attackers accessed data from TfL’s Oyster refunds system, disrupted customer refund services, and delayed refunds for some users. TfL later confirmed that customer data had been stolen in the attack. According to the National Crime Agency, the incident caused £29 million in financial damage and forced all 28,000 employees to visit local offices to reset their passwords.\u003c/p\u003e\n\n\u003cp\u003eInvestigators said they recovered incriminating evidence from devices seized at Flowers’ home, including a laptop screenshot showing connectivity to TfL infrastructure, evidence of access to a marketplace selling stolen credentials, and videos showing Jubair breaching TfL systems. The NCA said the two communicated through Telegram and a shared online collaboration platform during the intrusion. Authorities also linked Flowers to intrusions at SSM Health Care Corporation and Sutter Health in the United States. Sentencing, originally tied to a June 22 trial schedule, was moved to July 16 after the guilty pleas.\u003c/p\u003e\n"},{"n":3,"title":"Trump directs federal agencies to protect US data from quantum threats","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/trump-directs-federal-agencies-quantum-cryptography","time":"17:10","priority":"SHOULD READ","score":78,"tldr":"President Trump signed executive orders to speed up U.S. quantum technology efforts and require federal agencies to move to post-quantum encryption on an accelerated timeline to protect sensitive data from future quantum-enabled decryption. The key risk driving the move is that adversaries may steal encrypted data now and decrypt it later once powerful quantum computers become available.","briefOverview":"\u003cp\u003ePresident Donald Trump signed two executive orders on Monday aimed at accelerating U.S. quantum technology development and protecting government systems against future cyber threats from quantum computers. One order tells federal agencies to update U.S. quantum policy to reflect recent technological advances and stronger global competition. It also shifts attention toward practical uses of quantum technologies, including computing, sensing and networking. The second order focuses on speeding the government’s move to post-quantum cryptography, which is designed to protect data from future quantum-capable systems.\u003c/p\u003e\n\n\u003cp\u003eThe post-quantum order directs the Department of Commerce, the National Security Agency and the Department of Homeland Security to give federal agencies practical guidance for adopting quantum-resistant encryption. It also requires agencies to appoint officials to oversee the transition and to upgrade critical systems by 2030 or 2031, depending on the system type. In addition, the Department of Commerce must launch a pilot program by the end of 2027 to help agencies prepare for the migration. The White House said the accelerated timeline is meant to keep American cybersecurity aligned with emerging technology and the growing quantum industry.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that large-scale quantum computers capable of breaking current encryption standards do not yet exist, but officials have increasingly warned about a “harvest now, decrypt later” risk. In that scenario, adversaries could collect encrypted communications today and store them until future quantum systems are able to unlock the data. The article says this concern has pushed governments and technology companies to start replacing vulnerable cryptographic standards years in advance. It also notes that allies such as the United Kingdom have issued their own migration guidance, with a phased roadmap running from 2028 to 2035.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["President Donald Trump signed two executive orders aimed at accelerating U.S. quantum technology development and protecting government systems against future cyber threats posed by quantum computers.","One executive order directs federal agencies to update U.S. quantum policy, keep pace with technological advances and global competition, and focus more on practical applications such as computing, sensing, and networking.","A second executive order seeks to speed the federal government's transition to post-quantum cryptography and directs the Department of Commerce, the National Security Agency, and the Department of Homeland Security to provide agencies with guidance on adopting quantum-resistant encryption.","The order requires federal agencies to designate officials to oversee the transition and to upgrade critical systems to post-quantum cryptography by 2030 or 2031, depending on the type of system.","The White House said the accelerated timeline responds to the growing quantum industry and concerns that adversaries could collect encrypted communications now and decrypt them later when quantum computers become powerful enough."],"insights":["The order sets concrete migration deadlines of 2030 or 2031 for critical federal systems even though large-scale quantum computers that could break current encryption do not yet exist.","The article frames the main risk as long-term exposure of data already being collected today, since adversaries could store encrypted communications now and decrypt them in the future.","The Department of Commerce is required to launch a pilot program by the end of 2027, showing that the policy includes a near-term implementation step rather than only long-range deadlines.","The U.S. move aligns with a broader international pattern, as the article notes that the U.K. has already issued a phased roadmap for adopting quantum-resistant cryptography through 2035."],"referencedReports":[{"title":"Q\u0026A: How to protect your data in a post-quantum world","url":"https://therecord.media/qa-how-to-protect-data-in-post-quantum-world","publisher":"The Record","context":"The article cites this piece when describing warnings about the \"harvest now, decrypt later\" threat.","category":"","primary":false},{"title":"NIST’s first post-quantum cryptography standards are due this summer","url":"https://therecord.media/nist-post-quantum-cryptography-standards-publishing-soon","publisher":"The Record","context":"The article references this report to note that researchers have developed post-quantum algorithms intended to resist future quantum attacks.","category":"","primary":false},{"title":"ITI Reacts to Trump Administration's Quantum Executive Orders","url":"https://www.itic.org/news-events/news-releases/iti-reacts-to-trump-administration-s-quantum-executive-orders","publisher":"Information Technology Industry Council","context":"The article links this statement as the source for John Miller's reaction welcoming the executive order timelines.","category":"","primary":false},{"title":"NCSC urges organisations to prepare for migration to post-quantum cryptography","url":"https://therecord.media/uk-ncsc-quantum-resistant-algorithms-transition","publisher":"The Record","context":"The article cites this coverage when comparing the U.S. move to U.K. guidance on transitioning to quantum-resistant cryptographic systems.","category":"","primary":false}],"body":"\u003cp\u003ePresident Donald Trump signed two executive orders on Monday aimed at accelerating U.S. quantum technology development and protecting government systems against future cyber threats from quantum computers. One order tells federal agencies to update U.S. quantum policy to reflect recent technological advances and stronger global competition. It also shifts attention toward practical uses of quantum technologies, including computing, sensing and networking. The second order focuses on speeding the government’s move to post-quantum cryptography, which is designed to protect data from future quantum-capable systems.\u003c/p\u003e\n\n\u003cp\u003eThe post-quantum order directs the Department of Commerce, the National Security Agency and the Department of Homeland Security to give federal agencies practical guidance for adopting quantum-resistant encryption. It also requires agencies to appoint officials to oversee the transition and to upgrade critical systems by 2030 or 2031, depending on the system type. In addition, the Department of Commerce must launch a pilot program by the end of 2027 to help agencies prepare for the migration. The White House said the accelerated timeline is meant to keep American cybersecurity aligned with emerging technology and the growing quantum industry.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that large-scale quantum computers capable of breaking current encryption standards do not yet exist, but officials have increasingly warned about a “harvest now, decrypt later” risk. In that scenario, adversaries could collect encrypted communications today and store them until future quantum systems are able to unlock the data. The article says this concern has pushed governments and technology companies to start replacing vulnerable cryptographic standards years in advance. It also notes that allies such as the United Kingdom have issued their own migration guidance, with a phased roadmap running from 2028 to 2035.\u003c/p\u003e\n"},{"n":6,"title":"Fake AI Agent Skill Passed Security Scans and Reportedly Reached 26,000 Agents","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fake-ai-agent-skill-passed-security.html","time":"15:16","priority":"SHOULD READ","score":77,"tldr":"A fake AI agent skill passed multiple popular security scanners, was added to a trusted marketplace, and reportedly spread to thousands of agents by hiding its real instructions behind an external link that was changed after approval. The key takeaway is that current skill-scanning and trust signals like GitHub stars do not reliably protect AI agents from malicious or mutable external dependencies.","briefOverview":"\u003cp\u003eSecurity firm AIR said it created a fake AI agent skill called \u003cstrong\u003ebrand-landingpage\u003c/strong\u003e, submitted it to a popular skill marketplace, and promoted it with an Instagram ad aimed at marketers, salespeople, and designers. AIR reported that the skill reached about 26,000 agents, including some on corporate accounts. The harmless demo payload only collected the user\u0026rsquo;s email address. The experiment was meant to show that common trust signals for agent skills, including scanner verdicts, GitHub stars, and open-source reputation, can fail.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the scanners AIR tested, including Cisco\u0026rsquo;s scanner, NVIDIA\u0026rsquo;s Skillspector, and the scanners built into skills.sh, only evaluated the files shipped with the skill package. AIR\u0026rsquo;s skill itself contained no malicious setup instructions and instead pointed the agent to external documentation at \u003cstrong\u003estitch-design.ai\u003c/strong\u003e, a domain AIR controlled that initially redirected to legitimate Google Stitch documentation. After the skill was installed widely, AIR changed that external page so it instructed the agent to download and run a script. In the demo, that script only emailed the user\u0026rsquo;s address back to AIR, but the article says a real operator could have used that access to reach files, data, or internal systems available to the agent.\u003c/p\u003e\n\n\u003cp\u003eThe article says this is a structural problem because the scan happens once, while the external page a skill references can be changed afterward. It also notes that earlier research from Trail of Bits and other researchers independently demonstrated the same external-link blind spot and scanner disagreement. For defenders, the article recommends treating skills as software, checking what they point to rather than only what ships inside them, routing new skills through a controlled source, re-checking them when anything changes, pinning versions, and limiting agent privileges. The article also cautions that AIR\u0026rsquo;s scale claims, including the 26,000 number and the corporate-account detail, are AIR\u0026rsquo;s own claims and are not independently confirmed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Security firm AIR created a fake AI agent skill called brand-landingpage, submitted it to a popular skill marketplace, promoted it with an Instagram ad, and says it reached about 26,000 agents, including some on corporate accounts.","AIR reported that every skill security scanner it tested, including Cisco's skill-scanner, NVIDIA's Skillspector, and the scanners used by skills.sh, marked the skill as safe.","The skill itself contained no harmful setup steps and instead instructed the agent to install a Stitch SDK by visiting stitch-design.ai, a domain controlled by AIR rather than Google.","After the skill had been widely installed, AIR changed the external page so it told the agent to download and run a script that, in the demonstration, only sent the user's email address back to AIR.","The article says the core weakness is structural because scanners review a fixed submitted package, while the external web content a skill points to can be changed after approval."],"insights":["The article shows that a skill can inherit trust from a highly starred GitHub marketplace repository after a pull request is merged, even though those stars do not reflect any review of the new skill itself.","According to the article, the scanners AIR tested only evaluate the files submitted with the skill, which leaves them blind to setup instructions hosted on external websites that can be modified later.","The write-up ties AIR's demonstration to earlier independent research from Trail of Bits and other researchers, indicating that this external-link blind spot has already been reproduced across multiple skill-scanning tools.","The article emphasizes that many skills were installed with no review, making basic inventory of what agents are already running an immediate defensive need, not just better scanning of future additions.","Although AIR presents the 26,000-agent reach as evidence of scale, the article explicitly notes that this number and the claim of broad control are AIR's own claims and are not independently confirmed."],"referencedReports":[{"title":"The Story of Skills","url":"https://www.air.security/blog-posts/the-story-of-skills","publisher":"air","context":"The article cites AIR's own write-up describing the fake skill experiment, how it passed scanners, and how AIR measured installations.","category":"","primary":false},{"title":"The Sorry State of Skill Distribution","url":"https://blog.trailofbits.com/2026/06/03/the-sorry-state-of-skill-distribution/","publisher":"trail of bits","context":"The article references this earlier research as an independent demonstration that multiple malicious-skill scanners could be bypassed because they only inspect fixed submitted packages.","category":"","primary":false},{"title":"Anthropic Agent Skills Overview","url":"https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview","publisher":"anthropic","context":"The article points to Anthropic's documentation because it explicitly warns that skills fetching external URLs are risky since the linked content can change after review.","category":"","primary":false},{"title":"Skill Scanner Disagreement","url":"https://theweatherreport.ai/posts/skill-scanner-disagreement/","publisher":"the weather report","context":"The article cites this research to support the claim that different skill scanners often disagree because each evaluates a skill in isolation and misses external-link changes.","category":"","primary":false}],"body":"\u003cp\u003eSecurity firm AIR said it created a fake AI agent skill called \u003cstrong\u003ebrand-landingpage\u003c/strong\u003e, submitted it to a popular skill marketplace, and promoted it with an Instagram ad aimed at marketers, salespeople, and designers. AIR reported that the skill reached about 26,000 agents, including some on corporate accounts. The harmless demo payload only collected the user\u0026rsquo;s email address. The experiment was meant to show that common trust signals for agent skills, including scanner verdicts, GitHub stars, and open-source reputation, can fail.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the scanners AIR tested, including Cisco\u0026rsquo;s scanner, NVIDIA\u0026rsquo;s Skillspector, and the scanners built into skills.sh, only evaluated the files shipped with the skill package. AIR\u0026rsquo;s skill itself contained no malicious setup instructions and instead pointed the agent to external documentation at \u003cstrong\u003estitch-design.ai\u003c/strong\u003e, a domain AIR controlled that initially redirected to legitimate Google Stitch documentation. After the skill was installed widely, AIR changed that external page so it instructed the agent to download and run a script. In the demo, that script only emailed the user\u0026rsquo;s address back to AIR, but the article says a real operator could have used that access to reach files, data, or internal systems available to the agent.\u003c/p\u003e\n\n\u003cp\u003eThe article says this is a structural problem because the scan happens once, while the external page a skill references can be changed afterward. It also notes that earlier research from Trail of Bits and other researchers independently demonstrated the same external-link blind spot and scanner disagreement. For defenders, the article recommends treating skills as software, checking what they point to rather than only what ships inside them, routing new skills through a controlled source, re-checking them when anything changes, pinning versions, and limiting agent privileges. The article also cautions that AIR\u0026rsquo;s scale claims, including the 26,000 number and the corporate-account detail, are AIR\u0026rsquo;s own claims and are not independently confirmed.\u003c/p\u003e\n"},{"n":9,"title":"Payouts King Ransomware Initial Access Broker Deploys New Edgecution Malware","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/payouts-king-ransomware-initial-access-broker-deploys-new-edgecution","time":"14:57","priority":"SHOULD READ","score":77,"tldr":"Zscaler uncovered Edgecution, a new malware campaign tied to a Payouts King initial access broker that uses a malicious Microsoft Edge extension and Chrome native messaging to bypass the browser sandbox and run a Python backdoor on victims’ systems. The key takeaway is that attackers are combining Teams-based social engineering with a stealthy, headless-browser extension to gain persistent host access and execute commands while evading many traditional defenses.","briefOverview":"\u003cp\u003eZscaler ThreatLabz documented a campaign linked to an initial access broker associated with Payouts King ransomware that deploys a new malware family called Edgecution. The malware uses a malicious Microsoft Edge extension together with a Python-based backdoor to establish a foothold on victim systems. According to the article, the attackers begin with social engineering through Microsoft Teams messages that impersonate IT staff and direct victims to a fake Microsoft update website. The site provides several delivery options, including AutoHotKey, batch, and PowerShell-based setup methods.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is significant because the Edge extension abuses the Chrome native messaging protocol to reach beyond the browser sandbox and interact directly with the local system. The Python backdoor can collect system information, access the filesystem, launch processes, and execute arbitrary code, while the extension communicates with command-and-control servers over WebSockets. The setup scripts create a scheduled task that launches Microsoft Edge in headless mode with the malicious extension loaded, which keeps the extension hidden from normal user view. The article also notes that the setup stores a registry key used to decrypt strings in the Python backdoor and creates a native messaging host manifest that allows the extension to invoke the local backdoor.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz observed command-and-control infrastructure hosted on AWS using cloudfront.net subdomains, and the browser extension supports both browser-focused and privileged command handling. Some extension features, such as keyword monitoring, are described as likely decoys because the malware runs in a headless browser. After successful command-and-control communication, the malware stores the server URL in browser local storage and deletes the original configuration file. Zscaler says its security platform detects indicators related to this threat and provides several command-and-control and file hash indicators of compromise.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Zscaler ThreatLabz analyzed a campaign linked to an initial access broker associated with Payouts King ransomware that deploys a malicious Microsoft Edge extension called Edgecution.","The campaign begins with social engineering through Microsoft Teams messages and a fake Microsoft update website that delivers setup scripts, an AutoHotKey executable, and an encrypted ZIP archive.","Edgecution uses the Chrome native messaging protocol to let a hidden Microsoft Edge extension communicate with a Python-based backdoor that can collect system information, access the filesystem, launch processes, and execute arbitrary code.","The setup creates a scheduled task that launches Microsoft Edge in headless mode with the malicious extension loaded, making the extension invisible during normal browser use.","ThreatLabz observed Edgecution command-and-control servers communicating over WebSockets on cloudfront.net subdomains hosted on Amazon Web Services."],"insights":["The browser extension’s keyword and tab monitoring features are likely a decoy, because the article notes the extension runs in headless mode and therefore does not observe a user’s normal browsing activity.","The setup scripts place a hex value named AppKey in HKCU\\\\SOFTWARE\\\\Microsoft\\\\Edge and use it to decrypt strings in the Python backdoor, which both hides the backdoor’s contents and prevents it from working without the correct key.","After the extension successfully connects to command and control, the malware moves the server address into the browser’s local storage and deletes the original configuration file, reducing obvious artifacts on disk.","The article says Edgecution starts a new Python process for each supported command and exits after returning the result, which may limit the long-running footprint of the backdoor process.","The fake update site offers three separate deployment paths—AutoHotKey, Windows batch script, and PowerShell script—showing that the operators built in multiple ways to install the same malware."],"referencedReports":[],"body":"\u003cp\u003eZscaler ThreatLabz documented a campaign linked to an initial access broker associated with Payouts King ransomware that deploys a new malware family called Edgecution. The malware uses a malicious Microsoft Edge extension together with a Python-based backdoor to establish a foothold on victim systems. According to the article, the attackers begin with social engineering through Microsoft Teams messages that impersonate IT staff and direct victims to a fake Microsoft update website. The site provides several delivery options, including AutoHotKey, batch, and PowerShell-based setup methods.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is significant because the Edge extension abuses the Chrome native messaging protocol to reach beyond the browser sandbox and interact directly with the local system. The Python backdoor can collect system information, access the filesystem, launch processes, and execute arbitrary code, while the extension communicates with command-and-control servers over WebSockets. The setup scripts create a scheduled task that launches Microsoft Edge in headless mode with the malicious extension loaded, which keeps the extension hidden from normal user view. The article also notes that the setup stores a registry key used to decrypt strings in the Python backdoor and creates a native messaging host manifest that allows the extension to invoke the local backdoor.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz observed command-and-control infrastructure hosted on AWS using cloudfront.net subdomains, and the browser extension supports both browser-focused and privileged command handling. Some extension features, such as keyword monitoring, are described as likely decoys because the malware runs in a headless browser. After successful command-and-control communication, the malware stores the server URL in browser local storage and deletes the original configuration file. Zscaler says its security platform detects indicators related to this threat and provides several command-and-control and file hash indicators of compromise.\u003c/p\u003e\n"},{"n":5,"title":"Trump Order Sets 2030 Deadline for Federal Post-Quantum Crypto Migration","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/trump-order-sets-2030-deadline-for.html","time":"15:16","priority":"SHOULD READ","score":76,"tldr":"President Trump signed an executive order requiring U.S. federal agencies to migrate high-value and high-impact systems to post-quantum cryptography by 2030 for key establishment and 2031 for digital signatures, accelerating the government’s previous timeline. The order also pushes agencies and contractors to inventory where current cryptography is used so they can replace vulnerable algorithms before quantum computers make today’s encrypted data readable.","briefOverview":"\u003cp\u003ePresident Trump signed an executive order on June 22 that sets firm deadlines for federal agencies to migrate high-value assets and high-impact systems to post-quantum cryptography. The order requires key establishment to move by December 31, 2030 and digital signatures by December 31, 2031, while national security systems remain on a separate track. It pulls the government\u0026rsquo;s timeline forward by four to five years compared with the 2035 target set by the 2022 National Security Memorandum 10. The order frames the move as a response to the risk that adversaries can collect encrypted U.S. data now and decrypt it later when large-scale quantum computers become available.\u003c/p\u003e\n\n\u003cp\u003eThe deadlines align with NIST standards finalized in August 2024, with key establishment using FIPS 203, ML-KEM, and digital signatures using FIPS 204 and 205, ML-DSA and SLH-DSA. Within 30 days, each agency head must name a post-quantum cryptography migration lead reporting to the agency CIO, and within 90 days OMB must issue guidance requiring agencies to review inventories of high-value assets and high-impact systems and submit migration plans. NIST must complete a pilot migration on a subset of its own systems by December 31, 2027. The article says the standards have been ready for almost two years, and the order is what turns them into a schedule with consequences.\u003c/p\u003e\n\n\u003cp\u003eThe order also extends beyond federal networks through procurement and inventory requirements. The Federal Acquisition Regulatory Council has 180 days to propose a rule requiring covered contractors to meet NIST\u0026rsquo;s FIPS, including post-quantum algorithms, by December 31, 2030, and another proposed rule due in 270 days would add cryptographic flaws to contractor vulnerability disclosure programs. Within 270 days, CISA and NIST must publish minimum elements for a machine-readable cryptographic bill of materials so organizations can identify where cryptography is used. The article says the practical challenge for agencies and contractors is inventorying every place key exchange and signatures occur so they can replace non-NIST post-quantum cryptography before the deadlines.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["President Trump signed an executive order on June 22 requiring federal agencies to move high-value assets and high-impact systems to post-quantum cryptography, with deadlines of December 31, 2030 for key establishment and December 31, 2031 for digital signatures.","The order says adversaries can collect encrypted U.S. data now and decrypt it later once a large-scale quantum computer exists, a risk described as \"harvest now, decrypt later.\"","The executive order accelerates the federal post-quantum cryptography timeline by four to five years compared with the 2035 government-wide target set by the 2022 National Security Memorandum 10.","Within 30 days, each agency head must name a post-quantum cryptography migration lead, and within 90 days OMB must issue guidance requiring agencies to review inventories of high-value assets and high-impact systems and submit migration plans.","The Federal Acquisition Regulatory Council has 180 days to propose a rule requiring covered contractors to meet NIST's FIPS, including post-quantum cryptography algorithms, by December 31, 2030."],"insights":["The order turns already finalized NIST post-quantum standards into a government-wide schedule with consequences, shifting the main challenge from waiting for standards to executing migration plans on deadline.","The article highlights that the immediate bottleneck is not choosing new algorithms but building a complete inventory of where key exchange and digital signatures are used, because organizations cannot replace cryptography they have not identified.","The executive order extends pressure beyond federal agencies by directing the Federal Acquisition Regulatory Council to draft rules for covered contractors, making post-quantum migration a likely procurement requirement rather than only an internal government objective.","By requiring CISA and NIST to define minimum elements for a machine-readable cryptographic bill of materials, the order treats visibility into cryptographic components as foundational to future crypto-agility.","The article notes that national security systems are excluded from these deadlines and remain on a separate track, showing that the order focuses specifically on non-national-security federal systems even while accelerating the broader government timeline."],"referencedReports":[],"body":"\u003cp\u003ePresident Trump signed an executive order on June 22 that sets firm deadlines for federal agencies to migrate high-value assets and high-impact systems to post-quantum cryptography. The order requires key establishment to move by December 31, 2030 and digital signatures by December 31, 2031, while national security systems remain on a separate track. It pulls the government\u0026rsquo;s timeline forward by four to five years compared with the 2035 target set by the 2022 National Security Memorandum 10. The order frames the move as a response to the risk that adversaries can collect encrypted U.S. data now and decrypt it later when large-scale quantum computers become available.\u003c/p\u003e\n\n\u003cp\u003eThe deadlines align with NIST standards finalized in August 2024, with key establishment using FIPS 203, ML-KEM, and digital signatures using FIPS 204 and 205, ML-DSA and SLH-DSA. Within 30 days, each agency head must name a post-quantum cryptography migration lead reporting to the agency CIO, and within 90 days OMB must issue guidance requiring agencies to review inventories of high-value assets and high-impact systems and submit migration plans. NIST must complete a pilot migration on a subset of its own systems by December 31, 2027. The article says the standards have been ready for almost two years, and the order is what turns them into a schedule with consequences.\u003c/p\u003e\n\n\u003cp\u003eThe order also extends beyond federal networks through procurement and inventory requirements. The Federal Acquisition Regulatory Council has 180 days to propose a rule requiring covered contractors to meet NIST\u0026rsquo;s FIPS, including post-quantum algorithms, by December 31, 2030, and another proposed rule due in 270 days would add cryptographic flaws to contractor vulnerability disclosure programs. Within 270 days, CISA and NIST must publish minimum elements for a machine-readable cryptographic bill of materials so organizations can identify where cryptography is used. The article says the practical challenge for agencies and contractors is inventorying every place key exchange and signatures occur so they can replace non-NIST post-quantum cryptography before the deadlines.\u003c/p\u003e\n"},{"n":7,"title":"GitHub Updates actions/checkout to Block Common Pwn Request Attack Patterns","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/github-updates-actionscheckout-to-block.html","time":"14:22","priority":"SHOULD READ","score":76,"tldr":"GitHub is updating actions/checkout to block the most common unsafe pull_request_target patterns that let forked pull requests run attacker-controlled code with repository secrets and write privileges. The change is meant to curb \"pwn request\" supply chain attacks by making these risky checkouts fail by default unless maintainers explicitly opt out.","briefOverview":"\u003cp\u003eGitHub is updating \u003ccode\u003eactions/checkout\u003c/code\u003e to block common “pwn request” patterns that abuse the \u003ccode\u003epull_request_target\u003c/code\u003e workflow trigger to run malicious code with the workflow’s full privileges. Effective June 18, 2026, \u003ccode\u003eactions/checkout\u003c/code\u003e will refuse to fetch fork pull request code in \u003ccode\u003epull_request_target\u003c/code\u003e and certain \u003ccode\u003eworkflow_run\u003c/code\u003e workflows by default, with the change expected to be backported to all currently supported major versions on July 16, 2026. The protection applies when a pull request comes from a fork and the checkout uses repository, refs, or commit SHAs that resolve to the fork’s pull request code, unless maintainers explicitly set \u003ccode\u003eallow-unsafe-pr-checkout\u003c/code\u003e to \u003ccode\u003etrue\u003c/code\u003e. GitHub said this is intended to stop the most common form of pwn requests in the Actions ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that \u003ccode\u003epull_request_target\u003c/code\u003e runs in the context of the base repository’s default branch and can expose secrets and a privileged \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e with read and write permissions. If a workflow uses \u003ccode\u003eactions/checkout\u003c/code\u003e to download and run code from an untrusted fork, an attacker can steal tokens or other secrets and gain the workflow’s full privileges. GitHub warns that these risks include cache poisoning and unintended access to write privileges or secrets. The company said recent software supply chain attacks, including compromises affecting Nx, PostHog, TanStack, and \u003ccode\u003ekubernetes-el/kubernetes-el\u003c/code\u003e, have weaponized this behavior.\u003c/p\u003e\n\n\u003cp\u003eGitHub and Socket emphasized that the new behavior is only a guardrail, not a complete solution for Actions security. The change only blocks checkouts of fork pull request head and merge commits through \u003ccode\u003eactions/checkout\u003c/code\u003e, and it does not prevent other methods of checking out or executing untrusted code, such as using \u003ccode\u003egit\u003c/code\u003e, the GitHub CLI, or unrelated third-party repositories. GitHub advises developers to use \u003ccode\u003epull_request_target\u003c/code\u003e only when necessary, switch to \u003ccode\u003epull_request\u003c/code\u003e if elevated permissions or secrets are not required, restrict workflow permissions, and make sure user-controlled input cannot lead to execution of untrusted code. Workflows that run with secrets, write access, deployment permissions, or OIDC publishing access still require careful review.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["GitHub is updating actions/checkout so that, starting June 18, 2026, it blocks common pwn request patterns by default in pull_request_target and some workflow_run workflows involving forked pull requests.","The new behavior refuses unsafe checkouts when a workflow tries to fetch code, refs, or commit SHAs that resolve to a fork pull request, unless maintainers explicitly set allow-unsafe-pr-checkout to true.","GitHub said pull_request_target runs in the context of the base repository’s default branch and can expose secrets and a GITHUB_TOKEN with read and write permissions.","The risk comes from checking out and running untrusted code from a fork in a privileged workflow, which can let attackers steal tokens or secrets and gain the workflow’s full privileges.","GitHub and Socket said the change is only a guardrail for actions/checkout and does not eliminate the need to review any workflow that runs untrusted code with secrets, write access, deployment permissions, or OIDC publishing access."],"insights":["GitHub’s safeguard is narrowly targeted: it blocks only common unsafe fork pull request checkouts performed through actions/checkout, not other ways of fetching untrusted code such as git, the GitHub CLI, or unrelated third-party repositories.","The protection applies not only to pull_request_target but also to workflow_run when the original event was a pull_request* event, extending the guardrail to a less obvious workflow path.","Maintainers can still bypass the new default by explicitly setting allow-unsafe-pr-checkout to true, which means insecure behavior remains possible if workflows intentionally opt out.","GitHub is planning to backport the safer behavior to all currently supported major versions of actions/checkout, so existing workflows may begin failing even without upgrading to the newest major release.","The article ties this workflow pattern to multiple real supply chain compromises, including Nx, PostHog, TanStack, and kubernetes-el/kubernetes-el, showing that this is an exploited operational weakness rather than a purely theoretical risk."],"referencedReports":[{"title":"Safer pull_request_target defaults for GitHub Actions checkout","url":"https://github.blog/changelog/2026-06-18-safer-pull_request_target-defaults-for-github-actions-checkout/","publisher":"GitHub","context":"The article cites this GitHub changelog entry as the source announcing that actions/checkout v7 will refuse common unsafe fork pull request checkout patterns by default.","category":"","primary":false},{"title":"Secure use reference for pull_request_target","url":"https://docs.github.com/en/actions/reference/security/securely-using-pull_request_target","publisher":"GitHub","context":"The article references this GitHub documentation for the allow-unsafe-pr-checkout opt-out setting and for GitHub’s warning about the risks of running untrusted code in pull_request_target workflows.","category":"","primary":false},{"title":"The Monsters in Your Build Cache — GitHub Actions Cache Poisoning","url":"https://adnanthekhan.com/2024/05/06/the-monsters-in-your-build-cache-github-actions-cache-poisoning/","publisher":"Adnan Khan","context":"The article links to this technical analysis when mentioning cache poisoning as one of the vulnerabilities associated with running untrusted code in pull_request_target workflows.","category":"","primary":false},{"title":"Pwn Request Threat: A Hidden Danger in GitHub Actions","url":"https://www.endorlabs.com/learn/pwn-request-threat-a-hidden-danger-in-github-actions","publisher":"Endor Labs","context":"The article cites this Endor Labs write-up to explain the concept of a pwn request attack in GitHub Actions.","category":"","primary":false},{"title":"Preventing pwn requests","url":"https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/","publisher":"GitHub Security Lab","context":"The article links to this GitHub Security Lab technical resource as an explanation of pwn request attacks and how they arise in GitHub Actions workflows.","category":"","primary":false}],"body":"\u003cp\u003eGitHub is updating \u003ccode\u003eactions/checkout\u003c/code\u003e to block common “pwn request” patterns that abuse the \u003ccode\u003epull_request_target\u003c/code\u003e workflow trigger to run malicious code with the workflow’s full privileges. Effective June 18, 2026, \u003ccode\u003eactions/checkout\u003c/code\u003e will refuse to fetch fork pull request code in \u003ccode\u003epull_request_target\u003c/code\u003e and certain \u003ccode\u003eworkflow_run\u003c/code\u003e workflows by default, with the change expected to be backported to all currently supported major versions on July 16, 2026. The protection applies when a pull request comes from a fork and the checkout uses repository, refs, or commit SHAs that resolve to the fork’s pull request code, unless maintainers explicitly set \u003ccode\u003eallow-unsafe-pr-checkout\u003c/code\u003e to \u003ccode\u003etrue\u003c/code\u003e. GitHub said this is intended to stop the most common form of pwn requests in the Actions ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that \u003ccode\u003epull_request_target\u003c/code\u003e runs in the context of the base repository’s default branch and can expose secrets and a privileged \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e with read and write permissions. If a workflow uses \u003ccode\u003eactions/checkout\u003c/code\u003e to download and run code from an untrusted fork, an attacker can steal tokens or other secrets and gain the workflow’s full privileges. GitHub warns that these risks include cache poisoning and unintended access to write privileges or secrets. The company said recent software supply chain attacks, including compromises affecting Nx, PostHog, TanStack, and \u003ccode\u003ekubernetes-el/kubernetes-el\u003c/code\u003e, have weaponized this behavior.\u003c/p\u003e\n\n\u003cp\u003eGitHub and Socket emphasized that the new behavior is only a guardrail, not a complete solution for Actions security. The change only blocks checkouts of fork pull request head and merge commits through \u003ccode\u003eactions/checkout\u003c/code\u003e, and it does not prevent other methods of checking out or executing untrusted code, such as using \u003ccode\u003egit\u003c/code\u003e, the GitHub CLI, or unrelated third-party repositories. GitHub advises developers to use \u003ccode\u003epull_request_target\u003c/code\u003e only when necessary, switch to \u003ccode\u003epull_request\u003c/code\u003e if elevated permissions or secrets are not required, restrict workflow permissions, and make sure user-controlled input cannot lead to execution of untrusted code. Workflows that run with secrets, write access, deployment permissions, or OIDC publishing access still require careful review.\u003c/p\u003e\n"},{"n":1,"title":"The Exploit Doesn't Exist. You Can Still Prove It Works Against You","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-exploit-doesnt-exist-you-can-still-prove-it-works-against-you/","time":"14:01","priority":"MAY READ","score":60,"tldr":"This sponsored article argues that AI has shrunk the time from vulnerability disclosure to weaponization to hours, making patching alone too slow to manage risk. Its main takeaway is that organizations should validate whether a CVE is actually exploitable in their environment by testing the required attack-technique chain against existing controls, even when no public exploit exists or live exploitation is unsafe.","briefOverview":"\u003cp\u003eThe article argues that AI has sharply reduced the time between vulnerability disclosure and weaponization, shrinking it from roughly 53 days two years ago to about 8 hours on average in 2026 according to Zero Day Clock. It says this change breaks the assumptions behind traditional vulnerability management, where organizations relied on longer remediation windows. Citing Verizon’s 2026 Data Breach Investigations Report, it adds that median fix time for known-exploited vulnerabilities is now 43 days and that full patching rates have declined. The piece contends that when exploit development moves in hours and remediation takes weeks, patching alone cannot close the exposure gap.\u003c/p\u003e\n\n\u003cp\u003eThe article says automated pentesting improves speed but still cannot answer exploitability questions where no safe or public exploit exists, where assets are too critical or isolated to test, or during the day-one window before exploit code is ready. It describes this as leaving only 10 to 15% of total exposure suitable for safe live exploitation in a typical enterprise. To address that gap, the article presents TTP-chain validation, which maps a CVE to the sequence of techniques required for exploitation and tests each step against deployed controls such as EDR, GPO hardening, LSASS protection, allow-listing, and firewalls. According to the article, if any required link in the chain is blocked, the exploit cannot succeed on that asset even without firing a live exploit.\u003c/p\u003e\n\n\u003cp\u003eAs a concrete example, the article uses CVE-2025-29824, a Windows CLFS use-after-free vulnerability tied to Storm-2460 and RansomEXX activity, and breaks it into steps including certutil and MSBuild execution, KASLR bypass, kernel execution, token modification, dllhost injection, and LSASS dumping. It says this allows organizations to determine whether the vulnerability is actually exploitable in their environment and to justify patch, mitigation, monitoring, or acceptance decisions with evidence. The article also references Anthropic’s Mythos-class model and says it found a flaw that had remained in OpenBSD for 27 years, presenting this as evidence that the 2025 baseline is only the floor for future weaponization speed. Overall, the piece promotes continuous validation of exploit chains and existing controls as the practical answer to the question of what is truly exploitable right now.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article says AI has reduced the time from vulnerability disclosure to weaponization from roughly 53 days two years ago to about 8 hours on average in 2026, according to Zero Day Clock.","It states that Verizon's 2026 Data Breach Investigations Report found a median 43-day fix time for known-exploited vulnerabilities, with the share of organizations fully patching them dropping from 38% to 26%.","The article argues that automated pentesting cannot cover CVEs that lack a public or safe exploit, systems that are too critical or isolated to test with live exploitation, or day-one vulnerabilities before exploit code is ready.","It describes TTP-chain validation as mapping a CVE to the sequence of techniques needed for exploitation and testing each technique against deployed controls to determine whether the exploit chain can succeed without launching a live exploit.","As an example, the article uses CVE-2025-29824, a Windows CLFS use-after-free tied to Storm-2460 and RansomEXX activity, and says controls such as allow-listing or LSASS protection can break the required technique chain and make the CVE non-exploitable on a given asset."],"insights":["The article reframes vulnerability prioritization from asking which flaws have the highest scores to asking which ones are actually exploitable in a specific environment with its existing controls.","A central claim is that proving a vulnerability is not exploitable can be as operationally valuable as proving a live exploit works, especially for regulated, air-gapped, or business-critical systems that cannot safely be tested with real exploit code.","The piece highlights that automated pentesting, even when continuous, still leaves most of the exposure picture unanswered because it depends on both a working exploit and an asset that is safe to target.","By breaking a CVE into the exact steps an attacker would need and testing those steps individually, the article argues teams can reach a defensible patch, mitigate, monitor, or accept decision within hours of disclosure rather than waiting for exploit development or patch cycles.","The article suggests that last quarter's risk acceptance should not be treated as permanent because exploitability can change as controls, configurations, and environments change over time."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"verizon","context":"The article cites this report for statistics on median fix times and patching rates for known-exploited vulnerabilities across more than 13,000 organizations.","category":"","primary":false},{"title":"glasswing initial update","url":"https://www.anthropic.com/research/glasswing-initial-update","publisher":"anthropic","context":"The article references this research update for the claim that fewer than 0.6% of CVEs in 2025 were ever patched.","category":"","primary":false},{"title":"glasswing","url":"https://www.anthropic.com/glasswing","publisher":"anthropic","context":"The article points to this Anthropic research page to support the claim that a Mythos-class model found a long-hidden flaw in OpenBSD.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI has sharply reduced the time between vulnerability disclosure and weaponization, shrinking it from roughly 53 days two years ago to about 8 hours on average in 2026 according to Zero Day Clock. It says this change breaks the assumptions behind traditional vulnerability management, where organizations relied on longer remediation windows. Citing Verizon’s 2026 Data Breach Investigations Report, it adds that median fix time for known-exploited vulnerabilities is now 43 days and that full patching rates have declined. The piece contends that when exploit development moves in hours and remediation takes weeks, patching alone cannot close the exposure gap.\u003c/p\u003e\n\n\u003cp\u003eThe article says automated pentesting improves speed but still cannot answer exploitability questions where no safe or public exploit exists, where assets are too critical or isolated to test, or during the day-one window before exploit code is ready. It describes this as leaving only 10 to 15% of total exposure suitable for safe live exploitation in a typical enterprise. To address that gap, the article presents TTP-chain validation, which maps a CVE to the sequence of techniques required for exploitation and tests each step against deployed controls such as EDR, GPO hardening, LSASS protection, allow-listing, and firewalls. According to the article, if any required link in the chain is blocked, the exploit cannot succeed on that asset even without firing a live exploit.\u003c/p\u003e\n\n\u003cp\u003eAs a concrete example, the article uses CVE-2025-29824, a Windows CLFS use-after-free vulnerability tied to Storm-2460 and RansomEXX activity, and breaks it into steps including certutil and MSBuild execution, KASLR bypass, kernel execution, token modification, dllhost injection, and LSASS dumping. It says this allows organizations to determine whether the vulnerability is actually exploitable in their environment and to justify patch, mitigation, monitoring, or acceptance decisions with evidence. The article also references Anthropic’s Mythos-class model and says it found a flaw that had remained in OpenBSD for 27 years, presenting this as evidence that the 2025 baseline is only the floor for future weaponization speed. Overall, the piece promotes continuous validation of exploit chains and existing controls as the practical answer to the question of what is truly exploitable right now.\u003c/p\u003e\n"},{"n":8,"title":"The Code You Didn't Write Is Still Yours to Defend","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/the-code-you-didnt-write-is-still-yours-to-defend?utm_medium=feed","time":"15:41","priority":"MAY READ","score":60,"tldr":"AI agents are creating a fast-growing software supply chain risk by automatically pulling and running unseen packages in sandboxes outside normal security controls. The article argues companies need real-time threat intelligence and ingest-time blocking across builds, laptops, and agent environments to stop malicious dependencies before they run.","briefOverview":"\u003cp\u003eThe article argues that AI assistants are creating a new software supply chain exposure by automatically pulling and running open source packages in temporary sandboxes to complete ordinary tasks. The author describes asking an AI assistant to clean up a spreadsheet and chart the results, only to have it fetch and execute packages they never selected or reviewed. According to the article, this kind of package ingestion can happen outside scanners, registry proxies, and review processes. The result is a growing blind spot across organizations that give employees access to AI agents.\u003c/p\u003e\n\n\u003cp\u003eThe piece says two changes have made the threat landscape more dangerous: AI has lowered the skill barrier for hiding malicious code changes, and more code now runs once inside agent environments without ever reaching a repository. It argues that traditional vulnerability management tools are too slow because they are designed to answer where a package was used after a compromise becomes known, not to stop a malicious package before it is ingested. The author cites examples showing how quickly the window now moves, including a working exploit appearing within about two hours of the copyfail patch becoming visible and malicious packages being imported by real projects within minutes. The article also warns that a seven-day package cooldown reduces one risk while delaying security patches during a period when patch-to-exploit windows are measured in hours.\u003c/p\u003e\n\n\u003cp\u003eAs a better approach, the author recommends governance at the point of ingest using a frequently updated threat intelligence feed and controls that can block downloads or builds the moment a compromised package appears in a dependency tree. The article says the main challenge is coverage, because code now enters through build pipelines, developer laptops, and especially agent environments that many organizations have not mapped. It also includes the author’s experience with Socket as both a customer and later a strategic advisor, presenting Socket’s software composition analysis and Socket Firewall as examples of controls aimed at these workflows. The piece concludes that threat feeds tied to ingest controls will become a standard security layer, similar to endpoint detection today.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that AI agents now pull and run open source packages in temporary environments on users’ behalf, creating software supply chain events outside normal review and scanning processes.","It says the threat landscape has changed because AI lowers the skill needed to hide malicious code changes and because more code now runs once inside agent sandboxes without ever reaching a repository.","The article states that traditional vulnerability management tools are too slow for current supply chain attacks, which can move from patch visibility or malicious package publication to exploitation or adoption within hours or minutes.","It argues that package version cooldown policies reduce one risk but can also delay security patches, widening exposure when patch-to-exploit windows are very short.","The author says effective defense requires real-time threat intelligence tied to controls that can block package downloads or builds across build pipelines, developer laptops, and agent environments."],"insights":["The article reframes a routine AI-assisted task like cleaning a spreadsheet as a software supply chain event because the agent silently fetched and executed third-party packages without the user asking for code.","It highlights a trade-off in seven-day package cooldown policies: they may reduce exposure to newly published malicious packages, but they also delay needed security patches at a time when working exploits can appear within hours.","The author points to agent sandboxes as a largely unmapped blind spot where code can run once and disappear, making traditional repository-based and post-incident visibility tools ineffective.","The article suggests the real control problem is no longer just detecting bad dependencies after the fact, but placing blocking controls at every ingest point, including developer laptops and agent environments that often bypass central proxies and build pipelines."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that AI assistants are creating a new software supply chain exposure by automatically pulling and running open source packages in temporary sandboxes to complete ordinary tasks. The author describes asking an AI assistant to clean up a spreadsheet and chart the results, only to have it fetch and execute packages they never selected or reviewed. According to the article, this kind of package ingestion can happen outside scanners, registry proxies, and review processes. The result is a growing blind spot across organizations that give employees access to AI agents.\u003c/p\u003e\n\n\u003cp\u003eThe piece says two changes have made the threat landscape more dangerous: AI has lowered the skill barrier for hiding malicious code changes, and more code now runs once inside agent environments without ever reaching a repository. It argues that traditional vulnerability management tools are too slow because they are designed to answer where a package was used after a compromise becomes known, not to stop a malicious package before it is ingested. The author cites examples showing how quickly the window now moves, including a working exploit appearing within about two hours of the copyfail patch becoming visible and malicious packages being imported by real projects within minutes. The article also warns that a seven-day package cooldown reduces one risk while delaying security patches during a period when patch-to-exploit windows are measured in hours.\u003c/p\u003e\n\n\u003cp\u003eAs a better approach, the author recommends governance at the point of ingest using a frequently updated threat intelligence feed and controls that can block downloads or builds the moment a compromised package appears in a dependency tree. The article says the main challenge is coverage, because code now enters through build pipelines, developer laptops, and especially agent environments that many organizations have not mapped. It also includes the author’s experience with Socket as both a customer and later a strategic advisor, presenting Socket’s software composition analysis and Socket Firewall as examples of controls aimed at these workflows. The piece concludes that threat feeds tied to ingest controls will become a standard security layer, similar to endpoint detection today.\u003c/p\u003e\n"},{"n":4,"title":"Compromise kids online safety bill unveiled by House leaders, with key omission","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/compromise-kids-online-safety-bill-unveiled-omission","time":"15:20","priority":"MAY READ","score":58,"tldr":"House leaders unveiled a bipartisan kids online safety bill that advances major restrictions and age-verification rules but drops the controversial duty of care provision many lawmakers wanted to force platforms to redesign harmful features. The omission could complicate Senate support even as the bill gains momentum in the House.","briefOverview":"\u003cp\u003eThe House Energy and Commerce Committee released a bipartisan kids online safety bill that serves as the House vehicle for the Kids Online Safety Act. The compromise measure omits the duty of care provision that would have required online platforms to take reasonable measures to prevent harms such as suicidal ideation, eating disorders, and cyberbullying by changing algorithm and design features. That omission is notable because the duty of care standard has long been backed by Democrats and some Republicans, and the article says 76 senators have supported including it. Sen. Marsha Blackburn criticized the change, saying that without a duty of care, major technology companies will continue prioritizing profit over children’s safety.\u003c/p\u003e\n\n\u003cp\u003eThe House package still includes a wide range of online safety requirements. It would block minors from using disappearing messages, require AI chatbots to state that they are not human, force pornography sites to use age verification technology, regulate video games, and create a data broker registry for platforms receiving children’s data. The bill also preempts state laws that are weaker than the federal standard while allowing states to adopt stricter rules, and it allows preemption of some state AI laws. Chairman Brett Guthrie said months of negotiations produced a bipartisan agreement that would create the strongest protections to date.\u003c/p\u003e\n\n\u003cp\u003eThe bill’s future remains uncertain despite bipartisan momentum in the House. Blackburn is working with the White House on a separate updated proposal that is expected to restore the duty of care provision and add rules addressing AI deepfakes and app downloads by minors without parental consent. Digital rights advocates praised some child safety measures but warned that age verification could endanger privacy and limit access to constitutionally protected material. Cobun Zweifel-Keegan of IAPP DC called the compromise a major step toward passage, while also noting that Senate Democrats have already made clear their objections to KOSA without a duty of care.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The House Energy and Commerce Committee released a bipartisan kids online safety bill that omits the duty of care provision that would have required platforms to take reasonable measures to prevent harms such as suicidal ideation, eating disorders, and cyberbullying.","The compromise House bill includes provisions to block minors from using disappearing messages, require AI chatbots to state that they are not human, force porn sites to use age verification technology, regulate video games, and create a data broker registry for platforms receiving kids’ data.","Sen. Marsha Blackburn criticized the omission of the duty of care provision and said Big Tech companies will maintain the status quo of putting profit before children's safety without a strong federal standard.","The bill would preempt state laws that are weaker than the federal standard while allowing states to enact stricter rules, and it also allows for preemption of some state AI laws.","Some digital freedoms experts praised parts of the bill for improving kids' online safety but warned that age verification requirements could threaten privacy and access to constitutionally protected materials."],"insights":["The most politically significant change in the House compromise is not what it adds, but what it removes: the duty of care provision that the article says 76 senators across party lines have supported.","The bill takes a mixed federal-state approach by overriding weaker state laws while explicitly allowing stricter state rules, rather than creating a fully uniform national standard.","The package goes beyond social media and addresses several separate online risks at once, including disappearing messages, AI chatbot disclosure, pornography age checks, video games, and data brokers handling children’s data.","Even supporters quoted in the article frame the bill’s path forward as uncertain, because the new House version may align better with the Senate bill while Senate Democrats have already objected to KOSA without a duty of care.","The article highlights a core tradeoff in the proposal: measures intended to protect minors online are being criticized for potentially increasing personal data collection through age verification and limiting access to lawful content."],"referencedReports":[],"body":"\u003cp\u003eThe House Energy and Commerce Committee released a bipartisan kids online safety bill that serves as the House vehicle for the Kids Online Safety Act. The compromise measure omits the duty of care provision that would have required online platforms to take reasonable measures to prevent harms such as suicidal ideation, eating disorders, and cyberbullying by changing algorithm and design features. That omission is notable because the duty of care standard has long been backed by Democrats and some Republicans, and the article says 76 senators have supported including it. Sen. Marsha Blackburn criticized the change, saying that without a duty of care, major technology companies will continue prioritizing profit over children’s safety.\u003c/p\u003e\n\n\u003cp\u003eThe House package still includes a wide range of online safety requirements. It would block minors from using disappearing messages, require AI chatbots to state that they are not human, force pornography sites to use age verification technology, regulate video games, and create a data broker registry for platforms receiving children’s data. The bill also preempts state laws that are weaker than the federal standard while allowing states to adopt stricter rules, and it allows preemption of some state AI laws. Chairman Brett Guthrie said months of negotiations produced a bipartisan agreement that would create the strongest protections to date.\u003c/p\u003e\n\n\u003cp\u003eThe bill’s future remains uncertain despite bipartisan momentum in the House. Blackburn is working with the White House on a separate updated proposal that is expected to restore the duty of care provision and add rules addressing AI deepfakes and app downloads by minors without parental consent. Digital rights advocates praised some child safety measures but warned that age verification could endanger privacy and limit access to constitutionally protected material. Cobun Zweifel-Keegan of IAPP DC called the compromise a major step toward passage, while also noting that Senate Democrats have already made clear their objections to KOSA without a duty of care.\u003c/p\u003e\n"}];

  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>

          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function ScoreBar({ score }) {

function numberedList(items, accent) {

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
