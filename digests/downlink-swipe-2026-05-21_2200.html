<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }

window.__DL_ARTICLES = [{"n":4,"title":"Canadian man arrested, charged for running KimWolf DDos botnet","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/canadian-man-arrested-charged-running-kimwolf-botnet","time":"15:00","priority":"MUST READ","score":98,"tldr":"A 23-year-old Canadian man has been arrested and charged for running the KimWolf DDoS botnet, a massive cybercrime service that infected over a million devices and launched record-breaking attacks causing millions in damages.","briefOverview":"\u003cp\u003eA 23-year-old Canadian man, Jacob Butler, was arrested in Ottawa following a U.S. extradition warrant for allegedly operating the KimWolf botnet, a DDoS-for-hire service that infected over a million devices worldwide. Butler faces one count of aiding and abetting computer intrusion with a maximum penalty of 10 years in prison. The botnet was taken down in March as part of a coordinated international law enforcement operation involving the U.S., Canada, and Germany.\u003c/p\u003e\n\n\u003cp\u003eKimWolf was responsible for record-breaking DDoS attacks measured at nearly 30 terabits per second and issued over 25,000 attack commands, causing some victims financial losses exceeding one million dollars. The botnet primarily exploited consumer IoT devices like digital photo frames and web cameras that sat behind firewalls, and it was capable of crippling critical infrastructure and disrupting entire nations\u0026rsquo; connectivity. The operation also unsealed seizure warrants targeting infrastructure supporting another 45 DDoS-for-hire platforms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn Wednesday, Canadian authorities arrested 23-year-old Jacob Butler in Ottawa after the U.S. Justice Department filed an extradition warrant tied to his alleged operation of the KimWolf botnet. The botnet, one of the largest and most damaging distributed denial-of-service (DDoS) platforms in the world, was taken down in March during a broader international effort. Butler was initially identified by cybersecurity journalist Brian Krebs in February and had denied being the persona \u0026ldquo;Dort\u0026rdquo; behind KimWolf. Court documents unsealed on Thursday charged him with one count of aiding and abetting computer intrusion, carrying up to a decade in prison.\u003c/p\u003e\n\n\u003cp\u003eKimWolf functioned as a DDoS-for-hire service, infecting over a million devices globally. Crucially, it targeted devices that were typically behind firewalls — including digital photo frames, web cameras, streaming TV boxes, and other IoT products. The operators sold access to this residential proxy network to cybercriminals who used it to launch DDoS attacks against businesses and, in at least one instance, against IP addresses belonging to the Department of Defense. The botnet\u0026rsquo;s novel technique of infiltrating home networks through compromised IoT devices represented an escalation in DDoS capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe botnet\u0026rsquo;s attacks reached a record volume of nearly 30 terabits per second. Prosecutors stated that KimWolf issued over 25,000 attack commands, with some victims suffering financial losses exceeding one million dollars. The Department of Justice noted that victims paid hundreds of thousands of dollars in remediation expenses or in ransom demands to stop the attacks. This scale and intensity underscored the serious threat that such botnets pose to organizations and critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe takedown in March was a multi-national operation that included law enforcement from the U.S., Canada, Germany, and several cybersecurity companies. They seized infrastructure used by KimWolf and three other botnets — Aisuru, JackSkid, and Mossad — in a coordinated strike against DDoS-for-hire services. The operation demonstrated a concerted effort to dismantle the infrastructure facilitating these criminal services.\u003c/p\u003e\n\n\u003cp\u003eEvidence linking Butler to the KimWolf administration included his IP address, account information, transaction records, and online messages. Simultaneously, the Justice Department unsealed additional seizure warrants targeting services that supported another 45 DDoS-for-hire platforms, at least one of which collaborated with KimWolf. This reveals a large-scale legal offensive against the DDoS-as-a-service ecosystem.\u003c/p\u003e\n\n\u003cp\u003eIndustry players had long warned about KimWolf. Cloudflare noted the botnet’s thousands of devices could cripple critical infrastructure, overwhelm legacy DDoS defenses, and disrupt national connectivity. Amazon’s vice president Tom Scholl reported that AWS helped the FBI and Department of Defense identify the botnet\u0026rsquo;s command-and-control infrastructure and reverse-engineered its malware, highlighting how deeply the private sector was involved in the mitigation effort.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"comprehensive-analysis-of-the-takedown-of-the-kimwolf-ddos-botnet\"\u003eComprehensive Analysis of the Takedown of the KimWolf DDoS Botnet\u003c/h1\u003e\n\n\u003ch2 id=\"arrest-and-charges\"\u003eArrest and Charges\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eJacob Butler, 23, was arrested in Ottawa, Canada, on Wednesday following a U.S. extradition warrant.\u003c/li\u003e\n\u003cli\u003eThe U.S. Justice Department charges him with one count of aiding and abetting computer intrusion, which carries a maximum sentence of 10 years in prison.\u003c/li\u003e\n\u003cli\u003eButler was initially identified by cybersecurity journalist Brian Krebs in February, at which time he denied being the online persona “Dort” that operated KimWolf.\u003c/li\u003e\n\u003cli\u003eThe criminal complaint was filed on April 10 and sealed until his arrest. Court documents were unsealed on Thursday, revealing details of the botnet\u0026rsquo;s operation and the evidence tying Butler to it.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overview-of-the-kimwolf-botnet\"\u003eOverview of the KimWolf Botnet\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eKimWolf was a DDoS-for-hire service, allowing customers to launch distributed denial-of-service attacks against targeted websites and servers.\u003c/li\u003e\n\u003cli\u003eIt infected over a million devices globally, making it one of the largest botnets ever seen.\u003c/li\u003e\n\u003cli\u003eThe botnet was taken down in March as part of a larger international operation, which also targeted other botnets including Aisuru, JackSkid, and Mossad.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-characteristics-and-novelty\"\u003eTechnical Characteristics and Novelty\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnlike traditional botnets that often target exposed servers, KimWolf focused on devices behind firewalls, including digital photo frames, web cameras, and streaming TV boxes.\u003c/li\u003e\n\u003cli\u003eAmazon vice president Tom Scholl described KimWolf as novel because it targeted residential proxy networks, infiltrating home networks through compromised IoT devices.\u003c/li\u003e\n\u003cli\u003eThis approach turned ordinary home devices into anonymous attack launch points, creating a powerful and hard-to-detect DDoS platform.\u003c/li\u003e\n\u003cli\u003eThe malware’s command-and-control infrastructure and operation were reverse-engineered by AWS in cooperation with the FBI and the Department of Defense.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attack-capabilities-and-impact\"\u003eAttack Capabilities and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eProsecutors stated that KimWolf was responsible for DDoS attacks measured at nearly 30 terabits per second — a record in attack volume.\u003c/li\u003e\n\u003cli\u003eThe botnet issued over 25,000 attack commands.\u003c/li\u003e\n\u003cli\u003eSome victims suffered financial losses exceeding one million dollars; others paid hundreds of thousands in remediation costs or ransom demands to stop attacks.\u003c/li\u003e\n\u003cli\u003eAt least one attack targeted IP addresses belonging to the U.S. Department of Defense.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"international-law-enforcement-response\"\u003eInternational Law Enforcement Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe takedown involved U.S., Canadian, and German authorities alongside multiple cybersecurity companies.\u003c/li\u003e\n\u003cli\u003eLaw enforcement seized the infrastructure supporting KimWolf and the three other botnets.\u003c/li\u003e\n\u003cli\u003eThe operation was part of a broader crackdown, as the Justice Department also unsealed seizure warrants targeting services that supported another 45 DDoS-for-hire platforms, including at least one that worked with KimWolf.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evidence-and-attribution\"\u003eEvidence and Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eButler was linked to the administration of KimWolf through his IP address, account information, financial transactions, and online messages.\u003c/li\u003e\n\u003cli\u003eThe court documents provided detailed forensic connections that led to his arrest and the extradition request.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-warnings-and-involvement\"\u003eIndustry Warnings and Involvement\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloudflare had warned for years about KimWolf, stating that its thousands of devices could cripple critical infrastructure, crash most legacy cloud-based DDoS protection solutions, and disrupt the connectivity of entire nations.\u003c/li\u003e\n\u003cli\u003eAWS actively contributed to identifying the botnet\u0026rsquo;s command-and-control infrastructure and reverse-engineering the malware, underscoring the critical role of the private sector in mitigating such threats.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe case demonstrates the escalating scale of DDoS attacks, reaching record volumes that can overwhelm even robust defenses.\u003c/li\u003e\n\u003cli\u003eThe exploitation of residential IoT devices represents a shift in botnet strategy, making home users unwitting accomplices in large-scale cyberattacks.\u003c/li\u003e\n\u003cli\u003eThe coordinated law enforcement action and the seizure of dozens of supporting DDoS-for-hire infrastructures signal a significant intensification in the fight against the DDoS-as-a-service economy.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Jacob Butler, a 23-year-old Canadian man, was arrested in Ottawa after a U.S. extradition warrant was filed for his alleged operation of the KimWolf DDoS botnet.","The KimWolf botnet operated as a DDoS-for-hire service that infected over a million devices globally, including digital photo frames and web cameras that were typically behind firewalls.","Butler has been charged with one count of aiding and abetting computer intrusion and faces up to 10 years in prison if convicted.","Prosecutors stated that KimWolf launched DDoS attacks reaching nearly 30 terabits per second, a record volume, and caused some victims to lose over one million dollars.","KimWolf was taken down in March during a larger international law enforcement effort involving the U.S., Canada, Germany, and several cybersecurity companies."],"insights":["The KimWolf botnet relied heavily on compromising consumer IoT devices like digital photo frames and web cameras that are typically behind firewalls, underscoring the often-overlooked vulnerability of everyday smart devices.","DDoS attacks tied to KimWolf reached a record volume of nearly 30 terabits per second, indicating a dramatic escalation in the scale of real-world DDoS capabilities.","The unsealed seizure warrants targeted infrastructure supporting 45 other DDoS-for-hire platforms in addition to KimWolf, revealing a sweeping law enforcement crackdown on the broader DDoS-as-a-service market.","Amazon's assistance in reverse-engineering the malware uncovered a novel technique: KimWolf infiltrated residential proxy networks through compromised streaming TV boxes and other IoT devices, effectively turning home networks into anonymous attack launching points."],"referencedReports":[],"body":"\u003cp\u003eA 23-year-old Canadian man, Jacob Butler, was arrested in Ottawa following a U.S. extradition warrant for allegedly operating the KimWolf botnet, a DDoS-for-hire service that infected over a million devices worldwide. Butler faces one count of aiding and abetting computer intrusion with a maximum penalty of 10 years in prison. The botnet was taken down in March as part of a coordinated international law enforcement operation involving the U.S., Canada, and Germany.\u003c/p\u003e\n\n\u003cp\u003eKimWolf was responsible for record-breaking DDoS attacks measured at nearly 30 terabits per second and issued over 25,000 attack commands, causing some victims financial losses exceeding one million dollars. The botnet primarily exploited consumer IoT devices like digital photo frames and web cameras that sat behind firewalls, and it was capable of crippling critical infrastructure and disrupting entire nations\u0026rsquo; connectivity. The operation also unsealed seizure warrants targeting infrastructure supporting another 45 DDoS-for-hire platforms.\u003c/p\u003e\n"},{"n":18,"title":"Megalodon: Mass GitHub Actions Secret Exfiltration Across 5,500+ Public Repositories","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/megalodon-mass-github-actions-secret-exfiltration-across-5-500-public-repositories","time":"16:42","priority":"MUST READ","score":98,"tldr":"The Megalodon supply chain attack injected malicious CI workflows into over 5,500 public repos lacking branch protection, enabling direct poisoned pipeline execution to steal secrets from every subsequent run.","briefOverview":"\u003cp\u003eOn May 18, 2026, a campaign named Megalodon injected malicious GitHub Actions workflows into over 5,500 public repositories in a six-hour window. The attack exploited repositories lacking branch protection, allowing direct pushes to the default branch—a direct Poisoned Pipeline Execution (d-PPE) technique. The injected workflows contained a base64-encoded payload that harvested cloud credentials, SSH keys, API tokens, and GitHub OIDC tokens during every CI run.\u003c/p\u003e\n\n\u003cp\u003eThe payload exfiltrated collected secrets via HTTPS POST to a command-and-control server at 216.126.225.129:8443, using the runner\u0026rsquo;s unrestricted outbound internet access. The malicious workflows used names like SysDiag and Optimize-Build, with forged commit identities such as build-bot@github-ci.com to blend into normal development activity. Notable targets included nine Tiledesk repositories, which led to poisoned npm packages that propagated to downstream consumers.\u003c/p\u003e\n\n\u003cp\u003eThe attack underscores the critical role of branch protection as a structural defense; without mandatory pull request reviews, any write access can turn into a full secret exfiltration vector. The ephemeral nature of GitHub Actions runners leaves minimal forensic traces, making detection dependent on analyzing workflow changes and monitoring outbound connections rather than host forensics.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Megalodon campaign on May 18, 2026 exploited the GitHub Actions attack surface by injecting malicious CI workflows into more than 5,500 open-source repositories. GitHub Actions runners execute arbitrary shell commands with access to every secret injected into the CI environment, including cloud credentials and OIDC tokens when id-token: write is granted. Branch protection rules act as the primary gate to prevent unauthorized workflow changes, but repositories without mandatory pull request reviews allowed the attacker to push directly to the default branch, bypassing review gates entirely.\u003c/p\u003e\n\n\u003cp\u003eThe attack is classified as a direct Poisoned Pipeline Execution (d-PPE), mapping to MITRE ATT\u0026amp;CK T1195.002. The technique is particularly effective because workflow YAML files receive less security scrutiny than application code, bot-like commit messages blend into high-velocity projects, and runners enjoy broad outbound internet access by default. The injected workflow files carried a base64-encoded bash payload that decoded inline during the CI run, then systematically harvested environment variables, cloud credentials (AWS, GCP, Azure), SSH private keys, Docker and Kubernetes configs, npm tokens, and OIDC tokens. It also ran filesystem grep searches for over 30 secret patterns, including API keys and PEM certificates.\u003c/p\u003e\n\n\u003cp\u003eAll collected data was compressed and transmitted via HTTPS POST to 216.126.225.129:8443, using the runner\u0026rsquo;s outbound network access without triggering any visible process anomaly. The campaign targeted 5,561 repositories, with a full dataset of 5,718 malicious commits published as megalodon-campaign-commits.csv by SafeDep. Among the confirmed victims were nine Tiledesk repos, causing the npm package @tiledesk/tiledesk-server to be poisoned across versions 2.18.6–2.18.12, which then propagated the backdoor to downstream consumers via the npm registry. Other affected organizations included Black-Iron-Project and WISE-Community.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used forged commit identities—build-bot@github-ci.com, ci-pipeline@actions-bot.com, and auto-ci—with benign commit messages like \u0026ldquo;ci: add build optimization step\u0026rdquo; to avoid detection. GitHub code searches were provided to locate repositories still carrying the malicious workflows and commits. The attack highlights that missing branch protection is not just a policy gap but a direct enabler of supply chain compromise, and that ephemeral runner environments erase forensic evidence, making outbound traffic monitoring and workflow analysis essential controls.\u003c/p\u003e\n\n\u003cp\u003eThe article does not attribute the campaign to a specific known threat actor, but the operation was tracked internally as Megalodon. The investigation remains active, with promises to update the post with further payload details, decoded exfiltration sequences, and additional indicators of compromise. Defensive measures such as mandatory branch protection, egress filtering, and scrutiny of CI workflow changes are presented as critical takeaways.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn May 18, 2026, a large-scale supply chain attack campaign named \u003cstrong\u003eMegalodon\u003c/strong\u003e injected malicious GitHub Actions workflows into over 5,500 open-source repositories over a six-hour window. The attack exploited repositories with weak or absent branch protection to perform a direct Poisoned Pipeline Execution (d-PPE), stealing secrets from every subsequent CI run—including cloud credentials, SSH keys, API tokens, and GitHub Actions OIDC tokens. The incident demonstrates how a missing structural guardrail (mandatory pull request reviews) can enable an adversary to compromise thousands of repositories and extend the contamination into downstream package ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"background-github-actions-attack-surface\"\u003eBackground: GitHub Actions Attack Surface\u003c/h2\u003e\n\n\u003cp\u003eGitHub Actions workflows execute arbitrary shell commands with full access to all secrets injected into the CI environment. When a repository grants \u003ccode\u003eid-token: write\u003c/code\u003e permission, workflows can mint short-lived OIDC tokens to authenticate directly to cloud providers (AWS, GCP, Azure) without static credentials. This makes a CI runner a high-value target: a single workflow execution can yield cloud access keys, SSH private keys, Kubernetes configs, Docker registry credentials, and all repository secrets simultaneously.\u003c/p\u003e\n\n\u003cp\u003eBranch protection rules are the primary gate preventing unauthorized workflow injection. Repositories that do not require mandatory pull request reviews before merging to the default branch allow any account with write access—or, under certain weak configurations, accepted pull requests from public forks—to land workflow changes directly on the main branch. Megalodon systematically exploited this gap at scale.\u003c/p\u003e\n\n\u003ch2 id=\"attack-technique-direct-poisoned-pipeline-execution-d-ppe\"\u003eAttack Technique: Direct Poisoned Pipeline Execution (d-PPE)\u003c/h2\u003e\n\n\u003cp\u003eThe campaign is a textbook example of \u003cstrong\u003edirect Poisoned Pipeline Execution (d-PPE)\u003c/strong\u003e, a CI/CD attack where an adversary with write access injects malicious code directly into workflow definition files. The attack maps to \u003cstrong\u003eMITRE ATT\u0026amp;CK T1195.002\u003c/strong\u003e (Supply Chain Compromise: Compromise Software Supply Chain) and is documented in CISA guidance on CI/CD security. Unlike indirect PPE (i-PPE), which requires tricking a maintainer into merging a malicious pull request from a fork, d-PPE exploits direct push access to the default branch, completely bypassing pull request review gates.\u003c/p\u003e\n\n\u003cp\u003eKey enablers identified in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWorkflow YAML files receive less security scrutiny than application code.\u003c/li\u003e\n\u003cli\u003eBot-like commit messages (e.g., \u0026ldquo;ci: add build optimization step\u0026rdquo;) blend into high-velocity repositories without raising suspicion.\u003c/li\u003e\n\u003cli\u003eCI runners have wide-open outbound internet access by default, with no firewall to bypass.\u003c/li\u003e\n\u003cli\u003eEphemeral runner environments leave minimal forensic traces after job completion, making post-incident host forensics ineffective.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"payload-details\"\u003ePayload Details\u003c/h2\u003e\n\n\u003cp\u003eThe injected workflow files came in two variants, both functionally identical in their base64-encoded bash payload but differing in trigger conditions. The workflow names inside the files were \u003ccode\u003eSysDiag\u003c/code\u003e (mass variant) and \u003ccode\u003eOptimize-Build\u003c/code\u003e (targeted variant), using standard filenames such as \u003ccode\u003eci.yml\u003c/code\u003e or \u003ccode\u003edocker-community-worker-push-latest.yml\u003c/code\u003e to appear legitimate.\u003c/p\u003e\n\n\u003ch3 id=\"credential-harvesting-activities\"\u003eCredential Harvesting Activities\u003c/h3\u003e\n\n\u003cp\u003eThe payload performed an extensive collection sequence:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEnvironment dump:\u003c/strong\u003e Full CI environment variables and \u003ccode\u003e/proc/*/environ\u003c/code\u003e data, including PID 1.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloud credentials:\u003c/strong\u003e AWS access keys and session tokens, GCP OAuth tokens, Azure IMDS responses and instance role credentials.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuthentication material:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eSSH private keys (\u003ccode\u003e~/.ssh/id_*\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDocker registry configurations (\u003ccode\u003e~/.docker/config.json\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003enpm tokens (\u003ccode\u003e~/.npmrc\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eKubernetes configs (\u003ccode\u003e~/.kube/config\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eHashiCorp Vault tokens\u003c/li\u003e\n\u003cli\u003eTerraform credentials\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCI/CD tokens:\u003c/strong\u003e GitHub Actions OIDC tokens minted via \u003ccode\u003eid-token: write\u003c/code\u003e permission, plus GitLab CI/CD tokens and Bitbucket pipeline tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFilesystem secret search:\u003c/strong\u003e Grep across the workspace for over 30 secret patterns—API keys, connection strings, JWTs, PEM certificates, \u003ccode\u003e.env\u003c/code\u003e files, \u003ccode\u003ecredentials.json\u003c/code\u003e, \u003ccode\u003eservice-account.json\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"exfiltration-mechanism\"\u003eExfiltration Mechanism\u003c/h3\u003e\n\n\u003cp\u003eAll harvested data was compressed with gzip and transmitted via HTTPS POST to \u003ccode\u003e216.126.225.129:8443/collect\u003c/code\u003e. The payload leveraged the runner\u0026rsquo;s unrestricted outbound network access. No process crash or anomaly was visible to repository users; the workflow step exited cleanly after exfiltration.\u003c/p\u003e\n\n\u003ch2 id=\"affected-repositories-and-impact\"\u003eAffected Repositories and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe campaign touched \u003cstrong\u003e5,561 repositories\u003c/strong\u003e across GitHub, resulting in \u003cstrong\u003e5,718 malicious commits\u003c/strong\u003e. SafeDep published a complete dataset as \u003ccode\u003emegalodon-campaign-commits.csv\u003c/code\u003e for defenders.\u003c/p\u003e\n\n\u003ch3 id=\"notable-confirmed-targets\"\u003eNotable Confirmed Targets\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTiledesk\u003c/strong\u003e — 9 repositories of the open-source live chat platform were compromised. The npm package \u003ccode\u003e@tiledesk/tiledesk-server\u003c/code\u003e was poisoned across versions 2.18.6 through 2.18.12, causing the backdoor to propagate to all downstream consumers via the npm registry.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBlack-Iron-Project\u003c/strong\u003e — 8 repositories hit by the targeted variant.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWISE-Community\u003c/strong\u003e — education technology open-source community, confirmed affected.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe full list of Tiledesk repos includes: tiledesk-server, tiledesk-dashboard, tiledesk-telegram-connector, tiledesk-llm, tiledesk-docker-proxy, tiledesk-community-app, tiledesk-campaign-dahboard, tiledesk-helpcenter-template, and tiledesk-ai.\u003c/p\u003e\n\n\u003ch3 id=\"search-tools-for-remaining-artifacts\"\u003eSearch Tools for Remaining Artifacts\u003c/h3\u003e\n\n\u003cp\u003eThe article provided GitHub code search queries to locate repositories that may still contain the malicious workflows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWorkflow content: \u003ccode\u003e\u0026quot;name: SysDiag\u0026quot;\u003c/code\u003e or \u003ccode\u003e\u0026quot;name: Optimize-Build\u0026quot;\u003c/code\u003e within \u003ccode\u003e.github/workflows/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eFilename: \u003ccode\u003eSysDiag.yml\u003c/code\u003e or \u003ccode\u003eOptimize-Build.yml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eForged commit authors: \u003ccode\u003ebuild-bot@github-ci.com\u003c/code\u003e, \u003ccode\u003eci-pipeline@actions-bot.com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSpecific commit messages: \u003ccode\u003e\u0026quot;ci: add build optimization step\u0026quot;\u003c/code\u003e by build-bot, \u003ccode\u003e\u0026quot;chore: optimize pipeline runtime\u0026quot;\u003c/code\u003e by auto-ci, \u003ccode\u003e\u0026quot;chore: update ci/cd pipeline\u0026quot;\u003c/code\u003e by ci-bot\u003c/li\u003e\n\u003cli\u003eAnchor commit hash in Tiledesk: \u003ccode\u003eacac5a9854650c4ae2883c4740bf87d34120c038\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eDerived directly from the article:\u003c/p\u003e\n\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eIndicator\u003c/th\u003e\n\u003cth\u003eType\u003c/th\u003e\n\u003cth\u003eValue\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eC2 server IP\u003c/td\u003e\n\u003ctd\u003eexfiltration target\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003e216.126.225.129:8443\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eWorkflow name (mass variant)\u003c/td\u003e\n\u003ctd\u003efile content\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003ename: SysDiag\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eWorkflow name (targeted variant)\u003c/td\u003e\n\u003ctd\u003efile content\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003ename: Optimize-Build\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eMalicious filename\u003c/td\u003e\n\u003ctd\u003efilename\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eSysDiag.yml\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eMalicious filename\u003c/td\u003e\n\u003ctd\u003efilename\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eOptimize-Build.yml\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eForged email\u003c/td\u003e\n\u003ctd\u003ecommit author\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003ebuild-bot@github-ci.com\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eForged email\u003c/td\u003e\n\u003ctd\u003ecommit author\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eci-pipeline@actions-bot.com\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eForged username\u003c/td\u003e\n\u003ctd\u003ecommit author\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003ebuild-bot\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eForged username\u003c/td\u003e\n\u003ctd\u003ecommit author\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eauto-ci\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eForged username\u003c/td\u003e\n\u003ctd\u003ecommit author\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eci-bot\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eCommit message\u003c/td\u003e\n\u003ctd\u003etext\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eci: add build optimization step\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eCommit message\u003c/td\u003e\n\u003ctd\u003etext\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003echore: optimize pipeline runtime\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eCommit message\u003c/td\u003e\n\u003ctd\u003etext\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003echore: update ci/cd pipeline\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eMalicious commit hash (Tiledesk anchor)\u003c/td\u003e\n\u003ctd\u003eSHA\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003eacac5a9854650c4ae2883c4740bf87d34120c038\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\n\u003ch2 id=\"defensive-insights-and-actionable-takeaways\"\u003eDefensive Insights and Actionable Takeaways\u003c/h2\u003e\n\n\u003cp\u003eSeveral insights are directly highlighted in the article:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eBranch protection is the single most critical control.\u003c/strong\u003e The absence of mandatory pull request reviews converted a d-PPE opportunity into a trivial push attack. Enforcing mandatory reviews would force the attacker to mount the harder indirect PPE problem—requiring maintainer trickery.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCI runners\u0026rsquo; outbound internet access must be controlled.\u003c/strong\u003e The exfiltration succeeded because the runner could reach an arbitrary internet IP without restriction. Egress filtering or allowed-domain lists would have blocked the exfiltration channel.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEphemeral runners eliminate host forensics.\u003c/strong\u003e Once a workflow job completes, the runner is destroyed, leaving no disk or memory artifacts for analysis. Detection of this class of attack depends on real-time monitoring of workflow YAML changes, CI pipeline logs, and network egress.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDownstream supply chain propagation is a direct risk.\u003c/strong\u003e The compromise of Tiledesk\u0026rsquo;s npm package shows how a poisoned CI can cascade into an end-user software supply chain attack, extending the blast radius far beyond the original repository.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorkflow YAMLs deserve the same scrutiny as application code.\u003c/strong\u003e Repository administrators should review all CI configuration changes, especially those that introduce new shell execution steps or add permissions like \u003ccode\u003eid-token: write\u003c/code\u003e.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"ongoing-investigation-and-resources\"\u003eOngoing Investigation and Resources\u003c/h2\u003e\n\n\u003cp\u003eThe analysis is active. The article states that the post will be updated with expanded payload details, decoded exfiltration sequences, complete indicators of compromise, and additional affected repository data. SafeDep\u0026rsquo;s \u003ccode\u003emegalodon-campaign-commits.csv\u003c/code\u003e serves as the authoritative dataset for defenders.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe Megalodon campaign is a stark demonstration of how a simple configuration gap—unprotected default branches—can be weaponized at massive scale to steal secrets from thousands of repositories and contaminate widely used open-source packages. The attack\u0026rsquo;s methodology reinforces that CI/CD pipeline security must be treated as a core component of software supply chain defense, with branch protection, egress control, and workflow monitoring as foundational controls.\u003c/p\u003e\n","keyPoints":["The Megalodon campaign injected malicious GitHub Actions workflows into over 5,500 public repositories by exploiting the absence of branch protection, executing a direct poisoned pipeline execution attack.","The base64-encoded payload collected cloud credentials, SSH keys, API tokens, and GitHub OIDC tokens, then exfiltrated the data via HTTPS POST to a remote server at 216.126.225.129:8443.","Attackers used forged commit identities (e.g., build-bot@github-ci.com) and benign-looking commit messages to blend into high-velocity repositories and avoid immediate detection.","At least nine Tiledesk repositories were affected, leading to poisoned npm package versions that propagated the backdoor to downstream consumers through the npm registry."],"insights":["The absence of mandatory pull request reviews on the default branch was the single structural flaw that transformed a complex indirect attack into a trivial direct push, making branch protection a uniquely high-leverage defense.","GitHub Actions runners' default unrestricted outbound internet access enabled exfiltration to a bare IP address without the attacker needing to bypass any network firewall, underscoring the risk of allowing egress by default in CI environments.","The campaign's propagation from a compromised CI workflow to poisoned npm packages (Tiledesk) shows how a single CI/CD compromise can rapidly cascade into a downstream supply chain contamination affecting end users.","Ephemeral runner environments destroy all forensic evidence after job completion, meaning organizations relying solely on post-incident host forensics will miss this class of attack entirely—detection depends on workflow analysis and outbound traffic monitoring."],"referencedReports":[],"body":"\u003cp\u003eOn May 18, 2026, a campaign named Megalodon injected malicious GitHub Actions workflows into over 5,500 public repositories in a six-hour window. The attack exploited repositories lacking branch protection, allowing direct pushes to the default branch—a direct Poisoned Pipeline Execution (d-PPE) technique. The injected workflows contained a base64-encoded payload that harvested cloud credentials, SSH keys, API tokens, and GitHub OIDC tokens during every CI run.\u003c/p\u003e\n\n\u003cp\u003eThe payload exfiltrated collected secrets via HTTPS POST to a command-and-control server at 216.126.225.129:8443, using the runner\u0026rsquo;s unrestricted outbound internet access. The malicious workflows used names like SysDiag and Optimize-Build, with forged commit identities such as build-bot@github-ci.com to blend into normal development activity. Notable targets included nine Tiledesk repositories, which led to poisoned npm packages that propagated to downstream consumers.\u003c/p\u003e\n\n\u003cp\u003eThe attack underscores the critical role of branch protection as a structural defense; without mandatory pull request reviews, any write access can turn into a full secret exfiltration vector. The ephemeral nature of GitHub Actions runners leaves minimal forensic traces, making detection dependent on analyzing workflow changes and monitoring outbound connections rather than host forensics.\u003c/p\u003e\n"},{"n":2,"title":"Tracking Iranian APT Screening Serpens’ 2026 Espionage Campaigns","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/tracking-iran-apt-screening-serpens/","time":"13:00","priority":"MUST READ","score":95,"tldr":"Iranian APT Screening Serpens has escalated its espionage campaigns by using AppDomainManager hijacking to silently disable endpoint security mechanisms before deploying new remote access Trojans, making their attacks harder to detect.","briefOverview":"\u003cp\u003eIn early 2026, Iranian advanced persistent threat group Screening Serpens escalated its cyberespionage operations, aligning with a regional conflict that began on February 28. Unit 42 researchers discovered six new remote access Trojan (RAT) variants deployed between mid‑February and April, targeting organizations in the United States, Israel, the United Arab Emirates, and two other Middle Eastern countries. The group relied on highly personalized social engineering, including fake job applications for a global airline and spoofed video‑conferencing meeting invitations, to trick technology-sector employees into executing malicious code.\u003c/p\u003e\n\n\u003cp\u003eThe attackers introduced an advanced .NET technique called AppDomainManager hijacking, which manipulated legitimate application configuration files to disable the runtime\u0026rsquo;s own security monitoring (Event Tracing for Windows, strong‑name verification, and publisher policies) before the RAT payloads ever ran. This allowed them to bypass endpoint defenses without typical memory patching that triggers behavioral alerts. The new MiniUpdate and evolved MiniJunk V2 malware families both used DLL sideloading and dedicated Azure‑hosted command‑and‑control domains for each victim, demonstrating a cycle of continuous development and operational resilience.\u003c/p\u003e\n\n\u003cp\u003eThe campaigns show a determined effort to compromise sensitive sectors through trust‑based lures and stealthy, living‑off‑the‑land execution. Defenders are advised to prioritize detection of DLL sideloading and application configuration tampering, and Palo Alto Networks products have been updated to identify and block the indicators and behaviors described in this research.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUnit 42 investigated a series of cyber espionage attacks by Screening Serpens, an Iranian state‑aligned APT group active since 2022. Between mid‑February and April 2026, the group intensified operations right after a regional conflict ignited on February 28, striking entities in the United States, Israel, the United Arab Emirates, and two additional Middle Eastern nations. The timing strongly suggests that the campaigns were timed to exploit geopolitical tensions.\u003c/p\u003e\n\n\u003cp\u003eThe attackers crafted highly tailored social engineering lures to gain initial access. In one case, they distributed a ZIP file containing six fake PDF job requisitions that impersonated a global air carrier, targeting senior IT and engineering roles. A nested archive named ‘Hiring Portal.zip’ launched a spoofed error message while delivering the malware. In another campaign, the group spoofed a video‑conferencing platform’s meeting invitation page to trick victims into downloading a malicious installer from a file‑sharing service. These lures targeted technology‑sector professionals, indicating careful reconnaissance of victims’ job‑seeking activities.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the most significant advancement is the use of AppDomainManager hijacking in the MiniUpdate family. By placing a crafted .config file alongside a legitimate signed binary, the attacker forced the .NET Common Language Runtime to load a malicious library and simultaneously disabled ETW (Event Tracing for Windows), strong‑name signing validation, and publisher policy enforcement. This disabled key EDR telemetry and allowed the malware to execute before any defenses could initialize. MiniUpdate then installed persistence via a scheduled task, displayed a fake installer spinner, and communicated with a rotating set of Azure‑hosted command‑and‑control domains using opcodes for command execution, file exfiltration (including chunked transfers), and privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eConcurrently, Screening Serpens deployed MiniJunk V2, an evolved version of a previously known backdoor. One variant used a hidden uevmonitor.dll sideloaded through Setup.exe to drop a renamed Microsoft binary and the core RAT. A later variant aimed at U.S. targets embedded a hard‑coded date check, executing only after March 27, 2026, 13:30 UTC, a tactic to evade sandboxes. MiniJunk V2 inflated its binaries to around 12 MB with thousands of repetitive junk strings (Java tracebacks, SQL queries) to bypass upload limits, while communicating with Azure domains disguised as Windows service names.\u003c/p\u003e\n\n\u003cp\u003eAcross both families, the threat actor demonstrated careful operational compartmentalization: each victim received a unique set of three to five C2 domains, often themed to match impersonated brands such as airlines, healthcare, and finance. The MiniUpdate samples stored strings in plaintext, perhaps indicating rushed deployment, while MiniJunk V2 employed heavy XOR and Mixed Boolean‑Arithmetic obfuscation, suggesting different development cells. This duality allowed concurrent campaigns that were harder to cross‑correlate.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that Screening Serpens remains highly active and continues to refine its tradecraft. It emphasizes that detection of DLL sideloading and AppDomainManager hijacking should be treated as high‑risk signals. Palo Alto Networks’ products—Advanced WildFire, Advanced URL Filtering, Cortex XDR, XSIAM, and Cortex Cloud—include protections against the specific indicators and behaviors described, and the company shared findings with the Cyber Threat Alliance to support broader community defense.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"executive-summary\"\u003eExecutive Summary\u003c/h2\u003e\n\n\u003cp\u003eIranian APT group Screening Serpens (aka UNC1549, Smoke Sandstorm) executed a coordinated espionage campaign from mid‑February through April 2026, leveraging six new remote access Trojan (RAT) variants across two malware families: MiniUpdate and MiniJunk V2. The operations coincided with a regional conflict that began on February 28, 2026. The group targeted technology‑sector professionals in the United States, Israel, the United Arab Emirates, and two other Middle Eastern countries using highly personalized social‑engineering lures. The most critical technical evolution was the use of AppDomainManager hijacking to natively disable .NET runtime security mechanisms (ETW, strong‑name validation, publisher policy), effectively blinding endpoint detection solutions before any payload executed. The campaigns highlight a continuous cycle of development, operational compartmentalization, and a sophisticated living‑off‑the‑land approach that defenders must prioritize in their detection engineering.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-attribution-background\"\u003eThreat Actor Attribution \u0026amp; Background\u003c/h2\u003e\n\n\u003cp\u003eScreening Serpens has been active since at least 2022 and is assessed with moderate‑high confidence to be aligned with Iranian intelligence objectives. The group historically targeted aerospace, defense, and telecommunications organizations in the Middle East, but in late 2025 expanded into Western Europe (as documented by Check Point Research). The activity described in this article represents a further escalation, directly tied to a regional conflict starting February 28, 2026. Unit 42 correlates the campaigns based on reuse of a legitimate setup binary, previous documentation of the MiniJunk malware, and consistent social‑engineering TTPs.\u003c/p\u003e\n\n\u003ch2 id=\"social-engineering-initial-access-techniques\"\u003eSocial Engineering \u0026amp; Initial Access Techniques\u003c/h2\u003e\n\n\u003ch3 id=\"tailored-recruitment-lures\"\u003eTailored Recruitment Lures\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe March U.S. campaign used an archive impersonating a global air carrier. It contained six PDFs with fake job requisitions for senior engineering roles (e.g., Senior Software Engineer Job ID JR205894.pdf) alongside a nested ‘Hiring Portal.zip’. Extraction of the ZIP launched a spoofed error window to maintain the illusion.\u003c/li\u003e\n\u003cli\u003eThe March Israel campaign spoofed a popular video‑conferencing platform. Attackers first sent authentic meeting links to build trust, then delivered a lookalike domain with a phishing landing page that mimicked a genuine meeting invitation and triggered a download from a file‑sharing service when the victim clicked ‘join from workplace app’.\u003c/li\u003e\n\u003cli\u003eThe February Middle Eastern MiniJunk V2 campaign used a deliberately broken recruitment URL with a clear misspelling (‘recreuitment’) that returned a 404 error, pushing the target to an attacker‑managed ONLYOFFICE workspace to download the weaponized ‘Portal.zip’.\u003c/li\u003e\n\u003cli\u003eThe April UAE and other Middle Eastern MiniUpdate samples continued to impersonate legitimate brands, with C2 domains themed as health and financial services entities (PremierHealthAdvisory, Ramiltonsfinance).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"miniupdate-malware-family\"\u003eMiniUpdate Malware Family\u003c/h2\u003e\n\n\u003ch3 id=\"appdomainmanager-hijacking-native-edr-evasion\"\u003eAppDomainManager Hijacking \u0026amp; Native EDR Evasion\u003c/h3\u003e\n\n\u003cp\u003eMiniUpdate introduced a technique that manipulates a .NET application’s \u003ccode\u003e.config\u003c/code\u003e file to hijack the initialization process. The configuration includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;etwEnable enabled=\u0026quot;false\u0026quot;/\u0026gt;\u003c/code\u003e – disables Event Tracing for Windows, the primary telemetry source for .NET EDR monitoring.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;bypassTrustedAppStrongNames enabled=\u0026quot;true\u0026quot;/\u0026gt;\u003c/code\u003e – skips strong‑name signature validation, allowing unsigned payloads to load silently.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;publisherPolicy apply=\u0026quot;no\u0026quot;/\u0026gt;\u003c/code\u003e – prevents Microsoft publisher redirects to patched assembly versions.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;requiredRuntime safemode=\u0026quot;true\u0026quot; imageVersion=\u0026quot;v4.0.30319\u0026quot;/\u0026gt;\u003c/code\u003e – forces a predictable runtime environment to reduce crash‑related alerts.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;probing privatePath=\u0026quot;.\u0026quot;/\u003c/code\u003e – forces local sideloading of a custom \u003ccode\u003eAppDomainManager\u003c/code\u003e type.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis means the malicious \u003ccode\u003eInitInstall.dll\u003c/code\u003e runs before the host application’s \u003ccode\u003eMain()\u003c/code\u003e method, in a context where the .NET runtime itself has been told to not report telemetry or validate code signatures.\u003c/p\u003e\n\n\u003ch3 id=\"execution-flow-persistence\"\u003eExecution Flow \u0026amp; Persistence\u003c/h3\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003ccode\u003esetup.exe\u003c/code\u003e loads \u003ccode\u003esetup.exe.config\u003c/code\u003e, which triggers \u003ccode\u003eInitInstall.dll\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eInitInstall.dll\u003c/code\u003e decrypts configuration strings using a two‑step reverse‑then‑ROT13 cipher, then launches a fake installer spinner UI thread.\u003c/li\u003e\n\u003cli\u003eIt stages the payload by copying and renaming files (e.g., \u003ccode\u003esetup.exe\u003c/code\u003e → \u003ccode\u003eupdate.exe\u003c/code\u003e, \u003ccode\u003eUpdateChecker.dll\u003c/code\u003e → the MiniUpdate payload) into \u003ccode\u003eAppData\\[videoconferencing app]\\bin\\update\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA scheduled task is created (daily at 09:30 local time) and immediately triggered to run \u003ccode\u003eupdate.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eupdate.exe\u003c/code\u003e with its own \u003ccode\u003e.config\u003c/code\u003e disables ETW again and loads \u003ccode\u003eUpdater.dll\u003c/code\u003e. This loader verifies the process is \u003ccode\u003eupdate.exe\u003c/code\u003e and its parent is \u003ccode\u003esvchost.exe\u003c/code\u003e (anti‑sandbox).\u003c/li\u003e\n\u003cli\u003eFinally, \u003ccode\u003eUpdateChecker.dll\u003c/code\u003e is loaded and the \u003ccode\u003eCheckForUpdates\u003c/code\u003e export is called, starting the RAT.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch3 id=\"core-rat-capabilities\"\u003eCore RAT Capabilities\u003c/h3\u003e\n\n\u003cp\u003eThe MiniUpdate RAT communicates via HTTP GET to \u003ccode\u003e/agent/poll\u003c/code\u003e with a Chrome‑like User‑Agent and cycles through three C2 domains using Base64‑encoded binary commands. Across variants (March: 16 opcodes; April: 18 opcodes), capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eArbitrary shell command execution (\u003ccode\u003ecmd.exe /c\u003c/code\u003e).\u003c/li\u003e\n\u003cli\u003eIn‑memory DLL loading and export invocation.\u003c/li\u003e\n\u003cli\u003eProcess enumeration and termination.\u003c/li\u003e\n\u003cli\u003eFile upload, including chunked transfers for large files (added in April variants).\u003c/li\u003e\n\u003cli\u003eUAC elevation request.\u003c/li\u003e\n\u003cli\u003eLogon‑triggered scheduled task creation (\u003ccode\u003eWindowsSecurityUpdate\u003c/code\u003e) for persistence, with self‑removal and reinstallation functions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"opcode-mappings-c2-rotation\"\u003eOpcode Mappings \u0026amp; C2 Rotation\u003c/h3\u003e\n\n\u003cp\u003eThe March U.S. sample used domains: \u003ccode\u003ebuisness-centeral.azurewebsites.net\u003c/code\u003e, \u003ccode\u003ebuisness-centeral-transportation.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eBuisness-centeral-transportation.com\u003c/code\u003e. The April UAE sample rotated to \u003ccode\u003ePremierHealthAdvisory.com\u003c/code\u003e, \u003ccode\u003ePremierHealthAdvisory.azurewebsites.net\u003c/code\u003e, \u003ccode\u003ePremier-HealthAdvisory.azurewebsites.net\u003c/code\u003e. The April Middle Eastern sample used \u003ccode\u003eRamiltonsfinance.com\u003c/code\u003e, \u003ccode\u003eRamiltonsfinance.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eRamiltons-finance.azurewebsites.net\u003c/code\u003e. All samples used plaintext strings, indicating either a rushed deployment or different developer OPSEC practices.\u003c/p\u003e\n\n\u003ch2 id=\"minijunk-v2-malware-family\"\u003eMiniJunk V2 Malware Family\u003c/h2\u003e\n\n\u003ch3 id=\"february-middle-eastern-campaign\"\u003eFebruary Middle Eastern Campaign\u003c/h3\u003e\n\n\u003cp\u003eThis variant was delivered via an ONLYOFFICE workspace link after a phishing interaction. The ‘Portal.zip’ contained a visible \u003ccode\u003eSetup.exe\u003c/code\u003e and three hidden files, including a malicious \u003ccode\u003euevmonitor.dll\u003c/code\u003e. The \u003ccode\u003e.config\u003c/code\u003e file used only the \u003ccode\u003e\u0026lt;probing\u0026gt;\u003c/code\u003e directive, without the native ETW/strong‑name bypasses seen in MiniUpdate. Loader \u003ccode\u003euevmonitor.dll\u003c/code\u003e dropped two embedded payloads (\u003ccode\u003eSoftwareLicencing.exe\u003c/code\u003e, a renamed legitimate Microsoft binary, and \u003ccode\u003eunbcl.dll\u003c/code\u003e, the core RAT) and created a scheduled task named \u003ccode\u003eSynchronize OS\u003c/code\u003e for persistence. The loader displayed a decoy system error to the user, then the scheduled task executed \u003ccode\u003eSoftwareLicencing.exe\u003c/code\u003e which sideloaded \u003ccode\u003eunbcl.dll\u003c/code\u003e. The RAT communicated with five Azure‑hosted C2 domains mimicking Windows service names (e.g., \u003ccode\u003elicencemanagers.azurewebsites.net\u003c/code\u003e) using endpoints \u003ccode\u003e/api/app/check\u003c/code\u003e, \u003ccode\u003e/api/app/update\u003c/code\u003e, and \u003ccode\u003e/api/app/comment\u003c/code\u003e. The binary was inflated with repetitive junk strings (Java/Python tracebacks, SQL queries) to bypass file‑size limits of sandboxes.\u003c/p\u003e\n\n\u003ch3 id=\"march-u-s-campaign-with-date-gated-variant\"\u003eMarch U.S. Campaign with Date‑Gated Variant\u003c/h3\u003e\n\n\u003cp\u003eA later variant (\u003ccode\u003ePortable Platform.zip\u003c/code\u003e) extracted to a ‘file’ folder containing \u003ccode\u003eSetup.exe\u003c/code\u003e, \u003ccode\u003eunbcl.dll\u003c/code\u003e (the decoy), and \u003ccode\u003eConnection.dll\u003c/code\u003e (the actual RAT). \u003ccode\u003eUnbcl.dll\u003c/code\u003e presented a ‘Meeting Room’ GUI, prompting the victim for a meeting URL, while \u003ccode\u003eConnection.dll\u003c/code\u003e performed a hard‑coded validity check: it would only execute if the current date was after March 27, 2026, 13:30:00 UTC. Once the check passed, the RAT XOR‑decrypted its C2 domains (\u003ccode\u003eNanoMatrix.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eQuantumWeave.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eElementShift.azurewebsites.net\u003c/code\u003e) and used HTTP POST for communication with chunked uploads and downloads.\u003c/p\u003e\n\n\u003ch2 id=\"operational-observations-campaign-design\"\u003eOperational Observations \u0026amp; Campaign Design\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCompartmentalized C2:\u003c/strong\u003e Each victim received a unique set of domains, preventing cross‑contamination and making infrastructure takedowns more difficult.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTheme Rotation:\u003c/strong\u003e C2 domain names impersonated different brands or sectors across campaigns (airline, video conferencing, healthcare, finance, technology companies).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDual OPSEC Styles:\u003c/strong\u003e MiniUpdate stored strings in plaintext, while MiniJunk V2 used heavy obfuscation (MBA, XOR) and size inflation, suggesting distinct development cells or rushed deployment cycles.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDate‑Gated Activation:\u003c/strong\u003e The March MiniJunk V2 variant delayed activation to a specific date, evading pre‑deployment dynamic analysis sandboxes that operate outside the target time window.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContinuous Development:\u003c/strong\u003e The six RAT variants were compiled and deployed in rapid succession, with the April MiniUpdate adding chunked file exfiltration only weeks after the initial March samples surfaced.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eDefenders should treat the combination of DLL sideloading and \u003ccode\u003eAppDomainManager\u003c/code\u003e configuration tampering as high‑risk behavioral signals. Monitoring for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnsigned DLLs loaded by signed .NET executables.\u003c/li\u003e\n\u003cli\u003eUnusual \u003ccode\u003e\u0026lt;appDomainManagerAssembly\u0026gt;\u003c/code\u003e or \u003ccode\u003e\u0026lt;etwEnable\u0026gt;\u003c/code\u003e entries in application \u003ccode\u003e.config\u003c/code\u003e files.\u003c/li\u003e\n\u003cli\u003eScheduled tasks created by non‑administrative users with names like \u003ccode\u003eWindowsSecurityUpdate\u003c/code\u003e or \u003ccode\u003eSynchronize OS\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eNetwork connections to domains impersonating service names or well‑known brands on Azure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eScreening Serpens’ 2026 campaigns showcase a well‑resourced, adaptive threat actor capable of blending sophisticated anti‑forensic techniques with deeply personalized social engineering. The introduction of native .NET runtime deflection through AppDomainManager hijacking marks a notable escalation in the group’s ability to bypass EDR, and the rapid iteration cycle suggests an active, ongoing effort. Organizations should implement the technical recommendations in this report and leverage Palo Alto Networks products—Advanced WildFire, URL Filtering, DNS Security, Cortex XDR, XSIAM, and Cortex Cloud—which have been updated to detect and prevent the documented indicators and behaviors.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise-abbreviated\"\u003eIndicators of Compromise (Abbreviated)\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eDomains: \u003ccode\u003elicencemanagers.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eLicenceSupporting.azurewebsites.net\u003c/code\u003e, \u003ccode\u003ePeerDistSvcManagers.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eThemesManagers.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eThemesProviderManagers.azurewebsites.net\u003c/code\u003e, \u003ccode\u003edocspace-y4cumb.onlyoffice.com\u003c/code\u003e, \u003ccode\u003eNanoMatrix.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eQuantumWeave.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eElementShift.azurewebsites.net\u003c/code\u003e, \u003ccode\u003ebuisness-centeral.azurewebsites.net\u003c/code\u003e, \u003ccode\u003ebuisness-centeral-transportation.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eBuisness-centeral-transportation.com\u003c/code\u003e, \u003ccode\u003edocspace-twpf0e.onlyoffice.com\u003c/code\u003e, \u003ccode\u003ePremierHealthAdvisory.com\u003c/code\u003e, \u003ccode\u003ePremierHealthAdvisory.azurewebsites.net\u003c/code\u003e, \u003ccode\u003ePremier-HealthAdvisory.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eRamiltonsfinance.com\u003c/code\u003e, \u003ccode\u003eRamiltonsfinance.azurewebsites.net\u003c/code\u003e, \u003ccode\u003eRamiltons-finance.azurewebsites.net\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSHA256 hashes for each campaign’s components (provided in article).\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Unit 42 discovered six new remote access Trojan (RAT) variants deployed by Screening Serpens between February and April 2026, which they grouped into two malware families named MiniUpdate and MiniJunk V2.","The attackers used AppDomainManager hijacking to manipulate .NET application configuration files and proactively disable the runtime's own security mechanisms, such as Event Tracing for Windows (ETW) and strong-name signature validation.","Screening Serpens tailored its social engineering with fake job requisitions impersonating a global air carrier and spoofed video conferencing meeting invitations to target technology sector professionals.","The campaigns targeted entities in the United States, Israel, the United Arab Emirates, and two additional Middle Eastern countries, with activity intensifying after a regional conflict began on February 28, 2026.","The MiniUpdate malware family evolved to include chunked file exfiltration, while each target received a dedicated set of three to five Azure-hosted command and control domains for operational resilience."],"insights":["The March 2026 MiniJunk V2 variant targeting the U.S. embedded a hard-coded date gate that prevented execution before March 27, 2026, 13:30:00 UTC, a tactic designed to bypass sandbox analysis and delay activation until the attacker's chosen operational window.","Screening Serpens simultaneously deployed two malware families with opposing operational security postures: MiniUpdate stored C2 domains in plaintext while MiniJunk V2 used heavy Mixed Boolean-Arithmetic obfuscation, suggesting possible compartmentalization of development teams or rushed deployment timelines.","The threat actor deliberately engineered non-functional recruitment URLs containing intentional misspellings such as 'recreuitment' that returned HTTP 404 errors, using the broken link itself as a lure to push targets toward downloading a malicious offline portal.","MiniJunk V2 binaries were artificially inflated to approximately 12 MB by packing thousands of repetitive junk strings including Java and Python tracebacks, SQL queries, and .NET exceptions, specifically to exceed file-size limits imposed by automated sandbox analysis systems."],"referencedReports":[{"title":"Nimbus Manticore Deploys New Malware Targeting Europe","url":"https://research.checkpoint.com/2025/nimbus-manticore-deploys-new-malware-targeting-europe/","publisher":"Check Point Research","context":"The article references Check Point Research's report that detailed Screening Serpens' strategic expansion into Western Europe and documented the original MiniJunk malware."},{"title":"Iranian “Dream Job” Campaign","url":"https://www.clearskysec.com/irdreamjob24/","publisher":"ClearSky","context":"Listed in the article's Additional References section as a related report on Iranian threat activity."},{"title":"Frontline Intelligence: Analysis of UNC1549 TTPs, Custom Tools, and Malware Targeting the Aerospace and Defense Ecosystem","url":"https://cloud.google.com/blog/topics/threat-intelligence/analysis-of-unc1549-ttps-targeting-aerospace-defense","publisher":"Google Cloud Blog","context":"Referenced in the article's Additional References section as a technical analysis of UNC1549's tools and tactics."},{"title":"When Cats Fly: Suspected Iranian Threat Actor UNC1549 Targets Israeli and Middle East Aerospace and Defense Sectors","url":"https://cloud.google.com/blog/topics/threat-intelligence/suspected-iranian-unc1549-targets-israel-middle-east","publisher":"Google Cloud Blog","context":"Listed in the article's Additional References section as a report on UNC1549 activity targeting aerospace and defense sectors."},{"title":"Smoke Sandstorm: Nation-State Actors","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/smoke-sandstorm","publisher":"Microsoft Security Insider","context":"Included in the article's Additional References section as a related resource on the Smoke Sandstorm threat actor."}],"body":"\u003cp\u003eIn early 2026, Iranian advanced persistent threat group Screening Serpens escalated its cyberespionage operations, aligning with a regional conflict that began on February 28. Unit 42 researchers discovered six new remote access Trojan (RAT) variants deployed between mid‑February and April, targeting organizations in the United States, Israel, the United Arab Emirates, and two other Middle Eastern countries. The group relied on highly personalized social engineering, including fake job applications for a global airline and spoofed video‑conferencing meeting invitations, to trick technology-sector employees into executing malicious code.\u003c/p\u003e\n\n\u003cp\u003eThe attackers introduced an advanced .NET technique called AppDomainManager hijacking, which manipulated legitimate application configuration files to disable the runtime\u0026rsquo;s own security monitoring (Event Tracing for Windows, strong‑name verification, and publisher policies) before the RAT payloads ever ran. This allowed them to bypass endpoint defenses without typical memory patching that triggers behavioral alerts. The new MiniUpdate and evolved MiniJunk V2 malware families both used DLL sideloading and dedicated Azure‑hosted command‑and‑control domains for each victim, demonstrating a cycle of continuous development and operational resilience.\u003c/p\u003e\n\n\u003cp\u003eThe campaigns show a determined effort to compromise sensitive sectors through trust‑based lures and stealthy, living‑off‑the‑land execution. Defenders are advised to prioritize detection of DLL sideloading and application configuration tampering, and Palo Alto Networks products have been updated to identify and block the indicators and behaviors described in this research.\u003c/p\u003e\n"},{"n":5,"title":"Cloud Atlas activity in the second half of 2025 and early 2026: new tools and a new payload","source":"securelist.com","sourceColor":"#2dd4bf","link":"https://securelist.com/cloud-atlas-2026/119895/","time":"09:12","priority":"MUST READ","score":95,"tldr":"The Cloud Atlas APT group persists in targeting Russian and Belarusian government and diplomatic entities, now employing multiple layered backdoors and stealthy reverse tunnels (SSH, RevSocks, Tor) alongside new tools like PowerCloud to maintain long-term, hard-to-disrupt access.","briefOverview":"\u003cp\u003eIn late 2025 and early 2026, the Cloud Atlas APT group continued targeting Russian and Belarusian government and commercial entities using phishing ZIP archives with malicious LNK shortcuts. These shortcuts execute remote PowerShell scripts that drop a loader, which then installs two backdoors — VBCloud for file exfiltration and PowerShower for network reconnaissance and lateral movement — while opening a decoy PDF to distract the user.\u003c/p\u003e\n\n\u003cp\u003eThe attackers established multiple backup control channels by deploying reverse SSH tunnels, RevSocks, and Tor connections, and by patching the Windows termsrv.dll library to allow concurrent RDP sessions without alerting the victim. New custom tools such as PowerCloud exfiltrate administrator group data to Google Sheets, and a browser checker script monitors user activity.\u003c/p\u003e\n\n\u003cp\u003eThis combination of layered backdoors, redundant tunneling mechanisms, and anti-forensic cleanup makes the threat extremely persistent and difficult to fully eradicate from compromised networks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Cloud Atlas group, known since 2014, resumed large-scale activity in late 2025 and early 2026 against government agencies, diplomatic bodies, and commercial organizations in Russia and Belarus. Primary compromise occurs through phishing emails that deliver a ZIP archive containing an LNK file. The LNK launches a PowerShell script that downloads a loader (Fixed.ps1), opens a decoy PDF to distract the user, and then drops the VBCloud and PowerShower backdoors.\u003c/p\u003e\n\n\u003cp\u003eVBCloud focuses on stealing files with extensions of interest such as DOC, PDF, and XLS, while PowerShower is used for network reconnaissance, lateral movement, and credential theft. PowerShower downloads an additional credential grabber that creates a Volume Shadow Copy, copies SAM and SECURITY system hive data, and disguises the output as PDF files in a public folder, using a fodhelper.exe UAC bypass to run with elevated privileges.\u003c/p\u003e\n\n\u003cp\u003eFor persistence and stealth, the attackers modify the termsrv.dll to enable multiple concurrent RDP sessions, allowing them to operate alongside the legitimate user without disconnecting them. They also widely deploy reverse SSH tunnels using VBS scripts executed via PsExec or PAExec, setting up scheduled tasks to maintain access. In several cases, the OpenSSH binary was patched to load a custom syruntime.dll instead of the standard libcrypto.dll, an evasion technique to avoid detection.\u003c/p\u003e\n\n\u003cp\u003eIn addition to SSH tunnels, the group installed RevSocks (a Golang-based reverse SOCKS proxy) and configured Tor hidden services on infected machines. This triple-layer tunneling approach ensures that even if one backdoor or channel is discovered, the attackers can retain control through an alternative path, significantly complicating incident response.\u003c/p\u003e\n\n\u003cp\u003eTwo new tools were identified: PowerCloud, an obfuscated PowerShell script (often compiled to an executable with PS2EXE) that enumerates local administrator groups and uploads Base64-encoded data to a Google Sheet; and a browser checker that logs whether browsers are running, likely to determine when the user is away and it is safe to operate. The author notes some directory overlap with Head Mare activity but assesses the overall TTPs as distinct, attributing this wave to Cloud Atlas with high confidence.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eThis report details Cloud Atlas APT activity observed in the second half of 2025 and early 2026. The group, tracked since 2014, continues targeting government agencies, diplomatic entities, and commercial companies in Russia and Belarus. A new wave of campaigns combines previously known techniques with several new tools, notably PowerCloud and a browser checker, and a heavy reliance on redundant tunneling mechanisms for persistent access.\u003c/p\u003e\n\n\u003ch2 id=\"initial-infection-and-execution-flow\"\u003eInitial Infection and Execution Flow\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhishing emails deliver a ZIP archive containing an LNK shortcut.\u003c/li\u003e\n\u003cli\u003eThe LNK command line executes a remote PowerShell script that performs a series of actions:\n\n\u003cul\u003e\n\u003cli\u003eDrops a local copy of the main payload (\u003ccode\u003efixed.ps1\u003c/code\u003e) and creates a Run registry key for persistence.\u003c/li\u003e\n\u003cli\u003eDownloads a decoy archive, extracts a PDF document, and opens it to distract the user for 30–120 seconds.\u003c/li\u003e\n\u003cli\u003eTerminates \u003ccode\u003ewinrar.exe\u003c/code\u003e to hide extraction activity and deletes initial infection artifacts (zip and lnk files).\u003c/li\u003e\n\u003cli\u003eLaunches \u003ccode\u003efixed.ps1\u003c/code\u003e to proceed with payload installation.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThis technique is used alongside malicious Office documents exploiting CVE-2018-0802 (Equation Editor vulnerability) to download and run code.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe loader (\u003ccode\u003eFixed.ps1\u003c/code\u003e) then installs two backdoors:\u003c/p\u003e\n\n\u003ch3 id=\"vbcloud\"\u003eVBCloud\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eDropped as \u003ccode\u003evideo.vbs\u003c/code\u003e (launcher) and \u003ccode\u003evideo.mds\u003c/code\u003e (encrypted body).\u003c/li\u003e\n\u003cli\u003eThe VBScript decrypts \u003ccode\u003evideo.mds\u003c/code\u003e with RC4 and executes it in memory.\u003c/li\u003e\n\u003cli\u003ePrimary function: a file stealer that targets documents (DOC, PDF, XLS) for exfiltration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"powershower\"\u003ePowerShower\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eInstalled via a similar script (exact script not captured) to \u003ccode\u003eC:\\Users\\[username]\\Pictures\\googleearth.ps1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eCapabilities:\n\n\u003cul\u003e\n\u003cli\u003eCollect running processes, administrator groups, and domain controller information.\u003c/li\u003e\n\u003cli\u003eDownload and execute further PowerShell scripts from C2.\u003c/li\u003e\n\u003cli\u003ePerform Kerberoasting attacks to steal Active Directory account password hashes.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eDownloads an additional credential grabber that:\n\n\u003cul\u003e\n\u003cli\u003eCreates a Volume Shadow Copy of the system drive.\u003c/li\u003e\n\u003cli\u003eCopies SAM and SECURITY hive files to \u003ccode\u003eC:\\Users\\Public\\Documents\\\u003c/code\u003e disguised as PDF files.\u003c/li\u003e\n\u003cli\u003eUses a UAC bypass via \u003ccode\u003efodhelper.exe\u003c/code\u003e to run with elevated privileges without user prompts.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"lateral-movement-and-persistence-techniques\"\u003eLateral Movement and Persistence Techniques\u003c/h2\u003e\n\n\u003ch3 id=\"multi-user-rdp-via-termsrv-dll-patching\"\u003eMulti-User RDP via termsrv.dll Patching\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA script named \u003ccode\u003erdp_new.ps1\u003c/code\u003e enables RDP and lowers security settings.\u003c/li\u003e\n\u003cli\u003eIt takes ownership of \u003ccode\u003etermsrv.dll\u003c/code\u003e, grants full permissions, and searches for a specific byte sequence.\u003c/li\u003e\n\u003cli\u003eThe sequence is patched to replace \u003ccode\u003e39 81 3C 06 ...\u003c/code\u003e with \u003ccode\u003eB8 00 01 00 ...\u003c/code\u003e, allowing simultaneous RDP sessions without disconnecting the legitimate user.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"reverse-ssh-tunneling\"\u003eReverse SSH Tunneling\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttackers deploy VBS scripts (Gen.vbs, Run.vbs, Kill.vbs) via PAExec or PsExec to generate keys, start reverse SSH tunnels, and kill them.\u003c/li\u003e\n\u003cli\u003eScheduled tasks are created for persistence.\u003c/li\u003e\n\u003cli\u003eFolder permissions on private key directories are altered to hinder legitimate access.\u003c/li\u003e\n\u003cli\u003eIn some cases, OpenSSH binaries are patched to import a custom \u003ccode\u003esyruntime.dll\u003c/code\u003e instead of \u003ccode\u003elibcrypto.dll\u003c/code\u003e to evade detection. A portable OpenSSH compiled by the attackers was also found.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"revsocks\"\u003eRevSocks\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eGolang-based reverse SOCKS proxy used alongside SSH tunnels.\u003c/li\u003e\n\u003cli\u003eC2 addresses are either hardcoded or passed via command line.\u003c/li\u003e\n\u003cli\u003eProvides direct access to workstations and network segments as a gateway.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"tor-tunneling\"\u003eTor Tunneling\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMinimal Tor executable and configuration files are copied to system directories.\u003c/li\u003e\n\u003cli\u003eThe Tor Browser executable is renamed.\u003c/li\u003e\n\u003cli\u003eA HiddenService is configured to forward local RDP ports, making the machine accessible via an .onion address.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"new-tools-identified\"\u003eNew Tools Identified\u003c/h2\u003e\n\n\u003ch3 id=\"powercloud\"\u003ePowerCloud\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eObfuscated PowerShell script, often packaged into an EXE via PS2EXE.\u003c/li\u003e\n\u003cli\u003eRuns with administrator privileges to collect the list of local administrators.\u003c/li\u003e\n\u003cli\u003eAppends the computer name and current date, Base64-encodes the data, and uploads it to an existing Google Sheet.\u003c/li\u003e\n\u003cli\u003eLocations include system paths like \u003ccode\u003eC:\\Windows\\ime\\...\u003c/code\u003e, \u003ccode\u003eC:\\Windows\\PLA\\...\u003c/code\u003e, \u003ccode\u003eC:\\ProgramData\\...\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"browser-checker\"\u003eBrowser Checker\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ePowerShell script compiled to EXE.\u003c/li\u003e\n\u003cli\u003eChecks for running browser processes (Chrome, Edge, Firefox, etc.).\u003c/li\u003e\n\u003cli\u003eWrites the presence of browser activity to a local log file.\u003c/li\u003e\n\u003cli\u003eLikely used to determine when the user is away to perform stealthy actions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"victims-and-attribution\"\u003eVictims and Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eTargets are government and diplomatic entities in Russia and Belarus.\u003c/li\u003e\n\u003cli\u003eThe activity is attributed to Cloud Atlas with high confidence based on consistent TTPs, including initial access vectors, the Python-based information gathering tool mentioned in previous reports, and Tor forwarding.\u003c/li\u003e\n\u003cli\u003eSome file paths - like \u003ccode\u003eC:\\Windows\\ime\u003c/code\u003e, \u003ccode\u003eC:\\Windows\\System32\\ime\u003c/code\u003e, \u003ccode\u003eC:\\Windows\\pla\u003c/code\u003e - overlap with Head Mare\u0026rsquo;s PhantomHeart backdoor infrastructure, but TTPs remain distinct.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003ch3 id=\"file-hashes-and-paths\"\u003eFile Hashes and Paths\u003c/h3\u003e\n\n\u003cul\u003e\n\u0
