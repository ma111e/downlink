chnique.","The first-stage loader exploited the Zoom installer's own scheduled task creation by monitoring for the task within a one-minute window and hijacking it to execute the second-stage payload, blending malicious persistence with normal software behavior.","Evidence of AI-assisted development—such as excessive error handling, repetitive verbose naming, and detailed debug strings—suggests the actor leveraged LLM-based tools to rapidly adapt malware during wartime operations.","The use of SEO poisoning with fake SQL Developer downloads represents a significant departure from Nimbus Manticore's traditional career-themed phishing lures, indicating operational diversification."],"referencedReports":[{"title":"Analysis of UNC1549 TTPs Targeting Aerospace \u0026 Defense","url":"https://cloud.google.com/blog/topics/threat-intelligence/analysis-of-unc1549-ttps-targeting-aerospace-defense","publisher":"Google Cloud","context":"The article notes that Nimbus Manticore is also tracked as UNC1549 and links to this Google Cloud threat intelligence analysis of the group's tactics, techniques, and procedures targeting the aerospace and defense sectors."}],"body":"\u003cp\u003eNimbus Manticore, an IRGC-affiliated actor, resurfaced amid the US-Iran conflict with enhanced capabilities, including novel execution techniques and a new backdoor. During Operation Epic Fury, the group launched phishing campaigns using career lures and a trojanized Zoom installer, marking a shift from traditional DLL sideloading to AppDomain hijacking. The actor also adopted AI-assisted malware development to rapidly produce the MiniFast backdoor, demonstrating operational agility under wartime conditions. These campaigns extended the actor’s geographic reach to US aviation targets while maintaining focus on software and aviation sectors across Europe and the Middle East.\u003c/p\u003e\n\n\u003cp\u003eThe infection chains involved abusing legitimate .NET applications and hijacking the Zoom installer’s scheduled tasks to achieve stealthy persistence. MiniFast, the final payload, communicated with C2 using JSON over HTTP while masquerading as Chrome traffic and supported a wide range of remote commands. In a later campaign, the group also employed SEO poisoning to deliver MiniFast via a fake SQL Developer download site, departing from its usual career-themed phishing. This comprehensive operation highlights Nimbus Manticore’s rapid adaptation and the incorporation of AI tools in malware development.\u003c/p\u003e\n"},{"n":13,"title":"Megalodon GitHub Attack Targets 5,561 Repos with Malicious CI/CD Workflows","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/megalodon-github-attack-targets-5561.html","time":"11:55","priority":"MUST READ","score":95,"tldr":"A new automated attack campaign called Megalodon injected malicious CI/CD workflows into over 5,500 GitHub repositories to exfiltrate CI secrets, cloud credentials, and other sensitive data at scale.","briefOverview":"\u003cp\u003eThe Megalodon campaign automatically pushed 5,718 malicious commits across 5,561 GitHub repositories within a six-hour window on May 18, 2026. Attackers used throwaway accounts with random 8‑character usernames and forged CI‑bot identities to inject GitHub Actions workflows containing base64‑encoded bash payloads. Those payloads exfiltrated a sweeping set of CI secrets, cloud credentials, SSH keys, OIDC tokens, and source‑code secrets to a remote command‑and‑control server.\u003c/p\u003e\n\n\u003cp\u003eThe two payload variants—SysDiag, which fires on every push and pull request, and Optimize‑Build, which fires only on manual workflow_dispatch events—demonstrate a deliberate trade‑off between reach and stealth. Once a repository owner merged the pull request, the malware executed inside the CI/CD pipeline, enabling theft at scale and potential lateral movement via stolen GITHUB_TOKENS. The attack also targeted specific packages such as @tiledesk/tiledesk-server.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is part of a broader surge in software‑supply‑chain attacks that include the TeamPCP extortion operations and the Mini Shai‑Hulud worm. In response, npm invalidated all granular access tokens that bypass two‑factor authentication and urged maintainers to adopt Trusted Publishing, although the token invalidation only offers temporary relief and does not fix the underlying authentication gap.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers disclosed the Megalodon campaign, which automatically pushed 5,718 malicious commits to 5,561 GitHub repositories over just six hours on May 18, 2026. The attacker used throwaway accounts with random eight‑character usernames and forged author identities such as build‑bot, auto‑ci, ci‑bot, and pipeline‑bot to inject malicious GitHub Actions workflows. These workflows carried base64‑encoded bash payloads that harvested an extensive list of secrets—CI environment variables, AWS and Google Cloud credentials, SSH keys, OIDC tokens, and source‑code secrets—and sent them to a command‑and‑control server at 216.126.225[.]129:8443. The commits were pushed via compromised personal access tokens or deploy keys, indicating prior compromise of repository credentials.\u003c/p\u003e\n\n\u003cp\u003eThe payload came in two variants. SysDiag added a workflow triggered on every push and pull request, maximizing exposure but also increasing the chance of detection. Optimize‑Build activated only on the manual workflow_dispatch event, trading reach for operational security and targeting CI/CD runners without execution at package install time. Even a small fraction of the compromised repositories yielding a usable GITHUB_TOKEN could give the attacker enough on‑demand access to pivot into further infrastructure. One confirmed victim was the @tiledesk/tiledesk-server package, whose workflow file embedded the malicious base64 payload.\u003c/p\u003e\n\n\u003cp\u003eThe attack surface included a wide range of sensitive data: /proc/*/environ contents, instance role credentials obtained from AWS IMDSv2 and Google Cloud metadata, Docker and Kubernetes configs, Vault tokens, Terraform credentials, shell history, and over thirty secret regex patterns for API keys, JWTs, and PEM private keys. The exfiltration of GitHub Actions OIDC tokens is particularly dangerous because it could allow the attacker to impersonate the repository in cloud identity federation, extending the breach into cloud environments.\u003c/p\u003e\n\n\u003cp\u003eThe Megalodon activity coincides with a wave of supply‑chain compromises driven by the TeamPCP group, which has corrupted hundreds of open‑source tools and extorted victims. TeamPCP’s attacks have wormed through ecosystems that include TanStack, Grafana Labs, OpenAI, Mistral AI, and now GitHub itself. The group’s financial and geopolitical motivations are demonstrated by partnerships with BreachForums, LAPSUS$, and VECT, as well as the deployment of wiper malware against machines located in Iran and Israel. The Mini Shai‑Hulud worm further intensified the pressure on package registries.\u003c/p\u003e\n\n\u003cp\u003eIn reaction to the escalating threats, npm invalidated every granular access token that had write access and bypassed two‑factor authentication. The move cuts off credentials the worm had already collected but, as Socket observed, does not close the underlying hole. NPM urged maintainers to switch to Trusted Publishing to reduce reliance on long‑lived tokens. Meanwhile, another threat actor using the throwaway account “polymarketdev” published nine malicious npm packages impersonating Polymarket trading CLI tools, stealing Ethereum/Polygon private keys via a postinstall hook that POSTs the raw key to a Cloudflare Worker. These packages were still available on npm as of the article’s writing.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"megalodon-campaign-comprehensive-analysis\"\u003eMegalodon Campaign Comprehensive Analysis\u003c/h1\u003e\n\n\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed the Megalodon campaign, an automated attack that pushed 5,718 malicious commits to 5,561 GitHub repositories within a six‑hour window on May 18, 2026, between 11:36 a.m. and 5:48 p.m. UTC. The operation injected malicious GitHub Actions workflows into repositories, using throwaway accounts and forged CI‑bot identities.\u003c/p\u003e\n\n\u003ch2 id=\"attack-methodology\"\u003eAttack Methodology\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRepository Compromise:\u003c/strong\u003e The attacker pushed commits using compromised personal access tokens (PATs) or deploy keys, indicating prior unauthorized access to repository credentials.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIdentity Forgery:\u003c/strong\u003e Four author names were rotated—build‑bot, auto‑ci, ci‑bot, pipeline‑bot—along with seven commit messages mimicking routine CI maintenance. Throwaway GitHub accounts used random 8‑character usernames (e.g., rkb8el9r, bhlru9nr, lo6wt4t6).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorkflow Injection:\u003c/strong\u003e The commits added or modified GitHub Actions workflow files containing a base64‑encoded bash payload.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExfiltration Target:\u003c/strong\u003e All stolen data was sent to a command‑and‑control server at 216.126.225[.]129:8443.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"payload-variants\"\u003ePayload Variants\u003c/h2\u003e\n\n\u003cp\u003eTwo distinct payload variants were identified:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eSysDiag (Mass variant):\u003c/strong\u003e Creates a new workflow triggered on every push and pull request. Guarantees execution on every commit to the default branch, maximizing reach without manual intervention.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOptimize‑Build (Targeted variant):\u003c/strong\u003e Uses the \u003ccode\u003eworkflow_dispatch\u003c/code\u003e trigger, activating only when a user manually runs the workflow. Sacrifices reach for operational security, ideal for targeting CI/CD runners where the attacker wants to avoid detection. Even a small fraction of compromised repositories yielding a usable GITHUB_TOKEN provides sufficient targets for on‑demand triggering.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"data-exfiltrated\"\u003eData Exfiltrated\u003c/h2\u003e\n\n\u003cp\u003eThe base64‑encoded bash payload collected a wide range of sensitive information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCI environment variables, contents of \u003ccode\u003e/proc/*/environ\u003c/code\u003e, and PID 1 environment\u003c/li\u003e\n\u003cli\u003eAmazon Web Services (AWS) credentials\u003c/li\u003e\n\u003cli\u003eGoogle Cloud access tokens\u003c/li\u003e\n\u003cli\u003eInstance role credentials from AWS IMDSv2, Google Cloud metadata, and Microsoft Azure Instance Metadata Service (IMDS) endpoints\u003c/li\u003e\n\u003cli\u003eSSH private keys\u003c/li\u003e\n\u003cli\u003eDocker and Kubernetes configuration files\u003c/li\u003e\n\u003cli\u003eVault tokens and Terraform credentials\u003c/li\u003e\n\u003cli\u003eShell history\u003c/li\u003e\n\u003cli\u003eAPI keys, database connection strings, JWTs, PEM private keys, and cloud tokens matching over 30 secret regular expression patterns\u003c/li\u003e\n\u003cli\u003eGitHub Actions OIDC token request URL and the token itself\u003c/li\u003e\n\u003cli\u003eGITHUB_TOKEN, GitLab CI/CD tokens, and Bitbucket tokens\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.env\u003c/code\u003e, \u003ccode\u003ecredentials.json\u003c/code\u003e, \u003ccode\u003eservice-account.json\u003c/code\u003e, and other configuration files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe theft of OIDC tokens is particularly severe because it can enable the attacker to impersonate the repository in cloud identity federation, granting access to cloud resources without direct credential theft.\u003c/p\u003e\n\n\u003ch2 id=\"impact-example-tiledesk-tiledesk-server\"\u003eImpact Example: @tiledesk/tiledesk-server\u003c/h2\u003e\n\n\u003cp\u003eOne confirmed victim is the @tiledesk/tiledesk-server package. Its GitHub Actions workflow file was modified to embed the malicious base64‑encoded bash payload. In this case, the Optimize‑Build variant was used, meaning the payload executed only when the workflow was manually dispatched, not when the npm package was installed.\u003c/p\u003e\n\n\u003ch2 id=\"broader-supply-chain-context\"\u003eBroader Supply‑Chain Context\u003c/h2\u003e\n\n\u003cp\u003eMegalodon is not an isolated incident. The article places it within a larger, ongoing wave of attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTeamPCP Group:\u003c/strong\u003e This threat actor has weaponized the interconnected software supply chain to corrupt hundreds of open‑source tools. They worm through ecosystems, compromise one project to fuel access to another, and extort victims for profit. Their victim list includes GitHub (internal repositories breached), TanStack, Grafana Labs, OpenAI, and Mistral AI.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFinancial and Geopolitical Motives:\u003c/strong\u003e TeamPCP partners with BreachForums, LAPSUS$, and VECT for extortion. Geopolitically motivated actions include deploying wiper malware on machines located in Iran and Israel.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMini Shai‑Hulud Worm:\u003c/strong\u003e A separate worm that further exploited the same supply‑chain weaknesses, intensifying pressure on registries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-response\"\u003eIndustry Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNPM Token Invalidations:\u003c/strong\u003e In response to TeamPCP and Mini Shai‑Hulud, npm invalidated all granular access tokens with write access that bypassed two‑factor authentication (2FA). The move severs the credentials already collected by the worm, but Socket noted: “The reset buys breathing room. It does not close the underlying hole.”\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTrusted Publishing Push:\u003c/strong\u003e NPM urged maintainers to adopt Trusted Publishing to reduce reliance on long‑lived tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOX Security Perspective:\u003c/strong\u003e Moshe Siman Tov Bustan of OX Security stated, “We’ve entered a new supply chain attack era, and TeamPCP compromising GitHub was only the beginning. What’s coming next is an endless wave, a tsunami of cyber attacks on developers worldwide.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-malicious-activity-polymarketdev-packages\"\u003eAdditional Malicious Activity: Polymarketdev Packages\u003c/h2\u003e\n\n\u003cp\u003eA separate throwaway account, “polymarketdev,” published nine malicious npm packages impersonating Polymarket trading CLI tools within a 30‑second window. The packages remain available on npm as of the article’s writing.\u003c/p\u003e\n\n\u003cp\u003ePackage names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003epolymarket-trading-cli\u003c/li\u003e\n\u003cli\u003epolymarket-terminal\u003c/li\u003e\n\u003cli\u003epolymarket-trade\u003c/li\u003e\n\u003cli\u003epolymarket-auto-trade\u003c/li\u003e\n\u003cli\u003epolymarket-copy-trading\u003c/li\u003e\n\u003cli\u003epolymarket-bot\u003c/li\u003e\n\u003cli\u003epolymarket-claude-code\u003c/li\u003e\n\u003cli\u003epolymarket-ai-agent\u003c/li\u003e\n\u003cli\u003epolymarket-trader\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese packages use a \u003ccode\u003epostinstall\u003c/code\u003e script that displays a fake wallet onboarding prompt asking the victim to paste a private key, claiming it stays encrypted. In reality, the script POSTs the raw key in plaintext to a Cloudflare Worker at \u003ccode\u003ehxxps://polymarketbot.polymarketdev.workers[.]dev/v1/wallets/keys\u003c/code\u003e. The attacker built a functional CLI tool around the credential‑theft operation, using social engineering to lend false credibility.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eMegalodon demonstrates an evolution in automated supply‑chain attacks, combining compromised repository credentials, forged commit identities, and dual‑variant malicious workflows to harvest a comprehensive set of secrets. When viewed alongside TeamPCP’s extortion campaigns and the Mini Shai‑Hulud worm, it signals a sustained, multi‑faceted assault on the open‑source ecosystem. Registry responses like token invalidation provide only temporary relief, underscoring the need for more fundamental changes such as Trusted Publishing and stronger CI/CD pipeline security.\u003c/p\u003e\n","keyPoints":["The Megalodon campaign pushed 5,718 malicious commits to 5,561 GitHub repositories within a six-hour window on May 18, 2026.","Attackers used throwaway accounts with random 8-character usernames and forged author identities such as build-bot, auto-ci, ci-bot, and pipeline-bot to inject malicious GitHub Actions workflows.","The injected workflows contained base64-encoded bash payloads that exfiltrated a wide range of sensitive data—including CI secrets, cloud credentials, SSH keys, OIDC tokens, and source code secrets—to a C2 server at 216.126.225.129:8443.","Two payload variants were observed: SysDiag triggered on every push and pull request, while Optimize-Build activated only on workflow_dispatch to target CI/CD runners more covertly.","In response to the supply chain attacks, npm invalidated all granular access tokens with write access that bypassed two-factor authentication, and urged users to switch to Trusted Publishing."],"insights":["The Megalodon campaign leveraged compromised PATs or deploy keys to directly push malicious commits, indicating prior unauthorized access to repository credentials.","Attackers used two payload variants with different triggers—push for mass impact and workflow_dispatch for stealth—reflecting a deliberate tradeoff between reach and operational security.","The exfiltration of GitHub Actions OIDC tokens could allow attackers to impersonate the repository in cloud identity federation, enabling broader cloud access.","npm's mass invalidation of 2FA-bypass tokens only temporarily disrupts the worm and does not close the underlying authentication gap, as noted by Socket."],"referencedReports":[{"title":"Megalodon: Mass GitHub Repo Backdooring CI Workflows","url":"https://safedep.io/megalodon-mass-github-repo-backdooring-ci-workflows/","publisher":"SafeDep","context":"SafeDep published a report detailing the Megalodon campaign that pushed 5,718 malicious commits to 5,561 GitHub repositories within a six-hour window."}],"body":"\u003cp\u003eThe Megalodon campaign automatically pushed 5,718 malicious commits across 5,561 GitHub repositories within a six-hour window on May 18, 2026. Attackers used throwaway accounts with random 8‑character usernames and forged CI‑bot identities to inject GitHub Actions workflows containing base64‑encoded bash payloads. Those payloads exfiltrated a sweeping set of CI secrets, cloud credentials, SSH keys, OIDC tokens, and source‑code secrets to a remote command‑and‑control server.\u003c/p\u003e\n\n\u003cp\u003eThe two payload variants—SysDiag, which fires on every push and pull request, and Optimize‑Build, which fires only on manual workflow_dispatch events—demonstrate a deliberate trade‑off between reach and stealth. Once a repository owner merged the pull request, the malware executed inside the CI/CD pipeline, enabling theft at scale and potential lateral movement via stolen GITHUB_TOKENS. The attack also targeted specific packages such as @tiledesk/tiledesk-server.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is part of a broader surge in software‑supply‑chain attacks that include the TeamPCP extortion operations and the Mini Shai‑Hulud worm. In response, npm invalidated all granular access tokens that bypass two‑factor authentication and urged maintainers to adopt Trusted Publishing, although the token invalidation only offers temporary relief and does not fix the underlying authentication gap.\u003c/p\u003e\n"},{"n":16,"title":"Kimwolf DDoS Botnet Operator Arrested in Canada Over DDoS-for-Hire Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/kimwolf-ddos-botnet-operator-arrested.html","time":"08:50","priority":"MUST READ","score":93,"tldr":"Canadian man Jacob Butler was arrested for operating the Kimwolf DDoS botnet, which enslaved firewalled IoT devices and sold attack services, leading to record-breaking 31.4 Tbps attacks.","briefOverview":"\u003cp\u003eThe U.S. Department of Justice announced the arrest of a Canadian man, Jacob Butler (aka Dort), for allegedly operating the Kimwolf DDoS botnet, a variant of AISURU. Butler faces one count of aiding and abetting computer intrusion, carrying a potential 10-year prison sentence. The arrest was part of an international operation that previously disrupted the botnet\u0026rsquo;s command-and-control infrastructure in partnership with Canada and Germany.\u003c/p\u003e\n\n\u003cp\u003eKimwolf specialized in enslaving Internet of Things (IoT) devices that were typically firewalled from the internet, such as digital photo frames and web cameras. The operators used a cybercrime-as-a-service model to sell access to these compromised devices, enabling customers to launch DDoS attacks against targets worldwide. Those targets included IP addresses on the Department of Defense Information Network, underscoring the risk to sensitive government systems.\u003c/p\u003e\n\n\u003cp\u003ePrior to its takedown, the AISURU/Kimwolf botnets were responsible for record-setting DDoS attacks that peaked at 31.4 terabits per second, with Kimwolf issuing over 25,000 attack commands. Law enforcement also dismantled 45 DDoS-for-hire platforms, one of which had directly collaborated with Kimwolf, demonstrating the interconnected nature of the booter service ecosystem.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn Thursday, the U.S. Department of Justice announced the arrest of Jacob Butler, a 23-year-old from Ottawa, Canada, for his alleged role in operating the Kimwolf DDoS botnet. Butler, who used the alias \u0026ldquo;Dort,\u0026rdquo; was charged with aiding and abetting computer intrusion. The announcement came exactly two months after U.S. authorities, working with Canadian and German partners, disrupted the command-and-control infrastructure of Kimwolf and related botnets like AISURU, JackSkid, and Mossad through a court-authorized operation.\u003c/p\u003e\n\n\u003cp\u003eKimwolf is assessed to be a variant of the AISURU malware. Its distinguishing feature was the ability to infect and enslave devices that sat behind traditional firewalls, such as digital photo frames and web cameras. This allowed the botnet to amass a large number of compromised devices that would otherwise be inaccessible from the public internet, expanding the pool of potential bots.\u003c/p\u003e\n\n\u003cp\u003eThe operators monetized the botnet through a \u0026ldquo;cybercrime-as-a-service\u0026rdquo; model, selling access to the enslaved devices to other cybercriminals. Customers then directed the botnet to launch distributed denial-of-service attacks against computers and servers across the globe. Among the targets were IP addresses belonging to the Department of Defense Information Network, indicating that even military communication infrastructure was within the attackers\u0026rsquo; crosshairs.\u003c/p\u003e\n\n\u003cp\u003eButler was linked to the administration of Kimwolf through a combination of technical evidence, including his IP address, online account information, and Discord messages posted by an account named resi[.]to. His identity was first publicly exposed by independent security journalist Brian Krebs in February. At that time, Butler claimed he had not used the \u0026ldquo;Dort\u0026rdquo; persona since 2021 and suggested someone else had compromised his old account to impersonate him.\u003c/p\u003e\n\n\u003cp\u003eBefore the botnet was taken down, Kimwolf was estimated to have sent over 25,000 attack commands. Together with AISURU, it was behind some of the largest DDoS attacks ever recorded, flooding targets with junk traffic at rates up to 31.4 terabits per second. Such volumetric attacks demonstrate the immense disruptive power of even low-cost IoT botnets.\u003c/p\u003e\n\n\u003cp\u003eBeyond Butler\u0026rsquo;s arrest, the operation led to the dismantling of 45 DDoS-for-hire platforms. One of these platforms had collaborated directly with Kimwolf, highlighting how a single botnet can supply multiple booter services. If convicted, Butler faces a maximum penalty of 10 years in prison.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Department of Justice announced the arrest of Jacob Butler (also known as Dort), a 23-year-old from Ottawa, Canada, for allegedly operating the Kimwolf distributed denial-of-service (DDoS) botnet. Butler faces one count of aiding and abetting computer intrusion, which carries a potential sentence of up to 10 years in prison. The arrest is the latest step in an ongoing international crackdown on DDoS-for-hire infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"botnet-technical-characteristics\"\u003eBotnet Technical Characteristics\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMalware lineage\u003c/strong\u003e: Kimwolf is assessed to be a variant of AISURU, another known botnet family.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTarget devices\u003c/strong\u003e: The botnet focused on infecting Internet of Things (IoT) devices that were traditionally “firewalled” from the rest of the internet, such as digital photo frames and web cameras. By overcoming this barrier, the operators could enslave hardware that would normally not be reachable.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScale\u003c/strong\u003e: Kimwolf alone issued over 25,000 attack commands. Combined with the AISURU botnet, it was responsible for some of the highest-volume DDoS attacks ever recorded, peaking at 31.4 terabits per second.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cybercrime-as-a-service-model\"\u003eCybercrime-as-a-Service Model\u003c/h2\u003e\n\n\u003cp\u003eThe operators employed a “cybercrime-as-a-service” model to monetize the botnet. They sold access to the enslaved devices to other cybercriminals, who then directed the botnet to launch DDoS attacks. This lowered the barrier to entry for conducting high-impact attacks, as customers did not need to build or maintain their own botnet infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"targets-and-impact\"\u003eTargets and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHigh-value targets\u003c/strong\u003e: Victims included computers and servers throughout the world, notably IP addresses belonging to the Department of Defense Information Network (DoDIN). This demonstrates that attackers were willing to strike military-associated networks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecord-breaking attacks\u003c/strong\u003e: The AISURU/Kimwolf botnets generated volumetric DDoS floods that reached 31.4 Tbps, showcasing the extreme firepower that IoT botnets can deliver.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attribution-to-butler\"\u003eAttribution to Butler\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEvidence\u003c/strong\u003e: Court documents reveal that investigators tied Butler to the botnet’s administration via IP address records, online account details, and Discord message logs posted by an account named resi[.]to.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrior exposure\u003c/strong\u003e: Independent security journalist Brian Krebs first identified Butler as the person behind the Kimwolf botnet in February. At the time, Butler denied any recent use of the “Dort” alias, claiming his old account had been compromised and someone else was impersonating him.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"law-enforcement-operations\"\u003eLaw Enforcement Operations\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTakedown of C2 infrastructure\u003c/strong\u003e: Two months before the arrest, U.S. authorities, in partnership with Canada and Germany, disrupted the command-and-control servers of Kimwolf, AISURU, JackSkid, and Mossad. This was a court-authorized operation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDismantling of DDoS-for-hire platforms\u003c/strong\u003e: In conjunction with Butler’s arrest, seizure warrants were unsealed against online services supporting 45 DDoS-for-hire platforms. Law enforcement used these warrants to dismantle the platforms entirely. One of those platforms had specifically collaborated with Kimwolf, illustrating the interconnected nature of the criminal ecosystem.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"legal-consequences\"\u003eLegal Consequences\u003c/h2\u003e\n\n\u003cp\u003eButler is charged with one count of aiding and abetting computer intrusion. If convicted, he faces a maximum prison term of 10 years. The case highlights the growing willingness of international law enforcement to pursue botnet operators and their customers across borders.\u003c/p\u003e\n","keyPoints":["The U.S. Department of Justice announced the arrest of Canadian man Jacob Butler (aka Dort) for allegedly operating the Kimwolf DDoS botnet.","Kimwolf is a variant of the AISURU botnet that targeted traditionally firewalled IoT devices such as digital photo frames and web cameras.","Botnet operators used a cybercrime-as-a-service model to sell access to the infected devices, launching DDoS attacks that targeted systems including Department of Defense Information Network IP addresses.","The AISURU/Kimwolf botnets were responsible for record-setting DDoS attacks peaking at 31.4 terabits per second, with Kimwolf issuing over 25,000 attack commands.","In addition to the arrest, law enforcement dismantled 45 DDoS-for-hire platforms, one of which had collaborated with Kimwolf."],"insights":["Kimwolf successfully enslaved devices 'traditionally firewalled from the rest of the internet,' demonstrating that common NAT/firewall protections are insufficient to protect consumer IoT devices from being weaponized.","Despite the suspect's claim that his old account was compromised and someone else had impersonated him since 2021, investigators linked him to the botnet through IP address, online account details, and Discord messages, showing how digital evidence can counter denial-based defenses.","One of the 45 dismantled DDoS-for-hire platforms directly collaborated with the Kimwolf botnet, illustrating how a single botnet operator can feed multiple booter services and blur the line between infrastructure provider and customer."],"referencedReports":[],"body":"\u003cp\u003eThe U.S. Department of Justice announced the arrest of a Canadian man, Jacob Butler (aka Dort), for allegedly operating the Kimwolf DDoS botnet, a variant of AISURU. Butler faces one count of aiding and abetting computer intrusion, carrying a potential 10-year prison sentence. The arrest was part of an international operation that previously disrupted the botnet\u0026rsquo;s command-and-control infrastructure in partnership with Canada and Germany.\u003c/p\u003e\n\n\u003cp\u003eKimwolf specialized in enslaving Internet of Things (IoT) devices that were typically firewalled from the internet, such as digital photo frames and web cameras. The operators used a cybercrime-as-a-service model to sell access to these compromised devices, enabling customers to launch DDoS attacks against targets worldwide. Those targets included IP addresses on the Department of Defense Information Network, underscoring the risk to sensitive government systems.\u003c/p\u003e\n\n\u003cp\u003ePrior to its takedown, the AISURU/Kimwolf botnets were responsible for record-setting DDoS attacks that peaked at 31.4 terabits per second, with Kimwolf issuing over 25,000 attack commands. Law enforcement also dismantled 45 DDoS-for-hire platforms, one of which had directly collaborated with Kimwolf, demonstrating the interconnected nature of the booter service ecosystem.\u003c/p\u003e\n"},{"n":15,"title":"Ghostwriter Targets Ukraine Government Entities with Prometheus Phishing Malware","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/ghostwriter-targets-ukraine-government.html","time":"16:20","priority":"MUST READ","score":91,"tldr":"The Ghostwriter threat actor is targeting Ukrainian government organizations with phishing emails disguised as Prometheus learning platform links to deliver a multi-stage JavaScript malware chain that ultimately installs Cobalt Strike for espionage.","briefOverview":"\u003cp\u003eThe Belarus-aligned Ghostwriter group (UAC-0057/UNC1151) has been targeting Ukrainian government organizations with phishing emails that use the Prometheus online learning platform as a lure. Emails often originate from compromised accounts and carry a PDF attachment containing a link. When clicked, the link downloads a ZIP archive with a JavaScript file called OYSTERFRESH, which displays a decoy document while stealthily storing an encrypted payload (OYSTERBLUES) in the Windows Registry. It also downloads OYSTERSHUCK to decode this payload.\u003c/p\u003e\n\n\u003cp\u003eOYSTERBLUES harvests system information—computer name, user account, OS version, last boot time, and running processes—and exfiltrates it to a command-and-control server. It then retrieves additional JavaScript executed via eval() to load Cobalt Strike for deeper post-exploitation. CERT-UA advises restricting wscript.exe execution for standard users to reduce the attack surface, while broader disclosures from Ukraine’s National Security and Defense Council highlight Russia’s integration of AI tools like ChatGPT and Gemini into cyber operations and influence campaigns on platforms such as Bluesky.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Ghostwriter threat actor, also tracked as UAC-0057 and UNC1151 and aligned with Belarus, is running an ongoing phishing campaign against Ukrainian government bodies since spring 2026. The attacks exploit trust in the Prometheus online learning platform by crafting email lures that appear related to that service. Many of these emails are sent from previously compromised accounts, increasing their apparent legitimacy to recipients.\u003c/p\u003e\n\n\u003cp\u003eThe email contains a PDF attachment that, when opened, presents a link. Following the link downloads a ZIP archive that holds a JavaScript file. This initial JavaScript, named OYSTERFRESH by researchers, is engineered to distract the victim by opening a decoy document while performing malicious actions in the background.\u003c/p\u003e\n\n\u003cp\u003eIn the background, OYSTERFRESH silently writes an obfuscated and encrypted payload called OYSTERBLUES into the Windows Registry, a technique that helps evade traditional file-based scanners. Simultaneously, it downloads another component called OYSTERSHUCK, which is tasked with reading and decoding the registry-stored OYSTERBLUES payload, allowing it to execute.\u003c/p\u003e\n\n\u003cp\u003eOnce decoded, OYSTERBLUES begins collecting detailed system information, including the computer name, user account, operating system version, time of the last OS boot, and a list of all running processes. This data is exfiltrated to a command-and-control (C2) server via an HTTP POST request. The malware then waits for the C2 server to reply with further JavaScript code, which is executed directly using JavaScript’s eval() function.\u003c/p\u003e\n\n\u003cp\u003eThe final payload delivered through this eval-based staging is assessed to be Cobalt Strike, a legitimate adversary simulation tool frequently abused by attackers for post-exploitation activities such as lateral movement and data theft. To mitigate this threat, CERT-UA recommends restricting the ability to run wscript.exe for standard user accounts, which directly severs the initial execution path of the script.\u003c/p\u003e\n\n\u003cp\u003eBeyond this specific campaign, Ukraine’s National Security and Defense Council has released findings that Russia is weaponizing artificial intelligence tools like OpenAI’s ChatGPT and Google Gemini to scout targets and embed AI into malware to generate commands at runtime, while Kremlin-backed groups focus on long-term network presence and influence operations. A parallel influence effort attributed to Moscow’s Social Design Agency has hijacked real Bluesky user accounts, including those of journalists and professors, to spread fake content since 2024, leading Bluesky to suspend compromised accounts until owners reset them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"comprehensive-analysis-of-ghostwriter-s-prometheus-themed-phishing-campaign-against-ukrainian-government-entities\"\u003eComprehensive Analysis of Ghostwriter’s Prometheus-Themed Phishing Campaign Against Ukrainian Government Entities\u003c/h1\u003e\n\n\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eThe Belarus-aligned Ghostwriter group (UAC-0057 / UNC1151) has conducted a sustained phishing campaign against Ukrainian government organizations since spring 2026, leveraging lures related to the Prometheus online learning platform. The campaign uses multi-stage JavaScript malware that ultimately delivers Cobalt Strike, aiming to establish persistent access and gather intelligence. This analysis details every stage of the attack chain, the malware’s technical behavior, the broader strategic context of Russian cyber operations, and recommended mitigations as disclosed by Ukrainian authorities.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-targeting\"\u003eThreat Actor \u0026amp; Targeting\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eActor:\u003c/strong\u003e Ghostwriter (also known as UAC-0057 and UNC1151), a group assessed to be Belarus-aligned.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTargets:\u003c/strong\u003e Government entities in Ukraine.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLure theme:\u003c/strong\u003e Emails and attachments designed to appear as communications related to the Prometheus online learning platform.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAccess:\u003c/strong\u003e Phishing emails are often sent from compromised accounts, adding legitimacy.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"delivery-mechanism\"\u003eDelivery Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe infection chain begins with a phishing email that contains a PDF attachment. The PDF includes a clickable hyperlink. When the victim clicks the link, it triggers the download of a ZIP archive. The ZIP contains a JavaScript file that initiates the malware execution sequence.\u003c/p\u003e\n\n\u003ch2 id=\"malware-components-and-execution-chain\"\u003eMalware Components and Execution Chain\u003c/h2\u003e\n\n\u003ch3 id=\"oysterfresh-initial-javascript\"\u003eOYSTERFRESH (Initial JavaScript)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisplays a decoy document to distract the user.\u003c/li\u003e\n\u003cli\u003eStealthily writes an obfuscated and encrypted payload known as OYSTERBLUES into the Windows Registry.\u003c/li\u003e\n\u003cli\u003eDownloads an additional component named OYSTERSHUCK.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"oystershuck-decoder\"\u003eOYSTERSHUCK (Decoder)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eResponsible for reading and decoding the OYSTERBLUES payload from the Windows Registry.\u003c/li\u003e\n\u003cli\u003eEnables the next stage of the attack by making the payload executable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"oysterblues-core-payload\"\u003eOYSTERBLUES (Core Payload)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eHarvests extensive system information:\n\n\u003cul\u003e\n\u003cli\u003eComputer name\u003c/li\u003e\n\u003cli\u003eUser account\u003c/li\u003e\n\u003cli\u003eOperating system version\u003c/li\u003e\n\u003cli\u003eTime of the last OS boot\u003c/li\u003e\n\u003cli\u003eList of running processes\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eExfiltrates this data to a command-and-control (C2) server via an HTTP POST request.\u003c/li\u003e\n\u003cli\u003eAwaits a response from the C2 that contains further JavaScript code, which is executed using the \u003ccode\u003eeval()\u003c/code\u003e function to fetch and run the final payload.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"cobalt-strike-final-payload\"\u003eCobalt Strike (Final Payload)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe JavaScript received from the C2 loads Cobalt Strike, a commercial adversary simulation framework.\u003c/li\u003e\n\u003cli\u003eCobalt Strike provides attackers with post-exploitation capabilities such as command execution, lateral movement, and covert communication.\u003c/li\u003e\n\u003cli\u003eDeployment via eval-based scripting helps evade static detection and allows dynamic code retrieval.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-russian-cyber-operations\"\u003eBroader Russian Cyber Operations\u003c/h2\u003e\n\n\u003cp\u003eUkraine’s National Security and Defense Council released a report outlining the Kremlin’s enhanced cyber tactics:\u003c/p\u003e\n\n\u003ch3 id=\"ai-integration\"\u003eAI Integration\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eRussian operators are using OpenAI’s ChatGPT and Google’s Gemini to scout targets and automate target profiling.\u003c/li\u003e\n\u003cli\u003eAI is being embedded directly into malware to generate malicious commands at runtime, increasing adaptability and obfuscation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-focus\"\u003eStrategic Focus\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eKremlin-backed hacking groups aim to obtain intelligence and ensure a long-term presence in compromised networks for follow-on exploitation, including support for influence operations.\u003c/li\u003e\n\u003cli\u003ePrimary initial access vectors in 2025 included social engineering, vulnerability exploitation, compromised RDP/VPN accounts, supply chain attacks, and unlicensed software with pre-installed backdoors.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"influence-operations-on-bluesky\"\u003eInfluence Operations on Bluesky\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA pro-Kremlin propaganda campaign since 2024 has hijacked legitimate Bluesky user accounts, including those of journalists and professors, to post fake content.\u003c/li\u003e\n\u003cli\u003eThis activity is attributed to the Moscow-based Social Design Agency, which is linked to the Matryoshka influence campaign.\u003c/li\u003e\n\u003cli\u003eBluesky has responded by suspending compromised accounts until the original owners initiate a password reset.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitigation-and-recommendations\"\u003eMitigation and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eCERT-UA advises restricting the ability to run \u003ccode\u003ewscript.exe\u003c/code\u003e for standard user accounts. This single change directly breaks the initial execution chain of the JavaScript-based malware, reducing the attack surface against this campaign.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe Ghostwriter campaign demonstrates an evolving, multi-stage attack that uses registry-stored payloads and eval-based C2 communication to stealthily deliver Cobalt Strike. Paired with broader Russian efforts to weaponize AI and manipulate social platforms, these threats underscore the importance of behavioral monitoring, application whitelisting, and proactive mitigation of scripting engines. The CERT-UA recommendation to disable wscript.exe for standard users offers a practical and effective countermeasure against this specific intrusion chain.\u003c/p\u003e\n","keyPoints":["The Belarus-aligned Ghostwriter group (UAC-0057, UNC1151) has been targeting Ukrainian government entities with phishing emails using lures related to the Prometheus learning platform.","Phishing emails, often sent from compromised accounts, contain a PDF attachment with a link that downloads a ZIP archive housing a malicious JavaScript file.","The JavaScript, named OYSTERFRESH, shows a decoy document while writing the encrypted OYSTERBLUES payload to the Windows Registry and fetching OYSTERSHUCK to decode it.","OYSTERBLUES collects system information (computer name, user account, OS version, running processes) and exfiltrates it to a C2 server, then retrieves further JavaScript executed via eval() to load Cobalt Strike.","CERT-UA advises restricting wscript.exe execution for standard user accounts to reduce the attack surface."],"insights":["The malware evades disk-based detection by storing its encrypted OYSTERBLUES payload in the Windows Registry, demonstrating a shift away from conventional file drops.","The reliance on JavaScript's eval() to fetch and execute follow-on stages enables the attack to dynamically adapt and hinder static analysis, making behavioral monitoring crucial.","CERT-UA's specific mitigation—restricting wscript.exe for standard users—directly severs the initial execution path, showing that targeted hardening can neutralize even a complex multi-stage threat.","Ukraine's broader disclosure of Russian operations reveals AI is now being embedded directly into malware to generate commands at runtime, a significant escalation in offensive automation.","The hijacking of Bluesky accounts since 2024 illustrates how influence actors are pivoting to decentralized social platforms to circumvent content moderation and sustain propaganda campaigns."],"referencedReports":[{"title":"CERT-UA Report on Ghostwriter Phishing Campaign","url":"https://cert.gov.ua/article/6315762","publisher":"Computer Emergency Response Team of Ukraine (CERT-UA)","context":"The article cites a Thursday report from CERT-UA detailing how the Ghostwriter group is using Prometheus-themed lures to deliver JavaScript malware to Ukrainian government organizations."},{"title":"2025 National Cybersecurity Report","url":"https://www.rnbo.gov.ua/files/2026/NATIONAL_CYBER_SCC/kiber_2025.pdf","publisher":"Ukraine's National Security and Defense Council","context":"The article references a report released by Ukraine's National Security and Defense Council revealing Russia's use of AI tools like ChatGPT and Gemini for targeting, malware development, and influence operations."}],"body":"\u003cp\u003eThe Belarus-aligned Ghostwriter group (UAC-0057/UNC1151) has been targeting Ukrainian government organizations with phishing emails that use the Prometheus online learning platform as a lure. Emails often originate from compromised accounts and carry a PDF attachment containing a link. When clicked, the link downloads a ZIP archive with a JavaScript file called OYSTERFRESH, which displays a decoy document while stealthily storing an encrypted payload (OYSTERBLUES) in the Windows Registry. It also downloads OYSTERSHUCK to decode this payload.\u003c/p\u003e\n\n\u003cp\u003eOYSTERBLUES harvests system information—computer name, user account, OS version, last boot time, and running processes—and exfiltrates it to a command-and-control server. It then retrieves additional JavaScript executed via eval() to load Cobalt Strike for deeper post-exploitation. CERT-UA advises restricting wscript.exe execution for standard users to reduce the attack surface, while broader disclosures from Ukraine’s National Security and Defense Council highlight Russia’s integration of AI tools like ChatGPT and Gemini into cyber operations and influence campaigns on platforms such as Bluesky.\u003c/p\u003e\n"},{"n":8,"title":"Netherlands seizes 800 servers of hosting firm enabling cyberattacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/netherlands-seizes-800-servers-of-hosting-firm-enabling-cyberattacks/","time":"17:24","priority":"SHOULD READ","score":85,"tldr":"Dutch authorities arrested two suspects and seized 800 servers linked to a banned hosting firm that was used by Russian and Belarusian threat actors to launch cyberattacks and disinformation campaigns while evading EU sanctions.","briefOverview":"\u003cp\u003eDutch financial crime investigators (FIOD) arrested two individuals and seized 800 servers connected to a web hosting firm that facilitated cyberattacks, interference operations, and disinformation campaigns. The firm, Stark Industries, was founded on February 10, 2022, just weeks before Russia\u0026rsquo;s full-scale invasion of Ukraine, and was later sanctioned by the European Union.\u003c/p\u003e\n\n\u003cp\u003eFollowing the EU sanctions, the operation was moved to a newly created Dutch front company, WorkTitans B.V., which continued providing hosting services under the brand THE.Hosting. Investigators believe the suspects indirectly supplied economic resources to Russian and Belarusian entities subject to EU sanctions, and Danish authorities linked WorkTitans to distributed denial-of-service attacks by the pro-Russian hacktivist group NoName057(16).\u003c/p\u003e\n\n\u003cp\u003eThe raids, conducted in data centers and residential locations across the Netherlands, also uncovered records and devices. The case highlights the use of front companies and infrastructure chaining—where a connectivity provider, Mirhosting, acted as the transport layer from sanctioned Russian infrastructure into European networks—to sustain cyber campaigns despite economic restrictions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Dutch Fiscal Information and Investigation Service (FIOD) carried out a major operation arresting a 57-year-old company director and a 39-year-old head of an internet connectivity firm, while seizing 800 servers believed to be supporting malicious cyber activities. The investigation centers on Stark Industries, a web hosting company established on February 10, 2022, shortly before Russia launched its invasion of Ukraine, with authorities stating the firm aided actions by the Russian Federation that undermine democracy and security through information manipulation and disruption of public and economic systems.\u003c/p\u003e\n\n\u003cp\u003eIn May of the previous year, the European Union added Stark Industries to its sanctions list for enabling cyberattacks. After the sanctions, the hosting infrastructure was transferred to WorkTitans B.V., a newly created Dutch entity that investigators believe acted as a front for the sanctioned operators. Under the brand THE.Hosting, WorkTitans allegedly continued providing services to entities under EU restrictions, indirectly giving them economic resources.\u003c/p\u003e\n\n\u003cp\u003eDuring the raids, multiple data centers in Dronten and Schiphol-Rijk were targeted, along with searches in Enschede and Almere. FIOD seized not only the 800 servers but also laptops, phones, and administrative records. The operation involved coordination across several locations to dismantle the physical backbone of the operation.\u003c/p\u003e\n\n\u003cp\u003eDanish authorities, as reported by De Volkskrant, specifically linked WorkTitans to attacks carried out by NoName057(16), a pro-Russian hacktivist group known for destructive distributed denial-of-service (DDoS) campaigns against key organizations. This connection shows how front companies can serve as a bridge between sanctioned Russian infrastructure and high-profile disruptive attacks on European targets.\u003c/p\u003e\n\n\u003cp\u003eA company named Mirhosting, based in Almere, played the role of the transport layer, operating physical servers, providing colocation, and supplying high-capacity connectivity to major internet exchanges in Amsterdam and Frankfurt. Through Mirhosting, traffic originating from Stark’s systems entered Europe and reached the WorkTitans infrastructure. Mirhosting denied knowingly supporting illegal operations, stating they act upon abuse complaints swiftly.\u003c/p\u003e\n\n\u003cp\u003eThe case illustrates a sophisticated sanitization evasion technique: when the original hosting entity was sanctioned, a domestic front company quickly assumed control of the infrastructure, maintaining continuity of operations while technically operating under a different legal identity. This resilience mechanism presents a challenge for cybersecurity authorities and sanctions enforcement.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003eDutch financial crime investigators (FIOD) arrested two suspects and seized 800 servers connected to a web hosting operation that enabled cyberattacks, interference operations, and disinformation campaigns. The arrests targeted a 57-year-old director of a web hosting firm and a 39-year-old head of a separate company providing internet connectivity. Authorities allege the suspects indirectly provided economic resources to Russian and Belarusian entities sanctioned by the European Union.\u003c/p\u003e\n\n\u003ch2 id=\"key-entity-stark-industries\"\u003eKey Entity: Stark Industries\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eStark Industries\u003c/strong\u003e was founded on February 10, 2022, shortly before Russia’s full-scale invasion of Ukraine.\u003c/li\u003e\n\u003cli\u003eAccording to FIOD, the company supported actions by the Russian Federation that undermine democracy and security, including information manipulation and disruption of public and economic systems.\u003c/li\u003e\n\u003cli\u003eThe European Union added Stark Industries to its sanctions list on May 20 of the previous year for enabling cyberattacks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"sanctions-evasion-via-front-company\"\u003eSanctions Evasion via Front Company\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAfter the EU sanctions, the web hosting infrastructure was transferred to a newly created Dutch entity, \u003cstrong\u003eWorkTitans B.V.\u003c/strong\u003e, which investigators believe acted as a front for the sanctioned operators.\u003c/li\u003e\n\u003cli\u003eWorkTitans operated under the brand \u003cstrong\u003eTHE.Hosting\u003c/strong\u003e and continued to provide services to entities under EU restrictions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"raids-and-seizures\"\u003eRaids and Seizures\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eFIOD conducted multiple raids in data centers located in Dronten and Schiphol-Rijk, as well as searches in Enschede and Almere.\u003c/li\u003e\n\u003cli\u003eSeized items included 800 servers, laptops, phones, and administrative records.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-connection\"\u003eThreat Actor Connection\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eDanish authorities, as reported by De Volkskrant, linked WorkTitans to attacks by the pro-Russian hacktivist group \u003cstrong\u003eNoName057(16)\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eNoName057(16) is known for distributed denial-of-service (DDoS) attacks targeting key organizations.\u003c/li\u003e\n\u003cli\u003eThe connection indicates that infrastructure operated through Dutch front companies was directly used in disruptive cyber operations against European targets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"connectivity-provider-role\"\u003eConnectivity Provider Role\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMirhosting\u003c/strong\u003e, based in Almere, operated physical servers, provided colocation, and supplied high-capacity connectivity to major internet exchanges in Amsterdam and Frankfurt.\u003c/li\u003e\n\u003cli\u003eIt acted as the transport layer through which traffic from Stark’s systems entered Europe and reached the WorkTitans infrastructure.\u003c/li\u003e\n\u003cli\u003eMirhosting denied knowingly supporting illegal operations, stating that it quickly intervenes upon receipt of abuse complaints. WorkTitans did not respond to requests for comment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-implications\"\u003eBroader Implications\u003c/h2\u003e\n\n\u003cp\u003eThe operation demonstrates how sanctioned threat actors can quickly reconstitute their infrastructure using domestic front companies to evade economic restrictions. The chaining of connectivity providers creates a resilient layer that allows malicious traffic to reach targets even after sanctions. This structure complicates enforcement and highlights the need for supply chain scrutiny among upstream internet service providers.\u003c/p\u003e\n","keyPoints":["Dutch financial crime investigators (FIOD) arrested a 57-year-old company director and a 39-year-old connectivity firm head and seized 800 servers linked to a web hosting firm enabling cyberattacks and disinformation.","The hosting firm, Stark Industries, was founded on February 10, 2022, shortly before Russia's invasion of Ukraine, and was added to the EU sanctions list on May 20 last year.","After EU sanctions, the hosting infrastructure was transferred to a newly created Dutch front company, WorkTitans B.V., to continue operations.","The suspects are accused of indirectly providing economic resources to Russian and Belarusian entities sanctioned by the European Union.","Danish authorities linked WorkTitans to distributed denial-of-service attacks carried out by the pro-Russian hacktivist group NoName057(16)."],"insights":["Stark Industries was founded on February 10, 2022, just two weeks before Russia's invasion of Ukraine, indicating it was likely a pre-planned platform to support imminent Russian hybrid cyber operations.","After EU sanctions forced the original company to halt, the operators quickly transferred the entire hosting infrastructure to a newly created Dutch front company (WorkTitans B.V.), showing how resilient bulletproof hosting operations can evade sanctions with minimal disruption.","A separate Dutch connectivity provider, Mirhosting, supplied high-capacity transport links to major internet exchanges in Amsterdam and Frankfurt, illustrating how upstream network firms can become critical chokepoints that allow sanctioned attack infrastructure to reach Western targets.","Danish authorities directly linked WorkTitans to attacks by the pro-Russian hacktivist group NoName057(16), establishing a concrete chain from a known threat actor through a Dutch front company to DDoS attacks on European organizations."],"referencedReports":[],"body":"\u003cp\u003eDutch financial crime investigators (FIOD) arrested two individuals and seized 800 servers connected to a web hosting firm that facilitated cyberattacks, interference operations, and disinformation campaigns. The firm, Stark Industries, was founded on February 10, 2022, just weeks before Russia\u0026rsquo;s full-scale invasion of Ukraine, and was later sanctioned by the European Union.\u003c/p\u003e\n\n\u003cp\u003eFollowing the EU sanctions, the operation was moved to a newly created Dutch front company, WorkTitans B.V., which continued providing hosting services under the brand THE.Hosting. Investigators believe the suspects indirectly supplied economic resources to Russian and Belarusian entities subject to EU sanctions, and Danish authorities linked WorkTitans to distributed denial-of-service attacks by the pro-Russian hacktivist group NoName057(16).\u003c/p\u003e\n\n\u003cp\u003eThe raids, conducted in data centers and residential locations across the Netherlands, also uncovered records and devices. The case highlights the use of front companies and infrastructure chaining—where a connectivity provider, Mirhosting, acted as the transport layer from sanctioned Russian infrastructure into European networks—to sustain cyber campaigns despite economic restrictions.\u003c/p\u003e\n"},{"n":1,"title":"Paved With Intent: ROADtools and Nation-State Tactics in the Cloud","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/roadtools-cloud-attacks/","time":"10:00","priority":"SHOULD READ","score":82,"tldr":"ROADtools is an open-source toolkit that nation-state attackers abuse to blend into legitimate Microsoft Entra ID activity for discovery, persistence, and token theft; defenders can detect it by hunting for unusual device registrations, scripted user agents, and bulk Microsoft Graph API calls.","briefOverview":"\u003cp\u003eThe article examines ROADtools, an open-source Python framework originally built for red-teaming and research that targets Microsoft Entra ID (formerly Azure AD). The toolkit consists of modules for discovery (roadrecon), token manipulation and device registration (roadtx), and core library functions (roadlib). Its design leverages legitimate Microsoft APIs and allows customization of request attributes like user-agent strings, enabling it to blend into normal cloud traffic and evade many standard detections.\u003c/p\u003e\n\n\u003cp\u003eMultiple nation-state threat actors have integrated ROADtools into real-world intrusions: Midnight Blizzard used it for Entra ID discovery in 2021, Curious Serpens leveraged it after password spray attacks in 2023, and UTA0355 employed token management features matching roadtx in a 2025 phishing campaign. These operations map to MITRE ATT\u0026amp;CK techniques for persistence (device registration), defense evasion (alternate authentication material), and discovery (account enumeration). The article provides preventive controls such as enabling token protection, restricting device code flow, and auditing OAuth apps, along with actionable hunting queries for Cortex XDR to detect suspicious device registrations, scripted user agents, and bulk Microsoft Graph API calls.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article from Palo Alto Networks Unit 42 details how the open-source ROADtools framework, designed for offensive and defensive security testing against Microsoft Entra ID, has been adopted by nation-state threat actors for cloud intrusions. ROADtools comprises multiple Python modules: roadrecon for internal discovery and enumeration of users, groups, roles, devices, and service principals; roadtx for token acquisition, exchange, and device registration; and roadlib which abstracts authentication complexity to facilitate API calls. The tool\u0026rsquo;s ability to operate through legitimate Microsoft APIs and to customize user-agent strings makes it difficult to detect.\u003c/p\u003e\n\n\u003cp\u003eROADtools\u0026rsquo; roadrecon module originally relied on the Azure AD Graph API, but its retirement and incomplete migration to Microsoft Graph API have led to fragmented community forks, potentially causing inconsistent functionality for attackers. The roadtx module supports OAuth flows like device code, refresh token reuse, and on-behalf-of flows, enabling adversaries to register rogue devices and obtain primary refresh tokens (PRTs) for persistent, non-interactive access across a tenant. A single device-bound PRT compromise allows attackers to silently acquire fresh access tokens and bypass multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article cites specific instances of nation-state misuse: Microsoft reported in October 2021 that Cloaked Ursa (Midnight Blizzard, APT29) used ROADtools for discovery after spear phishing; in September 2023, Microsoft detailed Curious Serpens (Peach Sandstorm, APT33) leveraging it after password spray campaigns; and in April 2025, Volexity identified UTA0355 using tooling matching roadtx\u0026rsquo;s token management to register a rogue device and gain Microsoft Graph API access. These activities map directly to MITRE ATT\u0026amp;CK techniques T1098.005 (Account Manipulation – Device Registration) for persistence, T1550 (Use Alternate Authentication Material) for defense evasion, and T1087 (Account Discovery) for reconnaissance.\u003c/p\u003e\n\n\u003cp\u003eDefenders can impede ROADtools by implementing layered identity controls. Enabling token protection binds refresh tokens to a specific device, directly countering token replay. Restricting device code flow via Conditional Access removes a favored script-based attack path. Regular audits of OAuth app permissions reduce the attack surface, while privileged identity management limits damage from compromised tokens. Correlating Azure audit logs, Microsoft Graph activity logs, and sign-in telemetry in a SIEM is essential for spotting anomalous API usage.\u003c/p\u003e\n\n\u003cp\u003eActionable hunting is presented through Cortex XQL queries. One query looks for device registration audit events initiated by the Device Registration Service to find unauthorized device creations. Another hunts for token misuse by filtering OAuth scope info for high-privilege scopes combined with scripted user agents like python-requests. A third detects roadrecon enumeration by identifying bursts of Microsoft Graph API calls to endpoints for users, groups, service principals, or applications from non-standard user agents. These queries require baselining to distinguish malicious from legitimate administrative activity.\u003c/p\u003e\n\n\u003cp\u003eIn summary, ROADtools exemplifies the dual-use challenge of security tooling: its legitimate API interactions and authentication flows enable stealthy cloud attacks. Understanding its modules, mapping attacker behaviors to MITRE techniques, and deploying both preventive controls and targeted hunting queries provide a multi-layered defense. Palo Alto Networks customers benefit from integrated detection capabilities in Cortex Cloud, Cortex XDR/XSIAM, and the Unit 42 Cloud Security Assessment service.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eThis article by Palo Alto Networks Unit 42 analyzes ROADtools, an open-source Python framework originally built for red-teaming and research that has been co-opted by nation-state threat actors for cloud attacks. ROADtools targets the identity and authentication layers of Microsoft Entra ID (formerly Azure AD) and focuses on enumerating accounts, applications, and tokens, as well as registering devices and manipulating OAuth 2.0 tokens. Its design principle of interacting through legitimate Microsoft APIs and its ability to mimic typical traffic by customizing request attributes like user-agent strings make it particularly evasive.\u003c/p\u003e\n\n\u003ch2 id=\"tool-overview\"\u003eTool Overview\u003c/h2\u003e\n\n\u003cp\u003eROADtools comprises several modules:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eroadrecon\u003c/strong\u003e: Used for internal discovery and enumeration. It gathers organizational data such as users, groups, roles, devices, service principals, and directory configurations, storing them in a local SQLite database viewable through a custom web interface. This module originally relied on the Azure AD Graph API, but Microsoft\u0026rsquo;s retirement of that API has broken its core functionality. As of May 2026, an incomplete \u003ccode\u003emsgraph\u003c/code\u003e branch exists in the official repository, and a community-maintained fork provides partial Microsoft Graph API support.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eroadtx\u003c/strong\u003e: Handles token acquisition and exchange, supporting OAuth 2.0 and OpenID Connect flows including device code, refresh token reuse, and on-behalf-of (OBO) flows. It can also register devices with Entra ID and replay stolen tokens. Output is typically access and refresh tokens in JSON format, enabling non-interactive authentication to Microsoft cloud services. The module allows attackers to bypass multi-factor authentication (MFA) by obtaining and reusing primary refresh tokens (PRTs).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eroadlib\u003c/strong\u003e: The library layer that underpins both roadrecon and roadtx, abstracting Microsoft\u0026rsquo;s authentication complexity and enabling flexible API calls, including to non-Microsoft endpoints.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-usage-and-industry-targeting\"\u003eThreat Actor Usage and Industry Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe article documents several nation-state actors operationalizing ROADtools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCloaked Ursa (Midnight Blizzard/APT29)\u003c/strong\u003e: In late 2021, Microsoft reported that this group used ROADtools for discovery and enumeration of victims\u0026rsquo; Azure AD environments after gaining initial access through highly targeted spear phishing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCurious Serpens (Peach Sandstorm/APT33)\u003c/strong\u003e: In 2023, Microsoft described the Iranian state-sponsored threat actor leveraging ROADtools for internal discovery following password spray attacks to enable intelligence collection at high-value targets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUTA0355\u003c/strong\u003e: In 2025, Volexity reported on a Russian threat actor that used tooling matching roadtx\u0026rsquo;s token management capabilities to register a rogue device with Entra ID, acquire a new token with full Microsoft Graph API access, and bypass MFA as part of a targeted phishing campaign.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-tactics-and-techniques\"\u003eMITRE ATT\u0026amp;CK® Tactics and Techniques\u003c/h2\u003e\n\n\u003cp\u003eThe article maps ROADtools functionality to specific MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence: T1098.005 Account Manipulation – Device Registration.\u003c/strong\u003e Attackers use roadtx to register new devices in Entra ID after authenticating with valid credentials. A registered device can bypass MFA and conditional access policies, providing durable access. The tool writes a device certificate and key locally and registers the device with defaults such as OS Windows 10.0.19041.928 and a name like DESKTOP-\u003crandom 8 digits\u003e, though these defaults are configurable.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDefense Evasion: T1550 Use Alternate Authentication Material.\u003c/strong\u003e By using roadtx, attackers acquire and replay tokens, including primary refresh tokens (PRTs), to silently obtain new access tokens without interactive sign-ins. This enables persistent, programmatic access across the tenant and renders MFA ineffective for token-based authentication.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDiscovery: T1087 Account Discovery.\u003c/strong\u003e The roadrecon module (with community updates for Microsoft Graph API) enumerates resources like /users, /groups, /devices, /servicePrincipals, and /applications, harvesting account names, group memberships, and service-principal metadata to identify high-value targets and privilege escalation paths.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"defender-perspective\"\u003eDefender Perspective\u003c/h2\u003e\n\n\u003ch3 id=\"preventive-controls-to-limit-token-misuse\"\u003ePreventive Controls to Limit Token Misuse\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends several layered identity defenses:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEnable Entra ID token protection\u003c/strong\u003e: Binding refresh tokens to a specific device via token protection prevents replay or misuse of stolen tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRestrict device code flow via conditional access\u003c/strong\u003e: Blocking or limiting the device code flow to trusted scenarios cuts off a path frequently used in script-based attacks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAudit OAuth apps regularly\u003c/strong\u003e: Reviewing delegated and application permissions reduces the attack surface for broadly-scoped applications that attackers target with roadtx.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLimit privilege exposure\u003c/strong\u003e: Using privileged identity management (PIM) or privileged access management (PAM) enforces least privilege and requires step-up authentication for sensitive actions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCorrelate logs across multiple sources\u003c/strong\u003e: Integrating Azure audit logs, Microsoft Graph API activity logs, sign-ins, and Office 365 activity in a SIEM provides visibility to spot anomalous API usage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"hunting-roadtools-activity\"\u003eHunting ROADtools Activity\u003c/h3\u003e\n\n\u003cp\u003eThe article provides Cortex XQL hunting queries for three areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDevice Registration\u003c/strong\u003e: Searches for specific audit events (\u0026ldquo;Add device\u0026rdquo;, \u0026ldquo;Add registered owner to device\u0026rdquo;, etc.) originating from the Device Registration Service. Analysts look for device names not conforming to organizational naming conventions and registrations from unexpected locations.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eToken Misuse\u003c/strong\u003e: Filters OAuth scope information for high-privilege scopes (Directory.ReadWrite.All, Device.ReadWrite.All, etc.) combined with user agents containing \u0026ldquo;python\u0026rdquo;, \u0026ldquo;requests\u0026rdquo;, \u0026ldquo;urllib\u0026rdquo;, or \u0026ldquo;curl\u0026rdquo;, indicating scripted authentication.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Graph API\u003c/strong\u003e: Monitors for high-volume calls to graph.microsoft.com endpoints for service principals, applications, or devices from non-standard user agents, with a configurable threshold (e.g., \u0026gt;100 calls per hour) to detect roadrecon enumeration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eROADtools represents the dual-use dilemma of security tooling: developed for legitimate red-teaming, it has become a weapon for nation-state actors due to its ability to operate within the bounds of expected cloud behavior. Its modules enable discovery, persistence, and token theft while evading detection through legitimate APIs and configurable request attributes. Defenders must layer controls such as token protection, conditional access, and OAuth audits with proactive hunting for anomalous device registrations, scripted user agents, and bulk enumeration. Palo Alto Networks products including Cortex Cloud, Cortex XDR/XSIAM, and the Unit 42 Cloud Security Assessment provide integrated protection and detection capabilities against these threats.\u003c/p\u003e\n","keyPoints":["ROADtools is an open-source Python framework designed to enumerate Microsoft Entra ID, register devices, and acquire or manipulate tokens through legitimate APIs.","The toolkit’s ROADrecon module gathers Entra ID information such as users, groups, and service principals, while roadtx handles token acquisition, exchange, and device registration.","Nation-state threat actors including Midnight Blizzard, Curious Serpens, and UTA0355 have used ROADtools in cloud intrusions for persistence, defense evasion, and discovery.","ROADtools evades detection by operating through legitimate Microsoft APIs and allowing attackers to customize request attributes like user-agent strings.","Defenders can hunt for ROADtools activity by detecting anomalous device registrations, scripted user agents (e.g., python-requests), and bulk Microsoft Graph API enumeration."],"insights":["The retirement of the Azure AD Graph API has fragmented ROADrecon's functionality, forcing attackers to use community-maintained forks with incomplete Microsoft Graph API support, which may lead to inconsistent or less detectable enumeration activity.","A single device-bound primary refresh token (PRT) compromise via roadtx grants persistent, programmatic access across the entire tenant, enabling attackers to silently acquire fresh tokens without interactive logins or MFA prompts.","Roadtx registers devices with a default OS version '10.0.19041.928' and a 'DESKTOP-\u003c8 random digits\u003e' naming pattern, providing a specific detection opportunity that defenders can alert on, though attackers can modify these defaults.","Enabling token protection in Microsoft Entra ID, which binds refresh tokens to a specific device, is one of the most direct defenses against roadtx's token replay and misuse capabilities.","Restricting the device code authentication flow through conditional access policies cuts off a favored attack path for roadtx, because it works reliably for script-based attacks."],"referencedReports":[{"title":"NOBELIUM targeting delegated administrative privileges to facilitate broader attacks","url":"https://www.microsoft.com/en-us/security/blog/2021/10/25/nobelium-targeting-delegated-administrative-privileges-to-facilitate-broader-attacks/","publisher":"Microsoft Security","context":"Microsoft reported in late 2021 on Cloaked Ursa (Midnight Blizzard/APT29) using ROADtools for discovery in Entra ID environments."},{"title":"Peach Sandstorm password spray campaigns enable intelligence collection at high-value targets","url":"https://www.microsoft.com/en-us/security/blog/2023/09/14/peach-sandstorm-password-spray-campaigns-enable-intelligence-collection-at-high-value-targets/","publisher":"Microsoft Security","context":"Microsoft reported in 2023 on Curious Serpens (Peach Sandstorm/APT33) leveraging ROADtools for internal discovery after password spray attacks."},{"title":"Phishing for Codes: Russian Threat Actors Target Microsoft 365 OAuth Workflows","url":"https://www.volexity.com/blog/2025/04/22/phishing-for-codes-russian-threat-actors-target-microsoft-365-oauth-workflows/","publisher":"Volexity","context":"Volexity reported in 2025 on a targeted phishing campaign by UTA0355 that used tooling matching roadtx's token management to register a rogue device with Entra ID."}],"body":"\u003cp\u003eThe article examines ROADtools, an open-source Python framework originally built for red-teaming and research that targets Microsoft Entra ID (formerly Azure AD). The toolkit consists of modules for discovery (roadrecon), token manipulation and device registration (roadtx), and core library functions (roadlib). Its design leverages legitimate Microsoft APIs and allows customization of request attributes like user-agent strings, enabling it to blend into normal cloud traffic and evade many standard detections.\u003c/p\u003e\n\n\u003cp\u003eMultiple nation-state threat actors have integrated ROADtools into real-world intrusions: Midnight Blizzard used it for Entra ID discovery in 2021, Curious Serpens leveraged it after password spray attacks in 2023, and UTA0355 employed token management features matching roadtx in a 2025 phishing campaign. These operations map to MITRE ATT\u0026amp;CK techniques for persistence (device registration), defense evasion (alternate authentication material), and discovery (account enumeration). The article provides preventive controls such as enabling token protection, restricting device code flow, and auditing OAuth apps, along with actionable hunting queries for Cortex
