XDR to detect suspicious device registrations, scripted user agents, and bulk Microsoft Graph API calls.\u003c/p\u003e\n"},{"n":3,"title":"Why the Supreme Court's Chatrie case could change the meaning of privacy in America","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/why-supreme-court-chatrie-case-could-reshape-privacy","time":"15:03","priority":"SHOULD READ","score":82,"tldr":"The Supreme Court's ruling in Chatrie could decide whether geofence and other reverse search warrants that scan everyone's cloud data are constitutional, potentially redefining digital privacy and government access to location, emails, and AI chats without individualized suspicion.","briefOverview":"\u003cp\u003eThe Supreme Court is hearing Chatrie v. Google, the first digital privacy case since 2018, to decide whether geofence warrants violate the Fourth Amendment. These warrants compel Google to search all users’ location history within a defined area and timeframe to identify unknown criminal suspects. Petitioner Okello Chatrie argues that this practice constitutes a general warrant because it rummages through millions of accounts without individualized suspicion, while the government claims users have consented to the search via Google’s privacy policy.\u003c/p\u003e\n\n\u003cp\u003eThe case could redefine the boundaries of digital searches: a ruling that upholds geofence warrants may also permit reverse keyword or reverse AI searches that scan entire user bases for evidence of a crime. The government’s consent argument, if accepted, could eliminate Fourth Amendment protections for email, documents, and photos stored in the cloud. An expert witness demonstrated that supposedly anonymous location data can be de-anonymized using public records, undermining the government’s claim that privacy is preserved.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Chatrie case arises from a robbery investigation in which police obtained a geofence warrant ordering Google to search the location history of every user within a 150‑meter radius around the crime scene. Lawyer Adam Unikowsky, representing Okello Chatrie, argues the warrant is an unconstitutional general warrant because it authorizes a sweeping search of tens of millions of Google accounts without particularized suspicion—a practice the Founders explicitly rejected. The government counters that users voluntarily share location data and that the initial search produces only anonymous results, so no Fourth Amendment search occurs.\u003c/p\u003e\n\n\u003cp\u003eAt the heart of the dispute is whether Google, by executing the warrant, acts as a government agent conducting a search of each account’s contents. Unikowsky contends that Google’s process of sifting through individual location histories to find matches inside the geofence is functionally identical to police rummaging through private papers. The government’s interpretation of Google’s privacy policy—that users consent to such disclosures—extends to all cloud-stored data, including emails, documents, and photos, threatening blanket exposure of digital records to law enforcement.\u003c/p\u003e\n\n\u003cp\u003eThe case’s implications are profound. A broad ruling could greenlight “reverse search” techniques such as reverse keyword warrants and reverse AI chat searches, enabling police to query all users’ browser histories or AI conversations for leads. Google, in an amicus brief, revealed that it has received geofence warrants covering areas as large as 2.5 square miles over multiple days, demonstrating that law enforcement is already pushing far beyond targeted crime scenes. Although Google no longer stores the location history used in this case, many other apps and services continue to collect such data, so the ruling will affect a wide swath of the tech industry.\u003c/p\u003e\n\n\u003cp\u003eUnikowsky also challenges the government’s anonymity claim. An expert witness identified three individuals inside the geofence using only their two hours of movement data and public records, proving that even “anonymous” location trails can be trivially de-anonymized. Additionally, the consent forms presented during phone setup are vague and do not disclose the granularity or potential law enforcement access that users actually face; people click “yes” to make their devices work without genuinely understanding the privacy trade-off.\u003c/p\u003e\n\n\u003cp\u003eShould the court impose narrow parameters for future geofence warrants—limiting the area, time, and probable cause required—that would still represent a partial victory for privacy advocates. However, Unikowsky’s primary goal is a ruling that geofence warrants, as currently used, violate the Fourth Amendment. The nearly 30 amicus briefs filed underscore the tech community’s alarm over the potential expansion of government access to cloud data.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"chattrie-v-google-geofence-warrants-and-the-future-of-digital-privacy\"\u003eChattrie v. Google: Geofence Warrants and the Future of Digital Privacy\u003c/h1\u003e\n\n\u003ch2 id=\"background\"\u003eBackground\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Supreme Court is reviewing \u003cem\u003eChatrie v. Google\u003c/em\u003e, the first Fourth Amendment and digital privacy case since \u003cem\u003eCarpenter v. United States\u003c/em\u003e (2018).\u003c/li\u003e\n\u003cli\u003ePetitioner Okello Chatrie was charged with robbery after police obtained a geofence warrant requiring Google to disclose location data for all devices within a 150‑meter radius (approximately 17.5 acres) near the crime scene.\u003c/li\u003e\n\u003cli\u003eGeofence warrants are a type of “reverse warrant”: law enforcement starts with a location and timeframe, then compels a tech company to search its user base for devices present there, identifying unknown suspects.\u003c/li\u003e\n\u003cli\u003eThe case was argued by lawyer Adam Unikowsky, who contends the warrant violated Chatrie’s Fourth Amendment rights.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"core-legal-arguments\"\u003eCore Legal Arguments\u003c/h2\u003e\n\n\u003ch3 id=\"petitioner-s-position-unikowsky\"\u003ePetitioner’s Position (Unikowsky)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGeneral warrant claim:\u003c/strong\u003e The warrant resembles the reviled colonial practice of permitting blanket searches of homes and papers without particularized suspicion. Google must search every user’s account to check location history, effectively rummaging through tens of millions of accounts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOverbreadth:\u003c/strong\u003e Even if geofence warrants were theoretically permissible, the warrant in question was too broad—it captured individuals at a church and a bank who had no connection to the crime, lacking probable cause to search their location histories.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGovernment agent theory:\u003c/strong\u003e Google acts as an agent of the government when executing the warrant, so its search of accounts is a state action.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnonymity is illusory:\u003c/strong\u003e An expert demonstrated that just two hours of location data, combined with public records, can de-anonymize specific individuals, undermining the claim that no search occurs until the person is identified.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInvalid consent:\u003c/strong\u003e Users setting up Android phones click through vague consent prompts (e.g., “Enable location history for Google Assistant to work”) without understanding the extreme granularity (location every two minutes, retained potentially forever, shared with law enforcement upon request).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"government-s-position\"\u003eGovernment’s Position\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eConsent through privacy policy:\u003c/strong\u003e Google’s policy states it may disclose data for public safety purposes; users who agree to location history thereby waive a reasonable expectation of privacy in that data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo search occurs:\u003c/strong\u003e The government argues that viewing anonymous location plots does not constitute a search because it does not reveal identity—only later steps when the person is identified constitute a search.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNarrow scope:\u003c/strong\u003e The warrant was limited in place, time, and crime, making it particularized, not a general warrant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-implications-for-digital-privacy\"\u003eBroader Implications for Digital Privacy\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eReverse keyword and AI searches:\u003c/strong\u003e The same legal logic could extend to warrants that ask a provider to scan all users’ search queries for specific keywords or all AI chat logs for incriminating questions, effectively allowing dragnet surveillance of digital activity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloud data at risk:\u003c/strong\u003e The government’s consent argument applies to all Google services—email, documents, photos, calendar—not just location history. A ruling accepting it would strip Fourth Amendment protection from nearly all cloud-stored personal data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIndustry impact:\u003c/strong\u003e Although Google no longer stores location history in a way that supports geofence warrants, many other apps and websites continue to collect and store precise location data. The court’s decision will bind those providers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScale of existing use:\u003c/strong\u003e Google’s amicus brief disclosed that some geofence warrants already cover immense areas (e.g., 2.5 square miles of San Francisco over more than 48 hours), far exceeding the narrow vicinity of a single crime.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"expert-and-academic-perspectives\"\u003eExpert and Academic Perspectives\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOrin Kerr\u003c/strong\u003e predicted the justices might uphold geofence warrants but require strict limits on time and space, a view Unikowsky does not endorse but recognizes as a possible outcome.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnikowsky’s fallback:\u003c/strong\u003e Even if the court doesn’t completely ban geofence warrants, a ruling requiring narrow, probable‑cause‑specific parameters would constrain their current sweeping use.\u003c/li\u003e\n\u003cli\u003eTwenty-eight amicus briefs were filed, signaling alarm across the technology and civil liberties communities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"justice-interactions\"\u003eJustice Interactions\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJustice Sotomayor\u003c/strong\u003e questioned the general warrant characterization, noting the warrant identified a place, crime, and timeframe.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJustice Alito\u003c/strong\u003e raised the issue of mootness, pointing out Google no longer stores location history; Unikowsky emphasized the ruling would affect many other services that still do.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe decision will either enshrine meaningful digital privacy by limiting or outlawing reverse warrant techniques, or it will open the door to broad, suspicionless searches of vast datasets held by third-party providers, fundamentally altering the expectation of privacy in the digital age.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The Chatrie case is the first digital privacy case to reach the Supreme Court since 2018's Carpenter decision and concerns whether geofence warrants violate the Fourth Amendment.","A geofence warrant compels a company to search all users' location histories to identify suspects within a defined area, which the petitioner argues is an unconstitutional general warrant.","The outcome could affect other reverse search techniques such as reverse keyword or reverse AI searches that scan entire user bases for evidence of a crime.","The government claims users consent to location data sharing through privacy policies, but the petitioner argues the consent is not meaningful because the granularity and law enforcement access are not clearly disclosed.","Although Google no longer stores the location history used in this case, many other apps and websites do, meaning the court's ruling will have broad implications beyond Google."],"insights":["The government's legal reasoning that users consent to searches by accepting a privacy policy could, if upheld, effectively eliminate Fourth Amendment protection for all cloud-stored data—email, documents, and photos alike.","An expert witness demonstrated that just two hours of anonymized location data could be matched to public records to identify specific individuals, undermining the claim that the initial anonymous search phase protects privacy.","Google has been served with geofence warrants covering areas as wide as 2.5 square miles over multiple days, showing that law enforcement has already applied this technique far beyond narrow crime scenes to sweep in thousands of people."],"referencedReports":[],"body":"\u003cp\u003eThe Supreme Court is hearing Chatrie v. Google, the first digital privacy case since 2018, to decide whether geofence warrants violate the Fourth Amendment. These warrants compel Google to search all users’ location history within a defined area and timeframe to identify unknown criminal suspects. Petitioner Okello Chatrie argues that this practice constitutes a general warrant because it rummages through millions of accounts without individualized suspicion, while the government claims users have consented to the search via Google’s privacy policy.\u003c/p\u003e\n\n\u003cp\u003eThe case could redefine the boundaries of digital searches: a ruling that upholds geofence warrants may also permit reverse keyword or reverse AI searches that scan entire user bases for evidence of a crime. The government’s consent argument, if accepted, could eliminate Fourth Amendment protections for email, documents, and photos stored in the cloud. An expert witness demonstrated that supposedly anonymous location data can be de-anonymized using public records, undermining the government’s claim that privacy is preserved.\u003c/p\u003e\n"},{"n":9,"title":"Former US execs plead guilty to aiding tech support scammers","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/former-us-execs-plead-guilty-to-aiding-tech-support-scammers/","time":"15:32","priority":"SHOULD READ","score":82,"tldr":"Two former executives of a call-tracking and analytics company pleaded guilty to concealing and enabling a massive tech support fraud scheme, having knowingly provided services to scammers who stole millions from victims worldwide.","briefOverview":"\u003cp\u003eTwo former executives of a call-tracking and analytics company—CEO Adam Young and CSO Harrison Gevirtz—pleaded guilty to misprision of a felony for knowingly concealing a years-long tech support fraud scheme that victimized individuals worldwide. Between 2017 and 2022, their firm C.A. Cloud provided phone numbers, call forwarding, and call-tracking services to customers they knew were running tech support scams, while actively helping the fraudsters evade detection by advising them to use rotating phone numbers and introducing scammers to each other. The executives also directly operated a call center in Tunisia where employees engaged in the same fraudulent practices, including remote access to victims’ computers and sending false invoices.\u003c/p\u003e\n\n\u003cp\u003eThe scheme exploited the elderly and vulnerable, with victims tricked through fake malware pop-ups and impersonations of Microsoft and Apple. According to the FBI\u0026rsquo;s 2025 Internet Crime Report, Americans lost at least \u003cspan class=\"math inline\"\u003e\\(2.1 billion to tech support fraud last year from nearly 48,000 complaints, underscoring the massive scale of such abuse. Young and Gevirtz face up to three years in prison and a \\)\u003c/span\u003e250,000 fine, with sentencing scheduled for June 16.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFormer CEO Adam Young (Miami) and former CSO Harrison Gevirtz (Las Vegas) have pleaded guilty to misprision of a felony for concealing a multi-year tech support fraud scheme that spanned the globe. The charge carries a maximum penalty of three years in federal prison, a fine of up to $250,000, or both, and their sentencing is set for June 16. The two executives ran C.A. Cloud Attribution, Ltd. (operating as C.A. Cloud), a business that supplied call‑tracking infrastructure including telephone numbers, call recordings, forwarding, and analytics from early 2017 through April 2022.\u003c/p\u003e\n\n\u003cp\u003eThe fraudsters they served deployed deceptive pop‑up ads that falsely warned of malware infections, then routed victims to call centers where operators impersonated Microsoft or Apple, demanded hundreds of dollars for fictitious technical support, and in some cases remotely accessed computers to steal personal and financial data. Young and Gevirtz knew many of their customers were engaged in these tech support scams, yet they chose not to alert law enforcement. Instead, they actively helped the scammers avoid detection by advising them to use large pools of rotating telephone numbers to reduce complaints and prevent account terminations. They also directed their sales staff to market services specifically to fraudulent businesses and even introduced scammers to one another to buy and sell calls.\u003c/p\u003e\n\n\u003cp\u003eBeyond their role as service providers, the two men owned and operated a call center in Tunisia from 2016 to April 2022, where some employees directly committed tech support fraud. Those employees would fraudulently access victims’ computers via compromised links, pose as official technical support, and send fabricated invoices. This dual operation—running a legitimate‑seeming business while also managing an overseas scam call center—illustrates how enablers can blend lawful and criminal enterprises to profit from victimization.\u003c/p\u003e\n\n\u003cp\u003eFBI Special Agent in Charge Ted E. Docks described their actions as “downright despicable,” emphasizing that the defendants “willfully profited from telemarketing and tech support scammers … who preyed on the elderly, exploited the vulnerable, and drained victims of their life savings.” The case echoes a sentencing from August 2024 in which the leader of a tech support fraud ring received seven years in prison after stealing more than $6 million from at least 6,500 elderly victims in the U.S. and Canada.\u003c/p\u003e\n\n\u003cp\u003eThe broader impact is stark: the FBI’s 2025 Internet Crime Report recorded at least $2.1 billion in losses to tech support fraud last year, based on nearly 48,000 complaints received by the Internet Crime Complaint Center. The guilty pleas from Young and Gevirtz highlight that enabling such scams—even through infrastructure services rather than direct fraud—can carry severe legal consequences, and that law enforcement is increasingly targeting the facilitation layer of cyber‑enabled financial crimes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003eTwo former executives of a call‑tracking and analytics company—CEO Adam Young (Miami, Florida) and CSO Harrison Gevirtz (Las Vegas, Nevada)—pleaded guilty to misprision of a felony for concealing a worldwide tech support fraud scheme that operated for years. Their company, C.A. Cloud Attribution, Ltd., doing business as C.A. Cloud, provided telephone numbers, call tracking, call forwarding, and call recording services between early 2017 and April 2022. The defendants admitted they knew many of their customers were engaged in tech support scams aimed at stealing money and information from victims, yet they failed to report the crimes and instead took steps to help the scammers avoid detection. Sentencing is scheduled for June 16, with the misprision charge carrying a maximum of three years in prison, a $250,000 fine, or both.\u003c/p\u003e\n\n\u003ch2 id=\"the-fraud-scheme\"\u003eThe Fraud Scheme\u003c/h2\u003e\n\n\u003cp\u003eThe scam operations followed a well‑known playbook:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFraudulent pop‑up ads appeared on users\u0026rsquo; computers, falsely claiming the systems were infected with malware.\u003c/li\u003e\n\u003cli\u003eVictims were directed to call centers staffed by agents who impersonated legitimate companies, including Microsoft and Apple.\u003c/li\u003e\n\u003cli\u003eCallers demanded hundreds of dollars for fake technical services.\u003c/li\u003e\n\u003cli\u003eIn some instances, scammers remotely accessed victims’ computers, stole personal and financial information, and made unauthorized withdrawals.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe executives’ customers were among those running such schemes, and Young and Gevirtz provided the telephony infrastructure that made the scam calls possible.\u003c/p\u003e\n\n\u003ch2 id=\"enabling-activities\"\u003eEnabling Activities\u003c/h2\u003e\n\n\u003cp\u003eRather than merely turning a blind eye, the executives actively facilitated the fraud:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThey advised scammers to use large pools of rotating telephone numbers to reduce complaints from victims and to prevent account terminations.\u003c/li\u003e\n\u003cli\u003eThey instructed their company’s sales staff to market services specifically to businesses they knew were engaged in fraud.\u003c/li\u003e\n\u003cli\u003eThey introduced fraudsters to one another so they could buy and sell calls, further profiting from the illicit network.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese actions went beyond passive provision of services; they constituted deliberate steps to strengthen the scammers’ operational security and extend the life of the fraudulent enterprises.\u003c/p\u003e\n\n\u003ch2 id=\"dual-operation-the-tunisia-call-center\"\u003eDual Operation: The Tunisia Call Center\u003c/h2\u003e\n\n\u003cp\u003eFrom 2016 through April 2022, Young and Gevirtz also owned and operated a call center in Tunisia. Some employees at that center directly engaged in tech support fraud by:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFraudulently accessing victims’ computers via compromised links.\u003c/li\u003e\n\u003cli\u003ePosing as official technical support representatives.\u003c/li\u003e\n\u003cli\u003eSending false invoices to victims.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis reveals that the defendants were not only external service providers but also direct participants in the same type of fraud they were enabling through C.A. Cloud.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-response\"\u003eLaw Enforcement Response\u003c/h2\u003e\n\n\u003cp\u003eFBI Boston Division Special Agent in Charge Ted E. Docks described the pair’s conduct as “downright despicable,” noting that they “willfully profited from telemarketing and tech support scammers, here and abroad, who preyed on the elderly, exploited the vulnerable, and drained victims of their life savings and peace of mind.” He emphasized that “[b]ehind every fraudulent call was a real person left frightened, humiliated, or financially shattered.”\u003c/p\u003e\n\n\u003cp\u003eThe case echoes another recent prosecution: in August 2024, the leader of a tech support fraud scheme was sentenced to seven years in prison after stealing more than $6 million from at least 6,500 elderly victims in the United States and Canada.\u003c/p\u003e\n\n\u003ch2 id=\"broader-impact-and-statistics\"\u003eBroader Impact and Statistics\u003c/h2\u003e\n\n\u003cp\u003eAccording to the FBI’s 2025 Internet Crime Report (published by the Internet Crime Complaint Center, IC3), Americans lost at least $2.1 billion to tech support fraud last year, based on nearly 48,000 complaints. This staggering figure underscores the enormous scale of the problem and the critical role that facilitators like Young and Gevirtz play in sustaining such schemes.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLegal exposure for enablers:\u003c/strong\u003e The guilty plea to misprision of a felony shows that individuals who knowingly conceal fraud—even without directly executing the scams—can face federal charges.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eActive facilitation vs. passive ignore:\u003c/strong\u003e The case illustrates how service providers can move from passive enablers to active co‑conspirators by advising criminals on evasion tactics.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBlended operations:\u003c/strong\u003e The defendants’ simultaneous operation of a legitimate‑appearing call‑tracking business and a fraudulent call center overseas demonstrates how illicit profits can be layered within otherwise lawful enterprises.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Former CEO Adam Young and former CSO Harrison Gevirtz pleaded guilty to misprision of a felony for knowingly concealing a tech support fraud scheme that targeted victims worldwide.","Through their company C.A. Cloud Attribution, Ltd., they provided call-tracking services to scammers and actively helped them avoid detection by advising the use of rotating phone numbers.","The executives also owned and operated a call center in Tunisia where employees directly engaged in tech support fraud, including remotely accessing victims' computers and sending false invoices.","According to the FBI, Americans lost at least $2.1 billion to tech support fraud last year, based on nearly 48,000 complaints."],"insights":["The executives actively helped scammers evade detection by advising them to use rotating phone numbers, demonstrating how service providers can directly strengthen criminal operational security rather than merely turning a blind eye.","The plea to 'misprision of a felony' signals that prosecutors are targeting enablers who knowingly conceal fraud even if they are not charged with the fraud itself, making non-reporting a serious legal risk for technology service providers.","The same individuals ran both a legitimate-seeming call-tracking business and a fraudulent call center overseas, highlighting how blended operations can use one entity to launder the infrastructure for the other."],"referencedReports":[{"title":"2025 Internet Crime Report","url":"https://www.ic3.gov/AnnualReport/Reports/2025_IC3Report.pdf","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"The article cites the FBI's 2025 Internet Crime Report for the statistic that Americans lost at least $2.1 billion to tech support fraud last year based on nearly 48,000 complaints."}],"body":"\u003cp\u003eTwo former executives of a call-tracking and analytics company—CEO Adam Young and CSO Harrison Gevirtz—pleaded guilty to misprision of a felony for knowingly concealing a years-long tech support fraud scheme that victimized individuals worldwide. Between 2017 and 2022, their firm C.A. Cloud provided phone numbers, call forwarding, and call-tracking services to customers they knew were running tech support scams, while actively helping the fraudsters evade detection by advising them to use rotating phone numbers and introducing scammers to each other. The executives also directly operated a call center in Tunisia where employees engaged in the same fraudulent practices, including remote access to victims’ computers and sending false invoices.\u003c/p\u003e\n\n\u003cp\u003eThe scheme exploited the elderly and vulnerable, with victims tricked through fake malware pop-ups and impersonations of Microsoft and Apple. According to the FBI\u0026rsquo;s 2025 Internet Crime Report, Americans lost at least \u003cspan class=\"math inline\"\u003e\\(2.1 billion to tech support fraud last year from nearly 48,000 complaints, underscoring the massive scale of such abuse. Young and Gevirtz face up to three years in prison and a \\)\u003c/span\u003e250,000 fine, with sentencing scheduled for June 16.\u003c/p\u003e\n"},{"n":14,"title":"Cisco Patches CVSS 10.0 Secure Workload REST API Flaw Enabling Data Access","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cisco-patches-cvss-100-secure-workload.html","time":"05:36","priority":"SHOULD READ","score":82,"tldr":"Cisco patched a maximum-severity (CVSS 10.0) vulnerability in its Secure Workload REST API that could let unauthenticated attackers read sensitive data and make configuration changes with Site Admin privileges across tenant boundaries.","briefOverview":"\u003cp\u003eCisco has patched a critical vulnerability (CVE-2026-20223) in its Secure Workload product, caused by insufficient validation and authentication of REST API endpoint requests. An unauthenticated, remote attacker could exploit this flaw by sending a crafted API request to an affected endpoint.\u003c/p\u003e\n\n\u003cp\u003eA successful exploit could allow the attacker to read sensitive information and make configuration changes across tenant boundaries with Site Admin privileges. The vulnerability affects Cisco Secure Workload SaaS and on-premises deployments regardless of configuration, and there are no workarounds. Fixed releases include 3.10.8.3 and 4.0.3.17, while users on release 3.9 and earlier must migrate. Cisco found the issue during internal testing and has seen no evidence of exploitation, though the disclosure comes shortly after another maximum-severity Cisco flaw was actively exploited in the wild.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco has issued patches for a maximum-severity REST API vulnerability in its Secure Workload platform, rated CVSS 10.0. The flaw, CVE-2026-20223, results from inadequate validation and authentication on REST API endpoints, which an unauthenticated remote attacker can abuse by transmitting a crafted API request. No workarounds are available, and the fix must be applied directly.\u003c/p\u003e\n\n\u003cp\u003eUpon successful exploitation, an attacker could read sensitive information and perform configuration changes that span tenant boundaries, operating with the full privileges of the Site Admin user. This means a single compromise could affect multiple tenants within Secure Workload\u0026rsquo;s multi-tenant architecture, undermining segmentation controls.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in Cisco Secure Workload Cluster Software, impacting both Software‑as‑a‑Service and on‑premises deployments. The advisory confirms that the flaw is present regardless of device configuration, so all instances of the affected releases are susceptible.\u003c/p\u003e\n\n\u003cp\u003eCisco addressed the issue in release 3.10.8.3 and 4.0.3.17. Users on release 3.9 and earlier must migrate to a fixed release because no patches are provided for those older branches. The lack of workarounds means organizations have no interim mitigation measures and must upgrade promptly.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was identified during Cisco\u0026rsquo;s internal security testing, and as of the advisory publication there is no evidence of malicious exploitation in the wild. This internal discovery suggests that the flaw was not uncovered through external reports or active attacks.\u003c/p\u003e\n\n\u003cp\u003eThe patch arrives shortly after Cisco disclosed that a separate maximum‑severity authentication bypass flaw in the Catalyst SD‑WAN Controller (CVE-2026-20182, CVSS 10.0) had been actively exploited by a threat actor tracked as UAT‑8616. This close timing highlights the risk that newly announced critical REST API vulnerabilities could be rapidly targeted by attackers if not immediately patched.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco released security updates for a maximum-severity vulnerability in its Secure Workload product. The flaw, CVE-2026-20223, has a CVSS score of 10.0 and could allow unauthenticated, remote attackers to access sensitive data and make unauthorized configuration changes.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eRoot cause: insufficient validation and authentication when accessing REST API endpoints on Cisco Secure Workload.\u003c/li\u003e\n\u003cli\u003eExploit vector: an attacker sends a crafted API request to an affected endpoint.\u003c/li\u003e\n\u003cli\u003eImpact: successful exploitation grants the attacker the ability to read sensitive information and make configuration changes across tenant boundaries, operating with the privileges of the Site Admin user.\u003c/li\u003e\n\u003cli\u003eNo workarounds exist to mitigate the vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Secure Workload Cluster Software, both SaaS and on-premises deployments.\u003c/li\u003e\n\u003cli\u003eThe vulnerability is present regardless of device configuration, meaning all instances on vulnerable releases are affected.\u003c/li\u003e\n\u003cli\u003eAffected releases: 3.9 and earlier, 3.10 before 3.10.8.3, 4.0 before 4.0.3.17.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitigation-and-fixes\"\u003eMitigation and Fixes\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco has provided fixed software releases:\n\n\u003cul\u003e\n\u003cli\u003eRelease 3.10: Fixed in version 3.10.8.3.\u003c/li\u003e\n\u003cli\u003eRelease 4.0: Fixed in version 4.0.3.17.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eFor releases 3.9 and earlier, no direct patch is available; users must migrate to a fixed release.\u003c/li\u003e\n\u003cli\u003eBecause there are no workarounds, immediate upgrade is the only remediation option.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"discovery-and-exploitation-status\"\u003eDiscovery and Exploitation Status\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability was found during Cisco\u0026rsquo;s internal security testing.\u003c/li\u003e\n\u003cli\u003eAt the time of the advisory, Cisco stated there is no evidence of active exploitation in the wild.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-threat-landscape\"\u003eRelated Threat Landscape\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eOne week prior to this advisory, Cisco disclosed that another maximum-severity flaw, CVE-2026-20182 (CVSS 10.0) in Catalyst SD-WAN Controller, had been actively exploited in the wild by a threat actor designated UAT-8616.\u003c/li\u003e\n\u003cli\u003eThis earlier exploitation of a high-impact authentication bypass highlights the risk that attackers may quickly target similarly severe REST API vulnerabilities once publicly disclosed.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cisco has patched a maximum-severity vulnerability (CVE-2026-20223, CVSS score 10.0) in its Secure Workload REST API.","The vulnerability is due to insufficient validation and authentication when accessing REST API endpoints.","An unauthenticated, remote attacker could exploit the flaw to read sensitive information and make configuration changes across tenant boundaries with the privileges of the Site Admin user.","There are no workarounds for the vulnerability, and it affects both SaaS and on-premises Cisco Secure Workload deployments.","Cisco found the vulnerability during internal security testing and has no evidence of it being exploited in the wild."],"insights":["Because the flaw allows an unauthenticated attacker to perform actions across tenant boundaries with Site Admin privileges, a single exploit could compromise multiple tenants in a shared Secure Workload environment.","The absence of workarounds means that organizations cannot temporarily mitigate the risk and must prioritize immediate patching.","The disclosure follows closely on the heels of another maximum-severity Cisco vulnerability being actively exploited, suggesting that attackers may quickly target newly disclosed critical REST API flaws."],"referencedReports":[{"title":"Cisco Security Advisory: cisco-sa-csw-pnbsa-g8WEnuy","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-csw-pnbsa-g8WEnuy","publisher":"Cisco","context":"The article references this advisory as the official source of the flaw details and fixes from Cisco."}],"body":"\u003cp\u003eCisco has patched a critical vulnerability (CVE-2026-20223) in its Secure Workload product, caused by insufficient validation and authentication of REST API endpoint requests. An unauthenticated, remote attacker could exploit this flaw by sending a crafted API request to an affected endpoint.\u003c/p\u003e\n\n\u003cp\u003eA successful exploit could allow the attacker to read sensitive information and make configuration changes across tenant boundaries with Site Admin privileges. The vulnerability affects Cisco Secure Workload SaaS and on-premises deployments regardless of configuration, and there are no workarounds. Fixed releases include 3.10.8.3 and 4.0.3.17, while users on release 3.9 and earlier must migrate. Cisco found the issue during internal testing and has seen no evidence of exploitation, though the disclosure comes shortly after another maximum-severity Cisco flaw was actively exploited in the wild.\u003c/p\u003e\n"},{"n":17,"title":"Making Vulnerable Drivers Exploitable Without Hardware - The BYOVD Perspective","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/making-vulnerable-drivers-exploitable.html","time":"11:38","priority":"SHOULD READ","score":80,"tldr":"Attackers can make many hardware-gated kernel driver vulnerabilities exploitable in BYOVD attacks by using software-emulated device nodes with spoofed hardware IDs or by forcing driver installation onto existing devices, all without needing the actual hardware.","briefOverview":"\u003cp\u003eMany Windows kernel driver vulnerabilities remain unreachable without the original hardware, because the driver creates device objects and initializes internal state only when the Plug and Play manager invokes its AddDevice callback upon detecting that hardware. The article demonstrates how attackers can bypass this hardware gating from user mode alone—using software-emulated device nodes with spoofed hardware IDs, class-level filter restacking, or forced driver replacement—to make vulnerable code paths accessible for BYOVD attacks. These techniques can activate device stacks that accept IRP_MJ_CREATE even for filter drivers originally designed for entirely different hardware classes, and they circumvent INF file signature requirements through direct registry manipulation.\u003c/p\u003e\n\n\u003cp\u003eThis work reveals that hardware dependency is not a reliable security barrier: a significant portion of drivers previously considered unexploitable without physical hardware can be reached and potentially exploited by an administrator without kernel privileges. As the supply of easily exploitable signed drivers shrinks due to Microsoft removing cross‑signed trust and AI‑accelerated vulnerability research, threat actors may increasingly weaponize these hardware‑gated vulnerabilities, making it critical for defenders to recognize the forensic footprint of software‑emulated devices, unexpected driver bindings, and modified device class filter entries.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article examines how Windows kernel-mode driver vulnerabilities that appear reachable only with specific hardware can be made exploitable without that hardware, from the perspective of Bring Your Own Vulnerable Driver (BYOVD) attacks. While BYOVD has been widely studied, prior work has not systematically addressed the role of hardware-gating, where driver code—including vulnerable dispatch routines—is only exercised after a physical device triggers Plug and Play initialization. The author shows that by leveraging user-mode APIs to create software-emulated device nodes with arbitrary hardware IDs, an attacker can deceive the PnP manager into calling the driver’s AddDevice routine, thereby creating functional device objects (FDOs) and setting up the internal state needed to reach the vulnerable code.\u003c/p\u003e\n\n\u003cp\u003eTechnical analysis of device object creation patterns reveals that the core obstacle is often the absence of the AddDevice callback invocation, which is responsible for creating FDOs, initializing device extensions with driver-specific state, and, in some cases, creating user-accessible control device objects (CDOs). The article demonstrates that using devcon.exe (which relies on SetupAPI) or the Software Device API to create a root-enumerated software device with a hardware ID matching the driver’s INF triggers AddDevice and constructs a full device stack. Even when the managed PDO does not itself handle IRP_MJ_CREATE, the attached driver can do so, making the stack accessible from userland.\u003c/p\u003e\n\n\u003cp\u003eFor filter drivers that simply pass through IRPs but never accept CREATE, the article presents a filter restacking technique: the target filter’s service name is appended to the UpperFilters multi-string value of a device class such as Disk Drive, and a new virtual disk is mounted to force creation of a device stack where the filter sits above an FDO that does accept CREATE. This allowed the author to run a gaming mouse filter driver atop a disk stack, demonstrating that class‑agnostic deployment is possible and dramatically expands the exploitable filter surface.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the article outlines how forced driver replacement can completely bypass the INF file and its catalog signature. An attacker can deploy the driver via sc.exe, create or select a target device node, and manually craft the registry structures under HKLM\\SYSTEM\\CurrentControlSet\\Enum and Class keys to bind the driver to that node. Restarting the device then triggers AddDevice without any signature checks on the INF, because no INF is used—demonstrating that INF integrity is not a kernel‑mode security boundary.\u003c/p\u003e\n\n\u003cp\u003eWhile many drivers still require hardware access for full initialization (e.g., MMIO probing that checks chip IDs), the author notes that purely userland techniques cannot generically bypass these checks without loading additional kernel components. Nevertheless, the demonstrated methods substantially increase the pool of BYOVD‑viable drivers. The article concludes that as the availability of trivially exploitable signed drivers decreases, attackers may increasingly target these hardware‑gated vulnerabilities, and defenders should pay attention to the forensic traces of software‑emulated devices, unexpected UpperFilters entries, and rogue driver bindings in the registry.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"1-introduction-and-motivation\"\u003e1. Introduction and Motivation\u003c/h2\u003e\n\n\u003cp\u003eThe article, authored by Julian Horoszkiewicz of Atos Threat Research Center, provides a technical analysis of how Windows kernel-mode drivers that were developed for specific hardware can be interacted with from user mode without that hardware. The work is motivated by vulnerability research and the need to evaluate whether driver bugs that appear hardware‑gated are actually reachable—and therefore exploitable—in a BYOVD (Bring Your Own Vulnerable Driver) scenario, where an attacker has administrative privileges on the target system and loads a vulnerable driver to disable security mechanisms.\u003c/p\u003e\n\n\u003ch2 id=\"2-the-offensive-value-of-kernel-drivers\"\u003e2. The Offensive Value of Kernel Drivers\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eKernel driver vulnerabilities can offer local privilege escalation or, in BYOVD attacks, the ability to tamper with EDR and other security products.\u003c/li\u003e\n\u003cli\u003eTwo criteria for a strong BYOVD candidate: the vulnerability must allow meaningful disruption (arbitrary memory read/write, code execution, etc.), and its exploitability must not depend on rare system conditions such as the presence of specific hardware.\u003c/li\u003e\n\u003cli\u003eExisting BYOVD research has not focused on how hardware gating affects reachability, leaving a gap that this article addresses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"3-device-object-creation-and-the-central-role-of-adddevice\"\u003e3. Device Object Creation and the Central Role of AddDevice\u003c/h2\u003e\n\n\u003ch3 id=\"3-1-driver-load-without-hardware\"\u003e3.1 Driver Load Without Hardware\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSome non-PnP drivers create device objects unconditionally in DriverEntry (e.g., the \u003ccode\u003eMultidev_WDM\u003c/code\u003e demo driver). These can be deployed with a simple \u003ccode\u003esc.exe create\u003c/code\u003e and \u003ccode\u003esc start\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eMost device drivers, however, only fully initialize when the Plug and Play (PnP) manager invokes their AddDevice callback upon detecting a matching device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"3-2-the-adddevice-callback\"\u003e3.2 The AddDevice Callback\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAll PnP-compatible drivers must supply an AddDevice routine. It is responsible for creating functional device objects (FDOs) and filter device objects, and for initializing device extensions that hold driver-specific state.\u003c/li\u003e\n\u003cli\u003eAddDevice is not called from DriverEntry; it is invoked by the PnP manager when a new device node is discovered and the driver is selected to control it or filter its stack.\u003c/li\u003e\n\u003cli\u003eThe function also attaches the new FDO to the device stack (with IoAttachDeviceToDeviceStack), making the stack ready for IRP dispatch. If AddDevice is never called, the driver’s dispatch routines will never receive IRPs through a PnP device stack, and many vulnerable code paths—guarded by checks on device extension fields—remain unreachable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"3-3-pnp-minor-irp-handling\"\u003e3.3 PnP Minor IRP Handling\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAfter AddDevice, further initialization occurs in IRP_MJ_PNP dispatch routines (for WDM) or PnP/power event callbacks (for WDF KMDF). These handle start, stop, and device validation steps.\u003c/li\u003e\n\u003cli\u003eThe article notes that drivers may perform configuration file checks, hardware probing, and device interface registration in these callbacks, adding more layers of hardware dependency.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"4-user-mode-techniques-to-trigger-driver-initialization-without-hardware\"\u003e4. User-Mode Techniques to Trigger Driver Initialization Without Hardware\u003c/h2\u003e\n\n\u003ch3 id=\"4-1-minimal-deployment-sc-exe\"\u003e4.1 Minimal Deployment – sc.exe\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA simple \u003ccode\u003esc create\u003c/code\u003e and \u003ccode\u003esc start\u003c/code\u003e loads the driver and runs DriverEntry, but does not cause AddDevice to execute. Only drivers that create named control device objects (CDOs) directly in DriverEntry become accessible this way.\u003c/li\u003e\n\u003cli\u003eA PowerShell script is provided to detect new named device objects after such a deployment. In testing, this approach yielded far fewer user‑accessible devices than techniques that involve PnP.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"4-2-software-emulated-devices-with-spoofed-hardware-ids\"\u003e4.2 Software-Emulated Devices with Spoofed Hardware IDs\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe core innovation: use root‑enumerated software device nodes with arbitrary hardware IDs to trick the PnP manager into calling the target driver’s AddDevice.\u003c/li\u003e\n\u003cli\u003eTwo Windows mechanisms exist:\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eSetupAPI (used by devcon.exe)\u003c/strong\u003e – Steps: create device info list, create device info with a chosen hardware ID, register the device with PnP via SetupDiCallClassInstaller, then force driver installation using UpdateDriverForPlugAndPlayDevicesW with the original INF file.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSoftware Device API\u003c/strong\u003e – Simpler: a single call to SwDeviceCreate with the hardware ID; lifetime management keeps the device persistent.\u003c/li\u003e\n\u003c/ol\u003e\u003c/li\u003e\n\u003cli\u003eIn both cases, the PnP manager creates a physical device object (PDO) owned by PnpManager or SoftwareDevice, and when a matching driver is installed, the driver’s AddDevice runs, attaching an FDO.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch4 id=\"4-2-1-pdo-accessibility-issue\"\u003e4.2.1 PDO Accessibility Issue\u003c/h4\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe bare PDO created by PnpManager or SoftwareDevice has its dispatch table set to \u003ccode\u003eIopInvalidDeviceRequest\u003c/code\u003e for IRP_MJ_CREATE. Therefore, opening a handle to a stack that only contains such a PDO fails with STATUS_INVALID_DEVICE_REQUEST.\u003c/li\u003e\n\u003cli\u003eA complete, successful deployment requires that at least one driver in the stack—typically the target FDO or an upper filter—accepts IRP_MJ_CREATE. The article shows that many drivers’ INF files define a device setup class, and for classes like Media, a class upper filter (e.g., ksthunk) is automatically added, which may or may not accept CREATE.\u003c/li\u003e\n\u003cli\u003eThe provided deployment script (deploy_detect.ps1) checks whether the security descriptor of a newly created named device can be read, which confirms that a handle can be opened.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch4 id=\"4-2-2-initial-test-results\"\u003e4.2.2 Initial Test Results\u003c/h4\u003e\n\n\u003cul\u003e\n\u003cli\u003eTesting with devcon‑based deployment produced approximately twice as many new device objects as the sc‑only method, including both CDOs and FDOs attached to software‑emulated PDOs.\u003c/li\u003e\n\u003cli\u003eThe author was able to identify and confirm multiple driver vulnerabilities using this technique, including strong BYOVD candidates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"4-3-filter-restacking\"\u003e4.3 Filter Restacking\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ePure filter drivers pass through IRPs but neither deny nor accept IRP_MJ_CREATE; they forward it down. On a stack where the PDO rejects CREATE, no handle can be opened.\u003c/li\u003e\n\u003cli\u003eThe article presents a class‑agnostic deployment method: add the filter’s service name to the ‘UpperFilters’ registry value of a device class like Disk Drive (GUID {4d36e967‑e325‑11ce‑bfc1‑08002be10318}), then mount a virtual disk. The new disk creates a full device stack (disk.sys, partmgr, etc.) that includes an FDO capable of accepting CREATE, with the filter now sitting on top.\u003c/li\u003e\n\u003cli\u003eThis was demonstrated with a gaming mouse filter driver (GMLXDFltr) successfully loaded on a disk stack, receiving IRP_MJ_CREATE when the handle to PhysicalDrive was opened.\u003c/li\u003e\n\u003cli\u003eThe technique works regardless of the original hardware class of the filter driver, because the UpperFilters setting is global per class.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"4-4-forced-driver-replacement-without-inf-files\"\u003e4.4 Forced Driver Replacement Without INF Files\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article shows that INF file digital signatures are not a kernel‑mode security boundary. An attacker can bypass the entire INF mechanism by:\n\n\u003col\u003e\n\u003cli\u003eDeploying the driver with sc.exe.\u003c/li\u003e\n\u003cli\u003eCreating a software device node (or selecting an existing one).\u003c/li\u003e\n\u003cli\u003eDirectly writing the required registry keys to bind the driver’s service name to the device node under HKLM\\SYSTEM\\CurrentControlSet\\Enum and the class key under HKLM\\SYSTEM\\CurrentControlSet\\Control\\Class.\u003c/li\u003e\n\u003cli\u003eRestarting the device (disable/enable) to trigger AddDevice.\u003c/li\u003e\n\u003c/ol\u003e\u003c/li\u003e\n\u003cli\u003eThis was demonstrated with AwinicSmartKAmps.sys, which was successfully bound to a spoofed hardware ID and produced a functional device stack, even though the driver was shown as “not digitally signed” in Device Manager—a warning that refers only to the absent INF/CAT file, not to the kernel driver binary itself.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"5-active-hardware-probing-and-its-limitations\"\u003e5. Active Hardware Probing and Its Limitations\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes three categories of hardware interaction:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNeutral use\u003c/strong\u003e: fixed-address MMIO like Local APIC, present on all systems, no gating.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVulnerable use\u003c/strong\u003e: user‑controllable physical addresses, unconditionally reachable, no gate.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHardware gating\u003c/strong\u003e: code that reads a chip ID register via MMIO from a PCI BAR and only proceeds if a specific value is returned.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor hardware‑gated code that performs active probing (PCI config, remote ACPI methods, I2C/SPI GPIO, etc.), the article acknowledges that bypassing these checks purely from user mode is generally not possible without additional kernel components. However, it notes that the majority of driver code does not perform such probing, and that the techniques described still expose a large amount of otherwise unreachable code.\u003c/p\u003e\n\n\u003ch2 id=\"6-implications-for-byovd-and-defense\"\u003e6. Implications for BYOVD and Defense\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe work demonstrates that hardware gating is often an illusory barrier: many vulnerabilities previously dismissed as “requires hardware” can be exploited by an admin with only user‑mode capabilities.\u003c/li\u003e\n\u003cli\u003eAs Microsoft continues to reduce the pool of easily exploitable cross‑signed drivers, attackers may shift focus to these hardware‑gated drivers, making it critical for defenders to understand the forensic footprint of the demonstrated techniques.\u003c/li\u003e\n\u003cli\u003eForensic indicators include the presence of software‑emulated device nodes (especially with unusual hardware IDs or driver bindings), unexpected UpperFilters and LowerFilters values in device class registry keys, and Device Manager entries showing drivers installed without a digital signature (no INF/CAT link).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"7-conclusion\"\u003e7. Conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article provides a practical methodology for security researchers and defenders to assess whether a kernel driver vulnerability that appears hardware‑dependent is actually reachable. By manipulating the PnP subsystem with software‑emulated devices and filter class restacking, an attacker can trigger driver initialization and access vulnerable code paths without the original hardware. These findings expand the BYOVD threat landscape and underscore the need to monitor for anomalous device configurations that may indicate attacker preparation.\u003c/p\u003e\n","keyPoints":["Many Windows kernel driver vulnerabilities are gated by hardware presence because the driver only creates its device objects and initializes internal state when AddDevice is called by the PnP manager upon detecting the hardware.","Using software-emulated device nodes with spoofed hardware IDs created through SetupAPI or Software Device API can trigger a driver's AddDevice routine, making device objects accessible without physical hardware.","Filter drivers that do not handle IRP_MJ_CREATE can be exposed by adding their service name to the UpperFilters registry key of a class like Disk Drive and then mounting a virtual disk to build an exploitable device stack.","INF file signature requirements are not a security boundary; attackers can force a driver onto a device by directly creating registry structures under Enum and Class keys after deploying the driver with sc.exe."],"insights":["A bare software-emulated device node created via SetupAPI or Software Device API is not user-accessible because PnpManager's dispatch table returns STATUS_INVALID_DEVICE_REQUEST for IRP_MJ_CREATE; at least one driver in the stack must handle CREATE for a handle to be opened.","Filter drivers can be run on entirely unrelated hardware classes—such as a gaming mouse filter placed on a disk stack—by adding their service name to the UpperFilters entry of a device class like Disk Drive and then mounting a virtual disk, dramatically expanding the reachable attack surface.","The INF file digital signature requirement is not a security boundary; an attacker can completely bypass it by directly writing the necessary registry structures under HKLM\\SYSTEM\\CurrentControlSet\\Enum and Class keys to bind a driver to a device, needing only a standard sc.exe service creation.","Creating custom device stacks without the original upper filter drivers that normally block user-mode IRP_MJ_CREATE can expose vulnerabilities in drivers that were never intended for user interaction, turning otherwise unreachable bugs into viable BYOVD targets."],"referencedReports":[{"title":"Qilin Ransomware and the Hidden Dangers of BYOVD","url":"https://blackpointcyber.com/blog/qilin-ransomware-and-the-hidden-dangers-of-byovd/","publisher":"Blackpoint Cyber","context":"Cited as an example of public reports and research papers on BYOVD attacks that do not examine hardware-gating."},{"title":"It’ll be back: Attackers still abusing Terminator tool and variants","url":"https://www.sophos.com/en-us/blog/itll-be-back-attackers-still-abusing-terminator-tool-and-variants","publisher":"Sophos","context":"Cited as another example of public reports on BYOVD attacks that do not specifically address hardware-gating."}],"body":"\u003cp\u003eMany Windows kernel driver vulnerabilities remain unreachable without the original hardware, because the driver creates device objects and initializes internal state only when the Plug and Play manager invokes its AddDevice callback upon detecting that hardware. The article demonstrates how attackers can bypass this hardware gating from user mode alone—using software-emulated device nodes with spoofed hardware IDs, class-level filter restacking, or forced driver replacement—to make vulnerable code paths accessible for BYOVD attacks. These techniques can activate device stacks that accept IRP_MJ_CREATE even for filter drivers originally designed for entirely different hardware classes, and they circumvent INF file signature requirements through direct registry manipulation.\u003c/p\u003e\n\n\u003cp\u003eThis work reveals that hardware dependency is not a reliable security barrier: a significant portion of drivers previously considered unexploitable without physical hardware can be reached and potentially exploited by an administrator without kernel privileges. As the supply of easily exploitable signed drivers shrinks due to Microsoft removing cross‑signed trust and AI‑accelerated vulnerability research, threat actors may increasingly weaponize these hardware‑gated vulnerabilities, making it critical for defenders to recognize the forensic footprint of software‑emulated devices, unexpected driver bindings, and modified device class filter entries.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">

        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {

      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",

          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>

      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>

}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);

      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>

          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />

        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>

            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>

}

      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>

          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
