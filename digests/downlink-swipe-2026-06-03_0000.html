03e\n\n\u003cp\u003eThe memory-retention part of the attack involves advertising a zero-byte flow-control window so the server does not fully complete the requests. Instead of sending a response, the server periodically sends tiny WINDOW_UPDATE frames to avoid timeouts. In this scenario, requests are never fully completed and allocated memory continues growing without being freed.\u003c/p\u003e\n\n\u003cp\u003eThe researchers said this technique bypasses existing defenses such as limits on total decoded header size because the header values used are tiny. In their tests, Envoy 1.37.2 exhausted 32 GB of RAM in about 10 seconds, Apache httpd 2.4.67 exhausted 32 GB in about 18 seconds, nginx 1.29.7 exhausted 32 GB in about 45 seconds, and IIS on Windows Server 2025 exhausted 64 GB in about 45 seconds. Proof-of-concept exploits have already been published, while full technical details are expected at the Real World AI Security conference.\u003c/p\u003e\n\n\u003cp\u003eThe article says nginx fixed the problem in version 1.29.8 by adding a max_headers directive, and Apache httpd addressed it in mod_http2 2.0.41 under CVE-2026-49975. At the time of writing, no patch was available for IIS, Envoy, or Pingora. For unpatched platforms, the recommended measures are disabling HTTP/2 where feasible and using a proxy or firewall to enforce hard header-count limits.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA new denial-of-service technique named HTTP/2 Bomb can be launched from a single machine to take down vulnerable web servers within seconds. The article reports that the technique works on default HTTP/2 configurations of major web servers, including NGINX, Apache HTTP Server, Microsoft IIS, Envoy, and Cloudflare Pingora.\u003c/p\u003e\n\n\u003cp\u003eHTTP/2 Bomb was discovered by OpenAI\u0026rsquo;s Codex software agent under the guidance of researchers at offensive security firm Calif. The researchers described it as a combination of two previously known HTTP/2 denial-of-service methods that becomes significantly impactful when used together.\u003c/p\u003e\n\n\u003ch2 id=\"core-technique\"\u003eCore Technique\u003c/h2\u003e\n\n\u003cp\u003eHTTP/2 Bomb combines:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHPACK compression amplification.\u003c/li\u003e\n\u003cli\u003eSlowloris-style resource retention through HTTP/2 flow-control stalling.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe HPACK component abuses the HTTP/2 protocol\u0026rsquo;s header compression mechanism. The attacker inserts a header into the HPACK dynamic table and then references it repeatedly through a compact indexed representation that can be as small as one byte.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this can cause one byte sent by the attacker to trigger thousands of bytes of server-side memory allocation. Envoy and Apache httpd showed the worst amplification ratios in the researchers\u0026rsquo; tests, at 5,700:1 and 4,000:1 respectively.\u003c/p\u003e\n\n\u003ch2 id=\"memory-retention-mechanism\"\u003eMemory Retention Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe second part of the attack prevents allocated memory from being freed after requests are initiated. The article says this can be achieved by advertising a zero-byte flow-control window.\u003c/p\u003e\n\n\u003cp\u003eIn that state, the server does not send a full response. Instead, it periodically sends small WINDOW_UPDATE frames to avoid timeouts. Because the requests never fully complete, the server continues holding allocated memory and the memory usage grows without being released.\u003c/p\u003e\n\n\u003cp\u003eCalif researchers said this behavior allows a single client on a 100 Mbps connection to exhaust tens of gigabytes of RAM within seconds. They stated that a home computer on such a connection can render a vulnerable server inaccessible within seconds, and that a single client can consume and hold 32 GB of server memory in roughly 20 seconds against Apache httpd and Envoy.\u003c/p\u003e\n\n\u003ch2 id=\"reported-test-results\"\u003eReported Test Results\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following results from Calif\u0026rsquo;s testing against major web servers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnvoy 1.37.2 exhausted 32 GB of RAM in about 10 seconds.\u003c/li\u003e\n\u003cli\u003eApache httpd 2.4.67 exhausted 32 GB of RAM in about 18 seconds.\u003c/li\u003e\n\u003cli\u003enginx 1.29.7 exhausted 32 GB of RAM in about 45 seconds.\u003c/li\u003e\n\u003cli\u003eIIS on Windows Server 2025 exhausted 64 GB of RAM in about 45 seconds.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese results show that the attack can cause severe memory exhaustion from a single client, rather than requiring a large distributed botnet.\u003c/p\u003e\n\n\u003ch2 id=\"why-existing-defenses-may-not-be-enough\"\u003eWhy Existing Defenses May Not Be Enough\u003c/h2\u003e\n\n\u003cp\u003eCalif researchers said HTTP/2 Bomb can bypass existing defenses such as limits on total decoded header size. The article explains that this is because the header values used in the attack are tiny.\u003c/p\u003e\n\n\u003cp\u003eThe amplification does not come from large decoded header values. Instead, it comes from internal per-header bookkeeping and memory allocations on the server side.\u003c/p\u003e\n\n\u003cp\u003eThe researchers also noted that neither component of the attack was particularly novel on its own. The significant impact comes from combining HPACK compression amplification with HTTP/2 flow-control stalling to both allocate memory and hold it indefinitely.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-proof-of-concept-code\"\u003eDisclosure and Proof-of-Concept Code\u003c/h2\u003e\n\n\u003cp\u003eThe article says full technical details for HTTP/2 Bomb will be disclosed at the Real World AI Security conference later this month in a presentation from researcher Quang Luong.\u003c/p\u003e\n\n\u003cp\u003eHowever, proof-of-concept exploits have already been published for the technique. The article includes an attack demonstration attributed to Calif.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-fixes\"\u003eAffected Products and Fixes\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several major web servers as affected under default HTTP/2 configurations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX.\u003c/li\u003e\n\u003cli\u003eApache HTTP Server.\u003c/li\u003e\n\u003cli\u003eMicrosoft IIS.\u003c/li\u003e\n\u003cli\u003eEnvoy.\u003c/li\u003e\n\u003cli\u003eCloudflare Pingora.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says not all web servers remain vulnerable because patches have already been released for some platforms. It also notes that certain custom server configurations may provide indirect protection.\u003c/p\u003e\n\n\u003cp\u003eKnown fixes described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003enginx version 1.29.8, which added a \u003ccode\u003emax_headers\u003c/code\u003e directive.\u003c/li\u003e\n\u003cli\u003eApache httpd mod_http2 2.0.41, where the issue was assigned CVE-2026-49975.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the time of writing, the article says no patch was available for IIS, Envoy, or Pingora.\u003c/p\u003e\n\n\u003ch2 id=\"mitigations-and-deployment-factors\"\u003eMitigations and Deployment Factors\u003c/h2\u003e\n\n\u003cp\u003eThe article says systems running behind CDNs or reverse proxies may be more difficult to target because they do not expose the vulnerable HTTP/2 endpoint directly. It also notes that some deployments may already have protection through custom header-count limits, WAFs, reverse proxies, or by having HTTP/2 disabled.\u003c/p\u003e\n\n\u003cp\u003eFor IIS, Envoy, and Pingora, where no patch was available at the time of writing, the article recommends disabling HTTP/2 where feasible. It also recommends placing a proxy or firewall in front of affected servers to enforce hard header-count limits.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eHTTP/2 Bomb is notable because it allows a single client to rapidly exhaust large amounts of server memory by combining HTTP/2 header compression amplification with flow-control stalling. The article emphasizes that while the individual techniques were known, their combination creates a severe denial-of-service impact against several widely used web servers, with patches available for nginx and Apache httpd but not for IIS, Envoy, or Pingora at the time of writing.\u003c/p\u003e\n","keyPoints":["A new denial-of-service technique called HTTP/2 Bomb can be launched from a single machine to take down vulnerable web servers within seconds.","HTTP/2 Bomb combines HPACK compression amplification with Slowloris-style resource retention via HTTP/2 flow-control stalling.","Researchers reported that a single client can consume and hold 32 GB of server memory in about 10 seconds on Envoy 1.37.2 and about 18 seconds on Apache httpd 2.4.67.","The issue was fixed in nginx 1.29.8 with a new max_headers directive and in Apache httpd mod_http2 2.0.41 under CVE-2026-49975.","At the time of writing, no patch was available for IIS, Envoy, or Cloudflare Pingora, and researchers recommended disabling HTTP/2 where feasible or placing a proxy or firewall in front to enforce hard header-count limits."],"insights":["Existing defenses based on total decoded header size may not stop HTTP/2 Bomb because the attack uses tiny header values and gains amplification from internal per-header bookkeeping and memory allocations.","The attack’s impact comes from combining two previously known HTTP/2 DoS methods, showing that individually understood protocol behaviors can become significantly more dangerous when chained.","Deployments behind CDNs or reverse proxies may be harder to target because they do not expose the vulnerable HTTP/2 endpoint directly.","Header-count limits are a particularly actionable mitigation, as nginx addressed the issue by adding a max_headers directive and researchers recommended proxy or firewall enforcement of hard header-count limits for unpatched servers."],"referencedReports":[{"title":"Codex discovered a hidden HTTP/2 bomb","url":"https://blog.calif.io/p/codex-discovered-a-hidden-http2-bomb","publisher":"Calif","context":"The article cites Calif researchers' write-up as the source for details and performance claims about the HTTP/2 Bomb denial-of-service technique.","category":"","primary":false}],"body":"\u003cp\u003eA new denial-of-service technique called HTTP/2 Bomb can be launched from a single machine to take down web servers within seconds. The article says it works against default HTTP/2 configurations of major web servers including NGINX, Apache HTTP Server, Microsoft IIS, Envoy, and Cloudflare Pingora. Researchers at Calif said a single client on a 100 Mbps connection can exhaust tens of gigabytes of RAM within seconds.\u003c/p\u003e\n\n\u003cp\u003eHTTP/2 Bomb combines two previously known HTTP/2 DoS methods: HPACK compression amplification and Slowloris-style resource retention through HTTP/2 flow-control stalling. The attack uses HTTP/2 header compression behavior to create large server-side memory allocation from very small client input, then prevents the memory from being released by using a zero-byte flow-control window. Calif reported that Envoy 1.37.2 exhausted 32 GB of RAM in about 10 seconds, Apache httpd 2.4.67 in about 18 seconds, nginx 1.29.7 in about 45 seconds, and IIS on Windows Server 2025 exhausted 64 GB in about 45 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe article says fixes are available for nginx 1.29.8 and Apache httpd mod_http2 2.0.41, where the issue was assigned CVE-2026-49975. At the time of writing, no patch was available for IIS, Envoy, or Pingora. Recommended mitigations for those platforms include disabling HTTP/2 where feasible and placing a proxy or firewall in front that enforces hard header-count limits.\u003c/p\u003e\n"},{"n":10,"title":"VS Code zero-day lets hackers steal GitHub tokens in one click","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/vs-code-zero-day-lets-hackers-steal-github-tokens-in-one-click/","time":"06:50","priority":"SHOULD READ","score":88,"tldr":"A publicly disclosed VS Code zero-day can let attackers steal GitHub OAuth tokens from github.dev users with a single malicious link click, potentially exposing all private repositories the victim can access. No patch or CVE is available yet, but clearing github.dev cookies and site data can force a sign-in warning that helps prevent exploitation.","briefOverview":"\u003cp\u003eA security researcher released exploit code for a Visual Studio Code zero-day vulnerability that can let attackers steal GitHub authentication tokens by tricking users into clicking a link. Microsoft classifies a flaw as a zero-day when it is publicly disclosed and/or actively exploited with no official patch available. The issue has not yet been patched and has not been assigned a CVE ID.\u003c/p\u003e\n\n\u003cp\u003eResearcher Ammar Askar said the flaw affects github.dev, the browser-based version of Visual Studio Code used to work on GitHub repositories. The proof-of-concept abuses VS Code\u0026rsquo;s sandboxed webview message-passing system by running malicious JavaScript inside a webview, simulating keypresses in the main editor, and installing an extension that extracts the GitHub OAuth token sent to github.dev. Askar said the token is not scoped to a single repository and can access every repository the victim can access.\u003c/p\u003e\n\n\u003cp\u003eThe article says users can protect themselves by clearing cookies and local site data for github.dev in their browser. This forces a warning stating that the GitHub Repositories extension wants to sign in using GitHub when a user clicks a link attempting to exploit the flaw. BleepingComputer said it contacted Microsoft for comment, but a response was not immediately available.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA security researcher has released exploit code for a Visual Studio Code zero-day vulnerability that can allow attackers to steal GitHub authentication tokens with a single link click. The article says Microsoft considers a software flaw a zero-day if it is publicly disclosed and/or actively exploited without an official patch currently available. The VS Code issue remains unpatched and has not yet received a CVE ID.\u003c/p\u003e\n\n\u003cp\u003eAmmar Askar explained that the vulnerability can be used to install malicious extensions that steal GitHub OAuth tokens when they are passed to github.dev. GitHub.dev is described as a browser-based version of Visual Studio Code used to work on GitHub repositories. The attack abuses VS Code\u0026rsquo;s sandboxed webview message-passing system.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept released by Askar runs malicious JavaScript inside a webview to simulate keypresses in the main editor. It then installs an extension that extracts the GitHub OAuth token sent to github.dev and uses the GitHub API to enumerate all private repositories the victim can access. Askar said the token is not scoped to the specific repository the user interacted with and instead has full access to every repository the user can access.\u003c/p\u003e\n\n\u003cp\u003eThe article says users can mitigate the risk by clearing cookies and local site data for github.dev through the browser\u0026rsquo;s site settings. Doing so should ensure users receive a warning that the GitHub Repositories extension wants to sign in using GitHub when they click links attempting to exploit the flaw. The article includes an example of the github.dev initial sign-in dialog attributed to Askar.\u003c/p\u003e\n\n\u003cp\u003eAskar said they notified GitHub one hour before publicly disclosing the bug and releasing details. They said the immediate public disclosure was due to a prior negative experience with Microsoft\u0026rsquo;s security response process involving a VS Code bug that was silently fixed without credit or acknowledgment of security impact. BleepingComputer reached out to Microsoft for comment on the VS Code zero-day, but a response was not immediately available.\u003c/p\u003e\n\n\u003cp\u003eThe article also compares the disclosure to a recent stream of Microsoft zero-days disclosed by an anonymous researcher using the handle Nightmare Eclipse. Those disclosed issues included BlueHammer, RedSun, GreenPlasma, MiniPlasma, YellowKey, and UnDefend, with the first two reported as being exploited in attacks. Microsoft previously responded to those leaks with threats of legal action and a statement about working with law enforcement when individuals break the law and cause real harm to customers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA security researcher released exploit code for a Visual Studio Code zero-day vulnerability that can allow attackers to steal GitHub authentication tokens by tricking users into clicking a link. The article states that Microsoft classifies a flaw as a zero-day if it is publicly disclosed and/or actively exploited while no official patch is available.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is not yet patched and has not been assigned a CVE ID. BleepingComputer said it contacted Microsoft for comment on the disclosed VS Code flaw, but a response was not immediately available.\u003c/p\u003e\n\n\u003ch2 id=\"affected-technology\"\u003eAffected technology\u003c/h2\u003e\n\n\u003cp\u003eThe article centers on Visual Studio Code and github.dev. GitHub.dev is described as a browser-based version of Visual Studio Code used to work on GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eAccording to researcher Ammar Askar, the issue involves the way GitHub OAuth tokens are passed to github.dev. Askar said GitHub.com POSTs an OAuth token to github.dev so it can interact with GitHub on the user\u0026rsquo;s behalf.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism-described-in-the-article\"\u003eTechnical mechanism described in the article\u003c/h2\u003e\n\n\u003cp\u003eAskar said the vulnerability allows attackers to install malicious extensions that steal GitHub OAuth tokens when they are passed to github.dev. The attack exploits VS Code\u0026rsquo;s sandboxed webview message-passing system.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept exploit released by Askar abuses this system by:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRunning malicious JavaScript inside a webview.\u003c/li\u003e\n\u003cli\u003eSimulating keypresses in the main editor.\u003c/li\u003e\n\u003cli\u003eInstalling an extension.\u003c/li\u003e\n\u003cli\u003eExtracting the GitHub OAuth token sent to github.dev.\u003c/li\u003e\n\u003cli\u003eQuerying the GitHub API to enumerate all private repositories the victim can access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAskar stated that the OAuth token is not scoped to the particular repository the user interacted with. Instead, he said it has full access to every repository the user can access.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described\"\u003eImpact described\u003c/h2\u003e\n\n\u003cp\u003eThe main impact is theft of GitHub OAuth tokens from github.dev users who are tricked into clicking a malicious link. The proof-of-concept described in the article uses the stolen token to query the GitHub API and enumerate private repositories available to the victim.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the token\u0026rsquo;s broad access increases the risk. Askar said the token is not limited to the repository involved in the user\u0026rsquo;s interaction and can access every repository available to that user.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-noted-in-the-article\"\u003eMitigation noted in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says VS Code users can protect themselves by clearing cookies and local site data for github.dev in their browser. It instructs users to click the Settings icon in the URL bar and then go to Cookies and site data \u0026gt; Manage on-device site data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, clearing this data ensures that users receive a warning when clicking on links attempting to exploit the flaw. The warning states: \u0026ldquo;The extension \u0026lsquo;GitHub Repositories\u0026rsquo; wants to sign in using GitHub.\u0026rdquo;\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-details\"\u003eDisclosure details\u003c/h2\u003e\n\n\u003cp\u003eAskar said they notified GitHub one hour before disclosing the bug. The article says Askar chose immediate public disclosure due to a prior negative experience with Microsoft\u0026rsquo;s security response process.\u003c/p\u003e\n\n\u003cp\u003eAskar said that in a previous VS Code bug report, Microsoft silently fixed the issue without credit or acknowledgment of its security impact. He also said that going forward, he would do full public disclosure for any security bugs he found in VS Code.\u003c/p\u003e\n\n\u003ch2 id=\"related-disclosure-context-in-the-article\"\u003eRelated disclosure context in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article compares Askar\u0026rsquo;s disclosure to another stream of Microsoft zero-days disclosed by an anonymous security researcher using the handle Nightmare Eclipse. That researcher also expressed discontent with how the Microsoft Security Response Center handles the disclosure process.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several flaws disclosed by Nightmare Eclipse over the past several months:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlueHammer.\u003c/li\u003e\n\u003cli\u003eRedSun.\u003c/li\u003e\n\u003cli\u003eGreenPlasma.\u003c/li\u003e\n\u003cli\u003eMiniPlasma.\u003c/li\u003e\n\u003cli\u003eYellowKey.\u003c/li\u003e\n\u003cli\u003eUnDefend.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says BlueHammer and RedSun are now being exploited in attacks. It also describes YellowKey as a Windows BitLocker zero-day that grants access to protected drives and UnDefend as a zero-day that can be exploited to block Microsoft Defender definition updates.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response-context\"\u003eMicrosoft response context\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft initially reacted to Nightmare Eclipse\u0026rsquo;s zero-day leaks with threats of legal action. It also cites a Microsoft Security Response tweet stating the company would work \u0026ldquo;with law enforcement as appropriate\u0026rdquo; when \u0026ldquo;an individual breaks the law and engages in malicious activity causing real harm to our customers.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eFor the VS Code zero-day disclosed by Askar, BleepingComputer said Microsoft had not immediately responded to a request for comment.\u003c/p\u003e\n","keyPoints":["Security researcher Ammar Askar released exploit code for a Visual Studio Code zero-day that can steal GitHub authentication tokens by tricking users into clicking a link.","The proof-of-concept abuses VS Code's sandboxed webview message-passing system to run malicious JavaScript, simulate keypresses, install an extension, and extract the GitHub OAuth token sent to github.dev.","Askar said the GitHub OAuth token sent to github.dev is not scoped to a specific repository and can provide access to every repository the victim can access.","The vulnerability is not yet patched and has not been assigned a CVE ID, according to the article.","VS Code users can mitigate the issue by clearing cookies and local site data for github.dev so they receive a GitHub Repositories sign-in warning when clicking potentially malicious links."],"insights":["The attack is especially impactful because the GitHub OAuth token passed to github.dev is not limited to the repository the user opened, allowing enumeration of all private repositories the victim can access.","The recommended mitigation is browser-side rather than a VS Code patch: clearing github.dev cookies and local site data forces a fresh GitHub Repositories sign-in prompt before the token is passed.","The researcher disclosed the bug publicly after notifying GitHub only one hour earlier, citing prior dissatisfaction with Microsoft’s handling of VS Code security reports.","The article places this disclosure in a broader pattern of Microsoft zero-day leaks by researchers frustrated with MSRC’s disclosure process, including several flaws later reported as exploited in attacks."],"referencedReports":[{"title":"GitHub token stealing","url":"http://blog.ammaraskar.com/github-token-stealing/","publisher":"Ammar Askar","context":"The article cites Ammar Askar's blog post explaining the VS Code vulnerability that can be abused to steal GitHub OAuth tokens via github.dev.","category":"","primary":false}],"body":"\u003cp\u003eA security researcher released exploit code for a Visual Studio Code zero-day vulnerability that can let attackers steal GitHub authentication tokens by tricking users into clicking a link. Microsoft classifies a flaw as a zero-day when it is publicly disclosed and/or actively exploited with no official patch available. The issue has not yet been patched and has not been assigned a CVE ID.\u003c/p\u003e\n\n\u003cp\u003eResearcher Ammar Askar said the flaw affects github.dev, the browser-based version of Visual Studio Code used to work on GitHub repositories. The proof-of-concept abuses VS Code\u0026rsquo;s sandboxed webview message-passing system by running malicious JavaScript inside a webview, simulating keypresses in the main editor, and installing an extension that extracts the GitHub OAuth token sent to github.dev. Askar said the token is not scoped to a single repository and can access every repository the victim can access.\u003c/p\u003e\n\n\u003cp\u003eThe article says users can protect themselves by clearing cookies and local site data for github.dev in their browser. This forces a warning stating that the GitHub Repositories extension wants to sign in using GitHub when a user clicks a link attempting to exploit the flaw. BleepingComputer said it contacted Microsoft for comment, but a response was not immediately available.\u003c/p\u003e\n"},{"n":16,"title":"Microsoft 365 Android Apps Let Any App Steal Account Tokens via Leftover Debug Flag","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-365-android-apps-let-any-app.html","time":"14:56","priority":"SHOULD READ","score":88,"tldr":"Several Microsoft 365 Android apps shipped with a leftover debug flag that let any app on the same device steal signed-in users’ account tokens and access email, files, calendars, and messages. Microsoft has patched the flaw, but affected users should update immediately and consider revoking refresh tokens if untrusted apps were present.","briefOverview":"\u003cp\u003eSeveral Microsoft 365 Android apps shipped with a development flag left enabled in production builds, disabling a check that was meant to restrict account-token sharing to trusted Microsoft apps. The flaw meant any other app on the same phone could request and receive the signed-in user’s token without a password, login screen, or permission prompt. Microsoft has patched the issue and users are advised to update the affected apps from Google Play.\u003c/p\u003e\n\n\u003cp\u003eEnclave named the bug FlagLeft and reported that it affected Word, PowerPoint, Excel, Microsoft 365 Copilot, Microsoft Loop, and OneNote. Teams was not affected because it shipped with the same flag set to false. The problematic line was identified as \u003ccode\u003esetIsDebugMode(true)\u003c/code\u003e in a shared Microsoft SDK, which caused the issue to appear across multiple apps.\u003c/p\u003e\n\n\u003cp\u003eThe exposed tokens were FOCI refresh tokens used for single sign-on across Microsoft apps, and the article says they can be refreshed and reused over long stretches while appearing routine in logs. Enclave built a proof of concept that used an unverified third-party app to pull tokens and read email. The article recommends not only updating affected apps, but also revoking refresh tokens and forcing fresh sign-ins for accounts on devices that ran older builds alongside untrusted apps.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA development flag left enabled in production builds of several Microsoft 365 Android apps disabled a control that normally limits account-token sharing to trusted Microsoft apps. As a result, any app on the same phone could ask for a signed-in user’s token and receive it. The article says this could allow access to email, files, calendars, and messages without a password, login screen, or permission prompt.\u003c/p\u003e\n\n\u003cp\u003eThe bug was named FlagLeft by Enclave and affected Word, PowerPoint, Excel, Microsoft 365 Copilot, Microsoft Loop, and OneNote. These apps share account access by design so that signing into one Microsoft 365 app can avoid repeated sign-ins in others. That handoff is supposed to verify the requesting app and reject untrusted apps.\u003c/p\u003e\n\n\u003cp\u003eEnclave researchers Yanir Tsarimi and Ofek Levin found that the verification check was being skipped because \u003ccode\u003esetIsDebugMode(true)\u003c/code\u003e was left in shipping code. The flaw was located in a shared Microsoft SDK, which caused the same issue to appear in multiple applications. Teams shipped with the same flag set to false and was not affected.\u003c/p\u003e\n\n\u003cp\u003eThe tokens handed over were FOCI tokens, described in the article as family refresh tokens used by Microsoft for single sign-on across its apps. The article says these tokens can be refreshed and reused for long periods, and that resulting activity looks routine in logs. From the user’s perspective, nothing visible happens when the token is obtained.\u003c/p\u003e\n\n\u003cp\u003eEnclave built a working proof of concept that pulled tokens through an unverified third-party app and used them to read email. Microsoft classified the issues as local spoofing flaws under improper access control, meaning a malicious app already on the device was sufficient. The article states there is no public evidence that the flaw was exploited before the fix, and Microsoft’s May Patch Tuesday release did not list it as publicly known or exploited.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft issued four CVEs on May 12 for Copilot, Word, PowerPoint, and Excel: CVE-2026-41100, CVE-2026-41101, CVE-2026-41102, and CVE-2026-42832. Enclave also reported the same flaw in Loop and OneNote, but the article says those apps did not receive separate CVEs in the May batch. Users and security teams are advised to update affected apps through Google Play, confirm managed devices are no longer on builds earlier than 16.0.19822.20190, and revoke refresh tokens where old builds ran alongside untrusted apps.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSeveral Microsoft 365 Android apps were affected by a flaw caused by a development flag left enabled in production builds. The flag disabled a check that was intended to limit account-token sharing to trusted Microsoft apps. According to the article, this allowed any other app on the same phone to request and receive the signed-in user’s token.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact could include reading email, opening files, browsing the calendar, and sending messages as the user. This could occur without a password, login screen, or permission prompt. Microsoft has patched the issue, and the article advises users of Microsoft 365 Android apps to update them.\u003c/p\u003e\n\n\u003ch2 id=\"affected-apps\"\u003eAffected apps\u003c/h2\u003e\n\n\u003cp\u003eEnclave named the bug \u003cstrong\u003eFlagLeft\u003c/strong\u003e. The article says it affected six Microsoft 365 Android apps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWord\u003c/li\u003e\n\u003cli\u003ePowerPoint\u003c/li\u003e\n\u003cli\u003eExcel\u003c/li\u003e\n\u003cli\u003eMicrosoft 365 Copilot\u003c/li\u003e\n\u003cli\u003eMicrosoft Loop\u003c/li\u003e\n\u003cli\u003eOneNote\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that these apps have billions of downloads between them. Teams shipped with the same flag set to false and was not affected, which Enclave interpreted as a slip rather than a design choice.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-flaw-worked\"\u003eHow the flaw worked\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft 365 apps intentionally share account access so that signing into Word, for example, avoids requiring another sign-in for PowerPoint. That account handoff is supposed to verify who is asking for access and reject anything that is not a trusted Microsoft app. In the affected apps, that verification was skipped.\u003c/p\u003e\n\n\u003cp\u003eEnclave researchers Yanir Tsarimi and Ofek Levin found that the skipped check was caused by a single line left in production code: \u003ccode\u003esetIsDebugMode(true)\u003c/code\u003e. The article says the flaw was in a shared Microsoft SDK, which explains why the same hole appeared in multiple apps.\u003c/p\u003e\n\n\u003ch2 id=\"token-exposure-and-impact\"\u003eToken exposure and impact\u003c/h2\u003e\n\n\u003cp\u003eThe tokens exposed by the flaw were FOCI tokens, described as family refresh tokens Microsoft uses for single sign-on across its apps. The article says these tokens can be refreshed and reused over long stretches. It also says the resulting traffic looks routine in logs, and that nothing visible happens from the user’s side.\u003c/p\u003e\n\n\u003cp\u003eEnclave built a working proof of concept that pulled tokens through an unverified third-party app and used them to read email. Microsoft classified the flaws as local spoofing issues. In the article’s wording, a malicious app already on the device is all it takes.\u003c/p\u003e\n\n\u003ch2 id=\"cves-and-patch-status\"\u003eCVEs and patch status\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft issued four CVEs on May 12, all categorized as spoofing under improper access control, CWE-284:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-41100\u003c/strong\u003e for Microsoft 365 Copilot, with CVSS 4.4\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-41101\u003c/strong\u003e for Word, with CVSS 7.1\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-41102\u003c/strong\u003e for PowerPoint, with CVSS 7.1\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-42832\u003c/strong\u003e for Excel, with CVSS 7.7\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe four CVEs cover Copilot, Word, PowerPoint, and Excel. Enclave also reported the same flaw in Loop and OneNote, but the article says neither received a separate CVE in the May batch.\u003c/p\u003e\n\n\u003cp\u003eThe article states that NVD lists the patched Word build for Android as \u003cstrong\u003e16.0.19822.20190\u003c/strong\u003e, with earlier versions affected. The other apps were fixed through the same Google Play updates.\u003c/p\u003e\n\n\u003ch2 id=\"evidence-of-exploitation\"\u003eEvidence of exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe article says nothing in Microsoft’s May Patch Tuesday release was listed as publicly known or exploited. It also states that there is no public evidence that the flaw was used before the fix.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends updating the following apps from Google Play:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWord\u003c/li\u003e\n\u003cli\u003ePowerPoint\u003c/li\u003e\n\u003cli\u003eExcel\u003c/li\u003e\n\u003cli\u003eMicrosoft 365 Copilot\u003c/li\u003e\n\u003cli\u003eLoop\u003c/li\u003e\n\u003cli\u003eOneNote\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor security teams managing Android fleets, the article recommends pushing updates through MDM and confirming devices are no longer on builds earlier than \u003cstrong\u003e16.0.19822.20190\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes that the patch does not retroactively kill tokens an attacker may already hold. Because FOCI refresh tokens outlive an app update, the article says accounts on devices that ran old builds alongside untrusted apps should have refresh tokens revoked and be forced through a fresh sign-in.\u003c/p\u003e\n","keyPoints":["A development flag left enabled in production builds of several Microsoft 365 Android apps disabled a check that limited account-token sharing to trusted Microsoft apps.","The flaw affected Word, PowerPoint, Excel, Microsoft 365 Copilot, Microsoft Loop, and OneNote, while Teams was not affected because it shipped with the flag set to false.","Enclave researchers Yanir Tsarimi and Ofek Levin found that the check was skipped because setIsDebugMode(true) was left in a shared Microsoft SDK used by multiple apps.","Microsoft issued CVEs on May 12 for Microsoft 365 Copilot, Word, PowerPoint, and Excel, and the affected apps were patched through Google Play updates.","The patch does not retroactively revoke tokens an attacker may already hold, so the article recommends revoking refresh tokens and forcing a fresh sign-in for accounts on devices that ran old builds alongside untrusted apps."],"insights":["Because the flaw was in a shared Microsoft SDK, one leftover debug setting propagated the same account-token exposure across multiple Microsoft 365 Android apps.","The stolen FOCI refresh tokens could be reused over long periods and the resulting activity would look routine in logs, making post-compromise detection harder from normal sign-in telemetry alone.","Updating the apps closes the token-sharing flaw but does not invalidate refresh tokens that may already have been obtained, so token revocation and forced reauthentication are specifically needed for higher-risk devices.","Enclave reported the same flaw in Loop and OneNote, but Microsoft’s May CVE batch only assigned CVEs for Copilot, Word, PowerPoint, and Excel."],"referencedReports":[{"title":"FlagLeft: Microsoft 365 Android Forgotten Flag Account Takeover","url":"https://enclave.ai/blog/flagleft-microsoft-365-android-forgotten-flag-account-takeover","publisher":"Enclave","context":"The article says Enclave named the bug FlagLeft and describes the researchers’ findings and proof of concept.","category":"","primary":false},{"title":"CVE-2026-41100","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-41100","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s advisory for the Microsoft 365 Copilot spoofing flaw.","category":"","primary":false},{"title":"CVE-2026-41101","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-41101","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s advisory for the Word spoofing flaw.","category":"","primary":false},{"title":"CVE-2026-41102","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-41102","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s advisory for the PowerPoint spoofing flaw.","category":"","primary":false},{"title":"CVE-2026-42832","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-42832","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s advisory for the Excel spoofing flaw.","category":"","primary":false}],"body":"\u003cp\u003eSeveral Microsoft 365 Android apps shipped with a development flag left enabled in production builds, disabling a check that was meant to restrict account-token sharing to trusted Microsoft apps. The flaw meant any other app on the same phone could request and receive the signed-in user’s token without a password, login screen, or permission prompt. Microsoft has patched the issue and users are advised to update the affected apps from Google Play.\u003c/p\u003e\n\n\u003cp\u003eEnclave named the bug FlagLeft and reported that it affected Word, PowerPoint, Excel, Microsoft 365 Copilot, Microsoft Loop, and OneNote. Teams was not affected because it shipped with the same flag set to false. The problematic line was identified as \u003ccode\u003esetIsDebugMode(true)\u003c/code\u003e in a shared Microsoft SDK, which caused the issue to appear across multiple apps.\u003c/p\u003e\n\n\u003cp\u003eThe exposed tokens were FOCI refresh tokens used for single sign-on across Microsoft apps, and the article says they can be refreshed and reused over long stretches while appearing routine in logs. Enclave built a proof of concept that used an unverified third-party app to pull tokens and read email. The article recommends not only updating affected apps, but also revoking refresh tokens and forcing fresh sign-ins for accounts on devices that ran older builds alongside untrusted apps.\u003c/p\u003e\n"},{"n":15,"title":"New HTTP/2 Bomb Vulnerability Allows Remote DoS on NGINX, Apache, IIS, Envoy \u0026 Cloudflare","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-http2-bomb-vulnerability-allows.html","time":"08:33","priority":"SHOULD READ","score":87,"tldr":"Researchers disclosed “HTTP/2 Bomb,” a denial-of-service technique that can rapidly exhaust memory on major web servers including NGINX, Apache HTTPD, IIS, Envoy, and Cloudflare Pingora by abusing HPACK header compression and HTTP/2 flow control. NGINX and Apache have fixes or mitigations available, while IIS, Envoy, and Pingora reportedly had no patch at the time of publication.","briefOverview":"\u003cp\u003eCybersecurity researchers have discovered a remote denial-of-service exploit called HTTP/2 Bomb that affects major web servers, including NGINX, Apache HTTPD, Microsoft IIS, Envoy, and Cloudflare Pingora. Calif said the vulnerable behavior exists in each server’s default HTTP/2 configuration. The company said the issue was discovered by OpenAI Codex by chaining a compression bomb with a Slowloris-style hold.\u003c/p\u003e\n\n\u003cp\u003eHTTP/2 Bomb targets HPACK, the header compression scheme used by HTTP/2. According to Calif, one byte on the wire becomes one full header allocation on the server, repeated thousands of times per request, while a zero-byte flow-control window keeps the server from freeing the allocated memory. The article says this differs from earlier HPACK Bomb approaches because amplification comes from per-entry bookkeeping rather than large decoded header values.\u003c/p\u003e\n\n\u003cp\u003eThe article says a home computer on a 100Mbps connection could render a vulnerable server inaccessible within seconds in a hypothetical attack scenario. It also states that a single client can consume and hold 32GB of server memory against Apache HTTPD and Envoy in about 20 seconds. Mitigations include upgrading NGINX to 1.29.8+ or disabling HTTP/2, upgrading Apache HTTPD to mod_http2 v2.0.41 or disabling HTTP/2, while Microsoft IIS, Envoy, and Cloudflare Pingora had no patch available at the time of writing.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have disclosed a remote denial-of-service exploit called HTTP/2 Bomb that affects several major web servers. The affected servers named in the article are NGINX, Apache HTTPD, Microsoft IIS, Envoy, and Cloudflare Pingora. Calif said the vulnerable behavior exists in each server’s default HTTP/2 configuration. The article states that OpenAI Codex discovered it by chaining together two known techniques: a compression bomb and a Slowloris-style hold.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability targets HPACK, HTTP/2’s header compression scheme for request and response metadata. HPACK uses Huffman encoding and is described in the article as producing an average 30% reduction in header size. Calif said HTTP/2 Bomb causes one byte on the wire to become one full header allocation on the server, repeated thousands of times per request. The hold component uses a zero-byte flow-control window to keep the server from freeing the allocated memory.\u003c/p\u003e\n\n\u003cp\u003eThe article places HTTP/2 Bomb in the context of earlier denial-of-service techniques and HTTP/2-related vulnerabilities. It says the approach is inspired by HPACK Bomb, also known as CVE-2016-6581, as well as CVE-2025-53020 in Apache httpd’s HTTP/2 implementation. It also references two Apache HTTP Server denial-of-service flaws involving crafted CONTINUATION frames, CVE-2016-8740, and worker-thread starvation in an HTTP/2 connection, CVE-2016-1546.\u003c/p\u003e\n\n\u003cp\u003eCalif said the new aspect of HTTP/2 Bomb is where the amplification comes from. Earlier approaches used a large value placed into a table and referenced repeatedly, which led servers to cap total decoded header size. In this case, the header is nearly empty, and the memory amplification comes from the per-entry bookkeeping that the server allocates around it. Calif said the decoded-size limit does not trigger because there is almost nothing to decode.\u003c/p\u003e\n\n\u003cp\u003eThe reported impact is memory exhaustion that can make vulnerable servers inaccessible. The article says that, in a hypothetical attack scenario, a home computer on a 100Mbps connection could render a vulnerable server inaccessible within seconds. It also says a single client can consume and hold 32GB of server memory against Apache HTTPD and Envoy in about 20 seconds. To mitigate the issue, the article recommends upgrading NGINX to 1.29.8+ or disabling HTTP/2, upgrading Apache HTTPD to mod_http2 v2.0.41 or disabling HTTP/2, and notes that no patch was available for Microsoft IIS, Envoy, and Cloudflare Pingora at the time of writing.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have discovered a remote denial-of-service exploit called HTTP/2 Bomb. The article says it affects major web servers, including NGINX, Apache HTTPD, Microsoft IIS, Envoy, and Cloudflare Pingora. Calif said the vulnerable behavior exists in each server’s default HTTP/2 configuration.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, HTTP/2 Bomb was discovered by OpenAI Codex. Calif said the discovery came from chaining together two known techniques: a compression bomb and a Slowloris-style hold. The result is a denial-of-service condition that can consume and retain server memory.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical mechanism\u003c/h2\u003e\n\n\u003cp\u003eHTTP/2 Bomb targets HPACK, the header compression scheme used by HTTP/2. HPACK is described in the article as a dedicated header compression algorithm for HTTP/2 that compresses request and response metadata using Huffman encoding. The article says HPACK produces an average reduction of 30% in header size and was designed to be resilient to attacks such as CRIME.\u003c/p\u003e\n\n\u003cp\u003eCalif said the HTTP/2 Bomb behavior is based on a small amount of data on the wire causing disproportionate server-side allocation. In the company’s description, one byte on the wire becomes one full header allocation on the server, repeated thousands of times per request. A zero-byte flow-control window then keeps the server from freeing the allocated memory.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes the second component as a Slowloris-style hold. Slowloris is described as a denial-of-service technique in which an attacker opens and maintains many simultaneous HTTP connections with a target server. The article characterizes Slowloris as an application-layer attack.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-earlier-techniques-and-vulnerabilities\"\u003eRelationship to earlier techniques and vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article says HTTP/2 Bomb is inspired by several known approaches and vulnerabilities. These include HPACK Bomb, also known as CVE-2016-6581, which was first disclosed in 2016. The article also references CVE-2025-53020, a memory exhaustion vulnerability in Apache httpd’s HTTP/2 implementation.\u003c/p\u003e\n\n\u003cp\u003eTwo additional Apache HTTP Server denial-of-service flaws are also cited. One is CVE-2016-8740, involving crafted CONTINUATION frames. The other is CVE-2016-1546, involving worker-thread starvation in an HTTP/2 connection.\u003c/p\u003e\n\n\u003cp\u003eCalif said the new aspect of HTTP/2 Bomb is the source of amplification. In the classic bomb, a large value is placed into a table and referenced repeatedly, leading servers to cap total decoded header size. In HTTP/2 Bomb, the header is nearly empty, so the decoded-size limit does not fire because there is almost nothing to decode.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-attack-is-effective\"\u003eWhy the attack is effective\u003c/h2\u003e\n\n\u003cp\u003eCalif said the amplification in HTTP/2 Bomb comes from per-entry bookkeeping allocated by the server. This differs from a model where the primary risk comes from a large decoded header. The article states that the server allocates memory around very small header entries, and the client can hold that memory in place.\u003c/p\u003e\n\n\u003cp\u003eThe article says the hold is enabled by a zero-byte flow-control window. This prevents the server from freeing the allocated memory. Calif characterized the deeper issue as a specification-level framing of memory risk that focuses on amplification ratio while missing the effect of retained allocations.\u003c/p\u003e\n\n\u003cp\u003eCalif said a 70:1 amplifier is harmless if the memory is freed when the request completes. It becomes an attack because HTTP/2 lets the client hold the connection open almost for free. This can pin every allocated byte for as long as the client chooses, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact\"\u003eReported impact\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the impact as remote denial of service against affected web servers. In a hypothetical attack scenario, it says a home computer on a 100Mbps connection could render a vulnerable server inaccessible within seconds. The article also says a single client can consume and hold 32GB of server memory against Apache HTTPD and Envoy in about 20 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe affected products named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX\u003c/li\u003e\n\u003cli\u003eApache HTTPD\u003c/li\u003e\n\u003cli\u003eMicrosoft IIS\u003c/li\u003e\n\u003cli\u003eEnvoy\u003c/li\u003e\n\u003cli\u003eCloudflare Pingora\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the vulnerable behavior exists in each server’s default HTTP/2 configuration.\u003c/p\u003e\n\n\u003ch2 id=\"mitigations-and-response\"\u003eMitigations and response\u003c/h2\u003e\n\n\u003cp\u003eThe article lists mitigations for NGINX and Apache HTTPD and notes the patch status for other affected products. For NGINX, it recommends upgrading to version 1.29.8 or later. The article says this version adds the max_headers directive with a default of 1000.\u003c/p\u003e\n\n\u003cp\u003eIf upgrading NGINX is not an option, the article recommends disabling HTTP/2 with \u003ccode\u003ehttp2 off;\u003c/code\u003e. For Apache HTTPD, the article says the issue is fixed in mod_http2 v2.0.41. If upgrading Apache HTTPD is not an option, it recommends setting \u003ccode\u003eProtocols http/1.1\u003c/code\u003e to disable HTTP/2.\u003c/p\u003e\n\n\u003cp\u003eFor Microsoft IIS, Envoy, and Cloudflare Pingora, the article says no patch was available at the time of writing.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey takeaway\u003c/h2\u003e\n\n\u003cp\u003eHTTP/2 Bomb is a remote denial-of-service technique that abuses HPACK header handling and HTTP/2 flow control to cause and retain server-side memory allocations. Its notable feature is that the amplification does not depend on large decoded headers, so decoded-header-size limits may not address the behavior described in the article. The article identifies NGINX and Apache HTTPD upgrade or HTTP/2-disabling mitigations, while stating that Microsoft IIS, Envoy, and Cloudflare Pingora had no patch available at the time of publication.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers discovered a remote denial-of-service exploit called HTTP/2 Bomb that affects major web servers including NGINX, Apache HTTPD, Microsoft IIS, Envoy, and Cloudflare Pingora.","Calif said the vulnerable behavior exists in each server's default HTTP/2 configuration and was discovered by OpenAI Codex by chaining a compression bomb with a Slowloris-style hold.","HTTP/2 Bomb targets HPACK, HTTP/2's header compression scheme, where one byte on the wire becomes one full header allocation on the server, repeated thousands of times per request.","Calif said a single client can consume and hold 32GB of server memory against Apache HTTPD and Envoy in about 20 seconds in a hypothetical attack scenario.","Mitigations include upgrading NGINX to 1.29.8+ or disabling HTTP/2, upgrading Apache HTTPD to mod_http2 v2.0.41 or disabling HTTP/2, while no patch was available for Microsoft IIS, Envoy, and Cloudflare Pingora at the time of writing."],"insights":["HTTP/2 Bomb can evade traditional decoded-header-size limits because the headers are nearly empty and the memory amplification comes from per-entry server bookkeeping rather than large decoded header values.","The attack becomes dangerous because HTTP/2 flow control allows a client to keep the connection open with a zero-byte window, preventing the server from freeing allocated memory.","Default HTTP/2 configurations are implicated across multiple major server implementations, so exposure may exist even without custom or unusual server settings.","The available mitigations are uneven across affected products: NGINX and Apache HTTPD have upgrade or disable-HTTP/2 options, while Microsoft IIS, Envoy, and Cloudflare Pingora had no patch available at publication time."],"referencedReports":[{"title":"Codex discovered a hidden HTTP/2 bomb","url":"https://blog.calif.io/p/codex-discovered-a-hidden-http2-bomb","publisher":"Calif","context":"The article cites Calif's analysis as the source of the HTTP/2 Bomb discovery and technical explanation.","category":"","primary":false},{"title":"CVE-2016-6581 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2016-6581","publisher":"National Vulnerability Database","context":"The article references CVE-2016-6581 as the earlier HPACK Bomb vulnerability that inspired HTTP/2 Bomb.","category":"","primary":false},{"title":"Apache httpd CVE-2025-53020","url":"https://galbarnahum.com/posts/apache-httpd-cve-2025-53020","publisher":"Gal Bar Nahum","context":"The article references this technical write-up as a memory exhaustion vulnerability in Apache httpd's HTTP/2 implementation.","category":"","primary":false},{"title":"CVE-2016-8740","url":"https://www.cve.org/CVERecord?id=CVE-2016-8740","publisher":"CVE Program","context":"The article references CVE-2016-8740 as a denial-of-service flaw in Apache HTTP Server involving crafted CONTINUATION frames.","category":"","primary":false},{"title":"CVE-2016-1546","url":"https://www.cve.org/CVERecord?id=CVE-2016-1546","publisher":"CVE Program","context":"The article references CVE-2016-1546 as a worker-thread starvation denial-of-service flaw in an HTTP/2 connection.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have discovered a remote denial-of-service exploit called HTTP/2 Bomb that affects major web servers, including NGINX, Apache HTTPD, Microsoft IIS, Envoy, and Cloudflare Pingora. Calif said the vulnerable behavior exists in each server’s default HTTP/2 configuration. The company said the issue was discovered by OpenAI Codex by chaining a compression bomb with a Slowloris-style hold.\u003c/p\u003e\n\n\u003cp\u003eHTTP/2 Bomb targets HPACK, the header compression scheme used by HTTP/2. According to Calif, one byte on the wire becomes one full header allocation on the server, repeated thousands of times per request, while a zero-byte flow-control window keeps the server from freeing the allocated memory. The article says this differs from earlier HPACK Bomb approaches because amplification comes from per-entry bookkeeping rather than large decoded header values.\u003c/p\u003e\n\n\u003cp\u003eThe article says a home computer on a 100Mbps connection could render a vulnerable server inaccessible within seconds in a hypothetical attack scenario. It also states that a single client can consume and hold 32GB of server memory against Apache HTTPD and Envoy in about 20 seconds. Mitigations include upgrading NGINX to 1.29.8+ or disabling HTTP/2, upgrading Apache HTTPD to mod_http2 v2.0.41 or disabling HTTP/2, while Microsoft IIS, Envoy, and Cloudflare Pingora had no patch available at the time of writing.\u003c/p\u003e\n"},{"n":7,"title":"Chinese hackers use new Atlas RAT malware in European cyberattacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/chinese-hackers-use-new-atlas-rat-malware-in-european-cyberattacks/","time":"21:45","priority":"SHOULD READ","score":86,"tldr":"Chinese-speaking cybercrime group TA4922 is expanding into Europe with fast-moving phishing campaigns that deploy new malware including Atlas RAT, RomulusLoader, and SilentRunLoader. Although financially motivated, the tools provide surveillance-grade capabilities that could also be used or sold for espionage.","briefOverview":"\u003cp\u003eA Chinese-speaking cybercrime group tracked as TA4922 has expanded its targeting to Europe while deploying previously undocumented malware and the Atlas backdoor. Proofpoint says the group is financially motivated and targets networks for fraud, data theft, and the sale of access. The recent campaigns have focused on entities in Germany, Italy, the United Kingdom, and South Africa after earlier targeting in East Asia.\u003c/p\u003e\n\n\u003cp\u003eProofpoint says TA4922 activity has increased sharply since March and, since April, has shown unprecedented operational diversity and a high tempo. The group uses localized phishing lures such as payroll notices, tax audits, VAT filings, government compliance notices, invoices, and human resources messages. It also attempts to contact victims through WhatsApp, LINE, and Microsoft Teams.\u003c/p\u003e\n\n\u003cp\u003eThe malware arsenal includes Atlas RAT, RomulusLoader, SilentRunLoader, and Winos4.0, which Proofpoint tracks as ValleyRAT. Atlas RAT supports reconnaissance, file theft, payload downloads, keylogging, screenshots, audio and webcam recording, and system shutdown or reboot commands. Proofpoint says the malware capabilities have the potential for surveillance that could be used by or sold to espionage groups.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA Chinese-speaking cybercrime group tracked as TA4922 has expanded its targeting to the European space, according to Proofpoint. The group is associated with financially motivated attacks aimed at breaching networks for fraud, data theft, and the sale of access. TA4922 previously targeted organizations in East Asia, but recent campaigns have focused on Germany, Italy, the United Kingdom, and South Africa.\u003c/p\u003e\n\n\u003cp\u003eProofpoint says TA4922 overlaps with activity previously reported as Silver Fox and Void Arachne, but the company tracks it separately because its activity is more consistent with cybercrime than espionage. Since March, TA4922\u0026rsquo;s activity has increased sharply. Since April, Proofpoint says the group has shown unprecedented operational diversity and high tempo.\u003c/p\u003e\n\n\u003cp\u003eThe group uses localized phishing lures designed to appear as payroll notices, tax audits, VAT filings, government compliance notices, invoices, and human resources communications. TA4922 also attempts to contact victims via WhatsApp, LINE, and Microsoft Teams. Proofpoint says the actor currently conducts more unique campaigns than any other tracked cybercrime threat actor in its threat data.\u003c/p\u003e\n\n\u003cp\u003eProofpoint reports that TA4922 has significantly expanded its malware arsenal and may be using large language models to accelerate malware development. The company bases this assessment on placeholder values, code comments, and patterns commonly associated with AI-generated code. The malware set includes Atlas RAT, RomulusLoader, SilentRunLoader, and Winos4.0, which Proofpoint tracks as ValleyRAT.\u003c/p\u003e\n\n\u003cp\u003eAtlas RAT is a recently identified remote access trojan with capabilities including system reconnaissance, targeted file theft, plugin and payload downloads, keylogging, screenshot capture, audio and webcam recording, and shutdown or reboot commands. The Atlas RAT loader includes anti-sandbox and anti-analysis checks, including checks for Microsoft Defender Application Guard-related usernames and registry keys, the CExecSvc service, and OS UUID. Proofpoint\u0026rsquo;s report also includes indicators of compromise for malware and command-and-control infrastructure used in TA4922\u0026rsquo;s attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA Chinese-speaking cybercrime group tracked by Proofpoint as TA4922 has expanded its operations beyond prior East Asia targeting and is now focusing on entities in the European space. Recent campaigns have targeted organizations in Germany, Italy, the United Kingdom, and South Africa.\u003c/p\u003e\n\n\u003cp\u003eProofpoint assesses TA4922 as financially motivated. The group is associated with attacks aimed at breaching target networks for fraud, data theft, and the sale of access.\u003c/p\u003e\n\n\u003cp\u003eThe activity includes the deployment of previously undocumented malware and the Atlas backdoor. Proofpoint says the actor has significantly expanded its malware arsenal and is operating with a high tempo and diverse set of campaigns.\u003c/p\u003e\n\n\u003ch2 id=\"actor-context\"\u003eActor Context\u003c/h2\u003e\n\n\u003cp\u003eProofpoint tracks the threat actor as TA4922. The company notes overlaps with activity previously reported as Silver Fox and Void Arachne, but tracks TA4922 separately because the observed activity is more consistent with cybercrime than espionage.\u003c/p\u003e\n\n\u003cp\u003eAccording to Proofpoint, TA4922 currently conducts more unique campaigns than any other cybercrime threat actor tracked in its threat data. The company says the actor demonstrates high operational tempo, varied lures, and multiple objectives.\u003c/p\u003e\n\n\u003cp\u003eProofpoint also says TA4922\u0026rsquo;s activity has increased sharply since March. Since April, the group has shown what Proofpoint describes as unprecedented operational diversity and high tempo.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-lures\"\u003eTargeting and Lures\u003c/h2\u003e\n\n\u003cp\u003eTA4922 previously targeted organizations in East Asia, but its recent campaigns have focused on entities in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGermany\u003c/li\u003e\n\u003cli\u003eItaly\u003c/li\u003e\n\u003cli\u003eThe United Kingdom\u003c/li\u003e\n\u003cli\u003eSouth Africa\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe group uses localized phishing lures crafted to appear as legitimate communications. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePayroll notices\u003c/li\u003e\n\u003cli\u003eTax audits\u003c/li\u003e\n\u003cli\u003eVAT filings\u003c/li\u003e\n\u003cli\u003eGovernment compliance notices\u003c/li\u003e\n\u003cli\u003eInvoices\u003c/li\u003e\n\u003cli\u003eHuman resources communications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says TA4922 attempts to contact victims through several communications platforms, including WhatsApp, LINE messenger, and Microsoft Teams.\u003c/p\u003e\n\n\u003ch2 id=\"malware-arsenal\"\u003eMalware Arsenal\u003c/h2\u003e\n\n\u003cp\u003eProofpoint reports that TA4922 has significantly expanded its malware arsenal. The malware and tools described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAtlas RAT\u003c/li\u003e\n\u003cli\u003eRomulusLoader\u003c/li\u003e\n\u003cli\u003eSilentRunLoader\u003c/li\u003e\n\u003cli\u003eWinos4.0, which Proofpoint tracks as ValleyRAT\u003c/li\u003e\n\u003cli\u003eLegitimate remote management tools including AnyDesk and SyncFuture\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eProofpoint believes the hackers may be using large language models to accelerate malware development. The article says this conclusion is based on placeholder values, code comments, and patterns commonly associated with AI-generated code.\u003c/p\u003e\n\n\u003ch2 id=\"atlas-rat\"\u003eAtlas RAT\u003c/h2\u003e\n\n\u003cp\u003eAtlas RAT is described as a recently identified remote access trojan. Proofpoint says it gives attackers several capabilities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSystem reconnaissance\u003c/li\u003e\n\u003cli\u003eTargeted file theft\u003c/li\u003e\n\u003cli\u003ePlugin and payload downloads\u003c/li\u003e\n\u003cli\u003eKeylogging\u003c/li\u003e\n\u003cli\u003eScreenshot capturing\u003c/li\u003e\n\u003cli\u003eAudio and webcam recording\u003c/li\u003e\n\u003cli\u003eSystem shutdown and reboot commands\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Atlas RAT loader also includes anti-sandbox and anti-analysis checks. The article says these include checks for usernames and registry keys associated with Microsoft Defender Application Guard, the CExecSvc service, and OS UUID.\u003c/p\u003e\n\n\u003cp\u003eProofpoint says that while TA4922 is assessed to be financially motivated, the malware capabilities include the potential for surveillance. The company says those capabilities could be used by or sold to espionage groups.\u003c/p\u003e\n\n\u003ch2 id=\"romulusloader\"\u003eRomulusLoader\u003c/h2\u003e\n\n\u003cp\u003eProofpoint discovered a new malware loader named RomulusLoader. The article says it downloads and executes additional payloads using several execution methods, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProcess hollowing\u003c/li\u003e\n\u003cli\u003eShellcode injection\u003c/li\u003e\n\u003cli\u003eDirect execution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eRomulusLoader was used to launch legitimate remote management tools such as AnyDesk and SyncFuture. SyncFuture is described in the article as a remote monitoring software tool popular in China, and the article notes that it was used in attacks targeting German entities.\u003c/p\u003e\n\n\u003ch2 id=\"silentrunloader\"\u003eSilentRunLoader\u003c/h2\u003e\n\n\u003cp\u003eProofpoint also identified SilentRunLoader, described as a Python-based loader and information stealer. The article says it steals Google Chrome credentials, cookies, and browsing data.\u003c/p\u003e\n\n\u003cp\u003eSilentRunLoader was deployed against organizations in the United Kingdom and Southeast Asia. Those campaigns used lures impersonating government services.\u003c/p\u003e\n\n\u003ch2 id=\"winos4-0-and-valleyrat\"\u003eWinos4.0 and ValleyRAT\u003c/h2\u003e\n\n\u003cp\u003eThe researchers also observed the deployment of Winos4.0. The article describes Winos4.0 as a previously documented malware family that Proofpoint tracks as ValleyRAT.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Winos4.0 provides operators with a full set of remote access features.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe specific confirmed breaches, losses, or named victim organizations. It states that TA4922 targets networks for fraud, data theft, and the sale of access.\u003c/p\u003e\n\n\u003cp\u003eProofpoint\u0026rsquo;s report includes indicators of compromise for the malware and command-and-control infrastructure used in TA4922\u0026rsquo;s attacks. The article emphasizes that the actor is moving quickly, uses multiple lures, and operates with more unique campaigns than any other threat actor in Proofpoint\u0026rsquo;s cybercrime tracking data.\u003c/p\u003e\n","keyPoints":["Proofpoint tracks the Chinese-speaking cybercrime group as TA4922 and says it is financially motivated, targeting networks for fraud, data theft, and the sale of access.","TA4922 previously targeted organizations in East Asia but has recently focused on entities in Germany, Italy, the United Kingdom, and South Africa.","Since March, TA4922 activity has increased sharply, and since April it has shown unprecedented operational diversity and a high tempo, according to Proofpoint.","TA4922 uses localized phishing lures such as payroll notices, tax audits, VAT filings, government compliance notices, invoices, and human resources communications, and also contacts victims through WhatsApp, LINE, and Microsoft Teams.","Proofpoint reported that TA4922 has deployed Atlas RAT, RomulusLoader, SilentRunLoader, and Winos4.0, with Atlas RAT supporting reconnaissance, file theft, downloads, keylogging, screenshots, audio and webcam recording, and shutdown or reboot commands."],"insights":["Proofpoint says TA4922 currently runs more unique campaigns than any other cybercrime threat actor it tracks, making the group unusually active and diverse in its operations.","Proofpoint believes TA4922 may be using large language models to accelerate malware development, based on placeholder values, code comments, and patterns associated with AI-generated code.","Although Proofpoint assesses TA4922 as financially motivated, the malware capabilities include surveillance functions that could be used by or sold to espionage groups.","Atlas RAT includes anti-analysis checks for Microsoft Defender Application Guard-related usernames and registry keys, the CExecSvc service, and OS UUID, indicating deliberate attempts to evade sandbox environments.","TA4922 deployed SyncFuture, a remote monitoring tool popular in China, against German entities, which Proofpoint described as unusual."],"referencedReports":[{"title":"TA4922: Suspected Chinese Crime Group Going Global","url":"https://www.proofpoint.com/us/blog/threat-insight/ta4922-suspected-chinese-crime-group-going-global","publisher":"Proofpoint","context":"The article cites Proofpoint's report as the source for details on TA4922's expanded malware arsenal, Atlas RAT, RomulusLoader, SilentRunLoader, Winos4.0, and related indicators of compromise.","category":"","primary":false}],"body":"\u003cp\u003eA Chinese-speaking cybercrime group tracked as TA4922 has expanded its targeting to Europe while deploying previously undocumented malware and the Atlas backdoor. Proofpoint says the group is financially motivated and targets networks for fraud, data theft, and the sale of access. The recent campaigns have focused on entities in Germany, Italy, the United Kingdom, and South Africa after earlier targeting in East Asia.\u003c/p\u003e\n\n\u003cp\u003eProofpoint says TA4922 activity has increased sharply since March and, since April, has shown unprecedented operational diversity and a high tempo. The group uses localized phishing lures such as payroll notices, tax audits, VAT filings, government compliance notices, invoices, and human resources messages. It also attempts to contact victims through WhatsApp, LINE, and Microsoft Teams.\u003c/p\u003e\n\n\u003cp\u003eThe malware arsenal includes Atlas RAT, RomulusLoader, SilentRunLoader, and Winos4.0, which Proofpoint tracks as ValleyRAT. Atlas RAT supports reconnaissance, file theft, payload downloads, keylogging, screenshots, audio and webcam recording, and system shutdown or reboot commands. Proofpoint says the malware capabilities have the potential for surveillance that could be used by or sold to espionage groups.\u003c/p\u003e\n"},{"n":19,"title":"One-Click GitHub Dev Attack Lets Attackers Steal Full GitHub OAuth Tokens","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/one-click-github-dev-attack-lets.html","time":"12:58","priority":"SHOULD READ","score":86,"tldr":"Researchers disclosed a one-click GitHub.dev/VS Code web attack that can install a malicious extension and steal a user’s full GitHub OAuth token, potentially exposing private repositories. Microsoft has acknowledged the issue and says VS Code Desktop is not affected.","briefOverview":"\u003cp\u003eCybersecurity researcher Ammar Askar disclosed a one-click attack involving Microsoft Visual Studio Code and GitHub.dev that can steal a user\u0026rsquo;s GitHub token. The article says a victim can expose a token capable of reading and writing to repositories, including private ones, by clicking a link. GitHub.dev is a lightweight web-based source code editor that launches a VS Code environment in the browser.\u003c/p\u003e\n\n\u003cp\u003eThe issue centers on how github.com posts an OAuth token to github.dev so the web editor can interact with GitHub on the user\u0026rsquo;s behalf. According to Askar, the token is not limited to the repository the user is working with and instead has full access to other repositories the user can access. The exploit abuses VS Code webviews and message-passing behavior to install a malicious extension that extracts the token.\u003c/p\u003e\n\n\u003cp\u003eThe attack runs malicious JavaScript inside an untrusted webview to simulate keypresses, open the Command Palette, and install an attacker-controlled extension. It also uses local workspace extensions placed under a workspace\u0026rsquo;s \u003ccode\u003e.vscode/extensions\u003c/code\u003e folder to bypass an additional trusted publisher prompt. Microsoft acknowledged the vulnerability and said it is working on a fix, while clarifying that VS Code Desktop is not affected.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers disclosed a one-click attack via Microsoft Visual Studio Code that can steal a user\u0026rsquo;s GitHub token. The article is based on research by Ammar Askar, who said that clicking a link could allow an attacker to steal a GitHub token with read and write access to repositories, including private repositories. The issue involves GitHub.dev, a browser-based editor that launches a VS Code environment.\u003c/p\u003e\n\n\u003cp\u003eGitHub.dev allows users to send pull requests and make commits from a lightweight web-based source code editor. The article explains that this works by github.com posting an OAuth token to github.dev so it can interact with GitHub on the user\u0026rsquo;s behalf. Askar said the token is not scoped only to the repository being edited and instead has full access to other repositories the user can access.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability allows attackers to install malicious VS Code extensions that steal GitHub OAuth tokens when the tokens are passed to GitHub.dev. The exploit abuses a message-passing mechanism between the main VS Code window and webviews. Webviews are used to render Markdown previews or edit Jupyter notebooks.\u003c/p\u003e\n\n\u003cp\u003eThe described exploit runs malicious JavaScript inside an untrusted webview to simulate keypresses in the main editor window. It triggers Ctrl+Shift+P to open the Command Palette and installs an attacker-controlled extension. That extension extracts the GitHub OAuth token and queries the GitHub API to enumerate all private repositories the victim can access.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights VS Code\u0026rsquo;s local workspace extensions feature, which allows an extension to be installed directly from the \u003ccode\u003e.vscode/extensions\u003c/code\u003e folder without an additional trust dialog prompt. Askar said this can be used to bypass the publisher trust check by adding keybindings that trigger VS Code commands, including installing an extension while skipping the trusted publisher check. Microsoft acknowledged the vulnerability and said it is working on a fix, and Alexandru Dima said the issue does not affect VS Code Desktop.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher Ammar Askar disclosed a one-click attack involving Microsoft Visual Studio Code and GitHub.dev that can steal a user\u0026rsquo;s GitHub token. The article says the attack can be triggered when a user clicks a link. Askar said the stolen token can read and write to repositories, including private ones.\u003c/p\u003e\n\n\u003cp\u003eGitHub.dev is described as a lightweight web-based source code editor that runs in the browser\u0026rsquo;s sandbox by launching a VS Code environment. It lets users send pull requests and make commits. The issue arises in the context of how GitHub.dev receives an OAuth token from github.com to interact with GitHub on a user\u0026rsquo;s behalf.\u003c/p\u003e\n\n\u003ch2 id=\"token-exposure-and-impact\"\u003eToken exposure and impact\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, github.com posts an OAuth token to github.dev so the web editor can perform actions on GitHub for the user. Askar said this token is not scoped to the specific repository the user interacted with. Instead, it has full access to every other repository the user has access to.\u003c/p\u003e\n\n\u003cp\u003eThe article says this means a successful attacker could obtain a token with read and write access to repositories, including private ones. The exploit described in the article also uses the GitHub API to enumerate all private repositories the victim can access.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability allows attackers to install malicious VS Code extensions that steal GitHub OAuth tokens when those tokens are passed to GitHub.dev. The article says this is done by exploiting a message-passing mechanism between the main VS Code window and webviews. Webviews are noted as a VS Code capability used to render Markdown previews or edit Jupyter notebooks.\u003c/p\u003e\n\n\u003cp\u003eThe exploit runs malicious JavaScript inside an untrusted webview. That JavaScript simulates keypresses, also described as keydown events, in the main editor window. It triggers \u003ccode\u003eCtrl+Shift+P\u003c/code\u003e to open the Command Palette.\u003c/p\u003e\n\n\u003cp\u003eOnce the Command Palette is opened, the attack installs an attacker-controlled extension. The extension extracts the GitHub OAuth token sent to GitHub.dev. It then queries the GitHub API to enumerate private repositories available to the victim.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-local-workspace-extensions\"\u003eRole of local workspace extensions\u003c/h2\u003e\n\n\u003cp\u003eThe article says the attack also leverages a VS Code feature called local workspace extensions. This feature allows an extension to be installed directly without an additional trust dialog prompt if the extension is placed in the \u003ccode\u003e.vscode/extensions\u003c/code\u003e folder within that workspace. The article describes this as effectively bypassing the publisher trust check.\u003c/p\u003e\n\n\u003cp\u003eAskar explained that extensions can contribute extra keybindings through their \u003ccode\u003epackage.json\u003c/code\u003e. Since the ex
