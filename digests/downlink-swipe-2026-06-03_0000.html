<script type="application/json" id="dl-articles">[{"n":17,"title":"Autonomous AI Tool Finds 2-Year-Old RCE Flaw in Redis (CVE-2026-23479)","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/autonomous-ai-tool-finds-2-year-old-rce.html","time":"13:47","priority":"MUST READ","score":94,"tldr":"Redis patched CVE-2026-23479, a two-year-old authenticated use-after-free flaw that can lead to remote code execution and was discovered by an autonomous AI bug-hunting tool. Users should upgrade to fixed Redis versions immediately, especially for internet-exposed or weakly authenticated deployments.","briefOverview":"\u003cp\u003eRedis patched CVE-2026-23479, a use-after-free flaw in its blocking-client code that can let an authenticated user run arbitrary OS commands on the database host. The flaw was introduced in Redis 7.2.0 and remained in every stable branch until fixes were released on May 5. It was found by Team Xint Code, using an autonomous AI security tool built to hunt bugs in large codebases.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability lives in \u003ccode\u003eunblockClientOnKey()\u003c/code\u003e in \u003ccode\u003esrc/blocked.c\u003c/code\u003e, where Redis dispatches a queued command and then continues using a client pointer that may have been freed. The published exploit chain leaks a heap address with Lua, reclaims freed memory with a fake client structure, and uses Redis memory accounting to overwrite a function pointer. Redis said it had no evidence of exploitation in its own or customer environments, but the full technical chain is now public.\u003c/p\u003e\n\n\u003cp\u003eUsers are advised to upgrade to fixed versions 7.2.14, 7.4.9, 8.2.6, 8.4.3, or 8.6.3. If patching is not immediately possible, the article recommends keeping Redis off the public internet, placing it behind TLS, tightening ACLs, and denying scripting if Lua is not used. Priority should go to internet-exposed instances, shared application credentials, and roles combining CONFIG, scripting, and stream access.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRedis patched CVE-2026-23479, a use-after-free vulnerability in its blocking-client code that can allow an authenticated user to run arbitrary OS commands on the host running the database. NVD rates the flaw 8.8 under CVSS 3.1, while Redis lists it as 7.7 under CVSS 4.0. The bug was introduced in Redis 7.2.0 and remained present across stable branches until May 5 fixes.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was reported by Team Xint Code and is described in a public technical write-up. The article says Xint Code is an autonomous AI security tool built to hunt bugs in large codebases. Team Xint Code demonstrated a working RCE at ZeroDay.Cloud 2025, Wiz\u0026rsquo;s hacking competition in London last December.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the issue is in \u003ccode\u003eunblockClientOnKey()\u003c/code\u003e in \u003ccode\u003esrc/blocked.c\u003c/code\u003e, which is triggered when a key event wakes a blocked command. The function calls \u003ccode\u003eprocessCommandAndResetClient()\u003c/code\u003e and then continues using the same client pointer, even though that function can free the client as a side effect. The article says two separate 2023 commits combined to create the bug: a January refactor added the unchecked call, and a March change added more client access after it.\u003c/p\u003e\n\n\u003cp\u003eThe published exploit chain runs in three stages. It first uses a one-line Lua script to leak a heap pointer, then grooms client memory limits and reclaims a freed client slot with a fake client structure, and finally uses \u003ccode\u003eupdateClientMemoryUsage()\u003c/code\u003e to perform an out-of-bounds decrement aimed at the Global Offset Table. The result repoints \u003ccode\u003estrcasecmp()\u003c/code\u003e at \u003ccode\u003esystem()\u003c/code\u003e, so the next command Redis parses runs as a shell command.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the cloud footprint increases the risk. Wiz\u0026rsquo;s analysis says Redis appears in a large majority of cloud environments and that most of those instances run without a password. Although the exploit requires an authenticated session, the default Redis user has all ACL categories needed for the published chain in default deployments.\u003c/p\u003e\n\n\u003cp\u003eRedis said it had no evidence of exploitation in its own or customer environments, and the article says no public in-the-wild reports had surfaced as of publication. Users should upgrade to fixed minor versions 7.2.14, 7.4.9, 8.2.6, 8.4.3, or 8.6.3. If they cannot patch immediately, the article recommends keeping Redis off the public internet and behind TLS, restricting ACL combinations involving CONFIG, scripting, and streams, and denying Lua scripting if it is not used.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRedis patched CVE-2026-23479, a use-after-free flaw in its blocking-client code that can let an authenticated user execute arbitrary OS commands on the machine hosting the database. The flaw was introduced in Redis 7.2.0 and remained in every stable branch until fixes released on May 5. NVD rates the issue 8.8 under CVSS 3.1, while Redis lists it as 7.7 under CVSS 4.0.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was reported by Team Xint Code. The article describes Xint Code as an autonomous AI security tool built to hunt bugs in large codebases. A full technical write-up is public, and Team Xint Code demonstrated a working RCE at ZeroDay.Cloud 2025, Wiz\u0026rsquo;s hacking competition in London last December.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-issue-matters\"\u003eWhy the issue matters\u003c/h2\u003e\n\n\u003cp\u003eThe article says the cloud footprint makes the bug worse. Wiz\u0026rsquo;s analysis, published with the exploit write-up, found Redis in a large majority of cloud environments, with most of those instances running without a password. Although the exploit requires an authenticated session, the article says a default deployment gives the default user every privilege required by the chain.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Redis said it had no evidence of exploitation in its own or customer environments. As of publication, no public in-the-wild reports had surfaced. However, the full technical chain is now public, increasing the risk of follow-on exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"technical-root-cause\"\u003eTechnical root cause\u003c/h2\u003e\n\n\u003cp\u003eThe flaw is located in \u003ccode\u003eunblockClientOnKey()\u003c/code\u003e in \u003ccode\u003esrc/blocked.c\u003c/code\u003e. This function runs when a key event wakes a blocked command. It dispatches the queued command through \u003ccode\u003eprocessCommandAndResetClient()\u003c/code\u003e and then continues using the same client pointer.\u003c/p\u003e\n\n\u003cp\u003eThe problem is that \u003ccode\u003eprocessCommandAndResetClient()\u003c/code\u003e can free the client as a side effect, and the article states that its own header comment says so. The caller ignores the return value and continues reading the freed structure, creating a use-after-free condition categorized as CWE-416.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wiz\u0026rsquo;s analysis cited in the article, the bug took two commits to create:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA January 2023 refactor, PR #11012, added the unchecked call.\u003c/li\u003e\n\u003cli\u003eA March 2023 change, PR #11568, added more client access after the call.\u003c/li\u003e\n\u003cli\u003eNeither commit was dangerous alone, but together they reached general availability in Redis 7.2.0.\u003c/li\u003e\n\u003cli\u003eThe combined issue survived multiple rounds of security review.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"published-exploit-chain\"\u003ePublished exploit chain\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the published exploit as a three-stage chain.\u003c/p\u003e\n\n\u003cp\u003eFirst, the attacker leaks a heap pointer using a one-line Lua script: \u003ccode\u003eEVAL \u0026quot;return tostring(redis.call)\u0026quot; 0\u003c/code\u003e. This provides the heap address needed for later stages.\u003c/p\u003e\n\n\u003cp\u003eSecond, the attacker grooms client memory limits, parks a bloated client on a stream, then drops the limits and wakes the blocked client. Redis frees the blocked client mid-call, and a pipelined \u003ccode\u003eSET\u003c/code\u003e immediately reclaims the freed slot with a fake client structure.\u003c/p\u003e\n\n\u003cp\u003eThird, Redis\u0026rsquo;s normal memory accounting in \u003ccode\u003eupdateClientMemoryUsage()\u003c/code\u003e performs an out-of-bounds decrement using attacker-controlled fields. The article says this write is aimed at the Global Offset Table to repoint \u003ccode\u003estrcasecmp()\u003c/code\u003e at \u003ccode\u003esystem()\u003c/code\u003e. The next command Redis parses then runs as a shell command.\u003c/p\u003e\n\n\u003ch2 id=\"conditions-required-for-exploitation\"\u003eConditions required for exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe full chain requires an authenticated session with access to several Redis capabilities. The article lists the needed categories and commands as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eCONFIG SET\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eEVAL\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eStream commands such as \u003ccode\u003eXREAD\u003c/code\u003e and \u003ccode\u003eXADD\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eBasic \u003ccode\u003eSET\u003c/code\u003e and \u003ccode\u003eGET\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eACL categories \u003ccode\u003e@admin\u003c/code\u003e, \u003ccode\u003e@scripting\u003c/code\u003e, \u003ccode\u003e@stream\u003c/code\u003e, and \u003ccode\u003e@read\u003c/code\u003e/\u003ccode\u003e@write\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe default user has all of these privileges. The article also says that in many deployments, these privileges are grouped into a single shared application or operator role. Denying CONFIG breaks the specific published chain, although it does not remove the underlying use-after-free.\u003c/p\u003e\n\n\u003ch2 id=\"docker-image-detail\"\u003eDocker image detail\u003c/h2\u003e\n\n\u003cp\u003eThe official Redis Docker image makes the final stage easier, according to the article. It ships with only partial RELRO, which leaves the Global Offset Table writable at runtime. ASLR and PIE do not help in this case because the write is relative to a global whose offset is fixed at build time.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-fixed-versions\"\u003eAffected and fixed versions\u003c/h2\u003e\n\n\u003cp\u003eRedis released fixed minor versions for affected branches on May 5. The article says minor upgrades within a series are meant to be drop-in.\u003c/p\u003e\n\n\u003cp\u003eAffected branches and fixed versions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRedis 7.2.x: 7.2.0 to 7.2.13 are affected; fixed in 7.2.14.\u003c/li\u003e\n\u003cli\u003eRedis 7.4.x: 7.4.0 to 7.4.8 are affected; fixed in 7.4.9.\u003c/li\u003e\n\u003cli\u003eRedis 8.2.x: 8.2.0 to 8.2.5 are affected; fixed in 8.2.6.\u003c/li\u003e\n\u003cli\u003eRedis 8.4.x: 8.4.0 to 8.4.2 are affected; fixed in 8.4.3.\u003c/li\u003e\n\u003cli\u003eRedis 8.6.x: 8.6.0 to 8.6.2 are affected; fixed in 8.6.3.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says managed Redis services patch on their own schedules, and Redis said Redis Cloud is already patched.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-guidance-in-the-article\"\u003eMitigation guidance in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends upgrading to the patched minor release for the relevant Redis series. If patching is not immediately possible, it recommends several risk-reduction steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKeep Redis off the public internet.\u003c/li\u003e\n\u003cli\u003ePlace Redis behind TLS.\u003c/li\u003e\n\u003cli\u003eTighten ACLs so no single role holds \u003ccode\u003e@admin\u003c/code\u003e, CONFIG, and \u003ccode\u003e@scripting\u003c/code\u003e together.\u003c/li\u003e\n\u003cli\u003eDeny \u003ccode\u003e@scripting\u003c/code\u003e if Lua is not used, which stops the Stage 1 heap leak.\u003c/li\u003e\n\u003cli\u003ePrioritize internet-exposed instances, shared application credentials, and roles combining CONFIG, scripting, and stream access.\u003c/li\u003e\n\u003cli\u003eRotate broadly shared Redis credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-disclosure-context\"\u003eBroader disclosure context\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-23479 was one of five RCE-class Redis flaws disclosed the previous month, according to the article. The article also notes that it follows Redis\u0026rsquo;s 2025 RediShell flaw, another authenticated use-after-free involving Lua scripting. Its most unusual element is that it was found by an AI tool after two commits introduced the issue and the bug remained hidden for more than two years.\u003c/p\u003e\n","keyPoints":["Redis patched CVE-2026-23479, a use-after-free flaw in its blocking-client code that can let an authenticated user run arbitrary OS commands on the database host.","The flaw was introduced in Redis 7.2.0 and remained in every stable branch until fixes were released on May 5.","The vulnerability was found by Team Xint Code using Xint Code, an autonomous AI security tool built to hunt bugs in large codebases.","The published exploit chain leaks a heap pointer with Lua, reclaims freed client memory with a fake client structure, and overwrites a function pointer to execute shell commands.","Redis users are advised to upgrade to fixed versions 7.2.14, 7.4.9, 8.2.6, 8.4.3, or 8.6.3, and to restrict ACLs if they cannot patch immediately."],"insights":["The exploit requires authentication, but the article notes that many Redis cloud deployments run without a password and the default user has all privileges needed for the chain, making the authentication requirement a weak barrier in practice.","The bug emerged only from the combination of two separate 2023 commits, neither of which was dangerous alone, which helps explain why it survived multiple rounds of security review for more than two years.","The official Redis Docker image’s partial RELRO makes the final exploit stage easier because the Global Offset Table remains writable at runtime, while ASLR and PIE do not prevent the described write.","Denying CONFIG can break the published exploit chain, and denying Lua scripting can stop the Stage 1 heap leak, giving defenders concrete mitigations if immediate patching is not possible."],"referencedReports":[{"title":"Security Advisory: CVE-2026-23479, CVE-2026-25243, CVE-2026-25588, CVE-2026-25589, CVE-2026-23631","url":"https://redis.io/blog/security-advisory-cve202623479-cve202625243-cve-2026-25588-cve202625589-cve-2026-23631/","publisher":"Redis","context":"The article cites Redis's advisory as the source for the patches and affected fixed versions for CVE-2026-23479 and related Redis RCE-class flaws.","category":"","primary":false},{"title":"Redis CVE-2026-23479 Deep Dive","url":"https://www.zeroday.cloud/blog/redis-cve-2026-23479-deep-dive","publisher":"ZeroDay.Cloud","context":"The article states that a complete technical write-up of the Redis CVE-2026-23479 exploit chain is public and references Wiz's analysis published with the exploit write-up.","category":"","primary":false}],"body":"\u003cp\u003eRedis patched CVE-2026-23479, a use-after-free flaw in its blocking-client code that can let an authenticated user run arbitrary OS commands on the database host. The flaw was introduced in Redis 7.2.0 and remained in every stable branch until fixes were released on May 5. It was found by Team Xint Code, using an autonomous AI security tool built to hunt bugs in large codebases.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability lives in \u003ccode\u003eunblockClientOnKey()\u003c/code\u003e in \u003ccode\u003esrc/blocked.c\u003c/code\u003e, where Redis dispatches a queued command and then continues using a client pointer that may have been freed. The published exploit chain leaks a heap address with Lua, reclaims freed memory with a fake client structure, and uses Redis memory accounting to overwrite a function pointer. Redis said it had no evidence of exploitation in its own or customer environments, but the full technical chain is now public.\u003c/p\u003e\n\n\u003cp\u003eUsers are advised to upgrade to fixed versions 7.2.14, 7.4.9, 8.2.6, 8.4.3, or 8.6.3. If patching is not immediately possible, the article recommends keeping Redis off the public internet, placing it behind TLS, tightening ACLs, and denying scripting if Lua is not used. Priority should go to internet-exposed instances, shared application credentials, and roles combining CONFIG, scripting, and stream access.\u003c/p\u003e\n"},{"n":3,"title":"CISA warns of cyberattacks targeting fuel tank monitoring systems","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-warns-of-cyberattacks-targeting-fuel-tank-monitoring-systems/","time":"20:21","priority":"MUST READ","score":92,"tldr":"CISA and other U.S. agencies warn that hackers are compromising internet-exposed automatic tank gauge systems used to monitor fuel and liquid storage tanks, potentially disrupting readings, alerts, and pump controls. Operators should remove these systems from direct internet access, harden authentication, patch them, and monitor for unauthorized changes.","briefOverview":"\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners warned that hackers are targeting internet-exposed automatic tank gauge systems. These systems are used to monitor fuel and liquid storage tanks across sectors including Energy, Chemical, Food and Agriculture, and Transportation Systems. The agencies said the activity involves compromising exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eAccording to the advisory, attackers are gaining access through authentication bypass vulnerabilities, hardcoded credentials, operating system command-execution flaws, SQL injection vulnerabilities, and privilege-escalation weaknesses. A successful compromise could let attackers alter network settings, product identifiers, tank volumes, and pump controls. The agencies also warned that attackers could disable alerts and create conditions that prevent operators from properly monitoring tank fill levels, potentially increasing the risk of leaks or equipment failures.\u003c/p\u003e\n\n\u003cp\u003eThe advisory did not attribute the activity to a specific nation-state or threat actor group. The article notes that CNN previously reported Iranian hackers were suspected in similar breaches involving ATG systems at gas stations in multiple states, though sources said attribution may not be possible because limited forensic evidence was left behind. CISA and its partners urged organizations to remove ATG systems from internet exposure, restrict remote access, replace default passwords, use strong credentials and multifactor authentication, apply updates, and monitor for unauthorized changes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a warning about cyberattacks targeting automatic tank gauge systems. ATG systems are used to remotely monitor storage tank levels, temperatures, and potential leaks. The article says these systems are commonly used in the Energy, Chemical, Food and Agriculture, and Transportation Systems sectors.\u003c/p\u003e\n\n\u003cp\u003eThe agencies said the recent malicious activity involves attackers compromising internet-exposed ATG systems and modifying them through command execution. The U.S. government has not attributed the activity to a nation-state or threat actor group. The advisory emphasizes that exposed devices are being targeted when they are reachable from the internet.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several access paths described by the agencies, including authentication bypass vulnerabilities, hardcoded credentials, operating system command-execution flaws, SQL injection vulnerabilities, and privilege-escalation weaknesses. Once inside, attackers could change network settings, product identifiers, tank volumes, and pump controls. They could also turn off alerts, which could interfere with operators’ ability to monitor fill levels.\u003c/p\u003e\n\n\u003cp\u003eThe possible impact described in the article includes an increased risk of leaks or equipment failures if operators cannot properly monitor tank conditions. The article also notes that prior incidents reportedly allowed attackers to access and manipulate display readings without changing actual fuel levels. Those incidents reportedly did not cause physical damage but raised concerns about interference with leak detection and other safety-related functions.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the advisory to earlier CNN reporting that Iranian hackers were behind a series of ATG system breaches at gas stations in multiple states. CNN reported that Iran was the primary suspect because of its history of targeting fuel management systems and other industrial control technologies. However, the article also states that attribution may not be possible because limited forensic evidence was left behind.\u003c/p\u003e\n\n\u003cp\u003eThe agencies urged organizations operating ATG systems to review their exposure and implement mitigations immediately. Recommended actions include blocking ATG systems from the internet, restricting remote access through firewalls, VPNs, or access control lists, replacing default passwords, using strong credentials and multifactor authentication, applying security updates, and actively monitoring for unauthorized changes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners warned that hackers are targeting internet-exposed automatic tank gauge systems. ATG systems are used to monitor fuel and liquid storage tanks across critical infrastructure sectors. The article states that these systems are commonly used in the Energy, Chemical, Food and Agriculture, and Transportation Systems sectors.\u003c/p\u003e\n\n\u003cp\u003eThe advisory says the observed malicious cyber activity involves threat actors compromising internet-exposed ATG systems and then modifying them through command execution. The U.S. government has not attributed the activity to a nation-state or threat actor group.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems-and-sectors\"\u003eAffected Systems and Sectors\u003c/h2\u003e\n\n\u003cp\u003eAutomatic tank gauge systems are used to remotely monitor storage tank levels, temperatures, and potential leaks. The article identifies several sectors where these systems are commonly used:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnergy\u003c/li\u003e\n\u003cli\u003eChemical\u003c/li\u003e\n\u003cli\u003eFood and Agriculture\u003c/li\u003e\n\u003cli\u003eTransportation Systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause these systems support monitoring of fuel and liquid storage tanks, the article emphasizes risks to operational visibility and safety-related monitoring functions.\u003c/p\u003e\n\n\u003ch2 id=\"technical-access-methods\"\u003eTechnical Access Methods\u003c/h2\u003e\n\n\u003cp\u003eAccording to the agencies, attackers are gaining access to exposed systems through multiple weaknesses. The article specifically lists:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAuthentication bypass vulnerabilities\u003c/li\u003e\n\u003cli\u003eHardcoded credentials\u003c/li\u003e\n\u003cli\u003eOperating system command-execution flaws\u003c/li\u003e\n\u003cli\u003eSQL injection vulnerabilities\u003c/li\u003e\n\u003cli\u003ePrivilege-escalation weaknesses\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe advisory describes the activity as involving command execution after compromise. The article does not identify a specific CVE or affected vendor product.\u003c/p\u003e\n\n\u003ch2 id=\"potential-attacker-actions\"\u003ePotential Attacker Actions\u003c/h2\u003e\n\n\u003cp\u003eIf attackers successfully compromise an ATG system, the article says they could alter several types of system settings and controls. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetwork settings\u003c/li\u003e\n\u003cli\u003eProduct identifiers\u003c/li\u003e\n\u003cli\u003eTank volumes\u003c/li\u003e\n\u003cli\u003ePump controls\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that attackers could turn off alerts. This could create conditions that prevent operators from properly monitoring tank fill levels.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not report physical damage from the activity described in the advisory. However, it states that compromised ATG systems could increase the risk of leaks or equipment failures if operators lose accurate monitoring or alerting capability.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses earlier CNN reporting on similar incidents at gas stations in multiple states. In those incidents, attackers reportedly accessed and manipulated display readings, but did not alter the actual fuel levels. The incidents reportedly did not cause physical damage, but raised concerns that attackers could interfere with leak detection and other safety-related functions.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-related-reporting\"\u003eAttribution and Related Reporting\u003c/h2\u003e\n\n\u003cp\u003eThe current advisory does not attribute the activity to a specific threat actor or nation-state. The article notes that this follows CNN reporting in May that Iranian hackers were behind a series of breaches involving ATG systems at gas stations in multiple states.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, CNN reported that attackers exploited ATG systems connected to the internet and protected by weak or nonexistent passwords. CNN also reported that Iran was the primary suspect because of its history of targeting fuel management systems and other industrial control technologies.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article also states that multiple sources briefed on the investigation told CNN it may not be possible to attribute the activity to a specific attacker. The reason given was that limited forensic evidence was left behind in the attacks.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-mitigations\"\u003eRecommended Mitigations\u003c/h2\u003e\n\n\u003cp\u003eCISA and its partners urged organizations operating ATG systems to review their exposure and implement mitigations immediately. The article lists the following recommended actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlock ATG systems from the internet.\u003c/li\u003e\n\u003cli\u003eRestrict remote access through firewalls, VPNs, or access control lists.\u003c/li\u003e\n\u003cli\u003eReplace default passwords.\u003c/li\u003e\n\u003cli\u003eUse strong credentials and multifactor authentication.\u003c/li\u003e\n\u003cli\u003eApply security updates.\u003c/li\u003e\n\u003cli\u003eActively monitor systems for unauthorized changes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe central response message in the article is that organizations should reduce internet exposure, harden access, and monitor ATG systems for changes that could indicate compromise.\u003c/p\u003e\n","keyPoints":["CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners warned that hackers are targeting internet-exposed automatic tank gauge systems used to monitor fuel and liquid storage tanks.","The agencies said attackers are compromising exposed ATG systems and modifying system settings through command execution.","Attackers are gaining access through authentication bypass vulnerabilities, hardcoded credentials, operating system command-execution flaws, SQL injection vulnerabilities, and privilege-escalation weaknesses.","A successful compromise could allow attackers to alter network settings, product identifiers, tank volumes, and pump controls, or turn off alerts that help operators monitor tank fill levels.","The agencies urged organizations to block ATG systems from the internet, restrict remote access, replace default passwords, use strong credentials and multifactor authentication, apply updates, and monitor for unauthorized changes."],"insights":["The advisory highlights that even basic exposure and credential hygiene failures, such as internet connectivity and default or weak passwords, can create safety risks in fuel monitoring environments.","The reported activity is especially concerning because attackers may not need to change actual fuel levels to create operational risk; manipulating readings or disabling alerts can impair operators’ ability to detect leaks or equipment issues.","Attribution remains uncertain despite prior reporting that Iran was suspected, because investigators reportedly found limited forensic evidence left behind in the attacks.","Organizations in multiple sectors beyond gas stations may be affected, since ATG systems are also used in the Energy, Chemical, Food and Agriculture, and Transportation Systems sectors."],"referencedReports":[{"title":"Cybersecurity Advisory on malicious cyber activity targeting internet-exposed automatic tank gauge systems","url":"https://www.ic3.gov/CSA/2026/260602.pdf","publisher":"CISA, FBI, NSA, Department of Energy, and other U.S. government partners","context":"The article cites this advisory as the source for the warning that threat actors are compromising internet-exposed ATG systems and modifying them through command execution.","category":"","primary":false}],"body":"\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners warned that hackers are targeting internet-exposed automatic tank gauge systems. These systems are used to monitor fuel and liquid storage tanks across sectors including Energy, Chemical, Food and Agriculture, and Transportation Systems. The agencies said the activity involves compromising exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eAccording to the advisory, attackers are gaining access through authentication bypass vulnerabilities, hardcoded credentials, operating system command-execution flaws, SQL injection vulnerabilities, and privilege-escalation weaknesses. A successful compromise could let attackers alter network settings, product identifiers, tank volumes, and pump controls. The agencies also warned that attackers could disable alerts and create conditions that prevent operators from properly monitoring tank fill levels, potentially increasing the risk of leaks or equipment failures.\u003c/p\u003e\n\n\u003cp\u003eThe advisory did not attribute the activity to a specific nation-state or threat actor group. The article notes that CNN previously reported Iranian hackers were suspected in similar breaches involving ATG systems at gas stations in multiple states, though sources said attribution may not be possible because limited forensic evidence was left behind. CISA and its partners urged organizations to remove ATG systems from internet exposure, restrict remote access, replace default passwords, use strong credentials and multifactor authentication, apply updates, and monitor for unauthorized changes.\u003c/p\u003e\n"},{"n":5,"title":"CISA warns of active attacks exploiting Android, Linux bugs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-warns-of-active-attacks-exploiting-android-linux-bugs/","time":"15:36","priority":"MUST READ","score":92,"tldr":"CISA says attackers are actively exploiting two high-severity flaws: an Android Framework privilege escalation bug affecting Android 14–16 and a Linux kernel cgroups v1 flaw that can enable container escape and root access. Federal agencies must apply fixes or mitigations by June 5, and other organizations should patch urgently.","briefOverview":"\u003cp\u003eCISA is warning that hackers are exploiting vulnerabilities in the Linux kernel and Android operating system. The agency added CVE-2025-48595 and CVE-2022-0492 to its Known Exploited Vulnerabilities catalog. Federal agencies covered by BOD 22-01 must apply vendor-provided updates and mitigations or stop using the impacted software by June 5.\u003c/p\u003e\n\n\u003cp\u003eCVE-2025-48595 is a high-severity integer overflow vulnerability in the Android Framework that can be leveraged for increased privileges. Google said the flaw affects Android 14 through 16, requires no user interaction to exploit, and may be under limited targeted exploitation in the wild. The issue was addressed in the June 2026 Android security patches.\u003c/p\u003e\n\n\u003cp\u003eCVE-2022-0492 is a high-severity privilege escalation flaw affecting multiple Linux kernel branches. The flaw lies in the cgroups v1 subsystem and can allow a local attacker to bypass namespace isolation, escalate privileges, and potentially escape from a container to gain root-level access on the host system. Neither flaw is marked by CISA as being exploited by ransomware groups.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency is warning that hackers are exploiting vulnerabilities in the Linux kernel and Android operating system. CISA added two flaws, CVE-2025-48595 and CVE-2022-0492, to its Known Exploited Vulnerabilities catalog. The catalog listing requires federal agencies covered by BOD 22-01 to apply vendor-provided security updates and mitigations or stop using the impacted software.\u003c/p\u003e\n\n\u003cp\u003eCVE-2025-48595 is a high-severity integer overflow vulnerability in the Android Framework. The flaw can be leveraged for increased privileges and affects Android 14 through 16. According to Google’s recent security bulletin, it requires no user interaction to exploit.\u003c/p\u003e\n\n\u003cp\u003eGoogle said CVE-2025-48595 may be under limited targeted exploitation in the wild. The company did not provide specific details about the activity, technical information about the flaw, or information about the incidents. The issue was addressed with the June 2026 security patches, including the 2026-06-01 and 2026-06-05 security patch levels.\u003c/p\u003e\n\n\u003cp\u003eCVE-2022-0492 is a high-severity privilege escalation flaw affecting multiple Linux kernel branches, including versions from 2.6 through 4.20 and from 5.5 through 5.17. The vulnerability is located in the cgroup_release_agent_write() function of the cgroups v1 subsystem. Because of insufficient authentication checks, a local attacker can abuse it to bypass namespace isolation, escalate privileges, and potentially escape from a container to gain root-level access on the host system.\u003c/p\u003e\n\n\u003cp\u003ePast reports from Aqua Security and Palo Alto Networks said CVE-2022-0492 primarily affects containerized environments using cgroups v1. The article notes that the issue is especially dangerous when containers are granted elevated capabilities. The Linux kernel versions that address the issue include 4.9.301+, 4.14.266+, 4.19.229+, 5.4.177+, 5.10.97+, 5.15.20+, 5.16.6+, and 5.17-rc3+.\u003c/p\u003e\n\n\u003cp\u003eCISA set the deadline for June 5 for federal agencies to address the two vulnerabilities. The KEV catalog also serves as a notice board for critical infrastructure entities and large organizations, which the article says should take security measures against these flaws with the same urgency. Neither vulnerability is marked as exploited by ransomware groups in CISA’s KEV entries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency is warning that hackers are exploiting vulnerabilities in the Linux kernel and Android operating system. CISA added two high-severity flaws to its Known Exploited Vulnerabilities catalog: CVE-2025-48595 and CVE-2022-0492.\u003c/p\u003e\n\n\u003cp\u003eThe KEV listing means federal agencies bound by the BOD 22-01 directive must apply vendor-provided security updates and mitigations or stop using the impacted software. CISA set the deadline for June 5. The article also notes that the KEV catalog serves as a notice board for critical infrastructure entities and large organizations, which should take security measures against these flaws with the same urgency.\u003c/p\u003e\n\n\u003ch2 id=\"android-framework-flaw-cve-2025-48595\"\u003eAndroid Framework flaw: CVE-2025-48595\u003c/h2\u003e\n\n\u003cp\u003eCVE-2025-48595 is described as a high-severity integer overflow vulnerability in the Android Framework. The flaw can be leveraged for increased privileges.\u003c/p\u003e\n\n\u003cp\u003eAccording to Google’s recent security bulletin, the issue affects Android 14 through 16. The article states that no user interaction is required to exploit the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eGoogle indicated that CVE-2025-48595 may be under limited targeted exploitation in the wild. However, the company did not provide specific details about the exploitation activity, technical information about the flaw, or details about the incidents.\u003c/p\u003e\n\n\u003cp\u003eThe issue has been addressed with the June 2026 Android security patches. The article identifies the relevant security patch levels as 2026-06-01 and 2026-06-05.\u003c/p\u003e\n\n\u003ch2 id=\"linux-kernel-flaw-cve-2022-0492\"\u003eLinux kernel flaw: CVE-2022-0492\u003c/h2\u003e\n\n\u003cp\u003eCISA also added CVE-2022-0492 to the KEV catalog. The article describes it as a high-severity privilege escalation flaw affecting multiple Linux kernel branches.\u003c/p\u003e\n\n\u003cp\u003eThe affected kernel branches include versions from 2.6 through 4.20 and from 5.5 through 5.17. The flaw is located in the cgroup_release_agent_write() function of the cgroups v1 subsystem.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists because of insufficient authentication checks. According to the article, a local attacker can abuse the flaw to bypass namespace isolation, escalate privileges, and potentially escape from a container to gain root-level access on the host system.\u003c/p\u003e\n\n\u003cp\u003ePast reports from Aqua Security and Palo Alto Networks said the issue primarily affects containerized environments using cgroups v1. The article adds that the flaw is especially dangerous when containers are granted elevated capabilities.\u003c/p\u003e\n\n\u003ch2 id=\"linux-kernel-versions-that-address-cve-2022-0492\"\u003eLinux kernel versions that address CVE-2022-0492\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following Linux kernel versions as addressing the issue:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e4.9.301+\u003c/li\u003e\n\u003cli\u003e4.14.266+\u003c/li\u003e\n\u003cli\u003e4.19.229+\u003c/li\u003e\n\u003cli\u003e5.4.177+\u003c/li\u003e\n\u003cli\u003e5.10.97+\u003c/li\u003e\n\u003cli\u003e5.15.20+\u003c/li\u003e\n\u003cli\u003e5.16.6+\u003c/li\u003e\n\u003cli\u003e5.17-rc3+\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"required-response-and-urgency\"\u003eRequired response and urgency\u003c/h2\u003e\n\n\u003cp\u003eBy adding CVE-2025-48595 and CVE-2022-0492 to the KEV catalog, CISA requires federal agencies covered by BOD 22-01 to address the flaws. Agencies must apply the available vendor-provided security updates and mitigations or stop using the affected software.\u003c/p\u003e\n\n\u003cp\u003eThe article states that CISA set the deadline for June 5. It also says critical infrastructure entities and large organizations should treat the KEV listing as a notice to act with the same urgency.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-status\"\u003eRansomware status\u003c/h2\u003e\n\n\u003cp\u003eNeither of the two vulnerabilities is marked as exploited by ransomware groups. The article notes that CISA uses this specific KEV flag to highlight additional severity and patching urgency.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2025-48595, a high-severity integer overflow vulnerability in the Android Framework that can be leveraged for increased privileges, to its Known Exploited Vulnerabilities catalog.","Google said CVE-2025-48595 affects Android 14 through 16, requires no user interaction to exploit, and may be under limited targeted exploitation in the wild.","CISA also added CVE-2022-0492, a high-severity privilege escalation flaw affecting multiple Linux kernel branches from 2.6 through 4.20 and from 5.5 through 5.17, to the KEV catalog.","CVE-2022-0492 is in the cgroups v1 subsystem and can allow a local attacker to bypass namespace isolation, escalate privileges, and potentially escape from a container to gain root-level access on the host system.","Federal agencies covered by BOD 22-01 must apply vendor-provided updates and mitigations for the two flaws or stop using the impacted software by June 5."],"insights":["CVE-2025-48595 is especially urgent for Android device owners because Google says exploitation requires no user interaction and may already be occurring in limited targeted attacks.","CVE-2022-0492 is most dangerous in containerized environments that still use cgroups v1, particularly when containers have elevated capabilities.","The Linux flaw has already been fixed across specific kernel release lines, so organizations can verify exposure by checking whether their kernel versions meet the listed patched minimums.","Although CISA added both flaws to the KEV catalog, neither entry is flagged as being exploited by ransomware groups."],"referencedReports":[{"title":"New Linux Kernel Vulnerability Escaping Containers by Abusing Cgroups","url":"https://www.aquasec.com/blog/new-linux-kernel-vulnerability-escaping-containers-by-abusing-cgroups/","publisher":"Aqua Security","context":"The article cites Aqua Security's past report to explain that CVE-2022-0492 primarily affects containerized environments using cgroups v1 and is especially dangerous with elevated container capabilities.","category":"","primary":false},{"title":"CVE-2022-0492: Linux Kernel Vulnerability Enables Container Escape","url":"https://unit42.paloaltonetworks.com/cve-2022-0492-cgroups/","publisher":"Palo Alto Networks Unit 42","context":"The article cites Palo Alto Networks' past report to support its description of CVE-2022-0492's impact on containerized environments using cgroups v1.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"http://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article references CISA's KEV catalog as the source for the federal remediation deadline and the inclusion of the two actively exploited flaws.","category":"","primary":false}],"body":"\u003cp\u003eCISA is warning that hackers are exploiting vulnerabilities in the Linux kernel and Android operating system. The agency added CVE-2025-48595 and CVE-2022-0492 to its Known Exploited Vulnerabilities catalog. Federal agencies covered by BOD 22-01 must apply vendor-provided updates and mitigations or stop using the impacted software by June 5.\u003c/p\u003e\n\n\u003cp\u003eCVE-2025-48595 is a high-severity integer overflow vulnerability in the Android Framework that can be leveraged for increased privileges. Google said the flaw affects Android 14 through 16, requires no user interaction to exploit, and may be under limited targeted exploitation in the wild. The issue was addressed in the June 2026 Android security patches.\u003c/p\u003e\n\n\u003cp\u003eCVE-2022-0492 is a high-severity privilege escalation flaw affecting multiple Linux kernel branches. The flaw lies in the cgroups v1 subsystem and can allow a local attacker to bypass namespace isolation, escalate privileges, and potentially escape from a container to gain root-level access on the host system. Neither flaw is marked by CISA as being exploited by ransomware groups.\u003c/p\u003e\n"},{"n":24,"title":"Impersonation, Click Hijacking, and TDS: Inside a Malware Distribution Ecosystem","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/impersonation-click-hijacking-and-tds-inside-a-malware-distribution-ecosystem/","time":"13:21","priority":"SHOULD READ","score":89,"tldr":"Check Point Research found a large malware distribution ecosystem using fake open-source and freeware download sites that preserve legitimate-looking links but hijack the first click into a gated traffic distribution system. Depending on filtering and user context, victims were routed to payloads including SessionGate, RemusStealer, and AnimateClipper.","briefOverview":"\u003cp\u003eCheck Point Research investigated a large-scale malware distribution ecosystem that impersonates open-source and freeware projects to capture search traffic. The fake sites include lookalikes for security and researcher tools such as Ghidra, dnSpy, and SpiderFoot, as well as developer and utility tools. The pages often appear polished and may reference real upstream resources, but the deception occurs when users interact with download links.\u003c/p\u003e\n\n\u003cp\u003eThe sites load CloudFront-hosted JavaScript that can intercept the first eligible download click and redirect the user into a gated Traffic Distribution System. The TDS applies controls such as first-visit state, click confirmation, anti-bot and anti-analysis logic, VPN and datacenter filtering, and frequency capping. Observed downstream paths routed some users to benign software or potentially unwanted applications, while other paths delivered SessionGate, RemusStealer, and AnimateClipper.\u003c/p\u003e\n\n\u003cp\u003eSessionGate stood out because it uses multi-stage delivery, decoy 7-Zip SFX behavior, heavy obfuscation, server-side validation, and per-session keying that makes final payload analysis difficult. RemusStealer was described as a C2-driven infostealer targeting browser data, extensions, password managers, wallets, 2FA tools, files, registry data, clipboard contents, and screenshots. AnimateClipper was delivered through a ClickFix-style chain and monitored the clipboard to replace cryptocurrency wallet addresses with attacker-controlled addresses.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research analyzed a large-scale operation built around fake open-source and freeware project websites. The impersonated brands include tools trusted by technical users, such as Ghidra, dnSpy, ILSpy, SpiderFoot, grpcurl, MQTT Explorer, MFCMAPI, WinSetupFromUSB, CrystalDiskMark, and GUIFormat. The article states that some fake project portals appeared high in Google search results, making users more likely to trust them.\u003c/p\u003e\n\n\u003cp\u003eThe fake sites preserve legitimate-looking link destinations, sometimes pointing to real GitHub releases, while loading CloudFront-hosted JavaScript that changes what happens after interaction. The script can intercept the first eligible click on a download link, prevent the normal navigation, and redirect the browser into a Traffic Distribution System. The TDS uses gating such as first-visit state, mandatory click confirmation, anti-bot and anti-analysis checks, VPN and datacenter filtering, browser fingerprinting, geography, client context, and frequency caps.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the ecosystem primarily as traffic acquisition and monetization infrastructure rather than as sites built exclusively for malware distribution. However, Check Point Research observed multiple downstream redirect paths that led to malware delivery infrastructure. Some attempts resulted in benign downloads such as Opera or potentially unwanted applications, while other branches delivered SessionGate, RemusStealer, and AnimateClipper.\u003c/p\u003e\n\n\u003cp\u003eSessionGate is described as a previously unknown multi-stage loader used in observed chains to deliver potentially unwanted applications. It uses short-lived, per-client download URLs, server-side validation, embedded 7-Zip SFX decoy content, environment checks, obfuscation, in-memory loading, encrypted embedded DLLs, and C2-mediated key material. The article emphasizes that the final payload can be difficult to obtain because the correct decryption material may be released only once for the intended victim session.\u003c/p\u003e\n\n\u003cp\u003eThe RemusStealer branch used a password-protected ZIP archive containing an oversized executable with zero-filled padding and a Go loader that manually maps an embedded payload. RemusStealer uses encrypted C2-driven tasking to collect browser data, extension data, files, registry values, clipboard contents, and screenshots, with particular focus on cryptocurrency wallets, password managers, and 2FA extensions. The AnimateClipper branch used a ClickFix-style page, mshta, obfuscated VBScript and PowerShell stages, a bundled Python environment, shellcode, and an on-chain C2 resolution mechanism via BNB Smart Chain Testnet before running a clipboard-hijacking crypto clipper.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research investigated a large-scale malware distribution ecosystem that impersonates open-source and freeware project websites to capture search traffic. The fake sites include lookalikes for widely trusted tools, including security and researcher tooling such as Ghidra, dnSpy, ILSpy, and SpiderFoot, as well as developer and utility projects such as grpcurl, MQTT Explorer, MFCMAPI, WinSetupFromUSB, CrystalDiskMark, and GUIFormat.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the sites are not obviously suspicious at first glance. They are professionally designed, may appear high in Google search results, and often preserve visible links to legitimate upstream resources such as GitHub releases. The core deception is not only in the page design, but in what happens after the user clicks a download button or link.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-prior-reporting\"\u003eRelationship to prior reporting\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the broader phenomenon of websites impersonating popular open-source and freeware projects had already been documented by late 2025. It specifically references a November 2025 Fullstory report that identified a large cluster of fraudulent domains and did not find direct abuse in examined samples at that time, while warning about downstream phishing or watering-hole-style risks.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research states that the ecosystem evolved by at least December 2025, when sites in the cluster had embedded Traffic Distribution System scripts. From early January 2026 onward, Check Point Research recorded active malware distribution through the same infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"click-interception-and-tds-routing\"\u003eClick interception and TDS routing\u003c/h2\u003e\n\n\u003cp\u003eThe fake sites load CloudFront-hosted JavaScript staging scripts from Amazon CloudFront. The scripts follow consistent URL patterns using CloudFront domains and campaign-style identifiers, and Check Point Research identified more than 100 active websites embedding them.\u003c/p\u003e\n\n\u003cp\u003eA key tactic is that the visible download link can remain legitimate-looking. For example, hovering over a download button may show a real GitHub repository URL, because the original \u003ccode\u003ehref\u003c/code\u003e remains intact. However, browser-side JavaScript can intercept the first eligible user interaction and send the browser to a TDS-controlled destination instead.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several technical behaviors used by the script:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt can use different primary events depending on browser type, such as \u003ccode\u003emousedown\u003c/code\u003e on desktop Chrome and \u003ccode\u003eclick\u003c/code\u003e on desktop Firefox.\u003c/li\u003e\n\u003cli\u003eIt can use capture-phase event handlers to intercept the interaction before normal navigation proceeds.\u003c/li\u003e\n\u003cli\u003eIt records the user’s intended destination and forwards it downstream.\u003c/li\u003e\n\u003cli\u003eIt can invoke different serving methods, including cached \u003ccode\u003ewindow.open\u003c/code\u003e, temporary blank tabs, or dynamically created anchor elements.\u003c/li\u003e\n\u003cli\u003eIt calls \u003ccode\u003epreventDefault()\u003c/code\u003e and \u003ccode\u003estopImmediatePropagation()\u003c/code\u003e to cancel the visible link navigation and block other handlers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe routing logic also uses browser-side state and frequency caps, including \u003ccode\u003elocalStorage\u003c/code\u003e. This creates a reproducibility issue because the first eligible click may trigger the TDS path, while later refreshes, repeated clicks, or return visits may fall back to the original visible link target.\u003c/p\u003e\n\n\u003ch2 id=\"tds-gating-and-branching\"\u003eTDS gating and branching\u003c/h2\u003e\n\n\u003cp\u003eAfter the click handoff, sessions enter a sequence of redirects. Check Point Research observed all tested sessions first redirecting to \u003ccode\u003eoundhertobeconsist[.]org/\u0026lt;token\u0026gt;\u003c/code\u003e, but notes that this domain was not hardcoded in the page or scripts and was supplied dynamically through decoded CloudFront stage configuration.\u003c/p\u003e\n\n\u003cp\u003eThe TDS applies multiple forms of gating and routing. The article describes controls and inputs including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003efirst-visit state,\u003c/li\u003e\n\u003cli\u003emandatory click confirmation,\u003c/li\u003e\n\u003cli\u003eanti-bot and anti-analysis logic,\u003c/li\u003e\n\u003cli\u003eVPN and datacenter filtering,\u003c/li\u003e\n\u003cli\u003egeography,\u003c/li\u003e\n\u003cli\u003ebrowser type,\u003c/li\u003e\n\u003cli\u003ebrowser fingerprint,\u003c/li\u003e\n\u003cli\u003eclick context,\u003c/li\u003e\n\u003cli\u003eoriginal entry domain,\u003c/li\u003e\n\u003cli\u003efrequency caps.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDifferent branches produced different outcomes. Some sessions were routed to an offer wall or content locker, affiliate-tagged downloads of legitimate software, potentially unwanted applications, or benign software such as Opera. Other branches led to malware delivery infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-observed\"\u003eMalware families observed\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research observed several malware families downstream of the TDS infrastructure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSessionGate\u003c/strong\u003e, a previously unknown multi-stage loader with heavy obfuscation and extensive anti-analysis measures, observed delivering potentially unwanted applications.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRemusStealer\u003c/strong\u003e, a newly emerged infostealer targeting browser data, cryptocurrency wallets, two-factor authentication tools, password managers, files, registry values, clipboard contents, and screenshots.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnimateClipper\u003c/strong\u003e, a cryptocurrency clipper capable of hijacking transactions across more than 20 blockchain ecosystems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that VirusTotal telemetry showed more than 5,000 total submissions across relevant samples, indicating substantial reach within the subset visible through public sharing.\u003c/p\u003e\n\n\u003ch2 id=\"sessiongate-delivery-chain\"\u003eSessionGate delivery chain\u003c/h2\u003e\n\n\u003cp\u003eSessionGate drew attention because of its multi-stage delivery chain, validation logic, and anti-analysis approach. The article states that VirusTotal telemetry for individual SessionGate-associated samples reached approximately 2,000 to 3,500 submissions, with notable visibility in Turkey, Poland, Brazil, Germany, France, Russia, and the United Kingdom.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research identified two landing pages initiating downloads of SessionGate samples:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eoriginaldownloads[.]info\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egetfluxfile[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEach landing page generates a short-lived, unique payload download URL per client session, bound to the client’s browser and IP address. The HTML page contains obfuscated JavaScript that performs server-side validation through \u003ccode\u003ejavascriptapiusa[.]com/lic?\u003c/code\u003e before allowing access to the executable payload.\u003c/p\u003e\n\n\u003ch2 id=\"sessiongate-decoy-and-obfuscation\"\u003eSessionGate decoy and obfuscation\u003c/h2\u003e\n\n\u003cp\u003eThe SessionGate loader contains an embedded 7-Zip archive and can fall back to a benign installer experience when the gated delivery path does not proceed. The article notes that the downloaded archive is about 20 MB, while the visible contained file is about 15 MB, with the remaining approximately 5 MB consisting of heavily obfuscated loader code.\u003c/p\u003e\n\n\u003cp\u003eThe loader uses several obfuscation techniques, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003einjected junk code,\u003c/li\u003e\n\u003cli\u003eopaque predicates,\u003c/li\u003e\n\u003cli\u003estring encryption,\u003c/li\u003e\n\u003cli\u003elarge bloated functions that can exceed 500 KB,\u003c/li\u003e\n\u003cli\u003eencrypted string blobs placed inside function bodies after conditional branches.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese techniques can disrupt static analysis tools, including IDA’s decompiler and graph mode, and can cause disassemblers to misinterpret string data as executable code.\u003c/p\u003e\n\n\u003ch2 id=\"sessiongate-environment-checks-and-c2-gating\"\u003eSessionGate environment checks and C2 gating\u003c/h2\u003e\n\n\u003cp\u003eThe SessionGate loader performs environment checks that influence whether it proceeds with delivery or falls back to decoy behavior. It checks for certain services using Adler-32 hashes rather than plaintext service names, including indicators such as \u003ccode\u003eeelam\u003c/code\u003e, \u003ccode\u003eehdrv\u003c/code\u003e, \u003ccode\u003eeamonm\u003c/code\u003e, \u003ccode\u003eepfwwfp\u003c/code\u003e, \u003ccode\u003eepfw\u003c/code\u003e, \u003ccode\u003eekbdflt\u003c/code\u003e, \u003ccode\u003eedevmon\u003c/code\u003e, \u003ccode\u003enpf\u003c/code\u003e, \u003ccode\u003enpcap\u003c/code\u003e, and \u003ccode\u003esysmondrv\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIt also enumerates running processes using Toolhelp-based scanning and compares indicators through hash-based logic. Additional checks include Windows Defender PUA/PUS-related registry settings and Windows Enterprise edition detection.\u003c/p\u003e\n\n\u003cp\u003eThe loader communicates with C2 domains such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eappfreshstart[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eappgetonline[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ewebinnosetup[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eappmakingcenter[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe C2 requests use a distinctive URL structure, include stage-specific encrypted tokens, and use the User-Agent \u003ccode\u003eNSIS_InetLoad (Mozilla)\u003c/code\u003e. The loader calculates a signature using SHA1 over a base path, timestamp, and salt. For check-in responses, the loader sums decimal digits in a returned hex string and aborts execution if the resulting value is even.\u003c/p\u003e\n\n\u003ch2 id=\"sessiongate-stage-2-and-dll-keying\"\u003eSessionGate stage 2 and DLL keying\u003c/h2\u003e\n\n\u003cp\u003eThe second-stage SessionGate binary is another large Windows GUI executable that impersonates a 7-Zip SFX installer. It contains a PDB path, \u003ccode\u003eD:\\code\\cpp-downloader-scb-reg-other\\Plugins\\7ZipDownloader\\Output\\SFXWin.pdb\u003c/code\u003e, which Check Point Research used to find more than 200 similar samples on VirusTotal, with the earliest appearing in late August 2025.\u003c/p\u003e\n\n\u003cp\u003eThe second stage validates its command line, requiring a numeric token and a base64-looking string. If the checks fail, it falls back to benign 7-Zip SFX behavior. If the gate passes, it reads its own image, extracts two embedded DLL payloads, decrypts them using AES-CBC, and loads them in memory via manual PE mapping.\u003c/p\u003e\n\n\u003cp\u003eDLL #1 acts as a key broker. It validates the command line, decrypts the base64 argument using AES-256-CBC with a hardcoded key and zero IV, checks a filename suffix pattern, performs anti-analysis checks, and contacts CRC C2 domains such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eyourfastcrc[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emobileversioncrc[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ewebcrcprove[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eintegritycrc[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe CRC request includes the uppercase SHA-256 hash of the stage-2 loader. The server returns token material that DLL #1 transforms into a 32-character base62 token, which is then used to derive AES key material for DLL #2. Check Point Research observed that the CRC endpoint can return different values for the same loader hash, and assesses that the key release may be tied to one-time semantics and victim context such as IP address or session state.\u003c/p\u003e\n\n\u003ch2 id=\"sessiongate-final-module-behavior\"\u003eSessionGate final module behavior\u003c/h2\u003e\n\n\u003cp\u003eAfter successfully decrypting DLL #2, Check Point Research found a network-controlled installer or bundler framework. The article states that this module did not show stealer or RAT behavior in the analyzed sample. Instead, it implements configurable delivery and silent installation of additional software.\u003c/p\u003e\n\n\u003cp\u003eThe module’s workflow includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ebuilding an encrypted request,\u003c/li\u003e\n\u003cli\u003eretrieving encrypted configuration from a C2 server such as \u003ccode\u003eappmakingcenter[.]com\u003c/code\u003e,\u003c/li\u003e\n\u003cli\u003edecoding configuration into a key/value table,\u003c/li\u003e\n\u003cli\u003eretrieving a product download URL,\u003c/li\u003e\n\u003cli\u003edownloading a payload,\u003c/li\u003e\n\u003cli\u003eexecuting it silently via \u003ccode\u003ecmd.exe\u003c/code\u003e,\u003c/li\u003e\n\u003cli\u003esending telemetry and tracking events.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe module contains product-facing strings and expected install paths for products including PDF Spark, PDF Proton, PDF Ignite, PDF Skill, Document Sparkle, NibblrAI, and PCPooch. The actual download URL is supplied dynamically by backend configuration, with a hardcoded 7-Zip installer URL used as a fallback if the configuration lacks the relevant key.\u003c/p\u003e\n\n\u003ch2 id=\"remusstealer-branch\"\u003eRemusStealer branch\u003c/h2\u003e\n\n\u003cp\u003eIn the RemusStealer case, the TDS chain ends at a landing page that provides a link to a password-protected ZIP archive and the password needed to open it. The extracted executable is about 850 MB on disk, but is artificially inflated with zero-filled padding, with roughly 32 MB of non-zero content after padding is removed.\u003c/p\u003e\n\n\u003cp\u003eThe executable is a first-stage loader written in Go. It contains an embedded malicious payload in \u003ccode\u003e.rdata\u003c/code\u003e, decodes it at runtime, and executes it through manual PE mapping.\u003c/p\u003e\n\n\u003cp\u003eThe embedded payload is RemusStealer, described as a C2-controlled infostealer and Malware-as-a-Service product. The article states that the first public listing observed for “Remus” was posted on a Russian-language underground forum by a user named \u003ccode\u003eRemusStealer\u003c/code\u003e on February 12, 2026, with two advertised subscription tiers.\u003c/p\u003e\n\n\u003ch2 id=\"remusstealer-capabilities\"\u003eRemusStealer capabilities\u003c/h2\u003e\n\n\u003cp\u003eRemusStealer uses encrypted C2-driven tasking. The server defines what to collect by sending encrypted JSON tasks, and the agent executes tasks sequentially until the server sends a stop command.\u003c/p\u003e\n\n\u003cp\u003eThe article lists RemusStealer capabilities including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChromium browser data theft, including \u003ccode\u003eHistory\u003c/code\u003e, \u003ccode\u003eLogin Data\u003c/code\u003e, \u003ccode\u003eLogin Data For Account\u003c/code\u003e, \u003ccode\u003eNetwork\\Cookies\u003c/code\u003e, and \u003ccode\u003eWeb Data\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eFirefox/NSS profile collection, including \u003ccode\u003ekey4.db\u003c/code\u003e, \u003ccode\u003ecert9.db\u003c/code\u003e, \u003ccode\u003ecookies.sqlite\u003c/code\u003e, \u003ccode\u003elogins.json\u003c/code\u003e, \u003ccode\u003eformhistory.sqlite\u003c/code\u003e, \u003ccode\u003eplaces.sqlite\u003c/code\u003e, \u003ccode\u003eprefs.js\u003c/code\u003e, and \u003ccode\u003eextensions.webextensions.uuids\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eChromium master key extraction from \u003ccode\u003eLocal State\u003c/code\u003e using DPAPI and upload as a \u003ccode\u003e/Key\u003c/code\u003e artifact.\u003c/li\u003e\n\u003cli\u003eExtension-driven theft using server-provided extension target lists.\u003c/li\u003e\n\u003cli\u003eServer-controlled file system search and exfiltration with environment variable expansion.\u003c/li\u003e\n\u003cli\u003eServer-controlled registry reconnaissance.\u003c/li\u003e\n\u003cli\u003eClipboard theft.\u003c/li\u003e\n\u003cli\u003eScreenshot capture when enabled by an internal flag.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe captured C2 traffic included 332 browser extension identifiers. The targeting was heavily skewed toward cryptocurrency wallets, password managers, and 2FA extensions, including examples such as 1Password, Bitwarden, LastPass, Dashlane, Keeper, RoboForm, NordPass, Proton Pass, KeePassXC, Zoho Vault, MetaMask, Rabby Wallet, Coinbase Wallet, Trust Wallet, OKX Wallet, Binance Wallet, Bitget Wallet, Phantom, Solflare Wallet, Keplr, Cosmostation, SubWallet, TronLink, Exodus, Ronin Wallet, Tonkeeper, MyTonWallet, Yoroi, UniSat Wallet, Suiet, Pontem, Authy, and 2FAS.\u003c/p\u003e\n\n\u003ch2 id=\"animateclipper-branch\"\u003eAnimateClipper branch\u003c/h2\u003e\n\n\u003cp\u003eThe AnimateClipper branch led to a ClickFix-style phishing page at \u003ccode\u003eprocessing-in-progress-x4.t3.storage[.]dev\u003c/code\u003e. The page imitated a Cloudflare verification screen and instructed the user to run \u003ccode\u003emshta.exe\u003c/code\u003e with a remote URL pointing to \u003ccode\u003ehttps://185.0xA1.0xFB[.]58/navy.7z\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe fetched object was not a normal 7-Zip archive. Its beginning contained an HTA page with obfuscated VBScript, while the appended archive content was benign decoy data. The VBScript retrieved a resource from \u003ccode\u003ehttp://194.150.220[.]218/4SLEYpfAk57hGubo/fo0suc2ki2.rtf\u003c/code\u003e, which was actually a heavily obfuscated PowerShell script.\u003c/p\u003e\n\n\u003cp\u003eThe PowerShell chain reconstructed an additional PowerShell stage in memory, used an RC4-based routine to decrypt the next payload, and then downloaded \u003ccode\u003ehttps://cdn-1415.brightcanvas[.]digital/fo0suc2ki2.rtf\u003c/code\u003e. That file was a ZIP archive containing a bundled Python environment, third-party libraries, Node.js modules, and a large obfuscated Python script stored as \u003ccode\u003enode_modules.asar\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe Python loader embedded shellcode, copied it into executable memory, and transferred execution to it through \u003ccode\u003entdll!LdrCallEnclave\u003c/code\u003e. The shellcode then decrypted and decompressed an embedded payload container and manually mapped the resulting PE payload in the same process.\u003c/p\u003e\n\n\u003ch2 id=\"animateclipper-final-payload\"\u003eAnimateClipper final payload\u003c/h2\u003e\n\n\u003cp\u003eThe final payload is a cryptocurrency clipper. It monitors the clipboard for cryptocurrency wallet strings, identifies wallet formats locally, replaces copied addresses with attacker-controlled wallet addresses embedded in the sample, and writes the modified value back to the clipboard.\u003c/p\u003e\n\n\u003cp\u003eAnimateClipper resolves its C2 by querying a smart contract over the public BNB Smart Chain Testnet JSON-RPC endpoint. At the time of analysis, the contract response resolved to the C2 domain \u003ccode\u003ekr.hugo-lapp[.]co\u003c/code\u003e. The malware uses HTTPS to communicate with the resolved C2 and includes logic for periodic \u003ccode\u003erefresh\u003c/code\u003e check-ins and reporting address-replacement activity.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research also reviewed incoming transactions to wallet addresses embedded in the analyzed sample. In the dataset examined, the earliest inbound payments were recorded in July 2025, with the first observed transaction dated July 12, 2025. The article states that this indicates the operation has likely been active for a prolonged period and that the TDS-driven infection chain may be one of several distribution paths used to deploy the malware.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-impact\"\u003eSignificance and impact\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central conclusion is that a polished website and a legitimate-looking visible link are not reliable security signals. The impersonation sites can appear official, rank well in search results, and show real upstream URLs on hover, yet still redirect the first download interaction into a gated TDS stack.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s significance lies in how the TDS acts as a broker between traffic acquisition infrastructure and downstream delivery operators. The same search-driven traffic pipeline can route different users to different outcomes, including benign offers, potentially unwanted applications, or malware. The article states that attribution and accountability are made harder because the impersonation operator does not need to be the malware author to enable malware delivery at scale.\u003c/p\u003e\n\n\u003ch2 id=\"protections-and-indicators\"\u003eProtections and indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Check Point Threat Emulation and Harmony Endpoint provide coverage for the attacks and threats described. It also provides indicators of compromise, including SHA-256 hashes for SessionGate, AnimateClipper, and RemusStealer samples, as well as domains and URLs associated with SessionGate C2s, RemusStealer C2s, and AnimateClipper infrastructure.\u003c/p\u003e\n","keyPoints":["Check Point Research investigated a large-scale operation that impersonates open-source and freeware projects, including security tools such as Ghidra, dnSpy, and SpiderFoot, to capture search traffic.","The fake sites load CloudFront-hosted JavaScript that can intercept a user's first download click and hand the session to a gated Traffic Distribution System with anti-bot, anti-analysis, VPN/datacenter filtering, and frequency-capping logic.","Observed redirect chains sometimes led to benign software or potentially unwanted applications, but other branches delivered malware families including SessionGate, RemusStealer, and AnimateClipper.","SessionGate uses multi-stage delivery, per-session payload generation, server-side validation, one-time-style key release behavior, and heavy obfuscation to make final payload retrieval and analysis difficult.","RemusStealer targets browser data, cryptocurrency wallet extensions, password managers, 2FA extensions, clipboard contents, screenshots, files, and registry data through encrypted C2-driven tasking."],"insights":["The fake download pages can appear trustworthy even under hover inspection because they preserve legitimate upstream href values, while JavaScript intercepts the actual click event and redirects the user elsewhere.","The campaign creates a reproducibility trap for analysts because the first eligible click may trigger the malicious TDS path, while refreshes, repeated clicks, or return visits can fall back to the visible legitimate link.","SessionGate’s decoy 7-Zip SFX behavior can cause sandboxes and analysts to observe only a normal installer experience when the gated delivery path does not proceed.","SessionGate’s DLL #2 may be undecryptable without the correct one-time server-provided key material tied to the matching session, IP context, and generated build.","AnimateClipper resolves its C2 through a BNB Smart Chain Testnet smart contract, while its replacement cryptocurrency wallet addresses are embedded directly in the binary."],"referencedReports":[{"title":"Inside a Global Campaign Hijacking Open-Source Project Identities","url":"https://www.fullstory.com/blog/inside-a-global-campaign-hijacking-open-source-project-identities/","publisher":"Fullstory","context":"The article cites Fullstory’s November 2025 report as prior documentation of fraudulent domains impersonating popular open-source and freeware projects.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point Research investigated a large-scale malware distribution ecosystem that impersonates open-source and freeware projects to capture search traffic. The fake sites include lookalikes for security and researcher tools such as Ghidra, dnSpy, and SpiderFoot, as well as developer and utility tools. The pages often appear polished and may reference real upstream resources, but the deception occurs when users interact with download links.\u003c/p\u003e\n\n\u003cp\u003eThe sites load CloudFront-hosted JavaScript that can intercept the first eligible download click and redirect the user into a gated Traffic Distribution System. The TDS applies controls such as first-visit state, click confirmation, anti-bot and anti-analysis logic, VPN and datacenter filtering, and frequency capping. Observed downstream paths routed some users to benign software or potentially unwanted applications, while other paths delivered SessionGate, RemusStealer, and AnimateClipper.\u003c/p\u003e\n\n\u003cp\u003eSessionGate stood out because it uses multi-stage delivery, decoy 7-Zip SFX behavior, heavy obfuscation, server-side validation, and per-session keying that makes final payload analysis difficult. RemusStealer was described as a C2-driven infostealer targeting browser data, extensions, password managers, wallets, 2FA tools, files, registry data, clipboard contents, and screenshots. AnimateClipper was delivered through a ClickFix-style chain and monitored the clipboard to replace cryptocurrency wallet addresses with attacker-controlled addresses.\u003c/p\u003e\n"},{"n":2,"title":"New 'HTTP/2 Bomb' DoS attack crashes web servers in under a minute","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-http-2-bomb-dos-attack-crashes-web-servers-in-under-a-minute/","time":"19:08","priority":"SHOULD READ","score":88,"tldr":"Researchers disclosed “HTTP/2 Bomb,” a DoS technique that can crash major web servers by exhausting tens of gigabytes of memory from a single machine in seconds. NGINX and Apache have patches, but IIS, Envoy, and Cloudflare Pingora lacked fixes at the time, making mitigations like disabling HTTP/2 or enforcing header limits important.","briefOverview":"\u003cp\u003eA new denial-of-service technique called HTTP/2 Bomb can be launched from a single machine to take down web servers within seconds. The article says it works against default HTTP/2 configurations of major web servers including NGINX, Apache HTTP Server, Microsoft IIS, Envoy, and Cloudflare Pingora. Researchers at Calif said a single client on a 100 Mbps connection can exhaust tens of gigabytes of RAM within seconds.\u003c/p\u003e\n\n\u003cp\u003eHTTP/2 Bomb combines two previously known HTTP/2 DoS methods: HPACK compression amplification and Slowloris-style resource retention through HTTP/2 flow-control stalling. The attack uses HTTP/2 header compression behavior to create large server-side memory allocation from very small client input, then prevents the memory from being released by using a zero-byte flow-control window. Calif reported that Envoy 1.37.2 exhausted 32 GB of RAM in about 10 seconds, Apache httpd 2.4.67 in about 18 seconds, nginx 1.29.7 in about 45 seconds, and IIS on Windows Server 2025 exhausted 64 GB in about 45 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe article says fixes are available for nginx 1.29.8 and Apache httpd mod_http2 2.0.41, where the issue was assigned CVE-2026-49975. At the time of writing, no patch was available for IIS, Envoy, or Pingora. Recommended mitigations for those platforms include disabling HTTP/2 where feasible and placing a proxy or firewall in front that enforces hard header-count limits.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new denial-of-service attack called HTTP/2 Bomb can be launched from a single machine to crash vulnerable web servers in under a minute. The article says the technique works against default HTTP/2 configurations of major web servers, including NGINX, Apache HTTP Server, Microsoft IIS, Envoy, and Cloudflare Pingora. It was discovered by OpenAI\u0026rsquo;s Codex software agent under the guidance of researchers at offensive security firm Calif.\u003c/p\u003e\n\n\u003cp\u003eHTTP/2 Bomb combines two previously known HTTP/2 DoS methods into a more impactful technique. The first is HPACK compression amplification, which abuses the HTTP/2 header compression mechanism by inserting a header into the HPACK dynamic table and referencing it repeatedly with a compact indexed representation. The second is Slowloris-style resource retention through HTTP/2 flow-control stalling.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the amplification can cause one byte sent by an attacker to result in thousands of bytes of server-side memory allocation. Envoy and Apache httpd showed the worst ratios in testing, at 5,700:1 and 4,000:1 respectively. Calif researchers said a home computer on a 100 Mbps connection can render a vulnerable server inaccessible within seconds and can consume and hold 32 GB of server memory in roughly 20 seconds against Apache httpd and Envoy.\u003c/p\u0
