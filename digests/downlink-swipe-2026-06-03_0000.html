g URLs, forcing the phone into a Zoom call, poisoning Gemini’s account-level memory, and creating persistent scheduled actions.","Google treated the report as high priority and confirmed on November 14, 2025, that server-side content-classifier improvements mitigated the notification injections and Delayed Tool Invocation bypass."],"insights":["The attack surface was unusually broad because any service capable of pushing a notification to an Android phone could potentially deliver the prompt-injection payload.","Google’s authorization defenses could be bypassed by splitting what the user heard from what the backend evaluated, such as hiding the real authorization prompt in an unread hyperlink or presenting it in an unfamiliar language.","Memory poisoning was especially significant because Gemini’s saved memories are account-level, meaning an attacker-chosen false fact could persist beyond the compromised Android device.","Because Google’s mitigation was server-side, users do not need an app update, but their main direct control is disabling Gemini’s notification-reading access."],"referencedReports":[{"title":"Gemini Voice Assistant Prompt Injection Exploit","url":"https://www.safebreach.com/blog/gemini-voice-assistant-prompt-injection-exploit/","publisher":"SafeBreach","context":"The article is based on research published by SafeBreach's Or Yair describing prompt-injection exploits against Google Gemini on Android via malicious notifications.","category":"","primary":false}],"body":"\u003cp\u003eSafeBreach researcher Or Yair found that a single poisoned notification from apps such as WhatsApp, Slack, SMS, Signal, Instagram, or Messenger could have hijacked Google Gemini’s voice assistant on Android. The attack required no malicious app on the phone because Gemini only needed to treat hostile notification text as useful context. Google has since patched the issue, SafeBreach lists no CVE, and the article says there is no evidence the technique was used in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe issue centered on Gemini’s Android Utilities feature, which can read and reply to notifications from apps including WhatsApp. Yair found that the notification-reading agent treated notification text as instructions it could act on, making any service capable of pushing a notification a potential payload delivery path. The vector was Android-only because the Utilities feature is not available on iOS or the web.\u003c/p\u003e\n\n\u003cp\u003eThe most notable bypass, called Fake Context Alignment, made a user’s harmless-sounding “Yes” appear to authorize a sensitive action. Demonstrated impacts included faking messages from contacts, controlling smart home devices through Google Home, opening URLs, forcing a phone into a Zoom call, poisoning Gemini’s account-level memory, and creating persistent scheduled actions. Google confirmed on November 14, 2025, that server-side content-classifier improvements mitigated the notification injections and Delayed Tool Invocation bypass.\u003c/p\u003e\n"},{"n":1,"title":"Google adds Android protection against AI deepfake scam calls","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/google-adds-android-protection-against-ai-deepfake-scam-calls/","time":"09:02","priority":"SHOULD READ","score":78,"tldr":"Google is rolling out Android “fake call detection” to warn users when scammers spoof a contact’s number and use AI voice cloning to impersonate them. The feature will be enabled by default on Android 12+ starting with Pixel devices, but requires Phone by Google, Contacts, and Google Messages with RCS enabled.","briefOverview":"\u003cp\u003eGoogle is introducing a new Android security feature called “fake call detection” to detect and flag phone calls where scammers use artificial intelligence to impersonate a user’s personal contacts. The feature is rolling out globally this month to Android 12 and later devices, starting with Pixel devices, and will be enabled by default. Google says it is intended to address scams that combine caller ID spoofing with AI voice-cloning technology.\u003c/p\u003e\n\n\u003cp\u003eThe feature works automatically when both the caller and recipient are using Phone by Google. When a contact places a call, the caller’s device sends a silent, encrypted confirmation signal to the recipient’s device in real time. If that signal is missing, the recipient’s device pings the contact’s actual phone to verify whether it is really making the call.\u003c/p\u003e\n\n\u003cp\u003eIf the contact’s real device confirms it is not placing a call, the recipient receives an on-screen warning advising them to hang up immediately. Google says the feature is built on the Rich Communication Services open standard and requires Phone by Google, Contacts, and Google Messages with RCS enabled. The article cites major impersonation scam losses reported by the FTC and INTERPOL as context for the rollout.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle is rolling out a new Android security feature called “fake call detection” to help identify scam calls that use artificial intelligence to impersonate personal contacts. The feature is being released globally this month for Android 12 and later devices, beginning with Pixel devices. It will be enabled by default.\u003c/p\u003e\n\n\u003cp\u003eThe feature is designed to counter two fraud tactics identified by Google: spoofing a familiar contact’s phone number and using AI voice-cloning technology to mimic that person’s voice. Google said people have relied on caller ID for years to identify who is calling, but that this is no longer sufficient because of scammers’ newer tactics. The feature provides a real-time warning when a call appears to be impersonating a contact.\u003c/p\u003e\n\n\u003cp\u003eTechnically, fake call detection works when both the caller and the recipient use Phone by Google. When a contact places a call, the caller’s device sends a silent, encrypted confirmation signal to the recipient’s device in real time. If that signal is absent, the recipient’s device pings the contact’s actual device to check whether it is placing a call.\u003c/p\u003e\n\n\u003cp\u003eIf the contact’s real device responds that it is not making a call, the recipient sees an on-screen warning telling them to hang up immediately. Google described this as a proactive alert intended to help users avoid deepfake impersonation and call spoofing in real time. The feature is built on the Rich Communication Services open standard.\u003c/p\u003e\n\n\u003cp\u003eThe protection only works on Android devices where Phone by Google, Contacts, and Google Messages with RCS enabled are installed. Google said users with a different phone app can install Phone by Google from the Play Store and set it as their default phone app to help protect themselves. The article also notes that Google expanded Android in-call scam protection in December to multiple banks and financial apps in the United States, including Cash App and the JPMorganChase mobile banking app.\u003c/p\u003e\n\n\u003cp\u003eThe article places the rollout in the context of large-scale impersonation fraud losses. It cites the U.S. Federal Trade Commission as saying reported losses from impersonation scams reached \u003cspan class=\"math inline\"\u003e\\(2.95 billion in 2024. It also cites INTERPOL’s March 2026 Global Financial Fraud Threat Assessment as flagging impersonation fraud as a leading threat contributing to more than \\)\u003c/span\u003e440 billion in global losses last year.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle is introducing a new Android security feature called “fake call detection” to detect and flag phone calls in which scammers use artificial intelligence to impersonate a user’s personal contacts. The feature is rolling out globally this month to Android 12 and later devices. Pixel devices are the first devices included in the rollout, and the feature will be enabled by default.\u003c/p\u003e\n\n\u003cp\u003eGoogle says the feature addresses a combination of two fraud tactics: scammers spoofing a familiar contact’s phone number and using AI voice-cloning technology to mimic that person’s voice. The article frames the feature as a response to the reduced reliability of caller ID in the face of these tactics.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-feature-works\"\u003eHow the feature works\u003c/h2\u003e\n\n\u003cp\u003eFake call detection works automatically when both the caller and recipient are using Phone by Google. When a contact places a call, the caller’s device sends a silent, encrypted confirmation signal to the recipient’s device in real time.\u003c/p\u003e\n\n\u003cp\u003eIf that initial confirmation signal is not sent, the recipient’s device treats the situation as potentially spoofed. It then pings the contact’s actual phone to verify whether the call is authentic.\u003c/p\u003e\n\n\u003cp\u003eIf the contact’s real device confirms that it is not placing a call, the recipient receives an on-screen warning advising them to hang up immediately. Google said this proactive alert is meant to help users avoid deepfake impersonation and call spoofing in real time.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-ecosystem-requirements\"\u003eTechnical and ecosystem requirements\u003c/h2\u003e\n\n\u003cp\u003eThe feature is built on top of the Rich Communication Services open standard. According to the article, it only works on Android devices that have the following installed and configured:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhone by Google\u003c/li\u003e\n\u003cli\u003eContacts\u003c/li\u003e\n\u003cli\u003eGoogle Messages with RCS enabled\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGoogle said that if a user’s device uses a different phone app, the user can install Phone by Google from the Play Store and set it as the default phone app to help protect against fake calls.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users-and-rollout\"\u003eAffected users and rollout\u003c/h2\u003e\n\n\u003cp\u003eThe rollout applies globally to Android 12 and later devices. Pixel devices are the first to receive the feature. The article states that fake call detection will be enabled by default once it reaches eligible devices.\u003c/p\u003e\n\n\u003cp\u003eThe protection depends on both the caller and the recipient using Phone by Google. The article also notes that the broader technical requirement includes Contacts and Google Messages with RCS enabled.\u003c/p\u003e\n\n\u003ch2 id=\"fraud-context-and-impact-cited-in-the-article\"\u003eFraud context and impact cited in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article cites impersonation fraud losses as the context for Google’s new protection. It states that the U.S. Federal Trade Commission warned that reported losses from impersonation scams reached $2.95 billion in 2024.\u003c/p\u003e\n\n\u003cp\u003eIt also cites INTERPOL’s March 2026 Global Financial Fraud Threat Assessment, which flagged impersonation fraud as one of the leading threats contributing to more than $440 billion in global losses last year.\u003c/p\u003e\n\n\u003cp\u003eGoogle said that people have relied on caller ID for years to know who is on the other end of the line. However, Google added that caller ID is no longer sufficient because of scammers’ new tactics.\u003c/p\u003e\n\n\u003ch2 id=\"related-google-scam-protection-activity\"\u003eRelated Google scam-protection activity\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that in December, Google expanded support for Android in-call scam protection to multiple banks and financial apps in the United States. The named examples were Cash App and the JPMorganChase mobile banking app.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Cash App has 57 million users and that the JPMorganChase mobile banking app has over 50 million downloads.\u003c/p\u003e\n","keyPoints":["Google is introducing a new Android security feature called fake call detection that detects and flags calls where scammers may use artificial intelligence to impersonate a user’s personal contacts.","The feature is rolling out globally this month to Android 12 and later devices, starting with Pixel devices, and will be enabled by default.","Fake call detection works when both the caller and recipient use Phone by Google by sending a silent, encrypted confirmation signal from the caller’s device to the recipient’s device in real time.","If the initial confirmation signal is missing, the recipient’s device pings the contact’s actual phone, and if that device confirms it is not placing a call, the recipient receives an on-screen warning to hang up immediately.","The feature is built on the Rich Communication Services open standard and only works on Android devices with Phone by Google, Contacts, and Google Messages with RCS enabled installed."],"insights":["The protection depends on both parties using Google’s calling and messaging stack, so users with different default phone apps can improve coverage by installing Phone by Google and setting it as the default phone app.","The feature targets the combined fraud pattern of caller ID spoofing plus AI voice cloning, reflecting Google’s view that caller ID alone is no longer reliable for identifying trusted contacts.","Google’s approach verifies call authenticity through the contact’s actual device rather than only analyzing call audio, allowing it to warn users in real time before they continue an impersonation call.","The rollout is enabled by default on eligible Android devices, which may significantly increase adoption without requiring users to manually configure the protection."],"referencedReports":[{"title":"Global Financial Fraud Threat Assessment","url":"https://www.interpol.int/en/News-and-Events/News/2026/INTERPOL-report-warns-of-increasingly-sophisticated-global-financial-fraud-threat","publisher":"INTERPOL","context":"The article cites INTERPOL's March 2026 Global Financial Fraud Threat Assessment as flagging impersonation fraud as one of the leading threats contributing to more than $440 billion in global losses last year.","category":"","primary":false}],"body":"\u003cp\u003eGoogle is introducing a new Android security feature called “fake call detection” to detect and flag phone calls where scammers use artificial intelligence to impersonate a user’s personal contacts. The feature is rolling out globally this month to Android 12 and later devices, starting with Pixel devices, and will be enabled by default. Google says it is intended to address scams that combine caller ID spoofing with AI voice-cloning technology.\u003c/p\u003e\n\n\u003cp\u003eThe feature works automatically when both the caller and recipient are using Phone by Google. When a contact places a call, the caller’s device sends a silent, encrypted confirmation signal to the recipient’s device in real time. If that signal is missing, the recipient’s device pings the contact’s actual phone to verify whether it is really making the call.\u003c/p\u003e\n\n\u003cp\u003eIf the contact’s real device confirms it is not placing a call, the recipient receives an on-screen warning advising them to hang up immediately. Google says the feature is built on the Rich Communication Services open standard and requires Phone by Google, Contacts, and Google Messages with RCS enabled. The article cites major impersonation scam losses reported by the FTC and INTERPOL as context for the rollout.\u003c/p\u003e\n"},{"n":11,"title":"DHS chief signals efforts to reshape CISA","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/dhs-chief-signals-efforts-to-reshape-cisa","time":"19:07","priority":"SHOULD READ","score":78,"tldr":"DHS Secretary Markwayne Mullin said the Trump administration plans to reshape and revitalize CISA despite major staffing losses and proposed budget cuts. He signaled a new nominee to lead the agency is coming soon and argued CISA will remain central to federal cybersecurity efforts.","briefOverview":"\u003cp\u003eHomeland Security Secretary Markwayne Mullin said Wednesday that he would revitalize the Cybersecurity and Infrastructure Security Agency, the federal government’s lead civilian cyber agency. CISA has lost roughly one-third of its workforce and seen its \u003cspan class=\"math inline\"\u003e\\(3 billion budget reduced during the second Trump administration. President Trump’s fiscal 2027 budget would cut more than \\)\u003c/span\u003e700 million from the agency, raising bipartisan concerns on Capitol Hill.\u003c/p\u003e\n\n\u003cp\u003eMullin told the House Homeland Security Committee that CISA probably needs “somewhere around” 2,800 employees, while it currently has about 2,200 personnel and authority to hire up to 3,400. He said the agency would not fail in its mission and noted that cyberattacks are getting stronger and are hitting private partners the most. Mullin also signaled that the White House intends to soon nominate someone to lead CISA, which has lacked a Senate-confirmed chief since Trump returned to office.\u003c/p\u003e\n\n\u003cp\u003eThe hearing also addressed why the Treasury Department was given a vulnerability-clearinghouse role in Trump’s artificial intelligence executive order instead of CISA. Mullin said AI-related threats are often tied to financial gain and that DHS is comfortable with Treasury Secretary Scott Bessent leading in that area. He said Treasury is coordinating with CISA and DHS tools and authorities, making the government better prepared than if the responsibility stayed only within DHS.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHomeland Security Secretary Markwayne Mullin appeared before the House Homeland Security Committee and said he would revitalize CISA, the government’s lead civilian cyber agency. The agency has been a frequent target of President Donald Trump’s criticism, especially over Republican complaints that its election-related disinformation work singled out conservative voices and infringed on free speech rights. The article reports that CISA has lost roughly one-third of its workforce and had its $3 billion budget cut during the second Trump administration.\u003c/p\u003e\n\n\u003cp\u003ePresident Trump’s fiscal 2027 budget would cut more than $700 million from CISA, prompting bipartisan concern on Capitol Hill. House Homeland Security Committee Chair Andrew Garbarino said CISA has seen a significant reduction in headcount over the last 18 months through voluntary departures, reductions in force, and reassignments of cybersecurity personnel. Garbarino specifically warned that cuts to personnel and cybersecurity education programs could negatively affect efforts to sustain a skilled U.S. cybersecurity workforce pipeline.\u003c/p\u003e\n\n\u003cp\u003eMullin said CISA likely needs “somewhere around” 2,800 employees, even though it has authority to hire up to 3,400. He said the agency currently has around 2,200 personnel. Mullin told lawmakers that CISA would not fail in its mission and emphasized that cyberattacks are getting stronger and are targeting private partners the most.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that CISA has been without a Senate-confirmed chief since Trump was sworn back into office. Mullin said the White House has a person “soon to be nominated” to run CISA, following the withdrawal of a previous nominee in April. He said the future nominee has the ability to recruit and focus on the agency’s authorities, and that CISA should be the leader in cybersecurity.\u003c/p\u003e\n\n\u003cp\u003eMullin was asked why the Treasury Department was selected as the vulnerability clearinghouse in Trump’s artificial intelligence executive order, even though Congress intended CISA to be the lead federal entity with the private sector. Mullin said the biggest threats involving AI are tied to financial gain and said he speaks with Treasury Secretary Scott Bessent frequently. He said DHS is comfortable with Treasury leading in that area because Treasury is coordinating with CISA, DHS tools, and DHS authorities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHomeland Security Secretary Markwayne Mullin said Wednesday that he would revitalize the Cybersecurity and Infrastructure Security Agency, the federal government’s lead civilian cyber agency. His remarks came during his first appearance before the House Homeland Security Committee since being confirmed in March.\u003c/p\u003e\n\n\u003cp\u003eCISA has faced major workforce and budget reductions during the second Trump administration. The article states that the agency has lost roughly one-third of its workforce and seen its $3 billion budget slashed.\u003c/p\u003e\n\n\u003ch2 id=\"political-and-budget-context\"\u003ePolitical and budget context\u003c/h2\u003e\n\n\u003cp\u003eCISA has been a frequent target of President Donald Trump’s criticism. The article ties this criticism to years of Republican complaints that CISA’s efforts to combat online disinformation during elections singled out conservative voices and infringed on free speech rights.\u003c/p\u003e\n\n\u003cp\u003ePresident Trump’s fiscal 2027 budget would cut more than $700 million from CISA. The proposed reduction has raised bipartisan concerns on Capitol Hill.\u003c/p\u003e\n\n\u003cp\u003eHouse Homeland Security Committee Chair Andrew Garbarino said CISA has seen a significant reduction in total headcount over the last 18 months. He attributed the reduction to a combination of voluntary departures, reductions in force, and reassignments of cybersecurity personnel.\u003c/p\u003e\n\n\u003cp\u003eGarbarino also raised concerns about proposed budget cuts affecting CISA personnel and cybersecurity education programs. He said those education programs help sustain a pipeline of skilled cybersecurity professionals in the United States and warned that cuts could negatively affect those efforts.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-staffing-levels-and-mission-concerns\"\u003eCISA staffing levels and mission concerns\u003c/h2\u003e\n\n\u003cp\u003eMullin said CISA probably needs “somewhere around” 2,800 employees, even though it has authority to hire up to 3,400. He said the agency currently has around 2,200 personnel.\u003c/p\u003e\n\n\u003cp\u003eMullin told lawmakers that CISA would not fail in its mission. He said cyberattacks are getting stronger and are attacking private partners the most.\u003c/p\u003e\n\n\u003cp\u003eHis remarks indicate that the administration is considering a reshaped CISA workforce that is larger than the agency’s current headcount but smaller than its authorized hiring ceiling. The article does not describe specific restructuring measures beyond Mullin’s comments about staffing, recruitment, and focusing on CISA’s authorities.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-leadership-nomination\"\u003eCISA leadership nomination\u003c/h2\u003e\n\n\u003cp\u003eCISA has been without a Senate-confirmed chief since Trump was sworn back into office. A previous nominee withdrew from consideration in April.\u003c/p\u003e\n\n\u003cp\u003eMullin said the White House has a person “soon to be nominated” to run CISA. He said that person has the ability to recruit and focus on the authorities CISA has.\u003c/p\u003e\n\n\u003cp\u003eMullin also said, “We want CISA to be the leader in cybersecurity. They should be and they will be.”\u003c/p\u003e\n\n\u003ch2 id=\"artificial-intelligence-executive-order-and-treasury-s-role\"\u003eArtificial intelligence executive order and Treasury’s role\u003c/h2\u003e\n\n\u003cp\u003eMullin was asked why the Treasury Department was tapped to be the vulnerability clearinghouse in the artificial intelligence executive order Trump signed on Tuesday. The question was framed around Congress’s intent for CISA to serve as the lead federal entity working with the private sector.\u003c/p\u003e\n\n\u003cp\u003eMullin responded that, when officials examined the biggest threats involving AI, they saw those threats as tied to financial gain. He said he speaks with Treasury Secretary Scott Bessent “all the time.”\u003c/p\u003e\n\n\u003cp\u003eMullin said DHS is comfortable with Treasury leading in that area because Treasury is partnering with CISA and using DHS tools and authorities. He said that because of the coordination, the government is better prepared than it would be if the issue were left only within DHS.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected parties and stakeholders\u003c/h2\u003e\n\n\u003cp\u003eKey stakeholders discussed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCISA\u003c/strong\u003e, which is facing workforce reductions, budget cuts, and leadership uncertainty.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDHS\u003c/strong\u003e, led by Secretary Markwayne Mullin, which oversees CISA.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe White House\u003c/strong\u003e, which is expected to nominate a new CISA leader.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe House Homeland Security Committee\u003c/strong\u003e, where lawmakers raised concerns about CISA’s staffing, budget, and mission capacity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Treasury Department\u003c/strong\u003e, which was assigned a vulnerability-clearinghouse role in the AI executive order.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrivate partners\u003c/strong\u003e, which Mullin said are being attacked the most by strengthening cyberattacks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eU.S. cybersecurity education programs\u003c/strong\u003e, which Garbarino said help sustain the national cyber workforce pipeline and could be affected by proposed cuts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed impact and response\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several disclosed impacts on CISA: a roughly one-third workforce reduction, a reduced \u003cspan class=\"math inline\"\u003e\\(3 billion budget, and a proposed additional fiscal 2027 cut of more than \\)\u003c/span\u003e700 million. It also reports that CISA currently has about 2,200 employees, below Mullin’s stated estimate of roughly 2,800 needed personnel.\u003c/p\u003e\n\n\u003cp\u003eThe response described in the article includes Mullin’s pledge to revitalize the agency and his statement that the White House will soon nominate someone to lead it. Mullin also emphasized that CISA should remain a leader in cybersecurity and that Treasury’s AI-related role is being coordinated with CISA and DHS authorities.\u003c/p\u003e\n","keyPoints":["Homeland Security Secretary Markwayne Mullin said he would revitalize the Cybersecurity and Infrastructure Security Agency, which has been a frequent target of President Donald Trump’s criticism.","CISA has lost roughly one-third of its workforce and had its $3 billion budget reduced during the second Trump administration.","President Trump’s fiscal 2027 budget proposes cutting more than $700 million from CISA, raising bipartisan concerns on Capitol Hill.","Mullin said CISA probably needs around 2,800 employees, while it currently has about 2,200 personnel and has authority to hire up to 3,400.","Mullin said the White House soon plans to nominate a person to run CISA, which has lacked a Senate-confirmed chief since Trump returned to office."],"insights":["CISA’s future staffing level may be set below its authorized hiring capacity, as Mullin said the agency likely needs about 2,800 employees despite being able to hire up to 3,400.","Congressional concern over CISA cuts is bipartisan enough that a Republican committee chair publicly warned that reductions to personnel and cyber education programs could harm the U.S. cyber workforce pipeline.","The Trump administration’s AI executive order assigns Treasury a leading vulnerability-clearinghouse role, indicating that financial-sector abuse is being prioritized in federal AI threat coordination.","Mullin framed Treasury’s AI role as complementary to CISA rather than a replacement, saying DHS is comfortable with Treasury leading because it is coordinating with CISA’s tools and authorities."],"referencedReports":[],"body":"\u003cp\u003eHomeland Security Secretary Markwayne Mullin said Wednesday that he would revitalize the Cybersecurity and Infrastructure Security Agency, the federal government’s lead civilian cyber agency. CISA has lost roughly one-third of its workforce and seen its \u003cspan class=\"math inline\"\u003e\\(3 billion budget reduced during the second Trump administration. President Trump’s fiscal 2027 budget would cut more than \\)\u003c/span\u003e700 million from the agency, raising bipartisan concerns on Capitol Hill.\u003c/p\u003e\n\n\u003cp\u003eMullin told the House Homeland Security Committee that CISA probably needs “somewhere around” 2,800 employees, while it currently has about 2,200 personnel and authority to hire up to 3,400. He said the agency would not fail in its mission and noted that cyberattacks are getting stronger and are hitting private partners the most. Mullin also signaled that the White House intends to soon nominate someone to lead CISA, which has lacked a Senate-confirmed chief since Trump returned to office.\u003c/p\u003e\n\n\u003cp\u003eThe hearing also addressed why the Treasury Department was given a vulnerability-clearinghouse role in Trump’s artificial intelligence executive order instead of CISA. Mullin said AI-related threats are often tied to financial gain and that DHS is comfortable with Treasury Secretary Scott Bessent leading in that area. He said Treasury is coordinating with CISA and DHS tools and authorities, making the government better prepared than if the responsibility stayed only within DHS.\u003c/p\u003e\n"},{"n":4,"title":"Acer working to patch max severity zero-days in Wave 7 routers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/acer-warns-of-max-severity-zero-days-affecting-wave-7-routers/","time":"11:35","priority":"MAY READ","score":72,"tldr":"Acer is preparing firmware fixes for two maximum-severity zero-day flaws in Wave 7 routers that can expose plaintext credentials and enable persistent backdoor access. Until patches arrive, users should disable or restrict remote management and update firmware as soon as the fix is released.","briefOverview":"\u003cp\u003eAcer confirmed that it is working to fix two maximum-severity zero-day vulnerabilities affecting its Wave 7 mesh routers. The flaws affect devices running firmware version T7c_GBL_1.01.000055 or earlier. Acer said the fixes are scheduled for release by the end of June 2026.\u003c/p\u003e\n\n\u003cp\u003eThe first flaw, CVE-2026-49200, is a broken access control vulnerability that can allow unauthenticated remote attackers to access plaintext credentials stored in log archives. Acer said the acer_cgi.log file is accessible without authentication through the web interface and contains cleartext web and Telnet login credentials. The second flaw, CVE-2026-49201, involves a hardcoded AES encryption key in upload.cgi that can allow attackers to decrypt, modify, and re-encrypt system backups to inject a persistent backdoor.\u003c/p\u003e\n\n\u003cp\u003eAcer strongly encouraged users to update their Wave 7 router firmware immediately after the fixes are issued. Until then, the company advised customers to disable remote management or restrict Internet remote access to trusted IP addresses if the firmware allows it. The vulnerabilities were reported by security researcher Gergo Pap.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAcer confirmed that it is preparing fixes for two maximum-severity zero-day vulnerabilities in its Wave 7 mesh routers. The issues affect routers running firmware version T7c_GBL_1.01.000055 or earlier. The vulnerabilities were reported by security researcher Gergo Pap and are described in an Acer security advisory.\u003c/p\u003e\n\n\u003cp\u003eThe first vulnerability is CVE-2026-49200, a broken access control issue. Acer said the acer_cgi.log file in the device firmware is accessible without authentication through the web interface. Because that file contains cleartext login credentials for web and Telnet access, unauthenticated remote attackers could gain unauthorized system access.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability is CVE-2026-49201, which stems from a hardcoded cryptographic key. Acer said the upload.cgi binary, which processes device backups, contains a hardcoded AES encryption key. This can allow an unauthenticated remote attacker to decrypt, modify, and re-encrypt system backups, enabling persistent backdoor injection.\u003c/p\u003e\n\n\u003cp\u003eAcer said security patches are not yet available for the two flaws. The company stated that the vulnerabilities are scheduled to be resolved in upcoming firmware updates, with a target deployment by the end of June 2026. The article does not state that the vulnerabilities have been exploited in attacks.\u003c/p\u003e\n\n\u003cp\u003eAcer strongly encouraged all users to update their devices\u0026rsquo; firmware immediately once the security updates are released. The company provided steps for accessing the router administration console and checking for firmware updates. Until a patch is available, Acer advised customers to disable remote management or restrict Internet remote access to trusted IP addresses if supported by the firmware.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAcer confirmed that it is working to address two maximum-severity zero-day vulnerabilities affecting its Wave 7 mesh routers. The flaws affect Wave 7 routers running firmware version T7c_GBL_1.01.000055 or earlier. According to the article, the vulnerabilities were reported by security researcher Gergo Pap.\u003c/p\u003e\n\n\u003cp\u003eAcer said fixes are not yet available, but the vulnerabilities are scheduled to be resolved in upcoming firmware updates. The company’s target date for deploying the fixes is the end of June 2026. Acer strongly encouraged users to update their router firmware immediately after the security updates are issued.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product\"\u003eAffected Product\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Acer Wave 7 mesh routers. The vulnerable firmware version is T7c_GBL_1.01.000055 or earlier.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003ch3 id=\"cve-2026-49200\"\u003eCVE-2026-49200\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-49200 is described as a broken access control vulnerability. Acer said the acer_cgi.log file in the device firmware is accessible without authentication through the web interface. The file contains cleartext login credentials for web and Telnet access.\u003c/p\u003e\n\n\u003cp\u003eAccording to Acer, this issue can lead to unauthorized system access. The article states that unauthenticated attackers can remotely access plaintext credentials stored in log archives.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-49201\"\u003eCVE-2026-49201\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-49201 stems from a hardcoded cryptographic key. Acer said the upload.cgi binary, which is responsible for processing device backups, contains a hardcoded AES encryption key.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this allows an attacker to decrypt, modify, and re-encrypt system backups. Acer said this can facilitate persistent backdoor injection. The article describes the attacker as remote and without privileges.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe first vulnerability can expose plaintext credentials for web and Telnet access. This can allow unauthorized system access if the credentials are retrieved through the unauthenticated web-accessible log file.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability can allow persistent backdoor access by manipulating system backups. Because the hardcoded AES key is in the backup-processing binary, an attacker can modify encrypted backups and re-encrypt them.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-timeline\"\u003eResponse and Timeline\u003c/h2\u003e\n\n\u003cp\u003eAcer said that patches are not currently available for the two vulnerabilities. The company stated that the vulnerabilities are scheduled to be resolved in upcoming firmware updates. The target fix is planned for deployment by the end of June 2026.\u003c/p\u003e\n\n\u003cp\u003eAcer strongly encouraged all users to update their devices\u0026rsquo; firmware as soon as the security updates are released. The article provides the following update process described by Acer:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eConnect a computer to the Acer Wave 7 router using Wi-Fi or Ethernet.\u003c/li\u003e\n\u003cli\u003eOpen a browser and navigate to the router administration console at \u003ca href=\"http://192.168.76.1\" target=\"_blank\"\u003ehttp://192.168.76.1\u003c/a\u003e or \u003ca href=\"http://acerconnect.com\" target=\"_blank\"\u003ehttp://acerconnect.com\u003c/a\u003e.\u003c/li\u003e\n\u003cli\u003eLog in with administrator credentials.\u003c/li\u003e\n\u003cli\u003eNavigate to System Management and select Firmware Update.\u003c/li\u003e\n\u003cli\u003eSelect Check for Updates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitigation-guidance\"\u003eMitigation Guidance\u003c/h2\u003e\n\n\u003cp\u003eUntil a patch is available, Acer advised customers to reduce exposure from remote access. The company recommended disabling remote management. If the firmware allows it, Acer also recommended restricting Internet remote access to trusted IP addresses only.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-actors-and-reporting\"\u003eDisclosed Actors and Reporting\u003c/h2\u003e\n\n\u003cp\u003eThe article names security researcher Gergo Pap as the person who reported the two flaws. It does not identify any threat actor, malware, campaign, or exploitation activity connected to the vulnerabilities. The article also does not state that either zero-day has been exploited in the wild.\u003c/p\u003e\n","keyPoints":["Acer confirmed it is working to address two maximum-severity zero-day vulnerabilities affecting Wave 7 mesh routers running firmware version T7c_GBL_1.01.000055 or earlier.","CVE-2026-49200 is a broken access control flaw that allows unauthenticated remote attackers to access plaintext web and Telnet credentials stored in the acer_cgi.log file.","CVE-2026-49201 involves a hardcoded AES encryption key in the upload.cgi binary that can allow unauthenticated remote attackers to modify system backups and inject a persistent backdoor.","Acer said fixes for the vulnerabilities are planned for deployment by the end of June 2026.","Acer advised users to disable remote management or restrict Internet remote access to trusted IP addresses until patches are available."],"insights":["The recommended mitigation focuses on remote management exposure, indicating that limiting Internet access to the router administration interface is the main actionable risk reduction before firmware fixes are released.","One flaw exposes both web and Telnet credentials in cleartext, so affected users may need to treat multiple management access paths as compromised if the log file was accessible.","The backup-processing flaw is especially actionable because it targets device backups, meaning administrators should be cautious with backup files and restore workflows until the patched firmware is available.","Acer provided a specific firmware-update path through the router console, so users can verify and apply the fix directly once the end-of-June 2026 update is released."],"referencedReports":[{"title":"Acer Wave 7 routers security advisory","url":"https://community.acer.com/en/kb/articles/19673","publisher":"Acer","context":"The article cites Acer's Friday security advisory as the source confirming two maximum-severity zero-day vulnerabilities affecting Wave 7 routers and the planned firmware fixes.","category":"","primary":false}],"body":"\u003cp\u003eAcer confirmed that it is working to fix two maximum-severity zero-day vulnerabilities affecting its Wave 7 mesh routers. The flaws affect devices running firmware version T7c_GBL_1.01.000055 or earlier. Acer said the fixes are scheduled for release by the end of June 2026.\u003c/p\u003e\n\n\u003cp\u003eThe first flaw, CVE-2026-49200, is a broken access control vulnerability that can allow unauthenticated remote attackers to access plaintext credentials stored in log archives. Acer said the acer_cgi.log file is accessible without authentication through the web interface and contains cleartext web and Telnet login credentials. The second flaw, CVE-2026-49201, involves a hardcoded AES encryption key in upload.cgi that can allow attackers to decrypt, modify, and re-encrypt system backups to inject a persistent backdoor.\u003c/p\u003e\n\n\u003cp\u003eAcer strongly encouraged users to update their Wave 7 router firmware immediately after the fixes are issued. Until then, the company advised customers to disable remote management or restrict Internet remote access to trusted IP addresses if the firmware allows it. The vulnerabilities were reported by security researcher Gergo Pap.\u003c/p\u003e\n"},{"n":6,"title":"Police dismantles 9 crime groups in illegal streaming crackdown","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/police-dismantles-9-crime-groups-in-illegal-streaming-crackdown/","time":"10:12","priority":"MAY READ","score":68,"tldr":"Law enforcement agencies across 13 countries dismantled nine organized crime groups behind illegal streaming services, arresting 29 suspects and taking down over 27,000 piracy-related URLs. Europol said the crackdown targeted the broader criminal infrastructure behind the platforms, not just the public-facing websites.","briefOverview":"\u003cp\u003eEuropean and international law enforcement agencies dismantled nine organized crime groups in a major crackdown on illegal streaming operations. The seven-month Operation KRATOS 2 was coordinated by Bulgaria with Europol\u0026rsquo;s support and involved authorities from 13 countries. The operation resulted in 29 arrests and the removal of more than 27,000 illegal streaming URLs tied to unauthorized sports, film, and television content.\u003c/p\u003e\n\n\u003cp\u003eInvestigators worked with private sector partners to identify more than 18,000 IP addresses associated with illegal services and 4,370 domains linked to piracy. They also flagged nearly 400,000 additional URLs for suspension or removal and identified more than 126,000 additional infringing objects. Europol said investigators targeted the broader criminal ecosystem behind the platforms, rather than focusing only on taking down websites.\u003c/p\u003e\n\n\u003cp\u003eLaw enforcement officers identified 86 suspects, conducted 148 house searches, referred 59 cases to judicial authorities, and continued work on 72 criminal investigations. Europol said the groups behind illegal streaming services separate customer-facing websites from servers hosting illegal content to operate across multiple jurisdictions and hinder prosecution. Europol also warned that users of such services face cybersecurity risks including malware infections, spyware, and data theft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eEuropean and international law enforcement agencies dismantled nine organized crime groups and arrested 29 suspects during a major illegal streaming crackdown. The seven-month operation, called Operation KRATOS 2, was coordinated by Bulgaria with support from Europol. Authorities from 13 countries participated, including Belgium, Bulgaria, Croatia, France, Greece, Ireland, Italy, the Netherlands, Poland, Romania, Spain, the United Kingdom, and the United States.\u003c/p\u003e\n\n\u003cp\u003eThe operation targeted illegal streaming services involved in the unauthorized distribution of copyrighted sports, film, and television content. In total, the joint action led to the removal of more than 27,000 illegal streaming URLs. Investigators also identified 86 suspects, carried out 148 house searches, referred 59 cases to judicial authorities, and continued work on 72 other criminal investigations.\u003c/p\u003e\n\n\u003cp\u003ePrivate sector cooperation helped investigators map a large piracy infrastructure. The article says investigators identified more than 18,000 IP addresses associated with illegal services and 4,370 domains linked to piracy. They also flagged nearly 400,000 additional URLs for suspension or removal and identified more than 126,000 additional infringing objects.\u003c/p\u003e\n\n\u003cp\u003eEuropol said criminal groups behind these services deliberately separate customer-facing websites from the servers hosting illegal content. This structure allows the groups to operate across multiple jurisdictions and makes detection and prosecution more difficult. Europol said investigators therefore targeted the wider criminal ecosystem supporting the services, including those involved in management and technical operations.\u003c/p\u003e\n\n\u003cp\u003eEuropol also warned that illegal streaming platforms create cybersecurity risks for users. According to Europol, these risks include malware infections, spyware, and data theft. The article states that these services also generate significant revenue for the criminal rings that operate them.\u003c/p\u003e\n\n\u003cp\u003eOperation KRATOS 2 follows several other recent anti-piracy actions. Operation KRATOS in summer 2024 shut down an illegal streaming network with more than 22 million users worldwide, with 11 arrests, 102 suspects identified, and 112 searches conducted. In January, Operation Switch Off resulted in the seizure of three industrial-scale illegal IPTV services, and in May, Italian authorities dismantled the CINEMAGOAL piracy platform, which provided illegal access to streaming platforms such as Netflix, Disney+, and Spotify.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eEuropean and international law enforcement agencies dismantled nine organized crime groups in a major crackdown on illegal streaming operations. The seven-month action, named Operation KRATOS 2, resulted in the arrest of 29 suspects. The operation targeted services distributing copyrighted sports, film, and television content without authorization.\u003c/p\u003e\n\n\u003cp\u003eOperation KRATOS 2 was coordinated by Bulgaria with support from Europol. Authorities from 13 countries participated: Belgium, Bulgaria, Croatia, France, Greece, Ireland, Italy, the Netherlands, Poland, Romania, Spain, the United Kingdom, and the United States.\u003c/p\u003e\n\n\u003ch2 id=\"operational-results\"\u003eOperational Results\u003c/h2\u003e\n\n\u003cp\u003eThe joint action led to the removal of more than 27,000 illegal streaming URLs. In addition to the arrests, law enforcement officers identified 86 suspects and conducted 148 house searches. Authorities also referred 59 cases to judicial authorities and continued work on 72 other criminal investigations.\u003c/p\u003e\n\n\u003cp\u003eThe article reports the following enforcement and investigative outcomes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNine organized crime groups dismantled.\u003c/li\u003e\n\u003cli\u003e29 suspects arrested.\u003c/li\u003e\n\u003cli\u003e86 suspects identified.\u003c/li\u003e\n\u003cli\u003e148 house searches conducted.\u003c/li\u003e\n\u003cli\u003e59 cases referred to judicial authorities.\u003c/li\u003e\n\u003cli\u003e72 criminal investigations still being worked on.\u003c/li\u003e\n\u003cli\u003eMore than 27,000 illegal streaming URLs removed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"infrastructure-identified\"\u003eInfrastructure Identified\u003c/h2\u003e\n\n\u003cp\u003eCooperation with private sector partners helped investigators identify a large infrastructure associated with illegal streaming services. The article says investigators identified more than 18,000 IP addresses associated with illegal services. They also identified 4,370 domains linked to piracy.\u003c/p\u003e\n\n\u003cp\u003eAdditional items were flagged or identified during the operation. Nearly 400,000 additional URLs were flagged for suspension or removal. More than 126,000 additional infringing objects were also identified.\u003c/p\u003e\n\n\u003ch2 id=\"criminal-operating-model\"\u003eCriminal Operating Model\u003c/h2\u003e\n\n\u003cp\u003eEuropol said the criminal groups behind illegal streaming services deliberately separate customer-facing websites from the servers that host illegal content. According to Europol, this arrangement lets the groups operate across multiple jurisdictions. The article says this structure is used to hinder detection and prosecution.\u003c/p\u003e\n\n\u003cp\u003eEuropol stated that investigators did not focus only on taking down websites. Instead, they targeted the wider criminal ecosystem supporting the services. This approach helped authorities gather intelligence on the organized crime groups behind the platforms and identify key suspects involved in their management and technical operation.\u003c/p\u003e\n\n\u003ch2 id=\"cybersecurity-risks-to-users\"\u003eCybersecurity Risks to Users\u003c/h2\u003e\n\n\u003cp\u003eEuropol warned that illegal streaming services do more than generate significant revenue for the criminal rings that operate them. The agency said these services also expose users to major cybersecurity risks. The risks named in the article include malware infections, spyware, and data theft.\u003c/p\u003e\n\n\u003ch2 id=\"related-anti-piracy-actions\"\u003eRelated Anti-Piracy Actions\u003c/h2\u003e\n\n\u003cp\u003eOperation KRATOS 2 follows earlier international anti-piracy actions described in the article. Operation KRATOS took place in summer 2024 and was led by Bulgaria\u0026rsquo;s Ministry of the Interior with support from Europol and Eurojust. That operation shut down an illegal streaming network with more than 22 million users worldwide, resulted in 11 arrests, identified 102 suspects, and involved 112 searches.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites Operation Switch Off, coordinated in January by Europol, Eurojust, and Interpol. That global law enforcement action resulted in the seizure of three industrial-scale illegal IPTV services.\u003c/p\u003e\n\n\u003cp\u003eMore recently, in May, Italian authorities dismantled the CINEMAGOAL piracy platform. The article says CINEMAGOAL provided illegal access to streaming platforms such as Netflix, Disney+, and Spotify.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Operation KRATOS 2 as a broad, multi-country law enforcement action against illegal streaming operations and the organized crime groups behind them. Its significance lies not only in the number of arrests and URL removals, but also in the focus on the technical and organizational ecosystem supporting the services. Europol\u0026rsquo;s comments emphasize that these operations can span jurisdictions, separate visible websites from hosting infrastructure, and pose cybersecurity risks to users.\u003c/p\u003e\n","keyPoints":["European and international law enforcement agencies dismantled nine organized crime groups and arrested 29 suspects during Operation KRATOS 2, a crackdown on illegal streaming operations.","Operation KRATOS 2 was coordinated by Bulgaria with Europol's support and involved authorities from 13 countries, including several European nations, the United Kingdom, and the United States.","Investigators identified more than 18,000 IP addresses associated with illegal services, 4,370 piracy-linked domains, nearly 400,000 additional URLs flagged for suspension or removal, and more than 126,000 additional infringing objects.","The joint action led to the removal of more than 27,000 illegal streaming URLs tied to unauthorized sports, film, and television content.","Europol said the operation targeted the wider criminal ecosystem behind illegal streaming services and warned that users of such services face cybersecurity risks including malware infections, spyware, and data theft."],"insights":["Investigators focused beyond public-facing piracy websites because the criminal groups deliberately separated customer-facing sites from the servers hosting illegal content to operate across multiple jurisdictions and complicate prosecution.","Private sector cooperation was central to the operation, helping investigators identify more than 18,000 IP addresses, 4,370 piracy-linked domains, nearly 400,000 URLs for suspension or removal, and over 126,000 infringing objects.","Europol framed illegal streaming services as a direct user security risk, warning that users can be exposed to malware infections, spyware, and data theft in addition to copyright infringement concerns.","Operation KRATOS 2 follows several recent anti-piracy actions, including Operation KRATOS, Operation Switch Off, and Italy's disruption of CINEMAGOAL, showing continued law enforcement pressure on illegal IPTV and streaming ecosystems."],"referencedReports":[],"body":"\u003cp\u003eEuropean and international law enforcement agencies dismantled nine organized crime groups in a major crackdown on illegal streaming operations. The seven-month Operation KRATOS 2 was coordinated by Bulgaria with Europol\u0026rsquo;s support and involved authorities from 13 countries. The operation resulted in 29 arrests and the removal of more than 27,000 illegal streaming URLs tied to unauthorized sports, film, and television content.\u003c/p\u003e\n\n\u003cp\u003eInvestigators worked with private sector partners to identify more than 18,000 IP addresses associated with illegal services and 4,370 domains linked to piracy. They also flagged nearly 400,000 additional URLs for suspension or removal and identified more than 126,000 additional infringing objects. Europol said investigators targeted the broader criminal ecosystem behind the platforms, rather than focusing only on taking down websites.\u003c/p\u003e\n\n\u003cp\u003eLaw enforcement officers identified 86 suspects, conducted 148 house searches, referred 59 cases to judicial authorities, and continued work on 72 criminal investigations. Europol said the groups behind illegal streaming services separate customer-facing websites from servers hosting illegal content to operate across multiple jurisdictions and hinder prosecution. Europol also warned that users of such services face cybersecurity risks including malware infections, spyware, and data theft.\u003c/p\u003e\n"},{"n":12,"title":"New cyber force would cost up to $11 billion to start, commission says","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/new-cyber-force-would-cost-11-billion-commission","time":"10:01","priority":"MAY READ","score":60,"tldr":"A commission of policy experts and former military leaders says creating a dedicated U.S. Cyber Force would cost up to $11 billion, take 12 to 18 months, and require about 30,000 personnel. The proposal comes as lawmakers weigh whether a separate cyber military branch is needed to strengthen U.S. defenses against Russia, China, and other digital threats.","briefOverview":"\u003cp\u003eA commission of policy experts and former senior military leaders says a dedicated U.S. Cyber Force would cost up to $11 billion to establish and should include around 30,000 personnel. The proposed branch would be intended to bolster the nation’s digital defenses and better address growing cyber threats. It would be the first new military branch since the Space Force was created in 2019.\u003c/p\u003e\n\n\u003cp\u003eThe report says the Cyber Force could either align with the Department of the Army or operate as its own department within the Pentagon. It estimates the branch would take 12 to 18 months to stand up and would include roughly 5,000 National Guard members and up to 6,000 civilians. The proposal comes as lawmakers prepare the annual defense authorization bill and as separate work by the National Academies is studying the feasibility of creating such a force.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA report published by the Commission on Cyber Force Generation says the United States should create a military branch dedicated to cyber warfare. The proposed Cyber Force would cost up to $11 billion to establish and include around 30,000 personnel. The commission says the branch would strengthen national digital defenses and better address growing threats.\u003c/p\u003e\n\n\u003cp\u003eThe proposed Cyber Force could be aligned with the Department of the Army or established as its own department within the Pentagon. According to the report, it would take 12 to 18 months to stand up. It would also include roughly 5,000 members of the National Guard and up to 6,000 civilians.\u003c/p\u003e\n\n\u003cp\u003eThe report argues for a major rearrangement of existing Pentagon manpower and funding. The article notes that the Government Accountability Office found last year that about 61,000 people were already involved in Department of Defense cyberspace operations. It also says the Trump administration’s fiscal year 2027 budget request allocates \u003cspan class=\"math inline\"\u003e\\(7.7 billion for Pentagon cyberspace operations, including about \\)\u003c/span\u003e4.5 billion for U.S. Cyber Command.\u003c/p\u003e\n\n\u003cp\u003eThe commission is a partnership between the Center for Strategic and International Studies and the Foundation for Defense of Democracies. Its members include private sector and policy experts and former senior Defense Department officials, including several who led the digital warfighting arm of their respective military services. The panel began with the assumption that the president had ordered the creation of a Cyber Force and focused on how the branch should be built rather than whether one is needed.\u003c/p\u003e\n\n\u003cp\u003eThe findings arrive as House and Senate lawmakers prepare to craft the annual defense authorization bill. The article says frustration has grown on Capitol Hill over the existing military branches’ chronic failure to provide U.S. Cyber Command with personnel ready to fight foreign adversaries online. Sen. Kirsten Gillibrand has indicated she will offer an amendment expected to mirror the board’s conclusions, while the National Academies of Sciences, Engineering, and Medicine is separately studying the feasibility of creating a Cyber Force.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA report from the Commission on Cyber Force Generation says the United States should establish a dedicated military branch for cyber warfare. The proposed Cyber Force would be on par with branches such as the Army or Navy and would be the newest military branch since the Space Force was created in 2019. The commission estimates the force would cost up to $11 billion to start and should include around 30,000 personnel.\u003c/p\u003e\n\n\u003cp\u003eThe report says the Cyber Force is intended to bolster the nation’s digital defenses and better address growing threats. It describes cyber as a military domain where U.S. personnel are in contact with adversaries daily. Josh Stiefel, a former professional staff member on the House Armed Services Committee and co-chair of the commission, argued that cyber is no less deserving of a service than other military domains.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-structure-and-staffing\"\u003eProposed structure and staffing\u003c/h2\u003e\n\n\u003cp\u003eThe commission says the Cyber Force could be structured in one of two ways. It could align with the Department of the Army, or it could stand as its own department within the Pentagon. The article does not state that the commission selected one model as the final recommendation.\u003c/p\u003e\n\n\u003cp\u003eThe proposed force would include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAround 30,000 personnel overall.\u003c/li\u003e\n\u003cli\u003eRoughly 5,000 members of the National Guard.\u003c/li\u003e\n\u003cli\u003eUp to 6,000 civilians.\u003c/li\u003e\n\u003cli\u003eA projected stand-up timeline of 12 to 18 months.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the report essentially calls for the Defense Department to fundamentally rearrange existing manpower and dollars. It notes that the Government Accountability Office found last year that about 61,000 people were already involved in Department of Defense cyberspace operations. It also states that the Trump administration’s fiscal year 2027 budget request allocates \u003cspan class=\"math inline\"\u003e\\(7.7 billion for Pentagon cyberspace operations, including about \\)\u003c/span\u003e4.5 billion for U.S. Cyber Command.\u003c/p\u003e\n\n\u003ch2 id=\"commission-background\"\u003eCommission background\u003c/h2\u003e\n\n\u003cp\u003eThe Commission on Cyber Force Generation is a partnership between the Center for Strategic and International Studies and the Foundation for Defense of Democracies. Its membership includes private sector experts, policy experts, and former senior Defense Department officials. Several members previously led the digital warfighting arm of their respective military services.\u003c/p\u003e\n\n\u003cp\u003eThe panel launched last year with the core assumption that the president had ordered the establishment of a Cyber Force. Because of that assumption, it focused on designing how the branch should be built. The article says the commission did not focus on rehashing past debates over whether a Cyber Force is needed.\u003c/p\u003e\n\n\u003ch2 id=\"congressional-context\"\u003eCongressional context\u003c/h2\u003e\n\n\u003cp\u003eThe report was released as House and Senate lawmakers prepare to craft their annual defense authorization bill. The article says an increasing number of lawmakers view a cyber-specific military service as inevitable. It also says this view is influenced by Russia and China continuing to grow and mature their own digital corps and competing to gain an edge in technologies such as artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe article describes bipartisan frustration on Capitol Hill over the existing military branches’ chronic failure to provide U.S. Cyber Command with personnel who are ready to fight foreign adversaries online. Retired Rear Adm. Mark Montgomery, senior director of the Foundation for Defense of Democracies’ Center on Cyber and Technology Innovation, said Cyber Command is “doing okay,” but argued that the problem is the lack of a path to growth in a more aggressive adversary environment.\u003c/p\u003e\n\n\u003cp\u003eSen. Kirsten Gillibrand, a Democrat from New York and a member of the Senate Armed Services Committee, has led recent efforts to obtain independent assessments on the feasibility of creating a new service. The article says she has indicated she will offer an amendment expected to mirror the board’s conclusions when policymakers meet behind closed doors. The House Armed Services Committee is also preparing to take up its draft, and the article says it is possible a panelist could propose similar legislation during the meeting.\u003c/p\u003e\n\n\u003ch2 id=\"related-studies-and-possible-next-steps\"\u003eRelated studies and possible next steps\u003c/h2\u003e\n\n\u003cp\u003eIn addition to the commission’s report, the fiscal 2025 defense policy bill tasked the National Academies of Sciences, Engineering, and Medicine with studying the feasibility of creating a Cyber Force. That work is expected to conclude in the coming months. The article presents this as another formal assessment feeding into the broader debate over whether and how to create a cyber-specific military branch.\u003c/p\u003e\n\n\u003cp\u003eMontgomery, who pitched a Cyber Force to President Trump last year, said that a “go” order could come from several possible drivers. He cited a national crisis, a motivated president, a motivated Congress, or other circumstances as possible factors. Stiefel said he believes the country is facing an inevitability and argued that it is better to prepare for war before conflict rather than after the fact.\u003c/p\u003e\n\n\u003ch2 id=\"key-affected-stakeholders\"\u003eKey affected stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several stakeholders connected to the proposal and debate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Department of Defense, which would need to rearrange existing cyber personnel and funding.\u003c/li\u003e\n\u003cli\u003eU.S. Cyber Command, which lawmakers and commission members discuss as needing personnel ready for cyber operations.\u003c/li\u003e\n\u003cli\u003eThe Department of the Army, which could potentially house the proposed Cyber Force.\u003c/li\u003e\n\u003cli\u003eThe National Guard, which would provide roughly 5,000 members under the commission’s design.\u003c/li\u003e\n\u003cli\u003eCongress, including the House and Senate Armed Services Committees, which are preparing the annual defense authorization bill.\u003c/li\u003e\n\u003cli\u003eThe Commission on Cyber Force Generation, which produced the report.\u003c/li\u003e\n\u003cli\u003eThe Center for Strategic and International Studies and the Foundation for Defense of Democracies, which partnered on the commission.\u003c/li\u003e\n\u003cli\u003eThe National Academies of Sciences, Engineering, and Medicine, which is conducting a separate feasibility study.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed financial impact is a startup cost of up to $11 billion. The disclosed organizational impact would be the creation of a new cyber-focused military branch with tens of thousands of personnel, National Guard members, and civilian staff. The report also implies a major restructuring of current Pentagon cyber manpower and dollars, given the existing 61,000 people involved in DOD cyberspace operations and the billions already allocated to cyberspace operations in the fiscal year 2027 budget request.\u003c/p\u003e\n","keyPoints":["A commission report says a U.S. military branch dedicated to cyber warfare would cost up to $11 billion to establish and should include around 30,000 personnel.","The proposed Cyber Force could align with the Department of the Army or operate as its own department within the Pentagon, according to the report.","The commission said the Cyber Force would take 12 to 18 months to stand up and would include roughly 5,000 National Guard members and up to 6,000 civilians.","The report comes as House and Senate lawmakers prepare to craft the annual defense authorization bill, with some seeing a cyber-specific military service as inevitable.","The fiscal 2025 defense policy bill also tasked the National Academies of Sciences, Engineering, and Medicine with studying the feasibility of creating a Cyber Force."],"insights":["The commission framed the Cyber Force as a reorganization of existing Pentagon cyber personnel and funding rather than simply a new capability, noting that DOD already has about 61,000 people involved in cyberspace operations.","The report was designed around the assumption that a president had already ordered a Cyber Force, so it focused on how to build the service instead of debating whether one is needed.","Supporters argue the current issue is not that U.S. Cyber Command is failing now, but that it lacks a clear path to grow as adversary cyber capabilities become more aggressive.","Congressional momentum is building through multiple channels, including expected defense bill amendments and a separate National Academies feasibility study already mandated in the fiscal 2025 defense policy bill."],"referencedReports":[{"title":"Commission on Cyber Force Generation","url":"https://www.csis.org/programs/strategic-technologies-program/projects/commission-us-cyber-force-generation","publisher":"Center for Strategic and International Studies and Foundation for Defense of Democracies","context":"The article is based on a commission report that proposes how a dedicated U.S. Cyber Force should be established, staffed, and funded.","category":"","primary":false},{"title":"GAO-25-107121","url":"https://www.gao.gov/products/gao-25-107121","publisher":"Government Accountability Office","context":"The article cites a GAO finding that about 61,000 people are already involved in DOD cyberspace operations.","category":"","primary":false}],"body":"\u003cp\u003eA commission of policy experts and former senior military leaders says a dedicated U.S. Cyber Force would cost up to $11 billion to establish and should include around 30,000 personnel. The proposed branch would be intended to bolster the nation’s digital defenses and better address growing cyber threats. It would be the first new military branch since the Space Force was created in 2019.\u003c/p\u003e\n\n\u003cp\u003eThe report says the Cyber Force could either align with the Department of the Army or operate as its own department within the Pentagon. It estimates the branch would take 12 to 18 months to stand up and would include roughly 5,000 National Guard members and up to 6,000 civilians. The proposal comes as lawmakers prepare the annual defense authorization bill and as separate work by the National Academies is studying the feasibility of creating such a force.\u003c/p\u003e\n"},{"n":8,"title":"What 345 Days of Untested Exposure Looks Like at a Bank","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/what-345-days-of-untested-exposure-looks-like-at-a-bank/","time":"14:02","priority":"MAY READ","score":55,"tldr":"Annual penetration tests leave banks exposed for long stretches as infrastructure, vendors, and applications change between assessments. The article argues that continuous, change-driven testing is needed to catch real-world issues like exposed third-party banking portals and cross-tenant data leaks before they become regulatory and fraud risks.","briefOverview":"\u003cp\u003eThe article argues that annual external penetration testing leaves financial institutions with a large validation gap because a typical engagement involves two to three weeks of active testing. It describes this as roughly 345 days of operational reality left unvalidated while banking infrastructure continues to change. The article frames this gap as significant because financial institutions add exposure through cloud migrations, fintech integrations, third-party portals, and M\u0026amp;A work between annual assessments.\u003c/p\u003e\n\n\u003cp\u003eThe article cites PCI DSS, FFIEC, and NYDFS as frameworks that reference penetration testing and assume testing in response to significant changes. It says the compliance question is no longer simply whether an institution tested last year, but whether it tested the assets and services that changed. The article also cites Mandiant and CrowdStrike reports to support its claim that adversaries do not wait for annual assessment cycles.\u003c/p\u003e\n\n\u003cp\u003eAs an example, the article describes a Sprocket Security engagement at a regional bank involving a customer-facing mortgage origination portal operated by a third-party platform vendor. Testers found an unauthenticated API endpoint that allowed tenant ID enumeration and exposed organization records for multiple financial institutions on the shared platform. The records included named staff, business email addresses, direct-dial phone numbers, job titles, and an internal code that could be used to submit prospective borrower applications in a named officer’s name.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents annual penetration testing as structurally mismatched to the pace of change in modern banking environments. It states that a standard annual external penetration test usually involves two to three weeks of active testing, leaving roughly 345 days of operational exposure unvalidated. It opens by referencing American Banker’s reporting that a single VPN vulnerability led to data breaches at more than seventy financial institutions using Marquis Software’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Mandiant’s M-Trends 2026 report, which it says puts 2025 median dwell time at fourteen days and espionage actors at an average of 122 days. It also cites CrowdStrike’s 2026 Global Threat Report, which it says ranks financial services fourth in interactive intrusion targeting. The article uses these references to argue that adversaries operate continuously while annual assessment models validate exposure only at fixed points in time.\u003c/p\u003e\n\n\u003cp\u003eThe regulatory discussion centers on PCI DSS, FFIEC, and NYDFS. The article states that PCI DSS 4.0 Requirement 11.3.1 mandates external penetration testing after significant infrastructure or application upgrades or modifications. It also says the FFIEC IT Examination Handbook describes penetration testing as part of ongoing vulnerability management, while NYDFS Section 500.05 mandates annual testing alongside continuous monitoring obligations strengthened in the 2023 amendments to 23 NYCRR 500.\u003c/p\u003e\n\n\u003cp\u003eThe technical example involves a regional bank’s customer-facing mortgage origination portal, hosted on a bank-owned subdomain but operated by a third-party platform vendor. Sprocket testers found an unauthenticated API endpoint that returned organization records when given a tenant ID, while the portal’s cross-origin policy allowed any third-party site to invoke the request from a visitor’s browser. The tenant ID was visible in public-facing files, and incrementing it returned records for other institutions on the shared platform.\u003c/p\u003e\n\n\u003cp\u003eThe exposed records included named staff, business email addresses, direct-dial phone numbers, job titles, and an internal code used to attribute borrower submissions to personnel. The article says possession of a valid code allowed a caller to submit a prospective borrower application in a named officer’s name against that officer’s institution. It emphasizes that the bank did not introduce the exposure, but the platform vendor did, while the bank’s hostname still made the exposure part of the bank’s external attack surface.\u003c/p\u003e\n\n\u003cp\u003eThe article’s stated response is continuous testing based on changes in infrastructure rather than fixed annual scoping. It argues that vendor-operated portals under bank-owned domains should be treated as part of the external attack surface even if the bank does not control the code. It also states that automated scanners could have flagged symptoms such as a responsive endpoint or permissive CORS policy, but human testing was needed to validate cross-tenant data access and downstream impact.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that annual external penetration testing is not sufficient for modern financial institutions because infrastructure and exposed services change continuously between assessments. It states that a standard annual external penetration test involves two to three weeks of active testing, leaving roughly 345 days of operational reality unvalidated.\u003c/p\u003e\n\n\u003cp\u003eThe article is sponsored and written by Sprocket Security. Its central claim is that banks should move from annual, snapshot-based testing to continuous testing that responds to changes in their actual external attack surface.\u003c/p\u003e\n\n\u003ch2 id=\"incident-context-cited-in-the-article\"\u003eIncident Context Cited in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article begins by referencing American Banker’s reporting that, in April, a single VPN vulnerability led to data breaches at more than seventy financial institutions running Marquis Software’s infrastructure. It notes that a patch existed and that the affected institutions likely had recent penetration tests on file. The article uses this example to argue that neither patch availability nor annual testing prevented exposure from compounding across a portfolio of financial institutions.\u003c/p\u003e\n\n\u003ch2 id=\"threat-and-dwell-time-context\"\u003eThreat and Dwell Time Context\u003c/h2\u003e\n\n\u003cp\u003eThe article cites Mandiant’s M-Trends 2026 report, saying it put the 2025 median dwell time at fourteen days and described espionage actors as averaging 122 days. It also cites CrowdStrike’s 2026 Global Threat Report, saying financial services ranked fourth in interactive intrusion targeting.\u003c/p\u003e\n\n\u003cp\u003eThe article uses these points to argue that adversaries do not operate according to annual assessment schedules. It states that adversaries did not wait between annual assessments, while the annual testing model assumed they would.\u003c/p\u003e\n\n\u003ch2 id=\"regulatory-framing\"\u003eRegulatory Framing\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses PCI DSS, FFIEC, and NYDFS as regulatory or compliance frameworks that reference penetration testing. It states that none of them describe annual cadence as sufficient.\u003c/p\u003e\n\n\u003cp\u003eSpecific references include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePCI DSS 4.0 Requirement 11.3.1, which the article says mandates external penetration testing after any significant infrastructure or application upgrade or modification.\u003c/li\u003e\n\u003cli\u003eThe FFIEC IT Examination Handbook, which the article says describes penetration testing as part of ongoing vulnerability management rather than as a discrete annual event.\u003c/li\u003e\n\u003cli\u003eNYDFS Section 500.05, which the article says mandates annual testing alongside continuous monitoring obligations strengthened in the 2023 amendments to 23 NYCRR 500.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that these frameworks assume testing happens in response to change. It says the regulatory floor was written for institutions where significant changes happened on quarterly release cycles, while modern banking infrastructure changes through digital banking releases, cloud workload migrations, fintech API integrations, third-party portal launches, and M\u0026amp;A integration work.\u003c/p\u003e\n\n\u003ch2 id=\"example-finding-from-a-regional-bank-engagement\"\u003eExample Finding From a Regional Bank Engagement\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a Sprocket Security engagement at a regional bank involving a customer-facing mortgage origination portal. The portal was fronted at a subdomain owned by the bank but operated by a third-party platform vendor. The article says the asset was in scope for external testing.\u003c/p\u003e\n\n\u003cp\u003eSprocket testers identified an API endpoint that returned organization records when given a tenant ID. The endpoint required no authentication and no session. The article also says the platform’s cross-origin policy allowed any third-party site to invoke the same request from a visitor’s browser without user interaction.
