<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":18,"title":"18-Year-Old NGINX Rewrite Module Flaw Enables Unauthenticated RCE","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/18-year-old-nginx-rewrite-module-flaw.html","time":"06:00","priority":"MUST READ","score":98,"group":null,"groupColor":null,"tldr":"F5 and researchers have patched a critical unauthenticated remote code execution flaw in NGINX's rewrite module, urging immediate updates or configuration changes to use named regex captures instead of unnamed ones.","briefOverview":"\u003cp\u003eCybersecurity researchers have disclosed a critical heap buffer overflow in NGINX\u0026rsquo;s rewrite module that remained undetected for 18 years. The flaw, identified as CVE-2026-42945 and codenamed NGINX Rift, carries a CVSS v4 score of 9.2 and allows unauthenticated attackers to trigger remote code execution or cause a denial of service. Exploitation occurs when a rewrite directive uses an unnamed PCRE capture followed by a replacement string containing a question mark. F5 released an advisory confirming the vulnerability and detailing the specific conditions required for exploitation. Patches are now available for NGINX Plus and Open Source versions, with temporary workarounds recommending the use of named regex captures instead of unnamed ones. Additionally, three other vulnerabilities were patched, including an excessive memory allocation issue, a use-after-free flaw, and an out-of-bounds read vulnerability. Users are strongly advised to apply the latest updates or adjust their rewrite configurations immediately to mitigate these risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have disclosed multiple security vulnerabilities impacting NGINX Plus and NGINX Open Source, including a critical flaw that persisted for 18 years. The primary issue, discovered by depthfirst and tracked as CVE-2026-42945, is a heap buffer overflow within the ngx_http_rewrite_module. This vulnerability carries a CVSS v4 score of 9.2 and is codenamed NGINX Rift. It can be exploited by an unauthenticated attacker sending crafted HTTP requests that trigger a heap buffer overflow in the NGINX worker process. The overflow leads to a process restart or, on systems with Address Space Layout Randomization disabled, remote code execution. Exploitation specifically requires a rewrite directive followed by a rewrite, if, or set directive that utilizes an unnamed PCRE capture alongside a replacement string containing a question mark. F5 issued an advisory on Wednesday detailing these conditions and confirming the responsible disclosure made on April 21, 2026. Patches have been deployed across multiple product lines, including specific updates for NGINX Plus R32 through R36 and NGINX Open Source versions 1.0.0 through 1.30.0. Older open source versions from 0.6.27 to 0.9.7 will not receive fixes. F5 also recommends a configuration workaround for unpatched systems by replacing unnamed regex captures with named captures in all affected rewrite directives. Beyond the critical rewrite flaw, three additional vulnerabilities were addressed in the same release cycle. CVE-2026-42946, scoring 8.3, involves excessive memory allocation in the SCGI and uWSGI modules that could allow memory reading or process restarts. CVE-2026-40701, scoring 6.3, is a use-after-free issue in the SSL module triggered when specific client verification and OCSP directives are enabled. Finally, CVE-2026-42934, also scoring 6.3, is an out-of-bounds read in the charset module that occurs when proxy pass is configured with disabled buffering. All affected users are advised to apply the latest available versions to ensure optimal protection against these threats.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eCybersecurity researchers have disclosed a series of security flaws affecting NGINX Plus and NGINX Open Source, most notably a critical heap buffer overflow that went undetected for 18 years. The primary vulnerability, identified as CVE-2026-42945 and codenamed NGINX Rift, resides within the ngx_http_rewrite_module. It carries a CVSS v4 score of 9.2 and poses a severe risk to unauthenticated remote attackers.\u003c/p\u003e\n\n\u003ch3 id=\"exploitation-mechanics-and-impact\"\u003eExploitation Mechanics and Impact\u003c/h3\u003e\n\n\u003cp\u003eThe flaw triggers when a rewrite directive is followed by a rewrite, if, or set directive that employs an unnamed PCRE capture, such as \u003cspan class=\"math inline\"\u003e\\(1 or \\)\u003c/span\u003e2. If the replacement string for this capture includes a question mark, sending a crafted HTTP request causes a heap buffer overflow in the NGINX worker process. This overflow can reliably crash the worker, resulting in a denial of service. On systems where Address Space Layout Randomization is disabled, the attacker can achieve remote code execution. The corruption bytes are directly derived from the attacker\u0026rsquo;s URI, allowing precise control over the heap corruption.\u003c/p\u003e\n\n\u003ch3 id=\"disclosure-and-patching-status\"\u003eDisclosure and Patching Status\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability was responsibly disclosed to F5 on April 21, 2026, and addressed in the following product versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNGINX Plus R32 through R36, with fixes introduced in R32 P6 and R36 P4.\u003c/li\u003e\n\u003cli\u003eNGINX Open Source 1.0.0 through 1.30.0, patched in versions 1.30.1 and 1.31.0.\u003c/li\u003e\n\u003cli\u003eNGINX Open Source 0.6.27 through 0.9.7, which will not receive updates.\u003c/li\u003e\n\u003cli\u003eNGINX Instance Manager 2.16.0 through 2.21.1.\u003c/li\u003e\n\u003cli\u003eF5 WAF for NGINX 5.9.0 through 5.12.1.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect WAF 4.9.0 through 4.16.0 and 5.1.0 through 5.8.0.\u003c/li\u003e\n\u003cli\u003eF5 DoS for NGINX 4.8.0.\u003c/li\u003e\n\u003cli\u003eNGINX App Protect DoS 4.3.0 through 4.7.0.\u003c/li\u003e\n\u003cli\u003eNGINX Gateway Fabric 1.3.0 through 1.6.2 and 2.0.0 through 2.5.1.\u003c/li\u003e\n\u003cli\u003eNGINX Ingress Controller 3.5.0 through 3.7.2, 4.0.0 through 4.0.1, and 5.0.0 through 5.4.1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mitigation-recommendations\"\u003eMitigation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eF5 advises applying the latest patches for optimal security. If immediate patching is not feasible for CVE-2026-42945, administrators should modify their rewrite configurations. The recommended workaround involves replacing all unnamed regex captures with named captures in every affected rewrite directive to prevent the heap overflow condition.\u003c/p\u003e\n\n\u003ch3 id=\"additional-patched-vulnerabilities\"\u003eAdditional Patched Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eThe same release cycle addressed three other distinct flaws within NGINX modules:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-42946 (CVSS v4: 8.3): An excessive memory allocation vulnerability in the ngx_http_scgi_module and ngx_http_uwsgi_module. This flaw allows an adversary-in-the-middle to control upstream responses, potentially reading worker memory or restarting the process when scgi_pass or uwsgi_pass is configured.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40701 (CVSS v4: 6.3): A use-after-free vulnerability in the ngx_http_ssl_module. It can be exploited when ssl_verify_client is set to on or optional, and ssl_ocsp is enabled, allowing limited data modification or process restarts.\u003c/li\u003e\n\u003cli\u003eCVE-2026-42934 (CVSS v4: 6.3): An out-of-bounds read vulnerability in the ngx_http_charset_module. This issue occurs when charset, source_charset, and charset_map directives are active alongside proxy_pass with disabled buffering, enabling memory disclosure or worker restarts.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A critical heap buffer overflow in NGINX's rewrite module, identified as CVE-2026-42945, enables unauthenticated remote code execution or denial of service.","The vulnerability is triggered when a rewrite directive uses an unnamed PCRE capture followed by a replacement string that includes a question mark.","Patches have been released for multiple NGINX Plus and Open Source versions, with F5 recommending a configuration change to replace unnamed captures with named captures as a temporary workaround.","Three additional flaws were also addressed, including an excessive memory allocation issue in the SCGI and uWSGI modules, a use-after-free vulnerability in the SSL module, and an out-of-bounds read in the charset module."],"insights":["The vulnerability triggers specifically when a rewrite directive uses an unnamed PCRE capture followed by a replacement string that includes a question mark.","Remote code execution is only possible on systems where Address Space Layout Randomization (ASLR) is disabled, whereas the vulnerability can cause a denial of service regardless of ASLR status.","F5 recommends a configuration workaround for unpatched systems that involves replacing unnamed regex captures with named captures in every affected rewrite directive.","The critical flaw remained undetected for 18 years before being disclosed by the security researcher depthfirst."],"referencedReports":[{"title":"NGINX Rift Vulnerability Research","url":"https://depthfirst.com/nginx-rift","publisher":"depthfirst","context":"The article cites this as the source where the researcher discovered and disclosed the critical heap buffer overflow flaw."},{"title":"F5 Advisory on NGINX Rewrite Module Vulnerability","url":"https://my.f5.com/manage/s/article/K000161019","publisher":"F5","context":"The article references this advisory where F5 details the vulnerability's existence in the rewrite directive and affected versions."},{"title":"F5 Advisory for CVE-2026-42946","url":"https://my.f5.com/manage/s/article/K000161027","publisher":"F5","context":"The article links to this advisory for details on the excessive memory allocation vulnerability in the SCGI and uWSGI modules."},{"title":"F5 Advisory for CVE-2026-40701","url":"https://my.f5.com/manage/s/article/K000161021","publisher":"F5","context":"The article links to this advisory for details on the use-after-free vulnerability in the SSL module."},{"title":"F5 Advisory for CVE-2026-42934","url":"https://my.f5.com/manage/s/article/K000161028","publisher":"F5","context":"The article links to this advisory for details on the out-of-bounds read vulnerability in the charset module."}],"body":"\u003cp\u003eCybersecurity researchers have disclosed a critical heap buffer overflow in NGINX\u0026rsquo;s rewrite module that remained undetected for 18 years. The flaw, identified as CVE-2026-42945 and codenamed NGINX Rift, carries a CVSS v4 score of 9.2 and allows unauthenticated attackers to trigger remote code execution or cause a denial of service. Exploitation occurs when a rewrite directive uses an unnamed PCRE capture followed by a replacement string containing a question mark. F5 released an advisory confirming the vulnerability and detailing the specific conditions required for exploitation. Patches are now available for NGINX Plus and Open Source versions, with temporary workarounds recommending the use of named regex captures instead of unnamed ones. Additionally, three other vulnerabilities were patched, including an excessive memory allocation issue, a use-after-free flaw, and an out-of-bounds read vulnerability. Users are strongly advised to apply the latest updates or adjust their rewrite configurations immediately to mitigate these risks.\u003c/p\u003e\n"},{"n":7,"title":"New Fragnesia Linux flaw lets attackers gain root privileges","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-fragnesia-linux-flaw-lets-attackers-gain-root-privileges/","time":"07:34","priority":"MUST READ","score":95,"group":"K","groupColor":"#c084fc","tldr":"A new high-severity Linux kernel vulnerability called Fragnasia allows unprivileged users to escalate to root privileges, prompting urgent kernel updates and mitigations across major distributions.","briefOverview":"\u003cp\u003eA new high-severity Linux kernel vulnerability named Fragnasia (CVE-2026-46300) allows unprivileged local attackers to escalate to root privileges. Discovered by Zellic\u0026rsquo;s William Bowling, the flaw stems from a logic bug in the XFRM ESP-in-TCP subsystem. It enables arbitrary byte writes to the kernel page cache of read-only files without requiring a race condition. The vulnerability affects all Linux kernels released before May 13, 2026, and belongs to the Dirty Frag vulnerability class. Linux distributions are currently rolling out patches to address the issue across major distributions. Organizations unable to patch immediately can disable the esp4, esp6, and rxrpc kernel modules, though this will disrupt AFS file systems and IPsec VPNs. This disclosure follows closely behind other active Linux privilege escalation flaws like Copy Fail and Pack2TheRoot. Federal agencies have been ordered by CISA to patch related vulnerabilities within two weeks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFragnasia, tracked as CVE-2026-46300, is a high-severity Linux kernel privilege escalation vulnerability that enables unprivileged local attackers to execute malicious code as root. The flaw originates from a logic bug within the Linux XFRM ESP-in-TCP subsystem, allowing attackers to write arbitrary bytes to the kernel page cache of read-only files. Zellic\u0026rsquo;s head of assurance, William Bowling, discovered the vulnerability and published a proof-of-concept exploit that corrupts the page cache memory of the /usr/bin/su binary to gain a root shell. This vulnerability is classified under the Dirty Frag vulnerability class, which impacts all Linux kernels released prior to May 13, 2026. Unlike Dirty Frag, which chains two separate kernel flaws, Fragnasia exploits a single logic bug without relying on race conditions. Both vulnerabilities share the same attack surface and mitigation strategies. Linux distributions are actively rolling out kernel patches to remediate the flaw. Administrators who cannot immediately patch their systems should execute commands to remove the esp4, esp6, and rxrpc kernel modules. However, this mitigation will break AFS distributed network file systems and IPsec VPNs. The Fragnasia disclosure arrives while distros are still patching the Copy Fail vulnerability, which CISA added to its known exploited vulnerabilities catalog on May 1. CISA has mandated that federal agencies secure their Linux systems against Copy Fail within two weeks. Additionally, Linux distros recently patched Pack2TheRoot, another root-privilege escalation flaw in the PackageKit daemon that remained undetected for a decade. Security researchers warn that these rapid successive disclosures highlight the ongoing risks of local privilege escalation in Linux environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eFragnasia, formally tracked as CVE-2026-46300, represents a high-severity Linux kernel privilege escalation flaw. The vulnerability enables unprivileged local attackers to execute arbitrary code with root privileges. It is classified as a member of the Dirty Frag vulnerability class, which impacts all Linux kernels released before May 13, 2026. Linux distributions are currently rolling out emergency patches to address the issue across major distributions.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism-discovery\"\u003eTechnical Mechanism \u0026amp; Discovery\u003c/h3\u003e\n\n\u003cp\u003eZellic\u0026rsquo;s head of assurance, William Bowling, identified the flaw and shared a public proof-of-concept exploit. The vulnerability stems from a logic bug in the Linux XFRM ESP-in-TCP subsystem. This defect allows attackers to write arbitrary bytes directly into the kernel page cache of read-only files. The exploit corrupts the page cache memory of the /usr/bin/su binary to obtain a root shell. Unlike the Dirty Frag vulnerability class, which chains two separate kernel flaws, Fragnasia achieves its memory-write primitive without requiring any race condition. Both flaws operate on the same attack surface and share identical mitigation approaches.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-strategies-operational-impact\"\u003eMitigation Strategies \u0026amp; Operational Impact\u003c/h3\u003e\n\n\u003cp\u003eSystem administrators are strongly advised to apply kernel updates immediately to secure their environments. Organizations unable to patch their systems should disable the vulnerable kernel modules using the provided commands. The mitigation requires the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExecute \u003ccode\u003ermmod esp4 esp6 rxrpc\u003c/code\u003e to unload the modules.\u003c/li\u003e\n\u003cli\u003eCreate \u003ccode\u003e/etc/modprobe.d/dirtyfrag.conf\u003c/code\u003e with install rules pointing to \u003ccode\u003e/bin/false\u003c/code\u003e.\nHowever, this mitigation carries significant operational trade-offs. Disabling these modules will break AFS distributed network file systems and IPsec VPNs. Administrators must weigh immediate security against critical network functionality.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"related-vulnerabilities-regulatory-response\"\u003eRelated Vulnerabilities \u0026amp; Regulatory Response\u003c/h3\u003e\n\n\u003cp\u003eThe Fragnasia disclosure follows closely behind the Copy Fail privilege escalation vulnerability, which is now actively exploited in the wild. CISA added Copy Fail to its catalog of known exploited vulnerabilities on May 1 and ordered federal agencies to patch their Linux systems within two weeks. The agency warned that this vulnerability type poses significant risks to the federal enterprise. Additionally, Linux distributions recently patched Pack2TheRoot, a root-privilege escalation flaw in the PackageKit daemon that went unnoticed for a decade. Security advisories emphasize that rapid patching is essential to counter these escalating local privilege escalation threats.\u003c/p\u003e\n","keyPoints":["Fragnasia (CVE-2026-46300) is a high-severity Linux kernel vulnerability caused by a logic bug in the XFRM ESP-in-TCP subsystem that enables unprivileged local attackers to escalate to root privileges.","The flaw affects all Linux kernels released before May 13, 2026, and belongs to the Dirty Frag vulnerability class.","Linux users are advised to apply immediate kernel updates or disable the vulnerable esp4, esp6, and rxrpc kernel modules using provided mitigation commands.","This vulnerability emerges alongside other recent Linux privilege escalation flaws like Copy Fail and Pack2TheRoot that require urgent patching."],"insights":["Mitigating Fragnasia by disabling esp4, esp6, and rxrpc kernel modules will break AFS distributed network file systems and IPsec VPNs, forcing operators to weigh security against critical network functionality.","Unlike the Dirty Frag vulnerability class which chains two separate flaws, Fragnasia exploits a single logic bug that achieves arbitrary kernel page cache writes without requiring any race condition, simplifying exploitation.","CISA has already mandated federal agencies patch the related Copy Fail vulnerability within two weeks, signaling that Fragnasia faces immediate active exploitation and urgent regulatory remediation timelines."],"referencedReports":[{"title":"CISA adds one known exploited vulnerability to catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references this CISA advisory to confirm that the related Copy Fail vulnerability was added to the known exploited vulnerabilities catalog on May 1, triggering a mandatory two-week remediation window for federal agencies."}],"body":"\u003cp\u003eA new high-severity Linux kernel vulnerability named Fragnasia (CVE-2026-46300) allows unprivileged local attackers to escalate to root privileges. Discovered by Zellic\u0026rsquo;s William Bowling, the flaw stems from a logic bug in the XFRM ESP-in-TCP subsystem. It enables arbitrary byte writes to the kernel page cache of read-only files without requiring a race condition. The vulnerability affects all Linux kernels released before May 13, 2026, and belongs to the Dirty Frag vulnerability class. Linux distributions are currently rolling out patches to address the issue across major distributions. Organizations unable to patch immediately can disable the esp4, esp6, and rxrpc kernel modules, though this will disrupt AFS file systems and IPsec VPNs. This disclosure follows closely behind other active Linux privilege escalation flaws like Copy Fail and Pack2TheRoot. Federal agencies have been ordered by CISA to patch related vulnerabilities within two weeks.\u003c/p\u003e\n"},{"n":13,"title":"New critical Exim mailer flaw allows remote code execution","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-critical-exim-mailer-flaw-allows-remote-code-execution/","time":"20:23","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical use-after-free vulnerability in Exim versions 4.97 through 4.99.2 with GnuTLS enables unauthenticated remote code execution, making immediate updates to version 4.99.3 essential. The flaw was successfully weaponized using a combination of autonomous AI tools and human research, underscoring the urgent need for rapid patching across widely deployed Linux mail servers.","briefOverview":"\u003cp\u003eA critical vulnerability in certain Exim mail server configurations allows unauthenticated attackers to execute arbitrary code.\u003c/p\u003e\n\n\u003cp\u003eIdentified as CVE-2026-45185, the flaw impacts Exim versions 4.97 through 4.99.2 when compiled with GnuTLS and configured to advertise STARTTLS and CHUNKING.\u003c/p\u003e\n\n\u003cp\u003eThe issue is a use-after-free condition triggered during TLS shutdown while processing BDAT chunked SMTP traffic.\u003c/p\u003e\n\n\u003cp\u003eWhen the server frees a TLS transfer buffer, it continues to use stale callback references that write data into the freed memory region.\u003c/p\u003e\n\n\u003cp\u003eThis memory corruption can lead to remote code execution on the affected server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by XBOW researcher Federico Kirschbaum on May 1.\u003c/p\u003e\n\n\u003cp\u003eA patched version, Exim 4.99.3, was released on May 12 to address the issue.\u003c/p\u003e\n\n\u003cp\u003eAdministrators using Ubuntu or Debian-based systems should immediately apply the update through their package managers.\u003c/p\u003e\n\n\u003cp\u003eNotably, Exim builds compiled with OpenSSL are completely unaffected by this vulnerability.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical security flaw in the Exim open-source mail transfer agent enables unauthenticated remote code execution on vulnerable systems.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-45185 specifically impacts Exim versions ranging from 4.97 to 4.99.2.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability only affects builds compiled with the GnuTLS library that have STARTTLS and CHUNKING features advertised.\u003c/p\u003e\n\n\u003cp\u003eIt is classified as a use-after-free flaw that triggers during the TLS shutdown process.\u003c/p\u003e\n\n\u003cp\u003eThe exploit occurs while the server handles BDAT chunked SMTP traffic.\u003c/p\u003e\n\n\u003cp\u003eDuring this process, Exim incorrectly frees a TLS transfer buffer but continues to use stale callback references.\u003c/p\u003e\n\n\u003cp\u003eThese references write data into the freed memory region, creating a dangerous use-after-free condition.\u003c/p\u003e\n\n\u003cp\u003eAttackers leveraging this flaw can execute arbitrary commands on the server and access sensitive email data.\u003c/p\u003e\n\n\u003cp\u003eDepending on the server\u0026rsquo;s configuration, successful exploitation could allow attackers to pivot deeper into the network environment.\u003c/p\u003e\n\n\u003cp\u003eXBOW researcher Federico Kirschbaum identified and reported the issue on May 1.\u003c/p\u003e\n\n\u003cp\u003eThe Exim maintainers acknowledged the report on May 5, and Linux distribution security teams were notified three days later.\u003c/p\u003e\n\n\u003cp\u003eA complete fix was released in Exim version 4.99.3 on May 12.\u003c/p\u003e\n\n\u003cp\u003eOpenSSL-based Exim builds remain unaffected by this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the development of a proof-of-concept exploit that took seven days to create.\u003c/p\u003e\n\n\u003cp\u003eThis development involved a collaborative challenge between XBOW Native, an autonomous AI system, and a human researcher assisted by a large language model.\u003c/p\u003e\n\n\u003cp\u003eThe AI successfully generated working exploits for simplified targets without ASLR and later for targets with ASLR but non-PIE binaries.\u003c/p\u003e\n\n\u003cp\u003eInterestingly, the AI targeted Exim\u0026rsquo;s own memory allocator rather than relying on standard glibc allocator mechanisms.\u003c/p\u003e\n\n\u003cp\u003eDespite the AI\u0026rsquo;s speed, the human researcher ultimately won the race by shaping the work environment and guiding the process.\u003c/p\u003e\n\n\u003cp\u003eThe researcher concluded that while large language models are excellent for rapid code analysis, they are not yet capable of independently crafting exploits for real-world production software.\u003c/p\u003e\n\n\u003cp\u003eOrganizations running Ubuntu or Debian-based distributions are strongly advised to apply the Exim 4.99.3 update immediately through their standard package managers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview and Technical Details\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-45185 is a critical use-after-free vulnerability affecting specific configurations of the Exim open-source mail transfer agent.\u003c/li\u003e\n\u003cli\u003eThe flaw impacts Exim versions 4.97 through 4.99.2 when compiled with the GnuTLS library.\u003c/li\u003e\n\u003cli\u003eIt requires the server to advertise both STARTTLS and CHUNKING protocols to be exploitable.\u003c/li\u003e\n\u003cli\u003eOpenSSL-based Exim builds are explicitly unaffected by this issue.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovery and Remediation Timeline\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eXBOW researcher Federico Kirschbaum discovered and reported the vulnerability to Exim maintainers on May 1.\u003c/li\u003e\n\u003cli\u003eThe maintainers acknowledged the report on May 5.\u003c/li\u003e\n\u003cli\u003eAffected Linux distributions were notified three days after the acknowledgment.\u003c/li\u003e\n\u003cli\u003eA patched version, Exim 4.99.3, was released on May 12 to resolve the issue.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAI-Assisted Exploit Development\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article details a seven-day challenge to build a proof-of-concept exploit between XBOW Native and a human researcher assisted by a large language model.\u003c/li\u003e\n\u003cli\u003eXBOW Native successfully produced a working exploit for a simplified target lacking Address Space Layout Randomization and non-PIE binaries.\u003c/li\u003e\n\u003cli\u003eIn a second attempt, the AI achieved an exploit on a machine with ASLR enabled but still running non-PIE binaries.\u003c/li\u003e\n\u003cli\u003eRather than attacking glibc\u0026rsquo;s allocator with standard techniques, the AI targeted Exim\u0026rsquo;s own memory allocator.\u003c/li\u003e\n\u003cli\u003eThe human researcher ultimately won the race by actively shaping the work environment instead of allowing the model to operate independently.\u003c/li\u003e\n\u003cli\u003eThe researcher noted that while large language models excel at rapidly analyzing unfamiliar code and identifying suspicious areas, they are not yet ready to independently write exploits for real-world production software.\u003c/li\u003e\n\u003cli\u003eThe human acknowledged that AI tools played a crucial role in accelerating the research process and understanding complex codebases.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CVE-2026-45185 is a critical use-after-free vulnerability in Exim versions 4.97 through 4.99.2 that enables unauthenticated remote code execution when compiled with GnuTLS.","The flaw triggers during TLS shutdown while processing BDAT chunked SMTP traffic and does not affect OpenSSL-based Exim builds.","XBOW researcher Federico Kirschbaum discovered and reported the vulnerability on May 1, leading to the release of patched Exim version 4.99.3 on May 12.","A proof-of-concept exploit was developed over seven days using a combination of autonomous AI tools and human research assisted by a large language model."],"insights":["Organizations running OpenSSL-based Exim builds are completely unaffected, providing an immediate mitigation path if patching is delayed.","The autonomous AI system bypassed traditional glibc allocator exploitation by targeting Exim's custom memory allocator, revealing a novel attack vector against proprietary memory management.","The human researcher successfully outperformed the autonomous AI in exploit development, concluding that current LLMs cannot yet independently craft exploits for real-world production software.","The vulnerability only triggers when STARTTLS and CHUNKING are explicitly advertised, meaning mail servers with these features disabled are inherently protected."],"referencedReports":[{"title":"dead-letter-cve-2026-45185-xbow-found-rce-exim","url":"https://xbow.com/blog/dead-letter-cve-2026-45185-xbow-found-rce-exim","publisher":"XBOW","context":"The article cites this link when quoting XBOW researchers on their autonomous AI and human-led exploit development process for the vulnerability."}],"body":"\u003cp\u003eA critical vulnerability in certain Exim mail server configurations allows unauthenticated attackers to execute arbitrary code.\u003c/p\u003e\n\n\u003cp\u003eIdentified as CVE-2026-45185, the flaw impacts Exim versions 4.97 through 4.99.2 when compiled with GnuTLS and configured to advertise STARTTLS and CHUNKING.\u003c/p\u003e\n\n\u003cp\u003eThe issue is a use-after-free condition triggered during TLS shutdown while processing BDAT chunked SMTP traffic.\u003c/p\u003e\n\n\u003cp\u003eWhen the server frees a TLS transfer buffer, it continues to use stale callback references that write data into the freed memory region.\u003c/p\u003e\n\n\u003cp\u003eThis memory corruption can lead to remote code execution on the affected server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by XBOW researcher Federico Kirschbaum on May 1.\u003c/p\u003e\n\n\u003cp\u003eA patched version, Exim 4.99.3, was released on May 12 to address the issue.\u003c/p\u003e\n\n\u003cp\u003eAdministrators using Ubuntu or Debian-based systems should immediately apply the update through their package managers.\u003c/p\u003e\n\n\u003cp\u003eNotably, Exim builds compiled with OpenSSL are completely unaffected by this vulnerability.\u003c/p\u003e\n"},{"n":15,"title":"PraisonAI CVE-2026-44338 Auth Bypass Targeted Within Hours of Disclosure","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/praisonai-cve-2026-44338-auth-bypass.html","time":"11:40","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Threat actors began exploiting a critical authentication bypass vulnerability in the PraisonAI framework within hours of its disclosure, making immediate patching to version 4.6.34 essential to prevent unauthorized access and workflow execution.","briefOverview":"\u003cp\u003eA critical authentication bypass vulnerability, identified as CVE-2026-44338, has been discovered in the PraisonAI open-source framework. The flaw stems from a legacy Flask API server that ships with authentication disabled by default, allowing any network-accessible user to bypass security controls. Successful exploitation enables unauthenticated enumeration of agent configurations and triggers configured workflows without requiring a valid token. The vulnerability impacts all PraisonAI versions from 2.5.6 through 4.6.33 and has been patched in version 4.6.34. Threat actors began actively probing the vulnerable endpoints within just three hours and forty-four minutes of the public advisory release. Automated scanners from a single IP address successfully confirmed the bypass by retrieving agent data through a direct GET request. Security researchers recommend immediate patching, deployment audits, and credential rotation to mitigate the risk. Organizations must recognize that the exploitation window for newly disclosed AI vulnerabilities is now measured in single-digit hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePraisonAI, an open-source multi-agent orchestration framework, is affected by CVE-2026-44338, a critical authentication bypass vulnerability rated at a CVSS score of 7.3. The issue originates from a legacy Flask-based API server that hardcodes authentication as disabled and leaves the authentication token unset. This configuration exposes sensitive endpoints to unauthenticated callers, allowing them to access the \u003ccode\u003e/agents\u003c/code\u003e endpoint and trigger workflows through the \u003ccode\u003e/chat\u003c/code\u003e endpoint without a valid token. The potential impacts include unauthenticated enumeration of agent files, unauthorized execution of configured workflows, repeated consumption of model API quotas, and exposure of execution results. The actual severity depends on the permissions defined in the operator\u0026rsquo;s \u003ccode\u003eagents.yaml\u003c/code\u003e file, though the bypass itself is unconditional in the default configuration. All PraisonAI versions ranging from 2.5.6 to 4.6.33 are vulnerable, with the flaw patched in version 4.6.34. Security researcher Shmulik Cohen was credited with discovering and reporting the vulnerability. Cloud security firm Sysdig published a report detailing how threat actors began exploiting the flaw almost immediately after disclosure. An automated scanner using the User-Agent string \u003ccode\u003eCVE-Detector/1.0\u003c/code\u003e initiated its first probe at 17:40 UTC on May 11, 2026, just three hours and forty-four minutes after the advisory was published at 13:56 UTC. The scanning activity originated from IP address 146.190.133.49 and executed two passes spaced eight minutes apart. Each pass generated approximately seventy requests over fifty seconds, first probing generic disclosure paths and subsequently targeting AI-agent surfaces. A direct GET request to \u003ccode\u003e/agents\u003c/code\u003e without an authorization header returned a successful response containing the agent file configuration. No POST requests to the \u003ccode\u003e/chat\u003c/code\u003e endpoint were observed, indicating the activity was focused on initial reconnaissance and exploit confirmation. PraisonAI maintainers advise users to apply the latest patch immediately, audit their existing deployments, review model provider billing for anomalies, and rotate any credentials stored in the \u003ccode\u003eagents.yaml\u003c/code\u003e file. The rapid exploitation timeline underscores a broader trend where adversary tooling has scaled across the entire AI ecosystem, compressing the window between vulnerability disclosure and active exploitation into single-digit hours.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-44338 represents a critical authentication bypass flaw within the PraisonAI open-source multi-agent orchestration framework. The vulnerability carries a CVSS score of 7.3 and fundamentally stems from a legacy Flask API server that ships with security controls disabled by default. Specifically, the \u003ccode\u003esrc/praisonai/api_server.py\u003c/code\u003e file hardcodes \u003ccode\u003eAUTH_ENABLED = False\u003c/code\u003e and \u003ccode\u003eAUTH_TOKEN = None\u003c/code\u003e. This configuration effectively removes authentication requirements for the legacy server, exposing protected functionality to any network-accessible caller.\u003c/p\u003e\n\n\u003ch3 id=\"technical-impact-and-exploitation\"\u003eTechnical Impact and Exploitation\u003c/h3\u003e\n\n\u003cp\u003eThe unconditional authentication bypass allows unauthenticated actors to interact with critical API endpoints. Attackers can enumerate configured agent files through the \u003ccode\u003e/agents\u003c/code\u003e endpoint and trigger locally configured workflows via the \u003ccode\u003e/chat\u003c/code\u003e endpoint. Successful exploitation leads to several adverse outcomes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthenticated enumeration of agent configurations\u003c/li\u003e\n\u003cli\u003eUnauthorized workflow execution\u003c/li\u003e\n\u003cli\u003eRepeated consumption of model API quotas\u003c/li\u003e\n\u003cli\u003eExposure of execution results to external parties\nThe ultimate impact severity is contingent upon the permissions granted within the operator\u0026rsquo;s \u003ccode\u003eagents.yaml\u003c/code\u003e configuration file.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"affected-versions-and-remediation\"\u003eAffected Versions and Remediation\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability impacts all PraisonAI Python package versions from 2.5.6 through 4.6.33. The maintainers have released patch version 4.6.34 to resolve the issue. Security researcher Shmulik Cohen is credited with identifying and reporting the flaw. PraisonAI recommends that users immediately apply the patch, conduct thorough audits of existing deployments, review model provider billing statements for suspicious activity, and rotate any credentials referenced in the \u003ccode\u003eagents.yaml\u003c/code\u003e file.\u003c/p\u003e\n\n\u003ch3 id=\"exploitation-timeline-and-threat-actor-activity\"\u003eExploitation Timeline and Threat Actor Activity\u003c/h3\u003e\n\n\u003cp\u003eCloud security firm Sysdig documented a rapid exploitation campaign that began shortly after the vulnerability advisory was made public. The advisory was published on May 11, 2026, at 13:56 UTC. Automated scanning activity targeting the exact vulnerable endpoint commenced at 17:40 UTC, merely three hours and forty-four minutes later. The scanning traffic originated from IP address 146.190.133.49 and utilized the \u003ccode\u003eCVE-Detector/1.0\u003c/code\u003e User-Agent string. The scanner executed two distinct passes separated by an eight-minute interval, generating approximately seventy requests per pass over fifty-second windows. The initial pass scanned generic disclosure paths such as \u003ccode\u003e/.env\u003c/code\u003e, \u003ccode\u003e/admin\u003c/code\u003e, and \u003ccode\u003e/Gemfile.lock\u003c/code\u003e. The subsequent pass specifically targeted AI-agent surfaces, including the PraisonAI framework. A direct GET request to \u003ccode\u003e/agents\u003c/code\u003e without an authorization header returned a 200 OK status with JSON payload confirming the successful bypass. No POST requests to the \u003ccode\u003e/chat\u003c/code\u003e endpoint were observed, indicating the activity was strictly reconnaissance aimed at confirming exploitability.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-and-strategic-implications\"\u003eIndustry Context and Strategic Implications\u003c/h3\u003e\n\n\u003cp\u003eThis rapid exploitation cycle exemplifies a broader trend where threat actors integrate newly disclosed vulnerabilities into their automated tooling before patches can be deployed. Adversary infrastructure has scaled across the entire AI and agent ecosystem, affecting projects of all sizes beyond just major commercial vendors. Security teams must operate under the assumption that the window between public disclosure and active exploitation for unauthenticated defaults is now measured in single-digit hours. Proactive monitoring, immediate patching, and strict configuration reviews are essential to mitigate these accelerated threat vectors.\u003c/p\u003e\n","keyPoints":["CVE-2026-44338 is a CVSS score of 7.3 authentication bypass vulnerability in PraisonAI caused by a legacy Flask API server that ships with authentication disabled by default.","The flaw affects PraisonAI versions 2.5.6 through 4.6.33 and allows unauthenticated users to enumerate agent configurations and trigger workflows without a valid token.","Security researchers observed automated scanners probing the vulnerable endpoints within three hours and forty-four minutes of the public advisory release.","The vulnerability has been patched in PraisonAI version 4.6.34, prompting recommendations for immediate updates and credential rotation."],"insights":["The impact of the authentication bypass is entirely contingent on the operator's agents.yaml permissions, meaning the actual risk varies based on configuration rather than the vulnerability itself.","Automated scanners are employing a two-pass reconnaissance methodology that first probes generic disclosure paths before specifically targeting AI-agent surfaces, revealing a standardized exploitation pattern for AI ecosystems.","The legacy Flask server ships with AUTH_ENABLED = False hardcoded, indicating that the vulnerability is an unconditional default configuration flaw requiring organizations to audit deployments rather than relying solely on vendor patches."],"referencedReports":[{"title":"CVE-2026-44338 PraisonAI Authentication Bypass in Under 4 Hours and the Growing Trend of Rapid Exploitation","url":"https://www.sysdig.com/blog/cve-2026-44338-praisonai-authentication-bypass-in-under-4-hours-and-the-growing-trend-of-rapid-exploitation","publisher":"Sysdig","context":"The article cites this report to detail how threat actors and automated scanners began probing vulnerable instances within hours of the vulnerability's public disclosure."},{"title":"GHSA-6rmh-7xcm-cpxj","url":"https://github.com/advisories/GHSA-6rmh-7xcm-cpxj","publisher":"PraisonAI Maintainers","context":"The article references this advisory to explain that the framework's legacy Flask API server ships with authentication disabled by default, allowing unauthenticated access to sensitive endpoints."}],"body":"\u003cp\u003eA critical authentication bypass vulnerability, identified as CVE-2026-44338, has been discovered in the PraisonAI open-source framework. The flaw stems from a legacy Flask API server that ships with authentication disabled by default, allowing any network-accessible user to bypass security controls. Successful exploitation enables unauthenticated enumeration of agent configurations and triggers configured workflows without requiring a valid token. The vulnerability impacts all PraisonAI versions from 2.5.6 through 4.6.33 and has been patched in version 4.6.34. Threat actors began actively probing the vulnerable endpoints within just three hours and forty-four minutes of the public advisory release. Automated scanners from a single IP address successfully confirmed the bypass by retrieving agent data through a direct GET request. Security researchers recommend immediate patching, deployment audits, and credential rotation to mitigate the risk. Organizations must recognize that the exploitation window for newly disclosed AI vulnerabilities is now measured in single-digit hours.\u003c/p\u003e\n"},{"n":17,"title":"New Fragnesia Linux Kernel LPE Grants Root Access via Page Cache Corruption","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/new-fragnesia-linux-kernel-lpe-grants.html","time":"07:06","priority":"MUST READ","score":95,"group":"K","groupColor":"#c084fc","tldr":"The Linux kernel vulnerability Fragnesia (CVE-2026-46300) enables unprivileged users to escalate privileges to root through page cache corruption, requiring immediate patching or mitigation via disabling XFRM ESP-in-TCP functionality.","briefOverview":"\u003cp\u003eA new Linux kernel vulnerability codenamed Fragnesia (CVE-2026-46300) allows unprivileged local attackers to escalate privileges to root access. Discovered by researcher William Bowling of the V12 security team, the bug exploits a logic flaw in the XFRM ESP-in-TCP subsystem. It enables deterministic page-cache corruption of read-only files without requiring any race condition. This marks the third local privilege escalation vulnerability identified in the kernel within just two weeks. Multiple Linux distributions, including Ubuntu, Red Hat, and Debian, have already released security advisories. Vendors recommend applying patches or mitigating the issue by disabling esp4, esp6, and related XFRM functionality. While no in-the-wild exploitation has been observed yet, researchers urge immediate patching. Additionally, threat actors are reportedly advertising a separate zero-day Linux exploit for $170,000 on cybercrime forums.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDetails have emerged about Fragnesia, a new variant of the recent Dirty Frag Linux local privilege escalation vulnerability.\nThe security flaw is tracked as CVE-2026-46300 and carries a CVSS score of 7.8.\nIt was discovered by researcher William Bowling of the V12 security team.\nThe vulnerability abuses a logic bug in the Linux XFRM ESP-in-TCP subsystem to achieve arbitrary byte writes into the kernel page cache.\nAttackers can modify read-only file contents to achieve root privileges through a deterministic page-cache corruption primitive.\nNotably, this exploitation does not require any race condition to succeed.\nThis bug follows closely behind two other recent kernel flaws, Copy Fail and Dirty Frag, making it the third such vulnerability identified in a two-week span.\nLike its predecessors, Fragnesia immediately yields root access on all major distributions by corrupting the page cache memory of the /usr/bin/su binary.\nA proof-of-concept exploit has been publicly released by the V12 security team.\nMultiple Linux distributions, including AlmaLinux, Amazon Linux, CloudLinux, Debian, Gentoo, Red Hat, SUSE, and Ubuntu, have published official advisories.\nVendors recommend applying available patches as soon as possible.\nOrganizations unable to patch immediately should disable esp4, esp6, and related xfrm/IPsec functionality.\nAdditional mitigation steps include restricting unnecessary local shell access, hardening containerized workloads, and increasing monitoring for abnormal privilege escalation activity.\nCloudLinux maintainers noted that existing Dirty Frag mitigations remain effective, requiring no further action until patched kernels are released.\nRed Hat is currently assessing whether those same mitigations extend to this new CVE.\nWiz researchers observed that AppArmor restrictions on unprivileged user namespaces may serve as a partial mitigation, though successful exploitation might still require additional bypasses.\nUnlike Dirty Frag, this vulnerability does not require host-level privileges to execute.\nMicrosoft security intelligence urged users to run update tools immediately, noting that no in-the-wild exploitation has been observed at this time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h2\u003e\n\n\u003cp\u003eFragnesia (CVE-2026-46300) is a newly identified Linux kernel local privilege escalation (LPE) vulnerability.\nThe flaw carries a CVSS score of 7.8 and was discovered by researcher William Bowling of the V12 security team.\nIt is codenamed Fragnesia and represents a distinct bug within the XFRM ESP-in-TCP subsystem.\nThis marks the third kernel LPE vulnerability identified within a two-week period, following closely behind the Copy Fail and Dirty Frag bugs.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability exploits a logic bug in the Linux XFRM ESP-in-TCP subsystem.\nUnprivileged local attackers can leverage this flaw to achieve arbitrary byte writes into the kernel page cache.\nSpecifically, the bug allows attackers to modify read-only file contents without requiring any race condition.\nThis deterministic page-cache corruption primitive enables immediate root privilege escalation on all major Linux distributions.\nThe exploitation corrupts the page cache memory of the /usr/bin/su binary to gain elevated access.\nA proof-of-concept (PoC) exploit has been released by the V12 security team.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-and-mitigation\"\u003eVendor Response and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eMultiple Linux distributions have already released security advisories to address the flaw.\nOfficial notices have been published by AlmaLinux, Amazon Linux, CloudLinux, Debian, Gentoo, Red Hat Enterprise Linux, SUSE, and Ubuntu.\nVendors strongly recommend applying available patches immediately.\nMicrosoft security intelligence emphasized that while no in-the-wild exploitation has been observed, organizations should run update tools as soon as possible.\nFor environments where patching is not immediately feasible, the following mitigations are advised:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisable esp4, esp6, and related xfrm/IPsec functionality\u003c/li\u003e\n\u003cli\u003eRestrict unnecessary local shell access\u003c/li\u003e\n\u003cli\u003eHarden containerized workloads\u003c/li\u003e\n\u003cli\u003eIncrease monitoring for abnormal privilege escalation activity\nCloudLinux maintainers confirmed that existing Dirty Frag mitigations remain effective, meaning no additional action is required until patched kernels are released.\nRed Hat is currently conducting an assessment to verify whether those same mitigations extend to CVE-2026-46300.\nAdditionally, Wiz researchers noted that AppArmor restrictions on unprivileged user namespaces may provide partial mitigation, though attackers might still bypass these controls.\nUnlike Dirty Frag, this vulnerability does not require host-level privileges to execute successfully.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-landscape-context\"\u003eThreat Landscape Context\u003c/h2\u003e\n\n\u003cp\u003eThe emergence of Fragnesia coincides with broader exploitation activity in the Linux ecosystem.\nA threat actor known as \u0026ldquo;berz0k\u0026rdquo; has been observed advertising a separate zero-day Linux LPE exploit on cybercrime forums.\nThe seller is asking $170,000 for the vulnerability and claims it works across multiple major Linux distributions.\nAccording to ThreatMon, the advertised exploit is reportedly TOCTOU-based and enables stable local privilege escalation without causing system crashes.\nThe threat actor also claims the exploit leverages a shared object (.so) payload that is dropped into the /tmp directory.\u003c/p\u003e\n","keyPoints":["Fragnesia (CVE-2026-46300) is a Linux kernel vulnerability with a CVSS score of 7.8 that enables unprivileged local attackers to gain root access through deterministic page-cache corruption.","The vulnerability exploits a logic bug in the XFRM ESP-in-TCP subsystem to achieve arbitrary byte writes into the kernel page cache of read-only files without requiring a race condition.","Linux distributions including Red Hat, Ubuntu, and Debian have released advisories, and vendors recommend applying patches or mitigating the issue by disabling esp4, esp6, and related xfrm/IPsec functionality.","A proof-of-concept exploit was released by researcher William Bowling of the V12 security team, and the vulnerability is identified as the third local privilege escalation bug in the kernel within two weeks."],"insights":["Fragnesia enables arbitrary byte writes into the kernel page cache of read-only files without requiring a race condition, allowing for deterministic root privilege escalation.","Threat actor \"berz0k\" is advertising a zero-day Linux LPE exploit for $170,000 that claims to be TOCTOU-based and drops a .so payload into the /tmp directory.","AppArmor restrictions on unprivileged user namespaces serve as a partial mitigation, though exploitation may still succeed if attackers bypass these restrictions.","CloudLinux indicates that existing Dirty Frag mitigations are sufficient for Fragnesia, meaning no immediate action is required beyond the previous patch."],"referencedReports":[{"title":"Fragnesia Linux Kernel Local Privilege Escalation via ESP-in-TCP","url":"https://www.wiz.io/blog/fragnesia-linux-kernel-local-privilege-escalation-via-esp-in-tcp","publisher":"Wiz","context":"Cited as the technical analysis explaining how the vulnerability enables unprivileged attackers to corrupt the kernel page cache and achieve root privileges."},{"title":"CVE-2026-31431: Copy Fail","url":"https://unit42.paloaltonetworks.com/cve-2026-31431-copy-fail-copy-fail/","publisher":"Palo Alto Networks Unit 42","context":"Referenced as a prior similar vulnerability report that also yields root access through kernel memory write primitives."},{"title":"Fragnesia (CVE-2026-46300)","url":"https://almalinux.org/blog/2026-05-13-fragnesia-cve-2026-46300/","publisher":"AlmaLinux","context":"Listed among multiple Linux distributions that have released official security advisories regarding the vulnerability."},{"title":"AWS-2026-029","url":"https://aws.amazon.com/security/security-bulletins/rss/2026-029-aws/","publisher":"Amazon Linux","context":"Included in the list of distributions issuing official security bulletins to address the kernel bug."},{"title":"CVE-2026-46300","url":"https://www.suse.com/security/cve/CVE-2026-46300.html","publisher":"SUSE","context":"Referenced as one of the major Linux distributions publishing an official security advisory for the vulnerability."},{"title":"CVE-2026-46300","url":"https://ubuntu.com/security/CVE-2026-46300","publisher":"Ubuntu","context":"Listed alongside other vendors as having released an official security notice addressing the kernel privilege escalation bug."},{"title":"CVE-2026-46300","url":"https://access.redhat.com/security/cve/cve-2026-46300","publisher":"Red Hat","context":"Cited as the vendor performing an assessment to confirm if existing mitigations extend to this new CVE."},{"title":"Fragnesia Mitigation and Kernel Update","url":"https://blog.cloudlinux.com/fragnesia-mitigation-and-kernel-update","publisher":"CloudLinux","context":"Referenced for stating that customers who applied Dirty Frag mitigations need no further action until patched kernels are released."}],"body":"\u003cp\u003eA new Linux kernel vulnerability codenamed Fragnesia (CVE-2026-46300) allows unprivileged local attackers to escalate privileges to root access. Discovered by researcher William Bowling of the V12 security team, the bug exploits a logic flaw in the XFRM ESP-in-TCP subsystem. It enables deterministic page-cache corruption of read-only files without requiring any race condition. This marks the third local privilege escalation vulnerability identified in the kernel within just two weeks. Multiple Linux distributions, including Ubuntu, Red Hat, and Debian, have already released security advisories. Vendors recommend applying patches or mitigating the issue by disabling esp4, esp6, and related XFRM functionality. While no in-the-wild exploitation has been observed yet, researchers urge immediate patching. Additionally, threat actors are reportedly advertising a separate zero-day Linux exploit for $170,000 on cybercrime forums.\u003c/p\u003e\n"},{"n":6,"title":"Windows BitLocker zero-day gives access to protected drives, PoC released","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/windows-bitlocker-zero-day-gives-access-to-protected-drives-poc-released/","time":"16:37","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"A security researcher has publicly released proof-of-concept exploits for two unpatched Windows zero-days, YellowKey and GreenPlasma, which respectively bypass BitLocker encryption and escalate privileges, citing dissatisfaction with Microsoft's vulnerability handling.","briefOverview":"\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse has publicly released proof-of-concept exploits for two unpatched Windows vulnerabilities named YellowKey and GreenPlasma. YellowKey functions as a BitLocker bypass that allows attackers to gain unrestricted access to encrypted drives by placing crafted files on storage media and triggering a Windows Recovery Environment shell. GreenPlasma is a privilege escalation flaw that enables unprivileged users to create arbitrary memory-section objects, potentially allowing manipulation of privileged services to achieve SYSTEM permissions. Independent security experts have verified the YellowKey exploit and confirmed its technical mechanism involving NTFS transaction replay within the recovery environment. The researcher cited dissatisfaction with Microsoft’s vulnerability handling as the motivation for these public disclosures and hinted at further leaks for upcoming Patch Tuesdays. Microsoft stated it continues to investigate reported issues and supports coordinated disclosure practices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA cybersecurity researcher operating under the name Chaotic Eclipse has published proof-of-concept exploits for two unpatched Microsoft Windows vulnerabilities, designated YellowKey and GreenPlasma.\u003c/p\u003e\n\n\u003cp\u003eYellowKey operates as a BitLocker bypass that affects Windows 11 and Windows Server 2022 and 2025. The exploit requires placing specially crafted FsTx files on a USB drive or the EFI partition, followed by a reboot into the Windows Recovery Environment. By holding the CTRL key during boot, attackers can trigger a command shell that bypasses BitLocker encryption entirely.\u003c/p\u003e\n\n\u003cp\u003eIndependent researcher Kevin Beaumont confirmed the exploit’s validity and advised organizations to implement a BitLocker PIN alongside a BIOS password. Technical analysis by Will Dormann clarified that YellowKey exploits NTFS transaction replay within the recovery environment to delete the winpeshl.ini file, causing the system to launch a CMD shell instead of the actual recovery interface.\u003c/p\u003e\n\n\u003cp\u003eThe researcher noted that the current public exploit only targets TPM-only auto-unlock configurations and cannot decrypt physically stolen drives, despite claims that it also works in TPM plus PIN environments. GreenPlasma represents a separate privilege escalation flaw described as a Windows CTFMON arbitrary section creation vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThis flaw allows unprivileged users to generate arbitrary memory-section objects within directories writable by SYSTEM, potentially enabling the manipulation of kernel-mode drivers or services. Although the leaked proof-of-concept lacks the final component required for a full SYSTEM shell, the researcher indicated it could be adapted for complete privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe researcher’s decision to publicly disclose these vulnerabilities stems from dissatisfaction with Microsoft’s bug reporting processes. Previous leaks attributed to the same source, including BlueHammer and RedSun, were reportedly exploited in the wild shortly after disclosure.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft responded by reaffirming its commitment to investigating security issues and updating affected devices promptly. The company also emphasized its support for coordinated vulnerability disclosure as an industry standard for addressing threats safely.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview-of-the-disclosure\"\u003eOverview of the Disclosure\u003c/h3\u003e\n\n\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse, also operating as Nightmare Eclipse on GitHub, has publicly released proof-of-concept exploits for two unpatched Microsoft Windows vulnerabilities. The vulnerabilities are named YellowKey and GreenPlasma, representing a BitLocker bypass and a local privilege escalation flaw, respectively. This disclosure follows previous public leaks attributed to the same researcher, including BlueHammer and RedSun, which were reportedly exploited in the wild shortly after their initial disclosure.\u003c/p\u003e\n\n\u003ch3 id=\"technical-analysis-of-yellowkey\"\u003eTechnical Analysis of YellowKey\u003c/h3\u003e\n\n\u003cp\u003eYellowKey functions as a BitLocker bypass that impacts Windows 11 and Windows Server 2022 and 2025. The exploitation process involves placing specially crafted FsTx files on an external USB drive or the target drive’s EFI partition. After rebooting into the Windows Recovery Environment, attackers hold down the CTRL key to trigger a command shell. This shell gains unrestricted access to the storage volume protected by BitLocker.\u003c/p\u003e\n\n\u003cp\u003eIndependent analysis confirms that YellowKey exploits NTFS transactions combined with the Windows Recovery image. Specifically, Windows searches for FsTx directories on attached drives and replays NTFS logs, which deletes the winpeshl.ini file. Consequently, the system launches CMD.EXE instead of the actual recovery environment while the disk remains unlocked. The researcher stated that the current public exploit only targets TPM-only auto-unlock configurations and cannot decrypt physically stolen drives. However, the researcher also claimed the vulnerability remains exploitable in TPM plus PIN environments, though they have not released a proof-of-concept for that scenario.\u003c/p\u003e\n\n\u003ch3 id=\"technical-analysis-of-greenplasma\"\u003eTechnical Analysis of GreenPlasma\u003c/h3\u003e\n\n\u003cp\u003eGreenPlasma is classified as a Windows CTFMON arbitrary section creation elevation of privileges vulnerability. This flaw allows an unprivileged user to create arbitrary memory-section objects within directory objects that are writable by SYSTEM. These created objects can potentially manipulate privileged services or drivers that trust specific paths inaccessible to standard users.\u003c/p\u003e\n\n\u003cp\u003eThe leaked proof-of-concept is currently incomplete and lacks the necessary component to achieve a full SYSTEM shell. Despite this limitation, the researcher noted that the vulnerability could be adapted to achieve complete privilege escalation.\u003c/p\u003e\n\n\u003ch3 id=\"researcher-motivation-and-future-threats\"\u003eResearcher Motivation and Future Threats\u003c/h3\u003e\n\n\u003cp\u003eThe researcher explicitly stated that the decision to publicly disclose YellowKey and GreenPlasma, along with exploitation guidance, was driven by dissatisfaction with Microsoft’s handling of bug reports. Chaotic Eclipse has committed to continuing the public leakage of exploits for undocumented Windows vulnerabilities. The researcher also hinted at releasing a “big surprise” targeting Microsoft’s upcoming Patch Tuesday.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the researcher criticized Microsoft for silently patching the RedSun vulnerability without assigning a CVE identifier. Microsoft responded by reaffirming its commitment to investigating security issues and updating affected devices promptly. The company also emphasized its support for coordinated vulnerability disclosure as an industry standard for addressing threats safely.\u003c/p\u003e\n\n\u003ch3 id=\"independent-verification-and-mitigation\"\u003eIndependent Verification and Mitigation\u003c/h3\u003e\n\n\u003cp\u003eIndependent security researcher Kevin Beaumont verified the YellowKey exploit and confirmed that BitLocker contains a backdoor. Beaumont recommended mitigating the risk by implementing both a BitLocker PIN and a BIOS password. Principal vulnerability analyst Will Dormann confirmed that the exploit works when FsTx files are placed on a USB drive, though he could not reproduce the bug using the EFI partition.\u003c/p\u003e\n\n\u003cp\u003eDormann explained that the exploit leverages the auto-unlock feature on boot, which transparently decrypts disks without user interaction. He noted that testing YellowKey must be performed on the original device where the TPM stores the encryption keys.\u003c/p\u003e\n","keyPoints":["A researcher known as Chaotic Eclipse has publicly released proof-of-concept exploits for two unpatched Windows vulnerabilities named YellowKey and GreenPlasma.","YellowKey acts as a BitLocker bypass that grants unrestricted access to encrypted drives by placing crafted files on storage media and triggering a Windows Recovery Environment shell.","GreenPlasma is a privilege escalation flaw that allows unprivileged users to create arbitrary memory-section objects, potentially enabling manipulation of privileged services to achieve SYSTEM permissions.","Independent researchers have verified the YellowKey exploit, and security experts recommend using a BitLocker PIN combined with a BIOS password as a mitigation strategy."],"insights":["YellowKey exploits NTFS transaction replay within the Windows Recovery Environment to delete the winpeshl.ini file, tricking the system into launching a CMD shell instead of the actual recovery interface.","Independent analysis reveals that YellowKey currently only bypasses TPM-only auto-unlock BitLocker configurations and cannot decrypt physically stolen drives, contradicting the researcher's claim that it works in TPM+PIN environments.","Microsoft silently patched the RedSun zero-day without assigning a CVE identifier, highlighting a pattern of hushed updates that the researcher cites as justification for public exploit disclosure.","GreenPlasma allows unprivileged users to create arbitrary memory-section objects in SYSTEM-writable directories, enabling potential manipulation of kernel-mode drivers or services by forcing them to trust attacker-controlled paths."],"referencedReports":[],"body":"\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse has publicly released proof-of-concept exploits for two unpatched Windows vulnerabilities named YellowKey and GreenPlasma. YellowKey functions as a BitLocker bypass that allows attackers to gain unrestricted access to encrypted drives by placing crafted files on storage media and triggering a Windows Recovery Environment shell. GreenPlasma is a privilege escalation flaw that enables unprivileged users to create arbitrary memory-section objects, potentially allowing manipulation of privileged services to achieve SYSTEM permissions. Independent security experts have verified the YellowKey exploit and confirmed its technical mechanism involving NTFS transaction replay within the recovery environment. The researcher cited dissatisfaction with Microsoft’s vulnerability handling as the motivation for these public disclosures and hinted at further leaks for upcoming Patch Tuesdays. Microsoft stated it continues to investigate reported issues and supports coordinated disclosure practices.\u003c/p\u003e\n"},{"n":3,"title":"Kimsuky targets organizations with PebbleDash-based tools","source":"securelist.com","sourceColor":"#2dd4bf","link":"https://securelist.com/kimsuky-appleseed-pebbledash-campaigns/119785/","time":"11:00","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Kimsuky (APT43) is continuously evolving its operations by integrating legitimate tools like VSCode tunneling and DWAgent into its advanced PebbleDash and AppleSeed malware clusters to maintain persistence and conduct post-exploitation activities. This tactical adaptation allows the group to effectively target South Korean and global defense and government sectors while evading traditional security detection.","briefOverview":"\u003cp\u003eKimsuky, also known as APT43, has significantly evolved its cyber operations by integrating advanced PebbleDash and AppleSeed malware clusters with legitimate tools like VSCode tunneling and DWAgent. The threat actor primarily targets South Korean public and private entities, with recent campaigns expanding into global defense and government sectors. Initial access is consistently achieved through meticulously crafted spear-phishing emails containing malicious attachments disguised as official documents. These attachments deploy sophisticated droppers that deliver backdoors such as the Rust-based HelloDoor, the HTTP/HTTPS-based httpMalice, and the memory-resident MemLoad. For post-exploitation activities, Kimsuky leverages automated VSCode tunneling to establish covert remote access while utilizing DWAgent for routine remote administration. Command-and-control infrastructure relies heavily on South Korean free hosting services and temporary tunneling platforms to evade detection. Technical analysis reveals that both the PebbleDash and AppleSeed clusters are maintained by the same actor, as evidenced by overlapping distribution methods, shared certificates, and aligned targeting strategies.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKimsuky, a prolific Korean-speaking threat actor active since 2013, has introduced notable tactical shifts in its recent campaigns by expanding its PebbleDash and AppleSeed malware clusters. Initial access is consistently established through spear-phishing emails containing malicious attachments disguised as product quotations, government documents, or personal photos. The group occasionally contacts targets via messengers, but the primary vector remains compressed files containing droppers in formats such as JSE, EXE, PIF, and SCR. These droppers utilize Base64 encoding, XOR encryption, or legitimate installers to deploy advanced backdoors while evading detection.\u003c/p\u003e\n\n\u003cp\u003eThe PebbleDash cluster encompasses several variants, including the newly identified Rust-based HelloDoor, which relies on Cloudflare Quick Tunnels for command-and-control communication. The cluster also features httpMalice, a sophisticated backdoor that communicates over HTTP or HTTPS using ChaCha20 encryption and establishes persistence through Windows services or registry modifications. MemLoad serves as a reflective loader that conducts anti-VM checks and downloads the httpTroy backdoor for long-term access and data exfiltration. Parallel to this, the AppleSeed cluster targets government organizations and has evolved to collect sensitive materials, including the South Korean GPKI digital certificates used for official authentication.\u003c/p\u003e\n\n\u003cp\u003eFor post-exploitation activities, Kimsuky heavily relies on legitimate tools to maintain stealth, specifically automating Visual Studio Code tunneling to bypass traditional security controls. The group also deploys DWAgent, an open-source remote monitoring tool, to establish covert administrative access over legitimate relay servers. Infrastructure operations predominantly utilize South Korean free domain hosting services alongside hacked local websites and tunneling platforms like Ngrok. Targeting efforts focus heavily on South Korean entities, though the PebbleDash cluster has recently expanded its reach to defense organizations in Brazil and Germany. Technical analysis confirms that both malware clusters are operated by the same actor, as they share identical distribution methods, stolen certificates, and overlapping target sectors. The threat actor demonstrates a clear capability to modify existing source code and integrate new technologies, including the use of large language models during malware development.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-overview\"\u003eExecutive Overview\u003c/h3\u003e\n\n\u003cp\u003eKimsuky (also tracked as APT43, Ruby Sleet, and Black Banshee) is a Korean-speaking threat actor that has been active since 2013. Recent analysis reveals significant tactical evolution, particularly through the continuous development of the PebbleDash and AppleSeed malware clusters. The group has strategically integrated legitimate tools into its attack lifecycle to enhance persistence and evade detection.\u003c/p\u003e\n\n\u003ch3 id=\"initial-access-and-delivery-mechanisms\"\u003eInitial Access and Delivery Mechanisms\u003c/h3\u003e\n\n\u003cp\u003eThe actor primarily targets South Korean public and private sectors, occasionally expanding to global defense and government entities. Initial compromise is achieved through meticulously crafted spear-phishing emails or direct messenger contacts. These messages contain compressed attachments disguised as official documents, surveys, or personal files.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttachments typically contain droppers formatted as JSE, EXE, PIF, or SCR files.\u003c/li\u003e\n\u003cli\u003eJSE droppers embed benign lure files alongside malicious payloads using dual Base64 encoding.\u003c/li\u003e\n\u003cli\u003eSCR and PIF droppers utilize XOR encryption with hardcoded keys to decrypt internal data before execution.\u003c/li\u003e\n\u003cli\u003eAdditional droppers are crafted in Go or packaged with Inno Setup to bypass static analysis.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"deployed-malware-the-pebbledash-cluste
