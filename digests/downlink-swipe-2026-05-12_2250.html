new features to Windows 10. Administrators should also be aware of a known issue where certain systems prompt for BitLocker recovery keys after installing recent updates. This problem specifically impacts configurations using PCR7 in the TPM validation profile alongside Secure Boot conditions tied to the Windows UEFI CA 2023 certificate. Microsoft recommends temporarily removing the affected Group Policy setting and suspending BitLocker to regenerate PCR bindings until a permanent fix is available. The update also introduces dynamic Secure Boot status reporting and applies a daylight savings time adjustment for Egypt.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has officially released the Windows 10 KB5087544 extended security update to address vulnerabilities discovered during the May 2026 Patch Tuesday. The update patches a total of 120 security flaws and resolves a known issue where Remote Desktop Connection security warnings render incorrectly in multi-monitor setups with varying display scaling settings. Upon installation, Windows 10 will advance to build 19045.7291, while Windows 10 Enterprise LTSC 2021 will reach build 19044.7291. Microsoft continues to prioritize security maintenance over feature development for the Windows 10 platform. Beyond the primary security patches, the update enables dynamic status reporting for Secure Boot states within the Windows Security App. It also incorporates additional high-confidence device targeting data to expand automatic Secure Boot certificate distribution for devices that demonstrate sufficient successful update signals. A daylight savings time update has been included to support the Arab Republic of Egypt government\u0026rsquo;s 2023 DST change order. Administrators must also address a documented workaround for a known issue that triggers BitLocker recovery key prompts after recent updates. This specific problem affects systems configured with a BitLocker Group Policy that includes PCR7 in the TPM validation profile, combined with Secure Boot and boot manager conditions linked to the Windows UEFI CA 2023 certificate. To mitigate this temporarily, Microsoft advises removing the affected Group Policy setting and suspending BitLocker before resuming it to regenerate default PCR bindings. The company is actively working on a permanent fix for this BitLocker configuration conflict. Users enrolled in the Extended Security Updates program or running Windows 10 Enterprise LTSC can install the update through standard Windows Update channels. Microsoft has published a detailed changelog outlining all security fixes and known issues associated with KB5087544.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview-of-windows-10-kb5087544-extended-security-update\"\u003eOverview of Windows 10 KB5087544 Extended Security Update\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has released the Windows 10 KB5087544 extended security update to address vulnerabilities identified during the May 2026 Patch Tuesday. This release focuses exclusively on security patches and bug fixes, as Microsoft has officially stopped adding new features to the Windows 10 platform. The update brings Windows 10 to build 19045.7291 and Windows 10 Enterprise LTSC 2021 to build 19044.7291.\u003c/p\u003e\n\n\u003ch3 id=\"security-vulnerabilities-and-feature-updates\"\u003eSecurity Vulnerabilities and Feature Updates\u003c/h3\u003e\n\n\u003cp\u003eThe primary objective of KB5087544 is to patch 120 vulnerabilities discovered during the May 2026 Patch Tuesday cycle. Beyond standard security fixes, the update introduces several operational improvements and regional adjustments. Key enhancements include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRemote Desktop Warning Fix:\u003c/strong\u003e Resolves a rendering issue that caused newly introduced RDP security warnings to display incorrectly in multi-monitor configurations with different display scaling settings.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSecure Boot Enhancements:\u003c/strong\u003e Enables dynamic status reporting for Secure Boot states in the Windows Security App. The update also adds high-confidence device targeting data to automatically distribute new Secure Boot certificates to devices that demonstrate sufficient successful update signals.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDaylight Savings Time Adjustment:\u003c/strong\u003e Applies a regional update for the Arab Republic of Egypt to align with the government\u0026rsquo;s 2023 DST change order.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"known-issues-and-mitigation-strategies\"\u003eKnown Issues and Mitigation Strategies\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has documented a significant known issue affecting certain enterprise configurations after installing recent updates. The problem causes Windows to unexpectedly prompt users for their BitLocker recovery key. This behavior is isolated to systems utilizing a specific BitLocker Group Policy configuration that includes PCR7 in the TPM validation profile. The issue is further compounded by Secure Boot and boot manager conditions tied to the newer Windows UEFI CA 2023 certificate.\u003c/p\u003e\n\n\u003cp\u003eTo mitigate this issue temporarily, Microsoft recommends the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemove the affected Group Policy setting from the system configuration.\u003c/li\u003e\n\u003cli\u003eSuspend BitLocker protection on the affected drives.\u003c/li\u003e\n\u003cli\u003eResume BitLocker to regenerate the default PCR bindings.\nMicrosoft is actively developing a permanent fix for this BitLocker configuration conflict and will provide further guidance as the solution progresses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"deployment-instructions\"\u003eDeployment Instructions\u003c/h3\u003e\n\n\u003cp\u003eOrganizations running Windows 10 Enterprise LTSC or enrolled in the Extended Security Updates (ESU) program can install KB5087544 through standard update channels. Users should navigate to Settings, select Windows Update, and manually trigger a check for updates. The complete list of security fixes, known issues, and technical workarounds is available in Microsoft\u0026rsquo;s official documentation for the May 12, 2026 release.\u003c/p\u003e\n","keyPoints":["Microsoft released the Windows 10 KB5087544 extended security update to patch 120 vulnerabilities identified during the May 2026 Patch Tuesday.","The update resolves a rendering issue that caused Remote Desktop security warnings to display incorrectly in multi-monitor setups with varying display scaling.","Administrators should temporarily remove affected BitLocker Group Policy settings and suspend and resume BitLocker to prevent unexpected recovery key prompts caused by recent updates.","Windows 10 and Windows 10 Enterprise LTSC 2021 will be updated to build 19045.7291 and 19044.7291 respectively after installation."],"insights":["The BitLocker recovery key prompt regression is specifically triggered by Group Policy configurations that include PCR7 in the TPM validation profile alongside Secure Boot conditions tied to the Windows UEFI CA 2023 certificate.","Administrators can temporarily mitigate the BitLocker prompt issue by removing the affected Group Policy setting and suspending and resuming BitLocker to regenerate default PCR bindings.","The update expands Secure Boot visibility by enabling dynamic status reporting in the Windows Security App and automatically distributes new certificates to devices that demonstrate sufficient successful update signals."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has released the Windows 10 KB5087544 extended security update to address vulnerabilities identified during the May 2026 Patch Tuesday. This update resolves 120 security flaws and fixes a rendering bug that caused Remote Desktop security warnings to display incorrectly in multi-monitor environments. Windows 10 and Windows 10 Enterprise LTSC 2021 will be updated to builds 19045.7291 and 19044.7291, respectively. The release focuses exclusively on security patches and bug fixes, as Microsoft has ceased adding new features to Windows 10. Administrators should also be aware of a known issue where certain systems prompt for BitLocker recovery keys after installing recent updates. This problem specifically impacts configurations using PCR7 in the TPM validation profile alongside Secure Boot conditions tied to the Windows UEFI CA 2023 certificate. Microsoft recommends temporarily removing the affected Group Policy setting and suspending BitLocker to regenerate PCR bindings until a permanent fix is available. The update also introduces dynamic Secure Boot status reporting and applies a daylight savings time adjustment for Egypt.\u003c/p\u003e\n"},{"n":1,"title":"Congressman launches inquiry into how food retailers use surveillance pricing","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/congressman-launches-inquiry-into-food-retail-surveillance","time":"19:47","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Congressman Frank Pallone Jr. is investigating major retailers for using consumer data and AI algorithms to implement surveillance pricing, requiring companies to disclose their data sources and pricing mechanisms.","briefOverview":"\u003cp\u003eCongressman Frank Pallone Jr. has initiated a formal inquiry into how major food retailers utilize surveillance pricing techniques. He sent a letter to twenty-five companies, including Walmart, Target, and Amazon, demanding transparency regarding their data collection practices. The inquiry seeks to determine whether these businesses manipulate prices based on personal consumer information.\u003c/p\u003e\n\n\u003cp\u003ePallone emphasized that shoppers deserve to know if algorithms are being used to maximize profits at their expense. New York state recently passed legislation requiring companies to disclose if artificial intelligence influences pricing decisions. Following this law, Target began displaying pop-up notifications when algorithmic pricing is applied.\u003c/p\u003e\n\n\u003cp\u003eThe congressman is now requiring all targeted retailers to report their specific data elements and pricing methodologies. Companies must also clarify whether they source data from third parties and if customers can opt out of data-driven pricing. A January 2025 Federal Trade Commission report previously highlighted how retailers use browsing behavior and geolocation to set variable prices. This congressional action builds on existing regulatory efforts to address opaque algorithmic pricing models.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHouse Energy and Commerce Committee ranking member Frank Pallone Jr. launched an official inquiry into whether more than two dozen food retailers are employing surveillance pricing strategies. On Monday, he distributed a letter to twenty-five major retailers, specifically naming Albertsons, Stop and Shop, Amazon, Whole Foods, CVS, Target, Walgreens, Walmart, and Wegmans. The correspondence directly asks these organizations how they gather personal data and whether they apply it to determine individualized product costs.\u003c/p\u003e\n\n\u003cp\u003ePallone stated that consumers have a right to understand if their personal information is being leveraged to manipulate prices or test algorithmic pricing models. He noted that an increasing number of firms are relying on technological advancements to extract maximum profit from financially strained shoppers. This legislative push follows a recent New York state mandate that requires companies to publicly disclose if they utilize artificial intelligence for price setting.\u003c/p\u003e\n\n\u003cp\u003eAfter the regulation took effect, Target implemented a website pop-up warning users when a price was generated by an algorithm using their personal data. The congressional letter highlights that a significant portion of Americans remain unaware that their data is actively driving variable pricing, a practice especially common among online shoppers. Pallone has directed each company to submit a detailed report on every customer data element used to calculate prices.\u003c/p\u003e\n\n\u003cp\u003eRetailers must also explain whether they employ artificial intelligence or machine learning algorithms to establish pricing structures. The inquiry further demands disclosure on whether companies acquire pricing data from external third-party sources. Businesses must also outline their current policies regarding customer opt-out mechanisms for data-driven pricing. This effort aligns with a January 2025 Federal Trade Commission report that documented how retailers use browsing behavior and geolocation to set variable prices. The FTC report was compiled from responses provided by six major companies that utilize real-time pricing tools. These tools allow retailers to dynamically adjust costs using algorithms tailored to individual consumer traits derived from personal data.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"congressional-inquiry-into-surveillance-pricing\"\u003eCongressional Inquiry into Surveillance Pricing\u003c/h3\u003e\n\n\u003cp\u003eHouse Energy and Commerce Committee ranking member Frank Pallone Jr. has formally initiated an investigation into the widespread use of surveillance pricing by major food retailers. The inquiry targets twenty-five specific companies, including Albertsons, Stop and Shop, Amazon, Whole Foods, CVS, Target, Walgreens, Walmart, and Wegmans. Pallone sent a letter on Monday demanding transparency regarding how these retailers collect personal data and apply it to determine individualized product costs.\u003c/p\u003e\n\n\u003ch3 id=\"core-objectives-of-the-letter\"\u003eCore Objectives of the Letter\u003c/h3\u003e\n\n\u003cp\u003eThe correspondence emphasizes that consumers deserve full visibility into whether businesses manipulate prices using personal information or experiment with algorithmic pricing models. Pallone warned that an increasing number of companies are leveraging technological advances to maximize profits at the expense of financially strained shoppers. This legislative action directly follows a recent New York state law that mandates public disclosure whenever artificial intelligence is used to set prices.\u003c/p\u003e\n\n\u003cp\u003eFollowing the implementation of this regulation, Target began displaying pop-up notifications to alert users when a price was generated by an algorithm utilizing their personal data. The congressional letter highlights that many Americans remain completely unaware that their personal information is being used to calculate variable prices. This lack of transparency is particularly pervasive among online shoppers who interact with dynamic pricing systems daily.\u003c/p\u003e\n\n\u003ch3 id=\"data-collection-and-consumer-awareness\"\u003eData Collection and Consumer Awareness\u003c/h3\u003e\n\n\u003cp\u003ePallone has directed each of the twenty-five companies to submit a comprehensive report detailing every customer data element used to establish prices. Retailers must explicitly explain whether they utilize artificial intelligence or machine learning algorithms to determine pricing structures. The inquiry further requires companies to disclose whether they acquire pricing data from external third-party sources.\u003c/p\u003e\n\n\u003cp\u003eBusinesses must also outline their current policies and technical capabilities regarding customer opt-out mechanisms for data-driven pricing. This demand for transparency aligns with broader regulatory scrutiny of algorithmic pricing practices across the retail sector. Key compliance requirements include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReporting all customer data elements used to set prices\u003c/li\u003e\n\u003cli\u003eDisclosing the use of AI or machine learning algorithms\u003c/li\u003e\n\u003cli\u003eIdentifying third-party data sources used for pricing decisions\u003c/li\u003e\n\u003cli\u003eExplaining opt-out procedures for customers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"regulatory-context-and-ftc-findings\"\u003eRegulatory Context and FTC Findings\u003c/h3\u003e\n\n\u003cp\u003eA January 2025 Federal Trade Commission report previously documented how businesses charge customers higher prices based on insights from consumer data and behaviors. The FTC report specifically noted that pricing algorithms factor in geolocation, demographics, shopping habits, and even granular browsing behaviors like mouse movements. This report was compiled from responses provided by six major companies that utilize real-time pricing tools.\u003c/p\u003e\n\n\u003cp\u003eThese tools enable retailers to dynamically adjust costs using algorithms tailored to individual consumer traits derived from personal data. The congressional inquiry builds directly upon these findings to enforce stricter accountability and transparency standards across the industry.\u003c/p\u003e\n","keyPoints":["Congressman Frank Pallone Jr. sent a letter to 25 major retailers investigating how they use personal data to set variable prices.","The inquiry requires companies to disclose their data collection practices, pricing algorithms, and whether customers can opt out of data-driven pricing.","New York state has already implemented a law requiring businesses to disclose if they use artificial intelligence to determine prices based on personal data.","A January 2025 FTC report confirmed that retailers use consumer data such as geolocation, demographics, and browsing behavior to dynamically adjust prices.","Many consumers remain unaware that their personal information is being used to manipulate the prices they see, particularly during online shopping."],"insights":["The FTC report specifically lists mouse movement on webpages as a data input for dynamic pricing, highlighting granular behavioral tracking that extends beyond traditional demographic or location data.","The congressional letter explicitly requires disclosure on third-party data sourcing for pricing, highlighting that external data aggregation is a primary compliance focus for the inquiry.","The FTC’s inquiry targets third-party vendors that sell real-time pricing change tools, indicating that an external software ecosystem is actively enabling dynamic pricing across the retail sector."],"referencedReports":[{"title":"Preliminary FTC Report on Surveillance Pricing","url":"https://therecord.media/surveillance-pricing-preliminary-ftc-report","publisher":"Federal Trade Commission","context":"The article references this January 2025 report, which details how major retailers use consumer data and algorithmic tools to dynamically adjust prices based on individual traits."}],"body":"\u003cp\u003eCongressman Frank Pallone Jr. has initiated a formal inquiry into how major food retailers utilize surveillance pricing techniques. He sent a letter to twenty-five companies, including Walmart, Target, and Amazon, demanding transparency regarding their data collection practices. The inquiry seeks to determine whether these businesses manipulate prices based on personal consumer information.\u003c/p\u003e\n\n\u003cp\u003ePallone emphasized that shoppers deserve to know if algorithms are being used to maximize profits at their expense. New York state recently passed legislation requiring companies to disclose if artificial intelligence influences pricing decisions. Following this law, Target began displaying pop-up notifications when algorithmic pricing is applied.\u003c/p\u003e\n\n\u003cp\u003eThe congressman is now requiring all targeted retailers to report their specific data elements and pricing methodologies. Companies must also clarify whether they source data from third parties and if customers can opt out of data-driven pricing. A January 2025 Federal Trade Commission report previously highlighted how retailers use browsing behavior and geolocation to set variable prices. This congressional action builds on existing regulatory efforts to address opaque algorithmic pricing models.\u003c/p\u003e\n"},{"n":5,"title":"Webinar: Fixing the gaps in network incident response","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-fixing-the-gaps-in-network-incident-response/","time":"19:46","priority":"MAY READ","score":55,"group":null,"groupColor":null,"tldr":"Network incidents escalate when IT teams rely on manual triage across disparate systems, making automated, AI-assisted workflows essential for streamlining coordination and accelerating incident resolution.","briefOverview":"\u003cp\u003eMost network incidents escalate not due to poor visibility, but because IT teams must manually triage alerts and coordinate across disconnected systems. As alert sources multiply from monitoring platforms, infrastructure tools, identity systems, and security products, manual investigation slows response times and increases disruption risks. Tines addresses this by providing automation and AI-assisted workflows that streamline incident response and reduce repetitive manual tasks. A live webinar hosted by BleepingComputer on June 2, 2026, will explore how coordinated response workflows can accelerate incident resolution. Attendees will learn how to close gaps between alerting, triage, analysis, routing, and resolution. The session will cover how incidents evolve, where traditional workflows break down, and how to automatically enrich alerts with contextual data. By prioritizing and routing incidents without manual intervention, teams can move from fragmented responses to coordinated, system-wide resolutions. This approach directly reduces response delays and prevents service outages.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNetwork incidents frequently escalate because IT teams are forced to manually triage alerts and coordinate responses across disparate systems during high-pressure situations. Alert volumes continue to grow as they originate from a wide variety of sources, including monitoring platforms, infrastructure systems, identity tools, and security products. Despite this complexity, many teams still rely on manual investigation and routing, which slows response times and heightens the risk of service disruptions. To address these challenges, Tines offers intelligent workflows that combine automation and artificial intelligence to streamline incident response. These workflows reduce repetitive manual work and coordinate actions across multiple platforms simultaneously. BleepingComputer will host a live webinar on Tuesday, June 2, 2026, titled From alert to resolution: Fixing the gaps in network incident response. The session will examine why coordinated response workflows are necessary to reduce response times and prevent outages. Attendees will learn how to close the operational gaps between alerting, triage, analysis, routing, and resolution. The webinar will also explore how network incidents typically evolve from an initial alert into a full service impact. Participants will discover where triage, enrichment, and routing processes break down in real-world environments. The discussion will cover techniques for automatically enriching alerts with network, identity, and threat context. Additionally, the session will demonstrate methods to prioritize and route incidents without requiring manual intervention. Ultimately, the webinar aims to show how teams can transition from fragmented responses to coordinated resolutions across complex systems. By adopting these automated and AI-assisted workflows, IT organizations can significantly reduce response delays and improve overall incident resolution.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-escalation-drivers\"\u003eIncident Escalation Drivers\u003c/h3\u003e\n\n\u003cp\u003eMost network incidents do not escalate because of a lack of visibility. Instead, they escalate because IT teams are forced to manually triage alerts and coordinate responses across disparate systems during high-pressure incidents. As environments become more complex, alert volumes continue to grow from a wide variety of sources. These sources include monitoring platforms, infrastructure systems, identity tools, and security products. Despite the increasing volume and complexity, many IT teams still rely on manual investigation and routing. This reliance on manual processes slows response times and increases the risk of service disruptions.\u003c/p\u003e\n\n\u003ch3 id=\"the-tines-solution\"\u003eThe Tines Solution\u003c/h3\u003e\n\n\u003cp\u003eTines addresses these operational challenges by helping teams build intelligent workflows. These workflows combine automation and artificial intelligence to streamline incident response. The platform reduces repetitive manual work and coordinates action across multiple systems simultaneously. By integrating these capabilities, Tines enables IT teams to move incidents from initial alerts to resolution much faster. This coordinated approach directly addresses the fragmentation that typically hinders effective incident management.\u003c/p\u003e\n\n\u003ch3 id=\"webinar-details-and-agenda\"\u003eWebinar Details and Agenda\u003c/h3\u003e\n\n\u003cp\u003eBleepingComputer will host a live webinar titled From alert to resolution: Fixing the gaps in network incident response on Tuesday, June 2, 2026. The session will explore why IT teams need more coordinated response workflows to reduce response times and prevent outages. Attendees will learn how to close the gaps between alerting, triage, analysis, routing, and resolution. The webinar agenda includes several key technical and operational topics.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow network incidents typically evolve from initial alert to service impact\u003c/li\u003e\n\u003cli\u003eWhere triage, enrichment, and routing break down in real-world workflows\u003c/li\u003e\n\u003cli\u003eHow to automatically enrich alerts with network, identity, and threat context\u003c/li\u003e\n\u003cli\u003eTechniques to prioritize and route incidents without manual intervention\u003c/li\u003e\n\u003cli\u003eHow to move from fragmented response to coordinated resolution across systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-impact\"\u003eStrategic Impact\u003c/h3\u003e\n\n\u003cp\u003eThe webinar will examine how automation and AI-assisted workflows can help reduce manual overhead. These workflows improve coordination and speed incident resolution across complex environments. By implementing automated enrichment and routing, teams can eliminate the delays caused by manual investigation. The session will demonstrate how to transition from fragmented responses to coordinated resolutions. Ultimately, adopting these intelligent workflows allows IT teams to reduce response delays and improve incident resolution across their entire infrastructure.\u003c/p\u003e\n","keyPoints":["Most network incidents escalate because IT teams must manually triage alerts and coordinate responses across disparate systems during high-pressure situations.","Alert volumes continue to grow from diverse sources including monitoring platforms, infrastructure tools, identity systems, and security products.","Tines offers automation and AI-assisted workflows to streamline incident response, reduce repetitive manual work, and coordinate actions across systems.","The upcoming webinar will examine how incidents evolve, where triage and routing break down, and how to automatically enrich and prioritize alerts without manual intervention.","Implementing coordinated response workflows enables IT teams to reduce response delays and accelerate incident resolution across complex environments."],"insights":["Incident escalation stems from manual coordination bottlenecks across disparate systems rather than insufficient visibility.","Automatically enriching alerts with network, identity, and threat context before triage eliminates manual investigation delays.","Implementing automated routing and prioritization removes human intervention from high-pressure alert handling, directly accelerating resolution."],"referencedReports":[],"body":"\u003cp\u003eMost network incidents escalate not due to poor visibility, but because IT teams must manually triage alerts and coordinate across disconnected systems. As alert sources multiply from monitoring platforms, infrastructure tools, identity systems, and security products, manual investigation slows response times and increases disruption risks. Tines addresses this by providing automation and AI-assisted workflows that streamline incident response and reduce repetitive manual tasks. A live webinar hosted by BleepingComputer on June 2, 2026, will explore how coordinated response workflows can accelerate incident resolution. Attendees will learn how to close gaps between alerting, triage, analysis, routing, and resolution. The session will cover how incidents evolve, where traditional workflows break down, and how to automatically enrich alerts with contextual data. By prioritizing and routing incidents without manual intervention, teams can move from fragmented responses to coordinated, system-wide resolutions. This approach directly reduces response delays and prevents service outages.\u003c/p\u003e\n"},{"n":7,"title":"Signal adds security warnings for social engineering, phishing attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/signal-adds-security-warnings-for-social-engineering-phishing-attacks/","time":"19:40","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights" function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);

  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
