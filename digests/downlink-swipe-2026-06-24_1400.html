\n\u003cp\u003eThe malware uses public GitHub commit messages as command-and-control through dead-drop identifiers named \u003ccode\u003eRevokeAndItGoesKaboom\u003c/code\u003e and \u003ccode\u003eTheBeautifulSandsOfTime\u003c/code\u003e. It also targets AI coding assistant configurations, SSH hosts, and package publishing credentials for npm, PyPI, and RubyGems. StepSecurity reported that Harden-Runner observed GitHub API traffic used for exfiltration and added the compromised action to its Compromised Actions Policy to block affected workflow runs for customers with that policy enabled.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 24, 2026 at 15:39:06 UTC, an attacker force-pushed a malicious commit to codfish/semantic-release-action and redirected several version tags to point at that commit.","Workflows that ran against the affected tags after the compromise executed a Bun-based, obfuscated JavaScript payload inside the GitHub Actions runner.","The payload steals GitHub OIDC tokens, harvests Personal Access Tokens matching known GitHub token patterns, encrypts the collected material with AES-128-GCM, and attempts to propagate a backdoor into other repositories accessible with the stolen credentials.","The malware uses public GitHub commit messages as dead-drop command-and-control, including mechanisms identified as RevokeAndItGoesKaboom and TheBeautifulSandsOfTime.","The payload targets AI coding assistant configurations, SSH hosts, and npm, PyPI, and RubyGems publishing credentials to spread beyond the original GitHub Actions workflow."],"insights":["The attacker changed the action from a Docker-based action to a composite action so the malicious steps could install Bun and run the payload directly in the workflow, with both added steps guarded by if: always() to execute even after failures.","The payload’s use of Bun was deliberate because the article states Bun lacks the --require hook interception used by most Node.js security tooling.","Because the command-and-control and exfiltration traffic used GitHub’s public API, runtime monitoring saw outbound traffic primarily to api.github.com, making domain-based blocking less effective.","The campaign reused fingerprints from prior compromises of @antv/graphlib, echarts-for-react, and tanstack-react-router, including the same dead-drop identifiers, AES key, and Bun runtime requirement.","The malware attempted to spread from CI into developer environments by committing Claude Code and VS Code configuration files that automatically execute the payload when a repository is opened."],"referencedReports":[],"body":"\u003cp\u003eOn June 24, 2026 at 15:39:06 UTC, an attacker force-pushed a malicious commit to \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e and redirected several version tags to that commit. Any GitHub Actions workflow that used one of the affected tags after that time executed the attacker’s payload inside the runner. The compromised action affects workflows using tags including \u003ccode\u003ev5\u003c/code\u003e, \u003ccode\u003ev4\u003c/code\u003e, \u003ccode\u003ev3\u003c/code\u003e, \u003ccode\u003ev2\u003c/code\u003e, and several specific version tags listed in the article.\u003c/p\u003e\n\n\u003cp\u003eThe attacker changed the action from a Docker-based runner into a composite action that installed Bun through \u003ccode\u003eoven-sh/setup-bun\u003c/code\u003e and ran an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload. Both injected steps used \u003ccode\u003eif: always()\u003c/code\u003e, ensuring the payload ran even if earlier steps failed or were skipped. The payload steals GitHub OIDC tokens, searches for Personal Access Tokens matching known GitHub token patterns, encrypts collected data, and attempts to propagate a backdoor into other accessible repositories.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses public GitHub commit messages as command-and-control through dead-drop identifiers named \u003ccode\u003eRevokeAndItGoesKaboom\u003c/code\u003e and \u003ccode\u003eTheBeautifulSandsOfTime\u003c/code\u003e. It also targets AI coding assistant configurations, SSH hosts, and package publishing credentials for npm, PyPI, and RubyGems. StepSecurity reported that Harden-Runner observed GitHub API traffic used for exfiltration and added the compromised action to its Compromised Actions Policy to block affected workflow runs for customers with that policy enabled.\u003c/p\u003e\n"},{"n":1,"title":"CISA warns of max severity Ubiquiti flaws exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-warns-of-max-severity-ubiquiti-flaws-exploited-in-attacks/","time":"14:35","priority":"MUST READ","score":94,"tldr":"CISA says attackers are actively exploiting critical Ubiquiti UniFi OS and Lantronix EDS5000 flaws, including bugs that can enable remote code execution and full device compromise. Admins should apply the available patches or mitigations immediately, with U.S. federal agencies required to do so within three days.","briefOverview":"\u003cp\u003eCISA is warning that hackers are actively exploiting flaws in Ubiquiti UniFi OS and Lantronix serial-to-ethernet servers. Under the BOD 26-04 directive, federal agencies have three days to apply available security updates or vendor-recommended mitigations. CISA has not shared details about the observed exploitation, and the “use in ransomware campaigns” flag is listed as “Unknown” for all four flaws.\u003c/p\u003e\n\n\u003cp\u003eThe Ubiquiti vulnerabilities added to CISA’s Known Exploited Vulnerabilities catalog are CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910. They include an access control bypass flaw, a directory/path traversal flaw, and an improper input validation flaw that can enable arbitrary operating system command execution. Ubiquiti released security updates in May and warned that the flaws could be exploited remotely without privileges.\u003c/p\u003e\n\n\u003cp\u003eBishop Fox later demonstrated that the three Ubiquiti flaws could be chained to achieve full remote code execution with elevated privileges on vulnerable UniFi OS devices, and it released a free detection script on GitHub. The Lantronix flaw, tracked as CVE-2025-67038, is a critical root-level command injection issue affecting EDS5000 devices running firmware 2.1.0.0R3. Lantronix released a patch and recommends upgrading to EDS5000 version 2.2.0.0R1.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA warned that hackers are actively exploiting flaws in Ubiquiti UniFi OS and Lantronix serial-to-ethernet servers.","Federal agencies have three days under BOD 26-04 to apply available security updates or vendor-recommended mitigations for the listed vulnerabilities.","The Ubiquiti flaws CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910 can allow unauthorized changes, sensitive file access, arbitrary command execution, and potential full system compromise.","Researchers at Bishop Fox demonstrated that the three Ubiquiti flaws could be chained to achieve full remote code execution with elevated privileges and released a free detection script on GitHub.","Lantronix patched CVE-2025-67038, a critical root-level command injection flaw in EDS5000 firmware 2.1.0.0R3, and recommends upgrading to version 2.2.0.0R1."],"insights":["The three Ubiquiti UniFi OS flaws are more dangerous together because Bishop Fox showed they can be chained to gain elevated remote code execution on vulnerable devices.","Defenders have an immediate way to check for exposed Ubiquiti systems because Bishop Fox released a free GitHub detection script for CVE-2026-34908.","The Lantronix issue is narrowly tied to EDS5000 firmware 2.1.0.0R3, and Lantronix specifically recommends upgrading to version 2.2.0.0R1.","CISA confirmed active exploitation but did not disclose exploitation details, and it marked ransomware use as unknown for all four flaws."],"referencedReports":[{"title":"CVE-2025-67038 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2025-67038","publisher":"National Vulnerability Database","context":"The article links to the NVD entry when identifying the Lantronix EDS5000 command injection flaw as CVE-2025-67038.","category":"","primary":false},{"title":"Latest Firmware for the EDS5000 series EDS5008 EDS5016 EDS5032","url":"https://ltrxdev.atlassian.net/wiki/spaces/LTRXTS/pages/2538438657/Latest+Firmware+for+the+EDS5000+series+EDS5008+EDS5016+EDS5032","publisher":"Lantronix","context":"The article cites Lantronix's firmware page as the patch source and says users should upgrade to EDS5000 version 2.2.0.0R1.","category":"","primary":false}],"body":"\u003cp\u003eCISA is warning that hackers are actively exploiting flaws in Ubiquiti UniFi OS and Lantronix serial-to-ethernet servers. Under the BOD 26-04 directive, federal agencies have three days to apply available security updates or vendor-recommended mitigations. CISA has not shared details about the observed exploitation, and the “use in ransomware campaigns” flag is listed as “Unknown” for all four flaws.\u003c/p\u003e\n\n\u003cp\u003eThe Ubiquiti vulnerabilities added to CISA’s Known Exploited Vulnerabilities catalog are CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910. They include an access control bypass flaw, a directory/path traversal flaw, and an improper input validation flaw that can enable arbitrary operating system command execution. Ubiquiti released security updates in May and warned that the flaws could be exploited remotely without privileges.\u003c/p\u003e\n\n\u003cp\u003eBishop Fox later demonstrated that the three Ubiquiti flaws could be chained to achieve full remote code execution with elevated privileges on vulnerable UniFi OS devices, and it released a free detection script on GitHub. The Lantronix flaw, tracked as CVE-2025-67038, is a critical root-level command injection issue affecting EDS5000 devices running firmware 2.1.0.0R3. Lantronix released a patch and recommends upgrading to EDS5000 version 2.2.0.0R1.\u003c/p\u003e\n"},{"n":3,"title":"Amadey, StealC malware operations disrupted in Operation Endgame action","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/amadey-stealc-malware-operations-disrupted-in-operation-endgame-action/","time":"14:35","priority":"SHOULD READ","score":88,"tldr":"Microsoft, Europol, and international partners disrupted Amadey and StealC malware infrastructure as part of Operation Endgame, taking down hundreds of servers and domains tied to credential theft, initial access, and ransomware activity. Authorities also recovered about 27 million stolen credentials and identified over €41 million in cryptocurrency linked to criminal operations.","briefOverview":"\u003cp\u003eMicrosoft, Europol, and international partners disrupted infrastructure used by the Amadey and StealC malware operations as part of Operation Endgame. Authorities and private partners from multiple countries helped take down, seize, block, or sinkhole infrastructure tied to the malware families. Europol said the action disrupted 326 servers and 142 domains, identified more than €41 million in cryptocurrency linked to criminal activity, and recovered about 27 million credentials stolen from over 385,000 compromised systems.\u003c/p\u003e\n\n\u003cp\u003eThe operation focused on cybercrime infrastructure used to gain initial access to systems, steal credentials, and ultimately deploy ransomware or conduct financial fraud. Amadey is used to gain an initial foothold on victim devices and deploy additional malware, while StealC is used to steal credentials, cryptocurrency wallets, and other sensitive information. Microsoft said the two malware families were linked to more than 140,000 infected devices during the first two weeks of May 2026 alone.\u003c/p\u003e\n\n\u003cp\u003eThe coordinated action also targeted SocGholish, a malware loader that infects visitors through compromised websites serving fake browser update prompts. Operation Endgame included law enforcement agencies from Canada, Denmark, Germany, the Netherlands, the United Kingdom, and the United States, with Europol and Eurojust coordinating the effort and private-sector support from Microsoft, ESET, Proofpoint, IBM X-Force, Bitsight, and others. The article notes that unless arrests are made, threat actors commonly rebuild infrastructure and launch new attacks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft, Europol, and international partners disrupted infrastructure used by the Amadey and StealC malware operations as part of Operation Endgame.","Europol said the operation disrupted 326 servers and 142 domains, identified more than €41 million in cryptocurrency linked to criminal activity, and recovered about 27 million credentials stolen from over 385,000 compromised systems.","The coordinated action also targeted SocGholish, a malware loader that infects visitors through compromised websites showing fake browser update prompts.","Amadey is used to gain an initial foothold on victim devices and deploy additional malware, while StealC is used to steal credentials, cryptocurrency wallets, and other sensitive information.","Microsoft said Amadey and StealC were linked to more than 140,000 infected devices during the first two weeks of May 2026 alone."],"insights":["The operation targeted malware services that support many later crimes, because Europol said the disrupted infrastructure was used to gain initial access, steal credentials, and ultimately enable ransomware or financial fraud.","The scale of StealC credential theft was not limited to direct victims, because Microsoft said stolen credentials are commonly sold through underground marketplaces and initial-access brokers for other threat actors to reuse.","The disruption relied on multiple legal and technical methods, with Microsoft citing court orders, domain seizures, registrations, and provider notifications to shut down more than 200 malicious domains and IP addresses.","The article notes a key limitation of infrastructure takedowns: unless arrests are made, threat actors commonly rebuild infrastructure and launch new attacks."],"referencedReports":[{"title":"ESET takes part in Operation Endgame to disrupt Amadey and StealC","url":"https://www.welivesecurity.com/en/eset-research/eset-takes-part-operation-endgame-disrupt-amadey-stealc/","publisher":"ESET","context":"The article says ESET released a report on its role identifying and disrupting infrastructure used by Amadey and StealC.","category":"","primary":false},{"title":"StealC You Later: Proofpoint and X-Force Support Operation Endgame Disruptions","url":"https://www.ibm.com/think/x-force/stealc-you-later-proofpoint-x-force-support-operation-endgame-disruptions","publisher":"IBM X-Force and Proofpoint","context":"The article says Proofpoint and IBM X-Force contributed intelligence and malware analysis supporting the disruption.","category":"","primary":false},{"title":"Bitsight Aids Disruption Efforts on Amadey Malware and StealC Malware","url":"https://www.bitsight.com/blog/bitsight-aids-disruption-efforts-on-amadey-malware-and-stealc-malware","publisher":"Bitsight","context":"The article says Bitsight released information on its analysis of infrastructure associated with Amadey and StealC.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft, Europol, and international partners disrupted infrastructure used by the Amadey and StealC malware operations as part of Operation Endgame. Authorities and private partners from multiple countries helped take down, seize, block, or sinkhole infrastructure tied to the malware families. Europol said the action disrupted 326 servers and 142 domains, identified more than €41 million in cryptocurrency linked to criminal activity, and recovered about 27 million credentials stolen from over 385,000 compromised systems.\u003c/p\u003e\n\n\u003cp\u003eThe operation focused on cybercrime infrastructure used to gain initial access to systems, steal credentials, and ultimately deploy ransomware or conduct financial fraud. Amadey is used to gain an initial foothold on victim devices and deploy additional malware, while StealC is used to steal credentials, cryptocurrency wallets, and other sensitive information. Microsoft said the two malware families were linked to more than 140,000 infected devices during the first two weeks of May 2026 alone.\u003c/p\u003e\n\n\u003cp\u003eThe coordinated action also targeted SocGholish, a malware loader that infects visitors through compromised websites serving fake browser update prompts. Operation Endgame included law enforcement agencies from Canada, Denmark, Germany, the Netherlands, the United Kingdom, and the United States, with Europol and Eurojust coordinating the effort and private-sector support from Microsoft, ESET, Proofpoint, IBM X-Force, Bitsight, and others. The article notes that unless arrests are made, threat actors commonly rebuild infrastructure and launch new attacks.\u003c/p\u003e\n"},{"n":5,"title":"Amadey and StealC Malware Network Disrupted, 27M Stolen Credentials Recovered","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/amadey-and-stealc-malware-network.html","time":"15:59","priority":"SHOULD READ","score":88,"tldr":"An international law enforcement operation disrupted the Amadey and StealC malware-as-a-service networks, taking down hundreds of servers and domains while recovering 27 million stolen credentials and restricting over $47 million in criminal crypto assets. The action targeted key initial-access infrastructure used to enable credential theft, fraud, ransomware, and broader cybercrime.","briefOverview":"\u003cp\u003eA coordinated law enforcement operation with private sector partners including Bitdefender, Bitsight, ESET, and Microsoft disrupted criminal infrastructure powering Amadey and StealC. Europol said the goal was to disrupt the “assembly lines” cybercriminals use for ransomware, financial fraud, and attacks on critical infrastructure. The two-week action identified and restricted more than $47 million in cryptocurrency assets of criminal origin, recovered 27 million stolen login credentials, and dismantled 326 servers and 142 domains.\u003c/p\u003e\n\n\u003cp\u003eAmadey and StealC are both advertised under a malware-as-a-service model that lets customers deliver additional payloads or steal sensitive information from compromised hosts. Amadey is a C++ modular backdoor active since October 2018 and can fingerprint machines, download files and scripts, run commands, take screenshots, spawn proxies, capture clipboard contents and credentials, and enable RDP. StealC first appeared in January 2023 and can steal screenshots, credentials, session cookies, autofill entries, credit card data, browsing history, extension data, and data from desktop applications including Discord, FileZilla, Microsoft Outlook, Steam, and Telegram.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said Amadey and StealC used the same infrastructure and were linked to more than 140,000 infected computers globally in the first two weeks of May 2026. The company said it identified over 18,000 victim computers, severed criminal control of those devices, and flagged 200 malicious Amadey and StealC command-and-control domains and IP addresses that were later shut down. The June 15 to 19, 2026 effort was part of Operation Endgame and involved judicial authorities and law enforcement from Belgium, Canada, Denmark, France, Germany, the Netherlands, the U.K., and the U.S.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A coordinated law enforcement operation with private sector partners including Bitdefender, Bitsight, ESET, and Microsoft disrupted criminal infrastructure powering the Amadey and StealC malware networks.","The two-week action identified, flagged, and restricted more than $47 million in cryptocurrency assets of criminal origin, recovered 27 million stolen login credentials, and dismantled 326 servers and 142 domains.","Amadey and StealC are advertised under a malware-as-a-service model, with Amadey functioning as a loader for additional payloads and StealC stealing screenshots, credentials, session cookies, autofill entries, credit card data, browsing history, and extension data.","Microsoft said Amadey and StealC used shared infrastructure and were linked to more than 140,000 infected computers globally in the first two weeks of May 2026.","The June 15 to 19, 2026 effort was part of Operation Endgame and involved judicial authorities and law enforcement from Belgium, Canada, Denmark, France, Germany, the Netherlands, the U.K., and the U.S."],"insights":["Amadey and StealC were not isolated threats; the article says they used the same infrastructure and formed parts of a shared commodity malware pipeline in which loaders provide access and stealers monetize that access through stolen credentials, cookies, and wallets.","StealC’s subscription model made infrastructure rotation easier for affiliates by allowing unlimited build generation, while Amadey charged extra for each rebuild, showing how pricing models directly affected operators’ ability to refresh command-and-control infrastructure.","Security flaws in StealC’s own control panel exposed the malware-as-a-service operation and were likely exploited by an affiliate to steal data from other affiliates, showing that the criminal ecosystem itself had exploitable weaknesses.","Both Amadey and StealC included checks tied to Russian, Ukrainian, Belarusian, Kazakhstani, or Uzbek locales, with StealC terminating itself for some locales and Amadey skipping certain stealing functions on some hosts.","Amadey’s use grew sharply over time, with malware samples distributed through it rising from 66 in 2019 to 11,635 in 2025 before dropping to 1,837 payloads distributed since the start of 2026."],"referencedReports":[{"title":"Amadey C2","url":"https://www.mbsd.jp/research/20260624/amadey-c2-en/","publisher":"Mitsui Bussan Secure Directions","context":"The article cites data published by Mitsui Bussan Secure Directions on daily active Amadey command-and-control servers and Amadey payload distribution over time.","category":"","primary":false},{"title":"StealC You Later: Proofpoint and X-Force Support Operation Endgame Disruptions","url":"https://www.ibm.com/think/x-force/stealc-you-later-proofpoint-x-force-support-operation-endgame-disruptions","publisher":"IBM X-Force","context":"The article references IBM X-Force as noting multiple security flaws in the StealC command-and-control panel, including a directory traversal issue.","category":"","primary":false},{"title":"StealC You Later: Proofpoint and IBM X-Force Support Operation Endgame","url":"https://www.proofpoint.com/us/blog/threat-insight/stealc-you-later-proofpoint-and-ibm-x-force-support-operation-endgame","publisher":"Proofpoint","context":"The article references Proofpoint as noting multiple security flaws in the StealC command-and-control panel, including a directory traversal issue.","category":"","primary":false},{"title":"ESET takes part in Operation Endgame to disrupt Amadey and StealC","url":"https://www.welivesecurity.com/en/eset-research/eset-takes-part-operation-endgame-disrupt-amadey-stealc/","publisher":"ESET","context":"The article quotes ESET researchers on how Amadey and StealC affiliates used self-hosted administration panels and different build-generation models.","category":"","primary":false},{"title":"StealC and Amadey: Breaking down infostealers and the cybercrime services that deliver them","url":"https://www.microsoft.com/en-us/security/blog/2026/06/24/stealc-and-amadey-breaking-down-infostealers-and-the-cybercrime-services-that-deliver-them/","publisher":"Microsoft","context":"The article cites Microsoft’s analysis on shared infrastructure, global infections, identified victim computers, and disruption of Amadey and StealC control infrastructure.","category":"","primary":false},{"title":"Bitsight Aids Disruption Efforts on Amadey Malware and StealC Malware","url":"https://www.bitsight.com/blog/bitsight-aids-disruption-efforts-on-amadey-malware-and-stealc-malware","publisher":"Bitsight","context":"The article quotes Bitsight’s explanation of loaders and stealers as linked parts of the commodity malware pipeline.","category":"","primary":false}],"body":"\u003cp\u003eA coordinated law enforcement operation with private sector partners including Bitdefender, Bitsight, ESET, and Microsoft disrupted criminal infrastructure powering Amadey and StealC. Europol said the goal was to disrupt the “assembly lines” cybercriminals use for ransomware, financial fraud, and attacks on critical infrastructure. The two-week action identified and restricted more than $47 million in cryptocurrency assets of criminal origin, recovered 27 million stolen login credentials, and dismantled 326 servers and 142 domains.\u003c/p\u003e\n\n\u003cp\u003eAmadey and StealC are both advertised under a malware-as-a-service model that lets customers deliver additional payloads or steal sensitive information from compromised hosts. Amadey is a C++ modular backdoor active since October 2018 and can fingerprint machines, download files and scripts, run commands, take screenshots, spawn proxies, capture clipboard contents and credentials, and enable RDP. StealC first appeared in January 2023 and can steal screenshots, credentials, session cookies, autofill entries, credit card data, browsing history, extension data, and data from desktop applications including Discord, FileZilla, Microsoft Outlook, Steam, and Telegram.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said Amadey and StealC used the same infrastructure and were linked to more than 140,000 infected computers globally in the first two weeks of May 2026. The company said it identified over 18,000 victim computers, severed criminal control of those devices, and flagged 200 malicious Amadey and StealC command-and-control domains and IP addresses that were later shut down. The June 15 to 19, 2026 effort was part of Operation Endgame and involved judicial authorities and law enforcement from Belgium, Canada, Denmark, France, Germany, the Netherlands, the U.K., and the U.S.\u003c/p\u003e\n"},{"n":4,"title":"German rail services resume after wireless communications outage","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/deutsche-bahn-railroad-gsmr-outage","time":"14:15","priority":"MAY READ","score":68,"tldr":"Deutsche Bahn restored rail services after a nationwide GSM-R railway radio system failure halted German long-distance, regional, and S-Bahn trains for about two hours. The company said the outage was caused by a technical malfunction during scheduled component replacement, not a reported cyberattack.","briefOverview":"\u003cp\u003eGermany\u0026rsquo;s state-owned rail operator Deutsche Bahn restored train services early Wednesday after a technical failure in its railway communications network brought rail traffic across the country to a standstill for roughly two hours overnight. The outage began late Tuesday and disrupted both long-distance and regional services, including S-Bahn commuter services connecting major cities with surrounding suburbs. Although services resumed Wednesday morning, Deutsche Bahn warned passengers to expect lingering delays and cancellations.\u003c/p\u003e\n\n\u003cp\u003eDeutsche Bahn said the incident stemmed from a malfunction in its GSM-R digital railway radio system, which is used by train drivers, dispatchers, and signaling systems to coordinate rail operations safely. Philipp Nagl, chief executive of Deutsche Bahn\u0026rsquo;s infrastructure subsidiary, said the disruption occurred during a scheduled replacement of a technical component and that the exact cause was still being analyzed. The company has not indicated that the incident was the result of a cyberattack and has described it as a technical failure.\u003c/p\u003e\n\n\u003cp\u003eGSM-R is a specialized wireless communications standard widely used by European rail operators and is built on aging 2G technology. The article says the system is gradually being phased out in favor of a next-generation railway communications platform based on 5G technology, although the transition is expected to take years. Deutsche Bahn, which carries more than 5 million passengers daily across roughly 33,400 kilometers and 5,400 stations, apologized to affected travelers and said it would provide hotel and taxi vouchers where necessary and arrange alternative transportation when possible.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Deutsche Bahn restored train services early Wednesday after a technical failure in its railway communications network halted rail traffic across Germany for roughly two hours overnight.","The outage affected both long-distance and regional services, including S-Bahn commuter services connecting major cities with surrounding suburbs.","Deutsche Bahn said the incident stemmed from a malfunction in its GSM-R digital railway radio system, which is used by train drivers, dispatchers, and signaling systems to coordinate rail operations safely.","Philipp Nagl, chief executive of Deutsche Bahn's infrastructure subsidiary, said the disruption occurred during a scheduled replacement of a technical component.","Deutsche Bahn has not indicated that the incident was the result of a cyberattack and has described it as a technical failure."],"insights":["A planned technical component replacement was enough to disrupt rail traffic nationwide, showing that maintenance work on the GSM-R system can have immediate large-scale operational consequences.","GSM-R is built on aging 2G technology, but the article says replacement with a 5G-based railway communications platform is expected to take years, leaving rail operators dependent on the older system for the near future.","Similar GSM-R-related disruptions in southern England and across Britain indicate that failures in this railway communications system are not isolated to Deutsche Bahn or Germany.","Even after a roughly two-hour outage was fixed, Deutsche Bahn warned of lingering delays and cancellations, highlighting how short failures in core rail communications can continue affecting passengers after service resumes."],"referencedReports":[],"body":"\u003cp\u003eGermany\u0026rsquo;s state-owned rail operator Deutsche Bahn restored train services early Wednesday after a technical failure in its railway communications network brought rail traffic across the country to a standstill for roughly two hours overnight. The outage began late Tuesday and disrupted both long-distance and regional services, including S-Bahn commuter services connecting major cities with surrounding suburbs. Although services resumed Wednesday morning, Deutsche Bahn warned passengers to expect lingering delays and cancellations.\u003c/p\u003e\n\n\u003cp\u003eDeutsche Bahn said the incident stemmed from a malfunction in its GSM-R digital railway radio system, which is used by train drivers, dispatchers, and signaling systems to coordinate rail operations safely. Philipp Nagl, chief executive of Deutsche Bahn\u0026rsquo;s infrastructure subsidiary, said the disruption occurred during a scheduled replacement of a technical component and that the exact cause was still being analyzed. The company has not indicated that the incident was the result of a cyberattack and has described it as a technical failure.\u003c/p\u003e\n\n\u003cp\u003eGSM-R is a specialized wireless communications standard widely used by European rail operators and is built on aging 2G technology. The article says the system is gradually being phased out in favor of a next-generation railway communications platform based on 5G technology, although the transition is expected to take years. Deutsche Bahn, which carries more than 5 million passengers daily across roughly 33,400 kilometers and 5,400 stations, apologized to affected travelers and said it would provide hotel and taxi vouchers where necessary and arrange alternative transportation when possible.\u003c/p\u003e\n"},{"n":6,"title":"Disposable Tooling: Building LLM-Generated Mythic Agents from Prompt to Deployment","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/24/disposable-tooling-building-llm-generated-mythic-agents-from-prompt-to-deployment/","time":"17:29","priority":"MAY READ","score":58,"tldr":"SpecterOps describes how LLMs, paired with purpose-built testing and deployment harnesses, can generate functional disposable Mythic C2 agents from a prompt in a few hours. The key takeaway is that throwaway offensive tooling is becoming cheap and scalable, making static implant signatures increasingly unreliable for defenders.","briefOverview":"\u003cp\u003eThe article describes the author’s experiments with generating “disposable tooling” by using large language models to build Mythic agents from prompt to deployment. The goal was to see whether a new agent could be created without human intervention between the initial specification and a tested, shippable result. Mythic was chosen because its design decouples agent development from the underlying command-and-control architecture.\u003c/p\u003e\n\n\u003cp\u003eThe author’s first attempts with Claude Code and Opus 4.6 produced code that compiled and a Dockerfile that could deploy, but the agent did not work correctly. Problems included missing packages, incorrect container paths, hallucinated Mythic RPC methods, and a misunderstanding of Mythic key exchange. The author then added Mythic documentation as an LLM skill and later built a tiered testing harness called Oracle, including mock Mythic testing, live Mythic deployment testing, and a QA sub-agent.\u003c/p\u003e\n\n\u003cp\u003eAdditional tools such as LabKit and Mythicd were created to improve debugging, process monitoring, Docker deployment, and log collection. With these improvements, the author reported that basic Stage-0 agents could be generated in a few hours across multiple languages and models, including Opus 4.6, GPT-5.4-Cyber, and GPT-5.5-Cyber-Preview. The article argues that this ability to quickly create single-use agents makes static signatures and Yara rules focused on implant detection increasingly outdated.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The author explored whether large language models could generate new Mythic agents from an initial prompt through deployment without human intervention.","An initial Claude Code and Opus 4.6 attempt produced code that compiled and deployed but failed due to missing packages, incorrect paths, hallucinated Mythic RPC methods, and misunderstanding of Mythic key exchange.","The author improved results by creating Mythic development documentation as an LLM skill and later adding a tiered testing harness with a mock Mythic server, live Mythic deployment testing, and a QA sub-agent.","Additional tools called LabKit and Mythicd were built to improve debugging, process monitoring, container deployment, and log collection during agent testing.","Using the Oracle harness, the author generated multiple basic disposable Mythic agents across several programming languages with Opus 4.6, GPT-5.4-Cyber, and GPT-5.5-Cyber-Preview."],"insights":["The author found that adding more prompt guidance alone was not enough; reliable generation depended on giving the model automated ways to prove the agent worked end-to-end.","A clean, separate QA sub-agent improved results because it tested the finished agent without relying on the main model’s prior assumptions or context.","Constraining the model’s interaction with Mythic through purpose-built tools reduced unproductive debugging loops around the GraphQL API and Docker containers.","The testing harness became portable across model providers after adapting file and sub-agent formats, showing that the workflow was not limited to Claude Code.","The author observed that language choice did not noticeably block generation, with GPT-5.5-Cyber-Preview producing working agents in Python, Go, Zig, C#, and Rust."],"referencedReports":[],"body":"\u003cp\u003eThe article describes the author’s experiments with generating “disposable tooling” by using large language models to build Mythic agents from prompt to deployment. The goal was to see whether a new agent could be created without human intervention between the initial specification and a tested, shippable result. Mythic was chosen because its design decouples agent development from the underlying command-and-control architecture.\u003c/p\u003e\n\n\u003cp\u003eThe author’s first attempts with Claude Code and Opus 4.6 produced code that compiled and a Dockerfile that could deploy, but the agent did not work correctly. Problems included missing packages, incorrect container paths, hallucinated Mythic RPC methods, and a misunderstanding of Mythic key exchange. The author then added Mythic documentation as an LLM skill and later built a tiered testing harness called Oracle, including mock Mythic testing, live Mythic deployment testing, and a QA sub-agent.\u003c/p\u003e\n\n\u003cp\u003eAdditional tools such as LabKit and Mythicd were created to improve debugging, process monitoring, Docker deployment, and log collection. With these improvements, the author reported that basic Stage-0 agents could be generated in a few hours across multiple languages and models, including Opus 4.6, GPT-5.4-Cyber, and GPT-5.5-Cyber-Preview. The article argues that this ability to quickly create single-use agents makes static signatures and Yara rules focused on implant detection increasingly outdated.\u003c/p\u003e\n"},{"n":2,"title":"Securing the service desk: Why social engineering attacks keep succeeding","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/securing-the-service-desk-why-social-engineering-attacks-keep-succeeding/","time":"14:02","priority":"MAY READ","score":55,"tldr":"Service desk social engineering remains a highly effective way for attackers to gain corporate access by tricking support staff into resetting credentials or MFA. Organizations should harden help desk identity verification, limit reset privileges, monitor risky account changes, and train staff against phone and chat impersonation tactics.","briefOverview":"\u003cp\u003eService desk social engineering remains one of the most effective ways for attackers to gain access to corporate systems. The article highlights 2025 attacks against UK retailers Marks \u0026amp; Spencer, Co-op, and Harrods by Scattered Spider, including a case where attackers impersonated an employee and convinced a third-party service desk agent to reset credentials. It also cites Carnival Corporation’s disclosure of a social engineering incident and an FBI warning about Silent Ransom Group posing as IT support personnel.\u003c/p\u003e\n\n\u003cp\u003eThe article says attackers target service desks because help desk staff are trained to help and often have the ability to reset passwords, provision accounts, or disable multi-factor authentication. A typical attack can involve reconnaissance, impersonation by phone or chat, credential reset or MFA bypass, access to internal systems, lateral movement, and then ransomware or data theft. Attackers may use details from LinkedIn, org charts, data leaks, spoofed phone numbers, breached HR information, or SIM-swapped phones to make requests seem legitimate.\u003c/p\u003e\n\n\u003cp\u003eRecommended defenses include strict identity verification for password resets, out-of-band confirmation, stronger controls over MFA reset or transfer, and training service desk staff to recognize urgent or emotional social engineering requests. The article also recommends monitoring unusual service desk activity, limiting help desk privileges for high-risk accounts, reviewing outsourced service desk procedures, using role-based access control, logging credential changes, and conducting phone and chat-based simulations. It promotes Specops Secure Service Desk as a way to add identity verification, audit trails, and granular controls to password reset and account unlock requests.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Service desk social engineering remains one of the most effective ways for attackers to gain access to corporate systems.","In the Marks \u0026 Spencer case, attackers impersonated an employee and convinced a third-party service desk agent to reset credentials, providing access to internal systems.","Attackers target service desks because staff can reset passwords, provision accounts, or disable multi-factor authentication, giving attackers a direct path to legitimate access.","A typical service desk attack can involve reconnaissance, impersonation, credential reset or MFA bypass, access and lateral movement, and then ransomware or data theft.","The article recommends strict identity verification for password resets, stronger controls around MFA changes, service desk staff training, monitoring of unusual reset activity, and limits on help desk privileges."],"insights":["Outsourced or decentralized IT support is a specific risk factor because attackers target large organizations where service desk verification and escalation processes may be harder to control consistently.","Attackers can make impersonation more convincing by combining publicly available employee details, leaked HR information, spoofed internal phone numbers, and casual local references such as weather or topical events.","Service desk abuse may avoid many technical alerts because the attacker is using approved processes, such as password resets or MFA re-registration, rather than breaking through perimeter defenses.","Repeated password resets or MFA removals for high-privilege accounts are concrete warning signs organizations can monitor for service desk compromise attempts.","The article emphasizes that help desk agents should not be able to reset access for admin or IT users without escalation, because those accounts create a faster path to broader internal access."],"referencedReports":[],"body":"\u003cp\u003eService desk social engineering remains one of the most effective ways for attackers to gain access to corporate systems. The article highlights 2025 attacks against UK retailers Marks \u0026amp; Spencer, Co-op, and Harrods by Scattered Spider, including a case where attackers impersonated an employee and convinced a third-party service desk agent to reset credentials. It also cites Carnival Corporation’s disclosure of a social engineering incident and an FBI warning about Silent Ransom Group posing as IT support personnel.\u003c/p\u003e\n\n\u003cp\u003eThe article says attackers target service desks because help desk staff are trained to help and often have the ability to reset passwords, provision accounts, or disable multi-factor authentication. A typical attack can involve reconnaissance, impersonation by phone or chat, credential reset or MFA bypass, access to internal systems, lateral movement, and then ransomware or data theft. Attackers may use details from LinkedIn, org charts, data leaks, spoofed phone numbers, breached HR information, or SIM-swapped phones to make requests seem legitimate.\u003c/p\u003e\n\n\u003cp\u003eRecommended defenses include strict identity verification for password resets, out-of-band confirmation, stronger controls over MFA reset or transfer, and training service desk staff to recognize urgent or emotional social engineering requests. The article also recommends monitoring unusual service desk activity, limiting help desk privileges for high-risk accounts, reviewing outsourced service desk procedures, using role-based access control, logging credential changes, and conducting phone and chat-based simulations. It promotes Specops Secure Service Desk as a way to add identity verification, audit trails, and granular controls to password reset and account unlock requests.\u003c/p\u003e\n"},{"n":8,"title":"The most aggressive AI adoption in healthcare is happening off the books","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/the-most-aggressive-ai-adoption-in-healthcare-is-happening-off-the-books/","time":"14:35","priority":"MAY READ","score":45,"tldr":"Unapproved “shadow AI” tools are spreading quickly in healthcare, helping workers save time but creating serious risks around data breaches, privacy violations, and lack of oversight. The key takeaway is that healthcare organizations need practical AI governance that manages real-world use instead of simply trying to block it.","briefOverview":"\u003cp\u003eThe article is a perspective on how unapproved “off the books” AI tools, also called “shadow AI,” are becoming widespread in healthcare organizations. It says these tools are difficult to track and may save an individual valuable time. The article warns that they can also open the organization to data breaches and misuse of private data.\u003c/p\u003e\n\n\u003cp\u003eThe piece is authored by Errol Weiss, chief security officer of Health-ISAC, and is presented as a media mention linking to Telehealth and Telecare Aware. It highlights several themes, including why governance keeps losing the race, why this is harder to contain than shadow IT ever was, and why organizations should govern the current instead of damming it. The significance is that healthcare organizations may face privacy and security risks when AI use happens outside approved oversight.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article focuses on unapproved “off the books” AI tools, also known as “shadow AI,” becoming widespread in healthcare organizations.","The article states that shadow AI tools are difficult for healthcare organizations to track.","The article says these tools may save an individual valuable time but can expose the organization to data breaches and misuse of private data.","The article identifies Errol Weiss, chief security officer of Health-ISAC, as the author of the perspective.","The article highlights governance, the difficulty of containing shadow AI compared with shadow IT, and the need to govern current AI use as key themes."],"insights":["The article frames the main challenge as a governance problem rather than simply a technology problem, emphasizing that oversight is failing to keep pace with actual AI use in healthcare organizations.","The article suggests that trying to fully block unapproved AI use may be less realistic than creating ways to govern the AI use that is already happening.","The article highlights shadow AI as potentially harder to contain than earlier forms of unapproved technology use, indicating that existing approaches to shadow IT may not be sufficient."],"referencedReports":[],"body":"\u003cp\u003eThe article is a perspective on how unapproved “off the books” AI tools, also called “shadow AI,” are becoming widespread in healthcare organizations. It says these tools are difficult to track and may save an individual valuable time. The article warns that they can also open the organization to data breaches and misuse of private data.\u003c/p\u003e\n\n\u003cp\u003eThe piece is authored by Errol Weiss, chief security officer of Health-ISAC, and is presented as a media mention linking to Telehealth and Telecare Aware. It highlights several themes, including why governance keeps losing the race, why this is harder to contain than shadow IT ever was, and why organizations should govern the current instead of damming it. The significance is that healthcare organizations may face privacy and security risks when AI use happens outside approved oversight.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>

      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {

    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>

        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>

      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
