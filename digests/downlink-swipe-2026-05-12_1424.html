li\u003eThe first layer involves understanding AI application architecture from a practitioner perspective rather than a data scientist perspective.\u003c/li\u003e\n\u003cli\u003eThe second layer demands maintaining currency with rapidly evolving threat taxonomies, open-source frameworks, and vendor solutions.\nThis ongoing discipline is critical for navigating vendor pitches and distinguishing functional security controls from marketing wrappers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eConfiguration serves as a primary security control, as many deployments carry risk due to poor scoping rather than fundamental tool flaws. Restricting agent permissions to their intended functions limits blast radius and reduces available attack surfaces. Finding the right balance between utility and security requires early security involvement in the design process. Organizations that build genuine fluency now will shape deployment standards, while late arrivals will inherit architectures decided without security input.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes by referencing a SANSFIRE 2026 training course designed to address these gaps. The course covers AI application architecture, agentic system operations, real attack surfaces, and available controls. It includes hands-on work with techniques like model scanning to detect compromised models before production deployment. The content was contributed by Ahmed Abugharbia, a SANS Certified Instructor.\u003c/p\u003e\n","keyPoints":["Security teams cannot effectively defend agentic AI without first developing hands-on familiarity with how these systems are architected and function.","The agentic AI landscape includes general-purpose coding tools, vendor-built agents using the Model Context Protocol that can execute hidden prompts, and custom user-built agents that typically bypass security reviews.","Delayed security involvement allows organizations to deploy agents with broad system access, creating significant lateral movement paths and expanding the potential blast radius of security incidents.","Effective security relies on strict configuration controls that scope agent permissions to their intended functions rather than granting unrestricted access to multiple systems and data repositories."],"insights":["Hidden instructions embedded in routine inputs like calendar invites can be read and executed by MCP-connected agents, turning standard scheduling channels into active attack vectors.","The traditional skill barrier between security and development has collapsed, allowing non-technical staff to build and deploy agents with system access without security review, creating a decentralized supply chain risk.","Cross-channel agent access creates lateral movement paths; an agent bridging a terminal and an email inbox can be manipulated through either channel to execute actions in the other.","Vendor AI security products are frequently unvalidated marketing wrappers, making foundational architectural knowledge the only reliable filter for distinguishing functional controls from sales pitches."],"referencedReports":[],"body":"\u003cp\u003eAgentic AI is already running in production environments, yet security teams are largely bypassed because they lack foundational fluency with the technology. The industry’s focus on policy frameworks misses the core issue: genuine understanding must precede effective defense. Security practitioners must engage hands-on with AI tools to challenge design decisions and propose workable controls. The landscape features three distinct agent categories, each carrying unique risks from baseline coding assistants to vendor-built systems using the Model Context Protocol. Custom agents built by non-technical staff further complicate security by bypassing traditional review processes. Delayed security involvement compounds exposure, as broad permissions create significant lateral movement paths and large blast radii. Effective mitigation requires strict configuration controls that scope agent access to their intended functions. Organizations that build fluency now will shape deployment, while late arrivals will inherit architectures decided without them.\u003c/p\u003e\n"},{"n":6,"title":"Webinar: What the Riskiest SOC Alerts Go Unanswered - and How Radiant Security Can Help","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/webinar-what-riskiest-soc-alerts-go.html","time":"11:58","priority":"MAY READ","score":70,"group":null,"groupColor":null,"tldr":"Traditional SOC models consistently fail to investigate high-risk specialized alerts due to analyst overload and rigid automation playbooks. Radiant Security's AI platform addresses this by dynamically generating custom triage logic for any alert type, ensuring critical threats are properly investigated.","briefOverview":"\u003cp\u003eSecurity operations teams are currently overwhelmed by high alert volumes, but the critical issue lies in uninvestigated blind spots. The most dangerous alerts consistently go unanswered across enterprise environments. A recent report from The Hacker News examines why specific high-risk categories remain uninvestigated.\u003c/p\u003e\n\n\u003cp\u003eThese categories include WAF, DLP, OT/IoT, dark web intelligence, and supply chain signals. The findings point to a structural gap in how security coverage is delivered today. This gap is not caused by a lack of tooling, but by a ceiling built into every existing model.\u003c/p\u003e\n\n\u003cp\u003eIn-house SOC teams lack the specialized expertise needed for complex categories. Managed providers face economic constraints and miss necessary business context. Radiant Security and Cirosec will address this coverage ceiling in an upcoming technical webinar.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity operations teams are currently drowning in alert volume, yet the primary challenge remains persistent blind spots. The most dangerous alerts consistently go uninvestigated across enterprise environments. A recent report from The Hacker News highlights why specific high-risk categories like WAF, DLP, OT/IoT, dark web intelligence, and supply chain signals are routinely ignored.\u003c/p\u003e\n\n\u003cp\u003eThese findings reveal a structural gap in modern security coverage models rather than a simple tooling deficiency. In-house SOC teams struggle with routine alert volume and lack the specialized expertise required for complex categories. Managed security providers encounter different economic constraints and miss necessary business context, leading them to escalate these alerts back to clients.\u003c/p\u003e\n\n\u003cp\u003eAI-driven SOC automation platforms have advanced significantly but remain limited by static, pre-built triage logic. Most of these systems only process four to six predefined categories and deprioritize anything outside that narrow scope. Consequently, the alerts most likely to cause a breach fall into a coverage gap that no existing model effectively addresses.\u003c/p\u003e\n\n\u003cp\u003eRadiant Security and Cirosec are hosting a technical webinar on May 21, 2026, to demonstrate a solution to this problem. The session will focus on alert types that traditional triage methods cannot handle. Radiant’s platform utilizes a fundamentally different architecture that abandons static playbooks entirely.\u003c/p\u003e\n\n\u003cp\u003eInstead, its AI engine generates custom triage logic dynamically for any alert type, including previously unseen threats. This capability ensures that critical, specialized signals are properly investigated rather than passed through the cracks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eSecurity operations teams are currently overwhelmed by high alert volumes, but the critical issue lies in uninvestigated blind spots. The most dangerous alerts consistently go unanswered across enterprise environments. A recent report from The Hacker News examines why specific high-risk categories remain uninvestigated.\u003c/p\u003e\n\n\u003cp\u003eThese categories include WAF, DLP, OT/IoT, dark web intelligence, and supply chain signals. The findings point to a structural gap in how security coverage is delivered today. This gap is not caused by a lack of tooling, but by a ceiling built into every existing model.\u003c/p\u003e\n\n\u003cp\u003eIn-house SOC teams are the first to experience this coverage limitation. They are overloaded with high-volume, routine alerts that consume analyst capacity. Consequently, they rarely possess the specialized expertise needed to investigate WAF events or DLP anomalies.\u003c/p\u003e\n\n\u003cp\u003eThese tasks require deep, domain-specific knowledge that most internal teams simply lack. Managed security providers face a different version of the same problem. Complex alerts are time-consuming to investigate and require business context that managed providers do not possess.\u003c/p\u003e\n\n\u003cp\u003eThe economics do not support deep investigation, so they escalate these alerts back to the client. This creates a circular problem where the same in-house team that lacked capacity initially receives the escalated alerts. AI SOC automation platforms have made significant progress on common alert types.\u003c/p\u003e\n\n\u003cp\u003eHowever, most of these systems cap out at four to six pre-defined categories. They rely entirely on static, pre-built triage logic. When an alert falls outside that predefined logic, the platform deprioritizes it or passes it on.\u003c/p\u003e\n\n\u003cp\u003eThis includes novel threats, unfamiliar alert sources, or emerging attack vectors. The result is a blind spot at the intersection of all existing SOC models. The alerts most likely to result in a breach are precisely the ones for which no workflow exists.\u003c/p\u003e\n\n\u003cp\u003eRadiant Security and Cirosec are addressing this gap directly through a technical webinar. The session titled \u0026ldquo;Alert Coverage No One Else Can Triage\u0026rdquo; will be hosted on May 21, 2026. The event will examine the structural reasons behind the coverage ceiling.\u003c/p\u003e\n\n\u003cp\u003eIt will also walk through the specific alert types most commonly left uninvestigated. Attendees will receive a live demonstration of how Radiant\u0026rsquo;s AI SOC platform handles these complex signals. Radiant is built on a fundamentally different architecture than other AI SOC platforms.\u003c/p\u003e\n\n\u003cp\u003eRather than relying on pre-built playbooks, its AI generates custom triage logic on the fly. This capability applies to any alert type, including ones the platform has never seen before. This dynamic approach eliminates the static limitations that plague current automation tools.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will be conducted via Microsoft Teams in English. Registration is available through the provided link. The session details are as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDate:\u003c/strong\u003e May 21, 2026\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTime:\u003c/strong\u003e 15:00 CEST (6:00 AM PDT)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFormat:\u003c/strong\u003e Microsoft Teams — technical, interactive session\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHost:\u003c/strong\u003e Cirosec \u0026amp; Radiant Security\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLanguage:\u003c/strong\u003e English\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["In-house SOC teams and managed providers consistently fail to investigate high-risk alerts such as WAF, DLP, and OT/IoT signals due to analyst overload and a lack of specialized expertise.","Existing AI SOC automation platforms cannot handle these specialized alerts because they rely on static, pre-built logic limited to only four to six categories.","This structural limitation creates a coverage ceiling where the most breach-prone alerts go uninvestigated across all current security models.","Radiant Security's AI platform resolves this issue by dynamically generating custom triage logic on the fly for any alert type, including novel threats the system has never seen before."],"insights":["Managed Security Service Providers (MSSPs) and Managed Detection and Response (MDR) providers frequently escalate complex, specialized alerts back to clients due to unfavorable economics and a lack of necessary business context.","Current AI SOC automation platforms are limited to processing only four to six pre-defined categories, causing them to deprioritize novel threats or unfamiliar alert sources that fall outside their static triage logic.","The inability to investigate high-risk alerts stems from structural limitations in existing SOC delivery models rather than a deficiency in security tooling."],"referencedReports":[{"title":"The Riskiest Alert Types and Why","url":"https://thehackernews.com/expert-insights/2026/02/the-riskiest-alert-types-and-why.html","publisher":"The Hacker News","context":"The article cites this report to explain why high-risk alert categories such as WAF, DLP, OT/IoT, dark web intelligence, and supply chain signals consistently go uninvestigated across enterprise SOCs."}],"body":"\u003cp\u003eSecurity operations teams are currently overwhelmed by high alert volumes, but the critical issue lies in uninvestigated blind spots. The most dangerous alerts consistently go unanswered across enterprise environments. A recent report from The Hacker News examines why specific high-risk categories remain uninvestigated.\u003c/p\u003e\n\n\u003cp\u003eThese categories include WAF, DLP, OT/IoT, dark web intelligence, and supply chain signals. The findings point to a structural gap in how security coverage is delivered today. This gap is not caused by a lack of tooling, but by a ceiling built into every existing model.\u003c/p\u003e\n\n\u003cp\u003eIn-house SOC teams lack the specialized expertise needed for complex categories. Managed providers face economic constraints and miss necessary business context. Radiant Security and Cirosec will address this coverage ceiling in an upcoming technical webinar.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
