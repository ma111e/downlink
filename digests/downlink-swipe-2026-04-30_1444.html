<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":3,"title":"Critical cPanel and WHM bug exploited as a zero-day, PoC now available","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/critical-cpanel-and-whm-bug-exploited-as-a-zero-day-poc-now-available/","time":"11:40","priority":"MUST READ","score":98,"group":null,"groupColor":null,"tldr":"A critical zero-day authentication bypass flaw in cPanel and WHM is actively being exploited to grant attackers full system control, making immediate patching or port blocking essential for all administrators.","briefOverview":"\u003cp\u003eA critical authentication bypass vulnerability, CVE-2026-41940, is actively being exploited in the wild against cPanel, WHM, and WP Squared systems. The flaw stems from a CRLF injection in the login and session loading processes that allows attackers to bypass password validation entirely. Hosting providers like KnownHost and Namecheap have confirmed active exploitation attempts dating back to late February 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability grants attackers complete control over host systems, configurations, databases, and managed websites. cPanel released an emergency security update on April 28, 2026, to address the issue across multiple software versions. Administrators are strongly advised to apply the latest patches immediately or block external access to specific management ports if patching is delayed.\u003c/p\u003e\n\n\u003cp\u003eDetection scripts and vulnerability verification tools have also been published by security researchers to help identify compromised instances.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe critical CVE-2026-41940 authentication bypass vulnerability is currently being leveraged in active attacks against cPanel, WHM, and WP Squared environments. KnownHost reported that successful exploitation attempts were observed shortly after the vulnerability\u0026rsquo;s disclosure, with some execution attempts traced back to February 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe underlying issue involves improper session handling where user-controlled input from the Authorization header is written into server-side session files before authentication occurs. This CRLF injection flaw allows attackers to log into the system without validating the provided password. According to Rapid7, Shodan scans indicate approximately 1.5 million cPanel instances are currently exposed online, though the exact number of vulnerable systems remains unknown.\u003c/p\u003e\n\n\u003cp\u003eExploitation of this flaw grants attackers full control over the host system, its configurations, databases, and all managed websites. cPanel addressed the issue with an emergency update released on April 28, 2026, following significant pressure from hosting providers. The vendor clarified that only cPanel versions greater than 11.40 are affected by the security issue.\u003c/p\u003e\n\n\u003cp\u003eSpecific fixed versions include 11.110.0.97, 11.118.0.63, 11.126.0.54, 11.132.0.29, 11.134.0.20, and 11.136.0.5, alongside WP Squared version 11.136.1.7. Administrators who cannot patch immediately should block external access to ports 2083, 2087, 2095, and 2096, or stop the cpsrvd and cpdavd core services.\u003c/p\u003e\n\n\u003cp\u003eThe vendor also provided a detection script to check for compromise indicators, recommending session purging, credential resets, and log audits if signs of intrusion are found. Security firm watchTowr published a detailed technical analysis and a Detection Artifact Generator script to help verify vulnerability status across instances.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-status-and-timeline\"\u003eThreat Status and Timeline\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-41940 is a critical authentication bypass vulnerability actively exploited in the wild against cPanel, WHM, and WP Squared.\u003c/li\u003e\n\u003cli\u003eKnownHost confirmed successful exploits were observed shortly after disclosure, with execution attempts traced back to February 23, 2026.\u003c/li\u003e\n\u003cli\u003eThe vulnerability was publicly disclosed and addressed through an emergency update released on April 28, 2026.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe flaw is caused by a Carriage Return Line Feed (CRLF) injection in the login and session loading processes.\u003c/li\u003e\n\u003cli\u003eImproper session handling allows user-controlled input from the Authorization header to be written into server-side session files before authentication.\u003c/li\u003e\n\u003cli\u003eThe input is not properly sanitized, enabling attackers to trigger the bug and log into the system without validating the provided password.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"impact-and-scope\"\u003eImpact and Scope\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSuccessful exploitation grants an attacker complete control over the cPanel host system, its configurations, databases, and all managed websites.\u003c/li\u003e\n\u003cli\u003eShodan internet scans reveal approximately 1.5 million cPanel instances are exposed online, though the exact count of vulnerable systems is unknown.\u003c/li\u003e\n\u003cli\u003eThe vulnerability impacts cPanel versions after 11.40, as well as WP Squared, a WordPress hosting management panel built on cPanel.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mitigation-and-patching\"\u003eMitigation and Patching\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ecPanel released emergency patches for multiple release branches:\n\n\u003cul\u003e\n\u003cli\u003ecPanel/WHM 11.110.0 → fixed in 11.110.0.97\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.118.0 → fixed in 11.118.0.63\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.126.0 → fixed in 11.126.0.54\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.132.0 → fixed in 11.132.0.29\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.134.0 → fixed in 11.134.0.20\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.136.0 → fixed in 11.136.0.5\u003c/li\u003e\n\u003cli\u003eWP Squared 11.136.1 → fixed in 11.136.1.7\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eAdministrators must restart the ‘cpsrvd’ service after installing the latest software releases.\u003c/li\u003e\n\u003cli\u003eIf patching is not immediately possible, customers should block external access to ports 2083, 2087, 2095, and 2096, or stop the cpsrvd and cpdavd core services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"detection-and-research\"\u003eDetection and Research\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vendor provided a detection script to check for compromise indicators, recommending session purging, credential resets, log audits, and persistence mechanism investigations if signs of intrusion are found.\u003c/li\u003e\n\u003cli\u003eSecurity firm watchTowr published a detailed technical analysis explaining how the bug can be triggered to bypass authentication.\u003c/li\u003e\n\u003cli\u003ewatchTowr also released a Detection Artifact Generator script to verify if cPanel and WHM instances are vulnerable to CVE-2026-41940.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CVE-2026-41940 is a critical authentication bypass vulnerability affecting cPanel, WHM, and WP Squared that has been actively exploited in the wild since late February 2026.","The flaw results from improper session handling that writes unsanitized user input from the Authorization header into server-side session files before authentication occurs.","Exploiting this vulnerability grants attackers complete control over the host system, its configurations, databases, and managed websites.","Administrators should immediately apply the emergency patches released on April 28, 2026, or block external access to ports 2083, 2087, 2095, and 2096 if patching is delayed."],"insights":["The authentication bypass allows password-less login because the system writes unsanitized user input from the Authorization header into session files before the authentication process begins.","If patching is not immediately possible, administrators can mitigate the vulnerability by stopping the cpsrvd and cpdavd core services, in addition to blocking access to specific ports.","The vendor clarified that the vulnerability only affects cPanel versions greater than 11.40, significantly narrowing the scope of potentially impacted systems compared to initial reports.","watchTowr researchers published a Detection Artifact Generator script to help administrators verify if their cPanel and WHM instances are vulnerable to the flaw."],"referencedReports":[{"title":"Security CVE-2026-41940 cPanel WHM WP2 Security Update 04-28-2026","url":"http://support.cpanel.net/hc/en-us/articles/40073787579671-Security-CVE-2026-41940-cPanel-WHM-WP2-Security-Update-04-28-2026","publisher":"cPanel","context":"The article references this official security advisory to clarify affected software versions and recommend restarting the cpsrvd service."},{"title":"CVE-2026-41940 cPanel \u0026 WHM Authentication Bypass","url":"https://www.rapid7.com/blog/post/etr-cve-2026-41940-cpanel-whm-authentication-bypass/","publisher":"Rapid7","context":"The article cites this technical analysis regarding the vulnerability's impact and Shodan scan data showing approximately 1.5 million exposed instances."}],"body":"\u003cp\u003eA critical authentication bypass vulnerability, CVE-2026-41940, is actively being exploited in the wild against cPanel, WHM, and WP Squared systems. The flaw stems from a CRLF injection in the login and session loading processes that allows attackers to bypass password validation entirely. Hosting providers like KnownHost and Namecheap have confirmed active exploitation attempts dating back to late February 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability grants attackers complete control over host systems, configurations, databases, and managed websites. cPanel released an emergency security update on April 28, 2026, to address the issue across multiple software versions. Administrators are strongly advised to apply the latest patches immediately or block external access to specific management ports if patching is delayed.\u003c/p\u003e\n\n\u003cp\u003eDetection scripts and vulnerability verification tools have also been published by security researchers to help identify compromised instances.\u003c/p\u003e\n"},{"n":4,"title":"New Linux ‘Copy Fail’ flaw gives hackers root on major distros","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-linux-copy-fail-flaw-gives-hackers-root-on-major-distros/","time":"13:54","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Researchers have disclosed CVE-2026-31431, a highly reliable Linux kernel flaw that grants unprivileged users root access across all major distributions since 2017. Administrators should immediately apply the latest kernel updates or disable the vulnerable AF_ALG crypto interface to prevent exploitation.","briefOverview":"\u003cp\u003eResearchers at Theori have disclosed a critical Linux kernel vulnerability dubbed \u0026ldquo;Copy Fail\u0026rdquo; (CVE-2026-31431) that enables unprivileged local attackers to gain root privileges. The flaw stems from a logic bug in the kernel\u0026rsquo;s crypto template and impacts all major distributions running kernels released since 2017. By leveraging the AF_ALG socket interface and the splice() system call, attackers can write four controlled bytes into the page cache of any readable file. When these bytes overwrite a setuid-root binary, they reliably trigger a privilege escalation to root.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a 732-byte Python exploit that achieves a 100% success rate across tested environments. Kernel maintainers addressed the issue by reverting a problematic 2017 optimization, releasing patches in versions 6.18.22, 6.19.12, and 7.0. Administrators are advised to apply these updates immediately or disable the vulnerable algif_aead module as a temporary workaround.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe security firm Theori has published a proof-of-concept exploit for a local privilege escalation vulnerability identified as CVE-2026-31431. Dubbed \u0026ldquo;Copy Fail,\u0026rdquo; this flaw affects Linux kernels released since 2017 and grants unprivileged local users root access. The vulnerability was discovered in approximately one hour by scanning the Linux crypto subsystem using Theori\u0026rsquo;s AI-driven pentesting platform, Xint Code.\u003c/p\u003e\n\n\u003cp\u003eThey reported the finding to the Linux kernel security team on March 23, and patches became available within a week. The issue originates from a logic bug in the Linux kernel\u0026rsquo;s authencesn cryptographic template that allows a four-byte write into the page cache of any readable system file. Attackers combine the AF_ALG socket-based interface with the splice() system call to manipulate kernel buffers instead of standard user-space buffers.\u003c/p\u003e\n\n\u003cp\u003eWhen these four bytes overwrite a setuid-root binary, they alter its execution behavior and successfully escalate privileges to root. The researchers demonstrated a consistently effective 732-byte Python script that achieves a 100% success rate across Ubuntu 24.04 LTS, Amazon Linux 2023, RHEL 10.1, and SUSE 16. Theori notes that the exploit is more portable and practical than the earlier Dirty Pipe vulnerability, covering the entire 2017 to 2026 kernel window without needing offsets.\u003c/p\u003e\n\n\u003cp\u003eThe upstream Linux kernel team fixed the issue on April 1st by reverting the problematic in-place crypto optimization introduced in version 4.14. Official updates are now available in kernel versions 6.18.22, 6.19.12, and 7.0. While major distributions are actively pushing these updates, analysts note that no official security advisory has been published yet.\u003c/p\u003e\n\n\u003cp\u003eAs an immediate workaround, administrators can disable the vulnerable crypto interface by blacklisting the algif_aead module. Priority patching is strongly recommended for multi-tenant Linux hosts, Kubernetes clusters, CI runners, and cloud SaaS platforms that execute user code.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"vulnerability-overview-and-discovery\"\u003eVulnerability Overview and Discovery\u003c/h2\u003e\n\n\u003cp\u003eThe security company Theori has disclosed a critical local privilege escalation flaw dubbed \u0026ldquo;Copy Fail\u0026rdquo; (CVE-2026-31431). This vulnerability impacts Linux kernels released since 2017 and enables unprivileged local attackers to gain root permissions. Theori researchers discovered the issue in under an hour by scanning the Linux crypto subsystem using their AI-driven pentesting platform, Xint Code. They reported the finding to the Linux kernel security team on March 23, and patches became available within a week.\u003c/p\u003e\n\n\u003ch2 id=\"technical-root-cause-and-exploitation\"\u003eTechnical Root Cause and Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe flaw is a logic bug located in the Linux kernel\u0026rsquo;s authencesn cryptographic template. It allows an authenticated user to perform a four-byte write into the page cache of any readable file on the system. Attackers combine the AF_ALG socket-based interface with the splice() system call to force the kernel to write controlled data into a buffer instead of a normal page cache location. When these four bytes overwrite a setuid-root binary, they alter the binary\u0026rsquo;s execution behavior. This manipulation reliably triggers a privilege escalation to root.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a 732-byte Python-based proof-of-concept exploit that achieves a 100% success rate across tested environments. The exploit has been successfully demonstrated on Ubuntu 24.04 LTS, Amazon Linux 2023, RHEL 10.1, and SUSE 16. Theori researchers characterize the flaw as more portable and broadly exploitable than typical local privilege escalation bugs. Unlike the Dirty Pipe vulnerability, which required specific kernel versions and patches, Copy Fail covers the entire 2017 to 2026 kernel window without needing offsets.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-and-mitigation\"\u003eRemediation and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe upstream Linux kernel team fixed the issue on April 1st by reverting the problematic in-place crypto optimization introduced in version 4.14. Patches are now available in kernel versions 6.18.22, 6.19.12, and 7.0. Major distributions are actively pushing these updates, though analysts note that no official security advisory has been published yet. As an immediate workaround, administrators can disable the vulnerable crypto interface by blacklisting the algif_aead module.\u003c/p\u003e\n\n\u003cp\u003eTo implement this mitigation, administrators should run the following commands:\necho \u0026ldquo;install algif_aead /bin/false\u0026rdquo; \u0026gt; /etc/modprobe.d/disable-algif.conf\nrmmod algif_aead\u003c/p\u003e\n\n\u003cp\u003ePriority patching is strongly recommended for multi-tenant Linux hosts, Kubernetes clusters, CI runners, and cloud SaaS platforms that execute user code.\u003c/p\u003e\n","keyPoints":["The \"Copy Fail\" vulnerability (CVE-2026-31431) is a logic bug in the Linux kernel's crypto template that allows unprivileged local attackers to gain root permissions on all major distributions running kernels since 2017.","Researchers developed a 732-byte Python exploit that reliably escalates privileges by writing four controlled bytes into the page cache of setuid-root binaries using the AF_ALG socket interface and splice() system call.","The Linux kernel team fixed the issue on April 1st by reverting the problematic in-place crypto optimization, with patches released in versions 6.18.22, 6.19.12, and 7.0.","Administrators should immediately apply kernel updates or disable the algif_aead module as an interim mitigation to block the vulnerable crypto interface."],"insights":["The exploit's universal portability across all major distributions since 2017 eliminates the need for kernel-specific offsets, making it significantly more practical and broadly exploitable than comparable flaws like Dirty Pipe.","The vulnerability was discovered in under an hour by an AI-driven pentesting platform scanning the crypto subsystem, demonstrating how automated tools can rapidly surface deep logic bugs in long-standing kernel optimization paths.","Researchers explicitly prioritize patching multi-tenant environments such as Kubernetes clusters, CI runners, and cloud SaaS platforms, as these shared-hosting architectures provide the unprivileged local access required to trigger the escalation.","A rapid interim mitigation involves blacklisting the algif_aead module via /etc/modprobe.d/, which effectively severs the AF_ALG socket interface attack vector without requiring an immediate kernel update."],"referencedReports":[{"title":"Detailed write-up on Copy Fail vulnerability","url":"https://xint.io/blog/copy-fail-linux-distributions","publisher":"Xint Code / Theori","context":"The article references this link as the detailed write-up where researchers explain the root cause and exploitation mechanics of the flaw."},{"title":"OSS-Security mailing list advisory for kernel fixes","url":"https://www.openwall.com/lists/oss-security/2026/04/29/23","publisher":"Openwall / oss-security","context":"The article cites this mailing list post as the source confirming the upstream kernel versions containing the patches for CVE-2026-31431."}],"body":"\u003cp\u003eResearchers at Theori have disclosed a critical Linux kernel vulnerability dubbed \u0026ldquo;Copy Fail\u0026rdquo; (CVE-2026-31431) that enables unprivileged local attackers to gain root privileges. The flaw stems from a logic bug in the kernel\u0026rsquo;s crypto template and impacts all major distributions running kernels released since 2017. By leveraging the AF_ALG socket interface and the splice() system call, attackers can write four controlled bytes into the page cache of any readable file. When these bytes overwrite a setuid-root binary, they reliably trigger a privilege escalation to root.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a 732-byte Python exploit that achieves a 100% success rate across tested environments. Kernel maintainers addressed the issue by reverting a problematic 2017 optimization, releasing patches in versions 6.18.22, 6.19.12, and 7.0. Administrators are advised to apply these updates immediately or disable the vulnerable algif_aead module as a temporary workaround.\u003c/p\u003e\n"},{"n":6,"title":"EtherRAT Distribution Spoofing Administrative Tools via GitHub Facades","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/etherrat-distribution-spoofing.html","time":"11:30","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Threat actors are distributing the EtherRAT malware disguised as administrative tools via SEO-poisoned GitHub facades to compromise high-privilege enterprise accounts. The campaign maintains resilience through a decentralized command-and-control system that uses Ethereum smart contracts to dynamically resolve server addresses and evade traditional takedowns.","briefOverview":"\u003cp\u003eA sophisticated threat campaign identified in March 2026 by Atos Threat Research Center targets enterprise administrators and security analysts through search engine poisoning.\u003c/p\u003e\n\n\u003cp\u003eAttackers manipulate results on major search engines to promote clean GitHub repositories that serve as SEO-optimized facades.\u003c/p\u003e\n\n\u003cp\u003eThese benign storefronts redirect users to secondary repositories hosting malicious MSI installers disguised as essential IT utilities like PsExec, Sysmon, and Kusto Explorer.\u003c/p\u003e\n\n\u003cp\u003eOnce executed, the payloads deploy EtherRAT, a Node.js-based remote access trojan that operates through a multi-stage architecture.\u003c/p\u003e\n\n\u003cp\u003eThe malware maintains persistence by running inside the conhost.exe process with the \u0026ndash;headless argument to avoid detection.\u003c/p\u003e\n\n\u003cp\u003eCommand and control communication relies on a decentralized model where the malware queries Ethereum smart contracts via public RPC endpoints to dynamically resolve server addresses.\u003c/p\u003e\n\n\u003cp\u003eThis blockchain-based approach allows attackers to rotate infrastructure instantly without modifying the deployed malware.\u003c/p\u003e\n\n\u003cp\u003eThe campaign demonstrates a focus on stealth and long-term persistence rather than rapid data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eDefensive measures include blocking Ethereum RPC endpoints, verifying software provenance, and hunting for suspicious conhost.exe behavior.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAtos Threat Research Center identified a highly resilient malicious campaign in March 2026 that specifically targets high-privilege IT personnel through administrative tool impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe delivery chain begins with aggressive SEO poisoning across Bing, Yahoo, DuckDuckGo, and Yandex to rank malicious GitHub repositories at the top of search results.\u003c/p\u003e\n\n\u003cp\u003eThe campaign utilizes a dual-stage distribution model where a clean, SEO-optimized facade repository maintains search visibility while redirecting victims to a secondary account hosting the actual payload.\u003c/p\u003e\n\n\u003cp\u003eBetween December 2025 and April 2026, threat actors deployed 44 separate facade repositories impersonating critical utilities such as PsExec, AzCopy, LAPS, and Kusto Explorer.\u003c/p\u003e\n\n\u003cp\u003eUpon execution, the malicious MSI installer initiates a multi-stage Node.js payload designed to evade detection and establish persistent access.\u003c/p\u003e\n\n\u003cp\u003eStage zero consists of an obfuscated batch script that downloads the Node.js runtime and launches the first-stage loader.\u003c/p\u003e\n\n\u003cp\u003eThe in-memory loader decrypts subsequent payloads using AES-256-CBC encryption and executes them without writing to disk.\u003c/p\u003e\n\n\u003cp\u003eStage two establishes persistence through a registry Run key and disguises the process by executing the payload inside conhost.exe with the \u0026ndash;headless flag.\u003c/p\u003e\n\n\u003cp\u003eThe final stage deploys the core EtherRAT backdoor, which assigns a unique bot ID and continuously polls for commands.\u003c/p\u003e\n\n\u003cp\u003eInstead of relying on hardcoded domains, the malware queries nine public Ethereum RPC endpoints in parallel to retrieve C2 addresses from smart contracts.\u003c/p\u003e\n\n\u003cp\u003eThis decentralized architecture enables attackers to update command and control infrastructure via blockchain transactions, rendering traditional domain takedowns ineffective.\u003c/p\u003e\n\n\u003cp\u003eThe campaign exhibits deliberate operational patience, favoring quiet network mapping and hands-on-keyboard activities over aggressive scanning.\u003c/p\u003e\n\n\u003cp\u003eAtos researchers note significant technical overlaps with prior campaigns attributed to the North Korean Lazarus Group and the Iranian MuddyWater group.\u003c/p\u003e\n\n\u003cp\u003eThe article provides detailed technical breakdowns, IoCs, and defensive recommendations including blocking Ethereum RPC endpoints and verifying administrative tool provenance.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"campaign-overview-and-distribution-architecture\"\u003eCampaign Overview and Distribution Architecture\u003c/h1\u003e\n\n\u003cp\u003eAtos Threat Research Center documented a sophisticated threat campaign in March 2026 that targets enterprise administrators, DevOps engineers, and security analysts.\nThe operation leverages search engine order poisoning across Bing, Yahoo, DuckDuckGo, and Yandex to manipulate search results for niche IT terminology.\nThe delivery mechanism relies on a dual-stage GitHub distribution architecture designed to evade platform takedowns and maintain operational longevity.\nThe first stage consists of a clean, SEO-optimized facade repository that appears benign to both users and automated scanners.\nThis storefront contains a professional README file that redirects victims to a secondary GitHub repository hosting the malicious payload.\nThis separation allows threat actors to rapidly rotate distribution accounts while preserving their search engine rankings through the untouched facade.\nBetween early December 2025 and April 2026, the campaign deployed 44 distinct facade repositories impersonating various administrative and diagnostic utilities.\u003c/p\u003e\n\n\u003ch1 id=\"tool-impersonation-and-victim-profiling\"\u003eTool Impersonation and Victim Profiling\u003c/h1\u003e\n\n\u003cp\u003eThe campaign strategically impersonates the administrative stack to automate victim profiling and ensure high-value targets.\nMalicious MSI installers are distributed under the names of essential IT tools including PsExec, AzCopy, Sysmon, LAPS, Kusto Explorer, ProcDump, and BgInfo.\nThis targeting approach ensures that infections primarily land on workstations belonging to personnel with elevated system and network permissions.\nThe psychological component leverages an irony lure by disguising payloads as utilities that defenders routinely use for investigation.\nBy delivering these tools as legitimate-looking MSI packages, attackers bypass initial suspicion associated with raw scripts or standalone executables.\nCompromise of these accounts provides immediate pathways for lateral movement and sustained access to enterprise environments.\u003c/p\u003e\n\n\u003ch1 id=\"malware-architecture-and-execution-stages\"\u003eMalware Architecture and Execution Stages\u003c/h1\u003e\n\n\u003cp\u003eThe delivered payload is identified as EtherRAT, a Node.js-based remote access trojan that employs a layered, fileless-style execution model.\nThe installation process begins with Stage zero, an obfuscated Windows batch script that downloads the Node.js runtime and prepares the execution environment.\nStage one functions as an in-memory loader that decrypts subsequent payloads using AES-256-CBC encryption and executes them via module._compile().\nStage two establishes persistence through a registry Run key and disguises the process tree by wrapping the payload in conhost.exe with the \u0026ndash;headless argument.\nThe final stage deploys the core RAT, which generates a unique bot ID and computes a system-specific working directory.\nAll strings, including server addresses and API endpoints, are encrypted to hinder static analysis.\nThe malware continuously re-encrypts its own source code on disk after each execution cycle.\u003c/p\u003e\n\n\u003ch1 id=\"decentralized-command-and-control-infrastructure\"\u003eDecentralized Command and Control Infrastructure\u003c/h1\u003e\n\n\u003cp\u003eA defining technical characteristic of the campaign is its blockchain-based dead drop resolving mechanism for command and control resolution.\nThe malware avoids hardcoded domains or IP addresses by querying nine public Ethereum RPC endpoints in parallel.\nIt retrieves the active C2 address from a specific Ethereum smart contract and uses majority voting to ensure reliable resolution even if some gateways experience downtime.\nA background timer executes this blockchain lookup every five minutes, allowing attackers to dynamically rotate infrastructure by submitting a single on-chain transaction.\nThis decentralized model provides extreme resilience against traditional disruption techniques such as domain seizure or IP blocklisting.\nThe smart contract\u0026rsquo;s transaction history reveals repeated state-changing calls that directly correspond to C2 address updates.\u003c/p\u003e\n\n\u003ch1 id=\"adversary-behavior-and-attribution\"\u003eAdversary Behavior and Attribution\u003c/h1\u003e\n\n\u003cp\u003ePost-exploitation activities demonstrate a focus on operational patience and stealth rather than rapid data extraction.\nThe threat actor avoids aggressive, high-volume scanning that might trigger behavioral alerts, opting instead for quiet discovery to map high-privilege network architecture.\nHands-on-keyboard activities are conducted methodically to establish sustained persistence.\nAtos researchers have linked the malware to the North Korean Lazarus Group based on significant tooling overlaps with prior campaigns.\nAdditionally, code commonalities have been documented with the Tsundere botnet attributed to the Iranian MuddyWater group.\nThe article references preliminary alerts from KISA\u0026amp;KrCERT/CC and technical analyses from eSentire and Sysdig that corroborate the campaign\u0026rsquo;s evolution and attribution.\u003c/p\u003e\n\n\u003ch1 id=\"defensive-recommendations-and-indicators\"\u003eDefensive Recommendations and Indicators\u003c/h1\u003e\n\n\u003cp\u003eOrganizations are advised to restrict access to public Ethereum RPC endpoints used by the malware\u0026rsquo;s C2 resolution module.\nSecurity teams should conduct retrospective log reviews to identify historical communications with the identified RPC services and C2 domains.\nAdministrative awareness programs must emphasize verified software provenance and direct vendor portals for critical IT utilities.\nBehavioral threat hunting should focus on identifying periodic outbound requests to Ethereum gateways, suspicious conhost.exe executions with the \u0026ndash;headless flag, and node.exe processes executing shell commands.\nThe Atos Threat Research Center has initiated formal takedown actions against the identified distribution channels and published comprehensive IoCs and TTP mappings in their public repository.\u003c/p\u003e\n","keyPoints":["Threat actors are leveraging SEO poisoning on major search engines to rank clean GitHub facade repositories at the top of results for specialized IT administrative tools.","The campaign distributes malicious MSI installers impersonating utilities like PsExec, Sysmon, and Kusto Explorer to specifically compromise high-privilege enterprise accounts.","The delivered EtherRAT malware uses a multi-stage Node.js architecture that executes payloads in memory and disguises its processes by running inside conhost.exe with the --headless argument.","Command and control resolution is decentralized through Ethereum smart contracts, enabling attackers to dynamically update C2 addresses via blockchain transactions to bypass traditional network blocklists."],"insights":["The campaign employs a dual-stage GitHub delivery model where a clean, SEO-optimized facade repository preserves search engine rankings while a separate secondary account hosts the payload, enabling instant recovery through a single README link update if the payload account is taken down.","The malware achieves process concealment by executing its Node.js payload inside conhost.exe with the --headless argument, effectively disguising the malicious process as a standard Windows console host in Task Manager.","The decentralized C2 architecture queries nine public Ethereum RPC endpoints in parallel and uses majority voting to retrieve the command server address from a smart contract, ensuring continuous connectivity even when multiple gateways experience downtime.","Unlike typical data-exfiltration campaigns, the threat actor prioritizes operational patience and stealth, conducting quiet network mapping and hands-on-keyboard activities to avoid triggering behavioral alerts before escalating."],"referencedReports":[{"title":"KISA\u0026KrCERT/CC Alert","url":"https://www.boho.or.kr/kr/bbs/view.do?bbsId=B0000133\u0026pageIndex=1\u0026nttId=71998\u0026menuNo=205020","publisher":"KISA\u0026KrCERT/CC","context":"The article references a preliminary alert from KISA\u0026KrCERT/CC regarding the threat actor's campaign."},{"title":"eSentire TRU Investigation and EtherRAT Analysis","url":"https://www.esentire.com/blog/etherrat-sys-info-module-c2-on-ethereum-etherhiding-target-selection-cdn-like-beacons","publisher":"eSentire","context":"The article cites eSentire's Threat Response Unit investigation and their analysis documenting extensive code commonalities between EtherRAT and the Tsundere malware."},{"title":"Sysdig Threat Research Team Analysis","url":"https://www.sysdig.com/blog/etherrat-dprk-uses-novel-ethereum-implant-in-react2shell-attacks","publisher":"Sysdig","context":"The article references the Sysdig Threat Research Team's prior work linking the EtherRAT malware to the North Korean Lazarus Group."},{"title":"Contagious Interview Campaign Analysis","url":"https://socket.dev/blog/north-korea-contagious-interview-campaign-338-malicious-npm-packages","publisher":"Socket.dev","context":"The article notes that researchers identified significant tooling overlaps between this campaign and the Contagious Interview campaign detailed in this report."}],"body":"\u003cp\u003eA sophisticated threat campaign identified in March 2026 by Atos Threat Research Center targets enterprise administrators and security analysts through search engine poisoning.\u003c/p\u003e\n\n\u003cp\u003eAttackers manipulate results on major search engines to promote clean GitHub repositories that serve as SEO-optimized facades.\u003c/p\u003e\n\n\u003cp\u003eThese benign storefronts redirect users to secondary repositories hosting malicious MSI installers disguised as essential IT utilities like PsExec, Sysmon, and Kusto Explorer.\u003c/p\u003e\n\n\u003cp\u003eOnce executed, the payloads deploy EtherRAT, a Node.js-based remote access trojan that operates through a multi-stage architecture.\u003c/p\u003e\n\n\u003cp\u003eThe malware maintains persistence by running inside the conhost.exe process with the \u0026ndash;headless argument to avoid detection.\u003c/p\u003e\n\n\u003cp\u003eCommand and control communication relies on a decentralized model where the malware queries Ethereum smart contracts via public RPC endpoints to dynamically resolve server addresses.\u003c/p\u003e\n\n\u003cp\u003eThis blockchain-based approach allows attackers to rotate infrastructure instantly without modifying the deployed malware.\u003c/p\u003e\n\n\u003cp\u003eThe campaign demonstrates a focus on stealth and long-term persistence rather than rapid data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eDefensive measures include blocking Ethereum RPC endpoints, verifying software provenance, and hunting for suspicious conhost.exe behavior.\u003c/p\u003e\n"},{"n":1,"title":"Moldova’s health insurance agency reports possible data leak after cyberattack","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/moldova-health-insurance-agency-reports-possible-data-leak-cyberattack","time":"13:37","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Moldova’s national health insurance agency confirmed a cyberattack that likely compromised up to a third of its database containing personal and payment records, with officials suspecting a sophisticated, possibly state-linked data theft operation rather than a ransomware attack.","briefOverview":"\u003cp\u003eMoldova’s National Health Insurance Company (CNAM) confirmed that it suffered a cyberattack several weeks ago, which may have led to the exfiltration of limited data. While CNAM stated that the affected system was quickly secured and that its database integrity remains intact, cybersecurity officials suggest the incident is more severe. Deputy director Ion Vintilă indicated that approximately one-third of the database, containing personal and payment records, could have been compromised.\u003c/p\u003e\n\n\u003cp\u003eAuthorities have not received any ransom demands, leading them to suspect a sophisticated operation aimed at stealing sensitive information rather than financial extortion. Officials are considering potential external involvement, including possible links to Russian actors. This incident follows a pattern of increased cyberattacks targeting Moldova’s critical infrastructure since the start of the year. Many of these operations appear designed to disrupt state institutions and undermine the pro-European government.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMoldova’s National Health Insurance Company (CNAM) confirmed this week that it experienced a cyberattack several weeks prior. The agency reported that technical assessments point to a possible theft of limited information from its systems. In a statement to local broadcaster TVR Moldova, CNAM emphasized that the compromised system was secured promptly and that the overall integrity of its database remains intact.\u003c/p\u003e\n\n\u003cp\u003eThe agency also clarified that the breach did not disrupt operations at hospitals or other medical institutions relying on the national insurance framework. Despite CNAM’s reassurances, Moldova’s cybersecurity officials have indicated a more severe impact. Ion Vintilă, deputy director of the national cybersecurity agency, told local media that the attack may have impacted roughly one-third of CNAM’s database. This compromised data includes personal information and payment records tied to the healthcare system.\u003c/p\u003e\n\n\u003cp\u003eNotably, authorities have not received any ransom demands, which raises questions about the attackers\u0026rsquo; primary motives. Vintilă stated that the absence of financial demands suggests a well-developed plan to steal sensitive information rather than a standard ransomware operation. He added that officials are evaluating the possibility of external involvement, including potential connections to Russian actors.\u003c/p\u003e\n\n\u003cp\u003eCNAM serves as the administrator of Moldova’s compulsory health insurance system, handling contribution collection and reimbursements for medical providers. Vintilă noted that multiple cyberattacks have targeted Moldova’s critical infrastructure since the beginning of the year. However, the breach involving the medical database appears to be the most significant incident to date.\u003c/p\u003e\n\n\u003cp\u003eNeither Moldova’s cybersecurity agencies nor the health ministry have released official public statements regarding the event. Moldova, a nation of approximately 2.4 million people located between Ukraine and Romania, has seen a surge in cyberattacks and influence operations since Russia’s full-scale invasion of Ukraine in 2022. Security authorities believe many of these efforts are specifically aimed at disrupting state institutions and eroding public trust in the pro-European administration led by President Maia Sandu.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"incident-overview\"\u003eIncident Overview\u003c/h1\u003e\n\n\u003cp\u003eMoldova’s National Health Insurance Company (CNAM) confirmed a cyberattack that occurred several weeks ago. The agency reported that technical assessments indicate a possible exfiltration of limited data. CNAM stated to local broadcaster TVR Moldova that the affected system was secured quickly. The agency also confirmed that the integrity of its database remains intact. Furthermore, the breach did not disrupt the operations of hospitals or other medical institutions that depend on the national insurance system.\u003c/p\u003e\n\n\u003ch1 id=\"official-assessments-and-data-impact\"\u003eOfficial Assessments and Data Impact\u003c/h1\u003e\n\n\u003cp\u003eDespite CNAM’s initial statements, cybersecurity officials suggest the incident is more severe. Ion Vintilă, deputy director of Moldova’s cybersecurity agency, told local media that the attack may have affected approximately one-third of CNAM’s database. This compromised data contains personal information and payment records related to the healthcare system. Key details regarding the compromised data include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe affected database holds personal information tied to the healthcare system.\u003c/li\u003e\n\u003cli\u003ePayment records related to medical services are also contained within the compromised data.\u003c/li\u003e\n\u003cli\u003eCNAM administers the country’s compulsory health insurance system, handling contribution collection and reimbursements for providers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"attack-characteristics-and-attribution\"\u003eAttack Characteristics and Attribution\u003c/h1\u003e\n\n\u003cp\u003eAuthorities have not received any ransom demands following the incident. Vintilă noted that the lack of financial requests raises questions about whether the operation was motivated by monetary gain. Instead, officials believe this could be a well-developed plan designed to steal sensitive information. Authorities are considering the possibility of external involvement, including potential links to actors from Russia. Vintilă highlighted that several cyberattacks have targeted Moldova’s critical infrastructure since the beginning of the year. However, the incident involving the medical database appears to be the most serious to date.\u003c/p\u003e\n\n\u003ch1 id=\"government-response-and-strategic-context\"\u003eGovernment Response and Strategic Context\u003c/h1\u003e\n\n\u003cp\u003eNeither Moldova’s cybersecurity agencies nor the health ministry have issued public statements about the incident. Moldova is a country of about 2.4 million people situated between Ukraine and Romania. The nation has faced an increase in cyberattacks and influence operations since Russia’s full-scale invasion of Ukraine in 2022. Authorities state that many of these efforts are aimed at disrupting state institutions and undermining trust in the pro-European government of President Maia Sandu.\u003c/p\u003e\n","keyPoints":["Moldova’s National Health Insurance Company (CNAM) confirmed a cyberattack that resulted in the possible exfiltration of limited data, though the agency maintains that its database integrity remains intact and medical operations are unaffected.","Deputy director Ion Vintilă of Moldova’s cybersecurity agency stated the attack may have compromised approximately one-third of CNAM’s database, which contains personal information and payment records.","Authorities have not received ransom demands, leading officials to suspect a sophisticated operation aimed at stealing sensitive information rather than financial gain, with potential links to external actors including Russia.","The incident is part of a broader trend of increased cyberattacks and influence operations targeting Moldova’s critical infrastructure since Russia’s full-scale invasion of Ukraine in 2022."],"insights":["The discrepancy between CNAM’s claim of intact database integrity and cybersecurity officials’ assessment that one-third of the database was affected highlights a critical reporting gap that could delay coordinated forensic containment.","The explicit absence of ransom demands combined with the targeting of personal and payment records indicates the threat actor is prioritizing long-term intelligence harvesting over immediate financial extortion, consistent with officials’ suspicion of a sophisticated, externally linked operation.","Despite a backend compromise on the core reimbursement system, the confirmed lack of disruption to hospitals and clinics demonstrates that the health insurance network maintains operational continuity through effective system isolation or fallback procedures."],"referencedReports":[],"body":"\u003cp\u003eMoldova’s National Health Insurance Company (CNAM) confirmed that it suffered a cyberattack several weeks ago, which may have led to the exfiltration of limited data. While CNAM stated that the affected system was quickly secured and that its database integrity remains intact, cybersecurity officials suggest the incident is more severe. Deputy director Ion Vintilă indicated that approximately one-third of the database, containing personal and payment records, could have been compromised.\u003c/p\u003e\n\n\u003cp\u003eAuthorities have not received any ransom demands, leading them to suspect a sophisticated operation aimed at stealing sensitive information rather than financial extortion. Officials are considering potential external involvement, including possible links to Russian actors. This incident follows a pattern of increased cyberattacks targeting Moldova’s critical infrastructure since the start of the year. Many of these operations appear designed to disrupt state institutions and undermine the pro-European government.\u003c/p\u003e\n"},{"n":2,"title":"Police dismantles 9 crypto scam centers, arrests 276 suspects","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/police-dismantles-9-crypto-investment-scam-centers-arrests-276-suspects/","time":"11:21","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"International law enforcement agencies successfully dismantled nine cryptocurrency fraud centers and arrested 276 suspects in a coordinated crackdown on pig-butchering scam networks. This operation highlights the critical need for cross-border cooperation to combat increasingly sophisticated crypto investment fraud.","briefOverview":"\u003cp\u003eA joint international operation led by Dubai Police and involving U.S. and Chinese authorities successfully arrested 276 suspects and dismantled nine cryptocurrency fraud centers. The crackdown targeted pig-butchering schemes, where scammers build fake romantic relationships to lure victims into fraudulent investment platforms. Once funds are transferred, victims immediately lose control of their money while scammers encourage them to take out loans and borrow from family to invest more.\u003c/p\u003e\n\n\u003cp\u003eU.S. federal investigators utilized complaints from the FBI\u0026rsquo;s Internet Crime Complaint Center to identify victims and track losses totaling millions of dollars. This coordinated effort underscores the growing international focus on combating borderless cryptocurrency fraud networks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA joint international operation involving U.S., Chinese, and UAE authorities arrested 276 suspects and shut down nine cryptocurrency fraud centers. The crackdown targeted pig-butchering schemes where scammers use fabricated relationships to lure victims into fake platforms. Once funds are transferred, victims lose immediate control while scammers encourage them to take out loans and borrow from family. U.S. investigators analyzed complaints from the FBI\u0026rsquo;s Internet Crime Complaint Center to track millions of dollars in losses.\u003c/p\u003e\n\n\u003cp\u003eAmong the arrested defendants, Burmese national Thet Min Nyi faces charges for the Ko Thet Company, while three Indonesian nationals face charges for the Sanduo Group and Giant Company. Two suspects remain fugitives. U.S. Attorney Adam Gordon emphasized that global crime now faces global justice. Assistant Attorney General A. Tysen Duva noted that law enforcement activity to combat borderless fraud is equally borderless.\u003c/p\u003e\n\n\u003cp\u003eThe FBI\u0026rsquo;s 2025 report shows investment fraud accounted for 49 percent of all scams, resulting in \u003cspan class=\"math inline\"\u003e\\(8.6 billion in losses. In November, federal authorities launched the Scam Center Strike Force to disrupt these networks. This follows a \\)\u003c/span\u003e15 billion seizure from the Prince Group criminal organization. European authorities recently dismantled a separate ring responsible for over €50 million in losses.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"operation-overview\"\u003eOperation Overview\u003c/h3\u003e\n\n\u003cp\u003eA coordinated international law enforcement initiative successfully dismantled nine cryptocurrency investment fraud centers and arrested at least 276 suspects. The operation was led by Dubai Police under the UAE Ministry of Interior and involved collaboration between U.S. and Chinese authorities. This multi-agency effort targeted organized crime networks operating across international borders.\u003c/p\u003e\n\n\u003ch3 id=\"scam-methodology-victim-impact\"\u003eScam Methodology \u0026amp; Victim Impact\u003c/h3\u003e\n\n\u003cp\u003eThe targeted schemes are commonly referred to as pig-butchering or romance baiting. Scammers construct fabricated friendships or romantic relationships to establish trust with their targets. Once trust is established, they lure victims to counterfeit cryptocurrency investment platforms. Court records show that victims immediately lose control of their transferred funds. These assets are subsequently laundered through a network of additional cryptocurrency accounts. Scammers further exacerbate financial harm by encouraging victims to secure loans and borrow money from family members to invest additional capital.\u003c/p\u003e\n\n\u003ch3 id=\"arrested-individuals-legal-charges\"\u003eArrested Individuals \u0026amp; Legal Charges\u003c/h3\u003e\n\n\u003cp\u003eAmong the 275 defendants processed in Dubai, several key figures face significant legal consequences:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBurmese national Thet Min Nyi is charged with wire fraud and money-laundering conspiracy as an alleged manager and recruiter for the Ko Thet Company.\u003c/li\u003e\n\u003cli\u003eIndonesian nationals Wiliang Awang, Andreas Chandra, and Lisa Mariam face wire fraud conspiracy charges connected to the Sanduo Group and Giant Company.\nDubai Police successfully apprehended Thet Min Nyi, Chandra, and Mariam. Thailand\u0026rsquo;s Royal Thai Police arrested Awang. Two additional co-conspirators remain fugitives.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"law-enforcement-response-strategic-shifts\"\u003eLaw Enforcement Response \u0026amp; Strategic Shifts\u003c/h3\u003e\n\n\u003cp\u003eU.S. officials highlighted the international nature of the crackdown. U.S. Attorney Adam Gordon stated that global crime now faces global justice. He emphasized that organizers and fraudsters defrauding Americans will face courts both domestically and internationally. Assistant Attorney General A. Tysen Duva noted that fraud is borderless, and law enforcement activity to combat it is equally borderless. Investigators relied heavily on complaints filed with the FBI\u0026rsquo;s Internet Crime Complaint Center to identify victims across the United States. This data revealed losses totaling millions of dollars from cryptocurrency investment schemes.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-related-actions\"\u003eIndustry Context \u0026amp; Related Actions\u003c/h3\u003e\n\n\u003cp\u003eThe FBI\u0026rsquo;s 2025 Internet Crime Report provides broader context on the threat landscape. Investment fraud accounted for 49 percent of all scam-related incidents recorded last year. These incidents resulted in \u003cspan class=\"math inline\"\u003e\\(8.6 billion in reported losses, marking a significant increase from the \\)\u003c/span\u003e6.5 billion reported in 2024. In response to this trend, U.S. federal authorities established the Scam Center Strike Force in November. This new task force aims to disrupt cryptocurrency scam networks. The initiative follows the Department of Justice\u0026rsquo;s seizure of \u003cspan class=\"math inline\"\u003e\\(15 billion from the leader of the Prince Group criminal organization. Concurrently, European authorities dismantled a separate crypto investment fraud ring. That operation caused estimated losses exceeding €50 million, or \\)\u003c/span\u003e58.5 million, to victims worldwide.\u003c/p\u003e\n","keyPoints":["A joint international operation involving U.S., Chinese, and UAE authorities arrested 276 suspects and shut down nine cryptocurrency investment fraud centers.","The operation targeted pig-butchering schemes where scammers use fabricated relationships to lure victims into fake cryptocurrency platforms that drain their funds.","U.S. federal authorities established the Scam Center Strike Force to disrupt cryptocurrency scam networks after seizing $15 billion from a major criminal organization.","FBI data shows that investment fraud accounted for 49% of all scam incidents in 2025, resulting in $8.6 billion in reported losses."],"insights":["Investigators used aggregated complaints from the FBI's IC3 to identify victims and drive the international takedown, demonstrating how centralized reporting databases enable cross-border operations.","Scammers actively encourage victims to borrow from family and take out loans to reinvest, escalating financial harm beyond the initial fraud amount.","The creation of a dedicated federal Scam Center Strike Force follows a $15 billion crypto asset seizure, indicating a structural shift toward sustained, specialized enforcement against crypto networks.","Investment fraud now accounts for 49% of all reported scam incidents and saw financial losses rise from $6.5 billion to $8.6 billion year-over-year, establishing it as the dominant and growing threat vector."],"referencedReports":[],"body":"\u003cp\u003eA joint international operation led by Dubai Police and involving U.S. and Chinese authorities successfully arrested 276 suspects and dismantled nine cryptocurrency fraud centers. The crackdown targeted pig-butchering schemes, where scammers build fake romantic relationships to lure victims into fraudulent investment platforms. Once funds are transferred, victims immediately lose control of their money while scammers encourage them to take out loans and borrow from family to invest more.\u003c/p\u003e\n\n\u003cp\u003eU.S. federal investigators utilized complaints from the FBI\u0026rsquo;s Internet Crime Complaint Center to identify victims and track losses totaling millions of dollars. This coordinated effort underscores the growing international focus on combating borderless cryptocurrency fraud networks.\u003c/p\u003e\n"},{"n":5,"title":"New Python Backdoor Uses Tunneling Service to Steal Browser and Cloud Credentials","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/new-python-backdoor-uses-tunneling.html","time":"12:36","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Researchers have uncovered DEEP#DOOR, a stealthy Python-based backdoor that leverages a public tunneling service for command-and-control, evades detection through extensive defense evasion techniques, and steals sensitive browser and cloud credentials while maintaining persistent access.","briefOverview":"\u003cp\u003eCybersecurity researchers from Securonix have disclosed details of DEEP#DOOR, a stealthy Python-based backdoor framework. The intrusion chain begins with traditional phishing approaches that distribute a batch script named install_obf.bat. This script disables Windows security controls, dynamically extracts an embedded Python payload called svc.py, and establishes persistence through startup scripts, registry Run keys, scheduled tasks, and optional WMI subscriptions. The malware also implements a watchdog mechanism that automatically recreates these persistence artifacts if they are removed.\u003c/p\u003e\n\n\u003cp\u003eCommand-and-control communication relies on the public TCP tunneling service bore.pub, which eliminates dedicated infrastructure needs and blends malicious traffic. The implant functions as a comprehensive remote access trojan capable of executing reverse shells, capturing screenshots, recording audio, and harvesting credentials from web browsers and major cloud platforms. To avoid detection, DEEP#DOOR employs extensive defense evasion techniques such as sandbox detection, AMSI and ETW patching, NTDLL unhooking, and automatic log clearing. This fileless, script-driven approach significantly reduces external dependencies and minimizes the forensic footprint left on compromised hosts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers at Securonix have detailed DEEP#DOOR, a Python-based backdoor framework that combines persistent access with extensive credential harvesting capabilities. The initial infection vector involves a phishing campaign delivering a batch script named install_obf.bat. This script disables Windows security controls, dynamically extracts an embedded Python payload called svc.py, and establishes persistence through startup folder scripts, registry Run keys, scheduled tasks, and optional WMI subscriptions. The malware also implements a watchdog mechanism that monitors these persistence artifacts and automatically recreates them if they are deleted.\u003c/p\u003e\n\n\u003cp\u003eCommand-and-control communication is routed through bore.pub, a Rust-based public TCP tunneling service that removes the need for dedicated infrastructure and helps blend malicious traffic with legitimate network activity. Once active, the implant operates as a comprehensive remote access trojan capable of issuing reverse shells and conducting system reconnaissance. Surveillance capabilities include keylogging, clipboard monitoring, screenshot capture, webcam access, and ambient audio recording. The framework specifically targets sensitive credentials by extracting SSH keys, browser passwords from Google Chrome and Mozilla Firefox, Windows Credential Manager entries, and cloud credentials from Amazon Web Services, Google Cloud, and Microsoft Azure.\u003c/p\u003e\n\n\u003cp\u003eDEEP#DOOR prioritizes evasion by incorporating multiple defense bypass techniques, including sandbox, debugger, and virtual machine detection. It also patches AMSI and Event Tracing for Windows, unhooks NTDLL, tampers with Microsoft Defender, bypasses SmartScreen, suppresses PowerShell logging, wipes command lines, stomps timestamps, and clears system logs. By embedding the core payload directly within the dropper and extracting it at runtime, the malware minimizes external dependencies and reduces traditional detection opportunities. This fileless, script-driven architecture represents a continued evolution in threat actor tactics that rely heavily on native system components and interpreted languages to maintain long-term espionage and lateral movement.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview and Distribution\u003c/strong\u003e\nCybersecurity researchers from Securonix have disclosed details of DEEP#DOOR, a stealthy Python-based backdoor framework. The intrusion chain begins with traditional phishing approaches that distribute a batch script named install_obf.bat. This script is responsible for disabling Windows security controls and dynamically extracting an embedded Python payload called svc.py. The malware reconstructs and executes this payload directly from the dropper, which reduces the need to reach external infrastructure and minimizes the forensic footprint.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePersistence and Watchdog Mechanisms\u003c/strong\u003e\nDEEP#DOOR establishes persistent access through multiple Windows mechanisms. These include creating scripts in the Startup folder, adding entries to Registry Run keys, scheduling tasks, and optionally configuring WMI subscriptions. The framework also implements a watchdog mechanism that continuously monitors these persistence artifacts. If any of these artifacts are removed by the victim or security tools, the watchdog automatically recreates them, making remediation significantly more challenging.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCommand and Control Infrastructure\u003c/strong\u003e\nThe implant communicates with a command-and-control server using bore.pub, a Rust-based public TCP tunneling service. This architectural choice offers several operational advantages for the threat actor. It eliminates the requirement to set up and maintain dedicated C2 infrastructure. It also blends malicious network traffic with legitimate traffic and avoids embedding server details directly within the payload.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eSurveillance and Credential Harvesting Capabilities\u003c/strong\u003e\nOnce established, DEEP#DOOR functions as a fully featured remote access trojan. Operators can issue commands to execute reverse shells and conduct extensive system reconnaissance. The malware supports continuous surveillance through the following capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReverse shell execution\u003c/li\u003e\n\u003cli\u003eSystem reconnaissance\u003c/li\u003e\n\u003cli\u003eKeylogging and clipboard monitoring\u003c/li\u003e\n\u003cli\u003eScreenshot capture, webcam access, and ambient audio recording\u003c/li\u003e\n\u003cli\u003eCredential harvesting from SSH keys, Google Chrome, Mozilla Firefox, and Windows Credential Manager\u003c/li\u003e\n\u003cli\u003eTheft of cloud credentials from Amazon Web Services, Google Cloud, and Microsoft Azure\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDefense Evasion and Detection Avoidance\u003c/strong\u003e\nDEEP#DOOR employs a wide array of anti-analysis and defense evasion techniques to avoid detection. These mechanisms include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSandbox, debugger, and virtual machine detection\u003c/li\u003e\n\u003cli\u003ePatching of AMSI and Event Tracing for Windows\u003c/li\u003e\n\u003cli\u003eNTDLL unhooking and Microsoft Defender tampering\u003c/li\u003e\n\u003cli\u003eSmartScreen bypass and PowerShell logging suppression\u003c/li\u003e\n\u003cli\u003eCommand-line wiping, timestamp stomping, and automatic log clearing\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eStrategic Significance\u003c/strong\u003e\nThe Securonix report highlights how DEEP#DOOR exemplifies the continued evolution of fileless, script-driven intrusion frameworks. By relying heavily on native system components and interpreted languages like Python, threat actors are shifting away from traditional executable payloads. Embedding the payload directly within the dropper and extracting it at runtime significantly reduces external dependencies. This approach limits traditional detection opportunities while enabling long-term persistence, espionage, and post-exploitation operations within compromised environments.\u003c/p\u003e\n","keyPoints":["DEEP#DOOR is a Python-based backdoor distributed via phishing that uses a batch script to extract an embedded payload and establish persistence through registry keys, scheduled tasks, and startup scripts.","The malware communicates with a command-and-control server using the public TCP tunneling service bore.pub to eliminate the need for dedicated infrastructure and blend malicious traffic.","DEEP#DOOR employs extensive defense evasion techniques, including sandbox detection, AMSI and ETW patching, NTDLL unhooking, and automatic log clearing to avoid detection.","The implant harvests sensitive data including browser credentials, SSH keys, and cloud credentials from AWS, Google Cloud, and Microsoft Azure."],"insights":["DEEP#DOOR leverages the public TCP tunneling service bore.pub for command-and-control, eliminating the need for dedicated infrastructure and blending malicious traffic.","The malware employs a watchdog mechanism that automatically recreates persistence artifacts if they are removed, complicating remediation efforts.","DEEP#DOOR actively tampers with Windows security by patching AMSI and ETW, unhooking NTDLL, and suppressing PowerShell logging to evade detection.","The Python payload is embedded directly within the dropper script and extracted at runtime, reducing external dependencies and minimizing the forensic footprint."],"referencedReports":[{"title":"DEEP#DOOR Python Backdoor and Credential Stealer","url":"https://www.securonix.com/blog/deepdoor-python-backdoor-and-credential-stealer/","publisher":"Securonix","context":"The article cites this link as the source report where Securonix researchers detail the DEEP#DOOR intrusion chain, payload extraction methods, and capabilities."}],"body":"\u003cp\u003eCybersecurity researchers from Securonix have disclosed details of DEEP#DOOR, a stealthy Python-based backdoor framework. The intrusion chain begins with traditional phishing approaches that distribute a batch script named install_obf.bat. This script disables Windows security controls, dynamically extracts an embedded Python payload called svc.py, and establishes persistence through startup scripts, registry Run keys, scheduled tasks, and optional WMI subscriptions. The malware also implements a watchdog mechanism that automatically recreates these persistence artifacts if they are removed.\u003c/p\u003e\n\n\u003cp\u003eCommand-and-control communication relies on the public TCP tunneling service bore.pub, which eliminates dedicated infrastructure needs and blends malicious traffic. The implant functions as a comprehensive remote access trojan capable of executing reverse shells, capturing screenshots, recording audio, and harvesting credentials from web browsers and major cloud platforms. To avoid detection, DEEP#DOOR employs extensive defense evasion techniques such as sandbox detection, AMSI and ETW patching, NTDLL unhooking, and automatic log clearing. This fileless, script-driven approach significantly reduces external dependencies and minimizes the forensic footprint left on compromised hosts.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;

const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",

    }} />

}

  );
}

function htmlPanel(value) {

}

function pointList(items) {
  return (
    <ul className="kp-list">

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
