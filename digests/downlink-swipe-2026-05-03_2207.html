<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .swipe-card.snap-back { transition: transform 0.32s cubic-bezier(.2,.9,.2,1); }
  .swipe-card.fly-out  { transition: transform 0.4s cubic-bezier(.4,.0,.6,1), opacity 0.4s; }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0; transition: opacity 0.1s;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--discard); color: var(--discard); }
  .pill-btn.read:hover { border-color: var(--accept);  color: var(--accept); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;

  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;

  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":2,"title":"CISA Adds Actively Exploited Linux Root Access Bug CVE-2026-31431 to KEV","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cisa-adds-actively-exploited-linux-root.html","time":"06:26","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"CISA added the actively exploited Linux kernel privilege escalation flaw CVE-2026-31431 to its KEV catalog, urging organizations to immediately patch vulnerable systems or disable the affected cryptographic template to prevent unprivileged users from gaining root access.","briefOverview":"\u003cp\u003eCISA has added the Linux kernel privilege escalation flaw CVE-2026-31431, also known as Copy Fail, to its Known Exploited Vulnerabilities catalog due to evidence of active exploitation in the wild. This nine-year-old vulnerability allows unprivileged local users to gain root access by corrupting the kernel\u0026rsquo;s in-memory page cache of readable files. The flaw was introduced through harmless kernel changes made between 2011 and 2017 and impacts distributions shipped since 2017. A simple 732-byte Python exploit can reliably trigger the escalation without requiring complex techniques like race conditions. Because the attack modifies binaries at execution time using only legitimate system calls, detection is particularly difficult. Organizations are strongly advised to apply kernel updates or disable the affected cryptographic template to mitigate the risk.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency recently added CVE-2026-31431 to its Known Exploited Vulnerabilities catalog, citing active exploitation of a critical Linux kernel flaw. Tracked as Copy Fail, this local privilege escalation vulnerability carries a CVSS score of 7.8 and enables unprivileged users to obtain root-level access. The nine-year-old defect stems from a logic bug in the kernel\u0026rsquo;s authentication cryptographic template, originally introduced through three separate harmless changes in 2011, 2015, and 2017. Attackers can exploit the flaw using a straightforward 732-byte Python script to corrupt the in-memory page cache of any readable file, including setuid binaries. This corruption effectively alters executables at runtime without modifying files on disk, granting full root privileges. The vulnerability impacts Linux distributions released since 2017 and poses a severe threat to containerized environments like Docker, LXC, and Kubernetes. These platforms default to granting container processes access to the AF_ALG subsystem, which the exploit leverages to breach isolation and control the host machine. Detection remains challenging because the malicious activity relies exclusively on legitimate system calls that mimic normal application behavior. A fully working proof-of-concept is publicly available, and researchers have already identified Go and Rust adaptations in open-source repositories. Microsoft Defender researchers have observed preliminary testing activity indicating increased threat actor interest. Federal agencies are directed to apply kernel patches by May 15, 2026, or alternatively disable the affected feature and enforce strict network isolation if immediate patching is not feasible.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview-and-classification\"\u003eVulnerability Overview and Classification\u003c/h3\u003e\n\n\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has officially added CVE-2026-31431, commonly referred to as Copy Fail, to its Known Exploited Vulnerabilities (KEV) catalog. This designation follows confirmed evidence of active exploitation in the wild. The vulnerability is classified as a local privilege escalation (LPE) flaw with a CVSS score of 7.8. It allows an unprivileged local user to bypass standard security controls and obtain root-level access. The defect is nine years old and was introduced through three individually harmless modifications to the Linux kernel in 2011, 2015, and 2017.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism-and-exploitation\"\u003eTechnical Mechanism and Exploitation\u003c/h3\u003e\n\n\u003cp\u003eCopy Fail originates from a logic bug within the Linux kernel\u0026rsquo;s authentication cryptographic template. Exploit developers can reliably trigger privilege escalation using a compact 732-byte Python script. The attack functions by corrupting the kernel\u0026rsquo;s in-memory page cache of any readable file, which includes setuid binaries. This process effectively alters executables at execution time without ever touching the disk. Because the corruption occurs in memory, attackers can inject code into privileged binaries like \u003ccode\u003e/usr/bin/su\u003c/code\u003e to gain root privileges. The vulnerability impacts Linux distributions that have been shipped since 2017.\u003c/p\u003e\n\n\u003ch3 id=\"impact-on-containerized-environments\"\u003eImpact on Containerized Environments\u003c/h3\u003e\n\n\u003cp\u003eThe widespread adoption of Linux in cloud infrastructure significantly amplifies the risk posed by this flaw. Security researchers at Kaspersky and Google-owned Wiz have highlighted that containerized environments face a heightened threat. Docker, LXC, and Kubernetes automatically grant processes inside a container access to the AF_ALG subsystem by default. This default configuration allows the Copy Fail exploit to breach container isolation and seize control over the physical host machine. The attack does not require advanced techniques such as memory address guessing or race conditions, substantially lowering the barrier to entry for attackers.\u003c/p\u003e\n\n\u003ch3 id=\"detection-challenges-and-proof-of-concept-availability\"\u003eDetection Challenges and Proof-of-Concept Availability\u003c/h3\u003e\n\n\u003cp\u003eIdentifying this attack presents a significant challenge for security teams. The exploit relies exclusively on legitimate system calls, making it nearly indistinguishable from normal application behavior. A fully working proof-of-concept (PoC) is already available to the public. Researchers have also detected Go and Rust versions of the original Python implementation circulating in open-source repositories. Microsoft Defender Security Research Team has reported preliminary testing activity, suggesting that threat actors are likely to increase exploitation efforts in the coming days.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-recommendations\"\u003eMitigation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eThe attack vector is strictly local and requires only low privileges without any user interaction. Although it cannot be exploited remotely in isolation, it becomes highly impactful when chained with initial access vectors like SSH compromise, malicious CI job execution, or existing container footholds. CISA has advised Federal Civilian Executive Branch (FCEB) agencies to apply kernel updates by May 15, 2026. If patching cannot be implemented immediately, organizations are recommended to implement the following controls:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisable the affected cryptographic feature\u003c/li\u003e\n\u003cli\u003eEnforce network isolation\u003c/li\u003e\n\u003cli\u003eApply strict access controls\nThese measures provide a temporary defense until kernel patches in versions 6.18.22, 6.19.12, and 7.0 can be deployed.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CISA added the Linux kernel privilege escalation vulnerability CVE-2026-31431, also known as Copy Fail, to its Known Exploited Vulnerabilities catalog due to evidence of active exploitation.","The flaw permits unprivileged local users to gain root access by corrupting the kernel's in-memory page cache of readable files, creating a serious risk for containerized environments such as Docker and Kubernetes.","A fully working proof-of-concept exploit is available, prompting CISA to advise federal agencies to apply kernel updates by May 15, 2026, or disable the affected cryptographic template if patching is not immediately possible."],"insights":["The exploit corrupts the kernel's in-memory page cache to alter binaries at execution time without touching disk, bypassing file-level change detection.","Containerized environments face elevated risk by default because Docker, LXC, and Kubernetes automatically grant processes access to the AF_ALG subsystem, which the flaw leverages to breach isolation.","Detection is inherently difficult because the attack relies exclusively on legitimate system calls, allowing it to blend seamlessly with normal application behavior.","While not remotely exploitable in isolation, the vulnerability becomes highly dangerous when chained with initial access vectors like SSH compromise, malicious CI/CD jobs, or existing container footholds."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references this official advisory as the notification adding CVE-2026-31431 to the KEV catalog due to evidence of active exploitation."},{"title":"Security Advisory 2026-005","url":"https://cert.europa.eu/publications/security-advisories/2026-005/","publisher":"CERT-EU","context":"The article cites this technical write-up as the source detailing the logic bug in the Linux kernel's authentication cryptographic template that enables the Copy Fail vulnerability."},{"title":"CVE-2026-31431 Copy Fail Vulnerability Enables Linux Root Privilege Escalation","url":"https://www.microsoft.com/en-us/security/blog/2026/05/01/cve-2026-31431-copy-fail-vulnerability-enables-linux-root-privilege-escalation/","publisher":"Microsoft Defender Security Research Team","context":"The article references this security research report to detail preliminary threat actor testing activity and outline a specific exploitation pathway involving local privilege escalation."},{"title":"CopyFail Root Linux","url":"https://securelist.com/tr/copyfail-root-linux/119634/","publisher":"Kaspersky","context":"The article cites this technical analysis to explain how the flaw breaches container isolation by default and poses a serious risk to Docker, LXC, and Kubernetes environments."}],"body":"\u003cp\u003eCISA has added the Linux kernel privilege escalation flaw CVE-2026-31431, also known as Copy Fail, to its Known Exploited Vulnerabilities catalog due to evidence of active exploitation in the wild. This nine-year-old vulnerability allows unprivileged local users to gain root access by corrupting the kernel\u0026rsquo;s in-memory page cache of readable files. The flaw was introduced through harmless kernel changes made between 2011 and 2017 and impacts distributions shipped since 2017. A simple 732-byte Python exploit can reliably trigger the escalation without requiring complex techniques like race conditions. Because the attack modifies binaries at execution time using only legitimate system calls, detection is particularly difficult. Organizations are strongly advised to apply kernel updates or disable the affected cryptographic template to mitigate the risk.\u003c/p\u003e\n"},{"n":1,"title":"Telegram Mini Apps abused for crypto scams, Android malware delivery","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/telegram-mini-apps-abused-for-crypto-scams-android-malware-delivery/","time":"14:11","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Cybercriminals are abusing Telegram's Mini App feature to seamlessly host phishing sites, crypto scams, and Android malware directly within the messaging platform, bypassing traditional security boundaries and making it hard for users to spot malicious services.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified a large-scale fraud operation called FEMITBOT that exploits Telegram’s Mini App feature to distribute cryptocurrency scams and Android malware. The platform uses lightweight web applications embedded directly within Telegram’s built-in browser to create convincing, app-like experiences without requiring users to leave the messaging platform. Threat actors leverage this infrastructure to impersonate major brands such as Apple, NVIDIA, and Disney, displaying fake financial dashboards with fabricated balances and urgency-driven countdown timers. When victims attempt to withdraw funds, they are consistently redirected to deposit money or complete referral tasks, a hallmark of advance-fee scams. The operation also distributes malicious Android APK files disguised as legitimate software, carefully naming them to avoid suspicion while hosting them on the same domain as the scam API to maintain valid TLS certificates. Additionally, the campaigns embed Meta and TikTok tracking pixels to monitor user behavior and optimize conversion rates. Researchers emphasize that users should avoid interacting with Telegram bots promoting crypto investments or requesting APK downloads.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA recent CTM360 report details the FEMITBOT platform, a large-scale fraud operation that abuses Telegram Mini Apps to conduct cryptocurrency scams, impersonate well-known brands, and deliver Android malware. Telegram Mini Apps are lightweight web applications that run inside Telegram’s built-in browser, allowing services to operate seamlessly without leaving the messaging platform. FEMITBOT utilizes this feature to launch phishing sites directly through Telegram bots, where clicking \u0026ldquo;Start\u0026rdquo; triggers a Mini App that loads a malicious page within the app\u0026rsquo;s WebView. The infrastructure relies on a shared backend, evidenced by a consistent API response string across multiple phishing domains. Attackers frequently impersonate recognizable companies like Apple, Coca-Cola, Disney, eBay, IBM, Moon Pay, NVIDIA, and YouKu to build credibility. Once inside the fake application, users encounter dashboards showing fabricated balances or earnings, often accompanied by countdown timers or limited-time offers to induce urgency. When victims try to withdraw their supposed funds, they are prompted to make deposits or complete referral tasks, mirroring common investment and advance-fee scam tactics. The platform is engineered for rapid campaign rotation, allowing threat actors to easily swap branding, languages, and themes while maintaining the same underlying infrastructure. The campaigns also integrate tracking scripts from Meta and TikTok to monitor user activity, measure conversions, and optimize performance. In addition to financial fraud, some Mini Apps attempt to distribute Android malware disguised as legitimate applications from brands like the BBC, CineTV, Coreweave, and Claro. These malicious APKs are hosted on the same domain as the scam API to ensure TLS certificate validity and prevent mixed-content browser warnings. The article advises users to remain cautious when interacting with Telegram bots that promote crypto investments or request Mini App launches, particularly when asked to deposit funds or download applications. Android users are specifically warned to avoid sideloading APK files, as this method is frequently used to bypass Google Play Store security and distribute malware outside of official channels.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-femitbot-platform\"\u003eOverview of the FEMITBOT Platform\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have uncovered a large-scale fraud operation dubbed FEMITBOT that leverages Telegram’s Mini App feature to conduct cryptocurrency scams, impersonate prominent brands, and distribute Android malware. The platform is named after a specific string found in its API responses and operates by embedding lightweight web applications directly within Telegram’s messaging environment.\u003c/p\u003e\n\n\u003ch2 id=\"operational-mechanics-infrastructure\"\u003eOperational Mechanics \u0026amp; Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eTelegram Mini Apps are designed to run inside Telegram’s built-in browser, enabling interactive tools, payments, and account access without requiring users to exit the application. FEMITBOT utilizes this capability by deploying Telegram bots that launch phishing pages directly within the platform. When a user interacts with a bot and selects \u0026ldquo;Start,\u0026rdquo; the bot triggers a Mini App that renders a phishing site inside Telegram’s WebView, creating the illusion of a legitimate integrated application. The entire operation relies on a shared backend infrastructure, which researchers identified through a consistent API response message across multiple phishing domains. This centralized architecture allows threat actors to rapidly rotate campaigns, easily switching branding, languages, and themes while maintaining a single underlying framework.\u003c/p\u003e\n\n\u003ch2 id=\"scam-tactics-user-interaction\"\u003eScam Tactics \u0026amp; User Interaction\u003c/h2\u003e\n\n\u003cp\u003eThe campaigns frequently impersonate widely recognized brands to enhance credibility and engagement. Documented impersonated entities include Apple, Coca-Cola, Disney, eBay, IBM, Moon Pay, NVIDIA, and YouKu. Once inside the fraudulent Mini App, victims are presented with dashboards displaying fake balances or fabricated earnings. These interfaces are often paired with countdown timers or limited-time offers to manufacture a sense of urgency. When users attempt to withdraw their displayed funds, they are consistently redirected to deposit additional money or complete referral tasks, aligning with standard advance-fee and investment scam methodologies.\u003c/p\u003e\n\n\u003ch2 id=\"malware-distribution-technical-evasion\"\u003eMalware Distribution \u0026amp; Technical Evasion\u003c/h2\u003e\n\n\u003cp\u003eBeyond financial fraud, the operation actively attempts to distribute Android malware disguised as legitimate software. Malicious APK files impersonate applications from brands such as the BBC, NVIDIA, CineTV, Coreweave, and Claro. The filenames are deliberately crafted to resemble legitimate applications or utilize random-looking strings to avoid immediate suspicion. To evade browser security warnings, these APK files are hosted on the exact same domain as the scam API, ensuring TLS certificate validity and preventing mixed-content alerts. Users are prompted to download these files, open links within the in-app browser, or install progressive web apps that mimic legitimate software.\u003c/p\u003e\n\n\u003ch2 id=\"tracking-optimization\"\u003eTracking \u0026amp; Optimization\u003c/h2\u003e\n\n\u003cp\u003eThe campaigns incorporate tracking scripts from Meta and TikTok to monitor user activity and measure conversion rates. This data collection allows the threat actors to optimize campaign performance and refine their fraudulent tactics based on real-time user behavior.\u003c/p\u003e\n\n\u003ch2 id=\"security-recommendations\"\u003eSecurity Recommendations\u003c/h2\u003e\n\n\u003cp\u003eResearchers advise users to exercise extreme caution when interacting with Telegram bots that promote cryptocurrency investments or prompt the launch of Mini Apps. Particular attention should be paid to requests asking users to deposit funds or download applications. Android users are specifically warned to avoid sideloading APK files, as this practice is commonly exploited to bypass Google Play Store security controls and distribute malware outside of official app channels.\u003c/p\u003e\n","keyPoints":["The FEMITBOT platform leverages Telegram Mini Apps to host cryptocurrency scams and impersonate well-known brands such as Apple, NVIDIA, and Disney directly within the messaging application.","Threat actors utilize a shared backend infrastructure to deploy multiple phishing campaigns that display fake financial dashboards and prompt users to deposit funds or complete referral tasks.","Malicious Mini Apps run inside Telegram's built-in WebView to distribute Android malware disguised as legitimate applications, with APK files hosted on the same domain to avoid browser security warnings.","The operation employs tracking scripts from Meta and TikTok to monitor user activity, measure conversions, and optimize the effectiveness of the fraudulent campaigns."],"insights":["Threat actors embed Meta and TikTok tracking pixels directly into scam Mini Apps to track user activity and measure conversions, indicating a deliberate focus on optimizing campaign performance.","Malicious APKs are hosted on the exact same domain as the scam API to maintain valid TLS certificates and avoid mixed-content warnings, demonstrating a deliberate technique to bypass browser security alerts.","The underlying infrastructure is designed for rapid campaign rotation, allowing attackers to seamlessly switch branding, languages, and themes across different phishing sites while relying on a single shared backend."],"referencedReports":[{"title":"FEMITBOT Telegram Mini Apps Fraud Campaigns","url":"https://www.ctm360.com/reports/femitbot-telegram-mini-apps-fraud-campaigns","publisher":"CTM360","context":"The article cites this report to detail how the FEMITBOT platform leverages Telegram Mini Apps to conduct cryptocurrency scams, impersonate well-known brands, and distribute Android malware."}],"body":"\u003cp\u003eCybersecurity researchers have identified a large-scale fraud operation called FEMITBOT that exploits Telegram’s Mini App feature to distribute cryptocurrency scams and Android malware. The platform uses lightweight web applications embedded directly within Telegram’s built-in browser to create convincing, app-like experiences without requiring users to leave the messaging platform. Threat actors leverage this infrastructure to impersonate major brands such as Apple, NVIDIA, and Disney, displaying fake financial dashboards with fabricated balances and urgency-driven countdown timers. When victims attempt to withdraw funds, they are consistently redirected to deposit money or complete referral tasks, a hallmark of advance-fee scams. The operation also distributes malicious Android APK files disguised as legitimate software, carefully naming them to avoid suspicion while hosting them on the same domain as the scam API to maintain valid TLS certificates. Additionally, the campaigns embed Meta and TikTok tracking pixels to monitor user behavior and optimize conversion rates. Researchers emphasize that users should avoid interacting with Telegram bots promoting crypto investments or requesting APK downloads.\u003c/p\u003e\n"}];

}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, fontWeight: 600, letterSpacing: "0.1em", color: c,
      border: "1px solid color-mix(in oklch, " + c + " 40%, transparent)",
      background: "color-mix(in oklch, " + c + " 10%, transparent)",
      padding: "1px 5px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {group}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function SwipeCard({ article, isTop, depth, onSwipe }) {
  const [dx, setDx]             = React.useState(0);
  const [dy, setDy]             = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [flying, setFlying]     = React.useState(null);
  const [flipped, setFlipped]   = React.useState(false);
  const startRef = React.useRef({ x: 0, y: 0 });

  React.useEffect(() => {
    if (isTop && !flipped) {
      window.__downlinkFlipTop = () => setFlipped(true);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const onPointerDown = (e) => {
    if (!isTop || flipped || flying) return;
    setDragging(true);
    startRef.current = { x: e.clientX, y: e.clientY };
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging) return;
    setDx(e.clientX - startRef.current.x);
    setDy(e.clientY - startRef.current.y);
  };
  const onPointerUp = () => {
    if (!dragging) return;
    setDragging(false);
    const threshold = 110;
    if (dx > threshold) {
      setFlying("right");
      setTimeout(() => { setFlipped(true); setDx(0); setDy(0); setFlying(null); }, 280);
    } else if (dx < -threshold) {
      setFlying("left");
      setTimeout(() => onSwipe("left"), 380);
    } else {
      setDx(0); setDy(0);
    }
  };

  let transform; let opacity = 1;
  if (flying === "left")       { transform = "translate(-140%, " + (dy * 1.5) + "px) rotate(-22deg)"; opacity = 0; }
  else if (flying === "right") { transform = "translate(60%, " + dy + "px) rotate(12deg) scale(0.95)"; }
  else if (dragging)           { transform = "translate(" + dx + "px, " + (dy * 0.4) + "px) rotate(" + (dx * 0.05) + "deg)"; }
  else if (depth > 0)          { transform = "translateY(" + (depth * 8) + "px) scale(" + (1 - depth * 0.04) + ")"; }
  else                         { transform = "translate(0, 0) rotate(0)"; }

  const skipOpacity = !flipped && dx < 0 ? Math.min(1, -dx / 100) : 0;
  const readOpacity = !flipped && dx > 0 ? Math.min(1, dx / 100) : 0;
  const cardClass   = "swipe-card " + (dragging ? "dragging" : flying ? "fly-out" : "snap-back");

  return (
    <div className={cardClass}
      style={{ transform, opacity, zIndex: 100 - depth, cursor: isTop && !flipped ? "grab" : "default", pointerEvents: isTop ? "auto" : "none" }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      {!flipped && (
        <>
          <div className="stamp skip" style={{ opacity: skipOpacity }}>SKIP</div>
          <div className="stamp read" style={{ opacity: readOpacity }}>READ</div>
        </>
      )}
    </div>
  );
}

function App() {
  const [index, setIndex] = React.useState(0);
  const [tick, setTick]   = React.useState(0);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  { setIndex(i => i + 1); setTick(t => t + 1); }
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished]);

  const advance = () => { setIndex(i => i + 1); setTick(t => t + 1); };

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setTick(0); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + tick + "-" + realDepth}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onSwipe={(dir) => { if (dir === "left") advance(); }}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Skip (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--text3)", letterSpacing: "0.12em", textAlign: "center", lineHeight: 1.7 }}>
              <div>&#8592; SKIP · READ &#8594;</div>
              <div style={{ opacity: 0.6, marginTop: 2 }}>SWIPE OR CLICK</div>
            </div>
            <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="Read details (ArrowRight)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
