<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html[data-theme="contrast"] {

  html[data-theme="mono"] {
    --bg: #0c0c0c;

    --text2: #9a9a9a;

    --discard: #cfcfcf;
    --accept:  #cfcfcf;

  /* Colorblind theme: light base, colorblind-safe Okabe-Ito accents. Crucially
     discard/accept become vermillion/blue so the triage actions are no longer a
     red/green pair (the worst case for protan/deutan vision). */
  html[data-theme="colorblind"] {
    --bg: #efeeea;
    --surface: #fafaf8;
    --surface2: #e8e7e2;
    --border: #d3d2cc;
    --border2: #b8b7b0;
    --text: #0d0c0a;
    --text2: #273f4f;
    --text3: #5c6e78;
    --cyan:    #0072b2;  /* Okabe blue */
    --must:    #c44601;  /* vermillion */
    --should:  #8a6d00;  /* dark gold */
    --may:     #2f79a5;  /* teal-blue */
    --discard: #c44601;  /* vermillion (was red) */
    --accept:  #0072b2;  /* blue (was green) */
    --dot: rgba(0,0,0,.035);
  }
  /* Pastel theme: soft cream base (#FAF6E6), deepened mint/coral accents, deep plum text. */
  html[data-theme="pastel"] {
    --bg: #faf6e6;
    --surface: #fffdf4;
    --surface2: #f1ead2;

    --text: #3a3137;
    --text2: #6c5560;
    --text3: #9c8a86;
    --cyan:    #1f9d8f;  /* mint-teal primary */

    --discard: #d9534f;  /* coral-red */
    --accept:  #2f9e63;  /* green */

  }
  /* Per-theme source-color palette (--p0..--pN), generated server-side. */
  :root{--p0:#f87171;--p1:#fb923c;--p2:#4ade80;--p3:#2dd4bf;--p4:#60a5fa;--p5:#c084fc;--p6:#f472b6;--p7:#a78bfa;--p8:#34d399;--p9:#38bdf8;--p10:#e879f9;}html[data-theme="light"]{--p0:#ef4444;--p1:#f97316;--p2:#22c55e;--p3:#14b8a6;--p4:#3b82f6;--p5:#a855f7;--p6:#ec4899;--p7:#8b5cf6;--p8:#10b981;--p9:#0ea5e9;--p10:#d946ef;}html[data-theme="colorblind"]{--p0:#0071b0;--p1:#be4401;--p2:#0d7b4a;--p3:#8f4acc;--p4:#856900;--p5:#1972a7;--p6:#c42787;--p7:#007a6d;--p8:#1a72a1;--p9:#aa5400;--p10:#517082;}html[data-theme="mono"]{--p0:#7a7a7a;--p1:#868686;--p2:#929292;--p3:#9e9e9e;--p4:#aaaaaa;--p5:#b6b6b6;--p6:#c2c2c2;--p7:#cecece;--p8:#dadada;--p9:#e6e6e6;--p10:#f0f0f0;}html[data-theme="pastel"]{--p0:#e0655c;--p1:#e08a2e;--p2:#2f9e63;--p3:#1f9d8f;--p4:#4a90d9;--p5:#8c6dd0;--p6:#de6b94;--p7:#a05fc0;--p8:#2faa8e;--p9:#3f8fd0;--p10:#c267c0;}

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }

  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

<script>
window.__DL_ARTICLES = [{"n":4,"title":"CISA: Splunk Enterprise flaw actively exploited, patch by Sunday","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-splunk-enterprise-flaw-actively-exploited-patch-by-sunday/","time":"10:39","priority":"MUST READ","score":96,"tldr":"CISA says a critical Splunk Enterprise flaw, CVE-2026-20253, is being actively exploited and has ordered U.S. federal agencies to patch by Sunday. The bug lets unauthenticated remote attackers create or truncate arbitrary files and may enable remote code execution, with disabling the PostgreSQL sidecar service offered as a temporary mitigation.","briefOverview":"\u003cp\u003eCISA has urged federal agencies to secure their systems by Sunday against CVE-2026-20253, a critical Splunk Enterprise vulnerability that is being exploited in attacks. The flaw affects Splunk Enterprise versions 10.2.0 to 10.2.3 and 10.0.0 to 10.0.6. CISA added the vulnerability to its Known Exploited Vulnerabilities catalog and ordered Federal Civilian Executive Branch agencies to patch under Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eSplunk said the issue exists because a PostgreSQL sidecar service endpoint lacks authentication controls. This allows any network-reachable user to invoke file operations without credentials, enabling unauthenticated remote attackers to create or truncate arbitrary files on vulnerable devices. WatchTowr published a technical write-up and proof-of-concept exploit code on June 12 and warned that the flaw can be abused for remote code execution attacks.\u003c/p\u003e\n\n\u003cp\u003eSplunk updated its advisory on June 18 after its Product Security Incident Response Team became aware of limited exploitation of the vulnerability. Shadowserver tracks more than 1,400 Internet-exposed Splunk instances, mostly in North America and Europe, though the article says it is unknown how many are vulnerable. Splunk advised administrators who cannot immediately patch to disable the PostgreSQL sidecar service, while warning that doing so would break Edge Processor, OpAmp, or SPL2 data pipelines on affected instances.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA confirmed that CVE-2026-20253 in Splunk Enterprise is being actively exploited and ordered Federal Civilian Executive Branch agencies to patch affected systems by Sunday.","CVE-2026-20253 affects Splunk Enterprise versions 10.2.0 to 10.2.3 and 10.0.0 to 10.0.6, allowing unauthenticated remote attackers to create or truncate arbitrary files through a PostgreSQL sidecar service endpoint.","Splunk said the vulnerability exists because the PostgreSQL sidecar service endpoint lacks authentication controls, allowing any network-reachable user to invoke file operations without credentials.","WatchTowr published a technical write-up and proof-of-concept exploit code on June 12 and warned that the flaw can be abused for remote code execution attacks.","Splunk advised customers who cannot immediately patch to disable the PostgreSQL sidecar service, but warned this would break Edge Processor, OpAmp, or SPL2 data pipelines on affected instances."],"insights":["The emergency deadline reflects CISA’s new BOD 26-04 risk-based patching approach, which can require federal agencies to remediate exploited flaws within days rather than on a standard patch cycle.","Public proof-of-concept exploit code was released before Splunk updated its advisory to confirm limited in-the-wild exploitation, making rapid patching more urgent for exposed systems.","The temporary mitigation is not operationally neutral: disabling the PostgreSQL sidecar service removes the attack surface but breaks Edge Processor, OpAmp, or SPL2 data pipelines on affected instances.","Shadowserver counts more than 1,400 Internet-exposed Splunk instances, but the article notes there is no information on how many are actually vulnerable, so asset version checks are necessary rather than relying on exposure counts alone."],"referencedReports":[{"title":"Splunk Security Advisory SVD-2026-0603","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article cites Splunk's advisory explaining that CVE-2026-20253 affects Splunk Enterprise and stems from missing authentication controls on the PostgreSQL sidecar service endpoint.","category":"","primary":false},{"title":"Why Use App-Level Auth When Every Database Has Auth? Splunk Enterprise CVE-2026-20253 Pre-Auth RCE","url":"https://labs.watchtowr.com/why-use-app-level-auth-when-every-database-has-auth-splunk-enterprise-cve-2026-20253-pre-auth-rce/","publisher":"WatchTowr","context":"The article references WatchTowr's technical write-up and proof-of-concept exploit code warning that the flaw can be abused for remote code execution.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/18/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert confirming that CVE-2026-20253 is being actively exploited in attacks.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog entry for CVE-2026-20253","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-20253","publisher":"CISA","context":"The article references CISA's catalog entry ordering Federal Civilian Executive Branch agencies to patch Splunk instances by Sunday.","category":"","primary":false}],"body":"\u003cp\u003eCISA has urged federal agencies to secure their systems by Sunday against CVE-2026-20253, a critical Splunk Enterprise vulnerability that is being exploited in attacks. The flaw affects Splunk Enterprise versions 10.2.0 to 10.2.3 and 10.0.0 to 10.0.6. CISA added the vulnerability to its Known Exploited Vulnerabilities catalog and ordered Federal Civilian Executive Branch agencies to patch under Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eSplunk said the issue exists because a PostgreSQL sidecar service endpoint lacks authentication controls. This allows any network-reachable user to invoke file operations without credentials, enabling unauthenticated remote attackers to create or truncate arbitrary files on vulnerable devices. WatchTowr published a technical write-up and proof-of-concept exploit code on June 12 and warned that the flaw can be abused for remote code execution attacks.\u003c/p\u003e\n\n\u003cp\u003eSplunk updated its advisory on June 18 after its Product Security Incident Response Team became aware of limited exploitation of the vulnerability. Shadowserver tracks more than 1,400 Internet-exposed Splunk instances, mostly in North America and Europe, though the article says it is unknown how many are vulnerable. Splunk advised administrators who cannot immediately patch to disable the PostgreSQL sidecar service, while warning that doing so would break Edge Processor, OpAmp, or SPL2 data pipelines on affected instances.\u003c/p\u003e\n"},{"n":14,"title":"CISA Warns Fortinet Customers as FortiBleed Hits 86,644 FortiGate Devices","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-warns-fortinet-customers-as.html","time":"14:00","priority":"MUST READ","score":95,"tldr":"CISA is urging Fortinet customers to urgently secure FortiGate devices after the FortiBleed campaign reportedly compromised valid credentials for 86,644 internet-facing firewalls and VPN gateways. Organizations should reset Fortinet admin and VPN passwords, terminate active sessions, enforce PBKDF2 password hashing and phishing-resistant MFA, and review logs for suspicious activity.","briefOverview":"\u003cp\u003eCISA urged Fortinet customers with FortiGate appliances to harden their devices against ongoing malicious activity targeting thousands of internet-accessible systems. The campaign, codenamed FortiBleed and believed to be the work of Russian-speaking threat actors, had compromised 86,644 devices as of June 19, 2026. The activity focuses on Fortinet remote login endpoints and involves valid credentials for firewalls and VPN gateways.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said generic admin accounts and built-in Fortinet system accounts together made up most compromised credentials, while organization-specific accounts accounted for 36.7%. The top impacted sectors were telecom, government, and education, with the most exposures located in India, the U.S., Mexico, Colombia, and Thailand. The U.K. NCSC described the campaign as global and said it used brute-force, dictionary attack, and credential stuffing methods.\u003c/p\u003e\n\n\u003cp\u003eThe article says the attacker mass-scanned for Fortinet remote login endpoints and used a bespoke tool to spray known username and password combinations. Once access was obtained, the attackers allegedly monitored network traffic through the devices to collect additional credentials and expand the campaign. CISA recommended resetting Fortinet VPN and administrative passwords, terminating active sessions, enforcing PBKDF2 credential storage, enabling phishing-resistant MFA, reviewing logs, and reducing exposed management surfaces.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA warned Fortinet customers with FortiGate appliances to take steps to secure devices against ongoing malicious activity aimed at thousands of internet-accessible systems. The campaign has been codenamed FortiBleed and was said to have affected 86,644 devices as of June 19, 2026. The article says the activity is believed to be the work of Russian-speaking threat actors.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar data showed that generic admin accounts accounted for 35% of compromised credentials and built-in Fortinet system accounts accounted for 28.3%. Organization-specific accounts made up the remaining 36.7%, which SOCRadar said was significant because it indicated the attackers were not only harvesting default credentials. The article links this distribution to failures to rename default accounts, rotate factory credentials, or change passwords after prior compromises.\u003c/p\u003e\n\n\u003cp\u003eThe top impacted sectors were telecom, government, and education. The most exposures were located in India, the U.S., Mexico, Colombia, and Thailand. Hudson Rock said the scale of the breach touched nearly every sector of the global economy and that the threat actors had built a verified database of working credentials for large enterprises.\u003c/p\u003e\n\n\u003cp\u003eThe attacker reportedly mass-scanned the internet for Fortinet remote login endpoints and used a bespoke tool to spray known login and password combinations against them. The article describes the campaign as fully automated and self-sustaining: attackers first try leaked Fortinet passwords against internet-facing devices, then passively monitor network traffic through compromised devices to collect more credentials. Those additional credentials are then used to compromise more appliances, and the attackers verify credentials before adding them to a database of confirmed working logins.\u003c/p\u003e\n\n\u003cp\u003eThe U.K. NCSC described FortiBleed as a global campaign targeting internet-facing Fortinet firewalls and VPN gateways using brute-force, dictionary attack, and credential stuffing. Arctic Wolf said Fortinet introduced PBKDF2-based password hashing for administrator credentials in FortiOS 7.2.11, 7.4.8, and 7.6.1, but existing administrator passwords remain stored as SHA-256 hashes until the corresponding administrator logs in after an upgrade. Fortinet said the data was likely a resharing of data from previous incidents as well as brute-forcing of credentials, and not related to any current incident or advisory.\u003c/p\u003e\n\n\u003cp\u003eCISA recommended terminating all active SSL VPN and administrative sessions and resetting all Fortinet VPN and administrative passwords, especially on internet-facing systems. It also urged organizations to enforce strong password policies, ensure PBKDF2 is used to store administrator credentials, remove weaker legacy hashes, review logs for suspicious actions, enable phishing-resistant MFA, and reduce exposed management access. The article says the incident first came to light after security researcher Volodymyr “Bob” Diachenko discovered a server containing a database of working login credentials for thousands of firewalls and VPN gateways across 194 countries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA urged Fortinet customers with FortiGate appliances to secure their devices against ongoing malicious activity targeting thousands of internet-accessible systems. The campaign has been codenamed FortiBleed and was reported to have compromised 86,644 devices as of June 19, 2026. The article says the activity is believed to be the work of Russian-speaking threat actors.\u003c/p\u003e\n\n\u003cp\u003eThe campaign centers on Fortinet remote login endpoints and the use of valid credentials for Fortinet firewalls and VPN gateways. The U.K. National Cyber Security Centre described FortiBleed as a global campaign targeting internet-facing Fortinet firewalls and VPN gateways. CISA issued mitigation guidance focused on password resets, session termination, stronger credential storage, log review, phishing-resistant MFA, and reduced exposure of management interfaces.\u003c/p\u003e\n\n\u003ch2 id=\"credential-exposure-and-account-types\"\u003eCredential Exposure and Account Types\u003c/h2\u003e\n\n\u003cp\u003eAccording to SOCRadar, generic admin accounts and built-in Fortinet system accounts represented the majority of compromised credentials. Generic admin accounts accounted for 35% of the compromised credentials, while built-in Fortinet system accounts accounted for 28.3%. Organization-specific accounts made up 36.7% of the remaining breached credentials.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said this distribution pointed to a widespread failure to rename default accounts or rotate factory credentials. It said this gave the attacker a reliable target list before brute force was needed. SOCRadar also noted that organization-specific accounts were significant because they showed the attacker had compromised accounts created by organizations themselves, possibly sourced from prior breaches where passwords were never changed.\u003c/p\u003e\n\n\u003ch2 id=\"affected-sectors-and-geography\"\u003eAffected Sectors and Geography\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies telecom, government, and education as the top three impacted sectors. The most exposures were located in India, the U.S., Mexico, Colombia, and Thailand. Hudson Rock said the scale of the breach touched nearly every sector of the global economy and that the threat actors had built a verified database of working credentials for some of the largest enterprises.\u003c/p\u003e\n\n\u003cp\u003eThe incident was described as affecting thousands of firewalls and VPN gateways across 194 countries. The article says the campaign first came to light after security researcher Volodymyr “Bob” Diachenko discovered a server containing a database of working login credentials for thousands of firewalls and VPN gateways. SOCRadar also said the server staged the attacker’s tools and automation scripts.\u003c/p\u003e\n\n\u003ch2 id=\"reported-attack-workflow\"\u003eReported Attack Workflow\u003c/h2\u003e\n\n\u003cp\u003eThe article says the threat actor mass-scanned the internet for Fortinet remote login endpoints. After identifying endpoints, the attacker used a bespoke tool to spray known login and password combinations against them. The goal was to break into exposed devices using credentials that were already known or leaked.\u003c/p\u003e\n\n\u003cp\u003eThe attack was described as fully automated and built around a self-sustaining, two-step approach:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe threat actor attempts a curated list of leaked Fortinet passwords against devices across the internet.\u003c/li\u003e\n\u003cli\u003eOnce access is obtained, the attacker passively monitors network traffic going through the devices to collect additional credentials, which are then used to compromise more appliances.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the credentials used in the campaign are legitimate and valid. It also says the attackers verify each credential before adding it to a database of confirmed, working logins.\u003c/p\u003e\n\n\u003ch2 id=\"techniques-described-by-ncsc\"\u003eTechniques Described by NCSC\u003c/h2\u003e\n\n\u003cp\u003eThe U.K. NCSC described FortiBleed as a global campaign targeting internet-facing Fortinet firewalls and VPN gateways. It said the methods included brute-force, dictionary attack, and credential stuffing. The article frames these methods as part of the broader effort to access Fortinet appliances through exposed login surfaces.\u003c/p\u003e\n\n\u003ch2 id=\"fortios-password-hashing-detail\"\u003eFortiOS Password Hashing Detail\u003c/h2\u003e\n\n\u003cp\u003eThe article says the threat actors may have exploited older credential hashing mechanisms and historical storage practices for credentials in FortiGate configuration files. Arctic Wolf said Fortinet introduced PBKDF2-based password hashing for administrator credentials in FortiOS 7.2.11, 7.4.8, and 7.6.1. This replaced a legacy SHA-256-based storage mechanism.\u003c/p\u003e\n\n\u003cp\u003eHowever, Arctic Wolf said that when organizations upgrade from earlier versions, existing administrator passwords remain stored as SHA-256 hashes until the corresponding administrator successfully logs in after the upgrade. As a result, many organizations may still be storing administrator credentials using older SHA-256 with Salt hashing mechanisms. CISA’s recommendations include ensuring PBKDF2 is used to store administrator credentials and removing weaker legacy hashes.\u003c/p\u003e\n\n\u003ch2 id=\"fortinet-statement\"\u003eFortinet Statement\u003c/h2\u003e\n\n\u003cp\u003eA Fortinet spokesperson told The Hacker News that the data involved is likely a resharing of data from previous incidents, as well as brute-forcing of credentials. Fortinet said it was not related to any current incident or advisory. The company urged organizations to follow best practices, including regularly rotating security credentials and enabling multi-factor authentication.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-recommendations\"\u003eCISA Recommendations\u003c/h2\u003e\n\n\u003cp\u003eCISA outlined several defensive steps for Fortinet customers. These include terminating all active SSL VPN and administrative sessions and resetting all Fortinet VPN and administrative passwords, especially on internet-facing systems. CISA also recommended enforcing strong password policies.\u003c/p\u003e\n\n\u003cp\u003eCISA further advised organizations to ensure PBKDF2 is used to store administrator credentials and to remove weaker legacy hashes. It recommended reviewing firewall, VPN, authentication, and domain controller logs for suspicious actions, including unauthorized configuration changes. CISA also urged enabling phishing-resistant MFA on all external gateways and administrative interfaces, reducing the attack surface, and locking down management.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents FortiBleed as a large-scale credential-driven campaign against perimeter security appliances. It emphasizes how credential reuse, default accounts, factory credentials, and poor password hygiene can be weaponized by attackers. It also highlights that internet-facing Fortinet firewalls and VPN gateways remain valuable targets for gaining access to enterprise environments.\u003c/p\u003e\n","keyPoints":["CISA urged Fortinet customers with FortiGate appliances to secure their devices against ongoing malicious activity targeting thousands of internet-accessible systems.","The FortiBleed campaign, believed to involve Russian-speaking threat actors, had compromised 86,644 devices as of June 19, 2026.","SOCRadar reported that generic admin accounts and built-in Fortinet system accounts made up most compromised credentials, while organization-specific accounts accounted for 36.7%.","The threat actor mass-scanned the internet for Fortinet remote login endpoints and used a bespoke tool to spray known username and password combinations against them.","CISA recommended terminating active SSL VPN and administrative sessions, resetting Fortinet VPN and administrative passwords, enforcing PBKDF2 credential storage, reviewing logs, enabling phishing-resistant MFA, and reducing exposed management surfaces."],"insights":["Upgrading FortiOS alone may not eliminate legacy SHA-256-stored administrator credentials, because existing administrator passwords remain in the older format until the corresponding administrator logs in after the upgrade.","The campaign appears self-sustaining because attackers allegedly use initial valid Fortinet logins to passively collect additional credentials from network traffic and then use those credentials to compromise more appliances.","The high share of generic admin and built-in Fortinet system accounts among compromised credentials indicates that many exposed devices still relied on default or poorly rotated accounts before any brute forcing was needed.","Organization-specific accounts accounted for 36.7% of compromised credentials, showing that the activity was not limited to default accounts and also involved credentials created by individual organizations."],"referencedReports":[{"title":"CISA Urges Hardening Fortinet Devices After Reports of Credential Exposure","url":"https://www.cisa.gov/news-events/alerts/2026/06/18/cisa-urges-hardening-fortinet-devices-after-reports-credential-exposure","publisher":"CISA","context":"The article cites CISA's alert urging Fortinet customers to harden FortiGate devices against ongoing malicious activity and lists CISA's recommended mitigations.","category":"","primary":false},{"title":"Advice following global targeting of Fortinet firewalls and VPN gateways","url":"https://www.ncsc.gov.uk/news/advice-following-global-targeting-of-fortinet-firewalls-and-vpn-gateways","publisher":"U.K. National Cyber Security Centre","context":"The article references NCSC's advice describing FortiBleed as a global campaign using brute-force, dictionary attack, and credential stuffing methods.","category":"","primary":false},{"title":"Active FortiBleed Campaign Impacting Fortinet Devices Across 194 Countries","url":"https://arcticwolf.com/resources/blog/active-fortibleed-campaign-impacting-fortinet-devices-across-194-countries/","publisher":"Arctic Wolf","context":"The article cites Arctic Wolf's analysis of Fortinet administrator password hashing changes and legacy SHA-256 credential storage after upgrades.","category":"","primary":false},{"title":"Technical Tip: Enforcing PBKDF2 as hash function for administrator accounts in FortiOS v7.2.11 and later","url":"https://community.fortinet.com/fortigate-3/technical-tip-enforcing-pbkdf2-as-hash-function-for-administrator-accounts-in-fortios-v7-2-11-and-later-220652","publisher":"Fortinet","context":"The article links to Fortinet's technical guidance while describing CISA's recommendation to use PBKDF2 for storing administrator credentials.","category":"","primary":false}],"body":"\u003cp\u003eCISA urged Fortinet customers with FortiGate appliances to harden their devices against ongoing malicious activity targeting thousands of internet-accessible systems. The campaign, codenamed FortiBleed and believed to be the work of Russian-speaking threat actors, had compromised 86,644 devices as of June 19, 2026. The activity focuses on Fortinet remote login endpoints and involves valid credentials for firewalls and VPN gateways.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said generic admin accounts and built-in Fortinet system accounts together made up most compromised credentials, while organization-specific accounts accounted for 36.7%. The top impacted sectors were telecom, government, and education, with the most exposures located in India, the U.S., Mexico, Colombia, and Thailand. The U.K. NCSC described the campaign as global and said it used brute-force, dictionary attack, and credential stuffing methods.\u003c/p\u003e\n\n\u003cp\u003eThe article says the attacker mass-scanned for Fortinet remote login endpoints and used a bespoke tool to spray known username and password combinations. Once access was obtained, the attackers allegedly monitored network traffic through the devices to collect additional credentials and expand the campaign. CISA recommended resetting Fortinet VPN and administrative passwords, terminating active sessions, enforcing PBKDF2 credential storage, enabling phishing-resistant MFA, reviewing logs, and reducing exposed management surfaces.\u003c/p\u003e\n"},{"n":7,"title":"CISA warns Fortinet users to secure devices after FortiBleed leak","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-warns-fortinet-users-to-secure-devices-after-fortibleed-leak/","time":"06:47","priority":"MUST READ","score":94,"tldr":"CISA is urging Fortinet customers to immediately secure FortiGate firewall and VPN devices after the FortiBleed leak exposed credentials for nearly 74,000 devices worldwide. Organizations should reset passwords, terminate sessions, enable phishing-resistant MFA, restrict public admin access, and check logs for unauthorized activity.","briefOverview":"\u003cp\u003eCISA urged Fortinet customers to secure their devices after nearly 74,000 firewall and VPN credentials were exposed in a data leak called FortiBleed. The agency said malicious cyber actors have targeted internet-accessible Fortinet devices across government and private-sector organizations using compromised credentials. CISA called on affected FortiGate appliance owners to terminate SSL VPN and administrative sessions, reset VPN and administrative passwords, enable phishing-resistant multifactor authentication, and review logs for unauthorized access or lateral movement.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Volodymyr “Bob” Diachenko discovered a server containing what appeared to be valid Fortinet VPN credentials, including usernames, email addresses, and plaintext passwords for 73,932 firewall URLs worldwide. The exposed data also included each organization’s industry, revenue, and employee count, which Diachenko said appeared to be compiled to assist in planning future attacks. Hudson Rock described the dataset as one of the largest known collections of compromised Fortinet credentials, spanning 21,632 unique domains and 194 countries.\u003c/p\u003e\n\n\u003cp\u003eOrganizations represented in the dataset include Samsung, Mercedes-Benz, Foxconn, Chevron, Comcast, AT\u0026amp;T, Toyota, government agencies, and critical infrastructure operators across telecommunications, healthcare, financial services, and manufacturing. Diachenko said the operation was conducted by a Russian-speaking threat group that allegedly carried out about 1.16 billion credential attempts against more than 320,000 FortiGate targets to intercept SSL VPN authentication hashes. The source of the data remains unknown, and it is unclear whether it came from previously disclosed Fortinet vulnerabilities, a new security flaw, or another method.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA warned Fortinet customers to secure their devices after nearly 74,000 firewall and VPN credentials were exposed in a data leak called FortiBleed.","CISA said malicious cyber actors have targeted internet-accessible Fortinet devices across government and private-sector organizations using compromised credentials.","Security researcher Volodymyr Diachenko discovered a server containing apparent Fortinet VPN credentials, including usernames, email addresses, and plaintext passwords for 73,932 firewall URLs worldwide.","The exposed dataset includes organizations such as Samsung, Mercedes-Benz, Foxconn, Chevron, Comcast, AT\u0026T, Toyota, government agencies, and critical infrastructure operators.","CISA advised FortiGate owners to terminate SSL VPN and administrative sessions, reset VPN and administrative passwords, enable phishing-resistant multifactor authentication, restrict public access to management interfaces, and review logs for unauthorized activity."],"insights":["CISA’s guidance goes beyond password resets by advising organizations to terminate active SSL VPN and administrative sessions, which matters because exposed credentials may already be in use on live sessions.","The leaked dataset reportedly included each organization’s industry, revenue, and employee count, suggesting it was structured to help attackers prioritize targets rather than merely store stolen logins.","Kevin Beaumont said most of the affected Fortinet devices remain online, meaning many exposed systems may still be reachable even after the credential leak became public.","CISA specifically advised using PBKDF2 for stored admin credentials, indicating that credential storage practices on Fortinet devices are part of the recommended hardening response.","The article notes that CISA tracks 26 Fortinet flaws exploited in the wild in recent years, with 13 abused in ransomware attacks, showing that Fortinet devices have been a repeated target beyond this credential leak."],"referencedReports":[{"title":"CISA Urges Hardening Fortinet Devices After Reports of Credential Exposure","url":"https://www.cisa.gov/news-events/alerts/2026/06/18/cisa-urges-hardening-fortinet-devices-after-reports-credential-exposure","publisher":"CISA","context":"The article cites CISA's alert urging Fortinet customers to harden devices after reports of exposed Fortinet credentials.","category":"","primary":false},{"title":"FortiBleed: 75,000 Fortinet Firewalls Compromised – Global Enterprises Exposed – Claim Your Ethical Disclosure","url":"http://www.infostealers.com/article/fortibleed-75000-fortinet-firewalls-compromised-global-enterprises-exposed-claim-your-ethical-disclosure/","publisher":"Hudson Rock","context":"The article says Hudson Rock analyzed the FortiBleed dataset and described its scale across unique domains and countries.","category":"","primary":false}],"body":"\u003cp\u003eCISA urged Fortinet customers to secure their devices after nearly 74,000 firewall and VPN credentials were exposed in a data leak called FortiBleed. The agency said malicious cyber actors have targeted internet-accessible Fortinet devices across government and private-sector organizations using compromised credentials. CISA called on affected FortiGate appliance owners to terminate SSL VPN and administrative sessions, reset VPN and administrative passwords, enable phishing-resistant multifactor authentication, and review logs for unauthorized access or lateral movement.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Volodymyr “Bob” Diachenko discovered a server containing what appeared to be valid Fortinet VPN credentials, including usernames, email addresses, and plaintext passwords for 73,932 firewall URLs worldwide. The exposed data also included each organization’s industry, revenue, and employee count, which Diachenko said appeared to be compiled to assist in planning future attacks. Hudson Rock described the dataset as one of the largest known collections of compromised Fortinet credentials, spanning 21,632 unique domains and 194 countries.\u003c/p\u003e\n\n\u003cp\u003eOrganizations represented in the dataset include Samsung, Mercedes-Benz, Foxconn, Chevron, Comcast, AT\u0026amp;T, Toyota, government agencies, and critical infrastructure operators across telecommunications, healthcare, financial services, and manufacturing. Diachenko said the operation was conducted by a Russian-speaking threat group that allegedly carried out about 1.16 billion credential attempts against more than 320,000 FortiGate targets to intercept SSL VPN authentication hashes. The source of the data remains unknown, and it is unclear whether it came from previously disclosed Fortinet vulnerabilities, a new security flaw, or another method.\u003c/p\u003e\n"},{"n":2,"title":"Klue OAuth breach victim list grows as Icarus hackers claim attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/klue-oauth-breach-victim-list-grows-as-icarus-hackers-claim-attack/","time":"22:31","priority":"MUST READ","score":92,"tldr":"Klue confirmed attackers used a compromised legacy integration credential to steal OAuth tokens and access some customers’ Salesforce data, with the Icarus extortion group claiming responsibility. Multiple affected companies say their Salesforce data was exfiltrated, raising phishing and extortion risks, but their core platforms and internal systems were not impacted.","briefOverview":"\u003cp\u003eKlue confirmed a security incident affecting part of its integration infrastructure after discovering unauthorized activity on June 12. CEO Jason Smith said an attacker gained access through a compromised legacy credential tied to an integration service. The attacker used that access to obtain OAuth tokens used to connect Klue with third-party platforms, including Salesforce, and then accessed data in a number of connected customer environments.\u003c/p\u003e\n\n\u003cp\u003eKlue said it has no evidence that customer content stored directly in the Klue platform was impacted, and described the incident as limited to third-party integrations. The company revoked affected credentials and tokens, removed unauthorized code, disabled impacted integrations, began an investigation, notified law enforcement, and engaged CrowdStrike to assist. Huntress and ReliaQuest reported that attackers used stolen OAuth credentials associated with Klue integrations to access customer Salesforce environments and steal CRM data.\u003c/p\u003e\n\n\u003cp\u003eThe Icarus extortion group publicly claimed responsibility on its data leak site and pressured Klue and affected organizations to contact them through Session to prevent leaks of stolen data. Additional affected organizations named in the article include Recorded Future, Tanium, Jamf, Sprout Social, Gong, and Insurity. Several organizations said the stolen Salesforce data did not affect their platforms, infrastructure, payment information, or internal systems, but warned that stolen business contact information could be used for phishing, social engineering, and extortion.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Klue confirmed that unauthorized activity discovered on June 12 affected part of its integration infrastructure and allowed an attacker to obtain OAuth tokens used to connect Klue with third-party platforms, including Salesforce.","Klue said it found no evidence that customer content stored directly within the Klue platform was impacted and that the incident was limited to third-party integrations.","ReliaQuest and Huntress reported that attackers used stolen OAuth credentials associated with Klue integrations to access customer Salesforce environments and steal data.","The Icarus extortion group publicly claimed responsibility for the Klue attack on its data leak site and pressured Klue and affected organizations to contact them through Session.","Additional affected organizations named in the article include Recorded Future, Tanium, Jamf, Sprout Social, Gong, and Insurity, with several warning that stolen business contact information could be used for phishing, social engineering, and extortion."],"insights":["A single compromised legacy integration credential at Klue created a wider downstream impact because it exposed OAuth tokens that connected Klue to multiple customers’ Salesforce environments.","The affected companies generally reported that their own platforms, infrastructure, payment information, and internal systems were not impacted, showing that the main exposure centered on data reachable through the Klue-Salesforce integration.","ReliaQuest observed attackers using generated OAuth tokens and Python scripts to query Salesforce’s API for extended periods, indicating the stolen access was used for sustained data extraction rather than a one-time access event.","The stolen data described by Huntress included business contacts, sales communications, pricing information, and other records, which several organizations warned could support follow-on phishing, social engineering, and extortion campaigns."],"referencedReports":[{"title":"Klue Breach Investigation","url":"https://www.huntress.com/blog/klue-breach-investigation","publisher":"Huntress","context":"The article says Huntress detailed how attackers abused compromised Klue Battlecards integrations to steal Salesforce CRM data from multiple organizations.","category":"","primary":false},{"title":"Threat Spotlight: Integration Abused in CRM Data Theft","url":"https://reliaquest.com/blog/threat-spotlight-integration-abused-in-crm-data-theft","publisher":"ReliaQuest","context":"The article says ReliaQuest detailed how attackers abused compromised Klue Battlecards integrations and later observed attackers generating OAuth tokens and using Python scripts to query Salesforce's API.","category":"","primary":false}],"body":"\u003cp\u003eKlue confirmed a security incident affecting part of its integration infrastructure after discovering unauthorized activity on June 12. CEO Jason Smith said an attacker gained access through a compromised legacy credential tied to an integration service. The attacker used that access to obtain OAuth tokens used to connect Klue with third-party platforms, including Salesforce, and then accessed data in a number of connected customer environments.\u003c/p\u003e\n\n\u003cp\u003eKlue said it has no evidence that customer content stored directly in the Klue platform was impacted, and described the incident as limited to third-party integrations. The company revoked affected credentials and tokens, removed unauthorized code, disabled impacted integrations, began an investigation, notified law enforcement, and engaged CrowdStrike to assist. Huntress and ReliaQuest reported that attackers used stolen OAuth credentials associated with Klue integrations to access customer Salesforce environments and steal CRM data.\u003c/p\u003e\n\n\u003cp\u003eThe Icarus extortion group publicly claimed responsibility on its data leak site and pressured Klue and affected organizations to contact them through Session to prevent leaks of stolen data. Additional affected organizations named in the article include Recorded Future, Tanium, Jamf, Sprout Social, Gong, and Insurity. Several organizations said the stolen Salesforce data did not affect their platforms, infrastructure, payment information, or internal systems, but warned that stolen business contact information could be used for phishing, social engineering, and extortion.\u003c/p\u003e\n"},{"n":5,"title":"Hackers exploit info disclosure bug in Gravity SMTP WordPress plugin","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-exploit-info-disclosure-bug-in-gravity-smtp-wordpress-plugin/","time":"20:25","priority":"MUST READ","score":92,"tldr":"Hackers are actively exploiting CVE-2026-4020 in the Gravity SMTP WordPress plugin to access sensitive system reports, including email service API keys and site configuration details, without authentication. Site owners should update to Gravity SMTP 2.1.5 immediately and check logs for requests to /wp-json/gravitysmtp/v1/tests/mock-data.","briefOverview":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-4020, an unauthenticated information disclosure vulnerability in the Gravity SMTP WordPress plugin, which is active on 100,000 sites. The flaw affects Gravity SMTP versions 2.1.4 and older and was fixed in version 2.1.5, released on March 17. WordPress security company Defiant said its Wordfence firewall has blocked more than 17 million exploitation attempts against protected customers.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability comes from an exposed REST API endpoint whose \u003ccode\u003epermission_callback\u003c/code\u003e always returns \u003ccode\u003etrue\u003c/code\u003e, allowing unauthenticated GET requests to receive a JSON “System Report” generated by the plugin. The exposed data may include API keys, secrets, OAuth tokens, third-party email service credentials, WordPress configuration details, server and PHP environment information, and database details. Wordfence warned that exposed live third-party API credentials could let attackers abuse connected email services, while the detailed report reduces the effort needed to plan further attacks.\u003c/p\u003e\n\n\u003cp\u003eWordfence said exploitation activity spiked on June 7, when 4 million requests were blocked, with similar activity continuing for several days afterward. A key indicator of compromise is requests to \u003ccode\u003e/wp-json/gravitysmtp/v1/tests/mock-data\u003c/code\u003e in web server access logs, especially those including the \u003ccode\u003e?page=gravitysmtp-settings\u003c/code\u003e query parameter. The article also notes a separate Wordfence advisory about CVE-2026-8713, a critical unauthenticated arbitrary file-deletion flaw in the Avada Builder WordPress plugin that was fixed in version 3.15.4.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors are actively exploiting CVE-2026-4020, an unauthenticated information disclosure vulnerability in the Gravity SMTP WordPress plugin that is active on 100,000 sites.","The flaw affects Gravity SMTP versions 2.1.4 and older and was fixed in version 2.1.5, released on March 17.","The vulnerability exposes a REST API endpoint that can return a JSON System Report containing API keys, OAuth tokens, third-party email service credentials, WordPress configuration details, server and PHP environment information, and database details.","Wordfence said its firewall blocked more than 17 million exploitation attempts, including a spike of 4 million blocked requests on June 7.","A key indicator of compromise is requests to /wp-json/gravitysmtp/v1/tests/mock-data in web server access logs, especially with the ?page=gravitysmtp-settings query parameter."],"insights":["CVE-2026-4020 is rated medium severity, but the article emphasizes that unauthenticated access to live third-party email credentials can enable impersonation and make follow-on attacks easier.","The exposed Gravity SMTP System Report is especially useful to attackers because it combines secrets with detailed WordPress, server, PHP, and database information in one response.","Administrators can hunt for possible exploitation by checking access logs for /wp-json/gravitysmtp/v1/tests/mock-data requests, especially those containing the ?page=gravitysmtp-settings query parameter.","Wordfence’s report of more than 17 million blocked attempts, including 4 million on June 7 alone, indicates exploitation was not isolated but occurred at large scale against protected customers.","The article separately notes that CVE-2026-8713 in Avada Builder has not yet seen active exploitation, but Wordfence still recommends quick patching because deleting wp-config.php could lead to full site takeover and remote code execution."],"referencedReports":[{"title":"Attackers Actively Exploiting Sensitive Information Exposure Vulnerability in Gravity SMTP Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-sensitive-information-exposure-vulnerability-in-gravity-smtp-plugin/","publisher":"Wordfence","context":"The article cites Wordfence researchers warning that exposed third-party API credentials and detailed system reports can help attackers abuse email services and plan further attacks.","category":"","primary":false},{"title":"Critical Unauthenticated Arbitrary File Deletion Vulnerability Patched in Avada Builder WordPress Plugin","url":"https://www.wordfence.com/blog/2026/06/critical-unauthenticated-arbitrary-file-deletion-vulnerability-patched-in-avada-builder-wordpress-plugin/","publisher":"Wordfence","context":"The article notes that Wordfence issued a separate advisory about a critical arbitrary file-deletion flaw in the Avada Builder WordPress plugin.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-4020, an unauthenticated information disclosure vulnerability in the Gravity SMTP WordPress plugin, which is active on 100,000 sites. The flaw affects Gravity SMTP versions 2.1.4 and older and was fixed in version 2.1.5, released on March 17. WordPress security company Defiant said its Wordfence firewall has blocked more than 17 million exploitation attempts against protected customers.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability comes from an exposed REST API endpoint whose \u003ccode\u003epermission_callback\u003c/code\u003e always returns \u003ccode\u003etrue\u003c/code\u003e, allowing unauthenticated GET requests to receive a JSON “System Report” generated by the plugin. The exposed data may include API keys, secrets, OAuth tokens, third-party email service credentials, WordPress configuration details, server and PHP environment information, and database details. Wordfence warned that exposed live third-party API credentials could let attackers abuse connected email services, while the detailed report reduces the effort needed to plan further attacks.\u003c/p\u003e\n\n\u003cp\u003eWordfence said exploitation activity spiked on June 7, when 4 million requests were blocked, with similar activity continuing for several days afterward. A key indicator of compromise is requests to \u003ccode\u003e/wp-json/gravitysmtp/v1/tests/mock-data\u003c/code\u003e in web server access logs, especially those including the \u003ccode\u003e?page=gravitysmtp-settings\u003c/code\u003e query parameter. The article also notes a separate Wordfence advisory about CVE-2026-8713, a critical unauthenticated arbitrary file-deletion flaw in the Avada Builder WordPress plugin that was fixed in version 3.15.4.\u003c/p\u003e\n"},{"n":11,"title":"Police raid malware network tied to Russia's Evil Corp hacker group","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/socgholish-botnet-disrupted","time":"12:57","priority":"MUST READ","score":92,"tldr":"An international law enforcement operation disrupted the SocGholish/FakeUpdates malware network linked to Russia’s Evil Corp, taking down over 100 servers and cleaning nearly 15,000 compromised websites. Authorities said the botnet was used to gain footholds for ransomware and espionage campaigns.","briefOverview":"\u003cp\u003eAn international law enforcement operation disrupted a malware network linked to the Russia-based cybercrime group Evil Corp. Authorities from the Netherlands, Canada, the United States, and Germany said they dismantled key parts of the SocGholish botnet. The operation took down more than 100 servers, seized domain names, and disinfected nearly 15,000 hacked websites used to spread malicious software.\u003c/p\u003e\n\n\u003cp\u003eSocGholish, also known as FakeUpdates, has been active since 2017 and spreads through fake browser or software update prompts on otherwise legitimate websites. The malware can establish an initial foothold on victim computers and allow attackers to deploy additional malicious tools. The FBI said the botnet has been used for further targeting with ransomware campaigns and espionage.\u003c/p\u003e\n\n\u003cp\u003eDutch police said they removed malware and backdoors from thousands of infected WordPress websites and notified the owners of the compromise. Researchers at Infoblox said SocGholish has served as an entry point for ransomware groups including DoppelPaymer, WastedLocker, Hades, LockBit, and RansomHub. Maikel Rollman of the Dutch National High Tech Crime Unit said the operation deprived cybercriminals of access to infected systems and marked the beginning of further action against SocGholish.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An international law enforcement operation disrupted the SocGholish botnet linked to Russia-based cybercrime group Evil Corp.","Authorities from the Netherlands, Canada, the United States, and Germany seized domain names, shut down servers, took down more than 100 servers, and disinfected nearly 15,000 hacked websites.","Dutch police said they removed malware and backdoors from thousands of infected WordPress websites and notified the site owners.","SocGholish, also known as FakeUpdates, spreads through fake browser or software update prompts on legitimate websites and can allow attackers to deploy additional malicious tools.","The FBI said SocGholish has been used by threat actors for further targeting with ransomware campaigns and espionage."],"insights":["SocGholish’s use of otherwise legitimate small-business websites, including restaurants and auto repair shops, shows that everyday websites can become distribution points for major cybercrime operations.","The operation targeted both the attacker infrastructure and compromised websites, indicating that disrupting this network required taking down servers and cleaning infected WordPress sites.","SocGholish’s value appears to come from providing initial access, as the article says it has served as an entry point for multiple ransomware groups including DoppelPaymer, WastedLocker, Hades, LockBit, and RansomHub.","Dutch police said this is only the beginning of further action against SocGholish, suggesting the disruption may be part of a continuing law enforcement effort rather than a one-time takedown."],"referencedReports":[{"title":"Hot Take: Operation Endgame vs SocGholish","url":"https://www.infoblox.com/blog/threat-intelligence/hot-take-operation-endgame-vs-socgholish/","publisher":"Infoblox","context":"The article cites Infoblox researchers, who assisted with the operation, as saying SocGholish served as an entry point for multiple ransomware groups.","category":"","primary":false}],"body":"\u003cp\u003eAn international law enforcement operation disrupted a malware network linked to the Russia-based cybercrime group Evil Corp. Authorities from the Netherlands, Canada, the United States, and Germany said they dismantled key parts of the SocGholish botnet. The operation took down more than 100 servers, seized domain names, and disinfected nearly 15,000 hacked websites used to spread malicious software.\u003c/p\u003e\n\n\u003cp\u003eSocGholish, also known as FakeUpdates, has been active since 2017 and spreads through fake browser or software update prompts on otherwise legitimate websites. The malware can establish an initial foothold on victim computers and allow attackers to deploy additional malicious tools. The FBI said the botnet has been used for further targeting with ransomware campaigns and espionage.\u003c/p\u003e\n\n\u003cp\u003eDutch police said they removed malware and backdoors from thousands of infected WordPress websites and notified the owners of the compromise. Researchers at Infoblox said SocGholish has served as an entry point for ransomware groups including DoppelPaymer, WastedLocker, Hades, LockBit, and RansomHub. Maikel Rollman of the Dutch National High Tech Crime Unit said the operation deprived cybercriminals of access to infected systems and marked the beginning of further action against SocGholish.\u003c/p\u003e\n"},{"n":21,"title":"Salesforce Disables Klue App Integration After OAuth Token Abuse Exposes Customer Data","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/salesforce-disables-klue-app.html","time":"09:03","priority":"MUST READ","score":92,"tldr":"Salesforce disabled Klue’s Battlecards integration after attackers abused stolen OAuth tokens from Klue’s infrastructure to access and exfiltrate data from connected customer Salesforce environments. The incident highlights the risk of trusted third-party SaaS integrations with persistent access to sensitive CRM data.","briefOverview":"\u003cp\u003eSalesforce disabled the Klue Battlecards app integration after detecting unusual activity that may have resulted in unauthorized access to a subset of customer data through the app’s Salesforce connection. Salesforce said the issue was limited to Klue’s app connection and did not arise from a vulnerability in the Salesforce platform. Klue said it detected unauthorized activity affecting part of its integration infrastructure on June 12, 2026, after attackers gained access through a compromised legacy credential tied to an integration service. The extortion group Icarus later listed Klue as a victim and said other companies’ Salesforce instances connected through Klue had been exfiltrated.\u003c/p\u003e\n\n\u003cp\u003eKlue said the attacker used the access to obtain OAuth tokens used to connect Klue with third-party platforms, including Salesforce, and then accessed data in connected customer environments. Huntress said data copied from its Salesforce account included business contacts, price quotes, and other sales-related data and messaging, but not threat data, passwords, payment card information, or engineering data related to its agent or telemetry. ReliaQuest reported that the attackers authenticated through a compromised Klue integration service account, generated OAuth tokens, and used automated Python scripts to enumerate Salesforce objects and run REST API queries for bulk data retrieval. Jamf, Recorded Future, and Tanium also publicly confirmed impacts involving business or sales-related Salesforce data.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Salesforce disabled the Klue Battlecards app integration after detecting unusual activity that may have resulted in unauthorized access to a subset of customer data through the app’s connection to Salesforce.","Klue said attackers accessed a portion of its integration infrastructure using a compromised legacy credential associated with an integration service and obtained OAuth tokens used to connect Klue with third-party platforms, including Salesforce.","Huntress said data copied from its Salesforce account included business contacts, price quotes, and other sales-related data and messaging, but not threat data, passwords, payment card information, or engineering data related to its agent or telemetry.","ReliaQuest reported that the attackers used automated Python scripts to enumerate Salesforce objects and run REST API queries for bulk CRM data retrieval through the Salesforce API.","Icarus listed Klue as a victim on June 19, 2026, and Jamf, Recorded Future, and Tanium also publicly confirmed impacts limited to business or sales-related Salesforce data."],"insights":["A long-disused but still active legacy credential was enough to enable the initial compromise, underscoring that abandoned integration prototypes can remain a high-impact access path if credentials are not removed.","The attackers did not need Salesforce passwords, MFA codes, or employee phishing because the stolen OAuth tokens were treated by Salesforce as trusted Klue access.","ReliaQuest observed automated API querying that ran for many hours from a trusted integration account, showing that non-human SaaS identities may evade monitoring even during high-volume data retrieval.","The incident affected multiple Klue customers through a single vendor integration, demonstrating how SaaS supply chain access can expose several enterprise Salesforce environments at once."],"referencedReports":[{"title":"Salesforce General Message on Klue Battlecards App Integration","url":"https://status.salesforce.com/generalmessages/20000257","publisher":"Salesforce","context":"The article cites a Salesforce alert stating that Klue Battlecards was disabled after unusual activity involving the app may have exposed customer data.","category":"","primary":false},{"title":"An Update on Recent Klue Security Incident","url":"https://klue.com/blog/an-update-on-recent-klue-security-incident","publisher":"Klue","context":"The article references Klue's own update explaining that attackers used a compromised legacy credential to obtain OAuth tokens for third-party integrations including Salesforce.","category":"","primary":false},{"title":"Threat Spotlight: Integration Abused in CRM Data Theft","url":"https://reliaquest.com/blog/threat-spotlight-integration-abused-in-crm-data-theft","publisher":"ReliaQuest","context":"The article cites ReliaQuest's analysis of the Klue integration abuse, including details on OAuth abuse, Python scripts, and Salesforce API querying behavior.","category":"","primary":false}],"body":"\u003cp\u003eSalesforce disabled the Klue Battlecards app integration after detecting unusual activity that may have resulted in unauthorized access to a subset of customer data through the app’s Salesforce connection. Salesforce said the issue was limited to Klue’s app connection and did not arise from a vulnerability in the Salesforce platform. Klue said it detected unauthorized activity affecting part of its integration infrastructure on June 12, 2026, after attackers gained access through a compromised legacy credential tied to an integration service. The extortion group Icarus later listed Klue as a victim and said other companies’ Salesforce instances connected through Klue had been exfiltrated.\u003c/p\u003e\n\n\u003cp\u003eKlue said the attacker used the access to obtain OAuth tokens used to connect Klue with third-party platforms, including Salesforce, and then accessed data in connected customer environments. Huntress said data copied from its Salesforce account included business contacts, price quotes, and other sales-related data and messaging, but not threat data, passwords, payment card information, or engineering data related to its agent or telemetry. ReliaQuest reported that the attackers authenticated through a compromised Klue integration service account, generated OAuth tokens, and used automated Python scripts to enumerate Salesforce objects and run REST API queries for bulk data retrieval. Jamf, Recorded Future, and Tanium also publicly confirmed impacts involving business or sales-related Salesforce data.\u003c/p\u003e\n"},{"n":26,"title":"15 Malicious JetBrains Plugins Stole AI API Keys from 70,000 Developers","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/jetbrains-malicious-plugins-ai-api-key-theft","time":"20:44","priority":"MUST READ","score":92,"tldr":"JetBrains removed 15 malicious Marketplace plugins that posed as AI developer tools but stole AI API keys from about 70,000 developers and sent them to a live C2 server in China. Anyone who installed the plugins should uninstall them, rotate exposed API keys, block the C2 IP, and audit AI usage and billing for abuse.","briefOverview":"\u003cp\u003eOn June 16, 2026, JetBrains received security reports identifying 15 malicious third-party plugins on the JetBrains Marketplace. The plugins were published under seven vendor accounts and posed as legitimate AI-powered developer tools for code review, unit test generation, Git commit messages, and chat features. The campaign ran for about eight months, from late October 2025 through June 2026, and accumulated roughly 70,000 total installations.\u003c/p\u003e\n\n\u003cp\u003eThe plugins stole AI provider API keys when developers entered them into plugin settings and clicked “Apply.” The keys were validated for an OpenAI-style format, deduplicated, and sent over unencrypted HTTP to a hardcoded command-and-control server at \u003ccode\u003e39.107.60.51\u003c/code\u003e. The article says the plugins also installed a JVM-wide \u003ccode\u003eX509TrustManager\u003c/code\u003e to suppress standard TLS certificate validation warnings.\u003c/p\u003e\n\n\u003cp\u003eJetBrains removed all 15 plugins from the Marketplace, permanently banned the seven publisher accounts, and triggered a remote kill-switch to disable the extensions inside IDEs upon relaunch. StepSecurity independently confirmed on June 19, 2026 that the command-and-control server was still live and responding to API requests. The article advises affected users to uninstall the plugins, revoke and rotate exposed API keys, block the C2 server, and audit AI usage and billing for unauthorized activity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["JetBrains received security reports on June 16, 2026 identifying 15 malicious third-party plugins on the JetBrains Marketplace that were published under seven vendor accounts and posed as AI-powered developer tools.","The plugins stole AI provider API keys entered into their settings and sent them over unencrypted HTTP to the hardcoded command-and-control server at 39.107.60.51.","The campaign ran from late October 2025 through June 2026 and accumulated roughly 70,000 total installations, with the two most recent plugins accounting for more than 53,000 downloads.","JetBrains removed all 15 plugins from the Marketplace, permanently banned the seven publisher accounts, and triggered a remote kill-switch to disable the extensions inside IDEs upon relaunch.","StepSecurity independently confirmed on June 19, 2026 that the command-and-control server at 39.107.60.51 was still live and responding to API requests."],"insights":["The plugins were functional AI tools, which made the credential theft harder to spot because the malicious code was embedded alongside features users expected to work.","The exfiltration logic only sent keys that matched an OpenAI-style format and had not been seen before, reducing duplicate network traffic and likely lowering the chance of detection.","The stolen keys were transmitted over plain HTTP, meaning network defenders could potentially identify past or ongoing compromise by searching logs for traffic to 39.107.60.51 or the static X-Api-Key header.","The campaign’s largest download volume came from two plugins published only days before discovery, showing that late-stage releases accounted for most of the exposure.","The donation wall allegedly returned working API keys from the server after payment, creating a cycle in which paying users could receive keys stolen from other victims."],"referencedReports":[{"title":"JetBrains Marketplace Ecosystem Security Update: Addressing Malicious Third-Party AI Plugins","url":"https://blog.jetbrains.com/platform/2026/06/marketplace-ecosystem-security-update-malicious-ai-plugins/","publisher":"JetBrains","context":"The article cites this as the JetBrains official advisory about the malicious third-party AI plugins removed from the JetBrains Marketplace.","category":"","primary":false}],"body":"\u003cp\u003eOn June 16, 2026, JetBrains received security reports identifying 15 malicious third-party plugins on the JetBrains Marketplace. The plugins were published under seven vendor accounts and posed as legitimate AI-powered developer tools for code review, unit test generation, Git commit messages, and chat features. The campaign ran for about eight months, from late October 2025 through June 2026, and accumulated roughly 70,000 total installations.\u003c/p\u003e\n\n\u003cp\u003eThe plugins stole AI provider API keys when developers entered them into plugin settings and clicked “Apply.” The keys were validated for an OpenAI-style format, deduplicated, and sent over unencrypted HTTP to a hardcoded command-and-control server at \u003ccode\u003e39.107.60.51\u003c/code\u003e. The article says the plugins also installed a JVM-wide \u003ccode\u003eX509TrustManager\u003c/code\u003e to suppress standard TLS certificate validation warnings.\u003c/p\u003e\n\n\u003cp\u003eJetBrains removed all 15 plugins from the Marketplace, permanently banned the seven publisher accounts, and triggered a remote kill-switch to disable the extensions inside IDEs upon relaunch. StepSecurity independently confirmed on June 19, 2026 that the command-and-control server was still live and responding to API requests. The article advises affected users to uninstall the plugins, revoke and rotate exposed API keys, block the C2 server, and audit AI usage and billing for unauthorized activity.\u003c/p\u003e\n"},{"n":17,"title":"Operation Endgame Disrupts SocGholish Servers, Cleans 14,971 WordPress Sites","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/operation-endgame-disrupts-socgholish.html","time":"15:07","priority":"SHOULD READ","score":88,"tldr":"International law enforcement disrupted SocGholish infrastructure under Operation Endgame, taking down 106 servers and cleaning 14,971 infected WordPress sites. The action targets a major fake-update malware delivery ecosystem used to enable ransomware, espionage, and other follow-on attacks.","briefOverview":"\u003cp\u003eDutch law enforcement authorities, together with counterparts from Canada, Germany, and the United States, disrupted malicious infrastructure associated with SocGholish. The action was part of Operation Endgame, an international law enforcement initiative launched in 2024 to combat botnets and related criminal infrastructure. Authorities took down 106 SocGholish-linked servers and cleaned infections from 14,971 WordPress websites.\u003c/p\u003e\n\n\u003cp\u003eSocGholish, also known as FakeUpdates, has been active since 2017 and is a JavaScript-based downloader malware. It is distributed through compromised websites that impersonate browser or software updates, including fake updates for Google Chrome and Mozilla Firefox. The malware has been used as an initial foothold for follow-on activity involving ransomware, espionage, and other payloads.\u003c/p\u003e\n\n\u003cp\u003eThe article describes SocGholish as part of a broader traffic distribution and affiliate ecosystem. Compromised WordPress sites, domain shadowing, traffic filtering, and conditional redirection have been used to send selected visitors toward malicious payloads. Website owners were notified to update their CMS, change credentials, and delete suspicious accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDutch authorities and law enforcement partners from Canada, Germany, and the United States disrupted infrastructure tied to SocGholish under Operation Endgame. The operation resulted in the takedown of 106 servers linked to SocGholish and the cleanup of 14,971 infected WordPress sites. Dutch police said the action was intended to deprive cybercriminals of access to infected systems, prevent further damage, and limit malware spread.\u003c/p\u003e\n\n\u003cp\u003eOperation Endgame is described as an ongoing international initiative launched in 2024 to combat botnets and related criminal infrastructures. Authorities said the SocGholish action marks the beginning of further measures against the malware group. Website owners affected by the cleanup were notified to update their content management systems, change credentials, and remove suspicious accounts.\u003c/p\u003e\n\n\u003cp\u003eSocGholish, also called FakeUpdates, is a JavaScript-based downloader malware active since 2017. It is commonly delivered through compromised websites that display deceptive update prompts for web browsers such as Google Chrome and Mozilla Firefox, as well as other popular software. The operators have been tracked under names including Gold Prelude, Mustard Tempest, Purple Vallhund, TA569, and UNC1543.\u003c/p\u003e\n\n\u003cp\u003eThe malware has served as an initial access mechanism for multiple threat actors and follow-on payload chains. The article links SocGholish activity to actors and malware or operations including Evil Corp, LockBit, RansomHub, Dridex, Raspberry Robin, RomCom, Gholoader, MintsLoader, GhostWeaver, AsyncRAT, and NetSupport RAT. The FBI said SocGholish establishes an initial foothold in victim computers and can support ransomware campaigns and espionage.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes SocGholish as part of a layered traffic distribution ecosystem involving compromised websites, affiliates, and traffic distribution systems. Shadowserver said the abuse includes domain shadowing, where attackers create subdomains under legitimate domains that point to criminal-operated infrastructure. Infoblox described SocGholish as a multi-stage JavaScript framework involving traffic acquisition, filtering, payload lures, and on-device implant execution, and said about 55% of its cloud customers attempted to reach SocGholish infrastructure this year.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eDutch law enforcement authorities, working with counterparts from Canada, Germany, and the United States, disrupted malicious infrastructure associated with SocGholish. The action was conducted under Operation Endgame, an international law enforcement initiative launched in 2024 to combat botnets and associated criminal infrastructures.\u003c/p\u003e\n\n\u003cp\u003eAs part of the operation, authorities took down 106 servers linked to SocGholish. They also cleaned 14,971 infected WordPress websites. Website owners were notified to update their content management systems, change credentials, and delete suspicious accounts.\u003c/p\u003e\n\n\u003cp\u003eMaikel Rollman of the Netherlands National High Tech Crime Unit said the actions deprive cybercriminals of access to infected systems, prevent further damage to digital systems, limit malware spread, and reduce the risk that compromised systems could be used in attacks on critical infrastructure and other essential societal processes. Dutch police also described the action as the beginning of further measures against SocGholish.\u003c/p\u003e\n\n\u003ch2 id=\"socgholish-background\"\u003eSocGholish background\u003c/h2\u003e\n\n\u003cp\u003eSocGholish, also known as FakeUpdates, has been active since 2017. The article describes it as a JavaScript-based downloader malware that typically serves as a conduit for next-stage malware from multiple threat actors.\u003c/p\u003e\n\n\u003cp\u003eThe malware is distributed through compromised websites by masquerading as deceptive software update prompts. These lures include fake updates for web browsers such as Google Chrome and Mozilla Firefox, as well as other popular software.\u003c/p\u003e\n\n\u003cp\u003eThe operators of SocGholish have been tracked under several names, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGold Prelude\u003c/li\u003e\n\u003cli\u003eMustard Tempest\u003c/li\u003e\n\u003cli\u003ePurple Vallhund\u003c/li\u003e\n\u003cli\u003eTA569\u003c/li\u003e\n\u003cli\u003eUNC1543\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe FBI’s Cyber Division said SocGholish establishes an initial foothold into victim computers, which collectively form a botnet, and is then used by threat actors for further targeting with ransomware campaigns and espionage.\u003c/p\u003e\n\n\u003ch2 id=\"follow-on-actors-and-payloads\"\u003eFollow-on actors and payloads\u003c/h2\u003e\n\n\u003cp\u003eThe article says SocGholish has been used as a conduit for next-stage malware and activity by various threat actors and operations. These include Evil Corp, also known as DEV-0243, Indrik Spider, and UNC2165, as well as LockBit, RansomHub, Dridex, and Raspberry Robin, also known as Roshtyak.\u003c/p\u003e\n\n\u003cp\u003eIn November 2025, Arctic Wolf reported that SocGholish was being used by the RomCom threat actors to deliver the Mythic Agent. The article says this highlights the use of the initial access broker’s services by a broad range of actors with varied motivations.\u003c/p\u003e\n\n\u003cp\u003eOrange Cyberdefense said it observed SocGholish infections delivering loaders such as Gholoader and MintsLoader. These loaders led to the deployment of additional payloads including GhostWeaver, LockBit, AsyncRAT, and NetSupport RAT.\u003c/p\u003e\n\n\u003cp\u003eOrange Cyberdefense also said SocGholish uses a layered delivery model and has enabled multiple categories of follow-on payloads. It added that the threat actor collaborates with traffic distribution system operators such as TA2726.\u003c/p\u003e\n\n\u003ch2 id=\"compromised-websites-and-infection-methods\"\u003eCompromised websites and infection methods\u003c/h2\u003e\n\n\u003cp\u003eSilent Push previously noted that SocGholish infections typically originate from compromised websites infected in multiple different ways. The article describes direct JavaScript injections, where the SocGholish payload delivery is loaded directly from an infected webpage. It also describes a variation in which an intermediate JavaScript file loads the related injection.\u003c/p\u003e\n\n\u003cp\u003eMany compromised WordPress instances were modified to include criminal infrastructure operated by SocGholish, according to the Shadowserver Foundation. The majority of hacked sites were located in the United States, followed by Germany, France, India, Brazil, Singapore, Italy, Indonesia, Canada, and Vietnam.\u003c/p\u003e\n\n\u003cp\u003eShadowserver said the abuse also included domain shadowing. In this technique, a threat actor gains access to an authoritative DNS provider or registrar account panel for a legitimate domain and quietly creates additional subdomains beneath the apex domain. These subdomains can use common host names that blend in with legitimate DNS infrastructure while pointing to criminal-operated external infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"traffic-distribution-systems-and-affiliate-model\"\u003eTraffic distribution systems and affiliate model\u003c/h2\u003e\n\n\u003cp\u003eThe article describes traffic distribution systems as technology used to route site visitors to different destinations based on various factors. These destinations can include compromised or fake login websites hosting phishing pages and bogus sites that prompt users to download malicious software updates.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said cybercriminals use traffic distribution systems to bypass traditional firewall rules that would otherwise block connections to malicious websites. It also said these systems help analyze potential victims by collecting information such as IP address, operating system, location, device, and browser information.\u003c/p\u003e\n\n\u003cp\u003eInfoblox described SocGholish as a multi-stage JavaScript framework that converts compromised websites into drive-by download malware delivery vehicles. It said the framework involves four main steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTraffic acquisition\u003c/li\u003e\n\u003cli\u003eTraffic filtering\u003c/li\u003e\n\u003cli\u003ePayload lures\u003c/li\u003e\n\u003cli\u003eOn-device implant execution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eInfoblox also said TA569 compromises a large number of websites directly but also accepts traffic from affiliates. In this commercial relationship, an affiliate fingerprints a visitor and passes potential victims to SocGholish through an embedded link, receiving payment for those leads.\u003c/p\u003e\n\n\u003cp\u003eThe article names several prominent affiliates and traffic systems that have sold or filtered traffic for SocGholish over the years, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTA2726\u003c/li\u003e\n\u003cli
