 issue affects all supported Windows releases across client and server platforms after installing the June 2026 security updates. Affected systems include multiple Windows 11 and Windows 10 versions, as well as Windows Server 2025, 2022, 2019, 2016, 2012 R2, and 2012. Microsoft said its engineers are working on a fix that will be delivered in a future Windows update, while businesses can contact Microsoft Support for a temporary workaround.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that this Recycle Bin problem is one of several issues Microsoft has confirmed around the June 2026 updates. Earlier in the week, Microsoft confirmed an issue that blocks third-party apps from launching Office applications or opening documents on Windows systems after those updates. Microsoft also recently fixed a known issue that caused the June 2026 security updates to fail on Windows Server 2016 systems that did not have the May KB5087537 security update installed.\u003c/p\u003e\n"},{"n":12,"title":"UK's information commissioner resigns over ‘inappropriate humour’","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/uk-information-commissioner-resigns-over-inappropriate-humor","time":"11:12","priority":"MAY READ","score":63,"tldr":"UK Information Commissioner John Edwards resigned after a workplace investigation into unspecified conduct, acknowledging inappropriate attempts at humor that caused offense. His departure leaves the ICO in a transitional period as governance reforms and a successor search move to the UK government.","briefOverview":"\u003cp\u003eJohn Edwards, Britain’s Information Commissioner, announced his formal resignation after voluntarily stepping back from his duties in February during a workplace investigation into unspecified conduct. In a LinkedIn post, Edwards said he did not agree with how the investigation had been conducted but accepted that his position had become untenable. He acknowledged occasions where he exercised poor judgment and made attempts at humor that were inappropriate and caused offense.\u003c/p\u003e\n\n\u003cp\u003eEdwards said he had notified Ian Murray, the minister for digital, government and data, that he was resigning immediately as Information Commissioner and as Chair of the Information Commission. He said he did not want to be a distraction to the ICO’s work. Edwards, a New Zealand lawyer and former New Zealand Privacy Commissioner, had taken up the U.K. post in January 2022 and had continued receiving his £200,000 annual salary while withdrawn from duties and living back in New Zealand, according to Politico.\u003c/p\u003e\n\n\u003cp\u003eBecause the Information Commissioner is a statutory role accountable directly to Parliament, Edwards’ decision to step aside left his statutory functions without their designated holder and forced temporary governance arrangements at the regulator. Deputy chief executive Paul Arnold took on those responsibilities and was designated temporary acting accounting officer while Edwards stayed away from ICO staff and offices. His departure comes as the ICO is set to be replaced by an Information Commission, with the article stating that the investigation contributed to that transition stalling, and as ICO regulatory investigations have fallen sharply while more than 3,000 potential cases remain unassigned.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["John Edwards, Britain’s Information Commissioner, announced his immediate resignation after stepping back from his duties in February during a workplace investigation into unspecified conduct.","Edwards wrote that he had exercised poor judgment and made attempts at humor that were inappropriate and caused offense, while saying he did not agree with how the investigation was conducted.","Edwards had continued to receive his £200,000 annual salary while withdrawn from duties and had moved back to New Zealand, according to Politico.","Deputy chief executive Paul Arnold took on Edwards’ responsibilities under temporary governance arrangements after Edwards stepped back from contact with ICO staff and offices.","Edwards’ departure comes as the ICO is set to be replaced by an Information Commission, and the article says the investigation contributed to that transition stalling."],"insights":["Edwards’ February decision to step aside created an unusual governance problem because the Information Commissioner is a statutory role accountable directly to Parliament, leaving the regulator to rely on temporary arrangements rather than a normal internal replacement process.","The leadership issue intersected with a delayed structural overhaul, as Edwards was expected to become chair of the future Information Commission and the article says the investigation contributed to the transition stalling.","The ICO’s operational pressure appears significant because regulatory investigations reportedly fell from more than 2,000 in 2019 to just over 200 in 2025, while more than 3,000 potential cases remained unassigned.","The successor process will be driven by the Department for Science, Innovation and Technology rather than the ICO itself because Edwards was accountable to Parliament and not employed by the regulator."],"referencedReports":[],"body":"\u003cp\u003eJohn Edwards, Britain’s Information Commissioner, announced his formal resignation after voluntarily stepping back from his duties in February during a workplace investigation into unspecified conduct. In a LinkedIn post, Edwards said he did not agree with how the investigation had been conducted but accepted that his position had become untenable. He acknowledged occasions where he exercised poor judgment and made attempts at humor that were inappropriate and caused offense.\u003c/p\u003e\n\n\u003cp\u003eEdwards said he had notified Ian Murray, the minister for digital, government and data, that he was resigning immediately as Information Commissioner and as Chair of the Information Commission. He said he did not want to be a distraction to the ICO’s work. Edwards, a New Zealand lawyer and former New Zealand Privacy Commissioner, had taken up the U.K. post in January 2022 and had continued receiving his £200,000 annual salary while withdrawn from duties and living back in New Zealand, according to Politico.\u003c/p\u003e\n\n\u003cp\u003eBecause the Information Commissioner is a statutory role accountable directly to Parliament, Edwards’ decision to step aside left his statutory functions without their designated holder and forced temporary governance arrangements at the regulator. Deputy chief executive Paul Arnold took on those responsibilities and was designated temporary acting accounting officer while Edwards stayed away from ICO staff and offices. His departure comes as the ICO is set to be replaced by an Information Commission, with the article stating that the investigation contributed to that transition stalling, and as ICO regulatory investigations have fallen sharply while more than 3,000 potential cases remain unassigned.\u003c/p\u003e\n"},{"n":16,"title":"Forget Data Leakage: Shadow AI's Real Threat Is Access Control","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/forget-data-leakage-shadow-ais-real.html","time":"10:30","priority":"MAY READ","score":48,"tldr":"Shadow AI risk has evolved from employees leaking data into public tools to unmanaged AI agents operating inside companies with broad access to enterprise systems. Security teams need continuous inventory, ownership, scoped permissions, and lifecycle controls for these agents rather than relying on AI domain blocking or DLP alone.","briefOverview":"\u003cp\u003eThe article argues that shadow AI has shifted from a data leakage issue to an access control problem. Instead of focusing only on employees pasting sensitive data into public AI tools, security teams now need to understand which AI agents are operating inside the organization. These agents may be created through sanctioned platforms, browser extensions, SaaS-native features, developer tools, MCP servers, endpoint-based agents, and custom scripts.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents differ from traditional shadow IT because they can act inside enterprise systems rather than simply receive data. Agents may call APIs, use stored credentials, retrieve records, modify configurations, trigger workflows, and take actions in production systems without a human explicitly approving every step. A custom agent connected to systems such as Salesforce, Snowflake, GitHub, Gong, and Slack could perform read, write, or delete actions using permissions that were not properly audited.\u003c/p\u003e\n\n\u003cp\u003eThe article states that existing controls such as IAM policies, DLP rules, network monitoring, and blocking public AI domains do not adequately address this risk once agents have enterprise credentials. It recommends continuous discovery, ownership mapping, scoped access, credential visibility, behavioral context, and lifecycle management for AI agents. It also highlights that 65.4% of agentic chatbots in Token Security\u0026rsquo;s Agentic Pulse data have never been used since creation while their credentials remain active.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that shadow AI has shifted from a data leakage concern to an access control problem involving AI agents connected to enterprise systems.","AI agents can call APIs, use stored credentials, retrieve records, modify configurations, trigger workflows, and take actions in production systems without explicit human authorization for each step.","Existing controls such as IAM policies, DLP rules, network monitoring, and public AI domain blocking often do not provide visibility or control once agents have credentials to enterprise systems.","A real shadow AI inventory should identify where agents are created, who owns and can use them, what systems they connect to, what identities and secrets they use, what they have done, and whether they are still active.","The article recommends continuous discovery, defined ownership, scoped access, automated remediation, and lifecycle management for AI agents from creation through decommissioning."],"insights":["Dormant AI agents are a significant exposure because Token Security's Agentic Pulse data found that 65.4% of agentic chatbots have never been used since creation while their credentials remain active.","Blocking public AI domains is insufficient once an AI agent already has credentials to enterprise systems, because the relevant security boundary has already been crossed.","AI agents can become embedded in critical business processes within days after starting as quick experiments, making slow or periodic governance processes inadequate.","Developers may grant broad permissions upfront to avoid breaking AI-driven workflows, causing agents to accumulate creator-level privileges and permanent access that security and identity teams may not be able to audit effectively.","The article frames governed enablement as safer than hard blocking because strict blocking may push AI usage further underground and reduce security visibility."],"referencedReports":[{"title":"Autonomous But Not Controlled: AI Security Data Report","url":"https://www.token.security/lp/autonomous-but-not-controlled-ai-security-data-report-csa?utm_source=thehackernews\u0026utm_medium=3rdparty\u0026utm_campaign=thehackernews\u0026utm_content=june-19","publisher":"Token Security and Cloud Security Alliance","context":"The article cites new research from Token Security and the Cloud Security Alliance as mapping how widespread shadow AI access exposure has become.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that shadow AI has shifted from a data leakage issue to an access control problem. Instead of focusing only on employees pasting sensitive data into public AI tools, security teams now need to understand which AI agents are operating inside the organization. These agents may be created through sanctioned platforms, browser extensions, SaaS-native features, developer tools, MCP servers, endpoint-based agents, and custom scripts.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents differ from traditional shadow IT because they can act inside enterprise systems rather than simply receive data. Agents may call APIs, use stored credentials, retrieve records, modify configurations, trigger workflows, and take actions in production systems without a human explicitly approving every step. A custom agent connected to systems such as Salesforce, Snowflake, GitHub, Gong, and Slack could perform read, write, or delete actions using permissions that were not properly audited.\u003c/p\u003e\n\n\u003cp\u003eThe article states that existing controls such as IAM policies, DLP rules, network monitoring, and blocking public AI domains do not adequately address this risk once agents have enterprise credentials. It recommends continuous discovery, ownership mapping, scoped access, credential visibility, behavioral context, and lifecycle management for AI agents. It also highlights that 65.4% of agentic chatbots in Token Security\u0026rsquo;s Agentic Pulse data have never been used since creation while their credentials remain active.\u003c/p\u003e\n"},{"n":9,"title":"Every AI Agent Is an Identity. Most Organizations Don't Treat Them That Way","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/every-ai-agent-is-an-identity-most-organizations-dont-treat-them-that-way/","time":"13:10","priority":"MAY READ","score":45,"tldr":"AI agents should be treated as first-class identities because they can access and act across critical enterprise systems, often with excessive privileges and little visibility. Organizations need continuous discovery, ownership, least-privilege enforcement, and governance to prevent agents from becoming hidden paths for data exposure or lateral movement.","briefOverview":"\u003cp\u003eThe article argues that AI agents are becoming a new identity layer inside enterprises because they can retrieve information, trigger workflows, update records, write and deploy code, and act across multiple systems. It says organizations are connecting agents to services such as Salesforce, Snowflake, GitHub, Jira, production databases, and cloud environments. The article warns that agents are sometimes acting on behalf of humans, sometimes autonomously, and sometimes in ways where responsibility is unclear.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that many organizations lack security and governance models for these agent identities, creating what the article describes as high-privilege, low-visibility actors. Token Security cites a 2026 CSA survey saying 82% of organizations discovered at least one AI agent created without the knowledge of security, IT, or governance teams in the past year, and 41% found this happening multiple times. The article also says 65% of organizations experienced a security incident involving an AI agent in the past year, with 61% reporting exposure or mishandling of sensitive data.\u003c/p\u003e\n\n\u003cp\u003eThe article says security teams should focus not only on model risks such as prompt injection, jailbreaks, and unsafe outputs, but also on what each agent can actually access. It calls for discovery and inventory that identifies the agent owner, who can invoke it, connected systems, credentials used, and what it can read, write, delete, or execute. It argues that governance must be continuous because agents, instructions, user bases, and integrations change over time, allowing access to drift beyond the agent’s intended purpose.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that AI agents connected to services such as Salesforce, Snowflake, GitHub, Jira, production databases, and cloud environments should be treated as identities because they can retrieve information, trigger workflows, update records, write and deploy code, and act across multiple systems.","Token Security says 82% of organizations in a 2026 CSA survey discovered at least one AI agent created without the knowledge of security, IT, or governance teams in the past year, and 41% found this happening multiple times.","The article states that the main security question for AI agents is what they can access, because overprivileged agents connected to sensitive systems can enable data exfiltration, destructive action, or lateral movement if affected by a bad prompt, compromised session, malicious plugin, or misconfigured integration.","The article says security teams need AI agent discovery and inventory that identifies ownership, who can invoke each agent, connected systems, credentials used, and what each agent can read, write, delete, or execute.","The article argues that AI agent governance must be continuous because agents, instructions, user bases, and integrations change over time, which can cause their scope and access to expand beyond their intended purpose."],"insights":["The article reframes AI agent risk away from model behavior alone and toward access scope, emphasizing that the most important question for enterprise security teams is what each agent can actually reach and do.","An AI agent’s visible platform or stated function may not reveal its real exposure, because the article notes that an agent can rely on hidden service accounts, secrets, repositories, CI/CD pipelines, or privileged credentials in connected systems.","The article identifies purpose as a control point: comparing an agent’s intended job against its actual permissions can reveal risky gaps, such as a sales prep agent with delete access or a finance agent able to create privileged users.","Point-in-time access reviews are presented as insufficient for AI agents because their instructions, users, integrations, and connected systems can change after review, allowing scope to creep without an explicit bad decision."],"referencedReports":[{"title":"Autonomous But Not Controlled: AI Security Data Report","url":"https://www.token.security/lp/autonomous-but-not-controlled-ai-security-data-report-csa?utm_source=bleepingcomputer\u0026utm_medium=3rdparty\u0026utm_campaign=bleepingcomputer\u0026utm_content=june-19","publisher":"Cloud Security Alliance","context":"The article cites a 2026 CSA survey commissioned by Token Security for statistics on organizations discovering unknown AI agents and experiencing AI-agent-related security incidents.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI agents are becoming a new identity layer inside enterprises because they can retrieve information, trigger workflows, update records, write and deploy code, and act across multiple systems. It says organizations are connecting agents to services such as Salesforce, Snowflake, GitHub, Jira, production databases, and cloud environments. The article warns that agents are sometimes acting on behalf of humans, sometimes autonomously, and sometimes in ways where responsibility is unclear.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that many organizations lack security and governance models for these agent identities, creating what the article describes as high-privilege, low-visibility actors. Token Security cites a 2026 CSA survey saying 82% of organizations discovered at least one AI agent created without the knowledge of security, IT, or governance teams in the past year, and 41% found this happening multiple times. The article also says 65% of organizations experienced a security incident involving an AI agent in the past year, with 61% reporting exposure or mishandling of sensitive data.\u003c/p\u003e\n\n\u003cp\u003eThe article says security teams should focus not only on model risks such as prompt injection, jailbreaks, and unsafe outputs, but also on what each agent can actually access. It calls for discovery and inventory that identifies the agent owner, who can invoke it, connected systems, credentials used, and what it can read, write, delete, or execute. It argues that governance must be continuous because agents, instructions, user bases, and integrations change over time, allowing access to drift beyond the agent’s intended purpose.\u003c/p\u003e\n"},{"n":23,"title":"Data, System and Identity Sprawl All Need A Strategy","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/data-system-and-identity-sprawl-all-need-a-strategy","time":"01:39","priority":"MAY READ","score":45,"tldr":"Zero trust efforts often fail because organizations lack the visibility, control, and unified architecture needed to manage sprawling identities, devices, apps, and data. The article argues that effective zero trust requires continuous verification and consolidated traffic inspection and policy enforcement across the distributed enterprise.","briefOverview":"\u003cp\u003eThe article argues that zero trust is widely endorsed as a way to reduce cyber risk and minimize breach impact, but many organizations stall, partially implement, or abandon their efforts. It says one reason is that zero trust is not a product, but an architectural and operational model whose meaning varies depending on who is asked. Without a consistent and actionable definition, zero trust becomes an aspiration rather than an executable strategy.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that zero trust depends on comprehensive visibility into and control over users, devices, applications, and data. It notes that employees interact with many SaaS applications each week, access occurs from both managed and unmanaged devices, and identity sprawl now includes service accounts, API tokens, and other non-human identities. It also states that authentication alone is insufficient without continuous context, behavior, and risk assessment.\u003c/p\u003e\n\n\u003cp\u003eThe article says data sprawl further complicates zero trust because enterprise data is spread across cloud infrastructure, SaaS platforms, on-prem systems, legacy environments, endpoints, personal cloud storage, databases, data lakes, and mainframes. It argues that success requires complete traffic visibility, unified policy enforcement, and continuous verification rather than implicit trust or layers of point solutions on legacy designs. Netskope presents Netskope One as a globally distributed platform for inspecting and controlling traffic to applications and data regardless of user location or device posture.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Many organizations stall, partially implement, or abandon zero trust initiatives because zero trust is an architectural and operational model whose meaning varies significantly across stakeholders.","Zero trust requires comprehensive visibility into and control over users, devices, applications, and data, but enterprise employees often use many SaaS applications across managed and unmanaged devices.","Identity sprawl includes human identities as well as service accounts, API tokens, and other non-human identities, making authentication alone insufficient without continuous context, behavior, and risk assessment.","Enterprise data is spread across cloud infrastructure, SaaS platforms, on-prem systems, legacy environments, endpoints, personal cloud storage, databases, data lakes, and mainframes, complicating zero trust implementation.","Netskope says its Netskope One platform provides a globally distributed way to inspect and control traffic to applications and data regardless of user location or device posture."],"insights":["A zero trust program can fail before technology is chosen if the organization lacks a shared, actionable definition of what zero trust means operationally.","The article frames non-human identities such as service accounts and API tokens as part of the same control problem as employee access, making identity governance broader than user login management.","The hardest starting point for zero trust may be data location and context, because sensitive data is spread across SaaS, cloud, on-premises systems, endpoints, personal storage, and AI-driven tools.","The article argues that adding more point solutions to legacy designs is less effective than simplifying architecture around unified visibility, policy enforcement, and continuous verification."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that zero trust is widely endorsed as a way to reduce cyber risk and minimize breach impact, but many organizations stall, partially implement, or abandon their efforts. It says one reason is that zero trust is not a product, but an architectural and operational model whose meaning varies depending on who is asked. Without a consistent and actionable definition, zero trust becomes an aspiration rather than an executable strategy.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that zero trust depends on comprehensive visibility into and control over users, devices, applications, and data. It notes that employees interact with many SaaS applications each week, access occurs from both managed and unmanaged devices, and identity sprawl now includes service accounts, API tokens, and other non-human identities. It also states that authentication alone is insufficient without continuous context, behavior, and risk assessment.\u003c/p\u003e\n\n\u003cp\u003eThe article says data sprawl further complicates zero trust because enterprise data is spread across cloud infrastructure, SaaS platforms, on-prem systems, legacy environments, endpoints, personal cloud storage, databases, data lakes, and mainframes. It argues that success requires complete traffic visibility, unified policy enforcement, and continuous verification rather than implicit trust or layers of point solutions on legacy designs. Netskope presents Netskope One as a globally distributed platform for inspecting and controlling traffic to applications and data regardless of user location or device posture.\u003c/p\u003e\n"},{"n":25,"title":"Introducing Repository Access Permissions and Custom Roles","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/introducing-repository-access-permissions-custom-roles?utm_medium=feed","time":"17:46","priority":"MAY READ","score":45,"tldr":"Socket introduced Custom Roles and Repository Access Permissions so organization admins can define exactly what users can do and limit those permissions to specific repositories. The goal is to support least-privilege access at scale without relying on broad built-in roles.","briefOverview":"\u003cp\u003eSocket now supports Custom Roles and Repository Access Permissions for organizations, giving teams more granular control over who can do what and where they can do it. The features are designed for organizations where users may need to review alerts, manage scans, or support projects without receiving access to the entire organization. Socket says this helps admins avoid the tradeoff between assigning broad built-in roles and limiting collaboration.\u003c/p\u003e\n\n\u003cp\u003eThe new access model has two layers: Custom Roles define what actions a user can perform, and Repository Access Permissions define which repositories those actions apply to. Admins can create roles from a base role or from scratch, add specific permissions and scopes, view inherited permissions separately from explicitly added permissions, and assign custom roles to members. Example roles include Security Analyst, AppSec Admin, Read-only Auditor, and Developer Contributor.\u003c/p\u003e\n\n\u003cp\u003eRepository Access Permissions let admins grant members access to selected repositories or to all repositories, and Socket enforces repository scope across repository lists, scans, SBOM views, dependency inventory, and supported API paths. Repository access changes are logged as audit events, and dedicated RBAC permissions govern who can manage repository access and related access-policy controls. The features are available today to all Socket organization admins in the dashboard under organization settings.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Socket now supports Custom Roles and Repository Access Permissions to give organizations more granular access control.","Custom Roles define what actions a user can perform, while Repository Access Permissions define which repositories those actions apply to.","Admins can create, edit, and delete custom roles, choose a base role or start from scratch, add specific permissions and scopes, and assign custom roles to organization members.","Repository Access Permissions let admins grant members access to selected repositories or to all repositories, and Socket enforces repository scope across repository lists, scans, SBOM views, dependency inventory, and supported API paths.","Custom Roles and Repository Access Permissions are available today to all Socket organization admins in the dashboard under organization settings."],"insights":["Repository access enforcement only begins after admins configure rules, so existing access does not change unexpectedly during adoption.","Socket separates inherited permissions from explicitly added permissions in custom roles, which can help admins understand and audit how a role gets its access.","Repository access rule changes are logged as audit events, giving organizations a record of changes to repository visibility.","Dedicated RBAC permissions control who can manage repository access and related access-policy controls, so the ability to delegate access can itself be restricted."],"referencedReports":[],"body":"\u003cp\u003eSocket now supports Custom Roles and Repository Access Permissions for organizations, giving teams more granular control over who can do what and where they can do it. The features are designed for organizations where users may need to review alerts, manage scans, or support projects without receiving access to the entire organization. Socket says this helps admins avoid the tradeoff between assigning broad built-in roles and limiting collaboration.\u003c/p\u003e\n\n\u003cp\u003eThe new access model has two layers: Custom Roles define what actions a user can perform, and Repository Access Permissions define which repositories those actions apply to. Admins can create roles from a base role or from scratch, add specific permissions and scopes, view inherited permissions separately from explicitly added permissions, and assign custom roles to members. Example roles include Security Analyst, AppSec Admin, Read-only Auditor, and Developer Contributor.\u003c/p\u003e\n\n\u003cp\u003eRepository Access Permissions let admins grant members access to selected repositories or to all repositories, and Socket enforces repository scope across repository lists, scans, SBOM views, dependency inventory, and supported API paths. Repository access changes are logged as audit events, and dedicated RBAC permissions govern who can manage repository access and related access-policy controls. The features are available today to all Socket organization admins in the dashboard under organization settings.\u003c/p\u003e\n"},{"n":6,"title":"Webinar: How attackers bypass MFA and how defenders can respond","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-how-attackers-bypass-mfa-and-how-defenders-can-respond/","time":"12:12","priority":"MAY READ","score":35,"tldr":"BleepingComputer is hosting a July 8, 2026 webinar on how attackers use techniques like Device Code phishing to bypass traditional MFA protections and gain persistent account access. The session will focus on using behavioral AI and automation to detect account takeover earlier and speed response.","briefOverview":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo; The session will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. The webinar will examine how modern phishing campaigns, business email compromise, and account takeover attacks exploit trusted services and authentication workflows to gain access to corporate accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article says many organizations view multi-factor authentication as one of their strongest defenses, but attackers increasingly use phishing techniques that do not require stealing passwords or bypassing MFA. One highlighted technique is Device Code phishing, where attackers trick users into authorizing access through legitimate Microsoft authentication pages. Because users complete a real login and MFA challenge, attackers can obtain persistent access without ever stealing credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article states that traditional email defenses, credential monitoring, and MFA protections may not detect these attacks, leaving analysts to investigate suspicious activity only after an account has already been compromised. Abnormal AI uses behavioral AI to identify unusual account activity, suspicious communications, and attack patterns that conventional security controls may miss. Attendees will learn approaches for detecting account compromise earlier, reducing investigation workloads, and improving response times through automation and behavioral analysis.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["BleepingComputer will host a live webinar on July 8, 2026 titled \"Stop chasing alerts: Automating email security with behavioral AI.\"","The webinar will examine how modern phishing campaigns, business email compromise, and account takeover attacks exploit trusted services and authentication workflows to gain access to corporate accounts.","Device Code phishing tricks users into authorizing access through legitimate Microsoft authentication pages, allowing attackers to obtain persistent access without stealing credentials.","The article says traditional email defenses, credential monitoring, and MFA protections may not detect these attacks until after an account has been compromised.","The webinar will cover how behavioral AI can identify suspicious account activity, automate investigations, reduce response times, and limit account takeover risks."],"insights":["Attackers can use a real Microsoft login and MFA challenge as part of the compromise, meaning a successful MFA event does not necessarily indicate that account access is legitimate.","The article frames Device Code phishing as a token-access problem rather than a password-theft problem, which helps explain why credential monitoring may not catch it.","The recommended detection focus shifts from blocking suspicious emails alone to identifying unusual account activity and communications after authentication has occurred.","The operational impact is not only account compromise risk but also increased investigation workload for analysts when conventional controls fail to detect the activity early."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo; The session will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. The webinar will examine how modern phishing campaigns, business email compromise, and account takeover attacks exploit trusted services and authentication workflows to gain access to corporate accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article says many organizations view multi-factor authentication as one of their strongest defenses, but attackers increasingly use phishing techniques that do not require stealing passwords or bypassing MFA. One highlighted technique is Device Code phishing, where attackers trick users into authorizing access through legitimate Microsoft authentication pages. Because users complete a real login and MFA challenge, attackers can obtain persistent access without ever stealing credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article states that traditional email defenses, credential monitoring, and MFA protections may not detect these attacks, leaving analysts to investigate suspicious activity only after an account has already been compromised. Abnormal AI uses behavioral AI to identify unusual account activity, suspicious communications, and attack patterns that conventional security controls may miss. Attendees will learn approaches for detecting account compromise earlier, reducing investigation workloads, and improving response times through automation and behavioral analysis.\u003c/p\u003e\n"},{"n":18,"title":"From Assistive to Agentic: The AI Shift That's Redefining Threat Management","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/from-assistive-to-agentic-ai-shift.html","time":"11:58","priority":"MAY READ","score":35,"tldr":"The article argues that security teams need to move from assistive AI tools to agentic AI systems that can continuously connect threat intelligence, exposure validation, and response for CTEM at machine speed. It promotes Filigran’s XTM One CTEM Assistant as a purpose-built way to operationalize that closed-loop threat management model.","briefOverview":"\u003cp\u003eThe article argues that enterprise security teams have many tools but still struggle because those tools operate in silos and create overlapping alerts and data. It says breach dwell times remain long and res <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
