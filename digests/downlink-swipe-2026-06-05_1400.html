<script type="application/json" id="dl-articles">[{"n":1,"title":"Over 900 US gas station tank gauge systems exposed to attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/over-900-us-gas-station-tank-gauge-systems-exposed-to-attacks/","time":"14:50","priority":"SHOULD READ","score":88,"tldr":"Over 900 internet-exposed automatic tank gauge systems in the U.S. are vulnerable to ongoing attacks that could let hackers change settings, disable alerts, and disrupt fuel or chemical tank monitoring. U.S. agencies are urging critical infrastructure operators to remove direct internet access, secure remote access, change default passwords, and patch affected devices.","briefOverview":"\u003cp\u003eOver 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks. These systems are used to monitor fuel, chemical, and other liquid storage tanks across critical infrastructure sectors. U.S. agencies warned that attackers are targeting internet-exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eThe joint advisory from CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners said attackers exploit flaws such as hardcoded credentials, authentication bypasses, SQL injection, OS command execution issues, and privilege escalation weaknesses. CISA warned that successful compromises could let attackers disable system alerts, increasing the risk of leaks, equipment failures, or permanent damage to tank systems. Shadowserver reported 1,061 exposed ATG IPs on June 5, 2026, with 909 in the United States.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOver 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks. ATG systems are electronic monitoring devices used to remotely track fuel, chemicals, or other liquids in storage tanks. They support inventory control, environmental leak detection, and regulatory compliance, and are commonly used at gas stations as well as industrial sites.\u003c/p\u003e\n\n\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a joint advisory warning critical infrastructure organizations to secure internet-exposed ATG systems. The advisory said recent malicious activity involved threat actors compromising internet-exposed ATG systems and modifying them through command execution. The U.S. government has not attributed the activity to a specific nation-state or threat actor group.\u003c/p\u003e\n\n\u003cp\u003eThe agencies warned that attackers target these devices by exploiting several types of security weaknesses. The listed issues include hardcoded credentials, authentication bypasses, SQL injection vulnerabilities, OS command execution flaws, and privilege escalation weaknesses. After successful compromise, attackers could disable alerts, raising the risk of leaks, equipment failures, and permanent damage to targeted tank systems.\u003c/p\u003e\n\n\u003cp\u003eShadowserver said it added ATG system scanning to its Accessible ICS reporting and observed 1,061 IPs on June 5, 2026, on port 10001/tcp. It said the vast majority of exposed devices were in the United States, with 909 devices identified there. Shadowserver also said it removed a large number of apparent honeypots, including systems on ports 8001 and 9001, from its count.\u003c/p\u003e\n\n\u003cp\u003eCritical infrastructure organizations are advised to restrict remote access to ATG systems from the internet and use controlled access through firewalls, VPNs, or access control lists. They are also advised to replace default passwords with strong credentials, apply security updates, monitor for unauthorized changes, and implement multi-factor authentication where possible. The article also notes a May CNN report that Iranian hackers had breached internet-connected ATG systems at multiple U.S. gas stations, reportedly manipulating display readings without changing actual fuel levels.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOver 900 automatic tank gauge systems across the United States have been found exposed online and vulnerable to ongoing attacks. These ATG systems are used to monitor fuel, chemical, and other liquid storage tanks across multiple critical infrastructure sectors. They are commonly used at gas stations to monitor fuel tank levels, but they can also be found in industrial environments that track chemical storage tanks.\u003c/p\u003e\n\n\u003cp\u003eATG systems automate functions such as inventory control, environmental leak detection, and regulatory compliance. Because these systems support monitoring and safety-related functions, unauthorized modification can create operational risks beyond simple data tampering.\u003c/p\u003e\n\n\u003ch2 id=\"government-warning\"\u003eGovernment warning\u003c/h2\u003e\n\n\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a joint advisory warning critical infrastructure organizations to secure internet-exposed ATG systems. The advisory said recent malicious cyber activity involved threat actors compromising internet-exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the U.S. government has not attributed this recent activity to a nation-state or specific threat actor group. The advisory nonetheless describes ongoing attacks against exposed ATG systems and urges operators to take defensive action.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-described-in-the-advisory\"\u003eTechnical details described in the advisory\u003c/h2\u003e\n\n\u003cp\u003eThe federal agencies warned that threat actors target ATG systems by exploiting multiple kinds of security weaknesses. The article lists the following flaws and techniques referenced by the advisory:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHardcoded credentials.\u003c/li\u003e\n\u003cli\u003eAuthentication bypasses.\u003c/li\u003e\n\u003cli\u003eSQL injection vulnerabilities.\u003c/li\u003e\n\u003cli\u003eOS command execution flaws.\u003c/li\u003e\n\u003cli\u003ePrivilege escalation weaknesses.\u003c/li\u003e\n\u003cli\u003eCommand execution used to modify compromised systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says attackers can alter system settings after exploiting such flaws. CISA also cautioned that attackers could disable system alerts after successful compromise.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impact\"\u003ePotential impact\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that compromised ATG systems could create safety and operational risks. If attackers disable alerts, organizations may face increased risk of leaks or equipment failures. CISA also warned that attacks could even cause permanent damage to targeted tank systems.\u003c/p\u003e\n\n\u003cp\u003eThe article separately notes that previously reported gas station incidents involved manipulated display readings but did not alter actual fuel levels. Even without physical damage in those incidents, the article says such activity raises concerns that attacks could hinder automated fuel leak detection and similar safety-related functions.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-data-from-shadowserver\"\u003eExposure data from Shadowserver\u003c/h2\u003e\n\n\u003cp\u003eFollowing CISA’s advisory, Shadowserver reported that more than 1,000 ATG systems were exposed online. Shadowserver said it added scanning of ATG systems to its Accessible ICS reporting and saw 1,061 IPs on June 5, 2026, on port 10001/tcp.\u003c/p\u003e\n\n\u003cp\u003eAccording to Shadowserver, the vast majority of those exposed devices were in the United States. The article reports that 909 exposed devices were located in the United States. Shadowserver also said it removed a large number of systems that appeared to be honeypots, including systems using ports 8001 and 9001.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended response\u003c/h2\u003e\n\n\u003cp\u003eThe article says critical infrastructure organizations should restrict remote access to ATG systems from the internet as soon as possible. It recommends implementing controlled access through firewalls, VPNs, or access control lists.\u003c/p\u003e\n\n\u003cp\u003eOrganizations are also advised to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReplace default passwords on vulnerable devices with strong credentials.\u003c/li\u003e\n\u003cli\u003eApply security updates.\u003c/li\u003e\n\u003cli\u003eMonitor systems for unauthorized changes.\u003c/li\u003e\n\u003cli\u003eImplement multi-factor authentication where possible.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-activity-involving-iranian-hackers\"\u003eRelated activity involving Iranian hackers\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA’s warning followed a May CNN report that Iranian hackers had breached internet-connected ATG systems at multiple gas stations across the United States. According to the article, Iranian hacking groups were linked to those incidents based on their previous history of targeting fuel management systems and other industrial control technologies.\u003c/p\u003e\n\n\u003cp\u003eIn those incidents, attackers reportedly hacked devices with weak or nonexistent passwords and manipulated display readings. The article states that they did not alter the actual fuel levels and that the incidents did not cause physical damage.\u003c/p\u003e\n\n\u003ch2 id=\"broader-industrial-control-system-context\"\u003eBroader industrial control system context\u003c/h2\u003e\n\n\u003cp\u003eThe article also references an April joint advisory from U.S. federal agencies that linked Iranian state-backed hackers to attacks targeting Rockwell Automation/Allen-Bradley PLC devices since March 2026. Those attacks reportedly caused financial losses and operational disruptions.\u003c/p\u003e\n\n\u003cp\u003eIt further notes that Censys later reported that 74.6%, or 3,891 hosts, of such exposed industrial control systems found globally were in the United States.\u003c/p\u003e\n","keyPoints":["Over 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks.","CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a joint advisory urging critical infrastructure organizations to secure internet-exposed automatic tank gauge systems.","The advisory said attackers are exploiting issues including hardcoded credentials, authentication bypasses, SQL injection, OS command execution flaws, and privilege escalation weaknesses to modify compromised systems through command execution.","Shadowserver reported 1,061 exposed automatic tank gauge system IPs on June 5, 2026, with 909 of the devices located in the United States.","Critical infrastructure organizations are advised to restrict internet-based remote access, use firewalls, VPNs, or access control lists, replace default passwords, apply updates, monitor for unauthorized changes, and enable multi-factor authentication where possible."],"insights":["Shadowserver said it excluded a large number of apparent honeypots from its count, indicating the reported 1,061 exposed ATG IPs were filtered to focus on likely real systems.","The advisory warns that compromised ATG systems could have alerts disabled, which makes the operational risk about missed leaks or equipment failures rather than only manipulated readings.","The article notes that recent gas station incidents reportedly involved manipulated display readings without changes to actual fuel levels, showing that even non-destructive access can interfere with safety-related monitoring functions.","The exposed ATG systems were found on port 10001/tcp, giving operators a concrete network indicator to check when identifying internet-facing devices."],"referencedReports":[{"title":"Joint advisory warning critical infrastructure organizations to secure internet-exposed ATG systems","url":"https://www.ic3.gov/CSA/2026/260602.pdf","publisher":"CISA, FBI, NSA, U.S. Department of Energy, and other U.S. government partners","context":"The article cites this joint advisory as the source of the warning that internet-exposed automatic tank gauge systems are being compromised and modified through command execution.","category":"","primary":false}],"body":"\u003cp\u003eOver 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks. These systems are used to monitor fuel, chemical, and other liquid storage tanks across critical infrastructure sectors. U.S. agencies warned that attackers are targeting internet-exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eThe joint advisory from CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners said attackers exploit flaws such as hardcoded credentials, authentication bypasses, SQL injection, OS command execution issues, and privilege escalation weaknesses. CISA warned that successful compromises could let attackers disable system alerts, increasing the risk of leaks, equipment failures, or permanent damage to tank systems. Shadowserver reported 1,061 exposed ATG IPs on June 5, 2026, with 909 in the United States.\u003c/p\u003e\n"},{"n":4,"title":"Android Spyware Asin Targets Arabic Users via Fake News, PDF and War Map Apps","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/android-spyware-asin-targets-arabic.html","time":"14:53","priority":"MAY READ","score":72,"tldr":"ESET says a new Android spyware called Asin is targeting Arabic-speaking users through fake news, PDF reader, and war map apps promoted via fraudulent websites and social media. The campaigns appear aimed at people interested in conflict tracking and open-source investigations, possibly including journalists and OSINT researchers.","briefOverview":"\u003cp\u003eESET reported that Arabic-speaking users are being targeted by a new Android spyware codenamed Asin. The malware was first detected across multiple campaigns in early 2025. The campaigns used websites that mimicked utilities, war-related updates, and a government news source.\u003c/p\u003e\n\n\u003cp\u003eThe fraudulent sites distributed malicious Android apps that combined legitimate functionality with stealthy spyware capabilities. The sites included govlens.net, pdf-reader.help, live-war-map.com, c-pdf.net, and syriadefensemap.com. Some were promoted through dedicated Facebook and Telegram accounts.\u003c/p\u003e\n\n\u003cp\u003eThe activity cluster remains unattributed, and ESET said the primary objectives are not known. Based on the lures, ESET suggested that journalists and OSINT researchers in Arabic-speaking regions may have been targeted. Users had to manually install the apps and grant permissions for the spyware to achieve its goals.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eESET said it identified a new Android spyware called Asin targeting Arabic-speaking users. The company first detected the malware being distributed through multiple campaigns in early 2025. Each campaign used distinct websites designed to look like utilities, conflict-related update services, or a government news source.\u003c/p\u003e\n\n\u003cp\u003eThe identified websites included govlens.net, which impersonated a government news source, pdf-reader.help, which impersonated a secure PDF editor, and live-war-map.com, which claimed to provide military incident updates. ESET also identified an APK downloaded from c-pdf.net and another sample downloaded from syriadefensemap.com. Two of the sites, govlens.net and live-war-map.com, were marketed through Facebook and Telegram accounts.\u003c/p\u003e\n\n\u003cp\u003eAccording to ESET, the malicious apps combined legitimate functionality with stealthy spyware capabilities. The Telegram channel name t.me/liveuamap_ar was likely inspired by Liveuamap, a legitimate platform that maps conflicts, human rights issues, natural disasters, and geopolitical events. In at least one case, the APK was presented as “Syria Defense Map.”\u003c/p\u003e\n\n\u003cp\u003eThe article says users needed to manually install the app and grant it the necessary permissions for the spyware to carry out its goals. Multiple Asin-related artifacts were identified, including one uploaded to VirusTotal from Türkiye in October 2025 and samples observed on Xiaomi Redmi Note 13 series devices running Android 15. One sample was detected around mid-January 2026 on Xiaomi Redmi Note 13 Pro+ 5G devices.\u003c/p\u003e\n\n\u003cp\u003eESET said the activity cluster remains unattributed, and the main objectives of the campaigns are unknown. However, the company said that three of the five fraudulent apps it found, GovLens, WarMap, and Syria Defense Map, appeared intended for people interested in open-source investigation. ESET said this made it possible that the activity was at least partially aimed at Arabic-speaking journalists or OSINT practitioners.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eESET reported a new Android spyware codenamed \u003cstrong\u003eAsin\u003c/strong\u003e targeting Arabic-speaking users. The malware was first detected by the company across multiple campaigns in early 2025. The campaigns used websites that imitated a government news source, utility apps, and war-related update services.\u003c/p\u003e\n\n\u003cp\u003eThe article says each website distributed a malicious Android app that mixed legitimate functionality with stealthy spyware capabilities. ESET did not attribute the activity cluster to a known actor. The primary objectives of the campaigns are also not known.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-infrastructure\"\u003eDistribution Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eESET identified several websites connected to Asin distribution. These sites were presented as useful or timely services for Arabic-speaking users.\u003c/p\u003e\n\n\u003cp\u003eThe article lists the following domains:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003egovlens.net\u003c/strong\u003e, which impersonated a government news source and was registered on May 27, 2025.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003epdf-reader.help\u003c/strong\u003e, which impersonated a secure PDF editor and was registered on May 29, 2025.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003elive-war-map.com\u003c/strong\u003e, which claimed to offer updates on military incidents and was registered on January 20, 2025.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ec-pdf.net\u003c/strong\u003e, from which an APK was downloaded in December 2025.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003esyriadefensemap.com\u003c/strong\u003e, from which an APK masquerading as “Syria Defense Map” was downloaded.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTwo of the fraudulent websites were also promoted through social media accounts. The article identifies \u003cstrong\u003ewww.facebook.com/GovLens\u003c/strong\u003e and \u003cstrong\u003et.me/liveuamap_ar\u003c/strong\u003e as dedicated accounts used to market govlens.net and live-war-map.com.\u003c/p\u003e\n\n\u003ch2 id=\"social-media-and-brand-imitation\"\u003eSocial Media and Brand Imitation\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the Telegram channel name was likely inspired by \u003cstrong\u003eLive Universal Awareness Map\u003c/strong\u003e, also known as \u003cstrong\u003eLiveuamap\u003c/strong\u003e. Liveuamap is described as a legitimate and well-known platform for mapping ongoing conflicts, human rights issues, natural disasters, and geopolitical events worldwide.\u003c/p\u003e\n\n\u003cp\u003eThis reference is relevant because one of the malicious campaign themes involved war maps and military incident updates. The article does not say that the legitimate Liveuamap platform was compromised. It only states that the Telegram channel name was likely inspired by the legitimate service.\u003c/p\u003e\n\n\u003ch2 id=\"malware-behavior-and-installation-requirements\"\u003eMalware Behavior and Installation Requirements\u003c/h2\u003e\n\n\u003cp\u003eESET said the apps distributed by the fraudulent websites combined legitimate functionality with spyware capabilities. The article does not provide a full technical breakdown of Asin’s spyware functions. It does state that the user must manually install the app and grant the required permissions for the spyware to realize its goals.\u003c/p\u003e\n\n\u003cp\u003eThis means the campaigns depended on users downloading APKs from the associated websites and approving permissions during installation or use. The article does not describe exploitation of a vulnerability or automatic infection. It frames the activity around malicious apps distributed through deceptive websites and promoted through social media.\u003c/p\u003e\n\n\u003ch2 id=\"observed-artifacts-and-devices\"\u003eObserved Artifacts and Devices\u003c/h2\u003e\n\n\u003cp\u003eThe article describes multiple artifacts associated with Asin. One artifact was uploaded to VirusTotal from Türkiye in October 2025. Another APK was downloaded from \u003cstrong\u003ec-pdf.net\u003c/strong\u003e in December 2025 by a user on a \u003cstrong\u003eXiaomi Redmi Note 13 Pro\u003c/strong\u003e running \u003cstrong\u003eAndroid 15\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eA third sample masquerading as \u003cstrong\u003e“Syria Defense Map”\u003c/strong\u003e was detected on \u003cstrong\u003eXiaomi Redmi Note 13 Pro+ 5G\u003c/strong\u003e devices running \u003cstrong\u003eAndroid 15\u003c/strong\u003e around mid-January 2026. In that case, the APK was downloaded from \u003cstrong\u003esyriadefensemap.com\u003c/strong\u003e. The article does not disclose the number of affected users.\u003c/p\u003e\n\n\u003ch2 id=\"potential-targeting\"\u003ePotential Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe activity appears focused on Arabic-speaking users. ESET said the use of certain lures suggests that journalists and OSINT researchers in Arabic-speaking regions may have been among the targets.\u003c/p\u003e\n\n\u003cp\u003eThe company specifically noted that three of the five fraudulent apps it found, \u003cstrong\u003eGovLens\u003c/strong\u003e, \u003cstrong\u003eWarMap\u003c/strong\u003e, and \u003cstrong\u003eSyria Defense Map\u003c/strong\u003e, seemed primarily intended for people interested in open-source investigation. Based on that observation, ESET said the activity may have been, at least partially, meant to target Arabic-speaking journalists or OSINT practitioners.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-objectives\"\u003eAttribution and Objectives\u003c/h2\u003e\n\n\u003cp\u003eESET said the activity cluster remains unattributed. The article does not name any suspected threat actor or group. It also states that the primary objectives of the campaigns are not known.\u003c/p\u003e\n\n\u003cp\u003eThe only stated assessment of possible targeting is based on the themes of the fraudulent apps and websites. These themes included government news, PDF editing, war maps, military incident updates, and Syria-related defense mapping.\u003c/p\u003e\n","keyPoints":["ESET reported that Arabic-speaking users are being targeted by a new Android spyware codenamed Asin.","ESET first detected Asin being spread through multiple campaigns in early 2025 using websites that mimicked utilities, war-related updates, and a government news source.","The identified distribution sites included govlens.net, pdf-reader.help, live-war-map.com, c-pdf.net, and syriadefensemap.com.","Some Asin-related sites were promoted through dedicated Facebook and Telegram accounts, including www.facebook.com/GovLens and t.me/liveuamap_ar.","ESET said the activity cluster remains unattributed and that the lures suggest Arabic-speaking journalists or OSINT practitioners may have been targeted."],"insights":["The spyware depends on users manually installing the APK and granting permissions, making sideloading controls and permission scrutiny especially relevant defenses for the described campaigns.","Several samples were observed on Xiaomi Redmi Note 13 devices running Android 15, showing that the activity involved recent Android versions and modern consumer devices.","The Telegram channel t.me/liveuamap_ar appears to borrow from the name of the legitimate Liveuamap platform, making brand imitation a notable part of the lure.","Three of the five fraudulent apps identified by ESET used open-source investigation or conflict-monitoring themes, narrowing the likely audience beyond general Arabic-speaking users."],"referencedReports":[{"title":"ESET APT Activity Report Q4 2025–Q1 2026","url":"https://www.welivesecurity.com/en/eset-research/eset-apt-activity-report-q4-2025-q1-2026/","publisher":"ESET","context":"The article cites ESET's findings as the source for reporting that Arabic-speaking users are being targeted by the Android spyware Asin.","category":"","primary":false}],"body":"\u003cp\u003eESET reported that Arabic-speaking users are being targeted by a new Android spyware codenamed Asin. The malware was first detected across multiple campaigns in early 2025. The campaigns used websites that mimicked utilities, war-related updates, and a government news source.\u003c/p\u003e\n\n\u003cp\u003eThe fraudulent sites distributed malicious Android apps that combined legitimate functionality with stealthy spyware capabilities. The sites included govlens.net, pdf-reader.help, live-war-map.com, c-pdf.net, and syriadefensemap.com. Some were promoted through dedicated Facebook and Telegram accounts.\u003c/p\u003e\n\n\u003cp\u003eThe activity cluster remains unattributed, and ESET said the primary objectives are not known. Based on the lures, ESET suggested that journalists and OSINT researchers in Arabic-speaking regions may have been targeted. Users had to manually install the apps and grant permissions for the spyware to achieve its goals.\u003c/p\u003e\n"},{"n":3,"title":"Dark web Nemesis Market vendor gets 26 years for selling drugs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/dark-web-nemesis-market-vendor-gets-26-years-for-selling-drugs/","time":"17:50","priority":"MAY READ","score":64,"tldr":"A San Jose man was sentenced to more than 26 years in federal prison for selling fentanyl and methamphetamine through the dark web marketplace Nemesis Market. The case highlights law enforcement’s continued targeting of dark web drug trafficking operations, even after marketplace takedowns.","briefOverview":"\u003cp\u003eA California man, 39-year-old Darren Hughes of San Jose, was sentenced to more than 26 years in federal prison for trafficking fentanyl and methamphetamine through Nemesis Market. Hughes was convicted on drug trafficking charges in November 2025 and sentenced by U.S. District Judge John F. Kness on May 26. Prosecutors said he operated a store on Nemesis Market, one of the world’s largest dark web marketplaces.\u003c/p\u003e\n\n\u003cp\u003eAccording to court documents, Hughes offered potential clients free methamphetamine samples through the marketplace. After sending a free sample to an undercover law enforcement agent, he sold the agent methamphetamine and fentanyl pills on five separate occasions in 2023 in exchange for cryptocurrency. He was arrested on June 28, 2023, after another arranged sale with undercover agents.\u003c/p\u003e\n\n\u003cp\u003eDetectives found approximately 672 grams of methamphetamine and a loaded 9mm ghost gun with no serial number during a search of Hughes’ vehicle. Nemesis Market was taken down by German and American authorities in March 2024 after growing to more than 150,000 user accounts and 1,100 seller accounts. Authorities said the case shows that dark web marketplaces are not beyond law enforcement’s reach.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDarren Hughes, a 39-year-old man from San Jose, California, was sentenced to more than 26 years in federal prison for trafficking fentanyl and methamphetamine through Nemesis Market. He was convicted on drug trafficking charges in November 2025 and sentenced by U.S. District Judge John F. Kness on May 26. The article describes Nemesis Market as one of the world’s largest dark web marketplaces before its takedown.\u003c/p\u003e\n\n\u003cp\u003eCourt documents said Hughes operated a store on Nemesis Market that offered free samples of methamphetamine to potential clients. An undercover law enforcement agent contacted him and received one of the free methamphetamine samples. Hughes then sold the agent methamphetamine and fentanyl pills on five separate occasions in 2023, receiving cryptocurrency as payment.\u003c/p\u003e\n\n\u003cp\u003eThe Redwood City Police Department arrested Hughes in California on June 28, 2023, after arranging another sale with undercover agents. Detectives from the Street Crime Suppression Team searched his vehicle and found approximately 672 grams of methamphetamine. They also found a loaded 9mm “ghost gun” with no serial number.\u003c/p\u003e\n\n\u003cp\u003eU.S. Attorney Andrew S. Boutros said criminals selling drugs on the dark web mistakenly believe they are beyond the reach of federal law enforcement. IRS-CI SAC Adam Jobes said dark web marketplaces may seem anonymous, but no platform is beyond law enforcement’s reach. Both statements framed the case as part of broader law enforcement action against online drug trafficking.\u003c/p\u003e\n\n\u003cp\u003eNemesis Market launched in 2021 and was taken down by German and American authorities in March 2024. At its peak, it hosted more than 150,000 user accounts and 1,100 seller accounts, and processed over 400,000 orders. The article says those orders included roughly 17,000 for opioids such as fentanyl, heroin, and oxycodone, and more than 55,000 for meth, cocaine, and crack cocaine.\u003c/p\u003e\n\n\u003cp\u003eGermany’s Federal Criminal Police Office and Frankfurt’s cybercrime unit led the Nemesis Market shutdown on March 20, 2024. Authorities seized infrastructure in Germany and Lithuania and confiscated roughly $100,000 in cash. The investigation began in October 2022 and involved German, Lithuanian, and American agencies, including the FBI, DEA, and IRS Criminal Investigation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA California man, Darren Hughes of San Jose, was sentenced to more than 26 years in federal prison for trafficking fentanyl and methamphetamine through Nemesis Market. Hughes was 39 years old and had been convicted on drug trafficking charges in November 2025. U.S. District Judge John F. Kness sentenced him on May 26.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Nemesis Market as one of the world’s largest dark web marketplaces before it was taken down. Hughes used the marketplace to operate a store that offered potential customers free methamphetamine samples. His case centered on drug sales conducted through the dark web and paid for with cryptocurrency.\u003c/p\u003e\n\n\u003ch2 id=\"conduct-described-in-court-documents\"\u003eConduct Described in Court Documents\u003c/h2\u003e\n\n\u003cp\u003eAccording to court documents, Hughes operated a store on Nemesis Market where he offered potential clients free samples of methamphetamine. An undercover law enforcement agent contacted him and received one of those free samples. After that, Hughes sold the undercover agent methamphetamine and fentanyl pills on five separate occasions in 2023.\u003c/p\u003e\n\n\u003cp\u003eThe article states that these transactions were paid for using cryptocurrency. It does not specify the cryptocurrency used. The activity described in the case involved both stimulant and opioid drugs, including methamphetamine and fentanyl pills.\u003c/p\u003e\n\n\u003ch2 id=\"arrest-and-seized-evidence\"\u003eArrest and Seized Evidence\u003c/h2\u003e\n\n\u003cp\u003eHughes was arrested in California on June 28, 2023, by the Redwood City Police Department. The arrest followed another sale arranged with undercover agents. The article links the arrest to a Redwood City Police Department announcement.\u003c/p\u003e\n\n\u003cp\u003eDuring a search of Hughes’ vehicle, detectives from the Street Crime Suppression Team found approximately 672 grams of methamphetamine. They also found a loaded 9mm “ghost gun” with no serial number. The article includes a photo captioned as evidence seized during Hughes’ arrest and attributed to the Redwood City Police Department.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-statements\"\u003eLaw Enforcement Statements\u003c/h2\u003e\n\n\u003cp\u003eU.S. Attorney Andrew S. Boutros said that criminals selling drugs on the dark web often act with impunity and brazenness because they mistakenly believe they are beyond the reach of federal law enforcement. He said the Chicago U.S. Attorney’s Office and its law enforcement partners will identify, investigate, and prosecute drug traffickers regardless of where they operate, including on the dark net.\u003c/p\u003e\n\n\u003cp\u003eIRS-CI SAC Adam Jobes said drug dealers once relied on street corners and now use the internet to reach customers worldwide. He said dark web marketplaces may seem anonymous, but no platform is beyond law enforcement’s reach. He also said Hughes used the internet to profit from addiction and distribute dangerous drugs.\u003c/p\u003e\n\n\u003ch2 id=\"nemesis-market-background\"\u003eNemesis Market Background\u003c/h2\u003e\n\n\u003cp\u003eNemesis Market launched in 2021. The article says it quickly grew into one of the world’s largest illegal online markets. It was taken down by German and American authorities in March 2024.\u003c/p\u003e\n\n\u003cp\u003eAt its peak, Nemesis Market hosted:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 150,000 user accounts.\u003c/li\u003e\n\u003cli\u003e1,100 seller accounts.\u003c/li\u003e\n\u003cli\u003eMore than 400,000 processed orders.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says those orders included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRoughly 17,000 orders for opioids such as fentanyl, heroin, and oxycodone.\u003c/li\u003e\n\u003cli\u003eMore than 55,000 orders for meth, cocaine, and crack cocaine.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"marketplace-takedown\"\u003eMarketplace Takedown\u003c/h2\u003e\n\n\u003cp\u003eGermany’s Federal Criminal Police Office and Frankfurt’s cybercrime unit led the Nemesis Market shutdown on March 20, 2024. Authorities seized infrastructure in Germany and Lithuania. They also confiscated roughly $100,000 in cash.\u003c/p\u003e\n\n\u003cp\u003eThe investigation began in October 2022. It involved German, Lithuanian, and American agencies. The article specifically names the FBI, DEA, and IRS Criminal Investigation as participating U.S. agencies.\u003c/p\u003e\n\n\u003ch2 id=\"significance-stated-in-the-article\"\u003eSignificance Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the sentencing as a law enforcement outcome against a dark web drug vendor. It emphasizes that Hughes sold drugs through Nemesis Market despite the perceived anonymity of dark web marketplaces. It also connects the individual prosecution to the broader shutdown of Nemesis Market by international authorities.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact includes Hughes’ 26-plus-year federal prison sentence, the seizure of methamphetamine and a loaded ghost gun during his arrest, and the earlier takedown of a marketplace that had processed hundreds of thousands of orders.\u003c/p\u003e\n","keyPoints":["Darren Hughes of San Jose, California, was sentenced to more than 26 years in federal prison for trafficking fentanyl and methamphetamine through Nemesis Market.","Hughes operated a store on Nemesis Market that offered potential clients free samples of methamphetamine and later sold methamphetamine and fentanyl pills to an undercover law enforcement agent in exchange for cryptocurrency.","The Redwood City Police Department arrested Hughes on June 28, 2023, after arranging another sale with undercover agents.","Detectives searching Hughes’ vehicle found approximately 672 grams of methamphetamine and a loaded 9mm ghost gun with no serial number.","Nemesis Market was taken down by German and American authorities in March 2024 after growing to more than 150,000 user accounts and 1,100 seller accounts."],"insights":["The investigation shows that dark web vendor cases can be built through undercover purchases using cryptocurrency, despite sellers’ reliance on perceived marketplace anonymity.","The arrest occurred before Nemesis Market was taken down, indicating that law enforcement pursued individual vendors while the broader marketplace investigation was still ongoing.","Nemesis Market’s order history included tens of thousands of opioid and stimulant transactions, showing that drug trafficking was a major component of the marketplace’s activity, not an incidental use.","The marketplace shutdown involved infrastructure seizures in multiple countries and agencies from Germany, Lithuania, and the United States, underscoring that dark web enforcement can require cross-border coordination."],"referencedReports":[],"body":"\u003cp\u003eA California man, 39-year-old Darren Hughes of San Jose, was sentenced to more than 26 years in federal prison for trafficking fentanyl and methamphetamine through Nemesis Market. Hughes was convicted on drug trafficking charges in November 2025 and sentenced by U.S. District Judge John F. Kness on May 26. Prosecutors said he operated a store on Nemesis Market, one of the world’s largest dark web marketplaces.\u003c/p\u003e\n\n\u003cp\u003eAccording to court documents, Hughes offered potential clients free methamphetamine samples through the marketplace. After sending a free sample to an undercover law enforcement agent, he sold the agent methamphetamine and fentanyl pills on five separate occasions in 2023 in exchange for cryptocurrency. He was arrested on June 28, 2023, after another arranged sale with undercover agents.\u003c/p\u003e\n\n\u003cp\u003eDetectives found approximately 672 grams of methamphetamine and a loaded 9mm ghost gun with no serial number during a search of Hughes’ vehicle. Nemesis Market was taken down by German and American authorities in March 2024 after growing to more than 150,000 user accounts and 1,100 seller accounts. Authorities said the case shows that dark web marketplaces are not beyond law enforcement’s reach.\u003c/p\u003e\n"},{"n":2,"title":"What 2026 DBIR Confirms: Attacks Are Living in the Browser","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/what-2026-dbir-confirms-attacks-are-living-in-the-browser/","time":"14:00","priority":"MAY READ","score":55,"tldr":"The 2026 Verizon DBIR and Keep Aware telemetry argue that major enterprise risks like shadow AI, credential theft, risky extensions, and ClickFix are increasingly happening inside the browser, where traditional network and endpoint tools often lack visibility. The article’s main takeaway is that security teams need browser-layer monitoring and controls to close these gaps.","briefOverview":"\u003cp\u003eThe article argues that the 2026 Verizon Data Breach Investigations Report and Keep Aware’s browser telemetry point to the same security shift: attacks and risky user activity are increasingly occurring inside the browser. It highlights shadow AI, credential theft, risky browser extensions, and browser-native social engineering as areas where browser-layer visibility reveals activity that traditional network and endpoint tools may miss. The article is sponsored and written by Keep Aware, which contributed data to the 2026 DBIR.\u003c/p\u003e\n\n\u003cp\u003eA major focus is unauthorized AI use, which the article says the DBIR identified as the third most common non-malicious insider action in DLP datasets. It states that 67% of users access AI services on corporate devices through personal accounts, while Keep Aware telemetry found that over half of AI prompt inputs go to personal accounts. The article says 23% of sensitive prompt uploads involve personal or unverified accounts outside corporate DLP policy or logging infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes browser-based credential theft and social engineering. It says the DBIR found 39% of breaches involved credential abuse, while Keep Aware saw browser-based credential theft account for about 41% of observed browser threat activity. Keep Aware also reported that 63% of Microsoft-themed phishing sites were not flagged by any VirusTotal vendor at employee exposure time, and that all observed credential theft attempts passed through existing non-browser controls unblocked.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents the 2026 Verizon Data Breach Investigations Report as a benchmark that confirms a shift toward attacks and risky activity occurring in the browser. Keep Aware says it contributed data to the DBIR and uses its own browser telemetry to compare with the report’s findings. The central claim is that shadow AI, credential theft, risky extensions, and browser-native social engineering all generate artifacts most visible at the browser layer.\u003c/p\u003e\n\n\u003cp\u003eShadow AI is described as a mainstream enterprise risk in the article. The DBIR identified shadow AI as the third most common non-malicious insider action in DLP datasets, representing a fourfold increase from the previous year. The article says employees are often not trying to exfiltrate data, but are using personal AI tools such as ChatGPT before organizations have approved governed alternatives. It also states that 67% of users access AI services on corporate devices through personal, non-corporate accounts, and that 45% of employees are regular AI users.\u003c/p\u003e\n\n\u003cp\u003eKeep Aware’s telemetry is used to add browser-level detail to the AI risk. The article says more than half of AI prompt inputs are sent to personal accounts, and 23% of sensitive prompt uploads involve data transiting through personal or unverified accounts. It frames this as data moving outside the reach of corporate DLP policy or logging infrastructure. The article also promotes a free Keep Aware AI audit intended to show what data is leaving through AI tools.\u003c/p\u003e\n\n\u003cp\u003eCredential abuse is another major theme. The DBIR found that 39% of breaches involved credential abuse, while Keep Aware’s 2025 attack data identified browser-based credential theft as the top browser-based attack category at roughly 41% of observed threat activity. The article says 63% of Microsoft-themed phishing sites were not flagged by any VirusTotal vendor at the time of employee exposure. It also claims that all credential theft attempts observed by Keep Aware passed through existing non-browser security controls unblocked.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses browser extensions and ClickFix. It says the DBIR found that the average enterprise had more than 15% of users with unauthorized AI extensions installed, while Keep Aware telemetry found that 13% of unique extensions were high or critical risk. It adds that 93% of poor-reputation extensions were labeled as productivity tools by browser marketplaces, making category-based allowlisting ineffective for that threat class. ClickFix is described as a browser-originated social engineering tactic that tricks users into executing malicious code on the host machine and can lead to infostealers and remote access for attackers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the 2026 Verizon Data Breach Investigations Report and Keep Aware’s browser telemetry show a convergence around one main security trend: significant enterprise risk is now occurring inside the browser. Keep Aware says it contributed data to the Verizon 2026 DBIR and had early visibility into the report’s findings. The article frames browser-layer telemetry as a way to see activity that network, endpoint, identity, DLP, DNS, and proxy tools may not fully capture.\u003c/p\u003e\n\n\u003cp\u003eThe article is sponsored and written by Keep Aware. It uses DBIR findings alongside Keep Aware telemetry to discuss shadow AI, credential abuse, browser extensions, ClickFix, and the human element in browser-based attacks. Its central conclusion is that the browser is now the work environment for most enterprise users and must be secured directly.\u003c/p\u003e\n\n\u003ch2 id=\"shadow-ai-as-an-enterprise-risk\"\u003eShadow AI as an Enterprise Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article says the 2026 Verizon DBIR identified shadow AI as the third most common non-malicious insider action observed in DLP datasets. It also says this represented a fourfold increase from the previous year. The behavior is described as employees using the fastest available tool for work, such as pasting internal documents or source code into a personal ChatGPT session before the organization has approved and provided a governed alternative.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several figures about AI usage:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e67% of users are accessing AI services on corporate devices through personal, non-corporate accounts.\u003c/li\u003e\n\u003cli\u003e45% of employees are considered regular AI users.\u003c/li\u003e\n\u003cli\u003eMore than half of AI prompt inputs are sent to personal accounts, according to Keep Aware telemetry.\u003c/li\u003e\n\u003cli\u003e23% of sensitive prompt uploads involve data passing through personal or unverified accounts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this matters because data sent through personal or unverified AI accounts can fall outside corporate DLP policy and logging infrastructure. It specifically names ChatGPT and Gemini as examples of AI tools employees are using.\u003c/p\u003e\n\n\u003ch2 id=\"credential-abuse-and-browser-level-gaps\"\u003eCredential Abuse and Browser-Level Gaps\u003c/h2\u003e\n\n\u003cp\u003eThe article says the 2026 DBIR found that 39% of breaches involved credential abuse. It then compares that with Keep Aware’s 2025 attack data, which put browser-based credential theft at about 41% of observed browser-based threat activity. The article interprets this as browser-based credential theft contributing to future successful breaches.\u003c/p\u003e\n\n\u003cp\u003eKeep Aware’s data is used to argue that traditional security tools often miss browser-based credential theft. The article states that 63% of Microsoft-themed phishing sites were not flagged by any VirusTotal vendor at the time an employee was exposed. It also says 100% of the credential theft attempts observed by Keep Aware passed through existing non-browser security controls unblocked, including network proxies, DNS filters, and endpoint agents.\u003c/p\u003e\n\n\u003cp\u003eThe article’s technical point is that credential theft is most reliably detected inside the browser, where the page is rendered and user interaction occurs. It frames the browser as the point where phishing pages, credential entry, and user behavior are directly observable.\u003c/p\u003e\n\n\u003ch2 id=\"browser-extensions-as-a-privileged-and-ungoverned-risk\"\u003eBrowser Extensions as a Privileged and Ungoverned Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article describes browser extensions as highly privileged because add-ons can read, modify, and interact with page content and can exfiltrate data from within the browser context. It says this level of privilege should require regular scrutiny, but enterprise extension usage does not always receive it.\u003c/p\u003e\n\n\u003cp\u003eThe article cites the 2026 DBIR as finding that the average enterprise had more than 15% of users with unauthorized AI extensions installed. Keep Aware’s telemetry adds that 13% of unique browser extensions observed across its customer base were classified as high or critical risk.\u003c/p\u003e\n\n\u003cp\u003eA particularly actionable point in the article is that 93% of poor-reputation extensions were labeled as “productivity” tools by browser marketplaces. The article says this makes category-based allowlisting functionally useless for that threat class because productivity tools are often treated as safe by allowlisting policies.\u003c/p\u003e\n\n\u003ch2 id=\"clickfix-and-browser-native-social-engineering\"\u003eClickFix and Browser-Native Social Engineering\u003c/h2\u003e\n\n\u003cp\u003eThe article says both the 2026 DBIR and Keep Aware’s State of Browser Security Report call out ClickFix as an emerging technique worth tracking. The DBIR found that ClickFix accounted for 2.7% of browser-detected attacks. The article frames this as a small share that still signals an evolution in browser-based social engineering.\u003c/p\u003e\n\n\u003cp\u003eClickFix is described as a deceptive social engineering tactic that gets a user to unknowingly execute malicious code from the browser and on the host machine. The article says this threat can begin when users encounter compromised websites and can sometimes originate through LLM chat responses. It then continues on the endpoint, where it can compromise the machine with infostealers and remote access for attackers.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main point about ClickFix is that the endpoint experiences the impact, but the browser is the social engineering medium and the first line of defense.\u003c/p\u003e\n\n\u003ch2 id=\"human-element-in-browser-attacks\"\u003eHuman Element in Browser Attacks\u003c/h2\u003e\n\n\u003cp\u003eThe article says the 2026 DBIR found that 62% of breaches involved the human element, with phishing initiating 16% of incidents. Keep Aware’s browser-layer data found that phishing and social engineering accounted for 46% of browser attacks observed across 2025.\u003c/p\u003e\n\n\u003cp\u003eThe article says the human element is often treated as a training and awareness problem, but attackers are continually changing browser-based social engineering techniques. It lists several tactics:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhishing links to benign intermediary sites.\u003c/li\u003e\n\u003cli\u003eRedirect chains.\u003c/li\u003e\n\u003cli\u003ePages that render differently for automated scanners.\u003c/li\u003e\n\u003cli\u003eHosting content on legitimate websites.\u003c/li\u003e\n\u003cli\u003eSilent clipboard injections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that browser-level visibility does not solve the human element problem. Instead, it shifts the detection point to where the human interaction is happening, rather than relying on downstream artifacts after the interaction has already been exploited.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-security-implications\"\u003eImpact and Security Implications\u003c/h2\u003e\n\n\u003cp\u003eThe article’s overall impact claim is that security programs relying only on network, endpoint, and identity telemetry will have blind spots where attackers increasingly operate. It says shadow AI, credential theft, malicious extensions, and ClickFix all execute inside the browser and create artifacts most visible, or only visible, at the browser layer.\u003c/p\u003e\n\n\u003cp\u003eFor security teams, the article argues that browser visibility is now necessary because the browser is no longer just an application. It describes the browser as the work environment for most enterprise users. The article closes by encouraging readers to request a Keep Aware demo and access Keep Aware’s 2026 State of Browser Security Report.\u003c/p\u003e\n","keyPoints":["The 2026 Verizon DBIR identified shadow AI as the third most common non-malicious insider action in DLP datasets, representing a fourfold increase from the previous year.","The article states that 67% of users access AI services on corporate devices through personal, non-corporate accounts, and Keep Aware telemetry found that over half of AI prompt inputs are sent to personal accounts.","The 2026 DBIR found that 39% of breaches involved credential abuse, while Keep Aware reported browser-based credential theft as its top browser-based attack category at about 41% of observed threat activity.","Keep Aware said 63% of Microsoft-themed phishing sites were not flagged by any VirusTotal vendor at the time of employee exposure, and that all observed credential theft attempts passed through existing non-browser security controls unblocked.","The article says shadow AI, credential theft, malicious extensions, and ClickFix all execute inside the browser and produce artifacts that are most visible, or only visible, at the browser layer."],"insights":["Category-based extension allowlisting is unreliable for browser risk management because 93% of poor-reputation extensions observed by Keep Aware were labeled as “productivity” tools in browser marketplaces.","Personal AI accounts create a governance blind spot because sensitive prompt uploads can occur outside corporate DLP policy and logging infrastructure even when employees use corporate devices.","Traditional security controls may miss browser credential theft at the moment of exposure, since the article says all credential theft attempts observed by Keep Aware passed through non-browser controls unblocked.","ClickFix shows that browser-originated social engineering can quickly become an endpoint compromise, making the browser an important prevention point even when the final impact occurs on the host machine."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that the 2026 Verizon Data Breach Investigations Report and Keep Aware’s browser telemetry point to the same security shift: attacks and risky user activity are increasingly occurring inside the browser. It highlights shadow AI, credential theft, risky browser extensions, and browser-native social engineering as areas where browser-layer visibility reveals activity that traditional network and endpoint tools may miss. The article is sponsored and written by Keep Aware, which contributed data to the 2026 DBIR.\u003c/p\u003e\n\n\u003cp\u003eA major focus is unauthorized AI use, which the article says the DBIR identified as the third most common non-malicious insider action in DLP datasets. It states that 67% of users access AI services on corporate devices through personal accounts, while Keep Aware telemetry found that over half of AI prompt inputs go to personal accounts. The article says 23% of sensitive prompt uploads involve personal or unverified accounts outside corporate DLP policy or logging infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes browser-based credential theft and social engineering. It says the DBIR found 39% of breaches involved credential abuse, while Keep Aware saw browser-based credential theft account for about 41% of observed browser threat activity. Keep Aware also reported that 63% of Microsoft-themed phishing sites were not flagged by any VirusTotal vendor at employee exposure time, and that all observed credential theft attempts passed through existing non-browser controls unblocked.\u003c/p\u003e\n"},{"n":5,"title":"AI PCs Put an AI Agent on Every Desk | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/ai-pc-agent-saas-security","time":"16:56","priority":"MAY READ","score":45,"tldr":"Mitiga argues that AI PCs with local, credentialed agents will create a new enterprise identity risk because compromised devices could expose SaaS access across the business. The article promotes runtime detection and response, beyond policy enforcement tools like OpenShell, to spot and contain agent misuse before it causes impact.","briefOverview":"\u003cp\u003eMitiga says Nvidia and Microsoft’s RTX Spark will bring a locally running 120-billion-parameter AI agent to a new generation of Windows PCs. Dell, HP, ASUS, Lenovo, Microsoft Surface, and MSI are described as building the technology into upcoming machines. The article argues that the security significance is not the hardware itself, but the arrival of credentialed AI agents on enterprise endpoints.\u003c/p\u003e\n\n\u003cp\u003eThe article frames an on-device AI agent as a new enterprise identity because it can hold live credentials and access SaaS applications such as CRM, email, cloud storage, and productivity tools. Mitiga warns that if the device is compromised, an attacker could inherit the agent’s permissions across applications such as Salesforce, SharePoint, and Workday. In this framing, an endpoint compromise can become a SaaS breach.\u003c/p\u003e\n\n\u003cp\u003eMitiga distinguishes agent policy enforcement from detection and response. It describes Nvidia’s OpenShell as a tool for defining and enforcing what agents are permitted to do, but says it does not replace SOC functions such as detection, threat correlation, audit trails, and incident response. The article promotes Mitiga’s Zero-Impact AI-native cloud detection and response platform with Helios AIDR as a way to detect and contain agent-driven attacks across cloud, SaaS, identity, and AI environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMitiga’s article argues that the next generation of AI PCs will introduce a major security shift by putting credentialed AI agents directly on Windows endpoints. It says Nvidia and Microsoft’s RTX Spark runs a 120-billion-parameter agent locally, with Dell, HP, ASUS, Lenovo, Microsoft Surface, and MSI building it into new machines. The article presents this as a change in enterprise identity and access risk rather than simply a hardware milestone.\u003c/p\u003e\n\n\u003cp\u003eThe core concern is that an on-device agent deployed with SaaS integrations can sign into enterprise systems and act with live credentials. The article names CRM, email, cloud storage, and productivity tools as examples of applications such agents may reach. It says the agent, its service identities, and the SaaS applications it accesses should be treated as assets that require monitoring.\u003c/p\u003e\n\n\u003cp\u003eMitiga warns that compromising an AI PC could give an attacker the agent’s permissions across the applications it is trusted to use. The article specifically mentions Salesforce, SharePoint, and Workday as examples of services whose tokens or permissions could expand the blast radius. It summarizes this risk by saying an endpoint compromise can become a SaaS breach.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses controls for defending from AI-enabled misuse. It says Microsoft shipped new Windows security primitives and Nvidia built OpenShell, an open-source agent policy enforcement tool for defining and enforcing boundaries on what agents can do. Mitiga emphasizes that OpenShell is an enforcement tool and does not replace detection, threat correlation, audit trails, or incident response in a SOC.\u003c/p\u003e\n\n\u003cp\u003eMitiga’s proposed response is Agentic Runtime Security delivered through its Zero-Impact AI-native cloud detection and response platform. The article says this approach correlates activity across cloud, SaaS, AI, and identity, reconstructs attack timelines, produces verdicts, and supports containment actions. It states that Helios AIDR runs on the Cloud Security Data Lake and that customers report improved detection and response speed, reduced mean time to respond, and faster alert closure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMitiga’s article presents AI PCs as an emerging enterprise security issue because they place credentialed AI agents directly on user endpoints. It says Nvidia and Microsoft’s RTX Spark will run a 120-billion-parameter agent locally on a new generation of Windows PCs. Dell, HP, ASUS, Lenovo, Microsoft Surface, and MSI are listed as manufacturers already building the technology into new machines.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the main security shift is not the hardware launch itself, but the introduction of a new credentialed identity into enterprise environments. Mitiga frames an on-device AI agent as an identity that can hold live credentials and act across SaaS applications. The article says this agent must be defended like other enterprise identities.\u003c/p\u003e\n\n\u003ch2 id=\"core-security-concern\"\u003eCore security concern\u003c/h2\u003e\n\n\u003cp\u003eMitiga says an on-device agent does not sit idle when it is deployed with SaaS integrations. It can sign into CRM, email, cloud storage, and productivity tools, holding live credentials and acting on them without continuous human observation. In identity terms, the article describes this as a powerful new principal inside the environment.\u003c/p\u003e\n\n\u003cp\u003eThe article warns that if the endpoint is compromised, an attacker may inherit the agent’s permissions across every application it was trusted to access. It names Salesforce, SharePoint, and Workday as examples of applications that could be affected if the agent holds tokens or permissions for them. Mitiga characterizes this as an endpoint compromise becoming a SaaS breach.\u003c/p\u003e\n\n\u003ch2 id=\"mitiga-s-three-part-framing\"\u003eMitiga’s three-part framing\u003c/h2\u003e\n\n\u003cp\u003eThe article organizes the issue around three security jobs that Mitiga says now define cloud security operations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDefending your AI.\u003c/li\u003e\n\u003cli\u003eDefending from AI.\u003c/li\u003e\n\u003cli\u003eDefending with AI.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eUnder “defend your AI,” the article focuses on protecting the agent, its service identities, and the SaaS applications it reaches. It says these should be placed on the list of assets that organizations actively monitor. It also says access paths should be watched before the blast radius widens.\u003c/p\u003e\n\n\u003cp\u003eUnder “defend from AI,” the article says attackers go where access exists and where visibility is weak. It argues that credentialed agents on every desk create that kind of opening, especially as AI accelerates reconnaissance, credential abuse, and cloud-speed intrusion. The article does not name any specific threat actor.\u003c/p\u003e\n\n\u003cp\u003eUnder “defend with AI,” Mitiga argues that manually monitoring agent activity at machine speed is not realistic. It says Agentic Runtime Security, evidence gathering, attack timeline reconstruction, verdicts, and next-action recommendations can handle parts of that work before a human opens an alert.\u003c/p\u003e\n\n\u003ch2 id=\"openshell-and-the-limits-of-policy-enforcement\"\u003eOpenShell and the limits of policy enforcement\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft shipped new Windows security primitives and Nvidia built OpenShell on top of them. It describes OpenShell as an open-source agent policy enforcement tool that lets enterprises define and enforce boundaries on what their agents can do. Mitiga characterizes it as a useful control for constraining execution.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article stresses that policy enforcement is not the same as detection. It says knowing that an agent violated policy is not the same as knowing that a trusted agent has been turned against an organization. It also says OpenShell does not replace detection, threat correlation, audit trails, or incident response functions that a SOC runs.\u003c/p\u003e\n\n\u003ch2 id=\"agentic-runtime-security\"\u003eAgentic Runtime Security\u003c/h2\u003e\n\n\u003cp\u003eMitiga defines Agentic Runtime Security as surfacing early signals from live activity across cloud, SaaS, identity, and AI. The article says the goal is to detect and contain an attack already in motion before it makes impact. It describes this as a runtime safety net for exposures that posture tools can only flag.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts different categories of control:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePosture management flags where risk sits.\u003c/li\u003e\n\u003cli\u003eAgent policy enforcement tools such as OpenShell control what an agent is permitted to do at execution time.\u003c/li\u003e\n\u003cli\u003eRuntime security watches what the agent actually does and looks for early signals of misuse.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitiga-platform-claims\"\u003eMitiga platform claims\u003c/h2\u003e\n\n\u003cp\u003eThe article says Agentic Runtime Security is delivered through Mitiga’s Zero-Impact AI-native cloud detection and response platform. It describes the platform as covering cloud, SaaS, AI, and identity environments. Mitiga says Panoramic Awareness pulls activity across those areas into one always-on view so an agent’s API call is not treated as an isolated log line.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Attack Decoding and Attack Containment. Attack Decoding is said to turn raw evidence into a structured timeline and verdict that can distinguish a routine agent session from an attacker using the agent as cover. Attack Containment is described as moving from that verdict to action by tightening control over the blast radius.\u003c/p\u003e\n\n\u003cp\u003eMitiga says Helios AIDR powers the approach as its AI detection and response model for the Zero-Impact era. The article states that Helios AIDR runs on the Cloud Security Data Lake so analysts and AI work from the same full-fidelity context. Mitiga says its customers report 90% improved detection and response speed, a 70% reduction in mean time to respond, and 67% faster time to close out alerts.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-preparation\"\u003eRecommended preparation\u003c/h2\u003e\n\n\u003cp\u003eThe article says organizations should not wait for RTX Spark hardware before acting. It notes that agents are already present in browsers and productivity tools, and that the new chip will multiply them. Mitiga recommends inventorying agent and non-human identities already in the environment.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends correlating endpoint context with SaaS telemetry. The article says organizations should keep forensic data deep enough to reconstruct an incident. Mitiga’s stated goal is to ensure that when an agent is turned against an organization, it changes nothing that matters.\u003c/p\u003e\n\n\u003ch2 id=\"stated-impact-and-conclusion\"\u003eStated impact and conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article does not report a specific breach, campaign, or vulnerability exploitation. Instead, it presents a security perspective on the expected spread of AI PCs and credentialed local agents. Its central claim is that these agents create a new identity and runtime security problem across endpoints, SaaS, cloud, identity, and AI.\u003c/p\u003e\n\n\u003cp\u003eMitiga’s conclusion is that prevention alone will not stop an agent from being misused. The article promotes Zero-Impact Breach Prevention as detecting and containing attacks across cloud, SaaS, identity, and AI infrastructure early enough that they do not create business impact.\u003c/p\u003e\n","keyPoints":["Mitiga says Nvidia and Microsoft’s RTX Spark will run a 120-billion-parameter AI agent locally on new Windows PCs from Dell, HP, ASUS, Lenovo, Microsoft Surface, and MSI.","The article argues that an on-device AI agent with SaaS integrations should be treated as a new enterprise identity because it can hold live credentials and act across applications such as CRM, email, cloud storage, and productivity tools.","Mitiga states that if an AI PC is compromised, an attacker could inherit the agent’s permissions across applications such as Salesforce, SharePoint, and Workday.","The article says Nvidia’s OpenShell can define and enforce boundaries on what enterprise agents are permitted to do, but it does not replace SOC detection, threat correlation, audit trails, or incident response.","Mitiga promotes its Zero-Impact AI-native cloud detection and response platform with Helios AIDR as a way to detect and contain agent-driven attacks across cloud, SaaS, identity, and AI environments."],"insights":["The article distinguishes policy enforcement from detection by emphasizing that knowing an AI agent violated a rule is different from knowing a trusted agent has been turned against the organization.","Mitiga frames an endpoint compromise involving an AI PC as a potential SaaS breach because the local agent may already hold tokens for applications such as Salesforce, SharePoint, and Workday.","The article recommends starting before RTX Spark hardware arrives by inventorying existing agent and non-human identities already present in browsers and productivity tools.","Mitiga argues that posture management and policy controls are insufficient alone because runtime monitoring is needed to observe what an agent actually does across cloud, SaaS, identity, and AI systems."],"referencedReports":[],"body":"\u003cp\u003eMitiga says Nvidia and Microsoft’s RTX Spark will bring a locally running 120-billion-parameter AI agent to a new generation of Windows PCs. Dell, HP, ASUS, Lenovo, Microsoft Surface, and MSI are described as building the technology into upcoming machines. The article argues that the security significance is not the hardware itself, but the arrival of credentialed AI agents on enterprise endpoints.\u003c/p\u003e\n\n\u003cp\u003eThe article frames an on-device AI agent as a new enterprise identity because it can hold live credentials and access SaaS applications such as CRM, email, cloud storage, and productivity tools. Mitiga warns that if the device is compromised, an attacker could inherit the agent’s permissions across applications such as Salesforce, SharePoint, and Workday. In this framing, an endpoint compromise can become a SaaS breach.\u003c/p\u003e\n\n\u003cp\u003eMitiga distinguishes agent policy enforcement from detection and response. It describes Nvidia’s OpenShell as a tool for defining and enforcing what agents are permitted to do, but says it does not replace SOC functions such as detection, threat correlation, audit trails, and incident response. The article promotes Mitiga’s Zero-Impact AI-native cloud detection and response platform with Helios AIDR as a way to detect and contain agent-driven attacks across cloud, SaaS, identity, and AI environments.\u003c/p\u003e\n"}]</script>
