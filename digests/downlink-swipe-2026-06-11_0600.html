<script>
window.__DL_ARTICLES = [{"n":3,"title":"Max severity Ivanti Sentry vulnerability now exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/max-severity-ivanti-sentry-vulnerability-now-exploited-in-attacks/","time":"06:20","priority":"MUST READ","score":96,"tldr":"Attackers are exploiting the newly patched max-severity Ivanti Sentry flaw CVE-2026-10520 to gain root-level code execution on exposed gateways. Shadowserver warns that unpatched internet-facing Sentry systems are likely already compromised and should be patched and investigated immediately.","briefOverview":"\u003cp\u003eAttackers are targeting CVE-2026-10520, a recently patched maximum-severity vulnerability in Ivanti Sentry. The flaw enables code execution with root privileges on Internet-exposed secure mobile gateways. Ivanti Sentry, formerly MobileIron Sentry, secures traffic between back-end corporate systems and remote mobile devices.\u003c/p\u003e\n\n\u003cp\u003eIvanti patched the OS command injection weakness on Tuesday with Sentry versions R10.5.2, R10.6.2, and R10.7.1. Although Ivanti said at disclosure that it had no evidence of in-the-wild exploitation, Shadowserver reported the next day that attackers had already backdoored most exposed Sentry gateways it could observe. Shadowserver warned that organizations that have not patched are most likely compromised.\u003c/p\u003e\n\n\u003cp\u003eShadowserver said it saw 19 vulnerable instances in its scans, with at least 2 backdoored, while noting that its visibility may be limited because some Ivanti Sentry instances were not reachable in its scans. The article also notes that Ivanti products have repeatedly been targeted in recent years, including vulnerabilities exploited against government agencies and flaws listed by CISA as actively exploited.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAttackers are exploiting CVE-2026-10520, a maximum-severity Ivanti Sentry vulnerability that allows code execution with root privileges on Internet-exposed secure mobile gateways. Ivanti Sentry, previously known as MobileIron Sentry, is a security gateway appliance used to secure traffic between back-end corporate systems and remote mobile devices. The vulnerability stems from an OS command injection weakness.\u003c/p\u003e\n\n\u003cp\u003eIvanti patched the flaw on Tuesday with the release of Sentry versions R10.5.2, R10.6.2, and R10.7.1. At the time, the company said it had no evidence of exploitation in the wild. However, Shadowserver reported the next day that attackers had already backdoored most of the Sentry gateways exposed online.\u003c/p\u003e\n\n\u003cp\u003eShadowserver said it was observing a large amount of exploitation attempts based on a public proof of concept. It reported seeing 19 vulnerable instances in its own scans, with at least 2 backdoored, and credited Saudi NCA for a tip. Shadowserver also warned that its detection was limited because multiple Ivanti Sentry instances were not reachable in its scans, possibly because its search engine was blocklisted.\u003c/p\u003e\n\n\u003cp\u003eIvanti had not updated its Tuesday advisory at the time of the article, and the advisory still stated that the company was not aware of any customers being exploited at the time of disclosure. BleepingComputer said an Ivanti spokesperson was not immediately available for comment when contacted for further details. The article emphasizes that unpatched Internet-exposed Sentry systems are at high risk according to Shadowserver’s warning.\u003c/p\u003e\n\n\u003cp\u003eThe article places the Sentry exploitation in the broader context of repeated attacks against Ivanti products. It notes that multiple Ivanti zero-days have been exploited in recent years to breach targets including government agencies worldwide, and that CISA recently ordered U.S. federal agencies to patch Ivanti systems after another exploited EPMM flaw. CISA has flagged 34 vulnerabilities across Ivanti products as actively exploited in the wild, with 12 also targeted in ransomware attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers are targeting CVE-2026-10520, a newly patched maximum-severity vulnerability in Ivanti Sentry. The flaw allows attackers to execute code with root privileges on Internet-exposed secure mobile gateways.\u003c/p\u003e\n\n\u003cp\u003eIvanti Sentry, formerly known as MobileIron Sentry, is a security gateway appliance that secures traffic between back-end corporate systems and remote mobile devices. The vulnerability is described as an OS command injection weakness.\u003c/p\u003e\n\n\u003ch2 id=\"patch-and-disclosure-timeline\"\u003ePatch and disclosure timeline\u003c/h2\u003e\n\n\u003cp\u003eIvanti patched CVE-2026-10520 on Tuesday with the release of the following Sentry versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eR10.5.2\u003c/li\u003e\n\u003cli\u003eR10.6.2\u003c/li\u003e\n\u003cli\u003eR10.7.1\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the time of disclosure, Ivanti said it had no evidence of in-the-wild exploitation. The company’s advisory still stated, at the time of the article, that it was not aware of any customers being exploited by the vulnerabilities at disclosure.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-activity-reported-by-shadowserver\"\u003eExploitation activity reported by Shadowserver\u003c/h2\u003e\n\n\u003cp\u003eThe Shadowserver nonprofit security organization reported the next day that attackers had already backdoored most of the Sentry gateways exposed online. Shadowserver said it was observing a large number of Ivanti Sentry CVE-2026-10520 exploitation attempts based on a public proof of concept.\u003c/p\u003e\n\n\u003cp\u003eAccording to Shadowserver:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt saw 19 vulnerable instances in its own scans.\u003c/li\u003e\n\u003cli\u003eAt least 2 of those instances were backdoored.\u003c/li\u003e\n\u003cli\u003eIt credited Saudi NCA for the tip.\u003c/li\u003e\n\u003cli\u003eIt warned that the remaining vulnerable systems were likely compromised as well.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eShadowserver also noted that its detection count may be low because multiple Ivanti Sentry instances were not reachable in its scans, possibly due to its search engine being blocklisted. It warned that if organizations had not patched, they were most likely compromised.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-status\"\u003eVendor response status\u003c/h2\u003e\n\n\u003cp\u003eAt the time of the article, Ivanti had not updated the security advisory it issued on Tuesday. The advisory still said, “We are not aware of any customers being exploited by these vulnerabilities at the time of disclosure.”\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said an Ivanti spokesperson was not immediately available for comment when contacted for more details about the ongoing attacks.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and significance\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is significant because it enables code execution as root on Internet-exposed Ivanti Sentry gateways. These gateways sit between corporate back-end systems and remote mobile devices, making them valuable targets for attackers seeking access to enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that hackers often target Ivanti security flaws because they provide an entry point into enterprise networks and can enable the theft of sensitive customer and corporate data.\u003c/p\u003e\n\n\u003ch2 id=\"broader-ivanti-exploitation-history\"\u003eBroader Ivanti exploitation history\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-10520 within a broader pattern of exploitation affecting Ivanti products. It states that multiple Ivanti zero-days have been exploited in recent years to breach a wide range of targets, including government agencies worldwide.\u003c/p\u003e\n\n\u003cp\u003eExamples cited in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTwo critical Ivanti Endpoint Manager Mobile vulnerabilities addressed in January after exploitation as zero-days against a “very limited number of customers.”\u003c/li\u003e\n\u003cli\u003eA high-severity remote code execution EPMM flaw that Ivanti warned was abused in zero-day attacks.\u003c/li\u003e\n\u003cli\u003eA CISA order last month requiring U.S. federal agencies to patch Ivanti systems on their networks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that CISA has flagged 34 vulnerabilities across various Ivanti products as actively exploited in the wild, with 12 of them also targeted in ransomware attacks.\u003c/p\u003e\n\n\u003ch2 id=\"organizations-and-entities-mentioned\"\u003eOrganizations and entities mentioned\u003c/h2\u003e\n\n\u003cp\u003eKey entities mentioned in connection with the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIvanti, the vendor of Ivanti Sentry and other IT asset management products.\u003c/li\u003e\n\u003cli\u003eShadowserver, which reported exploitation attempts and backdoored exposed Sentry gateways.\u003c/li\u003e\n\u003cli\u003eSaudi NCA, which Shadowserver credited for a tip.\u003c/li\u003e\n\u003cli\u003eCISA, which has previously ordered U.S. federal agencies to patch Ivanti systems and maintains data on known exploited Ivanti vulnerabilities.\u003c/li\u003e\n\u003cli\u003eU.S. federal agencies, which were previously ordered by CISA to patch Ivanti systems.\u003c/li\u003e\n\u003cli\u003eGovernment agencies worldwide, which the article cites as among the types of targets previously breached through Ivanti zero-days.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"company-footprint\"\u003eCompany footprint\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Ivanti has more than 7,000 partners and over 3,000 employees. It also says Ivanti’s IT asset management solutions are used by more than 40,000 customers worldwide.\u003c/p\u003e\n","keyPoints":["Attackers are targeting CVE-2026-10520, a maximum-severity OS command injection vulnerability in Ivanti Sentry that enables code execution with root privileges on Internet-exposed secure mobile gateways.","Ivanti patched CVE-2026-10520 on Tuesday with the release of Sentry versions R10.5.2, R10.6.2, and R10.7.1.","Shadowserver reported the next day that attackers had already backdoored most of the Sentry gateways exposed online, despite Ivanti initially saying it had no evidence of in-the-wild exploitation.","Shadowserver said it observed 19 vulnerable Ivanti Sentry instances in its scans, with at least 2 backdoored, and warned that unpatched systems are most likely compromised.","CISA has flagged 34 vulnerabilities across Ivanti products as actively exploited in the wild, including 12 that were also targeted in ransomware attacks."],"insights":["Organizations should not rely solely on Ivanti’s advisory status because Shadowserver reported active exploitation and backdoored systems while Ivanti’s advisory still stated it was unaware of exploited customers.","Shadowserver’s low count of exposed Sentry instances may underrepresent the real exposure because the organization said multiple Ivanti Sentry instances were likely unreachable in its scans due to blocklisting.","The exploitation window appears very short, with Shadowserver reporting widespread exploitation attempts based on a public proof of concept the day after Ivanti released patches.","Ivanti products remain a recurring target for attackers, with CISA having listed 34 Ivanti vulnerabilities as actively exploited in the wild and 12 also targeted in ransomware attacks."],"referencedReports":[{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=All\u0026url=\u0026f%5B0%5D=vendor_project%3A817","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article references CISA’s catalog to state that 34 Ivanti product vulnerabilities have been flagged as actively exploited in the wild.","category":"","primary":false}],"body":"\u003cp\u003eAttackers are targeting CVE-2026-10520, a recently patched maximum-severity vulnerability in Ivanti Sentry. The flaw enables code execution with root privileges on Internet-exposed secure mobile gateways. Ivanti Sentry, formerly MobileIron Sentry, secures traffic between back-end corporate systems and remote mobile devices.\u003c/p\u003e\n\n\u003cp\u003eIvanti patched the OS command injection weakness on Tuesday with Sentry versions R10.5.2, R10.6.2, and R10.7.1. Although Ivanti said at disclosure that it had no evidence of in-the-wild exploitation, Shadowserver reported the next day that attackers had already backdoored most exposed Sentry gateways it could observe. Shadowserver warned that organizations that have not patched are most likely compromised.\u003c/p\u003e\n\n\u003cp\u003eShadowserver said it saw 19 vulnerable instances in its scans, with at least 2 backdoored, while noting that its visibility may be limited because some Ivanti Sentry instances were not reachable in its scans. The article also notes that Ivanti products have repeatedly been targeted in recent years, including vulnerabilities exploited against government agencies and flaws listed by CISA as actively exploited.\u003c/p\u003e\n"},{"n":2,"title":"Nottingham University data breach affects over 450,000 students","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/nottingham-university-data-breach-affects-over-450-000-students/","time":"07:27","priority":"MUST READ","score":94,"tldr":"The University of Nottingham confirmed a data breach of its student records system affecting about 454,600 current and former students, exposing extensive personal, academic, and payment-related information. ShinyHunters claimed responsibility, linking the incident to a broader campaign targeting Oracle PeopleSoft systems.","briefOverview":"\u003cp\u003eThe University of Nottingham confirmed that a hacking group accessed its student records system in a cyber incident affecting current students and alumni. The university said a “significant amount of data” was accessed and that it reported the incident to Action Fraud and the UK Information Commissioner’s Office. Have I Been Pwned said the breach affects 454,600 former and current students.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility for the attack and posted an archive of allegedly stolen documents as proof on its dark web leak site. The group claimed to have stolen over 40GB of documents containing student finance data, billing and payment information, credit card and payment details, and campus portal exports from the University of Nottingham and its Malaysia and China campuses. Have I Been Pwned said the exposed data includes email addresses, names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrolment information, and fee payment information.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that the attack is part of a broader ShinyHunters data theft campaign targeting cloud and on-premises Oracle PeopleSoft instances at more than 100 organizations worldwide. ShinyHunters told BleepingComputer that it is using a “gadget chain” of zero-days and old vulnerabilities, though the technique does not work on all systems. The university said it is working with the third party that maintains the platform to lead a forensic investigation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe University of Nottingham confirmed that a hacking group gained access to its student records system, affecting both current students and alumni. The university described the incident as involving a “significant amount of data” and said it has reported the breach to Action Fraud and the UK Information Commissioner’s Office. Nottingham University is a public research university with 7,000 staff and more than 46,000 students.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility for the breach and shared an archive of allegedly stolen documents as proof. In a post on its dark web leak site, the group claimed to have stolen more than 40GB of documents from the University of Nottingham and its Malaysia and China campuses. The claimed data includes student finance data, billing and payment information, credit card and payment details, and campus portal exports.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked data and said the breach affects 454,600 former and current students. According to Have I Been Pwned, the exposed information includes email addresses and extensive personal information such as names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrolment information, and fee payment information. ShinyHunters also said the documents contain full names, home addresses, IP addresses, phone numbers, and dates of birth.\u003c/p\u003e\n\n\u003cp\u003eThe university said it is working with the third party that maintains the platform to lead a forensic investigation. It stated that it takes the privacy and security of the data it holds seriously. The article does not state that the university has attributed the attack to ShinyHunters, even though the group claimed responsibility.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that the Nottingham incident is part of a widespread ShinyHunters campaign involving data theft from more than 100 organizations worldwide. The campaign targets cloud and on-premises Oracle PeopleSoft instances, a software suite used for areas including human resources, finance, payroll, supply chain, procurement, and campus administration. ShinyHunters told BleepingComputer that it is using a “gadget chain” of zero-days and old vulnerabilities, and that the attack does not work on all systems, likely because success depends on each instance’s configuration.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Nottingham is the second UK university to disclose a data breach in recent days. The University of Oxford disclosed a breach of its CareerConnect career services platform, and it also reported a separate Canvas-related incident in early May following ShinyHunters’ breach of Instructure’s Canvas learning management system. BleepingComputer said it contacted Oracle about whether the company is aware of an actively exploited PeopleSoft zero-day but had not received a reply.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe University of Nottingham confirmed that it was the victim of a cyber incident in which a hacking group accessed its student records system. The breach affects both current students and alumni, and the university said a “significant amount of data” was accessed. The incident has been reported to Action Fraud and the UK Information Commissioner’s Office.\u003c/p\u003e\n\n\u003cp\u003eNottingham University is described in the article as a public research university with 7,000 staff and more than 46,000 students. It ranks in the Top 20 in the United Kingdom and the Top 100 worldwide.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-actor-and-stolen-data\"\u003eClaimed actor and stolen data\u003c/h2\u003e\n\n\u003cp\u003eThe university had not attributed the attack at the time of the article, but the ShinyHunters extortion gang claimed responsibility. ShinyHunters shared an archive of allegedly stolen documents as proof and posted about the university on its dark web leak site.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed to have stolen more than 40GB of documents from the University of Nottingham and its Malaysia and China campuses. The group said the stolen material includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStudent finance data.\u003c/li\u003e\n\u003cli\u003eBilling and payment information.\u003c/li\u003e\n\u003cli\u003eCredit card and payment details.\u003c/li\u003e\n\u003cli\u003eCampus portal exports.\u003c/li\u003e\n\u003cli\u003eFull names.\u003c/li\u003e\n\u003cli\u003eHome addresses.\u003c/li\u003e\n\u003cli\u003eIP addresses.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eDates of birth.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"confirmed-scale-and-exposed-information\"\u003eConfirmed scale and exposed information\u003c/h2\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked data and said the breach affects 454,600 former and current students. According to Have I Been Pwned, the exposed data includes email addresses along with extensive personal information.\u003c/p\u003e\n\n\u003cp\u003eThe data described by Have I Been Pwned includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames.\u003c/li\u003e\n\u003cli\u003eAddresses.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eEthnicities.\u003c/li\u003e\n\u003cli\u003eDisabilities.\u003c/li\u003e\n\u003cli\u003ePassport numbers.\u003c/li\u003e\n\u003cli\u003eInformation relating to academic enrolments.\u003c/li\u003e\n\u003cli\u003eInformation relating to fee payments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"university-response\"\u003eUniversity response\u003c/h2\u003e\n\n\u003cp\u003eThe University of Nottingham said it is working with the third party that maintains the affected platform to lead a forensic investigation. The university said it takes the privacy and security of the data it holds seriously.\u003c/p\u003e\n\n\u003cp\u003eThe university also said it reported the incident to Action Fraud and the Information Commissioner’s Office.\u003c/p\u003e\n\n\u003ch2 id=\"link-to-peoplesoft-data-theft-campaign\"\u003eLink to PeopleSoft data theft campaign\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer reported that the Nottingham breach is part of a wider data theft campaign by ShinyHunters. According to the article, the group has stolen data from more than 100 organizations worldwide after breaching cloud and on-premises Oracle PeopleSoft instances.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is described as an enterprise business software suite used to manage large-scale operations, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHuman resources.\u003c/li\u003e\n\u003cli\u003eFinance.\u003c/li\u003e\n\u003cli\u003ePayroll.\u003c/li\u003e\n\u003cli\u003eSupply chain.\u003c/li\u003e\n\u003cli\u003eProcurement.\u003c/li\u003e\n\u003cli\u003eCampus administration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details-described-in-the-article\"\u003eTechnical details described in the article\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters told BleepingComputer that it is using a “gadget chain” of zero-days and old vulnerabilities in the attacks. The group also said the attack does not work on all systems. BleepingComputer wrote that this is likely because successful exploitation depends on each instance’s configuration.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Oracle to confirm whether the company is aware of an actively exploited PeopleSoft zero-day. At the time of the article, Oracle had not replied.\u003c/p\u003e\n\n\u003ch2 id=\"other-university-breaches-mentioned\"\u003eOther university breaches mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Nottingham University is the second UK university to disclose a data breach in recent days. The University of Oxford revealed the previous week that its CareerConnect career services platform had been compromised on May 28.\u003c/p\u003e\n\n\u003cp\u003eOxford University also reported a second data breach in early May following ShinyHunters’ breach of Instructure’s Canvas learning management system. The article references that incident as separate from the Nottingham breach but related through the ShinyHunters activity described.\u003c/p\u003e\n","keyPoints":["The University of Nottingham confirmed that a hacking group accessed its student records system, affecting both current students and alumni.","Have I Been Pwned said the breach affects 454,600 former and current students and includes email addresses, names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrolment information, and fee payment information.","The ShinyHunters extortion gang claimed responsibility for the attack and said it stole over 40GB of documents from the University of Nottingham and its Malaysia and China campuses.","The university said it is working with the third party that maintains the platform on a forensic investigation and has reported the incident to Action Fraud and the UK Information Commissioner's Office.","BleepingComputer reported that the attack is part of a wider ShinyHunters campaign targeting cloud and on-premises Oracle PeopleSoft instances at over 100 organizations worldwide."],"insights":["The incident highlights third-party platform risk because the university said it is working with the third party that maintains the student records platform to lead the forensic investigation.","ShinyHunters told BleepingComputer that exploitation does not work on all PeopleSoft systems, indicating that individual PeopleSoft configuration can influence whether an instance is successfully compromised.","The alleged stolen data spans Nottingham’s UK, Malaysia, and China campuses, showing that a single student records platform compromise can have multi-campus and cross-border exposure.","The compromised data reportedly includes highly sensitive attributes such as ethnicities, disabilities, passport numbers, and fee payment information, making the breach more severe than exposure of basic contact details alone."],"referencedReports":[],"body":"\u003cp\u003eThe University of Nottingham confirmed that a hacking group accessed its student records system in a cyber incident affecting current students and alumni. The university said a “significant amount of data” was accessed and that it reported the incident to Action Fraud and the UK Information Commissioner’s Office. Have I Been Pwned said the breach affects 454,600 former and current students.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility for the attack and posted an archive of allegedly stolen documents as proof on its dark web leak site. The group claimed to have stolen over 40GB of documents containing student finance data, billing and payment information, credit card and payment details, and campus portal exports from the University of Nottingham and its Malaysia and China campuses. Have I Been Pwned said the exposed data includes email addresses, names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrolment information, and fee payment information.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that the attack is part of a broader ShinyHunters data theft campaign targeting cloud and on-premises Oracle PeopleSoft instances at more than 100 organizations worldwide. ShinyHunters told BleepingComputer that it is using a “gadget chain” of zero-days and old vulnerabilities, though the technique does not work on all systems. The university said it is working with the third party that maintains the platform to lead a forensic investigation.\u003c/p\u003e\n"},{"n":4,"title":"GitHub to Disable npm Install Scripts by Default to Stop Supply Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/github-to-disable-npm-install-scripts.html","time":"06:23","priority":"SHOULD READ","score":84,"tldr":"GitHub will disable npm install lifecycle scripts by default in npm v12 to reduce supply chain attacks where malicious dependencies execute code during installation. Developers will need to explicitly approve trusted scripts, Git dependencies, and remote URL dependencies before they run or resolve.","briefOverview":"\u003cp\u003eGitHub announced breaking changes coming to npm version 12, including disabling install scripts by default. The change is intended to combat software supply chain threats that abuse the \u003ccode\u003enpm install\u003c/code\u003e command to execute malicious code through npm lifecycle hooks. Version 12 is scheduled for release next month.\u003c/p\u003e\n\n\u003cp\u003eGitHub described install-time lifecycle scripts as the “single largest code-execution surface in the npm ecosystem.” It said \u003ccode\u003enpm install\u003c/code\u003e currently runs scripts from every transitive dependency, meaning a compromised package anywhere in the dependency tree can run arbitrary code on a developer machine or CI runner. The new behavior makes script execution opt-in rather than trusted by default.\u003c/p\u003e\n\n\u003cp\u003eThe changes also block Git dependencies and remote URL dependencies by default unless explicitly allowed. GitHub recommends developers prepare by upgrading to npm 11.16.0 or newer, reviewing warnings, and using \u003ccode\u003enpm approve-scripts --allow-scripts-pending\u003c/code\u003e to approve trusted packages. Unapproved scripts will stop running after the upgrade.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub announced upcoming breaking changes for npm version 12, with the central change being that install scripts will be turned off by default. The company said the changes are meant to reduce software supply chain threats that use \u003ccode\u003enpm install\u003c/code\u003e to trigger malicious code execution. Version 12 is scheduled for release next month.\u003c/p\u003e\n\n\u003cp\u003eThe issue centers on npm lifecycle hooks such as \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, and \u003ccode\u003epostinstall\u003c/code\u003e. GitHub said \u003ccode\u003enpm install\u003c/code\u003e runs scripts from every transitive dependency, so a single compromised package anywhere in the dependency tree can execute arbitrary code on a developer machine or CI runner. GitHub characterized install-time lifecycle scripts as the “single largest code-execution surface in the npm ecosystem.”\u003c/p\u003e\n\n\u003cp\u003eUnder the new behavior, \u003ccode\u003enpm install\u003c/code\u003e will no longer execute dependency install scripts unless those scripts are explicitly allowed in the project. The change includes native \u003ccode\u003enode-gyp\u003c/code\u003e builds, where a package with a \u003ccode\u003ebinding.gyp\u003c/code\u003e and no explicit install script is still blocked because npm runs an implicit \u003ccode\u003enode-gyp rebuild\u003c/code\u003e. Git, file, and link dependency \u003ccode\u003eprepare\u003c/code\u003e scripts are also blocked in the same way.\u003c/p\u003e\n\n\u003cp\u003eGitHub also said npm version 12 will no longer resolve Git dependencies unless explicitly allowed with \u003ccode\u003e--allow-git\u003c/code\u003e. It will also no longer resolve dependencies from remote URLs, such as HTTPS tarballs, unless explicitly allowed with \u003ccode\u003e--allow-remote\u003c/code\u003e. GitHub said defaulting \u003ccode\u003e--allow-git\u003c/code\u003e to \u003ccode\u003enone\u003c/code\u003e closes a code execution path involving a Git dependency’s \u003ccode\u003e.npmrc\u003c/code\u003e configuration overriding the Git executable, even with \u003ccode\u003e--ignore-scripts\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eTo prepare, GitHub recommends that developers upgrade to npm 11.16.0 or newer, run a normal install, and review the warnings displayed. Developers can use \u003ccode\u003enpm approve-scripts --allow-scripts-pending\u003c/code\u003e to see which packages have scripts, approve trusted ones, and commit the updated \u003ccode\u003epackage.json\u003c/code\u003e. GitHub said approved scripts will continue running after the upgrade, while unapproved scripts will stop.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGitHub announced a set of breaking changes planned for npm version 12, which is scheduled for release next month. The most significant change is that npm install scripts will be disabled by default. GitHub said the goal is to reduce software supply chain threats that abuse the \u003ccode\u003enpm install\u003c/code\u003e command to run malicious code through npm lifecycle hooks.\u003c/p\u003e\n\n\u003cp\u003eThe change shifts npm behavior from trusting automatic install-time execution by default to requiring explicit approval. GitHub said the intent is to block automatic code execution during installation unless a project has specifically allowed it. The company described this as keeping script execution “one command away” for packages that developers trust.\u003c/p\u003e\n\n\u003ch2 id=\"why-github-is-making-the-change\"\u003eWhy GitHub Is Making the Change\u003c/h2\u003e\n\n\u003cp\u003eGitHub described install-time lifecycle scripts as the “single largest code-execution surface in the npm ecosystem.” The article explains that \u003ccode\u003enpm install\u003c/code\u003e downloads and installs the necessary dependencies for a Node.js project. During that process, npm can run scripts from every transitive dependency.\u003c/p\u003e\n\n\u003cp\u003eAccording to GitHub, this creates a risk because a single compromised package anywhere in the dependency tree can run arbitrary code on a developer machine or CI runner. The changes are designed to combat attack techniques that use \u003ccode\u003enpm install\u003c/code\u003e to trigger malicious code execution through lifecycle hooks.\u003c/p\u003e\n\n\u003ch2 id=\"install-script-behavior-in-npm-version-12\"\u003eInstall Script Behavior in npm Version 12\u003c/h2\u003e\n\n\u003cp\u003eIn npm version 12, \u003ccode\u003enpm install\u003c/code\u003e will no longer execute dependency install scripts unless they are explicitly allowed in the project. The blocked lifecycle scripts include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epreinstall\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003einstall\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epostinstall\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis means dependency scripts will no longer be trusted by default. Developers will need to explicitly approve script execution for packages they trust.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-native-builds-and-prepare-scripts\"\u003eImpact on Native Builds and Prepare Scripts\u003c/h2\u003e\n\n\u003cp\u003eGitHub said the default \u003ccode\u003eallowScripts\u003c/code\u003e behavior also affects native \u003ccode\u003enode-gyp\u003c/code\u003e builds. A package with a \u003ccode\u003ebinding.gyp\u003c/code\u003e file and no explicit install script will still be blocked because npm runs an implicit \u003ccode\u003enode-gyp rebuild\u003c/code\u003e for it.\u003c/p\u003e\n\n\u003cp\u003eThe same blocking approach applies to \u003ccode\u003eprepare\u003c/code\u003e scripts from certain dependency types. GitHub said \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, file, and link dependencies are blocked in the same way.\u003c/p\u003e\n\n\u003ch2 id=\"git-and-remote-url-dependency-changes\"\u003eGit and Remote URL Dependency Changes\u003c/h2\u003e\n\n\u003cp\u003enpm version 12 will also change how Git dependencies and remote URL dependencies are handled. By default, \u003ccode\u003enpm install\u003c/code\u003e will no longer resolve Git dependencies unless they are explicitly allowed with \u003ccode\u003e--allow-git\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe change applies to both direct and transitive Git dependencies. GitHub said defaulting \u003ccode\u003e--allow-git\u003c/code\u003e to \u003ccode\u003enone\u003c/code\u003e closes a code execution path where a Git dependency’s \u003ccode\u003e.npmrc\u003c/code\u003e configuration file could override the Git executable, even when \u003ccode\u003e--ignore-scripts\u003c/code\u003e is used.\u003c/p\u003e\n\n\u003cp\u003eRemote URL dependencies will also be blocked by default. npm will no longer resolve dependencies from remote URLs, including HTTPS tarballs, unless they are explicitly allowed with \u003ccode\u003e--allow-remote\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"developer-preparation-and-recommended-response\"\u003eDeveloper Preparation and Recommended Response\u003c/h2\u003e\n\n\u003cp\u003eGitHub recommends that developers prepare by upgrading to npm 11.16.0 or newer. After upgrading, developers should run the normal install process and review the warnings that npm displays.\u003c/p\u003e\n\n\u003cp\u003eGitHub also recommends using:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003enpm approve-scripts --allow-scripts-pending\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis command shows which packages have scripts. Developers can then approve the packages they trust and commit the updated \u003ccode\u003epackage.json\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eGitHub said that after this preparation, approved scripts will continue running once developers upgrade to npm version 12. Any scripts left unapproved will stop running.\u003c/p\u003e\n\n\u003ch2 id=\"related-npm-security-setting\"\u003eRelated npm Security Setting\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that npm earlier introduced \u003ccode\u003emin-release-age\u003c/code\u003e. This setting tells npm to reject any package version published less than a specified number of days earlier.\u003c/p\u003e\n\n\u003cp\u003eThe article describes \u003ccode\u003emin-release-age\u003c/code\u003e as a safeguard against newly published malicious packages.\u003c/p\u003e\n","keyPoints":["GitHub announced breaking changes for npm version 12, including disabling install scripts by default to reduce software supply chain threats.","GitHub said npm install currently runs scripts from every transitive dependency, allowing a compromised package anywhere in the dependency tree to execute arbitrary code on a developer machine or CI runner.","In npm version 12, npm install will not execute preinstall, install, or postinstall scripts from dependencies unless they are explicitly allowed in the project.","In npm version 12, npm install will not resolve Git dependencies or dependencies from remote URLs unless they are explicitly allowed with the relevant options.","GitHub recommends developers upgrade to npm 11.16.0 or newer, review install warnings, and use npm approve-scripts --allow-scripts-pending to approve trusted packages before upgrading."],"insights":["Native node-gyp builds will be blocked even when a package has no explicit install script because npm runs an implicit node-gyp rebuild for packages with binding.gyp.","The --allow-git default of none addresses a code execution path where a Git dependency’s .npmrc configuration could override the Git executable even when --ignore-scripts is used.","Developers can prepare before npm v12 by using npm 11.16.0 or newer to surface warnings and commit approvals into package.json with npm approve-scripts --allow-scripts-pending.","Unapproved scripts will stop running after the upgrade, so package maintainers and teams need to distinguish trusted install-time behavior from unnecessary lifecycle scripts before moving to npm v12."],"referencedReports":[],"body":"\u003cp\u003eGitHub announced breaking changes coming to npm version 12, including disabling install scripts by default. The change is intended to combat software supply chain threats that abuse the \u003ccode\u003enpm install\u003c/code\u003e command to execute malicious code through npm lifecycle hooks. Version 12 is scheduled for release next month.\u003c/p\u003e\n\n\u003cp\u003eGitHub described install-time lifecycle scripts as the “single largest code-execution surface in the npm ecosystem.” It said \u003ccode\u003enpm install\u003c/code\u003e currently runs scripts from every transitive dependency, meaning a compromised package anywhere in the dependency tree can run arbitrary code on a developer machine or CI runner. The new behavior makes script execution opt-in rather than trusted by default.\u003c/p\u003e\n\n\u003cp\u003eThe changes also block Git dependencies and remote URL dependencies by default unless explicitly allowed. GitHub recommends developers prepare by upgrading to npm 11.16.0 or newer, reviewing warnings, and using \u003ccode\u003enpm approve-scripts --allow-scripts-pending\u003c/code\u003e to approve trusted packages. Unapproved scripts will stop running after the upgrade.\u003c/p\u003e\n"},{"n":1,"title":"Microsoft fixes BitLocker recovery bug on Windows Server 2025","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-bitlocker-recovery-bug-on-windows-server-2025/","time":"08:44","priority":"MAY READ","score":72,"tldr":"Microsoft fixed a Windows Server 2025 issue that caused some BitLocker-enabled systems with specific TPM/PCR7 Group Policy settings to prompt for a recovery key after April 2026 updates. The fix is included in the June 2026 cumulative updates, with mitigations available for admins who cannot deploy them yet.","briefOverview":"\u003cp\u003eMicrosoft has resolved a known issue that caused some Windows Server 2025 devices to boot into BitLocker recovery after installing the April 2026 security update. The problem affected systems with specific, unrecommended BitLocker Group Policy settings involving TPM platform validation and PCR7. Microsoft fixed the bug in the June 2026 cumulative updates for Windows Server 2025 and Windows 11 23H2.\u003c/p\u003e\n\n\u003cp\u003eThe issue was significant because affected administrators could be prompted to enter a BitLocker recovery key after the first restart following the update. Microsoft said the recovery key should only need to be entered once, and later restarts should not trigger the recovery screen if the Group Policy configuration remains unchanged. The company also said personal devices were unlikely to be affected because the impacted configurations are typically found on enterprise-managed systems.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s fix prevents devices with the incompatible Group Policy configuration from installing the 2023-signed Windows Boot Manager, which could trigger the unexpected BitLocker recovery prompt. Affected devices may show Event ID 1032 in the System event log when installing Windows updates. Administrators who cannot deploy the June updates are advised to remove the relevant Group Policy configuration or use Known Issue Rollback to prevent the automatic switch to the 2023 Boot Manager.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft fixed a BitLocker recovery issue affecting some Windows Server 2025 devices after installation of the April 2026 security update. The issue caused certain systems to boot into BitLocker recovery and require entry of the recovery key on the first restart after the update. Microsoft addressed the problem in the KB5094125 cumulative update for Windows Server 2025 and the KB5093998 cumulative update for Windows 11 23H2.\u003c/p\u003e\n\n\u003cp\u003eBitLocker is a Windows security feature that encrypts storage drives to protect data from theft. Windows systems can enter BitLocker recovery after certain hardware or platform changes, such as TPM updates, when protected drives cannot be unlocked through the default mechanism. In this case, Microsoft tied the unexpected recovery prompts to specific Trusted Platform Module validation settings and invalid PCR7 configurations.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue only occurs under a narrow set of conditions. Affected devices must have BitLocker enabled on the OS drive, a configured Group Policy for TPM platform validation on native UEFI firmware with PCR7 included, and a Secure Boot State PCR7 Binding reported as “Not Possible” in System Information. The device must also have the Windows UEFI CA 2023 certificate in the Secure Boot Signature Database and must not already be running the 2023-signed Windows Boot Manager.\u003c/p\u003e\n\n\u003cp\u003eAlthough some Windows 11 systems may also be affected, Microsoft said personal devices are unlikely to be impacted. The affected configurations are generally found on enterprise systems managed by corporate IT teams. Microsoft also said the BitLocker recovery key only needs to be entered once if the Group Policy configuration remains unchanged.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s update prevents devices with the incompatible Group Policy configuration from installing the 2023-signed Windows Boot Manager. The company said this is intended to prevent unexpected BitLocker recovery key prompts. If a device was affected by this protective behavior, administrators may see Event ID 1032 in the System event log when installing Windows updates.\u003c/p\u003e\n\n\u003cp\u003eFor administrators who cannot immediately deploy the June updates, Microsoft advised removing the relevant Group Policy configuration before installing KB5082063 and later updates. Microsoft also said administrators who cannot remove the policy before deployment can apply a Known Issue Rollback on affected devices. The rollback prevents the automatic switch to the 2023 Boot Manager that triggers the BitLocker recovery prompts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft resolved a known BitLocker recovery issue affecting some Windows Server 2025 devices after installation of the April 2026 security update. The issue caused certain systems to boot into BitLocker recovery and prompt administrators for the BitLocker recovery key after the first restart.\u003c/p\u003e\n\n\u003cp\u003eThe fix was delivered during the June 2026 Patch Tuesday cycle. Microsoft addressed the bug in KB5094125 for Windows Server 2025 and KB5093998 for Windows 11 23H2.\u003c/p\u003e\n\n\u003ch2 id=\"what-happened\"\u003eWhat happened\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft had previously acknowledged that some devices with an unrecommended BitLocker Group Policy configuration might be required to enter their BitLocker recovery key after installing the April 2026 update. The recovery prompt occurred on the first restart after the update.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said that, in this scenario, the BitLocker recovery key only needs to be entered once. Subsequent restarts should not trigger the BitLocker recovery screen as long as the Group Policy configuration remains unchanged.\u003c/p\u003e\n\n\u003ch2 id=\"technical-conditions-for-impact\"\u003eTechnical conditions for impact\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the issue occurs only on devices meeting all of the following conditions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBitLocker is enabled on the operating system drive.\u003c/li\u003e\n\u003cli\u003eThe Group Policy “Configure TPM platform validation profile for native UEFI firmware configurations” is configured, and PCR7 is included in the validation profile, or the equivalent registry key is set manually.\u003c/li\u003e\n\u003cli\u003eSystem Information, through msinfo32.exe, reports that Secure Boot State PCR7 Binding is “Not Possible.”\u003c/li\u003e\n\u003cli\u003eThe Windows UEFI CA 2023 certificate is present in the device’s Secure Boot Signature Database, making the device eligible for the 2023-signed Windows Boot Manager to become the default.\u003c/li\u003e\n\u003cli\u003eThe device is not already running the 2023-signed Windows Boot Manager.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft described the issue as involving certain Trusted Platform Module validation settings, including invalid PCR7 configurations. The problem was associated with updating boot files and the automatic switch to the 2023-signed Windows Boot Manager.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems\"\u003eAffected systems\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on Windows Server 2025 systems affected after the April 2026 security update. Microsoft also said the issue may affect some Windows 11 systems.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft stated that the issue is unlikely to affect personal devices. The impacted configurations are typically found on enterprise systems managed by corporate IT teams.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-fix\"\u003eMicrosoft’s fix\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft fixed the issue in the June 2026 cumulative updates:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKB5094125 for Windows Server 2025.\u003c/li\u003e\n\u003cli\u003eKB5093998 for Windows 11 23H2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said the update addresses an issue where some devices might enter BitLocker Recovery after updating boot files on systems with certain TPM validation settings. These settings include invalid PCR7 configurations.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-fix-works\"\u003eHow the fix works\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said devices with the incompatible Group Policy configuration are prevented from installing the 2023-signed Windows Boot Manager. This is intended to prevent the unexpected BitLocker recovery key prompt.\u003c/p\u003e\n\n\u003cp\u003eIf a device is affected by this behavior, administrators may see Event ID 1032 in the System event log when installing Windows updates.\u003c/p\u003e\n\n\u003ch2 id=\"guidance-for-administrators\"\u003eGuidance for administrators\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft advised IT administrators who cannot yet deploy the June updates to remove the relevant Group Policy configuration before installing KB5082063 and later updates. Microsoft also advised ensuring that BitLocker bindings use the PCR7 profile.\u003c/p\u003e\n\n\u003cp\u003eFor administrators who cannot remove the Group Policy before deployment, Microsoft said they can apply a Known Issue Rollback on affected devices. This prevents the automatic switch to the 2023 Boot Manager, which triggers the BitLocker recovery prompts.\u003c/p\u003e\n\n\u003ch2 id=\"related-prior-bitlocker-recovery-issues\"\u003eRelated prior BitLocker recovery issues\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Microsoft has addressed similar BitLocker recovery problems in previous Windows update cycles. In August 2024, Microsoft fixed a known issue that triggered BitLocker recovery prompts across all supported Windows versions after the July 2024 security updates.\u003c/p\u003e\n\n\u003cp\u003eIn May 2025, Microsoft released emergency updates to address a similar issue that caused Windows 10 systems to enter BitLocker recovery after the May 2025 security updates.\u003c/p\u003e\n","keyPoints":["Microsoft resolved a known issue that caused some Windows Server 2025 devices to boot into BitLocker recovery after installing the April 2026 security update.","The issue affected devices with BitLocker enabled on the OS drive and a specific unrecommended BitLocker Group Policy configuration involving TPM platform validation and PCR7.","Microsoft fixed the bug in the KB5094125 cumulative update for Windows Server 2025 and the KB5093998 cumulative update for Windows 11 23H2.","Microsoft said affected devices with the incompatible group policy configuration are now prevented from installing the 2023-signed Windows Boot Manager to avoid unexpected BitLocker recovery prompts.","IT admins who cannot deploy the June updates are advised to remove the relevant Group Policy configuration before installing KB5082063 and later updates, or apply a Known Issue Rollback to prevent the automatic switch to the 2023 Boot Manager."],"insights":["The BitLocker recovery prompt is expected to appear only once on affected devices, and later restarts should not trigger it again if the Group Policy configuration is not changed.","The issue is unlikely to affect personal devices because the impacted BitLocker configuration is typically found on enterprise systems managed by corporate IT teams.","Event ID 1032 in the System event log indicates that a device with the incompatible Group Policy configuration was prevented from installing the 2023-signed Windows Boot Manager.","Microsoft’s fix avoids the recovery prompt by blocking installation of the 2023-signed Windows Boot Manager on devices with the incompatible TPM validation configuration, rather than simply suppressing BitLocker recovery."],"referencedReports":[{"title":"June 9, 2026—KB5094125 (OS Build 26100.32995)","url":"https://support.microsoft.com/help/5094125","publisher":"Microsoft","context":"The article cites this Microsoft cumulative update advisory as the Windows Server 2025 fix for the BitLocker recovery issue.","category":"","primary":false},{"title":"KB5093998","url":"https://support.microsoft.com/help/5093998","publisher":"Microsoft","context":"The article cites this Microsoft cumulative update advisory as the Windows 11 23H2 fix for the BitLocker recovery issue.","category":"","primary":false},{"title":"Windows release health service alert WI1280139","url":"https://admin.cloud.microsoft/Adminportal/Home?source=applauncher#/windowsreleasehealth/:/issue/WI1280139","publisher":"Microsoft","context":"The article references this Microsoft service alert for details that affected devices may log Event ID 1032 and be blocked from installing the 2023-signed Windows Boot Manager.","category":"","primary":false},{"title":"April 14, 2026—KB5082063 (OS Build 26100.32690)","url":"http://support.microsoft.com/en-us/topic/april-14-2026-kb5082063-os-build-26100-32690-c57e289d-27c9-47cd-a183-72fabc62c5d7#:~:text=Option%201,-%3A%20Remove","publisher":"Microsoft","context":"The article links to this Microsoft advisory for mitigation guidance on removing the relevant Group Policy configuration before installing KB5082063 and later updates.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has resolved a known issue that caused some Windows Server 2025 devices to boot into BitLocker recovery after installing the April 2026 security update. The problem affected systems with specific, unrecommended BitLocker Group Policy settings involving TPM platform validation and PCR7. Microsoft fixed the bug in the June 2026 cumulative updates for Windows Server 2025 and Windows 11 23H2.\u003c/p\u003e\n\n\u003cp\u003eThe issue was significant because affected administrators could be prompted to enter a BitLocker recovery key after the first restart following the update. Microsoft said the recovery key should only need to be entered once, and later restarts should not trigger the recovery screen if the Group Policy configuration remains unchanged. The company also said personal devices were unlikely to be affected because the impacted configurations are typically found on enterprise-managed systems.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s fix prevents devices with the incompatible Group Policy configuration from installing the 2023-signed Windows Boot Manager, which could trigger the unexpected BitLocker recovery prompt. Affected devices may show Event ID 1032 in the System event log when installing Windows updates. Administrators who cannot deploy the June updates are advised to remove the relevant Group Policy configuration or use Known Issue Rollback to prevent the automatic switch to the 2023 Boot Manager.\u003c/p\u003e\n"},{"n":5,"title":"Webinar: Closing the OT Security Visibility Gap: From Blind Spots to Continuous Protection","source":"register.gotowebinar.com","sourceColorIdx":8,"link":"https://register.gotowebinar.com/register/7618879363370778966#new_tab","time":"07:54","priority":"MAY READ","score":20,"tldr":"A webinar will discuss how organizations can close visibility gaps in operational technology environments and move from blind spots to continuous protection.","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article is about a webinar titled “Closing the OT Security Visibility Gap: From Blind Spots to Continuous Protection.”","The webinar focuses on closing the visibility gap in operational technology security.","The webinar’s title frames the topic as a shift from security blind spots to continuous protection."],"insights":[],"referencedReports":[],"body":""}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
