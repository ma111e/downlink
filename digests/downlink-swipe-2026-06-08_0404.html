<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

</style>

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Over 20,000 Instagram accounts stolen in Meta AI support hack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/meta-ai-support-data-breach-affects-20-000-instagram-accounts/","time":"06:00","priority":"SHOULD READ","score":86,"tldr":"Meta says attackers abused a flaw in Instagram’s AI-assisted High Touch Support account recovery tool to reset passwords and hijack more than 20,000 accounts that lacked 2FA. Meta disabled the tool, invalidated reset links, secured affected accounts, and plans to add proper email verification before relaunching it.","briefOverview":"\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked after attackers abused an AI-powered account recovery support system. The incident involved Meta’s High Touch Support tool, which helps users regain access after being locked out of Instagram accounts. Meta said the issue has been resolved and that it is securing impacted accounts.\u003c/p\u003e\n\n\u003cp\u003eThe attackers exploited the tool because it did not verify whether email addresses were associated with the targeted Instagram accounts. This allowed them to obtain password reset links and log in to accounts that did not have two-factor authentication enabled. Meta said attackers may have accessed contact information, dates of birth, posts, photos, videos, stories, direct messages, account activity, profile details, linked services, and other connected accounts.\u003c/p\u003e\n\n\u003cp\u003eMeta discovered the vulnerability on May 31, 2026, while Maine’s breach filing lists April 17 as the breach date. After discovering the incident, Meta disabled the High Touch Support system and all password reset links it had generated. The company also enrolled potentially stolen accounts into a mandatory security checkpoint and said it will fix the authentication check before relaunching the tool.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMeta disclosed that over 20,000 Instagram accounts were hijacked in an incident involving its AI-powered High Touch Support account recovery tool. The tool was designed to help users regain access to Instagram accounts after being locked out. According to Meta, unauthorized third parties exploited a vulnerability in the system to perform password resets on Instagram user accounts.\u003c/p\u003e\n\n\u003cp\u003eThe core technical issue was that the High Touch Support tool did not verify whether email addresses were associated with the targeted Instagram accounts. By exploiting that weakness, attackers obtained password reset links that let them log in and hijack accounts without two-factor authentication enabled. The article does not name the attackers beyond describing them as unauthorized third parties and threat actors.\u003c/p\u003e\n\n\u003cp\u003eThe incident became public after a wave of user reports appeared on social media platforms. Andy Stone, Meta’s vice president of communications, replied to one affected user that the issue had been resolved and that Meta was securing impacted accounts. BleepingComputer said it contacted Meta for comment but had not received a response at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eIn a breach letter filed with Maine’s Office of the Attorney General, Meta said the vulnerability was used to potentially compromise 30 Instagram accounts in that jurisdiction. Meta said it discovered the issue on May 31, 2026, while the Maine filing lists April 17 as the breach date, which the article says is likely the date of the first attack exploiting the flaw. Meta said all accounts in the filing had been secured to prevent continued unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eMeta said it does not know what personal information may have been accessed or stolen from compromised accounts. However, it listed categories attackers could have accessed, including email addresses or phone numbers, dates of birth, social media posts and content, direct messages, account activity, profile information, linked services, and other connected accounts.\u003c/p\u003e\n\n\u003cp\u003eAfter discovering the incident, Meta disabled the High Touch Support AI-powered support system and invalidated all password reset links it had generated. It also placed potentially stolen accounts into a mandatory security checkpoint and required affected users to reset passwords and re-authenticate. Meta said it will fix the authentication check before relaunching the tool and is reviewing similar account recovery flows across its platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked in an incident involving its AI-powered High Touch Support account recovery tool. The tool, referred to as HTS, helps users regain access after being locked out of their Instagram accounts. Attackers abused the system to obtain password reset links and take over accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article says the incident followed a wave of user reports on social media platforms. Andy Stone, Meta’s vice president of communications, replied to one affected user that the issue had been resolved and that Meta was securing impacted accounts. BleepingComputer said it contacted Meta for comment the previous week but had not yet received a response.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability involved Meta’s High Touch Support tool, an AI-assisted account recovery system for Instagram. The article states that the tool did not verify whether email addresses were associated with the targeted Instagram accounts. Attackers exploited that weakness to generate password reset links.\u003c/p\u003e\n\n\u003cp\u003eThose password reset links allowed the attackers to log in and hijack accounts without two-factor authentication enabled. The article identifies the attackers only as threat actors and unauthorized third parties. No named threat actor or group is attributed in the article.\u003c/p\u003e\n\n\u003cp\u003eMeta described the issue in a data breach letter filed with Maine’s Office of the Attorney General. In that letter, Meta said that on May 31, 2026, it discovered a vulnerability in the AI-assisted account recovery system for Instagram that had been exploited to perform password resets on user accounts.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-disclosure\"\u003eTimeline and Disclosure\u003c/h2\u003e\n\n\u003cp\u003eThe article reports two dates associated with the incident:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMeta said it discovered the vulnerability on May 31, 2026.\u003c/li\u003e\n\u003cli\u003eMaine’s Office of the Attorney General filing lists April 17 as the breach date.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says April 17 is likely the date of the first attack exploiting the HTS flaw. Meta’s breach letter did not specify when the attacks began.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users-and-jurisdictions\"\u003eAffected Users and Jurisdictions\u003c/h2\u003e\n\n\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked overall. In the breach letter filed with Maine’s Office of the Attorney General, Meta said the vulnerability was used to potentially compromise the Instagram accounts of 30 users in that jurisdiction. Meta said all accounts referenced in that filing had been secured to prevent continued unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the affected accounts were those hijacked through the abused account recovery process. It specifically states that the password reset links allowed attackers to hijack accounts without two-factor authentication enabled.\u003c/p\u003e\n\n\u003ch2 id=\"potentially-accessed-information\"\u003ePotentially Accessed Information\u003c/h2\u003e\n\n\u003cp\u003eMeta said it has no information on what personal information may have been accessed or stolen from the compromised accounts. However, it stated that attackers could have gained access to several categories of account information and content.\u003c/p\u003e\n\n\u003cp\u003eThe potentially accessible information included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eContact information, including email address and/or phone number.\u003c/li\u003e\n\u003cli\u003eDates of birth.\u003c/li\u003e\n\u003cli\u003eSocial media posts and content, including photos, videos, and stories.\u003c/li\u003e\n\u003cli\u003eDirect messages and communications.\u003c/li\u003e\n\u003cli\u003eAccount activity and interaction history.\u003c/li\u003e\n\u003cli\u003eProfile information, including biography and profile photo.\u003c/li\u003e\n\u003cli\u003eOther connected accounts and linked services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"meta-s-response\"\u003eMeta’s Response\u003c/h2\u003e\n\n\u003cp\u003eAfter discovering the incident, Meta disabled the HTS AI-powered support system. It also disabled all password reset links generated by that system to block future hijack attempts tied to the same malicious campaign.\u003c/p\u003e\n\n\u003cp\u003eMeta also enrolled all potentially stolen accounts into a mandatory security checkpoint. Affected users were asked to reset their passwords again and re-authenticate to secure and regain control of the compromised accounts.\u003c/p\u003e\n\n\u003cp\u003eBefore relaunching the tool, Meta said it will fix the authentication check in the Instagram recovery entry point. The stated purpose of the fix is to ensure proper verification of email addresses against existing account information before any password reset is initiated.\u003c/p\u003e\n\n\u003cp\u003eMeta also said it is conducting a comprehensive review of similar account recovery flows across its platforms to identify and remediate any potential issues.\u003c/p\u003e\n\n\u003ch2 id=\"related-meta-security-and-privacy-context-mentioned-in-the-article\"\u003eRelated Meta Security and Privacy Context Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article notes prior regulatory penalties involving Meta. Ireland fined Meta $264 million over a 2018 Facebook data breach that exposed names, email addresses, phone numbers, and physical locations of over 29 million Facebook accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Meta was fined €265 million, or \u003cspan class=\"math inline\"\u003e\\(275.5 million, in November 2022 for failing to protect Facebook users’ data from scrapers. It further notes another €91 million, or \\)\u003c/span\u003e100 million, fine for storing the passwords of hundreds of millions of users in plaintext.\u003c/p\u003e\n","keyPoints":["Meta revealed that over 20,000 Instagram users had their accounts hijacked after attackers abused its AI-powered High Touch Support account recovery tool to reset passwords.","The flaw allowed attackers to obtain password reset links because the High Touch Support tool did not verify whether email addresses were associated with the targeted Instagram accounts.","Meta said in a breach letter that it discovered the vulnerability on May 31, 2026, and that Maine’s filing lists April 17 as the breach date.","Meta disabled the High Touch Support system and all password reset links it generated, enrolled potentially stolen accounts into a mandatory security checkpoint, and required affected users to reset passwords and re-authenticate.","Meta said attackers may have accessed affected users’ contact information, dates of birth, posts, photos, videos, stories, direct messages, account activity, profile information, and linked accounts or services."],"insights":["The incident shows that an account recovery tool can become a high-impact takeover path when it can generate password reset links without validating that the requester’s email matches the targeted account.","Accounts without two-factor authentication were specifically vulnerable to full hijacking once attackers obtained the password reset links.","Meta’s Maine breach notice referenced only 30 users in that jurisdiction, while the article reports more than 20,000 affected Instagram accounts overall, highlighting that individual regulatory filings may describe only a local subset of a larger incident.","Meta’s plan to review similar account recovery flows across its platforms indicates the company considers this authentication-check weakness potentially repeatable beyond the affected Instagram HTS entry point."],"referencedReports":[{"title":"Meta AI Support Tool Incident AG Notification","url":"https://legacy.www.documentcloud.org/documents/28211657-meta-ai-support-tool-incident-ag-notification-bc-me/","publisher":"Meta","context":"The article cites Meta’s data breach letter filed with Maine’s Office of the Attorney General to describe the HTS vulnerability, discovery date, affected users in Maine, and remediation steps.","category":"advisory","primary":true}],"body":"\u003cp\u003eMeta revealed that over 20,000 Instagram users had their accounts hijacked after attackers abused an AI-powered account recovery support system. The incident involved Meta’s High Touch Support tool, which helps users regain access after being locked out of Instagram accounts. Meta said the issue has been resolved and that it is securing impacted accounts.\u003c/p\u003e\n\n\u003cp\u003eThe attackers exploited the tool because it did not verify whether email addresses were associated with the targeted Instagram accounts. This allowed them to obtain password reset links and log in to accounts that did not have two-factor authentication enabled. Meta said attackers may have accessed contact information, dates of birth, posts, photos, videos, stories, direct messages, account activity, profile details, linked services, and other connected accounts.\u003c/p\u003e\n\n\u003cp\u003eMeta discovered the vulnerability on May 31, 2026, while Maine’s breach filing lists April 17 as the breach date. After discovering the incident, Meta disabled the High Touch Support system and all password reset links it had generated. The company also enrolled potentially stolen accounts into a mandatory security checkpoint and said it will fix the authentication check before relaunching the tool.\u003c/p\u003e\n"},{"n":2,"title":"VS Code Adds 2-Hour Extension Auto-Update Delay to Limit Supply Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/vs-code-adds-2-hour-extension-auto.html","time":"06:08","priority":"SHOULD READ","score":78,"tldr":"Microsoft is adding a two-hour delay to automatic VS Code extension updates to reduce exposure to malicious or compromised releases in software supply chain attacks. Users can still manually update immediately, and trusted publishers like Microsoft, GitHub, and OpenAI are exempt from the delay.","briefOverview":"\u003cp\u003eMicrosoft announced that Visual Studio Code will delay automatic extension updates by two hours when automatic updates are enabled. The change is intended to add protection against problematic or potentially compromised releases. The feature is available starting in VS Code 1.123.\u003c/p\u003e\n\n\u003cp\u003eUsers can still update any extension immediately by selecting the “Update” button. For pending extension updates, VS Code will show why the update has not yet been applied and when the automatic update is scheduled. The two-hour delay does not apply to extensions from trusted publishers such as Microsoft, GitHub, and OpenAI.\u003c/p\u003e\n\n\u003cp\u003eThe move follows similar time-based controls added across developer ecosystems, including Bundler, Bun, npm, pnpm, and Yarn. These controls are designed to reduce exposure to newly published malicious versions before they are detected and removed by registry maintainers. The article frames the change as part of a broader response to increased software supply chain incidents targeting developer systems and downstream users.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has announced a two-hour delay before Visual Studio Code extensions are automatically updated to newer versions. The change applies when automatic updates are enabled and is intended to limit exposure to problematic or potentially compromised extension releases. Microsoft said the delay adds an additional layer of protection against such releases. The feature is available starting in VS Code 1.123.\u003c/p\u003e\n\n\u003cp\u003eThe delay affects automatic updates, but users retain the ability to update extensions immediately. The article states that any extension can still be updated at any time by using the “Update” button. When an update is pending, the extension details view will show the reason it has not yet updated and when the automatic update will occur.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also identified an exception to the new delay. Extensions from trusted publishers such as Microsoft, GitHub, and OpenAI will continue to be updated immediately. The article does not describe any specific compromised VS Code extension or named threat actor behind the change.\u003c/p\u003e\n\n\u003cp\u003eThe VS Code update comes shortly after RubyGems added an opt-in cooldown feature to Bundler 4.0.13. That feature allows developers to configure a time-based delay before newly published gem versions are installed. The stated goal is to reduce exposure to newly published malicious versions.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that similar installation controls have been introduced over the past year in Bun, npm, pnpm, and Yarn. These include Bun’s minimumReleaseAge, npm’s min-release-age, pnpm’s minimumReleaseAge, and Yarn’s npmMinimalAgeGate. The broader purpose of these minimum-age thresholds is to narrow the time window in which malicious packages can spread before registry maintainers identify and remove them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft announced that Visual Studio Code will introduce a two-hour delay before extensions are automatically updated to newer versions. The change is designed to help address software supply chain threats by reducing the chance that users immediately receive problematic or potentially compromised extension releases. Microsoft said that when automatic updates are enabled, new versions will be auto-updated two hours after publication.\u003c/p\u003e\n\n\u003cp\u003eThe feature is available starting in VS Code 1.123. The article presents the change as a defensive control for the IDE’s extension update process rather than as a response to a specific named incident.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-vs-code-update-delay-works\"\u003eHow the VS Code update delay works\u003c/h2\u003e\n\n\u003cp\u003eWhen automatic extension updates are enabled, VS Code will not immediately install newly published extension versions. Instead, it will wait two hours before applying the update automatically. Microsoft described this as an added layer of protection against problematic or potentially compromised releases.\u003c/p\u003e\n\n\u003cp\u003eUsers are not forced to wait if they choose to update manually. The article states that users can still update any extension immediately at any time by using the “Update” button.\u003c/p\u003e\n\n\u003cp\u003eVS Code will also provide visibility into pending updates. When extensions have pending updates, the details view will show why they have not been updated yet and when the automatic update is scheduled to occur.\u003c/p\u003e\n\n\u003ch2 id=\"exceptions-for-trusted-publishers\"\u003eExceptions for trusted publishers\u003c/h2\u003e\n\n\u003cp\u003eThe two-hour delay does not apply to extensions from trusted publishers. Microsoft specifically named Microsoft, GitHub, and OpenAI as examples of trusted publishers. Extensions from those publishers will continue to be updated immediately.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide additional criteria for how trusted publishers are selected. It only states that extensions from trusted publishers are exempt from the delay.\u003c/p\u003e\n\n\u003ch2 id=\"related-ecosystem-changes\"\u003eRelated ecosystem changes\u003c/h2\u003e\n\n\u003cp\u003eThe article places Microsoft’s VS Code change in the context of similar time-based controls added to other developer tooling ecosystems. It notes that RubyGems recently added an opt-in cooldown feature to Bundler 4.0.13. That feature allows developers to configure Bundler to delay installation of newly published gem versions for a predefined period.\u003c/p\u003e\n\n\u003cp\u003eThe article also lists similar controls added over the past year:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBun 1.3 and later: \u003ccode\u003eminimumReleaseAge\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003enpm v11.10.0 and later: \u003ccode\u003emin-release-age\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003epnpm 10.16 and later: \u003ccode\u003eminimumReleaseAge\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eYarn Berry 4.10.0 and later: \u003ccode\u003enpmMinimalAgeGate\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese controls share a common purpose: delaying the adoption or installation of newly published versions so that malicious releases have less opportunity to spread before being detected.\u003c/p\u003e\n\n\u003ch2 id=\"security-significance\"\u003eSecurity significance\u003c/h2\u003e\n\n\u003cp\u003eThe article says these changes arrive amid a surge in software supply chain incidents targeting different ecosystems. It states that such incidents are being used to breach developer systems and propagate malware to downstream users.\u003c/p\u003e\n\n\u003cp\u003eThe key defensive idea is a minimum age threshold before a package or extension version is installed automatically. By delaying installation, the control reduces the window in which a malicious version can spread before it is flagged and removed by registry maintainers.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eFor VS Code users with automatic extension updates enabled, the main impact is that some extension updates will be delayed by two hours. Users who want a specific update immediately can still install it manually. Users will also be able to see the reason for a pending update and the scheduled automatic update time in the extension details view.\u003c/p\u003e\n\n\u003cp\u003eFor publishers considered trusted by Microsoft, including Microsoft, GitHub, and OpenAI, extension updates will continue to happen immediately. The article does not describe any required action for extension publishers or administrators beyond the new behavior in VS Code 1.123.\u003c/p\u003e\n","keyPoints":["Microsoft announced that Visual Studio Code will delay automatic extension updates by two hours to help address software supply chain threats.","The delayed automatic update feature is available starting in Visual Studio Code 1.123.","Users can still manually update any extension immediately by using the Update button.","The two-hour delay does not apply to extensions from trusted publishers such as Microsoft, GitHub, and OpenAI, which will continue to update immediately.","Similar time-based installation delay controls have been added to Bundler, Bun, npm, pnpm, and Yarn."],"insights":["VS Code’s delay model mirrors a broader ecosystem shift in which package managers and developer tools are adding minimum-age controls to reduce exposure to newly published malicious versions.","The protection is not absolute because users can bypass the delay by manually clicking the Update button for any pending extension.","The trusted-publisher exemption means extensions from Microsoft, GitHub, and OpenAI will not receive the same two-hour waiting period before automatic updates.","VS Code will show users why an extension update is pending and when it will be applied, making the delay visible rather than silent."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft announced that Visual Studio Code will delay automatic extension updates by two hours when automatic updates are enabled. The change is intended to add protection against problematic or potentially compromised releases. The feature is available starting in VS Code 1.123.\u003c/p\u003e\n\n\u003cp\u003eUsers can still update any extension immediately by selecting the “Update” button. For pending extension updates, VS Code will show why the update has not yet been applied and when the automatic update is scheduled. The two-hour delay does not apply to extensions from trusted publishers such as Microsoft, GitHub, and OpenAI.\u003c/p\u003e\n\n\u003cp\u003eThe move follows similar time-based controls added across developer ecosystems, including Bundler, Bun, npm, pnpm, and Yarn. These controls are designed to reduce exposure to newly published malicious versions before they are detected and removed by registry maintainers. The article frames the change as part of a broader response to increased software supply chain incidents targeting developer systems and downstream users.\u003c/p\u003e\n"},{"n":3,"title":"Executive Identity Exposure Has Become a Board-Level Issue","source":"constella.ai","sourceColorIdx":4,"link":"https://constella.ai/blog/executive-identity-exposure-has-become-a-board-level-issue/","time":"06:00","priority":"MAY READ","score":52,"tldr":"Executive identities are increasingly targeted because their authority, trust, and public visibility make them ideal for impersonation, fraud, and broader compromise. Organizations should treat executive identity exposure as an enterprise risk and monitor, measure, and reduce it proactively.","briefOverview":"\u003cp\u003eThe article argues that executive identity exposure has become a board-level cybersecurity issue because attackers increasingly target CEOs, CFOs, board members, and senior leaders. These individuals may not have the most technical access, but they carry influence, authority, and trust. That combination makes executive identities valuable for impersonation, fraud, data theft, and broader organizational compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that executive exposure extends beyond corporate systems into personal email accounts, social media, professional networking platforms, public records, media coverage, conference appearances, and board memberships. Attackers can use this public and personal information to build detailed profiles and launch convincing attacks. AI is described as increasing the sophistication of these efforts by enabling personalized phishing, realistic impersonation content, and convincing executive communications.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends treating executive identity risk as an enterprise risk management concern rather than a personal security issue. It highlights metrics such as executive exposure rate, high-risk executive identities, impersonation incidents, time-to-remediation, and exposure trend analysis. It also calls for continuous identity monitoring, exposure assessment, executive awareness, incident response planning, and board reporting.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents executive identity exposure as a growing cybersecurity and governance concern. It says attackers are increasingly focusing on executives, including CEOs, CFOs, board members, and senior leadership. The reason is not necessarily technical privilege, but the influence, authority, and trust attached to executive roles. The article frames these identities as high-value assets and attractive targets in the modern threat landscape.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that identity-based attacks have shifted attention away from only infrastructure, endpoints, networks, applications, and privileged technical accounts. Attackers now seek access through trust by using stolen credentials, session hijacking, social engineering, impersonation, credential reuse, and identity intelligence. Executive identities are especially useful because they can support business email compromise, financial fraud, data theft, reputational damage, insider threat scenarios, and broader organizational compromise.\u003c/p\u003e\n\n\u003cp\u003eA key point in the article is that executive identity exposure is not limited to corporate environments. Executives often have large digital footprints across personal email accounts, professional networking platforms, social media profiles, public records, conference appearances, board memberships, and media coverage. This publicly available information can help attackers create detailed profiles and make attacks more convincing. The article links this exposure to the rise of executive impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe article describes common executive impersonation tactics such as fake email communications, deepfake audio and video, executive impersonation scams, fraudulent payment requests, and investor and vendor fraud. It also states that artificial intelligence is making executive targeting more effective. AI can help attackers generate personalized phishing campaigns, create convincing executive communications, analyze public information at scale, and develop realistic impersonation content.\u003c/p\u003e\n\n\u003cp\u003eThe article says executive identity exposure has become a board-level issue because the impacts can extend across financial, operational, reputational, regulatory, legal, and strategic risk. Boards are increasingly asking how exposed executives are, which identities present elevated risk, how compromise could affect the organization, and what controls exist to reduce exposure. The recommended response includes measuring executive exposure, monitoring identity risk, improving awareness, planning for executive-focused incidents, and reporting risk to the board.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that executive identity exposure has become a major cybersecurity and enterprise risk issue. It says attackers increasingly target executives such as CEOs, CFOs, board members, and senior leaders because these individuals possess influence, authority, and trust. The article emphasizes that executives may not have the most technical access in an organization, but their identities can be highly valuable to attackers.\u003c/p\u003e\n\n\u003cp\u003eThe central takeaway is that executive identity protection is no longer only a personal security concern. The article frames it as a business risk issue that should receive board-level attention. It states that executive identities have become both valuable organizational assets and attractive targets in modern cybersecurity.\u003c/p\u003e\n\n\u003ch2 id=\"shift-toward-identity-based-attacks\"\u003eShift Toward Identity-Based Attacks\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a shift in the threat landscape from attacks focused mainly on infrastructure to attacks focused on identity. It notes that cybersecurity programs historically emphasized firewalls, networks, endpoints, and applications. Today, attackers have learned that compromising an identity can be easier and more effective than compromising a system.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, attackers use methods including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStolen credentials\u003c/li\u003e\n\u003cli\u003eSession hijacking\u003c/li\u003e\n\u003cli\u003eSocial engineering\u003c/li\u003e\n\u003cli\u003eImpersonation\u003c/li\u003e\n\u003cli\u003eCredential reuse\u003c/li\u003e\n\u003cli\u003eIdentity intelligence\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the attacker goal is to gain access through trust. Executive identities are especially valuable in this model because they carry significant trust across the organization and with external parties.\u003c/p\u003e\n\n\u003ch2 id=\"why-executives-are-high-value-targets\"\u003eWhy Executives Are High-Value Targets\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies executives as high-value targets because they combine access, authority, and visibility. It says executives often have access to sensitive information, decision-making authority, financial approval rights, influence over employees, and relationships with partners and investors.\u003c/p\u003e\n\n\u003cp\u003eFrom the attacker’s perspective, compromising or impersonating an executive can create opportunities beyond those associated with an ordinary user account. The article lists potential outcomes of executive compromise, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBusiness email compromise\u003c/li\u003e\n\u003cli\u003eFinancial fraud\u003c/li\u003e\n\u003cli\u003eData theft\u003c/li\u003e\n\u003cli\u003eReputational damage\u003c/li\u003e\n\u003cli\u003eInsider threat scenarios\u003c/li\u003e\n\u003cli\u003eBroader organizational compromise\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that this combination makes executive identities among the most attractive targets in the modern threat landscape.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-beyond-corporate-systems\"\u003eExposure Beyond Corporate Systems\u003c/h2\u003e\n\n\u003cp\u003eA major point in the article is that executive identity exposure does not begin and end inside corporate systems. The article says executives often have broad digital footprints that include both professional and personal information.\u003c/p\u003e\n\n\u003cp\u003eExamples of exposure sources listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePersonal email accounts\u003c/li\u003e\n\u003cli\u003eProfessional networking platforms\u003c/li\u003e\n\u003cli\u003eSocial media profiles\u003c/li\u003e\n\u003cli\u003ePublic records\u003c/li\u003e\n\u003cli\u003eConference appearances\u003c/li\u003e\n\u003cli\u003eBoard memberships\u003c/li\u003e\n\u003cli\u003eMedia coverage\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that this visibility creates publicly available information that attackers can use to build detailed profiles. It states that the more information available about an executive, the easier it becomes to launch convincing attacks.\u003c/p\u003e\n\n\u003ch2 id=\"executive-impersonation\"\u003eExecutive Impersonation\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies executive impersonation as one of the fastest-growing forms of identity-based attack. Attackers use publicly available information to mimic executives and exploit trust relationships. The article states that people are conditioned to trust executives, and attackers exploit that trust.\u003c/p\u003e\n\n\u003cp\u003eCommon tactics mentioned in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFake email communications\u003c/li\u003e\n\u003cli\u003eDeepfake audio and video\u003c/li\u003e\n\u003cli\u003eExecutive impersonation scams\u003c/li\u003e\n\u003cli\u003eFraudulent payment requests\u003c/li\u003e\n\u003cli\u003eInvestor and vendor fraud\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article connects these tactics to the broader risk of executive exposure. It indicates that impersonation can be particularly effective because executive communications are often treated with urgency or authority.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-artificial-intelligence\"\u003eRole of Artificial Intelligence\u003c/h2\u003e\n\n\u003cp\u003eThe article says artificial intelligence is making executive targeting more effective. It explains that attackers can use AI to create more personalized and convincing attacks.\u003c/p\u003e\n\n\u003cp\u003eAI-enabled capabilities described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGenerating highly personalized phishing campaigns\u003c/li\u003e\n\u003cli\u003eCreating convincing executive communications\u003c/li\u003e\n\u003cli\u003eAnalyzing public information at scale\u003c/li\u003e\n\u003cli\u003eDeveloping realistic impersonation content\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that AI lowers the barrier to entry for sophisticated identity-based attacks. As a result, executive identities become even more valuable targets.\u003c/p\u003e\n\n\u003ch2 id=\"why-this-is-a-board-level-issue\"\u003eWhy This Is a Board-Level Issue\u003c/h2\u003e\n\n\u003cp\u003eThe article states that executive protection was historically viewed as a personal security concern, but is now a business risk issue. Boards are increasingly asking how exposed their executives are, which identities present elevated risk, how executive compromise could impact the organization, and what controls are in place to reduce exposure.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as part of a broader shift in cybersecurity governance. Identity is described not simply as an IT issue, but as an enterprise risk issue. Executive identities are presented as some of the organization’s highest-value assets.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impacts-of-executive-identity-exposure\"\u003ePotential Impacts of Executive Identity Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article says the consequences of executive compromise can extend well beyond cybersecurity. It identifies several categories of impact.\u003c/p\u003e\n\n\u003ch3 id=\"financial-loss\"\u003eFinancial Loss\u003c/h3\u003e\n\n\u003cp\u003eBusiness email compromise is described as one of the most costly forms of cybercrime. The article states that executive impersonation frequently serves as the catalyst.\u003c/p\u003e\n\n\u003ch3 id=\"operational-disruption\"\u003eOperational Disruption\u003c/h3\u003e\n\n\u003cp\u003eThe article says compromised executive accounts can disrupt critical business processes and decision-making.\u003c/p\u003e\n\n\u003ch3 id=\"reputational-damage\"\u003eReputational Damage\u003c/h3\u003e\n\n\u003cp\u003ePublic disclosure of executive compromise can undermine stakeholder confidence, according to the article.\u003c/p\u003e\n\n\u003ch3 id=\"regulatory-and-legal-risk\"\u003eRegulatory and Legal Risk\u003c/h3\u003e\n\n\u003cp\u003eThe article notes that identity-related incidents may trigger reporting requirements, investigations, and legal scrutiny.\u003c/p\u003e\n\n\u003ch3 id=\"strategic-risk\"\u003eStrategic Risk\u003c/h3\u003e\n\n\u003cp\u003eAttackers may gain access to confidential information related to mergers, acquisitions, financial performance, and strategic planning.\u003c/p\u003e\n\n\u003ch2 id=\"measuring-executive-identity-risk\"\u003eMeasuring Executive Identity Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article stresses that organizations cannot manage what they cannot measure. It recommends that security leaders track specific metrics to understand and communicate executive identity risk.\u003c/p\u003e\n\n\u003cp\u003eThe metrics listed include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExecutive exposure rate, meaning the percentage of executive identities appearing in exposure datasets.\u003c/li\u003e\n\u003cli\u003eHigh-risk executive identities, meaning executives associated with elevated exposure indicators.\u003c/li\u003e\n\u003cli\u003eExecutive impersonation incidents, meaning attempts to misuse executive identities.\u003c/li\u003e\n\u003cli\u003eTime-to-remediation, meaning the speed at which executive identity risks are addressed.\u003c/li\u003e\n\u003cli\u003eExposure trend analysis, meaning changes in executive exposure over time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese metrics are presented as a way to make executive identity risk more visible and manageable.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-identity-risk-intelligence\"\u003eRole of Identity Risk Intelligence\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts traditional security tools with Identity Risk Intelligence. Traditional tools are described as focusing on systems and infrastructure, while Identity Risk Intelligence focuses on people.\u003c/p\u003e\n\n\u003cp\u003eThe article says Identity Risk Intelligence provides visibility into:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExposed executive identities\u003c/li\u003e\n\u003cli\u003eCredential compromise\u003c/li\u003e\n\u003cli\u003eIdentity relationships\u003c/li\u003e\n\u003cli\u003eExposure patterns\u003c/li\u003e\n\u003cli\u003eEmerging risks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis visibility is described as enabling organizations to move from reactive response to proactive risk management. Instead of waiting for an incident, security teams can identify and address exposure before it is exploited.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-executive-identity-protection-strategy\"\u003eRecommended Executive Identity Protection Strategy\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends building a modern executive protection program that includes several components.\u003c/p\u003e\n\n\u003ch3 id=\"continuous-identity-monitoring\"\u003eContinuous Identity Monitoring\u003c/h3\u003e\n\n\u003cp\u003eOrganizations should track executive exposure across multiple environments.\u003c/p\u003e\n\n\u003ch3 id=\"exposure-assessment\"\u003eExposure Assessment\u003c/h3\u003e\n\n\u003cp\u003eOrganizations should understand where executive identities appear and what risks they create.\u003c/p\u003e\n\n\u003ch3 id=\"executive-awareness\"\u003eExecutive Awareness\u003c/h3\u003e\n\n\u003cp\u003eLeadership should be educated on identity-based threats and social engineering tactics.\u003c/p\u003e\n\n\u003ch3 id=\"incident-response-planning\"\u003eIncident Response Planning\u003c/h3\u003e\n\n\u003cp\u003eOrganizations should prepare for executive-focused compromise scenarios.\u003c/p\u003e\n\n\u003ch3 id=\"board-reporting\"\u003eBoard Reporting\u003c/h3\u003e\n\n\u003cp\u003eSecurity teams should provide visibility into executive identity risk and mitigation efforts.\u003c/p\u003e\n\n\u003cp\u003eThe article says these measures can reduce exposure and improve resilience.\u003c/p\u003e\n\n\u003ch2 id=\"future-outlook\"\u003eFuture Outlook\u003c/h2\u003e\n\n\u003cp\u003eThe article states that executive identity exposure is not a temporary trend. As organizations become more digital and interconnected, executive identities will continue to attract attacker attention.\u003c/p\u003e\n\n\u003cp\u003eIt also states that AI-powered attacks, social engineering, and identity-based threats will become more sophisticated. Organizations that proactively manage executive identity risk are described as better positioned to protect both their leaders and the business itself.\u003c/p\u003e\n\n\u003ch2 id=\"final-takeaway\"\u003eFinal Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that executive identities are among the most valuable and most targeted assets in modern cybersecurity. What was once treated as a personal security issue is now presented as a business risk issue. The article says the key question is not whether executives are exposed, but whether organizations have the visibility needed to understand and reduce that exposure.\u003c/p\u003e\n","keyPoints":["Attackers increasingly target executives such as CEOs, CFOs, board members, and senior leaders because they possess influence, authority, and trust rather than necessarily the most technical access.","Executive identity exposure extends beyond corporate systems to personal email accounts, professional networking platforms, social media profiles, public records, conference appearances, board memberships, and media coverage.","Executive impersonation is increasing as attackers use publicly available information to mimic executives through fake emails, deepfake audio and video, fraudulent payment requests, and investor or vendor fraud.","The article states that executive identity exposure has become a board-level issue because executive compromise can create financial, operational, reputational, regulatory, legal, and strategic risks.","Organizations can measure and manage executive identity risk through metrics such as executive exposure rate, high-risk executive identities, impersonation incidents, time-to-remediation, and exposure trend analysis."],"insights":["Executive protection should account for personal and public digital footprints, not only corporate accounts, because the article identifies personal email, social media, public records, media coverage, and board memberships as sources attackers can use for targeting.","Board reporting on executive identity risk can be supported with measurable indicators such as exposure rate, impersonation incidents, time-to-remediation, and exposure trends, making the risk easier to govern rather than treating it as anecdotal.","The article frames executive identities as high-value assets even when they do not have the most technical privileges, because their authority can be used to trigger financial approvals, influence employees, and exploit trusted relationships.","AI meaningfully changes the executive-risk model by enabling attackers to generate personalized phishing, convincing executive communications, and realistic impersonation content at scale."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that executive identity exposure has become a board-level cybersecurity issue because attackers increasingly target CEOs, CFOs, board members, and senior leaders. These individuals may not have the most technical access, but they carry influence, authority, and trust. That combination makes executive identities valuable for impersonation, fraud, data theft, and broader organizational compromise.\u003c/p\u003e\n <script type="text/babel">

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {

function priorityColor(p) {

  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
