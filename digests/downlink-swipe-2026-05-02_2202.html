<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);

    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .swipe-card.snap-back { transition: transform 0.32s cubic-bezier(.2,.9,.2,1); }
  .swipe-card.fly-out  { transition: transform 0.4s cubic-bezier(.4,.0,.6,1), opacity 0.4s; }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0; transition: opacity 0.1s;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--discard); color: var(--discard); }
  .pill-btn.read:hover { border-color: var(--accept);  color: var(--accept); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }

  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }

  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;

  .tab-btn {
    all: unset;

    color: var(--text3);
    font-size: 12px;
    font-weight: 500;

    transition: color .15s, border-color .15s;

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

window.__DL_ARTICLES = [{"n":1,"title":"The npm Threat Landscape: Attack Surface and Mitigations (Updated May 1)","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/monitoring-npm-supply-chain-attacks/","time":"00:10","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"The npm ecosystem has shifted to a new baseline of sophisticated, self-replicating supply chain attacks that automatically compromise and redistribute malicious packages to harvest credentials and propagate across developer environments. Organizations must immediately disable lifecycle scripts, rotate exposed credentials, and enforce strict registry controls to mitigate these worm-like threats.","briefOverview":"\u003cp\u003eThe npm ecosystem has transitioned from isolated typosquatting to a high-consequence threat landscape characterized by systematic, self-replicating supply chain attacks. The September 2025 Shai-Hulud worm marked this inflection point by proving that npm could be weaponized as a force multiplier for malware distribution. Since then, threat actors have accelerated the frequency and technical depth of these compromises. Unit 42 has documented three core shifts in adversary tactics, including wormable propagation, infrastructure-level persistence in CI/CD pipelines, and multi-stage sleeper payloads. Two major campaigns were tracked in April 2026, with the first compromising @bitwarden/cli and the second targeting the SAP ecosystem through four high-download packages. Both attacks rely on modified package.json files that inject a preinstall lifecycle hook to execute malicious code automatically during installation. The payloads download a custom Bun runtime to harvest sensitive credentials, including GitHub tokens, npm tokens, and cloud secrets from developer workstations and CI/CD environments. Once credentials are stolen, the malware exfiltrates the data through encrypted HTTPS connections or public GitHub repositories. It then propagates exponentially by backdooring every npm package the victim can publish, using GitHub\u0026rsquo;s public commit search API as a covert command and control channel. Organizations are advised to disable lifecycle scripts, pin dependencies, and route package downloads through private registries to mitigate these threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe security of the npm ecosystem reached a critical inflection point with the September 2025 Shai-Hulud worm, which transformed npm into a force multiplier for malware distribution. In April 2026, Unit 42 tracked two aggressive campaigns that escalated this threat baseline. The first campaign compromised the @bitwarden/cli package at version 2026.4.0, while the second, dubbed Mini Shai-Hulud, targeted the SAP developer ecosystem through four high-download packages. Both attacks rely on modified package.json files that inject a preinstall lifecycle hook to execute malicious code automatically during the npm installation process. The bootstrap scripts download the Bun JavaScript runtime and run an obfuscated payload designed to harvest credentials. This payload scans developer workstations and CI/CD environments to extract GitHub tokens, npm tokens, SSH keys, and cloud provider secrets. Exfiltration occurs via two channels: a primary HTTPS connection to an attacker-controlled C2 domain and a secondary method that commits encrypted data to newly created public GitHub repositories. The malware also implements a self-replication mechanism that backdoors every npm package a victim can publish, creating an exponential propagation vector. To maintain command and control resilience, the attackers use GitHub\u0026rsquo;s public commit search API as a covert channel to embed stolen tokens or new infrastructure directives. Attribution points to TeamPCP, which has also compromised Checkmarx distribution channels, Docker Hub images, and VS Code extensions. Mitigation strategies emphasize disabling lifecycle scripts with ignore-scripts=true, pinning dependencies using lockfiles, and routing all traffic through private registry proxies. Security teams are also urged to rotate exposed credentials, audit npm packages for unauthorized hooks, and enforce egress filtering on CI runners.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"executive-summary-threat-evolution\"\u003eExecutive Summary \u0026amp; Threat Evolution\u003c/h2\u003e\n\n\u003cp\u003eThe npm ecosystem has transitioned from a nuisance era of isolated typosquatting to a high-consequence threat landscape characterized by systematic, self-replicating supply chain attacks. The September 2025 Shai-Hulud worm marked this inflection point by proving that npm could be weaponized as a force multiplier for malware distribution. Since then, threat actors have accelerated the frequency and technical depth of these compromises. Unit 42 has documented three core shifts in adversary tactics, including wormable propagation, infrastructure-level persistence in CI/CD pipelines, and multi-stage sleeper payloads.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-details\"\u003eCampaign Details\u003c/h2\u003e\n\n\u003cp\u003eTwo major campaigns were tracked in April 2026. The first, identified as Shai-Hulud: The Third Coming, compromised the @bitwarden/cli package at version 2026.4.0. The second wave, dubbed Mini Shai-Hulud, targeted the SAP developer ecosystem through four compromised packages: @cap-js/sqlite@2.2.2, @cap-js/postgres@2.2.2, @cap-js/db-service@2.10.1, and mbt@1.2.48. These SAP packages account for approximately 570,000 weekly downloads and target enterprise developers with access to cloud credentials and deployment secrets. Both campaigns share identical toolchains, obfuscation methods, and propagation logic, indicating direct authorship reuse.\u003c/p\u003e\n\n\u003ch2 id=\"attack-mechanism-payload-capabilities\"\u003eAttack Mechanism \u0026amp; Payload Capabilities\u003c/h2\u003e\n\n\u003cp\u003eCompromised packages introduce two new files, setup.mjs and execution.js, alongside a modified package.json that adds a preinstall lifecycle hook. This hook triggers automatically during npm install, bootstrapping the attack before installation completes. The setup.mjs script detects the host operating system and architecture, then downloads the Bun JavaScript runtime (v1.3.13) from GitHub. It immediately executes the main payload using this runtime. The obfuscated payload, weighing approximately 11.7 MB, employs a custom string scrambling layer labeled ctf-scramble-v2 to evade static analysis. It also includes a Russian locale killswitch that exits silently if the system locale is set to Russian. On non-CI machines, the malware daemonizes itself to run persistently in the background.\u003c/p\u003e\n\n\u003ch2 id=\"credential-harvesting-exfiltration\"\u003eCredential Harvesting \u0026amp; Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe payload deploys multiple provider classes to scan and extract sensitive data from developer environments. It targets file systems for SSH keys, Git configurations, and .npmrc files. It runs shell commands to capture active GitHub CLI tokens and harvests full environment variable blocks. The malware also integrates cloud SDKs to enumerate and read secrets from AWS Systems Manager, Azure Key Vault, and Google Cloud Secret Manager. In CI/CD environments, it parses GitHub Actions runner contexts to extract masked secrets. All harvested data is compressed, encrypted with AES-256-GCM, and exfiltrated through a dual-channel system. The primary channel sends encrypted JSON payloads via HTTPS to an attacker-controlled C2 domain. The secondary channel creates public GitHub repositories with randomized Dune-themed names to commit the encrypted results.\u003c/p\u003e\n\n\u003ch2 id=\"propagation-c2-resilience\"\u003ePropagation \u0026amp; C2 Resilience\u003c/h2\u003e\n\n\u003cp\u003eThe malware implements an aggressive self-replication mechanism that backdoors every npm package the victim can publish. It validates npm tokens for write permissions, enumerates writable packages, downloads their tarballs, and injects the malicious setup.mjs script. It then bumps the patch version and republishes the package to the registry. This creates an exponential propagation vector that infects downstream developers. Command and control resilience is maintained through a GitHub dead-drop mechanism. If the primary C2 server is unreachable, the malware searches public GitHub commits for specific keywords. It decodes embedded Base64 strings to recover new C2 domains or previously stolen tokens, ensuring continuous operation without relying on traditional attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"mitigations-recommendations\"\u003eMitigations \u0026amp; Recommendations\u003c/h2\u003e\n\n\u003cp\u003eSecurity teams should immediately disable lifecycle scripts by adding ignore-scripts=true to .npmrc files. Organizations must enforce cooldown periods of 24 to 72 hours for newly published packages to catch malicious releases before widespread adoption. Dependency pinning should be enforced using package-lock.json and npm ci commands to prevent hidden updates during builds. All package downloads must be routed through private registry proxies rather than direct connections to the public registry. Namespace shadowing should be prevented by using scoped packages and configuring private registries to resolve internal scopes exclusively. Provenance verification should be implemented using tools like slsa-verifier to validate OpenID Connect attestations. Finally, strict egress network policies must be applied to CI runners to block unauthorized outbound connections to C2 infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eNetwork indicators include the C2 domain audit.checkmarx.cx, the IP address 94.154.172.43, and the attacker-controlled domain checkmarx.cx. GitHub indicators feature the dead-drop repository helloworm00/hello-world, commit SHA1 hash bc544f455d7c06c8a1f3446160a6d9a4a8236b11, and public repositories named with Dune-themed words. File indicators include SHA256 hashes for the bootstrap script bw_setup.js, the obfuscated payload bw1.js, and the malicious package.json. Process indicators highlight unexpected Bun runtime execution and the injection of .github/workflows/format-check.yml on transient branches.\u003c/p\u003e\n","keyPoints":["The npm threat landscape has shifted from isolated typosquatting incidents to systematic, self-replicating supply chain attacks that automatically compromise and redistribute malicious packages.","Compromised packages execute malicious code during installation through preinstall lifecycle hooks, harvesting GitHub tokens, npm tokens, and cloud credentials from developer environments.","The malware propagates by backdooring every npm package a victim can publish and uses GitHub's public commit search API as a covert command and control channel.","Effective mitigations include disabling lifecycle scripts with ignore-scripts=true, pinning dependencies using lockfiles, and routing all package downloads through private registries."],"insights":["The malware leverages GitHub's public commit search API as a covert command-and-control channel, embedding stolen tokens or new C2 domains directly into commit messages to maintain infrastructure resilience without relying on traditional attacker-controlled servers.","Compromised packages automatically modify package.json to inject a preinstall hook and increment the patch version, creating an exponential self-replication vector that infects every package a victim can publish.","The payload downloads and executes the Bun JavaScript runtime (v1.3.13) during installation rather than using Node.js, as it requires Bun-specific APIs for shell execution and file I/O.","Implementing ignore-scripts=true in .npmrc effectively disables the preinstall lifecycle hooks that serve as the primary execution trigger for these supply chain compromises."],"referencedReports":[{"title":"Checkmarx Security Update: April 22, 2026","url":"https://checkmarx.com/blog/checkmarx-security-update-april-22/","publisher":"Checkmarx","context":"Cited as the official security update detailing the broader supply-chain campaign that compromised multiple Checkmarx distribution channels."},{"title":"Malicious Checkmarx Artifacts Found in Official KICS Docker Repository and Code Extensions","url":"https://socket.dev/blog/checkmarx-supply-chain-compromise","publisher":"Socket","context":"Referenced as an analysis detailing the threat actor's prior targeting of security tooling vendors like Checkmarx, Trivy, and LiteLLM."}],"body":"\u003cp\u003eThe npm ecosystem has transitioned from isolated typosquatting to a high-consequence threat landscape characterized by systematic, self-replicating supply chain attacks. The September 2025 Shai-Hulud worm marked this inflection point by proving that npm could be weaponized as a force multiplier for malware distribution. Since then, threat actors have accelerated the frequency and technical depth of these compromises. Unit 42 has documented three core shifts in adversary tactics, including wormable propagation, infrastructure-level persistence in CI/CD pipelines, and multi-stage sleeper payloads. Two major campaigns were tracked in April 2026, with the first compromising @bitwarden/cli and the second targeting the SAP ecosystem through four high-download packages. Both attacks rely on modified package.json files that inject a preinstall lifecycle hook to execute malicious code automatically during installation. The payloads download a custom Bun runtime to harvest sensitive credentials, including GitHub tokens, npm tokens, and cloud secrets from developer workstations and CI/CD environments. Once credentials are stolen, the malware exfiltrates the data through encrypted HTTPS connections or public GitHub repositories. It then propagates exponentially by backdooring every npm package the victim can publish, using GitHub\u0026rsquo;s public commit search API as a covert command and control channel. Organizations are advised to disable lifecycle scripts, pin dependencies, and route package downloads through private registries to mitigate these threats.\u003c/p\u003e\n"},{"n":4,"title":"ConsentFix v3 attacks target Azure with automated OAuth abuse","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/consentfix-v3-attacks-target-azure-with-automated-oauth-abuse/","time":"14:32","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"ConsentFix v3 automates OAuth phishing to bypass MFA by tricking users into submitting authorization codes via fake Microsoft login pages, enabling attackers to hijack Azure accounts and access resources without passwords. Organizations should mitigate this by enforcing token binding, deploying behavioral detection rules, and restricting app authentication.","briefOverview":"\u003cp\u003eConsentFix v3 is an automated attack technique targeting Microsoft Azure through OAuth abuse. Building on earlier versions that relied on manual interactions, this iteration scales the threat by automating the phishing and token-exchange process. Attackers verify Azure tenant presence and harvest employee data to craft highly personalized phishing emails. These emails often contain malicious links embedded in PDFs hosted on DocSend to evade spam filters. When victims interact with a fake Microsoft login page, they are redirected to a localhost URL containing an authorization code. The victim is tricked into pasting or dragging this URL back into the phishing interface. A Pipedream webhook instantly captures the code and exchanges it for a refresh token via Microsoft’s API. The resulting tokens bypass multi-factor authentication and grant attackers access to compromised accounts. Mitigation remains challenging due to Microsoft’s architectural trust in first-party applications, though administrators can apply token binding and behavioral detection rules.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eConsentFix v3 represents an evolved, automated variant of OAuth phishing attacks specifically targeting Microsoft Azure environments. The technique builds upon ConsentFix v1 and v2 by replacing manual victim interaction with scalable automation. The attack begins by verifying Azure tenant IDs and gathering employee details to support impersonation campaigns. Attackers then provision multiple accounts across services like Outlook, Tutanota, Cloudflare, DocSend, Hunter.io, and Pipedream to support various operational phases. Pipedream serves as the central automation engine, functioning as a webhook endpoint, a token-exchange processor, and a real-time token collector. A phishing page hosted on Cloudflare Pages mimics a legitimate Microsoft login interface to initiate a standard OAuth flow. Victims are redirected to a localhost URL containing an authorization code and deceived into pasting or dragging it back into the fake page. This action triggers an automated pipeline where Pipedream immediately exchanges the code for a refresh token through Microsoft’s API. Attackers enhance credibility by embedding malicious links inside DocSend-hosted PDFs within personalized phishing emails, effectively bypassing traditional spam filters. Once obtained, the tokens are imported into Specter Portal, allowing attackers to interact with compromised environments and access tied resources. Researchers note that mitigating this threat is complicated by the architectural trust Microsoft places in first-party applications. While the Family of Client IDs framework offers some utility, administrators are advised to implement token binding, behavioral detection rules, and app authentication restrictions. Although ConsentFix attacks appear in active campaigns, it remains unclear whether the v3 variant has achieved widespread adoption among threat actors.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eAttack Evolution and Core Mechanism\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eConsentFix v3 is an advanced, automated phishing technique designed to hijack Microsoft Azure accounts through OAuth abuse. This iteration improves upon earlier versions by replacing manual copy-paste or drag-and-drop interactions with fully automated workflows. The core mechanism exploits the OAuth2 authorization code flow by targeting first-party Microsoft applications that are pre-trusted and pre-consented within the environment.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInitial Reconnaissance and Infrastructure Setup\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe attack sequence initiates with verification of Azure tenant presence by checking for valid tenant IDs. Attackers then harvest employee names, roles, and email addresses to facilitate highly targeted impersonation. To support the operation, multiple accounts are created across a range of services including Outlook, Tutanota, Cloudflare, DocSend, Hunter.io, and Pipedream. These services collectively handle phishing delivery, hosting, data gathering, and exfiltration.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAutomation and Token Exfiltration\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003ePipedream functions as the central automation engine for the attack, fulfilling three critical roles simultaneously:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt acts as the webhook endpoint that receives the victim’s authorization code.\u003c/li\u003e\n\u003cli\u003eThe platform operates as an automation engine that immediately exchanges the captured code for a refresh token via Microsoft’s API.\u003c/li\u003e\n\u003cli\u003eIt serves as a real-time collector that makes the stolen tokens available to the attacker.\nA phishing page hosted on Cloudflare Pages mimics a legitimate Microsoft login interface to initiate the OAuth flow. When victims interact with the page, they are redirected to a localhost URL containing the authorization code. They are then tricked into pasting or dragging the URL back into the phishing page, triggering the automated data exfiltration pipeline.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDelivery, Post-Exploitation, and Mitigation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAttackers deploy personalized phishing emails generated from the harvested employee data. These emails frequently contain malicious links embedded inside PDF files hosted on DocSend to improve credibility and bypass spam filtering. Once the tokens are captured, they are imported into Specter Portal, enabling attackers to interact with compromised Microsoft environments. This grants access to permitted resources such as email, files, and other account-tied services. Push Security researchers emphasize that mitigation is structurally complicated because trust in first-party apps is deeply architectural. While the Family of Client IDs framework provides some defensive utility, administrators should implement token binding to trusted devices, establish behavioral detection rules, and enforce app authentication restrictions. Although the technique is used in actual campaigns, it remains uncertain whether the v3 variant has gained significant traction among cybercriminals.\u003c/p\u003e\n","keyPoints":["ConsentFix v3 automates OAuth phishing attacks against Microsoft Azure by tricking users into pasting or dragging a localhost URL containing an authorization code back into a fake login page.","The technique uses Pipedream as an automation engine to instantly exchange captured codes for refresh tokens and collect them in real time.","Attackers gather employee details and utilize multiple third-party services to host phishing pages, generate personalized emails, and exfiltrate data.","Compromised tokens bypass multi-factor authentication and allow attackers to access Microsoft resources through Specter Portal.","Mitigation is complicated by architectural trust in first-party apps, but administrators can apply token binding, behavioral detection rules, and app authentication restrictions."],"insights":["Pipedream is weaponized as a single free service to simultaneously receive the authorization code, automate the token exchange via Microsoft's API, and collect tokens in real time.","Mitigation is structurally hindered because Microsoft's architectural trust in first-party apps inherently permits the abuse, making standard app restrictions ineffective against Family of Client IDs (FOCI) applications.","Attackers bypass email spam filters by embedding malicious OAuth links inside PDF files hosted on DocSend, requiring security teams to inspect embedded documents rather than just scanning URLs.","Successful MFA verification does not prevent account hijacking in this attack, as the OAuth flow grants tokens based on the authorization code rather than requiring additional authentication factors."],"referencedReports":[{"title":"Family of Client IDs (FOCI) Research","url":"https://github.com/secureworks/family-of-client-ids-research","publisher":"SecureWorks","context":"Referenced as a technical analysis explaining how Microsoft applications that share permissions and refresh tokens can be leveraged to mitigate the attack."},{"title":"ConsentFix Attack Presentation","url":"https://www.bleepingcomputer.com/news/security/new-consentfix-attack-hijacks-microsoft-accounts-via-azure-cli/","publisher":"Push Security","context":"Cited as the original research presentation detailing how attackers hijack Microsoft accounts via Azure CLI using OAuth phishing flows."}],"body":"\u003cp\u003eConsentFix v3 is an automated attack technique targeting Microsoft Azure through OAuth abuse. Building on earlier versions that relied on manual interactions, this iteration scales the threat by automating the phishing and token-exchange process. Attackers verify Azure tenant presence and harvest employee data to craft highly personalized phishing emails. These emails often contain malicious links embedded in PDFs hosted on DocSend to evade spam filters. When victims interact with a fake Microsoft login page, they are redirected to a localhost URL containing an authorization code. The victim is tricked into pasting or dragging this URL back into the phishing interface. A Pipedream webhook instantly captures the code and exchanges it for a refresh token via Microsoft’s API. The resulting tokens bypass multi-factor authentication and grant attackers access to compromised accounts. Mitigation remains challenging due to Microsoft’s architectural trust in first-party applications, though administrators can apply token binding and behavioral detection rules.\u003c/p\u003e\n"},{"n":2,"title":"Essential Data Sources for Detection Beyond the Endpoint","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/detection-beyond-the-endpoint/","time":"23:00","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Modern threat detection requires moving beyond endpoint-only monitoring by adopting a unified, AI-driven security platform that ingests and correlates telemetry across all IT zones to close visibility gaps and stop fast-moving attackers.","briefOverview":"\u003cp\u003eThe 2026 Unit 42 Global Incident Response Report reveals that threat actors are now moving four times faster to exfiltrate data compared to 2025. Adversaries are intentionally targeting multiple surfaces simultaneously to exploit the blind spots created by an over-reliance on endpoint monitoring. In 75% of investigated incidents, critical evidence of the initial intrusion was already captured in logs but remained inaccessible due to fragmented security systems. Traditional endpoint-only detection consistently fails to capture cloud-to-endpoint pivots, covert command-and-control communications, and activity from unmanaged rogue assets. To address these gaps, security operations centers must adopt a unified, AI-driven platform that consolidates telemetry across all IT zones. This approach enables automated alert stitching, machine learning-based incident scoring, and user behavior analytics to reduce alert fatigue. Ultimately, transitioning to a multi-surface defense strategy is essential for stopping sophisticated threats before they cause material impact.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe 2026 Unit 42 Global Incident Response Report delivers a critical warning that threat actors are now moving four times faster to exfiltration than they were in 2025. By simultaneously striking across three or more attack surfaces, adversaries are deliberately exploiting the visibility gaps caused by an over-reliance on endpoint data. While endpoint detection remains a foundational security control, the rapid expansion of cloud services, microservices, and remote users has created an environment that single tools cannot adequately monitor.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 researchers found that in 75% of investigated incidents, critical evidence of the initial intrusion was present in system logs. However, due to complex and disjointed security architectures, this information was not readily accessible or effectively operationalized, allowing attackers to operate undetected. Modern IT environments are composed of distinct operational zones, including identity and access management, cloud assets, operational technology, IoT, and AI workloads.\u003c/p\u003e\n\n\u003cp\u003eEach zone generates unique telemetry that requires specialized security tools and holistic analysis. Relying exclusively on endpoint detection consistently fails to capture three specific threat scenarios. First, attackers can pivot from misconfigured cloud access keys to endpoints while masking their console activities from traditional security agents.\u003c/p\u003e\n\n\u003cp\u003eSecond, adversaries may use DNS tunneling to cloud storage for covert command-and-control communications while stealing credentials to trigger impossible travel alerts across multiple SaaS applications. Third, shadow IT and unmanaged devices lack security agents, making them inherently opaque and frequently invisible to standard detection tools. Attackers routinely introduce their own rogue assets to maintain persistence and enable covert lateral movement.\u003c/p\u003e\n\n\u003cp\u003eTo combat these evolving threats, security operations centers must implement a single-pane-of-glass strategy powered by an AI-driven data platform. This architecture requires that all security logs reside in a single repository and all alerts be processed within a centralized workbench. By integrating telemetry from every IT zone, machine learning models can automatically stitch disparate events into a cohesive timeline.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, ML-based incident scoring prioritizes threats based on actual business impact and user risk, while user and entity behavior analytics detect anomalous activity signaling compromised credentials. This unified approach significantly reduces analyst alert fatigue and provides leadership with clear visibility into security performance metrics. As attackers increasingly leverage AI-assisted tools to accelerate their operations, organizations must transition to a multi-surface defense model. Evaluating current visibility through a formal assessment and adopting a unified platform is the only viable path to stopping sophisticated threats in their tracks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"introduction-and-threat-context\"\u003eIntroduction and Threat Context\u003c/h3\u003e\n\n\u003cp\u003eThe 2026 Unit 42 Global Incident Response Report highlights a significant acceleration in adversary tactics, noting that threat actors are now moving four times faster to exfiltration compared to 2025. Adversaries are intentionally launching coordinated strikes across three or more attack surfaces simultaneously. This multi-vector approach is designed to exploit the blind spots created by an over-reliance on traditional endpoint monitoring. Although endpoint detection and response (EDR) remains a foundational security control, the rapid proliferation of cloud services, microservices, and remote users has expanded the attack surface beyond the monitoring capabilities of any single tool. Unit 42 research indicates that in 75% of investigated incidents, critical evidence of the initial intrusion was already captured in system logs. However, due to fragmented and disjointed security architectures, this telemetry was not readily accessible or effectively operationalized, allowing attackers to operate undetected.\u003c/p\u003e\n\n\u003ch3 id=\"the-invisible-pivot-it-zones-and-detection-failures\"\u003eThe Invisible Pivot: IT Zones and Detection Failures\u003c/h3\u003e\n\n\u003cp\u003eModern IT environments are segmented into distinct operational zones, each with unique logging requirements and security tooling. These zones include identity and access management (IAM), cloud assets, operational technology (OT), internet of things (IoT), and AI workloads. Relying exclusively on an endpoint-centric detection model consistently fails to capture the full narrative of an attack across these zones. Unit 42 research specifically identifies three scenarios where endpoint-only visibility falls short:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe cloud-to-endpoint pivot:\u003c/strong\u003e Attackers can gain initial access through misconfigured cloud service access keys and pivot to endpoints while hiding their tracks from EDR agents. From the cloud console, they may move to cloud-hosted servers for discovery. To a SOC monitoring only endpoints, the initial entry and console manipulation remain invisible, potentially leading to false negatives during triage.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCovert C2 and identity theft:\u003c/strong\u003e Adversaries may utilize DNS tunneling directed at cloud storage locations to control compromised devices. To mask their activity, they steal credentials and trigger impossible travel alerts across multiple software-as-a-service (SaaS) applications. An endpoint-focused SOC looking solely for malware will miss the identity-level compromise occurring across the network and cloud providers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe threat of rogue assets:\u003c/strong\u003e Shadow IT and unmanaged devices are inherently opaque because they typically lack security agents. These assets are frequently invisible to traditional EDR and security information and event management (SIEM) tools. Attackers often introduce their own rogue devices to maintain persistence and enable covert lateral movement.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"building-a-single-pane-of-glass-the-ai-driven-soc\"\u003eBuilding a Single Pane of Glass: The AI-Driven SOC\u003c/h3\u003e\n\n\u003cp\u003eTo address these visibility gaps, Unit 42 recommends adopting a single-pane-of-glass strategy powered by an AI-driven security operations platform. This approach is built on two core architectural principles: all security logs must reside in a single repository, and all alerts must be processed within a centralized workbench. By consolidating diverse security data from all IT zones, the platform eliminates data silos and significantly reduces alert fatigue. The heavy analytical lifting is shifted to automated systems, empowering human analysts with a simplified interface to proactively stop threats in minutes rather than days.\u003c/p\u003e\n\n\u003ch3 id=\"machine-learning-capabilities-and-operational-benefits\"\u003eMachine Learning Capabilities and Operational Benefits\u003c/h3\u003e\n\n\u003cp\u003eIntegrating telemetry across the entire organizational landscape enables several advanced analytical functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAlert stitching:\u003c/strong\u003e Automatically connects events from different IT zones into a cohesive, chronological timeline, providing a complete attack narrative.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eML-based incident scoring:\u003c/strong\u003e Prioritizes threats based on calculated business impact and user risk, ensuring analysts focus on the most critical incidents.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUser and entity behavior analytics (UEBA):\u003c/strong\u003e Detects anomalous behavioral patterns that signal compromised credentials or malicious activity before they result in material organizational impact.\nThis integration not only improves analyst efficiency but also provides management with clear visibility into security workloads and performance metrics.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"conclusion-and-strategic-recommendations\"\u003eConclusion and Strategic Recommendations\u003c/h3\u003e\n\n\u003cp\u003eAs threat actors continue to leverage AI-assisted tools to accelerate their attack cycles, relying solely on endpoint data is no longer a viable defense strategy. Organizations must embrace a unified platform that ingests and correlates telemetry from every IT zone to achieve the holistic visibility required to stop sophisticated threats. Unit 42 emphasizes that transitioning to an AI-enabled, multi-surface defense is the only method to counter attackers who thrive in the gaps between isolated security tools. To ensure optimal readiness, security teams should evaluate their current visibility through a formal assessment and consider leveraging specialized services like Unit 42 Frontier AI Defense to identify likely attack paths before they can be weaponized.\u003c/p\u003e\n","keyPoints":["Threat actors are now moving four times faster to exfiltration and intentionally exploiting blind spots created by an over-reliance on endpoint data.","Critical evidence of initial intrusions was present in logs in 75% of investigated incidents but remained inaccessible due to complex, disjointed security systems.","Relying solely on endpoint detection and response creates gaps that attackers exploit through cloud-to-endpoint pivots, identity theft, and the use of unmanaged rogue assets.","Security operations centers must adopt a unified, AI-driven platform that consolidates telemetry from all IT zones to enable alert stitching, machine learning-based incident scoring, and user behavior analytics.","A single-pane-of-glass strategy ensures all security logs live in one repository and all alerts are processed in a centralized workbench to eliminate data silos and reduce analyst fatigue."],"insights":["In 75% of investigated incidents, critical intrusion evidence was already captured in logs but remained inaccessible or unoperationalized due to fragmented security systems, revealing a major gap between data collection and detection readiness.","Attackers are deliberately launching coordinated strikes across three or more IT surfaces simultaneously to exploit the blind spots created by traditional, siloed security tooling.","Consolidating all alerts into a centralized workbench alongside a single log repository enables machine learning to automatically stitch cross-zone events into cohesive timelines, shifting threat prioritization from volume-based alerts to business-impact scoring."],"referencedReports":[],"body":"\u003cp\u003eThe 2026 Unit 42 Global Incident Response Report reveals that threat actors are now moving four times faster to exfiltrate data compared to 2025. Adversaries are intentionally targeting multiple surfaces simultaneously to exploit the blind spots created by an over-reliance on endpoint monitoring. In 75% of investigated incidents, critical evidence of the initial intrusion was already captured in logs but remained inaccessible due to fragmented security systems. Traditional endpoint-only detection consistently fails to capture cloud-to-endpoint pivots, covert command-and-control communications, and activity from unmanaged rogue assets. To address these gaps, security operations centers must adopt a unified, AI-driven platform that consolidates telemetry across all IT zones. This approach enables automated alert stitching, machine learning-based incident scoring, and user behavior analytics to reduce alert fatigue. Ultimately, transitioning to a multi-surface defense strategy is essential for stopping sophisticated threats before they cause material impact.\u003c/p\u003e\n"},{"n":3,"title":"Edu tech firm Instructure discloses cyber incident, probes impact","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/edu-tech-firm-instructure-discloses-cyber-incident-probes-impact/","time":"23:43","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Instructure, the developer behind the Canvas learning platform, has disclosed a recent cybersecurity incident and is actively investigating the threat actor's impact while implementing mitigation measures. The company warns that some services may experience disruptions as it secures its systems and protects sensitive educational data.","briefOverview":"\u003cp\u003eInstructure, the company behind the widely used Canvas learning management system, has disclosed a recent cybersecurity incident perpetrated by a criminal threat actor. The organization is actively investigating the breach with external forensics experts and is taking immediate steps to minimize its impact. Chief Security Officer Steve Proud emphasized that maintaining customer trust and ensuring transparency remain top priorities throughout the investigation. Since May 1, certain services like Canvas Data 2 and Canvas Beta have been placed under maintenance, with users warned about potential disruptions to tools relying on API keys. The company has not confirmed whether these maintenance activities are directly related to the security incident.\u003c/p\u003e\n\n\u003cp\u003eThis breach occurs amid a broader trend of threat actors targeting education technology firms to steal large volumes of student and teacher data. Previous incidents include a January 2025 breach at PowerSchool and a September 2025 social engineering attack on Instructure’s own Salesforce instance. Threat actors have also targeted Infinite Campus in similar campaigns.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eInstructure, a U.S.-based education technology firm best known for developing the Canvas learning management system, has publicly disclosed a recent cybersecurity incident. The breach was perpetrated by a criminal threat actor, prompting the company to launch an active investigation with the assistance of outside forensics experts. Chief Security Officer Steve Proud released a statement confirming that the organization is working quickly to assess the full extent of the incident.\u003c/p\u003e\n\n\u003cp\u003eInstructure is simultaneously implementing measures to minimize any potential damage while committing to transparency throughout the investigative process. The company plans to release additional details as new information becomes available. Operational disruptions have already begun, as Canvas Data 2 and Canvas Beta have been under maintenance since May 1.\u003c/p\u003e\n\n\u003cp\u003eCustomers have been warned that they may encounter issues with applications that depend on API keys. Instructure has not explicitly stated whether these maintenance windows are a direct response to the security incident. BleepingComputer attempted to contact the company for further details but has not received a response.\u003c/p\u003e\n\n\u003cp\u003eNotably, the publication previously published and subsequently retracted an earlier report on this incident after verifying it relied on incorrect information from a prior disclosure. This event highlights a growing pattern of threat actors focusing on education technology providers due to the sensitive personal data they store. In January 2025, PowerSchool disclosed a massive breach involving data belonging to 62 million students.\u003c/p\u003e\n\n\u003cp\u003eIn September 2025, Instructure itself disclosed a separate breach stemming from a social engineering attack that compromised its Salesforce instance. A threat actor known as ShinyHunters claimed responsibility for that incident and listed the company on a data leak site. Similar campaigns have targeted Infinite Campus, with attackers claiming to have stolen data from its Salesforce environment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eInstructure, the U.S.-based education technology company behind the widely adopted Canvas learning management system, has disclosed that it recently suffered a cybersecurity incident. The breach was perpetrated by a criminal threat actor targeting the organization\u0026rsquo;s systems. The company is currently conducting a thorough investigation into the breach\u0026rsquo;s scope and potential data exposure.\u003c/p\u003e\n\n\u003ch3 id=\"company-response-operational-impact\"\u003eCompany Response \u0026amp; Operational Impact\u003c/h3\u003e\n\n\u003cp\u003eChief Security Officer Steve Proud issued a public statement confirming that Instructure is actively investigating the incident with the support of external forensics experts. The organization is prioritizing rapid assessment and is taking immediate steps to minimize the incident\u0026rsquo;s impact. Maintaining customer trust and ensuring transparency are cited as the highest priorities throughout the investigative process. Instructure has pledged to provide further updates as new information becomes available.\u003c/p\u003e\n\n\u003cp\u003eService disruptions have already been reported across multiple platforms. Since May 1, Canvas Data 2 and Canvas Beta have been placed under maintenance. Users have been warned that they may experience issues with tools that rely on API keys. The company has not confirmed whether these maintenance activities are directly linked to the security incident. BleepingComputer reached out to Instructure for additional details but has not received a response. The publication also noted that it previously published and retracted an earlier report on this incident after determining it was based on incorrect information from a prior disclosure.\u003c/p\u003e\n\n\u003ch3 id=\"broader-industry-context\"\u003eBroader Industry Context\u003c/h3\u003e\n\n\u003cp\u003eThis incident reflects a broader trend of threat actors increasingly targeting education technology firms. These organizations are prime targets because they hold large amounts of sensitive personal information on students and teachers. The concentration of personally identifiable information makes educational platforms highly attractive for data theft campaigns.\u003c/p\u003e\n\n\u003ch3 id=\"historical-precedents\"\u003eHistorical Precedents\u003c/h3\u003e\n\n\u003cp\u003eInstructure and related platforms have faced similar security challenges recently. Key historical incidents include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn September 2025, Instructure disclosed a separate breach stemming from a social engineering attack that compromised its Salesforce instance.\u003c/li\u003e\n\u003cli\u003eA threat actor known as ShinyHunters claimed responsibility for that incident and listed the company on a data leak site.\u003c/li\u003e\n\u003cli\u003eIn January 2025, PowerSchool disclosed a massive breach involving data belonging to 62 million students.\u003c/li\u003e\n\u003cli\u003eSimilar campaigns have targeted Infinite Campus, with attackers claiming to have stolen data from its Salesforce environment.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Instructure, the developer of the Canvas learning management system, disclosed a recent cybersecurity incident caused by a criminal threat actor.","The company is actively investigating the breach with external forensics experts and taking steps to minimize its impact.","Since May 1, certain Instructure services have been under maintenance, with customers warned about potential issues related to API keys.","Threat actors are increasingly targeting education technology firms due to the large volumes of personal student and teacher data they hold."],"insights":["Threat actors are targeting education technology firms' Salesforce instances via social engineering, as evidenced by incidents at Instructure and Infinite Campus.","Instructure has placed Canvas Data 2 and Canvas Beta under maintenance since May 1, though the company has not confirmed if these disruptions are related to the security incident.","Instructure previously disclosed a September 2025 breach involving a social engineering attack on its Salesforce instance that allowed attackers access to data."],"referencedReports":[],"body":"\u003cp\u003eInstructure, the company behind the widely used Canvas learning management system, has disclosed a recent cybersecurity incident perpetrated by a criminal threat actor. The organization is actively investigating the breach with external forensics experts and is taking immediate steps to minimize its impact. Chief Security Officer Steve Proud emphasized that maintaining customer trust and ensuring transparency remain top priorities throughout the investigation. Since May 1, certain services like Canvas Data 2 and Canvas Beta have been placed under maintenance, with users warned about potential disruptions to tools relying on API keys. The company has not confirmed whether these maintenance activities are directly related to the security incident.\u003c/p\u003e\n\n\u003cp\u003eThis breach occurs amid a broader trend of threat actors targeting education technology firms to steal large volumes of student and teacher data. Previous incidents include a January 2025 breach at PowerSchool and a September 2025 social engineering attack on Instructure’s own Salesforce instance. Threat actors have also targeted Infinite Campus in similar campaigns.\u003c/p\u003e\n"},{"n":6,"title":"Trellix Confirms Source Code Breach With Unauthorized Repository Access","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/trellix-confirms-source-code-breach.html","time":"06:41","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Trellix confirmed a security breach that allowed unauthorized access to a portion of its source code repository, though the company reports no evidence of exploitation or compromise to its distribution processes.","briefOverview":"\u003cp\u003eTrellix has confirmed that it suffered a security breach allowing unauthorized access to a portion of its source code repository. The company recently identified the compromise and immediately began working with leading forensic experts to address the incident. Trellix has also notified law enforcement about the breach. While the exact nature of the accessed data remains undisclosed, the company stated there are no indications that its source code has been affected or exploited. Furthermore, Trellix emphasized that its source code release and distribution processes were not impacted. The organization has not yet disclosed the identity of the attackers or the duration of the unauthorized access. Additional details will be shared once the investigation concludes. Trellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye. The company is currently owned by Symphony Technology Group.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTrellix has publicly announced that it experienced a cybersecurity breach resulting in unauthorized access to a portion of its source code repository. The organization recently identified the compromise and immediately engaged leading forensic experts to investigate the matter. Law enforcement has also been notified regarding the incident. Although Trellix has not disclosed the exact nature of the data potentially accessed by the attackers, it emphasized that there are no indications the source code has been exploited. The company further clarified that its source code release and distribution processes remain unaffected. Details regarding the identity of the attackers or the duration of the unauthorized access have not been shared. Trellix noted that additional information will be provided as appropriate once the investigation is complete. The cybersecurity firm was founded in January 2022 following the merger of McAfee Enterprise and FireEye. Around the same period, Mandiant, which was owned by FireEye, was acquired by Google in a $5.4 billion deal. Trellix itself is owned by Symphony Technology Group. The Hacker News has reached out to the company for comment and will update the story if a response is received. This remains a developing story as more details emerge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nTrellix has confirmed a security breach that enabled unauthorized access to a portion of its source code repository. The company recently identified the compromise and immediately began working with leading forensic experts to resolve the matter. Law enforcement has been notified of the incident.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImpact and Investigation Status\u003c/strong\u003e\nWhile the exact nature of the accessed data has not been disclosed, Trellix stated there are no indications that its source code has been affected or exploited. The company further clarified that its source code release and distribution processes were not impacted. Key investigation details include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNo evidence of exploitation or distribution process compromise.\u003c/li\u003e\n\u003cli\u003eAttacker identity and access duration remain undisclosed.\u003c/li\u003e\n\u003cli\u003eAdditional information will be shared once the investigation concludes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCorporate Background\u003c/strong\u003e\nTrellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye. The company is currently owned by Symphony Technology Group. Around the same timeframe, Mandiant, which was owned by FireEye, was acquired by Google in a deal valued at $5.4 billion.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMedia Coverage\u003c/strong\u003e\nThe Hacker News has reached out to Trellix for comment and will update the story if a response is received. The publication noted that this is a developing story and advised readers to check back for more details.\u003c/p\u003e\n","keyPoints":["Trellix announced a security breach that enabled unauthorized access to a portion of its source code repository.","The company is working with forensic experts and law enforcement to investigate and resolve the incident.","Trellix stated there is no evidence that its source code has been exploited or that its distribution process was affected.","The company has not disclosed the identity of the attackers or the duration of the unauthorized access.","Trellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye."],"insights":["Trellix, a cybersecurity vendor, suffered a breach targeting its source code repository, highlighting potential risks to the development infrastructure of security tooling providers.","The company explicitly stated there is no evidence that its source code release or distribution process was affected, indicating the breach likely did not compromise the integrity of its shipped products.","Trellix has not disclosed the identity of the attackers or the duration of the unauthorized access, leaving the scope of the compromise and potential persistence mechanisms unknown."],"referencedReports":[],"body":"\u003cp\u003eTrellix has confirmed that it suffered a security breach allowing unauthorized access to a portion of its source code repository. The company recently identified the compromise and immediately began working with leading forensic experts to address the incident. Trellix has also notified law enforcement about the breach. While the exact nature of the accessed data remains undisclosed, the company stated there are no indications that its source code has been affected or exploited. Furthermore, Trellix emphasized that its source code release and distribution processes were not impacted. The organization has not yet disclosed the identity of the attackers or the duration of the unauthorized access. Additional details will be shared once the investigation concludes. Trellix was founded in January 2022 following the merger of McAfee Enterprise and FireEye. The company is currently owned by Symphony Technology Group.\u003c/p\u003e\n"},{"n":5,"title":"Microsoft tests modern Windows Run, says it's faster than legacy dialog","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-tests-modern-windows-run-says-its-faster-than-legacy-dialog/","time":"00:18","priority":"MAY READ","score":45,"group":null,"groupColor":null,"tldr":"Microsoft is rolling out a faster, modernized Windows Run dialog with dark mode support in Windows 11, which is currently optional and available in a preview build.","briefOverview":"\u003cp\u003eMicrosoft is testing a modernized Windows Run dialog in Windows 11 preview build 26300.8346 that features dark mode support and aligns with Fluent Design.\u003c/p\u003e\n\n\u003cp\u003eThe updated interface is engineered to launch faster than the legacy version, achieving a median time-to-show of 94 milliseconds compared to the original 103 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eThis performance improvement specifically supports workflows where users paste clipboard text to strip formatting.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft permanently removed the \u0026ldquo;Browse\u0026rdquo; button because telemetry showed it was used by less than 0.0038% of 35 million users.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog also supports the tilde-backslash command for quick home directory access and displays icons for easier identification.\u003c/p\u003e\n\n\u003cp\u003eCurrently, the feature is entirely optional and must be manually enabled in Windows Advanced Settings.\u003c/p\u003e\n\n\u003cp\u003eIt is currently available only in the Experimental Channel and will roll out broadly in the coming months.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has confirmed that Windows 11 preview build 26300.8346 introduces a modernized Run dialog designed to update the legacy interface without sacrificing its core utility.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog matches Fluent Design standards and includes native dark mode support.\u003c/p\u003e\n\n\u003cp\u003ePerformance was a primary design constraint, with Microsoft aiming to maintain the speed that power users rely on daily.\u003c/p\u003e\n\n\u003cp\u003eThe legacy dialog historically took approximately 103 milliseconds to appear after pressing Win + R, while the modern version achieves a median time-to-show of just 94 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eThis speed is critical for users who paste clipboard text into the dialog to remove unwanted formatting.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft measured time-to-show and usage patterns across 35 million users to establish a baseline for the redesign.\u003c/p\u003e\n\n\u003cp\u003eBased on this data, the company removed the \u0026ldquo;Browse\u0026rdquo; button, which accounted for less than 0.0038% of all Run interactions.\u003c/p\u003e\n\n\u003cp\u003eThe updated interface also introduces the tilde-backslash command for rapid home directory navigation and adds icons to the suggestion list for better visual identification.\u003c/p\u003e\n\n\u003cp\u003eBeyond the Run dialog, the preview update improves the Windows Share UI for AAD users by allowing direct app installation from the share menu.\u003c/p\u003e\n\n\u003cp\u003eThe Magnifier tool now provides additional zoom control with preset levels ranging from 5% to 400%.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft states that the modern Run dialog will not activate automatically.\u003c/p\u003e\n\n\u003cp\u003eUsers must manually enable it through the Advanced Settings menu in Windows.\u003c/p\u003e\n\n\u003cp\u003eThese changes are currently distributed through the Experimental Channel and are expected to reach the broader user base in the coming months.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview of the Modern Run Dialog Update\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is testing a modernized Windows Run dialog in Windows 11 preview build 26300.8346.\u003c/p\u003e\n\n\u003cp\u003eThe update aims to refresh the legacy interface, which has existed since the Windows 95 era, while preserving the functionality that power users depend on daily.\u003c/p\u003e\n\n\u003cp\u003eThe new dialog aligns with Fluent Design principles and includes native dark mode support out of the box.\u003c/p\u003e\n\n\u003cp\u003ePerformance optimization was a central goal during development, as Microsoft sought to match or exceed the speed of the original implementation.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePerformance Metrics and Design Rationale\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe legacy Run dialog historically required approximately 103 milliseconds to appear after the Win + R shortcut was pressed.\u003c/p\u003e\n\n\u003cp\u003eThe modern counterpart achieves a median time-to-show of just 94 milliseconds.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft prioritized this speed improvement because many users rely on the dialog\u0026rsquo;s rapid response to paste clipboard text and immediately copy it back to strip formatting.\u003c/p\u003e\n\n\u003cp\u003eTelemetry data on time-to-show and usage patterns helped establish a baseline for the redesign.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft collaborated with platform partners to ensure the UI surfaces load quickly, noting that these optimizations contribute to broader OS efficiency.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInterface Changes and Feature Removals\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft conducted extensive research on user behavior before finalizing the new interface.\u003c/p\u003e\n\n\u003cp\u003eThis analysis led to the permanent removal of the \u0026ldquo;Browse\u0026rdquo; button, which allowed users to navigate directories to open programs.\u003c/p\u003e\n\n\u003cp\u003eTelemetry from a sample of 35 million users showed that the Browse feature was utilized less than 0.0038% of the time.\u003c/p\u003e\n\n\u003cp\u003eThe updated dialog now supports the \u003ccode\u003e~\\\u003c/code\u003e command for direct access to the home directory.\u003c/p\u003e\n\n\u003cp\u003eIt also displays icons in the suggestion list to improve entry identification without adding visual clutter.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDeployment and Optional Activation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe modern Run dialog is not enabled by default.\u003c/p\u003e\n\n\u003cp\u003eUsers must manually activate it by navigating to Advanced Settings in Windows.\u003c/p\u003e\n\n\u003cp\u003eThis opt-in approach allows administrators and users to retain the legacy interface if preferred.\u003c/p\u003e\n\n\u003cp\u003eThe feature is currently distributed exclusively through the Experimental Channel.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft plans to collect additional feedback before rolling out the dialog to a wider audience.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAdditional Preview Build Enhancements\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe preview update introduces several other system improvements alongside the Run dialog.\u003c/p\u003e\n\n\u003cp\u003eKey additions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect application installation from the Windows Share UI for AAD users\u003c/li\u003e\n\u003cli\u003eGranular zoom control for the Magnifier accessibility tool\u003c/li\u003e\n\u003cli\u003ePreset zoom levels ranging from 5% to 400%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese updates are slated for broader distribution in the coming months.\u003c/p\u003e\n","keyPoints":["Microsoft is testing a modernized Windows Run dialog in preview build 26300.8346 that supports dark mode and aligns with Fluent Design.","The updated dialog operates faster than the legacy version, with a median time-to-show of 94 milliseconds compared to 103 milliseconds.","Microsoft removed the \"Browse\" button from the new interface because usage data showed it was utilized by less than 0.0038% of users.","The modern Run feature is optional and requires manual activation in Windows Advanced Settings rather than enabling automatically."],"insights":["The modern Run dialog is currently restricted to the Experimental Channel and requires manual activation via Advanced Settings, meaning deployment will depend on deliberate opt-in rather than automatic updates.","Microsoft permanently removed the \"Browse\" button based on telemetry showing it was used by less than 0.0038% of 35 million users, indicating a decisive shift toward keyboard-centric workflows.","The 94ms median load time was specifically engineered to support clipboard-pasting workflows, where rapid dialog appearance prevents unwanted text formatting from being pasted."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft is testing a modernized Windows Run dialog in Windows 11 preview build 26300.8346 that features dark <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, fontWeight: 600, letterSpacing: "0.1em", color: c,
      border: "1px solid color-mix(in oklch, " + c + " 40%, transparent)",
      background: "color-mix(in oklch, " + c + " 10%, transparent)",
      padding: "1px 5px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {group}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
