<script type="application/json" id="dl-articles">[{"n":1,"title":"Microsoft Removes 119 Edge Extensions That Hid Malware in Images and Fonts","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-removes-119-edge-extensions.html","time":"08:32","priority":"MUST READ","score":92,"tldr":"Microsoft removed 119 malicious Edge extensions, with up to 2.6 million installs, that hid payloads in images and fonts to evade detection. The StegoAd campaign used the extensions for ad fraud, credential and 2FA theft, cookie exfiltration, and remote code execution, so affected users should remove them and change sensitive passwords.","briefOverview":"\u003cp\u003eMicrosoft removed 119 malicious extensions from the Edge Add-ons store and suspended more than 90 developer accounts tied to the operation. Microsoft calls the campaign StegoAd and says it was run by a single threat actor active since at least 2021. The extensions posed as common tools such as ad blockers, VPNs, translators, and video downloaders, and had an install base of up to 2.6 million users, though Microsoft says that figure is a ceiling rather than a confirmed victim count.\u003c/p\u003e\n\n\u003cp\u003eThe campaign hid executable code inside ordinary-looking image and font files, including PNG icons, WebP images, and WOFF2 fonts. Some variants fetched normal-looking images from command-and-control servers, decoded the hidden payload through several transformations, and only received the real file after passing fingerprint and User-Agent checks. The extensions also used delays, server-side validation, execution gating, and DevTools checks to avoid triggering for many installs or when analysts were inspecting them.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft found that the payloads supported ad fraud, injected ads, hijacked affiliate commissions, redirected searches, ran arbitrary JavaScript from a server, stole Google credentials and second-factor codes, harvested WordPress admin logins, and exfiltrated cookies in bulk. Microsoft advises users to check installed Edge add-ons against the published extension ID list, treat matching or automatically removed extensions as exposure, change sensitive passwords, review sign-in activity, and enable strong two-factor authentication. The article also notes overlap with DarkSpectre, ShadyPanda, and GhostPoster through shared infrastructure, shared hiding methods, and shared extension names, although Microsoft has not named the actor.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft removed 119 malicious extensions from the Edge Add-ons store and suspended more than 90 developer accounts tied to the operation.","Microsoft calls the campaign StegoAd and says the extensions hid payloads inside ordinary image and font files while posing as tools such as ad blockers, VPNs, translators, and video downloaders.","The 119 extensions had an install base of up to 2.6 million users, but Microsoft says this is a ceiling rather than a confirmed victim count.","Microsoft found that retrieved payloads supported ad fraud, remote JavaScript execution, Google credential and second-factor code theft, WordPress admin login harvesting, and bulk cookie exfiltration.","Microsoft advises users to compare their installed Edge add-ons against the published extension ID list and to change passwords and review sign-in activity if anything matches or was removed automatically."],"insights":["The extensions often performed their advertised functions and accumulated reviews, which helped them remain in the Edge Add-ons store for years despite carrying hidden malicious code.","Some variants used multi-day delays, server-side validation, analyst checks, and a 10% execution gate, meaning many installs may never have triggered the payload and direct probing by researchers could receive only decoy responses.","The campaign’s use of steganography evolved as detection improved, moving from JavaScript appended to PNG icons to WebP images and then WOFF2 font files containing hidden code.","Microsoft found that seven Google Analytics tracking IDs appeared to give the operator near real-time campaign telemetry through Google’s infrastructure.","The article notes overlap with DarkSpectre, ShadyPanda, and GhostPoster through shared infrastructure, shared hiding methods, and shared extension names, although Microsoft has not publicly named the actor."],"referencedReports":[{"title":"Inside StegoAd: How We Disrupted a Massive Malicious Extension Campaign","url":"https://microsoftedge.github.io/edgevr/posts/Inside-StegoAd-How-We-Disrupted-a-Massive-Malicious-Extension-Campaign/","publisher":"Microsoft","context":"The article cites Microsoft’s analysis naming and describing the StegoAd malicious Edge extension campaign.","category":"research","primary":true},{"title":"Microsoft Edge Security StegoAd Technical Report","url":"https://microsoftedge.github.io/edgevr/assets/files/stego_ad/Microsoft_Edge_Security_StegoAd.pdf","publisher":"Microsoft","context":"The article says Microsoft’s technical report contains the full list of extension IDs and indicators of compromise for the StegoAd campaign.","category":"research","primary":true}],"body":"\u003cp\u003eMicrosoft removed 119 malicious extensions from the Edge Add-ons store and suspended more than 90 developer accounts tied to the operation. Microsoft calls the campaign StegoAd and says it was run by a single threat actor active since at least 2021. The extensions posed as common tools such as ad blockers, VPNs, translators, and video downloaders, and had an install base of up to 2.6 million users, though Microsoft says that figure is a ceiling rather than a confirmed victim count.\u003c/p\u003e\n\n\u003cp\u003eThe campaign hid executable code inside ordinary-looking image and font files, including PNG icons, WebP images, and WOFF2 fonts. Some variants fetched normal-looking images from command-and-control servers, decoded the hidden payload through several transformations, and only received the real file after passing fingerprint and User-Agent checks. The extensions also used delays, server-side validation, execution gating, and DevTools checks to avoid triggering for many installs or when analysts were inspecting them.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft found that the payloads supported ad fraud, injected ads, hijacked affiliate commissions, redirected searches, ran arbitrary JavaScript from a server, stole Google credentials and second-factor codes, harvested WordPress admin logins, and exfiltrated cookies in bulk. Microsoft advises users to check installed Edge add-ons against the published extension ID list, treat matching or automatically removed extensions as exposure, change sensitive passwords, review sign-in activity, and enable strong two-factor authentication. The article also notes overlap with DarkSpectre, ShadyPanda, and GhostPoster through shared infrastructure, shared hiding methods, and shared extension names, although Microsoft has not named the actor.\u003c/p\u003e\n"},{"n":2,"title":"Public PoC Released for Critical libssh2 CVE-2026-55200 Client-Side SSH Flaw","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/public-poc-released-for-critical.html","time":"07:06","priority":"SHOULD READ","score":88,"tldr":"A public PoC has been released for CVE-2026-55200, a critical libssh2 client-side flaw that could let a malicious SSH server corrupt memory and potentially execute code on connecting clients. Organizations should urgently identify bundled or static libssh2 copies and apply builds containing the upstream patch until an official fixed release is available.","briefOverview":"\u003cp\u003eA public proof-of-concept has been released for CVE-2026-55200, a critical flaw in libssh2 that can let a malicious or compromised SSH server trigger memory corruption on a connecting client, with possible code execution. The bug affects every release up to and including 1.11.1 and has a CVSS 4.0 score of 9.2. The article emphasizes that libssh2 is a client-side SSH library embedded in software such as curl, Git, PHP, backup agents, firmware updaters, and appliances.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is in ssh2_transport_read() in transport.c, where the attacker-controlled packet_length field was rejected only when below 1 and was not checked against an upper bound. A very large length value can wrap around during 32-bit size calculations, causing libssh2 to allocate a tiny buffer before later code writes an oversized packet into it. There is no fixed libssh2 release yet, but the upstream patch adds a check against LIBSSH2_PACKET_MAXPAYLOAD, and the article recommends inventorying bundled or static copies, applying patched builds, and restricting outbound SSH connections to trusted servers until patched.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A public proof-of-concept has been released for CVE-2026-55200, a critical libssh2 flaw that can let a malicious or compromised SSH server trigger memory corruption on a connecting client with possible code execution.","The flaw affects every libssh2 release up to and including 1.11.1 and has a CVSS 4.0 score of 9.2.","The bug is in ssh2_transport_read() in transport.c, where an attacker-controlled packet_length field was not checked against an upper bound before 32-bit size calculations could wrap around.","There is no fixed libssh2 release yet, but the upstream patch in commit 97acf3d rejects packet_length values above LIBSSH2_PACKET_MAXPAYLOAD, and downstream projects are backporting it.","The article recommends inventorying all software that links libssh2, including static or bundled copies, applying a patched build, and restricting outbound SSH connections to trusted servers until patched."],"insights":["Because libssh2 is often statically linked or bundled inside products, a normal Linux distribution package update may leave vulnerable copies behind and organizations may not know where those copies exist.","The public proof-of-concept is not described as a turnkey remote exploit, so immediate risk depends on how libssh2 is embedded in a target application, allocator behavior, and deployed mitigations.","The flaw is a repeat of a bug class libssh2 addressed in 2019, with the article noting a near-identical integer-overflow issue in the same transport-read area of the code.","Clients that connect to external SSH servers or to hostnames an attacker could redirect should be prioritized, because the vulnerable code is reached when a client connects to an untrusted SSH endpoint."],"referencedReports":[{"title":"libssh2 Out-of-bounds Write via Unchecked Packet Length in Transport C","url":"https://www.vulncheck.com/advisories/libssh2-out-of-bounds-write-via-unchecked-packet-length-in-transport-c","publisher":"VulnCheck","context":"The article cites VulnCheck for the CVSS 4.0 score and says VulnCheck published the CVE for the libssh2 flaw.","category":"advisory","primary":true},{"title":"NHS England Digital advisory on CVE-2026-55200","url":"https://digital.nhs.uk/cyber-alerts/2026/cc-4799","publisher":"NHS England Digital","context":"The article says NHS England Digital issued an advisory urging affected organizations to update.","category":"advisory","primary":false}],"body":"\u003cp\u003eA public proof-of-concept has been released for CVE-2026-55200, a critical flaw in libssh2 that can let a malicious or compromised SSH server trigger memory corruption on a connecting client, with possible code execution. The bug affects every release up to and including 1.11.1 and has a CVSS 4.0 score of 9.2. The article emphasizes that libssh2 is a client-side SSH library embedded in software such as curl, Git, PHP, backup agents, firmware updaters, and appliances.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is in ssh2_transport_read() in transport.c, where the attacker-controlled packet_length field was rejected only when below 1 and was not checked against an upper bound. A very large length value can wrap around during 32-bit size calculations, causing libssh2 to allocate a tiny buffer before later code writes an oversized packet into it. There is no fixed libssh2 release yet, but the upstream patch adds a check against LIBSSH2_PACKET_MAXPAYLOAD, and the article recommends inventorying bundled or static copies, applying patched builds, and restricting outbound SSH connections to trusted servers until patched.\u003c/p\u003e\n"}]</script>
