cripts, and RAR archives exploiting CVE-2025-8088 in WinRAR. In some cases, payloads were hosted on GitHub or compromised WordPress sites. Google also noted architectural similarities between STOCKSTAY and Kazuar, raising the possibility that both tools may have been developed and maintained in part by the same developer or team.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Google Threat Intelligence Group attributed a previously undocumented .NET backdoor called STOCKSTAY to the Russian state-sponsored threat actor Turla.","STOCKSTAY has been deployed against government and military organizations in Ukraine and entities with an interest in Italian foreign policy.","The malware consists of multiple components, including STOCKSTAY.MARKETMAKER, STOCKSTAY.STOCKBROKER, STOCKSTAY.STOCKTRADER, and STOCKSTAY.STOCKMARKET, which communicate via Windows inter-process messages and a secure WebSocket connection.","STOCKSTAY.STOCKTRADER supports commands for file deletion and upload, directory enumeration, screen capture, process execution, Windows Registry operations, system information gathering, and ZIP extraction.","Google said STOCKSTAY shares significant code, functional, and architectural overlaps with Turla’s Kazuar backdoor, raising the possibility that both tools were developed and maintained in part by the same developer or team."],"insights":["STOCKSTAY has been used both for initial access into previously unprofiled environments and later in operations against specific hosts, indicating Turla deploys the same tool at different stages depending on what it already knows about the target network.","Google found a publicly accessible GitHub repository containing a Python implementation of the victim-facing STOCKSTAY WebSocket server controller, but the server’s inability to decrypt inbound messages limits visibility for platform operators and helps obscure Turla’s infrastructure.","The malware was originally designed to resemble a stock market data viewer before being adapted to impersonate other harmless programs such as PDF viewers and calculator utilities.","STOCKSTAY’s component separation mirrors Turla’s Kazuar architecture closely enough that Google assessed the tools may have been developed and maintained in part by the same developer or team.","Recent STOCKSTAY delivery chains reused multiple intrusion methods, including malicious RDP files, MSI installers, HTA scripts in RAR archives, compromised WordPress hosting, GitHub hosting, and exploitation of CVE-2025-8088 in WinRAR."],"referencedReports":[{"title":"STOCKSTAY: Turla Intelligence Gathering","url":"https://cloud.google.com/blog/topics/threat-intelligence/stockstay-turla-intelligence-gathering","publisher":"Google Threat Intelligence Group","context":"The article is based on Google Threat Intelligence Group's technical analysis attributing the STOCKSTAY backdoor to Turla and describing its architecture, delivery methods, and overlap with Kazuar.","category":"research","primary":true}],"body":"\u003cp\u003eGoogle Threat Intelligence Group attributed a previously undocumented .NET backdoor called \u003cstrong\u003eSTOCKSTAY\u003c/strong\u003e to the Russian state-sponsored threat actor Turla. The tool has been deployed against government and military organizations in Ukraine, as well as entities with an interest in Italian foreign policy. Google described STOCKSTAY as a Windows backdoor that is under continued development and shares significant code and functional overlaps with Turla’s Kazuar implant.\u003c/p\u003e\n\n\u003cp\u003eSTOCKSTAY is a multi-component backdoor that communicates with its command-and-control infrastructure through a secure WebSocket connection and uses Windows inter-process messages between its components. Its modules include a downloader, a proxy-aware tunneler, a main backdoor for information gathering, and an orchestrator that controls configuration and command execution. Supported actions include file upload and download, directory enumeration, screen capture, process execution, Windows Registry operations, system information collection, and ZIP extraction.\u003c/p\u003e\n\n\u003cp\u003eGoogle said Turla has distributed STOCKSTAY through multiple methods, including phishing emails with malicious RDP files, MSI installers, RAR archives containing HTA scripts, and RAR archives exploiting CVE-2025-8088 in WinRAR. In some cases, payloads were hosted on GitHub or compromised WordPress sites. Google also noted architectural similarities between STOCKSTAY and Kazuar, raising the possibility that both tools may have been developed and maintained in part by the same developer or team.\u003c/p\u003e\n"},{"n":2,"title":"Russia Used Cellebrite on Jailed Activist's iPhone Months After Sales Cutoff","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/russia-used-cellebrite-on-jailed.html","time":"08:49","priority":"SHOULD READ","score":82,"tldr":"Citizen Lab found that Russian authorities used Cellebrite UFED tools to extract data from jailed opposition activist Andrey Pivovarov’s seized iPhone in June 2021, months after Cellebrite said it had stopped sales to Russia. The case shows that sales cutoffs can be ineffective when older offline forensic hardware remains usable by government agencies.","briefOverview":"\u003cp\u003eRussian authorities used Cellebrite’s UFED forensic tools to break into the iPhone of detained opposition activist Andrey Pivovarov in June 2021. This happened three months after Cellebrite said it would stop selling its tools and services to Russia and Belarus. Citizen Lab’s finding is based on traces found on the phone and an official Russian government report that names Cellebrite tools.\u003c/p\u003e\n\n\u003cp\u003ePivovarov ran Open Russia, an opposition group the Kremlin had labeled “undesirable,” and his iPhone 12 and MacBook were confiscated after he was pulled off a flight at St. Petersburg airport on May 31, 2021. He did not consent to a search and did not provide his passwords. The Russian forensic report documented extraction of data from apps including WhatsApp, Telegram, and Viber, and searches for Open Russia Civic Movement and named opposition figures.\u003c/p\u003e\n\n\u003cp\u003eThe article says the timing highlights a gap in Cellebrite’s sales cutoff because existing UFED hardware could keep working offline after support and updates ended. Cellebrite told Citizen Lab and Access Now that any use of its legacy hardware in Russia after March 2021 was entirely unauthorized. The MacBook extraction failed because of encryption, while the phone evidence showed how a seized device could expose political contacts and potential future targets.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Citizen Lab reported that Russian authorities used Cellebrite UFED forensic tools to access detained opposition activist Andrey Pivovarov’s iPhone in June 2021, three months after Cellebrite said it would stop selling tools and services to Russia and Belarus.","Pivovarov’s iPhone 12 and MacBook were confiscated when he was pulled off a flight at St. Petersburg airport on May 31, 2021, and he did not consent to a search or provide passwords.","MobileLockdown records on the iPhone showed a June 17, 2021 connection to a host ID matching a Cellebrite fingerprint, which Citizen Lab assessed as high-confidence evidence of UFED use.","A Russian forensic report given to Pivovarov named Cellebrite’s UFED Physical Analyzer and UFED 4PC and documented searches for Open Russia Civic Movement and named opposition figures.","Cellebrite told Citizen Lab and Access Now that any use of its legacy hardware in Russia after March 2021 was entirely unauthorized and said Russia remains on its restricted-customer list."],"insights":["Cellebrite’s March 2021 cutoff mainly stopped future sales and updates, but it did not prevent already-deployed offline UFED hardware in Russia from continuing to work on seized devices.","The case is unusually well-supported because it combines forensic traces found on the iPhone with an official Russian government report that explicitly names Cellebrite tools.","The failed MacBook extraction shows that device encryption and not providing passwords can still block access in at least some custody-room searches.","The article highlights a practical risk for activists: data taken from one seized phone can reveal contacts and names that may become useful for later targeting campaigns.","Cellebrite’s move toward subscription licenses that stop working after expiration is presented as a response to the weakness of older tools that could keep operating without vendor support."],"referencedReports":[{"title":"Russia Breaks Into Human Rights Activist’s Phone with Cellebrite","url":"https://citizenlab.ca/research/russia-breaks-into-human-rights-activists-phone-with-cellebrite/","publisher":"Citizen Lab","context":"The article says its main finding was published by Citizen Lab and relies on Citizen Lab’s forensic analysis of Pivovarov’s iPhone and the Russian government report naming Cellebrite tools.","category":"research","primary":true}],"body":"\u003cp\u003eRussian authorities used Cellebrite’s UFED forensic tools to break into the iPhone of detained opposition activist Andrey Pivovarov in June 2021. This happened three months after Cellebrite said it would stop selling its tools and services to Russia and Belarus. Citizen Lab’s finding is based on traces found on the phone and an official Russian government report that names Cellebrite tools.\u003c/p\u003e\n\n\u003cp\u003ePivovarov ran Open Russia, an opposition group the Kremlin had labeled “undesirable,” and his iPhone 12 and MacBook were confiscated after he was pulled off a flight at St. Petersburg airport on May 31, 2021. He did not consent to a search and did not provide his passwords. The Russian forensic report documented extraction of data from apps including WhatsApp, Telegram, and Viber, and searches for Open Russia Civic Movement and named opposition figures.\u003c/p\u003e\n\n\u003cp\u003eThe article says the timing highlights a gap in Cellebrite’s sales cutoff because existing UFED hardware could keep working offline after support and updates ended. Cellebrite told Citizen Lab and Access Now that any use of its legacy hardware in Russia after March 2021 was entirely unauthorized. The MacBook extraction failed because of encryption, while the phone evidence showed how a seized device could expose political contacts and potential future targets.\u003c/p\u003e\n"},{"n":3,"title":"Packagist is now protected by Aikido Intel and other updates to the PHP registry","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/composer-protected-aikido-packagist","time":"07:52","priority":"SHOULD READ","score":78,"tldr":"Packagist and Composer are adding default supply-chain protections for PHP, including Aikido Intel-powered blocking of known malicious package versions in Composer 2.10 and mandatory stable version immutability to stop re-tagging attacks. PHP developers should update Composer to benefit from these protections.","briefOverview":"\u003cp\u003ePackagist.org and Composer, the registry and package manager behind the PHP world, have added preventative security improvements aimed at reducing malicious package installs. Aikido’s Intel feed now powers malware blocking in Composer downloads and is enabled by default for Composer 2.10 and higher. The article presents this as part of a broader shift in open-source registries toward changes that stop whole categories of attacks instead of reacting to individual bad packages.\u003c/p\u003e\n\n\u003cp\u003eWhen Aikido flags a malicious package version, the flag is included in the package metadata Composer downloads. Composer 2.10’s dependency policy framework removes flagged versions from the resolution pool, so commands such as \u003ccode\u003ecomposer update\u003c/code\u003e, \u003ccode\u003ecomposer require\u003c/code\u003e, and \u003ccode\u003ecomposer create-project\u003c/code\u003e will not select them, while \u003ccode\u003ecomposer install\u003c/code\u003e can fail if a locked version is later flagged. Users can manually override the block if they still want to download a blocked package.\u003c/p\u003e\n\n\u003cp\u003ePackagist has also introduced stable version immutability, which prevents a published stable version from being rewritten and is intended to end re-tagging attacks like the one described against Laravel-Lang. Private Packagist can require a current Composer client and can refuse to serve flagged version files to any client, including older Composer versions. The article says Packagist is planning additional improvements such as minimum release age, organizational ownership for mandatory MFA, and staged releases, while other ecosystems including npm, PyPI, crates.io, and RubyGems are also moving toward safer package registry practices.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Aikido’s Intel feed now powers malware blocking in Composer downloads and is enabled by default for Composer 2.10 and higher.","Composer uses flagged package metadata to remove malicious package versions from dependency resolution for commands such as composer update, composer require, and composer create-project, and composer install fails if a locked version is later flagged.","Packagist introduced stable version immutability so a published stable version can no longer be rewritten, preventing re-tagging attacks like the one described against Laravel-Lang.","Private Packagist can require a current Composer client to connect and can refuse to serve flagged version files to any client, including older Composer versions.","Packagist plans additional security improvements including minimum release age, organizational ownership for mandatory MFA, and staged releases."],"insights":["The most important malware-blocking check is on composer install because it can stop a malicious version that was added to a lockfile before Aikido flagged it.","Packagist made stable version immutability mandatory, while the article says GitHub’s equivalent protection is opt-in, making Packagist’s approach stronger by default.","Older Composer versions remain a practical weak point because CI images and AI agents may still run versions from years ago.","The Aikido Intel feed is CC-BY licensed, which means Packagist’s protection is not tied to an expensive private contract and could allow other data providers to participate."],"referencedReports":[],"body":"\u003cp\u003ePackagist.org and Composer, the registry and package manager behind the PHP world, have added preventative security improvements aimed at reducing malicious package installs. Aikido’s Intel feed now powers malware blocking in Composer downloads and is enabled by default for Composer 2.10 and higher. The article presents this as part of a broader shift in open-source registries toward changes that stop whole categories of attacks instead of reacting to individual bad packages.\u003c/p\u003e\n\n\u003cp\u003eWhen Aikido flags a malicious package version, the flag is included in the package metadata Composer downloads. Composer 2.10’s dependency policy framework removes flagged versions from the resolution pool, so commands such as \u003ccode\u003ecomposer update\u003c/code\u003e, \u003ccode\u003ecomposer require\u003c/code\u003e, and \u003ccode\u003ecomposer create-project\u003c/code\u003e will not select them, while \u003ccode\u003ecomposer install\u003c/code\u003e can fail if a locked version is later flagged. Users can manually override the block if they still want to download a blocked package.\u003c/p\u003e\n\n\u003cp\u003ePackagist has also introduced stable version immutability, which prevents a published stable version from being rewritten and is intended to end re-tagging attacks like the one described against Laravel-Lang. Private Packagist can require a current Composer client and can refuse to serve flagged version files to any client, including older Composer versions. The article says Packagist is planning additional improvements such as minimum release age, organizational ownership for mandatory MFA, and staged releases, while other ecosystems including npm, PyPI, crates.io, and RubyGems are also moving toward safer package registry practices.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
