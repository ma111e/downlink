window.__DL_ARTICLES = [{"n":7,"title":"Proto6: The Schema Was Not Supposed to Run | Cyera Research","source":"cyera.com","sourceColorIdx":9,"link":"https://www.cyera.com/research/proto6-the-schema-was-not-supposed-to-run","time":"12:56","priority":"SHOULD READ","score":88,"tldr":"Cyera Research found six protobuf.js vulnerabilities that can enable remote code execution or denial of service when attacker-controlled schemas, descriptors, polluted prototypes, or deeply nested protobuf messages reach code generation or decoding paths. Users should upgrade protobuf.js and protobufjs-cli to the fixed versions, especially if they process untrusted schemas or protobuf data.","briefOverview":"\u003cp\u003eCyera Research found six vulnerabilities in protobuf.js, a JavaScript implementation of Protocol Buffers with over 48 million weekly npm downloads. The issues can enable remote code execution or denial of service when attacker-controlled schema-derived data reaches protobuf.js code generation or decoding paths. The affected areas include runtime encoding and decoding, descriptor handling, generated constructors, option path handling, recursive message decoding, and the pbjs static code-generation CLI.\u003c/p\u003e\n\n\u003cp\u003eThe most significant runtime RCE chain requires a separate prototype pollution bug elsewhere in the Node.js process. After pollution, protobuf.js can resolve an attacker-controlled type string through inherited properties, treat it as a valid primitive, insert it into generated encoder or decoder source, and compile it with Function(). A separate pbjs static generation issue does not require prototype pollution and can turn crafted schema names into JavaScript that executes when generated files are imported.\u003c/p\u003e\n\n\u003cp\u003eCyera also demonstrated real-world denial-of-service impact against Baileys WhatsApp bots and a Google Cloud Functions Pub/Sub decoding pattern using deeply nested recursive protobuf payloads. In both cases, recursive decoding can crash the process, and message persistence or redelivery can cause repeated crashes. All issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyera Research analyzed protobuf.js, a widely used JavaScript implementation of Protocol Buffers, and found six vulnerabilities involving schema-derived data. The article frames the common root cause as metadata being treated as trusted input even when it could influence generated JavaScript or runtime object structures. The vulnerabilities were assigned CVE-2026-44289, CVE-2026-44290, CVE-2026-44291, CVE-2026-44292, CVE-2026-44294, and CVE-2026-44295.\u003c/p\u003e\n\n\u003cp\u003eThe main runtime remote code execution chain depends on a prerequisite prototype pollution primitive in the same Node.js process. protobuf.js used plain objects for primitive type lookup tables, so polluted Object.prototype entries could make an attacker-controlled type name appear valid. That type string could then be interpolated into generated encoder or decoder code and compiled with Function(), causing the string to run as JavaScript.\u003c/p\u003e\n\n\u003cp\u003eA second code execution path exists in protobufjs-cli\u0026rsquo;s pbjs static code generation and does not require prototype pollution. The static generator\u0026rsquo;s escapeName() helper only handled reserved words, allowing schema names with syntax-significant characters to pass into generated JavaScript through string concatenation. The payload executes when the generated output file is imported, making CI/CD workflows that generate and import code from contributed schemas an exposed scenario described by the article.\u003c/p\u003e\n\n\u003cp\u003eThe other issues include process-wide denial of service through unsafe option paths, prototype injection in generated message constructors, denial of service from crafted field names, and stack exhaustion from unbounded recursive protobuf decoding. Cyera reproduced the recursion crash against Baileys, a WhatsApp bot library, using a roughly 34KB payload with about 10,000 nesting levels. The article also says the same payload crashed a Google Cloud Functions pattern decoding Pub/Sub events, where redelivery can cause repeated crashes until the message reaches a dead-letter queue.\u003c/p\u003e\n\n\u003cp\u003eThe affected stakeholders and technologies named in the article include protobuf.js, protobufjs-cli, Node.js applications, pbjs users, Baileys, WhatsApp bots, Google Cloud Functions, Pub/Sub, and CI/CD pipelines processing contributed schemas. The article does not identify a threat actor; it focuses on vulnerability research and exploit chains. Fixes were released in protobuf.js 7.5.6 and 8.0.2, and protobufjs-cli 1.2.1 and 2.0.2, with mitigation tracked in PR #2163.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCyera Research reported six vulnerabilities in protobuf.js, the JavaScript implementation of Protocol Buffers. The article says protobuf.js has over 48 million weekly npm downloads and is widely used to load schemas, build reflection objects, and generate specialized JavaScript encoder and decoder functions. The central finding is that protobuf.js treated schema-related metadata as trusted data even when that metadata could be influenced by attackers and later converted into executable code or unsafe runtime behavior.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities can lead to remote code execution or denial of service depending on the input surface and application behavior. The article emphasizes that not every protobuf.js deployment is equally exposed: trusted schemas compiled at build time and flat, authenticated message flows are much lower risk than systems dynamically loading schemas, decoding untrusted recursive protobuf messages, or running pbjs static generation on contributed schemas.\u003c/p\u003e\n\n\u003ch2 id=\"cves-and-fixed-versions\"\u003eCVEs and fixed versions\u003c/h2\u003e\n\n\u003cp\u003eThe article lists six assigned CVEs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-44289: denial of service through unbounded protobuf recursion.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44290: process-wide denial of service when loading schemas with unsafe option paths.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44291: code generation gadget after prototype pollution.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44292: prototype injection in generated message constructors.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44294: denial of service from crafted field names in generated code.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44295: code injection in pbjs static output from crafted schema names.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that all issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2. It also says the mitigation work is tracked in PR #2163.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-pattern\"\u003eCore technical pattern\u003c/h2\u003e\n\n\u003cp\u003eprotobuf.js reads .proto files or JSON descriptors, converts them into JavaScript objects representing message types and fields, and then generates specialized JavaScript functions for encoding and decoding. This design is used for performance because it avoids interpreting the schema repeatedly for every message. The risk described by Cyera is that schema values can cross a boundary from metadata into code.\u003c/p\u003e\n\n\u003cp\u003eThe article repeatedly identifies the same class of mistake in different forms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eType names reached generated JavaScript functions.\u003c/li\u003e\n\u003cli\u003eNamespace names reached static JavaScript files emitted by pbjs.\u003c/li\u003e\n\u003cli\u003eOption paths walked through internal object structures and overwrote built-in functions.\u003c/li\u003e\n\u003cli\u003eField names broke generated code by injecting raw control characters.\u003c/li\u003e\n\u003cli\u003eJSON object keys bypassed prototype safety checks in generated constructors.\u003c/li\u003e\n\u003cli\u003eNested binary messages triggered unbounded recursion and crashed the process.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"runtime-rce-chain-after-prototype-pollution\"\u003eRuntime RCE chain after prototype pollution\u003c/h2\u003e\n\n\u003cp\u003eThe runtime RCE chain requires a separate prototype pollution primitive in the Node.js application or one of its dependencies. The article explicitly states that protobuf.js did not provide the standalone prototype pollution bug in this chain; instead, it provided the code generation gadget that could be reached after pollution had already occurred.\u003c/p\u003e\n\n\u003cp\u003eprotobuf.js built primitive type lookup tables using plain objects. Because those objects inherited from Object.prototype, a polluted Object.prototype entry could be returned during a lookup for a field type. Cyera gives the example of adding a property to Object.prototype with a crafted type-like string, causing types.basic[payload] to return a value instead of undefined.\u003c/p\u003e\n\n\u003cp\u003eOnce the polluted lookup made the attacker-controlled string appear to be a valid primitive type, protobuf.js used that same string in generated encoder or decoder code. The value was inserted through a %s placeholder without validation or escaping and then compiled with Function(). At that point, the article says the type name stopped being a type name and ran as JavaScript.\u003c/p\u003e\n\n\u003cp\u003eThe same sink could also be reached through descriptors. The article says ext/descriptor copied descriptor.typeName into field.type, so an attacker-controlled FileDescriptorProto could carry the payload in typeName. With the same prototype pollution prerequisite, that descriptor string could reach the same type lookup and code-generation sink.\u003c/p\u003e\n\n\u003ch2 id=\"pbjs-static-code-generation-rce-path\"\u003epbjs static code generation RCE path\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a separate RCE path in pbjs, the protobuf.js CLI tool that generates static JavaScript files from schemas. Unlike the runtime chain, this issue does not require prototype pollution. The attacker-controlled input is the schema, and the output is a JavaScript file that executes when imported.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable logic was in cli/targets/static.js. The escapeName() helper only handled JavaScript reserved words and did not actually escape schema names containing newlines, semicolons, quotes, or other syntax-significant characters. Names for namespaces, enums, services, and methods could pass through to emitted JavaScript through direct string concatenation.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a CI/CD supply-chain scenario in which an attacker submits a pull request containing a crafted .proto file. When CI runs pbjs to generate JavaScript and the generated file is imported by a build, test suite, or downstream consumer, the injected code runs. The article says this could expose build secrets, signing credentials, cloud tokens, package registry credentials, and internal repositories.\u003c/p\u003e\n\n\u003ch2 id=\"other-denial-of-service-and-prototype-issues\"\u003eOther denial-of-service and prototype issues\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-44294 involves field names with raw control characters. util.safeProp() escaped backslashes and double quotes but missed characters such as newlines, carriage returns, and null bytes. A crafted field name could make generated JavaScript syntactically invalid, causing Function() to throw a SyntaxError whenever encode, decode, or verify was called for that message type.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-44290 involves unsafe option paths. util.setProperty() blocked \u003cstrong\u003eproto\u003c/strong\u003e and prototype path segments but did not block constructor. The article says an option path such as constructor.keys could walk from an options object to the global Object function and set Object.keys to a non-function value, causing Object.keys() calls to throw process-wide.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-44292 involves generated message constructors. The base Message constructor already skipped \u003cstrong\u003eproto\u003c/strong\u003e when copying properties from input objects, but generated constructors did not. If input came from JSON.parse(), \u003cstrong\u003eproto\u003c/strong\u003e could appear as an own enumerable key and be assigned to this[\u0026rdquo;\u003cstrong\u003eproto\u003c/strong\u003e\u0026rdquo;], changing the prototype of that specific message instance.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-44289 involves unbounded recursion in generated decoders for nested message fields. Self-referencing protobuf message types are valid, but the generated decoder called nested decode routines without a depth parameter, counter, or maximum. A deeply nested binary payload could recurse until V8 threw RangeError: Maximum call stack size exceeded.\u003c/p\u003e\n\n\u003ch2 id=\"real-world-impact-demonstrated-by-cyera\"\u003eReal-world impact demonstrated by Cyera\u003c/h2\u003e\n\n\u003cp\u003eCyera demonstrated the recursion denial-of-service against Baileys, described in the article as the most popular open-source WhatsApp bot library with over 2 million weekly npm downloads. Baileys uses protobuf.js to decode binary messages from WhatsApp servers, and the WhatsApp protocol schema includes naturally recursive types. Cyera crafted a roughly 34KB binary payload with about 10,000 nesting levels and sent it as a WhatsApp message to a bot.\u003c/p\u003e\n\n\u003cp\u003eWhen Baileys called Type.decode() on the incoming binary, protobuf.js recursed through the nested structure until V8 ran out of stack space and the process crashed. The article says the persistence makes the impact worse because the malicious message remains in chat history. When the bot restarts and catches up on missed messages, it decodes the same payload and crashes again, causing a restart loop until the message is manually cleared.\u003c/p\u003e\n\n\u003cp\u003eCyera also confirmed CVE-2026-44292 against Baileys. By injecting \u003cstrong\u003eproto\u003c/strong\u003e keys carrying properties such as isAdmin: true and canDelete: true into a message object, the generated constructor copied those keys without filtering. The result was a single message object with properties its schema never defined.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Cyera reproduced the recursion crash against a Google Cloud Functions pattern recommended in Google\u0026rsquo;s Firestore trigger documentation. The same 34KB payload crashed a Cloud Function decoding Pub/Sub events. Because the event is redelivered until acknowledged, the function crashes again on each retry until the message reaches the dead-letter queue.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-conditions\"\u003eExposure conditions\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several exposure scenarios:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplications loading .proto files or JSON descriptors from users, plugins, tenants, or shared repositories are exposed to schema-driven issues such as crafted field names, unsafe option paths, and static generation injection.\u003c/li\u003e\n\u003cli\u003eApplications decoding protobuf binary data from untrusted senders are exposed to the stack overflow denial-of-service issue when recursive message types are present.\u003c/li\u003e\n\u003cli\u003eNode.js processes with a separate prototype pollution bug can expose the protobuf.js code-generation gadget that turns polluted type lookup into JavaScript execution.\u003c/li\u003e\n\u003cli\u003eProjects running pbjs in CI on contributed schemas can expose build pipelines to static code-generation injection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not attribute exploitation to any named threat actor. Its focus is vulnerability research, proof-of-concept exploit chains, and affected usage patterns.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigations\"\u003eResponse and mitigations\u003c/h2\u003e\n\n\u003cp\u003eThe article says the maintainers handled the reports promptly through GitHub Security Advisories. Reports were opened in April 2026, maintainers accepted them and linked mitigation work to PR #2163, fixed protobuf.js versions 7.5.6 and 8.0.2 were released, fixed protobufjs-cli versions 1.2.1 and 2.0.2 were released, and GitHub assigned the CVEs in May 2026.\u003c/p\u003e\n\n\u003cp\u003eThe fixes described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBuilding type lookup tables with Object.create(null) to eliminate inherited property access.\u003c/li\u003e\n\u003cli\u003eValidating typeName before interpolation.\u003c/li\u003e\n\u003cli\u003eSanitizing all reflection names in static code generation, including fields, namespaces, and services.\u003c/li\u003e\n\u003cli\u003eReplacing unsafe string concatenation with safe templating.\u003c/li\u003e\n\u003cli\u003eBlocking constructor alongside \u003cstrong\u003eproto\u003c/strong\u003e and prototype in option-path traversal.\u003c/li\u003e\n\u003cli\u003eMaking generated constructors skip \u003cstrong\u003eproto\u003c/strong\u003e keys during property copying.\u003c/li\u003e\n\u003cli\u003eEnforcing a configurable maximum nesting depth during recursive decoding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s central conclusion is that protobuf.js\u0026rsquo;s trust boundary failed where metadata became structure and structure became code. Type names, namespace names, option paths, field names, object keys, and nested binary messages were all treated as passive metadata, but in affected versions they could influence generated JavaScript, process-wide built-ins, object prototypes, or recursive control flow. Cyera\u0026rsquo;s recommended response is to upgrade to the fixed protobuf.js and protobufjs-cli versions, especially for applications that process untrusted schemas, descriptors, or protobuf messages.\u003c/p\u003e\n","keyPoints":["Cyera Research found six vulnerabilities in protobuf.js that can enable remote code execution or denial of service when schema-derived data is poisoned or crafted.","The runtime remote code execution chain requires a separate prototype pollution primitive, after which protobuf.js can treat an attacker-controlled type string as a valid primitive and compile it through Function().","The protobufjs-cli static generation flaw allows crafted schema names to be emitted into generated JavaScript files and execute when those files are imported, without requiring prototype pollution.","Cyera reproduced a recursion-based denial-of-service crash against Baileys WhatsApp bots and a Google Cloud Functions Pub/Sub decoding pattern using a deeply nested protobuf payload.","The issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2."],"insights":["The most severe runtime code execution path is not a standalone protobuf.js prototype pollution bug; protobuf.js acts as a code-generation gadget that can turn prototype pollution elsewhere in the same Node.js process into arbitrary JavaScript execution.","The pbjs static generation issue creates a supply-chain risk because malicious schema names in pull requests or shared schema sources can become executable JavaScript during CI builds or tests when the generated file is imported.","The recursion denial-of-service can become persistent in message-driven systems because malicious payloads may remain in WhatsApp chat history or be redelivered by Pub/Sub until acknowledged or moved to a dead-letter queue.","A schema option path such as constructor.keys could corrupt Object.keys process-wide, showing that schema metadata could damage unrelated application code outside protobuf.js itself.","Applications using only trusted schemas compiled at build time and flat, non-recursive messages from authenticated sources had much lower exposure than applications dynamically loading schemas or decoding untrusted recursive protobuf data."],"referencedReports":[{"title":"CVE-2026-44289: Denial of service through unbounded protobuf recursion","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-685m-2w69-288q","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the unbounded protobuf recursion denial-of-service finding.","category":"","primary":false},{"title":"CVE-2026-44290: Process-wide denial of service when loading schemas with unsafe option paths","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-jvwf-75h9-cwgg","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the unsafe option path process-wide denial-of-service finding.","category":"","primary":false},{"title":"CVE-2026-44291: Code generation gadget after prototype pollution","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-75px-5xx7-5xc7","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the prototype-pollution-assisted code generation gadget finding.","category":"","primary":false},{"title":"CVE-2026-44292: Prototype injection in generated message constructors","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-fx83-v9x8-x52w","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the generated message constructor prototype injection finding.","category":"","primary":false},{"title":"CVE-2026-44294: Denial of service from crafted field names in generated code","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-2pr8-phx7-x9h3","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the crafted field name denial-of-service finding.","category":"","primary":false},{"title":"CVE-2026-44295: Code injection in pbjs static output from crafted schema names","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-6r35-46g8-jcw9","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the pbjs static output code injection finding.","category":"","primary":false}],"body":"\u003cp\u003eCyera Research found six vulnerabilities in protobuf.js, a JavaScript implementation of Protocol Buffers with over 48 million weekly npm downloads. The issues can enable remote code execution or denial of service when attacker-controlled schema-derived data reaches protobuf.js code generation or decoding paths. The affected areas include runtime encoding and decoding, descriptor handling, generated constructors, option path handling, recursive message decoding, and the pbjs static code-generation CLI.\u003c/p\u003e\n\n\u003cp\u003eThe most significant runtime RCE chain requires a separate prototype pollution bug elsewhere in the Node.js process. After pollution, protobuf.js can resolve an attacker-controlled type string through inherited properties, treat it as a valid primitive, insert it into generated encoder or decoder source, and compile it with Function(). A separate pbjs static generation issue does not require prototype pollution and can turn crafted schema names into JavaScript that executes when generated files are imported.\u003c/p\u003e\n\n\u003cp\u003eCyera also demonstrated real-world denial-of-service impact against Baileys WhatsApp bots and a Google Cloud Functions Pub/Sub decoding pattern using deeply nested recursive protobuf payloads. In both cases, recursive decoding can crash the process, and message persistence or redelivery can cause repeated crashes. All issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n"},{"n":2,"title":"New Threat Cluster OP-512 Targets Microsoft IIS Servers with Custom Web Shell Framework","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-threat-cluster-op-512-targets.html","time":"12:33","priority":"SHOULD READ","score":86,"tldr":"Researchers identified a new China-linked threat cluster, OP-512, targeting Microsoft IIS servers with a custom web shell framework designed for stealth, restricted attacker access, and automated compromise reporting. The activity highlights continued interest by China-aligned actors in legacy, internet-facing IIS servers running unsupported software.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified a previously unreported threat cluster called OP-512 that targets Microsoft Internet Information Services servers with a bespoke web shell framework. ReliaQuest assessed with moderate to high confidence that the espionage-focused activity is linked to China. The activity was observed on a compromised IIS web server belonging to an organization whose sector and geography align with China-linked intelligence priorities.\u003c/p\u003e\n\n\u003cp\u003eOP-512’s framework consists of three web shells that provide remote access, file management, authenticated command execution through two independent access paths, and automated compromise reporting. The web shells use evasion measures such as timestomping, including scanning nearby files and folders, calculating the median last-modified timestamp, and changing their own timestamps to blend into the environment. ReliaQuest said the framework combines uniquely generated deployments, cryptographic access controls, and centralized reporting at scale.\u003c/p\u003e\n\n\u003cp\u003eIn the observed case, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. The attacker used the IIS worker process w3wp.exe to drop a web shell into an application upload directory, after which the shell reported its location to attacker-controlled infrastructure through DNS or HTTP fallback. The actor later attempted to escalate privileges to SYSTEM using the Potato Suite and ran commands such as whoami /priv to confirm privileges.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers have reported a previously unreported threat cluster named OP-512, with “OP” standing for “opponent,” targeting Microsoft IIS servers. ReliaQuest assessed with moderate to high confidence that the activity is linked to China and focused on espionage. The company said OP-512 was highly likely conducting espionage through a compromised IIS web server at an organization whose sector and geography align with China-linked intelligence priorities.\u003c/p\u003e\n\n\u003cp\u003eThe article places OP-512 in a broader pattern of China-linked or China-aligned activity involving IIS servers. It says OP-512 is the fourth such threat group after CL-STA-0048, DragonRank, and GhostRedirector to single out IIS web servers over the past 12 months. It also notes that Cisco Talos recently reported multiple Chinese-speaking cybercrime groups sharing a BadIIS malware variant for IIS infections, and that SHADOW-EARTH-053 has targeted IIS servers in a China-aligned espionage campaign against government and defense sectors across South, East, and Southeast Asia.\u003c/p\u003e\n\n\u003cp\u003eThe central capability attributed to OP-512 is a custom web shell framework made up of three web shells. These web shells provide the attackers with remote access to compromised hosts while attempting to evade signature-based detection and complicate forensic timelines. Their timestomping method scans nearby files and folders, calculates the median last-modified timestamp, and overwrites the shells’ own creation and modification times to match that value.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said the framework has capabilities that are rarely seen together, including uniquely generated deployments, cryptographic controls that restrict access to the attacker, and automatic reporting from compromised servers for centralized management. OP-512 shares close tactical proximity to CL-STA-0048, but no direct overlap has been found between OP-512 and other known China-aligned adversaries. The article says OP-512 is considered a distinct cluster operating autonomously, whether it represents a revamped existing cluster or independently developed capabilities.\u003c/p\u003e\n\n\u003cp\u003eIn the attack observed by ReliaQuest, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. There was evidence of earlier activity on the same host around 75 days before the main incident, including DNS queries to the attacker-controlled domain ashx.lhlsjcb[.]com. During the later activity, the attacker used the IIS worker process w3wp.exe to drop a web shell into the application upload directory, triggering DNS or HTTP-based reporting of the shell’s location.\u003c/p\u003e\n\n\u003cp\u003eAfter deploying the web shells, OP-512 attempted to escalate privileges to SYSTEM using the Potato Suite. The actor also ran commands such as whoami /priv to confirm system rights. ReliaQuest warned that internet-facing IIS servers running legacy, unsupported software remain a preferred entry point in this threat ecosystem and that OP-512’s purpose-built framework may evade defenses tuned only to known actors and commodity tooling.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have discovered a previously unreported threat cluster called OP-512, with “OP” standing for “opponent.” The group has been observed targeting Microsoft Internet Information Services servers to deploy a bespoke web shell framework. ReliaQuest assessed with moderate to high confidence that the espionage-focused activity is linked to China.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said OP-512 was highly likely conducting espionage through a compromised IIS web server at an organization whose sector and geography align with China-linked intelligence priorities. The article does not name the affected organization. It presents OP-512 as a distinct cluster operating autonomously.\u003c/p\u003e\n\n\u003ch2 id=\"broader-iis-targeting-context\"\u003eBroader IIS Targeting Context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that no overlaps have been found between OP-512 and other known China-aligned adversaries. However, it says OP-512 is the fourth such threat group, after CL-STA-0048, DragonRank, and GhostRedirector, to single out IIS web servers over the past 12 months.\u003c/p\u003e\n\n\u003cp\u003eThe article also references other recent IIS-focused activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos recently reported that multiple Chinese-speaking cybercrime groups are sharing a variant of malware called BadIIS to infect IIS servers.\u003c/li\u003e\n\u003cli\u003eIIS servers have been targeted by SHADOW-EARTH-053 in a China-aligned espionage campaign against government and defense sectors across South, East, and Southeast Asia.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eReliaQuest said that four China-linked clusters targeting the same technology in under a year is unlikely to be a coincidence. The company stated that internet-facing IIS servers running legacy, unsupported software remain a preferred entry point across this threat ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"op-512-web-shell-framework\"\u003eOP-512 Web Shell Framework\u003c/h2\u003e\n\n\u003cp\u003eThe core of OP-512’s operation is a custom web shell framework made up of three web shells. According to the article, the web shells grant attackers remote access to compromised hosts while taking steps to evade signature-based detection and complicate forensic timelines.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said the framework combines several capabilities it rarely sees together:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEach deployment is uniquely generated.\u003c/li\u003e\n\u003cli\u003eAccess is restricted to the attacker through cryptographic controls.\u003c/li\u003e\n\u003cli\u003eCompromised servers automatically report back for centralized management at scale.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe three web shells together gave the attacker file management, authenticated command execution through two independent access paths, and automated reporting of the compromise before defenders had time to respond.\u003c/p\u003e\n\n\u003ch2 id=\"timestomping-and-evasion\"\u003eTimestomping and Evasion\u003c/h2\u003e\n\n\u003cp\u003eA notable technique used by the OP-512 framework is timestomping. The web shells scan every file and sub-folder around the location where they are placed, calculate the median last-modified timestamp, and overwrite their own creation and modification times to match that value.\u003c/p\u003e\n\n\u003cp\u003eThis gives the impression that the web shell artifacts have been present for some time. The article frames this as a way to complicate forensic timelines and evade signature-based detection.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-other-clusters\"\u003eRelationship to Other Clusters\u003c/h2\u003e\n\n\u003cp\u003eOP-512 shares close tactical proximity to CL-STA-0048. The article says this raises the possibility that OP-512 either represents an existing cluster that has completely revamped its toolset or developed these capabilities independently.\u003c/p\u003e\n\n\u003cp\u003eDespite that tactical proximity, ReliaQuest treats OP-512 as a distinct cluster operating autonomously. The article states that no overlaps have been found between OP-512 and other known China-aligned adversaries.\u003c/p\u003e\n\n\u003ch2 id=\"observed-attack-details\"\u003eObserved Attack Details\u003c/h2\u003e\n\n\u003cp\u003eIn the attack observed by ReliaQuest, the threat actor targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. The same host showed evidence of prior activity about 75 days before the main incident.\u003c/p\u003e\n\n\u003cp\u003eThat earlier activity involved DNS queries to a different attacker-controlled domain, ashx.lhlsjcb[.]com. Weeks later, the main sequence of actions was described as a “sprint.”\u003c/p\u003e\n\n\u003cp\u003eDuring that later activity, the attacker used the web server’s worker process, w3wp.exe, to drop one of the web shells into the application’s upload directory. This triggered a self-reporting mechanism that used a DNS query, or an HTTP request as a fallback, to transmit the web shell’s location to an attacker-controlled domain.\u003c/p\u003e\n\n\u003ch2 id=\"privilege-escalation-attempt\"\u003ePrivilege Escalation Attempt\u003c/h2\u003e\n\n\u003cp\u003eAfter deploying the web shells, OP-512 attempted to escalate privileges to the SYSTEM level using the Potato Suite. The actor then ran commands such as whoami /priv to confirm system rights.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state whether the privilege escalation attempt succeeded. It describes the attempt and the subsequent privilege-checking command activity observed by ReliaQuest.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-defenders\"\u003eSignificance for Defenders\u003c/h2\u003e\n\n\u003cp\u003eReliaQuest emphasized that OP-512 differs from other IIS-targeting clusters because it is not using commodity tooling recycled across campaigns. Instead, it is using a purpose-built framework designed to defeat detection methods that work against the other three clusters mentioned in the article.\u003c/p\u003e\n\n\u003cp\u003eThe company warned that organizations that have tuned defenses to known actors are likely not covered against OP-512. The article also highlights legacy, unsupported, internet-facing IIS servers as a recurring target in this activity set.\u003c/p\u003e\n","keyPoints":["Researchers discovered a previously unreported threat cluster called OP-512 that targets Microsoft Internet Information Services servers with a custom web shell framework.","ReliaQuest assessed with moderate to high confidence that OP-512’s espionage-focused activity is linked to China.","OP-512’s framework consists of three web shells that provide remote access, file management, authenticated command execution through two access paths, and automated reporting of the compromise.","The web shells use timestomping by calculating the median last-modified timestamp of nearby files and folders and changing their own timestamps to blend in.","In the observed attack, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0 and attempted privilege escalation to SYSTEM using the Potato Suite."],"insights":["OP-512’s timestomping method is unusually adaptive because it calculates the median last-modified time of surrounding files and folders rather than using a fixed timestamp, making simple timeline-based detection less reliable.","The web shell framework restricts access to the attacker through cryptographic controls, so defenders relying on unauthenticated probing or generic web shell interaction may not observe its full functionality.","The compromised server automatically reports the deployed web shell location to attacker-controlled infrastructure using DNS first and HTTP as a fallback, making outbound DNS and HTTP monitoring from IIS servers especially relevant for detection.","The article notes that four China-linked clusters have targeted IIS servers within a year, indicating that legacy internet-facing IIS systems remain a recurring priority across this threat ecosystem.","ReliaQuest emphasizes that OP-512 uses a purpose-built framework rather than recycled commodity tooling, so defenses tuned only to previously known IIS-focused actors may miss this activity."],"referencedReports":[{"title":"Threat Spotlight: ReliaQuest’s Agentic AI Uncovers New China-Linked Cluster OP-512","url":"https://reliaquest.com/blog/threat-spotlight-reliaquests-agentic-ai-uncovers-new-china-linked-cluster-op-512","publisher":"ReliaQuest","context":"The article cites ReliaQuest’s report as the source for the assessment that OP-512 is a China-linked espionage-focused cluster targeting IIS servers with a custom web shell framework.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have identified a previously unreported threat cluster called OP-512 that targets Microsoft Internet Information Services servers with a bespoke web shell framework. ReliaQuest assessed with moderate to high confidence that the espionage-focused activity is linked to China. The activity was observed on a compromised IIS web server belonging to an organization whose sector and geography align with China-linked intelligence priorities.\u003c/p\u003e\n\n\u003cp\u003eOP-512’s framework consists of three web shells that provide remote access, file management, authenticated command execution through two independent access paths, and automated compromise reporting. The web shells use evasion measures such as timestomping, including scanning nearby files and folders, calculating the median last-modified timestamp, and changing their own timestamps to blend into the environment. ReliaQuest said the framework combines uniquely generated deployments, cryptographic access controls, and centralized reporting at scale.\u003c/p\u003e\n\n\u003cp\u003eIn the observed case, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. The attacker used the IIS worker process w3wp.exe to drop a web shell into an application upload directory, after which the shell reported its location to attacker-controlled infrastructure through DNS or HTTP fallback. The actor later attempted to escalate privileges to SYSTEM using the Potato Suite and ran commands such as whoami /priv to confirm privileges.\u003c/p\u003e\n"},{"n":1,"title":"EU unveils tech sovereignty package to cut reliance on US, Chinese suppliers","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/eu-unveils-tech-sovereignty-package-cut-reliance-us-china","time":"13:38","priority":"SHOULD READ","score":78,"tldr":"The European Commission proposed a broad tech sovereignty package to reduce EU dependence on U.S. and Chinese suppliers across chips, cloud, AI and open-source software. Its strongest security measures fund resilience such as open-source maintenance and semiconductor preparedness, while stricter cloud ownership and location rules are likely to face political and industry pushback.","briefOverview":"\u003cp\u003eThe European Commission proposed a broad technology sovereignty package aimed at reducing the European Union’s reliance on foreign technology suppliers. The package includes two draft laws, Chips Act 2.0 and the Cloud and AI Development Act, as well as an Open Source Strategy and a roadmap for digitalizing the energy system. The Commission said the EU depends on foreign countries for more than 80% of its key digital products, services, infrastructure, and intellectual property.\u003c/p\u003e\n\n\u003cp\u003eA major security element is the Open Source Strategy, which would fund long-term maintenance and security for critical European open-source infrastructure. The article connects this to under-resourced components behind incidents such as the XZ Utils backdoor and notes that public administrations would be pushed toward open-source tools through procurement guidance. The strategy is presented as a possible foothold for European cybersecurity vendors in a market dominated by U.S. firms.\u003c/p\u003e\n\n\u003cp\u003eThe package also targets semiconductor, cloud, and AI dependencies, but the article highlights tensions in how sovereignty is pursued. Chips Act 2.0 would speed approvals for new fabrication plants and expand state aid, while the Cloud and AI Development Act introduces four assurance levels for public bodies, including stricter tiers requiring EU ownership, control, and protection from third-country interference. Industry reaction is split, with U.S. tech representatives warning of discrimination and European cloud providers welcoming the direction while warning about loopholes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe European Commission unveiled a technology sovereignty package intended to reduce the European Union’s reliance on foreign suppliers across semiconductors, cloud computing, artificial intelligence, and open-source software. The package includes Chips Act 2.0, the Cloud and AI Development Act, an Open Source Strategy, and a roadmap for digitalizing the energy system. Commission tech lead Henna Virkkunen described the move as a major shift in Europe’s approach to technological sovereignty.\u003c/p\u003e\n\n\u003cp\u003eThe Commission said the EU relies on foreign countries for more than 80% of key digital products, services, infrastructure, and intellectual property. The article frames the initiative against concerns that long-standing technology dependencies have become a security vulnerability. It also notes that the move comes amid worsening relations with the Trump administration and fears that dependence could be weaponised.\u003c/p\u003e\n\n\u003cp\u003eOn open source, the Commission plans to scale up European alternatives in priority areas including cybersecurity. It also proposes funding the long-term maintenance and security of Europe’s critical open-source infrastructure, described as the kind of under-resourced components behind incidents such as the XZ Utils backdoor. The strategy would encourage public administrations to use open-source tools through procurement guidance and an open internet stack.\u003c/p\u003e\n\n\u003cp\u003eOn semiconductors, the article says the Commission highlights Europe’s reliance on third countries for advanced production and chip design, while also noting that dependence on Taiwan’s TSMC for advanced fabrication is essentially universal. It says Europe’s clearer weakness is chip design, where U.S. companies such as Nvidia, AMD, Qualcomm, Apple, and Broadcom have a large footprint and Britain’s Arm dominates processor IP licensing. Chips Act 2.0 would require national governments to complete approvals for new fabrication plants within 12 months and extend state aid for first-of-a-kind facilities not present anywhere in the EU.\u003c/p\u003e\n\n\u003cp\u003eThe Cloud and AI Development Act is described as the most contested element of the package because of its cloud sovereignty test. Its four assurance levels range from requiring data to be processed and stored in the EU to requiring full supply-chain control with no third-country interference. U.S. industry group CCIA Europe called the higher tiers discriminatory, while European cloud body CISPE welcomed the direction but warned that the proposal may fail to prevent “sovereignty-washing.”\u003c/p\u003e\n\n\u003cp\u003eThe article presents a broader debate over whether sovereignty itself delivers security. It cites arguments that resilience depends on design, transparency, portability, and recoverability rather than ownership and location requirements alone. The proposals still need approval from the European Parliament and European Council, where sovereignty criteria, procurement obligations, and funding will be negotiated.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe European Commission proposed a sweeping technology sovereignty package designed to reduce the European Union’s reliance on foreign technology suppliers. The package spans semiconductors, cloud computing, artificial intelligence, open-source software, and digital energy infrastructure. It combines two draft laws, Chips Act 2.0 and the Cloud and AI Development Act, with an Open Source Strategy and a roadmap for digitalizing the energy system.\u003c/p\u003e\n\n\u003cp\u003eCommission tech lead Henna Virkkunen described the package as “a major shift in how Europe approaches technological sovereignty.” She said geopolitics and technology are now inseparable and argued that Europe must be in control of its data, supply chains, and future while keeping its economy open to global partners.\u003c/p\u003e\n\n\u003ch2 id=\"strategic-context\"\u003eStrategic Context\u003c/h2\u003e\n\n\u003cp\u003eAccording to the Commission, the EU relies on foreign countries for more than 80% of its key digital products, services, infrastructure, and intellectual property. The article says the package is intended to loosen the grip of American and Chinese suppliers. It also frames the proposal against worsening relations with the Trump administration and concerns that technological dependence could be weaponised.\u003c/p\u003e\n\n\u003cp\u003eThe stated goal of the package is to “help widen choice in core technologies for EU businesses, citizens and public administrations.” The article presents this as a response to concerns that long-standing dependencies are becoming security vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"open-source-security\"\u003eOpen-Source Security\u003c/h2\u003e\n\n\u003cp\u003eThe Open Source Strategy is one of the package’s cybersecurity-relevant components. The Commission says it will scale up European open-source alternatives in priority areas that explicitly include cybersecurity. It also plans to fund the long-term maintenance and security of Europe’s critical open-source infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article links this focus to under-resourced components behind incidents such as the XZ Utils backdoor. It says the strategy builds on more than 3 million European open-source contributors and would push public administrations toward open-source tools through procurement guidance and an open internet stack.\u003c/p\u003e\n\n\u003cp\u003eOpen-source vendor SUSE said the approach supported its view that inspectable, openly maintained software is better suited to sovereignty goals than proprietary stacks. SUSE also warned that implementation would be the real test.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that U.S. firms dominate Europe’s cybersecurity market and that European buyers rely heavily on American suppliers. It cites Alexandra Paulus at the German Institute for International and Security Affairs, who argued that nurturing European cybersecurity alternatives depends on promoting open source. In that context, the article describes open-source security funding as a potential but unproven foothold for European vendors.\u003c/p\u003e\n\n\u003ch2 id=\"semiconductor-sovereignty\"\u003eSemiconductor Sovereignty\u003c/h2\u003e\n\n\u003cp\u003eThe Commission said Europe still relies heavily on third countries for advanced semiconductor production and chip design. The article argues that equating production and design may misstate the EU’s predicament. It says dependence on Taiwan’s TSMC for advanced fabrication is essentially universal and applies to the United States as much as to the European Union.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the strategy does not mention one of Europe’s greatest semiconductor strengths: the near-monopoly of Dutch lithography maker ASML. ASML’s machines are described as essential to TSMC producing the most advanced chips anywhere in the world.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies chip design as Europe’s clearer weakness. U.S. companies including Nvidia, AMD, Qualcomm, Apple, and Broadcom are described as giving the American industry an enormous footprint in advanced logic design. Britain’s Arm is also described as dominating processor IP licensing globally.\u003c/p\u003e\n\n\u003ch2 id=\"chips-act-2-0-measures\"\u003eChips Act 2.0 Measures\u003c/h2\u003e\n\n\u003cp\u003eChips Act 2.0 introduces tools aimed at addressing the manufacturing gap. It would require national governments to complete planning, environmental, and regulatory approvals for new fabrication plants within 12 months. It would also extend state aid for “first-of-a-kind” facilities not present anywhere in the EU.\u003c/p\u003e\n\n\u003cp\u003eThe article says the original 2023 Chips Act mobilized more than €52 billion, or $60.3 billion, in public and private investment. However, it fell short of its flagship target of reaching 20% of global semiconductor production by 2030 because global capacity grew faster than Europe’s share of it.\u003c/p\u003e\n\n\u003cp\u003eRecent semiconductor investments have not yet produced their expected results. Intel had planned to build a manufacturing plant in Magdeburg, Germany, intended to be one of the most advanced in the world, but pulled the plug on the decision in February. Another venture involving TSMC in Dresden aims to enter production by late 2027, but it will produce 28nm and 16nm chips used in automotive and industrial electronics rather than the advanced AI chips central to the package’s ambitions.\u003c/p\u003e\n\n\u003cp\u003eOn design, the Commission is relying on demand-pull. It plans to use orders from EU-funded data centres and AI gigafactories to draw chip designers to Europe over time. The Commission said it expects AI-related components to make up more than 70% of the semiconductor market by 2030.\u003c/p\u003e\n\n\u003cp\u003eErik Rein, president of the European Semiconductor Industry Association, said Europe cannot regulate its way into semiconductor leadership. The Commission also said it expected to launch a call for AI gigafactories in July and would consult with member states and the European Investment Bank Group on building “a European equity capacity at scale” to finance its ambitions.\u003c/p\u003e\n\n\u003ch2 id=\"cloud-and-ai-sovereignty\"\u003eCloud and AI Sovereignty\u003c/h2\u003e\n\n\u003cp\u003eThe Cloud and AI Development Act is described as the most contested element of the package. Its central feature is a cloud sovereignty test, with lower tiers providing legal assurances and upper tiers requiring graded protections against foreign jurisdictional reach and supply-chain compromise.\u003c/p\u003e\n\n\u003cp\u003eThe act defines four assurance levels for public bodies to apply based on risk:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLevel 1 requires data to be processed and stored in the EU.\u003c/li\u003e\n\u003cli\u003eLevel 2 requires demonstrated independence from non-EU countries.\u003c/li\u003e\n\u003cli\u003eLevel 3 requires EU ownership and control, including personnel criteria.\u003c/li\u003e\n\u003cli\u003eLevel 4 requires full supply-chain control with no third-country interference.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIndustry reaction has been sharply divided. CCIA Europe, which represents large U.S. technology firms, called the Cloud and AI Development Act discriminatory and “a dangerous recipe for progressive market shutdown.” It argued that Level 3 and Level 4 amount to closed-market requirements that no international provider could meet.\u003c/p\u003e\n\n\u003cp\u003eEuropean cloud providers welcomed the direction but warned of loopholes. CISPE called the proposal “a step forward for Europe’s strategic autonomy” but said it did not require public buyers to check whether a European alternative existed before contracting foreign providers. Ahead of the launch, CISPE had urged the Commission not to legitimize “sovereignty-washing,” where EU presence or cybersecurity compliance is treated as genuine European control.\u003c/p\u003e\n\n\u003cp\u003eThe Centre for European Policy Network cautioned that sovereignty pursued through procurement preferences “produces protected industries, not competitive ones.” It urged lawmakers to limit strict requirements to genuinely sensitive systems.\u003c/p\u003e\n\n\u003ch2 id=\"debate-over-sovereignty-and-security\"\u003eDebate Over Sovereignty and Security\u003c/h2\u003e\n\n\u003cp\u003eThe article presents an unresolved debate over whether technological sovereignty delivers security. It cites analyst Josh Gold’s prize-winning essay, which argued that European cyber resilience depends on design rather than control. Gold’s formulation was that the bloc should keep sovereignty “thin and targeted” while building “thick autonomy.”\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, that approach favors transparency, portability, and recoverability over EU ownership and location requirements. The article also cites the troubled Gaia-X cloud initiative as a warning against duplicating infrastructure at scale. A participant quoted in a Politico report described Gaia-X as “a crushing failure, a colossal waste of time” and “an industrial disaster.”\u003c/p\u003e\n\n\u003cp\u003eBy that standard, the article says the package is strongest where it funds resilience, such as semiconductor crisis preparedness, open-source maintenance, and interoperability. It is most exposed where it leans on EU ownership and location requirements, leaving its security payoff dependent on how member states apply the tiers.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe package affects a wide range of public and private stakeholders mentioned in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEuropean Union institutions, including the European Commission, European Parliament, and European Council.\u003c/li\u003e\n\u003cli\u003eEU member states, which would be responsible for approvals and later application of cloud assurance tiers.\u003c/li\u003e\n\u003cli\u003ePublic administrations, which may be guided toward open-source tools and may apply cloud assurance levels based on risk.\u003c/li\u003e\n\u003cli\u003eEuropean businesses and citizens, which the package says should gain wider choice in core technologies.\u003c/li\u003e\n\u003cli\u003eU.S. and Chinese technology suppliers, whose dominance the package seeks to reduce.\u003c/li\u003e\n\u003cli\u003eU.S. technology firms represented by CCIA Europe.\u003c/li\u003e\n\u003cli\u003eEuropean cloud providers represented by CISPE.\u003c/li\u003e\n\u003cli\u003eOpen-source contributors and vendors, including SUSE.\u003c/li\u003e\n\u003cli\u003eSemiconductor companies and entities including TSMC, ASML, Intel, Nvidia, AMD, Qualcomm, Apple, Broadcom, and Arm.\u003c/li\u003e\n\u003cli\u003eThe European Investment Bank Group, which is expected to be part of consultations on financing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"legislative-status\"\u003eLegislative Status\u003c/h2\u003e\n\n\u003cp\u003eAll of the proposals still need to be passed by the European Parliament and the European Council. The article says sovereignty criteria, procurement obligations, and funding will be subject to political negotiation. The final security and market effects of the package therefore depend on how the proposals are amended, approved, funded, and implemented.\u003c/p\u003e\n","keyPoints":["The European Commission proposed a technology sovereignty package that includes Chips Act 2.0, the Cloud and AI Development Act, an Open Source Strategy, and a roadmap for digitalizing the energy system.","The Commission said the EU relies on foreign countries for more than 80% of its key digital products, services, infrastructure, and intellectual property.","The Open Source Strategy would fund the long-term maintenance and security of Europe’s critical open-source infrastructure and push public administrations toward open-source tools through procurement guidance.","Chips Act 2.0 would require national governments to complete approvals for new fabrication plants within 12 months and extend state aid for first-of-a-kind facilities not present anywhere in the EU.","The Cloud and AI Development Act defines four assurance levels for public bodies, with higher tiers requiring EU ownership, control, and protection from third-country interference."],"insights":["The package is likely to be most defensible on security grounds where it funds resilience, such as open-source maintenance, semiconductor crisis preparedness, and interoperability, rather than where it relies on EU ownership or data-location requirements.","The article notes a mismatch in the semiconductor strategy: Europe’s advanced fabrication dependence on TSMC is shared even by the United States, while Europe’s clearer weakness is advanced chip design dominated by U.S. firms and Arm.","CADA’s highest cloud assurance levels could exclude major international providers because they require EU ownership, control, and full supply-chain protection from third-country interference.","European cloud providers welcomed the sovereignty direction but still warned that the proposal may allow “sovereignty-washing” if EU presence or compliance is treated as equivalent to genuine European control.","The article presents Gaia-X as a cautionary example that duplicating cloud infrastructure at scale can fail to reduce reliance on hyperscalers if sovereignty efforts are not paired with practical resilience and competitiveness."],"referencedReports":[{"title":"Europe's Cybersecurity Depends on the United States","url":"https://www.swp-berlin.org/en/publication/europes-cybersecurity-depends-on-the-united-states","publisher":"German Institute for International and Security Affairs","context":"The article cites Alexandra Paulus's argument that developing European cybersecurity alternatives depends on promoting open source.","category":"","primary":false},{"title":"Thin Sovereignty, Thick Autonomy","url":"https://bindinghook.com/thin-sovereignty-thick-autonomy/","publisher":"Binding Hook","context":"The article cites Josh Gold's essay arguing that European cyber resilience depends on design choices such as transparency, portability, and recoverability rather than ownership and location requirements.","category":"","primary":false}],"body":"\u003cp\u003eThe European Commission proposed a broad technology sovereignty package aimed at reducing the European Union’s reliance on foreign technology suppliers. The package includes two draft laws, Chips Act 2.0 and the Cloud and AI Development Act, as well as an Open Source Strategy and a roadmap for digitalizing the energy system. The Commission said the EU depends on foreign countries for more than 80% of its key digital products, services, infrastructure, and intellectual property.\u003c/p\u003e\n\n\u003cp\u003eA major security element is the Open Source Strategy, which would fund long-term maintenance and security for critical European open-source infrastructure. The article connects this to under-resourced components behind incidents such as the XZ Utils backdoor and notes that public administrations would be pushed toward open-source tools through procurement guidance. The strategy is presented as a possible foothold for European cybersecurity vendors in a market dominated by U.S. firms.\u003c/p\u003e\n\n\u003cp\u003eThe package also targets semiconductor, cloud, and AI dependencies, but the article highlights tensions in how sovereignty is pursued. Chips Act 2.0 would speed approvals for new fabrication plants and expand state aid, while the Cloud and AI Development Act introduces four assurance levels for public bodies, including stricter tiers requiring EU ownership, control, and protection from third-country interference. Industry reaction is split, with U.S. tech representatives warning of discrimination and European cloud providers welcoming the direction while warning about loopholes.\u003c/p\u003e\n"},{"n":4,"title":"The Funding Approval That Passed Every Authentication Check","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/typosquat-salesforce-pardot-lookalike-domain-funding-fraud","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"A phishing email used a typosquatted lender domain fully authenticated through Salesforce Marketing Cloud, allowing SPF, DKIM, DMARC, and Microsoft CompAuth checks to pass despite being fraudulent. The key lesson is that email authentication proves a domain authorized a message, not that the domain is legitimate or trusted.","briefOverview":"\u003cp\u003eA line-of-credit approval email was sent to a mid-size industrial company using a typosquatted domain that differed from a legitimate commercial lender by one extra “s” in the company name. The sender display name matched a known sales representative, and the from address looked legitimate at a glance. The article describes the incident as a high-severity credential harvesting and brand impersonation attempt.\u003c/p\u003e\n\n\u003cp\u003eThe attacker configured the typosquat domain as a sending identity in Salesforce Marketing Cloud, also known as ExactTarget. The message passed SPF, DKIM, DMARC, and Microsoft CompAuth checks, even though Microsoft also scored it SCL=9 with SFTY:9.25 as high-confidence spam. The article emphasizes that authentication validated the domain’s authorization to send, not whether the domain itself was trustworthy.\u003c/p\u003e\n\n\u003cp\u003eThe email used Pardot tracking links through go[.]pardot[.]com that redirected to the legitimate lender’s website at a /quote/ path. The reply-to address pointed back to the typosquat domain, so any response would go to the attacker. Themis flagged the recipient as a VIP at 50% confidence and quarantined four mailboxes based on behavioral indicators rather than authentication failures.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA phishing email involving a line-of-credit approval was delivered to a mid-size industrial company. The message used a sender display name matching a known sales representative at a commercial lending firm, but the sending domain was a typosquat containing one extra “s” in the company name. The article identifies the activity as credential harvesting and brand impersonation with high severity.\u003c/p\u003e\n\n\u003cp\u003eThe attacker registered the typosquat domain northsshorescapitals[.]com, which closely resembled the legitimate domain northshorescapital[.]com. The domain was configured as a sending identity in Salesforce Marketing Cloud, also referred to as ExactTarget. The email was transmitted through akz220[.]mta[.]exacttarget[.]com from IP address 128[.]245[.]247[.]220.\u003c/p\u003e\n\n\u003cp\u003eFrom an authentication standpoint, the message passed every major check described in the article. SPF passed for the typosquat domain, DKIM passed with a valid signature aligned to that domain, DMARC passed, and Microsoft CompAuth returned reason=100. At the same time, Microsoft scored the message SCL=9 with SFTY:9.25, marking it as high-confidence spam.\u003c/p\u003e\n\n\u003cp\u003eThe links in the message used Pardot tracking infrastructure through go[.]pardot[.]com and redirected to the real lender’s website at a /quote/ path. The display text in the email showed the legitimate company’s domain, while the underlying HTML contained the Pardot redirect chain tied to the typosquat domain’s marketing instance. The reply-to address was amy.campbell@northsshorescapitals[.]com, meaning replies would go to the attacker-controlled domain.\u003c/p\u003e\n\n\u003cp\u003eThemis flagged the recipient as a VIP and scored the message at 50% confidence, and four mailboxes were quarantined. The article states that detection was driven by behavioral indicators, including a first-time sender, a domain visually similar to a known vendor, and a financial action request targeting a high-value recipient. The MITRE ATT\u0026amp;CK mappings cited are T1566.002, T1036.005, and T1583.001.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a high-severity phishing incident in which an attacker sent a line-of-credit approval email to a mid-size industrial company. The message appeared to come from a known sales representative at a commercial lending firm, but the sending domain was a typosquat with one extra “s” inserted into the company name. The article frames the attack as credential harvesting and brand impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe core issue was that the fraudulent message passed all major email authentication checks because the attacker controlled and properly configured the lookalike domain. The article emphasizes that authentication confirmed the typosquat domain had authorized the message, but it did not prove that the domain was legitimate or trusted.\u003c/p\u003e\n\n\u003ch2 id=\"typosquat-domain-and-impersonation\"\u003eTyposquat Domain and Impersonation\u003c/h2\u003e\n\n\u003cp\u003eThe attacker registered the typosquat domain \u003ccode\u003enorthsshorescapitals[.]com\u003c/code\u003e. The legitimate commercial lender’s domain was identified as \u003ccode\u003enorthshorescapital[.]com\u003c/code\u003e. The difference was a single extra “s” in the company name.\u003c/p\u003e\n\n\u003cp\u003eThe sender email was listed as \u003ccode\u003eamy.campbell@northsshorescapitals[.]com\u003c/code\u003e. The reply-to address used the same typosquat domain. The sender’s display name matched a known sales representative at the commercial lending firm, which made the message appear plausible at a glance.\u003c/p\u003e\n\n\u003ch2 id=\"email-infrastructure-and-authentication\"\u003eEmail Infrastructure and Authentication\u003c/h2\u003e\n\n\u003cp\u003eThe typosquat domain was configured as a sending identity in Salesforce Marketing Cloud, also referred to as ExactTarget. The message was transmitted through \u003ccode\u003eakz220[.]mta[.]exacttarget[.]com\u003c/code\u003e from IP address \u003ccode\u003e128[.]245[.]247[.]220\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the email passed:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSPF for the typosquat domain.\u003c/li\u003e\n\u003cli\u003eDKIM with a valid signature aligned to the typosquat domain.\u003c/li\u003e\n\u003cli\u003eDMARC.\u003c/li\u003e\n\u003cli\u003eMicrosoft CompAuth with \u003ccode\u003ereason=100\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDespite those authentication results, Microsoft’s heuristics scored the message as \u003ccode\u003eSCL=9\u003c/code\u003e with \u003ccode\u003eSFTY:9.25\u003c/code\u003e, flagging it as high-confidence spam. The article highlights this contradiction as evidence that email authentication verifies authorization by a domain, not the trustworthiness of that domain.\u003c/p\u003e\n\n\u003ch2 id=\"link-strategy-and-pardot-redirects\"\u003eLink Strategy and Pardot Redirects\u003c/h2\u003e\n\n\u003cp\u003eThe email contained Pardot tracking links routed through \u003ccode\u003ego[.]pardot[.]com\u003c/code\u003e, a Salesforce-owned domain. Those links redirected to the legitimate lender’s website at a \u003ccode\u003e/quote/\u003c/code\u003e path. The visible display text in the email showed the real company’s domain.\u003c/p\u003e\n\n\u003cp\u003eThe article states that only inspection of the underlying HTML would reveal the Pardot redirect chain originating from the typosquat domain’s marketing instance. The attacker did not need to host a fake landing page because the links ultimately led to the real lender’s website. The article describes this as a credibility-layering technique.\u003c/p\u003e\n\n\u003cp\u003eThe reply-to address was also important because it pointed back to the typosquat domain. As a result, any response to the email would go directly to the attacker-controlled address rather than the legitimate lender.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis flagged the recipient as a VIP and scored the message at 50% confidence. Four mailboxes were quarantined. The article states that detection was based on behavioral indicators rather than authentication failures.\u003c/p\u003e\n\n\u003cp\u003eThe behavioral indicators included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA first-time sender.\u003c/li\u003e\n\u003cli\u003eA domain visually similar to a known vendor.\u003c/li\u003e\n\u003cli\u003eA financial action request.\u003c/li\u003e\n\u003cli\u003eTargeting of a high-value recipient.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the attacker correctly configured the domain, used a legitimate ESP, produced a valid DKIM signature, and pointed links to real infrastructure. What the attacker could not fake, according to the article, was the relationship history between the sender and the recipient’s organization.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTyposquat domain: \u003ccode\u003enorthsshorescapitals[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eLegitimate domain: \u003ccode\u003enorthshorescapital[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSender email: \u003ccode\u003eamy.campbell@northsshorescapitals[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReply-to address: \u003ccode\u003eamy.campbell@northsshorescapitals[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eESP relay: \u003ccode\u003eakz220[.]mta[.]exacttarget[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending IP: \u003ccode\u003e128[.]245[.]247[.]220\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eTracking domain: \u003ccode\u003ego[.]pardot[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRedirect target: \u003ccode\u003enorthshorescapital[.]com/quote/\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.002\u003c/code\u003e — Phishing: Spearphishing Link, for the Pardot tracking links used as a credibility layer.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1036.005\u003c/code\u003e — Masquerading: Match Legitimate Name or Location, for display-name impersonation of a known sales representative.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1583.001\u003c/code\u003e — Acquire Infrastructure: Domains, for the purpose-registered typosquat domain with ESP integration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-watch-points-stated-in-the-article\"\u003eRecommended Watch Points Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article advises inspecting the domain character by character when a financial action request arrives from a first-time sender, even if authentication passes. It also recommends verifying that the sending domain matches the organization’s known vendor list. The reply-to address should be checked to ensure it resolves to the domain on file rather than a near-identical variant.\u003c/p\u003e\n","keyPoints":["An attacker registered a typosquat domain with one extra letter compared with a legitimate commercial lender and used it to send a line-of-credit approval email.","The typosquat domain was configured as a sending identity in Salesforce Marketing Cloud, and the email passed SPF, DKIM, DMARC, and Microsoft CompAuth checks.","Microsoft scored the message as SCL=9 with SFTY:9.25, flagging it as high-confidence spam despite the email authentication passes.","The email used Pardot tracking links through go.pardot.com that redirected to the legitimate lender's website, while the reply-to address pointed to the typosquat domain.","Themis flagged the recipient as a VIP and detected behavioral indicators including a first-time sender using a domain visually similar to a known vendor and a financial action request."],"insights":["Full SPF, DKIM, DMARC, and CompAuth success can coexist with high-confidence spam scoring when the attacker controls a lookalike domain, showing that authentication alone is not a reliable trust signal.","Using Pardot links that redirect to the legitimate lender’s site let the attacker avoid hosting a fake landing page while still making the email appear credible to recipients checking visible link text.","The reply-to field was a critical control point because responses would go to the typosquat domain even though the email’s links ultimately led to the real company’s website.","Behavioral signals such as first-time sender status, vendor-domain similarity, VIP targeting, and financial-action context were more useful for detection than protocol-level authentication results in this case."],"referencedReports":[{"title":"Phishing: Spearphishing Link","url":"https://attack.mitre.org/techniques/T1566/002/","publisher":"MITRE ATT\u0026CK","context":"The article maps the phishing email’s Pardot tracking links to MITRE ATT\u0026CK technique T1566.002.","category":"","primary":false},{"title":"Masquerading: Match Legitimate Name or Location","url":"https://attack.mitre.org/techniques/T1036/005/","publisher":"MITRE ATT\u0026CK","context":"The article maps the display-name impersonation of a known sales representative to MITRE ATT\u0026CK technique T1036.005.","category":"","primary":false},{"title":"Acquire Infrastructure: Domains","url":"https://attack.mitre.org/techniques/T1583/001/","publisher":"MITRE ATT\u0026CK","context":"The article maps the purpose-registered typosquat domain with ESP integration to MITRE ATT\u0026CK technique T1583.001.","category":"","primary":false}],"body":"\u003cp\u003eA line-of-credit approval email was sent to a mid-size industrial company using a typosquatted domain that differed from a legitimate commercial lender by one extra “s” in the company name. The sender display name matched a known sales representative, and the from address looked legitimate at a glance. The article describes the incident as a high-severity credential harvesting and brand impersonation attempt.\u003c/p\u003e\n\n\u003cp\u003eThe attacker configured the typosquat domain as a sending identity in Salesforce Marketing Cloud, also known as ExactTarget. The message passed SPF, DKIM, DMARC, and Microsoft CompAuth checks, even though Microsoft also scored it SCL=9 with SFTY:9.25 as high-confidence spam. The article emphasizes that authentication validated the domain’s authorization to send, not whether the domain itself was trustworthy.\u003c/p\u003e\n\n\u003cp\u003eThe email used Pardot tracking links through go[.]pardot[.]com that redirected to the legitimate lender’s website at a /quote/ path. The reply-to address pointed back to the typosquat domain, so any response would go to the attacker. Themis flagged the recipient as a VIP at 50% confidence and quarantined four mailboxes based on behavioral indicators rather than authentication failures.\u003c/p\u003e\n"},{"n":6,"title":"Agent-Inflicted Damage: Inside the Real-World Failures of Enterprise AI Systems","source":"cyera.com","sourceColorIdx":9,"link":"https://www.cyera.com/research/agent-inflicted-damage-inside-the-real-world-failures-of-enterprise-ai-systems","time":"12:56","priority":"SHOULD READ","score":78,"tldr":"Cyera’s research finds that autonomous enterprise AI agents are already causing real operational harm—deleting data, exposing secrets, triggering outages, and generating runaway costs—because they often act with excessive permissions and weak guardrails. Organizations need to treat agent actions, prompts, and workflows as part of the enterprise security perimeter with strict authorization, inline controls, auditability, and data governance.","briefOverview":"\u003cp\u003eCyera describes a security and operational risk category it calls “Agent-Inflicted Damage,” where AI systems unintentionally cause harmful outcomes by modifying data, influencing workflows, or interacting with enterprise systems in unexpected ways. The research analyzed 7,246 publicly reported AI-related incident records from September 2023 through May 2026. Cyera identified 344 verified enterprise-relevant cases, including 188 incidents where autonomous AI systems caused direct organizational harm without external attacker involvement.\u003c/p\u003e\n\n\u003cp\u003eThe article says these incidents are not merely theoretical AI risks, but include production impacts such as deleted databases, destructive cloud actions, unauthorized financial operations, runaway API spending, service outages, exposed secrets, and silent integrity corruption. Cyera classifies the incidents into poor access control and guardrail bypass, data and secrets exposure, and real-world damage. The largest cluster was real-world damage, which included financial harm, deletion and code destruction, service and physical disruption, and silent integrity failure.\u003c/p\u003e\n\n\u003cp\u003eCyera argues that the rise of AI “coworks” and autonomous coding agents has expanded the enterprise attack surface because agents increasingly connect to SaaS platforms, databases, cloud infrastructure, collaboration tools, and internal workflows. The article recommends that organizations manage agent runtime environments, ensure agents never exceed the permissions of the users they represent, apply inline security controls, maintain centralized governance and auditability, and treat prompts, execution plans, reasoning traces, and outputs as part of the critical data perimeter.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyera’s article introduces “Agent-Inflicted Damage” as a distinct enterprise security and operational risk category. It defines the phenomenon as harmful outcomes caused by AI systems that modify data, influence workflows, or interact with systems in
