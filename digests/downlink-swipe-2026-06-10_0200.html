<script type="application/json" id="dl-articles">[{"n":2,"title":"Six Proto6 Vulnerabilities in protobuf.js Expose Node.js Apps to RCE and DoS","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/six-proto6-vulnerabilities-in.html","time":"05:08","priority":"SHOULD READ","score":86,"tldr":"Researchers disclosed six protobuf.js vulnerabilities that could let attackers crash Node.js services or execute code when apps process malicious Protobuf schemas, descriptors, or payloads. Affected users should upgrade to protobufjs 7.5.6 or 8.0.2 and protobufjs-cli 1.2.1 or 2.0.2.","briefOverview":"\u003cp\u003eCybersecurity researchers at Cyera flagged six vulnerabilities in protobuf.js, a JavaScript and TypeScript implementation of Protocol Buffers. The flaws, codenamed Proto6, could lead to remote code execution and denial-of-service attacks if successfully exploited. Cyera said a single malicious protobuf schema, descriptor, or crafted payload could trigger crashes, runtime corruption, or code execution in affected environments.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities affect Node.js applications that use protobuf.js, Google Cloud client libraries, messaging frameworks such as Baileys, and CI/CD pipelines. Cyera said any Node.js service that deserializes Protobuf data or generates code from schemas with protobuf.js is likely impacted. The flaws stem from the library handling schema and metadata as trusted by default.\u003c/p\u003e\n\n\u003cp\u003eThe most severe vulnerability described in the article is CVE-2026-44291, which can result in code execution when attacker-controlled input reaches a prototype pollution gadget and protobuf.js later generates encoder or decoder code. Other issues include unbounded recursion, unsafe option paths, prototype injection, crafted field names, and code injection in pbjs static output. Patches are available in protobufjs 7.5.6 and 8.0.2, and protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyera researchers disclosed six vulnerabilities in protobuf.js, a JavaScript and TypeScript implementation of Protocol Buffers. The vulnerabilities have been codenamed Proto6 and may enable remote code execution and denial-of-service attacks. The article says exploitation could require specific conditions, but Cyera noted those conditions are increasingly common in data and AI ecosystems that exchange data, schemas, and configuration files.\u003c/p\u003e\n\n\u003cp\u003eThe affected ecosystem includes Node.js applications using protobuf.js, Google Cloud client libraries, messaging frameworks such as Baileys, and CI/CD pipelines. Cyera said any Node.js service that deserializes Protobuf data or generates code from schemas with protobuf.js is likely impacted. The article also notes that protobuf.js is heavily used inside databases, vector stores, inference pipelines, orchestration systems, CI/CD tooling, and cloud SDKs.\u003c/p\u003e\n\n\u003cp\u003eThe six listed flaws are CVE-2026-44289, CVE-2026-44290, CVE-2026-44291, CVE-2026-44292, CVE-2026-44294, and CVE-2026-44295. They cover denial of service through unbounded protobuf recursion, process-wide denial of service from unsafe option paths, code generation after prototype pollution, prototype injection in generated message constructors, denial of service from crafted field names, and code injection in pbjs static output from crafted schema names. Their CVSS scores range from 5.3 to 8.7.\u003c/p\u003e\n\n\u003cp\u003eCyera attributed the vulnerabilities to protobuf.js treating schemas and metadata as trusted by default. In one described attack scenario, an actor could introduce a malicious protobuf schema into CI/CD workflows and leak build secrets through CVE-2026-44295. Another example in the article says specially crafted messages could crash Node.js services such as WhatsApp bots built with Baileys through CVE-2026-44292.\u003c/p\u003e\n\n\u003cp\u003eThe most severe issue highlighted is CVE-2026-44291, which can lead to arbitrary JavaScript execution inside a Node.js process. Vladimir Tokarev explained that attacker-controlled input can reach a prototype pollution gadget, after which protobuf.js may resolve a polluted Object.prototype property as if it were a valid protobuf primitive. Protobuf.js then inserts the attacker-controlled string into a generated encoder or decoder function and compiles it with Function().\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable versions are protobuf.js versions up to 7.5.5 and versions 8.0.0 through 8.0.1, as well as protobufjs-cli versions up to 1.2.0 and versions 2.0.0 through 2.0.1. Fixes are available in protobufjs 7.5.6 and 8.0.2, and protobufjs-cli 1.2.1 and 2.0.2. Users are advised to apply the latest fixes to protect against potential threats.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers at Cyera reported six vulnerabilities in protobuf.js, a JavaScript and TypeScript implementation of Protocol Buffers. The vulnerabilities are collectively codenamed Proto6. According to the article, successful exploitation could result in remote code execution and denial-of-service attacks.\u003c/p\u003e\n\n\u003cp\u003eCyera researcher Assaf Morag said that, in affected environments, a single malicious protobuf schema, descriptor, or crafted payload could be enough to trigger crashes, runtime corruption, or code execution. The article frames the issue as significant because Protocol Buffers are widely used for serializing structured data, and protobuf.js is used across multiple Node.js and data-processing environments.\u003c/p\u003e\n\n\u003ch2 id=\"affected-ecosystem\"\u003eAffected Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the vulnerabilities affect Node.js applications that use protobuf.js. It also identifies Google Cloud client libraries, messaging frameworks such as Baileys, and CI/CD pipelines as affected areas.\u003c/p\u003e\n\n\u003cp\u003eCyera said any Node.js service that deserializes Protobuf data or generates code from schemas with protobuf.js is likely impacted. The article further notes that protobuf.js is heavily used inside databases, vector stores, inference pipelines, orchestration systems, CI/CD tooling, and cloud SDKs.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-identified\"\u003eVulnerabilities Identified\u003c/h2\u003e\n\n\u003cp\u003eThe six vulnerabilities listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-44289, with a CVSS score of 7.5, described as denial of service through unbounded protobuf recursion.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44290, with a CVSS score of 7.5, described as process-wide denial of service when loading schemas with unsafe option paths.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44291, with a CVSS score of 8.1, described as a code generation gadget after prototype pollution.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44292, with a CVSS score of 5.3, described as prototype injection in generated message constructors.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44294, with a CVSS score of 5.3, described as denial of service from crafted field names in generated code.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44295, with a CVSS score of 8.7, described as code injection in pbjs static output from crafted schema names.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"root-cause-described-by-cyera\"\u003eRoot Cause Described by Cyera\u003c/h2\u003e\n\n\u003cp\u003eCyera said the vulnerabilities stem from protobuf.js handling schema and metadata as trusted by default. The article says this validation oversight could influence application behavior and lead to code execution.\u003c/p\u003e\n\n\u003cp\u003eMorag noted that exploitation generally requires specific conditions. However, the article quotes him as saying those conditions are increasingly common in data and AI ecosystems that exchange data, schemas, and configuration files across services, repositories, cloud platforms, and third-party integrations.\u003c/p\u003e\n\n\u003ch2 id=\"technical-detail-on-cve-2026-44291\"\u003eTechnical Detail on CVE-2026-44291\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies CVE-2026-44291 as the most severe of the disclosed issues. It says the flaw can result in code execution when a Node.js application accepts attacker-controlled input.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Vladimir Tokarev explained that the attacker-controlled input reaches a prototype pollution gadget. Later, the same process uses protobuf.js to encode or decode a message. Because protobuf.js resolves type names through plain property lookups, a polluted Object.prototype can make an attacker-controlled string appear to be a valid protobuf primitive.\u003c/p\u003e\n\n\u003cp\u003eTokarev said protobuf.js then inserts that string into a generated encoder or decoder function and compiles it with Function(). According to the article, this gives the attacker arbitrary JavaScript execution inside the Node.js process.\u003c/p\u003e\n\n\u003ch2 id=\"example-attack-scenarios-mentioned\"\u003eExample Attack Scenarios Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a scenario in which a malicious protobuf schema could be introduced into CI/CD workflows. In that case, CVE-2026-44295 could poison CI/CD workflows and leak build secrets.\u003c/p\u003e\n\n\u003cp\u003eThe article also gives an example involving Node.js services such as WhatsApp bots built using Baileys, a WhatsApp Web API automation TypeScript library. It says those services could be crashed through a specially crafted message by exploiting CVE-2026-44292.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerable-versions\"\u003eVulnerable Versions\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerable protobuf.js versions listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eprotobuf.js versions less than or equal to 7.5.5.\u003c/li\u003e\n\u003cli\u003eprotobuf.js versions greater than or equal to 8.0.0 and less than or equal to 8.0.1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe vulnerable protobufjs-cli versions listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eprotobufjs-cli versions less than or equal to 1.2.0.\u003c/li\u003e\n\u003cli\u003eprotobufjs-cli versions greater than or equal to 2.0.0 and less than or equal to 2.0.1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe article states that patches are available in protobufjs 7.5.6 and 8.0.2. Patches are also available in protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n\n\u003cp\u003eUsers are advised to apply the latest fixes to safeguard against potential threats. No named threat actor or active exploitation campaign is identified in the article.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eCyera said successful exploitation could affect sensitive enterprise and AI workloads at scale because protobuf.js is used inside databases, vector stores, inference pipelines, orchestration systems, CI/CD tooling, and cloud SDKs. The article emphasizes that modern software increasingly treats schemas, metadata, and configuration files as trusted inputs that drive automation, orchestration, and code generation.\u003c/p\u003e\n\n\u003cp\u003eCyera concluded that when those trust assumptions break, data can become behavior. The article presents Proto6 as an example of how schemas and metadata can create attack surfaces when they are used to drive code generation and runtime behavior without sufficient validation.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers at Cyera identified six vulnerabilities, collectively called Proto6, in protobuf.js that could enable remote code execution and denial-of-service attacks in affected Node.js environments.","The vulnerabilities affect Node.js applications using protobuf.js, Google Cloud client libraries, messaging frameworks such as Baileys, and CI/CD pipelines that deserialize Protobuf data or generate code from schemas.","The flaws stem from protobuf.js treating schema and metadata as trusted by default, which Cyera said can influence application behavior and lead to code execution.","CVE-2026-44291 is described as the most severe issue because it can allow arbitrary JavaScript execution when attacker-controlled input reaches a prototype pollution gadget before protobuf.js encodes or decodes a message.","Patches are available in protobufjs 7.5.6 and 8.0.2 and protobufjs-cli 1.2.1 and 2.0.2, and users are advised to apply the latest fixes."],"insights":["A single malicious protobuf schema, descriptor, or crafted payload may be sufficient to trigger crashes, runtime corruption, or code execution in affected environments.","The attack surface is broader than direct application parsing because protobuf.js is used inside cloud SDKs, CI/CD tooling, databases, vector stores, inference pipelines, and orchestration systems.","CVE-2026-44295 is especially actionable for build environments because a malicious schema introduced into CI/CD workflows could poison generated static output and leak build secrets.","CVE-2026-44291 shows that prior prototype pollution in the same Node.js process can turn protobuf.js code generation into an execution path through its use of Function()."],"referencedReports":[{"title":"Cyera Research Uncovers Six protobuf.js Vulnerabilities Impacting the Backbone of Data and AI Systems","url":"https://www.cyera.com/blog/cyera-research-uncovers-six-protobuf-js-vulnerabilities-impacting-the-backbone-of-data-and-ai-systems","publisher":"Cyera","context":"The article cites Cyera's research disclosure as the source identifying the six Proto6 vulnerabilities in protobuf.js.","category":"","primary":false},{"title":"Proto6: The Schema Was Not Supposed to Run","url":"https://www.cyera.com/research/proto6-the-schema-was-not-supposed-to-run","publisher":"Cyera","context":"The article links to Vladimir Tokarev's technical explanation of how CVE-2026-44291 can lead to arbitrary JavaScript execution through prototype pollution and protobuf.js code generation.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers at Cyera flagged six vulnerabilities in protobuf.js, a JavaScript and TypeScript implementation of Protocol Buffers. The flaws, codenamed Proto6, could lead to remote code execution and denial-of-service attacks if successfully exploited. Cyera said a single malicious protobuf schema, descriptor, or crafted payload could trigger crashes, runtime corruption, or code execution in affected environments.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities affect Node.js applications that use protobuf.js, Google Cloud client libraries, messaging frameworks such as Baileys, and CI/CD pipelines. Cyera said any Node.js service that deserializes Protobuf data or generates code from schemas with protobuf.js is likely impacted. The flaws stem from the library handling schema and metadata as trusted by default.\u003c/p\u003e\n\n\u003cp\u003eThe most severe vulnerability described in the article is CVE-2026-44291, which can result in code execution when attacker-controlled input reaches a prototype pollution gadget and protobuf.js later generates encoder or decoder code. Other issues include unbounded recursion, unsafe option paths, prototype injection, crafted field names, and code injection in pbjs static output. Patches are available in protobufjs 7.5.6 and 8.0.2, and protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n"},{"n":1,"title":"Anthropic rolls out Claude Fable 5, but it's available for a limited time","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/artificial-intelligence/anthropic-rolls-out-claude-fable-5-but-its-available-for-a-limited-time/","time":"02:03","priority":"MAY READ","score":65,"tldr":"Anthropic is temporarily making its new Claude Fable 5 model available to Pro, Max, and Enterprise users with added guardrails to reduce misuse of Mythos-class capabilities. The model is powerful but extremely token-intensive, especially in Workflow mode, and will move to usage-based pricing after June 22.","briefOverview":"\u003cp\u003eAnthropic has begun rolling out Claude Fable 5, a new model based on the same underlying model class as Mythos, which the company previously described as powerful enough to pose security risks. The article says Mythos-class capabilities could potentially help bad actors attack public and private software, which led Anthropic to limit access to such models. Fable 5 is presented as a safer version with guardrails intended to block or divert sensitive requests.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says sensitive queries involving offensive cybersecurity, biology, or chemistry will be blocked or diverted to Claude Opus 4.8. The unrestricted version, Claude Mythos 5, has those safeguards lifted and is available only to a highly vetted group of trusted partners, including government cyberdefenders and specific life sciences researchers. Fable 5 is available to Pro, Max, and Enterprise customers until June 22, after which it will move to usage-based pricing.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that Fable 5 can consume a very large number of tokens, especially when used with Workflow mode and high model thinking. In its testing, Fable 5 used about 1 million tokens in 8 minutes and exhausted a $100 Max subscription’s daily usage in about 9 minutes. The article says that even outside Workflow in extra-high effort, Fable 5 consumes usage about two times faster than the Opus model.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic has started rolling out Claude Fable 5, a new model based on the same underlying model as Mythos, its most powerful AI model class. Anthropic previously said Mythos was a state-of-the-art model that posed security risks to companies around the world. The company warned that such tools could give an advantage to attackers in the short term if frontier labs were not careful about releases.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Mythos-class models could potentially be abused to find and exploit vulnerabilities in applications such as Firefox. Because of those risks, Anthropic previously decided to limit access to models like Mythos and make them available only to cybersecurity experts and trusted companies. Anthropic now says it has developed strong guardrails for the same model class, enabling a safer version called Fable 5.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Fable 5 has strict safeguards that block or divert sensitive queries involving areas such as offensive cybersecurity, biology, or chemistry. Those queries may be sent to the previous model, Claude Opus 4.8. Claude Mythos 5 is described as the unrestricted version of the same model with those safeguards lifted.\u003c/p\u003e\n\n\u003cp\u003eAccess to Claude Mythos 5 remains restricted because of the risks involved. The article says it is available only to a highly vetted group of trusted partners, such as government cyberdefenders and specific life sciences researchers. Fable 5, by contrast, is being offered to all Pro, Max, and Enterprise customers until June 22.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says Fable 5 is expensive because it requires significant compute, so it cannot be offered as easily as Opus 4.8 or previous models. After the limited availability window ends, Fable 5 will switch to usage-based pricing. BleepingComputer observed that the model used about 1 million tokens in 8 minutes and exhausted a $100 Max subscription’s daily usage in about 9 minutes when used with Workflow mode and high model thinking.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that this heavy consumption was particularly visible when using Workflow, a new execution system that lets Claude break complex prompts into smaller tasks and run parallel subagents. It adds that casual interactions do not cause the same behavior, but Workflow mode with high thinking can consume all tokens within minutes. Even without Workflow in extra-high effort, the article says Fable 5 consumes usage about two times faster than the Opus model.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAnthropic has begun rolling out Claude Fable 5, a new model based on the same underlying model class as Mythos. The article describes Mythos as Anthropic’s most powerful AI model class and says the company previously identified it as a state-of-the-art model that could pose security risks to companies around the world.\u003c/p\u003e\n\n\u003cp\u003eAnthropic had previously warned that Mythos was powerful enough to potentially help bad actors attack public and private software. The article states that this could include being abused to find and exploit vulnerabilities in applications such as Firefox.\u003c/p\u003e\n\n\u003ch2 id=\"why-mythos-class-models-were-restricted\"\u003eWhy Mythos-Class Models Were Restricted\u003c/h2\u003e\n\n\u003cp\u003eAnthropic previously said that, in the short term, attackers could benefit from these tools if frontier labs were not careful about how they released them. It also said that, in the long term, defenders could use the models to direct resources more efficiently and fix bugs before new code ships.\u003c/p\u003e\n\n\u003cp\u003eBecause of the risks involved, Anthropic decided to limit access to models like Mythos. The article says access was offered only to cybersecurity experts and trusted companies.\u003c/p\u003e\n\n\u003ch2 id=\"fable-5-as-a-guarded-version\"\u003eFable 5 as a Guarded Version\u003c/h2\u003e\n\n\u003cp\u003eAnthropic now says it has developed strong guardrails for the same model class. According to the article, those guardrails are intended to prevent these powerful AI models from being easily exploited by bad actors.\u003c/p\u003e\n\n\u003cp\u003eAs a result, Anthropic is launching a safer version called Claude Fable 5. The article says Claude Code now shows the Fable 5 model.\u003c/p\u003e\n\n\u003ch2 id=\"safeguards-and-sensitive-query-handling\"\u003eSafeguards and Sensitive Query Handling\u003c/h2\u003e\n\n\u003cp\u003eAccording to Anthropic, Fable 5 includes strict safeguards that will block or divert sensitive queries. The article specifically identifies sensitive areas such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOffensive cybersecurity\u003c/li\u003e\n\u003cli\u003eBiology\u003c/li\u003e\n\u003cli\u003eChemistry\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says those sensitive queries may be diverted to Anthropic’s previous model, Claude Opus 4.8.\u003c/p\u003e\n\n\u003ch2 id=\"mythos-5-access-remains-restricted\"\u003eMythos 5 Access Remains Restricted\u003c/h2\u003e\n\n\u003cp\u003eClaude Mythos 5 is described as the unrestricted version of the same model, with Fable 5’s safeguards lifted. Because of the risks involved, the article says Mythos 5 is available only to a highly vetted group of trusted partners.\u003c/p\u003e\n\n\u003cp\u003eExamples of trusted partners cited in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernment cyberdefenders\u003c/li\u003e\n\u003cli\u003eSpecific life sciences researchers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"availability-and-pricing\"\u003eAvailability and Pricing\u003c/h2\u003e\n\n\u003cp\u003eFable 5 is available for a limited time to all Pro, Max, and Enterprise customers. Anthropic says this access will last until June 22.\u003c/p\u003e\n\n\u003cp\u003eAfter that window expires, the article says Fable 5 will switch to usage-based pricing. Anthropic describes the model as expensive because it requires a large amount of compute, which limits the company’s ability to make it available as easily as Opus 4.8 or earlier models.\u003c/p\u003e\n\n\u003ch2 id=\"token-consumption-observed-by-bleepingcomputer\"\u003eToken Consumption Observed by BleepingComputer\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer reported that Fable 5 consumed a large number of tokens in a short period during testing. The article says Fable 5 used approximately 1 million tokens in 8 minutes.\u003c/p\u003e\n\n\u003cp\u003eThe author specifically noticed this behavior when using Workflow, a new execution system that allows Claude to break complex prompts into smaller tasks and spin up parallel subagents to implement them.\u003c/p\u003e\n\n\u003cp\u003eIn one test, Claude Fable 5 exhausted the author’s $100 Max subscription daily usage in about 9 minutes. The article states that the daily usage had been at zero when the author started using the model.\u003c/p\u003e\n\n\u003ch2 id=\"workflow-mode-and-high-thinking-settings\"\u003eWorkflow Mode and High Thinking Settings\u003c/h2\u003e\n\n\u003cp\u003eThe article says this rapid usage does not happen during casual interaction with Claude Fable 5. However, it warns that switching to Workflow mode and setting model thinking to high can consume all available tokens within minutes.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that even without using Fable 5 with Workflow in extra-high effort, the model still consumes usage about two times faster than the Opus model.\u003c/p\u003e\n\n\u003ch2 id=\"impact-for-users\"\u003eImpact for Users\u003c/h2\u003e\n\n\u003cp\u003eThe main user-facing impact described in the article is rapid token and usage consumption. Pro, Max, and Enterprise users can try Fable 5 during the limited free access period, but heavy use, especially through Workflow mode and high thinking settings, may quickly exhaust available usage.\u003c/p\u003e\n\n\u003cp\u003eThe article says this token consumption helps explain why Anthropic is hesitant to unlock Fable 5 in the same capacity as Opus and other models. It also notes that this could change in the coming weeks, stating that Anthropic is known for reducing model capacity and increasing it later.\u003c/p\u003e\n","keyPoints":["Anthropic has begun rolling out Claude Fable 5, a safer version of a Mythos-class model with guardrails designed to block or divert sensitive queries involving areas such as offensive cybersecurity, biology, or chemistry.","Claude Mythos 5 is the unrestricted version of the same model and is available only to a highly vetted group of trusted partners, including government cyberdefenders and specific life sciences researchers.","Fable 5 is being offered to all Pro, Max, and Enterprise customers until June 22, after which Anthropic says it will switch to usage-based pricing.","BleepingComputer observed that Claude Fable 5 used about 1 million tokens in 8 minutes and exhausted a $100 Max subscription's daily usage in about 9 minutes when used with Workflow mode and high model thinking.","The article states that even without Workflow in extra-high effort, Fable 5 consumes usage about two times faster than the Opus model."],"insights":["Users testing Fable 5 should avoid Workflow mode with high model thinking unless necessary, because the article reports this combination can burn through a Max subscription’s daily usage within minutes.","Anthropic’s approach separates capability from access: the guarded Fable 5 is broadly available for a limited time, while the unrestricted Mythos 5 remains limited to vetted partners such as government cyberdefenders and selected life sciences researchers.","Sensitive prompts may not be handled by Fable 5 at all, because Anthropic says queries involving offensive cybersecurity, biology, or chemistry can be blocked or diverted to Opus 4.8.","The limited free access period appears tied to compute cost rather than only safety concerns, as the article says Fable 5 is expensive to run and consumes usage faster than Opus."],"referencedReports":[],"body":"\u003cp\u003eAnthropic has begun rolling out Claude Fable 5, a new model based on the same underlying model class as Mythos, which the company previously described as powerful enough to pose security risks. The article says Mythos-class capabilities could potentially help bad actors attack public and private software, which led Anthropic to limit access to such models. Fable 5 is presented as a safer version with guardrails intended to block or divert sensitive requests.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says sensitive queries involving offensive cybersecurity, biology, or chemistry will be blocked or diverted to Claude Opus 4.8. The unrestricted version, Claude Mythos 5, has those safeguards lifted and is available only to a highly vetted group of trusted partners, including government cyberdefenders and specific life sciences researchers. Fable 5 is available to Pro, Max, and Enterprise customers until June 22, after which it will move to usage-based pricing.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that Fable 5 can consume a very large number of tokens, especially when used with Workflow mode and high model thinking. In its testing, Fable 5 used about 1 million tokens in 8 minutes and exhausted a $100 Max subscription’s daily usage in about 9 minutes. The article says that even outside Workflow in extra-high effort, Fable 5 consumes usage about two times faster than the Opus model.\u003c/p\u003e\n"},{"n":4,"title":"Prompt Engineering for Security Agents: A Measurable Approach with GEPA","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/09/prompt-engineering-security-agents-gepa/","time":"02:23","priority":"MAY READ","score":58,"tldr":"SpecterOps demonstrates how GEPA can make prompt engineering for security agents measurable by iteratively testing, scoring, and refining an LLM-based web CTF agent’s prompt. The key takeaway is that structured evaluation, actionable run feedback, and Pareto-based candidate selection can improve agent performance, but results depend heavily on dataset quality and reward design.","briefOverview":"\u003cp\u003eSpecterOps describes a proof-of-concept for using GEPA, or Genetic-Pareto optimization, to make prompt engineering for security agents more measurable. The article focuses on improving an \u003ccode\u003eAGENTS.md\u003c/code\u003e prompt for a web CTF agent rather than relying on subjective judgment about whether prompt edits improve performance. The work is presented as part of SpecterOps’ GhostWorks initiative for AI security.\u003c/p\u003e\n\n\u003cp\u003eThe example agent is evaluated on Dockerized CSI CTF web challenges and given tools such as shell execution, file reading and writing, web requests, and a \u003ccode\u003esubmit_flag\u003c/code\u003e validator. The scoring function rewards only solved challenges and weights fewer agent turns more heavily than shorter duration. GEPA uses scores plus actionable side information from agent runs, such as reasoning, tool use, return values, and errors, to generate improved prompt candidates.\u003c/p\u003e\n\n\u003cp\u003eThe article explains how GEPA evaluates prompts in minibatches, validates improved candidates, and uses a Pareto frontier to keep strong prompts in play across different challenge types. In the proof-of-concept, the optimized prompt improved scores on two validation challenges and slightly reduced the score on one. The author notes that the small dataset caused signs of overfitting and emphasizes the importance of lab variety, dataset selection, and mature reward functions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents a technical walkthrough of applying GEPA to prompt engineering for security agents. SpecterOps frames the problem as the difficulty of measuring whether changes to an agent prompt actually improve behavior. The author uses a web CTF agent as a concrete example and aims to improve its performance by refining only the prompt.\u003c/p\u003e\n\n\u003cp\u003eGEPA is described as an optimization framework originally published in a paper and positioned as an alternative to reinforcement learning approaches such as GRPO. The article highlights that GEPA can work with closed-source and remote-hosted LLMs because it optimizes prompts rather than training model weights. It also notes that GEPA requires relatively little compute but can consume many tokens during optimization.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept uses a simple ReAct-style CTF agent with tools for shell execution, file access, web requests, and flag submission. The challenge set comes from CSI CTF challenges hosted in Docker containers. The initial prompt is a basic instruction set telling the agent to solve a web CTF challenge, submit the flag, explain actions, and stop after completion.\u003c/p\u003e\n\n\u003cp\u003eThe evaluation design measures whether the challenge was solved, how many agent turns were used, and how long the attempt took. The reward function returns zero for unsolved challenges and otherwise combines a duration score with a turn score, weighted 25% for duration and 75% for turns. The author stresses that reward design matters because GEPA uses the score to steer prompt optimization.\u003c/p\u003e\n\n\u003cp\u003eA major part of the process is actionable side information, which includes textual traces from each run such as reasoning, tool usage, parameters, return values, and errors. GEPA uses this information to identify successful behaviors and failure patterns, such as quickly identifying SQL injection but spending many turns on syntax or misidentifying the database. Candidate prompts are tested on minibatches, retained only when they improve scores, and then evaluated against validation challenges.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that GEPA uses Pareto frontier selection to preserve prompts that perform strongly on different challenge types rather than choosing only one overall winner. In the demonstrated run using GPT-5.5-Cyber for both evaluation and optimization, GEPA selected prompt 11 after 250 metric calls. The optimized prompt improved two challenge scores while slightly decreasing one, and the author notes that specific challenge-tailored content in the final prompt shows overfitting due to the small training and validation set.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps presents a technical walkthrough of using GEPA, or Genetic-Pareto optimization, to make LLM prompt engineering for security agents measurable. The article is tied to the company’s GhostWorks initiative for AI security and focuses on a practical proof-of-concept rather than a product release. The central problem is that prompt changes for agents are often judged by subjective impressions rather than by repeatable measurements.\u003c/p\u003e\n\n\u003cp\u003eThe author applies GEPA to a simple web CTF agent and attempts to improve the agent’s performance by optimizing its \u003ccode\u003eAGENTS.md\u003c/code\u003e prompt. The goal is to find and submit flags in CTF web challenges using the agent’s available tools. The article emphasizes that the optimization is performed through prompt refinement, not model training.\u003c/p\u003e\n\n\u003ch2 id=\"what-gepa-is-used-for\"\u003eWhat GEPA Is Used For\u003c/h2\u003e\n\n\u003cp\u003eGEPA is described as an optimization framework positioned by its authors as an alternative to reinforcement learning techniques such as GRPO. The article says GEPA was primarily created for prompt refinement, although it can be applied to other optimization tasks. The framework takes an existing prompt and uses an LLM to produce refined versions that are evaluated against measurable goals.\u003c/p\u003e\n\n\u003cp\u003eThe author highlights three practical advantages of GEPA:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt can improve LLM efficiency on closed-source and remote-hosted models because it only modifies prompts.\u003c/li\u003e\n\u003cli\u003eIt requires relatively little compute because it relies on inference and evaluation rather than training.\u003c/li\u003e\n\u003cli\u003eGEPA already has a Python framework, GEPA-ai, which makes implementation straightforward.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also warns that GEPA runs can consume many tokens during optimization, even though the framework includes controls to reduce token usage.\u003c/p\u003e\n\n\u003ch2 id=\"ctf-agent-scenario\"\u003eCTF Agent Scenario\u003c/h2\u003e\n\n\u003cp\u003eThe proof-of-concept centers on a web CTF agent specialized in solving web challenges. The article assumes a simple ReAct-style agent with several common tools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eShell execution.\u003c/li\u003e\n\u003cli\u003eReading and writing files.\u003c/li\u003e\n\u003cli\u003eMaking web requests.\u003c/li\u003e\n\u003cli\u003eA \u003ccode\u003esubmit_flag\u003c/code\u003e tool that validates whether a submitted flag is correct.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe starting \u003ccode\u003eAGENTS.md\u003c/code\u003e prompt is intentionally basic. It tells the agent that it is an expert CTF player specializing in web CTF challenges, must find and submit the flag, should explain its reasoning before and after commands, cannot ask for help, and should provide a final writeup after solving the challenge. The flag format is described as usually being \u003ccode\u003ecsictf{…}\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe challenges used in the proof-of-concept come from the CSI CTF challenge repository. Each challenge is hosted in a Docker container, which makes the lab environment easy to deploy.\u003c/p\u003e\n\n\u003ch2 id=\"defining-what-good-means\"\u003eDefining What “Good” Means\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that GEPA requires explicit measurement criteria and a clear optimization goal. For the CTF agent, the goal is: find the flag in the CTF challenge and submit it using the \u003ccode\u003esubmit_flag\u003c/code\u003e tool.\u003c/p\u003e\n\n\u003cp\u003eThe author evaluates each run using three questions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the challenge was solved.\u003c/li\u003e\n\u003cli\u003eHow many agent turns were needed.\u003c/li\u003e\n\u003cli\u003eHow long the agent took.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe reward function returns \u003ccode\u003e0.0\u003c/code\u003e if the challenge is not solved. If the challenge is solved, it calculates a duration score and a turns score, then combines them with 25% weight on duration and 75% weight on turns. This makes turn efficiency more important than elapsed time in the proof-of-concept.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples showing that a failed run scores zero regardless of time or turns, while solved runs receive higher scores when they use fewer turns and less time. The author cautions that reward functions should be designed carefully because GEPA uses the score heavily to steer prompt optimization.\u003c/p\u003e\n\n\u003ch2 id=\"actionable-side-information\"\u003eActionable Side Information\u003c/h2\u003e\n\n\u003cp\u003eA core part of the GEPA process is actionable side information, abbreviated as ASI in the article. The paper calls this natural language reflection, while the GEPA-ai \u003ccode\u003eoptimize_anything\u003c/code\u003e framework calls it actionable side information.\u003c/p\u003e\n\n\u003cp\u003eIn the CTF example, ASI includes useful textual information from each lab run, such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAgent reasoning output.\u003c/li\u003e\n\u003cli\u003eTools used by the agent.\u003c/li\u003e\n\u003cli\u003eTool parameters.\u003c/li\u003e\n\u003cli\u003eTool return values.\u003c/li\u003e\n\u003cli\u003eErrors encountered during tool usage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that ASI lets the optimizer go beyond a numerical score. It can identify what worked, what failed, and what should be adjusted in future prompt candidates.\u003c/p\u003e\n\n\u003cp\u003eFor example, a run might show that the agent quickly identified SQL injection and extracted the flag, but took too many turns to get SQL syntax correct and misidentified MySQL as Postgres. Feeding these traces into the optimizer can encourage useful behavior while adding prompt guidance for verifying SQL syntax and database type.\u003c/p\u003e\n\n\u003ch2 id=\"batch-evaluation-and-candidate-filtering\"\u003eBatch Evaluation and Candidate Filtering\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that GEPA uses minibatches to manage evaluation cost. In the example, a pool of 10 CTF challenges is split into 7 training challenges and 3 validation challenges. If the minibatch size is set to 3, GEPA selects 3 of the 7 training challenges for a round of execution.\u003c/p\u003e\n\n\u003cp\u003eEach selected challenge is run, ideally in parallel. After the runs finish, the score and ASI for each run are combined and passed to the optimizer LLM. The optimizer receives the optimization goal, the current prompt, and the evaluation results, then produces a complete replacement prompt.\u003c/p\u003e\n\n\u003cp\u003eThe new candidate prompt is then evaluated on the same set of minibatch challenges. If its scores decrease or stay the same, the candidate is discarded. If it improves the minibatch score, it is also evaluated against the validation set.\u003c/p\u003e\n\n\u003cp\u003eThe article says this filtering helps avoid wasting tokens on prompts that do not show measurable improvement.\u003c/p\u003e\n\n\u003ch2 id=\"pareto-frontier-selection\"\u003ePareto Frontier Selection\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the Pareto frontier as a way to keep strong candidates for multi-objective problems. It first illustrates the idea with hypothetical C2 implants graded on stealth and stability, then applies the concept to CTF prompt performance across different vulnerability types.\u003c/p\u003e\n\n\u003cp\u003eIn the CTF setting, different prompts may perform better on different challenge categories, such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSQL injection.\u003c/li\u003e\n\u003cli\u003eDeserialization.\u003c/li\u003e\n\u003cli\u003eRemote file include.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eRather than choosing only one prompt as universally best, GEPA keeps candidates that are strongest across different parts of the score matrix. Prompts are selected stochastically, weighted by the number of challenge scores where a prompt performs best. This means prompts that perform well across more challenges are more likely to be selected, while specialist prompts that excel on fewer challenges can still remain in the process.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two optimization mechanisms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReflective Mutation, which uses a selected parent prompt and ASI.\u003c/li\u003e\n\u003cli\u003eSystem-Aware Merge, which combines two Pareto candidates that excel on different challenges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe walkthrough focuses on Reflective Mutation because it is enabled by default in the \u003ccode\u003eoptimize_anything\u003c/code\u003e framework.\u003c/p\u003e\n\n\u003ch2 id=\"implementation-details\"\u003eImplementation Details\u003c/h2\u003e\n\n\u003cp\u003eThe article includes Python code for a \u003ccode\u003eGEPATrainer\u003c/code\u003e class using the GEPA-ai \u003ccode\u003eoptimize_anything\u003c/code\u003e API. The code defines a list of 10 CTF challenge targets with difficulty labels, splits them into training and validation sets, configures GEPA, and evaluates candidate prompts.\u003c/p\u003e\n\n\u003cp\u003eImportant configuration details include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003emax_metric_calls\u003c/code\u003e, set in the class constructor and demonstrated with 250 metric calls.\u003c/li\u003e\n\u003cli\u003eParallel evaluation with configurable workers.\u003c/li\u003e\n\u003cli\u003eEvaluation caching.\u003c/li\u003e\n\u003cli\u003eA reflection minibatch size of 3.\u003c/li\u003e\n\u003cli\u003eAn \u003ccode\u003eEpochShuffledBatchSampler\u003c/code\u003e using a random seed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe \u003ccode\u003e_evaluate\u003c/code\u003e method runs a CTF challenge with the candidate prompt, collects runtime statistics and context, calculates the score, and returns both the score and ASI. The returned ASI includes whether the challenge was solved, run statistics, and context.\u003c/p\u003e\n\n\u003cp\u003eThe article states that GPT-5.5-Cyber is used for both evaluation and optimization to avoid guardrails impeding progress.\u003c/p\u003e\n\n\u003ch2 id=\"results\"\u003eResults\u003c/h2\u003e\n\n\u003cp\u003eAfter 250 metric calls, the GEPA run produced a matrix of prompt candidates and scores across three validation challenges. The article says the latest GEPA-ai release includes a tree view that helps visualize the optimization process.\u003c/p\u003e\n\n\u003cp\u003eGEPA selected prompt 11 as the strongest candidate. The resulting optimized prompt is much more detailed than the initial prompt and includes specific instructions for web CTF methodology, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInitial reconnaissance with \u003ccode\u003ecurl\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInspecting headers, redirects, cookies, comments, forms, hidden inputs, scripts, and assets.\u003c/li\u003e\n\u003cli\u003eSearching fetched responses for flag-like strings.\u003c/li\u003e\n\u003cli\u003eHandling cookies, headers, tokens, and JWTs.\u003c/li\u003e\n\u003cli\u003eTesting file and path behavior for local file inclusion and path traversal.\u003c/li\u003e\n\u003cli\u003eHandling encodings such as URL encoding, base64, hex, ROT13, HTML entities, JSON escapes, XOR, Caesar shifts, and reversed strings.\u003c/li\u003e\n\u003cli\u003eFetching explicitly referenced external resources such as GitHub files when the challenge points to them.\u003c/li\u003e\n\u003cli\u003ePerforming focused route discovery.\u003c/li\u003e\n\u003cli\u003eUsing compact Bash and Python snippets for low-volume checks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe prompt also includes challenge-specific heuristics learned from prior failures, including instructions for file-library-style challenges and CCC/JWT/GitHub-style challenges.\u003c/p\u003e\n\n\u003ch2 id=\"measured-impact\"\u003eMeasured Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the baseline first run with the refined prompt selected by GEPA. The baseline scores were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChallenge 1: 0.9172955506046614.\u003c/li\u003e\n\u003cli\u003eChallenge 2: 0.8092837869127592.\u003c/li\u003e\n\u003cli\u003eChallenge 3: 0.8670885186394055.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe optimized prompt’s scores were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChallenge 1: 0.9121042403578759.\u003c/li\u003e\n\u003cli\u003eChallenge 2: 0.8430549861987432.\u003c/li\u003e\n\u003cli\u003eChallenge 3: 0.9175024194518726.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author notes that Challenge 1 decreased by about 0.005, or 0.5%, while Challenge 2 improved by about 0.04, or 4%, and Challenge 3 improved by about 0.05, or 5%.\u003c/p\u003e\n\n\u003ch2 id=\"limitations-and-lessons\"\u003eLimitations and Lessons\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the proof-of-concept used a very small training and validation set. The optimized prompt includes highly specific instructions tied to particular lab challenges, which the author identifies as overfitting. One example is guidance related to \u003ccode\u003e/getFile?file=a.cpp\u003c/code\u003e returning code that runs \u003ccode\u003ecat flag.txt\u003c/code\u003e, which is clearly tied to a specific challenge pattern.\u003c/p\u003e\n\n\u003cp\u003eThe author states that using more labs would give GEPA more opportunity to generalize and reduce this type of overfitting. The article also notes that the reward function used in the proof-of-concept is naive because it gives high scores for simply solving the challenge and heavily penalizes unsolved runs.\u003c/p\u003e\n\n\u003cp\u003eThe final lesson is that GEPA does not eliminate standard machine learning concerns. Dataset selection, lab variety, and mature reward functions remain key to achieving useful improvements.\u003c/p\u003e\n","keyPoints":["The article describes GEPA as an optimization framework that refines prompts using LLM inference rather than reinforcement learning, making it applicable to closed-source and remote-hosted models with relatively little compute.","The author demonstrates GEPA by optimizing an AGENTS.md prompt for a web CTF agent that uses tools such as shell execution, file access, web requests, and a submit_flag tool.","The evaluation function scores only solved challenges and weights turn efficiency more heavily than duration, using a formula with 75% weight on turns and 25% on time.","GEPA uses actionable side information from agent runs, including reasoning output, tool usage, return values, and errors, to help the optimizer identify success patterns and failure modes.","In the proof-of-concept run, the optimized prompt slightly reduced the score on one challenge but improved two others, while also showing signs of overfitting due to the small training and validation set."],"insights":["GEPA can discard candidate prompts before validation if they do not improve scores on the same minibatch, which helps avoid spending additional tokens on prompts that show no measurable gain.","The quality of actionable side information is critical because the optimizer can use both high-scoring and low-scoring traces to preserve useful behaviors while explicitly avoiding observed failure patterns.","Pareto-based selection keeps specialist prompts in the optimization process even when they are weaker overall, allowing lessons from prompts that perform well on specific challenge types to influence later candidates.","The proof-of-concept showed that prompt optimization can introduce challenge-specific overfitting, such as adding instructions tailored to a particular file-library challenge, when the training and validation set is too small.","Reward-function design directly steers GEPA’s improvements, so naive scoring that heavily rewards solved challenges and turn efficiency can shape the optimized prompt toward those measured behaviors rather than broader generalization."],"referencedReports":[{"title":"GEPA (Genetic-Pareto) paper","url":"https://arxiv.org/abs/2507.19457","publisher":"arXiv","context":"The article cites this paper as the original publication of the GEPA framework used for prompt refinement.","category":"","primary":false},{"title":"3D Unicorn Optimization Tutorial","url":"https://gepa-ai.github.io/gepa/tutorials/3d_unicorn_optimization/","publisher":"GEPA-ai","context":"The article references this tutorial as an example showing that GEPA can be applied beyond prompt refinement to other optimization tasks.","category":"","primary":false},{"title":"optimize_anything API Guide","url":"https://gepa-ai.github.io/gepa/guides/#3-optimize_anything-api","publisher":"GEPA-ai","context":"The article links to this guide when explaining that its proof-of-concept uses the optimize_anything Python framework to implement GEPA optimization.","category":"","primary":false}],"body":"\u003cp\u003eSpecterOps describes a proof-of-concept for using GEPA, or Genetic-Pareto optimization, to make prompt engineering for security agents more measurable. The article focuses on improving an \u003ccode\u003eAGENTS.md\u003c/code\u003e prompt for a web CTF agent rather than relying on subjective judgment about whether prompt edits improve performance. The work is presented as part of SpecterOps’ GhostWorks initiative for AI security.\u003c/p\u003e\n\n\u003cp\u003eThe example agent is evaluated on Dockerized CSI CTF web challenges and given tools such as shell execution, file reading and writing, web requests, and a \u003ccode\u003esubmit_flag\u003c/code\u003e validator. The scoring function rewards only solved challenges and weights fewer agent turns more heavily than shorter duration. GEPA uses scores plus actionable side information from agent runs, such as reasoning, tool use, return values, and errors, to generate improved prompt candidates.\u003c/p\u003e\n\n\u003cp\u003eThe article explains how GEPA evaluates prompts in minibatches, validates improved candidates, and uses a Pareto frontier to keep strong prompts in play across different challenge types. In the proof-of-concept, the optimized prompt improved scores on two validation challenges and slightly reduced the score on one. The author notes that the small dataset caused signs of overfitting and emphasizes the importance of lab variety, dataset selection, and mature reward functions.\u003c/p\u003e\n"},{"n":3,"title":"Introducing GhostWorks: A Practical AI Initiative from SpecterOps","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/09/introducing-ghostworks-ai-cybersecurity-research/","time":"02:07","priority":"MAY READ","score":45,"tldr":"SpecterOps launched GhostWorks, an AI-focused engineering and research initiative to evaluate frontier AI tools against real identity-security problems and turn proven experiments into practical products, research, open source, internal tooling, or documented failures.","briefOverview":"\u003cp\u003eSpecterOps introduced GhostWorks, an AI-focused engineering and research initiative for disciplined exploration of frontier AI-enabled cybersecurity tooling. The initiative is focused on testing emerging AI capabilities against real identity-security problems, documenting limitations, and handing off work that is ready to operate outside the lab. SpecterOps emphasizes that GhostWorks is not a company-wide AI mandate, a replacement for product teams, or a claim that every workflow needs an agent.\u003c/p\u003e\n\n\u003cp\u003eThe article frames GhostWorks as a pragmatic middle ground between broad optimism and broad pessimism about LLM tools in cybersecurity. SpecterOps says the goal is to find where the technology fits best, measure outcomes, and make informed decisions. The initiative builds on prior work with OpenAI, participation in OpenAI’s Trusted Access for Cyber program, and SpecterOps’ role in helping build The Last Ones cyber range used by the UK AI Security Institute.\u003c/p\u003e\n\n\u003cp\u003eGhostWorks will prototype AI-enabled capabilities and determine whether they should become product features, research initiatives, open source or internal tooling, demos, evaluation frameworks, or documented failures. SpecterOps plans to publish research and testing results through blog posts and the Know Your Adversary podcast. The first linked blog in the series is about prompt engineering for security agents using GEPA.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSpecterOps announced GhostWorks as an AI-focused engineering and research initiative dedicated to exploring frontier AI-enabled cybersecurity tooling in a disciplined way. The initiative will test emerging capabilities against real identity-security problems, document where they fail, and hand off work that is mature enough to survive outside the lab. The company explicitly states that GhostWorks is not a company-wide AI mandate, a replacement for product teams, or a promise that every workflow needs an AI agent.\u003c/p\u003e\n\n\u003cp\u003eThe article places GhostWorks within a broader discussion about LLM tools entering cybersecurity operations and everyday technology use. It mentions examples such as Mythos and Project Glasswing while stressing that LLMs are not only relevant to adversary tradecraft. SpecterOps argues that public discussion of LLMs often falls into extremes of optimism or pessimism, while practical value is found through measured evaluation and strategic application.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps describes GhostWorks as an extension of its tradecraft-focused approach to new adversary methods, technologies, and methodologies. The article says that understanding adversary tradecraft is the first step toward defending against it, and it applies that logic to LLM tooling including Codex, GPT Cyber, Mythos, and Project Glasswing. The stated approach is to identify where AI technology fits best, measure everything, and make informed decisions.\u003c/p\u003e\n\n\u003cp\u003eGhostWorks builds on AI-related work SpecterOps says was already underway before the initiative had a name. The article cites SpecterOps’ partnership with OpenAI on continuous adversarial red teaming and advanced skills training, its participation in OpenAI’s Trusted Access for Cyber program, and its work helping build The Last Ones, an enterprise cyber range used by the UK AI Security Institute. That range is described as measuring frontier models against an intrusion path.\u003c/p\u003e\n\n\u003cp\u003eThe initiative will prototype AI-enabled capabilities and decide which efforts should become product features, research initiatives, open source tools, internal tools, demos, evaluation frameworks, or documented failures. SpecterOps connects this engineering-oriented model to prior tools and products including Mythic, Ghostwriter, Nemesis, BloodHound, and BloodHound Enterprise. The company says it will publish GhostWorks research and testing results through future blogs and the Know Your Adversary podcast.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps introduced GhostWorks as an AI-focused engineering and research initiative centered on frontier AI-enabled cybersecurity tooling. The initiative is intended to explore emerging AI capabilities with pragmatism and discipline, especially in the context of identity-security problems. SpecterOps states that GhostWorks will test capabilities against real problems, document limitations, and hand off work that is ready to operate outside the lab.\u003c/p\u003e\n\n\u003cp\u003eThe company explicitly limits the scope of the initiative. GhostWorks is not presented as a company-wide AI mandate, a replacement for product teams, or a claim that every workflow should use an AI agent. Instead, it is described as an intentional home for AI experiments, evaluations, and prototype tooling.\u003c/p\u003e\n\n\u003ch2 id=\"context-for-the-initiative\"\u003eContext for the initiative\u003c/h2\u003e\n\n\u003cp\u003eThe article frames GhostWorks against the broader rise of LLM tools in cybersecurity and everyday technology. SpecterOps notes that LLM tools have entered cybersecurity operations through efforts such as Mythos and Project Glasswing, but it also says LLMs are appearing across many areas of daily life. The article references major technology companies such as Google, Apple, and Microsoft as pushing people toward speech and camera-based interactions for everyday tasks.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps argues that the public conversation around LLMs often falls into two extremes. One side claims large productivity gains and warns that leaders who do not engage with LLM tools are falling behind. The other side argues that claimed improvements are difficult to measure or false. SpecterOps positions GhostWorks as an attempt to operate in the middle ground by evaluating AI tools pragmatically.\u003c/p\u003e\n\n\u003ch2 id=\"tradecraft-framing\"\u003eTradecraft framing\u003c/h2\u003e\n\n\u003cp\u003eThe article links GhostWorks to SpecterOps’ broader approach to adversary tradecraft. SpecterOps says understanding tradecraft is a first step toward defending against it, and it applies that principle to LLM tooling. The article names Codex, GPT Cyber, Mythos, and Project Glasswing as examples of LLM tooling relevant to this discussion.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps describes the desired outcome in practical terms: identify where the technology fits best, measure everything, and make informed decisions. The article says this is the core rationale for creating GhostWorks. It also states that if attackers can create exploits in hours, SpecterOps sees it as its job to understand how they are doing it and build tools to defend against it.\u003c/p\u003e\n\n\u003ch2 id=\"prior-work-behind-ghostworks\"\u003ePrior work behind GhostWorks\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps says GhostWorks is not the beginning of its AI work. Before the initiative had a name, the company says it was already partnering with OpenAI on continuous adversarial red teaming and advanced skills training. SpecterOps also says it is an active participant in OpenAI’s Trusted Access for Cyber program.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights SpecterOps’ role in helping build The Last Ones. The Last Ones is described as a realistic enterprise cyber range used by the UK AI Security Institute to measure frontier models against an intrusion path. In the further reading section, the article describes this as a 32-step simulated corporate network attack range built with SpecterOps and used to evaluate model performance on end-to-end cyber tasks.\u003c/p\u003e\n\n\u003ch2 id=\"what-ghostworks-will-produce\"\u003eWhat GhostWorks will produce\u003c/h2\u003e\n\n\u003cp\u003eGhostWorks is described as a mechanism for prototyping AI-enabled capabilities and deciding what should happen to them. Potential outcomes include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProduct features.\u003c/li\u003e\n\u003cli\u003eResearch initiatives.\u003c/li\u003e\n\u003cli\u003eOpen source tooling.\u003c/li\u003e\n\u003cli\u003eInternal tooling.\u003c/li\u003e\n\u003cli\u003eDocumented failures.\u003c/li\u003e\n\u003cli\u003eDemos.\u003c/li\u003e\n\u003cli\u003eEvaluation frameworks.\u003c/li\u003e\n\u003cli\u003eLessons about where the technology fails.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that the point is not to chase novelty. Instead, SpecterOps says GhostWorks is meant to turn uncertainty into evidence and measurable results.\u003c/p\u003e\n\n\u003ch2 id=\"engineering-approach\"\u003eEngineering approach\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps describes GhostWorks as an engineering-focused initiative that combines expert engineering with deep security domain expertise. The article compares the approach to earlier SpecterOps software efforts including Mythic, Ghostwriter, Nemesis, BloodHound, and BloodHound Enterprise. SpecterOps says those efforts exist at the intersection of engineering and security expertise.\u003c/p\u003e\n\n\u003cp\u003eThe article also frames the initiative as a builder-oriented effort. SpecterOps says it wants to approach AI tooling not only as security practitioners, but also as engineers and builders who take systems apart, understand how they work, and reconfigure them for practical purposes.\u003c/p\u003e\n\n\u003ch2 id=\"planned-publications-and-discussion\"\u003ePlanned publications and discussion\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps says it will publish the results of GhostWorks research and testing over the coming weeks and months. These outputs will include a series of blogs and discussions on the Know Your Adversary podcast. The stated goal is to support practical conversation for defenders and red teamers about what AI technology means, what it does not mean, and how it applies in real-world environments.\u003c/p\u003e\n\n\u003cp\u003eThe article links to the first blog in the series, titled “Prompt Engineering for Security Agents: A Measurable Approach with GEPA.” It also includes further reading from OpenAI, SpecterOps, and the UK AI Security Institute related to adversarial red teaming, Trusted Access for Cyber, and evaluations of OpenAI cyber capabilities.\u003c/p\u003e\n","keyPoints":["SpecterOps introduced GhostWorks as an AI-focused engineering and research initiative for disciplined exploration of frontier AI-enabled cybersecurity tooling.","GhostWorks is not a company-wide AI mandate, a replacement for product teams, or a claim that every workflow needs an AI agent.","The initiative will test emerging AI capabilities against real identity-security problems, document limitations, and hand off work that is ready to survive outside the lab.","SpecterOps said GhostWorks builds on prior AI-related work including partnering with OpenAI on adversarial red teaming and participating in OpenAI’s Trusted Access for Cyber program.","SpecterOps plans to publish GhostWorks research and testing results through blog posts and discussions on the Know Your Adversary podcast."],"insights":["SpecterOps frames GhostWorks as a filtering mechanism for AI work, where experiments may become product features, research initiatives, open source or internal tools, evaluation frameworks, demos, or documented failures.","The initiative explicitly treats failed AI experiments as valuable outputs when they clarify where frontier AI tooling does not work in real identity-security environments.","SpecterOps positions understanding AI-enabled adversary tradecraft as a prerequisite for defense, comparing it to its historical approach to emerging attacker methodologies.","GhostWorks is intended to move AI experimentation from isolated prototypes into disciplined engineering outcomes measured against practical security problems."],"referencedReports":[{"title":"Security on the Path to AGI","url":"https://openai.com/index/security-on-the-path-to-agi/","publisher":"OpenAI","context":"The article cites OpenAI’s March 2025 security update as naming SpecterOps as a partner for continuous adversarial red teaming and advanced skills training.","category":"","primary":false},{"title":"Our evaluation of OpenAI’s GPT-5.5 cyber capabilities","url":"https://www.aisi.gov.uk/blog/our-evaluation-of-openais-gpt-5-5-cyber-capabilities","publisher":"UK AI Security Institute","context":"The article cites UK AISI’s April 2026 evaluation describing The Last Ones, a simulated corporate network attack range built with SpecterOps to evaluate model performance on end-to-end cyber tasks.","category":"","primary":false}],"body":"\u003cp\u003eSpecterOps introduced GhostWorks, an AI-focused engineering and research initiative for disciplined exploration of frontier AI-enabled cybersecurity tooling. The initiative is focused on testing emerging AI capabilities against real identity-security problems, documenting limitations, and handing off work that is ready to operate outside the lab. SpecterOps emphasizes that GhostWorks is not a company-wide AI mandate, a replacement for product teams, or a claim that every workflow needs an agent.\u003c/p\u003e\n\n\u003cp\u003eThe article frames GhostWorks as a pragmatic middle ground between broad optimism and broad pessimism about LLM tools in cybersecurity. SpecterOps says the goal is to find where the technology fits best, measure outcomes, and make informed decisions. The initiative builds on prior work with OpenAI, participation in OpenAI’s Trusted Access for Cyber program, and SpecterOps’ role in helping build The Last Ones cyber range used by the UK AI Security Institute.\u003c/p\u003e\n\n\u003cp\u003eGhostWorks will prototype AI-enabled capabilities and determine whether they should become product features, research initiatives, open source or internal tooling, demos, evaluation frameworks, or documented failures. SpecterOps plans to publish research and testing results through blog posts and the Know Your Adversary podcast. The first linked blog in the series is about prompt engineering for security agents using GEPA.\u003c/p\u003e\n"}]</script>
