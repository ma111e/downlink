<script type="application/json" id="dl-articles">[{"n":3,"title":"From San Pedro to Salinas: How a Chinese Framework “DCloud Uni-App” Powers a Global Scam Economy","source":"infoblox.com","sourceColorIdx":2,"link":"https://www.infoblox.com/blog/threat-intelligence/from-san-pedro-to-salinas-how-a-chinese-framework-dcloud-uni-app-powers-a-global-scam-economy/","time":"12:58","priority":"SHOULD READ","score":88,"tldr":"Infoblox researchers found that the legitimate Chinese DCloud Uni-App framework underpins a massive global scam ecosystem, identifying more than 236,000 scam domains used for fake crypto exchanges, pig-butchering, phishing, gambling scams, and wallet drainers. The research suggests many sites are decentralized templates, but shared infrastructure and fingerprints point to centralized operators behind large portions of the activity.","briefOverview":"\u003cp\u003eInfoblox Threat Intel investigated scam websites built with the DCloud Uni-App framework, a legitimate Chinese open-source toolkit for building cross-platform mobile applications. The research connects the framework to at least 236,493 distinct second-level domains identified as scam infrastructure since 2022. These sites include fake crypto exchanges, pig-butchering operations, WhatsApp phishing networks, fake gambling platforms, brand impersonation sites, and crypto wallet drainers.\u003c/p\u003e\n\n\u003cp\u003eThe article says RainbowEx, the fake cryptocurrency platform that affected San Pedro, Argentina, was not a unique fraud but part of a broader template-based ecosystem using DCloud. Similar investment scam patterns appeared in the Lightning Shared Scooter Co. scheme in the United States and the currently active Yuechi Sharing Technology Ltd. operation targeting Australia, New Zealand, and the United States. Victims are ordinary people recruited through social channels, shown fake profits, and then blocked from withdrawing funds.\u003c/p\u003e\n\n\u003cp\u003eInfoblox found that some operators left DCloud’s default fingerprints intact while others removed them, and the more evasive sites used bulletproof hosting at roughly double the rate of the default sites. Most scam domains were hosted on legitimate providers such as Cloudflare, Alibaba Cloud, Tencent Cloud, and AWS, but CTG Server dominated the bulletproof-hosted subset. The article also reports more than five million enterprise DNS queries to visible DCloud-built investment scam infrastructure, suggesting consumer scams can create exposure inside workplaces when employees reach these sites from work networks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Infoblox Threat Intel identified at least 236,493 distinct second-level domains using DCloud Uni-App as scam infrastructure, including fake crypto exchanges, pig-butchering operations, WhatsApp phishing, fake gambling platforms, brand impersonation sites, and crypto wallet drainers.","The RainbowEx scam that affected San Pedro, Argentina was built using DCloud Uni-App and was part of a larger template-based ecosystem rather than a bespoke fraud operation.","Infoblox found that some DCloud investment scam sites attempted to remove DCloud fingerprints, and these evasive sites were hosted on bulletproof hosting providers at roughly double the rate of vanilla sites.","The Lightning Shared Scooter Co. scam in the United States used DCloud-based websites and apps and caused reported losses including more than $370,700 among more than five dozen victims in Salinas, California alone.","Yuechi Sharing Technology Ltd. is described as a currently live DCloud-built investment scam that displays genuine Hong Kong incorporation paperwork and a real FinCEN money-services business registration as legitimacy props."],"insights":["Government paperwork can be used as part of the deception: Yuechi displayed a real Hong Kong incorporation record and a real FinCEN MSB registration even though the article states these registrations do not validate the operation.","The harder-to-detect DCloud scam sites are also more likely to use bulletproof hosting, with evasive sites showing roughly double the bulletproof-hosting share of sites that leave default framework fingerprints intact.","Enterprise exposure appears to come mostly from ordinary employees encountering consumer scams, because no single DCloud-built investment scam domain received more than about 20,000 enterprise queries from any one customer and activity was spread across many low-volume contacts.","The article says coordinated drops in active DCloud scam domains during 2025 and 2026 did not match detection changes, suggesting that tracking shared templates and infrastructure can reveal disruptions affecting large parts of the scam ecosystem.","CTG Server stood out within the bulletproof-hosted portion of the dataset, hosting 19 of the top 20 bulletproof-hosted DCloud scam domains ranked by Infoblox customer visibility."],"referencedReports":[{"title":"Alert on Fraud Schemes Abusing FinCEN’s Name, Insignia, and Authorities for Financial Gain","url":"https://www.fincen.gov/sites/default/files/2024-12/Alert-FinCEN-Scams-FINAL508.pdf","publisher":"FinCEN","context":"The article cites FinCEN’s December 2024 alert as evidence that the agency is aware fraud schemes abuse its name, insignia, and authorities for financial gain.","category":"","primary":false},{"title":"How I Got Approached by Yuechi Sharing Technology Ltd (YST) and Uncovered a Likely Ponzi Operation","url":"https://www.dehek.com/general/how-i-got-approached-by-yuechi-sharing-technology-ltd-ys-and-uncovered-a-likely-ponzi-operation/","publisher":"Danny De Hek","context":"The article references independent investigator Danny De Hek’s report documenting how he was approached by Yuechi Sharing Technology Ltd. recruiters and details of the scam lure and process.","category":"","primary":false}],"body":"\u003cp\u003eInfoblox Threat Intel investigated scam websites built with the DCloud Uni-App framework, a legitimate Chinese open-source toolkit for building cross-platform mobile applications. The research connects the framework to at least 236,493 distinct second-level domains identified as scam infrastructure since 2022. These sites include fake crypto exchanges, pig-butchering operations, WhatsApp phishing networks, fake gambling platforms, brand impersonation sites, and crypto wallet drainers.\u003c/p\u003e\n\n\u003cp\u003eThe article says RainbowEx, the fake cryptocurrency platform that affected San Pedro, Argentina, was not a unique fraud but part of a broader template-based ecosystem using DCloud. Similar investment scam patterns appeared in the Lightning Shared Scooter Co. scheme in the United States and the currently active Yuechi Sharing Technology Ltd. operation targeting Australia, New Zealand, and the United States. Victims are ordinary people recruited through social channels, shown fake profits, and then blocked from withdrawing funds.\u003c/p\u003e\n\n\u003cp\u003eInfoblox found that some operators left DCloud’s default fingerprints intact while others removed them, and the more evasive sites used bulletproof hosting at roughly double the rate of the default sites. Most scam domains were hosted on legitimate providers such as Cloudflare, Alibaba Cloud, Tencent Cloud, and AWS, but CTG Server dominated the bulletproof-hosted subset. The article also reports more than five million enterprise DNS queries to visible DCloud-built investment scam infrastructure, suggesting consumer scams can create exposure inside workplaces when employees reach these sites from work networks.\u003c/p\u003e\n"},{"n":4,"title":"Russia used Cellebrite phone-hacking tool to crack down on dissident after firm cut off country","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-used-cellebrite-tool-after-company-pulled-out-of-country","time":"12:15","priority":"SHOULD READ","score":82,"tldr":"Citizen Lab says Russian authorities used Cellebrite’s UFED phone-extraction tool to break into dissident Andrey Pivovarov’s iPhone in 2021, months after Cellebrite said it had cut off Russia over human rights concerns. The case suggests legacy Cellebrite systems may continue working offline after a customer is supposedly restricted, raising concerns about abuse by authoritarian governments.","briefOverview":"\u003cp\u003eRussian authorities used Cellebrite phone data extraction technology to access dissident Andrey Pivovarov’s iPhone after Cellebrite said in March 2021 that it would stop working with Russia over human rights concerns. Citizen Lab said it determined with high confidence that Pivovarov’s phone was broken into on or around June 17, 2021, while it was in Russian custody. Pivovarov was detained in May 2021, his devices were seized, and he was not asked for consent or provided passwords.\u003c/p\u003e\n\n\u003cp\u003eCitizen Lab said forensic analysis of MobileLockdown records from the phone showed USB connections to a device with a Host ID previously attributed to Cellebrite. Court records reviewed by Citizen Lab showed that documents pulled from Pivovarov’s phone were used to build a case against him on charges of carrying out the activities of an “undesirable” organization. The court documents also showed that Cellebrite’s UFED was used to search for specific political terms after the phone was cracked, while Russian authorities did not break into his MacBook.\u003c/p\u003e\n\n\u003cp\u003eCellebrite’s chief marketing officer said any use of legacy Cellebrite hardware in Russia after March 2021 was unauthorized and that Russia remains permanently on the company’s restricted-customer list. Citizen Lab said Cellebrite systems have historically included an offline mode and that much UFED functionality can continue after updates stop, making it difficult for the company to meaningfully cut off problematic customers. Citizen Lab and Access Now urged Cellebrite to stop selling to regimes that have abused its technology and to conduct human rights due diligence before and after sales.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Citizen Lab reported that Russian authorities used Cellebrite’s UFED phone data extraction technology on dissident Andrey Pivovarov’s iPhone about three months after Cellebrite said it would stop working with Russia over human rights concerns.","Citizen Lab said forensic analysis of MobileLockdown records showed USB connections to a device with a Host ID it had previously attributed to Cellebrite while Pivovarov’s phone was in Russian custody.","Court records reviewed by Citizen Lab showed that documents pulled from Pivovarov’s phone were used to build a case against him for carrying out activities of an “undesirable” organization.","Cellebrite’s chief marketing officer said any use of legacy Cellebrite hardware in Russia after March 2021 was unauthorized and that Russia remains permanently on the company’s restricted-customer list.","Citizen Lab and Access Now urged Cellebrite to stop selling to regimes that have abused its technology and to conduct human rights due diligence before and after sales."],"insights":["Cellebrite’s historical support for offline operation and continued UFED functionality after updates stop can undermine a vendor’s ability to enforce human rights restrictions once hardware has already been sold.","The case shows that phone extraction tools can contribute directly to political prosecutions, because court records cited by Citizen Lab showed data from Pivovarov’s phone was used in the case against him.","Citizen Lab’s proposed mitigations are concrete vendor controls, including remotely disabling technology after credible abuse reports and adding cryptographically signed watermarks to all imaged devices.","The report highlights that Cellebrite’s exposure is not limited to Russia, as Citizen Lab has also documented recent use of its technology against civil society phones in Serbia, Jordan, and Kenya."],"referencedReports":[{"title":"Russia Breaks Into Human Rights Activist’s Phone With Cellebrite","url":"https://citizenlab.ca/research/russia-breaks-into-human-rights-activists-phone-with-cellebrite/","publisher":"Citizen Lab","context":"The article cites a Citizen Lab report as the basis for findings that Russian authorities broke into Andrey Pivovarov’s phone using Cellebrite technology after the company said it had cut off Russia.","category":"","primary":false}],"body":"\u003cp\u003eRussian authorities used Cellebrite phone data extraction technology to access dissident Andrey Pivovarov’s iPhone after Cellebrite said in March 2021 that it would stop working with Russia over human rights concerns. Citizen Lab said it determined with high confidence that Pivovarov’s phone was broken into on or around June 17, 2021, while it was in Russian custody. Pivovarov was detained in May 2021, his devices were seized, and he was not asked for consent or provided passwords.\u003c/p\u003e\n\n\u003cp\u003eCitizen Lab said forensic analysis of MobileLockdown records from the phone showed USB connections to a device with a Host ID previously attributed to Cellebrite. Court records reviewed by Citizen Lab showed that documents pulled from Pivovarov’s phone were used to build a case against him on charges of carrying out the activities of an “undesirable” organization. The court documents also showed that Cellebrite’s UFED was used to search for specific political terms after the phone was cracked, while Russian authorities did not break into his MacBook.\u003c/p\u003e\n\n\u003cp\u003eCellebrite’s chief marketing officer said any use of legacy Cellebrite hardware in Russia after March 2021 was unauthorized and that Russia remains permanently on the company’s restricted-customer list. Citizen Lab said Cellebrite systems have historically included an offline mode and that much UFED functionality can continue after updates stop, making it difficult for the company to meaningfully cut off problematic customers. Citizen Lab and Access Now urged Cellebrite to stop selling to regimes that have abused its technology and to conduct human rights due diligence before and after sales.\u003c/p\u003e\n"},{"n":5,"title":"Ukraine's state postal operator reports app disruption after cyberattack","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/ukraine-state-postal-operator-reports-disruption","time":"12:16","priority":"SHOULD READ","score":78,"tldr":"Ukraine’s state postal operator Ukrposhta said its mobile app is temporarily disrupted after an overnight cyberattack on its IT systems. A pro-Russian hacktivist group claimed it breached Ukrposhta and stole user data, but those claims have not been independently verified.","briefOverview":"\u003cp\u003eUkraine\u0026rsquo;s state-owned postal operator, Ukrposhta, said its mobile application is experiencing temporary disruptions after an overnight “enemy” attack on the company’s IT systems. The organization said its specialists are working to restore the service and return the app to normal use as soon as possible. Ukrposhta did not disclose who was behind the attack or whether any data had been compromised.\u003c/p\u003e\n\n\u003cp\u003eEarlier in the week, a pro-Russian hacktivist group calling itself the IT Army of Russia claimed responsibility for the attack. The group alleged it had breached Ukrposhta\u0026rsquo;s infrastructure several weeks earlier, gained access to one of the company\u0026rsquo;s servers, and exfiltrated a database containing user information and other internal data. Recorded Future News said it could not independently verify the group\u0026rsquo;s claims.\u003c/p\u003e\n\n\u003cp\u003eUkrposhta is Ukraine\u0026rsquo;s national postal operator and one of the country\u0026rsquo;s largest employers, with about 32,000 employees and more than 6,000 post offices nationwide. The article notes that the IT Army of Russia emerged in March 2025 and has claimed responsibility for numerous cyberattacks targeting Ukrainian organizations. Ukrposhta previously reported a 2024 incident involving a partner\u0026rsquo;s IT infrastructure that disrupted payment processing, customer accounts, APIs, and caused temporary parcel delivery delays.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Ukraine's state-owned postal operator Ukrposhta said its mobile application is experiencing temporary disruptions following an overnight attack on the company's IT systems.","Ukrposhta said its specialists are working to restore the mobile app service, but it did not disclose who was behind the attack or whether any data had been compromised.","A pro-Russian hacktivist group called the IT Army of Russia claimed responsibility for the attack and alleged it had accessed a company server and exfiltrated a database containing user information and other internal data.","Recorded Future News said it could not independently verify the IT Army of Russia's claims.","Ukrposhta has about 32,000 employees and more than 6,000 post offices nationwide, and it previously reported a 2024 partner infrastructure incident that disrupted payment processing, customer accounts, APIs, and parcel deliveries."],"insights":["The reported public impact is limited to Ukrposhta’s mobile app, but the claimed compromise involves broader internal infrastructure and user data, creating a gap between confirmed disruption and alleged severity.","The IT Army of Russia’s alleged breach timeline of several weeks before public disruption suggests the group is claiming prior access rather than only a one-time outage event.","Ukrposhta’s 2024 incident shows that disruptions to partner infrastructure can affect core services such as payments, customer accounts, APIs, and parcel deliveries, making third-party dependencies relevant to postal service resilience.","The article links attacks on both Ukrposhta and Nova Poshta to Russia-linked activity, indicating that Ukrainian postal operators have been a recurring target rather than isolated victims.","Security researchers’ description of the IT Army of Russia recruiting insiders and soliciting intelligence points to risks that extend beyond technical attacks into human access and information-gathering around critical infrastructure."],"referencedReports":[],"body":"\u003cp\u003eUkraine\u0026rsquo;s state-owned postal operator, Ukrposhta, said its mobile application is experiencing temporary disruptions after an overnight “enemy” attack on the company’s IT systems. The organization said its specialists are working to restore the service and return the app to normal use as soon as possible. Ukrposhta did not disclose who was behind the attack or whether any data had been compromised.\u003c/p\u003e\n\n\u003cp\u003eEarlier in the week, a pro-Russian hacktivist group calling itself the IT Army of Russia claimed responsibility for the attack. The group alleged it had breached Ukrposhta\u0026rsquo;s infrastructure several weeks earlier, gained access to one of the company\u0026rsquo;s servers, and exfiltrated a database containing user information and other internal data. Recorded Future News said it could not independently verify the group\u0026rsquo;s claims.\u003c/p\u003e\n\n\u003cp\u003eUkrposhta is Ukraine\u0026rsquo;s national postal operator and one of the country\u0026rsquo;s largest employers, with about 32,000 employees and more than 6,000 post offices nationwide. The article notes that the IT Army of Russia emerged in March 2025 and has claimed responsibility for numerous cyberattacks targeting Ukrainian organizations. Ukrposhta previously reported a 2024 incident involving a partner\u0026rsquo;s IT infrastructure that disrupted payment processing, customer accounts, APIs, and caused temporary parcel delivery delays.\u003c/p\u003e\n"},{"n":8,"title":"A Compromised Vendor Account Sent an ACH Redirect With a Fabricated Closure Deadline and Mismatched Phone Numbers","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/vendor-ach-redirect-compromised-account-fabricated-urgency-mismatched-signatures","time":"11:00","priority":"MAY READ","score":70,"tldr":"A compromised legitimate vendor email account was used to request an urgent ACH banking change, bypassing normal authentication-based defenses because SPF and DMARC passed. The key warning sign was a duplicated signature block with mismatched phone numbers, underscoring the need to verify all payment-change requests through known out-of-band contacts.","briefOverview":"\u003cp\u003eAn attacker operating through a compromised vendor account sent an ACH banking-change request to a construction firm\u0026rsquo;s accounts payable contact. The email claimed the vendor\u0026rsquo;s account was scheduled for closure that same day, creating urgency around the request. There was no invoice attached, no prior context, and no reference to an outstanding payment or billing cycle.\u003c/p\u003e\n\n\u003cp\u003eThe message appeared legitimate from an email authentication perspective because it came from a long-established vendor domain registered in February 2000. It passed SPF and DMARC, and the relay through a third-party email signature service explained the absence of DKIM and the non-matching relay IP. The article emphasizes that compromised legitimate sender accounts are valuable because they can resemble normal business correspondence to receiving mail systems.\u003c/p\u003e\n\n\u003cp\u003eThe clearest warning sign was that the message contained two copies of the same vendor signature block with phone numbers that differed by one digit. IRONSCALES Adaptive AI flagged the message at 68% confidence based on behavioral signals, including the accounts payable target, the sensitive financial request, time pressure, and lack of supporting documentation. The article recommends verifying any banking change through a known out-of-band phone number from a contract or public listing, rather than using contact details from the requesting email.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An attacker using a compromised vendor account sent a construction firm's accounts payable contact an ACH banking-change request with a same-day account closure deadline.","The sending domain was registered in February 2000, and the message passed SPF and DMARC while being relayed through a legitimate third-party email signature service.","The email contained no invoice, purchase order number, outstanding balance reference, or prior context for the requested banking change.","The message included two copies of the same vendor signature block, and the phone numbers in the two blocks differed by one digit.","IRONSCALES Adaptive AI flagged the message at 68% confidence based on behavioral signals including the accounts payable target, financial-process request, time pressure, and lack of supporting documentation."],"insights":["Authentication success did not make the message safe, because the attacker used a compromised legitimate vendor account and the third-party signature relay was authorized to send for the domain.","Duplicate signature blocks with small numeric differences can expose attacker-inserted content when a legitimate signature service appends the real stored signature template afterward.","A banking-change request without invoice, purchase order, outstanding balance, or billing-cycle context is a useful warning sign because the article says attackers often lack access to real billing history.","The most effective control described is procedural rather than technical: verify banking changes by calling a known vendor number from a contract or public listing, not any number included in the email.","Quarter-end timing can make a fabricated financial deadline feel more believable to accounts payable staff, increasing the risk that urgency will override normal verification."],"referencedReports":[{"title":"Verizon DBIR 2026","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the report as identifying vendor email compromise as one of the highest-value social engineering attack classes by per-incident financial impact.","category":"","primary":false},{"title":"MITRE ATT\u0026CK T1566.001","url":"https://attack.mitre.org/techniques/T1566/001/","publisher":"MITRE ATT\u0026CK","context":"The article references this MITRE ATT\u0026CK technique as covering spearphishing with attachments.","category":"","primary":false},{"title":"CISA guidance on BEC","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article cites CISA guidance as recommending independent verification of all payment-change requests.","category":"","primary":false},{"title":"Microsoft Digital Defense Report 2024","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2024","publisher":"Microsoft","context":"The article cites the report as noting that financially motivated business email compromise continues to outpace malware-delivery attacks in total reported losses.","category":"","primary":false}],"body":"\u003cp\u003eAn attacker operating through a compromised vendor account sent an ACH banking-change request to a construction firm\u0026rsquo;s accounts payable contact. The email claimed the vendor\u0026rsquo;s account was scheduled for closure that same day, creating urgency around the request. There was no invoice attached, no prior context, and no reference to an outstanding payment or billing cycle.\u003c/p\u003e\n\n\u003cp\u003eThe message appeared legitimate from an email authentication perspective because it came from a long-established vendor domain registered in February 2000. It passed SPF and DMARC, and the relay through a third-party email signature service explained the absence of DKIM and the non-matching relay IP. The article emphasizes that compromised legitimate sender accounts are valuable because they can resemble normal business correspondence to receiving mail systems.\u003c/p\u003e\n\n\u003cp\u003eThe clearest warning sign was that the message contained two copies of the same vendor signature block with phone numbers that differed by one digit. IRONSCALES Adaptive AI flagged the message at 68% confidence based on behavioral signals, including the accounts payable target, the sensitive financial request, time pressure, and lack of supporting documentation. The article recommends verifying any banking change through a known out-of-band phone number from a contract or public listing, rather than using contact details from the requesting email.\u003c/p\u003e\n"},{"n":10,"title":"Introduction to COM usage by Windows threats","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/introduction-to-com-usage-by-windows-threats/","time":"10:00","priority":"MAY READ","score":60,"tldr":"Windows malware often abuses COM and DCOM to access built-in capabilities like Task Scheduler, WMI, BITS, shell automation, and remote execution while hiding behavior behind GUIDs and indirect vtable calls. Analysts should map ProgIDs, CLSIDs, IIDs, and vtable offsets to real interfaces and methods to understand what a sample is doing.","briefOverview":"\u003cp\u003eThe article explains how Windows threats use Component Object Model, a fundamental Windows technology for object activation, inter-process communication, automation, and language-independent component reuse. COM is widely used by legitimate applications, but the same qualities make it useful to threat actors. Malware frequently uses COM interfaces for lateral movement, execution, download and exfiltration, persistence, evasion, system discovery, and automation of built-in Windows and Office functionality.\u003c/p\u003e\n\n\u003cp\u003eA central point of the article is that COM-heavy binaries can be difficult to reverse engineer because important behavior may appear only as opaque GUIDs and indirect vtable calls. Analysts need to identify ProgIDs, CLSIDs, IIDs, and vtable offsets, then map them to meaningful classes, interfaces, and method names. The article describes tools and workflows using OleView.NET, ComView, IDA Pro’s COM Helper, COMIDA, COM Code Helper, Binary Ninja COM-related support, and DispatchLogger to make COM behavior easier to understand.\u003c/p\u003e\n\n\u003cp\u003eThe article also shows how Distributed COM extends the same model across a network and can be identified through APIs such as CoCreateInstanceEx with appropriate parameters. Case studies include Qakbot using WMI through IWbemLocator, Gh0stRAT/SimpleRemoter and WarmCookie using Task Scheduler COM interfaces for scheduled task creation, and Attor using BITS through IBackgroundCopyJob for communication with a C2 server. The broader impact is that malware can use normal Windows components for task creation, WMI access, BITS transfers, shell automation, Office automation, local execution, remote activation, or persistence while hiding the activity behind indirect calls.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Component Object Model is a fundamental Windows technology used by legitimate applications for object activation, inter-process communication, automation, and language-independent component reuse, and the same qualities make it useful to threat actors.","Malware frequently uses COM interfaces for lateral movement, execution, download and exfiltration, persistence, evasion, system discovery, and automation of built-in Windows and Office functionality.","Reverse engineering COM-heavy binaries requires analysts to translate opaque GUIDs and indirect vtable calls into meaningful classes, interfaces, and method names.","Distributed COM extends COM so a client can activate and use COM objects on another system, with method invocation transported over Microsoft RPC.","The article cites Qakbot, Gh0stRAT/SimpleRemoter, Attor, and WarmCookie as examples of malware families using COM interfaces such as WMI, Task Scheduler, and BITS."],"insights":["The presence of CoCreateInstanceEx with appropriate parameters can help distinguish remote DCOM activity from local COM usage during binary analysis.","COM GUIDs in compiled binaries often use little-endian byte order for the first three fields, so hunting rules must search for byte patterns that differ from the familiar string-form GUIDs.","Malware may create scheduled tasks through Task Scheduler COM interfaces instead of launching schtasks.exe, which means process telemetry may not show a direct schtasks.exe execution event.","Calls to CoInitializeSecurity or CoSetProxyBlanket are useful analysis clues because they often indicate that the sample is preparing identity and authentication settings for WMI, DCOM, or another out-of-process COM interface.","Mapping a vtable offset to the correct interface method can turn an opaque indirect call such as a register-plus-offset call into a meaningful action like ITaskService::Connect or IWbemLocator::ConnectServer."],"referencedReports":[{"title":"ESET discovers Attor, a spy platform with curious GSM fingerprinting","url":"https://www.welivesecurity.com/2019/10/10/eset-discovers-attor-spy-platform/","publisher":"ESET","context":"The article cites ESET as the first public documentation of the Attor cyberespionage platform in 2019.","category":"","primary":false},{"title":"Hunting COM Objects","url":"https://cloud.google.com/blog/topics/threat-intelligence/hunting-com-objects/","publisher":"Mandiant / Google Cloud","context":"The article lists this as further reading on hunting COM objects.","category":"","primary":false},{"title":"Hunting COM Objects, Part Two","url":"https://cloud.google.com/blog/topics/threat-intelligence/hunting-com-objects-part-two","publisher":"Mandiant / Google Cloud","context":"The article lists this follow-up as further reading on hunting COM objects.","category":"","primary":false},{"title":"Observing COM within Malicious Code","url":"https://www.malwarebytes.com/blog/news/2014/02/observing-com-within-malicious-code","publisher":"Malwarebytes Labs","context":"The article lists this as further reading related to COM usage in malicious code.","category":"","primary":false}],"body":"\u003cp\u003eThe article explains how Windows threats use Component Object Model, a fundamental Windows technology for object activation, inter-process communication, automation, and language-independent component reuse. COM is widely used by legitimate applications, but the same qualities make it useful to threat actors. Malware frequently uses COM interfaces for lateral movement, execution, download and exfiltration, persistence, evasion, system discovery, and automation of built-in Windows and Office functionality.\u003c/p\u003e\n\n\u003cp\u003eA central point of the article is that COM-heavy binaries can be difficult to reverse engineer because important behavior may appear only as opaque GUIDs and indirect vtable calls. Analysts need to identify ProgIDs, CLSIDs, IIDs, and vtable offsets, then map them to meaningful classes, interfaces, and method names. The article describes tools and workflows using OleView.NET, ComView, IDA Pro’s COM Helper, COMIDA, COM Code Helper, Binary Ninja COM-related support, and DispatchLogger to make COM behavior easier to understand.\u003c/p\u003e\n\n\u003cp\u003eThe article also shows how Distributed COM extends the same model across a network and can be identified through APIs such as CoCreateInstanceEx with appropriate parameters. Case studies include Qakbot using WMI through IWbemLocator, Gh0stRAT/SimpleRemoter and WarmCookie using Task Scheduler COM interfaces for scheduled task creation, and Attor using BITS through IBackgroundCopyJob for communication with a C2 server. The broader impact is that malware can use normal Windows components for task creation, WMI access, BITS transfers, shell automation, Office automation, local execution, remote activation, or persistence while hiding the activity behind indirect calls.\u003c/p\u003e\n"},{"n":9,"title":"Inside the 2026 SMB threat landscape: From phishing and scams to fake AI tools","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/smb-threat-report-2026/120357/","time":"10:00","priority":"MAY READ","score":58,"tldr":"Kaspersky’s 2026 SMB threat analysis finds that attackers are increasingly using fake AI tools, communication apps, phishing emails, and dark web access sales to target small and medium-sized businesses. The main takeaway is that SMBs are now major targets and need stronger employee awareness, access controls, backups, and layered security protections.","briefOverview":"\u003cp\u003eKaspersky’s 2026 threat analysis for small and medium-sized businesses says SMBs remain attractive targets for cybercriminals in both mass attacks and more sophisticated campaigns. In the first four months of 2026, Kaspersky solutions detected 33,352 attacks on SMB users in which malware or potentially unwanted applications were disguised as five popular AI services, almost five times more than in 2025. The report says AI-related baits have become more widespread than the office and collaboration tools covered by Kaspersky’s research.\u003c/p\u003e\n\n\u003cp\u003eThe report also found that fake communication apps remained the most widespread lure, with 414,736 attacks on SMB users from January to April 2026 involving malware or potentially unwanted applications disguised as popular communication apps. Kaspersky described scams and phishing campaigns that mimicked banks, AI services, social network business-page alerts, cloud document notifications, compliance notices, meeting invitations, and routine business quote requests. These schemes were used to steal credentials, personal information, funds, or to distribute malware through email attachments.\u003c/p\u003e\n\n\u003cp\u003eKaspersky Digital Footprint Intelligence also analyzed dark web posts offering initial access to corporate infrastructures in the first four months of 2025 and 2026. The report says posts concerning small and medium-sized organizations accounted for more than half of the analyzed posts with initial access offers, while posts tied to the Middle East, Africa, and Latin America increased in 2026. Kaspersky advises SMBs to define access rules, regularly back up important data, establish guidelines for external services, train employees, use suitable security tools, protect email, and monitor for exposed company data or lookalike websites.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["From January to April 2026, Kaspersky solutions detected 33,352 attacks on SMB users in which malware or potentially unwanted applications for PCs were disguised as five popular AI services, almost five times more than in 2025.","Popular messengers and communication services remained the most widespread lure, with Kaspersky blocking 414,736 attacks on SMB users involving fake communication apps from January to April 2026.","Kaspersky observed phishing campaigns and scams targeting businesses and entrepreneurs that mimicked financial services, AI services, social networks, cloud document notifications, compliance notices, and meeting invitations to steal credentials, personal information, or funds.","Kaspersky Digital Footprint Intelligence found that posts concerning small and medium-sized organizations accounted for more than half of analyzed dark web posts offering initial access to corporate infrastructures from January to April 2026.","Kaspersky advises SMBs to define and update access rules, regularly back up important data, establish clear guidelines for external services, train employees, and use cybersecurity solutions suited to their size and budget."],"insights":["AI-themed lures have overtaken the office and collaboration tools covered in Kaspersky’s research, with 39% more SMB attacks disguised as AI tools than as those office tools in the first four months of 2026.","Attackers are rapidly adapting to current technology trends, as newer AI tools such as Claude and OpenClaw appeared among the common lures used against SMBs in 2026.","Some phishing campaigns try to bypass ordinary email suspicion by using legitimate third-party platforms, such as redirecting victims through a real Zoom Docs page before sending them to a phishing site.","Dark web initial-access posts appear to be becoming more targeted, as posts without a specified region decreased by 56% in 2026 compared with the same period in 2025.","SMBs face risk not only as direct targets but also because attackers may use them in trusted relationship attacks to reach larger organizations that rely on them as contractors."],"referencedReports":[{"title":"New SBE Council Survey: Small Businesses Confident About 2025 Year-End Performance; AI, Digital Tools and Multi-Channel Strategies Driving Growth and Competitiveness","url":"https://sbecouncil.org/2025/10/23/new-sbe-council-survey-small-businesses-confident-about-2025-year-end-performance-ai-digital-tools-and-multi-channel-strategies-driving-growth-and-competitiveness/","publisher":"Small Business \u0026 Entrepreneurship Council","context":"The article cites this survey to support the point that small business owners are embracing artificial intelligence and digital transformation.","category":"","primary":false}],"body":"\u003cp\u003eKaspersky’s 2026 threat analysis for small and medium-sized businesses says SMBs remain attractive targets for cybercriminals in both mass attacks and more sophisticated campaigns. In the first four months of 2026, Kaspersky solutions detected 33,352 attacks on SMB users in which malware or potentially unwanted applications were disguised as five popular AI services, almost five times more than in 2025. The report says AI-related baits have become more widespread than the office and collaboration tools covered by Kaspersky’s research.\u003c/p\u003e\n\n\u003cp\u003eThe report also found that fake communication apps remained the most widespread lure, with 414,736 attacks on SMB users from January to April 2026 involving malware or potentially unwanted applications disguised as popular communication apps. Kaspersky described scams and phishing campaigns that mimicked banks, AI services, social network business-page alerts, cloud document notifications, compliance notices, meeting invitations, and routine business quote requests. These schemes were used to steal credentials, personal information, funds, or to distribute malware through email attachments.\u003c/p\u003e\n\n\u003cp\u003eKaspersky Digital Footprint Intelligence also analyzed dark web posts offering initial access to corporate infrastructures in the first four months of 2025 and 2026. The report says posts concerning small and medium-sized organizations accounted for more than half of the analyzed posts with initial access offers, while posts tied to the Middle East, Africa, and Latin America increased in 2026. Kaspersky advises SMBs to define access rules, regularly back up important data, establish guidelines for external services, train employees, use suitable security tools, protect email, and monitor for exposed company data or lookalike websites.\u003c/p\u003e\n"},{"n":2,"title":"Breach At The Beach: The Ultimate Entra ID Training Experience","source":"varonis.com","sourceColorIdx":9,"link":"https://www.varonis.com/blog/breach-at-the-beach-ctf","time":"13:02","priority":"MAY READ","score":45,"tldr":"Varonis launched Breach at the Beach, a free Entra ID capture-the-flag training experience that teaches defenders how real-world attackers abuse identity features, non-human identities, and noisy logs to exfiltrate data. Players can earn CPE credits and participate online or at Black Hat USA and DEF CON 34 in 2026.","briefOverview":"\u003cp\u003eVaronis Threat Labs researchers Doron Kapah and Mark Vaitsman created Breach at the Beach, a free Entra ID capture-the-flag training experience. The scenario follows Pixel, Varonis’ threat-detecting cat, as she investigates a breach in Entra ID and traces a threat actor’s steps to uncover what sensitive data the attacker is after. The article says the experience was built to give security practitioners first-hand knowledge of what data exfiltration in Entra ID looks like on the frontlines.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Entra ID as the control plane for the enterprise because it connects users, applications, permissions, automation, and AI-powered workflows. It highlights the rise of non-human identities, including AI agents, service principals, and automated workflows, as a factor that expands the attack surface and makes monitoring and detection harder. The CTF’s techniques are described as being based on real cases the researchers encountered in customer environments, rather than hypothetical scenarios.\u003c/p\u003e\n\n\u003cp\u003eBreach at the Beach is designed to teach players how threats abuse legitimate features, how to work through raw Entra logs, and how to eliminate noise in a changing environment. The researchers also deliberately designed the CTF to avoid an LLM’s ability to solve challenges so players absorb the lessons rather than quickly using AI assistance to compete. Players can complete stages to earn CPE credits, themed badges, and a certificate, and the experience will also be available in person at Black Hat USA 2026 and DEF CON 34.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Varonis Threat Labs researchers Doron Kapah and Mark Vaitsman created Breach at the Beach as an Entra ID training experience focused on what data exfiltration in Entra ID looks like in real-world situations.","Breach at the Beach is a capture-the-flag experience in which players follow Pixel, Varonis’ threat-detecting cat, to trace a threat actor’s steps and identify what sensitive data the attacker is pursuing.","The challenges are based on real customer-environment cases encountered by the researchers and teach players how attackers abuse legitimate features, investigate raw Entra logs, and work without AI assistance.","The article says the rise of non-human identities such as AI agents, service principals, and automated workflows has expanded the Entra ID attack surface and made monitoring and detection more difficult.","Breach at the Beach is free to play online, awards 1 CPE credit and a themed badge for each completed stage, and provides a certificate of completion after all four stages are finished."],"insights":["The CTF deliberately avoids challenges that an LLM can solve, reflecting a newer training concern that AI assistance may let participants bypass the learning process rather than understand the attack flow.","The article emphasizes that defenders should look for legitimate Entra ID functionality being weaponized, not only for broken settings or obvious misconfigurations.","Raw Entra logs and changing data are intentionally built into the exercise because the researchers view noise reduction and creating clarity from messy identity data as a core real-world defender skill.","The training is designed to be useful across roles because the authors argue that red teamers, blue teamers, CISOs, and threat intelligence professionals all benefit from understanding both attacker behavior and defensive visibility gaps.","The CTF ties completion to CPE credits, badges, and a certificate, making the hands-on identity-security training directly usable for professional development requirements."],"referencedReports":[],"body":"\u003cp\u003eVaronis Threat Labs researchers Doron Kapah and Mark Vaitsman created Breach at the Beach, a free Entra ID capture-the-flag training experience. The scenario follows Pixel, Varonis’ threat-detecting cat, as she investigates a breach in Entra ID and traces a threat actor’s steps to uncover what sensitive data the attacker is after. The article says the experience was built to give security practitioners first-hand knowledge of what data exfiltration in Entra ID looks like on the frontlines.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Entra ID as the control plane for the enterprise because it connects users, applications, permissions, automation, and AI-powered workflows. It highlights the rise of non-human identities, including AI agents, service principals, and automated workflows, as a factor that expands the attack surface and makes monitoring and detection harder. The CTF’s techniques are described as being based on real cases the researchers encountered in customer environments, rather than hypothetical scenarios.\u003c/p\u003e\n\n\u003cp\u003eBreach at the Beach is designed to teach players how threats abuse legitimate features, how to work through raw Entra logs, and how to eliminate noise in a changing environment. The researchers also deliberately designed the CTF to avoid an LLM’s ability to solve challenges so players absorb the lessons rather than quickly using AI assistance to compete. Players can complete stages to earn CPE credits, themed badges, and a certificate, and the experience will also be available in person at Black Hat USA 2026 and DEF CON 34.\u003c/p\u003e\n"},{"n":7,"title":"ThreatsDay Bulletin: Smart TV Proxyware, 24-Year curl Bug, AI Crime Forums + 13 More Stories","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/threatsday-bulletin-smart-tv-proxyware.html","time":"12:24","priority":"MAY READ","score":40,"tldr":"This ThreatsDay roundup highlights how attackers are still getting big results from basic weaknesses like forgotten credentials, trusted app abuse, fake updates, exposed services, and poorly governed devices such as smart TVs. The key takeaway is to patch quickly, revoke stale access, monitor privileged accounts, and reassess “normal” tools and devices that may be quietly enabling compromise.","briefOverview":"\u003cp\u003eThis ThreatsDay bulletin rounds up 16 security stories involving software flaws, social engineering, exposed services, abused collaboration tools, smart TV proxyware, cybercrime activity, and surveillance export concerns. The article emphasizes that many incidents rely on simple weaknesses such as stale credentials, fake updates, trusted workflows, and devices that users rarely inspect. It highlights affected parties including smart TV owners, organizations using Salesforce-connected apps, self-hosted Hoppscotch users, macOS users, Microsoft 365 users, and research institutions running REDCap.\u003c/p\u003e\n\n\u003cp\u003eSeveral items focus on vulnerabilities and exposed infrastructure. AISLE discovered six curl vulnerabilities, including CVE-2026-8932, described as the oldest curl vulnerability reported so far because it has shipped since curl 7.7 in 2001, and the flaws were fixed in version 8.21.0. Hoppscotch disclosed CVE-2026-50160, a critical unauthenticated flaw in self-hosted versions that allows arbitrary configuration keys such as JWT_SECRET and SESSION_SECRET to be injected, leading to full server compromise. Censys found just over 8,500 REDCap instances globally, while Google Threat Intelligence Group attributed a year-plus espionage campaign against North American academic, medical, and military research institutions to UNC6508 using internet-facing REDCap servers as an initial access vector.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also covers multiple abuse campaigns and broader ecosystem risks. Spur Intelligence found residential proxy software in 2,058 of 6,038 reviewed LG webOS and Samsung Tizen smart TV apps, allowing third-party traffic to be relayed through owners’ internet connections with user consent. Zscaler reported that a Payouts King ransomware initial access broker used Microsoft Teams impersonation to deliver the Edgecution malicious Microsoft Edge extension and a Python-based backdoor, while Fortra described phishing that abuses Outlook Groups and Microsoft 365 collaboration features. Other stories include a Klue legacy credential from 2022 being used by Icarus extortionists to steal Salesforce data, ClickFix campaigns delivering macOS infostealers, Scattered Spider members convicted for the Transport for London hack, and Sophos reporting that AI is a major topic in cybercrime forums.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AISLE discovered six vulnerabilities in curl, including CVE-2026-8932, an issue present since curl version 7.7 from March 2001 and fixed in version 8.21.0.","A critical flaw in self-hosted Hoppscotch, CVE-2026-50160, allows an unauthenticated attacker to inject configuration keys such as JWT_SECRET and SESSION_SECRET, leading to full server compromise.","Spur Intelligence found that 2,058 of 6,038 reviewed LG webOS and Samsung Tizen smart TV apps contained residential proxy software that can relay third-party traffic through the TV owner’s internet connection with user consent.","Zscaler reported that a Payouts King ransomware initial access broker used Microsoft Teams impersonation to deliver the Edgecution malicious Microsoft Edge extension and a Python-based backdoor.","Klue said a credential originally provided to a third party in 2022 for a limited pilot was exploited by the Icarus extortionists to steal Salesforce data from multiple corporate customers."],"insights":["Smart TVs are described as unusually attractive residential proxy hosts because they stay plugged in and online for years, sit on the same home network as other devices, and are rarely audited like computers.","The Hoppscotch flaw shows how a single unauthenticated HTTP request can become persistent full-server compromise when extra configuration fields are not stripped before being written to the database.","The Klue incident highlights that credentials issued for a limited pilot can remain dangerous years later if they are not revoked after the pilot ends.","The Microsoft 365 phishing campaign is notable because it moves the malicious activity into normal collaboration workflows such as group additions, shared files, and calendar invites rather than relying only on a suspicious email.","The curl finding shows that security-relevant logic flaws can remain in widely used software for decades, with CVE-2026-8932 dating back to curl version 7.7 from 2001."],"referencedReports":[{"title":"Multiple Flaws in curl","url":"https://aisle.com/blog/aisle-discovers-6-new-cves-in-curl-including-the-oldest-issue-ever-reported","publisher":"AISLE","context":"The article says AISLE discovered six vulnerabilities in curl, including the oldest curl vulnerability reported so far.","category":"","primary":false},{"title":"CVE-2026-8932","url":"https://curl.se/docs/CVE-2026-8932.html","publisher":"curl","context":"The article links to curl’s advisory for CVE-2026-8932, a connection reuse issue involving changed mTLS configuration.","category":"","primary":false},{"title":"Maximum-Severity Bug in Hoppscotch","url":"https://github.com/hoppscotch/hoppscotch/security/advisories/GHSA-j542-4rch-8hwf","publisher":"Hoppscotch","context":"The article cites Hoppscotch’s security advisory for CVE-2026-50160, a critical self-hosted Hoppscotch flaw leading to complete compromise.","category":"","primary":false},{"title":"Hoppscotch CVE-2026-50160","url":"https://www.offgridsec.com/blog-hoppscotch-cve-2026-50160.html","publisher":"Offgrid Security","context":"The article credits Offgrid Security’s autonomous AI security agent with discovering the Hoppscotch vulnerability and describes Offgrid’s explanation of the exploit chain.","category":"","primary":false},{"title":"Residential Proxy SDKs Hidden in LG and Samsung Smart TV Apps","url":"https://spur.us/blog/smart-tv-apps-residential-proxy-sdks","publisher":"Spur Intelligence","context":"The article references Spur Intelligence’s report finding residential proxy software in more than one-third of reviewed LG and Samsung smart TV apps.","category":"","primary":false},{"title":"Payouts King Ransomware Initial Access Broker Deploys New Edgecution Malware","url":"https://www.zscaler.com/blogs/security-research/payouts-king-ransomware-initial-access-broker-deploys-new-edgecution","publisher":"Zscaler ThreatLabz","context":"The article cites Zscaler ThreatLabz research on a Payouts King ransomware affiliate using Microsoft Teams social engineering to deliver Edgecution malware.","category":"","primary":false},{"title":"NCC Group Monthly Threat Pulse Review of May 2026","url":"https://www.nccgroup.com/newsroom/ncc-group-monthly-threat-pulse-review-of-may-2026/","publisher":"NCC Group","context":"The article cites NCC Group’s threat pulse review as evidence that nation-state actors are increasingly adopting cybercriminal tools and tactics.","category":"","primary":false},{"title":"New ClickFix Attack Mounts DMG Images to Deliver macOS Infostealer","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-20-ClickFix-campaign-delivers-macOS-infostealer-via-DMG.txt","publisher":"Palo Alto Networks Unit 42","context":"The article references Unit 42’s technical intelligence on a ClickFix campaign that tricks macOS users into running commands that install an information stealer.","category":"","primary":false},{"title":"Evasive ClickFix Injection Delivers RAT","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-05-%20Evasive-ClickFix-Injection-Delivers-RAT.txt","publisher":"Palo Alto Networks Unit 42","context":"The article says Palo Alto Networks detailed another multi-step ClickFix attack that delivers a cross-platform trojan.","category":"","primary":false},{"title":"Phishing Through Collaboration","url":"https://www.fortra.com/blog/phishing-through-collaboration","publisher":"Fortra","context":"The article cites Fortra’s analysis of a phishing campaign abusing Outlook Groups and Microsoft 365 collaboration features.","category":"","primary":false},{"title":"AI in the Underground: Curiosity, Claims, and Concerns","url":"https://www.sophos.com/en-us/blog/ai-in-the-underground-curiosity-claims-and-concerns","publisher":"Sophos","context":"The article references Sophos’s analysis of how cybercriminals discuss, market, and worry about AI in underground communities.","category":"","primary":false},{"title":"REDCap Exposure Analysis","url":"https://censys.com/blog/redcap-exposure-analysis/","publisher":"Censys","context":"The article cites Censys’s exposure analysis identifying just over 8,500 REDCap instances globally.","category":"","primary":false},{"title":"Bulgaria Licensed Surveillance Exports to Rights Violators","url":"https://www.hrw.org/news/2026/06/18/bulgaria-licensed-surveillance-exports-to-rights-violators","publisher":"Human Rights Watch","context":"The article references Human Rights Watch’s report on Bulgaria licensing surveillance technology exports to countries likely to use them for repression or serious rights violations.","category":"","primary":false},{"title":"Malware Distribution via Browser-in-the-Browser Kit","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-22-malware-distribution-via-browser-in-the-browser-kit.txt","publisher":"Palo Alto Networks Unit 42","context":"The article cites Unit 42’s technical intelligence on a brandsquatting campaign using the Browser-in-the-Browser technique to distribute malicious payloads.","category":"","primary":false},{"title":"Browser-In-The-Browser Phishing Campaign","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-08-Browser-In-The-Browser-Pishing-Campaign.txt","publisher":"Palo Alto Networks Unit 42","context":"The article says Unit 42 previously disclosed details of a separate Browser-in-the-Browser campaign used to steal Microsoft 365 credentials.","category":"","primary":false}],"body":"\u003cp\u003eThis ThreatsDay bulletin rounds up 16 security stories involving software flaws, social engineering, exposed services, abused collaboration tools, smart TV proxyware, cybercrime activity, and surveillance export concerns. The article emphasizes that many incidents rely on simple weaknesses such as stale credentials, fake updates, trusted workflows, and devices that users rarely inspect. It highlights affected parties including smart TV owners, organizations using Salesforce-connected apps, self-hosted Hoppscotch users, macOS users, Microsoft 365 users, and research institutions running REDCap.\u003c/p\u003e\n\n\u003cp\u003eSeveral items focus on vulnerabilities and exposed infrastructure. AISLE discovered six curl vulnerabilities, including CVE-2026-8932, described as the oldest curl vulnerability reported so far because it has shipped since curl 7.7 in 2001, and the flaws were fixed in version 8.21.0. Hoppscotch disclosed CVE-2026-50160, a critical unauthenticated flaw in self-hosted versions that allows arbitrary configuration keys such as JWT_SECRET and SESSION_SECRET to be injected, leading to full server compromise. Censys found just over 8,500 REDCap instances globally, while Google Threat Intelligence Group attributed a year-plus espionage campaign against North American academic, medical, and military research institutions to UNC6508 using internet-facing REDCap servers as an initial access vector.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also covers multiple abuse campaigns and broader ecosystem risks. Spur Intelligence found residential proxy software in 2,058 of 6,038 reviewed LG webOS and Samsung Tizen smart TV apps, allowing third-party traffic to be relayed through owners’ internet connections with user consent. Zscaler reported that a Payouts King ransomware initial access broker used Microsoft Teams impersonation to deliver the Edgecution malicious Microsoft Edge extension and a Python-based backdoor, while Fortra described phishing that abuses Outlook Groups and Microsoft 365 collaboration features. Other stories include a Klue legacy credential from 2022 being used by Icarus extortionists to steal Salesforce data, ClickFix campaigns delivering macOS infostealers, Scattered Spider members convicted for the Transport for London hack, and Sophos reporting that AI is a major topic in cybercrime forums.\u003c/p\u003e\n"},{"n":1,"title":"Webinar: Why account takeovers remain one of the hardest threats to stop","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-why-account-takeovers-remain-one-of-the-hardest-threats-to-stop/","time":"12:12","priority":"MAY READ","score":35,"tldr":"BleepingComputer will host a July 8, 2026 webinar with Abnormal AI and Novant Health on why account takeovers are hard to detect and how behavioral AI can speed up investigations and response. The key focus is identifying compromised accounts earlier when attackers use legitimate credentials, trusted services, and normal-looking business activity.","briefOverview":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo; The webinar will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. It will examine how attackers gain access to legitimate accounts, why traditional security controls often struggle to detect account compromise quickly, and how behavioral AI can help security teams accelerate investigations and response.\u003c/p\u003e\n\n\u003cp\u003eThe article says account takeover attacks remain one of the most disruptive security incidents facing enterprises despite investments in phishing defenses, identity protection, and multi-factor authentication. Modern account takeover attacks frequently rely on trusted identities, legitimate cloud services, and compromised business accounts rather than obviously malicious activity. This can allow attackers to blend into normal business operations while maintaining access to email, collaboration platforms, and corporate resources.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will cover how phishing, business email compromise, and account takeover attacks lead to compromised business accounts, as well as why attackers increasingly rely on legitimate identities and trusted services. It will also address the challenges security teams face when investigating potential account compromise and how behavioral AI can automate detection, investigation, and remediation workflows. Attendees are expected to learn practical approaches for identifying account compromise earlier, reducing manual investigation work, and limiting the impact of account takeover attacks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["BleepingComputer will host a live webinar on July 8, 2026 titled \"Stop chasing alerts: Automating email security with behavioral AI.\"","The webinar will be presented by Dan Nickolaisen of Abnormal AI and Eric Danneker of Novant Health.","The webinar will examine how attackers gain access to legitimate accounts, why traditional security controls struggle to detect account compromise quickly, and how behavioral AI can help investigations and response.","The article says modern account takeover attacks often use trusted identities, legitimate cloud services, and compromised business accounts instead of obviously malicious activity.","Attendees will learn approaches for identifying account compromise earlier, reducing manual investigation work, and limiting the impact of account takeover attacks."],"insights":["Account takeover remains difficult even for organizations that already invest in phishing defenses, identity protection, and multi-factor authentication.","The article highlights that compromised accounts can be hard to spot because they may involve legitimate credentials, trusted devices, and normal business communications rather than clearly malicious behavior.","A practical focus of the webinar is reducing the time security teams spend manually investigating suspicious messages, unusual login activity, and user reports.","The article frames behavioral AI as useful not just for detection, but also for automating investigation and remediation workflows after suspicious account activity appears."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo; The webinar will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. It will examine how attackers gain access to legitimate accounts, why traditional security controls often struggle to detect account compromise quickly, and how behavioral AI can help security teams accelerate investigations and response.\u003c/p\u003e\n\n\u003cp\u003eThe article says account takeover attacks remain one of the most disruptive security incidents facing enterprises despite investments in phishing defenses, identity protection, and multi-factor authentication. Modern account takeover attacks frequently rely on trusted identities, legitimate cloud services, and compromised business accounts rather than obviously malicious activity. This can allow attackers to blend into normal business operations while maintaining access to email, collaboration platforms, and corporate resources.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will cover how phishing, business email compromise, and account takeover attacks lead to compromised business accounts, as well as why attackers increasingly rely on legitimate identities and trusted services. It will also address the challenges security teams face when investigating potential account compromise and how behavioral AI can automate detection, investigation, and remediation workflows. Attendees are expected to learn practical approaches for identifying account compromise earlier, reducing manual investigation work, and limiting the impact of account takeover attacks.\u003c/p\u003e\n"},{"n":6,"title":"Surviving the Mythos Era: Richard Bejtlich on the Case for NDR","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/surviving-mythos-era-richard-bejtlich.html","time":"11:17","priority":"MAY READ","score":35,"tldr":"The article argues that security teams should use network detection and response to move beyond alert-driven triage toward evidence-based investigations and active interdiction of threats. It highlights Richard Bejtlich’s Corelight guide as a practical framework for using network telemetry, threat hunting, and AI-assisted workflows to validate and disrupt attacks before they become breaches.","briefOverview":"\u003cp\u003eThe article discusses Richard Bejtlich’s \u003cem\u003eNDR Essentials: A Practical Guide to Network Detection and Response\u003c/em\u003e, published in partnership with Corelight. It argues that many security operations teams have abundant telemetry but still struggle to answer what happened during an incident, what evidence they have, and whether they are seeing the full context. The article says alerts are becoming less useful as vulnerability discovery accelerates, because organizations need validated evidence of active exploit and exposure rather than more raw telemetry.\u003c/p\u003e\n\n\u003cp\u003eBejtlich’s guide makes the case for network interdiction, which focuses on identifying and disrupting malicious activity after initial compromise but before attackers achieve their objectives. The article says network detection and response supports this by providing visibility into traffic moving throughout the network and preserving high-fidelity evidence. It highlights four primary sources of network evidence: full packet captures, extracted files, transaction logs, and alerts or detections.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes how threat hunting should begin with a hypothesis about adversarial techniques rather than with alert follow-up. It says analysts can use network logs and sessions to validate or disprove those hypotheses by looking for items such as unusual protocols, large outbound data transfers, lateral movement, executables, and certificate exposure. It further explains that AI can help optimize alert frameworks, accelerate incident response through agentic triage, and coordinate siloed tools, while human verification remains necessary to prevent hallucinations or unintended consequences.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article says many security operations teams struggle during incident investigations to answer what happened, what evidence they have, and whether they are seeing the full context.","Richard Bejtlich’s NDR Essentials guide argues that network detection and response helps practitioners validate findings, understand attacker behavior, and support AI-assisted investigations.","The guide emphasizes network interdiction, which means identifying and disrupting malicious activity after initial compromise but before attackers achieve their objectives.","Bejtlich says threat hunting should begin with a hypothesis about adversarial techniques rather than with alert follow-up, and analysts should use network logs and sessions to validate or disprove that hypothesis.","The article says AI can help network detection and response by optimizing alert frameworks, accelerating incident response through agentic triage, and coordinating outputs from siloed security tools."],"insights":["The article argues that organizations should treat alerts as starting points for investigation rather than as proof that an event occurred, because alerts often provide assumptions rather than defensible evidence.","Bejtlich recommends a “zero-baseline” approach to alerting, since too many pre-enabled rules can create alert fatigue that buries or numbs security teams.","The guide identifies four concrete sources of network evidence for investigations: full packet captures, extracted files, transaction logs, and alerts or detections.","The article says AI can reduce analyst workload and coordinate security tools, but human verification remains necessary to prevent hallucinations or unintended consequences.","The placement of traffic capture at the network edge, the center, or both is presented as an operational choice that directly affects how analysts can investigate activity."],"referencedReports":[],"body":"\u003cp\u003eThe article discusses Richard Bejtlich’s \u003cem\u003eNDR Essentials: A Practical Guide to Network Detection and Response\u003c/em\u003e, published in partnership with Corelight. It argues that many security operations teams have abundant telemetry but still struggle to answer what happened during an incident, what evidence they have, and whether they are seeing the full context. The article says alerts are becoming less useful as vulnerability discovery accelerates, because organizations need validated evidence of active exploit and exposure rather than more raw telemetry.\u003c/p\u003e\n\n\u003cp\u003eBejtlich’s guide makes the case for network interdiction, which focuses on identifying and disrupting malicious activity after initial compromise but before attackers achieve their objectives. The article says network detection and response supports this by providing visibility into traffic moving throughout the network and preserving high-fidelity evidence. It highlights four primary sources of network evidence: full packet captures, extracted files, transaction logs, and alerts or detections.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes how threat hunting should begin with a hypothesis about adversarial techniques rather than with alert follow-up. It says analysts can use network logs and sessions to validate or disprove those hypotheses by looking for items such as unusual protocols, large outbound data transfers, lateral movement, executables, and certificate exposure. It further explains that AI can help optimize alert frameworks, accelerate incident response through agentic triage, and coordinate siloed tools, while human verification remains necessary to prevent hallucinations or unintended consequences.\u003c/p\u003e\n"}]</script>
