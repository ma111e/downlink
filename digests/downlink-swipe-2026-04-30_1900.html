ities and restricted online speech. International advocates have criticized the move as a direct assault on civil society and global digital freedoms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAccess Now has canceled RightsCon, one of the world’s largest digital human rights conferences, due to direct intervention by the Zambian government. The event was scheduled to begin on May 5 in Lusaka but was halted just days prior. Minister of Technology and Science Felix Mutati initially signaled the cancellation by citing incomplete security clearances and a need for additional time to align the summit with national diplomatic protocols. Secretary for Information and Media Thabo Kawana later expanded on this, stating that comprehensive disclosure of critical thematic information was required. The announcement left thousands of delegates stranded or en route to Zambia. Many human rights organizations are already financially strained following the dismantling of USAID, complicating travel and rescheduling efforts. RightsCon typically draws over 5,000 advocates and academics from more than 150 countries. ARTICLE 19 acknowledged well-founded claims that foreign government pressure influenced the Zambian decision. Local reports suggested the program faced scrutiny because Taiwanese delegates might speak against China at a venue funded by Beijing. The Mulungushi International Conference Center received a $30 million grant from the Chinese government, according to College of William \u0026amp; Mary research tracking foreign investment. Zambia has recently tightened its grip on digital expression through legislation that critics say enables state surveillance. Freedom House recently classified the country as “partly free” and documented the jailing of online critics. Former UN Special Rapporteur David Kaye condemned the late-stage cancellation as a severe attack on civil society. The shutdown was first reported by 404 Media and has drawn widespread condemnation from the global human rights community.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"event-cancellation-and-official-justifications\"\u003eEvent Cancellation and Official Justifications\u003c/h2\u003e\n\n\u003cp\u003eAccess Now announced the complete cancellation of RightsCon, a premier global digital human rights conference, due to government intervention in Zambia. The summit was originally scheduled to begin on May 5 in Lusaka but was halted days before its start. Minister of Technology and Science Felix Mutati provided the first indication of the shutdown, citing incomplete security clearances for participants.\u003c/p\u003e\n\n\u003cp\u003eHe further stated that additional time was needed to align the event with national procedures and diplomatic protocols. Secretary for Information and Media Thabo Kawana later added that the government required comprehensive disclosure of critical information regarding the conference\u0026rsquo;s proposed thematic discussions.\u003c/p\u003e\n\n\u003ch2 id=\"operational-and-financial-impact\"\u003eOperational and Financial Impact\u003c/h2\u003e\n\n\u003cp\u003eThe abrupt cancellation has created significant logistical challenges for the human rights community. Thousands of delegates were either en route to Zambia or had already arrived when the announcement was made. The event typically attracts more than 5,000 human rights advocates and academics from over 150 countries.\u003c/p\u003e\n\n\u003cp\u003eMany participating organizations are already financially constrained due to the dismantling of the United States Agency for International Development. It remains unclear whether the global community can or will fund travel to a rescheduled conference.\u003c/p\u003e\n\n\u003ch2 id=\"geopolitical-and-venue-context\"\u003eGeopolitical and Venue Context\u003c/h2\u003e\n\n\u003cp\u003eARTICLE 19 issued a press release acknowledging well-founded claims that pressure from foreign governments contributed to the Zambian decision. Local news outlets reported that the cancellation stemmed from concerns over Taiwanese delegates who might speak against China. The conference was set to take place at the Mulungushi International Conference Center, which was donated by the Chinese government.\u003c/p\u003e\n\n\u003cp\u003eA College of William \u0026amp; Mary research lab confirmed that China provided a $30 million grant for the venue\u0026rsquo;s construction. While Recorded Future News could not independently verify all assertions, the financial ties between the venue and Beijing are documented.\u003c/p\u003e\n\n\u003ch2 id=\"domestic-digital-rights-environment\"\u003eDomestic Digital Rights Environment\u003c/h2\u003e\n\n\u003cp\u003eZambia has been actively cracking down on freedom of expression in recent years. Lawmakers recently passed legislation that human rights advocates argue severely limits free speech and facilitates government surveillance. Freedom House’s latest report classified Zambia as “partly free” and noted that the government has jailed critics for online speech.\u003c/p\u003e\n\n\u003cp\u003eThe cancellation of RightsCon aligns with this broader trend of restricting digital activism and independent discourse.\u003c/p\u003e\n\n\u003ch2 id=\"international-reaction\"\u003eInternational Reaction\u003c/h2\u003e\n\n\u003cp\u003eThe shutdown has drawn sharp criticism from global civil society leaders. David Kaye, a former United Nations Special Rapporteur on freedom of expression, condemned the decision as a serious attack on both local and international civil society. He emphasized that canceling the event at such a late stage, with thousands of people already traveling, was “horrible.”\u003c/p\u003e\n\n\u003cp\u003eThe news was initially reported by 404 Media and has since sparked widespread concern across the digital rights sector.\u003c/p\u003e\n","keyPoints":["Access Now canceled the RightsCon digital human rights conference in Zambia days before its scheduled start due to government intervention over its digital freedoms theme.","Zambian officials cited incomplete security clearances and a need for additional time to align the event with national procedures and diplomatic protocols.","Reports indicate the cancellation may have been influenced by concerns over Taiwanese delegates speaking against China at a venue funded by a $30 million Chinese government grant.","The decision occurs amid a broader crackdown on free expression in Zambia, including recent legislation that human rights advocates claim limits online speech and enables government surveillance.","Thousands of delegates from over 150 countries were en route to the event when the cancellation was announced, drawing criticism from global human rights organizations."],"insights":["The conference venue's $30 million Chinese government grant, combined with planned discussions involving Taiwanese delegates, demonstrates how foreign-funded infrastructure can be leveraged to suppress specific geopolitical narratives at hosted events.","Officials cited \"incomplete security clearances\" and \"diplomatic protocols\" to justify the cancellation, illustrating how administrative procedural controls can be weaponized to abruptly halt digital rights gatherings without substantive legal cause.","Recent Zambian cyber legislation, which facilitates government surveillance and restricts online speech, establishes a legal framework that enables preemptive shutdowns of digital freedom conferences under national security justifications."],"referencedReports":[{"title":"Freedom of the Net 2025 Report","url":"https://freedomhouse.org/country/zambia/freedom-net/2025","publisher":"Freedom House","context":"The article cites this report as the source for Freedom House's assessment that Zambia is ranked as 'partly free' based on its human rights and internet freedom records."},{"title":"China Foreign Investment Project Data","url":"https://china.aiddata.org/projects/57297","publisher":"College of William \u0026 Ma // Renders the dismissed card flying off-screen as a non-interactive overlay.

function FlyingCard({ article, startDx, startDy }) {

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);

  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
