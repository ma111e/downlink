<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":8,"title":"PyTorch Lightning Compromised in PyPI Supply Chain Attack to Steal Credentials","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/pytorch-lightning-compromised-in-pypi.html","time":"16:31","priority":"MUST READ","score":95,"group":"Y","groupColor":"#38bdf8","tldr":"PyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a supply chain attack to harvest credentials and propagate malware, requiring users to immediately downgrade to 2.6.1 and rotate exposed secrets.","briefOverview":"\u003cp\u003ePyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a PyPI supply chain attack to steal developer credentials and propagate malware. The malicious packages automatically execute upon import, downloading a JavaScript runtime that harvests GitHub tokens and injects worm-like payloads into repository branches. The campaign is linked to the Mini Shai-Hulud incident and threat actor TeamPCP, who also targeted Intercom and SAP packages.\u003c/p\u003e\n\n\u003cp\u003eMaintainers have quarantined the affected versions and advised users to downgrade to 2.6.1 while rotating exposed credentials. The attack silently overwrites files and impersonates Anthropic\u0026rsquo;s Claude Code in every poisoned commit to maintain persistence.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors compromised the popular Python framework PyTorch Lightning by publishing two malicious versions, 2.6.2 and 2.6.3, on April 30, 2026. PyPI administrators have since quarantined the project to halt the credential theft campaign. The attack extends the Mini Shai-Hulud supply chain incident that previously targeted SAP-related npm packages.\u003c/p\u003e\n\n\u003cp\u003eOnce installed, the package automatically runs a hidden downloader upon module import without requiring any user interaction. This downloader fetches the Bun JavaScript runtime and executes an 11-megabyte obfuscated payload designed to harvest credentials. The malware specifically validates stolen GitHub tokens against a public API endpoint before using them to inject worm-like payloads into up to fifty repository branches.\u003c/p\u003e\n\n\u003cp\u003eEvery poisoned commit is authored using a hardcoded identity that impersonates Anthropic\u0026rsquo;s Claude Code. The operation silently overwrites existing files and creates new ones without performing any pre-checks. Security researchers from Aikido, OX Security, Socket, and StepSecurity have documented the attack chain and payload behavior.\u003c/p\u003e\n\n\u003cp\u003eThe project maintainers acknowledged the compromise and are investigating the root cause, which likely stems from a breached GitHub account. In a separate advisory, they confirmed the affected versions contain credential-harvesting functionality. Users are strongly advised to block versions 2.6.2 and 2.6.3, downgrade to the clean 2.6.1 release, and rotate all exposed credentials.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is attributed to TeamPCP, a threat actor known for compromising Bitwarden, Checkmarx, and LiteLLM. TeamPCP recently launched a dark web onion site after being suspended from X for violating platform rules. They claimed affiliation with the LAPSUS$ group and denied using VECT encryption tools.\u003c/p\u003e\n\n\u003cp\u003eIn a related development, Intercom version 7.0.4 was compromised as part of the same campaign. The Intercom package uses a preinstall hook to trigger credential-stealing malware, mirroring the modus operandi of the SAP CAP campaign.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003ePyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a sophisticated supply chain attack targeting credential theft and malware propagation. PyPI administrators quarantined the project on April 30, 2026, after the malicious releases were published. The incident is assessed as an extension of the Mini Shai-Hulud campaign and is attributed to threat actor TeamPCP.\u003c/p\u003e\n\n\u003ch3 id=\"attack-mechanics-and-payload-execution\"\u003eAttack Mechanics and Payload Execution\u003c/h3\u003e\n\n\u003cp\u003eThe compromised packages contain a hidden \u003ccode\u003e_runtime\u003c/code\u003e directory housing a downloader and an obfuscated JavaScript payload. The execution chain triggers automatically upon module import without requiring any additional user action. The attack proceeds through a precise sequence of operations. A Python script named \u003ccode\u003estart.py\u003c/code\u003e downloads and executes the Bun JavaScript runtime. The runtime then processes an 11-megabyte obfuscated payload (\u003ccode\u003erouter_runtime.js\u003c/code\u003e) designed for comprehensive credential harvesting. Harvested GitHub tokens are validated against the \u003ccode\u003eapi.github.com/user\u003c/code\u003e endpoint before being leveraged to inject worm-like payloads into up to 50 repository branches.\u003c/p\u003e\n\n\u003ch3 id=\"persistence-and-propagation-vectors\"\u003ePersistence and Propagation Vectors\u003c/h3\u003e\n\n\u003cp\u003eThe malware employs stealthy persistence mechanisms and cross-environment propagation strategies. The operation functions as an upsert, silently overwriting existing files and creating new ones without performing any pre-checks. Every poisoned commit is authored using a hardcoded identity designed to impersonate Anthropic\u0026rsquo;s Claude Code. The malware also implements an npm-based propagation vector that modifies local developer environments. It injects a postinstall hook into the \u003ccode\u003epackage.json\u003c/code\u003e file, increments the patch version number, and repacks \u003ccode\u003e.tgz\u003c/code\u003e tarballs. If developers publish tampered packages from their local systems, the malware distributes to downstream users.\u003c/p\u003e\n\n\u003ch3 id=\"attribution-and-related-campaigns\"\u003eAttribution and Related Campaigns\u003c/h3\u003e\n\n\u003cp\u003eSecurity researchers from Aikido Security, OX Security, Socket, and StepSecurity have analyzed the attack and linked it to known threat actors. TeamPCP is identified as the primary threat actor behind this operation and the broader Mini Shai-Hulud campaign. The group recently launched a dark web onion site after being suspended from X for violating platform rules. They claimed affiliation with the LAPSUS$ group and denied using VECT encryption tools, asserting ownership of a private locker called CipherForce. In a related development, Intercom version 7.0.4 was compromised as part of the same campaign. The Intercom package uses a preinstall hook to trigger credential-stealing malware, mirroring the modus operandi of the SAP CAP campaign.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-advisory\"\u003eMitigation and Advisory\u003c/h3\u003e\n\n\u003cp\u003eThe PyTorch Lightning maintainers have acknowledged the compromise and are actively investigating the root cause. Indications point to a compromised GitHub account as the initial entry point. A security advisory confirms that the affected versions introduced functionality consistent with a credential harvesting mechanism. Users are advised to take immediate containment actions. Block and uninstall PyTorch Lightning versions 2.6.2 and 2.6.3 from all systems. Downgrade to the last known clean version, 2.6.1. Rotate all credentials and tokens exposed in affected development environments. Monitor repository branches for unauthorized commits authored under the Claude Code identity.\u003c/p\u003e\n","keyPoints":["PyTorch Lightning versions 2.6.2 and 2.6.3 were compromised and quarantined by PyPI administrators to prevent credential theft via obfuscated JavaScript payloads.","The malicious packages automatically execute a downloader that installs the Bun runtime to harvest GitHub tokens and inject worm-like payloads into developer repositories.","Users are advised to immediately remove the affected versions, downgrade to the clean version 2.6.1, and rotate any credentials exposed in their environments.","The attack is assessed as part of the Mini Shai-Hulud supply chain incident linked to threat actor TeamPCP, which also compromised Intercom and SAP packages."],"insights":["The malware executes automatically upon module import without requiring additional user action, bypassing typical installation-stage defenses.","The attack propagates through npm by hijacking the postinstall hook in package.json and repacking .tgz tarballs, turning local development environments into distribution vectors for downstream users.","Every poisoned commit is authored using a hardcoded identity impersonating Anthropic's Claude Code, and files are silently overwritten without pre-checks, complicating forensic attribution and detection."],"referencedReports":[{"title":"pytorch-lightning-pypi-compromise-mini-shai-hulud","url":"https://www.aikido.dev/blog/pytorch-lightning-pypi-compromise-mini-shai-hulud","publisher":"Aikido Security","context":"Cited as a source detailing the PyPI compromise and its connection to the Mini Shai-Hulud supply chain incident."},{"title":"lightning-python-package-shai-hulud-supply-chain-attack/","url":"https://www.ox.security/blog/lightning-python-package-shai-hulud-supply-chain-attack/","publisher":"OX Security","context":"Cited as a source analyzing the attack's operational details and supply chain impact."},{"title":"lightning-pypi-package-compromised","url":"https://socket.dev/blog/lightning-pypi-package-compromised","publisher":"Socket","context":"Cited as a source explaining the malicious package's hidden runtime directory and automatic execution chain upon module import."},{"title":"lightning-obfuscated-javascript-credential-stealer-bundled-in-pypi-wheel","url":"https://www.stepsecurity.io/blog/lightning-obfuscated-javascript-credential-stealer-bundled-in-pypi-wheel","publisher":"StepSecurity","context":"Cited as a source identifying the obfuscated JavaScript payload and the credential-harvesting mechanism."},{"title":"intercom-s-npm-package-compromised-in-supply-chain-attack","url":"https://socket.dev/blog/intercom-s-npm-package-compromised-in-supply-chain-attack","publisher":"Socket","context":"Cited as a source confirming the Intercom npm package compromise and its technical overlap with the SAP CAP campaign."}],"body":"\u003cp\u003ePyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a PyPI supply chain attack to steal developer credentials and propagate malware. The malicious packages automatically execute upon import, downloading a JavaScript runtime that harvests GitHub tokens and injects worm-like payloads into repository branches. The campaign is linked to the Mini Shai-Hulud incident and threat actor TeamPCP, who also targeted Intercom and SAP packages.\u003c/p\u003e\n\n\u003cp\u003eMaintainers have quarantined the affected versions and advised users to downgrade to 2.6.1 while rotating exposed credentials. The attack silently overwrites files and impersonates Anthropic\u0026rsquo;s Claude Code in every poisoned commit to maintain persistence.\u003c/p\u003e\n"},{"n":9,"title":"lightning: Obfuscated JavaScript Credential Stealer Bundled in PyPI Wheel","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/lightning-obfuscated-javascript-credential-stealer-bundled-in-pypi-wheel","time":"15:56","priority":"MUST READ","score":95,"group":"Y","groupColor":"#38bdf8","tldr":"Compromised versions of the widely used lightning Python package silently execute a malicious JavaScript payload that steals credentials, exfiltrates data via GitHub, and poisons downstream npm packages.","briefOverview":"\u003cp\u003eOn April 30, 2026, a supply chain compromise was identified in versions 2.6.2 and 2.6.3 of the widely used lightning PyPI package. Upon import, the malicious wheels silently execute a hidden JavaScript payload that downloads the Bun runtime and runs an 11 MB obfuscated script. This payload steals tokens, credentials, environment variables, and cloud secrets from the victim\u0026rsquo;s machine.\u003c/p\u003e\n\n\u003cp\u003eIt then abuses the victim\u0026rsquo;s GitHub credentials to commit the exfiltrated data directly to repositories. Additionally, the malware infects npm package tarballs on the developer\u0026rsquo;s machine to spread the attack further. The last known clean release is version 2.6.1 from January 30, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe attacker likely holds both PyPI publishing credentials and a GitHub token, as evidenced by the rapid closure of a public issue reporting the attack. This campaign follows the Shai-Hulud pattern of downloading external runtimes at execution time to bypass static analysis. Security tools like StepSecurity\u0026rsquo;s Harden-Runner can detect the underlying process-level memory dumping used by this family of attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe lightning package, maintained by Lightning AI, is a foundational deep learning framework that receives hundreds of thousands of daily downloads across research and production environments. Compromised versions 2.6.2 and 2.6.3 were published on January 30, 2026, and contain a hidden \u003ccode\u003e_runtime/\u003c/code\u003e directory within the wheel files. This directory houses a Python script that silently downloads the Bun JavaScript runtime from GitHub during package import.\u003c/p\u003e\n\n\u003cp\u003eA daemon thread then executes an 11 MB heavily obfuscated JavaScript file named \u003ccode\u003erouter_runtime.js\u003c/code\u003e without producing any visible output or errors. Static analysis of the Python wheel cannot reveal the payload\u0026rsquo;s true capabilities because the malicious logic is entirely contained within the fetched JavaScript file. Once executed, the payload scans for and exfiltrates tokens, API keys, authentication material, environment variables, and cloud secrets.\u003c/p\u003e\n\n\u003cp\u003eIt leverages the victim\u0026rsquo;s own GitHub credentials to encode and commit the stolen data directly to repositories. The malware also injects malicious code into npm package tarballs on the local machine, enabling the compromise to propagate to downstream JavaScript consumers. The attack follows the Shai-Hulud pattern, a supply chain technique first documented in a November 2025 npm compromise that affected hundreds of packages.\u003c/p\u003e\n\n\u003cp\u003eIndicators of a token-based takeover are evident in the project\u0026rsquo;s GitHub repository, where an issue reporting the attack was rapidly closed by suspicious responses. StepSecurity\u0026rsquo;s Harden-Runner platform detects this threat by monitoring process-level behavior, specifically flagging unauthorized memory access attempts that dump the GitHub Actions runner\u0026rsquo;s address space. Full payload analysis remains ongoing, and the organization plans to update its findings as new details emerge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-and-background\"\u003eOverview and Background\u003c/h2\u003e\n\n\u003cp\u003eThe lightning package, developed by Lightning AI, serves as a widely adopted high-level interface for training PyTorch models. It functions as a critical dependency across research environments, MLOps pipelines, and production AI systems. The framework routinely processes highly sensitive infrastructure secrets, including GPU cluster credentials, cloud IAM tokens, Hugging Face API keys, and Weights \u0026amp; Biases tokens.\u003c/p\u003e\n\n\u003cp\u003eThis high-value target profile makes the package a prime objective for credential-stealing campaigns. Supply chain compromise was identified in PyPI versions 2.6.2 and 2.6.3, which bundle a concealed \u003ccode\u003e_runtime/\u003c/code\u003e directory. This directory contains a Python script that silently downloads the Bun JavaScript runtime binary from GitHub upon package import.\u003c/p\u003e\n\n\u003ch2 id=\"attack-vector-and-execution-mechanism\"\u003eAttack Vector and Execution Mechanism\u003c/h2\u003e\n\n\u003cp\u003eA background daemon thread immediately executes an 11 MB heavily obfuscated JavaScript payload named \u003ccode\u003erouter_runtime.js\u003c/code\u003e. The thread operates with suppressed standard output and error streams, ensuring the process runs invisibly while the victim\u0026rsquo;s application continues without errors. This technique aligns with the Shai-Hulud supply chain attack family, which relies on downloading external runtimes at execution time to circumvent static analysis.\u003c/p\u003e\n\n\u003ch2 id=\"payload-capabilities-and-data-exfiltration\"\u003ePayload Capabilities and Data Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eStatic analysis of the JavaScript payload reveals extensive scanning logic targeting system processes and authentication material. The malware confirms the following malicious capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCredential Theft:\u003c/strong\u003e The script harvests tokens, API keys, authentication material, environment variables, and cloud secrets from the host environment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub API Abuse:\u003c/strong\u003e Exfiltrated data is encoded and committed to repositories using the victim\u0026rsquo;s own GitHub credentials, effectively masking the theft as legitimate repository activity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003enpm Tarball Poisoning:\u003c/strong\u003e The payload injects malicious code into npm package tarballs on the developer\u0026rsquo;s machine, allowing the compromise to spread to downstream JavaScript consumers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-and-account-takeover\"\u003eIndicators of Compromise and Account Takeover\u003c/h2\u003e\n\n\u003cp\u003eThe project\u0026rsquo;s GitHub repository exhibits clear signs of a token-based account compromise coinciding with the malicious releases. Issue #21689, which publicly surfaced the attack, was rapidly closed by suspicious responses, indicating the attacker maintains active administrative control. This behavior suggests the threat actor successfully obtained both PyPI publishing credentials and a GitHub token, bypassing direct build-system compromises in favor of credential-based access.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-security-recommendations\"\u003eDetection and Security Recommendations\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity\u0026rsquo;s Harden-Runner platform identifies this threat through process-layer monitoring. The detection mechanism specifically flags unauthorized memory access attempts where the malware scans \u003ccode\u003e/proc\u003c/code\u003e to locate the GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process. By dumping the runner\u0026rsquo;s readable memory via \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e, the malware extracts secrets stored in the runner\u0026rsquo;s address space, triggering a suspicious process event alert.\u003c/p\u003e\n\n\u003cp\u003eThe last verified clean release remains version 2.6.1, published on January 30, 2026. Full payload analysis is ongoing, and additional technical details will be published as the investigation progresses.\u003c/p\u003e\n","keyPoints":["Versions 2.6.2 and 2.6.3 of the lightning PyPI package silently execute an 11 MB obfuscated JavaScript payload upon import.","The malicious payload steals tokens, credentials, environment variables, and cloud secrets while using the victim's GitHub credentials to commit exfiltrated data.","The malware infects npm package tarballs on the developer's machine to spread the attack to downstream consumers.","Static analysis of the Python wheel cannot reveal the payload's capabilities because the malicious logic resides entirely in a JavaScript file fetched at runtime."],"insights":["The attack executes via a daemon thread with suppressed stdout and stderr, allowing it to run silently in the background without triggering standard console logging or error monitoring.","The malware infects npm package tarballs on the developer's machine, turning a Python dependency compromise into a vector for spreading malicious code to downstream JavaScript consumers.","Static analysis of the Python wheel cannot reveal the payload's capabilities because the malicious logic is entirely contained in a JavaScript file fetched and executed at runtime, necessitating behavioral or process-level detection."],"referencedReports":[],"body":"\u003cp\u003eOn April 30, 2026, a supply chain compromise was identified in versions 2.6.2 and 2.6.3 of the widely used lightning PyPI package. Upon import, the malicious wheels silently execute a hidden JavaScript payload that downloads the Bun runtime and runs an 11 MB obfuscated script. This payload steals tokens, credentials, environment variables, and cloud secrets from the victim\u0026rsquo;s machine.\u003c/p\u003e\n\n\u003cp\u003eIt then abuses the victim\u0026rsquo;s GitHub credentials to commit the exfiltrated data directly to repositories. Additionally, the malware infects npm package tarballs on the developer\u0026rsquo;s machine to spread the attack further. The last known clean release is version 2.6.1 from January 30, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe attacker likely holds both PyPI publishing credentials and a GitHub token, as evidenced by the rapid closure of a public issue reporting the attack. This campaign follows the Shai-Hulud pattern of downloading external runtimes at execution time to bypass static analysis. Security tools like StepSecurity\u0026rsquo;s Harden-Runner can detect the underlying process-level memory dumping used by this family of attacks.\u003c/p\u003e\n"},{"n":10,"title":"Shai-Hulud Worm Pivots to Multi-Cloud: intercom-client@7.0.4 Hijacked — 361,000 Weekly Downloads, AWS, GCP, and Azure Credentials Now in Scope","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/shai-hulud-worm-pivots-to-multi-cloud-intercom-client-hijacked","time":"17:14","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"The Shai-Hulud worm compromised the intercom-client npm package, escalating its payload to steal multi-cloud credentials from AWS, GCP, and Azure while propagating through hijacked CI/CD pipelines. Immediate action requires uninstalling the malicious version, rotating all cloud and registry tokens, and enforcing strict network controls in build environments.","briefOverview":"\u003cp\u003eThe Shai-Hulud worm compromised the official Intercom Node.js SDK by hijacking a GitHub Actions OIDC publishing pipeline to publish a malicious version of intercom-client@7.0.4. This release introduced a preinstall hook that silently executes a Bun-based loader and an obfuscated credential stealer.\u003c/p\u003e\n\n\u003cp\u003eThe payload has expanded its scope to harvest AWS, GCP, and Azure credentials alongside traditional GitHub and npm tokens. Exfiltration occurs through the victim\u0026rsquo;s own GitHub account using private repositories, bypassing standard network defenses.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers detected the compromise through anomalous package size increases, missing SLSA attestations, and the introduction of new install lifecycle hooks. Immediate remediation requires uninstalling the malicious version, rotating all cloud and registry tokens, and enforcing strict network controls in build environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTwenty-nine hours after two other npm packages were compromised, the Shai-Hulud worm targeted intercom-client@7.0.4, the official Node.js SDK for the Intercom messaging platform. The malicious version was published via a hijacked GitHub Actions OIDC pipeline and carries over 361,000 weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eUnlike previous releases, this version introduces a preinstall hook that runs node setup.mjs before any installation logic. The loader downloads a specific version of the Bun runtime and uses it to execute an 11.7 MB obfuscated payload named router_runtime.js.\u003c/p\u003e\n\n\u003cp\u003eThis payload daemonizes itself to break process tree correlation and expands credential collection to include AWS instance credentials, GCP service account tokens, Azure connection strings, and private keys. Harvested secrets are exfiltrated through the victim\u0026rsquo;s GitHub account by creating private repositories via the api.github.com endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe malware also uses stolen npm tokens to automatically propagate itself to other packages in the supply chain. StepSecurity\u0026rsquo;s AI Package Analyst flagged the release within minutes by detecting a new install hook, a threefold size increase, and the complete absence of SLSA provenance attestations.\u003c/p\u003e\n\n\u003cp\u003eAttribution points to the Shai-Hulud and TeamPCP campaign based on shared toolchain fingerprints, identical daemonization techniques, and consistent exfiltration methods. Organizations are advised to downgrade to version 7.0.3, rotate all compromised credentials, pin exact package versions, and enforce \u0026ndash;ignore-scripts in CI/CD environments.\u003c/p\u003e\n\n\u003cp\u003eNetwork defenses must be supplemented with step-level egress lockdown to block unauthorized outbound connections during package installation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview \u0026amp; Compromise Vector\u003c/strong\u003e\nThe Shai-Hulud worm successfully compromised intercom-client@7.0.4, the official Node.js SDK for the Intercom customer messaging platform. The malicious release was published 29 hours after prior compromised packages and targets over 361,000 weekly downloads. Attackers hijacked a GitHub Actions OIDC publishing pipeline to bypass traditional supply chain controls. The compromised version introduces a preinstall hook that executes node setup.mjs before any standard installation steps. This represents a significant escalation from previous releases, which contained no install lifecycle hooks.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAttack Chain \u0026amp; Payload Details\u003c/strong\u003e\nThe malware execution follows a four-stage chain designed for evasion and broad credential harvesting. Stage one utilizes a Bun-based loader that downloads and executes a runtime to bypass EDR rules tuned for Node.js processes. Stage two deploys an 11.7 MB obfuscated JavaScript file that daemonizes itself using environment variables to break process tree correlation.\u003c/p\u003e\n\n\u003cp\u003eThe payload now sweeps for AWS instance credentials via IMDS, GCP service account tokens, Azure connection strings, private keys, and generic API patterns. Stage three routes exfiltration exclusively through the victim\u0026rsquo;s own GitHub account by creating private repositories via the api.github.com API. Stage four utilizes stolen npm tokens to enumerate packages with publish access and automatically propagate the worm to new repositories.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetection \u0026amp; Attribution\u003c/strong\u003e\nSecurity researchers identified the compromise through multiple anomalous signals. The package size tripled from 6 MB to 17.8 MB, and the release completely dropped SLSA v1 provenance attestations that were present in all prior versions. The introduction of a previously unused install hook and undocumented files triggered immediate critical alerts.\u003c/p\u003e\n\n\u003cp\u003eAttribution conclusively links the release to the Shai-Hulud and TeamPCP campaign. Evidence includes a shared PBKDF2-backed cipher appearing 232 times, identical daemonization flags, consistent regex patterns for token extraction, and the use of the same OIDC publishing identity across multiple waves.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eIndicators of Compromise\u003c/strong\u003e\nThe malicious package is identified as intercom-client@7.0.4, while intercom-client@7.0.3 remains safe. Key file artifacts include setup.mjs (6.7 KB loader) and router_runtime.js (11.7 MB obfuscated payload). Network indicators involve outbound connections to api.github.com for C2, github.com/oven-sh/bun for runtime downloads, and internal cloud metadata endpoints for credential theft.\u003c/p\u003e\n\n\u003cp\u003eCode markers include the __DAEMONIZED environment variable, hex-indexed string arrays, and specific regex patterns for cloud and registry tokens. The payload also targets Vercel and generic CI environments to expand its blast radius.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation \u0026amp; Defense\u003c/strong\u003e\nImmediate remediation requires uninstalling the compromised version and reinstalling the safe patch with script execution disabled. Organizations must rotate all GitHub tokens, npm publish tokens, and any cloud credentials accessible to affected CI/CD pipelines.\u003c/p\u003e\n\n\u003cp\u003eLong-term defenses include pinning exact package versions, enforcing \u0026ndash;ignore-scripts across all build environments, and verifying SLSA attestations before installation. Network-layer protections must implement step-level egress lockdown to block unexpected outbound connections during package installation steps.\u003c/p\u003e\n","keyPoints":["The intercom-client@7.0.4 npm package was compromised via a hijacked GitHub Actions OIDC publishing pipeline.","The malicious release injects a preinstall hook that executes an obfuscated payload to harvest AWS, GCP, and Azure credentials along with GitHub and npm tokens.","Stolen credentials are exfiltrated through the victim's own GitHub account by creating private repositories via the api.github.com endpoint.","The malware propagates across the supply chain by using stolen npm tokens to automatically publish worm variants to other packages.","Security teams can detect the compromise by identifying new install lifecycle hooks, abnormal package size increases, and missing SLSA provenance attestations."],"insights":["The malware deliberately downloads and executes Bun instead of Node.js to bypass EDR and SIEM rules that specifically monitor suspicious node child processes during package installation.","Exfiltration routes exclusively through universally allowlisted domains like api.github.com and internal cloud metadata endpoints, rendering traditional network monitoring ineffective and requiring step-level egress lockdown to block.","The payload breaks process tree correlation by daemonizing into a detached child process and writing a PID lock to /tmp, obscuring the forensic link between the npm install command and credential theft.","The malicious release completely drops SLSA v1 provenance attestations present in all prior legitimate versions, providing a reliable integrity signal for automated supply chain scanners."],"referencedReports":[],"body":"\u003cp\u003eThe Shai-Hulud worm compromised the official Intercom Node.js SDK by hijacking a GitHub Actions OIDC publishing pipeline to publish a malicious version of intercom-client@7.0.4. This release introduced a preinstall hook that silently executes a Bun-based loader and an obfuscated credential stealer.\u003c/p\u003e\n\n\u003cp\u003eThe payload has expanded its scope to harvest AWS, GCP, and Azure credentials alongside traditional GitHub and npm tokens. Exfiltration occurs through the victim\u0026rsquo;s own GitHub account using private repositories, bypassing standard network defenses.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers detected the compromise through anomalous package size increases, missing SLSA attestations, and the introduction of new install lifecycle hooks. Immediate remediation requires uninstalling the malicious version, rotating all cloud and registry tokens, and enforcing strict network controls in build environments.\u003c/p\u003e\n"},{"n":2,"title":"France investigates 15-year-old over alleged hack of national ID agency","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/france-investigates-teen-over-national-id-agency-hack","time":"16:28","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"French authorities detained a 15-year-old suspect suspected of breaching the National Agency for Secure Documents and attempting to sell 12 to 18 million records of sensitive citizen data. The minor faces up to seven years in prison for unauthorized access and data extraction from the critical government platform.","briefOverview":"\u003cp\u003eFrench authorities have detained a 15-year-old suspect suspected of breaching the National Agency for Secure Documents. The minor is accused of attempting to sell between 12 million and 18 million records of citizen data on underground cybercriminal forums. Paris prosecutors were alerted after the stolen information appeared on underground marketplaces earlier this month. The suspect allegedly operated under the pseudonym \u0026ldquo;breach3d\u0026rdquo; to advertise the compromised database. French law allows for penalties of up to seven years in prison and a €300,000 fine for unauthorized access and data extraction. Prosecutors have formally charged the minor and placed him under judicial supervision. The breach potentially exposed sensitive personal information, including login credentials, names, email addresses, and postal addresses. This incident follows a recent string of high-profile cyberattacks targeting French public institutions and private organizations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFrench authorities detained a 15-year-old suspect on April 25 for allegedly breaching the National Agency for Secure Documents. The agency processes applications for passports, national identity cards, residence permits, and driver’s licenses. Prosecutors believe the minor attempted to sell between 12 million and 18 million records of personal data. The suspect advertised the compromised information under the online pseudonym \u0026ldquo;breach3d\u0026rdquo; on cybercriminal forums. The Paris cybercrime unit was alerted after the data surfaced on underground marketplaces earlier this month. The agency subsequently confirmed unusual network activity and verified that the circulating information appeared authentic. Authorities opened an investigation into the fraudulent access and extraction of data from a state-run automated processing system. Under French law, these offenses carry penalties of up to seven years in prison and a €300,000 fine. Prosecutors recently requested that the minor be formally charged and placed under judicial supervision. The suspect faces allegations including unauthorized access, maintaining access, extracting data, and possessing intrusion tools. Potentially compromised records contain login credentials, names, email addresses, birth dates, and unique account identifiers. Additional personal details such as postal addresses, phone numbers, and places of birth may also be affected. The compromised platform also oversees a new government age-verification app designed to restrict social network access for children under 15. This investigation occurs amid a broader wave of cyberattacks across France. Earlier this month, authorities arrested a 20-year-old suspect known as \u0026ldquo;HexDex\u0026rdquo; for targeting public institutions and private organizations. In January, police detained an 18-year-old accused of leaking and selling data belonging to over one million members of the French Shooting Federation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview and Suspect Details\u003c/strong\u003e\nFrench authorities detained a 15-year-old suspect on April 25 regarding an alleged breach of the National Agency for Secure Documents (ANTS). The agency is responsible for processing applications for passports, national identity cards, residence permits, and driver’s licenses. Prosecutors allege that the minor attempted to sell between 12 million and 18 million records of citizen data. The suspect reportedly operated online under the pseudonym \u0026ldquo;breach3d\u0026rdquo; to advertise the compromised database on cybercriminal forums.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovery and Investigation\u003c/strong\u003e\nThe Paris cybercrime unit was alerted to the intrusion after the stolen data appeared on underground marketplaces earlier this month. ANTS subsequently confirmed unusual activity on its network and acknowledged that the circulating information appeared authentic. Authorities opened a formal investigation into the fraudulent access and extraction of data from a state-run automated personal data processing system. Under current French legislation, these offenses carry penalties of up to seven years in prison and a €300,000 fine. Prosecutors have formally requested that the minor be charged and placed under judicial supervision. The suspect faces allegations involving unauthorized access, maintaining access, extracting and transmitting data, and possessing specialized intrusion tools.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCompromised Data and System Impact\u003c/strong\u003e\nThe breach potentially exposed multiple categories of sensitive personal information tied to user accounts. Compromised data includes login credentials, names, email addresses, birth dates, and unique account identifiers. Authorities also warn that additional personal details, such as postal addresses, phone numbers, and places of birth, may be affected. Beyond standard identity documents, ANTS manages a new government age-verification application intended to prevent children under 15 from accessing social networks. The integrity of this age-verification system is now potentially compromised by the leaked data.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eSuspected Cyber Activities\u003c/strong\u003e\nProsecutors allege the suspect engaged in a wide range of cyber activities linked to the state system attacks. Specific allegations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthorized access to the automated personal data processing system.\u003c/li\u003e\n\u003cli\u003eMaintaining persistent access to the compromised network.\u003c/li\u003e\n\u003cli\u003eExtracting and transmitting millions of citizen records.\u003c/li\u003e\n\u003cli\u003ePossessing specialized tools designed to facilitate cyber intrusions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eBroader Cybersecurity Context in France\u003c/strong\u003e\nThis incident represents the latest in a series of high-profile data breach investigations across France. Earlier this month, authorities arrested a 20-year-old suspect known online as \u0026ldquo;HexDex,\u0026rdquo; who is believed to have conducted dozens of intrusions targeting public institutions, sports federations, and private organizations. In January, police detained an 18-year-old accused of leaking and selling the personal data of more than one million members of the French Shooting Federation. These cases highlight a growing trend of youth-led cyberattacks targeting critical French digital infrastructure and sensitive public databases.\u003c/p\u003e\n","keyPoints":["French authorities detained a 15-year-old suspect suspected of breaching the National Agency for Secure Documents and attempting to sell between 12 million and 18 million records of citizen data.","The suspect advertised the compromised data under the pseudonym \"breach3d\" on underground cybercriminal forums.","French prosecutors are investigating the intrusion, which carries penalties of up to seven years in prison and a €300,000 fine.","The breach potentially exposed sensitive personal information including login credentials, names, email addresses, birth dates, postal addresses, and phone numbers."],"insights":["The breach exposed login credentials and unique account identifiers alongside PII, creating a direct pathway for credential-based account takeover attacks rather than simple identity theft.","The compromised agency also manages a government age-verification app designed to block minors from social networks, meaning the data leak could directly undermine the system's ability to enforce age restrictions.","Detection of the intrusion was triggered by the suspect advertising the stolen data volume on underground cybercriminal forums, demonstrating how marketplace listings serve as a critical early warning signal for law enforcement."],"referencedReports":[],"body":"\u003cp\u003eFrench authorities have detained a 15-year-old suspect suspected of breaching the National Agency for Secure Documents. The minor is accused of attempting to sell between 12 million and 18 million records of citizen data on underground cybercriminal forums. Paris prosecutors were alerted after the stolen information appeared on underground marketplaces earlier this month. The suspect allegedly operated under the pseudonym \u0026ldquo;breach3d\u0026rdquo; to advertise the compromised database. French law allows for penalties of up to seven years in prison and a €300,000 fine for unauthorized access and data extraction. Prosecutors have formally charged the minor and placed him under judicial supervision. The breach potentially exposed sensitive personal information, including login credentials, names, email addresses, and postal addresses. This incident follows a recent string of high-profile cyberattacks targeting French public institutions and private organizations.\u003c/p\u003e\n"},{"n":4,"title":"What Happens in the First 24 Hours After a New Asset Goes Live","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/what-happens-in-the-first-24-hours-after-a-new-asset-goes-live/","time":"14:02","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"New internet-facing assets are typically discovered and compromised by automated attackers within hours of going live, making continuous external attack surface monitoring essential to identify unknown exposures before they result in breaches.","briefOverview":"\u003cp\u003eThe moment a new asset acquires a public IP address, automated scanning infrastructure begins cataloging it within minutes. Within the first hour, tools like Shodan and Censys index the host and collect banner information. By the sixth hour, attackers begin active enumeration and probe for management ports and TLS certificates. Between six and twelve hours, botnets launch credential stuffing, directory brute-forcing, and database probing without human intervention.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 research confirms that eighty percent of exposed cloud services are compromised within twenty-four hours. Security teams often fail to discover these assets until it is too late, as monthly attack surface changes exceed three hundred new services. Continuous external attack surface monitoring is essential to identify hidden endpoints before attackers exploit them.\u003c/p\u003e\n\n\u003cp\u003eAutomated discovery tools must feed directly into human-led pentesting to validate exploitability and determine real business impact. Relying on faster patching alone cannot solve the problem of unknown internet-facing assets.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWhen a new asset goes live, a relentless automated clock starts immediately. Security teams typically receive no notification when a cloud instance spins up or a firewall rule opens a port. Within five to sixty minutes, automated scanning infrastructure sweeps the public internet and catalogs the new host.\u003c/p\u003e\n\n\u003cp\u003eTools like Shodan, Censys, and ShadowServer index the asset, grab banner information, and compare response signatures against vulnerability databases. By the first six hours, attackers begin active enumeration, looking for service versions, open management ports, and TLS certificates that can pivot to related domains. Between six and twelve hours, passive discovery shifts to active targeting.\u003c/p\u003e\n\n\u003cp\u003eBotnets and automated tooling launch credential stuffing against SSH and RDP, run directory brute-forcing against web services, and probe databases like Elasticsearch and Redis for unauthenticated access. Unit 42 researchers deployed 320 honeypots across cloud providers and found that eighty percent were compromised within twenty-four hours. The average organization’s external attack surface changes by more than three hundred new services monthly, with over twenty percent turning over regularly.\u003c/p\u003e\n\n\u003cp\u003eMany breaches stem from assets the security team did not know were publicly accessible. A recent example showed a hidden backend API buried in a JavaScript bundle that exposed customer data, credentials, and internal network information without authentication. Continuous external attack surface monitoring is required to find these exposures before attackers do.\u003c/p\u003e\n\n\u003cp\u003eAutomated discovery tools must feed directly into human-led pentesting to validate exploitability and determine real business impact. Faster patching cannot solve the problem of unknown assets; attacker-perspective visibility is the only effective defense.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"the-first-24-hours-a-technical-timeline\"\u003eThe First 24 Hours: A Technical Timeline\u003c/h3\u003e\n\n\u003cp\u003eThe moment a new asset acquires a public IP address, an automated clock begins ticking. Security teams typically receive no notification when a developer pushes a cloud instance, a misconfigured firewall rule opens a port, or a vendor portal spins up on an unflagged subdomain. Within five to sixty minutes, automated scanning infrastructure sweeps the entire public internet.\u003c/p\u003e\n\n\u003cp\u003ePlatforms like Shodan, Censys, and ShadowServer index the new host on a rolling basis. Within an hour, the asset’s open ports are catalogued, banner information is grabbed, and response signatures are compared against known vulnerability databases. By the first six hours, automated attack tooling begins its own reconnaissance pass.\u003c/p\u003e\n\n\u003cp\u003eEnumerators look for service versions, open management ports like RDP and SSH, and TLS certificates that can pivot to related domains and subdomains. Between six and twelve hours, passive discovery flips to active targeting. GreyNoise data shows that scanner activity spikes in this window.\u003c/p\u003e\n\n\u003cp\u003eBotnets handle credential stuffing against SSH and RDP, run directory brute-forcing against web services, and probe databases like Elasticsearch and Redis for unauthenticated access. Frameworks are tested against known CVEs without any human intervention.\u003c/p\u003e\n\n\u003ch3 id=\"compromise-and-real-world-exposure\"\u003eCompromise and Real-World Exposure\u003c/h3\u003e\n\n\u003cp\u003eUnit 42 researchers deployed 320 honeypots across cloud providers to track exposure outcomes. Eighty percent of those honeypots were compromised within twenty-four hours. For any asset running exploitable vulnerabilities, misconfigurations, or default credentials, this timeframe is all it takes for attackers to gain ownership.\u003c/p\u003e\n\n\u003cp\u003eThe average organization’s external attack surface changes by more than 300 new services every month. More than 20% of externally accessible cloud services turn over on a monthly basis. Security teams are not keeping up, and the root cause of most breach investigations traces back to the statement that they did not know the asset was on the internet.\u003c/p\u003e\n\n\u003cp\u003eA recent case study highlighted a hidden API that the internal team had no awareness of. Sprocket Security’s ASM flagged a public-facing logistics web app and analyzed its compiled JavaScript bundle. Buried in the JS file was a reference to a backend API that was live, public, and completely open.\u003c/p\u003e\n\n\u003cp\u003eHuman testers ran unauthenticated requests and pulled the following data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCustomer names, email addresses, and account notes\u003c/li\u003e\n\u003cli\u003eCleartext credentials for customer accounts\u003c/li\u003e\n\u003cli\u003eDefault device usernames and passwords\u003c/li\u003e\n\u003cli\u003eInternal network information for deployed devices\u003c/li\u003e\n\u003cli\u003eEmployee names and email addresses\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis chain from public website to JS analysis to unauthenticated data dump mirrors exactly what attacker tooling does during enumeration.\u003c/p\u003e\n\n\u003ch3 id=\"the-asm-to-pentesting-path-and-conclusion\"\u003eThe ASM-to-Pentesting Path and Conclusion\u003c/h3\u003e\n\n\u003cp\u003eDiscovering hidden assets is only the first step. Determining what is actually exploitable and assessing the real business impact requires human analysis. Sprocket Security’s approach continuously enumerates the external attack surface through ASM Community Edition.\u003c/p\u003e\n\n\u003cp\u003eWhen unexpected assets appear, such as an unflagged admin panel or an unusual certificate, the findings feed directly into human-led testing. This combination of continuous automated discovery and targeted human validation closes the gap between theoretical attack surface maps and what attackers actually see. The first-24-hours problem cannot be solved by faster patching alone.\u003c/p\u003e\n\n\u003cp\u003eIt requires continuous, attacker-perspective visibility to find assets before attackers do.\u003c/p\u003e\n","keyPoints":["Automated scanning infrastructure catalogs new public assets, open ports, and banner information within the first hour of an asset going live.","Active targeting, including credential stuffing, directory brute-forcing, and database probing, typically begins within 6 to 12 hours of exposure.","Research by Unit 42 found that 80% of exposed cloud services were compromised within 24 hours due to exploitable vulnerabilities, misconfigurations, or default credentials.","Security teams frequently fail to discover hidden assets, such as backend APIs referenced in JavaScript files, until attackers successfully exploit them."],"insights":["Attackers can map an organization’s broader infrastructure and discover related subdomains by analyzing TLS certificates on a single newly exposed asset.","Unauthenticated backend APIs are frequently exposed as unintended references buried in frontend JavaScript bundles rather than through deliberate service deployment.","The external attack surface changes by over 300 new services monthly, with more than 20% turning over, rendering static asset inventories obsolete.","Continuous automated enumeration must be paired with human-led testing to validate actual exploitability and business impact, rather than relying solely on scanner alerts."],"referencedReports":[{"title":"2024 Unit 42 Attack Surface Threat Research: Internet-Connected Exposures","url":"https://unit42.paloaltonetworks.com/2024-unit-42-attack-surface-threat-research-internet-connected-exposures/","publisher":"Unit 42 (Palo Alto Networks)","context":"Referenced to support the finding that the average organization's external attack surface changes by more than 300 new services every month."},{"title":"Unit 42 2023 Attack Surface Threat Report","url":"https://unit42.paloaltonetworks.com/unit-42-2023-attack-surface-threat-report/","publisher":"Unit 42 (Palo Alto Networks)","context":"Referenced to cite data showing that more than 20% of externally accessible cloud services turn over on a monthly basis."},{"title":"Exposed Services in Public Clouds","url":"https://unit42.paloaltonetworks.com/exposed-services-public-clouds/","publisher":"Unit 42 (Palo Alto Networks)","context":"Referenced for research showing that 80% of exposed cloud services were compromised within 24 hours."}],"body":"\u003cp\u003eThe moment a new asset acquires a public IP address, automated scanning infrastructure begins cataloging it within minutes. Within the first hour, tools like Shodan and Censys index the host and collect banner information. By the sixth hour, attackers begin active enumeration and probe for management ports and TLS certificates. Between six and twelve hours, botnets launch credential stuffing, directory brute-forcing, and database probing without human intervention.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 research confirms that eighty percent of exposed cloud services are compromised within twenty-four hours. Security teams often fail to discover these assets until it is too late, as monthly attack surface changes exceed three hundred new services. Continuous external attack surface monitoring is essential to identify hidden endpoints before attackers exploit them.\u003c/p\u003e\n\n\u003cp\u003eAutomated discovery tools must feed directly into human-led pentesting to validate exploitability and determine real business impact. Relying on faster patching alone cannot solve the problem of unknown internet-facing assets.\u003c/p\u003e\n"},{"n":7,"title":"April KB5083769 Windows 11 update causes backup software failures","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/april-kb5083769-windows-11-update-causes-backup-software-failures/","time":"15:23","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The April 2026 Windows 11 security update KB5083769 breaks third-party backup software by causing Volume Shadow Copy Service timeouts, requiring users to uninstall the patch and pause updates as a temporary workaround.","briefOverview":"\u003cp\u003eThe April 2026 Windows 11 security update KB5083769 is causing widespread failures in third-party backup applications across Windows 11 24H2 and 25H2 systems. The problem stems from a timeout in the Volume Shadow Copy Service, which prevents backup software from creating necessary snapshots. This issue was first identified by Microsoft MVP Susan Bradley and has been confirmed by vendors including Acronis, Macrium, NinjaOne, and UrBackup. Acronis specifically warns that the timeout error can also cause affected machines to lose connectivity with their cloud consoles. To temporarily resolve the problem, users are advised to uninstall the KB5083769 patch, pause Windows updates, and reboot their systems. Microsoft has not yet provided an official statement regarding the backup failures. This incident follows a series of recent out-of-band updates that addressed Windows Server restart loops and BitLocker recovery prompts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe April 2026 Windows 11 security update KB5083769 introduces a critical compatibility issue that disrupts third-party backup applications on Windows 11 24H2 and 25H2 machines. User reports, initially highlighted by Microsoft MVP Susan Bradley, indicate that the update triggers a timeout within the Volume Shadow Copy Service. This service timeout prevents backup software from successfully creating system snapshots, leading to widespread operational failures. The affected ecosystem includes prominent backup solutions such as Acronis Cyber Protect Cloud, Macrium Reflect, NinjaOne Backup, and UrBackup Server. Acronis published a dedicated support document confirming that the issue impacts both Windows 11 Pro and Home editions. The specific error message reported by users states that the backup fails because Microsoft VSS timed out during snapshot creation. Beyond immediate backup failures, the update may cause affected endpoints to lose connectivity with their respective cloud consoles and appear offline. Microsoft has not yet issued a formal response or a patched update to address the problem. As a temporary workaround, administrators must navigate to Windows Update settings, uninstall the KB5083769 security patch, pause further updates, and reboot the affected machines. This backup disruption occurs alongside other recent Microsoft out-of-band releases that targeted Windows Server restart loops and installation failures. Additionally, Microsoft previously warned that a different April update, KB5082063, could trigger BitLocker recovery prompts on certain Windows Server 2025 devices. The article also references related Microsoft updates that have impacted Teams sign-ins, OneDrive connectivity, and enterprise Copilot management.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nThe April 2026 Windows 11 security update KB5083769 has been identified as the root cause of widespread failures across multiple third-party backup applications. This issue specifically impacts systems running Windows 11 versions 24H2 and 25H2. The disruption originates from a timeout condition within the Volume Shadow Copy Service, which is a foundational component introduced in Windows Server 2003. VSS is designed to coordinate between the operating system, backup software, and business applications like SQL Server and Exchange. When the update triggers a VSS service timeout, it prevents backup vendors from successfully creating the necessary system snapshots.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eVendor Impact and Error Details\u003c/strong\u003e\nUser reports, first documented by Microsoft MVP Susan Bradley, have confirmed the issue across several major backup platforms. The following software suites are explicitly noted as affected:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAcronis Cyber Protect Cloud\u003c/li\u003e\n\u003cli\u003eMacrium Reflect\u003c/li\u003e\n\u003cli\u003eNinjaOne Backup\u003c/li\u003e\n\u003cli\u003eUrBackup Server\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAcronis has published a formal support advisory confirming that the problem affects both Windows 11 Pro and Home editions. The specific failure message reads: \u0026ldquo;The backup has failed because Microsoft VSS has timed out during the snapshot creation.\u0026rdquo; The advisory further warns that the VSS timeout can cascade into broader operational issues. In some cases, affected machines will lose connectivity with their cloud consoles and appear completely offline to management systems.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMitigation and Microsoft Response\u003c/strong\u003e\nMicrosoft has not yet provided an official statement or a corrective patch for the backup failures. To temporarily restore functionality, administrators are advised to execute the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNavigate to Windows Update settings and access the update history.\u003c/li\u003e\n\u003cli\u003eUninstall the KB5083769 security update.\u003c/li\u003e\n\u003cli\u003ePause Windows updates to prevent automatic reinstallation.\u003c/li\u003e\n\u003cli\u003eReboot the system to clear the timeout state.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis incident is part of a broader pattern of instability within Microsoft\u0026rsquo;s April 2026 release cycle. Earlier this month, Microsoft released out-of-band updates to address Windows Server restart loops and update installation failures. Additionally, the company previously issued warnings regarding KB5082063, which can trigger BitLocker recovery prompts on certain Windows Server 2025 devices. The article also references other recent Microsoft updates that have disrupted Microsoft Teams sign-ins, OneDrive connectivity, and enterprise Copilot management features.\u003c/p\u003e\n","keyPoints":["The April 2026 Windows 11 security update KB5083769 breaks third-party backup applications on Windows 11 24H2 and 25H2 systems.","The update causes backup failures in applications using the Volume Shadow Copy Service due to a VSS service timeout.","Vendors such as Acronis, Macrium, NinjaOne, and UrBackup have confirmed that the issue prevents backup operations and may cause cloud console disconnections.","Affected users are advised to uninstall the KB5083769 update, pause Windows updates, and reboot to temporarily resolve the problem."],"insights":["The workaround requires administrators to uninstall the KB5083769 security patch and pause updates, forcing a trade-off between system security and backup functionality.","Beyond backup failures, the VSS timeout can cause systems to lose connectivity with cloud consoles and appear offline, impacting remote monitoring and management visibility.","This issue coincides with other recent Microsoft out-of-band updates addressing Windows Server restart loops and BitLocker prompts, suggesting a broader pattern of instability in the April 2026 release."],"referencedReports":[],"body":"\u003cp\u003eThe April 2026 Windows 11 security update KB5083769 is causing widespread failures in third-party backup applications across Windows 11 24H2 and 25H2 systems. The problem stems from a timeout in the Volume Shadow Copy Service, which prevents backup software from creating necessary snapshots. This issue was first identified by Microsoft MVP Susan Bradley and has been confirmed by vendors including Acronis, Macrium, NinjaOne, and UrBackup. Acronis specifically warns that the timeout error can also cause affected machines to lose connectivity with their cloud consoles. To temporarily resolve the problem, users are advised to uninstall the KB5083769 patch, pause Windows updates, and reboot their systems. Microsoft has not yet provided an official statement regarding the backup failures. This incident follows a series of recent out-of-band updates that addressed Windows Server restart loops and BitLocker recovery prompts.\u003c/p\u003e\n"},{"n":3,"title":"Trump’s cyber ambassador nominee advances to full Senate vote","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/trump-cyber-ambassador-nominee-advances-to-senate","time":"16:34","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Adam Cassady's nomination to lead the State Department's cyber policy bureau has cleared a key Senate committee hurdle and will proceed to a full vote, emphasizing the administration's focus on securing critical digital infrastructure. Senators are expected to demand a firm stance from Cassady regarding AI chip exports to China, a major national security issue highlighted during his confirmation hearing.","briefOverview":"\u003cp\u003eThe Senate Foreign Relations Committee advanced Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy to a full Senate vote. The committee approved the nomination with a 17-5 vote, including opposition from five Democratic members. Cassady previously served at the National Telecommunications and Information Administration and the Federal Communications Commission. He emphasized that digital infrastructure like subsea cables, semiconductors, and satellites is now as strategically significant as historical sea lanes and energy routes. During his confirmation hearing, senators questioned the administration’s decision to allow Nvidia to sell advanced AI processors to China. Cassady stated he lacks classified briefings on export controls and does not yet hold a firm position, though he pledged to develop one rapidly. Senator Jeanne Shaheen voted to advance the nomination and urged Cassady to investigate semiconductor exports thoroughly. She referenced briefings indicating that unrestricted chip sales could provide China with a substantial industrial advantage. The bureau has lacked a confirmed leader since the start of the second Trump administration. Its portfolio was temporarily divided among three offices following a departmental reshuffle.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Senate Foreign Relations Committee voted 17-5 to advance Adam Cassady’s nomination to helm the State Department’s Bureau of Cyberspace and Digital Policy. Five Democratic committee members joined the majority in supporting his advancement, sending the nomination to the full Senate for a final vote. Cassady was nominated last month to fill a leadership vacancy that has existed since the beginning of the second Trump administration. Under current arrangements, the bureau’s duties have been divided among three separate offices following a broader departmental restructuring. During his confirmation hearing, Cassady outlined his strategic vision for the role, emphasizing the urgent need to protect global digital infrastructure. He specifically identified subsea cables, semiconductors, and satellites as assets now comparable in strategic value to traditional sea lanes, airspace, and energy routes. Safeguarding these networks, he argued, is fundamental to maintaining American power and economic prosperity. The hearing featured a single major question regarding the administration’s policy on Nvidia selling advanced artificial intelligence processors to China. Cassady responded that he has not received classified briefings on export control frameworks and therefore lacks a strong initial viewpoint. He committed to rapidly forming a definitive position once confirmed and properly briefed. Senator Jeanne Shaheen, the committee’s top Democrat, voted to advance the nomination and encouraged Cassady to investigate the chip export issue thoroughly. She referenced prior intelligence briefings suggesting that unrestricted sales of high-level chips could provide China with a significant industrial jumpstart. She emphasized that this technological advantage would not materialize without continued American supply. Cassady’s background includes senior leadership roles at the National Telecommunications and Information Administration and the Federal Communications Commission. His confirmation will ultimately determine whether the State Department can immediately consolidate its cyber policy authority and address pressing export control questions. The full Senate vote will now decide whether he can begin addressing the immediate gaps in cyber diplomacy and infrastructure security.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThis analysis outlines the progression of Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy. The Senate Foreign Relations Committee successfully advanced his nomination through a 17-5 vote. Five Democratic committee members opposed the motion, but the majority supported his elevation to the full Senate floor.\u003c/p\u003e\n\n\u003ch3 id=\"nomination-context-and-bureau-status\"\u003eNomination Context and Bureau Status\u003c/h3\u003e\n\n\u003cp\u003eCassady was nominated last month to fill a critical leadership gap within the State Department. The bureau has remained without a confirmed ambassador since the beginning of the second Trump administration. Following a broader departmental reshuffle, the bureau’s statutory portfolio was temporarily divided among three separate offices. This fragmentation has delayed comprehensive oversight of the department’s digital policy initiatives. Cassady’s confirmation would restore the bureau to its legally mandated structure under a single ambassadorial leader.\u003c/p\u003e\n\n\u003ch3 id=\"strategic-vision-for-digital-infrastructure\"\u003eStrategic Vision for Digital Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eDuring his confirmation hearing, Cassady articulated a clear strategic framework for the role. He emphasized that the digital infrastructure underpinning the global economy demands immediate protection. Specifically, he identified subsea cables, semiconductors, and satellites as assets of paramount importance. He argued that these technological networks are now as strategically significant as historical sea lanes, airspace, and energy routes. Safeguarding this digital ecosystem, he stated, is central to preserving both American national power and long-term economic prosperity.\u003c/p\u003e\n\n\u003ch3 id=\"confirmation-hearing-highlights-and-policy-questions\"\u003eConfirmation Hearing Highlights and Policy Questions\u003c/h3\u003e\n\n\u003cp\u003eThe confirmation hearing was notably brief, featuring only a single substantive question from committee members. Senator Jeanne Shaheen focused entirely on the administration’s decision to permit Nvidia to sell advanced artificial intelligence processors to China. Cassady acknowledged that he has not yet received classified briefings on export control frameworks. Consequently, he stated he does not possess a strong initial viewpoint on the matter. He pledged to develop a definitive position rapidly once confirmed and properly briefed. Senator Shaheen voted to advance the nomination but urged Cassady to thoroughly investigate the semiconductor export issue. She referenced prior intelligence briefings suggesting that unrestricted chip sales could provide China with a significant industrial jumpstart. She emphasized that this technological advantage would not materialize without continued American supply.\u003c/p\u003e\n\n\u003ch3 id=\"nominee-background-and-next-steps\"\u003eNominee Background and Next Steps\u003c/h3\u003e\n\n\u003cp\u003eCassady brings prior executive experience to the nomination, having served as a senior leader at the National Telecommunications and Information Administration. He also previously held leadership positions at the Federal Communications Commission. His nomination now proceeds to the full Senate for a final confirmation vote. The outcome will determine whether the State Department can immediately consolidate its cyber policy authority and address pressing export control questions.\u003c/p\u003e\n","keyPoints":["The Senate Foreign Relations Committee approved Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy with a 17-5 vote.","Cassady stated that digital infrastructure such as subsea cables, semiconductors, and satellites is now as strategically significant as traditional routes for preserving American power and prosperity.","During his confirmation hearing, Cassady noted he has not received a classified briefing on AI chip exports to China and does not yet have a strong position on the issue.","Senator Jeanne Shaheen raised concerns that allowing Nvidia to sell advanced AI processors to China could provide Beijing with a significant advantage in the semiconductor industry.","The bureau has lacked a confirmed leader since the start of the second Trump administration, with its portfolio temporarily divided among three offices."],"insights":["The bureau’s portfolio has been divided among three offices due to a leadership vacuum, creating a structural gap in cyber diplomacy that requires immediate consolidation.","The confirmation hearing focused exclusively on AI chip exports to China, indicating that semiconductor supply chain security is already a primary lens for evaluating cyber policy.","The nominee’s stated lack of classified briefings on export controls highlights an immediate knowledge gap in critical technology transfer frameworks that must be addressed upon confirmation."],"referencedReports":[],"body":"\u003cp\u003eThe Senate Foreign Relations Committee advanced Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy to a full Senate vote. The committee approved the nomination with a 17-5 vote, including opposition from five Democratic members. Cassady previously served at the National Telecommunications and Information Administration and the Federal Communications Commission. He emphasized that digital infrastructure like subsea cables, semiconductors, and satellites is now as strategically significant as historical sea lanes and energy routes. During his confirmation hearing, senators questioned the administration’s decision to allow Nvidia to sell advanced AI processors to China. Cassady stated he lacks classified briefings on export controls and does not yet hold a firm position, though he pledged to develop one rapidly. Senator Jeanne Shaheen voted to advance the nomination and urged Cassady to investigate semiconductor exports thoroughly. She referenced briefings indicating that unrestricted chip sales could provide China with a substantial industrial advantage. The bureau has lacked a confirmed leader since the start of the second Trump administration. Its portfolio was temporarily divided among three offices following a departmental reshuffle.\u003c/p\u003e\n"},{"n":1,"title":"Zambia cancels global digital freedoms conference days before start","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/zabia-cancels-global-digital-freedoms-conference-shortly-before-start","time":"17:11","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Zambia abruptly canceled the RightsCon digital freedoms conference, citing security and procedural concerns, amid allegations of foreign pressure and a broader crackdown on online expression.","briefOverview":"\u003cp\u003eAccess Now announced the cancellation of RightsCon, a major digital human rights conference originally scheduled for May 5 in Zambia. The Zambian government halted the event days before its start, citing incomplete security clearances and procedural misalignments. Officials also demanded comprehensive disclosure of the conference\u0026rsquo;s thematic discussions. This sudden shutdown has stranded thousands of delegates who were already traveling to the region. The decision arrives amid broader restrictions on digital expression within the country. Recent cyber legislation has expanded government surveillance capabil
