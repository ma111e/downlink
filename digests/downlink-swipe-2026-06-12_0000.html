mised.","Removing an affected AUR package is insufficient after the payload has executed, because the package manager cannot account for persistence or rootkit-capable changes made outside the package’s known files.","The npm package atomic-lockfile had only 134 weekly downloads before removal, indicating the main exposure path was AUR builds rather than direct npm installations."],"referencedReports":[{"title":"Atomic Arch npm Campaign Adds Malicious Dependency","url":"https://www.sonatype.com/blog/atomic-arch-npm-campaign-adds-malicious-dependency","publisher":"Sonatype","context":"The article says Sonatype named the campaign Atomic Arch and found attackers targeting orphaned AUR projects.","category":"","primary":false},{"title":"Preliminary Analysis of AUR Malware","url":"https://ioctl.fail/preliminary-analysis-of-aur-malware/","publisher":"Whanos / ioctl.fail","context":"The article cites independent researcher Whanos's reverse engineering of the deps payload to describe the Rust credential stealer and its capabilities.","category":"","primary":false}],"body":"\u003cp\u003eAttackers took over more than 400 packages in the Arch User Repository and changed their build scripts to install a credential stealer on machines that built them. The official Arch Linux repositories were not affected. The article says users who installed or updated AUR packages on or after June 11 should check affected-package lists before trusting the host.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targeted the AUR trust model rather than a software flaw. Attackers adopted abandoned packages, modified PKGBUILD or .install scripts, and spoofed git commit metadata so changes appeared to come from a long-standing maintainer whose account was later confirmed not to be compromised. The malicious recipes pulled npm or bun dependencies such as atomic-lockfile and js-digest to run bundled Linux ELF payloads during the build process.\u003c/p\u003e\n\n\u003cp\u003eThe main payload is described as a Rust credential stealer that harvests browser data, developer tokens, SSH keys, shell histories, Docker and Podman credentials, VPN profiles, and Electron app session data. If run with root and the required capability, it can load an optional eBPF rootkit that hides its processes, names, and socket inodes. The article advises credential rotation, persistence hunting, and reinstalling from trusted media if the payload ran as root.\u003c/p\u003e\n"},{"n":27,"title":"Shai-Hulud Campaign Evolution: Miasma, Hades, and AI Scanner Evasion","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/shai-hulud-campaign-evolution-miasma-hades-and-ai-scanner-evasion","time":"21:14","priority":"MUST READ","score":94,"tldr":"Shai-Hulud has evolved from npm maintainer compromise into a broader supply-chain threat abusing PyPI, GitHub Actions OIDC publishing, IDE configuration files, and LLM scanner prompt injection. The key takeaway is that valid provenance and automated AI-based scanning are not enough if CI/CD systems, developer tools, and package analysis pipelines can be manipulated.","briefOverview":"\u003cp\u003eSince Zscaler ThreatLabz published its analysis of Shai-Hulud V2 in November 2025, the campaign continued to evolve across npm, PyPI, CI/CD workflows, IDE configuration files, and AI-based scanning pipelines. ThreatLabz assesses with high confidence that earlier waves are linked to TeamPCP, tracked by Mandiant as UNC6780, but attribution after May 12, 2026 is less certain because the worm source code was publicly released under an MIT license. The campaign is significant because it moved through multiple layers of software supply chain trust rather than relying on a single package compromise method.\u003c/p\u003e\n\n\u003cp\u003eThe March 2026 Miasma wave expanded into PyPI through a compromised vulnerability scanner and introduced Python .pth persistence that executes at interpreter startup. The May 2026 Hades/TanStack wave abused a GitHub Actions pull_request_target misconfiguration to scrape OIDC tokens from runner memory and publish malicious packages with valid SLSA/Sigstore provenance. Later June waves abused OIDC trusted publishing, added IDE configuration triggers, and embedded prompt injection in PyPI packages to mislead LLM-based security scanners.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz describes the continued evolution of the Shai-Hulud campaign after its November 2025 analysis of Shai-Hulud V2. The activity expanded beyond npm into PyPI, shifted from maintainer-focused compromise to CI/CD abuse, undermined trust in SLSA provenance and OIDC-based publishing workflows without breaking their cryptographic guarantees, and extended execution into IDE configuration files. The article also describes prompt injection designed to evade AI-based security scanners.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz assesses with high confidence that earlier waves are linked to TeamPCP, which Mandiant tracks as UNC6780. Attribution for activity after May 12, 2026 is less certain because the complete worm source code was publicly released under an MIT license on that date. The release reportedly included propagation code, an OIDC token scraping module, operational documentation, and a Monero prize announcement for the largest supply chain attack built from the codebase.\u003c/p\u003e\n\n\u003cp\u003eIn March 2026, the Miasma wave moved into PyPI by compromising Aqua Security\u0026rsquo;s Trivy vulnerability scanner through GitHub Actions cache poisoning. Downstream pipelines that installed Trivy without version pinning could download and execute the attacker’s binary, and LiteLLM version 1.82.8 was among the first major victims. This wave introduced a malicious litellm_init.pth file in Python site-packages, using .pth startup execution for persistence.\u003c/p\u003e\n\n\u003cp\u003eIn May 2026, the Hades/TanStack wave abused a pull_request_target misconfiguration in GitHub Actions to execute malicious code in a privileged runner context. The attacker scraped an OIDC token from Runner.Worker process memory, exchanged it for a valid npm publish token, and published malicious packages from the legitimate environment. Within six minutes, 84 malicious artifacts were published across 42 @tanstack/ packages with valid Sigstore provenance attestations.\u003c/p\u003e\n\n\u003cp\u003eJune 2026 waves added further changes to the campaign. The Red Hat wave reportedly followed compromise of a Red Hat engineer’s GitHub account and resulted in 32 packages and 96 versions being published with valid provenance through OIDC trusted publishing. The IDE wave used configuration files for Claude Code, Cursor, VS Code, and Gemini Code Assist, contributing to GitHub disabling 73 Microsoft repositories, while the Hades PyPI wave embedded prompt injection in _index.js to influence LLM-based security scanners toward false-clean or unusable verdicts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz reports that the Shai-Hulud campaign continued to evolve after its November 2025 analysis of Shai-Hulud V2. The campaign expanded from npm into the Python Package Index, shifted from maintainer-focused compromise to abuse of CI/CD systems, and targeted trust mechanisms such as SLSA provenance and OIDC-based publishing workflows. The article emphasizes that these workflows were not cryptographically broken; instead, attackers abused the trusted systems and identities that produced the valid attestations.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz assesses with high confidence that earlier waves are linked to TeamPCP, tracked by Mandiant as UNC6780. Attribution for activity after May 12, 2026 is less certain because the complete worm source code was publicly released under an MIT license. That release turned a private actor capability into reusable public attack infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"major-campaign-developments\"\u003eMajor campaign developments\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several major developments across 2026:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn March 2026, the Miasma wave expanded into PyPI through a compromised vulnerability scanner and introduced .pth-based persistence.\u003c/li\u003e\n\u003cli\u003eIn May 2026, the Hades/TanStack wave abused a GitHub Actions CI misconfiguration to scrape OIDC tokens from runner memory and publish malicious packages with valid SLSA provenance.\u003c/li\u003e\n\u003cli\u003eOn May 12, 2026, the worm source code was open-sourced under an MIT license.\u003c/li\u003e\n\u003cli\u003eOn June 1–2, 2026, the Red Hat wave abused OIDC trusted publishing after a Red Hat engineer account compromise and used staged C2 camouflage through a non-existent Anthropic API path.\u003c/li\u003e\n\u003cli\u003eOn June 5, 2026, the IDE wave moved execution into IDE configuration files and contributed to GitHub disabling 73 Microsoft repositories.\u003c/li\u003e\n\u003cli\u003eOn June 8, 2026, the Hades PyPI wave introduced prompt injection in PyPI packages to mislead LLM-based security scanners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"march-2026-miasma-and-pypi-expansion\"\u003eMarch 2026: Miasma and PyPI expansion\u003c/h2\u003e\n\n\u003cp\u003eThe Miasma wave marked the campaign’s first major expansion beyond npm. Instead of targeting package maintainers directly, TeamPCP compromised Aqua Security’s Trivy vulnerability scanner through GitHub Actions cache poisoning. Trivy is widely used in build pipelines for container and dependency scanning.\u003c/p\u003e\n\n\u003cp\u003eThe attack relied on the absence of version pinning in downstream consumers. When Trivy’s repository cache was poisoned, pipelines that installed Trivy without a pinned version downloaded and executed the attacker’s binary. LiteLLM, a Python library for calling LLM providers, was among the first major victims, and LiteLLM version 1.82.8 was published with a malicious 34KB litellm_init.pth file in site-packages.\u003c/p\u003e\n\n\u003cp\u003eThe use of .pth files represented a persistence advancement over the npm preinstall and postinstall hooks used in earlier waves. Python processes .pth files in site-packages during interpreter startup, so any invocation of Python in an impacted environment can execute the payload. The article notes that this persistence can survive package reinstallation and can persist across virtual environment recreation if the base site-packages directory is affected.\u003c/p\u003e\n\n\u003ch2 id=\"may-2026-hades-tanstack-and-valid-malicious-provenance\"\u003eMay 2026: Hades, TanStack, and valid malicious provenance\u003c/h2\u003e\n\n\u003cp\u003eOn May 11, 2026, TeamPCP exploited a pull_request_target misconfiguration in the TanStack open-source monorepo. The pull_request_target trigger runs in the context of the target repository rather than the contributor’s fork, which can grant access to repository secrets when misconfigured. The attackers submitted a malicious contribution that triggered the workflow in TanStack’s privileged CI environment.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code executed inside the privileged runner context and scraped an OIDC token from the Runner.Worker process memory. The token was presented to GitHub’s OIDC federation endpoint to generate a valid npm publish token. That token was then used to publish malicious packages from TanStack’s legitimate environment.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that no maintainer credentials needed to be stolen in this wave. The trusted environment itself became the access path. Within a six-minute window, 84 malicious artifacts were published across 42 @tanstack/ packages.\u003c/p\u003e\n\n\u003cp\u003eThose artifacts carried valid Sigstore provenance attestations signed through the legitimate CI path and recorded in the Rekor transparency log. Cryptographically, the attestations were valid because the malicious build process ran from inside the trusted system. The article states that this demonstrates why SLSA/Sigstore provenance should not be treated as proof of safety, because provenance validates the build process rather than the integrity of the CI system or the identity at the root of the workflow.\u003c/p\u003e\n\n\u003cp\u003eDays later, the campaign mass-republished the @antv data visualization namespace. Snyk reported roughly 314 versions published within a six-second window. Public reporting also linked the broader wave to compromises affecting additional AI-related infrastructure packages associated with Mistral AI, Guardrails AI, UiPath, and OpenSearch.\u003c/p\u003e\n\n\u003ch2 id=\"may-12-2026-worm-source-code-release\"\u003eMay 12, 2026: Worm source code release\u003c/h2\u003e\n\n\u003cp\u003eOn May 12, 2026, TeamPCP published the complete worm source code to GitHub under an MIT license with the commit message, “Open Sourcing The Carnage.” The release reportedly included full propagation code, an OIDC token scraping module, operational documentation for customizing encryption keys and C2 infrastructure, and a $1,000 Monero prize announcement on BreachForums for the largest supply chain attack built from the codebase.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this release changed the threat landscape and made attribution harder. Before publication, it was more straightforward to link multiple waves to the same operator. After the release, copycat actors could reuse the same code and tradecraft, so malware overlap or similar operations alone were no longer enough to confidently attribute later activity to TeamPCP.\u003c/p\u003e\n\n\u003ch2 id=\"june-1-2-2026-red-hat-oidc-trusted-publishing-abuse\"\u003eJune 1–2, 2026: Red Hat OIDC trusted publishing abuse\u003c/h2\u003e\n\n\u003cp\u003eThe June Red Hat wave used a different path into the same trusted publishing model. Public reporting cited in the article indicates that a Red Hat engineer’s GitHub account was compromised, although the initial takeover method was not publicly disclosed. With access to the account, the attacker pushed orphan commits to internal Red Hat repositories, injected GitHub Actions workflows through those orphan commits, allowed the workflows to request OIDC tokens through normal trusted publishing flows, and published malicious packages with valid provenance.\u003c/p\u003e\n\n\u003cp\u003eThe result was 32 packages and 96 versions published within hours. From the perspective of signing and provenance checks, the packages appeared legitimate. As with the TanStack wave, the trust chain remained cryptographically valid while the identity and execution context at its root had been compromised.\u003c/p\u003e\n\n\u003cp\u003eSamples from the June wave also introduced C2 camouflage. The article describes traffic staged to route to api.anthropic.com/v1/api, a non-existent endpoint at Anthropic’s domain. It states that this was camouflage rather than the primary exfiltration channel, and that Anthropic’s infrastructure was not compromised.\u003c/p\u003e\n\n\u003ch2 id=\"june-5-2026-ide-configuration-file-execution\"\u003eJune 5, 2026: IDE configuration file execution\u003c/h2\u003e\n\n\u003cp\u003eThe Azure/durabletask IDE wave moved beyond package registries and CI publishing into developer tooling configuration files. A compromised contributor account pushed four files targeting AI-assisted development and editor environments. These files were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e.claude/settings.json, using a SessionStart hook when opening a project in Claude Code.\u003c/li\u003e\n\u003cli\u003e.cursor/rules/setup.mdc, using alwaysApply prompt injection during Cursor AI agent initialization.\u003c/li\u003e\n\u003cli\u003e.vscode/tasks.json, using a runOn: folderOpen task when opening a folder in VS Code.\u003c/li\u003e\n\u003cli\u003e.gemini/settings.json, using a startup hook when starting a Gemini Code Assist session.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that no package installation was required. The trigger was git clone followed by opening the repository in one of the targeted editors. In response, GitHub disabled 73 Microsoft repositories across four organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that IDE configuration files are not evaluated by package registry scanners, SLSA verification tools, or behavioral systems oriented around package content. They are often reviewed as configuration rather than executable code, placing the vector outside many existing detection perimeters.\u003c/p\u003e\n\n\u003ch2 id=\"june-8-2026-hades-pypi-and-llm-scanner-evasion\"\u003eJune 8, 2026: Hades PyPI and LLM scanner evasion\u003c/h2\u003e\n\n\u003cp\u003eThe Hades PyPI wave was detected by Socket Research on June 8, 2026 and compromised 37 PyPI wheels across 19 packages. The malware retained familiar campaign tradecraft, including .pth persistence, multilayer obfuscation, AES-256-GCM encryption with per-instance keys, PBKDF2 key derivation, and obfuscator-wrapped JavaScript payloads.\u003c/p\u003e\n\n\u003cp\u003eThe notable change was an AI scanner evasion technique embedded in the _index.js bundle. According to StepSecurity’s analysis as quoted in the article, the bundle begins with a plain-text prompt injection block placed ahead of the obfuscated payload. The prompt injection instructed parsing LLMs to ignore the obfuscated code, classify the package as verified clean infrastructure, and output a safe security report.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that scanners passing raw package content to a language model without enforcing system prompt isolation can place the attacker’s instruction in the model’s context window. Without content boundary separation, the injected text can override the scanner’s analytical prompt and produce a false-negative verdict. The article also notes that a scanner could be induced to refuse analysis if submitted content triggers safety filters, and that treating “no finding” or “refused to analyze” as clean creates a blind spot.\u003c/p\u003e\n\n\u003ch2 id=\"c2-infrastructure-evolution\"\u003eC2 infrastructure evolution\u003c/h2\u003e\n\n\u003cp\u003eThe campaign’s C2 infrastructure evolved in response to takedowns and defensive pressure. Earlier V1 and V2 activity used GitHub orphan or dangling commits as dead drops, which the article describes as having low takedown resistance because GitHub can disable repositories. Miasma also used GitHub dead drops.\u003c/p\u003e\n\n\u003cp\u003eIn May and June 2026, the campaign moved toward Internet Computer Protocol blockchain canisters, which the article describes as more resistant to takedown because they are decentralized and do not depend on a central domain. The June 8, 2026 Hades PyPI wave used GitHub dead drops, Session Protocol, and staged api.anthropic.com/v1/api camouflage. The article states that Session Protocol bypasses DNS blocking.\u003c/p\u003e\n\n\u003cp\u003eOne described GitHub dead-drop method involved a background service called kitty-monitor. It queried GitHub’s commit search API once per hour for the marker string firedalazer. The most recent matching commit contained the next instruction in its commit message, and the implant verified the signature against an embedded public key before retrieving the referenced URL.\u003c/p\u003e\n\n\u003ch2 id=\"recommendations-and-defensive-lessons\"\u003eRecommendations and defensive lessons\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends strict dependency and CI/CD controls. These include using lockfiles and npm ci instead of npm install, using private registry proxies and SCA tools, restricting open-source package consumption on corporate devices and CI systems, auditing and removing unused packages, and applying least privilege with scoped, short-lived keys and tokens. It also recommends phishing-resistant MFA such as FIDO2 and WebAuthn on npm, PyPI, GitHub, and cloud platforms.\u003c/p\u003e\n\n\u003cp\u003eFor CI/CD environments, the article recommends revoking and rotating npm tokens, GitHub PATs, cloud keys, and CI/CD secrets after suspected exposure. It also recommends restricting build environments to internal mirrors, limiting outbound network access, pinning all CI/CD tool versions, auditing pull_request_target usage, restricting privileged operations and secret access to non-fork contexts, and monitoring repositories with publish permissions for orphan commits and unexpected workflow files.\u003c/p\u003e\n\n\u003cp\u003eFor Python environments, the article recommends monitoring site-packages for unexpected .pth files, especially unusual names such as leading-hyphen or non-package names. For developer tooling, it recommends treating IDE and AI-agent configuration files such as .claude/, .cursor/, .vscode/, and .gemini/ as executable code. For provenance and AI scanning, it recommends not treating SLSA/Sigstore provenance as proof of safety, enforcing system-prompt isolation in LLM-based scanners, treating absent verdicts as a signal rather than a pass, and enforcing a release cooldown period for newly released packages.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-coverage\"\u003eIndicators and coverage\u003c/h2\u003e\n\n\u003cp\u003eThe article lists Zscaler coverage under detections including Python.Loader.Shai-Hulud, JS/Shaulud.B, JS.Malicious.npmpackage, and JS.Worm.ShaiHulud. It also provides indicators of compromise, including malicious files such as setup_bun.js, bun_environment.js, .github/workflows/discussion.yaml, litellm_init.pth, -setup.pth, _index.js, updater.py, and IDE configuration files used in the June 5 wave.\u003c/p\u003e\n\n\u003cp\u003eThe article lists hashes associated with Hades PyPI artifacts, including two _index.js SHA256 hashes and a -setup.pth SHA256 hash. It also identifies models.litellm.cloud as a Miasma exfiltration domain, hxxps://api.anthropic.com/v1/api as a staged C2 camouflage destination, and oven-sh/bun/releases/download as a Bun runtime dropper download path used as an evasion vehicle.\u003c/p\u003e\n","keyPoints":["The Shai-Hulud campaign expanded beyond npm into PyPI, shifted from maintainer-focused compromise to CI/CD abuse, and introduced execution through IDE configuration files and prompt injection against AI-based security scanners.","In March 2026, the Miasma wave compromised Aqua Security's Trivy scanner through GitHub Actions cache poisoning and used Python .pth files for persistence in site-packages.","In May 2026, the Hades/TanStack wave abused a pull_request_target misconfiguration to scrape OIDC tokens from GitHub Actions runner memory and publish malicious packages with valid SLSA provenance.","On May 12, 2026, the complete worm source code was publicly released under an MIT license, making later attribution less certain because the toolkit became publicly reusable.","The June 8, 2026 Hades PyPI wave embedded prompt injection in an _index.js bundle to mislead LLM-based security scanners into producing false-clean verdicts or no usable verdict."],"insights":["Valid SLSA/Sigstore provenance did not indicate package safety in the TanStack and Red Hat waves because the malicious publishing occurred from compromised or abused trusted CI/OIDC workflows.","Python .pth persistence is especially dangerous because it executes on every interpreter startup and can survive package reinstallation, making it harder to remove than npm install-time hooks.","The public MIT-licensed release of the Shai-Hulud worm source code means malware overlap is no longer sufficient to confidently attribute later waves to TeamPCP.","IDE and AI-agent configuration files such as .claude/settings.json, .cursor/rules/setup.mdc, .vscode/tasks.json, and .gemini/settings.json should be treated as executable code because merely opening a cloned repository can trigger them.","LLM-based scanning pipelines need strict system-prompt isolation and must treat refusals or missing verdicts as suspicious, because prompt injection can cause false-clean reports or analysis failures."],"referencedReports":[],"body":"\u003cp\u003eSince Zscaler ThreatLabz published its analysis of Shai-Hulud V2 in November 2025, the campaign continued to evolve across npm, PyPI, CI/CD workflows, IDE configuration files, and AI-based scanning pipelines. ThreatLabz assesses with high confidence that earlier waves are linked to TeamPCP, tracked by Mandiant as UNC6780, but attribution after May 12, 2026 is less certain because the worm source code was publicly released under an MIT license. The campaign is significant because it moved through multiple layers of software supply chain trust rather than relying on a single package compromise method.\u003c/p\u003e\n\n\u003cp\u003eThe March 2026 Miasma wave expanded into PyPI through a compromised vulnerability scanner and introduced Python .pth persistence that executes at interpreter startup. The May 2026 Hades/TanStack wave abused a GitHub Actions pull_request_target misconfiguration to scrape OIDC tokens from runner memory and publish malicious packages with valid SLSA/Sigstore provenance. Later June waves abused OIDC trusted publishing, added IDE configuration triggers, and embedded prompt injection in PyPI packages to mislead LLM-based security scanners.\u003c/p\u003e\n"},{"n":13,"title":"South Korea hits Coupang with record $409 million fine over data breach","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/south-korea-data-breach-record-fine-coupang","time":"15:56","priority":"MUST READ","score":93,"tldr":"South Korea’s privacy regulator fined Coupang a record $409 million after finding that basic security failures allowed a former employee to steal data on more than 33 million customers and millions of non-members. Regulators also accused Coupang of failing to notify victims, deleting evidence, and committing additional privacy violations.","briefOverview":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission imposed a record 624.7 billion won, or $409 million, fine on Coupang and Coupang Fulfillment Services after investigating a major customer data breach. The regulator concluded that the breach resulted from “deficiencies in basic safety management,” not sophisticated hacking. The penalty is the largest ever issued by the commission for a personal data breach.\u003c/p\u003e\n\n\u003cp\u003eThe investigation confirmed that 33,222,472 registered Coupang members were affected, along with at least 4,338,368 non-members whose names, phone numbers, and addresses had been stored as delivery recipients. The regulator said Coupang failed to notify those non-member victims despite being formally urged to do so four times. Coupang also faces a criminal referral over evidence destruction after web access logs were deleted.\u003c/p\u003e\n\n\u003cp\u003eThe alleged perpetrator was an unnamed Chinese national and former employee who had developed Coupang’s alternative authentication system and stolen the signing key behind it before leaving the company. Using the stolen key, he accessed delivery address and account edit pages tens of millions of times, later sending extortion emails to customers and Coupang. The investigation also uncovered separate privacy violations involving the Coupang Partners affiliate program, advertising practices, journalist blacklisting, employee weight data, and the exclusion of the chief privacy officer from an internal investigation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission fined Coupang and its logistics subsidiary, Coupang Fulfillment Services, 624.7 billion won, or $409 million, after investigating a data breach affecting tens of millions of people. The commission said the breach stemmed from “deficiencies in basic safety management” rather than sophisticated hacking. The fine is the largest ever issued by the commission for a personal data breach, surpassing a previous 134.8 billion won fine against SK Telecom.\u003c/p\u003e\n\n\u003cp\u003eCoupang had first disclosed in November that about 33.7 million customer accounts had been compromised. The PIPC confirmed 33,222,472 registered members were affected and also identified at least 4,338,368 non-members whose names, phone numbers, and addresses were stored as delivery recipients by other customers. The regulator said these non-members had no way of knowing their data was held by Coupang and that Coupang failed to notify them despite four formal requests in December 2025 and January 2026.\u003c/p\u003e\n\n\u003cp\u003eThe alleged perpetrator was an unnamed Chinese national and former Coupang employee who left the company at the end of 2024. While employed, he had developed Coupang’s alternative authentication system and allegedly stole the signing key that supported it before departing. He began with a test run on 95 accounts in January 2025, then used the stolen key to cycle through member ID numbers and access delivery address and account edit pages on a massive scale.\u003c/p\u003e\n\n\u003cp\u003eFrom April, the attacker hit Coupang’s delivery address page about 148 million times over two months to collect names, phone numbers, and addresses. Between June and October, he accessed the account edit page nearly 35 million times to collect names and email addresses, and a final phase added apartment entry codes and order histories. He later reassembled the information into customer profiles and sent extortion emails to members and to Coupang, claiming to hold large volumes of address, order, and email data.\u003c/p\u003e\n\n\u003cp\u003eThe PIPC found that Coupang failed to detect abnormal traffic during the seven-month attack, including spikes many times above normal and tens of millions of attempts using non-existent member IDs. The commission referred Coupang for criminal prosecution over destruction of evidence after the company manually deleted about six months of web access logs after a preservation order and allowed additional logs to be automatically deleted. Regulators said about 13% of logs covering the attack period were lost, making it impossible to identify all affected victims.\u003c/p\u003e\n\n\u003cp\u003eThe expanded investigation also uncovered separate violations, including the covert collection of third-party browsing activity from about 11.2 million users through the Coupang Partners affiliate marketing program without consent. The PIPC imposed a further 201.1 billion won fine for that violation alone, and found issues involving hijack ads, an internal blacklist of 71 police press-corps journalists, misuse of employee weight data, and exclusion of Coupang’s chief privacy officer from an internal investigation. Coupang said it regretted the decision and reserved the right to challenge it after receiving the formal written ruling.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSouth Korea’s Personal Information Protection Commission imposed a record 624.7 billion won, or $409 million, fine on Coupang, the country’s largest online retailer, and its logistics subsidiary, Coupang Fulfillment Services. The sanction followed an investigation into a data breach that compromised personal information belonging to tens of millions of customers.\u003c/p\u003e\n\n\u003cp\u003eThe commission concluded that the breach resulted from “deficiencies in basic safety management,” rather than from sophisticated hacking. The penalty is the largest ever issued by the PIPC for a personal data breach, exceeding the 134.8 billion won fine levied against SK Telecom earlier in the year.\u003c/p\u003e\n\n\u003ch2 id=\"scale-of-the-breach\"\u003eScale of the breach\u003c/h2\u003e\n\n\u003cp\u003eCoupang first disclosed the breach in November, saying that approximately 33.7 million customer accounts had been compromised. The PIPC’s investigation confirmed that 33,222,472 registered members were affected.\u003c/p\u003e\n\n\u003cp\u003eThe regulator also identified a separate group of victims that Coupang had not previously acknowledged: at least 4,338,368 non-members. These people had their names, phone numbers, and addresses stored as delivery recipients by other customers, and the regulator said they had no way of knowing that Coupang held their data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the PIPC, it formally urged Coupang four times in December 2025 and January 2026 to notify the non-member victims. Coupang failed to do so each time.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-actor-and-access-method\"\u003eAlleged actor and access method\u003c/h2\u003e\n\n\u003cp\u003eThe alleged perpetrator was an unnamed Chinese national and former Coupang employee who left the company at the end of 2024. While still employed, he had developed Coupang’s alternative authentication system.\u003c/p\u003e\n\n\u003cp\u003eBefore leaving, he allegedly stole the signing key that underpinned that authentication system. He then used the stolen key to access customer information over several months.\u003c/p\u003e\n\n\u003cp\u003eThe activity began with a test run in January 2025, when the stolen key was used on 95 accounts. From April, the attacker systematically cycled through member ID numbers and hit Coupang’s delivery address page approximately 148 million times over two months.\u003c/p\u003e\n\n\u003ch2 id=\"data-accessed-during-the-attack\"\u003eData accessed during the attack\u003c/h2\u003e\n\n\u003cp\u003eThe first major phase of the attack targeted Coupang’s delivery address page. Through approximately 148 million hits over two months, the attacker harvested names, phone numbers, and addresses.\u003c/p\u003e\n\n\u003cp\u003eThe attacker then shifted to the account edit page. Between June and October, that page was accessed nearly 35 million times to collect names and email addresses.\u003c/p\u003e\n\n\u003cp\u003eA final phase added apartment entry codes and order histories. The former employee later reassembled the data into individual customer profiles.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-emails\"\u003eExtortion emails\u003c/h2\u003e\n\n\u003cp\u003eAfter compiling the stolen data, the former employee sent two extortion emails. One was sent directly to members, and the other was sent to Coupang.\u003c/p\u003e\n\n\u003cp\u003eThe second email claimed possession of 120 million addresses, 560 million order records, and more than 33 million email addresses. The sample data included sensitive purchase histories.\u003c/p\u003e\n\n\u003ch2 id=\"detection-failures-identified-by-the-regulator\"\u003eDetection failures identified by the regulator\u003c/h2\u003e\n\n\u003cp\u003eThe PIPC found that Coupang failed to detect the activity throughout the seven-month attack. The affected pages saw traffic spikes many times higher than normal.\u003c/p\u003e\n\n\u003cp\u003eThe regulator also found that tens of millions of access attempts used non-existent member IDs. Coupang did not detect the breach until a customer forwarded one of the extortion emails.\u003c/p\u003e\n\n\u003ch2 id=\"evidence-destruction-and-lost-logs\"\u003eEvidence destruction and lost logs\u003c/h2\u003e\n\n\u003cp\u003eThe commission referred Coupang for criminal prosecution over destruction of evidence. Regulators had ordered the preservation of access logs on November 21, the day after Coupang filed its initial breach report.\u003c/p\u003e\n\n\u003cp\u003eSix days later, Coupang manually deleted approximately six months of web access logs. The company also failed to pause its routine policy of automatically deleting logs after six months, which allowed additional records to be wiped.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, roughly 13% of the logs covering the attack period were lost. The loss made it impossible to identify all affected victims.\u003c/p\u003e\n\n\u003cp\u003ePolice separately recovered a smashed MacBook Air from a river during the investigation. The laptop, allegedly weighted with bricks in an apparent attempt to destroy evidence, was documented by forensic teams from Mandiant, Palo Alto Networks, and Ernst \u0026amp; Young before being handed to authorities.\u003c/p\u003e\n\n\u003ch2 id=\"additional-violations-found-in-the-expanded-investigation\"\u003eAdditional violations found in the expanded investigation\u003c/h2\u003e\n\n\u003cp\u003eThe investigation was expanded in January 2026 following parliamentary hearings and media coverage. That broader review uncovered several violations separate from the breach itself.\u003c/p\u003e\n\n\u003ch3 id=\"coupang-partners-data-collection\"\u003eCoupang Partners data collection\u003c/h3\u003e\n\n\u003cp\u003eThrough its “Coupang Partners” affiliate marketing program, Coupang covertly collected third-party browsing activity from about 11.2 million users. The collected information included URLs visited, app names, timestamps, IP addresses, and device identifiers.\u003c/p\u003e\n\n\u003cp\u003eThe data was linked to individual member accounts and collected without consent. Coupang argued that the information was not personal data, but the regulator disagreed because it was stored alongside member ID numbers and device identifiers.\u003c/p\u003e\n\n\u003cp\u003eThe commission imposed a further 201.1 billion won, or $132 million, fine for this violation alone. Coupang deleted the records in April 2026 after investigators confronted the company.\u003c/p\u003e\n\n\u003ch3 id=\"hijack-ads\"\u003eHijack ads\u003c/h3\u003e\n\n\u003cp\u003eThe PIPC also found that some advertising partners in the Coupang Partners program had been running “hijack ads.” These ads redirected users to Coupang without their consent.\u003c/p\u003e\n\n\u003cp\u003eIn some cases, the article says the ads covered the screen with a transparent button so that clicking anywhere triggered a redirect. Coupang had been aware of the practice since 2022.\u003c/p\u003e\n\n\u003cp\u003eThe investigation found that Coupang failed to terminate partners who met its own threshold for removal. In some cases, it paid higher commissions to partners after they were caught.\u003c/p\u003e\n\n\u003ch3 id=\"journalist-blacklist\"\u003eJournalist blacklist\u003c/h3\u003e\n\n\u003cp\u003eCoupang Fulfillment Services was found to have secretly added 71 police press-corps journalists to an internal employment blacklist. None of the journalists had ever worked at a Coupang warehouse.\u003c/p\u003e\n\n\u003cp\u003eThe blacklist cited “spreading false information.” The journalists were added without their knowledge or consent.\u003c/p\u003e\n\n\u003ch3 id=\"employee-weight-data\"\u003eEmployee weight data\u003c/h3\u003e\n\n\u003cp\u003eThe logistics subsidiary was also found to have submitted employees’ weight data as evidence in an industrial accident lawsuit. The data had been collected for health management purposes.\u003c/p\u003e\n\n\u003cp\u003eThe commission found that the company did not have a separate legal basis for using the data in that way.\u003c/p\u003e\n\n\u003ch3 id=\"chief-privacy-officer-exclusion\"\u003eChief privacy officer exclusion\u003c/h3\u003e\n\n\u003cp\u003eThe regulator also found that Coupang excluded its own chief privacy officer from the company’s internal investigation of the hacker in December 2025. That investigation had drawn criticism from lawmakers and government officials at the time.\u003c/p\u003e\n\n\u003cp\u003eThe PIPC treated the exclusion not as a mere internal communication failure, but as a substantive violation of the legally mandated independence of the chief privacy officer’s role.\u003c/p\u003e\n\n\u003ch2 id=\"company-and-legal-response\"\u003eCompany and legal response\u003c/h2\u003e\n\n\u003cp\u003eActing CEO Harold Rogers, who was questioned by police in January as a suspect in an obstruction inquiry, had pledged full cooperation with authorities. Coupang said it regretted the PIPC’s decision.\u003c/p\u003e\n\n\u003cp\u003eThe company reserved the right to challenge the decision through legal proceedings once it receives the formal written ruling. Dispute mediation proceedings involving more than 2,500 individual and group claimants, which had been paused during the investigation, are set to resume on June 12.\u003c/p\u003e\n\n\u003cp\u003eA class-action lawsuit in the United States remains pending. Coupang’s shares have fallen around 35% since the start of the year, and the company has warned that revenue growth could slow.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance-stated-in-the-article\"\u003eImpact and significance stated in the article\u003c/h2\u003e\n\n\u003cp\u003eThe PIPC’s sanction is significant because it is the largest fine the commission has ever issued for a personal data breach. The investigation found that the incident affected not only registered Coupang members but also millions of non-members whose information was stored as delivery-recipient data.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that the loss of access logs prevented regulators from identifying all affected victims. Coupang continues to face scrutiny from South Korean lawmakers over both the breach and its response.\u003c/p\u003e\n","keyPoints":["South Korea’s Personal Information Protection Commission fined Coupang and Coupang Fulfillment Services 624.7 billion won, or $409 million, after finding that a data breach resulted from deficiencies in basic safety management.","The investigation confirmed that 33,222,472 registered Coupang members were affected and identified at least 4,338,368 non-members whose names, phone numbers, and addresses had been stored as delivery recipients.","The regulator said a former Coupang employee used a stolen signing key for an alternative authentication system to access customer data over a seven-month period without being detected by the company.","The commission referred Coupang for criminal prosecution over destruction of evidence after the company manually deleted about six months of web access logs and allowed additional records to be automatically wiped.","The investigation also found that Coupang covertly collected third-party browsing activity from about 11.2 million users through its Coupang Partners affiliate marketing program without consent."],"insights":["The attacker’s use of tens of millions of non-existent member IDs and page traffic spikes many times above normal levels went undetected for months, showing that Coupang’s monitoring failed to catch highly anomalous access patterns on sensitive account and delivery pages.","The breach affected millions of non-members who had no direct relationship with Coupang and no way to know their data was stored there, highlighting that delivery-recipient data can create large hidden privacy exposure beyond registered users.","Coupang’s deletion of roughly 13% of access logs from the attack period made it impossible to identify all affected victims, turning log-retention failures into a direct obstacle to breach scoping and notification.","The former employee was able to abuse an authentication system he had developed and a signing key he allegedly stole before leaving, underscoring the importance of key rotation and access reviews when privileged engineers depart.","The regulator treated the exclusion of Coupang’s chief privacy officer from the company’s internal investigation as a violation of the role’s legally mandated independence, not merely an internal process failure."],"referencedReports":[],"body":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission imposed a record 624.7 billion won, or $409 million, fine on Coupang and Coupang Fulfillment Services after investigating a major customer data breach. The regulator concluded that the breach resulted from “deficiencies in basic safety management,” not sophisticated hacking. The penalty is the largest ever issued by the commission for a personal data breach.\u003c/p\u003e\n\n\u003cp\u003eThe investigation confirmed that 33,222,472 registered Coupang members were affected, along with at least 4,338,368 non-members whose names, phone numbers, and addresses had been stored as delivery recipients. The regulator said Coupang failed to notify those non-member victims despite being formally urged to do so four times. Coupang also faces a criminal referral over evidence destruction after web access logs were deleted.\u003c/p\u003e\n\n\u003cp\u003eThe alleged perpetrator was an unnamed Chinese national and former employee who had developed Coupang’s alternative authentication system and stolen the signing key behind it before leaving the company. Using the stolen key, he accessed delivery address and account edit pages tens of millions of times, later sending extortion emails to customers and Coupang. The investigation also uncovered separate privacy violations involving the Coupang Partners affiliate program, advertising practices, journalist blacklisting, employee weight data, and the exclusion of the chief privacy officer from an internal investigation.\u003c/p\u003e\n"},{"n":6,"title":"Over 400 Arch Linux packages compromised to push rootkit, infostealer","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/over-400-arch-linux-packages-compromised-to-push-rootkit-infostealer/","time":"17:03","priority":"MUST READ","score":92,"tldr":"More than 400 Arch User Repository packages were compromised to install the malicious atomic-lockfile npm package, which drops a Linux infostealer with possible eBPF rootkit capabilities. Arch users who installed affected packages should check for compromise, rotate credentials, and consider a full reinstall if infected.","briefOverview":"\u003cp\u003eMore than 400 packages in the Arch User Repository are distributing a Linux rootkit and infostealer targeting credentials and access tokens. The article says a new maintainer spoofed a trusted publisher on AUR to push infected packages. AUR maintainers are working to identify and remove malicious commits and ban the accounts involved.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages were modified with preinstall scripts that download and execute a malicious npm package called atomic-lockfile. Independent researcher Whanos reported that one atomic-lockfile sample included a Linux ELF payload named deps, described as a credential stealer with optional root-only eBPF rootkit capabilities. Sonatype also reported a related campaign in which at least 20 orphaned AUR packages were hijacked and modified to install atomic-lockfile through PKGBUILD changes.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets developer workstation and build environment secrets, including browser and Electron app data, GitHub credentials, npm data, Vault tokens, Docker/Podman data, SSH artifacts, VPN material, shell histories, and collaboration app data. The article advises Arch users to review affected packages and indicators of compromise, use available checks for atomic-lockfile, rotate credentials if compromised, and consider reinstalling Arch from scratch because a rootkit may survive normal cleanup.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMore than 400 packages in the Arch User Repository are distributing a Linux rootkit and infostealer malware aimed at credentials and access tokens. The article cites a report from the Independent Federated Intelligence Network saying a new maintainer spoofed a trusted publisher on AUR to push infected packages. AUR is a community-maintained repository for Arch Linux package build scripts and is described as essential for many Arch-based systems but not a vetted space.\u003c/p\u003e\n\n\u003cp\u003eAccording to IFIN member Michael Taggart, the compromised packages were modified with preinstall scripts that download and execute a malicious npm package called atomic-lockfile. Independent researcher Whanos reported that one sample of atomic-lockfile included a Linux ELF payload named deps. Whanos described the payload as a credential stealer with optional root-only eBPF rootkit capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware is designed for developer workstations and build environments. It targets browser and Electron application data, Slack, Microsoft Teams, Discord, GitHub, npm, Vault, Docker/Podman, SSH, VPN material, shell histories, and other local developer secrets. With eBPF technology present, the malware can run inside the kernel with elevated privileges and hide local processes.\u003c/p\u003e\n\n\u003cp\u003eSonatype also published a report on a campaign targeting AUR and delivering atomic-lockfile through a different method. Sonatype said the threat actor hijacked at least 20 orphaned AUR packages and modified the PKGBUILD file to add a post-install script invoking npm to retrieve the malicious package. Its analysis found a Linux executable with references to an eBPF rootkit that could hide processes, files, and network interfaces.\u003c/p\u003e\n\n\u003cp\u003eAUR maintainers are working to identify and remove malicious commits and ban the accounts pushing them. Arch Linux package maintainer Jonathan Grotelüschen urged users to report malicious packages they find. Arch users are advised to review affected packages and indicators of compromise, check for atomic-lockfile, rotate all credentials if compromised, and consider reinstalling Arch from scratch because a rootkit may survive normal cleaning efforts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMore than 400 packages in the Arch User Repository are distributing a Linux rootkit and infostealer malware targeting credentials and access tokens. The article reports that a new maintainer is spoofing a trusted publisher on AUR to push infected packages, citing a report from the Independent Federated Intelligence Network.\u003c/p\u003e\n\n\u003cp\u003eAUR is described as a community-maintained repository for Arch Linux that contains PKGBUILD scripts with instructions for downloading, compiling, and installing software not available in Arch’s official repositories. The article notes that AUR is widely used because it provides proprietary applications, beta or nightly versions of open-source software, niche utilities, and older package versions, but it is not a vetted space.\u003c/p\u003e\n\n\u003ch2 id=\"compromise-method\"\u003eCompromise Method\u003c/h2\u003e\n\n\u003cp\u003eAccording to IFIN member Michael Taggart, the compromised packages were modified with preinstall scripts that download and execute a malicious npm package called atomic-lockfile. The article says this allowed infected AUR packages to retrieve and run the malicious package during installation.\u003c/p\u003e\n\n\u003cp\u003eSonatype reported a related campaign using a different method. Its researchers said a threat actor hijacked at least 20 orphaned AUR packages and modified their PKGBUILD files, which are Bash scripts containing build information for Arch Linux packages. The modified packages added a post-install script that invoked npm and installed atomic-lockfile during package installation.\u003c/p\u003e\n\n\u003ch2 id=\"malware-and-capabilities\"\u003eMalware and Capabilities\u003c/h2\u003e\n\n\u003cp\u003eIndependent security researcher Whanos reported that one sample of atomic-lockfile included a Linux ELF payload named deps. Whanos described deps as a credential stealer with optional root-only eBPF rootkit capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware is designed for developer workstations and build environments. It targets sensitive local data including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrowser and Electron application data\u003c/li\u003e\n\u003cli\u003eSlack data\u003c/li\u003e\n\u003cli\u003eMicrosoft Teams data\u003c/li\u003e\n\u003cli\u003eDiscord data\u003c/li\u003e\n\u003cli\u003eGitHub credentials\u003c/li\u003e\n\u003cli\u003enpm data\u003c/li\u003e\n\u003cli\u003eHashiCorp Vault tokens\u003c/li\u003e\n\u003cli\u003eDocker and Podman data\u003c/li\u003e\n\u003cli\u003eSSH artifacts\u003c/li\u003e\n\u003cli\u003eVPN material\u003c/li\u003e\n\u003cli\u003eShell histories\u003c/li\u003e\n\u003cli\u003eTelegram data\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that with eBPF technology present, the malware can run inside the kernel with elevated privileges and hide local processes. Sonatype’s analysis also found references to an eBPF rootkit that could hide processes, files, and network interfaces.\u003c/p\u003e\n\n\u003ch2 id=\"exfiltration-indicators\"\u003eExfiltration Indicators\u003c/h2\u003e\n\n\u003cp\u003eSonatype determined that the Linux binary can archive data, handle multi-part files, and perform HTTP uploads. The article says these capabilities indicate that functionality for a typical exfiltration mechanism is present.\u003c/p\u003e\n\n\u003cp\u003eThe sensitive information targeted by the binary includes GitHub credentials, SSH artifacts, HashiCorp Vault tokens, browser cookie databases, Slack data, Discord data, Microsoft Teams data, and Telegram data.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-ecosystem\"\u003eAffected Parties and Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe affected ecosystem is the Arch User Repository, which serves Arch Linux and Arch-based distributions. The article emphasizes that AUR is community-maintained and not vetted, making it possible for threat actors to push malware through packages that change ownership without being noticed.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies AUR users, especially users of developer workstations and build environments, as impacted because the malware targets credentials, tokens, application data, container tooling data, SSH material, and other local developer secrets.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommendations\"\u003eResponse and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eAUR maintainers are working to identify and remove malicious commits and ban the accounts pushing them. Arch Linux package maintainer Jonathan Grotelüschen urged users to report any malicious package they find.\u003c/p\u003e\n\n\u003cp\u003eThe article advises Arch users to review the list of affected packages and the indicators of compromise provided in Whanos’s report. It also notes that Michael Taggart pointed to a script that checks for atomic-lockfile malware on the system.\u003c/p\u003e\n\n\u003cp\u003eIf compromised packages are found, users are advised to rotate all credentials and consider reinstalling Arch from scratch. The article says this is because a rootkit may survive normal cleaning efforts.\u003c/p\u003e\n","keyPoints":["More than 400 packages in the Arch User Repository are distributing a Linux rootkit and infostealer malware targeting credentials and access tokens.","The compromised packages were modified with preinstall or post-install scripts that download and execute a malicious npm package called atomic-lockfile.","Independent researcher Whanos reported that one atomic-lockfile sample included a Linux ELF payload named deps, described as a credential stealer with optional root-only eBPF rootkit capabilities.","Sonatype said the attacker hijacked at least 20 orphaned AUR packages and modified their PKGBUILD files to invoke npm and install atomic-lockfile during package installation.","Arch users are advised to review affected packages and indicators of compromise, check for atomic-lockfile, rotate credentials if compromised, and consider reinstalling Arch from scratch because a rootkit may survive normal cleaning efforts."],"insights":["The campaign abused AUR’s community-maintained trust model by spoofing a trusted publisher and taking over orphaned packages, showing that package ownership changes are a critical review point for Arch users.","The malicious package targeted developer and build environments specifically, including GitHub, npm, Vault, Docker/Podman, SSH, browser, and collaboration app data, making credential rotation broader than just system passwords.","Because the payload referenced eBPF rootkit capabilities that can hide processes, files, and network interfaces, normal removal of suspicious packages may not be sufficient after infection.","The attack bridged ecosystems by using AUR package scripts to invoke npm and retrieve the malicious atomic-lockfile package, so reviewing only the AUR package source may miss the final payload source."],"referencedReports":[{"title":"400+ AUR Packages Compromised with Infostealer and Rootkit","url":"https://discourse.ifin.network/t/400-aur-packages-compromised-with-infostealer-and-rootkit/577","publisher":"Independent Federated Intelligence Network","context":"The article cites an IFIN report stating that a new maintainer spoofed a trusted AUR publisher and that compromised packages were modified to download and execute atomic-lockfile.","category":"","primary":false},{"title":"Preliminary Analysis of AUR Malware","url":"https://ioctl.fail/preliminary-analysis-of-aur-malware/","publisher":"Whanos","context":"The article cites Whanos's analysis describing the atomic-lockfile payload as a credential stealer with optional root-only eBPF rootkit capabilities and listing indicators of compromise.","category":"","primary":false},{"title":"Atomic Arch: npm Campaign Adds Malicious Dependency","url":"https://www.sonatype.com/blog/atomic-arch-npm-campaign-adds-malicious-dependency","publisher":"Sonatype","context":"The article references Sonatype's report on a campaign targeting AUR packages by modifying PKGBUILD files to install the malicious atomic-lockfile npm package.","category":"","primary":false}],"body":"\u003cp\u003eMore than 400 packages in the Arch User Repository are distributing a Linux rootkit and infostealer targeting credentials and access tokens. The article says a new maintainer spoofed a trusted publisher on AUR to push infected packages. AUR maintainers are working to identify and remove malicious commits and ban the accounts involved.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages were modified with preinstall scripts that download and execute a malicious npm package called atomic-lockfile. Independent researcher Whanos reported that one atomic-lockfile sample included a Linux ELF payload named deps, described as a credential stealer with optional root-only eBPF rootkit capabilities. Sonatype also reported a related campaign in which at least 20 orphaned AUR packages were hijacked and modified to install atomic-lockfile through PKGBUILD changes.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets developer workstation and build environment secrets, including browser and Electron app data, GitHub credentials, npm data, Vault tokens, Docker/Podman data, SSH artifacts, VPN material, shell histories, and collaboration app data. The article advises Arch users to review affected packages and indicators of compromise, use available checks for atomic-lockfile, rotate credentials if compromised, and consider reinstalling Arch from scratch because a rootkit may survive normal cleanup.\u003c/p\u003e\n"},{"n":20,"title":"China-Linked Hackers Backdoored Linux Login Software to Hide for Nearly a Decade","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/china-linked-hackers-backdoored-linux.html","time":"18:17","priority":"MUST READ","score":92,"tldr":"China-linked Velvet Ant hid for nearly a decade by backdooring Linux PAM and OpenSSH login components, letting them steal credentials and retain access even after normal cleanup. The key takeaway is that defenders must verify the integrity of trusted infrastructure like login software, not just reset passwords or patch known CVEs.","briefOverview":"\u003cp\u003eSygnia says the China-nexus group Velvet Ant hid inside Linux login infrastructure by backdooring PAM and OpenSSH components. The activity, tracked in Operation Highland, dates back to 2016 and affected a network that had no direct internet access. Instead of relying on obvious malware, the attacker modified trusted login programs that decide who is allowed to sign in.\u003c/p\u003e\n\n\u003cp\u003eThe backdoored PAM modules allowed access with secret passwords and, in some versions, quietly recorded legitimate usernames and passwords. Altered OpenSSH programs also logged credentials and every command typed, with a hidden switch to disable logging when needed. Because the login system itself was compromised, routine containment such as password resets or killing sessions did not resolve the problem.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights Velvet Ant’s pattern of moving into infrastructure that defenders monitor less closely, including F5 BIG-IP appliances, Cisco Nexus switches, and now Linux login components. It says Operation Highland is not a one-CVE problem because the attacker changed trusted software after gaining access. The recommended response is integrity verification of PAM and OpenSSH files, comparison against known-good copies, and removal of backdoors before resetting passwords.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSygnia reports that Velvet Ant, a China-nexus threat group, backdoored Linux login software to maintain access for nearly a decade. The campaign, referred to as Operation Highland, involved modifications to PAM and OpenSSH components that control authentication and login behavior. The earliest traces described in the article go back to 2016.\u003c/p\u003e\n\n\u003cp\u003eThe targeted network had no direct internet access, so the attacker first staged through internet-facing systems. The article says the group used disguised tools and an internet-facing web server as a bridge to pass commands and open remote sessions into the isolated segment. This allowed the actor to reach systems that were not directly exposed to the internet.\u003c/p\u003e\n\n\u003cp\u003eOn many machines, the attacker replaced the main PAM login module with backdoored copies. Some versions allowed access using a secret password, while others quietly captured real usernames and passwords as users logged in. Researchers found nine separate versions of the backdoored PAM components.\u003c/p\u003e\n\n\u003cp\u003eThe OpenSSH programs were also altered to log credentials and every command typed. The modified OpenSSH components included a hidden switch that could turn logging off when needed. Because these changes were made to trusted login programs, the activity did not look like a typical malware deployment and could appear similar to normal administration.\u003c/p\u003e\n\n\u003cp\u003eThe article connects Operation Highland to earlier Velvet Ant activity reported by Sygnia. In a 2024 case, Sygnia found the group using internet-exposed F5 BIG-IP appliances as internal command servers. Later that year, Sygnia reported that the group exploited Cisco NX-OS flaw CVE-2024-20399 to plant a backdoor on switches, with Cisco patching the flaw in July 2024 and CISA flagging it as exploited the next day.\u003c/p\u003e\n\n\u003cp\u003eThe main response guidance in the article is to verify trusted infrastructure rather than only patching or resetting credentials. It recommends monitoring PAM and OpenSSH files for changes, comparing them with known-good copies, and removing the backdoor before resetting passwords. The article also warns that cleanup is delicate because replacing login software incorrectly can lock administrators out of live systems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSygnia says the China-nexus threat group Velvet Ant backdoored Linux login software as part of an activity cluster referred to as Operation Highland. The group allegedly modified PAM and OpenSSH components, which are responsible for authentication and remote login behavior on Linux systems. According to the article, the earliest traces of the activity go back to 2016.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the activity is that the attacker hid inside trusted login infrastructure rather than relying on newly deployed malware that defenders might more easily detect. By altering the programs that validate credentials and manage remote access, the group placed persistence and credential collection inside components that administrators normally depend on. The article states that no exploit was needed at that stage because the attacker changed trusted programs after gaining access.\u003c/p\u003e\n\n\u003ch2 id=\"target-environment-and-access-path\"\u003eTarget Environment and Access Path\u003c/h2\u003e\n\n\u003cp\u003eThe targeted network had no direct internet access. To reach it, the attacker first staged through internet-facing systems. The article says the group used disguised tools and an internet-facing web server as a bridge.\u003c/p\u003e\n\n\u003cp\u003eThrough that bridge, the attacker passed commands and opened remote sessions deep inside the isolated network segment. This made the operation more complex than simply compromising an internet-exposed host. It also meant the group was able to operate inside a network segment that defenders may have considered protected by lack of direct internet connectivity.\u003c/p\u003e\n\n\u003ch2 id=\"pam-backdoors\"\u003ePAM Backdoors\u003c/h2\u003e\n\n\u003cp\u003eThe article says the attacker replaced the main PAM login module on many machines with backdoored copies. PAM components decide whether users are allowed to sign in, making them a highly sensitive part of the Linux authentication process.\u003c/p\u003e\n\n\u003cp\u003eThe backdoored PAM variants had different capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSome allowed the attacker to log in with a secret password.\u003c/li\u003e\n\u003cli\u003eOthers quietly recorded legitimate usernames and passwords as users logged in.\u003c/li\u003e\n\u003cli\u003eResearchers found nine separate versions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause these changes were made to trusted authentication software, the activity did not necessarily produce the indicators associated with ordinary malware. The article emphasizes that nothing obvious appeared and the behavior could resemble normal administration.\u003c/p\u003e\n\n\u003ch2 id=\"openssh-modifications\"\u003eOpenSSH Modifications\u003c/h2\u003e\n\n\u003cp\u003eThe OpenSSH programs were altered in a similar way. According to the article, the modified OpenSSH components logged credentials and every command typed. They also included a hidden switch that could turn logging off when needed.\u003c/p\u003e\n\n\u003cp\u003eThis gave the attacker visibility into both authentication material and post-login activity. It also embedded monitoring and collection capabilities directly into a trusted remote access service. The article presents this as part of the same broader strategy of hiding in infrastructure defenders watch less closely.\u003c/p\u003e\n\n\u003ch2 id=\"why-normal-containment-was-insufficient\"\u003eWhy Normal Containment Was Insufficient\u003c/h2\u003e\n\n\u003cp\u003eThe article states that normal containment measures did little because the login system itself was compromised. Password resets and killed sessions were not enough while the component checking credentials was working for the attacker.\u003c/p\u003e\n\n\u003cp\u003eThis creates an important operational order of response described in the article: the backdoor must be removed before resetting passwords. Otherwise, new credentials can be captured in the same way as the old ones. The article also warns that cleanup is delicate because replacing login components incorrectly can lock administrators out of a live system.\u003c/p\u003e\n\n\u003ch2 id=\"connection-to-earlier-velvet-ant-activity\"\u003eConnection to Earlier Velvet Ant Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article links Operation Highland to earlier Velvet Ant cases reported by Sygnia. In a 2024 case, Sygnia found the same actor turning internet-exposed F5 BIG-IP appliances into internal command servers. This fits the article’s description of Velvet Ant moving into systems that defenders monitor less closely.\u003c/p\u003e\n\n\u003cp\u003eLater in 2024, Sygnia reported the group exploiting Cisco NX-OS flaw CVE-2024-20399 to plant a backdoor on switches. The article notes that the bug requires admin access first, so it is described as a persistence tool rather than a remote break-in. Cisco patched the flaw in July 2024, and CISA flagged it as exploited the next day.\u003c/p\u003e\n\n\u003ch2 id=\"response-guidance-in-the-article\"\u003eResponse Guidance in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article says Operation Highland is not a one-CVE problem. Since the attacker changed trusted programs after getting in, the fix is verification rather than simply patching a single vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends several defensive steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitor PAM and OpenSSH programs and key files for changes.\u003c/li\u003e\n\u003cli\u003eAlert when those files change.\u003c/li\u003e\n\u003cli\u003eHunt by comparing login components against known-good copies.\u003c/li\u003e\n\u003cli\u003eRemove the backdoor before resetting passwords.\u003c/li\u003e\n\u003cli\u003eTest replacements in a lab before deploying them to live systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor related earlier cases, the article also notes that Cisco Nexus gear should be patched for CVE-2024-20399 and that F5 systems should be monitored for unexpected outbound connections.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central lesson is that trusted infrastructure outside normal monitoring still needs integrity checks. Velvet Ant’s reported activity shows a pattern of hiding in load balancers, switches, and now the Linux login layer. In Operation Highland, the compromised components were not peripheral tools but the authentication mechanisms themselves, making integrity verification essential to detection and recovery.\u003c/p\u003e\n","keyPoints":["Sygnia says the China-nexus group Velvet Ant backdoored Linux PAM and OpenSSH components that control user logins.","The earliest traces of the activity go back to 2016, and the attacker modified trusted login programs instead of dropping new malware.","The backdoored PAM and OpenSSH components enabled secret-password access, credential logging, command logging, and a hidden switch to disable logging when needed.","The targeted network had no direct internet access, so the attacker used internet-facing systems, including a web server, as a bridge into the isolated segment.","The article says normal containment measures such as password resets and killed sessions were ineffective while the compromised login system remained in place."],"insights":["Password resets should come only after removing the backdoored login components, because otherwise the replacement credentials can be captured by the same compromised PAM or OpenSSH software.","Integrity verification is more important than CVE patching for Operation Highland, because the attacker modified trusted programs after gaining access rather than relying on a single known vulnerability.","Defenders should compare PAM and OpenSSH components against known-good copies, since the altered login programs may not trigger scanner detections or look like conventional malware.","Cleanup is operationally risky because incorrectly replacing compromised login software can lock administrators out of live systems.","Velvet Ant’s pattern is to move into trusted infrastructure that receives less monitoring, including F5 appliances, Cisco switches, and Linux login components."],"referencedReports":[{"title":"Operation Highland","url":"https://www.sygnia.co/blog/operation-highland-velvet-ant/","publisher":"Sygnia","context":"The article identifies Sygnia's Operation Highland report as the source describing Velvet Ant's backdooring of Linux PAM and OpenSSH login components.","category":"","primary":false},{"title":"China-Nexus Threat Group Velvet Ant","url":"https://www.sygnia.co/blog/china-nexus-threat-group-velvet-ant/","publisher":"Sygnia","context":"The article references a 2024 Sygnia case describing the same actor using internet-exposed F5 BIG-IP appliances as internal command servers.","category":"","primary":false}],"body":"\u003cp\u003eSygnia says the China-nexus group Velvet Ant hid inside Linux login infrastructure by backdooring PAM and OpenSSH components. The activity, tracked in Operation Highland, dates back to 2016 and affected a network that had no direct internet access. Instead of relying on obvious malware, the attacker modified trusted login programs that decide who is allowed to sign in.\u003c/p\u003e\n\n\u003cp\u003eThe backdoored PAM modules allowed access with secret passwords and, in some versions, quietly recorded legitimate usernames and passwords. Altered OpenSSH programs also logged credentials and every command typed, with a hidden switch to disable logging when needed. Because the login system itself was compromised, routine containment such as password resets or killing sessions did not resolve the problem.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights Velvet Ant’s pattern of moving into infrastructure that defenders monitor less closely, including F5 BIG-IP appliances, Cisco Nexus switches, and now Linux login components. It says Operation Highland is not a one-CVE problem because the attacker changed trusted software after gaining access. The recommended response is integrity verification of PAM and OpenSSH files, comparison against known-good copies, and removal of backdoors before resetting passwords.\u003c/p\u003e\n"},{"n":2,"title":"phpBB forum fixes auth bypass bug lurking for a decade","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/phpbb-forum-fixes-auth-bypass-bug-lurking-for-a-decade/","time":"18:19","priority":"SHOULD READ","score":89,"tldr":"phpBB fixed a decade-old authentication bypass in version 3.3.17 that could let attackers log in as any user, including administrators, with a single HTTP request. Forum operators on phpBB 3.3.16 or earlier should upgrade immediately, while 4.x users do not yet have a safe release.","briefOverview":"\u003cp\u003ephpBB fixed a 10-year-old authentication bypass vulnerability that could allow an attacker to log in as any user, including administrators. The flaw has no identifier and is described as trivial to exploit with a single HTTP request. It affects phpBB 3.3.16 and below, as well as 4.0.0-a2.\u003c/p\u003e\n\n\u003cp\u003eAikido discovered the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program. phpBB responded immediately and addressed the issue on June 6 in phpBB 3.3.17. Aikido said the flaw was introduced into the codebase 10 years ago and affects all versions of the 3.x and 4.x release branches up to the affected versions.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is exploitable in the default configuration and requires no special knowledge, according to Aikido. Administrator access could expose private messages, allow content or account changes, enable staff impersonation, or lead to site defacement. Aikido said remote code execution is not possible because the Admin Control Panel is protected by a separate password check.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ephpBB has fixed a decade-old authentication bypass flaw that could let an attacker log in as any user, including administrators. The vulnerability does not have an identifier and is described as trivial to exploit using a single HTTP request. It affects phpBB versions 3.3.16 and below and 4.0.0-a2.\u003c/p\u003e\n\n\u003cp\u003eResearchers at Aikido found the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program. phpBB responded immediately and released a fix for the 3.x branch on June 6 in version 3.3.17. Aikido said there is not yet a safe 4.x release, and advised affected 4.x users to upgrade to master.\u003c/p\u003e\n\n\u003cp\u003eAccording to Aikido, the flaw was introduced into phpBB’s codebase 10 years ago. It impacts all versions of the 3.x and 4.x release branches up to 3.3.16 and 4.0.0-a2. The vulnerability is exploitable in phpBB’s default configuration and requires no special knowledge.\u003c/p\u003e\n\n\u003cp\u003eThe impact is significant because administrator access could allow attackers to view private messages stored on a forum, create, modify, or delete content and user accounts, impersonate staff, or deface sites. The article also notes that selecting targets is straightforward because phpBB member lists are public by default. However, Aikido said remote code execution is not possible due to a separate password check protecting the Admin Control Panel.\u003c/p\u003e\n\n\u003cp\u003eAikido withheld technical details to give forum administrators time to apply security updates. The researchers also contacted administrators of large phpBB-based forums directly to alert them. The update may break forums using OAuth authentication because the OAuth redirect handler has moved, though the article says this should be a simple fix in most cases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ephpBB fixed a 10-year-old authentication bypass vulnerability in its forum software. The flaw allows an attacker to log in as any user, including administrators. It does not have an identifier and is described as trivial to exploit with a single HTTP request.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects phpBB versions 3.3.16 and below, as well as 4.0.0-a2. Aikido said the bug was introduced into phpBB’s codebase 10 years ago and affects all versions of the 3.x and 4.x release branches up to those versions.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-disclosure\"\u003eDiscovery and disclosure\u003c/h2\u003e\n\n\u003cp\u003eResearchers at application security company Aikido discovered the bug on June 2. They reported it through phpBB’s HackerOne Vulnerability Disclosure Program.\u003c/p\u003e\n\n\u003cp\u003ephpBB responded to the report immediately and addressed the issue on June 6 in phpBB version 3.3.17. For the 4.x release branch, the article states that no fix is available yet.\u003c/p\u003e\n\n\u003ch2 id=\"affected-software\"\u003eAffected software\u003c/h2\u003e\n\n\u003cp\u003eThe affected phpBB versions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ephpBB 3.3.16 and below.\u003c/li\u003e\n\u003cli\u003ephpBB 4.0.0-a2.\u003c/li\u003e\n\u003cli\u003eAll versions of the 3.x and 4.x release branches up to those affected versions, according to Aikido.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAikido advised users on phpBB 3.3.16 and below to upgrade to 3.3.17. For users on phpBB 4.0.0-a2, Aikido said to upgrade to master because there is no safe 4.x release yet.\u003c/p\u003e\n\n\u003ch2 id=\"exploitability\"\u003eExploitability\u003c/h2\u003e\n\n\u003cp\u003eAikido said the vulnerability is exploitable in the default phpBB configuration. It requires no special knowledge and can be triggered with a single HTTP request.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that selecting targets is also straightforward because the member list on phpBB forums is public by default. This means an attacker could identify forum users, including administrators, for potential account impersonation.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impact\"\u003ePotential imp
