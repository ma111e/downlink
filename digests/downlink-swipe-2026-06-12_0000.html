le connects AI-SPM with the need for deep visibility, strong governance, and continuous protection.\u003c/p\u003e\n\n\u003cp\u003eAppOmni states that it applies SaaS Security Posture Management principles to AI security. In the company’s description, this includes monitoring posture, access, third-party connections, and AI-related activity. The article does not describe a specific incident, breach, threat actor, or vulnerability, but instead focuses on the security posture challenges introduced by AI in SaaS.\u003c/p\u003e\n\n\u003ch2 id=\"appomni-platform-capabilities\"\u003eAppOmni Platform Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the AppOmni platform as helping IT, infosec, and SOC teams secure AI in SaaS environments. It says the platform provides \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e visibility and guided response. It also says AppOmni uses AI to power simplified SaaS security.\u003c/p\u003e\n\n\u003ch3 id=\"marlin-ai\"\u003eMarlin AI\u003c/h3\u003e\n\n\u003cp\u003eMarlin AI is described as the industry’s first autonomous AI-powered SaaS security capability for investigation and guided remediation. The article says it is used to correlate alerts. It positions Marlin AI as part of AppOmni’s approach to simplifying SaaS security operations.\u003c/p\u003e\n\n\u003ch3 id=\"askomni\"\u003eAskOmni\u003c/h3\u003e\n\n\u003cp\u003eAskOmni is described as a GenAI SaaS security assistant. The article says organizations can use it to ask security questions in plain language. It also says AskOmni provides remediation guidance.\u003c/p\u003e\n\n\u003ch3 id=\"agentguard\"\u003eAgentGuard\u003c/h3\u003e\n\n\u003cp\u003eAgentGuard is described as a tool for enforcing guardrails in AI-related SaaS security. According to the article, AgentGuard uses continuous monitoring, policy management, malicious prompt blocking, and control of third-party integrations. It also applies zero trust policies.\u003c/p\u003e\n\n\u003ch2 id=\"scale-and-impact-claimed-by-appomni\"\u003eScale and Impact Claimed by AppOmni\u003c/h2\u003e\n\n\u003cp\u003eAppOmni states that it protects more than 101 million SaaS user accounts. The company also says it secures more than 260 million exposed data records. The article says the AppOmni platform analyzes 2 billion security events every day.\u003c/p\u003e\n\n\u003cp\u003eThese figures are presented as evidence of enterprise scale and proven impact. The article does not provide details about specific customers, incidents, or deployments. It says the largest and fastest-growing global enterprises across industries trust AppOmni to secure their SaaS applications.\u003c/p\u003e\n\n\u003ch2 id=\"other-industry-recognition-mentioned\"\u003eOther Industry Recognition Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several other recognitions for AppOmni. These include the Frost \u0026amp; Sullivan Growth and Innovation Leader designation in the 2025 Frost Radar for SaaS Security Posture Management. The article also says AppOmni received the 2025 Frost \u0026amp; Sullivan Technology Innovation Leadership Award.\u003c/p\u003e\n\n\u003cp\u003eAdditional recognition mentioned includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn Omdia feature describing AppOmni as offering a comprehensive SaaS security platform.\u003c/li\u003e\n\u003cli\u003eFortune Cyber60 recognition.\u003c/li\u003e\n\u003cli\u003eGreat Place to Work recognition in the USA and UK.\u003c/li\u003e\n\u003cli\u003eLeader and Fast Mover status in the 2024 GigaOm Radar for SaaS Security Posture Management.\u003c/li\u003e\n\u003cli\u003eCRN 2023 and 2024 Stellar Startup recognition.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-actors\"\u003eAffected Parties and Actors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a cyberattack, intrusion, or breach. It does not name any threat actors, malware families, exploited vulnerabilities, or affected victim organizations. The stakeholders described are AppOmni, Intellyx, and the enterprise IT, infosec, and SOC teams that AppOmni says its platform supports.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article is a company announcement centered on AppOmni winning the 2026 Intellyx Digital Innovator Award. Its main cybersecurity message is that AI embedded in SaaS creates posture, access, governance, and detection challenges that traditional tools may not address. AppOmni presents its platform, including Marlin AI, AskOmni, and AgentGuard, as a response to those SaaS and AI security challenges.\u003c/p\u003e\n","keyPoints":["AppOmni received the 2026 Intellyx Digital Innovator Award, marking its second consecutive year and third overall time earning the recognition.","AppOmni CEO Neill Occhiogrosso said the award validates the company’s innovation and leadership in SaaS and AI security as AI becomes increasingly integrated into SaaS platforms.","The article states that AI expands the SaaS attack surface because AI-enabled services interact with customer data, inherit user permissions, and can operate autonomously without security posture guardrails.","The AppOmni platform provides 24/7 visibility and guided response for securing AI in SaaS environments, including Marlin AI, AskOmni, and AgentGuard capabilities.","AppOmni says it protects more than 101 million SaaS user accounts, secures over 260 million exposed data records, and analyzes 2 billion security events per day."],"insights":["The article frames AI security in SaaS as an extension of SaaS Security Posture Management, emphasizing visibility, governance, and continuous protection rather than treating AI as a separate security domain.","A practical security priority identified in the article is managing AI-driven services by their identities, permissions, and access because these services can inherit user permissions and interact with customer data.","The article highlights that AI security guardrails in SaaS need to cover more than configuration management, including malicious prompt blocking and controls over third-party integrations.","AppOmni’s described AI security approach combines using AI to secure SaaS with securing AI embedded in SaaS, showing a dual role for AI in both the risk model and the defensive tooling."],"referencedReports":[{"title":"2025 Frost Radar™ for SaaS Security Posture Management (SSPM)","url":"https://appomni.com/reports/appomni-2025-frost-sullivan-sspm-growth-leader/","publisher":"Frost \u0026 Sullivan","context":"The article cites this Frost \u0026 Sullivan analyst report as recognition of AppOmni as a Growth and Innovation Leader in SaaS Security Posture Management.","category":"","primary":false},{"title":"On the Radar: AppOmni Offers a Comprehensive SaaS Security Platform","url":"https://omdia.tech.informa.com/om128660/on-the-radar-appomni-offers-a-comprehensive-saas-security-platform","publisher":"Omdia","context":"The article says AppOmni was featured by Omdia for its comprehensive SaaS security platform.","category":"","primary":false},{"title":"2024 GigaOm Radar for SaaS Security Posture Management (SSPM) Report","url":"https://appomni.com/reports/2024-gigaom-radar-for-saas-security-posture-management-sspm-report/","publisher":"GigaOm","context":"The article references this GigaOm Radar report in noting that AppOmni was named a Leader and Fast Mover in SSPM.","category":"","primary":false}],"body":"\u003cp\u003eAppOmni announced on June 9, 2026, that it received the 2026 Intellyx Digital Innovator Award. The company said this marks its second consecutive year and third overall time earning the recognition. AppOmni positioned the award as validation of its innovation and leadership in SaaS and AI security.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that AI is increasingly delivered as SaaS and embedded within SaaS platforms, creating new challenges for security teams. It states that AI-enabled services can interact with customer data, inherit user permissions, and operate autonomously without security posture guardrails. AppOmni argues that traditional security tools are often not equipped for these challenges and that teams now require AI Security Posture Management.\u003c/p\u003e\n\n\u003cp\u003eAppOmni describes its platform as providing \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e visibility and guided response for securing AI in SaaS environments. The article highlights Marlin AI for investigation and guided remediation, AskOmni as a GenAI SaaS security assistant, and AgentGuard for policy management, malicious prompt blocking, third-party integration control, and zero trust guardrails. AppOmni also says it protects more than 101 million SaaS user accounts, secures over 260 million exposed data records, and analyzes 2 billion security events per day.\u003c/p\u003e\n"},{"n":29,"title":"The JNUC 2026 session catalog is live — and the clock is ticking","source":"jamf.com","sourceColorIdx":3,"link":"https://www.jamf.com/blog/jnuc-2026-session-catalog/","time":"15:02","priority":"MAY READ","score":25,"tldr":"Jamf has opened the JNUC 2026 session catalog, with programming focused on Apple platform management and enterprise AI. Attendees are encouraged to browse sessions and register before Just in Time pricing ends on July 1 for the September 23–25 event in Kansas City.","briefOverview":"\u003cp\u003eJamf announced that the JNUC 2026 session catalog is live. The article encourages prospective attendees to browse the lineup, identify relevant sessions and start building an agenda. It frames the catalog launch as a reason to commit to attending the event.\u003c/p\u003e\n\n\u003cp\u003eThe stated theme for JNUC 2026 is the Apple platform for enterprise AI. The programming covers areas including Mac workflows, mobility workflows, Mac and mobile compliance, reporting and risk reduction, integrations and APIs, end-user experience, and community, career and culture. The article says JNUC has brought Apple admins together for over 16 years.\u003c/p\u003e\n\n\u003cp\u003eThe event is scheduled for September 23–25, 2026, in Kansas City. Jamf says Just in Time pricing remains available only through July 1, after which standard rates begin. The article directs readers to browse the full session catalog and register before the pricing deadline.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eJamf announced that the JNUC 2026 session catalog is officially live. The article tells readers they can browse the full lineup, find sessions relevant to them and start building an agenda around the content they want to attend. It presents the catalog launch as a key moment for prospective attendees who have been waiting to commit.\u003c/p\u003e\n\n\u003cp\u003eJNUC 2026 is described as an event for Apple admins and the Jamf Nation community. The article states that JNUC has been bringing Apple admins together for more than 16 years. It emphasizes that the conference offers content and connections that attendees will not find elsewhere.\u003c/p\u003e\n\n\u003cp\u003eThe theme of the 2026 conference is the Apple platform for enterprise AI. The program areas listed in the article include Mac workflows, mobility workflows, Mac and mobile compliance, reporting and risk reduction, integrations and APIs, end-user experience, and community, career and culture. These topics define the technical and community-focused scope of the published session catalog.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the key timing and location details for the event. JNUC 2026 is scheduled to take place in Kansas City from September 23–25, 2026. Jamf says Jamf Nation is showing up and asks whether the reader will be there.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights a registration deadline tied to pricing. Just in Time pricing is available only through July 1, and standard rates begin after that date. Jamf encourages readers to register early so they can lock in a spot and begin planning their agenda.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eJamf announced that the JNUC 2026 session catalog is officially live. The article encourages readers to browse the full lineup, identify sessions that match their interests and start building an agenda around the content most relevant to them. It frames the catalog release as a reason for prospective attendees to commit to the conference.\u003c/p\u003e\n\n\u003ch2 id=\"event-context\"\u003eEvent Context\u003c/h2\u003e\n\n\u003cp\u003eJNUC 2026 is presented as part of a long-running event series for Apple administrators. The article states that JNUC has been bringing Apple admins together for more than 16 years. Jamf describes the event as offering content and connections that attendees will not find anywhere else.\u003c/p\u003e\n\n\u003cp\u003eThe conference is scheduled for September 23–25, 2026, in Kansas City. The article refers to Jamf Nation as showing up for the event and asks whether the reader will attend.\u003c/p\u003e\n\n\u003ch2 id=\"theme-and-program-focus\"\u003eTheme and Program Focus\u003c/h2\u003e\n\n\u003cp\u003eThe stated theme for JNUC 2026 is the Apple platform for enterprise AI. The article says the programming reflects where the industry is headed, while keeping the focus on the conference theme and session catalog.\u003c/p\u003e\n\n\u003cp\u003eThe session catalog includes content in several areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMac workflows\u003c/li\u003e\n\u003cli\u003eMobility workflows\u003c/li\u003e\n\u003cli\u003eMac and mobile compliance\u003c/li\u003e\n\u003cli\u003eReporting and risk reduction\u003c/li\u003e\n\u003cli\u003eIntegrations and APIs\u003c/li\u003e\n\u003cli\u003eEnd-user experience\u003c/li\u003e\n\u003cli\u003eCommunity, career and culture\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese areas show that the agenda covers both technical Apple administration topics and broader community or career-oriented topics.\u003c/p\u003e\n\n\u003ch2 id=\"registration-and-pricing-deadline\"\u003eRegistration and Pricing Deadline\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights that Just in Time pricing is still available. It states that this pricing is available only through July 1. After that date, standard rates begin.\u003c/p\u003e\n\n\u003cp\u003eJamf urges readers to register before the pricing deadline to lock in their spot. The article also says that registering sooner allows attendees to begin planning their agenda sooner.\u003c/p\u003e\n\n\u003ch2 id=\"calls-to-action\"\u003eCalls to Action\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a link to browse the JNUC 2026 session catalog. It also encourages readers to check out the top 10 reasons to attend JNUC 2026. The main action requested is for readers to review the catalog, plan their agenda and register before Just in Time pricing ends.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a security incident, threat actor, vulnerability, breach, advisory or remediation activity. Its impact is limited to event planning and registration for JNUC 2026. The response Jamf seeks from readers is to browse the catalog and register ahead of the July 1 pricing deadline.\u003c/p\u003e\n","keyPoints":["The JNUC 2026 session catalog is now live for attendees to browse and use to plan their agendas.","The theme of JNUC 2026 is the Apple platform for enterprise AI.","The program includes topics such as Mac workflows, mobility workflows, Mac and mobile compliance, reporting and risk reduction, integrations and APIs, end-user experience, and community, career and culture.","Just in Time pricing for JNUC 2026 is available only through July 1 before standard rates begin.","JNUC 2026 is schedu <script type="text/babel">

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
