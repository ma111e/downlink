<script>
window.__DL_ARTICLES = [{"n":10,"title":"Marking Your Own Homework (Check Point Remote Access VPN IKEv1 Authentication Bypass CVE-2026-50751)","source":"labs.watchtowr.com","sourceColorIdx":8,"link":"https://labs.watchtowr.com/marking-your-own-homework-check-point-remote-access-vpn-ikev1-authentication-bypass-cve-2026-50751/","time":"05:17","priority":"MUST READ","score":96,"tldr":"watchTowr Labs found that CVE-2026-50751 in Check Point Remote Access VPN lets an attacker use client-controlled IKEv1 Vendor ID flags to skip certificate and signature validation, allowing login as a valid user with a self-signed certificate and random signature. The flaw affects legacy IKEv1 remote access paths, including UDP 500 and TCP 443 Visitor Mode, and is fixed by Check Point hotfix sk185033.","briefOverview":"\u003cp\u003ewatchTowr Labs analyzed CVE-2026-50751, a CVSS 9.3 authentication bypass in Check Point Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products. Check Point released hotfixes on June 8, 2026, and the article says the flaw had reportedly been exploited in the wild since May 7, 2026. The affected code is in deprecated IKEv1 VPN functionality across multiple Gaia versions.\u003c/p\u003e\n\n\u003cp\u003eThe core issue is that the gateway allowed a client-controlled IKEv1 Vendor ID payload to influence whether authentication checks were performed. watchTowr found that a VPNExtFeatures Vendor ID could write flags into the negotiation state, causing certificate processing and phase-1 signature verification to be skipped. In the researchers’ test, a vulnerable gateway accepted a random signature and created a phase-1 IKE SA, while a patched gateway rejected the same attempt.\u003c/p\u003e\n\n\u003cp\u003eThe researchers demonstrated that an attacker could authenticate as a provisioned Remote Access user by using a valid username, the ICA organization string from the gateway’s public TLS certificate, a self-signed certificate, and an invalid signature. They also reported that exploitation worked over UDP 500 and over TCP 443 using Check Point Visitor Mode. The article states the bypass affected Certificate, Certificate with enrollment, and Mixed authentication modes, while Legacy username/password mode still required a real XAUTH password.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ewatchTowr Labs published a technical analysis of CVE-2026-50751, an authentication bypass in Check Point’s Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products. Check Point released hotfixes for this and another issue on June 8, 2026, affecting deprecated IKEv1 VPN code. The article lists affected Gaia releases including R80.20.X, R80.40, R81, R81.10, R81.10.X, R81.20, R82, R82.00.X, and R82.10.\u003c/p\u003e\n\n\u003cp\u003eThe article says the vulnerability had reportedly been exploited in the wild since May 7, 2026, about a month before patches were available. It also says Check Point described “a few dozen targeted organizations,” and that at least one incident had been linked to a Qilin ransomware affiliate. The advisory was described as identifying a logic flaw in certificate validation during the IKEv1 key exchange.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr’s diffing compared R82.10 Jumbo Hotfix Take 19 against Take 19 plus the sk185033 hotfix. The researchers initially examined vpnd, but found that on R81.10 and later the IKE negotiation is handled by iked, which listens internally on UDP 30500. The important code changes appeared in ikeMainMode.cc, ikeAggressive.cc, and machine_cert_utils.cc, including removal of a process_cert_payloads argument that had controlled whether machine certificate payloads were processed.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable path used a client-influenced flag word at state offset 0x4bc4 to decide whether authentication checks should run. In process_auth_pl, bit 0x2 controlled whether a 0xF9 signature payload was processed, and in verify_peer_auth, bit 0x4 could short-circuit verifyMessagePhase1 and return authentication success. watchTowr found that processVendorIDPayload wrote this flag word from four bytes supplied after the VPNExtFeatures Vendor ID magic value.\u003c/p\u003e\n\n\u003cp\u003eThe researchers proved the bypass by sending the VPNExtFeatures Vendor ID with bit 0x4 set, completing Diffie-Hellman, and sending a random HASH_I in the encrypted fifth Main Mode message. The vulnerable gateway logged that the peer was not a Check Point peer but still created a phase-1 SA and saved the user, while the patched gateway logged an authentication failure and rejected the attempt. They later showed certificate-authentication bypass using an ID distinguished name for a provisioned user, a newly minted self-signed X.509 certificate, and a random signature.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, an attacker needed a valid username and the ICA organization string, with the latter available from the gateway’s public TLS certificate. The same probe could act as a username oracle because wrong guesses failed at user lookup while right ones succeeded. watchTowr also reported that the bypass worked over both UDP 500 and TCP 443 Visitor Mode, and across Certificate, Certificate with enrollment, and Mixed authentication modes, while Legacy username/password mode was not bypassable because XAUTH still required a password.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr Labs analyzed CVE-2026-50751, a Check Point Remote Access VPN IKEv1 authentication bypass with a CVSS score of 9.3. The vulnerability affects Check Point Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products, specifically in deprecated IKEv1 VPN code. Check Point released hotfixes on June 8, 2026 through sk185033.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the vulnerability had reportedly been exploited in the wild since May 7, 2026, roughly a month before patches were available. It also says Check Point reported “a few dozen targeted organizations,” and that at least one incident had been linked to a Qilin ransomware affiliate. The vulnerability was described as a logic flaw in how certificates are validated during the IKEv1 key exchange.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-preconditions\"\u003eAffected Products and Preconditions\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the affected Gaia versions as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eR80.20.X\u003c/li\u003e\n\u003cli\u003eR80.40\u003c/li\u003e\n\u003cli\u003eR81\u003c/li\u003e\n\u003cli\u003eR81.10\u003c/li\u003e\n\u003cli\u003eR81.10.X\u003c/li\u003e\n\u003cli\u003eR81.20\u003c/li\u003e\n\u003cli\u003eR82\u003c/li\u003e\n\u003cli\u003eR82.00.X\u003c/li\u003e\n\u003cli\u003eR82.10\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ewatchTowr says exploitation depends on several conditions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe target accepts legacy Remote Access clients.\u003c/li\u003e\n\u003cli\u003eIKEv1 is permitted rather than IKEv2-only.\u003c/li\u003e\n\u003cli\u003eMachine certificate authentication is not mandatory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that these prerequisites may still leave many potential targets because legacy client support is common in enterprise environments.\u003c/p\u003e\n\n\u003ch2 id=\"research-method\"\u003eResearch Method\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr compared R82.10 Jumbo Hotfix Take 19, which they describe as vulnerable, against the same build with the sk185033 hotfix applied. The researchers first examined vpnd, but found that vpnd did not bind UDP 500 or UDP 4500. They then determined that on R81.10 and later, Check Point redirects IKE negotiation to a newer daemon, iked, which listens internally on UDP 30500.\u003c/p\u003e\n\n\u003cp\u003eAfter diffing the correct binary, the changed code appeared in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eikeMainMode.cc\u003c/li\u003e\n\u003cli\u003eikeAggressive.cc\u003c/li\u003e\n\u003cli\u003emachine_cert_utils.cc\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eA key change was the removal of a trailing integer argument from process_cert_payloads. In the vulnerable version, that argument controlled whether machine certificate payloads were processed. In the patched version, the function instead consults the appliance’s own machine certificate policy from the negotiation state.\u003c/p\u003e\n\n\u003ch2 id=\"root-cause\"\u003eRoot Cause\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerable code allowed the decision to process certificate material and validate authentication to depend on flags that could be influenced by the client. In process_cert_payloads, the vulnerable implementation used a caller-supplied process_machine_certs flag to decide whether to process Check Point machine certificate payloads of type 0xF6. The patched version removed that argument and used a field populated from the gateway’s configured machine certificate policy.\u003c/p\u003e\n\n\u003cp\u003eThe more important issue appeared in the caller process_auth_pl and in verify_peer_auth. In process_auth_pl, the code read a flags dword from state offset 0x4bc4 and tested bit 0x2. If this bit was not set, the code did not call seekPayload for the 0xF9 signature payload and did not call processSigPayload.\u003c/p\u003e\n\n\u003cp\u003eIn verify_peer_auth, the same flag word controlled whether verifyMessagePhase1 ran. If bit 0x4 was set, an OR condition short-circuited and the function returned authentication success without calling verifyMessagePhase1. The article identifies verifyMessagePhase1 as the phase-1 signature check.\u003c/p\u003e\n\n\u003ch2 id=\"client-controlled-authentication-flags\"\u003eClient-Controlled Authentication Flags\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr searched for writes to state offset 0x4bc4 and found two. One was initialization in FwIkeNewPhase1State, which zeroed the field for a new negotiation. The other was in processVendorIDPayload.\u003c/p\u003e\n\n\u003cp\u003eThe Vendor ID involved was the 16-byte value:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e3c f1 87 b2 47 40 29 ea 46 ac 7f d0 ea f2 89 f5\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe gateway logged this as VPNExtFeatures. According to the article, processVendorIDPayload required at least four bytes after the 16-byte magic value, read those four attacker-supplied bytes, byte-swapped them, and stored them directly into state + 0x4bc4. This meant the client could provide the flags used by the gateway to decide whether to perform authentication checks.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights an additional inconsistency: a peer that sent only the VPNExtFeatures Vendor ID was logged by the gateway as “not a Check Point peer,” while the gateway still honored the client-supplied flag that disabled authentication verification.\u003c/p\u003e\n\n\u003ch2 id=\"proof-of-concept-behavior\"\u003eProof of Concept Behavior\u003c/h2\u003e\n\n\u003cp\u003eTo prove the issue, watchTowr wrote a minimal IKEv1 Main Mode client using AES-256, SHA1, Diffie-Hellman group 2, and Check Point’s 0xFADD hybrid authentication method. They sent the VPNExtFeatures Vendor ID with the four trailing bytes set to 0x00000004, setting bit 0x4. They then completed Diffie-Hellman and sent a completely random HASH_I in encrypted message 5.\u003c/p\u003e\n\n\u003cp\u003eThey tested identical packets against two gateways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA vulnerable R82.10 Take 19 appliance.\u003c/li\u003e\n\u003cli\u003eA patched Take 19 appliance with sk185033.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe vulnerable gateway logged that the peer was not a Check Point peer, proceeded through MMCreate6, and saved the user in IkeSAFromState. The patched gateway logged an authentication failure with hybrid and sent an authentication failed notification. The article says the vulnerable gateway created a phase-1 SA based on a signature generated with os.urandom.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr also performed negative controls:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVPNExtFeatures with capability 0x00000004 skipped verifyMessagePhase1 and produced the bypass.\u003c/li\u003e\n\u003cli\u003eVPNExtFeatures with capability 0x00000000 caused verifyMessagePhase1 to run and resulted in rejection.\u003c/li\u003e\n\u003cli\u003eNo Vendor ID caused verifyMessagePhase1 to run and resulted in rejection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"authentication-as-a-provisioned-user\"\u003eAuthentication as a Provisioned User\u003c/h2\u003e\n\n\u003cp\u003eThe researchers then moved from proving acceptance of invalid phase-1 data to showing authentication as a provisioned Remote Access user. They switched from the hybrid method to RSA signature authentication, IKE authentication method 3, using the certificate path.\u003c/p\u003e\n\n\u003cp\u003eThe credentials they presented were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn ID payload containing a distinguished name in the form CN=\u003cusername\u003e,OU=users,O=\u003cICA-O\u003e.\u003c/li\u003e\n\u003cli\u003eA self-signed X.509 certificate minted by the researchers.\u003c/li\u003e\n\u003cli\u003eA signature payload containing 256 bytes of os.urandom.\u003c/li\u003e\n\u003cli\u003eThe VPNExtFeatures Vendor ID with bit 0x4 set.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause verifyMessagePhase1 was skipped, the gateway did not verify the signature and did not validate the certificate trust chain. The article states that the gateway only checked whether the subject distinguished name resolved to a provisioned Remote Access user.\u003c/p\u003e\n\n\u003cp\u003eAccording to watchTowr, an attacker needed two pieces of information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA valid username.\u003c/li\u003e\n\u003cli\u003eThe ICA organization string for the distinguished name.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the ICA organization string is present in the gateway’s public TLS certificate and can be read from there. It also says a wrong username fails at user lookup while a correct username succeeds, making the same probe a username oracle.\u003c/p\u003e\n\n\u003cp\u003eIn their demonstration, watchTowr’s tool authenticated as the user “watchtowr” with a forged certificate and invalid signature, decrypted the gateway’s final phase-1 message, and retrieved the gateway internal IP and VPN certificate. The gateway also logged that the user CN=watchtowr,OU=users,O=watchtowr was saved.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-over-udp-and-tcp-443\"\u003eExploitation Over UDP and TCP 443\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the vulnerability was exploitable over UDP 500. It also says watchTowr was able to exploit it over TCP 443.\u003c/p\u003e\n\n\u003cp\u003eWhen UDP 500 and UDP 4500 are filtered, Check Point clients can fall back to Visitor Mode. Visitor Mode tunnels the same IKE exchange over a raw TCP stream on port 443 using a framing protocol called TCPT. watchTowr says they reversed the protocol enough to demonstrate that the same bypass worked over this path.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-modes\"\u003eAuthentication Modes\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr reports that the vulnerability appeared exploitable across several Check Point certificate modes for SSL Network Extender user authentication. Their table states:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCertificate mode was bypassed over UDP 500 and TCP 443.\u003c/li\u003e\n\u003cli\u003eCertificate with enrollment mode was bypassed over UDP 500 and TCP 443.\u003c/li\u003e\n\u003cli\u003eMixed mode was bypassed over UDP 500 and TCP 443.\u003c/li\u003e\n\u003cli\u003eLegacy username/password mode was not bypassable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that Legacy username/password mode still required a real password through XAUTH, so the bypass did not remove that gate.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-detection-artifact\"\u003eResponse and Detection Artifact\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released hotfixes through sk185033 on June 8, 2026. The patched code removed the client-controlled process_machine_certs function argument and instead based machine certificate processing on the gateway’s own configured policy. The patched gateway in watchTowr’s test rejected the malicious exchange with an authentication failure.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr also released a Detection Artefact Generator at the GitHub repository watchtowrlabs/watchTowr-vs-Check-Point-CVE-2026-50751. The article says the decision to release it was based on the attackers having already had the vulnerability for a month.\u003c/p\u003e\n","keyPoints":["Check Point released hotfixes on June 8, 2026 for CVE-2026-50751, a 9.3 CVSS authentication bypass affecting Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products in deprecated IKEv1 VPN code.","watchTowr Labs found that the vulnerable IKEv1 implementation allowed a client-supplied VPNExtFeatures Vendor ID payload to write authentication flags that could cause certificate signature checks to be skipped.","The researchers demonstrated that a vulnerable gateway accepted a random HASH_I and created a phase-1 IKE SA, while a patched gateway rejected the same attempt with an authentication failure.","The article states that an attacker could authenticate as a provisioned Remote Access user by presenting a matching subject distinguished name, a self-signed X.509 certificate, and an invalid signature, because the gateway did not verify the signature or certificate trust chain.","watchTowr Labs reported that the bypass worked over both UDP 500 and TCP 443 Visitor Mode, and across the Certificate, Certificate with enrollment, and Mixed user authentication modes."],"insights":["The vulnerable gateway could log a peer as “not a Check Point peer” while still honoring that peer’s client-supplied flag to skip authentication checks.","The bypass required only a valid username and the ICA organization string, and the article states the ICA organization value could be obtained from the gateway’s public TLS certificate.","Wrong username guesses failed at user lookup while valid usernames succeeded, making the same authentication probe usable as a username oracle.","Filtering UDP 500 or UDP 4500 was not sufficient mitigation in the researchers’ testing because the same IKEv1 exchange could be tunneled over TCP 443 using Check Point Visitor Mode.","The plain Legacy username/password mode was described as not bypassable because XAUTH still required a real password, while the certificate-based modes were bypassed."],"referencedReports":[{"title":"sk185033","url":"https://support.checkpoint.com/results/sk/sk185033?_gl=1%2A5pnkru%2A_gcl_au%2AMjEzOTk1NjU4Ni4xNzgwOTI0NTY5\u0026ref=labs.watchtowr.com","publisher":"Check Point","context":"The article cites Check Point’s June 8, 2026 hotfix advisory for vulnerabilities in Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products, including CVE-2026-50751.","category":"","primary":false}],"body":"\u003cp\u003ewatchTowr Labs analyzed CVE-2026-50751, a CVSS 9.3 authentication bypass in Check Point Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products. Check Point released hotfixes on June 8, 2026, and the article says the flaw had reportedly been exploited in the wild since May 7, 2026. The affected code is in deprecated IKEv1 VPN functionality across multiple Gaia versions.\u003c/p\u003e\n\n\u003cp\u003eThe core issue is that the gateway allowed a client-controlled IKEv1 Vendor ID payload to influence whether authentication checks were performed. watchTowr found that a VPNExtFeatures Vendor ID could write flags into the negotiation state, causing certificate processing and phase-1 signature verification to be skipped. In the researchers’ test, a vulnerable gateway accepted a random signature and created a phase-1 IKE SA, while a patched gateway rejected the same attempt.\u003c/p\u003e\n\n\u003cp\u003eThe researchers demonstrated that an attacker could authenticate as a provisioned Remote Access user by using a valid username, the ICA organization string from the gateway’s public TLS certificate, a self-signed certificate, and an invalid signature. They also reported that exploitation worked over UDP 500 and over TCP 443 using Check Point Visitor Mode. The article states the bypass affected Certificate, Certificate with enrollment, and Mixed authentication modes, while Legacy username/password mode still required a real XAUTH password.\u003c/p\u003e\n"},{"n":4,"title":"CISA orders feds to patch actively exploited Ivanti flaw by Sunday","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-gives-feds-3-days-to-patch-ivanti-flaw-exploited-in-attacks/","time":"08:26","priority":"MUST READ","score":95,"tldr":"CISA ordered federal agencies to patch actively exploited Ivanti Sentry flaw CVE-2026-10520 within three days under BOD 26-04. Shadowserver warns that unpatched internet-exposed Ivanti Sentry systems are likely already compromised after widespread exploitation using a public proof-of-concept.","briefOverview":"\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to patch an actively exploited Ivanti Sentry vulnerability within three days. The flaw, tracked as CVE-2026-10520, was added to CISA’s Known Exploited Vulnerabilities Catalog after the agency confirmed active exploitation. The order was issued under the newly released Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-10520 is a maximum-severity OS command injection vulnerability in Ivanti Sentry, formerly known as MobileIron Sentry. Ivanti released patches one day before Shadowserver reported that attackers had already backdoored many exposed Sentry gateways. Shadowserver warned that unpatched systems were most likely compromised and said it was observing many exploitation attempts based on a public proof-of-concept.\u003c/p\u003e\n\n\u003cp\u003eShadowserver tracks just over 50 exposed Ivanti Sentry admin portals but said that figure is likely limited because some organizations block its scanner. Ivanti had not updated its advisory to warn of active exploitation at the time of the article. CISA said this type of vulnerability is a frequent attack vector and poses significant risks to the federal enterprise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA ordered federal agencies to secure Ivanti Sentry instances affected by CVE-2026-10520 within three days. The order applies to Federal Civilian Executive Branch agencies and follows the vulnerability’s addition to CISA’s Known Exploited Vulnerabilities Catalog. The action was taken under Binding Operational Directive 26-04, which was issued the day before CISA’s alert.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-10520 is described as a maximum-severity OS command injection vulnerability in Ivanti’s security gateway appliance. Ivanti Sentry was formerly known as MobileIron Sentry. Ivanti released patches for the flaw and initially said it had no evidence of in-the-wild exploitation.\u003c/p\u003e\n\n\u003cp\u003eShadowserver reported the next day that attackers had already backdoored many Sentry gateways exposed online. It also said it was observing a large amount of exploitation attempts based on a public proof-of-concept. Shadowserver warned that if organizations had not patched, they were most likely compromised.\u003c/p\u003e\n\n\u003cp\u003eThe number of internet-exposed Ivanti Sentry admin portals visible to Shadowserver was just over 50. However, Shadowserver said its visibility was likely limited because multiple Ivanti Sentry instances were not reachable in its scans, possibly because the scanner was blocked. The article does not identify any specific threat actor behind the exploitation.\u003c/p\u003e\n\n\u003cp\u003eCISA said this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency instructed stakeholders to follow applicable BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable. Ivanti had not updated its advisory to state that CVE-2026-10520 was under active exploitation when the article was published.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to patch an actively exploited Ivanti Sentry flaw within three days. The vulnerability is tracked as CVE-2026-10520 and affects Ivanti’s security gateway appliance, formerly known as MobileIron Sentry. CISA added the flaw to its Known Exploited Vulnerabilities Catalog after confirming active exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe order was issued under Binding Operational Directive 26-04. According to the article, BOD 26-04 was issued on Wednesday and superseded and revoked the older BOD 19-02 and BOD 22-01. CVE-2026-10520 is described as the first vulnerability for which BOD 26-04 applies.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-10520 is described as a maximum-severity vulnerability in Ivanti Sentry. The flaw stems from an OS command injection weakness. Successful exploitation is treated as serious enough for CISA to require rapid remediation by federal agencies.\u003c/p\u003e\n\n\u003cp\u003eIvanti released patches for CVE-2026-10520 one day before Shadowserver reported widespread exploitation activity. At the time Ivanti released patches, the company said it had no evidence of in-the-wild exploitation. The article states that Ivanti had not yet updated its advisory to warn that the vulnerability was under active exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-activity\"\u003eExploitation Activity\u003c/h2\u003e\n\n\u003cp\u003eShadowserver reported that attackers had already backdoored many Ivanti Sentry gateways exposed online. It also said it was observing a large amount of exploitation attempts based on a public proof-of-concept. Shadowserver warned that organizations that had not patched were most likely compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name any specific threat actor or group behind the exploitation. It refers generally to attackers and malicious cyber actors. It also notes that an Ivanti spokesperson had not responded to BleepingComputer’s request for further details on the ongoing attacks.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-and-visibility\"\u003eExposure and Visibility\u003c/h2\u003e\n\n\u003cp\u003eShadowserver was tracking just over 50 exposed Ivanti Sentry admin portals. However, it cautioned that this count was likely limited because multiple Ivanti Sentry instances were not reachable in its scans. Shadowserver suggested this may be due to organizations blocking its scanner.\u003c/p\u003e\n\n\u003cp\u003eBecause of that limited visibility, Shadowserver warned that exposed and unpatched systems should be treated as likely compromised. The article includes a Shadowserver-based chart showing internet-exposed Ivanti Sentry admin portals.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-response\"\u003eCISA Response\u003c/h2\u003e\n\n\u003cp\u003eCISA confirmed that CVE-2026-10520 was actively exploited and added it to the Known Exploited Vulnerabilities Catalog. The agency ordered Federal Civilian Executive Branch agencies to secure affected Ivanti Sentry instances within three days. CISA said this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eCISA instructed agencies and stakeholders to follow applicable BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable. It also said stakeholders are responsible for evaluating each asset’s internet exposure and ensuring adherence to BOD 26-04 patching guidelines.\u003c/p\u003e\n\n\u003ch2 id=\"bod-26-04-context\"\u003eBOD 26-04 Context\u003c/h2\u003e\n\n\u003cp\u003eThe article says BOD 26-04 requires U.S. federal agencies to prioritize patching under several conditions. These include whether an asset is publicly exposed online, whether the flaw was added to CISA’s Known Exploited Vulnerabilities Catalog, whether exploitation can be automated for large-scale attacks, and whether successful exploitation gives attackers partial or total control of a targeted system.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-10520 is the first vulnerability cited by the article as falling under BOD 26-04. The article also notes that CISA recently ordered federal agencies to patch other security flaws within three days, including a Check Point VPN zero-day, an Oracle WebLogic Server vulnerability, and an actively exploited cPanel plugin flaw.\u003c/p\u003e\n\n\u003ch2 id=\"ivanti-exposure-in-cisa-kev\"\u003eIvanti Exposure in CISA KEV\u003c/h2\u003e\n\n\u003cp\u003eThe article states that over the past several years, CISA has flagged 35 vulnerabilities across a wide range of Ivanti products that have been abused in attacks. It also says 12 of those Ivanti vulnerabilities were targeted by ransomware gangs. This places CVE-2026-10520 within a broader pattern of Ivanti product vulnerabilities appearing in CISA’s Known Exploited Vulnerabilities Catalog.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCISA ordered federal agencies to patch CVE-2026-10520 within three days.\u003c/li\u003e\n\u003cli\u003eCVE-2026-10520 is a maximum-severity OS command injection flaw in Ivanti Sentry.\u003c/li\u003e\n\u003cli\u003eShadowserver reported that many exposed Ivanti Sentry gateways had already been backdoored.\u003c/li\u003e\n\u003cli\u003eShadowserver said exploitation attempts were based on a public proof-of-concept.\u003c/li\u003e\n\u003cli\u003eIvanti had not updated its advisory to warn of active exploitation at the time of the article.\u003c/li\u003e\n\u003cli\u003eThe article does not identify a specific threat actor responsible for the exploitation.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CISA ordered Federal Civilian Executive Branch agencies to patch the actively exploited Ivanti Sentry vulnerability CVE-2026-10520 within three days under Binding Operational Directive 26-04.","CVE-2026-10520 is a maximum-severity OS command injection vulnerability in Ivanti Sentry, formerly known as MobileIron Sentry.","Shadowserver reported that attackers had already backdoored many internet-exposed Ivanti Sentry gateways and observed widespread exploitation attempts based on a public proof-of-concept.","Shadowserver warned that organizations that had not patched their Ivanti Sentry instances were most likely compromised, although its detection was limited because some instances were not reachable in its scans.","CISA added CVE-2026-10520 to its Known Exploited Vulnerabilities Catalog and said this type of vulnerability poses significant risks to the federal enterprise."],"insights":["Shadowserver said the visible count of just over 50 exposed Ivanti Sentry admin portals is likely an undercount because some organizations appear to block its scanner, so defenders should not rely on public exposure counts to assess risk.","Ivanti had not updated its advisory to reflect active exploitation at the time of the article, even though CISA and Shadowserver had both reported exploitation activity.","CVE-2026-10520 became the first vulnerability subject to the newly issued BOD 26-04, which prioritizes rapid patching when exploited flaws affect internet-exposed assets and can enable partial or total system control.","Shadowserver’s warning that unpatched systems are most likely compromised makes remediation more than a patching task, requiring organizations to assess whether exposed Ivanti Sentry instances were already backdoored."],"referencedReports":[{"title":"Security Advisory Ivanti Sentry CVE-2026-10520 CVE-2026-10523","url":"https://hub.ivanti.com/s/article/Security-Advisory-Ivanti-Sentry-CVE-2026-10520-CVE-2026-10523?language=en_US","publisher":"Ivanti","context":"The article references Ivanti's advisory as the vendor source for patches and notes that it had not yet been updated to warn about active exploitation.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/11/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert confirming active exploitation of CVE-2026-10520 and its addition to the Known Exploited Vulnerabilities Catalog.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-10520","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-10520","publisher":"CISA","context":"The article references CISA's KEV catalog entry for CVE-2026-10520 as the basis for the federal patching requirement.","category":"","primary":false}],"body":"\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to patch an actively exploited Ivanti Sentry vulnerability within three days. The flaw, tracked as CVE-2026-10520, was added to CISA’s Known Exploited Vulnerabilities Catalog after the agency confirmed active exploitation. The order was issued under the newly released Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-10520 is a maximum-severity OS command injection vulnerability in Ivanti Sentry, formerly known as MobileIron Sentry. Ivanti released patches one day before Shadowserver reported that attackers had already backdoored many exposed Sentry gateways. Shadowserver warned that unpatched systems were most likely compromised and said it was observing many exploitation attempts based on a public proof-of-concept.\u003c/p\u003e\n\n\u003cp\u003eShadowserver tracks just over 50 exposed Ivanti Sentry admin portals but said that figure is likely limited because some organizations block its scanner. Ivanti had not updated its advisory to warn of active exploitation at the time of the article. CISA said this type of vulnerability is a frequent attack vector and poses significant risks to the federal enterprise.\u003c/p\u003e\n"},{"n":11,"title":"Why Use App-Level Auth When Every Database Has Auth? (Splunk Enterprise CVE-2026-20253 Pre-Auth RCE)","source":"labs.watchtowr.com","sourceColorIdx":8,"link":"https://labs.watchtowr.com/why-use-app-level-auth-when-every-database-has-auth-splunk-enterprise-cve-2026-20253-pre-auth-rce/","time":"20:35","priority":"MUST READ","score":94,"tldr":"Splunk Enterprise CVE-2026-20253 is a pre-auth flaw in the PostgreSQL Sidecar Service that can be reached through Splunk’s web interface and abused from arbitrary file creation into full remote code execution. Splunk Enterprise on AWS is reportedly vulnerable by default, making patching or mitigation urgent.","briefOverview":"\u003cp\u003eSplunk published an advisory for CVE-2026-20253 on June 10, describing an unauthenticated issue in the PostgreSQL Sidecar Service Endpoint affecting Splunk Enterprise versions 10 and above. The article investigates the issue and concludes that Splunk Enterprise on AWS is vulnerable out of the box because the PostgreSQL Sidecar Service is installed and enabled by default. The advisory described arbitrary file creation and truncation, but the researchers demonstrated a path from that primitive to pre-authenticated remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe researchers found that the sidecar service listens only on localhost, including port 5435, but can be reached through the main Splunk web application using \u003ccode\u003e/en-US/splunkd/__raw/\u003c/code\u003e proxy paths. They identified \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e and \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e as relevant endpoints and showed that requests with empty or arbitrary Basic Authentication credentials were accepted. The backup endpoint allowed a \u003ccode\u003ebackupFile\u003c/code\u003e path to be supplied, enabling file creation, truncation, and path traversal.\u003c/p\u003e\n\n\u003cp\u003eThe exploit chain relied on how Splunk invoked PostgreSQL tools such as \u003ccode\u003epg_dump\u003c/code\u003e and \u003ccode\u003epg_restore\u003c/code\u003e. The \u003ccode\u003edatabase\u003c/code\u003e parameter could be treated as a PostgreSQL connection string, allowing attacker-controlled connection parameters such as \u003ccode\u003ehostaddr\u003c/code\u003e and \u003ccode\u003epassfile\u003c/code\u003e to override hardcoded localhost settings. By combining an attacker-controlled database dump, Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file, PostgreSQL restore behavior, and \u003ccode\u003elo_export\u003c/code\u003e, the researchers achieved controlled arbitrary file write as the \u003ccode\u003esplunk\u003c/code\u003e user and then overwrote a Python script to demonstrate code execution.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article analyzes CVE-2026-20253, a vulnerability Splunk disclosed in an advisory for Splunk Enterprise versions 10 and above. The vulnerability is associated with the PostgreSQL Sidecar Service Endpoint and requires no authentication according to the article. The researchers focused on whether the issue was exploitable by default and whether the advisory’s file creation and truncation impact could lead to more serious consequences.\u003c/p\u003e\n\n\u003cp\u003eThe article says deployment behavior differs across Splunk Enterprise environments. On manually installed on-premise Windows deployments, the PostgreSQL Sidecar Service is described as either not installed by default or installed but not enabled by default, depending on the case discussed in the article. Splunk Enterprise on AWS is described as having the PostgreSQL Sidecar Service installed and enabled by default, making it vulnerable out of the box.\u003c/p\u003e\n\n\u003cp\u003eThe researchers located the \u003ccode\u003esplunk-postgres\u003c/code\u003e service under Splunk’s sidecar service directory and found it listening on localhost, including port 5435. Although the service was bound to loopback, the article shows it could be reached externally through the main Splunk web application on port 8000 via \u003ccode\u003e/en-US/splunkd/__raw/v1/postgres/recovery/backup\u003c/code\u003e. A request with an empty Basic Authentication value was accepted, showing that the endpoint did not enforce meaningful application-layer authentication.\u003c/p\u003e\n\n\u003cp\u003eThe backup endpoint took attacker-controlled \u003ccode\u003edatabase\u003c/code\u003e and \u003ccode\u003ebackupFile\u003c/code\u003e parameters and ultimately invoked \u003ccode\u003epg_dump\u003c/code\u003e. The article shows that \u003ccode\u003ebackupFile\u003c/code\u003e could be used for path traversal to create or truncate files outside the service directory. It also shows that the \u003ccode\u003edatabase\u003c/code\u003e parameter could be interpreted by PostgreSQL as a connection string, allowing values such as \u003ccode\u003ehostaddr\u003c/code\u003e to redirect Splunk’s \u003ccode\u003epg_dump\u003c/code\u003e connection to an attacker-controlled PostgreSQL server.\u003c/p\u003e\n\n\u003cp\u003eThe restore endpoint followed a similar pattern but invoked \u003ccode\u003epg_restore\u003c/code\u003e. The researchers used PostgreSQL connection-string behavior and Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file at \u003ccode\u003e/opt/splunk/var/packages/data/postgres/.pgpass\u003c/code\u003e to authenticate as \u003ccode\u003epostgres_admin\u003c/code\u003e to the local PostgreSQL instance. They then restored an attacker-controlled dump containing SQL that used \u003ccode\u003elo_export\u003c/code\u003e to write controlled content to the filesystem as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n\n\u003cp\u003eFor remote code execution, the researchers overwrote \u003ccode\u003e/opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py\u003c/code\u003e with a Python payload. The article states that Splunk frequently executes this script, and the payload wrote command output into Splunk’s web-accessible path. The article also provides a neutered Detection Artefact Generator that checks whether access to the backup endpoint is blocked, reporting vulnerable behavior when a 400 status code is returned with any provided credentials and non-vulnerable behavior when a 401 status code is returned.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a technical analysis of Splunk Enterprise CVE-2026-20253, which Splunk disclosed in a June 10 advisory. The issue is described as affecting the PostgreSQL Sidecar Service Endpoint in Splunk Enterprise versions 10 and above. The article emphasizes that the vulnerability requires no authentication and carries a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eThe researchers set out to determine whether the issue was exploitable by default and whether it could lead to remote code execution. The advisory’s stated impact is arbitrary file creation and truncation, but the article shows a longer exploit chain that turns this into controlled arbitrary file write and then code execution as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n\n\u003ch2 id=\"affected-splunk-deployments-discussed\"\u003eAffected Splunk Deployments Discussed\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Splunk Enterprise can be deployed in different ways and that PostgreSQL Sidecar Service availability differs by deployment type.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk Enterprise On-Premise installed manually on Windows may not have the PostgreSQL Sidecar Service installed by default.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise On-Premise installed manually on Windows may have the PostgreSQL Sidecar Service installed but not enabled by default.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise on AWS has the PostgreSQL Sidecar Service installed and enabled by default.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researchers summarize this by stating that Splunk Enterprise on AWS is vulnerable out of the box. They also state that the affected versions are Splunk versions 10 and above, which they associate with the introduction of the sidecar concept.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-of-the-postgresql-sidecar-service\"\u003eDiscovery of the PostgreSQL Sidecar Service\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the relevant service as the PostgreSQL Sidecar Service. Splunk documentation indicated that sidecar services are deployed under \u003ccode\u003e/opt/splunk/var/run/supervisor/pkg-run/\u003c/code\u003e, and the researchers focused on the package with \u003ccode\u003epostgres\u003c/code\u003e in its name.\u003c/p\u003e\n\n\u003cp\u003eThey observed a \u003ccode\u003esplunk-postgres\u003c/code\u003e process listening on localhost:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e127.0.0.1:5435\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e127.0.0.1:33669\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAlthough these ports were bound only to loopback, the researchers continued investigating because they suspected the service might still be reachable through another component.\u003c/p\u003e\n\n\u003ch2 id=\"relevant-api-endpoints\"\u003eRelevant API Endpoints\u003c/h2\u003e\n\n\u003cp\u003eThe researchers used Splunk documentation and strings extracted from the Go binary to identify PostgreSQL Sidecar Service API endpoints. The relevant paths included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/telemetry\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/health\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/recovery/status/{id}\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/postgres/status\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article focuses on the backup and restore endpoints because they accept a \u003ccode\u003edatabase\u003c/code\u003e and a \u003ccode\u003ebackupFile\u003c/code\u003e parameter.\u003c/p\u003e\n\n\u003ch2 id=\"access-through-the-main-splunk-web-application\"\u003eAccess Through the Main Splunk Web Application\u003c/h2\u003e\n\n\u003cp\u003eA key finding is that the localhost-only sidecar API could be reached through the main Splunk web application. The researchers sent a request to:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003e/en-US/splunkd/__raw/v1/postgres/recovery/backup\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe request included a JSON body specifying a database and backup file, along with an \u003ccode\u003eAuthorization\u003c/code\u003e header containing empty Basic Authentication credentials. The server returned HTTP 200 and a JSON response indicating a backup operation had been queued.\u003c/p\u003e\n\n\u003cp\u003eThe article explains the underlying issue as the PostgreSQL Sidecar Service endpoint lacking authentication controls, allowing any network-reachable user to invoke file operations without credentials.\u003c/p\u003e\n\n\u003ch2 id=\"initial-file-creation-and-truncation-primitive\"\u003eInitial File Creation and Truncation Primitive\u003c/h2\u003e\n\n\u003cp\u003eThe researchers first demonstrated that the \u003ccode\u003ebackupFile\u003c/code\u003e parameter could create a file. A request using \u003ccode\u003ebackupFile\u003c/code\u003e set to \u003ccode\u003ebackuptest\u003c/code\u003e created an empty file under the PostgreSQL sidecar service directory:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003e/opt/splunk/var/run/supervisor/pkg-run/pkg-postgres3492133045/backuptest\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThey then used path traversal in \u003ccode\u003ebackupFile\u003c/code\u003e, such as:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003e../../../../../../../../../tmp/backuptest\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThis created a file at \u003ccode\u003e/tmp/backuptest\u003c/code\u003e. The article summarizes the initial primitive as the ability to create an empty file at any location and clear the contents of existing files by overwriting them.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-backup-endpoint-works\"\u003eHow the Backup Endpoint Works\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a reconstructed version of the backup command. The endpoint ultimately invokes \u003ccode\u003epg_dump\u003c/code\u003e with arguments including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e-h localhost\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-p \u0026lt;port\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e--clean\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-v\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-w\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-U \u0026lt;user\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-f \u0026lt;backupFile\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-Fc\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;database\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe username supplied in the HTTP Basic Authentication header is passed directly to \u003ccode\u003epg_dump\u003c/code\u003e through the \u003ccode\u003e-U\u003c/code\u003e argument. The article notes that this means Splunk effectively leaves authentication to PostgreSQL rather than enforcing it at the application layer.\u003c/p\u003e\n\n\u003cp\u003eBecause \u003ccode\u003epg_dump\u003c/code\u003e is invoked with \u003ccode\u003e-w\u003c/code\u003e, it never prompts for a password. If the supplied PostgreSQL user cannot authenticate, the resulting dump file is empty.\u003c/p\u003e\n\n\u003ch2 id=\"abuse-of-postgresql-connection-strings\"\u003eAbuse of PostgreSQL Connection Strings\u003c/h2\u003e\n\n\u003cp\u003eThe researchers identified a PostgreSQL behavior that became central to the exploit chain. PostgreSQL allows the database name argument to be a connection string, and connection string parameters can override conflicting command-line options.\u003c/p\u003e\n\n\u003cp\u003eBecause the Splunk endpoint passed the attacker-controlled \u003ccode\u003edatabase\u003c/code\u003e value as the trailing database argument to \u003ccode\u003epg_dump\u003c/code\u003e, the researchers could supply connection parameters such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ehost\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehostaddr\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eport\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edbname\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThey tested a \u003ccode\u003edatabase\u003c/code\u003e value containing \u003ccode\u003ehostaddr=attacker.db.watchTowr.local\u003c/code\u003e and observed Splunk connecting to their host on port 5432. This showed that the attacker-controlled connection string overrode Splunk’s hardcoded \u003ccode\u003e-h localhost\u003c/code\u003e argument.\u003c/p\u003e\n\n\u003ch2 id=\"writing-attacker-controlled-dump-content\"\u003eWriting Attacker-Controlled Dump Content\u003c/h2\u003e\n\n\u003cp\u003eAfter confirming that \u003ccode\u003epg_dump\u003c/code\u003e could be redirected to an attacker-controlled PostgreSQL database, the researchers created a database with tables and data and configured a user that could authenticate without a password from any host. They then forced Splunk to connect to that database and write a dump file to the Splunk filesystem.\u003c/p\u003e\n\n\u003cp\u003eThis moved the exploit beyond empty file creation. The researchers were now able to place a PostgreSQL dump containing attacker-controlled content onto the target filesystem.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article notes that the dump file was not directly useful as a script because it was a PostgreSQL custom-format dump and could not simply be executed by Bash.\u003c/p\u003e\n\n\u003ch2 id=\"restore-endpoint-and-local-postgresql-authentication\"\u003eRestore Endpoint and Local PostgreSQL Authentication\u003c/h2\u003e\n\n\u003cp\u003eThe researchers then examined the \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e endpoint. The restore endpoint is similar to the backup endpoint but invokes \u003ccode\u003epg_restore\u003c/code\u003e rather than \u003ccode\u003epg_dump\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe reconstructed restore command includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e-h localhost\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-p \u0026lt;port\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e--clean\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-v\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-w\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-U \u0026lt;user\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-d \u0026lt;database\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-Fc\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;backupFile\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe goal was to make Splunk restore the attacker-controlled dump into the local PostgreSQL instance so that SQL inside the dump would be executed during the restore process.\u003c/p\u003e\n\n\u003cp\u003eThe obstacle was authentication to the local PostgreSQL instance. The researchers again used PostgreSQL connection-string behavior, this time focusing on the \u003ccode\u003epassfile\u003c/code\u003e parameter. They found a Splunk \u003ccode\u003e.pgpass\u003c/code\u003e file at:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003e/opt/splunk/var/packages/data/postgres/.pgpass\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe file contained a credential entry for the \u003ccode\u003epostgres_admin\u003c/code\u003e user, with the password redacted in the article. The researchers then supplied \u003ccode\u003epostgres_admin\u003c/code\u003e in the Basic Authentication username and used a \u003ccode\u003edatabase\u003c/code\u003e value containing:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003edbname=template1 passfile=/opt/splunk/var/packages/data/postgres/.pgpass\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article states that this allowed the attacker-controlled dump to be restored into the local PostgreSQL instance.\u003c/p\u003e\n\n\u003ch2 id=\"controlled-arbitrary-file-write-via-lo-export\"\u003eControlled Arbitrary File Write via \u003ccode\u003elo_export\u003c/code\u003e\u003c/h2\u003e\n\n\u003cp\u003eOnce the researchers could restore attacker-controlled SQL into the local PostgreSQL instance, they created a database dump template that used PostgreSQL large object functionality. The SQL defined a PL/pgSQL function that used:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003elo_from_bytea\u003c/code\u003e to create a large object from attacker-controlled bytes.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elo_export\u003c/code\u003e to write that object to a filesystem path.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThey placed this function inside a table check constraint so that it executed during the restore process. The article shows this being used to write \u003ccode\u003epwned\u003c/code\u003e to \u003ccode\u003e/tmp/pwn\u003c/code\u003e, demonstrating controlled arbitrary file write as the \u003ccode\u003esplunk\u003c/code\u003e user.\u003c/p\u003e\n\n\u003ch2 id=\"remote-code-execution-demonstration\"\u003eRemote Code Execution Demonstration\u003c/h2\u003e\n\n\u003cp\u003eTo turn arbitrary file write into remote code execution, the researchers looked for files Splunk frequently executes. They identified:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003e/opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThey overwrote that Python script with:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eimport os; os.system(\u0026quot;id \u0026gt; /opt/splunk/share/splunk/search_mrsparkle/exposed/watchTowr.txt\u0026quot;)\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe final exploit flow described in the article was:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eCreate an attacker-controlled PostgreSQL database and configure authentication so the \u003ccode\u003etest\u003c/code\u003e user can access it without a password.\u003c/li\u003e\n\u003cli\u003eUse the backup endpoint to force Splunk to dump the attacker-controlled remote database to \u003ccode\u003e/tmp/poc\u003c/code\u003e on the Splunk filesystem.\u003c/li\u003e\n\u003cli\u003eUse the restore endpoint with \u003ccode\u003epostgres_admin\u003c/code\u003e and Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file to restore the malicious dump into the local PostgreSQL instance.\u003c/li\u003e\n\u003cli\u003eTrigger execution of the malicious restore-time function, causing a controlled write to overwrite the Splunk Python script.\u003c/li\u003e\n\u003cli\u003eWait for Splunk to execute the overwritten Python script, producing \u003ccode\u003ewatchTowr.txt\u003c/code\u003e in a web-accessible Splunk path.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article shows the resulting file appearing in the Splunk webroot as proof of code execution.\u003c/p\u003e\n\n\u003ch2 id=\"detection-artifact\"\u003eDetection Artifact\u003c/h2\u003e\n\n\u003cp\u003eThe article ends by sharing a Detection Artefact Generator. The authors state that the released version is neutered and only determines whether an instance is vulnerable based on access behavior to the PostgreSQL backup endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe tool checks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA 400 status code when providing any credentials in the \u003ccode\u003eAuthorization\u003c/code\u003e header, which the article describes as vulnerable behavior.\u003c/li\u003e\n\u003cli\u003eA 401 status code, which the article describes as not vulnerable behavior.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes an example command using \u003ccode\u003ewatchTowr-vs-Splunk-RCE-CVE-2026-20253.py\u003c/code\u003e against a Splunk instance on port 8000 and shows output indicating that access to \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e was not blocked.\u003c/p\u003e\n\n\u003ch2 id=\"named-parties-and-actors\"\u003eNamed Parties and Actors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify any threat actor exploiting the vulnerability. The main named parties are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk, as the vendor and publisher of the advisory.\u003c/li\u003e\n\u003cli\u003ewatchTowr, as the research team performing the analysis and releasing the detection artifact.\u003c/li\u003e\n\u003cli\u003ePostgreSQL, as the database technology whose tools and features are involved in the exploit chain.\u003c/li\u003e\n\u003cli\u003eAWS, as the environment where the article states Splunk Enterprise is vulnerable out of the box.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore Significance\u003c/h2\u003e\n\n\u003cp\u003eThe most significant finding is that an unauthenticated sidecar endpoint, reachable through Splunk’s main web interface, can be chained with PostgreSQL tool behavior to go beyond arbitrary file creation and truncation. The article demonstrates a full path to controlled arbitrary file write and then remote code execution on Splunk Enterprise, with Splunk Enterprise on AWS described as vulnerable by default.\u003c/p\u003e\n","keyPoints":["Splunk’s advisory for CVE-2026-20253 describes an unauthenticated vulnerability in the PostgreSQL Sidecar Service endpoint affecting Splunk Enterprise versions 10 and above.","The article states that Splunk Enterprise on AWS has the PostgreSQL Sidecar Service installed and enabled by default, while manually installed on-premise deployments differ in whether the service is installed or enabled by default.","The researchers found that the PostgreSQL Sidecar Service listens on localhost but can be reached through the main Splunk web application via the /en-US/splunkd/__raw/v1/postgres/recovery/backup and /restore paths.","The backup endpoint allows arbitrary file creation and truncation through the backupFile parameter, and the database parameter can be abused as a PostgreSQL connection string to make Splunk connect to an attacker-controlled database.","By combining the backup and restore endpoints with PostgreSQL features including passfile and lo_export, the researchers demonstrated a controlled arbitrary file write as the splunk user and then achieved remote code execution by overwriting a Splunk Python script."],"insights":["The localhost-only PostgreSQL Sidecar Service was still remotely reachable because Splunk’s main web application could proxy requests to its unauthenticated API through /splunkd/__raw/ paths.","Splunk forwarded the Basic Authentication username directly into pg_dump and pg_restore as the PostgreSQL -U user, effectively delegating authentication to PostgreSQL while allowing empty or arbitrary web credentials at the API layer.","The database parameter was especially dangerous because PostgreSQL treats it as a connection string, allowing attacker-supplied values such as hostaddr and passfile to override Splunk’s hardcoded localhost connection settings.","Splunk’s own .pgpass file contained usable local PostgreSQL credentials for postgres_admin, which allowed the researchers to authenticate to the local database during the restore stage.","The advisory’s stated impact of arbitrary file creation and truncation understated the practical exploit chain shown in the article, where PostgreSQL restore behavior and lo_export turned the issue into controlled arbitrary file write and remote code execution."],"referencedReports":[{"title":"CVE-2026-20253 advisory","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article begins from Splunk’s June 10 advisory for CVE-2026-20253 and uses it as the basis for investigating the PostgreSQL Sidecar Service vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eSplunk published an advisory for CVE-2026-20253 on June 10, describing an unauthenticated issue in the PostgreSQL Sidecar Service Endpoint affecting Splunk Enterprise versions 10 and above. The article investigates the issue and concludes that Splunk Enterprise on AWS is vulnerable out of the box because the PostgreSQL Sidecar Service is installed and enabled by default. The advisory described arbitrary file creation and truncation, but the researchers demonstrated a path from that primitive to pre-authenticated remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe researchers found that the sidecar service listens only on localhost, including port 5435, but can be reached through the main Splunk web application using \u003ccode\u003e/en-US/splunkd/__raw/\u003c/code\u003e proxy paths. They identified \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e and \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e as relevant endpoints and showed that requests with empty or arbitrary Basic Authentication credentials were accepted. The backup endpoint allowed a \u003ccode\u003ebackupFile\u003c/code\u003e path to be supplied, enabling file creation, truncation, and path traversal.\u003c/p\u003e\n\n\u003cp\u003eThe exploit chain relied on how Splunk invoked PostgreSQL tools such as \u003ccode\u003epg_dump\u003c/code\u003e and \u003ccode\u003epg_restore\u003c/code\u003e. The \u003ccode\u003edatabase\u003c/code\u003e parameter could be treated as a PostgreSQL connection string, allowing attacker-controlled connection parameters such as \u003ccode\u003ehostaddr\u003c/code\u003e and \u003ccode\u003epassfile\u003c/code\u003e to override hardcoded localhost settings. By combining an attacker-controlled database dump, Splunk’s \u003ccode\u003e.pgpass\u003c/code\u003e file, PostgreSQL restore behavior, and \u003ccode\u003elo_export\u003c/code\u003e, the researchers achieved controlled arbitrary file write as the \u003ccode\u003esplunk\u003c/code\u003e user and then overwrote a Python script to demonstrate code execution.\u003c/p\u003e\n"},{"n":21,"title":"Over 400 Arch Linux AUR Packages Hijacked to Deploy Infostealer and eBPF Rootkit","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/over-400-arch-linux-aur-packages.html","time":"19:33","priority":"MUST READ","score":94,"tldr":"Attackers hijacked hundreds of Arch Linux AUR packages by altering build scripts to run malicious npm/bun dependencies that install a Rust credential stealer and, when run as root, an optional eBPF rootkit. Anyone who built or updated affected AUR packages since June 11 should treat the host and developer credentials as compromised, with rebuild/reinstall advised if the payload ran as root.","briefOverview":"\u003cp\u003eAttackers took over more than 400 packages in the Arch User Repository and changed their build scripts to install a credential stealer on machines that built them. The official Arch Linux repositories were not affected. The article says users who installed or updated AUR packages on or after June 11 should check affected-package lists before trusting the host.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targeted the AUR trust model rather than a software flaw. Attackers adopted abandoned packages, modified PKGBUILD or .install scripts, and spoofed git commit metadata so changes appeared to come from a long-standing maintainer whose account was later confirmed not to be compromised. The malicious recipes pulled npm or bun dependencies such as atomic-lockfile and js-digest to run bundled Linux ELF payloads during the build process.\u003c/p\u003e\n\n\u003cp\u003eThe main payload is described as a Rust credential stealer that harvests browser data, developer tokens, SSH keys, shell histories, Docker and Podman credentials, VPN profiles, and Electron app session data. If run with root and the required capability, it can load an optional eBPF rootkit that hides its processes, names, and socket inodes. The article advises credential rotation, persistence hunting, and reinstalling from trusted media if the payload ran as root.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAttackers hijacked more than 400 packages in the Arch User Repository this week and rewrote their build scripts to run a credential-stealing payload on machines that built them. The AUR is Arch Linux’s community package collection, and the article states that the official Arch repositories were not affected. The affected package list is described as large, still growing, and incomplete.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the incident as an attack on trust rather than a software vulnerability. Compromised packages kept their names, histories, and reputation, while only the build instructions changed. Attackers adopted orphaned packages whose maintainers had walked away, then edited PKGBUILD or .install scripts to execute malicious dependencies during builds.\u003c/p\u003e\n\n\u003cp\u003eIn the first wave, package recipes ran npm install atomic-lockfile, which pulled atomic-lockfile@1.4.2 and triggered a preinstall hook that launched a bundled Linux ELF named deps. Confirmed examples reported to the Arch mailing list include alvr and premake-git. A second wave used bun install js-digest from a separate set of accounts that community trackers linked to the same npm publisher as atomic-lockfile.\u003c/p\u003e\n\n\u003cp\u003eIndependent researcher Whanos reverse-engineered the deps payload and described it as a Rust credential stealer aimed at developer workstations and build systems. It collects browser cookies and tokens, Electron app sessions, GitHub and npm tokens, HashiCorp Vault tokens, OpenAI/ChatGPT bearer material and account metadata, SSH keys, shell histories, Docker and Podman credentials, and VPN profiles. Stolen files are sent over HTTP to temp.sh, while command and control runs through a Tor onion service via a local loopback proxy.\u003c/p\u003e\n\n\u003cp\u003eThe article says early write-ups overstated the eBPF rootkit because it is optional and only loads when the binary already has root and the right capability. When active, it hides the malware’s own processes, process names, and socket inodes using pinned BPF maps named hidden_pids, hidden_names, and hidden_inodes, and it kills attempts to attach a debugger. Arch maintainers are resetting malicious commits, banning accounts, and asking users to report suspect packages in the aur-general mailing-list thread.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers took over more than 400 packages in the Arch User Repository and altered their build scripts so that building the packages installed a credential stealer. The article states that the AUR is Arch Linux’s community package collection and is separate from the official Arch repositories, which were not affected. Users who installed or updated an AUR package on or after June 11 are advised to check it against current affected-package lists before trusting the host.\u003c/p\u003e\n\n\u003cp\u003eThe affected list is described as large, still growing, and incomplete. Sonatype’s first write-up counted more than 20 hijacked packages, while community trackers and the Arch aur-general thread later cataloged more than 400. One master list compiled by grepping the AUR git mirror put the number around 408, with consolidated lists climbing higher.\u003c/p\u003e\n\n\u003ch2 id=\"trust-model-abuse-rather-than-a-software-flaw\"\u003eTrust-model abuse rather than a software flaw\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the attack targeted the AUR trust model, not a software vulnerability. The compromised packages kept their names, histories, and associated trust, while only the build instructions changed. The package contents could still look like the software users intended to install, but the build recipe executed the malicious payload.\u003c/p\u003e\n\n\u003cp\u003eAttackers adopted abandoned packages whose maintainers had walked away, leaving them open for adoption. Sonatype named the campaign Atomic Arch and found the attackers targeting orphaned projects. The attackers also spoofed git commit metadata so malicious changes appeared to come from a long-standing maintainer, although an Arch Linux Trusted User later confirmed that the maintainer account was never compromised.\u003c/p\u003e\n\n\u003ch2 id=\"initial-infection-mechanism\"\u003eInitial infection mechanism\u003c/h2\u003e\n\n\u003cp\u003eOnce a package was adopted, attackers edited its PKGBUILD or .install script to run npm install atomic-lockfile during the build. The article says the malicious npm package was pulled alongside a couple of legitimate packages for cover. The package atomic-lockfile@1.4.2 contained a preinstall hook that executed a bundled Linux ELF named deps.\u003c/p\u003e\n\n\u003cp\u003eConfirmed examples reported to the Arch mailing list include the alvr and premake-git packages. The article says the atomic-lockfile npm package showed only 134 weekly downloads on Socket before it was pulled from the registry, so the main exposure path was AUR builds rather than npm installs.\u003c/p\u003e\n\n\u003ch2 id=\"second-wave\"\u003eSecond wave\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a second wave that used bun install js-digest. This wave was pushed from a separate set of accounts that community trackers linked to the same npm publisher as atomic-lockfile. Its payload was a different ELF binary by hash, and the community also flagged it as malicious.\u003c/p\u003e\n\n\u003cp\u003eThe scale of this second wave was still being counted at the time of the article. Early breakdowns listed a few dozen packages, while later grep-based searches of the AUR mirror returned much higher numbers that may include churn as commits were removed. The article advises users to check for both atomic-lockfile and js-digest.\u003c/p\u003e\n\n\u003ch2 id=\"payload-behavior\"\u003ePayload behavior\u003c/h2\u003e\n\n\u003cp\u003eIndependent researcher Whanos reverse-engineered the deps payload and described it as a Rust credential stealer aimed at developer workstations and build systems. According to the article, the stealer collects:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCookies, tokens, and local storage from Chromium-based browsers including Chrome, Edge, and Brave.\u003c/li\u003e\n\u003cli\u003eSession data from Electron apps including Slack, Discord, and Microsoft Teams.\u003c/li\u003e\n\u003cli\u003eGitHub, npm, and HashiCorp Vault tokens.\u003c/li\u003e\n\u003cli\u003eOpenAI/ChatGPT bearer material and account metadata.\u003c/li\u003e\n\u003cli\u003eSSH keys, known_hosts, and shell histories.\u003c/li\u003e\n\u003cli\u003eDocker and Podman credentials and VPN profiles.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says stolen files are sent over HTTP to temp.sh. Command and control runs through a Tor onion service via a local loopback proxy.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-rootkit-capability\"\u003ePersistence and rootkit capability\u003c/h2\u003e\n\n\u003cp\u003eFor persistence, the malware installs a systemd service with Restart=always. If it runs with root, it copies itself under /var/lib/ and writes a unit under /etc/systemd/system/. As a normal user, it uses the home directory and a per-user unit under ~/.config/systemd/user/.\u003c/p\u003e\n\n\u003cp\u003eThe article says early write-ups overstated the eBPF rootkit. The rootkit is optional and only loads when the binary already has root and the required capability, and it is not used to gain privileges. When active, it hides the malware’s own processes, process names, and socket inodes from standard tools using pinned BPF maps named hidden_pids, hidden_names, and hidden_inodes, and it kills attempts to attach a debugger.\u003c/p\u003e\n\n\u003cp\u003eThe binary also stages a second file tied to monero-wallet-gui that the analysis flags as a possible, unanalyzed cryptominer. The article notes that an eBPF rootkit attached to a smash-and-grab stealer is unusual and makes the incident more significant.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eThe article says removing an affected AUR package is not enough after the payload has run. A package manager can remove only files it knows about and cannot prove a system is clean after a rootkit-capable payload has executed. If the package ran as root, the article advises assuming the rootkit is present and reinstalling from trusted media.\u003c/p\u003e\n\n\u003cp\u003eArch maintainers are resetting malicious commits, banning accounts, and asking users to keep reporting suspect packages in the mailing-list thread. The affected list remains incomplete, and no CVE has been assigned. Sonatype tracks the campaign as Sonatype-2026-003775 with CVSS 8.7.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-user-actions-stated-in-the-article\"\u003eRecommended user actions stated in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article advises users to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck any AUR package installed or updated on or after June 11 against community package lists and detection scripts.\u003c/li\u003e\n\u003cli\u003eGrep recent build history and caches for npm install atomic-lockfile, bun install js-digest, and the payload path src/hooks/deps.\u003c/li\u003e\n\u003cli\u003eTreat the host as credential-compromised if a flagged package ran.\u003c/li\u003e\n\u003cli\u003eRotate browser sessions, SSH keys, GitHub and npm tokens, Slack, Teams and Discord sessions, Vault tokens, Docker and Podman credentials, and cloud keys.\u003c/li\u003e\n\u003cli\u003eCheck for unknown systemd services in both system units and per-user units.\u003c/li\u003e\n\u003cli\u003eLook for unexpected files under /var/lib/.\u003c/li\u003e\n\u003cli\u003eInspect /sys/fs/bpf/ for hidden_pids, hidden_names, and hidden_inodes.\u003c/li\u003e\n\u003cli\u003eReview outbound connections to Tor and upload services.\u003c/li\u003e\n\u003cli\u003eReinstall from trusted media if the package ran as root.\u003c/li\u003e\n\u003cli\u003eRead PKGBUILD files and .install hooks before building AUR packages, especially for recently adopted packages or packages that suddenly become active after dormancy.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-and-historical-note\"\u003eIndicators and historical note\u003c/h2\u003e\n\n\u003cp\u003eThe article gives the main payload SHA-256 as 6144d433f8a0316869877b5f834c801251bbb936e5f1577c5680878c7443c98b. It says the full indicator set, including the onion C2 host, is in the ioctl.fail analysis.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that a similar adoption tactic affected an abandoned PDF-viewer package in 2018. It concludes that the 2026 version scaled up the same approach as part of a broader run of supply-chain attacks that hijack orphaned projects to inherit trust rather than using typosquatting.\u003c/p\u003e\n","keyPoints":["Attackers took over more than 400 Arch User Repository packages and changed their build scripts to install a credential-stealing Rust binary on machines that built them.","The malicious build changes used npm install atomic-lockfile and, in a second wave, bun install js-digest to pull payloads during the AUR build process.","The stealer targets developer secrets including browser data, Electron app sessions, GitHub and npm tokens, Vault tokens, SSH keys, shell histories, Docker and Podman credentials, and VPN profiles.","When run with root privileges and the required capability, the malware can load an optional eBPF rootkit that hides its processes, names, and socket inodes from standard tools.","The article advises users who installed or updated AUR packages on or after June 11 to check affected-package lists, hunt for persistence, rotate exposed credentials, and reinstall from trusted media if the payload ran as root."],"insights":["The compromise abused the AUR trust model rather than a software vulnerability, because the packages kept their names and histories while only the build instructions changed.","The attackers targeted orphaned packages that could be adopted, allowing them to inherit existing package trust instead of relying on typosquatting.","Spoofed git commit metadata made malicious changes appear to come from a long-standing maintainer, even though Arch later confirmed that maintainer account was not compro
