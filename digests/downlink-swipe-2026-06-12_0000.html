 an hour through complex transaction chains while charging commissions between 3 percent and 10 percent."],"insights":["The AudiA6 investigation advanced after Polish Police arrested a Ukrainian national in September 2025 and forensic analysis of seized devices identified additional individuals linked to the operation.","AudiA6’s laundering model depended heavily on identity abuse, with investigators identifying more than 6,000 KYC records tied to money mule exchange accounts.","The operators allegedly controlled both a laundering service and the Dark2Web cybercrime forum, indicating the same network may have supported both financial cash-out and criminal marketplace coordination.","The service used email infrastructure tied to its own domains, giving investigators a concrete set of domains associated with fraudulent exchange account registration activity.","Funds from high-profile cryptocurrency thefts, including assets stolen in the 2022 LastPass hack, were reportedly routed through AudiA6 as recently as December 2025."],"referencedReports":[{"title":"Intel 471 November 2021 report on AudiA6","url":"https://thehackernews.com/2022/05/us-sanctions-cryptocurrency-mixer.html","publisher":"Intel 471","context":"The article says an Intel 471 report published in November 2021 disclosed AudiA6’s minimum balance requirement and service fees.","category":"","primary":false},{"title":"TRM Labs analysis of funds stolen from the 2022 LastPass hack","url":"https://thehackernews.com/2025/12/lastpass-2022-breach-led-to-years-long.html","publisher":"TRM Labs","context":"The article says a December 2025 TRM Labs analysis found that funds stolen from the 2022 LastPass hack were routed through Cryptex and AudiA6.","category":"","primary":false}],"body":"\u003cp\u003eAuthorities in Europe disrupted AudiA6, a cryptocurrency laundering service used by ransomware gangs and cybercriminal networks. Europol said the operation cut off a key financial pipeline that had been used to launder more than €336 million since 2021. The platform allegedly helped criminals cash out stolen digital assets while obscuring the money trail from authorities.\u003c/p\u003e\n\n\u003cp\u003eThe June 10, 2026 action included the arrest of two alleged administrators in Georgia, the takedown of 25 domains, the seizure of more than 30 servers, and the replacement of AudiA6 and Dark2Web sites with law enforcement seizure banners. Authorities also seized or froze cryptocurrency assets, blocked Telegram accounts, and seized vehicles and properties in Georgia. The U.S. Department of Justice charged Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev with money laundering-related offenses.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale laundering operation that used thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service allegedly functioned as a cryptocurrency mixing service, returning “cleaned” funds within an hour through complex transaction chains and charging commissions between 3 percent and 10 percent. Investigators identified more than 6,000 KYC records linked to money mule accounts and connected the service to more than 15 investigations worldwide involving ransomware and large-scale cryptocurrency theft.\u003c/p\u003e\n"},{"n":19,"title":"LangGraph Flaw Chain Exposes Self-Hosted AI Agents to Remote Code Execution","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/langgraph-flaw-chain-exposes-self.html","time":"09:50","priority":"SHOULD READ","score":82,"tldr":"Researchers disclosed three patched LangGraph flaws, including a chain in self-hosted deployments that can combine SQL injection with unsafe deserialization to achieve remote code execution. Users running affected SQLite or Redis checkpointers should update immediately and restrict exposure of LangGraph servers and checkpoint access.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed details of three now-patched security flaws affecting LangGraph, an open-source framework created by LangChain for building complex, stateful, multi-agent AI applications. Check Point said the issues include a critical vulnerability chain that could result in remote code execution on self-hosted deployments. LangChain\u0026rsquo;s managed LangSmith Deployment platform is not affected.\u003c/p\u003e\n\n\u003cp\u003eThe most serious chain combines CVE-2025-67644, a SQL injection flaw in LangGraph\u0026rsquo;s SQLite checkpoint implementation, with CVE-2026-28277, an unsafe msgpack deserialization issue in LangGraph. According to researcher Yarden Porat, an attacker could use a malicious filter parameter to force a fake checkpoint row into database query results, causing attacker-controlled serialized data to be deserialized. This could execute arbitrary code when the application processes the checkpoint data.\u003c/p\u003e\n\n\u003cp\u003eThe flaws affect langgraph-checkpoint-sqlite versions before 3.0.1, langgraph versions before 1.0.10, and @langchain/langgraph-checkpoint-redis versions before 1.0.1. Check Point said the chain is exploitable in self-hosted deployments using the SQLite or Redis checkpointer with user-controlled filter input. Users are advised to apply fixes, implement authentication, avoid long-lived static secrets, enforce network segmentation, treat AI agents as privileged identities, and apply least privilege.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers disclosed three now-patched vulnerabilities in LangGraph, including a chain that could allow remote code execution. LangGraph is an open-source framework from LangChain for building complex, stateful, and multi-agent AI agentic applications. Check Point said an SQL injection in LangGraph could allow attackers to gain full control of a server by exploiting how the system processes and handles data.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities are CVE-2025-67644, CVE-2026-28277, and CVE-2026-27022. CVE-2025-67644 is a SQL injection flaw in LangGraph\u0026rsquo;s SQLite checkpoint implementation affecting langgraph-checkpoint-sqlite versions before 3.0.1. CVE-2026-28277 is an unsafe msgpack deserialization issue affecting langgraph versions before 1.0.10, and CVE-2026-27022 is a RediSearch Query Injection in @langchain/langgraph-checkpoint-redis affecting versions before 1.0.1.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the vulnerability chain is exploitable in self-hosted deployments using the SQLite or Redis checkpointer with user-controlled filter input. The article states that LangChain\u0026rsquo;s managed platform, LangSmith Deployment, is not affected. Security researcher Yarden Porat is credited with discovering and reporting all three flaws.\u003c/p\u003e\n\n\u003cp\u003eThe remote code execution chain relies on the application exposing the get_state_history() endpoint, which allows historical checkpoints to be retrieved based on metadata. In the described sequence, an attacker prepares a malicious msgpack payload, sends a malicious filter parameter that exploits SQL injection, causes a fake checkpoint row with attacker-controlled serialized data to be returned, and then triggers unsafe deserialization when the application processes the result. This allows the attacker to execute the payload on the server.\u003c/p\u003e\n\n\u003cp\u003eLangGraph described CVE-2026-28277 as a post-exploitation issue because successful exploitation requires the ability to write attacker-controlled checkpoint data and turn it into code execution in the application runtime. The maintainers said escalation from write access to the checkpoint store to code execution may expose runtime secrets or provide access to other systems the runtime can reach. Users are advised to apply the latest fixes, add authentication for self-hosted LangGraph servers, avoid long-lived static secrets, enforce network segmentation, treat AI agents as privileged identities, and apply least privilege.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed details of three now-patched vulnerabilities affecting LangGraph, an open-source framework created by LangChain for building complex, stateful, and multi-agent AI agentic applications. The flaws include a critical vulnerability chain that could result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said an SQL injection in a LangGraph function could allow attackers to gain full control via remote code execution of a server by exploiting weaknesses in how the system processes and handles data. Security researcher Yarden Porat is credited with discovering and reporting all three flaws.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-vulnerabilities\"\u003eAffected Products and Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2025-67644\u003c/strong\u003e: A SQL injection vulnerability in LangGraph\u0026rsquo;s SQLite checkpoint implementation that allows attackers to manipulate SQL queries through metadata filter keys. It affects \u003cstrong\u003elanggraph-checkpoint-sqlite versions before 3.0.1\u003c/strong\u003e and has a CVSS score of \u003cstrong\u003e7.3\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-28277\u003c/strong\u003e: An unsafe \u003cstrong\u003emsgpack\u003c/strong\u003e deserialization vulnerability in LangGraph that could be used to trigger object reconstruction when a checkpoint is loaded by an attacker who can modify checkpoint data. It affects \u003cstrong\u003elanggraph versions before 1.0.10\u003c/strong\u003e and has a CVSS score of \u003cstrong\u003e6.8\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-27022\u003c/strong\u003e: A \u003cstrong\u003eRediSearch Query Injection\u003c/strong\u003e in \u003cstrong\u003e@langchain/langgraph-checkpoint-redis\u003c/strong\u003e that can be used to bypass access controls. It affects \u003cstrong\u003e@langchain/langgraph-checkpoint-redis versions before 1.0.1\u003c/strong\u003e and has a CVSS score of \u003cstrong\u003e6.5\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-conditions\"\u003eExploitation Conditions\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the vulnerability chain is exploitable in \u003cstrong\u003eself-hosted deployments\u003c/strong\u003e using the SQLite or Redis checkpointer with \u003cstrong\u003euser-controlled filter input\u003c/strong\u003e. The article states that \u003cstrong\u003eLangChain\u0026rsquo;s managed platform, LangSmith Deployment, is not affected\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe remote code execution chain specifically depends on the application exposing the \u003cstrong\u003eget_state_history()\u003c/strong\u003e endpoint. That endpoint allows an attacker to retrieve historical checkpoints based on their metadata.\u003c/p\u003e\n\n\u003ch2 id=\"remote-code-execution-chain\"\u003eRemote Code Execution Chain\u003c/h2\u003e\n\n\u003cp\u003eAccording to Yarden Porat, \u003cstrong\u003eCVE-2025-67644\u003c/strong\u003e and \u003cstrong\u003eCVE-2026-28277\u003c/strong\u003e can be chained to achieve remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the attack sequence as follows:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe attacker prepares a \u003cstrong\u003emsgpack payload\u003c/strong\u003e containing instructions to execute arbitrary code.\u003c/li\u003e\n\u003cli\u003eThe attacker sends a malicious filter parameter that exploits the SQL injection vulnerability.\u003c/li\u003e\n\u003cli\u003eThe SQL injection causes a fake checkpoint row to be returned in the database query results.\u003c/li\u003e\n\u003cli\u003eThe fake row\u0026rsquo;s checkpoint column contains attacker-controlled serialized data.\u003c/li\u003e\n\u003cli\u003eWhen the application processes the query results, it deserializes the malicious checkpoint\u0026rsquo;s BLOB.\u003c/li\u003e\n\u003cli\u003eThe attacker exploits the unsafe deserialization vulnerability to execute the payload, resulting in remote code execution on the server.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"langgraph-s-characterization-of-cve-2026-28277\"\u003eLangGraph\u0026rsquo;s Characterization of CVE-2026-28277\u003c/h2\u003e\n\n\u003cp\u003eLangGraph described \u003cstrong\u003eCVE-2026-28277\u003c/strong\u003e as a post-exploitation issue. The maintainers said successful exploitation requires the ability to write attacker-controlled checkpoint data and turn that into code execution in the application runtime.\u003c/p\u003e\n\n\u003cp\u003eLangGraph also said the issue does not pose risks to existing LangSmith-hosted deployments. In the described threat model, an attacker must tamper with the checkpoint persistence layer used by the deployment, and typical hosted configurations are designed to prevent such access.\u003c/p\u003e\n\n\u003cp\u003eThe maintainers said escalation from write access to the checkpoint store to code execution may expose runtime secrets or provide access to other systems the runtime can reach.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the findings show how classic vulnerability classes such as SQL injection can become more potent when they appear inside AI agent frameworks. The article notes that these frameworks may carry elevated access and trust, which can open the door to sensitive data exposure.\u003c/p\u003e\n\n\u003cp\u003eThe issue is significant for self-hosted LangGraph deployments because the vulnerable conditions involve checkpoint storage, user-controlled filter input, and exposed state-history retrieval functionality. The managed LangSmith Deployment platform is explicitly stated to be unaffected.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eUsers are advised to apply the latest fixes for the affected packages. The article also recommends implementing authentication for self-hosted LangGraph servers.\u003c/p\u003e\n\n\u003cp\u003eAdditional recommended measures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAvoiding long-lived static secrets.\u003c/li\u003e\n\u003cli\u003eEnforcing network segmentation.\u003c/li\u003e\n\u003cli\u003eTreating AI agents as privileged identities.\u003c/li\u003e\n\u003cli\u003eApplying the principle of least privilege to limit an agent\u0026rsquo;s access footprint.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cybersecurity researchers disclosed three now-patched vulnerabilities affecting LangGraph, including a critical chain that could lead to remote code execution.","CVE-2025-67644 is a SQL injection flaw in LangGraph's SQLite checkpoint implementation that affects langgraph-checkpoint-sqlite versions before 3.0.1.","CVE-2026-28277 is an unsafe msgpack deserialization flaw in LangGraph that affects langgraph versions before 1.0.10.","CVE-2025-67644 and CVE-2026-28277 can be chained in self-hosted deployments using the SQLite checkpointer with user-controlled filter input to execute attacker-controlled code.","Check Point said LangChain's managed LangSmith Deployment platform is not affected by the vulnerability chain."],"insights":["The remote code execution chain depends on the application exposing the get_state_history() endpoint and accepting user-controlled metadata filters, making endpoint exposure and input control central to risk reduction.","A flaw described as post-exploitation by LangGraph can become part of a pre-authored remote code execution chain when paired with SQL injection that injects attacker-controlled checkpoint data into query results.","The issue highlights that checkpoint stores in AI agent frameworks should be treated as highly sensitive persistence layers because tampering with checkpoint data can expose runtime secrets or provide access to other systems reachable by the runtime.","Self-hosted LangGraph deployments face different risk than LangChain's managed LangSmith Deployment platform, so organizations should not assume managed-platform protections apply to their own deployments."],"referencedReports":[{"title":"When Your AI Agent's Memory Becomes a Security Liability","url":"https://blog.checkpoint.com/research/when-your-ai-agents-memory-becomes-a-security-liability/","publisher":"Check Point","context":"The article cites Check Point's research explaining that an SQL injection in LangGraph could allow attackers to gain full control via remote code execution.","category":"","primary":false},{"title":"From SQLi to RCE: Exploiting LangGraph's Checkpointer","url":"https://research.checkpoint.com/2026/from-sqli-to-rce-exploiting-langgraphs-checkpointer/","publisher":"Check Point Research","context":"The article cites Yarden Porat's technical analysis describing how CVE-2025-67644 and CVE-2026-28277 can be chained to achieve remote code execution.","category":"","primary":false},{"title":"CVE-2025-67644 LangGraph SQLite Checkpoint SQL Injection Advisory","url":"https://github.com/langchain-ai/langgraph/security/advisories/GHSA-9rwj-6rc7-p77c","publisher":"LangChain","context":"The article links to the GitHub security advisory for the SQL injection vulnerability affecting langgraph-checkpoint-sqlite versions before 3.0.1.","category":"","primary":false},{"title":"CVE-2026-28277 LangGraph Unsafe msgpack Deserialization Advisory","url":"https://github.com/langchain-ai/langgraph/security/advisories/GHSA-g48c-2wqr-h844","publisher":"LangChain","context":"The article links to the GitHub security advisory for the unsafe msgpack deserialization vulnerability affecting LangGraph versions before 1.0.10.","category":"","primary":false},{"title":"CVE-2026-27022 LangGraphJS RediSearch Query Injection Advisory","url":"https://github.com/langchain-ai/langgraphjs/security/advisories/GHSA-5mx2-w598-339m","publisher":"LangChain","context":"The article links to the GitHub security advisory for the RediSearch query injection vulnerability affecting @langchain/langgraph-checkpoint-redis versions before 1.0.1.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers disclosed details of three now-patched security flaws affecting LangGraph, an open-source framework created by LangChain for building complex, stateful, multi-agent AI applications. Check Point said the issues include a critical vulnerability chain that could result in remote code execution on self-hosted deployments. LangChain\u0026rsquo;s managed LangSmith Deployment platform is not affected.\u003c/p\u003e\n\n\u003cp\u003eThe most serious chain combines CVE-2025-67644, a SQL injection flaw in LangGraph\u0026rsquo;s SQLite checkpoint implementation, with CVE-2026-28277, an unsafe msgpack deserialization issue in LangGraph. According to researcher Yarden Porat, an attacker could use a malicious filter parameter to force a fake checkpoint row into database query results, causing attacker-controlled serialized data to be deserialized. This could execute arbitrary code when the application processes the checkpoint data.\u003c/p\u003e\n\n\u003cp\u003eThe flaws affect langgraph-checkpoint-sqlite versions before 3.0.1, langgraph versions before 1.0.10, and @langchain/langgraph-checkpoint-redis versions before 1.0.1. Check Point said the chain is exploitable in self-hosted deployments using the SQLite or Redis checkpointer with user-controlled filter input. Users are advised to apply fixes, implement authentication, avoid long-lived static secrets, enforce network segmentation, treat AI agents as privileged identities, and apply least privilege.\u003c/p\u003e\n"},{"n":23,"title":"The FedEx Freight Invoice That Came From Inside the CRM","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/fedex-freight-invoice-rebill-salesforce-securence-relay","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"An attacker used FedEx Freight’s legitimate Salesforce CRM to send an authenticated invoice rebill request that passed DKIM and DMARC, with no malicious links or attachments. The key risk was business email compromise via believable invoice-change text from trusted infrastructure, requiring verification through known contacts rather than email authentication alone.","briefOverview":"\u003cp\u003eAn attacker used FedEx Freight’s Salesforce CRM to send an invoice rebill request to a logistics and distribution company. The message was sent to three employees from coordinator23@fedexfreight[.]com and referenced a specific case number and FedEx Freight invoice. The article describes the event as a high-severity invoice fraud business email compromise attempt.\u003c/p\u003e\n\n\u003cp\u003eThe email passed DKIM with a signature aligned to fedexfreight[.]com, passed DMARC, and returned compauth=100. It was dispatched through Salesforce Quick Action, and the headers indicated it came from FedEx Freight’s actual CRM sending infrastructure rather than spoofed infrastructure. The email was later relayed through a Securence gateway, which introduced an SPF softfail on forwarding.\u003c/p\u003e\n\n\u003cp\u003eThe message contained no malicious links or attachments, and the payload was the text request to change the bill-to entity on invoice #0584162950. Themis classified the message as invoice phishing with 83% confidence and four mailboxes were quarantined. The article emphasizes that legitimate CRM infrastructure does not make a request legitimate and recommends verifying rebill or bill-to changes through a known carrier contact.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA freight invoice rebill request arrived at a logistics and distribution company and was addressed to three employees. The sender appeared as “Coordinator23” using coordinator23@fedexfreight[.]com, and the subject referenced a specific case number and FedEx Freight invoice. The requested action was to change the bill-to entity on invoice #0584162950. The article characterizes the incident as high-severity invoice fraud and business email compromise.\u003c/p\u003e\n\n\u003cp\u003eThe email originated from Salesforce Email-as-a-Service infrastructure at smtp-0e846264ca9e07764[.]core1[.]sfdc-yfeipo[.]mta[.]salesforce[.]com with IP 23[.]23[.]72[.]98. It carried a valid DKIM signature using selector sfafxfpr03112026 under d=fedexfreight[.]com, and DMARC passed with compauth=100. The X-SFDC-EmailCategory header was quickActionEmail, which the article says confirms the message was dispatched through Salesforce Quick Action. The Salesforce entity ID 500QU00001PKr4X and the Salesforce VERP bounce address further indicated generation inside a real Salesforce org.\u003c/p\u003e\n\n\u003cp\u003eAfter leaving Salesforce, the message was relayed through a Securence gateway at maild8110391[.]static[.]msp[.]securence[.]com with IP 216[.]17[.]3[.]145. SPF passed at the Securence hop for the Salesforce bounce domain, but the final receiving server recorded an SPF softfail because the relay IP was not in the original sender’s SPF record. The article describes this softfail as a known artifact of gateway relaying rather than a signal intentionally introduced by the attacker.\u003c/p\u003e\n\n\u003cp\u003eThe email contained no malicious links and no attachments. The article states that the payload was the message content itself: a routine-sounding operational request to redirect billing obligations to a third party. It notes that freight invoice adjustments, rebills, and bill-to changes are normal operational traffic in logistics, which made the request effective as a business email compromise attempt.\u003c/p\u003e\n\n\u003cp\u003eThemis scored the message at 83% confidence with an “Invoice Phishing” label, and four mailboxes were quarantined. The Securence gateway’s Bayesian classifier scored the message at 5.2, which the article describes as elevated but not blocked. The detection was driven by behavioral analysis, including a first-time sender addressing multiple recipients with a financial action request and an invoice modification pattern targeting a logistics company. The article advises verifying freight rebill or bill-to change requests through a known carrier contact rather than replying to the email.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a high-severity invoice fraud business email compromise attempt involving a freight invoice rebill request sent to a logistics and distribution company. The message was addressed to three employees and appeared to come from “Coordinator23” at coordinator23@fedexfreight[.]com. Its subject referenced a specific case number and a FedEx Freight invoice.\u003c/p\u003e\n\n\u003cp\u003eThe requested action was to change the bill-to entity on FedEx Freight invoice #0584162950. The article states that the email contained no malicious links and no attachments. The payload was the text of the message itself: a routine-sounding operational request related to freight billing.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-through-legitimate-infrastructure\"\u003eDelivery Through Legitimate Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe email originated from Salesforce Email-as-a-Service infrastructure, specifically smtp-0e846264ca9e07764[.]core1[.]sfdc-yfeipo[.]mta[.]salesforce[.]com with IP address 23[.]23[.]72[.]98. The article states that the email was sent through FedEx Freight’s own Salesforce CRM instance.\u003c/p\u003e\n\n\u003cp\u003eSeveral header details supported that conclusion:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe DKIM signature used selector sfafxfpr03112026 with d=fedexfreight[.]com.\u003c/li\u003e\n\u003cli\u003eDKIM passed with a signature aligned to fedexfreight[.]com.\u003c/li\u003e\n\u003cli\u003eDMARC passed.\u003c/li\u003e\n\u003cli\u003eCompAuth returned reason=100.\u003c/li\u003e\n\u003cli\u003eThe X-SFDC-EmailCategory header was set to quickActionEmail.\u003c/li\u003e\n\u003cli\u003eThe Salesforce entity ID was 500QU00001PKr4X.\u003c/li\u003e\n\u003cli\u003eThe Return-Path contained a long Salesforce VERP bounce address.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the quickActionEmail category confirmed the message was dispatched through Salesforce Quick Action, a CRM feature that lets agents send emails directly from case records. It also states that this was not an attacker spoofing FedEx Freight, but an email that passed through FedEx Freight’s actual CRM sending infrastructure and carried a valid cryptographic signature for the FedEx Freight domain.\u003c/p\u003e\n\n\u003ch2 id=\"securence-relay-and-spf-softfail\"\u003eSecurence Relay and SPF Softfail\u003c/h2\u003e\n\n\u003cp\u003eAfter the Salesforce hop, the email was relayed through a Securence gateway identified as maild8110391[.]static[.]msp[.]securence[.]com with IP address 216[.]17[.]3[.]145. The article says SPF passed at the Securence hop for the Salesforce bounce domain.\u003c/p\u003e\n\n\u003cp\u003eHowever, the final receiving server recorded an SPF softfail at 216[.]17[.]3[.]145. The reason given was that the Securence relay IP was not in the original sender’s SPF record. The article describes this as a known artifact of gateway relaying rather than a detection signal intentionally introduced by the attacker.\u003c/p\u003e\n\n\u003ch2 id=\"nature-of-the-payload\"\u003eNature of the Payload\u003c/h2\u003e\n\n\u003cp\u003eThe message did not include the typical elements that many technical detections inspect, such as malicious URLs or attachments. The only link mentioned in the article was the target company’s own website. There was no attachment to detonate and no malicious URL reputation to check.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the business email compromise was the message content. The request asked the recipient to rebill a freight invoice to a different entity. If fulfilled, the request would redirect billing obligations to a third party.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that this class of attack is effective because it mirrors legitimate business communication. Freight invoice adjustments, rebills, and bill-to changes are described as normal operational traffic in logistics. The attacker relied on the context of the request rather than a technical exploit.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis classified the message as “Invoice Phishing” with 83% confidence. Four mailboxes were quarantined. The article also says the Securence gateway’s Bayesian classifier scored the message at 5.2, which it describes as an elevated risk signal that did not trigger a block.\u003c/p\u003e\n\n\u003cp\u003eThe detection was driven by behavioral analysis rather than failed authentication or malicious content indicators. The article identifies the relevant behavioral pattern as a first-time sender addressing multiple recipients with a financial action request. It also cites the invoice modification pattern targeting a logistics company.\u003c/p\u003e\n\n\u003cp\u003eThe key anomaly was the relationship, or absence of one, between the sender and the recipient organization. Authentication was clean, infrastructure was legitimate, and the article says the only anomaly was this lack of established relationship combined with the financial request pattern.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-referenced-entities\"\u003eAffected Parties and Referenced Entities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the target as a logistics and distribution company. It does not name the company. The sender domain and infrastructure were associated with FedEx Freight and its Salesforce CRM environment.\u003c/p\u003e\n\n\u003cp\u003eNamed entities and systems in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFedEx Freight\u003c/li\u003e\n\u003cli\u003eSalesforce CRM\u003c/li\u003e\n\u003cli\u003eSalesforce Email-as-a-Service infrastructure\u003c/li\u003e\n\u003cli\u003eSalesforce Quick Action\u003c/li\u003e\n\u003cli\u003eSecurence gateway\u003c/li\u003e\n\u003cli\u003eThemis\u003c/li\u003e\n\u003cli\u003eIRONSCALES\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also references a Salesforce case entity ID, a FedEx Freight invoice number, and a case number:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSalesforce entity ID: 500QU00001PKr4X\u003c/li\u003e\n\u003cli\u003eInvoice number: 0584162950\u003c/li\u003e\n\u003cli\u003eCase number: 03276500\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping-provided-in-the-article\"\u003eMITRE ATT\u0026amp;CK Mapping Provided in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to the following MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.002, Phishing: Spearphishing Link, described as targeted email delivered via CRM case management infrastructure.\u003c/li\u003e\n\u003cli\u003eT1586.002, Compromise Accounts: Email Accounts, described as access to a FedEx Freight Salesforce org to send authenticated email.\u003c/li\u003e\n\u003cli\u003eT1656, Impersonation, described as operational role impersonation as a freight coordinator.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: coordinator23@fedexfreight[.]com\u003c/li\u003e\n\u003cli\u003eSalesforce MTA: smtp-0e846264ca9e07764[.]core1[.]sfdc-yfeipo[.]mta[.]salesforce[.]com\u003c/li\u003e\n\u003cli\u003eSalesforce IP: 23[.]23[.]72[.]98\u003c/li\u003e\n\u003cli\u003eDKIM selector: sfafxfpr03112026 with d=fedexfreight[.]com\u003c/li\u003e\n\u003cli\u003eSalesforce entity: 500QU00001PKr4X\u003c/li\u003e\n\u003cli\u003eSecurence gateway: maild8110391[.]static[.]msp[.]securence[.]com\u003c/li\u003e\n\u003cli\u003eSecurence IP: 216[.]17[.]3[.]145\u003c/li\u003e\n\u003cli\u003eInvoice number: 0584162950\u003c/li\u003e\n\u003cli\u003eCase number: 03276500\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-action-in-the-article\"\u003eRecommended Action in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article advises that when a freight invoice rebill or bill-to change arrives from a first-time sender, the recipient should verify the request through a known contact at the carrier. It specifically says not to verify by replying to the email. The article’s central warning is that legitimate CRM infrastructure does not make a request legitimate.\u003c/p\u003e\n","keyPoints":["An attacker used FedEx Freight's Salesforce CRM to send an invoice rebill request to a logistics and distribution company.","The email was dispatched via Salesforce Quick Action, producing a valid DKIM signature for fedexfreight.com and passing DMARC with compauth=100.","The message contained no malicious links or attachments, and the payload was a text request to change the bill-to entity on FedEx Freight invoice #0584162950.","The email was relayed through a Securence gateway, which caused an SPF softfail because the relay IP was not in the original sender's SPF record.","Themis scored the message at 83% confidence as invoice phishing and quarantined four mailboxes."],"insights":["Clean email authentication did not indicate trustworthiness in this case because the message was generated from FedEx Freight's actual Salesforce CRM infrastructure with a valid domain-aligned DKIM signature.","The SPF softfail was described as an artifact of Securence gateway relaying rather than an attacker-created signal, showing that this authentication failure was not the meaningful indicator of compromise.","The most important anomaly was relational rather than technical: a first-time sender contacted multiple recipients with a financial action request involving an invoice modification.","The article recommends verifying freight rebill or bill-to change requests through a known carrier contact instead of replying to the email, even when the message comes from legitimate CRM infrastructure."],"referencedReports":[],"body":"\u003cp\u003eAn attacker used FedEx Freight’s Salesforce CRM to send an invoice rebill request to a logistics and distribution company. The message was sent to three employees from coordinator23@fedexfreight[.]com and referenced a specific case number and FedEx Freight invoice. The article describes the event as a high-severity invoice fraud business email compromise attempt.\u003c/p\u003e\n\n\u003cp\u003eThe email passed DKIM with a signature aligned to fedexfreight[.]com, passed DMARC, and returned compauth=100. It was dispatched through Salesforce Quick Action, and the headers indicated it came from FedEx Freight’s actual CRM sending infrastructure rather than spoofed infrastructure. The email was later relayed through a Securence gateway, which introduced an SPF softfail on forwarding.\u003c/p\u003e\n\n\u003cp\u003eThe message contained no malicious links or attachments, and the payload was the text request to change the bill-to entity on invoice #0584162950. Themis classified the message as invoice phishing with 83% confidence and four mailboxes were quarantined. The article emphasizes that legitimate CRM infrastructure does not make a request legitimate and recommends verifying rebill or bill-to changes through a known carrier contact.\u003c/p\u003e\n"},{"n":24,"title":"Factoring \"short-sleeve\" RSA keys with polynomials","source":"blog.trailofbits.com","sourceColorIdx":6,"link":"https://blog.trailofbits.com/2026/06/12/factoring-short-sleeve-rsa-keys-with-polynomials/","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"Researchers found hundreds of real-world RSA and DSA keys with structured zero-bit patterns that made them recoverable, mostly traced to a CompleteFTP big-integer random generation bug present in older versions. Users who generated CompleteFTP host keys during the affected periods should check and regenerate vulnerable keys.","briefOverview":"\u003cp\u003eResearchers working with Hanno Böck of the badkeys project found hundreds of real-world RSA keys whose private-key bits were heavily biased toward zero and often followed highly structured patterns. They named these “short-sleeve” keys because blocks of zero bits did not fully cover the limbs of the big integers. The public key bits were biased enough to detect these keys in large public datasets, including Certificate Transparency logs, TLS and SSH scans, PGP keys, and other sources.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a polynomial-based technique that exploits the regular zero-bit structure to factor affected RSA moduli quickly. The method represents big integers as polynomials using limb-sized bases, factors the resulting polynomial when coefficients are small, and converts the polynomial factors back into RSA primes. This does not apply to normal RSA keys, because correctly generated prime factors typically produce polynomial coefficients that are too large.\u003c/p\u003e\n\n\u003cp\u003eOne identified pattern was traced to a type mismatch in older CompleteFTP big-integer code from EnterpriseDT, where 8-bit random output was copied into 32-bit limbs. The issue affected RSA keys generated by CompleteFTP versions 10.0.0 through 12.0.0 and DSA keys generated by versions 10.0.0 through 23.0.4. The researchers recovered private keys for 603 unique CompleteFTP RSA public keys, 74 CompleteFTP DSA keys, and 26 RSA keys with an unidentified short-sleeve pattern.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a study of RSA keys whose private factors were generated with a strong bias toward zero bits. Researchers working with Hanno Böck of the badkeys project found many public keys with visible, structured zero-bit patterns and determined that hundreds of them could be quickly factored. The keys were found by searching large collections of public keys from sources such as Certificate Transparency logs, internet-wide TLS and SSH scans, PGP keys, and other public datasets.\u003c/p\u003e\n\n\u003cp\u003eThe researchers observed two major short-sleeve patterns in real-world RSA moduli. Pattern 1 appeared in Certificate Transparency logs for certificates issued to organizations including Yahoo and Verizon and on some devices running NetApp software, but its source remained unexplained. Pattern 2 appeared on SSH hosts running EnterpriseDT CompleteFTP and was traced to vulnerable key-generation code in old versions of that software.\u003c/p\u003e\n\n\u003cp\u003eThe technical core of the work is a polynomial factorization method for RSA moduli with regularly spaced zero-bit blocks. The method represents an integer as a polynomial by using the digits of its base-B representation as coefficients, with the base matching the big-integer limb size. For short-sleeve keys, the zero-bit structure produces polynomials with unusually small coefficients, allowing the researchers to factor the polynomial and evaluate its factors to recover the RSA primes.\u003c/p\u003e\n\n\u003cp\u003eThe CompleteFTP vulnerability came from a mismatch between the size of random bytes and 32-bit big-integer limbs. The decompiled function allocated one byte per intended 32-bit limb, filled those bytes with random nonzero values, and copied them into the big-integer limb array, implicitly casting each 8-bit value into a 32-bit limb. This left most bits in each limb unset and produced the repeated zero-bit structure seen in the vulnerable keys.\u003c/p\u003e\n\n\u003cp\u003eThe affected CompleteFTP RSA key generation existed in versions 10.0.0 through 12.0.0, released between December 2016 and March 2019, while DSA key generation was affected from versions 10.0.0 through 23.0.4, released between December 2016 and December 2023. The researchers recovered private keys for 603 unique RSA public keys and 74 DSA keys generated by vulnerable CompleteFTP versions, as well as 26 RSA keys with the unidentified short-sleeve pattern. EnterpriseDT released CompleteFTP v26.1.0 and a standalone KeyChecker tool to detect vulnerable RSA or DSA keys and alert users to regenerate them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents research into RSA and DSA keys whose private values were generated with a strong and structured bias toward zero bits. The researchers, working with Hanno Böck of the badkeys project, found hundreds of unique public keys in the wild that showed these patterns and could be quickly broken. They call these keys “short-sleeve” keys because the zero-bit blocks only partially cover the limbs of the big integers.\u003c/p\u003e\n\n\u003cp\u003eThe work combines large-scale public key discovery, reverse engineering, and a polynomial-based cryptanalytic technique. The researchers found two main RSA modulus patterns with repeated blocks of zero bits. One pattern remains unexplained, while the other was traced to old versions of EnterpriseDT CompleteFTP.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-of-the-weak-keys\"\u003eDiscovery of the weak keys\u003c/h2\u003e\n\n\u003cp\u003eThe badkeys project checks public keys for known vulnerabilities and had collected a large number of real-world keys from public sources. These sources included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCertificate Transparency logs\u003c/li\u003e\n\u003cli\u003eInternet-wide TLS scans\u003c/li\u003e\n\u003cli\u003eInternet-wide SSH scans\u003c/li\u003e\n\u003cli\u003ePGP keys\u003c/li\u003e\n\u003cli\u003eOther public key sources\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBy searching this dataset for unexpectedly sparse RSA moduli, the researchers found many keys with repeated zero-bit structures. The public moduli themselves were biased enough to make the keys detectable.\u003c/p\u003e\n\n\u003ch2 id=\"observed-short-sleeve-patterns\"\u003eObserved short-sleeve patterns\u003c/h2\u003e\n\n\u003cp\u003eThe researchers identified two major patterns in affected RSA moduli.\u003c/p\u003e\n\n\u003cp\u003ePattern 1 appeared in Certificate Transparency logs for certificates issued to several large organizations, including Yahoo and Verizon, and on some devices running NetApp software. The certificates cited in the article had already expired, and the researchers shared their findings with the companies. The source of this pattern remains unidentified because the researchers did not receive information identifying the responsible product.\u003c/p\u003e\n\n\u003cp\u003ePattern 2 appeared on SSH hosts running CompleteFTP software from EnterpriseDT. This pattern was traced to a bug in CompleteFTP’s big-integer random generation code. The affected CompleteFTP versions generated vulnerable RSA keys from version 10.0.0 through 12.0.0 and vulnerable DSA keys from version 10.0.0 through 23.0.4.\u003c/p\u003e\n\n\u003ch2 id=\"polynomial-factorization-technique\"\u003ePolynomial factorization technique\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that cryptographic big integers are commonly represented as arrays of smaller machine-sized values called limbs. In the short-sleeve keys, each limb contains only a small contiguous subset of random bits, while other bits in the limb are zero. This regular limb-level structure is what makes the polynomial technique effective.\u003c/p\u003e\n\n\u003cp\u003eThe researchers represent an integer as a polynomial using the digits of the integer’s base-B representation as coefficients. If an integer is written as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ea = sum of a_i B^i\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ethen the corresponding polynomial is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ef_a(x) = sum of a_i x^i\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEvaluating the polynomial at B converts it back into the integer. For the vulnerable keys, B corresponds to the limb size, such as 2^32 for 32-bit limbs.\u003c/p\u003e\n\n\u003cp\u003eThis representation is useful because multiplication is preserved by evaluation: multiplying two integer evaluations corresponds to evaluating the product of the two polynomials. If the RSA modulus n is the product of p and q, and the short-sleeve structure makes the corresponding polynomial coefficients small, then factoring the polynomial can reveal polynomial factors corresponding to p and q. Evaluating those polynomial factors at the limb base recovers the RSA private factors.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this does not break ordinary RSA. Correctly generated RSA prime factors typically produce polynomial coefficients with full limb-sized randomness, so the necessary small-coefficient structure is absent. The short-sleeve property is essential to making the polynomial factorization approach practical.\u003c/p\u003e\n\n\u003ch2 id=\"completeftp-root-cause\"\u003eCompleteFTP root cause\u003c/h2\u003e\n\n\u003cp\u003eThe researchers reverse-engineered a trial version of CompleteFTP after observing that the second short-sleeve pattern appeared on SSH hosts running the software. Dynamically generated RSA keys in the latest tested version did not show the vulnerable pattern, so the researchers used ILSpy to decompile the .NET code.\u003c/p\u003e\n\n\u003cp\u003eThey identified a vulnerable function called genRandomBits that was intended to fill a big integer with a random value of a specified bit length. The function calculated the number of 32-bit limbs needed, allocated a byte array of that same count, filled the byte array with nonzero random bytes, and then copied the byte array into the big-integer limb array.\u003c/p\u003e\n\n\u003cp\u003eThe bug was a type mismatch. Each 32-bit limb required 32 bits of random material, but the code provided only one 8-bit random value per limb. Array.Copy implicitly cast each 8-bit array element into a big-integer limb element, leaving most bits in each 32-bit limb unset. This produced the repeated zero-bit structure in the private factors and therefore in the public moduli.\u003c/p\u003e\n\n\u003ch2 id=\"why-newer-dynamic-testing-did-not-reproduce-the-bug\"\u003eWhy newer dynamic testing did not reproduce the bug\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerable genRandomBits function was still compiled into the latest version examined by the researchers, but it was unreachable. Older CompleteFTP versions used custom key-generation code that called the vulnerable function. Later versions refactored key generation to use standard .NET cryptographic APIs.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, CompleteFTP has generated RSA keys using .NET’s RSACryptoServiceProvider since version 12.1.0. It has generated DSA keys using the DSA.Create API since version 23.1.0.\u003c/p\u003e\n\n\u003ch2 id=\"dsa-impact\"\u003eDSA impact\u003c/h2\u003e\n\n\u003cp\u003eThe researchers found that CompleteFTP’s DSA key generation also called the vulnerable genRandomBits function in older versions. The 160-bit DSA private key x was generated using the flawed function, while the public key and parameters included a generator g and target y = g^x.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the private DSA key is easily recoverable using baby-step giant-step. After identifying the pattern, the researchers found vulnerable DSA keys in the wild as well.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Diffie-Hellman key exchange used the vulnerable function with a 2048-bit exponent, but the researchers state this is not vulnerable and that they believe those DH key exchanges remain cryptographically secure.\u003c/p\u003e\n\n\u003ch2 id=\"historical-spread-and-containment\"\u003eHistorical spread and containment\u003c/h2\u003e\n\n\u003cp\u003eThe researchers used historical and contemporary SSH scan data from Prof. Nadia Heninger’s collection to study how the CompleteFTP issue changed over time. The scans typically included hundreds of CompleteFTP hosts per IPv4-wide scan.\u003c/p\u003e\n\n\u003cp\u003eThe historical trend aligned with CompleteFTP’s release history. After the RSA vulnerability was introduced in December 2016, the number of hosts with vulnerable keys consistently increased. When rewritten RSA code was released in March 2019, that trend immediately stopped.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article notes that vulnerable keys persisted even as fewer hosts ran affected versions of the software. The researchers interpret the plateau in the proportion of affected keys as consistent with customers updating software while generating host keys only once.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response\"\u003eVendor response\u003c/h2\u003e\n\n\u003cp\u003eEnterpriseDT was described as responsive throughout disclosure. The company released CompleteFTP v26.1.0 on May 8, 2026. This update automatically checks whether the system is using a vulnerable RSA or DSA key and alerts the user if regeneration is needed.\u003c/p\u003e\n\n\u003cp\u003eEnterpriseDT also released a standalone KeyChecker tool for the same purpose. The article states that users who generated CompleteFTP host keys during the affected periods should use the tool or updated software to determine whether their keys need to be regenerated.\u003c/p\u003e\n\n\u003cp\u003eThe badkeys website and standalone badkeys tool were also updated to support detection of vulnerable short-sleeve RSA keys.\u003c/p\u003e\n\n\u003ch2 id=\"reported-recovery-counts\"\u003eReported recovery counts\u003c/h2\u003e\n\n\u003cp\u003eThe researchers report recovering private keys for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e603 unique RSA public keys generated by vulnerable CompleteFTP versions\u003c/li\u003e\n\u003cli\u003e74 DSA keys generated by vulnerable CompleteFTP versions\u003c/li\u003e\n\u003cli\u003e26 RSA keys with the unidentified short-sleeve pattern\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThey caution that their data sources are heavily biased toward RSA SSH keys, so these counts do not reflect actual prevalence.\u003c/p\u003e\n\n\u003ch2 id=\"other-identified-issues\"\u003eOther identified issues\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a footnote describing a separate CompleteFTP RSA key-generation issue on Linux. In that issue, the private exponent was set to 65537 and the public exponent was large. The researchers disclosed the issue, and it was fixed in CompleteFTP v26.0.2.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the Linux version has different features and is less popular than the Windows version. According to EnterpriseDT license data, the company believes no production users were affected, and the researchers’ scans found no keys in the wild with that property.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central significance is that structured implementation mistakes in big-integer key generation can leave public RSA moduli with detectable patterns and factorable private keys. The researchers found similar short-sleeve failures in independent RSA implementations, although one pattern remains unexplained. They argue that the regular spacing of the leakage creates useful structure for cryptanalysis and may be worth looking for in other implementations.\u003c/p\u003e\n\n\u003cp\u003eThe research also shows how practical cryptanalysis can move from detecting unusual public-key patterns, to developing a specialized factoring method, to reverse-engineering software and identifying the underlying bug. In this case, the result was both recovery of real private keys and vendor-released tooling to identify affected CompleteFTP RSA and DSA keys.\u003c/p\u003e\n","keyPoints":["Researchers working with Hanno Böck of the badkeys project found hundreds of RSA public keys with heavily zero-biased, structured bit patterns that could be quickly factored.","The researchers traced one short-sleeve key pattern to a type mismatch in big-integer code in old versions of EnterpriseDT CompleteFTP, where 8-bit RNG output was copied into 32-bit big-integer limbs.","The CompleteFTP issue affected RSA keys generated with versions 10.0.0 through 12.0.0 from December 2016 to March 2019 and DSA keys generated with versions 10.0.0 through 23.0.4 from December 2016 to December 2023.","The researchers recovered private keys for 603 unique RSA public keys and 74 DSA keys generated by vulnerable CompleteFTP versions, plus 26 RSA keys with an unidentified short-sleeve pattern.","EnterpriseDT released CompleteFTP v26.1.0 and a standalone KeyChecker tool to detect vulnerable RSA or DSA keys and alert users when regeneration is needed."],"insights":["The vulnerable CompleteFTP code remained compiled into newer versions but became unreachable after RSA key generation was refactored to standard .NET cryptographic APIs, which is why dynamic testing of the latest version did not reproduce broken keys.","Historical SSH scan data showed that new vulnerable CompleteFTP RSA keys stopped appearing immediately after the March 2019 rewrite, but many affected keys persisted because customers updated software without regenerating host keys.","The same short-sleeve failure mode appeared in at least two independent RSA implementations, indicating that biased limb-level big-integer generation is a practical class of implementation failure worth detecting beyond the confirmed CompleteFTP cases.","The polynomial factorization attack depends on the regular spacing of zero-bit blocks across big-integer limbs, turning an otherwise hard integer factorization problem into an easy polynomial factorization problem for this special key structure."],"referencedReports":[{"title":"RSA-250 factorization presentation","url":"https://members.loria.fr/PZimmermann/talks/rsa250-prace.pdf","publisher":"Paul Zimmermann / LORIA","context":"The article cites this technical presentation when explaining that the General Number Field Sieve begins by selecting a polynomial and evaluation point related to the modulus.","category":"","primary":false},{"title":"Broken SSH RSA Signatures","url":"https://eprint.iacr.org/2023/1711","publisher":"IACR Cryptology ePrint Archive","context":"The article references this linked research while explaining that Nadia Heninger had SSH scan data previously used to find broken SSH RSA signatures.","category":"","primary":false},{"title":"Extended Hidden Number Problem and Its Cryptanalytic Applications","url":"https://doi.org/10.1007/978-3-540-74462-7_9","publisher":"Hlaváč and Rosa","context":"The article cites this paper as prior work on exploiting ECDSA nonces with multiple blocks of unknown bits at arbitrary locations.","category":"","primary":false},{"title":"Solving Linear Equations Modulo Divisors: On Factoring Given Any Bits","url":"https://doi.org/10.1007/978-3-540-89255-7","publisher":"Herrmann and May","context":"The article cites this paper as prior work on factoring RSA when one factor has multiple contiguous blocks of unknown bits.","category":"","primary":false}],"body":"\u003cp\u003eResearchers working with Hanno Böck of the badkeys project found hundreds of real-world RSA keys whose private-key bits were heavily biased toward zero and often followed highly structured patterns. They named these “short-sleeve” keys because blocks of zero bits did not fully cover the limbs of the big integers. The public key bits were biased enough to detect these keys in large public datasets, including Certificate Transparency logs, TLS and SSH scans, PGP keys, and other sources.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a polynomial-based technique that exploits the regular zero-bit structure to factor affected RSA moduli quickly. The method represents big integers as polynomials using limb-sized bases, factors the resulting polynomial when coefficients are small, and converts the polynomial factors back into RSA primes. This does not apply to normal RSA keys, because correctly generated prime factors typically produce polynomial coefficients that are too large.\u003c/p\u003e\n\n\u003cp\u003eOne identified pattern was traced to a type mismatch in older CompleteFTP big-integer code from EnterpriseDT, where 8-bit random output was copied into 32-bit limbs. The issue affected RSA keys generated by CompleteFTP versions 10.0.0 through 12.0.0 and DSA keys generated by versions 10.0.0 through 23.0.4. The researchers recovered private keys for 603 unique CompleteFTP RSA public keys, 74 CompleteFTP DSA keys, and 26 RSA keys with an unidentified short-sleeve pattern.\u003c/p\u003e\n"},{"n":8,"title":"Ukrainian national pleads guilty to role in Conti ransomware operation","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ukrainian-national-pleads-guilty-to-role-in-conti-ransomware-operation/","time":"17:54","priority":"SHOULD READ","score":78,"tldr":"Ukrainian national Oleksii Lytvynenko pleaded guilty in the U.S. to helping the Conti ransomware operation by developing malware tooling and possessing stolen victim data. He faces up to 20 years in prison for his role in attacks tied to a group that extorted over $150 million from more than 1,000 victims worldwide.","briefOverview":"\u003cp\u003eUkrainian national Oleksii Oleksiyovych Lytvynenko pleaded guilty in the United States to conspiracy to commit wire fraud for his role in the Conti ransomware operation. The U.S. Department of Justice said the activity occurred between 2021 and 2022. Lytvynenko was extradited from Ireland to the United States after his arrest in July 2023.\u003c/p\u003e\n\n\u003cp\u003eAccording to prosecutors, Lytvynenko and co-conspirators deployed Conti ransomware on victim networks in the United States and abroad. The attacks involved stealing data, encrypting devices, and extorting Bitcoin ransom payments. Lytvynenko admitted to possessing data stolen from eight U.S. victims and four overseas victims.\u003c/p\u003e\n\n\u003cp\u003eThe case is significant because court documents state that Conti targeted more than 1,000 victims worldwide and collected over $150 million in ransom payments. Lytvynenko also admitted to working on a malware “loader” used to load software needed to carry out attacks. He now faces a maximum sentence of 20 years in prison.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUkrainian national Oleksii Oleksiyovych Lytvynenko pleaded guilty to conspiracy to commit wire fraud in connection with the Conti ransomware operation. The U.S. Department of Justice announced the plea on Thursday and said the relevant attacks occurred between 2021 and 2022. Lytvynenko was extradited from Ireland to the United States after being arrested in July 2023.\u003c/p\u003e\n\n\u003cp\u003eProsecutors said Lytvynenko and his co-conspirators deployed Conti ransomware on victim networks in the United States and abroad. The attacks involved stealing data and encrypting devices to pressure victims into paying Bitcoin ransoms. According to the DOJ, Lytvynenko admitted to joining the Conti conspiracy in approximately September 2021.\u003c/p\u003e\n\n\u003cp\u003eLytvynenko also admitted to possessing data stolen from eight U.S. victims and four overseas victims. He further admitted to joining a team run by another Conti conspirator, where he worked on coding a malware “loader.” The article describes the loader as malware used to load software needed to carry out attacks.\u003c/p\u003e\n\n\u003cp\u003eThe Conti ransomware operation was one of the most prolific cybercrime groups active at the time. The group targeted hospitals, businesses, schools, and government agencies worldwide. Court documents state that Conti targeted more than 1,000 victims worldwide and collected over $150 million in ransom payments.\u003c/p\u003e\n\n\u003cp\u003eThe article also places Conti in the broader ransomware ecosystem. It says Conti emerged from the Ryuk cybercrime group and was closely tied to the TrickBot malware syndicate. The group shut down in 2022 after its internal chats were leaked and law enforcement pressure increased.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers believe former Conti members later splintered into other ransomware groups, including BlackCat, Black Basta, ZEON, Hive, Quantum, BlackByte, Karakurt, and the Silent Ransom Group. In September 2023, the United States and United Kingdom sanctioned and charged nine Russian nationals associated with TrickBot and Conti. Those actions were tied to attacks against more than 900 victims worldwide.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUkrainian national Oleksii Oleksiyovych Lytvynenko pleaded guilty in the United States to conspiracy to commit wire fraud for his role in the Conti ransomware operation. The U.S. Department of Justice said the charges relate to Conti ransomware attacks conducted between 2021 and 2022. Lytvynenko is 44 years old and was extradited from Ireland to the United States after his arrest in July 2023.\u003c/p\u003e\n\n\u003cp\u003eLytvynenko now faces a maximum sentence of 20 years in prison. His guilty plea is tied to activity involving stolen data, encrypted victim systems, and Bitcoin ransom demands. The article describes the case as part of the broader law enforcement response to the Conti ransomware operation and related cybercrime groups.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-and-admitted-conduct\"\u003eAlleged and Admitted Conduct\u003c/h2\u003e\n\n\u003cp\u003eAccording to prosecutors, Lytvynenko and his co-conspirators deployed Conti ransomware on victim networks in the United States and abroad. The attacks involved stealing data and encrypting devices to extort ransom payments in Bitcoin.\u003c/p\u003e\n\n\u003cp\u003eThe Department of Justice said Lytvynenko admitted that he joined the Conti conspiracy in approximately September 2021. He also admitted to possessing data stolen from eight U.S. victims and four overseas victims.\u003c/p\u003e\n\n\u003cp\u003eLytvynenko further admitted that he joined a team run by another Conti conspirator. In that role, he worked on coding a “loader,” which the article describes as a type of malware used to load software needed to carry out attacks.\u003c/p\u003e\n\n\u003ch2 id=\"technical-detail\"\u003eTechnical Detail\u003c/h2\u003e\n\n\u003cp\u003eThe main technical detail disclosed in the article is Lytvynenko’s work on a malware loader. The loader was used to load software required to carry out attacks. The article does not provide code-level detail, specific loader names, or details about the systems affected by the loader.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Conti ransomware attacks involved two core pressure tactics:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStealing data from victim networks.\u003c/li\u003e\n\u003cli\u003eEncrypting devices to extort Bitcoin ransom payments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"scale-and-impact-of-conti\"\u003eScale and Impact of Conti\u003c/h2\u003e\n\n\u003cp\u003eThe Conti ransomware operation was described as one of the most prolific cybercrime groups active at the time. It targeted hospitals, businesses, schools, and government agencies worldwide.\u003c/p\u003e\n\n\u003cp\u003eCourt documents cited in the article state that Conti targeted more than 1,000 victims worldwide. The same documents state that the group collected more than $150 million in ransom payments.\u003c/p\u003e\n\n\u003cp\u003eThe victims specifically linked to Lytvynenko’s admitted possession of stolen data included eight U.S. victims and four overseas victims. The article does not name those victims.\u003c/p\u003e\n\n\u003ch2 id=\"background-on-the-conti-operation\"\u003eBackground on the Conti Operation\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Conti ransomware gang emerged from the Ryuk cybercrime group. It was also closely tied to the TrickBot malware syndicate.\u003c/p\u003e\n\n\u003cp\u003eConti became notorious for large-scale attacks against healthcare organizations, governments, and enterprises. The group shut down in 2022 after its internal chats were leaked and law enforcement pressure increased.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers believe former Conti members later splintered into several other ransomware or extortion groups. The article lists BlackCat, Black Basta, ZEON, Hive, Quantum, BlackByte, Karakurt, and the Silent Ransom Group.\u003c/p\u003e\n\n\u003ch2 id=\"related-law-enforcement-actions\"\u003eRelated Law Enforcement Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that in September 2023, the United States and the United Kingdom sanctioned and charged nine Russian nationals associated with the TrickBot and Conti ransomware cybercrime operations. Those actions were connected to attacks against more than 900 victims worldwide.\u003c/p\u003e\n\n\u003cp\u003eLytvynenko’s case follows his extradition from Ireland to the United States. His guilty plea adds to the legal actions described in the article involving individuals associated with the Conti and TrickBot ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eOleksii Oleksiyovych Lytvynenko pleaded guilty to conspiracy to commit wire fraud for his role in Conti ransomware attacks.\u003c/li\u003e\n\u003cli\u003eProsecutors said the attacks involved stolen data, encrypted systems, and Bitcoin ransom demands.\u003c/li\u003e\n\u003cli\u003eLytvynenko admitted to joining Conti around September 2021 and possessing data stolen from eight U.S. victims and four overseas victims.\u003c/li\u003e\n\u003cli\u003eHe also admitted to working on a malware loader used to load software needed for attacks.\u003c/li\u003e\n\u003cli\u003eCourt documents state that Conti targeted more than 1,000 victims worldwide and collected over $150 million in ransom payments.\u003c/li\u003e\n\u003cli\u003eLytvynenko faces a maximum sentence of 20 years in prison.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Ukrainian national Oleksii Oleksiyovych Lytvynenko pleaded guilty in the United States to conspiracy to commit wire fraud for his role in Conti ransomware attacks conducted between 2021 and 2022.","Prosecutors said Lytvynenko and co-conspirators deployed Conti ransomware on victim networks in the United States and abroad, stealing data and encrypting devices to extort Bitcoin ransom payments.","Lytvynenko admitted to joining the Conti conspiracy around September 2021, possessing data stolen from eight U.S. victims and four overseas victims, and working on a malware loader for the operation.","Court documents state that the Conti ransomware operation targeted more than 1,000 victims worldwide and collected over $150 million in ransom payments.","Lytvynenko was extradited from Ireland to the United States after his July 2023 arrest and now faces a maximum sentence of 20 years in prison."],"insights":["Lytvynenko’s admitted work on a malware loader shows that law enforcement is pursuing not only ransomware deployers but also developers of supporting tooling used in ransomware operations.","The case highlights the international reach of U.S. ransomware prosecutions, with a Ukrainian national arrested in Ireland, extradited to the United States, and prosecuted for victims in the United States and abroad.","The Conti ecosystem continued to matter after the group shut down in 2022, as researchers linked former members to multiple later ransomware and extortion groups including BlackCat, Black Basta, Hive, Karakurt, and Silent Ransom Group.","The article shows that leaked internal chats and increased law enforcement pressure were significant enough to contribute to the shutdown of one of the most prolific ransomware operations of its time."],"referencedReports":[],"body":"\u003cp\u003eUkrainian national Oleksii Oleksiyovych Lytvynenko pleaded guilty in the United States to conspiracy to commit wire fraud for his role in the Conti ransomware operation. The U.S. Department of Justice said the activity occurred between 2021 and 2022. Lytvynenko was extradited from Ireland to the United States after his arrest in July 2023.\u003c/p\u003e\n\n\u003cp\u003eAccording to prosecutors, Lytvynenko and co-conspirators deployed Conti ransomware on victim networks in the United States and abroad. The attacks involved stealing data, encrypting devices, and extorting Bitcoin ransom payments. Lytvynenko admitted to possessing data stolen from eight U.S. victims and four overseas victims.\u003c/p\u003e\n\n\u003cp\u003eThe case is significant because court documents state that Conti targeted more than 1,000 victims worldwide and collected over $150 million in ransom payments. Lytvynenko also admitted to working on a malware “loader” used to load software needed to carry out attacks. He now faces a maximum sentence of 20 years in prison.\u003c/p\u003e\n"},{"n":3,"title":"Microsoft fixes Windows update failures linked to WUSA installer","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-windows-update-failures-linked-to-wusa-installer/","time":"11:44","priority":"MAY READ","score":72,"tldr":"Microsoft fixed a Windows 11 24H2/25H2 and Windows Server 2025 issue that caused updates to fail when installed with WUSA from network shares containing multiple .msu files. The fix is included in the June 2026 cumulative updates, with a workaround of copying .msu files locally for older updates.","briefOverview":"\u003cp\u003eMicrosoft has fixed a known issue that caused Windows updates released since May 2025 to fail when installed through the Windows Update Standalone Installer, or WUSA, from a network share. The problem affected Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks. Microsoft said WUSA is not a common update installation method on home devices.\u003c/p\u003e\n\n\u003cp\u003eThe failure could occur when an update was installed using WUSA or by double-clicking a .msu file from a network share containing multiple .msu files. Microsoft said the issue produced ERROR_BAD_PATHNAME and did not occur with a single .msu file or when the files were stored locally. The company addressed the issue in the June 2026 cumulative updates for Windows 11 and Windows Server 2025.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said users running updates released before the fix can work around the problem by saving .msu files locally before installing them. The company also advised waiting at least 15 minutes after restarting Windows before checking Update History following a WUSA-based .msu installation. The article places this fix alongside other recent Microsoft update installation issues affecting enterprise customers and upgraded Windows devices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft fixed a known issue that caused Windows updates released since May 2025 to fail when installed via the Windows Update Standalone Installer, known as WUSA, from a network share. WUSA is a built-in Windows command-line tool that uses the Windows Update Agent API to install or uninstall Microsoft Standalone Update files. The issue affected Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the bug could cause failures with ERROR_BAD_PATHNAME when an update was installed using WUSA or by double-clicking a .msu file from a network share containing multiple .msu files. The company noted that the issue does not occur with a single .msu file or when the files are stored locally. Microsoft previously acknowledged the issue in August 2025 and said it could occur on devices that installed updates released May 28, 2025, and later.\u003c/p\u003e\n\n\u003cp\u003eThe company first mitigated the issue automatically on home and non-managed business devices through a Known Issue Rollback Group Policy beginning in September 2025. As part of the June 2026 Patch Tuesday release, Microsoft addressed the issue for all affected systems. The fixes were included in cumulative updates KB5079391 for Windows 11 and KB5094125 for Windows Server 2025.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft advised users still using updates released before the fix to work around the problem by saving .msu files locally on the device before installing them. It also said that after restarting Windows following an .msu installation via WUSA, users should wait at least 15 minutes before checking the Update History page in Settings. Microsoft said this delay should allow the Settings app to properly show whether the update installed successfully.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes several other Microsoft update installation problems from 2025 and 2026. Microsoft resolved an April 2025 issue that prevented some enterprise customers from installing April 2025 security updates via Windows Server Update Services, and later fixed a similar issue causing August 2025 Windows 11 updates to fail with 0x80240069 errors. Microsoft also warned that some devices upgraded to Windows 11 24H2 or 25H2 may have issues installing the latest monthly updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft fixed a known issue that caused Windows updates released since May 2025 to fail when installed through the Windows Update Standalone Installer, or WUSA, from a network share. The affected platforms were Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks. The article notes that WUSA is not a common method for installing updates on home devices.\u003c/p\u003e\n\n\u003cp\u003eThe issue was addressed as part of the June 2026 Patch Tuesday cumulative updates. Microsoft released fixes for Windows 11 in KB5079391 and for Windows Server 2025 in KB5094125.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eWUSA is described as a built-in Windows command-line tool that helps administrators install and uninstall Microsoft Standalone Update files. These files use the .msu format and are installed or removed through the Windows Update Agent API.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the failures could occur when an update was installed using WUSA or when a user double-clicked a .msu file from a network share. The failure condition involved a network share that contained multiple .msu files. The error associated with the issue was ERROR_BAD_PATHNAME.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also stated two conditions where the bug does not occur:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe issue does not occur with a single .msu file.\u003c/li\u003e\n\u003cli\u003eThe issue does not occur when the files are stored locally.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-systems\"\u003eAffected Systems\u003c/h2\u003e\n\n\u003cp\u003eThe issue affected:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 24H2\u003c/li\u003e\n\u003cli\u003eWindows 11 25H2\u003c/li\u003e\n\u003cli\u003eWindows Server 2025\u003c/li\u003e\n\u003cli\u003eEnterprise network environments using WUSA from network shares\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said the problem could occur on devices that installed updates released May 28, 2025, identified in the article as KB5058499, and later.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft’s Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft acknowledged the issue in August 2025. Beginning in September 2025, the company mitigated it automatically on home and non-managed business devices through a Known Issue Rollback Group Policy.\u003c/p\u003e\n\n\u003cp\u003eThe broader fix arrived in the June 2026 cumulative updates. Microsoft said the issue was addressed for all affected systems through KB5079391 for Windows 11 and KB5094125 for Windows Server 2025.\u003c/p\u003e\n\n\u003ch2 id=\"workarounds-and-administrative-guidance\"\u003eWorkarounds and Administrative Guidance\u003c/h2\u003e\n\n\u003cp\u003eFor users running updates released before the June 2026 fix, Microsoft said the issue can be worked around by saving the .msu files locally on the device and installing the update from that local location. This guidance aligns with Microsoft’s statement that the bug does not occur when the files are stored locally.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also provided guidance for checking update status after using WUSA. If Windows has been restarted after installing an .msu file via WUSA, Microsoft advised waiting 15 minutes or more before checking the Update History page in Settings. After that delay, the Settings app should properly indicate whether the update installed successfully.\u003c/p\u003e\n\n\u003ch2 id=\"related-windows-update-issues-mentioned\"\u003eRelated Windows Update Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article places this WUSA fix in the context of other recent Microsoft update installation problems. Microsoft resolved an issue in April 2025 that prevented enterprise customers from installing the April 2025 security updates through Windows Server Update Services. The article also mentions an identical bug that caused August 2025 Windows 11 updates to fail with 0x80240069 errors.\u003c/p\u003e\n\n\u003cp\u003eIn addition, Microsoft warned earlier in the week that some Windows devices upgraded to Windows 11 24H2 or 25H2 may have issues installing the latest monthly updates.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-impact\"\u003eActors and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify any threat actors or malicious activity connected to this issue. The impact described is update installation failure in affected enterprise environments using WUSA from network shares containing multiple .msu files. Microsoft’s response consisted of an earlier Known Issue Rollback mitigation and later cumulative update fixes for all affected systems.\u003c/p\u003e\n","keyPoints":["Microsoft fixed a known issue that caused Windows updates released since May 2025 to fail when installed via the Windows Update Standalone Installer from a network share.","The issue affects Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks, and it does not occur with a single .msu file or when the files are stored locally.","Microsoft said the failures could occur with ERROR_BAD_PATHNAME when WUSA or double-clicking a .msu file is used from a network share containing multiple .msu files.","Microsoft addressed the issue for all affected systems in the June 2026 cumulative updates KB5079391 for Windows 11 and KB5094125 for Windows Server 2025.","Microsoft advised users of older updates to work around the issue by saving the .msu files locally on the device and installing the update from that location."],"insights":["Administrators can avoid the WUSA failure on affected older builds by copying .msu files from the network share to the local device before installation.","The failure scenario is narrow: it occurs when installing from a network share containing multiple .msu files, but Microsoft says it does not occur with a single .msu file or locally stored files.","After installing an .msu file via WUSA and restarting Windows, administrators should wait at least 1
