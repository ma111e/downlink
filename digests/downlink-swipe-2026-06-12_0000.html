act\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability can allow an attacker to log in as any user, including administrators. Administrator access could allow attackers to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eView all private messages stored on the forum.\u003c/li\u003e\n\u003cli\u003eCreate, modify, or delete content.\u003c/li\u003e\n\u003cli\u003eCreate, modify, or delete user accounts.\u003c/li\u003e\n\u003cli\u003eImpersonate staff.\u003c/li\u003e\n\u003cli\u003eDeface sites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAikido said remote code execution is not possible because the Admin Control Panel has a separate password check.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and mitigation\u003c/h2\u003e\n\n\u003cp\u003ephpBB released version 3.3.17 to address the issue in the 3.x branch. Aikido recommended immediate upgrades for affected installations.\u003c/p\u003e\n\n\u003cp\u003eAikido withheld technical details for the time being to give forum administrators time to apply security updates. The researchers also directly contacted administrators of large phpBB-based forums to alert them.\u003c/p\u003e\n\n\u003ch2 id=\"update-caveat\"\u003eUpdate caveat\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the update may cause forums using OAuth authentication to break. This is because the OAuth redirect handler has moved to a new location.\u003c/p\u003e\n\n\u003cp\u003eThe article says this should be a simple fix in most cases.\u003c/p\u003e\n\n\u003ch2 id=\"pending-details\"\u003ePending details\u003c/h2\u003e\n\n\u003cp\u003eAikido said it will publish full details of the flaw in a future report. The article does not provide a specific timeline for that disclosure.\u003c/p\u003e\n","keyPoints":["A 10-year-old authentication bypass vulnerability in phpBB allows an attacker to log in as any user, including administrators, with a single HTTP request.","The flaw impacts phpBB versions 3.3.16 and below and 4.0.0-a2, with phpBB fixing the issue in version 3.3.17 for the 3.x branch.","Aikido discovered the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program, and phpBB addressed it on June 6.","Aikido said the vulnerability is exploitable in the default configuration and requires no special knowledge.","Aikido withheld technical details to give forum administrators time to update and said full details will be published in a future report."],"insights":["Forum administrators should prioritize patching even if they use default phpBB settings, because Aikido says the bug requires no special configuration and no special knowledge to exploit.","phpBB 4.x users have no safe fixed release yet, so Aikido recommends upgrading to master rather than relying on an official 4.x patch.","The public-by-default member list on phpBB forums makes it easier for attackers to identify specific accounts to target for impersonation.","The 3.3.17 update may break forums using OAuth authentication because the OAuth redirect handler moved to a new location, so administrators should verify OAuth login flows after upgrading.","Administrator account takeover is serious even without remote code execution, because it can expose private messages and enable content, account, staff impersonation, or defacement actions."],"referencedReports":[{"title":"phpBB Authentication Bypass RCE","url":"https://www.aikido.dev/blog/phpbb-authentication-bypass-rce","publisher":"Aikido","context":"The article cites Aikido's report describing the phpBB authentication bypass vulnerability, its default exploitability, and upgrade guidance.","category":"","primary":false},{"title":"phpBB 3.3.17 Release","url":"https://www.phpbb.com/community/viewtopic.php?t=2672170","publisher":"phpBB","context":"The article links to phpBB's version 3.3.17 release where the authentication bypass issue was addressed.","category":"","primary":false}],"body":"\u003cp\u003ephpBB fixed a 10-year-old authentication bypass vulnerability that could allow an attacker to log in as any user, including administrators. The flaw has no identifier and is described as trivial to exploit with a single HTTP request. It affects phpBB 3.3.16 and below, as well as 4.0.0-a2.\u003c/p\u003e\n\n\u003cp\u003eAikido discovered the bug on June 2 and reported it through phpBB’s HackerOne Vulnerability Disclosure Program. phpBB responded immediately and addressed the issue on June 6 in phpBB 3.3.17. Aikido said the flaw was introduced into the codebase 10 years ago and affects all versions of the 3.x and 4.x release branches up to the affected versions.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is exploitable in the default configuration and requires no special knowledge, according to Aikido. Administrator access could expose private messages, allow content or account changes, enable staff impersonation, or lead to site defacement. Aikido said remote code execution is not possible because the Admin Control Panel is protected by a separate password check.\u003c/p\u003e\n"},{"n":25,"title":"Borrowed Trust – Systematic Exploitation of Abandoned Cloud DNS Delegations to serve Thai Gambling SEO Content","source":"cyble.com","sourceColorIdx":0,"link":"https://cyble.com/blog/borrowed-trust-cloud-dns-takeover-thai-gambling-seo-poisoning/","time":"05:36","priority":"SHOULD READ","score":88,"tldr":"Cyble found a large SEO poisoning campaign abusing abandoned cloud DNS delegations, mainly Azure DNS zones, to host Thai gambling pages under trusted enterprise subdomains. The key takeaway is that stale NS delegations can let attackers reclaim orphaned zones, obtain valid TLS certificates, and silently exploit an organization’s domain reputation without breaching its systems.","briefOverview":"\u003cp\u003eCyble Research \u0026amp; Intelligence Labs identified an active SEO poisoning campaign that exploited abandoned cloud DNS zone delegations to serve Thai-language gambling content under trusted enterprise domains. The campaign affected 163 organizations across more than 30 countries, including federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities. At publication time, Cyble said 161 organizations remained actively compromised.\u003c/p\u003e\n\n\u003cp\u003eThe main mechanism was Azure DNS zone takeover, where NS delegations to deleted or abandoned Azure DNS zones remained in parent DNS zones. The actor claimed orphaned zones under a new Azure subscription, added wildcard records, and obtained valid Let’s Encrypt wildcard TLS certificates, allowing gambling pages to resolve cleanly under victim domains. Cyble also observed DigitalOcean DNS zone takeovers, direct wildcard misconfigurations, and per-subdomain A records.\u003c/p\u003e\n\n\u003cp\u003eThe campaign used three OVH delivery IPs and a separate 103-node backend fleet in Hong Kong under AS398478. The gambling kit was a Thai-language Next.js application with affiliate redirects, geographic filtering for Thai traffic, and campaign fingerprints including a shared Next.js build ID and favicon path. Cyble recommended DNS delegation audits, Certificate Transparency monitoring, wildcard DNS testing, certificate revocation, and removal of stale NS or wildcard records.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyble Research \u0026amp; Intelligence Labs reported an active SEO poisoning campaign that used abandoned cloud DNS delegations to host Thai-language gambling content under reputable enterprise domains. The investigation began with anomalous DNS resolution on cardsforheroes.verizon.com, where Cyble found more than 1,000 individually named gambling-keyword subdomains pointing to a single OVH IP. Pivoting from that endpoint exposed 162 additional compromised organizations, bringing the confirmed total to 163 across more than 30 countries.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies Azure DNS zone takeover as the dominant mechanism, affecting more than 150 organizations. In this pattern, victim organizations left NS delegations in parent DNS zones after cloud infrastructure had been decommissioned, allowing the actor to claim abandoned Azure DNS zones and create wildcard records. Cyble said actor-issued Let’s Encrypt certificates clustered in April 2026, and some victim subdomains had been dormant for years before being abused.\u003c/p\u003e\n\n\u003cp\u003eCyble also documented other DNS compromise mechanisms. Two organizations were affected through DigitalOcean DNS zone takeover, two through direct wildcard misconfiguration in organizational DNS, and Verizon’s environment involved more than 1,000 individually created A records rather than a wildcard. The Verizon case implied either automated DNS API access or compromised DNS management credentials that enabled bulk record creation.\u003c/p\u003e\n\n\u003cp\u003eThe infrastructure included three OVH delivery nodes at 51.79.199.51, 139.99.82.106, and 38.127.8.49, which served the same gambling kit across victim domains. A JARM pivot led Cyble to a Hong Kong backend fleet of 103 nodes in AS398478 across seven /24 subnets within 38.173.0.0/16. Cyble tied the backend fleet together using shared evidence such as an identical HTTP body MD5, a common broker-xm.com Let’s Encrypt certificate, uniform Envoy and MySQL fingerprints, and BT-Panel certificate details.\u003c/p\u003e\n\n\u003cp\u003eThe delivered content was a Thai-language Next.js gambling application with valid TLS certificates matching the victim subdomains, AMP alternate links, Schema.org FAQ data, and static assets served under compromised domains. Redirects used affiliate codes including ibiza99vip1, bigwinv1, link99, and seven77vip1, while a server-side layer verified Thai referrers before redirecting users. Cyble described the operation as monetized through both publisher-level and per-registration affiliate tracking.\u003c/p\u003e\n\n\u003cp\u003eFor detection and remediation, Cyble emphasized DNS-layer controls because the campaign used trusted domains, valid certificates, clean IP reputations, and no malware delivery. Recommended actions included monitoring Certificate Transparency logs for unexpected wildcard certificates, auditing NS delegations to cloud providers, testing random hostnames under delegated zones, removing stale NS delegations, reporting abandoned Azure zones to Microsoft MSRC, requesting Let’s Encrypt certificate revocation, and removing unauthorized wildcard A records.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCyble Research \u0026amp; Intelligence Labs described an active SEO poisoning campaign that exploited abandoned cloud DNS zone delegations to serve Thai-language gambling content under the domain authority of reputable organizations. The campaign compromised 163 organizations across more than 30 countries. The affected set included federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities.\u003c/p\u003e\n\n\u003cp\u003eThe report states that 161 organizations remained actively compromised at the time of publication. Cyble characterized the operation as a structured affiliate monetization campaign rather than defacement or malware delivery. The actor used trusted enterprise domains, valid TLS certificates, and clean infrastructure reputation to make gambling pages appear as legitimate enterprise web properties to browsers, search engines, and Thai users following search results.\u003c/p\u003e\n\n\u003ch2 id=\"initial-discovery\"\u003eInitial Discovery\u003c/h2\u003e\n\n\u003cp\u003eThe investigation began during an ongoing vulnerability assessment, when Cyble identified anomalous DNS resolution in the cardsforheroes.verizon.com subdomain environment. What first appeared to be a single misconfigured endpoint expanded into more than 1,000 individually named subdomains. Each subdomain followed a gambling brand keyword pattern with URL-encoded Thai characters.\u003c/p\u003e\n\n\u003cp\u003eAll of those Verizon-related endpoints resolved to 51.79.199.51 at OVH SAS, AS16276. Loading a representative endpoint showed a fully rendered Next.js gambling application with outbound affiliate redirect links. Cyble then matched the structure to many other enterprise subdomains and used the shared page fingerprint to expand the confirmed victim set.\u003c/p\u003e\n\n\u003ch2 id=\"core-vulnerability-class\"\u003eCore Vulnerability Class\u003c/h2\u003e\n\n\u003cp\u003eThe report focuses on a DNS misconfiguration class caused by cloud infrastructure decommissioning. During normal cloud provisioning, an enterprise may delegate a subdomain to Azure DNS by placing NS records in the parent zone that point to Microsoft nameservers. When the cloud resources are later deleted, the parent-zone NS delegation is often left behind.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cyble, this creates an exploitable condition when the Azure DNS zone can be claimed by a new subscriber. A third party can recreate the abandoned zone name under a fresh Azure subscription and inherit DNS authority because the victim’s parent domain still delegates to Azure nameservers. Cyble said some delegations in this campaign had been left in place for more than six years.\u003c/p\u003e\n\n\u003ch2 id=\"dns-compromise-mechanisms\"\u003eDNS Compromise Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eCyble identified four DNS compromise mechanisms across the victim set.\u003c/p\u003e\n\n\u003ch3 id=\"azure-dns-zone-takeover\"\u003eAzure DNS Zone Takeover\u003c/h3\u003e\n\n\u003cp\u003eAzure DNS zone takeover accounted for more than 150 organizations. The actor identified subdomains whose NS records still pointed to Azure DNS nameservers after the original subscription or zone had been canceled or abandoned. The actor then created the zone in a new Azure subscription, added a wildcard A record, and used ACME HTTP-01 validation to obtain a Let’s Encrypt wildcard certificate.\u003c/p\u003e\n\n\u003cp\u003eCyble cited direct authoritative DNS evidence from Microsoft nameserver infrastructure showing the actor’s wildcard A records. The report also noted zone SOA serials of 1 on confirmed victims, which Cyble said indicated zones created from scratch by the actor. Certificate Transparency logs showed long dormancy gaps for some victims, including a major pharmaceutical company’s pilot subdomain and a global electronics company’s IoT platform.\u003c/p\u003e\n\n\u003ch3 id=\"digitalocean-dns-zone-takeover\"\u003eDigitalOcean DNS Zone Takeover\u003c/h3\u003e\n\n\u003cp\u003eTwo organizations were affected through DigitalOcean DNS zone takeover. These were described as a United States luxury furniture retailer and an Indian university. Their compromised subdomains were delegated to DigitalOcean nameservers and carried wildcard records resolving to 38.127.8.49.\u003c/p\u003e\n\n\u003ch3 id=\"direct-wildcard-misconfiguration\"\u003eDirect Wildcard Misconfiguration\u003c/h3\u003e\n\n\u003cp\u003eTwo organizations were affected through direct wildcard misconfiguration. Cyble described them as a United States energy company’s development subdomain and a mobile payments platform’s development subdomain. Both resolved via wildcard to 139.99.82.106 and used their own organizational nameservers rather than cloud DNS delegation.\u003c/p\u003e\n\n\u003cp\u003eCyble said the records appeared to come from within the parent zones. The report stated this indicated either an orphaned wildcard A record left in the organization’s DNS console during decommissioning or a direct DNS management access path used by the actor.\u003c/p\u003e\n\n\u003ch3 id=\"per-subdomain-a-records\"\u003ePer-Subdomain A Records\u003c/h3\u003e\n\n\u003cp\u003eThe Verizon environment used more than 1,000 individually named A records instead of a single wildcard. Each gambling-keyword subdomain pointed to 51.79.199.51. Cyble said this implied either an automated DNS API script with zone-write access or a compromised DNS management credential that enabled bulk record creation.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-infrastructure\"\u003eDelivery Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eCyble identified three OVH delivery IPs used across the campaign:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e51.79.199.51, described as the primary delivery node.\u003c/li\u003e\n\u003cli\u003e139.99.82.106, described as a secondary delivery node.\u003c/li\u003e\n\u003cli\u003e38.127.8.49, described as a tertiary delivery node.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe three OVH nodes served the same gambling kit across overlapping and distinct victim sets. Cyble said they accounted for the full 163-organization victim estate. The report noted that the IPs had clean reputations and standard surface deployment signatures.\u003c/p\u003e\n\n\u003cp\u003eThe first major pivot came from 51.79.199.51. Cyble used passive DNS and page fingerprint matching to find more than 90 enterprise subdomains serving identical content. The shared indicators included the Next.js build ID QQOrXCFjoI6C9oF-4YVhl, the favicon path /img/ib99-hq.ico, and outbound affiliate redirects to the same three destination domains.\u003c/p\u003e\n\n\u003ch2 id=\"backend-infrastructure\"\u003eBackend Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eA JARM TLS fingerprinting pivot from the delivery layer led Cyble to 38.173.56.218 in Hong Kong, within AS398478, PEG TECH INC. This host presented a ThinkPHP application framework error on port 443, a Chinese server management panel certificate identity on port 21, and MySQL 5.7.44-log on port 3306. Cyble described this as the point that exposed the backend infrastructure.\u003c/p\u003e\n\n\u003cp\u003ePivoting on a Let’s Encrypt certificate issued to broker-xm.com revealed 103 IPs across seven contiguous /24 subnets in 38.173.0.0/16. These were all within AS398478. Cyble described the backend as a 103-node fleet in Hong Kong.\u003c/p\u003e\n\n\u003cp\u003eCyble listed multiple evidence points tying the backend fleet together, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIdentical HTTP body MD5 hash 7df3d7cf3358af3f470ac7229387ef94 across all 103 nodes on port 80.\u003c/li\u003e\n\u003cli\u003eA shared broker-xm.com Let’s Encrypt certificate across all 103 servers.\u003c/li\u003e\n\u003cli\u003eIdentical Envoy proxy 503 error strings on port 443.\u003c/li\u003e\n\u003cli\u003eUniform MySQL 5.7.44-log with binary replication logging enabled.\u003c/li\u003e\n\u003cli\u003eBT-Panel provisioning details using admin@bt.cn and Dongguan, Guangdong, on FTP certificates.\u003c/li\u003e\n\u003cli\u003eA uniform JARM fingerprint across the fleet.\u003c/li\u003e\n\u003cli\u003eNo PTR records on any of the 103 IPs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"gambling-kit-and-seo-content\"\u003eGambling Kit and SEO Content\u003c/h2\u003e\n\n\u003cp\u003eThe compromised enterprise subdomains served a Thai-language Next.js gambling application. Cyble said an HTTP request with Thai locale headers returned a fully rendered page while using the victim’s domain as if it were a legitimate enterprise web property. The pages used valid Let’s Encrypt wildcard TLS certificates matching the victim subdomains.\u003c/p\u003e\n\n\u003cp\u003eThe kit included several SEO-oriented and conversion-oriented features:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003elang=\u0026ldquo;th\u0026rdquo; Thai-language page attributes.\u003c/li\u003e\n\u003cli\u003eThai-language gambling branding.\u003c/li\u003e\n\u003cli\u003eSchema.org FAQ structured data about minimum deposits, withdrawal timelines, and mobile compatibility.\u003c/li\u003e\n\u003cli\u003eAMP alternate links for Google mobile indexing coverage.\u003c/li\u003e\n\u003cli\u003eStatic assets served from paths under the compromised domain.\u003c/li\u003e\n\u003cli\u003eA 1 Thai Baht minimum deposit, approximately $0.03 USD.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCyble said the kit fingerprint was consistent across the full victim estate, regardless of the victim domain or OVH node serving the content. The report described this consistency as evidence of centralized build and deployment by a single operator.\u003c/p\u003e\n\n\u003ch2 id=\"affiliate-monetization\"\u003eAffiliate Monetization\u003c/h2\u003e\n\n\u003cp\u003eEvery destination redirect contained an affiliate parameter using codes such as ibiza99vip1, bigwinv1, link99, or seven77vip1. Cyble said these codes attributed completed registrations to the actor and triggered commission payouts from destination gambling platforms.\u003c/p\u003e\n\n\u003cp\u003eThe report also described a server-side filtering layer. A POST request at a live endpoint returned a response including “TH - Referrer verified” and a referrer value of link99 before redirecting. Cyble said the backend validated geographic origin server-side and did not redirect requests from outside Thailand.\u003c/p\u003e\n\n\u003cp\u003eThe article identified link99 as a sub-affiliate publisher ID above the visible ?rc= tracking codes. Cyble said the actor earned through both publisher-level credit and per-registration payout codes, with campaign codes able to rotate while link99 persisted as the actor’s platform identity.\u003c/p\u003e\n\n\u003cp\u003eConfirmed destination platforms included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eibiza99.autos.\u003c/li\u003e\n\u003cli\u003ebig888.store.\u003c/li\u003e\n\u003cli\u003eseven77.click.\u003c/li\u003e\n\u003cli\u003estillsunday.pl.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCyble said the platforms were white-label deployments on a shared codebase, based on identical CSS hashes and JavaScript resilience logic across all three except big888.store. The report also noted that big888.store carried active Google Search Console verification. Each platform maintained its own appbox.* CDN subdomains.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-geography\"\u003eAffected Parties and Geography\u003c/h2\u003e\n\n\u003cp\u003eCyble reported 163 confirmed victim organizations across more than 30 countries. The article explicitly mentioned affected categories including federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities. Specific examples included the Verizon cardsforheroes.verizon.com environment, a United States luxury furniture retailer, an Indian university, a United States energy company, a mobile payments platform, a major pharmaceutical company, and a global electronics company.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targeted Thai-language gambling search traffic. Cyble said the backend used server-side geographic filtering to verify Thai referrers before issuing redirects. The backend fleet was located in Hong Kong within AS398478, and Cyble associated server management certificate details with Dongguan, Guangdong.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-hunting-guidance\"\u003eDetection and Hunting Guidance\u003c/h2\u003e\n\n\u003cp\u003eCyble said the campaign produced little signal in standard security controls because it used valid TLS certificates, clean IP reputations, trusted domain names, and no exploit delivery. The report emphasized DNS-layer detection.\u003c/p\u003e\n\n\u003cp\u003eCyble described Certificate Transparency monitoring as the most reliable early indicator. It said an unexpected Let’s Encrypt wildcard certificate on a corporate-owned subdomain, especially after a period of no issuance, was anomalous. According to the report, monitoring CT logs for such certificates would have detected every Azure takeover victim at certificate issuance.\u003c/p\u003e\n\n\u003cp\u003eCyble also recommended Azure DNS zone delegation auditing. Organizations should enumerate NS delegation records in parent DNS zones and verify that matching Azure DNS zones exist in subscriptions they own and actively manage. For active checks, Cyble recommended querying randomized nonsense hostnames under Azure-delegated subdomains; if such a hostname resolves, the zone should be treated as compromised until proven otherwise.\u003c/p\u003e\n\n\u003cp\u003eThe article listed detection indicators including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDNS answers resolving to 51.79.199.51, 139.99.82.106, or 38.127.8.49.\u003c/li\u003e\n\u003cli\u003eURL parameters containing rc=ibiza99vip1, rc=bigwinv1, rc=seven77vip1, or rc=link99.\u003c/li\u003e\n\u003cli\u003eHTTP requests to /img/ib99-hq.ico.\u003c/li\u003e\n\u003cli\u003eOutbound connections to seven backend CIDR ranges in 38.173.0.0/16.\u003c/li\u003e\n\u003cli\u003eHTTP body MD5 7df3d7cf3358af3f470ac7229387ef94.\u003c/li\u003e\n\u003cli\u003eTLS certificate common name broker-xm.com.\u003c/li\u003e\n\u003cli\u003eASN AS398478.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"remediation-guidance\"\u003eRemediation Guidance\u003c/h2\u003e\n\n\u003cp\u003eFor Azure DNS zone takeover victims, Cyble recommended removing the NS delegation from the parent DNS zone immediately. The report said this severs the attack chain regardless of what the actor maintains inside the Azure zone. Cyble also advised reporting the abandoned zone to Microsoft MSRC with the zone name and evidence, requesting revocation of Let’s Encrypt certificates using certificate serial numbers from crt.sh, and auditing environment-style subdomains such as dev, uat, staging, preprod, pilot, lab, test, and sandbox.\u003c/p\u003e\n\n\u003cp\u003eFor DigitalOcean zone takeover victims, Cyble recommended removing the NS delegation from the parent zone and verifying whether the DigitalOcean zone exists in an account the organization owns. For direct wildcard misconfiguration victims, Cyble recommended removing the wildcard A record from the DNS management console. If the origin of the record cannot be identified, Cyble advised treating the DNS management credential as compromised and rotating it immediately.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article mapped the campaign to multiple MITRE ATT\u0026amp;CK techniques, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1583.003 for acquiring infrastructure through OVH VPS delivery and PEG TECH INC backend infrastructure.\u003c/li\u003e\n\u003cli\u003eT1584 for compromise of infrastructure through Azure DNS zone takeover.\u003c/li\u003e\n\u003cli\u003eT1189 for drive-by compromise involving Thai users directed from organic search.\u003c/li\u003e\n\u003cli\u003eT1078 for valid accounts in the Verizon per-subdomain record creation scenario.\u003c/li\u003e\n\u003cli\u003eT1656 for impersonation through gambling content served under legitimate enterprise TLS certificates.\u003c/li\u003e\n\u003cli\u003eT1078.004 for cloud accounts used to claim abandoned DNS zones.\u003c/li\u003e\n\u003cli\u003eT1557 for server-side affiliate referrer verification.\u003c/li\u003e\n\u003cli\u003eT1567 for user registration data and financial transactions flowing to gambling platforms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eCyble provided delivery and backend infrastructure indicators, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e51.79.199.51.\u003c/li\u003e\n\u003cli\u003e139.99.82.106.\u003c/li\u003e\n\u003cli\u003e38.127.8.49.\u003c/li\u003e\n\u003cli\u003e38.173.30.0/24.\u003c/li\u003e\n\u003cli\u003e38.173.37.0/24.\u003c/li\u003e\n\u003cli\u003e38.173.56.0/24.\u003c/li\u003e\n\u003cli\u003e38.173.57.0/24.\u003c/li\u003e\n\u003cli\u003e38.173.235.0/24.\u003c/li\u003e\n\u003cli\u003e38.173.236.0/24.\u003c/li\u003e\n\u003cli\u003e38.173.239.0/24.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe report also listed certificate and fingerprint indicators such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ed9799ca2f08af6992dc80c49f9889fef40ed27c7.\u003c/li\u003e\n\u003cli\u003ebroker-xm.com.\u003c/li\u003e\n\u003cli\u003eJARM fingerprint 07d14d16d21d21d07c42d43d000000270a013a3e21e28897e76e8fe13e2f7d.\u003c/li\u003e\n\u003cli\u003eHTTP body MD5 7df3d7cf3358af3f470ac7229387ef94.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCampaign kit and affiliate indicators included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNext.js build ID QQOrXCFjoI6C9oF-4YVhl.\u003c/li\u003e\n\u003cli\u003e/img/ib99-hq.ico.\u003c/li\u003e\n\u003cli\u003emain.af42a497.css.\u003c/li\u003e\n\u003cli\u003epub-a4952b46ff9c4f6b8d5529cd21f9a1e3.r2.dev.\u003c/li\u003e\n\u003cli\u003eibiza99.autos.\u003c/li\u003e\n\u003cli\u003ebig888.store.\u003c/li\u003e\n\u003cli\u003eseven77.click.\u003c/li\u003e\n\u003cli\u003elink99.nova555.rest.\u003c/li\u003e\n\u003cli\u003eappbox.7y6texmeyy.com.\u003c/li\u003e\n\u003cli\u003eappbox.devh5api27.xyz.\u003c/li\u003e\n\u003cli\u003eappbox.55u4g5g4k2.com.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-significance\"\u003eMain Significance\u003c/h2\u003e\n\n\u003cp\u003eThe report’s central finding is that a single class of stale DNS delegation enabled a large-scale campaign across many unrelated organizations. Cyble emphasized that the actor did not need to breach application perimeters to exploit the victim domains. Instead, the actor claimed abandoned DNS zones or abused DNS records that organizations had left in place after decommissioning projects.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s effectiveness came from borrowed domain trust. The gambling pages inherited victim-domain reputation, valid TLS presentation, and search-engine authority. Cyble concluded that auditing cloud DNS delegations and monitoring unexpected certificate issuance are key controls for preventing and detecting this type of abuse.\u003c/p\u003e\n","keyPoints":["Cyble Research \u0026 Intelligence Labs identified an active SEO poisoning campaign that exploited abandoned cloud DNS zone delegations to serve Thai-language gambling content under the domain authority of 163 organizations across more than 30 countries.","The primary mechanism was Azure DNS zone takeover, where the actor claimed orphaned Azure DNS zones still delegated from victim parent domains, added wildcard A records, and obtained valid Let's Encrypt wildcard TLS certificates.","The campaign also used DigitalOcean DNS zone takeovers, direct wildcard DNS misconfigurations, and individually created A records, including more than 1,000 gambling-keyword subdomains under cardsforheroes.verizon.com.","Cyble linked the campaign to three OVH delivery IPs and a separate 103-node backend fleet in Hong Kong within AS398478, with shared fingerprints including a broker-xm.com certificate, a common JARM fingerprint, and an identical HTTP body MD5 hash.","The gambling kit used Thai-language Next.js pages, affiliate redirect codes such as ibiza99vip1, bigwinv1, link99, and seven77vip1, and server-side geographic filtering that verified Thai referrers before redirecting users."],"insights":["Certificate Transparency monitoring for unexpected Let's Encrypt wildcard certificates on corporate subdomains would have detected every Azure takeover victim at certificate issuance, especially after long periods with no certificate activity.","A randomized nonsense-hostname DNS query against an Azure-delegated subdomain is an actionable test for active compromise when it unexpectedly resolves, because the campaign relied on wildcard records under reclaimed zones.","Removing the stale NS delegation from the parent DNS zone immediately breaks an Azure DNS zone takeover even if the attacker still controls the recreated Azure zone.","The campaign generated little signal in conventional security tools because it used trusted victim domains, valid TLS certificates, clean IP reputations, and no malware or exploit delivery.","Some abandoned DNS delegations remained exploitable for more than six years, showing that decommissioned cloud projects can leave long-lived domain-authority exposure if DNS cleanup is not audited."],"referencedReports":[],"body":"\u003cp\u003eCyble Research \u0026amp; Intelligence Labs identified an active SEO poisoning campaign that exploited abandoned cloud DNS zone delegations to serve Thai-language gambling content under trusted enterprise domains. The campaign affected 163 organizations across more than 30 countries, including federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities. At publication time, Cyble said 161 organizations remained actively compromised.\u003c/p\u003e\n\n\u003cp\u003eThe main mechanism was Azure DNS zone takeover, where NS delegations to deleted or abandoned Azure DNS zones remained in parent DNS zones. The actor claimed orphaned zones under a new Azure subscription, added wildcard records, and obtained valid Let’s Encrypt wildcard TLS certificates, allowing gambling pages to resolve cleanly under victim domains. Cyble also observed DigitalOcean DNS zone takeovers, direct wildcard misconfigurations, and per-subdomain A records.\u003c/p\u003e\n\n\u003cp\u003eThe campaign used three OVH delivery IPs and a separate 103-node backend fleet in Hong Kong under AS398478. The gambling kit was a Thai-language Next.js application with affiliate redirects, geographic filtering for Thai traffic, and campaign fingerprints including a shared Next.js build ID and favicon path. Cyble recommended DNS delegation audits, Certificate Transparency monitoring, wildcard DNS testing, certificate revocation, and removal of stale NS or wildcard records.\u003c/p\u003e\n"},{"n":26,"title":"The Package That Never Shipped: Following a USPS Smishing Kit Through Censys DNS Data","source":"censys.com","sourceColorIdx":5,"link":"https://censys.com/blog/following-a-usps-smishing-kit-through-censys-dns-data/","time":"19:35","priority":"SHOULD READ","score":86,"tldr":"A USPS-themed smishing link led researchers to a larger phishing operation with hundreds of disposable domains, real-time card skimming, and a related UPS campaign hosted on Tencent Cloud. The most durable detection points are not the rotating domains or IPs but structural artifacts like asset paths, cookies, token formats, banner hashes, and Censys DNS history.","briefOverview":"\u003cp\u003eA USPS-themed smishing campaign delivered by SMS used the hostname \u003ccode\u003eusps.xupqnqz[.]one\u003c/code\u003e to impersonate a package-delivery issue. The site first showed a fake Cloudflare “Verify you are human” gate and then loaded a USPS-themed phishing application. Censys passive DNS data expanded that single lure into a broader infrastructure cluster with 682 unique lookalike hostnames as of the 2026-05-20 snapshot.\u003c/p\u003e\n\n\u003cp\u003eThe USPS kit did not merely imitate USPS visually; it served USPS’s own production HTML, CSS, fonts, and images from the phishing host under the \u003ccode\u003e/us_post_usps/\u003c/code\u003e path. It also included USPS’s live Google Analytics 4 tag, causing victim browsers to fire analytics hits into USPS’s marketing infrastructure. The article highlights \u003ccode\u003e/us_post_usps/\u003c/code\u003e, cookie names, token formats, banner hashes, and Censys DNS history as more durable detection signals than rotating domains and IPs.\u003c/p\u003e\n\n\u003cp\u003eThe kit captured victim payment data in real time by opening a WebSocket to its origin and streaming card input keystroke by keystroke. It also performed a server-side BIN lookup and pushed decisions such as retry, PIN prompt, OTP prompt, or kill-switch back into the victim’s browser. A banner-hash pivot identified a related UPS-themed campaign on Tencent-hosted infrastructure, using a Spring Boot backend and cookies containing the internal theme name \u003ccode\u003eus_post_ups\u003c/code\u003e.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article analyzes a live USPS-themed smishing campaign that began with an SMS link to \u003ccode\u003ehttps://usps.xupqnqz[.]one/uqjmw\u003c/code\u003e. The lure relied on the \u003ccode\u003eusps.\u003c/code\u003e subdomain label while the real registered domain was a random-looking \u003ccode\u003e.one\u003c/code\u003e domain. Visitors first encountered a fake Cloudflare security-check page designed to look like a routine human-verification interstitial.\u003c/p\u003e\n\n\u003cp\u003eThe lure hostname resolved to Tencent Cloud IP \u003ccode\u003e43.157.174.200\u003c/code\u003e, and Censys DNS history turned that single hostname into a wider infrastructure hunt. Censys showed roughly a hundred related hostnames on that IP and, across the confirmed cluster, 682 unique lookalike hostnames as of the 2026-05-20 snapshot. The observed hostname patterns included \u003ccode\u003eusps.xupq*[.]one\u003c/code\u003e, \u003ccode\u003einformed.deliwek*[.]shop\u003c/code\u003e, random \u003ccode\u003e*.life\u003c/code\u003e domains, and related \u003ccode\u003edeliwek*[.]shop\u003c/code\u003e names.\u003c/p\u003e\n\n\u003cp\u003eAfter the fake Cloudflare gate, the USPS kit issued a JSONP token shaped like \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e and set a \u003ccode\u003egfsessionid\u003c/code\u003e cookie associated in the article with GoFrame. It then loaded a Vue 3 single-page application titled \u003ccode\u003eWelcome | USPS\u003c/code\u003e. The kit served USPS production assets verbatim under \u003ccode\u003e/us_post_usps/\u003c/code\u003e, including USPS templates, CSS, images, fonts, and the USPS GA4 tag \u003ccode\u003eG-CSLL4ZEK4L\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe phishing application captured card data live rather than waiting for final form submission. The browser opened a WebSocket to \u003ccode\u003ewss://\u0026lt;host\u0026gt;/ws?token=\u0026lt;UUIDv4\u0026gt;\u003c/code\u003e and streamed form input character by character, while a parallel HTTP POST to \u003ccode\u003e/\u0026lt;random\u0026gt;/api/input\u003c/code\u003e also sent values. The backend performed a server-side BIN lookup and could send operator-controlled decisions back to the browser, including retry, PIN verification, email verification, OTP prompt, and a kill-switch that redirected victims to the real USPS site.\u003c/p\u003e\n\n\u003cp\u003eA pivot on an HTTP banner hash identified a related UPS-themed campaign with five hosts globally, spread across Tencent prefixes \u003ccode\u003e43.157.128.0/18\u003c/code\u003e and \u003ccode\u003e43.173.64.0/18\u003c/code\u003e. This UPS variant used a Spring Boot backend, a different fake Cloudflare gate, a redirect chain under \u003ccode\u003e/__theme/runtime/*\u003c/code\u003e, and cookies named \u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e and \u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e. The article states that the shared internal theme name, infrastructure, Caddy reverse proxy, and kit artifacts support the conclusion that the USPS and UPS campaigns belong to the same kit family and operator, while stopping short of attributing the activity to a named group.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a technical investigation of a live smishing campaign impersonating the United States Postal Service. The campaign arrived by SMS and directed victims to \u003ccode\u003ehttps://usps.xupqnqz[.]one/uqjmw\u003c/code\u003e, where the leftmost \u003ccode\u003eusps.\u003c/code\u003e subdomain label served as the main visual deception. The registered domain itself was a random-looking \u003ccode\u003e.one\u003c/code\u003e domain, not a USPS-owned domain.\u003c/p\u003e\n\n\u003cp\u003eThe investigation began with one lure hostname but expanded through Censys DNS data into a broader phishing infrastructure cluster. The article emphasizes that live DNS alone would miss much of the operation because many disposable hostnames no longer resolve. Censys passive DNS history preserved the prior resolutions and exposed the operator’s domain rotation.\u003c/p\u003e\n\n\u003ch2 id=\"initial-lure-and-fake-cloudflare-gate\"\u003eInitial Lure and Fake Cloudflare Gate\u003c/h2\u003e\n\n\u003cp\u003eThe first page shown to visitors was a fake Cloudflare “Security Check” page. It included familiar Cloudflare-like visual elements such as the orange shield, rounded checkbox, and a “Performance \u0026amp; security by Cloudflare” footer. The fake gate also included a twelve-language translation table and selected language based on \u003ccode\u003enavigator.language\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAfter the user clicked the fake checkbox, the page made a JSONP call to \u003ccode\u003e/eat?callback=jsonpCallback_\u0026lt;timestamp\u0026gt;\u003c/code\u003e. The endpoint returned a token in the format \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e, such as \u003ccode\u003evalid_20260521033009_cfe592644a1fdc56930624518ab3bcf7\u003c/code\u003e. It also set a \u003ccode\u003egfsessionid\u003c/code\u003e cookie, which the article identifies as the default cookie name of the GoFrame web framework.\u003c/p\u003e\n\n\u003ch2 id=\"censys-dns-expansion\"\u003eCensys DNS Expansion\u003c/h2\u003e\n\n\u003cp\u003eThe lure hostname resolved to \u003ccode\u003e43.157.174.200\u003c/code\u003e, a Tencent Cloud host in \u003ccode\u003e43.157.128.0/18\u003c/code\u003e under ASN 132203. Censys DNS history for that IP revealed roughly a hundred related hostnames. These hostnames followed two main themes: \u003ccode\u003eusps.xupq*.one\u003c/code\u003e and \u003ccode\u003einformed.deliwek*.shop\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAcross the confirmed cluster, Censys recorded 682 unique lookalike hostnames as of the 2026-05-20 snapshot. The article breaks these down as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e334 random bare \u003ccode\u003e*.life\u003c/code\u003e domains.\u003c/li\u003e\n\u003cli\u003e250 \u003ccode\u003einformed.deliwek*.shop\u003c/code\u003e hostnames impersonating USPS Informed Delivery.\u003c/li\u003e\n\u003cli\u003e78 \u003ccode\u003eusps.xupq*.one\u003c/code\u003e hostnames matching the USPS SMS lure pattern.\u003c/li\u003e\n\u003cli\u003e17 bare \u003ccode\u003edeliwek*.shop\u003c/code\u003e domains.\u003c/li\u003e\n\u003cli\u003e3 bare \u003ccode\u003exupq*.one\u003c/code\u003e domains.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that many of these hostnames no longer answer in live DNS. Their value comes from Censys’s historical resolution data, which preserved \u003ccode\u003efirst_seen\u003c/code\u003e and \u003ccode\u003elast_seen\u003c/code\u003e timestamps and allowed reconstruction of the operator’s rotation behavior.\u003c/p\u003e\n\n\u003ch2 id=\"usps-kit-behavior\"\u003eUSPS Kit Behavior\u003c/h2\u003e\n\n\u003cp\u003eOnce past the fake Cloudflare gate, the site loaded a Vue 3 single-page application titled \u003ccode\u003eWelcome | USPS\u003c/code\u003e. The article says the phishing site did not merely approximate USPS’s look and feel; it served USPS production HTML, CSS, fonts, and images from the phishing host. These files were served under the path prefix \u003ccode\u003e/us_post_usps/\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eA single victim session pulled 66 USPS-owned files totaling roughly 700 KB. The files included USPS \u003ccode\u003ehead.html\u003c/code\u003e, \u003ccode\u003eheader.html\u003c/code\u003e, \u003ccode\u003efooter.html\u003c/code\u003e, Bootstrap CSS, navigation icons, hero images, and Monotype web fonts. Because the kit served USPS’s real \u003ccode\u003ehead.html\u003c/code\u003e verbatim, it also served USPS’s live Google Analytics 4 property \u003ccode\u003eG-CSLL4ZEK4L\u003c/code\u003e and a Google AdServices conversion beacon pointed at \u003ccode\u003ehttps://www.usps.com/\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies \u003ccode\u003e/us_post_usps/\u003c/code\u003e as a strong detection seam because it does not exist on the real \u003ccode\u003eusps.com\u003c/code\u003e. Any browser fetching \u003ccode\u003e/us_post_usps/pages/head.html\u003c/code\u003e, according to the article, is on the phishing kit rather than legitimate USPS infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"real-time-card-skimming\"\u003eReal-Time Card Skimming\u003c/h2\u003e\n\n\u003cp\u003eThe USPS kit captured victim payment-card data in real time. The single-page application opened a WebSocket to \u003ccode\u003ewss://\u0026lt;host\u0026gt;/ws?token=\u0026lt;UUIDv4\u0026gt;\u003c/code\u003e and streamed input as the victim typed. The article states that this behavior was captured live across 279 WebSocket frames in seven sessions, not inferred only from source code.\u003c/p\u003e\n\n\u003cp\u003eThe WebSocket frames included events such as \u003ccode\u003einput_text\u003c/code\u003e for cardholder name, card number, expiry, and CVV. Intermediate input states, including typos and corrections, were transmitted to the operator. A parallel HTTP POST to \u003ccode\u003e/\u0026lt;random\u0026gt;/api/input\u003c/code\u003e also sent the same values, allowing collection even if the victim abandoned the form before final submission.\u003c/p\u003e\n\n\u003cp\u003eWhen the card form was submitted, the backend performed a server-side BIN lookup. It returned enriched card metadata such as bank, country, card scheme, type, and level. The response also included \u003ccode\u003ecardHistory\u003c/code\u003e, which the article notes is an array that stores every card the victim tried during the session.\u003c/p\u003e\n\n\u003cp\u003eThe backend could push routing decisions back to the victim browser over the same socket. The article lists decisions such as retry, PIN prompt, OTP prompt, and kill-switch. It also describes operator-controlled config fields including \u003ccode\u003eisBlock\u003c/code\u003e, which redirected the victim to the real \u003ccode\u003ewww.usps.com\u003c/code\u003e when enabled, and capture templates with Chinese internal labels while victim-facing strings were in English.\u003c/p\u003e\n\n\u003ch2 id=\"related-ups-campaign\"\u003eRelated UPS Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe investigation then pivoted from DNS to HTTP banner hashes. A query for the banner hash \u003ccode\u003e4fe8bec780537aa223406965415c1f85e83eec1f4e2181cf82e2a7b7516026e6\u003c/code\u003e with HTTP protocol returned exactly five hosts globally. These hosts were spread across Tencent prefixes \u003ccode\u003e43.157.128.0/18\u003c/code\u003e and \u003ccode\u003e43.173.64.0/18\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eVisiting those hosts revealed a UPS-themed campaign rather than USPS. The article calls this variant V2 and describes it as a sibling of the USPS kit family. It used a similar fake Cloudflare gate but differed in implementation.\u003c/p\u003e\n\n\u003cp\u003eKey UPS variant traits included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn English-only fake Cloudflare gate with \u003ccode\u003e\u0026lt;html lang=\u0026quot;zh-CN\u0026quot;\u0026gt;\u003c/code\u003e hard-coded.\u003c/li\u003e\n\u003cli\u003eA redirect chain beginning at \u003ccode\u003e/__theme/runtime/entry/verify\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA cross-domain handoff to \u003ccode\u003exupqrnn[.]one/us?__theme_site_ticket=\u0026lt;32hex\u0026gt;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eCookies named \u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e and \u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA UPS SPA whose favicon still pointed at \u003ccode\u003e/usps/images/logo_mobile.svg\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA Spring Boot backend that returned stock JSON 404 errors with \u003ccode\u003e+08:00\u003c/code\u003e timestamps.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article treats the cookie substring \u003ccode\u003eus_post_ups\u003c/code\u003e as an internal theme name leaked by the operator. It states that the name appears in two independent endpoints and has no business existing on real UPS or USPS infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"usps-and-ups-variant-comparison\"\u003eUSPS and UPS Variant Comparison\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes the two variants as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eV1 USPS used GoFrame and the \u003ccode\u003egfsessionid\u003c/code\u003e cookie.\u003c/li\u003e\n\u003cli\u003eV1 USPS used \u003ccode\u003e/eat\u003c/code\u003e JSONP and \u003ccode\u003evalid_\u0026lt;14 digits\u0026gt;_\u0026lt;32 hex\u0026gt;\u003c/code\u003e tokens.\u003c/li\u003e\n\u003cli\u003eV1 USPS served assets under \u003ccode\u003e/us_post_usps/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eV2 UPS used Spring Boot.\u003c/li\u003e\n\u003cli\u003eV2 UPS used \u003ccode\u003e/__theme/runtime/*\u003c/code\u003e redirect endpoints.\u003c/li\u003e\n\u003cli\u003eV2 UPS set \u003ccode\u003etheme_*_verify_us_post_ups\u003c/code\u003e cookies.\u003c/li\u003e\n\u003cli\u003eV2 UPS used \u003ccode\u003e/usps/*\u003c/code\u003e asset paths and retained a USPS-pathed favicon.\u003c/li\u003e\n\u003cli\u003eBoth variants were fronted by Caddy, with \u003ccode\u003eVia: 1.1 Caddy\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe confirmed cluster contained seven hosts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e43.157.174.200\u003c/code\u003e, V1 USPS, GoFrame, 306 Censys DNS names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.157.158.108\u003c/code\u003e, V1 USPS, GoFrame, zero DNS names in the cited snapshot but live evidence from a \u003ccode\u003eusps.xupq*.one\u003c/code\u003e name.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.157.151.131\u003c/code\u003e, V2 UPS, Spring Boot, 197 Censys DNS names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.157.148.168\u003c/code\u003e, V2 UPS, Spring Boot, 202 Censys DNS names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.173.100.171\u003c/code\u003e, V2 UPS, Spring Boot, 64 Censys DNS names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.173.104.156\u003c/code\u003e, V2 UPS, Spring Boot, 12 Censys DNS names.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e43.173.105.83\u003c/code\u003e, V2 UPS, Spring Boot, 32 Censys DNS names.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"infrastructure-and-geolocation-observations\"\u003eInfrastructure and Geolocation Observations\u003c/h2\u003e\n\n\u003cp\u003eAll HTTP-serving hosts shared a port-443 TLS banner hash and used \u003ccode\u003eVia: 1.1 Caddy\u003c/code\u003e. The article notes that the shared TLS hash is too common globally, with over a million hits, and is only useful when scoped to the Tencent ASN. Six of the seven hosts ran the same OpenSSH 8.9p1 build, but each host had a distinct SSH host key.\u003c/p\u003e\n\n\u003cp\u003eThe article states that identical golden-image clones would share host keys, but these hosts did not. As a result, SSH host-key pivoting was a dead end in this investigation. The hosts also carried stale SSH CVE exposure including regreSSHion, CVE-2024-6387, which the article frames as consistent with a spin-up, run-until-burned, abandon model.\u003c/p\u003e\n\n\u003cp\u003eGeolocation signals were inconsistent. The ASN owner was Tencent with country code CN, whois data referenced Singapore entities and addresses, Censys geolocation placed the \u003ccode\u003e43.157.x\u003c/code\u003e hosts in São Paulo and the \u003ccode\u003e43.173.x\u003c/code\u003e hosts in Santa Clara, and both backend stacks emitted \u003ccode\u003e+08:00\u003c/code\u003e timestamps. The article concludes only that these were VMs inside Tencent’s overseas cloud with servers configured to an \u003ccode\u003eAsia/Shanghai\u003c/code\u003e locale, not that the timestamps prove a physical operator location.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-position\"\u003eAttribution Position\u003c/h2\u003e\n\n\u003cp\u003eThe article says the observed behavior is consistent with the Chinese-language smishing-as-a-service ecosystem often labeled “Smishing Triad.” It cites supporting signals such as USPS and delivery-brand themes, a multilingual fake Cloudflare gate, Tencent and Singapore-hosting artifacts, Chinese internal labels with English victim-facing copy, and polished real-time card skimming with server-side BIN enrichment.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article explicitly avoids asserting attribution to a named group or operator. It states that there is no shared TLS certificate, shared backend IP, or shared body hash tying this specific infrastructure to a previously published IOC list. The evidence is presented as consistent with a known ecosystem, but not sufficient for definitive attribution.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-hunting-guidance\"\u003eDetection and Hunting Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that hostnames and IPs rotate quickly, so durable detections should focus on structural artifacts. The most actionable indicators include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/us_post_usps/\u003c/code\u003e asset paths.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/__theme/runtime/entry/verify\u003c/code\u003e and \u003ccode\u003e/__theme/runtime/site/pass\u003c/code\u003e endpoints.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etheme_entry_verify_us_post_ups\u003c/code\u003e and \u003ccode\u003etheme_site_verify_us_post_ups\u003c/code\u003e cookies.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egfsessionid\u003c/code\u003e on USPS or UPS-themed hosts.\u003c/li\u003e\n\u003cli\u003eJSONP tokens matching \u003ccode\u003evalid_\u0026lt;YYYYMMDDhhmmss\u0026gt;_\u0026lt;32-hex\u0026gt;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe V2 banner hash \u003ccode\u003e4fe8bec780537aa223406965415c1f85e83eec1f4e2181cf82e2a7b7516026e6\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe V1 banner hash \u003ccode\u003e8e5546c83d764e1287b55cbe868a45344a6f0afa9782d798d03b2b7cfc53ec38\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eASN-scoped JA4T fingerprints for the Tencent-hosted cluster.\u003c/li\u003e\n\u003cli\u003eHits to USPS GA4 property \u003ccode\u003eG-CSLL4ZEK4L\u003c/code\u003e from hosts other than \u003ccode\u003ewww.usps.com\u003c/code\u003e, which the article says would be visible to USPS’s marketing team.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists the Tencent prefixes \u003ccode\u003e43.157.128.0/18\u003c/code\u003e and \u003ccode\u003e43.173.64.0/18\u003c/code\u003e as reasonable block-list candidates for many enterprises, while stressing that structural indicators are more durable than disposable infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central finding is that one USPS smishing text exposed a larger phishing operation when investigated through Censys DNS history and HTTP fingerprints. The operation used hundreds of disposable lookalike domains, a real-time card-skimming USPS kit that served genuine USPS assets, and a related UPS campaign sharing kit-family artifacts. The article’s main defensive message is that domains and IPs change quickly, but asset paths, cookies, token formats, banner hashes, and historical DNS records provide longer-lasting ways to track the operation.\u003c/p\u003e\n","keyPoints":["A USPS-themed smishing campaign used a link at usps.xupqnqz[.]one that resolved to Tencent Cloud IP 43.157.174.200 and displayed a fake Cloudflare verification page before loading the phishing content.","Censys passive DNS data expanded the investigation from one hostname to a cluster with 682 unique lookalike hostnames as of the 2026-05-20 snapshot, many of which no longer resolved in live DNS.","The USPS phishing kit served USPS production HTML, CSS, fonts, and images under the /us_post_usps/ path and included USPS’s live Google Analytics 4 property G-CSLL4ZEK4L.","The kit opened a WebSocket to its origin and streamed victim payment-card input keystroke by keystroke, performed a server-side BIN lookup, and could push routing decisions such as retry, PIN prompt, OTP prompt, or kill-switch back to the victim’s browser.","Pivoting on an HTTP banner hash identified five related UPS-themed hosts using a Spring Boot backend, and those hosts exposed cookies containing the internal theme name us_post_ups."],"insights":["The phishing kit’s use of USPS’s real production assets caused victim browsers to fire USPS’s legitimate GA4 tag, meaning USPS’s own marketing analytics could potentially reveal traffic from domains it does not own.","Censys passive DNS was more useful than live DNS because many campaign hostnames had already gone dark, but their historical resolutions still exposed the operator’s domain rotation at scale.","The /us_post_usps/ path is a high-confidence detection seam because the article states it does not exist on the real usps.com, making any browser request to that path indicative of the kit.","The UPS variant leaked the operator’s internal theme name in cookie names, creating a more durable indicator than the disposable hostnames and IP addresses used by the campaign.","SSH host-key pivoting was ineffective for this cluster because each host had a distinct SSH host key despite similar OpenSSH builds, indicating that other infrastructure pivots were more useful."],"referencedReports":[{"title":"‘Smishing Triad’ Targeted USPS and US Citizens for Data Theft","url":"https://www.resecurity.com/blog/article/smishing-triad-targeted-usps-and-us-citizens-for-data-theft","publisher":"Resecurity","context":"The article cites this as the original naming of the Smishing Triad cluster.","category":"","primary":false},{"title":"Smishing Triad: Chinese eCrime Group Targets 121+ Countries, Intros New Banking Phishing Kit","url":"https://www.silentpush.com/blog/smishing-triad/","publisher":"Silent Push","context":"The article cites this as documenting the Lighthouse kit and its real-time front-end-to-backend victim sync.","category":"","primary":false},{"title":"The Smishing Deluge: China-Based Campaign Flooding Global Text Messages","url":"https://unit42.paloaltonetworks.com/global-smishing-campaign/","publisher":"Palo Alto Networks Unit 42","context":"The article lists this Unit 42 analysis as further reading on China-based smishing activity.","category":"","primary":false}],"body":"\u003cp\u003eA USPS-themed smishing campaign delivered by SMS used the hostname \u003ccode\u003eusps.xupqnqz[.]one\u003c/code\u003e to impersonate a package-delivery issue. The site first showed a fake Cloudflare “Verify you are human” gate and then loaded a USPS-themed phishing application. Censys passive DNS data expanded that single lure into a broader infrastructure cluster with 682 unique lookalike hostnames as of the 2026-05-20 snapshot.\u003c/p\u003e\n\n\u003cp\u003eThe USPS kit did not merely imitate USPS visually; it served USPS’s own production HTML, CSS, fonts, and images from the phishing host under the \u003ccode\u003e/us_post_usps/\u003c/code\u003e path. It also included USPS’s live Google Analytics 4 tag, causing victim browsers to fire analytics hits into USPS’s marketing infrastructure. The article highlights \u003ccode\u003e/us_post_usps/\u003c/code\u003e, cookie names, token formats, banner hashes, and Censys DNS history as more durable detection signals than rotating domains and IPs.\u003c/p\u003e\n\n\u003cp\u003eThe kit captured victim payment data in real time by opening a WebSocket to its origin and streaming card input keystroke by keystroke. It also performed a server-side BIN lookup and pushed decisions such as retry, PIN prompt, OTP prompt, or kill-switch back into the victim’s browser. A banner-hash pivot identified a related UPS-themed campaign on Tencent-hosted infrastructure, using a Spring Boot backend and cookies containing the internal theme name \u003ccode\u003eus_post_ups\u003c/code\u003e.\u003c/p\u003e\n"},{"n":7,"title":"Over 73,000 French govt employees affected in Tchap messenger breach","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/french-govt-says-tchap-breach-affected-over-73-000-accounts/","time":"07:09","priority":"SHOULD READ","score":85,"tldr":"France’s DINUM says a breach of the Tchap government messaging platform exposed data from 73,467 public sector employees, including names, emails, organizations, and avatars from unencrypted public rooms. Private conversations remained encrypted, but the attacker claims to have scraped hundreds of thousands of messages and stolen shared files and metadata.","briefOverview":"\u003cp\u003eThe French government said a breach of its Tchap encrypted messaging platform affected 73,467 public sector employees, or less than 9% of registered users. DINUM disclosed that a threat actor accessed the platform using a compromised user account and notified France’s data protection authority, CNIL, because personal data may have been exposed. Tchap is used by the French public sector and has more than 825,000 registered agents.\u003c/p\u003e\n\n\u003cp\u003eDINUM said private conversations remained encrypted and protected, but public chat rooms are open to all users and their messages are not encrypted. The attacker may have accessed data shared in those public rooms, including names, email addresses, avatar images, and the public sector organization associated with users. DINUM identified and immediately blocked the account behind the malicious requests to remove the attacker’s persistent access.\u003c/p\u003e\n\n\u003cp\u003eA threat actor claimed responsibility over the weekend and said they gained access after a social engineering attack. The actor claimed to have scraped nearly 650,000 messages and information from more than 73,000 accounts, including email addresses, meeting links, organization information, account and device metadata, and more than 13.5GB of documents and media files. DINUM has not attributed the breach.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe French government revealed that a recent breach of the Tchap encrypted messaging platform affected 73,467 public sector employees. DINUM, the French government’s digital affairs directorate, said this represents less than 9% of the more than 825,000 registered agents on the platform. The agency had initially provided few details, but later said the attackers may have accessed information shared by around 9% of registered users.\u003c/p\u003e\n\n\u003cp\u003eDINUM said the incident began when a threat actor accessed Tchap using a compromised user account. The agency notified France’s data protection authority, CNIL, because personal data shared by some users may have been exposed. The account behind the malicious requests was identified and immediately blocked to remove the attacker’s persistent access and support further analysis.\u003c/p\u003e\n\n\u003cp\u003eThe key technical distinction in the incident is that Tchap private conversations are encrypted, while public chat rooms are not encrypted. DINUM said public forums are open to all users by design, and their messages are not encrypted. The potentially exposed account data includes at least last name, first name, email address, belonging entity, and avatar.\u003c/p\u003e\n\n\u003cp\u003eA threat actor claimed responsibility for the attack over the weekend and said they gained access to the platform through a social engineering attack. The actor claimed to have scraped nearly 650,000 messages and information from more than 73,000 accounts. The claimed stolen data included email addresses, meeting links, organization information, account and device metadata, and more than 13.5GB of documents and media files shared through Tchap.\u003c/p\u003e\n\n\u003cp\u003eTchap was developed by DINUM in collaboration with ANSSI in 2018 and is based on the Matrix protocol. It became the default work communications app for all French civil servants in early August 2025. The platform has reached over 300,000 monthly users and has more than 500,000 downloads on Google’s Play Store.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe French government disclosed that a breach of its Tchap encrypted messaging platform affected 73,467 employees in the French public sector. DINUM, the French government’s digital affairs directorate, said this represents less than 9% of the more than 825,000 registered agents on the platform. The agency said the incident involved access through a compromised user account and notified France’s data protection authority, CNIL, because of the potential exposure of personal data shared by some users.\u003c/p\u003e\n\n\u003cp\u003eDINUM initially shared few details about what was exposed and how many users were affected. In a later update, it said attackers may have accessed information shared by around 9% of all registered users. The agency stated that private conversations remained protected, while data shared in public chat rooms may have been accessible.\u003c/p\u003e\n\n\u003ch2 id=\"affected-platform-and-users\"\u003eAffected platform and users\u003c/h2\u003e\n\n\u003cp\u003eTchap is a decentralized collaboration and instant messaging platform for the French public sector. It was developed by DINUM in collaboration with ANSSI, the French Cybersecurity Agency, in 2018 and is based on the Matrix protocol. The article describes Tchap as an encrypted messaging platform used by French public sector employees.\u003c/p\u003e\n\n\u003cp\u003eThe affected population includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e73,467 public sector employees whose data may have been exposed.\u003c/li\u003e\n\u003cli\u003eLess than 9% of the platform’s registered users.\u003c/li\u003e\n\u003cli\u003eUsers among more than 825,000 registered agents.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTchap became the default app for work communications for all civil servants in early August 2025. The platform has reached more than 300,000 monthly users and has over 500,000 downloads on Google’s Play Store.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-breach-occurred\"\u003eHow the breach occurred\u003c/h2\u003e\n\n\u003cp\u003eDINUM said a threat actor accessed the Tchap platform using a compromised user account. The agency identified the account behind the malicious requests and immediately blocked it. DINUM said this action was taken to remove the attacker’s persistent access and allow in-depth analysis of the data the attacker may have accessed.\u003c/p\u003e\n\n\u003cp\u003eDINUM has not attributed the breach. However, a threat actor claimed responsibility over the weekend and said they gained access to the platform after a social engineering attack. The article presents the social engineering claim as coming from the threat actor, not as a confirmed attribution by DINUM.\u003c/p\u003e\n\n\u003ch2 id=\"data-exposure-described-by-dinum\"\u003eData exposure described by DINUM\u003c/h2\u003e\n\n\u003cp\u003eDINUM said private conversations on Tchap are encrypted and their content remains protected. The agency emphasized that public chat rooms are different because they are open to all users and their messages are not encrypted by design. As a result, the attacker was able to steal data shared in public chat rooms.\u003c/p\u003e\n\n\u003cp\u003eAccording to DINUM, potentially exposed user account data includes at least:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLast name.\u003c/li\u003e\n\u003cli\u003eFirst name.\u003c/li\u003e\n\u003cli\u003eEmail address.\u003c/li\u003e\n\u003cli\u003eBelonging entity or public sector organization.\u003c/li\u003e\n\u003cli\u003eAvatar.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDINUM said these public forums are open to all users by design and that officers’ private conversations remain protected.\u003c/p\u003e\n\n\u003ch2 id=\"claims-made-by-the-threat-actor\"\u003eClaims made by the threat actor\u003c/h2\u003e\n\n\u003cp\u003eA threat actor claimed responsibility for the attack and shared a sample of stolen files. The actor claimed they scraped nearly 650,000 messages and information from more than 73,000 accounts. The claimed information included email addresses, meeting links, organization information, account metadata, and device metadata.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor also claimed to have stolen more than 13.5GB of documents and media files shared by public servants using Tchap. In addition, the actor claimed that hardcoded LDAP credentials were leaked through a PowerShell script. The article reports these as claims made by the threat actor.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-notification\"\u003eResponse and notification\u003c/h2\u003e\n\n\u003cp\u003eDINUM notified CNIL because personal data shared by some users may have been exposed. The agency also blocked the compromised account that was used for the malicious requests. DINUM said the block was intended to remove persistent attacker access and support analysis of what data was accessed.\u003c/p\u003e\n\n\u003cp\u003eThe agency’s update clarified the scope of the incident after initially sharing limited information. It stated that the number of affected agents was 73,467 and that private conversations remained protected due to encryption.\u003c/p\u003e\n\n\u003ch2 id=\"broader-article-context\"\u003eBroader article context\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that French authorities arrested a 15-year-old in May who was suspected of selling data stolen in an April cyberattack on ANTS, the French agency responsible for issuing and managing official identity and registration documents. This ANTS incident is mentioned separately from the Tchap breach. The article does not state that the two incidents are connected.\u003c/p\u003e\n","keyPoints":["The French government said a breach of its Tchap encrypted messaging platform affected 73,467 public sector employees, representing less than 9% of registered users.","DINUM said the attacker used a compromised user account to access Tchap and that the account behind the malicious requests was identified and blocked.","DINUM said private conversations on Tchap remain encrypted, but public chat rooms are not encrypted and may have exposed users’ names, email addresses, avatar images, and public sector organizations.","A threat actor claimed responsibility for the breach and said they gained access through a social engineering attack.","The threat actor claimed to have scraped nearly 650,000 messages and information from more than 73,000 accounts, as well as over 13.5GB of documents and media files shared on Tchap."],"insights":["Tchap’s encrypted-messaging positioning did not protect data posted in public rooms, because those forums are open to all users and their messages are not encrypted by design.","A single compromised account was enough to let the attacker access public-room data at scale, affecting more than 73,000 users.","The incident exposed more than basic profile details according to the attacker’s claims, including meeting links, account and device metadata, shared documents and media, and hardcoded LDAP credentials from a PowerShell script.","DINUM’s notification to CNIL indicates the exposed public-room data was considered potentially personal data despite private conversations remaining protected."],"referencedReports":[],"body":"\u003cp\u003eThe French government said a breach of its Tchap encrypted messaging platform affected 73,467 public sector employees, or less than 9% of registered users. DINUM disclosed that a threat actor accessed the platform using a compromised user account and notified France’s data protection authority, CNIL, because personal data may have been exposed. Tchap is used by the French public sector and has more than 825,000 registered agents.\u003c/p\u003e\n\n\u003cp\u003eDINUM said private conversations remained encrypted and protected, but public chat rooms are open to all users and their messages are not encrypted. The attacker may have accessed data shared in those public rooms, including names, email addresses, avatar images, and the public sector organization associated with users. DINUM identified and immediately blocked the account behind the malicious requests to remove the attacker’s persistent access.\u003c/p\u003e\n\n\u003cp\u003eA threat actor claimed responsibility over the weekend and said they gained access after a social engineering attack. The actor claimed to have scraped nearly 650,000 messages and information from more than 73,000 accounts, including email addresses, meeting links, organization information, account and device metadata, and more than 13.5GB of documents and media files. DINUM has not attributed the breach.\u003c/p\u003e\n"},{"n":16,"title":"INTERPOL Operation Takes Down Sniper Dz Phishing Platform, Arrests Administrator","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/interpol-takes-down-sniper-dz-phishing.html","time":"08:52","priority":"SHOULD READ","score":84,"tldr":"INTERPOL’s Operation Ramz dismantled the Sniper Dz phishing-as-a-service platform and led to 201 arrests across the MENA region, including its alleged administrator in Algeria. The decade-old service enabled large-scale phishing with ready-made kits and infrastructure tied to more than 20,000 domains and 45,000 victim records.","briefOverview":"\u003cp\u003eINTERPOL-led Operation Ramz disrupted Sniper Dz, a phishing-as-a-service platform active for about a decade. The operation took place between October 2025 and February 2026 and involved authorities from 13 countries in the Middle East and North Africa region. Authorities made 201 arrests, including Guedz, described as the primary developer and administrator of Sniper Dz.\u003c/p\u003e\n\n\u003cp\u003eAs part of the operation, authorities took down the website used to offer phishing-as-a-service capabilities and seized hardware containing phishing software and scripts. Group-IB said the platform had collected more than 45,000 victim records and was associated with more than 20,000 unique domains. Sniper Dz had rebranded over the years as Joker Dz, Storm Dz, and Spam Dz.\u003c/p\u003e\n\n\u003cp\u003eSniper Dz offered ready-made phishing kits, hosting infrastructure, and operational support to cybercriminals. Its toolkit targeted 30 major global organizations, including PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam, using 80 phishing templates in five languages. Group-IB said the platform also redirected some victims into carrier billing fraud, premium SMS subscriptions, browser notification abuse, and other affiliate-driven scam campaigns.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAn INTERPOL-led operation disrupted Sniper Dz, a phishing-as-a-service platform that Group-IB said had been active since at least 2015. The effort, codenamed Operation Ramz, ran between October 2025 and February 2026. Authorities from 13 countries in the Middle East and North Africa region made 201 arrests.\u003c/p\u003e\n\n\u003cp\u003eAmong those arrested was Guedz, described as the primary developer and administrator of Sniper Dz. The arrest was carried out by the Algerian National Police. Group-IB said Sniper Dz had collected more than 45,000 victim records and had rebranded over the years as Joker Dz, Storm Dz, and Spam Dz.\u003c/p\u003e\n\n\u003cp\u003eAuthorities took down the website used to offer Sniper Dz’s phishing-as-a-service capabilities to other cybercriminals. They also seized hardware containing phishing software and scripts. Group-IB said more than 20,000 unique domains associated with the service had been identified.\u003c/p\u003e\n\n\u003cp\u003eSniper Dz provided ready-made phishing kits, hosting infrastructure, and operational support. Its toolkit primarily targeted 30 major global organizations, including PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam. The platform used 80 phishing templates deployed in Arabic, English, French, Spanish, and Hebrew.\u003c/p\u003e\n\n\u003cp\u003eThe phishing campaigns targeted users of technology, social media, and streaming platforms across multiple geographies by impersonating popular brands and government entities. Group-IB said the campaigns harvested credentials, personal information, and other sensitive data. The platform also used fake social media accounts impersonating well-known political personalities in the Middle East and North Africa to promote phishing links disguised as promotional offers or free internet access.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 previously published a comprehensive analysis of Sniper Dz in October 2024, describing its Telegram channel with more than 7,300 subscribers and its option to host phishing pages on its own infrastructure behind a proxy server. Group-IB said Sniper Dz stood out because it offered its infrastructure for free. Its monetization avenues instead relied on credential theft and victim traffic, including redirects into carrier billing fraud, premium SMS subscriptions, browser notification abuse schemes, and other affiliate-driven scams.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eINTERPOL-led Operation Ramz disrupted Sniper Dz, a phishing-as-a-service platform that Group-IB said had been active since at least 2015. The operation took place between October 2025 and February 2026. Authorities from 13 countries in the Middle East and North Africa region participated and made 201 arrests.\u003c/p\u003e\n\n\u003cp\u003eOne of the arrests was Guedz, identified in the article as the primary developer and administrator of Sniper Dz. The Algerian National Police made the arrest. Group-IB said the platform had collected more than 45,000 victim records.\u003c/p\u003e\n\n\u003ch2 id=\"platform-history-and-rebranding\"\u003ePlatform History and Rebranding\u003c/h2\u003e\n\n\u003cp\u003eSniper Dz operated for about a decade as a phishing-as-a-service platform. Over the years, it rebranded itself as Joker Dz, Storm Dz, and Spam Dz. Group-IB described it as a sophisticated criminal platform offering ready-made phishing kits, hosting infrastructure, and operational support to cybercriminals.\u003c/p\u003e\n\n\u003cp\u003eMore than 20,000 unique domains associated with the service have been identified. The platform supported phishing activity at scale by supplying tooling and infrastructure to other cybercriminals.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-action\"\u003eLaw Enforcement Action\u003c/h2\u003e\n\n\u003cp\u003eAs part of Operation Ramz, authorities took down the website used to offer phishing-as-a-service capabilities. They also seized hardware containing phishing software and scripts. The operation involved authorities from 13 countries across the Middle East and North Africa region.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies INTERPOL as leading the operation and Group-IB as reporting details of the disruption. The arrest of Guedz was made by the Algerian National Police.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-templates\"\u003eTargeting and Templates\u003c/h2\u003e\n\n\u003cp\u003eSniper Dz’s toolkit primarily targeted 30 major global organizations. The article names PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam among the targeted organizations. The platform used 80 phishing templates deployed in five languages: Arabic, English, French, Spanish, and
