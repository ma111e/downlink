<script>
window.__DL_ARTICLES = [{"n":2,"title":"Splunk Enterprise Unauthenticated Arbitrary File Operations/RCE (CVE-2026-20253): Overview and Takeaways","source":"netspi.com","sourceColorIdx":5,"link":"https://www.netspi.com/blog/executive-blog/critical-vulnerability/cve-2026-20253-splunk-enterprise-overview-and-takeaways/","time":"17:52","priority":"MUST READ","score":94,"tldr":"Splunk disclosed a critical unauthenticated flaw in Splunk Enterprise 10.0.x and 10.2.x that can allow arbitrary file operations and potential remote code execution via a PostgreSQL sidecar service. Organizations should upgrade immediately to 10.0.7 or 10.2.4, as Splunk says there are no workarounds and public proof-of-concept code is available.","briefOverview":"\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026, affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The vulnerability is rated Critical with a CVSSv3.1 score of 9.8. Splunk Cloud Platform is not affected because it does not use PostgreSQL sidecars.\u003c/p\u003e\n\n\u003cp\u003eThe flaw stems from a PostgreSQL sidecar service endpoint that lacks authentication controls. Any network-reachable attacker can invoke arbitrary file creation or truncation operations without credentials. Researchers demonstrated that this file-write primitive can be chained into remote code execution by abusing PostgreSQL’s lo_export function to write and execute malicious scripts on the Splunk server.\u003c/p\u003e\n\n\u003cp\u003eSplunk Enterprise 10.2.0 through 10.2.3 and 10.0.0 through 10.0.6 are affected, with fixes available in 10.2.4 and 10.0.7. Splunk stated that no mitigations or workarounds exist, so patching is the only remediation. The article recommends restricting network access, segmenting Splunk infrastructure, and monitoring logs, filesystem activity, and process execution if patching is delayed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026, describing a critical vulnerability in Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The issue has a CVSSv3.1 score of 9.8 and is exploitable over the network without authentication or user interaction. The article states that no active exploitation in the wild had been reported at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eThe root cause is missing authentication for a critical function in a PostgreSQL sidecar service endpoint, classified as CWE-306. Because the endpoint performs no credential verification, any network-reachable user can invoke file operations without credentials. The immediate impact includes unauthenticated arbitrary file creation and truncation on the Splunk server filesystem.\u003c/p\u003e\n\n\u003cp\u003eResearchers demonstrated that the file-write primitive can be chained into remote code execution. The demonstrated path abuses PostgreSQL’s lo_export function to write and subsequently execute malicious scripts on the Splunk server. The article also notes potential service disruption through destruction or corruption of critical database files and possible lateral movement from a compromised Splunk server into monitored environments.\u003c/p\u003e\n\n\u003cp\u003eThe affected versions are Splunk Enterprise 10.2.0 through 10.2.3 and 10.0.0 through 10.0.6. Splunk Enterprise 10.2.x should be upgraded to 10.2.4 or later, and Splunk Enterprise 10.0.x should be upgraded to 10.0.7 or later. Splunk Enterprise 10.4.0 is described as the baseline fixed version, and Splunk Cloud Platform is not affected because it does not use PostgreSQL sidecars.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends reviewing Splunk server logs for unexpected access to the PostgreSQL sidecar service endpoint, anomalous file creation, and unexpected database backup or restore operations. It also recommends monitoring for unexpected process execution from within the Splunk service context, especially Python script execution not initiated by a known user or scheduled search. Splunk has not published indicators of compromise, so detection relies on log review, filesystem auditing, and process monitoring.\u003c/p\u003e\n\n\u003cp\u003eSplunk has stated that no mitigations or workarounds exist, making patching the only remediation. If patching is delayed, the article recommends restricting network access to Splunk management interfaces and the PostgreSQL sidecar service, implementing network segmentation, and monitoring filesystem activity on Splunk servers. It also says internet-facing or insufficiently segmented affected instances should be treated as high risk because a public proof-of-concept is available on GitHub.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026. The vulnerability affects Splunk Enterprise versions in the 10.0.x and 10.2.x branches. Splunk’s advisory rates the issue as Critical, with a CVSSv3.1 score of 9.8 using the vector AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the flaw as an unauthenticated network vulnerability in a PostgreSQL sidecar service endpoint. The endpoint lacks authentication controls, allowing any network-reachable attacker to invoke arbitrary file creation or truncation operations without credentials. The root cause is identified as Missing Authentication for Critical Function, or CWE-306.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is tied to a PostgreSQL sidecar service endpoint used by affected Splunk Enterprise versions. According to the article, the endpoint performs no credential verification before allowing file operations. This creates an unauthenticated arbitrary file creation and truncation primitive on the Splunk server filesystem.\u003c/p\u003e\n\n\u003cp\u003eResearchers demonstrated that the file-write primitive can be chained into remote code execution. The demonstrated chain abuses PostgreSQL’s lo_export function to write malicious scripts and subsequently execute them on the Splunk server. The article also mentions malicious database restoration as part of the remote code execution impact.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several potential impacts from CVE-2026-20253:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthenticated arbitrary file creation and truncation on the Splunk server filesystem.\u003c/li\u003e\n\u003cli\u003eRemote code execution through PostgreSQL lo_export abuse and malicious database restoration.\u003c/li\u003e\n\u003cli\u003eService disruption through destruction or corruption of critical database files.\u003c/li\u003e\n\u003cli\u003ePotential lateral movement from a compromised Splunk server into monitored environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNo active exploitation in the wild had been reported at the time of writing. However, the article states that a public proof-of-concept is available on GitHub, making exploitation attempts a near-term probability for internet-exposed or inadequately segmented Splunk deployments.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-unaffected-products\"\u003eAffected and Unaffected Products\u003c/h2\u003e\n\n\u003cp\u003eThe affected products are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk Enterprise 10.2.0 through 10.2.3, fixed in 10.2.4.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.0.0 through 10.0.6, fixed in 10.0.7.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Splunk Enterprise 10.4.x is not affected, with version 10.4.0 described as the baseline fixed version. Splunk Cloud Platform is also not affected because it does not use PostgreSQL sidecars.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe primary remediation is to patch immediately. Splunk Enterprise 10.2.x deployments should upgrade to 10.2.4 or later. Splunk Enterprise 10.0.x deployments should upgrade to 10.0.7 or later.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Splunk has stated there are no mitigations or workarounds for the vulnerability. Patching is therefore described as the only remediation. The article points readers to Splunk Security Advisory SVD-2026-0603 for full patch guidance.\u003c/p\u003e\n\n\u003ch2 id=\"review-and-monitoring-guidance\"\u003eReview and Monitoring Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends reviewing Splunk server logs for signs that may indicate exploitation attempts. These include unexpected access to the PostgreSQL sidecar service endpoint, anomalous file creation activity, and unexpected database backup or restore operations. It also recommends monitoring for unexpected process execution from within the Splunk service context.\u003c/p\u003e\n\n\u003cp\u003eParticular attention should be paid to Python script execution not initiated by a known user or scheduled search. Splunk has not published indicators of compromise for this vulnerability. As a result, detection relies on log review, filesystem auditing, and process monitoring.\u003c/p\u003e\n\n\u003ch2 id=\"actions-if-patching-is-delayed\"\u003eActions if Patching Is Delayed\u003c/h2\u003e\n\n\u003cp\u003eIf patching is delayed, the article recommends restricting network access to Splunk management interfaces and the PostgreSQL sidecar service to trusted IP ranges only. The PostgreSQL sidecar endpoint should not be reachable from untrusted networks or the public internet. The article also recommends implementing network segmentation to isolate Splunk infrastructure from broader enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eAdditional monitoring should focus on filesystem activity on Splunk servers, especially unauthorized file creation in directories accessible to the Splunk service account. The article advises treating any internet-facing or insufficiently network-segmented affected Splunk Enterprise instance as high risk until the patch is applied. This warning is tied to the availability of a public proof-of-concept.\u003c/p\u003e\n\n\u003ch2 id=\"netspi-coverage-and-references\"\u003eNetSPI Coverage and References\u003c/h2\u003e\n\n\u003cp\u003eThe article states that NetSPI’s External Attack Surface Management has released a detection for the CVE. The detection is named “Vulnerable Version – Splunk Enterprise – Arbitrary File Operations (CVE-2026-20253).” It also notes that NetSPI’s Penetration Testing Services can help identify exposure to the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article links to several additional resources, including the NVD entry for CVE-2026-20253, the MITRE CVE entry, Splunk Security Advisory SVD-2026-0603, and Splunk Enterprise release notes for versions 10.2.4 and 10.0.7.\u003c/p\u003e\n","keyPoints":["Splunk disclosed CVE-2026-20253 on June 10, 2026, affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches.","CVE-2026-20253 is a critical unauthenticated network vulnerability caused by missing authentication in a PostgreSQL sidecar service endpoint, allowing arbitrary file creation or truncation without credentials.","Researchers demonstrated that the file-write primitive can be chained to remote code execution by abusing PostgreSQL’s lo_export function to write and execute malicious scripts on the Splunk server.","Affected versions are Splunk Enterprise 10.2.0 through 10.2.3 and 10.0.0 through 10.0.6, while Splunk Enterprise 10.4.x and Splunk Cloud Platform are not affected.","Splunk recommends upgrading to Splunk Enterprise 10.2.4 or 10.0.7 because it has stated that no mitigations or workarounds exist."],"insights":["Internet-facing or poorly segmented affected Splunk Enterprise instances should be treated as high risk even without reported in-the-wild exploitation because a public proof-of-concept is already available.","Detection will likely require local log review, filesystem auditing, and process monitoring because Splunk has not published indicators of compromise for this vulnerability.","Monitoring should focus on unexpected PostgreSQL sidecar access, database backup or restore activity, and Python execution from the Splunk service context, since these are specifically highlighted as potential signs of exploitation.","Splunk Cloud customers do not need to take action for this CVE because Splunk Cloud Platform does not use PostgreSQL sidecars."],"referencedReports":[{"title":"Splunk Security Advisory — SVD-2026-0603","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article references Splunk's vendor advisory for CVE-2026-20253 as the source for severity and full patch guidance.","category":"advisory","primary":true}],"body":"\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026, affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The vulnerability is rated Critical with a CVSSv3.1 score of 9.8. Splunk Cloud Platform is not affected because it does not use PostgreSQL sidecars.\u003c/p\u003e\n\n\u003cp\u003eThe flaw stems from a PostgreSQL sidecar service endpoint that lacks authentication controls. Any network-reachable attacker can invoke arbitrary file creation or truncation operations without credentials. Researchers demonstrated that this file-write primitive can be chained into remote code execution by abusing PostgreSQL’s lo_export function to write and execute malicious scripts on the Splunk server.\u003c/p\u003e\n\n\u003cp\u003eSplunk Enterprise 10.2.0 through 10.2.3 and 10.0.0 through 10.0.6 are affected, with fixes available in 10.2.4 and 10.0.7. Splunk stated that no mitigations or workarounds exist, so patching is the only remediation. The article recommends restricting network access, segmenting Splunk infrastructure, and monitoring logs, filesystem activity, and process execution if patching is delayed.\u003c/p\u003e\n"},{"n":4,"title":"Cisco fixes SD-WAN vManage flaw exploited in zero-day attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisco-fixes-sd-wan-vmanage-flaw-exploited-in-zero-day-attacks/","time":"17:12","priority":"MUST READ","score":94,"tldr":"Cisco patched a Catalyst SD-WAN Manager zero-day, CVE-2026-20262, that attackers were exploiting to overwrite files and escalate to root privileges. Customers are strongly urged to update affected deployments and check logs for signs of attempted index.jsp or .war file uploads.","briefOverview":"\u003cp\u003eCisco released security updates for a Catalyst SD-WAN Manager vulnerability tracked as CVE-2026-20262. The flaw was exploited in attacks to escalate to root privileges. Cisco’s Product Security Incident Response Team became aware of exploitation earlier this month and strongly advised customers to patch affected systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects all deployment types regardless of device configuration, including on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco said the issue stems from insufficient validation of user-supplied input during file uploads. A low-privilege remote attacker could send crafted HTTP requests to an affected API endpoint to create or overwrite files on the underlying operating system, which could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eCisco also shared indicators of compromise for administrators to review. It advised checking SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs for attempts to upload index.jsp and .war files. The article places CVE-2026-20262 among several recently exploited Cisco Catalyst SD-WAN vulnerabilities disclosed or flagged in recent months.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco released security updates for CVE-2026-20262, a vulnerability in Cisco Catalyst SD-WAN Manager, formerly known as SD-WAN vManage. The flaw was exploited in attacks to escalate to root privileges. Catalyst SD-WAN Manager is network management software that allows administrators to manage up to 6,000 SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eCisco said the now-patched zero-day affects all deployment types regardless of device configuration. The affected environments include on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. The article does not identify any attacker or threat actor behind the exploitation.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, the vulnerability is in the web UI and is caused by insufficient validation of user-supplied input during file uploads. An authenticated remote attacker could exploit it by sending a crafted HTTP request to an affected API endpoint. A successful exploit could allow the attacker to create or overwrite any file on the underlying operating system.\u003c/p\u003e\n\n\u003cp\u003eCisco said the created or overwritten file could later be used to elevate to root. The company’s Product Security Incident Response Team became aware of exploitation of CVE-2026-20262 earlier this month. Cisco strongly advised customers to patch their systems.\u003c/p\u003e\n\n\u003cp\u003eCisco provided fixed releases for multiple Catalyst SD-WAN release trains and shared indicators of compromise. Administrators were warned to check SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs for attempts to upload index.jsp and .war files. The article notes that Cisco did not share further details about the attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a broader pattern of recent Cisco Catalyst SD-WAN vulnerabilities being exploited in the wild. It references CVE-2026-20133, CVE-2026-20128, CVE-2026-20122, CVE-2026-20182, and CVE-2026-20245 as previously exploited or flagged issues. It also states that CISA has tagged 91 Cisco vulnerabilities as abused in the wild, including five in Cisco Catalyst SD-WAN Manager and six exploited in ransomware attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco released security updates to address a Cisco Catalyst SD-WAN Manager vulnerability tracked as CVE-2026-20262. The product was formerly known as SD-WAN vManage and is used by administrators to manage up to 6,000 SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was exploited in attacks to escalate to root privileges. Cisco said its Product Security Incident Response Team became aware of exploitation earlier this month and strongly advised customers to patch their systems.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-deployments\"\u003eAffected Products and Deployments\u003c/h2\u003e\n\n\u003cp\u003eCisco said the now-patched zero-day affects all deployment types, regardless of device configuration. The article specifically lists the following deployment types as affected:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-prem deployments\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud, also described as Cisco Managed\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government, including FedRAMP\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists fixed releases across several Cisco Catalyst SD-WAN release trains, including updates for 20.9, 20.12, 20.15, 20.18, and 26.1 versions.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCisco said the issue stems from insufficient validation of user-supplied input during file uploads. The vulnerability is in the web UI of Cisco Catalyst SD-WAN Manager.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco’s advisory quoted in the article, an authenticated remote attacker could exploit the flaw by sending a crafted HTTP request to an affected API endpoint. A successful exploit could allow the attacker to create a file or overwrite any file on the filesystem of the affected system.\u003c/p\u003e\n\n\u003cp\u003eCisco said the created or overwritten file could later be used to elevate to root. The article also states that low-privilege remote attackers could execute arbitrary commands as root by sending crafted HTTP requests to an affected API endpoint.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-indicators-of-compromise\"\u003eExploitation and Indicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eCisco confirmed that CVE-2026-20262 was exploited in attacks. The company did not share details about the attacks, and the article does not name any threat actor or attacker group.\u003c/p\u003e\n\n\u003cp\u003eCisco shared indicators of compromise for administrators. It warned admins to check the following logs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSD-WAN vmanage-server logs\u003c/li\u003e\n\u003cli\u003eSD-WAN vmanage-appserver logs\u003c/li\u003e\n\u003cli\u003eserviceproxy-access logs\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAdministrators were told to look for attempts to upload the following file types or names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eindex.jsp\u003c/li\u003e\n\u003cli\u003e.war files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cisco-s-response\"\u003eCisco’s Response\u003c/h2\u003e\n\n\u003cp\u003eCisco released security updates to fix CVE-2026-20262. The company strongly advised customers to patch their systems after its Product Security Incident Response Team became aware of exploitation earlier this month.\u003c/p\u003e\n\n\u003cp\u003eThe article includes Cisco’s statement that a successful exploit could allow an attacker to create or overwrite any file on the underlying operating system. Cisco also said that such a file could later be used to elevate to root.\u003c/p\u003e\n\n\u003ch2 id=\"recent-related-cisco-sd-wan-vulnerabilities\"\u003eRecent Related Cisco SD-WAN Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-20262 in the context of several other recently exploited Cisco Catalyst SD-WAN vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eIt states that in February, Cisco patched CVE-2026-20133, an information disclosure flaw in Catalyst SD-WAN Manager that was later flagged as actively exploited in late April. Two weeks later, Cisco warned of two more flaws, CVE-2026-20128 and CVE-2026-20122, that were abused in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that last month Cisco tagged CVE-2026-20182, a maximum-severity Catalyst SD-WAN Controller authentication-bypass flaw, as actively exploited as a zero-day to gain admin privileges on unpatched devices. More recently, in early June, Cisco warned of another unpatched Catalyst SD-WAN Manager zero-day, CVE-2026-20245, that was exploited in attacks and allowed attackers to gain root privileges.\u003c/p\u003e\n\n\u003ch2 id=\"broader-cisa-context\"\u003eBroader CISA Context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that over the last several years, the Cybersecurity and Infrastructure Security Agency has tagged 91 Cisco vulnerabilities as abused in the wild. Of those, five were in Cisco Catalyst SD-WAN Manager. The article also states that six of the Cisco vulnerabilities tracked by CISA were exploited in ransomware attacks.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central issue is that Cisco patched an actively exploited Catalyst SD-WAN Manager zero-day that could allow an authenticated remote attacker to create or overwrite files and ultimately elevate to root. Cisco strongly advised customers to apply the fixed releases and review relevant logs for upload attempts involving index.jsp and .war files.\u003c/p\u003e\n","keyPoints":["Cisco released security updates for CVE-2026-20262, a Catalyst SD-WAN Manager vulnerability that was exploited in attacks to escalate to root privileges.","The flaw affects all deployment types of Catalyst SD-WAN Manager, including on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government.","Cisco said the vulnerability stems from insufficient validation of user-supplied input during file uploads, allowing low-privilege remote attackers to execute arbitrary commands as root via crafted HTTP requests to an affected API endpoint.","Cisco’s PSIRT became aware of exploitation of CVE-2026-20262 earlier this month and strongly advised customers to patch their systems.","Cisco shared indicators of compromise advising administrators to check SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs for attempts to upload index.jsp and .war files."],"insights":["The vulnerability is especially broad in scope because Cisco says it affects all Catalyst SD-WAN Manager deployment types regardless of device configuration.","The exploit path is actionable for defenders because Cisco specifically identified attempts to upload index.jsp and .war files as indicators to search for in SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs.","CVE-2026-20262 is part of a recent pattern of actively exploited Cisco Catalyst SD-WAN flaws, following multiple other zero-days or exploited vulnerabilities disclosed since February.","The vulnerability can start from a low-privilege authenticated position but lead to root-level compromise by creating or overwriting files on the underlying operating system."],"referencedReports":[{"title":"Cisco advisory on CVE-2026-20262","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-arbfw-c2rZvQ","publisher":"Cisco","context":"The article cites a Monday Cisco advisory describing the Catalyst SD-WAN Manager vulnerability and how attackers could exploit it to create or overwrite files.","category":"advisory","primary":true}],"body":"\u003cp\u003eCisco released security updates for a Catalyst SD-WAN Manager vulnerability tracked as CVE-2026-20262. The flaw was exploited in attacks to escalate to root privileges. Cisco’s Product Security Incident Response Team became aware of exploitation earlier this month and strongly advised customers to patch affected systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects all deployment types regardless of device configuration, including on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco said the issue stems from insufficient validation of user-supplied input during file uploads. A low-privilege remote attacker could send crafted HTTP requests to an affected API endpoint to create or overwrite files on the underlying operating system, which could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eCisco also shared indicators of compromise for administrators to review. It advised checking SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs for attempts to upload index.jsp and .war files. The article places CVE-2026-20262 among several recently exploited Cisco Catalyst SD-WAN vulnerabilities disclosed or flagged in recent months.\u003c/p\u003e\n"},{"n":6,"title":"OptinMonster WordPress plugin hacked in CDN supply-chain attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/optinmonster-wordpress-plugin-hacked-in-cdn-supply-chain-attack/","time":"17:37","priority":"MUST READ","score":94,"tldr":"Awesome Motive’s CDN was compromised using stolen credentials, causing OptinMonster, TrustPulse, and PushEngage scripts to serve malware that created rogue WordPress admin accounts and backdoor plugins. Site owners should check for unauthorized admins and hidden plugins, scan servers, and rotate credentials because compromised sites may remain under attacker control.","briefOverview":"\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack affecting Awesome Motive’s content distribution network. OptinMonster is the most widely used of the three, with at least 1.2 million websites using it. Security firm Sansec discovered the attack over the weekend.\u003c/p\u003e\n\n\u003cp\u003eSansec found that malicious scripts were served to OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC, while PushEngage continued serving malicious JavaScript until 19:02 UTC on Saturday. The malware activated when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces, then used them to create a rogue administrator account.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said attackers gained access to a server in its environment by exploiting a known flaw in the UpdraftPlus WordPress plugin and stole credentials for the company’s CDN account. The attackers used the stolen CDN API key to modify JavaScript files distributed through Awesome Motive’s CDN. Site owners are advised to remove rogue admin accounts and hidden backdoor plugins, scan servers, and rotate credentials because attackers may retain access even after the malicious CDN content was removed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack involving Awesome Motive’s content distribution network. OptinMonster, a lead-generation and conversion optimization platform, is the most popular of the affected products and is used by at least 1.2 million websites. E-commerce security firm Sansec discovered the attack over the weekend.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, malicious scripts were served to unsuspecting OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC. PushEngage continued to serve malicious JavaScript code until 19:02 UTC on Saturday. Awesome Motive reported that malicious scripts were served for a short period on June 12 for OptinMonster and TrustPulse, while the article notes it did not confirm the impact on PushEngage.\u003c/p\u003e\n\n\u003cp\u003eThe malware triggered only when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces and used them to create a rogue administrator account. The intruders then installed a self-hiding backdoor plugin and established a communication channel with a domain impersonating Tidio to send newly captured data.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor plugin provided full remote access capabilities, including a web shell named “WPM File Manager \u0026amp; Shell” and arbitrary PHP code execution. Sansec said the operator rotated the plugin’s disguise while keeping the logic byte-identical across renames. It observed the plugin shipping as “Content Delivery Helper” and, currently, as “Database Optimizer.”\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said hackers accessed a server hosting a marketing website after exploiting a known flaw in the UpdraftPlus WordPress plugin. The company said this server was not connected to production infrastructure or data systems, but it hosted credentials for the company’s CDN account, which the hackers stole. Using the stolen CDN API key, attackers modified JavaScript files distributed by the CDN so websites loaded malicious code directly from it.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said it remediated the marketing site, migrated it to a new server, and rotated all credentials, including the CDN API key. The company stated that its application servers, source code, plugin hosting servers, and systems storing OptinMonster and TrustPulse account information were not breached. Site owners who may have been affected are advised to check for rogue administrator accounts, inspect plugin directories for hidden backdoors, run server-side malware scans, and rotate administrator passwords, API keys, database credentials, and WordPress security salts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack affecting Awesome Motive’s content distribution network. OptinMonster is the most popular of the affected products, with at least 1.2 million websites using the lead-generation and conversion optimization platform.\u003c/p\u003e\n\n\u003cp\u003eE-commerce security firm Sansec discovered the attack over the weekend. The attack caused websites using affected Awesome Motive services to load malicious JavaScript from the company’s CDN.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-affected-services\"\u003eTimeline and affected services\u003c/h2\u003e\n\n\u003cp\u003eSansec found that malicious scripts were served to OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC. PushEngage continued to serve malicious JavaScript code until 19:02 UTC on Saturday.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive reported that malicious scripts were served for a short period on June 12 for OptinMonster and TrustPulse. The article states that Awesome Motive did not confirm the impact on PushEngage.\u003c/p\u003e\n\n\u003cp\u003eThe affected files listed in the article were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ea.omappapi.com/app/js/api.min.js\u003c/code\u003e — OptinMonster\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ea.opmnstr.com/app/js/api.min.js\u003c/code\u003e — OptinMonster\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ea.optnmstr.com/app/js/api.min.js\u003c/code\u003e — OptinMonster\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ea.trstplse.com/app/js/api.min.js\u003c/code\u003e — TrustPulse\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-behavior\"\u003eMalware behavior\u003c/h2\u003e\n\n\u003cp\u003eThe malware triggered only when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces and used them to create a rogue administrator account.\u003c/p\u003e\n\n\u003cp\u003eAfter that, the intruders installed a self-hiding backdoor plugin. They also established a communication channel with a domain impersonating Tidio to send newly captured data.\u003c/p\u003e\n\n\u003cp\u003eThe plugin provided full remote access capabilities. These included a web shell called “WPM File Manager \u0026amp; Shell” and arbitrary PHP code execution, giving attackers full control of compromised websites.\u003c/p\u003e\n\n\u003ch2 id=\"backdoor-disguise-and-persistence\"\u003eBackdoor disguise and persistence\u003c/h2\u003e\n\n\u003cp\u003eSansec said the operator rotated the plugin’s disguise while keeping the logic byte-identical across renames. The article says Sansec observed the backdoor shipping as “Content Delivery Helper” with the slug \u003ccode\u003econtent-delivery-helper\u003c/code\u003e and version 2.7.1.\u003c/p\u003e\n\n\u003cp\u003eSansec also observed it currently shipping as “Database Optimizer” with the slug \u003ccode\u003edatabase-optimizer\u003c/code\u003e and version 2.9.4. The article warns that the attacker may continue to have access to compromised websites as long as rogue administrator accounts and hidden backdoor plugins remain present.\u003c/p\u003e\n\n\u003ch2 id=\"cause-of-the-cdn-compromise\"\u003eCause of the CDN compromise\u003c/h2\u003e\n\n\u003cp\u003eAwesome Motive published a security advisory stating that hackers gained access to a server in its environment after exploiting a known flaw in the UpdraftPlus WordPress plugin. The compromised server hosted a marketing website.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said the marketing server was not connected to the company’s production infrastructure or data systems. However, the server hosted credentials for the company’s CDN account, which the hackers stole.\u003c/p\u003e\n\n\u003cp\u003eUsing the stolen CDN API key, the attackers modified JavaScript files distributed through Awesome Motive’s CDN. This caused websites to silently load malicious code directly from the CDN.\u003c/p\u003e\n\n\u003ch2 id=\"awesome-motive-s-response-and-stated-scope\"\u003eAwesome Motive’s response and stated scope\u003c/h2\u003e\n\n\u003cp\u003eAwesome Motive said it remediated the marketing site, migrated it to a new server, and rotated all credentials, including the CDN API key. The company also said its application servers, source code, and plugin hosting servers were not compromised.\u003c/p\u003e\n\n\u003cp\u003eThe company stated that the systems storing OptinMonster and TrustPulse account information are hosted separately and were not breached. It also said it has no evidence that account data or personal details held by the company were accessed.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-for-site-owners\"\u003eRecommended actions for site owners\u003c/h2\u003e\n\n\u003cp\u003eThe article says site owners who might have been affected are recommended to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck for and remove rogue admin accounts named \u003ccode\u003edeveloper_api1\u003c/code\u003e or \u003ccode\u003edev_xxxxxx\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInspect the filesystem directly under \u003ccode\u003ewp-content/plugins\u003c/code\u003e for hidden backdoor plugins.\u003c/li\u003e\n\u003cli\u003eExecute server-side malware scans.\u003c/li\u003e\n\u003cli\u003eRotate administrator passwords, API keys, database credentials, and WordPress security salts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAlthough the malicious content has been removed from the CDN, the article emphasizes that attackers can still retain access to compromised websites if rogue administrator accounts and hidden backdoor plugins remain installed.\u003c/p\u003e\n","keyPoints":["WordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack affecting Awesome Motive's content distribution network.","Sansec found that malicious scripts were served to OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC, while PushEngage served malicious JavaScript until 19:02 UTC on Saturday.","The malware triggered when a WordPress administrator visited an infected site, collected authentication tokens and nonces, and used them to create a rogue administrator account.","Attackers installed a self-hiding backdoor plugin with remote access capabilities, including a web shell named “WPM File Manager \u0026 Shell” and arbitrary PHP code execution.","Awesome Motive said attackers stole a CDN API key from a compromised marketing server after exploiting a known flaw in the UpdraftPlus WordPress plugin."],"insights":["Removing the malicious CDN content is not sufficient for recovery because attackers may retain access through rogue administrator accounts and hidden backdoor plugins left on compromised websites.","The malware only triggered when a WordPress administrator visited an infected website, making administrator activity a key condition for compromise and a focus for incident review.","The backdoor plugin changed its displayed disguise, including names such as “Content Delivery Helper” and “Database Optimizer,” while keeping the same underlying logic, so defenders should not rely only on plugin names during inspection.","A non-production marketing server became the path to compromise because it stored CDN account credentials, showing that credentials on systems outside production infrastructure can still enable large-scale supply-chain impact."],"referencedReports":[{"title":"OptinMonster Supply-Chain Attack","url":"https://sansec.io/research/optinmonster-supply-chain-attack","publisher":"Sansec","context":"The article cites Sansec's research as the source that discovered the malicious scripts and described the backdoor plugin behavior.","category":"research","primary":true},{"title":"Security Incident: Tampered Script Served via OptinMonster and TrustPulse","url":"https://optinmonster.com/security-incident-tampered-script-served-via-optinmonster-and-trustpulse/","publisher":"Awesome Motive","context":"The article references Awesome Motive's security advisory explaining how attackers stole the CDN API key and what systems were affected.","category":"advisory","primary":true}],"body":"\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack affecting Awesome Motive’s content distribution network. OptinMonster is the most widely used of the three, with at least 1.2 million websites using it. Security firm Sansec discovered the attack over the weekend.\u003c/p\u003e\n\n\u003cp\u003eSansec found that malicious scripts were served to OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC, while PushEngage continued serving malicious JavaScript until 19:02 UTC on Saturday. The malware activated when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces, then used them to create a rogue administrator account.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said attackers gained access to a server in its environment by exploiting a known flaw in the UpdraftPlus WordPress plugin and stole credentials for the company’s CDN account. The attackers used the stolen CDN API key to modify JavaScript files distributed through Awesome Motive’s CDN. Site owners are advised to remove rogue admin accounts and hidden backdoor plugins, scan servers, and rotate credentials because attackers may retain access even after the malicious CDN content was removed.\u003c/p\u003e\n"},{"n":10,"title":"LiteLLM Vulnerability Chain Lets Low-Privilege Users Take Over AI Gateway Servers","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/litellm-vulnerability-chain-lets-low.html","time":"16:39","priority":"MUST READ","score":93,"tldr":"A chain of three LiteLLM vulnerabilities lets a low-privilege user become admin and execute code on the AI gateway server, exposing provider keys, stored secrets, prompts, and responses. Users should upgrade to LiteLLM v1.83.14-stable or later and audit admin accounts, callbacks, guardrails, and credentials.","briefOverview":"\u003cp\u003eObsidian Security disclosed a three-vulnerability chain in LiteLLM that can allow a default low-privilege internal_user on a LiteLLM proxy to escalate to full admin and run code on the server. LiteLLM is described as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface. Obsidian rates the full chain CVSS 9.9, and BerriAI included the complete fix set in LiteLLM v1.83.14-stable.\u003c/p\u003e\n\n\u003cp\u003eThe chain consists of CVE-2026-47101, an authorization bypass involving unchecked allowed_routes values; CVE-2026-47102, a privilege escalation through unrestricted self-updates to user_role; and CVE-2026-40217, a Custom Code Guardrail sandbox escape enabling server-side code execution. The article says a compromised proxy can expose the master key, salt key, database URL, configured provider keys, stored credentials, prompts, and responses. If LiteLLM is also used as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials may also be in scope.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the proxy’s position between AI agents and models makes compromise especially serious because attackers can rewrite responses in transit. Obsidian demonstrated response manipulation against Claude Code routed through a compromised proxy by using LiteLLM’s callback mechanism to swap a model response for a forged tool call. Users are advised to upgrade to v1.83.14-stable or later, audit proxy_admin accounts, review Custom Code Guardrails and callbacks, verify deployed code integrity, and rotate credentials if exposure is suspected.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eObsidian Security disclosed a LiteLLM vulnerability chain that can let a default low-privilege account take over an AI gateway server. LiteLLM is described as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface. Obsidian rates the complete chain CVSS 9.9, and BerriAI shipped the complete fix set in LiteLLM v1.83.14-stable, which GitHub lists as released May 2.\u003c/p\u003e\n\n\u003cp\u003eThe first issue, CVE-2026-47101, is an authorization bypass involving the allowed_routes field used when a regular internal_user generates a virtual API key. LiteLLM stored the caller-supplied field without checking it against the user’s role, and the proxy treated it as a fallback grant. This meant a non-admin could mint a key with allowed_routes set to [\u0026ldquo;/*\u0026rdquo;], reaching admin-only routes.\u003c/p\u003e\n\n\u003cp\u003eThe second issue, CVE-2026-47102, is a privilege escalation in the /user/update endpoint. The endpoint lets a user edit their own record but did not restrict which fields they could write, allowing a self-update that sets user_role to \u0026ldquo;proxy_admin\u0026rdquo;. The article says an org_admin can reach this endpoint through a legitimate code path without the bypass, while a default internal_user reaches it after CVE-2026-47101.\u003c/p\u003e\n\n\u003cp\u003eThe third issue, CVE-2026-40217, is a sandbox escape in LiteLLM’s Custom Code Guardrail, which compiles and runs admin-supplied Python. Production endpoints ran code through exec() without source-level filtering, and Python injected the full builtins module when exec() received a globals dictionary without \u003cstrong\u003ebuiltins\u003c/strong\u003e. The article says this gave code access to \u003cstrong\u003eimport\u003c/strong\u003e, open, and eval, making a payload calling os.system enough for a reverse shell.\u003c/p\u003e\n\n\u003cp\u003eA full compromise can expose the LiteLLM master key, salt key, database URL, configured provider keys for services such as OpenAI, Anthropic, Gemini, Bedrock, and Azure, and all prompts and responses passing through the gateway. Keys stored in config or environment are plaintext, while database-stored keys are encrypted but recoverable with the salt key. If the proxy also runs as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials are also in scope.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the attacker’s ability to rewrite traffic may be sharper than the data exposure itself. Obsidian demonstrated this against Claude Code routed through a compromised proxy by using LiteLLM’s built-in callback mechanism, which fires on every request and does not appear in the admin UI, to replace a response with a forged tool call. The recommended response is to upgrade to v1.83.14-stable or later, audit proxy_admin accounts, review Custom Code Guardrails and config.yaml callbacks, verify deployed code integrity, and rotate provider keys, database credentials, and stored MCP tokens if exposure is suspected.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eObsidian Security disclosed a three-vulnerability chain in LiteLLM that can allow a default low-privilege user on a LiteLLM proxy to escalate to full admin and execute code on the server. LiteLLM is described in the article as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface.\u003c/p\u003e\n\n\u003cp\u003eThe article says a successful server takeover exposes every provider key the gateway holds, the secrets that decrypt stored credentials, and every prompt and response passing through the proxy. Obsidian rates the full chain CVSS 9.9, in the Critical range.\u003c/p\u003e\n\n\u003cp\u003eBerriAI, the maintainer, included the complete fix set in LiteLLM v1.83.14-stable, which GitHub lists as released May 2. The article recommends upgrading to that release or later.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-chain\"\u003eVulnerability Chain\u003c/h2\u003e\n\n\u003cp\u003eThe chain contains three vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-47101, an authorization bypass.\u003c/li\u003e\n\u003cli\u003eCVE-2026-47102, a privilege escalation flaw.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40217, a Custom Code Guardrail sandbox escape.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTogether, these issues allow a low-privilege internal_user to bypass route restrictions, reach administrative functionality, promote itself to proxy_admin, and execute server-side code.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-47101-authorization-bypass\"\u003eCVE-2026-47101: Authorization Bypass\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-47101 is described as the first link in the chain. When a regular user, identified in the article as an internal_user, generates a virtual API key, LiteLLM stores the caller-supplied allowed_routes field without checking it against the user’s role.\u003c/p\u003e\n\n\u003cp\u003eThe allowed_routes field is supposed to narrow what a key can do. Instead, the proxy also treats it as a fallback grant. Because of that behavior, a non-admin can mint a key with allowed_routes set to [\u0026ldquo;/*\u0026rdquo;], a wildcard that reaches every route, including admin-only routes.\u003c/p\u003e\n\n\u003cp\u003eThe article says the same unchecked write appears on other key-management endpoints. It also says the fix required three pull requests to land.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-47102-privilege-escalation\"\u003eCVE-2026-47102: Privilege Escalation\u003c/h2\u003e\n\n\u003cp\u003eOnce the route gate is bypassed, administrative handlers become reachable. CVE-2026-47102 is a privilege escalation issue in the /user/update endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe endpoint lets a user edit their own record, but it did not restrict which fields they could write. A self-update with user_role set to \u0026ldquo;proxy_admin\u0026rdquo; was accepted and saved, promoting the caller to full proxy admin.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that an org_admin can hit this endpoint through a legitimate, intended code path with no bypass required. A default internal_user reaches it after exploiting CVE-2026-47101. VulnCheck, which assigned the CVE, scores it 8.7 under CVSS 4.0 and 8.8 under CVSS 3.1.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-40217-custom-code-guardrail-sandbox-escape\"\u003eCVE-2026-40217: Custom Code Guardrail Sandbox Escape\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-40217 is a sandbox escape in LiteLLM’s Custom Code Guardrail. The article describes this feature as compiling and running admin-supplied Python.\u003c/p\u003e\n\n\u003cp\u003eThe production endpoints ran the code through exec() with no source-level filtering. When exec() receives a globals dictionary without \u003cstrong\u003ebuiltins\u003c/strong\u003e, Python silently injects the full builtins module. This gives the executed code access to \u003cstrong\u003eimport\u003c/strong\u003e, open, and eval.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, a plain payload calling os.system was then enough for a reverse shell. The article also says X41 D-Sec independently found a separate path on the /guardrails/test_custom_code playground endpoint that defeated a regex deny-list through runtime bytecode rewriting. Both paths resulted in server-side code execution.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-data-and-credentials\"\u003eExposed Data and Credentials\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that LiteLLM sits at a chokepoint, making compromise especially broad in impact. A full chain exposes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe master key.\u003c/li\u003e\n\u003cli\u003eThe salt key used to decrypt stored credentials.\u003c/li\u003e\n\u003cli\u003eThe database URL.\u003c/li\u003e\n\u003cli\u003eConfigured provider keys.\u003c/li\u003e\n\u003cli\u003eStored credentials.\u003c/li\u003e\n\u003cli\u003ePrompts and responses passing through the gateway.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article specifically names OpenAI, Anthropic, Gemini, Bedrock, and Azure among the provider keys that may be exposed. Keys in config or environment are plaintext. Keys in the database are encrypted but recoverable with the salt key.\u003c/p\u003e\n\n\u003cp\u003eThe article also says that prompts and responses in real deployments can include PII, source code, internal tickets, and pasted secrets. If the proxy also runs as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials are in scope too.\u003c/p\u003e\n\n\u003ch2 id=\"response-manipulation-risk\"\u003eResponse Manipulation Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the sharper risk is not only what an attacker can read, but what they can rewrite. Because the gateway sits between an AI agent and the model, a compromise lets an attacker alter responses in transit.\u003c/p\u003e\n\n\u003cp\u003eObsidian demonstrated this against Claude Code routed through a compromised proxy. The article stresses that this is not prompt injection. Instead of persuading the model to misbehave, the attacker uses LiteLLM’s built-in callback mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe callback mechanism is described as an extension point that fires on every request and never shows up in the admin UI. In Obsidian’s demonstration, the callback swapped the model’s response for a forged tool call and rewrote the safety-check context so the action appeared approved. In the demo, the developer typed one word, \u0026ldquo;hello,\u0026rdquo; and the attacker obtained a reverse shell on the developer’s machine.\u003c/p\u003e\n\n\u003ch2 id=\"mcp-related-code-execution-context\"\u003eMCP-Related Code Execution Context\u003c/h2\u003e\n\n\u003cp\u003eSeparate from the three-vulnerability chain, the article says LiteLLM gives a proxy_admin an intentional code-execution path. Its Model Context Protocol support lets an admin register stdio MCP servers that the proxy launches as local subprocesses.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a design trade-off rather than a bug, and says the patches do not change it. As a result, reaching admin is effectively reaching code execution.\u003c/p\u003e\n\n\u003cp\u003eObsidian reproduced a reverse shell this way on v1.88.0. The article also mentions CVE-2026-42271, a separate bug in the same stdio-MCP machinery that let callers spawn subprocesses through LiteLLM’s MCP preview endpoints. That issue was exploited in the wild and added to CISA’s Known Exploited Vulnerabilities catalog earlier this month.\u003c/p\u003e\n\n\u003ch2 id=\"prior-litellm-security-issues-mentioned\"\u003ePrior LiteLLM Security Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article says this is not LiteLLM’s first rough stretch this year. It cites a March supply-chain compromise that backdoored two LiteLLM releases on PyPI. It also cites an April critical SQL injection that was exploited within 36 hours of disclosure.\u003c/p\u003e\n\n\u003cp\u003eFor the vulnerability chain discussed in this article, Obsidian frames it as a disclosed flaw with a working demo, not as exploitation seen in the wild. The article says the proxy’s position keeps making it a target.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends upgrading to LiteLLM v1.83.14-stable or later, the first release with the full fix set. It also recommends auditing the environment after upgrading.\u003c/p\u003e\n\n\u003cp\u003eSpecific actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRe-verify every account holding proxy_admin.\u003c/li\u003e\n\u003cli\u003eTreat the proxy_admin role as host-level access.\u003c/li\u003e\n\u003cli\u003eReview every Custom Code Guardrail on the proxy.\u003c/li\u003e\n\u003cli\u003eCheck callbacks loaded from config.yaml under litellm_settings.callbacks.\u003c/li\u003e\n\u003cli\u003eVerify the integrity of the deployed code, not just the configuration.\u003c/li\u003e\n\u003cli\u003eIf exposure is suspected, rotate provider keys, database credentials, and any stored MCP tokens.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article concludes that a compromised LiteLLM proxy does not just leak data. Because it sits between the agent and the model, it can forge the responses that the agent acts on. It characterizes the vulnerability chain as misplaced trust at multiple layers: the route gate trusted a caller-supplied field, the handlers trusted the route gate, and nobody actually checked.\u003c/p\u003e\n","keyPoints":["Obsidian Security disclosed a three-vulnerability LiteLLM proxy chain, rated CVSS 9.9, that can let a default low-privilege internal_user escalate to full admin and run code on the server.","The chain includes CVE-2026-47101, an authorization bypass via unchecked allowed_routes values, CVE-2026-47102, a privilege escalation through unrestricted /user/update fields, and CVE-2026-40217, a Custom Code Guardrail sandbox escape enabling server-side code execution.","BerriAI fixed the complete three-CVE chain in LiteLLM v1.83.14-stable, which GitHub lists as released May 2, and users are advised to upgrade to that release or later.","A successful takeover can expose LiteLLM’s master key, salt key, database URL, configured provider keys, stored credentials, prompts, responses, and, when used as an MCP or agent gateway, OAuth tokens and tool credentials.","The article recommends auditing proxy_admin accounts, reviewing Custom Code Guardrails and callbacks in config.yaml, verifying deployed code integrity, and rotating provider keys, database credentials, and stored MCP tokens if exposure is suspected."],"insights":["LiteLLM callbacks loaded from config.yaml are especially important to audit because they fire on every request, do not appear in the admin UI, and were used in Obsidian’s demo to replace a model response with a forged tool call.","The proxy_admin role should be treated as host-level access because LiteLLM’s MCP support intentionally allows admins to register stdio MCP servers that the proxy launches as local subprocesses, and the patches do not change this behavior.","Encrypted provider credentials stored in the LiteLLM database may still be recoverable after compromise because the same takeover can expose the salt key used to decrypt them.","CVE-2026-47102 is reachable by an org_admin through an intended code path without needing the authorization bypass, while a default internal_user can reach it only after exploiting CVE-2026-47101."],"referencedReports":[{"title":"LiteLLM Privilege Escalation RCE","url":"https://www.obsidiansecurity.com/blog/litellm-privilege-escalation-rce","publisher":"Obsidian Security","context":"The article cites Obsidian Security’s disclosure and demonstration of the LiteLLM vulnerability chain, including response tampering against Claude Code through a compromised proxy.","category":"research","primary":true},{"title":"X41-2026-001 LiteLLM","url":"https://www.x41-dsec.de/lab/advisories/x41-2026-001-litellm/","publisher":"X41 D-Sec","context":"The article references X41 D-Sec’s independently found advisory on a /guardrails/test_custom_code sandbox escape path using runtime bytecode rewriting.","category":"advisory","primary":false}],"body":"\u003cp\u003eObsidian Security disclosed a three-vulnerability chain in LiteLLM that can allow a default low-privilege internal_user on a LiteLLM proxy to escalate to full admin and run code on the server. LiteLLM is described as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface. Obsidian rates the full chain CVSS 9.9, and BerriAI included the complete fix set in LiteLLM v1.83.14-stable.\u003c/p\u003e\n\n\u003cp\u003eThe chain consists of CVE-2026-47101, an authorization bypass involving unchecked allowed_routes values; CVE-2026-47102, a privilege escalation through unrestricted self-updates to user_role; and CVE-2026-40217, a Custom Code Guardrail sandbox escape enabling server-side code execution. The article says a compromised proxy can expose the master key, salt key, database URL, configured provider keys, stored credentials, prompts, and responses. If LiteLLM is also used as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials may also be in scope.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the proxy’s position between AI agents and models makes compromise especially serious because attackers can rewrite responses in transit. Obsidian demonstrated response manipulation against Claude Code routed through a compromised proxy by using LiteLLM’s callback mechanism to swap a model response for a forged tool call. Users are advised to upgrade to v1.83.14-stable or later, audit proxy_admin accounts, review Custom Code Guardrails and callbacks, verify deployed code integrity, and rotate credentials if exposure is suspected.\u003c/p\u003e\n"},{"n":3,"title":"Council of Europe investigates ShinyHunters data breach claims","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/council-of-europe-investigates-shinyhunters-data-breach-claims/","time":"16:37","priority":"SHOULD READ","score":88,"tldr":"The Council of Europe is investigating ShinyHunters’ claim that it stole over 429,000 HR and payroll documents containing sensitive personal and financial data. The extortion group has threatened to leak the files if the organization does not respond by June 16, 2026.","briefOverview":"\u003cp\u003eThe Council of Europe is investigating claims by the ShinyHunters extortion group that it breached the organization and stole data. The Council told BleepingComputer that it is assessing the situation and has no further comment at this stage. The organization is described as Europe’s oldest intergovernmental body and a leading human rights organization representing 46 European member states and more than 700 million people.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed on its dark web leak site that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. The group threatened to leak the allegedly exfiltrated files on Tuesday and issued a deadline of June 16, 2026, for the Council to reach out. The allegedly stolen records include payslips, personnel files, CVs, and other files.\u003c/p\u003e\n\n\u003cp\u003eThe claimed data includes sensitive personal and financial information such as names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, and medical records. The article also notes that ShinyHunters has recently claimed or been linked to campaigns involving Salesforce customers, Snowflake customers, third-party integration providers, and Oracle PeopleSoft servers. These prior claims are presented as context for the group’s recent activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Council of Europe is probing claims by the ShinyHunters extortion group that it suffered a data breach. The Council’s media department told BleepingComputer that the organization is currently investigating the matter and assessing the situation. It said it had no further comment to make at this stage.\u003c/p\u003e\n\n\u003cp\u003eThe Council of Europe is described as Europe’s oldest intergovernmental body and its leading human rights organization. It represents 46 European member states and a population of more than 700 million people. Its work focuses on promoting democracy and the rule of law across Europe and beyond.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters posted the claim on its dark web leak site over the weekend. The group said it had stolen more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. It threatened to leak the allegedly exfiltrated files on Tuesday and issued what it called a final warning to reach out by June 16, 2026.\u003c/p\u003e\n\n\u003cp\u003eAccording to ShinyHunters, the allegedly stolen material includes more than 409,000 payslips for over 10,000 staff from 2011 to 2026. The group also claimed to have over 3,700 in-house personnel files, more than 14,000 CVs, and other files. The article says the stolen files allegedly contain names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, medical records, and more.\u003c/p\u003e\n\n\u003cp\u003eThe article places the Council of Europe claim within a broader pattern of recent ShinyHunters activity. Over the past year, the group has claimed attacks targeting Salesforce customers and said it stole more than 1.5 billion records in breaches affecting hundreds of companies and organizations through Salesforce Aura and Salesloft Drift campaigns. The group was also linked to attacks against more than a dozen Snowflake customers and other third-party integration providers.\u003c/p\u003e\n\n\u003cp\u003eMore recently, ShinyHunters claimed responsibility for a data theft campaign that led to breaches at over 100 organizations, including the University of Nottingham. The article says that campaign followed exploitation of a zero-day vulnerability in Oracle’s PeopleSoft enterprise business software suite. These references provide context for the group’s recent claims but do not confirm the Council of Europe incident.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Council of Europe is investigating claims of a data breach made by the ShinyHunters extortion group. The Council of Europe told BleepingComputer that it is currently investigating the matter and assessing the situation. The organization said it had no further comment at this stage.\u003c/p\u003e\n\n\u003cp\u003eThe Council of Europe is described as Europe’s oldest intergovernmental body and a leading human rights organization. It represents 46 European member states and a population of more than 700 million people. The article says the organization promotes democracy and the rule of law across Europe and beyond.\u003c/p\u003e\n\n\u003ch2 id=\"shinyhunters-claim\"\u003eShinyHunters’ Claim\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters posted the breach claim on its dark web leak site over the weekend. The group claimed to have stolen more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. It threatened to leak the allegedly exfiltrated files on Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe group described its message as a final warning and told the Council of Europe to reach out by June 16, 2026. It also threatened “several annoying (digital) problems” if the deadline was not met. The article does not state that the Council of Europe confirmed the breach.\u003c/p\u003e\n\n\u003ch2 id=\"allegedly-stolen-data\"\u003eAllegedly Stolen Data\u003c/h2\u003e\n\n\u003cp\u003eAccording to ShinyHunters, the allegedly stolen documents include several categories of internal and personnel-related records:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 409,000 payslips for over 10,000 staff, ranging from 2011 to 2026.\u003c/li\u003e\n\u003cli\u003eMore than 3,700 in-house personnel files.\u003c/li\u003e\n\u003cli\u003eMore than 14,000 CVs.\u003c/li\u003e\n\u003cli\u003eOther files not further specified in the article.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the allegedly stolen files contain a wide range of personal and financial information. The listed information includes names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, medical records, and more.\u003c/p\u003e\n\n\u003ch2 id=\"response-from-the-council-of-europe\"\u003eResponse From the Council of Europe\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer asked the Council of Europe to confirm the cybercrime gang’s claims. The Council’s media department responded that the organization is looking into the matter. It said, “We are currently investigating the matter and assessing the situation. We have no further comment to make at this stage.”\u003c/p\u003e\n\n\u003cp\u003eThe article provides no additional statement from the Council of Europe. It also does not report confirmation that the files are authentic or that the claimed breach occurred.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-context\"\u003eThreat Actor Context\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies ShinyHunters as an extortion group. It notes that, over the past year, the group has claimed attacks targeting Salesforce customers. ShinyHunters said it had stolen more than 1.5 billion records in breaches affecting hundreds of companies and organizations worldwide through Salesforce Aura and Salesloft Drift campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe article also says ShinyHunters was linked to high-profile attacks against more than a dozen Snowflake customers. It additionally mentions attacks involving other third-party integration providers. These incidents are presented as part of the group’s recent activity.\u003c/p\u003e\n\n\u003ch2 id=\"recent-oracle-peoplesoft-campaign\"\u003eRecent Oracle PeopleSoft Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article states that, last week, ShinyHunters claimed responsibility for a new data theft campaign affecting more than 100 organizations. The University of Nottingham is named as one of the affected organizations in that campaign. The article says the campaign followed exploitation of a zero-day vulnerability in Oracle’s PeopleSoft enterprise business software suite.\u003c/p\u003e\n\n\u003cp\u003eThis prior activity is included as background for ShinyHunters’ broader operations. The article does not say that Oracle PeopleSoft was involved in the alleged Council of Europe breach.\u003c/p\u003e\n\n\u003ch2 id=\"known-status\"\u003eKnown Status\u003c/h2\u003e\n\n\u003cp\u003eAt the time described in the article, the key confirmed fact is that the Council of Europe is investigating the claim. The alleged breach details, including the number of documents and the types of data stolen, come from ShinyHunters’ statements on its leak site. The article does not report independent confirmation that the data was stolen or that the threatened leak occurred.\u003c/p\u003e\n","keyPoints":["The Council of Europe said it is investigating claims by the ShinyHunters extortion group that it breached the organization and stole data.","ShinyHunters claimed on its dark web leak site that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments.","The allegedly stolen files include more than 409,000 payslips for over 10,000 staff from 2011 to 2026, over 3,700 in-house personnel files, more than 14,000 CVs, and other files.","The claimed stolen data includes names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, medical records, and more.","ShinyHunters threatened to leak the allegedly exfiltrated files on Tuesday if the Council of Europe did not reach out by June 16, 2026."],"insights":["The alleged data set is especially sensitive because it combines HR, payroll, financial, tax, Social Security, and medical information rather than only basic contact details.","The claimed exposure spans a long time period, with payslips allegedly covering staff records from 2011 through 2026.","The Council of Europe has not confirmed ShinyHunters’ claims and has only stated that it is investigating and assessing the situation.","The article places the claim in the context of ShinyHunters’ recent activity against widely used enterprise platforms, including Salesforce, Snowflake, Salesloft Drift, and Oracle PeopleSoft."],"referencedReports":[],"body":"\u003cp\u003eThe Council of Europe is investigating claims by the ShinyHunters extortion group that it breached the organization and stole data. The Council told BleepingComputer that it is assessing the situation and has no further comment at this stage. The organization is described as Europe’s oldest intergovernmental body and a leading human rights organization representing 46 European member states and more than 700 million people.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed on its dark web leak site that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. The group threatened to leak the allegedly exfiltrated files on Tuesday and issued a deadline of June 16, 2026, for the Council to reach out. The allegedly stolen records include payslips, personnel files, CVs, and other files.\u003c/p\u003e\n\n\u003cp\u003eThe claimed data includes sensitive personal and financial information such as names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, and medical records. The article also notes that ShinyHunters has recently claimed or been linked to campaigns involving Salesforce customers, Snowflake customers, third-party integration providers, and Oracle PeopleSoft servers. These prior claims are presented as context for the group’s recent activity.\u003c/p\u003e\n"},{"n":9,"title":"One-Click Microsoft 365 Copilot Flaw Could Have Let Attackers Steal Emails, Files, and MFA Codes","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/one-click-microsoft-365-copilot-flaw.html","time":"15:09","priority":"SHOULD READ","score":84,"tldr":"Researchers showed that a one-click flaw in Microsoft 365 Copilot Enterprise Search could have let attackers steal a user’s emails, files, calendar data, and even MFA codes by chaining prompt injection with rendering and CSP bypass issues. Microsoft has mitigated the backend flaw, and there is no evidence it was exploited in the wild.","briefOverview":"\u003cp\u003eVaronis Threat Labs demonstrated a one-click exfiltration path in Microsoft 365 Copilot Enterprise Search called SearchLeak. A victim clicking a trusted Microsoft link could have allowed an attacker to pull emails, calendar details, and indexed files through Copilot. Microsoft assigned CVE-2026-42824, marked it critical, and mitigated the issue on its backend.\u003c/p\u003e\n\n\u003cp\u003eSearchLeak chained three issues: Parameter-to-Prompt injection in the Copilot Enterprise Search q parameter, a rendering race condition, and a Content Security Policy bypass using Bing’s Search by Image endpoint. The attack could cause Copilot to search the signed-in user’s data, embed stolen text into an image URL, and route the exfiltration through Bing. Varonis presented a proof-of-concept and reported no observed exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Copilot Enterprise can access whatever the signed-in user can reach through Microsoft Graph. That includes inbox contents such as one-time codes, MFA codes, and password-reset links, as well as calendar invites, meeting notes, and SharePoint or OneDrive files indexed by Copilot. Because Copilot Enterprise is managed by Microsoft, tenant admins cannot patch the failed components directly, but they can monitor suspicious Copilot Search URLs and tighten data-access governance.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVaronis Threat Labs identified a Microsoft 365 Copilot Enterprise Search flaw they call SearchLeak, which could have allowed one-click data exfiltration. The attack began when a victim clicked a trusted Microsoft link, with no prompt, password, or second click required. Because the link pointed to a real microsoft.com domain, the article says traditional anti-phishing and URL filtering tools were unlikely to flag it. Microsoft assigned CVE-2026-42824, marked it critical, and mitigated it on the backend.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain relied on three linked issues. First, the q parameter in the Copilot Enterprise Search URL accepted natural-language content that Copilot interpreted as instructions rather than only as a search string. Varonis described this as Parameter-to-Prompt injection. An attacker could craft a URL that told Copilot to search the mailbox, take an email title, and place it inside an image URL.\u003c/p\u003e\n\n\u003cp\u003eThe second issue was a race condition in the way Copilot output was rendered. Microsoft’s guardrail wrapped Copilot output in code blocks so the browser treated markup as text, but the wrapping occurred after Copilot finished generating. During streaming, the browser rendered the injected img tag and sent its request before sanitization neutralized the output. As a result, the outbound request could leave before the protection took effect.\u003c/p\u003e\n\n\u003cp\u003eThe third issue allowed the data to get past the page’s Content Security Policy. The CSP on m365.cloud.microsoft blocked images from arbitrary domains but allowlisted *.bing.com. Bing’s Search by Image endpoint accepted an image URL and fetched it server-side, allowing Bing to retrieve an attacker-controlled URL containing the stolen text in the path. The article describes Bing as becoming the exfiltration proxy because the browser’s CSP did not apply to Bing’s server-side request.\u003c/p\u003e\n\n\u003cp\u003eThe potential impact came from Copilot Enterprise’s access to whatever the signed-in user could reach through Microsoft Graph. The article highlights inbox items such as one-time codes, M
