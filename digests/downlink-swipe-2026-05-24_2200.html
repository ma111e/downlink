window.__DL_ARTICLES = [{"n":3,"title":"25th May – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/25th-may-threat-intelligence-report/","time":"15:08","priority":"MUST READ","score":92,"tldr":"This week’s threat intelligence shows a sharp rise in real-world cyber risk driven by major breaches, active exploitation of critical vulnerabilities, and increasingly routine criminal use of AI for phishing, fraud, and intrusion. The main takeaway is that organizations need to patch quickly, secure code and identity systems, and prepare for more scalable, stealthy attacks powered by stolen tokens, supply chain compromises, and AI-assisted tactics.","briefOverview":"\u003cp\u003eThis threat intelligence report for the week of 25th May highlights a mix of major breaches, active phishing operations, AI-enabled abuse, and high-severity vulnerabilities under active exploitation. The article points to incidents affecting 7-Eleven, GitHub, and Grafana Labs, along with an FBI warning about the Kali365 phishing-as-a-service kit targeting Microsoft 365 users. It also emphasizes that several vulnerabilities, including flaws in Windows Defender, Trend Micro Apex One, and Drupal, were already being exploited or attacked.\u003c/p\u003e\n\n\u003cp\u003eA major theme in the report is the operational use of AI in cybercrime. Check Point Research said AI-driven attacks have entered routine criminal use, citing a campaign in which a single operator used commercial AI to compromise nine Mexican government agencies and run more than 5,000 automated commands. The article also describes phishing campaigns that use invisible text as indirect prompt injections against AI-powered email filters and an AI-driven influence and fraud campaign tied to a Russian-speaking actor.\u003c/p\u003e\n\n\u003cp\u003eThe report also summarizes current threat research on state-linked and criminal activity. Check Point Research detailed renewed Nimbus Manticore campaigns using SEO poisoning and career-themed phishing to deliver a new MiniFast backdoor, while other researchers reported the Showboat Linux malware family targeting telecoms, a Laravel Lang supply chain compromise, and broad abuse of Middle Eastern telecom and hosting networks for command-and-control infrastructure. Throughout, the article stresses both the breadth of active threats and the availability of specific protections from Check Point for some of them.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis weekly threat intelligence report compiles notable cyber incidents, research findings, and vulnerability updates for the week of 25th May. It opens by pointing readers to a downloadable Threat Intelligence Bulletin and then summarizes significant breaches, AI-related threat developments, active vulnerabilities, and recent threat research. Across these categories, the article presents a picture of both broad operational activity and active exploitation.\u003c/p\u003e\n\n\u003cp\u003eAmong the top attacks and breaches, 7-Eleven confirmed a breach involving unauthorized access to systems used for franchisee documents. ShinyHunters claimed responsibility and said it stole more than 600,000 Salesforce records containing personal and corporate information, and affected individuals were offered identity protection services. GitHub also suffered a breach after attackers weaponized a Visual Studio Code extension to compromise an employee device and steal internal source code, with the company estimating that about 3,800 internal repositories were exfiltrated and reporting no evidence of impact on customer-facing systems.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs disclosed a separate breach in which a compromised GitHub token gave intruders access to parts of its source code. The company said it refused to pay ransom and reported no customer data exposure or service disruption. The FBI also warned about Kali365, a phishing-as-a-service kit distributed mainly through Telegram that targets Microsoft 365 users with device-code phishing, captures OAuth access and refresh tokens, and enables persistent access to Outlook, Teams, and OneDrive while bypassing MFA.\u003c/p\u003e\n\n\u003cp\u003eThe article places special emphasis on AI threats. Check Point Research released its March-April 2026 AI Threat Landscape digest and said AI-driven attacks have moved into routine criminal use, highlighting a campaign in which a single operator used commercial AI to compromise nine Mexican government agencies and execute more than 5,000 automated commands. It also notes malicious configuration files that override safety controls, commercialized toolkits, and stolen API keys, while other researchers described phishing campaigns using invisible text to manipulate AI-powered email filters and an AI-driven influence and fraud operation run by a Russian-speaking actor behind a MAGA-themed Telegram channel.\u003c/p\u003e\n\n\u003cp\u003eOn vulnerabilities and patches, Microsoft published fixes for CVE-2026-41091 and CVE-2026-45498, two actively exploited Windows Defender flaws affecting the Malware Protection Engine and Defender Antimalware Platform. Trend Micro addressed CVE-2026-34926, a directory traversal flaw in Apex One on-premises servers that lets attackers with administrator access push malicious code to endpoints, and exploitation attempts were observed against Windows systems. Drupal also released emergency patches for CVE-2026-9082, a critical SQL injection flaw affecting PostgreSQL-backed Drupal sites, and the article says active attacks were reported shortly after disclosure across thousands of sites.\u003c/p\u003e\n\n\u003cp\u003eThe threat intelligence section rounds out the report with several additional campaigns and malware findings. Check Point Research described new Nimbus Manticore campaigns during Operation Epic Fury, saying the IRGC-linked group used SEO poisoning and career-themed phishing across the United States, Europe, and the Middle East to deliver a new MiniFast backdoor. The article also cites a reported 124% surge in hacktivism and ransomware across Germany, Austria, and Switzerland in 2025, the discovery of the Showboat Linux malware family targeting international telecommunications providers, a supply chain attack on Laravel Lang packages through malicious Composer tag rewrites, and the identification of more than 1,350 active command-and-control servers across 98 Middle Eastern telecom and hosting providers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"25th-may-threat-intelligence-report\"\u003e25th May Threat Intelligence Report\u003c/h1\u003e\n\n\u003cp\u003eThis article is a weekly threat intelligence roundup covering major breaches, phishing activity, AI-related abuse, actively exploited vulnerabilities, and recent threat research. It points readers to Check Point Research’s downloadable Threat Intelligence Bulletin and then summarizes the most notable items for the week of 25th May.\u003c/p\u003e\n\n\u003cp\u003eThe report is organized into four main areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTop attacks and breaches\u003c/li\u003e\n\u003cli\u003eAI threats\u003c/li\u003e\n\u003cli\u003eVulnerabilities and patches\u003c/li\u003e\n\u003cli\u003eThreat intelligence reports\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"top-attacks-and-breaches\"\u003eTop Attacks and Breaches\u003c/h2\u003e\n\n\u003ch3 id=\"7-eleven-breach\"\u003e7-Eleven breach\u003c/h3\u003e\n\n\u003cp\u003eThe article says 7-Eleven, the global convenience store chain, confirmed a breach after unauthorized access to systems used for franchisee documents. ShinyHunters claimed responsibility for the incident and said it stole more than 600,000 Salesforce records containing personal and corporate information. The article adds that affected individuals were offered identity protection services.\u003c/p\u003e\n\n\u003ch3 id=\"github-breach-via-visual-studio-code-extension\"\u003eGitHub breach via Visual Studio Code extension\u003c/h3\u003e\n\n\u003cp\u003eGitHub is described as having suffered a breach after attackers weaponized a Visual Studio Code extension to compromise an employee device and steal internal source code. The company estimated that about 3,800 internal repositories were exfiltrated. According to the article, there was no evidence of impact on customer-facing systems.\u003c/p\u003e\n\n\u003ch3 id=\"grafana-labs-source-code-exposure-via-compromised-github-token\"\u003eGrafana Labs source code exposure via compromised GitHub token\u003c/h3\u003e\n\n\u003cp\u003eGrafana Labs disclosed a breach in which a compromised GitHub token allowed intruders to access parts of its source code. The company said it refused to pay ransom to the attackers. It also stated that there was no customer data exposure or service disruption.\u003c/p\u003e\n\n\u003ch3 id=\"fbi-warning-on-kali365\"\u003eFBI warning on Kali365\u003c/h3\u003e\n\n\u003cp\u003eThe FBI warned about Kali365, a phishing-as-a-service kit that is actively being used to target Americans and is distributed mainly through Telegram. The article says the platform targets Microsoft 365 users with device-code phishing. It captures OAuth access and refresh tokens and enables persistent access to Outlook, Teams, and OneDrive while bypassing MFA.\u003c/p\u003e\n\n\u003ch2 id=\"ai-threats\"\u003eAI Threats\u003c/h2\u003e\n\n\u003ch3 id=\"ai-driven-attacks-described-as-routine-criminal-use\"\u003eAI-driven attacks described as routine criminal use\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research released the March-April 2026 AI Threat Landscape digest and said AI-driven attacks have entered routine criminal use. The article cites a campaign in which a single operator used commercial AI to compromise nine Mexican government agencies and execute more than 5,000 automated commands. It also says the digest notes malicious configuration files that override safety controls, commercialized toolkits, and stolen API keys enabling abuse.\u003c/p\u003e\n\n\u003ch3 id=\"invisible-text-used-to-evade-ai-powered-email-filters\"\u003eInvisible text used to evade AI-powered email filters\u003c/h3\u003e\n\n\u003cp\u003eThe article references research describing phishing campaigns that use indirect prompt injections to evade AI-powered email filters. Attackers embed invisible text inside messages using zero-size fonts or background-matched colors. As described in the article, recipients see ordinary content while AI scanning tools process attacker instructions during automated security review.\u003c/p\u003e\n\n\u003ch3 id=\"ai-driven-influence-and-fraud-campaign\"\u003eAI-driven influence and fraud campaign\u003c/h3\u003e\n\n\u003cp\u003eResearchers unveiled an AI-driven influence and fraud campaign run by a Russian-speaking actor behind a MAGA-themed Telegram channel with 17,000 subscribers. The article says the operator bypassed Gemini safeguards to automate propaganda and credential theft. It also states that the actor used stolen API keys, cracked WordPress accounts, and drained a crypto wallet.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and Patches\u003c/h2\u003e\n\n\u003ch3 id=\"microsoft-windows-defender-flaws\"\u003eMicrosoft Windows Defender flaws\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft published fixes for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-41091\u003c/li\u003e\n\u003cli\u003eCVE-2026-45498\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese are described as two actively exploited Windows Defender flaws affecting the Malware Protection Engine and Defender Antimalware Platform. The article says the first allows local privilege escalation, while the second can cause denial of service. Updated components were released automatically through normal Defender updates.\u003c/p\u003e\n\n\u003ch3 id=\"trend-micro-apex-one-flaw\"\u003eTrend Micro Apex One flaw\u003c/h3\u003e\n\n\u003cp\u003eTrend Micro addressed CVE-2026-34926, described as a directory traversal flaw in Apex One on-premises servers. According to the article, the flaw allows attackers with administrator access to push malicious code to endpoints. Exploitation attempts were observed against Windows systems, and the issue affects the enterprise endpoint security platform in corporate deployments.\u003c/p\u003e\n\n\u003ch3 id=\"drupal-sql-injection-flaw\"\u003eDrupal SQL injection flaw\u003c/h3\u003e\n\n\u003cp\u003eDrupal released emergency patches for CVE-2026-9082, a critical SQL injection flaw affecting Drupal sites using PostgreSQL. The article says successful exploitation can allow database command execution, potentially leading to data theft or code execution. It also notes that active attacks were reported shortly after disclosure across thousands of sites.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically adds that Check Point IPS provides protection against this threat under the signature name:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDrupal Core SQL Injection (CVE-2026-9082)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-intelligence-reports\"\u003eThreat Intelligence Reports\u003c/h2\u003e\n\n\u003ch3 id=\"nimbus-manticore-activity-during-the-iranian-conflict\"\u003eNimbus Manticore activity during the Iranian conflict\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research revealed new campaigns by Nimbus Manticore, described as an IRGC-linked group that resurfaced during Operation Epic Fury with upgraded techniques. The campaigns used SEO poisoning and career-themed phishing across the United States, Europe, and the Middle East. The article says these campaigns delivered a new MiniFast backdoor.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that the following Check Point products provide protection against this threat:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck Point Threat Emulation\u003c/li\u003e\n\u003cli\u003eHarmony Endpoint\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"124-surge-in-hacktivism-and-ransomware-in-dach\"\u003e124% surge in hacktivism and ransomware in DACH\u003c/h3\u003e\n\n\u003cp\u003eCheck Point researchers highlighted a 124% surge in hacktivism and ransomware across Germany, Austria, and Switzerland in 2025. Germany accounted for most incidents. The article says hacktivists drove defacements and DDoS attacks, while ransomware activity was led by Akira, Qilin, and Safepay.\u003c/p\u003e\n\n\u003ch3 id=\"showboat-malware-targeting-telecom-providers\"\u003eShowboat malware targeting telecom providers\u003c/h3\u003e\n\n\u003cp\u003eResearchers uncovered Showboat, a Linux malware family used against international telecommunications providers. The article describes it as a modular post-exploitation framework that can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ehide processes\u003c/li\u003e\n\u003cli\u003etransfer files\u003c/li\u003e\n\u003cli\u003espawn remote shells\u003c/li\u003e\n\u003cli\u003eoperate as a SOCKS5 proxy\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe activity is attributed in the article to China-aligned threat actors.\u003c/p\u003e\n\n\u003ch3 id=\"laravel-lang-supply-chain-attack\"\u003eLaravel Lang supply chain attack\u003c/h3\u003e\n\n\u003cp\u003eResearchers uncovered a supply chain attack on Laravel Lang localization packages via Composer. According to the article, attackers rewrote GitHub tags to point to malicious commits. The campaign deployed a cross-platform credential stealer targeting cloud keys, developer tokens, and browser passwords across hundreds of package versions.\u003c/p\u003e\n\n\u003ch3 id=\"abuse-of-middle-eastern-telecom-and-hosting-networks\"\u003eAbuse of Middle Eastern telecom and hosting networks\u003c/h3\u003e\n\n\u003cp\u003eResearchers identified large-scale abuse of Middle Eastern telecom and hosting networks. The article says there were more than 1,350 active command-and-control servers across 98 providers. Linked activity included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhorpiex\u003c/li\u003e\n\u003cli\u003eEagle Werewolf espionage\u003c/li\u003e\n\u003cli\u003eexploitation of a React Native CLI flaw\u003c/li\u003e\n\u003cli\u003eRondoDox botnet activity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-themes-across-the-report\"\u003eMain Themes Across the Report\u003c/h2\u003e\n\n\u003cp\u003eSeveral recurring patterns appear across the items collected in this weekly summary.\u003c/p\u003e\n\n\u003ch3 id=\"source-code-and-software-ecosystem-exposure\"\u003eSource code and software ecosystem exposure\u003c/h3\u003e\n\n\u003cp\u003eThe article includes multiple incidents involving code repositories, developer infrastructure, or software supply chains:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub’s internal repositories were exfiltrated after a VS Code extension was weaponized.\u003c/li\u003e\n\u003cli\u003eGrafana Labs experienced unauthorized source code access through a compromised GitHub token.\u003c/li\u003e\n\u003cli\u003eLaravel Lang packages were compromised in a supply chain attack involving malicious tag rewrites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"token-and-identity-abuse\"\u003eToken and identity abuse\u003c/h3\u003e\n\n\u003cp\u003eThe report also repeatedly references identity and token-based access:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKali365 captures OAuth access and refresh tokens for persistent Microsoft 365 access.\u003c/li\u003e\n\u003cli\u003eGrafana’s source code breach was enabled by a compromised GitHub token.\u003c/li\u003e\n\u003cli\u003eThe AI-related fraud campaign involved stolen API keys.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-abuse-becoming-operationalized\"\u003eAI abuse becoming operationalized\u003c/h3\u003e\n\n\u003cp\u003eThe AI section presents abuse of commercial AI and AI-adjacent tooling as active and practical rather than theoretical. The article highlights:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ea single operator using commercial AI to compromise nine Mexican government agencies and execute over 5,000 automated commands\u003c/li\u003e\n\u003cli\u003ephishing emails that use invisible prompt injection against AI scanning tools\u003c/li\u003e\n\u003cli\u003ean operator bypassing Gemini safeguards to automate propaganda and credential theft\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"active-exploitation-and-rapid-weaponization\"\u003eActive exploitation and rapid weaponization\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerabilities section emphasizes that several flaws were already under exploitation or active attack:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-41091 and CVE-2026-45498 in Windows Defender were actively exploited\u003c/li\u003e\n\u003cli\u003eCVE-2026-34926 in Trend Micro Apex One saw exploitation attempts against Windows systems\u003c/li\u003e\n\u003cli\u003eCVE-2026-9082 in Drupal was under active attack shortly after disclosure\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stated-defensive-measures-and-responses\"\u003eStated Defensive Measures and Responses\u003c/h2\u003e\n\n\u003cp\u003eThe article includes several explicit responses or protections:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e7-Eleven offered identity protection services to affected individuals.\u003c/li\u003e\n\u003cli\u003eGrafana Labs said it refused to pay ransom.\u003c/li\u003e\n\u003cli\u003eMicrosoft released updated components automatically through normal Defender updates.\u003c/li\u003e\n\u003cli\u003eDrupal emergency patches were released for CVE-2026-9082.\u003c/li\u003e\n\u003cli\u003eCheck Point IPS is said to protect against the Drupal SQL injection issue.\u003c/li\u003e\n\u003cli\u003eCheck Point Threat Emulation and Harmony Endpoint are said to protect against the Nimbus Manticore threat.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a weekly snapshot of cyber activity spanning corporate breaches, phishing services, AI-enabled abuse, active vulnerability exploitation, state-linked campaigns, and supply chain compromise. It highlights confirmed breaches at 7-Eleven, GitHub, and Grafana Labs; an FBI warning about Kali365; new examples of AI misuse in intrusions, phishing evasion, and influence operations; and urgent patching needs for Microsoft, Trend Micro, and Drupal products. It also ties in broader threat research on Nimbus Manticore, ransomware and hacktivism in DACH, Showboat malware, a Laravel Lang package compromise, and command-and-control infrastructure abuse across Middle Eastern networks.\u003c/p\u003e\n","keyPoints":["7-Eleven confirmed a breach involving unauthorized access to systems used for franchisee documents, and ShinyHunters claimed it stole more than 600,000 Salesforce records containing personal and corporate information.","GitHub disclosed a breach in which attackers weaponized a Visual Studio Code extension to compromise an employee device and exfiltrate about 3,800 internal repositories, with no evidence of impact on customer-facing systems.","The FBI warned that the Kali365 phishing-as-a-service kit is targeting Microsoft 365 users with device-code phishing that captures OAuth access and refresh tokens and enables persistent access while bypassing MFA.","Microsoft published fixes for CVE-2026-41091 and CVE-2026-45498, two actively exploited Windows Defender flaws affecting the Malware Protection Engine and Defender Antimalware Platform.","Drupal released emergency patches for CVE-2026-9082, a critical SQL injection flaw affecting Drupal sites using PostgreSQL that was reported to be under active attack shortly after disclosure."],"insights":["Multiple incidents in the report show that source code and developer ecosystems are a recurring attack path, including GitHub repository theft, a compromised GitHub token at Grafana Labs, and malicious Laravel Lang package tags on Composer.","The article highlights a shift from experimental to operational AI abuse by showing that attackers are not only using commercial AI for large-scale intrusions and propaganda, but also embedding invisible prompt injections in phishing emails to manipulate AI-based defenses.","Identity and token-based access are a major theme in this report, with Kali365 stealing OAuth access and refresh tokens to maintain Microsoft 365 access and Grafana’s breach stemming from a compromised GitHub token.","Several of the most urgent issues in the report were already being exploited or attacked at the time of disclosure, including two Windows Defender flaws, the Trend Micro Apex One directory traversal issue, and Drupal’s CVE-2026-9082 SQL injection vulnerability."],"referencedReports":[{"title":"Threat Intelligence Bulletin","url":"https://research.checkpoint.com/wp-content/uploads/2026/05/Threat_Intelligence_News_2026-05-25.pdf","publisher":"Check Point Research","context":"The article opens by directing readers to download this bulletin for the latest cyber research discoveries for the week of 25th May.","category":"","primary":false},{"title":"March-April 2026 AI Threat Landscape digest","url":"https://blog.checkpoint.com/research/ai-attacks-are-no-longer-experimental-key-findings-from-the-march-april-2026-ai-threat-landscape/","publisher":"Check Point Research","context":"The article says Check Point Research released this digest showing that AI-driven attacks have entered routine criminal use.","category":"","primary":false},{"title":"PSA260521","url":"https://www.ic3.gov/PSA/2026/PSA260521","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"The article cites this FBI warning as an advisory about the Kali365 phishing-as-a-service kit targeting Microsoft 365 users.","category":"","primary":false},{"title":"Fast and Furious: Nimbus Manticore Operations During the Iranian Conflict","url":"https://research.checkpoint.com/2026/fast-and-furious-nimbus-manticore-operations-during-the-iranian-conflict/","publisher":"Check Point Research","context":"The article says Check Point Research revealed new campaigns by the IRGC-linked Nimbus Manticore group in this research report.","category":"","primary":false},{"title":"Hacktivists, ransomware, and a 124% surge: the DACH threat picture","url":"https://blog.checkpoint.com/exposure-management/hacktivists-ransomware-and-a-124-surge-the-dach-threat-picture/","publisher":"Check Point","context":"The article references this report as highlighting a 124% surge in hacktivism and ransomware across Germany, Austria, and Switzerland in 2025.","category":"","primary":false},{"title":"Introducing Showboat, a New Malware Family Taunts Defenses and Targets International Telecom Firms","url":"https://www.lumen.com/blog/en-us/introducing-showboat-a-new-malware-family-taunts-defenses-and-targets-international-telecom-firms","publisher":"Lumen","context":"The article cites researchers uncovering the Showboat Linux malware family in this technical analysis.","category":"","primary":false}],"body":"\u003cp\u003eThis threat intelligence report for the week of 25th May highlights a mix of major breaches, active phishing operations, AI-enabled abuse, and high-severity vulnerabilities under active exploitation. The article points to incidents affecting 7-Eleven, GitHub, and Grafana Labs, along with an FBI warning about the Kali365 phishing-as-a-service kit targeting Microsoft 365 users. It also emphasizes that several vulnerabilities, including flaws in Windows Defender, Trend Micro Apex One, and Drupal, were already being exploited or attacked.\u003c/p\u003e\n\n\u003cp\u003eA major theme in the report is the operational use of AI in cybercrime. Check Point Research said AI-driven attacks have entered routine criminal use, citing a campaign in which a single operator used commercial AI to compromise nine Mexican government agencies and run more than 5,000 automated commands. The article also describes phishing campaigns that use invisible text as indirect prompt injections against AI-powered email filters and an AI-driven influence and fraud campaign tied to a Russian-speaking actor.\u003c/p\u003e\n\n\u003cp\u003eThe report also summarizes current threat research on state-linked and criminal activity. Check Point Research detailed renewed Nimbus Manticore campaigns using SEO poisoning and career-themed phishing to deliver a new MiniFast backdoor, while other researchers reported the Showboat Linux malware family targeting telecoms, a Laravel Lang supply chain compromise, and broad abuse of Middle Eastern telecom and hosting networks for command-and-control infrastructure. Throughout, the article stresses both the breadth of active threats and the availability of specific protections from Check Point for some of them.\u003c/p\u003e\n"},{"n":6,"title":"Ghost CMS CVE-2026-26980 Exploited to Hijack 700+ Sites for ClickFix Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/ghost-cms-cve-2026-26980-exploited-to.html","time":"12:02","priority":"MUST READ","score":92,"tldr":"Attackers are actively exploiting the critical Ghost CMS SQL injection flaw CVE-2026-26980 to steal admin API keys and inject malicious JavaScript into 700+ websites, turning trusted sites into ClickFix malware delivery pages. Ghost users should urgently patch to 6.19.1 or later, rotate credentials, and check for site tampering and visitor exposure.","briefOverview":"\u003cp\u003eThreat actors are exploiting CVE-2026-26980, a critical SQL injection vulnerability in Ghost CMS, to inject malicious JavaScript into websites and support ClickFix attacks. QiAnXin XLab said the flaw allows unauthenticated attackers to read arbitrary database data and obtain a site\u0026rsquo;s admin API key, which can then be used to tamper with published content. Ghost addressed the vulnerability in version 6.19.1 in February 2026.\u003c/p\u003e\n\n\u003cp\u003eXLab described the activity as a large-scale poisoning campaign that has compromised more than 700 websites across sectors including universities, blockchain, artificial intelligence, SaaS, security research, media, and financial technology. The injected code acts as a two-stage JavaScript loader that retrieves payloads from an external domain and uses a cloaking service so that only selected victims receive malicious content. Those targets are shown a fake CAPTCHA page that instructs them to paste a Base64-encoded command into the Windows Run dialog, leading to the delivery of additional malware.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain includes downloading a ZIP archive, executing a batch script, and then running a PowerShell command to fetch either a DLL or a JavaScript payload that ultimately drops a Windows executable. One observed path used a PuTTY client signed with a valid certificate, while another used an Inno Setup installer for an Electron application. Ghost users are advised to upgrade, rotate credentials, clean affected sites, audit logs, and notify users who may have visited during the contamination period.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors are exploiting a recently disclosed critical Ghost CMS vulnerability, tracked as CVE-2026-26980, to hijack websites and use them in ClickFix attacks. According to QiAnXin XLab, the flaw is an SQL injection issue in Ghost\u0026rsquo;s Content API with a CVSS score of 9.4. It allows unauthenticated attackers to read arbitrary data from the database, and Ghost fixed it in version 6.19.1 in February 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article says the vulnerability is especially severe because it can expose a site\u0026rsquo;s admin API key. With that key, attackers can use the Ghost Admin API to directly modify published articles and inject malicious JavaScript into pages. XLab said the attackers used this method to tamper with articles in bulk and add JavaScript loaders to the bottom of pages to support fake CAPTCHA attacks.\u003c/p\u003e\n\n\u003cp\u003eQiAnXin XLab described the operation as a large-scale poisoning campaign and assessed that at least two different threat clusters are behind it. In some cases, the article says, sites were implanted with malicious code within a single day. The activity was first detected on May 7, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe campaign has compromised more than 700 websites across a broad range of sectors, including universities, blockchain, artificial intelligence, software-as-a-service, security research, media, and financial technology. XLab noted that the use of legitimate websites could increase the success rate of ClickFix attacks. The article also says the vulnerability itself was discovered by Anthropic using Claude.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the injected JavaScript acts as a two-stage loader that retrieves the main payload at runtime from clo4shara[.]xyz/11z77u3.php. XLab said directly accessing that PHP script reveals a traffic distribution script powered by Adspect, which gathers browser fingerprint data and then performs actions such as redirection, popups, and downloads based on server instructions. The script uses cloaking so that real victims can receive the attack content while scanners and crawlers are shown benign pages.\u003c/p\u003e\n\n\u003cp\u003eTargets identified as intended victims are ultimately shown a fake CAPTCHA page inside an iframe and instructed to paste a Base64-encoded command into the Windows Run dialog. That command downloads a ZIP archive, extracts a batch script, and runs a PowerShell command that fetches either a DLL or a JavaScript payload from a remote domain. The final goal is to drop a Windows executable, including either a PuTTY client signed with a valid certificate or an Inno Setup installer for a modified Electron application based on the open-source Grape desktop client that polls web-telegram[.]ug every 30 seconds for attacker instructions. Ghost users are advised to upgrade, rotate credentials, clean their sites, audit logs, and notify potentially exposed visitors.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThreat actors are exploiting CVE-2026-26980, a critical SQL injection vulnerability in Ghost CMS, to compromise websites and turn them into delivery points for ClickFix attacks. According to QiAnXin XLab, the attackers are using the flaw to obtain Ghost admin API keys without authorization and then using those keys to modify published articles through the Ghost Admin API. The result is the insertion of malicious JavaScript into otherwise legitimate sites.\u003c/p\u003e\n\n\u003cp\u003eGhost addressed the flaw in February 2026 with version 6.19.1. The article states that the vulnerability has a CVSS score of 9.4 and affects Ghost\u0026rsquo;s Content API, allowing an unauthenticated attacker to read arbitrary data from the database. It also notes that the vulnerability was discovered by Anthropic using Claude.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-vulnerability-matters\"\u003eWhy the Vulnerability Matters\u003c/h1\u003e\n\n\u003cp\u003eThe article emphasizes that the flaw is particularly severe not only because it enables arbitrary database reads, but because it can expose a site\u0026rsquo;s admin API key. Once the attackers have that key, they can invoke the Ghost Admin API and directly alter published content.\u003c/p\u003e\n\n\u003cp\u003eThis capability lets the attackers poison websites at scale by embedding malicious code into articles. In the observed campaign, the malicious JavaScript was inserted at the bottom of pages to support fake CAPTCHA attacks associated with ClickFix activity.\u003c/p\u003e\n\n\u003ch1 id=\"campaign-scope-and-attribution\"\u003eCampaign Scope and Attribution\u003c/h1\u003e\n\n\u003cp\u003eQiAnXin XLab described the operation as a \u0026ldquo;large-scale poisoning\u0026rdquo; campaign weaponizing CVE-2026-26980. The article says at least two different threat clusters are believed to be behind the activity. In some cases, certain websites were implanted with malicious code within a single day.\u003c/p\u003e\n\n\u003cp\u003eThe activity was first detected on May 7, 2026. According to the article, more than 700 websites have been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"affected-sectors\"\u003eAffected Sectors\u003c/h2\u003e\n\n\u003cp\u003eThe compromised websites span multiple sectors, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUniversities\u003c/li\u003e\n\u003cli\u003eBlockchain\u003c/li\u003e\n\u003cli\u003eArtificial intelligence\u003c/li\u003e\n\u003cli\u003eSoftware-as-a-service (SaaS)\u003c/li\u003e\n\u003cli\u003eSecurity research\u003c/li\u003e\n\u003cli\u003eMedia\u003c/li\u003e\n\u003cli\u003eFinancial technology\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eXLab said the fact that these are legitimate websites may increase the success rate of the ClickFix attacks.\u003c/p\u003e\n\n\u003ch1 id=\"technical-infection-flow\"\u003eTechnical Infection Flow\u003c/h1\u003e\n\n\u003ch2 id=\"initial-site-poisoning\"\u003eInitial Site Poisoning\u003c/h2\u003e\n\n\u003cp\u003eThe attackers exploit the Ghost CMS flaw to obtain the target site\u0026rsquo;s admin API key. They then use the Ghost Admin API to bulk modify articles and insert a malicious JavaScript loader into the page content.\u003c/p\u003e\n\n\u003ch2 id=\"javascript-loader-architecture\"\u003eJavaScript Loader Architecture\u003c/h2\u003e\n\n\u003cp\u003eThe injected code functions as a two-stage loader. Its purpose is to retrieve the main payload at runtime from the external domain clo4shara[.]xyz/11z77u3.php.\u003c/p\u003e\n\n\u003cp\u003eThe article says this design gives the attackers flexibility, because they can change the delivered payloads while keeping the same loader in place across many compromised sites.\u003c/p\u003e\n\n\u003ch2 id=\"traffic-distribution-and-cloaking\"\u003eTraffic Distribution and Cloaking\u003c/h2\u003e\n\n\u003cp\u003eXLab said that directly accessing clo4shara[.]xyz/11z77u3.php reveals a traffic distribution script. According to the article, the script collects browser fingerprint information from users and uploads it to the server, then performs actions such as redirection, popups, and downloads based on returned instructions.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the PHP script is powered by Adspect, a commercial cloaking service. Its use allows the attackers to serve benign content to security scanners and crawlers while presenting the real payload only to intended victims.\u003c/p\u003e\n\n\u003cp\u003eThe script is also said to support 19 different commands for running arbitrary JavaScript code and facilitating remote control of the victim\u0026rsquo;s browser.\u003c/p\u003e\n\n\u003ch1 id=\"clickfix-delivery-chain\"\u003eClickFix Delivery Chain\u003c/h1\u003e\n\n\u003cp\u003eVictims who pass the attackers\u0026rsquo; selection logic are shown a fake CAPTCHA verification page inside an iframe. The page tells them to prove they are human by copying and pasting a Base64-encoded command into the Windows Run dialog.\u003c/p\u003e\n\n\u003cp\u003eThat command acts as a dropper. It downloads a ZIP archive, extracts a Windows batch script, and runs it.\u003c/p\u003e\n\n\u003cp\u003eThe batch script then executes a PowerShell command to download a DLL file from a remote domain, launch it via \u003ccode\u003erundll32.exe\u003c/code\u003e, and open a fake web page as a distraction for the user.\u003c/p\u003e\n\n\u003ch1 id=\"later-payload-variants\"\u003eLater Payload Variants\u003c/h1\u003e\n\n\u003cp\u003eThe article says later iterations of the malware replaced the DLL with a JavaScript payload. Despite this change, the goal remained the same: to drop a Windows executable onto the victim\u0026rsquo;s system.\u003c/p\u003e\n\n\u003cp\u003eTwo payload paths were described:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn the DLL-based path, the dropped executable was a PuTTY client signed with a valid code-signing certificate.\u003c/li\u003e\n\u003cli\u003eIn the JavaScript-based path, the binary was an Inno Setup installer for an Electron application.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"final-malware-stage\"\u003eFinal Malware Stage\u003c/h1\u003e\n\n\u003cp\u003eThe Electron application is described as a modified version of the open-source Grape desktop client. According to the article, it is designed to establish persistence and poll the remote server web-telegram[.]ug every 30 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe application can then process attacker-issued instructions, including commands to run JavaScript code or executable files.\u003c/p\u003e\n\n\u003ch1 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h1\u003e\n\n\u003cp\u003eThe article advises Ghost CMS users to take several actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpgrade Ghost instances to the latest version\u003c/li\u003e\n\u003cli\u003eRotate all credentials\u003c/li\u003e\n\u003cli\u003eClean up compromised sites\u003c/li\u003e\n\u003cli\u003eAudit access logs for suspicious activity\u003c/li\u003e\n\u003cli\u003eNotify users who may have visited affected sites during the contamination period\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese steps are recommended because the campaign involved site tampering and may have exposed visitors to malware through fake CAPTCHA lures.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-26980 is being actively exploited in Ghost CMS to steal admin API keys and modify website content.\u003c/li\u003e\n\u003cli\u003eAttackers have used the flaw to compromise more than 700 legitimate websites.\u003c/li\u003e\n\u003cli\u003eThe compromised sites were turned into ClickFix delivery platforms through injected JavaScript loaders.\u003c/li\u003e\n\u003cli\u003eThe delivery chain uses cloaking and traffic distribution to selectively serve malicious content.\u003c/li\u003e\n\u003cli\u003eThe campaign culminates in malware delivery, including a modified Electron-based application that communicates with attacker infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Threat actors are exploiting CVE-2026-26980, a critical SQL injection vulnerability in Ghost CMS's Content API, to obtain a site's admin API key without authorization and inject malicious code.","QiAnXin XLab said the campaign has compromised more than 700 websites across sectors including universities, blockchain, artificial intelligence, SaaS, security research, media, and financial technology.","The attackers used the Ghost Admin API to tamper with articles in bulk and insert malicious JavaScript loaders at the bottom of pages to support fake CAPTCHA ClickFix attacks.","The injected JavaScript acts as a two-stage loader that retrieves the main payload at runtime from clo4shara[.]xyz/11z77u3.php, which XLab said is a traffic distribution script powered by Adspect.","Ghost patched the vulnerability in version 6.19.1 in February 2026, and users are advised to upgrade, rotate credentials, clean their sites, audit logs, and notify potentially affected visitors."],"insights":["The article highlights that the SQL injection flaw becomes especially damaging because it lets attackers extract Ghost admin API keys, which then allows direct bulk modification of published articles through the Admin API.","The campaign’s use of a two-stage JavaScript loader means the attackers can keep the same injected code on compromised Ghost sites while changing the delivered payload dynamically at runtime.","The traffic distribution script behind the attack uses cloaking so that real visitors can receive malicious content while security scanners and crawlers are shown benign pages, making detection more difficult.","The article notes that some sites were implanted with malicious code within a single day and attributes the broader operation to at least two different threat clusters, indicating coordinated large-scale abuse of the vulnerability.","Because the malicious code was placed on legitimate websites across many sectors, the attackers gain credibility that could increase the success rate of the fake CAPTCHA ClickFix lures."],"referencedReports":[{"title":"GHSA-w52v-v783-gw97","url":"https://github.com/TryGhost/Ghost/security/advisories/GHSA-w52v-v783-gw97","publisher":"TryGhost","context":"The article cites this Ghost security advisory as the disclosure for CVE-2026-26980, the critical SQL injection vulnerability being exploited.","category":"","primary":false},{"title":"Ghost CMS Mass Compromised via CVE-2026-26980, Now Fueling ClickFix Attacks","url":"https://blog.xlab.qianxin.com/ghost-cms-mass-compromised-via-cve-2026-26980-now-fueling-clickfix-attacks/","publisher":"QiAnXin XLab","context":"The article references this XLab technical analysis for details on how attackers used the Ghost flaw to steal Admin API keys and inject malicious JavaScript into compromised sites.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are exploiting CVE-2026-26980, a critical SQL injection vulnerability in Ghost CMS, to inject malicious JavaScript into websites and support ClickFix attacks. QiAnXin XLab said the flaw allows unauthenticated attackers to read arbitrary database data and obtain a site\u0026rsquo;s admin API key, which can then be used to tamper with published content. Ghost addressed the vulnerability in version 6.19.1 in February 2026.\u003c/p\u003e\n\n\u003cp\u003eXLab described the activity as a large-scale poisoning campaign that has compromised more than 700 websites across sectors including universities, blockchain, artificial intelligence, SaaS, security research, media, and financial technology. The injected code acts as a two-stage JavaScript loader that retrieves payloads from an external domain and uses a cloaking service so that only selected victims receive malicious content. Those targets are shown a fake CAPTCHA page that instructs them to paste a Base64-encoded command into the Windows Run dialog, leading to the delivery of additional malware.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain includes downloading a ZIP archive, executing a batch script, and then running a PowerShell command to fetch either a DLL or a JavaScript payload that ultimately drops a Windows executable. One observed path used a PuTTY client signed with a valid certificate, while another used an Inno Setup installer for an Electron application. Ghost users are advised to upgrade, rotate credentials, clean affected sites, audit logs, and notify users who may have visited during the contamination period.\u003c/p\u003e\n"},{"n":5,"title":"⚡ Weekly Recap: Linux Flaws, Defender 0-Days, Router Botnets, and Supply Chain Chaos","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/weekly-recap-linux-flaws-defender-0.html","time":"14:13","priority":"SHOULD READ","score":88,"tldr":"The biggest takeaway this week is that software supply chain compromise is cascading downstream fast, with the poisoned Nx Console VS Code extension helping attackers breach GitHub and expose thousands of repositories. At the same time, defenders are still losing ground to old, unpatched, and actively exploited flaws across Linux, Microsoft Defender, Drupal, routers, and other internet-facing systems.","briefOverview":"\u003cp\u003eThe article’s main focus is the GitHub breach that was traced to a poisoned version of the Nx Console VS Code extension on an employee device, which GitHub said allowed TeamPCP to exfiltrate about 3,800 internal repositories. The Nx team said the compromised extension, nrwl.angular-console, was breached after one of its developers’ systems was hacked following the recent TanStack supply chain attack. The article frames this as part of the broader downstream fallout from the Mini Shai-Hulud campaign and notes that TeamPCP publicly released the Shai-Hulud code.\u003c/p\u003e\n\n\u003cp\u003eBeyond the supply chain incident, the roundup highlights multiple high-risk vulnerabilities and active exploitation across widely used platforms. These include a nine-year-old Linux kernel flaw that could allow root command execution, two actively exploited Microsoft Defender vulnerabilities, and a Drupal Core SQL injection bug seeing exploitation attempts in the wild. The article also emphasizes that phishing operations are becoming more targeted and that botnets are rapidly incorporating exposed routers and other internet-facing devices into large-scale campaigns.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a weekly cybersecurity recap centered on a software supply chain compromise that ultimately affected GitHub. GitHub confirmed that the breach of its internal repositories stemmed from an employee device compromised through a poisoned version of the Nx Console Microsoft Visual Studio Code extension. According to the article, the actor behind the incident is TeamPCP, which allegedly exfiltrated around 3,800 repositories. GitHub said it contained the incident, rotated critical secrets, and continues monitoring for follow-on activity.\u003c/p\u003e\n\n\u003cp\u003eThe Nx team disclosed that the compromised extension, nrwl.angular-console, was breached after one of its developers’ systems was hacked following the recent TanStack supply chain attack. The article says other organizations impacted by the TanStack compromise include OpenAI, Mistral AI, and Grafana Labs. Grafana Labs also faced an extortion attempt, but the company said it refused to pay. The article presents these incidents as examples of the long-tail effects of the Mini Shai-Hulud campaign.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the supply chain activity is heightened by TeamPCP’s public release of the Shai-Hulud code. The article says this gives attackers a blueprint for creating similar worms targeting open-source repositories and developer environments. It uses this example to illustrate how supply chain threats are evolving beyond isolated compromises into repeatable attack patterns. The recap frames this as one of the week’s most important developments.\u003c/p\u003e\n\n\u003cp\u003eThe article also lists several major vulnerability stories. These include CVE-2026-46333, a Linux kernel flaw introduced in 2016 that could let an unprivileged local user disclose sensitive files and execute arbitrary commands as root on default Debian, Fedora, and Ubuntu systems. Microsoft also warned that two Defender flaws, CVE-2026-41091 and CVE-2026-45498, are under active exploitation in the wild. Drupal further acknowledged active exploitation attempts against CVE-2026-9082, with Imperva observing more than 15,000 attacks against nearly 6,000 sites in 65 countries.\u003c/p\u003e\n\n\u003cp\u003eOther notable security developments include Microsoft’s takedown of Fox Tempest, a malware-signing service provider linked to Rhysida ransomware and other malware delivery chains, and Cisco’s patch for a CVSS 10.0 flaw in Secure Workload. The roundup also calls attention to expanding botnet activity, such as RondoDox adding an ASUS router flaw to its arsenal and mass exploitation of a Four-Faith router authentication bypass. In addition, the article notes that phishing ecosystems are becoming more advanced, with Chinese-language phishing-as-a-service platforms moving toward real-time interception of one-time passcodes and digital wallet provisioning.\u003c/p\u003e\n\n\u003cp\u003eIn the broader threat landscape, the article cites Verizon’s finding that vulnerability exploitation became the top initial access vector for data breaches, surpassing compromised credentials for the first time in nearly two decades. It reports that only 26% of critical vulnerabilities listed in CISA’s Known Exploited Vulnerabilities catalog were fully remediated by organizations in 2025, while median full resolution time rose to 43 days. The article closes by stressing that attackers continue to capitalize on old, neglected, and internet-exposed weaknesses that defenders have failed to patch.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis weekly recap presents a broad picture of a threat landscape defined by software supply chain compromise, long-unpatched vulnerabilities, increasingly sophisticated phishing operations, and aggressive botnet exploitation of exposed internet-facing devices. The article’s central event is GitHub’s confirmation that a breach of its internal repositories resulted from an employee device compromised through a poisoned Visual Studio Code extension. Around that core incident, the recap catalogs major vulnerability disclosures, active exploitation, new malware campaigns, and several notable reports and advisories.\u003c/p\u003e\n\n\u003cp\u003eThe article’s tone is blunt: old bugs are still being exploited, defenders are patching too slowly, and even security products themselves are becoming targets. It repeatedly emphasizes that attackers are not waiting for defenders to catch up and are capitalizing on both newly disclosed flaws and years-old exposures.\u003c/p\u003e\n\n\u003ch2 id=\"threat-of-the-week-github-breach-via-nx-console-vs-code-extension\"\u003eThreat of the Week: GitHub Breach via Nx Console VS Code Extension\u003c/h2\u003e\n\n\u003cp\u003eThe lead story is GitHub’s confirmation that the breach of its internal repositories originated from a compromise of an employee device involving a poisoned version of the Nx Console Microsoft Visual Studio Code extension. According to the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe threat actor is identified as \u003cstrong\u003eTeamPCP\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe attackers allegedly \u003cstrong\u003eexfiltrated about 3,800 repositories\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eGitHub said it \u003cstrong\u003econtained the incident\u003c/strong\u003e, \u003cstrong\u003erotated critical secrets\u003c/strong\u003e, and is \u003cstrong\u003emonitoring for follow-on activity\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Nx team said the compromised extension, \u003cstrong\u003enrwl.angular-console\u003c/strong\u003e, was itself breached after one of its developers’ systems was hacked in the wake of the recent \u003cstrong\u003eTanStack supply chain attack\u003c/strong\u003e. The article links this incident to a wider chain of downstream victims and notes that \u003cstrong\u003eOpenAI, Mistral AI, and Grafana Labs\u003c/strong\u003e were also impacted by the TanStack compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that Grafana Labs was subjected to an extortion attempt, but the company refused to pay the attackers who threatened to release its codebase. These incidents are described as examples of the “long tail” of downstream victims tied to the \u003cstrong\u003eMini Shai-Hulud campaign\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eA key significance highlighted by the article is that \u003cstrong\u003eTeamPCP publicly released the Shai-Hulud code\u003c/strong\u003e. The recap says this materially raises the threat because it provides attackers with a ready-made blueprint for creating similar worms targeting \u003cstrong\u003eopen-source repositories\u003c/strong\u003e and \u003cstrong\u003edeveloper environments\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"major-news-and-high-impact-vulnerabilities\"\u003eMajor News and High-Impact Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article’s “Top News” section highlights several major security developments beyond the GitHub breach.\u003c/p\u003e\n\n\u003ch3 id=\"microsoft-action-against-fox-tempest\"\u003eMicrosoft action against Fox Tempest\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft disrupted \u003cstrong\u003eFox Tempest\u003c/strong\u003e, described as an upstream enabler in the malware and ransomware ecosystem. According to the recap, the group supported operations including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRhysida ransomware\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOyster\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLumma Stealer\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVidar\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe group allegedly operated a fraudulent \u003cstrong\u003ecode-signing service\u003c/strong\u003e that let cybercriminals deploy malware with reduced detection risk. The article notes that while code-signing certificate resale has existed for years, Fox Tempest stood out because it offered a \u003cstrong\u003escalable service\u003c/strong\u003e supporting extortion, phishing, SEO poisoning, and malware-laced advertising.\u003c/p\u003e\n\n\u003ch3 id=\"nine-year-old-linux-kernel-flaw\"\u003eNine-year-old Linux kernel flaw\u003c/h3\u003e\n\n\u003cp\u003eA newly disclosed Linux kernel vulnerability, \u003cstrong\u003eCVE-2026-46333\u003c/strong\u003e with a \u003cstrong\u003eCVSS score of 5.5\u003c/strong\u003e, remained undetected for nine years. The flaw is described as \u003cstrong\u003eimproper privilege management\u003c/strong\u003e introduced in \u003cstrong\u003eNovember 2016\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article says it could allow an \u003cstrong\u003eunprivileged local user\u003c/strong\u003e to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisclose sensitive files\u003c/li\u003e\n\u003cli\u003eExecute arbitrary commands as root\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt affects default installations of major distributions including \u003cstrong\u003eDebian, Fedora, and Ubuntu\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"actively-exploited-microsoft-defender-flaws\"\u003eActively exploited Microsoft Defender flaws\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft disclosed two Defender vulnerabilities under active exploitation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-41091\u003c/strong\u003e — privilege escalation to \u003cstrong\u003eSYSTEM\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-45498\u003c/strong\u003e — \u003cstrong\u003edenial-of-service\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that Microsoft did not formally confirm the connection, but says the vulnerability descriptions overlap with the \u003cstrong\u003eRedSun\u003c/strong\u003e and \u003cstrong\u003eUnDefend\u003c/strong\u003e Defender zero-days previously disclosed by \u003cstrong\u003eChaotic Eclipse (aka Nightmare-Eclipse)\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"drupal-sql-injection-under-attack\"\u003eDrupal SQL injection under attack\u003c/h3\u003e\n\n\u003cp\u003eThe article reports active exploitation attempts targeting \u003cstrong\u003eCVE-2026-9082\u003c/strong\u003e, an SQL injection flaw in \u003cstrong\u003eDrupal Core\u003c/strong\u003e affecting all supported versions. The vulnerability has a listed \u003cstrong\u003eCVSS score of 6.5\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eDrupal acknowledged that exploit attempts are being detected in the wild. The recap also cites \u003cstrong\u003eImperva\u003c/strong\u003e, which observed:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than \u003cstrong\u003e15,000 attack attempts\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eAgainst nearly \u003cstrong\u003e6,000 individual sites\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eAcross \u003cstrong\u003e65 countries\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"anthropic-s-ai-assisted-vulnerability-discovery\"\u003eAnthropic’s AI-assisted vulnerability discovery\u003c/h3\u003e\n\n\u003cp\u003eAnthropic said \u003cstrong\u003eProject Glasswing\u003c/strong\u003e helped uncover more than \u003cstrong\u003e10,000 high- or critical-severity vulnerabilities\u003c/strong\u003e across software considered systemically important. The article breaks the numbers down further:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e6,202\u003c/strong\u003e candidate high- or critical-severity flaws in over \u003cstrong\u003e1,000 open-source projects\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1,726\u003c/strong\u003e valid true positives after analysis\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1,094\u003c/strong\u003e assessed as high- or critical-severity\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e97\u003c/strong\u003e findings patched upstream\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e88\u003c/strong\u003e advisories issued\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"cisco-secure-workload-cvss-10-0-flaw\"\u003eCisco Secure Workload CVSS 10.0 flaw\u003c/h3\u003e\n\n\u003cp\u003eCisco patched \u003cstrong\u003eCVE-2026-20223\u003c/strong\u003e, a maximum-severity flaw in \u003cstrong\u003eSecure Workload\u003c/strong\u003e. The issue stems from \u003cstrong\u003einsufficient validation and authentication\u003c/strong\u003e on REST API endpoints.\u003c/p\u003e\n\n\u003cp\u003eThe article says a successful exploit could allow an unauthenticated remote attacker to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRead sensitive data\u003c/li\u003e\n\u003cli\u003eMake configuration changes across tenant boundaries\u003c/li\u003e\n\u003cli\u003eAct with the privileges of the \u003cstrong\u003eSite Admin\u003c/strong\u003e user\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"microsoft-mitigation-for-yellowkey\"\u003eMicrosoft mitigation for YellowKey\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft issued mitigations for \u003cstrong\u003eYellowKey\u003c/strong\u003e, now tracked as \u003cstrong\u003eCVE-2026-45585\u003c/strong\u003e, a BitLocker security feature bypass with a \u003cstrong\u003eCVSS score of 6.8\u003c/strong\u003e. The issue affects several Windows 11 versions and Windows Server 2025.\u003c/p\u003e\n\n\u003cp\u003eThe article says successful exploitation requires \u003cstrong\u003ephysical access\u003c/strong\u003e and could let an attacker bypass BitLocker device encryption on the system storage device and access encrypted data.\u003c/p\u003e\n\n\u003ch2 id=\"trending-cves\"\u003eTrending CVEs\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a large list of “Trending CVEs,” emphasizing how rapidly the gap between disclosure and exploitation is shrinking. It specifically urges readers to prioritize urgent patching and names vulnerabilities affecting a broad set of products, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLiteSpeed User-End cPanel Plugin\u003c/li\u003e\n\u003cli\u003eTrend Micro Apex One\u003c/li\u003e\n\u003cli\u003eCisco Secure Workload\u003c/li\u003e\n\u003cli\u003eMicrosoft Defender\u003c/li\u003e\n\u003cli\u003eLinux Kernel\u003c/li\u003e\n\u003cli\u003eDrupal Core\u003c/li\u003e\n\u003cli\u003eMicrosoft Windows BitLocker\u003c/li\u003e\n\u003cli\u003eSEPPMail\u003c/li\u003e\n\u003cli\u003eSGLang\u003c/li\u003e\n\u003cli\u003ecPanel\u003c/li\u003e\n\u003cli\u003eAmazon Redshift JDBC driver\u003c/li\u003e\n\u003cli\u003eMongoDB\u003c/li\u003e\n\u003cli\u003eChromaDB\u003c/li\u003e\n\u003cli\u003eUniversal Robots PolyScope 5\u003c/li\u003e\n\u003cli\u003eExifTool\u003c/li\u003e\n\u003cli\u003eGoogle Chrome\u003c/li\u003e\n\u003cli\u003eApache OFBiz\u003c/li\u003e\n\u003cli\u003eUniFi OS\u003c/li\u003e\n\u003cli\u003eOpen WebUI\u003c/li\u003e\n\u003cli\u003eF5 NGINX Plus and Open Source\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise and Splunk Cloud Platform\u003c/li\u003e\n\u003cli\u003eFreePBX\u003c/li\u003e\n\u003cli\u003ePostgreSQL\u003c/li\u003e\n\u003cli\u003eApache Flink\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe presence of this long list reinforces the article’s central operational message: organizations need to review exposed software and patch high-risk systems quickly.\u003c/p\u003e\n\n\u003ch2 id=\"broader-threat-landscape-and-reported-trends\"\u003eBroader Threat Landscape and Reported Trends\u003c/h2\u003e\n\n\u003cp\u003eThe article expands beyond individual vulnerabilities into wider ecosystem shifts.\u003c/p\u003e\n\n\u003ch3 id=\"vulnerability-exploitation-surpasses-credential-abuse\"\u003eVulnerability exploitation surpasses credential abuse\u003c/h3\u003e\n\n\u003cp\u003eCiting \u003cstrong\u003eVerizon\u003c/strong\u003e, the article states that \u003cstrong\u003evulnerability exploitation\u003c/strong\u003e overtook \u003cstrong\u003ecompromised credentials\u003c/strong\u003e as the most common initial access vector for breaches for the first time in nearly two decades.\u003c/p\u003e\n\n\u003cp\u003eThe reported figures are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e31%\u003c/strong\u003e of data breaches started with vulnerability exploitation, up from \u003cstrong\u003e20%\u003c/strong\u003e in 2024\u003c/li\u003e\n\u003cli\u003eCredential abuse declined from \u003cstrong\u003e22%\u003c/strong\u003e to \u003cstrong\u003e13%\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eOnly \u003cstrong\u003e26%\u003c/strong\u003e of critical vulnerabilities in CISA’s KEV catalog were fully remediated in 2025, down from \u003cstrong\u003e38%\u003c/strong\u003e the prior year\u003c/li\u003e\n\u003cli\u003eMedian full resolution time increased to \u003cstrong\u003e43 days\u003c/strong\u003e, up from \u003cstrong\u003e32 days\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eOrganizations had \u003cstrong\u003e50% more critical vulnerabilities\u003c/strong\u003e to patch in the median case\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRansomware\u003c/strong\u003e accounted for \u003cstrong\u003e48%\u003c/strong\u003e of breaches, up from \u003cstrong\u003e44%\u003c/strong\u003e in 2024\u003c/li\u003e\n\u003cli\u003eMedian ransom payment declined from \u003cstrong\u003e$150,000\u003c/strong\u003e to almost \u003cstrong\u003e$140,000\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis is one of the article’s strongest signals that unpatched vulnerabilities are becoming an even more dominant operational risk.\u003c/p\u003e\n\n\u003ch3 id=\"phishing-against-india-s-education-ecosystem\"\u003ePhishing against India’s education ecosystem\u003c/h3\u003e\n\n\u003cp\u003eThe article cites CYFIRMA in describing abuse of student data across India’s education ecosystem. The activity spans:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEducational institutions\u003c/li\u003e\n\u003cli\u003eThird-party vendors\u003c/li\u003e\n\u003cli\u003eOnline services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says attackers use the exposed or misused data for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhishing\u003c/li\u003e\n\u003cli\u003eImpersonation\u003c/li\u003e\n\u003cli\u003eSocial engineering\u003c/li\u003e\n\u003cli\u003eFinancially motivated fraud\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also notes misuse of student-linked bank accounts in fraud and mule account operations.\u003c/p\u003e\n\n\u003ch2 id=\"botnets-malware-and-active-campaigns\"\u003eBotnets, Malware, and Active Campaigns\u003c/h2\u003e\n\n\u003cp\u003eA substantial portion of the recap covers botnets, malware delivery chains, and country- or sector-specific campaigns.\u003c/p\u003e\n\n\u003ch3 id=\"rondodox-exploiting-asus-router-flaw\"\u003eRondoDox exploiting ASUS router flaw\u003c/h3\u003e\n\n\u003cp\u003eThe \u003cstrong\u003eRondoDox\u003c/strong\u003e botnet incorporated \u003cstrong\u003eCVE-2018-5999\u003c/strong\u003e, a critical ASUS router flaw with a \u003cstrong\u003eCVSS score of 9.8\u003c/strong\u003e. The article says this is the \u003cstrong\u003efirst observed in-the-wild exploitation\u003c/strong\u003e of the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe described attack pattern involved payloads setting \u003cstrong\u003eateCommand_flag\u003c/strong\u003e to 1, enabling the \u003cstrong\u003einfosvr\u003c/strong\u003e interface to accept arbitrary configuration changes.\u003c/p\u003e\n\n\u003ch3 id=\"fake-microsoft-teams-sites-delivering-valleyrat\"\u003eFake Microsoft Teams sites delivering ValleyRAT\u003c/h3\u003e\n\n\u003cp\u003eThe article says fake Microsoft Teams distribution sites promoted on \u003cstrong\u003eX\u003c/strong\u003e are being used to trick users into downloading a trojanized installer in a ZIP archive. This chain ultimately deploys \u003cstrong\u003eValleyRAT\u003c/strong\u003e, which the article associates with the Chinese cybercrime group \u003cstrong\u003eSilver Fox\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eAccording to K7 Labs, the infection chain uses:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA legitimate executable, \u003cstrong\u003eGameBox.exe\u003c/strong\u003e, developed by Tencent\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDLL sideloading\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eStaged payload delivery\u003c/li\u003e\n\u003cli\u003eIn-memory decryption\u003c/li\u003e\n\u003cli\u003ePersistence mechanisms\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"intrusions-targeting-malaysian-entities\"\u003eIntrusions targeting Malaysian entities\u003c/h3\u003e\n\n\u003cp\u003eOasis Security described attacker-controlled infrastructure hosted in \u003cstrong\u003eMicrosoft Azure’s Malaysia West region\u003c/strong\u003e and used to target multiple Malaysian organizations. The article says the operation included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePurpose-built Python tooling per target\u003c/li\u003e\n\u003cli\u003eInternal network enumeration tools\u003c/li\u003e\n\u003cli\u003eDatabase access capability\u003c/li\u003e\n\u003cli\u003eExternal data exfiltration tooling\u003c/li\u003e\n\u003cli\u003eWebshell deployment tools\u003c/li\u003e\n\u003cli\u003eA Laravel remote code execution exploit chain\u003c/li\u003e\n\u003cli\u003eCustom command-and-control source code\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ung0002-targeting-chinese-academia\"\u003eUNG0002 targeting Chinese academia\u003c/h3\u003e\n\n\u003cp\u003eA campaign dubbed \u003cstrong\u003eOperation Dragon Whistle\u003c/strong\u003e targeted the Chinese educational sector and was attributed to \u003cstrong\u003eUNG0002\u003c/strong\u003e. The article says the campaign’s social engineering was highly tailored: the attackers leveraged the fact that \u003cstrong\u003eChangzhou University\u003c/strong\u003e conducts mandatory annual fitness assessments where failure affects graduation eligibility.\u003c/p\u003e\n\n\u003cp\u003eThe emails delivered ZIP archives that ultimately deployed \u003cstrong\u003eCobalt Strike Beacon\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"void-botnet-using-ethereum-smart-contracts-for-c2\"\u003eVoid Botnet using Ethereum smart contracts for C2\u003c/h3\u003e\n\n\u003cp\u003eThe article describes a new \u003cstrong\u003eRust-based\u003c/strong\u003e malware called \u003cstrong\u003eVoid Botnet\u003c/strong\u003e, advertised by a developer using the handle \u003cstrong\u003eTheVoidStl\u003c/strong\u003e. It supports two command-and-control modes in the same binary:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommands routed through \u003cstrong\u003eEthereum smart contracts\u003c/strong\u003e, with bots polling public RPC endpoints every three to five minutes\u003c/li\u003e\n\u003cli\u003eA direct connection to the operator’s \u003cstrong\u003eweb panel\u003c/strong\u003e, completing tasks in under thirty seconds\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe operator can switch between modes by updating the smart contract, and the article emphasizes that this design makes the infrastructure difficult to seize or disrupt.\u003c/p\u003e\n\n\u003ch3 id=\"devilnfc-and-nfcmultipay\"\u003eDevilNFC and NFCMultiPay\u003c/h3\u003e\n\n\u003cp\u003eTwo Android NFC relay malware families, \u003cstrong\u003eDevilNFC\u003c/strong\u003e and \u003cstrong\u003eNFCMultiPay\u003c/strong\u003e, were observed targeting European and LATAM banking customers. The article says they are outside the Chinese-speaking MaaS ecosystem and instead appear linked to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA Spanish-speaking attribution for DevilNFC\u003c/li\u003e\n\u003cli\u003eA Brazilian Portuguese developer fingerprint for NFCMultiPay\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware families are assessed in the article as possibly developed with generative AI assistance. Both are designed to collect the victim’s \u003cstrong\u003ecard PIN\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights specific DevilNFC behaviors:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKiosk Mode locks the victim into the malicious interface\u003c/li\u003e\n\u003cli\u003eA single APK serves both relay roles\u003c/li\u003e\n\u003cli\u003eA rooted attacker device acts as a system-level card emulator\u003c/li\u003e\n\u003cli\u003eA hooking framework intercepts NFC traffic below the Android API layer\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe apps are distributed by \u003cstrong\u003eSMS or WhatsApp\u003c/strong\u003e messages leading to fake \u003cstrong\u003eGoogle Play Store\u003c/strong\u003e impersonation pages.\u003c/p\u003e\n\n\u003ch3 id=\"tax-trident-campaign\"\u003eTAX#TRIDENT campaign\u003c/h3\u003e\n\n\u003cp\u003eThe article describes \u003cstrong\u003eTAX#TRIDENT\u003c/strong\u003e, a campaign using Indian Income Tax-themed lures to target Windows endpoints through three delivery paths:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eZIP files with a signed \u003cstrong\u003eClientSetup\u003c/strong\u003e installer\u003c/li\u003e\n\u003cli\u003eA VBS file named \u003cstrong\u003eAssessment_Order.vbs\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eA PHP-looking endpoint that actually returns script content\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article says the VBS path displays a tax assessment decoy image, downloads the same payload, writes a new configuration file, and runs the payload hidden. The third branch downloads stages from \u003cstrong\u003eS3\u003c/strong\u003e, disguises a VBS file as a PNG image, changes UAC prompt behavior, and silently installs a signed \u003cstrong\u003eManageEngine UEMS / Endpoint Central\u003c/strong\u003e agent.\u003c/p\u003e\n\n\u003ch3 id=\"four-faith-router-exploitation\"\u003eFour-Faith router exploitation\u003c/h3\u003e\n\n\u003cp\u003eAttackers are exploiting \u003cstrong\u003eCVE-2024-9643\u003c/strong\u003e, a critical \u003cstrong\u003eauthentication bypass\u003c/strong\u003e vulnerability in \u003cstrong\u003eFour-Faith F3x36 industrial cellular routers\u003c/strong\u003e with a \u003cstrong\u003eCVSS score of 9.8\u003c/strong\u003e. The article says the activity has been observed since mid-May 2026 and is being used to turn compromised devices into botnets.\u003c/p\u003e\n\n\u003cp\u003eCrowdSec observed:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e139 attacking IP addresses\u003c/strong\u003e through May 18, 2026\u003c/li\u003e\n\u003cli\u003eInitial exploitation on \u003cstrong\u003eApril 20\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eReclassification to \u003cstrong\u003emass exploitation\u003c/strong\u003e on \u003cstrong\u003eMay 12\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evolving-phishing-and-financial-fraud-techniques\"\u003eEvolving Phishing and Financial Fraud Techniques\u003c/h2\u003e\n\n\u003cp\u003eThe article says Chinese-language phishing-as-a-service offerings have moved away from simple static password harvesting toward:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReal-time interception\u003c/li\u003e\n\u003cli\u003eSession tokenization\u003c/li\u003e\n\u003cli\u003eLive administration panels\u003c/li\u003e\n\u003cli\u003eCapture of OTPs\u003c/li\u003e\n\u003cli\u003eImmediate MFA bypass\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt says these services primarily target non-Chinese entities and are advertised on Telegram. A major monetization method highlighted is \u003cstrong\u003edigital wallet provisioning\u003c/strong\u003e, where attackers use captured credentials and OTPs to tokenize the victim’s card into a wallet on an attacker-controlled device.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the goal is not just account access, but direct financial exploitation through:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHigh-value transactions\u003c/li\u003e\n\u003cli\u003eContactless payments\u003c/li\u003e\n\u003cli\u003eATM withdrawals\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also notes the use of \u003cstrong\u003eRCS\u003c/strong\u003e and \u003cstrong\u003eiMessage\u003c/strong\u003e as encrypted delivery channels to bypass traditional SMS carrier security filters.\u003c/p\u003e\n\n\u003ch2 id=\"policy-law-enforcement-and-industry-responses\"\u003ePolicy, Law Enforcement, and Industry Responses\u003c/h2\u003e\n\n\u003cp\u003eThe recap also includes several legal, regulatory, and law-enforcement developments.\u003c/p\u003e\n\n\u003ch3 id=\"texas-lawsuit-against-meta-over-whatsapp-encryption-claims\"\u003eTexas lawsuit against Meta over WhatsApp encryption claims\u003c/h3\u003e\n\n\u003cp\u003eThe Texas Attorney General sued \u003cstrong\u003eMeta\u003c/strong\u003e, alleging that \u003cstrong\u003eWhatsApp\u003c/strong\u003e does not provide the end-to-end encryption it claims. The article says the lawsuit references reports and prior investigation findings alleging that Meta could access message content after it had been sent. Meta called the allegations \u003cstrong\u003ebaseless\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"fiod-arrests-linked-to-stark-industries\"\u003eFIOD arrests linked to Stark Industries\u003c/h3\u003e\n\n\u003cp\u003eThe Netherlands’ Fiscal Intelligence and Investigation Service (\u003cstrong\u003eFIOD\u003c/strong\u003e) arrested two men and seized \u003cstrong\u003e800 servers\u003c/strong\u003e in connection with a web hosting company alleged to have enabled cyber attacks, interference operations, and disinformation campaigns.\u003c/p\u003e\n\n\u003cp\u003eAlthough the company name was not explicitly stated, the article says it is assessed to be \u003cstrong\u003eStark Industries\u003c/strong\u003e, which had been sanctioned by the European Union in May 2025. The article also notes that some infrastructure was transferred to a Dutch-based entity called \u003cstrong\u003eTHE.Hostingaka WorkTitans\u003c/strong\u003e, which FIOD said acted as a cover for sanctioned entities.\u003c/p\u003e\n\n\u003ch3 id=\"cisa-kev-nomination-form\"\u003eCISA KEV nomination form\u003c/h3\u003e\n\n\u003cp\u003eCISA launched an online \u003cstrong\u003eKnown Exploited Vulnerabilities nomination form\u003c/strong\u003e so that researchers, vendors, and industry partners can directly submit KEVs to help the agency identify, validate, and share critical exploited-vulnerability information more quickly.\u003c/p\u003e\n\n\u003ch2 id=\"security-tools-highlighted\"\u003eSecurity Tools Highlighted\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by recommending two open-source tools:\u003c/p\u003e\n\n\u003ch3 id=\"bumblebee\"\u003eBumblebee\u003c/h3\u003e\n\n\u003cp\u003eA supply-chain security tool for \u003cstrong\u003emacOS and Linux\u003c/strong\u003e that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eScans developer systems read-only\u003c/li\u003e\n\u003cli\u003eAudits metadata files, manifests, and configurations\u003c/li\u003e\n\u003cli\u003eChecks language packages, browser extensions, text editor add-ons, and AI tool configurations\u003c/li\u003e\n\u003cli\u003eAvoids executing code or install scripts\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"claude-bughunter\"\u003eClaude-BugHunter\u003c/h3\u003e\n\n\u003cp\u003eAn open-source add-on that configures \u003cstrong\u003eAnthropic’s Claude Code CLI\u003c/strong\u003e into a security assistant with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePre-built vulnerability patterns\u003c/li\u003e\n\u003cli\u003eAttack techniques\u003c/li\u003e\n\u003cli\u003eReporting templates\u003c/li\u003e\n\u003cli\u003eAutomation for finding and documenting flaws during authorized testing\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes a disclaimer urging readers not to deploy such tools blindly into production and to review and test them safely.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaways\"\u003eOverall Takeaways\u003c/h2\u003e\n\n\u003cp\u003eThe article presents several clear operational themes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSoftware supply chain compromise remains a major systemic risk\u003c/strong\u003e, with the GitHub incident showing how one compromised developer tool can affect multiple organizations.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOlder vulnerabilities remain highly exploitable\u003c/strong\u003e, as shown by the nine-year-old Linux flaw and router vulnerabilities being adopted into botnets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSecurity products themselves are targets\u003c/strong\u003e, illustrated by active exploitation of Microsoft Defender flaws.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePatch delays are materially worsening risk\u003c/strong\u003e, reinforced by Verizon’s data and the article’s repeated focus on active exploitation of recently disclosed CVEs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePhishing and fraud operations are becoming more targeted and technically sophisticated\u003c/strong\u003e, with real-time OTP capture, digital wallet provisioning, and highly t
