ailored lures.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBotnets are opportunistically expanding\u003c/strong\u003e, especially through exposed routers and embedded devices.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article closes with a direct defensive message: patch easy and known problems before they become next week’s larger incidents. It argues that many of the week’s most serious stories stem from failures to remediate old, exposed, or neglected systems. Across supply chain abuse, active exploitation, malware distribution, and botnet growth, the recap’s central conclusion is that attackers continue to benefit from security debt that organizations have not resolved.\u003c/p\u003e\n","keyPoints":["GitHub confirmed that a poisoned version of the Nx Console VS Code extension on an employee device led to a breach of about 3,800 internal repositories.","A newly disclosed Linux kernel vulnerability, CVE-2026-46333, remained undetected for nine years and could let an unprivileged local user disclose sensitive files and execute arbitrary commands as root on default installations of Debian, Fedora, and Ubuntu.","Microsoft warned that two Microsoft Defender vulnerabilities, CVE-2026-41091 and CVE-2026-45498, are being actively exploited in the wild.","Drupal said that exploit attempts for the SQL injection flaw CVE-2026-9082 are being detected in the wild, and Imperva observed over 15,000 attack attempts targeting almost 6,000 sites across 65 countries.","Verizon reported that vulnerability exploitation accounted for 31% of data breaches over the past year, overtaking compromised credentials as the most common initial access vector for the first time in nearly two decades."],"insights":["The GitHub breach was part of the downstream fallout from the TanStack supply chain compromise, showing how one compromised developer tool can cascade into multiple victim organizations including GitHub, OpenAI, Mistral AI, and Grafana Labs.","TeamPCP’s public release of the Shai-Hulud code is notable because the article says it gives other attackers a ready-made blueprint for building similar worms that target open-source repositories and developer environments.","Microsoft Defender being actively exploited for both privilege escalation and denial-of-service is especially striking because the flaws affect a security product that organizations rely on for protection.","Verizon’s finding that vulnerability exploitation surpassed compromised credentials as the leading initial access vector, while only 26% of KEV-listed critical flaws were fully remediated in 2025, makes delayed patching a particularly actionable weakness highlighted by the article.","The article highlights that newer phishing ecosystems are moving beyond simple password theft to real-time interception of OTPs and digital wallet provisioning, enabling attackers to convert stolen payment data directly into usable financial access."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/T1f0/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites Verizon's report to note that vulnerability exploitation surpassed compromised credentials as the most common initial access vector for breaches.","category":"","primary":false},{"title":"Weaponization of Indian Student Data: An Ecosystem for Phishing, Social Engineering and Financial Fraud","url":"https://www.cyfirma.com/research/weaponization-of-indian-student-data-an-ecosystem-for-phishing-social-engineering-and-financial-fraud/","publisher":"CYFIRMA","context":"The article references this research when describing how attackers abuse student data in India's education ecosystem for phishing and fraud.","category":"","primary":false},{"title":"Fake Microsoft Teams Campaign Delivers ValleyRAT via NSIS Installer and DLL Sideloading","url":"https://labs.k7computing.com/index.php/fake-microsoft-teams-campaign-delivers-valleyrat-via-nsis-installer-and-dll-sideloading/","publisher":"K7 Labs","context":"The article cites this technical analysis to describe fake Microsoft Teams sites that distribute ValleyRAT through a DLL sideloading chain.","category":"","primary":false},{"title":"Malaysian Government with Undisclosed C2 Infrastructure","url":"https://oasis-security.io/blog/malaysian-government-with-undisclosed-c2-infrastructure","publisher":"Oasis Security","context":"The article points to this analysis for details on attacker-controlled Azure infrastructure used in a targeted intrusion campaign against Malaysian organizations.","category":"","primary":false},{"title":"Operation Dragon Whistle: UNG0002 Targets Chinese Academia via Weaponized Institutional Lure","url":"https://www.seqrite.com/blog/operation-dragon-whistle-ung002-targets-chinese-academia-via-weaponized-institutional-lure/","publisher":"Seqrite Labs","context":"The article references this research in describing a spear-phishing campaign targeting the Chinese educational sector with institution-specific lures.","category":"","primary":false},{"title":"Void Botnet uses Ethereum smart contracts for seizure-resistant C2","url":"https://qrator.net/blog/details/Void-Botnet-uses-Ethereum-smart-contracts-for-seizure-resistant-C2/","publisher":"Qrator Labs","context":"The article cites this technical analysis to explain how the Void Botnet uses Ethereum smart contracts for command-and-control.","category":"","primary":false},{"title":"NFC relay goes local: how AI is accelerating a new wave of independent malware developers","url":"https://www.cleafy.com/cleafy-labs/nfc-relay-goes-local-how-ai-is-accelerating-a-new-wave-of-independent-malware-developers","publisher":"Cleafy","context":"The article references this research when discussing the DevilNFC and NFCMultiPay Android NFC relay malware families.","category":"","primary":false},{"title":"TAX#TRIDENT: Indian Fax Lures","url":"https://www.securonix.com/blog/taxtrident-indian-fax-lures/","publisher":"Securonix","context":"The article cites this technical analysis for details on a campaign using Indian income tax-themed lures to target Windows endpoints.","category":"","primary":false}],"body":"\u003cp\u003eThe article’s main focus is the GitHub breach that was traced to a poisoned version of the Nx Console VS Code extension on an employee device, which GitHub said allowed TeamPCP to exfiltrate about 3,800 internal repositories. The Nx team said the compromised extension, nrwl.angular-console, was breached after one of its developers’ systems was hacked following the recent TanStack supply chain attack. The article frames this as part of the broader downstream fallout from the Mini Shai-Hulud campaign and notes that TeamPCP publicly released the Shai-Hulud code.\u003c/p\u003e\n\n\u003cp\u003eBeyond the supply chain incident, the roundup highlights multiple high-risk vulnerabilities and active exploitation across widely used platforms. These include a nine-year-old Linux kernel flaw that could allow root command execution, two actively exploited Microsoft Defender vulnerabilities, and a Drupal Core SQL injection bug seeing exploitation attempts in the wild. The article also emphasizes that phishing operations are becoming more targeted and that botnets are rapidly incorporating exposed routers and other internet-facing devices into large-scale campaigns.\u003c/p\u003e\n"},{"n":1,"title":"FBI warns of Kali365 phishing service targeting Microsoft 365 accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fbi-warns-of-kali365-phishing-service-targeting-microsoft-365-accounts/","time":"12:45","priority":"SHOULD READ","score":85,"tldr":"The FBI warns that Kali365 is a phishing-as-a-service platform that abuses Microsoft’s legitimate device code login flow to steal session tokens, bypass MFA, and take over Microsoft 365 accounts. Organizations should restrict or block device code authentication where possible and monitor for suspicious logins, inbox rules, and unauthorized device registrations.","briefOverview":"\u003cp\u003eThe FBI warned that the Kali365 phishing-as-a-service platform is being used to hijack Microsoft 365 accounts by abusing OAuth device code authentication to steal session tokens and bypass multi-factor authentication. According to the agency, Kali365 first emerged in April 2026 and is distributed through Telegram channels to cybercriminals seeking an easier way to compromise Microsoft 365 accounts. The platform relies on device code phishing, which abuses Microsoft’s legitimate OAuth 2.0 Device Authorization grant flow.\u003c/p\u003e\n\n\u003cp\u003eIn these attacks, threat actors generate a device code themselves and trick targets into entering it on Microsoft’s device login portal through phishing or social engineering. Once the victim completes MFA, Microsoft issues an OAuth access token that gives the attacker access to the victim’s account without requiring additional MFA challenges. The article says this can expose all applications the user normally accesses through single sign-on, including Microsoft 365 and Salesforce.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said Kali365 gives even low-skilled attackers access to AI-generated phishing lures, automated campaign templates, real-time victim tracking dashboards, and token-capture functionality. Arctic Wolf reported seeing widespread campaigns targeting organizations worldwide and said attackers used mailbox access to create malicious inbox rules and, in some cases, register new devices in victims’ Microsoft environments. The FBI recommended restricting or blocking device code authentication flows where possible, auditing their use, and blocking authentication transfer policies that let sessions move between devices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FBI issued a warning about Kali365, a phishing-as-a-service platform used to compromise Microsoft 365 accounts by abusing OAuth device code authentication. The agency said the platform first emerged in April 2026 and is being distributed through Telegram channels to cybercriminals. The service is designed to let attackers hijack accounts by stealing session tokens and bypassing multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Kali365 uses device code phishing, which abuses Microsoft’s legitimate OAuth 2.0 Device Authorization grant flow. This authentication method was originally created for devices with limited input capabilities, such as smart TVs, conference room systems, streaming devices, printers, and IoT devices. Those devices authenticate through another device using a short code entered at Microsoft’s device login portal.\u003c/p\u003e\n\n\u003cp\u003eIn the attack flow described, threat actors first initiate the device authorization process themselves in order to generate a code. They then trick victims into entering that code at Microsoft’s login page through phishing or social engineering. Once the victim enters the code and completes MFA, Microsoft issues an OAuth access token that gives the attacker access to the account without additional MFA challenges.\u003c/p\u003e\n\n\u003cp\u003eThe article says attackers can then access all applications the victim normally reaches through their single-sign-on account, including Microsoft 365, Salesforce, and other cloud SaaS platforms. This access is used to steal data. BleepingComputer also notes that in February it reported extortion gangs, including the ShinyHunters cybercrime group, targeting Microsoft Entra accounts using device-code and voice phishing.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said Kali365 lowers the barrier to entry by giving low-skilled attackers access to AI-generated phishing lures, automated campaign templates, real-time victim-tracking dashboards, and token-capture functions. Arctic Wolf reported on Kali365 activity in April after observing widespread campaigns targeting organizations worldwide. According to the researchers, attackers who gained mailbox access created malicious inbox rules to hide their activity and in some cases registered new devices in victims’ Microsoft environments to extend access.\u003c/p\u003e\n\n\u003cp\u003eArctic Wolf said Kali365 operates as a business with admins handling development, resellers promoting the service, and affiliates conducting phishing attacks. The platform reportedly offers two attack modes: device code phishing and an adversary-in-the-middle mode called Cookie Link. Cookie Link proxies victims through attacker-controlled infrastructure and captures authenticated browser sessions, session cookies, and tokens after login and MFA, while the FBI recommended restricting or blocking device code authentication flows, auditing their use, and blocking authentication transfer policies that allow sessions to move between devices.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article reports that the FBI has warned about Kali365, a phishing-as-a-service (PhaaS) platform used to hijack Microsoft 365 accounts by abusing OAuth device code authentication. According to the FBI, Kali365 steals session tokens and bypasses multi-factor authentication (MFA), enabling attackers to gain account access without stealing passwords or intercepting MFA codes.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Kali365 first emerged in April 2026 and is distributed via Telegram channels for cybercriminals who want an easier way to compromise Microsoft 365 accounts. The warning was published in an FBI public service announcement, and the article presents Kali365 as part of a broader trend in 2026 involving device code phishing against Microsoft 365 and Microsoft Entra environments.\u003c/p\u003e\n\n\u003ch1 id=\"what-kali365-abuses\"\u003eWhat Kali365 abuses\u003c/h1\u003e\n\n\u003cp\u003eThe core technique described is device code phishing, which abuses Microsoft’s legitimate OAuth 2.0 Device Authorization grant flow. The article explains that this authentication method was designed for devices with limited input capabilities, such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSmart TVs\u003c/li\u003e\n\u003cli\u003eConference room systems\u003c/li\u003e\n\u003cli\u003eStreaming devices\u003c/li\u003e\n\u003cli\u003ePrinters\u003c/li\u003e\n\u003cli\u003eIoT devices\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese devices authenticate by displaying a short code that a user enters on another device at Microsoft’s device code login portal, identified in the article as \u003ccode\u003emicrosoft.com/devicelogin\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"how-the-attack-works\"\u003eHow the attack works\u003c/h1\u003e\n\n\u003cp\u003eThe article describes the attack flow in a step-by-step manner:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThreat actors initiate the device authorization process themselves.\u003c/li\u003e\n\u003cli\u003eThis generates a device code.\u003c/li\u003e\n\u003cli\u003eAttackers trick the target into entering that code on Microsoft’s legitimate login page through phishing or social engineering.\u003c/li\u003e\n\u003cli\u003eThe victim completes MFA.\u003c/li\u003e\n\u003cli\u003eMicrosoft issues an OAuth access token.\u003c/li\u003e\n\u003cli\u003eThe attacker uses that token to access the victim’s account without needing to solve further MFA challenges.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article emphasizes that once this token is issued, attackers can access all applications the user normally accesses through their single-sign-on account. It specifically mentions Microsoft 365, Salesforce, and other cloud SaaS platforms as examples of what may become accessible.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-threat-matters\"\u003eWhy the threat matters\u003c/h1\u003e\n\n\u003cp\u003eThe article frames Kali365 as significant because it makes advanced phishing capabilities available to lower-skilled attackers. According to the FBI, the platform includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI-generated phishing lures\u003c/li\u003e\n\u003cli\u003eAutomated campaign templates\u003c/li\u003e\n\u003cli\u003eReal-time victim-tracking dashboards\u003c/li\u003e\n\u003cli\u003eToken-capture functionality\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBy packaging these capabilities into a service distributed through Telegram channels, Kali365 is presented as lowering the barrier to conducting sophisticated phishing attacks against Microsoft 365 users.\u003c/p\u003e\n\n\u003ch1 id=\"related-activity-and-broader-trend\"\u003eRelated activity and broader trend\u003c/h1\u003e\n\n\u003cp\u003eThe article notes that in February, BleepingComputer reported on device-code and voice phishing attacks against Microsoft Entra accounts. It specifically names extortion gangs, including the ShinyHunters cybercrime group, as being involved in those earlier attacks.\u003c/p\u003e\n\n\u003cp\u003eIt also says device code phishing has seen widespread adoption in 2026. Beyond Kali365, the article names other platforms and services using the same approach to compromise Microsoft 365 and Entra accounts, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEvilTokens PhaaS\u003c/li\u003e\n\u003cli\u003eTycoon2FA\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis places Kali365 within a larger pattern of attackers increasingly adopting device code phishing in active campaigns.\u003c/p\u003e\n\n\u003ch1 id=\"arctic-wolf-findings\"\u003eArctic Wolf findings\u003c/h1\u003e\n\n\u003cp\u003eThe article cites security researchers at Arctic Wolf, who reported on Kali365 activity in April after observing a widespread campaign targeting organizations worldwide. Their reporting adds operational detail about what attackers did after gaining access.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Arctic Wolf said the campaigns primarily targeted Microsoft 365 environments using phishing emails that directed victims to Microsoft’s device code login portal, where victims unknowingly authorized attacker access.\u003c/p\u003e\n\n\u003cp\u003eArctic Wolf said that after attackers gained access to mailboxes, they created malicious inbox rules designed to hide their activity. The article also notes that in some incidents, attackers registered new devices in victims’ Microsoft environments, which further extended access into the breached network.\u003c/p\u003e\n\n\u003ch1 id=\"kali365-operating-model\"\u003eKali365 operating model\u003c/h1\u003e\n\n\u003cp\u003eThe article says Arctic Wolf found that Kali365 operates as a business. It describes a structure involving:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdmins managing product development\u003c/li\u003e\n\u003cli\u003eResellers promoting the service to other threat actors\u003c/li\u003e\n\u003cli\u003eAffiliates conducting the phishing attacks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis description reinforces the phishing-as-a-service model and shows that Kali365 is not presented as a one-off tool, but as an organized criminal service with roles supporting development, sales, and operations.\u003c/p\u003e\n\n\u003ch1 id=\"attack-modes-offered-by-kali365\"\u003eAttack modes offered by Kali365\u003c/h1\u003e\n\n\u003cp\u003eThe article says Arctic Wolf identified two separate attack modes offered by the platform:\u003c/p\u003e\n\n\u003ch2 id=\"1-device-code-phishing\"\u003e1. Device code phishing\u003c/h2\u003e\n\n\u003cp\u003eThis is the primary method discussed throughout the article. It depends on generating a device code, tricking a victim into entering it at Microsoft’s login portal, and then obtaining an OAuth access token after the victim completes MFA.\u003c/p\u003e\n\n\u003ch2 id=\"2-cookie-link-adversary-in-the-middle-mode\"\u003e2. \u0026ldquo;Cookie Link\u0026rdquo; adversary-in-the-middle mode\u003c/h2\u003e\n\n\u003cp\u003eThe second mode is an adversary-in-the-middle (AitM) option called \u0026ldquo;Cookie Link.\u0026rdquo; The article says this mode proxies victims through attacker-controlled infrastructure and captures:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAuthenticated browser sessions\u003c/li\u003e\n\u003cli\u003eSession cookies\u003c/li\u003e\n\u003cli\u003eTokens\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis happens after victims log in and complete MFA challenges.\u003c/p\u003e\n\n\u003ch1 id=\"impact-described-in-the-article\"\u003eImpact described in the article\u003c/h1\u003e\n\n\u003cp\u003eThe article describes several impacts associated with successful Kali365 attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttackers can gain full access to the victim’s account.\u003c/li\u003e\n\u003cli\u003eThey can access all applications available through the victim’s single-sign-on account.\u003c/li\u003e\n\u003cli\u003eThey can steal data from Microsoft 365, Salesforce, and other SaaS platforms.\u003c/li\u003e\n\u003cli\u003eThey can create malicious inbox rules to conceal their activity.\u003c/li\u003e\n\u003cli\u003eThey can register new devices in Microsoft environments to extend access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article’s description shows that the impact is not limited to one mailbox or one application, but may affect the victim’s wider cloud application access through single sign-on.\u003c/p\u003e\n\n\u003ch1 id=\"fbi-recommendations\"\u003eFBI recommendations\u003c/h1\u003e\n\n\u003cp\u003eThe FBI recommendations quoted in the article focus on limiting this attack path and preserving evidence. The article says the agency recommends that organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestrict or completely block device code authentication flows using Conditional Access policies where possible\u003c/li\u003e\n\u003cli\u003eAudit existing device code usage\u003c/li\u003e\n\u003cli\u003eBlock authentication transfer policies that allow authentication sessions to move between devices\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says the FBI urged impacted organizations to report incidents to the Internet Crime Complaint Center and preserve:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhishing emails\u003c/li\u003e\n\u003cli\u003eSuspicious login information\u003c/li\u003e\n\u003cli\u003eUnauthorized device registrations\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"article-s-overall-message\"\u003eArticle’s overall message\u003c/h1\u003e\n\n\u003cp\u003eThe article presents Kali365 as an example of how attackers are exploiting legitimate Microsoft authentication workflows to bypass MFA and obtain durable access through stolen tokens rather than credentials. It also highlights that this capability is being productized and distributed in a way that broadens access to sophisticated phishing methods.\u003c/p\u003e\n\n\u003cp\u003eIn addition to the FBI warning, the article uses Arctic Wolf’s reporting to show that Kali365 campaigns have already been observed globally, including post-compromise actions such as malicious inbox rule creation and unauthorized device registration. The article concludes by placing Kali365 alongside EvilTokens and Tycoon2FA as part of the broader 2026 rise in device code phishing against Microsoft 365 and Entra accounts.\u003c/p\u003e\n","keyPoints":["The FBI warned that the Kali365 phishing-as-a-service platform is being used to hijack Microsoft 365 accounts by abusing OAuth device code authentication to steal session tokens and bypass multi-factor authentication.","Kali365 uses device code phishing by tricking victims into entering attacker-generated codes on Microsoft’s device login portal, after which Microsoft issues OAuth access tokens that give attackers account access without additional MFA challenges.","Arctic Wolf reported that Kali365 campaigns targeted organizations worldwide and, after gaining mailbox access, attackers created malicious inbox rules and in some cases registered new devices in victims’ Microsoft environments.","According to Arctic Wolf, Kali365 operates as a business with admins, resellers, and affiliates, and it offers both device code phishing and an adversary-in-the-middle mode called Cookie Link that captures authenticated browser sessions, session cookies, and tokens.","The FBI recommended that organizations restrict or block device code authentication flows with Conditional Access policies where possible, audit existing device code usage, and block authentication transfer policies that allow sessions to move between devices."],"insights":["The attack succeeds without stealing passwords or intercepting MFA codes because victims complete Microsoft’s legitimate device code flow themselves, and the attacker receives an OAuth access token afterward.","A successful device code phishing attempt can extend beyond Microsoft 365 to any cloud applications tied to the victim’s single-sign-on account, including Salesforce, because the stolen token grants the same access the user normally has.","Arctic Wolf observed that attackers used post-compromise actions such as creating malicious inbox rules and registering new devices, indicating defenders should look for these follow-on changes rather than only the initial phishing event.","The FBI’s recommendation to block authentication transfer policies highlights that session movement between devices is a meaningful part of the abuse path, not just the initial phishing lure.","Kali365 lowers the barrier to entry for these attacks by packaging advanced capabilities such as AI-generated phishing lures, automated templates, real-time victim tracking, and token capture into a service sold through Telegram."],"referencedReports":[{"title":"PSA260521","url":"https://www.ic3.gov/PSA/2026/PSA260521","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"The article cites this FBI public service advisory as the warning about Kali365 and its use of device code phishing against Microsoft 365 accounts.","category":"","primary":false},{"title":"Token Bingo: Don’t Let Your Code Be the Winner","url":"https://arcticwolf.com/resources/blog/token-bingo-dont-let-your-code-be-the-winner/","publisher":"Arctic Wolf","context":"The article says Arctic Wolf reported on Kali365 activity in April and describes findings from this technical analysis about widespread campaigns, inbox rule abuse, and device registration.","category":"","primary":false},{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Unnamed sponsor/linked vendor page","context":"The article includes this linked guide as a downloadable whitepaper about validating security controls across six surfaces.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI warned that the Kali365 phishing-as-a-service platform is being used to hijack Microsoft 365 accounts by abusing OAuth device code authentication to steal session tokens and bypass multi-factor authentication. According to the agency, Kali365 first emerged in April 2026 and is distributed through Telegram channels to cybercriminals seeking an easier way to compromise Microsoft 365 accounts. The platform relies on device code phishing, which abuses Microsoft’s legitimate OAuth 2.0 Device Authorization grant flow.\u003c/p\u003e\n\n\u003cp\u003eIn these attacks, threat actors generate a device code themselves and trick targets into entering it on Microsoft’s device login portal through phishing or social engineering. Once the victim completes MFA, Microsoft issues an OAuth access token that gives the attacker access to the victim’s account without requiring additional MFA challenges. The article says this can expose all applications the user normally accesses through single sign-on, including Microsoft 365 and Salesforce.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said Kali365 gives even low-skilled attackers access to AI-generated phishing lures, automated campaign templates, real-time victim tracking dashboards, and token-capture functionality. Arctic Wolf reported seeing widespread campaigns targeting organizations worldwide and said attackers used mailbox access to create malicious inbox rules and, in some cases, register new devices in victims’ Microsoft environments. The FBI recommended restricting or blocking device code authentication flows where possible, auditing their use, and blocking authentication transfer policies that let sessions move between devices.\u003c/p\u003e\n"},{"n":2,"title":"Anthropic’s restricted Claude Mythos model may be coming to Claude Code","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/artificial-intelligence/anthropics-restricted-claude-mythos-model-may-be-coming-to-claude-code/","time":"17:07","priority":"SHOULD READ","score":78,"tldr":"Anthropic appears to be preparing a public rollout of its highly restricted Claude Mythos model in Claude Code after brief public sightings, suggesting it believes its guardrails are strong enough to manage a system capable of discovering and developing serious cyber exploits. The model is reportedly far more advanced than current Claude versions and has already found thousands of high- and critical-severity vulnerabilities through Anthropic’s Glasswing security project.","briefOverview":"\u003cp\u003eAnthropic appears to be preparing a broader rollout of its restricted Claude Mythos model after references to \u003ccode\u003eclaude-mythos-1-preview\u003c/code\u003e appeared in Claude Code and Claude Security. Some users also briefly saw a public toggle for Mythos in Claude Code before it was removed. The article says this indicates Anthropic is moving the model closer to public availability, although subscription availability is still unclear.\u003c/p\u003e\n\n\u003cp\u003eMythos was announced in April as an early preview model with major gains in code reasoning, autonomy, and computer security tasks compared with Claude Opus 4.7. Anthropic said the model can automatically develop functional cyberattacks at a highly professional level and warned that releasing it without strong guardrails could create severe risk to global digital infrastructure. The company previously delayed public release while developing protections to reduce the risk of abuse.\u003c/p\u003e\n\n\u003cp\u003eAnthropic also said it is using the unreleased Mythos Preview in a project called Glasswing to help secure critical software against potential AI-driven exploits. According to the article, Mythos found 10,000 high- or critical-severity vulnerabilities in its first month and has already helped up to 50 organizational partners. The article presents this as part of the reason Anthropic has treated the model as unusually sensitive.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic appears to be moving its restricted Claude Mythos model closer to public release, based on new references found in Claude Code and Claude Security. The article says a model named \u003ccode\u003eclaude-mythos-1-preview\u003c/code\u003e briefly appeared in those products, and some users even saw a Mythos toggle in the public version of Claude Code before it was taken offline. This is presented as evidence that Anthropic is preparing the model for broader rollout.\u003c/p\u003e\n\n\u003cp\u003eThe company originally announced Mythos on April 7 as an early preview frontier model focused on advanced computer security tasks. Anthropic said Mythos significantly outperformed its current flagship Claude Opus 4.7 in code reasoning and autonomy. The article emphasizes that the model’s coding gains are not merely incremental, but tied to sophisticated offensive security capability.\u003c/p\u003e\n\n\u003cp\u003eAccording to Anthropic’s own description in the article, Mythos can automatically develop functional cyberattacks at a highly professional level. Anthropic warned that the model’s release could pose a severe risk to global digital infrastructure if not carefully controlled. The company also said that in the short term, attackers could benefit first from such tools if frontier labs fail to manage releases responsibly.\u003c/p\u003e\n\n\u003cp\u003eBecause of that risk, Anthropic decided against a public release until it had built a strong guardrail system. The article suggests that the recent product references may indicate those guardrails are now sufficiently developed. However, it remains unclear whether Mythos would be available to all Claude subscription tiers if released.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights Anthropic’s Glasswing project, which uses the unreleased Claude Mythos Preview to help companies secure critical software from potential AI-driven exploits. Anthropic said this initiative has already supported up to 50 organizational partners. A dashboard shown by the company displayed open-source vulnerabilities across severity levels found by Mythos Preview.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said Mythos identified 10,000 high- or critical-severity vulnerabilities in its first month alone. The article presents that figure as a major reason Anthropic has delayed wider public access to the model. It also notes Anthropic’s currently available model lineup, which includes Claude Opus 4.7, Opus 4.6, Opus 4.5, Sonnet 4.6, and Haiku 5.5.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eAnthropic appears to be preparing the public rollout of its restricted Claude Mythos model, according to product references that surfaced in Claude Code and Claude Security. The article centers on signs that a model called \u003ccode\u003eclaude-mythos-1-preview\u003c/code\u003e is being integrated into Anthropic’s user-facing tooling, including a briefly visible public toggle in Claude Code that was later removed.\u003c/p\u003e\n\n\u003cp\u003eThe significance of this development comes from Anthropic’s earlier characterization of Mythos as a highly capable and potentially dangerous model in the cybersecurity domain. When the company announced Mythos in April, it described the system as a frontier model with unusually advanced computer security capabilities, especially in code reasoning and autonomy.\u003c/p\u003e\n\n\u003ch1 id=\"what-anthropic-previously-said-about-mythos\"\u003eWhat Anthropic Previously Said About Mythos\u003c/h1\u003e\n\n\u003cp\u003eAnthropic announced Mythos on April 7 in an early preview and framed it as a major step forward in security-related AI capability. According to the article, the company said Mythos showed major improvements over Claude Opus 4.7, which it identified as its current flagship model.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several specific claims Anthropic made about Mythos:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt has strikingly advanced capabilities in computer security tasks.\u003c/li\u003e\n\u003cli\u003eIt shows major improvements in code reasoning.\u003c/li\u003e\n\u003cli\u003eIt demonstrates greater autonomy than Opus 4.7.\u003c/li\u003e\n\u003cli\u003eIt can automatically develop functional cyberattacks at a highly professional level.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAnthropic also warned that the release of Mythos could create a severe risk to global digital infrastructure. The article quotes the company as saying that the side best able to use these tools will gain the advantage, and that in the short term this advantage could favor attackers if frontier labs do not carefully control deployment.\u003c/p\u003e\n\n\u003ch1 id=\"why-mythos-was-restricted\"\u003eWhy Mythos Was Restricted\u003c/h1\u003e\n\n\u003cp\u003eA central theme in the article is that Mythos was not treated like a routine model upgrade. Anthropic reportedly decided against a public rollout because of concern that attackers could use the system against a large volume of unpatched vulnerabilities in widely used applications such as Firefox.\u003c/p\u003e\n\n\u003cp\u003eThe article says Anthropic held back public release until it could prepare a powerful guardrail system. That delay is portrayed as a direct response to the model’s offensive security capability, rather than a general product-readiness issue.\u003c/p\u003e\n\n\u003ch1 id=\"new-evidence-of-product-integration\"\u003eNew Evidence of Product Integration\u003c/h1\u003e\n\n\u003cp\u003eThe article says Anthropic may now have developed a sufficiently strong guardrail system because references to Mythos have started appearing in public-facing products.\u003c/p\u003e\n\n\u003cp\u003eSpecifically, it notes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClaude Code and Claude Security both contained references to the Mythos model.\u003c/li\u003e\n\u003cli\u003eThe model name shown was \u003ccode\u003eclaude-mythos-1-preview\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSome users briefly saw an option to enable Mythos in the public version of Claude Code before it was taken offline.\u003c/li\u003e\n\u003cli\u003eThe model also briefly appeared in the public version of Claude Security.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents these observations as confirmation that Anthropic is preparing Mythos for public rollout. At the same time, it says the company has not clarified whether access would be limited or available across all subscription tiers.\u003c/p\u003e\n\n\u003ch1 id=\"glasswing-project-and-operational-use\"\u003eGlasswing Project and Operational Use\u003c/h1\u003e\n\n\u003cp\u003eBeyond the product sightings, the article says Anthropic has confirmed work on a project called Glasswing. This initiative involves collaboration with other companies to help secure critical software against potential AI-driven exploits.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Glasswing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUses the unreleased Claude Mythos Preview.\u003c/li\u003e\n\u003cli\u003eIs aimed at securing the world’s most critical software.\u003c/li\u003e\n\u003cli\u003eHas already helped up to 50 organizational partners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes mention of a dashboard shown by Anthropic that displayed open-source vulnerabilities found by Mythos Preview across multiple severity levels.\u003c/p\u003e\n\n\u003ch1 id=\"reported-impact-of-mythos-preview\"\u003eReported Impact of Mythos Preview\u003c/h1\u003e\n\n\u003cp\u003eOne of the most notable figures in the article is Anthropic’s claim that Mythos found 10,000 high- or critical-severity vulnerabilities in its first month alone. The article explicitly ties this number to Anthropic’s reluctance to release the model publicly before guardrails were in place.\u003c/p\u003e\n\n\u003cp\u003eThis reported volume of high-severity findings is used in the article to underscore why Anthropic has treated Mythos as a restricted model rather than a normal commercial offering.\u003c/p\u003e\n\n\u003ch1 id=\"affected-parties-and-stakeholders-mentioned\"\u003eAffected Parties and Stakeholders Mentioned\u003c/h1\u003e\n\n\u003cp\u003eThe article references several groups affected by or involved in the Mythos rollout:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAnthropic\u003c/strong\u003e, as the developer and decision-maker around access controls and deployment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUsers of Claude Code and Claude Security\u003c/strong\u003e, who briefly saw evidence of the model in public products.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOrganizational partners in Glasswing\u003c/strong\u003e, which the article says number up to 50.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSoftware vendors and maintainers of popular applications\u003c/strong\u003e, implicitly referenced through concern about unpatched vulnerabilities in software such as Firefox.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePotential attackers and defenders\u003c/strong\u003e, which Anthropic explicitly discusses in terms of who may benefit first from such tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"current-claude-model-lineup-mentioned\"\u003eCurrent Claude Model Lineup Mentioned\u003c/h1\u003e\n\n\u003cp\u003eFor context, the article states that Anthropic currently offers the following models:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClaude Opus 4.7\u003c/li\u003e\n\u003cli\u003eOpus 4.6\u003c/li\u003e\n\u003cli\u003eOpus 4.5\u003c/li\u003e\n\u003cli\u003eSonnet 4.6\u003c/li\u003e\n\u003cli\u003eHaiku 5.5\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis helps position Mythos as separate from Anthropic’s currently available standard lineup.\u003c/p\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom Line\u003c/h1\u003e\n\n\u003cp\u003eThe article’s core claim is that Anthropic is nearing a broader release of Claude Mythos, a model it previously restricted because of its ability to produce professional-grade cyberattacks and uncover large numbers of serious vulnerabilities. Evidence cited includes the temporary appearance of \u003ccode\u003eclaude-mythos-1-preview\u003c/code\u003e in Claude Code and Claude Security, along with Anthropic’s own disclosures about Glasswing and Mythos’s vulnerability-finding performance.\u003c/p\u003e\n\n\u003cp\u003eWhile the article stops short of confirming a launch date or access model, it presents the recent product references as the clearest sign yet that Anthropic is transitioning Mythos from tightly controlled preview use toward public deployment.\u003c/p\u003e\n","keyPoints":["Anthropic announced Mythos in April as a restricted preview model with significantly stronger computer security, code reasoning, and autonomy capabilities than Claude Opus 4.7.","Anthropic said Mythos can automatically develop functional cyberattacks at a highly professional level and warned that releasing such a model without strong controls could pose severe risks to global digital infrastructure.","References to a model named claude-mythos-1-preview briefly appeared in the public versions of Claude Code and Claude Security, indicating Anthropic is preparing it for broader rollout.","Anthropic said it is using the unreleased Claude Mythos Preview in its Glasswing project to help organizations secure critical software from potential AI-driven exploits.","According to the article, Mythos found 10,000 high- or critical-severity vulnerabilities in its first month, which Anthropic cited as a reason for delaying public release."],"insights":["The brief appearance of a Mythos toggle in public Claude Code suggests Anthropic’s internal rollout process has progressed beyond research preview and into product integration.","Anthropic’s decision to withhold Mythos from public release despite strong coding gains highlights that its main concern is not general capability, but the model’s ability to generate professional-grade cyberattacks.","The Glasswing project shows Anthropic is already using an unreleased high-risk model operationally with external partners before making it widely available.","A model that found 10,000 high- or critical-severity vulnerabilities in one month could create significant pressure on software vendors if similar capability becomes broadly accessible."],"referencedReports":[],"body":"\u003cp\u003eAnthropic appears to be preparing a broader rollout of its restricted Claude Mythos model after references to \u003ccode\u003eclaude-mythos-1-preview\u003c/code\u003e appeared in Claude Code and Claude Security. Some users also briefly saw a public toggle for Mythos in Claude Code before it was removed. The article says this indicates Anthropic is moving the model closer to public availability, although subscription availability is still unclear.\u003c/p\u003e\n\n\u003cp\u003eMythos was announced in April as an early preview model with major gains in code reasoning, autonomy, and computer security tasks compared with Claude Opus 4.7. Anthropic said the model can automatically develop functional cyberattacks at a highly professional level and warned that releasing it without strong guardrails could create severe risk to global digital infrastructure. The company previously delayed public release while developing protections to reduce the risk of abuse.\u003c/p\u003e\n\n\u003cp\u003eAnthropic also said it is using the unreleased Mythos Preview in a project called Glasswing to help secure critical software against potential AI-driven exploits. According to the article, Mythos found 10,000 high- or critical-severity vulnerabilities in its first month and has already helped up to 50 organizational partners. The article presents this as part of the reason Anthropic has treated the model as unusually sensitive.\u003c/p\u003e\n"},{"n":4,"title":"The Alert Firehose Finally Meets Its Match","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/the-alert-firehose-finally-meets-its.html","time":"11:30","priority":"MAY READ","score":54,"tldr":"The article argues that modern NDR is no longer just a noisy alert source because agentic AI can automatically correlate huge volumes of network data into a small set of prioritized, evidence-backed detections. With proper baselining, tuning, and SOC integration, this lets analysts focus on real threats faster while reducing false positives and manual triage.","briefOverview":"\u003cp\u003eThe article argues that Network Detection and Response (NDR) still carries a reputation for being noisy, but that this view is increasingly outdated when NDR is paired with agentic AI. According to the piece, older deployments often exposed analysts to large volumes of raw network visibility and required heavy manual tuning, which helped create the perception of an \u0026ldquo;alert firehose.\u0026rdquo; The article presents agentic AI as changing that model by automating data collection, triage, correlation, and initial analysis.\u003c/p\u003e\n\n\u003cp\u003eA central claim is that the same large data volume once seen as noise can become useful when AI can simultaneously analyze thousands of data points and connect low-profile activity into actionable detections. The article gives an example in which 847 network anomalies and 312 potentially malicious machine learning flags are reduced to four prioritized detections with evidence and suggested response actions. It also states that some advanced NDR platforms let analysts inspect how the AI reached its conclusions.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that agentic AI does not remove the need for proper deployment practices. It identifies baselining, ongoing tuning, and SOC integration as the main factors that determine whether NDR becomes a trusted partner instead of a noisy neighbor. It concludes that NDR with agentic AI can reduce manual tuning dependency, improve context, surface signals otherwise missed, and help analysts focus on higher-severity threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on the long-standing criticism that Network Detection and Response platforms are noisy and produce too much data, and argues that this perception does not reflect how newer NDR deployments operate when they include agentic AI capabilities. It says the older reputation was shaped by systems that delivered deep network visibility but often left analysts with raw material instead of finished intelligence. In some cases, organizations needed extensive manual tuning during deployment to prevent overloading SIEMs, and those that did not invest in tuning helped reinforce the \u0026ldquo;alert firehose\u0026rdquo; narrative.\u003c/p\u003e\n\n\u003cp\u003eThe piece presents agentic AI as the mechanism that changes how NDR data is handled. It describes agentic AI as autonomously fetching data, triaging alerts, performing correlation, and carrying out initial analysis, thereby taking on repetitive tasks that previously consumed analyst time. The article says that because AI can analyze large numbers of data points at once, it can turn low-severity or informational activity into a correlated story that might reveal threats human teams would not have had the capacity to identify.\u003c/p\u003e\n\n\u003cp\u003eTo illustrate this, the article contrasts a traditional workflow with one assisted by agentic AI. In its example, an NDR system detects 847 network anomalies in a 24-hour period and machine learning models flag 312 as potentially malicious, after which analysts would normally need to manually investigate and dismiss many false positives before identifying four detections requiring action. With agentic AI, the article says the same volume is automatically correlated and reduced to four prioritized detections, each supplied with supporting network evidence and suggested response actions, such as linking a DNS anomaly with a new endpoint process, identifying a compromised identity, or matching TTP patterns to Cobalt Strike beacons.\u003c/p\u003e\n\n\u003cp\u003eThe article also stresses that proper deployment remains necessary even with AI. It identifies three operational requirements: baselining normal network behavior, staying tuned as networks evolve, and integrating NDR into the SOC. Baselining allows anomaly detection methods to learn expected traffic, devices, and activities, while tuning and analyst feedback help reduce false positives; ongoing adjustments are needed because new applications, cloud workloads, unknown devices, and AI-driven data flows can shift the baseline over time.\u003c/p\u003e\n\n\u003cp\u003eAnother important theme is the role of data quality in AI-powered SOC operations. The article references a report showing that one type of data improved CTF test scores by over 350%, raised accuracy to 95% versus 26%, and delivered nearly 300% more incident response findings than common log formats, while frontier AI models performed at comparable levels across test runs. Based on that, the article argues that data quality had a greater effect on security outcomes than model choice, and it suggests organizations can reduce analyst-facing noise further by using APIs and detection feeds strategically so NDR AI performs correlation before alerts are sent to SIEMs or other SOC tools.\u003c/p\u003e\n\n\u003cp\u003eOverall, the article concludes that the idea that NDR is inherently noisy is being replaced by a model in which AI correlates at scale, creates context, identifies signals lost in raw volume, and reduces reliance on manual tuning. It presents NDR with agentic AI as improving visibility, accelerating response, and helping SOC teams focus on higher-severity threats rather than repetitive triage. The organizations most directly discussed are SOC teams and enterprises deploying NDR, SIEM, and other AI-enabled security operations tools.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article argues that Network Detection and Response (NDR) has long been labeled as noisy and overly data-heavy, but that this reputation is increasingly outdated when NDR is paired with agentic AI. It presents the historical complaint as rooted in older deployment experiences where NDR provided deep network visibility but often left analysts with raw data rather than fully developed intelligence. According to the article, manual tuning demands and SIEM overload contributed to the persistent idea that NDR created an \u0026ldquo;alert firehose.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe central claim is that agentic AI changes the operational value of NDR by transforming high data volume from a burden into an advantage. Instead of overwhelming analysts, the same stream of network telemetry can be automatically triaged, correlated, and analyzed so that only the most relevant detections rise to the surface. The article frames this as a fundamental shift in how NDR should be understood in modern SOC environments.\u003c/p\u003e\n\n\u003ch1 id=\"why-ndr-was-seen-as-noisy\"\u003eWhy NDR Was Seen as Noisy\u003c/h1\u003e\n\n\u003cp\u003eThe article says NDR deployments have always delivered deep visibility into:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetwork traffic\u003c/li\u003e\n\u003cli\u003eEncrypted session behavior\u003c/li\u003e\n\u003cli\u003eProtocol anomalies\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHowever, that visibility often arrived as raw material instead of finished intelligence. The article notes that some systems required extensive manual tuning during deployment to avoid overloading SIEM platforms. Organizations that either could not make that investment or did not recognize how important it was helped establish and reinforce NDR\u0026rsquo;s reputation for excessive alerting and noise.\u003c/p\u003e\n\n\u003ch1 id=\"how-agentic-ai-changes-the-model\"\u003eHow Agentic AI Changes the Model\u003c/h1\u003e\n\n\u003cp\u003eThe article describes agentic AI as taking over work that previously consumed analyst capacity. Specifically, it says agentic AI can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutonomously fetch data\u003c/li\u003e\n\u003cli\u003eTriage alerts\u003c/li\u003e\n\u003cli\u003ePerform correlation\u003c/li\u003e\n\u003cli\u003eConduct initial analysis\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis matters because the article treats the former problem of scale as solvable through automation. It argues that AI can ingest and analyze thousands of data points simultaneously, allowing low-severity, informational, or otherwise low-profile activity to be assembled into meaningful detections. In that framing, what was previously dismissed as noise may contain useful relationships and indicators that human SOC teams would not have had the time to connect.\u003c/p\u003e\n\n\u003cp\u003eThe article also says that NDR with agentic AI can produce a complete, correlated story from network data and present a prioritized set of detections. Examples it gives include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn anomalous connection tied to a failed login\u003c/li\u003e\n\u003cli\u003eA suspicious DNS query\u003c/li\u003e\n\u003cli\u003eUnusual file access\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEach detection is said to include the network evidence needed to give analysts immediate context.\u003c/p\u003e\n\n\u003ch1 id=\"reduction-of-manual-tuning-burden\"\u003eReduction of Manual Tuning Burden\u003c/h1\u003e\n\n\u003cp\u003eThe article does not claim that tuning is no longer needed. Instead, it says NDR should still be tuned to ignore truly meaningless noise. At the same time, it argues that agentic AI reduces the manual tuning burden that older NDR deployments struggled with because AI can identify and automate detection improvements through its correlation capabilities.\u003c/p\u003e\n\n\u003cp\u003eThis point is important to the article\u0026rsquo;s thesis: the goal is not to eliminate operational discipline, but to reduce dependence on analyst labor for repetitive tuning and triage tasks.\u003c/p\u003e\n\n\u003ch1 id=\"side-by-side-example-without-and-with-agentic-ai\"\u003eSide-by-Side Example: Without and With Agentic AI\u003c/h1\u003e\n\n\u003cp\u003eThe article provides a concrete comparison between traditional NDR workflows and AI-assisted ones.\u003c/p\u003e\n\n\u003ch2 id=\"without-agentic-ai\"\u003eWithout agentic AI\u003c/h2\u003e\n\n\u003cp\u003eIn a 24-hour window, the article asks the reader to imagine:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e847 network anomalies detected\u003c/li\u003e\n\u003cli\u003e312 machine learning flags marked as potentially malicious\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt says analysts would then manually triage and investigate those alerts, dismiss many as false positives, and ultimately identify four detections that require action.\u003c/p\u003e\n\n\u003ch2 id=\"with-agentic-ai\"\u003eWith agentic AI\u003c/h2\u003e\n\n\u003cp\u003eUsing the same volume and same time period, the article says agentic AI would:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCorrelate the alerts\u003c/li\u003e\n\u003cli\u003eReason through the evidence\u003c/li\u003e\n\u003cli\u003eDraw conclusions\u003c/li\u003e\n\u003cli\u003ePresent four prioritized detections to analysts\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these detections would include relevant evidence and suggested response actions. It gives examples of the AI:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDetermining that a DNS anomaly correlates with a new endpoint process\u003c/li\u003e\n\u003cli\u003eFlagging a compromised identity\u003c/li\u003e\n\u003cli\u003eMatching TTP patterns to Cobalt Strike beacons\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also states that advanced NDR can let analysts inspect how the AI reached its conclusions for transparency.\u003c/p\u003e\n\n\u003ch1 id=\"operational-requirements-still-matter\"\u003eOperational Requirements Still Matter\u003c/h1\u003e\n\n\u003cp\u003eA major theme in the article is that agentic AI does not remove the need for proper deployment. It names three factors that determine whether NDR becomes a trusted partner rather than a noisy neighbor:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBaselining\u003c/li\u003e\n\u003cli\u003eStaying tuned\u003c/li\u003e\n\u003cli\u003eSOC integration\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"baselining\"\u003eBaselining\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that while NDR detection engines can generate alerts immediately out of the box, some methods such as anomaly detection need time to baseline normal behavior. During this period, the platform observes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTypical traffic flows\u003c/li\u003e\n\u003cli\u003eKnown server and endpoint activities\u003c/li\u003e\n\u003cli\u003eExpected devices\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this process is usually automated by NDR platforms and helps separate routine operations from real threats. It adds that tuning builds on this baseline, and when false positives occur, analysts can classify and eliminate them from the queue, helping retrain detections and reduce noise.\u003c/p\u003e\n\n\u003ch2 id=\"staying-tuned\"\u003eStaying tuned\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that networks change over time. It specifically mentions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNew applications\u003c/li\u003e\n\u003cli\u003eCloud workloads\u003c/li\u003e\n\u003cli\u003eUnknown devices\u003c/li\u003e\n\u003cli\u003eAI-driven data flows\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause these changes can shift the baseline, the article says an outdated baseline may create more false positives. Regular tuning keeps the platform calibrated, while AI can help spot emerging patterns before they become a source of noise.\u003c/p\u003e\n\n\u003ch2 id=\"soc-integration\"\u003eSOC integration\u003c/h2\u003e\n\n\u003cp\u003eThe article says NDR data can serve as input for other systems in an AI-powered SOC. It argues that when AI receives high-fidelity data, it can distinguish true threats from false positives more accurately. This is presented as an important factor in addressing noise at the SOC level, not just within the NDR platform itself.\u003c/p\u003e\n\n\u003ch1 id=\"data-quality-as-a-security-outcome-multiplier\"\u003eData Quality as a Security Outcome Multiplier\u003c/h1\u003e\n\n\u003cp\u003eThe article includes a section emphasizing that data quality matters significantly in AI-driven security operations. It refers to a recent report and says that one type of data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImproved CTF test scores by over 350%\u003c/li\u003e\n\u003cli\u003eIncreased accuracy to 95% versus 26%\u003c/li\u003e\n\u003cli\u003eDelivered nearly 300% more incident response findings compared to common log formats\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article further says that across test runs in that study, frontier AI models performed at comparable levels. Based on that, it concludes that data quality, rather than model choice, had the greater impact on security outcomes.\u003c/p\u003e\n\n\u003cp\u003eThis argument is used to support the broader claim that NDR\u0026rsquo;s role is not only detection, but also supplying better input into AI-powered SOC systems.\u003c/p\u003e\n\n\u003ch1 id=\"integration-with-other-soc-tools\"\u003eIntegration With Other SOC Tools\u003c/h1\u003e\n\n\u003cp\u003eThe article says the same high-quality data can enrich:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOther AI SOC tools\u003c/li\u003e\n\u003cli\u003eSIEMs powered with AI, including CrowdStrike\u0026rsquo;s Charlotte as an example\u003c/li\u003e\n\u003cli\u003eConnections to local models via MCP\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also offers a deployment strategy: organizations can use APIs and detection feeds so that NDR AI performs correlation before alerts are sent into SIEMs or other platforms. The article presents this as a way to reduce noise before it reaches the analyst queue.\u003c/p\u003e\n\n\u003ch1 id=\"claimed-benefits\"\u003eClaimed Benefits\u003c/h1\u003e\n\n\u003cp\u003eThe article summarizes the changing NDR narrative by saying AI designed to correlate at scale can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHandle the volume\u003c/li\u003e\n\u003cli\u003eCreate context\u003c/li\u003e\n\u003cli\u003eFind signals otherwise lost in the noise\u003c/li\u003e\n\u003cli\u003eReduce manual tuning dependency\u003c/li\u003e\n\u003cli\u003eShift analyst focus to high-severity threats\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt then argues that proper deployment handles the remaining operational issues. In the article\u0026rsquo;s telling, the result is an NDR capability that improves visibility, accelerates response, and helps the SOC keep pace with the network.\u003c/p\u003e\n\n\u003ch1 id=\"affected-parties-and-stakeholders-mentioned\"\u003eAffected Parties and Stakeholders Mentioned\u003c/h1\u003e\n\n\u003cp\u003eThe article is aimed primarily at organizations operating security operations centers and deploying network-focused detection technologies. The most directly affected or referenced parties are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSOC analysts\u003c/li\u003e\n\u003cli\u003eOrganizations deploying NDR\u003c/li\u003e\n\u003cli\u003eTeams managing SIEM and AI-powered SOC tooling\u003c/li\u003e\n\u003cli\u003eEnterprises dealing with changing network environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not identify a threat actor, victim organization, breach event, or incident campaign. It is a technology and operational analysis focused on detection workflow, alert reduction, and SOC efficiency.\u003c/p\u003e\n\n\u003ch1 id=\"vendor-positioning-in-the-article\"\u003eVendor Positioning in the Article\u003c/h1\u003e\n\n\u003cp\u003eThe final section promotes Corelight\u0026rsquo;s Network Detection \u0026amp; Response platform, describing it as trusted to defend sensitive networks and as combining:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeep visibility\u003c/li\u003e\n\u003cli\u003eAgentic AI\u003c/li\u003e\n\u003cli\u003eAdvanced behavioral detections\u003c/li\u003e\n\u003cli\u003eAnomaly detections\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article positions this combination as a way to help SOC teams uncover new and fast-moving threats.\u003c/p\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom Line\u003c/h1\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s main message is that the old criticism of NDR as inherently noisy is being displaced by a newer model in which agentic AI performs the heavy lifting of triage and correlation. Rather than forcing analysts to sift through hundreds of anomalies and false positives, the article says AI can condense raw network data into a small number of prioritized, evidence-backed detections.\u003c/p\u003e\n\n\u003cp\u003eIt also makes clear that this outcome depends on sound deployment practices, including baselining, regular tuning, and integration with broader SOC workflows. In its conclusion, the article presents NDR not as an alert firehose, but as a visibility and data-quality layer that, when combined with agentic AI, can improve detection quality and analyst efficiency.\u003c/p\u003e\n","keyPoints":["The article says NDR earned a reputation for being noisy because earlier deployments often produced large volumes of raw alerts and sometimes required extensive manual tuning to avoid overwhelming SIEMs and analysts.","It argues that agentic AI can autonomously fetch data, triage alerts, correlate evidence, and perform initial analysis so that large volumes of NDR data become a source of actionable detections instead of an alert firehose.","The article gives an example in which 847 network anomalies and 312 potentially malicious flags are reduced by agentic AI into four prioritized detections with supporting evidence and suggested response actions.","The article states that proper NDR deployment still depends on baselining normal network behavior, regular tuning as networks change, and integration with the SOC so AI can work with high-fidelity data.","It concludes that NDR with agentic AI reduces manual tuning dependency, improves context around detections, and helps analysts focus on higher-severity threats rather than spending time on false positives and repetitive triage."],"insights":["The article highlights a reversal in how NDR data volume is viewed: the same volume once seen as noise becomes a strategic asset when agentic AI can analyze thousands of data points at once and connect low-severity activity that humans would likely miss.","A notable operational point is that agentic AI does not remove the need for deployment discipline, because baselining, ongoing tuning, and SOC integration are still presented as essential to keeping NDR effective and reducing false positives.","The comparison of a 24-hour alert window suggests the main practical value of agentic AI is not generating more alerts, but compressing hundreds of anomalies and model flags into a very small number of prioritized detections with evidence and response guidance.","The article underscores that in AI-powered SOC workflows, data quality can matter more than model choice, citing a report where higher-fidelity data produced much better CTF scores, higher accuracy, and substantially more incident response findings across comparable frontier models.","An actionable architectural idea in the article is to let the NDR AI perform correlation before alerts are forwarded to SIEMs or other SOC tools, reducing noise before it reaches the analyst queue."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that Network Detection and Response (NDR) still carries a reputation for being noisy, but that this view is increasingly outdated when NDR is paired with agentic AI. According to the piece, older deployments often exposed analysts to large volumes of raw network visibility and required heavy manual tuning, which helped create the perception of an \u0026ldquo;alert firehose.\u0026rdquo; The article presents agentic AI as changing that model by automating data collection, triage, correlation, and initial analysis.\u003c/p\u003e\n\n\u003cp\u003eA central claim is that the same large data volume once seen as noise can become useful when AI can simultaneously analyze thousands of data points and connect low-profile activity into actionable detections. The article gives an example in which 847 network anomalies and 312 potentially malicious machine learning flags are reduced to four prioritized detections with evidence and suggested response actions. It also states that some advanced NDR platforms let analysts inspect how the AI reached its conclusions.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that agentic AI does not remove the need for proper deployment practices. It identifies baselining, ongoing tuning, and SOC integration as the main factors that determine whether NDR becomes a trusted partner instead of a noisy neighbor. It concludes that NDR with agentic AI can reduce manual tuning dependency, improve context, surface signals otherwise missed, and help analysts focus on higher-severity threats.\u003c/p\u003e\n"}];

<script type="text/babel">

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

function priorityColor(p) {

}
function priorityShort(p) {

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
