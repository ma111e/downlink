<script type="application/json" id="dl-articles">[{"n":5,"title":"Emerging Threat: (CVE-2026-55957) Apache Tomcat Authentication Bypass via JNDIRealm GSSAPI Binds","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/emerging-threat-cve-2026-55957-apache-tomcat-authentication-bypass-via-jndirealm-gssapi-binds/","time":"09:18","priority":"MUST READ","score":92,"tldr":"CVE-2026-55957 is a critical Apache Tomcat authentication bypass affecting JNDIRealm configurations that use GSSAPI LDAP binds, allowing pre-authentication access without the correct password. Organizations should upgrade to Tomcat 11.0.5, 10.1.37, or 9.0.101 and urgently identify any exposed directory-integrated Tomcat instances.","briefOverview":"\u003cp\u003eCVE-2026-55957 is a critical Apache Tomcat authentication bypass affecting JNDIRealm when it is configured to authenticate LDAP binds using GSSAPI. The vulnerability has a CVSS v3.1 base score of 9.8, while Apache classifies it as “Important” because exploitation depends on a specific deployment configuration. Exploitation is pre-authentication and can allow an attacker to authenticate without the correct password.\u003c/p\u003e\n\n\u003cp\u003eThe affected condition applies to Tomcat instances that delegate authentication to an LDAP or Active Directory server through JNDIRealm with GSSAPI selected as the bind mechanism. A successful bypass grants access according to the directory-backed identity used inside the application, exposing resources protected by that authentication boundary. Affected versions include Tomcat 11.0.0-M1 through 11.0.4, 10.1.0-M1 through 10.1.36, 9.0.0.M1 through 9.0.100, 8.5.0 through 8.5.100, and 7.0.0 through 7.0.109.\u003c/p\u003e\n\n\u003cp\u003eApache has released fixed versions for supported branches: Tomcat 11.0.5, 10.1.37, and 9.0.101. The article says Apache lists no workaround other than upgrading, and organizations on end-of-life 8.5.x or 7.0.x branches should treat migration to a supported branch as part of remediation. Recommended actions include inventorying affected JNDIRealm and GSSAPI configurations, restricting network access, monitoring directory server logs, auditing recent access, disabling GSSAPI-authenticated binds where immediate upgrade is not feasible, and confirming fixes in third-party platforms that bundle Tomcat.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CVE-2026-55957 is an Apache Tomcat authentication bypass in JNDIRealm when it is configured to authenticate LDAP binds using GSSAPI.","The vulnerability is pre-authentication and can allow an attacker to authenticate without supplying the correct password, gaining access based on the affected directory-backed identity.","Affected releases include Apache Tomcat 11.0.0-M1 through 11.0.4, 10.1.0-M1 through 10.1.36, 9.0.0.M1 through 9.0.100, 8.5.0 through 8.5.100, and 7.0.0 through 7.0.109.","Apache Software Foundation has released patched versions for supported branches: Tomcat 11.0.5, 10.1.37, and 9.0.101.","The article recommends inventorying Tomcat instances using JNDIRealm with GSSAPI binds, restricting network access, monitoring directory logs, auditing recent access, disabling GSSAPI-authenticated binds where upgrades are not immediately feasible, and confirming fixes in third-party platforms that bundle Tomcat."],"insights":["Apache rates the issue as “Important” despite its 9.8 critical CVSS score because exploitation depends on a specific JNDIRealm configuration using GSSAPI-authenticated binds.","The article highlights Consumer Discretionary organizations as the largest observed exposure group at 57.1%, linking this to distributed franchise, subsidiary, and e-commerce environments with historically separate directory integrations.","The risk is amplified because directory-integrated Tomcat instances were often built for internal use but may later become reachable through VPN gateways, reverse proxies, or forgotten firewall rules.","Apache lists no workaround other than upgrading, so organizations running end-of-life Tomcat 8.5.x or 7.0.x are expected to migrate to a supported branch as part of remediation."],"referencedReports":[],"body":"\u003cp\u003eCVE-2026-55957 is a critical Apache Tomcat authentication bypass affecting JNDIRealm when it is configured to authenticate LDAP binds using GSSAPI. The vulnerability has a CVSS v3.1 base score of 9.8, while Apache classifies it as “Important” because exploitation depends on a specific deployment configuration. Exploitation is pre-authentication and can allow an attacker to authenticate without the correct password.\u003c/p\u003e\n\n\u003cp\u003eThe affected condition applies to Tomcat instances that delegate authentication to an LDAP or Active Directory server through JNDIRealm with GSSAPI selected as the bind mechanism. A successful bypass grants access according to the directory-backed identity used inside the application, exposing resources protected by that authentication boundary. Affected versions include Tomcat 11.0.0-M1 through 11.0.4, 10.1.0-M1 through 10.1.36, 9.0.0.M1 through 9.0.100, 8.5.0 through 8.5.100, and 7.0.0 through 7.0.109.\u003c/p\u003e\n\n\u003cp\u003eApache has released fixed versions for supported branches: Tomcat 11.0.5, 10.1.37, and 9.0.101. The article says Apache lists no workaround other than upgrading, and organizations on end-of-life 8.5.x or 7.0.x branches should treat migration to a supported branch as part of remediation. Recommended actions include inventorying affected JNDIRealm and GSSAPI configurations, restricting network access, monitoring directory server logs, auditing recent access, disabling GSSAPI-authenticated binds where immediate upgrade is not feasible, and confirming fixes in third-party platforms that bundle Tomcat.\u003c/p\u003e\n"},{"n":2,"title":"Adobe patches seven max severity ColdFusion, Campaign flaws","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/adobe-patches-seven-max-severity-coldfusion-campaign-flaws/","time":"07:34","priority":"SHOULD READ","score":89,"tldr":"Adobe released urgent patches for seven maximum-severity flaws in ColdFusion and Campaign Classic that could allow remote or arbitrary code execution, urging administrators to update quickly despite no known active exploitation. The affected products include ColdFusion 2025.9, 2023.20 and earlier, and on-premises Campaign Classic 7.4.3 build 9396 and earlier.","briefOverview":"\u003cp\u003eAdobe released security patches for seven maximum-severity vulnerabilities in ColdFusion and Campaign Classic. The flaws can be exploited in low-complexity attacks that do not require user interaction and were assigned Adobe priority 1, indicating a high risk of being targeted. Adobe recommends administrators install the updates as soon as possible, such as within 72 hours, while also saying it is not aware of any exploits in the wild for the issues addressed.\u003c/p\u003e\n\n\u003cp\u003eSix critical ColdFusion flaws affect versions 2025.9, 2023.20, and earlier, and can allow attackers without privileges to gain remote code execution on unpatched systems. The Campaign Classic vulnerability, tracked as CVE-2026-48286, affects versions 7.4.3 build 9396 and earlier and could lead to arbitrary code execution in the current user\u0026rsquo;s context. Adobe said CVE-2026-48286 affects on-premises Adobe Campaign instances, including fully on-premises deployments and on-premises components in hybrid deployments, while Adobe-hosted instances have already been patched.\u003c/p\u003e\n\n\u003cp\u003eAdobe Chief Security Officer Aanchal Gupta also said the company will move from monthly to twice-monthly security bulletins starting July 14, 2026, with advisories published on the second and fourth Tuesday of each month. Adobe said its out-of-band response process will remain in effect for actively exploited vulnerabilities or externally discovered zero-day vulnerabilities. The article also notes that CISA has added 79 Adobe product flaws to its catalog of actively exploited vulnerabilities over the last five years, including 10 that were also abused by ransomware gangs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Adobe released security patches for seven maximum-severity vulnerabilities in ColdFusion and Campaign Classic.","The vulnerabilities can be exploited in low-complexity attacks that do not require user interaction and were assigned Adobe priority 1.","Adobe said it is not aware of any exploits in the wild for the issues addressed in these updates.","The ColdFusion flaws affect versions 2025.9, 2023.20, and earlier and can allow attackers without privileges to gain remote code execution on unpatched systems.","The Campaign Classic flaw CVE-2026-48286 affects on-premises versions 7.4.3 build 9396 and earlier and could lead to arbitrary code execution in the current user's context."],"insights":["Adobe assigned the updates priority 1 even while saying it has not seen exploitation, meaning the company still considers these flaws at high risk of being targeted and recommends installing fixes within 72 hours.","The Campaign Classic issue is specifically an on-premises risk, because Adobe says Adobe-hosted instances have already been patched.","Adobe is moving from monthly to twice-monthly security bulletins starting July 14, 2026, to deploy security updates faster.","CISA has added 79 Adobe product flaws to its catalog of actively exploited vulnerabilities over the last five years, including 10 that were also abused by ransomware gangs."],"referencedReports":[{"title":"Security update available for Adobe ColdFusion | APSB26-68","url":"https://helpx.adobe.com/security/products/coldfusion/apsb26-68.html","publisher":"Adobe","context":"The article cites Adobe's ColdFusion security advisory as the source for affected ColdFusion versions and the related CVEs.","category":"advisory","primary":true},{"title":"Security update available for Adobe Campaign | APSB26-69","url":"https://helpx.adobe.com/security/products/campaign/apsb26-69.html","publisher":"Adobe","context":"The article cites Adobe's Campaign Classic security advisory for CVE-2026-48286, affected versions, and deployment scope.","category":"advisory","primary":true},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=All\u0026url=\u0026f%5B0%5D=vendor_project%3A791","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article references CISA's catalog to state that 79 Adobe product flaws have been added as actively exploited vulnerabilities over the last five years.","category":"advisory","primary":false}],"body":"\u003cp\u003eAdobe released security patches for seven maximum-severity vulnerabilities in ColdFusion and Campaign Classic. The flaws can be exploited in low-complexity attacks that do not require user interaction and were assigned Adobe priority 1, indicating a high risk of being targeted. Adobe recommends administrators install the updates as soon as possible, such as within 72 hours, while also saying it is not aware of any exploits in the wild for the issues addressed.\u003c/p\u003e\n\n\u003cp\u003eSix critical ColdFusion flaws affect versions 2025.9, 2023.20, and earlier, and can allow attackers without privileges to gain remote code execution on unpatched systems. The Campaign Classic vulnerability, tracked as CVE-2026-48286, affects versions 7.4.3 build 9396 and earlier and could lead to arbitrary code execution in the current user\u0026rsquo;s context. Adobe said CVE-2026-48286 affects on-premises Adobe Campaign instances, including fully on-premises deployments and on-premises components in hybrid deployments, while Adobe-hosted instances have already been patched.\u003c/p\u003e\n\n\u003cp\u003eAdobe Chief Security Officer Aanchal Gupta also said the company will move from monthly to twice-monthly security bulletins starting July 14, 2026, with advisories published on the second and fourth Tuesday of each month. Adobe said its out-of-band response process will remain in effect for actively exploited vulnerabilities or externally discovered zero-day vulnerabilities. The article also notes that CISA has added 79 Adobe product flaws to its catalog of actively exploited vulnerabilities over the last five years, including 10 that were also abused by ransomware gangs.\u003c/p\u003e\n"},{"n":3,"title":"Phantom Squatting Uses AI-Hallucinated Domains for Phishing and Malware","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/phantom-squatting-uses-ai-hallucinated.html","time":"07:20","priority":"SHOULD READ","score":86,"tldr":"Attackers are registering domains that AI models hallucinate and using them for phishing and malware, exploiting users’ trust in AI-generated links before reputation systems can flag the sites. Defenders can reduce risk by monitoring likely hallucinated domains and treating all AI-provided links as unverified until confirmed.","briefOverview":"\u003cp\u003ePalo Alto Networks\u0026rsquo; Unit 42 says attackers are using a tactic it calls \u003cstrong\u003ephantom squatting\u003c/strong\u003e, where they register web domains that large language models invent and then host phishing pages or malware on them. The issue matters because people and AI assistants may treat model-provided links as trustworthy, even when the domain did not exist before. Whoever registers an invented domain first can benefit from that misplaced trust without needing a phishing email or malicious ad.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 tested two AI models with 685,339 questions about 913 well-known brands and received 2.1 million links. Threat intelligence had already flagged 13,229 of those links as malicious, and roughly 250,000 invented domains had no owner. The article says newly registered phantom domains are hard for reputation systems to catch at first because they have no prior history of bad behavior.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two observed cases involving hallucinated postal-service domains that Unit 42 flagged before attackers registered them. In one case, an attacker registered a predicted domain 23 days later and used the Montana Empire phishing kit to steal card numbers, bank-transfer details, and national ID data; in another, an attacker registered a domain 51 days after it was flagged and used it to push a malicious Android app. The article advises people not to trust links just because AI provided them, to verify official domains, and to prevent AI agents from automatically opening or downloading from model-generated links without checks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Palo Alto Networks' Unit 42 calls the practice of registering AI-hallucinated web domains for phishing and malware \"phantom squatting\" and says it is already occurring in the wild.","Unit 42 asked two AI models 685,339 questions about 913 well-known brands, receiving 2.1 million links, including 13,229 flagged as malicious and roughly 250,000 invented domains with no owner.","In one observed case, an attacker registered an AI-predicted fake domain resembling a national postal service's online marketplace 23 days after Unit 42 predicted it and used the Montana Empire phishing kit to steal card numbers, bank-transfer details, and national ID data.","In another observed case, Unit 42 flagged a hallucinated postal-service domain 51 days before an attacker registered it, cloned a brand site, added fake credibility claims, and used it to push a malicious Android app.","The article advises users not to trust links just because an AI provided them, to verify official domains before entering passwords, and to prevent AI agents from automatically opening or downloading from model-generated links without checks."],"insights":["The article highlights that different AI models can invent the same fake domain for the same question, making future abuse predictable enough for defenders to monitor likely hallucinated domains before attackers register them.","Newly registered hallucinated domains are especially dangerous because they start with no reputation history, leaving blocklists and threat feeds with little to flag until after victims may already have been sent there.","The observed cases show that both attackers and defenders can reach the same fake domains by asking AI systems, turning model behavior itself into a way to identify likely phishing infrastructure in advance.","The risk increases when AI agents automatically open or download from model-generated links, because an agent may act on an invented address without the hesitation or verification a person might apply."],"referencedReports":[{"title":"Phantom Squatting: Hallucinated Web Domains","url":"https://unit42.paloaltonetworks.com/phantom-squatting-hallucinated-web-domains/","publisher":"Palo Alto Networks Unit 42","context":"The article is based on Unit 42 research that defines phantom squatting and reports evidence that attackers are registering AI-hallucinated domains for phishing and malware.","category":"research","primary":true},{"title":"USENIX study on code-generating models suggesting nonexistent package names","url":"https://www.usenix.org/conference/usenixsecurity25/presentation/spracklen","publisher":"USENIX","context":"The article cites this study as evidence that code-generating models routinely suggest software package names that do not exist, connecting phantom squatting to slopsquatting.","category":"research","primary":false}],"body":"\u003cp\u003ePalo Alto Networks\u0026rsquo; Unit 42 says attackers are using a tactic it calls \u003cstrong\u003ephantom squatting\u003c/strong\u003e, where they register web domains that large language models invent and then host phishing pages or malware on them. The issue matters because people and AI assistants may treat model-provided links as trustworthy, even when the domain did not exist before. Whoever registers an invented domain first can benefit from that misplaced trust without needing a phishing email or malicious ad.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 tested two AI models with 685,339 questions about 913 well-known brands and received 2.1 million links. Threat intelligence had already flagged 13,229 of those links as malicious, and roughly 250,000 invented domains had no owner. The article says newly registered phantom domains are hard for reputation systems to catch at first because they have no prior history of bad behavior.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two observed cases involving hallucinated postal-service domains that Unit 42 flagged before attackers registered them. In one case, an attacker registered a predicted domain 23 days later and used the Montana Empire phishing kit to steal card numbers, bank-transfer details, and national ID data; in another, an attacker registered a domain 51 days after it was flagged and used it to push a malicious Android app. The article advises people not to trust links just because AI provided them, to verify official domains, and to prevent AI agents from automatically opening or downloading from model-generated links without checks.\u003c/p\u003e\n"},{"n":4,"title":"Anthropic Restores Claude Fable 5 After U.S. Lifts Jailbreak-Linked Export Controls","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/anthropic-restores-claude-fable-5-after.html","time":"06:46","priority":"SHOULD READ","score":82,"tldr":"Anthropic restored global access to Claude Fable 5 after the U.S. lifted emergency export controls triggered by a jailbreak concern, following new safety filters and government commitments. The episode highlights Washington’s still-improvised approach to regulating powerful dual-use AI models.","briefOverview":"\u003cp\u003eAnthropic is restoring Claude Fable 5 worldwide on July 1 after the U.S. Commerce Department lifted export controls imposed about two and a half weeks earlier. The June 12 order had required Anthropic to cut off Fable 5 and Mythos 5 for any foreign national, including non-citizen staff inside or outside the United States. Because Anthropic said it could not reliably check every user’s nationality in real time, it shut both models down for everyone.\u003c/p\u003e\n\n\u003cp\u003eThe controls were triggered by a jailbreak found by Amazon researchers, which Anthropic says made Fable 5 flag some software flaws and, in one case, write code showing how a flaw could be abused. Anthropic trained a new classifier to detect the reported technique and says it now blocks it in more than 99% of attempts. Blocked requests are routed to the weaker Claude Opus 4.8, with users notified, though Anthropic says the change creates more false alarms for normal coding and debugging.\u003c/p\u003e\n\n\u003cp\u003eMythos 5 remains more restricted, with access restored June 26 for roughly 100 U.S. companies and federal agencies that defend critical infrastructure. Anthropic also agreed to look for security problems, coordinate with the government on future launches, report malicious use, and give the U.S. government earlier access to test future frontier models. The article says the episode shows that when Washington wants to move quickly on a frontier model, it still lacks a binding process and instead used improvised export controls.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic is restoring Claude Fable 5 worldwide on July 1 after the U.S. Commerce Department lifted export controls imposed on Fable 5 and Mythos 5 about two and a half weeks earlier.","The June 12 order required Anthropic to cut off both models for any foreign national, and the company shut both models down for everyone because it could not reliably verify every user’s nationality in real time.","The controls were triggered by a jailbreak found by Amazon researchers that Anthropic says made Fable 5 flag some software flaws and, in one case, write code showing how a flaw could be abused.","Anthropic trained a new classifier that it says blocks the reported jailbreak technique in more than 99% of attempts, while blocked requests are handed to Claude Opus 4.8 and users are told.","Mythos 5 access returned on June 26 for roughly 100 U.S. companies and federal agencies that defend critical infrastructure, while Anthropic continues working with the government to widen access."],"insights":["The government used export controls as an emergency workaround because, according to the article, Washington still lacks a binding process for quickly regulating frontier AI model releases.","Anthropic’s mitigation does not simply block risky requests; it routes blocked Fable 5 requests to the weaker Claude Opus 4.8 and tells the user, accepting more false alarms on normal coding and debugging.","The same underlying model is being treated differently based on safety guardrails and user group, with Fable 5 restored worldwide while Mythos 5 remains limited to about 100 U.S. companies and federal agencies defending critical infrastructure.","Anthropic is pushing for jailbreaks to be ranked by practical harm, including capability gain, breadth, ease of weaponization, and discoverability, rather than treating every safety bypass as equally severe.","Competitive pressure shaped the policy debate, as the article says the pause came while cheap, capable Chinese open-source models were gaining ground and executives warned that freezing U.S. models gave rivals time to catch up."],"referencedReports":[],"body":"\u003cp\u003eAnthropic is restoring Claude Fable 5 worldwide on July 1 after the U.S. Commerce Department lifted export controls imposed about two and a half weeks earlier. The June 12 order had required Anthropic to cut off Fable 5 and Mythos 5 for any foreign national, including non-citizen staff inside or outside the United States. Because Anthropic said it could not reliably check every user’s nationality in real time, it shut both models down for everyone.\u003c/p\u003e\n\n\u003cp\u003eThe controls were triggered by a jailbreak found by Amazon researchers, which Anthropic says made Fable 5 flag some software flaws and, in one case, write code showing how a flaw could be abused. Anthropic trained a new classifier to detect the reported technique and says it now blocks it in more than 99% of attempts. Blocked requests are routed to the weaker Claude Opus 4.8, with users notified, though Anthropic says the change creates more false alarms for normal coding and debugging.\u003c/p\u003e\n\n\u003cp\u003eMythos 5 remains more restricted, with access restored June 26 for roughly 100 U.S. companies and federal agencies that defend critical infrastructure. Anthropic also agreed to look for security problems, coordinate with the government on future launches, report malicious use, and give the U.S. government earlier access to test future frontier models. The article says the episode shows that when Washington wants to move quickly on a frontier model, it still lacks a binding process and instead used improvised export controls.\u003c/p\u003e\n"},{"n":6,"title":"UK Cybercrime Journal: Argos Account Takeover Fraud","source":"blog.bushidotoken.net","sourceColorIdx":2,"link":"https://blog.bushidotoken.net/2026/07/uk-cybercrime-journal-argos-account.html","time":"08:00","priority":"SHOULD READ","score":78,"tldr":"UK police warned of a sharp rise in Argos account takeover fraud, where criminals use leaked reused passwords to access accounts, place orders, and collect goods in store via Click \u0026 Collect. The key takeaway is that consumers need stronger account security like unique passwords and MFA, while retailers should add stronger collection and fraud controls for high-value purchases.","briefOverview":"\u003cp\u003eOn 3 June 2026, the City of London Police issued a warning that Report Fraud had seen a significant increase in cases mentioning Argos. Report Fraud said cybercriminals are using leaked credentials from historical data breaches to hijack Argos user accounts. Once inside accounts, fraudsters order goods and collect them in person at physical stores, often through Argos Click \u0026amp; Collect.\u003c/p\u003e\n\n\u003cp\u003eIn May, Report Fraud received 652 reports mentioning Argos, a 323% increase from 154 reports in April. Since the start of 2026, there have been 1,175 reports mentioning the retailer, with May seeing the highest number to date. The article also notes an earlier East Midlands Cyber Resilience Centre warning from November 2025 about Argos and Currys accounts being compromised and unauthorised purchases being made.\u003c/p\u003e\n\n\u003cp\u003eThe article says these attacks are enabled by users reusing previously leaked passwords across multiple accounts and not having multi-factor authentication turned on. It highlights that Click \u0026amp; Collect can become a security liability because criminals can collect items before the real account owner notices an order confirmation email. Recommended defenses include stronger user account hygiene, credit monitoring, cancelling and replacing stolen payment cards, stronger Click \u0026amp; Collect controls, credential-stuffing detection, and use of Stripe’s FT3 framework for fraud teams.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On 3 June 2026, the City of London Police warned that Report Fraud had seen a significant increase in fraud cases mentioning Argos.","Report Fraud said cybercriminals are using leaked credentials from historical data breaches to hijack Argos user accounts.","Fraudsters place orders from compromised Argos accounts and often collect the goods in person through the retailer’s Click \u0026 Collect option.","Report Fraud received 652 reports mentioning Argos in May, a 323% increase from 154 reports in April, and 1,175 such reports since the start of 2026.","The article recommends that users use unique passwords, password managers, passkeys, and multi-factor authentication, while retailers add stronger Click \u0026 Collect controls and credential-stuffing detection."],"insights":["Click \u0026 Collect can become a security weakness because its frictionless design lets criminals buy goods online and collect them locally before the real account owner notices an order confirmation email.","Fraudsters may combine compromised retail accounts with payment details that do not belong to the account victim, which can make a purchase appear normal when the account has a multi-year history of buying expensive items.","The combination of account takeover and Buy Now Pay Later fraud can create exposure not only for consumers but also for retailers and credit providers, including potential regulatory and reputational consequences under UK Financial Conduct Authority rules.","The article identifies in-store collection checks, such as requiring the account owner’s ID or a single-use QR code or PIN for high-value items, as practical controls that retailers can add without eliminating Click \u0026 Collect entirely."],"referencedReports":[{"title":"Report Fraud alert: warning for Argos shoppers after 323 per cent spike in fraud reports mentioning the retailer","url":"https://www.cityoflondon.police.uk/news/city-of-london/news/2026/june/report-fraud-alert-warning-for-argos-shoppers-after-323-per-cent-spike-in-fraud-reports-mentioning-the-retailer/report-fraud-alert-warning-for-online-shoppers-after-spike-in-criminals-gaining-unauthorised-access-to-retailer-accounts/","publisher":"City of London Police / Report Fraud","context":"The article cites this police warning as the basis for the reported rise in fraud cases involving Argos accounts.","category":"advisory","primary":true},{"title":"Currys and Argos account warning issued by police","url":"https://www.emcrc.co.uk/post/currys-and-argos-account-warning-issued-by-police","publisher":"East Midlands Cyber Resilience Centre","context":"The article references this earlier warning about compromised Argos and Currys accounts and unauthorised purchases.","category":"advisory","primary":false}],"body":"\u003cp\u003eOn 3 June 2026, the City of London Police issued a warning that Report Fraud had seen a significant increase in cases mentioning Argos. Report Fraud said cybercriminals are using leaked credentials from historical data breaches to hijack Argos user accounts. Once inside accounts, fraudsters order goods and collect them in person at physical stores, often through Argos Click \u0026amp; Collect.\u003c/p\u003e\n\n\u003cp\u003eIn May, Report Fraud received 652 reports mentioning Argos, a 323% increase from 154 reports in April. Since the start of 2026, there have been 1,175 reports mentioning the retailer, with May seeing the highest number to date. The article also notes an earlier East Midlands Cyber Resilience Centre warning from November 2025 about Argos and Currys accounts being compromised and unauthorised purchases being made.\u003c/p\u003e\n\n\u003cp\u003eThe article says these attacks are enabled by users reusing previously leaked passwords across multiple accounts and not having multi-factor authentication turned on. It highlights that Click \u0026amp; Collect can become a security liability because criminals can collect items before the real account owner notices an order confirmation email. Recommended defenses include stronger user account hygiene, credit monitoring, cancelling and replacing stolen payment cards, stronger Click \u0026amp; Collect controls, credential-stuffing detection, and use of Stripe’s FT3 framework for fraud teams.\u003c/p\u003e\n"},{"n":1,"title":"Amazon fined $2.25M for withholding evidence from fraud victims","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/amazon-fined-225m-for-withholding-evidence-from-fraud-victims/","time":"09:43","priority":"MAY READ","score":68,"tldr":"Amazon will pay a $2.25 million FTC civil penalty for allegedly violating the Fair Credit Reporting Act by denying or delaying identity theft victims’ access to records of fraudulent transactions made in their names. The proposed order requires Amazon to provide lawful records requests to victims and authorized law enforcement within 30 days.","briefOverview":"\u003cp\u003eThe U.S. Federal Trade Commission said Amazon will pay a $2.25 million civil penalty to settle charges that it blocked identity theft victims’ access to transaction records. The complaint, filed with the Justice Department, alleged that Amazon failed to provide many fraud victims with records of fraudulent transactions made in their names. The FTC said this was required under Section 609(e) of the Fair Credit Reporting Act.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FTC, Amazon customer service agents denied many consumers’ requests for records for “privacy” or “security” reasons. The agency also said Amazon sometimes provided requested records after the 30-day timeframe required by the FCRA. The complaint further alleged that Amazon refused to provide application and business transaction records to authorized law enforcement agencies acting on behalf of identity theft victims.\u003c/p\u003e\n\n\u003cp\u003eUnder the proposed order, Amazon must provide access to lawfully requested records to identity theft victims and law enforcement agents within 30 days. Amazon was also ordered to notify consumers who had requested records since April 2024 but had not received them that they may request additional records. The article notes that Kohl’s paid a $220,000 fine six years ago over similar allegations, and that Amazon previously agreed to other settlements involving Alexa children’s privacy and Prime membership practices.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. Federal Trade Commission said Amazon will pay a $2.25 million civil penalty to settle charges that it blocked identity theft victims’ access to transaction records.","The FTC alleged that Amazon failed to provide many fraud victims with records of fraudulent transactions made in their names, as required by Section 609(e) of the Fair Credit Reporting Act.","Amazon customer service agents allegedly denied many consumers’ requests for records for “privacy” or “security” reasons, and Amazon sometimes provided records after the 30-day timeframe required by law.","The FTC said Amazon also refused to provide application and business transaction records to authorized law enforcement agencies acting on behalf of identity theft victims.","Under the proposed order, Amazon must provide lawfully requested records to identity theft victims and law enforcement agents within 30 days and notify certain consumers who requested records since April 2024 that they may request additional records."],"insights":["The FTC’s allegations make clear that citing “privacy” or “security” was not an acceptable reason for Amazon to withhold fraudulent transaction records from identity theft victims covered by the FCRA.","The proposed order applies not only to direct consumer requests but also to authorized law enforcement requests made on behalf of identity theft victims.","Consumers who requested records from Amazon since April 2024 but did not receive them may be notified that they can request additional records under the settlement terms.","The article links Amazon’s case to a prior Kohl’s settlement, showing the FTC has previously penalized retailers for failing to provide identity theft victims with transaction records."],"referencedReports":[],"body":"\u003cp\u003eThe U.S. Federal Trade Commission said Amazon will pay a $2.25 million civil penalty to settle charges that it blocked identity theft victims’ access to transaction records. The complaint, filed with the Justice Department, alleged that Amazon failed to provide many fraud victims with records of fraudulent transactions made in their names. The FTC said this was required under Section 609(e) of the Fair Credit Reporting Act.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FTC, Amazon customer service agents denied many consumers’ requests for records for “privacy” or “security” reasons. The agency also said Amazon sometimes provided requested records after the 30-day timeframe required by the FCRA. The complaint further alleged that Amazon refused to provide application and business transaction records to authorized law enforcement agencies acting on behalf of identity theft victims.\u003c/p\u003e\n\n\u003cp\u003eUnder the proposed order, Amazon must provide access to lawfully requested records to identity theft victims and law enforcement agents within 30 days. Amazon was also ordered to notify consumers who had requested records since April 2024 but had not received them that they may request additional records. The article notes that Kohl’s paid a $220,000 fine six years ago over similar allegations, and that Amazon previously agreed to other settlements involving Alexa children’s privacy and Prime membership practices.\u003c/p\u003e\n"}]</script>
