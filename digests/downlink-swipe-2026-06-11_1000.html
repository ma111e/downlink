ishing simulations against an OpenClaw email agent named Pinchy. The agent was susceptible to tactics commonly used against human users. In one case, a casual email from “Dan” asking the agent to share staging credentials caused Pinchy to forward AWS IAM keys, database passwords, and SSH access to an external Gmail account.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes agent phishing from indirect prompt injection. Indirect prompt injection embeds malicious instructions inside data consumed by a model, while agent phishing uses a believable request through a normal communication channel. The article says the risk occurs when the agent acts before verifying who made the request.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft disclosed an issue in the Claude Code GitHub Action that could expose CI/CD workflow secrets when AI agents processed untrusted GitHub content. The untrusted content included issue bodies, pull request descriptions, and comments. While Claude Code Action scrubbed environments for subprocess execution paths such as Bash, its Read tool was not subject to the same sandboxing model and could access \u003ccode\u003e/proc/self/environ\u003c/code\u003e, potentially exposing the workflow’s \u003ccode\u003eANTHROPIC_API_KEY\u003c/code\u003e and other runner credentials.\u003c/p\u003e\n\n\u003cp\u003eAnthropic fixed the issue on May 5, 2026, with Claude Code version 2.1.128 after responsible disclosure on April 29, 2026. The patch strengthened the Read tool by rejecting a number of files under \u003ccode\u003e/proc/\u003c/code\u003e to protect them from exfiltration.\u003c/p\u003e\n\n\u003cp\u003eApple announced that an upcoming version of Apple Intelligence will support automatically fixing weak and compromised passwords with one tap through the Passwords app. Apple said the feature uses Apple Intelligence and Safari to agentically navigate websites, sign in, and upgrade accounts to strong passwords.\u003c/p\u003e\n\n\u003cp\u003eG DATA reported a growing number of Chrome extensions impersonating productivity tools while stealthily hijacking users’ conversations with AI chatbots. Examples named in the article include Urban VPN, Smart Sidebar: ChatGPT, Claude \u0026amp; DeepSeek, and Chat AI. The article says user data generated through AI conversations may remain vulnerable to theft by plug-ins posing as legitimate tools.\u003c/p\u003e\n\n\u003ch2 id=\"endpoint-defense-evasion-and-security-tool-weakening\"\u003eEndpoint Defense Evasion and Security Tool Weakening\u003c/h2\u003e\n\n\u003cp\u003eA technique named EDRChoker was described as interfering with the client-server connection of EDR software. It uses policy-based Quality of Service to throttle EDR agents to the lowest bandwidth, causing connections to time out because bandwidth is limited to 8 bits per second. The technique takes a list of common EDR process names and creates QoS policies that effectively isolate those agents from their servers.\u003c/p\u003e\n\n\u003cp\u003eThe article also references EDRStartupHinder, a prior technique that prevents EDR programs from starting. EDRStartupHinder uses Windows Bindlink to redirect a DLL from System32 and takes advantage of behavior involving DLLs signed by programs protected with Protected Process Light.\u003c/p\u003e\n\n\u003cp\u003eBinary Defense described another technique that disables critical security services such as Windows Defender and Sysmon without triggering traditional malware alerts. It modifies Windows Access Control Lists to add Deny Access Control Entries against core system libraries such as \u003ccode\u003ekernel32.dll\u003c/code\u003e. After reboot, services depending on those libraries fail to start, leaving the endpoint without defenses.\u003c/p\u003e\n\n\u003ch2 id=\"phishing-social-engineering-and-malware-delivery\"\u003ePhishing, Social Engineering, and Malware Delivery\u003c/h2\u003e\n\n\u003cp\u003eSeveral stories in the bulletin involve phishing and social engineering. Point Wild analyzed phishing emails disguised as payment advice messages that deliver ZIP archives leading to Agent Tesla. The infection chain uses an obfuscated Batch script, PowerShell, in-memory code execution, shellcode decoding, persistence setup, and process injection into legitimate Windows applications such as \u003ccode\u003echarmap.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eReversingLabs reported two social engineering campaigns using AI-generated TikTok videos and Instagram Reels. One method uses fake tutorials for software installs with professional-sounding voice-overs and clean graphics. The other shows how to use premium software for free and introduces a centralized tutorial after the account gains traction, leading users to sites that deploy Vidar Stealer and other programs.\u003c/p\u003e\n\n\u003cp\u003eNextron Systems reported that the Iranian hacking group Nimbus Manticore approached an employee through LinkedIn by impersonating a headhunter and offering a $200,000 annual salary. The victim was directed to a fake hiring portal branded as Ebix Recruitment and then prompted to download a two-factor authentication application. The ZIP archive contained the malware payload, and the attack deployed a custom implant with data exfiltration and remote control capabilities.\u003c/p\u003e\n\n\u003cp\u003eCato Networks reported a phishing campaign targeting Brazilian organizations with fake business-document lures. Victims were redirected to Portuguese-language landing pages impersonating familiar Brazilian workflows, including SEFAZ-related fiscal documents, Reclame Aqui-style complaint processes, and secure document-delivery portals. After fake verification, victims downloaded a legitimate NinjaOne RMM agent configured for attacker-controlled remote access.\u003c/p\u003e\n\n\u003cp\u003eD3Lab reported a phishing campaign impersonating Italian and European banking brands to distribute Android malware named NFCShare. Victims entered credentials on phishing sites and were then prompted to download a GitHub-hosted APK disguised as a banking app update. The app guided users through fake card verification, asked them to place a card near the phone and enter a PIN, then read NFC card data and exfiltrated it through a remote WebSocket endpoint.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-and-intrusion-tools\"\u003eMalware Families and Intrusion Tools\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz analyzed MLTBackdoor, a malware family delivered through ClickFix and linked to ransomware-related activity. The malware supports commands for downloading and uploading files and can load Beacon Object Files to extend its capabilities. The article also mentions DragonForce, World Leaks, VIPERTUNNEL, a Python malware previously linked to RansomHub, and RustyRocket as tools seen in ransomware and data extortion contexts.\u003c/p\u003e\n\n\u003cp\u003eGen Digital’s Avast analyzed GoFlateLoader, a Go-based loader used to deliver infostealers including Amatera, Remus, Lumma, Vidar, StealC, and SvitStealer. The loader appears in both 32-bit and 64-bit variants and is designed for in-memory execution. Since the beginning of April 2026, more than 33,000 unique users were targeted, with Brazil, India, Argentina, Mexico, Turkey, and Spain among the most affected countries.\u003c/p\u003e\n\n\u003cp\u003eBinary Defense reported BLUERABBIT, a Golang backdoor that uses RabbitMQ for C2 tasking, Redis for state management, and MinIO for S3-compatible data exfiltration. The malware includes remote access, system profiling, file encryption with a \u003ccode\u003e.candy\u003c/code\u003e extension, and two disk-wiping modules. It is assessed to be the work of an Iran-nexus threat actor and was likely used against entities in Israel.\u003c/p\u003e\n\n\u003ch2 id=\"russia-focused-campaigns\"\u003eRussia-Focused Campaigns\u003c/h2\u003e\n\n\u003cp\u003eF6 reported on a previously unknown group named SiribClone that has targeted Russian military personnel using bait applications for “safe photo exchange.” The group has posed as women seeking romantic relationships in some cases to infect smartphones, computers, and Telegram accounts. Android devices were infected with SafeLoveStealer, while Windows systems were infected with SiribGrabber.\u003c/p\u003e\n\n\u003cp\u003eSiribClone also operated phishing sites mimicking Telegram login pages to capture phone numbers, verification codes, and two-factor authentication passwords. The article says a tool named Kontur stores stolen Telegram sessions and lets operators review captured messages.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Russian maritime universities, energy facilities, diplomatic missions, and government agencies have been targeted by an unidentified group since at least July 2024. Recent waves used the Ravage C2 framework, while earlier 2024 campaigns used Cobalt Strike.\u003c/p\u003e\n\n\u003cp\u003eCloud Atlas also targeted Russia and Belarus using phishing emails with ZIP archives containing malicious shortcuts that launched PowerShell scripts. These led to malware including VBShower and PowerShower, with PowerShower used to drop a credential grabber. Additional tools included PowerAdmin, PowerCloud, and Browser checker.\u003c/p\u003e\n\n\u003ch2 id=\"edge-devices-email-and-web-commerce\"\u003eEdge Devices, Email, and Web Commerce\u003c/h2\u003e\n\n\u003cp\u003eA suspected China-nexus intrusion set targeted edge network devices across Southeast Asia. The adversary deployed a custom Linux ELF implant named \u003ccode\u003erouter.elf\u003c/code\u003e onto compromised border routers. The implant established persistent C2 using DNS over HTTPS and used iptables to hijack downstream DNS traffic at scale.\u003c/p\u003e\n\n\u003cp\u003eInfoGuard Labs described Ghost-Sender, a weakness in certain Microsoft Exchange configurations. When Exchange Online or hybrid on-premises Exchange is combined with an external MX record such as a third-party email server or spam protection system, attackers may spoof emails from any sender to any recipient in a target tenant. The article says the spoofed emails can bypass SPF, DKIM, and DMARC policies and that Outlook may resolve the profile picture for internal spoofed senders.\u003c/p\u003e\n\n\u003cp\u003eCloudSEK reported a skimmer campaign targeting WooCommerce storefronts. The skimmer impersonates the Stripe payment element and validates cards in real time so victims do not suspect fraud. The article notes that the sample re-implements client-side checks used by legitimate checkout flows.\u003c/p\u003e\n\n\u003ch2 id=\"data-exposure-privacy-and-legal-outcomes\"\u003eData Exposure, Privacy, and Legal Outcomes\u003c/h2\u003e\n\n\u003cp\u003eGoogle announced that it plans to save images, files, audio, and video uploaded to Search under a new “Search Services History” setting. The data may include Google Lens images, uploaded content, Search Live recordings, Translate speaking practice, and voice searches. Google said the setting will be used to provide, develop, and improve services, including AI models, and may support personalized suggestions and ads if Personalized Recommendations is enabled.\u003c/p\u003e\n\n\u003cp\u003eSectricity reported that a public Meta IP address running an open Grafana instance led to read-write access to 507 private Meta repositories. The path involved a wildcard SAN on a TLS certificate, JavaScript bundle analysis, discovery of \u003ccode\u003eapi.haloworld.xyz\u003c/code\u003e, an unauthenticated \u003ccode\u003e/_api/gcp-token\u003c/code\u003e endpoint, access to GCP Secret Manager, a Vercel token, environment variables, and GitHub personal access tokens. Sectricity received a $157,000 bug bounty.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Justice Department said Maxwell Schultz of Columbus, Ohio, was sentenced to 24 months in federal prison for hacking a former employer after his contract ended. He impersonated another contractor, obtained credentials, accessed systems, and ran a PowerShell script that reset about 2,500 passwords. The incident caused more than $862,000 in losses.\u003c/p\u003e\n\n\u003cp\u003eThe Justice Department also announced that Troy Murray of North Carolina was sentenced to more than 10 years in prison for selling personal information belonging to more than 7 million elderly Americans to Jamaican lottery fraud scammers. The lists contained names, phone numbers, physical addresses, and in some cases ages and email addresses. Each list was sold for \u003cspan class=\"math inline\"\u003e\\(500, and Murray was ordered to pay forfeiture of \\)\u003c/span\u003e5,214,688.48.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and Patches\u003c/h2\u003e\n\n\u003cp\u003eMarcus Hutchins released details and a proof-of-concept for ComoDoS, an integer underflow vulnerability in Comodo Internet Security’s firewall driver \u003ccode\u003eInspect.sys\u003c/code\u003e. The vulnerability is tracked as CVE-2026-49494 with a CVSS score of 7.5. Hutchins said it can remotely trigger out-of-bounds read and write conditions in the Windows kernel but is unlikely to be weaponized into remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article says ComoDoS can remotely crash a target system with a single TCP/IP packet even when the firewall is configured to block all ports. The vulnerability remained unpatched at the time of writing.\u003c/p\u003e\n\n\u003ch2 id=\"money-laundering-infrastructure\"\u003eMoney Laundering Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eKELA described the evolution of money mule networks into professionalized Mule-as-a-Service ecosystems. These networks help cybercriminals launder and monetize proceeds from ransomware, scams, Business Email Compromise, and other illicit schemes. The article says modern mule operations increasingly rely on stolen identities, synthetic identities, compromised accounts, AI-assisted onboarding, forged documents, deepfake-enabled KYC bypass, account takeover, and automated account warming.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s closing message is that attackers do not always need exploits. They can succeed through stolen credentials, trusted tools, legitimate services, overlooked settings, browser extensions, CI/CD access, AI agents, and default trust inside enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends auditing what agents can access, treating every identity in the pipeline as a risk, and checking what browser extensions send home. Its broader conclusion is that the perimeter is no longer the central problem; the more urgent issue is everything inside the environment that still trusts by default.\u003c/p\u003e\n","keyPoints":["Flashpoint reported that more than 11.1 million devices were infected with infostealers last year, resulting in over 3.3 billion stolen credentials, session cookies, cloud tokens, and other identity data circulating on illicit markets.","The Miasma credential-stealing framework was briefly exposed on GitHub and was described by SafeDep as a full supply chain attack toolkit targeting public package registries, GitHub repositories, GitHub Actions, AI coding tools, and SSH-based lateral movement.","Varonis found that an OpenClaw email agent named Pinchy could be deceived by ordinary-looking phishing emails, including one case where it forwarded AWS IAM keys, database passwords, and SSH access to an external Gmail account.","Microsoft disclosed and Anthropic patched a Claude Code GitHub Action issue that could expose CI/CD workflow secrets when AI agents processed untrusted GitHub content.","The article emphasizes that attackers are increasingly using stolen credentials, trusted tools, endpoint policy settings, browser extensions, and default trust relationships rather than relying only on exploits."],"insights":["AI agents need identity and authorization controls similar to human users because the OpenClaw and Claude Code cases show that normal-looking inputs from email, issues, pull requests, or comments can lead agents to disclose real credentials.","Package popularity signals are no longer reliable trust indicators because attackers used npm “download pumping” to inflate a malicious package to more than 50,000 downloads in three days before introducing the payload.","Endpoint defenses can be weakened without exploiting software vulnerabilities because EDRChoker abuses Windows policy-based QoS to throttle EDR communications until agents effectively time out.","Supply chain threats are expanding beyond malicious packages into full operational toolkits, as Miasma targeted registries, GitHub repositories, GitHub Actions, AI coding tool configurations, Artifactory, and SSH-based lateral movement.","Browser and AI productivity extensions are a direct data-exposure risk because G DATA observed Chrome extensions impersonating legitimate tools while hijacking users’ AI chatbot conversations."],"referencedReports":[{"title":"How Infostealers Fuel Identity-Based Attacks","url":"https://flashpoint.io/blog/proactive-defender-guide-infostealers/","publisher":"Flashpoint","context":"The article cites Flashpoint's analysis on infostealer infections and the volume of stolen identity data circulating on illicit markets.","category":"","primary":false},{"title":"New SilabRAT Spotted","url":"https://www.group-ib.com/blog/silabrat-hijackloader-trojan-malware/","publisher":"Group-IB","context":"The article references Group-IB's analysis of SilabRAT, a malware-as-a-service remote access trojan advertised by the actor o1oo1.","category":"","primary":false},{"title":"North Korean Hackers Behind Nearly 50% of Tech Industry Hacks","url":"https://www.crowdstrike.com/en-us/blog/crowdstrike-2026-technology-threat-landscape-report/","publisher":"CrowdStrike","context":"The article cites CrowdStrike's 2026 technology threat landscape report on Famous Chollima activity against the technology sector.","category":"","primary":false},{"title":"Miasma Toolkit Leaks Briefly","url":"https://safedep.io/inside-the-miasma-supply-chain-attack-toolkit/","publisher":"SafeDep","context":"The article references SafeDep's research on the exposed Miasma supply chain attack toolkit and its capabilities.","category":"","primary":false},{"title":"New Cross-Platform RAT SStar Agent Emerges","url":"https://www.iru.com/blog/sstar-agent","publisher":"Iru","context":"The article cites Iru's analysis of SStar Agent, a cross-platform RAT targeting Windows and macOS systems through a poisoned npm package.","category":"","primary":false},{"title":"New npm Deception Technique Called Download Pumping","url":"https://www.tenable.com/blog/how-cyberattackers-inflate-malicious-package-npm-download-counts","publisher":"Tenable","context":"The article references Tenable's research on download pumping, a technique used to inflate npm package download counts.","category":"","primary":false},{"title":"Ghost-Sender Exchange Misconfiguration Lets Attackers Spoof Any Email Address","url":"https://labs.infoguard.ch/posts/ghost-sender/","publisher":"InfoGuard Labs","context":"The article cites InfoGuard Labs' research on Microsoft Exchange configurations that can allow email spoofing inside a target tenant.","category":"","primary":false},{"title":"SiribClone, Cloud Atlas, and Others Target Russia","url":"https://www.f6.ru/blog/siribclone/","publisher":"F6","context":"The article references F6's research on SiribClone campaigns targeting Russian military personnel with desktop and mobile malware.","category":"","primary":false},{"title":"Unknown Group Targets Maritime Universities","url":"https://securelist.ru/unknown-group-targets-maritime-universities/115765/","publisher":"Kaspersky Securelist","context":"The article cites research on an unidentified group targeting Russian maritime universities, energy facilities, diplomatic missions, and government agencies.","category":"","primary":false},{"title":"MLTBackdoor Malware Observed","url":"https://www.zscaler.com/blogs/security-research/technical-analysis-mltbackdoor","publisher":"Zscaler ThreatLabz","context":"The article references Zscaler ThreatLabz's technical analysis of MLTBackdoor, a malware family delivered through ClickFix.","category":"","primary":false},{"title":"New Skimmer Campaign Targets WooCommerce Storefronts","url":"https://www.cloudsek.com/blog/woocommerce-payment-skimmer-card-data-theft-checkout-backdoor","publisher":"CloudSEK","context":"The article cites CloudSEK's analysis of a WooCommerce payment skimmer that impersonates Stripe checkout elements.","category":"","primary":false},{"title":"New Golang GoFlateLoader Delivers Infostealers","url":"https://www.gendigital.com/blog/insights/research/goflateloader-delivers-multiple-infostealers","publisher":"Gen Digital","context":"The article references Gen Digital's Avast research on GoFlateLoader delivering multiple infostealer families.","category":"","primary":false},{"title":"NFCShare Android Malware Spreads via Fake Banking App Updates on GitHub","url":"https://www.d3lab.net/nfcshare-evolves-from-a-banking-phishing-apk-to-a-github-hosted-android-nfc-fraud-campaign/","publisher":"D3Lab","context":"The article cites D3Lab's research on NFCShare Android malware distributed through fake banking app updates hosted on GitHub.","category":"","primary":false},{"title":"Making OpenClaw AI Agents Fall for Phishing","url":"https://www.varonis.com/blog/openclaw-phishing","publisher":"Varonis","context":"The article references Varonis's phishing simulations against an OpenClaw email agent named Pinchy.","category":"","primary":false},{"title":"Using EDRChoker to Bypass Defenses","url":"https://www.zerosalarium.com/2026/06/edrchoker-choking-telemetry-stream-block-edr.html","publisher":"Zero Salarium","context":"The article cites research on EDRChoker, a technique that uses Windows policy-based QoS to throttle EDR agent communications.","category":"","primary":false},{"title":"EDRStartupHinder EDR Startup Process Blocker","url":"https://www.zerosalarium.com/2026/01/edrstartuphinder-edr-startup-process-blocker.html","publisher":"Zero Salarium","context":"The article references Zero Salarium's earlier demonstration of EDRStartupHinder, a technique to prevent EDR programs from starting.","category":"","primary":false},{"title":"Windows Defender ACL Blocking: A Silent Technique with Serious Impact","url":"https://binarydefense.com/resources/blog/windows-defender-acl-blocking-a-silent-technique-with-serious-impact","publisher":"Binary Defense","context":"The article cites Binary Defense research on disabling security services by modifying Windows ACLs against core system libraries.","category":"","primary":false},{"title":"Trojanized Packages Used to Deliver STX RAT","url":"https://www.cyderes.com/howler-cell/cpuid-hwmonitor-xvpn-dll-sideloading-stx-rat","publisher":"Cyderes","context":"The article references Cyderes analysis showing the CPUID-related STX RAT supply chain campaign was broader than previously known.","category":"","primary":false},{"title":"Phishing Campaign Delivers Agent Tesla","url":"https://www.pointwild.com/threat-intelligence/from-phishing-email-to-process-injection-inside-a-multi-stage-agent-tesla-infection-chain/","publisher":"Point Wild","context":"The article cites Point Wild's analysis of a multi-stage phishing chain that delivers Agent Tesla through ZIP archives and PowerShell execution.","category":"","primary":false},{"title":"Phishing Attacks Leverage TikTok, Instagram Reels","url":"https://www.reversinglabs.com/blog/social-media-attacks-phishing","publisher":"ReversingLabs","context":"The article references ReversingLabs research on AI-generated TikTok and Instagram Reel lures that lead users to sites deploying Vidar Stealer and other programs.","category":"","primary":false},{"title":"Chinese Hackers Target Southeast Asian Edge Devices","url":"https://qiita.com/Y4er/items/0b6071745e4b7b240b3e","publisher":"Y4er","context":"The article cites a security researcher's analysis of a suspected China-nexus campaign compromising routers in Southeast Asia.","category":"","primary":false},{"title":"NinjaOne RMM Abuse Chain Detailed","url":"https://www.catonetworks.com/blog/cato-ctrl-previously-undocumented-ninjaone-rmm-abuse-chain/","publisher":"Cato Networks","context":"The article references Cato Networks research on a phishing campaign in Brazil that abused NinjaOne RMM for attacker-controlled remote access.","category":"","primary":false},{"title":"How Mule-as-a-Service Economy Operates","url":"https://www.kelacyber.com/blog/mule-as-a-service-money-laundering/","publisher":"KELA","context":"The article cites KELA's research on professionalized Mule-as-a-Service ecosystems used for money laundering and fraud operations.","category":"","primary":false},{"title":"Browser Extensions Leak AI Conversations","url":"https://blog.gdatasoftware.com/2026/06/38428-browser-addons-spy-on-ai-chats","publisher":"G DATA","context":"The article references G DATA's research on Chrome extensions that impersonate legitimate tools while hijacking AI chatbot conversations.","category":"","primary":false},{"title":"From Misconfigured Grafana to Read-Write Access on 507 Private Meta Repos","url":"https://sectricity.com/blog/misconfigured-grafana-507-private-meta-repos/","publisher":"Sectricity","context":"The article cites Sectricity's bug bounty write-up on how an exposed Grafana instance led to read-write access to 507 private Meta repositories.","category":"","primary":false},{"title":"Researcher Releases PoC for ComoDoS","url":"https://malwaretech.com/2026/06/exploiting-a-remote-kernel-vulnerability-in-comodo-internet-security.html","publisher":"MalwareTech","context":"The article references Marcus Hutchins's technical write-up and proof-of-concept for the ComoDoS vulnerability in Comodo Internet Security's firewall driver.","category":"","primary":false},{"title":"Anthropic Patches Bug in Claude Code GitHub Action","url":"https://www.microsoft.com/en-us/security/blog/2026/06/05/securing-ci-cd-in-agentic-world-claude-code-github-action-case/","publisher":"Microsoft","context":"The article cites Microsoft's disclosure and analysis of a Claude Code GitHub Action issue that could expose CI/CD workflow secrets.","category":"","primary":false},{"title":"Nimbus Manticore Uses Dream Job Lures","url":"https://www.nextron-systems.com/2026/06/01/detecting-nimbus-manticore-and-their-sideloading-infection-chains/","publisher":"Nextron Systems","context":"The article references Nextron Systems research on Nimbus Manticore using a fake LinkedIn recruiter and hiring portal to deliver malware.","category":"","primary":false},{"title":"BLUERABBIT Backdoor with Ransomware and Destructive Features","url":"https://binarydefense.com/resources/blog/bluerabbit-a-golang-based-backdoor-with-ransomware-and-destructive-capabilities","publisher":"Binary Defense","context":"The article cites Binary Defense research on BLUERABBIT, a Golang backdoor with encryption and disk-wiping capabilities.","category":"","primary":false}],"body":"\u003cp\u003eThe article is a ThreatsDay roundup covering 28 cybersecurity stories involving infostealers, malware-as-a-service, supply chain attacks, AI agent risks, endpoint defense bypasses, phishing, and data exposure. Its central theme is that attackers increasingly rely on stolen credentials, trusted tools, legitimate platforms, and default trust relationships rather than only exploiting software flaws. The roundup highlights how polished criminal operations have become, including SaaS-like mule networks, deepfake KYC bypass, and malware that clones browser profiles.\u003c/p\u003e\n\n\u003cp\u003eSeveral stories focus on identity and developer ecosystem compromise. Flashpoint reported that more than 11.1 million devices were infected with infostealers last year, producing over 3.3 billion stolen credentials, session cookies, cloud tokens, and other identity data. The Miasma credential-stealing framework was briefly exposed on GitHub and described as a full supply chain attack toolkit targeting package registries, GitHub repositories, GitHub Actions, AI coding tool configurations, Artifactory, and SSH-based lateral movement.\u003c/p\u003e\n\n\u003cp\u003eAI and automation risks are another major focus. Varonis found that an OpenClaw email agent named Pinchy could be tricked by believable phishing emails into forwarding AWS IAM keys, database passwords, and SSH access to an external Gmail account. Microsoft also disclosed that Anthropic patched a Claude Code GitHub Action issue that could expose CI/CD workflow secrets when AI agents processed untrusted GitHub content.\u003c/p\u003e\n"},{"n":6,"title":"Cybersecurity Stars Awards 2026: Winners Announced Across 95 Categories","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cybersecurity-stars-awards-2026-winners.html","time":"13:26","priority":"MAY READ","score":25,"tldr":"The 2026 Cybersecurity Stars Awards winners have been announced across 95 subcategories, recognizing cybersecurity companies, teams, and products judged on innovation, impact, and technical excellence. The full winners list is available on the awards website, with 2027 nominations opening later this year.","briefOverview":"\u003cp\u003eThe 2026 Cybersecurity Stars Awards winners have been announced across 95 subcategories in four main award categories. The awards are presented as recognition for cybersecurity work that is often invisible, including products, teams, and companies that improve security outcomes. The full winners list is available at awards.thehackernews.com/winners/2026/.\u003c/p\u003e\n\n\u003cp\u003eEvery nomination was reviewed by an independent panel of judges. Entries were scored against three criteria: innovation, impact, and technical excellence. The article states that entries were judged on the work itself, not on popularity, brand size, or campaign reach.\u003c/p\u003e\n\n\u003cp\u003eThe awards span areas including agentic AI security, AI SecOps, AI security testing, post-quantum cryptography, continuous threat exposure management, extended detection and response, software supply chain security, identity threat detection and response, secure access service edge, and zero trust security. Some subcategories have more than one winner because the awards recognize every entry that meets the stated standard. Nominations for the 2027 awards are expected to open later this year, with a waiting list available for updates.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article announces the winners of the 2026 Cybersecurity Stars Awards. It says the winners were selected across 95 subcategories in four main award categories. The article frames the awards as a way to recognize cybersecurity work that is often unnoticed because it succeeds by preventing incidents.\u003c/p\u003e\n\n\u003cp\u003eThe judging process is described as independent and criteria-based. Every nomination was reviewed by an independent panel of judges and scored on innovation, impact, and technical excellence. The article states that submissions were not ranked by popularity, brand size, or campaign reach.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that some subcategories have more than one winner. This is because the awards recognize every entry that meets the standard, rather than selecting only one winner per category. The complete winners list is identified as the main story and is available on the awards website.\u003c/p\u003e\n\n\u003cp\u003eThe award coverage spans a broad set of cybersecurity areas. Named areas include agentic AI security, AI SecOps, AI security testing, post-quantum cryptography, continuous threat exposure management, extended detection and response, software supply chain security, identity threat detection and response, secure access service edge, and zero trust security. The article also says the winners span four main categories and 97 subcategories, while elsewhere stating winners were announced across 95 subcategories.\u003c/p\u003e\n\n\u003cp\u003eNo threat actors, incidents, victims, vulnerabilities, or disclosed operational impacts are described in the article. The affected or involved parties are the nominated companies, teams, practitioners, winners, judges, and the Cybersecurity Stars Awards program. The article closes by congratulating winners and noting that nominations for the 2027 awards will open later this year, with a waiting list available.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article announces the winners of the 2026 Cybersecurity Stars Awards. It says winners were announced across 95 subcategories in four main award categories. The article presents the awards as an effort to recognize cybersecurity work that is often unseen because successful security work prevents problems from occurring.\u003c/p\u003e\n\n\u003cp\u003eThe full list of 2026 winners is available at awards.thehackernews.com/winners/2026/. The article states that, with 95 subcategories, the full list is the central story.\u003c/p\u003e\n\n\u003ch2 id=\"purpose-and-significance\"\u003ePurpose and significance\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the Cybersecurity Stars Awards as recognition for cybersecurity work that does not always receive public attention. It specifically mentions products that close real gaps, teams that stop incidents that are not publicly discussed, and companies that raise the baseline for others.\u003c/p\u003e\n\n\u003cp\u003eThe awards are described as a once-a-year process that puts names on that work through independent judging. The article emphasizes recognition rather than incident reporting or technical disclosure.\u003c/p\u003e\n\n\u003ch2 id=\"judging-process\"\u003eJudging process\u003c/h2\u003e\n\n\u003cp\u003eEvery nomination was reviewed by an independent panel of judges. Entries were scored against three stated criteria:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInnovation.\u003c/li\u003e\n\u003cli\u003eImpact.\u003c/li\u003e\n\u003cli\u003eTechnical excellence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that entries were not ranked by popularity, brand size, or campaign reach. Instead, they were judged on the submitted work itself.\u003c/p\u003e\n\n\u003ch2 id=\"winner-structure\"\u003eWinner structure\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that some subcategories have more than one winner. This is because the awards recognize every entry that meets the standard rather than choosing only one winner per category.\u003c/p\u003e\n\n\u003cp\u003eThe article contains two counts for subcategories: it states that winners were announced across 95 subcategories, and later says the winners span four main categories and 97 subcategories. It also says the full list is the story because of the 95 subcategories.\u003c/p\u003e\n\n\u003ch2 id=\"areas-represented\"\u003eAreas represented\u003c/h2\u003e\n\n\u003cp\u003eThe winners span a broad set of cybersecurity fields. The article specifically names the following areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAgentic AI security.\u003c/li\u003e\n\u003cli\u003eAI SecOps.\u003c/li\u003e\n\u003cli\u003eAI security testing.\u003c/li\u003e\n\u003cli\u003ePost-quantum cryptography.\u003c/li\u003e\n\u003cli\u003eContinuous threat exposure management.\u003c/li\u003e\n\u003cli\u003eExtended detection and response.\u003c/li\u003e\n\u003cli\u003eSoftware supply chain security.\u003c/li\u003e\n\u003cli\u003eIdentity threat detection and response.\u003c/li\u003e\n\u003cli\u003eSecure access service edge.\u003c/li\u003e\n\u003cli\u003eZero trust security.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these are among many other subcategories included in the awards.\u003c/p\u003e\n\n\u003ch2 id=\"parties-involved\"\u003eParties involved\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several groups involved in the awards process and outcome:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Cybersecurity Stars Awards program.\u003c/li\u003e\n\u003cli\u003eAn independent panel of judges.\u003c/li\u003e\n\u003cli\u003eThe winning companies, teams, and practitioners.\u003c/li\u003e\n\u003cli\u003eEvery company, team, and practitioner that entered nominations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNo specific individual winner, company, or team is named in the article text. Readers are directed to the full winners list for complete details.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-threat-context\"\u003eTechnical and threat context\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a security incident, vulnerability, malware campaign, threat actor, exploit technique, or affected product. It also does not disclose remediation steps, indicators of compromise, patches, or technical findings.\u003c/p\u003e\n\n\u003cp\u003eThe technical content is limited to the cybersecurity domains covered by the award subcategories, such as AI security, post-quantum cryptography, exposure management, XDR, software supply chain security, identity threat detection and response, SASE, and zero trust security.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-next-steps\"\u003eImpact and next steps\u003c/h2\u003e\n\n\u003cp\u003eThe immediate impact described in the article is recognition of award winners across the Cybersecurity Stars Awards categories and subcategories. The complete winners list is live on the awards website.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that nominations for the 2027 awards will open later this year. A waiting list is available for those who want to be notified when nominations open.\u003c/p\u003e\n","keyPoints":["The 2026 Cybersecurity Stars Awards winners were announced across 95 subcategories in four main award categories.","Every nomination was reviewed by an independent panel of judges and scored on innovation, impact, and technical excellence.","Entries were judged on the work itself rather than popularity, brand size, or campaign reach.","Some subcategories have more than one winner because the awards recognize every entry that meets the standard.","The complete 2026 winners list is available at awards.thehackernews.com/winners/2026/."],"insights":["The awards structure allows multiple winners in a single subcategory, so being listed as a winner does not necessarily indicate sole leadership in that area.","The judging criteria explicitly exclude popularity, brand size, and campaign reach, which makes the awards more focused on submitted work than on market visibility.","The award categories include emerging areas such as agentic AI security, AI SecOps, and post-quantum cryptography, indicating that the program is tracking newer cybersecurity disciplines alongside established ones.","Organizations interested in future participation can join the waiting list now because nominations for the 2027 awards are scheduled to open later this year."],"referencedReports":[],"body":"\u003cp\u003eThe 2026 Cybersecurity Stars Awards winners have been announced across 95 subcategories in four main award categories. The awards are presented as recognition for cybersecurity work that is often invisible, including products, teams, and companies that improve security outcomes. The full winners list is available at awards.thehackernews.com/winners/2026/.\u003c/p\u003e\n\n\u003cp\u003eEvery nomination was reviewed by an independent panel of judges. Entries were scored against three criteria: innovation, impact, and technical excellence. The article states that entries were judged on the work itself, not on popularity, brand size, or campaign reach.\u003c/p\u003e\n\n\u003cp\u003eThe awards span areas including agentic AI security, AI SecOps, AI security testing, post-quantum cryptography, continuous threat exposure management, extended detection and response, software supply chain security, identity threat detection and response, secure access service edge, and zero trust security. Some subcategories have more than one winner because the awards recognize every entry that meets the stated standard. Nominations for the 2027 awards are expected to open later this year, with a waiting list available for updates.\u003c/p\u003e\n"},{"n":10,"title":"[Event] Connecting Leaders in OT Security","source":"barriernetworks.com","sourceColorIdx":8,"link":"https://www.barriernetworks.com/radiflowdinneraberdeen#new_tab","time":"13:51","priority":"MAY READ","score":25,"tldr":"Radiflow and Barrier are hosting an invite-only networking dinner on 18 June 2026 in Aberdeen for OT security and critical infrastructure leaders. The event focuses on cyber resilience, industrial threat visibility, and building high-value connections among industry peers.","briefOverview":"\u003cp\u003eRadiflow and Barrier are hosting an exclusive networking dinner titled “Connecting Leaders in OT Security.” The event is scheduled for Thursday 18 June 2026 from 5pm onwards at The Chester Hotel in Aberdeen. It is aimed at leaders and innovators from the industrial cybersecurity and critical infrastructure community.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the dinner as a setting for meaningful conversation, strategic insight, and high-value connections. It highlights curated discussions around cyber resilience, industrial threat visibility, and the future of securing critical infrastructure. No specific incident, threat actor, vulnerability, or technical finding is described.\u003c/p\u003e\n\n\u003cp\u003eThe event is designed to be limited in size to support meaningful conversation. Attendees are told to register their place and check email for confirmation. The article emphasizes premium dining, an intimate atmosphere, shared learning, and networking beyond the dinner table.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRadiflow and Barrier are hosting “Connecting Leaders in OT Security,” an exclusive networking dinner focused on operational technology security. The event will take place on Thursday 18 June 2026 from 5pm onwards. The venue is The Chester Hotel in Aberdeen, AB15 4YP.\u003c/p\u003e\n\n\u003cp\u003eThe stated audience is leaders and innovators from across the industrial cybersecurity and critical infrastructure community. The article frames the event as an opportunity to engage with peers who face evolving operational security challenges. It emphasizes a relaxed and premium setting rather than a formal technical training format.\u003c/p\u003e\n\n\u003cp\u003eThe discussions are described as curated around cyber resilience, industrial threat visibility, and the future of securing critical infrastructure. The article does not provide a technical agenda, named speakers, or specific workshop content. It also does not identify any specific threat actors, malware, vulnerabilities, affected products, or active campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe main disclosed impact is professional and community-oriented: attendees are expected to build relationships, share learning, and participate in forward-looking dialogue. The organizers describe the dinner as intimate and carefully selected to encourage authentic networking. Exceptional dining and a premium atmosphere are presented as part of the event experience.\u003c/p\u003e\n\n\u003cp\u003eRegistration is available, but the article notes that spaces are limited. It tells prospective attendees to check their email for confirmation of their place. No incident response activity, advisory action, or remediation guidance is included because the article is an event notice rather than a security report.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRadiflow and Barrier are hosting an event titled “Connecting Leaders in OT Security.” The article describes the event as an exclusive networking dinner for leaders and innovators from the industrial cybersecurity and critical infrastructure community.\u003c/p\u003e\n\n\u003cp\u003eThe event is scheduled for Thursday 18 June 2026, starting from 5pm onwards. It will be held at The Chester Hotel in Aberdeen, AB15 4YP.\u003c/p\u003e\n\n\u003ch2 id=\"organizers-and-audience\"\u003eOrganizers and Audience\u003c/h2\u003e\n\n\u003cp\u003eThe event is hosted by Radiflow and Barrier. The article identifies the intended audience as leaders and innovators across industrial cybersecurity and critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe event is positioned for professionals who are dealing with evolving operational security challenges. It is described as a place to engage with peers in a relaxed and premium setting.\u003c/p\u003e\n\n\u003ch2 id=\"themes-and-discussion-areas\"\u003eThemes and Discussion Areas\u003c/h2\u003e\n\n\u003cp\u003eThe article says guests will participate in curated discussions around several OT security themes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCyber resilience.\u003c/li\u003e\n\u003cli\u003eIndustrial threat visibility.\u003c/li\u003e\n\u003cli\u003eThe future of securing critical infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese topics are presented at a strategic level. The article does not include specific technical details, named technologies, vulnerabilities, threat actors, malware families, or incident examples.\u003c/p\u003e\n\n\u003ch2 id=\"event-format-and-purpose\"\u003eEvent Format and Purpose\u003c/h2\u003e\n\n\u003cp\u003eThe event is structured as an intimate networking dinner rather than a public conference or technical workshop. The article emphasizes meaningful conversation, strategic insight, and high-value connections.\u003c/p\u003e\n\n\u003cp\u003eIt also highlights the role of the setting, describing exceptional dining, an intimate atmosphere, and a carefully selected audience. The purpose is to support authentic networking, shared learning, and forward-looking dialogue that continues beyond the dinner table.\u003c/p\u003e\n\n\u003ch2 id=\"registration-and-attendance\"\u003eRegistration and Attendance\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a registration prompt for attendees to reserve a place. It states that spaces are limited to ensure meaningful conversation.\u003c/p\u003e\n\n\u003cp\u003eProspective attendees are told to check their email for confirmation of their place. This indicates that registration may require confirmation before attendance is finalized.\u003c/p\u003e\n\n\u003ch2 id=\"security-context-provided\"\u003eSecurity Context Provided\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on OT security and critical infrastructure at a high level. It mentions operational security challenges, cyber resilience, industrial threat visibility, and securing critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eHowever, it does not describe any specific security incident, affected organization, known or suspected actor, disclosed impact, or response action. It is an event announcement rather than a technical analysis, advisory, incident report, or research publication.\u003c/p\u003e\n","keyPoints":["Radiflow and Barrier are hosting an exclusive networking dinner called Connecting Leaders in OT Security.","The event is scheduled for Thursday 18 June 2026 from 5pm onwards at The Chester Hotel in Aberdeen.","The event brings together leaders and innovators from the industrial cybersecurity and critical infrastructure community.","Guests will take part in curated discussions around cyber resilience, industrial threat visibility, and the future of securing critical infrastructure.","Spaces are limited, and attendees are asked to check their email for confirmation of their place."],"insights":["The event is designed as a curated, limited-capacity dinner rather than a broad public conference, with spaces restricted to support meaningful conversation.","Registration alone may not confirm attendance, as the article tells registrants to check their email for confirmation of their place.","The agenda emphasizes peer discussion and relationship-building over formal training, with the dinner framed around networking, shared learning, and strategic dialogue."],"referencedReports":[],"body":"\u003cp\u003eRadiflow and Barrier are hosting an exclusive networking dinner titled “Connecting Leaders in OT Security.” The event is scheduled for Thursday 18 June 2026 from 5pm onwards at The Chester Hotel in Aberdeen. It is aimed at leaders and innovators from the industrial cybersecurity and critical infrastructure community.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the dinner as a setting for meaningful conversation, strategic insight, and high-value connections. It highlights curated discussions around cyber resilience, industrial threat visibility, and the future of securing critical infrastructure. No specific incident, threat actor, vulnerability, or technical finding is described.\u003c/p\u003e\n\n\u003cp\u003eThe event is designed to be limited in size to support meaningful conversation. Attendees are told to register their place and check email for confirmation. The article emphasizes premium dining, an intimate atmosphere, shared learning, and networking beyond the dinner table.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}

  );
}

function ReportsPanel({ reports }) {
  return (

}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
