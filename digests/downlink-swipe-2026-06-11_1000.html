rage that maps how access flows across on-premises and cloud systems, defenders may see only part of the attack path.\u003c/p\u003e\n\n\u003ch2 id=\"credential-risk\"\u003eCredential Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies credentials as an ongoing problem that continues to benefit attackers. It describes stolen credentials from the dark web, credentials dumped from device caches, and credentials reused across multiple accounts as direct on-ramps into an organization. Once an attacker has credentials, the article says they may be able to move around freely.\u003c/p\u003e\n\n\u003cp\u003eWeak or poorly encrypted passwords are presented as obvious risks. The article also stresses that subtler credential issues can be more dangerous. For example, if an employee reuses the same password across personal and work accounts, a breach elsewhere can become a problem for the organization.\u003c/p\u003e\n\n\u003cp\u003eCached credentials on endpoints are another concern described in the article. It says these credentials can be harvested by anyone who reaches the machine, and in a large environment they may be widespread. The article states that finding weak, reused, and cached credentials across a large hybrid environment requires visibility that most teams do not have.\u003c/p\u003e\n\n\u003ch2 id=\"ai-agents-and-non-human-identities\"\u003eAI Agents and Non-Human Identities\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights AI agents and automated service accounts as a newer identity on-ramp. It says these identities already operate at scale in many enterprise environments. Unlike human accounts, they may never have been formally onboarded into identity governance processes.\u003c/p\u003e\n\n\u003cp\u003eThe article states that many of these non-human identities hold real privileges and interact with real systems. However, their ownership may be unclear and their permissions may not be sufficiently reviewed. This creates governance gaps around accounts that can still have meaningful access.\u003c/p\u003e\n\n\u003cp\u003eShadow AI is described as worsening the issue. When development teams create AI agents or automated workflows outside official channels, those identities may have no inventory record, no access review, and no deprovisioning plan. The article says an AI agent with admin-level permissions and no oversight is an open on-ramp for attackers.\u003c/p\u003e\n\n\u003ch2 id=\"how-attack-paths-form\"\u003eHow Attack Paths Form\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the challenges it describes do not exist in isolation. It says attackers understand how to combine identity weaknesses with other exposures. The risk is not only in individual weaknesses but in the connections between them.\u003c/p\u003e\n\n\u003cp\u003eOne example attack path in the article begins with stolen credentials that allow access to Active Directory. From there, the attacker finds a cached SSH key on a connected endpoint. A known CVE then provides elevated privileges, and the attacker reaches a critical cloud workload.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that attackers do not limit themselves to identity weaknesses. It lists a software CVE, an exploit, and an S3 bucket mistakenly left public-facing as examples of exposures that can be combined with identity issues. These may be chained with a misconfigured service account, a reused password, or an ungoverned AI agent to form a complete attack path.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-management-as-the-proposed-response\"\u003eExposure Management as the Proposed Response\u003c/h2\u003e\n\n\u003cp\u003eThe article presents exposure management as a way to treat identity risk holistically. It says exposure management views identity as part of the wider organizational environment rather than as a disconnected silo. Its role is to map how individual exposures link together into validated attack paths that can reach business-critical assets.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, exposure management continuously monitors human, machine, and AI accounts across hybrid environments. It identifies misconfigurations across Active Directory and cloud environments, flags credential risks, and surfaces CVEs. It also maps these findings to the identities and access permissions they put at risk.\u003c/p\u003e\n\n\u003cp\u003eThe article says this approach gives organizations a complete picture of both individual exposures and the attack paths they form. Prioritization is tied to validated exploitability and business impact. Remediation guidance is described as helping responsible teams act quickly and confidently by giving them the context they need.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that identity now functions as the highway through modern enterprise environments. Attackers can use human accounts, credentials, service accounts, AI agents, cloud access, endpoint secrets, CVEs, and misconfigurations as connected steps toward critical assets. The article argues that organizations need exposure management to understand and control those connected paths rather than treating identity issues and other exposures as isolated findings.\u003c/p\u003e\n","keyPoints":["Attackers use the sprawling web of enterprise identities across Active Directory, cloud platforms, non-human identities, and AI agents as on-ramps into organizational environments.","Disconnected tools that focus only on Active Directory or only on cloud environments can leave blind spots at the seam between on-premises and cloud identity access.","Stolen, reused, weak, poorly encrypted, or cached credentials remain a major way for attackers to enter and move through hybrid enterprise environments.","AI agents and automated service accounts often hold real privileges but may lack clear ownership, access reviews, inventory records, or deprovisioning plans.","Exposure management helps by mapping individual exposures into validated attack paths, continuously monitoring human, machine, and AI accounts, and prioritizing remediation based on exploitability and business impact."],"insights":["The most dangerous identity risks may sit at the boundary between on-premises Active Directory and cloud platforms because tools that monitor only one side can miss cross-environment attack paths.","Credential exposure is broader than weak passwords because reused personal-work passwords and cached endpoint credentials can turn unrelated breaches or compromised machines into enterprise access paths.","Ungoverned AI agents and automated workflows created outside official channels can become privileged identities with no inventory record, access review, ownership, or deprovisioning plan.","The article emphasizes that remediation should be prioritized by validated attack paths to business-critical assets rather than by treating individual identity issues, CVEs, or misconfigurations as isolated findings."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that enterprise security boundaries have dissolved and that identity has become the main “highway” attackers use to move through modern environments. It describes large identity estates spanning Active Directory, cloud platforms, non-human identities, and AI agents as expanding attack surfaces. The central significance is that each account can become an on-ramp for attackers if defenders cannot see how access flows across systems.\u003c/p\u003e\n\n\u003cp\u003eA key technical concern is that many organizations rely on disconnected tools that do not track identity across hybrid environments. Active Directory-focused tools can miss cloud activity, while cloud-focused tools can miss on-premises activity, leaving blind spots between the two. The article also highlights credentials, cached secrets, service accounts, AI agents, CVEs, and public-facing misconfigurations as exposures that attackers can chain together.\u003c/p\u003e\n\n\u003cp\u003eThe article presents exposure management as the recommended approach for addressing these risks. It says exposure management maps individual exposures into validated attack paths that can reach business-critical assets. It also emphasizes continuous monitoring of human, machine, and AI accounts, prioritization based on exploitability and business impact, and remediation guidance for responsible teams.\u003c/p\u003e\n"},{"n":12,"title":"Top 7 AI Security Risks in SaaS Environments","source":"appomni.com","sourceColorIdx":0,"link":"https://appomni.com/blog/agentic-ai-security-risks-saas-environments/","time":"12:00","priority":"MAY READ","score":55,"tldr":"AI agents in SaaS environments increasingly act like privileged identities, so compromises such as prompt injection, shadow AI, identity hijacking, and data extraction can quickly lead to unauthorized actions and sensitive data exposure. Organizations should govern agents with Zero Trust controls, least privilege, continuous monitoring, and strong identity and data-access restrictions.","briefOverview":"\u003cp\u003eThe article describes seven AI security risks in SaaS environments, with a focus on agentic AI as a new type of identity that can act autonomously across enterprise systems. It says AI agents can fetch data, create users, and modify system configurations, expanding the SaaS attack surface when those actions occur without traditional human oversight. AppOmni research cited in the article says 75% of organizations experienced a SaaS-related security incident in the past year, and permission and identity issues caused 41% of those incidents.\u003c/p\u003e\n\n\u003cp\u003eThe risks highlighted include agentic workflow compromise, second-order prompt injection, shadow AI, compliance conflicts from automated data gathering, SaaS identity hijacking, model inversion, and multimodal adversarial attacks. The article uses the BodySnatcher vulnerability, CVE-2025-12420, as an example of unauthenticated agentic hijacking involving hardcoded secrets and insecure auto-linking logic. It also discusses EvilToken-style attacks against SaaS-native authentication flows and emphasizes that AI security is shifting from prompt filtering toward identity-centric governance.\u003c/p\u003e\n\n\u003cp\u003eThe main recommended response is to treat AI agents as operators and apply controls similar to those used for privileged human administrators. The article recommends measures such as MFA for account linking, unique provider-level secrets, least privilege, human-in-the-loop confirmation, OAuth and consent governance, AI inventory and discovery, API rate limiting, differential privacy, input validation, and continuous monitoring of AI-to-SaaS relationships.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article examines AI security risks in SaaS environments, arguing that agentic AI changes the risk model because it can operate like an identity rather than merely generating content. It says these agents can autonomously make decisions and execute tasks across SaaS ecosystems, including fetching data, creating users, and changing system configurations. This matters because SaaS incidents are already common, with AppOmni research cited as finding that 75% of organizations experienced a SaaS-related security incident in the past year and that permission and identity issues caused 41% of those incidents.\u003c/p\u003e\n\n\u003cp\u003eThe first major risk described is agentic workflow compromise and cascading failure, where one compromised agent or poisoned component can spread malicious actions across a multi-agent pipeline. The article highlights the BodySnatcher vulnerability, tracked as CVE-2025-12420, which involved universal hardcoded secrets such as “servicenowexternalagent” and insecure auto-linking logic. According to the article, unauthenticated attackers could have impersonated any user, including administrators, by knowing only a target email address, potentially bypassing SSO and MFA.\u003c/p\u003e\n\n\u003cp\u003eThe article also covers second-order prompt injection, where attackers place malicious instructions in data fields or workflows instead of the original prompt. When a benign AI agent processes the poisoned data, it can be tricked into recruiting a more powerful agent to perform an unauthorized task. The article says this can lead to cross-system escalation and data siphoning without stolen credentials, and it recommends human-in-the-loop confirmation, segmentation, and least privilege controls for agent tools.\u003c/p\u003e\n\n\u003cp\u003eAnother theme is unmanaged or overbroad AI access inside otherwise approved SaaS platforms. The article describes shadow AI as the use of unapproved embedded AI features in sanctioned platforms such as Salesforce or Microsoft 365, creating risks around broad data access, data residency, GDPR compliance, and potential training of third-party models on sensitive corporate data. It recommends AI inventory and discovery, automated approval lifecycle review, and disabling dormant agents unused for 90 days or more.\u003c/p\u003e\n\n\u003cp\u003eThe article further discusses compliance conflicts from automated data gathering, SaaS identity hijacking, model inversion, membership inference, and multimodal adversarial attacks. It cites EvilToken as an example of attacks targeting SaaS-native authentication such as device code flows, and it warns that deepfake audio and video can be used to impersonate executives and authorize fraudulent SaaS integrations. For model and data risks, it recommends differential privacy, API rate limiting, sensitive-data masking before RAG indexing, multimodal red teaming, adversarial training, and robust input validation.\u003c/p\u003e\n\n\u003cp\u003eOverall, the article frames the future of AI security in SaaS as an identity governance problem. It says organizations should treat AI agents as operators and apply Zero Trust principles used for human administrators. Its response strategy centers on visibility into AI usage and data access, least privilege, continuous anomaly detection, secure AI configuration, prompt protections, and continuous identity-centric monitoring of the AI-to-SaaS relationship.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines the top AI security risks in SaaS environments, focusing especially on agentic AI. It says AI is no longer limited to passive content generation because agentic AI can operate as a new type of identity inside SaaS ecosystems. These agents can make autonomous decisions and independently execute tasks such as fetching data, creating users, and modifying system configurations.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as a significant expansion of the enterprise attack surface because these actions often occur without traditional human-in-the-loop oversight. It cites AppOmni research indicating that 75% of organizations experienced a SaaS-related security incident in the past year. It also states that permission and identity issues were responsible for 41% of those incidents.\u003c/p\u003e\n\n\u003ch2 id=\"1-agentic-workflow-compromise-and-cascading-failures\"\u003e1. Agentic workflow compromise and cascading failures\u003c/h2\u003e\n\n\u003cp\u003eThe first risk is agentic workflow compromise and cascading failures. The article defines this as a situation where a compromised agent or poisoned component propagates malicious actions across a multi-agent pipeline. It says attackers can exploit broken authentication in AI provider APIs to gain an initial foothold.\u003c/p\u003e\n\n\u003cp\u003eThe article uses the BodySnatcher vulnerability, tracked as CVE-2025-12420, as an example. It says the vulnerability involved universal, hardcoded secrets such as “servicenowexternalagent” and insecure auto-linking logic. According to the article, unauthenticated attackers could have impersonated any user, including administrators, by knowing only a target email address.\u003c/p\u003e\n\n\u003cp\u003eThe impact described is severe because attackers could bypass SSO and MFA. Once inside, attackers could remotely take charge of privileged workflows, create backdoor admin accounts, or exfiltrate sensitive data.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnforcing MFA for all account-linking processes.\u003c/li\u003e\n\u003cli\u003eMoving from basic email-based linking to software-based authenticators.\u003c/li\u003e\n\u003cli\u003eRotating credentials so provider-level secrets are unique per instance.\u003c/li\u003e\n\u003cli\u003eDe-provisioning internal execution paths such as AIA-Agent Invoker AutoChat to prevent agents from running outside expected constraints.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"2-second-order-prompt-injection-in-agent-to-agent-workflows\"\u003e2. Second-order prompt injection in agent-to-agent workflows\u003c/h2\u003e\n\n\u003cp\u003eThe second risk is second-order prompt injection. The article describes this as a technique where attackers insert malicious instructions into data fields or workflows rather than directly into the initial prompt. A benign AI agent may later process that poisoned data and be tricked into recruiting a more powerful agent to execute a malicious task.\u003c/p\u003e\n\n\u003cp\u003eThe article says this technique abuses trust between interconnected SaaS agents. It can result in cross-system escalation and data siphoning without the attacker needing stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRequiring human-in-the-loop confirmation for agents operating in supervised execution mode.\u003c/li\u003e\n\u003cli\u003eSegmenting agents by role and privilege level.\u003c/li\u003e\n\u003cli\u003ePreventing low-privilege agents from accessing administrative tools.\u003c/li\u003e\n\u003cli\u003eApplying least privilege access controls to the tools an AI agent can use, such as restricting record management functions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"3-shadow-ai-in-approved-saas-applications\"\u003e3. Shadow AI in approved SaaS applications\u003c/h2\u003e\n\n\u003cp\u003eThe article defines shadow AI as the use of unapproved AI features embedded in sanctioned SaaS applications. It gives Salesforce and Microsoft 365 as examples of approved SaaS platforms that may include embedded tools. These tools may have broad data access by default but may not have undergone formal security review.\u003c/p\u003e\n\n\u003cp\u003eThe article says this creates a risk of unintended data exposure. It also identifies blind spots around data residency and possible compliance violations, including GDPR. Another risk described is that sensitive corporate data could be used to train third-party models.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrioritizing AI inventory and discovery to identify embedded copilots and agents connected through OAuth.\u003c/li\u003e\n\u003cli\u003eImplementing an automated review process for the agent approval lifecycle.\u003c/li\u003e\n\u003cli\u003eIdentifying and disabling dormant agents unused for 90 days or more.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"4-compliance-conflicts-from-automated-data-gathering\"\u003e4. Compliance conflicts from automated data gathering\u003c/h2\u003e\n\n\u003cp\u003eThe fourth risk concerns compliance conflicts caused by automated data gathering. The article says AI agents may inadvertently violate privacy regulations such as GDPR by fetching sensitive personal data to provide better context for responses. It notes that most confidential enterprise data resides in SaaS applications, making the scope of this risk broad.\u003c/p\u003e\n\n\u003cp\u003eThe article also warns against using a second AI model to clean gathered data. It says this can create a vicious cycle because the second model gains access to the same sensitive information, increasing the risk of data exposure.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImplementing planner scope restrictions to limit data-fetching scope at the planner topic level.\u003c/li\u003e\n\u003cli\u003eEnsuring agents access only necessary tables.\u003c/li\u003e\n\u003cli\u003eApplying domain-specific data vetting instead of relying on generic AI models for compliance scrubbing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"5-saas-identity-hijacking\"\u003e5. SaaS identity hijacking\u003c/h2\u003e\n\n\u003cp\u003eThe article describes SaaS identity hijacking as a technique that uses AI to bridge social engineering and technical system access. It says threat actors can use AI to mimic legitimate human behavior at scale and bypass the modern SaaS perimeter.\u003c/p\u003e\n\n\u003cp\u003eThe article cites EvilToken as an example of attacks targeting SaaS-native authentication, including device code flows, to trick users into granting access. It also says the risk is amplified by AI-generated deepfake audio and video used to impersonate executives and authorize fraudulent SaaS integrations.\u003c/p\u003e\n\n\u003cp\u003eBecause identity is the primary perimeter for SaaS environments, the article says identity hijacking can give criminals legitimate access to sensitive data and interconnected cloud applications. Once inside, attackers can exploit overprivileged accounts to move laterally without triggering traditional network security alerts.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImplementing post-authentication SaaS monitoring.\u003c/li\u003e\n\u003cli\u003eAuditing behavior for anomalies such as unusual token usage.\u003c/li\u003e\n\u003cli\u003eApplying OAuth and consent governance to restrict user consent for new integrations.\u003c/li\u003e\n\u003cli\u003eUsing security tools that identify non-human patterns and detect AI-generated deepfakes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"6-model-inversion-data-extraction-and-membership-inference\"\u003e6. Model inversion, data extraction, and membership inference\u003c/h2\u003e\n\n\u003cp\u003eThe article describes model inversion and data extraction attacks as methods where criminals probe AI models to reveal sensitive training data or private records. It says attackers can reconstruct confidential information by querying model APIs or analyzing Retrieval-Augmented Generation vector data. These attacks can expose intellectual property and private corporate records stored in SaaS databases.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses membership inference attacks. It says criminals can determine whether a specific private record was part of a model’s training dataset, which can expose sensitive enterprise records used in training or processing.\u003c/p\u003e\n\n\u003cp\u003eThe article additionally mentions LLM decomposition. It says attackers use this technique to break down model responses and extract proprietary information by analyzing and splitting model outputs into smaller components to isolate hidden patterns or sensitive details.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsing differential privacy techniques to add noise to training data.\u003c/li\u003e\n\u003cli\u003ePreventing model outputs from depending on any single, specific data point.\u003c/li\u003e\n\u003cli\u003eEnforcing strict API rate limiting to prevent high-volume query activity needed for reconstruction attacks.\u003c/li\u003e\n\u003cli\u003eMasking sensitive information before indexing it into vector data for RAG systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"7-multimodal-adversarial-attacks\"\u003e7. Multimodal adversarial attacks\u003c/h2\u003e\n\n\u003cp\u003eThe seventh risk is multimodal adversarial attacks. The article says threat actors can use crafted inputs or poisoned data to deceive AI models that process multiple media types. These attacks can target text, charts, and image-text combinations to produce risky or fraudulent outputs.\u003c/p\u003e\n\n\u003cp\u003eThe article provides an example involving a financial chart image with subtle artifacts and a misleading caption. In that example, the model could recommend a high-risk trade while the advisory appears routine. The article also discusses medical imaging, saying adversarial noise in scans can lead to dangerous misdiagnoses by causing AI systems to interpret scans incorrectly.\u003c/p\u003e\n\n\u003cp\u003eThe article says simple defenses are often bypassed, so these attacks require robust, multi-layered detection.\u003c/p\u003e\n\n\u003cp\u003eRecommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eConducting multimodal red teaming to stress-test applications against adversarial inputs.\u003c/li\u003e\n\u003cli\u003eUsing adversarial training to help models recognize and ignore malicious artifacts in images.\u003c/li\u003e\n\u003cli\u003eImplementing robust input validation to ensure the integrity of all data types before AI processing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"governance-and-response-strategy\"\u003eGovernance and response strategy\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that AI security is shifting from prompt filtering to identity governance. It says organizations must treat AI agents as operators and apply the same Zero Trust principles used for human administrators. Because AI agents are becoming more powerful, the article says their security controls must match the risk they pose to the enterprise.\u003c/p\u003e\n\n\u003cp\u003eThe article’s FAQ states that the top risks in SaaS environments are agentic workflow compromise, second-order prompt injection, shadow AI, compliance conflicts from automated data gathering, SaaS identity hijacking, model inversion, and multimodal adversarial attacks. It also states that agentic AI is more dangerous than standard generative AI because generative AI creates content while agentic AI takes action, such as creating users, changing passwords, and deleting records.\u003c/p\u003e\n\n\u003cp\u003eThe article says traditional CASBs may not detect shadow AI inside SaaS applications because they can see that an approved SaaS application is in use but lack the deep context to identify whether an unapproved embedded AI feature is siphoning data. It recommends visibility into AI usage and data access, including AI functionality embedded within SaaS applications.\u003c/p\u003e\n\n\u003ch2 id=\"overall-conclusion\"\u003eOverall conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that securing the autonomous enterprise requires moving beyond point-in-time AI security. It says periodic patches are necessary but do not address systemic risk from insecure AI configurations. The article argues that the 2026 threat landscape requires continuous, identity-centric monitoring of the AI-to-SaaS relationship.\u003c/p\u003e\n\n\u003cp\u003eIts central message is that AI agents in SaaS must be governed like privileged identities. The recommended defensive approach combines AI discovery, least privilege, secure configuration, anomaly detection, prompt protections, consent governance, and continuous monitoring.\u003c/p\u003e\n","keyPoints":["Agentic AI operates as a new type of identity within SaaS environments, making autonomous decisions and executing tasks such as fetching data, creating users, and modifying system configurations.","The article identifies seven major AI security risks in SaaS environments: agentic workflow compromise, second-order prompt injection, shadow AI, compliance conflicts from automated data gathering, SaaS identity hijacking, model inversion, and multimodal adversarial attacks.","The BodySnatcher vulnerability, tracked as CVE-2025-12420, used hardcoded secrets and insecure auto-linking logic that could have allowed unauthenticated attackers to impersonate users, including administrators, by knowing only a target email address.","Second-order prompt injection can occur when attackers place malicious instructions in data fields or workflows, causing a benign AI agent to recruit a more powerful agent to execute unauthorized tasks.","The article says organizations should treat AI agents as operators and apply Zero Trust principles, least privilege access controls, continuous monitoring, and identity-centric governance to AI-to-SaaS relationships."],"insights":["Account-linking flows for AI agents are a critical control point because the article says attackers can bypass SSO and MFA when insecure auto-linking logic or shared provider-level secrets are abused.","Second-order prompt injection is especially difficult to detect because the malicious instruction is not in the initial prompt but hidden in SaaS data fields or workflows that a trusted agent later processes.","Using a second AI model to scrub sensitive data can worsen compliance risk because the article says the second model receives access to the same sensitive information.","Traditional CASBs may miss shadow AI risks inside approved SaaS platforms because they can see sanctioned app usage but lack the context to identify unapproved embedded AI features siphoning data.","Dormant AI agents that have been unused for 90 days or more are called out as a reducible attack surface, making agent inactivity a practical criterion for deprovisioning."],"referencedReports":[{"title":"Stress-testing multimodal AI applications: A new frontier for red teams","url":"https://www.ibm.com/think/insights/stress-testing-multimodal-ai-applications-new-frontier-for-red-teams","publisher":"IBM","context":"The article cites IBM's analysis to support the claim that multimodal adversarial attacks can target text, charts, and image-text combinations to produce risky or fraudulent outputs.","category":"","primary":false},{"title":"Adversarial noise in scans can lead to dangerous misdiagnoses","url":"https://www.nature.com/articles/s41467-025-64062-1","publisher":"Nature","context":"The article references this Nature research in its discussion of adversarial noise in medical scans causing dangerous misdiagnoses.","category":"","primary":false}],"body":"\u003cp\u003eThe article describes seven AI security risks in SaaS environments, with a focus on agentic AI as a new type of identity that can act autonomously across enterprise systems. It says AI agents can fetch data, create users, and modify system configurations, expanding the SaaS attack surface when those actions occur without traditional human oversight. AppOmni research cited in the article says 75% of organizations experienced a SaaS-related security incident in the past year, and permission and identity issues caused 41% of those incidents.\u003c/p\u003e\n\n\u003cp\u003eThe risks highlighted include agentic workflow compromise, second-order prompt injection, shadow AI, compliance conflicts from automated data gathering, SaaS identity hijacking, model inversion, and multimodal adversarial attacks. The article uses the BodySnatcher vulnerability, CVE-2025-12420, as an example of unauthenticated agentic hijacking involving hardcoded secrets and insecure auto-linking logic. It also discusses EvilToken-style attacks against SaaS-native authentication flows and emphasizes that AI security is shifting from prompt filtering toward identity-centric governance.\u003c/p\u003e\n\n\u003cp\u003eThe main recommended response is to treat AI agents as operators and apply controls similar to those used for privileged human administrators. The article recommends measures such as MFA for account linking, unique provider-level secrets, least privilege, human-in-the-loop confirmation, OAuth and consent governance, AI inventory and discovery, API rate limiting, differential privacy, input validation, and continuous monitoring of AI-to-SaaS relationships.\u003c/p\u003e\n"},{"n":4,"title":"AI Broke Vulnerability Management. That's Why CISOs Are Moving Budget to BAS.","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ai-broke-vulnerability-management-thats.html","time":"11:30","priority":"MAY READ","score":45,"tldr":"AI is shrinking the time from vulnerability discovery to exploitation from months to hours, making traditional patch-first vulnerability management too slow on its own. The article argues that organizations need continuous breach and attack simulation to validate which threats are actually exploitable and whether existing defenses can stop them.","briefOverview":"\u003cp\u003eThe article argues that AI has removed the traditional time buffer between vulnerability discovery and exploitation, compressing what once took months into hours. It says vulnerability management processes built around severity scoring, scheduled remediation, and patch validation are no longer sufficient when attackers can weaponize flaws at machine speed. The article positions Breach and Attack Simulation as a way to determine which vulnerabilities are actually exploitable and whether existing controls can block or detect related techniques.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Anthropic’s May 2026 update, which reported that Claude Mythos Preview and about 50 partners found more than 10,000 high- or critical-severity vulnerabilities in systemically important software in one month. It also cites Zero Day Clock’s estimate that average time-to-exploit in 2026 is roughly 24 hours, down from about 53 days in 2024, and Verizon’s 2026 DBIR data showing remediation timelines still measured in weeks. The central impact described is a widening gap between AI-accelerated offense and human-driven patching processes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents a trend-focused argument that AI has broken the assumptions behind traditional vulnerability management. It says defenders historically relied on a buffer of months between vulnerability disclosure and practical exploitation, allowing teams to triage by severity, schedule fixes, validate patches, and move on. According to the article, that buffer has collapsed because AI has compressed discovery-to-exploit timelines from months to hours.\u003c/p\u003e\n\n\u003cp\u003eSeveral cited examples are used to support the article’s case. Anthropic’s May 2026 update is described as reporting that Claude Mythos Preview and about 50 partners found more than 10,000 high- or critical-severity vulnerabilities in systemically important software in a single month. The article also says Mythos wrote 181 working exploits against Firefox, found issues across major operating systems and browsers, and surfaced an OpenBSD bug that had gone undetected for 27 years.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses an AWS threat-intelligence report from February 2026 about an AI-augmented actor targeting FortiGate devices at scale. According to the article, the campaign did not require zero-days and instead used weak credentials industrialized through a custom MCP server running offensive tools autonomously. AWS confirmed more than 600 devices across more than 55 countries, while independent researchers said the actor’s logs queued 2,516 devices across 106 countries.\u003c/p\u003e\n\n\u003cp\u003eThe article says exploitation timelines are collapsing while remediation is not accelerating enough to match them. It cites Zero Day Clock as putting the 2026 average time-to-exploit at roughly 24 hours, compared with about 53 days in 2024. It also cites Verizon’s 2026 DBIR as tying 32% of initial-access techniques to exploitation of vulnerabilities and reporting a 43-day median fix time for known-exploited vulnerabilities, with full patching falling from 38% to 26%.\u003c/p\u003e\n\n\u003cp\u003eThe article’s proposed response is to shift budget and strategy toward Breach and Attack Simulation and related adversarial exposure validation. BAS is described as safely running real-world adversary techniques against live prevention and detection stacks to show what is blocked, detected, or missed. The article further promotes Picus’ agentic BAS approach, which it says uses AI to coordinate threat research and assemble simulations from pre-vetted test building blocks rather than generating live exploit payloads.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-argument\"\u003eCore Argument\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that AI has undermined the traditional vulnerability management model by removing the time buffer defenders historically relied on. For roughly thirty years, the article says vulnerability management worked because there were often months between the discovery of a vulnerability and the point at which attackers could weaponize it. That allowed teams to triage by severity, schedule remediation, validate patches, and proceed through normal change-management processes.\u003c/p\u003e\n\n\u003cp\u003eThe article says that buffer is now gone. Its central claim is that AI has compressed the discovery-to-exploit cycle from months to hours. As a result, the article argues that a process designed for slower exploitation timelines cannot survive unchanged when offensive activity moves at machine speed.\u003c/p\u003e\n\n\u003ch2 id=\"ai-driven-vulnerability-discovery\"\u003eAI-Driven Vulnerability Discovery\u003c/h2\u003e\n\n\u003cp\u003eThe article cites Anthropic’s May 2026 update as evidence that AI has turned vulnerability discovery into a volume problem. According to the article, Anthropic reported that Claude Mythos Preview and approximately 50 partners found more than 10,000 high- or critical-severity vulnerabilities in systemically important software in a single month.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites earlier figures for the Mythos model. It says that when pointed at Firefox, the gated Mythos model wrote 181 working exploits, compared with 2 from the previous frontier model. It also says Mythos surfaced vulnerabilities across every major operating system and browser, including an OpenBSD bug that had remained undetected for 27 years.\u003c/p\u003e\n\n\u003cp\u003eAt the time of writing, the article says more than 99% of the vulnerabilities found by Mythos were still unpatched. This is used to support the article’s argument that vulnerability volume is increasing faster than organizations can remediate.\u003c/p\u003e\n\n\u003ch2 id=\"ai-augmented-offensive-operations\"\u003eAI-Augmented Offensive Operations\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses an AWS threat-intelligence report from February 2026 as an example of offensive automation at scale. The report is described as covering a campaign against FortiGate devices that did not require zero-day vulnerabilities. Instead, the campaign used weak credentials and a custom MCP server running offensive tools autonomously.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, AWS confirmed more than 600 affected devices across more than 55 countries. It also says independent researchers reported that the actor’s logs queued 2,516 devices across 106 countries. The article uses this example to argue that activities once requiring rare expertise can now run at machine speed and scale.\u003c/p\u003e\n\n\u003ch2 id=\"collapse-of-the-time-to-exploit-window\"\u003eCollapse of the Time-to-Exploit Window\u003c/h2\u003e\n\n\u003cp\u003eThe article says the vulnerability weaponization window has collapsed as well. It defines time-to-exploit as the time between a CVE becoming public and its first confirmed exploitation in the wild. It then cites Zero Day Clock as putting the 2026 average time-to-exploit at roughly 24 hours, down from about 53 days in 2024.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites Verizon’s 2026 DBIR. It says Verizon tied 32% of initial-access techniques to exploitation of vulnerabilities and expected that number to climb. The article attributes that expected increase to AI coding assistants making exploit-building, tool porting, and fresh flaw discovery more accessible to attackers.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-patch-faster-as-a-strategy\"\u003eLimits of “Patch Faster” as a Strategy\u003c/h2\u003e\n\n\u003cp\u003eThe article says the industry’s default answer is to patch faster, and that regulators, boards, and executives increasingly expect same-day fixes for some critical vulnerabilities. However, it argues that remediation cannot be treated as a switch. Patches still need regression testing, change windows, approvals, uptime considerations, and compliance alignment.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Verizon’s 2026 DBIR data from more than 13,000 organizations to show that remediation timelines are not keeping pace with exploitation timelines. It says the median fix time for known-exploited vulnerabilities was 43 days, up from 32 days the prior year. It also says the share of known-exploited vulnerabilities fully patched fell from 38% to 26%.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that even the best-performing organizations close only 30–40% of known-exploited vulnerabilities in the first week after detection. It uses this to argue that when offense runs in hours and remediation runs in weeks, breaches often occur in the gap between exploitation and patching.\u003c/p\u003e\n\n\u003ch2 id=\"shift-from-severity-scoring-to-exploitability-evidence\"\u003eShift from Severity Scoring to Exploitability Evidence\u003c/h2\u003e\n\n\u003cp\u003eThe article says vulnerability management has traditionally followed three assumptions: find flaws, score them by severity, and patch the worst first. It argues that this approach worked when organizations faced only a manageable number of critical vulnerabilities. It says it does not work when disclosures arrive at high volume and many vulnerabilities receive high severity scores.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Verizon’s DBIR again, stating that the median organization had to patch 16 known-exploited vulnerabilities in 2025, up from 11 the year before. It says this increase occurred before AI-discovered flaws began flooding vulnerability catalogs.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that severity scores do not show whether a flaw is reachable in a specific environment, whether existing controls already block it, or whether it can be chained to something important. It says the more useful question is no longer simply what is vulnerable, but what is actually exploitable against the organization and whether defenses would catch it.\u003c/p\u003e\n\n\u003ch2 id=\"breach-and-attack-simulation-as-the-proposed-answer\"\u003eBreach and Attack Simulation as the Proposed Answer\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Breach and Attack Simulation as a way to answer that question. BAS is described as safely running real-world adversary techniques against live prevention and detection stacks. The article emphasizes that BAS is not a scan or theoretical mapping, but an exercise intended to show what security tools block, detect, or miss.\u003c/p\u003e\n\n\u003cp\u003eThe article says BAS helps in three ways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt separates theoretical exposure from real exposure by showing whether WAF, IPS, EDR, and other controls already neutralize a flaw.\u003c/li\u003e\n\u003cli\u003eIt validates the controls organizations have already purchased by measuring whether they fire as configured.\u003c/li\u003e\n\u003cli\u003eIt buys time to patch safely by showing whether a critical asset is already covered by compensating controls or whether immediate mitigation is needed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says field reports increasingly point to CISOs reserving dedicated spend for BAS that was not a separate line item a year earlier. It also connects BAS to Gartner’s label of Adversarial Exposure Validation, described as blending security effectiveness with business context.\u003c/p\u003e\n\n\u003ch2 id=\"bas-and-autonomous-penetration-testing\"\u003eBAS and Autonomous Penetration Testing\u003c/h2\u003e\n\n\u003cp\u003eThe article positions BAS and autonomous penetration testing as complementary. BAS is described as asking whether an organization would catch or block an adversary technique. Autonomous penetration testing is described as proving whether an attacker can chain exposures from an initial foothold to an organization’s crown jewels.\u003c/p\u003e\n\n\u003cp\u003eTogether, the article says these approaches replace guesswork with evidence. One evaluates whether defenses respond to adversary behavior, while the other evaluates whether exposures can be chained into meaningful compromise paths.\u003c/p\u003e\n\n\u003ch2 id=\"need-for-machine-speed-defensive-validation\"\u003eNeed for Machine-Speed Defensive Validation\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that if adversaries operate autonomously, human-paced validation cycles are too slow. It says machine-speed attacks require machine-speed defenses. The article states that the only thing fast enough to counter autonomous offense is autonomous defense.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, it raises a safety concern about using raw generative AI for attack simulation. Picus CTO Volkan Erturk is quoted or paraphrased as warning that a model asked to invent an exploit could return a live malware sample or hallucinate techniques that a threat group does not use. The article says organizations do not want unvetted binaries detonating in production or defenses built around nonexistent techniques.\u003c/p\u003e\n\n\u003ch2 id=\"picus-agentic-bas-approach\"\u003ePicus’ Agentic BAS Approach\u003c/h2\u003e\n\n\u003cp\u003eThe article says Picus’ approach is to use AI for coordination rather than creation. Instead of asking AI to write payloads, Picus’ agentic BAS matches fresh threat reporting against a curated, pre-vetted library of safe, ready-made test building blocks.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a multi-agent system in which:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOne agent identifies the threat and builds a research plan.\u003c/li\u003e\n\u003cli\u003eOther agents gather and validate intelligence from multiple sources.\u003c/li\u003e\n\u003cli\u003eA builder agent maps adversarial TTPs into attack chains ready for simulation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the output is an accurate, ready-to-run simulation assembled in minutes. It also says a CISA alert or forwarded headline can become a scoped test, posture score, prioritized mitigations, and executive report within minutes, with humans reviewing exceptions rather than manually driving each step.\u003c/p\u003e\n\n\u003ch2 id=\"picus-platform-positioning\"\u003ePicus Platform Positioning\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by positioning the Picus Platform as built for this shift. It states that patching remains essential, but argues that patching alone cannot be the whole strategy when AI discovers vulnerabilities by the thousands and weaponizes them in hours.\u003c/p\u003e\n\n\u003cp\u003eThe article says validation is what scales with the threat. It defines that validation as confirming what controls will stop, proving what is exploitable, and spending remediation time only where it changes the outcome.\u003c/p\u003e\n\n\u003cp\u003eThe article describes AI-powered, agentic BAS as one of the core pillars of the Picus Platform. It says the platform continuously tests whether defenses block and detect what matters, identifies vendor-specific mitigations when gaps are found, and re-validates to confirm that gaps have been closed.\u003c/p\u003e\n\n\u003ch2 id=\"stated-takeaway\"\u003eStated Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that vulnerability management can no longer rely only on severity-based prioritization and faster patching. It argues that AI has accelerated both vulnerability discovery and exploitation beyond the pace of traditional remediation processes. The article’s proposed answer is continuous, autonomous validation through BAS and related exposure-validation practices to determine which risks are real, which defenses work, and where remediation should be prioritized.\u003c/p\u003e\n","keyPoints":["The article argues that AI has compressed the time from vulnerability discovery to exploitation from months to hours, undermining vulnerability management processes built around longer remediation windows.","Anthropic reported in May 2026 that Claude Mythos Preview and approximately 50 partners found more than 10,000 high- or critical-severity vulnerabilities in systemically important software in a single month.","Zero Day Clock puts the 2026 average time-to-exploit at roughly 24 hours, down from about 53 days in 2024.","Verizon’s 2026 DBIR found that the median fix time for known-exploited vulnerabilities was 43 days and that the share fully patched fell from 38% to 26%.","The article says Breach and Attack Simulation helps organizations determine which flaws are actually exploitable in their environment, whether existing controls block or detect attacks, and where remediation should be prioritized."],"insights":["The article frames the main bottleneck as no longer vulnerability discovery or severity scoring, but evidence of whether a flaw is reachable, exploitable, and capable of bypassing existing controls in a specific environment.","The article says a critical vulnerability may not require emergency patching if BAS can prove that WAF, IPS, EDR, or other controls already neutralize it, allowing teams to keep normal change-control processes.","Picus argues that generative AI should coordinate BAS workflows rather than generate new exploit payloads, because raw model-generated exploits could create unsafe malware samples or hallucinated attack techniques.","The article presents BAS and autonomous penetration testing as complementary: one validates whether defenses block or detect adversary behavior, while the other tests whether exposures can be chained to reach crown-jewel assets."],"referencedReports":[{"title":"Glasswing Initial Update","url":"https://www.anthropic.com/research/glasswing-initial-update","publisher":"Anthropic","context":"The article cites Anthropic’s May 2026 update reporting that Claude Mythos Preview and partners found more than 10,000 high- or critical-severity vulnerabilities in one month.","category":"","primary":false},{"title":"Mythos Preview","url":"https://red.anthropic.com/2026/mythos-preview/","publisher":"Anthropic","context":"The article references Anthropic’s Mythos model research for figures on working exploits against Firefox and vulnerabilities found across major operating systems and browsers.","category":"","primary":false},{"title":"AI-augmented threat actor accesses FortiGate devices at scale","url":"https://aws.amazon.com/blogs/security/ai-augmented-threat-actor-accesses-fortigate-devices-at-scale/","publisher":"AWS","context":"The article cites an AWS threat-intelligence report about a February 2026 campaign involving autonomous offensive tooling against FortiGate devices.","category":"","primary":false},{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"The article uses Verizon’s 2026 DBIR for statistics on vulnerability exploitation as an initial-access method, patch timelines, and known-exploited vulnerability remediation rates.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI has removed the traditional time buffer between vulnerability discovery and exploitation, compressing what once took months into hours. It says vulnerability management processes built around severity scoring, scheduled remediation, and patch validation are no longer sufficient when attackers can weaponize flaws at machine speed. The article positions Breach and Attack Simulation as a way to determine which vulnerabilities are actually exploitable and whether existing controls can block or detect related techniques.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Anthropic’s May 2026 update, which reported that Claude Mythos Preview and about 50 partners found more than 10,000 high- or critical-severity vulnerabilities in systemically important software in one month. It also cites Zero Day Clock’s estimate that average time-to-exploit in 2026 is roughly 24 hours, down from about 53 days in 2024, and Verizon’s 2026 DBIR data showing remediation timelines still measured in weeks. The central impact described is a widening gap between AI-accelerated offense and human-driven patching processes.\u003c/p\u003e\n"},{"n":8,"title":"Aikido x Docker: less noise, more signal in your containers","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/docker-hardened-images-vex","time":"12:00","priority":"MAY READ","score":45,"tldr":"Aikido now supports Docker Hardened Images by automatically using Docker’s SBOM and VEX attestations to suppress CVEs that are verified as non-exploitable. The goal is to reduce container scan noise so teams focus only on vulnerabilities that actually need attention.","briefOverview":"\u003cp\u003eAikido now supports Docker Hardened Images, with the goal of reducing noisy container vulnerability results. The article says container scans can return dozens or hundreds of CVEs, many of which may be irrelevant, already patched by the maintainer, or not reachable in the user’s environment. Aikido’s integration is presented as a way to make scan feeds focus on vulnerabilities that actually matter.\u003c/p\u003e\n\n\u003cp\u003eDocker Hardened Images are described as purpose-built, often distroless images that include only the software a workload needs. They also come with VEX attestations, which Docker uses to communicate which CVEs are not actually exploitable in a specific image and why. Aikido pulls the signed SBOM for detected Docker Hardened Images and cross-references Docker’s VEX attestations to suppress vulnerabilities marked as fixed, not affected, or not requiring triage.\u003c/p\u003e\n\n\u003cp\u003eThe article says suppressed vulnerabilities remain available in Aikido’s Ignored tab, along with Docker’s verification and reasoning. This gives teams a documented explanation for why a CVE is not being addressed. Aikido says no extra setup is required beyond connecting a Docker Hub registry, and Docker Hardened Images receive this VEX handling automatically on every scan.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article announces that Aikido now supports Docker Hardened Images and uses Docker’s VEX attestations to reduce vulnerability scan noise. It frames the problem as a signal-to-noise issue in container security, where scans often return 50, 100, or hundreds of CVEs. The article says many alerts may be irrelevant, already patched, or present in parts of the image that are not reachable in a specific environment.\u003c/p\u003e\n\n\u003cp\u003eDocker Hardened Images are described as purpose-built, often distroless images that include only the software needed by the workload. The article says this reduces attack surface by construction and that patches often land faster than upstream in many cases. A key feature highlighted is that these images ship with VEX attestations, which communicate whether specific CVEs are actually exploitable in a given image.\u003c/p\u003e\n\n\u003cp\u003eVEX, or Vulnerability Exploitability eXchange, is described as a standard for image maintainers to explain why a CVE is not exploitable in a specific image. The article gives examples such as a vulnerable component not being present in a build or the dangerous code path not existing in that context. Docker performs this analysis and publishes the result for each hardened image it maintains.\u003c/p\u003e\n\n\u003cp\u003eAikido’s handling begins when it detects a Docker Hardened Image in a connected registry. It pulls the signed SBOM published with the image to identify what is actually present, then cross-references Docker’s VEX attestations to determine what is actually exploitable. Vulnerabilities Docker marks as fixed, not affected, or not requiring triage are suppressed before appearing in the main feed.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that suppressed CVEs are not removed from visibility. They appear in Aikido’s Ignored tab, where users can view the full reasoning and Docker’s own verification. The article says this can help security and compliance teams provide a documented, verifiable reason when an auditor asks why a CVE is not being addressed.\u003c/p\u003e\n\n\u003cp\u003eAikido states that no extra configuration is needed for this feature. Users can connect a Docker Hub registry by going to Settings \u0026gt; Containers, selecting Connect Registry, choosing Docker Hub, and entering a namespace and read-only access token. If Docker Hub is already connected in Aikido, the article says the feature is already working automatically on every scan for Docker Hardened Images.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article announces that Aikido now supports Docker Hardened Images. The stated purpose of the integration is to reduce noise in container vulnerability scans by using Docker’s VEX attestations to filter out CVEs that Docker has verified as non-exploitable, fixed, not affected, or not requiring triage.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as a response to a common container security problem: vulnerability scans often return 50, 100, or hundreds of CVEs. According to the article, many of those findings may be irrelevant, already patched by the image maintainer, or present in parts of the image that cannot actually be reached in the user’s environment.\u003c/p\u003e\n\n\u003ch2 id=\"container-security-noise-problem\"\u003eContainer security noise problem\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that container security has a signal-to-noise problem. It describes a typical workflow in which developers or security teams scan an image, receive a long list of CVEs, and then spend time manually triaging which alerts actually matter.\u003c/p\u003e\n\n\u003cp\u003eIt says this can lead teams to close alerts that seem low risk, snooze others, and face the same problem again in the next scan. The article frames this as dangerous because when everything is flagged, nothing feels urgent, and developers may stop trusting their security tools.\u003c/p\u003e\n\n\u003ch2 id=\"docker-hardened-images\"\u003eDocker Hardened Images\u003c/h2\u003e\n\n\u003cp\u003eDocker Hardened Images are described as purpose-built images that are often distroless and include only the software that a workload needs. The article says this makes the attack surface smaller by construction.\u003c/p\u003e\n\n\u003cp\u003eIt also says patches land faster than upstream in many cases. A key feature highlighted in the article is that Docker Hardened Images include VEX attestations, which most base images do not provide.\u003c/p\u003e\n\n\u003ch2 id=\"vex-attestations\"\u003eVEX attestations\u003c/h2\u003e\n\n\u003cp\u003eThe article defines VEX as Vulnerability Exploitability eXchange. It describes VEX as a standard way for image maintainers to communicate which CVEs are not actually exploitable in a specific image and why.\u003c/p\u003e\n\n\u003cp\u003eExamples given in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerable component is not present in the specific build.\u003c/li\u003e\n\u003cli\u003eThe code path that would make the vulnerability dangerous does not exist in that context.\u003c/li\u003e\n\u003cli\u003eDocker has analyzed the image and published the result for each hardened image it maintains.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says a conventional scan may still find a CVE in a package and flag it, even when the issue is not exploitable in the actual image context. As a result, adopting a more secure image can initially make a scan feed appear worse, even though the article says the opposite is true.\u003c/p\u003e\n\n\u003ch2 id=\"how-aikido-uses-docker-data\"\u003eHow Aikido uses Docker data\u003c/h2\u003e\n\n\u003cp\u003eWhen Aikido detects a Docker Hardened Image in a registry, the article says it pulls the signed SBOM published with the image. Aikido uses that SBOM to get an accurate picture of what is actually in the image.\u003c/p\u003e\n\n\u003cp\u003eAikido then cross-references Docker’s VEX attestations to determine what is actually exploitable. Vulnerabilities that Docker marks as fixed, not affected, or otherwise not requiring triage are suppressed before they reach the main feed.\u003c/p\u003e\n\n\u003ch2 id=\"handling-of-suppressed-vulnerabilities\"\u003eHandling of suppressed vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that suppressed vulnerabilities do not disappear. Instead, they are shown in Aikido’s Ignored tab so users can see both what was found and what was filtered out.\u003c/p\u003e\n\n\u003cp\u003eFor each ignored issue, Aikido shows the full reasoning and Docker’s own verification. The article includes examples showing VEX data attached to ignored issues and a case where Aikido downgraded severity because Docker’s VEX confirmed that the resource was not affected.\u003c/p\u003e\n\n\u003ch2 id=\"compliance-and-audit-relevance\"\u003eCompliance and audit relevance\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the integration can help security and compliance teams when auditors ask why a CVE is not being addressed. Because Aikido keeps the suppressed CVE visible with Docker’s verification and reasoning, teams have a documented and verifiable explanation.\u003c/p\u003e\n\n\u003cp\u003eThis is positioned as a way to reduce unnecessary triage while retaining a complete record of what was detected and why certain items were ignored.\u003c/p\u003e\n\n\u003ch2 id=\"setup-and-operation\"\u003eSetup and operation\u003c/h2\u003e\n\n\u003cp\u003eThe article says there is no extra configuration required beyond connecting a Docker Hub registry. It states that users should connect Docker Hub, scan a hardened image, and Aikido will handle the rest automatically in the background.\u003c/p\u003e\n\n\u003cp\u003eFor users who have not connected Docker Hub, the article says the process takes about two minutes. It describes the steps as going to Settings \u0026gt; Containers, clicking Connect Registry, selecting Docker Hub, and entering a namespace and read-only access token.\u003c/p\u003e\n\n\u003cp\u003eIf Docker Hub is already connected in Aikido, the article says the feature is already working. Aikido discovers repositories, and any Docker Hardened Image being run receives VEX handling automatically on every scan.\u003c/p\u003e\n\n\u003ch2 id=\"stated-impact\"\u003eStated impact\u003c/h2\u003e\n\n\u003cp\u003eThe central impact described in the article is a reduction in container scan noise. The article’s TL;DR says that a scan that used to return hundreds of CVEs can collapse to the handful that actually apply because Docker’s VEX attestations filter out items verified as non-exploitable.\u003c/p\u003e\n\n\u003cp\u003eThe article positions this as security that works better for developers by showing only what actually matters in the main feed while keeping ignored findings available for review and auditability.\u003c/p\u003e\n","keyPoints":["Aikido now supports Docker Hardened Images and uses Docker’s VEX attestations to filter out vulnerabilities Docker has verified as non-exploitable.","Docker Hardened Images are purpose-built, often distroless images that include only the software a workload needs and ship with signed SBOMs and VEX attestations.","When Aikido detects a Docker Hardened Image in a registry, it pulls the signed SBOM and cross-references Docker’s VEX attestations to determine which vulnerabilities are actually exploitable.","Vulnerabilities that Docker marks as fixed, not affected, or not requiring triage are suppressed from the main feed but remain visible in Aikido’s Ignored tab with Docker’s verification and reasoning.","Aikido says the integration requires no extra setup beyond connecting a Docker Hub registry, after which Docker Hardened Images receive VEX handling automatically on every scan."],"insights":["A hardened image can initially appear less secure in traditional scans because scanners may flag CVEs without accounting for Docker’s image-specific VEX analysis.","Aikido’s suppression model preserves auditability by moving filtered CVEs to an Ignored tab instead of removing them from view entirely.","The integration can reduce triage workload without requiring teams to change scanning workflows if their Docker Hub registry is already connected to Aikido.","Docker’s VEX attestations give security and compliance teams documented evidence for why certain CVEs are not being remediated."],"referencedReports":[],"body":"\u003cp\u003eAikido now supports Docker Hardened Images, with the goal of reducing noisy container vulnerability results. The article says container scans can return dozens or hundreds of CVEs, many of which may be irrelevant, already patched by the maintainer, or not reachable in the user’s environment. Aikido’s integration is presented as a way to make scan feeds focus on vulnerabilities that actually matter.\u003c/p\u003e\n\n\u003cp\u003eDocker Hardened Images are described as purpose-built, often distroless images that include only the software a workload needs. They also come with VEX attestations, which Docker uses to communicate which CVEs are not actually exploitable in a specific image and why. Aikido pulls the signed SBOM for detected Docker Hardened Images and cross-references Docker’s VEX attestations to suppress vulnerabilities marked as fixed, not affected, or not requiring triage.\u003c/p\u003e\n\n\u003cp\u003eThe article says suppressed vulnerabilities remain available in Aikido’s Ignored tab, along with Docker’s verification and reasoning. This gives teams a documented explanation for why a CVE is not being addressed. Aikido says no extra setup is required beyond connecting a Docker Hub registry, and Docker Hardened Images receive this VEX handling automatically on every scan.\u003c/p\u003e\n"},{"n":5,"title":"ThreatsDay Bulletin: Worm Code Leaked, AI Agent Phished, Claude Action Patch + 28 New Stories","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/threatsday-bulletin-worm-code-leaked-ai.html","time":"13:20","priority":"MAY READ","score":40,"tldr":"This roundup highlights how modern attacks are increasingly abusing trusted identities, developer ecosystems, AI agents, browser extensions, and legitimate tools rather than relying on traditional exploits. The key takeaway is that organizations need to audit credentials, agent permissions, CI/CD secrets, endpoint controls, and third-party dependencies because attackers are exploiting default trust across the enterprise.","briefOverview":"\u003cp\u003eThe article is a ThreatsDay roundup covering 28 cybersecurity stories involving infostealers, malware-as-a-service, supply chain attacks, AI agent risks, endpoint defense bypasses, phishing, and data exposure. Its central theme is that attackers increasingly rely on stolen credentials, trusted tools, legitimate platforms, and default trust relationships rather than only exploiting software flaws. The roundup highlights how polished criminal operations have become, including SaaS-like mule networks, deepfake KYC bypass, and malware that clones browser profiles.\u003c/p\u003e\n\n\u003cp\u003eSeveral stories focus on identity and developer ecosystem compromise. Flashpoint reported that more than 11.1 million devices were infected with infostealers last year, producing over 3.3 billion stolen credentials, session cookies, cloud tokens, and other identity data. The Miasma credential-stealing framework was briefly exposed on GitHub and described as a full supply chain attack toolkit targeting package registries, GitHub repositories, GitHub Actions, AI coding tool configurations, Artifactory, and SSH-based lateral movement.\u003c/p\u003e\n\n\u003cp\u003eAI and automation risks are another major focus. Varonis found that an OpenClaw email agent named Pinchy could be tricked by believable phishing emails into forwarding AWS IAM keys, database passwords, and SSH access to an external Gmail account. Microsoft also disclosed that Anthropic patched a Claude Code GitHub Action issue that could expose CI/CD workflow secrets when AI agents processed untrusted GitHub content.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a broad ThreatsDay bulletin summarizing major cybersecurity developments across malware, identity theft, supply chain compromise, AI agent security, endpoint evasion, phishing, and criminal infrastructure. It emphasizes that attackers are using patience, stolen credentials, trusted tools, and overlooked policy settings rather than relying only on traditional exploits. The author frames the broader problem as excessive default trust inside enterprise environments, developer pipelines, browsers, and AI workflows.\u003c/p\u003e\n\n\u003cp\u003eIdentity theft and credential abuse appear throughout the roundup. Flashpoint reported that more than 11.1 million devices were infected with infostealers last year, feeding more than 3.3 billion stolen credentials, session cookies, cloud tokens, and other identity data into illicit markets. Group-IB analyzed SilabRAT, a $5,000-per-month malware-as-a-service RAT advertised by the actor o1oo1 that focuses on credential theft, browser profile cloning, HVNC remote control, and cryptocurrency artifact collection.\u003c/p\u003e\n\n\u003cp\u003eSupply chain and developer ecosystem threats are a major theme. SafeDep reported that Miasma source code briefly appeared in GitHub repositories published through compromised developer accounts, and described the framework as a full supply chain attack toolkit rather than only a worm. The toolkit can target PyPI, npm, RubyGems, JFrog Artifactory, GitHub repositories, GitHub Actions, AI coding tool configurations, SSH-based lateral movement, and other vectors. Tenable also described “download pumping,” where attackers inflate npm package download counts to make malicious packages appear trustworthy.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also highlights AI-related security failures. Varonis tested an OpenClaw email agent named Pinchy and found it could be deceived by ordinary phishing messages, including one case where the agent forwarded AWS IAM keys, database passwords, and SSH access to an external Gmail account. Microsoft disclosed that Anthropic patched a Claude Code GitHub Action flaw that could expose workflow secrets when agents processed untrusted issue bodies, pull request descriptions, or comments. Apple also announced that Apple Intelligence will support automatically fixing weak and compromised passwords through the Passwords app and Safari with a user tap.\u003c/p\u003e\n\n\u003cp\u003eSeveral entries cover named actors, malware, and affected regions. CrowdStrike attributed 47% of state-sponsored hands-on-keyboard operations against the technology sector between April 2025 and March 2026 to the North Korean actor Famous Chollima. The U.S. Justice Department seized 13 domains allegedly linked to Chinese intelligence collection targeting current and former U.S. security clearance holders, while other reports described Russia-focused phishing campaigns, Brazil-focused RMM abuse, and Southeast Asian router compromises tied to a suspected China-nexus intrusion set. The roundup also covers malware and tools including SStar Agent, MLTBackdoor, GoFlateLoader, NFCShare, Agent Tesla, Vidar Stealer, STX RAT, BLUERABBIT, and ComoDoS.\u003c/p\u003e\n\n\u003cp\u003eThe article ends by arguing that the perimeter is no longer the main problem because many attacks abuse trusted identities, browser extensions, agents, endpoint controls, and internal access paths. It recommends auditing what agents can access, treating every identity in the pipeline as a risk, and checking what browser extensions send home. The recurring message is that organizations should reassess trust relationships across credentials, CI/CD systems, AI agents, endpoints, and third-party tools.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a ThreatsDay bulletin summarizing 28 cybersecurity stories across malware, supply chain compromise, identity theft, AI agent security, phishing, endpoint defense evasion, data exposure, and cybercrime infrastructure. Its main theme is that attackers are increasingly abusing trusted identities, legitimate tools, developer ecosystems, policy settings, browser extensions, and AI automation rather than relying solely on software exploits.\u003c/p\u003e\n\n\u003cp\u003eThe author frames the week as unusually significant because it included a leaked supply chain attack toolkit, a $5,000-per-month RAT with browser-cloning capabilities, and research showing that AI agents can be phished into leaking real credentials. The article also emphasizes the growing professionalism of criminal operations, including Mule-as-a-Service ecosystems, deepfake-enabled KYC bypass, and endpoint defense weakening through built-in operating system settings.\u003c/p\u003e\n\n\u003ch2 id=\"identity-theft-and-credential-abuse\"\u003eIdentity Theft and Credential Abuse\u003c/h2\u003e\n\n\u003cp\u003eFlashpoint reported that more than 11.1 million devices were infected with infostealers last year. Those infections produced more than 3.3 billion stolen credentials, session cookies, cloud tokens, and other identity data now circulating across illicit markets. The article says more than 30 unique infostealer strains are actively listed for sale across illicit marketplaces, forums, and underground communities.\u003c/p\u003e\n\n\u003cp\u003eThe most prolific stealers in 2025 were listed as Lumma, Acreed, Rhadamanthys, Vidar, and StealC. The top six countries affected by stealer malware during the same period were India, Brazil, Indonesia, Vietnam, the Philippines, and the United States.\u003c/p\u003e\n\n\u003cp\u003eGroup-IB analyzed SilabRAT, a remote access trojan sold under a malware-as-a-service model for $5,000 per month since September 2025. The RAT is advertised by a threat actor named o1oo1 and is focused on financial gain through credential theft. It is delivered through ClickFix campaigns using Hijack Loader and includes HVNC remote control, browser profile cloning, and cryptocurrency artifact identification or extraction.\u003c/p\u003e\n\n\u003ch2 id=\"state-sponsored-and-geopolitical-activity\"\u003eState-Sponsored and Geopolitical Activity\u003c/h2\u003e\n\n\u003cp\u003eCrowdStrike reported that the North Korean actor Famous Chollima accounted for 47% of all state-sponsored hands-on-keyboard operations against the technology sector between April 2025 and March 2026. The article says Famous Chollima is tied to long-running IT worker infiltration and Contagious Interview campaigns. In those campaigns, the group sought fraudulent employment at technology companies across North America, Europe, and Asia.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Department of Justice announced the seizure of 13 domains that allegedly masqueraded as consulting companies and were used to target U.S. persons, including current and former security clearance holders. The domains advertised generic consulting or analyst jobs on platforms including Upwork, Expertia AI, Hubstaff Talent, Wellfound, and Post Job Free. Recruiters allegedly pressured candidates to provide confidential information and reports from insider sources in exchange for cryptocurrency payments.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the Chinese Embassy in Washington condemned the allegations and called them fabricated. It also links the case to a Five Eyes warning that China has aggressively used job platforms to target people for information.\u003c/p\u003e\n\n\u003ch2 id=\"supply-chain-and-developer-ecosystem-risks\"\u003eSupply Chain and Developer Ecosystem Risks\u003c/h2\u003e\n\n\u003cp\u003eSafeDep reported that the Miasma credential-stealing framework was briefly made available for free on GitHub after multiple repositories named “Miasma-Open-Source-Release” appeared beginning June 8, 2026. The article says the source code was published through compromised developer accounts. SafeDep described Miasma as larger than a supply chain worm and as a full supply chain attack toolkit.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Miasma can execute attacks through stolen credentials against arbitrary or targeted packages on public registries such as PyPI, npm, and RubyGems. It can also target JFrog Artifactory, GitHub repositories, GitHub Actions, AI coding tool configuration poisoning, SSH-based lateral movement, and other attack vectors.\u003c/p\u003e\n\n\u003cp\u003eMiasma does not rely on conventional command-and-control infrastructure. Instead, it uses three independent C2 channels through GitHub commit search, each with a different search string and cryptographic key: “DontRevokeOrItGoesBoom” for attacker-controlled personal access tokens used in exfiltration, “TheBeautifulSandsOfTime” for JavaScript delivery, and “firedalazer” for Python script URLs that act as a remote code execution backdoor.\u003c/p\u003e\n\n\u003cp\u003eThe article says Miasma is assessed to be a variant of the Shai-Hulud worm. The campaign has since evolved into a Python variant named Hades. As of the prior week, 304 components had been affected by Miasma.\u003c/p\u003e\n\n\u003cp\u003eTenable described a technique called download pumping, where attackers artificially inflate npm package download counts to make malicious packages appear legitimate. The technique was observed in the package “ambar-src,” which reached more than 50,000 downloads in three days after attackers published hundreds of benign versions before introducing a malicious payload. Automated systems such as repository mirrors and analysis bots downloaded each new version, inflating the count.\u003c/p\u003e\n\n\u003cp\u003eIru analyzed SStar Agent, a cross-platform RAT for Windows and macOS delivered through a poisoned npm package named “tw-style-utils.” The lure was a bogus Web3 engineering take-home assessment in a GitHub repository named “star45674/smart-contract-engineer-role.” The repository itself was clean, while the payload was in the npm dependency, and the activity overlapped with previously observed North Korean social engineering attacks.\u003c/p\u003e\n\n\u003cp\u003eCyderes reported that the supply chain attack targeting CPUID to deliver STX RAT was broader than previously known. The analysis found seven additional trojanized packages tied to the same campaign. The actor, using the alias Leda Elacoate and an email address at firemail.cc, maintained a Bitbucket repository of trojanized installers for about one month, including packages such as X-VPN, although users who installed X-VPN from official channels were not affected.\u003c/p\u003e\n\n\u003ch2 id=\"ai-agent-and-ai-adjacent-security-issues\"\u003eAI Agent and AI-Adjacent Security Issues\u003c/h2\u003e\n\n\u003cp\u003eVaronis conducted four ph
