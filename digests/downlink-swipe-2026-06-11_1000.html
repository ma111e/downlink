about 3,000 accounts, despite accessing millions of accounts, and that the data was deleted from all devices and not transferred to others. Coupang previously announced plans to pay 1.685 trillion won, about $1.17 billion, and distribute single-use purchase vouchers of 50,000 won per customer to compensate over 33 million affected customers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission imposed a record 624.6 billion won fine, roughly $409 million, on e-commerce giant Coupang after a large-scale data breach. The regulator said personal information belonging to about 37.55 million people was leaked. Coupang Fulfillment Service was also fined 248 million won for unlawfully collecting, using, and handling customers’ personal and sensitive data.\u003c/p\u003e\n\n\u003cp\u003ePIPC attributed the breach to inadequate security practices and an insufficient basic safety management system. The regulator specifically cited negligence in authentication signature key management and failures in access control. It also imposed a 16.8 million won fine, along with corrective orders, announcements, and publication orders.\u003c/p\u003e\n\n\u003cp\u003eThe regulator’s findings went beyond the technical controls involved in the leak. PIPC cited violations of data destruction and leak-notification requirements, interference with the independence of Coupang’s data protection officer, and obstruction of the investigation. The article describes the incident as one of the worst data breaches in South Korea’s history.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred in late June but was only discovered in mid-November. Coupang warned at that time that 33.7 million accounts had been compromised, while investigators later put the number of affected people at approximately 37.55 million. Coupang is described as an American online retail company operating in South Korea, employing 95,000 people, and reporting annual revenue above $30 billion.\u003c/p\u003e\n\n\u003cp\u003eSouth Korean authorities took over the investigation and identified the primary suspect as a 43-year-old Chinese national who worked in Coupang’s IT department from 2022 to 2024. Coupang later said the former employee returned multiple hard drives containing sensitive data. The company also said the suspect discarded a MacBook Air laptop in a river to destroy evidence, but the device was recovered.\u003c/p\u003e\n\n\u003cp\u003eCoupang said the suspect retained user data for approximately 3,000 accounts, even though they accessed millions of accounts. The company said that data was deleted from all devices and not transferred to others. Coupang also announced plans to pay 1.685 trillion won, approximately $1.17 billion, and distribute single-use purchase vouchers worth 50,000 won per customer to compensate more than 33 million affected customers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eSouth Korea’s Personal Information Protection Commission fined Coupang a record 624.6 billion won, roughly $409 million, after a massive data breach. The regulator said the personal information of approximately 37.55 million people was leaked. The article describes the incident as one of the worst data breaches in South Korea’s history.\u003c/p\u003e\n\n\u003cp\u003eCoupang Fulfillment Service, a subsidiary of Coupang, was also fined 248 million won. PIPC said the subsidiary unlawfully collected, used, and handled customers’ personal and sensitive data. Coupang itself was also fined 16.8 million won in connection with violations described by the regulator.\u003c/p\u003e\n\n\u003ch2 id=\"regulator-findings\"\u003eRegulator findings\u003c/h2\u003e\n\n\u003cp\u003ePIPC said the breach stemmed from inadequate security practices and an insufficient basic safety management system. The regulator specifically cited negligence in authentication signature key management and access control failures. These issues were identified as contributing factors in the leak of personal information belonging to approximately 37.55 million people.\u003c/p\u003e\n\n\u003cp\u003eThe regulator also cited additional compliance and governance failures. These included violations of data destruction requirements and leak-notification requirements. PIPC further cited interference with the independence of Coupang’s data protection officer and obstruction of the investigation.\u003c/p\u003e\n\n\u003cp\u003eAs part of its enforcement action, PIPC imposed fines and ordered corrective measures. The regulator also issued announcement and publication orders. PIPC stated that the fine was tied to Coupang’s violation of safety measure obligations and collection of personal information without a legal basis.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-scale\"\u003eTimeline and scale\u003c/h2\u003e\n\n\u003cp\u003eThe breach occurred in late June. It was discovered only in mid-November, when Coupang warned that 33.7 million accounts had been compromised. Investigators later found that personal information for approximately 37.55 million people had been leaked.\u003c/p\u003e\n\n\u003cp\u003eCoupang is described in the article as an American online retail company operating in the South Korean market. The company employs 95,000 people and has reported annual revenue exceeding $30 billion. The number of affected people makes the breach one of South Korea’s most significant data exposure incidents described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"suspected-actor-and-evidence-described\"\u003eSuspected actor and evidence described\u003c/h2\u003e\n\n\u003cp\u003eSouth Korean authorities took over the investigation. According to those authorities, the primary suspect is a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024. The article says the person was a former employee who retained system access.\u003c/p\u003e\n\n\u003cp\u003eCoupang later said the former employee returned multiple hard drives containing sensitive data. The company also said the suspect disposed of a MacBook Air laptop in a river in an attempt to destroy evidence. The device was recovered.\u003c/p\u003e\n\n\u003cp\u003eCoupang said the suspect retained user data for approximately 3,000 accounts, even though they accessed millions of accounts. The company also said the retained data was deleted from all devices and was not transferred to others.\u003c/p\u003e\n\n\u003ch2 id=\"customer-compensation-and-response\"\u003eCustomer compensation and response\u003c/h2\u003e\n\n\u003cp\u003eCoupang announced plans in late December to pay 1.685 trillion won, approximately \u003cspan class=\"math inline\"\u003e\\(1.17 billion. The company also planned to begin distributing single-use purchase vouchers in January 2026. The vouchers total 50,000 won, about \\)\u003c/span\u003e34, per customer.\u003c/p\u003e\n\n\u003cp\u003eThe announced compensation was intended for more than 33 million affected customers. This customer compensation plan is separate from the regulatory fine imposed by PIPC. The article states that the compensation would be distributed as single-use purchase vouchers.\u003c/p\u003e\n\n\u003ch2 id=\"other-south-korean-telecom-incident-mentioned\"\u003eOther South Korean telecom incident mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also references a separate incident involving SK Telecom, South Korea’s largest mobile network operator. SK Telecom warned customers in April that sensitive USIM data had been exposed after its network was infected with malware. The company later said the malware was first deployed on its systems in June 2022.\u003c/p\u003e\n\n\u003cp\u003eSK Telecom said the malware incident affected 27 million subscribers. The article describes that number as representing almost the company’s entire customer base. This separate case is included as another significant South Korean data exposure incident mentioned alongside the Coupang breach.\u003c/p\u003e\n\n\u003ch2 id=\"key-facts\"\u003eKey facts\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePIPC fined Coupang 624.6 billion won, or roughly $409 million.\u003c/li\u003e\n\u003cli\u003eCoupang Fulfillment Service was separately fined 248 million won.\u003c/li\u003e\n\u003cli\u003eApproximately 37.55 million people had personal information leaked.\u003c/li\u003e\n\u003cli\u003eThe regulator cited authentication signature key management negligence and access control failures.\u003c/li\u003e\n\u003cli\u003ePIPC also cited data destruction, leak-notification, data protection officer independence, and investigation obstruction issues.\u003c/li\u003e\n\u003cli\u003eThe breach occurred in late June and was discovered in mid-November.\u003c/li\u003e\n\u003cli\u003eSouth Korean authorities identified a 43-year-old former Coupang IT employee from China as the primary suspect.\u003c/li\u003e\n\u003cli\u003eCoupang said the suspect retained data for about 3,000 accounts despite accessing millions of accounts.\u003c/li\u003e\n\u003cli\u003eCoupang announced plans to pay 1.685 trillion won, about $1.17 billion, and distribute 50,000 won vouchers to affected customers.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["South Korea’s Personal Information Protection Commission fined Coupang 624.6 billion won, roughly $409 million, after a data breach affecting about 37.55 million people.","The regulator said the leak resulted from inadequate security practices, including negligence in authentication signature key management and access controls.","Coupang Fulfillment Service was separately fined 248 million won for unlawfully collecting, using, and handling customers’ personal and sensitive data.","PIPC also cited violations involving data destruction, breach notification requirements, interference with the independence of Coupang’s data protection officer, and obstruction of the investigation.","South Korean authorities identified the primary suspect as a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024."],"insights":["The breach reportedly occurred in late June but was not discovered until mid-November, highlighting that delayed detection can significantly expand the impact and regulatory consequences of a security incident.","The primary suspect was a former IT employee who worked at Coupang between 2022 and 2024, making retained system access after employment a central issue in the case.","Coupang’s planned customer compensation of about 1.685 trillion won is far larger than the 624.6 billion won regulatory fine, showing that direct remediation costs can exceed formal penalties.","PIPC’s findings included interference with the independence of Coupang’s data protection officer and obstruction of the investigation, indicating that post-incident governance and cooperation were part of the enforcement action."],"referencedReports":[],"body":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission fined Coupang a record 624.6 billion won, roughly $409 million, after a major data breach affecting approximately 37.55 million people. The regulator said the leak was tied to insufficient basic safety management, including negligence in authentication signature key management and access control. Coupang Fulfillment Service was also fined 248 million won for unlawfully collecting, using, and handling customers’ personal and sensitive data.\u003c/p\u003e\n\n\u003cp\u003ePIPC also cited violations involving data destruction, leak-notification requirements, interference with the independence of Coupang’s data protection officer, and obstruction of the investigation. The breach occurred in late June but was discovered only in mid-November, when Coupang warned that 33.7 million accounts had been compromised. South Korean authorities identified the primary suspect as a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024.\u003c/p\u003e\n\n\u003cp\u003eCoupang said the former employee returned multiple hard drives containing sensitive data and that a MacBook Air laptop discarded in a river was recovered. The company also said the suspect retained user data for about 3,000 accounts, despite accessing millions of accounts, and that the data was deleted from all devices and not transferred to others. Coupang previously announced plans to pay 1.685 trillion won, about $1.17 billion, and distribute single-use purchase vouchers of 50,000 won per customer to compensate over 33 million affected customers.\u003c/p\u003e\n"},{"n":9,"title":"From SQLi to RCE – Exploiting LangGraph’s Checkpointer","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/from-sqli-to-rce-exploiting-langgraphs-checkpointer/","time":"13:37","priority":"SHOULD READ","score":88,"tldr":"Check Point Research found that LangGraph’s SQLite and Redis checkpointers could be abused through user-controlled state-history filters, with the SQLite SQL injection chaining into unsafe msgpack deserialization for remote code execution. Self-hosted users should upgrade to the patched LangGraph checkpoint packages immediately.","briefOverview":"\u003cp\u003eCheck Point Research analyzed LangGraph, an open-source framework for stateful AI agents, and found three vulnerabilities in its persistence layer. Two of the issues can be chained into remote code execution: a SQL injection in the SQLite checkpointer, tracked as CVE-2025-67644, and an unsafe msgpack deserialization issue, tracked as CVE-2026-28277. A third issue, CVE-2026-27022, introduces the same injection class into the Redis checkpointer.\u003c/p\u003e\n\n\u003cp\u003eThe main risk applies to teams self-hosting LangGraph with the SQLite or Redis checkpointer when their application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e. LangChain’s managed cloud service, LangSmith Deployment, is not vulnerable according to the article because it runs PostgreSQL. LangChain patched the issues and users are advised to update to \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e, \u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e, and \u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe SQLite exploit chain works by injecting SQL through attacker-controlled metadata filter keys, then using a \u003ccode\u003eUNION SELECT\u003c/code\u003e to return a fake checkpoint row containing malicious serialized data. LangGraph then deserializes the attacker-controlled checkpoint with \u003ccode\u003eself.serde.loads_typed()\u003c/code\u003e. When the serialized type is msgpack, LangGraph’s custom extension handler can import a module and call a function such as \u003ccode\u003eos.system()\u003c/code\u003e with attacker-controlled input.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research published a technical analysis of vulnerabilities in LangGraph’s checkpointer persistence layer. LangGraph is described as an open-source framework for stateful, multi-agent AI systems with built-in persistence and more than 50 million monthly downloads according to PyPI stats. The research focuses on how checkpointers store execution state and what can happen when their persistence layer is exposed through unsafe filtering and deserialization paths.\u003c/p\u003e\n\n\u003cp\u003eThe first vulnerability, CVE-2025-67644, affects the SQLite checkpointer. The issue is in \u003ccode\u003e_metadata_predicate\u003c/code\u003e, where a user-controlled \u003ccode\u003equery_key\u003c/code\u003e from the \u003ccode\u003efilter\u003c/code\u003e dictionary is inserted into a SQL expression for \u003ccode\u003ejson_extract(CAST(metadata AS TEXT), '$.{query_key}')\u003c/code\u003e. Because the key is not safely bound, an attacker can include a quote character and inject arbitrary SQL into the generated query.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this SQL injection can be used to add attacker-controlled rows to the query results with a \u003ccode\u003eUNION SELECT\u003c/code\u003e. The checkpointer’s \u003ccode\u003elist()\u003c/code\u003e function selects checkpoint fields including the serialized \u003ccode\u003echeckpoint\u003c/code\u003e BLOB and then passes the result to \u003ccode\u003eself.serde.loads_typed((type, checkpoint))\u003c/code\u003e. By injecting a fake checkpoint row with a controlled serialization type and data, an attacker can force LangGraph to deserialize malicious content.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability, CVE-2026-28277, involves unsafe msgpack deserialization. LangGraph uses \u003ccode\u003eormsgpack.unpackb()\u003c/code\u003e with a custom extension hook, and the article shows that a msgpack extension using \u003ccode\u003eEXT_CONSTRUCTOR_SINGLE_ARG\u003c/code\u003e can cause the code to import a named module, retrieve a named attribute, and call it with attacker-controlled input. The example given is importing \u003ccode\u003eos\u003c/code\u003e, retrieving \u003ccode\u003esystem\u003c/code\u003e, and calling it with a command such as \u003ccode\u003eecho PWN \u0026gt; /tmp/pwned.txt\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain requires an entry point where a developer exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e, because that method calls the checkpointer’s \u003ccode\u003elist()\u003c/code\u003e method. The article states that teams self-hosting LangGraph with SQLite or Redis checkpointers are at risk under those conditions, while LangSmith Deployment is not vulnerable because it runs PostgreSQL. A third issue, CVE-2026-27022, affects the Redis checkpointer with the same class of filter-key injection and similar preconditions.\u003c/p\u003e\n\n\u003cp\u003eLangChain patched all three issues. The article says users should update to \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e, \u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e, and \u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e. The disclosure timeline says the vulnerabilities were disclosed to LangChain on 2025-11-19, with fixes released for SQLite on 2025-12-10, Redis on 2026-02-20, and msgpack deserialization on 2026-03-05.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research analyzed LangGraph’s persistence layer and uncovered three vulnerabilities in its checkpointer implementations. LangGraph is described in the article as an open-source framework for building stateful, multi-agent AI systems with built-in persistence, and as an extension of LangChain with more than 50 million monthly downloads according to PyPI stats.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities discussed are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2025-67644, a SQL injection in the SQLite checkpointer.\u003c/li\u003e\n\u003cli\u003eCVE-2026-28277, an unsafe msgpack deserialization issue.\u003c/li\u003e\n\u003cli\u003eCVE-2026-27022, a similar injection issue in the Redis checkpointer.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article’s most significant finding is that the SQLite SQL injection can be chained with the unsafe msgpack deserialization issue to achieve remote code execution.\u003c/p\u003e\n\n\u003ch2 id=\"affected-conditions\"\u003eAffected Conditions\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the affected users are teams self-hosting LangGraph with the SQLite or Redis checkpointer where the application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eLangChain’s managed cloud service, LangSmith Deployment, formerly LangGraph Platform, is described as not vulnerable because it runs PostgreSQL.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends updating to the patched versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"langgraph-checkpointers\"\u003eLangGraph Checkpointers\u003c/h2\u003e\n\n\u003cp\u003eLangGraph uses checkpointers as a persistence layer to store execution state at each step. The article explains that LangGraph supports SQLite and PostgreSQL checkpointer implementations, and it also discusses a Redis checkpointer package affected by a related issue.\u003c/p\u003e\n\n\u003cp\u003eThe SQLite checkpointer uses an internal \u003ccode\u003echeckpoints\u003c/code\u003e table. The table includes fields such as \u003ccode\u003ethread_id\u003c/code\u003e, \u003ccode\u003echeckpoint_ns\u003c/code\u003e, \u003ccode\u003echeckpoint_id\u003c/code\u003e, \u003ccode\u003eparent_checkpoint_id\u003c/code\u003e, \u003ccode\u003etype\u003c/code\u003e, \u003ccode\u003echeckpoint\u003c/code\u003e, and \u003ccode\u003emetadata\u003c/code\u003e. The \u003ccode\u003emetadata\u003c/code\u003e column stores contextual information in JSON format, such as a user ID, step number, or source.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2025-67644-sqlite-sql-injection\"\u003eCVE-2025-67644: SQLite SQL Injection\u003c/h2\u003e\n\n\u003cp\u003eThe SQLite SQL injection is located in the filtering logic used by the \u003ccode\u003elist()\u003c/code\u003e function. The function accepts a \u003ccode\u003efilter\u003c/code\u003e parameter that is used to query checkpoints based on metadata.\u003c/p\u003e\n\n\u003cp\u003eThe internal \u003ccode\u003e_metadata_predicate\u003c/code\u003e function builds SQL predicates by iterating over the filter dictionary. The vulnerable line constructs a JSON metadata query using the filter key directly inside a SQL string:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ejson_extract(CAST(metadata AS TEXT), '$.{query_key}') {operator}\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eBecause \u003ccode\u003equery_key\u003c/code\u003e is attacker-controlled when user input reaches the filter dictionary, a key containing a quote character can escape the JSON path string and inject SQL.\u003c/p\u003e\n\n\u003ch2 id=\"sql-injection-to-arbitrary-deserialization\"\u003eSQL Injection to Arbitrary Deserialization\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that the \u003ccode\u003elist()\u003c/code\u003e function queries checkpoint data from the database, including the checkpoint BLOB. The query selects fields including \u003ccode\u003ethread_id\u003c/code\u003e, \u003ccode\u003echeckpoint_ns\u003c/code\u003e, \u003ccode\u003echeckpoint_id\u003c/code\u003e, \u003ccode\u003eparent_checkpoint_id\u003c/code\u003e, \u003ccode\u003etype\u003c/code\u003e, \u003ccode\u003echeckpoint\u003c/code\u003e, and \u003ccode\u003emetadata\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe returned rows are then processed, and the serialized checkpoint data is deserialized with:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eself.serde.loads_typed((type, checkpoint))\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe SQL injection can be used to inject a \u003ccode\u003eUNION SELECT\u003c/code\u003e statement that returns a fake checkpoint row. In that injected row, the attacker controls the \u003ccode\u003etype\u003c/code\u003e and \u003ccode\u003echeckpoint\u003c/code\u003e values. The article describes this as allowing an attacker to place attacker-controlled serialized data into the result set, which is then deserialized by the application.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-28277-unsafe-msgpack-deserialization\"\u003eCVE-2026-28277: Unsafe MsgPack Deserialization\u003c/h2\u003e\n\n\u003cp\u003eThe second vulnerability involves LangGraph’s handling of msgpack data during deserialization. The \u003ccode\u003eloads_typed()\u003c/code\u003e function supports several serialization types, including \u003ccode\u003enull\u003c/code\u003e, \u003ccode\u003ebytes\u003c/code\u003e, \u003ccode\u003ebytearray\u003c/code\u003e, \u003ccode\u003ejson\u003c/code\u003e, \u003ccode\u003emsgpack\u003c/code\u003e, and optionally \u003ccode\u003epickle\u003c/code\u003e when pickle fallback is enabled.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that pickle is disabled by default. It also states that the JSON path using \u003ccode\u003ejson.loads()\u003c/code\u003e with an object hook was discussed in prior LangGrinch research, but does not lead to code execution in this case. The msgpack path is the relevant path for this exploit chain.\u003c/p\u003e\n\n\u003cp\u003eWhen the type is \u003ccode\u003emsgpack\u003c/code\u003e, LangGraph calls \u003ccode\u003eormsgpack.unpackb()\u003c/code\u003e with a custom extension hook:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eext_hook=self._unpack_ext_hook\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article shows a custom msgpack extension hook that handles \u003ccode\u003eEXT_CONSTRUCTOR_SINGLE_ARG\u003c/code\u003e. That hook unpacks data into a tuple and then executes:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003egetattr(importlib.import_module(tup[0]), tup[1])(tup[2])\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, an attacker who controls the serialized msgpack data can provide a tuple such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eos\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esystem\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eA command such as \u003ccode\u003eecho PWN \u0026gt; /tmp/pwned.txt\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis causes the code to import the \u003ccode\u003eos\u003c/code\u003e module, retrieve the \u003ccode\u003esystem\u003c/code\u003e function, and call it with the attacker-controlled command.\u003c/p\u003e\n\n\u003ch2 id=\"combined-attack-chain\"\u003eCombined Attack Chain\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the entry point as an application exposing \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e. The \u003ccode\u003eget_state_history()\u003c/code\u003e method internally calls the checkpointer’s \u003ccode\u003elist()\u003c/code\u003e method with the supplied filter.\u003c/p\u003e\n\n\u003cp\u003eThe attack flow described in the article is:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe attacker crafts a malicious msgpack payload that contains instructions to execute code.\u003c/li\u003e\n\u003cli\u003eThe attacker sends a malicious \u003ccode\u003efilter\u003c/code\u003e parameter that exploits the SQL injection.\u003c/li\u003e\n\u003cli\u003eThe SQL injection adds a fake checkpoint row to the query results, with the malicious msgpack payload in the \u003ccode\u003echeckpoint\u003c/code\u003e column.\u003c/li\u003e\n\u003cli\u003eThe application processes the query results and deserializes the injected checkpoint data.\u003c/li\u003e\n\u003cli\u003eThe unsafe msgpack extension hook executes the attacker-controlled payload, resulting in remote code execution.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"cve-2026-27022-redis-checkpointer-injection\"\u003eCVE-2026-27022: Redis Checkpointer Injection\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes a third vulnerability, CVE-2026-27022, in \u003ccode\u003elanggraph-checkpoint-redis\u003c/code\u003e. It says the same injection class affects the Redis checkpointer because user-controlled keys in the \u003ccode\u003efilter\u003c/code\u003e dictionary are interpolated directly into the query instead of being bound as parameters.\u003c/p\u003e\n\n\u003cp\u003eThe stated preconditions match CVE-2025-67644: the application must expose \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled filter and use the Redis checkpointer. The article says this issue was patched in \u003ccode\u003elanggraph-checkpoint-redis 1.0.2\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"additional-sql-injection-findings\"\u003eAdditional SQL Injection Findings\u003c/h2\u003e\n\n\u003cp\u003eBeyond the primary filter-based SQL injection, the researchers identified additional defense-in-depth SQL injection issues in both the SQLite and PostgreSQL checkpointers. These involved direct concatenation of integer values, including \u003ccode\u003eLIMIT\u003c/code\u003e and \u003ccode\u003ettl\u003c/code\u003e parameters, into SQL queries instead of using parameterized bindings.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Python does not enforce type hints at runtime, so these parameters could still accept malicious string input. Check Point Research says it worked with the LangChain team during disclosure to remediate these issues using parameterized queries.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-vendor-response\"\u003eDisclosure and Vendor Response\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following disclosure timeline:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2025-11-19: CVE-2025-67644, CVE-2026-28227, and CVE-2026-27022 were disclosed to the LangChain team.\u003c/li\u003e\n\u003cli\u003e2025-12-10: CVE-2025-67644 was fixed and publicly released in \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e2026-02-20: CVE-2026-27022 was fixed and publicly released in \u003ccode\u003elanggraph-checkpoint-redis 1.0.2\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e2026-03-05: CVE-2026-28277 was fixed and publicly released in \u003ccode\u003elanggraph-checkpoint 4.0.1\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the LangChain team responded quickly to fix the critical SQL injection vulnerability, which effectively breaks the described attack chain. It also says the team continued work on additional remediation efforts, including the msgpack deserialization issue.\u003c/p\u003e\n\n\u003ch2 id=\"additional-research-mentioned\"\u003eAdditional Research Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article states that there was significant community research into LangGraph security during November and December 2025. It also says other security researchers independently discovered CVE-2025-67644 and CVE-2026-28277, with full credits available in LangChain’s security advisories.\u003c/p\u003e\n","keyPoints":["Check Point Research analyzed LangGraph’s persistence layer and uncovered three vulnerabilities affecting its checkpointer implementations.","CVE-2025-67644 is a SQL injection in the SQLite checkpointer caused by user-controlled filter keys being interpolated into a JSON metadata query.","CVE-2026-28277 is an unsafe msgpack deserialization issue that can execute attacker-controlled code when malicious serialized checkpoint data is unpacked.","The SQLite SQL injection can be chained with the msgpack deserialization flaw to achieve remote code execution when an application exposes get_state_history() with a user-controlled filter.","LangChain patched the issues in langgraph-checkpoint-sqlite 3.0.1+, langgraph 1.0.10+, and langgraph-checkpoint-redis 1.0.2+."],"insights":["The exploit chain does not require modifying stored checkpoints because the SQL injection can inject a fake UNION SELECT row that is deserialized as if it came from the database.","The vulnerable entry point depends on application design: teams are at risk only when they self-host LangGraph with SQLite or Redis checkpointers and expose get_state_history() with a user-controlled filter.","LangChain’s managed LangSmith Deployment is not affected because it runs PostgreSQL rather than the vulnerable SQLite or Redis checkpointer paths described in the article.","The msgpack issue is dangerous even though pickle is disabled by default, because LangGraph’s custom msgpack extension hook can dynamically import a module and call a named function with attacker-controlled input.","The researchers found additional defense-in-depth SQL injection issues involving integer parameters such as LIMIT and ttl because Python type hints do not enforce runtime types."],"referencedReports":[{"title":"LangGrinch LangChain Core CVE-2025-68664","url":"https://cyata.ai/blog/langgrinch-langchain-core-cve-2025-68664/","publisher":"Cyata","context":"The article references this prior LangGrinch research when discussing LangGraph's JSON deserialization path and notes that it does not lead to code execution in this case.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point Research analyzed LangGraph, an open-source framework for stateful AI agents, and found three vulnerabilities in its persistence layer. Two of the issues can be chained into remote code execution: a SQL injection in the SQLite checkpointer, tracked as CVE-2025-67644, and an unsafe msgpack deserialization issue, tracked as CVE-2026-28277. A third issue, CVE-2026-27022, introduces the same injection class into the Redis checkpointer.\u003c/p\u003e\n\n\u003cp\u003eThe main risk applies to teams self-hosting LangGraph with the SQLite or Redis checkpointer when their application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e. LangChain’s managed cloud service, LangSmith Deployment, is not vulnerable according to the article because it runs PostgreSQL. LangChain patched the issues and users are advised to update to \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e, \u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e, and \u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe SQLite exploit chain works by injecting SQL through attacker-controlled metadata filter keys, then using a \u003ccode\u003eUNION SELECT\u003c/code\u003e to return a fake checkpoint row containing malicious serialized data. LangGraph then deserializes the attacker-controlled checkpoint with \u003ccode\u003eself.serde.loads_typed()\u003c/code\u003e. When the serialized type is msgpack, LangGraph’s custom extension handler can import a module and call a function such as \u003ccode\u003eos.system()\u003c/code\u003e with attacker-controlled input.\u003c/p\u003e\n"},{"n":1,"title":"CISA tells govt agencies to patch critical exploited flaws in 3 days","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-tells-govt-agencies-to-patch-critical-exploited-flaws-in-3-days/","time":"12:46","priority":"SHOULD READ","score":82,"tldr":"CISA issued Binding Operational Directive 26-04 requiring U.S. federal civilian agencies to prioritize and patch high-risk vulnerabilities faster, with actively exploited critical flaws on exposed systems due in as little as three days. Agencies must update vulnerability management processes and fully adopt the new timelines within 180 days.","briefOverview":"\u003cp\u003eCISA announced Binding Operational Directive 26-04, a new requirement that prioritizes security updates for U.S. Federal Civilian Executive Branch agencies. The directive is intended to reduce cyberattack risk against the public sector by requiring accelerated remediation of high-risk vulnerabilities. In some cases, agencies must address vulnerabilities within as little as three days.\u003c/p\u003e\n\n\u003cp\u003eThe remediation priority is based on four factors: whether an asset is publicly exposed online, whether the vulnerability is listed in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated at scale, and whether exploitation gives attackers partial or total control of a system. Less urgent cases, such as those where automated exploitation is not possible or only partial control is possible, have a two-week remediation timeframe. CISA says the new directive supersedes and revokes BOD 19-02 and BOD 22-01.\u003c/p\u003e\n\n\u003cp\u003eThe directive applies to FCEB agencies and the information systems they operate, including on-premise systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments. It does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors. Agencies must update vulnerability management policies, update asset inventories, automate KEV status reporting, and fully follow the new remediation timelines within 180 days.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA announced Binding Operational Directive 26-04 to prioritize security updates for Federal Civilian Executive Branch agencies. The directive is aimed at reducing the threat of cyberattacks targeting the public sector. It requires agencies to remediate high-risk vulnerabilities within accelerated timeframes, with the shortest deadline being three days.\u003c/p\u003e\n\n\u003cp\u003eCISA says the new directive supersedes and revokes BOD 19-02 and BOD 22-01, which were introduced in 2019 and 2021. The article states that the framework is expected to influence the broader cybersecurity industry and provide a broader patching priority signal. The directive establishes remediation urgency based on specific vulnerability and asset characteristics.\u003c/p\u003e\n\n\u003cp\u003eThe prioritization model uses four key considerations. These are whether the asset is publicly exposed online, whether the vulnerability appears in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated for large-scale attacks, and whether exploitation gives attackers partial or total control of a system. Depending on these factors, agencies receive remediation deadlines, with less urgent cases set at two weeks.\u003c/p\u003e\n\n\u003cp\u003eThe directive applies specifically to U.S. Federal Civilian Executive Branch agencies and the information systems they operate. It covers all on-premise federal systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments. The article states that it does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors.\u003c/p\u003e\n\n\u003cp\u003eAgencies covered by BOD 26-04 are expected to update their vulnerability management policies, update asset inventories, and automate KEV status reporting. Within 60 days, their vulnerability management processes must use CVE and KEV data as the basis for remediation decisions. Within 180 days, agencies must follow the new remediation timelines and continuously monitor and report detailed asset metadata.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA announced a new Binding Operational Directive, BOD 26-04, focused on prioritizing security updates for U.S. Federal Civilian Executive Branch agencies. The directive is intended to reduce the threat of cyberattacks targeting the public sector by requiring agencies to remediate high-risk vulnerabilities faster. In the most urgent cases, covered agencies may have as little as three days to address a vulnerability.\u003c/p\u003e\n\n\u003cp\u003eCISA says BOD 26-04 supersedes and revokes two older directives: BOD 19-02, introduced in 2019, and BOD 22-01, introduced in 2021. The article presents the directive as a new federal vulnerability remediation framework with accelerated timelines based on risk factors.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-prioritization-criteria\"\u003eRemediation Prioritization Criteria\u003c/h2\u003e\n\n\u003cp\u003eCISA’s prioritization model is based on four key considerations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the affected asset is publicly exposed online.\u003c/li\u003e\n\u003cli\u003eWhether the vulnerability is listed in CISA’s Known Exploited Vulnerabilities catalog.\u003c/li\u003e\n\u003cli\u003eWhether exploitation can be automated for large-scale attacks.\u003c/li\u003e\n\u003cli\u003eWhether exploitation gives attackers partial or total control of a system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese factors determine how quickly agencies must remediate a vulnerability. The shortest remediation period is three days. For less urgent situations, such as cases where automated exploitation is not possible or exploitation only provides partial control, the timeframe is two weeks.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-directive\"\u003eScope of the Directive\u003c/h2\u003e\n\n\u003cp\u003eThe directive applies to U.S. Federal Civilian Executive Branch agencies and the information systems they operate. The article states that this includes government agencies and departments within that scope.\u003c/p\u003e\n\n\u003cp\u003eThe directive applies across multiple environments, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-premise federal systems.\u003c/li\u003e\n\u003cli\u003eThird-party hosted systems.\u003c/li\u003e\n\u003cli\u003eFedRAMP cloud environments.\u003c/li\u003e\n\u003cli\u003eNon-FedRAMP cloud environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also identifies several exclusions. BOD 26-04 does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors.\u003c/p\u003e\n\n\u003ch2 id=\"implementation-requirements\"\u003eImplementation Requirements\u003c/h2\u003e\n\n\u003cp\u003eAgencies bound by BOD 26-04 are expected to update their vulnerability management policies. They must also update their asset inventories and automate Known Exploited Vulnerabilities status reporting.\u003c/p\u003e\n\n\u003cp\u003eThe directive sets staged implementation requirements. Within 60 days, agencies must update vulnerability management processes to use CVE and KEV data as the basis for remediation decisions. Within 180 days, agencies must follow the new remediation timelines and continuously monitor and report detailed asset metadata.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-expected-influence\"\u003eSignificance and Expected Influence\u003c/h2\u003e\n\n\u003cp\u003eThe directive is specifically binding on Federal Civilian Executive Branch agencies, but the article states that, like previous directives, the framework is expected to influence the broader cybersecurity industry. It is also expected to provide a broader patching priority signal.\u003c/p\u003e\n\n\u003cp\u003eThe key impact is that covered agencies must move from general vulnerability handling toward faster, risk-prioritized remediation based on exposure, known exploitation, exploit automation potential, and attacker control level. The most urgent vulnerabilities must be remediated within three days, while less urgent situations receive a two-week timeframe.\u003c/p\u003e\n","keyPoints":["CISA announced Binding Operational Directive 26-04 to prioritize security updates for U.S. Federal Civilian Executive Branch agencies.","The directive requires agencies to remediate high-risk vulnerabilities within accelerated timeframes, with the shortest deadline being three days.","CISA says remediation priority is based on whether an asset is publicly exposed, whether the vulnerability is in the Known Exploited Vulnerabilities catalog, whether exploitation can be automated, and whether exploitation gives attackers partial or total control of a system.","The directive applies to all on-premise federal systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments operated by covered agencies.","Within 180 days, covered agencies must follow the new remediation timelines and continuously monitor and report detailed asset metadata."],"insights":["The shortest three-day remediation window is tied to a combination of factors, including public exposure, KEV status, automated exploitability, and the degree of system control gained by attackers.","The directive explicitly extends beyond traditional on-premise systems to third-party hosted systems and both FedRAMP and non-FedRAMP cloud environments, making cloud asset visibility part of compliance.","Agencies have only 60 days to update vulnerability management processes so that CVE and KEV data drive remediation decisions.","The new directive replaces earlier CISA binding directives from 2019 and 2021, consolidating federal vulnerability remediation requirements under a newer risk-prioritized framework."],"referencedReports":[],"body":"\u003cp\u003eCISA announced Binding Operational Directive 26-04, a new requirement that prioritizes security updates for U.S. Federal Civilian Executive Branch agencies. The directive is intended to reduce cyberattack risk against the public sector by requiring accelerated remediation of high-risk vulnerabilities. In some cases, agencies must address vulnerabilities within as little as three days.\u003c/p\u003e\n\n\u003cp\u003eThe remediation priority is based on four factors: whether an asset is publicly exposed online, whether the vulnerability is listed in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated at scale, and whether exploitation gives attackers partial or total control of a system. Less urgent cases, such as those where automated exploitation is not possible or only partial control is possible, have a two-week remediation timeframe. CISA says the new directive supersedes and revokes BOD 19-02 and BOD 22-01.\u003c/p\u003e\n\n\u003cp\u003eThe directive applies to FCEB agencies and the information systems they operate, including on-premise systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments. It does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors. Agencies must update vulnerability management policies, update asset inventories, automate KEV status reporting, and fully follow the new remediation timelines within 180 days.\u003c/p\u003e\n"},{"n":3,"title":"University of Nottingham confirms cyber incident as Shiny Hunters group claims data theft","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/university-of-nottingham-cyber-incident-shiny-hunters","time":"13:53","priority":"SHOULD READ","score":82,"tldr":"The University of Nottingham confirmed a cyber incident in which a significant amount of current and former student data was accessed, while ShinyHunters claims it stole over 40GB of material. Exposed data may include contact details, academic and fee information, financial details, national insurance numbers, passport numbers, and protected characteristics.","briefOverview":"\u003cp\u003eThe University of Nottingham in England confirmed a cyber incident in which a “significant amount” of data affecting current and former students was accessed by an external third party. The university said it is still working to determine what data was accessed and has already directly contacted affected students and alumni. Potentially affected individuals may include those connected to its campuses in Nottingham, Malaysia, and China.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters cybercrime group claimed responsibility on its extortion site and said it obtained “over 40GB” of material, including credit card and payment details. HaveIBeenPwned analyzed partially published data and said it includes around 455,000 unique email addresses, along with extensive personal information. The university is working with a third party on a forensic investigation to verify the exact scope of the accessed data.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe University of Nottingham confirmed Wednesday that it experienced a cyber incident involving a “significant amount” of data. The university said the data affected both current and former students and had been accessed by an external third party. It is still working to understand what data was accessed and said it has directly contacted affected students and alumni.\u003c/p\u003e\n\n\u003cp\u003eThe incident may affect individuals associated with the university’s campuses in Nottingham, Malaysia, and China. In an email to students seen by Recorded Future News, the university said it is operating on the precautionary assumption that several categories of data may have been accessed. These include contact information, university-related details, financial information where stored within the system, and personal information.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters cybercrime group claimed the breach on its extortion site. The group said it had obtained “over 40GB” of material, including credit card and payment details. The article notes that ShinyHunters has previously been known to misrepresent its access in extortion attempts.\u003c/p\u003e\n\n\u003cp\u003eHaveIBeenPwned analyzed the group’s partially published data. It said the data includes around 455,000 unique email addresses and extensive personal information, including names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrollment information, and fee payment information.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham said it is working with a third party on a forensic investigation into the incident. The university said the investigation is intended to verify the exact scope of the data accessed. It also said it would provide further updates as details are confirmed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe University of Nottingham in England confirmed a cyber incident involving data belonging to current and former students. The university said a “significant amount” of data had been accessed by an external third party. It is still working to understand exactly what data was accessed.\u003c/p\u003e\n\n\u003cp\u003eThe university said it has already directly contacted affected students and alumni. The potentially affected population may include individuals connected to its campuses in Nottingham, Malaysia, and China.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-actor-and-data-theft-allegation\"\u003eClaimed actor and data theft allegation\u003c/h2\u003e\n\n\u003cp\u003eThe breach has been claimed by the ShinyHunters cybercrime group. The group posted the claim on its extortion site and said it had obtained “over 40GB” of material. According to the article, ShinyHunters claimed the material included credit card and payment details.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that ShinyHunters has previously been known to misrepresent its access in extortion attempts. Examples cited include the group using historical datasets or obtaining public-domain information and claiming it was captured from internal systems.\u003c/p\u003e\n\n\u003ch2 id=\"reported-contents-of-exposed-data\"\u003eReported contents of exposed data\u003c/h2\u003e\n\n\u003cp\u003eHaveIBeenPwned analyzed the group’s partially published data. According to that analysis, the data includes around 455,000 unique email addresses. The data also reportedly includes extensive personal information.\u003c/p\u003e\n\n\u003cp\u003eThe types of information identified by HaveIBeenPwned include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames\u003c/li\u003e\n\u003cli\u003eAddresses\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003eEthnicities\u003c/li\u003e\n\u003cli\u003eDisabilities\u003c/li\u003e\n\u003cli\u003ePassport numbers\u003c/li\u003e\n\u003cli\u003eInformation relating to academic enrollments\u003c/li\u003e\n\u003cli\u003eInformation relating to fee payments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"university-notification-to-students\"\u003eUniversity notification to students\u003c/h2\u003e\n\n\u003cp\u003eIn an email to students seen by Recorded Future News, the University of Nottingham said it is operating on the precautionary assumption that several categories of data may have been accessed. The university listed contact information, including names, email addresses, and postal addresses. It also listed university-related details such as course information and student or staff IDs.\u003c/p\u003e\n\n\u003cp\u003eThe university’s email also included financial information where stored within the system. It further included personal information such as national insurance numbers and protected characteristics.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-investigation\"\u003eResponse and investigation\u003c/h2\u003e\n\n\u003cp\u003eThe University of Nottingham said it is working with a third party on a forensic investigation into the incident. The stated purpose of the investigation is to verify the exact scope of the data accessed. The university said it would provide further updates as its investigation confirms details.\u003c/p\u003e\n\n\u003cp\u003eAt the time described in the article, the university had not yet confirmed the exact scope of the accessed data. It had, however, publicly confirmed that data had been accessed by an external third party and had contacted affected students and alumni directly.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact-described-in-the-article\"\u003eKey impact described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe incident involves a large university population and potentially sensitive personal, academic, and financial information. The article identifies both current and former students as affected groups. It also indicates that affected students and alumni may include people associated with campuses in England, Malaysia, and China.\u003c/p\u003e\n\n\u003cp\u003eThe most specific external assessment cited in the article is HaveIBeenPwned’s analysis of partially published data. That analysis identified about 455,000 unique email addresses and multiple categories of personal and academic information.\u003c/p\u003e\n","keyPoints":["The University of Nottingham confirmed a cyber incident in which a significant amount of data affecting current and former students was accessed by an external third party.","The university said it is still determining what data was accessed and has directly contacted affected students and alumni, potentially including those in Nottingham, Malaysia, and China.","The ShinyHunters cybercrime group claimed on its extortion site that it obtained over 40GB of material, including credit card and payment details.","HaveIBeenPwned analysis of partially published data found about 455,000 unique email addresses along with personal information such as names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrolment information, and fee payment information.","The university said it is working with a third party on a forensic investigation to verify the exact scope of the data accessed."],"insights":["HaveIBeenPwned’s analysis of the partially published data provides an independent indicator that the incident involves large-scale exposure of sensitive personal information, even though the university has not yet verified the exact scope.","The university is treating multiple sensitive categories as potentially accessed on a precautionary basis, including national insurance numbers, protected characteristics, financial information, and student or staff IDs, which suggests affected individuals may need to monitor more than just email account misuse.","ShinyHunters’ claim of obtaining credit card and payment details should be treated cautiously because the article notes the group has previously misrepresented access by using historical datasets or public-domain information.","The incident may extend beyond the university’s Nottingham campus because the university said affected students and alumni could include people from its Malaysia and China campuses."],"referencedReports":[{"title":"University of Nottingham","url":"https://haveibeenpwned.com/Breach/UniversityOfNottingham","publisher":"Have I Been Pwned","context":"The article cites Have I Been Pwned’s analysis of partially published data from the claimed breach, including the number of unique email addresses and types of personal information exposed.","category":"","primary":false}],"body":"\u003cp\u003eThe University of Nottingham in England confirmed a cyber incident in which a “significant amount” of data affecting current and former students was accessed by an external third party. The university said it is still working to determine what data was accessed and has already directly contacted affected students and alumni. Potentially affected individuals may include those connected to its campuses in Nottingham, Malaysia, and China.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters cybercrime group claimed responsibility on its extortion site and said it obtained “over 40GB” of material, including credit card and payment details. HaveIBeenPwned analyzed partially published data and said it includes around 455,000 unique email addresses, along with extensive personal information. The university is working with a third party on a forensic investigation to verify the exact scope of the accessed data.\u003c/p\u003e\n"},{"n":7,"title":"The Geek Squad Invoice That Forgot Which Brand It Was Pretending to Be","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/geek-squad-toad-callback-image-invoice-brand-mismatch","time":"11:00","priority":"MAY READ","score":72,"tldr":"Attackers sent a blank email with a JPEG-only fake Geek Squad renewal invoice to lure recipients into calling a scam number, bypassing defenses that rely on links, text, or executable attachments. OCR exposed a reused phishing template with a Windows Defender footer, while detection relied on image analysis and behavioral signals.","briefOverview":"\u003cp\u003eA community healthcare organization received a callback phishing email with an empty subject line, no body text, and a single JPEG attachment. The image contained a fabricated Geek Squad renewal invoice for $270, a 24-hour cancellation deadline, and the callback number 828-424-4048. The article describes the attack as a Telephone-Oriented Attack Delivery campaign because the recipient was pushed to call rather than click a link.\u003c/p\u003e\n\n\u003cp\u003eThe attack was significant because the entire payload existed inside an image, leaving no URLs, executable attachments, or scannable body text for many defenses to analyze. OCR revealed a notable template error: the invoice header used Geek Squad branding, while the footer read “Copyright 2026 Windows Defender.” The article says this brand mismatch indicates a recycled template from another campaign.\u003c/p\u003e\n\n\u003cp\u003eThe message was sent from stubin1178@hotmail.com with the display name “Raymond Herman” and relayed through a FortiMail cloud gateway at 148.230.56.132. SPF failed at the final hop because the relay was not included in Hotmail’s SPF record, while DKIM and DMARC passed through Hotmail. Themis flagged the email at 90% confidence as a vishing and image-based attack using image analysis and behavioral signals.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a callback phishing email delivered to a community healthcare organization. The message had no subject line, no body text, and only one attachment: a JPEG named 34GE1RIEDYLJ.jpg. That image contained a fake Geek Squad renewal invoice for $270 and urged the recipient to call within 24 hours if they did not authorize the transaction.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the technique as Telephone-Oriented Attack Delivery, or TOAD. There were no links for scanners to evaluate, no executable attachments for sandboxes to detonate, and no text-based indicators in the email body for NLP engines to parse. Because the phishing content was embedded in pixel data, detection depended on image analysis or OCR.\u003c/p\u003e\n\n\u003cp\u003eOCR extraction showed a “Renewal Confirmation” header with Geek Squad branding, an invoice number of ET QW-728834-Z82803-ODVJVZ dated May 22, 2026, and a line item for “Advanced Protection Plan 2/7” priced at $270.00. The callback number displayed in the invoice was 828-424-4048. The invoice also contained an urgency message stating that the recipient had 24 hours to initiate a cancellation if the transaction was unauthorized.\u003c/p\u003e\n\n\u003cp\u003eA key flaw in the phishing image was a brand mismatch. The header presented the invoice as Geek Squad, but the footer stated “Copyright 2026 Windows Defender.” The article says this showed a template management failure and suggested the attacker recycled an invoice template from a Windows Defender campaign.\u003c/p\u003e\n\n\u003cp\u003eThe email was sent from stubin1178@hotmail.com using the display name “Raymond Herman” and passed through a FortiMail cloud relay at 148.230.56.132. SPF failed at the final hop because the FortiMail relay was not included in Hotmail’s SPF record, but DKIM passed with d=hotmail.com and DMARC passed. Microsoft assigned SCL=5 with a CAT=PHISH designation.\u003c/p\u003e\n\n\u003cp\u003eThemis flagged the message at 90% confidence with labels including “Vishing Attack,” “Image-Based Attack,” and “VIP Recipient.” The article says the detection was based on a convergence of behavioral signals, including a first-time sender, an empty subject line, an image-only payload matching known TOAD invoice patterns, and a high-value recipient at a healthcare organization. The MITRE ATT\u0026amp;CK mapping listed T1566.001, T1204.002, and T1036.005.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes a callback phishing email sent to a community healthcare organization. The email had an empty subject line, no body text, and a single JPEG attachment named \u003ccode\u003e34GE1RIEDYLJ.jpg\u003c/code\u003e. The image contained a fabricated Geek Squad renewal invoice for $270.00 and a phone number for the recipient to call.\u003c/p\u003e\n\n\u003cp\u003eThe article classifies the incident as a high-severity callback phishing and brand impersonation attack. It specifically describes the technique as Telephone-Oriented Attack Delivery, or TOAD, because the goal was to get the recipient to call a phone number rather than click a link or open executable content.\u003c/p\u003e\n\n\u003ch2 id=\"email-and-attachment-details\"\u003eEmail and Attachment Details\u003c/h2\u003e\n\n\u003cp\u003eThe entire phishing payload was contained in the JPEG attachment, which was 269,275 bytes. The email itself contained no body text and no URLs. The article emphasizes that there were no links for link scanners to evaluate, no executable files for sandboxes to detonate, and no text-based indicators in the message body for NLP engines to parse.\u003c/p\u003e\n\n\u003cp\u003eOCR extraction from the image revealed the contents of the fake invoice. It included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA “Renewal Confirmation” header.\u003c/li\u003e\n\u003cli\u003eGeek Squad branding.\u003c/li\u003e\n\u003cli\u003eInvoice number \u003ccode\u003eET QW-728834-Z82803-ODVJVZ\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA date of May 22, 2026.\u003c/li\u003e\n\u003cli\u003eA line item for “Advanced Protection Plan \u003csup\u003e2\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e.”\u003c/li\u003e\n\u003cli\u003eA charge of \u003ccode\u003e$270.00\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA help desk or callback number: \u003ccode\u003e828-424-4048\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe message used urgency to push the recipient toward action. It stated that if the recipient did not authorize the transaction, they had 24 hours to initiate a cancellation. The article notes that the recipient did not need to believe they had subscribed, but only needed to feel uncertain enough to call.\u003c/p\u003e\n\n\u003ch2 id=\"image-only-toad-technique\"\u003eImage-Only TOAD Technique\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights the image-only format as the central technical feature of the attack. Because the malicious content appeared only as pixels inside a JPEG, detection required OCR or image analysis. The article says that if an email security stack cannot perform OCR on image attachments, callback phishing with image payloads will consistently bypass detection.\u003c/p\u003e\n\n\u003cp\u003eThis approach reduced the usefulness of several common detection mechanisms described in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eURL scanners had no URLs to evaluate.\u003c/li\u003e\n\u003cli\u003eSandboxes had no executable content to detonate.\u003c/li\u003e\n\u003cli\u003eText-based NLP engines had no email body text to parse.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"brand-mismatch-and-template-reuse\"\u003eBrand Mismatch and Template Reuse\u003c/h2\u003e\n\n\u003cp\u003eOCR analysis revealed a notable inconsistency in the invoice image. The header displayed Geek Squad branding, while the footer read “Copyright 2026 Windows Defender.” The article describes this as a template management failure rather than a sophisticated evasion method.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the mismatch indicates that the attacker reused an invoice template from a Windows Defender campaign and failed to update the footer. It frames this kind of brand mismatch as a reliable indicator of industrialized phishing operations that run multiple campaigns from a shared template library.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-and-infrastructure\"\u003eAuthentication and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe sender was listed as \u003ccode\u003estubin1178@hotmail.com\u003c/code\u003e, with the display name “Raymond Herman.” The email was relayed through a FortiMail cloud gateway, with the relay IP identified as \u003ccode\u003e148.230.56.132\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that SPF failed at the final hop because the FortiMail relay was not included in Hotmail’s SPF record. However, DKIM passed with \u003ccode\u003ed=hotmail.com\u003c/code\u003e, and DMARC also passed. Microsoft assigned the message an SCL value of 5 and a CAT=PHISH designation.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the FortiMail relay introduced the SPF failure, but that the original authentication chain was valid. It describes this as a common pattern when organizational gateways relay inbound mail, because the additional hop can break SPF alignment even when the original sender’s infrastructure is properly configured.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis flagged the message at 90% confidence. The labels included “Vishing Attack,” “Image-Based Attack,” and “VIP Recipient.” The article says the detection did not depend on a malicious URL or a known-bad sender.\u003c/p\u003e\n\n\u003cp\u003eInstead, the detection was based on a convergence of behavioral signals. These included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA first-time sender.\u003c/li\u003e\n\u003cli\u003eAn empty subject line.\u003c/li\u003e\n\u003cli\u003eAn image-only payload matching known TOAD invoice patterns.\u003c/li\u003e\n\u003cli\u003eA high-value recipient at a healthcare organization.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents OCR and image analysis as essential for detecting this kind of campaign, because the phishing content existed entirely inside the attached image.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.001\u003c/code\u003e — Phishing: Spearphishing Attachment, because the image attachment served as the delivery mechanism.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1204.002\u003c/code\u003e — User Execution: Malicious File, because the victim needed to view the image and call the phone number.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1036.005\u003c/code\u003e — Masquerading: Match Legitimate Name or Location, because the invoice impersonated the Geek Squad brand while reusing a Windows Defender-themed template.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: \u003ccode\u003estubin1178@hotmail.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDisplay name: “Raymond Herman.”\u003c/li\u003e\n\u003cli\u003eFortiMail relay pattern: \u003ccode\u003e*.fortimailcloud.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRelay IP: \u003ccode\u003e148.230.56.132\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAttachment: \u003ccode\u003e34GE1RIEDYLJ.jpg\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAttachment size: 269,275 bytes.\u003c/li\u003e\n\u003cli\u003eCallback number: \u003ccode\u003e828-424-4048\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInvoice number: \u003ccode\u003eET QW-728834-Z82803-ODVJVZ\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReference string: \u003ccode\u003eWIHEOSHS5FLRNC5JMZ8BYUML3GZOXSRQ7M3SD4TE\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that image-only callback phishing can evade defenses that rely on links, executable files, or body text. In this case, OCR exposed both the fake Geek Squad invoice content and the Windows Defender footer that revealed template reuse. The detection depended on image analysis and behavioral pattern recognition rather than on a malicious URL, known-bad sender, or executable payload.\u003c/p\u003e\n","keyPoints":["The phishing email had an empty subject line, no body text, and a single JPEG attachment containing a fabricated Geek Squad renewal invoice for $270.","The image instructed the recipient that they had 24 hours to cancel the transaction and provided the callback phone number 828-424-4048.","OCR analysis found a brand mismatch in the invoice, with Geek Squad branding in the header and a footer reading “Copyright 2026 Windows Defender.”","The email was sent from stubin1178@hotmail.com through a FortiMail cloud relay, causing SPF to fail at the final hop while DKIM and DMARC passed via Hotmail.","Themis flagged the message at 90% confidence as a vishing and image-based attack using signals including a first-time sender, an empty subject line, an image-only payload, and a high-value healthcare recipient."],"insights":["The brand mismatch between the Geek Squad header and Windows Defender footer is a useful clue that the attacker reused a template across multiple impersonation campaigns.","Image-only callback phishing can evade controls that depend on URL scanning, sandbox detonation, or text-based NLP because the malicious instructions exist only in pixel data.","An SPF failure at the final hop did not indicate the original Hotmail authentication failed, because DKIM and DMARC still passed and the FortiMail relay introduced the SPF break.","Effective detection in this case depended on correlating weak signals such as an empty subject line, first-time sender, image-only invoice pattern, and high-value healthcare recipient rather than relying on a known-bad sender or malicious link."],"referencedReports":[],"body":"\u003cp\u003eA community healthcare organization received a callback phishing email with an empty subject line, no body text, and a single JPEG attachment. The image contained a fabricated Geek Squad renewal invoice for $270, a 24-hour cancellation deadline, and the callback number 828-424-4048. The article describes the attack as a Telephone-Oriented Attack Delivery campaign because the recipient was pushed to call rather than click a link.\u003c/p\u003e\n\n\u003cp\u003eThe attack was significant because the entire payload existed inside an image, leaving no URLs, executable attachments, or scannable body text for many defenses to analyze. OCR revealed a notable template error: the invoice header used Geek Squad branding, while the footer read “Copyright 2026 Windows Defender.” The article says this brand mismatch indicates a recycled template from another campaign.\u003c/p\u003e\n\n\u003cp\u003eThe message was sent from stubin1178@hotmail.com with the display name “Raymond Herman” and relayed through a FortiMail cloud gateway at 148.230.56.132. SPF failed at the final hop because the relay was not included in Hotmail’s SPF record, while DKIM and DMARC passed through Hotmail. Themis flagged the email at 90% confidence as a vishing and image-based attack using image analysis and behavioral signals.\u003c/p\u003e\n"},{"n":11,"title":"Identity Is the Highway. Here’s How Attackers Use It.","source":"xmcyber.com","sourceColorIdx":9,"link":"https://xmcyber.com/blog/identity-is-the-highway-heres-how-attackers-use-it/","time":"11:55","priority":"MAY READ","score":55,"tldr":"Attackers increasingly exploit identity as the main path through hybrid environments, chaining stolen credentials, misconfigured accounts, cloud access, CVEs, and unmanaged AI or service identities to reach critical assets. The key takeaway is that organizations need holistic exposure management to map and prioritize these connected attack paths instead of treating identity risks in silos.","briefOverview":"\u003cp\u003eThe article argues that enterprise security boundaries have dissolved and that identity has become the main “highway” attackers use to move through modern environments. It describes large identity estates spanning Active Directory, cloud platforms, non-human identities, and AI agents as expanding attack surfaces. The central significance is that each account can become an on-ramp for attackers if defenders cannot see how access flows across systems.\u003c/p\u003e\n\n\u003cp\u003eA key technical concern is that many organizations rely on disconnected tools that do not track identity across hybrid environments. Active Directory-focused tools can miss cloud activity, while cloud-focused tools can miss on-premises activity, leaving blind spots between the two. The article also highlights credentials, cached secrets, service accounts, AI agents, CVEs, and public-facing misconfigurations as exposures that attackers can chain together.\u003c/p\u003e\n\n\u003cp\u003eThe article presents exposure management as the recommended approach for addressing these risks. It says exposure management maps individual exposures into validated attack paths that can reach business-critical assets. It also emphasizes continuous monitoring of human, machine, and AI accounts, prioritization based on exploitability and business impact, and remediation guidance for responsible teams.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article frames identity as the primary route attackers use through modern enterprise environments. It says the traditional security perimeter has dissolved as organizations have moved into a mix of Active Directory, cloud platforms, non-human identities, and AI agents. In this environment, thousands of accounts can become potential on-ramps for attackers. The piece argues that identity-related attack surfaces are multiplying faster than many security teams can track.\u003c/p\u003e\n\n\u003cp\u003eOne major issue described is the lack of visibility across hybrid identity environments. The article states that compromised credentials in Active Directory can potentially provide a route into Azure and the resources it hosts. It warns that traditional tools often fail to see across the boundary between on-premises and cloud environments. As a result, attackers can exploit the path of least resistance across the full environment while defenders see only part of the picture.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights credentials as a persistent and difficult problem. Stolen credentials from the dark web, credentials dumped from device caches, reused passwords, weak passwords, and poorly encrypted passwords are all described as ways attackers can gain and expand access. It emphasizes that employee password reuse between personal and work accounts can turn an outside breach into an organizational risk. Cached credentials on endpoints are also presented as widespread and hard to track at enterprise scale.\u003c/p\u003e\n\n\u003cp\u003eAnother focus is the growth of AI agents and non-human identities. The article says AI agents and automated service accounts already run at scale in many enterprise environments and often hold real privileges. It warns that some of these identities were never formally onboarded into governance processes, leaving ownership unclear and permissions insufficiently reviewed. Shadow AI is described as worsening the problem when development teams create agents or workflows outside official channels.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor or incident, but it describes how attackers can combine identity weaknesses with other exposures. One example path starts with stolen Active Directory credentials, continues through a cached SSH key on a connected endpoint, uses a known CVE for privilege escalation, and ends in a critical cloud workload. The article’s main response recommendation is exposure management, which it says can connect identity risks, misconfigurations, CVEs, and access permissions into validated attack paths prioritized by business impact.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that identity has become the central route attackers use through modern enterprise environments. It says the traditional perimeter has not merely shifted but dissolved as organizations have accelerated digital transformation. In its place is a broad web of identities spanning Active Directory, cloud platforms, non-human identities, and AI agents.\u003c/p\u003e\n\n\u003cp\u003eThe core message is that every identity can become a potential on-ramp for an attacker. The article emphasizes that organizations often have thousands of accounts running across on-premises and cloud environments. It states that the addition of non-human identities and AI agents further expands the attack surface faster than many teams can track.\u003c/p\u003e\n\n\u003ch2 id=\"hybrid-identity-visibility-gaps\"\u003eHybrid Identity Visibility Gaps\u003c/h2\u003e\n\n\u003cp\u003eThe first major challenge described is the difficulty of seeing identity risk across hybrid environments. The article says identity does not stay within a single boundary, and attackers rely on that fact. As an example, it states that compromised credentials in Active Directory can potentially give an attacker a route into Azure and the systems hosted there.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that many traditional security tools were not built to track identity across both on-premises and cloud environments. Tools focused only on Active Directory may miss cloud activity, while cloud-focused tools may miss what is happening on-premises. This creates blind spots at the seam between the two environments.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, attackers do not operate in these same silos. They look for the path of least resistance across the entire environment. Without holistic cove
