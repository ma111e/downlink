oss-state targeting operation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"legal-proceedings-and-sentencing\"\u003eLegal Proceedings and Sentencing\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn the U.S., Pathmanathan received a 33-year prison term, 10 years of supervised release, and must register as a sex offender.\u003c/li\u003e\n\u003cli\u003eHe is already serving a 12-year prison sentence in Canada after pleading guilty to related offenses there in 2022.\u003c/li\u003e\n\u003cli\u003eThe dual sentences demonstrate significant international cooperation between U.S. and Canadian authorities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"defining-sextortion\"\u003eDefining Sextortion\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article defines sextortion as an online blackmail technique in which perpetrators threaten to share intimate images, videos, or other personal material unless victims meet their demands.\u003c/li\u003e\n\u003cli\u003ePathmanathan\u0026rsquo;s threats to expose recorded content to family or friends fit squarely within this definition.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eLong-running social media impersonation schemes can affect a large number of minors across multiple jurisdictions before detection.\u003c/li\u003e\n\u003cli\u003eStorage of abuse material on personal devices provided critical evidence for prosecution.\u003c/li\u003e\n\u003cli\u003eThe combined U.S. and Canadian sentences highlight a firm multinational stance against online child exploitation.\u003c/li\u003e\n\u003cli\u003eOffender registration and supervised release extend monitoring beyond incarceration.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A 40-year-old Canadian man was sentenced to 33 years in U.S. federal prison for using social media to coerce children into sending sexually explicit material.","He operated multiple fake accounts on Instagram and Facebook Messenger, posing as a teenage boy from New Jersey to gain children's trust.","Between at least 2014 and 2021, he targeted more than 145 children across the United States and stored recorded material on his computer.","When victims blocked him or refused further contact, he threatened to share the explicit material with their friends or family members.","He is already serving a 12-year prison sentence in Canada after pleading guilty to related offenses there in 2022."],"insights":["The 33-year U.S. sentence, combined with his ongoing 12-year Canadian sentence, reflects an exceptionally severe total punishment and underscores the growing international legal coordination against cross-border online child exploitation.","The perpetrator evaded detection for at least seven years while using multiple fake identities on mainstream platforms, showing how long-term grooming operations can persist even on well-known social media apps.","Storing the recorded sexual material on his own computer directly contributed to his conviction, demonstrating that digital hoarding of abuse evidence remains a critical forensic vulnerability for these offenders."],"referencedReports":[],"body":"\u003cp\u003eRamanan Pathmanathan, a 40-year-old Canadian man from Toronto, was sentenced to 33 years in U.S. federal prison for using social media to coerce more than 145 children across the United States into sending sexually explicit content. He pleaded guilty in January to producing child sexual abuse material and coercing and enticing a minor. The sentence also requires him to register as a sex offender and serve 10 years of supervised release.\u003c/p\u003e\n\n\u003cp\u003eBetween at least 2014 and his arrest in 2021, Pathmanathan operated multiple fake accounts on Instagram and Facebook Messenger, posing as a teenage boy from New Jersey to gain children\u0026rsquo;s trust. He recorded the explicit material they sent and stored it on his computer. When victims blocked him or refused to comply, he threatened to share the content with their friends or family.\u003c/p\u003e\n\n\u003cp\u003eSome victims were as young as six years old. Pathmanathan is already serving a 12-year prison sentence in Canada after pleading guilty to related offenses there in 2022, underscoring the severe consequences and international coordination targeting cross-border online child exploitation.\u003c/p\u003e\n"},{"n":20,"title":"New AI Usage Report: Enterprise AI Risk Is Heavily Concentrated Among a Small Group of AI \"Power users\"","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/new-ai-usage-report-enterprise-ai-risk.html","time":"11:30","priority":"MAY READ","score":55,"tldr":"Enterprise AI risk is concentrated among a small group of power users who generate most activity and sensitive data exposure, while the expanding long tail of shadow AI tools and personal accounts creates a massive governance blind spot that most organizations are failing to address.","briefOverview":"\u003cp\u003eThe LayerX Security \u0026ldquo;State of AI Usage Report 2026\u0026rdquo; reveals that enterprise AI risk is not evenly spread but heavily concentrated among a tiny fraction of employees. While nearly half of all enterprise users have tried AI tools, only 18% use them weekly, and the top 5% of users generate the vast majority of AI conversations and deep multi-turn prompt chains. This small group of \u0026ldquo;AI power users\u0026rdquo; accounts for a disproportionate share of sensitive data exposure, making them the focal point of enterprise risk.\u003c/p\u003e\n\n\u003cp\u003eAlongside this concentration, the AI landscape is fragmenting dangerously. ChatGPT still dominates usage, but Copilot is rapidly growing, and employees are increasingly splitting their activities between corporate-managed and unmanaged personal accounts. At the same time, AI browser extensions, embedded assistants, and AI connectors are granting persistent access to internal systems, creating a governance blind spot that traditional block-or-allow policies cannot address.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe State of AI Usage Report 2026 from LayerX Security provides a data-driven look at how AI is actually being used inside enterprises, challenging the assumption that risk scales linearly with the number of users. Based on telemetry data from organizational environments, the report finds that AI activity is massively skewed: the top 5% of users conduct 144 or more conversations, averaging 18 prompts per conversation compared to the global average of just 2. These power users also operate across multiple platforms, dramatically increasing their exposure potential. Conversely, the majority of employees remain casual or occasional AI users, yet their low volume does not translate into proportionally lower risk because the sensitive data leaks are driven by the heavy users.\u003c/p\u003e\n\n\u003cp\u003eThe report further details the platform ecosystem. ChatGPT remains the clear leader, capturing 36% of enterprise AI users and over 55% of all conversations. Copilot M365 is gaining ground at 29% adoption and is largely tied to corporate-managed environments that offer more visibility and governance. However, other platforms like Gemini and DeepSeek are predominantly accessed via consumer accounts, often outside organizational oversight. The data shows that nearly half of all enterprise AI conversations occur through personal identities, and alarmingly, 14% of conversations made with corporate identities are actually linked to personal AI licenses. This blurs the line between managed and unmanaged use, allowing sensitive information to leak into uncontrolled AI ecosystems without audit trails or data handling guarantees.\u003c/p\u003e\n\n\u003cp\u003eShadow AI has evolved far beyond a single unapproved chatbot. As the report illustrates, enterprises are facing a long tail of AI tools: nearly 30% of users interact with multiple AI platforms, and the top 5% use six or more. This includes embedded assistants in SaaS products, AI-powered search engines, coding copilots, and browser extensions. AI browser extensions alone are present on 15% of enterprise users\u0026rsquo; browsers, with 75% requesting high or critical permissions and over 16% having known vulnerabilities. Concurrently, AI connectors are linking AI systems directly to enterprise data stores like SharePoint, GitHub, Slack, and Google Workspace, granting programmatic access that bypasses manual data submission entirely.\u003c/p\u003e\n\n\u003cp\u003eThe consequences of these usage patterns are stark. Sensitive data appears in more than 6% of all AI conversations. Personal information is the most common type, found in 5.81% of conversations, with financial and IT data also represented. The exposure rate varies significantly by platform: DeepSeek tops the list at 12.63%, followed by ChatGPT at 8.38%, while Copilot M365 shows a lower 3.65% exposure rate, likely due to its tighter corporate integration. This demonstrates that consumer-oriented AI platforms, heavily used through personal accounts, are the primary vectors for sensitive data leakage.\u003c/p\u003e\n\n\u003cp\u003eIn response, the report outlines an actionable path for CISOs. It stresses the need to identify and monitor high-risk power users rather than applying blanket policies. Organizations must move beyond simply approving or blocking a handful of AI applications and instead implement inline guardrails that can inspect prompts, uploads, and responses in real time. Crucially, the report advises blocking personal account usage for enterprise tasks and enforcing corporate identities to regain visibility. Without these measures, the expanding web of shadow AI tools, personal accounts, and automated connectors will continue to erode data governance and expose organizations to uncontrolled risk.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe State of AI Usage Report 2026 by LayerX Security offers a comprehensive examination of how artificial intelligence is actually being adopted and used within enterprise environments, based on anonymized telemetry from organizational users. Its central finding is that enterprise AI risk is not uniformly distributed; instead, it is heavily concentrated among a small subset of \u0026ldquo;power users\u0026rdquo; and a few dominant platforms. At the same time, the enterprise AI ecosystem is fragmenting rapidly into a long tail of tools, extensions, personal accounts, and automated connectors that evade traditional security controls. The report provides quantified insights into user behavior, platform adoption, the nature of Shadow AI, the prevalence of sensitive data exposure, and actionable guidance for security leaders.\u003c/p\u003e\n\n\u003ch2 id=\"key-findings\"\u003eKey Findings\u003c/h2\u003e\n\n\u003ch3 id=\"1-ai-risk-is-concentrated-in-a-small-group-of-power-users\"\u003e1. AI Risk is Concentrated in a Small Group of Power Users\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhile 50% of enterprise users have fewer than 12 AI conversations, the top 5% generate 144 or more.\u003c/li\u003e\n\u003cli\u003ePower users average 18 prompts per conversation, compared to an overall average of just 2.\u003c/li\u003e\n\u003cli\u003eThese users are not only more voluminous; they interact across multiple AI platforms, often six or more, compounding their risk profile.\u003c/li\u003e\n\u003cli\u003eThe majority of employees are casual users—only 18% use AI weekly—so a blanket approach to AI governance fails to address where the majority of sensitive data exposure actually occurs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"2-chatgpt-dominates-but-copilot-is-closing-the-gap\"\u003e2. ChatGPT Dominates, but Copilot is Closing the Gap\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eChatGPT accounts for 36% of enterprise AI users and over 55% of all AI conversations.\u003c/li\u003e\n\u003cli\u003eCopilot M365 has reached 29% user adoption and nearly a quarter of conversations, typically within managed corporate environments.\u003c/li\u003e\n\u003cli\u003eOther platforms like Gemini, DeepSeek, and Claude are used mostly through consumer versions and personal accounts, placing them outside direct organizational visibility.\u003c/li\u003e\n\u003cli\u003eNot all platforms carry equal risk: enterprise-native tools like Copilot M365 are associated with lower sensitive data exposure rates, while consumer-oriented platforms show significantly higher rates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"3-shadow-ai-has-expanded-beyond-single-tools\"\u003e3. Shadow AI Has Expanded Beyond Single Tools\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eModern Shadow AI consists of a diverse array of embedded assistants, AI browser extensions, AI search engines, coding copilots, and AI-equipped SaaS features.\u003c/li\u003e\n\u003cli\u003eNearly 30% of enterprise users already use multiple AI platforms; the top 5% interact with six or more applications.\u003c/li\u003e\n\u003cli\u003eAI browser extensions are installed by roughly 15% of users. Of these:\n\n\u003cul\u003e\n\u003cli\u003e75% request high or critical browser permissions.\u003c/li\u003e\n\u003cli\u003eMore than 16% have known vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eAI connectors are increasingly granting AI systems persistent, programmatic access to internal systems such as SharePoint, GitHub, Slack, Atlassian, and Google Workspace, representing a fundamental shift from manual data entry to automated data access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"4-personal-ai-use-vastly-outpaces-corporate-governance\"\u003e4. Personal AI Use Vastly Outpaces Corporate Governance\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eNearly half of all enterprise AI conversations are conducted through personal identities, not corporate accounts.\u003c/li\u003e\n\u003cli\u003eA surprising 14% of conversations made with corporate identities are actually linked to personal AI licenses, blurring the boundary between managed and unmanaged usage.\u003c/li\u003e\n\u003cli\u003eThis divide also shapes platform selection: corporate-managed platforms like Copilot M365 and Gemini Enterprise are used primarily through corporate accounts, while ChatGPT, Claude, and DeepSeek are dominated by personal use.\u003c/li\u003e\n\u003cli\u003eAs a result, organizations lose visibility into retention policies, audit trails, and model training exposure for a significant portion of their enterprise AI interactions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"5-sensitive-data-is-flowing-into-ai-platforms-at-alarming-rates\"\u003e5. Sensitive Data is Flowing into AI Platforms at Alarming Rates\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 6% of all enterprise AI conversations contain sensitive data.\u003c/li\u003e\n\u003cli\u003ePersonal data is the most common category, found in 5.81% of conversations, with financial and IT data appearing less frequently but still representing meaningful exposure.\u003c/li\u003e\n\u003cli\u003ePlatform-specific sensitive data exposure rates:\n\n\u003cul\u003e\n\u003cli\u003eDeepSeek: 12.63%\u003c/li\u003e\n\u003cli\u003eChatGPT: 8.38%\u003c/li\u003e\n\u003cli\u003eCopilot M365: 3.65%\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThis discrepancy indicates that enterprise-integrated AI tools may benefit from stronger governance environments, while consumer tools operating under personal accounts see significantly riskier usage patterns.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"6-ai-extensions-and-connectors-are-rapidly-expanding-the-attack-surface\"\u003e6. AI Extensions and Connectors are Rapidly Expanding the Attack Surface\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI browser extensions often request broad permissions (high/critical for 75%) and frequently harbor known vulnerabilities (16%+).\u003c/li\u003e\n\u003cli\u003eAI connectors create direct links from AI systems to enterprise applications, enabling persistent access to internal data, which is often unmonitored.\u003c/li\u003e\n\u003cli\u003eTogether with personal account usage, these channels create a governance blind spot that traditional endpoint and network controls fail to cover.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendations-from-the-report\"\u003eRecommendations from the Report\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFocus on High-Risk Power Users:\u003c/strong\u003e Because AI exposure is so concentrated, targeting monitoring and policy enforcement on the top 5% of heavy users yields disproportionate risk reduction compared to treating all usage equally.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMove Beyond \u0026ldquo;Approved AI\u0026rdquo; Lists:\u003c/strong\u003e The long tail of AI tools—browser extensions, embedded copilots, AI-search, and connectors—is the true visibility gap. Organizations must discover and govern this fragmented ecosystem, not just a handful of known chatbots.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnforce Corporate Identities and Block Personal AI Accounts:\u003c/strong\u003e Unmanaged personal accounts and personal AI licenses are a primary vector for sensitive data loss. Mandating corporate AI identities restores auditability and control, while blocking personal use for enterprise tasks closes a major governance hole.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdopt Inline AI Guardrails:\u003c/strong\u003e Purely binary block/allow approaches are ineffective. Security teams need inline monitoring that can inspect prompts, file uploads, AI responses, and AI-driven actions in real time, enabling prevention of sensitive data leakage without stifling productivity.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Enterprise AI risk is heavily concentrated among a small group of power users, with the top 5% generating at least 144 conversations and averaging 18 prompts per conversation compared to an overall average of 2.","ChatGPT remains the dominant enterprise AI platform, accounting for 36% of users and over 55% of all conversations, while Copilot M365 is growing rapidly at 29% adoption.","Nearly half of all enterprise AI conversations happen through personal identities rather than corporate-managed accounts, and 14% of conversations with corporate identities are tied to personal AI licenses.","More than 6% of enterprise AI conversations contain sensitive data, with personal data appearing in 5.81% of conversations; DeepSeek and ChatGPT have the highest sensitive data exposure rates at 12.63% and 8.38%, respectively.","Shadow AI is fragmenting across a long tail of tools including AI browser extensions used by 15% of enterprise users, 75% of which request high or critical permissions and 16% of which have known vulnerabilities."],"insights":["Even when employees use corporate identities, 14% of those sessions are linked to personal AI licenses, creating a false sense of governance and undermining visibility into data handling.","The growing use of AI connectors and browser extensions is shifting the risk from manual data entry to persistent, programmatic AI access to internal systems like SharePoint and GitHub, a change most organizations are not tracking.","The extreme concentration of AI activity and sensitive data exposure among a small group of power users and a few platforms means that targeted controls on these high-risk entities can yield disproportionately large security gains compared to uniform policies.","Personal versus corporate AI use is not just a governance gap—it's shaping platform selection, with consumer tools like ChatGPT and DeepSeek dominated by unmanaged personal accounts while enterprise platforms are used via corporate channels, embedding risk into workflow choices."],"referencedReports":[{"title":"State of AI Usage Report 2026","url":"https://go.layerxsecurity.com/state-of-ai-usage-report-2026-layerx?utm_source=thn28052026","publisher":"LayerX Security","context":"The article states that this report reveals the extent of the enterprise AI visibility gap, the concentration of risk among AI power users, and sensitive data exposure across platforms."}],"body":"\u003cp\u003eThe LayerX Security \u0026ldquo;State of AI Usage Report 2026\u0026rdquo; reveals that enterprise AI risk is not evenly spread but heavily concentrated among a tiny fraction of employees. While nearly half of all enterprise users have tried AI tools, only 18% use them weekly, and the top 5% of users generate the vast majority of AI conversations and deep multi-turn prompt chains. This small group of \u0026ldquo;AI power users\u0026rdquo; accounts for a disproportionate share of sensitive data exposure, making them the focal point of enterprise risk.\u003c/p\u003e\n\n\u003cp\u003eAlongside this concentration, the AI landscape is fragmenting dangerously. ChatGPT still dominates usage, but Copilot is rapidly growing, and employees are increasingly splitting their activities between corporate-managed and unmanaged personal accounts. At the same time, AI browser extensions, embedded assistants, and AI connectors are granting persistent access to internal systems, creating a governance blind spot that traditional block-or-allow policies cannot address.\u003c/p\u003e\n"},{"n":10,"title":"How SIEM helps MSPs reduce noise and stop threats faster","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/how-siem-helps-msps-reduce-noise-and-stop-threats-faster/","time":"14:01","priority":"MAY READ","score":40,"tldr":"A unified SIEM helps MSPs cut through alert fatigue by connecting signals across fragmented tools into a single, actionable attack story, enabling faster threat detection and response.","briefOverview":"\u003cp\u003eManaged Service Providers (MSPs) face a flood of security alerts from fragmented tools, leading to alert fatigue and difficulty separating real threats from noise. Because modern attacks move across multiple surfaces—87% of intrusions involve multiple attack surfaces—disconnected endpoint, cloud, and network tools create blind spots that hide coordinated attacks. This operational inefficiency not only weakens security but also becomes a business problem for MSPs trying to grow and retain clients.\u003c/p\u003e\n\n\u003cp\u003eA modern SIEM counters this by centralizing visibility, automatically correlating related events across the environment, and presenting a single investigation workflow. For lean MSP teams, this becomes a force multiplier that reduces manual work, speeds investigations, and prioritizes meaningful incidents. The article highlights Kaseya SIEM specifically, which unifies telemetry from over 60 data sources, uses AI to simplify investigations with a natural-language chatbot, automates response actions, and provides proactive hardening recommendations, combining enterprise-grade detection with manageable operational overhead.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes how tool fragmentation in MSP security stacks generates excessive alerts and impairs visibility. Instead of gaining clarity, technicians must piece together information from siloed consoles—suspicious logins in identity tools, unusual PowerShell activity on endpoints, outbound traffic spikes in network monitors—unable to see that together they signal a breach. Research is cited showing that 87% of intrusions now span multiple attack surfaces, yet IBM\u0026rsquo;s report notes organizations take an average of 241 days to identify and contain a breach.\u003c/p\u003e\n\n\u003cp\u003eA unified SIEM addresses this by providing a centralized view and correlating signals into a cohesive attack narrative. This reduces time wasted reconstructing timelines, tracks suspicious behavior across surfaces, and cuts down alert fatigue. For MSPs, the impact extends beyond security: it boosts efficiency without adding headcount and helps position security as a differentiator in a competitive market where clients increasingly demand compliance readiness and operational resilience.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the business case by advising MSPs to make invisible signals visible through demos, sell confidence in detection rather than just tool coverage, and bundle SIEM as a compliance and cyber insurability enabler. It argues that MSPs connecting security operations to measurable business outcomes become harder to replace and less likely to compete on price alone.\u003c/p\u003e\n\n\u003cp\u003eKaseya SIEM is introduced as a middle-ground solution that avoids the complexity of traditional enterprise SIEMs and the limitations of lightweight managed alternatives. The platform ingests data from over 60 sources, offers automated response across cloud and endpoint environments, and includes an AI-powered interrogation chatbot that allows natural-language querying of security data. It also recommends alert suppressions, surfaces indicators of compromise, and provides tenant hardening recommendations.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes by noting that in most breach postmortems, indicators were present in logs long before escalation; the failure was in connecting them fast enough. Turning disconnected alerts into actionable insights, as a unified SIEM does, is the key outcome that helps MSPs stand out.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"the-challenge-fragmented-tools-and-alert-overload\"\u003eThe Challenge: Fragmented Tools and Alert Overload\u003c/h2\u003e\n\n\u003cp\u003eThe article opens by highlighting that MSPs are \u0026ldquo;flooded with security alerts every day,\u0026rdquo; yet many cannot distinguish operational noise from genuine threats. The primary cause is tool fragmentation—security tools that operate in silos generate duplicate alerts, create blind spots, and fail to provide complete context. Rather than gaining visibility, MSP technicians end up piecing together information across multiple consoles just to understand an incident.\u003c/p\u003e\n\n\u003cp\u003eThis fragmented approach masks coordinated attacks. The article gives an example: a suspicious login in an identity tool, unusual PowerShell activity on an endpoint, and outbound traffic spikes in network monitoring might each appear low-priority when viewed separately. Together, however, they indicate an attacker who has compromised credentials, established persistence, and is moving laterally. Research from Palo Alto Networks Unit 42 is cited to underscore the point: 87% of intrusions now involve activity across multiple attack surfaces. IBM\u0026rsquo;s 2025 Cost of a Data Breach Report adds that organizations average 241 days to identify and contain a breach, making silence across tools dangerous.\u003c/p\u003e\n\n\u003ch2 id=\"why-a-unified-siem-is-essential\"\u003eWhy a Unified SIEM Is Essential\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that modern attacks rarely remain in one place; threat actors move between systems, user accounts, cloud apps, and infrastructure. A modern SIEM gives MSPs a centralized view and automatically correlates related events into a single investigation workflow. This narrative replaces technicians manually pivoting between consoles and chasing disconnected alerts.\u003c/p\u003e\n\n\u003cp\u003eFor lean MSP teams, this becomes a force multiplier:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInvestigations move faster because timelines are reconstructed automatically.\u003c/li\u003e\n\u003cli\u003eSuspicious behavior becomes easier to track across attack surfaces.\u003c/li\u003e\n\u003cli\u003eTeams spend less time on noise and more on incidents that affect clients.\u003c/li\u003e\n\u003cli\u003eAutomated correlation and response reduce manual workloads, improving efficiency without constant new hires.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe platform filters noise, prioritizes meaningful incidents, and surfaces genuine threats, directly alleviating alert fatigue.\u003c/p\u003e\n\n\u003ch2 id=\"business-impact-and-client-expectations\"\u003eBusiness Impact and Client Expectations\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that alert fatigue and inefficiency are not just security issues—they are business problems. Kaseya’s 2026 State of the MSP Report finds that winning new clients is harder, competition is increasing, and differentiation is difficult. Security, however, remains a growth opportunity because clients are paying closer attention to security maturity, response capabilities, compliance readiness, and operational resilience.\u003c/p\u003e\n\n\u003cp\u003eThe article advises MSPs on positioning SIEM value:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMake the invisible visible\u003c/strong\u003e: Use demos or reports to show clients how many signals across endpoints, cloud, and identity go uninvestigated without unified visibility.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSell confidence, not coverage\u003c/strong\u003e: Answer the client question “Will you catch it?” directly, with unified detection, automated response, and \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e SOC support as proof.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBundle it as a business continuity conversation\u003c/strong\u003e: Emphasize that cyber insurers, regulators, and procurement teams require demonstrable security posture; SIEM becomes a compliance and insurability enabler rather than a cost.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that MSPs that connect security operations to measurable business outcomes will be harder to replace and less likely to compete on price.\u003c/p\u003e\n\n\u003ch2 id=\"the-solution-kaseya-siem\"\u003eThe Solution: Kaseya SIEM\u003c/h2\u003e\n\n\u003cp\u003eThe article introduces Kaseya SIEM as a platform that provides a middle ground between overly complex enterprise SIEMs and limited lightweight managed alternatives. It describes the following capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUnified visibility\u003c/strong\u003e: Ingests data from more than 60 sources, unifies endpoint, network, and cloud telemetry into a single dashboard, with built-in \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e SOC support.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFast automated response\u003c/strong\u003e: Enables automated actions across cloud and endpoint environments simultaneously—isolating devices, blocking accounts, flagging suspicious sessions, and triggering response workflows.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSmarter investigations with AI\u003c/strong\u003e: An AI-powered interrogation chatbot allows technicians to query security data in natural language. Behavior-based detections uncover suspicious activity that rules-based systems might miss.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProactive security recommendations\u003c/strong\u003e: The platform can recommend alert suppressions for known-good behavior, surface indicators of compromise, suggest PowerFilters to reduce noise, and provide Microsoft tenant hardening recommendations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion-turning-signals-into-answers\"\u003eConclusion: Turning Signals into Answers\u003c/h2\u003e\n\n\u003cp\u003eThe article closes with the observation that in most breach postmortems, indicators existed in logs long before the incident escalated; the failure was that no one connected them fast enough. The MSPs that will stand out are those that reduce noise, improve visibility, and turn disconnected alerts into actionable insights. A unified SIEM is the mechanism to achieve that, closing the detection gap and making the signal clear.\u003c/p\u003e\n","keyPoints":["Fragmented security tools create duplicate alerts, blind spots, and incomplete context, preventing MSPs from separating real threats from operational noise.","A modern SIEM centralizes visibility and correlates events across attack surfaces into a single investigation workflow, acting as a force multiplier for lean teams.","In most breach postmortems, the indicators existed in logs long before the incident escalated, but no one connected them fast enough to act.","MSP clients increasingly demand security maturity, compliance readiness, and operational resilience, making SIEM a differentiator for growth and client retention.","Kaseya SIEM unifies telemetry from over 60 data sources, automates response, uses AI to simplify investigations, and provides proactive security recommendations."],"insights":["MSPs aren't losing visibility because they lack tools—they're losing it because disconnected tools hide threats across silos, making correlation the real fix, not more tools.","Framing SIEM as a compliance and cyber insurability enabler shifts client conversations from a cost objection to a business necessity, making adoption easier to justify.","Most clients assume antivirus and a firewall are enough; showing them all the uninvestigated signals their environment produces in a demo turns an abstract gap into an urgent, tangible need."],"referencedReports":[{"title":"Unit 42 Incident Response Report","url":"https://www.paloaltonetworks.com/resources/research/unit-42-incident-response-report","publisher":"Palo Alto Networks","context":"The article cites this report for the statistic that 87% of intrusions now involve activity across multiple attack surfaces."},{"title":"2025 Cost of a Data Breach Report","url":"https://www.ibm.com/reports/data-breach","publisher":"IBM","context":"The article references this report to note that organizations take an average of 241 days to identify and contain a breach."}],"body":"\u003cp\u003eManaged Service Providers (MSPs) face a flood of security alerts from fragmented tools, leading to alert fatigue and difficulty separating real threats from noise. Because modern attacks move across multiple surfaces—87% of intrusions involve multiple attack surfaces—disconnected endpoint, cloud, and network tools create blind spots that hide coordinated attacks. This operational inefficiency not only weakens security but also becomes a business problem for MSPs trying to grow and retain clients.\u003c/p\u003e\n\n\u003cp\u003eA modern SIEM counters this by centralizing visibility, automatically correlating related events across the environment, and presenting a single investigation workflow. For lean MSP teams, this becomes a force multiplier that reduces manual work, speeds investigations, and prioritizes meaningful incidents. The article highlights Kaseya SIEM specifically, which unifies telemetry from over 60 data sources, uses AI to simplify investigations with a natural-language chatbot, automates response actions, and provides proactive hardening recommendations, combining enterprise-grade detection with manageable operational overhead.\u003c/p\u003e\n"},{"n":15,"title":"Webinar: Why network incidents take too long to resolve","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-why-network-incidents-take-too-long-to-resolve/","time":"12:20","priority":"MAY READ","score":30,"tldr":"The webinar reveals that network incidents take too long to resolve because manual investigation and coordination after the initial alert cause major delays, and it will show how automation and AI-assisted workflows can close those gaps.","briefOverview":"\u003cp\u003eBleepingComputer and Tines announced a live webinar on June 2, 2026, titled \u0026lsquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rsquo; The event addresses why network incidents take too long to resolve, pointing out that the delay is rarely about detecting the problem but about the manual investigation and coordination work that follows.\u003c/p\u003e\n\n\u003cp\u003eMost organizations possess ample monitoring tools and alerts, yet responders still manually gather context, determine affected systems, assign ownership, and coordinate across teams and platforms. This fragmentation prolongs downtime and slows recovery.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will explore how automation and AI-assisted workflows can eliminate these manual steps. Attendees will learn practical approaches to reduce investigation delays, improve operational coordination, and move incidents more efficiently from detection to resolution.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article announces a webinar produced by BleepingComputer and Tines, scheduled for June 2, 2026. The title, \u0026lsquo;From alert to resolution: Fixing the gaps in network incident response,\u0026rsquo; hints at a central premise: while organizations can detect network issues quickly, the subsequent investigation and coordination drags out resolution times. The announcement frames this as a persistent operational challenge for IT teams.\u003c/p\u003e\n\n\u003cp\u003eThe core argument is that alerting is not the bottleneck. After an alert fires, responders must gather context manually, identify which systems are actually affected, determine who owns the incident, and then orchestrate actions across multiple platforms and stakeholders. These repetitive, human-dependent steps introduce friction that extends downtime and complicates recovery.\u003c/p\u003e\n\n\u003cp\u003eTo address this, the webinar will showcase automation and AI-assisted workflows. Tines, the partner, is described as a platform that connects operational systems, automates repetitive tasks, and streamlines incident response workflows so teams spend less time on coordination and more on resolution. The goal is to reduce the manual labor that follows an alert.\u003c/p\u003e\n\n\u003cp\u003eThe agenda includes practical techniques: automatically enriching alerts with network, identity, and threat context; prioritizing and routing incidents without manual intervention; and moving from a fragmented, multi-system response to a coordinated resolution. These measures aim to close the gaps between detection, triage, and recovery.\u003c/p\u003e\n\n\u003cp\u003eNo specific attack types, threat actors, or victim organizations are mentioned; the article remains entirely focused on process improvement. The intended audience is IT and security teams that struggle with lengthy incident lifecycles despite having robust detection tooling.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes with a registration link, emphasizing that attendees will learn how to reduce response delays and improve incident resolution across complex environments. The overall message is that fixing post-alert workflows—not buying more detection tools—is the key to faster incident resolution.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eThe article promotes a live webinar hosted by BleepingComputer and Tines on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; It focuses on a common operational pain point: network incidents take too long to resolve, not because detection is slow, but because the manual work after an alert creates significant delays. The webinar aims to show how automation and AI-assisted workflows can help IT teams respond faster.\u003c/p\u003e\n\n\u003ch2 id=\"the-core-problem-delays-occur-after-detection\"\u003eThe Core Problem: Delays Occur After Detection\u003c/h2\u003e\n\n\u003cp\u003eThe article explicitly states that \u0026ldquo;many network incidents still take longer than expected to investigate and resolve,\u0026rdquo; even though most organizations have \u0026ldquo;no shortage of monitoring tools, alerts, and operational data.\u0026rdquo; This implies that the detection phase is not the root cause. Instead, the problem lies in what happens after an initial alert is generated.\u003c/p\u003e\n\n\u003ch2 id=\"what-causes-the-post-alert-slowdown\"\u003eWhat Causes the Post-Alert Slowdown?\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several specific friction points:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eManual context gathering:\u003c/strong\u003e Responders must manually pull together information to understand the full picture of an incident.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIdentifying affected systems:\u003c/strong\u003e Determining which assets are impacted requires manual effort.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDetermining ownership:\u003c/strong\u003e Assigning responsibility for the incident is a human-driven step that adds time.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-team and cross-platform coordination:\u003c/strong\u003e Actions must be orchestrated across multiple teams and disparate tools, leading to fragmentation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese activities are described as repetitive, manual tasks that slow down recovery and increase downtime.\u003c/p\u003e\n\n\u003ch2 id=\"the-proposed-solution-automation-and-ai-assisted-workflows\"\u003eThe Proposed Solution: Automation and AI-Assisted Workflows\u003c/h2\u003e\n\n\u003cp\u003eThe webinar will examine how automation and AI can accelerate response by addressing the gaps listed above. Tines is presented as a technology that can help teams \u0026ldquo;connect operational systems, automate repetitive tasks, and streamline incident response workflows.\u0026rdquo; The objective is to reduce the time spent on coordination so that teams can focus on resolving the issue.\u003c/p\u003e\n\n\u003ch2 id=\"webinar-details-and-content\"\u003eWebinar Details and Content\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTitle:\u003c/strong\u003e From alert to resolution: Fixing the gaps in network incident response\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDate:\u003c/strong\u003e June 2, 2026\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHosts:\u003c/strong\u003e BleepingComputer and Tines\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFormat:\u003c/strong\u003e Live webinar\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegistration link:\u003c/strong\u003e Provided in the article\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"key-topics-the-webinar-will-cover\"\u003eKey Topics the Webinar Will Cover\u003c/h3\u003e\n\n\u003cp\u003eThe article outlines a specific agenda that includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow network incidents typically evolve from initial alert to service impact.\u003c/li\u003e\n\u003cli\u003eWhere triage, enrichment, and routing break down in real-world workflows.\u003c/li\u003e\n\u003cli\u003eHow to automatically enrich alerts with network, identity, and threat context.\u003c/li\u003e\n\u003cli\u003eTechniques to prioritize and route incidents without manual intervention.\u003c/li\u003e\n\u003cli\u003eHow to move from fragmented response to coordinated resolution across systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"intended-audience-and-expected-outcomes\"\u003eIntended Audience and Expected Outcomes\u003c/h2\u003e\n\n\u003cp\u003eThe article targets IT teams who feel the disconnect between fast detection and slow resolution. Attendees are promised \u0026ldquo;practical approaches for reducing investigation delays, improving operational coordination, and moving incidents from detection to resolution more efficiently.\u0026rdquo; No specific industries or attack scenarios are mentioned; the guidance is presented as broadly applicable to complex environments.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s single most important takeaway is that fixing the handoff between an alert and actual remediation—by removing manual coordination and enrichment tasks—is critical. Automation and AI-assisted workflows are positioned as the primary means to close these gaps. The webinar is a vehicle for learning concrete techniques that can turn that insight into operational reality.\u003c/p\u003e\n","keyPoints":["Many network incidents take longer than necessary to resolve because responders must manually gather context, identify affected systems, determine ownership, and coordinate across multiple teams and platforms.","A live webinar, hosted by BleepingComputer and Tines, will examine how automation and AI-assisted workflows can help IT teams accelerate response efforts by reducing these manual investigation delays.","Tines helps organizations connect operational systems, automate repetitive tasks, and streamline incident response workflows so teams spend less time coordinating and more time resolving issues.","The webinar will cover automatically enriching alerts with network, identity, and threat context, and techniques to prioritize and route incidents without manual intervention."],"insights":["Having a surplus of monitoring tools and alerts does not inherently speed up incident resolution; the real friction occurs after detection when responders manually gather context and coordinate across systems.","The most significant opportunity to accelerate incident response lies not in faster detection, but in reducing the time spent on cross-team coordination and manual ownership determination.","Automatically enriching alerts with network, identity, and threat context can eliminate repetitive manual lookups, allowing responders to immediately understand impact without switching between tools.","Removing the human decision step from incident routing—by using automated prioritization and routing rules—can prevent delays caused by manual hand-offs between teams."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer and Tines announced a live webinar on June 2, 2026, titled \u0026lsquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rsquo; The event addresses why network incidents take too long to resolve, pointing out that the delay is rarely about detecting the problem but about the manual investigation and coordination work that follows.\u003c/p\u003e\n\n\u003cp\u003eMost organizations possess ample monitoring tools and alerts, yet responders still manually gather context, determine affected systems, assign ownership, and coordinate across teams and platforms. This fragmentation prolongs downtime and slows recovery.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will explore how automation and AI-assisted workflows can eliminate these manual steps. Attendees will learn practical approaches to reduce investigation delays, improve operational coordination, and move incidents more efficiently from detection to resolution.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
