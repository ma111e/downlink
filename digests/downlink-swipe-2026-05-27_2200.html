<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }

  }

window.__DL_ARTICLES = [{"n":6,"title":"Cruise giant Carnival confirms data breach affecting nearly 6 million people","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/cruise-giant-carnival-confirms-data-breach-affecting-6-million","time":"14:01","priority":"MUST READ","score":95,"tldr":"Carnival confirmed a data breach affecting nearly 6 million people, with hackers stealing sensitive personal information including passport and driver's license numbers.","briefOverview":"\u003cp\u003eCruise giant Carnival confirmed that hackers stole sensitive personal information—including passport and driver\u0026rsquo;s license numbers—from nearly 6 million individuals in an April cyberattack. The ShinyHunters group claimed responsibility, attempted to extort Carnival, and later published 8.7 million records on its leak site, with data allegedly tied to the Holland America Line loyalty program. The attackers gained entry by compromising a single employee account, likely through a phishing incident Carnival had acknowledged earlier.\u003c/p\u003e\n\n\u003cp\u003eCarnival stated it immediately blocked unauthorized activity and engaged third-party security experts to investigate, but it took over a month to notify victims due to the complexity of identifying exactly which data was affected. This marks the company’s third major data breach disclosure in five years, including a 2019 incident that led to a $1.25 million regulatory fine, highlighting persistent credential-related security gaps.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCarnival, one of the world’s largest cruise operators with brands such as Princess Cruises, Holland America Line, Cunard and Costa Cruises, confirmed a data breach affecting nearly 6 million individuals. The intruders stole names, addresses, email addresses, phone numbers, dates of birth, driver’s license numbers, and passport numbers. The intrusion occurred in April, and by the end of that month Carnival determined that the attacker had copied personal information from its systems.\u003c/p\u003e\n\n\u003cp\u003eThe attack relied on the compromise of a single employee account, an intrusion method Carnival initially described as a phishing incident. The ShinyHunters hacking group publicly claimed responsibility, asserting it obtained a large volume of Carnival data and attempted to extort the company. After the extortion demand, ShinyHunters posted 8.7 million records to its leak site, including data allegedly tied to the Mariner Society loyalty program of Holland America Line.\u003c/p\u003e\n\n\u003cp\u003eCarnival responded by quickly blocking the unauthorized activity and bringing in third-party security experts to contain the incident and strengthen defenses. The company took roughly one month from discovery to public confirmation, explaining that complex breaches require careful investigation to determine precisely what information was affected and to whom it belongs, so that notifications can be handled accurately.\u003c/p\u003e\n\n\u003cp\u003eThe exposure of highly sensitive documents such as passport and driver’s license numbers, combined with loyalty program details, raises the seriousness of the breach. The filing with the Maine attorney general’s office indicates that approximately 6 million people are being notified, underscoring the massive scale of the incident.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters is a known actor in data theft and extortion campaigns. Earlier in the year, the FBI warned that hackers linked to ShinyHunters were demanding substantial ransom payments after compromising Salesforce environments, and the group recently claimed a breach at analytics company Mixpanel. Carnival has not publicly attributed the April breach to ShinyHunters, however.\u003c/p\u003e\n\n\u003cp\u003eThis is not Carnival’s first data breach. In 2019, the company disclosed an employee email account breach that exposed information belonging to roughly 180,000 customers and employees, for which regulators later imposed a $1.25 million fine. Another breach in 2021 involved unauthorized access to a limited number of email accounts. The 2025 incident continues a troubling pattern of successful attacks against Carnival’s user accounts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-summary\"\u003eIncident Summary\u003c/h2\u003e\n\n\u003cp\u003eCarnival Corporation, one of the world’s largest cruise operators with more than 90 ships and brands including Princess Cruises, Holland America Line, Cunard, and Costa Cruises, confirmed that hackers stole a broad range of personal information from its systems. The data breach affects nearly 6 million individuals, according to a filing with the Maine attorney general’s office. The compromised data includes names, addresses, email addresses, telephone numbers, dates of birth, driver’s license numbers, and passport numbers.\u003c/p\u003e\n\n\u003ch2 id=\"attack-details-and-timeline\"\u003eAttack Details and Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe intrusion began in April, when a threat actor gained access to a limited portion of Carnival’s IT environment after compromising an employee account. Carnival has characterized the initial entry as a phishing incident targeting a single user account. By the end of April, the company determined that the attacker had copied personal information from its systems.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters hacking group publicly claimed responsibility for the theft. The group asserted it had obtained a large volume of Carnival data and attempted to extort the company to prevent publication. When extortion demands were not met, ShinyHunters released 8.7 million records on its leak site. Among the published data were records allegedly tied to the Mariner Society loyalty program operated by Holland America Line, one of Carnival’s cruise brands. Carnival has not publicly attributed the attack to ShinyHunters, though it previously acknowledged the phishing incident.\u003c/p\u003e\n\n\u003ch2 id=\"carnival-s-response-and-notification-process\"\u003eCarnival’s Response and Notification Process\u003c/h2\u003e\n\n\u003cp\u003eCarnival stated that it acted swiftly to block the unauthorized activity and immediately began working with third-party security experts to further strengthen its security posture and conduct a thorough investigation. Despite the apparent speed of containment, the company took approximately one month from the end of April until the Wednesday confirmation to notify the public. Carnival explained that complex incidents require careful investigation to understand what information was affected and to whom it belongs, and to ensure that notifications are handled accurately.\u003c/p\u003e\n\n\u003ch2 id=\"the-affected-data-and-scale\"\u003eThe Affected Data and Scale\u003c/h2\u003e\n\n\u003cp\u003eAccording to the filing with the Maine attorney general’s office, nearly 6 million people may have had their information exposed. The data sets stolen include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames\u003c/li\u003e\n\u003cli\u003eAddresses\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003eDates of birth\u003c/li\u003e\n\u003cli\u003eDriver’s license numbers\u003c/li\u003e\n\u003cli\u003ePassport numbers\nThe ShinyHunters leak later included 8.7 million records, which may account for duplicates or additional information; the loyalty program data allegedly tied to the Mariner Society represents a link between travel activity and identity details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-threat-actor-shinyhunters\"\u003eThe Threat Actor: ShinyHunters\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters is known for high-profile data theft and extortion campaigns against large organizations. Earlier this year, the FBI warned that hackers linked to ShinyHunters were demanding substantial ransom payments from companies after stealing data through compromises involving Salesforce environments. The group also recently claimed responsibility for a breach at analytics company Mixpanel. Carnival has not publicly attributed the April breach to ShinyHunters, but the group’s claim and pattern of extortion align with its established methods.\u003c/p\u003e\n\n\u003ch2 id=\"carnival-s-breach-history\"\u003eCarnival’s Breach History\u003c/h2\u003e\n\n\u003cp\u003eThis incident is the latest in a series of data breaches involving Carnival:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn 2019, Carnival disclosed a data breach involving employee email accounts that exposed information belonging to approximately 180,000 customers and employees. Regulators later fined the company $1.25 million over its handling of that incident.\u003c/li\u003e\n\u003cli\u003eIn 2021, Carnival reported another breach that entailed unauthorized access to a limited number of email accounts.\nThe recurrence of credential-based compromises, including the latest phishing incident with a single user account, points to persistent challenges in securing employee access to sensitive data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways-from-the-article\"\u003eKey Takeaways from the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCarnival’s April breach exposed highly sensitive identity documents—passport and driver’s license numbers—for an estimated 6 million individuals.\u003c/li\u003e\n\u003cli\u003eThe ShinyHunters group claimed the intrusion, attempted extortion, and then leaked data, including loyalty program details, in a pattern consistent with its known tactics.\u003c/li\u003e\n\u003cli\u003eCarnival delayed public disclosure by roughly one month, citing the investigative complexity required to pinpoint affected data and individuals accurately.\u003c/li\u003e\n\u003cli\u003eThe company has now experienced three significant data breaches in five years, all originating from compromised email accounts, despite prior regulatory penalties.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Carnival confirmed a data breach affecting nearly 6 million people, with stolen data including passport and driver's license numbers.","The attacker gained access by compromising an employee account and copied personal information from Carnival's systems.","The ShinyHunters hacking group claimed responsibility, attempted extortion, and later released 8.7 million records on its leak site.","Carnival previously suffered a 2019 breach that exposed data of 180,000 customers and employees and resulted in a $1.25 million fine."],"insights":["Carnival waited a full month to confirm the breach after discovering data was exfiltrated by the end of April, highlighting the challenge of balancing thorough investigation with timely public notice.","This incident marks Carnival's third major data breach disclosure in five years, despite a previous $1.25 million regulatory fine over the 2019 breach, indicating persistent credential-related security gaps.","The ShinyHunters group used a simple employee account compromise via phishing to breach Carnival, contrasting with earlier FBI warnings about their extortion campaigns through compromised Salesforce environments, demonstrating adaptable initial access tactics.","The stolen data reportedly included loyalty program information from Holland America Line's Mariner Society, which could be weaponized for highly personalized phishing or identity fraud schemes."],"referencedReports":[],"body":"\u003cp\u003eCruise giant Carnival confirmed that hackers stole sensitive personal information—including passport and driver\u0026rsquo;s license numbers—from nearly 6 million individuals in an April cyberattack. The ShinyHunters group claimed responsibility, attempted to extort Carnival, and later published 8.7 million records on its leak site, with data allegedly tied to the Holland America Line loyalty program. The attackers gained entry by compromising a single employee account, likely through a phishing incident Carnival had acknowledged earlier.\u003c/p\u003e\n\n\u003cp\u003eCarnival stated it immediately blocked unauthorized activity and engaged third-party security experts to investigate, but it took over a month to notify victims due to the complexity of identifying exactly which data was affected. This marks the company’s third major data breach disclosure in five years, including a 2019 incident that led to a $1.25 million regulatory fine, highlighting persistent credential-related security gaps.\u003c/p\u003e\n"},{"n":11,"title":"Hackers exploit FortiClient EMS flaw to push infostealer malware","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/hackers-exploit-forticlient-ems-flaw-to-push-infostealer-malware/","time":"17:25","priority":"MUST READ","score":95,"tldr":"Attackers are actively exploiting a critical authentication bypass in FortiClient EMS (CVE-2026-35616) to push a new credential stealer, EKZ, disguised as a Fortinet update, and defenders should watch for certificate authentication anomalies and unexpected VPN scripting changes.","briefOverview":"\u003cp\u003eHackers are actively exploiting CVE-2026-35616, an authentication bypass vulnerability in FortiClient Enterprise Management Server (EMS), to push a newly identified credential stealer named EKZ. The attackers compromise EMS instances without authentication, modify VPN policies, and use legitimate FortiClient components to launch malicious scripts as soon as an IPsec tunnel connects. The malware is disguised as a Fortinet update and executes through FortiClient-managed VPN scripting workflows.\u003c/p\u003e\n\n\u003cp\u003eThe EKZ infostealer harvests browser-stored credentials, credit card details, addresses, phone numbers, and session cookies from Chromium-based and Firefox browsers, exfiltrating the data to an attacker-controlled server before removing local artifacts. Fortinet confirmed the vulnerability and released emergency hotfixes for versions 7.4.5 and 7.4.6 in early April, while CISA ordered federal agencies to patch immediately. Defenders can detect attacks by looking for certificate authentication anomalies, unexpected changes to Remote Access Profile configurations, and a specific log sequence involving a missing certificate header followed by a successful certificate update.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article details the active exploitation of CVE-2026-35616, a critical improper access control flaw in FortiClient Enterprise Management Server (EMS) that allows unauthenticated remote code execution. Fortinet confirmed the vulnerability was being exploited in early April 2026 and released emergency hotfixes for versions 7.4.5 and 7.4.6. CISA reacted by ordering federal agencies to patch by the end of that week, while the Shadowserver Foundation reported approximately 2,000 internet-exposed EMS instances at the time.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity firm Arctic Wolf observed attacks leveraging the vulnerability to deliver an undocumented credential stealer called EKZ. The intrusion starts with an unauthenticated attacker abusing endpoint APIs to perform administrative actions, modifying EMS configuration and VPN policies to inject malicious scripts. Seconds after an endpoint establishes an IPsec tunnel to a FortiGate firewall, the legitimate fortitray.exe component launches malicious batch scripts through Command Prompt. These scripts execute a base64-encoded PowerShell payload that downloads and runs the malware disguised as a Fortinet patch, exfiltrating stolen data over HTTP to an attacker-controlled VPS.\u003c/p\u003e\n\n\u003cp\u003eThe malicious payload is presented as a Fortinet endpoint update and executed entirely through FortiClient-managed VPN scripting workflows, blending into normal administrative operations. The EKZ infostealer targets Chromium and Firefox browsers to steal credentials, credit card details, addresses, phone numbers, and session cookies. By harvesting cookies, attackers can access multi-factor authentication-protected accounts without logging in, and the malware bypasses encrypted password protections. After exfiltration, the stealer removes local artifacts to hinder forensics.\u003c/p\u003e\n\n\u003cp\u003eArctic Wolf identifies a specific detection opportunity: the log line “Certificate not found in request header.” followed shortly by “Certificate user: fortinet-ca2 … successfully updated” is a strong indicator of exploitation. Defenders are also urged to watch for certificate-authentication anomalies, unexpected changes to Remote Access Profile configurations, the creation of new administrative accounts, and logins from suspicious origins such as Tor exit nodes or VPS IP addresses. Any unexplained configuration changes should be treated as red flags.\u003c/p\u003e\n\n\u003cp\u003eThe attack underscores the risk of legitimate enterprise management tools being weaponized to deliver malware that masquerades as an official update. The availability of emergency hotfixes, a CISA binding operational directive, and detailed detection guidance from Arctic Wolf provide a path to defense, but organizations must prioritize patching exposed EMS instances and actively hunt for the described indicators.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers are actively exploiting an authentication bypass vulnerability (CVE-2026-35616) in FortiClient Enterprise Management Server (EMS) to deliver a newly documented credential stealer tracked as EKZ. The malware is disguised as a Fortinet endpoint update and deployed through legitimate FortiClient VPN scripting workflows, allowing the threat actors to blend malicious activity with normal administrative operations. Fortinet confirmed the vulnerability and released emergency hotfixes for affected versions in early April 2026, while CISA mandated federal agencies to patch within the same week.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-35616\u003c/strong\u003e is an improper access control flaw in FortiClient EMS.\u003c/li\u003e\n\u003cli\u003eThe vulnerability enables \u003cstrong\u003eunauthenticated remote attackers to execute arbitrary code or commands\u003c/strong\u003e via specially crafted requests.\u003c/li\u003e\n\u003cli\u003eFortinet confirmed active exploitation in early April 2026 and released \u003cstrong\u003eemergency hotfixes for versions 7.4.5 and 7.4.6\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe Shadowserver Foundation reported approximately \u003cstrong\u003e2,000 internet-exposed EMS instances\u003c/strong\u003e at the time of the initial public advisory.\u003c/li\u003e\n\u003cli\u003eCISA ordered federal agencies to secure their instances by the end of that same week.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attack-chain-and-delivery-mechanism\"\u003eAttack Chain and Delivery Mechanism\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe intrusion begins with the attacker \u003cstrong\u003eabusing endpoint APIs to perform administrative actions without authentication\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eOnce inside, the attacker \u003cstrong\u003emodifies the EMS configuration and VPN policies\u003c/strong\u003e to introduce the execution of malicious scripts.\u003c/li\u003e\n\u003cli\u003eWhen an endpoint establishes an IPsec tunnel to a FortiGate firewall, the legitimate process \u003cstrong\u003efortitray.exe launches malicious batch scripts\u003c/strong\u003e through Command Prompt within seconds.\u003c/li\u003e\n\u003cli\u003eThese batch scripts execute a \u003cstrong\u003ebase64-encoded PowerShell payload\u003c/strong\u003e that downloads and runs the malware, which is presented as a \u003cstrong\u003eFortinet endpoint update\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe payload is executed through \u003cstrong\u003eFortiClient-managed VPN scripting workflows\u003c/strong\u003e, leveraging the trust and routine nature of FortiClient’s own mechanisms.\u003c/li\u003e\n\u003cli\u003eExfiltrated data is sent to an \u003cstrong\u003eattacker-controlled VPS over HTTP\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eAfter successful theft, the malware \u003cstrong\u003eremoves local artifacts\u003c/strong\u003e to reduce forensic evidence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ekz-infostealer-capabilities\"\u003eEKZ Infostealer Capabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eTargets \u003cstrong\u003eboth Chromium-based and Firefox web browsers\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eSteals stored \u003cstrong\u003ecredentials, credit card details, addresses, phone numbers, and cookies\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eCan \u003cstrong\u003ebypass encrypted password protections\u003c/strong\u003e within the browsers.\u003c/li\u003e\n\u003cli\u003eTheft of session cookies allows attackers to \u003cstrong\u003eaccess accounts protected by multi-factor authentication (MFA) without logging in\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe stealer is designed to execute \u003cstrong\u003esilently without arguments\u003c/strong\u003e, and it exfiltrates harvested browser data before cleaning up traces.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-indicators\"\u003eDetection and Indicators\u003c/h2\u003e\n\n\u003cp\u003eArctic Wolf’s investigation provides specific indicators that defenders can use:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLog artifact: A line reading \u003cstrong\u003e\u0026ldquo;Certificate not found in request header.\u0026rdquo;\u003c/strong\u003e followed seconds later by \u003cstrong\u003e\u0026ldquo;Certificate user: fortinet-ca2 … successfully updated\u0026rdquo;\u003c/strong\u003e is a strong signal of exploitation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCertificate-authentication anomalies\u003c/strong\u003e and \u003cstrong\u003eunexpected changes to Remote Access Profile configurations\u003c/strong\u003e should be investigated immediately.\u003c/li\u003e\n\u003cli\u003eRed flags for any suspicious administrative activity include:\n\n\u003cul\u003e\n\u003cli\u003eCreation of \u003cstrong\u003enew administrative accounts\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eLogins originating from \u003cstrong\u003eTor exit nodes or VPS IP addresses\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eAny \u003cstrong\u003eunauthorized configuration changes\u003c/strong\u003e on the EMS.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePatching:\u003c/strong\u003e Organizations must apply Fortinet’s emergency hotfixes for EMS versions 7.4.5 and 7.4.6 without delay.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDetection guidance:\u003c/strong\u003e Arctic Wolf’s report contains extensive detection rules that security teams can implement to identify the specific abuse pattern.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMonitoring:\u003c/strong\u003e Continuous monitoring for the described log artifacts, unexpected VPN policy modifications, and anomalous administrator behavior is critical, especially for any internet-accessible EMS instances.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThis incident demonstrates how threat actors can embed malicious payloads into trusted enterprise management workflows, making detection challenging without specific behavioral indicators. The combination of a critical unauthenticated RCE flaw and the stealthy delivery method disguised as a routine update increases the urgency of patching exposed FortiClient EMS servers. Organizations that cannot immediately patch should rigorously hunt for the certificate and configuration anomalies described to detect and disrupt ongoing intrusions.\u003c/p\u003e\n","keyPoints":["Attackers are exploiting CVE-2026-35616, an authentication bypass in FortiClient EMS, to deliver a credential stealer called EKZ that is disguised as a Fortinet update.","The flaw allows unauthenticated remote code execution via specially crafted requests, and Fortinet released emergency hotfixes for versions 7.4.5 and 7.4.6.","The attack modifies EMS configuration and VPN policies so that legitimate FortiClient components launch malicious PowerShell scripts, which download and execute the EKZ infostealer.","The EKZ infostealer steals credentials, credit card details, addresses, phone numbers, and cookies from Chromium and Firefox browsers, then exfiltrates the data to an attacker-controlled VPS over HTTP.","Defenders should watch for certificate-authentication anomalies, such as the log line 'Certificate not found in request header.' followed by a successful certificate update, as well as unexpected changes to Remote Access Profile configurations."],"insights":["Attackers leveraged FortiClient's own legitimate VPN scripting workflows to deliver the malware disguised as a Fortinet update, allowing the malicious activity to masquerade as normal administrative operations.","A specific, highly actionable detection indicator exists: the appearance of the log line \"Certificate not found in request header.\" followed seconds later by \"Certificate user: fortinet-ca2 … successfully updated\" is a direct sign of exploitation.","The infection chain was fully automated, with malicious batch scripts launching within seconds of an IPsec tunnel being established, suggesting a scripted, time-sensitive attack designed for rapid compromise at scale.","The payload is an undocumented credential stealer (EKZ) deployed via a zero-day, indicating a threat actor invested in custom tooling specifically for this exploit rather than using off-the-shelf malware.","After exfiltrating data, the malware cleans up local artifacts, a technique that reduces forensic evidence and can significantly hinder incident response investigations."],"referencedReports":[{"title":"FortiClient EMS Exploited via CVE-2026-35616 to Deliver EKZ Infostealer Disguised as a Fortinet Patch","url":"https://arcticwolf.com/resources/blog/forticlient-ems-exploited-via-cve-2026-35616-to-deliver-ekz-infostealer-disguised-as-a-fortinet-patch/","publisher":"Arctic Wolf","context":"The article references Arctic Wolf's report as the source for the attack chain analysis and details of the EKZ infostealer."}],"body":"\u003cp\u003eHackers are actively exploiting CVE-2026-35616, an authentication bypass vulnerability in FortiClient Enterprise Management Server (EMS), to push a newly identified credential stealer named EKZ. The attackers compromise EMS instances without authentication, modify VPN policies, and use legitimate FortiClient components to launch malicious scripts as soon as an IPsec tunnel connects. The malware is disguised as a Fortinet update and executes through FortiClient-managed VPN scripting workflows.\u003c/p\u003e\n\n\u003cp\u003eThe EKZ infostealer harvests browser-stored credentials, credit card details, addresses, phone numbers, and session cookies from Chromium-based and Firefox browsers, exfiltrating the data to an attacker-controlled server before removing local artifacts. Fortinet confirmed the vulnerability and released emergency hotfixes for versions 7.4.5 and 7.4.6 in early April, while CISA ordered federal agencies to patch immediately. Defenders can detect attacks by looking for certificate authentication anomalies, unexpected changes to Remote Access Profile configurations, and a specific log sequence involving a missing certificate header followed by a successful certificate update.\u003c/p\u003e\n"},{"n":14,"title":"Carnival Cruise confirms data breach affecting nearly 6 million people","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/carnival-cruise-confirms-data-breach-affecting-nearly-6-million-people/","time":"10:49","priority":"MUST READ","score":95,"tldr":"Carnival Cruise Line suffered a data breach that compromised the personal information of nearly 6 million people, with the ShinyHunters gang claiming responsibility and leaking loyalty program details.","briefOverview":"\u003cp\u003eCarnival Corporation confirmed a data breach impacting approximately 5,995,277 individuals, attributed to the ShinyHunters extortion gang who claimed to have stolen over 8.7 million records. The attack began on April 10, 2026, using social engineering to compromise an employee account, with unauthorized data copying identified by April 22. Exposed information includes names, dates of birth, email addresses, genders, geographic locations, and loyalty program details from Holland America\u0026rsquo;s Mariner Society.\u003c/p\u003e\n\n\u003cp\u003eThis incident is the latest in a series of Carnival breaches dating back to 2020. The FBI issued an advisory against paying ransoms after previously warning that payment does not prevent further extortion or data sale. Have I Been Pwned analyzed the leaked dataset, underscoring that loyalty program enrollment data could be exploited for targeted fraud.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCarnival Corporation, the world\u0026rsquo;s largest cruise line operator with over 160,000 employees and $26 billion in revenue, disclosed a breach affecting nearly 6 million individuals. The company had already experienced data breaches in March 2020, June 2021, and ransomware-related incidents in August and December 2020, making this at least the fifth publicly reported compromise in six years.\u003c/p\u003e\n\n\u003cp\u003eThe breach was executed on April 10, 2026, when an unauthorized actor used social engineering to deceive an employee and gain access to IT systems. Carnival detected unusual activity on April 14, immediately blocked it, and engaged third-party security experts. By April 22, the investigation confirmed that the attacker had illegally copied personal information, leading to customer notifications.\u003c/p\u003e\n\n\u003cp\u003eAccording to data breach notification service Have I Been Pwned, the stolen data included names, dates of birth, email addresses, genders, geographic locations, and loyalty program specifics. The data was linked to Holland America\u0026rsquo;s Mariner Society, a Carnival brand, revealing that loyalty tier and enrollment details were exposed. While Carnival reported 5,995,277 affected individuals, ShinyHunters claimed 8.7 million records plus terabytes of internal corporate data, a discrepancy that suggests either inflated hacker claims or the presence of additional, undisclosed data categories.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters group, active in a widespread campaign targeting Salesforce customers, claimed responsibility. The FBI previously warned that paying ransoms does not guarantee data safety, and two weeks before this notification the bureau issued a specific advisory urging ShinyHunters\u0026rsquo; victims not to pay. Carnival has not publicly disclosed whether it paid a ransom or negotiated.\u003c/p\u003e\n\n\u003cp\u003eIn the broader context, this breach highlights persistent social engineering risks and the value of loyalty program data. Have I Been Pwned\u0026rsquo;s analysis confirms that the leak puts affected individuals at heightened risk for credential stuffing, phishing, and account takeover attempts using detailed personal and loyalty status information.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"comprehensive-analysis-of-the-carnival-corporation-data-breach-2026\"\u003eComprehensive Analysis of the Carnival Corporation Data Breach (2026)\u003c/h1\u003e\n\n\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn April 10, 2026, Carnival Corporation—the largest cruise line operator in the world—suffered a data breach that exposed the personal information of nearly 6 million individuals. The attack was claimed by the ShinyHunters extortion gang and involved the theft of names, dates of birth, email addresses, genders, geographic locations, and loyalty program details. This breach is the latest in a series of cybersecurity incidents for Carnival, which has disclosed multiple compromises since 2020.\u003c/p\u003e\n\n\u003ch2 id=\"key-details-of-the-breach\"\u003eKey Details of the Breach\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDate of unauthorized access:\u003c/strong\u003e April 10, 2026.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDiscovery:\u003c/strong\u003e Carnival\u0026rsquo;s IT security team identified unauthorized activity on April 14, 2026 involving an employee account.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttack vector:\u003c/strong\u003e Social engineering—an attacker deceived an employee to gain access to a limited portion of the company\u0026rsquo;s IT systems.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData exfiltration timeline:\u003c/strong\u003e On April 22, 2026, Carnival determined that the bad actor illegally copied personal information.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNotification:\u003c/strong\u003e The company began notifying 5,995,277 affected customers on a Wednesday (the article context indicates this occurred shortly before publication).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exposed-data\"\u003eExposed Data\u003c/h2\u003e\n\n\u003cp\u003eBased on the investigation and analysis by Have I Been Pwned, the compromised information includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFull names\u003c/li\u003e\n\u003cli\u003eDates of birth\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eGenders\u003c/li\u003e\n\u003cli\u003eGeographic locations\u003c/li\u003e\n\u003cli\u003eLoyalty program details (specifically from the Mariner Society operated by Holland America, a Carnival brand)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe data suggested direct ties to loyalty tier, potentially enabling attackers to profile high-value cruise guests. The ShinyHunters gang claimed to have stolen over 8.7 million records plus terabytes of internal corporate data, a figure that exceeds the official notification count by more than 2.7 million.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-attribution\"\u003eThreat Actor Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGroup:\u003c/strong\u003e ShinyHunters, a cybercrime extortion gang.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClaim:\u003c/strong\u003e In April 2026, the group posted on their leak site that they possessed documents containing 8.7 million records with personally identifiable information and internal corporate data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecent campaign:\u003c/strong\u003e ShinyHunters has been actively targeting Salesforce customers, running the Salesloft Drift campaign and the Salesforce Aura data theft attacks, claiming billions of stolen records.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFBI advisories:\u003c/strong\u003e The FBI previously warned that paying ransom does not guarantee data deletion or prevent re-extortion. Two weeks before this notification, the FBI issued a specific public service announcement (PSA260515) advising ShinyHunters victims not to pay ransoms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAffected population:\u003c/strong\u003e 5,995,277 individuals notified, primarily customers whose loyalty program data was compromised.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCompany response:\u003c/strong\u003e Carnival acted swiftly to block unauthorized access, engaged third-party security experts, and conducted a thorough investigation before confirming data exfiltration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo ransom confirmation:\u003c/strong\u003e The company did not disclose whether any ransom demand was received or paid.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThird-party verification:\u003c/strong\u003e Have I Been Pwned analyzed the leaked data, confirming the presence of loyalty program fields and other PII.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"carnival-s-breach-history\"\u003eCarnival\u0026rsquo;s Breach History\u003c/h2\u003e\n\n\u003cp\u003eCarnival Corporation has disclosed multiple previous data breaches, illustrating a pattern of recurring incidents:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMarch 2020:\u003c/strong\u003e Unauthorized access to employee email accounts exposed personal and financial information of customers, employees, and crew.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAugust 2020:\u003c/strong\u003e Ransomware attack led to theft of personal information.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDecember 2020:\u003c/strong\u003e Another ransomware incident resulted in data theft.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJune 2021:\u003c/strong\u003e Breach via compromised employee email accounts exposed customer and crew data.\nThis 2026 social-engineering breach adds to that list, reflecting continued exposure despite past security investments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"fbi-guidance-and-wider-shinyhunters-context\"\u003eFBI Guidance and Wider ShinyHunters Context\u003c/h2\u003e\n\n\u003cp\u003eThe FBI\u0026rsquo;s active involvement includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA general ransomware advisory stating that paying ransoms does not prevent further extortion or the sale of data to other criminals.\u003c/li\u003e\n\u003cli\u003eA targeted IC3 Public Service Announcement (PSA260515) specifically addressing ShinyHunters\u0026rsquo; victims, issued shortly before this notification.\nThe combination of Carnival\u0026rsquo;s breach and the broader ShinyHunters Salesforce campaign suggests a systematic threat targeting large consumer-facing organizations with valuable customer databases.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe breach was achieved through social engineering rather than a technical vulnerability, emphasizing the human element in security.\u003c/li\u003e\n\u003cli\u003eLoyalty program records are a high-value target, as they combine identity information with behavioral data.\u003c/li\u003e\n\u003cli\u003eA discrepancy between the 5.99 million notified individuals and the 8.7 million records claimed by ShinyHunters raises questions about potentially unreported data types or exaggeration.\u003c/li\u003e\n\u003cli\u003eThe FBI\u0026rsquo;s repeated warnings against paying ransoms reinforce a “do not pay” posture that victims should consider.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis incident underscores the persistent risk of social engineering attacks against large enterprises and the importance of robust multi-factor authentication, employee training, and rapid incident response.\u003c/p\u003e\n","keyPoints":["Carnival Corporation confirmed a data breach affecting 5,995,277 individuals, attributed to the ShinyHunters extortion gang.","The breach occurred on April 10, 2026, after attackers used social engineering to trick an employee and gain access to IT systems.","Compromised data included names, dates of birth, email addresses, genders, geographic locations, and loyalty program details, as analyzed by Have I Been Pwned.","ShinyHunters claimed to have stolen over 8.7 million records and terabytes of internal corporate data.","The FBI issued guidance advising victims not to pay the attackers' ransom demands."],"insights":["The stolen data included loyalty program status details (specifically from Holland America's Mariner Society), which could enable highly targeted phishing or account takeover attacks against high-value customers.","Despite suffering multiple data breaches since 2020, Carnival was compromised again through basic social engineering, suggesting a persistent failure in employee security awareness training.","ShinyHunters claimed to have stolen 8.7 million records, yet Carnival notified only about 5.99 million people—a gap of over 2.7 million, hinting at either exaggeration by the hackers or the compromise of additional, unreported data categories such as employee or crew records."],"referencedReports":[{"title":"Carnival Breach Analysis","url":"https://haveibeenpwned.com/Breach/Carnival","publisher":"Have I Been Pwned","context":"Analyzed the leaked data and determined it included names, dates of birth, email addresses, genders, geographic locations, and loyalty program details from Holland America's Mariner Society."},{"title":"PSA260515: ShinyHunters Victim Advisory","url":"https://www.ic3.gov/PSA/2026/PSA260515","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"Advisory urging victims not to pay ShinyHunters' ransom demands, issued two weeks before the article."},{"title":"Ransomware - FBI Common Frauds and Scams","url":"https://www.fbi.gov/how-we-can-help-you/scams-and-safety/common-frauds-and-scams/ransomware","publisher":"FBI","context":"Previous warning that paying ransom does not guarantee that threat actors won't extort victims again or sell stolen data."}],"body":"\u003cp\u003eCarnival Corporation confirmed a data breach impacting approximately 5,995,277 individuals, attributed to the ShinyHunters extortion gang who claimed to have stolen over 8.7 million records. The attack began on April 10, 2026, using social engineering to compromise an employee account, with unauthorized data copying identified by April 22. Exposed information includes names, dates of birth, email addresses, genders, geographic locations, and loyalty program details from Holland America\u0026rsquo;s Mariner Society.\u003c/p\u003e\n\n\u003cp\u003eThis incident is the latest in a series of Carnival breaches dating back to 2020. The FBI issued an advisory against paying ransoms after previously warning that payment does not prevent further extortion or data sale. Have I Been Pwned analyzed the leaked dataset, underscoring that loyalty program enrollment data could be exploited for targeted fraud.\u003c/p\u003e\n"},{"n":18,"title":"Critical Gogs RCE Vulnerability Lets Any Authenticated User Execute Arbitrary Code","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/critical-gogs-rce-vulnerability-lets.html","time":"17:24","priority":"MUST READ","score":95,"tldr":"A critical, unpatched vulnerability in Gogs (CVSS 9.4) lets any authenticated user—or anyone who can register—execute arbitrary code on the server by injecting the --exec flag into git rebase through a malicious branch name in a pull request.","briefOverview":"\u003cp\u003eA critical, unpatched remote code execution vulnerability (CVSS 9.4) in Gogs allows any authenticated user to execute arbitrary commands on the server by injecting the \u0026ndash;exec flag into git rebase through a malicious branch name in a pull request. The attack requires no admin privileges or user interaction; a registered user can simply create a repository, enable rebase merging, and trigger the exploit entirely on their own. The flaw remains unpatched despite being reported in March 2026, and a Metasploit module is publicly available.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation grants full server compromise, including access to all hosted repositories, credential dumping, lateral movement, and cross-tenant reading of private repositories. Over 1,100 internet-facing instances are exposed, though many more exist behind VPNs. Immediate mitigations include disabling user registration and repository creation, along with auditing rebase merge settings.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA severe security flaw in the self-hosted Git service Gogs has been disclosed by Rapid7, carrying a CVSS score of 9.4. The vulnerability, which lacks a CVE identifier, allows any authenticated user to achieve remote code execution on the server. It was reported to the project maintainer on March 17, 2026, but remains unpatched across all supported platforms, including Windows, Linux, and macOS.\u003c/p\u003e\n\n\u003cp\u003eThe root cause is an argument injection during the “Rebase before merging” merge operation. An attacker creates a pull request with a maliciously crafted branch name that injects the \u0026ndash;exec flag into the underlying git rebase command. The \u0026ndash;exec flag instructs Git to run a shell command after each replayed commit, effectively turning a standard code integration step into arbitrary command execution. The exploitation is self-contained: a user can register an account, create a repository, toggle rebase merging in the settings, and craft the payload without interacting with any other user. Alternatively, an attacker who has write access to any repository where rebase merging is already enabled can exploit the flaw directly.\u003c/p\u003e\n\n\u003cp\u003eThe impact of successful exploitation is severe and wide-ranging. An attacker can breach the server, gain access to all repositories on the instance, dump stored credentials, move laterally to other network-accessible systems, and tamper with the code in any hosted repository. A particularly dangerous consequence is cross-tenant data exposure, allowing the attacker to read private repositories belonging to other users on the same shared server. When the attacker uses a temporary repository they create and later delete, the only remaining trace is an HTTP 500 error in the server logs; exploiting an existing repository leaves additional artifacts.\u003c/p\u003e\n\n\u003cp\u003eShodan and similar scans show approximately 1,141 Gogs instances reachable from the internet, but the actual number of affected installations is likely far higher because most deployments are placed behind VPNs or on internal networks. Any instance that permits user registration or where untrusted users may have write access to any repository with rebase merging enabled is at risk.\u003c/p\u003e\n\n\u003cp\u003eIn the absence of an official patch, organizations should immediately restrict user registration by setting DISABLE_REGISTRATION=true, prevent arbitrary repository creation with MAX_CREATION_LIMIT=0, and audit which repositories have rebase merging enabled. Rapid7 has released a Metasploit module that automates the full exploit chain for both Linux and Windows targets, including a stealth mode that deletes the attacker’s temporary repository after exploitation, further complicating incident detection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA critical remote code execution (RCE) vulnerability has been identified in Gogs, an open-source self-hosted Git service. Rated 9.4 on the CVSS scale, the flaw allows any authenticated user to execute arbitrary system commands on the server under certain conditions. The issue was discovered and publicly disclosed by Rapid7 security researcher Jonah Burgess on June 5, 2026 (referencing the blog post), after being reported to the maintainer on March 17, 2026. As of the publication of the article, no official patch or CVE identifier has been assigned.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability resides in the “Rebase before merging” merge operation. When a pull request is processed with this method, Gogs invokes \u003ccode\u003egit rebase\u003c/code\u003e with the branch name supplied by the user.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egit rebase\u003c/code\u003e supports an \u003ccode\u003e--exec\u003c/code\u003e flag that executes a shell command after each commit is replayed. By crafting a branch name containing the \u003ccode\u003e--exec\u003c/code\u003e flag and a system command, an attacker can inject arbitrary commands into the rebase operation.\u003c/li\u003e\n\u003cli\u003eFor example, a branch name like \u003ccode\u003efeature/--exec=touch /tmp/pwned\u003c/code\u003e would be interpolated into the \u003ccode\u003egit rebase\u003c/code\u003e invocation, causing the command to be executed by the underlying shell.\u003c/li\u003e\n\u003cli\u003eThe attack does not require administrator privileges or interaction from other users. A registered user can create their own repository, toggle the “rebase merging” option in the repository settings, and then create a pull request with a malicious branch name. The entire chain can be executed by the attacker alone.\u003c/li\u003e\n\u003cli\u003eAn alternative exploitation path exists when an attacker has write access to any repository that already has rebase merging enabled, allowing direct exploitation without needing to create a new repository.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-scenarios\"\u003eExploitation Scenarios\u003c/h2\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eOpen registration instance:\u003c/strong\u003e An attacker registers a new account, creates a repository (the user automatically becomes its owner), enables rebase merging in settings, then creates a pull request from a branch with a specially crafted name. No interaction from other users is required.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRestricted registration but existing write access:\u003c/strong\u003e If user registration is disabled but the attacker has write access to a repository where rebase merging is enabled, they can craft the malicious branch name within that repository and open a pull request to trigger the RCE.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-tenant attack:\u003c/strong\u003e On a shared Gogs instance, exploiting the vulnerability grants the attacker access to the filesystem and the Git data of all repositories, enabling them to read private repositories of other users.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"impact-of-successful-exploitation\"\u003eImpact of Successful Exploitation\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eServer compromise:\u003c/strong\u003e The attacker obtains command execution in the context of the Gogs server process, potentially leading to full system takeover.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRepository access:\u003c/strong\u003e All repositories hosted on the instance become accessible, including source code, secrets, and configuration files.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential dumping:\u003c/strong\u003e Stored credentials (e.g., database or authentication secrets) can be exfiltrated.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLateral movement:\u003c/strong\u003e From the compromised server, the attacker can move to other systems accessible on the network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCode tampering:\u003c/strong\u003e The attacker can modify code in any repository, introducing backdoors or supply-chain compromises.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-tenant data breach:\u003c/strong\u003e Private repositories of all other users on the same instance can be read, violating data isolation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eForensic footprint:\u003c/strong\u003e When the attacker creates and later deletes their own repository, the only detectable artifact is an HTTP 500 error in the server logs. Exploiting an existing repository leaves additional traces.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-systems-and-exposure\"\u003eAffected Systems and Exposure\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAll supported platforms:\u003c/strong\u003e Windows, Linux, and macOS are confirmed vulnerable.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInternet exposure:\u003c/strong\u003e Approximately 1,141 Gogs instances were observed on the public internet at the time of disclosure. However, because Gogs is often deployed behind corporate VPNs or in internal networks, the actual number of vulnerable installations is expected to be significantly higher.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRisk factors:\u003c/strong\u003e Any instance that allows user registration (default configuration) is vulnerable. Instances that restrict registration but have repositories with rebase merging enabled remain at risk if an untrusted user already has write access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitigations-and-response\"\u003eMitigations and Response\u003c/h2\u003e\n\n\u003cp\u003eIn the absence of a vendor patch, Rapid7 recommends the following immediate actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDisable user registration:\u003c/strong\u003e Set \u003ccode\u003eDISABLE_REGISTRATION = true\u003c/code\u003e in \u003ccode\u003eapp.ini\u003c/code\u003e to prevent new accounts from being created.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRestrict repository creation:\u003c/strong\u003e Set \u003ccode\u003eMAX_CREATION_LIMIT = 0\u003c/code\u003e to bar users from creating their own repositories.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAudit rebase merge settings:\u003c/strong\u003e Identify and review repositories that have the rebase merging feature enabled, and consider disabling it where feasible.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eRapid7 has released a Metasploit module that automates the full exploit chain. The module supports:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA \u003cstrong\u003edefault mode\u003c/strong\u003e that creates a temporary repository under the attacker’s account, runs the exploit, and deletes the repository to minimize forensic evidence.\u003c/li\u003e\n\u003cli\u003eA \u003cstrong\u003etargeted mode\u003c/strong\u003e against a repository where the attacker already possesses write and merge access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-observations\"\u003eAdditional Observations\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNo CVE:\u003c/strong\u003e Despite the critical severity, the vulnerability has no CVE identifier, which may delay widespread awareness and coordinated patching efforts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLow detection difficulty:\u003c/strong\u003e When the exploit is performed in a self-cleaning manner (owner-created and deleted repository), the single trace is an HTTP 500 error, making post-incident investigation challenging.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePublic exploit availability:\u003c/strong\u003e The existence of a Metasploit module significantly lowers the barrier to exploitation, increasing the urgency for remediation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe Gogs argument injection vulnerability represents an extremely severe threat to self-hosted Git infrastructure. Its self-contained exploit chain, cross-tenant implications, and minimal forensic footprint make it an attractive target for attackers. Until an official patch is released, organizations must apply the recommended configuration changes immediately and closely monitor their instances for any signs of compromise, even though detection may be limited to log anomalies such as unexpected HTTP 500 errors.\u003c/p\u003e\n","keyPoints":["A critical unpatched vulnerability (CVSS 9.4) in Gogs allows any authenticated user to achieve remote code execution by injecting the --exec flag into git rebase via a malicious branch name in a pull request.","The exploit requires no admin privileges or user interaction, and can be carried out by any registered user who creates a repository and enables rebase merging.","The vulnerability was reported to the maintainer on March 17, 2026, but remains unpatched, affecting all supported platforms including Windows, Linux, and macOS.","Successful exploitation can lead to full server compromise, access to all repositories, credential dumping, lateral movement, and cross-tenant reading of private repositories.","Immediate mitigations include disabling user registration and repository creation, and a Metasploit module is publicly available that automates the full exploit chain."],"insights":["The exploit chain is extremely stealthy: when the attacker uses a temporary self-created repository, the only trace left on the server is an HTTP 500 error in the logs.","Despite its critical severity (CVSS 9.4), the vulnerability has no CVE identifier, which could delay widespread awareness and coordinated patching.","The true number of vulnerable instances is likely far higher than 1,141, as most Gogs deployments reside behind VPNs or on internal networks, shielding them from internet scans but not from insider threats.","The attack requires no user interaction beyond initial registration; an attacker can obtain full RCE entirely through their own account and a single settings toggle, making it a self-contained kill chain.","A publicly available Metasploit module automates the exploit with a stealth option that deletes the temporary repository, rendering post-exploit forensic detection extremely difficult."],"referencedReports":[{"title":"Authenticated RCE via Argument Injection in Gogs (Unfixed)","url":"https://www.rapid7.com/blog/post/ve-authenticated-rce-via-argument-injection-gogs-unfixed/","publisher":"Rapid7","context":"The article cites this Rapid7 blog post by Jonah Burgess as the primary disclosure of the critical Gogs vulnerability, including the technical details of the argument injection and exploit chain."}],"body":"\u003cp\u003eA critical, unpatched remote code execution vulnerability (CVSS 9.4) in Gogs allows any authenticated user to execute arbitrary commands on the server by injecting the \u0026ndash;exec flag into git rebase through a malicious branch name in a pull request. The attack requires no admin privileges or user interaction; a registered user can simply create a repository, enable rebase merging, and trigger the exploit entirely on their own. The flaw remains unpatched despite being reported in March 2026, and a Metasploit module is publicly available.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation grants full server compromise, including access to all hosted repositories, credential dumping, lateral movement, and cross-tenant reading of private repositories. Over 1,100 internet-facing instances are exposed, though many more exist behind VPNs. Immediate mitigations include disabling user registration and repository creation, along with auditing rebase merge settings.\u003c/p\u003e\n"},{"n":19,"title":"ThreatsDay Bulletin: Claude Security Plugin, Azure Priv-Esc, Kali365 MFA Bypass, FIFA Scams +15 More","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/threatsday-bulletin-claude-security.html","time":"13:33","priority":"MUST READ","score":95,"tldr":"Most breaches still succeed through basic trust abuse, social engineering, and overlooked configurations—not advanced tradecraft—underscoring that fundamental security hygiene remains the most critical defense.","briefOverview":"\u003cp\u003eThis bulletin surfaces a wide range of cybersecurity events, from Middle Eastern command-and-control infrastructure numbering over 1,350 servers to a silently patched Azure AKS privilege escalation flaw (CVSS 9.9) and the DAEMON Tools supply chain attack (CVE-2026-8398) that trojanized signed binaries. Several new techniques also emerged, including Vaultjacking, which decrypts an entire Google Password Manager vault using a phished 6-digit PIN, and GhostTree, which weaponizes NTFS junctions to hang endpoint scanners.\u003c/p\u003e\n\n\u003cp\u003eThe human element remains the primary attack vector: Silent Ransom Group conducts in-person visits to law firms, the Kali365 PhaaS platform captures OAuth tokens to bypass MFA on Microsoft 365, and fraudulent FIFA World Cup campaigns exploit cloned SSO login flows. Despite the variety, the common thread is that attackers continue to succeed by abusing trust, misconfigurations, and low-entropy secrets, rather than through advanced tradecraft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHunt.io reported more than 1,350 C2 servers across 98 Middle Eastern providers, with 72.4% hosted by Saudi Telecom (STC). The bulk of malicious activity relies on IoT botnets (Mirai, Mozi, Hajime) and offensive frameworks like Cobalt Strike and Sliver, while phishing and open directories represent only a sliver of the observed artifacts. This concentration of infrastructure underscores the region\u0026rsquo;s role in hosting global botnet operations.\u003c/p\u003e\n\n\u003cp\u003eSupply chain risks featured heavily: The DAEMON Tools incident (CVE-2026-8398, CVSS 9.3) saw attackers trojanize three digitally signed binaries via compromised build infrastructure, leading CISA to add it to the KEV catalog. Separately, a fake RVTools MSI installer signed with a valid Sectigo certificate deployed a modular Python RAT, and 126 Chrome extensions under the WaSteal network silently exfiltrated WhatsApp data and embedded live GTM containers for persistent, update-free remote code execution.\u003c/p\u003e\n\n\u003cp\u003eSocial engineering proved devastating at multiple levels. Silent Ransom Group (Luna Moth) used phone calls and in-person visits to image devices and exfiltrate data from law firms via external drives. The Kali365 Phishing-as-a-Service platform, distributed over Telegram, captures OAuth tokens to bypass MFA on Microsoft 365; Arctic Wolf, Barracuda, and Proofpoint all reported surges in device code phishing, with Barracuda detecting over 7 million such attacks in March–April 2026. FIFA World Cup scams exploited this same human factor, with Group-IB detailing a dedicated campaign (GHOST STADIUM) that clones FIFA\u0026rsquo;s PingIdentity SSO login flow across 300+ domains.\u003c/p\u003e\n\n\u003cp\u003eTechnically novel attacks include Vaultjacking, an adversary-in-the-middle technique that captures a victim\u0026rsquo;s 6-digit Google Password Manager PIN and decrypts the entire synced vault, and GhostTree, which uses a two-line NTFS junction loop to generate infinite file paths and hang EDR scans. Separately, the WaSteal extension network embedded live Google Tag Manager containers to achieve silent remote code execution without Chrome review.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft drew criticism for silently patching a CVSS 9.9 privilege escalation flaw in Azure Backup for AKS after rejecting the researcher\u0026rsquo;s report as \u0026lsquo;AI-generated content,\u0026rsquo; granting cluster-admin to any user with the Backup Contributor role. Apple took the opposite approach by open-sourcing its post-quantum cryptography implementations in corecrypto, with formal verification tools for FIPS \u003csup\u003e203\u003c/sup\u003e\u0026frasl;\u003csub\u003e204\u003c/sub\u003e compliance across over 2.5 billion devices.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin closes by emphasizing that most breaches still originate from trust abuse, stale configurations, lazy access controls, and social engineering—reminders that fundamental security hygiene remains the most critical defense.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"threatsday-bulletin-analysis\"\u003eThreatsDay Bulletin Analysis\u003c/h1\u003e\n\n\u003cp\u003eThe bulletin compiles 17 distinct cybersecurity stories, spanning regional infrastructure, supply chain attacks, social engineering campaigns, novel attack techniques, vulnerability disclosures, and legal/regulatory actions. The underlying message across all items is that despite the appearance of advanced tradecraft, most effective attacks exploit basic trust abuse, misconfigurations, and human factors.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-and-regional-c2-activity\"\u003eInfrastructure and Regional C2 Activity\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMassive Middle East C2 footprint\u003c/strong\u003e: Hunt.io identified over 1,350 C2 servers across 98 providers in three months (Feb 1 – May 1, 2026). C2 infrastructure dominates at 96.8% of observed malicious activity, with phishing (0.5%) and open directories (2.2%) trailing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConcentration in Saudi Telecom (STC)\u003c/strong\u003e: 981 C2 servers (72.4%) reside on STC\u0026rsquo;s infrastructure. Primary malware families include IoT botnets (Hajime, Mozi, Mirai) and offensive frameworks (Tactical RMM, Cobalt Strike, Sliver).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"supply-chain-attacks\"\u003eSupply Chain Attacks\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDAEMON Tools (CVE-2026-8398)\u003c/strong\u003e: Attackers compromised AVB Disc Soft\u0026rsquo;s build/distribution infrastructure, trojanizing three binaries (DTHelper.exe, DiscSoftBusServiceLite.exe, DTShellHlp.exe) while signing them with the legitimate code-signing certificate. CVSS v4 score: 9.3. CISA added it to the Known Exploited Vulnerabilities (KEV) catalog, with FCEB remediation due by May 30, 2026.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTrojanized RVTools installer\u003c/strong\u003e: A fake MSI installer signed with a valid Sectigo certificate (issued to Xiamen Lunwei Huage Network Co.) delivered a modular Python-based RAT. The certificate has since been revoked, but environments without real-time OCSP/CRL checks remain vulnerable. Payload includes AD reconnaissance and encrypted C2 agent.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWaSteal Chrome extension network\u003c/strong\u003e: 126 extensions masquerading as WhatsApp CRM tools exfiltrate personal data, advertising cookies, and voice messages from ~148,000 users. The largest variant (WaSeller, 100k installs) embeds a live Google Tag Manager container, enabling silent, persistent remote code execution without extension updates or Chrome Web Store review.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"social-engineering-and-phishing-campaigns\"\u003eSocial Engineering and Phishing Campaigns\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSilent Ransom Group (SRG/Luna Moth)\u003c/strong\u003e: FBI warns that SRG is targeting law firms via phone calls and phishing emails, posing as IT support. In some cases, they send an individual to the victim\u0026rsquo;s location to physically insert a USB drive and exfiltrate data. Once inside, they escalate privileges and exfiltrate sensitive material without encryption.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePureLogs phishing wave\u003c/strong\u003e: Fortinet describes a campaign using fake purchase order emails with RAR attachments containing malicious JavaScript. The stealer collects hardware/system info, credentials, and cryptocurrency data before exfiltrating to C2.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKali365 Phishing-as-a-Service\u003c/strong\u003e: First observed April 2026, it captures Microsoft 365 OAuth tokens to bypass MFA. Distributed via Telegram with subscriptions ranging from \u003cspan class=\"math inline\"\u003e\\(250 (30 days) to \\)\u003c/span\u003e2,000 (yearly). Features AI-generated lures, automated templates, and real-time dashboards.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDevice code phishing surge\u003c/strong\u003e: Arctic Wolf observed Kali365 used for initial access and rule creation to suppress notifications. Barracuda detected over 7 million device code attacks between March and April 2026. Proofpoint notes the surge as a natural evolution of credential phishing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFIFA World Cup scams\u003c/strong\u003e: Bitdefender identified 55+ malvertising campaigns; Check Point reports increased weekly attacks in host nations (Mexico averaging 3,548 per organization). Group-IB uncovered over 4,300 fraudulent domains and a sophisticated campaign (GHOST STADIUM) using a pixel-perfect clone of FIFA\u0026rsquo;s SSO login flow across 300+ domains, driven by Facebook Ads.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"novel-attack-techniques\"\u003eNovel Attack Techniques\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVaultjacking\u003c/strong\u003e: PhishU demonstrated that an adversary-in-the-middle phishing page capturing a victim\u0026rsquo;s 6-digit Google Password Manager PIN releases the Google Security Domain Secret, decrypting all synced passwords and passkeys—not just the one being registered. Combined with session cookie theft, attackers can add a passkey and unlock the entire vault from their infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGhostTree\u003c/strong\u003e: Varonis found that creating an NTFS junction pointing back at its own parent directory generates infinite recursive file paths with just two lines of code. Endpoint scanners attempting recursive directory reads hang, leaving malicious files in the parent directory unscanned.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"vulnerability-disclosures-and-patches\"\u003eVulnerability Disclosures and Patches\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAzure Backup for AKS privilege escalation\u003c/strong\u003e: Researcher Justin O\u0026rsquo;Leary reported that a user with only the \u0026ldquo;Backup Contributor\u0026rdquo; Azure role (no Kubernetes permissions) could gain cluster-admin on any AKS cluster. The CVSS 9.9 flaw was silently fixed by Microsoft, which initially rejected the report as \u0026ldquo;AI-generated content.\u0026rdquo; Additional validation checks were later added.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApple open-sources PQC\u003c/strong\u003e: Apple published its post-quantum cryptography implementations (ML-KEM, ML-DSA) in the corecrypto library, along with formal verification tools for FIPS \u003csup\u003e203\u003c/sup\u003e\u0026frasl;\u003csub\u003e204\u003c/sub\u003e compliance, used on over 2.5 billion active devices.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClaude security plugin\u003c/strong\u003e: Anthropic introduced a security-guidance plugin that audits code changes during sessions for common vulnerabilities (injection, unsafe deserialization, unsafe DOM APIs) and fixes them automatically. A self-hosted sandbox for Claude Managed Agents was also announced.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cybercrime-and-legal-actions\"\u003eCybercrime and Legal Actions\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRomanian extradited and sentenced\u003c/strong\u003e: Catalin Dragomir received 56 months for breaking into an Oregon state government office and selling access to other U.S. networks, causing at least $250,000 in losses.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUK sanctions crypto evasion\u003c/strong\u003e: The UK sanctioned HTX (Huobi), Bitpapa, and others for supporting the A7 network and Garantex. Elliptic and TRM Labs reported that Huobi sent over \u003cspan class=\"math inline\"\u003e\\(4.9 billion to sanctioned entities, and Rapira Group transacted \\)\u003c/span\u003e375.6 million with Grinex.io.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"regional-threat-landscape\"\u003eRegional Threat Landscape\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDACH surge\u003c/strong\u003e: Check Point reported a 124% increase in hacktivism and ransomware in Germany, Austria, and Switzerland in 2025. Hacktivist incidents (60% involving defacement) came from NoName057(16), Mr Hamza, Dark Storm Team, and others; ransomware mainly from Akira, Qilin, and Safepay. Germany accounted for over 80% of regional incidents.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overarching-takeaways\"\u003eOverarching Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe bulletin\u0026rsquo;s conclusion emphasizes that \u0026ldquo;none of this was especially sophisticated.\u0026rdquo; Breaches still originate from trust abuse, stale configs, lazy access controls, and social engineering. Defenders must assume that signed software, MFA prompts, and \u0026ldquo;internal-only\u0026rdquo; tooling do not guarantee safety.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Hunt.io identified more than 1,350 command-and-control servers across Middle Eastern infrastructure, with Saudi Telecom hosting 72.4% of them, largely running IoT botnets and offensive frameworks.","Microsoft silently fixed a CVSS 9.9 privilege escalation flaw in Azure Backup for AKS that let a Backup Contributor gain full cluster-admin rights, after initially rejecting the report as AI-generated.","The FBI warned that Silent Ransom Group is using phone-based social engineering and in-person visits to gain physical access to law firm computers for data exfiltration.","The Vaultjacking technique captures a victim's 6-digit Google Password Manager PIN via adversary-in-the-middle phishing and decrypts the entire synced credential vault.","A supply chain attack on DAEMON Tools (CVE-2026-8398) trojanized three digitally signed binaries, prompting CISA to add it to the Known Exploited Vulnerabilities catalog."],"insights":["Microsoft's silent patch of a critical AKS flaw after dismissing the report as 'AI-generated content' reveals a dangerous practice of fixing bugs without transparency, leaving defenders unaware of the risk until it's independently disclosed.","The WaSteal Chrome extension network embedded a live Google Tag Manager container, enabling operators to push remote code execution silently without any extension update or Chrome review — a potent, often overlooked supply chain risk.","Vaultjacking shows that a phishing-captured 6-digit Google Password Manager PIN suffices to decrypt the entire synced vault, proving that even password managers collapse to a single low-entropy secret under phishing.","Silent Ransom Group's tactic of sending an individual in-person to a victim's office to image a device blurs the line between physical intrusion and social engineering, making pure remote-focused defenses inadequate.","The GhostTree technique generates infinite recursive file paths with just two lines of code, causing endpoint scanners to hang — a trivial but effective bypass that weaponizes filesystem design against security products."],"referencedReports":[{"title":"Middle East Malicious Infrastructure Report","url":"https://hunt.io/blog/middle-east-malicious-infrastructure-report","publisher":"Hunt.io","context":"Hunt.io identified more than 1,350 command-and-control servers across 98 Middle East infrastructure providers over three months."},{"title":"Azure Backup for AKS Privilege Escalation Bug","url":"https://olearysec.com/research/azure-backup-aks-silent-patch/","publisher":"Justin O'Leary","context":"Microsoft silently fixed a privilege escalation flaw in Azure Backup for AKS allowing Backup Contributor to gain cluster-admin."},{"title":"CISA Adds Three Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/27/cisa-adds-three-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"CISA adds DAEMON Tools supply chain incident to its Known Exploited Vulnerabilities catalog."},{"title":"Formal verification of corecrypto","url":"https://security.apple.com/blog/formal-verification-corecrypto/","publisher":"Apple","context":"Apple open-sourced PQC implementations in corecrypto with mathematical verification tools."},{"title":"Silent Ransom Group Impersonates IT Personnel in Social Engineering Attacks","url":"https://www.ic3.gov/CSA/2026/260526.pdf","publisher":"FBI","context":"FBI warns of Silent Ransom Group targeting law firms through in-person visits and phone calls."},{"title":"Fake Software on GitHub and SourceForge Distributes Deno RAT","url":"https://www.malwarebytes.com/blog/threat-intel/2026/05/fake-software-on-github-and-sourceforge-distribute-deno-rat","publisher":"Malwarebytes","context":"Attackers host counterfeit installers on GitHub and SourceForge to distribute DinDoor backdoor."},{"title":"DinDoor: Deno Runtime Backdoor MSI Analysis","url":"https://hunt.io/blog/dindoor-deno-runtime-backdoor-msi-analysis","publisher":"Hunt.io","context":"DinDoor is a Deno backdoor dropped by fake installers."},{"title":"Phishing Campaign Deploys JavaScript-Driven PureLogs Variant to Steal Sensitive Data","url":"https://www.fortinet.com/blog/threat-research/phishing-campaign-deploys-javascript-driven-purelogs-variant-to-steal-sensitive-data","publisher":"Fortinet","context":"A phishing campaign uses fake purchase orders to deliver a PureLogs stealer variant."},{"title":"UK Designates Cryptoasset Exchanges in Sweeping New Sanctions Package","url":"https://www.elliptic.co/blog/uk-designates-cryptoasset-exchanges-in-sweeping-new-sanctions-package","publisher":"Elliptic","context":"Elliptic noted that HTX is suspected of providing services to A7 and Garantex."},{"title":"UK Designates Huobi, Exmo, Bitpapa and 11 Other Entities for Russian Crypto Sanctions Evasion","url":"https://www.trmlabs.com/resources/blog/uk-designates-huobi-exmo-bitpapa-and-11-other-entities-for-russian-crypto-sanctions-evasion","publisher":"TRM Labs","context":"TRM Labs reported that Huobi sent over $4.9 billion to sanctioned entities."},{"title":"Hacktivists, Ransomware and a 124% Surge: The DACH Threat Picture","url":"https://blog.checkpoint.com/exposure-management/hacktivists-
