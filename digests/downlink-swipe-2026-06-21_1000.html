<script type="application/json" id="dl-articles">[{"n":1,"title":"re: plans for party -- How a Compromised Argentine School Account Targeted K-12 in the U.S.","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/compromised-edu-tenant-display-name-impersonation-same-day-domain-k12","time":"11:00","priority":"MAY READ","score":68,"tldr":"A compromised Microsoft 365 account at an Argentine school sent a highly targeted phishing email to a U.S. K-12 district, impersonating a known contact and passing SPF, DKIM, and DMARC. The attack used a same-day registered credential-harvesting domain, showing why authentication alone cannot stop account-compromise phishing.","briefOverview":"\u003cp\u003eIn May 2026, IRONSCALES detected a spear-phishing campaign targeting a K-12 school district in the eastern United States. The email came from a compromised Microsoft 365 account belonging to an Argentine educational institution, escueladelaciudad[.]com[.]ar. It used the exact display name of a known community contact and a casual subject line, “re: plans for party,” to make the message appear familiar and low-risk.\u003c/p\u003e\n\n\u003cp\u003eThe message passed SPF, DKIM, and DMARC because it was sent through the legitimate Microsoft 365 tenant of the compromised account. The email contained a single link to bgiur[.]ethrecn[.]com/ulusouaienkueortkeci, using ethrecn[.]com, a domain registered the same day as the attack. IRONSCALES said the same-day domain, randomized URL path, unfamiliar sender address, and display-name mismatch were key signs of a credential-harvesting attempt.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that email authentication checks can succeed even when an attacker is using a hijacked account, because those checks verify authorized sending infrastructure rather than user intent. IRONSCALES community intelligence flagged the incident based on patterns from similar campaigns, and the message was quarantined before the recipient engaged. The case is mapped to MITRE ATT\u0026amp;CK techniques T1566.002, T1036.005, and T1586.002.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["IRONSCALES detected a spear-phishing campaign in May 2026 targeting a K-12 school district in the eastern United States.","The phishing email originated from a compromised Microsoft 365 account at an Argentine educational institution and used exact display name impersonation of a known community contact.","The message passed SPF, DKIM, and DMARC because it was sent through the legitimate Microsoft 365 tenant of the compromised account.","The email contained a single credential-harvesting link to bgiur.ethrecn.com/ulusouaienkueortkeci, using a domain registered the same day as the attack.","IRONSCALES community intelligence flagged the incident, and the message was quarantined before the recipient engaged."],"insights":["SPF, DKIM, and DMARC all passed because the attacker used a compromised account inside a legitimate Microsoft 365 tenant, showing that email authentication cannot distinguish between the real user and someone using stolen credentials.","The display name matched a known contact while the sender address did not, making the mismatch between familiar names and unfamiliar addresses a strong detection signal even when authentication checks succeed.","The same-day registration of ethrecn.com helped the phishing link avoid reputation-based detection because the domain had no prior history, abuse reports, or blocklist entries.","The casual subject line “re: plans for party” reduced suspicion by imitating an ongoing personal conversation rather than using a typical financial or IT-themed lure.","Community intelligence provided the decisive detection signal by matching the message against similar campaign patterns, while automated analysis alone assigned only a baseline confidence score."],"referencedReports":[],"body":"\u003cp\u003eIn May 2026, IRONSCALES detected a spear-phishing campaign targeting a K-12 school district in the eastern United States. The email came from a compromised Microsoft 365 account belonging to an Argentine educational institution, escueladelaciudad[.]com[.]ar. It used the exact display name of a known community contact and a casual subject line, “re: plans for party,” to make the message appear familiar and low-risk.\u003c/p\u003e\n\n\u003cp\u003eThe message passed SPF, DKIM, and DMARC because it was sent through the legitimate Microsoft 365 tenant of the compromised account. The email contained a single link to bgiur[.]ethrecn[.]com/ulusouaienkueortkeci, using ethrecn[.]com, a domain registered the same day as the attack. IRONSCALES said the same-day domain, randomized URL path, unfamiliar sender address, and display-name mismatch were key signs of a credential-harvesting attempt.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that email authentication checks can succeed even when an attacker is using a hijacked account, because those checks verify authorized sending infrastructure rather than user intent. IRONSCALES community intelligence flagged the incident based on patterns from similar campaigns, and the message was quarantined before the recipient engaged. The case is mapped to MITRE ATT\u0026amp;CK techniques T1566.002, T1036.005, and T1586.002.\u003c/p\u003e\n"}]</script>
