<script type="application/json" id="dl-articles">[{"n":1,"title":"CISA sets urgent deadline to fix Cisco flaw exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-sets-urgent-deadline-to-fix-cisco-flaw-exploited-in-attacks/","time":"19:43","priority":"MUST READ","score":94,"tldr":"CISA ordered U.S. federal agencies to urgently patch an actively exploited critical Cisco Unified Communications Manager SSRF flaw, CVE-2026-20230, by June 28. The agency also set the same deadline for a critical PTC Windchill and FlexPLM remote code execution flaw, CVE-2026-12569.","briefOverview":"\u003cp\u003eCISA is giving U.S. federal agencies until Sunday, June 28, to patch CVE-2026-20230, a vulnerability in Cisco Unified Communications Manager Server that is being actively exploited. The flaw is a server-side request forgery issue and has been added to CISA’s Known Exploited Vulnerabilities catalog. Under Binding Operational Directive 26-04, the remediation is considered urgent.\u003c/p\u003e\n\n\u003cp\u003eCisco rated CVE-2026-20230 as critical and released a patch on June 3. The company warned that the flaw could be exploited remotely and without authentication through specially crafted HTTP requests. At the time, Cisco said proof-of-concept exploit code existed but that it had found no evidence of active exploitation. Last weekend, Defused observed the vulnerability being exploited to write arbitrary text files to affected endpoints.\u003c/p\u003e\n\n\u003cp\u003eCISA also added CVE-2026-12569 to the Known Exploited Vulnerabilities catalog and set the same June 28 deadline for federal agencies to patch it. The flaw affects PTC Windchill and FlexPLM, product lifecycle management systems used in industries including manufacturing, engineering, retail, footwear, apparel, and consumer products. CVE-2026-12569 is a critical remote code execution vulnerability involving deserialization of untrusted data, and PTC said it affects all versions up to 11.0 and multiple versions of the 11.1, 11.2, 12.0, 12.1, and 13.0 release branches.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA added CVE-2026-20230, a server-side request forgery vulnerability in Cisco Unified Communications Manager Server, to its Known Exploited Vulnerabilities catalog after active exploitation was reported.","Federal agencies have until Sunday, June 28, under Binding Operational Directive 26-04 to remediate CVE-2026-20230.","Cisco rated CVE-2026-20230 as critical and released a patch on June 3, warning that it could be exploited remotely without authentication through specially crafted HTTP requests.","CISA also added CVE-2026-12569, a critical remote code execution flaw affecting PTC Windchill and FlexPLM, to the Known Exploited Vulnerabilities catalog with the same June 28 remediation deadline.","PTC disclosed CVE-2026-12569 on June 18 and said it affects all versions up to 11.0 and multiple versions of the 11.1, 11.2, 12.0, 12.1, and 13.0 release branches."],"insights":["CISA’s June 28 deadline is unusually urgent, giving agencies only until Sunday to remediate or stop using the affected products under BOD 26-04.","Cisco’s flaw moved from having only proof-of-concept exploit code and no known exploitation on June 3 to observed in-the-wild attacks within the same month.","The observed Cisco exploitation involved writing arbitrary text files to affected endpoints, making the issue more concrete than a theoretical remote flaw.","The PTC issue has broad operational relevance because Windchill and FlexPLM are used across manufacturing, engineering, retail, footwear, apparel, and consumer products industries."],"referencedReports":[{"title":"Windchill \u0026 FlexPLM RCE Vulnerability","url":"https://www.ptc.com/en/about/trust-center/advisory-center/active-advisories/windchill-flexplm-rce-vulnerability","publisher":"PTC","context":"The article says PTC published this security advisory after disclosing CVE-2026-12569 and used it to direct customers to affected versions and remediation steps.","category":"","primary":false}],"body":"\u003cp\u003eCISA is giving U.S. federal agencies until Sunday, June 28, to patch CVE-2026-20230, a vulnerability in Cisco Unified Communications Manager Server that is being actively exploited. The flaw is a server-side request forgery issue and has been added to CISA’s Known Exploited Vulnerabilities catalog. Under Binding Operational Directive 26-04, the remediation is considered urgent.\u003c/p\u003e\n\n\u003cp\u003eCisco rated CVE-2026-20230 as critical and released a patch on June 3. The company warned that the flaw could be exploited remotely and without authentication through specially crafted HTTP requests. At the time, Cisco said proof-of-concept exploit code existed but that it had found no evidence of active exploitation. Last weekend, Defused observed the vulnerability being exploited to write arbitrary text files to affected endpoints.\u003c/p\u003e\n\n\u003cp\u003eCISA also added CVE-2026-12569 to the Known Exploited Vulnerabilities catalog and set the same June 28 deadline for federal agencies to patch it. The flaw affects PTC Windchill and FlexPLM, product lifecycle management systems used in industries including manufacturing, engineering, retail, footwear, apparel, and consumer products. CVE-2026-12569 is a critical remote code execution vulnerability involving deserialization of untrusted data, and PTC said it affects all versions up to 11.0 and multiple versions of the 11.1, 11.2, 12.0, 12.1, and 13.0 release branches.\u003c/p\u003e\n"},{"n":3,"title":"FBI Warns Russian Intelligence Hackers Target Signal Backup Recovery Keys","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fbi-warns-russian-intelligence-hackers.html","time":"19:38","priority":"MUST READ","score":92,"tldr":"The FBI and CISA warn that Russian intelligence-linked hackers are phishing high-value targets into revealing Signal Backup Recovery Keys, letting attackers restore message archives and potentially take over accounts. Signal users should never share recovery keys, codes, or PINs in chats and should regenerate the key immediately if it may have been exposed.","briefOverview":"\u003cp\u003eThe FBI and CISA updated their March warning about Russian intelligence-linked phishing of Signal accounts, saying the operators are now trying to get targets to hand over their Signal Backup Recovery Key. If attackers obtain the key, they can restore the account’s backup, read private and group message history, and take over the account. The advisory says the old key can still be used even if a new account is created on the same phone number.\u003c/p\u003e\n\n\u003cp\u003eThe updated advisory identifies the activity as UNC5792 and UNC4221 and ties it to multiple Russian Intelligence Services groups, including FSB officers embedded with the FSB Border Guards and others working for Russian military services. The campaign targets high-intelligence-value individuals such as current and former U.S. and international government officials, military personnel, political figures, journalists, and officials in Ukraine. The March notice said the broader campaign had already compromised thousands of accounts worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe phishing messages pose as Signal support and walk targets through turning on backups, opening the Recovery Key, and pasting it into the chat. The agencies say this does not break Signal’s encryption or the app itself, but compromises individual accounts through social engineering and a legitimate feature. Recommended steps include treating in-app messages from “Signal support” as hostile, never sharing recovery keys, codes, or PINs in chat, checking linked devices, and generating a new key if the old one may have been shared.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The FBI and CISA updated their March warning to say Russian intelligence-linked operators are now trying to coax targets into handing over their Signal Backup Recovery Key.","If attackers obtain a Signal Backup Recovery Key, they can restore the account’s backup, read private and group message history, and take over the account.","The updated advisory identifies the activity with the public tracking names UNC5792 and UNC4221 and ties it to multiple Russian Intelligence Services groups.","The campaign targets high-intelligence-value individuals, including current and former U.S. and international government officials, military personnel, political figures, journalists, and officials in Ukraine.","The agencies state that the activity does not break Signal’s encryption or the app itself, but instead compromises individual accounts through social engineering and legitimate features."],"insights":["A compromised Signal Backup Recovery Key can remain useful to attackers even if the victim creates a new account on the same phone number, so regenerating the key is necessary to block future backup downloads.","Generating a new Signal Backup Recovery Key invalidates the old one going forward, but it cannot undo any message history that attackers may have already restored.","The phishing has shifted from asking for one-time codes or PINs to targeting the backup key, which can expose an entire saved message archive rather than only enabling account access at one moment.","Messages claiming to be from “Signal support” inside the app are specifically called out as hostile because real support does not ask users in chat for codes, PINs, or recovery keys."],"referencedReports":[{"title":"PSA I-062626-PSA","url":"https://www.ic3.gov/PSA/2026/PSA260626","publisher":"FBI IC3 and CISA","context":"The article is based on this updated advisory warning that Russian intelligence-linked actors are phishing Signal Backup Recovery Keys.","category":"","primary":false},{"title":"PSA I-032026-PSA","url":"https://www.ic3.gov/PSA/2026/PSA260320","publisher":"FBI IC3 and CISA","context":"The article references the March notice as the earlier warning that described the broader campaign against Signal and WhatsApp accounts.","category":"","primary":false},{"title":"Russia Targeting Signal Messenger","url":"https://cloud.google.com/blog/topics/threat-intelligence/russia-targeting-signal-messenger/","publisher":"Google Threat Intelligence Group","context":"The article cites Google Threat Intelligence Group as first documenting UNC5792 abusing Signal’s linked-device feature in early 2025.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI and CISA updated their March warning about Russian intelligence-linked phishing of Signal accounts, saying the operators are now trying to get targets to hand over their Signal Backup Recovery Key. If attackers obtain the key, they can restore the account’s backup, read private and group message history, and take over the account. The advisory says the old key can still be used even if a new account is created on the same phone number.\u003c/p\u003e\n\n\u003cp\u003eThe updated advisory identifies the activity as UNC5792 and UNC4221 and ties it to multiple Russian Intelligence Services groups, including FSB officers embedded with the FSB Border Guards and others working for Russian military services. The campaign targets high-intelligence-value individuals such as current and former U.S. and international government officials, military personnel, political figures, journalists, and officials in Ukraine. The March notice said the broader campaign had already compromised thousands of accounts worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe phishing messages pose as Signal support and walk targets through turning on backups, opening the Recovery Key, and pasting it into the chat. The agencies say this does not break Signal’s encryption or the app itself, but compromises individual accounts through social engineering and a legitimate feature. Recommended steps include treating in-app messages from “Signal support” as hostile, never sharing recovery keys, codes, or PINs in chat, checking linked devices, and generating a new key if the old one may have been shared.\u003c/p\u003e\n"},{"n":4,"title":"New SharkLoader Malware Deploys Cobalt Strike in StrikeShark Cyberattacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-sharkloader-malware-deploys-cobalt.html","time":"18:17","priority":"SHOULD READ","score":88,"tldr":"Kaspersky reports a broad, likely Chinese-speaking campaign called StrikeShark that uses a new SharkLoader malware to deploy Cobalt Strike after exploiting public-facing server vulnerabilities or using malicious installers. Targets include diplomatic, government, and software development organizations across multiple countries, suggesting possible espionage despite no confirmed data exfiltration yet.","briefOverview":"\u003cp\u003eKaspersky has identified a newly discovered cyberattack campaign called StrikeShark that delivers a previously undocumented malware family named SharkLoader. SharkLoader acts as a loader for deploying Cobalt Strike Beacon on compromised hosts. The campaign has targeted a diplomatic organization in Indonesia, government organizations in Taiwan, software development companies across multiple countries, and entities in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.\u003c/p\u003e\n\n\u003cp\u003eThe campaign has no direct links to a known threat actor, but Kaspersky believes it is likely the work of a Chinese-speaking threat actor based on the use of open-source post-compromise tools commonly used by Chinese-speaking developers. Initial access has involved exploiting known vulnerabilities in public-facing systems, including flaws in Exchange Server, Openfire, GeoServer, Apache Shiro, Hikvision products, Microsoft SharePoint, Zimbra Collaboration Suite, F5 BIG-IP, Fortinet FortiOS, React Server Components, and Cisco IOS XE Web UI. The attackers are assessed as likely using publicly available proof-of-concept exploits from GitHub or other open-source platforms.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining access, the operators deploy web shells and use a DLL side-loading chain involving SystemSettings.exe to deliver SharkLoader, or they use custom droppers disguised as legitimate installers such as Google Update and Cisco AnyConnect. SharkLoader uses Perfect DLL Hijacking, decrypts and loads additional components, and ultimately runs Cobalt Strike Beacon after installing API hooks and resuming a suspended thread. The activity also includes reconnaissance, Active Directory enumeration, credential theft targeting LSASS and the NTDS database file, and deployment of tools such as FScan, Searchall, and Pillager, while Kaspersky said there is no clear evidence of active data exfiltration so far.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Kaspersky is tracking a newly discovered campaign called StrikeShark that delivers a previously undocumented malware family named SharkLoader to deploy Cobalt Strike Beacon on compromised hosts.","The campaign has targeted a diplomatic organization in Indonesia, government organizations in Taiwan, software development companies across multiple countries, and entities in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.","The attackers have used known vulnerabilities in public-facing applications, including flaws in Exchange Server, Openfire, GeoServer, Apache Shiro, Hikvision products, Microsoft SharePoint, Zimbra Collaboration Suite, F5 BIG-IP, Fortinet FortiOS, React Server Components, and Cisco IOS XE Web UI.","SharkLoader is delivered through web shells that trigger a DLL side-loading chain involving SystemSettings.exe, as well as through custom dropper executables disguised as legitimate installers or applications such as Google Update and Cisco AnyConnect.","After compromise, the threat actor performs reconnaissance, Active Directory enumeration, credential theft targeting LSASS and the NTDS database file, and deployment of open-source tools such as FScan, Searchall, and Pillager."],"insights":["StrikeShark appears to rely on opportunistic exploitation of many known public-facing application flaws, indicating that long-known vulnerabilities such as ProxyLogon and newer flaws such as CVE-2024-36401 are both relevant to this campaign.","The campaign uses two distinct SharkLoader delivery approaches: server-side web shells with DLL side-loading and custom droppers disguised as legitimate software installers, so detection efforts cannot focus on only one infection path.","SharkLoader uses Perfect DLL Hijacking and API hooks around VirtualAlloc and Sleep to execute Cobalt Strike while attempting to evade memory scanning techniques that look for executable memory regions.","SharkLoader does not include its own persistence mechanism, but the operators compensate by using Registry Run keys and scheduled tasks to launch SystemSettings.exe during user logon or even when no user is logged in.","Although Kaspersky has not observed active data exfiltration, the combination of government and software-development targets with post-compromise reconnaissance and credential theft makes the campaign significant even before confirmed theft is seen."],"referencedReports":[{"title":"StrikeShark campaign","url":"https://securelist.com/strikeshark-campaign/120326/","publisher":"Kaspersky","context":"The article cites Kaspersky’s research as the source for tracking the StrikeShark campaign, its victimology, infection paths, and SharkLoader behavior.","category":"","primary":false},{"title":"Perfect DLL Hijacking","url":"https://elliotonsecurity.com/perfect-dll-hijacking/","publisher":"Elliot Killick","context":"The article references this technical analysis to explain the Perfect DLL Hijacking technique used by SharkLoader.","category":"","primary":false}],"body":"\u003cp\u003eKaspersky has identified a newly discovered cyberattack campaign called StrikeShark that delivers a previously undocumented malware family named SharkLoader. SharkLoader acts as a loader for deploying Cobalt Strike Beacon on compromised hosts. The campaign has targeted a diplomatic organization in Indonesia, government organizations in Taiwan, software development companies across multiple countries, and entities in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.\u003c/p\u003e\n\n\u003cp\u003eThe campaign has no direct links to a known threat actor, but Kaspersky believes it is likely the work of a Chinese-speaking threat actor based on the use of open-source post-compromise tools commonly used by Chinese-speaking developers. Initial access has involved exploiting known vulnerabilities in public-facing systems, including flaws in Exchange Server, Openfire, GeoServer, Apache Shiro, Hikvision products, Microsoft SharePoint, Zimbra Collaboration Suite, F5 BIG-IP, Fortinet FortiOS, React Server Components, and Cisco IOS XE Web UI. The attackers are assessed as likely using publicly available proof-of-concept exploits from GitHub or other open-source platforms.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining access, the operators deploy web shells and use a DLL side-loading chain involving SystemSettings.exe to deliver SharkLoader, or they use custom droppers disguised as legitimate installers such as Google Update and Cisco AnyConnect. SharkLoader uses Perfect DLL Hijacking, decrypts and loads additional components, and ultimately runs Cobalt Strike Beacon after installing API hooks and resuming a suspended thread. The activity also includes reconnaissance, Active Directory enumeration, credential theft targeting LSASS and the NTDS database file, and deployment of tools such as FScan, Searchall, and Pillager, while Kaspersky said there is no clear evidence of active data exfiltration so far.\u003c/p\u003e\n"},{"n":2,"title":"Polymarket customers lose $3 million in supply-chain attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/polymarket-customers-lose-3-million-in-supply-chain-attack/","time":"18:04","priority":"SHOULD READ","score":82,"tldr":"Polymarket will reimburse users after a third-party frontend supply-chain compromise injected malicious JavaScript into its official site, tricking users into approving fraudulent transactions. Blockchain firms estimate about $3 million was stolen from fewer than 15 accounts and later swapped into roughly 1,893 ETH.","briefOverview":"\u003cp\u003ePolymarket says it will fully reimburse customers who lost an estimated $3 million after hackers injected a malicious script into the platform\u0026rsquo;s frontend. The company said the incident was a supply-chain attack that affected a dependency on its website through a third-party vendor. Users were tricked into approving fraudulent transactions on the official Polymarket website, while Polymarket said its own servers and backend infrastructure were not impacted.\u003c/p\u003e\n\n\u003cp\u003ePolymarket is a cryptocurrency-based prediction market that lets users trade contracts tied to the expected outcomes of events. The platform offers markets for sports, economic indicators, weather patterns, awards, political and legislative outcomes, and military conflicts. Founded in 2020, it is valued at $9 billion, handles billions of dollars in trading volume, and serves as an influential source of information on market expectations.\u003c/p\u003e\n\n\u003cp\u003eBlockchain security firm PeckShield said the incident was a phishing campaign that stole approximately $3 million worth of ParyonUSD from users. PeckShield said the attacker bridged the stolen funds from Polygon to Ethereum and swapped them into about 1,893 Ether. Visual analytics company Bubblemaps said the incident affected fewer than 15 accounts and published a list of some affected accounts and wallets holding the stolen funds.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Polymarket says it will fully reimburse customers who lost an estimated $3 million after hackers injected a malicious script into the platform's frontend through a third-party vendor dependency.","During the attack, users were tricked into approving fraudulent transactions on the official Polymarket website, while Polymarket says its own servers and backend infrastructure were not impacted.","Blockchain security firm PeckShield said the campaign stole approximately $3 million worth of ParyonUSD from users, which was bridged from Polygon to Ethereum and swapped into about 1,893 Ether.","Visual analytics company Bubblemaps said the incident affected fewer than 15 accounts and published some affected accounts and wallets holding the stolen funds.","Polymarket is a cryptocurrency-based prediction market valued at $9 billion that handles billions of dollars in trading volume."],"insights":["The compromise shows that a platform’s official website can become a vehicle for fraudulent transactions even when the company says its own servers and backend systems were not affected.","The theft appears highly concentrated, with Bubblemaps estimating fewer than 15 affected accounts despite the platform handling billions of dollars in trading volume.","The attacker quickly moved the stolen value across chains from Polygon to Ethereum and converted it into Ether, making cross-chain transaction tracking central to understanding the incident.","Polymarket’s reimbursement pledge shifts the immediate financial burden away from affected customers, even though the reported entry point was a third-party frontend dependency."],"referencedReports":[],"body":"\u003cp\u003ePolymarket says it will fully reimburse customers who lost an estimated $3 million after hackers injected a malicious script into the platform\u0026rsquo;s frontend. The company said the incident was a supply-chain attack that affected a dependency on its website through a third-party vendor. Users were tricked into approving fraudulent transactions on the official Polymarket website, while Polymarket said its own servers and backend infrastructure were not impacted.\u003c/p\u003e\n\n\u003cp\u003ePolymarket is a cryptocurrency-based prediction market that lets users trade contracts tied to the expected outcomes of events. The platform offers markets for sports, economic indicators, weather patterns, awards, political and legislative outcomes, and military conflicts. Founded in 2020, it is valued at $9 billion, handles billions of dollars in trading volume, and serves as an influential source of information on market expectations.\u003c/p\u003e\n\n\u003cp\u003eBlockchain security firm PeckShield said the incident was a phishing campaign that stole approximately $3 million worth of ParyonUSD from users. PeckShield said the attacker bridged the stolen funds from Polygon to Ethereum and swapped them into about 1,893 Ether. Visual analytics company Bubblemaps said the incident affected fewer than 15 accounts and published a list of some affected accounts and wallets holding the stolen funds.\u003c/p\u003e\n"},{"n":5,"title":"Time Travel Debugging with Codex","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/26/time-travel-debugging-with-codex/","time":"20:03","priority":"MAY READ","score":68,"tldr":"SpecterOps shows that giving Codex access to Time Travel Debugging traces via TTDObjectsPy helped it solve the FLARE-ON FlareAuthenticator reverse-engineering challenge faster and correctly by grounding analysis in real execution history instead of static decompiler guesses. The key takeaway is that queryable runtime traces can reduce speculative reasoning and false confidence when LLMs analyze obfuscated binaries.","briefOverview":"\u003cp\u003eSpecterOps describes an experiment using Codex with Time Travel Debugging traces through TTDObjectsPy to solve the FLARE-ON 12 FlareAuthenticator challenge. The target was a Windows Qt GUI program where a user enters a 25-digit code and receives either a rejection or a flag. The article compares two local Codex sessions using the same goal: one without any TTD tooling and one with TTDObjectsPy enabled.\u003c/p\u003e\n\n\u003cp\u003eThe session without TTD made progress by identifying the Qt GUI structure, keypad mapping, relevant slots, and success and failure message-box paths. However, it relied on indirect evidence, forced execution down a success-looking path, inferred the flag from a partial visual clue, and produced an incorrect flag after 1:51:28.706 and 69,501,208 total logged tokens. The article presents this as an example of how static analysis and instrumentation can still leave an LLM with plausible but wrong conclusions.\u003c/p\u003e\n\n\u003cp\u003eThe TTDObjectsPy session used recorded execution history to ask what code ran on keypad and OK clicks, what state was compared, and how keypad input changed that state. It found that the OK handler compared a 64-bit state field at window+0x78 against 0x0bc42d5779fec401, extracted a 25-by-10 digit contribution table, solved the constraint with OR-Tools CP-SAT, and recovered the correct passcode and flag. The article concludes that queryable execution history can help keep LLM-assisted reverse engineering grounded in runtime facts, while noting that TTD has operational overhead such as disk usage, capture failures, GUI automation races, and trace cleanup.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article describes using TTDObjectsPy to give Codex programmatic access to Time Travel Debugging traces during reverse engineering.","The target was the FLARE-ON 12 FlareAuthenticator challenge, a Windows Qt GUI program that accepts a 25-digit code and either rejects it or shows a flag.","In the session without TTD, Codex identified relevant UI and submit paths but ultimately produced an incorrect flag after 1:51:28.706 and 69,501,208 total logged tokens.","In the session with TTDObjectsPy, Codex used execution traces to identify a 64-bit state comparison, extract digit contributions, solve the constraint, and recover the correct passcode and flag.","The article concludes that queryable execution history can help keep LLM-assisted reverse engineering grounded in program behavior and reduce speculative detours when behavior is runtime-dependent."],"insights":["The TTD-enabled session avoided fully untangling the heavily flattened validation code by turning the problem into targeted runtime questions about which state was compared and how keypad presses changed it.","The failed non-TTD run shows that an LLM can do extensive useful reverse-engineering work and still arrive at a plausible but incorrect result when its evidence depends on forced paths, screenshots, and inference.","The decisive runtime artifact was a single 64-bit state field at window+0x78 compared against 0x0bc42d5779fec401, which let Codex focus on extracting a digit contribution table instead of reasoning about the entire obfuscated submit path.","TTDObjectsPy made execution history useful as a searchable data source for Codex, enabling queries about register values, memory changes, function arguments, and the instruction responsible for writing a value.","The article highlights that TTD has practical overhead, including disk usage, capture failures, GUI automation races, and trace cleanup, so its value is strongest when important behavior depends on runtime state."],"referencedReports":[],"body":"\u003cp\u003eSpecterOps describes an experiment using Codex with Time Travel Debugging traces through TTDObjectsPy to solve the FLARE-ON 12 FlareAuthenticator challenge. The target was a Windows Qt GUI program where a user enters a 25-digit code and receives either a rejection or a flag. The article compares two local Codex sessions using the same
