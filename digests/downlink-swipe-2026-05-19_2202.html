Bypass specific antivirus products like Norton\u003c/li\u003e\n\u003cli\u003ePerform site-wide hijacking\u003c/li\u003e\n\u003cli\u003eRedirect users conditionally based on browser language or environment\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"timeline-and-iterative-maintenance\"\u003eTimeline and Iterative Maintenance\u003c/h3\u003e\n\n\u003cp\u003eThe earliest explicit timestamp in PDB paths is September 30, 2021. Naming conventions like \u0026ldquo;dll0217\u0026rdquo;, \u0026ldquo;dll0301\u0026rdquo;, and \u0026ldquo;dll0315\u0026rdquo; demonstrate periods of rapid sprint-like updates. The \u0026ldquo;dll-no503\u0026rdquo; directory represents a troubleshooting build to resolve IIS \u0026ldquo;503 Service Unavailable\u0026rdquo; errors. The latest observed compilation date, \u0026ldquo;dll20260106\u0026rdquo; (January 6, 2026), confirms active maintenance as of early 2026.\u003c/p\u003e\n\n\u003ch3 id=\"feature-branching-and-evasion-tactics\"\u003eFeature Branching and Evasion Tactics\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFolder \u0026ldquo;兼容百度浏览器+劫持robots.txt\u0026rdquo; (Compatible with Baidu browser + hijacking robots.txt) confirms malware\u0026rsquo;s role in malicious SEO campaigns targeting the Chinese search engine ecosystem.\u003c/li\u003e\n\u003cli\u003eThe \u0026ldquo;2024-05-05-tcp\u0026rdquo; branch indicates a shift in how the malware handles network traffic, potentially introducing custom proxying or SEO fraud communication protocols over raw TCP.\u003c/li\u003e\n\u003cli\u003eThe inclusion of \u0026ldquo;过诺顿\u0026rdquo; (\u0026ldquo;bypass Norton\u0026rdquo;) in build paths highlights a reactive development cycle, demonstrating the author actively modifies code to evade specific security vendor detections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"builder-architecture-and-badiis-generation\"\u003eBuilder Architecture and BadIIS Generation\u003c/h2\u003e\n\n\u003cp\u003eTalos discovered a builder tool specifically designed for this malware variant. The observed builder is labeled \u0026ldquo;version 1.0\u0026rdquo; with an estimated original release year of 2021, compiled on August 22, 2022. Its interface fields and configurable settings align with four primary functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTraffic Redirection\u003c/strong\u003e: Input target URLs, typically JavaScript-based redirectors, to forcibly redirect legitimate traffic to spam infrastructure (illegal gambling, adult content, or other malicious sites).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReverse Proxy\u003c/strong\u003e: Manipulates how compromised server interacts with search engine crawlers. When a crawler visits specific hidden URLs, BadIIS acts as a reverse proxy, fetching illicit content from C2 backend. The builder includes a toggle for global reverse proxy behavior.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContent Hijacking\u003c/strong\u003e: Replaces compromised website\u0026rsquo;s original content for both normal users and crawlers. Threat actors configure hijacking rate, toggle homepage targeting, and supply a remote URL to fetch malicious title, description, and keyword metadata.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInternal and Backlinks Setting\u003c/strong\u003e: Configures injection of internal links and external backlinks. Internal links force search engines to discover spam pages; external backlinks siphon the compromised server\u0026rsquo;s Domain Authority to inflate external illicit sites\u0026rsquo; rankings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"builder-workflow\"\u003eBuilder Workflow\u003c/h3\u003e\n\n\u003cp\u003eThe threat actor must stage unconfigured 32-bit and 64-bit BadIIS binaries in the same directory. The builder generates a \u0026ldquo;config.txt\u0026rdquo; file based on configured parameters, then authenticates with the C2 server by checking for the specific response string \u0026ldquo;lwxat\u0026rdquo;. Although validation is not enforced (payload generation continues regardless), this behavior is a critical pivot for identifying other tools by the same author. Finally, C2 addresses are obfuscated using single-byte XOR with key 0x3 and embedded into final malware.\u003c/p\u003e\n\n\u003ch3 id=\"advancement-of-builder-architecture\"\u003eAdvancement of Builder Architecture\u003c/h3\u003e\n\n\u003cp\u003ePrevious BadIIS variants deployed by groups like DragonRank and UAT-8099 relied on hardcoded C2 and statically compiled payloads. The \u0026ldquo;demo.pdb\u0026rdquo; variant represents a significant departure. Talos assesses with moderate confidence this is commodity malware likely sold privately or shared within underground markets, with a modular MaaS business model. The developer can initially sell a basic version with builder; customers can later request bespoke payloads (Norton bypass, custom site hijacking) and use their existing builder to inject configurations.\u003c/p\u003e\n\n\u003ch2 id=\"additional-tools-developed-by-same-author\"\u003eAdditional Tools Developed by Same Author\u003c/h2\u003e\n\n\u003cp\u003eBy pivoting on PDB strings and the authentication mechanism, Talos discovered a suite of auxiliary tools:\u003c/p\u003e\n\n\u003ch3 id=\"early-service-based-installer\"\u003eEarly Service-based Installer\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eRuns as Windows service named \u0026ldquo;Winlogin\u0026rdquo;.\u003c/li\u003e\n\u003cli\u003eInitiates two-stage C2 communication: primary for authentication (checking response \u0026ldquo;lwxat\u0026rdquo;), secondary to download and execute additional payloads.\u003c/li\u003e\n\u003cli\u003eUses double Base64 encoding to obfuscate C2 server addresses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"configuration-driven-service-installer\"\u003eConfiguration-Driven Service Installer\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eDynamically locates and reads external \u0026ldquo;config.txt\u0026rdquo; file with XML-like syntax (custom tags like \u003cglobalModules\u003e, \u003cname\u003e, \u003cpath\u003e, \u003ccmd\u003e).\u003c/li\u003e\n\u003cli\u003ePrepares commands for both 32-bit and 64-bit BadIIS, executing them via cmd.exe /c.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"authentication-and-configuration-driven-unified-tool\"\u003eAuthentication and Configuration-Driven Unified Tool\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMerges two capabilities into single binary.\u003c/li\u003e\n\u003cli\u003eImpersonates Winlogin system service.\u003c/li\u003e\n\u003cli\u003eUses custom Base64 encoding to obfuscate command lines and parameters.\u003c/li\u003e\n\u003cli\u003eThree primary functions: file discovery (searching for \u0026ldquo;module.txt\u0026rdquo;, \u0026ldquo;\u003cem\u003e.dll\u0026rdquo;, \u0026ldquo;\u003c/em\u003e.config\u0026rdquo;), payload registration (injecting payloads into IIS configuration), and locating primary BadIIS DLL with backup location for persistence.\u003c/li\u003e\n\u003cli\u003eAuthenticates with C2 server by checking response \u0026ldquo;lwxat\u0026rdquo;.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"latest-two-stage-installation-toolset\"\u003eLatest Two-Stage Installation Toolset\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSeparated into two distinct files.\u003c/li\u003e\n\u003cli\u003eFirst file: primary installer that authenticates, searches for BadIIS, copies payloads to primary/backup directories, registers in IIS module list, then drops secondary malware as Windows service (impersonating FaxService or AudiosService).\u003c/li\u003e\n\u003cli\u003eCustomization parameters and execution logs recovered.\u003c/li\u003e\n\u003cli\u003eCommands and parameters encoded using custom Base64.\u003c/li\u003e\n\u003cli\u003eRobust persistence: copies BadIIS to active directory and hidden backup location, ensuring automatic restoration on IIS server restart.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"module-initialization-dropper\"\u003eModule Initialization Dropper\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFunctions primarily as dropper, not persistent service.\u003c/li\u003e\n\u003cli\u003ePDB string \u0026ldquo;D:\\vc\\dll封装进exe\u0026rdquo; translates to \u0026ldquo;DLL packaged into EXE\u0026rdquo;.\u003c/li\u003e\n\u003cli\u003eBadIIS malware found in resource section named \u0026ldquo;IIS32\u0026rdquo; and \u0026ldquo;IIS64\u0026rdquo;.\u003c/li\u003e\n\u003cli\u003eDrop location is identical to one used by installation script documented by Trend Micro.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"lwxat-badiis-author-identification\"\u003e\u0026ldquo;lwxat\u0026rdquo;: BadIIS Author Identification\u003c/h2\u003e\n\n\u003cp\u003eTalos assesses with moderate-to-high confidence that the string \u0026ldquo;lwxat\u0026rdquo; is the author\u0026rsquo;s alias or handle, based on converging evidence:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBuilder authentication mechanism\u003c/strong\u003e: Hardcoded match string within authentication routine.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConfiguration parameter\u003c/strong\u003e: Used as enable function parameter in \u0026ldquo;config.txt\u0026rdquo;.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUser-agent signature\u003c/strong\u003e: Malware samples observed using \u0026ldquo;lwxatisme\u0026rdquo; as custom user-agent string during HTTP communications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAdditionally, a PDB path contained Chinese-language string referencing a folder for \u0026ldquo;x神\u0026rsquo;s\u0026rdquo; requirements, indicating a customized build for a client named \u0026ldquo;xshen\u0026rdquo; (x神) for full-site traffic hijacking based on browser language settings.\u003c/p\u003e\n\n\u003ch2 id=\"coverage\"\u003eCoverage\u003c/h2\u003e\n\n\u003cp\u003eClamAV signatures and SNORT rules (SIDs) are provided for detection. Indicators of compromise are available in Cisco Talos\u0026rsquo;s GitHub repository.\u003c/p\u003e\n","keyPoints":["Cisco Talos uncovered a BadIIS variant with embedded \"demo.pdb\" strings used as commodity malware likely sold or shared among multiple Chinese-speaking cybercrime groups under a malware-as-a-service (MaaS) model.","Analysis of program database (PDB) file paths reveals a sustained multi-year development effort by an author operating under the alias \"lwxat\", spanning from at least September 2021 through January 2026.","Talos recovered a dedicated builder tool that allows threat actors to generate configuration files, customize payloads, and inject parameters into BadIIS binaries for capabilities including traffic redirection, reverse proxying, content hijacking, and backlink injection for SEO fraud.","The same author developed a suite of auxiliary tools, including service-based installers, droppers, and persistence mechanisms, that use custom Base64 encoding and obfuscation to automate deployment and evade detection.","The string \"lwxat\" is used as a hardcoded authentication string in the builder and service tool, as a configuration parameter, and as a custom user-agent string \"lwxatisme\" in malware samples, indicating the author's identity."],"insights":["The builder tool checks for the authentication string \"lwxat\" from the C2 server but continues payload generation even if the check fails, making the authentication mechanism a valuable attribution pivot rather than a functional gate.","The presence of a PDB path folder named for a client \"xshen\" (x神) with a customized build (full-site hijacking based on browser language) indicates the author offers bespoke malware variants, supporting a personalized malware-as-a-service model.","The malware samples use the custom HTTP user-agent string \"lwxatisme\", which directly ties the malware's network behavior to the author's alias and aids in tracking infections.","The latest installation toolset splits into two separate files: a primary installer that registers BadIIS and a secondary Windows service that impersonates legitimate services like FaxService or AudiosService, enhancing persistence and evasion."],"referencedReports":[{"title":"Chinese-speaking Group Manipulates SEO with BadIIS","url":"https://www.trendmicro.com/en_us/research/25/b/chinese-speaking-group-manipulates-seo-with-badiis.html","publisher":"Trend Micro","context":"The article references Trend Micro's research as documenting tactics, techniques, and procedures that diverge from Talos's own observations of the BadIIS variant.","category":"","primary":false},{"title":"Ahnlab BadIIS Analysis (Japanese)","url":"https://asec.ahnlab.com/jp/65289/","publisher":"Ahnlab","context":"The article mentions Ahnlab as one of the security vendors tracking the global spread of BadIIS variants, with documented divergences in TTPs.","category":"","primary":false},{"title":"BadIIS to the Bone: New Insights to Global SEO Poisoning Campaign","url":"https://www.elastic.co/security-labs/badiis-to-the-bone-new-insights-to-global-seo-poisoning-campaign","publisher":"Elastic","context":"The article references Elastic's technical analysis as another vendor documenting tactics that differ from Talos's observed BadIIS campaigns.","category":"","primary":false}],"body":"\u003cp\u003eCisco Talos uncovered a BadIIS variant with embedded \u0026ldquo;demo.pdb\u0026rdquo; strings that functions as commodity malware, likely sold or shared among multiple Chinese-speaking cybercrime groups operating under a malware-as-a-service (MaaS) model for continuous monetization.\u003c/p\u003e\n\n\u003cp\u003eAnalysis of program database (PDB) file paths reveals a sustained, multi-year development effort by an author alias \u0026ldquo;lwxat\u0026rdquo;, spanning from at least September 2021 through January 2026, with rapid iterative updates, feature branching, and reactive evasion tactics targeting specific security vendors such as Norton.\u003c/p\u003e\n\n\u003cp\u003eTalos recovered a dedicated builder tool enabling threat actors to generate configuration files, customize payloads, and inject parameters into BadIIS binaries for traffic redirection, reverse proxying, content hijacking, and backlink injection for malicious SEO fraud, alongside auxiliary tools for automated deployment and persistence.\u003c/p\u003e\n"},{"n":15,"title":"GitHub Actions Supply Chain Attack Redirects Tags to Steal CI/CD Credentials","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/github-actions-supply-chain-attack.html","time":"05:28","priority":"SHOULD READ","score":88,"tldr":"Threat actors compromised the GitHub Actions workflows actions-cool/issues-helper and maintain-one-comment by redirecting all tags to imposter commits that steal CI/CD credentials, highlighting the risk of using version tags over pinned commit SHAs.","briefOverview":"\u003cp\u003eThreat actors compromised the GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e by moving all existing tags to an imposter commit containing malicious code that exfiltrates CI/CD credentials. The malicious commit does not appear in the original repository\u0026rsquo;s normal commit history, allowing the attack to bypass standard Pull Request reviews.\u003c/p\u003e\n\n\u003cp\u003eA second action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, also had 15 tags compromised with the same functionality. GitHub disabled access to that repository for violating its terms of service. The exfiltration domain used in the attack, t.m-kosche[.]com, was previously observed in the Mini Shai-Hulud campaign targeting npm packages from the @antv ecosystem, suggesting a possible connection between the two clusters of activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn a software supply chain attack, threat actors compromised the popular GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e by redirecting every existing tag to an imposter commit that contains malicious code. According to StepSecurity researcher Varun Sharma, the imposter commit does not appear in the action\u0026rsquo;s normal commit history, allowing the attackers to bypass standard Pull Request reviews and achieve arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code, upon execution in a GitHub Actions runner, performs several actions: it downloads the Bun JavaScript runtime, reads memory from the Runner.Worker process to extract credentials, and makes an outbound HTTPS call to an attacker-controlled domain (t.m-kosche[.]com) to exfiltrate the stolen data.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity reported that 15 tags associated with a second GitHub action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, were also compromised with the same functionality. GitHub has since disabled access to that repository due to a violation of its terms of service.\u003c/p\u003e\n\n\u003cp\u003eInterestingly, the exfiltration domain t.m-kosche[.]com has been observed in the latest wave of the Mini Shai-Hulud campaign targeting npm packages from the @antv ecosystem, indicating the two clusters of activity could be related. StepSecurity noted that because every tag now resolves to malicious commits, any workflow that references the action by version pulls the malicious code on its next run. Only workflows pinned to a known-good full commit SHA remain unaffected.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA sophisticated supply chain attack has compromised the GitHub Actions workflows \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e and \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e. Threat actors executed the attack by moving all existing tags to imposter commits that exist only in an adversary-controlled fork, rather than the original trusted repository. This technique allows the attackers to bypass standard Pull Request reviews and achieve arbitrary code execution.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003ch3 id=\"imposter-commit-mechanism\"\u003eImposter Commit Mechanism\u003c/h3\u003e\n\n\u003cp\u003eAs explained by StepSecurity researcher Varun Sharma and further defined by Chainguard\u0026rsquo;s article on imposter commits, this deceptive attack strategy injects malicious code by referencing a commit or tag that exists only in a fork controlled by the adversary. The imposter commit does not appear in the action\u0026rsquo;s normal commit history, making detection difficult through standard code review processes.\u003c/p\u003e\n\n\u003ch3 id=\"malicious-code-behavior\"\u003eMalicious Code Behavior\u003c/h3\u003e\n\n\u003cp\u003eOnce executed within a GitHub Actions runner, the malicious code performs the following sequence of actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDownloads the Bun JavaScript runtime to the runner.\u003c/li\u003e\n\u003cli\u003eReads memory from the Runner.Worker process to extract sensitive credentials.\u003c/li\u003e\n\u003cli\u003eMakes an outbound HTTPS call to the attacker-controlled domain \u0026ldquo;t.m-kosche[.]com\u0026rdquo; to transmit the stolen data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-actions\"\u003eAffected Actions\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e – All existing tags in the repository were moved to the imposter commit.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e – 15 tags associated with this action were compromised with the same malicious functionality.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGitHub disabled access to the maintain-one-comment repository due to a violation of GitHub\u0026rsquo;s terms of service. The reason for this decision was not disclosed.\u003c/p\u003e\n\n\u003ch2 id=\"domains-and-connections\"\u003eDomains and Connections\u003c/h2\u003e\n\n\u003cp\u003eThe exfiltration domain \u0026ldquo;t.m-kosche[.]com\u0026rdquo; has been previously observed in the latest wave of the Mini Shai-Hulud campaign targeting npm packages from the @antv ecosystem. This overlap suggests a possible connection between the two clusters of activity, though the article does not confirm a direct link.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity emphasized that because every tag now resolves to malicious commits, any workflow that references the action by version number will pull the malicious code on its next run. The only workflows that are unaffected are those pinned to a known-good full commit SHA. GitHub\u0026rsquo;s action of disabling access to the maintain-one-comment repository serves as a containment measure, but the issues-helper repository\u0026rsquo;s status is not detailed beyond the reported compromise.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThis attack highlights the critical importance of pinning GitHub Actions to immutable commit SHAs rather than mutable version tags. The use of memory-reading techniques to extract credentials from the Runner.Worker process represents an advanced evasion method, and the potential link to the Mini Shai-Hulud campaign indicates a broader threat landscape affecting both GitHub Actions and npm package ecosystems.\u003c/p\u003e\n","keyPoints":["Threat actors compromised the GitHub Actions workflow actions-cool/issues-helper by moving every existing tag to an imposter commit containing malicious code.","The malicious code exfiltrates credentials from CI/CD pipelines by downloading the Bun JavaScript runtime, reading memory from the Runner.Worker process, and making an outbound HTTPS call to an attacker-controlled domain.","A second GitHub action, actions-cool/maintain-one-comment, also had 15 tags compromised with the same functionality.","GitHub disabled access to the maintain-one-comment repository due to a violation of its terms of service.","The exfiltration domain 't.m-kosche[.]com' was previously observed in the Mini Shai-Hulud campaign targeting npm packages from the @antv ecosystem."],"insights":["The attack method of moving all existing tags to an imposter commit that only exists in an adversary-controlled fork allows attackers to bypass standard Pull Request reviews because the malicious commit never appears in the original repository's commit history.","The malicious code's technique of reading memory from the Runner.Worker process to extract credentials is an unusual and targeted approach specific to GitHub Actions runners, rather than typical environment variable theft.","The exfiltration domain 't.m-kosche[.]com' was already observed in the Mini Shai-Hulud campaign targeting npm packages from the @antv ecosystem, suggesting a possible connection between two distinct supply chain attacks."],"referencedReports":[{"title":"actions-cool-issues-helper GitHub Action Compromised: All tags point to imposter commit that exfiltrates CI/CD credentials","url":"https://www.stepsecurity.io/blog/actions-cool-issues-helper-github-action-compromised-all-tags-point-to-imposter-commit-that-exfiltrates-ci-cd-credentials","publisher":"StepSecurity","context":"This blog post from StepSecurity researcher Varun Sharma reports the compromise and details the malicious code behavior.","category":"","primary":false},{"title":"What the Fork? Imposter Commits in GitHub Actions and CI/CD","url":"https://www.chainguard.dev/unchained/what-the-fork-imposter-commits-in-github-actions-and-ci-cd","publisher":"Chainguard","context":"This article from Chainguard explains the concept of imposter commits in GitHub Actions and CI/CD.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors compromised the GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e by moving all existing tags to an imposter commit containing malicious code that exfiltrates CI/CD credentials. The malicious commit does not appear in the original repository\u0026rsquo;s normal commit history, allowing the attack to bypass standard Pull Request reviews.\u003c/p\u003e\n\n\u003cp\u003eA second action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, also had 15 tags compromised with the same functionality. GitHub disabled access to that repository for violating its terms of service. The exfiltration domain used in the attack, t.m-kosche[.]com, was previously observed in the Mini Shai-Hulud campaign targeting npm packages from the @antv ecosystem, suggesting a possible connection between the two clusters of activity.\u003c/p\u003e\n"},{"n":4,"title":"TP-Link, Photoshop, OpenVPN, Norton VPN vulnerabilities","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/tp-link-photoshop-openvpn-norton-vpn-vulnerabilities/","time":"15:39","priority":"SHOULD READ","score":85,"tldr":"Cisco Talos disclosed critical vulnerabilities in TP-Link routers, Adobe Photoshop, OpenVPN, and Norton VPN, with patches available for all except the Norton VPN flaw, which was discovered before a fix.","briefOverview":"\u003cp\u003eCisco Talos disclosed multiple vulnerabilities across TP-Link routers, Adobe Photoshop, OpenVPN, and Norton VPN. The TP-Link Archer AX53 router alone had eight flaws, including a stack-based buffer overflow that could allow arbitrary code execution via network packets. Other TP-Link vulnerabilities involved OS command injection and external config control through malicious configuration file uploads.\u003c/p\u003e\n\n\u003cp\u003eA privilege escalation vulnerability was found in the installation process of Adobe Photoshop via the Microsoft Store, allowing a low-privilege user to replace files during installation. Similarly, Norton VPN had a privilege escalation flaw in its Microsoft Store installation process that could lead to arbitrary file deletion. The Norton VPN issue was discovered in-use before a patch was available, unlike the others which have been patched by their vendors.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos\u0026rsquo; Vulnerability Discovery \u0026amp; Research team recently published disclosures covering a total of eleven vulnerabilities. Eight of these affect the TP-Link Archer AX53 dual-band gigabit Wi-Fi router, discovered by researcher Lilith \u0026gt;_\u0026gt;. The most severe is a stack-based buffer overflow (TALOS-2025-2302) in the tmpServer opcode 0x436 that can lead to arbitrary code execution triggered by specially crafted network packets. Other TP-Link vulnerabilities include OS command injection and external config control in OpenVPN and dnsmasq configuration restore functionalities, all exploitable by uploading a malicious file.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, a single vulnerability was disclosed in Adobe Photoshop (TALOS-2025-2274) discovered by KPC of Cisco Talos. This is a privilege escalation flaw in the Microsoft Store installation process involving the installer Photoshop_Set-Up.exe 2.11.0.30. A low-privilege user can replace files during installation, potentially leading to elevation of privileges. Another vulnerability was found in OpenVPN 2.6.x and 2.8_git (TALOS-2026-2381), discovered by Emma Reuter of Cisco ASIG. This reachable assertion vulnerability in the TLS Crypt v2 Client Key Extraction functionality can cause a denial of service via specially crafted network packets.\u003c/p\u003e\n\n\u003cp\u003eThe final vulnerability affects Gen Digital\u0026rsquo;s Norton VPN (TALOS-2025-2276), also discovered by KPC. It is a privilege escalation flaw in the Microsoft Store installation process, allowing a low-privilege user to replace files leading to deletion of arbitrary files and possible elevation of privileges. According to the article, all vulnerabilities except the Norton VPN one have been patched by their respective vendors. The Norton VPN issue was discovered in-use before a patch was available. Cisco Talos recommends downloading the latest Snort rule sets and checking their vulnerability advisories for coverage.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-disclosed-vulnerabilities\"\u003eOverview of Disclosed Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that Cisco Talos’ Vulnerability Discovery \u0026amp; Research team disclosed multiple vulnerabilities across four products: TP-Link Archer AX53 router, Adobe Photoshop, OpenVPN, and Gen Digital\u0026rsquo;s Norton VPN. The disclosures were coordinated with vendors, and patches have been issued for all except the Norton VPN vulnerability, which was discovered in-use before a patch was available.\u003c/p\u003e\n\n\u003ch2 id=\"tp-link-archer-ax53-vulnerabilities-8-issues\"\u003eTP-Link Archer AX53 Vulnerabilities (8 issues)\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovered by:\u003c/strong\u003e Lilith \u0026gt;_\u0026gt; of Cisco Talos.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2302 (CVE-2026-30814):\u003c/strong\u003e A stack-based buffer overflow in the tmpServer opcode 0x436 functionality of firmware version 1.3.1 Build 20241120 rel.54901(5553). Specially crafted network packets can lead to arbitrary code execution.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2303 (CVE-2026-30815):\u003c/strong\u003e OS command injection in the OpenVPN configuration restore script_security functionality. A specially crafted configuration value can lead to arbitrary command execution via file upload.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2304 (CVE-2026-30816) and TALOS-2025-2305 (CVE-2026-30817):\u003c/strong\u003e External config control vulnerabilities in OpenVPN configuration restore (crt.sed and route_up functionalities). These allow arbitrary file reading through malicious configuration file uploads.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2306 (CVE-2026-30818):\u003c/strong\u003e OS command injection in the dnsmasq configuration restore dhcpscript functionality, leading to arbitrary command execution via file upload.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2307, TALOS-2025-2308, TALOS-2025-2309:\u003c/strong\u003e OS command injection vulnerabilities in OpenVPN configuration restore client_disconnect, client_connect, and route_up functionalities, all exploitable via malicious configuration file upload.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected parties:\u003c/strong\u003e Users of TP-Link Archer AX53 v1.0 with firmware 1.3.1 Build 20241120 rel.54901(5553). Attack vectors include both network packets (for the buffer overflow) and file uploads (for most others).\u003c/p\u003e\n\n\u003ch2 id=\"adobe-photoshop-vulnerability-1-issue\"\u003eAdobe Photoshop Vulnerability (1 issue)\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovered by:\u003c/strong\u003e KPC of Cisco Talos.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2274 (CVE-2026-34632):\u003c/strong\u003e A privilege escalation vulnerability in the installation process of Adobe Photoshop via the Microsoft Store. The vulnerable installer version is Photoshop_Set-Up.exe 2.11.0.30. A low-privilege user can replace files during the installation process, which may result in elevation of privileges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected parties:\u003c/strong\u003e Users installing or updating Adobe Photoshop through the Microsoft Store. No specific platform or version of Photoshop beyond the installer is mentioned.\u003c/p\u003e\n\n\u003ch2 id=\"openvpn-vulnerability-1-issue\"\u003eOpenVPN Vulnerability (1 issue)\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovered by:\u003c/strong\u003e Emma Reuter of Cisco ASIG.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2026-2381 (CVE-2026-35058):\u003c/strong\u003e A reachable assertion vulnerability in the TLS Crypt v2 Client Key Extraction functionality of OpenVPN 2.6.x and 2.8_git. A specially crafted network packet can lead to a denial of service. An attacker can send a sequence of malicious packets to trigger this vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected parties:\u003c/strong\u003e Users of OpenVPN versions 2.6.x and the development branch 2.8_git. The vulnerability resides in a security feature (TLS Crypt v2), making it notable.\u003c/p\u003e\n\n\u003ch2 id=\"norton-vpn-vulnerability-1-issue\"\u003eNorton VPN Vulnerability (1 issue)\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovered by:\u003c/strong\u003e KPC of Cisco Talos.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTALOS-2025-2276 (CVE-2025-58074):\u003c/strong\u003e A privilege escalation vulnerability in the installation process of Norton VPN via the Microsoft Store. A low-privilege user can replace files during the installation process, which may result in deletion of arbitrary files, possibly leading to elevation of privileges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected parties:\u003c/strong\u003e Users installing or updating Norton VPN through the Microsoft Store. This vulnerability was discovered in-use before a patch was available, meaning no official fix existed at the time of disclosure.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-and-mitigation\"\u003eVendor Response and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe article states that all vulnerabilities except the Norton VPN one have been patched by their respective vendors in adherence to Cisco’s third-party vulnerability disclosure policy. For detection, Cisco Talos recommends downloading the latest Snort rule sets from Snort.org. Their latest Vulnerability Advisories are posted on the Talos Intelligence website.\u003c/p\u003e\n\n\u003cp\u003e\u003cem\u003eNote: The Norton VPN vulnerability (CVE-2025-58074) was explicitly stated as not having a patch available at the time of the article, unlike the others.\u003c/em\u003e\u003c/p\u003e\n","keyPoints":["Cisco Talos disclosed eight vulnerabilities in the TP-Link Archer AX53 router, including a stack-based buffer overflow and multiple OS command injection flaws.","A privilege escalation vulnerability was found in the installation process of Adobe Photoshop via the Microsoft Store, affecting Photoshop_Set-Up.exe 2.11.0.30.","OpenVPN versions 2.6.x and 2.8_git contain a reachable assertion vulnerability in the TLS Crypt v2 Client Key Extraction functionality that can lead to denial of service.","A privilege escalation vulnerability in the Norton VPN installation process via the Microsoft Store was discovered before a patch was available, allowing file replacement leading to deletion of arbitrary files."],"insights":["The TP-Link vulnerabilities can be triggered by uploading a malicious configuration file, not solely by network packets, making the attack vector reliant on file upload capabilities that may be overlooked.","The OpenVPN denial-of-service vulnerability exists within the TLS Crypt v2 Client Key Extraction feature, meaning a security-enhancing mechanism itself is exploitable.","The Norton VPN vulnerability was discovered in-use before a patch was available, indicating a zero-day scenario where users had no official fix at the time of disclosure."],"referencedReports":[],"body":"\u003cp\u003eCisco Talos disclosed multiple vulnerabilities across TP-Link routers, Adobe Photoshop, OpenVPN, and Norton VPN. The TP-Link Archer AX53 router alone had eight flaws, including a stack-based buffer overflow that could allow arbitrary code execution via network packets. Other TP-Link vulnerabilities involved OS command injection and external config control through malicious configuration file uploads.\u003c/p\u003e\n\n\u003cp\u003eA privilege escalation vulnerability was found in the installation process of Adobe Photoshop via the Microsoft Store, allowing a low-privilege user to replace files during installation. Similarly, Norton VPN had a privilege escalation flaw in its Microsoft Store installation process that could lead to arbitrary file deletion. The Norton VPN issue was discovered in-use before a patch was available, unlike the others which have been patched by their vendors.\u003c/p\u003e\n"},{"n":1,"title":"UK regulator to require tech firms to tackle deepfakes, non-consensual intimate images","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/uk-regulator-to-require-tech-firms-to-tackle-deepfakes-nudification-ai","time":"16:57","priority":"SHOULD READ","score":82,"tldr":"UK regulator Ofcom will require tech firms to use hash matching to detect and swiftly remove non-consensual intimate images and deepfakes, with new legislation imposing penalties for non-compliance.","briefOverview":"\u003cp\u003eBritain\u0026rsquo;s communications regulator Ofcom announced it will require tech companies to do more to find and remove non-consensual intimate images and curb deepfakes created by artificial intelligence. The changes involve updating Ofcom\u0026rsquo;s codes of practice to recommend expanded use of hash matching technology, which converts images into digital fingerprints stored in a database to prevent future uploads. The new requirements are expected to take effect this autumn pending UK Parliament action, and are driven by what the regulator called an urgent need to better protect women and girls online. This update accompanies new UK legislation that bans nudification tools and mandates removal of non-consensual intimate images within two days, with hefty fines or service blocking for non-compliance.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOfcom, the UK\u0026rsquo;s communications regulator, said it will begin requiring tech companies to do more to find and remove non-consensual intimate images and to curb the spread of AI-generated deepfakes. The regulator is updating its codes of practice to include new language, with changes expected to take effect this autumn pending action from the UK Parliament. Ofcom recommends that sites and apps use hash matching technology more expansively to detect such images, converting them into digital fingerprints that can be stored in a database to prevent future uploads.\u003c/p\u003e\n\n\u003cp\u003eThe announcement stated the change is being made due to the urgent need to better protect women and girls online. This measure, alongside new legislation that bans nudification tools and mandates removal of non-consensual intimate images within two days, will make a material difference according to an Ofcom press release. The British government\u0026rsquo;s focus on this issue comes after several weeks during which millions of nudified images of non-consenting women and children spread worldwide via xAI\u0026rsquo;s Grok chatbot.\u003c/p\u003e\n\n\u003cp\u003eIn February, UK Prime Minister Keir Starmer said the new law imposing hefty fines for tech firms that don\u0026rsquo;t promptly remove intimate images was necessary to spare victims from having to make repeated reports. Starmer warned that tech companies failing to remove images within two days could have their services blocked. In an opinion piece, Starmer deemed the issue a national emergency, stating that victims have been left to fight alone, chasing takedowns site to site, and that the burden must fall on perpetrators and enabling companies.\u003c/p\u003e\n\n\u003cp\u003eOfcom\u0026rsquo;s approach differs from that of the EU, where a law that let tech firms search communications for child sexual abuse material (CSAM) expired last month after a long standoff about privacy concerns. Tech giants have said they will continue scanning communications for CSAM, but European Commission officials have said the practice violates the law.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-announcement\"\u003eCore Announcement\u003c/h2\u003e\n\n\u003cp\u003eOfcom, Britain\u0026rsquo;s top communications regulator, announced on Monday that it will begin requiring tech companies to do more to find and remove non-consensual intimate images from their sites and to curb the spread of deepfakes created by artificial intelligence. The regulator is updating its codes of practice to include new language, with changes expected to take effect this autumn pending action from the UK Parliament.\u003c/p\u003e\n\n\u003ch2 id=\"technical-recommendations\"\u003eTechnical Recommendations\u003c/h2\u003e\n\n\u003cp\u003eOfcom recommends that sites and apps use \u0026ldquo;hash matching\u0026rdquo; technology more expansively in order to detect the images. This technology converts images into a digital fingerprint that can be stored in a database to prevent future uploads of the same or similar files. The regulator\u0026rsquo;s announcement stated the change is being made due to the urgent need to better protect women and girls online.\u003c/p\u003e\n\n\u003ch2 id=\"related-legislation\"\u003eRelated Legislation\u003c/h2\u003e\n\n\u003cp\u003eThis measure accompanies new legislation that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBans nudification tools\u003c/li\u003e\n\u003cli\u003eMandates that non-consensual intimate images be removed within two days\nAccording to an Ofcom press release, this will make a material difference in protecting women and girls online.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"government-response-and-rationale\"\u003eGovernment Response and Rationale\u003c/h2\u003e\n\n\u003cp\u003eIn February, UK Prime Minister Keir Starmer said the new law imposing hefty fines for tech firms that don\u0026rsquo;t promptly remove intimate images was necessary to spare victims from having to make repeated reports. Starmer also warned that tech companies failing to remove images within two days could have their services blocked.\u003c/p\u003e\n\n\u003cp\u003eThe British government\u0026rsquo;s focus on the issue comes in the wake of several weeks during which millions of nudified images of non-consenting women and children spread worldwide via xAI\u0026rsquo;s Grok chatbot.\u003c/p\u003e\n\n\u003cp\u003eIn a February opinion piece, Starmer deemed the issue a \u0026ldquo;national emergency.\u0026rdquo; He wrote:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u0026ldquo;Victims have been left to fight alone – chasing takedown of harmful content site to site, reporting the same material again and again, only to see it reappear elsewhere hours later. That is not justice.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003e\u0026ldquo;We are putting tech companies on notice. The burden of tackling abuse must no longer fall on victims. It must fall on perpetrators – and on the companies that enable harm.\u0026rdquo;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"contrast-with-eu-approach\"\u003eContrast with EU Approach\u003c/h2\u003e\n\n\u003cp\u003eOfcom\u0026rsquo;s approach carves a different path than that taken by the country\u0026rsquo;s peers. A European Union law that let tech firms search communications for child sexual abuse material (CSAM) expired last month after a long standoff between lawmakers about privacy concerns. Tech giants have said they will continue to scan communications for CSAM, but European Commission officials have stated that the practice is against the law.\u003c/p\u003e\n","keyPoints":["Ofcom is updating its codes of practice to require tech companies to find and remove non-consensual intimate images and curb deepfakes, with changes expected to take effect this autumn pending UK Parliament action.","The regulator recommends sites and apps use hash matching technology to convert images into digital fingerprints for detection and prevention of future uploads.","New legislation bans nudification tools and mandates that non-consensual intimate images be removed within two days, with tech companies facing hefty fines or service blocks for non-compliance.","UK Prime Minister Keir Starmer described the spread of non-consensual intimate images as a 'national emergency' in a February opinion piece.","The EU law that allowed tech firms to search communications for child sexual abuse material expired last month due to privacy concerns, differing from the UK's approach."],"insights":["The UK’s strengthening of its codes of practice contrasts with the EU, where a law allowing tech firms to scan communications for child sexual abuse material expired due to privacy concerns, indicating divergent regulatory approaches on detection technology.","The article directly links the government’s heightened focus on non-consensual intimate images to a specific incident where millions of nudified images spread via xAI’s Grok chatbot, revealing a real-world catalyst for the emergency framing.","Beyond fines, the new law gives regulators the power to block services entirely for non-compliance within two days, an unusually strong enforcement measure that shifts the burden from victims to platforms."],"referencedReports":[],"body":"\u003cp\u003eBritain\u0026rsquo;s communications regulator Ofcom announced it will require tech companies to do more to find and remove non-consensual intimate images and curb deepfakes created by artificial intelligence. The changes involve updating Ofcom\u0026rsquo;s codes of practice to recommend expanded use of hash matching technology, which converts images into digital fingerprints stored in a database to prevent future uploads. The new requirements are expected to take effect this autumn pending UK Parliament action, and are driven by what the regulator called an urgent need to better protect women and girls online. This update accompanies new UK legislation that bans nudification tools and mandates removal of non-consensual intimate images within two days, with hefty fines or service blocking for non-compliance.\u003c/p\u003e\n"},{"n":5,"title":"Microsoft confirms patching issues in restricted Windows networks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-patching-issues-in-restricted-windows-networks/","time":"11:22","priority":"SHOULD READ","score":82,"tldr":"Microsoft warns that Windows systems in restricted network environments may fail to download updates after installing January 2026 preview updates, displaying error 0x80010002, but a Known Issue Rollback group policy is available as a workaround.","briefOverview":"\u003cp\u003eMicrosoft has confirmed that Windows systems in restricted network environments—such as air-gapped or strictly firewalled setups—may fail to download updates after installing the January 2026 optional non-security preview updates. Affected devices display error code 0x80010002 when attempting to use Windows Update settings, and while they may still be able to download the February security update, they subsequently cannot download updates released in March, April, or later months.\u003c/p\u003e\n\n\u003cp\u003eThe issue is caused by recent changes in download timeout requirements when starting download operations; it does not affect device integrity or the ability to install updates already downloaded. Microsoft is actively working on a permanent fix, but in the meantime IT administrators can apply a Known Issue Rollback (KIR) group policy tailored to their version of Windows to restore normal downloading functionality.\u003c/p\u003e\n\n\u003cp\u003eThis incident follows a pattern of similar update delivery problems for enterprise environments, including previous 0x80240069 errors with WSUS deliveries in April and August 2025, as well as a May 2026 security update that failed to install with error 0x800f0922.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has published a service alert confirming that customers operating Windows in restricted network environments may encounter Windows Update failures after installing the January 2026 optional non-security preview updates. The environments include fully isolated, air-gapped systems as well as strictly firewalled networks. Affected systems show error code 0x80010002 when accessing Windows Update settings. Notably, devices might still be able to download the February monthly security update, but then become unable to download updates released in March, April, or later months through the standard Windows Update page.\u003c/p\u003e\n\n\u003cp\u003eThe root cause, according to Microsoft, stems from recent changes in download timeout requirements that affect the initiation of download operations. The company explicitly states that the issue is unrelated to device integrity or the system\u0026rsquo;s ability to install updates—it pertains solely to the ability to download updates from the internet via the Settings app. This distinction is important for administrators troubleshooting the problem.\u003c/p\u003e\n\n\u003cp\u003eWhile Microsoft continues to work on a permanent resolution, it has provided a workaround using the Known Issue Rollback (KIR) feature. Two specific KIR group policy MSI files are offered: one for Windows 11 26H1 (KB5083806) and another for Windows 11 24H2, Windows 11 25H2, and Windows Server 2025 (KB5083631). Administrators must install and configure the appropriate group policy for their version of Windows, then restart the device to apply the setting. Additional deployment guidance is available on Microsoft\u0026rsquo;s support website.\u003c/p\u003e\n\n\u003cp\u003eThe article also references several prior incidents where Windows updates caused similar enterprise headaches. In April 2025, Microsoft pushed a fix for 0x80240069 errors that prevented enterprise customers from installing the April 2025 security updates via Windows Server Update Services (WSUS). An almost identical issue with the same error code was fixed in August 2025 for Windows 11 24H2 cumulative updates. More recently, Microsoft shared another KIR fix for the May 2026 security update (KB5089549) which caused install failures with error 0x800f0922.\u003c/p\u003e\n\n\u003cp\u003eThese recurring problems highlight persistent challenges in Windows update delivery for restricted and enterprise-managed networks. Although Microsoft has addressed each case individually, the pattern suggests underlying complexities in the update distribution pipeline that continue to affect IT administrators, particularly those managing air-gapped or heavily firewalled environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has confirmed that systems in restricted network environments are experiencing Windows Update failures after installing the January 2026 optional non-security preview updates. The issue was reported in a Microsoft service alert first spotted by Microsoft MVP Susan Bradley. Affected environments range from fully isolated, air-gapped systems to strictly firewalled networks.\u003c/p\u003e\n\n\u003ch2 id=\"error-details\"\u003eError Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eError code displayed: \u003cstrong\u003e0x80010002\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eOccurs when attempting to use Windows Update settings to download updates.\u003c/li\u003e\n\u003cli\u003eAffected devices may still successfully download the \u003cstrong\u003eFebruary 2026 monthly security update\u003c/strong\u003e, but then become unable to download updates released in \u003cstrong\u003eMarch, April, or later months\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe problem is not related to device integrity or the ability to install updates—only the ability to download them via the Settings page.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"root-cause\"\u003eRoot Cause\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft states that the failure results from \u003cstrong\u003erecent changes in download timeout requirements when starting download operations\u003c/strong\u003e. No further technical details about the specific timeout parameters or registry keys were disclosed in the article.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems\"\u003eAffected Systems\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows environments with restricted network access, including air-gapped systems and heavily firewalled networks.\u003c/li\u003e\n\u003cli\u003eSpecific versions mentioned in the workaround: \u003cstrong\u003eWindows 11 26H1, Windows 11 24H2, Windows 11 25H2, and Windows Server 2025\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe article does not list older versions (e.g., Windows 10 or Server 2022) as affected, but they are not explicitly excluded either.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"workaround-provided\"\u003eWorkaround Provided\u003c/h2\u003e\n\n\u003cp\u003eIT administrators can apply a \u003cstrong\u003eKnown Issue Rollback (KIR)\u003c/strong\u003e group policy to restore normal update download functionality. Microsoft provides two separate MSI files:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWindows 11 26H1\u003c/strong\u003e: \u003ca href=\"https://download.microsoft.com/download/2b881d89-8630-4d6f-a316-b100094b07aa/Windows%2011%2026H1%20KB5083806%20260513_22071%20Known%20Issue%20Rollback.msi\" target=\"_blank\"\u003eKB5083806 Known Issue Rollback\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows 11 24H2, Windows 11 25H2, and Windows Server 2025\u003c/strong\u003e: \u003ca href=\"https://download.microsoft.com/download/4c6b9e6e-5760-435f-b5ef-0ceaafc14520/Windows%2011%2024H2%2c%20Windows%2011%2025H2%20and%20Windows%20Server%202025%20KB5083631%20260513_22072%20Known%20Issue%20Rollback.msi\" target=\"_blank\"\u003eKB5083631 Known Issue Rollback\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSteps to apply the workaround:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eInstall and configure the appropriate Group Policy for the Windows version.\u003c/li\u003e\n\u003cli\u003eRestart the device(s) to apply the policy setting.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eAdditional guidance on deploying and configuring KIR group policies can be found on \u003ca href=\"https://docs.microsoft.com/en-us/troubleshoot/windows-client/group-policy/use-group-policy-to-deploy-known-issue-rollback\" target=\"_blank\"\u003eMicrosoft\u0026rsquo;s support website\u003c/a\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-status\"\u003eMicrosoft\u0026rsquo;s Status\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft states that it is \u003cstrong\u003estill working to resolve this issue\u003c/strong\u003e. The KIR workaround is a temporary measure, not a permanent fix.\u003c/p\u003e\n\n\u003ch2 id=\"historical-context-from-the-article\"\u003eHistorical Context from the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article notes several previous similar incidents affecting enterprise update deployments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eApril 2025\u003c/strong\u003e: Microsoft resolved a bug that prevented enterprise customers from installing the April 2025 security updates via \u003cstrong\u003eWSUS\u003c/strong\u003e, producing error 0x80240069.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAugust 2025\u003c/strong\u003e: Microsoft fixed an almost identical issue that caused Windows 11 24H2 cumulative updates to fail with 0x80240069 errors when delivered via WSUS.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMay 2026\u003c/strong\u003e: Microsoft shared a KIR fix for KB5089549, which caused install failures on some systems with error 0x800f0922.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recurring issues suggest that update distribution to restricted or WSUS-managed environments remains a persistent challenge for Microsoft.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article does not quantify how many systems are affected or provide indicators of compromise. However, the issue is significant because:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt affects security updates, potentially leaving air-gapped and firewalled systems unpatched if the workaround is not applied.\u003c/li\u003e\n\u003cli\u003eThe error message (0x80010002) is not a typical security-related error, which might cause confusion among administrators.\u003c/li\u003e\n\u003cli\u003eThe workaround requires manual intervention via Group Policy, which may be complex for organizations without centralized management.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"no-actors-or-attribution\"\u003eNo Actors or Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article does not attribute the issue to any external actor, vulnerability exploitation, or malicious activity. Microsoft frames it as an unintended consequence of changes to download timeout logic in the Windows Update client.\u003c/p\u003e\n","keyPoints":["Microsoft says customers in restricted network environments may encounter Windows Update failures with error code 0x80010002 after installing the January 2026 optional non-security preview updates.","Affected devices might be able to download the February monthly Windows security update but then become unable to download updates released in March, April, or later months via Windows Update settings.","The issue results from recent changes in download timeout requirements when starting download operations and is not related to device integrity or the ability to install updates.","IT administrators can work around this issue by installing and configuring a Known Issue Rollback (KIR) group policy for their version of Windows and restarting the device(s).","Microsoft is still working to resolve the issue and has provided two specific KIR group policy download links for Windows 11 26H1, 24H2, 25H2, and Windows Server 2025."],"insights":["The error 0x80010002 is specifically attributed to changes in download timeout requirements, not to security or compatibility issues, which distinguishes it from typical update failures.","Microsoft provides Known Issue Rollback (KIR) group policies as a temporary workaround, while the company is still actively working on a permanent resolution—meaning admins should not consider the KIR a final fix.","The issue only blocks the download of updates via Windows Update settings; affected systems can still install updates if downloaded by other means, highlighting a network-level rather than system-level failure.","The article notes a recurring pattern of update delivery problems for enterprise environments, referencing similar 0x80240069 errors in April 2025, August 2025, and May 2026, suggesting systemic challenges in Microsoft's update distribution for restricted networks."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has confirmed that Windows systems in restricted network environments—such as air-gapped or strictly firewalled setups—may fail to download updates after installing the January 2026 optional non-security preview updates. Affected devices display error code 0x80010002 when attempting to use Windows Update settings, and while they may still be able to download the February security update, they subsequently cannot download updates released in March, April, or later months.\u003c/p\u003e\n\n\u003cp\u003eThe issue is caused by recent changes in download timeout requirements when starting download operations; it does not affect device integrity or the ability to install updates already downloaded. Microsoft is actively working on a permanent fix, but in the meantime IT administrators can apply a Known Issue Rollback (KIR) group policy tailored to their version of Windows to restore normal downloading functionality.\u003c/p\u003e\n\n\u003cp\u003eThis incident follows a pattern of similar update delivery problems for enterprise environments, including previous 0x80240069 errors with WSUS deliveries in April and August 2025, as well as a May 2026 security update that failed to install with error 0x800f0922.\u003c/p\u003e\n"},{"n":10,"title":"INTERPOL ‘Operation Ramz’ seizes 53 malware, phishing servers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/interpol-operation-ramz-seizes-53-malware-phishing-servers/","time":"22:15","priority":"SHOULD READ","score":82,"tldr":"INTERPOL's Operation Ramz led to over 200 arrests and the seizure of 53 servers used for phishing and malware across the Middle East and North Africa, highlighting a major regional cybercrime crackdown.","briefOverview":"\u003cp\u003eINTERPOL\u0026rsquo;s Operation Ramz resulted in the arrest of over 200 individuals for cybercrime activities across the Middle East and North Africa. Law enforcement seized 53 servers used for phishing, malware, and online fraud, affecting at least 3,867 confirmed victims based on nearly 8,000 intelligence packages retrieved from the equipment.\u003c/p\u003e\n\n\u003cp\u003eKey actions included securing compromised devices in Qatar, dismantling an investment scam in Jordan where 15 trafficked workers were forced to run fraud schemes, and shutting down a phishing-as-a-service platform in Algeria. The operation was conducted in collaboration with private cybersecurity firms and marks the third major INTERPOL cybercrime crackdown this year, following Operation Synergia III and Operation Red Card 2.0.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eINTERPOL\u0026rsquo;s Operation Ramz focused on the Middle East and North Africa region, resulting in the arrest of more than 200 individuals for cybercrime activities. Authorities identified an additional 382 suspects across 13 countries: Algeria, Bahrain, Egypt, Iraq, Jordan, Lebanon, Libya, Morocco, Oman, Palestine, Qatar, Tunisia, and the UAE.\u003c/p\u003e\n\n\u003cp\u003eLaw enforcement seized 53 servers used for phishing, malware, and online fraud, which affected at least 3,867 confirmed victims. Nearly 8,000 intelligence packages were retrieved from the equipment, providing evidence for the operation. INTERPOL collaborated with private cybersecurity firms including Kaspersky, Group-IB, The Shadowserver Foundation, Team Cymru, and TrendAI to track the malicious infrastructure.\u003c/p\u003e\n\n\u003cp\u003eSpecific highlights from the operation include securing compromised devices in Qatar that were unknowingly used to spread malware, and dismantling an investment scam operation in Jordan where 15 trafficked workers from Asia were forced to run fraud schemes – two organizers were arrested. In Oman, a vulnerable malware-infected server containing sensitive data was disabled, and in Algeria, a phishing-as-a-service platform was shut down with one suspect arrested.\u003c/p\u003e\n\n\u003cp\u003eThis operation is the third major cybercrime crackdown INTERPOL has concluded this year. In March, Operation Synergia III resulted in sinkholing 45,000 malicious IP addresses, seizure of 212 devices and servers, and the arrest of 94 individuals across 72 countries. Earlier in February, Operation Red Card 2.0 led to the arrest of 651 suspects across 16 African countries, targeting investment fraud, mobile money scams, and fake loan apps linked to over $45 million in losses.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-operation-ramz\"\u003eOverview of Operation Ramz\u003c/h2\u003e\n\n\u003cp\u003eINTERPOL conducted Operation Ramz, a cybercrime crackdown focused on the Middle East and North Africa (MENA) region. The operation led to the arrest of more than 200 individuals for cybercrime activities, and an additional 382 suspects were identified across 13 countries: Algeria, Bahrain, Egypt, Iraq, Jordan, Lebanon, Libya, Morocco, Oman, Palestine, Qatar, Tunisia, and the UAE.\u003c/p\u003e\n\n\u003ch2 id=\"seizures-and-impact\"\u003eSeizures and Impact\u003c/h2\u003e\n\n\u003cp\u003eLaw enforcement seized 53 servers used for phishing, malware, and online fraud. These servers were linked to at least 3,867 confirmed victims, as determined from nearly 8,000 intelligence packages retrieved from the equipment. The operation aimed at neutralizing phishing and malware threats as well as tackling cyber scams that inflict severe costs to the region, according to the INTERPOL announcement.\u003c/p\u003e\n\n\u003ch2 id=\"collaboration-with-private-sector\"\u003eCollaboration with Private Sector\u003c/h2\u003e\n\n\u003cp\u003eINTERPOL collaborated with several private cybersecurity firms to track the malicious infrastructure, including Kaspersky, Group-IB, The Shadowserver Foundation, Team Cymru, and TrendAI.\u003c/p\u003e\n\n\u003ch2 id=\"notable-actions-by-country\"\u003eNotable Actions by Country\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eQatar\u003c/strong\u003e: Secured compromised devices that were unknowingly used to spread malware.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJordan\u003c/strong\u003e: Dismantled an investment scam operation where 15 trafficked workers from Asia were forced to run fraud schemes; two organizers were arrested.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOman\u003c/strong\u003e: Disabled a vulnerable malware-infected server containing sensitive data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlgeria\u003c/strong\u003e: Shut down a phishing-as-a-service platform and arrested one suspect.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMorocco\u003c/strong\u003e: Seized devices and banking data linked to phishing operations, with multiple suspects under judicial investigation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"context-within-interpol-s-2026-operations\"\u003eContext Within INTERPOL\u0026rsquo;s 2026 Operations\u003c/h2\u003e\n\n\u003cp\u003eOperation Ramz is the third major cybercrime crackdown INTERPOL has concluded this year. Earlier in March, Operation Synergia III resulted in sinkholing 45,000 malicious IP addresses, the seizure of 212 devices and servers, and the arrest of 94 individuals across 72 countries for phishing, hacking, fraud, and malware distribution. In February, Operation Red Card 2.0 led to the arrest of 651 suspects across 16 African countries, targeting investment fraud, mobile money scams, and fake loan apps linked to more than $45 million in losses.\u003c/p\u003e\n","keyPoints":["INTERPOL's Operation Ramz resulted in the arrest of more than 200 individuals for cybercrime activities across the Middle East and North Africa.","Law enforcement seized 53 servers used for phishing, malware, and online fraud, affecting at least 3,867 confirmed victims from nearly 8,000 intelligence packages.","In Jordan, authorities dismantled an investment scam operation in which 15 trafficked workers from Asia were forced to run fraud schemes, leading to the arrest of two organizers.","A phishing-as-a-service platform was shut down in Algeria, and one suspect was arrested in connection with that operation."],"insights":["The dismantling of an investment scam in Jordan revealed that 15 trafficked workers from Asia were forced to run fraud schemes, highlighting a direct link between cybercrime and human trafficking.","In Qatar, authorities secured compromised devices that were unknowingly used to spread malware, indicating that many victims are unaware their own devices are part of a criminal infrastructure.","INTERPOL's collaboration with private cybersecurity firms like Kaspersky and Group-IB to track malicious infrastructure demonstrates a growing reliance on public-private partnerships for cybercrime operations.","The operation is described as the first of its kind in the MENA region, suggesting that coordinated regional cybercrime enforcement efforts are still emerging."],"referencedReports":[],"body":"\u003cp\u003eINTERPOL\u0026rsquo;s Operation Ramz resulted in the arrest of over 200 individuals for cybercrime activities across the Middle East and North Africa. Law enforcement seized 53 servers used for phishing, malware, and online fraud, affecting at least 3,867 confirmed victims based on nearly 8,000 intelligence packages retrieved from the equipment.\u003c/p\u003e\n\n\u003cp\u003eKey actions included securing compromised devices in Qatar, dismantling an investment scam in Jordan where 15 trafficked workers were forced to run fraud schemes, and shutting down a phishing-as-a-service platform in Algeria. The operation was conducted in collaboration with private cybersecurity firms and marks the third major INTERPOL cybercrime crackdown this year, following Operation Synergia III and Operation Red Card 2.0.\u003c/p\u003e\n"},{"n":13,"title":"DirtyDecrypt PoC Released for Linux Kernel CVE-2026-31635 LPE Vulnerability","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/dirtydecrypt-poc-released-for-linux.html","time":"14:56","priority":"SHOULD READ","score":82,"tldr":"A proof-of-concept exploit called DirtyDecrypt has been released for a Linux kernel local privilege escalation vulnerability (CVE-2026-31635) that affects distributions with CONFIG_RXGK enabled, allowing unprivileged attackers to gain root access.","briefOverview":"\u003cp\u003eProof-of-concept exploit code called DirtyDecrypt has been released for a Linux kernel local privilege escalation vulnerability designated CVE-2026-31635. The flaw resides in the rxgk_decrypt_skb function, which lacks a copy-on-write guard, allowing an unprivileged attacker to write to privileged process memory or page cache of sensitive files like /etc/shadow.\u003c/p\u003e\n\n\u003cp\u003eOnly distributions with CONFIG_RXGK enabled are affected, including Fedora, Arch Linux, and openSUSE Tumbleweed. In containerized environments, the vulnerability could allow a pod escape. The exploit is considered a variant of earlier page-cache write bugs such as Copy Fail, Dirty Frag, and Fragnesia.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDirtyDecrypt (also called DirtyCBC) is a proof-of-concept exploit for CVE-2026-31635, a local privilege escalation vulnerability in the Linux kernel. The vulnerability was discovered by the Zellic and V12 security teams on May 9, 2026, but was found to be a duplicate of an already-patched bug. The technical root cause is a missing copy-on-write guard in the rxgk_decrypt_skb function, which decrypts incoming socket buffers and can write to shared memory pages without making a private copy first.\u003c/p\u003e\n\n\u003cp\u003eThis flaw allows an unprivileged attacker to write data into the memory of privileged processes or directly into the page cache of critical files such as /etc/shadow, /etc/sudoers, or SUID binaries. As a result, the attacker can elevate privileges to root. The vulnerability only impacts distributions that have CONFIG_RXGK enabled, including Fedora, Arch Linux, and openSUSE Tumbleweed, and can be exploited in containerized environments to escape pods.\u003c/p\u003e\n\n\u003cp\u003eDirtyDecrypt is assessed to be a variant of several other recently disclosed Linux kernel flaws: Copy Fail (CVE-2026-31431), Dirty Frag (CVE-2026-43284 and CVE-2026-43500), and Fragnesia (CVE-2026-46300). All of these vulnerabilities provide root access on vulnerable systems. The disclosure timeline has been complicated: a merged patch for CVE-2026-43284 led to an independent researcher analyzing the commit and publishing details before the embargo ended.\u003c/p\u003e\n\n\u003cp\u003eIn addition to these page-cache vulnerabilities, the article mentions two other LPE flaws: Pack2TheRoot (CVE-2026-41651) in the PackageKit daemon and ssh-keysign-pwn (CVE-2026-46333), which allows reading root-owned SSH private keys. Multiple Linux distributions have released advisories for CVE-2026-46333.\u003c/p\u003e\n\n\u003cp\u003eIn response to the influx of kernel vulnerabilities, Linux kernel maintainer Sasha Levin proposed an emergency \u0026lsquo;killswitch\u0026rsquo; mechanism. This would allow a privileged operator to force a chosen kernel function to return a fixed value without executing its body, serving as a temporary mitigation while a real fix is prepared. Separately, Rocky Linux introduced an optional security repository to ship urgent security fixes quickly when severe vulnerabilities become public before upstream patches are available.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-vulnerability\"\u003eCore Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eDirtyDecrypt (also referred to as DirtyCBC) is a proof-of-concept exploit for a local privilege escalation (LPE) vulnerability in the Linux kernel, tracked as CVE-2026-31635 with a CVSS score of 7.5. The exploit code was released by the Zellic and V12 security team, who discovered the flaw on May 9, 2026. The kernel maintainers informed the team that the vulnerability was a duplicate of a bug that had already been patched in the mainline kernel.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability resides in the \u003ccode\u003erxgk_decrypt_skb()\u003c/code\u003e function, which is responsible for decrypting incoming socket buffers (\u003ccode\u003esk_buff\u003c/code\u003e) on the receive side. The critical flaw is the absence of a copy-on-write (COW) guard. Under normal Linux operation, memory pages can be shared between processes as an optimization; when a write is about to occur to a shared page, the kernel first creates a private copy to prevent data from leaking into another process\u0026rsquo;s data. In \u003ccode\u003erxgk_decrypt_skb()\u003c/code\u003e, this COW guard is missing.\u003c/p\u003e\n\n\u003cp\u003eAs a result, data written during decryption can directly modify the memory of privileged processes or, depending on the exploit path, the page cache of privileged files such as \u003ccode\u003e/etc/shadow\u003c/code\u003e, \u003ccode\u003e/etc/sudoers\u003c/code\u003e, or a SUID binary. This allows an unprivileged local attacker to escalate privileges to root.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems\"\u003eAffected Systems\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability only impacts Linux distributions that have the \u003ccode\u003eCONFIG_RXGK\u003c/code\u003e kernel configuration option enabled. The article specifically lists:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFedora\u003c/li\u003e\n\u003cli\u003eArch Linux\u003c/li\u003e\n\u003cli\u003eopenSUSE Tumbleweed\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn containerized environments, worker nodes running a vulnerable version of Linux could provide a pathway for an attacker to escape the pod.\u003c/p\u003e\n\n\u003ch2 id=\"related-vulnerabilities\"\u003eRelated Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eDirtyDecrypt is assessed to be a variant of a series of recently disclosed Linux kernel page-cache write vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCopy Fail\u003c/strong\u003e (CVE-2026-31431): A local privilege escalation flaw in the \u003ccode\u003eAF_ALG\u003c/code\u003e cryptographic socket interface, disclosed by researchers at Theori on April 29, 2026.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirty Frag\u003c/strong\u003e (CVE-2026-43284 and CVE-2026-43500): Also known as Copy Fail 2, expands on Copy Fail with two page-cache write primitives. The disclosure was complicated when a merged patch for CVE-2026-43284 on May 5 led security researcher Hyunwoo Kim to go ahead with public disclosure after the embargo window ended prematurely. An independent researcher (0xdeadbeefnetwork/afflicted.sh) analyzed the upstream commit and published details.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFragnesia\u003c/strong\u003e (CVE-2026-46300): Another variant that impacts the XFRM ESP-in-TCP subsystem, with the same outcome of obtaining root privileges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAll of these vulnerabilities grant root access on vulnerable systems.\u003c/p\u003e\n\n\u003ch2 id=\"additional-lpe-flaws\"\u003eAdditional LPE Flaws\u003c/h2\u003e\n\n\u003cp\u003eThe article also highlights two other local privilege escalation issues:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePack2TheRoot\u003c/strong\u003e (CVE-2026-41651, CVSS 8.8): An LPE flaw in the Linux PackageKit daemon.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003essh-keysign-pwn\u003c/strong\u003e (CVE-2026-46333, CVSS 5.5): An improper privilege management flaw in the kernel that allows an unprivileged local user to read root-owned secrets like SSH private keys.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMultiple Linux distributions have released advisories for CVE-2026-46333, including AlmaLinux, Amazon Linux, CloudLinux, Fedora, Gentoo, Red Hat, SUSE, and Ubuntu.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eKernel Killswitch Proposal\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eIn response to the flurry of new disclosures, Linux kernel developer and maintainer Sasha Levin submitted a proposal for an emergency \u0026ldquo;killswitch.\u0026rdquo; This mechanism would allow a privileged operator to make a chosen kernel function return a fixed value without executing its body, serving as a temporary mitigation for a security bug while a real fix is being prepared. The killswitch is engaged through the kprobe layer and remains in effect on every CPU until \u0026ldquo;disengage\u0026rdquo; is written or the system reboots.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRocky Linux Security Repository\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eRocky Linux introduced an optional security repository to ship urgent security fixes quickly. The repository is disabled by default, intended for specific, narrow cases where a significant vulnerability is public, exploit code exists, and upstream patches are not yet available. The maintainers note that if upstream decides not to address a fix shipped through this repository, the next upstream kernel release will supersede the patched version, and users who have not version-locked their kernel will no longer have the fix.\u003c/p\u003e\n","keyPoints":["The DirtyDecrypt (DirtyCBC) PoC exploit targets a missing copy-on-write guard in the rxgk_decrypt_skb function, allowing local privilege escalation.","The vulnerability CVE-2026-31635 affects Linux distributions with CONFIG_RXGK enabled, such as Fedora, Arch Linux, and openSUSE Tumbleweed.","DirtyDecrypt is considered a variant of earlier vulnerabilities including Copy Fail, Dirty Frag, and Fragnesia, all of which grant root access on vulnerable systems.","A proposal for an emergency kernel 'killswitch' has been submitted to allow administrators to disable vulnerable kernel functions at runtime until a patch is available.","Rocky Linux has introduced an optional security repository to ship urgent security fixes quickly when severe vulnerabilities become public before upstream patches arrive."],"insights":["The vulnerability was reported as a duplicate of an already-patched bug, indicating that even coordinated disclosure can miss existing fixes in the mainline.","The proposal for a kernel 'killswitch' allows administrators to force a chosen function to return a fixed value without executing its body, a radical temporary mitigation for zero-days.","Rocky Linux's security repository is intentionally disabled by default, reflecting a deliberate trade-off between delivering urgent fixes and maintaining upstream compatibility."],"referencedReports":[{"title":"Copy Fail, DirtyFrag: Linux Page Bugs in the Wild"
