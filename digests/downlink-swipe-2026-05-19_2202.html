,"url":"https://www.elastic.co/security-labs/copy-fail-dirtyfrag-linux-page-bugs-in-the-wild","publisher":"Elastic Security Labs","context":"The article references this report in relation to the Dirty Frag vulnerability that expands on Copy Fail.","category":"","primary":false},{"title":"DirtyDecrypt Linux Kernel RXGK CVE-2026-31635","url":"https://moselwal.com/blog/dirtydecrypt-linux-kernel-rxgk-cve-2026-31635","publisher":"Moselwal","context":"The article references this technical analysis for details on the DirtyDecrypt vulnerability.","category":"","primary":false},{"title":"Copy Fail 2 Analysis","url":"https://afflicted.sh/blog/posts/copy-fail-2.html","publisher":"afflicted.sh (0xdeadbeefnetwork)","context":"The article references this independent publication of details on the Copy Fail 2 vulnerability.","category":"","primary":false},{"title":"Pack2TheRoot: Linux Local Privilege Escalation","url":"https://github.security.telekom.com/2026/04/pack2theroot-linux-local-privilege-escalation.html","publisher":"Telekom Security","context":"The article references this advisory for the Pack2TheRoot LPE flaw in Linux PackageKit.","category":"","primary":false},{"title":"CVE-2026-46333 Advisory","url":"https://almalinux.org/blog/2026-05-15-ssh-keysign-pwn-cve-2026-46333/","publisher":"AlmaLinux","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"CVE-2026-46333 Advisory","url":"https://explore.alas.aws.amazon.com/CVE-2026-46333.html","publisher":"Amazon Linux","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"CVE-2026-46333 Advisory and Mitigation","url":"https://blog.cloudlinux.com/ptrace-exit-race-cve-2026-46333-mitigation-and-kernel-update","publisher":"CloudLinux","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"FEDORA-2026-8b4a8d18d2 Update","url":"https://bodhi.fedoraproject.org/updates/FEDORA-2026-8b4a8d18d2","publisher":"Fedora","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"Bug 123456 – CVE-2026-46333","url":"https://bugs.gentoo.org/show_bug.cgi?id=CVE-2026-46333","publisher":"Gentoo","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"CVE-2026-46333 Red Hat Security Advisory","url":"https://access.redhat.com/security/cve/cve-2026-46333","publisher":"Red Hat","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"CVE-2026-46333 SUSE Security Advisory","url":"https://www.suse.com/security/cve/CVE-2026-46333.html","publisher":"SUSE","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false},{"title":"CVE-2026-46333 Ubuntu Security Advisory","url":"https://ubuntu.com/security/CVE-2026-46333","publisher":"Ubuntu","context":"The article references this advisory as part of a list of distribution advisories for CVE-2026-46333.","category":"","primary":false}],"body":"\u003cp\u003eProof-of-concept exploit code called DirtyDecrypt has been released for a Linux kernel local privilege escalation vulnerability designated CVE-2026-31635. The flaw resides in the rxgk_decrypt_skb function, which lacks a copy-on-write guard, allowing an unprivileged attacker to write to privileged process memory or page cache of sensitive files like /etc/shadow.\u003c/p\u003e\n\n\u003cp\u003eOnly distributions with CONFIG_RXGK enabled are affected, including Fedora, Arch Linux, and openSUSE Tumbleweed. In containerized environments, the vulnerability could allow a pod escape. The exploit is considered a variant of earlier page-cache write bugs such as Copy Fail, Dirty Frag, and Fragnesia.\u003c/p\u003e\n"},{"n":8,"title":"Critical Microsoft Vulnerabilities Doubled: From Exposure to Escalation","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/critical-microsoft-vulnerabilities-doubled-from-exposure-to-escalation/","time":"14:00","priority":"MAY READ","score":72,"tldr":"Critical Microsoft vulnerabilities doubled in 2025, and the report emphasizes that patching alone is insufficient; organizations must focus on reducing privileges, securing identities, and controlling blast radius to defend against stealthy escalation and lateral movement attacks.","briefOverview":"\u003cp\u003eThe article, based on BeyondTrust\u0026rsquo;s 2026 Microsoft Vulnerabilities Report, reveals that while total Microsoft vulnerabilities decreased slightly to 1,273 in 2025, critical vulnerabilities doubled from 78 to 157. This reversal of a multi-year downward trend is the core event, signaling that stability in total volume masks growing impact severity. Elevation of Privilege flaws now account for 40% of all CVEs, and Information Disclosure flaws rose 73%, indicating attackers prioritize stealth and reconnaissance. The article highlights that Microsoft Office vulnerabilities surged 234% year-over-year, and critical flaws in Azure and Dynamics 365 jumped from 4 to 37, showing risk concentration in cloud and productivity platforms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article, authored by BeyondTrust executives, analyzes the 2026 Microsoft Vulnerabilities Report, which found that Microsoft disclosed 1,273 vulnerabilities in 2025, down from 1,360 the prior year. However, critical vulnerabilities doubled from 78 to 157, reversing a multi-year downward trend. This is significant because it shows that overall stability in vulnerability counts conceals a growing danger from high-severity flaws that enable privilege escalation and lateral movement. The report emphasizes that Elevation of Privilege vulnerabilities dominate at 40% of all CVEs, and Information Disclosure flaws rose by 73%, reflecting attacker strategies focused on stealth exploitation rather than loud attacks. Azure and Dynamics 365 saw a dramatic spike in critical vulnerabilities from 4 to 37 in a single year, while Microsoft Office vulnerabilities surged 234% year-over-year, jumping from 47 to 157, with critical vulnerabilities increasing tenfold from 3 to 31. The article cites a specific example: CVE-2025-55241, a critical Entra ID flaw patched in July 2025, allowed token forging across any tenant without leaving traces in victim logs. The authors argue that patch management alone is insufficient and recommend actions like auditing standing admin rights, treating service accounts and AI agents with the same scrutiny as human identities, and disabling the Windows preview pane (which was exploited by seven CVEs in 2025). No specific threat actors are named, but the article describes general attacker behavior of walking in, escalating quietly, and operating as trusted users.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article, authored by Morey J. Haber (Chief Security Advisor) and James Maude (Field Chief Technology Officer) of BeyondTrust, analyzes findings from the 2026 Microsoft Vulnerabilities Report. It focuses on Microsoft\u0026rsquo;s disclosed vulnerabilities for the year 2025, highlighting a deceptive stability in total numbers but a critical shift in severity and impact.\u003c/p\u003e\n\n\u003ch2 id=\"key-findings-from-the-report\"\u003eKey Findings from the Report\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTotal vs. Critical\u003c/strong\u003e: Microsoft disclosed 1,273 vulnerabilities in 2025, a slight dip from 1,360 in 2024. However, critical vulnerabilities doubled from 78 to 157, reversing a multi-year downward trend.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDominant Vulnerability Types\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eElevation of Privilege (EoP) accounted for 40% of all CVEs.\u003c/li\u003e\n\u003cli\u003eInformation Disclosure flaws rose by 73% year-over-year.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePlatform-Specific Surges\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAzure and Dynamics 365\u003c/strong\u003e: Total vulnerabilities decreased slightly, but critical vulnerabilities jumped from 4 to 37 — a dramatic increase in a single year.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Windows Server\u003c/strong\u003e: Vulnerabilities increased to 780, with 50 classified as critical.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Office\u003c/strong\u003e: Vulnerabilities surged 234% year-over-year, from 47 to 157. Critical vulnerabilities jumped from 3 to 31 (a 10x increase).\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExploited Feature\u003c/strong\u003e: The Windows preview pane was exploited via seven CVEs in 2025.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details-and-context\"\u003eTechnical Details and Context\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that the combination of rising EoP and Information Disclosure flaws indicates attackers are prioritizing stealth and reconnaissance over noisy exploits. Threat actors are using legitimate credentials and Living Off the Land tactics to escalate access and move laterally. The cloud platform risk is particularly concerning because a critical flaw in Azure or Dynamics 365 can cripple entire business workflows and collapse trust boundaries at machine speed.\u003c/p\u003e\n\n\u003cp\u003eA concrete example provided is CVE-2025-55241, a critical Entra ID flaw patched in July 2025. This vulnerability allowed an attacker to forge tokens accepted across any tenant, leaving no trace in victim logs — illustrating the undetectable nature of modern cloud attacks.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article implicitly addresses all organizations using Microsoft products, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnterprises relying on Azure and Dynamics 365 for identity, business automation, and control planes.\u003c/li\u003e\n\u003cli\u003eOrganizations using Microsoft Windows servers as high-value targets for lateral movement.\u003c/li\u003e\n\u003cli\u003eAny entity using Microsoft Office, which remains one of the most abused attack surfaces due to macros, document sharing, preview panes, HTML rendering, new AI capabilities, and add-ins.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attacker-behavior-as-described\"\u003eAttacker Behavior (as Described)\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name specific threat actors or groups. It describes general patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttackers are not breaking down the front door with brute force exploits; they are walking in, escalating quietly, and operating as trusted users (both human and machine).\u003c/li\u003e\n\u003cli\u003eThey prioritize privilege escalation, identity abuse, and lateral movement.\u003c/li\u003e\n\u003cli\u003eInitial access is often mundane, but impact is amplified through excessive privilege, misconfigurations, and weak identity controls.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several actionable recommendations grounded in the data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAudit standing admin rights (referencing Zero Standing Privileges).\u003c/li\u003e\n\u003cli\u003eTreat service accounts and AI agents with the same scrutiny as human identities.\u003c/li\u003e\n\u003cli\u003eDisable the Windows preview pane to mitigate seven specific CVEs.\u003c/li\u003e\n\u003cli\u003ePrioritize vulnerabilities that enable privilege escalation, identity abuse, and lateral movement.\u003c/li\u003e\n\u003cli\u003eUse context beyond CVSS scores, including knowledge of exploits and mappings to frameworks like MITRE ATT\u0026amp;CK.\u003c/li\u003e\n\u003cli\u003eRethink trust assumptions across cloud, endpoint, server, and productivity layers.\u003c/li\u003e\n\u003cli\u003eImplement AI security posture management for proper governance of AI agents.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance-and-conclusion\"\u003eSignificance and Conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s core message is that patch management alone is insufficient. The doubling of critical vulnerabilities, especially in cloud and productivity platforms, combined with attacker shifts toward stealth and privilege escalation, requires organizations to focus on privilege reduction, identity visibility, and continuous risk assessment. The numbers may look stable, but the attack surface and business impact continue to increase when identity controls are absent.\u003c/p\u003e\n","keyPoints":["Microsoft disclosed 1,273 vulnerabilities in 2025, a decrease from 1,360 the prior year, but critical vulnerabilities doubled from 78 to 157.","Elevation of Privilege vulnerabilities accounted for 40% of all CVEs, and Information Disclosure flaws rose 73%, indicating attackers prioritize stealth and reconnaissance.","Critical vulnerabilities in Azure and Dynamics 365 spiked from 4 to 37 in a single year.","Microsoft Office vulnerabilities surged 234% year-over-year, from 47 to 157, with critical vulnerabilities jumping from 3 to 31.","The article recommends auditing standing admin rights, treating service accounts and AI agents with scrutiny, and disabling the Windows preview pane due to seven CVEs exploiting it."],"insights":["The stability of total vulnerability counts masks a doubling of critical vulnerabilities, meaning organizations that track only aggregate numbers will underestimate their risk exposure.","The 234% surge in Microsoft Office vulnerabilities is partly attributed to new AI capabilities and add-ins, indicating that the integration of AI into productivity software is expanding the attack surface in ways not seen before.","The article recommends disabling the Windows preview pane to mitigate seven CVEs, a highly specific and actionable step that many organizations likely overlook as a simple defense.","The CVE-2025-55241 Entra ID flaw allowed token forging across any tenant with no trace in victim logs, revealing that critical cloud vulnerabilities can enable completely undetectable compromise."],"referencedReports":[{"title":"2026 Microsoft Vulnerabilities Report","url":"https://www.beyondtrust.com/resources/whitepapers/microsoft-vulnerability-report?utm_campaign=2026-MVR\u0026utm_source=BC\u0026utm_medium=Tier_One","publisher":"BeyondTrust","context":"The article analyzes data from this report, which shows Microsoft disclosed 1,273 vulnerabilities in 2025, with critical vulnerabilities doubling year-over-year.","category":"","primary":false}],"body":"\u003cp\u003eThe article, based on BeyondTrust\u0026rsquo;s 2026 Microsoft Vulnerabilities Report, reveals that while total Microsoft vulnerabilities decreased slightly to 1,273 in 2025, critical vulnerabilities doubled from 78 to 157. This reversal of a multi-year downward trend is the core event, signaling that stability in total volume masks growing impact severity. Elevation of Privilege flaws now account for 40% of all CVEs, and Information Disclosure flaws rose 73%, indicating attackers prioritize stealth and reconnaissance. The article highlights that Microsoft Office vulnerabilities surged 234% year-over-year, and critical flaws in Azure and Dynamics 365 jumped from 4 to 37, showing risk concentration in cloud and productivity platforms.\u003c/p\u003e\n"},{"n":9,"title":"Microsoft blames macOS update for undismissible Teams location prompts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-blames-undismissible-teams-location-prompts-on-macos-update/","time":"16:10","priority":"MAY READ","score":65,"tldr":"Microsoft has confirmed that a recent macOS security update prevents Teams from retaining location permission choices, causing non-dismissible prompts, and is working with Apple on a fix while advising users to manually toggle location settings.","briefOverview":"\u003cp\u003eMicrosoft has confirmed that a recent macOS security update is causing non-dismissible location permission prompts in the Microsoft Teams app. Users report that clicking \u0026ldquo;Don\u0026rsquo;t Allow\u0026rdquo; repeatedly does not stop the prompts from reappearing, sometimes dozens of times. The issue affects only Teams users on Mac who have enabled location access in their Teams settings. Microsoft is working with Apple to understand the change and is also investigating a potential fix within Teams to mitigate the repeated prompts. Until a fix is available, the recommended workaround is to manually toggle location access for both \u0026ldquo;Microsoft Teams\u0026rdquo; and \u0026ldquo;Microsoft Teams ModuleHost\u0026rdquo; in macOS System Settings under Privacy \u0026amp; Security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has acknowledged a known issue where the Teams app displays non-dismissible location prompts on some macOS systems. The prompts ask for permission to use location \u0026ldquo;for things like GPS and Wi-Fi\u0026rdquo; and do not go away even after clicking \u0026ldquo;Don\u0026rsquo;t Allow\u0026rdquo; multiple times. One user reported clicking the button at least twenty times in a row with no effect. Microsoft attributed the problem to a recent macOS security update that prevents the operating system from storing users\u0026rsquo; location permission selections for Teams. The company stated it is working with Apple to better understand the change and is simultaneously investigating a fix within Teams itself.\u003c/p\u003e\n\n\u003cp\u003eThe issue was documented in Microsoft\u0026rsquo;s incident report TM1315837 and classified as an advisory, indicating limited scope or impact. First reports surfaced on May 11, 2026, and the article notes that the problem affects only those Mac users who have enabled location access in their Teams settings. As a temporary workaround, Microsoft advises affected users to go to System Settings \u0026gt; Privacy \u0026amp; Security \u0026gt; Location Services, locate \u0026ldquo;Microsoft Teams\u0026rdquo; and \u0026ldquo;Microsoft Teams ModuleHost,\u0026rdquo; toggle them on and off, then set them back to the desired setting.\u003c/p\u003e\n\n\u003cp\u003eThe article places this incident in the context of several other recent Teams problems. In recent weeks, Microsoft began rolling out a fix for an issue that prevented Teams Free users from chatting and calling others, addressed another problem blocking Windows users from joining Teams meetings due to a bug introduced by a Microsoft Edge update, and reverted a service update that was blocking some customers from launching the Teams desktop client. These incidents suggest a pattern of reliability issues across the platform, though each has a distinct root cause.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has confirmed that a recent macOS security update is responsible for non-dismissible location permission prompts appearing in the Microsoft Teams app on Mac systems. Users have reported that the prompts, which ask for permission to use location \u0026ldquo;for things like GPS and Wi-Fi,\u0026rdquo; repeatedly reappear even after clicking \u0026ldquo;Don\u0026rsquo;t Allow.\u0026rdquo; One Reddit user described clicking the button at least twenty times in a row without the dialog disappearing. The company acknowledged the issue in incident report TM1315837 on its Message Center.\u003c/p\u003e\n\n\u003ch2 id=\"technical-cause\"\u003eTechnical Cause\u003c/h2\u003e\n\n\u003cp\u003eAccording to Microsoft, the root cause is a recent macOS security update that no longer stores users\u0026rsquo; location permission selections for Teams as expected. This means that even after a user grants or denies location access, the operating system does not persist that choice, causing the prompt to re-trigger each time the Teams app checks for location permissions. Microsoft stated it is working with Apple to understand the change and is also investigating a potential fix within the Teams application itself.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users-and-impact\"\u003eAffected Users and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe issue affects only certain Microsoft Teams users on Mac who have enabled location access in their Teams settings.\u003c/li\u003e\n\u003cli\u003eMicrosoft has not yet disclosed which regions are affected or how many users are impacted.\u003c/li\u003e\n\u003cli\u003eThe first reports surfaced on May 11, 2026.\u003c/li\u003e\n\u003cli\u003eMicrosoft has flagged the incident as an advisory, a label commonly used for service issues with limited scope or impact.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"workaround\"\u003eWorkaround\u003c/h2\u003e\n\n\u003cp\u003eUntil a permanent fix is available, Microsoft recommends that impacted users manually enable location access for Teams within macOS settings. The steps are:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eGo to System Settings \u0026gt; Privacy \u0026amp; Security \u0026gt; Location Services.\u003c/li\u003e\n\u003cli\u003eLocate both \u0026ldquo;Microsoft Teams\u0026rdquo; and \u0026ldquo;Microsoft Teams ModuleHost.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eToggle them on and off, then set them back to the desired setting.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"related-recent-issues\"\u003eRelated Recent Issues\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Microsoft has faced several other Teams-related problems in the weeks leading up to this report:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBackend change broke Teams Free chat and calls:\u003c/strong\u003e Microsoft began rolling out a fix for an issue that prevented some Microsoft Teams Free users from chatting and calling others.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEdge update blocked meeting joins:\u003c/strong\u003e Another issue blocked Windows users from joining Teams meetings due to a bug introduced by a recent Microsoft Edge browser update.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eService update caused launch failures:\u003c/strong\u003e Microsoft reverted a service update that was blocking some customers from launching the Teams desktop client.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese incidents, while distinct, indicate a broader pattern of reliability challenges for the Teams platform during this period.\u003c/p\u003e\n\n\u003ch2 id=\"incident-classification\"\u003eIncident Classification\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft classified this specific incident as an advisory. The article explains that this label is \u0026ldquo;commonly used to describe service issues involving limited scope or impact.\u0026rdquo; This suggests that while the problem is disruptive for affected users, Microsoft does not consider it a widespread outage or critical security vulnerability.\u003c/p\u003e\n","keyPoints":["Microsoft has confirmed that some macOS users are seeing non-dismissible location prompts in the Teams app.","The issue is attributed to a recent macOS security update that prevents the operating system from storing users' location permission selections for Teams.","Microsoft is working with Apple to understand the change and is also investigating a fix within Teams to mitigate the repeated prompts.","As a workaround, Microsoft advises affected users to manually enable and toggle location access for Microsoft Teams and Microsoft Teams ModuleHost in macOS System Settings under Privacy \u0026 Security."],"insights":["Microsoft classified this Teams location prompt issue as an advisory, indicating the company considers it to have limited scope and impact despite persistent prompts reported by users.","The article notes that Microsoft has faced several other Teams-related problems in recent weeks (e.g., a backend change breaking free chat/calls, an Edge update blocking meetings, and a service update causing launch failures), revealing a broader pattern of reliability issues.","The recommended workaround requires users to manually toggle location permissions for both \"Microsoft Teams\" and \"Microsoft Teams ModuleHost\" in System Settings, a specific two-step action that may not be obvious to affected individuals."],"referencedReports":[{"title":"TM1315837","url":"https://admin.microsoft.com/#/MessageCenter/:/messages/TM1315837","publisher":"Microsoft","context":"Microsoft acknowledged the Teams location prompt issue in this incident report, blaming a recent macOS security update for causing repeated location permission prompts.","category":"","primary":false},{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Unspecified vendor (via HubSpot)","context":"The article presents this as a downloadable guide covering six validation surfaces, though the publisher is not explicitly named.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has confirmed that a recent macOS security update is causing non-dismissible location permission prompts in the Microsoft Teams app. Users report that clicking \u0026ldquo;Don\u0026rsquo;t Allow\u0026rdquo; repeatedly does not stop the prompts from reappearing, sometimes dozens of times. The issue affects only Teams users on Mac who have enabled location access in their Teams settings. Microsoft is working with Apple to understand the change and is also investigating a potential fix within Teams to mitigate the repeated prompts. Until a fix is available, the recommended workaround is to manually toggle location access for both \u0026ldquo;Microsoft Teams\u0026rdquo; and \u0026ldquo;Microsoft Teams ModuleHost\u0026rdquo; in macOS System Settings under Privacy \u0026amp; Security.\u003c/p\u003e\n"},{"n":7,"title":"Microsoft plans to improve Windows 11 driver quality in 2026","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-plans-to-improve-windows-11-driver-quality-in-2026/","time":"16:22","priority":"MAY READ","score":55,"tldr":"Microsoft is launching a Driver Quality Initiative in 2026 to improve Windows 11 driver reliability and safety by moving more drivers to user mode, tightening partner verification, and cleaning up the Windows Update catalog, as part of a broader effort to win back users after quality and Copilot-related criticism.","briefOverview":"\u003cp\u003eMicrosoft plans to raise the quality bar of Windows 11 drivers through a new Driver Quality Initiative (DQI) announced at the revived WinHEC 2026 conference. This initiative addresses a perceived decline in driver quality that has led to frequent BSODs and game artifacts after Microsoft stopped hosting WinHEC events in 2018.\u003c/p\u003e\n\n\u003cp\u003eThe DQI is built on four pillars: pushing third‑party drivers from kernel mode to safer user‑mode or Microsoft class drivers; tightening partner verification and automated checks; improving Windows Update catalog hygiene by removing outdated or low‑quality drivers; and evaluating stability, features, performance, battery impact, and heat. Microsoft states the DQI is a partnership with hardware makers like AMD and Intel.\u003c/p\u003e\n\n\u003cp\u003eAMD acknowledged that higher‑quality drivers are a shared commitment, emphasizing joint accountability for security, stability, and predictable performance. The DQI is based on learnings from the Windows Resiliency Initiative, and Microsoft is also restoring a movable taskbar and adding other quality‑of‑life features in 2026 as part of a broader effort to win back Windows fans.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has announced plans to improve Windows 11 driver quality in 2026 via the Driver Quality Initiative (DQI), coinciding with the revival of the Windows Hardware Engineering Conference (WinHEC) after an eight‑year hiatus. The company acknowledges that driver quality declined after it stopped hosting WinHEC in 2018, coinciding with a shift in focus toward its cloud business and away from Windows. Users have observed increased BSODs and artifacts in games from monthly driver updates.\u003c/p\u003e\n\n\u003cp\u003eThe DQI rests on four pillars. First, Microsoft will push more third‑party drivers to move out of kernel mode into safer user‑mode drivers or use Microsoft’s own class drivers. Second, it will verify partners more carefully, run more automated checks, and update the Windows Hardware Compatibility Program requirements. Third, Microsoft aims for better Windows Update catalog hygiene, including removing outdated or low‑quality drivers and using improved data to investigate issues. Fourth, it will evaluate stability, features, performance, battery impact, and heat to help partners improve the real Windows experience.\u003c/p\u003e\n\n\u003cp\u003eAt WinHEC 2026, AMD commented that higher‑quality drivers are a shared commitment, and the company is focused on building a culture of joint accountability with Microsoft to ensure security, stability, and predictable performance at scale. The DQI is built on learnings and infrastructure from the Windows Resiliency Initiative (WRI).\u003c/p\u003e\n\n\u003cp\u003eIn addition to driver improvements, Microsoft is reviving Windows 11 more broadly. CEO Satya Nadella stated during the FY26 Q3 earnings call that the company is doing foundational work to win back fans, including performance improvements for lower‑memory devices and streamlined Windows Update experiences. Specific features mentioned include restoring a movable taskbar, adding a toggle for a smaller taskbar, and improving taskbar resize controls with a Windows 10‑like experience. Other rumored enhancements include a native Start menu, faster launch, reduced power consumption, and a new performance mode.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that it is unclear when the driver changes will begin rolling out, but they will gradually be reflected in the coming months as Microsoft continues major improvements to Windows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has announced a comprehensive effort to improve Windows 11 driver quality, culminating in the Driver Quality Initiative (DQI) introduced at the revived WinHEC (Windows Hardware Engineering Conference) in 2026. The initiative directly addresses a perceived decline in driver reliability that followed Microsoft’s shift in focus away from Windows toward its cloud business after 2018.\u003c/p\u003e\n\n\u003ch2 id=\"background-the-decline-and-revival-of-winhec\"\u003eBackground: The Decline and Revival of WinHEC\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft previously hosted WinHEC conferences where developers and OEM partners collaborated on driver quality.\u003c/li\u003e\n\u003cli\u003eThe last WinHEC was held in 2018; Microsoft stopped hosting these events as it began prioritizing its cloud business over Windows.\u003c/li\u003e\n\u003cli\u003eUsers subsequently observed a decrease in driver quality, with monthly updates frequently causing BSODs (Blue Screens of Death) or artifacts in games.\u003c/li\u003e\n\u003cli\u003eMicrosoft acknowledges that drivers “sit at the heart of every Windows experience” and that driver failures are perceived by customers as device problems regardless of root cause.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-driver-quality-initiative-dqi\"\u003eThe Driver Quality Initiative (DQI)\u003c/h2\u003e\n\n\u003cp\u003eThe DQI is built on four pillars, as detailed in a Microsoft blog post from May 14, 2026:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eSafer Driver Models\u003c/strong\u003e: Microsoft will push more third‑party drivers to move out of kernel mode and into safer user‑mode drivers or Microsoft’s own class drivers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnhanced Partner Verification\u003c/strong\u003e: Microsoft will verify partners more carefully, run more automated checks, and update Windows Hardware Compatibility Program requirements.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Update Catalog Hygiene\u003c/strong\u003e: Microsoft aims to improve catalog hygiene by removing outdated or low‑quality drivers and using better data to investigate issues.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHolistic Evaluation\u003c/strong\u003e: Microsoft will assess stability, features, performance, battery impact, and heat to help partners improve the real Windows experience.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe DQI is explicitly based on learnings and infrastructure established through the Windows Resiliency Initiative (WRI).\u003c/p\u003e\n\n\u003ch2 id=\"partner-response\"\u003ePartner Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAMD commented at WinHEC 2026 that “higher‑quality drivers” are not the responsibility of one company.\u003c/li\u003e\n\u003cli\u003eDavid Harmon, Director of Software Engineering at AMD, stated: “It’s a shared commitment. Through our close collaboration with Microsoft, AMD is focused on building a culture of joint accountability to ensure security, stability, and predictable performance for our customers at scale.”\u003c/li\u003e\n\u003cli\u003eThe article notes that Microsoft will work closely with partners including AMD and Intel.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-windows-11-improvements\"\u003eBroader Windows 11 Improvements\u003c/h2\u003e\n\n\u003cp\u003eIn parallel with driver quality enhancements, Microsoft is reviving Windows 11 more broadly after months of criticism and failed attempts to push Copilot. Key points from the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCEO Satya Nadella, during the FY26 Q3 earnings call, promised “doing the foundational work required to win back fans and strengthen engagement across Windows, Xbox, Bing, and Edge.”\u003c/li\u003e\n\u003cli\u003eSpecific improvements: performance improvements for lower‑memory devices, streamlined Windows Update experience, return to core features and fundamentals.\u003c/li\u003e\n\u003cli\u003eMicrosoft is restoring the movable taskbar, adding a toggle to make the taskbar smaller, and improving taskbar resize controls with a Windows 10‑like experience.\u003c/li\u003e\n\u003cli\u003eOther rumored features include a native Start menu, faster launch, reduced power consumption, and a new performance mode.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-impact-and-rollout\"\u003eTechnical Impact and Rollout\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article states it is “unclear when these driver changes will begin rolling out, but they will gradually be reflected in the coming months.”\u003c/li\u003e\n\u003cli\u003eNo specific timeline or affected driver families are disclosed.\u003c/li\u003e\n\u003cli\u003eThe initiative aims to deliver “exceptional device experiences” across media and display, camera, audio, connectivity, and peripherals.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s Driver Quality Initiative represents a significant shift back toward Windows quality fundamentals after years of perceived neglect. By leveraging the infrastructure of the Windows Resiliency Initiative, tightening partner verification, and promoting safer driver models, Microsoft hopes to restore confidence in Windows 11 driver stability. The revival of WinHEC and public commitment from partners like AMD underline the collaborative nature of the effort. Combined with user‑requested features like a movable taskbar, the initiative is part of a broader strategy to win back Windows fans.\u003c/p\u003e\n","keyPoints":["Microsoft plans to raise the quality bar of Windows 11 drivers through the Driver Quality Initiative, which includes moving more third-party drivers to user mode, verifying partners more carefully, improving Windows Update catalog hygiene, and evaluating stability, features, performance, battery impact, and heat.","Microsoft is reviving WinHEC (Windows Hardware Engineering Conference) in 2026 to collaborate with partners on driver quality, after the last WinHEC was held in 2018.","At WinHEC 2026, AMD said that higher-quality drivers are a shared commitment and that the company is focused on building a culture of joint accountability with Microsoft.","The Driver Quality Initiative is based on learnings and infrastructure established through the Windows Resiliency Initiative (WRI).","As part of Windows 11 quality improvements in 2026, Microsoft is restoring the movable taskbar, adding a toggle to make the taskbar smaller, and improving taskbar resize controls with a Windows 10-like experience."],"insights":["Microsoft’s acknowledgment that it stopped hosting WinHEC after 2018 because it “started to care less about Windows and more about its cloud business” reveals a candid internal recognition of past neglect that directly led to driver quality decline.","The Driver Quality Initiative is explicitly built on the infrastructure and learnings from the Windows Resiliency Initiative (WRI), indicating that Microsoft is leveraging prior systematic failure-recovery work to tackle driver stability.","AMD’s public framing of driver quality as a “shared commitment” and “joint accountability” during WinHEC 2026 highlights that even hardware partners see the problem as systemic, not solely Microsoft’s responsibility, which could signal deeper collaborative testing requirements ahead."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft plans to raise the quality bar of Windows 11 drivers through a new Driver Quality Initiative (DQI) announced at the revived WinHEC 2026 conference. This initiative addresses a perceived decline in driver quality that has led to frequent BSODs and game artifacts after Microsoft stopped hosting WinHEC events in 2018.\u003c/p\u003e\n\n\u003cp\u003eThe DQI is built on four pillars: pushing third‑party drivers from kernel mode to safer user‑mode or Microsoft class drivers; tightening partner verification and automated checks; improving Windows Update catalog hygiene by removing outdated or low‑quality drivers; and evaluating stability, features, performance, battery impact, and heat. Microsoft states the DQI is a partnership with hardware makers like AMD and Intel.\u003c/p\u003e\n\n\u003cp\u003eAMD acknowledged that higher‑quality drivers are a shared commitment, emphasizing joint accountability for security, stability, and predictable performance. The DQI is based on learnings from the Windows Resiliency Initiative, and Microsoft is also restoring a movable taskbar and adding other quality‑of‑life features in 2026 as part of a broader effort to win back Windows fans.\u003c/p\u003e\n"},{"n":11,"title":"Webinar: The hidden bottlenecks in network incident response","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-the-hidden-bottlenecks-in-network-incident-response/","time":"12:14","priority":"MAY READ","score":35,"tldr":"A June 2, 2026 webinar will show how AI-assisted workflows and automation can fix manual bottlenecks in network incident response, reducing delays and improving coordination from alert to resolution.","briefOverview":"\u003cp\u003eBleepingComputer will host a live webinar on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The session features Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines, and focuses on reducing operational bottlenecks during high-pressure incidents.\u003c/p\u003e\n\n\u003cp\u003eIT teams are overwhelmed by alerts from multiple monitoring and security platforms, yet many still rely on manual triage and coordination across disparate systems. The webinar will explore how AI-assisted workflows and automation can automatically enrich alerts, prioritize incidents, and route them without manual intervention.\u003c/p\u003e\n\n\u003cp\u003eAttendees will learn how to close gaps between alerting, triage, analysis, routing, and resolution. The article encourages registration via a provided link, emphasizing that automation can reduce response delays and improve incident resolution.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article announces a live webinar hosted by BleepingComputer on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The speaker is Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines, a company that helps organizations build intelligent workflows to connect systems and automate repetitive tasks.\u003c/p\u003e\n\n\u003cp\u003eIt highlights that IT teams today face a deluge of alerts from monitoring platforms, infrastructure systems, identity services, ticketing platforms, and security tools. During network incidents, responders must manually jump between these systems to understand what happened and coordinate next steps, which creates operational bottlenecks.\u003c/p\u003e\n\n\u003cp\u003eThese manual workflows for triage, investigation, and routing slow response times and increase the risk of outages and service disruptions. The webinar will examine where these workflows commonly break down and how automation can help IT teams respond more efficiently under pressure.\u003c/p\u003e\n\n\u003cp\u003eSpecific topics include how network incidents evolve from initial alert to service impact, where enrichment and routing break down, and techniques to automatically enrich alerts with network, identity, and threat context. The session also covers how to prioritize and route incidents without manual intervention, moving from fragmented response to coordinated resolution across systems.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as an opportunity for IT teams to reduce manual overhead and close operational gaps. A registration link is provided, and the article includes an image banner directing readers to sign up.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"event-overview\"\u003eEvent Overview\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer will host a live webinar on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The speaker is Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines. The webinar aims to address the operational bottlenecks that slow down incident response during high-pressure network incidents.\u003c/p\u003e\n\n\u003ch2 id=\"problem-context\"\u003eProblem Context\u003c/h2\u003e\n\n\u003cp\u003eIT teams are deluged by alerts from monitoring platforms, infrastructure systems, identity services, ticketing platforms, and security tools. Despite this abundance of data, responders often must manually jump between systems to understand incidents and coordinate next steps. Many organizations still rely on manual triage, investigation, and routing processes, which creates bottlenecks that slow response times and increase the risk of outages and service disruptions.\u003c/p\u003e\n\n\u003ch2 id=\"webinar-focus\"\u003eWebinar Focus\u003c/h2\u003e\n\n\u003cp\u003eThe session will explore how AI-assisted workflows and automation can help IT teams reduce delays, improve coordination, and resolve incidents faster. Tines is described as a company that helps organizations build intelligent workflows that connect systems, automate repetitive tasks, and streamline operational response processes across complex environments.\u003c/p\u003e\n\n\u003ch2 id=\"technical-topics-covered\"\u003eTechnical Topics Covered\u003c/h2\u003e\n\n\u003cp\u003eThe webinar will cover several specific areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow network incidents typically evolve from initial alert to service impact\u003c/li\u003e\n\u003cli\u003eWhere triage, enrichment, and routing break down in real-world workflows\u003c/li\u003e\n\u003cli\u003eHow to automatically enrich alerts with network, identity, and threat context\u003c/li\u003e\n\u003cli\u003eTechniques to prioritize and route incidents without manual intervention\u003c/li\u003e\n\u003cli\u003eHow to move from fragmented response to coordinated resolution across systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the webinar as an opportunity for IT teams to learn how to reduce manual overhead and close operational gaps between alerting, triage, analysis, routing, and resolution. A registration link is provided, and readers are encouraged to sign up to secure their spot.\u003c/p\u003e\n","keyPoints":["The June 2, 2026 webinar titled 'From alert to resolution: Fixing the gaps in network incident response' will be hosted by BleepingComputer and feature Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines.","Many organizations still rely on manual triage, investigation, and routing processes to respond to network incidents, which creates operational bottlenecks that slow response times and increase the risk of outages.","The webinar will cover how to automatically enrich alerts with network, identity, and threat context, and how to prioritize and route incidents without manual intervention.","Tines helps organizations build intelligent workflows that connect systems, automate repetitive tasks, and streamline operational response processes across complex environments."],"insights":["The article highlights a surprising contradiction: while IT teams are deluged with alerts from multiple systems, many organizations still rely on manual triage and routing, indicating that tool integration alone does not solve workflow gaps.","The webinar's focus on how incidents evolve 'from initial alert to service impact' suggests that current response processes often fail to address the early stages of an incident, allowing delays to compound before resolution.","The specific technique of automatically enriching alerts with network, identity, and threat context is actionable, as it directly reduces the manual overhead of context gathering, a common bottleneck during high-pressure incidents."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer will host a live webinar on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The session features Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines, and focuses on reducing operational bottlenecks during high-pressure incidents.\u003c/p\u003e\n\n\u003cp\u003eIT teams are overwhelmed by alerts from multiple monitoring and security platforms, yet many still rely on manual triage and coordination across disparate systems. The webinar will explore how AI-assisted workflows and automation can automatically enrich alerts, prioritize incidents, and route them without manual intervention.\u003c/p\u003e\n\n\u003cp\u003eAttendees will learn how to close gaps between alerting, triage, analysis, routing, and resolution. The article encourages registration via a provided link, emphasizing that automation can reduce response delays and improve incident resolution.\u003c/p\u003e\n"}];

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
