<script>
window.__DL_ARTICLES = [{"n":21,"title":"Shai-Hulud: Here We Go Again. Mass npm Supply Chain Attack Hits the AntV Ecosystem","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/shai-hulud-here-we-go-again-mass-npm-supply-chain-attack-hits-the-antv-ecosystem","time":"06:57","priority":"MUST READ","score":97,"tldr":"A massive npm supply chain attack compromised over 300 packages in the AntV ecosystem, stealing CI/CD secrets and developer credentials through obfuscated payloads; if you installed any affected version, assume all secrets are compromised and rotate them immediately.","briefOverview":"\u003cp\u003eA massive npm supply chain attack compromised the account \u003ccode\u003eatool\u003c/code\u003e, which publishes the widely-used \u003ccode\u003etimeago.js\u003c/code\u003e package and maintains many packages in the \u003ccode\u003e@antv\u003c/code\u003e namespace. Over 300 packages were published with malicious versions that carry an obfuscated payload designed to steal secrets from GitHub Actions runners and developer machines. The attack is ongoing, with the number of affected packages continuing to grow.\u003c/p\u003e\n\n\u003cp\u003eThe payload steals CI/CD secrets by reading the \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract masked secrets in plaintext, then harvests credentials from over 130 file paths including cloud provider configs, SSH keys, and cryptocurrency wallets. Stolen data is exfiltrated through two channels: a GitHub API dead-drop branch in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e repository, and a fallback C2 server at \u003ccode\u003et.m-kosche.com\u003c/code\u003e disguised as an OpenTelemetry endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article states that over 2,200 public GitHub repositories have already been created using exfiltrated tokens, naming them with Dune-universe terminology and the reversed campaign marker \u0026ldquo;Shai-Hulud: Here We Go Again.\u0026rdquo; This attack represents one of the largest coordinated npm supply chain campaigns ever documented. Anyone who installed an affected version is advised to assume all secrets accessible in that environment are compromised and rotate all credentials immediately.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article details a widespread npm supply chain attack targeting the AntV data visualization ecosystem, published by Alibaba. The attacker compromised the npm account \u003ccode\u003eatool\u003c/code\u003e (email \u003ccode\u003ei@hust.cc\u003c/code\u003e), the publisher of \u003ccode\u003etimeago.js\u003c/code\u003e with 1.5 million weekly downloads and a maintainer of the \u003ccode\u003e@antv\u003c/code\u003e namespace containing over 100 packages. Malicious versions of more than 300 packages were published in two waves on May 19, 2026, with each package carrying an obfuscated JavaScript payload executed via the Bun runtime.\u003c/p\u003e\n\n\u003cp\u003eThe payload is sophisticated and multi-stage. It first checks for a CI environment and reads the \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract every secret marked \u003ccode\u003eisSecret:true\u003c/code\u003e in plaintext, bypassing log masking. It then sweeps over 130 credential file paths on the host filesystem, including cloud provider credentials, SSH keys, Kubernetes configs, cryptocurrency wallets, and AI tooling configurations. The harvested data is encrypted with a PBKDF2-derived key and exfiltrated either via a GitHub API dead-drop in the \u003ccode\u003eantvis/G2\u003c/code\u003e repository or directly to a C2 server at \u003ccode\u003et.m-kosche.com\u003c/code\u003e masquerading as an OpenTelemetry collector endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe attack employed two delivery mechanisms. The first added a \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e script directly to the package\u0026rsquo;s \u003ccode\u003epackage.json\u003c/code\u003e that runs the payload via Bun. The second, more sophisticated pattern used an \u003ccode\u003eoptionalDependencies\u003c/code\u003e field pointing to a poisoned commit in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e GitHub repository, where a \u003ccode\u003eprepare\u003c/code\u003e hook triggers the payload with an intentional \u003ccode\u003eexit 1\u003c/code\u003e to appear as a failure. This second pattern evades static analysis tools that inspect \u003ccode\u003escripts\u003c/code\u003e fields in published packages.\u003c/p\u003e\n\n\u003cp\u003eStolen GitHub tokens are being actively used to create public repositories named with Dune-universe terms (atreides, fedaykin, harkonnen, etc.) followed by random numbers, each with the reversed string \u0026ldquo;Shai-Hulud: Here We Go Again\u0026rdquo; in the description. Over 2,200 such repositories have been created, providing a lower bound on the number of compromised environments. The payload also drops persistent backdoors into Claude Code and VS Code configurations, and injects a malicious GitHub Actions workflow (\u003ccode\u003ecodeql.yml\u003c/code\u003e) to exfiltrate secrets on future pushes or deployments.\u003c/p\u003e\n\n\u003cp\u003eRuntime analysis using Harden-Runner demonstrated that default protections blocked the attack without configuration. The C2 domain was flagged by the Global Block List, and memory access detection terminated the workflow. In a test with protections disabled, the full attack chain was observed: the payload installed Bun, read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory via four \u003ccode\u003epython3\u003c/code\u003e processes, and exfiltrated data to both the C2 server and the GitHub API. Harden-Runner flagged each memory read as \u0026ldquo;Runner Worker Memory Read\u0026rdquo; detections.\u003c/p\u003e\n\n\u003cp\u003eThe article provides detailed recovery steps including pinning to safe versions, removing persistence artifacts, rotating all credentials, and auditing CI/CD environments. StepSecurity offers several enterprise defenses including a Secure Registry with cooldown periods, AI Package Analyst for real-time detection, and Dev Machine Guard to identify compromised developer machines.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a large-scale npm supply chain attack targeting the AntV ecosystem, a suite of data visualization libraries published by Alibaba. The attack compromised the npm account \u003ccode\u003eatool\u003c/code\u003e (email \u003ccode\u003ei@hust.cc\u003c/code\u003e), which is the primary publisher of the popular \u003ccode\u003etimeago.js\u003c/code\u003e library (1.5 million weekly downloads) and a maintainer in the \u003ccode\u003e@antv\u003c/code\u003e namespace. Over 300 packages were published with malicious versions carrying an obfuscated payload designed to steal secrets from CI/CD environments and developer machines.\u003c/p\u003e\n\n\u003ch2 id=\"attack-timeline\"\u003eAttack Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe attack unfolded in two coordinated waves on May 19, 2026 (UTC):\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eWave 1 (01:56 UTC):\u003c/strong\u003e The first malicious version of each package was published. The \u003ccode\u003epreinstall\u003c/code\u003e hook uses \u003ccode\u003ebun run index.js\u003c/code\u003e; if Bun is not installed, it is downloaded at runtime via \u003ccode\u003ecurl -fsSL https://bun.sh/install | bash\u003c/code\u003e.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eWave 2 (+10 minutes, 02:06 UTC):\u003c/strong\u003e A second set of versions was published with a minor update: \u003ccode\u003ebun\u003c/code\u003e was added as an explicit npm dependency, making the payload more reliable. The double-publish pattern (incrementing minor version by one) is a known attacker technique to make version bumps appear routine and ensure at least one delivery succeeds.\u003c/p\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe malicious payload is a 486-498 KB obfuscated JavaScript file executed by the Bun runtime. Obfuscation uses \u003ccode\u003ejavascript-obfuscator\u003c/code\u003e format with a 1,728-entry string table and PBKDF2-seeded Fisher-Yates rotation, plus a secondary per-string cipher (PBKDF2-SHA256, 200,000 iterations). The cipher key and salt differ per payload, but the algorithm is identical across the campaign.\u003c/p\u003e\n\n\u003ch3 id=\"payload-capabilities\"\u003ePayload Capabilities\u003c/h3\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eRunner.Worker Memory Scraping:\u003c/strong\u003e The payload scans \u003ccode\u003e/proc/[pid]/cmdline\u003c/code\u003e to locate the \u003ccode\u003eRunner.Worker\u003c/code\u003e process, then reads its memory via \u003ccode\u003e/proc/[pid]/mem\u003c/code\u003e. The dump is piped through \u003ccode\u003etr -d '\\0' | grep -aoE '\u0026quot;[^\u0026quot;]+\u0026quot;:{\u0026quot;value\u0026quot;:\u0026quot;[^\u0026quot;]*\u0026quot;,\u0026quot;isSecret\u0026quot;:true}' | sort -u\u003c/code\u003e to extract every secret marked \u003ccode\u003eisSecret:true\u003c/code\u003e in plaintext, bypassing log masking.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eCI/CD Environment Variable Theft:\u003c/strong\u003e When running in a CI environment (detected via \u003ccode\u003eGITHUB_ACTIONS\u003c/code\u003e, \u003ccode\u003eCIRCLECI\u003c/code\u003e, \u003ccode\u003eTRAVIS\u003c/code\u003e, \u003ccode\u003eBUILDKITE\u003c/code\u003e, and 15 other CI signals), the payload directly reads environment variables such as \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_TOKEN\u003c/code\u003e, \u003ccode\u003eNPM_TOKEN\u003c/code\u003e, \u003ccode\u003eAWS_ACCESS_KEY_ID\u003c/code\u003e, \u003ccode\u003eAWS_SECRET_ACCESS_KEY\u003c/code\u003e, \u003ccode\u003eVAULT_TOKEN\u003c/code\u003e, and \u003ccode\u003eKUBECONFIG\u003c/code\u003e.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eCredential File Harvest:\u003c/strong\u003e Over 130 credential file patterns are swept on the host filesystem, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloud: \u003ccode\u003e~/.aws/credentials\u003c/code\u003e, \u003ccode\u003e~/.config/gcloud/credentials.db\u003c/code\u003e, \u003ccode\u003e~/.azure/accessTokens.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSSH: \u003ccode\u003e~/.ssh/id_rsa\u003c/code\u003e, \u003ccode\u003e~/.ssh/id_ed25519\u003c/code\u003e, \u003ccode\u003e~/.ssh/config\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDevOps tokens: \u003ccode\u003e~/.npmrc\u003c/code\u003e, \u003ccode\u003e~/.pypirc\u003c/code\u003e, \u003ccode\u003e~/.netrc\u003c/code\u003e, \u003ccode\u003e.git-credentials\u003c/code\u003e, \u003ccode\u003e~/.docker/config.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eKubernetes/Vault: \u003ccode\u003e~/.kube/config\u003c/code\u003e, \u003ccode\u003e~/.vault-token\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCrypto wallets: \u003ccode\u003e~/.bitcoin/wallet.dat\u003c/code\u003e, \u003ccode\u003e~/.ethereum/keystore/*\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eMessaging: \u003ccode\u003e~/.config/Slack/Cookies\u003c/code\u003e, \u003ccode\u003e~/.config/discord/Local Storage/leveldb/*\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eAI tooling: \u003ccode\u003e~/.claude.json\u003c/code\u003e, \u003ccode\u003e~/.claude/mcp.json\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eDual-Channel Exfiltration:\u003c/strong\u003e All harvested data is encrypted with a PBKDF2-derived key (200,000 iterations, SHA-256) unique to each payload. The primary channel is a GitHub API dead-drop where encrypted data is committed to a branch in the \u003ccode\u003eantvis/G2\u003c/code\u003e repository using a spoofed User-Agent \u003ccode\u003epython-requests/2.31.0\u003c/code\u003e. The fallback channel is direct HTTPS to \u003ccode\u003et.m-kosche.com:443\u003c/code\u003e posting to path \u003ccode\u003eapi/public/otel/v1/traces\u003c/code\u003e, masquerading as an OpenTelemetry collector endpoint.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eDaemonization:\u003c/strong\u003e The payload forks into a background process using \u003ccode\u003e__DAEMONIZED=1\u003c/code\u003e as a guard against re-entry. The foreground process exits immediately, allowing \u003ccode\u003enpm install\u003c/code\u003e to complete without visible error while the credential harvest runs after npm exits.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003ePersistence Backdoors:\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.claude/settings.json\u003c/code\u003e: Injects a \u003ccode\u003eSessionStart\u003c/code\u003e hook that re-executes the malware on every Claude Code session.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.claude/setup.mjs\u003c/code\u003e: Shared setup script for Claude Code persistence.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/tasks.json\u003c/code\u003e: Adds a \u003ccode\u003efolderOpen\u003c/code\u003e task that re-executes the payload every time VS Code opens the project.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/setup.mjs\u003c/code\u003e: Shared setup script for VS Code persistence.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e: Injects a malicious GitHub Actions workflow that exfiltrates all repository secrets on push or deployment events.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003ePrivilege Escalation:\u003c/strong\u003e On Linux CI runner systems, the payload attempts to write a sudoers rule: \u003ccode\u003eecho 'runner ALL=(ALL) NOPASSWD:ALL' \u0026gt; /mnt/runner \u0026amp;\u0026amp; chmod 0440 /mnt/runner\u003c/code\u003e, granting the runner user full passwordless sudo access.\u003c/p\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"delivery-mechanisms\"\u003eDelivery Mechanisms\u003c/h2\u003e\n\n\u003ch3 id=\"pattern-a-direct-install-hook\"\u003ePattern A: Direct Install Hook\u003c/h3\u003e\n\n\u003cp\u003eA \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e script is added directly to the package\u0026rsquo;s \u003ccode\u003epackage.json\u003c/code\u003e:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-javascript\"\u003e\u0026quot;scripts\u0026quot;: {\n  \u0026quot;preinstall\u0026quot;: \u0026quot;node -e \\\u0026quot;require('child_process').spawnSync('bun',['run','index.js'],{stdio:'inherit'})\\\u0026quot;\u0026quot;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThe hook fires immediately when the package is installed. If Bun is not present, it is installed silently before the payload executes. This pattern was used across most \u003ccode\u003e@antv/*\u003c/code\u003e packages.\u003c/p\u003e\n\n\u003ch3 id=\"pattern-b-optionaldependencies-git-reference\"\u003ePattern B: optionalDependencies Git Reference\u003c/h3\u003e\n\n\u003cp\u003eA more sophisticated pattern adds a single field to \u003ccode\u003epackage.json\u003c/code\u003e that references a poisoned commit in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e GitHub repository:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-javascript\"\u003e\u0026quot;optionalDependencies\u0026quot;: {\n  \u0026quot;@antv/setup\u0026quot;: \u0026quot;github:antvis/G2#7cb42f57561c321ecb09b4552802ae0ac55b3a7a\u0026quot;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThat commit contains a minimal \u003ccode\u003epackage.json\u003c/code\u003e with a \u003ccode\u003eprepare\u003c/code\u003e hook that runs \u003ccode\u003ebun run index.js \u0026amp;\u0026amp; exit 1\u003c/code\u003e. Because the dependency resolves to a trusted GitHub organization and no \u003ccode\u003escripts\u003c/code\u003e entry appears in the published tarball itself, this pattern evades static analysis tools that inspect \u003ccode\u003escripts\u003c/code\u003e fields in published packages.\u003c/p\u003e\n\n\u003ch2 id=\"runtime-analysis-with-harden-runner\"\u003eRuntime Analysis with Harden-Runner\u003c/h2\u003e\n\n\u003cp\u003eThe article describes installing \u003ccode\u003eecharts-for-react@3.0.7\u003c/code\u003e in a GitHub Actions workflow protected by Harden-Runner to observe behavior.\u003c/p\u003e\n\n\u003ch3 id=\"default-protections\"\u003eDefault Protections\u003c/h3\u003e\n\n\u003cp\u003eWith Harden-Runner\u0026rsquo;s default security controls, two independent protections prevented the exploit:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe C2 domain \u003ccode\u003et.m-kosche.com\u003c/code\u003e was blocked by the Global Block List when \u003ccode\u003ebun.exe\u003c/code\u003e attempted to connect.\u003c/li\u003e\n\u003cli\u003eWhen the payload attempted to read \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory, Harden-Runner detected the memory access and terminated the workflow run.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThese protections operate independently, providing defense in depth at the CI/CD runner level.\u003c/p\u003e\n\n\u003ch3 id=\"deep-analysis-protections-disabled\"\u003eDeep Analysis (Protections Disabled)\u003c/h3\u003e\n\n\u003cp\u003eWith protections disabled, the full attack chain was observed. The process tree captured during \u003ccode\u003enpm install echarts-for-react@3.0.7\u003c/code\u003e showed:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode\u003enpm install (PID 2368)\n  └─ node (PID 2379) - resolves github:antvis/G2#7cb42f5..., installs bun\n      └─ dash (PID 2400) - prepare hook fires\n          └─ bun.exe (PID 2401) - runs index.js (the malicious payload)\n              ├─ gh (PID 2419) - GitHub CLI reconnaissance\n              ├─ sudo (PID 2428)\n              │   └─ python3.12 (PID 2429) - reads /proc/2175/mem (Runner.Worker)\n              ├─ dash (PID 2430)\n              │   ├─ tr (PID 2431) - strips null bytes\n              │   ├─ grep (PID 2432) - extracts isSecret:true JSON\n              │   └─ sort (PID 2433) - deduplicates extracted secrets\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eNetwork telemetry recorded three outbound destinations: legitimate \u003ccode\u003eregistry.npmjs.org\u003c/code\u003e, the C2 server \u003ccode\u003et.m-kosche.com\u003c/code\u003e, and \u003ccode\u003eapi.github.com\u003c/code\u003e for the dead-drop channel. Harden-Runner flagged four \u0026ldquo;Runner Worker Memory Read\u0026rdquo; detections, one for each \u003ccode\u003epython3\u003c/code\u003e process that attempted to read \u003ccode\u003e/proc/2175/mem\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003ch3 id=\"c2-network-domains\"\u003eC2 Network Domains\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003et.m-kosche.com\u003c/code\u003e (port 443, path \u003ccode\u003eapi/public/otel/v1/traces\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eapi.github.com\u003c/code\u003e (dead-drop via \u003ccode\u003eantvis/G2\u003c/code\u003e repo; spoofed UA: \u003ccode\u003epython-requests/2.31.0\u003c/code\u003e)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"persistence-artifacts\"\u003ePersistence Artifacts\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.claude/settings.json\u003c/code\u003e: SessionStart hook\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.claude/setup.mjs\u003c/code\u003e: Shared setup script\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/tasks.json\u003c/code\u003e: folderOpen task\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/setup.mjs\u003c/code\u003e: Shared setup script\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e: Injected workflow\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"detection-signals\"\u003eDetection Signals\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnexpected \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e scripts referencing \u003ccode\u003ebun run index.js\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eoptionalDependencies\u003c/code\u003e pointing to a \u003ccode\u003egithub:\u003c/code\u003e URL with a specific commit hash in \u003ccode\u003eantvis/G2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003ePackage size anomaly: compromised tarballs significantly larger than clean versions\u003c/li\u003e\n\u003cli\u003eTwo versions of the same package published within minutes (double-tap pattern)\u003c/li\u003e\n\u003cli\u003eOutbound HTTPS connections to \u003ccode\u003et.m-kosche.com\u003c/code\u003e during \u003ccode\u003enpm install\u003c/code\u003e or build steps\u003c/li\u003e\n\u003cli\u003eUnexpected \u003ccode\u003epython3\u003c/code\u003e processes reading \u003ccode\u003e/proc/*/mem\u003c/code\u003e during CI runs\u003c/li\u003e\n\u003cli\u003eCommits by unrecognized accounts with message \u003ccode\u003echore: update dependencies\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eBranches with Dune-universe terminology in repository names\u003c/li\u003e\n\u003cli\u003eNetwork requests with User-Agent \u003ccode\u003epython-requests/2.31.0\u003c/code\u003e originating from runner hosts\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recovery-steps\"\u003eRecovery Steps\u003c/h2\u003e\n\n\u003ch3 id=\"code-repositories-developer-machines\"\u003eCode Repositories / Developer Machines\u003c/h3\u003e\n\n\u003col\u003e\n\u003cli\u003ePin to safe versions (downgrade to the last clean version for each affected package)\u003c/li\u003e\n\u003cli\u003eDelete \u003ccode\u003enode_modules\u003c/code\u003e and reinstall: \u003ccode\u003erm -rf node_modules \u0026amp;\u0026amp; npm install\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCheck for and remove persistence artifacts (\u003ccode\u003e.claude/setup.mjs\u003c/code\u003e, \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, etc.)\u003c/li\u003e\n\u003cli\u003eRotate all credentials (npm tokens, GitHub PATs, cloud API keys, SSH keys)\u003c/li\u003e\n\u003cli\u003eCheck for cryptocurrency wallet exposure and transfer funds to a new wallet\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch3 id=\"for-ci-cd-environments\"\u003eFor CI/CD Environments\u003c/h3\u003e\n\n\u003col\u003e\n\u003cli\u003eRotate all CI secrets immediately\u003c/li\u003e\n\u003cli\u003eAudit GitHub repositories for unauthorized commits, branch creation, or workflow modifications\u003c/li\u003e\n\u003cli\u003eReview network logs for suspicious connections\u003c/li\u003e\n\u003cli\u003eCheck for downstream propagation if packages were published during a compromised CI run\u003c/li\u003e\n\u003cli\u003eReview npm access tokens with \u003ccode\u003enpm token list\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the worm is not just stealing secrets but actively using them, with over 2,200 public GitHub repositories created using stolen tokens. These repositories are named with Dune-universe terminology and the reversed campaign marker \u0026ldquo;Shai-Hulud: Here We Go Again,\u0026rdquo; making the blast radius visible in real time. This attack represents one of the largest coordinated npm supply chain campaigns ever documented.\u003c/p\u003e\n","keyPoints":["The attack compromised over 300 packages in the AntV ecosystem, including timeago.js and many @antv packages, via the compromised npm account 'atool'.","The obfuscated payload steals CI/CD secrets by reading Runner.Worker process memory and harvests credentials from over 130 file paths, then exfiltrates data via a GitHub API dead-drop in the antvis/G2 repository or a fallback C2 server at t.m-kosche.com.","Stolen credentials are used to create public repositories with Dune-universe names and the reversed campaign marker 'Shai-Hulud: Here We Go Again,' with over 2,200 such repositories created.","The payload drops persistent backdoors into Claude Code and VS Code configurations, and injects a malicious GitHub Actions workflow (codeql.yml) to exfiltrate repository secrets on push or deployment events."],"insights":["The attack evades static analysis by using an 'optionalDependencies' field referencing a git commit in the legitimate antvis/G2 repository, so no malicious 'scripts' field appears in the published tarball.","The double-publish pattern (two versions within ten minutes, incrementing minor version by one) makes the malicious releases appear routine and ensures delivery even if the first wave's runtime Bun installation fails.","The payload daemonizes by forking into a background process with a '__DAEMONIZED=1' guard and exits immediately, so 'npm install' completes without visible error while the credential harvest runs in the background.","The worm actively uses stolen GitHub tokens to create public repositories with Dune-universe names, making the blast radius visible in real time and confirming over 2,200 environments were successfully compromised.","Harden-Runner's default protections blocked the attack at two independent kill-chain points (C2 domain block and Runner.Worker memory access detection) without any user configuration, demonstrating defense in depth at the runner level."],"referencedReports":[],"body":"\u003cp\u003eA massive npm supply chain attack compromised the account \u003ccode\u003eatool\u003c/code\u003e, which publishes the widely-used \u003ccode\u003etimeago.js\u003c/code\u003e package and maintains many packages in the \u003ccode\u003e@antv\u003c/code\u003e namespace. Over 300 packages were published with malicious versions that carry an obfuscated payload designed to steal secrets from GitHub Actions runners and developer machines. The attack is ongoing, with the number of affected packages continuing to grow.\u003c/p\u003e\n\n\u003cp\u003eThe payload steals CI/CD secrets by reading the \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract masked secrets in plaintext, then harvests credentials from over 130 file paths including cloud provider configs, SSH keys, and cryptocurrency wallets. Stolen data is exfiltrated through two channels: a GitHub API dead-drop branch in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e repository, and a fallback C2 server at \u003ccode\u003et.m-kosche.com\u003c/code\u003e disguised as an OpenTelemetry endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article states that over 2,200 public GitHub repositories have already been created using exfiltrated tokens, naming them with Dune-universe terminology and the reversed campaign marker \u0026ldquo;Shai-Hulud: Here We Go Again.\u0026rdquo; This attack represents one of the largest coordinated npm supply chain campaigns ever documented. Anyone who installed an affected version is advised to assume all secrets accessible in that environment are compromised and rotate all credentials immediately.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft disrupts Fox Tempest malware-signing-as-a-service platform tied to ransomware gangs","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/microsoft-disrupts-fox-tempest-malware-signing-service","time":"16:36","priority":"MUST READ","score":95,"tldr":"Microsoft disrupted Fox Tempest, a malware-signing-as-a-service platform that allowed ransomware gangs like Rhysida and Akira to bypass security by making malicious software appear legitimate, revoking over 1,000 fraudulent certificates.","briefOverview":"\u003cp\u003eMicrosoft disrupted Fox Tempest, a malware-signing-as-a-service platform that helped cybercriminals bypass security by making malicious software appear legitimate. The service abused Microsoft\u0026rsquo;s Artifact Signing to create fraudulent code-signing certificates, allowing ransomware affiliates from groups like Rhysida, INC, Qilin, and Akira to sign their malware.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest operated since May 2025 and charged thousands of dollars per use, with Microsoft analyzing cryptocurrency payments showing millions of dollars paid by ransomware affiliates. Microsoft revoked over 1,000 certificates, seized the service\u0026rsquo;s website, took hundreds of virtual machines offline, and blocked access to a site hosting the underlying code.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft announced the disruption of Fox Tempest, a malware-signing-as-a-service (MSaaS) platform that enabled cybercriminals to make malware appear legitimate. The service abused Microsoft\u0026rsquo;s own Artifact Signing, a tool designed to verify software authenticity, to create short-lived fraudulent code-signing certificates. This allowed ransomware affiliates to bypass antivirus and security checks, significantly increasing the likelihood of successful attacks.\u003c/p\u003e\n\n\u003cp\u003eThe platform had operated since May 2025 and was well-resourced, with departments handling infrastructure creation, customer relations, and financial transactions. Ransomware groups including Rhysida, INC, Qilin, and Akira used Fox Tempest to sign malware families such as Oyster, Lumma Stealer, and Vidar. The signed malware was then distributed through purchased advertisements and fake websites masquerading as legitimate platforms like AnyDesk, Teams, Putty, and Webex.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft\u0026rsquo;s Digital Crimes Unit, led by assistant general counsel Steven Masada, took legal action by unsealing a case in U.S. District Court. The company seized Fox Tempest\u0026rsquo;s website, took hundreds of virtual machines offline, and blocked access to a site hosting the underlying code. Microsoft also revoked over 1,000 code signing certificates attributed to Fox Tempest and obtained evidence showing cybercriminals complaining about the takedown.\u003c/p\u003e\n\n\u003cp\u003eMasada noted that Fox Tempest charged users thousands of dollars, contrasting with lower-cost services like RedVDS that cost as little as $24 per month. Cryptocurrency payment analysis indicated that ransomware affiliates paid Fox Tempest millions of dollars. The attacks targeted organizations in the United States, China, France, and India, infecting thousands of machines and compromising networks worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe disruption highlights how cybercriminal ecosystems are evolving, with sophisticated actors willing to pay premium prices for services that make attacks easier and harder to detect. Masada emphasized that disrupting such capabilities is key to raising the cost of cybercrime, as making malware look legitimate undermines trust in code-signing mechanisms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-disruption\"\u003eOverview of the Disruption\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft announced the disruption of Fox Tempest, a malware-signing-as-a-service (MSaaS) platform that operated since May 2025. The service provided cybercriminals with fraudulent code-signing tools by abusing Microsoft\u0026rsquo;s Artifact Signing service, which is intended to verify software legitimacy. Steven Masada, assistant general counsel at Microsoft\u0026rsquo;s Digital Crimes Unit, stated that the service allowed malware to \u0026ldquo;hide in plain sight\u0026rdquo; by making malicious software appear legitimate, increasing the likelihood that it would bypass security checks and be executed.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-of-the-abuse\"\u003eTechnical Details of the Abuse\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eFox Tempest created short-lived, fraudulent code-signing certificates using Microsoft Artifact Signing.\u003c/li\u003e\n\u003cli\u003eThe group established over a thousand certificates and hundreds of Azure tenants and subscriptions to support its operations.\u003c/li\u003e\n\u003cli\u003eMicrosoft revoked over 1,000 code signing certificates attributed to Fox Tempest.\u003c/li\u003e\n\u003cli\u003eRansomware affiliates uploaded their malware to the Fox Tempest site, had it signed, and then created fake websites masquerading as legitimate platforms (e.g., AnyDesk, Teams, Putty, Webex).\u003c/li\u003e\n\u003cli\u003eThe signed malware families included Oyster, Lumma Stealer, and Vidar.\u003c/li\u003e\n\u003cli\u003eMalware was distributed through purchased advertisements and links designed to look like legitimate download sites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-ransomware-groups-and-targets\"\u003eAffected Ransomware Groups and Targets\u003c/h2\u003e\n\n\u003cp\u003eRansomware affiliates tied to the following groups were identified as users of Fox Tempest:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRhysida\u003c/li\u003e\n\u003cli\u003eINC\u003c/li\u003e\n\u003cli\u003eQilin\u003c/li\u003e\n\u003cli\u003eAkira\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAttacks targeted organizations in the United States, China, France, and India. Masada noted that the service infected thousands of machines and compromised networks worldwide.\u003c/p\u003e\n\n\u003ch2 id=\"financial-model-and-business-structure\"\u003eFinancial Model and Business Structure\u003c/h2\u003e\n\n\u003cp\u003eFox Tempest was described as a well-resourced operation with dedicated departments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInfrastructure creation\u003c/li\u003e\n\u003cli\u003eCustomer relations\u003c/li\u003e\n\u003cli\u003eFinancial transactions\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe service charged users thousands of dollars, and Microsoft\u0026rsquo;s analysis of cryptocurrency payments showed that ransomware affiliates paid Fox Tempest millions of dollars. This contrasts with lower-cost cybercriminal services like RedVDS, which Microsoft disrupted earlier in the year and cost as little as $24 per month.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft\u0026rsquo;s Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft unsealed a legal case in U.S. District Court on Tuesday detailing the disruption. Actions taken included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSeizing Fox Tempest\u0026rsquo;s website\u003c/li\u003e\n\u003cli\u003eTaking hundreds of virtual machines offline\u003c/li\u003e\n\u003cli\u003eBlocking access to a site hosting the underlying code\u003c/li\u003e\n\u003cli\u003eRevoking over 1,000 code signing certificates\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMasada stated that Microsoft obtained evidence showing cybercriminals complaining about the takedown, indicating the disruption\u0026rsquo;s impact.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe disruption demonstrates the evolving cybercriminal ecosystem, where sophisticated actors pay premium prices for advanced capabilities that make attacks easier to carry out and harder to detect. Masada emphasized that when attackers can make malicious software look legitimate, it undermines how people and systems decide what is safe. \u0026ldquo;Disrupting that capability is key to raising the cost of cybercrime,\u0026rdquo; he said.\u003c/p\u003e\n","keyPoints":["Microsoft disrupted Fox Tempest, a malware-signing-as-a-service platform that abused Microsoft's Artifact Signing to create fraudulent code-signing certificates for cybercriminals.","Fox Tempest operated since May 2025 and provided code signing tools that allowed ransomware affiliates from groups like Rhysida, INC, Qilin, and Akira to make malware appear legitimate.","Microsoft revoked over 1,000 code signing certificates attributed to Fox Tempest, seized its website, took hundreds of virtual machines offline, and blocked access to a site hosting the underlying code.","Ransomware affiliates used Fox Tempest to sign malware families including Oyster, Lumma Stealer, and Vidar, distributing them through purchased advertisements and fake websites masquerading as legitimate platforms.","Fox Tempest charged users thousands of dollars and was paid millions of dollars in cryptocurrency by ransomware affiliates, highlighting the evolution of cybercriminal services."],"insights":["The abuse of Microsoft's own Artifact Signing service to create fraudulent certificates highlights a fundamental risk in trusted signing mechanisms, where the same infrastructure designed to verify software legitimacy can be weaponized to bypass security checks.","Fox Tempest operated with departmental structures (infrastructure, customer relations, financial transactions), indicating that cybercriminal operations are evolving into professional service organizations with dedicated business units.","Microsoft's evidence of cybercriminals complaining about the takedown reveals that even illicit service providers are expected to maintain customer satisfaction, underlining the commoditization of cybercrime."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft disrupted Fox Tempest, a malware-signing-as-a-service platform that helped cybercriminals bypass security by making malicious software appear legitimate. The service abused Microsoft\u0026rsquo;s Artifact Signing to create fraudulent code-signing certificates, allowing ransomware affiliates from groups like Rhysida, INC, Qilin, and Akira to sign their malware.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest operated since May 2025 and charged thousands of dollars per use, with Microsoft analyzing cryptocurrency payments showing millions of dollars paid by ransomware affiliates. Microsoft revoked over 1,000 certificates, seized the service\u0026rsquo;s website, took hundreds of virtual machines offline, and blocked access to a site hosting the underlying code.\u003c/p\u003e\n"},{"n":6,"title":"7-Eleven confirms data breach claimed by the ShinyHunters gang","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/7-eleven-confirms-data-breach-claimed-by-the-shinyhunters-gang/","time":"14:16","priority":"MUST READ","score":95,"tldr":"7-Eleven confirmed a data breach where ShinyHunters stole and leaked over 600,000 records after the company refused to pay a ransom.","briefOverview":"\u003cp\u003e7-Eleven confirmed that on April 8, 2026, an unauthorized third party gained access to systems used to store franchisee documents. The ShinyHunters extortion group claimed responsibility on April 17, stating they stole over 600,000 records containing corporate data and personally identifiable information after breaching the company’s Salesforce environment.\u003c/p\u003e\n\n\u003cp\u003e7-Eleven refused to pay a ransom, and ShinyHunters subsequently leaked a 9.4GB archive of documents on their dark web leak site. The company notified affected individuals beginning May 1 and filed notifications in multiple U.S. states, but did not disclose the total number of people impacted.\u003c/p\u003e\n\n\u003cp\u003eThis incident is part of a broader ShinyHunters campaign targeting Salesforce customers over the past year, including breaches of hundreds of companies and claims of billions of records stolen. The FBI advised victims not to pay ransoms, warning that payment does not guarantee data will not be sold or used for further extortion.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003e7-Eleven, a global convenience store chain with over 86,000 stores and loyalty programs exceeding 100 million members, confirmed a data breach discovered in early April 2026. The breach occurred on April 8 when an unauthorized third party accessed systems used to store franchisee documents. The company sent data breach notifications to affected individuals on May 1 and filed notices in multiple U.S. states, but did not reveal the number of impacted persons.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters extortion group claimed responsibility for the attack on April 17, alleging they stole over 600,000 records containing corporate data and personally identifiable information by breaching the company’s Salesforce environment. After 7-Eleven refused to pay a ransom, ShinyHunters leaked a 9.4GB archive of documents on their dark web leak site. The cybercriminals stated that the company failed to reach an agreement despite multiple chances offered.\u003c/p\u003e\n\n\u003cp\u003eThis incident follows a previous ransomware attack against 7-Eleven Denmark in August 2022 that forced the closure of 175 stores. ShinyHunters has been consistently targeting Salesforce customers for the past year, with campaigns such as Salesloft Drift and Salesforce Aura data theft attacks affecting hundreds of companies and allegedly stealing billions of records.\u003c/p\u003e\n\n\u003cp\u003eOther notable breaches claimed by ShinyHunters include the European Commission, Vimeo, McGraw-Hill, Medtronic, Zara, PornHub, Rockstar Games, Match Group, ADT, Google, and Cisco. In contrast to 7-Eleven, edtech giant Instructure recently reached an “agreement” with ShinyHunters to prevent leaked data from being published.\u003c/p\u003e\n\n\u003cp\u003eThe Federal Bureau of Investigation (FBI) advised ShinyHunters’ victims on May 15, 2026 not to pay ransom demands, noting that previous warnings indicate paying does not guarantee the threat actors will not re-extort victims or sell stolen data to other cybercriminals.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003e7-Eleven, a convenience store chain founded in 1927, confirmed a data breach in early April 2026. The company operates over 86,000 stores globally, including 13,000 in the U.S. and Canada, and runs loyalty programs (7Rewards and Speedy Rewards) with more than 100 million members. Additionally, it operates and franchises Speedway, Stripes, Laredo Taco Company, and Raise the Roost Chicken and Biscuits.\u003c/p\u003e\n\n\u003cp\u003eAccording to data breach notifications sent to affected individuals on May 1 and filed in multiple U.S. states on Friday (May 22, 2026 implied), the company discovered that on April 8, 2026, an unauthorized third party gained access to certain 7-Eleven systems used to store franchisee documents. The company stated that it immediately launched an investigation to assess the affected documents and apologized for any inconvenience.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-data\"\u003eAffected Parties and Data\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNumber of affected individuals:\u003c/strong\u003e Not disclosed by 7-Eleven.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eType of data stolen (per ShinyHunters):\u003c/strong\u003e Over 600,000 records containing corporate data and personally identifiable information (PII).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttack vector:\u003c/strong\u003e Breach of 7-Eleven’s Salesforce environment, according to ShinyHunters.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLeaked data:\u003c/strong\u003e ShinyHunters leaked a 9.4GB archive of documents on their dark web leak site after 7-Eleven refused to pay a ransom.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-profile\"\u003eThreat Actor Profile\u003c/h2\u003e\n\n\u003cp\u003eThe ShinyHunters extortion group claimed responsibility for the attack on April 17. They stated that 7-Eleven failed to reach an agreement despite their “incredible patience, all the chances and offers” made. The group leaked the stolen data less than a week after the claim.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters has been actively targeting Salesforce customers for the past year. Notable campaigns include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSalesloft Drift campaign:\u003c/strong\u003e Claimed theft of billions of records from hundreds of companies.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSalesforce Aura data theft attacks:\u003c/strong\u003e Ongoing campaigns targeting Salesforce environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOther organizations recently claimed as victims by ShinyHunters include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEuropean Commission\u003c/li\u003e\n\u003cli\u003eVimeo\u003c/li\u003e\n\u003cli\u003eMcGraw-Hill\u003c/li\u003e\n\u003cli\u003eMedtronic\u003c/li\u003e\n\u003cli\u003eZara\u003c/li\u003e\n\u003cli\u003ePornHub\u003c/li\u003e\n\u003cli\u003eRockstar Games\u003c/li\u003e\n\u003cli\u003eMatch Group\u003c/li\u003e\n\u003cli\u003eADT\u003c/li\u003e\n\u003cli\u003eGoogle\u003c/li\u003e\n\u003cli\u003eCisco\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn contrast, Instructure, an edtech giant, reached an “agreement” with the group to stop data from being leaked after a recent breach.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-impact\"\u003eResponse and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e7-Eleven did not pay the ransom, leading to the public leak of documents.\u003c/li\u003e\n\u003cli\u003eThe company did not provide additional details beyond the confirmation of the breach and the notification process.\u003c/li\u003e\n\u003cli\u003eNo statement was available from a 7-Eleven spokesperson at the time of reporting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"fbi-advisory\"\u003eFBI Advisory\u003c/h2\u003e\n\n\u003cp\u003eThe Federal Bureau of Investigation (FBI) advised ShinyHunters’ victims on May 15, 2026 not to give in to ransom demands. The FBI previously warned that paying a ransom does not guarantee that threat actors will not attempt to extort victims again or sell the stolen data to other cybercriminals.\u003c/p\u003e\n\n\u003ch2 id=\"related-historical-incident\"\u003eRelated Historical Incident\u003c/h2\u003e\n\n\u003cp\u003eIn August 2022, 7-Eleven Denmark confirmed a ransomware attack that encrypted systems and forced the company to shut down 175 stores.\u003c/p\u003e\n","keyPoints":["7-Eleven confirmed that on April 8, 2026, an unauthorized third party gained access to certain systems used to store franchisee documents.","The ShinyHunters extortion group claimed responsibility for the attack on April 17, alleging they stole over 600,000 records containing corporate data and personally identifiable information from the company's Salesforce environment.","After 7-Eleven refused to pay a ransom, ShinyHunters leaked a 9.4GB archive of documents on their dark web leak site.","The FBI advised ShinyHunters' victims not to pay ransom demands, warning that paying does not guarantee data won't be sold or used for further extortion.","ShinyHunters has been targeting Salesforce customers for the past year, conducting campaigns like Salesloft Drift and Salesforce Aura data theft attacks."],"insights":["ShinyHunters' repeated success targeting Salesforce customers (hundreds of companies, billions of records claimed) suggests a systemic vulnerability or misconfiguration in Salesforce implementations, not just isolated incidents.","Despite the FBI's explicit advice against paying ransoms, Instructure's decision to reach an agreement with ShinyHunters to stop data leaks shows that some organizations still view negotiation as a pragmatic option for limiting exposure.","7-Eleven discovered the breach in early April but waited until May 1 to send notifications and did not disclose the number of affected individuals, indicating a possible focus on legal compliance and damage control over full transparency."],"referencedReports":[{"title":"FBI Public Service Announcement on ShinyHunters","url":"https://www.ic3.gov/PSA/2026/PSA260515","publisher":"Federal Bureau of Investigation (FBI)","context":"The article reports that the FBI advised ShinyHunters' victims not to pay ransom demands and links to this PSA as the source of that advice.","category":"","primary":false}],"body":"\u003cp\u003e7-Eleven confirmed that on April 8, 2026, an unauthorized third party gained access to systems used to store franchisee documents. The ShinyHunters extortion group claimed responsibility on April 17, stating they stole over 600,000 records containing corporate data and personally identifiable information after breaching the company’s Salesforce environment.\u003c/p\u003e\n\n\u003cp\u003e7-Eleven refused to pay a ransom, and ShinyHunters subsequently leaked a 9.4GB archive of documents on their dark web leak site. The company notified affected individuals beginning May 1 and filed notifications in multiple U.S. states, but did not disclose the total number of people impacted.\u003c/p\u003e\n\n\u003cp\u003eThis incident is part of a broader ShinyHunters campaign targeting Salesforce customers over the past year, including breaches of hundreds of companies and claims of billions of records stolen. The FBI advised victims not to pay ransoms, warning that payment does not guarantee data will not be sold or used for further extortion.\u003c/p\u003e\n"},{"n":12,"title":"New Shai-Hulud malware wave compromises 600 npm packages","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-shai-hulud-malware-wave-compromises-600-npm-packages/","time":"14:30","priority":"MUST READ","score":95,"tldr":"A new Shai-Hulud supply-chain attack compromised over 600 npm packages, primarily in the @antv ecosystem, stealing credentials and secrets from developer and CI/CD environments using the Session P2P network and GitHub as exfiltration channels.","briefOverview":"\u003cp\u003eOn May 19, threat actors published over 600 malicious packages to the npm registry in about one hour, primarily compromising the @antv ecosystem and several other popular libraries. The attack started by compromising the npm account \u0026lsquo;atool\u0026rsquo; and affected packages such as echarts-for-react, @antv/g2, timeago.js, and canvas-nest.js.\u003c/p\u003e\n\n\u003cp\u003eThe malware payload steals secrets from developer and CI/CD environments, encrypts them, and exfiltrates data over the Session P2P network, making network detection difficult. It also uses GitHub as a fallback by creating repositories under victims\u0026rsquo; accounts when tokens are available.\u003c/p\u003e\n\n\u003cp\u003eMore than 2,900 rogue GitHub repositories were generated by this campaign, and the malware can produce valid Sigstore provenance attestations to appear legitimate. Developers who downloaded infected packages are advised to remove or downgrade them and rotate all exposed credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new wave of the Shai-Hulud supply-chain attack compromised over 600 npm packages on May 19, with 639 malicious versions across 323 unique packages published within one hour. The attack began by compromising the npm account \u0026lsquo;atool\u0026rsquo;, which publishes the @antv namespace packages, including popular libraries like echarts-for-react, @antv/g2, timeago.js, and canvas-nest.js.\u003c/p\u003e\n\n\u003cp\u003eThe malware injects a heavily obfuscated index.js payload that targets credentials from developer workstations and CI/CD environments, including GitHub, npm, cloud services, Kubernetes, Vault, Docker, databases, and SSH. Stolen data is compressed, encrypted with AES-256-GCM, and wrapped with RSA-OAEP before exfiltration.\u003c/p\u003e\n\n\u003cp\u003eExfiltration primarily uses the Session P2P network via filev2.getsession[.]org/file, which makes the traffic indistinguishable from legitimate Session app traffic. Microsoft also identified an additional endpoint, t.m-kosche.com. When GitHub credentials are available, the malware creates repositories under the victim\u0026rsquo;s account containing stolen data with a Readme file bearing the reversed string \u0026lsquo;Shai-Hulud: Here We Go Again\u0026rsquo;.\u003c/p\u003e\n\n\u003cp\u003eA notable capability is the abuse of OIDC tokens from compromised CI environments to generate valid Sigstore provenance attestations, causing malicious packages to pass standard provenance checks. The malware also self-propagates by validating stolen npm tokens, downloading owned packages, injecting the payload, and republishing with bumped version numbers.\u003c/p\u003e\n\n\u003cp\u003eThe Shai-Hulud code was recently leaked on GitHub by the TeamPCP threat group, making attribution of this campaign more difficult. Reports from Socket, Endor Labs, Aikido Security, and Step Security provide indicators of compromise and mitigation advice, including removing infected packages and rotating all exposed credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eOn May 19, between 01:56 UTC and 02:56 UTC, threat actors published 639 malicious versions across 323 unique npm packages as part of a new Shai-Hulud supply-chain attack. The attack primarily targeted the @antv ecosystem after compromising the npm account \u0026lsquo;atool\u0026rsquo;, which publishes packages in that namespace. Affected libraries include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eecharts-for-react\u003c/li\u003e\n\u003cli\u003e@antv/g2\u003c/li\u003e\n\u003cli\u003e@antv/g6\u003c/li\u003e\n\u003cli\u003e@antv/x6\u003c/li\u003e\n\u003cli\u003e@antv/l7\u003c/li\u003e\n\u003cli\u003e@antv/g2plot\u003c/li\u003e\n\u003cli\u003e@antv/graphin\u003c/li\u003e\n\u003cli\u003etimeago.js\u003c/li\u003e\n\u003cli\u003esize-sensor\u003c/li\u003e\n\u003cli\u003ecanvas-nest.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003ch3 id=\"payload-and-exfiltration\"\u003ePayload and Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eThe malware injects a heavily obfuscated \u0026lsquo;index.js\u0026rsquo; payload that attempts to steal credentials for GitHub, npm, cloud services, Kubernetes, Vault, Docker, databases, and SSH. It primarily targets developer workstations and CI/CD environments including GitHub Actions, GitLab CI, Jenkins, Azure DevOps, CircleCI, Vercel, Netlify, and other build platforms.\u003c/p\u003e\n\n\u003cp\u003eStolen data is serialized, Gzip-compressed, AES-256-GCM-encrypted, and RSA-OAEP-wrapped to hamper network inspection. The primary exfiltration channel is filev2.getsession[.]org/file via the Session P2P network, which uses end-to-end encrypted traffic on TCP/443 indistinguishable from legitimate Session app traffic. Microsoft also identified the endpoint t.m-kosche.com for shipping stolen credentials.\u003c/p\u003e\n\n\u003ch3 id=\"github-exfiltration\"\u003eGitHub Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eWhen GitHub credentials are available, the malware uses the GitHub API to create new repositories under the victim\u0026rsquo;s account and upload stolen data. These repositories contain a Readme file with the string \u0026lsquo;niaga og ew ereh :duluh-iahs\u0026rsquo;, which is the reverse of \u0026lsquo;Shai-Hulud: Here We Go Again\u0026rsquo;. Aikido Security reported over 2,700 such rogue repositories, and BleepingComputer found at least 2,900 at the time of publication.\u003c/p\u003e\n\n\u003ch3 id=\"self-propagation-and-persistence\"\u003eSelf-Propagation and Persistence\u003c/h3\u003e\n\n\u003cp\u003eThe malware validates stolen npm tokens, enumerates packages owned by the victim, downloads tarballs, injects the malicious payload, and republishes infected packages with bumped version numbers. It also establishes persistence through backdoors planted in VS Code and Claude Code configurations. Aikido Security noted this indicates the attacker is thinking about recovery after initial compromise cleanup.\u003c/p\u003e\n\n\u003ch3 id=\"fake-provenance-attestations\"\u003eFake Provenance Attestations\u003c/h3\u003e\n\n\u003cp\u003eA key new addition is the ability to generate valid Sigstore provenance attestations by abusing OpenID Connect (OIDC) tokens from compromised CI environments and submitting them to Fulcio and Reko. This makes malicious npm packages appear legitimately signed and able to pass standard provenance verification checks.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected Parties and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevelopers who downloaded any of the infected packages from the @antv ecosystem or the other compromised libraries.\u003c/li\u003e\n\u003cli\u003eCI/CD environments where the malware may have stolen automated tokens or secrets.\u003c/li\u003e\n\u003cli\u003eOrganizations using affected packages in their software supply chain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOver 600 packages were compromised in a single hour, and the total Shai-Hulud artifact list maintained by Socket has grown to over 1,000 entries. The campaign continues to affect multiple ecosystems including npm, PyPI, and Composer.\u003c/p\u003e\n\n\u003ch2 id=\"attribution\"\u003eAttribution\u003c/h2\u003e\n\n\u003cp\u003eThe Shai-Hulud code was recently leaked on GitHub by the TeamPCP threat group and has already been used in other attacks. This leak makes attribution of the new campaign more difficult, as multiple actors could now be using the code.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommendations\"\u003eResponse and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eReports from Socket, Endor Labs, Aikido Security, and Step Security provide indicators of compromise along with detection, remediation, and mitigation advice. General recommendations for developers who downloaded any infected packages include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemove or downgrade to a known good version published before May 18.\u003c/li\u003e\n\u003cli\u003eRevoke and rotate all exposed credentials (GitHub tokens, cloud tokens, SSH keys, etc.).\u003c/li\u003e\n\u003cli\u003eReview CI/CD configurations and audit for unauthorized repository creation or package publication.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-campaign-history\"\u003eRelated Campaign History\u003c/h2\u003e\n\n\u003cp\u003eThe Shai-Hulud campaigns started in September of the previous year and have previously impacted TanStack and Mistral packages. This latest wave represents an escalation in scale and sophistication, particularly with the use of valid Sigstore attestations and persistence mechanisms.\u003c/p\u003e\n","keyPoints":["The attack published 639 malicious versions across 323 unique packages in about one hour on May 19, starting with the compromise of the npm account 'atool' that publishes packages in the @antv namespace.","The payload collects secrets from developer and CI/CD environments and exfiltrates them over the Session P2P network, with GitHub used as a fallback exfiltration mechanism by creating repositories under victims' accounts.","The malware injects a heavily obfuscated index.js payload that targets credentials for GitHub, npm, cloud, Kubernetes, Vault, Docker, databases, and SSH, and also includes persistence through backdoors planted in VS Code and Claude Code configurations.","The malware can generate valid Sigstore provenance attestations by abusing OpenID Connect tokens from compromised CI environments, making malicious npm packages appear legitimately signed."],"insights":["The use of the Session P2P network for exfiltration makes the malicious traffic indistinguishable from legitimate Session app traffic at the network layer, meaning traditional IP- or hostname-based blocking is ineffective.","The malware can generate valid Sigstore provenance attestations by abusing OIDC tokens from compromised CI environments, causing malicious packages to pass standard provenance verification checks despite containing credential-stealing code.","The attackers strategically targeted long-dormant packages like jest-canvas-mock, which had 10 million monthly downloads but had not been updated in about three years and likely lacked OIDC trusted publishing configuration.","Persistence through backdoors in VS Code and Claude Code configurations indicates the attacker is planning for scenarios where the initial compromise is cleaned up, as noted by Aikido Security."],"referencedReports":[{"title":"antv-packages-compromised","url":"https://socket.dev/blog/antv-packages-compromised","publisher":"Socket","context":"The article cites Socket's analysis that the hackers published 639 malicious versions across 323 unique packages in about one hour.","category":"","primary":false},{"title":"mini-shai-hulud-returns-42-malicious-npm-packages-fake-sigstore-badges-in-antv-ecosystem-attack","url":"https://www.endorlabs.com/learn/mini-shai-hulud-returns-42-malicious-npm-packages-fake-sigstore-badges-in-antv-ecosystem-attack","publisher":"Endor Labs","context":"The article references Endor Labs' research highlighting that some compromised packages had not received legitimate updates for a long time and likely lacked OIDC trusted publishing.","category":"","primary":false},{"title":"mini-shai-hulud-antv-npm-supply-chain-attack","url":"https://www.aikido.dev/blog/mini-shai-hulud-antv-npm-supply-chain-attack","publisher":"Aikido Security","context":"The article notes Aikido's report that there are more than 2,700 rogue repositories on GitHub matching the campaign's markers and that the payload includes persistence through VS Code and Claude Code configurations.","category":"","primary":false},{"title":"shai-hulud-here-we-go-again-mass-npm-supply-chain-attack-hits-the-antv-ecosystem","url":"https://www.stepsecurity.io/blog/shai-hulud-here-we-go-again-mass-npm-supply-chain-attack-hits-the-antv-ecosystem","publisher":"Step Security","context":"The article lists Step Security as one of the companies providing indicators of compromise and detection, remediation, and mitigation advice.","category":"","primary":false}],"body":"\u003cp\u003eOn May 19, threat actors published over 600 malicious packages to the npm registry in about one hour, primarily compromising the @antv ecosystem and several other popular libraries. The attack started by compromising the npm account \u0026lsquo;atool\u0026rsquo; and affected packages such as echarts-for-react, @antv/g2, timeago.js, and canvas-nest.js.\u003c/p\u003e\n\n\u003cp\u003eThe malware payload steals secrets from developer and CI/CD environments, encrypts them, and exfiltrates data over the Session P2P network, making network detection difficult. It also uses GitHub as a fallback by creating repositories under victims\u0026rsquo; accounts when tokens are available.\u003c/p\u003e\n\n\u003cp\u003eMore than 2,900 rogue GitHub repositories were generated by this campaign, and the malware can produce valid Sigstore provenance attestations to appear legitimate. Developers who downloaded infected packages are advised to remove or downgrade them and rotate all exposed credentials.\u003c/p\u003e\n"},{"n":16,"title":"Mini Shai-Hulud Pushes Malicious AntV npm Packages via Compromised Maintainer Account","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/mini-shai-hulud-pushes-malicious-antv.html","time":"04:54","priority":"MUST READ","score":95,"tldr":"A supply chain attack compromised dozens of popular npm packages under the @antv ecosystem, including echarts-for-react with 1.1 million weekly downloads, using a stolen maintainer account to automatically publish 639 malicious versions that steal credentials and propagate themselves, and the attack's source code has been released publicly, enabling widespread copycat campaigns.","briefOverview":"\u003cp\u003eCybersecurity researchers discovered a fresh software supply chain attack campaign that compromised numerous npm packages associated with the @antv ecosystem. The attack leveraged a compromised maintainer account named atool to push trojanized versions of popular packages, including echarts-for-react which has roughly 1.1 million weekly downloads. The campaign is part of the ongoing Mini Shai-Hulud attack wave, which uses compromised maintainer accounts to distribute credential-stealing malware.\u003c/p\u003e\n\n\u003cp\u003eThe attack published 639 malicious versions across 323 unique packages in a 22-minute automated burst. The malware harvests over 20 credential types from targets including cloud providers, source code repositories, SSH keys, and database connection strings. The collected data is encrypted and exfiltrated to a remote domain, with a fallback mechanism that creates public GitHub repositories under the victim\u0026rsquo;s account to store stolen information.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor behind the campaign, TeamPCP, has released the entire source code of the malware, enabling other actors to clone and deploy their own variants. An unknown threat actor has already uploaded four malicious npm packages containing a near-verbatim copy of the Shai-Hulud worm. This open-sourcing complicates attribution and increases the risk of widespread credential theft across the open-source ecosystem.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports on a supply chain attack targeting npm packages within the @antv ecosystem, discovered by cybersecurity researchers at Socket. The attack compromised the npm maintainer account atool, which was used to publish malicious versions of widely used data visualization and charting packages such as echarts-for-react, @antv/g2, @antv/g6, and several others. The affected packages span the @antv namespace as well as unrelated packages like timeago.js and canvas-nest.js. The campaign is part of the ongoing Mini Shai-Hulud attack wave, characterized by rapid publication of trojanized packages from compromised maintainer accounts.\u003c/p\u003e\n\n\u003cp\u003eThe attacker published 639 malicious versions across 323 unique packages, with 558 of those versions targeting 279 unique @antv packages. The malware payload is a credential stealer that harvests more than 20 types of credentials, including tokens and keys from Amazon Web Services, Google Cloud, Microsoft Azure, GitHub, npm, SSH, Kubernetes, Vault, Stripe, and database connection strings. It also attempts Docker container escape via the host socket. Stolen data is serialized, compressed, encrypted, and exfiltrated to the domain t.m-kosche[.]com:443, with a fallback that uses stolen GitHub tokens to create public repositories containing the stolen information in JSON files.\u003c/p\u003e\n\n\u003cp\u003eThe attack employed two execution paths: each malicious version added a preinstall hook (\u0026ldquo;bun run index.js\u0026rdquo;), and 630 of the 631 malicious versions also injected an optionalDependencies entry pointing to imposter commits on the legitimate antvis/G2 GitHub repository to deliver a second copy of the payload. The entire publication of 631 versions across 314 packages occurred in just 22 minutes, indicating an automated operation using a stolen token. The threat actor, identified as TeamPCP, is assessed to be financially motivated.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP released the entire source code of the Shai-Hulud malware in partnership with BreachForums as part of a supply chain attack contest. This open-sourcing lowered the barrier for other actors to adopt the malware. Subsequently, an unknown threat actor uploaded four malicious npm packages, one of which contained a near-verbatim copy of the Shai-Hulud worm with its own command-and-control infrastructure. This copycat wave complicates attribution efforts. The campaign demonstrates how compromising trusted development tools can lead to cascading supply chain compromises, with the potential for a large blast radius due to the popularity of the affected packages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-attack\"\u003eOverview of the Attack\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers discovered a fresh software supply chain attack campaign targeting npm packages within the @antv ecosystem. The attack, part of the ongoing Mini Shai-Hulud attack wave, compromised the npm maintainer account \u003cstrong\u003eatool\u003c/strong\u003e to push trojanized versions of popular packages. The affected packages include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eecharts-for-react\u003c/strong\u003e: A widely used React wrapper for Apache ECharts with roughly 1.1 million weekly downloads.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e@antv packages\u003c/strong\u003e: @antv/g2, @antv/g6, @antv/x6, @antv/l7, @antv/s2, @antv/f2, @antv/g, @antv/g2plot, @antv/graphin, @antv/data-set.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOther packages\u003c/strong\u003e: timeago.js, size-sensor, canvas-nest.js, and others.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details-of-the-malware\"\u003eTechnical Details of the Malware\u003c/h2\u003e\n\n\u003cp\u003eThe attacker published \u003cstrong\u003e639 malicious versions across 323 unique packages\u003c/strong\u003e, including 558 versions across 279 unique @antv packages. The publication occurred in a \u003cstrong\u003e22-minute burst\u003c/strong\u003e, indicating an automated operation using a stolen token. Each compromised version added a preinstall hook (\u003ccode\u003ebun run index.js\u003c/code\u003e), and 630 of the 631 malicious versions also injected an \u003ccode\u003eoptionalDependencies\u003c/code\u003e entry pointing to imposter commits on the legitimate antvis/G2 GitHub repository to deliver a second copy of the payload.\u003c/p\u003e\n\n\u003cp\u003eThe stealer payload harvests \u003cstrong\u003emore than 20 credential types\u003c/strong\u003e, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAmazon Web Services\u003c/li\u003e\n\u003cli\u003eGoogle Cloud\u003c/li\u003e\n\u003cli\u003eMicrosoft Azure\u003c/li\u003e\n\u003cli\u003eGitHub\u003c/li\u003e\n\u003cli\u003enpm\u003c/li\u003e\n\u003cli\u003eSSH\u003c/li\u003e\n\u003cli\u003eKubernetes\u003c/li\u003e\n\u003cli\u003eVault\u003c/li\u003e\n\u003cli\u003eStripe\u003c/li\u003e\n\u003cli\u003eDatabase connection strings\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also attempts \u003cstrong\u003eDocker container escape via the host socket\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"data-exfiltration-methods\"\u003eData Exfiltration Methods\u003c/h2\u003e\n\n\u003cp\u003eCollected data is serialized, compressed, encrypted, and exfiltrated to the domain \u003cstrong\u003et.m-kosche[.]com:443\u003c/strong\u003e. As a fallback mechanism, the malware leverages stolen GitHub tokens to create a \u003cstrong\u003epublic repository under the victim\u0026rsquo;s account\u003c/strong\u003e and commit the data in a JSON file. These repositories feature the description \u0026ldquo;niagA oG eW ereH :duluH-iahS\u0026rdquo;, which reverses to \u0026ldquo;Shai-Hulud: Here We Go Again.\u0026rdquo; As of writing, there are more than \u003cstrong\u003e2,200 repositories\u003c/strong\u003e on GitHub containing this marker.\u003c/p\u003e\n\n\u003ch2 id=\"propagation-logic\"\u003ePropagation Logic\u003c/h2\u003e\n\n\u003cp\u003eThe malware incorporates an \u003cstrong\u003enpm propagation logic\u003c/strong\u003e that:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eAbuses stolen npm tokens to validate them through the npm registry API.\u003c/li\u003e\n\u003cli\u003eEnumerates packages maintained by the token owner.\u003c/li\u003e\n\u003cli\u003eDownloads package tarballs.\u003c/li\u003e\n\u003cli\u003eInjects the malicious payload.\u003c/li\u003e\n\u003cli\u003eAdds a preinstall hook.\u003c/li\u003e\n\u003cli\u003eIncreases the package versions.\u003c/li\u003e\n\u003cli\u003eRepublishes them using the compromised maintainer\u0026rsquo;s identity.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"threat-actor-attribution\"\u003eThreat Actor Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe self-replicating Mini Shai-Hulud campaign is assessed to be the work of a financially motivated threat actor named \u003cstrong\u003eTeamPCP\u003c/strong\u003e. As of last week, TeamPCP \u003cstrong\u003ereleased the entire source code\u003c/strong\u003e for other threat actors to use as part of a supply chain attack contest announced in partnership with BreachForums. This open-sourcing lowers the barrier for other actors to adopt TeamPCP\u0026rsquo;s techniques.\u003c/p\u003e\n\n\u003ch2 id=\"copycat-attacks\"\u003eCopycat Attacks\u003c/h2\u003e\n\n\u003cp\u003eSince the source code release, an unknown threat actor has uploaded \u003cstrong\u003efour malicious npm packages\u003c/strong\u003e, one of which contains a near-verbatim copy of the Shai-Hulud worm with its own command-and-control infrastructure. This copycat wave complicates attribution efforts and demonstrates how releasing active campaign source code enables immediate copycat attacks.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-exposure\"\u003eImpact and Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe potential blast radius is significant because the affected publishing account is connected to widely used packages across data visualization, graphing, mapping, charting, and React component ecosystems. Organizations that automatically pull new dependency versions face meaningful downstream exposure. The campaign is built for credential theft at scale, and organizations using \u003cstrong\u003eGitHub Actions, PyPI, Docker Hub, GHCR (GitHub Container Registry), VS Code extensions, and cloud-connected CI runners\u003c/strong\u003e are directly exposed to this risk.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers discovered a software supply chain attack campaign that compromised multiple npm packages associated with the @antv ecosystem, including echarts-for-react with roughly 1.1 million weekly downloads.","The attacker published 639 malicious versions across 323 unique packages, with 558 versions across 279 unique @antv packages.","The stealer payload harvests over 20 credential types including Amazon Web Services, Google Cloud, Microsoft Azure, GitHub, npm, SSH, Kubernetes, Vault, Stripe, and database connection strings.","Collected data is serialized, compressed, encrypted, and exfiltrated to the domain t.m-kosche[.]com:443, with a fallback mechanism that uses stolen GitHub tokens to create public repositories committing the data in a JSON file.","The Mini Shai-Hulud campaign's source code was released publicly by the threat actor TeamPCP, leading to copycat attacks with near-verbatim copies of the worm using their own command-and-control infrastructure."],"insights":["The malware uses a fallback exfiltration method that creates a public GitHub repository under the victim's account and commits stolen data as a JSON file, leveraging stolen GitHub tokens rather than relying solely on a hardcoded C2 domain.","The entire 22-minute publish burst across 314 packages and 631 versions with identical obfuscated payloads was fully automated, ruling out a gradual or targeted operation and indicating a stolen token was used for rapid large-scale propagation.","After the threat actor TeamPCP open-sourced the Shai-Hulud malware source code, an unknown actor uploaded four malicious npm packages containing a near-verbatim copy of the worm with its own command-and-control infrastructure, showing how releasing active campaign source code enables immediate copycat attacks.","The malicious packages inject an optionalDependencies entry pointing to imposter commits on the legitimate antvis/G2 GitHub repository to deliver a second copy of the payload, abusing a trusted popular repository as a distribution channel."],"referencedReports":[{"title":"AntV Packages Compromised","url":"https://socket.dev/blog/antv-packages-compromised","publisher":"Socket","context":"The article references Socket's blog post to report the discovery of the attack compromising @antv npm packages.","category":"","primary":false},{"title":"Mini Shai-Hulud Strikes Again: 314 npm Packages Compromised","url":"https://safedep.io/mini-shai-hulud-strikes-again-314-npm-packages-compromised/","publisher":"SafeDep","context":"The article references SafeDep's analysis describing the two execution paths and the 22-minute publish burst across 314 packages.","category":"","primary":false},{"title":"Shai-Hulud Malware In-Depth Analysis: Open Source Means Loss of Control","url":"https://slowmist.medium.com/shai-hulud-malware-in-depth-analysis-open-source-means-loss-of-control-ca49cdc06bf7","publisher":"SlowMist","context":"The article references SlowMist's in-depth analysis of the Shai-Hulud malware after TeamPCP released the entire source code.","category":"","primary":false},{"title":"Shai-Hulud Open Source Framework Static Analysis","url":"https://securitylabs.datadoghq.com/articles/shai-hulud-open-source-framework-static-analysis/","publisher":"Datadog Security Labs","context":"The article references Datadog's analysis on the open-sourcing of the Shai-Hulud framework and its implications.","category":"","primary":false},{"title":"Analyzing TeamPCP Supply Chain Attacks","url":"https://www.trendmicro.com/en_us/research/26/e/analyzing-teampcp-supply-chain-attacks.html","publisher":"Trend Micro","context":"The article references Trend Micro's report analyzing TeamPCP supply chain attacks and credential theft at scale.","category":"","primary":false},{"title":"Shai-Hulud Clones Arrive When Worm Source Code Goes Open Source","url":"https://mondoo.com/blog/shai-hulud-clones-arrive-when-worm-source-code-goes-open-source","publisher":"Mondoo","context":"The article references Mondoo's blog post regarding the copycat wave of Shai-Hulud clones after the source code was released.","category":"","primary":fal
