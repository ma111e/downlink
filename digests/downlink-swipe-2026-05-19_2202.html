se}],"body":"\u003cp\u003eCybersecurity researchers discovered a fresh software supply chain attack campaign that compromised numerous npm packages associated with the @antv ecosystem. The attack leveraged a compromised maintainer account named atool to push trojanized versions of popular packages, including echarts-for-react which has roughly 1.1 million weekly downloads. The campaign is part of the ongoing Mini Shai-Hulud attack wave, which uses compromised maintainer accounts to distribute credential-stealing malware.\u003c/p\u003e\n\n\u003cp\u003eThe attack published 639 malicious versions across 323 unique packages in a 22-minute automated burst. The malware harvests over 20 credential types from targets including cloud providers, source code repositories, SSH keys, and database connection strings. The collected data is encrypted and exfiltrated to a remote domain, with a fallback mechanism that creates public GitHub repositories under the victim\u0026rsquo;s account to store stolen information.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor behind the campaign, TeamPCP, has released the entire source code of the malware, enabling other actors to clone and deploy their own variants. An unknown threat actor has already uploaded four malicious npm packages containing a near-verbatim copy of the Shai-Hulud worm. This open-sourcing complicates attribution and increases the risk of widespread credential theft across the open-source ecosystem.\u003c/p\u003e\n"},{"n":17,"title":"Compromised Nx Console 18.95.0 Targeted VS Code Developers with Credential Stealer","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/compromised-nx-console-18950-targeted.html","time":"07:49","priority":"MUST READ","score":95,"tldr":"A compromised version of the Nx Console VS Code extension (18.95.0) was published on the marketplace, deploying a multi-stage credential stealer that harvests developer secrets and can be used for supply chain attacks; users should update to version 18.100.0 or later.","briefOverview":"\u003cp\u003eA compromised version of the Nx Console VS Code extension (rwl.angular-console, version 18.95.0) was published to the Microsoft Marketplace, affecting over 2.2 million installations. Within seconds of opening any workspace, the extension silently fetched a 498 KB obfuscated payload from an orphan commit hidden in the official nrwl/nx GitHub repository.\u003c/p\u003e\n\n\u003cp\u003eThe payload is a multi-stage credential stealer and supply chain poisoning tool that harvests developer secrets from 1Password, Claude Code, npm, GitHub, and AWS, exfiltrating them via HTTPS, GitHub API, and DNS tunneling. It also installs a Python backdoor on macOS that abuses GitHub Search API as a dead drop resolver.\u003c/p\u003e\n\n\u003cp\u003eThe root cause was traced to a single developer whose machine was compromised and GitHub credentials leaked. The Nx maintainers confirmed that a few users were compromised and urged all users to update to version 18.100.0 or later.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers at StepSecurity flagged a compromised version of the Nx Console VS Code extension (version 18.95.0) that was published to the Microsoft Visual Studio Code Marketplace. The extension, named rwl.angular-console, has over 2.2 million installations and is a popular UI plugin for editors like VS Code, Cursor, and JetBrains. The Open VSX version was not affected by the incident.\u003c/p\u003e\n\n\u003cp\u003eThe attack worked by having the compromised extension fetch a 498 KB obfuscated payload from a dangling orphan commit hidden inside the official nrwl/nx GitHub repository. This payload was a multi-stage credential stealer that harvested developer secrets and exfiltrated them via HTTPS, the GitHub API, and DNS tunneling. It also installed a Python backdoor on macOS systems that used the GitHub Search API as a dead drop resolver for receiving further commands.\u003c/p\u003e\n\n\u003cp\u003eThe malware included checks to avoid infecting machines located in Russian or CIS time zones. It harvested credentials from 1Password vaults, Anthropic Claude Code configurations, and secrets associated with npm, GitHub, and Amazon Web Services. Notably, the payload contained full Sigstore integration for Fulcio certificate issuance and SLSA provenance generation, which could enable an attacker to publish downstream npm packages with valid, cryptographically signed provenance attestations.\u003c/p\u003e\n\n\u003cp\u003eThe root cause was traced to one of the extension\u0026rsquo;s developers whose machine was compromised in a recent security incident, leaking their GitHub credentials. These credentials were abused to push the malicious orphaned commit. The Nx maintainers acknowledged that a few users were compromised and published indicators of compromise, including specific files and processes to check for.\u003c/p\u003e\n\n\u003cp\u003eThis is the second time the Nx ecosystem has been targeted within a year, following the s1ngularity campaign in August 2025 that infected npm packages with credential-stealing malware. The article also lists numerous other malicious npm packages discovered concurrently, targeting Claude Code sessions, cryptocurrency wallets, Kubernetes environments, and more.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003eOn May 18, 2026, a compromised version (18.95.0) of the Nx Console VS Code extension was published to the Microsoft Visual Studio Code Marketplace under the identifier \u003ccode\u003erwl.angular-console\u003c/code\u003e. The extension is a popular UI and plugin for code editors including VS Code, Cursor, and JetBrains, boasting over 2.2 million installations. The Open VSX version was not affected.\u003c/p\u003e\n\n\u003ch2 id=\"technical-analysis\"\u003eTechnical Analysis\u003c/h2\u003e\n\n\u003cp\u003eAccording to StepSecurity researcher Ashish Kurmi, within seconds of a developer opening any workspace, the compromised extension would silently fetch and execute a 498 KB obfuscated payload from a dangling orphan commit hidden inside the official \u003ccode\u003enrwl/nx\u003c/code\u003e GitHub repository. The payload was described as a multi-stage credential stealer and supply chain poisoning tool.\u003c/p\u003e\n\n\u003ch3 id=\"credential-harvesting-and-exfiltration\"\u003eCredential Harvesting and Exfiltration\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eExfiltration channels\u003c/strong\u003e: HTTPS, GitHub API, and DNS tunneling.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTargeted secrets\u003c/strong\u003e: 1Password vaults, Anthropic Claude Code configurations, npm tokens, GitHub tokens, and Amazon Web Services (AWS) secrets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdditional capability\u003c/strong\u003e: Installs a Python backdoor on macOS systems that abuses the GitHub Search API as a dead drop resolver for receiving further commands.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"evasion-and-signature-capabilities\"\u003eEvasion and Signature Capabilities\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe malware includes checks to avoid infecting machines likely located in Russian/CIS time zones.\u003c/li\u003e\n\u003cli\u003eNotably, the payload contains full Sigstore integration, including Fulcio certificate issuance and SLSA provenance generation. This means that with stolen npm OIDC tokens, an attacker could publish downstream npm packages with valid, cryptographically signed provenance attestations, making malicious packages appear as legitimate, verified builds.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"root-cause-and-response\"\u003eRoot Cause and Response\u003c/h2\u003e\n\n\u003cp\u003eThe Nx maintainers published a GitHub advisory (GHSA-c9j4-9m59-847w) tracing the root cause to one of their developers whose machine was compromised in a prior security incident, leaking their GitHub credentials. These credentials were used to push the unsigned, orphaned commit to the \u003ccode\u003enrwl/nx\u003c/code\u003e repository.\u003c/p\u003e\n\n\u003ch3 id=\"indicators-of-compromise-iocs\"\u003eIndicators of Compromise (IOCs)\u003c/h3\u003e\n\n\u003cp\u003eThe article lists the following IOCs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNx Console version 18.95.0 installed during the exposure window between May 18, 2026, at 2:36 p.m. CEST and 2:47 p.m. CEST.\u003c/li\u003e\n\u003cli\u003ePresence of files: \u003ccode\u003e~/.local/share/kitty/cat.py\u003c/code\u003e, \u003ccode\u003e~/Library/LaunchAgents/com.user.kitty-monitor.plist\u003c/code\u003e, \u003ccode\u003e/var/tmp/.gh_update_state\u003c/code\u003e, or \u003ccode\u003e/tmp/kitty-*\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRunning processes: a Python process running cat.py, or a process with \u003ccode\u003e__DAEMONIZED=1\u003c/code\u003e in its environment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe maintainers urged users to update to version 18.100.0 or later, terminate identified processes, delete artifacts on disk, and rotate all credentials reachable from the affected machine.\u003c/p\u003e\n\n\u003ch2 id=\"related-malicious-campaigns\"\u003eRelated Malicious Campaigns\u003c/h2\u003e\n\n\u003cp\u003eThe article situates this attack alongside several other concurrent malicious npm package discoveries, all of which target developer credentials or systems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eClaude Code backdoors\u003c/strong\u003e: Five npm packages (\u003ccode\u003eiceberg-javascript\u003c/code\u003e, \u003ccode\u003esupabase-javascript\u003c/code\u003e, \u003ccode\u003eauth-javascript\u003c/code\u003e, \u003ccode\u003emicrosoft-applicationinsights-common\u003c/code\u003e, \u003ccode\u003ems-graph-types\u003c/code\u003e) containing a hidden ELF binary that backdoors Claude Code sessions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeFi SDK impersonation\u003c/strong\u003e: \u003ccode\u003enoon-contracts\u003c/code\u003e exfiltrates SSH keys, crypto wallet private keys, AWS credentials, Kubernetes secrets, and more.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTelegram RAT\u003c/strong\u003e: \u003ccode\u003emartinez-polygon-clipping-tony\u003c/code\u003e downloads a 17MB PyInstaller-packed Windows RAT using Telegram for C2.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTelegram account hijacking\u003c/strong\u003e: \u003ccode\u003ecommon-tg-service\u003c/code\u003e masquerades as a NestJS service to take over victims\u0026rsquo; Telegram accounts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eChatGPT cookie stealer\u003c/strong\u003e: \u003ccode\u003eexiouss\u003c/code\u003e targets session cookies from Google Chrome, Microsoft Edge, and Brave.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLLM proxy malware\u003c/strong\u003e: Three npm packages (\u003ccode\u003ek8s-pod-checker\u003c/code\u003e, \u003ccode\u003edev-env-setup\u003c/code\u003e, \u003ccode\u003enode-perf-utils\u003c/code\u003e) part of the \u003ccode\u003ekube-health-tools\u003c/code\u003e cluster install an LLM proxy service on victims\u0026rsquo; machines.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDependency confusion campaign\u003c/strong\u003e: 38 npm packages orchestrated by an Indonesian-speaking threat actor to trick CI/CD pipelines into resolving malicious public packages ahead of private ones for Apple, Google, and Alibaba.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGambling platform stager\u003c/strong\u003e: Seven packages under \u003ccode\u003e@hd-team\u003c/code\u003e act as a stager for configurations used by the Douqiu sports gambling and pirated streaming platform.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"historical-context\"\u003eHistorical Context\u003c/h2\u003e\n\n\u003cp\u003eThis marks the second time the Nx ecosystem has been targeted within a year. In August 2025, several npm packages were infected by a credential stealer as part of the supply chain attack campaign named s1ngularity. Unlike that campaign, the latest attack targets the VS Code extension directly.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe compromised Nx Console extension represents a sophisticated supply chain attack that could have had far-reaching consequences due to the extension\u0026rsquo;s popularity and the advanced capabilities of its payload, including Sigstore integration. The attack was made possible by a compromised developer account, highlighting the importance of securing developer credentials and implementing multi-factor authentication and code signing. Users are advised to update immediately and rotate all potentially exposed credentials.\u003c/p\u003e\n","keyPoints":["A compromised version of the Nx Console extension (rwl.angular-console, version 18.95.0) was published to the Microsoft Visual Studio Code Marketplace, affecting over 2.2 million installations.","The extension silently fetched a 498 KB obfuscated payload from a dangling orphan commit inside the official nrwl/nx GitHub repository within seconds of a developer opening any workspace.","The malware is a multi-stage credential stealer and supply chain poisoning tool that harvests developer secrets and exfiltrates them via HTTPS, GitHub API, and DNS tunneling, and installs a Python backdoor on macOS systems.","The root cause was traced to a compromised developer machine that leaked GitHub credentials, which were then abused to push the malicious orphaned commit."],"insights":["The malware includes full Sigstore integration for Fulcio certificate issuance and SLSA provenance generation, meaning an attacker could use stolen npm OIDC tokens to publish downstream packages with cryptographically signed provenance attestations that appear legitimate.","The payload runs checks to avoid infecting machines located in Russian or CIS time zones, suggesting the attacker is deliberately evading detection or targeting specific regions.","The attacker hosted the malicious payload inside an orphaned commit in the official nrwl/nx GitHub repository, using the repository's own infrastructure as a distribution point for the malware."],"referencedReports":[{"title":"Nx Console VS Code Extension Compromised","url":"https://www.stepsecurity.io/blog/nx-console-vs-code-extension-compromised","publisher":"StepSecurity","context":"First disclosure and analysis of the compromised Nx Console extension, detailing the multi-stage payload and credential stealer.","category":"","primary":false},{"title":"Nx Console VS Code Extension Compromised (GitHub Advisory)","url":"https://github.com/nrwl/nx-console/security/advisories/GHSA-c9j4-9m59-847w","publisher":"Nrwl (Nx maintainers)","context":"Official advisory outlining the root cause (compromised developer credentials) and indicators of compromise.","category":"","primary":false},{"title":"Supply Chain Security Alert: Popular Nx Build System Package Compromised with Data-Stealing Malware","url":"https://www.stepsecurity.io/blog/supply-chain-security-alert-popular-nx-build-system-package-compromised-with-data-stealing-malware","publisher":"StepSecurity","context":"Report on the previous s1ngularity campaign that infected npm packages in the Nx ecosystem with credential-stealing malware.","category":"","primary":false},{"title":"Malicious npm packages hide in Claude Code hooks","url":"https://safedep.io/malicious-npm-packages-claude-code-hooks/","publisher":"SafeDep","context":"Discovery of five npm packages containing a hidden ELF binary that backdoors Claude Code sessions to steal developer credentials.","category":"","primary":false},{"title":"Malicious noon-contracts npm package impersonating DeFi SDK","url":"https://safedep.io/malicious-noon-contracts-npm-defi-rat/","publisher":"SafeDep","context":"Analysis of an npm package that exfiltrates SSH keys, crypto wallet keys, AWS credentials, and other secrets.","category":"","primary":false},{"title":"Malicious martinez-polygon-clipping-tony npm package with Telegram RAT","url":"https://safedep.io/malicious-martinez-polygon-clipping-tony-npm-telegram-rat/","publisher":"SafeDep","context":"Report on a trojanized fork of martinez-polygon-clipping that downloads a Windows remote access trojan using Telegram for C2.","category":"","primary":false},{"title":"Malicious common-tg-service npm package for Telegram hijacking","url":"https://safedep.io/malicious-common-tg-service-npm-telegram-hijacking-framework/","publisher":"SafeDep","context":"Discovery of an npm package that takes over victims' Telegram accounts while masquerading as a legitimate service.","category":"","primary":false},{"title":"Malicious exiouss npm package targeting ChatGPT and OpenAI session cookies","url":"https://safedep.io/malicious-exiouss-npm-exam-cheating-tool/","publisher":"SafeDep","context":"Analysis of an npm package that steals ChatGPT and OpenAI session cookies from web browsers.","category":"","primary":false},{"title":"Mapping the infrastructure behind the kube-health-tools supply chain malware","url":"https://panther.com/blog/mapping-the-infrastructure-behind-the-kube-health-tools-supply-chain-malware","publisher":"Panther","context":"Technical analysis of npm packages (k8s-pod-checker, dev-env-setup, node-perf-utils) that install an LLM proxy service on victims' machines.","category":"","primary":false},{"title":"Tunnel vision: supply chain attack targets Kubernetes via npm and PyPI","url":"https://panther.com/blog/tunnel-vision-supply-chain-attack-targets-kubernetes-via-npm-and-pypi","publisher":"Panther","context":"Report on the kube-health-tools cluster and its use of npm and PyPI packages for LLM traffic routing and proxy services.","category":"","primary":false},{"title":"Frankly malicious: inside a 38-package npm supply chain campaign targeting tech giants","url":"https://panther.com/blog/frankly-malicious-inside-a-38-package-npm-supply-chain-campaign-targeting-tech-giants","publisher":"Panther","context":"Analysis of a coordinated credential harvesting campaign using dependency confusion against Apple, Google, Alibaba, and others.","category":"","primary":false},{"title":"4 years, 51 packages, 3 organizations: how npm became a gambling ring's config server","url":"https://panther.com/blog/4-years-51-packages-3-organizations-how-npm-became-a-gambling-ring-s-config-server","publisher":"Panther","context":"Investigation into seven npm packages under @hd-team that act as stagers for a Chinese sports gambling and pirated streaming platform.","category":"","primary":false}],"body":"\u003cp\u003eA compromised version of the Nx Console VS Code extension (rwl.angular-console, version 18.95.0) was published to the Microsoft Marketplace, affecting over 2.2 million installations. Within seconds of opening any workspace, the extension silently fetched a 498 KB obfuscated payload from an orphan commit hidden in the official nrwl/nx GitHub repository.\u003c/p\u003e\n\n\u003cp\u003eThe payload is a multi-stage credential stealer and supply chain poisoning tool that harvests developer secrets from 1Password, Claude Code, npm, GitHub, and AWS, exfiltrating them via HTTPS, GitHub API, and DNS tunneling. It also installs a Python backdoor on macOS that abuses GitHub Search API as a dead drop resolver.\u003c/p\u003e\n\n\u003cp\u003eThe root cause was traced to a single developer whose machine was compromised and GitHub credentials leaked. The Nx maintainers confirmed that a few users were compromised and urged all users to update to version 18.100.0 or later.\u003c/p\u003e\n"},{"n":18,"title":"Drupal to Release Urgent Core Security Updates on May 20, Sites Told to Prepare","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/drupal-to-release-urgent-core-security.html","time":"10:44","priority":"MUST READ","score":95,"tldr":"Drupal will release critical core security updates on May 20, 2026, and site administrators should prepare by updating to the latest supported patches immediately, as exploits could emerge within hours or days.","briefOverview":"\u003cp\u003eDrupal has announced an urgent core security release scheduled for May 20, 2026, between 5-9 p.m. UTC. The Drupal Security Team warns that exploits may be developed within hours or days of the release, so administrators should reserve time to apply updates immediately.\u003c/p\u003e\n\n\u003cp\u003ePatches will be available for all supported branches (11.3.x, 11.2.x, 10.6.x, 10.5.x) and for end-of-life minor versions (11.1.x, 10.4.x) to allow sites extra time to upgrade. Drupal 7 is not affected, but sites running Drupal 8 or 9 will receive manual patch files with no guarantee of correctness.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn May 20, 2026, Drupal will release a core security update for all currently supported branches during a four-hour window from 5-9 p.m. UTC. The Drupal Security Team has urged site administrators to prepare for this release because exploits could be developed within hours or days after it becomes available. Not all configurations are affected, and mitigation information will be included in the advisory.\u003c/p\u003e\n\n\u003cp\u003ePatches are expected for Drupal core branches 11.3.x, 11.2.x, 10.6.x, and 10.5.x. In addition, the project is providing security updates for end-of-life minor versions (11.1.x and 10.4.x) – sites on Drupal 11.1 or 11.0 should update to at least 11.1.9, and sites on Drupal 10.4, 10.3, 10.2, 10.1, or 10.0 should update to at least 10.4.9 before the security window. The intention is for these sites to apply the security update on May 20 and then upgrade to a fully supported branch soon after.\u003c/p\u003e\n\n\u003cp\u003eFor sites still on end-of-life major versions such as Drupal 8 or 9, manual patch files will be made available for Drupal 8.9 and 9.5. However, Drupal has cautioned that there is no guarantee these patches will work correctly and that they may introduce other issues or regressions. The project strongly recommends upgrading these sites to at least Drupal 10.6 as soon as possible, noting that Drupal 8 and 9 contain numerous other previously disclosed security vulnerabilities that will not be addressed by the best-effort patches or Drupal Steward.\u003c/p\u003e\n\n\u003cp\u003eDrupal explicitly confirmed that Drupal 7 is not affected by this issue. All sites on any version of Drupal 9 are advised to update to 9.5.11, and those on Drupal 8 should update to 8.9.20 before the deadline.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDrupal has issued an alert announcing a core security release for all supported branches on May 20, 2026, from 5-9 p.m. UTC. The maintainers of the PHP-based CMS urge site administrators to reserve time for core updates during that window because exploits might be developed within hours or days. The exact nature of the vulnerability is not disclosed, but the severity is underscored by the provision of patches for end-of-life minor versions.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-patch-availability\"\u003eAffected Versions and Patch Availability\u003c/h2\u003e\n\n\u003cp\u003ePatches are expected for the following supported branches:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e11.3.x\u003c/li\u003e\n\u003cli\u003e11.2.x\u003c/li\u003e\n\u003cli\u003e10.6.x\u003c/li\u003e\n\u003cli\u003e10.5.x\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSites on these versions should update to the latest patch release for their branch in preparation for the security window.\u003c/p\u003e\n\n\u003ch3 id=\"end-of-life-minor-versions\"\u003eEnd-of-Life Minor Versions\u003c/h3\u003e\n\n\u003cp\u003eDrupal is also providing security updates for end-of-life minor core versions to help sites that have not yet migrated:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSites on Drupal 11.1 or 11.0 should update to at least Drupal 11.1.9.\u003c/li\u003e\n\u003cli\u003eSites on Drupal 10.4, 10.3, 10.2, 10.1, or 10.0 should update to at least Drupal 10.4.9.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe goal is for these sites to apply the security update on May 20 and then upgrade to Drupal 11.3 or 10.6 in the near future.\u003c/p\u003e\n\n\u003ch3 id=\"end-of-life-major-versions-drupal-8-and-9\"\u003eEnd-of-Life Major Versions (Drupal 8 and 9)\u003c/h3\u003e\n\n\u003cp\u003eFor sites still running end-of-life major versions (Drupal 8 and 9), manual patch files will be provided for Drupal 8.9 and Drupal 9.5. Drupal warns that there is no guarantee these patches will work correctly and that they may introduce other issues or regressions. The team strongly recommends upgrading to at least Drupal 10.6 soon, noting that Drupal 8 and 9 contain numerous other previously disclosed security vulnerabilities that will not be addressed by either Drupal Steward or the best-effort patch files.\u003c/p\u003e\n\n\u003ch3 id=\"drupal-7\"\u003eDrupal 7\u003c/h3\u003e\n\n\u003cp\u003eDrupal explicitly states that Drupal 7 is not affected by this issue.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eBefore the May 20 deadline:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpdate to the latest supported patch for the site\u0026rsquo;s version of Drupal so that any outstanding upgrade issues can be addressed.\u003c/li\u003e\n\u003cli\u003eSites on Drupal 9 should update to 9.5.11.\u003c/li\u003e\n\u003cli\u003eSites on Drupal 8 should update to Drupal 8.9.20.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDuring the release window on May 20, administrators should determine if their sites are affected and apply any necessary updates immediately.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe security release is urgent, with exploits expected to appear quickly.\u003c/li\u003e\n\u003cli\u003eNot all configurations are affected; mitigation details will be in the advisory.\u003c/li\u003e\n\u003cli\u003eThe provision of patches for end-of-life minor versions indicates a high-severity vulnerability.\u003c/li\u003e\n\u003cli\u003eManual patches for Drupal 8 and 9 are provided as a best-effort measure, but full upgrade to a supported branch is strongly recommended.\u003c/li\u003e\n\u003cli\u003eDrupal 7 is unaffected.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Drupal intends to release a core security release for all supported branches on May 20, 2026, from 5-9 p.m. UTC.","The Drupal Security Team urges sites to reserve time for core updates because exploits might be developed within hours or days.","Patches are expected to be available for Drupal core branches 11.3.x, 11.2.x, 10.6.x, and 10.5.x.","Sites on end-of-life major core versions such as Drupal 8 and 9 can apply manual patch files, but Drupal warns there is no guarantee the fixes will work correctly.","Drupal noted that Drupal 7 is not affected by the issue."],"insights":["The Drupal Security Team is providing security updates for end-of-life minor versions (11.1.x and 10.4.x), which is an unusual step that underscores the severity of the vulnerability.","Drupal warns that manually applied patch files for end-of-life major versions (Drupal 8 and 9) may not work correctly and could introduce regressions, meaning organizations still on those versions face significant risk even after patching.","The explicit statement that Drupal 7 is not affected is notable because it is a much older, unsupported version that is typically more vulnerable, suggesting the vulnerability may be specific to newer code paths."],"referencedReports":[],"body":"\u003cp\u003eDrupal has announced an urgent core security release scheduled for May 20, 2026, between 5-9 p.m. UTC. The Drupal Security Team warns that exploits may be developed within hours or days of the release, so administrators should reserve time to apply updates immediately.\u003c/p\u003e\n\n\u003cp\u003ePatches will be available for all supported branches (11.3.x, 11.2.x, 10.6.x, 10.5.x) and for end-of-life minor versions (11.1.x, 10.4.x) to allow sites extra time to upgrade. Drupal 7 is not affected, but sites running Drupal 8 or 9 will receive manual patch files with no guarantee of correctness.\u003c/p\u003e\n"},{"n":20,"title":"Compromised atool npm Account Delivers CI/CD Credential Stealer Across 24 Packages (echarts-for-react package, timeago.js)","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/compromised-atool-npm-account-delivers-ci-cd-credential-stealer-across-24-packages-echarts-for-react-package-timeago-js","time":"04:33","priority":"MUST READ","score":95,"tldr":"The npm account atool was compromised, leading to malicious versions of 143 packages—including high-download libraries like timeago.js and echarts-for-react—that steal CI/CD credentials, posing a severe supply chain risk to enterprise and cloud environments.","briefOverview":"\u003cp\u003eThe npm account \u003ccode\u003eatool\u003c/code\u003e (email \u003ccode\u003ei@hust.cc\u003c/code\u003e) was compromised, allowing an attacker to publish malicious versions of 143 packages across the libraries maintained by that account and the broader AntV ecosystem. The affected packages include widely-used libraries such as \u003ccode\u003etimeago.js\u003c/code\u003e (over 1.5 million weekly downloads), \u003ccode\u003eecharts-for-react\u003c/code\u003e, and numerous \u003ccode\u003e@antv/*\u003c/code\u003e packages that power data visualization in enterprise and CI/CD environments.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code is designed to steal credentials from CI/CD pipelines, specifically targeting environments like GitHub Actions, GitLab CI, and Kubernetes-hosted pipelines that hold elevated cloud credentials. For each compromised package, the attacker typically published two sequential minor version bumps (e.g., 2.5.3 and 2.6.3), increasing the chance of being pulled into installations through version ranges or automatic updates.\u003c/p\u003e\n\n\u003cp\u003eThe scale of this supply chain attack is significant due to the high download counts of the affected packages and their deep integration into data engineering, financial dashboards, and front-end build pipelines. While the article does not disclose any specific response or remediation steps, it provides a comprehensive list of affected package names and versions for identification.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports a supply chain attack originating from the compromise of the npm account \u003ccode\u003eatool\u003c/code\u003e (associated with the email \u003ccode\u003ei@hust.cc\u003c/code\u003e). This account is the primary publisher of the \u003ccode\u003etimeago.js\u003c/code\u003e library, which receives over 1.5 million weekly downloads, and also holds maintainer-level access to the AntV ecosystem — Alibaba\u0026rsquo;s open-source data visualization suite. The attacker leveraged this access to publish malicious versions of 143 packages, spanning both \u003ccode\u003eatool\u003c/code\u003e-owned projects and numerous \u003ccode\u003e@antv/*\u003c/code\u003e packages.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the malicious code functions as a credential stealer aimed at CI/CD environments. The article explicitly states that the attack targets \u0026lsquo;environments that install these packages include data engineering pipelines, financial dashboards, React/Vue/Angular front-end builds, and enterprise data platforms. Many of these run inside GitHub Actions, GitLab CI, or Kubernetes-hosted CI/CD pipelines that hold elevated cloud credentials.\u0026rsquo; The attacker published two compromised versions for most packages (e.g., version 1.2.3 and 1.3.3), likely to catch users on different version ranges.\u003c/p\u003e\n\n\u003cp\u003eThe full list of compromised packages includes well-known libraries such as \u003ccode\u003etimeago.js\u003c/code\u003e, \u003ccode\u003etimeago-react\u003c/code\u003e, \u003ccode\u003eecharts-for-react\u003c/code\u003e, \u003ccode\u003ejest-canvas-mock\u003c/code\u003e, \u003ccode\u003esize-sensor\u003c/code\u003e, and over 100 \u003ccode\u003e@antv\u003c/code\u003e packages covering graph visualization (\u003ccode\u003e@antv/g6\u003c/code\u003e), 2D rendering (\u003ccode\u003e@antv/g\u003c/code\u003e), charting (\u003ccode\u003e@antv/g2\u003c/code\u003e, \u003ccode\u003e@antv/g2plot\u003c/code\u003e), map visualization (\u003ccode\u003e@antv/l7\u003c/code\u003e), spreadsheet rendering (\u003ccode\u003e@antv/s2\u003c/code\u003e), and related utilities. Individual AntV packages receive between 50,000 and 2,000,000 weekly downloads, indicating a very broad potential impact.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor or group behind the compromise, nor does it describe how the \u003ccode\u003eatool\u003c/code\u003e account was initially breached. It also does not mention any official response from npm, Alibaba (AntV), or the affected package maintainers beyond the publication of the incident itself. The provided data is strictly a technical disclosure of the compromised packages and the nature of the malicious payload.\u003c/p\u003e\n\n\u003cp\u003eFor organizations using these packages, the article serves as an urgent alert to check for the listed malicious versions (detailed in the full table) and to investigate potential credential exposure in their CI/CD systems. The absence of remediation guidance suggests that immediate action should involve rotating credentials, auditing pipeline logs, and pinning to known-safe versions of the affected packages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"background-the-atool-npm-account-and-affected-ecosystems\"\u003eBackground: The atool npm Account and Affected Ecosystems\u003c/h2\u003e\n\n\u003cp\u003eThe article details a supply chain attack stemming from the compromise of the npm account \u003ccode\u003eatool\u003c/code\u003e (email \u003ccode\u003ei@hust.cc\u003c/code\u003e). This account is the primary publisher of \u003ccode\u003etimeago.js\u003c/code\u003e, a JavaScript library for relative time formatting such as \u0026lsquo;3 hours ago\u0026rsquo;, which has over \u003cstrong\u003e1.5 million weekly downloads\u003c/strong\u003e. Additionally, the same account is a member of the \u003cstrong\u003eAntV\u003c/strong\u003e maintainer team — Alibaba\u0026rsquo;s open-source data visualization ecosystem. AntV powers a wide range of visualization libraries including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e@antv/g6\u003c/code\u003e (graph visualization)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/g\u003c/code\u003e (2D rendering)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/g2\u003c/code\u003e and \u003ccode\u003e@antv/g2plot\u003c/code\u003e (charting)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/l7\u003c/code\u003e (map visualization)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/s2\u003c/code\u003e (spreadsheet rendering)\u003c/li\u003e\n\u003cli\u003eAnd numerous supporting packages\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIndividual AntV packages receive between \u003cstrong\u003e50,000 and 2,000,000 weekly downloads\u003c/strong\u003e, making this a high-value target for a supply chain attacker.\u003c/p\u003e\n\n\u003ch2 id=\"compromised-packages-and-versions\"\u003eCompromised Packages and Versions\u003c/h2\u003e\n\n\u003cp\u003eThe attacker published \u003cstrong\u003e143 packages\u003c/strong\u003e with malicious versions. For most packages, two consecutive minor versions were compromised (e.g., version 1.2.3 and 1.3.3). The full list provided in the article includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003etimeago.js\u003c/code\u003e (4.1.2, 4.2.2)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etimeago-react\u003c/code\u003e (3.1.7, 3.2.7)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eecharts-for-react\u003c/code\u003e (3.0.7, 3.1.7, 3.2.7) — note three versions for this package\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ejest-canvas-mock\u003c/code\u003e (2.5.3, 2.6.3, 2.7.3)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ejest-date-mock\u003c/code\u003e (1.0.11, 1.1.11, 1.2.11)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esize-sensor\u003c/code\u003e (1.0.4, 1.1.4, 1.2.4)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecanvas-nest.js\u003c/code\u003e (2.1.4, 2.2.4)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003efilesize.js\u003c/code\u003e (2.1.0, 2.2.0)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eonfire.js\u003c/code\u003e (2.1.1, 2.2.1)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003erelationship.js\u003c/code\u003e (1.3.9, 1.4.9)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eribbon.js\u003c/code\u003e (1.1.2)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eslice.js\u003c/code\u003e (1.2.1, 1.3.1)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eword-width\u003c/code\u003e (1.1.1, 1.2.1)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elint-md\u003c/code\u003e (0.3.0, 0.4.0)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elint-md-cli\u003c/code\u003e (0.2.2, 0.3.2)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emcp-echarts\u003c/code\u003e (0.8.1, 0.9.1)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emcp-mermaid\u003c/code\u003e (0.5.1, 0.6.1)\u003c/li\u003e\n\u003cli\u003eOver 100 \u003ccode\u003e@antv/*\u003c/code\u003e packages including \u003ccode\u003e@antv/adjust\u003c/code\u003e, \u003ccode\u003e@antv/algorithm\u003c/code\u003e, \u003ccode\u003e@antv/async-hook\u003c/code\u003e, \u003ccode\u003e@antv/attr\u003c/code\u003e, \u003ccode\u003e@antv/ava\u003c/code\u003e, \u003ccode\u003e@antv/ava-react\u003c/code\u003e, \u003ccode\u @antv/infographic\u003c/code\u003e, \u003ccode\u003e@antv/l7\u003c/code\u003e, \u003ccode\u003e@antv/l7-component\u003c/code\u003e, \u003ccode\u003e@antv/l7-core\u003c/code\u003e, \u003ccode\u003e@antv/l7-draw\u003c/code\u003e, \u003ccode\u003e@antv/l7-layers\u003c/code\u003e, \u003ccode\u003e@antv/l7-map\u003c/code\u003e, \u003ccode\u003e@antv/l7-maps\u003c/code\u003e, \u003ccode\u003e@antv/l7-react\u003c/code\u003e, \u003ccode\u003e@antv/l7-renderer\u003c/code\u003e, \u003ccode\u003e@antv/l7-scene\u003c/code\u003e, \u003ccode\u003e@antv/l7-source\u003c/code\u003e, \u003ccode\u003e@antv/l7-three\u003c/code\u003e, \u003ccode\u003e@antv/l7-utils\u003c/code\u003e, \u003ccode\u003e@antv/l7plot\u003c/code\u003e, \u003ccode\u003e@antv/l7plot-component\u003c/code\u003e, \u003ccode\u003e@antv/larkmap\u003c/code\u003e, \u003ccode\u003e@antv/layout-gpu\u003c/code\u003e, \u003ccode\u003e@antv/layout-wasm\u003c/code\u003e, \u003ccode\u003e@antv/li-core-assets\u003c/code\u003e, \u003ccode\u003e@antv/li-editor\u003c/code\u003e, \u003ccode\u003e@antv/li-sdk\u003c/code\u003e, \u003ccode\u003e@antv/matrix-util\u003c/code\u003e, \u003ccode\u003e@antv/mcp-server-antv\u003c/code\u003e, \u003ccode\u003e@antv/mcp-server-chart\u003c/code\u003e, \u003ccode\u003e@antv/path-util\u003c/code\u003e, \u003ccode\u003e@antv/react-g\u003c/code\u003e, \u003ccode\u003e@antv/s2\u003c/code\u003e, \u003ccode\u003e@antv/s2-react\u003c/code\u003e, \u003ccode\u003e@antv/s2-ssr\u003c/code\u003e, \u003ccode\u003e@antv/s2-vue\u003c/code\u003e, \u003ccode\u003e@antv/scale\u003c/code\u003e, \u003ccode\u003e@antv/smart-color\u003c/code\u003e, \u003ccode\u003e@antv/thumbnails\u003c/code\u003e, \u003ccode\u003e@antv/util\u003c/code\u003e, \u003ccode\u003e@antv/vendor\u003c/code\u003e, \u003ccode\u003e@antv/x6\u003c/code\u003e, \u003ccode\u003e@antv/x6-angular-shape\u003c/code\u003e, \u003ccode\u003e@antv/x6-react-shape\u003c/code\u003e, \u003ccode\u003e@antv/x6-vue-shape\u003c/code\u003e, \u003ccode\u003e@antv/x6-vue3-shape\u003c/code\u003e, \u003ccode\u003e@antv/xflow\u003c/code\u003e, \u003ccode\u003e@lint-md/cli\u003c/code\u003e, \u003ccode\u003e@lint-md/core\u003c/code\u003e, \u003ccode\u003e@lint-md/parser\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details-the-malicious-payload-and-targeting\"\u003eTechnical Details: The Malicious Payload and Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the malicious code as a \u003cstrong\u003eCI/CD credential stealer\u003c/strong\u003e. It specifically targets environments where the packages are installed, particularly:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eData engineering pipelines\u003c/li\u003e\n\u003cli\u003eFinancial dashboards\u003c/li\u003e\n\u003cli\u003eReact/Vue/Angular front-end builds\u003c/li\u003e\n\u003cli\u003eEnterprise data platforms\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCritically, many of these environments run inside \u003cstrong\u003eGitHub Actions\u003c/strong\u003e, \u003cstrong\u003eGitLab CI\u003c/strong\u003e, or \u003cstrong\u003eKubernetes-hosted CI/CD pipelines\u003c/strong\u003e that hold elevated cloud credentials. This makes the attack extremely high-value, as successful credential theft could lead to broader cloud compromise.\u003c/p\u003e\n\n\u003cp\u003eThe attacker published two versions for most packages, likely to maximize the chance of being installed when users specify version ranges like \u003ccode\u003e^1.2.3\u003c/code\u003e or \u003ccode\u003e~1.2.3\u003c/code\u003e. The versions are typically a minor version increment (e.g., from 0.x.x to 0.y.y or 1.x.x to 1.y.y). Some packages had three compromised versions (e.g., \u003ccode\u003eecharts-for-react\u003c/code\u003e had 3.0.7, 3.1.7, and 3.2.7).\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article does not provide any information about:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow the \u003ccode\u003eatool\u003c/code\u003e account was compromised (e.g., credential theft, session hijacking, etc.)\u003c/li\u003e\n\u003cli\u003eThe identity or affiliation of the attacker\u003c/li\u003e\n\u003cli\u003eAny official response from npm, GitHub, or the AntV maintainers\u003c/li\u003e\n\u003cli\u003eWhether the malicious packages have been removed or deprecated from the npm registry\u003c/li\u003e\n\u003cli\u003eAny known examples of actual exploitation or credential theft\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHowever, the detailed listing of all 143 packages and their affected versions serves as a crucial indicator of compromise for security teams. Organizations using any of these packages should immediately:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eCheck their lockfiles and dependency trees for the listed malicious versions.\u003c/li\u003e\n\u003cli\u003eAssume potential credential exposure if the packages were installed in CI/CD environments.\u003c/li\u003e\n\u003cli\u003eRotate any credentials that may have been present in those environments.\u003c/li\u003e\n\u003cli\u003eAudit pipeline logs for suspicious outbound connections or data exfiltration.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article frames this as a supply chain attack on a \u0026lsquo;extremely high-value target\u0026rsquo; due to the combination of large download counts, access to CI/CD credentials, and the breadth of the AntV ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThis is a significant npm supply chain attack that leverages a single compromised maintainer account to poison 143 packages with a CI/CD credential stealer. The broad usage of these packages in enterprise data visualization and front-end development means many organizations could be affected. Without further disclosure from the article, the immediate actionable step is detection and remediation using the provided version list.\u003c/p\u003e\n","keyPoints":["The npm account atool (email i@hust.cc) was compromised, leading to the publication of malicious package versions across its maintained projects.","A total of 143 packages were affected, including popular libraries such as timeago.js, echarts-for-react, and numerous @antv packages.","The malicious versions of these packages contain code designed to steal credentials from CI/CD pipelines.","Targeted environments include GitHub Actions, GitLab CI, and Kubernetes-hosted CI/CD pipelines that hold elevated cloud credentials.","The affected packages have high weekly download counts, with timeago.js exceeding 1.5 million and individual AntV packages ranging from 50,000 to 2,000,000."],"insights":["The attacker published multiple malicious versions for each package (typically two consecutive minor versions, e.g., 2.5.3 and 2.6.3), which increases the likelihood of being pulled into installations via version ranges or automatic updates.","The compromised account had maintainer-level access to the entire AntV ecosystem, a large Alibaba open-source data visualization suite, enabling the attacker to publish tainted versions across over 100 @antv packages beyond the initial account's own libraries."],"referencedReports":[],"body":"\u003cp\u003eThe npm account \u003ccode\u003eatool\u003c/code\u003e (email \u003ccode\u003ei@hust.cc\u003c/code\u003e) was compromised, allowing an attacker to publish malicious versions of 143 packages across the libraries maintained by that account and the broader AntV ecosystem. The affected packages include widely-used libraries such as \u003ccode\u003etimeago.js\u003c/code\u003e (over 1.5 million weekly downloads), \u003ccode\u003eecharts-for-react\u003c/code\u003e, and numerous \u003ccode\u003e@antv/*\u003c/code\u003e packages that power data visualization in enterprise and CI/CD environments.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code is designed to steal credentials from CI/CD pipelines, specifically targeting environments like GitHub Actions, GitLab CI, and Kubernetes-hosted pipelines that hold elevated cloud credentials. For each compromised package, the attacker typically published two sequential minor version bumps (e.g., 2.5.3 and 2.6.3), increasing the chance of being pulled into installations through version ranges or automatic updates.\u003c/p\u003e\n\n\u003cp\u003eThe scale of this supply chain attack is significant due to the high download counts of the affected packages and their deep integration into data engineering, financial dashboards, and front-end build pipelines. While the article does not disclose any specific response or remediation steps, it provides a comprehensive list of affected package names and versions for identification.\u003c/p\u003e\n"},{"n":19,"title":"The New Phishing Click: How OAuth Consent Bypasses MFA","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/the-new-phishing-click-how-oauth.html","time":"11:30","priority":"MUST READ","score":94,"tldr":"OAuth consent phishing bypasses MFA by tricking users into granting long-lived refresh tokens through legitimate-looking consent screens, meaning organizations must monitor OAuth grants and token-level access with the same rigor they apply to authentication.","briefOverview":"\u003cp\u003eIn February 2026, a phishing-as-a-service platform called EvilTokens compromised over 340 Microsoft 365 organizations across five countries by tricking users into entering a code at microsoft.com/devicelogin and completing their normal MFA challenge. Instead of a routine sign-in, the user unknowingly granted the attacker a valid refresh token scoped to their mailbox, drive, calendar, and contacts, with a lifespan tied to tenant policy rather than a session. The operator never needed a password, never triggered an MFA prompt, and produced no sign-in event that looked like an intrusion, because the attack exploited the OAuth consent screen rather than credential theft. This illustrates how the phishing click that now matters hands over a refresh token that sits structurally below the identity controls most organizations still treat as the perimeter.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a new wave of phishing attacks that exploit OAuth consent grants to bypass MFA entirely. The primary example is the EvilTokens phishing-as-a-service platform, which went live in February 2026 and within five weeks compromised over 340 Microsoft 365 organizations across five countries. Victims received a message asking them to enter a short code at microsoft.com/devicelogin and complete their normal MFA challenge. The user believed they were verifying a routine sign-in, but they actually granted the attacker a valid refresh token scoped to their mailbox, drive, calendar, and contacts.\u003c/p\u003e\n\n\u003cp\u003eThe attack succeeds because the OAuth consent screen has become an instinctive click, and the security controls built to stop credential phishing do not examine the consent layer. Unlike credential phishing, an OAuth grant produces no replayed credentials—the user authenticates on the legitimate identity provider, completes MFA on the legitimate domain, and clicks Accept. The token the attacker obtains is signed by the identity provider and refreshable, making it impossible for MFA to block it since MFA has already occurred. Additionally, these refresh tokens survive password resets and remain valid for weeks or months depending on tenant configuration; only explicit revocation or a conditional access policy demanding re-consent can close the window.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the broader risk of toxic combinations, where a single human identity grants OAuth consent to multiple applications (e.g., an AI meeting summarizer, a productivity assistant, and a CRM enrichment tool) such that the permission scopes intersect across applications. No single application owner authorized the combination, and no application\u0026rsquo;s audit log can see the bridge because it exists outside all of them. The 2025 Salesloft-Drift incident is cited as an example: a compromised downstream connector spread across more than 700 Salesforce tenants through OAuth tokens that customers had legitimately approved, but none authorized the cascade.\u003c/p\u003e\n\n\u003cp\u003eTo address these threats, the article recommends treating OAuth consent with the same rigor as authentication. Suggested actions include maintaining an inventory of third-party apps holding refresh tokens, flagging tokens older than 30 days for re-consent, identifying identities with grants across three or more SaaS applications, reviewing AI agents and integrations that bridge systems, applying conditional access policies on consent events, and implementing token-level revocation rather than user suspension. The article also presents Reco as a leading example of an AI security platform that maps every OAuth grant, AI agent, and third-party integration into an identity graph continuously, enabling detection of bridges, unused tokens, and policy deviations without waiting for the next audit.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-oauth-consent-phishing-threat\"\u003eOverview of the OAuth Consent Phishing Threat\u003c/h2\u003e\n\n\u003cp\u003eThe article centers on a new class of phishing attack that exploits OAuth consent grants to bypass multi-factor authentication (MFA). Unlike traditional credential phishing, which steals a password that must be replayed elsewhere, OAuth consent phishing tricks the user into granting a long-lived refresh token through the legitimate consent screen of the identity provider. The attack leaves no replay and no intrusion-like sign-in event, making it invisible to most security monitoring.\u003c/p\u003e\n\n\u003ch2 id=\"the-eviltokens-phaas-platform\"\u003eThe EvilTokens PhaaS Platform\u003c/h2\u003e\n\n\u003cp\u003eIn February 2026, a phishing-as-a-service platform called EvilTokens went live and within five weeks compromised more than 340 Microsoft 365 organizations across five countries. The attack flow: victims receive a message asking them to enter a short code at microsoft.com/devicelogin and complete their normal MFA challenge. After doing so, they believe they have verified a routine sign-in. In reality, they have handed the operator a valid refresh token scoped to their mailbox, drive, calendar, and contacts, with a lifespan tied to tenant policy rather than a session.\u003c/p\u003e\n\n\u003ch3 id=\"why-mfa-cannot-block-the-attack\"\u003eWhy MFA Cannot Block the Attack\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredential phishing leaves a sign-in trail that SIEM can correlate against geography, device, and travel patterns.\u003c/li\u003e\n\u003cli\u003eAn OAuth grant produces no replayed credentials. The user authenticates on the legitimate identity provider, finishes MFA on the legitimate domain, and clicks Accept. The token is signed by the identity provider and refreshable.\u003c/li\u003e\n\u003cli\u003eMFA cannot block it because MFA has already happened.\u003c/li\u003e\n\u003cli\u003eRefresh tokens survive password resets; rotating the password does not invalidate the grant. Only explicit revocation or a conditional access policy that demands re-consent closes it.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"how-consent-got-normalized\"\u003eHow Consent Got Normalized\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that users have been trained to click through consent screens at the rate they once clicked through cookie banners. Every AI agent install, productivity integration, and browser extension that touches a SaaS account surfaces a consent screen. The volume of legitimate consent a knowledge worker sees in a month exceeds anything that existed when the original OAuth threat models were written.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, the scope language used in consent screens understates actual risk. For example, the scope \u0026ldquo;Read your mail\u0026rdquo; covers every message, attachment, and shared thread the user can access. \u0026ldquo;Access files when you\u0026rsquo;re not present\u0026rdquo; means a long-lived token issued without the user being in front of a screen to revoke it.\u003c/p\u003e\n\n\u003ch2 id=\"toxic-combinations-cross-application-risk\"\u003eToxic Combinations: Cross-Application Risk\u003c/h2\u003e\n\n\u003cp\u003eA single OAuth consent gives an attacker a scoped foothold inside one application. The deeper risk forms when those footholds bridge across applications. The article describes a scenario where a finance user grants an AI meeting summarizer access to their calendar and mailbox, later grants a productivity assistant access to the company\u0026rsquo;s shared drive, and then connects a CRM enrichment tool to the customer database. Each was approved one at a time; no application owner sanctioned the combination. The risk surface is now three scopes intersecting through one human identity, where the meeting summarizer\u0026rsquo;s compromise can reach contract drafts and customer records.\u003c/p\u003e\n\n\u003cp\u003eThis is called a toxic combination—a permission breakdown across applications bridged by an OAuth grant, integration, or AI agent that no single application owner ever authorized as its own risk surface. It cannot be seen by any one application\u0026rsquo;s audit log because the bridge exists outside all of them.\u003c/p\u003e\n\n\u003ch2 id=\"real-world-example-the-salesloft-drift-incident\"\u003eReal-World Example: The Salesloft-Drift Incident\u003c/h2\u003e\n\n\u003cp\u003eThe article references the 2025 Salesloft-Drift incident to illustrate the scale of such risks. A compromised downstream connector spread across more than 700 Salesforce tenants through OAuth tokens that customers had legitimately approved. Each customer authorized the integration; none authorized the cascade.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-security-measures\"\u003eRecommended Security Measures\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that closing this gap requires treating OAuth consent with the same visibility, monitoring, and revocation discipline already applied to authentication. The following areas are recommended for review:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOAuth application inventory\u003c/strong\u003e: Every third-party app holding refresh tokens in the tenant, refreshed continuously rather than at audit time.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGrant age and re-consent\u003c/strong\u003e: Tokens issued more than 30 days ago without re-consent, surfaced as a queue.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-application identities\u003c/strong\u003e: Identities holding grants across three or more SaaS applications, flagged for review.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent and integration bridges\u003c/strong\u003e: AI agents and integrations bridging two systems no application owner sanctioned together.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConditional access on consent\u003c/strong\u003e: Policies that re-trigger on consent events, not only on sign-in events.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eToken-level revocation\u003c/strong\u003e: A playbook that revokes a single OAuth token rather than suspending the user.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that procedural discipline only scales so far. The bridges live in a graph no individual application owns, and they are created at the speed of an MCP install or an OAuth consent click. Seeing that graph continuously requires a platform built to watch the runtime layer where the bridges actually form.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-ai-security-platforms\"\u003eRole of AI Security Platforms\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Reco as a leading example of a new class of platform that handles this automatically. Reco brings AI agent security, identity governance, and threat detection into one control plane. Its Identity Knowledge Graph connects human and non-human identities to the applications, OAuth grants, and integrations they can access across the SaaS estate. The platform continuously discovers AI agents and OAuth grants as they appear, maps each scope back to the identity that approved it, monitors behavior for policy deviations, and revokes access at the token level rather than at the user account.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that consent phishing will likely not stay at the margins for much longer. Phishing-resistant authentication has received years of investment and scrutiny, while the consent layer still operates largely on trust. Closing that gap means treating OAuth grants and AI-agent connections with the same visibility, monitoring, and revocation discipline already applied to authentication itself.\u003c/p\u003e\n","keyPoints":["The EvilTokens phishing-as-a-service platform compromised over 340 Microsoft 365 organizations within five weeks by tricking users into entering a code at microsoft.com/devicelogin and completing their normal MFA challenge, which granted the attacker a valid refresh token scoped to mailbox, drive, calendar, and contacts.","OAuth consent phishing bypasses MFA because the user authenticates on the legitimate identity provider and completes the MFA challenge on the legitimate domain before clicking Accept, so the token the attacker receives is signed by the identity provider and MFA cannot block it.","The volume of legitimate consent screens that knowledge workers see daily from AI agents, productivity integrations, and browser extensions has normalized clicking through consent screens, making it easier for attackers to exploit OAuth grants.","Toxic combinations occur when a single human identity grants OAuth consent to multiple applications such that the permission scopes intersect across applications (e.g., a meeting summarizer, a productivity assistant, and a CRM enrichment tool), creating a risk surface no single application owner authorized and which cannot be seen in any one application's audit log.","Closing the OAuth consent gap requires treating grants with the same visibility, monitoring, and revocation discipline as authentication, including continuous OAuth application inventory, age-based re-consent, cross-application identity flagging, and token-level revocation rather than user suspension."],"insights":["Refresh tokens granted via OAuth consent survive password resets, meaning rotating a compromised user's password does not invalidate the token and closes the window of exposure only if explicit revocation or a conditional access policy demanding re-consent is enforced.","The scope language used in OAuth consent screens understates actual risk—for example, 'Read your mail' covers every message, attachment, and shared thread the user can access, which attackers exploit by relying on the gap between perceived and actual permission reach.","Toxic combinations form when a single human identity holds OAuth grants across multiple applications, creating a cross-application risk surface that no single application owner authorized and that no single application's audit log can detect because the bridge exists outside all of them.","The 2025 Salesloft-Drift breach demonstrated that a downstream connector compromised via OAuth tokens can cascade across hundreds of tenants—over 700 Salesforce tenants—because each customer had legitimately approved the integration yet none authorized the downstream compromise."],"referencedReports":[{"title":"CSA Research Note: OAuth Device Code Phishing M365","url":"https://labs.cloudsecurityalliance.org/research/csa-research-note-oauth-device-code-phishing-m365-20260325-c/","publisher":"Cloud Security Alliance","context":"The article references this research note as the source for details about the EvilTokens phishing-as-a-service platform that compromised over 340 Microsoft 365 organizations.","category":"","primary":false}],"body":"\u003cp\u003eIn February 2026, a phishing-as-a-service platform called EvilTokens compromised over 340 Microsoft 365 organizations across five countries by tricking users into entering a code at microsoft.com/devicelogin and completing their normal MFA challenge. Instead of a routine sign-in, the user unknowingly granted the attacker a valid refresh token scoped to their mailbox, drive, calendar, and contacts, with a lifespan tied to tenant policy rather than a session. The operator never needed a password, never triggered an MFA prompt, and produced no sign-in event that looked like an intrusion, because the attack exploited the OAuth consent screen rather than credential theft. This illustrates how the phishing click that now matters hands over a refresh token that sits structurally below the identity controls most organizations still treat as the perimeter.\u003c/p\u003e\n"},{"n":14,"title":"Trapdoor Android Ad Fraud Scheme Hit 659 Million Daily Bid Requests Using 455 Apps","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/trapdoor-android-ad-fraud-scheme-hit.html","time":"16:38","priority":"MUST READ","score":92,"tldr":"Trapdoor is a massive Android ad fraud operation that used 455 malicious apps to generate 659 million daily bid requests by tricking users into installing secondary apps that perform hidden ad fraud through WebViews and fake alerts.","briefOverview":"\u003cp\u003eCybersecurity researchers at HUMAN\u0026rsquo;s Satori team disclosed the Trapdoor ad fraud operation targeting Android devices. The scheme involved 455 malicious apps and 183 command-and-control domains, turning organic app installs into a pipeline for multi-stage fraud. Users who downloaded utility-style apps were coerced into installing secondary apps that launched hidden WebViews and fraudulently requested ads.\u003c/p\u003e\n\n\u003cp\u003eAt its peak, Trapdoor generated 659 million bid requests per day, with the associated apps downloaded over 24 million times, primarily from the United States. The operation abused install attribution tools to selectively activate malicious behavior only for users acquired through threat actor ad campaigns. Google removed all identified malicious apps from the Google Play Store following responsible disclosure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Trapdoor operation represents a self-sustaining ad fraud and malvertising campaign exclusively targeting Android users, as reported by HUMAN\u0026rsquo;s Satori Threat Intelligence and Research Team. The infrastructure included 455 malicious Android apps and 183 threat actor-owned command-and-control domains, designed to turn app installations into a recurring revenue cycle that funds further malvertising.\u003c/p\u003e\n\n\u003cp\u003eUsers unknowingly download a threat actor-owned utility app, such as a PDF viewer or device cleanup tool. These apps trigger malvertising campaigns that coerce users into downloading additional threat actor-owned apps. The secondary apps then launch hidden WebViews, load threat actor-owned HTML5 domains, and request ads, effectively performing automated touch fraud.\u003c/p\u003e\n\n\u003cp\u003eA key technical detail is the selective activation technique: the malicious behavior is only triggered for users who acquired the app via threat actor-run ad campaigns, while organic downloads or sideloads remain benign. This is achieved through abuse of install attribution tools. The operation also employs multiple anti-analysis and obfuscation techniques, including impersonating legitimate SDKs to blend in.\u003c/p\u003e\n\n\u003cp\u003eAt its peak, Trapdoor accounted for 659 million bid requests daily, with apps downloaded more than 24 million times. Traffic was heavily concentrated in the United States, representing over three-fourths of the total volume. The campaign reused HTML5 cashout domains, a pattern seen in prior threat clusters such as SlopAds, Low5, and BADBOX 2.0.\u003c/p\u003e\n\n\u003cp\u003eFollowing responsible disclosure by HUMAN, Google removed all identified malicious apps from the Google Play Store, effectively neutralizing the operation. A complete list of the 455 apps was published. Researchers noted that Trapdoor shows how fraudsters co-opt legitimate tools like attribution software to evade detection and sustain their campaigns.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe Trapdoor ad fraud and malvertising operation, disclosed by HUMAN\u0026rsquo;s Satori Threat Intelligence and Research Team, targeted Android users through a multi-stage scheme involving 455 malicious apps and 183 threat actor-owned command-and-control domains. The operation turned organic app installs into a self-funding pipeline for fraud, using utility-style apps as entry points to deploy hidden ad fraud mechanisms.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eMulti-stage Infection Chain:\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStage 1: Users download a seemingly harmless utility app (e.g., PDF viewer, device cleanup tool) from the Google Play Store or other sources.\u003c/li\u003e\n\u003cli\u003eStage 2: The first app triggers malvertising campaigns with fake pop-up alerts mimicking app update messages, coercing users to install additional threat actor-owned apps.\u003c/li\u003e\n\u003cli\u003eStage 3: The secondary apps launch hidden WebViews that load threat actor-controlled HTML5 domains and request ads, performing automated touch fraud.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eSelective Activation:\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe malicious payload activates only for users acquired through threat actor-run ad campaigns. Organic downloads or sideloaded apps remain benign.\u003c/li\u003e\n\u003cli\u003eThis is achieved by abusing install attribution tools, which are normally used to track how users discover legitimate apps.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAnti-Analysis Techniques:\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe operation employs obfuscation methods and impersonates legitimate SDKs to blend in with normal app behavior.\u003c/li\u003e\n\u003cli\u003eIt uses multiple evasion tactics to sidestep detection by security researchers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"scale-and-impact\"\u003eScale and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAt peak: 659 million bid requests per day.\u003c/li\u003e\n\u003cli\u003eTotal app downloads: over 24 million.\u003c/li\u003e\n\u003cli\u003eGeographic concentration: United States accounted for more than three-fourths of traffic.\u003c/li\u003e\n\u003cli\u003eThe operation is described as self-sustaining: revenue from ad fraud funds further malvertising campaigns.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"comparison-to-other-threat-clusters\"\u003eComparison to Other Threat Clusters\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the use of HTML5-based cashout sites is a pattern observed in prior threat clusters tracked as SlopAds, Low5, and BADBOX 2.0, indicating tactical overlap or shared infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eHUMAN\u0026rsquo;s Satori team conducted the research and disclosed findings to Google.\u003c/li\u003e\n\u003cli\u003eGoogle removed all identified malicious apps from the Google Play Store, effectively neutralizing the operation.\u003c/li\u003e\n\u003cli\u003eA complete list of the 455 malicious apps was published in an HTML file linked from the article.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"executive-commentary\"\u003eExecutive Commentary\u003c/h2\u003e\n\n\u003cp\u003eLindsay Kaye, vice president of threat intelligence at HUMAN, stated that the operation uses real software combined with obfuscation and anti-analysis techniques to fuse malvertising, hidden ad fraud, and multi-stage malware distribution. Gavin Reid, chief information security officer at HUMAN, emphasized that Trapdoor shows how fraudsters turn everyday app installs into a self-funding pipeline and co-opt legitimate tools like attribution software to evade detection.\u003c/p\u003e\n","keyPoints":["Trapdoor involved 455 malicious Android apps and 183 threat actor-owned command-and-control domains.","At its peak, the operation generated 659 million bid requests per day, with the associated apps downloaded over 24 million times.","The scheme used install attribution tools to activate malicious behavior only in users acquired through threat actor-run ad campaigns, while suppressing it for organic downloads.","Google removed all identified malicious apps from the Google Play Store following responsible disclosure by HUMAN's Satori team."],"insights":["The operation is self-sustaining: an organic app install creates an illicit revenue generation cycle that funds subsequent malvertising campaigns, rather than requiring external investment.","Threat actors abused install attribution tools to selectively activate malicious behavior only in users acquired through their own ad campaigns, while suppressing it for organic downloads, making detection harder.","The malware employed anti-analysis techniques such as impersonating legitimate SDKs to blend in with normal app behavior, allowing it to evade standard security scans."],"referencedReports":[{"title":"Satori Threat Intelligence Alert: Trapdoor Funnels Malvertising into Ad Fraud","url":"https://www.humansecurity.com/learn/resource/satori-threat-intelligence-alert-trapdoor-funnels-malvertising-into-ad-fraud/","publisher":"HUMAN","context":"The article references this report from HUMAN's Satori team to detail the Trapdoor ad fraud operation, including its techniques and scale.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers at HUMAN\u0026rsquo;s Satori team disclosed the Trapdoor ad fraud operation targeting Android devices. The scheme involved 455 malicious apps and 183 command-and-control domains, turning organic app installs into a pipeline for multi-stage fraud. Users who downloaded utility-style apps were coerced into installing secondary apps that launched hidden WebViews and fraudulently requested ads.\u003c/p\u003e\n\n\u003cp\u003eAt its peak, Trapdoor generated 659 million bid requests per day, with the associated apps downloaded over 24 million times, primarily from the United States. The operation abused install attribution tools to selectively activate malicious behavior only for users acquired through threat actor ad campaigns. Google removed all identified malicious apps from the Google Play Store following responsible disclosure.\u003c/p\u003e\n"},{"n":3,"title":"From PDB strings to MaaS: Tracking a commodity BadIIS ecosystem used by Chinese-speaking threat","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/from-pdb-strings-to-maas-tracking-a-commodity-badiis-ecosystem/","time":"10:00","priority":"SHOULD READ","score":88,"tldr":"Cisco Talos uncovered a commodity BadIIS variant with embedded \"demo.pdb\" strings sold as malware-as-a-service by a developer alias \"lwxat\" to multiple Chinese-speaking cybercrime groups, enabling customizable SEO fraud through a builder tool and auxiliary deployment mechanisms.","briefOverview":"\u003cp\u003eCisco Talos uncovered a BadIIS variant with embedded \u0026ldquo;demo.pdb\u0026rdquo; strings that functions as commodity malware, likely sold or shared among multiple Chinese-speaking cybercrime groups operating under a malware-as-a-service (MaaS) model for continuous monetization.\u003c/p\u003e\n\n\u003cp\u003eAnalysis of program database (PDB) file paths reveals a sustained, multi-year development effort by an author alias \u0026ldquo;lwxat\u0026rdquo;, spanning from at least September 2021 through January 2026, with rapid iterative updates, feature branching, and reactive evasion tactics targeting specific security vendors such as Norton.\u003c/p\u003e\n\n\u003cp\u003eTalos recovered a dedicated builder tool enabling threat actors to generate configuration files, customize payloads, and inject parameters into BadIIS binaries for traffic redirection, reverse proxying, content hijacking, and backlink injection for malicious SEO fraud, alongside auxiliary tools for automated deployment and persistence.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos has been investigating a specific variant of BadIIS malware characterized by \u0026ldquo;demo.pdb\u0026rdquo; strings since 2024. This variant, observed in attacks across the Asia-Pacific region and a few in South Africa, Europe, and North America, is assessed with moderate confidence to be a commodity tool utilized by multiple Chinese-speaking cybercrime groups. The tactics, techniques, and procedures documented by Talos show notable divergences from those reported by other vendors like Trend Micro, Ahnlab, and Elastic, making attribution to a single threat actor difficult.\u003c/p\u003e\n\n\u003cp\u003eAnalysis of the embedded PDB strings provided much more intelligence than the generic \u0026ldquo;demo.pdb\u0026rdquo; filename. The consistent PDB path patterns, including the stable \u0026ldquo;Administrator\\Desktop\u0026rdquo; build environment, Chinese-language folder names, and date-based versioning, created a highly reliable fingerprint for tracking and clustering this BadIIS toolset. These artifacts enabled attribution to a possible customer alias \u0026ldquo;x神\u0026rdquo; (\u0026ldquo;xshen\u0026rdquo;) and revealed customized builds tailored to bypass Norton antivirus, perform site-wide hijacking, or redirect users based on browser language.\u003c/p\u003e\n\n\u003cp\u003eThe PDB paths demonstrate a sustained development effort from at least September 2021 to January 2026. Folder naming conventions indicate rapid sprint-like updates, such as \u0026ldquo;dll0217\u0026rdquo;, \u0026ldquo;dll0301\u0026rdquo;, and \u0026ldquo;dll0315\u0026rdquo; representing February 17, March 1, and March 15. A folder named \u0026ldquo;dll-no503\u0026rdquo; suggests a troubleshooting build to resolve IIS \u0026ldquo;503 Service Unavailable\u0026rdquo; errors, and folders like \u0026ldquo;兼容百度浏览器+劫持robots.txt\u0026rdquo; confirm the malware\u0026rsquo;s role in malicious SEO campaigns targeting the Chinese search engine ecosystem.\u003c/p\u003e\n\n\u003cp\u003eTalos recovered a builder tool labeled \u0026ldquo;version 1.0\u0026rdquo; with an estimated original release of 2021, updated on August 22, 2022. The builder allows configuration of traffic redirection, reverse proxy, content hijacking, and internal/backlink settings. Prior to generating final payloads, the threat actor must stage unconfigured 32-bit and 64-bit BadIIS binaries. The builder generates a \u0026ldquo;config.txt\u0026rdquo; file, authenticates with the C2 server by checking for the response string \u0026ldquo;lwxat\u0026rdquo;, and embeds obfuscated parameters into the malware.\u003c/p\u003e\n\n\u003cp\u003eThe same author has developed a suite of auxiliary tools, including early service-based installers, configuration-driven service installers, authentication and configuration-driven unified tools, latest two-stage installation toolset, and a module initialization dropper. These tools use custom Base64 encoding, impersonate legitimate services like Winlogin or FaxService, and implement robust persistence mechanisms ensuring BadIIS is restored even after quarantine or server restarts.\u003c/p\u003e\n\n\u003cp\u003eThe string \u0026ldquo;lwxat\u0026rdquo; is assessed with moderate-to-high confidence as the author\u0026rsquo;s alias, based on its use as a hardcoded authentication string in the builder and service tool, as a configuration parameter in \u0026ldquo;config.txt\u0026rdquo;, and as the custom user-agent \u0026ldquo;lwxatisme\u0026rdquo; in malware samples. ClamAV and SNORT rules for detection are provided, along with indicators of compromise available in a GitHub repository.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"mystery-badiis-containing-demo-pdb\"\u003eMystery BadIIS Containing \u0026ldquo;demo.pdb\u0026rdquo;\u003c/h2\u003e\n\n\u003cp\u003eSince 2024, Cisco Talos investigated numerous attacks across the Asia-Pacific region, along with a few in South Africa, Europe, and North America, utilizing a specific BadIIS variant characterized by \u0026ldquo;demo.pdb\u0026rdquo; strings. While security vendors like Trend Micro, Ahnlab, VNPT, and Elastic track global spread of these variants, Talos observed notable divergences in TTPs. This makes attribution to a single threat actor difficult, but Talos assesses with moderate confidence that the \u0026ldquo;demo.pdb\u0026rdquo; BadIIS variant is a commodity tool utilized by multiple Chinese-speaking cybercrime groups.\u003c/p\u003e\n\n\u003ch2 id=\"insights-from-embedded-pdb-strings\"\u003eInsights from Embedded PDB Strings\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe consistent PDB path pattern - stable \u0026ldquo;Administrator\\Desktop\u0026rdquo; build environment, Chinese-language folder names, and date-based versioning - creates a highly reliable fingerprint for tracking and clustering this BadIIS version toolset.\u003c/li\u003e\n\u003cli\u003ePDB artifacts enabled attribution to a possible customer name alias \u0026ldquo;x神\u0026rdquo; (\u0026ldquo;xshen\u0026rdquo;) and revealed customized builds tailored to:\n\n\u003cul\u003e\n\u003cli\u003e
