<script>
window.__DL_ARTICLES = [{"n":2,"title":"FBI disrupts massive AI-powered phishing service using a million URLs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fbi-disrupts-massive-ai-powered-phishing-service-using-a-million-urls/","time":"14:36","priority":"SHOULD READ","score":86,"tldr":"The FBI, with Google and Black Lotus Labs, disrupted Outsider Enterprise, a China-based AI-assisted phishing-as-a-service operation tied to over a million fraudulent URLs and millions of stolen credit card records. The takedown seized servers, domains, wallets, and a Telegram bot as part of Operation Riptide.","briefOverview":"\u003cp\u003eThe FBI, working with Google and Black Lotus Labs, dismantled a large Chinese phishing-as-a-service operation called Outsider Enterprise. The operation used AI and distributed phishing kits to run campaigns impersonating trusted brands in text messages sent through AT\u0026amp;T, T-Mobile, and Verizon. Google linked the operation to 9,000 fake websites and more than a million fraudulent URLs.\u003c/p\u003e\n\n\u003cp\u003eAuthorities believe campaigns powered by Outsider Enterprise stole more than 3.8 million credit card records and caused an estimated \u003cspan class=\"math inline\"\u003e\\(1.9 billion in losses. The FBI action was part of Operation Riptide and included technical and legal components. Seized assets included administration servers, a Shopify storefront, a testing account, about \\)\u003c/span\u003e100,000 in USDT, phishing domains, and a Telegram bot linked to the service.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the operation affected hundreds of thousands of users worldwide and sent 2.5 million SMS messages to Android users over a two-week period in May. Android users flagged 55,000 of those messages as fraudulent. Google also filed a civil lawsuit targeting the infrastructure and is coordinating with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FBI, in coordination with Google and Black Lotus Labs, disrupted a major Chinese phishing-as-a-service operation known as Outsider Enterprise. The operation had been active since at least 2023 and used thousands of phishing websites to steal credit card data and passwords. Google connected Outsider Enterprise to 9,000 fake websites and more than a million fraudulent URLs.\u003c/p\u003e\n\n\u003cp\u003eOutsider Enterprise used AI and distributed phishing kits to support campaigns that impersonated trusted brands. The campaigns were delivered through text messages sent through AT\u0026amp;T, T-Mobile, and Verizon. Google said the operation coordinated through Telegram and distributed phishing kits that allowed criminals to send fake text campaigns appearing to come from Google and other trusted brands.\u003c/p\u003e\n\n\u003cp\u003eAuthorities believe the phishing campaigns powered by Outsider Enterprise led to the theft of more than 3.8 million credit card records. The estimated losses were placed at $1.9 billion. Google said the AI-assisted phishing operation affected hundreds of thousands of users worldwide and that victims lost millions to the scams.\u003c/p\u003e\n\n\u003cp\u003eThe takedown was part of the FBI’s broader Operation Riptide, which targets cybercrime activity and infrastructure. During the technical action, the FBI and partners seized multiple administration servers, a Shopify e-commerce storefront, and an account used by the threat actor to test the phishing service. The agency also seized about $100,000 in USDT from Outsider payment wallets and redirected thousands of phishing domains registered at U.S. providers to an FBI splash page.\u003c/p\u003e\n\n\u003cp\u003eThe FBI also took over a Telegram bot linked to Outsider Enterprise that contained information on customers of the phishing service. Google filed a civil lawsuit targeting the operation’s infrastructure and is working with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers. Google also cited Android protections, including scam detection for suspicious calls and messaging protections that block more than 10 billion malicious messages every month.\u003c/p\u003e\n\n\u003cp\u003eOver a two-week period in May, Google said 2.5 million SMS messages were sent to Android users from Outsider Enterprise infrastructure. Android users flagged 55,000 of those messages as fraudulent. Google is using the case to support seven bipartisan U.S. anti-scam bills, including the Stop SCAMS Act, which would require the FBI to lead a coordinated national anti-scam strategy.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe FBI, working with Google and Black Lotus Labs, dismantled a large Chinese phishing-as-a-service operation called Outsider Enterprise. The operation used AI and distributed phishing kits to support campaigns that impersonated trusted brands and attempted to steal credit card data and passwords. The campaigns were delivered through text messages sent through AT\u0026amp;T, T-Mobile, and Verizon.\u003c/p\u003e\n\n\u003cp\u003eOutsider Enterprise had been active since at least 2023. Google linked the operation to 9,000 fake websites and more than a million fraudulent URLs. Authorities believe campaigns powered by the service led to the theft of more than 3.8 million credit card records and caused an estimated $1.9 billion in losses.\u003c/p\u003e\n\n\u003ch2 id=\"operation-riptide-and-the-takedown\"\u003eOperation Riptide and the takedown\u003c/h2\u003e\n\n\u003cp\u003eThe action against Outsider Enterprise was part of the FBI’s broader Operation Riptide, which targets cybercrime activity and infrastructure. The effort had both technical and legal components.\u003c/p\u003e\n\n\u003cp\u003eDuring the technical takedown, the FBI and partners seized multiple pieces of infrastructure and assets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMultiple administration servers.\u003c/li\u003e\n\u003cli\u003eA Shopify e-commerce storefront.\u003c/li\u003e\n\u003cli\u003eAn account the threat actor used to test the phishing service.\u003c/li\u003e\n\u003cli\u003eAround $100,000 in USDT from Outsider payment wallets.\u003c/li\u003e\n\u003cli\u003eThousands of phishing domains registered at U.S. providers, which now redirect to an FBI splash page.\u003c/li\u003e\n\u003cli\u003eA Telegram bot linked to Outsider Enterprise that contained information on customers of the phishing service.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"phishing-infrastructure-and-techniques\"\u003ePhishing infrastructure and techniques\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Outsider Enterprise as a phishing-as-a-service operation that distributed phishing kits. Google said the network coordinated through Telegram and provided kits that allowed criminals to send fake text campaigns appearing to come from Google and other trusted brands.\u003c/p\u003e\n\n\u003cp\u003eThe operation used AI in support of phishing campaigns. The campaigns impersonated trusted brands in SMS messages and directed users toward phishing infrastructure. Google said the AI-assisted phishing operation affected hundreds of thousands of users worldwide.\u003c/p\u003e\n\n\u003cp\u003eGoogle reported that, over a two-week period in May, 2.5 million SMS messages were sent to Android users from Outsider Enterprise infrastructure. Android users flagged 55,000 of those messages as fraudulent.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article cites several impact figures tied to Outsider Enterprise and its campaigns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoogle linked the operation to 9,000 fake websites.\u003c/li\u003e\n\u003cli\u003eGoogle connected the operation to more than one million fraudulent URLs.\u003c/li\u003e\n\u003cli\u003eAuthorities believe more than 3.8 million credit card records were stolen through campaigns powered by the service.\u003c/li\u003e\n\u003cli\u003eEstimated losses were placed at $1.9 billion.\u003c/li\u003e\n\u003cli\u003eGoogle said hundreds of thousands of users worldwide were affected.\u003c/li\u003e\n\u003cli\u003eGoogle estimated that hundreds of thousands of victims lost millions to these scams.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"legal-and-private-sector-response\"\u003eLegal and private-sector response\u003c/h2\u003e\n\n\u003cp\u003eGoogle filed a civil lawsuit targeting the operation’s infrastructure. The company is also coordinating with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.\u003c/p\u003e\n\n\u003cp\u003eGoogle said it is using the case to combine aggressive legal action with collaboration involving federal and state governments. It is also advocating for seven bipartisan U.S. anti-scam bills, including the Stop SCAMS Act.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the Stop SCAMS Act would require the FBI to lead a coordinated national anti-scam strategy. That strategy would bring together federal agencies, law enforcement, and private companies to better track, disrupt, and prevent fraud and scam operations.\u003c/p\u003e\n\n\u003ch2 id=\"android-protections-described-by-google\"\u003eAndroid protections described by Google\u003c/h2\u003e\n\n\u003cp\u003eGoogle said Android users are protected from these threats by AI-powered defenses. The defenses include scam detection on Android that warns users about suspicious calls and messaging protections that block more than 10 billion malicious messages every month.\u003c/p\u003e\n\n\u003cp\u003eThe article presents these Android protections alongside Google’s legal action and coordination with telecommunications providers. Together, the response described in the article includes law enforcement seizures, civil litigation, telecom blocking, domain redirection, and platform-level defenses.\u003c/p\u003e\n","keyPoints":["The FBI, working with Google and Black Lotus Labs, dismantled a Chinese phishing-as-a-service operation called Outsider Enterprise that used thousands of phishing websites to steal credit card data and passwords.","Google linked Outsider Enterprise to 9,000 fake websites and more than a million fraudulent URLs, and authorities believe its campaigns stole more than 3.8 million credit card records causing an estimated $1.9 billion in losses.","During the takedown, the FBI and partners seized multiple administration servers, a Shopify storefront, a testing account, about $100,000 in USDT, and a Telegram bot linked to Outsider Enterprise.","Google filed a civil lawsuit targeting the operation’s infrastructure and is coordinating with AT\u0026T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.","Google said Outsider Enterprise sent 2.5 million SMS messages to Android users over a two-week period in May, with Android users flagging 55,000 of them as fraudulent."],"insights":["The disruption combined law enforcement seizures, private-sector litigation, telecom filtering, and domain redirection, showing that the response targeted both the operators and the delivery infrastructure of the phishing service.","Outsider Enterprise’s use of Telegram for coordination and a bot containing customer information indicates that takedowns of criminal communication tools can expose downstream users of phishing-as-a-service platforms.","The article highlights SMS as a major delivery channel for AI-assisted phishing, with Google reporting 2.5 million messages sent to Android users in just two weeks from Outsider Enterprise infrastructure.","Google is pairing technical defenses with policy advocacy, using the case to support bipartisan anti-scam legislation such as the Stop SCAMS Act."],"referencedReports":[],"body":"\u003cp\u003eThe FBI, working with Google and Black Lotus Labs, dismantled a large Chinese phishing-as-a-service operation called Outsider Enterprise. The operation used AI and distributed phishing kits to run campaigns impersonating trusted brands in text messages sent through AT\u0026amp;T, T-Mobile, and Verizon. Google linked the operation to 9,000 fake websites and more than a million fraudulent URLs.\u003c/p\u003e\n\n\u003cp\u003eAuthorities believe campaigns powered by Outsider Enterprise stole more than 3.8 million credit card records and caused an estimated \u003cspan class=\"math inline\"\u003e\\(1.9 billion in losses. The FBI action was part of Operation Riptide and included technical and legal components. Seized assets included administration servers, a Shopify storefront, a testing account, about \\)\u003c/span\u003e100,000 in USDT, phishing domains, and a Telegram bot linked to the service.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the operation affected hundreds of thousands of users worldwide and sent 2.5 million SMS messages to Android users over a two-week period in May. Android users flagged 55,000 of those messages as fraudulent. Google also filed a civil lawsuit targeting the infrastructure and is coordinating with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.\u003c/p\u003e\n"},{"n":1,"title":"An Employment Verification Request That Passed DMARC REJECT, Then Sent Replies to Someone Else","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/informdata-employment-verification-sendgrid-reply-to-diversion","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"A phishing email impersonating InformData passed SPF, DKIM, and DMARC because it was sent through authorized SendGrid infrastructure, showing that email authentication can validate sender authorization but not intent. The attack used mismatched Reply-To and link domains to divert responses and harvest credentials, making behavioral and link-destination checks critical.","briefOverview":"\u003cp\u003eIRONSCALES reported a phishing attack in June 2026 that impersonated InformData, a legitimate background check company, in an email titled “Employment Verification Request.” The message targeted an employee at a sports data technology company, and a colleague at the same organization reported it. One mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe significant detail is that the email passed SPF, DKIM, and DMARC even though the article describes it as malicious. The domain \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e had DMARC set to \u003ccode\u003ep=REJECT sp=REJECT\u003c/code\u003e, but the message was sent through SendGrid infrastructure authorized for that domain. The article emphasizes that DMARC verified authorized sending infrastructure, not the sender’s intent.\u003c/p\u003e\n\n\u003cp\u003eThe attack used a Reply-To address at \u003ccode\u003esupport@verifying[.]you\u003c/code\u003e and a call-to-action link at \u003ccode\u003everify.zippedscript[.]com\u003c/code\u003e, both described as attacker-controlled. The employment verification pretext exploited pressure around hiring and onboarding processes. IRONSCALES said its Adaptive AI detected the message using behavioral signals such as Reply-To mismatch, first-time sender behavior, and link destinations disconnected from the legitimate brand.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIRONSCALES described a phishing email that impersonated InformData, a real background check company, using the sender address \u003ccode\u003everifications@international.informdata[.]com\u003c/code\u003e. The email was titled “Employment Verification Request” and targeted an employee at a sports data technology company in June 2026. A colleague at the same organization reported the email, and one mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe message passed SPF, DKIM, and DMARC, including a DMARC policy set to the strict \u003ccode\u003ep=REJECT sp=REJECT\u003c/code\u003e enforcement level. The article states that the email was sent through SendGrid infrastructure, specifically \u003ccode\u003ewfbtrqkw.outbound-mail.sendgrid.net\u003c/code\u003e from IP \u003ccode\u003e159[.]183[.]84[.]25\u003c/code\u003e. The DKIM signature used selector \u003ccode\u003es1\u003c/code\u003e under \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e, and the Return-Path used a SendGrid VERP subdomain at \u003ccode\u003eem8327.international.informdata[.]com\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that DMARC did what it was designed to do because the sending infrastructure was authorized for the domain. However, it says authorization and intent are not the same thing. IRONSCALES stated that the attacker either compromised the InformData SendGrid account or configured a new SendGrid identity that could sign for the domain.\u003c/p\u003e\n\n\u003cp\u003eThe phishing infrastructure was separated from the authenticated sender identity. The Reply-To header pointed to \u003ccode\u003esupport@verifying[.]you\u003c/code\u003e, while the “Review Employment” button linked to \u003ccode\u003everify.zippedscript[.]com/verify/employment/51d4ba99721cdbdbe83cc09a15f3d76b\u003c/code\u003e. The article says the long hash in the URL path was a per-recipient tracking token used to correlate clicks with specific email addresses.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES said Themis, its Adaptive AI, labeled the recipient as a VIP and flagged the message as high risk. The detection was based on behavioral signals including the Reply-To domain mismatch, first-time sender pattern, and disconnect between the legitimate brand identity and the link destinations. The article advises defenders reviewing employment verification emails to check whether Reply-To domains match From domains and whether CTA links resolve to the sender’s actual infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES reported a phishing attack that used an employment verification pretext while impersonating InformData, a legitimate background check company. The email was titled “Employment Verification Request” and used the sender address \u003ccode\u003everifications@international.informdata[.]com\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe attack targeted an employee at a sports data technology company in June 2026. A colleague at the same organization reported the email, and one mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe article assigns the incident a high severity and maps it to several MITRE ATT\u0026amp;CK techniques, including spearphishing link, masquerading, and phishing for information via spearphishing link.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-email-looked-legitimate\"\u003eWhy the Email Looked Legitimate\u003c/h2\u003e\n\n\u003cp\u003eThe email passed all major authentication checks listed in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSPF passed.\u003c/li\u003e\n\u003cli\u003eDKIM passed.\u003c/li\u003e\n\u003cli\u003eDMARC passed.\u003c/li\u003e\n\u003cli\u003eThe DMARC policy for \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e was set to \u003ccode\u003ep=REJECT sp=REJECT\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that \u003ccode\u003ep=REJECT\u003c/code\u003e is the strictest DMARC enforcement policy. Despite that, the message was malicious because the attacker-controlled reply and link infrastructure did not match the legitimate sender identity.\u003c/p\u003e\n\n\u003ch2 id=\"sendgrid-infrastructure-and-authentication-details\"\u003eSendGrid Infrastructure and Authentication Details\u003c/h2\u003e\n\n\u003cp\u003eThe message was sent through SendGrid infrastructure. The article identifies the sending hostname as \u003ccode\u003ewfbtrqkw.outbound-mail.sendgrid.net\u003c/code\u003e and the sending IP as \u003ccode\u003e159[.]183[.]84[.]25\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe authentication alignment appeared valid because the sending infrastructure was configured as authorized for \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e. The DKIM signature used selector \u003ccode\u003es1\u003c/code\u003e under that domain, and the Return-Path pointed to a VERP-encoded address at \u003ccode\u003eem8327.international.informdata[.]com\u003c/code\u003e, a SendGrid subdomain.\u003c/p\u003e\n\n\u003cp\u003eThe article states that DMARC did exactly what it was designed to do: it verified that the sending infrastructure was authorized for the domain. It also states that authorization and intent are not the same thing.\u003c/p\u003e\n\n\u003ch2 id=\"possible-abuse-path-described-in-the-article\"\u003ePossible Abuse Path Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article says the attacker either compromised the InformData SendGrid account or configured a new SendGrid identity that could sign for the domain. It does not identify a named threat actor or group.\u003c/p\u003e\n\n\u003cp\u003eThe central point is that the attacker was able to send email that aligned with the legitimate domain’s authentication setup. This allowed the phishing email to pass SPF, DKIM, and DMARC checks while still directing user interaction to attacker-controlled destinations.\u003c/p\u003e\n\n\u003ch2 id=\"phishing-pretext\"\u003ePhishing Pretext\u003c/h2\u003e\n\n\u003cp\u003eThe lure was an employment verification request. The article notes that such requests are routine in business operations because background check companies like InformData send them regularly.\u003c/p\u003e\n\n\u003cp\u003eThe pretext is described as effective because recipients may feel pressure to act quickly during hiring cycles. The article says that ignoring or delaying a verification can appear to risk slowing a colleague’s onboarding.\u003c/p\u003e\n\n\u003ch2 id=\"attacker-controlled-destinations\"\u003eAttacker-Controlled Destinations\u003c/h2\u003e\n\n\u003cp\u003eAlthough the From address used InformData-related infrastructure, the user-facing interaction points went elsewhere.\u003c/p\u003e\n\n\u003cp\u003eThe Reply-To header pointed to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esupport@verifying[.]you\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe “Review Employment” button linked to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003everify.zippedscript[.]com/verify/employment/51d4ba99721cdbdbe83cc09a15f3d76b\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies both \u003ccode\u003everifying[.]you\u003c/code\u003e and \u003ccode\u003everify.zippedscript[.]com\u003c/code\u003e as attacker-controlled domains. It also says the long hash in the URL path was a per-recipient tracking token that allowed the attacker to correlate clicks with specific email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe unsubscribe link also pointed to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003everify.zippedscript[.]com/unsubscribe\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this confirmed that the attacker controlled the entire link infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES said the message was flagged as a first-time sender and high risk. Themis, the company’s Adaptive AI, labeled the recipient as a VIP and detected the message using behavioral signals.\u003c/p\u003e\n\n\u003cp\u003eThe detection signals named in the article were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReply-To domain mismatch.\u003c/li\u003e\n\u003cli\u003eFirst-time sender pattern.\u003c/li\u003e\n\u003cli\u003eDisconnect between the legitimate brand identity and the link destinations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that detection did not depend on authentication failure because there was no authentication failure.\u003c/p\u003e\n\n\u003ch2 id=\"defender-takeaways-stated-in-the-article\"\u003eDefender Takeaways Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that defenders reviewing employment verification emails check whether the Reply-To domain matches the From domain. It also recommends checking whether call-to-action links resolve to the sender’s actual infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article’s key warning is that when a background check company’s email routes replies and clicks to entirely different domains, the verification request is the attack.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: \u003ccode\u003everifications@international.informdata[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eReply-To email: \u003ccode\u003esupport@verifying[.]you\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCredential harvesting domain: \u003ccode\u003everify.zippedscript[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCredential harvesting URL: \u003ccode\u003everify.zippedscript[.]com/verify/employment/51d4ba99721cdbdbe83cc09a15f3d76b\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eAlternate link domain: \u003ccode\u003everifying[.]you\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eUnsubscribe URL: \u003ccode\u003everify.zippedscript[.]com/unsubscribe\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSending IP: \u003ccode\u003e159[.]183[.]84[.]25\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSending hostname: \u003ccode\u003ewfbtrqkw.outbound-mail.sendgrid.net\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDKIM selector: \u003ccode\u003es1\u003c/code\u003e with \u003ccode\u003ed=international.informdata[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eReturn-Path domain: \u003ccode\u003eem8327.international.informdata[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping-provided\"\u003eMITRE ATT\u0026amp;CK Mapping Provided\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to the following MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.002\u003c/code\u003e — Phishing: Spearphishing Link, for the employment verification email with a credential harvesting link.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1036.005\u003c/code\u003e — Masquerading: Match Legitimate Name or Location, for impersonation of the real background check company InformData.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1598.003\u003c/code\u003e — Phishing for Information: Spearphishing Link, for per-recipient tracking tokens used for target validation.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Attackers sent an employment verification phishing email impersonating InformData from verifications@international.informdata[.]com through SendGrid infrastructure.","The email passed SPF, DKIM, and DMARC with a REJECT enforcement policy because the sending infrastructure was authorized for international.informdata[.]com.","The Reply-To header pointed to support@verifying[.]you, and the call-to-action linked to verify.zippedscript[.]com, both described as attacker-controlled domains.","The call-to-action URL included a long per-recipient tracking token that allowed the attacker to correlate clicks with specific email addresses.","IRONSCALES flagged the message as high risk based on behavioral signals including a Reply-To domain mismatch, first-time sender pattern, and mismatched link destinations."],"insights":["DMARC with p=REJECT did not reduce risk in this case because it only confirmed that the infrastructure was authorized to send for the domain, not that the message content or destination links were legitimate.","Reply-To and CTA domain mismatches were more useful detection signals than SPF, DKIM, or DMARC results for this phishing email.","The attacker-controlled unsubscribe link showed that not only the main call-to-action but also secondary email functions routed through the attacker’s infrastructure.","Employment verification requests create urgency because recipients may believe delaying a response could slow a colleague’s onboarding process."],"referencedReports":[],"body":"\u003cp\u003eIRONSCALES reported a phishing attack in June 2026 that impersonated InformData, a legitimate background check company, in an email titled “Employment Verification Request.” The message targeted an employee at a sports data technology company, and a colleague at the same organization reported it. One mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe significant detail is that the email passed SPF, DKIM, and DMARC even though the article describes it as malicious. The domain \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e had DMARC set to \u003ccode\u003ep=REJECT sp=REJECT\u003c/code\u003e, but the message was sent through SendGrid infrastructure authorized for that domain. The article emphasizes that DMARC verified authorized sending infrastructure, not the sender’s intent.\u003c/p\u003e\n\n\u003cp\u003eThe attack used a Reply-To address at \u003ccode\u003esupport@verifying[.]you\u003c/code\u003e and a call-to-action link at \u003ccode\u003everify.zippedscript[.]com\u003c/code\u003e, both described as attacker-controlled. The employment verification pretext exploited pressure around hiring and onboarding processes. IRONSCALES said its Adaptive AI detected the message using behavioral signals such as Reply-To mismatch, first-time sender behavior, and link destinations disconnected from the legitimate brand.\u003c/p\u003e\n"}];

<script type="text/babel">

function priorityColor(p) {

}
function priorityShort(p) {

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>

}

function PriorityBadge({ priority }) {

  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}

  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>

}

function htmlPanel(value) {

}

function pointList(items) {

}

function ReportsPanel({ reports }) {

          </div>

        </li>
      ))}

  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
