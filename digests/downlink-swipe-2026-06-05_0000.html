03eCyera Research analyzed protobuf.js, a widely used JavaScript implementation of Protocol Buffers, and found six vulnerabilities involving schema-derived data. The article frames the common root cause as metadata being treated as trusted input even when it could influence generated JavaScript or runtime object structures. The vulnerabilities were assigned CVE-2026-44289, CVE-2026-44290, CVE-2026-44291, CVE-2026-44292, CVE-2026-44294, and CVE-2026-44295.\u003c/p\u003e\n\n\u003cp\u003eThe main runtime remote code execution chain depends on a prerequisite prototype pollution primitive in the same Node.js process. protobuf.js used plain objects for primitive type lookup tables, so polluted Object.prototype entries could make an attacker-controlled type name appear valid. That type string could then be interpolated into generated encoder or decoder code and compiled with Function(), causing the string to run as JavaScript.\u003c/p\u003e\n\n\u003cp\u003eA second code execution path exists in protobufjs-cli\u0026rsquo;s pbjs static code generation and does not require prototype pollution. The static generator\u0026rsquo;s escapeName() helper only handled reserved words, allowing schema names with syntax-significant characters to pass into generated JavaScript through string concatenation. The payload executes when the generated output file is imported, making CI/CD workflows that generate and import code from contributed schemas an exposed scenario described by the article.\u003c/p\u003e\n\n\u003cp\u003eThe other issues include process-wide denial of service through unsafe option paths, prototype injection in generated message constructors, denial of service from crafted field names, and stack exhaustion from unbounded recursive protobuf decoding. Cyera reproduced the recursion crash against Baileys, a WhatsApp bot library, using a roughly 34KB payload with about 10,000 nesting levels. The article also says the same payload crashed a Google Cloud Functions pattern decoding Pub/Sub events, where redelivery can cause repeated crashes until the message reaches a dead-letter queue.\u003c/p\u003e\n\n\u003cp\u003eThe affected stakeholders and technologies named in the article include protobuf.js, protobufjs-cli, Node.js applications, pbjs users, Baileys, WhatsApp bots, Google Cloud Functions, Pub/Sub, and CI/CD pipelines processing contributed schemas. The article does not identify a threat actor; it focuses on vulnerability research and exploit chains. Fixes were released in protobuf.js 7.5.6 and 8.0.2, and protobufjs-cli 1.2.1 and 2.0.2, with mitigation tracked in PR #2163.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCyera Research reported six vulnerabilities in protobuf.js, the JavaScript implementation of Protocol Buffers. The article says protobuf.js has over 48 million weekly npm downloads and is widely used to load schemas, build reflection objects, and generate specialized JavaScript encoder and decoder functions. The central finding is that protobuf.js treated schema-related metadata as trusted data even when that metadata could be influenced by attackers and later converted into executable code or unsafe runtime behavior.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities can lead to remote code execution or denial of service depending on the input surface and application behavior. The article emphasizes that not every protobuf.js deployment is equally exposed: trusted schemas compiled at build time and flat, authenticated message flows are much lower risk than systems dynamically loading schemas, decoding untrusted recursive protobuf messages, or running pbjs static generation on contributed schemas.\u003c/p\u003e\n\n\u003ch2 id=\"cves-and-fixed-versions\"\u003eCVEs and fixed versions\u003c/h2\u003e\n\n\u003cp\u003eThe article lists six assigned CVEs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-44289: denial of service through unbounded protobuf recursion.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44290: process-wide denial of service when loading schemas with unsafe option paths.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44291: code generation gadget after prototype pollution.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44292: prototype injection in generated message constructors.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44294: denial of service from crafted field names in generated code.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44295: code injection in pbjs static output from crafted schema names.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that all issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2. It also says the mitigation work is tracked in PR #2163.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-pattern\"\u003eCore technical pattern\u003c/h2\u003e\n\n\u003cp\u003eprotobuf.js reads .proto files or JSON descriptors, converts them into JavaScript objects representing message types and fields, and then generates specialized JavaScript functions for encoding and decoding. This design is used for performance because it avoids interpreting the schema repeatedly for every message. The risk described by Cyera is that schema values can cross a boundary from metadata into code.\u003c/p\u003e\n\n\u003cp\u003eThe article repeatedly identifies the same class of mistake in different forms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eType names reached generated JavaScript functions.\u003c/li\u003e\n\u003cli\u003eNamespace names reached static JavaScript files emitted by pbjs.\u003c/li\u003e\n\u003cli\u003eOption paths walked through internal object structures and overwrote built-in functions.\u003c/li\u003e\n\u003cli\u003eField names broke generated code by injecting raw control characters.\u003c/li\u003e\n\u003cli\u003eJSON object keys bypassed prototype safety checks in generated constructors.\u003c/li\u003e\n\u003cli\u003eNested binary messages triggered unbounded recursion and crashed the process.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"runtime-rce-chain-after-prototype-pollution\"\u003eRuntime RCE chain after prototype pollution\u003c/h2\u003e\n\n\u003cp\u003eThe runtime RCE chain requires a separate prototype pollution primitive in the Node.js application or one of its dependencies. The article explicitly states that protobuf.js did not provide the standalone prototype pollution bug in this chain; instead, it provided the code generation gadget that could be reached after pollution had already occurred.\u003c/p\u003e\n\n\u003cp\u003eprotobuf.js built primitive type lookup tables using plain objects. Because those objects inherited from Object.prototype, a polluted Object.prototype entry could be returned during a lookup for a field type. Cyera gives the example of adding a property to Object.prototype with a crafted type-like string, causing types.basic[payload] to return a value instead of undefined.\u003c/p\u003e\n\n\u003cp\u003eOnce the polluted lookup made the attacker-controlled string appear to be a valid primitive type, protobuf.js used that same string in generated encoder or decoder code. The value was inserted through a %s placeholder without validation or escaping and then compiled with Function(). At that point, the article says the type name stopped being a type name and ran as JavaScript.\u003c/p\u003e\n\n\u003cp\u003eThe same sink could also be reached through descriptors. The article says ext/descriptor copied descriptor.typeName into field.type, so an attacker-controlled FileDescriptorProto could carry the payload in typeName. With the same prototype pollution prerequisite, that descriptor string could reach the same type lookup and code-generation sink.\u003c/p\u003e\n\n\u003ch2 id=\"pbjs-static-code-generation-rce-path\"\u003epbjs static code generation RCE path\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a separate RCE path in pbjs, the protobuf.js CLI tool that generates static JavaScript files from schemas. Unlike the runtime chain, this issue does not require prototype pollution. The attacker-controlled input is the schema, and the output is a JavaScript file that executes when imported.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable logic was in cli/targets/static.js. The escapeName() helper only handled JavaScript reserved words and did not actually escape schema names containing newlines, semicolons, quotes, or other syntax-significant characters. Names for namespaces, enums, services, and methods could pass through to emitted JavaScript through direct string concatenation.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a CI/CD supply-chain scenario in which an attacker submits a pull request containing a crafted .proto file. When CI runs pbjs to generate JavaScript and the generated file is imported by a build, test suite, or downstream consumer, the injected code runs. The article says this could expose build secrets, signing credentials, cloud tokens, package registry credentials, and internal repositories.\u003c/p\u003e\n\n\u003ch2 id=\"other-denial-of-service-and-prototype-issues\"\u003eOther denial-of-service and prototype issues\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-44294 involves field names with raw control characters. util.safeProp() escaped backslashes and double quotes but missed characters such as newlines, carriage returns, and null bytes. A crafted field name could make generated JavaScript syntactically invalid, causing Function() to throw a SyntaxError whenever encode, decode, or verify was called for that message type.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-44290 involves unsafe option paths. util.setProperty() blocked \u003cstrong\u003eproto\u003c/strong\u003e and prototype path segments but did not block constructor. The article says an option path such as constructor.keys could walk from an options object to the global Object function and set Object.keys to a non-function value, causing Object.keys() calls to throw process-wide.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-44292 involves generated message constructors. The base Message constructor already skipped \u003cstrong\u003eproto\u003c/strong\u003e when copying properties from input objects, but generated constructors did not. If input came from JSON.parse(), \u003cstrong\u003eproto\u003c/strong\u003e could appear as an own enumerable key and be assigned to this[\u0026rdquo;\u003cstrong\u003eproto\u003c/strong\u003e\u0026rdquo;], changing the prototype of that specific message instance.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-44289 involves unbounded recursion in generated decoders for nested message fields. Self-referencing protobuf message types are valid, but the generated decoder called nested decode routines without a depth parameter, counter, or maximum. A deeply nested binary payload could recurse until V8 threw RangeError: Maximum call stack size exceeded.\u003c/p\u003e\n\n\u003ch2 id=\"real-world-impact-demonstrated-by-cyera\"\u003eReal-world impact demonstrated by Cyera\u003c/h2\u003e\n\n\u003cp\u003eCyera demonstrated the recursion denial-of-service against Baileys, described in the article as the most popular open-source WhatsApp bot library with over 2 million weekly npm downloads. Baileys uses protobuf.js to decode binary messages from WhatsApp servers, and the WhatsApp protocol schema includes naturally recursive types. Cyera crafted a roughly 34KB binary payload with about 10,000 nesting levels and sent it as a WhatsApp message to a bot.\u003c/p\u003e\n\n\u003cp\u003eWhen Baileys called Type.decode() on the incoming binary, protobuf.js recursed through the nested structure until V8 ran out of stack space and the process crashed. The article says the persistence makes the impact worse because the malicious message remains in chat history. When the bot restarts and catches up on missed messages, it decodes the same payload and crashes again, causing a restart loop until the message is manually cleared.\u003c/p\u003e\n\n\u003cp\u003eCyera also confirmed CVE-2026-44292 against Baileys. By injecting \u003cstrong\u003eproto\u003c/strong\u003e keys carrying properties such as isAdmin: true and canDelete: true into a message object, the generated constructor copied those keys without filtering. The result was a single message object with properties its schema never defined.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Cyera reproduced the recursion crash against a Google Cloud Functions pattern recommended in Google\u0026rsquo;s Firestore trigger documentation. The same 34KB payload crashed a Cloud Function decoding Pub/Sub events. Because the event is redelivered until acknowledged, the function crashes again on each retry until the message reaches the dead-letter queue.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-conditions\"\u003eExposure conditions\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several exposure scenarios:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplications loading .proto files or JSON descriptors from users, plugins, tenants, or shared repositories are exposed to schema-driven issues such as crafted field names, unsafe option paths, and static generation injection.\u003c/li\u003e\n\u003cli\u003eApplications decoding protobuf binary data from untrusted senders are exposed to the stack overflow denial-of-service issue when recursive message types are present.\u003c/li\u003e\n\u003cli\u003eNode.js processes with a separate prototype pollution bug can expose the protobuf.js code-generation gadget that turns polluted type lookup into JavaScript execution.\u003c/li\u003e\n\u003cli\u003eProjects running pbjs in CI on contributed schemas can expose build pipelines to static code-generation injection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not attribute exploitation to any named threat actor. Its focus is vulnerability research, proof-of-concept exploit chains, and affected usage patterns.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigations\"\u003eResponse and mitigations\u003c/h2\u003e\n\n\u003cp\u003eThe article says the maintainers handled the reports promptly through GitHub Security Advisories. Reports were opened in April 2026, maintainers accepted them and linked mitigation work to PR #2163, fixed protobuf.js versions 7.5.6 and 8.0.2 were released, fixed protobufjs-cli versions 1.2.1 and 2.0.2 were released, and GitHub assigned the CVEs in May 2026.\u003c/p\u003e\n\n\u003cp\u003eThe fixes described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBuilding type lookup tables with Object.create(null) to eliminate inherited property access.\u003c/li\u003e\n\u003cli\u003eValidating typeName before interpolation.\u003c/li\u003e\n\u003cli\u003eSanitizing all reflection names in static code generation, including fields, namespaces, and services.\u003c/li\u003e\n\u003cli\u003eReplacing unsafe string concatenation with safe templating.\u003c/li\u003e\n\u003cli\u003eBlocking constructor alongside \u003cstrong\u003eproto\u003c/strong\u003e and prototype in option-path traversal.\u003c/li\u003e\n\u003cli\u003eMaking generated constructors skip \u003cstrong\u003eproto\u003c/strong\u003e keys during property copying.\u003c/li\u003e\n\u003cli\u003eEnforcing a configurable maximum nesting depth during recursive decoding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s central conclusion is that protobuf.js\u0026rsquo;s trust boundary failed where metadata became structure and structure became code. Type names, namespace names, option paths, field names, object keys, and nested binary messages were all treated as passive metadata, but in affected versions they could influence generated JavaScript, process-wide built-ins, object prototypes, or recursive control flow. Cyera\u0026rsquo;s recommended response is to upgrade to the fixed protobuf.js and protobufjs-cli versions, especially for applications that process untrusted schemas, descriptors, or protobuf messages.\u003c/p\u003e\n","keyPoints":["Cyera Research found six vulnerabilities in protobuf.js that can enable remote code execution or denial of service when schema-derived data is poisoned or crafted.","The runtime remote code execution chain requires a separate prototype pollution primitive, after which protobuf.js can treat an attacker-controlled type string as a valid primitive and compile it through Function().","The protobufjs-cli static generation flaw allows crafted schema names to be emitted into generated JavaScript files and execute when those files are imported, without requiring prototype pollution.","Cyera reproduced a recursion-based denial-of-service crash against Baileys WhatsApp bots and a Google Cloud Functions Pub/Sub decoding pattern using a deeply nested protobuf payload.","The issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2."],"insights":["The most severe runtime code execution path is not a standalone protobuf.js prototype pollution bug; protobuf.js acts as a code-generation gadget that can turn prototype pollution elsewhere in the same Node.js process into arbitrary JavaScript execution.","The pbjs static generation issue creates a supply-chain risk because malicious schema names in pull requests or shared schema sources can become executable JavaScript during CI builds or tests when the generated file is imported.","The recursion denial-of-service can become persistent in message-driven systems because malicious payloads may remain in WhatsApp chat history or be redelivered by Pub/Sub until acknowledged or moved to a dead-letter queue.","A schema option path such as constructor.keys could corrupt Object.keys process-wide, showing that schema metadata could damage unrelated application code outside protobuf.js itself.","Applications using only trusted schemas compiled at build time and flat, non-recursive messages from authenticated sources had much lower exposure than applications dynamically loading schemas or decoding untrusted recursive protobuf data."],"referencedReports":[{"title":"CVE-2026-44289: Denial of service through unbounded protobuf recursion","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-685m-2w69-288q","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the unbounded protobuf recursion denial-of-service finding.","category":"","primary":false},{"title":"CVE-2026-44290: Process-wide denial of service when loading schemas with unsafe option paths","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-jvwf-75h9-cwgg","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the unsafe option path process-wide denial-of-service finding.","category":"","primary":false},{"title":"CVE-2026-44291: Code generation gadget after prototype pollution","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-75px-5xx7-5xc7","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the prototype-pollution-assisted code generation gadget finding.","category":"","primary":false},{"title":"CVE-2026-44292: Prototype injection in generated message constructors","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-fx83-v9x8-x52w","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the generated message constructor prototype injection finding.","category":"","primary":false},{"title":"CVE-2026-44294: Denial of service from crafted field names in generated code","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-2pr8-phx7-x9h3","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the crafted field name denial-of-service finding.","category":"","primary":false},{"title":"CVE-2026-44295: Code injection in pbjs static output from crafted schema names","url":"https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-6r35-46g8-jcw9","publisher":"GitHub Security Advisories","context":"The article links this advisory as the full details for the pbjs static output code injection finding.","category":"","primary":false}],"body":"\u003cp\u003eCyera Research found six vulnerabilities in protobuf.js, a JavaScript implementation of Protocol Buffers with over 48 million weekly npm downloads. The issues can enable remote code execution or denial of service when attacker-controlled schema-derived data reaches protobuf.js code generation or decoding paths. The affected areas include runtime encoding and decoding, descriptor handling, generated constructors, option path handling, recursive message decoding, and the pbjs static code-generation CLI.\u003c/p\u003e\n\n\u003cp\u003eThe most significant runtime RCE chain requires a separate prototype pollution bug elsewhere in the Node.js process. After pollution, protobuf.js can resolve an attacker-controlled type string through inherited properties, treat it as a valid primitive, insert it into generated encoder or decoder source, and compile it with Function(). A separate pbjs static generation issue does not require prototype pollution and can turn crafted schema names into JavaScript that executes when generated files are imported.\u003c/p\u003e\n\n\u003cp\u003eCyera also demonstrated real-world denial-of-service impact against Baileys WhatsApp bots and a Google Cloud Functions Pub/Sub decoding pattern using deeply nested recursive protobuf payloads. In both cases, recursive decoding can crash the process, and message persistence or redelivery can cause repeated crashes. All issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n"},{"n":9,"title":"New Threat Cluster OP-512 Targets Microsoft IIS Servers with Custom Web Shell Framework","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-threat-cluster-op-512-targets.html","time":"12:33","priority":"SHOULD READ","score":86,"tldr":"Researchers identified a new China-linked threat cluster, OP-512, targeting Microsoft IIS servers with a custom web shell framework designed for stealth, restricted attacker access, and automated compromise reporting. The activity highlights continued interest by China-aligned actors in legacy, internet-facing IIS servers running unsupported software.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified a previously unreported threat cluster called OP-512 that targets Microsoft Internet Information Services servers with a bespoke web shell framework. ReliaQuest assessed with moderate to high confidence that the espionage-focused activity is linked to China. The activity was observed on a compromised IIS web server belonging to an organization whose sector and geography align with China-linked intelligence priorities.\u003c/p\u003e\n\n\u003cp\u003eOP-512’s framework consists of three web shells that provide remote access, file management, authenticated command execution through two independent access paths, and automated compromise reporting. The web shells use evasion measures such as timestomping, including scanning nearby files and folders, calculating the median last-modified timestamp, and changing their own timestamps to blend into the environment. ReliaQuest said the framework combines uniquely generated deployments, cryptographic access controls, and centralized reporting at scale.\u003c/p\u003e\n\n\u003cp\u003eIn the observed case, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. The attacker used the IIS worker process w3wp.exe to drop a web shell into an application upload directory, after which the shell reported its location to attacker-controlled infrastructure through DNS or HTTP fallback. The actor later attempted to escalate privileges to SYSTEM using the Potato Suite and ran commands such as whoami /priv to confirm privileges.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers have reported a previously unreported threat cluster named OP-512, with “OP” standing for “opponent,” targeting Microsoft IIS servers. ReliaQuest assessed with moderate to high confidence that the activity is linked to China and focused on espionage. The company said OP-512 was highly likely conducting espionage through a compromised IIS web server at an organization whose sector and geography align with China-linked intelligence priorities.\u003c/p\u003e\n\n\u003cp\u003eThe article places OP-512 in a broader pattern of China-linked or China-aligned activity involving IIS servers. It says OP-512 is the fourth such threat group after CL-STA-0048, DragonRank, and GhostRedirector to single out IIS web servers over the past 12 months. It also notes that Cisco Talos recently reported multiple Chinese-speaking cybercrime groups sharing a BadIIS malware variant for IIS infections, and that SHADOW-EARTH-053 has targeted IIS servers in a China-aligned espionage campaign against government and defense sectors across South, East, and Southeast Asia.\u003c/p\u003e\n\n\u003cp\u003eThe central capability attributed to OP-512 is a custom web shell framework made up of three web shells. These web shells provide the attackers with remote access to compromised hosts while attempting to evade signature-based detection and complicate forensic timelines. Their timestomping method scans nearby files and folders, calculates the median last-modified timestamp, and overwrites the shells’ own creation and modification times to match that value.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said the framework has capabilities that are rarely seen together, including uniquely generated deployments, cryptographic controls that restrict access to the attacker, and automatic reporting from compromised servers for centralized management. OP-512 shares close tactical proximity to CL-STA-0048, but no direct overlap has been found between OP-512 and other known China-aligned adversaries. The article says OP-512 is considered a distinct cluster operating autonomously, whether it represents a revamped existing cluster or independently developed capabilities.\u003c/p\u003e\n\n\u003cp\u003eIn the attack observed by ReliaQuest, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. There was evidence of earlier activity on the same host around 75 days before the main incident, including DNS queries to the attacker-controlled domain ashx.lhlsjcb[.]com. During the later activity, the attacker used the IIS worker process w3wp.exe to drop a web shell into the application upload directory, triggering DNS or HTTP-based reporting of the shell’s location.\u003c/p\u003e\n\n\u003cp\u003eAfter deploying the web shells, OP-512 attempted to escalate privileges to SYSTEM using the Potato Suite. The actor also ran commands such as whoami /priv to confirm system rights. ReliaQuest warned that internet-facing IIS servers running legacy, unsupported software remain a preferred entry point in this threat ecosystem and that OP-512’s purpose-built framework may evade defenses tuned only to known actors and commodity tooling.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have discovered a previously unreported threat cluster called OP-512, with “OP” standing for “opponent.” The group has been observed targeting Microsoft Internet Information Services servers to deploy a bespoke web shell framework. ReliaQuest assessed with moderate to high confidence that the espionage-focused activity is linked to China.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said OP-512 was highly likely conducting espionage through a compromised IIS web server at an organization whose sector and geography align with China-linked intelligence priorities. The article does not name the affected organization. It presents OP-512 as a distinct cluster operating autonomously.\u003c/p\u003e\n\n\u003ch2 id=\"broader-iis-targeting-context\"\u003eBroader IIS Targeting Context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that no overlaps have been found between OP-512 and other known China-aligned adversaries. However, it says OP-512 is the fourth such threat group, after CL-STA-0048, DragonRank, and GhostRedirector, to single out IIS web servers over the past 12 months.\u003c/p\u003e\n\n\u003cp\u003eThe article also references other recent IIS-focused activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos recently reported that multiple Chinese-speaking cybercrime groups are sharing a variant of malware called BadIIS to infect IIS servers.\u003c/li\u003e\n\u003cli\u003eIIS servers have been targeted by SHADOW-EARTH-053 in a China-aligned espionage campaign against government and defense sectors across South, East, and Southeast Asia.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eReliaQuest said that four China-linked clusters targeting the same technology in under a year is unlikely to be a coincidence. The company stated that internet-facing IIS servers running legacy, unsupported software remain a preferred entry point across this threat ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"op-512-web-shell-framework\"\u003eOP-512 Web Shell Framework\u003c/h2\u003e\n\n\u003cp\u003eThe core of OP-512’s operation is a custom web shell framework made up of three web shells. According to the article, the web shells grant attackers remote access to compromised hosts while taking steps to evade signature-based detection and complicate forensic timelines.\u003c/p\u003e\n\n\u003cp\u003eReliaQuest said the framework combines several capabilities it rarely sees together:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEach deployment is uniquely generated.\u003c/li\u003e\n\u003cli\u003eAccess is restricted to the attacker through cryptographic controls.\u003c/li\u003e\n\u003cli\u003eCompromised servers automatically report back for centralized management at scale.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe three web shells together gave the attacker file management, authenticated command execution through two independent access paths, and automated reporting of the compromise before defenders had time to respond.\u003c/p\u003e\n\n\u003ch2 id=\"timestomping-and-evasion\"\u003eTimestomping and Evasion\u003c/h2\u003e\n\n\u003cp\u003eA notable technique used by the OP-512 framework is timestomping. The web shells scan every file and sub-folder around the location where they are placed, calculate the median last-modified timestamp, and overwrite their own creation and modification times to match that value.\u003c/p\u003e\n\n\u003cp\u003eThis gives the impression that the web shell artifacts have been present for some time. The article frames this as a way to complicate forensic timelines and evade signature-based detection.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-other-clusters\"\u003eRelationship to Other Clusters\u003c/h2\u003e\n\n\u003cp\u003eOP-512 shares close tactical proximity to CL-STA-0048. The article says this raises the possibility that OP-512 either represents an existing cluster that has completely revamped its toolset or developed these capabilities independently.\u003c/p\u003e\n\n\u003cp\u003eDespite that tactical proximity, ReliaQuest treats OP-512 as a distinct cluster operating autonomously. The article states that no overlaps have been found between OP-512 and other known China-aligned adversaries.\u003c/p\u003e\n\n\u003ch2 id=\"observed-attack-details\"\u003eObserved Attack Details\u003c/h2\u003e\n\n\u003cp\u003eIn the attack observed by ReliaQuest, the threat actor targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. The same host showed evidence of prior activity about 75 days before the main incident.\u003c/p\u003e\n\n\u003cp\u003eThat earlier activity involved DNS queries to a different attacker-controlled domain, ashx.lhlsjcb[.]com. Weeks later, the main sequence of actions was described as a “sprint.”\u003c/p\u003e\n\n\u003cp\u003eDuring that later activity, the attacker used the web server’s worker process, w3wp.exe, to drop one of the web shells into the application’s upload directory. This triggered a self-reporting mechanism that used a DNS query, or an HTTP request as a fallback, to transmit the web shell’s location to an attacker-controlled domain.\u003c/p\u003e\n\n\u003ch2 id=\"privilege-escalation-attempt\"\u003ePrivilege Escalation Attempt\u003c/h2\u003e\n\n\u003cp\u003eAfter deploying the web shells, OP-512 attempted to escalate privileges to the SYSTEM level using the Potato Suite. The actor then ran commands such as whoami /priv to confirm system rights.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state whether the privilege escalation attempt succeeded. It describes the attempt and the subsequent privilege-checking command activity observed by ReliaQuest.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-defenders\"\u003eSignificance for Defenders\u003c/h2\u003e\n\n\u003cp\u003eReliaQuest emphasized that OP-512 differs from other IIS-targeting clusters because it is not using commodity tooling recycled across campaigns. Instead, it is using a purpose-built framework designed to defeat detection methods that work against the other three clusters mentioned in the article.\u003c/p\u003e\n\n\u003cp\u003eThe company warned that organizations that have tuned defenses to known actors are likely not covered against OP-512. The article also highlights legacy, unsupported, internet-facing IIS servers as a recurring target in this activity set.\u003c/p\u003e\n","keyPoints":["Researchers discovered a previously unreported threat cluster called OP-512 that targets Microsoft Internet Information Services servers with a custom web shell framework.","ReliaQuest assessed with moderate to high confidence that OP-512’s espionage-focused activity is linked to China.","OP-512’s framework consists of three web shells that provide remote access, file management, authenticated command execution through two access paths, and automated reporting of the compromise.","The web shells use timestomping by calculating the median last-modified timestamp of nearby files and folders and changing their own timestamps to blend in.","In the observed attack, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0 and attempted privilege escalation to SYSTEM using the Potato Suite."],"insights":["OP-512’s timestomping method is unusually adaptive because it calculates the median last-modified time of surrounding files and folders rather than using a fixed timestamp, making simple timeline-based detection less reliable.","The web shell framework restricts access to the attacker through cryptographic controls, so defenders relying on unauthenticated probing or generic web shell interaction may not observe its full functionality.","The compromised server automatically reports the deployed web shell location to attacker-controlled infrastructure using DNS first and HTTP as a fallback, making outbound DNS and HTTP monitoring from IIS servers especially relevant for detection.","The article notes that four China-linked clusters have targeted IIS servers within a year, indicating that legacy internet-facing IIS systems remain a recurring priority across this threat ecosystem.","ReliaQuest emphasizes that OP-512 uses a purpose-built framework rather than recycled commodity tooling, so defenses tuned only to previously known IIS-focused actors may miss this activity."],"referencedReports":[{"title":"Threat Spotlight: ReliaQuest’s Agentic AI Uncovers New China-Linked Cluster OP-512","url":"https://reliaquest.com/blog/threat-spotlight-reliaquests-agentic-ai-uncovers-new-china-linked-cluster-op-512","publisher":"ReliaQuest","context":"The article cites ReliaQuest’s report as the source for the assessment that OP-512 is a China-linked espionage-focused cluster targeting IIS servers with a custom web shell framework.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have identified a previously unreported threat cluster called OP-512 that targets Microsoft Internet Information Services servers with a bespoke web shell framework. ReliaQuest assessed with moderate to high confidence that the espionage-focused activity is linked to China. The activity was observed on a compromised IIS web server belonging to an organization whose sector and geography align with China-linked intelligence priorities.\u003c/p\u003e\n\n\u003cp\u003eOP-512’s framework consists of three web shells that provide remote access, file management, authenticated command execution through two independent access paths, and automated compromise reporting. The web shells use evasion measures such as timestomping, including scanning nearby files and folders, calculating the median last-modified timestamp, and changing their own timestamps to blend into the environment. ReliaQuest said the framework combines uniquely generated deployments, cryptographic access controls, and centralized reporting at scale.\u003c/p\u003e\n\n\u003cp\u003eIn the observed case, OP-512 targeted a legacy IIS server running Windows Server 2016 with end-of-life .NET Framework 4.0. The attacker used the IIS worker process w3wp.exe to drop a web shell into an application upload directory, after which the shell reported its location to attacker-controlled infrastructure through DNS or HTTP fallback. The actor later attempted to escalate privileges to SYSTEM using the Potato Suite and ran commands such as whoami /priv to confirm privileges.\u003c/p\u003e\n"},{"n":26,"title":"AWS Login Phishing Attack: How Attackers Exploit New Authentication","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/inside-aws-login-exploring-a-new-phishing-method","time":"20:47","priority":"SHOULD READ","score":84,"tldr":"Researchers show that AWS’s new aws login --remote flow can be abused for phishing because victims authenticate on legitimate AWS pages while attackers complete the CLI token exchange from their own infrastructure. Organizations should disable or tightly monitor the OAuth cross-device actions involved, especially via Service Control Policies and CloudTrail correlation of mismatched IPs or user agents.","briefOverview":"\u003cp\u003eAWS introduced \u003ccode\u003eaws login\u003c/code\u003e as a simpler way for developers to authenticate the AWS CLI using console credentials, including a \u003ccode\u003e--remote\u003c/code\u003e option for browserless environments. The article explains that this cross-device flow can be abused because the browser authentication and the CLI session requesting credentials are not tied to the same device. Researchers built a proof-of-concept phishing flow in which victims authenticate on legitimate AWS infrastructure while attackers complete the CLI login on their own systems.\u003c/p\u003e\n\n\u003cp\u003eThe demonstrated phishing kit used AWS services including S3, DynamoDB, Lambda, API Gateway, EC2, and SSM to host and automate the attack under \u003ccode\u003eamazonaws.com\u003c/code\u003e infrastructure. This makes the flow more convincing to victims and harder for traditional domain-based email, firewall, and network controls to block. The article emphasizes that technical staff are high-value targets because compromised AWS credentials can provide access to cloud infrastructure, production systems, and sensitive repositories.\u003c/p\u003e\n\n\u003cp\u003eFor prevention, the article recommends using Service Control Policies to deny \u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e where cross-device sign-in is not required. For detection, it recommends analyzing CloudTrail for \u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e and correlating \u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003eCreateOAuth2Token\u003c/code\u003e events. Suspicious indicators include mismatched source IPs, different user agents, unusual timing, and unexpected geography between the authentication and token exchange steps.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article analyzes a phishing technique enabled by AWS’s newer \u003ccode\u003eaws login\u003c/code\u003e authentication flow, especially the \u003ccode\u003eaws login --remote\u003c/code\u003e option. The legitimate feature lets a user authenticate in a browser and return a verification code to a separate CLI session. According to the article, this separation creates a phishing vector because an attacker can initiate the CLI login while a victim completes authentication through a legitimate AWS sign-in page.\u003c/p\u003e\n\n\u003cp\u003eResearchers first examined the parameters and behavior of the AWS login flow, including the generated URLs, device codes, expiration windows, and token handling. They found that the verification code must match the device state code generated for the initiating CLI session, which prevented a simpler token-stealing approach. Because generated URLs expire after 10 minutes, the researchers built automation to generate a fresh URL for each visitor and tie each one to a victim session.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept evolved into an AWS-native phishing setup hosted on legitimate AWS infrastructure. The article describes using an S3 bucket for the phishing page, DynamoDB to track sessions, Lambda and API Gateway to manage communication, and EC2 with SSM and \u003ccode\u003eexpect\u003c/code\u003e to run and complete \u003ccode\u003eaws login --remote\u003c/code\u003e. From the victim’s perspective, the page can appear to be an AWS session-expiration prompt, and the actual authentication occurs on AWS-owned sign-in infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact can be significant because a successful phish gives the attacker a valid AWS session with the victim’s permissions. Depending on the user’s access, that session can be used to inventory the environment, map sensitive assets, exfiltrate data, move laterally across accounts, or create persistence through IAM users, access keys, or roles. The activity can blend into normal AWS API usage because CloudTrail records it as actions performed by the legitimate user identity.\u003c/p\u003e\n\n\u003cp\u003eThe article does not attribute this technique to a specific actor, but it references broader phishing activity involving Scattered Spider and incidents affecting organizations such as Salesforce, M\u0026amp;S, DoorDash, SoundCloud, Betterment, and Crunchbase. It argues that AI-generated phishing content has reduced the usefulness of grammar- and spelling-based phishing indicators. The recommended response is to reduce the attack surface with Service Control Policies and detect suspicious cross-device authentication by correlating CloudTrail events, IP addresses, user agents, timing, and geography.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a technical analysis of a phishing technique that abuses AWS’s newer \u003ccode\u003eaws login\u003c/code\u003e authentication process, particularly the \u003ccode\u003eaws login --remote\u003c/code\u003e option. The feature is intended to simplify AWS CLI authentication by allowing users to authenticate through a browser using their normal AWS console credentials, MFA, and then receive credentials back in the CLI. For browserless environments, the \u003ccode\u003e--remote\u003c/code\u003e option lets users open a generated URL on another device, authenticate, and paste a verification value back into the CLI session.\u003c/p\u003e\n\n\u003cp\u003eThe central finding is that this cross-device authentication model creates a phishing opportunity. An attacker can initiate \u003ccode\u003eaws login --remote\u003c/code\u003e on attacker-controlled infrastructure, send the resulting AWS sign-in URL to a victim, and wait for the victim to complete legitimate AWS authentication. The victim sees an authentic AWS login flow, but the resulting verification code can be used to complete the attacker’s CLI login session.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-flow-is-abusable\"\u003eWhy the Flow Is Abusable\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that \u003ccode\u003eaws login --remote\u003c/code\u003e generates a dedicated URL with a unique \u003ccode\u003edevice_code\u003c/code\u003e. The user opens that URL in a browser and authenticates on \u003ccode\u003esignin.amazonaws.com\u003c/code\u003e. AWS treats this as a cross-device flow, identified in the article as \u003ccode\u003ecross_device\u003c/code\u003e, because the authentication occurs in a browser while the token is returned to another device.\u003c/p\u003e\n\n\u003cp\u003eResearchers explored whether the flow could be simplified by directly stealing or reusing the token. They found that the device state code must match the initiating CLI session, meaning the verification value is tied to the session that generated the URL. This blocked a simpler token-theft approach, but still left room for phishing because the attacker can be the party that initiates the valid CLI session.\u003c/p\u003e\n\n\u003cp\u003eA key operational constraint is that each generated URL expires after 10 minutes. The article says this makes classic phishing harder unless the attacker can generate fresh URLs on demand. To handle this, the researchers automated URL generation for each visitor and tied each URL to a specific browser session.\u003c/p\u003e\n\n\u003ch2 id=\"proof-of-concept-phishing-infrastructure\"\u003eProof-of-Concept Phishing Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe article describes building a working phishing setup using AWS services. The goal was to make the phishing flow more convincing by hosting the infrastructure on legitimate \u003ccode\u003eamazonaws.com\u003c/code\u003e domains instead of lookalike domains. The researchers state that this improves trust from the victim’s perspective and makes traditional domain-blocking controls less effective.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept architecture included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn S3 bucket hosting an AWS-themed phishing page, such as an \u003ccode\u003eaws-session-expired\u003c/code\u003e bucket.\u003c/li\u003e\n\u003cli\u003eDynamoDB to track individual victim sessions using a \u003ccode\u003esessionId\u003c/code\u003e partition key.\u003c/li\u003e\n\u003cli\u003eLambda as a bridge between the frontend, DynamoDB, and EC2.\u003c/li\u003e\n\u003cli\u003eAPI Gateway exposing endpoints for session creation, session polling, and token submission.\u003c/li\u003e\n\u003cli\u003eEC2 to run \u003ccode\u003eaws login --remote\u003c/code\u003e and wait for the victim’s verification code.\u003c/li\u003e\n\u003cli\u003eSSM to send commands from Lambda to the EC2 instance.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eexpect\u003c/code\u003e to keep the CLI process open and feed the received token back into the login flow.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes three logical API operations in the setup. \u003ccode\u003ePOST /start\u003c/code\u003e generates a new session, stores it in DynamoDB, and triggers EC2 to run \u003ccode\u003eaws login --remote\u003c/code\u003e. \u003ccode\u003eGET /session/{id}\u003c/code\u003e allows the frontend to poll for the generated login URL. \u003ccode\u003ePOST /token/{id}\u003c/code\u003e receives the victim’s verification code and sends it to the EC2 instance so the attacker’s CLI login can complete.\u003c/p\u003e\n\n\u003ch2 id=\"social-engineering-model\"\u003eSocial Engineering Model\u003c/h2\u003e\n\n\u003cp\u003eThe researchers adapted the phishing presentation from ClickFix and ConsentFix-style campaigns. Instead of asking the victim to simply log in, the phishing page presents the action as a required fix for an expired AWS session or a routine security step. The article says this framing makes the action feel like ordinary IT hygiene for AWS engineers.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the victim’s authentication happens on AWS’s real sign-in infrastructure, not a fake credential-collection page. The attacker’s page is used to initiate and relay the process, while the actual email, password, and MFA flow occurs through AWS. The victim then provides the verification code that completes the attacker’s \u003ccode\u003eaws login --remote\u003c/code\u003e session.\u003c/p\u003e\n\n\u003ch2 id=\"impact-after-successful-phishing\"\u003eImpact After Successful Phishing\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, a successful attack gives the attacker a valid AWS session with whatever permissions the victim already has. The attacker does not need to bypass AWS controls because the resulting session is legitimate from AWS’s perspective. The risk depends on the victim’s role and permissions.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several possible actions available to an attacker in many environments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInventory the AWS environment.\u003c/li\u003e\n\u003cli\u003eMap sensitive assets.\u003c/li\u003e\n\u003cli\u003eExfiltrate valuable data.\u003c/li\u003e\n\u003cli\u003eCreate backdoors, misconfigurations, or scheduled tasks.\u003c/li\u003e\n\u003cli\u003eCreate IAM users with quiet policies.\u003c/li\u003e\n\u003cli\u003eGenerate long-lived access keys that bypass SSO, MFA, or browser-based login flows.\u003c/li\u003e\n\u003cli\u003eCreate roles with trust policies tied to principals or accounts that defenders may not monitor.\u003c/li\u003e\n\u003cli\u003eAssume roles already used for automation.\u003c/li\u003e\n\u003cli\u003eMove laterally across accounts the victim can legitimately access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that these actions can blend into normal operations because they use official AWS APIs and standard AWS services. CloudTrail may show the activity as actions taken by the legitimate user. STS sessions may look like other STS sessions, and the activity may resemble routine operational work.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance\"\u003eDetection Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends CloudTrail analysis as the primary detection method. The most specific fingerprint called out is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this value should not be common in most environments and is a strong starting point for hunting \u003ccode\u003eaws login --remote\u003c/code\u003e usage. It recommends focusing on the relationship between two events:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eCreateOAuth2Token\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe recommended detection approach is to correlate these events and compare:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSource IP addresses.\u003c/li\u003e\n\u003cli\u003eUser agents.\u003c/li\u003e\n\u003cli\u003eTiming between authentication and token exchange.\u003c/li\u003e\n\u003cli\u003eGeography, when relevant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn a phishing scenario, the victim authenticates from one IP address, while the attacker completes the verification flow from another IP address. The article notes that legitimate remote workflows can also involve different IPs, so mismatches alone should not be treated as definitive. However, when combined with the cross-device client, unusual geography, odd timing, or user-agent differences, the article describes the signal as strong.\u003c/p\u003e\n\n\u003ch2 id=\"prevention-guidance\"\u003ePrevention Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies Service Control Policies as a clean way to reduce or remove this attack surface. It recommends denying the OAuth sign-in actions used by the demonstrated flow:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that in accounts where cross-device or CLI-based sign-in is not needed, blocking these actions can remove the problem. In environments where some use is needed, it recommends selectively denying the actions for specific organizational units, accounts, or identities. It also recommends that organizations ask whether they actually need cross-device sign-in flows enabled broadly.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-named-entities\"\u003eAffected Parties and Named Entities\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on AWS environments and especially technical employees such as developers and engineers who work with AWS infrastructure. It states that compromised developer credentials can provide access to cloud infrastructure, production systems, and sensitive data repositories.\u003c/p\u003e\n\n\u003cp\u003eThe article mentions AWS services and features including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eaws login\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eaws login --remote\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eAWS CLI\u003c/li\u003e\n\u003cli\u003eAWS SSO\u003c/li\u003e\n\u003cli\u003eAWS CloudTrail\u003c/li\u003e\n\u003cli\u003eIAM\u003c/li\u003e\n\u003cli\u003eService Control Policies\u003c/li\u003e\n\u003cli\u003eS3\u003c/li\u003e\n\u003cli\u003eDynamoDB\u003c/li\u003e\n\u003cli\u003eLambda\u003c/li\u003e\n\u003cli\u003eAPI Gateway\u003c/li\u003e\n\u003cli\u003eEC2\u003c/li\u003e\n\u003cli\u003eSSM\u003c/li\u003e\n\u003cli\u003eCloudWatch Logs\u003c/li\u003e\n\u003cli\u003eSTS\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not attribute the demonstrated technique to a specific threat actor. It does mention broader phishing activity involving Scattered Spider and incidents affecting Salesforce, M\u0026amp;S, DoorDash, SoundCloud, Betterment, and Crunchbase as examples of the broader impact of phishing attacks.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that AWS’s \u003ccode\u003eaws login --remote\u003c/code\u003e cross-device authentication flow can be abused to create a convincing phishing attack in which the victim interacts with legitimate AWS sign-in infrastructure while the attacker completes a valid CLI login session. The article recommends preventing the flow with Service Control Policies where possible and detecting it through CloudTrail correlation of cross-device OAuth events, especially when IP addresses, user agents, timing, or geography do not align.\u003c/p\u003e\n","keyPoints":["AWS introduced the aws login command, including a --remote option that lets users authenticate in a browser on one device and return a verification code to a CLI session on another device.","Researchers demonstrated a phishing flow in which attackers run aws login --remote on their own infrastructure, send victims a legitimate AWS sign-in URL, and use the victim-provided verification code to obtain a valid AWS session.","The proof-of-concept phishing infrastructure used legitimate AWS services including S3, DynamoDB, Lambda, API Gateway, EC2, and SSM, making the phishing site appear under amazonaws.com infrastructure.","The article recommends blocking the signin:AuthorizeOAuth2Access and signin:CreateOAuth2Token actions with Service Control Policies where cross-device sign-in is not needed.","The article recommends detecting this activity in CloudTrail by looking for requestParameters.client_id = arn:aws:signin:::devtools/cross-device and correlating AuthorizeOAuth2Access and CreateOAuth2Token events for mismatched IP addresses, user agents, or unusual timing."],"insights":["The attack is difficult to block with traditional domain-based controls because the phishing infrastructure and sign-in flow can be hosted entirely on legitimate amazonaws.com infrastructure.","A strong detection signal is not the presence of a single OAuth event, but the relationship between AuthorizeOAuth2Access and CreateOAuth2Token events, especially when their source IPs, user agents, or timing suggest two different machines are involved.","Service Control Policies can remove the attack path at the organization level by denying signin:AuthorizeOAuth2Access and signin:CreateOAuth2Token, without blocking normal AWS authentication methods described in the article.","The article notes that the aws login --remote URL expires after 10 minutes, which forces attackers to generate fresh URLs per visitor and track each victim session individually."],"referencedReports":[],"body":"\u003cp\u003eAWS introduced \u003ccode\u003eaws login\u003c/code\u003e as a simpler way for developers to authenticate the AWS CLI using console credentials, including a \u003ccode\u003e--remote\u003c/code\u003e option for browserless environments. The article explains that this cross-device flow can be abused because the browser authentication and the CLI session requesting credentials are not tied to the same device. Researchers built a proof-of-concept phishing flow in which victims authenticate on legitimate AWS infrastructure while attackers complete the CLI login on their own systems.\u003c/p\u003e\n\n\u003cp\u003eThe demonstrated phishing kit used AWS services including S3, DynamoDB, Lambda, API Gateway, EC2, and SSM to host and automate the attack under \u003ccode\u003eamazonaws.com\u003c/code\u003e infrastructure. This makes the flow more convincing to victims and harder for traditional domain-based email, firewall, and network controls to block. The article emphasizes that technical staff are high-value targets because compromised AWS credentials can provide access to cloud infrastructure, production systems, and sensitive repositories.\u003c/p\u003e\n\n\u003cp\u003eFor prevention, the article recommends using Service Control Policies to deny \u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e where cross-device sign-in is not required. For detection, it recommends analyzing CloudTrail for \u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e and correlating \u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003eCreateOAuth2Token\u003c/code\u003e events. Suspicious indicators include mismatched source IPs, different user agents, unusual timing, and unexpected geography between the authentication and token exchange steps.\u003c/p\u003e\n"},{"n":15,"title":"FIFA World Cup 2026 Scams Are Already Live: Fake Sites, Banking Malware, and Stolen Logins","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fifa-world-cup-2026-scams-are-already.html","time":"07:01","priority":"SHOULD READ","score":82,"tldr":"Scammers are already exploiting FIFA World Cup 2026 demand with fake ticket sites, cloned FIFA logins, counterfeit merch, phishing ads, and Android streaming apps carrying banking malware. Fans should use only official FIFA channels, avoid crypto or unofficial sellers, and never install sideloaded streaming apps that request accessibility access.","briefOverview":"\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 fans are already being targeted by a broad fraud wave ahead of the June 11 kickoff. The activity includes thousands of lookalike FIFA domains, cloned login pages, fake ticket offers, counterfeit merchandise, bogus streaming sites, fake betting sites, and lottery emails. The tournament is an attractive target because tickets are scarce, more than six million fans are expected across 16 cities in the United States, Canada, and Mexico, and FIFA received more than 150 million ticket requests in the first 15 days.\u003c/p\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025 and linked more than 300 cloned sites to a Chinese-speaking operation it calls GHOST STADIUM. Those phishing pages closely copy FIFA’s real login experience, mimic its PingIdentity single sign-on flow, and ask victims to reset passwords, which can allow attackers to lock users out and resell tickets tied to their accounts. The operation also uses Facebook ads, Telegram, WhatsApp, search results, and several payment methods, including crypto, which the article identifies as a scam indicator because FIFA’s official ticketing never accepts it.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights mobile banking risk from malicious unofficial streaming apps. ThreatFabric and Kaspersky tied fake streaming apps, including apps pretending to be RojaDirecta, to Android banking trojans such as Massiv and Perseus, which can abuse Android accessibility features to overlay fake login screens, record input, intercept codes, and remotely control the screen. The article advises fans to use only fifa.com, avoid crypto payments and unofficial sellers, be wary of sideloaded streaming apps requesting accessibility access, and avoid sensitive logins on open Wi-Fi in host cities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 fraud is already active days before the June 11 kickoff. The article describes fake FIFA domains, cloned login pages, counterfeit merchandise stores, bogus streaming sites, fake betting sites, lottery emails, and social media scams. The risk is amplified by high demand, with more than six million fans expected across 16 cities in the United States, Canada, and Mexico, and more than 150 million ticket requests submitted to FIFA in the first 15 days.\u003c/p\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025. It identified a Chinese-speaking, financially motivated operation called GHOST STADIUM that runs one phishing kit across more than 300 cloned FIFA sites. The cloned pages are described as near-perfect copies of fifa.com and mimic FIFA’s PingIdentity single sign-on login, including a genuine client ID copied from the live site and images loaded from FIFA’s own servers.\u003c/p\u003e\n\n\u003cp\u003eThe GHOST STADIUM login pages ask victims to reset their passwords after entering credentials. According to the article, that can let attackers lock victims out of their FIFA accounts and resell tickets tied to them. Group-IB said most traffic comes from Facebook ads, with additional links on Telegram, WhatsApp, and search results, and the sites support payment through card entry, outside gateways, money-transfer apps, Mexico-only processors, and a crypto option.\u003c/p\u003e\n\n\u003cp\u003eOther researchers described additional infrastructure and scam types. FortiGuard Labs counted more than 13,000 World Cup-themed domains registered between January and May, with about 8.8% labeled malicious or suspicious, while the FBI advisory listed fake FIFA domains and warned more were coming. Bitdefender found FIFA lottery emails and social media ad campaigns for counterfeit goods and phishing pages, and Fortinet found more than 1,700 spoofed FIFA accounts plus stolen FIFA-related logins in data collected by Vidar, LummaC2, and RedLine.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights malware distributed through unofficial streaming apps. ThreatFabric observed malicious apps pretending to be RojaDirecta, and Kaspersky tied similar fake IPTV apps to Android banking trojans named Massiv and Perseus. These apps can abuse Android accessibility tools to overlay fake bank logins, record typed information, intercept one-time codes from texts and login apps, and control the screen remotely.\u003c/p\u003e\n\n\u003cp\u003eThe recommended user precautions are to buy only through fifa.com, type the address manually, enable multi-factor login, treat crypto payment requests as scams, avoid sideloaded streaming apps that request accessibility access, and avoid logging into bank or email accounts on open Wi-Fi. For security teams, the article recommends monitoring new FIFA-themed domains and lookalike login pages, checking staff and customer logins against Vidar, LummaC2, and RedLine stealer logs, and preparing fraud teams for ticket and chargeback spikes through mid-July. Meta said it is showing warning pop-ups for FIFA ticket searches on Facebook and worked with Visa to take down a Facebook network linked to fake World Cup sites pushing bogus gambling, while the FBI is asking victims to report scams to IC3.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSecurity researchers and the FBI are warning that FIFA World Cup 2026 scams are already active ahead of the June 11 kickoff. The article describes a broad fraud ecosystem targeting fans through fake FIFA sites, stolen logins, fraudulent ticket offers, counterfeit merchandise shops, bogus streaming apps, fake betting sites, lottery emails, spoofed social accounts, and risky public Wi-Fi.\u003c/p\u003e\n\n\u003cp\u003eThe tournament is described as a high-value target because demand is extremely high. More than six million fans are expected across 16 cities in the United States, Canada, and Mexico, and FIFA said it received more than 150 million ticket requests in the first 15 days. The article says scarce tickets, anxious fans, and fast-moving money create conditions that favor fraud.\u003c/p\u003e\n\n\u003ch2 id=\"ghost-stadium-and-cloned-fifa-login-sites\"\u003eGHOST STADIUM and Cloned FIFA Login Sites\u003c/h2\u003e\n\n\u003cp\u003eGroup-IB reported more than 4,300 fraudulent FIFA domains registered since August 2025. At the center of its findings is a Chinese-speaking, financially motivated group it calls GHOST STADIUM, which runs one phishing kit across more than 300 cloned FIFA sites.\u003c/p\u003e\n\n\u003cp\u003eThe fake pages are described as near-perfect copies of fifa.com. They mimic FIFA’s real single sign-on login, operated by PingIdentity, and copy the genuine client ID from the live site. The pages also load images directly from FIFA’s servers, which makes them look authentic and helps them avoid tools that flag copied images.\u003c/p\u003e\n\n\u003cp\u003eThe key account takeover mechanism described in the article is password reset phishing. The fake login page asks victims to reset their passwords after they enter their details. Once victims do that, attackers can lock them out of their FIFA accounts and resell any tickets tied to those accounts.\u003c/p\u003e\n\n\u003ch2 id=\"traffic-sources-and-payment-methods\"\u003eTraffic Sources and Payment Methods\u003c/h2\u003e\n\n\u003cp\u003eGroup-IB said most traffic to the GHOST STADIUM cluster comes from Facebook ads. The same tracking codes were reused across the cluster, and additional links appeared on Telegram, WhatsApp, and in search results.\u003c/p\u003e\n\n\u003cp\u003eThe fake sites take payment in several ways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect card entry.\u003c/li\u003e\n\u003cli\u003eOutside payment gateways.\u003c/li\u003e\n\u003cli\u003eMoney-transfer apps such as Chime and Nequi.\u003c/li\u003e\n\u003cli\u003eMexico-only payment processors.\u003c/li\u003e\n\u003cli\u003eA crypto option that converts a card payment into cryptocurrency.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies cryptocurrency payment as a strong warning sign because FIFA’s official ticketing never accepts crypto. Group-IB estimated that losses from premium and hospitality ticket fraud alone could range from \u003cspan class=\"math inline\"\u003e\\(71 million to \\)\u003c/span\u003e474 million, while noting those figures are estimates based on visible infrastructure rather than confirmed losses.\u003c/p\u003e\n\n\u003ch2 id=\"wider-fifa-themed-domain-and-social-media-fraud\"\u003eWider FIFA-Themed Domain and Social Media Fraud\u003c/h2\u003e\n\n\u003cp\u003eThe activity is not limited to GHOST STADIUM. FortiGuard Labs counted more than 13,000 World Cup-themed domains registered between January and May, about 8.8% of which were malicious or suspicious. The FBI advisory listed dozens of fake FIFA domains, including misspelled lookalikes and phony FIFA jobs pages, and warned that more were expected.\u003c/p\u003e\n\n\u003cp\u003eOther researchers mapped thousands of additional lookalike sites and more than a thousand fake social accounts. Group-IB also found counterfeit merchandise shops, bogus streaming sites, and fake betting sites that collect passport scans and selfies for identity theft.\u003c/p\u003e\n\n\u003cp\u003eBitdefender separately tracked FIFA lottery emails promising payouts of up to $2 million. The article also notes that a phishing-as-a-service market is selling ready-made scam kits and ticket-buying bots, making takedowns of individual operators less effective.\u003c/p\u003e\n\n\u003ch2 id=\"streaming-apps-and-android-banking-trojans\"\u003eStreaming Apps and Android Banking Trojans\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights malicious unofficial streaming apps as a major risk for fans searching for free match streams. ThreatFabric observed a spike in malicious unofficial streaming apps around the recent Champions League final, many pretending to be the popular RojaDirecta, and expects similar activity at the World Cup on a larger scale.\u003c/p\u003e\n\n\u003cp\u003eKaspersky tied those same apps to Android banking trojans built to steal from banking and crypto apps. The named malware families are Massiv and Perseus. These apps are not on Google Play, so installing them requires users to click past warnings that would normally block them.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, the malware can abuse Android accessibility tools. The article says it can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePlace fake bank login screens over real apps.\u003c/li\u003e\n\u003cli\u003eRecord what the user types.\u003c/li\u003e\n\u003cli\u003eIntercept one-time codes from text messages and login apps.\u003c/li\u003e\n\u003cli\u003eRemotely control the screen.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ePerseus is described as being built on leaked code from an older Trojan called Cerberus. It can also read note-taking apps for saved passwords and crypto recovery phrases. ThreatFabric’s simplest red flag is a streaming app asking for accessibility access, because such an app has no honest reason to need it.\u003c/p\u003e\n\n\u003ch2 id=\"social-scams-and-stolen-credentials\"\u003eSocial Scams and Stolen Credentials\u003c/h2\u003e\n\n\u003cp\u003eBitdefender found more than 55 football-themed ad campaigns on Facebook and Instagram. These campaigns promoted counterfeit kits, fake Panini stickers, and phishing pages. Two merchandise operations were traced back to Chinese operators through ad-tracking tags.\u003c/p\u003e\n\n\u003cp\u003eFortinet counted more than 1,700 spoofed FIFA accounts, nearly 90% of them on Facebook and Instagram. It also found a scheme using fake FIFA job ads and calendar invites to send applicants to a lookalike Google login page.\u003c/p\u003e\n\n\u003cp\u003eThe article says stolen FIFA logins are already circulating. Fortinet found hundreds of thousands of user logins and more than 4,600 FIFA web addresses in data collected by credential-stealing malware including Vidar, LummaC2, and RedLine.\u003c/p\u003e\n\n\u003ch2 id=\"host-city-wi-fi-risks\"\u003eHost-City Wi-Fi Risks\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses public Wi-Fi exposure in host cities. A Kaspersky survey drove around Mexico City, Monterrey, and Guadalajara and found that 10% to 12% of networks were open and password-free. It also found WPS pairing still enabled across nearly half of networks.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, both open networks and WPS exposure create opportunities for rogue “evil twin” hotspots. These hotspots can copy a real network and quietly read its traffic.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-precautions-for-fans\"\u003eRecommended Precautions for Fans\u003c/h2\u003e\n\n\u003cp\u003eThe article gives several direct recommendations for fans:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBuy tickets only through fifa.com.\u003c/li\u003e\n\u003cli\u003eType the address manually instead of trusting an ad or search result.\u003c/li\u003e\n\u003cli\u003eEnable multi-factor login.\u003c/li\u003e\n\u003cli\u003eTreat any seller requesting cryptocurrency as a scam, because FIFA’s ticketing does not accept crypto.\u003c/li\u003e\n\u003cli\u003eAvoid sideloaded streaming apps, especially those requesting Android accessibility access.\u003c/li\u003e\n\u003cli\u003eUse mobile data where possible on open Wi-Fi in host cities.\u003c/li\u003e\n\u003cli\u003eAvoid logging into bank or email accounts on open Wi-Fi.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendations-for-security-teams\"\u003eRecommendations for Security Teams\u003c/h2\u003e\n\n\u003cp\u003eFor security teams, the article describes a straightforward monitoring and fraud-preparation task. Teams should watch for new FIFA-themed domains and lookalike login pages. They should also flag staff or customer logins that appear in Vidar, LummaC2, or RedLine stealer logs.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends preparing fraud teams for ticket and chargeback spikes through mid-July. This aligns with the tournament window described in the article, from June 11 to July 19, when searches for tickets, streams, and travel are expected to peak.\u003c/p\u003e\n\n\u003ch2 id=\"responses-and-remaining-risk\"\u003eResponses and Remaining Risk\u003c/h2\u003e\n\n\u003cp\u003eMeta said it is responding by showing warning pop-ups when people search Facebook for FIFA tickets. It also said it worked with Visa to take down a Facebook network linked to fake World Cup sites pushing bogus gambling. The FBI is asking scam victims to report incidents through IC3.\u003c/p\u003e\n\n\u003cp\u003eThe article ends by emphasizing that the fraud wave may not have fully activated yet. Group-IB counted roughly 3,800 fraudulent FIFA domains that were parked and unused, ready to be switched on. With ready-made scam kits and bots already for sale, the article identifies June 11 to July 19 as the likely peak period for ticket, streaming, and travel-related scams.\u003c/p\u003e\n","keyPoints":["Researchers and the FBI warn that FIFA World Cup 2026 fans are already being targeted by fake FIFA domains, phishing pages, fraudulent ticket offers, counterfeit merchandise shops, bogus streaming sites, and fake betting sites.","Group-IB tracked more than 4,300 fraudulent FIFA domains registered since August 2025 and linked more than 300 cloned FIFA sites to a Chinese-speaking operation it calls GHOST STADIUM.","The GHOST STADIUM phishing pages closely copy FIFA’s real login flow and ask victims to reset their passwords, allowing attackers to lock users out of FIFA accounts and potentially resell tickets tied to them.","ThreatFabric and Kaspersky reported malicious unofficial Android streaming apps impersonating services such as RojaDirecta and delivering banking trojans including Massiv and Perseus, which can abuse Android accessibility features to steal credentials and intercept codes.","Fortinet found hundreds of thousands of user logins and more than 4,600 FIFA web addresses in data collected by credential-stealing malware such as Vidar, LummaC2, and RedLine."],"insights":["FIFA-themed phishing pages can look unusually convincing because some cloned sites load images directly from FIFA’s own servers and copy details from FIFA’s real PingIdentity single sign-on flow.","A request for cryptocurrency payment is a strong fraud indicator because the article states that FIFA’s official ticketing never accepts crypto.","For Android users seeking match streams, a streaming app requesting accessibility access is a clear red flag because the article says such apps have no legitimate reason to need it.","The scam wave may expand quickly during the tournament because Group-IB found roughly 3,800 fraudulent FIFA domains parked and unused, ready to be activated.","Security teams can act before account abuse occurs by checking whether staff or customer logins appear in Vidar, LummaC2, or RedLine stealer logs, as the article says FIFA-related credentials are already circulating there."],"referencedReports":[{"title":"Ghost Stadium: Football Fraud","url":"https://www.group-ib.com/blog/ghost-stadium-football-fraud/","publisher":"Group-IB","context":"The article cites Group-IB as providing the most detailed findings on fraudulent FIFA domains and the GHOST STADIUM phishing operation.","category":"","primary":false},{"title":"Cybercriminals Are Targeting the FIFA World Cup 2026","url":"https://www.fortinet.com/blog/threat-research/cybercriminals-are-targeting-the-fifa-world-cup-2026","publisher":"FortiGuard Labs","context":"The article cites FortiGuard Labs for counts of World Cup-themed domains, spoofed FIFA accounts, fake job ads, and stolen FIFA-related logins.","category":"","primary":false},{"title":"FBI IC3 Public Service Announcement on FIFA World Cup 2026 Scams","url":"https://www.ic3.gov/PSA/2026/PSA260527","publisher":"FBI Internet Crime Complaint Center","context":"The article references an FBI advisory warning about fake FIFA domains and asking victims to report scams to IC3.","category":"","primary":false},{"title":"Before the Whistle: CTM360 Reveals How Cybercriminals Are Targeting the FIFA World Cup 2026","url":"https://thehackernews.com/expert-insights/2026/05/before-whistle-ctm360-reveals-how.html","publisher":"CTM360","context":"The article refers to other researchers mapping thousands of lookalike FIFA sites and more than a thousand fake social accounts.","category":"","primary":false},{"title":"Football Fever Fuels Scam Campaigns Across Email and Social Media","url":"https://www.bitdefender.com/en-us/blog/labs/football-fever-fuels-scam-campaigns-across-email-and-social-media","publisher":"Bitdefender","context":"The article cites Bitdefender research on FIFA lottery emails and football-themed Facebook and Instagram scam campaigns.","category":"","primary":false},{"title":"Own Goal: Piracy as an Attack Vector to Target Football Fans","url":"https://www.threatfabric.com/blogs/own-goal-piracy-as-an-attack-vector-to-target-football-fans","publisher":"ThreatFabric","context":"The article cites ThreatFabric research on malicious unofficial streaming apps tied to football events and expected World Cup targeting.","category":"","primary":false},{"title":"Fake IPTV Apps Spread Android Malware","url":"https://www.kaspersky.com/blog/fake-iptv-apps-spread-android-malware/55872/","publisher":"Kaspersky","context":"The article cites Kaspersky analysis linking fake streaming apps to Android banking trojans including Massiv and Perseus.","category":"","primary":false},{"title":"Wardriving Assessment in Mexico: FIFA World Cup 2026","url":"https://securelist.com/wardriving-assessment-in-mexico-
