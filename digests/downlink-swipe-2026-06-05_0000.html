<script>
window.__DL_ARTICLES = [{"n":2,"title":"Cisco warns of unpatched SD-WAN zero-day exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-cisco-sd-wan-flaw-exploited-in-zero-day-attacks-to-gain-root/","time":"06:24","priority":"MUST READ","score":95,"tldr":"Cisco warned that an unpatched Catalyst SD-WAN Manager zero-day, CVE-2026-20245, is being actively exploited to let low-privileged local attackers with netadmin access escalate to root via crafted file uploads. No patch is available yet, so Cisco urges customers to update for related fixed SD-WAN flaws and check logs for indicators of compromise.","briefOverview":"\u003cp\u003eCisco warned of a high-severity, unpatched zero-day in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, that is being actively exploited in attacks. The flaw enables root privilege escalation and affects all deployment types, including On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco said security patches for this vulnerability are not yet available.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability stems from insufficient validation of user-supplied input and can allow attackers to execute arbitrary commands as root by uploading a crafted file. Cisco said exploitation requires netadmin privileges, obtained through valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco also observed limited cases where exploitation resulted in a configuration change pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco PSIRT became aware of exploitation in June after Mandiant reported the flaw. Cisco shared indicators of compromise and advised administrators to check the SD-WAN /var/log/scripts.log file for tenant configuration upload activity to vSmart controllers. Customers seeking help determining whether a Cisco Catalyst SD-WAN Manager was compromised can open a case with Cisco TAC after generating an admin-tech file.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco warned that CVE-2026-20245, a high-severity zero-day in Cisco Catalyst SD-WAN Manager, is being actively exploited in attacks. The flaw is unpatched and enables root privilege escalation. It affects all deployment types, including On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP).\u003c/p\u003e\n\n\u003cp\u003eCisco said the issue is caused by insufficient validation of user-supplied input. An attacker can exploit the vulnerability by uploading a crafted file to the affected system, which can allow command injection and privilege escalation to the root user. Cisco stated that exploitation requires netadmin privileges on the affected system.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, an attacker must have valid credentials or exploit CVE-2026-20182 or CVE-2026-20127 to meet the access requirements for CVE-2026-20245. Cisco said it is not aware of successful exploitation by other methods. The company also observed limited cases in which exploitation of the bug resulted in a configuration change pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco PSIRT became aware of exploitation in June after Google Cloud cybersecurity subsidiary Mandiant reported the flaw. Cisco did not share details from Mandiant, but it provided indicators of compromise for administrators. The article says administrators should check the SD-WAN /var/log/scripts.log file for attempts to upload tenant configuration data to vSmart controllers to escalate privileges through legitimate commands.\u003c/p\u003e\n\n\u003cp\u003eCisco has not yet released patches for CVE-2026-20245. It advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14. Cisco also said customers can open a case with Cisco TAC for help determining whether a Cisco Catalyst SD-WAN Manager has been compromised, and advised generating an admin-tech file first.\u003c/p\u003e\n\n\u003cp\u003eThe article places this zero-day in the context of several recently exploited Cisco Catalyst SD-WAN vulnerabilities. Cisco previously flagged CVE-2026-20182, CVE-2026-20133, CVE-2026-20128, CVE-2026-20122, and CVE-2026-20127 as exploited in the wild. It also notes that CISA has tagged 90 Cisco vulnerabilities as abused in the wild over the last several years, including four in Cisco Catalyst SD-WAN Manager.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco warned of an actively exploited, high-severity zero-day vulnerability in Cisco Catalyst SD-WAN Manager. The flaw is tracked as CVE-2026-20245 and is currently unpatched. Cisco said the vulnerability enables root privilege escalation on affected systems.\u003c/p\u003e\n\n\u003cp\u003eCisco Catalyst SD-WAN Manager, formerly known as SD-WAN vManage, is network management software used by administrators to monitor and manage up to 6,000 Catalyst SD-WAN devices from a single dashboard. The article states that the vulnerability impacts all deployment types.\u003c/p\u003e\n\n\u003cp\u003eAffected deployment types include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-Prem Deployment\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud (Cisco Managed)\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government (FedRAMP)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCisco said CVE-2026-20245 stems from insufficient validation of user-supplied input. The vulnerability can allow local attackers with low privileges to execute arbitrary commands as root.\u003c/p\u003e\n\n\u003cp\u003eCisco explained that an attacker could exploit the vulnerability by uploading a crafted file to the affected system. A successful exploit could allow the attacker to perform command injection attacks and elevate privileges to the root user.\u003c/p\u003e\n\n\u003cp\u003eHowever, Cisco stated that exploitation requires netadmin privileges on the affected system. According to Cisco, this would require valid credentials or exploitation of either CVE-2026-20182 or CVE-2026-20127. Cisco said it is not aware of successful exploitation by other methods.\u003c/p\u003e\n\n\u003ch2 id=\"observed-exploitation-and-impact\"\u003eObserved Exploitation and Impact\u003c/h2\u003e\n\n\u003cp\u003eCisco said the vulnerability is actively exploited in attacks. Cisco also stated that it observed limited cases where exploitation of this bug resulted in a configuration change pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco PSIRT became aware of CVE-2026-20245 exploitation in June after Google Cloud cybersecurity subsidiary Mandiant reported the flaw. The article says Mandiant reported the flaw but did not share any details.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eCisco shared indicators of compromise for administrators to review. The article says administrators should check the Cisco SD-WAN \u003ccode\u003e/var/log/scripts.log\u003c/code\u003e file for attempts to upload tenant configuration data to vSmart controllers.\u003c/p\u003e\n\n\u003cp\u003eCisco described this activity as a way to escalate privileges through legitimate commands. The article included the following example log entry:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eApr 15 09:44:57 vmanage vScript: Tenant list upload per vsmart serial number: /usr/bin/vconfd_script_upload_tenant_list.sh -cli path /home/admin/malicious.csv vpn 0\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eCisco also said customers can open a case with Cisco TAC for help determining whether a Cisco Catalyst SD-WAN Manager has been compromised. Cisco advised administrators to first generate an admin-tech file to assist with the review.\u003c/p\u003e\n\n\u003ch2 id=\"patch-status-and-cisco-guidance\"\u003ePatch Status and Cisco Guidance\u003c/h2\u003e\n\n\u003cp\u003eCisco has not yet released patches for CVE-2026-20245. Despite the lack of patches for this specific zero-day, Cisco advised customers to upgrade to the software fixed for CVE-2026-20182 on May 14.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that CVE-2026-20182 is a maximum severity Catalyst SD-WAN Controller authentication bypass flaw. Cisco tagged that flaw last month as actively exploited as a zero-day to gain administrative privileges on unpatched devices.\u003c/p\u003e\n\n\u003ch2 id=\"related-cisco-sd-wan-vulnerabilities\"\u003eRelated Cisco SD-WAN Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-20245 among several recently exploited Cisco Catalyst SD-WAN vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eIt states that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn February, Cisco patched CVE-2026-20133, a Catalyst SD-WAN Manager information disclosure flaw.\u003c/li\u003e\n\u003cli\u003eCISA flagged CVE-2026-20133 as actively exploited in late April.\u003c/li\u003e\n\u003cli\u003eTwo weeks later, Cisco warned that CVE-2026-20128 and CVE-2026-20122 were being abused in the wild.\u003c/li\u003e\n\u003cli\u003eIn March, Cisco addressed and flagged CVE-2026-20127, a critical authentication-bypass vulnerability exploited in zero-day attacks since at least 2023.\u003c/li\u003e\n\u003cli\u003eLast month, Cisco tagged CVE-2026-20182 as actively exploited as a zero-day.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says that over the last several years, CISA has tagged 90 Cisco vulnerabilities as abused in the wild. Four of those were in Cisco Catalyst SD-WAN Manager, and six others were exploited by ransomware operations.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-20245 is an actively exploited, unpatched Cisco Catalyst SD-WAN Manager zero-day that can enable root privilege escalation through crafted file upload and command injection. Cisco has provided indicators of compromise and response guidance, but patches for the vulnerability are not yet available.\u003c/p\u003e\n","keyPoints":["Cisco warned that CVE-2026-20245 is a high-severity, unpatched zero-day in Cisco Catalyst SD-WAN Manager that is being actively exploited in attacks to enable root privilege escalation.","The vulnerability affects all Cisco Catalyst SD-WAN Manager deployment types, including On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP).","Cisco said the flaw stems from insufficient validation of user-supplied input and can allow local attackers with low privileges and netadmin privileges to upload a crafted file and execute arbitrary commands as root.","Cisco PSIRT became aware of CVE-2026-20245 exploitation in June after Mandiant reported the flaw, and Cisco shared indicators of compromise involving suspicious entries in the SD-WAN /var/log/scripts.log file.","Cisco has not yet released patches for CVE-2026-20245, but it advised customers to upgrade to software fixed for CVE-2026-20182 on May 14."],"insights":["Exploitation of CVE-2026-20245 requires netadmin privileges, and Cisco specifically tied that access requirement to valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.","Cisco observed limited cases where exploitation resulted in a configuration change being pushed to edge devices, making downstream device configuration review relevant in addition to checking the SD-WAN Manager itself.","Cisco advised customers to inspect the /var/log/scripts.log file for tenant configuration upload activity to vSmart controllers, providing a concrete log source and behavior to prioritize during compromise assessment.","Although no patch is available for CVE-2026-20245, Cisco still recommended upgrading to the software fixed for CVE-2026-20182, indicating that mitigating related access paths is part of the current response.","Cisco Catalyst SD-WAN Manager has had multiple flaws reported as actively exploited in 2026, including CVE-2026-20133, CVE-2026-20128, CVE-2026-20122, CVE-2026-20127, CVE-2026-20182, and CVE-2026-20245."],"referencedReports":[{"title":"Cisco Catalyst SD-WAN Manager Privilege Escalation Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-privesc-4uxFrdzx","publisher":"Cisco","context":"The article cites Cisco's advisory explaining that CVE-2026-20245 can be exploited through a crafted file upload to execute commands and escalate privileges to root.","category":"","primary":false}],"body":"\u003cp\u003eCisco warned of a high-severity, unpatched zero-day in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, that is being actively exploited in attacks. The flaw enables root privilege escalation and affects all deployment types, including On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco said security patches for this vulnerability are not yet available.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability stems from insufficient validation of user-supplied input and can allow attackers to execute arbitrary commands as root by uploading a crafted file. Cisco said exploitation requires netadmin privileges, obtained through valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco also observed limited cases where exploitation resulted in a configuration change pushed to edge devices.\u003c/p\u003e\n\n\u003cp\u003eCisco PSIRT became aware of exploitation in June after Mandiant reported the flaw. Cisco shared indicators of compromise and advised administrators to check the SD-WAN /var/log/scripts.log file for tenant configuration upload activity to vSmart controllers. Customers seeking help determining whether a Cisco Catalyst SD-WAN Manager was compromised can open a case with Cisco TAC after generating an admin-tech file.\u003c/p\u003e\n"},{"n":5,"title":"CISA: Hackers now exploit SolarWinds Serv-U flaw to crash servers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-hackers-now-exploit-solarwinds-serv-u-flaw-to-crash-servers/","time":"19:15","priority":"MUST READ","score":94,"tldr":"CISA says attackers are actively exploiting a newly patched SolarWinds Serv-U denial-of-service flaw, CVE-2026-28318, that can crash exposed servers with unauthenticated crafted POST requests. Organizations should install Serv-U 15.5.4 Hotfix 1 or apply SolarWinds’ mitigations immediately.","briefOverview":"\u003cp\u003eCISA warned that hackers are actively exploiting CVE-2026-28318, a recently patched high-severity SolarWinds Serv-U vulnerability, to crash servers. SolarWinds Serv-U is file transfer software for Windows and Linux that provides Managed File Transfer and FTP server capabilities. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and ordered Federal Civilian Executive Branch agencies to patch affected servers by June 19.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds fixed the issue in Serv-U 15.5.4 Hotfix 1 and described it as an uncontrolled resource consumption weakness. The company said Serv-U can be crashed without authentication using specially crafted POST requests with \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e. SolarWinds advised administrators who cannot immediately patch to limit access to known addresses and block POST requests containing \u003ccode\u003econtent-encoding\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that thousands of Serv-U servers are exposed online, with Shodan tracking more than 12,000 and Shadowserver tracking just over 3,100. It also highlights that Serv-U vulnerabilities have been targeted in past campaigns by cybercrime and state-backed groups, including Clop and DEV-0322 exploiting CVE-2021-35211. CISA urged all network defenders, not only federal agencies, to secure systems against ongoing CVE-2026-28318 attacks as soon as possible.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA warned that attackers are actively exploiting CVE-2026-28318, a high-severity SolarWinds Serv-U vulnerability, to crash servers. SolarWinds Serv-U is the company’s Windows and Linux file transfer software that supports Managed File Transfer and FTP server capabilities. It allows users to exchange files through HTTP/HTTPS, FTP, FTPS, and SFTP.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds released Serv-U 15.5.4 Hotfix 1 to address the vulnerability. The company said the issue stems from uncontrolled resource consumption and can be triggered by specially crafted POST requests using \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e. Remote attackers can exploit the flaw without privileges, without user interaction, and with low attack complexity.\u003c/p\u003e\n\n\u003cp\u003eFor administrators unable to immediately deploy the patch, SolarWinds recommended limiting access to known addresses and blocking any POST request containing \u003ccode\u003econtent-encoding\u003c/code\u003e. The company said the vulnerable Serv-U service does not require that functionality. These mitigations were presented as interim steps for organizations that cannot apply the hotfix right away.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-28318 to its Known Exploited Vulnerabilities Catalog days after SolarWinds addressed the vulnerability. Under Binding Operational Directive 22-01, Federal Civilian Executive Branch agencies must patch affected servers by June 19. CISA also urged all network defenders, including private-sector organizations, to apply vendor mitigations, follow BOD 22-01 cloud guidance where applicable, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003cp\u003eThe article says Shodan tracks more than 12,000 Serv-U servers exposed online, while Shadowserver tracks just over 3,100, but there is no information on how many have been patched. It also notes that Serv-U vulnerabilities have been targeted in recent years by cybercrime and state-backed groups. Examples include Clop ransomware gang exploitation of CVE-2021-35211, DEV-0322 Chinese hackers using the same flaw in zero-day attacks, and active exploitation of CVE-2024-28995 reported by GreyNoise and Rapid7 in June 2024.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA warned that hackers are actively exploiting CVE-2026-28318, a recently patched high-severity SolarWinds Serv-U vulnerability, to crash servers. The vulnerability affects SolarWinds Serv-U, the company’s Windows and Linux file transfer software. Serv-U provides Managed File Transfer and FTP server capabilities and supports file exchange through HTTP/HTTPS, FTP, FTPS, and SFTP.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds released Serv-U 15.5.4 Hotfix 1 to patch the flaw. The company described the issue as an uncontrolled resource consumption weakness. CISA later flagged the vulnerability as exploited in the wild and added it to the Known Exploited Vulnerabilities Catalog.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eSolarWinds said Serv-U is vulnerable to specially crafted POST requests that can crash the Serv-U service without authentication. The triggering condition involves requests using \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e. According to the article, remote attackers can exploit the flaw without privileges, with low attack complexity, and without user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the vulnerability as CVE-2026-28318. Its direct impact, as described in the article, is denial of service through crashing the Serv-U service. SolarWinds attributed the issue to uncontrolled resource consumption.\u003c/p\u003e\n\n\u003ch2 id=\"patch-and-mitigations\"\u003ePatch and Mitigations\u003c/h2\u003e\n\n\u003cp\u003eSolarWinds patched CVE-2026-28318 in Serv-U 15.5.4 Hotfix 1. The article says the hotfix was released on Thursday before CISA flagged exploitation in the wild. Organizations running affected Serv-U deployments are advised to apply the patch.\u003c/p\u003e\n\n\u003cp\u003eFor administrators who cannot immediately deploy the update, SolarWinds recommended interim mitigations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLimit access to known addresses.\u003c/li\u003e\n\u003cli\u003eBlock any POST request containing \u003ccode\u003econtent-encoding\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSolarWinds said the vulnerable Serv-U service does not require the \u003ccode\u003eContent-Encoding\u003c/code\u003e functionality, making that blocking recommendation a practical mitigation described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-response\"\u003eCISA Response\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2026-28318 to its Known Exploited Vulnerabilities Catalog after SolarWinds addressed the vulnerability. The agency ordered all Federal Civilian Executive Branch agencies to patch affected servers by June 19 under Binding Operational Directive 22-01. The article notes that BOD 22-01 applies only to U.S. government agencies.\u003c/p\u003e\n\n\u003cp\u003eCISA also urged all network defenders, including private-sector organizations, to secure their networks against ongoing CVE-2026-28318 attacks as soon as possible. CISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency advised organizations to apply vendor mitigations, follow applicable BOD 22-01 guidance for cloud services, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003ch2 id=\"internet-exposure\"\u003eInternet Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article cites two measurements of exposed Serv-U servers. Shodan tracks more than 12,000 Serv-U servers exposed online. Shadowserver tracks just over 3,100 exposed instances.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there is no information on how many exposed Serv-U servers have already been patched. This means the known internet exposure is significant, but the current patched-versus-unpatched status is not provided.\u003c/p\u003e\n\n\u003ch2 id=\"historical-targeting-of-serv-u\"\u003eHistorical Targeting of Serv-U\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that multiple cybercrime and state-backed hacking groups have targeted Serv-U vulnerabilities in recent years to steal sensitive corporate and customer data. It gives several examples of prior exploitation involving SolarWinds Serv-U.\u003c/p\u003e\n\n\u003cp\u003eIn 2021, the Clop ransomware gang exploited a Serv-U remote code execution vulnerability tracked as CVE-2021-35211 to breach corporate networks. DEV-0322 Chinese hackers also deployed CVE-2021-35211 exploits in zero-day attacks starting in July 2021. More recently, in June 2024, GreyNoise and Rapid7 identified a Serv-U path-traversal vulnerability, CVE-2024-28995, as actively exploited.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that over the past several years, CISA has tagged 11 vulnerabilities across various SolarWinds products as actively exploited in attacks. One of those vulnerabilities has also been abused by ransomware gangs.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact\"\u003eKey Impact\u003c/h2\u003e\n\n\u003cp\u003eThe immediate impact described in the article is that attackers can crash vulnerable SolarWinds Serv-U servers using unauthenticated crafted POST requests. CISA’s addition of CVE-2026-28318 to the Known Exploited Vulnerabilities Catalog confirms that exploitation has been observed in the wild. Federal Civilian Executive Branch agencies must patch by June 19, while CISA recommends that all other defenders act as soon as possible.\u003c/p\u003e\n","keyPoints":["CISA warned that attackers are actively exploiting CVE-2026-28318, a high-severity SolarWinds Serv-U denial-of-service vulnerability, to crash servers.","SolarWinds patched the flaw in Serv-U 15.5.4 Hotfix 1 and said the issue involves uncontrolled resource consumption triggered by specially crafted unauthenticated POST requests using Content-Encoding: deflate.","SolarWinds advised administrators who cannot immediately patch to limit access to known addresses and block POST requests containing \"content-encoding.\"","CISA added CVE-2026-28318 to its Known Exploited Vulnerabilities Catalog and ordered Federal Civilian Executive Branch agencies to patch affected servers by June 19.","Shodan tracks more than 12,000 SolarWinds Serv-U servers exposed online, while Shadowserver tracks just over 3,100, with no information on how many have been patched."],"insights":["A practical temporary mitigation exists because SolarWinds says the vulnerable Serv-U service does not require Content-Encoding functionality, allowing defenders to block POST requests containing \"content-encoding\" if they cannot patch immediately.","The exploitation window appears short, as CISA added CVE-2026-28318 to its Known Exploited Vulnerabilities Catalog only days after SolarWinds released Serv-U 15.5.4 Hotfix 1.","Internet exposure is substantial but uncertain, with Shodan and Shadowserver reporting very different counts of exposed Serv-U servers and no available data on how many have been patched.","Serv-U has a repeated history of being targeted by both cybercrime and state-backed groups, including prior exploitation by Clop and DEV-0322 of CVE-2021-35211."],"referencedReports":[{"title":"Serv-U 15.5.4 Hotfix 1 Release Notes","url":"https://documentation.solarwinds.com/en/success_center/servu/content/release_notes/servu_15-5-4-hotfix-1_release_notes.htm","publisher":"SolarWinds","context":"The article cites SolarWinds' release notes for Serv-U 15.5.4 Hotfix 1, which patched the denial-of-service vulnerability.","category":"","primary":false},{"title":"CVE-2026-28318","url":"https://www.solarwinds.com/trust-center/security-advisories/cve-2026-28318","publisher":"SolarWinds","context":"The article references SolarWinds' security advisory describing CVE-2026-28318 as an uncontrolled resource consumption flaw triggered by crafted POST requests.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/05/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert stating that CVE-2026-28318 has been added to the Known Exploited Vulnerabilities Catalog after observed exploitation in the wild.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-28318","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-28318","publisher":"CISA","context":"The article links to CISA's Known Exploited Vulnerabilities Catalog entry for CVE-2026-28318, which sets a federal remediation deadline.","category":"","primary":false}],"body":"\u003cp\u003eCISA warned that hackers are actively exploiting CVE-2026-28318, a recently patched high-severity SolarWinds Serv-U vulnerability, to crash servers. SolarWinds Serv-U is file transfer software for Windows and Linux that provides Managed File Transfer and FTP server capabilities. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and ordered Federal Civilian Executive Branch agencies to patch affected servers by June 19.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds fixed the issue in Serv-U 15.5.4 Hotfix 1 and described it as an uncontrolled resource consumption weakness. The company said Serv-U can be crashed without authentication using specially crafted POST requests with \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e. SolarWinds advised administrators who cannot immediately patch to limit access to known addresses and block POST requests containing \u003ccode\u003econtent-encoding\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that thousands of Serv-U servers are exposed online, with Shodan tracking more than 12,000 and Shadowserver tracking just over 3,100. It also highlights that Serv-U vulnerabilities have been targeted in past campaigns by cybercrime and state-backed groups, including Clop and DEV-0322 exploiting CVE-2021-35211. CISA urged all network defenders, not only federal agencies, to secure systems against ongoing CVE-2026-28318 attacks as soon as possible.\u003c/p\u003e\n"},{"n":11,"title":"IronWorm and New Miasma Worm Variant Hit npm in Supply Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ironworm-and-new-miasma-worm-variant.html","time":"18:05","priority":"MUST READ","score":94,"tldr":"Multiple npm supply chain attacks are spreading through poisoned legitimate packages, including the Rust-based IronWorm stealer and a new Miasma variant that harvest developer and CI/CD secrets, abuses GitHub/npm publishing flows, and self-propagates. Developers who installed affected packages should rotate credentials and harden npm install and package integrity controls immediately.","briefOverview":"\u003cp\u003eMultiple software supply chain attacks have hit the npm ecosystem, using malicious and poisoned versions of legitimate packages to distribute a Rust-based information stealer and self-spreading worms. JFrog named one of the malware families IronWorm and said it steals developer secrets, hides behind an eBPF kernel rootkit, and communicates over Tor. The attack is significant because the malware uses stolen credentials to propagate through npm and GitHub.\u003c/p\u003e\n\n\u003cp\u003eIronWorm activity was traced to a compromised npm account named asteroiddao, which published package versions containing a Rust ELF binary executed via a preinstall hook. The malware targets environment variables and files associated with AI services, cloud platforms, developer tools, vaults, npm, Kubernetes, Docker, and an Exodus cryptocurrency wallet. It can also alter GitHub Actions workflows to harvest secrets and, in CI environments, abuse npm Trusted Publishing to publish poisoned package versions.\u003c/p\u003e\n\n\u003cp\u003eA separate campaign described by Endor Labs and StepSecurity compromised 57 npm packages across more than 286 malicious versions to distribute a new Miasma worm variant. StepSecurity said this wave uses a technique called Phantom Gyp, abusing a small binding.gyp file to trigger code execution during npm install instead of relying on commonly monitored lifecycle scripts. Developers who installed affected versions are advised to rotate credentials, disable install scripts and native rebuilds by default, and pin packages with integrity hashes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes multiple npm supply chain attacks involving malicious or poisoned versions of legitimate packages. One campaign distributed IronWorm, a Rust-based information stealer identified by JFrog, while another distributed a new variant of the Miasma worm. Both campaigns are presented as self-propagating threats that target developer environments and CI/CD systems.\u003c/p\u003e\n\n\u003cp\u003eJFrog said IronWorm scrapes secrets from developer machines, hides behind an eBPF kernel rootkit, and communicates with its operator over Tor. The malware was published through a compromised npm account named asteroiddao and delivered as package versions containing a Rust ELF binary executed via a preinstall hook. It targets 86 environment variables and files related to OpenAI Codex, Anthropic, Claude, Google Gemini, Cursor, AWS, Docker, Kubernetes, npm, vault configurations, and Exodus cryptocurrency wallet files.\u003c/p\u003e\n\n\u003cp\u003eIronWorm also uses stolen credentials to propagate, drawing comparisons to the Shai-Hulud worm. JFrog said malicious commits were introduced across nine GitHub organizations under the author name “claude” and the email “claude@users.noreply.github.com.” The company said the malware stole credentials belonging to ocrybit and used them to push commits across accessible repositories, planting malware into additional packages.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes capabilities aimed at GitHub Actions and npm publishing infrastructure. It can replace existing GitHub Actions workflows with one that harvests secrets, writes them to a harmless-looking file, and uploads them as a build artifact. In CI environments, it abuses npm Trusted Publishing to obtain short-lived tokens and publish poisoned package versions containing the malware.\u003c/p\u003e\n\n\u003cp\u003eThe second campaign, analyzed by Endor Labs and StepSecurity, compromised 57 npm packages across more than 286 malicious versions to distribute a new Miasma variant. StepSecurity said the wave uses “Phantom Gyp,” abusing a 157-byte binding.gyp file to trigger code execution during npm install and bypass many install-script security checks. The data was exfiltrated to a now-inaccessible GitHub account named liuende501, which had staged 236 repositories.\u003c/p\u003e\n\n\u003cp\u003eThe Miasma variant downloads and installs the Bun JavaScript runtime and uses it to run a credential harvester targeting cloud platforms, developer tools, package registries, SSH keys, password managers, and AI assistants. Red Hat said the earlier Miasma incident likely stemmed from a compromised GitHub account used to push unauthorized commits to RedHatInsights repositories. OX Security later reported additional stages involving GitHub commit searches for “firedalazer,” which could retrieve another Shai-Hulud-like payload and create a continuing infection loop.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports on multiple software supply chain attacks affecting the npm ecosystem. Threat actors used malicious and poisoned versions of legitimate packages to distribute two major threats: a Rust-based information stealer named IronWorm and a new variant of the Miasma worm. The campaigns target developer machines, CI/CD environments, GitHub repositories, and npm publishing workflows.\u003c/p\u003e\n\n\u003cp\u003eThe attacks are significant because they combine credential theft with self-propagation. Stolen credentials are used to push malicious commits, publish poisoned package versions, and spread the infection to additional developers and projects. The article compares IronWorm’s propagation behavior to the Shai-Hulud worm and describes Miasma as a Shai-Hulud derivative with largely cosmetic changes.\u003c/p\u003e\n\n\u003ch2 id=\"ironworm-campaign\"\u003eIronWorm Campaign\u003c/h2\u003e\n\n\u003cp\u003eJFrog identified the Rust-based information stealer as IronWorm. According to JFrog, IronWorm “scrapes every secret it can find on a developer’s machine,” hides behind an eBPF kernel rootkit, and communicates with its operator over Tor. The stealer also uses stolen credentials as a propagation mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe malicious activity was traced to a compromised npm account named asteroiddao. That account published package versions containing a Rust ELF binary that is executed through a preinstall hook. By publishing itself to npm in trojanized packages, IronWorm becomes part of a self-replicating supply chain attack.\u003c/p\u003e\n\n\u003ch2 id=\"ironworm-targeting-and-capabilities\"\u003eIronWorm Targeting and Capabilities\u003c/h2\u003e\n\n\u003cp\u003eIronWorm targets 86 environment variables and various files that may contain credentials. The article specifically names targets associated with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOpenAI Codex\u003c/li\u003e\n\u003cli\u003eAnthropic\u003c/li\u003e\n\u003cli\u003eClaude\u003c/li\u003e\n\u003cli\u003eGoogle Gemini\u003c/li\u003e\n\u003cli\u003eCursor\u003c/li\u003e\n\u003cli\u003eAmazon Web Services\u003c/li\u003e\n\u003cli\u003eDocker\u003c/li\u003e\n\u003cli\u003eKubernetes\u003c/li\u003e\n\u003cli\u003enpm\u003c/li\u003e\n\u003cli\u003eVault configurations\u003c/li\u003e\n\u003cli\u003eExodus cryptocurrency wallet files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware contains logic for its wallet data-stealing component to skip the threat actor’s own wallet. The article notes that the referenced cryptocurrency wallet was empty at the time of writing and had no recorded transactions.\u003c/p\u003e\n\n\u003cp\u003eIronWorm also includes an eBPF payload that acts as a kernel-level rootkit. This payload is used to hide processes and thwart analysis. However, the article says that on systems where kernel lockdown is enabled, the process-hiding behavior fails and the hidden processes and sockets become visible again.\u003c/p\u003e\n\n\u003ch2 id=\"github-and-npm-propagation\"\u003eGitHub and npm Propagation\u003c/h2\u003e\n\n\u003cp\u003eJFrog described IronWorm as “a supply chain weapon built to find secrets, modify projects, and inject malicious code to self-propagate across GitHub.” The malicious commits spanned nine GitHub organizations and were introduced under the author name “claude” with the email address “claude@users.noreply.github.com.” The article states this was an attempt to mimic Anthropic’s AI chatbot.\u003c/p\u003e\n\n\u003cp\u003eJFrog connected the malicious npm activity to the asteroiddao npm account, the asteroid-dao GitHub organization, and a member named ocrybit. According to JFrog, the malware stole ocrybit’s credentials and used them to push commits across repositories the account could access. Those commits planted malware into other packages, which could then be published and infect additional developers.\u003c/p\u003e\n\n\u003cp\u003eIronWorm can also manipulate GitHub Actions workflows. The malware can replace existing workflows with one designed to harvest secrets, write them to a harmless-looking file, and upload them as a build artifact. This allows the malware to avoid relying on a traditional external command-and-control server for that exfiltration path.\u003c/p\u003e\n\n\u003cp\u003eIn CI environments, IronWorm abuses npm’s Trusted Publishing flow. It uses that flow to obtain short-lived tokens and push poisoned versions containing the malware to the npm registry.\u003c/p\u003e\n\n\u003ch2 id=\"new-miasma-variant\"\u003eNew Miasma Variant\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes a separate supply chain attack campaign analyzed by Endor Labs and StepSecurity. This campaign compromised 57 npm packages across more than 286 malicious versions to deliver a new Miasma worm variant. The article notes that Miasma had previously infected 32 packages across more than 90 versions under the @redhat-cloud-services npm namespace within 72 seconds earlier in the week.\u003c/p\u003e\n\n\u003cp\u003eSome affected packages listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eai-sdk-ollama\u003c/li\u003e\n\u003cli\u003eautotel\u003c/li\u003e\n\u003cli\u003eawaitly\u003c/li\u003e\n\u003cli\u003eeffect-analyzer\u003c/li\u003e\n\u003cli\u003eeslint-plugin-awaitly\u003c/li\u003e\n\u003cli\u003eexecutable-stories-cypress\u003c/li\u003e\n\u003cli\u003ehttp-uploader-dev\u003c/li\u003e\n\u003cli\u003emountly\u003c/li\u003e\n\u003cli\u003enode-env-resolver\u003c/li\u003e\n\u003cli\u003enode-env-resolver-aws\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe stolen data from this wave was exfiltrated to a now-inaccessible GitHub account named liuende501. The article says 236 repositories were staged in that account. It is not known whether GitHub removed the account or the threat actor deleted it.\u003c/p\u003e\n\n\u003ch2 id=\"phantom-gyp-technique\"\u003ePhantom Gyp Technique\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity researcher Sai Likhith said this Miasma wave used a technique called “Phantom Gyp.” Instead of using preinstall or postinstall lifecycle scripts that security tools commonly monitor, the attacker abused a 157-byte binding.gyp file to trigger code execution during npm install. StepSecurity said this bypassed most install-script security checks.\u003c/p\u003e\n\n\u003cp\u003eLike the earlier Miasma activity, the attack chain downloads and installs the Bun JavaScript runtime. Bun is then used to load a credential harvester. The harvester targets secrets from AWS, Google Cloud, Microsoft Azure, HashiCorp Vault, Docker, Kubernetes, GitHub Actions, npm, RubyGems, PyPI, SSH, password managers, and AI assistants.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights targeting of AI coding assistant configurations as a novel and concerning capability of this variant. According to the cited company, the malware injects persistent backdoor files into project repositories that execute whenever a developer opens the project in an AI-assisted IDE.\u003c/p\u003e\n\n\u003ch2 id=\"red-hat-and-microsoft-findings-on-miasma\"\u003eRed Hat and Microsoft Findings on Miasma\u003c/h2\u003e\n\n\u003cp\u003eRed Hat said the likely root cause of the Miasma supply chain incident was a compromised GitHub account. That account was used to push unauthorized commits to repositories in the RedHatInsights GitHub organization.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the payload worked across Linux, macOS, and Windows by dynamically downloading the correct Bun runtime for each platform. Microsoft also said Linux CI/CD runners appeared to be the primary target. On developer systems, the malware stole SSH keys, CLI credentials, browser data, and wallet data.\u003c/p\u003e\n\n\u003cp\u003eIn CI/CD environments, Microsoft said the malware scraped GitHub Actions runner memory for secrets, escalated privileges using passwordless sudo, and republished poisoned packages. These republished packages used forged Supply-chain Levels for Software Artifacts provenance to continue downstream propagation.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-shai-hulud-and-teampcp\"\u003eRelationship to Shai-Hulud and TeamPCP\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Miasma payload is assessed to be a derivative of the Shai-Hulud worm used by TeamPCP in recent campaigns. The changes are described as largely cosmetic while keeping the underlying functionality similar. Despite overlaps in tradecraft, attribution for the latest attacks remains unclear because TeamPCP publicly released the Shai-Hulud code.\u003c/p\u003e\n\n\u003ch2 id=\"additional-miasma-stages-reported-by-ox-security\"\u003eAdditional Miasma Stages Reported by OX Security\u003c/h2\u003e\n\n\u003cp\u003eOX Security reported additional stages in the Miasma attack chain. These included searches for GitHub commits containing the string “firedalazer,” replacing the previously flagged “FIRESCALE” dead drop. The searches were used to retrieve another payload, a JavaScript file named index.js containing an alternative version of the Shai-Hulud worm.\u003c/p\u003e\n\n\u003cp\u003eThe article says this effectively transforms the infection into a perpetual loop. Stolen data is exfiltrated to public GitHub repositories with descriptions such as “Miasma: The Spreading Blight” or “Miasma - The Spreading Blight.” The article notes that there were 82 such repositories on the user accounts 0tabek16 and windy629.\u003c/p\u003e\n\n\u003cp\u003eOX Security researchers said the threat actor can dynamically change the “firedalazer” commits in GitHub, allowing new malware versions to be introduced. They described GitHub as becoming more than a dead drop and instead acting as an adaptive command-and-control mechanism. The article notes that this is concerning because GitHub is a trusted, widely whitelisted platform and many security tools are not configured to treat GitHub traffic as suspicious.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-mentioned\"\u003eRecommended Actions Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article states that developers who installed affected versions are advised to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRotate credentials.\u003c/li\u003e\n\u003cli\u003eTurn off install scripts and native rebuilds by default.\u003c/li\u003e\n\u003cli\u003eEnsure packages are pinned with integrity hashes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations are presented specifically for developers affected by the npm package campaigns described in the article.\u003c/p\u003e\n","keyPoints":["Multiple npm supply chain attacks used malicious and poisoned versions of over 50 legitimate packages to distribute a Rust-based information stealer called IronWorm and a self-spreading worm.","JFrog said IronWorm steals developer secrets, hides behind an eBPF kernel rootkit, communicates over Tor, and uses stolen credentials to propagate by publishing trojanized npm packages.","IronWorm activity was traced to a compromised npm account named asteroiddao, which published package versions containing a Rust ELF binary executed through a preinstall hook.","Endor Labs and StepSecurity reported a separate campaign compromising 57 npm packages across more than 286 malicious versions to distribute a new Miasma worm variant.","StepSecurity said the new Miasma variant abuses a small binding.gyp file in a technique called Phantom Gyp to trigger code execution during npm install and bypass common install-script security checks."],"insights":["The Miasma variant’s use of a 157-byte binding.gyp file, described as Phantom Gyp, means defenses focused mainly on preinstall or postinstall lifecycle scripts may miss npm install-time code execution.","IronWorm can replace GitHub Actions workflows to collect secrets and upload them as build artifacts, allowing exfiltration without relying on a traditional external command-and-control server.","In CI environments, IronWorm abuses npm Trusted Publishing to obtain short-lived tokens and publish poisoned package versions to the npm registry.","OX Security reported that Miasma uses GitHub commit searches for the string firedalazer to retrieve additional payloads, turning GitHub into an adaptive command-and-control mechanism rather than a static dead drop.","Developers affected by these campaigns are specifically advised to rotate credentials, disable install scripts and native rebuilds by default, and pin packages with integrity hashes."],"referencedReports":[{"title":"IronWorm: Shai-Hulud’s Rustier Cousin","url":"https://research.jfrog.com/post/iron-worm-shai-hulud-rustier-cousin/","publisher":"JFrog","context":"The article cites JFrog’s research as the source for details on IronWorm’s secret theft, eBPF rootkit, Tor communications, and self-propagation behavior.","category":"","primary":false},{"title":"Malicious Payload in ai-sdk-ollama npm Package","url":"https://www.endorlabs.com/learn/malicious-payload-in-ai-sdk-ollama-npm-package","publisher":"Endor Labs","context":"The article references Endor Labs as one of the firms that analyzed a separate npm supply chain campaign distributing a new Miasma worm variant.","category":"","primary":false},{"title":"Binding.gyp npm Supply Chain Attack Spreads Like Worm","url":"https://www.stepsecurity.io/blog/binding-gyp-npm-supply-chain-attack-spreads-like-worm","publisher":"StepSecurity","context":"The article cites StepSecurity’s analysis of the Miasma variant’s Phantom Gyp technique using binding.gyp to trigger code execution during npm install.","category":"","primary":false},{"title":"RHSB-2026-006","url":"https://access.redhat.com/security/vulnerabilities/RHSB-2026-006","publisher":"Red Hat","context":"The article references Red Hat’s security update identifying a likely compromised GitHub account as the root cause of the Miasma supply chain incident.","category":"","primary":false},{"title":"Preinstall Persistence Inside Red Hat npm Miasma Credential-Stealing Campaign","url":"https://www.microsoft.com/en-us/security/blog/2026/06/02/preinstall-persistence-inside-red-hat-npm-miasma-credential-stealing-campaign/","publisher":"Microsoft","context":"The article quotes Microsoft’s analysis of Miasma’s cross-platform payload behavior and its targeting of Linux CI/CD runners and developer systems.","category":"","primary":false},{"title":"Six Stages Deep and an Endless Loop: Shai-Hulud Is Getting Sophisticated","url":"https://www.ox.security/blog/six-stages-deep-and-an-endless-loop-shai-hulud-is-getting-sophisticated/","publisher":"OX Security","context":"The article references OX Security’s findings on additional Miasma attack stages, GitHub commit searches for firedalazer, and adaptive command-and-control behavior.","category":"","primary":false}],"body":"\u003cp\u003eMultiple software supply chain attacks have hit the npm ecosystem, using malicious and poisoned versions of legitimate packages to distribute a Rust-based information stealer and self-spreading worms. JFrog named one of the malware families IronWorm and said it steals developer secrets, hides behind an eBPF kernel rootkit, and communicates over Tor. The attack is significant because the malware uses stolen credentials to propagate through npm and GitHub.\u003c/p\u003e\n\n\u003cp\u003eIronWorm activity was traced to a compromised npm account named asteroiddao, which published package versions containing a Rust ELF binary executed via a preinstall hook. The malware targets environment variables and files associated with AI services, cloud platforms, developer tools, vaults, npm, Kubernetes, Docker, and an Exodus cryptocurrency wallet. It can also alter GitHub Actions workflows to harvest secrets and, in CI environments, abuse npm Trusted Publishing to publish poisoned package versions.\u003c/p\u003e\n\n\u003cp\u003eA separate campaign described by Endor Labs and StepSecurity compromised 57 npm packages across more than 286 malicious versions to distribute a new Miasma worm variant. StepSecurity said this wave uses a technique called Phantom Gyp, abusing a small binding.gyp file to trigger code execution during npm install instead of relying on commonly monitored lifecycle scripts. Developers who installed affected versions are advised to rotate credentials, disable install scripts and native rebuilds by default, and pin packages with integrity hashes.\u003c/p\u003e\n"},{"n":3,"title":"Chinese APT deploys new malware to keep access to hacked networks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/chinese-apt-deploys-new-malware-to-keep-access-to-hacked-networks/","time":"18:09","priority":"MUST READ","score":92,"tldr":"Chinese espionage group UNC5221/VerdantBamboo maintained long-term access to a victim’s Microsoft 365 and internal network using Brickstorm plus new backdoors Plenet and AgentPSD, with evidence of persistence for at least 18 months. The incident also involved compromise of the victim’s MSP, suggesting the attackers used trusted provider access to pivot back into the environment after remediation.","briefOverview":"\u003cp\u003eChinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and previously undocumented malware named Plenet and AgentPSD. Volexity’s investigation found the threat actor had been in the victim network for at least 18 months before detection. The victim organization’s managed services provider was also compromised.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used Brickstorm’s proxying features and stolen credentials to access the victim’s Microsoft 365 environment through the organization’s web SSL VPN. Volexity assessed with high confidence that this was done to blend in with legitimate network traffic and evade Conditional Access policies. After remediation, VerdantBamboo breached the organization again by enabling and configuring SSL VPN access on the victim’s firewall.\u003c/p\u003e\n\n\u003cp\u003eThe campaign involved malware placed on systems including an Egnyte Storage Sync appliance, a Synology NAS device, a pfSense firewall, and a retired Linux GroupWise email archive server. Plenet is described as a cross-platform .NET-based backdoor with shell, command execution, file manipulation, and C2 switching capabilities. AgentPSD is described as a Python-based reverse shell utility used as a fallback persistence mechanism.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA Chinese espionage group tracked as UNC5221 and VerdantBamboo has been accessing Microsoft 365 environments using Brickstorm and two previously undocumented malware tools named Plenet and AgentPSD. The activity was investigated by Volexity, which found that the threat actor had access to the victim network for at least 18 months before detection. The investigation also found that the victim organization’s managed services provider had been compromised.\u003c/p\u003e\n\n\u003cp\u003eUNC5221 has been involved in attacks exploiting zero-day vulnerabilities in edge devices since at least 2023. The article states that Brickstorm was used undetected in the environments of various targets in the United States for more than a year, until breaches were discovered around March 2025. Earlier reporting by Google and warnings from CISA connected Brickstorm activity to targets including VMware vSphere servers and Dell RecoverPoint for Virtual Machines.\u003c/p\u003e\n\n\u003cp\u003eIn the incident Volexity handled, VerdantBamboo compromised an Egnyte Storage Sync system and accessed it periodically through the victim’s web SSL VPN. Using Brickstorm proxying features and stolen credentials, the attackers accessed the organization’s Microsoft 365 environment. Volexity assessed with high confidence that this was done to blend in with legitimate traffic and evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eAfter Volexity completed remediation efforts, VerdantBamboo breached the organization again. In the second intrusion, the attackers used stolen credentials to enable and configure SSL VPN access on the victim’s firewall, then connected to internal systems and deployed additional custom malware to a Synology NAS device. Volexity’s investigation at the customer’s MSP found a BSD variant of Brickstorm on a pfSense firewall that had also been compromised at least 18 months earlier.\u003c/p\u003e\n\n\u003cp\u003eThe attackers deployed Plenet, also tracked by Google as Grimbolt, to a Synology NAS appliance after re-establishing access. Plenet is a cross-platform .NET-based backdoor that provides interactive shell access, remote command execution, file manipulation, and command-and-control server switching. AgentPSD is a Python-based reverse shell utility that Volexity believes was used as a fallback persistence mechanism, though it was not used because Brickstorm was still running.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eChinese espionage group UNC5221, also tracked as VerdantBamboo, has been accessing Microsoft 365 environments using the Brickstorm backdoor and previously undocumented malware named Plenet and AgentPSD. Volexity investigated an incident involving this activity and found that the threat actor had access to the victim network for at least 18 months before detection. The investigation also revealed that the victim organization’s managed services provider was compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article describes VerdantBamboo as a highly sophisticated threat actor that combines living-off-the-land techniques with malware. Volexity also said the group targets systems that do not support endpoint detection and response solutions.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-context\"\u003eThreat Actor Context\u003c/h2\u003e\n\n\u003cp\u003eUNC5221 has also been tracked as VerdantBamboo. The article states that the group has been involved in attacks exploiting zero-day vulnerabilities in edge devices since at least 2023.\u003c/p\u003e\n\n\u003cp\u003eBrickstorm has been used by the threat actor in environments of various targets in the United States for more than a year. Those breaches were discovered around March 2025. Researchers describe Brickstorm as “an advanced malware implant,” with initial variants written in Golang and newer variants written in Rust.\u003c/p\u003e\n\n\u003cp\u003eGoogle documented UNC5221 activity using Brickstorm in April 2024 and again in September 2025. The article states that Google described attacks against legal services, software-as-a-service providers, business process outsourcers, and technology companies. CISA also warned that Brickstorm was deployed by Chinese hackers against VMware vSphere servers, and Google later reported Brickstorm deployment by UNC6201 against Dell RecoverPoint for Virtual Machines.\u003c/p\u003e\n\n\u003ch2 id=\"initial-victim-compromise\"\u003eInitial Victim Compromise\u003c/h2\u003e\n\n\u003cp\u003eVolexity researchers responding to an incident found that VerdantBamboo compromised an Egnyte Storage Sync system. The attackers accessed it periodically through the victim’s web SSL VPN.\u003c/p\u003e\n\n\u003cp\u003eFrom that foothold, the threat actor used Brickstorm proxying features and stolen credentials to access the organization’s Microsoft 365 environment. Volexity assessed with high confidence that this access method was used to blend in with legitimate network traffic and evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eVolexity later determined that the hackers had been present on the network for at least 18 months before detection.\u003c/p\u003e\n\n\u003ch2 id=\"second-intrusion-after-remediation\"\u003eSecond Intrusion After Remediation\u003c/h2\u003e\n\n\u003cp\u003eAfter Volexity completed remediation efforts, VerdantBamboo breached the organization again. In this second intrusion, the attackers used stolen credentials to enable and configure SSL VPN access on the victim’s firewall.\u003c/p\u003e\n\n\u003cp\u003eThe attackers then connected to internal systems and deployed additional custom malware to a Synology NAS device. This led Volexity to investigate the customer’s managed services provider.\u003c/p\u003e\n\n\u003cp\u003eAt the MSP, Volexity found a BSD variant of Brickstorm on a pfSense firewall. Volexity concluded that this firewall, like the victim organization’s Storage Sync system, had been compromised at least 18 months earlier. The researchers have medium confidence that the attacker pivoted from the MSP into the victim organization’s environment.\u003c/p\u003e\n\n\u003cp\u003eBrickstorm was subsequently deployed to the victim’s Egnyte Storage Sync appliance and to a retired Linux GroupWise email archive server.\u003c/p\u003e\n\n\u003ch2 id=\"new-malware-plenet-and-agentpsd\"\u003eNew Malware: Plenet and AgentPSD\u003c/h2\u003e\n\n\u003cp\u003eAfter the attackers returned and re-established access to the victim’s infrastructure, they deployed custom malware named Plenet to a Synology NAS appliance. Plenet is also tracked by Google as Grimbolt.\u003c/p\u003e\n\n\u003cp\u003ePlenet is described as a cross-platform .NET-based backdoor. Its capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInteractive shell access.\u003c/li\u003e\n\u003cli\u003eRemote command execution.\u003c/li\u003e\n\u003cli\u003eFile manipulation.\u003c/li\u003e\n\u003cli\u003eCommand-and-control server switching.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVolexity noted that Plenet is similar in design to Brickstorm. Both use the WebSocket protocol for command-and-control communications and a multiplexing library for simultaneous data streams to the server.\u003c/p\u003e\n\n\u003cp\u003eAgentPSD is described as a simple Python-based reverse shell utility. Volexity believes VerdantBamboo used it as a fallback persistence mechanism in case other malware was no longer accessible. AgentPSD was configured to connect to a different domain than Brickstorm, but Volexity found that it was never used because Brickstorm was still running.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-discovery-and-disruption\"\u003eInfrastructure Discovery and Disruption\u003c/h2\u003e\n\n\u003cp\u003eDuring the investigation, Volexity tried to identify infrastructure related to VerdantBamboo. The researchers created a fingerprint to identify IP addresses and domains used by Brickstorm for command-and-control communication.\u003c/p\u003e\n\n\u003cp\u003eVolexity identified multiple machines, but the threat actor took the infrastructure offline before the researchers could reveal other systems. Between September 18 and September 23, all servers previously matching the pattern turned off services on port 443.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Google published a new report on Brickstorm activity around that time. Volexity suggested this timing may indicate that the attacker was aware its operations were under investigation.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems-and-entities-mentioned\"\u003eAffected Systems and Entities Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article names several systems, vendors, and environments connected to the activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft 365 environments accessed by the threat actor.\u003c/li\u003e\n\u003cli\u003eEgnyte Storage Sync systems compromised or used as deployment locations.\u003c/li\u003e\n\u003cli\u003eA victim organization’s web SSL VPN and firewall.\u003c/li\u003e\n\u003cli\u003eA Synology NAS appliance used for deployment of additional malware.\u003c/li\u003e\n\u003cli\u003eA managed services provider compromised by the threat actor.\u003c/li\u003e\n\u003cli\u003eA pfSense firewall at the MSP with a BSD variant of Brickstorm.\u003c/li\u003e\n\u003cli\u003eA retired Linux GroupWise email archive server.\u003c/li\u003e\n\u003cli\u003eVMware vSphere servers mentioned in connection with CISA warnings about Brickstorm.\u003c/li\u003e\n\u003cli\u003eDell RecoverPoint for Virtual Machines mentioned in connection with Google reporting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-and-response\"\u003eIndicators and Response\u003c/h2\u003e\n\n\u003cp\u003eVolexity compiled indicators of compromise linked to the investigated UNC5221 campaign and published them in its threat intelligence repository. The article also states that the threat actor took certain command-and-control infrastructure offline during the investigation.\u003c/p\u003e\n\n\u003cp\u003eThe overall incident shows VerdantBamboo maintaining long-term access across victim and provider environments, using stolen credentials, proxying, appliance-focused deployment, and multiple custom backdoors.\u003c/p\u003e\n","keyPoints":["Chinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and previously undocumented malware named Plenet and AgentPSD.","Volexity found that the threat actor had been present in the victim network for at least 18 months before detection and had also compromised the victim organization’s managed services provider.","After remediation, VerdantBamboo breached the organization again using stolen credentials to enable and configure SSL VPN access on the victim’s firewall and deploy additional custom malware to a Synology NAS device.","Plenet, also tracked by Google as Grimbolt, is a cross-platform .NET-based backdoor that provides interactive shell access, remote command execution, file manipulation, and command-and-control server switching.","AgentPSD is a Python-based reverse shell utility that Volexity believes VerdantBamboo used as a fallback persistence mechanism if other malware was no longer accessible."],"insights":["VerdantBamboo used Brickstorm proxying features and stolen credentials to access Microsoft 365 through the victim’s network, which Volexity assessed was intended to blend in with legitimate traffic and evade Conditional Access policies.","The compromise of the victim’s managed services provider shows that remediation of the direct victim environment alone was insufficient, because the attacker was able to regain access after cleanup.","The attackers focused on appliances and systems such as Egnyte Storage Sync, Synology NAS, pfSense, VMware vSphere, and a retired Linux GroupWise archive server, aligning with Volexity’s observation that VerdantBamboo targets systems that do not support EDR solutions.","AgentPSD was configured to use a different domain than Brickstorm and was never used while Brickstorm remained active, supporting Volexity’s assessment that it was intended as backup persistence rather than primary access.","VerdantBamboo’s infrastructure disappeared from port 443 shortly after Volexity’s fingerprinting effort and around the time of Google’s Brickstorm reporting, indicating the actor rapidly shut down detectable services when operations were exposed."],"referencedReports":[{"title":"VerdantBamboo: Just Another Brickstorm in the Firewall","url":"https://www.volexity.com/blog/2026/06/04/verdantbamboo-just-another-brickstorm-in-the-firewall/","publisher":"Volexity","context":"The article cites Volexity’s incident response research as the source for details on VerdantBamboo’s compromise, use of Brickstorm, Plenet, and AgentPSD, and the MSP pivot.","category":"","primary":false}],"body":"\u003cp\u003eChinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and previously undocumented malware named Plenet and AgentPSD. Volexity’s investigation found the threat actor had been in the victim network for at least 18 months before detection. The victim organization’s managed services provider was also compromised.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used Brickstorm’s proxying features and stolen credentials to access the victim’s Microsoft 365 environment through the organization’s web SSL VPN. Volexity assessed with high confidence that this was done to blend in with legitimate network traffic and evade Conditional Access policies. After remediation, VerdantBamboo breached the organization again by enabling and configuring SSL VPN access on the victim’s firewall.\u003c/p\u003e\n\n\u003cp\u003eThe campaign involved malware placed on systems including an Egnyte Storage Sync appliance, a Synology NAS device, a pfSense firewall, and a retired Linux GroupWise email archive server. Plenet is described as a cross-platform .NET-based backdoor with shell, command execution, file manipulation, and C2 switching capabilities. AgentPSD is described as a Python-based reverse shell utility used as a fallback persistence mechanism.\u003c/p\u003e\n"},{"n":14,"title":"Hackers Exploit Critical Everest Forms Pro WordPress Plugin Flaw to Take Over Sites","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/hackers-exploit-critical-everest-forms.html","time":"08:38","priority":"MUST READ","score":92,"tldr":"Attackers are actively exploiting CVE-2026-3300, a critical unauthenticated RCE flaw in Everest Forms Pro for WordPress, to take over vulnerable sites by creating rogue admin accounts and deploying persistence. Site owners should update to version 1.9.13 or later immediately and check for signs of compromise.","briefOverview":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-3300, a critical remote code execution vulnerability in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The flaw affects all versions up to and including 1.9.12, and a patch was released on March 18, 2026, in version 1.9.13. Wordfence said exploitation has been observed since April 13, 2026, with more than 29,300 exploit attempts blocked to date.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability stems from the Calculation Addon\u0026rsquo;s process_filter() function concatenating user-submitted form field values into a PHP code string without proper escaping before passing it to eval(). Wordfence said unauthenticated attackers can inject and execute arbitrary PHP code when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature and accepts crafted values in string-type fields. Successful exploitation can enable rogue administrator account creation, web shell deployment, and persistence on compromised servers.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Sansec research on skimmer campaigns abusing trusted services such as Stripe, Google Tag Manager, and Google Firestore for command-and-control and data exfiltration. One campaign uses Stripe customer metadata to host skimmer code and stores stolen payment data as Stripe customer records. Sansec also reported the GorgonAgora operation, involving 5,714 fake .shop storefronts impersonating major brands and exfiltrating card data to a single skimmer server in Moldova.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors are actively exploiting a critical vulnerability in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The flaw is tracked as CVE-2026-3300 and has a CVSS score of 9.8. It affects all plugin versions up to and including 1.9.12, while version 1.9.13, released on March 18, 2026, contains the patch.\u003c/p\u003e\n\n\u003cp\u003eWordfence attributed the bug to the Calculation Addon\u0026rsquo;s process_filter() function, which concatenates user-submitted form field values into a PHP code string without proper escaping before passing it to eval(). The article states that sanitize_text_field() does not escape single quotes or other PHP code context characters. As a result, unauthenticated attackers can inject and execute arbitrary PHP code by submitting crafted values in string-type form fields when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation can lead to complete site compromise. The article says attackers could create rogue administrator accounts, deploy web shells, and open other ways to burrow deeper into the server and establish persistent footholds. Wordfence reported that attackers have been observed exploiting the flaw since April 13, 2026.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wordfence, more than 29,300 exploit attempts targeting the vulnerability have been blocked to date, including 16 attempts in the most recent 24-hour period cited by the article. The most common payload attempts to create an administrator account named \u0026ldquo;diksimarina\u0026rdquo; with the email address \u0026ldquo;diksimarina@gmail.com.\u0026rdquo; The article lists several source IP addresses associated with attack attempts, including 202.56.2.126, 209.146.60.26, 15.235.166.18, 2402:1f00:8000:800::40db, and 185.78.165.153.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure is paired with Sansec findings on multiple web skimmer campaigns that abuse trusted services for command-and-control and exfiltration. One campaign uses Google Tag Manager and Stripe domains, specifically googletagmanager.com and api.stripe.com, which the article says are often trusted by online stores. On Magento and Adobe Commerce checkout pages, the malicious code extracts an obfuscated skimmer from a Stripe customer account metadata field and exfiltrates captured payment and billing data back to the attacker\u0026rsquo;s Stripe account.\u003c/p\u003e\n\n\u003cp\u003eSansec also identified a second loader variant that uses Google Firestore instead of Stripe, with the same broader goal of abusing trusted services as covert channels. The article additionally describes GorgonAgora, a campaign involving 5,714 fake .shop storefronts impersonating brands including Starbucks, Ford, Sony, Mattel, Hasbro, Lego, Disney, and Toyota. Those stores use the same Medusa.js commerce stack and a custom checkout SDK that renders a fake Stripe iframe and sends stolen card data over an encrypted WebSocket to a single server in Moldova.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors are actively exploiting a critical security flaw in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The vulnerability is tracked as CVE-2026-3300 and carries a CVSS score of 9.8. It is a remote code execution bug affecting all versions of the plugin up to and including 1.9.12.\u003c/p\u003e\n\n\u003cp\u003eA patch for the flaw was released on March 18, 2026, in Everest Forms Pro version 1.9.13. Wordfence said attackers have been observed exploiting the vulnerability starting April 13, 2026. The article states that exploitation can lead to complete site compromise.\u003c/p\u003e\n\n\u003ch2 id=\"technical-cause-of-cve-2026-3300\"\u003eTechnical Cause of CVE-2026-3300\u003c/h2\u003e\n\n\u003cp\u003eWordfence said the vulnerability is caused by the Calculation Addon\u0026rsquo;s process_filter() function. According to the article, the function concatenates user-submitted form field values into a PHP code string without proper escaping before passing the string to eval().\u003c/p\u003e\n\n\u003cp\u003eThe article states that the sanitize_text_field() function applied to input does not escape single quotes or other PHP code context characters. This makes it possible for unauthenticated attackers to inject and execute arbitrary PHP code on the server. The attack path involves submitting a crafted value in a string-type form field when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature.\u003c/p\u003e\n\n\u003cp\u003eThe affected field types named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003etext\u003c/li\u003e\n\u003cli\u003eemail\u003c/li\u003e\n\u003cli\u003eURL\u003c/li\u003e\n\u003cli\u003eselect\u003c/li\u003e\n\u003cli\u003eradio\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-of-successful-exploitation\"\u003eImpact of Successful Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe article says successful exploitation could allow unauthenticated attackers to execute arbitrary PHP code on the server. This can permit attackers to take actions that lead to full compromise of the WordPress site.\u003c/p\u003e\n\n\u003cp\u003eSpecific post-exploitation outcomes described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ecreating rogue administrator accounts\u003c/li\u003e\n\u003cli\u003edeploying web shells\u003c/li\u003e\n\u003cli\u003eopening other ways to burrow deeper into the server\u003c/li\u003e\n\u003cli\u003eestablishing persistent footholds\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-activity-reported-by-wordfence\"\u003eExploitation Activity Reported by Wordfence\u003c/h2\u003e\n\n\u003cp\u003eWordfence reported that attackers have been exploiting the flaw since April 13, 2026. More than 29,300 exploit attempts targeting the defect have been blocked to date. Of those, 16 attack attempts occurred in the last 24 hours referenced by the article.\u003c/p\u003e\n\n\u003cp\u003eThe article says the most common payload involves attempts to create an administrator account with the following details:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsername: diksimarina\u003c/li\u003e\n\u003cli\u003eEmail address: diksimarina@gmail.com\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attack attempts have originated from the following IP addresses listed in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e202.56.2.126\u003c/li\u003e\n\u003cli\u003e209.146.60.26\u003c/li\u003e\n\u003cli\u003e15.235.166.18\u003c/li\u003e\n\u003cli\u003e2402:1f00:8000:800::40db\u003c/li\u003e\n\u003cli\u003e185.78.165.153\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-product-and-response\"\u003eAffected Product and Response\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Everest Forms Pro for WordPress. The vulnerability impacts all versions up to and including 1.9.12. Version 1.9.13, released on March 18, 2026, patches the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor or group behind the Everest Forms Pro exploitation. It describes the activity broadly as being carried out by threat actors and unauthenticated attackers.\u003c/p\u003e\n\n\u003ch2 id=\"sansec-findings-on-skimmer-campaigns\"\u003eSansec Findings on Skimmer Campaigns\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses Sansec research on multiple skimmer campaigns. One campaign uses Stripe as both a command-and-control server and a data exfiltration sink. Sansec said the attacker treats Stripe as free infrastructure rather than as a way to launder charges.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, Stripe provides the attackers with a writable database for stolen cards and a code-hosting endpoint for the skimmer. The article says both are behind a domain that Content Security Policy rules and network filters often trust by default.\u003c/p\u003e\n\n\u003ch2 id=\"stripe-and-google-tag-manager-abuse\"\u003eStripe and Google Tag Manager Abuse\u003c/h2\u003e\n\n\u003cp\u003eThe skimmer campaign relies on Google Tag Manager and Stripe domains. The specific domains named are googletagmanager.com and api.stripe.com. The article says these domains are both trusted implicitly by online stores.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code is loaded from a Google Tag Manager container and executed on every page that loads it. On Magento and Adobe Commerce checkout pages, the code extracts an obfuscated skimmer from a Stripe customer account metadata field. The Stripe customer account identifier cited in the article is \u0026ldquo;cus_TfFjAAZQNOYENR.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe campaign captures information entered by users, including:\u003c/p\u003e\n\n\u00
