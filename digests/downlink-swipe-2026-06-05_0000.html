3cul\u003e\n\u003cli\u003efinancial information\u003c/li\u003e\n\u003cli\u003ebilling addresses\u003c/li\u003e\n\u003cli\u003eemail addresses\u003c/li\u003e\n\u003cli\u003ephone numbers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this data is saved to localStorage and then exfiltrated back to the attacker\u0026rsquo;s Stripe account. Sansec said every stolen card becomes a \u0026ldquo;customer\u0026rdquo; in the attacker\u0026rsquo;s account. On successful exfiltration, the loader deletes the localStorage entry so the same record is not sent twice.\u003c/p\u003e\n\n\u003cp\u003eSansec said the attacker can later list stolen cards by calling the same API with the same key. The article states that the Stripe customer database becomes a free, durable exfiltration sink.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-variant-using-google-firestore\"\u003eTimeline and Variant Using Google Firestore\u003c/h2\u003e\n\n\u003cp\u003eThe Stripe customer record containing the skimmer was created on December 24, 2025. The article says this indicates the operation may have been active since then.\u003c/p\u003e\n\n\u003cp\u003eSansec also identified a second variant of the loader that uses Google Firestore instead of Stripe. The article says the end goal is the same: abusing a trusted service as a covert channel that is unlikely to be blocked by e-commerce stores.\u003c/p\u003e\n\n\u003ch2 id=\"gorgonagora-fake-storefront-operation\"\u003eGorgonAgora Fake Storefront Operation\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes a large-scale operation dubbed GorgonAgora. Sansec said the operation used a cluster of 5,714 fake .shop storefronts impersonating major brands. The brands named include Starbucks, Ford, Sony, Mattel, Hasbro, Lego, Disney, and Toyota.\u003c/p\u003e\n\n\u003cp\u003eThe checkout pages on these fake storefronts funnel stolen card data to a single skimmer server in Moldova. The campaign has been ongoing since August 2025, according to the article.\u003c/p\u003e\n\n\u003cp\u003eSansec said every store in the operation runs the same Medusa.js commerce stack and loads the same custom checkout SDK. The SDK renders a fake Stripe iframe and exfiltrates card data over an encrypted WebSocket to a single server in Moldova.\u003c/p\u003e\n\n\u003ch2 id=\"3d-secure-relay-technique-in-gorgonagora\"\u003e3D Secure Relay Technique in GorgonAgora\u003c/h2\u003e\n\n\u003cp\u003eThe article says GorgonAgora uses WebSocket exfiltration with an AES-256-GCM payload. It also states that the command-and-control system maintains a live 3D Secure relay.\u003c/p\u003e\n\n\u003cp\u003eWhen a victim bank returns a 3D Secure challenge, the operator proxies it back to the shopper through the fake iframe. Sansec said this allows the transaction to complete and keeps the theft invisible.\u003c/p\u003e\n","keyPoints":["Threat actors are actively exploiting CVE-2026-3300, a critical remote code execution flaw in the Everest Forms Pro WordPress plugin, which affects versions up to and including 1.9.12.","Everest Forms Pro version 1.9.13, released on March 18, 2026, patches the vulnerability.","Wordfence said exploitation is possible because the Calculation Addon's process_filter() function concatenates user-submitted form field values into a PHP code string without proper escaping before passing it to eval().","Successful exploitation can allow unauthenticated attackers to execute arbitrary PHP code, create rogue administrator accounts, deploy web shells, and establish persistence on compromised servers.","Sansec reported separate skimmer campaigns that abuse trusted services such as Stripe, Google Tag Manager, and Google Firestore for command-and-control and data exfiltration."],"insights":["Only Everest Forms Pro forms using the \"Complex Calculation\" feature are described as enabling exploitation, making that feature a specific configuration to review in addition to updating the plugin.","Defenders can look for the rogue administrator account name \"diksimarina\" and email address \"diksimarina@gmail.com\" as concrete indicators of compromise tied to observed exploitation.","The Stripe skimmer campaign abuses api.stripe.com and Google Tag Manager because online stores often implicitly trust those domains in Content Security Policy rules and network filters.","Sansec reported that the Stripe skimmer stores stolen card records as Stripe \"customers\" and deletes the localStorage entry after successful exfiltration to avoid sending the same record twice.","The GorgonAgora fake storefront campaign includes a live 3D Secure relay that proxies bank challenges back to victims through a fake Stripe iframe so transactions can complete while card theft remains hidden."],"referencedReports":[{"title":"Attackers Actively Exploiting Critical Vulnerability in Everest Forms Pro Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-critical-vulnerability-in-everest-forms-pro-plugin/","publisher":"Wordfence","context":"The article cites Wordfence for the technical cause of CVE-2026-3300 and details of active exploitation against Everest Forms Pro.","category":"","primary":false},{"title":"Everest Forms Pro \u003c= 1.9.12 - Unauthenticated Remote Code Execution via Calculation Field","url":"https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/everest-forms-pro/everest-forms-pro-1912-unauthenticated-remote-code-execution-via-calculation-field","publisher":"Wordfence","context":"The article links to Wordfence's vulnerability entry when discussing recent attack attempts targeting the Everest Forms Pro flaw.","category":"","primary":false},{"title":"Stripe API Skimmer Infrastructure","url":"https://sansec.io/research/stripe-api-skimmer-infrastructure","publisher":"Sansec","context":"The article cites Sansec's research on skimmer campaigns abusing Stripe as command-and-control infrastructure and a data exfiltration sink.","category":"","primary":false},{"title":"GorgonAgora Fake Storefront Skimming Network","url":"https://sansec.io/research/gorgonagora-fake-storefront-skimming-network","publisher":"Sansec","context":"The article references Sansec's research on the GorgonAgora operation involving thousands of fake .shop storefronts used for payment-card skimming.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-3300, a critical remote code execution vulnerability in Everest Forms Pro, a WordPress plugin with about 4,000 active installations. The flaw affects all versions up to and including 1.9.12, and a patch was released on March 18, 2026, in version 1.9.13. Wordfence said exploitation has been observed since April 13, 2026, with more than 29,300 exploit attempts blocked to date.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability stems from the Calculation Addon\u0026rsquo;s process_filter() function concatenating user-submitted form field values into a PHP code string without proper escaping before passing it to eval(). Wordfence said unauthenticated attackers can inject and execute arbitrary PHP code when a form uses the \u0026ldquo;Complex Calculation\u0026rdquo; feature and accepts crafted values in string-type fields. Successful exploitation can enable rogue administrator account creation, web shell deployment, and persistence on compromised servers.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Sansec research on skimmer campaigns abusing trusted services such as Stripe, Google Tag Manager, and Google Firestore for command-and-control and data exfiltration. One campaign uses Stripe customer metadata to host skimmer code and stores stolen payment data as Stripe customer records. Sansec also reported the GorgonAgora operation, involving 5,714 fake .shop storefronts impersonating major brands and exfiltrating card data to a single skimmer server in Moldova.\u003c/p\u003e\n"},{"n":24,"title":"ShinyHunters: Salesforce’s Uninvited Guest User Profile Breach | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/an-uninvited-guest","time":"20:42","priority":"MUST READ","score":92,"tldr":"ShinyHunters is reportedly exploiting misconfigured Salesforce Experience Cloud Guest User permissions via the public /s/sfsites/aura endpoint to steal CRM data without authentication. There is no patch for this configuration issue, so organizations must immediately audit guest access, disable risky API permissions, and monitor Aura traffic for bulk unauthenticated queries.","briefOverview":"\u003cp\u003eShinyHunters reportedly targeted misconfigured Salesforce Experience Cloud sites by abusing Guest User Profile settings rather than exploiting a Salesforce platform vulnerability. The article says publicly exposed Experience sites can allow anonymous access for legitimate uses, but overly permissive guest permissions can expose internal CRM objects to anyone on the internet. It emphasizes that there is no patch coming because the issue is configuration-based.\u003c/p\u003e\n\n\u003cp\u003eThe reported attack centered on the public \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint, which supports Salesforce’s Aura framework. ShinyHunters claimed to have modified Mandiant’s open-source AuraInspector auditing tool to scan sites, identify misconfigured guest profiles, and extract data at scale. The article states that the group claimed to have breached 300 to 400 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe impact described includes theft of CRM records such as customer names, phone numbers, financial data, and business relationships. The article also says stolen data can be reused for extortion, targeted phishing, vishing, identity fraud, and other follow-on activity. Recommended actions include disabling guest API access, reviewing guest permissions, hardening sharing settings, and monitoring Aura endpoint traffic for bulk unauthenticated requests.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a Salesforce Experience Cloud exposure campaign attributed to ShinyHunters, focused on misconfigured Guest User Profile settings. It stresses that ShinyHunters did not hack Salesforce itself, but used access that administrators had unintentionally exposed. In this setup, anonymous visitors can access public resources through a guest profile, but overly broad permissions can also expose internal CRM objects.\u003c/p\u003e\n\n\u003cp\u003eThe technical focus of the activity is the \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint, which the article identifies as the backend API powering Salesforce’s Aura or Lightning frontend framework. AuraInspector, an open-source auditing tool developed by Mandiant for legitimate administrative and debugging purposes, was reportedly modified by ShinyHunters. According to the article, the modified tool could automate scanning, identify sites with interesting guest permissions, and extract data from vulnerable endpoints at scale.\u003c/p\u003e\n\n\u003cp\u003eThe attack flow described in the article begins with mass scanning of public Salesforce Experience Cloud sites. The attackers then identify sites where Guest User Profiles have excessive permissions, send unauthenticated requests to \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e, query CRM data as a guest user, bypass Salesforce’s 2,000-record API query limit, and automate exfiltration. The article frames the problem as a combination of public-by-design APIs, powerful backend access, permissive anonymous permissions, and limited monitoring.\u003c/p\u003e\n\n\u003cp\u003eThe article states that ShinyHunters claimed to have breached 300 to 400 organizations and extracted full CRM records. It lists exposed data types including customer names, phone numbers, financial data, and business relationships. It also says many affected organizations still do not know they were targeted and breached.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the stolen CRM data to follow-on activity such as targeted phishing, vishing, identity fraud, extortion, regulatory exposure, and reputational damage. It cites Unit 42 documentation of voice-based phishing incidents using exfiltrated contact information and notes that affected sectors include financial services, manufacturing, professional and legal services, and wholesale and retail. The recommended response is to audit guest permissions, disable guest API access, restrict sensitive object and field access, enable secure guest user record access, and monitor Aura and WAF logs for abnormal unauthenticated activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a Salesforce Experience Cloud exposure campaign attributed to ShinyHunters that relies on misconfigured Guest User Profile settings. Its central point is that this is not presented as a Salesforce platform vulnerability, but as a configuration problem in which anonymous users are granted access to data that should not be public. The article states that ShinyHunters used a door that was already unlocked rather than hacking Salesforce itself.\u003c/p\u003e\n\n\u003cp\u003eSalesforce Experience sites can legitimately expose information to unauthenticated visitors through a Guest User Profile. The article gives examples such as help centers, public knowledge bases, and product catalogs. The risk arises when administrators grant guest users access to internal CRM objects, such as customer records, contacts, or financial data.\u003c/p\u003e\n\n\u003ch2 id=\"reported-actor-and-tooling\"\u003eReported Actor and Tooling\u003c/h2\u003e\n\n\u003cp\u003eThe activity is attributed in the article to ShinyHunters, described as a well-known cybercriminal group responsible for numerous high-profile data breaches. The article says ShinyHunters claimed to have modified AuraInspector, an open-source auditing tool developed by Mandiant, now part of Google. AuraInspector was originally built for legitimate administrative and debugging purposes involving Aura components and the \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint in Salesforce environments.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the modified tool could be used to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomate mass scanning across thousands of Salesforce sites.\u003c/li\u003e\n\u003cli\u003eIdentify sites with misconfigured Guest User Profiles and notable permissions.\u003c/li\u003e\n\u003cli\u003eAutomatically extract data from vulnerable endpoints at scale.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article frames this as a case where a defender-oriented auditing tool was reportedly repurposed into an attack tool.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe technical focus is the \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint, which the article identifies as the backend API powering Salesforce’s Aura or Lightning frontend framework. The endpoint is public by design because it supports Experience Cloud site functionality. This public nature makes malicious activity harder to distinguish from normal traffic unless organizations specifically monitor it.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the attack flow as follows:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eShinyHunters mass-scanned public Salesforce Experience Cloud sites.\u003c/li\u003e\n\u003cli\u003eThey identified sites with misconfigured Guest User Profiles and excessive permissions.\u003c/li\u003e\n\u003cli\u003eThey targeted the \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint.\u003c/li\u003e\n\u003cli\u003eThey used unauthenticated guest access to query internal CRM records where guest API access was enabled.\u003c/li\u003e\n\u003cli\u003eThey bypassed Salesforce’s 2,000-record API query limit.\u003c/li\u003e\n\u003cli\u003eThey automated exfiltration at scale using a modified version of AuraInspector.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article stresses that the combination of a powerful public API, overly permissive anonymous access, and insufficient monitoring can make a Salesforce database accessible to unauthenticated users on the internet.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-exposure-is-effective\"\u003eWhy the Exposure Is Effective\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the root cause is broader than one individual misconfiguration. It points to Salesforce’s complexity and the difficulty of correctly configuring Experience Cloud permissions. It says many administrators may not fully understand the implications of enabling API access on a guest profile.\u003c/p\u003e\n\n\u003cp\u003eSeveral conditions are described as making the attack effective:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker does not need credentials or MFA bypass because access is unauthenticated.\u003c/li\u003e\n\u003cli\u003eThe \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint is legitimate and publicly accessible by design.\u003c/li\u003e\n\u003cli\u003eAura can communicate with the Salesforce Apex server to retrieve or update data as needed.\u003c/li\u003e\n\u003cli\u003ePublic Aura traffic may blend in with normal activity.\u003c/li\u003e\n\u003cli\u003eSecurity teams may not be monitoring guest user query volumes.\u003c/li\u003e\n\u003cli\u003eAutomation makes the exposure exploitable at scale.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article says ShinyHunters claimed to have breached 300 to 400 organizations. It states that extracted records included customer names, phone numbers, financial data, and business relationships. It also says many affected companies still do not know they were targeted and breached.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several business risks for organizations that rely on Salesforce as a central hub. These include data theft, extortion demands, regulatory violations under privacy laws such as GDPR, and reputational damage. It also emphasizes that once stolen CRM data circulates and is resold, the risk continues beyond the initial breach.\u003c/p\u003e\n\n\u003ch2 id=\"follow-on-activity\"\u003eFollow-On Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article links stolen CRM data to follow-on campaigns such as targeted phishing, vishing, identity fraud, and extortion. It states that Palo Alto Networks Unit 42 has documented numerous incidents since late December 2025 involving voice-based phishing attacks using exfiltrated contact information. It lists affected sectors as financial services, manufacturing, professional and legal services, and wholesale and retail.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that in one documented case, threat actors moved from initial access to complete data exfiltration in under 60 seconds. It says this speed and precision suggest extensive preparation using stolen CRM data. It further notes that Unit 42 analysis found identity weakness played a role in 89% of incident response cases in 2025, with 65% involving identity-based initial access techniques.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance\"\u003eDetection Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article says the activity is relatively easy to detect if an organization is actively logging Aura endpoint traffic. It recommends monitoring \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e for high request volume, unusual queries against CRM objects from unauthenticated sessions, and large response payloads from guest or anonymous sessions. It notes that legitimate public pages rarely return bulk CRM data.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends immediately checking the Guest User Profile for each Experience Cloud site. Specifically, organizations should review which objects and fields have read access. The article states that if a guest profile has access to Contacts, Accounts, or other sensitive objects, the organization is exposed.\u003c/p\u003e\n\n\u003cp\u003eFor organizations using a WAF, the article recommends looking for unauthenticated sessions repeatedly requesting \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e, sequential pagination patterns, AuraInspector-like query structures, and IPs generating bulk unauthenticated API call volumes. For organizations with Salesforce Event Monitoring, it recommends looking for guest user sessions querying sensitive objects, abnormally large record counts, and repeated near-identical machine-speed queries. For Salesforce Shield users, it mentions Field Audit Trail, Platform Encryption, and enhanced event visibility.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-recommendations\"\u003eRemediation Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article provides a remediation checklist organized into phases. Emergency containment includes unchecking \u003ccode\u003eAPI Enabled\u003c/code\u003e in guest user System Permissions and documenting the existing guest user permission configuration before making changes.\u003c/p\u003e\n\n\u003cp\u003eConfiguration hardening includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSetting Organization-Wide Defaults to \u003ccode\u003ePrivate\u003c/code\u003e for sensitive objects.\u003c/li\u003e\n\u003cli\u003eEnabling \u003ccode\u003eSecure guest user record access\u003c/code\u003e in Sharing Settings.\u003c/li\u003e\n\u003cli\u003eReviewing and restricting Guest User Sharing Rules.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eData protection recommendations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImplementing Enhanced Personal Information Masking for sensitive fields.\u003c/li\u003e\n\u003cli\u003eConfiguring field-level security to restrict access to PII fields.\u003c/li\u003e\n\u003cli\u003eSetting guest user session timeout to maximum restrictiveness.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOngoing monitoring recommendations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeploying Salesforce Shield for enhanced audit logging.\u003c/li\u003e\n\u003cli\u003eConfiguring WAF rules to detect bulk unauthenticated Aura requests.\u003c/li\u003e\n\u003cli\u003eScheduling monthly Guest User Sharing Rule access reviews.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"article-s-main-conclusion\"\u003eArticle’s Main Conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the campaign is persistent and ongoing because there is no platform-level patch and many organizations have not audited their configurations. It says organizations using Salesforce Experience Cloud should assume they will be targeted and should audit Guest User permissions and monitor Aura and other internet-facing endpoints.\u003c/p\u003e\n\n\u003cp\u003eThe broader takeaway presented by the article is that attackers are increasingly targeting misconfigurations on trusted enterprise platforms rather than relying only on software vulnerabilities. It frames the Salesforce case as an example of the gap between the complexity of enterprise platforms and organizations’ ability to secure them.\u003c/p\u003e\n","keyPoints":["ShinyHunters reportedly used a modified version of Mandiant’s AuraInspector tool to scan Salesforce Experience Cloud sites and exploit misconfigured Guest User Profiles through the /s/sfsites/aura endpoint.","The article states that this issue is a Salesforce configuration problem rather than a platform vulnerability, because overly permissive Guest User settings can expose internal CRM objects to unauthenticated internet users.","ShinyHunters claimed to have breached 300 to 400 organizations and extracted CRM records such as customer names, phone numbers, financial data, and business relationships.","The article says stolen CRM data can be reused in follow-on campaigns such as targeted phishing, vishing, identity fraud, and extortion.","Recommended remediation steps include disabling API access for guest users, reviewing Guest User object and field permissions, enabling secure guest user record access, and monitoring Aura endpoint traffic for high-volume unauthenticated requests."],"insights":["Because /s/sfsites/aura is public by design, malicious requests can blend into normal Experience Cloud traffic unless teams specifically monitor guest-user query volume and response sizes.","A defender-built auditing tool, AuraInspector, reportedly gave attackers the visibility needed to automate discovery and exploitation of the same misconfigurations it was designed to help identify.","The article emphasizes that there is no platform patch for this exposure, so remediation depends on each organization auditing and hardening its own Guest User Profile permissions.","Salesforce’s standard 2,000-record API query limit did not prevent large-scale theft because the attackers reportedly found a way to bypass it and automate exfiltration.","Stolen CRM data increased the effectiveness of later social-engineering campaigns, with one documented case moving from initial access to complete data exfiltration in under 60 seconds."],"referencedReports":[],"body":"\u003cp\u003eShinyHunters reportedly targeted misconfigured Salesforce Experience Cloud sites by abusing Guest User Profile settings rather than exploiting a Salesforce platform vulnerability. The article says publicly exposed Experience sites can allow anonymous access for legitimate uses, but overly permissive guest permissions can expose internal CRM objects to anyone on the internet. It emphasizes that there is no patch coming because the issue is configuration-based.\u003c/p\u003e\n\n\u003cp\u003eThe reported attack centered on the public \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint, which supports Salesforce’s Aura framework. ShinyHunters claimed to have modified Mandiant’s open-source AuraInspector auditing tool to scan sites, identify misconfigured guest profiles, and extract data at scale. The article states that the group claimed to have breached 300 to 400 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe impact described includes theft of CRM records such as customer names, phone numbers, financial data, and business relationships. The article also says stolen data can be reused for extortion, targeted phishing, vishing, identity fraud, and other follow-on activity. Recommended actions include disabling guest API access, reviewing guest permissions, hardening sharing settings, and monitoring Aura endpoint traffic for bulk unauthenticated requests.\u003c/p\u003e\n"},{"n":25,"title":"The Domino Effect of a Software Supply Chain Attack","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/the-domino-effect","time":"20:42","priority":"MUST READ","score":92,"tldr":"A misconfigured GitHub Actions workflow let TeamPCP steal credentials and rapidly compromise Trivy, Docker Hub images, npm packages, Open VSX extensions, and LiteLLM on PyPI. The key lesson is that CI/CD secrets, mutable tags, and over-permissioned tokens can turn one pull request into a cross-ecosystem supply chain compromise unless activity is correlated across platforms in real time.","briefOverview":"\u003cp\u003eIn March 2026, a threat actor known as TeamPCP used a misconfigured GitHub Actions workflow in Aqua Security’s Trivy project as the entry point for a software supply chain attack. The workflow used pull_request_target, which runs in the base repository context and can expose secrets and write permissions to code associated with external pull requests. The exposed aqua-bot Personal Access Token later enabled the attackers to rewrite release tags in aquasecurity/trivy-action.\u003c/p\u003e\n\n\u003cp\u003eThe attack cascaded across GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI in less than a week. Pipelines that referenced mutable version tags instead of commit SHAs pulled attacker-controlled code while the malicious payload executed the legitimate Trivy scanner afterward, making builds appear normal. The article says more than 1,000 SaaS environments were actively impacted according to Mandiant CTO Charles Carmakal, with a projected potential impact of 10,000.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the campaign succeeded because credentials stolen in one ecosystem became lateral movement tools in others. It highlights detection opportunities such as monitoring pull_request_target workflows with secrets, tag rewrites, dormant identity revival, token creation spikes, privileged Kubernetes activity, and cross-platform correlation. Its central message is that isolated platform alerts are insufficient for detecting fast-moving supply chain compromises.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a March 2026 software supply chain campaign attributed to TeamPCP that began with a misconfigured GitHub Actions workflow in Aqua Security’s Trivy vulnerability scanner. A pull_request_target workflow executed in a privileged base repository context and exposed the aqua-bot service account’s Personal Access Token. Aqua attempted credential rotation, but the article says residual access remained and was later used by the attackers.\u003c/p\u003e\n\n\u003cp\u003eOn March 19, TeamPCP used the stolen token to force-push nearly all release tags in aquasecurity/trivy-action so they pointed to malicious commits. The attackers did not create new releases or branch pushes, relying instead on the fact that many CI/CD pipelines referenced tags such as v0.69.4 rather than immutable commit SHAs. The malicious payload searched process memory and filesystems for secrets, encrypted and exfiltrated stolen data, and then ran the legitimate Trivy scanner so workflows appeared to complete normally.\u003c/p\u003e\n\n\u003cp\u003eThe campaign then expanded into additional ecosystems. Malicious Docker Hub images for Trivy versions 0.69.4 through 0.69.6 established persistence through a systemd service that polled an Internet Computer Protocol canister. TeamPCP also deployed CanisterWorm, which scanned infected machines for npm tokens and automatically published malicious versions of packages those tokens could access.\u003c/p\u003e\n\n\u003cp\u003eThe article says the same actor later rewrote all 35 tags in the Checkmarx KICS GitHub Action and published malicious VS Code extensions to the Open VSX Registry. The final known phase targeted LiteLLM, a Python AI gateway proxy, through malicious PyPI versions that used a .pth file loaded automatically at Python startup. That payload harvested credentials, attempted Kubernetes lateral movement through privileged pods, and installed a persistent backdoor.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main defensive focus is detection across the full kill chain. It recommends monitoring external pull_request_target workflow executions with secrets, dormant identities performing privileged operations, release tag rewrites, bulk token creation, unfamiliar infrastructure modifying Actions secrets, privileged pod creation, and unexpected ServiceAccount token requests. It argues that the TeamPCP pattern only becomes visible when GitHub, container registry, package manager, and Kubernetes telemetry are correlated across identities and time windows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes a March 2026 software supply chain campaign attributed to TeamPCP. The campaign began with a misconfigured GitHub Actions workflow in Aqua Security’s Trivy repository and expanded across GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI. The article frames the incident as an example of how one pull request can become a cross-ecosystem compromise when CI/CD workflows expose secrets and service accounts hold broad permissions.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the attack was not based on a zero-day or brute force. It relied on trusted automation, mutable Git tags, over-permissioned credentials, and downstream trust in developer tooling. Mandiant CTO Charles Carmakal is cited as saying more than 1,000 SaaS environments were actively impacted, with a projected potential growth to 10,000.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-through-github-actions\"\u003eInitial Access Through GitHub Actions\u003c/h2\u003e\n\n\u003cp\u003eTeamPCP submitted a pull request to Aqua Security’s Trivy repository in late February. A GitHub Actions workflow using pull_request_target executed with access to secrets, exposing the aqua-bot service account’s Personal Access Token. The article explains that pull_request_target runs in the context of the base repository, with access to secrets and write permissions, regardless of where the pull request originated.\u003c/p\u003e\n\n\u003cp\u003eAqua attempted credential rotation, but the article says residual access remained. Weeks later, the attackers used that access to continue the campaign. The incident is presented as a direct example of the risk created when external contributor code can execute in workflows that have secret access.\u003c/p\u003e\n\n\u003ch2 id=\"tag-hijacking-and-trivy-compromise\"\u003eTag Hijacking and Trivy Compromise\u003c/h2\u003e\n\n\u003cp\u003eOn March 19, TeamPCP used the stolen aqua-bot token to force-push nearly all release tags in aquasecurity/trivy-action to malicious commits. The article emphasizes that there were no new releases and no branch pushes. Instead, the attackers abused the fact that Git tags can be rewritten and that many pipelines trust version tags rather than immutable commit SHAs.\u003c/p\u003e\n\n\u003cp\u003eAny CI/CD pipeline referencing the rewritten tags pulled attacker-controlled code. The payload scanned process memory and filesystems for secrets, encrypted the stolen data, and exfiltrated it to a typosquatted domain. It then executed the legitimate Trivy scanner so workflows appeared to complete normally.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that malicious Docker Hub images for Trivy versions 0.69.4, 0.69.5, and 0.69.6 established persistence through a systemd service. That service polled an Internet Computer Protocol canister, which the article describes as blockchain-hosted infrastructure resistant to traditional domain takedowns.\u003c/p\u003e\n\n\u003ch2 id=\"expansion-into-npm-open-vsx-kics-and-pypi\"\u003eExpansion Into npm, Open VSX, KICS, and PyPI\u003c/h2\u003e\n\n\u003cp\u003eAfter the Trivy compromise, TeamPCP used harvested credentials to move into additional ecosystems. The article says credentials collected in the earlier phase included npm authentication tokens cached on developer machines. TeamPCP then deployed CanisterWorm, described in the article as the first publicly documented malware to use Internet Computer Protocol canisters for command and control.\u003c/p\u003e\n\n\u003cp\u003eCanisterWorm scanned infected machines for npm tokens and automatically published malicious versions of packages those tokens could access. The article says dozens of npm packages across multiple scopes were compromised. This phase demonstrated how cached package manager tokens became lateral movement fuel.\u003c/p\u003e\n\n\u003cp\u003eThree days later, TeamPCP used a compromised service account to rewrite all 35 tags in the Checkmarx KICS GitHub Action. The attackers also published malicious VS Code extensions to the Open VSX Registry. Security researchers attributed this activity to the same actor with high confidence based on identical encryption keys and shared exfiltration methodology.\u003c/p\u003e\n\n\u003cp\u003eThe final known phase targeted LiteLLM, a widely adopted Python AI gateway proxy. TeamPCP bypassed LiteLLM’s official CI/CD workflows and published malicious versions directly to PyPI. The malicious versions used a Python .pth file, which the interpreter loads automatically at startup, meaning no explicit import was required.\u003c/p\u003e\n\n\u003cp\u003eThe LiteLLM payload harvested credentials, attempted Kubernetes lateral movement through privileged pods, and installed a persistent backdoor. LiteLLM’s security disclosure is cited as saying the malicious packages were available for several hours before being quarantined.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-campaign-worked\"\u003eWhy the Campaign Worked\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several architectural conditions that made the campaign possible:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGit tags are mutable, so pipelines that reference tags such as v1.2.3 trust that the tag has not moved.\u003c/li\u003e\n\u003cli\u003epull_request_target workflows can expose secrets to external contributor code when misconfigured.\u003c/li\u003e\n\u003cli\u003eThe aqua-bot Personal Access Token was over-permissioned and had write access to tags across multiple repositories.\u003c/li\u003e\n\u003cli\u003eCached npm and PyPI tokens on developer machines enabled lateral movement.\u003c/li\u003e\n\u003cli\u003eThe malicious payloads executed legitimate tools afterward, so CI jobs appeared to succeed.\u003c/li\u003e\n\u003cli\u003eEach platform saw only part of the activity, making the campaign harder to detect without cross-platform correlation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that the service account permission issue was distinct from the initial secrets exposure. Even if the token had been stolen through another method, the blast radius was determined by what the token was allowed to do. A token scoped for CI builds should not have been able to rewrite release tags.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several TeamPCP indicators for defenders to hunt across infrastructure, CI/CD logs, and package repositories. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eC2 domains: scan.aquasecurtiy[.]org, models.litellm[.]cloud, and checkmarx[.]zone.\u003c/li\u003e\n\u003cli\u003eC2 IPs: 45.148.10.212 and 83.142.209.11.\u003c/li\u003e\n\u003cli\u003eICP canister: tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io.\u003c/li\u003e\n\u003cli\u003eCloudflare Tunnel: plug-tab-protective-relay.trycloudflare.com.\u003c/li\u003e\n\u003cli\u003eMalicious PyPI packages: litellm 1.82.7 and 1.82.8.\u003c/li\u003e\n\u003cli\u003eMalicious Docker images: aquasec/trivy 0.69.4, 0.69.5, and 0.69.6.\u003c/li\u003e\n\u003cli\u003ePersistence mechanisms: systemd services named sysmon and .pth files such as litellm_init.pth.\u003c/li\u003e\n\u003cli\u003eGitHub repositories: tpcp-docs and docs-tpcp, described as exfiltration fallback repositories.\u003c/li\u003e\n\u003cli\u003eCompromised tags: nearly all trivy-action tags, seven setup-trivy tags, and 35 KICS tags.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that if these indicators are found in an environment, defenders should assume active attack and follow the response checklist referenced in the post.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance-by-phase\"\u003eDetection Guidance by Phase\u003c/h2\u003e\n\n\u003ch3 id=\"phase-1-workflow-abuse-and-initial-credential-theft\"\u003ePhase 1: Workflow Abuse and Initial Credential Theft\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends detecting pull_request_target workflows that execute with secrets access. It specifically calls out workflow runs where the event is pull_request_target, secrets are passed to the job context, and the triggering contributor is outside the organization. It describes this as the highest-signal detection for this class of attack.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends flagging first-time contributors who trigger workflow runs. A new account opening a pull request may be legitimate, but the combination of a new actor and workflow execution is presented as worthy of review.\u003c/p\u003e\n\n\u003ch3 id=\"phase-2-dormant-identity-revival-and-tag-manipulation\"\u003ePhase 2: Dormant Identity Revival and Tag Manipulation\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends baselining identity behavior over a 30-day window. A dormant identity that suddenly executes workflows, especially workflows that access secrets, should be treated as a high-priority alert. The example given is a service account that normally triggers CI builds suddenly pushing release tags across multiple repositories.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends tracking how many repositories each identity accesses per day. A CI identity or bot account accessing far more repositories than usual in a short time window is described as a credential abuse signal. Defenders are also advised to monitor git.push events where the ref_type is tag and the tag already existed, particularly when many tags are rewritten in a short window.\u003c/p\u003e\n\n\u003ch3 id=\"phase-3-credential-staging\"\u003ePhase 3: Credential Staging\u003c/h3\u003e\n\n\u003cp\u003eFor credential staging, the article identifies bulk token creation as a strong indicator. Three or more personal access tokens created by a single identity within one hour is described as a sign of potential staging for lateral movement. The guidance applies to PATs, deploy keys, and OAuth app authorizations.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends monitoring Actions secrets that are created or updated from unfamiliar infrastructure. Secret modifications from unfamiliar IPs, VPNs, or flagged ranges may indicate that an attacker is injecting credentials into the pipeline. It further recommends looking for OAuth or GitHub App authorizations with critical scopes such as repo, admin:org, or write:packages from unexpected contexts.\u003c/p\u003e\n\n\u003ch3 id=\"phase-4-kubernetes-lateral-movement\"\u003ePhase 4: Kubernetes Lateral Movement\u003c/h3\u003e\n\n\u003cp\u003eFor the LiteLLM phase, the article focuses on Kubernetes telemetry. It recommends monitoring the TokenRequest API in EKS, GKE, and AKS for service account tokens requested by pods or identities that do not normally request them. A compromised application container requesting a new ServiceAccount token is described as a pivot indicator.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends alerting on pods created with privileged: true, hostPID: true, or host filesystem mounts. It describes these as container escape attempts and says they are rare in normal operations. New DaemonSets and CronJobs are also highlighted because DaemonSets provide cluster-wide deployment and CronJobs provide scheduled persistence.\u003c/p\u003e\n\n\u003ch3 id=\"phase-5-cross-platform-correlation\"\u003ePhase 5: Cross-Platform Correlation\u003c/h3\u003e\n\n\u003cp\u003eThe article argues that individual detections are not enough. It describes TeamPCP’s timeline as workflow abuse on Day 0, credential theft on Day 0, dormant account revival on Day 21, tag rewrites across repositories on Day 21, npm token abuse on Day 22, additional GitHub Action compromise on Day 24, PyPI package compromise on Day 25, and Kubernetes lateral movement on Day 25.\u003c/p\u003e\n\n\u003cp\u003eThe article states that an organization monitoring only GitHub might see a suspicious workflow run and tag changes, while an organization monitoring only Kubernetes might see an anomalous pod. Neither would see the full campaign. The recommended approach is to correlate identity behavior across GitHub, container registries, package managers, and cloud infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"ai-development-as-an-accelerant\"\u003eAI Development as an Accelerant\u003c/h2\u003e\n\n\u003cp\u003eThe article links the final phase of the campaign to AI-assisted development because LiteLLM is described as a widely adopted Python AI gateway proxy. The compromise was discovered when a researcher at FutureSearch was testing a Cursor MCP plugin that pulled LiteLLM as a transitive dependency. A bug in the malware crashed the machine, making the backdoor visible.\u003c/p\u003e\n\n\u003cp\u003eThe article says no human had reviewed the package and no developer made a conscious decision to install that version. An AI tool resolved a dependency, and the compromised package was pulled in. The article argues that AI-assisted development is extending and accelerating the trust chain by writing code, resolving dependencies, configuring pipelines, and publishing packages.\u003c/p\u003e\n\n\u003cp\u003eIt concludes that organizations should not slow down AI adoption, but should build detection that can match the speed of AI-assisted development and deployment. The main defensive lesson is that the trust chain exploited by TeamPCP becomes longer, faster, and less visible when AI tools handle dependencies and deployment workflows autonomously.\u003c/p\u003e\n","keyPoints":["TeamPCP exploited a misconfigured GitHub Actions pull_request_target workflow in Aqua Security’s Trivy repository to expose the aqua-bot Personal Access Token.","Using the stolen token, TeamPCP force-pushed nearly all release tags in aquasecurity/trivy-action to malicious commits, causing pipelines that referenced those tags to run attacker-controlled code.","The campaign spread through GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI by using stolen credentials as lateral movement tools.","The LiteLLM compromise used a malicious Python .pth file that loaded automatically at interpreter startup to harvest credentials, attempt Kubernetes lateral movement, and install a persistent backdoor.","The article argues that detecting this type of supply chain attack requires correlating identity behavior across GitHub, container registries, package managers, and cloud infrastructure."],"insights":["Referencing GitHub Actions by version tags rather than immutable commit SHAs creates a high-impact trust failure because attackers can silently rewrite existing tags without creating new releases or branch pushes.","A pull_request_target workflow triggered by an external contributor is especially dangerous when secrets are available, because it runs in the base repository context with access to secrets and write permissions by design.","The article identifies tag rewrites on release repositories as a high-signal detection opportunity because Git tags are technically mutable but rarely rewritten during normal operations.","The campaign showed that successful supply chain malware may deliberately execute the legitimate tool after stealing credentials, allowing CI jobs to succeed and reducing the chance that build failures expose the compromise.","The same campaign phases appeared as plausible isolated events across GitHub, Docker Hub, npm, PyPI, and Kubernetes, so the article emphasizes temporal cross-platform correlation as the difference between separate low-context alerts and a coherent investigation."],"referencedReports":[],"body":"\u003cp\u003eIn March 2026, a threat actor known as TeamPCP used a misconfigured GitHub Actions workflow in Aqua Security’s Trivy project as the entry point for a software supply chain attack. The workflow used pull_request_target, which runs in the base repository context and can expose secrets and write permissions to code associated with external pull requests. The exposed aqua-bot Personal Access Token later enabled the attackers to rewrite release tags in aquasecurity/trivy-action.\u003c/p\u003e\n\n\u003cp\u003eThe attack cascaded across GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI in less than a week. Pipelines that referenced mutable version tags instead of commit SHAs pulled attacker-controlled code while the malicious payload executed the legitimate Trivy scanner afterward, making builds appear normal. The article says more than 1,000 SaaS environments were actively impacted according to Mandiant CTO Charles Carmakal, with a projected potential impact of 10,000.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the campaign succeeded because credentials stolen in one ecosystem became lateral movement tools in others. It highlights detection opportunities such as monitoring pull_request_target workflows with secrets, tag rewrites, dormant identity revival, token creation spikes, privileged Kubernetes activity, and cross-platform correlation. Its central message is that isolated platform alerts are insufficient for detecting fast-moving supply chain compromises.\u003c/p\u003e\n"},{"n":1,"title":"Over 900 US gas station tank gauge systems exposed to attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/over-900-us-gas-station-tank-gauge-systems-exposed-to-attacks/","time":"14:50","priority":"SHOULD READ","score":88,"tldr":"Over 900 internet-exposed automatic tank gauge systems in the U.S. are vulnerable to ongoing attacks that could let hackers change settings, disable alerts, and disrupt fuel or chemical tank monitoring. U.S. agencies are urging critical infrastructure operators to remove direct internet access, secure remote access, change default passwords, and patch affected devices.","briefOverview":"\u003cp\u003eOver 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks. These systems are used to monitor fuel, chemical, and other liquid storage tanks across critical infrastructure sectors. U.S. agencies warned that attackers are targeting internet-exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eThe joint advisory from CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners said attackers exploit flaws such as hardcoded credentials, authentication bypasses, SQL injection, OS command execution issues, and privilege escalation weaknesses. CISA warned that successful compromises could let attackers disable system alerts, increasing the risk of leaks, equipment failures, or permanent damage to tank systems. Shadowserver reported 1,061 exposed ATG IPs on June 5, 2026, with 909 in the United States.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOver 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks. ATG systems are electronic monitoring devices used to remotely track fuel, chemicals, or other liquids in storage tanks. They support inventory control, environmental leak detection, and regulatory compliance, and are commonly used at gas stations as well as industrial sites.\u003c/p\u003e\n\n\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a joint advisory warning critical infrastructure organizations to secure internet-exposed ATG systems. The advisory said recent malicious activity involved threat actors compromising internet-exposed ATG systems and modifying them through command execution. The U.S. government has not attributed the activity to a specific nation-state or threat actor group.\u003c/p\u003e\n\n\u003cp\u003eThe agencies warned that attackers target these devices by exploiting several types of security weaknesses. The listed issues include hardcoded credentials, authentication bypasses, SQL injection vulnerabilities, OS command execution flaws, and privilege escalation weaknesses. After successful compromise, attackers could disable alerts, raising the risk of leaks, equipment failures, and permanent damage to targeted tank systems.\u003c/p\u003e\n\n\u003cp\u003eShadowserver said it added ATG system scanning to its Accessible ICS reporting and observed 1,061 IPs on June 5, 2026, on port 10001/tcp. It said the vast majority of exposed devices were in the United States, with 909 devices identified there. Shadowserver also said it removed a large number of apparent honeypots, including systems on ports 8001 and 9001, from its count.\u003c/p\u003e\n\n\u003cp\u003eCritical infrastructure organizations are advised to restrict remote access to ATG systems from the internet and use controlled access through firewalls, VPNs, or access control lists. They are also advised to replace default passwords with strong credentials, apply security updates, monitor for unauthorized changes, and implement multi-factor authentication where possible. The article also notes a May CNN report that Iranian hackers had breached internet-connected ATG systems at multiple U.S. gas stations, reportedly manipulating display readings without changing actual fuel levels.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOver 900 automatic tank gauge systems across the United States have been found exposed online and vulnerable to ongoing attacks. These ATG systems are used to monitor fuel, chemical, and other liquid storage tanks across multiple critical infrastructure sectors. They are commonly used at gas stations to monitor fuel tank levels, but they can also be found in industrial environments that track chemical storage tanks.\u003c/p\u003e\n\n\u003cp\u003eATG systems automate functions such as inventory control, environmental leak detection, and regulatory compliance. Because these systems support monitoring and safety-related functions, unauthorized modification can create operational risks beyond simple data tampering.\u003c/p\u003e\n\n\u003ch2 id=\"government-warning\"\u003eGovernment warning\u003c/h2\u003e\n\n\u003cp\u003eCISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a joint advisory warning critical infrastructure organizations to secure internet-exposed ATG systems. The advisory said recent malicious cyber activity involved threat actors compromising internet-exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the U.S. government has not attributed this recent activity to a nation-state or specific threat actor group. The advisory nonetheless describes ongoing attacks against exposed ATG systems and urges operators to take defensive action.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-described-in-the-advisory\"\u003eTechnical details described in the advisory\u003c/h2\u003e\n\n\u003cp\u003eThe federal agencies warned that threat actors target ATG systems by exploiting multiple kinds of security weaknesses. The article lists the following flaws and techniques referenced by the advisory:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHardcoded credentials.\u003c/li\u003e\n\u003cli\u003eAuthentication bypasses.\u003c/li\u003e\n\u003cli\u003eSQL injection vulnerabilities.\u003c/li\u003e\n\u003cli\u003eOS command execution flaws.\u003c/li\u003e\n\u003cli\u003ePrivilege escalation weaknesses.\u003c/li\u003e\n\u003cli\u003eCommand execution used to modify compromised systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says attackers can alter system settings after exploiting such flaws. CISA also cautioned that attackers could disable system alerts after successful compromise.\u003c/p\u003e\n\n\u003ch2 id=\"potential-impact\"\u003ePotential impact\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that compromised ATG systems could create safety and operational risks. If attackers disable alerts, organizations may face increased risk of leaks or equipment failures. CISA also warned that attacks could even cause permanent damage to targeted tank systems.\u003c/p\u003e\n\n\u003cp\u003eThe article separately notes that previously reported gas station incidents involved manipulated display readings but did not alter actual fuel levels. Even without physical damage in those incidents, the article says such activity raises concerns that attacks could hinder automated fuel leak detection and similar safety-related functions.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-data-from-shadowserver\"\u003eExposure data from Shadowserver\u003c/h2\u003e\n\n\u003cp\u003eFollowing CISA’s advisory, Shadowserver reported that more than 1,000 ATG systems were exposed online. Shadowserver said it added scanning of ATG systems to its Accessible ICS reporting and saw 1,061 IPs on June 5, 2026, on port 10001/tcp.\u003c/p\u003e\n\n\u003cp\u003eAccording to Shadowserver, the vast majority of those exposed devices were in the United States. The article reports that 909 exposed devices were located in the United States. Shadowserver also said it removed a large number of systems that appeared to be honeypots, including systems using ports 8001 and 9001.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended response\u003c/h2\u003e\n\n\u003cp\u003eThe article says critical infrastructure organizations should restrict remote access to ATG systems from the internet as soon as possible. It recommends implementing controlled access through firewalls, VPNs, or access control lists.\u003c/p\u003e\n\n\u003cp\u003eOrganizations are also advised to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReplace default passwords on vulnerable devices with strong credentials.\u003c/li\u003e\n\u003cli\u003eApply security updates.\u003c/li\u003e\n\u003cli\u003eMonitor systems for unauthorized changes.\u003c/li\u003e\n\u003cli\u003eImplement multi-factor authentication where possible.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"related-activity-involving-iranian-hackers\"\u003eRelated activity involving Iranian hackers\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA’s warning followed a May CNN report that Iranian hackers had breached internet-connected ATG systems at multiple gas stations across the United States. According to the article, Iranian hacking groups were linked to those incidents based on their previous history of targeting fuel management systems and other industrial control technologies.\u003c/p\u003e\n\n\u003cp\u003eIn those incidents, attackers reportedly hacked devices with weak or nonexistent passwords and manipulated display readings. The article states that they did not alter the actual fuel levels and that the incidents did not cause physical damage.\u003c/p\u003e\n\n\u003ch2 id=\"broader-industrial-control-system-context\"\u003eBroader industrial control system context\u003c/h2\u003e\n\n\u003cp\u003eThe article also references an April joint advisory from U.S. federal agencies that linked Iranian state-backed hackers to attacks targeting Rockwell Automation/Allen-Bradley PLC devices since March 2026. Those attacks reportedly caused financial losses and operational disruptions.\u003c/p\u003e\n\n\u003cp\u003eIt further notes that Censys later reported that 74.6%, or 3,891 hosts, of such exposed industrial control systems found globally were in the United States.\u003c/p\u003e\n","keyPoints":["Over 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks.","CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners issued a joint advisory urging critical infrastructure organizations to secure internet-exposed automatic tank gauge systems.","The advisory said attackers are exploiting issues including hardcoded credentials, authentication bypasses, SQL injection, OS command execution flaws, and privilege escalation weaknesses to modify compromised systems through command execution.","Shadowserver reported 1,061 exposed automatic tank gauge system IPs on June 5, 2026, with 909 of the devices located in the United States.","Critical infrastructure organizations are advised to restrict internet-based remote access, use firewalls, VPNs, or access control lists, replace default passwords, apply updates, monitor for unauthorized changes, and enable multi-factor authentication where possible."],"insights":["Shadowserver said it excluded a large number of apparent honeypots from its count, indicating the reported 1,061 exposed ATG IPs were filtered to focus on likely real systems.","The advisory warns that compromised ATG systems could have alerts disabled, which makes the operational risk about missed leaks or equipment failures rather than only manipulated readings.","The article notes that recent gas station incidents reportedly involved manipulated display readings without changes to actual fuel levels, showing that even non-destructive access can interfere with safety-related monitoring functions.","The exposed ATG systems were found on port 10001/tcp, giving operators a concrete network indicator to check when identifying internet-facing devices."],"referencedReports":[{"title":"Joint advisory warning critical infrastructure organizations to secure internet-exposed ATG systems","url":"https://www.ic3.gov/CSA/2026/260602.pdf","publisher":"CISA, FBI, NSA, U.S. Department of Energy, and other U.S. government partners","context":"The article cites this joint advisory as the source of the warning that internet-exposed automatic tank gauge systems are being compromised and modified through command execution.","category":"","primary":false}],"body":"\u003cp\u003eOver 900 automatic tank gauge systems in the United States have been found exposed online and vulnerable to ongoing attacks. These systems are used to monitor fuel, chemical, and other liquid storage tanks across critical infrastructure sectors. U.S. agencies warned that attackers are targeting internet-exposed ATG systems and modifying them through command execution.\u003c/p\u003e\n\n\u003cp\u003eThe joint advisory from CISA, the FBI, the NSA, the Department of Energy, and other U.S. government partners said attackers exploit flaws such as hardcoded credentials, authentication bypasses, SQL injection, OS command execution issues, and privilege escalation weaknesses. CISA warned that successful compromises could let attackers disable system alerts, increasing the risk of leaks, equipment failures, or permanent damage to tank systems. Shadowserver reported 1,061 exposed ATG IPs on June 5, 2026, with 909 in the United States.\u003c/p\u003e\n"},{"n":12,"title":"PCPJack Hijacks 230 AWS, Google Cloud, and Azure Servers for Covert SMTP Relay Network","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/pcpjack-hijacks-230-aws-google-cloud.html","time":"05:34","priority":"SHOULD READ","score":88,"tldr":"PCPJack hijacked about 230 AWS, Google Cloud, and Azure servers and turned them into a covert SMTP relay network, likely for large-scale email delivery such as spam or phishing. Hunt.io found the operation still active, with compromised hosts verified for outbound mail capability and synced to a downstream server every five minutes.","briefOverview":"\u003cp\u003ePCPJack hijacked cloud servers associated with Amazon Web Services, Google Cloud, and Microsoft Azure to create a covert SMTP email relay network. Hunt.io said compromised business servers across the U.S., Europe, and Asia were converted into SMTP proxies, verified for mail relay capability, and synced to a downstream consumer every five minutes. The infrastructure was still running when Hunt.io found it.\u003c/p\u003e\n\n\u003cp\u003eHunt.io found source code, compiled binaries, deployment state logs, internet scanners, exploitation tooling, and a live Sliver configuration after two unauthenticated open directories were left on a command-and-control server at 213.136.80[.]73. The open directories included a Sliver-integrated SMTP proxy deployment toolkit, Chisel tunneling and proxy binaries for multiple Linux CPU architectures, and deployer scripts for Linux beacons. On victim systems, the binary was dropped as a hidden dot-prefixed file and persisted at /var/tmp/.xs.\u003c/p\u003e\n\n\u003cp\u003eThe operation assigned each Sliver beacon a deterministic SOCKS5 proxy port derived from an MD5 hash of its Sliver UUID and initially used an SMTP quality gate that tested outbound access to smtp.gmail[.]com:587. A persistent Python daemon named chisel_verifier.py checked Chisel tunnel ports every 60 seconds, tested new ports for SMTP capability, and removed failed or dropped tunnels from the active pool. Verified proxies were enriched with exit IP address, country, and ASN and synced every five minutes via SCP to a downstream server at 38.242.204[.]245, but the final purpose of the operation remains unclear.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe threat actor known as PCPJack hijacked cloud servers tied to AWS, Google Cloud, and Microsoft Azure to build a covert SMTP email relay network. Hunt.io said compromised business servers in the U.S., Europe, and Asia were converted into SMTP proxies and checked for mail relay capability. The verified proxy list was synced to a downstream consumer every five minutes, and the infrastructure was still running when Hunt.io discovered it.\u003c/p\u003e\n\n\u003cp\u003eHunt.io found the operation after the actor left two unauthenticated open directories on a command-and-control server at 213.136.80[.]73. The exposed materials included source code, compiled binaries, deployment state logs, internet scanners, exploitation tooling, and a live Sliver configuration. The article notes that PCPJack was first discovered by SentinelOne in April 2026 as a credential theft framework targeting cloud services while removing processes or artifacts associated with TeamPCP.\u003c/p\u003e\n\n\u003cp\u003eOne open directory contained a Sliver-integrated SMTP proxy deployment toolkit, along with Chisel tunneling and proxy binaries for Linux architectures including AMD64, ARM64, and x86. On victim systems, the binary was dropped as a hidden dot-prefixed file and persisted at /var/tmp/.xs. Deployer scripts loaded the Sliver C2 client configuration and filtered for Linux beacons that had checked in within the previous ten minutes.\u003c/p\u003e\n\n\u003cp\u003eEach beacon received a SOCKS5 proxy port derived deterministically from an MD5 hash of its Sliver UUID and mapped into the 10000–14999 range. The article says this allowed the same beacon to map to the same port across runs without a shared port registry. The scripts also initially ran an SMTP quality gate that tested outbound access to smtp.gmail[.]com:587 and skipped hosts that failed the check.\u003c/p\u003e\n\n\u003cp\u003eHunt.io said later deployer script iterations removed the SMTP gate and batching logic. A diagnostic script checked active beacons for Chisel binaries, Chisel processes, disk space, C2 port 9000 reachability, and persistence artifacts such as cron entries or systemd services. The C2 server also ran chisel_verifier.py as a persistent daemon to enumerate Chisel tunnel ports every 60 seconds, test each new port for SMTP capability, and remove failed or dropped tunnels from the active pool.\u003c/p\u003e\n\n\u003cp\u003eVerified proxies were enriched with exit IP address, country, and ASN using services such as api.ipify[.]org and ip-api[.]com. The proxy lists were then synced every five minutes via SCP to a downstream server at 38.242.204[.]245, which was not accessible at the time of the article. Hunt.io said the observable result was a 230-node network and that the end goal remains unclear, though the infrastructure to deliver email at scale was running.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ePCPJack hijacked cloud servers associated with Amazon Web Services, Google Cloud, and Microsoft Azure to create a covert SMTP email relay network. Hunt.io said compromised business servers across the U.S., Europe, and Asia were quietly converted into SMTP proxies, verified for mail relay capability, and synced to a downstream consumer every five minutes.\u003c/p\u003e\n\n\u003cp\u003eAccording to Hunt.io, the infrastructure was still running when the company found it. The article describes the observable outcome as a 230-node network, but says the end goal of the operation remains unclear.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-exposed-infrastructure\"\u003eDiscovery and exposed infrastructure\u003c/h2\u003e\n\n\u003cp\u003eHunt.io found source code, compiled binaries, deployment state logs, internet scanners, exploitation tooling, and a live Sliver configuration. These materials were discovered after the operator left two open directories on a command-and-control server at 213.136.80[.]73 without authentication.\u003c/p\u003e\n\n\u003cp\u003eThe exposed files showed an SMTP proxy deployment operation built around Sliver and Chisel. One of the open directories contained a Sliver-integrated SMTP proxy deployment toolkit, along with Chisel tunneling and proxy binaries for several Linux CPU architectures, including AMD64, ARM64, and x86.\u003c/p\u003e\n\n\u003ch2 id=\"actor-context\"\u003eActor context\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the threat actor as PCPJack. It says PCPJack was first discovered by SentinelOne in April 2026 after SentinelOne identified a credential theft framework that specifically targets cloud services.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that PCPJack took steps to terminate and remove processes or artifacts associated with TeamPCP. TeamPCP is described in the article as another notorious hacking group that has drawn attention in recent months for software supply chain attacks.\u003c/p\u003e\n\n\u003ch2 id=\"victim-side-deployment\"\u003eVictim-side deployment\u003c/h2\u003e\n\n\u003cp\u003eOn victim systems, the binary was dropped as a hidden dot-prefixed file and persisted at \u003ccode\u003e/var/tmp/.xs\u003c/code\u003e. The deployment materials included scripts designed to load the Sliver C2 client configuration and filter for Linux beacons that had checked in within the previous ten minutes.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that beacons are implants that periodically phone home to the C2 server to check in and retrieve commands. The deployer processed beacons in a way that supported the SMTP proxy network and tunnel management.\u003c/p\u003e\n\n\u003ch2 id=\"proxy-port-assignment-and-smtp-filtering\"\u003eProxy port assignment and SMTP filtering\u003c/h2\u003e\n\n\u003cp\u003eEach beacon received a SOCKS5 proxy port derived deterministically from an MD5 hash of its Sliver UUID. The resulting port was mapped into the range \u003ccode\u003e10000-14999\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eHunt.io noted that this approach meant the same beacon always mapped to the same port across runs. The article says this removed the need for a shared port registry.\u003c/p\u003e\n\n\u003cp\u003eThe script was also capable of running an SMTP quality gate that probed for outbound access to \u003ccode\u003esmtp.gmail[.]com:587\u003c/code\u003e. Hosts that failed this check were skipped with an exit code of zero. Hunt.io said this gate defined the operation’s purpose because hosts unable to relay email had no value to the pipeline.\u003c/p\u003e\n\n\u003ch2 id=\"batch-handling-and-later-script-changes\"\u003eBatch handling and later script changes\u003c/h2\u003e\n\n\u003cp\u003eThe article says beacons were processed in batches of 50. The deployment flow included a 25-minute wait after uploads and a 15-minute wait after execution commands to accommodate slow-interval beacon check-ins.\u003c/p\u003e\n\n\u003cp\u003eSubsequent iterations of the deployer scripts removed the SMTP gate and the batching logic. The article does not determine whether the progression reflected a single operator iterating or multiple actors sharing the same infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"diagnostic-and-verification-tooling\"\u003eDiagnostic and verification tooling\u003c/h2\u003e\n\n\u003cp\u003eThe exposed directories also contained a diagnostic script that selected five active beacons and tasked each with a shell command. The checks looked for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChisel binaries at known drop paths.\u003c/li\u003e\n\u003cli\u003eA running Chisel process.\u003c/li\u003e\n\u003cli\u003eAvailable disk space.\u003c/li\u003e\n\u003cli\u003eReachability of port 9000 on the C2 server.\u003c/li\u003e\n\u003cli\u003ePersistence artifacts such as a cron entry or systemd service.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn addition, the C2 server ran a Python script named \u003ccode\u003echisel_verifier.py\u003c/code\u003e as a persistent background daemon. This script enumerated active Chisel tunnel ports with \u003ccode\u003ess -tlnp\u003c/code\u003e every 60 seconds, tested each new port for SMTP capability, and removed failed or dropped tunnels from the active pool.\u003c/p\u003e\n\n\u003ch2 id=\"proxy-enrichment-and-downstream-syncing\"\u003eProxy enrichment and downstream syncing\u003c/h2\u003e\n\n\u003cp\u003eVerified proxies were enriched with exit IP address, country, and ASN. The article says services such as \u003ccode\u003eapi.ipify[.]org\u003c/code\u003e and \u003ccode\u003eip-api[.]com\u003c/code\u003e were used for this enrichment.\u003c/p\u003e\n\n\u003cp\u003eThe proxy lists were then synced every five minutes via Secure Copy Protocol to a separate downstream server at \u003ccode\u003e38.242.204[.]245\u003c/code\u003e. The article states that this downstream server was not accessible at the time.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-unresolved-questions\"\u003eImpact and unresolved questions\u003c/h2\u003e\n\n\u003cp\u003eThe observable result was a 230-node SMTP proxy network built from hijacked cloud servers across major cloud providers. Hunt.io described the campaign as opportunistic and said the final purpose remains unclear.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that someone was consuming the verified proxy list synced every five minutes. Hunt.io said that whether the infrastructure was intended for spam, phishing, or something else could not be determined, but the infrastructure to deliver email at scale was clearly running.\u003c/p\u003e\n","keyPoints":["PCPJack hijacked cloud servers associated with AWS, Google Cloud, and Microsoft Azure to build a covert SMTP email relay network.","Hunt.io found source code, compiled binaries, deployment logs, scanners, exploitation tooling, and a live Sliver configuration in two unauthenticated open directories on a command-and-control server at 213.136.80[.]73.","The victim-side binary was dropped as a hidden dot-prefixed file and persisted at /var/tmp/.xs.","The deployment scripts checked Linux Sliver beacons, assigned each beacon a deterministic SOCKS5 proxy port, and initially skipped hosts that could not reach smtp.gmail[.]com:587.","Verified proxy lists were enriched with exit IP, country, and ASN data and synced every five minutes via SCP to a downstream server at 38.242.204[.]245."],"insights":["PCPJack’s deployment logic treated outbound SMTP reachability to smtp.gmail[.]com:587 as a value filter, showing that compromised hosts without mail relay capability were intentionally excluded from the pipeline.","The operation used deterministic SOCKS5 port assignment based on each Sliver beacon’s UUID, allowing the same compromised host to keep the same proxy port across runs without maintaining a shared port registry.","The proxy pool was continuously quality-controlled by a persistent chisel_verifier.py daemon that checked tunnel ports every 60 seconds and removed failed or dropped SMTP-capable tunnels.","Later deployer script iterations removed the SMTP gate and batching logic, indicating that the tooling changed over time while the infrastructure remained operational."],"referencedReports":[{"title":"PCPJack: 230 Cloud Servers SMTP Proxy Network with Sliver and Chisel","url":"https://hunt.io/blog/pcpjack-230-cloud-servers-smtp-proxy-network-sliver-chisel","publisher":"Hunt.io","context":"The article cites Hunt.io’s technical analysis as the source for findings about PCPJack’s hijacked cloud servers, open C2 directories, tooling, and SMTP proxy deployment pipeline.","category":"","primary":false}],"body":"\u003cp\u003ePCPJack hijacked cloud servers associated with Amazon Web Services, Google Cloud, and Microsoft Azure to create a covert SMTP email relay network. Hunt.io said compromised business servers across the U.S., Europe, and Asia were converted into SMTP proxies, verified for mail relay capability, and synced to a downstream consumer every five minutes. The infrastructure was still running when Hunt.io found it.\u003c/p\u003e\n\n\u003cp\u003eHunt.io found source code, compiled binaries, deployment state logs, internet scanners, exploitation tooling, and a live Sliver configuration after two unauthenticated open directories were left on a command-and-control server at 213.136.80[.]73. The open directories included a Sliver-integrated SMTP proxy deployment toolkit, Chisel tunneling and proxy binaries for multiple Linux CPU architectures, and deployer scripts for Linux beacons. On victim systems, the binary was dropped as a hidden dot-prefixed file and persisted at /var/tmp/.xs.\u003c/p\u003e\n\n\u003cp\u003eThe operation assigned each Sliver beacon a deterministic SOCKS5 proxy port derived from an MD5 hash of its Sliver UUID and initially used an SMTP quality gate that tested outbound access to smtp.gmail[.]com:587. A persistent Python daemon named chisel_verifier.py checked Chisel tunnel ports every 60 seconds, tested new ports for SMTP capability, and removed failed or dropped tunnels from the active pool. Verified proxies were enriched with exit IP address, country, and ASN and synced every five minutes via SCP to a downstream server at 38.242.204[.]245, but the final purpose of the operation remains unclear.\u003c/p\u003e\n"},{"n":20,"title":"Proto6: The Schema Was Not Supposed to Run | Cyera Research","source":"cyera.com","sourceColorIdx":9,"link":"https://www.cyera.com/research/proto6-the-schema-was-not-supposed-to-run","time":"12:56","priority":"SHOULD READ","score":88,"tldr":"Cyera Research found six protobuf.js vulnerabilities that can enable remote code execution or denial of service when attacker-controlled schemas, descriptors, polluted prototypes, or deeply nested protobuf messages reach code generation or decoding paths. Users should upgrade protobuf.js and protobufjs-cli to the fixed versions, especially if they process untrusted schemas or protobuf data.","briefOverview":"\u003cp\u003eCyera Research found six vulnerabilities in protobuf.js, a JavaScript implementation of Protocol Buffers with over 48 million weekly npm downloads. The issues can enable remote code execution or denial of service when attacker-controlled schema-derived data reaches protobuf.js code generation or decoding paths. The affected areas include runtime encoding and decoding, descriptor handling, generated constructors, option path handling, recursive message decoding, and the pbjs static code-generation CLI.\u003c/p\u003e\n\n\u003cp\u003eThe most significant runtime RCE chain requires a separate prototype pollution bug elsewhere in the Node.js process. After pollution, protobuf.js can resolve an attacker-controlled type string through inherited properties, treat it as a valid primitive, insert it into generated encoder or decoder source, and compile it with Function(). A separate pbjs static generation issue does not require prototype pollution and can turn crafted schema names into JavaScript that executes when generated files are imported.\u003c/p\u003e\n\n\u003cp\u003eCyera also demonstrated real-world denial-of-service impact against Baileys WhatsApp bots and a Google Cloud Functions Pub/Sub decoding pattern using deeply nested recursive protobuf payloads. In both cases, recursive decoding can crash the process, and message persistence or redelivery can cause repeated crashes. All issues were fixed in protobuf.js 7.5.6 and 8.0.2, and in protobufjs-cli 1.2.1 and 2.0.2.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u0
