window.__DL_ARTICLES = [{"n":6,"title":"Shai-Hulud Descends to Hades: Miasma Worm Campaign Spreads with New PyPI Wave","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/shai-hulud-descends-to-hades-miasma-pypi-wave?utm_medium=feed","time":"05:30","priority":"MUST READ","score":94,"tldr":"Socket found a coordinated PyPI supply-chain compromise tied to the Shai-Hulud/Miasma lineage, with 37 malicious wheels across 19 packages using Python .pth startup execution to download Bun and run an obfuscated JavaScript credential stealer. Affected users should remove the malicious releases, rebuild environments where possible, and rotate developer, CI/CD, package registry, and cloud credentials.","briefOverview":"\u003cp\u003eSocket detected a coordinated PyPI compromise involving 37 malicious wheel artifacts across 19 packages. The affected releases shipped a \u003ccode\u003e*-setup.pth\u003c/code\u003e file that attempts to execute during Python startup, download the Bun JavaScript runtime, and run an obfuscated JavaScript payload named \u003ccode\u003e_index.js\u003c/code\u003e. Socket linked the activity to the Shai-Hulud / Miasma lineage and describes this Hades-themed wave as a PyPI branch of that broader campaign.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets developer and CI/CD secrets across source control, package registries, cloud providers, Kubernetes, Vault, SSH keys, Docker configs, shell histories, \u003ccode\u003e.env\u003c/code\u003e files, and AI developer tooling such as Claude/MCP configs. The payload includes GitHub-centric exfiltration logic, including public repository creation, encrypted result commits, and GitHub Actions artifact exfiltration. Socket says it is tracking 448 affected artifacts across npm and PyPI, including 411 npm artifacts across 106 packages and 37 PyPI wheels across 19 projects.\u003c/p\u003e\n\n\u003cp\u003eThe malicious wheels abuse Python \u003ccode\u003e.pth\u003c/code\u003e startup behavior, which can execute lines beginning with \u003ccode\u003eimport\u003c/code\u003e when Python starts, without requiring the compromised package to be imported. The loader tries to create a \u003ccode\u003e.bun_ran\u003c/code\u003e sentinel, locate \u003ccode\u003e_index.js\u003c/code\u003e, download Bun \u003ccode\u003ev1.3.13\u003c/code\u003e from GitHub if needed, and execute the payload with \u003ccode\u003ebun run\u003c/code\u003e. Socket recommends that affected organizations remove or pin away from the malicious releases, rebuild affected environments where possible, and rotate credentials exposed to affected developer machines or CI jobs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket reported a coordinated PyPI compromise involving 37 malicious wheel artifacts across 19 packages. The compromised releases contained a \u003ccode\u003e*-setup.pth\u003c/code\u003e file designed to execute during Python startup, download Bun, and run an obfuscated JavaScript payload named \u003ccode\u003e_index.js\u003c/code\u003e. Socket’s AI malware detection system identified the malicious cluster minutes after publication, and PyPI had already quarantined a number of affected releases at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eSocket ties the wave to Shai-Hulud / Miasma tradecraft rather than treating it as a standalone Python malware incident. The article says the payload uses Bun as its execution engine, which is described as a key fingerprint of this family because Shai-Hulud-style payloads download and install Bun even when another runtime might be expected. The campaign marker changed from earlier Zelda-themed references to Hades-themed GitHub exfiltration markers, including the repository description \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e and generated names such as \u003ccode\u003estygian\u003c/code\u003e, \u003ccode\u003etartarean\u003c/code\u003e, \u003ccode\u003ecerberus\u003c/code\u003e, \u003ccode\u003echaron\u003c/code\u003e, \u003ccode\u003estyx\u003c/code\u003e, \u003ccode\u003elethe\u003c/code\u003e, \u003ccode\u003ethanatos\u003c/code\u003e, and \u003ccode\u003epersephone\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe affected PyPI artifacts appear to span a single maintainer-account takeover, with consecutive patch releases mass-published across the author’s portfolio. Socket says the main risk concentrates in established bioinformatics tools such as \u003ccode\u003edynamo-release\u003c/code\u003e, \u003ccode\u003espateo-release\u003c/code\u003e, \u003ccode\u003ecoolbox\u003c/code\u003e, \u003ccode\u003eufish\u003c/code\u003e, and \u003ccode\u003enapari-ufish\u003c/code\u003e, while other low-traffic agent, task-execution, function-description, and lab-utility libraries were also caught in the same blast. The broader campaign tracking page listed 448 affected artifacts across npm and PyPI at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the malicious wheels contained \u003ccode\u003e_index.js\u003c/code\u003e and a \u003ccode\u003e*-setup.pth\u003c/code\u003e startup hook. The loader attempts to create a temp-directory sentinel named \u003ccode\u003e.bun_ran\u003c/code\u003e, locate \u003ccode\u003e_index.js\u003c/code\u003e, download Bun \u003ccode\u003ev1.3.13\u003c/code\u003e from GitHub under the temp directory, run \u003ccode\u003ebun run _index.js\u003c/code\u003e, and avoid repeated execution. Socket notes an implementation detail that defenders should validate exploitability per artifact because in standard CPython, \u003ccode\u003e__file__\u003c/code\u003e can resolve to \u003ccode\u003esite.py\u003c/code\u003e rather than the \u003ccode\u003e.pth\u003c/code\u003e file, which may affect whether this exact loader automatically finds the adjacent payload.\u003c/p\u003e\n\n\u003cp\u003eThe recovered payload is a broad developer and cloud credential stealer targeting GitHub, npm, PyPI, RubyGems, JFrog, CircleCI, Anthropic, AWS, GCP, Azure, Kubernetes, Vault, SSH keys, Docker configs, shell histories, \u003ccode\u003e.env\u003c/code\u003e files, \u003ccode\u003e.npmrc\u003c/code\u003e, \u003ccode\u003e.pypirc\u003c/code\u003e, Claude/MCP configs, and other local or runner-accessible credentials. Exfiltration logic includes GitHub repository creation, commits of encrypted and compressed result envelopes, and GitHub Actions artifact uploads. The article recommends removing or pinning away from the malicious releases, rebuilding affected environments where possible, rotating exposed credentials, and searching systems and GitHub organizations for the listed indicators.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket detected a coordinated PyPI compromise involving 37 malicious wheel artifacts across 19 packages. The compromised releases shipped a \u003ccode\u003e*-setup.pth\u003c/code\u003e file that attempts to execute automatically during Python startup, download the Bun JavaScript runtime, and run an obfuscated JavaScript payload named \u003ccode\u003e_index.js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eSocket identified the malicious package cluster minutes after publication using its AI malware detection system. The company attributes the tradecraft to the Shai-Hulud / Miasma lineage and describes this Hades-themed PyPI wave as a branch of the same Mini Shai-Hulud / Miasma campaign rather than as a standalone Python malware incident.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-context\"\u003eCampaign Context\u003c/h2\u003e\n\n\u003cp\u003eThe article says the campaign is cross-runtime: Python packages act as the delivery vehicle, but the payload runs under Bun as a heavily obfuscated JavaScript stealer. Socket identifies Bun staging as a key fingerprint of this malware family because Shai-Hulud-style payloads download and install Bun rather than assuming Node.js, Python, or another local runtime is available.\u003c/p\u003e\n\n\u003cp\u003eThe campaign marker changed from earlier Shai-Hulud / Miasma waves. Earlier reporting tied a Red Hat Cloud Services wave to the Zelda-themed marker \u003ccode\u003eMiasma: The Spreading Blight\u003c/code\u003e, while this PyPI wave uses Hades-themed GitHub exfiltration markers. Recovered markers include the repository description \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e and generated repository-name components such as \u003ccode\u003estygian\u003c/code\u003e, \u003ccode\u003etartarean\u003c/code\u003e, \u003ccode\u003ecerberus\u003c/code\u003e, \u003ccode\u003echaron\u003c/code\u003e, \u003ccode\u003estyx\u003c/code\u003e, \u003ccode\u003elethe\u003c/code\u003e, \u003ccode\u003ethanatos\u003c/code\u003e, and \u003ccode\u003epersephone\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eSocket says it is tracking 448 affected artifacts across npm and PyPI in the broader campaign. This includes 411 npm artifacts across 106 packages and 37 malicious PyPI wheels across 19 projects. At the time of writing, PyPI had already quarantined a number of affected releases, and Socket reported the remaining ones to the PyPI security team.\u003c/p\u003e\n\n\u003ch2 id=\"affected-pypi-packages\"\u003eAffected PyPI Packages\u003c/h2\u003e\n\n\u003cp\u003eThe 37 compromised PyPI artifacts span 19 packages and appear to come from a single maintainer-account takeover. The article says consecutive patch releases were mass-published across the author\u0026rsquo;s portfolio at once.\u003c/p\u003e\n\n\u003cp\u003eSocket says the risk is concentrated in established bioinformatics tools, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edynamo-release\u003c/code\u003e, associated with the \u003ccode\u003earistoteleo/dynamo\u003c/code\u003e single-cell RNA-velocity and expression-dynamics framework.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003espateo-release\u003c/code\u003e, described as a spatial-transcriptomics sibling.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecoolbox\u003c/code\u003e, described as GangCaoLab\u0026rsquo;s Jupyter-based multi-omics genomic visualization toolkit for Hi-C, ChIP-Seq, and RNA-Seq tracks.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eufish\u003c/code\u003e and \u003ccode\u003enapari-ufish\u003c/code\u003e, described as deep-learning FISH spot-detection tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these tools are real and widely used in the research community, with cumulative download totals in the low-to-mid hundreds of thousands. It describes the remaining affected packages as lower-traffic agent, task-execution, function-description, and lab-utility libraries that were caught in the same blast rather than independently valuable targets.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-wheel-structure\"\u003eMalicious Wheel Structure\u003c/h2\u003e\n\n\u003cp\u003eSocket observed a simple and suspicious pattern in the malicious wheels:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA JavaScript payload named \u003ccode\u003e_index.js\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA \u003ccode\u003e*-setup.pth\u003c/code\u003e file.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe \u003ccode\u003e*-setup.pth\u003c/code\u003e file contains a single executable Python line. Python’s \u003ccode\u003esite\u003c/code\u003e module processes \u003ccode\u003e.pth\u003c/code\u003e files during interpreter startup, and lines beginning with \u003ccode\u003eimport\u003c/code\u003e followed by a space or tab are executed. This means the attacker can attempt startup execution after installation without requiring the victim to import the compromised package.\u003c/p\u003e\n\n\u003ch2 id=\"loader-behavior\"\u003eLoader Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe loader attempts to perform the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreate a sentinel file at \u003ccode\u003etempfile.gettempdir()/.bun_ran\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eLocate \u003ccode\u003e_index.js\u003c/code\u003e next to the package or one subdirectory below it.\u003c/li\u003e\n\u003cli\u003eDownload Bun \u003ccode\u003ev1.3.13\u003c/code\u003e from GitHub if no cached Bun binary exists under the temp directory.\u003c/li\u003e\n\u003cli\u003eRun \u003ccode\u003ebun run _index.js\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eWrite the sentinel to avoid repeated execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket highlights an implementation caveat for defenders. In standard CPython, executable \u003ccode\u003e.pth\u003c/code\u003e lines are processed by the \u003ccode\u003esite\u003c/code\u003e module, and \u003ccode\u003e__file__\u003c/code\u003e can resolve to \u003ccode\u003esite.py\u003c/code\u003e rather than to the \u003ccode\u003e.pth\u003c/code\u003e file. Socket says a local CPython reproduction of this loader shape did not automatically resolve the adjacent package \u003ccode\u003e_index.js\u003c/code\u003e through \u003ccode\u003eos.path.dirname(__file__)\u003c/code\u003e, so exploitability should be validated per artifact even though the wheels remain malicious.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-pth-mechanism-matters\"\u003eWhy the \u003ccode\u003e.pth\u003c/code\u003e Mechanism Matters\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that \u003ccode\u003e.pth\u003c/code\u003e files are a legitimate Python startup feature used to add paths to \u003ccode\u003esys.path\u003c/code\u003e and support import hooks. Python also supports executable lines beginning with \u003ccode\u003eimport\u003c/code\u003e, and those lines can run at every Python startup.\u003c/p\u003e\n\n\u003cp\u003eSocket says this turns a compromised wheel into a delayed execution trigger. The next \u003ccode\u003epython\u003c/code\u003e, \u003ccode\u003epip\u003c/code\u003e, test run, notebook kernel, CI job, or package-management command that starts Python may process the malicious \u003ccode\u003e.pth\u003c/code\u003e file.\u003c/p\u003e\n\n\u003cp\u003eThe article compares this to npm install hooks used in Shai-Hulud and Miasma activity. The syntax differs, but the security consequence is similar: dependency installation creates an execution edge before application code is reviewed or invoked.\u003c/p\u003e\n\n\u003ch2 id=\"payload-deobfuscation\"\u003ePayload Deobfuscation\u003c/h2\u003e\n\n\u003cp\u003eSocket’s static deobfuscation of \u003ccode\u003e_index.js\u003c/code\u003e recovered multiple layers:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eAn outer JavaScript wrapper using \u003ccode\u003etry { eval(...) }\u003c/code\u003e, a large character-code array, and a ROT-style alphabet substitution.\u003c/li\u003e\n\u003cli\u003eAn AES-GCM loader that imports \u003ccode\u003enode:crypto\u003c/code\u003e, decrypts two AES-128-GCM blobs, writes the main payload to a random \u003ccode\u003e/tmp/p*.js\u003c/code\u003e file, and runs it with Bun.\u003c/li\u003e\n\u003cli\u003eA Bun bootstrapper that downloads Bun from \u003ccode\u003ehttps://github.com/oven-sh/bun/releases/download/bun-v1.3.13/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA main JavaScript payload using a rotated string table, a custom PBKDF2/SHA256-based string decoder, and an additional AES-256-GCM plus gzip string layer.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe submitted \u003ccode\u003e_index.js\u003c/code\u003e sample begins with a \u003ccode\u003etry{eval(...)}\u003c/code\u003e wrapper and a long character-code array, matching the obfuscated first stage Socket recovered during static analysis.\u003c/p\u003e\n\n\u003ch2 id=\"credential-theft-capabilities\"\u003eCredential Theft Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe recovered payload is described as a broad developer and cloud credential stealer. It targets:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub credentials, GitHub Actions runner secrets, runner memory, and \u003ccode\u003eghs_*\u003c/code\u003e tokens.\u003c/li\u003e\n\u003cli\u003enpm, PyPI, RubyGems, JFrog, CircleCI, Anthropic, and package-publishing tokens.\u003c/li\u003e\n\u003cli\u003eAWS credentials, STS identity, SSM Parameter Store, and Secrets Manager.\u003c/li\u003e\n\u003cli\u003eGCP identity, projects, and Secret Manager.\u003c/li\u003e\n\u003cli\u003eAzure identity and Key Vault material.\u003c/li\u003e\n\u003cli\u003eKubernetes service-account tokens and cluster secrets.\u003c/li\u003e\n\u003cli\u003eVault tokens and Vault secrets.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.env\u003c/code\u003e, \u003ccode\u003e.npmrc\u003c/code\u003e, \u003ccode\u003e.pypirc\u003c/code\u003e, Git credentials, shell histories, SSH keys, Docker configs, cloud CLI caches, Claude/MCP configs, wallet/app data, and other developer-machine secrets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket says this target list closely matches the Shai-Hulud / Miasma operating model: stealing credentials that can unlock package publishing, source control, cloud infrastructure, and CI/CD pipelines, then using that access to deepen or propagate compromise.\u003c/p\u003e\n\n\u003ch2 id=\"exfiltration-paths\"\u003eExfiltration Paths\u003c/h2\u003e\n\n\u003cp\u003eThe payload includes multiple exfiltration paths.\u003c/p\u003e\n\n\u003ch3 id=\"direct-https-exfiltration\"\u003eDirect HTTPS Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eThe payload contains a direct HTTPS sender configured for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eapi.anthropic.com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/v1/api\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003ePort \u003ccode\u003e443\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that \u003ccode\u003eapi.anthropic.com\u003c/code\u003e is Anthropic\u0026rsquo;s real API host, but both \u003ccode\u003eGET\u003c/code\u003e and \u003ccode\u003ePOST\u003c/code\u003e requests to \u003ccode\u003ehttps://api.anthropic.com/v1/api\u003c/code\u003e return Anthropic\u0026rsquo;s standard \u003ccode\u003e404 not_found_error\u003c/code\u003e. Socket says this means the channel cannot deliver data to the attacker, and there is no indication Anthropic systems were compromised. Socket assesses the purpose as network-log camouflage, while GitHub remains the family’s confirmed exfiltration channel.\u003c/p\u003e\n\n\u003ch3 id=\"github-repository-exfiltration\"\u003eGitHub Repository Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eThe payload can create public repositories using \u003ccode\u003ePOST /user/repos\u003c/code\u003e and commit encrypted and compressed result envelopes under paths such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eresults/results-\u0026lt;timestamp\u0026gt;-\u0026lt;counter\u0026gt;.json\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eRecovered GitHub markers include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRepository description: \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCommit marker: \u003ccode\u003eIfYouYankThisTokenItWillNukeTheComputerOfTheOwnerFully\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"github-actions-artifact-exfiltration\"\u003eGitHub Actions Artifact Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eEmbedded workflow logic writes GitHub Actions secrets to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eformat-results.txt\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt then uploads an artifact named:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eformat-results\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe recovered workflow name is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eRun Copilot\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evasion-and-environment-checks\"\u003eEvasion and Environment Checks\u003c/h2\u003e\n\n\u003cp\u003eThe payload contains checks for Russian locale and environmental signals. It also checks for StepSecurity and \u003ccode\u003eharden-runner\u003c/code\u003e indicators.\u003c/p\u003e\n\n\u003cp\u003eThe payload includes decoy-token prefix checks covering GitHub, npm, Anthropic, CircleCI, and AWS-style secrets. Socket describes this as another continuity point with the broader Shai-Hulud family, because the payload is not simply grabbing environment variables but is trying to identify instrumented environments, avoid some decoys, and focus on high-value credential material.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-follow-on-artifacts\"\u003ePersistence and Follow-On Artifacts\u003c/h2\u003e\n\n\u003cp\u003eRecovered persistence and follow-on indicators include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003egh-token-monitor\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGitHub Commit Monitor\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/gh-token-monitor/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/bin/gh-token-monitor.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/systemd/user/gh-token-monitor.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/Library/LaunchAgents/com.github.token-monitor.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/share/updater/update.py\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.claude/setup.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/setup.js\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes the Claude/MCP and GitHub workflow artifacts in the broader context of recent Shai-Hulud-like campaigns. Socket says these campaigns have moved beyond package-manager hooks into AI developer toolchains, MCP configuration, IDE/editor hooks, and workflow-level persistence.\u003c/p\u003e\n\n\u003ch2 id=\"detection-opportunities\"\u003eDetection Opportunities\u003c/h2\u003e\n\n\u003cp\u003eSocket recommends high-confidence static detection for PyPI wheels containing the following behavior chain:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.pth\u003c/code\u003e executable import line.\u003c/li\u003e\n\u003cli\u003eRemote runtime or executable download.\u003c/li\u003e\n\u003cli\u003eTemp-directory binary installation.\u003c/li\u003e\n\u003cli\u003eSubprocess execution.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_index.js\u003c/code\u003e or JavaScript payload handoff.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSpecific strings from this wave include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.bun_ran\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_index.js\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eoven-sh/bun/releases/download\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebun-v1.3.13\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eurllib.request\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eurlretrieve\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esubprocess\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etempfile.gettempdir\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebun run\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eexec(\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket cautions that generic detection should not depend on the exact Bun version, sentinel name, or payload filename because those can easily change. The stronger detection pattern is executable \u003ccode\u003e.pth\u003c/code\u003e plus network retrieval plus subprocess execution plus staged JavaScript payload.\u003c/p\u003e\n\n\u003cp\u003eRuntime indicators include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epython -\u0026gt; bun\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epython -\u0026gt; network request to github.com/oven-sh/bun/releases/download/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epython -\u0026gt; writes tempdir/b.zip\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epython -\u0026gt; writes tempdir/b/bun\u003c/code\u003e or \u003ccode\u003etempdir/b/bun.exe\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebun -\u0026gt; runs _index.js\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebun\u003c/code\u003e or a node-like runtime making outbound HTTPS requests to \u003ccode\u003eapi.anthropic.com/v1/api\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFilesystem indicators include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e%TEMP%\\.bun_ran\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/b.zip\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e%TEMP%\\b.zip\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/b/bun\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e%TEMP%\\b\\bun.exe\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_index.js\u003c/code\u003e inside \u003ccode\u003esite-packages\u003c/code\u003e or package subdirectories\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e*-setup.pth\u003c/code\u003e inside \u003ccode\u003esite-packages\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGitHub and CI indicators include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eHades - The End for the Damned\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eIfYouYankThisTokenItWillNukeTheComputerOfTheOwnerFully\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eRun Copilot\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eformat-results\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eresults/results-*.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eUnexpected \u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e changes\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eSocket recommends that organizations which installed any affected version should:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemove or pin away from the malicious releases.\u003c/li\u003e\n\u003cli\u003eRebuild affected environments where possible.\u003c/li\u003e\n\u003cli\u003eRotate credentials available to affected developer machines or CI jobs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says rotation and review should be prioritized for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub personal access tokens, GitHub App tokens, GitHub Actions secrets, and repository deploy keys.\u003c/li\u003e\n\u003cli\u003ePyPI, npm, RubyGems, JFrog, and other package-publishing tokens.\u003c/li\u003e\n\u003cli\u003eAWS, GCP, Azure, Kubernetes, and Vault credentials.\u003c/li\u003e\n\u003cli\u003eSSH keys, Docker credentials, Git credential helpers, cloud CLI profiles, and shell history secrets.\u003c/li\u003e\n\u003cli\u003eAnthropic, CircleCI, Claude/MCP, and other developer-tool tokens.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket also recommends searching local systems, CI workers, and GitHub organizations for the indicators in the article. Any GitHub repository created with the Hades marker, any \u003ccode\u003eformat-results\u003c/code\u003e artifact, or any suspicious workflow named \u003ccode\u003eRun Copilot\u003c/code\u003e should be treated as a likely exfiltration artifact.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists 37 malicious PyPI artifacts across 19 packages, including affected versions of \u003ccode\u003ebramin\u003c/code\u003e, \u003ccode\u003ecmd2func\u003c/code\u003e, \u003ccode\u003ecoolbox\u003c/code\u003e, \u003ccode\u003edynamo-release\u003c/code\u003e, \u003ccode\u003eexecutor-engine\u003c/code\u003e, \u003ccode\u003eexecutor-http\u003c/code\u003e, \u003ccode\u003efuncdesc\u003c/code\u003e, \u003ccode\u003emagique\u003c/code\u003e, \u003ccode\u003emagique-ai\u003c/code\u003e, \u003ccode\u003emrbios\u003c/code\u003e, \u003ccode\u003enapari-ufish\u003c/code\u003e, \u003ccode\u003enucbox\u003c/code\u003e, \u003ccode\u003eokite\u003c/code\u003e, \u003ccode\u003epantheon-agents\u003c/code\u003e, \u003ccode\u003epantheon-toolsets\u003c/code\u003e, \u003ccode\u003espateo-release\u003c/code\u003e, \u003ccode\u003esynago\u003c/code\u003e, \u003ccode\u003eufish\u003c/code\u003e, and \u003ccode\u003euprobe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eSocket also provides \u003ccode\u003e_index.js\u003c/code\u003e SHA256 hashes for two variants:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edc48b09b2a5954f7ff79ab8a2fd80202bd3b59c08c7cdbc6025aa923cb4c0efe\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ee1342a80d4b5e83d2c7c22e1e0aaa95f2d88e3dbf0d853a4994b180c93a4b17d\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe \u003ccode\u003e*-setup.pth\u003c/code\u003e SHA256 hash, identical across all affected artifacts, is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ec539766062555d47716f8432e73adbe3a0c0c954a0b6c4005017a668975e275c\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists the files \u003ccode\u003e*-setup.pth\u003c/code\u003e and \u003ccode\u003e_index.js\u003c/code\u003e, loader strings such as \u003ccode\u003e.bun_ran\u003c/code\u003e, \u003ccode\u003ebun-v1.3.13\u003c/code\u003e, and \u003ccode\u003eoven-sh/bun/releases/download\u003c/code\u003e, the network indicator \u003ccode\u003ehxxps://api[.]anthropic[.]com/v1/api\u003c/code\u003e, and GitHub exfiltration markers such as \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e, \u003ccode\u003eIfYouYankThisTokenItWillNukeTheComputerOfTheOwnerFully\u003c/code\u003e, \u003ccode\u003eresults/results-*.json\u003c/code\u003e, \u003ccode\u003eformat-results\u003c/code\u003e, and \u003ccode\u003eRun Copilot\u003c/code\u003e.\u003c/p\u003e\n","keyPoints":["Socket detected a coordinated PyPI compromise involving 37 malicious wheel artifacts across 19 packages.","The compromised releases shipped a *-setup.pth file that attempts to execute during Python startup, download Bun v1.3.13 from GitHub, and run an obfuscated JavaScript payload named _index.js.","Socket linked the PyPI wave to the Mini Shai-Hulud/Miasma lineage based on tradecraft including Bun staging, obfuscated JavaScript, credential theft targets, and GitHub-centric exfiltration markers.","The recovered payload targets developer and CI/CD secrets including GitHub, npm, PyPI, RubyGems, JFrog, CircleCI, Anthropic, AWS, GCP, Azure, Kubernetes, Vault, SSH keys, Docker configs, .env files, .npmrc, and .pypirc.","The article recommends that organizations which installed affected versions remove or pin away from the malicious releases, rebuild affected environments where possible, and rotate credentials available to affected developer machines or CI jobs."],"insights":["The campaign’s use of Bun is a strong family fingerprint because Shai-Hulud-style payloads download and install Bun even in ecosystems where another runtime, such as Node.js or Python, would normally be expected.","The malicious .pth loader may not reliably locate the adjacent _index.js payload in standard CPython because __file__ can resolve to site.py rather than the .pth file, so defenders should validate exploitability per artifact while still treating the wheels as malicious.","The apparent Anthropic exfiltration endpoint uses Anthropic’s real API host but a non-live /v1/api route, and the article assesses it as network-log camouflage rather than evidence that Anthropic systems were compromised.","The shift from Zelda-themed Miasma markers to Hades-themed GitHub repository descriptions and names indicates an ecosystem-specific PyPI branch of the same Mini Shai-Hulud/Miasma lineage rather than an unrelated Python malware incident.","Detection should focus on the behavior chain of executable .pth files plus remote runtime download, tempdir binary installation, subprocess execution, and JavaScript payload handoff rather than on easily changed strings such as the Bun version, sentinel name, or _index.js filename."],"referencedReports":[],"body":"\u003cp\u003eSocket detected a coordinated PyPI compromise involving 37 malicious wheel artifacts across 19 packages. The affected releases shipped a \u003ccode\u003e*-setup.pth\u003c/code\u003e file that attempts to execute during Python startup, download the Bun JavaScript runtime, and run an obfuscated JavaScript payload named \u003ccode\u003e_index.js\u003c/code\u003e. Socket linked the activity to the Shai-Hulud / Miasma lineage and describes this Hades-themed wave as a PyPI branch of that broader campaign.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets developer and CI/CD secrets across source control, package registries, cloud providers, Kubernetes, Vault, SSH keys, Docker configs, shell histories, \u003ccode\u003e.env\u003c/code\u003e files, and AI developer tooling such as Claude/MCP configs. The payload includes GitHub-centric exfiltration logic, including public repository creation, encrypted result commits, and GitHub Actions artifact exfiltration. Socket says it is tracking 448 affected artifacts across npm and PyPI, including 411 npm artifacts across 106 packages and 37 PyPI wheels across 19 projects.\u003c/p\u003e\n\n\u003cp\u003eThe malicious wheels abuse Python \u003ccode\u003e.pth\u003c/code\u003e startup behavior, which can execute lines beginning with \u003ccode\u003eimport\u003c/code\u003e when Python starts, without requiring the compromised package to be imported. The loader tries to create a \u003ccode\u003e.bun_ran\u003c/code\u003e sentinel, locate \u003ccode\u003e_index.js\u003c/code\u003e, download Bun \u003ccode\u003ev1.3.13\u003c/code\u003e from GitHub if needed, and execute the payload with \u003ccode\u003ebun run\u003c/code\u003e. Socket recommends that affected organizations remove or pin away from the malicious releases, rebuild affected environments where possible, and rotate credentials exposed to affected developer machines or CI jobs.\u003c/p\u003e\n"},{"n":1,"title":"Silent Ransom Group targets law firms with fake IT support calls","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/silent-ransom-group-targets-law-firms-with-fake-it-support-calls/","time":"14:09","priority":"SHOULD READ","score":88,"tldr":"Silent Ransom Group is targeting U.S. law firms with fake IT support calls that trick employees into granting remote access, enabling attackers to steal sensitive client and financial data within hours. The group now focuses on rapid data-theft extortion rather than ransomware encryption, using aggressive ransom demands and threats to contact clients directly.","briefOverview":"\u003cp\u003eSilent Ransom Group is actively targeting U.S. law firms and professional services organizations with social engineering attacks that can lead to data theft within hours of first contact, according to Mandiant. The group is tracked as UNC3753, Luna Moth, and Chatty Spider, and Mandiant said it targeted dozens of organizations in the legal, financial, and professional services sectors between January and May 2026. The report follows an FBI FLASH advisory warning that the group was targeting U.S. law firms through social engineering and even in-person data theft attacks.\u003c/p\u003e\n\n\u003cp\u003eThe attacks begin with invoice-themed phishing emails from consumer email accounts that contain no malicious links or attachments. Attackers then follow up by phone while impersonating corporate IT staff and convince employees to join remote support sessions using platforms such as Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services. During those sessions, victims are tricked into installing remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps.\u003c/p\u003e\n\n\u003cp\u003eOnce inside a network, the group searches for sensitive legal and financial documents, including contracts, tax records, Social Security numbers, and merger or acquisition files. Mandiant said the attackers commonly target document management platforms and cloud storage repositories before exfiltrating data with tools such as WinSCP or Rclone. The extortion operation is described as highly aggressive, with ransom demands often arriving within 30 minutes of the attackers leaving the victim environment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMandiant reported that Silent Ransom Group is actively targeting U.S. law firms and professional services organizations in social engineering attacks that can lead to data theft within hours. The group is tracked as UNC3753, Luna Moth, and Chatty Spider, and Mandiant said it targeted dozens of organizations across the legal, financial, and professional services sectors between January and May 2026. The report follows an FBI FLASH advisory that warned the group was targeting U.S. law firms with social engineering and in-person data theft attacks.\u003c/p\u003e\n\n\u003cp\u003eMandiant said legal services firms are high-value targets because they maintain sensitive client transaction files, merger and acquisition plans, trade secrets, and corporate regulatory reports. The report states that threat groups recognize legal entities face reputational and regulatory exposure and may be motivated to resolve extortion situations quietly. This makes law firms especially attractive for data-theft extortion operations.\u003c/p\u003e\n\n\u003cp\u003eThe attacks start with invoice-themed phishing emails sent from consumer email accounts, but the emails do not include malicious links or attachments. Instead, they act as a precursor to follow-up calls from attackers impersonating corporate IT staff. The attackers then convince employees to join remote support sessions through Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services.\u003c/p\u003e\n\n\u003cp\u003eDuring the remote sessions, the attackers trick targets into installing remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps. Mandiant also identified phishing domains that impersonate internal IT portals using naming patterns such as organization-specific IT desk or help desk domains. The attackers also use privnote.com to share installation links and commands, which Mandiant said helps reduce forensic artifacts in browser histories or corporate chat logs.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining access, the group searches for sensitive legal and financial documents, including contracts, tax records, Social Security numbers, and merger or acquisition files. The attackers commonly target document management platforms and cloud storage repositories and exfiltrate data using tools such as WinSCP or Rclone. Mandiant said ransom demands often arrive within 30 minutes after the attackers leave the victim environment and give organizations three days to respond.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the FBI warned of suspected in-person data theft activity in which attackers impersonate internal IT staff and attempt to physically visit offices to image computers or create backups while stealing files. Mandiant said there was limited forensic evidence, but the suspected in-person activity is likely linked to UNC3753 based on similarities in targeting, timelines, and operational behavior. Resecurity separately reported that the group uses DNS fast-flux infrastructure with residential IP addresses across multiple countries and ISPs to protect data-leak platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSilent Ransom Group is actively targeting U.S. law firms and professional services organizations in social engineering attacks, according to a new report from Mandiant. The attacks often lead to data theft within hours of initial contact. Mandiant tracks the group as UNC3753, Luna Moth, and Chatty Spider.\u003c/p\u003e\n\n\u003cp\u003eThe report follows an FBI FLASH advisory published the previous week that warned Silent Ransom Group was targeting U.S. law firms through social engineering and even in-person data theft attacks. Mandiant’s report adds technical details about how these intrusions are carried out. The firm said the group targeted dozens of organizations across the legal, financial, and professional services sectors between January and May 2026.\u003c/p\u003e\n\n\u003ch2 id=\"why-law-firms-are-being-targeted\"\u003eWhy law firms are being targeted\u003c/h2\u003e\n\n\u003cp\u003eMandiant said legal firms remain especially attractive to extortion actors because they store large volumes of highly sensitive client information. The report specifically cites client transaction files, merger and acquisition plans, client trade secrets, and corporate regulatory reports as examples of sensitive data held by legal services firms.\u003c/p\u003e\n\n\u003cp\u003eMandiant also said threat groups recognize that legal entities face heavy reputational and regulatory exposure. According to the report, these pressures may make legal organizations more motivated to resolve extortion situations quietly in order to protect their professional standing.\u003c/p\u003e\n\n\u003ch2 id=\"initial-contact-and-social-engineering-flow\"\u003eInitial contact and social engineering flow\u003c/h2\u003e\n\n\u003cp\u003eThe attacks begin with invoice-themed phishing emails sent from consumer email accounts. These emails do not contain malicious links or attachments. Instead, they serve as a precursor for follow-up phone calls from attackers impersonating corporate IT staff.\u003c/p\u003e\n\n\u003cp\u003eMandiant described the activity as part of a long-running voice-based tactic used by these actors. The article notes that the group previously used BazarCall social engineering campaigns tied to Ryuk and Conti ransomware attacks. In the current campaign, the attackers impersonate IT help desks and convince employees to join remote support sessions.\u003c/p\u003e\n\n\u003cp\u003eRemote support sessions may be conducted through:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft Teams\u003c/li\u003e\n\u003cli\u003eZoom\u003c/li\u003e\n\u003cli\u003eQuick Assist\u003c/li\u003e\n\u003cli\u003eMicrosoft Terminal Services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDuring these sessions, the attackers trick targets into installing remote monitoring and management tools that provide initial access to the corporate network. Tools named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnyDesk\u003c/li\u003e\n\u003cli\u003eZoho Assist\u003c/li\u003e\n\u003cli\u003eBomgar\u003c/li\u003e\n\u003cli\u003eSuperOps\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"phishing-domains-and-use-of-self-destructing-messages\"\u003ePhishing domains and use of self-destructing messages\u003c/h2\u003e\n\n\u003cp\u003eMandiant identified phishing domains tied to the campaign that impersonate internal IT portals. The article lists naming patterns such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;organization\u0026gt;-itdesk[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;organization\u0026gt;-it[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;organization\u0026gt;-helpdesk[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attackers also use privnote.com, a self-destructing messaging service, to share installation links and commands with targets during remote support sessions. Mandiant said this tactic helps reduce forensic artifacts left in browser histories or corporate chat logs.\u003c/p\u003e\n\n\u003ch2 id=\"data-discovery-and-exfiltration\"\u003eData discovery and exfiltration\u003c/h2\u003e\n\n\u003cp\u003eOnce inside a network, Silent Ransom Group searches for sensitive legal and financial documents. The article names contracts, tax records, Social Security numbers, and merger or acquisition files as targeted data types.\u003c/p\u003e\n\n\u003cp\u003eThe attackers commonly target document management platforms and cloud storage repositories. Mandiant said the group exfiltrates data using tools such as WinSCP or Rclone.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-behavior\"\u003eExtortion behavior\u003c/h2\u003e\n\n\u003cp\u003eMandiant described the group’s extortion operation as highly aggressive. Ransom demands often arrive within 30 minutes of the attackers leaving the victim environment.\u003c/p\u003e\n\n\u003cp\u003eThe extortion letters give organizations a three-day deadline to respond and begin ransom negotiations. If the victim does not respond, the attackers threaten to call and email target employees and external clients directly to alert them of the data breach.\u003c/p\u003e\n\n\u003cp\u003eAccording to Mandiant, the extortion letters explicitly emphasize that the leak will compromise client trust, invite substantial regulatory fines, and suggest that external clients sue the victim organization for data mishandling.\u003c/p\u003e\n\n\u003ch2 id=\"fbi-warning-on-in-person-activity\"\u003eFBI warning on in-person activity\u003c/h2\u003e\n\n\u003cp\u003eThe article also references the FBI’s recent advisory about in-person data theft attacks linked to Silent Ransom Group. According to the FBI, attackers impersonate internal IT staff over phone calls and emails and then attempt to gain remote access or physically visit offices.\u003c/p\u003e\n\n\u003cp\u003eDuring these physical visits, attackers allegedly attempt to “image” computers or create backups while secretly stealing files. Mandiant said there was limited forensic evidence, but the researchers believe these in-person attacks are likely linked to UNC3753 based on similarities in targeting, timelines, and operational behavior.\u003c/p\u003e\n\n\u003ch2 id=\"group-background-and-evolution\"\u003eGroup background and evolution\u003c/h2\u003e\n\n\u003cp\u003eSilent Ransom Group has been active since at least 2022, when it was part of the Ryuk and Conti cybercrime syndicate. The article says the actors were previously linked to BazarCall callback phishing campaigns that provided initial access in Conti and Ryuk ransomware attacks.\u003c/p\u003e\n\n\u003cp\u003eAfter the Conti syndicate shut down in 2022, the group shifted to standalone data theft and extortion operations under the Silent Ransom Group branding. Researchers said the group no longer relies on traditional ransomware encryption and instead focuses entirely on data-theft extortion, stealing sensitive data and pressuring victims to pay to prevent leaks.\u003c/p\u003e\n\n\u003ch2 id=\"fast-flux-infrastructure\"\u003eFast-flux infrastructure\u003c/h2\u003e\n\n\u003cp\u003eA separate report released by Resecurity found that the gang is operating fast-flux infrastructure to hide and protect its data-leak platforms. The article explains DNS fast flux as a method in which attackers constantly rotate a domain’s IP addresses through a large pool of compromised devices to hide infrastructure and make takedowns or blocking more difficult.\u003c/p\u003e\n\n\u003cp\u003eResecurity said the infrastructure uses residential IP addresses across multiple countries and ISPs. The company also said the group’s \u003ccode\u003ebusiness-data-leaks[.]com\u003c/code\u003e leak site and related infrastructure rely on residential proxy networks spread across Latin America, Eastern Europe, Central Asia, the Middle East, and Asia. Resecurity also linked the infrastructure to other cybercrime-related services and domains.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defenses\"\u003eRecommended defenses\u003c/h2\u003e\n\n\u003cp\u003eMandiant and the FBI recommend several defensive measures for organizations facing this activity. The article lists the following recommendations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImplement strict verification procedures for IT support interactions.\u003c/li\u003e\n\u003cli\u003eLimit remote access tools.\u003c/li\u003e\n\u003cli\u003eEnforce multifactor authentication.\u003c/li\u003e\n\u003cli\u003eRestrict USB storage devices.\u003c/li\u003e\n\u003cli\u003eTrain employees to recognize voice phishing attempts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations directly address the group’s use of fake IT support calls, remote access tooling, and possible physical office visits.\u003c/p\u003e\n","keyPoints":["Mandiant reported that the Silent Ransom Group, tracked as UNC3753, Luna Moth, and Chatty Spider, targeted dozens of legal, financial, and professional services organizations between January and May 2026.","The attacks begin with invoice-themed phishing emails from consumer email accounts, followed by phone calls in which attackers impersonate corporate IT staff.","Attackers convince employees to join remote support sessions through tools such as Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services and install remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps.","Once inside a network, the group searches for sensitive legal and financial documents and exfiltrates data using tools such as WinSCP or Rclone.","Mandiant said ransom demands often arrive within 30 minutes of the attackers leaving the victim environment and give organizations three days to respond."],"insights":["Because the initial phishing emails contain no malicious links or attachments, defenses that rely mainly on scanning email payloads may miss the early stage of these attacks.","The use of privnote.com to share installation links and commands is specifically intended to reduce forensic artifacts in browser histories and corporate chat logs.","The group’s extortion strategy is built around legal firms’ reputational and regulatory exposure, with threats to contact employees and external clients directly if victims do not respond within three days.","The reported in-person office visits show that verification procedures for IT support interactions need to cover both remote help desk requests and physical access requests.","Resecurity found that the group uses DNS fast-flux infrastructure with residential IP addresses across multiple countries and ISPs, making takedowns and blocking more difficult."],"referencedReports":[{"title":"Targeted Campaign Against U.S. Law Firms","url":"http://cloud.google.com/blog/topics/threat-intelligence/targeted-campaign-us-law-firms","publisher":"Mandiant","context":"The article is based on Mandiant's report describing Silent Ransom Group activity against legal, financial, and professional services organizations and explaining the intrusion methods.","category":"","primary":false},{"title":"Silent Ransom Group (SRG): Uncovering DNS Fast-Flux Infrastructure","url":"https://www.resecurity.com/blog/article/silent-ransom-group-srg-uncovering-dns-fast-flux-infrastructure","publisher":"Resecurity","context":"The article cites Resecurity's separate report on Silent Ransom Group's DNS fast-flux infrastructure used to hide and protect data-leak platforms.","category":"","primary":false}],"body":"\u003cp\u003eSilent Ransom Group is actively targeting U.S. law firms and professional services organizations with social engineering attacks that can lead to data theft within hours of first contact, according to Mandiant. The group is tracked as UNC3753, Luna Moth, and Chatty Spider, and Mandiant said it targeted dozens of organizations in the legal, financial, and professional services sectors between January and May 2026. The report follows an FBI FLASH advisory warning that the group was targeting U.S. law firms through social engineering and even in-person data theft attacks.\u003c/p\u003e\n\n\u003cp\u003eThe attacks begin with invoice-themed phishing emails from consumer email accounts that contain no malicious links or attachments. Attackers then follow up by phone while impersonating corporate IT staff and convince employees to join remote support sessions using platforms such as Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services. During those sessions, victims are tricked into installing remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps.\u003c/p\u003e\n\n\u003cp\u003eOnce inside a network, the group searches for sensitive legal and financial documents, including contracts, tax records, Social Security numbers, and merger or acquisition files. Mandiant said the attackers commonly target document management platforms and cloud storage repositories before exfiltrating data with tools such as WinSCP or Rclone. The extortion operation is described as highly aggressive, with ransom demands often arriving within 30 minutes of the attackers leaving the victim environment.\u003c/p\u003e\n"},{"n":5,"title":"Emerging Threat: (CVE-2026-44825) Apache Solr Administrative Takeover via Hardcoded Credentials","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/emerging-threat-cve-2026-44825-apache-solr-administrative-takeover-via-hardcoded-credentials/","time":"10:45","priority":"SHOULD READ","score":86,"tldr":"Apache Solr versions 9.4.0 through 9.10.1 and 10.0.0 may silently create default admin accounts when BasicAuth is enabled with bin/solr auth enable, allowing unauthenticated attackers to gain full SolrCloud administrative access. Organizations should upgrade to Solr 9.11.0 or 10.1.0 and audit security.json for default accounts such as superadmin, admin, search, and index.","briefOverview":"\u003cp\u003eCVE-2026-44825 is a hardcoded credentials vulnerability in Apache Solr’s Basic Authentication setup tool, \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. The issue can silently install undocumented template accounts with publicly known default credentials, giving a remote attacker full administrative access to a SolrCloud cluster. The vulnerability has a CVSS v3.1 base score of 8.1, rated High.\u003c/p\u003e\n\n\u003cp\u003eThe affected versions are Apache Solr 9.4.0 through 9.10.1 and version 10.0.0. The issue applies specifically to SolrCloud deployments where administrators enabled Basic Authentication using \u003ccode\u003ebin/solr auth enable\u003c/code\u003e; deployments that used other BasicAuth configuration methods or never enabled BasicAuth are not affected by this specific issue. Apache has released Solr 9.11.0 and 10.1.0 to address the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article says the tool may create accounts named \u003ccode\u003esuperadmin\u003c/code\u003e, \u003ccode\u003eadmin\u003c/code\u003e, \u003ccode\u003esearch\u003c/code\u003e, and \u003ccode\u003eindex\u003c/code\u003e, each with a password matching the username. An attacker authenticating as \u003ccode\u003esuperadmin\u003c/code\u003e can read, modify, or delete any index, alter cluster configuration, and pivot to systems the Solr cluster is authorized to reach. Recommended actions include auditing \u003ccode\u003esecurity.json\u003c/code\u003e, removing or rotating the template accounts, restricting admin interface access, and monitoring authentication logs for default credential patterns.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCVE-2026-44825 is described as a hardcoded credentials vulnerability in Apache Solr’s Basic Authentication setup tool, \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. The vulnerability can silently install undocumented template accounts with publicly known default credentials. According to the article, this can allow a remote attacker with no prior authentication to gain full administrative access to a SolrCloud cluster.\u003c/p\u003e\n\n\u003cp\u003eThe issue arises when an administrator uses \u003ccode\u003ebin/solr auth enable\u003c/code\u003e to configure BasicAuth. The tool writes a \u003ccode\u003esecurity.json\u003c/code\u003e file that may include additional template accounts named \u003ccode\u003esuperadmin\u003c/code\u003e, \u003ccode\u003eadmin\u003c/code\u003e, \u003ccode\u003esearch\u003c/code\u003e, and \u003ccode\u003eindex\u003c/code\u003e. Each account is configured with a password that matches the username, which means attackers aware of the issue can attempt authentication without additional reconnaissance.\u003c/p\u003e\n\n\u003cp\u003eThe practical impact is full administrative control of the SolrCloud cluster. The article states that an attacker authenticating as \u003ccode\u003esuperadmin\u003c/code\u003e can read, modify, or delete any index, alter cluster configuration, and pivot to any system the Solr cluster is authorized to reach. The vulnerability carries a CVSS v3.1 base score of 8.1, which is rated High.\u003c/p\u003e\n\n\u003cp\u003eApache Solr versions 9.4.0 through 9.10.1 and version 10.0.0 are affected. The article specifies that the vulnerability is limited to SolrCloud deployments where BasicAuth was enabled using \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. Deployments that configured BasicAuth through other means, or that never enabled BasicAuth, are not affected by this specific issue.\u003c/p\u003e\n\n\u003cp\u003eApache has released Solr 9.11.0 and 10.1.0 to address CVE-2026-44825. For deployments that cannot immediately upgrade, Apache recommends deleting the template accounts created by \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. The article also recommends auditing \u003ccode\u003esecurity.json\u003c/code\u003e, restricting access to the Solr admin interface, monitoring authentication logs for default credential patterns, and inventorying Solr deployments including staging and development instances.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-44825 is a hardcoded credentials vulnerability in Apache Solr’s Basic Authentication setup tool, \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. The article states that the tool can silently install undocumented template accounts with publicly known default credentials. This can give a remote attacker full administrative access to a SolrCloud cluster.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS v3.1 base score of 8.1, rated High. Exploitation requires no prior authentication. The central risk is that accounts may exist in the deployment even though administrators did not intentionally create them.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is tied to the process of enabling Basic Authentication using \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. When this tool is used, it writes a \u003ccode\u003esecurity.json\u003c/code\u003e file. The article says that this file may include additional template user accounts.\u003c/p\u003e\n\n\u003cp\u003eThe accounts specifically identified are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esuperadmin\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eadmin\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esearch\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eindex\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEach of these accounts is configured with a password that matches the username. Because the credentials are described as identical to documented defaults, an attacker aware of the issue can attempt authentication without additional reconnaissance.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the practical impact as full administrative control of the cluster. An attacker who authenticates as \u003ccode\u003esuperadmin\u003c/code\u003e can read, modify, or delete any index. The attacker can also alter cluster configuration.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that an attacker could pivot to any system the Solr cluster is authorized to reach. This makes the issue significant not only for Solr data and configuration, but also for connected systems accessible from the Solr cluster.\u003c/p\u003e\n\n\u003ch2 id=\"affected-assets\"\u003eAffected Assets\u003c/h2\u003e\n\n\u003cp\u003eApache Solr versions 9.4.0 through 9.10.1 and version 10.0.0 are affected. The vulnerability is specific to SolrCloud deployments where administrators enabled Basic Authentication using \u003ccode\u003ebin/solr auth enable\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article explicitly states that deployments are not affected by this specific issue if they configured BasicAuth through other means. Deployments that never enabled BasicAuth at all are also not affected by this specific issue.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-context\"\u003eExposure Context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Apache Solr is used for enterprise search, e-commerce product catalogs, log analytics pipelines, and document management platforms. It says SolrCloud clusters are commonly internet-facing or reachable from cloud environments. It also notes that administrative interfaces are often left accessible beyond the intended perimeter during initial setup or after infrastructure changes.\u003c/p\u003e\n\n\u003cp\u003eCyCognito identified externally reachable Apache Solr assets that may be exposed across a range of industries. Because no asset file was provided for the advisory, the article says per-sector percentages are not available. The article describes exposure as likely broadly distributed rather than concentrated in a single sector.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-visibility-challenges\"\u003eDetection and Visibility Challenges\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the accounts may be silently installed. Administrators who verify their own account credentials after setup may have no obvious reason to check for additional accounts they did not create. As a result, the template users may persist for extended periods without detection.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that organizations may inherit Solr through platform bundles or third-party applications. This can delay visibility into version currency and authentication state. It also highlights the risk of older staging or development instances remaining accessible after production systems have been upgraded.\u003c/p\u003e\n\n\u003ch2 id=\"fixes-and-mitigation\"\u003eFixes and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eApache has released Solr 9.11.0 and 10.1.0 to address CVE-2026-44825. Organizations running affected versions should upgrade to the corresponding fixed release.\u003c/p\u003e\n\n\u003cp\u003eFor deployments where immediate upgrading is not possible, Apache recommends deleting the template accounts created by \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. The accounts to audit and remove are \u003ccode\u003esuperadmin\u003c/code\u003e, \u003ccode\u003eadmin\u003c/code\u003e, \u003ccode\u003esearch\u003c/code\u003e, and \u003ccode\u003eindex\u003c/code\u003e. These accounts are defined in \u003ccode\u003esecurity.json\u003c/code\u003e and can be removed or have their credentials rotated through the Solr Security API.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends that defenders verify directly with Apache’s security advisory and inspect their deployment’s \u003ccode\u003esecurity.json\u003c/code\u003e contents. It warns that the absence of weak credentials in self-created accounts does not rule out the presence of silently installed template accounts.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends the following actions until patching is confirmed:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAudit \u003ccode\u003esecurity.json\u003c/code\u003e on all SolrCloud nodes for undocumented template accounts.\u003c/li\u003e\n\u003cli\u003eRemove or rotate credentials for \u003ccode\u003esuperadmin\u003c/code\u003e, \u003ccode\u003eadmin\u003c/code\u003e, \u003ccode\u003esearch\u003c/code\u003e, and \u003ccode\u003eindex\u003c/code\u003e if present.\u003c/li\u003e\n\u003cli\u003eRestrict network access to the Solr admin interface at the firewall or WAF layer.\u003c/li\u003e\n\u003cli\u003eMonitor Solr authentication logs for logins using default credential patterns.\u003c/li\u003e\n\u003cli\u003eInventory all Solr deployments, including staging and development instances, to identify versions in the affected range.\u003c/li\u003e\n\u003cli\u003eVerify that BasicAuth-enabled clusters were not configured using \u003ccode\u003ebin/solr auth enable\u003c/code\u003e on any affected version.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cycognito-activity\"\u003eCyCognito Activity\u003c/h2\u003e\n\n\u003cp\u003eCyCognito published an Emerging Threat Advisory for CVE-2026-44825 in the CyCognito platform. The company says it is actively researching enhanced detection capabilities for this vulnerability. The article also directs readers to contact CyCognito to request a demo.\u003c/p\u003e\n","keyPoints":["CVE-2026-44825 is a hardcoded credentials vulnerability in Apache Solr’s Basic Authentication setup tool, bin/solr auth enable, with a CVSS v3.1 base score of 8.1.","When administrators use bin/solr auth enable, the tool may write a security.json file containing template accounts named superadmin, admin, search, and index, each with a password matching the username.","An attacker who authenticates as superadmin can gain full administrative control of the SolrCloud cluster, including the ability to read, modify, or delete indexes and alter cluster configuration.","Apache Solr versions 9.4.0 through 9.10.1 and version 10.0.0 are affected in SolrCloud deployments where Basic Authentication was enabled using bin/solr auth enable.","Apache has released Solr 9.11.0 and 10.1.0 to address CVE-2026-44825, and organizations should audit security.json for the template accounts if immediate upgrading is not possible."],"insights":["Administrators may miss the exposure because verifying their own configured account after setup does not reveal the silently installed template accounts.","Deployments that configured BasicAuth through methods other than bin/solr auth enable, or never enabled BasicAuth, are not affected by this specific issue.","The article emphasizes that inherited Solr deployments through platform bundles or third-party applications can delay visibility into affected versions and authentication state.","Older staging or development Solr clusters may remain externally reachable even after production upgrades, making inventory of non-production instances a specific remediation priority."],"referencedReports":[],"body":"\u003cp\u003eCVE-2026-44825 is a hardcoded credentials vulnerability in Apache Solr’s Basic Authentication setup tool, \u003ccode\u003ebin/solr auth enable\u003c/code\u003e. The issue can silently install undocumented template accounts with publicly known default credentials, giving a remote attacker full administrative access to a SolrCloud cluster. The vulnerability has a CVSS v3.1 base score of 8.1, rated High.\u003c/p\u003e\n\n\u003cp\u003eThe affected versions are Apache Solr 9.4.0 through 9.10.1 and version 10.0.0. The issue applies specifically to SolrCloud deployments where administrators enabled Basic Authentication using \u003ccode\u003ebin/solr auth enable\u003c/code\u003e; deployments that used other BasicAuth configuration methods or never enabled BasicAuth are not affected by this specific issue. Apache has released Solr 9.11.0 and 10.1.0 to address the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article says the tool may create accounts named \u003ccode\u003esuperadmin\u003c/code\u003e, \u003ccode\u003eadmin\u003c/code\u003e, \u003ccode\u003esearch\u003c/code\u003e, and \u003ccode\u003eindex\u003c/code\u003e, each with a password matching the username. An attacker authenticating as \u003ccode\u003esuperadmin\u003c/code\u003e can read, modify, or delete any index, alter cluster configuration, and pivot to systems the Solr cluster is authorized to reach. Recommended actions include auditing \u003ccode\u003esecurity.json\u003c/code\u003e, removing or rotating the template accounts, restricting admin interface access, and monitoring authentication logs for default credential patterns.\u003c/p\u003e\n"},{"n":2,"title":"C0XMO botnet spreads via DD-WRT router flaw, kills rival malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/c0xmo-botnet-spreads-via-dd-wrt-router-flaw-kills-rival-malware/","time":"14:17","priority":"SHOULD READ","score":84,"tldr":"A new Gafgyt variant called C0XMO is exploiting a DD-WRT router flaw to infect devices across multiple CPU architectures, spread via scanning and weak SSH/Telnet credentials, and launch DDoS attacks. It also removes rival malware and persistence mechanisms, showing more sophistication than typical IoT botnets.","briefOverview":"\u003cp\u003eA new variant of the Gafgyt botnet called C0XMO is targeting DD-WRT router firmware and can spread to other device types across multiple CPU architectures. Fortinet researchers found samples for ARM, MIPS, PowerPC, SuperH, x86, x86_64, and other architectures. The botnet was seen targeting a Japanese technology company, while the observed source IP address belonged to a device in Germany.\u003c/p\u003e\n\n\u003cp\u003eC0XMO is delivered by exploiting CVE-2021-27137, an unauthenticated buffer overflow vulnerability caused by insufficient user input that can allow arbitrary code execution. The malware uses a Python scanner to find internet-facing systems, brute-force weak Telnet and SSH credentials, detect CPU architecture, and deploy a compatible binary. It also establishes persistence through hidden file locations, cron jobs, and shell startup modifications.\u003c/p\u003e\n\n\u003cp\u003eThe botnet’s main purpose is launching distributed denial-of-service attacks, with 19 supported methods including UDP, TCP, SYN, and ICMP floods, as well as NTP and Memcached amplification. C0XMO also kills rival botnet clients and removes persistence mechanisms that may interfere with its operation. Fortinet described it as more advanced and operationally sophisticated than typical Gafgyt malware.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFortinet researchers discovered C0XMO, a new variant of the Gafgyt botnet that targets DD-WRT router firmware and can move to other device types. The researchers found samples built for multiple CPU architectures, including ARM, MIPS, PowerPC, SuperH, x86, and x86_64. The botnet was observed targeting a Japanese technology company, though the source IP address was associated with a device located in Germany.\u003c/p\u003e\n\n\u003cp\u003eThe malware is delivered through exploitation of CVE-2021-27137, a buffer overflow vulnerability caused by insufficient user input. According to the article, the flaw can be exploited without authentication and can lead to arbitrary code execution. C0XMO’s modular design allows operators to update exploitation techniques, add or remove targeted architectures, and expand lateral movement capabilities separately from the main payload.\u003c/p\u003e\n\n\u003cp\u003eFor wider distribution, C0XMO downloads a Python script that installs packages including requests, paramiko, and beautifulsoup4. The scanner uses worker threads to randomly scan internet-facing systems on ports such as 22, 23, 80, 443, 7547, 8080, 8443, and 8888. After identifying a target, it attempts to brute-force weak Telnet and SSH credentials, detects the CPU architecture, and deploys a compatible C0XMO binary.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining access, the malware copies itself to hidden paths such as /tmp/.sys, /var/tmp/.sys, and /dev/shm/.sys. It creates cron jobs to relaunch itself every 15 minutes and modifies shell startup files to enable automatic execution. C0XMO also scans running processes to identify competitor botnet clients, red-team tools, programming tools, and network services that may interfere with its operation.\u003c/p\u003e\n\n\u003cp\u003eThe botnet connects to a hardcoded command-and-control address using a custom multi-stage handshake involving magic strings and shared secrets. Its supported commands include heartbeat checks, starting and stopping scans, and launching DDoS attacks using one of 19 methods. Fortinet said the malware has a considerably more advanced architecture and feature set than earlier IoT botnets, and recommended keeping devices updated, using unique admin credentials, and disabling unnecessary remote access capabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eFortinet researchers discovered C0XMO, a new variant of the Gafgyt botnet that targets DD-WRT router firmware. The malware can move beyond DD-WRT routers to other device types and supports a wide range of CPU architectures. Researchers found samples for ARM, MIPS, PowerPC, SuperH, x86, x86_64, and other architectures.\u003c/p\u003e\n\n\u003cp\u003eThe botnet was observed targeting a Japanese technology company. However, the article states that the source IP address was associated with a device located in Germany. The article does not identify the botnet operators.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eC0XMO is described as a DDoS-focused botnet with a more advanced architecture and feature set than earlier IoT botnets. Fortinet researchers said its overall design shows greater operational sophistication and complexity than typical Gafgyt malware. Its modular structure allows operators to update exploitation techniques, add or remove supported architectures, and expand lateral movement capabilities independently of the main payload.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-vulnerability\"\u003eInitial Access and Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eC0XMO is delivered by exploiting CVE-2021-27137. The article describes this as a buffer overflow vulnerability caused by insufficient user input. It can be exploited without authentication and can lead to arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies DD-WRT router firmware as a key target for this activity. It also states that the malware includes exploits for DVRs, routers, video management platforms, and Android-based devices.\u003c/p\u003e\n\n\u003ch2 id=\"scanning-and-spread\"\u003eScanning and Spread\u003c/h2\u003e\n\n\u003cp\u003eFor broader distribution, C0XMO downloads a Python script that installs additional packages. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003erequests\u003c/li\u003e\n\u003cli\u003eparamiko\u003c/li\u003e\n\u003cli\u003ebeautifulsoup4\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these packages are used for network scanning and communication, as well as for activity over SSH and Telnet protocols. The scanner uses worker threads to randomly scan internet-facing systems on common ports, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e22 for SSH\u003c/li\u003e\n\u003cli\u003e23 for Telnet\u003c/li\u003e\n\u003cli\u003e80 and 443 for HTTP and HTTPS\u003c/li\u003e\n\u003cli\u003e7547\u003c/li\u003e\n\u003cli\u003e8080\u003c/li\u003e\n\u003cli\u003e8443\u003c/li\u003e\n\u003cli\u003e8888\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter finding a target, the malware attempts to brute-force weak Telnet and SSH credentials. It then detects the target device’s CPU architecture and deploys a compatible C0XMO binary.\u003c/p\u003e\n\n\u003cp\u003eThe Python script contains almost two dozen functions for scanning, exploiting HTTP and ADB-based vulnerabilities, detecting CPU architecture, logging in over SSH and Telnet, and checking IP addresses. The article states that its main purpose is lateral movement on the network.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-host-control\"\u003ePersistence and Host Control\u003c/h2\u003e\n\n\u003cp\u003eOnce C0XMO gains access to a device, it copies itself to hidden locations. The article names these paths:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e/tmp/.sys\u003c/li\u003e\n\u003cli\u003e/var/tmp/.sys\u003c/li\u003e\n\u003cli\u003e/dev/shm/.sys\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt then creates cron jobs that relaunch the malware every 15 minutes. The malware also modifies shell startup files to enable automatic execution.\u003c/p\u003e\n\n\u003ch2 id=\"removal-of-rival-malware-and-tools\"\u003eRemoval of Rival Malware and Tools\u003c/h2\u003e\n\n\u003cp\u003eC0XMO scans running processes to identify competitor botnet clients on the host. It also looks for red-team tools, programming tools, and network services that may interfere with its operation. When it finds these, it terminates them.\u003c/p\u003e\n\n\u003cp\u003eThe malware also deletes binaries and removes persistence mechanisms. The article specifically names cron jobs, init scripts, system services, and shell profile entries as persistence mechanisms that C0XMO removes.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-and-capabilities\"\u003eCommand-and-Control and Capabilities\u003c/h2\u003e\n\n\u003cp\u003eAfter establishing itself, C0XMO connects to a hardcoded command-and-control address. The connection uses a custom multi-stage handshake that includes magic strings and shared secrets. The malware then waits for commands.\u003c/p\u003e\n\n\u003cp\u003eSupported commands include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHeartbeat checks\u003c/li\u003e\n\u003cli\u003eStarting scans\u003c/li\u003e\n\u003cli\u003eStopping scans\u003c/li\u003e\n\u003cli\u003eLaunching DDoS attacks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eC0XMO supports 19 DDoS methods. The article lists methods including UDP, TCP, SYN, and ICMP floods, “ping of death,” NTP and Memcached amplification, Discord voice UDP floods, and Valve-specific floods.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-guidance-mentioned-in-the-article\"\u003eDefensive Guidance Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article gives general recommendations for defending against C0XMO and other botnet malware. These include keeping devices up to date, using unique administrator credentials, and disabling remote access capabilities when they are not needed.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact-and-affected-parties\"\u003eReported Impact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article states that C0XMO was seen targeting a Japanese technology company. It also states that the source IP address was tied to a device located in Germany. The broader affected ecosystem includes DD-WRT router firmware and other device types such as DVRs, routers, video management platforms, and Android-based devices.\u003c/p\u003e\n","keyPoints":["Fortinet researchers discovered a new Gafgyt variant called C0XMO that targets DD-WRT router firmware and supports multiple CPU architectures, including ARM, MIPS, PowerPC, SuperH, x86, and x86_64.","C0XMO is delivered by exploiting CVE-2021-27137, an unauthenticated buffer overflow vulnerability that can lead to arbitrary code execution.","The botnet downloads a Python scanner that scans internet-facing systems, brute
