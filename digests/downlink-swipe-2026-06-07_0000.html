-forces weak Telnet and SSH credentials, detects CPU architecture, and deploys a compatible C0XMO binary.","After gaining access, C0XMO copies itself to hidden locations, creates cron jobs for persistence, and modifies shell startup files for automatic execution.","C0XMO can terminate competitor botnet clients and interfering tools, then connects to a hardcoded command-and-control server to receive commands including DDoS attacks using 19 supported methods."],"insights":["C0XMO’s modular design lets operators update exploitation techniques, change targeted CPU architectures, and expand lateral movement capabilities independently of the main payload.","Defenders should treat unexplained removal of cron jobs, init scripts, system services, or shell profile entries as potentially malicious because C0XMO deletes rival malware and its persistence mechanisms.","The botnet’s scanner targets both standard remote access ports and less common service ports such as 7547, 8443, and 8888, making exposed device management interfaces a practical hardening priority.","C0XMO’s use of a German source IP while targeting a Japanese technology company shows that observed attack traffic may originate from already-compromised third-party devices rather than the operators’ location."],"referencedReports":[],"body":"\u003cp\u003eA new variant of the Gafgyt botnet called C0XMO is targeting DD-WRT router firmware and can spread to other device types across multiple CPU architectures. Fortinet researchers found samples for ARM, MIPS, PowerPC, SuperH, x86, x86_64, and other architectures. The botnet was seen targeting a Japanese technology company, while the observed source IP address belonged to a device in Germany.\u003c/p\u003e\n\n\u003cp\u003eC0XMO is delivered by exploiting CVE-2021-27137, an unauthenticated buffer overflow vulnerability caused by insufficient user input that can allow arbitrary code execution. The malware uses a Python scanner to find internet-facing systems, brute-force weak Telnet and SSH credentials, detect CPU architecture, and deploy a compatible binary. It also establishes persistence through hidden file locations, cron jobs, and shell startup modifications.\u003c/p\u003e\n\n\u003cp\u003eThe botnet’s main purpose is launching distributed denial-of-service attacks, with 19 supported methods including UDP, TCP, SYN, and ICMP floods, as well as NTP and Memcached amplification. C0XMO also kills rival botnet clients and removes persistence mechanisms that may interfere with its operation. Fortinet described it as more advanced and operationally sophisticated than typical Gafgyt malware.\u003c/p\u003e\n"},{"n":3,"title":"NetSuite Sent the Invoice. Oracle Signed It. The Payment Token Was the Weapon.","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/netsuite-oracle-eaas-invoice-click-to-pay-token-phishing","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"A phishing invoice was sent through legitimate Oracle NetSuite infrastructure with valid SPF, DKIM, and DMARC, linking to a real QIMA payment portal with a pre-filled payment token. The case shows that authenticated SaaS-generated emails can still be fraudulent, making behavioral analysis critical for detecting invoice scams.","briefOverview":"\u003cp\u003eAn invoice phishing email was delivered through legitimate Oracle NetSuite email infrastructure and relayed by Oracle Email Delivery. The message passed SPF, DKIM with dual signatures from NetSuite and Oracle Email Delivery, and DMARC with compauth=pass reason=100. The article says the central unanswered question is whether the invoice was real, the QIMA NetSuite account was compromised, or the invoice was fabricated within the platform.\u003c/p\u003e\n\n\u003cp\u003eThe email was sent from system@sent-via[.]netsuite[.]com on behalf of “Finance QIMA/WQS” with a Reply-To address of finance@wqscert[.]com. It used Oracle Email Delivery from a Japan datacenter host, aib29dd127[.]nrt1[.]oracleemaildelivery[.]com, with IP 192[.]29[.]44[.]127. X-NetSuite headers showed platform-origin details including compId=4552646, search=664953, and owner=2859289.\u003c/p\u003e\n\n\u003cp\u003eThe “Click and Pay” link pointed to a real QIMA payment portal with a pre-filled payment token, so the URL appeared clean because the domain and page were legitimate. Microsoft assigned the message SCL=9 with SFTY:9.25 despite the authentication success. Themis classified it as Invoice Phishing at 63% confidence based on sender relationship analysis and quarantined it across four mailboxes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes an invoice phishing email sent through Oracle NetSuite’s legitimate email infrastructure and Oracle Email Delivery. The message passed SPF, DKIM, and DMARC, including dual DKIM signatures from sent-via[.]netsuite[.]com and nrt1[.]rp[.]oracleemaildelivery[.]com. The article frames the case as Email as a Service abuse because the attacker did not spoof NetSuite but used it.\u003c/p\u003e\n\n\u003cp\u003eThe email came from system@sent-via[.]netsuite[.]com on behalf of “Finance QIMA/WQS” and used finance@wqscert[.]com as the Reply-To address. It was relayed through Oracle Email Delivery from a Japan datacenter host, aib29dd127[.]nrt1[.]oracleemaildelivery[.]com, at IP address 192[.]29[.]44[.]127. X-NetSuite headers indicated the message originated inside the NetSuite platform and included compId=4552646, search=664953, and owner=2859289.\u003c/p\u003e\n\n\u003cp\u003eThe payment call-to-action linked to my[.]qima[.]com/pay-pre-filled/qimawqs/a0d9464fe506416497b71c4ea7776c18, described as a real QIMA payment portal with a pre-filled token. The article notes that the URL scanned clean because the domain was legitimate and the page functioned as designed. The message also included links to QIMA terms-and-conditions and contact pages, and its subject referenced a specific invoice number and named both the buyer and vendor.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft flagged the message aggressively with SCL=9 and SFTY:9.25 even though the email fully passed authentication checks. The article says this created tension between infrastructure trust and behavioral signals. It presents the case as an example of why phishing detection cannot rely on authentication alone.\u003c/p\u003e\n\n\u003cp\u003eThemis, the IRONSCALES Adaptive AI system, classified the email as Invoice Phishing at 63% confidence. The classification was based on sender relationship analysis because the recipient had no established communication history with the NetSuite-generated sender identity. Four mailboxes were quarantined, and the article leaves open whether the QIMA NetSuite account was compromised or whether the invoice was fabricated within the platform.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes an invoice phishing email delivered through legitimate Oracle NetSuite email infrastructure. The message was authenticated successfully, passing SPF, DKIM, and DMARC, including dual DKIM signatures from NetSuite and Oracle Email Delivery. Despite this, the email was treated as suspicious and ultimately classified as Invoice Phishing by Themis, the IRONSCALES Adaptive AI system.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central point is that authentication could confirm the legitimacy of the sending chain but could not determine whether the invoice itself was legitimate. It explicitly frames the open incident-response question as whether the QIMA NetSuite account was compromised or whether the invoice was fabricated within the platform itself.\u003c/p\u003e\n\n\u003ch2 id=\"sending-infrastructure-and-authentication\"\u003eSending Infrastructure and Authentication\u003c/h2\u003e\n\n\u003cp\u003eThe email was sent from system@sent-via[.]netsuite[.]com on behalf of “Finance QIMA/WQS.” It used a Reply-To address of finance@wqscert[.]com, which the article identifies as a QIMA/WQS finance contact. The message was relayed through Oracle Email Delivery from a Japan datacenter.\u003c/p\u003e\n\n\u003cp\u003eThe sending host was aib29dd127[.]nrt1[.]oracleemaildelivery[.]com, and the sending IP address was 192[.]29[.]44[.]127. The article states that X-NetSuite headers confirmed the message originated from inside the platform and included compId=4552646, search=664953, and owner=2859289.\u003c/p\u003e\n\n\u003cp\u003eThe authentication results were strong:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSPF passed.\u003c/li\u003e\n\u003cli\u003eDKIM passed.\u003c/li\u003e\n\u003cli\u003eThe message was dual-signed by sent-via[.]netsuite[.]com and nrt1[.]rp[.]oracleemaildelivery[.]com.\u003c/li\u003e\n\u003cli\u003eDMARC passed.\u003c/li\u003e\n\u003cli\u003eMicrosoft’s composite authentication result was compauth=pass reason=100.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article characterizes this as Email as a Service abuse because NetSuite was not spoofed; it was used as the delivery mechanism.\u003c/p\u003e\n\n\u003ch2 id=\"payment-link-and-invoice-fraud-mechanism\"\u003ePayment Link and Invoice Fraud Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe “Click and Pay” call-to-action linked to hxxps://my[.]qima[.]com/pay-pre-filled/qimawqs/a0d9464fe506416497b71c4ea7776c18. The article describes this as a real QIMA payment portal containing a pre-filled payment token. It notes that the URL scans clean because the domain is legitimate and the page functions as designed.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the payload was not a credential harvester or malware dropper. Instead, it was a real payment form pre-loaded with an invoice the attacker wanted paid. This made URL reputation and domain-based checks less useful because the payment portal itself was legitimate.\u003c/p\u003e\n\n\u003cp\u003eThe email also included links to qima[.]com/terms-and-conditions and qima[.]com/contact-us. According to the article, these links reinforced legitimacy. The subject line referenced a specific invoice number and named both the buyer and the vendor, and the target was an employee at a food and beverage company.\u003c/p\u003e\n\n\u003ch2 id=\"detection-signals-and-security-response\"\u003eDetection Signals and Security Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft assigned the message SCL=9 with SFTY:9.25. The article describes this as an unusually aggressive score for a message with perfect authentication. It says the tension between full authentication passage and high spam scoring reflects how static analysis can become conflicted when infrastructure trust and behavioral signals diverge.\u003c/p\u003e\n\n\u003cp\u003eThemis classified the message as Invoice Phishing at 63% confidence. The article states that this detection was not based on a malicious URL, a bad signature, or a known threat indicator. Instead, it was based on sender relationship analysis.\u003c/p\u003e\n\n\u003cp\u003eThe specific behavioral signal cited was that the recipient had no established communication history with the NetSuite-generated sender identity. Four mailboxes were quarantined as a result.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-involved-entities\"\u003eAffected and Involved Entities\u003c/h2\u003e\n\n\u003cp\u003eThe article names several stakeholders and infrastructure providers involved in the case:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOracle NetSuite, whose legitimate email infrastructure was used to send the invoice.\u003c/li\u003e\n\u003cli\u003eOracle Email Delivery, which relayed the email from a Japan datacenter.\u003c/li\u003e\n\u003cli\u003eQIMA/WQS, whose finance identity and payment portal appeared in the message.\u003c/li\u003e\n\u003cli\u003eMicrosoft, whose anti-spam engine assigned SCL=9 with SFTY:9.25.\u003c/li\u003e\n\u003cli\u003eIRONSCALES, whose Themis system classified the message as Invoice Phishing.\u003c/li\u003e\n\u003cli\u003eA food and beverage company, where the targeted employee worked.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor. It states that the attacker either used a compromised QIMA NetSuite account or created a fabricated invoice within the platform through an authorized user, insider, or social-engineered access, but it leaves the exact scenario unresolved.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-listed-in-the-article\"\u003eIndicators Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender Address: system@sent-via[.]netsuite[.]com, described as the NetSuite platform sender.\u003c/li\u003e\n\u003cli\u003eReply-To Address: finance@wqscert[.]com, described as a QIMA/WQS finance contact.\u003c/li\u003e\n\u003cli\u003eReply-To Domain: wqscert[.]com, described as a QIMA verification services domain.\u003c/li\u003e\n\u003cli\u003eSending IP: 192[.]29[.]44[.]127, described as Oracle Email Delivery from a Japan datacenter.\u003c/li\u003e\n\u003cli\u003eSending Host: aib29dd127[.]nrt1[.]oracleemaildelivery[.]com, described as an Oracle Email Delivery relay.\u003c/li\u003e\n\u003cli\u003ePayment URL: hxxps://my[.]qima[.]com/pay-pre-filled/qimawqs/a0d9464fe506416497b71c4ea7776c18, described as a pre-filled payment token.\u003c/li\u003e\n\u003cli\u003eNetSuite compId: 4552646, described as a NetSuite company identifier.\u003c/li\u003e\n\u003cli\u003eDKIM signing domains: sent-via[.]netsuite[.]com and nrt1[.]rp[.]oracleemaildelivery[.]com.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.002, Phishing: Spearphishing Link, because the pre-filled payment token was delivered via an email call-to-action.\u003c/li\u003e\n\u003cli\u003eT1583.006, Acquire Infrastructure: Web Services, because NetSuite and Oracle Email Delivery were used as the sending platform.\u003c/li\u003e\n\u003cli\u003eT1656, Impersonation, because the sender identity was presented as QIMA Finance via NetSuite.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main significance is that the email was technically legitimate from an authentication and infrastructure perspective while still being classified as invoice phishing. The sending chain passed SPF, DKIM, DMARC, and Microsoft composite authentication. The payment URL also pointed to a real QIMA payment portal rather than an obviously malicious site.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that this kind of case shows the limits of authentication-based phishing detection. Because the message used legitimate SaaS infrastructure and a legitimate payment portal, the decisive detection surface was behavioral: whether the recipient had an established relationship with the NetSuite-generated sender identity.\u003c/p\u003e\n","keyPoints":["An invoice phishing email was delivered through legitimate Oracle NetSuite infrastructure and passed SPF, DKIM, and DMARC authentication checks.","The email was sent from system@sent-via[.]netsuite[.]com on behalf of “Finance QIMA/WQS” and relayed through Oracle Email Delivery from a Japan datacenter.","The “Click and Pay” call-to-action linked to a real QIMA payment portal containing a pre-filled payment token.","Microsoft assigned the message SCL=9 with SFTY:9.25 despite the email passing authentication.","Themis classified the message as Invoice Phishing at 63% confidence based on sender relationship analysis and quarantined it across four mailboxes."],"insights":["Full SPF, DKIM, and DMARC alignment did not resolve the risk because the attacker used legitimate NetSuite and Oracle Email Delivery infrastructure rather than spoofing it.","The payment link was difficult to flag with URL reputation because it pointed to a functioning QIMA payment portal rather than a credential-harvesting or malware-hosting domain.","The high Microsoft spam score alongside full authentication passage shows that infrastructure trust and behavioral signals can produce conflicting security assessments.","Sender relationship analysis was the decisive detection surface because the recipient had no established communication history with the NetSuite-generated sender identity."],"referencedReports":[{"title":"Phishing: Spearphishing Link","url":"https://attack.mitre.org/techniques/T1566/002/","publisher":"MITRE ATT\u0026CK","context":"The article maps the invoice phishing email’s pre-filled payment token CTA to MITRE ATT\u0026CK technique T1566.002.","category":"","primary":false},{"title":"Acquire Infrastructure: Web Services","url":"https://attack.mitre.org/techniques/T1583/006/","publisher":"MITRE ATT\u0026CK","context":"The article maps the use of NetSuite and Oracle Email Delivery as the sending platform to MITRE ATT\u0026CK technique T1583.006.","category":"","primary":false},{"title":"Impersonation","url":"https://attack.mitre.org/techniques/T1656/","publisher":"MITRE ATT\u0026CK","context":"The article maps the QIMA Finance sender identity presented via NetSuite to MITRE ATT\u0026CK technique T1656.","category":"","primary":false}],"body":"\u003cp\u003eAn invoice phishing email was delivered through legitimate Oracle NetSuite email infrastructure and relayed by Oracle Email Delivery. The message passed SPF, DKIM with dual signatures from NetSuite and Oracle Email Delivery, and DMARC with compauth=pass reason=100. The article says the central unanswered question is whether the invoice was real, the QIMA NetSuite account was compromised, or the invoice was fabricated within the platform.\u003c/p\u003e\n\n\u003cp\u003eThe email was sent from system@sent-via[.]netsuite[.]com on behalf of “Finance QIMA/WQS” with a Reply-To address of finance@wqscert[.]com. It used Oracle Email Delivery from a Japan datacenter host, aib29dd127[.]nrt1[.]oracleemaildelivery[.]com, with IP 192[.]29[.]44[.]127. X-NetSuite headers showed platform-origin details including compId=4552646, search=664953, and owner=2859289.\u003c/p\u003e\n\n\u003cp\u003eThe “Click and Pay” link pointed to a real QIMA payment portal with a pre-filled payment token, so the URL appeared clean because the domain and page were legitimate. Microsoft assigned the message SCL=9 with SFTY:9.25 despite the authentication success. Themis classified it as Invoice Phishing at 63% confidence based on sender relationship analysis and quarantined it across four mailboxes.\u003c/p\u003e\n"},{"n":4,"title":"Thinking Like an Attacker: How to Strengthen Modern Cyber Defence Strategies","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/thinking-like-an-attacker-how-to-strengthen-modern-cyber-defence-strategies/","time":"08:58","priority":"MAY READ","score":55,"tldr":"CyCognito CEO Rob Gurzeev argues that the biggest breach risks come from unknown internet-facing assets that traditional vulnerability management and pen testing often miss. Security leaders should focus on external attack surface visibility and reducing critical-issue remediation time from weeks or months to hours, especially as AI accelerates attackers’ ability to find and exploit exposures.","briefOverview":"\u003cp\u003eThe article summarizes a Security Strategist podcast conversation between Richard Stiennon of IT-Harvest and Rob Gurzeev, CEO of CyCognito, about external attack surface management. Gurzeev argues that many organizations believe they understand their security posture because they run penetration tests, deploy tools, and build teams, but breaches can still occur through assets no one knew existed. The central significance is that unknown internet-facing assets, rather than known assets, are described as where much of the breach risk lives.\u003c/p\u003e\n\n\u003cp\u003eGurzeev distinguishes external attack surface management from vulnerability management by saying vulnerability management maps potential vulnerabilities, while attack surface management maps, classifies, and understands what an organization has. He says external ASM is more difficult than internal ASM because no one fully knows the external reality, especially when third parties, subsidiaries, or joint ventures create or manage assets outside central control. He also frames recall and precision as important measures for determining whether ASM can find real assets without overwhelming teams with false ownership claims.\u003c/p\u003e\n\n\u003cp\u003eThe discussion emphasizes that attack surface complexity has grown sharply as it has become easier to build applications and change network configurations. Gurzeev says large companies may have between 100,000 applications, devices, and cloud assets exposed to the internet, while CyCognito’s largest customer has 100 million internet-connected things. He argues that AI is changing expectations for security teams because exploitation can happen within minutes, making mean time to remediation for critical issues a key metric that should move toward hours rather than days, weeks, or months.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents a podcast-style discussion on external attack surface management featuring Rob Gurzeev, CEO of CyCognito, and Richard Stiennon, Chief Research Analyst and founder of IT-Harvest. Gurzeev says CyCognito was built to address the gap between what organizations think they know about their security posture and the unknown assets attackers may find. The conversation focuses on why blind spots, not known assets, are described as the location of much of an organization’s breach risk.\u003c/p\u003e\n\n\u003cp\u003eGurzeev describes his background as beginning with childhood experimentation around computers and later work in an intelligence agency, where he focused on finding paths of least resistance into targets to acquire intelligence. He says that experience shaped his attacker-versus-defender perspective and made external attack surface management feel intuitive. He contrasts that with the broader cybersecurity industry, which he says has mostly built layers of defense based on deploying tools and knowing where assets are.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that organizations often lack a clear picture of their external attack surface despite investing in security tools and processes. Gurzeev argues that incentives within enterprises can discourage people from pointing out uncomfortable gaps, such as penetration testing programs that may cover only a small fraction of internet-facing applications. He says board members may not understand the technical meaning of such coverage gaps, and security leaders may not be rewarded for raising them.\u003c/p\u003e\n\n\u003cp\u003eOn technical scope, Gurzeev says large companies can have between 100,000 applications, devices, and cloud assets exposed to the internet, and that CyCognito’s largest customer has 100 million internet-connected things. He attributes this growth to the increasing ease of building applications and changing network configurations. He specifically mentions that people in HR and finance can use tools such as Claude Code or Lovable to build applications that combine sensitive information and expose them to the internet either intentionally or accidentally.\u003c/p\u003e\n\n\u003cp\u003eGurzeev distinguishes vulnerability management from attack surface management by saying vulnerability management maps potential vulnerabilities, while ASM maps, classifies, and understands assets. He says internal ASM can often rely on integrations with systems such as ServiceNow, endpoint protection tools, and AWS instances, while external ASM must discover reality from the outside. He highlights third-party marketing applications, subsidiaries, and joint ventures as examples of assets that may carry an organization’s logo or customer PII while remaining outside direct control.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses AI as a factor changing both the threat and defense sides of exposure management. Gurzeev says AI is driving consensus that mean time to remediation must be measured in hours rather than days, and notes that some companies still take months to address critical issues. His final recommendation to CISOs and CIOs is to examine how long critical issues take to remediate and ask whether current processes and technologies can reduce that time to an hour or two.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a transcript and summary of a Security Strategist podcast episode focused on external attack surface management and external exposure management. Richard Stiennon, Chief Research Analyst and founder of IT-Harvest, interviews Rob Gurzeev, CEO of CyCognito. The conversation centers on why organizations often misunderstand their external security posture even after investing in penetration testing, tools, and security teams.\u003c/p\u003e\n\n\u003cp\u003eThe main argument presented by Gurzeev is that the greatest risk often comes from assets that security teams do not know exist. He says many technologies take what he calls a “lazy approach” by asking organizations what they already know about their attack surface and then finding adjacent assets. He acknowledges that this has value, but says the most important risks are in complete blind spots.\u003c/p\u003e\n\n\u003ch2 id=\"core-issue-unknown-external-assets\"\u003eCore Issue: Unknown External Assets\u003c/h2\u003e\n\n\u003cp\u003eGurzeev says organizations may believe they understand their security posture, but a breach can occur through an asset no one knew existed. This gap is presented as the reason CyCognito was built. The article frames external attack surface management as a discipline concerned with discovering, classifying, and understanding internet-facing assets from the perspective of an external attacker.\u003c/p\u003e\n\n\u003cp\u003eAccording to Gurzeev, blind spots can include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn engineer’s unmanaged asset.\u003c/li\u003e\n\u003cli\u003eA subsidiary’s separate technology stack.\u003c/li\u003e\n\u003cli\u003eA joint venture in another country.\u003c/li\u003e\n\u003cli\u003eA third-party marketing application using the organization’s logo and customer PII.\u003c/li\u003e\n\u003cli\u003eCloud assets, devices, or applications not present in existing internal inventories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHe says that when CyCognito comes into an organization, between 10% and 50% of applications, devices, and cloud assets may not be known by any existing technology or database. He emphasizes that only one unknown or undermanaged asset is needed to enable a breach.\u003c/p\u003e\n\n\u003ch2 id=\"gurzeev-s-background-and-perspective\"\u003eGurzeev’s Background and Perspective\u003c/h2\u003e\n\n\u003cp\u003eGurzeev says attack surface management “sort of chose” him. He describes growing up around IRCs and computer pranks, where children would exploit friends’ computers as jokes. He later joined an intelligence agency at age 18, where he worked on what the cybersecurity industry calls attack surface management.\u003c/p\u003e\n\n\u003cp\u003eIn that role, he says he focused on finding the path of least resistance into systems in order to acquire relevant intelligence. He describes the work as fascinating and puzzle-like, but also stressful because real lives were involved. This experience shaped his attacker-oriented view of security.\u003c/p\u003e\n\n\u003cp\u003eGurzeev contrasts this perspective with what he later saw on the defensive side of cybersecurity. He says that over the last 25 years, the industry has built many layers of defense, but that most of those layers are based on deploying tools and assuming an organization knows where its assets are. His offensive background taught him to assume that reality is not fully known and that defenders must discover where the path of least resistance actually exists.\u003c/p\u003e\n\n\u003ch2 id=\"why-organizations-still-lack-visibility\"\u003eWhy Organizations Still Lack Visibility\u003c/h2\u003e\n\n\u003cp\u003eThe article presents several reasons why organizations still lack a complete picture of their external attack surface. Gurzeev says that traditional software engineering focuses on building the right architecture and protecting known things, but less often asks where systems are most likely to fail or what the organization knows least about.\u003c/p\u003e\n\n\u003cp\u003eHe also points to internal incentives. In his view, employees and leaders are often rewarded for meeting KPIs, completing projects, and showing progress, rather than for challenging established processes or revealing uncomfortable gaps. He gives the example of an organization spending $2 million on manual penetration testing while testing only 1% of its internet-facing applications.\u003c/p\u003e\n\n\u003cp\u003eGurzeev says that telling a board the organization has not been testing the other 99% may not be rewarded, especially when board members are not technical and may not understand what that coverage gap means. He argues that this dynamic trickles down through the organization and contributes to persistent blind spots.\u003c/p\u003e\n\n\u003ch2 id=\"growth-in-attack-surface-complexity\"\u003eGrowth in Attack Surface Complexity\u003c/h2\u003e\n\n\u003cp\u003eThe discussion describes a major increase in the size and complexity of enterprise attack surfaces. Gurzeev says that 20 years ago, companies such as Apple and Google had one website or one internet-connected thing. By contrast, he says large companies now commonly have between 100,000 applications, devices, and cloud assets exposed to the internet.\u003c/p\u003e\n\n\u003cp\u003eHe adds that CyCognito’s largest customer has 100 million things connected to the internet that external attackers can interact with. This scale creates a mismatch with traditional manual penetration testing. Gurzeev says manual testing may cover 100, 500, or perhaps 1,000 web applications, but leaves the question of what happens to the rest.\u003c/p\u003e\n\n\u003cp\u003eThe article attributes this expansion to the fact that it has become much easier to build applications and change network configurations. Gurzeev says that 20 years ago, a single person in a company might have been able to make major network changes. Now, people in HR and finance can use tools such as Claude Code or Lovable to build applications, combine sensitive information, and expose those applications to the internet either intentionally or accidentally.\u003c/p\u003e\n\n\u003ch2 id=\"external-asm-versus-vulnerability-management\"\u003eExternal ASM Versus Vulnerability Management\u003c/h2\u003e\n\n\u003cp\u003eGurzeev describes vulnerability management and attack surface management as adjacent disciplines connected by the broader term “exposure management.” He says both are difficult to do well, but they answer different questions.\u003c/p\u003e\n\n\u003cp\u003eIn the article’s framing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVulnerability management is about mapping potential vulnerabilities.\u003c/li\u003e\n\u003cli\u003eAttack surface management is about mapping, classifying, and understanding what an organization has.\u003c/li\u003e\n\u003cli\u003eInternal ASM can often rely on integrations with existing systems and tools.\u003c/li\u003e\n\u003cli\u003eExternal ASM must discover reality from outside the organization because no one fully knows what is exposed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGurzeev says internal ASM can use integrations with tools such as ServiceNow, endpoint protection systems, and AWS instances. In that case, the challenge is often deduplicating data and presenting it effectively. By contrast, external ASM is described as a different problem because the relevant assets may not be present in any authoritative internal system.\u003c/p\u003e\n\n\u003ch2 id=\"recall-and-precision-as-asm-measures\"\u003eRecall and Precision as ASM Measures\u003c/h2\u003e\n\n\u003cp\u003eGurzeev introduces recall and precision as a useful way to think about external attack surface management. Recall refers to how much of the real asset base a system finds. If an organization has 100 assets and 99 are found, recall is 99%.\u003c/p\u003e\n\n\u003cp\u003ePrecision refers to how accurate the claimed asset ownership is. Gurzeev explains that a system could claim one million things belong to an organization and include the correct 100 assets, but if nearly all other claims are wrong, the result is not useful. He says balancing recall and precision is difficult.\u003c/p\u003e\n\n\u003cp\u003eThis point is important because external ASM must find unknown assets without overwhelming teams with false positives. The article presents this balance as a technical challenge that differentiates effective external discovery from simpler approaches based only on known inputs.\u003c/p\u003e\n\n\u003ch2 id=\"third-parties-subsidiaries-and-joint-ventures\"\u003eThird Parties, Subsidiaries, and Joint Ventures\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights several types of external assets that may create blind spots. Gurzeev gives the example of a third-party company building a marketing campaign application. Even if another company built it, he says it may effectively be the organization’s application if it uses the organization’s logo and contains customer PII.\u003c/p\u003e\n\n\u003cp\u003eHe also mentions companies with 100 subsidiaries, where each subsidiary may have its own technology stack and may not cooperate with the global security team. Joint ventures are also cited as examples of assets that may sit outside centralized visibility and control.\u003c/p\u003e\n\n\u003cp\u003eThese examples support the article’s broader claim that the external attack surface is not limited to centrally managed infrastructure. It also includes assets that represent or affect the organization but are created, hosted, or managed elsewhere.\u003c/p\u003e\n\n\u003ch2 id=\"ai-s-role-in-the-problem-and-the-response\"\u003eAI’s Role in the Problem and the Response\u003c/h2\u003e\n\n\u003cp\u003eThe article says AI is reshaping both attack surface discovery and exposure management. Gurzeev says there is now consensus that AI changes expectations for mean time to remediation. He argues that remediation needs to happen in hours, not days, while many companies still take months to remediate critical issues.\u003c/p\u003e\n\n\u003cp\u003eHe says that even a not-too-technical person anywhere in the world can now exploit applications and complex systems within minutes. As a result, knowing what assets exist and quickly identifying which assets are relevant when an emerging threat appears has become critical.\u003c/p\u003e\n\n\u003cp\u003eGurzeev also says CyCognito is spending significant time expanding deterministic security testing capabilities into AI-driven creative testing at scale. He says testing one thing deeply with AI is almost a solved problem, but continuously testing all assets within budget is the next major problem to solve.\u003c/p\u003e\n\n\u003ch2 id=\"mean-time-to-remediation-as-the-key-metric\"\u003eMean Time to Remediation as the Key Metric\u003c/h2\u003e\n\n\u003cp\u003eThe final message Gurzeev gives to CISOs and CIOs is to examine mean time to remediation for critical issues. He asks leaders to be honest with themselves and their teams about whether their remediation time is a couple of hours, a few days, or a few weeks.\u003c/p\u003e\n\n\u003cp\u003eHe then recommends asking whether current efforts, processes, and technologies can reduce that time to an hour or two. If not, he suggests organizations may need a different approach. The article presents this as the most important practical takeaway for external exposure management.\u003c/p\u003e\n\n\u003ch2 id=\"named-entities-and-stakeholders-mentioned\"\u003eNamed Entities and Stakeholders Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article names several people, organizations, and technologies involved in the discussion:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRob Gurzeev, CEO of CyCognito.\u003c/li\u003e\n\u003cli\u003eRichard Stiennon, Chief Research Analyst and founder of IT-Harvest.\u003c/li\u003e\n\u003cli\u003eCyCognito, the company associated with external attack surface management.\u003c/li\u003e\n\u003cli\u003eIT-Harvest, Stiennon’s organization.\u003c/li\u003e\n\u003cli\u003eEM360Tech, referenced in the podcast closing and social handle.\u003c/li\u003e\n\u003cli\u003eServiceNow, mentioned as an internal data source for ASM integrations.\u003c/li\u003e\n\u003cli\u003eAWS, mentioned in the context of internal ASM integrations.\u003c/li\u003e\n\u003cli\u003eClaude Code and Lovable, mentioned as tools that can help non-engineering teams build applications.\u003c/li\u003e\n\u003cli\u003eApple and Google, used as examples of companies whose internet presence was simpler 20 years ago.\u003c/li\u003e\n\u003cli\u003eChina, mentioned in the example of a joint venture.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that external attack surface management is fundamentally different from simply scanning known systems for vulnerabilities. Its core challenge is discovering the assets the organization does not know about, especially across third parties, subsidiaries, cloud environments, and rapidly created applications. Gurzeev’s primary recommendation is for security leaders to measure and reduce critical-issue remediation time, with the goal of moving from days, weeks, or months toward an hour or two.\u003c/p\u003e\n","keyPoints":["Rob Gurzeev says most breach risk in external attack surface management comes from complete blind spots that security teams do not know about, rather than from known assets.","Gurzeev distinguishes vulnerability management as mapping potential vulnerabilities, while attack surface management focuses on mapping, classifying, and understanding what assets an organization has.","The article states that large companies can have between 100,000 applications, devices, and cloud assets exposed to the internet, and CyCognito’s largest customer has 100 million internet-connected assets.","Gurzeev says AI is changing expectations for mean time to remediation because even less technical people can exploit applications and complex systems within minutes.","Gurzeev advises CISOs and CIOs to honestly assess whether their current processes and technologies can reduce remediation of critical issues to an hour or two."],"insights":["Gurzeev frames recall and precision as core measures for external attack surface management, emphasizing that finding nearly all real assets is insufficient if the system also floods teams with false ownership claims.","The article highlights third-party marketing applications, subsidiaries, and joint ventures as especially risky because they may expose customer data or corporate branding while remaining outside central security teams’ control.","Gurzeev argues that organizational incentives can suppress visibility into attack surface gaps, since security leaders may not be rewarded for telling boards that expensive testing programs cover only a small fraction of internet-facing applications.","The rise of low-code and AI-assisted development is presented as a practical driver of attack surface growth, with non-engineering teams in areas like HR and finance now able to create and accidentally expose applications.","The article suggests that external ASM differs from internal ASM not mainly in data presentation, but in the fact that external reality is often unknown and must be discovered rather than integrated from existing systems."],"referencedReports":[],"body":"\u003cp\u003eThe article summarizes a Security Strategist podcast conversation between Richard Stiennon of IT-Harvest and Rob Gurzeev, CEO of CyCognito, about external attack surface management. Gurzeev argues that many organizations believe they understand their security posture because they run penetration tests, deploy tools, and build teams, but breaches can still occur through assets no one knew existed. The central significance is that unknown internet-facing assets, rather than known assets, are described as where much of the breach risk lives.\u003c/p\u003e\n\n\u003cp\u003eGurzeev distinguishes external attack surface management from vulnerability management by saying vulnerability management maps potential vulnerabilities, while attack surface management maps, classifies, and understands what an organization has. He says external ASM is more difficult than internal ASM because no one fully knows the external reality, especially when third parties, subsidiaries, or joint ventures create or manage assets outside central control. He also frames recall and precision as important measures for determining whether ASM can find real assets without overwhelming teams with false ownership claims.\u003c/p\u003e\n\n\u003cp\u003eThe discussion emphasizes that attack surface complexity has grown sharply as it has become easier to build applications and change network configurations. Gurzeev says large companies may have between 100,000 applications, devices, and cloud assets exposed to the internet, while CyCognito’s largest customer has 100 million internet-connected things. He argues that AI is changing expectations for security teams because exploitation can happen within minutes, making mean time to remediation for critical issues a key metric that should move toward hours rather than days, weeks, or months.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
