mall number of devices and was successfully contained. The package maintainer, Lightning AI, has reverted the distribution to the safe version 2.6.1 and strongly advises all affected users to immediately rotate their compromised secrets. Developers are currently investigating how the build and release pipeline was breached to prevent further compromise.\u003c/p\u003e\n"},{"n":11,"title":"CanisterSprawl: pgserve Compromised on npm: Malicious Versions Harvest Credentials and Exfiltrate to a Decentralized ICP Canister","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/pgserve-compromised-on-npm-malicious-versions-harvest-credentials","time":"17:20","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Compromised versions 1.1.11 through 1.1.13 of the pgserve npm package contain a credential-harvesting malware that exfiltrates secrets to an ICP canister and automatically propagates across developer environments. Organizations must immediately avoid these versions and pin dependencies to the safe release 1.1.10 or earlier.","briefOverview":"\u003cp\u003eOn April 21, 2026, malicious versions 1.1.11 through 1.1.13 of the pgserve npm package were published to the registry. These compromised versions inject a 1,143-line credential-harvesting script that executes automatically during the npm install process. The malware scans environment variables and local filesystems to collect sensitive data, including cloud credentials, SSH keys, and browser passwords. Stolen information is encrypted with RSA-4096 and AES-256 before being exfiltrated to a decentralized ICP canister and a secondary webhook. The attack also functions as a supply chain worm, automatically locating developer tokens to infect and publish additional packages. Detection was achieved through StepSecurity\u0026rsquo;s AI Package Analyst and Harden Runner, which successfully captured and blocked the exfiltration attempts. Organizations are advised to avoid these compromised versions and pin dependencies to the safe release 1.1.10 or earlier.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article details a supply chain compromise affecting the pgserve npm package, an embedded PostgreSQL server used for development environments. Malicious versions 1.1.11, 1.1.12, and 1.1.13 were published on April 21, 2026, without corresponding git tags in the upstream repository. Each compromised version replaces the clean baseline by injecting a postinstall hook that executes a 1,143-line CommonJS script named check-env.js. The script deliberately appends || true to its execution command to mask any failures and ensure the installation appears successful. Once triggered, the malware performs six distinct malicious operations. It harvests environment variables matching approximately forty regex patterns and collects filesystem secrets from the developer\u0026rsquo;s home directory. Collected data includes package manager tokens, SSH keys, cloud credentials, cryptocurrency wallets, and decrypted browser passwords. The stolen information is encrypted using a hybrid RSA-4096 and AES-256 scheme before transmission. Exfiltration occurs through two channels: a primary decentralized ICP canister designed to resist takedowns, and a secondary webhook endpoint. The malware also operates as a supply chain worm by scanning for npm and PyPI tokens to automatically infect and publish other packages under the victim\u0026rsquo;s control. Detection was triggered by the StepSecurity AI Package Analyst, which flagged all three versions with a Critical verdict. Runtime validation using Harden Runner confirmed the execution chain and successfully blocked both exfiltration domains via its global block list. The last legitimate release, version 1.1.10, was published on April 17, 2026, and remains the only safe version. The compromise has been disclosed to the maintainer through a GitHub issue.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eAttack Overview and Timeline\u003c/p\u003e\n\n\u003cp\u003eOn April 21, 2026, malicious versions 1.1.11, 1.1.12, and 1.1.13 of the pgserve npm package were published to the registry. The last legitimate release, version 1.1.10, was tagged on April 17, 2026. None of the compromised versions have corresponding git tags in the upstream repository. The compromise was disclosed to the maintainer via GitHub issue #25.\u003c/p\u003e\n\n\u003cp\u003eMalware Mechanics and Payload\u003c/p\u003e\n\n\u003cp\u003eThe compromised tarballs inject exactly two new files: scripts/check-env.js and scripts/public.pem. The package.json file is modified to add a postinstall hook that runs node scripts/check-env.cjs || true. The || true clause ensures the installation completes cleanly regardless of script success or failure. The injected script contains 1,143 lines of CommonJS JavaScript and executes six distinct operations.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnvironment Variable Harvesting: The malware scans environment variables against approximately forty regex patterns, including tokens, secrets, keys, passwords, and cloud provider prefixes. In controlled analysis, it successfully harvested thirty-eight matching variables.\u003c/li\u003e\n\u003cli\u003eFilesystem Secret Collection: The script reads credential files from the developer\u0026rsquo;s home directory, including .npmrc, .netrc, SSH keys, cloud credentials, crypto wallets, and Chrome browser password databases.\u003c/li\u003e\n\u003cli\u003ePayload Encryption: Stolen data is encrypted using a random AES-256-CBC session key, which is then wrapped with an RSA-4096 public key bundled in the package.\u003c/li\u003e\n\u003cli\u003eDual-Channel Exfiltration: Encrypted payloads are sent to a primary ICP canister at cjn37-uyaaa-aaaac-qgnva-cai.raw.icp0.io/drop and a secondary webhook at telemetry.api-monitor.com/v1/telemetry. The ICP canister was selected specifically because blockchain-hosted endpoints cannot be seized or taken down.\u003c/li\u003e\n\u003cli\u003eSupply Chain Worm Propagation: The malware searches for npm and PyPI tokens to automatically infect other packages. It bumps patch versions, copies the malicious scripts, adds the postinstall hook, and publishes the compromised packages.\u003c/li\u003e\n\u003cli\u003ePyPI Cross-Ecosystem Spreading: If a PyPI token is found, the malware injects .pth files into the Python site-packages directory to execute on every interpreter invocation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDetection and Validation\u003c/p\u003e\n\n\u003cp\u003eThe StepSecurity AI Package Analyst flagged all three compromised versions with a Critical verdict. The analysis identified credential theft, environment exfiltration, browser password theft, and network exfiltration. Runtime validation was conducted using Harden Runner in a controlled GitHub Actions environment. The runner\u0026rsquo;s process monitor confirmed the postinstall hook spawned the malicious script as a direct child of the npm install process. Harden Runner\u0026rsquo;s eBPF-based network monitor captured and blocked both exfiltration domains. Both domains were immediately added to the Harden-Runner global block list, providing automatic protection across all protected workflows without configuration changes.\u003c/p\u003e\n\n\u003cp\u003eIndicators of Compromise\u003c/p\u003e\n\n\u003cp\u003eThe following indicators are explicitly listed in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCompromised packages: pgserve@1.1.11, pgserve@1.1.12, pgserve@1.1.13\u003c/li\u003e\n\u003cli\u003eSafe version: pgserve@1.1.10 and earlier\u003c/li\u003e\n\u003cli\u003eExfiltration domains: cjn37-uyaaa-aaaac-qgnva-cai.raw.icp0.io and telemetry.api-monitor.com\u003c/li\u003e\n\u003cli\u003eMalicious files: scripts/check-env.js and scripts/public.pem\u003c/li\u003e\n\u003cli\u003eExecution trigger: postinstall hook\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Compromised versions 1.1.11, 1.1.12, and 1.1.13 of the pgserve npm package execute a malicious postinstall script that harvests environment variables, filesystem secrets, and browser passwords.","The malware encrypts stolen data using RSA-4096 and AES-256 before exfiltrating it to a decentralized Internet Computer Protocol canister and a secondary webhook.","The attack operates as a supply chain worm that automatically locates npm and PyPI tokens to infect other packages controlled by the compromised developer account.","StepSecurity's AI Package Analyst flagged all three compromised versions with a Critical verdict, and Harden Runner successfully blocked the exfiltration network connections during controlled analysis."],"insights":["Attackers deliberately chose an ICP canister for data exfiltration to ensure persistence, as blockchain-hosted endpoints cannot be seized or taken down by traditional law enforcement or domain takedowns.","The malware uses a `|| true` clause in its postinstall hook to mask execution failures, ensuring compromised installations appear successful to developers and CI/CD pipelines.","Harden-Runner's global block list provides immediate, zero-configuration protection across all protected workflows as soon as new IOCs are added, eliminating the need for per-repository updates.","The attack cross-pollinates ecosystems by injecting `.pth` files into Python site-packages when PyPI tokens are detected, replicating the propagation technique from the Shai-Hulud campaign."],"referencedReports":[{"title":"Widespread supply chain compromise impacting npm ecosystem","url":"https://www.cisa.gov/news-events/alerts/2025/09/23/widespread-supply-chain-compromise-impacting-npm-ecosystem","publisher":"CISA","context":"The article references this CISA advisory as the official documentation for the .pth file injection technique used in the Shai-Hulud npm supply chain campaign."}],"body":"\u003cp\u003eOn April 21, 2026, malicious versions 1.1.11 through 1.1.13 of the pgserve npm package were published to the registry. These compromised versions inject a 1,143-line credential-harvesting script that executes automatically during the npm install process. The malware scans environment variables and local filesystems to collect sensitive data, including cloud credentials, SSH keys, and browser passwords. Stolen information is encrypted with RSA-4096 and AES-256 before being exfiltrated to a decentralized ICP canister and a secondary webhook. The attack also functions as a supply chain worm, automatically locating developer tokens to infect and publish additional packages. Detection was achieved through StepSecurity\u0026rsquo;s AI Package Analyst and Harden Runner, which successfully captured and blocked the exfiltration attempts. Organizations are advised to avoid these compromised versions and pin dependencies to the safe release 1.1.10 or earlier.\u003c/p\u003e\n"},{"n":1,"title":"Forbes preliminarily agrees to pay $10 million to settle California wiretapping lawsuit","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/forbes-agrees-10-million-settlement-privacy-class-action","time":"16:49","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Forbes Media agreed to pay $10 million to settle a California lawsuit alleging its website illegally tracked users via third-party scripts from LinkedIn and Microsoft, requiring improved user notice and control over data collection.","briefOverview":"\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million to resolve a class action lawsuit regarding unauthorized website tracking. The settlement addresses allegations that the company tracked users across the internet without their consent. Plaintiffs claimed Forbes violated California’s Invasion of Privacy Act and Unfair Competition Law.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit specifically cited the use of pen registers and trap and trace devices to collect unique IP addresses and identifiers. These tracking mechanisms were developed by LinkedIn and Microsoft. The agreement requires Forbes to provide greater notice of its tracking practices.\u003c/p\u003e\n\n\u003cp\u003eIt also mandates new website language that gives California residents more control over data collection and third-party sharing. Eligible class members will receive payouts ranging from \u003cspan class=\"math inline\"\u003e\\(32 to \\)\u003c/span\u003e189 each. A Forbes spokesperson declined to comment on the preliminary agreement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million and implement changes to its business practices. This settlement resolves a class action lawsuit filed by plaintiffs who alleged the company tracked users across the internet without consent. The preliminary agreement was released on Thursday.\u003c/p\u003e\n\n\u003cp\u003eIt outlines specific operational changes Forbes must make to comply with the settlement terms. The company will provide greater notice regarding its use of tracking technologies. Additionally, Forbes will add explicit language to its website. This new language will give California residents increased control over how their data is collected and shared with third parties.\u003c/p\u003e\n\n\u003cp\u003ePlaintiffs alleged that Forbes violated California’s Invasion of Privacy Act and the Unfair Competition Law. They claimed the website used pen registers and trap and trace devices to gather unique IP addresses and other identifiers. According to the lawsuit, these trackers were developed by LinkedIn and Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe scripts collected unique identifiers and transmitted them to those companies and other third parties. These entities then fed the data into large databases. The databases were used to compile and analyze specific users’ browsing and shopping habits across the internet.\u003c/p\u003e\n\n\u003cp\u003eThe settlement agreement specifies that class members will receive between \u003cspan class=\"math inline\"\u003e\\(32 and \\)\u003c/span\u003e189. The exact payout amount will depend on the estimated number of claimants. A spokesperson for Forbes Media did not immediately respond to requests for comment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eSettlement Overview\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million to settle a class action lawsuit. The agreement addresses allegations that the company tracked users across the internet without their consent. The preliminary settlement document was released on Thursday. It mandates significant changes to Forbes\u0026rsquo;s data collection practices.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eLegal Allegations\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003ePlaintiffs claimed that Forbes violated California’s Invasion of Privacy Act. They also alleged violations of the state’s Unfair Competition Law. The core of the lawsuit focused on the unauthorized collection of user data. Plaintiffs argued that the website operated as a wiretapping device under state law.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Mechanisms\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit specifically cited the use of pen registers and trap and trace devices. These tools were used to collect unique IP addresses and other user identifiers. The tracking scripts were developed by LinkedIn and Microsoft. They were embedded directly on the Forbes website.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe scripts transmitted unique identifiers to LinkedIn, Microsoft, and other third parties.\u003c/li\u003e\n\u003cli\u003eThese companies processed the data into large databases.\u003c/li\u003e\n\u003cli\u003eThe databases compiled detailed profiles of specific users’ browsing and shopping habits across the internet.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eSettlement Terms\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe agreement requires Forbes to give users greater notice of its tracking practices. The company will add new language to its website. This language will provide California residents with more control over data collection. It will also govern how data is shared with third parties.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFinancial compensation for the class is estimated at \u003cspan class=\"math inline\"\u003e\\(32 to \\)\u003c/span\u003e189 per member.\u003c/li\u003e\n\u003cli\u003eThe exact payout will be calculated based on the total number of claimants.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCorporate Response\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA spokesperson for Forbes Media did not immediately respond to a request for comment. The company has not issued a public statement regarding the preliminary agreement.\u003c/p\u003e\n","keyPoints":["Forbes Media preliminarily agreed to pay $10 million to settle a class action lawsuit alleging unauthorized cross-site tracking of users.","The settlement requires Forbes to provide greater notice of tracking technologies and allow California residents to control how their data is collected and shared.","Plaintiffs claimed Forbes violated California privacy laws by using third-party scripts from LinkedIn and Microsoft to collect unique identifiers and compile browsing habits.","Eligible class members will receive between $32 and $189 based on the total number of claimants."],"insights":["The plaintiffs successfully framed embedded third-party tracking scripts from LinkedIn and Microsoft as \"pen registers and trap and trace devices\" under California’s Invasion of Privacy Act, expanding the legal definition of wiretapping to include non-voice digital data collection.","Third-party scripts actively routed unique user identifiers to external databases that compiled cross-site browsing and shopping profiles, illustrating how embedded trackers can facilitate covert data aggregation without direct site consent.","The settlement mandates a shift from passive notice to active user control, requiring explicit website language that grants California residents direct authority over how their data is shared with third parties.","Individual payouts ranging from $32 to $189 indicate a large certified class, highlighting the widespread exposure of the platform's user base to the contested tracking infrastructure."],"referencedReports":[],"body":"\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million to resolve a class action lawsuit regarding unauthorized website tracking. The settlement addresses allegations that the company tracked users across the internet without their consent. Plaintiffs claimed Forbes violated California’s Invasion of Privacy Act and Unfair Competition Law.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit specifically cited the use of pen registers and trap and trace devices to collect unique IP addresses and identifiers. These tracking mechanisms were developed by LinkedIn and Microsoft. The agreement requires Forbes to provide greater notice of its tracking practices.\u003c/p\u003e\n\n\u003cp\u003eIt also mandates new website language that gives California residents more control over data collection and third-party sharing. Eligible class members will receive payouts ranging from \u003cspan class=\"math inline\"\u003e\\(32 to \\)\u003c/span\u003e189 each. A Forbes spokesperson declined to comment on the preliminary agreement.\u003c/p\u003e\n"},{"n":2,"title":"Educational company Infrastructure reports cyber incident","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/infrastructure-education-company-canvas-incident","time":"17:19","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The educational software provider Infrastructure reported a contained cyber incident attributed to the ShinyHunters group that exposed limited user data such as names and emails but no financial information. Containment measures successfully stopped the breach but temporarily disrupted some customer tools.","briefOverview":"\u003cp\u003eInfrastructure, the educational technology firm behind the Canvas learning platform, reported a cyber incident that disrupted operations over the weekend. The company’s chief information security officer confirmed that attackers accessed limited user data, including names, email addresses, student IDs, and internal messages. Containment efforts involved revoking privileged credentials and deploying security patches, though these measures inadvertently disrupted some customer tools.\u003c/p\u003e\n\n\u003cp\u003eThe company explicitly stated that no financial records, passwords, or government documents were compromised. While Infrastructure declined to comment on the breach, the ShinyHunters cybercriminal group claimed responsibility and asserted they exfiltrated 3.6 terabytes of data from over 9,000 schools. This incident follows a pattern of the group targeting third-party educational and technology platforms to extract sensitive information.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a broader industry trend where educational software providers face repeated data theft, citing a January 2025 breach at PowerSchool that exposed records for millions of students and teachers. That previous incident resulted in a $17.25 million class action settlement due to inadequate security controls like multifactor authentication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA cyber incident disrupted operations this weekend at Infrastructure, the Utah-based educational company behind the widely used Canvas learning management system. The firm initially reported the attack on Friday night and launched an investigation to assess the scope of the intrusion. By Saturday, Chief Information Security Officer Steve Proud confirmed that hackers gained access to specific user information across certain educational institutions.\u003c/p\u003e\n\n\u003cp\u003eThe compromised data included names, email addresses, student identification numbers, and messages exchanged between users. Proud noted that cybersecurity experts helped contain the breach through credential revocation, access token invalidation, and patch deployment. These containment steps successfully stopped the attack but temporarily disrupted some customer-facing tools.\u003c/p\u003e\n\n\u003cp\u003eThe company emphasized that no financial information, passwords, or government documents were stolen. On Sunday afternoon, the ShinyHunters group claimed responsibility for the attack, alleging they exfiltrated 3.6 terabytes of data from more than 9,000 schools. Infrastructure did not respond to requests for comment regarding these specific claims.\u003c/p\u003e\n\n\u003cp\u003eThe group has a documented history of targeting data storage platforms and educational institutions over the past two years. Their recent campaign string includes breaches at home security firm ADT, educational publisher McGraw Hill, and gaming giant Rockstar. Prior to this incident, the group successfully targeted major universities such as Harvard and the University of Pennsylvania.\u003c/p\u003e\n\n\u003cp\u003eThe article contextualizes this event within a recurring pattern of hackers stealing educational data from third-party software providers. In January 2025, education software company PowerSchool announced a hack that exposed sensitive records for 62 million students and 9.5 million teachers. The exposed data encompassed special education status, mental health details, disciplinary notes, and parent restraining orders.\u003c/p\u003e\n\n\u003cp\u003ePowerSchool faced multiple lawsuits over weak cybersecurity practices, including a failure to implement multifactor authentication. In February, the company settled at least one class action lawsuit for $17.25 million.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview-timeline\"\u003eIncident Overview \u0026amp; Timeline\u003c/h3\u003e\n\n\u003cp\u003eOperations at Infrastructure, the educational technology firm behind the Canvas learning management system, were disrupted over the weekend. The company publicly reported the cyber incident on Friday night, prompting an immediate investigation to determine the attack\u0026rsquo;s full scope. By Saturday, the organization confirmed that unauthorized access had been achieved within its systems.\u003c/p\u003e\n\n\u003ch3 id=\"data-exposure-containment-measures\"\u003eData Exposure \u0026amp; Containment Measures\u003c/h3\u003e\n\n\u003cp\u003eChief Information Security Officer Steve Proud detailed the specific data points accessed by the attackers. The compromised information was limited to user identifiers, including names, email addresses, student ID numbers, and internal messages between users. The company explicitly stated that financial records, passwords, and government documents remained secure. Containment was executed with assistance from external cybersecurity experts. Key remediation steps included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRevoking privileged credentials\u003c/li\u003e\n\u003cli\u003eInvalidating access tokens\u003c/li\u003e\n\u003cli\u003eDeploying security patches\nThese necessary security controls inadvertently disrupted some customer-facing tools during the response window.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"attacker-claims-company-response\"\u003eAttacker Claims \u0026amp; Company Response\u003c/h3\u003e\n\n\u003cp\u003eThe ShinyHunters cybercriminal group publicly claimed responsibility for the intrusion on Sunday afternoon. The group asserted that they successfully exfiltrated 3.6 terabytes of data originating from more than 9,000 schools. Infrastructure declined to comment on these specific claims when contacted for verification. The company\u0026rsquo;s initial status page and subsequent communications focused on containment rather than validating the attacker\u0026rsquo;s data volume assertions.\u003c/p\u003e\n\n\u003ch3 id=\"threat-actor-context-campaign-history\"\u003eThreat Actor Context \u0026amp; Campaign History\u003c/h3\u003e\n\n\u003cp\u003eShinyHunters has a documented history of executing coordinated campaigns targeting third-party data storage platforms. Over the last two years, the group has leveraged these vulnerabilities to extort multiple high-profile institutions. Their recent attack string has expanded beyond the education sector to include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHome security company ADT\u003c/li\u003e\n\u003cli\u003eEducational publisher McGraw Hill\u003c/li\u003e\n\u003cli\u003eGaming developer Rockstar\nHistorically, the group has targeted prominent academic institutions, including Harvard and the University of Pennsylvania, during previous breach waves.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"industry-precedent-legal-fallout\"\u003eIndustry Precedent \u0026amp; Legal Fallout\u003c/h3\u003e\n\n\u003cp\u003eThe article frames this incident within a broader pattern of educational data theft targeting third-party software providers. A comparable breach occurred at education software company PowerSchool in January 2025. That incident exposed highly sensitive records for 62 million students and 9.5 million teachers, including special education classifications, mental health documentation, disciplinary records, and parent restraining orders. PowerSchool faced significant legal repercussions due to inadequate security controls, most notably the failure to deploy multifactor authentication. The company resolved at least one class action lawsuit in February, agreeing to a $17.25 million settlement.\u003c/p\u003e\n","keyPoints":["Infrastructure, the educational company behind the Canvas learning management system, reported a cyber incident where hackers accessed user names, email addresses, student ID numbers, and messages.","Containment efforts involved revoking privileged credentials and deploying patches, which inadvertently disrupted some customer tools.","The ShinyHunters group claimed responsibility for the attack, asserting they stole 3.6 TB of data from more than 9,000 schools.","Infrastructure stated that no financial information, passwords, or government documents were compromised in the breach."],"insights":["Containment actions such as credential revocation and patch deployment directly disrupted customer-facing tools, highlighting the operational trade-off between rapid security response and service continuity.","The ShinyHunters group is executing a supply-chain attack model by targeting third-party data storage platforms across multiple industries, enabling them to extort several high-profile institutions simultaneously.","The discrepancy between the company's confirmation of limited data exposure and the attacker's claim of 3.6 TB exfiltrated from 9,000 schools, combined with the company's refusal to comment, underscores the difficulty of independently verifying breach scope during active incidents."],"referencedReports":[],"body":"\u003cp\u003eInfrastructure, the educational technology firm behind the Canvas learning platform, reported a cyber incident that disrupted operations over the weekend. The company’s chief information security officer confirmed that attackers accessed limited user data, including names, email addresses, student IDs, and internal messages. Containment efforts involved revoking privileged credentials and deploying security patches, though these measures inadvertently disrupted some customer tools.\u003c/p\u003e\n\n\u003cp\u003eThe company explicitly stated that no financial records, passwords, or government documents were compromised. While Infrastructure declined to comment on the breach, the ShinyHunters cybercriminal group claimed responsibility and asserted they exfiltrated 3.6 terabytes of data from over 9,000 schools. This incident follows a pattern of the group targeting third-party educational and technology platforms to extract sensitive information.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a broader industry trend where educational software providers face repeated data theft, citing a January 2025 breach at PowerSchool that exposed records for millions of students and teachers. That previous incident resulted in a $17.25 million class action settlement due to inadequate security controls like multifactor authentication.\u003c/p\u003e\n"},{"n":12,"title":"Announcing Dependabot Configuration Enhancements: Cooldown and Group Support","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/announcing-dependabot-configuration-enhancements-cooldown-and-group-support","time":"17:20","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"StepSecurity's new Dependabot cooldown and grouping features prevent PR queue overload, ensuring teams consistently review and merge dependency updates while the npm Package Cooldown check blocks freshly published malicious packages, creating a sustainable and secure update workflow.","briefOverview":"\u003cp\u003eStepSecurity has introduced cooldown and group attributes to its Dependabot configuration management. The group attribute allows organizations to batch related dependency updates into a single pull request based on update type, package name, or dependency scope. The cooldown attribute establishes a minimum interval between new pull requests, aligning update frequency with team review capacity.\u003c/p\u003e\n\n\u003cp\u003eThese features complement the existing npm Package Cooldown check, which blocks pull requests that introduce packages published within a configurable window. Together, they create a sustainable workflow that prevents PR queue overload while maintaining a security gate against freshly published malicious packages. Recent supply chain attacks in March 2026 demonstrated how overwhelmed teams fail to review dependency updates, leaving them vulnerable to compromised dependencies.\u003c/p\u003e\n\n\u003cp\u003eBy implementing these controls, organizations can maintain consistent patch velocity and quickly identify exposure during security incidents. StepSecurity also offers centralized policy management and automatic configuration generation to streamline adoption across all repositories.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eStepSecurity now supports cooldown and group attributes for Dependabot configuration management across npm, pip, Docker, GitHub Actions, and other ecosystems. The group attribute enables teams to combine related updates into a single pull request by defining rules based on update type, package name patterns, or dependency scope. The cooldown attribute sets a minimum time interval between new pull requests, ensuring update cadence matches the team’s review capacity.\u003c/p\u003e\n\n\u003cp\u003eBoth attributes are managed centrally through StepSecurity’s dashboard, allowing policies to be applied consistently across every repository in an organization. These enhancements work alongside the existing npm Package Cooldown check, which acts as a security gate by blocking pull requests that introduce packages published within a configurable window, typically two days. This dual approach addresses both workflow volume and package-level trust.\u003c/p\u003e\n\n\u003cp\u003eWithout grouping and cooldown controls, repositories often generate dozens of weekly pull requests that overwhelm developers, causing them to ignore updates and leave known vulnerabilities unaddressed. The urgency of this problem was highlighted during March 2026, which saw a rapid succession of major supply chain incidents. The TeamPCP campaign compromised Trivy and Checkmarx KICS GitHub Actions, while the CanisterWorm worm propagated backdoored patch versions across the npm ecosystem.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, a state-sponsored actor attributed to North Korean group UNC1069 compromised the widely used axios package, publishing malicious versions that dropped a remote access trojan. Organizations with functioning update workflows were best positioned to respond to these incidents, whereas those with unreviewed pull request queues could not determine their exposure. StepSecurity provides a straightforward path to implementation, including automatic dependabot.yml generation and configurable cooldown windows ranging from one to thirty days.\u003c/p\u003e\n\n\u003cp\u003eThe platform now covers the entire dependency update lifecycle, from sustainable update pacing and package vetting to blocking known malicious versions and searching for affected repositories. Ultimately, the article positions dependency management as a critical security control rather than routine overhead.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"feature-overview-and-mechanics\"\u003eFeature Overview and Mechanics\u003c/h3\u003e\n\n\u003cp\u003eStepSecurity has introduced two new configuration attributes for Dependabot: \u003cstrong\u003egroup\u003c/strong\u003e and \u003cstrong\u003ecooldown\u003c/strong\u003e. These additions provide organizations with precise control over dependency update batching and arrival frequency across npm, pip, Docker, GitHub Actions, and other supported ecosystems.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGroup Attribute:\u003c/strong\u003e Allows teams to define rules for combining related updates into a single pull request. Configurations can batch updates by type (e.g., minor and patch together), package name patterns, or dependency scope. A typical setup might combine all non-major production updates into a weekly pull request while isolating major version bumps for closer review.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCooldown Attribute:\u003c/strong\u003e Establishes a minimum time interval between new pull requests. This prevents update bursts from overwhelming the team’s queue and ensures the cadence aligns with actual review capacity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCentralized Management:\u003c/strong\u003e Both attributes are configured through StepSecurity’s dashboard, enabling consistent policy application across all organizational repositories. The platform can also automatically generate or enhance \u003ccode\u003edependabot.yml\u003c/code\u003e files for repositories lacking proper configuration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"integration-with-npm-package-cooldown\"\u003eIntegration with npm Package Cooldown\u003c/h3\u003e\n\n\u003cp\u003eThese workflow enhancements complement StepSecurity’s existing npm Package Cooldown check, which operates as a pull request-level security gate.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe npm Package Cooldown check fails pull requests that introduce or update a dependency to a version published within a configurable window, defaulting to two days.\u003c/li\u003e\n\u003cli\u003eThis mechanism mitigates supply chain risk by delaying adoption until the ecosystem has had time to flag malicious packages, a strategy proven effective during the 2025 Shai-Hulud attack.\u003c/li\u003e\n\u003cli\u003eWhile the npm check evaluates package trustworthiness, the new Dependabot cooldown evaluates workflow sustainability. Together, they ensure teams receive manageable updates that have also been vetted by the ecosystem.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"context-march-2026-supply-chain-attacks\"\u003eContext: March 2026 Supply Chain Attacks\u003c/h3\u003e\n\n\u003cp\u003eThe article highlights March 2026 as a critical period for software supply chain incidents, demonstrating why sustainable update workflows are essential.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTeamPCP Campaign:\u003c/strong\u003e Compromised 76 of 77 version tags of the Trivy GitHub Action and targeted the Checkmarx KICS Action, embedding WAV steganography credential stealers that harvested secrets from CI/CD runners.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCanisterWorm:\u003c/strong\u003e Utilized stolen npm tokens from compromised pipelines to propagate a self-propagating worm, publishing backdoored patch versions across multiple namespaces, including 16+ packages in the @opengov scope.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAxios Compromise:\u003c/strong\u003e A state-sponsored actor attributed to North Korean group UNC1069 hijacked the popular axios package. Malicious versions dropped a cross-platform remote access trojan, and the attacker deleted community warning issues approximately 20 times before GitHub suspended the account.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImpact:\u003c/strong\u003e Organizations with current dependency trees and functioning update workflows could immediately assess their exposure. Conversely, teams with weeks of unreviewed pull requests could not answer critical questions about their running versions or compromise status.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"the-problem-and-solution\"\u003eThe Problem and Solution\u003c/h3\u003e\n\n\u003cp\u003eDependabot is widely enabled but often ineffective due to poor workflow design.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVolume Overload:\u003c/strong\u003e Without grouping, repositories generate dozens of individual pull requests weekly. Minor updates receive the same attention as critical security patches, collapsing the signal-to-noise ratio and causing developers to ignore updates entirely.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnmanaged Cadence:\u003c/strong\u003e Without cooldown controls, updates arrive on Dependabot’s default schedule regardless of team capacity. Cascading transitive updates or post-inactivity bursts create unmanageable queues, leading teams to mute notifications, close pull requests in bulk, or disable the tool.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRemediation:\u003c/strong\u003e Grouping reduces volume so each pull request receives attention, while cooldown sustains the flow so teams continue reviewing. When targeted attacks like CanisterWorm exploit silent auto-installation of patch versions, grouped and paced pull requests ensure developers actually review them.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"implementation-and-lifecycle-coverage\"\u003eImplementation and Lifecycle Coverage\u003c/h3\u003e\n\n\u003cp\u003eOrganizations can adopt these features through several pathways. Policy Driven PRs users can update their configuration to include cooldown and group attributes. StepSecurity can automatically generate configuration files for repositories without a \u003ccode\u003edependabot.yml\u003c/code\u003e file. The npm Package Cooldown check can be enabled in the dashboard with configurable windows ranging from one to thirty days.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFull Lifecycle Coverage:\u003c/strong\u003e StepSecurity now manages the complete dependency update lifecycle. Dependabot group and cooldown control update pacing and format. The npm Package Cooldown check vets package age. The npm Package Compromised Updates check blocks known malicious versions. The npm Package Search tool identifies affected repositories during incidents.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStrategic Positioning:\u003c/strong\u003e The article frames dependency management not as administrative overhead, but as a foundational security control. Maintaining current dependencies, reviewing updates consistently, and tracking running versions determines organizational exposure and recovery speed during supply chain incidents.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["StepSecurity now supports cooldown and group attributes in Dependabot configuration to batch related updates and control the frequency of proposed pull requests.","The group attribute combines related dependency updates into a single pull request, while the cooldown attribute sets a minimum interval between PRs to match team review capacity.","These features complement the existing npm Package Cooldown check, which blocks pull requests that introduce recently published packages to mitigate supply chain attack risks.","Without grouping and cooldown controls, overwhelming PR queues cause teams to ignore dependency updates, leaving known vulnerabilities unaddressed during supply chain incidents."],"insights":["Organizations with functioning update workflows were best positioned to respond to the March 2026 supply chain attacks, whereas those with unreviewed PR queues could not determine their exposure to compromised dependencies.","The CanisterWorm threat actor specifically targeted patch versions to exploit silent auto-installation, making the new grouping feature essential for surfacing these low-signal updates for manual review.","The axios compromise involved a state-sponsored actor deleting GitHub issues to warn the community roughly 20 times before the account was suspended."],"referencedReports":[],"body":"\u003cp\u003eStepSecurity has introduced cooldown and group attributes to its Dependabot configuration management. The group attribute allows organizations to batch related dependency updates into a single pull request based on update type, package name, or dependency scope. The cooldown attribute establishes a minimum interval between new pull requests, aligning update frequency with team review capacity.\u003c/p\u003e\n\n\u003cp\u003eThese features complement the existing npm Package Cooldown check, which blocks pull requests that introduce packages published within a configurable window. Together, they create a sustainable workflow that prevents PR queue overload while maintaining a security gate against freshly published malicious packages. Recent supply chain attacks in March 2026 demonstrated how overwhelmed teams fail to review dependency updates, leaving them vulnerable to compromised dependencies.\u003c/p\u003e\n\n\u003cp\u003eBy implementing these controls, organizations can maintain consistent patch velocity and quickly identify exposure during security incidents. StepSecurity also offers centralized policy management and automatic configuration generation to streamline adoption across all repositories.\u003c/p\u003e\n"},{"n":3,"title":"Ransomware group claims breach of pro-Orbán Hungarian media firm","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/ransomware-group-claims-breach-of-pro-orban-media-firm","time":"15:23","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""},{"n":4,"title":"Trellix discloses data breach after source code repository hack","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/trellix-discloses-data-breach-after-source-code-repository-hack/","time":"16:25","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

}

  return (

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
