<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":6,"title":"⚡ Weekly Recap: AI-Powered Phishing, Android Spying Tool, Linux Exploit, GitHub RCE \u0026 More","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/weekly-recap-ai-powered-phishing.html","time":"14:23","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Attackers are rapidly scaling sophisticated operations across SaaS environments, Linux kernels, and open-source supply chains, making immediate patching of critical vulnerabilities and strict verification of pipeline credentials essential for defense.","briefOverview":"\u003cp\u003eThis week’s cybersecurity landscape is defined by rapid, high-impact attacks targeting foundational infrastructure and trusted development pipelines. A critical cPanel vulnerability is actively being exploited, leading to complete website wipes and the deployment of botnet variants and ransomware. Simultaneously, the Linux kernel’s Copy Fail flaw has been confirmed as actively exploited, offering reliable privilege escalation and container escapes without leaving disk traces.\u003c/p\u003e\n\n\u003cp\u003eAttackers are also leveraging a severe GitHub remote code execution flaw to compromise enterprise codebases and internal secrets. Beyond infrastructure, threat actors are increasingly operating within SaaS environments and weaponizing legitimate CI/CD pipelines to distribute poisoned software under real developer identities. The VECT 2.0 ransomware variant further escalates the threat by permanently wiping files instead of encrypting them, making data recovery impossible even for the attackers. Organizations must prioritize immediate patching of these critical vulnerabilities and rigorously verify their supply chain credentials to mitigate these accelerating threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe weekly recap highlights a shift from initial breaches to sustained occupation, with attackers scaling operations across SaaS, Linux kernels, and open-source pipelines. The cPanel critical flaw CVE-2026-41940 is under active exploitation, causing complete website wipes and deploying Mirai variants and the Sorry ransomware strain. In SaaS environments, cybercrime groups Cordial Spider and Snarky Spider are using vishing to bypass MFA, capture credentials, and move laterally while masking traffic through residential proxies.\u003c/p\u003e\n\n\u003cp\u003eThe Linux Copy Fail vulnerability CVE-2026-31431 has been added to CISA’s KEV catalog due to its reliable, memory-only privilege escalation and container escape capabilities. TeamPCP continues its supply chain campaign by poisoning packages across npm, PyPI, and Packagist, weaponizing legitimate CI/CD pipelines to push malicious versions under real identities. A new Python backdoor framework called DEEP#DOOR provides persistent remote command execution, surveillance, and system disruption capabilities on Windows systems.\u003c/p\u003e\n\n\u003cp\u003eResearchers also disclosed a critical GitHub RCE vulnerability CVE-2026-3854 that allows authenticated users to execute code or compromise enterprise servers with a single git push. The VECT 2.0 ransomware-as-a-service platform partners with TeamPCP and BreachForums, permanently wiping files instead of encrypting them to ensure irreversible data loss. Additional threats include the KidsProtect Android spyware sold on the clear web, the KYCShadow malware targeting Indian users via WhatsApp, and spear-phishing campaigns against Pakistani government entities using VS Code tunnel abuse.\u003c/p\u003e\n\n\u003cp\u003eMultiple phishing campaigns are leveraging Calendly branding, Microsoft Teams IT impersonation, and the new AI-integrated Bluekit phishing kit to steal credentials and deploy malware. Ransomware and fraud campaigns are surging, with Fortinet reporting nearly 8.8K ransomware victims in 2025 and Europol dismantling a €50 million cryptocurrency fraud ring. Notable disclosures include ClickUp’s exposure of customer emails in feature flags, the arrest of a Scattered Spider member, and the Xygeni compromise linked to a residential proxy botnet. Organizations are urged to patch trending CVEs immediately, verify supply chains, tighten SaaS access controls, and treat routine logins and pipeline runs as potentially hostile.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"threat-landscape-overview\"\u003eThreat Landscape Overview\u003c/h2\u003e\n\n\u003cp\u003eThe current cybersecurity environment has shifted from initial breaches to sustained occupation. Attackers are operating with professional precision, scaling operations across SaaS ecosystems, Linux kernels, and open-source development pipelines. The gap between vulnerability disclosure and active exploitation continues to shrink, demanding immediate defensive action.\u003c/p\u003e\n\n\u003ch2 id=\"critical-vulnerabilities-active-exploitation\"\u003eCritical Vulnerabilities \u0026amp; Active Exploitation\u003c/h2\u003e\n\n\u003cp\u003eSeveral high-severity flaws are under active exploitation or have been patched with critical severity ratings:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ecPanel \u0026amp; WHM (CVE-2026-41940):\u003c/strong\u003e A critical authentication bypass flaw is actively exploited in the wild. Successful attacks have resulted in complete website wipes, the deployment of Mirai botnet variants, and the installation of the Sorry ransomware strain.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLinux Kernel Copy Fail (CVE-2026-31431):\u003c/strong\u003e Added to CISA’s Known Exploited Vulnerabilities catalog, this logic bug enables reliable privilege escalation via a 732-byte Python exploit. It executes entirely in memory, leaves no disk traces, and facilitates container escapes across Kubernetes clusters.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub RCE (CVE-2026-3854):\u003c/strong\u003e A critical flaw allowing authenticated users to achieve remote code execution or full server compromise with a single git push command. Microsoft patched the issue within six days, but exploitation could expose nearly all major enterprise codebases and internal secrets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdditional Trending CVEs:\u003c/strong\u003e The article highlights numerous other critical vulnerabilities, including CVE-2026-42208 (LiteLLM SQL injection), CVE-2026-32202 (Microsoft Windows Shell), CVE-2026-26268 (Cursor CI RCE), CVE-2026-35414 (OpenSSH), CVE-2026-6770 (Firefox/Tor privacy), CVE-2026-42167 (ProFTPD), CVE-2026-24908 (OpenEMR), CVE-2026-6807 (GRASSMARLIN), CVE-2026-7363 (Google Chrome), CVE-2026-7322 (Firefox), CVE-2026-6100 (CPython), CVE-2026-0204 (SonicWall), CVE-2026-42511 (FreeBSD), CVE-2026-40684 (Exim), CVE-2026-5402 (Wireshark), CVE-2026-42520 (Jenkins), CVE-2026-3008 (Notepad++), and CODESYS vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"supply-chain-saas-threats\"\u003eSupply Chain \u0026amp; SaaS Threats\u003c/h2\u003e\n\n\u003cp\u003eThreat actors are increasingly weaponizing trusted development environments and legitimate workflows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTeamPCP Supply Chain Campaign:\u003c/strong\u003e The group continues its \u0026ldquo;Mini Shai Hulud\u0026rdquo; attacks across npm, PyPI, and Packagist. They weaponize CI/CD pipelines to push poisoned software versions under real developer identities, making detection extremely difficult. Immediate mitigation requires rotating pipeline credentials and reducing credential scoping.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSaaS Ecosystem Occupation:\u003c/strong\u003e Groups like Cordial Spider and Snarky Spider use vishing to bypass MFA and capture single sign-on credentials. They move laterally across SaaS environments, remove MFA devices, delete alert emails, and mask traffic using residential proxy networks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVECT 2.0 Ransomware:\u003c/strong\u003e This ransomware-as-a-service platform partners with TeamPCP and BreachForums. It permanently wipes large files instead of encrypting them, making data recovery impossible even for the attackers. The platform covers the full operational lifecycle for affiliates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-phishing-fraud-campaigns\"\u003eMalware, Phishing, \u0026amp; Fraud Campaigns\u003c/h2\u003e\n\n\u003cp\u003eA diverse array of malicious tools and deceptive campaigns are targeting users and organizations globally:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDEEP#DOOR Backdoor:\u003c/strong\u003e A stealthy Python framework enabling persistent remote command execution, system reconnaissance, keylogging, webcam/microphone access, and system disruption like MBR overwriting and Defender disabling.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAndroid Surveillance \u0026amp; Malware:\u003c/strong\u003e KidsProtect is marketed on the clear web as a subscription-based spyware tool offering near-total phone control. KYCShadow masquerades as a bank verification app distributed via WhatsApp, using Firebase and VPN manipulation to harvest credentials and OTPs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePhishing \u0026amp; Social Engineering:\u003c/strong\u003e Spear-phishing campaigns target Pakistani government entities using VS Code tunnel abuse for persistence. Calendly-themed phishing kits fingerprint visitors and steal credentials. Microsoft Teams phishing impersonates IT help desks following email bombing. The AI-integrated Bluekit phishing kit offers over 40 templates and AI drafting assistants. GovTrap and FEMITBOT scale global fraud through fake government portals and Telegram Mini Apps.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDesktop \u0026amp; Credential Theft:\u003c/strong\u003e A Pastebin-hosted PowerShell script steals Telegram Desktop sessions. KarstoRAT RAT is distributed via fake Roblox game marketplaces, enabling reconnaissance, audio monitoring, and token theft. ClickUp disclosed an exposure of 893 customer emails and an API token in feature flag configurations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-law-enforcement-developments\"\u003eIndustry \u0026amp; Law Enforcement Developments\u003c/h2\u003e\n\n\u003cp\u003eLaw enforcement and industry initiatives are responding to the escalating threat landscape:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eArrests \u0026amp; Takedowns:\u003c/strong\u003e Finnish authorities arrested a 19-year-old Scattered Spider member attempting to board a flight to Japan. Europol dismantled a €50 million cryptocurrency fraud ring operating call centers in Albania, arresting ten individuals and seizing significant assets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInfrastructure \u0026amp; DDoS Attacks:\u003c/strong\u003e Canonical’s Ubuntu servers were knocked offline by a sustained, cross-border DDoS attack claimed by the pro-Iranian hacktivist group 313 Team. A Brazilian anti-DDoS firm, Huge Networks, enabled a botnet that attacked other ISPs, later claiming it was a competitor intrusion.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAI \u0026amp; Security Tooling:\u003c/strong\u003e Cisco released the open-source Model Provenance Kit to verify AI model origins and detect modifications. OpenAI launched Advanced Account Security with YubiKey integration for ChatGPT. Google updated Android’s Credential Manager to issue cryptographically verified email credentials without OTPs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData Leaks \u0026amp; Compromises:\u003c/strong\u003e Truffle Security found 8,792 unique secrets leaked across 22 million public projects on cloud development environments like CodePen and StackBlitz. The Xygeni GitHub compromise is linked to a proxy botnet using hacked ASUS and TP-Link routers running a ShadowLink beacon. EnOcean SmartServer flaws allow arbitrary command execution and ASLR bypasses on building management systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"strategic-recommendations\"\u003eStrategic Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes with actionable guidance for security teams. Organizations must patch critical vulnerabilities immediately, starting with those marked as actively exploited. Supply chains require rigorous verification, and pipeline credentials must be rotated and scoped narrowly. SaaS access controls need tightening, and every routine login or pipeline execution should be treated as potentially hostile. Security programs must shift from compliance theater to measurable maturity, focusing on concrete behavioral targets and business risk alignment. Small defensive habits now will prevent major operational disruptions later.\u003c/p\u003e\n","keyPoints":["A critical cPanel vulnerability (CVE-2026-41940) is actively being exploited in the wild, resulting in complete website wipes and the deployment of botnet variants and ransomware.","The Linux kernel's Copy Fail flaw (CVE-2026-31431) has been added to CISA's KEV catalog because it reliably triggers privilege escalation and enables container escapes without leaving disk traces.","TeamPCP continues its supply chain attacks across npm, PyPI, and Packagist by weaponizing legitimate CI/CD pipelines to push poisoned software versions under real developer identities.","A critical GitHub vulnerability (CVE-2026-3854) allows authenticated users to achieve remote code execution or full server compromise with a single git push command."],"insights":["The Copy Fail Linux kernel flaw (CVE-2026-31431) executes entirely in memory without writing to disk, making traditional forensic detection impossible while reliably triggering privilege escalation 100% of the time.","TeamPCP weaponizes legitimate CI/CD pipelines to push poisoned software under real developer identities, forcing organizations to immediately rotate pipeline credentials and reduce credential scoping rather than relying on standard vulnerability scanners.","Threat actors like Cordial Spider bypass MFA through vishing and conceal lateral movement across SaaS environments by routing traffic through residential proxy networks to mimic legitimate home user behavior.","VECT 2.0 ransomware permanently destroys data by wiping large files instead of encrypting them, making recovery impossible even for the attackers themselves.","Nearly 8,800 unique secrets have been leaked across 22 million public projects on cloud development environments like CodePen and CodeSandbox, exposing a critical blind spot in traditional secret monitoring."],"referencedReports":[{"title":"VECT 2.0: An Insider Perspective on the New Ransomware Variant","url":"https://labs.beazley.security/articles/vect-2-0-an-insider-perspective-on-the-new-ransomware-variant","publisher":"Beazley Security","context":"The article cites this analysis to explain that VECT 2.0 wipes large files instead of encrypting them, making recovery impossible even for the attackers."},{"title":"ICS Advisory 2026-118-01","url":"https://www.cisa.gov/news-events/ics-advisories/icsa-26-118-01","publisher":"CISA","context":"The article references this advisory when listing CVE-2026-6807, which impacts GRASSMARLIN software."},{"title":"Fortinet 2026 Global Threat Landscape Report","url":"https://www.fortinet.com/corporate/about-us/newsroom/press-releases/2026/fortinet-2026-global-threat-landscape-report-reveals-surge-in-ai-enabled-cybercrime-increase-ransomware-victims-year-over-year","publisher":"Fortinet","context":"The article uses this report to cite data showing a 389% year-over-year increase in ransomware victims in 2025, driven by AI-enabled cybercrime toolkits."},{"title":"KYCShadow: An Android Banking Malware Exploiting Fake KYC Workflows for Credential and OTP Theft","url":"https://www.cyfirma.com/research/kycshadow-an-android-banking-malware-exploiting-fake-kyc-workflows-for-credential-and-otp-theft/","publisher":"CYFIRMA","context":"The article references this research to detail how the malware functions as a multi-stage dropper that uses native code obfuscation and Firebase-based remote execution to harvest sensitive user data."},{"title":"Exploiting EnOcean SmartServer to Attack Connected Building Management Systems","url":"https://claroty.com/team82/research/exploiting-enocean-smartserver-to-attack-connected-building-management-systems","publisher":"Claroty Team82","context":"The article cites this research to explain how crafted LON IP-852 messages can bypass ASLR protections and execute arbitrary commands on legacy building automation devices."}],"body":"\u003cp\u003eThis week’s cybersecurity landscape is defined by rapid, high-impact attacks targeting foundational infrastructure and trusted development pipelines. A critical cPanel vulnerability is actively being exploited, leading to complete website wipes and the deployment of botnet variants and ransomware. Simultaneously, the Linux kernel’s Copy Fail flaw has been confirmed as actively exploited, offering reliable privilege escalation and container escapes without leaving disk traces.\u003c/p\u003e\n\n\u003cp\u003eAttackers are also leveraging a severe GitHub remote code execution flaw to compromise enterprise codebases and internal secrets. Beyond infrastructure, threat actors are increasingly operating within SaaS environments and weaponizing legitimate CI/CD pipelines to distribute poisoned software under real developer identities. The VECT 2.0 ransomware variant further escalates the threat by permanently wiping files instead of encrypting them, making data recovery impossible even for the attackers. Organizations must prioritize immediate patching of these critical vulnerabilities and rigorously verify their supply chain credentials to mitigate these accelerating threats.\u003c/p\u003e\n"},{"n":7,"title":"Progress Patches Critical MOVEit Automation Bug Enabling Authentication Bypass","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/progress-patches-critical-moveit.html","time":"16:34","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Progress Software has released urgent patches for MOVEit Automation to address critical authentication bypass and privilege escalation vulnerabilities, advising immediate updates since no workarounds exist and previous flaws in the platform were exploited by ransomware groups.","briefOverview":"\u003cp\u003eProgress Software has released urgent updates to address two critical security vulnerabilities in MOVEit Automation. The first flaw, CVE-2026-4670, carries a CVSS score of 9.8 and enables authentication bypass. The second flaw, CVE-2026-5174, has a CVSS score of 7.7 and allows privilege escalation through improper input validation. These issues specifically target the service backend command port interfaces and could lead to unauthorized administrative access and data exposure. Airbus SecLab researchers discovered and reported the vulnerabilities, but no temporary workarounds are available. Users must immediately upgrade to patched versions to secure their environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eProgress Software has issued security updates for MOVEit Automation to resolve two distinct vulnerabilities affecting the platform. The first issue, designated as CVE-2026-4670, is a critical authentication bypass flaw with a CVSS score of 9.8. The second issue, CVE-2026-5174, is a high-severity improper input validation vulnerability scoring 7.7 that enables privilege escalation. Progress Software explicitly warns that these critical and high vulnerabilities impact the service backend command port interfaces. Successful exploitation could result in unauthorized system access, full administrative control, and sensitive data exposure. The vulnerabilities impact multiple software releases, including versions up to 2025.1.4, 2025.0.8, and 2024.1.7. Each affected release has corresponding fixed versions available, specifically 2025.1.5, 2025.0.9, and 2024.1.8. Researchers from Airbus SecLab, including Anaïs Gantet, Delphine Gourdou, Quentin Liddell, and Matteo Ricordeau, are credited with identifying and reporting these flaws. The vendor has confirmed that there are no alternative workarounds to mitigate the issues without applying the official patches. While Progress Software has not reported any active exploitation in the wild, immediate remediation is strongly advised. This urgency stems from the history of MOVEit Transfer being targeted by ransomware groups such as Cl0p. Organizations should prioritize applying the available updates to prevent potential compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview\u003c/strong\u003e\nProgress Software has released critical updates to address two security flaws within MOVEit Automation. The first flaw, identified as CVE-2026-4670, is a critical authentication bypass vulnerability with a CVSS score of 9.8. The second flaw, CVE-2026-5174, is a high-severity improper input validation issue scoring 7.7 that facilitates privilege escalation. Both vulnerabilities specifically target the service backend command port interfaces.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImpact and Exploitation\u003c/strong\u003e\nProgress Software warns that exploitation of these flaws could lead to unauthorized access, complete administrative control, and significant data exposure. The advisory emphasizes that these are critical and high-severity issues requiring immediate attention. There are currently no workarounds available to mitigate the vulnerabilities without applying the official vendor patches.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected Versions and Remediation\u003c/strong\u003e\nThe security flaws impact the following software versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMOVEit Automation versions less than or equal to 2025.1.4, which are fixed in version 2025.1.5.\u003c/li\u003e\n\u003cli\u003eMOVEit Automation versions less than or equal to 2025.0.8, which are fixed in version 2025.0.9.\u003c/li\u003e\n\u003cli\u003eMOVEit Automation versions less than or equal to 2024.1.7, which are fixed in version 2024.1.8.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eResearch Credits and Threat Context\u003c/strong\u003e\nAirbus SecLab researchers Anaïs Gantet, Delphine Gourdou, Quentin Liddell, and Matteo Ricordeau have been officially credited with discovering and reporting these vulnerabilities. Although Progress Software has not confirmed any in-the-wild exploitation, the vendor strongly urges immediate patching. This recommendation is heavily influenced by previous MOVEit Transfer flaws that were actively exploited by ransomware gangs like Cl0p. Organizations must apply the fixes promptly to maintain optimal security posture.\u003c/p\u003e\n","keyPoints":["Progress Software has released updates to address two critical security flaws in MOVEit Automation that could allow authentication bypass and privilege escalation.","The vulnerabilities, identified as CVE-2026-4670 and CVE-2026-5174, affect multiple software versions and require immediate patching as no workarounds exist.","Airbus SecLab researchers discovered and reported the flaws, which Progress Software advises users to fix promptly given the platform's history of ransomware exploitation.","The fixes are available in MOVEit Automation versions 2025.1.5, 2025.0.9, and 2024.1.8 for the affected releases."],"insights":["The vulnerabilities specifically exploit the service backend command port interfaces, indicating that internal service communication channels are the primary attack vector rather than the standard web interface.","Progress Software explicitly states there are no workarounds, meaning security teams cannot rely on temporary mitigations and must treat immediate version upgrades as the only remediation path.","The authentication bypass flaw carries a CVSS score of 9.8, signaling a critical vulnerability that likely enables remote exploitation without requiring valid credentials or user interaction.","Although Progress reports no current in-the-wild exploitation, the advisory explicitly ties the urgency to historical ransomware campaigns like Cl0p that previously targeted MOVEit products."],"referencedReports":[{"title":"MOVEit Automation Critical Security Alert Bulletin April 2026 CVE-2026-4670 CVE-2026-5174","url":"https://community.progress.com/s/article/MOVEit-Automation-Critical-Security-Alert-Bulletin-April-2026-CVE-2026-4670-CVE-2026-5174","publisher":"Progress Software","context":"The article cites this link as the official advisory detailing the critical vulnerabilities and required patches."},{"title":"Airbus SecLab Research Credits","url":"https://airbus-seclab.github.io/#2026","publisher":"Airbus SecLab","context":"The article links to this page to credit the researchers who discovered and reported the two vulnerabilities."}],"body":"\u003cp\u003eProgress Software has released urgent updates to address two critical security vulnerabilities in MOVEit Automation. The first flaw, CVE-2026-4670, carries a CVSS score of 9.8 and enables authentication bypass. The second flaw, CVE-2026-5174, has a CVSS score of 7.7 and allows privilege escalation through improper input validation. These issues specifically target the service backend command port interfaces and could lead to unauthorized administrative access and data exposure. Airbus SecLab researchers discovered and reported the vulnerabilities, but no temporary workarounds are available. Users must immediately upgrade to patched versions to secure their environments.\u003c/p\u003e\n"},{"n":8,"title":"Bitwarden CLI Hijacked on npm: Bun-Staged Credential Stealer Targets Developers, GitHub Actions, and AI Tools","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/bitwarden-cli-hijacked-on-npm-bun-staged-credential-stealer-targets-developers-github-actions-and-ai-tools","time":"17:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A compromised Bitwarden CLI package deployed a silent credential stealer via a malicious preinstall hook that harvested SSH keys, cloud credentials, and AI tool configurations while weaponizing stolen GitHub tokens to inject malicious workflows. This attack demonstrates that strict network egress controls in CI/CD pipelines are essential to prevent credential exfiltration and stop supply chain pivots.","briefOverview":"\u003cp\u003eThe official Bitwarden CLI package was compromised when an attacker hijacked a maintainer\u0026rsquo;s GitHub account and exploited npm\u0026rsquo;s OIDC Trusted Publishing to publish a malicious version. The compromised release included a silent preinstall hook that downloaded the Bun JavaScript runtime and executed a credential stealer targeting SSH keys, cloud credentials, and AI tool configurations. Stolen data was encrypted and exfiltrated to a domain impersonating Checkmarx, with fallback channels leveraging legitimate GitHub API infrastructure. StepSecurity\u0026rsquo;s AI Package Analyst detected the attack by identifying anomalous behavioral signals like a newly introduced install script and unexpected runtime downloads. The incident highlights how OIDC Trusted Publishing lacks branch-level restrictions and how strict network egress controls in CI/CD pipelines are essential to prevent credential exfiltration.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe @bitwarden/cli@2026.4.0 package was compromised and republished on npm after an attacker hijacked a Bitwarden engineer\u0026rsquo;s GitHub account. This represents the first confirmed supply chain attack utilizing npm\u0026rsquo;s OIDC Trusted Publishing, where the attacker rewrote the publish-cli.yml workflow to exchange a GitHub Actions OIDC token for an npm auth token. Because npm Trusted Publishing lacks branch-level restrictions and no approval gate was configured, the malicious package was successfully published. The compromised release featured a preinstall hook that silently downloaded the Bun JavaScript runtime and executed a 9.7 MB obfuscated credential stealer. The malware targeted SSH keys, npm and GitHub tokens, AWS and GCP credentials, shell history, environment variables, and AI tool configuration files like those for Claude Code and Cursor. Exfiltrated data was encrypted with AES-256-GCM and sent to audit.checkmarx.cx, a domain registered to impersonate Checkmarx. The attacker also implemented resilient fallback channels using GitHub commit history and victim account repositories to maintain command-and-control persistence. StepSecurity\u0026rsquo;s AI Package Analyst detected the compromise by flagging three critical signals: a newly introduced preinstall script, undocumented files with no git history, and anomalous runtime downloads during installation. A forensic version mismatch between the declared package version and internal metadata further confirmed the artifact was injected rather than rebuilt from source. StepSecurity\u0026rsquo;s Harden Runner successfully blocked the exfiltration attempt in a controlled test by enforcing network egress restrictions. The article provides detailed indicators of compromise and recommends immediate remediation steps, including uninstalling the malicious version, rotating all credentials, auditing GitHub repositories for injected workflows, and enforcing \u0026ndash;ignore-scripts in CI/CD pipelines. Pinning exact package versions and utilizing automated package checks are strongly advised to prevent future supply chain incidents.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nThe @bitwarden/cli@2026.4.0 package was compromised and republished on npm, marking the first confirmed supply chain attack that leveraged npm\u0026rsquo;s OIDC Trusted Publishing mechanism. An attacker hijacked a Bitwarden engineer\u0026rsquo;s GitHub account and created a new branch in the bitwarden/clients repository. The attacker staged a prebuilt malicious tarball and rewrote the publish-cli.yml workflow to exchange a GitHub Actions OIDC token for an npm auth token via the registry API. Because npm Trusted Publishing does not support branch-level restrictions and no required approval gate was configured on the workflow, the compromised package was successfully published. The attacker subsequently deleted the workflow runs, branch, and release tag, leaving the published package as the primary artifact.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMalware Execution and Targets\u003c/strong\u003e\nThe compromised package shipped with a preinstall hook that silently downloaded the Bun JavaScript runtime and executed a 9.7 MB obfuscated credential stealer. Using Bun instead of Node.js was a deliberate evasion tactic designed to bypass EDR rules and security scanners tuned to flag suspicious node child processes. The payload contained three primary collectors running in parallel:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeveloper Credential Sweep: Targeted SSH keys, Git credentials, shell history, npm tokens, GitHub tokens, AWS/GCP credentials, and .env files.\u003c/li\u003e\n\u003cli\u003eAI Tool Credential Targeting: Explicitly enumerated Claude Code, Kiro, Cursor, Codex CLI, and Aider, treating ~/.claude.json and MCP server configurations as first-class exfiltration targets.\u003c/li\u003e\n\u003cli\u003eGitHub Actions Runner Targeting: Activated when GITHUB_ACTIONS=true was detected, retrieving GitHub CLI session tokens and validating them against the GitHub API.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eExfiltration and Persistence\u003c/strong\u003e\nCollected data was encrypted with AES-256-GCM and exfiltrated to audit.checkmarx.cx, a domain registered to impersonate the security vendor Checkmarx. When a valid GitHub token was discovered, the malware weaponized it to enumerate repositories, extract Actions secrets, and inject malicious workflows into every accessible repository. The attacker also implemented a resilient fallback command-and-control architecture consisting of three channels:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommit-embedded attacker PATs: Base64-encoded tokens hidden in commit messages were decoded and used to create repositories under the attacker\u0026rsquo;s account.\u003c/li\u003e\n\u003cli\u003eSigned domain rotation: RSA-signed blobs prefixed with beautifulcastle in commit messages allowed the attacker to rotate C2 domains without updating the payload.\u003c/li\u003e\n\u003cli\u003eVictim account exfiltration: Stolen GitHub tokens were used to create repositories under the victim\u0026rsquo;s own account, making traffic indistinguishable from normal API usage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetection and Forensic Indicators\u003c/strong\u003e\nStepSecurity\u0026rsquo;s AI Package Analyst detected the compromise by running behavioral analysis on the package diff. Three signals triggered an immediate CRITICAL verdict:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA preinstall script appeared for the first time in the package\u0026rsquo;s history.\u003c/li\u003e\n\u003cli\u003eTwo undocumented files, bw_setup.js and bw1.js, were introduced with no presence in the project\u0026rsquo;s git history.\u003c/li\u003e\n\u003cli\u003eThe loader downloaded the Bun runtime from GitHub during installation, representing anomalous network activity for a CLI tool.\nForensic analysis revealed a version mismatch where package.json declared version 2026.4.0 but embedded metadata still referenced 2026.3.0, confirming the artifact was injected rather than rebuilt from source. In a controlled test, StepSecurity\u0026rsquo;s Harden Runner blocked the exfiltration connection to audit.checkmarx.cx and logged the anomalous Bun download.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Defense Recommendations\u003c/strong\u003e\nOrganizations are advised to immediately uninstall the compromised version and downgrade to @bitwarden/cli@2026.3.0 using \u0026ndash;ignore-scripts. All credentials on affected machines and CI/CD pipelines must be rotated, including GitHub tokens, npm tokens, SSH keys, cloud credentials, and AI tool API keys. GitHub repositories accessible to affected accounts should be audited for malicious workflow injections and unauthorized branch creation. Network logs must be checked for connections to audit.checkmarx.cx or its associated IP address. To prevent future incidents, developers should pin exact package versions, enforce \u0026ndash;ignore-scripts in automated builds, and utilize automated package checks that block known malicious releases. StepSecurity\u0026rsquo;s Harden Runner egress enforcement and AI Package Analyst monitoring provide defense-in-depth capabilities to detect and block supply chain compromises before they impact production environments.\u003c/p\u003e\n","keyPoints":["The @bitwarden/cli@2026.4.0 package was compromised and republished on npm after an attacker hijacked a maintainer's GitHub account and exploited OIDC Trusted Publishing.","The malicious release included a preinstall hook that silently downloaded the Bun runtime and executed a credential stealer targeting SSH keys, cloud credentials, and AI tool configurations.","Exfiltrated data was sent to a domain impersonating Checkmarx, while fallback command-and-control channels utilized legitimate GitHub API infrastructure to maintain persistence.","StepSecurity detected the attack by flagging anomalous behavioral signals such as a newly introduced install script, undocumented files, and unexpected runtime downloads during package installation."],"insights":["npm's OIDC Trusted Publishing lacks branch-level restrictions, allowing attackers to publish malicious packages from compromised branches without approval gates.","The credential stealer explicitly enumerates and exfiltrates data from AI coding assistants like Claude Code and Cursor, treating AI configuration files as first-class targets alongside traditional secrets.","A version mismatch between the declared package version and internal metadata serves as a reliable forensic indicator that an artifact was injected rather than rebuilt from source.","The malware uses the Bun JavaScript runtime instead of Node.js to evade security detections, as EDR rules and scanners are often tuned to flag suspicious node processes but miss bun."],"referencedReports":[],"body":"\u003cp\u003eThe official Bitwarden CLI package was compromised when an attacker hijacked a maintainer\u0026rsquo;s GitHub account and exploited npm\u0026rsquo;s OIDC Trusted Publishing to publish a malicious version. The compromised release included a silent preinstall hook that downloaded the Bun JavaScript runtime and executed a credential stealer targeting SSH keys, cloud credentials, and AI tool configurations. Stolen data was encrypted and exfiltrated to a domain impersonating Checkmarx, with fallback channels leveraging legitimate GitHub API infrastructure. StepSecurity\u0026rsquo;s AI Package Analyst detected the attack by identifying anomalous behavioral signals like a newly introduced install script and unexpected runtime downloads. The incident highlights how OIDC Trusted Publishing lacks branch-level restrictions and how strict network egress controls in CI/CD pipelines are essential to prevent credential exfiltration.\u003c/p\u003e\n"},{"n":9,"title":"TeamPCP Injects Two-Stage Credential Stealer into xinference PyPI Package","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/teampcp-injects-two-stage-credential-stealer-into-xinference-pypi-package","time":"17:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"TeamPCP compromised three versions of the xinference PyPI package with a credential-stealing payload that executes immediately upon import and exfiltrates sensitive data to an attacker-controlled domain. Affected users must immediately downgrade to a safe version, rotate all exposed credentials, and monitor network logs for unauthorized outbound connections.","briefOverview":"\u003cp\u003eOn April 22, 2026, three consecutive versions of the xinference PyPI package were compromised with a two-stage credential-stealing payload injected directly into the \u003ccode\u003e__init__.py\u003c/code\u003e file. The malicious code executes immediately upon module import, harvesting SSH keys, cloud credentials, environment variables, and cryptocurrency wallets before compressing the data into a file named \u003ccode\u003elove.tar.gz\u003c/code\u003e. This archive is exfiltrated via a \u003ccode\u003ecurl\u003c/code\u003e POST request to an attacker-controlled domain, leaving no artifacts on disk due to automatic cleanup. The threat actor, identified as TeamPCP, iterated on the injection technique across the three versions within a single day, progressively hiding the payload inside a legitimate function and refining its execution method. Unlike previous campaigns by the same actor, this payload lacks encryption and sends the stolen data as a plain compressed archive. All three compromised versions have been yanked from PyPI, and affected systems require immediate credential rotation and network log auditing to mitigate the breach. Security researchers independently analyzed the payloads and documented the full technical breakdown of the attack chain.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn April 22, 2026, three consecutive releases of the xinference PyPI package—versions 2.6.0, 2.6.1, and 2.6.2—were confirmed to contain a malicious credential-stealing payload. The attack vector involves code injected directly into the package\u0026rsquo;s \u003ccode\u003e__init__.py\u003c/code\u003e file, which executes unconditionally whenever the module is imported or the CLI is invoked. There are no \u003ccode\u003e.pth\u003c/code\u003e files or install hooks involved, meaning the payload fires immediately during standard dependency resolution or service startup. The threat actor behind the compromise is identified as TeamPCP, the same group responsible for recent supply chain attacks on litellm and telnyx.\u003c/p\u003e\n\n\u003cp\u003eThe attacker demonstrated rapid operational refinement by iterating on the injection technique across the three published versions. Version 2.6.0 placed the malicious code at module scope, using a detached \u003ccode\u003esubprocess.Popen\u003c/code\u003e call to execute a base64-encoded payload while suppressing all output. Version 2.6.1 moved the injection inside the legitimate \u003ccode\u003e_install()\u003c/code\u003e function, and execution was switched to a synchronous \u003ccode\u003eexec()\u003c/code\u003e call. Version 2.6.2 restored the async subprocess execution while keeping the payload hidden inside the helper function, achieving optimal stealth and non-blocking behavior.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage wrapper script decodes a second-stage credential collector and pipes it into a fresh Python interpreter via stdin. This collector performs initial system reconnaissance by executing commands like \u003ccode\u003ehostname\u003c/code\u003e, \u003ccode\u003ewhoami\u003c/code\u003e, and \u003ccode\u003eip addr\u003c/code\u003e, and captures environment variables. It then systematically targets a wide array of sensitive data, including SSH private keys, AWS credentials retrieved from disk, environment variables, and live IMDS API calls. The script also harvests Kubernetes service account tokens, GCP and Azure configuration files, Docker registry credentials, and various developer tokens.\u003c/p\u003e\n\n\u003cp\u003eAfter collecting the data, the collector writes the output to a temporary file, compresses it into \u003ccode\u003elove.tar.gz\u003c/code\u003e, and exfiltrates it via a \u003ccode\u003ecurl\u003c/code\u003e POST request to \u003ccode\u003ewhereisitat.lucyatemysuperbox.space\u003c/code\u003e. The exfiltration uses a custom header \u003ccode\u003eX-QT-SR: 14\u003c/code\u003e to route the data on the attacker\u0026rsquo;s server. Unlike TeamPCP\u0026rsquo;s previous campaigns, this payload does not use AES-256-CBC or RSA-4096 encryption, sending the archive as plain text. The Python \u003ccode\u003eTemporaryDirectory\u003c/code\u003e context manager automatically cleans up all artifacts after the upload completes. All three compromised versions have been yanked from PyPI. Affected users are advised to immediately downgrade to versions prior to 2.6.0, audit outbound network logs for connections to the C2 domain, and rotate all exposed credentials. Security tools like StepSecurity\u0026rsquo;s Harden-Runner have demonstrated the ability to block the exfiltration attempt in controlled environments, while their Compromised Package Check and PyPI Cooldown Check features provide proactive defense mechanisms for CI/CD pipelines.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eOn April 22, 2026, the open-source LLM inference framework \u003ccode\u003exinference\u003c/code\u003e was compromised through a supply chain attack involving three consecutive PyPI package versions. The malicious payload, attributed to the threat actor TeamPCP, executes immediately upon module import and systematically harvests credentials from cloud environments, development systems, and local configurations. All compromised versions have been yanked, and remediation requires immediate credential rotation and network monitoring.\u003c/p\u003e\n\n\u003ch3 id=\"attack-vector-and-injection-methodology\"\u003eAttack Vector and Injection Methodology\u003c/h3\u003e\n\n\u003cp\u003eThe malicious code is embedded directly into \u003ccode\u003exinference/__init__.py\u003c/code\u003e, the package\u0026rsquo;s top-level initialization module. Because Python automatically executes this file upon import, the payload triggers unconditionally across multiple scenarios:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect imports in application code\u003c/li\u003e\n\u003cli\u003eCLI invocation of the xinference tool\u003c/li\u003e\n\u003cli\u003eService startup sequences\u003c/li\u003e\n\u003cli\u003eDownstream dependency resolution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attacker iterated on the injection technique across three versions within a single day, demonstrating live operational refinement:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVersion 2.6.0:\u003c/strong\u003e The payload was placed at module scope, using a detached \u003ccode\u003esubprocess.Popen\u003c/code\u003e call to execute a base64-encoded script while suppressing all output.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVersion 2.6.1:\u003c/strong\u003e The injection was moved inside the legitimate \u003ccode\u003e_install()\u003c/code\u003e function, and execution was switched to a synchronous \u003ccode\u003eexec()\u003c/code\u003e call. The subprocess method was commented out, suggesting experimental testing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVersion 2.6.2:\u003c/strong\u003e The payload remained inside the helper function, but the async \u003ccode\u003esubprocess.Popen\u003c/code\u003e method was restored alongside a new \u003ccode\u003etempfile\u003c/code\u003e import, achieving optimal stealth and non-blocking execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"payload-architecture-and-execution-flow\"\u003ePayload Architecture and Execution Flow\u003c/h3\u003e\n\n\u003cp\u003eThe attack utilizes a two-stage execution model designed to evade detection and maximize data collection. The first stage acts as a wrapper that decodes the second stage and manages the exfiltration process.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe wrapper script contains the actor marker \u003ccode\u003e# hacked by teampcp\u003c/code\u003e and imports necessary modules like \u003ccode\u003eos\u003c/code\u003e, \u003ccode\u003ebase64\u003c/code\u003e, \u003ccode\u003etempfile\u003c/code\u003e, and \u003ccode\u003esubprocess\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt defines a \u003ccode\u003estart()\u003c/code\u003e function that decodes the second-stage collector and pipes it into a fresh Python interpreter via stdin using \u003ccode\u003esys.executable\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe collector\u0026rsquo;s output is captured into a temporary file, compressed into \u003ccode\u003elove.tar.gz\u003c/code\u003e, and uploaded via \u003ccode\u003ecurl\u003c/code\u003e POST to \u003ccode\u003ehttps://whereisitat.lucyatemysuperbox.space/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe exfiltration includes a custom routing header, \u003ccode\u003eX-QT-SR: 14\u003c/code\u003e, and relies on Python\u0026rsquo;s \u003ccode\u003eTemporaryDirectory\u003c/code\u003e context manager to automatically delete all artifacts after the upload completes.\u003c/li\u003e\n\u003cli\u003eNotably, this campaign lacks the AES-256-CBC and RSA-4096 OAEP encryption layers found in TeamPCP\u0026rsquo;s previous litellm and telnyx compromises, indicating a simplified toolkit or copycat variant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"credential-harvesting-capabilities\"\u003eCredential Harvesting Capabilities\u003c/h3\u003e\n\n\u003cp\u003eThe second-stage collector performs comprehensive reconnaissance and targets a wide array of sensitive data commonly found in AI and cloud development environments.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSystem Reconnaissance:\u003c/strong\u003e Executes commands to gather hostname, user identity, OS details, IP addresses, routes, and environment variables.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSSH and Host Keys:\u003c/strong\u003e Scans user home directories and \u003ccode\u003e/root\u003c/code\u003e for SSH private keys, authorized keys, known hosts, and host configuration files. It also walks \u003ccode\u003e/etc/ssh\u003c/code\u003e to collect host keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloud Credentials:\u003c/strong\u003e Targets AWS credentials from disk, environment variables, and live IMDS API calls. It actively queries AWS Secrets Manager and SSM Parameter Store using harvested keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKubernetes and Container Security:\u003c/strong\u003e Harvests Kubernetes service account tokens, CA certificates, kubeconfig files, and Docker registry configurations from multiple paths.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeveloper and CI/CD Assets:\u003c/strong\u003e Scans for \u003ccode\u003e.env\u003c/code\u003e files across deep directory structures, npm and PyPI tokens, Vault tokens, \u003ccode\u003e.netrc\u003c/code\u003e files, database passwords, and CI/CD configuration files like \u003ccode\u003e.gitlab-ci.yml\u003c/code\u003e and \u003ccode\u003eJenkinsfile\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCryptocurrency Wallets:\u003c/strong\u003e Targets Bitcoin, Ethereum, Cardano, and Solana wallet files and validator keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSystem and TLS Files:\u003c/strong\u003e Collects \u003ccode\u003e/etc/passwd\u003c/code\u003e, \u003ccode\u003e/etc/shadow\u003c/code\u003e, authentication logs, and TLS/SSL private keys and certificates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"remediation-and-defensive-measures\"\u003eRemediation and Defensive Measures\u003c/h3\u003e\n\n\u003cp\u003eImmediate action is required for any system that installed the compromised versions.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePackage Mitigation:\u003c/strong\u003e Users must downgrade to versions prior to 2.6.0 using \u003ccode\u003epip install \u0026quot;xinference\u0026lt;2.6.0\u0026quot;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eArtifact Verification:\u003c/strong\u003e Administrators should check \u003ccode\u003e/tmp\u003c/code\u003e for leftover \u003ccode\u003elove.tar.gz\u003c/code\u003e files, though the payload\u0026rsquo;s cleanup mechanism typically removes them.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNetwork Auditing:\u003c/strong\u003e Outbound logs must be scanned for HTTPS connections to \u003ccode\u003ewhereisitat.lucyatemysuperbox.space\u003c/code\u003e to confirm exfiltration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential Rotation:\u003c/strong\u003e All accessible credentials must be rotated, including AWS keys, Kubernetes tokens, SSH private keys, GCP/Azure credentials, \u003ccode\u003e.env\u003c/code\u003e values, Docker tokens, and developer API keys. AWS Secrets Manager and SSM Parameter Store secrets must also be rotated due to live API harvesting.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAutomated Defense:\u003c/strong\u003e StepSecurity\u0026rsquo;s Harden-Runner successfully blocked the exfiltration in a controlled test by intercepting the outbound \u003ccode\u003ecurl\u003c/code\u003e POST request. Their Compromised Package Check and PyPI Cooldown Check features provide proactive safeguards by flagging known malicious versions and enforcing waiting periods for newly published packages.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["TeamPCP injected a two-stage credential-stealing payload into the xinference PyPI package versions 2.6.0, 2.6.1, and 2.6.2.","The malicious code executes immediately upon module import, harvesting SSH keys, cloud credentials, environment variables, and crypto wallets before exfiltrating the data as love.tar.gz to an attacker-controlled domain.","The attacker iterated on the injection technique across the three versions, progressively hiding the payload inside a legitimate function and refining the execution method to avoid detection.","All three compromised versions have been yanked from PyPI, and affected systems require immediate credential rotation and network log auditing."],"insights":["The attacker iterated on the injection technique across three versions within a single day, moving the payload from module scope to inside a helper function and toggling between synchronous `exec()` and asynchronous `subprocess.Popen` to balance stealth with execution reliability.","Unlike previous TeamPCP campaigns that used AES-256-CBC and RSA-4096 OAEP encryption, this payload exfiltrates data as a plain `tar.gz` archive, suggesting a simplified toolkit or copycat actor despite the identical injection methodology.","The credential collector actively harvests live AWS role credentials via IMDS API calls rather than relying solely on static configuration files, allowing attackers to obtain temporary credentials even if no `.aws/credentials` file exists on the system."],"referencedReports":[],"body":"\u003cp\u003eOn April 22, 2026, three consecutive versions of the xinference PyPI package were compromised with a two-stage credential-stealing payload injected directly into the \u003ccode\u003e__init__.py\u003c/code\u003e file. The malicious code executes immediately upon module import, harvesting SSH keys, cloud credentials, environment variables, and cryptocurrency wallets before compressing the data into a file named \u003ccode\u003elove.tar.gz\u003c/code\u003e. This archive is exfiltrated via a \u003ccode\u003ecurl\u003c/code\u003e POST request to an attacker-controlled domain, leaving no artifacts on disk due to automatic cleanup. The threat actor, identified as TeamPCP, iterated on the injection technique across the three versions within a single day, progressively hiding the payload inside a legitimate function and refining its execution method. Unlike previous campaigns by the same actor, this payload lacks encryption and sends the stolen data as a plain compressed archive. All three compromised versions have been yanked from PyPI, and affected systems require immediate credential rotation and network log auditing to mitigate the breach. Security researchers independently analyzed the payloads and documented the full technical breakdown of the attack chain.\u003c/p\u003e\n"},{"n":10,"title":"elementary-data Compromised on PyPI and GHCR: Forged Release Pushed via GitHub Actions Script Injection","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/elementary-data-compromised-on-pypi-and-ghcr-forged-release-pushed-via-github-actions-script-injection","time":"17:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Attackers compromised the elementary-data supply chain by exploiting an unsafe GitHub Actions workflow interpolation through a malicious PR comment, enabling them to forge a release and distribute a credential-stealing payload to PyPI and the GitHub Container Registry, highlighting the critical risk of unvalidated event inputs in CI/CD pipelines.","briefOverview":"\u003cp\u003eA malicious version of the elementary-data package, specifically 0.23.3, was compromised and distributed through PyPI and the GitHub Container Registry. Attackers exploited an unsafe GitHub Actions workflow by injecting malicious code into a pull request comment, which triggered a script injection vulnerability. This allowed them to forge a release commit and dispatch the legitimate publishing pipeline without touching the master branch. The compromised wheel contained a .pth file that executed a credential-stealing payload on every Python startup. The same attack pushed a trojaned Docker image tagged as latest, exposing unpinned container deployments. The payload harvested SSH keys, cloud credentials, and cryptocurrency wallets before exfiltrating the data to a command-and-control server. The Elementary team and community researchers quickly identified the breach, removed the malicious artifacts, and published a clean replacement version. Defensive tools like Harden-Runner and package cooldown checks are now deployed to block similar supply chain attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe elementary-data Python package and its associated Docker image were compromised through a sophisticated supply chain attack leveraging GitHub Actions script injection. The attacker injected malicious code into a pull request comment, exploiting an unsafe workflow that interpolated the comment body directly into a shell script. This triggered a stager that executed with the repository\u0026rsquo;s GITHUB_TOKEN, allowing the attacker to forge a release commit and tag. The compromised commit bypassed traditional branch protections and directly dispatched the legitimate publishing pipeline. On April 24, 2026, the malicious version 0.23.3 was uploaded to PyPI, containing a .pth file that executes import statements at Python interpreter startup. The corresponding Docker image was pushed to GitHub Container Registry with both 0.23.3 and latest tags, ensuring that unpinned deployments automatically pulled the trojaned build. The payload utilized a three-stage encryption scheme to deliver a comprehensive credential harvester. This collector targeted multiple data categories, including SSH keys, cloud provider credentials, container configurations, cryptocurrency wallets, and system files. All harvested data was compressed into a tar-gzipped archive and exfiltrated via a single HTTP POST request to a command-and-control domain. Community researchers crisperik and H-Max quickly identified the anomaly and escalated the report, prompting the Elementary team to yank the malicious release and publish version 0.23.4. StepSecurity has since integrated the compromised package and command-and-control domain into its threat intelligence and defensive controls. Harden-Runner now blocks outbound connections to the exfiltration server, while PR-time checks prevent the introduction of the malicious version into downstream codebases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nThe elementary-data package and its Docker image were compromised through a multi-stage supply chain attack. The breach exploited a script injection vulnerability within the project\u0026rsquo;s GitHub Actions workflows. Attackers successfully forged a release and distributed malicious artifacts to PyPI and the GitHub Container Registry. The incident was reported and remediated rapidly by community researchers and the maintainer team.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAttack Vector and Execution\u003c/strong\u003e\nThe initial compromise began with a malicious comment injected into an open pull request. The project\u0026rsquo;s update_pylon_issue.yml workflow contained an unsafe line that expanded the comment body directly into a shell script. This triggered a handle_comment job that executed a curl | bash stager using the repository\u0026rsquo;s GITHUB_TOKEN. The workflow remained in an in-progress state for over two hours, providing cover for subsequent malicious actions. The attacker used the token to forge a commit and tag, bypassing branch protections and pull request requirements. They then dispatched the legitimate Release package workflow against the forged commit to trigger the publishing pipeline.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMalicious Artifacts and Payload Analysis\u003c/strong\u003e\nThe compromised wheel for version 0.23.3 contained a top-level elementary.pth file. Python automatically discovers and executes .pth files at interpreter startup, causing the payload to run on every Python invocation. The file contained a base64-wrapped line that decoded through two additional layers of XOR encryption. Stage three delivered a comprehensive credential and secret harvester. The collector targeted multiple data categories, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIdentity materials like SSH keys, Git credentials, and authentication tokens.\u003c/li\u003e\n\u003cli\u003eCloud provider secrets from AWS, GCP, and Azure via file reads and live API calls.\u003c/li\u003e\n\u003cli\u003eContainer orchestration configs, Kubernetes secrets, and ServiceAccount tokens.\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallet files and validator keypairs across multiple blockchains.\u003c/li\u003e\n\u003cli\u003eSystem files, shell histories, and configuration databases.\nAll collected data was compressed into a tar-gzipped archive and exfiltrated via a single HTTP POST request. The attacker directed traffic to a custom domain with a specific HTTP header.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eContainer Image Exposure\u003c/strong\u003e\nThe same workflow run that published to PyPI also built and pushed a multi-arch Docker image. The image was tagged with both 0.23.3 and latest, carrying the identical malicious payload. Teams relying on unpinned image tags or default latest references automatically pulled the trojaned build. This created widespread exposure across Kubernetes deployments, Docker Compose stacks, and Argo CD applications.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Defensive Measures\u003c/strong\u003e\nThe Elementary team removed the malicious artifacts from PyPI and GHCR within hours of the community report. A clean replacement version, 0.23.4, was published to restore trust in the supply chain. StepSecurity has integrated the incident into its threat intelligence platform. The compromised package version and command-and-control domain are now actively monitored. Harden-Runner blocks outbound connections to the exfiltration server across all protected workflows. PR-time checks prevent the introduction of the malicious version into downstream repositories. Package cooldown mechanisms flag newly published versions for review before they are trusted.\u003c/p\u003e\n","keyPoints":["Attackers exploited an unsafe GitHub Actions workflow interpolation by injecting malicious code into a pull request comment, triggering a stager that executed with the repository's GITHUB_TOKEN.","The compromised workflow forged a release commit and tag, dispatching the legitimate publishing pipeline to distribute a wheel containing a .pth file that executed a credential-stealing payload on Python startup.","The same attack pushed a trojaned Docker image to GitHub Container Registry, causing all unpinned pulls of the :latest or 0.23.3 tags to install the malicious build.","The payload harvested SSH keys, cloud credentials, container configurations, and cryptocurrency wallets before compressing and exfiltrating the data to a command-and-control domain."],"insights":["The malicious .pth file executes import statements at Python interpreter startup, causing the payload to run on every Python invocation across any installed environment rather than only when the library is explicitly imported.","The attacker maintained runner access by exploiting a hung workflow that ran for over two and a half hours, using its in-progress status as cover to dispatch the legitimate publishing pipeline against a forged commit.","Compromising the :latest container tag creates a silent exposure risk for teams that pin Python dependencies but leave Docker images unpinned, as they will automatically pull the trojaned build without version awareness.","Defensive controls like Harden-Runner's global block list and PR-time package cooldown checks can immediately block C2 callbacks and prevent the introduction of known-malicious or newly published packages into the codebase."],"referencedReports":[],"body":"\u003cp\u003eA malicious version of the elementary-data package, specifically 0.23.3, was compromised and distributed through PyPI and the GitHub Container Registry. Attackers exploited an unsafe GitHub Actions workflow by injecting malicious code into a pull request comment, which triggered a script injection vulnerability. This allowed them to forge a release commit and dispatch the legitimate publishing pipeline without touching the master branch. The compromised wheel contained a .pth file that executed a credential-stealing payload on every Python startup. The same attack pushed a trojaned Docker image tagged as latest, exposing unpinned container deployments. The payload harvested SSH keys, cloud credentials, and cryptocurrency wallets before exfiltrating the data to a command-and-control server. The Elementary team and community researchers quickly identified the breach, removed the malicious artifacts, and published a clean replacement version. Defensive tools like Harden-Runner and package cooldown checks are now deployed to block similar supply chain attacks.\u003c/p\u003e\n"},{"n":5,"title":"Backdoored PyTorch Lightning package drops credential stealer","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/backdoored-pytorch-lightning-package-drops-credential-stealer/","time":"17:15","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"A compromised version of the PyTorch Lightning package distributed on PyPI contained a hidden credential-stealing payload targeting browser data, environment files, and cloud services. Users who imported version 2.6.3 must immediately rotate all secrets, as the package has been reverted to a safe release.","briefOverview":"\u003cp\u003eA malicious version of the PyTorch Lightning package, specifically version 2.6.3, was distributed on the Python Package Index containing a hidden credential-stealing payload. The attack triggers automatically whenever the library is imported into a Python environment. Upon execution, the package silently spawns a background process that downloads a JavaScript runtime and executes a heavily obfuscated script. This payload, identified by Microsoft Defender as ShaiWorm, targets environment files, browser data, API keys, and cloud service credentials across major providers like AWS, Azure, and GCP. Microsoft Threat Intelligence reported that the malicious activity affected a small number of devices and was successfully contained. The package maintainer, Lightning AI, has reverted the distribution to the safe version 2.6.1 and strongly advises all affected users to immediately rotate their compromised secrets. Developers are currently investigating how the build and release pipeline was breached to prevent further compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA malicious version of the PyTorch Lightning deep learning framework was distributed on the Python Package Index. Version 2.6.3 of the package contained a hidden execution chain designed to steal sensitive credentials. The developer publicly disclosed the supply-chain attack on April 30. When users import the compromised library, the malicious code triggers automatically without any additional interaction. The payload silently spawns a background process to avoid detection. This background process downloads a JavaScript runtime known as Bun version 1.3.13 from GitHub. It then executes an 11.4 megabyte heavily obfuscated JavaScript file named router_runtime.js. Microsoft Threat Intelligence detected the malicious routine using Defender and prevented it from executing on customer systems. The company flagged the malware as ShaiWorm and promptly notified the package maintainer. The payload actively targets environment files, API keys, secrets, GitHub tokens, and data stored in Chrome, Firefox, and Brave browsers. It also interacts directly with cloud service APIs from AWS, Azure, and GCP to extract credentials. The malware supports arbitrary system command execution to facilitate broader compromise. Microsoft telemetry indicates that the malicious activity impacted a small number of devices. The threat appears to have been contained within a narrow set of environments. Lightning AI has reverted the package on PyPI to the safe version 2.6.1. The maintainer strongly recommends that anyone who imported version 2.6.3 immediately rotate all secrets, keys, and tokens. The publishers are currently investigating how the build and release pipeline was breached. All recent releases will undergo a full audit for similar payloads.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eAttack Vector and Disclosure\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA malicious version of the PyTorch Lightning deep learning framework was published on the Python Package Index. Version 2.6.3 of the package contained a hidden execution chain designed to steal sensitive credentials. The developer publicly disclosed the supply-chain attack on April 30. PyTorch Lightning is a widely used framework for pretraining and fine-tuning AI models, accumulating over 11 million downloads last month.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePayload Execution Mechanics\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eWhen users import the compromised library, the malicious code triggers automatically without any additional interaction. The payload silently spawns a background process to avoid detection. This background process downloads a JavaScript runtime known as Bun version 1.3.13 from GitHub. It then executes an 11.4 megabyte heavily obfuscated JavaScript file named router_runtime.js.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTarget Scope and Capabilities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe payload actively targets environment files, API keys, secrets, GitHub tokens, and data stored in Chrome, Firefox, and Brave browsers. It also interacts directly with cloud service APIs from AWS, Azure, and GCP to extract credentials. The malware supports arbitrary system command execution to facilitate broader compromise. Key capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomatic background process spawning upon import\u003c/li\u003e\n\u003cli\u003eDownload and execution of an 11.4 MB obfuscated JavaScript payload\u003c/li\u003e\n\u003cli\u003eDirect API interaction with major cloud providers for credential theft\u003c/li\u003e\n\u003cli\u003eArbitrary system command execution for lateral movement\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetection Scope and Containment\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft flagged the malware as ShaiWorm and promptly notified the package maintainer. Microsoft telemetry indicates that the malicious activity impacted a small number of devices. The threat appears to have been contained within a narrow set of environments. The company successfully prevented the malicious routine from causing widespread damage.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Ongoing Investigation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eLightning AI has reverted the package on PyPI to the safe version 2.6.1. The maintainer strongly recommends that anyone who imported version 2.6.3 immediately rotate all secrets, keys, and tokens. The publishers are currently investigating how the build and release pipeline was breached. All recent releases will undergo a full audit for similar payloads. Users will be notified through all available communication channels regarding the audit results.\u003c/p\u003e\n","keyPoints":["Version 2.6.3 of the PyTorch Lightning package on PyPI contained a hidden execution chain that silently downloaded and executed a credential-stealing payload upon import.","The malicious payload, detected by Microsoft Defender as ShaiWorm, targets environment files, browser data, API keys, and cloud service credentials.","Lightning AI has reverted the package to version 2.6.1 and strongly recommends that affected users immediately rotate all secrets.","Maintainers are investigating how the build and release pipeline was breached and will audit recent releases for similar payloads."],"insights":["The malicious payload triggers automatically upon a standard import lightning statement, requiring no additional user interaction to initiate the credential theft chain.","Rather than relying on Python-based exfiltration, the attack downloads and executes a JavaScript runtime to run an 11.4 MB obfuscated script, evading typical Python-focused security monitoring.","The malware actively interacts with major cloud provider APIs to extract cloud credentials, significantly expanding the breach scope beyond local environment files and browser data.","Microsoft Defender successfully contained the threat to a narrow set of environments and flagged it as ShaiWorm, demonstrating how EDR telemetry can rapidly isolate novel supply chain compromises."],"referencedReports":[{"title":"Security Advisory","url":"https://github.com/Lightning-AI/pytorch-lightning/issues/21689","publisher":"Lightning AI","context":"The article references this GitHub issue as the official security advisory that discloses the hidden execution chain and credential-stealing payload."}],"body":"\u003cp\u003eA malicious version of the PyTorch Lightning package, specifically version 2.6.3, was distributed on the Python Package Index containing a hidden credential-stealing payload. The attack triggers automatically whenever the library is imported into a Python environment. Upon execution, the package silently spawns a background process that downloads a JavaScript runtime and executes a heavily obfuscated script. This payload, identified by Microsoft Defender as ShaiWorm, targets environment files, browser data, API keys, and cloud service credentials across major providers like AWS, Azure, and GCP. Microsoft Threat Intelligence reported that the malicious activity affected a s
