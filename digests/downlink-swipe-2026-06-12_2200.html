window.__DL_ARTICLES = [{"n":1,"title":"152 Chrome Live Wallpaper Extensions Hid Ad Tracking and Faked Google Search Traffic","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/152-chrome-live-wallpaper-extensions-hid-ad-tracking?utm_medium=feed","time":"22:48","priority":"SHOULD READ","score":82,"tldr":"Socket researchers found 152 Chrome “live wallpaper” extensions that falsely claimed not to collect data while logging user/traffic information and funneling installs to ad-monetized sites. A subset also forged Google organic-search attribution and disguised uninstall pings as Google search-result clicks, turning extension activity into fake organic traffic.","briefOverview":"\u003cp\u003eSocket\u0026rsquo;s Threat Research Team identified a family of 152 Chrome Web Store new-tab “live wallpaper” extensions built from a shared codebase and distributed across 38 publisher accounts and three brand backends. The extensions had approximately 105,000 reported installs and all declared in the Chrome Web Store that they would not collect or use user data. The article says those disclosures conflict with linked privacy policies that admit logging IP addresses, ISP, click counts, referrers, and sharing data with Google AdSense, DoubleClick, and third-party ad partners.\u003c/p\u003e\n\n\u003cp\u003eA 54-listing subset using the newer tabplugins-brand template forged Google organic-search attribution by opening install URLs with \u003ccode\u003eutm_source=google\u0026amp;utm_medium=organic\u003c/code\u003e and setting uninstall URLs through a \u003ccode\u003egoogle.com/url\u003c/code\u003e wrapper. The article states this made extension-driven visits appear like Google organic search activity rather than software-generated traffic. The family also shipped an IndexedDB enumerate-and-delete routine in every analyzed service worker, although the article says it is inert in the current build and cannot affect website storage.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes the family as an adware-adjacent potentially unwanted program focused on deceptive traffic measurement, undisclosed telemetry, and false privacy disclosures. Monetization occurred by funneling users to ad-monetized brand pages on domains including \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, and \u003ccode\u003echromewallpaper.com\u003c/code\u003e, rather than injecting ads into users’ browsing pages. Recommended defensive actions include removing these extensions, scrutinizing new-tab extensions that request the \u003ccode\u003esearch\u003c/code\u003e permission, and hunting for code fingerprints such as the \u003ccode\u003eDeleted IndexedDB database:\u003c/code\u003e string and forged attribution URLs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket\u0026rsquo;s Threat Research Team analyzed a family of Chrome Web Store new-tab “live wallpaper” extensions that shared a common codebase across 152 unique extension IDs. The family was distributed across 38 publisher accounts and three brand backends, with roughly 105,000 reported installs. Of the 152 IDs, 141 had retrievable service workers and live Chrome Web Store listings, while 11 were already delisted at the time of analysis.\u003c/p\u003e\n\n\u003cp\u003eThe article says every listing declared in Chrome Web Store privacy disclosures that it would not collect or use user data. Those claims were contradicted by linked privacy policies stating that the extensions or associated sites log IP addresses, browser type, ISP, timestamps, referrers or exit pages, click counts, and other data. The policies also named Google AdSense, Google DoubleClick DART cookies, Google Analytics, and third-party advertising partners.\u003c/p\u003e\n\n\u003cp\u003eThe most significant technical behavior appeared in a 54-listing subset using the newer \u003ccode\u003etabplugins.com\u003c/code\u003e template. On install, the service worker opened a \u003ccode\u003etabplugins.com\u003c/code\u003e page with \u003ccode\u003eutm_source=google\u0026amp;utm_medium=organic\u003c/code\u003e, which the article says falsely labeled extension-driven traffic as Google organic search. On uninstall, it used \u003ccode\u003echrome.runtime.setUninstallURL\u003c/code\u003e with a \u003ccode\u003egoogle.com/url\u003c/code\u003e wrapper carrying \u003ccode\u003eved\u003c/code\u003e and \u003ccode\u003eusg\u003c/code\u003e parameters, disguising the destination as a Google search-result click.\u003c/p\u003e\n\n\u003cp\u003eAll analyzed members of the family shipped an IndexedDB enumerate-and-delete routine that ran on service-worker start and logged \u003ccode\u003eDeleted IndexedDB database:\u003c/code\u003e. The article describes this as an anti-forensic state-reset boilerplate and the most reliable fingerprint of the operation, but also states that it is inert in this build because the extensions store their own state in \u003ccode\u003elocalStorage\u003c/code\u003e, not IndexedDB. Because Manifest V3 service workers run in the extension’s own origin, the routine cannot delete website IndexedDB, cookies, localStorage, or sessions.\u003c/p\u003e\n\n\u003cp\u003eThe extensions were tied to three brand domains: \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, and \u003ccode\u003echromewallpaper.com\u003c/code\u003e, with \u003ccode\u003echromewallpaper.com\u003c/code\u003e redirecting to \u003ccode\u003eowhit.com\u003c/code\u003e. The article says these domains were ad-monetized using Google ad products, and \u003ccode\u003etabplugins.com\u003c/code\u003e also loaded an Advergic Prebid stack via \u003ccode\u003eavads.live\u003c/code\u003e. Attribution was not tied to a confirmed country, although the article notes circumstantial signals loosely pointing toward Turkey and explicitly says those signals are not proof.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact was privacy and measurement integrity harm for users and advertising ecosystems. Users’ install and uninstall events were reported to the operator, saved shortcut domains were sent to Google through favicon requests, and the operator presented extension-driven visits as Google organic traffic. The article recommends that users remove affected new-tab live wallpaper extensions and that security teams hunt on fingerprints such as the IndexedDB wipe string, \u003ccode\u003esetUninstallURL\u003c/code\u003e to \u003ccode\u003egoogle.com/url\u003c/code\u003e, forged organic UTM install tabs, and the related brand domains.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket\u0026rsquo;s Threat Research Team identified a family of Chrome Web Store new-tab “live wallpaper” extensions that the article characterizes as an adware-adjacent potentially unwanted program. The family consists of 152 unique extension IDs built from a shared codebase and distributed across 38 separate Chrome Web Store publisher accounts. The extensions were associated with three brand backends and had a combined total of approximately 105,000 reported installs.\u003c/p\u003e\n\n\u003cp\u003eThe central issue is that the extensions claimed in Chrome Web Store privacy disclosures that they would not collect or use user data, while linked privacy policies admitted data collection and sharing. The article says the policies describe logging IP addresses, browser type, ISP, date and time stamps, referrers or exit pages, click counts, and other information. The policies also name Google AdSense, Google DoubleClick DART cookies, Google Analytics, and third-party advertising partners.\u003c/p\u003e\n\n\u003ch2 id=\"traffic-attribution-laundering\"\u003eTraffic Attribution Laundering\u003c/h2\u003e\n\n\u003cp\u003eA 54-listing subset using the newer \u003ccode\u003etabplugins.com\u003c/code\u003e template performed the article’s most significant technical behavior: forged Google organic-search attribution. In the service worker \u003ccode\u003ejs/bg.js\u003c/code\u003e, the extension defined an install URL on \u003ccode\u003etabplugins.com\u003c/code\u003e containing \u003ccode\u003eutm_source=google\u0026amp;utm_medium=organic\u003c/code\u003e. On install, the worker opened that URL and also opened the extension’s own \u003ccode\u003enewtab.html\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this caused extension-driven traffic to appear in analytics as if it came from Google organic search. It emphasizes that the visit was not the result of a person searching Google and clicking a normal result; it was the extension opening a tab on install. The article describes this as manufacturing a valuable “organic search” traffic signal.\u003c/p\u003e\n\n\u003cp\u003eThe same subset also set an uninstall URL through \u003ccode\u003echrome.runtime.setUninstallURL\u003c/code\u003e. The uninstall URL used a \u003ccode\u003egoogle.com/url\u003c/code\u003e redirect wrapper pointing to \u003ccode\u003etabplugins.com/live-wallpaper/\u003c/code\u003e and included \u003ccode\u003eved\u003c/code\u003e and \u003ccode\u003eusg\u003c/code\u003e parameters. The article states that this disguised the uninstall ping as a Google search-result click and allowed the operator to detect uninstall events while laundering the traffic as Google activity.\u003c/p\u003e\n\n\u003ch2 id=\"indexeddb-wipe-behavior\"\u003eIndexedDB Wipe Behavior\u003c/h2\u003e\n\n\u003cp\u003eEvery analyzed member of the family shipped an IndexedDB enumerate-and-delete routine in the service worker. On every service-worker start, the code called \u003ccode\u003eindexedDB.databases()\u003c/code\u003e, iterated through visible databases, called \u003ccode\u003eindexedDB.deleteDatabase(db.name)\u003c/code\u003e, and logged \u003ccode\u003eDeleted IndexedDB database:\u003c/code\u003e. The article identifies this literal log string and routine as the family’s most reliable fingerprint.\u003c/p\u003e\n\n\u003cp\u003eThe article carefully limits the impact of this behavior. Because a Manifest V3 background service worker runs in the extension’s own \u003ccode\u003echrome-extension://\u0026lt;id\u0026gt;\u003c/code\u003e origin, the IndexedDB routine can only affect databases in that extension origin. It cannot touch websites’ IndexedDB, cookies, localStorage, or sessions.\u003c/p\u003e\n\n\u003cp\u003eIn the analyzed build, the routine is described as inert because the extensions do not use IndexedDB for their own state. Instead, the article says they store saved shortcuts, background mode, custom wallpaper, and last-image index in \u003ccode\u003elocalStorage\u003c/code\u003e. The article still treats the routine as notable because it is undisclosed, copied into the whole family, and has no legitimate purpose in a wallpaper app.\u003c/p\u003e\n\n\u003ch2 id=\"other-extension-behaviors-and-code-quality-issues\"\u003eOther Extension Behaviors and Code Quality Issues\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the new-tab search box calls \u003ccode\u003echrome.search.query\u003c/code\u003e without overriding the search engine, so it uses the user’s existing default engine and does not hijack search. However, the \u003ccode\u003esearch\u003c/code\u003e permission is described as the cleanest install-time tell for the family. The article also notes that saved shortcut domains are sent to Google through \u003ccode\u003es2/favicons?domain=\u003c/code\u003e requests on every new tab.\u003c/p\u003e\n\n\u003cp\u003eTwo lower-severity issues were described in the new-tab code and package layout. The shortcut renderer injects user-saved shortcut \u003ccode\u003ename\u003c/code\u003e and \u003ccode\u003eurl\u003c/code\u003e values into the DOM through unescaped template strings, which the article calls self-XSS because a user would have to save their own malicious shortcut. The image-wallpaper mode references \u003ccode\u003ewallpapers/1.jpg\u003c/code\u003e through \u003ccode\u003ewallpapers/10.jpg\u003c/code\u003e, but the packages do not include a \u003ccode\u003ewallpapers/\u003c/code\u003e directory, so image mode is broken.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes evidence of careless mass production. Three \u003ccode\u003etabplugins.com\u003c/code\u003e extensions shipped a \u003ccode\u003ebg.js\u003c/code\u003e that did not parse because a closing quote appeared before the query string in the install URL. In those three cases, the syntax error prevented the install navigation, uninstall tracking, and IndexedDB wipe from registering, although the extensions still installed, overrode the new tab, and requested the \u003ccode\u003esearch\u003c/code\u003e permission.\u003c/p\u003e\n\n\u003ch2 id=\"scale-and-distribution\"\u003eScale and Distribution\u003c/h2\u003e\n\n\u003cp\u003eAcross the full dataset, Socket collected 152 unique extension IDs. It downloaded and SHA-256-verified the \u003ccode\u003ebg.js\u003c/code\u003e file for 141 of them, and all 141 resolved to live Chrome Web Store listings. The remaining 11 were already delisted from the Chrome Web Store, with the update endpoint returning HTTP 204.\u003c/p\u003e\n\n\u003cp\u003eThe family was split across three brand backends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003etabplugins.com\u003c/code\u003e: 109 analyzed extensions, including the newer template that added forged Google organic attribution and a cloaked \u003ccode\u003egoogle.com/url\u003c/code\u003e uninstall redirect.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eyowgames.com\u003c/code\u003e: 19 extensions using the same core without the forged Google attribution.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003echromewallpaper.com\u003c/code\u003e: 13 extensions structurally identical to the \u003ccode\u003eyowgames.com\u003c/code\u003e variant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the same template was spread across 38 distinct Chrome Web Store publisher accounts, including accounts such as \u003ccode\u003eZainAhamed1994\u003c/code\u003e, \u003ccode\u003ehirakiranpk\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, \u003ccode\u003etabplugins.com\u003c/code\u003e, and others listed in the IOC section. It describes this fragmentation across publisher identities as a takedown-resistance tactic because removing one account would leave the rest of the network live.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-and-monetization\"\u003eInfrastructure and Monetization\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two distinct operator infrastructure clusters tied by a shared extension template rather than shared hosting. The \u003ccode\u003eyowgames.com\u003c/code\u003e, \u003ccode\u003echromewallpaper.com\u003c/code\u003e, and \u003ccode\u003eowhit.com\u003c/code\u003e cluster used the same Cloudflare name-server pair, \u003ccode\u003ejourney.ns.cloudflare.com\u003c/code\u003e and \u003ccode\u003etim.ns.cloudflare.com\u003c/code\u003e, and was registered through Spaceship. \u003ccode\u003echromewallpaper.com\u003c/code\u003e acted as a redirector and issued an HTTP 301 to \u003ccode\u003eowhit.com\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003etabplugins.com\u003c/code\u003e cluster used a separate Cloudflare name-server pair, \u003ccode\u003efatima.ns.cloudflare.com\u003c/code\u003e and \u003ccode\u003ened.ns.cloudflare.com\u003c/code\u003e, and was registered through Hostinger. The article says its origin was exposed on Hostinger IPs \u003ccode\u003e147.79.120.202\u003c/code\u003e and \u003ccode\u003e92.112.198.22\u003c/code\u003e rather than being fully proxied. All operator-controlled domains were registered behind WHOIS privacy.\u003c/p\u003e\n\n\u003cp\u003eThe monetization described in the article was funnel-based rather than injection-based. The extensions drove traffic to ad-monetized brand pages through forced install tabs, in-page “More Extensions” and uninstall-guide links, and forged-organic attribution. The article says \u003ccode\u003etabplugins.com\u003c/code\u003e loaded \u003ccode\u003ehttps://avads.live/s/av-tabplugins.js\u003c/code\u003e, an Advergic Prebid header-bidding bundle that included Google Ad Manager network codes \u003ccode\u003e23301900962,23324153939\u003c/code\u003e, AppNexus/Xandr, PixFuture, SmileWanted, a full-screen interstitial ad slot, Google Analytics 4 property \u003ccode\u003eG-906NQ2GLXR\u003c/code\u003e, and FOU Analytics.\u003c/p\u003e\n\n\u003cp\u003eFor the \u003ccode\u003eyowgames.com\u003c/code\u003e cluster, live retrieval was blocked by a Cloudflare bot wall from the researchers’ vantage, so archived copies were examined. The article says \u003ccode\u003eyowgames.com\u003c/code\u003e and \u003ccode\u003eowhit.com\u003c/code\u003e embedded Google AdSense and \u003ccode\u003egooglesyndication.com\u003c/code\u003e directly, using publisher IDs \u003ccode\u003eca-pub-2685573472598175\u003c/code\u003e and \u003ccode\u003eca-pub-6596604135510481\u003c/code\u003e, respectively. Their Google Analytics 4 properties were listed as \u003ccode\u003eG-YJWVP0Q1KW\u003c/code\u003e and \u003ccode\u003eG-6V3WECV225\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-statements\"\u003eAttribution Statements\u003c/h2\u003e\n\n\u003cp\u003eThe article characterizes the operation as financially motivated commercial adware and traffic-attribution fraud run by one or more small freelance teams. It explicitly states that the researchers cannot tie the operation to a specific country with confidence. It notes circumstantial signals that loosely point toward Turkey, including the \u003ccode\u003eowhit.com\u003c/code\u003e contact name “Saniye Yıldız,” the email \u003ccode\u003eyahyagazi06@gmail.com\u003c/code\u003e, and Turkish-reading publisher contact emails such as \u003ccode\u003eferhatbadem831@gmail.com\u003c/code\u003e and \u003ccode\u003ekeremsopar@gmail.com\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that these are possibilities to investigate rather than attribution that can be stated with confidence. It says the listed contact may be a pseudonym and that no GitHub, freelance-marketplace, or social-media portfolio linked the publisher handles to one another or to a real identity. It also says no prior public reporting was found on the domains or handles.\u003c/p\u003e\n\n\u003ch2 id=\"privacy-disclosure-conflict\"\u003ePrivacy Disclosure Conflict\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the clearest policy issue as a contradiction between Chrome Web Store privacy disclosures and the operators’ linked privacy policies. The Chrome Web Store Privacy practices tab for the listings said the developer would not collect or use user data, that data was not being sold to third parties, and that data was not being used or transferred for unrelated purposes. The article says identical “will not collect or use your data” disclosures appeared on all 141 live listings the researchers resolved.\u003c/p\u003e\n\n\u003cp\u003eThe linked privacy policies stated the opposite. According to the article, they said log files collect data when visitors use the websites or extensions, including IP addresses, browser type, ISP, timestamps, referrers or exit pages, and possibly click counts. The policies also described tracking user movement on the website and extension and named Google AdSense, Google DoubleClick DART cookies, Google Analytics, and third-party advertising partners.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Chrome Web Store policy language requiring privacy fields to be up to date and accurate and warning that contradictions between dashboard disclosures, privacy policies, and item behavior may violate policy. It says the documented situation is a three-way mismatch between store disclosure, linked privacy policy, and observed phone-home behavior. The article states that the install and uninstall telemetry corroborates that the extensions phone home.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article says the exposure is the family’s full install base, on the order of 100,000 users. The harm is described as privacy and measurement integrity rather than credential theft or remote code execution. It says affected users are enrolled in deceptive traffic measurement and undisclosed telemetry.\u003c/p\u003e\n\n\u003cp\u003eSpecific impacts listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers’ install and uninstall events are reported to the operator.\u003c/li\u003e\n\u003cli\u003eThe operator’s privacy policy says this activity is associated with IP, ISP, referrer, and click data and shared with Google AdSense, DoubleClick, Analytics, and third-party ad partners.\u003c/li\u003e\n\u003cli\u003eExtension-driven visits are presented to advertisers and affiliates as Google organic search traffic through forged UTM tags and the \u003ccode\u003egoogle.com/url\u003c/code\u003e redirect.\u003c/li\u003e\n\u003cli\u003eSaved shortcut domains leak to Google through favicon requests on every new tab.\u003c/li\u003e\n\u003cli\u003eEvery install ships an undisclosed IndexedDB wipe routine that runs on service-worker start.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eFor users, the article recommends removing any new-tab “live wallpaper” extension sourced from \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, or \u003ccode\u003echromewallpaper.com\u003c/code\u003e. It also advises treating new-tab override extensions that request the \u003ccode\u003esearch\u003c/code\u003e permission as something to scrutinize. After removal, users are advised to confirm that Chrome’s new tab and default search engine are restored to their preferences.\u003c/p\u003e\n\n\u003cp\u003eFor developers, the article recommends ensuring that Chrome Web Store privacy disclosures match published privacy policies exactly. It warns against fabricating UTM attribution or reusing Google \u003ccode\u003eved\u003c/code\u003e and \u003ccode\u003eusg\u003c/code\u003e redirect tokens to disguise traffic. It also says developers should not ship unexplained anti-forensic boilerplate such as indiscriminate IndexedDB wipe routines.\u003c/p\u003e\n\n\u003cp\u003eFor security teams, the article recommends hunting for family fingerprints rather than individual extension IDs because the family is mass-produced and IDs rotate. Reliable signals listed include the literal string \u003ccode\u003eDeleted IndexedDB database:\u003c/code\u003e, an \u003ccode\u003eindexedDB.databases()\u003c/code\u003e enumerate-and-delete loop in \u003ccode\u003ebg.js\u003c/code\u003e, a \u003ccode\u003esetUninstallURL\u003c/code\u003e pointed at a \u003ccode\u003egoogle.com/url\u003c/code\u003e wrapper, and an \u003ccode\u003eonInstalled\u003c/code\u003e handler opening a tab with \u003ccode\u003eutm_source=google\u0026amp;utm_medium=organic\u003c/code\u003e. The article also recommends blocking \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, \u003ccode\u003echromewallpaper.com\u003c/code\u003e, and \u003ccode\u003eowhit.com\u003c/code\u003e, and alerting on new-tab override extensions that request the \u003ccode\u003esearch\u003c/code\u003e permission and originate from those domains.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mappings-and-iocs\"\u003eMITRE ATT\u0026amp;CK Mappings and IOCs\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to the following MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1176.001 Browser Extensions\u003c/li\u003e\n\u003cli\u003eT1036 Masquerading\u003c/li\u003e\n\u003cli\u003eT1070 Indicator Removal\u003c/li\u003e\n\u003cli\u003eT1071.001 Application Layer Protocol: Web Protocols\u003c/li\u003e\n\u003cli\u003eT1583.001 Acquire Infrastructure: Domains\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe IOC section lists 38 threat actor developer accounts, several email addresses, network indicators, infrastructure and monetization identifiers, and 152 Chrome extension IDs. Network indicators include \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, \u003ccode\u003echromewallpaper.com\u003c/code\u003e, and \u003ccode\u003eowhit.com\u003c/code\u003e. Monetization indicators include the \u003ccode\u003eavads.live/s/av-\u0026lt;brand\u0026gt;.js\u003c/code\u003e pattern, Advergic Prebid account ID \u003ccode\u003eyiF3ZLZK\u003c/code\u003e, Google Ad Manager network code \u003ccode\u003e23301900962,23324153939\u003c/code\u003e, AdSense publisher IDs for \u003ccode\u003eyowgames.com\u003c/code\u003e and \u003ccode\u003eowhit.com\u003c/code\u003e, and GA4 properties for \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, and \u003ccode\u003eowhit.com\u003c/code\u003e.\u003c/p\u003e\n","keyPoints":["Socket's Threat Research Team identified 152 Chrome Web Store new-tab live wallpaper extensions built from a shared codebase and distributed across 38 publisher accounts, with approximately 105,000 reported installs.","All resolved live listings claimed in the Chrome Web Store that they would not collect or use user data, while their linked privacy policies stated that the extensions log IP addresses, ISP, click counts, referrers, and share data with ad partners.","A 54-listing tabplugins.com subset forged Google organic-search attribution on install and used a google.com/url uninstall redirect to disguise extension-driven traffic as Google search activity.","Every analyzed extension shipped an IndexedDB enumerate-and-delete routine in its service worker, but the article states it is inert in this build because the extensions do not store their own state in IndexedDB.","The extensions monetized traffic by forcing or funneling users to ad-monetized brand pages on tabplugins.com, yowgames.com, and chromewallpaper.com rather than injecting ads into pages users browse."],"insights":["The most reliable family fingerprint is the literal service-worker log string \"Deleted IndexedDB database:\" combined with an indexedDB.databases() enumerate-and-delete loop, because this code appears across 100 percent of the analyzed family even when other monetization details differ.","The traffic-laundering behavior is limited to the newer tabplugins.com template: only 54 listings used forged Google organic UTM tags and google.com/url uninstall cloaking, while yowgames.com and chromewallpaper.com variants shared the same core without that attribution forgery.","The IndexedDB wipe sounds destructive but is scoped to the extension’s own chrome-extension:// origin in Manifest V3, so the article states it cannot delete website IndexedDB, cookies, localStorage, or sessions and deletes nothing in the current build.","Three tabplugins.com extensions shipped a non-parsing background service worker due to a malformed install URL, which prevented their install navigation, uninstall tracking, and IndexedDB wipe from registering despite the extensions still installing and overriding the new tab.","Blocking individual Chrome Web Store IDs is fragile because the same template was spread across 38 publisher accounts; the article recommends hunting on code fingerprints, setUninstallURL google.com/url wrappers, forged organic UTM install tabs, and the shared brand domains instead."],"referencedReports":[],"body":"\u003cp\u003eSocket\u0026rsquo;s Threat Research Team identified a family of 152 Chrome Web Store new-tab “live wallpaper” extensions built from a shared codebase and distributed across 38 publisher accounts and three brand backends. The extensions had approximately 105,000 reported installs and all declared in the Chrome Web Store that they would not collect or use user data. The article says those disclosures conflict with linked privacy policies that admit logging IP addresses, ISP, click counts, referrers, and sharing data with Google AdSense, DoubleClick, and third-party ad partners.\u003c/p\u003e\n\n\u003cp\u003eA 54-listing subset using the newer tabplugins-brand template forged Google organic-search attribution by opening install URLs with \u003ccode\u003eutm_source=google\u0026amp;utm_medium=organic\u003c/code\u003e and setting uninstall URLs through a \u003ccode\u003egoogle.com/url\u003c/code\u003e wrapper. The article states this made extension-driven visits appear like Google organic search activity rather than software-generated traffic. The family also shipped an IndexedDB enumerate-and-delete routine in every analyzed service worker, although the article says it is inert in the current build and cannot affect website storage.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes the family as an adware-adjacent potentially unwanted program focused on deceptive traffic measurement, undisclosed telemetry, and false privacy disclosures. Monetization occurred by funneling users to ad-monetized brand pages on domains including \u003ccode\u003etabplugins.com\u003c/code\u003e, \u003ccode\u003eyowgames.com\u003c/code\u003e, and \u003ccode\u003echromewallpaper.com\u003c/code\u003e, rather than injecting ads into users’ browsing pages. Recommended defensive actions include removing these extensions, scrutinizing new-tab extensions that request the \u003ccode\u003esearch\u003c/code\u003e permission, and hunting for code fingerprints such as the \u003ccode\u003eDeleted IndexedDB database:\u003c/code\u003e string and forged attribution URLs.\u003c/p\u003e\n"}];

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }

    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>

      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",

    }}>

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
