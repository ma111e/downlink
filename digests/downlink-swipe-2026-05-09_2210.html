<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .swipe-card.snap-back { transition: transform 0.32s cubic-bezier(.2,.9,.2,1); }
  .swipe-card.fly-out  { transition: transform 0.4s cubic-bezier(.4,.0,.6,1), opacity 0.4s; }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0; transition: opacity 0.1s;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--discard); color: var(--discard); }
  .pill-btn.read:hover { border-color: var(--accept);  color: var(--accept); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Fake OpenAI repository on Hugging Face pushes infostealer malware","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/fake-openai-repository-on-hugging-face-pushes-infostealer-malware/","time":"14:26","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"A malicious Hugging Face repository impersonating an OpenAI project distributed an information-stealing malware payload to Windows users before being removed, underscoring the platform's vulnerability to typosquatting attacks. Users who downloaded the repository must immediately reimage their systems and rotate all credentials.","briefOverview":"\u003cp\u003eA malicious Hugging Face repository impersonating OpenAI’s Privacy Filter project distributed an information-stealing malware payload to Windows users. The repository briefly topped the platform’s trending list and accumulated hundreds of thousands of downloads before being removed. Researchers at HiddenLayer discovered the campaign after identifying a typosquatted repository that copied OpenAI’s official model card. The malicious package included a Python script that disguised itself as harmless AI code while secretly disabling SSL verification and executing a PowerShell command. This command downloaded a batch file that performed privilege escalation and installed a Rust-based infostealer. The malware targeted sensitive data including browser credentials, Discord tokens, cryptocurrency wallets, and system information. Stolen data was compressed and sent to a command-and-control server. The researchers noted that the repository’s high engagement metrics were likely artificially inflated by auto-generated accounts. Affected users are strongly advised to reimage their systems and rotate all stored credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA malicious Hugging Face repository impersonating OpenAI’s Privacy Filter project successfully distributed an information-stealing malware payload to Windows users. The repository reached the number one spot on the platform’s trending list and recorded 244,000 downloads prior to its removal. HiddenLayer researchers identified the campaign on May 7 by spotting a repository named Open-OSS/privacy-filter that typosquatted the legitimate OpenAI release. The malicious project copied the official model card verbatim and shipped a loader.py file designed to fetch and execute malware on Windows machines. This Python script contained fake AI-related code to appear benign while secretly disabling SSL verification and decoding a base64-encoded URL. The decoded URL pointed to an external resource hosting a JSON payload with a PowerShell command. The command executed in an invisible window to download a batch file named start.bat. This batch file performed privilege escalation, downloaded the final payload called sefirah, added it to Microsoft Defender’s exclusions, and executed it. The Rust-based infostealer targeted a wide array of sensitive data, including browser cookies, saved passwords, encryption keys, Discord tokens, cryptocurrency wallets, SSH and VPN credentials, and multi-monitor screenshots. All exfiltrated data was compressed and sent to a command-and-control server at recargapopular[.]com. The malware also featured extensive anti-analysis capabilities to evade virtual machines, sandboxes, and debuggers. Researchers determined that the repository’s 667 likes and 244,000 downloads were likely artificially inflated by auto-generated accounts. Further investigation revealed that other repositories utilized the same malicious loader infrastructure. Additionally, the campaign showed technical overlaps with an npm typosquatting effort distributing the WinOS 4.0 implant. Users who downloaded the malicious files are advised to reimage their machines, rotate all credentials, replace cryptocurrency seeds, and invalidate browser sessions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eA malicious Hugging Face repository impersonating OpenAI’s Privacy Filter project distributed an information-stealing malware payload to Windows users. The repository briefly reached the number one position on the platform’s trending list and accumulated 244,000 downloads before being removed following user reports. Hugging Face serves as a platform for developers and researchers to share AI models, datasets, and machine learning tools. The malicious repository exploited this ecosystem by hosting a pre-trained AI system that combined weight files, configuration data, and malicious code.\u003c/p\u003e\n\n\u003ch3 id=\"discovery-and-impersonation-tactics\"\u003eDiscovery and Impersonation Tactics\u003c/h3\u003e\n\n\u003cp\u003eResearchers at HiddenLayer discovered the campaign on May 7 after identifying a repository named Open-OSS/privacy-filter. The threat actors typosquatted OpenAI’s legitimate Privacy Filter release by copying its model card nearly verbatim. The repository shipped a loader.py file that was designed to fetch and execute infostealer malware on Windows machines. This Python script included fake AI-related code to appear harmless during initial inspection.\u003c/p\u003e\n\n\u003ch3 id=\"malware-execution-chain\"\u003eMalware Execution Chain\u003c/h3\u003e\n\n\u003cp\u003eThe loader.py script operated by disabling SSL verification and decoding a base64-encoded URL pointing to an external resource. It then fetched and executed a JSON payload containing a PowerShell command. This command executed in an invisible window to download a batch file named start.bat. The batch file performed privilege escalation, downloaded the final payload known as sefirah, added it to Microsoft Defender’s exclusions, and executed it. The final payload is a Rust-based infostealer designed to harvest sensitive data from the compromised system.\u003c/p\u003e\n\n\u003ch3 id=\"targeted-data-and-exfiltration\"\u003eTargeted Data and Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eThe infostealer targeted the following sensitive information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrowser data from Chromium- and Gecko-based browsers, including cookies, saved passwords, encryption keys, browsing data, and session tokens\u003c/li\u003e\n\u003cli\u003eDiscord tokens, local databases, and master keys\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallets and wallet browser extensions\u003c/li\u003e\n\u003cli\u003eSSH, FTP, and VPN credentials and configuration files, including FileZilla\u003c/li\u003e\n\u003cli\u003eSensitive local files and wallet seeds or keys\u003c/li\u003e\n\u003cli\u003eSystem information and multi-monitor screenshots\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAll stolen data was compressed and exfiltrated to a command-and-control server located at recargapopular[.]com. The malware also incorporated extensive anti-analysis features to evade detection. These features included checks for virtual machines, sandboxes, debuggers, and analysis tools.\u003c/p\u003e\n\n\u003ch3 id=\"campaign-metrics-and-related-infrastructure\"\u003eCampaign Metrics and Related Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eThe exact number of victims remains unclear due to suspected artificial inflation of engagement metrics. Researchers noted that the vast majority of the 667 accounts that liked the repository appear to be auto-generated. The 244,000 download count was also likely inflated through similar automated means. By examining these metrics, researchers uncovered other repositories that utilized the same malicious loader infrastructure. HiddenLayer also identified technical overlaps with an npm typosquatting campaign that distributed the WinOS 4.0 implant.\u003c/p\u003e\n\n\u003ch3 id=\"remediation-recommendations\"\u003eRemediation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eUsers who downloaded files from the malicious repository are advised to take immediate action. They should reimage their machines to ensure complete removal of the threat. All stored credentials must be rotated to prevent unauthorized access. Cryptocurrency wallets and seed phrases should be replaced to protect digital assets. Finally, browser sessions and tokens must be invalidated to block persistent access. Threat actors have previously abused Hugging Face to host malicious models despite the platform’s existing security measures.\u003c/p\u003e\n","keyPoints":["A malicious Hugging Face repository impersonating OpenAI's Privacy Filter project distributed a Rust-based infostealer to Windows users before the platform removed it.","The malware's loader script executed PowerShell commands to download and run a payload that steals browser data, Discord tokens, cryptocurrency wallets, and system credentials.","Stolen data is compressed and exfiltrated to a command-and-control server, while the malware employs anti-analysis techniques to evade detection.","Researchers found that the repository's high download count and likes were likely artificially inflated by auto-generated accounts.","Affected users are advised to reimage their machines, rotate all credentials, and replace cryptocurrency wallet seed phrases."],"insights":["The malware bypasses standard security controls by disabling SSL verification and executing a PowerShell command in an invisible window to download and run the final payload.","The threat actor reused infrastructure and tactics across campaigns, as the same loader infrastructure was found in other repositories and overlapped with an npm typosquatting campaign distributing the WinOS 4.0 implant.","Platform popularity metrics were weaponized, with the malicious repository artificially inflating its 244,000 downloads and 667 likes through auto-generated accounts to gain traction on Hugging Face's trending list.","The infostealer's Rust-based architecture and extensive anti-analysis checks for VMs, sandboxes, and debuggers indicate a deliberate focus on evading automated security research environments."],"referencedReports":[{"title":"Malware Found in Trending Hugging Face Repository Open-OSS/Privacy-Filter","url":"http://www.hiddenlayer.com/insight/malware-found-in-trending-hugging-face-repository-open-oss-privacy-filter","publisher":"HiddenLayer","context":"The article cites this research to explain how the malicious repository typosquatted OpenAI's Privacy Filter project and distributed a loader.py file containing infostealer malware."}],"body":"\u003cp\u003eA malicious Hugging Face repository impersonating OpenAI’s Privacy Filter project distributed an information-stealing malware payload to Windows users. The repository briefly topped the platform’s trending list and accumulated hundreds of thousands of downloads before being removed. Researchers at HiddenLayer discovered the campaign after identifying a typosquatted repository that copied OpenAI’s official model card. The malicious package included a Python script that disguised itself as harmless AI code while secretly disabling SSL verification and executing a PowerShell command. This command downloaded a batch file that performed privilege escalation and installed a Rust-based infostealer. The malware targeted sensitive data including browser credentials, Discord tokens, cryptocurrency wallets, and system information. Stolen data was compressed and sent to a command-and-control server. The researchers noted that the repository’s high engagement metrics were likely artificially inflated by auto-generated accounts. Affected users are strongly advised to reimage their systems and rotate all stored credentials.\u003c/p\u003e\n"},{"n":2,"title":"cPanel, WHM Release Fixes for Three New Vulnerabilities — Patch Now","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cpanel-whm-patch-3-new-vulnerabilities.html","time":"07:16","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"cPanel and WHM administrators must immediately update to the latest versions to patch three critical vulnerabilities that enable privilege escalation, arbitrary code execution, and denial-of-service attacks.","briefOverview":"\u003cp\u003ecPanel and WHM have released critical security updates to address three distinct vulnerabilities that could allow attackers to escalate privileges, execute arbitrary code, or cause denial-of-service. The first flaw, CVE-2026-29201, stems from insufficient input validation in the feature file name loading process and carries a CVSS score of 4.3.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability, CVE-2026-29202, involves a flaw in the create_user API plugin parameter that enables arbitrary Perl code execution for authenticated users and carries a CVSS score of 8.8. The third issue, CVE-2026-29203, is an unsafe symlink handling vulnerability that permits unauthorized file permission modifications and also carries a CVSS score of 8.8.\u003c/p\u003e\n\n\u003cp\u003eAdministrators must update their systems to the latest patched versions across all supported release branches to mitigate these risks. While there is currently no evidence of these specific flaws being exploited in the wild, the disclosure follows closely behind another critical cPanel flaw that was recently weaponized to deliver Mirai botnet variants and ransomware. Organizations should prioritize immediate patching to maintain optimal security posture.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ecPanel and WHM have issued urgent security patches to resolve three newly disclosed vulnerabilities that pose significant risks to server environments. The first vulnerability, identified as CVE-2026-29201, has a CVSS score of 4.3 and results from inadequate input validation within the feature::LOADFEATUREFILE adminbin call.\u003c/p\u003e\n\n\u003cp\u003eThis flaw could allow an attacker to perform arbitrary file reads. The second vulnerability, CVE-2026-29202, carries a high CVSS score of 8.8 and stems from insufficient validation of the plugin parameter in the create_user API call.\u003c/p\u003e\n\n\u003cp\u003eThis issue enables arbitrary Perl code execution under the context of an already authenticated system user. The third vulnerability, CVE-2026-29203, also holds a CVSS score of 8.8 and involves unsafe symlink handling.\u003c/p\u003e\n\n\u003cp\u003eThis defect permits users to alter access permissions on arbitrary files via chmod, potentially leading to denial-of-service attacks or privilege escalation. To address these issues, cPanel has released updated versions across multiple release branches.\u003c/p\u003e\n\n\u003cp\u003eAdministrators running cPanel and WHM must update to 11.136.0.9 or higher, 11.134.0.25 or higher, 11.132.0.31 or higher, 11.130.0.22 or higher, 11.126.0.58 or higher, 11.124.0.37 or higher, 11.118.0.66 or higher, 11.110.0.116 or higher, 11.110.0.117 or higher, 11.102.0.41 or higher, 11.94.0.30 or higher, or 11.86.0.43 or higher. Users operating WP Squared must update to version 11.136.1.10 or higher.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, version 110.0.114 has been deployed as a direct update for customers still utilizing CentOS 6 or CloudLinux 6. Although there is no current evidence of these vulnerabilities being actively exploited, the announcement arrives just days after CVE-2026-41940 was weaponized as a zero-day.\u003c/p\u003e\n\n\u003cp\u003eThat previous flaw was used to distribute Mirai botnet variants and a ransomware strain known as Sorry. Security teams are strongly advised to apply the latest updates immediately to ensure optimal protection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003ecPanel and WHM have released critical security updates to address three distinct vulnerabilities that could enable privilege escalation, arbitrary code execution, and denial-of-service attacks. Each vulnerability has been assigned a unique CVE identifier and CVSS score:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-29201 (CVSS 4.3):\u003c/strong\u003e This flaw involves insufficient input validation of the feature file name within the \u0026ldquo;feature::LOADFEATUREFILE\u0026rdquo; adminbin call. Exploitation could result in an arbitrary file read.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-29202 (CVSS 8.8):\u003c/strong\u003e This vulnerability stems from insufficient input validation of the \u0026ldquo;plugin\u0026rdquo; parameter in the \u0026ldquo;create_user API\u0026rdquo; call. It allows for arbitrary Perl code execution on behalf of an already authenticated account\u0026rsquo;s system user.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-29203 (CVSS 8.8):\u003c/strong\u003e This issue involves unsafe symlink handling that permits a user to modify access permissions of an arbitrary file using chmod. This could lead to denial-of-service or possible privilege escalation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"required-patched-versions\"\u003eRequired Patched Versions\u003c/h3\u003e\n\n\u003cp\u003eAdministrators must update their environments to the following minimum versions to mitigate these risks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ecPanel and WHM:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e11.136.0.9 and higher\u003c/li\u003e\n\u003cli\u003e11.134.0.25 and higher\u003c/li\u003e\n\u003cli\u003e11.132.0.31 and higher\u003c/li\u003e\n\u003cli\u003e11.130.0.22 and higher\u003c/li\u003e\n\u003cli\u003e11.126.0.58 and higher\u003c/li\u003e\n\u003cli\u003e11.124.0.37 and higher\u003c/li\u003e\n\u003cli\u003e11.118.0.66 and higher\u003c/li\u003e\n\u003cli\u003e11.110.0.116 and higher\u003c/li\u003e\n\u003cli\u003e11.110.0.117 and higher\u003c/li\u003e\n\u003cli\u003e11.102.0.41 and higher\u003c/li\u003e\n\u003cli\u003e11.94.0.30 and higher\u003c/li\u003e\n\u003cli\u003e11.86.0.43 and higher\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWP Squared:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e11.136.1.10 and higher\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"legacy-infrastructure-updates\"\u003eLegacy Infrastructure Updates\u003c/h3\u003e\n\n\u003cp\u003eFor customers still operating on older operating systems, cPanel has provided a targeted remediation path. Version 110.0.114 has been released as a direct update specifically for users running CentOS 6 or CloudLinux 6. These legacy environments require immediate attention to align with current security standards.\u003c/p\u003e\n\n\u003ch3 id=\"threat-landscape-context\"\u003eThreat Landscape Context\u003c/h3\u003e\n\n\u003cp\u003eWhile there is currently no evidence that CVE-2026-29201, CVE-2026-29202, or CVE-2026-29203 have been exploited in the wild, the disclosure carries heightened urgency. The announcement comes just days after another critical flaw, CVE-2026-41940, was weaponized by threat actors as a zero-day vulnerability. That previous flaw was actively used to deliver Mirai botnet variants and a ransomware strain named Sorry. Security teams are strongly advised to apply the latest updates immediately to ensure optimal protection against emerging threats.\u003c/p\u003e\n","keyPoints":["cPanel and WHM have released updates to address three vulnerabilities involving insufficient input validation and unsafe symlink handling that could lead to privilege escalation, code execution, and denial-of-service.","The patched vulnerabilities include CVE-2026-29201 for arbitrary file read, CVE-2026-29202 for arbitrary Perl code execution, and CVE-2026-29203 for unsafe symlink handling.","Administrators must update to specific patched versions such as 11.136.0.9 and higher for cPanel and WHM, or 11.136.1.10 and higher for WP Squared.","Version 110.0.114 is released as a direct up er Mirai botnet variants and ransomware. Organizations should prioritize immediate patching to maintain optimal security posture.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });

  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}

    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>

}

function SwipeCard({ article, isTop, depth, onSwipe }) {
  const [dx, setDx]             = React.useState(0);
  const [dy, setDy]             = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [flying, setFlying]     = React.useState(null);
  const [flipped, setFlipped]   = React.useState(false);
  const startRef = React.useRef({ x: 0, y: 0 });

  React.useEffect(() => {
    if (isTop && !flipped) {
      window.__downlinkFlipTop = () => setFlipped(true);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const onPointerDown = (e) => {
    if (!isTop || flipped || flying) return;
    setDragging(true);
    startRef.current = { x: e.clientX, y: e.clientY };
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging) return;
    setDx(e.clientX - startRef.current.x);
    setDy(e.clientY - startRef.current.y);
  };
  const onPointerUp = () => {
    if (!dragging) return;
    setDragging(false);
    const threshold = 110;
    if (dx > threshold) {
      setFlying("right");
      setTimeout(() => { setFlipped(true); setDx(0); setDy(0); setFlying(null); }, 280);
    } else if (dx < -threshold) {
      setFlying("left");
      setTimeout(() => onSwipe("left"), 380);
    } else {
      setDx(0); setDy(0);
    }
  };

  let transform; let opacity = 1;
  if (flying === "left")       { transform = "translate(-140%, " + (dy * 1.5) + "px) rotate(-22deg)"; opacity = 0; }
  else if (flying === "right") { transform = "translate(60%, " + dy + "px) rotate(12deg) scale(0.95)"; }
  else if (dragging)           { transform = "translate(" + dx + "px, " + (dy * 0.4) + "px) rotate(" + (dx * 0.05) + "deg)"; }
  else if (depth > 0)          { transform = "translateY(" + (depth * 8) + "px) scale(" + (1 - depth * 0.04) + ")"; }
  else                         { transform = "translate(0, 0) rotate(0)"; }

  const skipOpacity = !flipped && dx < 0 ? Math.min(1, -dx / 100) : 0;
  const readOpacity = !flipped && dx > 0 ? Math.min(1, dx / 100) : 0;
  const cardClass   = "swipe-card " + (dragging ? "dragging" : flying ? "fly-out" : "snap-back");

  return (
    <div className={cardClass}
      style={{ transform, opacity, zIndex: 100 - depth, cursor: isTop && !flipped ? "grab" : "default", pointerEvents: isTop ? "auto" : "none" }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      {!flipped && (
        <>
          <div className="stamp skip" style={{ opacity: skipOpacity }}>SKIP</div>
          <div className="stamp read" style={{ opacity: readOpacity }}>READ</div>
        </>
      )}
    </div>
  );
}

function App() {
  const [index, setIndex] = React.useState(0);
  const [tick, setTick]   = React.useState(0);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  { setIndex(i => i + 1); setTick(t => t + 1); }
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished]);

  const advance = () => { setIndex(i => i + 1); setTick(t => t + 1); };

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setTick(0); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + tick + "-" + realDepth}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onSwipe={(dir) => { if (dir === "left") advance(); }}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Skip (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--text3)", letterSpacing: "0.12em", textAlign: "center", lineHeight: 1.7 }}>
              <div>&#8592; SKIP · READ &#8594;</div>
              <div style={{ opacity: 0.6, marginTop: 2 }}>SWIPE OR CLICK</div>
            </div>
            <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="Read details (ArrowRight)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
