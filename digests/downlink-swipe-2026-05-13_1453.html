ting an unnamed Azerbaijani oil and gas company. Bitdefender attributes this activity with moderate-to-high confidence to the FamousSparrow hacking group, also known as UAT-9244. The group shares tactical overlap with clusters tracked as Earth Estries and Salt Typhoon. The intrusion occurred in three separate waves spanning from late December 2025 to late February 2026. In each wave, the attackers repeatedly leveraged the same vulnerable Microsoft Exchange Server entry point obtained through the ProxyNotShell chain. This persistent exploitation continued despite several remediation attempts by the victim organization. The first wave on December 25, 2025, involved the deployment of Deed RAT, a successor to ShadowPad. The second wave in late January and early February 2026 attempted to drop TernDoor using a shellcode loader previously attributed to GroundPeony. The third wave toward the end of February 2026 saw the deployment of a modified version of Deed RAT communicating with a command-and-control server at sentinelonepro[.]com. The initial access phase was followed by attempts to deploy web shells for persistent foothold establishment. Attackers ultimately utilized an evolved DLL side-loading technique that leverages the legitimate LogMeIn Hamachi binary to execute a rogue DLL. Unlike standard side-loading, this method overrides two specific exported functions within the malicious library to create a two-stage trigger. This approach gates the payload execution through the host application\u0026rsquo;s natural control flow, significantly enhancing defense evasion capabilities. The threat actors also conducted lateral movement to broaden their network access and established redundant footholds to ensure resilience against detection. Security researchers note that the targeting aligns with Azerbaijan\u0026rsquo;s increased role in European energy security following the 2024 expiration of Russia\u0026rsquo;s Ukraine gas transit agreement and 2026 Strait of Hormuz disruptions. The campaign illustrates a high degree of operational discipline, as actors repeatedly revisited the same access path to introduce new payloads and extend their access within the victim environment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview-attribution\"\u003eOverview \u0026amp; Attribution\u003c/h3\u003e\n\n\u003cp\u003eA China-linked threat actor conducted a multi-wave intrusion targeting an unnamed Azerbaijani oil and gas company between late December 2025 and late February 2026. Bitdefender attributes this activity with moderate-to-high confidence to the hacking group FamousSparrow (UAT-9244). The group demonstrates tactical overlap with clusters tracked under the monikers Earth Estries and Salt Typhoon.\u003c/p\u003e\n\n\u003ch3 id=\"campaign-timeline-waves\"\u003eCampaign Timeline \u0026amp; Waves\u003c/h3\u003e\n\n\u003cp\u003eThe operation unfolded across three distinct waves, each revisiting the same initial access vector while rotating malware payloads:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWave 1 (December 25, 2025):\u003c/strong\u003e Initial compromise via Microsoft Exchange Server vulnerability using the ProxyNotShell chain. Deed RAT (Snappybee) was deployed.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWave 2 (Late January/Early February 2026):\u003c/strong\u003e Attempted deployment of TernDoor using Mofu Loader, a shellcode loader previously attributed to GroundPeony. This attempt was unsuccessful.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWave 3 (Late February 2026):\u003c/strong\u003e Successful deployment of a modified Deed RAT variant utilizing sentinelonepro[.]com for command-and-control communications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"technical-execution-evasion\"\u003eTechnical Execution \u0026amp; Evasion\u003c/h3\u003e\n\n\u003cp\u003eThe attackers prioritized persistence and defense evasion through advanced techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInitial Access:\u003c/strong\u003e Repeated exploitation of the same Microsoft Exchange Server vulnerability via ProxyNotShell, ignoring remediation attempts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence Mechanisms:\u003c/strong\u003e Attempts to deploy web shells to establish a foothold, alongside lateral movement to broaden network access.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDLL Side-Loading Evolution:\u003c/strong\u003e The initial wave utilized an evolved DLL side-loading technique leveraging the legitimate LogMeIn Hamachi binary. This method overrides two specific exported functions within a malicious library to create a two-stage trigger. Execution is gated through the host application\u0026rsquo;s natural control flow, significantly improving defense evasion compared to standard file replacement side-loading.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResilience Measures:\u003c/strong\u003e Redundant footholds were established to ensure operational continuity if activity was detected and removed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-context-research-insights\"\u003eStrategic Context \u0026amp; Research Insights\u003c/h3\u003e\n\n\u003cp\u003eThe targeting extends FamousSparrow\u0026rsquo;s known victimology into a region critical to European energy security. Azerbaijan\u0026rsquo;s role in this sector materially increased following the 2024 expiration of Russia\u0026rsquo;s Ukraine gas transit agreement and 2026 Strait of Hormuz disruptions. Bitdefender\u0026rsquo;s report emphasizes that this intrusion should not be viewed as an isolated event but as a sustained, adaptive operation. The actors demonstrated high operational discipline by continuously refining their malware arsenal and repeatedly seeking to regain access until the original vulnerability was patched and credentials were rotated.\u003c/p\u003e\n\n\u003ch3 id=\"key-technical-artifacts\"\u003eKey Technical Artifacts\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMalware:\u003c/strong\u003e Deed RAT (Snappybee), TernDoor, Mofu Loader, rogue DLL loaded via LogMeIn Hamachi.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eC2 Infrastructure:\u003c/strong\u003e sentinelonepro[.]com.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVulnerability Chain:\u003c/strong\u003e ProxyNotShell (Microsoft Exchange Server).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttribution:\u003c/strong\u003e FamousSparrow / UAT-9244 (China-linked).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"conclusion\"\u003eConclusion\u003c/h3\u003e\n\n\u003cp\u003eThis campaign exemplifies a highly persistent and adaptive threat operation. By repeatedly exploiting the same access path and rotating between Deed RAT and TernDoor, the threat actors ensured sustained network access. The use of advanced DLL side-loading techniques and redundant footholds highlights a sophisticated approach to defense evasion and resilience. Security teams should prioritize patching Microsoft Exchange vulnerabilities, rotating compromised credentials, and monitoring for LogMeIn Hamachi anomalies to disrupt similar operations.\u003c/p\u003e\n","keyPoints":["A China-linked hacking group known as FamousSparrow conducted a multi-wave intrusion targeting an Azerbaijani oil and gas company between late December 2025 and late February 2026.","The attackers repeatedly exploited the same Microsoft Exchange Server vulnerability via the ProxyNotShell chain to maintain access despite multiple remediation attempts.","The campaign involved the deployment of Deed RAT and TernDoor backdoors using an evolved DLL side-loading technique that leveraged the legitimate LogMeIn Hamachi binary.","The threat actors established redundant footholds and conducted lateral movement to ensure operational resilience and persistent access within the compromised network."],"insights":["The threat actor employed an evolved DLL side-loading technique that overrides two specific exported functions within a malicious library to create a two-stage trigger, gating execution through the host application's natural control flow.","The campaign demonstrated persistent operational discipline by repeatedly exploiting the same Microsoft Exchange vulnerability across three waves, swapping between Deed RAT and TernDoor backdoors rather than abandoning the initial access path.","The targeting of the Azerbaijani energy sector is strategically linked to the country's increased role in European energy security following the 2024 expiration of Russia's Ukraine gas transit agreement and 2026 Strait of Hormuz disruptions."],"referencedReports":[{"title":"FamousSparrow APT targets Azerbaijani oil \u0026 gas industry","url":"https://www.bitdefender.com/en-us/blog/businessinsights/famoussparrow-apt-targets-azerbaijani-oil-gas-industry","publisher":"Bitdefender","context":"The article cites this Bitdefender report as the source for attributing the multi-wave intrusion targeting an Azerbaijani energy firm to the FamousSparrow hacking group."}],"body":"\u003cp\u003eA China-linked hacking group known as FamousSparrow conducted a multi-wave intrusion targeting an Azerbaijani oil and gas company between late December 2025 and late February 2026. The attackers repeatedly exploited the same Microsoft Exchange Server vulnerability via the ProxyNotShell chain to maintain initial access despite multiple remediation attempts. Across three distinct waves, the threat actors deployed two different backdoors, utilizing Deed RAT and TernDoor to establish persistent footholds. The initial compromise involved deploying web shells and executing an evolved DLL side-loading technique that leveraged the legitimate LogMeIn Hamachi binary to load a malicious library. This advanced evasion method overrides specific exported functions to create a two-stage trigger that gates execution through the host application\u0026rsquo;s natural control flow. The campaign also included lateral movement and the establishment of redundant network footholds to ensure operational resilience. The targeted organization was selected due to Azerbaijan\u0026rsquo;s growing role in European energy security following recent geopolitical shifts. Security researchers emphasize that this sustained operation demonstrates how threat actors will continuously re-exploit the same access path until vulnerabilities are patched and credentials are rotated.\u003c/p\u003e\n"},{"n":12,"title":"Microsoft's MDASH AI System Finds 16 Windows Flaws Fixed in Patch Tuesday","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/microsofts-mdash-ai-system-finds-16.html","time":"13:46","priority":"SHOULD READ","score":85,"group":"E","groupColor":"#a78bfa","tldr":"Microsoft's new multi-model AI system, MDASH, successfully identified 16 Windows vulnerabilities fixed in the latest Patch Tuesday, proving that AI-driven vulnerability discovery has moved from research to production-grade enterprise defense.","briefOverview":"\u003cp\u003eMicrosoft has launched MDASH, a multi-model agentic scanning harness designed to autonomously discover and validate vulnerabilities in complex software like Windows. The system orchestrates over 100 specialized AI agents across different model types to analyze code, flag potential issues, and prove exploitable defects.\u003c/p\u003e\n\n\u003cp\u003eRather than relying on a single model, MDASH uses a structured pipeline where auditor agents identify suspects and debater agents validate the findings. When a debater cannot refute an auditor\u0026rsquo;s claim, the system treats the disagreement as a signal of high credibility.\u003c/p\u003e\n\n\u003cp\u003eThe platform has already been tested in a limited private preview and successfully identified 16 vulnerabilities patched in the latest Patch Tuesday release. These findings include two critical flaws in the Windows networking and authentication stack that could enable remote code execution. Microsoft emphasizes that the true security advantage lies in the agentic system architecture rather than any individual AI model.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has introduced MDASH, a model-agnostic artificial intelligence system built to facilitate large-scale vulnerability discovery and remediation. The acronym stands for multi-model agentic scanning harness, and it is currently undergoing a limited private preview with select customers.\u003c/p\u003e\n\n\u003cp\u003eUnlike traditional single-model approaches, MDASH orchestrates more than 100 specialized AI agents across an ensemble of frontier and distilled models. The system operates through a structured pipeline that ingests source code and produces validated findings through distinct stages. It begins by analyzing the codebase to build a threat model and map the attack surface.\u003c/p\u003e\n\n\u003cp\u003eSpecialized auditor agents then run over candidate code paths to flag potential security issues. A second set of debater agents validates these initial findings and groups semantically equivalent results. Finally, the system proves the existence of the identified vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe architecture leverages state-of-the-art models for complex reasoning, distilled models for high-volume validation, and a separate model for independent counterpoints. Microsoft notes that when an auditor flags a suspect issue and a debater cannot refute it, the finding\u0026rsquo;s credibility increases significantly.\u003c/p\u003e\n\n\u003cp\u003eThe specialized agents were constructed based on historical CVEs and their corresponding patches, allowing the architecture to remain portable across future model generations. MDASH has already been put to the test and unearthed 16 vulnerabilities fixed in the most recent Patch Tuesday update.\u003c/p\u003e\n\n\u003cp\u003eThese shortcomings span the Windows networking and authentication stack, including two critical flaws capable of enabling remote code execution. One flaw involves a double-free vulnerability in ikeext.dll affecting IKEv2, while the other is a race condition in tcpip.sys impacting IPv6 and IPSec configurations.\u003c/p\u003e\n\n\u003cp\u003eThis development follows similar AI-driven security initiatives from Anthropic and OpenAI aimed at accelerating vulnerability remediation. Taesoo Kim, Microsoft\u0026rsquo;s vice president of agentic security, stated that AI vulnerability discovery has transitioned from research curiosity to production-grade defense. He emphasized that the durable competitive advantage resides in the agentic system surrounding the model, not the model itself.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"system-overview-and-architecture\"\u003eSystem Overview and Architecture\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has unveiled MDASH, a multi-model agentic scanning harness designed to automate vulnerability discovery and remediation at scale. The system is currently available in a limited private preview for select customers. Unlike conventional single-model security tools, MDASH is model-agnostic and orchestrates more than 100 specialized AI agents. These agents operate across an ensemble of frontier and distilled models to autonomously discover, debate, and prove exploitable defects in complex codebases like Windows.\u003c/p\u003e\n\n\u003ch2 id=\"structured-pipeline-and-agent-roles\"\u003eStructured Pipeline and Agent Roles\u003c/h2\u003e\n\n\u003cp\u003eThe platform functions as a structured pipeline that ingests a codebase and produces validated, proven findings through a sequential series of actions. The process begins by analyzing the source code to construct a threat model and map the attack surface. Specialized auditor agents then examine candidate code paths to flag potential security issues. A second group of debater agents validates these initial findings and groups semantically equivalent results. The pipeline concludes by proving the existence of the identified vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"model-configuration-and-credibility-signals\"\u003eModel Configuration and Credibility Signals\u003c/h2\u003e\n\n\u003cp\u003eMDASH utilizes a configurable panel of AI models tailored to specific pipeline stages. State-of-the-art models handle complex reasoning, distilled models manage high-volume validation passes, and a separate state-of-the-art model provides independent counterpoints. Microsoft highlights that disagreement between models serves as a key credibility signal. When an auditor flags an issue and a debater cannot successfully refute it, the finding\u0026rsquo;s posterior credibility increases significantly. Each pipeline stage operates with its own distinct role, prompt regime, tools, and stop criteria.\u003c/p\u003e\n\n\u003ch2 id=\"agent-construction-and-portability\"\u003eAgent Construction and Portability\u003c/h2\u003e\n\n\u003cp\u003eThe specialized agents were explicitly constructed based on past common vulnerabilities and exposures (CVEs) and their corresponding patches. This historical grounding allows the system to recognize established vulnerability patterns efficiently. The underlying architecture is designed for portability across different model generations. This ensures that the agentic framework can adapt to newer AI models without requiring a complete system overhaul.\u003c/p\u003e\n\n\u003ch2 id=\"testing-results-and-patch-tuesday-findings\"\u003eTesting Results and Patch Tuesday Findings\u003c/h2\u003e\n\n\u003cp\u003eMDASH has already been deployed in a testing environment and successfully identified 16 vulnerabilities fixed in the latest Patch Tuesday release. The discovered shortcomings span the Windows networking and authentication stack. Among these findings are two critical flaws that could facilitate remote code execution:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-33824 (CVSS 9.8) is a double-free vulnerability in ikeext.dll affecting machines with IKEv2 enabled.\u003c/li\u003e\n\u003cli\u003eCVE-2026-33827 (CVSS 8.1) is a race condition in tcpip.sys impacting nodes where IPSec is enabled.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-context-and-strategic-outlook\"\u003eIndustry Context and Strategic Outlook\u003c/h2\u003e\n\n\u003cp\u003eThis release follows recent AI cybersecurity initiatives from other major technology firms. Anthropic recently debuted Project Glasswing, while OpenAI launched Daybreak, both focusing on accelerating vulnerability discovery and remediation. Taesoo Kim, Microsoft\u0026rsquo;s vice president of agentic security, noted that AI vulnerability discovery has moved from research curiosity into production-grade defense at enterprise scale. He concluded that the durable competitive advantage lies in the agentic system surrounding the model, rather than the capabilities of any single model itself.\u003c/p\u003e\n","keyPoints":["Microsoft has introduced MDASH, a multi-model AI system that uses over 100 specialized agents to autonomously discover, validate, and prove exploitable vulnerabilities in complex codebases.","The system operates through a structured pipeline of auditor, debater, and prover agents that analyze source code, flag potential issues, validate findings, and confirm vulnerabilities.","MDASH successfully identified 16 vulnerabilities patched in the latest Patch Tuesday release, including two critical flaws enabling remote code execution in Windows networking and authentication components.","Microsoft emphasizes that the security advantage of this approach lies in its agentic system architecture rather than any individual AI model used."],"insights":["MDASH treats model disagreement as a confidence signal, where an auditor's flagged finding gains higher posterior credibility if a dedicated debater cannot successfully refute it.","The system's specialized agents are explicitly built upon historical CVEs and their corresponding patches, allowing the AI to leverage past vulnerability patterns for detection.","MDASH's architecture is designed for portability across model generations, meaning the agentic pipeline and prompt regimes can adapt to newer models without requiring a complete system rebuild.","The pipeline isolates distinct cognitive roles—auditing, debating, and proving—into separate agent types to prevent a single model's reasoning errors or hallucinations from compromising the entire vulnerability validation process."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has launched MDASH, a multi-model agentic scanning harness designed to autonomously discover and validate vulnerabilities in complex software like Windows. The system orchestrates over 100 specialized AI agents across different model types to analyze code, flag potential issues, and prove exploitable defects.\u003c/p\u003e\n\n\u003cp\u003eRather than relying on a single model, MDASH uses a structured pipeline where auditor agents identify suspects and debater agents validate the findings. When a debater cannot refute an auditor\u0026rsquo;s claim, the system treats the disagreement as a signal of high credibility.\u003c/p\u003e\n\n\u003cp\u003eThe platform has already been tested in a limited private preview and successfully identified 16 vulnerabilities patched in the latest Patch Tuesday release. These findings include two critical flaws in the Windows networking and authentication stack that could enable remote code execution. Microsoft emphasizes that the true security advantage lies in the agentic system architecture rather than any individual AI model.\u003c/p\u003e\n"},{"n":11,"title":"[Webinar] Why Your AppSec Tools Miss the \"Lethal Path\" (and How to Fix It)","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/webinar-why-your-appsec-tools-miss.html","time":"11:52","priority":"MAY READ","score":72,"group":null,"groupColor":null,"tldr":"Traditional security tools overwhelm teams with low-severity alerts while missing how attackers chain minor code and cloud vulnerabilities into direct paths to sensitive data. Mapping these attack paths and bridging the code-to-cloud gap eliminates alert fatigue and effectively stops sophisticated threats.","briefOverview":"\u003cp\u003eMost security tools generate overwhelming numbers of low-severity alerts, causing teams to ignore them while attackers quietly build lethal chains to sensitive data. Hackers rarely target single high-risk vulnerabilities anymore. Instead, they connect minor coding bugs and cloud misconfigurations across isolated environments to create direct paths to critical information. Traditional tools that evaluate code and cloud infrastructure separately fail to identify these complete attack paths. A live webinar hosted by Wiz experts Mike McGuire and Salman Ladha will address this gap. The session will cover how to map real-world attack paths, bridge the code-to-cloud divide, and implement a practical framework to eliminate irrelevant alerts. Attendees will also gain direct access to the experts for a post-session Q\u0026amp;A. The recording will be available for those unable to attend live.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMost security tools operate like smoke alarms that trigger constantly for minor issues, creating alert fatigue that causes teams to ignore critical warnings. While security staff focus on resolving hundreds of low-severity alerts, sophisticated attackers are quietly constructing lethal chains through the system. A lethal chain forms when hackers link a series of small, low-risk vulnerabilities that appear harmless in isolation. By connecting minor coding bugs with cloud misconfigurations, attackers establish a direct pathway to sensitive organizational data. Security platforms that analyze code and cloud environments separately cannot detect these cross-domain attack paths. This fragmented approach leaves organizations flying blind against modern threat actors. To address this challenge, Wiz experts Mike McGuire and Salman Ladha are hosting a live strategic briefing. The session will explain how to identify which vulnerabilities actually pose a deadly threat by mapping real-world attack paths. It will also explore why hackers exploit the white space between development and production environments. A practical framework will be introduced to help teams stop wasting resources on irrelevant alerts. The live event offers direct access to the speakers for an open Q\u0026amp;A session focused on specific architectural challenges. Organizations unable to attend the live session can still register to receive the full recording afterward. This approach shifts security strategy from chasing noise to actively mapping and breaking attack chains.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eMost security tools generate overwhelming numbers of low-severity alerts, causing teams to ignore them while attackers quietly build lethal chains to sensitive data.\u003c/p\u003e\n\n\u003cp\u003eHackers rarely target single high-risk vulnerabilities anymore. Instead, they connect minor coding bugs and cloud misconfigurations across isolated environments to create direct paths to critical information. Traditional tools that evaluate code and cloud infrastructure separately fail to identify these complete attack paths.\u003c/p\u003e\n\n\u003cp\u003eThe webinar hosted by Wiz experts Mike McGuire and Salman Ladha addresses this critical gap in application security. The session focuses on moving beyond simple alert triage to actively mapping real-world attack paths. This approach helps security teams identify which bugs actually pose a deadly threat to the organization.\u003c/p\u003e\n\n\u003cp\u003eKey topics covered in the briefing include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBeyond the Alert:\u003c/strong\u003e Techniques for distinguishing harmless vulnerabilities from deadly ones through attack path mapping.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Code-to-Cloud Gap:\u003c/strong\u003e An explanation of why hackers exploit the white space between development and production environments.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCutting the Noise:\u003c/strong\u003e A practical framework designed to help teams stop wasting time on alerts that do not impact critical data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe live event provides direct access to the speakers for a post-session Q\u0026amp;A. Attendees can present specific architectural or pipeline challenges to Mike McGuire and Salman Ladha. Organizations unable to attend the live session are encouraged to register anyway. The full recording will be sent immediately after the briefing concludes. This strategy shifts security operations from chasing noise to systematically breaking the chains that lead to data breaches.\u003c/p\u003e\n","keyPoints":["Most security tools generate overwhelming numbers of low-severity alerts, causing teams to ignore them while attackers build lethal chains through minor flaws.","Hackers create direct paths to sensitive data by connecting small coding bugs and cloud misconfigurations across isolated environments.","Security tools that evaluate code and cloud infrastructure separately fail to identify the complete attack paths that lead to critical data.","The webinar provides a practical framework to map real-world attack paths, bridge the code-to-cloud gap, and eliminate irrelevant alerts."],"insights":["Hackers bypass traditional defenses by chaining minor, low-risk flaws across code and cloud environments rather than targeting single high-severity vulnerabilities.","Security tools that analyze code and cloud infrastructure separately create exploitable gaps that attackers use to reach sensitive data undetected.","Shifting from volume-based alert triage to mapping real-world attack paths allows teams to identify and prioritize genuinely critical vulnerabilities.","A structured framework can help security teams eliminate low-value alerts and focus resources on breaking the specific chains that lead to data breaches."],"referencedReports":[],"body":"\u003cp\u003eMost security tools generate overwhelming numbers of low-severity alerts, causing teams to ignore them while attackers quietly build lethal chains to sensitive data. Hackers rarely target single high-risk vulnerabilities anymore. Instead, they connect minor coding bugs and cloud misconfigurations across isolated environments to create direct paths to critical information. Traditional tools that evaluate code and cloud infrastructure separately fail to identify these complete attack paths. A live webinar hosted by Wiz experts Mike McGuire and Salman Ladha will address this gap. The session will cover how to map real-world attack paths, bridge the code-to-cloud divide, and implement a practical framework to eliminate irrelevant alerts. Attendees will also gain direct access to the experts for a post-session Q\u0026amp;A. The recording will be available for those unable to attend live.\u003c/p\u003e\n"},{"n":3,"title":"Breaking things to keep them safe with Philippe Laulheret","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/breaking-things-to-keep-them-safe-with-philippe-laulheret/","time":"10:00","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Philippe Laulheret leverages his reverse engineering expertise and Capture The Flag experience to proactively identify critical vulnerabilities in software and hardware, enabling his team to develop detection rules that protect customers.","briefOverview":"\u003cp\u003ePhilippe Laulheret is a Senior Vulnerability Researcher who specializes in finding flaws in software, hardware, and physical systems. Unlike traditional consulting roles, he autonomously selects his own research targets based on what he considers most critical. His discoveries directly enable his team to develop detection rules that protect Talos customers from exploitation.\u003c/p\u003e\n\n\u003cp\u003eLaulheret’s approach is heavily influenced by his lifelong fascination with reverse engineering and puzzle-solving. He first honed these skills through years of playing Capture The Flag challenges during his teenage years. After completing his engineering education in France and working in interactive design in the United States, he transitioned into cybersecurity.\u003c/p\u003e\n\n\u003cp\u003eHe now applies his unique background to uncover security weaknesses before they can be maliciously exploited. His work bridges theoretical curiosity with practical defense, demonstrating how independent research strengthens organizational security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePhilippe Laulheret serves as a Senior Vulnerability Researcher whose primary responsibility involves identifying security flaws across software, hardware, and physical environments. He operates outside the conventional consulting model by independently choosing which systems to investigate based on their perceived importance. These findings are subsequently used by his colleagues to craft detection rules that safeguard the organization\u0026rsquo;s customers.\u003c/p\u003e\n\n\u003cp\u003eHis professional trajectory stems from a deep-rooted curiosity about reverse engineering and system internals. During his formative years, he actively participated in Capture The Flag competitions to maintain and refine his technical skills. This hands-on experience ultimately facilitated his transition from standard development roles into dedicated security research.\u003c/p\u003e\n\n\u003cp\u003eLaulheret completed his education at a French engineering institution, where he focused on mathematics, physics, and electrical engineering. He later relocated to the United States to work in a design studio, where he spent four years creating interactive installations. Throughout that period, he continued to engage with Capture The Flag exercises to keep his security expertise sharp.\u003c/p\u003e\n\n\u003cp\u003eHe eventually moved to New York to join a cybersecurity startup before settling in the Pacific Northwest. There, he finally secured his current position to pursue vulnerability research on his own terms. He also shares practical examples of his work, such as using a green onion to bypass a biometric fingerprint reader.\u003c/p\u003e\n\n\u003cp\u003eHis insights highlight the contrast between cinematic portrayals of hacking and the methodical reality of ethical security testing. Ultimately, his career illustrates how sustained technical curiosity and independent research converge to enhance digital defenses.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIntroduction and Core Responsibilities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003ePhilippe Laulheret holds the title of Senior Vulnerability Researcher at Talos. His primary duty involves systematically identifying security vulnerabilities in software, hardware, and physical systems. Unlike standard consulting engagements where clients dictate the scope, he exercises autonomy in selecting his research targets. He prioritizes systems he deems critical to the organization\u0026rsquo;s security posture. This independent selection process allows him to focus on high-value assets that require immediate attention.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eResearch Methodology and Customer Impact\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eLaulheret views vulnerability research as an extension of reverse engineering and puzzle-solving. His methodology relies on deeply understanding system architectures before attempting to break them. He leverages this understanding to uncover flaws that could otherwise be exploited by malicious actors. Once identified, his findings are handed off to specialized teams. These teams translate his technical discoveries into actionable detection rules. Consequently, his independent research directly contributes to the protection of the organization\u0026rsquo;s customer base.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCareer Progression and Technical Foundation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eHis professional journey follows a distinct trajectory marked by continuous skill development. Key milestones in his career include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCompleting a rigorous French engineering education focused on mathematics, physics, and electrical engineering.\u003c/li\u003e\n\u003cli\u003eWorking in a U.S. design studio for four years while creating interactive installations.\u003c/li\u003e\n\u003cli\u003eMaintaining sharp security skills through years of Capture The Flag competitions.\u003c/li\u003e\n\u003cli\u003eTransitioning to a cybersecurity startup in New York before settling in the Pacific Northwest.\u003c/li\u003e\n\u003cli\u003eSecuring his current role to fully pursue autonomous vulnerability research.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis progression demonstrates how diverse technical experiences converge into specialized security expertise.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePractical Demonstrations and Industry Realities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eLaulheret frequently illustrates his technical capabilities through unconventional testing methods. He notably demonstrated how a simple green onion could successfully bypass a biometric fingerprint reader. This experiment highlights the importance of physical security testing alongside digital analysis. He also addresses the frequent disconnect between Hollywood depictions of hacking and actual security work. He emphasizes that real-world ethical hacking requires patience, systematic analysis, and deep technical knowledge. His interview provides a transparent look into the daily realities of vulnerability research.\u003c/p\u003e\n","keyPoints":["Philippe Laulheret works as a Senior Vulnerability Researcher who chooses his own targets to find flaws in software, hardware, and physical systems.","His background in reverse engineering and years of playing Capture The Flag challenges helped him transition from development work into security research.","He studied at a French engineering school and worked in interactive installations before joining a cybersecurity startup and eventually Talos.","The vulnerabilities he uncovers allow his team to write detection rules that protect customers from exploitation.","He describes vulnerability research as a puzzle-solving process that requires deeply understanding how systems work to break them safely."],"insights":["He successfully bypassed a biometric fingerprint reader using a green onion, demonstrating unconventional physical security testing methods.","He autonomously selects his own research targets rather than accepting assigned assignments, allowing him to prioritize high-impact flaws that directly feed detection rule development.","His core vulnerability research skills were developed through years of informal Capture The Flag (CTF) challenges rather than formal security coursework.","The organization bridges independent research and operational security by immediately converting discovered vulnerabilities into customer-facing detection rules."],"referencedReports":[],"body":"\u003cp\u003ePhilippe Laulheret is a Senior Vulnerability Researcher who specializes in finding flaws in software, hardware, and physical systems. Unlike traditional consulting roles, he autonomously selects his own research targets based on what he considers most critical. His discoveries directly enable his team to develop detection rules that protect Talos customers from exploitation.\u003c/p\u003e\n\n\u003cp\u003eLaulheret’s approach is heavily influenced by his lifelong fascination with reverse engineering and puzzle-solving. He first honed these skills through years of playing Capture The Flag challenges during his teenage years. After completing his engineering education in France and working in interactive design in the United States, he transitioned into cybersecurity.\u003c/p\u003e\n\n\u003cp\u003eHe now applies his unique background to uncover security weaknesses before they can be maliciously exploited. His work bridges theoretical curiosity with practical defense, demonstrating how independent research strengthens organizational security.\u003c/p\u003e\n"},{"n":4,"title":"Microsoft says some users can't install Office on Windows 365 devices","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-says-some-users-cant-install-office-on-windows-365-devices/","time":"11:53","priority":"MAY READ","score":65,"group":null,"groupColor":null,"tldr":"Microsoft is developing a fix for a service update configuration error that blocks Office installation on Windows 365 devices, with deployment expected by Friday. Until resolved, affected users can manually download the software suite from the Microsoft 365 website.","briefOverview":"\u003cp\u003eMicrosoft has identified a configuration error introduced by a recent service update that prevents Office installation on Windows 365 devices. The issue, tracked under alert WP1309017 and acknowledged on May 12, potentially impacts any enterprise or business user attempting to download the software suite. Microsoft is currently developing a corrective patch and plans to deploy it to affected environments by Friday. While the company has classified the incident as an advisory suggesting limited scope, the configuration change blocks standard installation methods. Until the official fix is validated and rolled out, affected users can manually download Office directly from the Microsoft 365 website. This incident follows similar disruptions earlier this year, when a January security update caused Remote Desktop connection failures for Windows 365 and Azure Virtual Desktop customers. Microsoft previously resolved that issue by releasing emergency out-of-band updates across multiple Windows platforms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has confirmed that a recent service update introduced a configuration change that disrupts the downloading and installation of Office on Windows 365 devices. This service disruption is formally tracked under the alert identifier WP1309017 and was first acknowledged by the company on Tuesday, May 12. Windows 365 operates as a cloud-based streaming service built on Azure Virtual Desktop for enterprise and business subscribers. According to Microsoft\u0026rsquo;s service alert, the problematic configuration update may affect any user attempting to install the Office suite on their cloud PC. The company is actively developing a fix to restore the correct configuration and has scheduled the deployment for Friday. Microsoft noted that validating and deploying the patch will require additional time, during which they will closely monitor progress. Although the issue potentially impacts a broad range of users, Microsoft has tagged the incident as an advisory, a classification typically reserved for issues with limited scope or impact. In the interim, administrators and end users can bypass the block by manually downloading the software from the official Microsoft 365 download page. This configuration error follows a similar incident earlier this year when the KB5074109 Windows security update caused connection failures for Remote Desktop sessions to Azure Virtual Desktop and Windows 365. That earlier disruption affected Windows 10, Windows 11, and Windows Server customers and was resolved shortly after Microsoft released multiple emergency out-of-band updates. The article also references related Microsoft updates that have previously caused backup software failures and incorrect Remote Desktop warning displays.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has publicly acknowledged a service disruption preventing Office installation on Windows 365 devices. The issue stems from a configuration change introduced in a recent service update. This disruption is formally tracked under the service alert identifier WP1309017 and was initially reported on Tuesday, May 12.\u003c/p\u003e\n\n\u003ch3 id=\"root-cause-and-impact-scope\"\u003eRoot Cause and Impact Scope\u003c/h3\u003e\n\n\u003cp\u003eWindows 365 functions as a cloud-based streaming service hosted on Azure Virtual Desktop for enterprise and business subscribers. Microsoft\u0026rsquo;s service alert indicates that the problematic configuration update may potentially impact any Windows 365 user attempting to download or install the Office suite. Despite the broad potential impact, Microsoft has classified the incident as an advisory. This classification typically signals that the company expects the issue to have a limited scope or minimal operational impact.\u003c/p\u003e\n\n\u003ch3 id=\"resolution-timeline-and-interim-workaround\"\u003eResolution Timeline and Interim Workaround\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft is currently developing a corrective patch to restore the affected configuration. The company anticipates deploying the fix to impacted environments by Friday. Officials stated that validating and rolling out the update will require additional time, during which Microsoft will closely monitor deployment progress. Until the official fix is fully deployed, affected users can manually download the Office software suite directly from the Microsoft 365 website.\u003c/p\u003e\n\n\u003ch3 id=\"historical-context-and-related-microsoft-updates\"\u003eHistorical Context and Related Microsoft Updates\u003c/h3\u003e\n\n\u003cp\u003eThis configuration error follows a similar disruption earlier this year. In January, Microsoft confirmed that the KB5074109 Windows security update caused connection failures during Remote Desktop sessions to Azure Virtual Desktop and Windows 365. That issue affected Windows 10, Windows 11, and Windows Server customers and was resolved when Microsoft released multiple emergency out-of-band updates. The article also references other recent Microsoft updates that have caused backup software failures and incorrect Remote Desktop warning displays.\u003c/p\u003e\n\n\u003ch3 id=\"key-technical-details\"\u003eKey Technical Details\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAlert Identifier:\u003c/strong\u003e WP1309017\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAcknowledged Date:\u003c/strong\u003e Tuesday, May 12\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePlatform:\u003c/strong\u003e Windows 365 (Azure Virtual Desktop)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAffected Component:\u003c/strong\u003e Office installation and download processes\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorkaround:\u003c/strong\u003e Manual download via Microsoft 365 website\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHistorical Precedent:\u003c/strong\u003e January KB5074109 update caused RDP failures, resolved via out-of-band patches\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft identified that a recent service update introduced a configuration change preventing Office downloads and installations on Windows 365 devices.","The company is actively developing a fix and plans to deploy it to affected environments by Friday.","While the issue potentially impacts any Windows 365 user attempting to install Office, Microsoft has classified the incident as an advisory with limited scope.","Affected users can temporarily resolve the installation problem by manually downloading the software suite directly from the Microsoft 365 website."],"insights":["Microsoft has classified this ongoing incident as an advisory, implying limited scope, even though the configuration error potentially impacts any Windows 365 user attempting to install Office.","Affected users can bypass the service update block by manually downloading the software suite from the Microsoft 365 website instead of waiting for the scheduled Friday deployment.","This configuration error follows a January security update that similarly disrupted Azure Virtual Desktop connectivity, highlighting a pattern of recent service updates causing significant cloud PC disruptions."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has identified a configuration error introduced by a recent service update that prevents Office installation on Windows 365 devices. The issue, tracked under alert WP1309017 and acknowledged on May 12, potentially impacts any enterprise or business user attempting to download the software suite. Microsoft is currently developing a corrective patch and plans to deploy it to affected environments by Friday. While the company has classified the incident as an advisory suggesting limited scope, the configuration change blocks standard installation methods. Until the official fix is validated and rolled out, affected users can manually download Office directly from the Microsoft 365 website. This incident follows similar disruptions earlier this year, when a January security update caused Remote Desktop connection failures for Windows 365 and Azure Virtual Desktop customers. Microsoft previously resolved that issue by releasing emergency out-of-band updates across multiple Windows platforms.\u003c/p\u003e\n"},{"n":6,"title":"Foxconn confirms cyberattack claimed by Nitrogen ransomware gang","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/electronics-giant-foxconn-confirms-cyberattack-on-north-american-factories/","time":"12:49","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSyn // Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";

    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;

    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
