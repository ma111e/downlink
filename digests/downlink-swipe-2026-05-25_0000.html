<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--accept); border-color: var(--accept); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--cyan);   border-color: var(--cyan); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

window.__DL_ARTICLES = [{"n":3,"title":"25th May – Threat Intelligence Report","source":"research.checkpoint.com","sourceColor":"#38bdf8","link":"https://research.checkpoint.com/2026/25th-may-threat-intelligence-report/","time":"15:08","priority":"MUST READ","score":96,"group":"J","groupColor":"#34d399","tldr":"Multiple high-profile breaches and a critical actively exploited Drupal vulnerability highlight the week, while AI-driven attacks have moved from experimental to routine criminal use, including automated government compromises and phishing that evades AI email filters.","briefOverview":"\u003cp\u003eThe week of May 25th was marked by multiple high-profile breaches and the increasing weaponization of AI in cyberattacks. 7-Eleven confirmed unauthorized access to franchisee documents, with ShinyHunters claiming theft of 600,000 Salesforce records, while GitHub lost approximately 3,800 internal repositories after attackers compromised an employee device via a malicious Visual Studio Code extension. Grafana Labs also disclosed a breach from a compromised GitHub token, though no customer data was exposed.\u003c/p\u003e\n\n\u003cp\u003eAI-driven threats have entered routine criminal use: Check Point Research highlighted a campaign where a single operator used commercial AI to compromise nine Mexican government agencies and execute over 5,000 automated commands. The FBI warned about Kali365, a phishing-as-a-service kit that leverages device-code phishing to capture Microsoft 365 OAuth tokens and bypass MFA. A critical actively exploited Drupal SQL injection flaw (CVE-2026-9082) and a supply chain attack on Laravel Lang packages delivering a credential stealer round out a week of escalating threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe week’s top attacks and breaches include 7-Eleven, which confirmed unauthorized access to systems used for franchisee documents, with the ShinyHunters group claiming responsibility and stating it stole over 600,000 Salesforce records containing personal and corporate information. GitHub suffered a breach after attackers weaponized a Visual Studio Code extension to compromise an employee device, exfiltrating an estimated 3,800 internal repositories; the company found no impact on customer-facing systems. Grafana Labs disclosed a breach where a compromised GitHub token allowed intruders to access parts of its source code, but no customer data was exposed and no ransom was paid.\u003c/p\u003e\n\n\u003cp\u003eThe criminal application of AI has moved from experimental to routine, as shown in Check Point Research’s March-April 2026 AI Threat Landscape digest. The report cites a campaign using commercial AI to penetrate nine Mexican government agencies and execute over 5,000 automated commands, while also noting malicious configuration files, commercial toolkits, and stolen API keys. Separately, phishing campaigns were observed embedding invisible text via zero-size fonts or background-matched colors to inject attacker instructions into AI email scanners, tricking the filters while presenting benign content to recipients.\u003c/p\u003e\n\n\u003cp\u003eAn AI-driven influence and fraud operation was uncovered behind a MAGA-themed Telegram channel with 17,000 subscribers. The Russian-speaking operator bypassed Google Gemini safeguards to automate propaganda and credential theft, used stolen API keys, cracked WordPress accounts, and drained a cryptocurrency wallet. Meanwhile, the FBI issued a warning about Kali365, a phishing-as-a-service kit distributed mainly over Telegram. The kit employs device-code phishing to capture OAuth access and refresh tokens—providing persistent access to Outlook, Teams, and OneDrive while circumventing multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eVulnerability and patch activity was brisk. Microsoft released fixes for two actively exploited Windows Defender flaws (CVE-2026-41091 and CVE-2026-45498) affecting the Malware Protection Engine and Defender Antimalware Platform. Trend Micro patched CVE-2026-34926, a directory traversal in Apex One on-premises servers that could allow malicious code push to endpoints. Most critically, Drupal rushed emergency patches for CVE-2026-9082, a SQL injection vulnerability under active attack on PostgreSQL-backed sites. Check Point IPS provides protection against this Drupal threat.\u003c/p\u003e\n\n\u003cp\u003eThreat intelligence reports highlighted geopolitical and supply chain risks. Nimbus Manticore, an IRGC-linked group, resurfaced during Operation Epic Fury using SEO poisoning and career-themed phishing to deliver a new MiniFast backdoor across the US, Europe, and the Middle East. Researchers also reported a 124% surge in hacktivism and ransomware in Germany, Austria, and Switzerland, with major groups like Akira, Qilin, and Safepay leading attacks. A new modular Linux malware family named Showboat, attributed to Chinese threat actors, was used against international telecom providers. A Laravel Lang supply chain attack compromised hundreds of package versions to deploy a credential stealer targeting cloud keys, developer tokens, and browser passwords. Finally, over 1,350 C2 servers were identified in Middle Eastern telecom networks, linked to Phorpiex, Eagle Werewolf, and RondoDox activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview\"\u003eOverview\u003c/h3\u003e\n\n\u003cp\u003eThe Check Point Threat Intelligence Report for the week of May 25th, 2026, details a landscape marked by major data breaches, the commoditization of AI-driven attacks, critical vulnerability exploitation, and a surge in geopolitical cyber operations. The report covers incidents affecting global brands, open-source platforms, government agencies, and telecommunications providers, while also providing actionable defenses from Check Point products.\u003c/p\u003e\n\n\u003ch3 id=\"top-attacks-and-breaches\"\u003eTop Attacks and Breaches\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e7-Eleven\u003c/strong\u003e: The convenience store chain confirmed unauthorized access to systems holding franchisee documents. The ShinyHunters group claimed responsibility, stating it stole more than 600,000 Salesforce records containing personal and corporate information. Affected individuals were offered identity protection services.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub\u003c/strong\u003e: Attackers weaponized a malicious Visual Studio Code extension to compromise an employee device, leading to the exfiltration of an estimated 3,800 internal repositories. No impact on customer-facing systems was found.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGrafana Labs\u003c/strong\u003e: A compromised GitHub token allowed intruders to access parts of Grafana’s source code. The company refused to pay a ransom and reported no customer data exposure or service disruption.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKali365 Phishing-as-a-Service\u003c/strong\u003e: The FBI warns of this kit, distributed primarily through Telegram. It uses device-code phishing to capture OAuth access and refresh tokens, allowing persistent access to Microsoft 365 services (Outlook, Teams, OneDrive) while bypassing multi-factor authentication.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-threats\"\u003eAI Threats\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAI-Driven Attacks Become Routine Criminal Tools\u003c/strong\u003e: Check Point Research’s March-April 2026 AI Threat Landscape digest showed that commercial AI is now used in regular criminal operations. One single operator compromised nine Mexican government agencies and executed over 5,000 automated commands. Malicious configuration files override safety controls, stolen API keys are abused, and toolkits are commercialized.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInvisible Text Prompt Injection\u003c/strong\u003e: Phishing campaigns were observed embedding invisible text (zero-size fonts or background-matched colors) in emails. This hidden content contains instructions for AI-powered email filters, while the visible content appears benign to recipients, effectively evading automated detection.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMAGA-Themed Influence and Fraud Campaign\u003c/strong\u003e: A Russian-speaking actor operates a Telegram channel with 17,000 subscribers, bypassing Google Gemini safeguards to automate propaganda and credential theft. Stolen API keys, cracked WordPress accounts, and a drained crypto wallet were part of the operation uncovered by Trend Micro.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and Patches\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Windows Defender Zero-Days\u003c/strong\u003e: Two actively exploited flaws were fixed—CVE-2026-41091 (local privilege escalation) and CVE-2026-45498 (denial of service). Updated components are delivered automatically through standard Defender updates.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTrend Micro Apex One (CVE-2026-34926)\u003c/strong\u003e: A directory traversal vulnerability in on-premises servers allows administrators to push malicious code to endpoints. Exploitation was observed against Windows systems.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDrupal SQL Injection (CVE-2026-9082)\u003c/strong\u003e: Emergency patches were released for a critical flaw affecting sites using PostgreSQL. Active attacks began shortly after disclosure. Check Point IPS provides protection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"threat-intelligence-reports\"\u003eThreat Intelligence Reports\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNimbus Manticore (IRGC-linked)\u003c/strong\u003e: Resurfaced during Operation Epic Fury with updated techniques, using SEO poisoning and career-themed phishing in the US, Europe, and Middle East to deliver a new MiniFast backdoor. Check Point Threat Emulation and Harmony Endpoint provide protection.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDACH Region Surge\u003c/strong\u003e: A 124% increase in hacktivism and ransomware activity was recorded in 2025 across Germany, Austria, and Switzerland. Germany bore the brunt of incidents, with Akira, Qilin, and Safepay among the leading ransomware groups.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShowboat Linux Malware\u003c/strong\u003e: A modular post-exploitation framework used against international telecom providers, attributed to China-aligned actors. Capabilities include hiding processes, file transfers, remote shells, and SOCKS5 proxying.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLaravel Lang Supply Chain Attack\u003c/strong\u003e: Attackers hijacked GitHub tags of Laravel localization packages via Composer to spread a cross-platform credential stealer targeting cloud keys, developer tokens, and browser passwords. Hundreds of package versions were affected.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMiddle Eastern Telecom Abuse\u003c/strong\u003e: Over 1,350 C2 servers were identified across 98 providers in the region, linked to Phorpiex, Eagle Werewolf espionage, a React Native CLI flaw exploitation, and the RondoDox botnet.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["7-Eleven confirmed a breach in which ShinyHunters claimed to have stolen over 600,000 Salesforce records containing personal and corporate information.","GitHub suffered a breach after attackers weaponized a Visual Studio Code extension to compromise an employee device and exfiltrate approximately 3,800 internal repositories.","The FBI warns about Kali365, a phishing-as-a-service kit that uses device-code phishing to capture OAuth tokens and bypass MFA on Microsoft 365.","Check Point Research's AI Threat Landscape digest shows AI-driven attacks have entered routine criminal use, citing a campaign where a single operator compromised nine Mexican government agencies and executed over 5,000 automated commands.","Drupal released emergency patches for a critical SQL injection flaw (CVE-2026-9082) that is actively exploited on sites using PostgreSQL."],"insights":["AI-driven attacks are now commoditized and used for routine criminal operations, as demonstrated by a campaign where a single operator used commercial AI to compromise nine Mexican government agencies and execute over 5,000 automated commands.","Attackers are evading AI-based email defenses by embedding invisible text with indirect prompt injections, using techniques like zero-size fonts or background-matched colors to manipulate security scanning systems.","Kali365 phishing-as-a-service uses device-code phishing to capture OAuth access and refresh tokens, enabling persistent access to Microsoft 365 services while bypassing multi-factor authentication.","The supply chain attack on Laravel Lang localization packages exploited GitHub tag rewriting to distribute a cross-platform credential stealer across hundreds of versions, demonstrating that even minor package ecosystems can be effective delivery vectors.","Hacktivism and ransomware surged by 124% in Germany, Austria, and Switzerland in 2025, with Germany bearing the majority of incidents, indicating an intensifying threat landscape driven by geopolitical motivations."],"referencedReports":[{"title":"Introducing Showboat: A New Malware Family Taunts Defenses and Targets International Telecom Firms","url":"https://www.lumen.com/blog/en-us/introducing-showboat-a-new-malware-family-taunts-defenses-and-targets-international-telecom-firms","publisher":"Lumen","context":"Researchers uncovered the Showboat Linux malware family used against international telecommunications providers, attributed to China-aligned threat actors."},{"title":"FBI Public Service Announcement: Kali365 Phishing-as-a-Service Kit","url":"https://www.ic3.gov/PSA/2026/PSA260521","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"The FBI warns about Kali365, a phishing-as-a-service kit distributed through Telegram that uses device-code phishing to capture OAuth tokens and bypass MFA on Microsoft 365."},{"title":"Attackers Hide Invisible Text in Phishing Emails to Trick AI Filters","url":"https://www.paubox.com/blog/attackers-hide-invisible-text-in-phishing-emails-to-trick-ai-filters","publisher":"Paubox","context":"Researchers identified phishing campaigns that embed invisible text via zero-size fonts or background-matched colors to manipulate AI-powered email security filters through indirect prompt injections."},{"title":"Inside the Influence and Fraud: Patriot Bait Campaign","url":"https://www.trendmicro.com/en_us/research/26/e/inside-the-influence-and-fraud-patriot-bait-campaign.html","publisher":"Trend Micro","context":"An AI-driven influence and fraud campaign operated by a Russian-speaking actor using a MAGA-themed Telegram channel, exploiting stolen API keys and cracked WordPress accounts, and bypassing Gemini safeguards."}],"body":"\u003cp\u003eThe week of May 25th was marked by multiple high-profile breaches and the increasing weaponization of AI in cyberattacks. 7-Eleven confirmed unauthorized access to franchisee documents, with ShinyHunters claiming theft of 600,000 Salesforce records, while GitHub lost approximately 3,800 internal repositories after attackers compromised an employee device via a malicious Visual Studio Code extension. Grafana Labs also disclosed a breach from a compromised GitHub token, though no customer data was exposed.\u003c/p\u003e\n\n\u003cp\u003eAI-driven threats have entered routine criminal use: Check Point Research highlighted a campaign where a single operator used commercial AI to compromise nine Mexican government agencies and execute over 5,000 automated commands. The FBI warned about Kali365, a phishing-as-a-service kit that leverages device-code phishing to capture Microsoft 365 OAuth tokens and bypass MFA. A critical actively exploited Drupal SQL injection flaw (CVE-2026-9082) and a supply chain attack on Laravel Lang packages delivering a credential stealer round out a week of escalating threats.\u003c/p\u003e\n"},{"n":1,"title":"FBI warns of Kali365 phishing service targeting Microsoft 365 accounts","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/fbi-warns-of-kali365-phishing-service-targeting-microsoft-365-accounts/","time":"12:45","priority":"MUST READ","score":95,"group":"J","groupColor":"#34d399","tldr":"The FBI warns that the Kali365 phishing-as-a-service platform abuses OAuth device code authentication to hijack Microsoft 365 accounts and bypass MFA, urging organizations to restrict these flows immediately.","briefOverview":"\u003cp\u003eThe FBI has issued a warning about Kali365, a phishing-as-a-service platform that abuses OAuth device code authentication to hijack Microsoft 365 accounts and bypass multi-factor authentication. Instead of stealing credentials or MFA codes, attackers trick victims into entering a legitimate device code at Microsoft\u0026rsquo;s login portal, then capture the session token that grants full account access.\u003c/p\u003e\n\n\u003cp\u003eThe platform lowers the barrier for low-skilled attackers by offering AI-generated lures, real-time dashboards, and automated token capture, and it operates as a structured criminal business with admins, resellers, and affiliates. The FBI urges organizations to restrict device code authentication flows and audit their usage to defend against this growing threat.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FBI is warning about the Kali365 phishing-as-a-service (PhaaS) platform, which targets Microsoft 365 accounts by exploiting the OAuth 2.0 device authorization grant flow. Kali365 first appeared in April 2026 and is distributed via Telegram channels, giving cybercriminals a way to compromise accounts without stealing passwords or intercepting MFA codes. The platform uses device code phishing, a technique that abuses Microsoft\u0026rsquo;s legitimate device login portal (microsoft.com/devicelogin), designed for devices with limited input capabilities to authenticate via a short code.\u003c/p\u003e\n\n\u003cp\u003eIn a device code phishing attack, the threat actor initiates the device authorization process to generate a code, then lures the victim into entering that code on the genuine Microsoft login page through phishing or social engineering. Once the victim enters the code and completes the MFA challenge, Microsoft issues an OAuth access token to the attacker, granting full access without requiring the attacker to solve any MFA challenges. This token then provides access to all single-sign-on applications, including Microsoft 365 and Salesforce, enabling data theft.\u003c/p\u003e\n\n\u003cp\u003eKali365 is designed to be accessible to low-skilled attackers, providing AI-generated phishing lures, automated campaign templates, real-time victim-tracking dashboards, and automated token-capture functionality. Arctic Wolf researchers discovered that Kali365 operates as a professional business, with admins managing product development, resellers promoting the service, and affiliates conducting the actual phishing attacks. The platform offers two attack modes: device code phishing and an adversary-in-the-middle mode called “Cookie Link,” which proxies victims through attacker-controlled infrastructure to capture authenticated browser sessions and tokens after the victim logs in and completes MFA.\u003c/p\u003e\n\n\u003cp\u003eArctic Wolf observed a widespread campaign in April 2026 where phishing emails directed victims to the device code login portal. Compromised accounts gave attackers access to mailboxes, where they created hidden inbox rules to mask their activity, and in some cases registered new devices in victims\u0026rsquo; environments to prolong access. The attacks were not limited to a single region but targeted organizations worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe FBI\u0026rsquo;s public service announcement recommends that organizations restrict or completely block device code authentication flows using Conditional Access policies where possible, audit existing device code usage, and block authentication transfer policies that allow sessions to move between devices. The agency also urges affected entities to report incidents to the Internet Crime Complaint Center and retain phishing emails, suspicious login information, and unauthorized device registrations. The article notes that device code phishing has seen widespread adoption in 2026, with platforms like EvilTokens and Tycoon2FA also using the technique to compromise Microsoft 365 and Entra accounts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe FBI has issued a public service announcement (PSA 260521) warning about the Kali365 phishing-as-a-service platform, which is used to hijack Microsoft 365 accounts by abusing OAuth device code authentication. This method allows attackers to steal session tokens and bypass multi-factor authentication (MFA), giving them full access to victims\u0026rsquo; cloud environments without ever obtaining passwords or MFA codes.\u003c/p\u003e\n\n\u003cp\u003eKali365 first emerged in April 2026 and is distributed through Telegram channels, making sophisticated phishing campaigns accessible even to low-skilled cybercriminals. The platform represents a significant evolution in phishing-as-a-service, combining AI-generated lures, automated templates, real-time dashboards, and token-capture capabilities.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism-device-code-phishing\"\u003eTechnical Mechanism: Device Code Phishing\u003c/h2\u003e\n\n\u003cp\u003eDevice code phishing exploits the legitimate OAuth 2.0 Device Authorization grant flow, which Microsoft created for devices with limited input capabilities (smart TVs, conference room systems, printers, IoT devices). The flow works as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe device generates a short code and displays it to the user.\u003c/li\u003e\n\u003cli\u003eThe user visits \u003ccode\u003emicrosoft.com/devicelogin\u003c/code\u003e on another device, enters the code, and authenticates.\u003c/li\u003e\n\u003cli\u003eAfter successful authentication, the original device receives an access token.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAttackers abuse this flow by initiating the device authorization process themselves to generate a code. They then trick the victim into entering that code on Microsoft\u0026rsquo;s legitimate login page via phishing emails or social engineering. Because the portal is genuine and uses a valid Microsoft URL, traditional phishing detection based on domain reputation fails.\u003c/p\u003e\n\n\u003cp\u003eWhen the victim enters the code and completes any MFA challenge, Microsoft issues an OAuth access token to the attacker\u0026rsquo;s device. This token grants the attacker full access to all single-sign-on applications the victim normally uses — such as Microsoft 365, Salesforce, or other SaaS platforms — without the attacker ever needing to solve an MFA prompt. The entire process occurs on legitimate infrastructure, making it extremely difficult to block without restricting the underlying authentication flow itself.\u003c/p\u003e\n\n\u003ch2 id=\"kali365-phishing-as-a-service-platform\"\u003eKali365 Phishing-as-a-Service Platform\u003c/h2\u003e\n\n\u003cp\u003eKali365 is designed as a turnkey criminal service with a formal business structure. Arctic Wolf researchers identified three tiers of participants:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAdmins:\u003c/strong\u003e Manage product development and platform operations.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResellers:\u003c/strong\u003e Promote the service to other threat actors.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAffiliates:\u003c/strong\u003e Conduct the actual phishing attacks using the platform.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe platform offers two distinct attack modes:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eDevice Code Phishing:\u003c/strong\u003e The primary method described above, where victims are directed to Microsoft\u0026rsquo;s device login portal.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdversary-in-the-Middle (AitM) – “Cookie Link”:\u003c/strong\u003e This mode proxies victims through attacker-controlled infrastructure that captures authenticated browser sessions, session cookies, and tokens after the target logs in and solves any MFA challenges.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eAdditional capabilities provided to attackers include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI-generated phishing lures.\u003c/li\u003e\n\u003cli\u003eAutomated campaign templates.\u003c/li\u003e\n\u003cli\u003eReal-time victim-tracking dashboards.\u003c/li\u003e\n\u003cli\u003eToken-capture functionality.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"observed-attack-campaigns\"\u003eObserved Attack Campaigns\u003c/h2\u003e\n\n\u003cp\u003eIn April 2026, Arctic Wolf reported on a widespread Kali365 campaign targeting organizations worldwide. The attacks began with phishing emails that directed victims to the Microsoft device code login portal (\u003ccode\u003emicrosoft.com/devicelogin\u003c/code\u003e). Once victims unknowingly authorized the attacker\u0026rsquo;s device, threat actors gained full inbox access.\u003c/p\u003e\n\n\u003cp\u003ePost-compromise activities included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreation of malicious inbox rules designed to hide attacker activity from the victim.\u003c/li\u003e\n\u003cli\u003eRegistration of new devices in victims\u0026rsquo; Microsoft environments, further extending persistent access to the breached network.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that extortion gangs, including the ShinyHunters cybercrime group, were previously observed targeting Microsoft Entra accounts using device code phishing combined with voice phishing (vishing), indicating that this technique is used by multiple threat actors.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-measures\"\u003eRecommended Defensive Measures\u003c/h2\u003e\n\n\u003cp\u003eThe FBI recommends the following actions to defend against device code phishing attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestrict or completely block device code authentication flows using Conditional Access policies wherever possible.\u003c/li\u003e\n\u003cli\u003eAudit existing device code usage to identify any legitimate dependencies.\u003c/li\u003e\n\u003cli\u003eBlock authentication transfer policies that allow authentication sessions to move between devices.\u003c/li\u003e\n\u003cli\u003eImpeded organizations should report incidents to the Internet Crime Complaint Center (IC3) and preserve phishing emails, suspicious login information, and records of unauthorized device registrations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"wider-adoption-of-device-code-phishing\"\u003eWider Adoption of Device Code Phishing\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights that device code phishing is not unique to Kali365 and has seen widespread adoption in 2026. Other phishing-as-a-service platforms now employing the same technique include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEvilTokens PhaaS\u003c/strong\u003e – Also targeting Microsoft 365 and Entra accounts through device code phishing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTycoon2FA\u003c/strong\u003e – Hijacking Microsoft 365 accounts via the same device code abuse method.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis trend underscores that the device code authentication flow has become a favored attack vector across the cybercriminal ecosystem, making the FBI\u0026rsquo;s recommendations especially urgent for organizations relying on Microsoft 365 and Entra ID.\u003c/p\u003e\n","keyPoints":["The FBI warns that the Kali365 phishing-as-a-service platform uses OAuth device code phishing to hijack Microsoft 365 accounts and bypass multi-factor authentication.","Attackers trick victims into entering a legitimate device code at Microsoft's portal, then capture the resulting OAuth access token to gain full account access.","Kali365 provides low-skilled attackers with AI-generated lures, real-time dashboards, and automated token capture, lowering the barrier to sophisticated phishing campaigns.","Arctic Wolf researchers found that Kali365 operates as a criminal business with admins, resellers, and affiliates, offering both device code phishing and an adversary-in-the-middle attack mode.","The FBI recommends blocking or restricting device code authentication flows, auditing device code usage, and reporting incidents to defend against these attacks."],"insights":["Because victims are directed to Microsoft's legitimate device code login portal, traditional anti-phishing training that relies on spotting fake domains is ineffective against this attack.","Kali365 operates with a structured business hierarchy of admins, resellers, and affiliates, showing that phishing-as-a-service has matured into a professional, scalable criminal enterprise.","The platform offers both device code phishing and an adversary-in-the-middle 'Cookie Link' mode, giving attackers flexibility to pivot techniques if one method is blocked.","Post-compromise actions such as creating hidden inbox rules and registering unauthorized devices provide specific detection opportunities that defenders can monitor to identify intrusions."],"referencedReports":[{"title":"FBI PSA 260521","url":"https://www.ic3.gov/PSA/2026/PSA260521","publisher":"FBI","context":"The article states that the FBI issued a public service announcement warning about the Kali365 phishing-as-a-service platform."},{"title":"Token Bingo: Don't Let Your Code Be the Winner!","url":"https://arcticwolf.com/resources/blog/token-bingo-dont-let-your-code-be-the-winner/","publisher":"Arctic Wolf","context":"Security researchers at Arctic Wolf reported on Kali365 activity after observing a widespread campaign targeting organizations worldwide."}],"body":"\u003cp\u003eThe FBI has issued a warning about Kali365, a phishing-as-a-service platform that abuses OAuth device code authentication to hijack Microsoft 365 accounts and bypass multi-factor authentication. Instead of stealing credentials or MFA codes, attackers trick victims into entering a legitimate device code at Microsoft\u0026rsquo;s login portal, then capture the session token that grants full account access.\u003c/p\u003e\n\n\u003cp\u003eThe platform lowers the barrier for low-skilled attackers by offering AI-generated lures, real-time dashboards, and automated token capture, and it operates as a structured criminal business with admins, resellers, and affiliates. The FBI urges organizations to restrict device code authentication flows and audit their usage to defend against this growing threat.\u003c/p\u003e\n"},{"n":6,"title":"Ghost CMS CVE-2026-26980 Exploited to Hijack 700+ Sites for ClickFix Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/ghost-cms-cve-2026-26980-exploited-to.html","time":"12:02","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical Ghost CMS SQL injection flaw (CVE-2026-26980) was exploited to seize admin API keys and silently inject malicious JavaScript into over 700 legitimate sites, fueling large-scale ClickFix attacks that trick visitors into running malware.","briefOverview":"\u003cp\u003eAttackers are exploiting a critical SQL injection vulnerability (CVE-2026-26980, CVSS 9.4) in Ghost CMS to steal admin API keys and silently inject malicious JavaScript into more than 700 legitimate websites. The campaign, first spotted on May 7, 2026, weaponizes the flaw to poison site content and fuel fake CAPTCHA-based ClickFix attacks, leveraging the compromised sites\u0026rsquo; trusted reputations across sectors like universities, blockchain, AI, and security research.\u003c/p\u003e\n\n\u003cp\u003eThe injected JavaScript acts as a two-stage loader that fetches a cloaked payload from an external domain using the commercial Adspect service, ensuring only real visitors receive the attack while scanners see benign content. Ultimately, victims who follow the fake CAPTCHA instructions run a dropper that installs a persistent remote-access trojan (a signed PuTTY or a modified Grape desktop client), giving attackers long-term control of the infected machines.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA large-scale website poisoning campaign is exploiting a recently disclosed Ghost CMS vulnerability to hijack sites and serve ClickFix malware. The flaw, CVE-2026-26980, is a SQL injection in the Content API with a CVSS score of 9.4 that allows unauthenticated attackers to read arbitrary database contents, including the admin API key. The vulnerability was discovered by Anthropic using Claude and patched in Ghost version 6.19.1 (February 2026). QiAnXin XLab, which reported the exploitation, states the campaign started on May 7, 2026, and involves at least two distinct threat clusters.\u003c/p\u003e\n\n\u003cp\u003eAttackers use the SQL injection to obtain the target site\u0026rsquo;s admin API key without authorization, then leverage the Ghost Admin API to bulk-modify articles. They inject a two-stage JavaScript loader at the bottom of pages. This loader contacts an external domain, \u0026ldquo;clo4shara[.]xyz/11z77u3.php\u0026rdquo;, which hosts a traffic distribution script powered by Adspect, a commercial cloaking service. The script collects browser fingerprints and uses 19 different commands to selectively redirect, pop up, or download payloads—only real victims receive the malicious content, while crawlers see a benign page.\u003c/p\u003e\n\n\u003cp\u003eVisitors to compromised pages encounter a fake CAPTCHA verification challenge embedded in an iframe. If they follow the instructions, they are instructed to copy and paste a Base64-encoded command into the Windows Run dialog. This command acts as a dropper: it unpacks a ZIP archive, runs a batch script that downloads a DLL or JavaScript payload, and executes it via rundll32.exe while opening a decoy webpage. Early iterations used a valid code-signed PuTTY executable as the final payload; later versions switched to a modified open-source Grape desktop client packaged with an Inno Setup installer.\u003c/p\u003e\n\n\u003cp\u003eThe Grape-based backdoor achieves persistence and contacts \u0026ldquo;web-telegram[.]ug\u0026rdquo; every 30 seconds to fetch attacker commands, enabling remote execution of arbitrary JavaScript or binaries. Over 700 sites have been compromised, including those of universities, blockchain platforms, AI firms, SaaS providers, security researchers, media outlets, and fintech companies. Using legitimate, trusted websites dramatically increases the success rate of the ClickFix attacks.\u003c/p\u003e\n\n\u003cp\u003eGhost CMS administrators are urged to upgrade to the latest version, rotate all credentials, purge injected content, audit access logs for suspicious activity, and warn users who may have visited the site during the contamination window. The incident underscores how a single vulnerability in a widely used CMS can enable a stealthy, bulk-compromise operation that blends malicious code into authentic content via legitimate API channels.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA critical SQL injection vulnerability in Ghost CMS (CVE-2026-26980) is being actively exploited in a large-scale website poisoning campaign. Attackers steal the admin API key from vulnerable instances, then abuse the Ghost Admin API to inject malicious JavaScript into articles, ultimately delivering ClickFix malware to site visitors. QiAnXin XLab first detected the activity on May 7, 2026, and reports that over 700 websites across multiple sectors have been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE ID:\u003c/strong\u003e CVE-2026-26980\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVSS Score:\u003c/strong\u003e 9.4 (Critical)\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFlaw Type:\u003c/strong\u003e SQL injection in Ghost\u0026rsquo;s Content API\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImpact:\u003c/strong\u003e Unauthenticated attackers can read arbitrary data from the database, including the admin API key\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDiscovery:\u003c/strong\u003e Anthropic found the flaw using Claude\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePatch:\u003c/strong\u003e Fixed in Ghost version 6.19.1 (February 2026)\u003cbr\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExploitation Severity:\u003c/strong\u003e Access to the admin API key enables direct modification of published articles via the Admin API\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"campaign-execution\"\u003eCampaign Execution\u003c/h2\u003e\n\n\u003ch3 id=\"initial-compromise\"\u003eInitial Compromise\u003c/h3\u003e\n\n\u003cp\u003eThreat actors exploit the SQL injection flaw to retrieve the site\u0026rsquo;s Admin API key without any authentication. With this key, they invoke the Ghost Admin API to batch-modify articles, inserting a malicious JavaScript loader at the bottom of each page.\u003c/p\u003e\n\n\u003ch3 id=\"injected-loader\"\u003eInjected Loader\u003c/h3\u003e\n\n\u003cp\u003eThe injected code is a two-stage loader that contacts the external domain \u003ccode\u003eclo4shara[.]xyz/11z77u3.php\u003c/code\u003e at runtime. This architecture allows attackers to swap out the final payload without altering the injected code across hundreds of infected sites.\u003c/p\u003e\n\n\u003ch3 id=\"cloaking-and-traffic-distribution\"\u003eCloaking and Traffic Distribution\u003c/h3\u003e\n\n\u003cp\u003eThe PHP script at the loader\u0026rsquo;s destination is a traffic distribution system powered by Adspect, a commercial ad-fraud cloaking service. It collects browser fingerprints and uploads them to the server, then issues one of 19 supported commands, such as redirection, popup generation, or file download. This ensures that only real, unsuspecting users are served the malicious payload, while security scanners and crawlers see only benign content.\u003c/p\u003e\n\n\u003ch2 id=\"clickfix-delivery-chain\"\u003eClickFix Delivery Chain\u003c/h2\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eFake CAPTCHA:\u003c/strong\u003e Victims on a compromised page see an iframe with a fake CAPTCHA verifying they are human.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRun Command:\u003c/strong\u003e The CAPTCHA instructs them to copy a Base64-encoded string and paste it into the Windows Run dialog.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDropper:\u003c/strong\u003e The command downloads and extracts a ZIP archive, runs a Windows batch script.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScript Actions:\u003c/strong\u003e The batch script executes PowerShell to download a DLL (or JavaScript) from a remote domain, launches it via \u003ccode\u003erundll32.exe\u003c/code\u003e, and opens a decoy webpage as distraction.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"final-payloads-and-persistence\"\u003eFinal Payloads and Persistence\u003c/h2\u003e\n\n\u003ch3 id=\"early-payload-signed-putty\"\u003eEarly Payload: Signed PuTTY\u003c/h3\u003e\n\n\u003cp\u003eWhen the dropper delivered a DLL, the ultimate payload was a legitimate, code-signed PuTTY client. While the exact role of the PuTTY binary is not detailed, its use of a valid signature aids evasion.\u003c/p\u003e\n\n\u003ch3 id=\"later-payload-modified-grape-desktop-client\"\u003eLater Payload: Modified Grape Desktop Client\u003c/h3\u003e\n\n\u003cp\u003eLater iterations replaced the DLL with a JavaScript payload. This results in an Inno Setup installer that deploys a trojanized version of the open-source Grape desktop client. The modified application:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAchieves persistence on the host.\u003c/li\u003e\n\u003cli\u003eContacts the remote server \u003ccode\u003eweb-telegram[.]ug\u003c/code\u003e every 30 seconds.\u003c/li\u003e\n\u003cli\u003eReceives and executes commands, including running arbitrary JavaScript code or launching executable files.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"infrastructure-and-attribution\"\u003eInfrastructure and Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLoader Domain:\u003c/strong\u003e \u003ccode\u003eclo4shara[.]xyz\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eC2 for Backdoor:\u003c/strong\u003e \u003ccode\u003eweb-telegram[.]ug\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloaking Service:\u003c/strong\u003e Adspect (commercial)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThreat Clusters:\u003c/strong\u003e At least two distinct groups are involved, with some sites compromised within a single day.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eScale:\u003c/strong\u003e Over 700 websites poisoned.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSectors Affected:\u003c/strong\u003e Universities, blockchain, AI, SaaS, security research, media, and financial technology.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEdge Given:\u003c/strong\u003e Because the sites are legitimate and trusted, visitors are more likely to fall for the fake CAPTCHA, increasing ClickFix success rates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommendations\"\u003eRecommendations\u003c/h2\u003e\n\n\u003cp\u003eGhost CMS operators should immediately:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpgrade to version 6.19.1 or later\u003c/li\u003e\n\u003cli\u003eRotate all admin API keys and other credentials\u003c/li\u003e\n\u003cli\u003eScan and clean articles for injected JavaScript\u003c/li\u003e\n\u003cli\u003eAudit access logs for unauthorized Admin API calls\u003c/li\u003e\n\u003cli\u003eNotify users who may have visited the site during the contamination period\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis campaign demonstrates how a single vulnerability in a widely used CMS can be weaponized to turn hundreds of trusted websites into malware distribution platforms, using legitimate API features to make detection and cleanup more difficult.\u003c/p\u003e\n","keyPoints":["A critical SQL injection vulnerability in Ghost CMS (CVE-2026-26980, CVSS 9.4) allows unauthenticated attackers to read arbitrary data, including the admin API key, enabling unauthorized site modification.","The threat actor exploited this flaw to gain admin API keys and bulk-inject malicious JavaScript loaders into articles on over 700 legitimate websites.","The injected JavaScript acts as a two-stage loader that retrieves a cloaked payload via the Adspect service from an external domain, evading scanners and delivering the attack only to real visitors.","Targeted visitors are shown a fake CAPTCHA as part of a ClickFix attack, ultimately dropping a Windows executable—either a signed PuTTY client or a modified Grape desktop client—that establishes persistence and remote control.","The compromised sites span universities, blockchain, AI, SaaS, security research, media, and fintech sectors, amplifying the attack's success by leveraging their trusted reputations."],"insights":["The SQL injection flaw directly exposed the admin API key, allowing attackers to modify sites via legitimate API calls, making the injected content indistinguishable from normal admin changes and bypassing typical integrity checks.","The attackers relied on a commercial cloaking service (Adspect) that provides 19 distinct commands for fine-grained remote browser control, enabling tailored attacks beyond simple redirection or malware delivery.","The campaign targeted security research websites along with other sectors, potentially undermining the credibility of those sites and tricking a more security-savvy audience, thereby amplifying the attack's effectiveness.","The payload evolved mid-campaign from a DLL dropper to a JavaScript-based loader, indicating active attacker monitoring and adaptation to evade detection or improve persistence."],"referencedReports":[{"title":"CVE-2026-26980: SQL Injection in Ghost Content API","url":"https://github.com/TryGhost/Ghost/security/advisories/GHSA-w52v-v783-gw97","publisher":"TryGhost","context":"The article references this GitHub Security Advisory as the disclosed critical SQL injection vulnerability in Ghost CMS (CVE-2026-26980) exploited in the campaign."},{"title":"CVE-2026-26980","url":"https://www.sentinelone.com/vulnerability-database/cve-2026-26980/","publisher":"SentinelOne","context":"The article links to SentinelOne's vulnerability database entry as a technical reference for details on the Ghost CMS SQL injection flaw."},{"title":"Ghost CMS Mass Compromised via CVE-2026-26980 Now Fueling ClickFix Attacks","url":"https://blog.xlab.qianxin.com/ghost-cms-mass-compromised-via-cve-2026-26980-now-fueling-clickfix-attacks/","publisher":"QiAnXin XLab","context":"The article cites XLab's technical analysis, which revealed the large-scale CMS poisoning campaign exploiting the Ghost vulnerability and detailed the two-stage loader and ClickFix payload delivery."}],"body":"\u003cp\u003eAttackers are exploiting a critical SQL injection vulnerability (CVE-2026-26980, CVSS 9.4) in Ghost CMS to steal admin API keys and silently inject malicious JavaScript into more than 700 legitimate websites. The campaign, first spotted on May 7, 2026, weaponizes the flaw to poison site content and fuel fake CAPTCHA-based ClickFix attacks, leveraging the compromised sites\u0026rsquo; trusted reputations across sectors like universities, blockchain, AI, and security research.\u003c/p\u003e\n\n\u003cp\u003eThe injected JavaScript acts as a two-stage loader that fetches a cloaked payload from an external domain using the commercial Adspect service, ensuring only real visitors receive the attack while scanners see benign content. Ultimately, victims who follow the fake CAPTCHA instructions run a dropper that installs a persistent remote-access trojan (a signed PuTTY or a modified Grape desktop client), giving attackers long-term control of the infected machines.\u003c/p\u003e\n"},{"n":5,"title":"⚡ Weekly Recap: Linux Flaws, Defender 0-Days, Router Botnets, and Supply Chain Chaos","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/weekly-recap-linux-flaws-defender-0.html","time":"14:13","priority":"MUST READ","score":94,"group":"D","groupColor":"#f472b6","tldr":"Attackers are relentlessly exploiting old, unpatched vulnerabilities and supply chain blind spots, proving that neglecting basic patch management and developer tool security inevitably leads to widespread breaches.","briefOverview":"\u003cp\u003eA compromised VS Code extension (Nx Console) led to the breach of GitHub’s internal repositories, with about 3,800 repos exfiltrated by the TeamPCP group. This supply chain attack, linked to a prior TanStack compromise, highlights the cascading downstream risk from poisoned developer tools.\u003c/p\u003e\n\n\u003cp\u003eMeanwhile, multiple high-severity vulnerabilities are being actively exploited: a nine-year-old Linux kernel flaw allows local root command execution, two Microsoft Defender zero-days grant SYSTEM privileges or cause denial-of-service, and a Drupal Core SQL injection bug is under mass attack. Even security products themselves—like Cisco Secure Workload with a CVSS 10.0 flaw—required urgent patches.\u003c/p\u003e\n\n\u003cp\u003eVerizon’s 2026 DBIR reveals a landmark shift: for the first time in nearly two decades, vulnerability exploitation overtook compromised credentials as the top initial access vector for breaches. Organizations are patching slower (median time to remediate rose to 43 days), and only 26% of CISA KEV entries were fully remediated, even as ransomware remains involved in 48% of breaches.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe week was defined by a high‑profile supply chain breach at GitHub. Threat actor TeamPCP poisoned the Nx Console VS Code extension, compromising an employee device and exfiltrating roughly 3,800 internal repositories. The attack was an aftershock of the TanStack supply chain incident; affected parties also include OpenAI, Mistral AI, and Grafana Labs, with Grafana refusing an extortion demand. TeamPCP’s public release of the Shai-Hulud worm code now provides a blueprint for similar attacks against open-source and developer environments.\u003c/p\u003e\n\n\u003cp\u003eA series of critical vulnerabilities drew attention. A nine-year-old Linux kernel flaw (CVE-2026-46333) lets local users escalate to root on default Debian, Fedora, and Ubuntu installs. Microsoft disclosed two actively exploited Defender vulnerabilities—one for SYSTEM escalation, the other for denial‑of‑service—and a BitLocker bypass (YellowKey) requiring physical access. Drupal Core’s SQL injection bug (CVE-2026-9082) was hit with over 15,000 attack attempts within days of disclosure, while Cisco patched a CVSS 10.0 Secure Workload flaw allowing unauthenticated REST API access.\u003c/p\u003e\n\n\u003cp\u003eA bigger picture shift emerged from Verizon’s 2026 Data Breach Investigations Report: vulnerability exploitation overtook compromised credentials as the most common initial attack vector, accounting for 31% of breaches. Ransomware’s share rose to 48%, yet median ransom payments dropped to nearly $140,000. Alarmingly, only 26% of CISA Known Exploited Vulnerabilities were fully remediated in 2025, and the median time to patch grew to 43 days—up from 32 days the year prior.\u003c/p\u003e\n\n\u003cp\u003eBotnets continued to absorb unprotected devices. The RondoDox botnet added a 2018 ASUS router flaw, Void Botnet uses Ethereum smart contracts for seizure-resistant C2, and attackers are mass-exploiting a Four-Faith industrial router authentication bypass (CVE-2024-9643) to build bot herds. Meanwhile, fake Microsoft Teams sites spread ValleyRAT via a DLL sideloading chain abusing a legitimate Tencent executable, and a Chinese‑language PhaaS ecosystem now performs real‑time OTP interception and digital wallet provisioning to bypass MFA and monetize stolen cards instantly.\u003c/p\u003e\n\n\u003cp\u003eFresh campaigns targeted specific regions and sectors. Indian education institutions face weaponized student data for phishing and financial fraud. The Chinese educational sector saw Operation Dragon Whistle delivering Cobalt Strike through a spear‑phishing lure about mandatory fitness tests. Malaysian entities were hit by a targeted campaign using purpose‑built Python scripts hosted on attacker‑controlled Azure infrastructure. Two new Android NFC relay families—DevilNFC and NFCMultiPay—steal PINs and use kiosk‑mode lockdown to perform relay attacks against European and LATAM banking users.\u003c/p\u003e\n\n\u003cp\u003eLaw enforcement and industry moves offered some counterbalance. The Dutch FIOD arrested two individuals and seized 800 servers linked to the sanctioned Stark Industries hosting entity. CISA launched a public KEV nomination form to speed up identification of exploited vulnerabilities. Anthropic’s Project Glasswing found over 10,000 high‑severity bugs in systemically important software, but only 97 were patched upstream—highlighting a dangerous remediation gap. Proton Pass introduced AI access tokens with logging so users can let AI agents access credentials securely, and open‑source tools like Bumblebee and Claude‑BugHunter emerged to help developers scan for supply‑chain risks and security flaws.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis weekly recap covers a broad spectrum of cybersecurity incidents and trends. The most prominent story is a supply chain compromise that breached GitHub’s internal code repositories through a tainted VS Code extension. Beyond that, multiple critical vulnerabilities—some years old, some in security products themselves—are under active exploitation. At the same time, the threat landscape is shifting: vulnerability exploitation has overtaken credential theft as the primary initial access vector, botnets are adopting novel C2 mechanisms, and phishing services are bypassing multi‑factor authentication in real time. The article also highlights regulatory actions, new security tools, and persistent patching gaps.\u003c/p\u003e\n\n\u003ch2 id=\"major-incidents-and-vulnerabilities\"\u003eMajor Incidents and Vulnerabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub internal breach\u003c/strong\u003e: A poisoned version of the Nx Console VS Code extension (nrwl.angular-console) was used by the TeamPCP group to compromise a GitHub employee device, leading to the exfiltration of about 3,800 internal repositories. The extension was itself breached after a developer’s system was hacked as part of the TanStack supply chain attack. Other downstream victims include OpenAI, Mistral AI, and Grafana Labs; Grafana refused an extortion demand.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e9-year-old Linux kernel flaw (CVE-2026-46333)\u003c/strong\u003e: An improper privilege management bug introduced in November 2016 allows any local unprivileged user to disclose sensitive files and execute arbitrary commands as root on default installs of Debian, Fedora, and Ubuntu.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Defender zero-days\u003c/strong\u003e: Two actively exploited flaws—CVE-2026-41091 (SYSTEM privilege escalation) and CVE-2026-45498 (denial‑of‑service)—were disclosed. Their descriptions overlap with the previously released RedSun and UnDefend exploits from Chaotic Eclipse.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDrupal Core SQL injection (CVE-2026-9082)\u003c/strong\u003e: A critical flaw affecting all supported Drupal versions is under active attack. Imperva observed over 15,000 attack attempts targeting almost 6,000 sites across 65 countries within days of disclosure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCisco Secure Workload CVSS 10.0 (CVE-2026-20223)\u003c/strong\u003e: An unauthenticated, remote attacker could access sensitive data and make configuration changes across tenant boundaries with Site Admin privileges due to insufficient REST API validation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBitLocker bypass (CVE-2026-45585, dubbed YellowKey)\u003c/strong\u003e: A security feature bypass requiring physical access impacts multiple Windows 11 and Windows Server 2025 editions. Microsoft released mitigation after public disclosure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOther notable CVEs\u003c/strong\u003e: LiteSpeed cPanel plugin, Langflow, Trend Micro Apex One, SEPPMail, SGLang, cPanel, Amazon Redshift JDBC driver, MongoDB, ChromaDB (ChromaToast), Universal Robots PolyScope 5, ExifTool, Google Chrome, Apache OFBiz, UniFi OS, Open WebUI, F5 NGINX, Splunk, FreePBX, PostgreSQL, and Apache Flink—all received patches or advisories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"supply-chain-and-developer-ecosystem-threats\"\u003eSupply Chain and Developer Ecosystem Threats\u003c/h2\u003e\n\n\u003cp\u003eThe GitHub incident illustrates the long tail of the “Mini Shai-Hulud” campaign. TeamPCP’s public release of the Shai-Hulud worm code gives attackers a ready-made blueprint for creating worms that spread through open‑source repos and developer tools. The Nx Console extension compromise happened because a developer’s system was breached during the TanStack attack. The same campaign affected OpenAI, Mistral AI, and Grafana Labs (with extortion attempts). This chain reaction underscores the fragility of the software supply chain: a single poisoned dependency can cascade across multiple high-profile organizations.\u003c/p\u003e\n\n\u003ch2 id=\"trends-in-attack-vectors-and-malware\"\u003eTrends in Attack Vectors and Malware\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVulnerability exploitation overtakes credentials\u003c/strong\u003e: Verizon’s 2026 DBIR shows vulnerability exploitation jumped to 31% of breaches (from 20% in 2024), while credential abuse fell from 22% to 13%. Only 26% of CISA KEV entries were fully remediated in 2025; median time to resolve rose to 43 days. Organizations faced 50% more critical vulnerabilities to patch than the year before.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRansomware dynamics\u003c/strong\u003e: Ransomware accounted for 48% of breaches, yet the median ransom payment decreased to nearly \u003cspan class=\"math inline\"\u003e\\(140,000, down from \\)\u003c/span\u003e150,000. This might reflect more extortion attempts but lower willingness to pay, or changes in targeting.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNFC relay malware\u003c/strong\u003e: Two new Android families, DevilNFC and NFCMultiPay, target European and LATAM banking customers. DevilNFC uses an asymmetric architecture: the same APK functions as a passive reader on the victim’s device and a system‑level card emulator on a rooted attacker device, bypassing Android NFC API layers. It locks the victim in Kiosk Mode while the relay completes. Both families are likely developed with generative AI assistance. They are distributed via SMS/WhatsApp, using fake Google Play‑style landing pages.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eValleyRAT via fake Teams sites\u003c/strong\u003e: Attackers use fake Microsoft Teams distribution sites on X to trick users into downloading a ZIP that executes a DLL sideloading chain through a legitimate Tencent executable (GameBox.exe), deploying a ValleyRAT variant associated with the Silver Fox Chinese cybercrime group.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTAX#TRIDENT campaign\u003c/strong\u003e: Indian income‑tax themed lures deliver payloads through three paths: a signed ClientSetup installer, a VBScript downloader, and PHP‑looking web endpoints that return VBScript. The campaign deploys a signed ManageEngine UEMS agent for persistence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOperation Dragon Whistle\u003c/strong\u003e: Chinese education sector targeted via spear‑phishing with a lure about mandatory fitness tests that affect graduation eligibility. Delivers Cobalt Strike Beacon.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMalaysian targeted intrusions\u003c/strong\u003e: Attacker‑controlled Azure infrastructure hosts purpose‑built Python scripts, webshell deployment tools, a Laravel RCE exploit chain, and custom C2 source code, targeting multiple Malaysian organizations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"botnet-infrastructure-and-command-and-control\"\u003eBotnet Infrastructure and Command-and-Control\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRondoDox adds ASUS router flaw\u003c/strong\u003e: The botnet now exploits CVE-2018-5999, a 2018 ASUS infosvr flaw, by sending payloads that set (ateCommand_flag=1), enabling arbitrary configuration changes.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVoid Botnet and Ethereum C2\u003c/strong\u003e: This Rust‑based botnet writes commands to Ethereum smart contracts; infected machines poll public RPC endpoints to read them. The operator can also switch to a direct web panel C2 for sub‑30‑second command execution. The infrastructure is seizure‑resistant because it relies on the blockchain.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFour-Faith router mass exploitation\u003c/strong\u003e: CVE-2024-9643 (authentication bypass in F3x36 cellular routers) is being exploited at scale since mid‑May 2026 to turn devices into botnets. CrowdSec saw 139 attacking IPs and reclassified it as mass exploitation on May 12.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"phishing-and-social-engineering-campaigns\"\u003ePhishing and Social Engineering Campaigns\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eChinese‑language PhaaS ecosystem\u003c/strong\u003e: A dozen services now intercept OTPs in real time via live admin panels, bypassing MFA. They provision stolen card details into attacker‑controlled digital wallets instantly, enabling high‑value transactions and ATM withdrawals. Delivery channels include RCS and iMessage to bypass carrier SMS filters. The goal is no longer just account access but direct financial account control.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIndian student data weaponization\u003c/strong\u003e: Attackers abuse exposed student data to create convincing scams for admissions, scholarships, internships, fee payments, and academic services. Trusted educational branding and fraudulent portals are used to steal credentials and payments; some operations involve mule account networks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFake Microsoft Teams delivery\u003c/strong\u003e: The ValleyRAT campaign uses social media to push fake Teams installers, combining social engineering with staged payload delivery and stealthy persistence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"regulatory-and-law-enforcement-actions\"\u003eRegulatory and Law Enforcement Actions\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDutch FIOD arrests and server seizures\u003c/strong\u003e: Two men (57 and 39) were arrested in connection with Stark Industries, a web hosting company sanctioned by the EU in May 2025 for enabling cyberattacks and disinformation. After sanctions, the infrastructure moved to THE.Hosting/WorkTitans, which FIOD says acted as a cover. The older suspect was director/shareholder of that company; the younger suspect’s company connected the servers to the internet. 800 servers were seized.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTexas AG sues Meta over WhatsApp encryption\u003c/strong\u003e: The lawsuit claims WhatsApp does not provide true end‑to‑end encryption, citing reports that employees could access user communications and that message content can be viewed after sending. A U.S. Commerce Department preliminary finding suggested “no limit” to what Meta can view. Meta calls the allegations baseless.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCISA KEV nomination form\u003c/strong\u003e: CISA launched an online form for researchers, vendors, and partners to submit known exploited vulnerabilities directly, aiming to speed identification and sharing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ai-in-cybersecurity-opportunities-and-risks\"\u003eAI in Cybersecurity: Opportunities and Risks\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eProject Glasswing (Anthropic)\u003c/strong\u003e: Since going live, the AI‑powered initiative found over 10,000 high‑ or critical‑severity flaws, with 6,202 in critical open‑source projects. Of those, 1,726 were confirmed true positives and 1,094 were high/critical. Only 97 findings were patched upstream and 88 advisories issued—showing a severe remediation bottleneck.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProton Pass AI access tokens\u003c/strong\u003e: Proton introduced a secure sharing method letting users grant AI agents permission to access specific credentials with logging and expiring tokens, bridging password management and agentic AI.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAI‑assisted malware development\u003c/strong\u003e: The DevilNFC and NFCMultiPay NFC relay malware families are believed to have been developed with generative AI assistance, showing how local threat actors are now building their own tools instead of buying from Chinese‑language MaaS platforms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-initiatives-and-tools\"\u003eIndustry Initiatives and Tools\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBumblebee\u003c/strong\u003e: An open‑source scanner for macOS and Linux that safely audits metadata, manifests, and configs of local packages, browser extensions, text‑editor add‑ons, and AI tool configurations for known supply‑chain vulnerabilities.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClaude‑BugHunter\u003c/strong\u003e: An add‑on that configures Anthropic’s Claude Code CLI into a security assistant with pre‑built vulnerability patterns, attack techniques, and reporting templates for security testing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWebinars\u003c/strong\u003e: The article promoted two webinars—one on AI‑driven DDoS and cloud resilience, another on threat hunting beyond zero‑days focusing on identity flaws and living‑off‑the‑land techniques.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe week’s events reinforce that the gap between vulnerability discovery and exploitation continues to shrink. Attackers are exploiting years‑old bugs, supply chain weak points, and security products themselves. The shift toward vulnerability exploitation as the dominant initial access vector demands faster, more complete patching, yet organizations are falling behind. Meanwhile, botnets and phishing services are innovating with blockchain C2 and real‑time MFA bypass, while law enforcement steps up actions against enabling services. The overarching message: the basics of timely patching, developer tool security, and credential protection remain the most impactful defenses.\u003c/p\u003e\n","keyPoints":["GitHub's internal breach was caused by a poisoned Nx Console VS Code extension and resulted in the exfiltration of about 3,800 repositories.","A nine-year-old vulnerability in the Linux kernel (CVE-2026-46333) allows unprivileged local users to execute commands as root on default installations of Debian, Fedora, and Ubuntu.","Microsoft disclosed that two Defender vulnerabilities, one enabling SYSTEM privilege escalation and the other causing denial-of-service, are under active exploitation.","According to Verizon's 2026 Data Breach Investigations Report, vulnerability exploitation overtook compromised credentials as the most common initial access vector for data breaches for the first time in nearly two decades.","Ransomware accounted for 48% of breaches last year, but the median ransom payment declined to almost $140,000."],"insights":["For the first time in nearly two decades, vulnerability exploitation has overtaken compromised credentials as the most common initial access vector in data breaches, marking a fundamental shift in how attackers gain entry.","TeamPCP's public release of the Shai-Hulud supply chain worm code gives other attackers a ready-made blueprint for creating similar worms that target open-source repositories and development environments.","Despite the active exploitation of known vulnerabilities, only 26% of CISA KEV entries were fully remediated in 2025, and the median time to patch rose to 43 days, showing a dangerous decline in organizational patching performance.","AI-powered vulnerability discovery (Anthropic's Project Glasswing) found over 10,000 high- or critical-severity flaws in systemically important software in just one month, yet only 97 were patched upstream, highlighting a severe remediation bottleneck.","Chinese-language phishing-as-a-service platforms now intercept one-time passcodes in real time through live admin panels and immediately provision victims' payment cards into digital wallets, effectively bypassing multi-factor authentication and monetizing stolen data within seconds."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/T1f0/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"Vulnerability exploitation has overtaken compromised credentials for the first time in nearly two decades as the most common initial access vector for data breaches, per Verizon."},{"title":"Weaponization of Indian Student Data: An Ecosystem for Phishing, Social Engineering and Financial Fraud","url":"https://www.cyfirma.com/research/weaponization-of-indian-student-data-an-ecosystem-for-phishing-social-engineering-and-financial-fraud/","publisher":"CYFIRMA","context":"Threat actors are abusing student data within India's education ecosystem for phishing, impersonation, social engineering, and financially motivated fraud operations, CYFIRMA said."},{"title":"Fake Microsoft Teams Campaign Delivers ValleyRAT via NSIS Installer and DLL Sideloading","url":"https://labs.k7computing.com/index.php/fake-microsoft-teams-campaign-delivers-valleyrat-via-nsis-installer-and-dll-sideloading/","publisher":"K7 Labs","context":"Fake Microsoft Teams distribution sites shared on X are being used to trick users into downloading a trojanized installer that deploys ValleyRAT, K7 Labs said."},{"title":"Malaysian Government with Undisclosed C2 Infrastructure","url":"https://oasis-security.io/blog/malaysian-government-with-undisclosed-c2-infrastructure","publisher":"Oasis Security","context":"An attacker-controlled infrastructure hosted on Microsoft Azure in Malaysia West has been used to conduct a targeted intrusion campaign against multiple Malaysian organizations, per Oasis Security."},{"title":"Operation Dragon Whistle: UNG002 Targets Chinese Academia via Weaponized Institutional Lure","url":"https://www.seqrite.com/blog/operation-dragon-whistle-ung002-targets-chinese-academia-via-weaponized-institutional-lure/","publisher":"Seqrite Labs","context":"The Chinese educational sector has become the target of a new campaign conducted by UNG0002 as part of a spear-phishing campaign, Seqrite Labs said."},{"title":"Void Botnet uses Ethereum smart contracts for seizure-resistant C2","url":"https://qrator.net/blog/details/Void-Botnet-uses-Ethereum-smart-contracts-for-seizure-resistant-C2/","publisher":"Qrator Labs","context":"A new botnet malware called Void Botnet uses Ethereum smart contracts for seizure-resistant command-and-control, Qrator Labs said."},{"title":"NFC Relay Goes Local: How AI is Accelerating a New Wave of Independent Malware Developers","url":"https://www.cleafy.com/cleafy-labs/nfc-relay-goes-local-how-ai-is-accelerating-a-new-wave-of-independent-malware-developers","publisher":"Cleafy Labs","context":"Two new Android NFC relay malware families named DevilNFC and NFCMultiPay have been observed targeting European and LATAM banking customers, Cleafy said."},{"title":"TAX#TRIDENT: Indian Tax Lures","url":"https://www.securonix.com/blog/taxtrident-indian-fax-lures/","publisher":"Securonix","context":"A new campaign dubbed TAX#TRIDENT is using Indian Income Tax-themed lures to target Windows endpoints via three delivery paths, Securonix said."},{"title":"CVE-2024-9643: Four-Faith Router Authentication Bypass","url":"https://www.crowdsec.net/vulntracking-report/cve-2024-9643-four-faith-router-authentication-bypass","publisher":"CrowdSec","context":"Attackers are exploiting CVE-2024-9643, a critical authentication bypass flaw in Four-Faith F3x36 industrial cellular routers, as part of a large-scale campaign to turn compromised devices into botnets, CrowdSec said."}],"body":"\u003cp\u003eA compromised VS Code extension (Nx Console) led to the breach of GitHub’s internal repositories, with about 3,800 repos exfiltrated by the TeamPCP group. This supply chain attack, linked to a prior TanStack compromise, highlights the cascading downstream risk from poisoned developer tools.\u003c/p\u003e\n\n\u003cp\u003eMeanwhile, multiple high-severity vulnerabilities are being actively exploited: a nine-year-old Linux kernel flaw allows local root command execution, two Microsoft Defender zero-days grant SYSTEM privileges or cause denial-of-service, and a Drupal Core SQL injection bug is under mass attack. Even security products themselves—like Cisco Secure Workload with a CVSS 10.0 flaw—required urgent patches.\u003c/p\u003e\n\n\u003cp\u003eVerizon’s 2026 DBIR reveals a landmark shift: for the first time in nearly two decades, vulnerability exploitation overtook compromised credentials as the top initial access vector for breaches. Organizations are patching slower (median time to remediate rose to 43 days), and only 26% of CISA KEV entries were fully remediated, even as ransomware remains involved in 48% of breaches.\u003c/p\u003e\n"},{"n":2,"title":"Anthropic’s restricted Claude Mythos model may be coming to Claude Code","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/artificial-intelligence/anthropics-restricted-claude-mythos-model-may-be-coming-to-claude-code/","time":"17:07","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Anthropic's highly capable but risky 'Mythos' AI model, which uncovered over 10,000 high-severity vulnerabilities in its first month, is being prepared for public release after brief appearances in Claude Code and Claude Security.","briefOverview":"\u003cp\u003eAnthropic\u0026rsquo;s restricted Mythos model, initially kept out of public reach due to its ability to generate professional-grade cyberattacks, appears
