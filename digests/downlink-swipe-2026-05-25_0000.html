to be nearing release after brief appearances in Claude Code and Claude Security. The model, called claude-mythos-1-preview, was seen as a toggle in the public version of Claude Code before it was taken offline. This confirms that Anthropic is preparing for a public rollout, though it is unclear if all subscription tiers will have access.\u003c/p\u003e\n\n\u003cp\u003eAnnounced in April as a new frontier model, Mythos shows major improvements in code reasoning and autonomy, far above the current flagship Opus 4.7. Anthropic found that the model can automatically develop functional cyberattacks at a highly professional level, posing a severe risk to global digital infrastructure. The company warned that in the short term attackers could have the advantage if labs aren’t careful, but in the long term defenders would use these models to fix bugs before new code ships.\u003c/p\u003e\n\n\u003cp\u003eThrough the Glasswing project, Anthropic collaborated with up to 50 organizational partners to secure critical software from AI-driven exploits, using the Mythos Preview. The model uncovered over 10,000 high- or critical-severity vulnerabilities in its first month alone. This staggering volume of discovered bugs underscores why Anthropic initially delayed public release and focused on building a robust guardrail system.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn April, Anthropic announced a preview of its Mythos model, describing it as a new frontier model with strikingly advanced computer security capabilities. The model exhibited major improvements in code reasoning and autonomy that far surpassed its flagship Opus 4.7. Due to these capabilities, the company designated it a restricted model and warned that an uncontrolled rollout could pose a severe risk to global digital infrastructure.\u003c/p\u003e\n\n\u003cp\u003eMythos is capable of autonomously developing functional cyberattacks at a highly professional level, a step change that led Anthropic to explicitly warn about an adversarial advantage in the short term. The company stated that if not released carefully, attackers could exploit the model to find and weaponize unpatched vulnerabilities in popular applications like Firefox. In the long term, however, Anthropic believes defenders will use such models to efficiently fix bugs before code is ever shipped.\u003c/p\u003e\n\n\u003cp\u003eDespite these warnings, signs now point to an imminent public release. Users briefly noticed a toggle to enable the claude-mythos-1-preview model in the public version of Claude Code before it was removed, and similar references appeared in Claude Security. Anthropic has not yet disclosed whether the model will be available across all subscription tiers, but the interface exposure strongly suggests that the company has made progress on its guardrail system and is readying a broader launch.\u003c/p\u003e\n\n\u003cp\u003eIn parallel, Anthropic confirmed it has been operating a project called Glasswing, which partners with external organizations to secure critical software from AI-driven exploits. Using the unreleased Mythos Preview, Glasswing has already assisted up to 50 organizational partners. The model uncovered over 10,000 high- or critical-severity vulnerabilities in the first month, a volume that explains why Anthropic delayed public access while building protective measures.\u003c/p\u003e\n\n\u003cp\u003eThe combination of Glasswing\u0026rsquo;s results and the Claude Code interface leak indicates that Mythos is both a powerful vulnerability discovery engine and a dual-use tool that requires careful governance. Anthropic\u0026rsquo;s approach—pairing a managed partnership program with eventual public access—reflects an attempt to balance the defensive potential of the model against its inherent offensive risks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eAnthropic is moving towards a public release of its highly capable but dangerous \u0026ldquo;Mythos\u0026rdquo; model, originally held back due to its ability to conduct professional-grade cyberattacks. This analysis examines the model\u0026rsquo;s background, capabilities, early signs of rollout, and the defensive vulnerability work already underway.\u003c/p\u003e\n\n\u003ch2 id=\"background-the-restricted-mythos-preview\"\u003eBackground: The Restricted Mythos Preview\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn April 7, 2026, Anthropic announced a preview of Mythos, calling it a new frontier model with strikingly advanced computer security abilities.\u003c/li\u003e\n\u003cli\u003eThe model was described as exhibiting major improvements in code reasoning and autonomy, far exceeding the company\u0026rsquo;s current flagship, Opus 4.7.\u003c/li\u003e\n\u003cli\u003eBecause Mythos can automatically develop functional cyberattacks at a highly professional level, Anthropic designated it a restricted model, warning that an uncontrolled rollout poses a severe risk to global digital infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"capabilities-and-security-risks\"\u003eCapabilities and Security Risks\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMythos\u0026rsquo;s primary strength is advanced code reasoning, which enables it to craft exploits autonomously.\u003c/li\u003e\n\u003cli\u003eAnthropic found that the model could target unpatched vulnerabilities in popular software such as Firefox.\u003c/li\u003e\n\u003cli\u003eThe company explicitly warned about the immediate offensive advantage: \u0026ldquo;The advantage will belong to the side that can get the most out of these tools. In the short term, this could be attackers, if frontier labs aren’t careful about how they release these models.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eIn the long term, Anthropic expects defenders to use such models to preemptively fix bugs before they ship, thereby shifting the balance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indications-of-public-rollout\"\u003eIndications of Public Rollout\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers briefly spotted a toggle for \u0026ldquo;claude-mythos-1-preview\u0026rdquo; in the public version of Claude Code, and similar references appeared in Claude Security.\u003c/li\u003e\n\u003cli\u003eThe toggle was quickly removed, but its presence confirms that Anthropic is preparing a public launch.\u003c/li\u003e\n\u003cli\u003eIt remains unclear whether the model will be available across all subscription tiers.\u003c/li\u003e\n\u003cli\u003eThe incident suggests that Anthropic may have completed its guardrail system, which was a prerequisite for any public release.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-glasswing-project-and-vulnerability-discovery\"\u003eThe Glasswing Project and Vulnerability Discovery\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic confirmed a parallel initiative called \u0026ldquo;Glasswing,\u0026rdquo; in which the company collaborates with other organizations to secure critical software against AI-driven exploits.\u003c/li\u003e\n\u003cli\u003eThe project uses the unreleased Mythos Preview and has already assisted up to 50 organizational partners.\u003c/li\u003e\n\u003cli\u003eIn its first month, Mythos uncovered over 10,000 high- or critical-severity vulnerabilities across open-source and widely deployed software.\u003c/li\u003e\n\u003cli\u003eThis massive volume of findings illustrates why Anthropic held back the public release while building robust protections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"anthropic-s-guardrail-strategy-and-industry-position\"\u003eAnthropic\u0026rsquo;s Guardrail Strategy and Industry Position\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic’s dual-track approach—a controlled partnership program (Glasswing) that yields real defensive rewards while completing internal safeguards—demonstrates an effort to mitigate the model\u0026rsquo;s dual-use nature.\u003c/li\u003e\n\u003cli\u003eThe company currently offers several Claude tiers (Opus 4.7, 4.6, 4.5; Sonnet 4.6; Haiku 5.5), and the addition of Mythos would represent a significant leap in capability and risk.\u003c/li\u003e\n\u003cli\u003eBy acknowledging both the offensive dangers and the defensive promise, Anthropic is framing the model’s release as an inflection point that could determine whether AI security tools primarily empower attackers or defenders in the immediate future.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Anthropic's Mythos model possesses advanced code reasoning and can autonomously develop functional cyberattacks at a professional level, far surpassing the company's previous flagship models.","Due to the severe risk it poses to global digital infrastructure, Anthropic initially withheld Mythos from public release, but references to the model briefly surfaced in Claude Code and Claude Security, indicating a public rollout is being prepared.","Anthropic warned that in the short term attackers could benefit from such powerful tools if not released carefully, while in the long term defenders are expected to use them more efficiently to fix vulnerabilities before they are exploited.","Through the Glasswing project, the unreleased Mythos Preview helped up to 50 organizational partners and uncovered over 10,000 high- or critical-severity vulnerabilities in its first month."],"insights":["The brief, inadvertent appearance of the Mythos toggle in a public-facing product like Claude Code suggests that user-interface readiness for the model's release may have outpaced its safety review, creating a visible operational slip during a high-stakes rollout.","There is a fundamental tension in the release strategy: Mythos is deemed capable of producing professional-grade cyberattacks that threaten global infrastructure, yet it is simultaneously being positioned for integration into developer tools, implying Anthropic is betting that its internal guardrails can mitigate risks that it publicly describes as severe.","The sheer volume of over 10,000 high- or critical-severity vulnerabilities found in just a month by a single unreleased model reveals that the existing vulnerability discovery ecosystem has left a massive, exploitable backlog in widely deployed software, which the model could rapidly illuminate for both defenders and attackers."],"referencedReports":[],"body":"\u003cp\u003eAnthropic\u0026rsquo;s restricted Mythos model, initially kept out of public reach due to its ability to generate professional-grade cyberattacks, appears to be nearing release after brief appearances in Claude Code and Claude Security. The model, called claude-mythos-1-preview, was seen as a toggle in the public version of Claude Code before it was taken offline. This confirms that Anthropic is preparing for a public rollout, though it is unclear if all subscription tiers will have access.\u003c/p\u003e\n\n\u003cp\u003eAnnounced in April as a new frontier model, Mythos shows major improvements in code reasoning and autonomy, far above the current flagship Opus 4.7. Anthropic found that the model can automatically develop functional cyberattacks at a highly professional level, posing a severe risk to global digital infrastructure. The company warned that in the short term attackers could have the advantage if labs aren’t careful, but in the long term defenders would use these models to fix bugs before new code ships.\u003c/p\u003e\n\n\u003cp\u003eThrough the Glasswing project, Anthropic collaborated with up to 50 organizational partners to secure critical software from AI-driven exploits, using the Mythos Preview. The model uncovered over 10,000 high- or critical-severity vulnerabilities in its first month alone. This staggering volume of discovered bugs underscores why Anthropic initially delayed public release and focused on building a robust guardrail system.\u003c/p\u003e\n"},{"n":4,"title":"The Alert Firehose Finally Meets Its Match","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/the-alert-firehose-finally-meets-its.html","time":"11:30","priority":"MAY READ","score":50,"group":null,"groupColor":null,"tldr":"Agentic AI transforms Network Detection and Response from a noisy firehose into a high-fidelity, prioritized alert system that catches more threats with less manual tuning.","briefOverview":"\u003cp\u003eNetwork Detection and Response (NDR) has long been plagued by a reputation for generating alert firehoses and excessive noise, often due to insufficient tuning. A new generation of NDR incorporating agentic AI is fundamentally changing this dynamic by autonomously fetching data, triaging alerts, correlating low-severity signals, and presenting analysts with a small set of prioritized, evidence-backed detections. This shift turns the historical weakness of high data volume into a strategic asset, as AI can surface actionable threat narratives that would otherwise be missed.\u003c/p\u003e\n\n\u003cp\u003eProper deployment remains essential: networks must be baselined for normal behavior, regular tuning must adapt to changes, and the NDR must integrate strategically into the SOC. When these conditions are met, agentic AI dramatically reduces manual tuning dependencies, elevates analyst focus to genuinely high-severity threats, and fuels downstream SOC tools with high-fidelity data. The result is faster, more accurate threat detection that helps security operations finally keep pace with the network.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article examines how Network Detection and Response (NDR) technology has evolved beyond its outdated reputation as a noisy, overwhelming alert source. Historically, many NDR deployments required extensive manual tuning to prevent SIEM overload, and organizations that neglected this step suffered from alert fatigue. These failures cemented the perception that NDR produces too much data and too many false positives. In reality, the technology has advanced considerably, and the article argues that incorporating agentic AI transforms those same data volumes into a powerful detection engine.\u003c/p\u003e\n\n\u003cp\u003eAgentic AI autonomously handles the repetitive, time-consuming work that once buried analysts: it fetches data, triages alerts, correlates disparate events, and performs initial analysis. By simultaneously analyzing thousands of data points, the AI can identify connections between low-severity or informational alerts that most SOC teams would never have the capacity to piece together. The output is no longer a flood of raw anomalies but a curated set of prioritized detections, each accompanied by supporting evidence and suggested response actions. Analysts can examine the AI\u0026rsquo;s reasoning to verify conclusions, fostering transparency and trust.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that proper deployment still matters. Three practices are critical: baselining the network\u0026rsquo;s normal behavior so that anomaly detection engines can distinguish routine operations from true threats; regular tuning to account for new applications, cloud workloads, and other changes that can shift the baseline; and thoughtful SOC integration to ensure that high-fidelity NDR data enriches other AI-powered tools. When these are in place, NDR with agentic AI reduces false positives and manual tuning requirements, and it enables a more efficient, threat-focused analyst workflow.\u003c/p\u003e\n\n\u003cp\u003eA supporting study is cited to underscore the importance of data quality. In that study, high-fidelity network data improved Capture the Flag (CTF) test scores by over 350%, raised model accuracy from 26% to 95%, and yielded nearly 300% more incident response findings compared to common log formats. Importantly, frontier AI models performed at comparable levels, indicating that data quality had a far greater impact on security outcomes than the choice of model. This finding reinforces the article\u0026rsquo;s central thesis: NDR can shed its noisy legacy when backed by rich data and intelligent, autonomous analysis.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"the-evolution-of-ndr-from-noise-to-narratives-with-agentic-ai\"\u003eThe Evolution of NDR: From Noise to Narratives with Agentic AI\u003c/h1\u003e\n\n\u003ch2 id=\"the-lingering-reputation-of-ndr\"\u003eThe Lingering Reputation of NDR\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eHistorically, Network Detection and Response (NDR) platforms gave analysts deep visibility into network traffic, encrypted sessions, and protocol anomalies.\u003c/li\u003e\n\u003cli\u003eThis visibility often came as raw material rather than finished intelligence, requiring extensive manual tuning during deployment to prevent SIEM overload.\u003c/li\u003e\n\u003cli\u003eOrganizations that could not invest the time or understand the importance of tuning helped cement NDR\u0026rsquo;s reputation as an \u0026ldquo;alert firehose\u0026rdquo; or a \u0026ldquo;noisy\u0026rdquo; technology.\u003c/li\u003e\n\u003cli\u003eThe complaint persists because reputations are sticky and NDR has evolved faster than the narrative.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-transformation-with-agentic-ai\"\u003eThe Transformation with Agentic AI\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAgentic AI refers to systems that autonomously fetch data, triage alerts, and perform correlation and initial analysis.\u003c/li\u003e\n\u003cli\u003eThis AI handles the repetitive, time-consuming work that used to overwhelm analysts, allowing them to focus on top threats.\u003c/li\u003e\n\u003cli\u003eThe unexpected twist is that the high volume of data, once a liability, becomes a strategic asset. Because AI can ingest and simultaneously analyze thousands of data points, \u0026ldquo;noise\u0026rdquo; becomes rich ground for finding actionable signals.\u003c/li\u003e\n\u003cli\u003eFor example, the AI can surface connections between low-severity, informational, or otherwise low-profile activity that most SOC teams would never have the capacity to piece together, leading to detections that might otherwise be missed.\u003c/li\u003e\n\u003cli\u003eThe NDR with agentic AI pieces together a complete, correlated story and surfaces a prioritized set of detections—such as an anomalous connection tied to a failed login, a suspicious DNS query, or unusual file access—each delivered with network evidence for immediate context.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"practical-impact-on-analyst-workflows\"\u003ePractical Impact on Analyst Workflows\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWithout agentic AI, a typical 24-hour window might see 847 anomalies, with ML models flagging 312 as potentially malicious. Analysts then manually triage, dismissing many false positives, and eventually find four detections requiring action.\u003c/li\u003e\n\u003cli\u003eWith agentic AI, the same anomalies are automatically correlated and reasoned through. The AI presents the analyst with the same four prioritized detections, each with relevant evidence and suggested responses attached.\u003c/li\u003e\n\u003cli\u003eFor instance, the AI might determine that a DNS anomaly correlates with a new process on an endpoint, flag a compromised identity, and match TTP patterns to Cobalt Strike beacons.\u003c/li\u003e\n\u003cli\u003eAdvanced NDR platforms allow analysts to look under the hood to see how the AI reached its conclusions, providing full transparency and faster verification.\u003c/li\u003e\n\u003cli\u003eAgentic AI\u0026rsquo;s correlation capabilities also reduce the need for manual tuning by identifying and automating detection improvements.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"required-deployment-practices\"\u003eRequired Deployment Practices\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhile agentic AI reduces the tuning burden, it does not eliminate the need for proper deployment. Three key areas are essential:\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eBaselining:\u003c/strong\u003e Anomaly detection requires the platform to observe the network for a period to learn normal behavior, distinguishing routine operations from true threats. Most NDR platforms automate this process.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStaying Tuned:\u003c/strong\u003e Networks change due to new applications, cloud workloads, unknown devices, and AI-driven data flows. Regular tuning keeps the baseline calibrated and prevents false positives. AI can help spot emerging patterns before they become noise.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSOC Integration:\u003c/strong\u003e NDR data can fuel other SOC tools. Better data quality yields cleaner results. When AI has high-fidelity data, it distinguishes true threats from false positives more accurately. Organizations with mature deployments use APIs and detection feeds strategically, letting the NDR AI handle correlation before alerts reach other platforms, thus reducing noise before it hits the analyst queue.\u003c/li\u003e\n\u003c/ol\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-primacy-of-data-quality\"\u003eThe Primacy of Data Quality\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eA referenced report demonstrated that high-quality network data dramatically improves security outcomes.\u003c/li\u003e\n\u003cli\u003eThe study improved Capture the Flag (CTF) test scores by over 350%, raised model accuracy from 26% to 95%, and yielded nearly 300% more incident response findings compared to common log formats.\u003c/li\u003e\n\u003cli\u003eFrontier AI models performed at comparable levels across test runs, emphasizing that data quality, not model choice, had the greater impact on security outcomes.\u003c/li\u003e\n\u003cli\u003eThis finding reinforces the notion that investing in data fidelity is crucial for AI-powered SOC tools, and high-fidelity NDR data can serve as superior fuel for these systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-bottom-line\"\u003eThe Bottom Line\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe myth that \u0026ldquo;NDR is noisy\u0026rdquo; is being replaced by AI that correlates at scale, handles volume, creates context, finds signals otherwise lost in the noise, reduces manual tuning dependency, and shifts analyst focus to high-severity threats.\u003c/li\u003e\n\u003cli\u003eProper deployment handles the remaining noise, resulting in NDR that delivers better visibility, faster response, and helps the SOC keep pace with the network.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Agentic AI transforms Network Detection and Response from a noisy alert firehose into a system that catches threats earlier, triages faster, and reduces false positives.","Agentic AI autonomously fetches data, triages alerts, and performs correlation and initial analysis, freeing analysts to focus on the most critical threats.","The high volume of network data, once overwhelming, becomes a strategic asset because AI can surface actionable signals from low-severity activity that analysts would otherwise miss.","Proper NDR deployment still requires baselining normal network behavior, regular tuning to account for changes, and strategic SOC integration to minimize false positives.","High-quality data dramatically improves security outcomes, with one study showing a 350% improvement in test scores, 95% accuracy versus 26%, and nearly 300% more incident response findings."],"insights":["Agentic AI reduces the need for manual tuning of NDR by automatically identifying and implementing detection improvements, directly addressing the historical pain point that cemented NDR's noisy reputation.","Data quality has a far greater impact on AI-driven security outcomes than model selection, with one study showing that using high-fidelity network data improved test scores by over 350%, accuracy from 26% to 95%, and incident response findings by nearly 300%, indicating that data fidelity should be prioritized over chasing advanced AI models.","The high volume of network data, once considered a liability, becomes a strategic asset with AI because it can correlate low-severity and informational events into actionable threat signals that human analysts would likely miss.","Agentic AI provides full transparency into its reasoning, allowing analysts to inspect the logical steps behind detections, which can accelerate trust, verification, and response decisions."],"referencedReports":[{"title":"Provably Better Data","url":"https://corelight.com/cp/provably-better-data?utm_source=thehackernews\u0026utm_medium=article-5\u0026utm_campaign=awareness-wave-2","publisher":"Corelight","context":"The article references this report to show that high-quality network data dramatically improves AI-driven security outcomes, boosting CTF test scores by over 350%, raising accuracy from 26% to 95%, and yielding nearly 300% more incident response findings compared to common log formats."}],"body":"\u003cp\u003eNetwork Detection and Response (NDR) has long been plagued by a reputation for generating alert firehoses and excessive noise, often due to insufficient tuning. A new generation of NDR incorporating agentic AI is fundamentally changing this dynamic by autonomously fetching data, triaging alerts, correlating low-severity signals, and presenting analysts with a small set of prioritized, evidence-backed detections. This shift turns the historical weakness of high data volume into a strategic asset, as AI can surface actionable threat narratives that would otherwise be missed.\u003c/p\u003e\n\n\u003cp\u003eProper deployment remains essential: networks must be baselined for normal behavior, regular tuning must adapt to changes, and the NDR must integrate strategically into the SOC. When these conditions are met, agentic AI dramatically reduces manual tuning dependencies, elevates analyst focus to genuinely high-severity threats, and fuels downstream SOC tools with high-fidelity data. The result is faster, more accurate threat detection that helps security operations finally keep pace with the network.\u003c/p\u003e\n"}];

const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>

}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
