<script>
window.__DL_ARTICLES = [{"n":1,"title":"Microsoft patches YellowKey, GreenPlasma, MiniPlasma zero-days","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-patches-yellowkey-greenplasma-miniplasma-zero-days/","time":"09:57","priority":"MUST READ","score":95,"tldr":"Microsoft’s June 2026 Patch Tuesday fixes three publicly disclosed Windows zero-days, including two local privilege escalation flaws that grant SYSTEM access and a BitLocker bypass affecting WinRE. Users should apply the updates promptly, especially on Windows 11 and Windows Server systems exposed to physical access risks.","briefOverview":"\u003cp\u003eMicrosoft patched three zero-day vulnerabilities in its June 2026 Patch Tuesday updates: GreenPlasma, MiniPlasma, and YellowKey. Two of the flaws can let local attackers gain SYSTEM privileges on fully patched Windows systems. The third can grant access to BitLocker-protected drives under specific physical-access conditions.\u003c/p\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are tracked as CVE-2026-45586 and CVE-2020-17103 and affect the Collaborative Translation Framework and the Cloud Files Mini Filter Driver. YellowKey, tracked as CVE-2026-45585, is described as a backdoor in the Windows Recovery Environment. Attackers with physical access can use YellowKey to bypass BitLocker protection on unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities were disclosed by a researcher using the handle Nightmare Eclipse, who released them in protest over Microsoft Security Response Center disclosure practices. Microsoft said the YellowKey proof-of-concept was made public in violation of coordinated vulnerability best practices. The article also notes that Nightmare Eclipse has leaked other Windows zero-days, including some now actively exploited in attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday updates fixed three Windows zero-days known as GreenPlasma, MiniPlasma, and YellowKey. The first two allow local attackers to gain SYSTEM privileges on fully patched Windows systems. The third affects BitLocker protection through the Windows Recovery Environment.\u003c/p\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are privilege escalation vulnerabilities tracked as CVE-2026-45586 and CVE-2020-17103. They were found in the Collaborative Translation Framework, also referenced as CTFMON, and the Cloud Files Mini Filter Driver. The article states that they allow local attackers to obtain a shell with SYSTEM permissions.\u003c/p\u003e\n\n\u003cp\u003eYellowKey is tracked as CVE-2026-45585 and is described as a backdoor in the Windows Recovery Environment, which is used to repair boot-related issues in Windows. Attackers with physical access to targeted devices can use a YellowKey exploit to bypass BitLocker protection. The affected unpatched systems named in the article are Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e.\u003c/p\u003e\n\n\u003cp\u003eAll three flaws were disclosed by a security researcher using the handle Nightmare Eclipse. The article says the disclosure was made in protest over how the Microsoft Security Response Center handles the disclosure process. Microsoft shared mitigation measures for YellowKey and said the proof-of-concept had been made public in violation of coordinated vulnerability best practices.\u003c/p\u003e\n\n\u003cp\u003eThe article places these disclosures in a broader pattern of zero-day leaks by Nightmare Eclipse. It says the researcher previously released proof-of-concept exploits for BlueHammer and RedSun, two local privilege escalation zero-days that are now actively exploited in attacks. It also mentions later leaks called UnDefend and RoguePlanet, including a Microsoft Defender zero-day that can spawn command prompts with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft initially responded to the zero-day leaks with threats of legal action, according to the article. It later backtracked after significant social media criticism. Microsoft then said it would work with law enforcement when security researchers break the law and engage in malicious activity causing real harm to customers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft patched three publicly disclosed Windows zero-day vulnerabilities in its June 2026 Patch Tuesday updates. The flaws are known as GreenPlasma, MiniPlasma, and YellowKey. According to the article, two of them can allow attackers to gain SYSTEM privileges on fully patched Windows systems, while the third can grant access to BitLocker-protected drives.\u003c/p\u003e\n\n\u003cp\u003eAll three vulnerabilities were disclosed the previous month by a security researcher using the handle Nightmare Eclipse. The article states that the researcher disclosed them in protest over how the Microsoft Security Response Center handles the disclosure process.\u003c/p\u003e\n\n\u003ch2 id=\"patched-zero-days\"\u003ePatched zero-days\u003c/h2\u003e\n\n\u003cp\u003eThe three patched vulnerabilities are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGreenPlasma, tracked as CVE-2026-45586.\u003c/li\u003e\n\u003cli\u003eMiniPlasma, tracked as CVE-2020-17103.\u003c/li\u003e\n\u003cli\u003eYellowKey, tracked as CVE-2026-45585.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft fixed all three as part of its June 2026 Patch Tuesday updates.\u003c/p\u003e\n\n\u003ch2 id=\"greenplasma-and-miniplasma\"\u003eGreenPlasma and MiniPlasma\u003c/h2\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are described as privilege escalation vulnerabilities. The article says they were found in the Collaborative Translation Framework, also referenced as CTFMON, and the Cloud Files Mini Filter Driver.\u003c/p\u003e\n\n\u003cp\u003eThe impact described for these two flaws is local privilege escalation to SYSTEM. The article states that local attackers can use them to obtain a shell with SYSTEM permissions on fully patched Windows systems.\u003c/p\u003e\n\n\u003ch2 id=\"yellowkey-and-bitlocker-impact\"\u003eYellowKey and BitLocker impact\u003c/h2\u003e\n\n\u003cp\u003eYellowKey is described as a backdoor in the Windows Recovery Environment, or WinRE. The article explains that WinRE is used to repair boot-related issues in Windows.\u003c/p\u003e\n\n\u003cp\u003eAttackers with physical access to targeted devices can use a YellowKey exploit to bypass BitLocker protection. The article specifically names unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems as affected.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft shared mitigation measures for YellowKey to defend against potential attacks exploiting it in the wild. Microsoft also complained that the proof-of-concept had been made public in violation of coordinated vulnerability best practices.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-context\"\u003eDisclosure context\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the disclosure of GreenPlasma, MiniPlasma, and YellowKey to Nightmare Eclipse. It says the disclosures were made in protest over Microsoft Security Response Center disclosure practices.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes several other zero-day disclosures by the same researcher over the past several months. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlueHammer, tracked as CVE-2026-33825.\u003c/li\u003e\n\u003cli\u003eRedSun, which the article says has no identifier.\u003c/li\u003e\n\u003cli\u003eUnDefend, a zero-day that can be exploited by attackers with standard user permissions to block Microsoft Defender definition updates.\u003c/li\u003e\n\u003cli\u003eRoguePlanet, a Microsoft Defender zero-day exploit that lets threat actors spawn command prompts with SYSTEM privileges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that BlueHammer and RedSun are now actively exploited in attacks.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response\"\u003eMicrosoft response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft initially reacted to the zero-day leaks with threats of legal action, according to the article. The company later backtracked after major criticism on social media.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft then said it would work with law enforcement when security researchers break the law and engage in malicious activity causing real harm to customers.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central significance is that Microsoft has patched three Windows zero-days that had already been publicly disclosed. Two of the vulnerabilities provide SYSTEM-level local privilege escalation, and one can bypass BitLocker protection when attackers have physical access to affected unpatched systems.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights a continuing dispute around vulnerability disclosure practices. Nightmare Eclipse’s repeated public releases of proof-of-concept exploits are presented alongside Microsoft’s response and the fact that some previously leaked Windows zero-days are now actively exploited in attacks.\u003c/p\u003e\n","keyPoints":["Microsoft patched three zero-day vulnerabilities known as GreenPlasma, MiniPlasma, and YellowKey in its June 2026 Patch Tuesday updates.","GreenPlasma and MiniPlasma are local privilege escalation vulnerabilities in the Collaborative Translation Framework and the Cloud Files Mini Filter Driver that can allow attackers to obtain SYSTEM privileges on fully patched Windows systems.","YellowKey is a Windows Recovery Environment backdoor that can let attackers with physical access bypass BitLocker protection on unpatched Windows 11 and Windows Server 2022/2025 systems.","The three flaws were disclosed by a security researcher using the handle Nightmare Eclipse in protest over Microsoft Security Response Center disclosure practices.","Nightmare Eclipse has also released proof-of-concept exploits for other Windows zero-days, including BlueHammer, RedSun, UnDefend, and RoguePlanet."],"insights":["Organizations should prioritize patching systems where attackers could gain local or physical access, because the fixed flaws include both SYSTEM-level local privilege escalation and a BitLocker bypass requiring physical access.","YellowKey mitigation is especially relevant for environments running Windows 11 or Windows Server 2022/2025, as Microsoft issued mitigations before the Patch Tuesday fix for potential in-the-wild exploitation.","The disclosure pattern increases urgency around publicly released proof-of-concept code, as the article notes that other zero-days previously leaked by Nightmare Eclipse are now actively exploited in attacks.","Microsoft’s response shifted from threatening legal action over the zero-day leaks to saying it would work with law enforcement only when researchers break the law and cause real customer harm."],"referencedReports":[{"title":"CVE-2026-45586","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45586","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s vulnerability entry for GreenPlasma, one of the patched privilege escalation zero-days.","category":"","primary":false},{"title":"CVE-2020-17103","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2020-17103","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s vulnerability entry for MiniPlasma, a patched privilege escalation flaw in the Cloud Files Mini Filter Driver.","category":"","primary":false},{"title":"CVE-2026-45585","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45585","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s vulnerability entry for YellowKey, the patched BitLocker bypass affecting the Windows Recovery Environment.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft patched three zero-day vulnerabilities in its June 2026 Patch Tuesday updates: GreenPlasma, MiniPlasma, and YellowKey. Two of the flaws can let local attackers gain SYSTEM privileges on fully patched Windows systems. The third can grant access to BitLocker-protected drives under specific physical-access conditions.\u003c/p\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are tracked as CVE-2026-45586 and CVE-2020-17103 and affect the Collaborative Translation Framework and the Cloud Files Mini Filter Driver. YellowKey, tracked as CVE-2026-45585, is described as a backdoor in the Windows Recovery Environment. Attackers with physical access can use YellowKey to bypass BitLocker protection on unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities were disclosed by a researcher using the handle Nightmare Eclipse, who released them in protest over Microsoft Security Response Center disclosure practices. Microsoft said the YellowKey proof-of-concept was made public in violation of coordinated vulnerability best practices. The article also notes that Nightmare Eclipse has leaked other Windows zero-days, including some now actively exploited in attacks.\u003c/p\u003e\n"},{"n":5,"title":"10 year old critical vulnerability in phpBB affecting tens of millions of users across thousands of forums","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/phpbb-authentication-bypass-rce","time":"08:56","priority":"MUST READ","score":95,"tldr":"A critical authentication bypass in phpBB lets an unauthenticated attacker gain a session as any user, potentially leading to full forum takeover and remote code execution via administrator access. Sites running phpBB 3.3.16 or earlier should upgrade immediately to 3.3.17, while 4.0.0-a2 users should move to the patched master branch.","briefOverview":"\u003cp\u003eAikido says its AI pentesting tool, Aikido Attack, discovered a critical authentication bypass vulnerability in phpBB, a widely used open-source forum platform. The flaw affects versions 3.3.16 and below, as well as 4.0.0-a2. The article says affected users should upgrade immediately to phpBB 3.3.17 for the 3.x branch or to master for 4.x because there is no safe 4.x release yet.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is described as exploitable in the default configuration with no special knowledge required. A single unauthenticated HTTP request can obtain a valid session as any user, and a public member list on default installs makes selecting a target trivial. If an administrator account is targeted, the attacker could gain full read, write, and delete access across the forum and, on the latest version, potentially reach remote code execution.\u003c/p\u003e\n\n\u003cp\u003eAikido reported the issue to phpBB maintainers through HackerOne on June 2, and a patch was released in phpBB 3.3.17 on June 6. The article says technical details are being withheld temporarily to give administrators time to upgrade. It also notes a small breaking change for phpBB instances using OAuth authentication, where the redirect URI handler is now located at \u003ccode\u003e/user/oauth/authenticate/...\u003c/code\u003e.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido reports that its AI pentesting tool, Aikido Attack, found a critical authentication bypass vulnerability in phpBB. The article says the vulnerability affects phpBB 3.3.16 and below, as well as 4.0.0-a2. Users on affected 3.x versions are urged to upgrade to 3.3.17, while users on 4.0.0-a2 are told to upgrade to \u003ccode\u003emaster\u003c/code\u003e because there is no safe 4.x release yet.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is described as exploitable in the default configuration and requiring no special knowledge. According to the article, a single unauthenticated HTTP request is enough to obtain a valid session as any user. Because the member list is public on a default phpBB install, selecting a target account is described as trivial.\u003c/p\u003e\n\n\u003cp\u003eThe impact depends on the account whose session is obtained. A standard user session exposes private messages and all content that user can access. An administrator session provides full read, write, and delete access across the forum and, on the latest version, opens the door to remote code execution and complete takeover of the underlying system.\u003c/p\u003e\n\n\u003cp\u003eAikido reported the vulnerability to phpBB maintainers through the HackerOne Vulnerability Disclosure Program on June 2. The article says the issue was triaged quickly and that a working patch was released in phpBB 3.3.17 on June 6. It links to phpBB\u0026rsquo;s official release notes for more details on the update.\u003c/p\u003e\n\n\u003cp\u003eThe article gives background on phpBB as open-source forum software dating back to 2000 and still used by communities such as Joomla\u0026rsquo;s forum and forums.debian.net. It notes that phpBB\u0026rsquo;s Site Showcase alone represents over 6 million members, with more users on unlinked instances. It also recalls the 2004 Santy worm, which abused a phpBB remote code execution flaw and used search engines to find and compromise many instances.\u003c/p\u003e\n\n\u003cp\u003eAikido says it is withholding technical details for now to give administrators time to upgrade. It also says it has privately notified administrators of the largest online communities and asks readers to help reach other phpBB instances that may not have received the news. The article notes one small breaking change for OAuth-enabled instances: the redirect URI handler is now located at \u003ccode\u003e/user/oauth/authenticate/...\u003c/code\u003e.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAikido reports that its AI pentesting tool, Aikido Attack, discovered a critical authentication bypass vulnerability in phpBB. The vulnerability affects phpBB versions 3.3.16 and below, as well as 4.0.0-a2. The article says the issue can lead to remote code execution and a complete takeover of the underlying system.\u003c/p\u003e\n\n\u003cp\u003eAikido urges users on phpBB 3.3.16 and below to upgrade immediately to 3.3.17. Users on phpBB 4.0.0-a2 are advised to upgrade to \u003ccode\u003emaster\u003c/code\u003e, because the article states there is no safe 4.x release yet.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-patch-timeline\"\u003eDisclosure and Patch Timeline\u003c/h2\u003e\n\n\u003cp\u003eAikido says it reported the vulnerability to phpBB maintainers on June 2 through phpBB\u0026rsquo;s HackerOne Vulnerability Disclosure Program. After triage, a working patch was released four days later in phpBB 3.3.17 on June 6. The article links to phpBB\u0026rsquo;s official release notes for more details about the update.\u003c/p\u003e\n\n\u003cp\u003eAikido says it is withholding technical details for now to give administrators time to upgrade. It also says it will publish a second article with more detail in the near future.\u003c/p\u003e\n\n\u003ch2 id=\"technical-impact-described-in-the-article\"\u003eTechnical Impact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is described as exploitable in the default phpBB configuration. The article says it requires no special knowledge. It also says a single unauthenticated HTTP request is enough to obtain a valid session as any user.\u003c/p\u003e\n\n\u003cp\u003eOn a default phpBB installation, the member list is public. The article states that this makes choosing a target trivial.\u003c/p\u003e\n\n\u003cp\u003eThe impact depends on which user account is targeted:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA standard user session exposes private messages and any content that user can access.\u003c/li\u003e\n\u003cli\u003eAn administrator session provides full read, write, and delete access across the forum.\u003c/li\u003e\n\u003cli\u003eOn the latest version, an administrator session can open the door to remote code execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-versions-and-upgrade-guidance\"\u003eAffected Versions and Upgrade Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the affected versions as all phpBB releases up to and including 3.3.16 and 4.0.0-a2. It advises immediate upgrades for affected installations.\u003c/p\u003e\n\n\u003cp\u003eThe stated remediation guidance is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpgrade phpBB 3.3.16 and below to phpBB 3.3.17.\u003c/li\u003e\n\u003cli\u003eUpgrade phpBB 4.0.0-a2 to \u003ccode\u003emaster\u003c/code\u003e, because there is no safe 4.x release yet.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"oauth-related-breaking-change\"\u003eOAuth-Related Breaking Change\u003c/h2\u003e\n\n\u003cp\u003eThe article notes a small breaking change for phpBB instances with OAuth authentication enabled. The redirect URI handler is now located at \u003ccode\u003e/user/oauth/authenticate/...\u003c/code\u003e. Aside from this change, the article says the upgrade should be smooth.\u003c/p\u003e\n\n\u003ch2 id=\"phpbb-context\"\u003ephpBB Context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes phpBB as open-source forum software dating back to 2000 that remains in use. It names communities using phpBB, including \u003ccode\u003eforum.joomla.org\u003c/code\u003e and \u003ccode\u003eforums.debian.net\u003c/code\u003e. It also states that phpBB\u0026rsquo;s Site Showcase alone has over 6 million members, with many more users on unlinked instances.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that phpBB has historically faced targeted attacks exploiting zero-days across the internet. It specifically cites the 2004 Santy worm, which abused a vulnerability resulting in remote code execution. The article describes Santy as the first time a search engine like Google was used to instantly find and compromise tens of thousands of instances.\u003c/p\u003e\n\n\u003ch2 id=\"security-program-and-response\"\u003eSecurity Program and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article says phpBB has a Vulnerability Disclosure Program on HackerOne where researchers can get findings fixed. In this case, Aikido reported the vulnerability through that program, and phpBB released a patch within four days.\u003c/p\u003e\n\n\u003cp\u003eAikido says it has privately notified administrators of the largest online communities about the update. It also asks readers to help reach out to any phpBB instances they know that might not have received the news.\u003c/p\u003e\n\n\u003ch2 id=\"most-important-takeaway\"\u003eMost Important Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central takeaway is that affected phpBB installations should be upgraded immediately because the article describes an authentication bypass that can be exploited without authentication, in default configuration, to obtain a valid session as any user. If an administrator account is targeted, the article says the resulting access can include full forum control and, on the latest version, remote code execution.\u003c/p\u003e\n","keyPoints":["Aikido's AI pentesting tool Aikido Attack discovered a critical authentication bypass vulnerability in phpBB that can lead to remote code execution and complete takeover of the underlying system.","The vulnerability is exploitable in the default configuration, requires no special knowledge, and can be triggered with a single unauthenticated HTTP request to obtain a valid session as any user.","The vulnerability affects phpBB versions 3.3.16 and below, as well as 4.0.0-a2, and users are advised to upgrade to 3.3.17 or the master branch for 4.x.","Aikido reported the issue to phpBB maintainers through HackerOne on June 2, and phpBB released a working patch in version 3.3.17 on June 6.","The phpBB 3.3.17 update includes a breaking change for OAuth authentication users because the redirect URI handler is now located at /user/oauth/authenticate/...."],"insights":["Because phpBB’s member list is public on a default install, administrators should not assume attackers need prior knowledge to choose high-value accounts to impersonate.","The practical impact depends heavily on which account is targeted, with administrator sessions enabling full forum control and, on the latest version, remote code execution.","The researchers are intentionally withholding technical details temporarily, making the current period a patching window before broader exploit information is released.","phpBB instances using OAuth authentication need to account for a redirect URI handler change to /user/oauth/authenticate/... when upgrading."],"referencedReports":[{"title":"phpBB 3.3.17 Release Notes","url":"https://www.phpbb.com/community/viewtopic.php?t=2672170","publisher":"phpBB","context":"The article links to phpBB's official release notes for more details about the 3.3.17 update that patches the vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eAikido says its AI pentesting tool, Aikido Attack, discovered a critical authentication bypass vulnerability in phpBB, a widely used open-source forum platform. The flaw affects versions 3.3.16 and below, as well as 4.0.0-a2. The article says affected users should upgrade immediately to phpBB 3.3.17 for the 3.x branch or to master for 4.x because there is no safe 4.x release yet.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is described as exploitable in the default configuration with no special knowledge required. A single unauthenticated HTTP request can obtain a valid session as any user, and a public member list on default installs makes selecting a target trivial. If an administrator account is targeted, the attacker could gain full read, write, and delete access across the forum and, on the latest version, potentially reach remote code execution.\u003c/p\u003e\n\n\u003cp\u003eAikido reported the issue to phpBB maintainers through HackerOne on June 2, and a patch was released in phpBB 3.3.17 on June 6. The article says technical details are being withheld temporarily to give administrators time to upgrade. It also notes a small breaking change for phpBB instances using OAuth authentication, where the redirect URI handler is now located at \u003ccode\u003e/user/oauth/authenticate/...\u003c/code\u003e.\u003c/p\u003e\n"},{"n":3,"title":"ServiceNow Flaw Exploited to Gain Unauthorized Access to Customer Instances","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/servicenow-flaw-exploited-to-gain.html","time":"07:02","priority":"MUST READ","score":94,"tldr":"ServiceNow patched a flaw that could let unauthenticated attackers gain unauthorized access to certain customer instances, and said it found evidence of successful table queries against a subset of customers. The issue affects instances on the Australia release or older releases with certain configuration changes, and impacted customers have been notified.","briefOverview":"\u003cp\u003eServiceNow warned of a security incident in which unknown threat actors exploited a flaw to obtain deeper unauthorized access to susceptible customer instances. The company said it applied a security update to hosted customer instances on June 5, 2026. The issue could allow an unauthenticated user, in certain circumstances, to gain greater access to ServiceNow instances than intended.\u003c/p\u003e\n\n\u003cp\u003eServiceNow said the update changed an endpoint configuration to limit this access to authenticated users. The flaw currently does not have a CVE identifier, and details of the issue first emerged on Reddit. ServiceNow said it detected anomalous activity and saw evidence of successful queries of instance tables against a subset of customers.\u003c/p\u003e\n\n\u003cp\u003eThe company said impacted customers have been notified. The issue pertains to customers on the Australia platform release or customers who made certain configuration changes to instances on releases prior to Australia. A Reddit user claimed ServiceNow had been aware of the problem internally since April 7, 2026 and had treated it as non-urgent for about two months.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eServiceNow disclosed a security incident involving a flaw that unknown threat actors exploited to gain greater unauthorized access to susceptible customer instances. The company said it applied a security update to hosted customer instances on June 5, 2026. The update addressed a security issue that, in certain circumstances, could allow an unauthenticated user to gain more access to ServiceNow instances than intended.\u003c/p\u003e\n\n\u003cp\u003eThe technical fix described by ServiceNow involved changes to an endpoint configuration. According to the article, the update limits the access path to authenticated users. The security flaw currently does not have a CVE identifier.\u003c/p\u003e\n\n\u003cp\u003eServiceNow said it detected anomalous activity related to the issue. It also observed evidence of successful queries of instance tables against a subset of customers. The company said impacted customers have been notified.\u003c/p\u003e\n\n\u003cp\u003eThe affected scope described by ServiceNow is limited to customers on the Australia platform release or customers that made certain configuration changes to instances on releases prior to Australia. The article does not name the affected customers. It also describes the threat actors only as unknown.\u003c/p\u003e\n\n\u003cp\u003eDetails of the issue first emerged on Reddit. A Reddit user named “d3s7iny” claimed that its security team reported the vulnerability to ServiceNow and that ServiceNow had been aware of the issue internally since April 7, 2026. The user claimed ServiceNow classified it as non-urgent for about two months, with plans to remediate it in a future update.\u003c/p\u003e\n\n\u003cp\u003eThe Hacker News said it contacted ServiceNow for comment and would update the story if it received a response. The article notes that the story is developing and asks readers to check back for more details.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eServiceNow warned about a security incident involving a flaw that allowed unknown threat actors to obtain deeper unauthorized access to susceptible customer instances. The company said the issue could allow an unauthenticated user, in certain circumstances, to gain greater access to ServiceNow instances than intended.\u003c/p\u003e\n\n\u003cp\u003eServiceNow applied a security update to hosted customer instances on June 5, 2026. The company described the update as a response to a security issue affecting certain ServiceNow instances.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical Details Disclosed\u003c/h2\u003e\n\n\u003cp\u003eServiceNow said the security update made changes to an endpoint configuration. The purpose of the change was to limit the affected access to authenticated users.\u003c/p\u003e\n\n\u003cp\u003eThe flaw currently does not have a CVE identifier. The article states that details of the issue first emerged on Reddit.\u003c/p\u003e\n\n\u003ch2 id=\"observed-activity-and-impact\"\u003eObserved Activity and Impact\u003c/h2\u003e\n\n\u003cp\u003eServiceNow said it detected anomalous activity related to the security issue. It also said it observed evidence of successful queries of instance tables against a subset of customers.\u003c/p\u003e\n\n\u003cp\u003eThe company said impacted customers have been notified. The article does not identify the affected customers or quantify how many customers were impacted.\u003c/p\u003e\n\n\u003ch2 id=\"affected-customers-and-releases\"\u003eAffected Customers and Releases\u003c/h2\u003e\n\n\u003cp\u003eServiceNow said the issue pertains to customers who are on the Australia platform release. It also affects customers who made certain configuration changes to instances on releases prior to Australia.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the exposure as applying to susceptible instances rather than all ServiceNow instances.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actors\"\u003eThreat Actors\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the responsible threat actors as unknown. It does not name any specific group, campaign, or individual actor associated with the exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"reddit-claims\"\u003eReddit Claims\u003c/h2\u003e\n\n\u003cp\u003eThe article says details of the issue first emerged on Reddit. It cites a Reddit comment from a user named “d3s7iny,” who claimed that its security team reported the vulnerability to ServiceNow.\u003c/p\u003e\n\n\u003cp\u003eAccording to that Reddit claim, ServiceNow had been aware of the problem internally since April 7, 2026. The user also claimed that ServiceNow classified the issue as non-urgent for about two months and planned to remediate it in a future update.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-and-status\"\u003eVendor Response and Status\u003c/h2\u003e\n\n\u003cp\u003eServiceNow applied a security update on June 5, 2026 to hosted customer instances. The company also said affected customers have been notified.\u003c/p\u003e\n\n\u003cp\u003eThe Hacker News said it contacted ServiceNow for comment and would update the story if it received a response. The article is described as a developing story.\u003c/p\u003e\n","keyPoints":["ServiceNow said unknown threat actors exploited a security issue to gain greater unauthorized access to susceptible customer instances than intended.","ServiceNow applied a security update to hosted customer instances on June 5, 2026, changing an endpoint configuration to limit access to authenticated users.","The security flaw does not currently have a CVE identifier, and details of the issue first emerged on Reddit.","ServiceNow said it detected anomalous activity and observed evidence of successful queries of instance tables against a subset of customers, who have been notified.","The issue affects customers on the Australia platform release or customers who made certain configuration changes to instances on releases prior to Australia."],"insights":["The issue is harder for defenders to track publicly because ServiceNow’s advisory requires customer access and the flaw currently has no CVE identifier.","Exposure is tied to the Australia platform release or specific configuration changes on earlier releases, so customers should assess risk based on release and configuration state rather than assuming all instances are equally affected.","ServiceNow’s observation of successful instance table queries indicates that affected customers should focus investigation on unauthorized table access activity, not just authentication events.","A Reddit user claimed ServiceNow had known about the vulnerability internally since April 7, 2026 and treated it as non-urgent for about two months before remediation."],"referencedReports":[{"title":"ServiceNow security advisory KB3067321","url":"https://support.servicenow.com/kb?id=kb_article_view\u0026sysparm_article=KB3067321","publisher":"ServiceNow","context":"The article cites ServiceNow’s advisory as the source for the June 5, 2026 security update and details about the unauthenticated access issue affecting some customer instances.","category":"","primary":false}],"body":"\u003cp\u003eServiceNow warned of a security incident in which unknown threat actors exploited a flaw to obtain deeper unauthorized access to susceptible customer instances. The company said it applied a security update to hosted customer instances on June 5, 2026. The issue could allow an unauthenticated user, in certain circumstances, to gain greater access to ServiceNow instances than intended.\u003c/p\u003e\n\n\u003cp\u003eServiceNow said the update changed an endpoint configuration to limit this access to authenticated users. The flaw currently does not have a CVE identifier, and details of the issue first emerged on Reddit. ServiceNow said it detected anomalous activity and saw evidence of successful queries of instance tables against a subset of customers.\u003c/p\u003e\n\n\u003cp\u003eThe company said impacted customers have been notified. The issue pertains to customers on the Australia platform release or customers who made certain configuration changes to instances on releases prior to Australia. A Reddit user claimed ServiceNow had been aware of the problem internally since April 7, 2026 and had treated it as non-urgent for about two months.\u003c/p\u003e\n"},{"n":2,"title":"Ivanti: Max severity Sentry flaw allows code execution as root","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-max-severity-ivanti-sentry-flaw-allows-code-execution-as-root/","time":"06:26","priority":"MUST READ","score":92,"tldr":"Ivanti released patches for two critical Sentry vulnerabilities, including a maximum-severity OS command injection flaw that could let remote attackers execute code as root. The company says there is no evidence of exploitation yet, but administrators should upgrade to the fixed versions immediately.","briefOverview":"\u003cp\u003eIvanti released patches for two critical vulnerabilities in its Sentry secure mobile gateway solution, formerly known as MobileIron Sentry. The most severe issue, CVE-2026-10520, is an OS command injection flaw that can allow remote attackers to execute code with root privileges. A second flaw, CVE-2026-10523, is an authentication bypass that can let unauthenticated remote attackers create rogue administrative accounts and gain full administrative access.\u003c/p\u003e\n\n\u003cp\u003eThe fixes were released in Sentry versions R10.5.2, R10.6.2, and R10.7.1. Ivanti said it is not aware of any customers being exploited through these vulnerabilities at the time of disclosure and that there is no known public exploitation that could provide indicators of compromise. The company advised administrators to upgrade their systems to protect against potential attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Ivanti vulnerabilities have often been targeted in recent years because they can provide access into enterprise networks and sensitive data. It cites recent CISA action requiring U.S. federal agencies to patch Ivanti devices after a separate EPMM flaw was exploited as a zero-day. It also notes that Ivanti products are used by more than 40,000 clients worldwide.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIvanti has patched two critical vulnerabilities in Ivanti Sentry, its secure mobile gateway appliance used to secure traffic between back-end corporate systems and remote mobile devices. The product was formerly known as MobileIron Sentry. The company released fixed Sentry versions R10.5.2, R10.6.2, and R10.7.1 on Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe most severe vulnerability is CVE-2026-10520, which the article describes as a maximum-severity OS command injection flaw. It can allow remote attackers to execute code with root privileges. The second vulnerability, CVE-2026-10523, is a critical authentication bypass issue.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, CVE-2026-10523 can be exploited remotely by unauthenticated attackers. Successful exploitation can allow attackers to create rogue administrative accounts and gain full administrative access. Both vulnerabilities affect Ivanti Sentry and were addressed in the newly released versions.\u003c/p\u003e\n\n\u003cp\u003eIvanti said it has no evidence that the two vulnerabilities are being exploited in the wild. The company also said it is not aware of any customers being exploited at the time of disclosure. Because there is no known public exploitation, Ivanti said there are no indicators of compromise available from public exploitation activity.\u003c/p\u003e\n\n\u003cp\u003eThe article places the patches in the context of repeated targeting of Ivanti vulnerabilities in recent years. It notes that Ivanti flaws have been used because they can help attackers breach enterprise networks and steal sensitive corporate and customer data. It also cites a recent CISA order requiring U.S. federal agencies to patch Ivanti devices after Ivanti warned about a separate EPMM remote code execution vulnerability exploited as a zero-day.\u003c/p\u003e\n\n\u003cp\u003eNo threat actor is identified as exploiting these two Sentry vulnerabilities. The article references prior Ivanti zero-day exploitation against a range of targets, including government agencies worldwide and a very limited number of customers in other cases. Ivanti says its IT asset management solutions are used by more than 40,000 clients worldwide and supported by over 7,000 partners and more than 3,000 employees.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIvanti released patches for two critical vulnerabilities in its Sentry secure mobile gateway solution. Ivanti Sentry, formerly known as MobileIron Sentry, is described as a security gateway appliance that secures traffic between back-end corporate systems and remote mobile devices.\u003c/p\u003e\n\n\u003cp\u003eThe two patched vulnerabilities are CVE-2026-10520 and CVE-2026-10523. Ivanti addressed both issues in Sentry versions R10.5.2, R10.6.2, and R10.7.1.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe most severe vulnerability is CVE-2026-10520. The article describes it as a maximum-severity OS command injection flaw that enables remote attackers to execute code with root privileges.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability is CVE-2026-10523. It is described as a critical authentication bypass vulnerability that can be exploited remotely by unauthenticated attackers.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, exploitation of CVE-2026-10523 can allow attackers to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreate rogue administrative accounts.\u003c/li\u003e\n\u003cli\u003eGain full administrative access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-product-and-versions\"\u003eAffected Product and Versions\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Ivanti Sentry, a secure mobile gateway solution previously known as MobileIron Sentry. The article states that Ivanti patched the flaws with the release of the following versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSentry R10.5.2\u003c/li\u003e\n\u003cli\u003eSentry R10.6.2\u003c/li\u003e\n\u003cli\u003eSentry R10.7.1\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIvanti advised administrators to upgrade their systems to protect against potential attacks.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eIvanti said it has no evidence that the two Sentry vulnerabilities are being exploited in the wild. The company stated that it is not aware of any customers being exploited by these vulnerabilities at the time of disclosure.\u003c/p\u003e\n\n\u003cp\u003eIvanti also said there is no known public exploitation of the vulnerabilities that could be used to provide a list of indicators of compromise. The article does not identify any known or suspected threat actor exploiting these two Sentry flaws.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-context\"\u003eSignificance and Context\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Ivanti vulnerabilities have often been targeted in attacks in recent years. It states that these vulnerabilities can provide cybercriminals with an easy way to breach enterprise networks and steal sensitive corporate and customer data.\u003c/p\u003e\n\n\u003cp\u003eAs a recent example, the article says the Cybersecurity and Infrastructure Security Agency ordered U.S. federal agencies in May to patch Ivanti devices. That action followed Ivanti’s warning to customers to immediately patch a high-severity remote code execution vulnerability in Endpoint Manager Mobile, or EPMM, that was exploited in zero-day attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that multiple other Ivanti zero-days have been exploited in recent years against a wide range of targets. Those targets included government agencies worldwide and a very limited number of customers affected by two critical EPMM vulnerabilities addressed by Ivanti in January.\u003c/p\u003e\n\n\u003ch2 id=\"stakeholders-mentioned\"\u003eStakeholders Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe main stakeholders named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIvanti, the vendor that released the patches.\u003c/li\u003e\n\u003cli\u003eIvanti Sentry customers and administrators, who are advised to upgrade.\u003c/li\u003e\n\u003cli\u003eThe Cybersecurity and Infrastructure Security Agency, which is referenced in relation to prior Ivanti patching orders for U.S. federal agencies.\u003c/li\u003e\n\u003cli\u003eU.S. federal agencies, which were previously ordered by CISA to patch Ivanti devices in a separate case.\u003c/li\u003e\n\u003cli\u003eGovernment agencies worldwide, which are mentioned as previous targets of Ivanti zero-day exploitation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-ivanti-exposure\"\u003eBroader Ivanti Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Ivanti’s IT asset management solutions are used by more than 40,000 clients worldwide. It also says Ivanti is supported by a network of more than 7,000 partners and over 3,000 employees.\u003c/p\u003e\n\n\u003cp\u003eIn discussing historical exploitation, the article says CISA has tagged 34 vulnerabilities across various SolarWinds products as actively exploited over the past several years, with 12 also used in ransomware attacks. This appears in the article’s broader context section about exploited vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommended-action-in-the-article\"\u003eResponse and Recommended Action in the Article\u003c/h2\u003e\n\n\u003cp\u003eIvanti’s stated response was to release patched Sentry versions R10.5.2, R10.6.2, and R10.7.1. The company advised administrators to upgrade their systems.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide indicators of compromise because Ivanti said there is no known public exploitation of these vulnerabilities. It also does not report any confirmed customer compromise tied to CVE-2026-10520 or CVE-2026-10523 at the time of disclosure.\u003c/p\u003e\n","keyPoints":["Ivanti released patches for two critical vulnerabilities in its Sentry secure mobile gateway solution.","CVE-2026-10520 is a maximum-severity OS command injection flaw that can allow remote attackers to execute code with root privileges.","CVE-2026-10523 is a critical authentication bypass that can allow unauthenticated remote attackers to create rogue administrative accounts and gain full administrative access.","Ivanti fixed both vulnerabilities in Sentry versions R10.5.2, R10.6.2, and R10.7.1.","Ivanti said it has no evidence that the two vulnerabilities are being exploited in the wild at the time of disclosure."],"insights":["Because Ivanti says there are no known public exploitation details or indicators of compromise for these Sentry flaws, upgrading to the fixed versions is the primary defensive action identified in the article.","The authentication bypass vulnerability is especially actionable because the article says unauthenticated remote attackers could create rogue administrative accounts and gain full administrative access.","The affected product is a gateway between back-end corporate systems and remote mobile devices, making exposed Sentry appliances a high-priority asset to patch.","The article highlights that Ivanti vulnerabilities have repeatedly been targeted in recent years, including zero-days affecting government agencies, which raises the urgency of patching even though these two Sentry flaws are not currently known to be exploited."],"referencedReports":[{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=All\u0026url=\u0026f%5B0%5D=vendor_project%3A817","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article references CISA's catalog to note prior Ivanti vulnerabilities that have been tagged as actively exploited in attacks.","category":"","primary":false}],"body":"\u003cp\u003eIvanti released patches for two critical vulnerabilities in its Sentry secure mobile gateway solution, formerly known as MobileIron Sentry. The most severe issue, CVE-2026-10520, is an OS command injection flaw that can allow remote attackers to execute code with root privileges. A second flaw, CVE-2026-10523, is an authentication bypass that can let unauthenticated remote attackers create rogue administrative accounts and gain full administrative access.\u003c/p\u003e\n\n\u003cp\u003eThe fixes were released in Sentry versions R10.5.2, R10.6.2, and R10.7.1. Ivanti said it is not aware of any customers being exploited through these vulnerabilities at the time of disclosure and that there is no known public exploitation that could provide indicators of compromise. The company advised administrators to upgrade their systems to protect against potential attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Ivanti vulnerabilities have often been targeted in recent years because they can provide access into enterprise networks and sensitive data. It cites recent CISA action requiring U.S. federal agencies to patch Ivanti devices after a separate EPMM flaw was exploited as a zero-day. It also notes that Ivanti products are used by more than 40,000 clients worldwide.\u003c/p\u003e\n"},{"n":4,"title":"Anthropic Releases Claude Fable 5, Its Most Powerful AI Yet, With Cyber Safeguards","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/anthropic-releases-claude-fable-5-its.html","time":"07:37","priority":"SHOULD READ","score":82,"tldr":"Anthropic launched Claude Fable 5 as its most powerful public model, but routes risky cyber, bio, chemistry, and model-distillation requests to a weaker model while reserving the unrestricted Claude Mythos 5 for vetted defenders. The key takeaway is that frontier AI can now accelerate vulnerability discovery and exploit development enough that patching speed and controlled access have become major security concerns.","briefOverview":"\u003cp\u003eAnthropic released Claude Fable 5 on June 9 as its most capable public model, while keeping its cyber-unrestricted twin, Claude Mythos 5, limited to vetted cyber defenders and critical infrastructure operators. The two products use the same underlying model, but Fable 5 includes safety classifiers that route certain flagged requests away from the full-capability model. Anthropic calls Mythos 5 the strongest cybersecurity model in the world.\u003c/p\u003e\n\n\u003cp\u003eFable 5 routes flagged cyber, biology, chemistry, and distillation requests to the weaker Claude Opus 4.8, while Mythos 5 keeps cyber capabilities available for approved users. Anthropic says the safeguards are meant to reduce attacker uplift from models that can find and exploit software vulnerabilities. The company reports that fallback occurs in under 5% of all sessions, while more than 95% of sessions behave like the cyber-unrestricted Mythos 5.\u003c/p\u003e\n\n\u003cp\u003eThe launch follows Project Glasswing, where Anthropic and roughly 50 partners used Mythos Preview to find more than ten thousand high- or critical-severity vulnerabilities in systemically important software. The article emphasizes that the bottleneck has shifted from finding bugs to verifying, triaging, and patching them, with high- or critical-severity model-found bugs taking about two weeks to patch on average. Anthropic is also requiring 30-day retention for traffic on Fable 5, Mythos 5, and future models at this capability level for safety purposes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic released Claude Fable 5 on June 9 and made it generally available through the Claude API. At the same time, it kept Claude Mythos 5, the same underlying model without the cyber safeguards, restricted to vetted cyber defenders and critical infrastructure operators. Anthropic describes Mythos 5 as the strongest cybersecurity model in the world. Both models are priced at \u003cspan class=\"math inline\"\u003e\\(10 per million input tokens and \\)\u003c/span\u003e50 per million output tokens.\u003c/p\u003e\n\n\u003cp\u003eThe central technical distinction is a safety layer in Fable 5. Its classifiers monitor for flagged cyber, biology, chemistry, and distillation requests, then route those requests to Claude Opus 4.8 rather than refusing them outright. The user is told when the handoff happens. Anthropic says distillation refers to extracting a model’s capabilities to train a competing model, which it blocks to prevent near-frontier abilities from leaking without safeguards.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says the cyber classifier is broad and is designed to block offensive cyber tasks such as reconnaissance, discovery, lateral movement, exploit development, and other agentic steps in real attacks. In internal evaluation, when Fable 5 was set to block rather than fall back and the test did not attempt to evade safeguards, the classifiers stopped progress on those tasks. An external partner found Fable 5 complied with zero harmful single-turn requests on cyberattack planning, exploit development, or defense evasion, including against 30 public jailbreak techniques. Anthropic also says an external bug bounty ran over 1,000 hours without producing a universal jailbreak, though the UK’s AI Security Institute made progress toward one in a brief initial testing window.\u003c/p\u003e\n\n\u003cp\u003eThe article explains why Anthropic treats these capabilities as sensitive by referring to Claude Mythos Preview and Project Glasswing. Anthropic’s red team said Mythos Preview identified and exploited zero-day vulnerabilities in every major operating system and every major web browser when directed by a user. It also autonomously wrote a remote code execution exploit against FreeBSD’s NFS server from a 17-year-old bug, tracked as CVE-2026-4747. Anthropic says these skills emerged as a side effect of improvements in code, reasoning, and autonomy rather than from explicit training for them.\u003c/p\u003e\n\n\u003cp\u003eOn the defensive side, Anthropic and about 50 partners used Mythos Preview in Project Glasswing to find more than ten thousand high- or critical-severity vulnerabilities in systemically important software. Cloudflare found 2,000 bugs, including 400 high- or critical-severity issues, while Mozilla found and fixed 271 issues in Firefox 150. The article says the practical bottleneck has moved from discovery to verification, triage, and patching, and that open-source maintainers have asked Anthropic to slow disclosures because they cannot write patches fast enough.\u003c/p\u003e\n\n\u003cp\u003eAnthropic is also imposing 30-day data retention for all traffic on Fable 5, Mythos 5, and future models at this capability level, across both first- and third-party surfaces. The company says it will not use the data for training or any non-safety purpose, will log all human access, and will delete data after 30 days except where a safety investigation or legal obligation requires longer retention. The article says teams with strict data-handling requirements should account for that retention window before routing sensitive traffic through these models.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eAnthropic released Claude Fable 5 on June 9 as the most capable model it has made generally available. The company also shipped Claude Mythos 5, which uses the same underlying model but removes the cyber safeguards for a vetted group of users. Fable 5 is available through the Claude API, while Mythos 5 is restricted to vetted cyber defenders and critical infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eAnthropic describes Mythos 5 as the strongest cybersecurity model in the world. The launch is unusual because Anthropic split one underlying model into two products based on a layer of safety classifiers rather than on core model capability.\u003c/p\u003e\n\n\u003ch2 id=\"product-split-and-pricing\"\u003eProduct split and pricing\u003c/h2\u003e\n\n\u003cp\u003eFable 5 and Mythos 5 share the same underlying model. The practical distinction is that Fable 5 routes flagged requests in certain categories to Claude Opus 4.8, while Mythos 5 keeps cyber capabilities available for approved users.\u003c/p\u003e\n\n\u003cp\u003eThe flagged categories listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCyber requests.\u003c/li\u003e\n\u003cli\u003eBiology requests.\u003c/li\u003e\n\u003cli\u003eChemistry requests.\u003c/li\u003e\n\u003cli\u003eDistillation requests.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth Fable 5 and Mythos 5 cost \u003cspan class=\"math inline\"\u003e\\(10 per million input tokens and \\)\u003c/span\u003e50 per million output tokens. The article says this is less than half the price of the earlier Mythos Preview. Fable 5 is included on Pro, Max, Team, and seat-based Enterprise plans at no extra cost through June 22, after which it moves to usage credits.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-safeguards-work\"\u003eHow the safeguards work\u003c/h2\u003e\n\n\u003cp\u003eAnthropic uses classifiers as separate AI systems that monitor for misuse and jailbreak attempts. When a request triggers one of these classifiers in Fable 5, the model does not refuse the request outright. Instead, the response is handed to Claude Opus 4.8, and the user is told that the handoff happened.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights distillation as a distinct category among the safeguards. It defines distillation as extracting a model’s capabilities to train a competing model. Anthropic blocks this to prevent near-frontier abilities from leaking out without safeguards attached.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-cyber-classifier\"\u003eScope of the cyber classifier\u003c/h2\u003e\n\n\u003cp\u003eThe cybersecurity classifier is described as broad. Anthropic designed it to block not only exploit development but offensive cyber tasks in general. The article specifically names reconnaissance, discovery, lateral movement, and agentic steps that make up a real attack.\u003c/p\u003e\n\n\u003cp\u003eIn an internal evaluation, Fable 5 was configured to block rather than fall back, and the test did not attempt to evade safeguards. Under those conditions, Anthropic says the classifiers stopped the model from making any progress on the blocked tasks. One external partner found that Fable 5 complied with zero harmful single-turn requests on cyberattack planning, exploit development, or defense evasion, including against 30 different public jailbreak techniques.\u003c/p\u003e\n\n\u003ch2 id=\"false-positives-and-robustness\"\u003eFalse positives and robustness\u003c/h2\u003e\n\n\u003cp\u003eThe article says Anthropic tuned the safeguards conservatively in order to ship quickly, which means they sometimes catch harmless requests. Anthropic says fallback occurs in under 5% of all sessions. The article notes that this figure includes every fallback, including genuine blocks, so it caps total disruption rather than measuring the false-positive rate alone.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says it plans to narrow the safeguards and reduce false positives after launch. On robustness, the article says an external bug bounty ran for more than 1,000 hours and produced no universal jailbreak, meaning no prompt or harness that strips the safeguards wholesale. External red teams also found no universal jailbreak on long-form agentic tasks.\u003c/p\u003e\n\n\u003cp\u003eThe article includes one caveat: the UK’s AI Security Institute made progress toward a universal jailbreak during a brief initial testing window. Anthropic states that fully preventing universal jailbreaks is likely impossible, and says its goal is to make any remaining universal jailbreaks slow and costly enough to catch before they are used at scale.\u003c/p\u003e\n\n\u003ch2 id=\"why-anthropic-treats-the-capability-as-sensitive\"\u003eWhy Anthropic treats the capability as sensitive\u003c/h2\u003e\n\n\u003cp\u003eThe article points to Claude Mythos Preview, which Anthropic released in April to a limited group through Project Glasswing, as the basis for its concern. Anthropic’s red team technical write-up said Mythos Preview identified and exploited zero-day vulnerabilities in every major operating system and every major web browser when directed by a user. The oldest bug it found was described as a 27-year-old flaw in OpenBSD.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Mythos Preview autonomously wrote a remote code execution exploit against FreeBSD’s NFS server from a 17-year-old bug, triaged as CVE-2026-4747. Anthropic described the result as full root access for an unauthenticated attacker from anywhere on the internet. The article notes that NVD’s entry is more measured, saying the stack overflow itself does not require client authentication, while kernel code execution is framed as reachable by an attacker able to send packets to the NFS server while the kgssapi.ko module is loaded.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says it did not explicitly train these capabilities into the model. According to the article, they emerged as a side effect of broader improvements in code, reasoning, and autonomy. The same improvements also make the model better at patching.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-implications-from-project-glasswing\"\u003eDefensive implications from Project Glasswing\u003c/h2\u003e\n\n\u003cp\u003eThe article says the defensive case for these models is not hypothetical. In the first weeks of Project Glasswing, Anthropic and roughly 50 partners used Mythos Preview to find more than ten thousand high- or critical-severity vulnerabilities in systemically important software.\u003c/p\u003e\n\n\u003cp\u003eExamples cited in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloudflare found 2,000 bugs, including 400 high- or critical-severity bugs.\u003c/li\u003e\n\u003cli\u003eMozilla found and fixed 271 bugs in Firefox 150.\u003c/li\u003e\n\u003cli\u003eMozilla’s Firefox 150 result was more than ten times what it found in Firefox 148 using the older Opus 4.6.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAnthropic says similar pressure is visible outside Glasswing in vendors shipping unusually large security releases.\u003c/p\u003e\n\n\u003ch2 id=\"the-new-bottleneck-verification-triage-and-patching\"\u003eThe new bottleneck: verification, triage, and patching\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that finding bugs has become cheaper and faster, while verifying, triaging, and patching them still depends on human time. Anthropic reports that open-source maintainers, already facing low-quality AI-generated bug reports, have asked it to slow disclosures because they cannot write patches fast enough. In Glasswing, Anthropic says a high- or critical-severity model-found bug takes about two weeks to patch on average.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the bottleneck has moved from discovery to the fix. It also emphasizes that the window between public disclosure and a deployed patch is where attackers operate.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s red-team N-day experiments are presented as evidence of the shortened timeline. Starting with only a disclosed CVE and its patch, Mythos Preview built working Linux privilege-escalation exploits in under a day each, at a few thousand dollars or less in compute.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-posture-described-in-the-article\"\u003eRecommended defensive posture described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says defenders should assume that a high-severity CVE can become a working exploit within hours of disclosure, not weeks. It says this makes auto-update paths for internet-facing systems a priority. It also says dependency bumps that carry CVE fixes should be treated as time-sensitive work rather than backlog items.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies MFA and comprehensive logging as baseline controls. Its stated reason is that a single missed patch should not become the only thing standing between an attacker and the network.\u003c/p\u003e\n\n\u003ch2 id=\"access-program-for-legitimate-offensive-work\"\u003eAccess program for legitimate offensive work\u003c/h2\u003e\n\n\u003cp\u003eAnthropic has opened a Cyber Verification Program. The article says this program lets vetted security professionals use Anthropic’s models for legitimate offensive work without the cyber safeguards. Anthropic also plans to widen Mythos 5 access through a trusted-access program.\u003c/p\u003e\n\n\u003ch2 id=\"data-retention-requirement\"\u003eData retention requirement\u003c/h2\u003e\n\n\u003cp\u003eAnthropic is changing data handling for Mythos-class models. It will require 30-day retention for all traffic on Fable 5, Mythos 5, and future models at this capability level. This applies across both first-party and third-party surfaces.\u003c/p\u003e\n\n\u003cp\u003eAnthropic says it will not use this data for training or any non-safety purpose. It also says it will log all human access and delete the data after 30 days, except where a safety investigation or legal obligation requires holding it longer.\u003c/p\u003e\n\n\u003cp\u003eThe stated reason for the retention requirement is defensive. Anthropic says the retained data helps detect novel attacks and jailbreaks that operate across many requests. The article says teams with strict data-handling requirements should account for the retention window before sending sensitive traffic through these models.\u003c/p\u003e\n\n\u003ch2 id=\"larger-industry-question-raised-by-the-launch\"\u003eLarger industry question raised by the launch\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by saying Anthropic plans to fold Fable 5 back into subscription plans without the usage-credit premium once compute capacity catches up. It also says the broader issue is that similarly capable models from other labs are coming. The article’s final point is that not all such models may ship with comparable classifier safeguards, and that the defensive head start from Project Glasswing only matters if the rest of the industry uses it.\u003c/p\u003e\n","keyPoints":["Anthropic released Claude Fable 5 to the public and kept its cyber-unrestricted twin, Claude Mythos 5, limited to vetted cyber defenders and critical infrastructure operators.","Claude Fable 5 uses safety classifiers that route flagged cyber, biology, chemistry, and distillation requests to the weaker Claude Opus 4.8 instead of refusing them outright.","Anthropic says Mythos-class models can find and exploit software vulnerabilities well enough that unrestricted public access would give attackers serious uplift.","During Project Glasswing, Anthropic and roughly 50 partners used Claude Mythos Preview to find more than ten thousand high- or critical-severity vulnerabilities in systemically important software.","Anthropic will require 30-day data retention for all traffic on Fable 5, Mythos 5, and future models at this capability level, while saying the data will not be used for training or non-safety purposes."],"insights":["Anthropic’s fallback design means most users still receive Mythos-level capability in ordinary sessions, because the company says all safeguard-triggered fallbacks occur in under 5% of sessions.","The main defensive bottleneck described in the article is no longer finding serious bugs but verifying, triaging, and patching them, with Glasswing high- or critical-severity findings taking about two weeks to patch on average.","The article says defenders should assume a high-severity CVE can become a working exploit within hours of disclosure, because Mythos Preview built Linux privilege-escalation exploits from disclosed CVEs and patches in under a day each.","Anthropic’s own testing found no universal jailbreak after more than 1,000 hours of external bug bounty work, but the company still acknowledges that fully preventing universal jailbreaks is likely impossible.","Teams with strict data-handling requirements may need to avoid or carefully govern Fable 5 and Mythos 5 usage because Anthropic now requires 30-day retention for all traffic on these capability-level models."],"referencedReports":[{"title":"Claude Mythos Preview","url":"https://red.anthropic.com/2026/mythos-preview/","publisher":"Anthropic Red Team","context":"The article identifies this as Anthropic's red team technical write-up explaining Mythos Preview's vulnerability discovery and exploitation capabilities.","category":"","primary":false},{"title":"CVE-2026-4747","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-4747","publisher":"National Vulnerability Database","context":"The article cites NVD's entry for CVE-2026-4747 to contrast Anthropic's description of the FreeBSD NFS server issue with NVD's more measured framing.","category":"","primary":false}],"body":"\u003cp\u003eAnthropic released Claude Fable 5 on June 9 as its most capable public model, while keeping its cyber-unrestricted twin, Claude Mythos 5, limited to vetted cyber defenders and critical infrastructure operators. The two products use the same underlying model, but Fable 5 includes safety classifiers that route certain flagged requests away from the full-capability model. Anthropic calls Mythos 5 the strongest cybersecurity model in the world.\u003c/p\u003e\n\n\u003cp\u003eFable 5 routes flagged cyber, biology, chemistry, and distillation requests to the weaker Claude Opus 4.8, while Mythos 5 keeps cyber capabilities available for approved users. Anthropic says the safeguards are meant to reduce attacker uplift from models that can find and exploit software vulnerabilities. The company reports that fallback occurs in under 5% of all sessions, while more than 95% of sessions behave like the cyber-unrestricted Mythos 5.\u003c/p\u003e\n\n\u003cp\u003eThe launch follows Project Glasswing, where Anthropic and roughly 50 partners used Mythos Preview to find more than ten thousand high- or critical-severity vulnerabilities in systemically important software. The article emphasizes that the bottleneck has shifted from finding bugs to verifying, triaging, and patching them, with high- or critical-severity model-found bugs taking about two weeks to patch on average. Anthropic is also requiring 30-day retention for traffic on Fable 5, Mythos 5, and future models at this capability level for safety purposes.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {

  return (
    <nav className="swipe-nav" style={{

    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
