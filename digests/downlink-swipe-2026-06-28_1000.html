<script type="application/json" id="dl-articles">[{"n":1,"title":"Legal Threat in Your Inbox: How a Gmail Shortlink Hides a Credential-Harvest Destination","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/legal-threat-gmail-shortlink-attacker-domain-credential-harvest","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"A phishing email posing as a bilingual legal notice used a legitimate Gmail account and a short.gy link to hide a malicious credential-harvesting domain, allowing SPF, DKIM, DMARC, and basic URL reputation checks to appear clean. The key lesson is that defenders must analyze sender context and follow shortened URLs through the full redirect chain to detect these attacks.","briefOverview":"\u003cp\u003eAn anonymized sender using a personal Gmail account sent a mass-BCC email with a bilingual Hebrew and English subject line that presented the message as a legal notice. The sender claimed a professional title, but the account had no prior contact history with the targeted organization. The message contained no attached lawsuit and instead included a single short.gy URL shortener link.\u003c/p\u003e\n\n\u003cp\u003eThe shortener link \u003ccode\u003euepk9u.short[.]gy/DJp0Jm\u003c/code\u003e resolved to \u003ccode\u003ehxxps://feature[.]chongdaotang[.]net/Wx6Ld3KlNmuU4tT@tDVpJltq5/\u003c/code\u003e, which IRONSCALES link analysis rated Malicious. The article says short.gy is a legitimate URL shortening product with clean reputation, meaning checks that evaluated only the shortener could miss the attacker-controlled destination. The domain \u003ccode\u003echongdaotang[.]net\u003c/code\u003e was registered in November 2023 and was privacy-protected at the time of analysis.\u003c/p\u003e\n\n\u003cp\u003eSPF, DKIM, and DMARC all passed because the email genuinely originated from Google infrastructure through a real Gmail account. IRONSCALES Adaptive AI flagged the message at 90% confidence as a “Legal Threat Lure” based on the combination of a first-contact sender, high-pressure legal framing, BCC delivery, a personal free-mail account, and a shortened link resolving to a malicious destination. The article emphasizes that defenses need to follow shortened URLs through the full redirect chain rather than scoring only the hostname visible in the email body.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An anonymized sender using a personal Gmail account sent a mass-BCC email with a bilingual Hebrew and English subject line that framed the message as a legal notice.","The email body contained a short.gy shortener link, uepk9u.short.gy/DJp0Jm, which resolved to hxxps://feature.chongdaotang.net/Wx6Ld3KlNmuU4tT@tDVpJltq5/.","IRONSCALES link analysis rated the resolved destination on chongdaotang.net as Malicious, while the short.gy shortener domain itself carried clean reputation with major URL scanning services.","SPF, DKIM, and DMARC all passed because the message genuinely originated from Google infrastructure through a real Gmail account.","IRONSCALES Adaptive AI flagged the message at 90% confidence based on signals including a first-contact sender, a URL-shortener-wrapped attacker domain, high-pressure legal-threat framing, and BCC delivery."],"insights":["A clean SPF, DKIM, and DMARC result did not reduce the risk in this case because the attacker used real Google sending infrastructure rather than spoofing a domain.","URL reputation checks that stop at the shortener can miss the threat entirely because they evaluate short.gy, a legitimate service, instead of the malicious final destination.","The article identifies mass-BCC delivery as an important warning sign because legitimate legal notices should be addressed to a specific recipient rather than hidden among undisclosed recipients.","The strongest detection signal came from the mismatch between the sender’s claimed legal authority and the actual use of a personal free-mail account with no prior relationship to the organization.","The article recommends following shortened links through the full redirect chain before scoring them, since the attacker’s malicious infrastructure only appears after the redirect completes."],"referencedReports":[{"title":"Verizon DBIR 2026","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the Verizon DBIR 2026 as reporting that phishing remains the dominant initial access vector in social engineering breaches.","category":"research","primary":false},{"title":"Spearphishing Link, Technique T1566.002","url":"https://attack.mitre.org/techniques/T1566/002/","publisher":"MITRE ATT\u0026CK","context":"The article references MITRE ATT\u0026CK to classify the delivery pattern as Spearphishing Link, T1566.002.","category":"research","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article cites CISA guidance advising recipients to verify unexpected legal contact through official channels before following embedded links.","category":"guide","primary":false}],"body":"\u003cp\u003eAn anonymized sender using a personal Gmail account sent a mass-BCC email with a bilingual Hebrew and English subject line that presented the message as a legal notice. The sender claimed a professional title, but the account had no prior contact history with the targeted organization. The message contained no attached lawsuit and instead included a single short.gy URL shortener link.\u003c/p\u003e\n\n\u003cp\u003eThe shortener link \u003ccode\u003euepk9u.short[.]gy/DJp0Jm\u003c/code\u003e resolved to \u003ccode\u003ehxxps://feature[.]chongdaotang[.]net/Wx6Ld3KlNmuU4tT@tDVpJltq5/\u003c/code\u003e, which IRONSCALES link analysis rated Malicious. The article says short.gy is a legitimate URL shortening product with clean reputation, meaning checks that evaluated only the shortener could miss the attacker-controlled destination. The domain \u003ccode\u003echongdaotang[.]net\u003c/code\u003e was registered in November 2023 and was privacy-protected at the time of analysis.\u003c/p\u003e\n\n\u003cp\u003eSPF, DKIM, and DMARC all passed because the email genuinely originated from Google infrastructure through a real Gmail account. IRONSCALES Adaptive AI flagged the message at 90% confidence as a “Legal Threat Lure” based on the combination of a first-contact sender, high-pressure legal framing, BCC delivery, a personal free-mail account, and a shortened link resolving to a malicious destination. The article emphasizes that defenses need to follow shortened URLs through the full redirect chain rather than scoring only the hostname visible in the email body.\u003c/p\u003e\n"}]</script>
