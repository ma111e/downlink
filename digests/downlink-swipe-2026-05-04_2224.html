<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

window.__DL_ARTICLES = [{"n":1,"title":"Amazon SES increasingly abused in phishing to evade detection","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/amazon-ses-increasingly-abused-in-phishing-to-evade-detection/","time":"20:03","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Threat actors are exploiting leaked AWS credentials to abuse Amazon SES for high-quality phishing campaigns that bypass standard email authentication filters, making detection and blocking extremely difficult. To mitigate this, organizations must enforce strict credential management, least-privilege access, and multi-factor authentication.","briefOverview":"\u003cp\u003eThreat actors are increasingly abusing Amazon SES to send convincing phishing emails that bypass standard security filters and reputation-based blocks.\u003c/p\u003e\n\n\u003cp\u003eThis recent surge is primarily driven by automated bots scanning public assets like GitHub repositories and S3 buckets for leaked AWS credentials.\u003c/p\u003e\n\n\u003cp\u003eOnce obtained, attackers validate permissions and dispatch high-quality phishing messages that mimic legitimate services such as DocuSign.\u003c/p\u003e\n\n\u003cp\u003eThese campaigns often include fabricated email threads and fake invoices designed to facilitate business email compromise.\u003c/p\u003e\n\n\u003cp\u003eBecause Amazon SES automatically satisfies authentication protocols like SPF, DKIM, and DMARC, traditional email gateways struggle to flag these messages.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers recommend that organizations enforce strict IAM permissions, enable multi-factor authentication, and regularly rotate access keys.\u003c/p\u003e\n\n\u003cp\u003eAWS has also published guidance on securing accounts against unauthorized credential usage and directs users to report suspected abuse to its Trust \u0026amp; Safety team.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Amazon Simple Email Service is experiencing a significant increase in malicious abuse, allowing threat actors to distribute convincing phishing emails that evade standard detection mechanisms.\u003c/p\u003e\n\n\u003cp\u003eWhile the platform has been leveraged for attacks before, the current spike correlates with a large volume of AWS Identity and Access Management access keys exposed in publicly accessible locations.\u003c/p\u003e\n\n\u003cp\u003eKaspersky researchers have documented this trend, noting that attackers are using the service to deliver links that redirect victims to malicious websites.\u003c/p\u003e\n\n\u003cp\u003eThe primary catalyst for this abuse is the automated discovery of credentials through tools like TruffleHog, which scan GitHub repositories, .ENV files, Docker images, backups, and S3 buckets.\u003c/p\u003e\n\n\u003cp\u003eThreat actors have streamlined the entire attack lifecycle by automating secret scanning, permission validation, and email distribution.\u003c/p\u003e\n\n\u003cp\u003eThis automation enables them to dispatch massive volumes of phishing messages without manual intervention.\u003c/p\u003e\n\n\u003cp\u003eThe resulting campaigns feature high-quality custom HTML templates that replicate real service interfaces and realistic login flows.\u003c/p\u003e\n\n\u003cp\u003eSpecific attack vectors include fake document-signing notifications that direct users to AWS-hosted phishing pages, as well as advanced business email compromise schemes.\u003c/p\u003e\n\n\u003cp\u003ePerpetrators fabricate entire email threads and generate fake invoices to trick finance departments into processing fraudulent payments.\u003c/p\u003e\n\n\u003cp\u003eSince Amazon SES inherently passes authentication checks, attackers no longer need to worry about SPF, DKIM, or DMARC compliance.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, traditional mitigation strategies like blocking offending IP addresses are ineffective because doing so would disrupt all legitimate traffic routed through the service.\u003c/p\u003e\n\n\u003cp\u003eTo combat this, researchers advise implementing least-privilege IAM policies, enabling multi-factor authentication, rotating keys frequently, and applying IP-based access restrictions.\u003c/p\u003e\n\n\u003cp\u003eAWS has responded by pointing to its official security guidance on exposed credentials and encouraging users to report suspicious activity to AWS Trust \u0026amp; Safety.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eThreat Overview\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe Amazon Simple Email Service is experiencing a significant increase in malicious abuse.\u003c/p\u003e\n\n\u003cp\u003eThreat actors are leveraging the platform to distribute convincing phishing emails that bypass standard security filters.\u003c/p\u003e\n\n\u003cp\u003eWhile past incidents occurred, the current spike correlates directly with exposed AWS Identity and Access Management access keys.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAutomated Credential Discovery\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eResearchers pinpoint the main catalyst as automated bots scanning public digital assets.\u003c/p\u003e\n\n\u003cp\u003eThese tools utilize utilities like TruffleHog to systematically search for leaked secrets.\u003c/p\u003e\n\n\u003cp\u003eTargets include GitHub repositories, .ENV files, Docker images, backups, and publicly accessible S3 buckets.\u003c/p\u003e\n\n\u003cp\u003eOnce credentials are found, attackers automate permission validation and email distribution.\u003c/p\u003e\n\n\u003cp\u003eThis streamlined workflow enables the dispatch of massive phishing volumes without manual intervention.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCampaign Characteristics\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe resulting phishing operations feature high-quality custom HTML templates that replicate legitimate service interfaces.\u003c/p\u003e\n\n\u003cp\u003eMessages are designed to mimic realistic login flows and establish immediate credibility.\u003c/p\u003e\n\n\u003cp\u003eSpecific observed tactics include fake document-signing notifications that impersonate DocuSign.\u003c/p\u003e\n\n\u003cp\u003eThese emails direct recipients to AWS-hosted phishing pages for credential harvesting.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, advanced business email compromise schemes are prevalent.\u003c/p\u003e\n\n\u003cp\u003ePerpetrators fabricate entire email threads and generate fake invoices to trick finance departments.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Evasion and Operational Challenges\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eRouting emails through Amazon SES allows attackers to completely bypass standard authentication protocols.\u003c/p\u003e\n\n\u003cp\u003eThe service automatically satisfies SPF, DKIM, and DMARC checks, ensuring messages pass through email gateways.\u003c/p\u003e\n\n\u003cp\u003eThis creates a significant operational challenge for security teams.\u003c/p\u003e\n\n\u003cp\u003eTraditional mitigation strategies, such as blocking offending IP addresses, are ineffective.\u003c/p\u003e\n\n\u003cp\u003eDoing so would disrupt all legitimate traffic routed through the platform.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDefensive Recommendations\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eResearchers advise implementing strict security controls to mitigate this threat.\u003c/p\u003e\n\n\u003cp\u003eOrganizations should enforce the following measures:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestrict IAM permissions based on least-privilege principles\u003c/li\u003e\n\u003cli\u003eEnable multi-factor authentication across all accounts\u003c/li\u003e\n\u003cli\u003eRegularly rotate access keys to limit exposure windows\u003c/li\u003e\n\u003cli\u003eApply IP-based access restrictions and encryption controls\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAWS has published official guidance on securing accounts against unauthorized credential usage.\u003c/p\u003e\n\n\u003cp\u003eThe company also directs users to report suspected abusive activity to its Trust \u0026amp; Safety team.\u003c/p\u003e\n","keyPoints":["Threat actors are exploiting leaked AWS credentials to abuse Amazon SES for sending phishing emails that bypass standard authentication checks like SPF, DKIM, and DMARC.","The recent spike in abuse is driven by automated bots scanning public assets such as GitHub repositories and S3 buckets for exposed access keys.","Attackers are deploying high-quality phishing campaigns that mimic legitimate services like DocuSign and facilitate business email compromise through fabricated invoices.","Security researchers advise organizations to restrict IAM permissions, enable multi-factor authentication, regularly rotate keys, and apply IP-based access controls.","Blocking offending IP addresses is not a viable mitigation strategy because it would disrupt legitimate email traffic delivered through Amazon SES."],"insights":["Blocking malicious source IPs is operationally unviable because it would disrupt all legitimate traffic routed through Amazon SES, forcing defenders to prioritize credential hygiene over network-level blocking.","Attackers are automating the entire compromise lifecycle using secret-scanning tools like TruffleHog to discover credentials, validate permissions, and dispatch emails, rendering manual key audits ineffective.","Because Amazon SES automatically satisfies SPF, DKIM, and DMARC authentication requirements, traditional email gateways will not flag these messages, necessitating behavioral or content-based detection instead."],"referencedReports":[{"title":"Amazon SES phishing and BEC attacks","url":"https://securelist.com/amazon-ses-phishing-and-bec-attacks/119623/","publisher":"Kaspersky","context":"The article cites this report where Kaspersky researchers document an uptick in phishing attacks leveraging Amazon SES to deliver malicious links."},{"title":"How AWS responds to exposed credentials and how you can protect your account","url":"https://www.repost.aws/articles/ARoBXj63rWSt2Ww7XKlVV72g/how-aws-responds-to-exposed-credentials-and-how-you-can-protect-your-account","publisher":"AWS","context":"The article references this security guidance provided by Amazon regarding the response to exposed credentials and account protection measures."}],"body":"\u003cp\u003eThreat actors are increasingly abusing Amazon SES to send convincing phishing emails that bypass standard security filters and reputation-based blocks.\u003c/p\u003e\n\n\u003cp\u003eThis recent surge is primarily driven by automated bots scanning public assets like GitHub repositories and S3 buckets for leaked AWS credentials.\u003c/p\u003e\n\n\u003cp\u003eOnce obtained, attackers validate permissions and dispatch high-quality phishing messages that mimic legitimate services such as DocuSign.\u003c/p\u003e\n\n\u003cp\u003eThese campaigns often include fabricated email threads and fake invoices designed to facilitate business email compromise.\u003c/p\u003e\n\n\u003cp\u003eBecause Amazon SES automatically satisfies authentication protocols like SPF, DKIM, and DMARC, traditional email gateways struggle to flag these messages.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers recommend that organizations enforce strict IAM permissions, enable multi-factor authentication, and regularly rotate access keys.\u003c/p\u003e\n\n\u003cp\u003eAWS has also published guidance on securing accounts against unauthorized credential usage and directs users to report suspected abuse to its Trust \u0026amp; Safety team.\u003c/p\u003e\n"},{"n":2,"title":"Phishing Campaign Hits 80+ Orgs Using SimpleHelp and ScreenConnect RMM Tools","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/phishing-campaign-hits-80-orgs-using.html","time":"18:06","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"An active phishing campaign has compromised over 80 organizations by deploying legitimate SimpleHelp and ScreenConnect RMM tools to establish redundant, persistent remote access that evades detection due to valid software signatures.","briefOverview":"\u003cp\u003eAn active phishing campaign codenamed VENOMOUS#HELPER has impacted over 80 organizations, predominantly located in the United States. The threat actors use emails impersonating the U.S. Social Security Administration to trick recipients into downloading a disguised executable. This payload installs the SimpleHelp remote monitoring tool as a persistent Windows service equipped with a self-healing watchdog. The malware actively monitors security products every 67 seconds and polls user presence every 23 seconds to maintain stealth. Attackers leverage legitimately signed RMM software to escalate privileges and establish full interactive desktop access. To ensure redundancy, the campaign also deploys ConnectWise ScreenConnect as a fallback communication channel. This dual-tool architecture allows operators to silently execute commands, transfer files, and pivot across networks while evading standard antivirus detections.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAccording to a Securonix report, an active phishing campaign known as VENOMOUS#HELPER has compromised more than 80 organizations across the United States. Security researchers note that this activity overlaps with clusters previously tracked by Red Canary and Sophos, which labeled similar operations STAC6405. While the exact threat actor remains unidentified, the campaign aligns with financially motivated initial access brokers or ransomware precursor groups. The attack initiates with a phishing email impersonating the U.S. Social Security Administration, directing victims to verify their credentials and download a purported SSA statement. The embedded link routes to a compromised Mexican business website, a deliberate tactic designed to bypass email spam filters. From there, a second attacker-controlled domain hosts a JWrapper-packaged Windows executable disguised as a document. Once executed, the malware installs SimpleHelp as a Windows service with Safe Mode persistence. It maintains operation through a self-healing watchdog that automatically restarts the process if terminated. The payload also enumerates registered security products via the root\\SecurityCenter2 WMI namespace every 67 seconds and polls for user presence every 23 seconds. To achieve full interactive desktop access, the client acquires SeDebugPrivilege through AdjustTokenPrivileges and utilizes the legitimate elev_win.exe binary to gain SYSTEM-level privileges. This elevation grants operators the ability to read screens, inject keystrokes, and access user-context resources. If the SimpleHelp channel is blocked, the threat actors deploy ConnectWise ScreenConnect to establish a redundant fallback communication mechanism. The deployed SimpleHelp version 5.0.1 provides comprehensive remote administration capabilities, including bidirectional file transfers and silent command execution. Because the software is legitimately signed by a reputable vendor, standard antivirus and signature-based controls fail to detect the malicious activity. This setup allows attackers to return at any time, execute commands silently within the user desktop session, and pivot to adjacent systems without triggering alerts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eCampaign Overview\u003c/strong\u003e\nAn active phishing campaign codenamed VENOMOUS#HELPER has impacted over 80 organizations, predominantly located in the United States. The activity was documented by Securonix researchers Akshay Gaikwad, Shikha Sangwan, and Aaron Beardslee. Threat intelligence analysis indicates significant overlap with clusters previously tracked by Red Canary and Sophos, the latter of which assigned the identifier STAC6405. Although attribution remains unclear, the operational pattern strongly suggests a financially motivated initial access broker or a ransomware precursor operation.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInitial Access and Delivery\u003c/strong\u003e\nThe campaign begins with a phishing email impersonating the U.S. Social Security Administration. Recipients are instructed to verify their email addresses and download a purported SSA statement via an embedded link. This link directs users to a legitimate but compromised Mexican business website, specifically gruta.com.mx, to deliberately evade email spam filters. A second attacker-controlled domain, server.cubatiendaalimentos.com.mx, hosts the malicious payload. The file is a JWrapper-packaged Windows executable disguised as a document, believed to be staged by an attacker who gained access to a single cPanel user account on the hosting server.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePersistence and Evasion\u003c/strong\u003e\nUpon execution, the malware installs the SimpleHelp remote monitoring tool as a Windows service with Safe Mode persistence. It employs a self-healing watchdog that automatically restarts the process whenever it is terminated. To monitor for detection, the malware periodically enumerates registered security products using the root\\SecurityCenter2 WMI namespace every 67 seconds. It simultaneously polls for user presence every 23 seconds. The threat actors rely on the fact that these RMM tools are legitimately installed and signed by reputable vendors, allowing them to bypass standard antivirus and signature-based controls.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePrivilege Escalation and Capabilities\u003c/strong\u003e\nThe SimpleHelp remote access client acquires SeDebugPrivilege through the AdjustTokenPrivileges API to facilitate fully interactive desktop access. Attackers utilize elev_win.exe, a legitimate executable associated with the software, to escalate privileges to SYSTEM level. This elevation enables operators to perform the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRead the victim screen and inject keystrokes\u003c/li\u003e\n\u003cli\u003eAccess user-context resources and transfer files bidirectionally\u003c/li\u003e\n\u003cli\u003eExecute commands silently within the desktop session and pivot to adjacent systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRedundancy Architecture\u003c/strong\u003e\nA defining characteristic of this campaign is the deployment of both SimpleHelp and ConnectWise ScreenConnect. After gaining initial access through SimpleHelp, operators download and install ScreenConnect to create a redundant dual-channel access architecture. This fallback communication mechanism ensures continued remote operations even if the primary SimpleHelp channel is detected and blocked by security teams. The combination of these tools allows attackers to maintain persistent, undetected access while leveraging the trusted signatures of both vendors to evade detection.\u003c/p\u003e\n","keyPoints":["The VENOMOUS#HELPER phishing campaign has impacted over 80 organizations primarily in the U.S. through emails impersonating the Social Security Administration.","A disguised executable downloaded via compromised websites installs the SimpleHelp RMM tool as a persistent Windows service with a self-healing watchdog.","Attackers use legitimate software components to escalate privileges to SYSTEM level, enabling fully interactive desktop access and screen monitoring.","The campaign establishes a redundant dual-channel access architecture by deploying both SimpleHelp and ConnectWise ScreenConnect to maintain operations if one tool is blocked.","Legitimately signed RMM software is leveraged to bypass standard antivirus and signature-based security controls."],"insights":["The threat actor establishes a redundant dual-channel access architecture by deploying both SimpleHelp and ScreenConnect to ensure continued remote access if one tool is blocked.","The malware actively enumerates registered security products via the root\\SecurityCenter2 WMI namespace every 67 seconds to monitor for detection.","Attackers utilize the legitimate elev_win.exe executable associated with SimpleHelp to escalate privileges to SYSTEM level, enabling full interactive desktop control.","The campaign leverages legitimately signed RMM software to bypass standard antivirus controls, masking malicious activity behind trusted vendor signatures."],"referencedReports":[{"title":"Phishing RMM Tools","url":"https://redcanary.com/blog/threat-intelligence/phishing-rmm-tools/","publisher":"Red Canary","context":"The article references clusters previously tracked by this Red Canary threat intelligence research."},{"title":"Venomous Helper Phishing Campaign","url":"https://www.securonix.com/blog/venomous-helper-phishing-campaign","publisher":"Securonix","context":"The article cites this Securonix report where researchers detail the campaign's tactics and findings."}],"body":"\u003cp\u003eAn active phishing campaign codenamed VENOMOUS#HELPER has impacted over 80 organizations, predominantly located in the United States. The threat actors use emails impersonating the U.S. Social Security Administration to trick recipients into downloading a disguised executable. This payload installs the SimpleHelp remote monitoring tool as a persistent Windows service equipped with a self-healing watchdog. The malware actively monitors security products every 67 seconds and polls user presence every 23 seconds to maintain stealth. Attackers leverage legitimately signed RMM software to escalate privileges and establish full interactive desktop access. To ensure redundancy, the campaign also deploys ConnectWise ScreenConnect as a fallback communication channel. This dual-tool architecture allows operators to silently execute commands, transfer files, and pivot across networks while evading standard antivirus detections.\u003c/p\u003e\n"}];

const TIME_WINDOW  = window.__DL_WINDOW;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"

        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
