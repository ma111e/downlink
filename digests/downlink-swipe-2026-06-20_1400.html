ler targeting Windows, Linux, and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware collected host information, browser histories, installed applications, and running processes, and checked for 166 cryptocurrency wallet browser extensions including MetaMask, Phantom, Coinbase Wallet, Binance Wallet, and TronLink. It used operating-system-specific persistence methods such as Windows Registry Run keys, macOS LaunchAgents, and Linux systemd services. Microsoft said systems that contacted the attackers’ command-and-control servers showed follow-on activity associated with Sapphire Sleet, including a PowerShell backdoor, Microsoft Defender exclusions, and a malicious Windows service granting SYSTEM privileges.\u003c/p\u003e\n"},{"n":2,"title":"New Prinz Eugen ransomware prioritizes recent files for encryption","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-prinz-eugen-ransomware-prioritizes-recent-files-for-encryption/","time":"15:23","priority":"SHOULD READ","score":82,"tldr":"Prinz Eugen is a new hands-on ransomware operation that likely uses stolen RDP credentials and legitimate RMM tools, then encrypts the most recently modified files first to maximize disruption. The malware leaves no ransom note, self-deletes, and moves extortion communications out-of-band to reduce forensic traces.","briefOverview":"\u003cp\u003eA new ransomware operation named Prinz Eugen prioritizes recently modified files for encryption and leaves no ransom note on infected systems. Threatdown, Malwarebytes’ enterprise cybersecurity arm, found that the attackers use a hands-on-keyboard style and prefer legitimate remote monitoring and management software and living-off-the-land tools. Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, \u003ccode\u003eservertool.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIn an investigated incident, the attackers used the RemotePC RMM tool and a backdoor administrator account for persistence. Prinz Eugen is not currently operating as ransomware-as-a-service, and its developers are not currently recruiting affiliates. Its data leak site lists three victims, but Threatdown identified at least five victims and said the Standard Bank attacker demanded 1 BTC and was refused.\u003c/p\u003e\n\n\u003cp\u003eThe Go-based encryptor recursively scans directories with no depth limit or exclusions and encrypts virtually every file except those with the \u003ccode\u003e.prinzeugen\u003c/code\u003e extension. It uses ChaCha20-Poly1305 encryption, a 32-byte master key, random initialization vectors for each file, and key derivation based on Argon2id, SHA-256, and HKDF-SHA256. Threatdown said the lack of a ransom note can reduce forensic artifacts and move ransom communications to email, phone contact, or dark-web victim portals.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threatdown found that the new Prinz Eugen ransomware operation prioritizes recently modified files for encryption and does not leave a ransom note on infected systems.","Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, servertool.exe.","In one investigated incident, attackers used the RemotePC remote monitoring and management tool and a backdoor administrator account for persistence.","The Go-based encryptor recursively scans directories without a depth limit or exclusions and encrypts virtually every file except those ending in .prinzeugen.","Threatdown identified at least five Prinz Eugen victims and said that in the Standard Bank breach the attacker demanded 1 BTC and was refused."],"insights":["Prinz Eugen’s choice to encrypt the most recently modified files first is an impact-focused strategy because those files are more likely to be actively used and business-critical.","The lack of a ransom note is intentional rather than an omission, as Threatdown says it reduces forensic artifacts and pushes ransom communication to email, phone contact, or dark-web victim portals.","The encryptor checks that a file can be decrypted before deleting the original when the --delete flag is used, showing the malware is designed to avoid corrupting files in a way that would prevent recovery after payment.","Prinz Eugen attempts to prevent key recovery by overwriting the encryption key with zeroes, forcing garbage collection, and self-deleting from disk."],"referencedReports":[{"title":"Prinz Eugen ransomware: a deep dive into a new Go-based encryptor","url":"https://www.threatdown.com/blog/prinz-eugen-ransomware-a-deep-dive-into-a-new-go-based-encryptor/","publisher":"Threatdown","context":"The article cites Threatdown researchers’ technical analysis of Prinz Eugen’s encryption behavior, lack of ransom note, and operational tactics.","category":"","primary":false}],"body":"\u003cp\u003eA new ransomware operation named Prinz Eugen prioritizes recently modified files for encryption and leaves no ransom note on infected systems. Threatdown, Malwarebytes’ enterprise cybersecurity arm, found that the attackers use a hands-on-keyboard style and prefer legitimate remote monitoring and management software and living-off-the-land tools. Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, \u003ccode\u003eservertool.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIn an investigated incident, the attackers used the RemotePC RMM tool and a backdoor administrator account for persistence. Prinz Eugen is not currently operating as ransomware-as-a-service, and its developers are not currently recruiting affiliates. Its data leak site lists three victims, but Threatdown identified at least five victims and said the Standard Bank attacker demanded 1 BTC and was refused.\u003c/p\u003e\n\n\u003cp\u003eThe Go-based encryptor recursively scans directories with no depth limit or exclusions and encrypts virtually every file except those with the \u003ccode\u003e.prinzeugen\u003c/code\u003e extension. It uses ChaCha20-Poly1305 encryption, a 32-byte master key, random initialization vectors for each file, and key derivation based on Argon2id, SHA-256, and HKDF-SHA256. Threatdown said the lack of a ransom note can reduce forensic artifacts and move ransom communications to email, phone contact, or dark-web victim portals.\u003c/p\u003e\n"}]</script>
