<script>
window.__DL_ARTICLES = [{"n":4,"title":"Critical Splunk Enterprise Flaw Lets Attackers Run Code Without Authentication","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/critical-splunk-enterprise-flaw-lets.html","time":"13:23","priority":"MUST READ","score":94,"tldr":"Splunk patched a critical Splunk Enterprise flaw, CVE-2026-20253, that could let unauthenticated attackers perform arbitrary file operations and potentially achieve remote code execution through exposed PostgreSQL sidecar endpoints. Affected users should upgrade to Splunk Enterprise 10.0.7 or 10.2.4 immediately; Splunk Cloud is not affected.","briefOverview":"\u003cp\u003eSplunk released security updates for a critical Splunk Enterprise vulnerability tracked as CVE-2026-20253. The flaw is rated 9.8 on the CVSS scoring system and can allow unauthenticated file operations. Splunk said the issue exists in a PostgreSQL sidecar service endpoint that lacks authentication controls.\u003c/p\u003e\n\n\u003cp\u003eAffected versions include Splunk Enterprise 10.0.0 to 10.0.6 and 10.2.0 to 10.2.3, with fixes available in 10.0.7 and 10.2.4. Splunk Enterprise 10.4 is not affected, and Splunk Cloud is not impacted because it does not use Postgres sidecars. The article emphasizes that users should apply the fixes quickly.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs published technical details showing how the issue can be exploited for pre-authenticated remote code execution through the /v1/postgres/recovery/backup and /v1/postgres/recovery/restore endpoints. The described chain involves writing attacker-controlled database content to the Splunk file system and using PostgreSQL restore behavior to execute SQL. The article says there is no evidence of exploitation in the wild, but exploit specifics are now public.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSplunk has issued security updates for CVE-2026-20253, a critical Splunk Enterprise flaw rated 9.8 on the CVSS scoring system. The vulnerability allows an unauthenticated user to create or truncate arbitrary files through a PostgreSQL sidecar service endpoint. Splunk said the endpoint lacks authentication controls, allowing any network-reachable user to invoke file operations without credentials.\u003c/p\u003e\n\n\u003cp\u003eThe affected products are Splunk Enterprise 10.0.0 through 10.0.6 and 10.2.0 through 10.2.3. The issue is fixed in Splunk Enterprise 10.0.7 and 10.2.4, while Splunk Enterprise 10.4 is listed as not affected. Splunk Cloud is not impacted because Postgres sidecars are not used in that product.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs released additional technical details explaining how CVE-2026-20253 could lead to pre-authenticated remote code execution. The analysis focuses on the /v1/postgres/recovery/backup and /v1/postgres/recovery/restore endpoints. The attack chain involves connecting to an attacker-controlled database, dumping contents into an arbitrary file, and restoring the dump into the local PostgreSQL instance using a passfile argument pointing to Splunk’s .pgpass file.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that SQL queries in the attacker-controlled database dump can be executed by Splunk’s PostgreSQL instance during restoration. An attacker could define a PostgreSQL function using lo_export to write attacker-controlled content to a file on the file system. This creates an arbitrary file write primitive on the Splunk file system.\u003c/p\u003e\n\n\u003cp\u003eWith file write access, the article says an attacker could escalate to remote code execution by overwriting a Python script that Splunk frequently executes, such as /opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py. The disclosed sequence includes creating a database that allows passwordless authentication, using the backup endpoint to place a dump on the Splunk file system, and using the restore endpoint to trigger execution of malicious SQL. Splunk said there is no evidence of exploitation in the wild, but the article warns that public exploit details may encourage opportunistic attempts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSplunk released security updates to address CVE-2026-20253, a critical vulnerability in Splunk Enterprise. The flaw is rated 9.8 on the CVSS scoring system. According to Splunk, the issue allows unauthenticated file operations through a PostgreSQL sidecar service endpoint.\u003c/p\u003e\n\n\u003cp\u003eSplunk said the vulnerability affects Splunk Enterprise versions below 10.2.4 and 10.0.7. The vulnerable endpoint lacks authentication controls, allowing any network-reachable user to invoke file operations without credentials. The article states that the flaw can be exploited to create or truncate arbitrary files and may lead to remote code execution.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-fixes\"\u003eAffected Products and Fixes\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following affected and fixed versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk Enterprise 10.0.0 to 10.0.6 is fixed in 10.0.7.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.2.0 to 10.2.3 is fixed in 10.2.4.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.4 is not affected.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSplunk Cloud is not impacted by the vulnerability. Splunk said this is because Postgres sidecars are not used in Splunk Cloud.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability exists in a PostgreSQL sidecar service endpoint. Splunk said the endpoint lacks authentication controls. As a result, an unauthenticated and network-reachable user could perform file operations without credentials.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs released additional technical details about CVE-2026-20253. Its analysis said the vulnerability could be exploited to achieve pre-authenticated remote code execution on affected systems. The relevant endpoints identified in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e/v1/postgres/recovery/backup\u003c/li\u003e\n\u003cli\u003e/v1/postgres/recovery/restore\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-chain-described-by-watchtowr-labs\"\u003eExploitation Chain Described by watchTowr Labs\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes the attack chain as a multi-step process. First, an attacker connects to an attacker-controlled database and uses the /backup endpoint to dump its contents into an arbitrary file. Next, the attacker loads the dump into the local PostgreSQL instance using the /restore endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe restore step includes a passfile argument that specifies the path to a .pgpass file. The article identifies that file as /opt/splunk/var/packages/data/postgres/.pgpass. This file contains the password for the postgres_admin user.\u003c/p\u003e\n\n\u003cp\u003eOnce the malicious dump is restored, SQL queries defined in the database dump are executed by Splunk’s PostgreSQL instance. watchTowr Labs researchers Piotr Bazydlo and Yordan Ganchev said that once they could restore attacker-controlled SQL into the local PostgreSQL instance, they created a database dump template that provided controlled file write.\u003c/p\u003e\n\n\u003ch2 id=\"file-write-and-remote-code-execution-path\"\u003eFile Write and Remote Code Execution Path\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that an attacker could define a new PostgreSQL function using lo_export. The lo_export function is used to extract a BLOB from the database and save it as a file on the file system. By using this mechanism, an attacker could write attacker-controlled content to a file during the restoration process.\u003c/p\u003e\n\n\u003cp\u003eThis gives the attacker an arbitrary file write primitive on the Splunk file system. The article says an attacker could then escalate further to remote code execution. One example given is overwriting a Python script that Splunk frequently executes, such as /opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py, to include a malicious payload.\u003c/p\u003e\n\n\u003ch2 id=\"full-sequence-listed-in-the-article\"\u003eFull Sequence Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the full sequence of actions as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreate a database and configure it so that a user can authenticate without a password.\u003c/li\u003e\n\u003cli\u003eGrant the database user sufficient permissions to invoke functions such as lo_export.\u003c/li\u003e\n\u003cli\u003eUse the /backup endpoint to drop a dump of the remote database onto the Splunk file system.\u003c/li\u003e\n\u003cli\u003eUse the /restore endpoint to load the malicious database dump.\u003c/li\u003e\n\u003cli\u003eTrigger execution of the malicious function during the restore process.\u003c/li\u003e\n\u003cli\u003eWrite an attacker-controlled Python script to the Splunk file system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact includes unauthenticated file creation or truncation through the PostgreSQL sidecar service endpoint. The article also describes a path to pre-authenticated remote code execution using the backup and restore endpoints. Splunk responded by releasing fixed versions for affected Splunk Enterprise branches.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there is no evidence of exploitation in the wild. However, it also notes that the availability of exploit specifics could be enough to drive opportunistic attempts. The article concludes that users should move quickly to apply the fixes to remain protected.\u003c/p\u003e\n","keyPoints":["Splunk released security updates for CVE-2026-20253, a critical Splunk Enterprise vulnerability rated 9.8 on the CVSS scoring system.","The flaw affects Splunk Enterprise 10.0.0 through 10.0.6 and 10.2.0 through 10.2.3, and it is fixed in versions 10.0.7 and 10.2.4.","Splunk said the vulnerability allows an unauthenticated user to create or truncate arbitrary files through a PostgreSQL sidecar service endpoint that lacks authentication controls.","watchTowr Labs reported that the flaw can be exploited for pre-authenticated remote code execution through the /v1/postgres/recovery/backup and /v1/postgres/recovery/restore endpoints.","Splunk said Splunk Cloud is not impacted because Postgres sidecars are not used in the product."],"insights":["The unauthenticated file-operation bug becomes remote code execution only through a multi-step chain that abuses Splunk’s PostgreSQL backup and restore endpoints to execute attacker-controlled SQL during restoration.","The exploit path relies on the restore endpoint accepting a passfile argument pointing to Splunk’s local .pgpass file, allowing access to the postgres_admin credentials during the attack chain.","An attacker can turn database-level access into filesystem control by using PostgreSQL’s lo_export function to write attacker-controlled content onto the Splunk filesystem.","Remote code execution can be achieved by overwriting a Python script that Splunk frequently executes, such as /opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py.","Although Splunk reported no evidence of exploitation in the wild, watchTowr Labs’ publication of technical exploit details makes rapid patching especially actionable for exposed Splunk Enterprise deployments."],"referencedReports":[{"title":"SVD-2026-0603","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article cites Splunk's advisory describing CVE-2026-20253, affected Splunk Enterprise versions, fixed releases, and Splunk Cloud impact.","category":"","primary":false},{"title":"Why Use App-Level Auth When Every Database Has Auth? Splunk Enterprise CVE-2026-20253 Pre-Auth RCE","url":"https://labs.watchtowr.com/why-use-app-level-auth-when-every-database-has-auth-splunk-enterprise-cve-2026-20253-pre-auth-rce/","publisher":"watchTowr Labs","context":"The article references watchTowr Labs' technical analysis explaining how CVE-2026-20253 can be exploited through Splunk PostgreSQL backup and restore endpoints for pre-authenticated remote code execution.","category":"","primary":false}],"body":"\u003cp\u003eSplunk released security updates for a critical Splunk Enterprise vulnerability tracked as CVE-2026-20253. The flaw is rated 9.8 on the CVSS scoring system and can allow unauthenticated file operations. Splunk said the issue exists in a PostgreSQL sidecar service endpoint that lacks authentication controls.\u003c/p\u003e\n\n\u003cp\u003eAffected versions include Splunk Enterprise 10.0.0 to 10.0.6 and 10.2.0 to 10.2.3, with fixes available in 10.0.7 and 10.2.4. Splunk Enterprise 10.4 is not affected, and Splunk Cloud is not impacted because it does not use Postgres sidecars. The article emphasizes that users should apply the fixes quickly.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs published technical details showing how the issue can be exploited for pre-authenticated remote code execution through the /v1/postgres/recovery/backup and /v1/postgres/recovery/restore endpoints. The described chain involves writing attacker-controlled database content to the Splunk file system and using PostgreSQL restore behavior to execute SQL. The article says there is no evidence of exploitation in the wild, but exploit specifics are now public.\u003c/p\u003e\n"},{"n":3,"title":"Chinese hackers hijack auth flow, spy on isolated network for a decade","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/chinese-hackers-hijack-auth-flow-spy-on-isolated-network-for-a-decade/","time":"14:06","priority":"MUST READ","score":92,"tldr":"Chinese-linked Velvet Ant hackers maintained access to an isolated critical infrastructure network for a decade by hijacking authentication components like PAM and OpenSSH, letting them steal credentials, bypass logins, and monitor admin activity. The case shows that compromised authentication systems can make containment and cleanup far harder than removing a typical foothold.","briefOverview":"\u003cp\u003eChinese-linked Velvet Ant hackers maintained cyber-espionage access to an isolated critical infrastructure network of a large organization for 10 years, according to Sygnia researchers. The campaign, dubbed Operation Highland, began in 2016 with the compromise of vulnerable internet-facing systems before the attackers pivoted toward an environment with no direct internet connection. The intrusion is significant because the attackers embedded themselves into the organization’s authentication process rather than relying only on a single foothold.\u003c/p\u003e\n\n\u003cp\u003eVelvet Ant deployed a modified GS-Netcat reverse shell, installed a custom SOCKS5 proxy, and altered Nginx and FastCGI configurations to create a remote-execution path into the segregated network through HTTP requests. Once inside, the group replaced Linux PAM modules and OpenSSH components with backdoored versions that accepted hardcoded passwords, harvested credentials, captured commands, and logged SSH activity. Sygnia said this gave the attackers visibility into administrative activity and made conventional containment measures less effective.\u003c/p\u003e\n\n\u003cp\u003eRemediation was complex because many critical components had been replaced with custom versions, and removing them risked breaking authentication, locking out legitimate administrators, and causing outages. Sygnia built a testing lab, profiled hosts, validated binary replacement steps, and prepared rollback procedures before cleanup. The researchers recommended protecting authentication components such as PAM, OpenSSH, and Windows LSASS with EDR, file integrity monitoring, hardened privileged access, MFA, and continuous monitoring for unauthorized modifications.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSygnia researchers reported that the Chinese-linked Velvet Ant threat group carried out a decade-long espionage operation against the isolated critical infrastructure network of a large organization. The campaign, named Operation Highland, began in 2016 and targeted vulnerable internet-facing systems before pivoting into an “air-gapped” environment with no direct external path. The article describes the operation as giving the attackers full visibility into administrative activity.\u003c/p\u003e\n\n\u003cp\u003eThe attack started with compromised internet-facing servers, although the specific product or vulnerability used was not disclosed. Velvet Ant deployed a modified GS-Netcat reverse shell disguised as a legitimate system component, which connected to a hardcoded relay domain and provided encrypted remote shell access. The reverse shell persisted through either a malicious systemd service or startup script modification.\u003c/p\u003e\n\n\u003cp\u003eThe attackers then installed a custom SOCKS5 proxy to tunnel network traffic and reach internal systems that were not directly accessible from the internet. The proxy ran as a daemon masquerading as “smbd -D,” with different filenames and ports on each host. These compromised systems became internal pivot points for further access.\u003c/p\u003e\n\n\u003cp\u003eA key part of the intrusion was the construction of a remote-execution path into the isolated network. Velvet Ant modified the configuration of a compromised internet-facing Nginx server to proxy specially crafted requests to a compromised backend server, then altered the backend server’s Nginx configuration to forward requests to a FastCGI process. That FastCGI wrapper launched a custom binary named “uptime,” which established SSH connections to isolated-network systems using parameters supplied in HTTP POST requests.\u003c/p\u003e\n\n\u003cp\u003eAfter establishing access, Velvet Ant targeted authentication mechanisms for persistence and credential theft. The group replaced legitimate pam_unix.so modules with backdoored versions that accepted hardcoded passwords and harvested credentials, and Sygnia identified nine distinct variants of the malicious PAM module. The attackers also replaced OpenSSH components such as ssh, sshd, and scp with trojanized versions that captured credentials, logged commands, and stored collected data locally for retrieval.\u003c/p\u003e\n\n\u003cp\u003eSygnia said cleanup was particularly difficult because the attackers had replaced many critical components, and removing them risked breaking authentication, locking out administrators, and causing operational outages. The researchers built a testing lab, validated the binary replacement process, profiled hosts, tested results, and prepared rollback procedures before remediation. Sygnia recommended treating authentication components such as PAM, OpenSSH, and Windows LSASS as critical security assets and protecting them with EDR, file integrity monitoring, hardened privileged access, MFA, continuous monitoring, and tested offline recovery plans.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSygnia researchers reported a long-running cyber-espionage campaign by the Chinese-linked Velvet Ant activity cluster against the isolated critical infrastructure network of a large organization. The campaign, which Sygnia dubbed Operation Highland, began in 2016 and continued for 10 years. The attackers first compromised vulnerable internet-facing systems and then pivoted into an environment described as “air-gapped,” with no direct internet connection.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that Velvet Ant did not merely maintain access through a single compromised host. Instead, the group took control of parts of the target organization’s authentication stack, giving it visibility into administrative activity and a way to preserve access even as passwords changed or sessions ended.\u003c/p\u003e\n\n\u003ch2 id=\"actor-and-context\"\u003eActor and Context\u003c/h2\u003e\n\n\u003cp\u003eThe intrusion is attributed to Velvet Ant, a Chinese cyberespionage threat group or activity cluster. Sygnia previously documented lengthy Velvet Ant espionage operations in 2024, including activity targeting F5 BIG-IP devices that reportedly operated undetected for three years. Also in 2024, Cisco warned of a zero-day in NX-OS running on Nexus switches that Velvet Ant exploited to gain access to targets.\u003c/p\u003e\n\n\u003cp\u003eIn Operation Highland, the victim is described as a large organization with an isolated critical infrastructure network. The article does not name the organization and does not identify the specific internet-facing product or vulnerability used in the initial compromise.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-external-foothold\"\u003eInitial Access and External Foothold\u003c/h2\u003e\n\n\u003cp\u003eThe attack began with the compromise of internet-facing servers. Sygnia did not specify the product or vulnerability involved in that first stage.\u003c/p\u003e\n\n\u003cp\u003eVelvet Ant deployed a modified GS-Netcat reverse shell disguised as a legitimate system component. This component connected to a hardcoded relay domain and provided encrypted remote shell access. The reverse shell achieved persistence through either a malicious systemd service or startup script modification.\u003c/p\u003e\n\n\u003ch2 id=\"internal-pivoting-through-socks5-proxying\"\u003eInternal Pivoting Through SOCKS5 Proxying\u003c/h2\u003e\n\n\u003cp\u003eAfter establishing the initial foothold, Velvet Ant installed a custom SOCKS5 proxy to tunnel network traffic. This allowed the attackers to reach internal systems that were not directly accessible from the internet.\u003c/p\u003e\n\n\u003cp\u003eThe proxy ran as a daemon masquerading as “smbd -D.” It used different filenames and ports on each host, turning compromised servers into internal pivot points.\u003c/p\u003e\n\n\u003ch2 id=\"remote-execution-path-into-the-isolated-network\"\u003eRemote Execution Path Into the Isolated Network\u003c/h2\u003e\n\n\u003cp\u003eA central technical element of Operation Highland was the creation of a remote-execution path into the segregated environment. Velvet Ant modified a compromised internet-facing Nginx server so that specially crafted requests would be proxied to a compromised backend server.\u003c/p\u003e\n\n\u003cp\u003eThe backend server’s Nginx configuration was also altered. It forwarded requests to a FastCGI process, fcgiwrap, listening on a separate port. The FastCGI wrapper acted as an execution bridge by processing requests and launching a custom binary named “uptime.”\u003c/p\u003e\n\n\u003cp\u003eThe “uptime” tool established SSH connections to systems within the isolated critical infrastructure network. It used parameters supplied in HTTP POST requests. Sygnia said this chain allowed Velvet Ant to establish a remote-execution path into the segregated environment through simple HTTP requests, without requiring any direct connection to the critical infrastructure network.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-stack-compromise\"\u003eAuthentication Stack Compromise\u003c/h2\u003e\n\n\u003cp\u003eOnce Velvet Ant had access to the isolated environment, the attackers focused on long-term persistence and credential theft by targeting Linux Pluggable Authentication Modules, or PAM. PAM is described in the article as a set of libraries that lets administrators configure authentication methods.\u003c/p\u003e\n\n\u003cp\u003eThe attackers replaced legitimate “pam_unix.so” modules with backdoored versions. These malicious modules accepted hardcoded passwords and harvested user credentials. Sygnia identified nine distinct variants of the malicious PAM module, each compiled in a separate build environment.\u003c/p\u003e\n\n\u003cp\u003eSygnia said two of the malicious PAM modules stood out: one acted only as a backdoor, and another collected credentials.\u003c/p\u003e\n\n\u003ch2 id=\"openssh-component-replacement\"\u003eOpenSSH Component Replacement\u003c/h2\u003e\n\n\u003cp\u003eVelvet Ant also replaced OpenSSH components with trojanized versions. The altered components included ssh, sshd, and scp.\u003c/p\u003e\n\n\u003cp\u003eThese trojanized OpenSSH binaries captured credentials, logged commands entered during SSH sessions, and stored the collected data locally for later retrieval. Sygnia said this gave the attackers access to credentials as they were used in the target environment and allowed them to bypass the authentication flow.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this meant administrative activity became fully observable, including every login and every command executed across compromised hosts. Access was no longer tied to a single foothold but embedded into the authentication process itself.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-persistence-and-containment\"\u003eImpact on Persistence and Containment\u003c/h2\u003e\n\n\u003cp\u003eThe authentication-level compromise helped Velvet Ant maintain persistence despite password changes and session terminations. Sygnia said the approach reduced the effectiveness of conventional containment measures.\u003c/p\u003e\n\n\u003cp\u003eBecause the attackers had modified PAM and OpenSSH components, access was tied to the systems that mediated authentication and administrative activity. This made the compromise especially difficult to remediate safely.\u003c/p\u003e\n\n\u003ch2 id=\"cleanup-and-recovery-challenges\"\u003eCleanup and Recovery Challenges\u003c/h2\u003e\n\n\u003cp\u003eSygnia said removing Velvet Ant from the environment was particularly complicated after the compromise was discovered. The attackers had replaced so many critical components with custom versions that removing them risked breaking authentication, locking legitimate administrators out, and causing operational outages.\u003c/p\u003e\n\n\u003cp\u003eTo address this, Sygnia built a testing lab to validate the binary replacement process. The researchers profiled each host, tested results, and prepared rollback procedures before attempting cleanup.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations-from-sygnia\"\u003eDefensive Recommendations From Sygnia\u003c/h2\u003e\n\n\u003cp\u003eSygnia recommended treating authentication components as critical security assets. The article specifically names PAM, OpenSSH, and Windows LSASS as components that should be protected.\u003c/p\u003e\n\n\u003cp\u003eRecommended protections included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEndpoint detection and response coverage.\u003c/li\u003e\n\u003cli\u003eFile integrity monitoring.\u003c/li\u003e\n\u003cli\u003eHardened privileged access.\u003c/li\u003e\n\u003cli\u003eMulti-factor authentication.\u003c/li\u003e\n\u003cli\u003eContinuous monitoring for unauthorized modifications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSygnia also recommended that organizations plan for offline recovery. This includes strict backups, an appropriate schedule for automatically creating snapshots, and immutable copies. The restoration process should include tested backups, recovery hosts running validated operating systems, and validated recovery scripts.\u003c/p\u003e\n","keyPoints":["Sygnia researchers said the Chinese-linked Velvet Ant threat group maintained espionage access to an isolated critical infrastructure network of a large organization for 10 years in a campaign dubbed Operation Highland.","Velvet Ant initially compromised internet-facing systems, deployed a modified GS-Netcat reverse shell, and used a custom SOCKS5 proxy to pivot into internal systems.","The attackers modified Nginx and FastCGI configurations to create a remote-execution path into the segregated environment through HTTP requests without requiring a direct connection to the critical infrastructure network.","Velvet Ant replaced legitimate Linux PAM modules and OpenSSH components with backdoored versions that accepted hardcoded passwords, harvested credentials, captured commands, and enabled persistent access.","Sygnia said remediation was complicated because replacing many trojanized critical components risked breaking authentication, locking out legitimate administrators, and causing operational outages."],"insights":["Treating PAM, OpenSSH, and Windows LSASS as critical security assets is essential because compromising authentication components can make password changes and session termination ineffective containment measures.","Air-gapped or segregated environments can still be reachable when compromised internet-facing and backend systems are chained into a proxy-based execution path.","File integrity monitoring and EDR coverage should include authentication binaries and libraries, not only conventional malware locations, because Velvet Ant embedded persistence directly into trusted system components.","Remediation of authentication-stack compromises should be rehearsed in a lab with host profiling, validation, and rollback procedures because removing trojanized components can break access for legitimate administrators.","Immutable backups and tested offline recovery processes are important because restoring trusted operating system components may be safer than attempting ad hoc cleanup on heavily modified hosts."],"referencedReports":[{"title":"Operation Highland – Velvet Ant","url":"https://www.sygnia.co/blog/operation-highland-velvet-ant/","publisher":"Sygnia","context":"The article cites Sygnia researchers as discovering and documenting Operation Highland and quotes their technical analysis of Velvet Ant’s remote-execution path into the segregated environment.","category":"","primary":false}],"body":"\u003cp\u003eChinese-linked Velvet Ant hackers maintained cyber-espionage access to an isolated critical infrastructure network of a large organization for 10 years, according to Sygnia researchers. The campaign, dubbed Operation Highland, began in 2016 with the compromise of vulnerable internet-facing systems before the attackers pivoted toward an environment with no direct internet connection. The intrusion is significant because the attackers embedded themselves into the organization’s authentication process rather than relying only on a single foothold.\u003c/p\u003e\n\n\u003cp\u003eVelvet Ant deployed a modified GS-Netcat reverse shell, installed a custom SOCKS5 proxy, and altered Nginx and FastCGI configurations to create a remote-execution path into the segregated network through HTTP requests. Once inside, the group replaced Linux PAM modules and OpenSSH components with backdoored versions that accepted hardcoded passwords, harvested credentials, captured commands, and logged SSH activity. Sygnia said this gave the attackers visibility into administrative activity and made conventional containment measures less effective.\u003c/p\u003e\n\n\u003cp\u003eRemediation was complex because many critical components had been replaced with custom versions, and removing them risked breaking authentication, locking out legitimate administrators, and causing outages. Sygnia built a testing lab, profiled hosts, validated binary replacement steps, and prepared rollback procedures before cleanup. The researchers recommended protecting authentication components such as PAM, OpenSSH, and Windows LSASS with EDR, file integrity monitoring, hardened privileged access, MFA, and continuous monitoring for unauthorized modifications.\u003c/p\u003e\n"},{"n":9,"title":"400+ AUR Packages Hijacked: What the “Atomic Arch” Campaign Means for Supply-Chain Security","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/400-aur-packages-hijacked-atomic-arch-campaign","time":"02:47","priority":"MUST READ","score":92,"tldr":"Attackers hijacked 400+ trusted AUR packages by adopting abandoned projects and adding malicious dependencies that steal developer and CI credentials. Any affected Arch-based host should be treated as compromised, rebuilt from clean media, and have exposed secrets rotated.","briefOverview":"\u003cp\u003eSecurity researchers and the Arch Linux community disclosed a June 2026 supply-chain attack against the Arch User Repository, or AUR. Attackers hijacked more than 400 community packages by adopting orphaned packages and modifying them to execute attacker-controlled code. The article describes the campaign, dubbed “Atomic Arch” by Sonatype researchers, as a textbook example of trust abuse in open-source ecosystems.\u003c/p\u003e\n\n\u003cp\u003eThe attack worked by adding malicious dependencies such as atomic-lockfile and js-digest through PKGBUILDs or install hooks. When users installed or updated affected AUR packages, the malicious dependency was fetched and executed on the local system. The payload is described as a Rust credential stealer that targets developer and CI assets including browser sessions, SSH keys, GitHub and npm tokens, chat sessions, container credentials, and cloud keys.\u003c/p\u003e\n\n\u003cp\u003eThe article says the direct impact is limited to Arch Linux and Arch-based environments that use AUR, including self-hosted CI runners and Arch under WSL2. However, it emphasizes that stolen credentials can let attackers pivot into GitHub, npm, cloud accounts, and production systems that are not Arch-based. Recommended response includes identifying affected hosts, rotating exposed secrets, rebuilding systems where the payload may have run as root, and adding behavioral monitoring.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that on June 11, 2026, security researchers and the Arch Linux community disclosed a large-scale supply-chain attack against the Arch User Repository. More than 400 AUR community packages were hijacked and converted into a malware delivery network. The campaign was dubbed “Atomic Arch” by Sonatype researchers and is presented as an example of attackers abusing trust in open-source package ecosystems.\u003c/p\u003e\n\n\u003cp\u003eAUR is described as a community repository where Arch Linux users share PKGBUILD scripts for software outside the official repositories. Because users or AUR helpers build packages locally, malicious logic in those scripts can execute directly on a developer’s machine during build or installation. The article highlights AUR’s ownership-transfer mechanism, where abandoned packages can be adopted by new maintainers, as a key avenue used in the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe attackers targeted orphaned packages that already had users and legitimate history. They modified PKGBUILDs or install hooks to run npm install atomic-lockfile and variants such as js-digest. This caused affected AUR installs or updates to transparently fetch and execute malicious Node package dependencies.\u003c/p\u003e\n\n\u003cp\u003eThe malware is described as a Rust-based credential stealer embedded in a malicious npm package masquerading as atomic-lockfile. It targets browser cookies and session tokens, SSH keys and known_hosts, GitHub and npm tokens, Slack, Discord, and Teams sessions, Docker and Podman credentials, and cloud access keys. On systems where it gains elevated privileges, the article says it can attempt eBPF-based persistence to hide process and file activity.\u003c/p\u003e\n\n\u003cp\u003eDirectly affected systems include Arch Linux and Arch-based distributions such as EndeavourOS and Manjaro when AUR is used, self-hosted CI runners or build agents running Arch, and Windows developers using Arch under WSL2 with AUR packages. The article says GitHub-hosted runners and non-Arch self-hosted runners are not directly affected by this vector unless they pull in Arch or AUR through nested environments. It also notes that macOS and Windows developer machines are not directly affected, while macOS faces structurally similar risks through Homebrew’s ownership-transfer model.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends treating this as an incident-response moment for organizations using Arch on workstations or CI systems. It advises enumerating affected hosts, reviewing AUR install and upgrade history since early June 2026, rotating developer and cloud credentials if a bad package ran, and rebuilding systems where the payload may have run as root. It also recommends monitoring build hosts and runners for unexpected package manager activity, network egress during build steps, suspicious systemd units, eBPF objects, and anomalous outbound connections.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a June 2026 supply-chain attack against the Arch User Repository, or AUR, disclosed by security researchers and the Arch Linux community. Attackers hijacked more than 400 community packages and turned them into a malware delivery network. The campaign was dubbed “Atomic Arch” by Sonatype researchers.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the incident as immediately relevant to Arch Linux users, but also as a broader example of how attackers can compromise developers and CI infrastructure by abusing trust in open-source ecosystems. It emphasizes that while the direct vector is Arch-specific, the targeted assets include developer credentials, CI secrets, cloud keys, and sessions that can affect organizations beyond Arch-based systems.\u003c/p\u003e\n\n\u003ch2 id=\"aur-context\"\u003eAUR Context\u003c/h2\u003e\n\n\u003cp\u003eThe Arch User Repository is described as a community-driven repository where Arch Linux users share PKGBUILD scripts for software not found in official repositories. Users or AUR helpers clone these scripts and build native packages locally. Because the build happens on the user’s system, malicious logic in a PKGBUILD or install hook can execute directly on the developer’s machine during build or installation.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights AUR’s package ownership-transfer feature as central to the attack. If a package maintainer abandons a package, another user can request to adopt it and inherit the package name and reputation. The article states that this keeps useful software alive, but also creates an opportunity for attackers to take over trusted packages quietly.\u003c/p\u003e\n\n\u003ch2 id=\"attack-pattern\"\u003eAttack Pattern\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, the attackers systematically adopted orphaned AUR packages with existing users and legitimate history. They then injected malicious build logic into the packages. The modifications caused affected packages to pull in attacker-controlled npm dependencies.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the main attack sequence as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttackers adopted orphaned AUR packages that had accumulated trust over time.\u003c/li\u003e\n\u003cli\u003eThey modified PKGBUILDs or install hooks to run npm install atomic-lockfile or variants such as js-digest.\u003c/li\u003e\n\u003cli\u003eWhen users installed or updated the AUR package, the malicious dependency was fetched and executed silently.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that the affected packages were not obviously suspicious. They were ordinary tools with prior legitimate use, converted into a malware distribution channel by a single added dependency.\u003c/p\u003e\n\n\u003ch2 id=\"malware-behavior\"\u003eMalware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe malicious npm package masquerading as atomic-lockfile is described as containing a credential-stealing payload written in Rust. The article says the payload is tuned for developer and CI environments rather than random consumer data. It targets assets that can unlock broader organizational systems.\u003c/p\u003e\n\n\u003cp\u003eThe targeted assets listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrowser cookies and session tokens for SSO, cloud consoles, and SaaS applications.\u003c/li\u003e\n\u003cli\u003eSSH keys and known_hosts.\u003c/li\u003e\n\u003cli\u003eGitHub, npm, and other developer tokens.\u003c/li\u003e\n\u003cli\u003eSlack, Discord, and Teams sessions.\u003c/li\u003e\n\u003cli\u003eDocker and Podman credentials.\u003c/li\u003e\n\u003cli\u003eCloud access keys.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that when the malware runs with elevated privileges, it can attempt eBPF-based persistence to hide processes and file activity. Because of this, the article says a compromised host should be treated as fully untrusted, rebuilt from clean media, and have exposed credentials rotated. It explicitly says a one-off malware scan is not sufficient.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-unaffected-environments\"\u003eAffected and Unaffected Environments\u003c/h2\u003e\n\n\u003cp\u003eThe article says the AUR is an Arch Linux-specific ecosystem. Directly affected environments include Arch Linux and Arch-based distributions when AUR is used. It names EndeavourOS and Manjaro as examples when AUR packages are installed.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies self-hosted CI runners or build agents running Arch as directly affected if they install AUR packages in bootstrap or job steps. It includes Windows developers running Arch under WSL2 and installing AUR packages inside that environment.\u003c/p\u003e\n\n\u003cp\u003eThe article says the following are not directly affected by this vector:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub-hosted runners using Ubuntu, Windows, or macOS images, because they do not use AUR.\u003c/li\u003e\n\u003cli\u003eSelf-hosted runners on RHEL, Rocky, Debian, Ubuntu, or Windows, unless they pull in Arch or AUR through nested virtualization or similar setups.\u003c/li\u003e\n\u003cli\u003emacOS and Windows developer machines as direct targets of this vector.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the same time, the article notes that macOS faces structurally similar risks through Homebrew because of a similar package ownership-transfer model. It states that a hijacking campaign against abandoned Homebrew formulae or third-party taps would affect macOS developer machines in the same way.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance\"\u003eBroader Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the importance of the campaign extends beyond the Arch community. One major point is that ownership hijacking can be more effective than typosquatting. Instead of publishing lookalike packages, attackers can take over abandoned but trusted packages and inherit users and reputation.\u003c/p\u003e\n\n\u003cp\u003eThe article also stresses that build scripts are an execution environment. It groups PKGBUILDs, postinstall hooks, GitHub Actions workflows, and Dockerfiles as examples of scripts that run with powerful privileges but may be casually reviewed.\u003c/p\u003e\n\n\u003cp\u003eThe article says the payload is aligned with recent campaigns in which compromised npm packages or GitHub Actions exfiltrated CI secrets at scale. It emphasizes that even organizations that never use Arch can still be affected if an Arch-based developer laptop is compromised and used as a pivot into GitHub, npm, or cloud accounts.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that organizations using Arch for developer workstations or self-hosted runners treat the campaign as an incident-response moment. It advises first identifying potentially affected hosts, including laptops, lab machines, and self-hosted CI runners running Arch or Arch derivatives. It also recommends reviewing AUR install and upgrade history since early June 2026 and cross-checking against known-bad package lists.\u003c/p\u003e\n\n\u003cp\u003eIf a bad package ran, the article recommends assuming credential exposure. It specifically calls for rotating SSH keys, GitHub tokens, npm tokens, cloud API keys, Vault tokens, and other secrets stored or used on affected machines. It also recommends invalidating browser sessions and regenerating passkeys where possible, especially for admin and SSO accounts.\u003c/p\u003e\n\n\u003cp\u003eFor systems where the malicious payload may have run as root, the article recommends treating the host as compromised. It advises rebuilding from trusted media and only rejoining systems to CI or infrastructure after reinstallation and re-provisioning with fresh credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends behavioral monitoring. It says teams should monitor build hosts and runners for unexpected package manager calls, unexpected network egress during build steps, suspicious systemd units, eBPF objects, and anomalous outbound connections to paste sites, file-sharing services, or Tor.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-tooling-mentioned\"\u003eVendor Tooling Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a section on StepSecurity’s products. It says Harden-Runner monitors GitHub Actions, GitLab CI, and Azure DevOps pipeline steps at runtime for unexpected network egress, unauthorized process spawning, and anomalous package manager activity. It also says Dev Machine Guard provides visibility on developer workstations and alerts on suspicious activity.\u003c/p\u003e\n\n\u003cp\u003eThe article connects these products to the behaviors described in the Atomic Arch campaign, particularly malware execution on build hosts and credential theft from developer machines. It concludes that visibility into what build environments and developer machines are doing is important for detecting unexpected activity before secrets leave the device.\u003c/p\u003e\n","keyPoints":["Security researchers and the Arch Linux community disclosed a June 2026 supply-chain attack in which attackers hijacked more than 400 Arch User Repository packages.","The attackers adopted orphaned AUR packages with existing users and modified PKGBUILDs or install hooks to run malicious npm dependencies such as atomic-lockfile and js-digest.","The malicious npm package contained a Rust credential-stealing payload that targeted browser cookies, SSH keys, developer tokens, chat sessions, Docker or Podman credentials, and cloud access keys.","The article says affected Arch or Arch-based systems, including self-hosted CI runners and WSL2 Arch environments, should be reviewed if they installed AUR packages during the relevant period.","The article recommends treating hosts where the payload may have run as root as compromised, rebuilding them from trusted media, and rotating exposed credentials."],"insights":["The campaign shows that ownership transfer of abandoned but trusted packages can be more effective than typosquatting because attackers inherit an existing user base and package reputation.","A single added install-time dependency in a build script can turn routine package installation into code execution on developer machines and CI hosts.","The article emphasizes that the main organizational risk is not limited to Arch systems because stolen developer credentials can be used to pivot into GitHub, npm, cloud accounts, and non-Arch production environments.","The presence of possible eBPF-based persistence means a malware scan is not considered sufficient for privileged infections, and affected systems should be rebuilt from trusted media.","Windows developers using Arch under WSL2 are included in the affected population if they installed AUR packages inside that environment."],"referencedReports":[],"body":"\u003cp\u003eSecurity researchers and the Arch Linux community disclosed a June 2026 supply-chain attack against the Arch User Repository, or AUR. Attackers hijacked more than 400 community packages by adopting orphaned packages and modifying them to execute attacker-controlled code. The article describes the campaign, dubbed “Atomic Arch” by Sonatype researchers, as a textbook example of trust abuse in open-source ecosystems.\u003c/p\u003e\n\n\u003cp\u003eThe attack worked by adding malicious dependencies such as atomic-lockfile and js-digest through PKGBUILDs or install hooks. When users installed or updated affected AUR packages, the malicious dependency was fetched and executed on the local system. The payload is described as a Rust credential stealer that targets developer and CI assets including browser sessions, SSH keys, GitHub and npm tokens, chat sessions, container credentials, and cloud keys.\u003c/p\u003e\n\n\u003cp\u003eThe article says the direct impact is limited to Arch Linux and Arch-based environments that use AUR, including self-hosted CI runners and Arch under WSL2. However, it emphasizes that stolen credentials can let attackers pivot into GitHub, npm, cloud accounts, and production systems that are not Arch-based. Recommended response includes identifying affected hosts, rotating exposed secrets, rebuilding systems where the payload may have run as root, and adding behavioral monitoring.\u003c/p\u003e\n"},{"n":5,"title":"U.S. Orders Anthropic to Suspend Fable 5 and Mythos 5 Access for Foreign Nationals","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/us-orders-anthropic-to-suspend-fable-5.html","time":"05:42","priority":"SHOULD READ","score":84,"tldr":"Anthropic says it will temporarily disable access to Claude Fable 5 and Mythos 5 for foreign nationals after a U.S. government order citing national security concerns over a reported jailbreak. The company disputes the basis for the order, arguing the alleged technique is narrow and comparable capabilities exist in other publicly available models.","briefOverview":"\u003cp\u003eAnthropic said it will “abruptly disable” its most advanced AI models, Claude Fable 5 and Mythos 5, for all users after receiving a U.S. government order. The order instructs the company to suspend access to the models for foreign nationals, whether inside or outside the U.S., citing national security concerns. Anthropic said it believes there was a misunderstanding and is working to restore access as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe company said its understanding is that the government is concerned about a method of bypassing, or “jailbreaking,” Fable 5. Anthropic said it reviewed a demonstration in which the technique identified a small number of previously known, minor vulnerabilities, and it argued that other publicly available models can discover the same kinds of issues without a bypass. Access to other Anthropic models will not be affected by the directive.\u003c/p\u003e\n\n\u003cp\u003eThe order comes shortly after the launch of Claude Fable 5 and Mythos 5, which share the same underlying model, with Mythos 5 having safeguards lifted in some cybersecurity areas. Anthropic said its models use safety classifiers to detect potential misuse, including jailbreak attempts, and block harmful cybersecurity requests. The company argued that no model provider can achieve perfect jailbreak resistance and said any process for blocking unsafe AI deployments should be transparent, fair, clear, and grounded in technical facts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic said it received a U.S. government order at 5:21 p.m. ET instructing it to suspend access to Claude Fable 5 and Mythos 5 for foreign nationals. The order applies to foreign nationals whether they are inside or outside the United States and cites national security concerns. Anthropic said it will “abruptly disable” the models for all users while it works to restore access.\u003c/p\u003e\n\n\u003cp\u003eThe company said it believes the government order may be based on a misunderstanding about a possible jailbreak of Fable 5. According to Anthropic, the government appears to believe it has become aware of a method for bypassing Fable 5’s safeguards. Anthropic said it reviewed a demonstration of the specific technique being used to identify a small number of previously known, minor vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eAnthropic argued that the vulnerabilities identified in the demonstration appeared relatively simple. It also said other publicly available models can discover the same vulnerabilities without requiring a bypass. The company specifically stated that it reviewed a report it believes is the basis of the directive and validated that the displayed capability is widely available from other models, including OpenAI’s GPT-5.5.\u003c/p\u003e\n\n\u003cp\u003eThe directive follows the launch of Claude Fable 5 and Mythos 5. Mythos 5 uses the same underlying model as Fable 5 but has safeguards lifted in some areas, including cybersecurity, and remains accessible to a vetted group of cyber defenders and critical infrastructure operators. Anthropic described Mythos 5 as having the “strongest cybersecurity capabilities of any model in the world.”\u003c/p\u003e\n\n\u003cp\u003eAnthropic said its safeguards include safety classifiers that detect potential misuse, including jailbreak attempts, and prevent the main model from responding. Its cybersecurity classifier is designed to block harmful single-turn requests related to planning a cyber attack, exploit development, or defense evasion. The company said Mythos-class models are skilled at finding and exploiting software vulnerabilities and can give attackers a strategic advantage.\u003c/p\u003e\n\n\u003cp\u003eAnthropic also cited its own finding that a Mythos-class model can turn newly disclosed software vulnerabilities into working exploits in hours, or in some cases minutes, rather than weeks. The company said no universal jailbreak methods have been developed against its latest models to date and that perfect jailbreak resistance is not possible for any model provider. It argued that the statutory process for restricting unsafe AI deployments should be transparent, fair, clear, and grounded in technical facts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it will “abruptly disable” Claude Fable 5 and Mythos 5 after receiving a U.S. government order to suspend access to the models for foreign nationals. The order applies to foreign nationals both inside and outside the United States and cites national security concerns. Anthropic said it received the order at 5:21 p.m. ET and is working to restore access as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe company said access to other models will not be affected by the export control directive. Although the directive is described as targeting foreign nationals, Anthropic said it will disable the models for all users. The company said it believes there has been a “misunderstanding.”\u003c/p\u003e\n\n\u003ch2 id=\"models-affected\"\u003eModels Affected\u003c/h2\u003e\n\n\u003cp\u003eThe affected models are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClaude Fable 5\u003c/li\u003e\n\u003cli\u003eMythos 5\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the move comes days after the launch of Claude Fable 5 and Mythos 5. Mythos 5 uses the same underlying model as Fable 5 but has safeguards lifted in some areas, including cybersecurity. Anthropic described Mythos 5 as having the “strongest cybersecurity capabilities of any model in the world.”\u003c/p\u003e\n\n\u003cp\u003eMythos 5 remains accessible to a vetted group of cyber defenders and critical infrastructure operators. Fable 5’s protections mean that cybersecurity-topic queries will instead receive a response from Claude Opus 4.8, which Anthropic described as its next capable model.\u003c/p\u003e\n\n\u003ch2 id=\"government-concern-cited-by-anthropic\"\u003eGovernment Concern Cited by Anthropic\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the government believes it has become aware of a method of bypassing, or “jailbreaking,” Fable 5. The company said the government has only provided verbal evidence of a potential narrow, non-universal jailbreak. Anthropic described the reported technique as essentially asking the model to read a specific codebase and fix any software flaws.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said one potential jailbreak was shared with the government. The company said it reviewed a report that it believes is the basis of the government’s directive. It said the capability displayed in that report is widely available from other models, including OpenAI’s GPT-5.5, and is used by defenders who keep systems safe.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-technical-assessment\"\u003eAnthropic’s Technical Assessment\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it reviewed a demonstration of the specific technique being used to identify a small number of previously known, minor vulnerabilities. The company said those vulnerabilities appeared relatively simple. It also said other publicly available models can discover the same vulnerabilities without requiring a bypass.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said no universal jailbreak methods have been developed against its latest models to date. It also said third-party and internal red-teaming exercises found its safeguards to be “substantially more effective than those of any previously deployed model.”\u003c/p\u003e\n\n\u003cp\u003eThe company argued that “perfect jailbreak resistance” is not possible for any model provider. It said every safeguard used by the industry is susceptible to non-universal jailbreaks that are effective only in limited contexts or require additional effort to adapt to each situation.\u003c/p\u003e\n\n\u003ch2 id=\"safeguards-and-classifiers\"\u003eSafeguards and Classifiers\u003c/h2\u003e\n\n\u003cp\u003eAnthropic emphasized that it has implemented “strong” guardrails to prevent misuse of its models for cybersecurity-related tasks. These protections rely on safety classifiers designed to detect potential misuse, including jailbreak attempts. When such misuse is detected, the system is intended to prohibit the main model from responding.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a cybersecurity classifier designed to block harmful single-turn requests involving:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePlanning a cyber attack\u003c/li\u003e\n\u003cli\u003eExploit development\u003c/li\u003e\n\u003cli\u003eDefense evasion\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAnthropic said Mythos-class models are skilled at finding and exploiting software vulnerabilities. The company said that capability can give attackers a strategic advantage.\u003c/p\u003e\n\n\u003ch2 id=\"cybersecurity-capability-and-patch-cycle-impact\"\u003eCybersecurity Capability and Patch-Cycle Impact\u003c/h2\u003e\n\n\u003cp\u003eAnthropic previously revealed that its Mythos-class model can turn newly disclosed software vulnerabilities into working exploits in hours, or even minutes in some cases, rather than weeks. The article describes this as converting N-days into N-hours. It states that frontier models may be just as good at rapidly weaponizing flaws that have already been publicly disclosed.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s Red Team said a lone operator can turn a month’s worth of patches into working exploits in a single afternoon. The Red Team said this could be done for a few thousand dollars and without specialized expertise. It said this means the typical patching playbook used by software developers today, including monthly release cadences, multi-week staged rollouts, and delays between pre-release and stable channels, no longer holds.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-position-on-the-directive\"\u003eAnthropic’s Position on the Directive\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it supports the government blocking unsafe AI deployments. However, it argued that the discovery of a “narrow potential jailbreak” should not be the reason for recalling a widely deployed commercial model. The company said the statutory process should be “transparent, fair, clear, and grounded in technical facts.”\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s statement also contrasts the reported Fable 5 jailbreak capability with capabilities it says are already available from other models. It specifically named OpenAI’s GPT-5.5 as a model from which similar capability is widely available. The company emphasized that the behavior at issue is also used by defenders.\u003c/p\u003e\n\n\u003ch2 id=\"other-context-mentioned-in-the-article\"\u003eOther Context Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that earlier in the year, the U.S. Department of Defense labeled Anthropic a “supply chain risk.” That designation followed Anthropic’s effort to draw red lines over the military use of its technology. The article also states that Anthropic filed two lawsuits to block the designation.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-named-parties\"\u003eAffected and Named Parties\u003c/h2\u003e\n\n\u003cp\u003eThe key parties and named entities in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic, the developer of Claude Fable 5 and Mythos 5\u003c/li\u003e\n\u003cli\u003eThe U.S. government, which issued the access suspension order\u003c/li\u003e\n\u003cli\u003eThe U.S. Department of Defense, which previously labeled Anthropic a “supply chain risk”\u003c/li\u003e\n\u003cli\u003eForeign nationals, who are the group covered by the government access restriction\u003c/li\u003e\n\u003cli\u003eVetted cyber defenders and critical infrastructure operators, who retain access to Mythos 5\u003c/li\u003e\n\u003cli\u003eOpenAI’s GPT-5.5, which Anthropic cited as an example of another model with similar capability\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe immediate impact described in the article is the disabling of Claude Fable 5 and Mythos 5 for all users. Anthropic said access to other models will not be affected. The company said it is working to restore access to the affected models as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a named threat actor exploiting the models. It also does not report a confirmed breach, compromise, or real-world exploitation incident tied to the alleged jailbreak. The central issue described is a government access suspension order based on national security concerns and Anthropic’s dispute over the technical basis for that order.\u003c/p\u003e\n","keyPoints":["Anthropic said it will abruptly disable Claude Fable 5 and Mythos 5 for all users after the U.S. government ordered it to suspend access to the models for foreign nationals, citing national security concerns.","Anthropic said it believes there was a misunderstanding and is working to restore access, while access to other models will not be affected by the export control directive.","The company said the government appears to be concerned about a method of bypassing or jailbreaking Fable 5, but Anthropic described the evidence as a narrow, non-universal jailbreak involving asking the model to read a specific codebase and fix software flaws.","Anthropic stated that its safety classifiers are designed to detect potential misuse, including jailbreak attempts, and block harmful cybersecurity requests such as planning cyber attacks, exploit development, or defense evasion.","Anthropic argued that the reported capability is widely available from other models, including OpenAI's GPT-5.5, and said any statutory process for blocking unsafe AI deployments should be transparent, fair, clear, and grounded in technical facts."],"insights":["The government order targets access by foreign nationals rather than removing the models globally, but Anthropic said it will disable the models for all users to comply on the required timeline.","Anthropic’s description of the alleged jailbreak suggests the disputed behavior may overlap with legitimate defensive workflows, because the reported technique involved asking the model to inspect a codebase and fix software flaws.","The article highlights a policy tension: Anthropic says perfect jailbreak resistance is impossible, yet the government directive appears to treat a narrow jailbreak report as sufficient reason to restrict a widely deployed commercial model.","Anthropic’s own red-team findings indicate that frontier AI models can compress the time needed to weaponize newly disclosed vulnerabilities from weeks to hours or minutes, challenging monthly patch cycles and staged rollout practices."],"referencedReports":[{"title":"N-days","url":"https://red.anthropic.com/2026/n-days/","publisher":"Anthropic Red Team","context":"The article references Anthropic Red Team findings that Mythos-class models can turn newly disclosed software vulnerabilities into working exploits in hours or minutes.","category":"","primary":false}],"body":"\u003cp\u003eAnthropic said it will “abruptly disable” its most advanced AI models, Claude Fable 5 and Mythos 5, for all users after receiving a U.S. government order. The order instructs the company to suspend access to the models for foreign nationals, whether inside or outside the U.S., citing national security concerns. Anthropic said it believes there was a misunderstanding and is working to restore access as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe company said its understanding is that the government is concerned about a method of bypassing, or “jailbreaking,” Fable 5. Anthropic said it reviewed a demonstration in which the technique identified a small number of previously known, minor vulnerabilities, and it argued that other publicly available models can discover the same kinds of issues without a bypass. Access to other Anthropic models will not be affected by the directive.\u003c/p\u003e\n\n\u003cp\u003eThe order comes shortly after the launch of Claude Fable 5 and Mythos 5, which share the same underlying model, with Mythos 5 having safeguards lifted in some cybersecurity areas. Anthropic said its models use safety classifiers to detect potential misuse, including jailbreak attempts, and block harmful cybersecurity requests. The company argued that no model provider can achieve perfect jailbreak resistance and said any process for blocking unsafe AI deployments should be transparent, fair, clear, and grounded in technical facts.\u003c/p\u003e\n"},{"n":2,"title":"US Gov asks Anthropic to ban 'foreign national' access to Fable, Mythos","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/us-gov-asks-anthropic-to-ban-foreign-national-access-to-fable-mythos/","time":"10:01","priority":"SHOULD READ","score":82,"tldr":"Anthropic suspended global access to its Fable 5 and Mythos 5 models after a U.S. government export-control directive ordered it to block all foreign nationals, which the company says effectively makes the models unavailable to everyone. Anthropic disputes the rationale, saying the cited jailbreak evidence is narrow and insufficient, and is working to restore access.","briefOverview":"\u003cp\u003eAnthropic suspended worldwide access to its Fable 5 and Mythos 5 AI models after receiving a U.S. government export control directive at 5:21pm ET on June 12. The directive cites national security authorities and orders Anthropic to block access by any foreign national, including foreign nationals inside or outside the United States and Anthropic’s own foreign-national employees. Anthropic says the order’s practical effect is that both models must be disabled for all customers.\u003c/p\u003e\n\n\u003cp\u003eThe move came shortly after Anthropic began rolling out Fable 5 on June 9 as a free limited-time model for Pro, Max, and Enterprise customers through June 22. Fable 5 is described as the safeguarded sibling of Mythos 5, with both sharing the same underlying model. Fable blocks or diverts sensitive cybersecurity, biology, and chemistry queries, while Mythos 5 is available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said new sessions would fall back to a user’s default model or Claude Opus 4.8, existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail. The company said it believes the directive stems from a reported way to jailbreak Fable 5, but it disputes that the cited issue justifies recalling a commercial model deployed to hundreds of millions of people. Anthropic says it is complying with the directive while working to restore access and promising more details within 24 hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic suspended access to Fable 5 and Mythos 5 for all users worldwide after receiving a U.S. government export control directive on June 12. The directive cites national security authorities and bars access to both models by foreign nationals inside or outside the United States. Anthropic says the scope also includes its own foreign-national employees, making the models unavailable to everyone in practice.\u003c/p\u003e\n\n\u003cp\u003eThe suspension is significant because Fable 5 had only begun rolling out on June 9 and was offered free to Pro, Max, and Enterprise customers through June 22. The article says the model had been handed to millions for free three days before being taken offline. Other Anthropic models, including Claude Opus 4.8, are not affected.\u003c/p\u003e\n\n\u003cp\u003eFable 5 and Mythos 5 share the same underlying model, but they are deployed with different access controls and safeguards. Fable 5 is the safeguarded version and blocks or diverts sensitive cybersecurity, biology, and chemistry queries. Mythos 5 is described as unrestricted and available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eAnthropic told developers that new sessions would fall back to a user’s default model or Opus 4.8. Existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail. The company advised integrators to migrate to other models.\u003c/p\u003e\n\n\u003cp\u003eAnthropic believes the order stems from a reported jailbreak involving Fable 5. The company said it reviewed a demo and found only minor, already-known bugs, and said the government had only provided verbal evidence of a potential narrow, non-universal jailbreak. Anthropic described the reported method as asking the model to read a specific codebase and fix any software flaws.\u003c/p\u003e\n\n\u003cp\u003eThe impact extended to customers in both the United States and the United Kingdom, according to the U.K.’s Minister for AI and Online Safety, Kanishka Narayan MP. Anthropic said it disagrees that the reported jailbreak should cause a recall of a commercial model deployed to hundreds of millions of people. The company said it is complying with the legal directive, working to restore access, and planning to provide more details within 24 hours.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eAnthropic suspended access to its Fable 5 and Mythos 5 AI models worldwide after receiving a U.S. government export control directive. The company said it received the directive at 5:21pm ET on June 12. The directive cites national security authorities and requires Anthropic to block access to both models by any foreign national.\u003c/p\u003e\n\n\u003cp\u003eAccording to Anthropic, the directive applies to foreign nationals both inside and outside the United States. It also applies to Anthropic’s own foreign-national employees. Anthropic said the practical result is that it must disable both models for all customers in order to comply.\u003c/p\u003e\n\n\u003cp\u003eAll other Anthropic models are unaffected, including Claude Opus 4.8.\u003c/p\u003e\n\n\u003ch2 id=\"timing-and-customer-impact\"\u003eTiming and customer impact\u003c/h2\u003e\n\n\u003cp\u003eThe shutdown occurred shortly after Fable 5 began rolling out. Anthropic started making Fable 5 available on June 9, free to Pro, Max, and Enterprise customers through June 22. The article states that a model handed to millions for free three days earlier is now offline for everyone.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s developer notice explained the operational impact:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNew sessions would fall back to the user’s default model or Claude Opus 4.8.\u003c/li\u003e\n\u003cli\u003eExisting Fable 5 sessions would end with an error.\u003c/li\u003e\n\u003cli\u003ePlatform requests to Fable 5 would fail.\u003c/li\u003e\n\u003cli\u003eIntegrators were told to migrate to other models.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe U.K.’s Minister for AI and Online Safety, Kanishka Narayan MP, said the pause affected customers in both the United States and the United Kingdom. He framed the incident as a case for technological sovereignty and pointed to the U.K. government’s £1.1bn AI chip investment.\u003c/p\u003e\n\n\u003ch2 id=\"models-involved\"\u003eModels involved\u003c/h2\u003e\n\n\u003cp\u003eThe affected models are Fable 5 and Mythos 5. The article describes Fable 5 as the safeguarded sibling of Mythos 5. Both models share the same underlying model.\u003c/p\u003e\n\n\u003cp\u003eFable 5 includes safeguards that block or divert sensitive cybersecurity, biology, and chemistry queries. Mythos 5 is described as unrestricted and available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eThe directive affects both versions despite their different access models and safeguard profiles.\u003c/p\u003e\n\n\u003ch2 id=\"government-rationale-as-described-by-anthropic\"\u003eGovernment rationale as described by Anthropic\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the order stems from a reported way to jailbreak Fable 5. The company said it reviewed a demo and found only minor, already-known bugs. Anthropic also said these were the kind of issues other publicly available models can discover without any bypass.\u003c/p\u003e\n\n\u003cp\u003eAnthropic stated that the government had only provided verbal evidence of a potential narrow, non-universal jailbreak. The company described the potential jailbreak as essentially asking the model to read a specific codebase and fix any software flaws. Anthropic also said it understood that one potential jailbreak had been shared with the government.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-position\"\u003eAnthropic’s position\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it is complying with the government’s legal directive and removing access to Fable 5 and Mythos 5 for all users. At the same time, the company said it disagrees that the finding of a narrow potential jailbreak should justify recalling a commercial model deployed to hundreds of millions of people.\u003c/p\u003e\n\n\u003cp\u003eAnthropic warned that applying this standard across the industry would, in its view, essentially halt all new model deployments by frontier model providers. The company also said the capability at issue is widely available elsewhere, pointing to OpenAI’s GPT-5.5, and is used by defenders every day.\u003c/p\u003e\n\n\u003cp\u003eAnthropic maintains that the order is a misunderstanding. It said it is working to restore access and promised to provide more details within 24 hours.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed impact and response\u003c/h2\u003e\n\n\u003cp\u003eThe immediate disclosed impact is the global unavailability of Fable 5 and Mythos 5 for all customers. Platform users and developers are directly affected because Fable 5 requests fail and existing sessions error out. Anthropic advised developers and integrators to move to other models.\u003c/p\u003e\n\n\u003cp\u003eClaude Opus 4.8 and other Anthropic models remain available. Anthropic said new sessions would fall back to a user’s default model or Opus 4.8, limiting the disruption for users who can continue work on other available models.\u003c/p\u003e\n","keyPoints":["Anthropic suspended access to its Fable 5 and Mythos 5 AI models worldwide after receiving a U.S. government export control directive ordering it to block access by foreign nationals.","Anthropic said the directive bars access to the models by foreign nationals inside or outside the United States, including the company’s own foreign-national employees, forcing it to disable the models for all customers.","Fable 5 had begun rolling out on June 9 as a free limited-time offering for Pro, Max, and Enterprise customers through June 22 before being taken offline.","Anthropic said new sessions would fall back to a user’s default model or Claude Opus 4.8, existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail.","Anthropic disputed the government’s rationale, saying the order appears to stem from a narrow reported jailbreak involving asking the model to read a specific codebase and fix software flaws."],"insights":["The directive’s wording made a targeted foreign-national access ban operationally equivalent to a global shutdown because Anthropic said it could not keep the models available while complying.","The suspension affected even U.S. and U.K. customers, showing that export-contro
