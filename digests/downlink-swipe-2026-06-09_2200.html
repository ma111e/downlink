<script type="application/json" id="dl-articles">[{"n":2,"title":"More Evidence That Words Don't Mean What We Thought They Meant (Ivanti Sentry Pre-Auth OS Command Injection CVE-2026-10520)","source":"labs.watchtowr.com","sourceColorIdx":8,"link":"https://labs.watchtowr.com/more-evidence-that-words-dont-mean-what-we-thought-they-meant-ivanti-sentry-pre-auth-os-command-injection-cve-2026-10520/","time":"00:52","priority":"MUST READ","score":94,"tldr":"Researchers showed that CVE-2026-10520 in Ivanti Sentry is a pre-authenticated OS command injection that lets unauthenticated attackers execute root-level commands via the /mics API. Ivanti’s patch removes attacker control of the vulnerable message input and adds access controls blocking the endpoint.","briefOverview":"\u003cp\u003eIvanti published an advisory for two Ivanti Sentry vulnerabilities: CVE-2026-10520 and CVE-2026-10523. CVE-2026-10520 is described as an OS command injection affecting Ivanti Sentry before R10.5.2, R10.6.2, and R10.7.1, allowing remote unauthenticated root-level remote code execution. CVE-2026-10523 is described as an authentication bypass that can allow a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access.\u003c/p\u003e\n\n\u003cp\u003eThe article focuses on CVE-2026-10520 and traces it to the \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e endpoint in the Sentry application. Researchers diffed vulnerable and patched versions and found that the relevant change was in \u003ccode\u003emics-core\u003c/code\u003e within \u003ccode\u003eConfigServiceController.java\u003c/code\u003e. The vulnerable implementation accepted a user-supplied \u003ccode\u003emessage\u003c/code\u003e parameter and passed it into backend configuration handling logic.\u003c/p\u003e\n\n\u003cp\u003eThe technical analysis shows that the \u003ccode\u003emessage\u003c/code\u003e value was parsed into a MICS configuration command, including fields such as command, module, XPath, and XML body. The \u003ccode\u003eexecute\u003c/code\u003e command path could reach \u003ccode\u003eexecuteNativeCommand()\u003c/code\u003e, where backend native methods were invoked through reflection. The patched implementation hardcodes a benign command and adds Apache configuration rules that block unauthenticated access to the vulnerable endpoint by redirecting requests to the login page.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIvanti published an advisory covering two vulnerabilities in Ivanti Sentry: CVE-2026-10520 and CVE-2026-10523. CVE-2026-10520 is an OS command injection vulnerability in Ivanti Sentry before versions R10.5.2, R10.6.2, and R10.7.1 that allows remote unauthenticated root-level remote code execution. CVE-2026-10523 is an authentication bypass vulnerability affecting the same version ranges that allows a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access.\u003c/p\u003e\n\n\u003cp\u003eThe article centers on CVE-2026-10520 because it carries a CVSS score of \u003csup\u003e10\u003c/sup\u003e\u0026frasl;\u003csub\u003e10\u003c/sub\u003e and provides pre-authenticated command execution. The researchers analyzed Ivanti/MobileIron Sentry 10.5.1 as the vulnerable version and Ivanti/MobileIron Sentry 10.5.2 as the different, patched version. They note that Ivanti Sentry, formerly MobileIron Sentry, is an in-line gateway that manages, encrypts, and secures traffic between mobile devices and backend enterprise systems.\u003c/p\u003e\n\n\u003cp\u003eThe researchers began by examining the Sentry web application under \u003ccode\u003e/mics\u003c/code\u003e, specifically the \u003ccode\u003emics.war\u003c/code\u003e file. A diff showed that only one JAR had changed between the vulnerable and patched versions: \u003ccode\u003emics-core-10.5.1-R10.5.1.jar\u003c/code\u003e versus \u003ccode\u003emics-core-10.5.2-R10.5.2.jar\u003c/code\u003e. The changed code was located in \u003ccode\u003ecom/mi/middleware/rest/controller/ConfigServiceController.java\u003c/code\u003e, where a method mapped to \u003ccode\u003e/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e accepted a \u003ccode\u003emessage\u003c/code\u003e parameter.\u003c/p\u003e\n\n\u003cp\u003eIn the vulnerable version, the controller passed the user-supplied \u003ccode\u003emessage\u003c/code\u003e value directly to \u003ccode\u003econfigService.handleMessage()\u003c/code\u003e. The backend parsed the message into a command, module, XPath, and value, and the \u003ccode\u003eexecute\u003c/code\u003e command path routed execution to \u003ccode\u003ereqProcessor.handleExecute(xpath, value)\u003c/code\u003e. That path eventually reached \u003ccode\u003eCommonUtilities.executeNativeCommand()\u003c/code\u003e, which used reflection to invoke native module methods based on fields in the parsed XML object.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates reproduction of CVE-2026-10520 by sending a POST request to \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e with a \u003ccode\u003ecommandexec\u003c/code\u003e XML block and \u003ccode\u003euname -a\u003c/code\u003e in the \u003ccode\u003ereqandres\u003c/code\u003e field. The response returned the Linux command output inside a JSON response, confirming pre-authenticated OS command execution. The patched version no longer uses the user-supplied message and instead sends a hardcoded \u003ccode\u003e/bin/cat /sys/devices/virtual/dmi/id/product_name\u003c/code\u003e command to the backend.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIvanti published an advisory for two vulnerabilities affecting Ivanti Sentry: CVE-2026-10520 and CVE-2026-10523. The article focuses primarily on CVE-2026-10520, which Ivanti described as an OS command injection vulnerability in Ivanti Sentry before versions R10.5.2, R10.6.2, and R10.7.1. According to the advisory text quoted in the article, CVE-2026-10520 allows a remote unauthenticated user to achieve root-level remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe advisory also covers CVE-2026-10523, an authentication bypass vulnerability in Ivanti Sentry before versions R10.5.2, R10.6.2, and R10.7.1. The article states that this issue allows a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access. Credit for CVE-2026-10523 is given to Bryan Lam, while CVE-2026-10520 is credited to an unknown party.\u003c/p\u003e\n\n\u003ch2 id=\"product-context\"\u003eProduct context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Ivanti Sentry, formerly MobileIron Sentry, as an in-line gateway that manages, encrypts, and secures traffic between mobile devices and backend enterprise systems. It commonly sits between corporate mobile fleets and resources such as Microsoft Exchange, controlling ActiveSync email traffic and application data. Sentry works alongside Ivanti Endpoint Manager Mobile and enforces device-level access decisions so that only compliant, registered devices can reach internal services.\u003c/p\u003e\n\n\u003cp\u003eThe researchers note that the application is exposed under the \u003ccode\u003e/mics\u003c/code\u003e context path, while Ivanti EPMM is exposed under \u003ccode\u003e/mifs\u003c/code\u003e. They identify the visible Sentry application login path as \u003ccode\u003e/mics/login.jsp\u003c/code\u003e. Their analysis compares Ivanti/MobileIron Sentry 10.5.1, described as vulnerable, against Ivanti/MobileIron Sentry 10.5.2, described as different.\u003c/p\u003e\n\n\u003ch2 id=\"diffing-and-vulnerable-endpoint-identification\"\u003eDiffing and vulnerable endpoint identification\u003c/h2\u003e\n\n\u003cp\u003eThe researchers examined \u003ccode\u003emics.war\u003c/code\u003e and found that only one JAR changed between the vulnerable and patched versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003emics-core-10.5.1-R10.5.1.jar\u003c/code\u003e, described as vulnerable.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emics-core-10.5.2-R10.5.2.jar\u003c/code\u003e, described as different.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe change was located in \u003ccode\u003emics-core/com/mi/middleware/rest/controller/ConfigServiceController.java\u003c/code\u003e. The controller had a parent mapping of \u003ccode\u003e/api/v2/sentry/mics-config\u003c/code\u003e, and the changed method used a \u003ccode\u003e@PostMapping\u003c/code\u003e of \u003ccode\u003e/handleMessage\u003c/code\u003e. Combining these mappings with the \u003ccode\u003e/mics\u003c/code\u003e application context produced the target path \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerable-controller-behavior\"\u003eVulnerable controller behavior\u003c/h2\u003e\n\n\u003cp\u003eIn the vulnerable implementation, the \u003ccode\u003ehandleMessage\u003c/code\u003e controller method accepted a \u003ccode\u003emessage\u003c/code\u003e string. If the value was not null or empty, it passed that user-supplied value directly to \u003ccode\u003ethis.configService.handleMessage(message)\u003c/code\u003e. The method returned a success response if the result was non-null and did not contain an error, otherwise it returned a bad request response.\u003c/p\u003e\n\n\u003cp\u003eThis meant that the endpoint did not treat the \u003ccode\u003emessage\u003c/code\u003e parameter as a passive string. Instead, it passed the value into the backend MICS configuration-processing system. The article follows that execution flow into \u003ccode\u003eConfigServiceHandler.java\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"backend-command-parsing\"\u003eBackend command parsing\u003c/h2\u003e\n\n\u003cp\u003eInside \u003ccode\u003eConfigServiceHandler.handleMessage(String msg)\u003c/code\u003e, the user-controlled message was parsed with a \u003ccode\u003eStringTokenizer\u003c/code\u003e. The first token became \u003ccode\u003ecommand\u003c/code\u003e, the second became \u003ccode\u003emodule\u003c/code\u003e, and the third became \u003ccode\u003expath\u003c/code\u003e. Remaining tokens were assembled into a \u003ccode\u003evalue\u003c/code\u003e string for commands including \u003ccode\u003eset\u003c/code\u003e, \u003ccode\u003edelete\u003c/code\u003e, \u003ccode\u003eget\u003c/code\u003e, \u003ccode\u003eadd\u003c/code\u003e, \u003ccode\u003emodify\u003c/code\u003e, \u003ccode\u003eimport\u003c/code\u003e, \u003ccode\u003eexport\u003c/code\u003e, \u003ccode\u003etest\u003c/code\u003e, \u003ccode\u003ecopy\u003c/code\u003e, \u003ccode\u003eexecute\u003c/code\u003e, \u003ccode\u003equery\u003c/code\u003e, and \u003ccode\u003emigratepasswordhash\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe parsed values were then passed into another \u003ccode\u003ehandleMessage\u003c/code\u003e method with the signature \u003ccode\u003ehandleMessage(String module, String xpath, String command, String value)\u003c/code\u003e. That method created a \u003ccode\u003eConfigRequestProcessor\u003c/code\u003e, optionally set a module handler, and switched on the parsed command value. The \u003ccode\u003eEXECUTE\u003c/code\u003e case routed execution to \u003ccode\u003ereqProcessor.handleExecute(xpath, value)\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"execution-path-and-reflection\"\u003eExecution path and reflection\u003c/h2\u003e\n\n\u003cp\u003eThe article traces the \u003ccode\u003eEXECUTE\u003c/code\u003e path into \u003ccode\u003eConfigRequestProcessor.handleExecute()\u003c/code\u003e. That method validated the XPath, read the XML configuration file, set handler configuration, selected XML objects for the supplied XPath and value, and then called \u003ccode\u003eCommonUtilities.executeNativeCommand(this.handler.getNativeModule(), tmpObjType, \u0026quot;Execute\u0026quot;)\u003c/code\u003e. The method returned a success response containing the native command response.\u003c/p\u003e\n\n\u003cp\u003eThe analysis then follows execution into \u003ccode\u003eCommonUtilities.executeNativeCommand()\u003c/code\u003e. That method derived method and class information from the XML object, retrieved methods such as \u003ccode\u003egetExecutemethod\u003c/code\u003e, \u003ccode\u003egetClassname\u003c/code\u003e, and \u003ccode\u003egetBeanclass\u003c/code\u003e, and invoked a module method through \u003ccode\u003eReflectionUtilities.excuteModuleMethod()\u003c/code\u003e. The article characterizes this as a path where the parsed XML object identifies which native method should handle the request and invokes that method via reflection.\u003c/p\u003e\n\n\u003ch2 id=\"patch-clue-and-proof-of-reproduction\"\u003ePatch clue and proof of reproduction\u003c/h2\u003e\n\n\u003cp\u003eThe patched version of the controller stopped using the user-supplied \u003ccode\u003emessage\u003c/code\u003e value. Instead, it hardcoded a command string:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eexecute system /configuration/system/commandexec \u0026lt;commandexec\u0026gt;\\n\u0026lt;index\u0026gt;1\u0026lt;/index\u0026gt;\\n\u0026lt;reqandres\u0026gt;/bin/cat /sys/devices/virtual/dmi/id/product_name\u0026lt;/reqandres\u0026gt;\\n\u0026lt;/commandexec\u0026gt;\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article treats this hardcoded \u003ccode\u003ecommandexec\u003c/code\u003e XML block and \u003ccode\u003ereqandres\u003c/code\u003e field as a strong indicator of the expected command structure. Using that structure, the researchers sent a POST request to \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e on a vulnerable instance. They replaced the benign \u003ccode\u003e/bin/cat\u003c/code\u003e command with \u003ccode\u003euname -a\u003c/code\u003e in the \u003ccode\u003ereqandres\u003c/code\u003e field.\u003c/p\u003e\n\n\u003cp\u003eThe response returned HTTP 200 and included the Linux \u003ccode\u003euname -a\u003c/code\u003e output inside the JSON \u003ccode\u003edata\u003c/code\u003e field. The article states that this reproduced CVE-2026-10520 as a pre-authenticated OS command injection in Ivanti Sentry.\u003c/p\u003e\n\n\u003ch2 id=\"patch-and-additional-defensive-changes\"\u003ePatch and additional defensive changes\u003c/h2\u003e\n\n\u003cp\u003eThe article shows the patched implementation of \u003ccode\u003eConfigServiceController\u003c/code\u003e, where \u003ccode\u003ehandleMessage(String message)\u003c/code\u003e still receives a \u003ccode\u003emessage\u003c/code\u003e parameter but does not use it. Instead, it always calls \u003ccode\u003econfigService.handleMessage()\u003c/code\u003e with the hardcoded \u003ccode\u003e/bin/cat /sys/devices/virtual/dmi/id/product_name\u003c/code\u003e command. The article notes that the underlying functionality was not removed; rather, attacker control over the input passed into the command string was removed.\u003c/p\u003e\n\n\u003cp\u003eThe researchers also found additional defensive changes outside the Java code. The bundled Apache configuration now contains regex-based rules that block access to the vulnerable endpoint entirely. According to the article, unauthenticated requests are redirected to the login page with a \u003ccode\u003e302\u003c/code\u003e response.\u003c/p\u003e\n\n\u003ch2 id=\"detection-artifact\"\u003eDetection artifact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the researchers are providing a Detection Artefact Generator to help teams determine whether their environment is vulnerable. The linked GitHub repository is described as \u003ccode\u003ewatchTowr-vs-Ivanti-Sentry-RCE-CVE-2026-10520-CVE-2026-10523\u003c/code\u003e. The article presents it as a way for teams to check exposure to the Ivanti Sentry issues discussed.\u003c/p\u003e\n","keyPoints":["Ivanti published an advisory for CVE-2026-10520, an OS command injection vulnerability in Ivanti Sentry before versions R10.5.2, R10.6.2, and R10.7.1 that allows a remote unauthenticated user to achieve root-level remote code execution.","The article identifies the vulnerable endpoint as /mics/api/v2/sentry/mics-config/handleMessage, where a user-supplied message parameter is passed into the backend configuration handling logic.","The message value is parsed as a MICS configuration command into fields such as command, module, XPath, and XML body, and the EXECUTE path can reach executeNativeCommand through reflection-based backend handling.","The researchers reproduced CVE-2026-10520 by sending a POST request containing a commandexec XML block with uname -a in the reqandres field and received the command output in the HTTP response.","The patched implementation hardcodes the command passed to handleMessage and includes Apache configuration rules that block access to the vulnerable endpoint, redirecting unauthenticated requests to the login page."],"insights":["The patch indicates that the vulnerable endpoint was not removed; instead, Ivanti eliminated user control over the command string and added Apache-level blocking for unauthenticated access to the endpoint.","A single changed JAR, mics-core-10.5.2-R10.5.2.jar, and a single changed controller method were sufficient for the researchers to trace the vulnerable code path.","The patched hardcoded command revealed the exact commandexec XML structure needed to reproduce the vulnerability on a vulnerable instance.","The endpoint treated the message parameter as an internal MICS configuration command rather than ordinary user input, allowing access to system-level configuration actions through the EXECUTE path."],"referencedReports":[{"title":"Security Advisory Ivanti Sentry CVE-2026-10520 CVE-2026-10523","url":"https://hub.ivanti.com/s/article/Security-Advisory-Ivanti-Sentry-CVE-2026-10520-CVE-2026-10523?language=en_US\u0026ref=labs.watchtowr.com","publisher":"Ivanti","context":"The article opens by citing Ivanti’s advisory for CVE-2026-10520 and CVE-2026-10523 as the basis for investigating the vulnerabilities in Ivanti Sentry.","category":"","primary":false}],"body":"\u003cp\u003eIvanti published an advisory for two Ivanti Sentry vulnerabilities: CVE-2026-10520 and CVE-2026-10523. CVE-2026-10520 is described as an OS command injection affecting Ivanti Sentry before R10.5.2, R10.6.2, and R10.7.1, allowing remote unauthenticated root-level remote code execution. CVE-2026-10523 is described as an authentication bypass that can allow a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access.\u003c/p\u003e\n\n\u003cp\u003eThe article focuses on CVE-2026-10520 and traces it to the \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e endpoint in the Sentry application. Researchers diffed vulnerable and patched versions and found that the relevant change was in \u003ccode\u003emics-core\u003c/code\u003e within \u003ccode\u003eConfigServiceController.java\u003c/code\u003e. The vulnerable implementation accepted a user-supplied \u003ccode\u003emessage\u003c/code\u003e parameter and passed it into backend configuration handling logic.\u003c/p\u003e\n\n\u003cp\u003eThe technical analysis shows that the \u003ccode\u003emessage\u003c/code\u003e value was parsed into a MICS configuration command, including fields such as command, module, XPath, and XML body. The \u003ccode\u003eexecute\u003c/code\u003e command path could reach \u003ccode\u003eexecuteNativeCommand()\u003c/code\u003e, where backend native methods were invoked through reflection. The patched implementation hardcodes a benign command and adds Apache configuration rules that block unauthenticated access to the vulnerable endpoint by redirecting requests to the login page.\u003c/p\u003e\n"},{"n":1,"title":"Microsoft Defender 'RoguePlanet' zero-day grants SYSTEM privileges","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-defender-rogueplanet-zero-day-grants-system-privileges/","time":"23:11","priority":"SHOULD READ","score":88,"tldr":"A researcher released a Microsoft Defender zero-day exploit called RoguePlanet that can give attackers SYSTEM privileges on fully patched Windows 10 and 11 systems via a race condition. ThreatLocker says it reproduced the exploit, while Microsoft has not yet issued a public response or fix.","briefOverview":"\u003cp\u003eSecurity researcher Nightmare Eclipse released a new Microsoft Defender zero-day exploit named \u003cstrong\u003eRoguePlanet\u003c/strong\u003e shortly after Microsoft fixed two previously disclosed flaws in the June 2026 Patch Tuesday updates. The researcher says the vulnerability affects fully patched Windows 10 and Windows 11 devices. When successful, the exploit can spawn a Windows command prompt with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse described RoguePlanet as a Microsoft Defender race condition and said its reliability varies by machine. The flaw was reportedly tested against Windows 11 Official and Canary builds, as well as Windows 10 systems with June 2026 security updates installed. ThreatLocker told BleepingComputer it reproduced the exploit on fully patched Windows 11 systems with KB5094126 installed.\u003c/p\u003e\n\n\u003cp\u003eThe researcher said RoguePlanet was originally developed as a remote code execution issue involving Microsoft Defender handling files on remote SMB shares. However, they claimed Microsoft silently hardened Defender in mid-May by patching the \u003ccode\u003empengine!SysIO*\u003c/code\u003e API, blocking junction attacks. The release is part of an ongoing dispute between Nightmare Eclipse and Microsoft over vulnerability disclosure and bug bounty practices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA security researcher known as Nightmare Eclipse released a Microsoft Defender zero-day exploit named \u003cstrong\u003eRoguePlanet\u003c/strong\u003e after Microsoft’s June 2026 Patch Tuesday updates. The release came only hours after Microsoft fixed two previously disclosed flaws. The article says the new exploit can allow attackers to obtain SYSTEM privileges on fully patched Windows 10 and Windows 11 devices.\u003c/p\u003e\n\n\u003cp\u003eRoguePlanet is described by the researcher as a race condition vulnerability in Microsoft Defender. Nightmare Eclipse said the exploit is “hit or miss,” with 100% success on some machines and poor reliability on others. When exploitation succeeds, a Windows command prompt is spawned with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was reportedly tested against Windows 11 Official and Canary builds, along with Windows 10 systems that had the June 2026 security updates installed. ThreatLocker told BleepingComputer that it successfully reproduced the flaw and confirmed it worked on fully patched Windows 11 systems with KB5094126 installed. ThreatLocker also said organizations using application allowlisting can prevent the exploit from executing.\u003c/p\u003e\n\n\u003cp\u003eAccording to Nightmare Eclipse, RoguePlanet was originally developed as a remote code execution vulnerability tied to Microsoft Defender’s handling of files hosted on remote SMB shares. The researcher said the original scenario required coercing a victim to open a \u003ccode\u003e.vhd(x)\u003c/code\u003e file on a remote SMB server, which could result in Defender overwriting its own files and producing remote code execution. The researcher also described another possible scenario involving SMB shares and symlink evaluation settings.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse claimed Microsoft silently hardened Defender in mid-May by patching the \u003ccode\u003empengine!SysIO*\u003c/code\u003e API, which blocked junction attacks. The researcher said that after rewriting RoguePlanet, the current public version remains focused on local privilege escalation and it is unclear whether it can still be turned into remote code execution. BleepingComputer contacted Microsoft about the new zero-day and said it would update the story if it received a statement.\u003c/p\u003e\n\n\u003cp\u003eThe article places the release within an ongoing dispute between Nightmare Eclipse and Microsoft over vulnerability disclosure and bug bounty practices. Over recent months, the researcher has publicly released several Windows zero-days, including BlueHammer, RedSun, GreenPlasma, and YellowKey. Microsoft fixed the GreenPlasma and YellowKey flaws in the June 2026 Patch Tuesday updates, while Nightmare Eclipse claimed Microsoft previously removed repositories hosting their exploits from GitHub and GitLab.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSecurity researcher Nightmare Eclipse released a new Microsoft Defender zero-day exploit called \u003cstrong\u003eRoguePlanet\u003c/strong\u003e. The release occurred just hours after Microsoft fixed two previously disclosed flaws during the June 2026 Patch Tuesday updates. The article reports that the new vulnerability affects fully patched Windows 10 and Windows 11 systems.\u003c/p\u003e\n\n\u003cp\u003eThe exploit is described as capable of spawning a Windows command prompt with SYSTEM privileges. Nightmare Eclipse published the proof-of-concept exploit on a self-hosted Git repository after saying that GitHub and GitLab repositories hosting their exploits had previously been removed by Microsoft.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-issue\"\u003eCore technical issue\u003c/h2\u003e\n\n\u003cp\u003eRoguePlanet is described by Nightmare Eclipse as a Microsoft Defender race condition vulnerability. The researcher said the exploit is not uniformly reliable across systems, writing that it achieved a 100% success rate on some machines while struggling on others.\u003c/p\u003e\n\n\u003cp\u003eWhen exploitation succeeds, the result is a command prompt running with SYSTEM privileges. The article says the flaw was reportedly tested against:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 Official builds\u003c/li\u003e\n\u003cli\u003eWindows 11 Canary builds\u003c/li\u003e\n\u003cli\u003eWindows 10 systems with the June 2026 security updates installed\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"third-party-reproduction\"\u003eThird-party reproduction\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity firm ThreatLocker told BleepingComputer that it successfully reproduced the flaw in testing. ThreatLocker said it confirmed that the exploit worked against fully patched Windows 11 systems with KB5094126 installed. The company also shared a video demonstrating the exploit.\u003c/p\u003e\n\n\u003cp\u003eDanny Jenkins, CEO of ThreatLocker, told BleepingComputer that the company’s initial analysis confirmed the RoguePlanet exploit is viable and performs as described. He also said that organizations using application allowlisting can prevent the exploit from executing, which he described as an effective layer of protection against the attack.\u003c/p\u003e\n\n\u003ch2 id=\"original-remote-code-execution-scenario\"\u003eOriginal remote code execution scenario\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse said RoguePlanet was originally developed as a remote code execution vulnerability. According to the researcher, the original issue exploited Microsoft Defender’s handling of files hosted on remote SMB shares.\u003c/p\u003e\n\n\u003cp\u003eThe researcher said the original exploitation path required an attacker to coerce a victim into opening a \u003ccode\u003e.vhd(x)\u003c/code\u003e file on a remote SMB server. Successful exploitation reportedly caused Defender to overwrite its own files, resulting in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse also described another possible scenario involving remote code execution by coercing a victim into opening an SMB share if symlink evaluation settings were enabled. The article does not state that this scenario was completed or demonstrated in the current public release.\u003c/p\u003e\n\n\u003ch2 id=\"reported-microsoft-hardening\"\u003eReported Microsoft hardening\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse claimed Microsoft silently hardened Defender in mid-May by patching the \u003ccode\u003empengine!SysIO*\u003c/code\u003e API. The researcher said this blocked junction attacks.\u003c/p\u003e\n\n\u003cp\u003eThe researcher wrote that rewriting RoguePlanet to make it functional again was difficult and that they could not complete the other scenarios. As a result, the article says it remains unclear whether RoguePlanet is limited to local privilege escalation or whether there is still a way to turn it into remote code execution.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-dispute-context\"\u003eDisclosure dispute context\u003c/h2\u003e\n\n\u003cp\u003eThe release is part of an ongoing dispute between Nightmare Eclipse and Microsoft over vulnerability disclosure and bug bounty practices. The article says the researcher has publicly released multiple Windows zero-days over the past several months.\u003c/p\u003e\n\n\u003cp\u003eThe previously released flaws named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBlueHammer\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRedSun\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGreenPlasma\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eYellowKey\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSome of those zero-days targeted Microsoft Defender, while others targeted BitLocker and Windows components. Microsoft fixed the GreenPlasma and YellowKey flaws as part of the June 2026 Patch Tuesday updates.\u003c/p\u003e\n\n\u003ch2 id=\"repository-removals-and-microsoft-response\"\u003eRepository removals and Microsoft response\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse claimed Microsoft repeatedly targeted and removed previous exploit repositories hosted on GitHub and GitLab. The researcher said this prompted the creation of a self-hosted code platform at \u003ccode\u003eprojectnightcrawler.dev\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Microsoft previously responded to the disclosures with warnings that it would work with law enforcement when people engage in “malicious activity causing real harm to our customers.” BleepingComputer said this led many in the cybersecurity community to think Microsoft was threatening the researcher.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent status\u003c/h2\u003e\n\n\u003cp\u003eAt the time of the article, BleepingComputer had contacted Microsoft about the new RoguePlanet zero-day. The article states that BleepingComputer would update the story if it received a statement from Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe article presents RoguePlanet as a newly released Microsoft Defender zero-day proof of concept that can grant SYSTEM privileges on fully patched Windows systems, with third-party confirmation from ThreatLocker and no Microsoft statement included at publication time.\u003c/p\u003e\n","keyPoints":["Security researcher Nightmare Eclipse released a Microsoft Defender zero-day exploit named RoguePlanet that can spawn a command prompt with SYSTEM privileges on fully patched Windows 10 and Windows 11 devices.","Nightmare Eclipse described RoguePlanet as a race condition with variable reliability, saying it achieved 100% success on some machines but struggled on others.","ThreatLocker told BleepingComputer it reproduced the exploit on fully patched Windows 11 systems with KB5094126 installed and confirmed that the exploit worked as described.","Nightmare Eclipse said RoguePlanet was originally developed as a remote code execution vulnerability involving Microsoft Defender handling files on remote SMB shares, but claimed Microsoft silently hardened Defender in mid-May to block junction attacks.","The RoguePlanet release is part of an ongoing dispute between Nightmare Eclipse and Microsoft over vulnerability disclosure and bug bounty practices, following prior releases of BlueHammer, RedSun, GreenPlasma, and YellowKey zero-days."],"insights":["Fully patched Windows 10 and Windows 11 systems may still be exposed, as the exploit was reportedly tested against systems with the June 2026 security updates installed and reproduced on Windows 11 with KB5094126.","Application allowlisting is an immediately actionable mitigation layer, as ThreatLocker said organizations using it can prevent the RoguePlanet exploit from executing.","Microsoft’s reported mid-May hardening of Defender’s mpengine!SysIO* API appears to have blocked the researcher’s earlier junction-based scenarios, leaving the current public exploit focused on local privilege escalation rather than confirmed remote code execution.","The exploit’s effectiveness may vary significantly by machine, since the researcher described the race condition as hit-or-miss despite reaching 100% success on some systems."],"referencedReports":[],"body":"\u003cp\u003eSecurity researcher Nightmare Eclipse released a new Microsoft Defender zero-day exploit named \u003cstrong\u003eRoguePlanet\u003c/strong\u003e shortly after Microsoft fixed two previously disclosed flaws in the June 2026 Patch Tuesday updates. The researcher says the vulnerability affects fully patched Windows 10 and Windows 11 devices. When successful, the exploit can spawn a Windows command prompt with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse described RoguePlanet as a Microsoft Defender race condition and said its reliability varies by machine. The flaw was reportedly tested against Windows 11 Official and Canary builds, as well as Windows 10 systems with June 2026 security updates installed. ThreatLocker told BleepingComputer it reproduced the exploit on fully patched Windows 11 systems with KB5094126 installed.\u003c/p\u003e\n\n\u003cp\u003eThe researcher said RoguePlanet was originally developed as a remote code execution issue involving Microsoft Defender handling files on remote SMB shares. However, they claimed Microsoft silently hardened Defender in mid-May by patching the \u003ccode\u003empengine!SysIO*\u003c/code\u003e API, blocking junction attacks. The release is part of an ongoing dispute between Nightmare Eclipse and Microsoft over vulnerability disclosure and bug bounty practices.\u003c/p\u003e\n"}]</script>
