syntax = "proto3";
package downlink;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

import "articles.proto";
import "config.proto";

option go_package = "protos/";


// FeedsService provides methods for working with feeds
service FeedsService {
  // ListFeeds returns all registered feeds
  rpc ListFeeds(ListFeedsRequest) returns (ListFeedsResponse) {}

  // RegisterFeed adds a new feed to be monitored
  rpc RegisterFeed(RegisterFeedRequest) returns (google.protobuf.Empty) {}

  // RefreshAllFeeds triggers a refresh of all registered feeds, streaming per-feed results
  rpc RefreshAllFeeds(RefreshAllFeedsRequest) returns (stream RefreshAllFeedsEvent) {}

  // RefreshFeed refreshes a specific feed with optional time window filtering
  rpc RefreshFeed(RefreshFeedRequest) returns (RefreshFeedResponse) {}

  // InspectFeed fetches and parses a feed URL (read-only, pre-registration),
  // returning a diagnosis plus sample article links for building a feed config.
  rpc InspectFeed(InspectFeedRequest) returns (InspectFeedResponse) {}

  // InspectArticle scrapes a single article URL in a given mode and, when
  // selectors are supplied, returns the extracted content for selector testing.
  rpc InspectArticle(InspectArticleRequest) returns (InspectArticleResponse) {}

  // DeleteFeed removes a feed from both the models and the database
  rpc DeleteFeed(DeleteFeedRequest) returns (google.protobuf.Empty) {}

  // ApplyFeeds reconciles the database to match the desired set of feeds:
  // feeds in the request are created/updated, feeds absent from it are disabled.
  rpc ApplyFeeds(ApplyFeedsRequest) returns (ApplyFeedsResponse) {}

  // DeleteFeeds removes the given feeds (by id) from the database
  rpc DeleteFeeds(DeleteFeedsRequest) returns (DeleteFeedsResponse) {}
}

// ListFeedsRequest is the request for the ListFeeds method
message ListFeedsRequest {}

// ListFeedsResponse is the response for the ListFeeds method
message ListFeedsResponse {
  repeated Feed feeds = 1;
}

// RegisterFeedRequest is the request for the RegisterFeed method
message RegisterFeedRequest {
  FeedConfig feed_config = 1;
}

// RefreshAllFeedsRequest is the request for the RefreshAllFeeds method
message RefreshAllFeedsRequest {}

// RefreshFeedResponse carries per-feed stats returned after a refresh
message RefreshFeedResponse {
  string feed_id = 1;
  string feed_title = 2;
  int32 total_fetched = 3;
  int32 stored = 4;
  int32 skipped = 5;
  repeated string errors = 6;
  FeedDiagnosis diagnosis = 7; // populated only when the request set diagnose=true
}

// FeedDiagnosis is the structured result of inspecting a feed's raw HTTP response,
// returned by RefreshFeed when diagnose=true. It surfaces what actually came back
// over the wire so feed parse failures can be debugged without trace-level logging.
message FeedDiagnosis {
  string url = 1;
  string final_url = 2;          // after redirects
  int32 http_status = 3;         // 0 when the request never completed
  string content_type = 4;
  int32 content_length = 5;      // bytes read
  string feed_type_guess = 6;    // rss | atom | json-feed | html | empty | unknown
  string declared_charset = 7;   // from XML prolog or Content-Type, when present
  int32 item_count = 8;          // parsed items when the feed is valid
  string parse_error = 9;        // gofeed parse error, empty when valid
  int32 invalid_utf8_at = 10;    // byte offset of first invalid UTF-8 byte; -1 when valid
  string verdict = 11;           // one-line human summary
  string body_snippet = 12;      // first printable bytes of the body
  string hex_dump = 13;          // bytes around invalid_utf8_at, when relevant
  string raw_body_path = 14;     // on-disk path to the saved raw body
  int64 fetch_duration_ms = 15;
}

enum RefreshEventType {
  STARTED   = 0; // feed has been queued and is now in progress
  COMPLETED = 1; // feed finished (result fields are populated)
}

// RefreshAllFeedsEvent is streamed once per feed on start and on completion
message RefreshAllFeedsEvent {
  RefreshFeedResponse result    = 1;
  int32               completed = 2; // feeds completed so far (COMPLETED events only)
  int32               total     = 3; // total feeds being refreshed
  RefreshEventType    event_type = 4;
}

// RefreshFeedRequest is the request for the RefreshFeed method
message RefreshFeedRequest {
  string feed_id = 1;
  google.protobuf.Timestamp from = 2; // Optional: start of time window
  google.protobuf.Timestamp to = 3;   // Optional: end of time window
  bool overwrite = 4;                 // Optional: overwrite existing articles
  bool restore = 5;                   // Optional: overwrite only articles with no content
  int32 last_n = 6;                   // Optional: keep only the N most-recently-published articles
  bool diagnose = 7;                  // Optional: read-only diagnose (fetch+parse only, no storage), returns diagnosis
}

// InspectFeedRequest probes a feed URL before it is registered. Headers are
// optional custom HTTP headers; max_links caps the returned sample article links.
message InspectFeedRequest {
  string url = 1;
  map<string, string> headers = 2;
  int32 max_links = 3;
}

// InspectFeedResponse carries the feed diagnosis plus sample article links and
// the detected feed title, used to scaffold a feed configuration.
message InspectFeedResponse {
  FeedDiagnosis diagnosis = 1;
  repeated string sample_links = 2;
  string detected_title = 3;
}

// InspectArticleRequest scrapes one article URL in the given mode
// ("" / static, dynamic, full_browser). When selectors are set the response also
// carries the extracted content. html_limit caps the returned page HTML (0 = default).
message InspectArticleRequest {
  string url = 1;
  string mode = 2;
  map<string, string> headers = 3;
  Selectors selectors = 4;
  int32 html_limit = 5;
}

// InspectArticleResponse reports the scrape outcome: the (capped) page HTML for
// inspection plus, when selectors were supplied, the extracted markdown and stats.
message InspectArticleResponse {
  int32 http_status = 1;
  string mode_used = 2;
  int32 raw_html_len = 3;
  string html = 4;            // page HTML, capped to html_limit, for selector inspection
  string extracted = 5;       // extracted markdown when selectors were supplied
  int32 extracted_len = 6;
  bool selector_matched = 7;
  string error = 8;
  int64 duration_ms = 9;
}

// DeleteFeedRequest is the request for the DeleteFeed method
message DeleteFeedRequest {
  string feed_id = 1;
}

// ApplyFeedsRequest carries the desired set of feeds to reconcile against
message ApplyFeedsRequest {
  repeated FeedConfig feeds = 1;
  Selectors default_selectors = 2; // baked into feeds lacking their own selectors
  bool dry_run = 3;                // when true, compute the plan but make no changes
}

// ApplyFeedsResponse reports the (would-be, when dry_run) reconciliation outcome.
// Each list carries human-readable identifiers (e.g. "title — url"), not ids.
message ApplyFeedsResponse {
  repeated string created = 1;
  repeated string updated = 2;
  repeated string disabled = 3;
}

// DeleteFeedsRequest carries the ids of the feeds to delete
message DeleteFeedsRequest {
  repeated string feed_ids = 1;
  bool dry_run = 2; // when true, report what would be deleted but make no changes
}

// DeleteFeedsResponse reports the (would-be, when dry_run) deletion outcome
message DeleteFeedsResponse {
  repeated string deleted = 1;
  repeated string not_found = 2;
}

// FeedGroup represents a group of feeds
message FeedGroup {
  string id = 1;
  string name = 2;
  string icon = 3;
  int32 sort_order = 4;
  repeated Feed feeds = 5;
}


// Feed represents a feed with its metadata
message Feed {
  string id = 1;
  string url = 2;
  string type = 3;
  string title = 4;
  google.protobuf.Timestamp last_fetch = 5;
  map<string, google.protobuf.Any> scraper = 6;
  bool enabled = 7;
  string group_id = 8;
  repeated Article articles = 9;
}

// FeedItem represents a generic feed item returned by a scraper
message FeedItem {
  string id = 1;
  string title = 2;
  string content = 3;
  string link = 4;
  google.protobuf.Timestamp published_at = 5;
  repeated string tags = 6;
  string category = 7;
  string hero_image = 8;
}

// FeedResult represents the result of fetching a feed
message FeedResult {
  Feed feed = 1;
  repeated FeedItem items = 2;
  string error = 3;
}