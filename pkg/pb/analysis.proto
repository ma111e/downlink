syntax = "proto3";
package downlink;

import "google/protobuf/timestamp.proto";

option go_package = "protos/";

import "articles.proto";

// AnalysisService provides methods for working with articles
service AnalysisService {
  // GetAllArticleAnalyses retrieves all analysis results for a specific article
  rpc GetAllArticleAnalyses(GetAllArticleAnalysesRequest) returns (GetAllArticleAnalysesResponse) {}

  rpc GetAnalysis(GetAnalysisRequest) returns (ArticleAnalysis) {}

  // ListGlossaryEntries lists entries from the persistent global glossary.
  rpc ListGlossaryEntries(ListGlossaryEntriesRequest) returns (ListGlossaryEntriesResponse) {}

  // SetGlossaryOverride sets a curated definition for a term that survives regeneration.
  rpc SetGlossaryOverride(SetGlossaryOverrideRequest) returns (SetGlossaryOverrideResponse) {}
}

// GlossaryEntry is one deduplicated entry in the persistent global glossary.
message GlossaryEntry {
  string id = 1;
  string normalized_key = 2;
  string term = 3;
  string kind = 4;     // provenance: "jargon" | "entity"
  string category = 5; // semantic type taxonomy
  string definition = 6;
  string curated_definition = 7;
  bool manual_override = 8;
  string tag_id = 9;
  string effective_definition = 10; // curated override when set, else definition
}

message ListGlossaryEntriesRequest {
  int32 limit = 1; // 0 = no limit
}

message ListGlossaryEntriesResponse {
  repeated GlossaryEntry entries = 1;
}

message SetGlossaryOverrideRequest {
  string term = 1;
  string definition = 2;
}

message SetGlossaryOverrideResponse {
  GlossaryEntry entry = 1;
}

// ArticleAnalysis represents an analysis result from an LLM provider for an article
message ReferencedReport {
  string title = 1;
  string url = 2;
  string publisher = 3;
  string context = 4;
}

// ScoreDimensions are the rubric sub-scores (0-4 each) the importance score is
// computed from. See pkg/scoring.
message ScoreDimensions {
  int32 specificity = 1;
  int32 severity = 2;
  int32 breadth = 3;
  int32 novelty = 4;
  int32 actionability = 5;
  int32 credibility = 6;
  bool is_aggregator = 7;
}

message ArticleAnalysis {
  string id = 1;
  string article_id = 2;
  string provider_type = 3;
  string model_name = 4;
  int32 importance_score = 5;
  repeated string key_points = 6;
  repeated string insights = 7;
  string tldr = 18;
  string justification = 8;
  string brief_overview = 9;
  string standard_synthesis = 10;
  string comprehensive_synthesis = 11;
  string thinking_process = 12;
  string raw_response = 13;
  google.protobuf.Timestamp created_at = 14;
  string key_points_json = 15;
  string insights_json = 16;
  optional Article article = 17;
  repeated ReferencedReport referenced_reports = 19;
  string referenced_reports_json = 20;
  optional ScoreDimensions score_dimensions = 21;
}

// GetAllArticleAnalysesRequest represents a request to retrieve all analysis results for a specific article
message GetAllArticleAnalysesRequest {
  string article_id = 1;
}

// GetAllArticleAnalysesResponse represents the response with all analysis results for a specific article
message GetAllArticleAnalysesResponse {
  repeated ArticleAnalysis analyses = 1;
}

message GetAnalysisRequest {
  string article_id = 1;
}
