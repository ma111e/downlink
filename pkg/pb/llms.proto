syntax = "proto3";
package downlink;

option go_package = "protos/";

import "google/protobuf/empty.proto";

import "config.proto";
import "analysis.proto";

// LLMService provides methods for working with LLMs
service LLMsService {
  // GetLLMProviders returns the current LLM provider configurations
  rpc GetLLMProviders(GetLLMProvidersRequest) returns (GetLLMProvidersResponse) {}

  // SaveLLMProviders updates the LLM provider configurations
  rpc SaveLLMProviders(SaveLLMProvidersRequest) returns (google.protobuf.Empty) {}

  // GetAvailableModels fetches available models from configured providers
  rpc GetAvailableModels(GetAvailableModelsRequest) returns (ModelsResponse) {}

  // AnalyzeArticleWithProviderModel analyzes an article using a provider model
  rpc AnalyzeArticleWithProviderModel(AnalyzeArticleWithProviderModelRequest) returns (AnalyzeArticleWithProviderModelResponse) {}

  // AnalyzeArticle analyzes an article using the default model
  rpc AnalyzeArticle(AnalyzeArticleRequest) returns (AnalyzeArticleResponse) {}

  // GetAnalysisConfig returns the current analysis configuration
  rpc GetAnalysisConfig(GetAnalysisConfigRequest) returns (GetAnalysisConfigResponse) {}

  // PreviewAnalysisPrompt builds the analysis prompt for an article without sending it
  rpc PreviewAnalysisPrompt(PreviewAnalysisPromptRequest) returns (PreviewAnalysisPromptResponse) {}

  // StreamAnalyzeArticle analyzes an article and streams task-level progress events
  rpc StreamAnalyzeArticle(AnalyzeArticleWithProviderModelRequest) returns (stream AnalysisProgressEvent) {}
}

// GetAnalysisConfigRequest is the request for the GetAnalysisConfig method
message GetAnalysisConfigRequest {}

// GetAnalysisConfigResponse is the response for the GetAnalysisConfig method
message GetAnalysisConfigResponse {
  AnalysisConfig analysis_config = 1;
}

// GetLLMProvidersRequest is the request for the GetLLMProviders method
message GetLLMProvidersRequest {}

// GetLLMProvidersResponse is the response for the GetLLMProviders method
message GetLLMProvidersResponse {
  repeated ProviderConfig providers = 1;
}

// SaveLLMProvidersRequest is the request for the SaveLLMProviders method
message SaveLLMProvidersRequest {
  repeated ProviderConfig providers = 1;
}

// GetAvailableModelsRequest is the request for the GetAvailableModels method
message GetAvailableModelsRequest {}

// GetAvailableModelsResponse is the response for the GetAvailableModels method
// message GetAvailableModelsResponse {
//   ModelsResponse models_response = 1;
// }

// ModelInfo represents generic model information
message ModelInfo {
  string id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string provider_type = 5;
}

// AnalyzeArticleWithProviderModelRequest is the request for the AnalyzeArticleWithProviderModel method
message AnalyzeArticleWithProviderModelRequest {
  string article_id = 1;
  string provider_type = 2;
  string model_name = 3;
  bool fast_mode = 4; // If true, only extract key points
  bool skip_categorize = 5; // If true, skip the categorize (category + tags) task
  string provider_name = 6; // Named profile from config.providers; takes precedence over provider_type/model_name
}

// AnalyzeArticleWithProviderModelResponse is the response for the AnalyzeArticleWithProviderModel method
message AnalyzeArticleWithProviderModelResponse {
  ArticleAnalysis analysis = 1;
}

// AnalyzeArticleRequest is the request for the AnalyzeArticle method
message AnalyzeArticleRequest {
  string article_id = 1;
  bool fast_mode = 2; // If true, only extract key points
}

// AnalyzeArticleResponse is the response for the AnalyzeArticle method
message AnalyzeArticleResponse {
  ArticleAnalysis analysis = 1;
}

// PreviewAnalysisPromptRequest is the request for the PreviewAnalysisPrompt method
message PreviewAnalysisPromptRequest {
  string article_id = 1;
  string provider_type = 2;
  string model_name = 3;
}

// PreviewAnalysisPromptResponse is the response for the PreviewAnalysisPrompt method
message PreviewAnalysisPromptResponse {
  string prompt = 1;
}

// AnalysisProgressEvent is streamed during article analysis to report task-level progress
message AnalysisProgressEvent {
  // Which task: "categorize", "key_points", "tags", "importance", "insights", "summaries"
  string task_name = 1;

  // Status: "started", "completed", "error", "token"
  string status = 2;

  // 1-based index of the current task
  int32 task_index = 3;

  // Total number of tasks for this analysis
  int32 total_tasks = 4;

  // The parsed JSON result for this task (only on "completed")
  string task_result = 5;

  // Error message (only on "error")
  string error = 6;

  // Final analysis (only on the last "completed" event)
  ArticleAnalysis analysis = 7;

  // Token text chunk during LLM streaming (only on "token" status events)
  string token_chunk = 8;
}

// GenericLLMRequest represents a generic request to an LLM provider
message GenericLLMRequest {
  string model = 1;
  repeated Message messages = 2;
  string prompt = 3;
  float temperature = 4;
  int32 max_tokens = 5;
}

// Message represents a message in a chat-based LLM request
message Message {
  string role = 1;
  string content = 2;
}

// OllamaRequest represents the request to the Ollama API
message OllamaRequest {
  string model = 1;
  string prompt = 2;
  bool stream = 3;
}

// OllamaResponse represents the response from the Ollama API
message OllamaResponse {
  string model = 1;
  string response = 2;
  string created_at = 3;
}

// OpenAIRequest represents a request to the OpenAI API
message OpenAIRequest {
  string model = 1;
  repeated Message messages = 2;
  float temperature = 3;
  int32 max_tokens = 4;
}

// OpenAIChoice represents a choice in the OpenAI API response
message OpenAIChoice {
  int32 index = 1;
  Message message = 2;
  string finish_reason = 3;
}

// OpenAIResponse represents a response from the OpenAI API
message OpenAIResponse {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated OpenAIChoice choices = 5;
}

// AnthropicRequest represents a request to the Anthropic API
message AnthropicRequest {
  string model = 1;
  repeated Message messages = 2;
  float temperature = 3;
  int32 max_tokens = 4;
}

// AnthropicContentItem represents a content item in the Anthropic API response
message AnthropicContentItem {
  string type = 1;
  string text = 2;
}

// AnthropicResponse represents a response from the Anthropic API
message AnthropicResponse {
  string id = 1;
  string type = 2;
  string model = 3;
  repeated AnthropicContentItem content = 4;
}

// ModelsResponse represents the response structure for GetAvailableModels
message ModelsResponse {
  repeated ModelInfo models = 1;
  string error = 2;
}

// OpenAIModelData represents a model in OpenAI's models endpoint response
message OpenAIModelData {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string owned_by = 4;
}

// OpenAIModelsResponse represents the response from OpenAI's models endpoint
message OpenAIModelsResponse {
  string object = 1;
  repeated OpenAIModelData data = 2;
}

// AnthropicModelData represents a model in Anthropic's models endpoint response
message AnthropicModelData {
  string type = 1;
  string id = 2;
  string display_name = 3;
  string created_at = 4;
}

// AnthropicModelsResponse represents the response from Anthropic's models endpoint
message AnthropicModelsResponse {
  repeated AnthropicModelData data = 1;
  bool has_more = 2;
  string first_id = 3;
  string last_id = 4;
}

// OllamaModelDetails represents the details of an Ollama model
message OllamaModelDetails {
  string parent_model = 1;
  string format = 2;
  string family = 3;
  repeated string families = 4;
  string parameter_size = 5;
  string quantization_level = 6;
}

// OllamaModelData represents a model in Ollama's models endpoint response
message OllamaModelData {
  string name = 1;
  string model = 2;
  string modified_at = 3;
  int64 size = 4;
  string digest = 5;
  OllamaModelDetails details = 6;
}

// OllamaModelsResponse represents the response from Ollama's models endpoint
message OllamaModelsResponse {
  repeated OllamaModelData models = 1;
}