syntax = "proto3";
package downlink;

import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

option go_package = "protos/";

// ServerConfigService provides methods for working with application configuration
service ServerConfigService {
  // GetConfig returns the current application configuration
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {}

  // SaveConfig updates the application configuration
  rpc SaveConfig(SaveConfigRequest) returns (google.protobuf.Empty) {}

  // UpdateAnalysisConfig updates the analysis configuration
  rpc UpdateAnalysisConfig(UpdateAnalysisConfigRequest) returns (google.protobuf.Empty) {}
}

// GetConfigRequest represents a request to retrieve the current application configuration
message GetConfigRequest {}

// GetConfigResponse represents the response with the current application configuration
message GetConfigResponse {
  ServerConfig config = 1;
}

// SaveConfigRequest represents a request to update the application configuration
message SaveConfigRequest {
  ServerConfig config = 1;
}

// // RefreshConfigRequest represents a request to reload the configuration from the config file
// message RefreshConfigRequest {}


// UpdateAnalysisConfigRequest is the request for the UpdateAnalysisConfig method
message UpdateAnalysisConfigRequest {
  AnalysisConfig analysis_config = 1;
}

// ServerConfig represents application configuration
message ServerConfig {
  repeated FeedConfig feeds = 1;
  string db_path = 2;
  repeated ProviderConfig providers = 3;
  AnalysisConfig analysis = 4;
  Selectors default_selectors = 5;
}

// Selectors defines CSS selectors for content extraction
message Selectors {
  string article = 1;
  string cutoff = 2;
  string blacklist = 3;
}

// FeedConfig represents the configuration for a feed
message FeedConfig {
  string url = 1;
  string title = 2;
  map<string, string> params = 3;
  map<string, google.protobuf.Any> scraper = 4;
  bool enabled = 5;
  string scraping = 6;
  Selectors selectors = 7;
  string type = 8;
}

// ProviderConfig represents configuration for a specific LLM provider used for digest generation
message ProviderConfig {
  string name = 9;
  string provider_type = 1;
  string model_name = 2;
  bool enabled = 3;
  string base_url = 4;
  optional float temperature = 5;
  optional int32 max_retries = 6;
  optional int32 timeout_minutes = 7;
  string api_key = 8;
}

// AnalysisConfig represents the configuration for the analysis process
message AnalysisConfig {
  string provider = 4;
  string persona = 3;
}