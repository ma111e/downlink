name: Opt out of DOWNLINK
description: Ask us to remove your site from DOWNLINK.
title: "Opt-out request: <your domain>"
labels: ["site-exclusion"]
body:
  - type: markdown
    attributes:
      value: |
        ## Opt out of DOWNLINK

        This project helps cybersecurity professionals navigate the massive news and research landscape, and makes that news accessible to newcomers.

        If you don't want your site included in our coverage, we'll remove it asap.

        Downlink aggregates public RSS/Atom feeds, and every digest item links back to your original article. Full content is fetched only to build summaries, key points, glossary entries, and scoring. It is never republished in full.

        To opt out, confirm the site is yours below. If you'd rather change how your site is handled instead of removing it, don't hesitate to reach out.
  - type: input
    id: site-url
    attributes:
      label: Your site or feed URL
      placeholder: https://example.com
    validations:
      required: true
  - type: dropdown
    id: verification-method
    attributes:
      label: How will you verify ownership?
      description: We confirm you own the domain before changing anything.
      options:
        - DNS TXT record
        - File at /.well-known/downlink-verify.txt
        - "<meta> tag on the homepage"
        - Email from an address at this domain
    validations:
      required: true
  - type: textarea
    id: verification-proof
    attributes:
      label: Proof of ownership
      description: |
        Publish `downlink-verify:<your-github-username>` using the method above, then paste what we need to check it: the TXT record host and value, the URL of the verification file or page, or a note that you'll email proof.
      placeholder: |
        Method: DNS TXT record
        Host: example.com
        Value: downlink-verify:octocat
    validations:
      required: true
  - type: checkboxes
    id: ownership
    attributes:
      label: Confirmation
      options:
        - label: I own this site or am authorized to represent it.
          required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else? (optional)
      description: Questions, or a setup you'd prefer instead of removal.
    validations:
      required: false
