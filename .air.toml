# air config for the digest template dev server (`make dev-digest`).
# Rebuilds and restarts `server dev digest` when Go render code changes.
# Templates (*.tmpl) are watched in-process by the dev server itself and are
# excluded here so a template edit reloads the browser without a Go rebuild.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/dev-server ./cmd/server"
  bin = "./tmp/dev-server"
  full_bin = "./tmp/dev-server dev digest --no-open"
  include_ext = ["go"]
  exclude_dir = ["tmp", "docs", "pkg/pb"]
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  delay = 300
  stop_on_error = true

[misc]
  clean_on_exit = true
