services:
  downlink:
    build: .
    # Or use the published image:
    # image: ghcr.io/ma111e/downlink:latest
    ports:
      - "50051:50051" # gRPC API
      - "65261:65261" # Atom feed export
    environment:
      DOWNLINK_HOST: 0.0.0.0
      DOWNLINK_SOLIMEN_ADDR: http://solimen:5011
      # Public base URL for the Atom feed export links (e.g. behind a reverse proxy).
      # DOWNLINK_FEED_BASE_URL: https://feeds.example.com
    volumes:
      - ./config.json:/app/config.json
      - ./feeds.yml:/app/feeds.yml
      - downlink-data:/app/data
    depends_on:
      - solimen
    restart: unless-stopped

  # Optional full-browser scraper used for feeds with `scraping: full_browser`.
  solimen:
    image: ghcr.io/ma111e/solimen:latest
    ports:
      - "5011:5011"
    restart: unless-stopped

volumes:
  downlink-data:
