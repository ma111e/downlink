# profiles.yml — the live profile catalog, applied to the DB at server startup.
#
# This file makes the current single-tenant setup explicit: one "default"
# profile over every enabled feed, analyzed with the global config.json provider
# and the built-in rubric/categories/prompts. See profiles.example.yml for the
# full field reference (topics, rubric, categories, prompt overrides).

profiles:
  - slug: default
    name: "Downlink"
    description: "Infrastructure and threat-intel security news."
    icon: "📡"
    layout: default          # templates/default/
    theme: dark              # digestthemes default palette
    enabled: true
    sort_order: 0
    # No topics and no feeds: the profile pool is every enabled feed in feeds.yml.
    editorial:
      provider: openai-codex-sub   # matches config.json analysis.provider
      # Everything else inherits the global config.json analysis settings and the
      # built-in rubric, category taxonomy, and task prompts.
